name: MS Graph Mail - Email Search
description: This block validates required inputs (Mailbox and FolderName) before
    searching emails via Microsoft Graph API. If inputs are missing, it logs an error
    and stops. If valid, it searches the mailbox (based on unread or all emails),
    evaluates results, and stores either email details or a no-results message. The
    outcome is added as a case comment and returned as a Boolean.
