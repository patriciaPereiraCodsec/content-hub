version: 0.0
name: EmailV2 - Wait for Email from User
description: This block validates inputs and pauses workflow execution until email
    replies are received for a given MailID. It monitors a configurable Inbox folder,
    polling every 5 minutes for up to 3 days. Based on WaitForAllRecipients, it waits
    for one or all recipients to respond, then resumes execution, logs the outcome
    as a case comment, and returns a Boolean/result identifier
