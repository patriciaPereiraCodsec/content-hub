version: 0.0
name: MS Graph Mail - Wait for Email from User
description: This block pauses workflow execution until an email reply is received
    for a given MailID. By default, it monitors the Inbox (folder configurable). It
    polls every 5 minutes for up to 3 days (configurable). When a response is detected
    (exclusion can be applied), the workflow resumes, adding a case comment and returning
    a result identifier indicating whether responses were received.
