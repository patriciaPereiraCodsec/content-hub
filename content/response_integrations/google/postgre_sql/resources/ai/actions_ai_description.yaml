Run SQL Query:
  ai_description: >-
    This action executes a custom SQL query against a specified PostgreSQL database.
    It is designed to handle both data retrieval (SELECT) and data manipulation (INSERT,
    UPDATE, DELETE) or schema changes, as it automatically commits the transaction.
    The results of the query are returned as a JSON object and visualized within a
    data table in the Google SecOps interface.


    ### Flow Description:

    1. **Connection**: Establishes a connection to the PostgreSQL server using the
    provided configuration (Server Address, Username, Password, Port) and the specific
    'Database Name' parameter.

    2. **Execution**: Executes the provided SQL 'Query' string directly on the database.

    3. **Commitment**: Commits the transaction to ensure any changes made by the query
    are persisted in the database.

    4. **Data Processing**: If the query returns rows (e.g., a SELECT statement),
    the action fetches the column names and row data, converting them into a structured
    format.

    5. **Output**: Generates a CSV-formatted data table named 'PostgreSQL Query Results'
    and attaches the full result set as a JSON object to the action output.


    ### Parameters Description:

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Database Name | String | Yes | The name of the specific PostgreSQL database
    to connect to and run the query against. |

    | Query | String | Yes | The SQL statement to be executed. This can be a data
    retrieval query (SELECT) or a data modification query (INSERT, UPDATE, DELETE).
    |


    ### Additional Notes:

    - **Security Warning**: Since this action allows for arbitrary SQL execution,
    ensure that the query provided is safe and that the database user has the minimum
    necessary permissions.

    - **Transaction Handling**: The action performs a `commit()` after execution,
    meaning any data modifications will be permanent.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      The action executes arbitrary SQL queries and explicitly calls a commit on the
      database connection, allowing for INSERT, UPDATE, DELETE, and other state-changing
      operations on the external PostgreSQL database.
    fetches_data: true
    internal_data_mutation_explanation: null
