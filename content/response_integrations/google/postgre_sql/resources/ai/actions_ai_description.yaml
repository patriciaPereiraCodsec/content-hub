Ping:
  ai_description: >-
    ### General Description

    Tests the connectivity to a PostgreSQL database instance to verify that the integration
    configuration is correct and the database is accessible. This action is primarily
    used for troubleshooting and ensuring that the SOAR platform can communicate with
    the target database.


    ### Parameters Description

    There are no parameters for this action. It utilizes the global integration configuration
    settings, including Server Address, Username, Password, Port, and Database Name
    For Testing.


    ### Additional Notes

    This action does not perform any queries or data retrieval; it simply validates
    the network connection and authentication credentials.


    ### Flow Description

    1. Retrieve connection parameters (Server Address, Username, Password, Port, and
    Database Name) from the PostgreSQL integration configuration.

    2. Initialize the PostgreSQLManager, which attempts to establish a connection
    to the specified database using the provided credentials.

    3. Close the connection immediately upon a successful handshake.

    4. Return a success message to the Google SecOps platform if the connection was
    established without errors.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
