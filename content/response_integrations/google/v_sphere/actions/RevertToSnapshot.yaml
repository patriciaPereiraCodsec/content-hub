name: Revert To Snapshot
description: Revert to a specific snapshot
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/vsphere#revert_to_snapshot
integration_identifier: VSphere
parameters:
-   name: Vm Name
    default_value: ''
    type: string
    description: The name of the target VM.
    is_mandatory: true
-   name: Snapshot Name
    default_value: ''
    type: string
    description: The name of the target snapshot.
    is_mandatory: true
dynamic_results_metadata: []
creator: admin
script_result_name: success
