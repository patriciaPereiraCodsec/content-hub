Take Snapshot:
  ai_description: >-
    ### General Description

    The **Take Snapshot** action allows users to create a point-in-time snapshot of
    a specific Virtual Machine (VM) within a VMware vSphere environment. This is a
    critical action for incident response, enabling the preservation of a VM's state
    for forensic analysis or as a safety measure before remediation steps are taken.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Vm Name | String | Yes | The exact name of the target Virtual Machine as it
    appears in vSphere. |

    | Snapshot Name | String | Yes | The name to be assigned to the new snapshot.
    |

    | Snapshot Description | String | Yes | A descriptive note explaining the context
    or reason for the snapshot. |


    ### Flow Description

    1. **Authentication**: The action establishes a connection to the vSphere server
    using the configured credentials (address, username, password, and port).

    2. **VM Lookup**: It searches for the VM object matching the provided `Vm Name`
    within the vSphere inventory.

    3. **Snapshot Creation**: Once the VM is found, it triggers the `CreateSnapshot`
    task with the specified name and description.

    4. **Task Monitoring**: The action monitors the progress of the snapshot task
    and waits for it to reach a 'success' state.

    5. **Completion**: Upon successful creation, the action concludes with a confirmation
    message.
