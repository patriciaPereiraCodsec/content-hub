List Vms:
  ai_description: >-
    ### General Description

    This action retrieves a comprehensive list of all registered Virtual Machines
    (VMs) from a connected VMware vSphere environment. It provides visibility into
    the virtual infrastructure by collecting detailed metadata for every VM in the
    inventory, including its power state, network configuration, and hardware identifiers.


    ### Parameters

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | None | N/A | N/A | This action does not require any input parameters. |


    ### Flow Description

    1. **Connection**: The action initializes a connection to the vSphere server using
    the credentials and address provided in the integration configuration.

    2. **Inventory Query**: It queries the vSphere API to retrieve all `VirtualMachine`
    objects recursively starting from the root folder.

    3. **Data Extraction**: For each VM found, the action extracts key information
    such as the VM Name, Template status, File Path, Guest OS, Instance UUID, Bios
    UUID, Power State, VMware Tools status, and IP Address.

    4. **Reporting**: The collected data is formatted into a CSV-style data table
    titled 'Vms Info' and a raw JSON result, which are then attached to the action
    output in Google SecOps.


    ### Additional Notes

    This is a global discovery action and does not operate on specific entities within
    a case. It is typically used for asset inventory or infrastructure auditing.
