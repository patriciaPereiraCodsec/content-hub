Get System Info:
  ai_description: >-
    ### General Description

    Retrieves detailed metadata for a specific Virtual Machine (VM) from a VMware
    vSphere environment using its name. This action is designed to provide security
    analysts with immediate context regarding a system's configuration, operational
    state, and network identifiers, facilitating faster triage and investigation of
    VM-related alerts.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Vm Name | String | Yes | The exact name of the virtual machine as it appears
    in the vSphere inventory. This is used to identify the target system for data
    retrieval. |


    ### Flow Description

    1. **Authentication**: Connects to the vCenter server using the configured Server
    Address, Username, Password, and Port.

    2. **VM Discovery**: Searches the vSphere inventory (starting from the root folder)
    to find the virtual machine object that matches the provided `Vm Name`.

    3. **Data Extraction**: Retrieves specific metadata from the VM object, including
    the Guest OS full name, BIOS UUID, Instance UUID, Power State (e.g., poweredOn),
    VMware Tools status, and the primary IP Address.

    4. **Reporting**: Converts the collected metadata into a CSV-formatted data table
    and a JSON object. The data table is attached to the case for visibility, and
    the JSON is returned as the action result.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
