Power Off:
  ai_description: >-
    ### General Description

    Powers off a specific virtual machine (VM) within a VMware vSphere environment.
    This action is primarily used for containment or system management by programmatically
    shutting down a target VM identified by its name.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Vm Name | String | Yes | The name of the virtual machine to be powered off.
    |


    ### Flow Description

    1. **Configuration Retrieval**: The action fetches vSphere server connection details
    (address, credentials, port) from the integration configuration.

    2. **Input Parsing**: Retrieves the target VM name from the action parameters.

    3. **Connection**: Initializes the VSphereManager to establish a session with
    the vCenter/ESXi host.

    4. **Object Lookup**: Searches for the VM object in the vSphere inventory using
    the provided name.

    5. **Execution**: Sends a power-off command to the identified VM.

    6. **Task Monitoring**: Waits for the vSphere task to complete successfully before
    finishing the action.
