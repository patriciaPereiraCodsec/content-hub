Get Vm By Ip:
  ai_description: >-
    ### General Description

    The **Get Vm By Ip** action retrieves detailed metadata for Virtual Machines (VMs)
    within a VMware vSphere environment by searching for matching IP Address entities.
    It allows analysts to quickly identify which infrastructure assets are associated
    with specific network addresses during an investigation.


    ### Parameters Description

    This action does not require any specific input parameters. It utilizes the global
    integration configuration for connectivity and processes entities from the current
    context.


    ### Flow Description

    1. **Connection**: The action initializes a connection to the vCenter server using
    the configured Server Address, Username, Password, and Port.

    2. **Entity Processing**: It iterates through the list of target entities, specifically
    filtering for those of type `ADDRESS`.

    3. **Search**: For each IP address, it queries the vSphere Search Index (`FindAllByIp`)
    to locate the corresponding virtual machine object.

    4. **Enrichment**: If a VM is found, the action extracts key attributes including
    the VM Name, Power State, Guest OS full name, BIOS and Instance UUIDs, and VMware
    Tools status.

    5. **Output**: The collected VM data is aggregated into a JSON result and summarized
    in the action's execution output.


    ### Additional Notes

    If multiple virtual machines are associated with the same IP address, the action
    will return information for the first VM returned by the vSphere API.
