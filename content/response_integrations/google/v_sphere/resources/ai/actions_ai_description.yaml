Power On:
  ai_description: >-
    Powers on a specific Virtual Machine (VM) within a VMware vSphere environment.
    This action connects to a vCenter or ESXi host, locates the VM by its name, and
    initiates a power-on command. It monitors the task until completion to ensure
    the VM has successfully transitioned to a powered-on state.


    ### Parameters

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Vm Name | String | Yes | The exact name of the Virtual Machine to be powered
    on. |


    ### Flow Description

    1. **Authentication**: Establishes a connection to the vSphere server using the
    configured credentials (address, username, password, and port).

    2. **Object Lookup**: Searches the vSphere inventory (starting from the root folder)
    to find the Virtual Machine object matching the provided 'Vm Name'.

    3. **Execution**: Triggers the `PowerOn` method on the identified VM object.

    4. **Monitoring**: Utilizes a property collector to wait for the vSphere task
    to reach a 'success' state.

    5. **Completion**: Returns a success message to the Google SecOps platform once
    the VM is confirmed to be powered on.
