Reset:
  ai_description: >-
    ### General Description

    Performs a hard reset on a specified Virtual Machine (VM) within a VMware vSphere
    environment. This action is used to forcefully restart a VM, similar to pulling
    the power cord and plugging it back in, which is useful for recovering unresponsive
    systems.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Vm Name | String | Yes | The exact name of the target virtual machine in the
    vSphere inventory that you wish to reset. |


    ### Flow Description

    1. **Authentication**: Connects to the vCenter server using the configured Server
    Address, Username, Password, and Port.

    2. **VM Discovery**: Searches the vSphere inventory to locate the VM object matching
    the provided 'Vm Name'.

    3. **Execution**: Initiates the `ResetVM_Task` on the identified virtual machine.

    4. **Task Monitoring**: Blocks and waits for the vSphere task to complete successfully
    before finalizing the action.

    5. **Completion**: Returns a success message to the Google SecOps case wall upon
    successful reset.


    ### Additional Notes

    This action does not run on entities; it relies solely on the 'Vm Name' parameter
    provided in the action configuration.
