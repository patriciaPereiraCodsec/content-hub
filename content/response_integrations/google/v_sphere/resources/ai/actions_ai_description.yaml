Ping:
  ai_description: "### General Description\nThe **Ping** action is a diagnostic utility\
    \ designed to verify the connectivity between the Google SecOps environment and\
    \ a VMware vSphere (vCenter) server. It ensures that the provided credentials\
    \ and network configurations (server address, port, and SSL settings) are correct\
    \ and that the vSphere API is reachable.\n\n### Parameters Description\nThis action\
    \ primarily utilizes the integration's global configuration parameters rather\
    \ than action-specific inputs. \n\n| Parameter | Type | Mandatory | Description\
    \ |\n| :--- | :--- | :--- | :--- |\n| Server Address | String | Yes | The IP address\
    \ or FQDN of the vSphere/vCenter server. |\n| Username | String | Yes | The username\
    \ used to authenticate with the vSphere server. |\n| Password | String | Yes |\
    \ The password used to authenticate with the vSphere server. |\n| Port | Integer\
    \ | Yes | The port number for the vSphere API (typically 443). |\n\n### Additional\
    \ Notes\n* This action does not process any entities.\n* It attempts a secure\
    \ connection first and falls back to an unverified SSL context if the initial\
    \ attempt fails, ensuring compatibility with environments using self-signed certificates.\n\
    \n### Flow Description\n1. **Configuration Retrieval:** The action fetches the\
    \ vSphere server address, credentials, and port from the integration's configuration\
    \ settings.\n2. **Connection Attempt:** It initializes the `VSphereManager`, which\
    \ uses the `pyVmomi` library to attempt a `SmartConnect` to the target server.\n\
    3. **SSL Handling:** If the standard connection fails due to SSL issues, the manager\
    \ attempts to establish an unverified HTTPS connection.\n4. **Validation:** If\
    \ the connection is successful, the action terminates with a success message.\
    \ If an exception occurs (e.g., invalid login or unreachable host), the action\
    \ fails, providing the error details."
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
