Check Account:
  ai_description: >-
    ### General Description

    The **Check Account** action retrieves information from the **HaveIBeenPwned**
    service to determine if a specific account (email address) has been compromised
    in known data breaches or appeared in public "pastes." This is a critical enrichment
    step for identifying credential exposure and potential account takeover risks.


    ### Parameters Description

    There are no specific action parameters for this action. It relies on the integration's
    global configuration (API Key and Verify SSL).


    ### Additional Notes

    - This action specifically targets entities of type **USER** (mapped to **USERUNIQNAME**).

    - It validates the email format before making API calls to ensure efficiency and
    avoid unnecessary rate-limit consumption.


    ### Flow Description

    1. **Initialization**: The action initializes the HaveIBeenPwned manager using
    the provided API key and SSL configuration.

    2. **Entity Filtering**: It iterates through the target entities and selects those
    of type **USER**.

    3. **Validation**: For each user entity, it validates that the identifier is a
    correctly formatted email address.

    4. **Data Retrieval**: It performs two separate API calls to HaveIBeenPwned: one
    for data breaches and one for public pastes.

    5. **Internal Enrichment**: If breaches or pastes are found, an **Entity Insight**
    is created to alert the analyst, and **Data Tables** are added to the case providing
    detailed lists of the specific breaches and pastes.

    6. **Final Output**: The action returns a summary message listing all pwned entities
    and provides a full JSON result for downstream automation.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Creates entity insights and adds data tables to the case to provide context
      on account breaches.
  categories:
    enrichment: true
  entity_usage:
    entity_types:
    - USERUNIQNAME
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: true
    filters_by_identifier: false
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: false
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
Ping:
  ai_description: >-
    ### General Description

    The **Ping** action is a diagnostic tool designed to verify the connectivity between
    Google SecOps and the HaveIBeenPwned (HIBP) service. It ensures that the provided
    API key is valid and that the network configuration (including SSL verification)
    allows for successful communication with the HIBP API.


    ### Parameters Description

    There are no input parameters for this action. It relies solely on the integration's
    global configuration (API Key and Verify SSL).


    ### Flow Description

    1. **Configuration Retrieval**: The action fetches the 'Api Key' and 'Verify SSL'
    settings from the HaveIBeenPwned integration configuration.

    2. **Manager Initialization**: It initializes the `HaveIBeenPwnedManager` with
    the retrieved credentials and SSL settings.

    3. **Connectivity Test**: The action calls the `test_connectivity` method, which
    performs a GET request to the HIBP API's `breachedaccount` endpoint using a dummy
    email address (`test@gmail.com`).

    4. **Validation**: The manager validates the HTTP response. If the API key is
    invalid (401) or rate-limited (429), an exception is raised. A 404 response is
    treated as a successful connection (indicating the account was not found but the
    service is reachable).

    5. **Completion**: If no exceptions occur, the action ends with a 'Connection
    Established' message and a boolean result of `true`.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
