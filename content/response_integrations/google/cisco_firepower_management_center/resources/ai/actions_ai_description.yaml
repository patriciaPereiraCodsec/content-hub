Get Addresses List By Name:
  ai_description: >-
    ### General Description

    The **Get Addresses List By Name** action retrieves a list of addresses (IPs or
    Hosts) contained within a specific network group in Cisco Firepower Management
    Center (FMC). This utility action allows security analysts to programmatically
    inspect the contents of network groups to verify blocklists or allowed lists without
    needing to navigate the FMC UI.


    ### Parameters Description

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Network Group Name** | String | Yes | The exact name of the network group
    in Cisco FMC to query for its member addresses. |


    ### Flow Description

    1. **Initialization**: The action initializes the Cisco Firepower Manager using
    the integration's configuration parameters, including the API Root, credentials,
    and SSL verification settings.

    2. **Group Lookup**: It searches for the network group by name by querying the
    FMC API. This involves a paginated search to find the unique identifier (UUID)
    associated with the provided group name.

    3. **Data Extraction**: Once the group is identified, the action fetches the full
    group object and extracts the 'literals' list, which contains the individual address
    values defined in that group.

    4. **Result Generation**:
        *   The raw network group JSON object is added to the action's results.
        *   A data table is constructed and displayed in the SOAR interface, listing
    all found addresses.
        *   A comma-separated string of the addresses is returned as the action's
    primary result value.

    ### Additional Notes

    * This action does not process entities from the SOAR case; it relies entirely
    on the provided **Network Group Name** parameter.

    * If the group name is not found or the group contains no addresses, the action
    will report the appropriate status and an empty result.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
  categories:
