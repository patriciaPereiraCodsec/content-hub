Unblock Address:
  ai_description: >-
    ### General Description

    This action unblocks IP addresses in Cisco Firepower Management Center (FMC) by
    removing them from a specified Network Group. It is typically used to reverse
    a previous blocking action or to manage access control lists dynamically within
    the FMC environment.


    ### Parameters

    | Parameter Name | Description | Type | Mandatory | Notes |

    | :--- | :--- | :--- | :--- | :--- |

    | Network Group Name | The name of the Network Group object in Cisco Firepower
    from which the IP addresses should be removed. | String | Yes | The group must
    exist and must contain at least one other address after the removal, as FMC does
    not allow empty network groups. |


    ### Additional Notes

    - **Empty Group Constraint:** The action will raise an error if the removal of
    an address would leave the Network Group empty. Cisco Firepower requires at least
    one address to remain in the group.

    - **Entity Scope:** This action specifically targets entities of type `ADDRESS`
    (IP addresses).


    ### Flow Description

    1. **Authentication:** Connects to the Cisco Firepower Management Center using
    provided credentials and retrieves an authentication token.

    2. **Group Retrieval:** Fetches the details of the Network Group specified in
    the `Network Group Name` parameter.

    3. **Entity Filtering:** Identifies all `ADDRESS` entities within the current
    SOAR context.

    4. **Modification:** For each identified IP address, the script checks if it exists
    within the Network Group's members. If found, it is removed from the list.

    5. **External Update:** Sends a `PUT` request to the FMC API to update the Network
    Group with the modified list of addresses.

    6. **Reporting:** Logs the success or failure of the unblocking operation for
    each entity and provides a summary message.
