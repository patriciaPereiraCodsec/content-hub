Block Address:
  ai_description: >-
    Blocks IP addresses by adding them to a specified Network Group in Cisco Firepower
    Management Center. This action modifies the configuration of the external firewall
    system to enforce network restrictions on the target entities.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Network Group Name | String | Yes | The name of the existing Network Group in
    Cisco Firepower where the IP addresses should be added. |


    ### Flow Description

    1. **Authentication:** Connects to the Cisco Firepower Management Center using
    the provided credentials and retrieves an authentication token.

    2. **Group Retrieval:** Fetches the details of the Network Group specified in
    the parameters to obtain its unique identifier and current member list.

    3. **Entity Filtering:** Identifies all `ADDRESS` entities within the current
    Google SecOps context.

    4. **External Mutation:** For each address entity, the action checks if the IP
    is already a member of the group. If not, it appends the IP to the group's member
    list and performs a `PUT` request to update the Network Group on the Cisco Firepower
    server.

    5. **Reporting:** Returns a summary message listing the entities that were successfully
    blocked and details any errors encountered during the process.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      The action performs a PUT request to the Cisco Firepower API to update a Network
      Group object, adding new IP addresses to its configuration.
    fetches_data: true
    internal_data_mutation_explanation: null
  categories:
    enrichment: false
