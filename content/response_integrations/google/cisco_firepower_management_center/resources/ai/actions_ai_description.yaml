Block Port:
  ai_description: >-
    Blocks a specific network port within Cisco Firepower Management Center (FMC)
    by assigning it to a designated port object group. This action is used to enforce
    network security policies by dynamically updating port groups that are typically
    attached to access control policies.


    ### Parameters Description


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Port Group Name | String | Yes | The name of the existing port object group
    in Cisco FMC where the port will be added. |

    | Port | String | Yes | The specific port number to block (e.g., '443', '8080').
    |

    | Port Protocol | String | Yes | The protocol associated with the port (e.g.,
    'TCP', 'UDP'). |


    ### Flow Description


    1. **Authentication**: The action authenticates with the Cisco FMC API using provided
    credentials to obtain a domain UUID and access tokens.

    2. **Group Retrieval**: It searches for the port object group specified in the
    'Port Group Name' parameter to retrieve its unique identifier and current members.

    3. **Duplicate Check**: The action checks if the specified port is already a member
    of the group. If it is, the action completes successfully without making changes.

    4. **Object Creation**: If the port is not in the group, the action creates a
    new 'Protocol Port Object' in FMC for the specified port and protocol.

    5. **Group Update**: The action performs a PUT request to update the port object
    group, appending the newly created port object to the group's member list.


    ### Additional Notes


    * This action does not run on entities; it relies entirely on the manual input
    parameters provided in the playbook or by the user.

    * The port group must already exist in Cisco FMC for this action to succeed.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Creates a new Protocol Port Object and updates an existing Port Object Group
      in Cisco Firepower Management Center to include the new port.
    fetches_data: true
    internal_data_mutation_explanation: null
