Ping:
  ai_description: >-
    ### General Description

    The **Ping** action is a diagnostic tool designed to verify the connectivity between
    Google SecOps and the Cisco Firepower Management Center (FMC). Its primary purpose
    is to ensure that the provided configuration details (API Root, Username, Password,
    and SSL settings) are correct and that the network path is open. It performs a
    basic authentication handshake to validate the integration's operational status.


    ### Parameters Description

    There are no parameters for this action.


    ### Additional Notes

    This action is typically used during the initial setup of the integration or for
    troubleshooting communication issues. It does not process any entities or modify
    any data within Cisco Firepower or Google SecOps.


    ### Flow Description

    1. **Configuration Retrieval**: The action retrieves the integration's global
    configuration, including the API Root URL, credentials, and SSL verification preference.

    2. **Manager Initialization**: It initializes the `CiscoFirepowerManager` with
    the retrieved settings.

    3. **Authentication Request**: The manager sends a POST request to the `/api/fmc_platform/v1/auth/generatetoken`
    endpoint.

    4. **Validation**: The action checks the response for a valid authentication token
    and a `DOMAIN_UUID` header.

    5. **Result Reporting**: If the authentication is successful and the UUID is retrieved,
    it returns a 'Connection Established' message; otherwise, it reports 'Connection
    Failed'.
