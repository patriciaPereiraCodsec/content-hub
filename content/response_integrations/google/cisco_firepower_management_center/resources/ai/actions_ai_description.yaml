    1. **Authentication:** Connects to the Cisco Firepower Management Center and retrieves
    the necessary authentication tokens and Domain UUID.

    2. **Group Retrieval:** Fetches the details of the URL group specified in the
    'URL Group Name' parameter to obtain its unique ID and current members.

    3. **Entity Filtering:** Identifies all URL entities within the current Google
