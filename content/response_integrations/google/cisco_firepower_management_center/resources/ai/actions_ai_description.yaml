Get Ports List By Name:
  ai_description: >-
    ### General Description

    The **Get Ports List By Name** action retrieves a list of ports associated with
    a specific port group from the Cisco Firepower Management Center (FMC). This action
    is designed to query the FMC configuration to identify which ports are members
    of a named group, facilitating auditing and policy verification.


    ### Parameters Description

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Port Group Name** | String | Yes | The exact name of the port group in Cisco
    FMC for which you want to retrieve the port list. |


    ### Flow Description

    1. **Authentication**: The action initializes a connection to the Cisco FMC API
    using the configured credentials and retrieves a domain UUID and authentication
    tokens.

    2. **Search**: It queries the FMC for all port group objects and iterates through
    the results to find a match for the provided **Port Group Name**.

    3. **Data Retrieval**: Once the group is found, the action fetches the full details
    of that specific port group object by its ID to access the list of member port
    objects.

    4. **Output Generation**:
        *   The raw JSON object representing the port group is added to the action
    results.
        *   A data table is created listing the ports found within the group.
        *   A comma-separated string of the port numbers is returned as the main result
    value.

    ### Additional Notes

    This action does not process or filter Google SecOps entities (such as IP addresses
    or Hostnames). It is a utility action that queries global configuration data from
    the Cisco FMC based on a user-provided parameter.
