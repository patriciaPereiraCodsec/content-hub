Unblock Port:
  ai_description: >-
    ### General Description

    Removes a specific port from a designated Port Object Group in Cisco Firepower
    Management Center (FMC). This action is used to revert port blocking by modifying
    the group configuration and deleting the associated port object.


    ### Parameters Description

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Port Group Name | String | Yes | The name of the port object group from which
    the port should be removed. |

    | Port | String | Yes | The specific port number (e.g., '80', '443') to be unblocked.
    |


    ### Additional Notes

    This action performs both a group membership update (PUT) and a standalone object
    deletion (DELETE) on the Cisco FMC platform.


    ### Flow Description

    1. **Authentication**: Connects to the Cisco FMC API and retrieves an authentication
    token.

    2. **Group Retrieval**: Searches for the Port Object Group by the provided name
    to obtain its unique identifier and current member list.

    3. **Membership Check**: Iterates through the group's objects to find the entry
    matching the target port.

    4. **Group Update**: If found, it removes the port from the group's member list
    and sends a PUT request to update the group on the FMC.

    5. **Object Deletion**: Finally, it sends a DELETE request to remove the individual
    port object from the FMC's database.
