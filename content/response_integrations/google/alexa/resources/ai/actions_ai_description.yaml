Get URL Rank:
  ai_description: >-
    ### General Description

    Enriches URL entities with traffic rank information from the Alexa Web Information
    Service (AWIS). This action helps security analysts determine the popularity and
    potential risk of a domain by retrieving its global traffic rank. If a URL's rank
    exceeds a specified threshold (indicating it is less popular or potentially rare),
    the action marks the entity as suspicious and generates a security insight.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Threshold | Integer | Yes | The numerical rank value used to evaluate risk.
    If the retrieved Alexa rank is greater than this threshold (meaning the site is
    less popular), the entity is flagged as suspicious. |


    ### Additional Notes

    * The action requires valid AWS credentials (Access Key ID and Secret Access Key)
    configured in the Alexa integration settings.

    * Alexa ranks are inverse: a rank of 1 is the most popular site globally. A higher
    numerical rank indicates a less frequently visited site.


    ### Flow Description

    1. **Authentication**: Initializes the Alexa Manager using the provided AWS credentials
    from the integration configuration.

    2. **Entity Filtering**: Identifies all URL entities within the current scope.

    3. **Data Retrieval**: For each URL, it queries the Alexa Web Information Service
    to fetch the 'Rank' response group.

    4. **Enrichment**: Updates the entity's additional properties with the `Alexa_Rank`
    and marks the entity as enriched.

    5. **Risk Assessment**: Compares the retrieved rank against the user-defined `Threshold`.
    If the rank is higher than the threshold, the entity is marked as suspicious.

    6. **Insight Generation**: Creates an entity insight for suspicious URLs stating
    they were found suspicious by Alexa.

    7. **Reporting**: Updates the entities in the SOAR platform and provides a summary
    message and a detailed JSON result containing the raw traffic data.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entity additional properties with the Alexa Rank, modifies the entity's
      suspicious and enriched status, and creates entity insights.
  categories:
    enrichment: true
  entity_usage:
    entity_types:
    - DestinationURL
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: true
    filters_by_identifier: false
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: false
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
Ping:
  ai_description: >-
    ### General Description

    The **Ping** action is used to verify the connectivity between Google SecOps and
    the Alexa Web Information Service (AWIS). It ensures that the provided AWS credentials
    (Access Key ID and Secret Access Key) are valid and that the network environment
    allows communication with the Alexa API endpoints.


    ### Parameters Description

    There are no parameters for this action.


    ### Flow Description

    1. **Configuration Retrieval**: The action retrieves the 'Access key id' and 'Secret
    access key' from the Alexa integration configuration.

    2. **Manager Initialization**: It initializes the `AlexaManager` with the retrieved
    credentials.

    3. **Connectivity Test**: The action calls the `test_connectivity` method, which
    performs a sample `UrlInfo` request for 'google.co.il' to the Alexa API to verify
    the connection.

    4. **Result Handling**: If the API call is successful, the action concludes with
    a 'Connected Successfully' message. If an error occurs during the request or XML
    parsing, an exception is raised, indicating a connectivity failure.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
