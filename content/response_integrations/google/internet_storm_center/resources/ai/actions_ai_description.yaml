Enrich Entities:
  ai_description: "### General Description\nEnriches IP Address entities using threat\
    \ intelligence from the Internet Storm Center (SANS ISC). This action retrieves\
    \ detailed reputation data, including attack counts, first/last seen dates, ASN\
    \ information, and associated threat feeds to help analysts assess the risk level\
    \ of network-based indicators.\n\n### Parameters Description\n| Parameter | Type\
    \ | Mandatory | Description |\n| :--- | :--- | :--- | :--- |\n| Create Insight\
    \ | Boolean | No | If enabled (default is True), the action will create a detailed\
    \ insight on the entity's case wall containing the retrieved threat intelligence.\
    \ |\n\n### Additional Notes\n- This action runs asynchronously to handle potential\
    \ API rate limiting and large sets of entities. \n- The `Email Address` provided\
    \ in the integration configuration is used as the `User-Agent` for API requests\
    \ to the Internet Storm Center.\n- The action specifically targets `ADDRESS` (IP)\
    \ entities.\n\n### Flow Description\n1. **Filter Entities:** The action identifies\
    \ all `ADDRESS` entities within the current scope.\n2. **API Interaction:** For\
    \ each identified IP, the action queries the Internet Storm Center API (`/api/ip/{address}`).\n\
    3. **Data Parsing:** The response is parsed to extract metrics such as `count`\
    \ (blocked packets), `attacks`, `mindate` (first seen), `maxdate` (last seen),\
    \ and `threatfeeds`.\n4. **Internal Updates:** \n    - Sets the entity's `is_enriched`\
    \ status to `True`.\n    - Maps retrieved data to the entity's `additional_properties`\
    \ using the `IntStormCentr` prefix.\n5. **Insight Generation:** If the `Create\
    \ Insight` parameter is enabled, a formatted HTML insight is added to the entity.\n\
    6. **Result Reporting:** The action outputs a JSON result containing the raw data\
    \ and populates a data table for each successfully enriched entity."
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entity attributes (additional_properties), sets the is_enriched flag,
      and creates entity insights based on the retrieved threat intelligence.
  categories:
    enrichment: true
  entity_usage:
    entity_types:
    - ADDRESS
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: true
    filters_by_identifier: false
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: false
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
Ping:
  ai_description: >-
    Tests the connectivity to the Internet Storm Center (ISC) API using the provided
    configuration parameters. This action ensures that the integration can successfully
    communicate with the ISC service by performing a simple API call.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Email Address | String | Yes | The email address to be used in the User-Agent
    header for API requests. This is a configuration-level parameter. |

    | Verify SSL | Boolean | Yes | If enabled, the action will verify the SSL certificate
    of the ISC server. This is a configuration-level parameter. |


    ### Additional Notes

    - This action does not take any input parameters directly; it relies on the global
    integration configuration.

    - As a 'Ping' action, it is used primarily for health checks and troubleshooting
    connectivity issues.


    ### Flow Description

    1. **Initialization**: The action initializes the Siemplify context and retrieves
    the global configuration parameters: 'Email Address' and 'Verify SSL'.

    2. **Manager Setup**: An instance of the `InternetStormCenterManager` is created
    using the retrieved configuration, setting the User-Agent and SSL verification
    preferences.

    3. **Connectivity Test**: The action calls the `test_connectivity` method, which
    performs a GET request to the ISC API handler endpoint (`/api/handler?json=null`).

    4. **Validation**: The response is validated for HTTP errors and specific content
    types (e.g., ensuring it is not an HTML error page).

    5. **Completion**: If the request is successful, the action returns a success
    message. If an error occurs (such as a connection failure or invalid response),
    it catches the exception and reports a failure with the reason.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
  categories:
    enrichment: false
  entity_usage:
    entity_types: []
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: false
    filters_by_identifier: false
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: false
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
