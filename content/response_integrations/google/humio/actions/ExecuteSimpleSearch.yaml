name: Execute Simple Search
description: Search events based on parameters in Humio.
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/humio#execute_simple_search
integration_identifier: Humio
parameters:
-   name: Repository Name
    default_value: ''
    type: string
    description: Specify the name of the repository that should be searched.
    is_mandatory: true
-   name: Query Filter
    default_value: ''
    type: string
    description: 'Specify the query that should be executed during the search. Note:
        functions "head()" and "select()" shouldn''t be provided.'
    is_mandatory: false
-   name: Time Frame
    default_value: Last Hour
    type: ddl
    optional_values:
    - Last Hour
    - Last 6 Hours
    - Last 24 Hours
    - Last Week
    - Last Month
    - Custom
    description: Specify a time frame for the results. If "Custom" is selected, you
        also need to provide "Start Time".
    is_mandatory: false
-   name: Start Time
    default_value: ''
    type: string
    description: 'Specify the start time for the results. This parameter is mandatory,
        if "Custom" is selected for the "Time Frame" parameter. Format: ISO 8601'
    is_mandatory: false
-   name: End Time
    default_value: ''
    type: string
    description: 'Specify the end time for the results. Format: ISO 8601. If nothing
        is provided and "Custom" is selected for the "Time Frame" parameter then this
        parameter will use current time.'
    is_mandatory: false
-   name: Fields To Return
    default_value: ''
    type: string
    description: Specify what fields to return. If nothing is provided, action will
        return all fields.
    is_mandatory: false
-   name: Sort Field
    default_value: ''
    type: string
    description: Specify what parameter should be used for sorting. By default the
        query sorts data by timestamp in the ascending order.
    is_mandatory: false
-   name: Sort Field Type
    default_value: String
    type: ddl
    optional_values:
    - String
    - Number
    - Hex
    description: Specify the type of the field that will be used for sorting. This
        parameter is needed to ensure that the correct results are returned.
    is_mandatory: false
-   name: Sort Order
    default_value: ASC
    type: ddl
    optional_values:
    - ASC
    - DESC
    description: Specify the order of sorting.
    is_mandatory: false
-   name: Max Results To Return
    default_value: 50
    type: string
    description: 'Specify how many results to return. Default: 50.'
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/execute_simple_search_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
