Execute Custom Search:
  ai_description: >-
    ### General Description

    The **Execute Custom Search** action allows users to perform advanced event searching
    within a specific Humio repository using Humio's native query language. This is
    a utility for threat hunting and investigation, enabling the retrieval of raw
    event data directly into the Google SecOps platform for further analysis.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Repository Name** | String | Yes | The name of the Humio repository where
    the search will be executed. |

    | **Query** | String | Yes | The Humio query string to execute. Note: Do not include
    the `head()` function as the action handles result limiting automatically. |

    | **Max Results To Return** | Integer | No | The maximum number of event results
    to retrieve. Defaults to 50. Must be a value greater than 0. |


    ### Additional Notes

    - This action does not operate on specific entities; it is a global search action
    that returns data based on the provided query.

    - Results are presented both as a raw JSON object and a formatted data table named
    "Results" on the case wall.


    ### Flow Description

    1. **Initialization**: The action initializes the Humio manager using the provided
    API root and token from the integration configuration.

    2. **Parameter Validation**: It validates that the `Max Results To Return` parameter
    is a positive integer.

    3. **Query Construction**: It constructs the final query string by appending the
    `| head(limit)` clause to the user-provided query to ensure the result set matches
    the requested limit.

    4. **Execution**: A POST request is sent to the Humio query API for the specified
    repository.

    5. **Output Generation**: If events are found, they are parsed into JSON objects
    and a data table is created. If no results are found, the action completes with
    a message indicating no data was returned.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
  categories:
    enrichment: false
