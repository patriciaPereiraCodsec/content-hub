Ping:
  ai_description: >-
    ### General Description

    The **Ping** action is designed to verify the connectivity between Google SecOps
    and the Humio instance. It ensures that the provided credentials (API Root and
    API Token) are valid and that the network path is open by executing a minimal
    test query.


    ### Parameters Description

    This action does not have any action-specific parameters. It relies on the following
    integration configuration parameters:


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | API Root | String | Yes | The base URL of the Humio API instance. |

    | API Token | String | Yes | The API token used for authentication with Humio.
    |

    | Verify SSL | Boolean | Yes | Specifies whether to verify the SSL certificate
    of the Humio server. |


    ### Additional Notes

    This action is typically used during the initial setup or troubleshooting of the
    Humio integration to confirm that the environment can communicate with the Humio
    API.


    ### Flow Description

    1. **Parameter Extraction**: The action retrieves the API Root, API Token, and
    SSL verification settings from the integration configuration.

    2. **Manager Initialization**: It initializes the `HumioManager` with the retrieved
    connection settings.

    3. **Connectivity Test**: It executes a minimal query (`|select([@id]) | head(1)`)
    against the `humio-fleet` repository to verify API access and authentication.

    4. **Result Reporting**: If the query succeeds, it returns a success message;
    otherwise, it catches the exception and reports a failure with the error details.
