Execute Simple Search:
  ai_description: >-
    ### General Description

    The **Execute Simple Search** action allows users to query events from a specific
    Humio repository based on various filtering and sorting criteria. It is designed
    to retrieve log data and present it within Google SecOps for investigation and
    analysis.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Repository Name** | String | Yes | The name of the Humio repository to search
    within. |

    | **Query Filter** | String | No | A Humio query string to filter results. Note:
    `head()` and `select()` functions should not be included as they are handled by
    other parameters. |

    | **Time Frame** | Enum | No | Predefined time ranges (e.g., Last Hour, Last 24
    Hours). If set to 'Custom', **Start Time** must be provided. |

    | **Start Time** | String | No | The start time for the search in ISO 8601 format.
    Mandatory if **Time Frame** is 'Custom'. |

    | **End Time** | String | No | The end time for the search in ISO 8601 format.
    Defaults to the current time if left empty and **Time Frame** is 'Custom'. |

    | **Fields To Return** | String | No | A comma-separated list of specific fields
    to include in the results. If empty, all fields are returned. |

    | **Sort Field** | String | No | The field name used to sort the results. |

    | **Sort Field Type** | Enum | No | The data type of the sort field (String, Number,
    or Hex). |

    | **Sort Order** | Enum | No | The direction of sorting (ASC or DESC). |

    | **Max Results To Return** | Integer | No | The maximum number of events to retrieve.
    Default is 50. Must be greater than 0. |


    ### Additional Notes

    - Either a predefined **Time Frame** or a **Custom** time frame with a **Start
    Time** must be configured for the action to execute successfully.

    - The action automatically constructs the final Humio query by appending `select()`,
    `head()`, and `sort()` operators based on the provided parameters.


    ### Flow Description

    1. **Parameter Extraction:** The action retrieves configuration settings (API
    Root, Token) and user-provided search parameters.

    2. **Time Validation:** It calculates the start and end timestamps based on the
    selected **Time Frame**. If 'Custom' is selected, it validates that **Start Time**
    is provided and is earlier than **End Time**.

    3. **Query Construction:** The `HumioManager` builds a Humio-compatible query
    string by combining the **Query Filter** with the specified fields, result limit,
    and sorting logic.

    4. **API Execution:** A POST request is sent to the Humio API's query endpoint
    for the specified repository.

    5. **Data Processing:** The returned JSON events are parsed into internal data
    models.

    6. **Output Generation:** If events are found, they are added to the case as a
    JSON result and a formatted data table named 'Results'.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
