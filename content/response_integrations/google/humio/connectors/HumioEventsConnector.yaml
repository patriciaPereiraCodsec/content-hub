name: Humio - Events Connector
parameters:
-   name: DeviceProductField
    default_value: Product Name
    type: string
    description: Enter the source field name in order to retrieve the Product Field
        name.
    is_mandatory: true
    is_advanced: false
    mode: regular
-   name: EventClassId
    default_value: event_field
    type: string
    description: Enter the source field name in order to retrieve the Event Field
        name.
    is_mandatory: true
    is_advanced: false
    mode: regular
-   name: Environment Field Name
    default_value: ''
    type: string
    description: Describes the name of the field where the environment name is stored.
        If the environment field isn't found, the environment is the default environment.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Environment Regex Pattern
    default_value: .*
    type: string
    description: A regex pattern to run on the value found in the "Environment Field
        Name" field. Default is .* to catch all and return the value unchanged. Used
        to allow the user to manipulate the environment field via regex logic. If
        the regex pattern is null or empty, or the environment value is null, the
        final environment result is the default environment.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: PythonProcessTimeout
    default_value: 360
    type: integer
    description: Timeout limit for the python process running the current script.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: API Root
    default_value: https://cloud.us.humio.com
    type: string
    description: API root of the Humio instance.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: API Token
    default_value: ''
    type: password
    description: API token of the Humio instance.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Verify SSL
    default_value: true
    type: boolean
    description: If enabled, verify the SSL certificate for the connection to the
        Humio is valid.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Repository Name
    default_value: ''
    type: string
    description: Name of the repository from the results will be fetched.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Query
    default_value: ''
    type: string
    description: 'Query for the events. Note: select() and head() functions should
        not be added here.'
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Alert Field Name
    default_value: ''
    type: string
    description: Name of the key that should be used for Alert Name. If nothing or
        invalid value is provided, the connector will use "Humio Alert" as fallback.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Severity Field Name
    default_value: ''
    type: string
    description: 'A comma-separated list of keys that should be used for mapping of
        the severity. Note: if the key contains "string" values, they should be mapped
        with "Severity Mapping JSON". If invalid key is provided, "Default" from the
        "Severity Mapping JSON" parameter will be used.'
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Severity Mapping JSON
    default_value: '{"fieldName":{"value_1":100,"value_2":75,"value_3":-1},"Default":50}'
    type: string
    description: 'JSON object that contains all of the keys with mapped string values.
        Note: "Default" key is mandatory.'
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Max Hours Backwards
    default_value: 1
    type: integer
    description: Number of hours before the first connector iteration to retrieve
        events from. This parameter applies to the initial connector iteration after
        you enable the connector for the first time, or used as a fallback value in
        cases where connector's last run timestamp expires.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Max Events To Fetch
    default_value: 20
    type: integer
    description: How many events to process per one connector iteration.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Use whitelist as a blacklist
    default_value: false
    type: boolean
    description: If enabled, whitelist will be used as a blacklist.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Proxy Server Address
    default_value: ''
    type: string
    description: The address of the proxy server to use.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Proxy Username
    default_value: ''
    type: string
    description: The proxy username to authenticate with.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Proxy Password
    default_value: ''
    type: password
    description: The proxy password to authenticate with.
    is_mandatory: false
    is_advanced: false
    mode: script
description: Pull information about events in the repository from Humio.
integration: Humio
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/humio#events-connector
rules: []
is_connector_rules_supported: false
creator: admin
