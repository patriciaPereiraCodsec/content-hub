identifier: SymantecBlueCoatProxySG
name: Symantec Blue Coat ProxySG
parameters:
-   name: SSH Root
    default_value: '{ip address}:22'
    type: string
    description: SSH root of the Blue Coat ProxySG instance.
    is_mandatory: true
    integration_identifier: SymantecBlueCoatProxySG
-   name: Username
    default_value: ''
    type: string
    description: Username of the Blue Coat ProxySG SSH account.
    is_mandatory: true
    integration_identifier: SymantecBlueCoatProxySG
-   name: Password
    default_value: ''
    type: password
    description: Password of the Blue Coat ProxySG account.
    is_mandatory: true
    integration_identifier: SymantecBlueCoatProxySG
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/symantec-blue-coat-proxysg
categories:
- Network Security
- Threat Intelligence
svg_logo_path: resources/logo.svg
image_path: resources/image.png
