Translate Text:
  ai_description: >-
    ### General Description

    Translates a provided string of text into a target language using the Google Translate
    API. This action is primarily used as a utility within playbooks to localize or
    interpret text data retrieved from alerts, logs, or other integrations.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Source Language | String | No | The ISO 639-1 code of the language of the input
    text. If left empty, the Google Translate API will automatically detect the source
    language. |

    | Target Language | String | Yes | The ISO 639-1 code of the language to translate
    the text into (e.g., 'en' for English, 'es' for Spanish). |

    | Text | String | Yes | The specific text string that needs to be translated.
    |


    ### Flow Description

    1. **Initialization**: The action initializes the Google Translate manager using
    the provided API Root and API Key.

    2. **Parameter Extraction**: It retrieves the source language (optional), target
    language, and the text to be translated from the action parameters.

    3. **Translation Request**: The action sends a POST request to the Google Translate
    API endpoint with the text and language configuration.

    4. **Result Handling**: Upon a successful response, the action captures the translated
    text and any detected language information, attaching it as a JSON result to the
    action execution context.
