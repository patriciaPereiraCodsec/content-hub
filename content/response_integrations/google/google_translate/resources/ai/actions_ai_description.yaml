Ping:
  ai_description: >-
    ### General Description

    Tests the connectivity between Google SecOps and the Google Translate API. This
    action ensures that the provided API Key and API Root are valid and that the network
    connection is functional by attempting to retrieve a list of supported languages
    from the service.


    ### Parameters Description

    This action does not have any action-specific parameters. It utilizes the following
    integration configuration parameters:


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | API Root | String | Yes | The base URL for the Google Translate API instance.
    |

    | API Key | String | Yes | The API key used for authentication with Google Translate.
    |

    | Verify SSL | Boolean | Yes | If enabled, the action will verify the SSL certificate
    of the Google Translate server. |


    ### Additional Notes

    This is a standard 'Ping' action used to verify that the integration is correctly
    configured and can communicate with the external API. As per standard SOAR practices,
    Ping actions are not categorized as enrichment actions.


    ### Flow Description

    1. **Parameter Extraction**: The action retrieves the API Root, API Key, and SSL
    verification settings from the integration's configuration.

    2. **Manager Initialization**: Initializes the `GoogleTranslateManager` with the
    provided connection details.

    3. **Connectivity Test**: Executes the `test_connectivity` method, which sends
    a GET request to the Google Translate languages endpoint (`/language/translate/v2/languages`).

    4. **Response Validation**: Validates the API response. If the request is successful,
    it confirms the connection. If it fails (e.g., due to invalid credentials or network
    issues), it catches the exception and reports the error.

    5. **Final Status**: Returns a success message if the connection is established
    or a failure message with error details if the test fails.
