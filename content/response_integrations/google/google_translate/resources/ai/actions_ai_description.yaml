List Languages:
  ai_description: >-
    ### General Description

    The **List Languages** action retrieves a comprehensive list of all languages
    supported by the Google Translate service. This utility action is designed for
    discovery purposes, allowing users to identify valid language codes and names
    for use in subsequent translation tasks. It supports optional server-side filtering
    and result limiting to manage large datasets.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Filter Key** | String (Dropdown) | No | Specifies the attribute to filter
    the results by (e.g., 'Name'). |

    | **Filter Logic** | String (Dropdown) | No | Defines the comparison method ('Equal'
    or 'Contains') used for filtering. |

    | **Filter Value** | String | No | The specific text string to match against the
    selected Filter Key. |

    | **Max Records To Return** | Integer | No | Limits the number of language records
    returned in the output. Defaults to 50 if not specified. |


    ### Additional Notes

    - **Dependency**: If a 'Filter Logic' is selected, a 'Filter Key' must also be
    specified; otherwise, the action will fail.

    - **Filter Bypass**: If 'Filter Value' is left empty, the filtering logic is bypassed,
    and all results (up to the limit) are returned.

    - **Entity Support**: This action does not require or process any Google SecOps
    entities.


    ### Flow Description

    1. **Initialization**: The action extracts API credentials (API Root, API Key)
    and user-defined parameters from the environment.

    2. **Validation**: It checks that the 'Max Records To Return' is a positive integer
    and ensures that 'Filter Key' is provided if 'Filter Logic' is used.

    3. **Data Retrieval**: The action performs a GET request to the Google Translate
    API's languages endpoint to fetch all supported languages.

    4. **Processing**: The results are filtered in-memory based on the provided filter
    criteria and truncated according to the specified limit.

    5. **Output**: The processed list is returned as a JSON object and formatted into
    a Data Table named 'Available Languages' for the case wall.
