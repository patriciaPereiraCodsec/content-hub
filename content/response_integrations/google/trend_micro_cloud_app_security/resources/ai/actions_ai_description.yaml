Mitigate Emails:
  ai_description: >-
    ### General Description

    Deletes or quarantines emails using Trend Micro Cloud App Security. This action
    allows security analysts to remediate malicious or unwanted emails across Gmail
    and Exchange environments by providing specific message identifiers. It performs
    a two-step process: first retrieving necessary metadata for the emails and then
    executing the requested mitigation action.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Mitigation Action | String | Yes | Specifies the mitigation action to apply.
    Options are 'Delete' or 'Quarantine'. |

    | Service | String | Yes | Specifies the email service provider. Options are 'Gmail'
    or 'Exchange'. |

    | Message IDs | String | Yes | A comma-separated list of Trend Micro message identifiers
    that need to be mitigated. |


    ### Additional Notes

    * **Gmail Restriction:** The 'Quarantine' action is not supported for Gmail; only
    'Delete' can be used. If 'Quarantine' is selected with the 'Gmail' service, the
    action will fail.

    * **Execution Status:** This action initiates the mitigation process but does
    not wait for or verify the final execution status of the mitigation on the Trend
    Micro side.


    ### Flow Description

    1. **Validation:** Checks if the requested mitigation (Quarantine) is compatible
    with the selected service (Gmail).

    2. **Metadata Retrieval:** For each provided Message ID, the action queries Trend
    Micro to retrieve essential metadata, including the mailbox, unique ID, and delivery
    time.

    3. **Mitigation Execution:** Uses the retrieved metadata to send a mitigation
    request (Delete or Quarantine) to the Trend Micro API.

    4. **Reporting:** Aggregates the results and provides a summary of which emails
    were successfully processed and which failed.
