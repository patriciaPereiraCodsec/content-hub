Enrich Entities:
  ai_description: "### General Description\nThe **Enrich Entities** action retrieves\
    \ threat intelligence from Trend Micro Cloud App Security to determine if specific\
    \ entities\u2014URLs, SHA-1 File Hashes, or Email addresses\u2014are present in\
    \ the organization's blocklist. This action enriches entities with block status\
    \ metadata and flags suspicious entities, aiding analysts in identifying known\
    \ threats within a case.\n\n### Parameters Description\n| Parameter | Type | Mandatory\
    \ | Description |\n| :--- | :--- | :--- | :--- |\n| **API Root** | String | Yes\
    \ | The base URL for the Trend Micro Cloud App Security API instance. |\n| **API\
    \ Key** | String | Yes | The API key used for authentication with the Trend Micro\
    \ service. |\n| **Verify SSL** | Boolean | Yes | If enabled, the action verifies\
    \ the SSL certificate of the API server. Default is `True`. |\n\n### Flow Description\n\
    1. **Fetch Blocklist:** The action initiates a GET request to Trend Micro Cloud\
    \ App Security to retrieve the current list of blocked URLs, senders, and file\
    \ hashes.\n2. **Entity Iteration:** The action processes all `DestinationURL`,\
    \ `FILEHASH`, and `USER` entities in the current context.\n3. **Validation & Matching:**\n\
    \    * **URLs:** Extracts the hostname from the URL and checks for a match in\
    \ the blocked URL list.\n    * **Emails:** Validates the entity as an email address\
    \ and checks it against the blocked senders list.\n    * **Hashes:** Validates\
    \ that the hash is a SHA-1 string and checks it against the blocked hashes list.\n\
    4. **Internal Enrichment:**\n    * Updates the `is_suspicious` attribute to `True`\
    \ for any entity found in the blocklist.\n    * Adds an enrichment field `TMCAS_blocked`\
    \ (set to `True` or `False`) to the entity's additional properties.\n5. **Update\
    \ & Output:** Updates the entities within Google SecOps and returns a JSON object\
    \ containing the details of all blocked entities found.\n\n### Additional Notes\n\
    * **Hash Compatibility:** This action only supports **SHA-1** hashes. Other hash\
    \ types (like MD5 or SHA-256) will be ignored.\n* **URL Comparison:** The comparison\
    \ logic is based on the domain/hostname of the URL, meaning the action will identify\
    \ a match even if the specific path differs from the blocklist entry.\n* **User\
    \ Entity Requirement:** User entities must match a standard email format to be\
    \ processed for enrichment."
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates the 'is_suspicious' attribute and adds 'TMCAS_blocked' to the entity's
      additional properties based on whether the entity is found in the Trend Micro
      Cloud App Security blocklist.
