Ping:
  ai_description: >-
    ### General Description

    The **Ping** action is a diagnostic utility designed to verify the connectivity
    between Google SecOps and the Trend Micro Cloud App Security instance. It ensures
    that the provided integration parameters (API Root and API Key) are valid and
    that the network path is open.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **API Root** | String | Yes | The base URL of the Trend Micro Cloud App Security
    API instance. |

    | **API Key** | String | Yes | The API key used for authentication with the Trend
    Micro service. |

    | **Verify SSL** | Boolean | Yes | If enabled, the action will verify the SSL
    certificate of the Trend Micro server. Defaults to `True`. |


    ### Additional Notes

    - This action does not process any entities or modify any data.

    - It is primarily used during the initial setup of the integration or for troubleshooting
    connection issues.


    ### Flow Description

    1. **Parameter Extraction**: The action retrieves the API Root, API Key, and SSL
    verification settings from the integration configuration.

    2. **Manager Initialization**: It initializes the `TrendMicroCloudAppSecurityManager`
    with the provided credentials.

    3. **Connectivity Test**: The action executes a `GET` request to the `/v1/sweeping/mails`
    endpoint with a limit of 1 to test the API response.

    4. **Result Handling**: If the request is successful (HTTP 200), it returns a
    success message. If an error occurs (e.g., 401 Unauthorized, 404 Not Found, or
    network timeout), it catches the exception and reports a failure.
