Entity Email Search:
  ai_description: >-
    ### General Description

    Searches for emails within Trend Micro Cloud App Security that match specific
    entity criteria. This action is used to identify related email communications
    by querying the platform for URLs, file hashes, email addresses, subjects, filenames,
    and source IP addresses found in the case context. It retrieves detailed metadata
    for each matching email, including sender, recipient, subject, and delivery time.


    ### Parameters Description

    | Parameter | Type | Mandatory | Default | Description |

    | :--- | :--- | :--- | :--- | :--- |

    | Max Days Backwards | Integer | No | 30 | Specifies the lookback period for the
    search. The value must be between 1 and 90 days. If a value outside this range
    is provided, the action will fail. |

    | Max Emails To Return | Integer | No | 100 | The maximum number of unique email
    records to retrieve across all processed entities. |


    ### Additional Notes

    - The action performs deduplication based on the `mail_unique_id` to ensure the
    same email is not reported multiple times if it matches multiple entities.

    - For `USER` entities, the action only performs a search if the entity identifier
    matches a standard email address pattern.

    - For `FILEHASH` entities, only SHA-1 (40 characters) and SHA-256 (64 characters)
    formats are supported.


    ### Flow Description

    1. **Initialization**: Extracts API credentials and configuration parameters (API
    Root, API Key, SSL verification).

    2. **Parameter Validation**: Validates the `Max Days Backwards` parameter to ensure
    it falls within the 1-90 day range allowed by the API.

    3. **Entity Processing**: Iterates through all target entities in the current
    context.

    4. **Search Execution**: For each supported entity type, it calls the Trend Micro
    API:
        - **URL**: Searches for emails containing the specific URL.
        - **User**: Searches the mailbox if the identifier is an email address.
        - **File Hash**: Searches for emails with attachments matching the SHA-1 or
    SHA-256 hash.
        - **Email Subject**: Searches for emails with a matching subject line.
        - **File Name**: Searches for emails containing attachments with the specified
    filename.
        - **Address**: Searches for emails originating from the specified source IP
    address.
    5. **Deduplication and Limiting**: Aggregates results, filters out duplicate email
    IDs, and stops once the `Max Emails To Return` limit is reached.

    6. **Output**: Returns the collected email data as a JSON result and provides
    a summary message.
