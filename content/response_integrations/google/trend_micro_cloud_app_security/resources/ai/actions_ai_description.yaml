Mitigate Accounts:
  ai_description: >-
    ### General Description

    The **Mitigate Accounts** action allows security analysts to perform administrative
    mitigation actions on user accounts within Trend Micro Cloud App Security. This
    action is specifically designed for Exchange accounts and operates asynchronously
    to handle potentially long-running tasks.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Mitigation Action** | String (Dropdown) | Yes | The specific mitigation task
    to perform. Options include: `Disable Account`, `Enable MFA`, `Reset Password`,
    and `Revoke Sign In Sessions`. |

    | **Email Addresses** | String | Yes | A comma-separated list of email addresses
    belonging to the accounts that require mitigation. |


    ### Additional Notes

    - This action only supports **Exchange** accounts.

    - The action is asynchronous; it initiates the process and then polls the Trend
    Micro API for completion status using a batch ID.


    ### Flow Description

    1. **Validation**: The script parses the comma-separated list of email addresses
    and validates them against a standard email regex.

    2. **Initiation**: It sends a POST request to the Trend Micro Cloud App Security
    API to start the requested mitigation action for all valid emails.

    3. **Asynchronous Tracking**: The action stores a `batch_id` and enters an "In
    Progress" state.

    4. **Status Polling**: In subsequent runs, the action queries the API for the
    status of the specific `batch_id` to check if the mitigation is complete.

    5. **Completion**: Once all accounts in the batch have reached a terminal state
    (Success, Failed, or Skipped), the action reports the final results and completes.
