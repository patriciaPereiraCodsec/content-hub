Add Entities To Blocklist:
  ai_description: >-
    ### General Description

    This action adds specific entities to the blocklist in Trend Micro Cloud App Security
    to prevent malicious activity. It supports URLs, SHA-1 File Hashes, and Email
    addresses (represented as User entities). The action first retrieves the existing
    blocklist to prevent duplicate entries and validates the format of each entity
    before submission.


    ### Parameters

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | API Root | String | Yes | The base URL for the Trend Micro Cloud App Security
    API instance. |

    | API Key | String | Yes | The API key used for authentication with the Trend
    Micro service. |

    | Verify SSL | Boolean | Yes | If enabled (default), the action verifies the SSL
    certificate of the Trend Micro server. |


    ### Additional Notes

    - **Hash Support:** Only SHA-1 hashes (40 characters) are supported by this action.
    Other hash types (MD5, SHA-256) will be ignored.

    - **Email Validation:** User entities are only processed if their identifier matches
    a standard email address regex pattern.

    - **URL Validation:** URL entities are validated for correct formatting before
    being sent to the API.


    ### Flow Description

    1. **Initialization:** The action initializes the Trend Micro manager using the
    provided API credentials and configuration.

    2. **Pre-check:** It fetches the current list of blocked URLs, senders, and hashes
    from Trend Micro to identify entities that are already blocked.

    3. **Entity Filtering:** It iterates through the target entities in the Google
    SecOps case, filtering for URLs, Users (Emails), and File Hashes.

    4. **Validation:** For each supported entity, it verifies the format (e.g., checking
    if a hash is SHA-1 or if a user identifier is a valid email).

    5. **Deduplication:** It checks if the entity identifier already exists in the
    retrieved blocklist.

    6. **Execution:** For valid entities not already on the blocklist, it sends a
    POST request to Trend Micro to add them to the respective blocklist category.

    7. **Reporting:** The action tracks successful additions, failures, and entities
    that were already blocked, providing a summary message at the end of execution.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Adds URLs, SHA-1 file hashes, or email addresses to the active blocklist configuration
      in Trend Micro Cloud App Security via POST requests.
    fetches_data: true
    internal_data_mutation_explanation: null
  categories:
