name: Enrich Entities
description: 'Enrich entities with information from Trend Micro Cloud App Security.
    Supported entities: URL, Hash and Email (User entity that matches email address
    pattern). Note: action will use the domain part out of the URL during the enrichment.'
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/trend-micro-cloud-app-security#enrich_entities
integration_identifier: TrendMicroCloudAppSecurity
parameters: []
dynamic_results_metadata:
-   result_example_path: resources/enrich_entities_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
simulation_data_json: '{"Entities": ["DestinationURL","FILEHASH", "USER"]}'
