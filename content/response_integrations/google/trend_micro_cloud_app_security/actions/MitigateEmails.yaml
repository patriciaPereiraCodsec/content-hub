name: Mitigate Emails
description: 'Delete or quarantine emails using Trend Micro Cloud App Security. Note:
    for Gmail you can only delete emails. Note: Currently action only initiates a
    mitigation, but doesn''t check the status of mitigation execution.'
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/trend-micro-cloud-app-security#mitigate_emails
integration_identifier: TrendMicroCloudAppSecurity
parameters:
-   name: Mitigation Action
    default_value: Delete
    type: ddl
    optional_values:
    - Delete
    - Quarantine
    description: Specify what mitigation action should be applied.
    is_mandatory: true
-   name: Service
    default_value: Gmail
    type: ddl
    optional_values:
    - Gmail
    - Exchange
    description: Specify the service the is used for emails.
    is_mandatory: true
-   name: Message IDs
    default_value: ''
    type: string
    description: Specify a comma-separated list of message ids that need to be mitigated.
    is_mandatory: true
dynamic_results_metadata: []
creator: admin
