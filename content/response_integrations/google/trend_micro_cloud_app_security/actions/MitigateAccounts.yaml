name: Mitigate Accounts
description: 'Perform mitigation actions on the user account via Trend Micro Cloud
    App Security. Note: only Exchange accounts are supported.'
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/trend-micro-cloud-app-security#mitigate_accounts
integration_identifier: TrendMicroCloudAppSecurity
parameters:
-   name: Mitigation Action
    default_value: Disable Account
    type: ddl
    optional_values:
    - Disable Account
    - Enable MFA
    - Reset Password
    - Revoke Sign In Sessions
    description: Specify what mitigation action should be applied.
    is_mandatory: true
-   name: Email Addresses
    default_value: ''
    type: string
    description: Specify a comma-separated list of email addresses that need to be
        mitigated.
    is_mandatory: true
dynamic_results_metadata: []
creator: admin
is_async: true
