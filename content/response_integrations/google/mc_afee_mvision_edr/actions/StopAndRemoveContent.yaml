name: Stop And Remove Content
description: Stop interpreter process by PID(Ex. Python, Bash, etc.) and remove the
    associated script by full path on the McAfee Mvision Endpoint.
integration_identifier: McAfeeMvisionEDR
parameters:
-   name: PID
    default_value: ''
    type: string
    description: Specify the PID of the interpreter.
    is_mandatory: true
-   name: Full File Path
    default_value: ''
    type: string
    description: Specify the full path to the file that you want to remove.
    is_mandatory: true
dynamic_results_metadata: []
creator: admin
is_async: true
simulation_data_json: '{"Entities": ["HOSTNAME", "ADDRESS"]}'
