Dismiss Threat:
  ai_description: >-
    Dismisses a specific threat in McAfee Mvision EDR using its Threat ID. This action
    is asynchronous; it initiates a dismissal task and then polls for its completion
    status.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Threat ID | String | Yes | The unique identifier of the threat to be dismissed.
    |


    ### Flow Description

    1. **Authentication**: Initializes the McAfee Mvision EDR manager using provided
    credentials (API Root, Client ID/Secret or Username/Password).

    2. **Task Creation (First Run)**: Searches for the case associated with the provided
    Threat ID and initiates a 'DismissThreat' action task in the external system.

    3. **Status Polling (Subsequent Runs)**: Retrieves the status of the previously
    created task using the task ID stored in the additional data.

    4. **Completion**: Monitors the task until it reaches a 'COMPLETED' or 'ERROR'
    state, reporting the final outcome to Google SecOps.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Initiates a 'DismissThreat' action in McAfee Mvision EDR, which changes the
      status of the threat in the external platform.
    fetches_data: true
    internal_data_mutation_explanation: null
  categories:
    enrichment: false
