Unquarantine Endpoint:
  ai_description: >-
    ### General Description

    Reverses the quarantine (isolation) status of endpoints in McAfee Mvision EDR.
    This action identifies the correct host in the EDR system using IP Address or
    Hostname entities and issues a command to restore normal network connectivity.


    ### Parameters Description

    There are no action-specific parameters for this action. However, it relies on
    the following integration configuration parameters:


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | API Root | String | Yes | The URL of the McAfee Mvision EDR server. |

    | Username | String | No* | Username for authentication. Required if Client ID/Secret
    are not used. |

    | Password | String | No* | Password for authentication. Required if Client ID/Secret
    are not used. |

    | Client ID | String | No* | Client ID for authentication. Preferred over Username/Password.
    |

    | Client Secret | String | No* | Client Secret for authentication. Preferred over
    Username/Password. |

    | Verify SSL | Boolean | No | Whether to verify SSL certificates. Defaults to
    False. |


    ### Additional Notes

    *Authentication:* The integration requires either a Client ID and Client Secret
    pair OR a Username and Password pair to function. If both are provided, the Client
    ID and Client Secret will take precedence.


    ### Flow Description

    1. **Initialization:** Establishes a connection to the McAfee Mvision EDR manager
    using the provided configuration credentials.

    2. **Host Retrieval:** Fetches a complete list of hosts currently managed by the
    EDR server to facilitate entity matching.

    3. **Entity Filtering:** Identifies `ADDRESS` (IP) and `HOSTNAME` entities from
    the current Google SecOps context.

    4. **Matching Logic:** Iterates through the identified entities and attempts to
    match them against the EDR host list by comparing hostnames (case-insensitive)
    or IP addresses.

    5. **Task Creation:** For every matching host found, the action sends a POST request
    to the EDR to initiate an `UnquarantineHost` remediation task using the host's
    unique `ma_guid`.

    6. **Result Reporting:** Consolidates the results and reports which entities were
    successfully unquarantined, which had no matches in the EDR, and if multiple matches
    were found for a single entity.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Initiates an 'UnquarantineHost' remediation task on the McAfee Mvision EDR server,
      which changes the operational state of the physical or virtual endpoint by removing
      network isolation restrictions.
    fetches_data: true
    internal_data_mutation_explanation: null
