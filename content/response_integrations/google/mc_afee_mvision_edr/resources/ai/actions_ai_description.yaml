Remove File:
  ai_description: >-
    Removes a specified file from target endpoints using McAfee Mvision EDR. This
    action identifies the correct endpoint by matching Hostname or IP Address entities
    against the EDR's managed host list, then triggers a remote file deletion task.
    It supports a 'Safe Removal' mode to prevent the accidental deletion of critical
    system files. As an asynchronous action, it initiates the removal and then polls
    the EDR for the task's completion status across all targeted entities.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Full File Path | String | Yes | The absolute path of the file to be removed
    from the endpoint. |

    | Safe Removal | Boolean | Yes | If enabled (True), the action uses the 'removeFileSafe'
    method which avoids deleting files identified as critical or trusted by the EDR.
    Default is False. |


    ### Flow Description

    1. **Host Identification**: The action retrieves the list of all managed hosts
    from McAfee Mvision EDR and matches the provided Hostname or Address entities
    to their internal EDR identifiers (maGuid).

    2. **Task Initiation**: For each matched host, the action sends a request to the
    EDR to start a file removal task using the provided file path and safety setting.

    3. **Asynchronous Polling**: The action transitions to an 'In Progress' state,
    periodically querying the EDR API to check the status of the removal tasks for
    each entity.

    4. **Finalization**: Once all tasks reach a terminal state (Completed or Error),
    the action aggregates the results and reports which files were successfully removed
    and which failed, including error reasons if provided by the EDR.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Deletes files from the file system of remote endpoints managed by McAfee Mvision
      EDR.
    fetches_data: true
    internal_data_mutation_explanation: null
