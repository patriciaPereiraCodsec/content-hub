Quarantine Endpoint:
  ai_description: >-
    ### General Description

    The **Quarantine Endpoint** action isolates a compromised or suspicious endpoint
    from the network by triggering a quarantine task in **McAfee Mvision EDR**. It
    identifies the correct endpoint in the EDR system by matching Siemplify IP Address
    or Hostname entities against the EDR's managed host list.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **API Root** | String | Yes | The base URL for the McAfee Mvision EDR API instance.
    |

    | **Username** | String | No* | Username for authentication. Required if Client
    ID/Secret is not provided. |

    | **Password** | String | No* | Password for authentication. Required if Client
    ID/Secret is not provided. |

    | **Client ID** | String | No* | OAuth Client ID for authentication. Required
    if Username/Password is not provided. |

    | **Client Secret** | String | No* | OAuth Client Secret for authentication. Required
    if Username/Password is not provided. |

    | **Verify SSL** | Boolean | Yes | If enabled, verifies the SSL certificate of
    the API server. Defaults to `False`. |


    ### Additional Notes

    * **Authentication**: The action requires either a **Username/Password** pair
    or a **Client ID/Client Secret** pair to function. If both are provided, the integration
    defaults to using the Client ID and Client Secret.

    * **Matching Logic**: The action performs a lookup by fetching all hosts from
    the EDR and comparing the entity identifier against hostnames and all associated
    network interface IP addresses.


    ### Flow Description

    1. **Initialization**: Extracts configuration parameters and initializes the McAfee
    Mvision EDR manager.

    2. **Host Discovery**: Fetches the current list of all managed hosts from the
    McAfee Mvision EDR server.

    3. **Entity Processing**: Filters the target entities to identify those of type
    `ADDRESS` (IP) or `HOSTNAME`.

    4. **Endpoint Matching**: For each entity, the action searches the EDR host list
    for a matching hostname or IP address.

    5. **Quarantine Execution**: If a match is found, the action sends a POST request
    to the EDR remediation API to create a `QuarantineHost` task for that specific
    host GUID.

    6. **Result Summary**: The action tracks successful quarantines, failed matches,
    and duplicate matches, providing a detailed summary in the action output.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Initiates a 'QuarantineHost' remediation task in McAfee Mvision EDR, which changes
      the network isolation state of the target endpoint.
    fetches_data: true
    internal_data_mutation_explanation: null
