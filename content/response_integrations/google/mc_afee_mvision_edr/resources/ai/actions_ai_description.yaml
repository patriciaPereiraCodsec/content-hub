Kill Process:
  ai_description: >-
    Stops a running process and removes its associated file on managed endpoints using
    McAfee Mvision EDR. This action identifies target endpoints by matching IP addresses
    or Hostnames against the Mvision EDR inventory, then issues a remediation command
    to terminate the specified process and delete the file. If the process is not
    currently running, the action attempts to remove the file from the disk. The action
    operates asynchronously, polling the EDR service for the status of each remediation
    task until completion.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Process Identifier Type | String | Yes | Specifies the type of identifier used
    to target the process. Supported types in logic include PID, SHA256, Name, and
    Full Path (though the UI configuration may default to PID). |

    | Process Identifier | String | Yes | The actual value of the identifier (e.g.,
    the numeric PID or the file name) for the process to be terminated. |


    ### Additional Notes

    - The action supports multiple process identifier types (PID, SHA256, Name, Full
    Path) in the underlying Python logic, even if the integration UI configuration
    primarily lists PID.

    - This is an asynchronous action that will remain in an 'In Progress' state while
    it polls the McAfee Mvision EDR API for task completion status.


    ### Flow Description

    1. **Host Identification**: Retrieves a list of all managed hosts from McAfee
    Mvision EDR and matches them against the provided Hostname or IP Address entities.

    2. **Task Initiation**: For each matched host, it sends a request to the EDR API
    to initiate a 'Kill Process' or 'Remove File' action based on the provided identifier.

    3. **Status Polling**: Enters an asynchronous loop where it periodically checks
    the status of the remediation task on the EDR platform.

    4. **Completion**: Once the EDR reports the task as 'COMPLETED' or 'ERROR', the
    action summarizes the results for all processed entities and finishes the execution.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Stops a running process and removes its file from the managed endpoint via the
      McAfee Mvision EDR remediation API.
    fetches_data: true
    internal_data_mutation_explanation: null
  categories:
    enrichment: false
  entity_usage:
