Ping:
  ai_description: "### General Description\nThe **Ping** action is a diagnostic utility\
    \ used to verify the connection between Google SecOps and the McAfee Mvision EDR\
    \ server. Its primary purpose is to validate that the integration's configuration\
    \ parameters\u2014such as the API Root, authentication credentials, and SSL settings\u2014\
    are correct and that the service is reachable.\n\n### Parameters\nThis action\
    \ does not require any input parameters. It uses the global integration configuration\
    \ settings.\n\n### Additional Notes\n- The action supports two authentication\
    \ methods: Client ID/Secret (OAuth) or Username/Password. If both are provided,\
    \ the Client ID/Secret method takes precedence.\n- The connectivity test is performed\
    \ by attempting to fetch a single host record from the McAfee Mvision EDR API.\n\
    \n### Flow Description\n1. **Parameter Extraction**: The script retrieves the\
    \ API Root, Username, Password, Client ID, Client Secret, and SSL verification\
    \ settings from the integration configuration.\n2. **Manager Initialization**:\
    \ It initializes the `McAfeeMvisionEDRManager`, which automatically handles authentication\
    \ and token retrieval based on the provided credentials.\n3. **Connectivity Test**:\
    \ The manager executes the `test_connectivity` method, which sends a GET request\
    \ to the hosts endpoint (`/ft/api/v2/ft/hosts`) with a limit of 1.\n4. **Status\
    \ Reporting**: If the API call is successful, the action completes with a success\
    \ message. If an exception occurs (e.g., authentication failure or connection\
    \ timeout), the action reports a failure and provides the error details."
