Enrich Endpoint:
  ai_description: >-
    ### General Description

    The **Enrich Endpoint** action retrieves comprehensive system information for
    endpoint entities (Hostnames or IP Addresses) from McAfee Mvision EDR. It serves
    as an enrichment tool to provide security analysts with technical context such
    as the Operating System version, last boot time, and unique identifiers (maGuid)
    directly within the Google SecOps environment.


    ### Parameters Description

    There are no action-specific parameters for this action. It relies entirely on
    the integration's configuration (API Root, Credentials, etc.) and the entities
    present in the current context.


    ### Additional Notes

    *   The action performs a broad fetch of all hosts from the McAfee Mvision EDR
    environment and then matches them locally against the entities in the SecOps case.

    *   Matching is performed by comparing the entity identifier against the EDR host's
    hostname or any of its associated network interface IP addresses.


    ### Flow Description

    1.  **Authentication:** Connects to the McAfee Mvision EDR API using either Client
    ID/Secret or Username/Password credentials.

    2.  **Data Retrieval:** Fetches the complete list of managed hosts from the EDR
    platform via a paginated GET request.

    3.  **Entity Matching:** Iterates through all `ADDRESS` and `HOSTNAME` entities
    in the SecOps case, attempting to find a match in the retrieved host list based
    on hostname or IP.

    4.  **Internal Enrichment:** For every match found, the action flattens the host
    data and updates the entity's `additional_properties` with a prefix of `MMV_EDR`.

    5.  **Reporting:** Adds a detailed data table to each matched entity and provides
    a JSON result containing the raw host data for further downstream processing.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      The action updates entity 'additional_properties' with enriched host data, sets
      the 'is_enriched' flag to true, and attaches data tables to the entities.
  categories:
