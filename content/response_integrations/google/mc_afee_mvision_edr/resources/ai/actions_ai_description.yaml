Stop And Remove Content:
  ai_description: >-
    ### General Description

    The **Stop And Remove Content** action is a remediation capability for McAfee
    Mvision EDR. It allows security analysts to remotely terminate a specific process
    (identified by its PID) and simultaneously delete a file (identified by its full
    path) on target endpoints. This is particularly useful for stopping malicious
    scripts (like Python or Bash) and removing the source file in a single operation.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **PID** | Integer | Yes | The Process ID of the interpreter or process to be
    stopped. |

    | **Full File Path** | String | Yes | The absolute path to the file that should
    be removed from the endpoint. |


    ### Flow Description

    1. **Host Identification**: The action retrieves a list of all hosts from McAfee
    Mvision EDR and matches the input `HOSTNAME` or `ADDRESS` entities to their internal
    `ma_guid` (McAfee Agent GUID).

    2. **Task Initiation**: For each matched host, it sends a request to the EDR to
    execute the `stopAndRemoveContent` command using the provided PID and file path.

    3. **Asynchronous Monitoring**: The action enters an asynchronous state, periodically
    polling the EDR API to check the status of the remediation task.

    4. **Result Reporting**: Once the tasks are finished, it reports whether the process
    was successfully stopped and the file removed for each entity.


    ### Additional Notes

    - This action is asynchronous and will continue to run until the EDR reports a
    final status (Success/Failure) for the tasks.

    - If multiple matches are found for an entity in the EDR, it defaults to the first
    match.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
