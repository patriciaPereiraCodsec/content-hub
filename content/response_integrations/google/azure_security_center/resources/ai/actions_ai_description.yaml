List Regulatory Standards:
  ai_description: >-
    ### General Description

    The **List Regulatory Standards** action retrieves a list of available regulatory
    compliance standards from Microsoft Azure Security Center for a specified subscription.
    This action allows security teams to audit the compliance posture of their Azure
    environment against various frameworks such as Azure CIS, ISO 27001, or SOC TSP.
    Results are presented as a data table and a JSON object for further processing.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Subscription ID** | String | No | The ID of the Azure subscription to query.
    If not provided, the action uses the Subscription ID defined in the integration
    configuration. |

    | **State Filter** | String | No | A comma-separated list of compliance states
    to filter the results (e.g., `Failed, Skipped`). Supported values include: `Passed`,
    `Failed`, `Unsupported`, `Skipped`. |

    | **Max Standards To Return** | Integer | No | The maximum number of standards
    to return in the results. Defaults to 50. |


    ### Flow Description

    1. **Parameter Extraction**: The action retrieves the Subscription ID, State Filter,
    and result limit from the input parameters, prioritizing action-level configuration
    over integration-level settings.

    2. **Authentication**: It initializes the Azure Security Center Manager, which
    authenticates with the Azure Management API using OAuth2.

    3. **API Request**: The action performs a GET request to the Azure `regulatoryComplianceStandards`
    endpoint for the target subscription.

    4. **Filtering and Parsing**: The retrieved standards are parsed into data models
    and filtered based on the user-provided compliance states (case-insensitive).

    5. **Output Generation**: The filtered standards are added to the case as a data
    table named "Regulatory Standards" and as a raw JSON result.


    ### Additional Notes

    * A **Subscription ID** must be configured either at the integration level or
    the action level for the action to execute successfully.

    * If the `Max Standards To Return` parameter is set to a negative value, the action
    defaults to returning 50 standards.
