List Regulatory Standard Controls:
  ai_description: >-
    ### General Description

    The **List Regulatory Standard Controls** action retrieves a list of compliance
    controls associated with specific regulatory standards (e.g., PCI-DSS, Azure-CIS)
    within Microsoft Azure Security Center. This action is designed to help security
    teams audit their compliance posture by fetching detailed information about controls,
    including their current state (Passed, Failed, etc.) and assessment counts.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Subscription ID** | String | No | The Azure subscription ID to query. If provided,
    it overrides the ID configured at the integration level. |

    | **Standard Names** | String | Yes | A comma-separated list of regulatory standards
    to retrieve details for (e.g., `Azure-CIS-1.1.0`, `PCI-DSS-3.2.1`). |

    | **State Filter** | String | No | A comma-separated list of control states to
    filter by. Valid values: `Passed`, `Failed`, `Unsupported`, `Skipped`. Defaults
    to `Failed`. |

    | **Max Standards To Return** | Integer | No | The maximum number of controls
    to retrieve for each specified standard. Defaults to `50`. |


    ### Additional Notes

    - Either the integration-level or action-level **Subscription ID** must be configured
    for the action to run.

    - The action is read-only and does not modify any configurations in the Azure
    environment.


    ### Flow Description

    1. **Initialization**: The action extracts configuration and action parameters,
    prioritizing the action-level Subscription ID.

    2. **Validation**: It validates the provided `State Filter` values against supported
    Azure compliance states and ensures the `Max Standards To Return` is a non-negative
    integer.

    3. **Authentication**: Establishes a connection to the Azure Security Center API
    using the provided credentials (OAuth or Basic).

    4. **Data Retrieval**: Iterates through each provided standard name and fetches
    the corresponding regulatory compliance controls from the Azure API.

    5. **Filtering**: Applies the specified state filters to the retrieved controls.

    6. **Output**: Generates a data table named "Regulatory Controls" and a detailed
    JSON result containing control metadata such as ID, name, description, state,
    and assessment statistics.
