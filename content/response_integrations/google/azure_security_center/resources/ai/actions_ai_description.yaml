Get OAuth Refresh Token:
  ai_description: "Generates an OAuth refresh token for the Azure Security Center\
    \ integration. This action is a prerequisite for configuring the integration's\
    \ authentication, as it exchanges a temporary authorization code for a long-lived\
    \ refresh token. \n\n### Flow Description:\n1. **Parameter Extraction:** Retrieves\
    \ the Tenant ID, Client ID, and Client Secret from the integration configuration,\
    \ along with the user-provided Authorization Code and Redirect URL from the action\
    \ parameters.\n2. **Token Request:** Sends a POST request to the Microsoft identity\
    \ platform (Azure AD) token endpoint using the `authorization_code` grant type.\n\
    3. **Response Handling:** Captures the JSON response from Microsoft, which contains\
    \ the access token and the refresh token.\n4. **Result Output:** Adds the full\
    \ token response to the action's JSON results for use in integration setup.\n\n\
    ### Parameters Description:\n| Parameter Name | Type | Mandatory | Description\
    \ |\n| :--- | :--- | :--- | :--- |\n| Redirect URL | String | Yes | The redirect\
    \ URI that was specified during the Azure App registration process. Defaults to\
    \ `https://localhost`. |\n| Authorization Code | String | Yes | The temporary\
    \ code obtained from the 'Get OAuth Authorization Code' action or the Azure authorization\
    \ endpoint. |\n\n### Additional Notes:\n* This action does not run on entities\
    \ and is intended for administrative/setup purposes.\n* The generated refresh\
    \ token should be copied into the integration's configuration settings to enable\
    \ persistent connectivity."
