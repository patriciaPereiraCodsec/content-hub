Update Alert Status:
  ai_description: >-
    Updates the status of a specific alert in Microsoft Azure Security Center. This
    action allows analysts to programmatically manage the lifecycle of Azure security
    alerts by transitioning them to states such as 'Dismiss', 'Reactivate', or 'Resolve'.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Subscription ID | String | No | The ID of the Azure subscription. If provided,
    it overrides the subscription ID configured at the integration level. |

    | Alert ID | String | Yes | The unique identifier of the alert to update. |

    | Location | String | Yes | The Azure location/region where the alert is located
    (e.g., 'centralus'). |

    | Status | String | Yes | The target status for the alert. Supported values: 'Dismiss',
    'Reactivate', 'Resolve'. Default is 'Resolve'. |


    ### Flow Description

    1. **Initialization**: The action initializes the Azure Security Center manager
    using credentials (Client ID, Secret, Tenant ID) and determines the active Subscription
    ID.

    2. **Parameter Mapping**: The input 'Status' is mapped from the user-friendly
    display name to the specific API value required by Microsoft Azure (e.g., 'Resolve'
    becomes 'resolve').

    3. **API Execution**: A POST request is sent to the Azure Management API endpoint
    for the specific alert ID and location to update its status.

    4. **Result Handling**: The action confirms the success of the update or captures
    any API errors returned by Azure.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Updates the status of an alert in Microsoft Azure Security Center to 'Dismiss',
      'Reactivate', or 'Resolve' via a POST request to the Azure Management API.
