Get OAuth Authorization Code:
  ai_description: >-
    ### General Description

    Generates an OAuth 2.0 authorization URL for Azure Security Center. This action
    is the first step in the OAuth authentication process, allowing a user to manually
    authorize the application in a web browser to obtain an authorization code. This
    code is required for the subsequent 'Get OAuth Refresh Token' action.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Redirect URL | String | Yes | The redirect URI that was configured when the
    application was registered in the Azure portal. The authorization code will be
    sent to this URL. |


    ### Flow Description

    1. **Configuration Retrieval**: The action fetches the `Tenant ID` and `Client
    ID` from the integration's global configuration.

    2. **Parameter Extraction**: It retrieves the `Redirect URL` provided by the user
    in the action parameters.

    3. **URL Construction**: It formats a predefined Microsoft Online authorization
    endpoint URL with the tenant, client ID, and redirect URI.

    4. **Result Generation**: The action adds the generated URL as a clickable link
    in the Google SecOps interface and provides instructions for the user to complete
    the authorization manually in their browser.


    ### Additional Notes

    This action does not perform any network requests to Azure. It strictly performs
    string formatting to generate a link for manual user intervention.
