Ping:
  ai_description: >-
    ### General Description

    The **Ping** action is a utility designed to verify the connectivity between Google
    SecOps and the Azure Security Center environment. It ensures that the provided
    integration parameters (such as Client ID, Client Secret, and Tenant ID) are correct
    and that the service is reachable. This action is typically used during the initial
    setup or for troubleshooting connection issues.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Client ID | String | Yes | The Application (client) ID of the Azure AD application
    used for authentication. |

    | Client Secret | String | Yes | The client secret generated for the Azure AD
    application. |

    | Tenant ID | String | Yes | The Directory (tenant) ID of the Azure AD instance.
    |

    | Verify SSL | Boolean | Yes | If enabled, the action will verify the SSL certificate
    of the Azure API endpoint. Default is `False`. |

    | Username | String | No | The username for basic authentication (if applicable).
    |

    | Password | String | No | The password for basic authentication (if applicable).
    |

    | Refresh Token | String | No | An OAuth refresh token used to obtain a new access
    token. |


    ### Additional Notes

    - This action does not process any entities.

    - It requires either a combination of `Username` and `Password` or a `Refresh
    Token` depending on the authentication flow configured in the Azure environment.
    If neither is provided, the manager initialization will fail.

    - Per Google SecOps standards, Ping actions are not classified as enrichment actions.


    ### Flow Description

    1. **Initialization**: The script initializes the Siemplify action and extracts
    configuration parameters from the integration settings.

    2. **Manager Setup**: It instantiates the `AzureSecurityCenterManager`, which
    handles authentication (OAuth or Basic) and session management.

    3. **Connectivity Test**: The manager executes the `test_connectivity` method,
    which sends a `GET` request to the Azure Security Center operations endpoint (`/providers/Microsoft.Security/operations`).

    4. **Result Handling**: If the request is successful (HTTP 200), the action completes
    with a success status. If an exception occurs (e.g., authentication failure or
    network timeout), the action fails and returns the error details.
