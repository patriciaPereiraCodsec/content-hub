name: Refresh Token Renewal Job
parameters:
-   name: Integration Environments
    default_value: ''
    type: string
    description: Specify the integration environments job should update the refresh
        tokens for. Parameter accepts multiple values as a comma separated string,
        individual values should be enclosed in double-quotes ("").
    is_mandatory: false
-   name: Connector Names
    default_value: ''
    type: string
    description: Specify the connector names job should update the refresh tokens
        for. Parameter accepts multiple values as a comma separated string, individual
        values should be enclosed in double-quotes ("").
    is_mandatory: false
description: Token renewal job should be used to periodically update the refresh token
    configured for the integration. By default, the refresh token expires every 90
    days, making integration unusable upon expiration. It is recommended to run this
    job every 7 or 14 days to make sure that refresh token will be up to date.
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/azure-security-center#refresh_token_renewal_job
integration: AzureSecurityCenter
creator: admin
