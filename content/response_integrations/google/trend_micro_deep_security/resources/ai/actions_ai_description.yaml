Scan Host:
  ai_description: >-
    ### General Description

    Requests a malware scan on specific Hostname entities using Trend Micro Deep Security.
    This action interacts with the Trend Micro API to identify the internal ID of
    a computer based on its hostname and then triggers a scan by updating the anti-malware
    state of that computer.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Api Root | String | Yes | The base URL of the Trend Micro Deep Security instance
    (e.g., `https://192.168.0.1:4119`). |

    | Api Secret Key | String | Yes | The secret key used for API authentication.
    |

    | Api Version | String | Yes | The version of the Trend Micro API to be called
    (e.g., `v1`). |

    | Verify SSL | Boolean | No | If enabled, the action will verify the SSL certificate
    of the API endpoint. |


    ### Additional Notes

    * This action specifically targets `HOSTNAME` entities. If no Hostname entities
    are found in the scope, the action will fail to request any scans.

    * The action performs a state change in Trend Micro Deep Security by setting the
    `antiMalware` state to `on` for the target computer.


    ### Flow Description

    1. **Initialization**: Extracts the necessary configuration parameters (API Root,
    Secret Key, API Version, and SSL verification settings).

    2. **Entity Filtering**: Iterates through the target entities and filters for
    those of type `HOSTNAME`.

    3. **ID Retrieval**: For each identified Hostname, the action queries the Trend
    Micro API to find the corresponding internal Computer ID.

    4. **Trigger Scan**: Sends a POST request to the Trend Micro API for each Computer
    ID to update its anti-malware state to 'on', which initiates the malware scan.

    5. **Reporting**: Collects the names of successfully processed hosts and returns
    a summary message to the Google SecOps case wall.
