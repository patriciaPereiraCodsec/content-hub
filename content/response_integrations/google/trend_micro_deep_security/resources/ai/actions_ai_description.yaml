Assign Security Profile To Host:
  ai_description: >-
    ### General Description

    This action assigns a specified security policy (profile) to computer entities
    within Trend Micro Deep Security. It is primarily used for containment or compliance
    enforcement by ensuring that specific hosts are governed by the correct security
    rules and configurations.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Security Profile Name | String | Yes | The exact name of the security policy/profile
    in Trend Micro Deep Security that you wish to assign to the target hosts. |


    ### Additional Notes

    - The action first resolves the 'Security Profile Name' to a Policy ID and then
    resolves each 'Hostname' entity to a Computer ID before performing the assignment.

    - If a hostname cannot be found in Trend Micro Deep Security, the action will
    skip that specific entity and continue processing others.


    ### Flow Description

    1. **Parameter Extraction**: The action retrieves the API configuration and the
    mandatory 'Security Profile Name' parameter.

    2. **Policy ID Retrieval**: It queries the Trend Micro API to find the internal
    ID corresponding to the provided policy name.

    3. **Entity Iteration**: The action iterates through all provided Hostname entities.

    4. **Computer ID Resolution**: For each Hostname, it fetches the corresponding
    Computer ID from the Trend Micro system.

    5. **Policy Assignment**: It executes a POST request to the Trend Micro API to
    update the computer's configuration with the new Policy ID.

    6. **Final Status**: The action returns a success message listing all hosts that
    were successfully updated.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Updates the configuration of a computer in Trend Micro Deep Security by assigning
      it a new policy ID via a POST request.
    fetches_data: true
    internal_data_mutation_explanation: null
  categories:
    enrichment: false
  entity_usage:
    entity_types:
    - HOSTNAME
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: true
    filters_by_identifier: false
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: false
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
Get Host Info:
  ai_description: >-
    ### General Description

    Retrieves comprehensive details for computer systems managed within Trend Micro
    Deep Security. This action identifies the target system by its hostname and fetches
    its full configuration and status profile from the external security platform.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | N/A | N/A | N/A | This action does not require any action-specific input parameters.
    It relies on the global integration configuration (API Root, API Key, etc.). |


    ### Flow Description

    1. **Entity Filtering**: The action identifies all `HOSTNAME` entities within
    the current alert or case context.

    2. **ID Resolution**: For each hostname, it queries the Trend Micro Deep Security
    API to find the corresponding internal `Computer ID`.

    3. **Data Retrieval**: Using the resolved ID, the action performs a GET request
    to fetch the complete computer information object.

    4. **Result Attachment**: The retrieved computer details are attached to the action's
    execution results as a JSON object, mapped to the specific hostname entity.


    ### Additional Notes

    This is a read-only action. It does not perform any modifications to the Trend
    Micro Deep Security environment or the security posture of the target host.
