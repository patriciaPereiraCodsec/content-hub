Ping:
  ai_description: >-
    ### General Description

    The Ping action is used to verify the connectivity between Google SecOps and the
    Trend Micro Deep Security instance. It ensures that the provided credentials and
    connection details are correct and that the network path is open. This action
    is typically used during the initial setup or for troubleshooting connection issues.


    ### Parameters Description

    This action does not have any action-specific parameters. It utilizes the following
    integration configuration parameters:


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Api Root | String | Yes | The base URL of the Trend Micro Deep Security API
    (e.g., https://192.168.0.1:4119). |

    | Api Secret Key | String | Yes | The secret key used for authenticating API requests.
    |

    | Api Version | String | Yes | The specific version of the Trend Micro API to
    interact with (e.g., v1). |

    | Verify SSL | Boolean | No | Determines whether to validate the SSL certificate
    of the target server. |


    ### Additional Notes

    This action does not process any entities and is strictly used for health checks
    of the integration. It performs a read-only operation (listing computers) to verify
    access.


    ### Flow Description

    1. **Parameter Extraction**: The action retrieves the Api Root, Api Secret Key,
    Api Version, and Verify SSL settings from the integration configuration.

    2. **Manager Initialization**: A TrendmicroManager instance is created using the
    extracted configuration parameters.

    3. **Connectivity Test**: The action calls the `test_connectivity` method, which
    executes a GET request to the `/computers` endpoint of the Trend Micro Deep Security
    API.

    4. **Result Reporting**: If the API responds successfully, the action completes
    with a success message. If an exception occurs (e.g., authentication failure or
    network timeout), the action fails and reports the error details.
