Get Security Profiles:
  ai_description: >-
    ### General Description

    Retrieves a comprehensive list of all security policies (profiles) configured
    within the Trend Micro Deep Security environment. This action is designed to provide
    visibility into the available security postures, allowing analysts to audit configurations
    or identify specific policy IDs needed for subsequent automation steps.


    ### Parameters Description

    This action does not require any action-specific parameters. It utilizes the following
    integration configuration parameters:


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Api Root | String | Yes | The base URL of the Trend Micro Deep Security instance
    (e.g., https://192.168.0.1:4119). |

    | Api Secret Key | String | Yes | The secret key used for API authentication.
    |

    | Api Version | String | Yes | The version of the API to interact with (e.g.,
    v1). |

    | Verify SSL | Boolean | No | If enabled, the action will verify the SSL certificate
    of the API endpoint. |


    ### Flow Description

    1. **Authentication**: Establishes a secure session with the Trend Micro Deep
    Security API using the configured root URL, API version, and secret key.

    2. **Data Retrieval**: Performs a GET request to the `/policies` endpoint to fetch
    all defined security profiles from the system.

    3. **Data Processing**: Iterates through the retrieved policies to extract key
    metadata, specifically the Name, Description, and unique ID for each profile.

    4. **Output Generation**: Formats the extracted metadata into a CSV-compatible
    structure and attaches it as a data table named "Security Profiles" to the Google
    SecOps case for analyst review.


    ### Additional Notes

    - This action is a global utility and does not operate on specific entities (IPs,
    Hosts, etc.).

    - If no profiles are found, the action completes with a message indicating no
    data was retrieved.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Adds a data table named 'Security Profiles' to the case containing the retrieved
      policy information (Name, Description, and ID).
