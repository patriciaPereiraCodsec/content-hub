    can_update_entities: false
    external_data_mutation_explanation: >-
      Triggers a malware scan on the target host by updating the anti-malware state
      to 'on' via a POST request to the Trend Micro Deep Security API.
    fetches_data: true
    internal_data_mutation_explanation: null
