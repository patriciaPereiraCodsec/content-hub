name: Remove Public Access From Bucket
description: Remove the public access from the bucket using Google Cloud Storage.
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/google-cloud-storage#remove_public_access_from_bucket
integration_identifier: GoogleCloudStorage
parameters:
-   name: Resource Name
    default_value: ''
    type: string
    description: Specify the name of the bucket on which you want to modify the Access
        Control List.
    is_mandatory: true
-   name: Prevent Public Access From Bucket
    default_value: false
    type: boolean
    description: If enabled, action will also configure the bucket in a way that will
        prevent possible public access.
    is_mandatory: true
dynamic_results_metadata: []
creator: Admin
simulation_data_json: '{"Entities":[]}'
