name: Upload an Object To a Bucket
description: Upload an object to a Cloud Storage bucket.
integration_identifier: GoogleCloudStorage
parameters:
-   name: Bucket Name
    default_value: ''
    type: string
    description: Specify the name of the bucket in which to upload the object.
    is_mandatory: true
-   name: Source File Path
    default_value: /{local}/{path_to}/{filename}
    type: string
    description: 'Specify the absolute path to the file that needs to be uploaded.
        Example: /loca/path/to/filename'
    is_mandatory: true
-   name: Object Name
    default_value: ''
    type: string
    description: Specify the name of the uploaded object within the bucket.
    is_mandatory: true
dynamic_results_metadata:
-   result_example_path: resources/upload_object_to_bucket_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: Admin
simulation_data_json: '{"Entities":[]}'
