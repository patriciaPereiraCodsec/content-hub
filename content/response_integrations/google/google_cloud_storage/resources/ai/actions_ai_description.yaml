Download an Object From a Bucket:
  ai_description: >-
    ### General Description

    Downloads a specific object (file) from a Google Cloud Storage (GCS) bucket to
    a designated local directory on the system running the action. This action is
    primarily used for retrieving logs, artifacts, or data files stored in GCS for
    further local processing or analysis.


    ### Parameters Description


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Bucket Name | String | Yes | The name of the Google Cloud Storage bucket where
    the target object is stored. |

    | Object Name | String | Yes | The name of the object to download. If the object
    is within a folder structure in the bucket, the full path must be provided (e.g.,
    `logs/2023/app.log`). |

    | Download Path | String | Yes | The absolute local directory path on the execution
    environment where the file will be saved. The action will append the object name
    to this path. |


    ### Additional Notes

    - The action requires the local `Download Path` to already exist and be a directory.

    - The action will attempt to create subdirectories within the `Download Path`
    if the `Object Name` contains a folder structure.

    - Per security guidelines, actions that download files are not classified as enrichment
    actions.


    ### Flow Description

    1. **Initialization**: Authenticates with Google Cloud Storage using the provided
    Service Account or Workload Identity credentials.

    2. **Bucket Retrieval**: Connects to the specified GCS bucket to verify its existence
    and accessibility.

    3. **Object Discovery**: Searches for the specified object (blob) within the bucket.
    If the object is not found, the action fails.

    4. **Path Validation**: Checks if the provided local `Download Path` exists and
    is a valid directory.

    5. **File Transfer**: Downloads the object's content and writes it to the local
    filesystem at the constructed path (`Download Path` + `Object Name`).

    6. **Result Reporting**: Returns a JSON object containing the `object_name` and
    the final `download_path` upon successful completion.
