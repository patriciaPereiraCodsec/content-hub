Upload an Object To a Bucket:
  ai_description: >-
    ### General Description

    This action uploads a local file to a specified Google Cloud Storage (GCS) bucket.
    It is used to move data from the local environment where the Google SecOps agent
    is running into a cloud storage repository for archiving, sharing, or further
    processing.


    ### Parameters Description

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Bucket Name | String | Yes | The name of the target Google Cloud Storage bucket
    where the file will be uploaded. |

    | Source File Path | String | Yes | The absolute local path to the file that needs
    to be uploaded (e.g., `/tmp/logs/evidence.log`). |

    | Object Name | String | Yes | The name/key that will be assigned to the object
    within the GCS bucket. |


    ### Additional Notes

    - The action validates that the provided `Source File Path` exists and is a file
    (not a directory) before attempting the upload.

    - If an object with the same `Object Name` already exists in the bucket, it will
    be overwritten by this action.

    - The action requires appropriate IAM permissions (Service Account or Workload
    Identity) to write to the specified bucket.


    ### Flow Description

    1. **Initialization**: The action initializes the Google Cloud Storage manager
    using provided configuration parameters (Service Account, Project ID, etc.).

    2. **Validation**: It verifies that the `Source File Path` exists on the local
    filesystem and is a valid file.

    3. **Bucket Retrieval**: It attempts to fetch the metadata for the specified `Bucket
    Name` to ensure it exists and is accessible.

    4. **Upload**: The action initiates the upload process, streaming the local file
    content to the GCS bucket under the specified `Object Name`.

    5. **Metadata Retrieval**: After a successful upload, it reloads the object metadata
    (ID, MD5 hash, path) from GCS.

    6. **Completion**: The action returns the object metadata as a JSON result and
    marks the execution as successful.
