Update an ACL entry on Bucket:
  ai_description: >-
    Updates the Access Control List (ACL) entry for a specific entity on a Google
    Cloud Storage bucket. This action allows administrators to modify permissions
    (OWNER, READER, WRITER) for users, groups, or special identifiers like 'allUsers'.


    ### Parameters Description


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Bucket Name | String | Yes | The name of the Google Cloud Storage bucket where
    the ACL will be modified. |

    | Entity | String | Yes | The identifier for the entity receiving permissions.
    Supported formats: `user-userId`, `user-emailAddress`, `group-groupId`, `group-emailAddress`,
    `allUsers`, or `allAuthenticatedUsers`. |

    | Role | String | Yes | The permission level to assign. Possible values are `OWNER`,
    `READER`, or `WRITER`. |


    ### Flow Description


    1.  **Initialization**: The action initializes the Google Cloud Storage manager
    using provided service account or workload identity credentials.

    2.  **ACL Retrieval**: It fetches the current Access Control List (ACL) for the
    specified bucket.

    3.  **Validation**: It validates the format of the `Entity` parameter and checks
    if the entity already exists within the bucket's ACL.

    4.  **Role Comparison**: It determines if an update is necessary by checking if
    the requested role is already assigned to the entity.

    5.  **Mutation**: If an update is required, the action revokes all current roles
    for that specific entity and grants the new specified role.

    6.  **Commit**: The updated ACL is saved back to the Google Cloud Storage service.
