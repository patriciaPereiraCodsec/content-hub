Ping:
  ai_description: "### General Description\nThe **Ping** action is a diagnostic tool\
    \ used to verify the connectivity between Google SecOps and the Google Cloud Storage\
    \ environment. Its primary purpose is to ensure that the integration configuration\u2014\
    including credentials, project identifiers, and network settings\u2014is correctly\
    \ established and that the Google Cloud Storage API is reachable.\n\n### Parameters\
    \ Description\nThis action does not have any action-specific parameters. It relies\
    \ entirely on the **Integration Configuration** parameters provided during the\
    \ setup of the Google Cloud Storage integration:\n\n| Parameter Name | Type |\
    \ Mandatory | Description |\n| :--- | :--- | :--- | :--- |\n| Service Account\
    \ | String (JSON) | No | The JSON key file for the Google Cloud Service Account\
    \ used for authentication. |\n| Workload Identity Email | String | No | The email\
    \ address used for Workload Identity Federation or service account impersonation.\
    \ |\n| API Root | String | No | A custom API endpoint URL for Google Cloud Storage,\
    \ if not using the default. |\n| Project ID | String | No | The specific Google\
    \ Cloud Project ID to connect to. |\n| Quota Project ID | String | No | The Project\
    \ ID used for billing and quota tracking. |\n| Verify SSL | Boolean | Yes | Specifies\
    \ whether to verify the SSL certificate of the API endpoint. |\n\n### Additional\
    \ Notes\n- This action is typically used during the initial setup or for troubleshooting\
    \ authentication and network issues.\n- It does not interact with or process any\
    \ entities within a case.\n- Either a Service Account or Workload Identity configuration\
    \ must be valid for the connection to succeed.\n\n### Flow Description\n1. **Configuration\
    \ Extraction**: The action retrieves the integration's global configuration parameters\
    \ (Service Account, Project ID, etc.) from the environment.\n2. **Validation**:\
    \ It validates the format of the Service Account JSON and the Workload Identity\
    \ Email using internal validation utilities.\n3. **Manager Initialization**: It\
    \ initializes the `GoogleCloudStorageManager`, which handles the creation of an\
    \ authenticated session and the Google Cloud Storage client.\n4. **Connectivity\
    \ Test**: The action executes a `list_buckets` request with a limit of one result.\
    \ This serves as a lightweight check to confirm that the client can successfully\
    \ authenticate and communicate with the GCP service.\n5. **Execution Completion**:\
    \ If the API call succeeds, the action returns a success message. If an error\
    \ occurs (e.g., authentication failure, network timeout), it captures the exception\
    \ and reports a failure status with the error details."
