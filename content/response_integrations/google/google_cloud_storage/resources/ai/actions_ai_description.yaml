List Buckets:
  ai_description: >-
    ### General Description

    The **List Buckets** action retrieves a list of available buckets from Google
    Cloud Storage (GCS) for a specified project. This utility action provides visibility
    into the storage infrastructure of a GCP environment, allowing users to see bucket
    names, creation/modification timestamps, and ownership details.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Max Results | Integer | No | The maximum number of buckets to retrieve. Defaults
    to 50. If a value less than 1 is provided, the default is used. |

    | Project ID | String | No | The GCP Project ID to query. If not provided, the
    action defaults to the Project ID configured in the integration settings. |


    ### Flow Description

    1. **Authentication**: The action initializes a connection to Google Cloud Storage
    using the provided Service Account or Workload Identity credentials.

    2. **Configuration**: It determines the target Project ID by checking the action
    parameters first, falling back to the integration's global configuration if necessary.

    3. **API Call**: The action invokes the GCS `list_buckets` method, applying the
    `Max Results` limit to the request.

    4. **Data Transformation**: The raw response from Google Cloud is processed by
    a parser that extracts key metadata (Name, Owner, Creation Date, and Modification
    Date) for each bucket.

    5. **Result Delivery**: The structured list of buckets is attached to the action's
    JSON results, and the execution completes with a success message.


    ### Additional Notes

    - This action does not require or process any SOAR entities (such as IP addresses
    or Hostnames).

    - If the specified Project ID is invalid or the credentials lack sufficient permissions,
    the action will fail with a descriptive error message.
