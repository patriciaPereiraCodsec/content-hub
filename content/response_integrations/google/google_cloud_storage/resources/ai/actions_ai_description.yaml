Remove Public Access From Bucket:
  ai_description: >-
    Removes public access from a specified Google Cloud Storage (GCS) bucket by modifying
    its IAM policy and configuration. This action is designed to secure buckets that
    have been inadvertently exposed to the public.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Resource Name | String | Yes | The unique name of the GCS bucket on which to
    modify access controls. |

    | Prevent Public Access From Bucket | Boolean | Yes | If set to `True`, the action
    will also enable the 'Public Access Prevention' setting on the bucket, which prevents
    the bucket from being made public in the future. |


    ### Flow Description

    1. **Initialization**: The action initializes the Google Cloud Storage manager
    using provided service account or workload identity credentials.

    2. **Bucket Retrieval**: It fetches the metadata for the bucket specified in the
    `Resource Name` parameter.

    3. **IAM Policy Modification**: The action retrieves the current IAM policy of
    the bucket and iterates through all bindings to remove the `allUsers` and `allAuthenticatedUsers`
    principals.

    4. **Policy Update**: The modified IAM policy (with public access removed) is
    applied back to the bucket.

    5. **Configuration Enforcement**: If `Prevent Public Access From Bucket` is enabled,
    the action performs a patch request to the bucket configuration to set `public_access_prevention`
    to `enforced`.
