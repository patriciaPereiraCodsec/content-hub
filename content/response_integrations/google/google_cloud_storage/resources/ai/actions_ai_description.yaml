"Get a Bucket\u2019s Access Control List":
  ai_description: >-
    ### General Description

    Retrieves the Access Control List (ACL) for specified Google Cloud Storage buckets.
    This action allows security administrators to audit who has access to specific
    buckets and what roles (OWNER, WRITER, READER) are assigned to various entities
    such as users, groups, or domains. It is primarily used for security auditing
    and compliance checks within GCP environments.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Bucket Name | String | Yes | A comma-separated list of bucket names from which
    to retrieve the Access Control List. |


    ### Flow Description

    1. **Initialization**: The action initializes the Google Cloud Storage manager
    using the integration's configuration parameters, including Service Account credentials
    or Workload Identity, Project ID, and SSL verification settings.

    2. **Input Parsing**: The action extracts the `Bucket Name` parameter and converts
    the comma-separated string into a list of individual bucket identifiers.

    3. **Data Retrieval**: For each bucket name in the list, the action calls the
    Google Cloud Storage API to fetch the bucket object and its associated ACL entries.

    4. **Error Handling**:
        - **Uniform Bucket-Level Access**: If a bucket has uniform bucket-level access
    enabled, the action catches a `GoogleCloudStorageBadRequestError` and informs
    the user that legacy ACLs are not available for that bucket.
        - **Not Found/Forbidden**: If a bucket does not exist or the credentials lack
    permission, the action logs these specific buckets as 'not found'.
    5. **Output**: The action aggregates the successfully retrieved ACL data (Entity
    and Role) into a JSON result, updates the action's result value, and provides
    a summary message detailing which buckets were successfully processed and which
    encountered issues.


    ### Additional Notes

    - This action does not process SOAR entities (like IP or Hostname); it operates
    strictly on the bucket names provided as input parameters.

    - Legacy ACLs are only applicable to buckets that do not have 'Uniform bucket-level
    access' enforced.
