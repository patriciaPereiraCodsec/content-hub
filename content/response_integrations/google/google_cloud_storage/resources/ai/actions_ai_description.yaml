List Bucket Objects:
  ai_description: >-
    ### General Description

    Lists objects stored within a specific Google Cloud Storage (GCS) bucket. This
    action is used to gain visibility into the contents of a bucket, retrieving metadata
    for each object such as its name, size, content type, and creation/update timestamps.
    It is particularly useful for auditing bucket contents or identifying specific
    files during an investigation.


    ### Parameters Description

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Bucket Name | String | Yes | The unique name of the Google Cloud Storage bucket
    from which to retrieve the list of objects. |

    | Max Objects to Return | Integer | No | The maximum number of objects to include
    in the results. Defaults to 50. If a value less than 1 is provided, the default
    is used. |

    | Retrieves the Access Control List of an object | Boolean | No | If enabled,
    the action will attempt to fetch the Access Control List (ACL) for each object,
    detailing permissions and roles. Note: This may fail or return empty results for
    buckets using Uniform Bucket-Level Access. |


    ### Additional Notes

    - This action does not operate on SecOps entities; it requires a manual input
    of the bucket name.

    - The action uses the Google Cloud Storage Python SDK to interface with the GCP
    API.


    ### Flow Description

    1. **Initialization**: The action initializes the Google Cloud Storage manager
    using provided credentials (Service Account or Workload Identity).

    2. **Parameter Validation**: It validates the 'Bucket Name' and ensures the 'Max
    Objects to Return' is within valid bounds.

    3. **Data Retrieval**: It calls the GCS API to list blobs (objects) within the
    specified bucket, respecting the maximum result limit.

    4. **ACL Fetching (Optional)**: If requested, it retrieves the ACL metadata for
    each identified object.

    5. **Result Processing**: The metadata for all found objects is parsed into a
    structured JSON format and returned as the action's output.
