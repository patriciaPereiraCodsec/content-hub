Ping:
  ai_description: >-
    Tests connectivity to the Fortinet FortiSIEM installation using the parameters
    provided in the integration configuration. This action ensures that the Google
    SecOps platform can successfully communicate with the FortiSIEM API by attempting
    to access the monitored devices endpoint.


    ### Parameters

    | Parameter | Description | Type | Mandatory |

    | --- | --- | --- | --- |

    | API Root | The base URL of the FortiSIEM instance. | String | Yes |

    | Username | The username used for authentication. | String | Yes |

    | Password | The password used for authentication. | String | Yes |

    | Verify SSL | Specifies whether to verify the SSL certificate of the FortiSIEM
    instance. | Boolean | No |


    ### Flow

    1. **Parameter Initialization:** Extracts the connection details (API Root, Username,
    Password, and SSL verification) from the integration's configuration settings.

    2. **Manager Setup:** Initializes the FortiSIEM communication manager with the
    extracted credentials.

    3. **Connectivity Check:** Performs a GET request to the monitored devices endpoint
    (`/phoenix/rest/deviceInfo/monitoredDevices`) to verify that the credentials are
    valid and the service is reachable.

    4. **Execution Result:** Returns a success state if the API responds correctly,
    or a failure state with the specific error message if the connection fails.
