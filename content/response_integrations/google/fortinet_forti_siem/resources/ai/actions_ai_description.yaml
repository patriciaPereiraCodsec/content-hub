Enrich Entities:
  ai_description: "### General Description\nEnriches Hostname and IP Address entities\
    \ using information retrieved from the Fortinet FortiSIEM Configuration Management\
    \ Database (CMDB). This action helps security analysts understand the context\
    \ of a device within the network by providing details such as the device vendor,\
    \ model, access protocols, and discovery time.\n\n### Parameters Description\n\
    | Parameter | Type | Mandatory | Description |\n| :--- | :--- | :--- | :--- |\n\
    | Target Organization | String | No | Specify an optional target organization\
    \ name to restrict the CMDB search to a specific organization within FortiSIEM.\
    \ |\n\n### Additional Notes\n- The action supports **ADDRESS** (IP) and **HOSTNAME**\
    \ entity types.\n- For Hostname entities, the identifier should match the \"name\"\
    \ of the device as registered in FortiSIEM.\n- Enrichment data is prefixed with\
    \ \"FortiSIEM\" in the entity's additional properties.\n\n### Flow Description\n\
    1. **Connectivity Check**: The action initializes the FortiSIEM manager and performs\
    \ a connectivity test to ensure the API is reachable.\n2. **Entity Filtering**:\
    \ It identifies all entities in the current context that are either IP Addresses\
    \ or Hostnames.\n3. **CMDB Query**: For each supported entity, the action sends\
    \ a GET request to the FortiSIEM CMDB endpoint (`/phoenix/rest/cmdbDeviceInfo/device`).\
    \ If a `Target Organization` is provided, it is included in the query parameters.\n\
    4. **Data Extraction**: The action parses the XML response from FortiSIEM, extracting\
    \ device metadata including `accessIp`, `name`, `vendor`, `model`, and `discoverTime`.\n\
    5. **Internal Mutation**: \n    - Updates the entity's **Additional Properties**\
    \ with the retrieved metadata.\n    - Adds a detailed **Entity Table** to the\
    \ entity's profile in the SOAR.\n    - Marks the entity as **Enriched**.\n6. **Finalization**:\
    \ Updates the entities within Google SecOps and returns a summary of successful\
    \ and failed enrichments."
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entity additional properties with CMDB information and adds entity tables
      to the entity profile.
  categories:
    enrichment: true
  entity_usage:
    entity_types:
    - ADDRESS
    - HOSTNAME
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: true
