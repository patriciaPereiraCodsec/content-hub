    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: false
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
Execute Custom Query:
  ai_description: >-
    Executes a custom XML-based event query in Fortinet FortiSIEM to retrieve specific
    log data. This action is designed to handle long-running queries asynchronously
    by polling the FortiSIEM API for progress until completion. It allows users to
    define specific query conditions, select return fields, and manage result sorting
    and time frames.


    ### Parameters Description


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Query | String | Yes | The query string used to filter events (e.g., `(relayDevIpAddr
    = 10.0.0.1)`). |

    | Fields To Return | String | No | A comma-separated list of specific fields to
    include in the results. If empty, all fields are returned. |

    | Sort Field | String | No | The attribute name used to sort the results. |

    | Sort Order | Enum | No | The direction of sorting: `DESC` (default) or `ASC`.
    |

    | Max Results To Return | Integer | No | The maximum number of event records to
    retrieve. Default is 50. |

    | Time Frame | Enum | No | Predefined time range for the query (e.g., `Last Hour`,
    `Last 24 Hours`). Default is `Last Hour`. |

    | Start Time | String | No | The start time in ISO 8601 format. **Mandatory**
    if 'Time Frame' is set to 'Custom'. |

    | End Time | String | No | The end time in ISO 8601 format. If omitted with 'Custom'
    time frame, the current time is used. |


    ### Additional Notes

    - This action runs asynchronously. It will submit the query and then enter an
    'In Progress' state, polling the external system until the data is ready.

    - If the 'Time Frame' is set to 'Custom', the 'Start Time' parameter must be provided,
    otherwise the action will fail.


    ### Flow Description

    1. **Initialization**: Extracts integration configuration and action parameters,
    validating the 'Max Results To Return' value.

    2. **Time Calculation**: Determines the start and end timestamps based on the
    'Time Frame' selection or custom input strings.

    3. **Payload Construction**: Generates an XML payload containing the query logic,
    selected fields, and sorting instructions.

    4. **Query Submission (First Run)**: Sends a POST request to FortiSIEM to initiate
    the event query and retrieves a unique Query ID.

    5. **Progress Polling**: In subsequent runs, the action checks the status of the
    query using the Query ID.

    6. **Data Retrieval**: Once the query status reaches 100% (completed), the action
    fetches the event results up to the specified limit.

    7. **Output**: The retrieved events are formatted and added to the action's JSON
    results and a data table named 'Custom Query Results'.
