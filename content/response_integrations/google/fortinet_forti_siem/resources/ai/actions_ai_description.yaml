Execute Simple Query:
  ai_description: >-
    ### General Description\nThe **Execute Simple Query** action allows users to perform
    targeted event searches within Fortinet FortiSIEM. It constructs a structured
    XML query based on various filtering criteria such as event types, categories,
    severity levels, and specific event IDs. This action is executed asynchronously,
    meaning it submits the query and then polls the FortiSIEM system until the results
    are ready, making it suitable for potentially long-running searches.\n\n### Parameters
    Description\n| Parameter | Type | Mandatory | Description |\n| :--- | :--- | :---
    | :--- |\n| Fields To Return | String | No | A comma-separated list of specific
    fields to include in the results. If left empty, all available fields are returned.
    |\n| Sort Field | String | No | The field name to be used for sorting the results.
    |\n| Sort Order | Enum | No | The direction of sorting: **DESC** (Descending)
    or **ASC** (Ascending). Default is DESC. |\n| Minimum Severity to Fetch | Integer
    | No | Filters results to only include events with a severity score equal to or
    higher than this value. |\n| Event Types | String | No | A comma-separated list
    of event types to filter the query. |\n| Event Category | String | No | A comma-separated
    list of event categories to filter the query. |\n| Event IDs | String | No | A
    comma-separated list of specific event IDs to retrieve. |\n| Start Time | String
    | No | The start time for the query in ISO 8601 format (e.g., 2021-04-23T12:38Z).
    Required if 'Time Frame' is set to 'Custom'. |\n| End Time | String | No | The
    end time for the query in ISO 8601 format. If empty and 'Time Frame' is 'Custom',
    it defaults to the current time. |\n| Max Results To Return | Integer | No | The
    maximum number of event records to retrieve. Default is 50. |\n| Time Frame |
    Enum | No | Predefined time ranges for the query (e.g., Last Hour, Last 24 Hours,
    Last Week, Last Month, Custom). |\n\n### Additional Notes\n- **Conditional Requirement**:
    If the **Time Frame** parameter is set to **Custom**, the **Start Time** parameter
    must be provided for the action to run.\n- **Asynchronous Execution**: This action
    is designed to handle long-running queries by polling the FortiSIEM server for
    progress until completion.\n\n### Flow Description\n1. **Initialization**: The
    action parses all input parameters and validates that the result limit and severity
    are positive numbers.\n2. **Time Calculation**: It determines the start and end
    timestamps based on the selected **Time Frame** or the provided **Start/End Time**
    strings.\n3. **Payload Construction**: An XML query payload is built, incorporating
    the specified filters (event types, categories, severity, etc.) and sorting preferences.\n4.
    **Query Submission (First Run)**: The action sends the XML payload to the FortiSIEM
    API to initiate the search and receives a unique `query_id`.\n5. **Progress Polling**:
    In subsequent runs, the action uses the `query_id` to check the status of the
    query on the server.\n6. **Data Retrieval**: Once the query status indicates completion
    (100%), the action fetches the event data.\n7. **Output Generation**: The retrieved
    events are processed into a JSON result and a data table named 'Simple Query Results'
    for display in the case wall.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
