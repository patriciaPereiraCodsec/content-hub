name: FortiSIEM Incidents Connector
parameters:
-   name: DeviceProductField
    default_value: deviceProduct
    type: string
    description: Enter the source field name in order to retrieve the Product Field
        name.
    is_mandatory: true
    is_advanced: false
    mode: regular
-   name: EventClassId
    default_value: eventType
    type: string
    description: Enter the source field name in order to retrieve the Event Field
        name.
    is_mandatory: true
    is_advanced: false
    mode: regular
-   name: Environment Field Name
    default_value: ''
    type: string
    description: Describes the name of the field where the environment name is stored.
        If the environment field isn't found, the environment is the default environment.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Environment Regex Pattern
    default_value: .*
    type: string
    description: A regex pattern to run on the value found in the "Environment Field
        Name" field. Default is .* to catch all and return the value unchanged. Used
        to allow the user to manipulate the environment field via regex logic. If
        the regex pattern is null or empty, or the environment value is null, the
        final environment result is the default environment.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: PythonProcessTimeout
    default_value: 300
    type: integer
    description: Specify the timeout for connector to run.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: API Root
    default_value: https://x.x.x.x:port
    type: string
    description: Specify the API root for the target FortiSIEM installation.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Username
    default_value: ''
    type: string
    description: Specify the username to use for the target FortiSIEM installation.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Password
    default_value: ''
    type: password
    description: Specify the password to use for the target FortiSIEM installation.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Verify SSL
    default_value: true
    type: boolean
    description: If enabled, Siemplify server will check the certificate configured
        for API root.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Target Organization
    default_value: ''
    type: string
    description: Specify organizations connector should fetch incidents for.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Max hours backwards
    default_value: 24
    type: integer
    description: Specify the time frame to fetch incidents from X hours backwards.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Max Incidents Per Cycle
    default_value: 10
    type: integer
    description: Specify how many incidents should be processed during one connector
        run.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Max Events Per Incidents
    default_value: 100
    type: integer
    description: Specify the maximum number of events the connector should track for
        the incident. Once the limit will be reached, new events will not be added
        to Siemplify.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Incident Statuses to Fetch
    default_value: '0'
    type: string
    description: Specify incident' statuses to fetch to Siemplify. Parameter accepts
        multiple values as a comma separated string. 0 stands for incidents in open
        status.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Minimum Severity to Fetch
    default_value: ''
    type: integer
    description: Specify minimum incident’s event severity to fetch to Siemplify in
        numbers, for example 5 or 7.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Use whitelist as a blacklist
    default_value: false
    type: boolean
    description: If enabled, whitelist will be used as a blacklist.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Track New Events Added to Already Ingested Incidents
    default_value: true
    type: boolean
    description: If enabled, if new events are added to already ingested FortiSIEM
        incident, additional new alert will be created in Siemplify that will have
        those new events.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Track New Events Threshold (hours)
    default_value: 24
    type: integer
    description: If "Track New Events Added to Already Ingested Incidents" checkbox
        is checked, specify the maximum number of hours connector should track already
        ingested incidents for new events. Once the limit will be reached, new events
        will not be added to Siemplify.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Proxy Server Address
    default_value: ''
    type: string
    description: The address of the proxy server to use.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Proxy Username
    default_value: ''
    type: string
    description: The proxy username to authenticate with.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Proxy Password
    default_value: ''
    type: password
    description: The proxy password to authenticate with.
    is_mandatory: false
    is_advanced: false
    mode: script
description: Connector can be used to fetch FortiSIEM incidents. Connector whitelist
    can be used to ingest only specific types of incidents based on incident’s “eventType”
    attribute value. SourceGroupIdentifier of the connector can be used to group Siemplify
    alerts based on incident id.  Connector requires FortiSIEM version 6.3 or newer.
integration: FortinetFortiSIEM
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/fortinet-fortisiem#fortisiem-incidents-connector
rules: []
is_connector_rules_supported: false
creator: admin
