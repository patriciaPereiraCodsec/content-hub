name: Execute Custom Query
description: Execute a custom query in FortiSIEM.
integration_identifier: FortinetFortiSIEM
parameters:
-   name: Fields To Return
    default_value: ''
    type: string
    description: Specify what fields to return. If nothing is provided, action will
        return all fields.
    is_mandatory: false
-   name: Sort Field
    default_value: ''
    type: string
    description: Specify what parameter should be used for sorting.
    is_mandatory: false
-   name: Sort Order
    default_value: DESC
    type: ddl
    optional_values:
    - DESC
    - ASC
    description: Specify the order of sorting.
    is_mandatory: false
-   name: Query
    default_value: ''
    type: string
    description: 'Specify a query that will be used to retrieve information about
        the events. Example: (relayDevIpAddr = 172.30.202.1 OR 172.30.202.2) AND (reptDevName
        = HOST1)'
    is_mandatory: true
-   name: Max Results To Return
    default_value: 50
    type: string
    description: 'Specify how many results to return. Default: 50.'
    is_mandatory: false
-   name: Start Time
    default_value: ''
    type: string
    description: 'Specify the start time for the results. This parameter is mandatory,
        if "Custom" is selected for the "Time Frame" parameter. Format: ISO 8601.
        Example: 2021-04-23T12:38Z'
    is_mandatory: false
-   name: End Time
    default_value: ''
    type: string
    description: 'Specify the end time for the results. Format: ISO 8601. If nothing
        is provided and "Custom" is selected for the "Time Frame" parameter then this
        parameter will use current time.'
    is_mandatory: false
-   name: Time Frame
    default_value: Last Hour
    type: ddl
    optional_values:
    - Last Hour
    - Last 6 Hours
    - Last 24 Hours
    - Last Week
    - Last Month
    - Custom
    description: Specify a time frame for the results. If "Custom" is selected, you
        also need to provide "Start Time".
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/execute_custom_query_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
is_async: true
