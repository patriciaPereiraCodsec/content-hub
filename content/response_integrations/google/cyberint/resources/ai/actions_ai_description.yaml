Ping:
  ai_description: "### General Description\nThe **Ping** action is a diagnostic tool\
    \ designed to verify the connectivity between Google SecOps and the Cyberint platform.\
    \ It uses the provided integration configuration parameters to attempt a basic\
    \ API call, ensuring that the API Root, API Key, and SSL settings are correct\
    \ and that the service is reachable.\n\n### Parameters Description\nThis action\
    \ relies on integration-level configuration parameters rather than action-specific\
    \ parameters:\n\n| Parameter | Type | Mandatory | Description |\n| :--- | :---\
    \ | :--- | :--- |\n| **API Root** | String | Yes | The base URL of the Cyberint\
    \ API instance. |\n| **API Key** | String | Yes | The authentication token (access\
    \ token) used to authorize requests. |\n| **Verify SSL** | Boolean | Yes | Determines\
    \ whether to validate the SSL certificate of the Cyberint server. |\n\n### Additional\
    \ Notes\n- This action does not process any entities and is typically used during\
    \ the initial setup or troubleshooting of the Cyberint integration.\n- Per the\
    \ system rules, although this action fetches data to verify connectivity, it is\
    \ not classified as an enrichment action because it is a 'Ping' type action.\n\
    \n### Flow Description\n1. **Initialization**: The script initializes the Siemplify\
    \ action context and logs the start of the process.\n2. **Parameter Extraction**:\
    \ It retrieves the global integration settings (API Root, API Key, and Verify\
    \ SSL) using the `extract_configuration_param` utility.\n3. **Manager Setup**:\
    \ A `CyberintManager` instance is created using the retrieved credentials.\n4.\
    \ **Connectivity Test**: The manager executes the `test_connectivity` method,\
    \ which performs a `POST` request to the Cyberint alerts endpoint (`/alert/api/v1/alerts`)\
    \ with a minimal payload to check for a valid response.\n5. **Result Handling**:\
    \ \n    - If the request is successful, the action returns a success message and\
    \ a `True` result.\n    - If an exception occurs (e.g., authentication failure,\
    \ network timeout), the error is caught, logged, and the action returns a failure\
    \ message with a `False` result."
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
  categories:
    enrichment: false
  entity_usage:
    entity_types: []
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: false
    filters_by_identifier: false
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: false
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
Update Alert:
  ai_description: >-
    Updates the status and closure reason of a specific alert within the Cyberint
    platform. This action allows analysts to synchronize alert states between Google
    SecOps and Cyberint.


    ### Parameters

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Alert ID | String | Yes | The unique reference ID of the alert in Cyberint that
    needs to be updated. |

    | Status | String | No | The new status to assign to the alert. Supported values:
    'Open', 'Acknowledged', 'Closed'. |

    | Closure Reason | String | No | The reason for closing the alert. This is mandatory
    if the 'Status' is set to 'Closed'. Supported values: 'Resolved', 'Irrelevant',
    'False Positive'. |


    ### Additional Notes

    - If the 'Status' parameter is set to 'Closed', the 'Closure Reason' parameter
    must be provided, otherwise the action will fail.

    - The action uses a PUT request to the Cyberint API endpoint `/alert/api/v1/alerts/status`.


    ### Flow Description

    1. **Initialization**: Retrieves API configuration (Root, Key, SSL) and action
    parameters (Alert ID, Status, Closure Reason).

    2. **Validation**: Checks if a status is provided and ensures that a closure reason
    is included if the status is 'Closed'.

    3. **Mapping**: Converts the user-selected status and closure reason into the
    specific string values required by the Cyberint API.

    4. **API Execution**: Sends a PUT request to Cyberint to update the alert's metadata.

    5. **Completion**: Reports success or failure based on the API response.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Updates the status and closure reason of an alert in the Cyberint platform via
      a PUT request.
    fetches_data: false
    internal_data_mutation_explanation: null
  categories:
    enrichment: false
