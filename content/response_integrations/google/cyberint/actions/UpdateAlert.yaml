name: Update Alert
description: Update alert in Cyberint.
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/cyberint#update_alert
integration_identifier: Cyberint
parameters:
-   name: Alert ID
    default_value: ''
    type: string
    description: Specify the id of the alert that would need to have the status updated.
    is_mandatory: true
-   name: Status
    default_value: Select One
    type: ddl
    optional_values:
    - Select One
    - Open
    - Acknowledged
    - Closed
    description: 'Specify the status for the event. Note: if "Closed" is selected,
        "Closure Reason" needs to be provided as well.'
    is_mandatory: false
-   name: Closure Reason
    default_value: Select One
    type: ddl
    optional_values:
    - Select One
    - Resolved
    - Irrelevant
    - False Positive
    description: Specify the closure reason for closed status.
    is_mandatory: false
dynamic_results_metadata: []
creator: admin
