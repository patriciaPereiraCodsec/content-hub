Ping:
  ai_description: >-
    ### General Description

    The **Ping** action is a diagnostic tool designed to verify the connectivity between
    Google SecOps and the Qualys EDR platform. It ensures that the provided credentials
    and API endpoint are valid and reachable by attempting to authenticate and retrieve
    an access token.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **API Root** | String | Yes | The base URL of the Qualys EDR API instance. |

    | **Username** | String | Yes | The username used for authentication with the
    Qualys EDR service. |

    | **Password** | String | Yes | The password associated with the provided username.
    |

    | **Verify SSL** | Boolean | Yes | If enabled, the action will validate the SSL
    certificate of the Qualys EDR server. |


    ### Additional Notes

    - This action is typically used during the initial setup of the integration or
    for troubleshooting connection issues.

    - It does not process any entities or modify any data within Qualys EDR.


    ### Flow Description

    1. **Parameter Extraction:** The action retrieves the API Root, Username, Password,
    and SSL verification settings from the integration configuration.

    2. **Manager Initialization:** It initializes the `QualysEDRManager` with the
    provided connection details.

    3. **Authentication Attempt:** The manager attempts to fetch a JWT authentication
    token by sending a POST request to the `/auth` endpoint of the Qualys EDR API.

    4. **Result Reporting:** If the token is successfully retrieved, the action completes
    with a success status. If an error occurs (e.g., invalid credentials, network
    timeout), the action fails and provides the error details in the output message.
