name: GetThreatInfo
description: 'Enrich entities using information from Anomali ThreatStream. Supported
    entities: IP, URL, Hash, Email Addresses (User entities that match email regex).'
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/anomali#get_threat_info
integration_identifier: Anomali
parameters:
-   name: Limit
    default_value: 10
    type: string
    description: Specify how many records to return per entity.
    is_mandatory: true
-   name: Severity Threshold
    default_value: Medium
    type: ddl
    optional_values:
    - Very High
    - High
    - Medium
    - Low
    description: Specify what should be the severity threshold for the entity, in
        order to mark it as suspicious. If multiple records are found for the same
        entity, action will take the highest severity out of all available records.
    is_mandatory: false
-   name: Confidence Threshold
    default_value: 50
    type: string
    description: 'Specify what should be the confidence threshold for the entity,
        in order to mark it as suspicious. Note: Maximum is 100. If multiple records
        are found for the entity, action will take the average. Active records have
        priority. Default: 50.'
    is_mandatory: false
-   name: Ignore False Positive Status
    default_value: false
    type: boolean
    description: If enabled, action will ignore the false positive status and mark
        the entity as suspicious based on the "Severity Threshold" and "Confidence
        Threshold". If disabled, action will never label false positive entities as
        suspicious, regardless, if they pass the "Severity Threshold" and "Confidence
        Threshold" conditions or not.
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/get_threat_info_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
simulation_data_json: '{"Entities": ["ADDRESS", "DestinationURL", "FILEHASH", "USERUNIQNAME"]}'
script_result_name: success
