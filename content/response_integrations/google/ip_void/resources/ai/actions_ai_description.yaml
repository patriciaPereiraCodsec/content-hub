Get Ip Reputation:
  ai_description: "### General Description\nThe **Get Ip Reputation** action scans\
    \ IP Address entities through the IPVoid service. It checks the IP against multiple\
    \ DNS-based blacklists (DNSBL) and reputation engines to identify potential involvement\
    \ in malware or spam activities. This action provides deep context regarding the\
    \ IP's origin, ISP, and anonymity status (VPN, Tor, Proxy).\n\n### Parameters\
    \ Description\n| Parameter | Type | Mandatory | Description |\n| :--- | :--- |\
    \ :--- | :--- |\n| Threshold | Integer | Yes | Defines the minimum number of blacklist\
    \ detections needed to flag the entity as suspicious within Google SecOps. If\
    \ the number of engines reporting the IP is greater than this value, the entity's\
    \ suspicious flag is set to true. |\n\n### Flow Description\n1. **Initialization**:\
    \ The action initializes the IPVoid manager using the provided API Root and API\
    \ Key.\n2. **Entity Filtering**: It iterates through the target entities, specifically\
    \ processing those of type `ADDRESS`.\n3. **Data Retrieval**: For each IP address,\
    \ it performs a lookup via the IPVoid API to retrieve reputation, anonymity, and\
    \ blacklist data.\n4. **Data Processing**: \n    *   Extracts geolocation (country,\
    \ continent), ISP, and detection statistics.\n    *   Constructs a blacklist report\
    \ detailing which specific engines detected the IP.\n5. **Internal Updates**:\n\
    \    *   **Tables**: Adds a CSV-formatted table to the entity showing the blacklist\
    \ engine results.\n    *   **Insights**: Creates an entity insight displaying\
    \ the country code of the IP.\n    *   **Enrichment**: Updates the entity's additional\
    \ properties with IPVoid metadata and marks the entity as enriched.\n6. **Risk\
    \ Evaluation**: Compares the detection count against the user-defined `Threshold`.\
    \ If the count is higher, the entity is marked as suspicious.\n7. **Completion**:\
    \ Updates all processed entities in the platform and returns a summary of enriched,\
    \ missing, or failed entities.\n\n### Additional Notes\n- This action is a read-only\
    \ enrichment task regarding the external IPVoid service; it does not change any\
    \ external configurations."
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entity attributes including 'is_suspicious', 'is_enriched', and 'additional_properties'.
      It also adds entity insights and data tables to the case.
  categories:
    enrichment: true
  entity_usage:
    entity_types:
    - ADDRESS
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: true
    filters_by_identifier: false
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: false
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
Ping:
  ai_description: >-
    ### General Description

    Tests the connectivity to the IPVoid service to verify that the provided API Root
    and API Key are valid and that the Google SecOps environment can reach the IPVoid
    API endpoints.


    ### Parameters

    There are no parameters for this action.


    ### Additional Notes

    This action is primarily used for troubleshooting and initial configuration verification.
    According to the categorization rules, Ping actions are not classified as enrichment
    actions.


    ### Flow Description

    1. **Configuration Retrieval**: The action fetches the 'Api Root', 'Api Key',
    and 'Use SSL' settings from the IPVoid integration configuration.

    2. **Manager Initialization**: It initializes the `IPVoidManager` with the retrieved
    settings.

    3. **Connectivity Test**: The manager executes a GET request to the IPVoid stats
    endpoint (`/iprep/v1/pay-as-you-go/?stats`) to verify the API key and network
    path.

    4. **Result Reporting**: If the request is successful, the action concludes with
    a 'Connected successfully' message.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
  categories:
    enrichment: false
  entity_usage:
    entity_types: []
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: false
    filters_by_identifier: false
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: false
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
WhoIs:
  ai_description: >-
    ### General Description

    Queries the Whois database via IPVoid to retrieve registration and ownership information
    for IP addresses and Hostnames. This action helps analysts identify the owner,
    registration date, and contact details associated with a network entity by attaching
    a detailed HTML report to the entity.


    ### Parameters

    There are no parameters for this action.


    ### Flow Description

    1. **Initialization**: The action initializes the IPVoid manager using the integration's
    API configuration (API Root, API Key, and SSL settings).

    2. **Entity Filtering**: It identifies all `ADDRESS` (IP) and `HOSTNAME` entities
    within the current case context.

    3. **Data Retrieval**: For each identified entity, it performs a Whois lookup
    by sending a request to the IPVoid Whois service.

    4. **Reporting**: The retrieved HTML content is attached as an HTML report to
    the corresponding entity in Google SecOps.

    5. **Completion**: The action concludes by providing a summary message listing
    all entities for which a report was successfully attached.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Attaches an HTML Whois report to the entities in the case.
  categories:
    enrichment: true
  entity_usage:
    entity_types:
    - ADDRESS
    - HOSTNAME
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: true
    filters_by_identifier: false
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: false
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
