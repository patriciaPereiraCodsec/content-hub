name: Create IP List Asset
description: Create an IP list asset in Tenable.sc. Requires at least 1 IP entity
    for successful execution.
integration_identifier: TenableSecurityCenter
parameters:
-   name: Name
    default_value: ''
    type: string
    description: Specify the name for the IP list asset.
    is_mandatory: true
-   name: Description
    default_value: ''
    type: string
    description: Specify the description of the IP list asset.
    is_mandatory: false
-   name: Tag
    default_value: ''
    type: string
    description: Specify the tag of the IP list asset.
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/create_ip_list_asset_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
simulation_data_json: '{"Entities": ["ADDRESS"]}'
