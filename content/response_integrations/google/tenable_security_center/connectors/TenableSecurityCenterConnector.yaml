name: Tenable Security Center Connector
parameters:
-   name: DeviceProductField
    default_value: device_product
    type: string
    description: The field name used to determine the device product
    is_mandatory: true
    is_advanced: false
    mode: regular
-   name: EventClassId
    default_value: name
    type: string
    description: The field name used to determine the event name (sub-type)
    is_mandatory: false
    is_advanced: false
    mode: regular
-   name: PythonProcessTimeout
    default_value: '60'
    type: string
    description: The timeout limit (in seconds) for the python process running current
        script
    is_mandatory: true
    is_advanced: true
    mode: regular
-   name: Server Address
    default_value: ''
    type: string
    description: Server Address
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Username
    default_value: ''
    type: string
    description: Username
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Password
    default_value: ''
    type: password
    description: Password
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Access Key
    default_value: Access Key
    type: password
    description: Access Key
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Secret Key
    default_value: Secret Key
    type: password
    description: Secret Key
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Use SSL
    default_value: 'FALSE'
    type: boolean
    description: Use SSL
    is_mandatory: true
    is_advanced: true
    mode: script
-   name: Proxy Server Address
    default_value: ''
    type: string
    description: The address of the proxy server to use.
    is_mandatory: false
    is_advanced: true
    mode: script
-   name: Proxy Username
    default_value: ''
    type: string
    description: The proxy username to authenticate with.
    is_mandatory: false
    is_advanced: true
    mode: script
-   name: Proxy Password
    default_value: ''
    type: password
    description: The proxy password to authenticate with.
    is_mandatory: false
    is_advanced: true
    mode: script
-   name: Max Days Backwards
    default_value: '1'
    type: string
    description: Specify the amount of days back, from which you would like to fetch
        data.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Limit Per Cycle
    default_value: '10'
    type: string
    description: Specify the amount of alerts ingested into the connector in each
        execution cycle.
    is_mandatory: false
    is_advanced: true
    mode: script
description: Tenable Security Center Connector
integration: TenableSecurityCenter
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/tenable-security-center#tenable_security_center_connector
rules: []
is_connector_rules_supported: false
creator: admin
