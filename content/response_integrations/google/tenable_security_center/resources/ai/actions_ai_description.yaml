Ping:
  ai_description: "### General Description\nThe **Ping** action is a diagnostic tool\
    \ designed to verify the connectivity between Google SecOps and a Tenable Security\
    \ Center instance. It ensures that the provided configuration parameters, such\
    \ as the server address and authentication credentials, are correct and that the\
    \ service is reachable.\n\n### Parameters\nThere are no input parameters for this\
    \ action. It relies entirely on the integration's global configuration.\n\n###\
    \ Additional Notes\n* The action supports two authentication methods: **Access\
    \ Key/Secret Key** or **Username/Password**. \n* It validates the SSL certificate\
    \ based on the 'Use SSL' configuration setting.\n* As per standard SOAR practices,\
    \ Ping actions are used for health checks and do not process alert entities.\n\
    \n### Flow Description\n1. **Configuration Retrieval:** The action fetches the\
    \ 'Server Address', 'Username', 'Password', 'Access Key', 'Secret Key', and 'Use\
    \ SSL' settings from the integration configuration.\n2. **Manager Initialization:**\
    \ It initializes the `TenableSecurityCenterManager`, which establishes a session\
    \ and handles the authentication logic (API keys or session tokens).\n3. **Connectivity\
    \ Test:** The manager executes a GET request to the `/rest/currentUser` endpoint\
    \ of the Tenable Security Center API.\n4. **Validation:** The action validates\
    \ the API response. If the status code is successful and the credentials are valid,\
    \ it returns a success message."
