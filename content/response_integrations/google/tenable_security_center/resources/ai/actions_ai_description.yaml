Create IP List Asset:
  ai_description: >-
    ### General Description

    Creates a static IP list asset in Tenable.sc using the IP address entities provided
    in the action scope. This action allows security teams to dynamically group identified
    IP addresses into a managed asset list within Tenable for further scanning or
    reporting.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Name | String | Yes | Specify the name for the new IP list asset in Tenable.sc.
    |

    | Description | String | No | Specify a description for the IP list asset to provide
    context. |

    | Tag | String | No | Specify a tag to be associated with the IP list asset for
    organizational purposes. |


    ### Additional Notes

    * The action requires at least one entity of type **ADDRESS** to be present in
    the scope to execute successfully.

    * The asset created is of type 'static', meaning the IP list is fixed at the time
    of creation based on the entities processed.


    ### Flow Description

    1. **Parameter Extraction:** Retrieves the Tenable.sc connection details (Server
    Address, Credentials, SSL settings) and action parameters (Name, Description,
    Tag).

    2. **Entity Filtering:** Filters the target entities to identify all IP Address
    (**ADDRESS**) entities.

    3. **Validation:** Checks if any IP entities were found. If none are present,
    the action terminates with an informative message.

    4. **API Interaction:** Initializes the TenableSecurityCenterManager and calls
    the `create_ip_list_asset` method, which sends a POST request to the `/rest/asset`
    endpoint with the joined IP identifiers.

    5. **Result Processing:** Captures the API response containing the new asset's
    metadata, adds it to the action's JSON results, and reports a successful execution
    status.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Creates a new static IP list asset in the Tenable.sc platform via a POST request
      to the /rest/asset endpoint.
