Add IP To IP List Asset:
  ai_description: >-
    Adds IP Address entities to a specific static IP list asset in Tenable Security
    Center (Tenable.sc). This action allows for the dynamic management of asset groups
    by appending new IP addresses to existing lists, which can be used for targeted
    scanning or reporting within the Tenable platform.


    ### Parameters

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Asset Name | String | Yes | The exact name of the static IP list asset in Tenable.sc
    where the IP addresses should be added. |


    ### Flow Description

    1. **Entity Filtering:** The action identifies all entities of type `ADDRESS`
    (IP addresses) within the current scope.

    2. **Asset Identification:** It queries Tenable.sc to find the unique ID associated
    with the provided `Asset Name`.

    3. **Data Retrieval:** It fetches the current list of IP addresses already defined
    in the target asset to ensure existing data is preserved.

    4. **List Merging:** The action combines the existing IP list with the new IP
    addresses from the SecOps entities into a comma-separated string.

    5. **External Mutation:** It performs a PATCH request to the Tenable.sc API to
    update the asset's `definedIPs` field with the new combined list.

    6. **Result Reporting:** The action retrieves the updated asset details and returns
    them as a JSON result.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Updates the 'definedIPs' field of a static asset in Tenable.sc by appending
      new IP addresses to the existing list via a PATCH request to the /rest/asset/{asset_id}
      endpoint.
    fetches_data: true
    internal_data_mutation_explanation: null
  categories:
    enrichment: false
