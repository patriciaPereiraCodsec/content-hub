Get Vulnerabilities for IP:
  ai_description: "### General Description\nThe **Get Vulnerabilities for IP** action\
    \ retrieves comprehensive vulnerability data and severity summaries for IP Address\
    \ entities from Tenable Security Center. It enables security analysts to assess\
    \ the risk profile of network assets by identifying known vulnerabilities, their\
    \ severity levels, and associated plugin details. The action enriches entities\
    \ with summary counts and provides a detailed breakdown in a tabular format.\n\
    \n### Parameters\n| Parameter | Type | Mandatory | Description |\n| :--- | :---\
    \ | :--- | :--- |\n| N/A | N/A | N/A | This action does not require any input\
    \ parameters. |\n\n### Additional Notes\n- The action specifically targets entities\
    \ of type **ADDRESS**.\n- If a vulnerability with a **High** severity is found,\
    \ the entity is automatically marked as suspicious within Google SecOps.\n\n###\
    \ Flow Description\n1. **Authentication**: Establishes a session with Tenable\
    \ Security Center using the configured credentials (API keys or Username/Password).\n\
    2. **Entity Filtering**: Iterates through the target entities and selects those\
    \ of type `ADDRESS`.\n3. **Data Retrieval**: For each IP address, it performs\
    \ a POST request to the Tenable `/rest/analysis` endpoint to fetch cumulative\
    \ vulnerability data.\n4. **Severity Analysis**: Processes the retrieved vulnerabilities\
    \ to calculate a summary count for each severity level (Info, Low, Medium, High,\
    \ Critical).\n5. **Risk Marking**: If any vulnerability is found with a severity\
    \ of 'High', the entity's `is_suspicious` attribute is set to `True`.\n6. **Enrichment**:\
    \ \n    - Updates the entity's additional properties with the severity counts\
    \ (prefixed with 'Tenable').\n    - Constructs a CSV data table containing detailed\
    \ vulnerability information (Plugin ID, Name, Severity, Port, etc.) and attaches\
    \ it to the entity result.\n7. **Internal Update**: Commits the changes to the\
    \ entities (enrichment status, suspicious flag, and additional properties) within\
    \ Google SecOps."
