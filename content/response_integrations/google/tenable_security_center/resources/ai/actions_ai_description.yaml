Run Asset Scan:
  ai_description: >-
    ### General Description

    This action executes an asset scan in Tenable.sc (Security Center). It allows
    users to trigger a scan for a specific asset using a predefined policy and repository.
    The action first resolves the asset name to an internal Tenable ID and then initiates
    the scan immediately.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Scan Name** | String | Yes | The name to assign to the newly created scan
    job. |

    | **Asset Name** | String | Yes | The name of the asset (as defined in Tenable.sc)
    that should be scanned. |

    | **Policy ID** | Integer | Yes | The unique identifier of the scan policy to
    be used for the operation. |

    | **Repository ID** | Integer | Yes | The unique identifier of the repository
    where the scan results will be stored. |

    | **Description** | String | No | An optional description to provide context for
    the scan job. |


    ### Additional Notes

    - This action does not run on entities; it relies entirely on the provided parameters
    to identify the target asset.

    - The scan is scheduled to run immediately (`type: "now"`).


    ### Flow Description

    1. **Authentication**: Connects to the Tenable.sc server using provided credentials
    (API keys or Username/Password).

    2. **Asset Resolution**: Queries the Tenable.sc API to find the internal `asset_id`
    corresponding to the provided `Asset Name`.

    3. **Scan Execution**: Sends a POST request to the `/rest/scan` endpoint with
    the scan configuration, including the resolved `asset_id`, `Policy ID`, and `Repository
    ID`.

    4. **Result Handling**: Captures the scan creation response (including the scan
    ID) and attaches it to the action results in Google SecOps.
