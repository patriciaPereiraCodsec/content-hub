    \ Security Center where the IP information should be retrieved from. |\n\n###\
    \ Flow Description\n1. **Authentication**: Initializes the Tenable Security Center\
    \ manager using provided credentials and server address.\n2. **Repository Resolution**:\
    \ Retrieves the internal ID for the provided 'Repository Name' via the Tenable\
    \ API.\n3. **Entity Processing**: Iterates through all IP Address entities in\
    \ the current context.\n4. **Data Retrieval**: For each IP, it performs a GET\
    \ request to the Tenable Security Center to fetch device-specific information\
    \ (e.g., MAC address, severity counts, OS, last scan time).\n5. **Internal Enrichment**:\
