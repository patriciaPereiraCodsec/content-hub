Get Report:
  ai_description: "### General Description\nRetrieves report metadata and content\
    \ details from Tenable Security Center using either a specific Report ID or a\
    \ Report Name. This action is primarily used for auditing, compliance verification,\
    \ or gathering historical vulnerability data associated with a specific report\
    \ generated within the Tenable platform.\n\n### Parameters Description\n| Parameter\
    \ | Type | Mandatory | Description |\n| :--- | :--- | :--- | :--- |\n| Report\
    \ ID | String | No | The unique numerical identifier for the report. This can\
    \ typically be found in the report's URL within the Tenable SC interface. |\n\
    | Report Name | String | No | The display name of the report as it appears in\
    \ the Tenable SC GUI. |\n\n### Additional Notes\n* **Requirement:** While both\
    \ parameters are marked as optional in the configuration, the action logic requires\
    \ that **either** `Report ID` or `Report Name` must be provided. If both are missing,\
    \ the action will fail.\n* **Priority:** If both parameters are provided, the\
    \ action prioritizes fetching by `Report ID`.\n\n### Flow Description\n1. **Authentication:**\
    \ Establishes a session with the Tenable Security Center using provided credentials\
    \ (API keys or Username/Password).\n2. **Parameter Validation:** Checks if a `Report\
    \ ID` or `Report Name` has been provided by the user.\n3. **Data Retrieval:**\
    \ \n    * If a `Report ID` is provided, it queries the `/rest/report` endpoint\
    \ with the ID parameter.\n    * If only a `Report Name` is provided, it queries\
    \ the `/rest/report` endpoint with the name parameter.\n4. **Result Processing:**\
    \ \n    * If a report is found, the raw JSON data is added to the action's execution\
    \ results.\n    * If no report matches the criteria, the action completes with\
    \ a 'false' result value."
