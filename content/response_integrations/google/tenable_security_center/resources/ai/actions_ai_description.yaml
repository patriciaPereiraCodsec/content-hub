Get Scan Results:
  ai_description: >-
    ### General Description

    The **Get Scan Results** action retrieves the findings of a vulnerability scan
    from Tenable Security Center. It is designed to be used after a scan has been
    initiated, providing a mechanism to wait for the scan's completion and then ingest
    the resulting vulnerability data and severity summaries into Google SecOps.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Scan Result ID** | String | Yes | The unique identifier of the scan result
    to be retrieved from Tenable Security Center. |


    ### Flow Description

    1. **Authentication**: The action authenticates with the Tenable Security Center
    API using the configured credentials (either API keys or username/password).

    2. **Completion Check**: It enters a polling loop, checking the status of the
    scan associated with the provided **Scan Result ID** every 2 seconds until the
    scan is no longer marked as 'running'.

    3. **Data Fetching**: Once the scan is complete, the action performs two primary
    data requests: one for the detailed vulnerability results and another for a summary
    of findings by severity level.

    4. **Data Transformation**: The retrieved JSON data is processed and converted
    into CSV format for presentation.

    5. **Output Generation**: The action populates the SOAR case with two data tables
    ('Tenable Scan Results' and 'Tenable Severity Summary') and attaches the full
    raw data to the action's JSON result for use in downstream playbooks.


    ### Additional Notes

    - This is a synchronous, blocking action. It will remain in a 'running' state
    within the playbook until the external Tenable scan finishes.

    - If the scan result contains no data, the action will complete with a 'false'
    result value.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      The action populates the SOAR case with two data tables ('Tenable Scan Results'
      and 'Tenable Severity Summary') and updates the action's JSON result with the
      fetched scan data.
