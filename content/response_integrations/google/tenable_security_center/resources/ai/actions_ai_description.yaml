Scan Ips:
  ai_description: >-
    ### General Description

    Initiates a vulnerability scan for specific IP address entities within Tenable
    Security Center. This action allows security teams to trigger on-demand scans
    for identified assets directly from a case, using predefined policies. It creates
    a new scan configuration in the external system and immediately launches it.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Scan Name | String | Yes | The name to be assigned to the scan created in Tenable
    Security Center. |

    | Policy Name | String | Yes | The name of the existing scan policy in Tenable
    Security Center to use for this scan (e.g., 'Basic Network Scan'). |


    ### Flow Description

    1. **Entity Filtering**: The action iterates through the target entities and identifies
    all entities of type `ADDRESS`.

    2. **Policy Resolution**: It communicates with Tenable Security Center to retrieve
    the list of available policies and resolves the provided `Policy Name` to its
    internal unique identifier.

    3. **Scan Creation**: A new scan object is created in Tenable Security Center
    using the specified `Scan Name`, the resolved policy ID, and the list of collected
    IP addresses.

    4. **Scan Launch**: The action triggers the immediate execution of the newly created
    scan.

    5. **Result Handling**: The action returns the `scan_result_id` as the result
    value, which can be used for tracking the scan's status in subsequent steps.


    ### Additional Notes

    This action is asynchronous regarding the scan results; it initiates the scan
    and provides the ID but does not wait for the vulnerability analysis to complete.
    Either a username/password or an access_key/secret_key pair must be configured
    in the integration settings for the action to authenticate successfully.
