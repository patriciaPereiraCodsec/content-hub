Get Related Assets:
  ai_description: >-
    ### General Description

    The **Get Related Assets** action retrieves a list of assets associated with a
    specific IP address from a designated repository in Tenable Security Center. This
    action is primarily used for enrichment to understand the blast radius or context
    of an IP within the managed infrastructure by identifying which defined assets
    intersect with the target entity.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Repository Name** | String | Yes | The name of the repository in Tenable Security
    Center to query for asset intersections. |


    ### Flow Description

    1. **Authentication**: The action authenticates with the Tenable Security Center
    API using the integration's configuration (Server Address, Credentials, and SSL
    settings).

    2. **Repository Resolution**: It resolves the provided **Repository Name** to
    its internal internal ID by querying the Tenable repository list.

    3. **Entity Filtering**: The action identifies all `ADDRESS` entities within the
    current Google SecOps scope.

    4. **Data Retrieval**: For each identified IP address, it queries the Tenable
    API (`/rest/repository/{repo_id}/assetIntersections`) to find related assets.

    5. **Data Processing**: The retrieved asset list is converted into a CSV-formatted
    data table for each entity.

    6. **Internal Update**: The action attaches the data table to the entity, updates
    the entity's context within Google SecOps, and provides the raw JSON results for
    further playbook logic.
