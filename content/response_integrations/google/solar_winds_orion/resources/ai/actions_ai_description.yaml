Execute Query:
  ai_description: >-
    ### General Description

    The **Execute Query** action allows users to run custom SolarWinds Information
    Service (SWIS) queries against a SolarWinds Orion instance. This is a powerful
    utility for retrieving specific monitoring data, node information, or system metrics
    that are not covered by standard enrichment actions. The results are returned
    as a JSON object and visualized as a data table within the Google SecOps case.


    ### Parameters Description


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Query** | String | Yes | The SWIS query to be executed. Note that SolarWinds
    queries typically do not support the asterisk (*) notation for selecting all fields;
    specific fields must be named. |

    | **Max Results To Return** | Integer | No | Defines the maximum number of rows
    to retrieve from the query results. Defaults to 100 if not specified. |


    ### Additional Notes

    - This action does not run on specific entities; it executes a global query based
    on the provided string.

    - Ensure the SWIS query syntax is correct according to SolarWinds Orion documentation,
    as the action will fail if the query is malformed.


    ### Flow Description

    1. **Initialization**: The action initializes the SolarWinds Orion manager using
    the provided integration credentials (IP, Username, Password).

    2. **Parameter Extraction**: It retrieves the user-defined SWIS query and the
    result limit.

    3. **Execution**: The action sends a POST request to the SolarWinds Information
    Service API endpoint with the query payload.

    4. **Processing**: The response is parsed into a list of query result objects.
    The list is then truncated based on the 'Max Results To Return' parameter.

    5. **Output**: If results are found, they are added to the action's JSON output
    and formatted into a data table named 'Results' for display on the case wall.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
