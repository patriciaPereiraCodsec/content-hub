Ping:
  ai_description: >-
    ### General Description

    The **Ping** action is a diagnostic tool designed to verify the connectivity between
    Google SecOps and a SolarWinds Orion instance. It ensures that the provided credentials
    (Username/Password) and the network path (IP Address) are valid and that the SolarWinds
    Information Service (SWIS) API is responsive.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **IP Address** | String | Yes | The IP address or hostname of the SolarWinds
    Orion server. |

    | **Username** | String | Yes | The username used to authenticate with the SolarWinds
    Orion instance. |

    | **Password** | String | Yes | The password used to authenticate with the SolarWinds
    Orion instance. |

    | **Verify SSL** | Boolean | Yes | If enabled, the action will verify the SSL
    certificate of the SolarWinds Orion server. |


    ### Flow Description

    1. **Parameter Extraction:** The action retrieves the connection details (IP,
    Username, Password, and SSL settings) from the integration configuration.

    2. **Manager Initialization:** It initializes the `SolarWindsOrionManager` with
    the provided credentials.

    3. **Connectivity Test:** The action executes a lightweight SQL query (`SELECT
    DisplayName FROM Orion.Nodes ORDER BY DisplayName WITH ROWS 1 TO 1`) against the
    SolarWinds Information Service API.

    4. **Validation:** It validates the HTTP response. If the query returns a successful
    status code, the connection is confirmed.

    5. **Result Reporting:** The action returns a success message if the connection
    is established, or an error message detailing the failure if the request fails.
