Remediation Status:
  ai_description: >-
    ### General Description

    The **Remediation Status** action retrieves the current status of a specific remediation
    task from the Cynet platform using its unique identifier. This action is typically
    used to track the progress or verify the completion of remediation commands such
    as file quarantine, process termination, or file deletion.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Remediation Id** | String | Yes | The unique identifier of the remediation
    action (e.g., 13592) for which the status is being requested. |


    ### Flow Description

    1. **Authentication**: The action authenticates with the Cynet API using the configured
    credentials (API Root, Username, and Password) to obtain an access token.

    2. **Parameter Extraction**: The action retrieves the `Remediation Id` provided
    by the user.

    3. **API Request**: It performs a GET request to the Cynet remediation endpoint
    using the specified ID.

    4. **Result Processing**: The action parses the API response to extract the status
    code and status information (e.g., "File does not exist").

    5. **Final Output**: The retrieved status data is added to the action's JSON results,
    and a summary message is provided to the user.


    ### Additional Notes

    This action does not operate on entities within the Google SecOps case scope;
    it functions as a utility to query the status of external tasks based on a manual
    input ID.
