    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
Hash Query:
  ai_description: >-
    ### General Description

    Retrieves comprehensive information about a specific file hash from Cynet. This
    action allows security analysts to gather detailed metadata about files, including
    risk levels, occurrences, and certificate information, to aid in investigation
    and response.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | N/A | N/A | N/A | There are no parameters for this action. |


    ### Additional Notes

    This action specifically requires the file hash to be in SHA256 format. If the
    provided hash is not SHA256, the action will skip the entity. The action relies
    on integration-level configuration for API access (Api Root, Username, Password,
    and Verify SSL).


    ### Flow Description

    1. **Authentication**: Connects to the Cynet API using the configured credentials
    to obtain an access token.

    2. **Entity Filtering**: Iterates through the target entities and selects those
    of type `FILEHASH`.

    3. **Hash Validation**: For each `FILEHASH` entity, it verifies if the identifier
    is a valid SHA256 hash using the `cynet_manager.is_sha256` method.

    4. **Data Retrieval**: Queries the Cynet `/full/file` endpoint with the SHA256
    hash to fetch detailed file information.

    5. **Internal Enrichment**: If data is found, it flattens the response and adds
    a data table to the entity within the Google SecOps case using the `add_entity_table`
    method.

    6. **Result Reporting**: Returns a JSON object containing the raw data for all
    successfully queried entities and ends the action with a summary message.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Adds a data table to the entity in Google SecOps containing the file hash details
      retrieved from Cynet.
  categories:
    enrichment: false
