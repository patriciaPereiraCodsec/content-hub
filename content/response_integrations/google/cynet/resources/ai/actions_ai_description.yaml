Ping:
  ai_description: >-
    ### General Description

    Tests the connectivity to the Cynet API by attempting to authenticate using the
    provided credentials. This action is used to verify that the integration configuration
    (API Root, Username, Password) is correct and that the Google SecOps environment
    can reach the Cynet server.


    ### Parameters

    There are no parameters for this action.


    ### Additional Notes

    * This action is a standard 'Ping' utility used for integration health checks.

    * It does not interact with any entities or modify any data within Cynet or Google
    SecOps.


    ### Flow Description

    1. **Configuration Retrieval**: The action retrieves the API Root, Username, Password,
    and SSL verification settings from the integration's shared configuration.

    2. **Authentication Attempt**: It initializes the `CynetManager`, which automatically
    attempts to retrieve an access token by making a POST request to the `/account/token`
    endpoint.

    3. **Result Reporting**: If the authentication is successful and the manager object
    is created, the action returns a success message ('Connection Established'). If
    authentication fails, it reports a failure.
