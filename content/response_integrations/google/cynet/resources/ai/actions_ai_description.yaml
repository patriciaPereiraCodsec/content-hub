Delete Hash In Hosts:
  ai_description: >-
    ### General Description

    This action performs a file remediation by deleting a specific file hash across
    all hosts where it is detected within the Cynet environment. It is primarily used
    for containment and incident response to remove malicious or unauthorized files
    from endpoints.


    ### Parameters Description

    There are no additional parameters for this action. It relies on the integration
    configuration (API Root, Username, Password) and the provided file hash entities.


    ### Flow Description

    1. **Authentication**: The action authenticates with the Cynet API using the provided
    credentials to obtain an access token.

    2. **Entity Filtering**: It iterates through the target entities and identifies
    those of type `FILEHASH`.

    3. **Hash Validation**: For each hash, it verifies if the format is SHA256.

    4. **Occurrence Retrieval**: It queries Cynet to find all hostnames where the
    specific file hash has been detected.

    5. **Remediation Execution**: For every unique host identified, the action triggers
    a `delete_file_remediation` command.

    6. **Status Tracking**: It captures the remediation ID for each host and attempts
    to retrieve the initial status information.

    7. **Reporting**: The action concludes by providing a summary message listing
    the hostnames and their corresponding remediation IDs, and attaches the raw results
    as JSON.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      The action performs a POST request to the Cynet API's '/file/remediation/delete'
      endpoint, which triggers the physical deletion of a file on remote endpoint
      hosts.
    fetches_data: true
    internal_data_mutation_explanation: null
  categories:
    enrichment: false
  entity_usage:
