Kill Hash In Hosts:
  ai_description: >-
    ### General Description

    The **Kill Hash In Hosts** action is a remediation capability designed to terminate
    active processes associated with a specific file hash across all hosts managed
    by Cynet. This action is critical for containing threats by stopping the execution
    of malicious files identified during an investigation.


    ### Parameters Description


    | Parameter | Description | Type | Mandatory |

    | :--- | :--- | :--- | :--- |

    | None | This action does not require any input parameters. | N/A | N/A |


    ### Additional Notes

    - **Hash Support**: This action specifically requires SHA256 hashes. The logic
    includes a validation step to ensure the hash format is compatible with Cynet's
    API.

    - **Scope**: The action automatically discovers all hosts where the hash is present
    and attempts to kill the process on each one.


    ### Flow Description

    1. **Entity Identification**: The action iterates through the target entities
    to find `FILEHASH` objects.

    2. **Format Validation**: It checks if the hash is a valid SHA256 string.

    3. **Host Discovery**: It queries the Cynet API to retrieve a list of all host
    occurrences for the specified hash.

    4. **Process Termination**: For every host found, the action sends a command to
    Cynet to kill the process associated with that hash.

    5. **Status Verification**: It retrieves the remediation ID and status for each
    host to track the success of the operation.

    6. **Result Compilation**: Finally, it provides a summary of the remediation IDs
    and hostnames where the action was executed.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Kills running processes associated with the provided file hash on all hosts
      where it is detected in the Cynet environment.
