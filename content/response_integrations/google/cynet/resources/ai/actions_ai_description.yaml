Quarantine Hash In Hosts:
  ai_description: >-
    ### General Description

    The **Quarantine Hash In Hosts** action is a remediation capability designed to
    isolate malicious files across endpoints managed by Cynet. It specifically targets
    `FILEHASH` entities (SHA256) and automatically triggers a quarantine command on
    every host where the file is detected within the Cynet environment.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | N/A | N/A | N/A | This action does not take any input parameters. It uses the
    integration's global configuration for authentication. |


    ### Flow Description

    1. **Entity Filtering:** The action identifies all `FILEHASH` entities in the
    current context.

    2. **Hash Validation:** It verifies if the provided hash is a valid SHA256 format
    using the Cynet API.

    3. **Occurrence Discovery:** It queries Cynet to find all hostnames where the
    specific file hash has been observed.

    4. **Remediation Execution:** For every unique host identified, it sends a POST
    request to Cynet to initiate a "Quarantine File" remediation.

    5. **Status Tracking:** It retrieves the remediation ID for each host and checks
    the initial status of the action.

    6. **Reporting:** The action returns a summary of the remediation IDs mapped to
    their respective hostnames and provides a success/failure result value.


    ### Additional Notes

    This action is mutative as it changes the state of files on remote endpoints.
    It will only process entities identified as SHA256 hashes.
