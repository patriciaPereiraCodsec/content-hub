Ping:
  ai_description: >-
    ### General Description

    The **Ping** action is designed to verify the connectivity between Google SecOps
    and the AWS CloudTrail service. It ensures that the provided AWS credentials (Access
    Key ID and Secret Key) and the specified AWS Region are valid and have the necessary
    permissions to interact with the CloudTrail API. This is typically used during
    the initial setup or troubleshooting of the integration.


    ### Parameters Description

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **AWS Access Key ID** | String | Yes | The access key associated with an IAM
    user or role that has permissions to access CloudTrail. |

    | **AWS Secret Key** | String | Yes | The secret key associated with the AWS Access
    Key ID. |

    | **AWS Default Region** | String | Yes | The AWS region (e.g., us-east-1) where
    the CloudTrail events are located. |


    ### Additional Notes

    * This action does not process any entities.

    * It specifically attempts to call the `lookup_events` API with a limit of 1 result
    to minimize resource usage while confirming access.


    ### Flow Description

    1. **Initialization**: The action initializes the Siemplify context and logs the
    start of the process.

    2. **Parameter Extraction**: It retrieves the AWS configuration parameters (Access
    Key, Secret Key, and Region) from the integration's configuration settings.

    3. **Manager Setup**: It instantiates the `AWSCloudTrailManager` using the extracted
    credentials.

    4. **Connectivity Test**: The manager executes the `test_connectivity` method,
    which performs a `lookup_events` request to AWS CloudTrail for the last minute
    of 'insight' category events.

    5. **Validation**: The action checks if the AWS response contains a successful
    HTTP status code (200).

    6. **Finalization**: If successful, it returns a positive result and a success
    message. If any exception occurs (e.g., authentication failure, network timeout),
    it logs the error and reports a failed execution state.
