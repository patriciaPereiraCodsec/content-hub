name: AWS Cloud Trail - Insights Connector
parameters:
-   name: DeviceProductField
    default_value: Product Name
    type: string
    description: Enter the source field name in order to retrieve the Product Field
        name.
    is_mandatory: true
    is_advanced: false
    mode: regular
-   name: EventClassId
    default_value: CloudTrailEvent_insightDetails_insightType
    type: string
    description: Enter the source field name in order to retrieve the Event Field
        name.
    is_mandatory: true
    is_advanced: false
    mode: regular
-   name: Environment Field Name
    default_value: ''
    type: string
    description: Describes the name of the field where the environment name is stored.
        If the environment field isn't found, the environment is the default environment.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Environment Regex Pattern
    default_value: .*
    type: string
    description: A regex pattern to run on the value found in the "Environment Field
        Name" field. Default is .* to catch all and return the value unchanged. Used
        to allow the user to manipulate the environment field via regex logic. If
        the regex pattern is null or empty, or the environment value is null, the
        final environment result is the default environment.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: PythonProcessTimeout
    default_value: 180
    type: integer
    description: Timeout limit for the python process running the current script.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: AWS Access Key ID
    default_value: ''
    type: string
    description: AWS Access Key ID to use in integration.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: AWS Secret Key
    default_value: ''
    type: password
    description: AWS Secret Key to use in integration.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: AWS Default Region
    default_value: ''
    type: string
    description: AWS default region to use in integration, for example us-west-2.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Alert Severity
    default_value: Medium
    type: string
    description: 'Severity of the Siemplify Alerts created based on the insights.
        Possible values: Informational, Low, Medium, High, Critical'
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Max Insights To Fetch
    default_value: 50
    type: integer
    description: How many insights to process per one connector iteration. Maximum
        is 50.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Fetch Max Hours Backwards
    default_value: 1
    type: integer
    description: Number of hours before the first connector iteration to retrieve
        insights from. This parameter applies to the initial connector iteration after
        you enable the connector for the first time, or used as a fallback value in
        cases where connector's last run timestamp expires.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Use whitelist as a blacklist
    default_value: false
    type: boolean
    description: If enabled, whitelist will be used as a blacklist.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Verify SSL
    default_value: false
    type: boolean
    description: If enabled, verify the SSL certificate for the connection to the
        AWS Cloud Trail server is valid.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Proxy Server Address
    default_value: ''
    type: string
    description: The address of the proxy server to use.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Proxy Username
    default_value: ''
    type: string
    description: The proxy username to authenticate with.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Proxy Password
    default_value: ''
    type: password
    description: The proxy password to authenticate with.
    is_mandatory: false
    is_advanced: false
    mode: script
description: Pull insights from AWS Cloud Trail.
integration: AWSCloudTrail
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/aws-cloud-trail#connector
rules: []
is_connector_rules_supported: false
creator: admin
