identifier: SumoLogicCloudSIEM
name: Sumo Logic Cloud SIEM
parameters:
-   name: API Root
    default_value: https://{instance}
    type: string
    description: API root of the Sumo Logic Cloud SIEM instance.
    is_mandatory: true
    integration_identifier: SumoLogicCloudSIEM
-   name: API Key
    default_value: ''
    type: password
    description: 'API Key of the Sumo Logic Cloud SIEM account. Note: API key has
        priority over other authentication method.'
    is_mandatory: false
    integration_identifier: SumoLogicCloudSIEM
-   name: Access ID
    default_value: ''
    type: string
    description: 'Access ID of the Sumo Logic Cloud SIEM account. Note: both Access
        ID and Access Key are required for this type of authentication.'
    is_mandatory: false
    integration_identifier: SumoLogicCloudSIEM
-   name: Access Key
    default_value: ''
    type: password
    description: 'Access Key of the Sumo Logic Cloud SIEM account. Note: both Access
        ID and Access Key are required for this type of authentication.'
    is_mandatory: false
    integration_identifier: SumoLogicCloudSIEM
-   name: Verify SSL
    default_value: true
    type: boolean
    description: If enabled, verify the SSL certificate for the connection to the
        Sumo Logic Cloud SIEM server is valid.
    is_mandatory: true
    integration_identifier: SumoLogicCloudSIEM
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/sumo-logic-cloud-siem
categories:
- SIEM
svg_logo_path: resources/logo.svg
image_path: resources/image.png
