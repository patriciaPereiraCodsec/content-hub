Enrich Entities:
  ai_description: >-
    Enriches Hostname, User, and IP Address entities using information from Sumo Logic
    Cloud SIEM. This action retrieves detailed metadata for each entity, including
    activity scores, criticality levels, first/last seen timestamps, and whether the
    entity is suppressed or whitelisted. The retrieved data is used to populate entity
    enrichment fields, create data tables, and optionally generate insights within
    the Google SecOps case.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Create Insight | Boolean | No | If enabled (default: true), the action will
    create a detailed HTML insight for each enriched entity containing its activity
    score, criticality, and tags. |


    ### Flow Description

    1. **Initialization**: Extracts configuration parameters (API Root, Credentials,
    SSL settings) and the 'Create Insight' action parameter.

    2. **Entity Filtering**: Identifies supported entities (Hostname, IP Address,
    User) from the target entities list.

    3. **Data Retrieval**: For each supported entity, it queries the Sumo Logic Cloud
    SIEM API (`/entities`) using the entity's identifier.

    4. **Enrichment**: If data is found, it maps the results to the entity's additional
    properties (prefixed with 'SumoLogicCloudSIEM') and marks the entity as enriched.

    5. **Visualization**: Adds a flat data table to the entity and, if configured,
    generates a formatted HTML insight.

    6. **Finalization**: Updates the entities in the Google SecOps platform and returns
    a JSON summary of the results.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entity enrichment attributes, sets the 'is_enriched' status, and creates
      entity insights.
  categories:
