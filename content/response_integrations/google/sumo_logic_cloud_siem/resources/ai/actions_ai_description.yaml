Search Entity Signals:
  ai_description: >-
    ### General Description

    This action searches for security signals related to specific entities (IP Addresses,
    Hostnames, and Usernames) within Sumo Logic Cloud SIEM. It allows analysts to
    retrieve historical signal data to understand the context and frequency of security
    events associated with an entity over a specified period.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Lowest Severity To Return | Integer | No | Specifies the minimum severity level
    (1-10) for signals to be included in the results. Defaults to 5. |

    | Time Frame | Dropdown | No | Defines the search window. Options include relative
    times (e.g., 'Last Hour', 'Last 24 Hours'), times relative to the alert (e.g.,
    '30 Minutes Around Alert Time'), or 'Custom'. Defaults to 'Last Hour'. |

    | Start Time | String | No | The start time for the search in ISO 8601 format.
    This is **mandatory** if 'Time Frame' is set to 'Custom'. |

    | End Time | String | No | The end time for the search in ISO 8601 format. If
    'Custom' is selected and this is left blank, the current time is used. |

    | Max Signals To Return | Integer | No | The maximum number of signals to retrieve
    for each entity. Defaults to 50. |


    ### Additional Notes

    - The action supports **ADDRESS** (IP), **HOSTNAME**, and **USERUNIQNAME** entity
    types.

    - If 'Custom' is selected for the 'Time Frame', the 'Start Time' parameter must
    be provided, or the action will fail.

    - The 'Lowest Severity To Return' must be between 1 and 10; values outside this
    range will revert to the default (5).


    ### Flow Description

    1. **Initialization**: The action extracts integration configuration (API Root,
    Credentials) and action parameters (Severity, Timeframe, Limits).

    2. **Time Calculation**: It calculates the specific start and end timestamps based
    on the selected 'Time Frame' and any provided custom strings.

    3. **Entity Filtering**: The action iterates through the target entities in the
    current scope, filtering for supported types: IP Address, Hostname, and Username.

    4. **Data Retrieval**: For each supported entity, it queries the Sumo Logic Cloud
    SIEM API for signals that match the entity identifier, severity threshold, and
    time range.

    5. **Result Aggregation**: The retrieved signals are converted to JSON format
    and aggregated into a single result object.

    6. **Finalization**: The action provides a summary message of successful/failed
    entity searches and attaches the raw signal data as a JSON result.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
  categories:
    enrichment: true
