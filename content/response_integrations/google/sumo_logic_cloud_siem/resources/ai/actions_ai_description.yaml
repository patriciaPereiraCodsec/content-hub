Update Insight:
  ai_description: >-
    Updates the status and/or assignee of a specific insight in Sumo Logic Cloud SIEM.
    This action allows security analysts to programmatically manage the lifecycle
    of an insight by changing its operational state or reassigning it to a different
    user or team.


    ### Parameters Description


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Insight ID** | String | Yes | The unique identifier of the insight in Sumo
    Logic Cloud SIEM that needs to be updated. |

    | **Status** | Dropdown | Yes | The new status to assign to the insight. Options
    include: `New`, `In Progress`, and `Closed`. Selecting `Select One` will result
    in no status update unless an assignee is provided. |

    | **Assignee Type** | Dropdown | Yes | Specifies whether the `Assignee` parameter
    refers to a `User` or a `Team`. |

    | **Assignee** | String | No | The identifier (username or team name) of the person
    or group to whom the insight should be assigned. |


    ### Additional Notes

    - **Logic Dependency:** While the `Status` parameter is marked as mandatory in
    the configuration, the action logic requires that either a valid status (other
    than `Select One`) or an `Assignee` value must be provided for the action to perform
    an update. If both are empty/default, the action will fail.

    - **Output:** Upon successful update, the action retrieves and returns the full
    updated insight object in JSON format.


    ### Flow Description

    1. **Initialization:** Extracts the API configuration (API Root, Credentials)
    and action parameters (`Insight ID`, `Status`, `Assignee Type`, `Assignee`).

    2. **Validation:** Checks if at least one update (Status or Assignee) has been
    requested.

    3. **Assignee Update:** If an `Assignee` is provided, the action sends a PUT request
    to the Sumo Logic API to update the insight's assignee based on the specified
    `Assignee Type`.

    4. **Status Update:** If a valid `Status` is selected, the action sends a PUT
    request to the Sumo Logic API to update the insight's status.

    5. **Data Retrieval:** After the updates are processed, the action performs a
    GET request to fetch the latest state of the insight.

    6. **Completion:** The updated insight data is added to the action's JSON results,
    and the action completes successfully.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Updates the status and assignee fields of an insight record within the Sumo
      Logic Cloud SIEM platform via PUT requests.
    fetches_data: true
    internal_data_mutation_explanation: null
