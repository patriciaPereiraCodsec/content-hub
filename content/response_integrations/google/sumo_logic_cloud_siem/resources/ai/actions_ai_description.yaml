Ping:
  ai_description: >-
    ### General Description

    The **Ping** action is designed to verify the connectivity between Google SecOps
    and the Sumo Logic Cloud SIEM platform. It ensures that the provided credentials
    (API Key or Access ID/Key) and the API Root URL are correct and that the network
    path is open.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **API Root** | String | Yes | The base URL of the Sumo Logic Cloud SIEM instance.
    |

    | **API Key** | String | No | The API Key used for authentication. Either this
    or the Access ID/Key pair must be provided. |

    | **Access ID** | String | No | The Access ID for authentication. Used in conjunction
    with the Access Key. |

    | **Access Key** | String | No | The Access Key for authentication. Used in conjunction
    with the Access ID. |

    | **Verify SSL** | Boolean | No | If enabled, the action will verify the SSL certificate
    of the API Root. |


    ### Additional Notes

    * Authentication requires either the **API Key** or both the **Access ID** and
    **Access Key**.

    * This action does not process any entities.


    ### Flow Description

    1. **Parameter Extraction:** Retrieves connection details from the integration
    configuration.

    2. **Manager Initialization:** Sets up the Sumo Logic Cloud SIEM manager with
    the provided credentials and SSL settings.

    3. **Connectivity Test:** Executes a lightweight GET request to the `/insights`
    endpoint (limited to 1 result) to verify the API connection.

    4. **Result Reporting:** Returns a success message if the request is successful,
    or an error message detailing the failure.
