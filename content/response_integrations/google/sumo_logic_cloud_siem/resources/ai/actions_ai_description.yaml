    filters_by_is_vulnerable: false
    filters_by_modification_time: false
Add Tags To Insight:
  ai_description: >-
    ### General Description

    The **Add Tags To Insight** action allows users to append one or more tags to
    a specific insight within Sumo Logic Cloud SIEM. This is useful for categorizing
    insights, marking them for specific workflows, or adding metadata that can be
    used for filtering and reporting within the Sumo Logic platform.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Insight ID** | String | Yes | The unique identifier of the insight in Sumo
    Logic Cloud SIEM to which the tags will be added. |

    | **Tags** | String | Yes | A comma-separated list of tags (e.g., "HighPriority,
    Investigated, Phishing") to be applied to the insight. |


    ### Flow Description

    1. **Initialization**: The action initializes the Sumo Logic Cloud SIEM manager
    using the provided API credentials (API Key or Access ID/Key).

    2. **Input Parsing**: The comma-separated string of tags is converted into a Python
    list.

    3. **API Interaction**: For each tag in the list, the action sends a POST request
    to the Sumo Logic API endpoint `/insights/{insight_id}/tags`.

    4. **Result Processing**: The action captures the response from the final tag
    addition and returns it as a JSON result. It then provides a success message indicating
    the tags were added to the specified Insight ID.


    ### Additional Notes

    * This action does not run on entities; it requires a specific **Insight ID**
    as input.

    * If multiple tags are provided, the action performs a separate API call for each
    tag.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Adds tags to an existing insight in Sumo Logic Cloud SIEM by sending POST requests
      to the insight's tags endpoint.
    fetches_data: false
    internal_data_mutation_explanation: null
  categories:
