Add Comment To Insight:
  ai_description: >-
    ### General Description

    Adds a comment to a specific insight within Sumo Logic Cloud SIEM. This action
    allows security analysts to document findings, provide status updates, or collaborate
    on investigations directly from Google SecOps by pushing text-based comments to
    the external SIEM platform.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Insight ID | String | Yes | The unique identifier of the Sumo Logic Cloud SIEM
    insight where the comment will be added. |

    | Comment | String | Yes | The actual text content of the comment to be appended
    to the insight. |


    ### Flow Description

    1. **Initialization**: The action initializes the Sumo Logic Cloud SIEM manager
    using the provided API credentials (API Key or Access ID/Key) and connection settings.

    2. **Parameter Extraction**: It retrieves the mandatory `Insight ID` and the `Comment`
    text from the action input.

    3. **API Interaction**: The action performs a POST request to the Sumo Logic Cloud
    SIEM API endpoint `/insights/{insight_id}/comments` with the comment body.

    4. **Result Processing**: Upon a successful API response, the action returns the
    JSON data of the created comment and marks the execution as completed. If the
    API returns an error, the action fails and provides the error reason.


    ### Additional Notes

    This action does not operate on entities; it requires a specific Insight ID to
    be provided manually or via a previous playbook step.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Adds a new comment record to an existing insight in the Sumo Logic Cloud SIEM
      platform.
    fetches_data: false
    internal_data_mutation_explanation: null
  categories:
    enrichment: false
  entity_usage:
