name: Search Entity Signals
description: 'Search signals related to entities in Sumo Logic Cloud SIEM. Supported
    entities: IP Address, Hostname, Username.'
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/sumo-logic-cloud-siem#search_entity_signals
integration_identifier: SumoLogicCloudSIEM
parameters:
-   name: Lowest Severity To Return
    default_value: 5
    type: string
    description: 'Specify the lowest severity number that will be used to return signals.
        Maximum: 10.'
    is_mandatory: false
-   name: Time Frame
    default_value: Last Hour
    type: ddl
    optional_values:
    - Last Hour
    - Last 6 Hours
    - Last 24 Hours
    - Last Week
    - Last Month
    - 5 Minutes Around Alert Time
    - 30 Minutes Around Alert Time
    - 1 Hour Around Alert Time
    - Custom
    description: Specify a time frame for the results. If "Custom" is selected, you
        also need to provide "Start Time". If "30 Minutes Around Alert Time" is selected,
        action will search the alerts 30 minutes before the alert happened till the
        30 minutes after the alert has happened.  Same idea applies to "1 Hour Around
        Alert Time" and "5 Minutes Around Alert Time".
    is_mandatory: false
-   name: Start Time
    default_value: ''
    type: string
    description: 'Specify the start time for the results. This parameter is mandatory,
        if "Custom" is selected for the "Time Frame" parameter. Format: ISO 8601'
    is_mandatory: false
-   name: End Time
    default_value: ''
    type: string
    description: 'Specify the end time for the results. Format: ISO 8601. If nothing
        is provided and "Custom" is selected for the "Time Frame" parameter then this
        parameter will use current time.'
    is_mandatory: false
-   name: Max Signals To Return
    default_value: 50
    type: string
    description: 'Specify how many signals to return per entity. Default: 50.'
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/search_entity_signals_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
simulation_data_json: '{"Entities": ["ADDRESS", "HOSTNAME", "USERUNIQNAME"]}'
