Analyze File:
  ai_description: >-
    ### General Description

    Analyzes file hashes using Carbon Black Protection by submitting them to external
    analysis connectors (e.g., Palo Alto Networks, FireEye). This action is designed
    to trigger a deep analysis of files already present in the Carbon Black catalog
    and endpoint environment, retrieving the resulting security verdict to identify
    malicious or suspicious files.


    ### Parameters Description

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Connector Name | String | Yes | The name of the analyzing connector configured
    in Carbon Black Protection (e.g., 'Palo Alto Networks'). |

    | Priority | Integer | Yes | The priority of the analysis task, ranging from -2
    (lowest) to 2 (highest). |

    | Timeout | Integer | Yes | The maximum time in seconds to wait for the analysis
    results before timing out. |


    ### Additional Notes

    * This action specifically supports **MD5** hashes (32 characters). Other hash
    types will be skipped.

    * The file must already exist in the Carbon Black File Catalog and must be present
    on at least one computer in the environment for analysis to be possible.


    ### Flow Description

    1. **Initialization**: Retrieves the API configuration and identifies the internal
    ID of the specified analysis connector.

    2. **Entity Filtering**: Iterates through the target entities, selecting only
    those of type `FILEHASH` with a length of 32 characters (MD5).

    3. **Pre-check**: For each valid hash, verifies that the file exists in the Carbon
    Black catalog and is associated with at least one endpoint.

    4. **Analysis Request**: Submits a POST request to Carbon Black Protection to
    initiate a new file analysis job with the specified priority.

    5. **Polling**: Waits and polls the Carbon Black API for the analysis status until
    the job is completed or the timeout is reached.

    6. **Verdict Retrieval**: Fetches the final analysis results and determines if
    the file is malicious or suspicious.

    7. **Internal Update**: If the file is flagged as a threat, the entity's 'is_suspicious'
    status is updated in Google SecOps, and the full analysis JSON is attached to
    the action results.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: >-
      Initiates a new file analysis job in Carbon Black Protection by sending a POST
      request to the fileAnalysis endpoint, which creates a task for the external
      analysis connector.
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates the 'is_suspicious' attribute of FILEHASH entities within Google SecOps
      based on the analysis results returned by Carbon Black.
  categories:
    enrichment: false
  entity_usage:
    entity_types:
    - FILEHASH
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: true
    filters_by_identifier: false
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: false
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
Block Hash:
  ai_description: >-
    ### General Description

    Blocks specific file hashes (MD5) within Carbon Black Protection. This action
    allows security analysts to ban malicious or unauthorized files either globally
    across the entire environment or specifically within designated policies. It interacts
    with the Carbon Black Protection API to create or update file rules, ensuring
    that the specified hashes are prevented from executing on protected endpoints.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Policy Names | String | No | A comma-separated list of policy names where the
    block rule should be applied (e.g., 'Default Policy, Local Approval Policy').
    If left empty, the action typically applies the block globally depending on the
    manager's configuration. |


    ### Additional Notes

    - This action specifically validates and processes **MD5** hashes. Other hash
    types (SHA1, SHA256) are not supported by the underlying `ban_hash` logic in this
    integration.

    - If a rule already exists for a hash, the action will append the new policy IDs
    to the existing rule rather than overwriting it.


    ### Flow Description

    1. **Initialization**: Connects to the Carbon Black Protection server using the
    configured API Root and API Key.

    2. **Policy Resolution**: If 'Policy Names' are provided, the action retrieves
    the unique internal IDs for each named policy from the Carbon Black server.

    3. **Entity Filtering**: Iterates through the target entities in the Google SecOps
    case, specifically selecting those of type `FILEHASH`.

    4. **Hash Banning**: For each valid MD5 hash, it calls the Carbon Black API to
    create a 'Banned' file rule associated with the identified policy IDs (or global
    ID).

    5. **Internal Update**: Updates the entities within the Google SecOps platform
    to reflect the action's execution and provides a summary message of successful
    blocks and any errors encountered.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: >-
      Creates or updates file rules in Carbon Black Protection to set the file state
      to 'banned' (state 3) for specific MD5 hashes.
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates the entity objects within the Google SecOps case to reflect that they
      have been processed by the block action.
  categories:
    enrichment: false
  entity_usage:
