Find File:
  ai_description: >-
    ### General Description

    The **Find File** action searches for specific file instances across endpoints
    managed by Carbon Black Protection. It is used to identify the locations (computers
    and paths) where a file, identified by its MD5 hash, exists within the environment.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | N/A | N/A | N/A | This action does not require any input parameters. |


    ### Additional Notes

    * This action strictly supports **MD5** hashes. It validates that the entity identifier
    is exactly 32 characters long before processing.

    * The results are attached to the entity as a CSV table for easy viewing in the
    Google SecOps UI.


    ### Flow Description

    1. **Initialization:** The action connects to the Carbon Black Protection server
    using the provided API Root and API Key.

    2. **Entity Filtering:** It iterates through the target entities and selects only
    those of type `FILEHASH`.

    3. **Hash Validation:** For each hash, it verifies the length is 32 characters
    (MD5 format).

    4. **Data Retrieval:** It queries the Carbon Black Protection manager to find
    the file catalog entry and all associated file instances.

    5. **Data Transformation:** If instances are found, the raw data is flattened
    and converted into a CSV-formatted list.

    6. **Internal Update:** The CSV data is attached to the specific entity as an
    'Entity Table'.

    7. **Completion:** The action returns a summary message and the full JSON result
    set containing all found file instance details.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      The action adds data tables (CSV format) to the entities within the Google SecOps
      case to display file instance details.
