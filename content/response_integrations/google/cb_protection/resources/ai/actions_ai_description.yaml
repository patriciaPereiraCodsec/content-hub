Ping:
  ai_description: >-
    ### General Description

    The **Ping** action is a diagnostic utility designed to verify the connectivity
    between the Google SecOps environment and the Carbon Black Protection (formerly
    Bit9) server. Its primary purpose is to ensure that the integration configuration,
    specifically the API Root and API Key, is correct and that the network communication
    is functional.


    ### Parameters Description

    This action does not require any input parameters. It relies entirely on the global
    integration configuration settings ('Api Root' and 'Api Key') defined for the
    Carbon Black Protection integration.


    ### Additional Notes

    - This action is typically used during the initial setup of the integration or
    for troubleshooting connectivity issues.

    - According to standard SOAR categorization, Ping actions are not classified as
    enrichment actions.


    ### Flow Description

    1. **Configuration Retrieval**: The action fetches the 'Api Root' and 'Api Key'
    from the integration's configuration block.

    2. **Manager Initialization**: It attempts to initialize the `CBProtectionManager`
    using the retrieved credentials. This process sets up the HTTP session and the
    Carbon Black Enterprise Protection API client.

    3. **Connectivity Validation**: If the initialization completes without raising
    an exception, the action assumes a successful connection.

    4. **Result Reporting**: The action terminates with a success message indicating
    that the connection to the server address was established.
