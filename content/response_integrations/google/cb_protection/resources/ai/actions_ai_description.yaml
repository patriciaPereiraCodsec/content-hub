Get System Info:
  ai_description: >-
    ### General Description

    The **Get System Info** action retrieves comprehensive metadata about computer
    systems from Carbon Black Protection (formerly Bit9). It targets IP Address and
    Hostname entities within a case to provide security analysts with critical context
    such as the operating system, MAC address, installed agent version, and the current
    security policy applied to the device.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | None | N/A | N/A | This action does not require any input parameters. It relies
    on the integration's global configuration (API Root and API Key). |


    ### Additional Notes

    * This action automatically marks entities as 'enriched' upon successful data
    retrieval.

    * It populates the entity's 'additional_properties' with a 'CBProtection' prefix
    for easy identification in the UI.

    * A summary table is attached to each successfully enriched entity for quick reference.


    ### Flow Description

    1. **Connection**: Establishes a session with the Carbon Black Protection server
    using configured credentials.

    2. **Entity Filtering**: Identifies all `ADDRESS` and `HOSTNAME` entities present
    in the current alert or case.

    3. **API Query**: For each identified entity, the action queries the Carbon Black
    Protection API (using IP or Hostname) to fetch the corresponding computer object.

    4. **Data Processing**: If a record is found, the action flattens the JSON response
    and maps it to the entity's attributes.

    5. **UI Enhancement**: Generates a CSV-formatted table containing key system details
    (ID, Hostname, MAC, IP, Policy, Connection Status, OS) and attaches it to the
    entity.

    6. **State Update**: Updates the entities in the Google SecOps environment to
    reflect the new enrichment data and returns a success message.
