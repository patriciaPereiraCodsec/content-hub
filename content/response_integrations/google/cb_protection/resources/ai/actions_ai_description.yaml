Unblock Hash:
  ai_description: >-
    ### General Description

    Unblocks specific FileHash entities within Carbon Black Protection. This action
    allows users to remove blocks on hashes either globally or for specific policies
    by modifying or deleting existing file rules in the Carbon Black environment.
    It is primarily used to remediate false positives or restore access to files that
    were previously banned.


    ### Parameters Description

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Policy Names | String | No | A comma-separated list of policy names (e.g., "Default
    Policy, Local Approval Policy") from which the hash should be unblocked. If left
    empty, the action may fail during policy resolution. |


    ### Additional Notes

    - The action specifically validates that the hash is a valid MD5 (32 characters)
    before attempting the unblock operation.

    - If the removal of specified policies leaves a rule with no associated policies,
    the rule is deleted entirely from Carbon Black Protection.


    ### Flow Description

    1. **Initialization**: Connects to the Carbon Black Protection server using the
    configured API Root and API Key.

    2. **Policy Resolution**: Parses the 'Policy Names' parameter and retrieves the
    unique internal IDs for each named policy from the Carbon Black API.

    3. **Entity Processing**: Iterates through the target entities, filtering for
    those of type `FILEHASH`.

    4. **Rule Modification**: For each valid hash, it fetches the existing file rule.
    It then subtracts the target policy IDs from the rule's current policy list.

    5. **External Mutation**: Updates the rule in Carbon Black Protection with the
    reduced policy list or deletes the rule if no policies remain.

    6. **Internal Update**: Updates the entities within Google SecOps to reflect that
    the unblock operation was attempted.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
