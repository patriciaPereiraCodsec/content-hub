Change Computer Policy:
  ai_description: >-
    ### General Description

    This action moves a computer to a new policy within Carbon Black Protection (formerly
    Bit9). It identifies the target computer using either its IP address or hostname
    and updates its policy assignment in the external system. This is typically used
    for containment or applying stricter security controls during an incident.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Policy Name | String | Yes | The name of the target policy in Carbon Black Protection
    (e.g., 'High Security', 'Default Policy') to which the computer should be moved.
    |


    ### Additional Notes

    - The action supports both IP Address and Hostname entities.

    - It performs a lookup to find the internal ID of the policy based on the provided
    name before attempting the move.


    ### Flow Description

    1. **Initialization**: Connects to the Carbon Black Protection server using the
    provided API root and key.

    2. **Entity Processing**: Iterates through the target entities in the current
    context.

    3. **Computer Lookup**: For each entity, it queries Carbon Black to find a matching
    computer record using the IP address (for ADDRESS entities) or hostname (for HOSTNAME
    entities).

    4. **Policy Update**: If a computer is found, it retrieves the ID for the specified
    'Policy Name' and sends a PUT request to the Carbon Black API to update the computer's
    policy assignment.

    5. **Internal Update**: Updates the entities in Google SecOps to reflect that
    they were processed.

    6. **Reporting**: Returns a summary message indicating which computers were successfully
    moved and any errors encountered during the process.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: >-
      Updates the policy assignment for the specified computer in Carbon Black Protection
      via a PUT request to the /api/bit9platform/v1/computer/{id} endpoint.
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates the entity objects in Google SecOps using the update_entities method
      to track the action's execution status.
  categories:
