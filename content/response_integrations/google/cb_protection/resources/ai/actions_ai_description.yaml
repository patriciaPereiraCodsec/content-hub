Get Computers By File:
  ai_description: >-
    ### General Description\nThe **Get Computers By File** action identifies all endpoints
    within the environment where a specific file hash is present. It leverages Carbon
    Black Protection to map a file hash to its corresponding file catalog entry and
    then discovers all instances of that file across managed computers. This action
    is primarily used for scoping the spread of a potentially malicious file during
    an investigation.\n\n### Parameters\n| Parameter | Type | Mandatory | Description
    |\n| :--- | :--- | :--- | :--- |\n| None | N/A | N/A | This action does not require
    any user-configurable input parameters. |\n\n### Flow Description\n1. **Entity
    Filtering**: The action identifies all `FILEHASH` entities within the current
    alert context.\n2. **Hash Validation**: It verifies that the file hash is an MD5
    (32 characters in length). If the hash does not meet this criteria, it is skipped.\n3.
    **Catalog Lookup**: It queries the Carbon Black Protection File Catalog to find
    the unique entry associated with the MD5 hash.\n4. **Instance Discovery**: It
    retrieves all `FileInstance` records linked to that catalog entry to identify
    which computers host the file.\n5. **Endpoint Enrichment**: For each unique computer
    found, it fetches detailed metadata including Hostname, IP Address, MAC Address,
    Operating System, Policy Name, and Connection Status.\n6. **Data Output**: The
    gathered information is attached to the entity as a data table (CSV) and returned
    as a JSON result for use in subsequent playbook steps.\n\n### Additional Notes\n*
    **Hash Type Support**: While the integration metadata mentions SHA-256, the current
    implementation is hardcoded to only process MD5 hashes (32-character strings).\n*
    **Data Visualization**: Results are presented in a CSV-formatted table attached
    directly to the entity in the Google SecOps UI.
  capabilities:
    can_create_case_comments: false
