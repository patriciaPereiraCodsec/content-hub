    can_mutate_external_data: true
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: >-
      Updates or deletes File Rules (bans) in Carbon Black Protection to remove blocks
      on specific file hashes for designated policies.
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates the entity objects within the Google SecOps case to reflect the processing
      status.
