Ping:
  ai_description: "### General Description\nThe **Ping** action is a diagnostic utility\
    \ designed to verify the connectivity between Google SecOps and an **Anomali Staxx**\
    \ instance. It validates that the integration's configuration parameters\u2014\
    such as the server address, credentials, and SSL settings\u2014are correct and\
    \ that the external service is reachable.\n\n### Parameters Description\nThis\
    \ action does not utilize any action-specific input parameters. Instead, it relies\
    \ on the global integration configuration:\n\n| Parameter | Type | Mandatory |\
    \ Description |\n| :--- | :--- | :--- | :--- |\n| **Server Address** | String\
    \ | Yes | The base URL of the Anomali Staxx server. |\n| **Username** | String\
    \ | Yes | The username used for API authentication. |\n| **Password** | String\
    \ | Yes | The password used for API authentication. |\n| **Verify SSL** | Boolean\
    \ | Yes | If enabled, the action will verify the SSL certificate of the Anomali\
    \ Staxx server. |\n\n### Flow Description\n1. **Initialization**: The action extracts\
    \ the connection details (Server Address, Username, Password, and SSL verification\
    \ preference) from the integration settings.\n2. **Authentication**: It attempts\
    \ to log in to the Anomali Staxx server via the `/api/v1/login` endpoint to obtain\
    \ a valid API token.\n3. **Connectivity Verification**: Using the retrieved token,\
    \ the action performs a minimal query (confidence > 0) against the `/api/v1/intelligence`\
    \ endpoint to ensure the API is fully functional and authorized.\n4. **Final Status**:\
    \ If the API call is successful, the action returns a completion state. If any\
    \ step fails (e.g., network error, invalid credentials), it catches the exception\
    \ and reports a failure."
