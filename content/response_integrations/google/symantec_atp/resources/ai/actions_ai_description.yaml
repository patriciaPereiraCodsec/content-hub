Add Comment To Incident:
  ai_description: >-
    ### General Description

    Adds a comment to a specific incident within the Symantec ATP platform. This action
    is used to document findings, provide updates, or add context to an existing incident
    record in the external system.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Incident UUID | String | Yes | The unique identifier (UUID) of the Symantec
    ATP incident to which the comment will be attached. |

    | Comment | String | Yes | The text content of the comment. Note: Symantec ATP
    imposes a limit of 512 characters for comments. |


    ### Additional Notes

    - This action does not interact with Google SecOps entities; it operates solely
    based on the provided Incident UUID parameter.

    - The action uses a PATCH request to the Symantec ATP API to append the comment.


    ### Flow Description

    1. **Initialization**: The action initializes the Symantec ATP manager using the
    API Root, Client ID, and Client Secret from the integration configuration.

    2. **Parameter Extraction**: It retrieves the `Incident UUID` and the `Comment`
    text from the user input.

    3. **API Interaction**: It calls the `add_incident_comment` method in the manager,
    which sends a JSON PATCH request to the Symantec ATP incidents endpoint.

    4. **Result Handling**: The action checks if the comment was successfully added
    and returns a corresponding success or failure message to the Google SecOps workbench.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Adds a new comment to an existing incident record in the Symantec ATP platform
      via an API PATCH request.
    fetches_data: false
    internal_data_mutation_explanation: null
  categories:
