Get Commands Status:
  ai_description: >-
    ### General Description

    Retrieves the status and detailed report of specific commands previously executed
    in Symantec ATP. This action is useful for tracking the progress or outcome of
    asynchronous tasks like endpoint isolation or file deletion.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Commands IDs | String | Yes | A comma-separated list of unique Command IDs for
    which to retrieve status information. |


    ### Flow Description

    1. **Input Parsing**: The action accepts a comma-separated string of Command IDs.

    2. **API Interaction**: For each provided ID, the action queries the Symantec
    ATP API (`atpapi/v2/commands/{id}`) using a query verb to fetch the status report.

    3. **Data Processing**: The retrieved JSON response for each command is flattened
    and converted into a CSV format.

    4. **Internal Update**: A data table is created within the Google SecOps case
    for each Command ID, displaying the full status report.

    5. **Final Output**: The action concludes by providing a summary message and a
    concatenated string of status messages as the result value.


    ### Additional Notes

    This action does not operate on entities and relies solely on the provided Command
    IDs. If multiple IDs are provided, it will attempt to fetch data for each one
    sequentially.
