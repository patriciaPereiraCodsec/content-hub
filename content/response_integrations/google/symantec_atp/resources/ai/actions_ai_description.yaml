Update Incident Resolution:
  ai_description: >-
    Updates the resolution status of a specific incident in Symantec ATP. This action
    allows users to programmatically set the resolution and state of an incident within
    the Symantec ATP console.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Incident UUID | String | Yes | The unique identifier (UUID) of the incident
    in Symantec ATP that needs to be updated. |

    | Resolution Status | String | Yes | The resolution status to be applied to the
    incident. Supported values: `INSUFFICIENT DATA`, `SECURITY RISK`, `FALSE POSITIVE`,
    `MANAGED EXTERNALLY`, `NOT SET`, `BENIGN`, `TEST`. |


    ### Flow Description

    1. **Parameter Extraction**: The action retrieves the `Incident UUID` and the
    selected `Resolution Status` from the input parameters.

    2. **Status Mapping**: The string-based resolution status is mapped to its corresponding
    integer value required by the Symantec ATP API (e.g., 'SECURITY RISK' maps to
    1).

    3. **API Interaction**: The action sends a `PATCH` request to the Symantec ATP
    `/atpapi/v2/incidents` endpoint. This request performs two operations: it replaces
    the incident's state with '4' (typically representing a closed/resolved state)
    and updates the 'resolution' field with the mapped integer value.

    4. **Error Handling**: The action specifically handles cases where the incident
    is not found (404) or the API token lacks sufficient permissions (403).

    5. **Completion**: The action returns a success message if the update is confirmed
    by the external system, or a failure message if an error occurs.
