Add To WhiteList:
  ai_description: >-
    ### General Description

    The **Add To WhiteList** action allows users to create new whitelist policies
    within Symantec ATP for specific entities identified in a case. By whitelisting
    entities such as IP addresses, hostnames, URLs, and SHA256 file hashes, security
    teams can reduce false positives and ensure that known-safe assets or indicators
    do not trigger unnecessary alerts in the Symantec ATP environment.


    ### Parameters Description

    There are no user-configurable parameters for this action. It operates directly
    on the entities present in the current context.


    ### Additional Notes

    * **MD5 Limitation:** Due to Symantec ATP platform limitations, MD5 hashes cannot
    be added to the whitelist. Only SHA256 hashes are supported for file-based whitelisting.

    * **Insight Generation:** For every entity successfully added to the whitelist,
    an insight is attached to the entity in Google SecOps to provide visibility into
    the action taken.


    ### Flow Description

    1. **Configuration Retrieval:** The action retrieves the Symantec ATP API credentials
    (API Root, Client ID, Client Secret) and SSL verification settings from the integration
    configuration.

    2. **Manager Initialization:** A connection is established with the Symantec ATP
    manager, including OAuth2 token retrieval.

    3. **Entity Iteration:** The action iterates through all target entities in the
    current scope.

    4. **Type-Specific Processing:**
        * **File Hashes:** Validates if the hash is SHA256. If so, it requests a whitelist
    policy creation.
        * **Hostnames/IPs/URLs:** Directly requests whitelist policy creation for
    these types.
    5. **External Mutation:** A POST request is sent to the Symantec ATP `atpapi/v2/policies/whitelist`
    endpoint to create the policy.

    6. **Internal Update:** Upon a successful API response, a SOAR insight is created
    for the entity, noting that it has been whitelisted.

    7. **Final Reporting:** The action concludes by providing a summary of which entities
    were successfully whitelisted and reporting any errors encountered during the
    process.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: true
    can_update_entities: false
    external_data_mutation_explanation: >-
      Creates a new whitelist policy in the Symantec ATP system for the specified
      entity (IP, Host, URL, or SHA256 Hash).
    fetches_data: false
    internal_data_mutation_explanation: >-
      Creates entity insights within Google SecOps to document the whitelisting action.
