Submit Files To Sandbox:
  ai_description: >-
    ### General Description

    Submits file hashes to the Symantec ATP sandbox for analysis. This action is used
    to trigger the detonation and inspection of suspicious files by providing their
    SHA256 hashes to the Symantec ATP platform. It is a proactive containment or investigation
    step that initiates an external analysis process.


    ### Parameters Description

    There are no user-configurable parameters for this action beyond the standard
    integration configuration (API Root, Client ID, Client Secret, and Verify SSL).


    ### Flow Description

    1. **Entity Identification**: The action iterates through all target entities
    provided in the current context.

    2. **Type Filtering**: It filters for entities of type **FILEHASH**.

    3. **Format Validation**: For each file hash, it validates that the identifier
    is in the **SHA256** format (64 characters) using the `is_hash_sha256` manager
    method.

    4. **Sandbox Submission**: It calls the Symantec ATP API's `analyze` endpoint
    to submit the valid SHA256 hashes for sandbox detonation.

    5. **Command Tracking**: The action retrieves a `command_id` for each successful
    submission to allow for future status tracking.

    6. **Completion**: The action concludes by returning a summary of the submitted
    hashes and providing the comma-separated list of command IDs as the result value.


    ### Additional Notes

    - **SHA256 Requirement**: This action strictly supports SHA256 hashes. MD5 or
    SHA1 hashes will be skipped.

    - **Asynchronous Operation**: This action only initiates the analysis; it does
    not wait for the sandbox results to be generated. A separate action would be required
    to check the status of the returned command IDs.
