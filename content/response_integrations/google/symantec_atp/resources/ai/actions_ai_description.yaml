Add To Blacklist:
  ai_description: >-
    ### General Description

    The **Add To Blacklist** action enables the creation of blacklist policies within
    Symantec ATP for specific entities identified in a Google SecOps case. This action
    is used to block malicious activity by blacklisting IP addresses, hostnames, file
    hashes, or URLs at the endpoint or network level via the Symantec ATP platform.


    ### Parameters Description

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | None | N/A | N/A | This action does not require any input parameters beyond
    the entities themselves. |


    ### Flow Description

    1. **Initialization**: The action connects to the Symantec ATP manager using the
    integration's configuration (API Root, Credentials, and SSL settings).

    2. **Entity Processing**: The action iterates through all entities attached to
    the alert/case.

    3. **Type Validation**: For each entity, the action determines its type and maps
    it to the corresponding Symantec ATP target type:
        * **File Hash**: Checks if the hash is SHA256 or MD5 and applies the policy
    accordingly.
        * **Hostname**: Maps the entity to a 'domain' target type.
        * **IP Address**: Maps the entity to an 'ip' target type.
        * **URL**: Maps the entity to a 'url' target type.
    4. **API Execution**: A POST request is sent to the Symantec ATP `atpapi/v2/policies/blacklist`
    endpoint to create the policy.

    5. **Insight Generation**: If the policy is successfully created, a Google SecOps
    entity insight is added to the entity, documenting the blacklisting event.

    6. **Final Status**: The action concludes by providing a summary message of all
    entities that were successfully blacklisted and any errors encountered during
    the process.


    ### Additional Notes

    This action performs a state-changing operation in Symantec ATP and should be
    used as a containment step in response to confirmed threats.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: true
    can_update_entities: false
    external_data_mutation_explanation: >-
      Creates a new blacklist policy entry in the Symantec ATP console for the provided
      entity (IP, Hostname, File Hash, or URL).
    fetches_data: false
    internal_data_mutation_explanation: >-
      Creates an entity insight in Google SecOps to record that the entity was successfully
      blacklisted in Symantec ATP.
