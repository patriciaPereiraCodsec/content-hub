Get Events  For Entity:
  ai_description: >-
    ### General Description

    The **Get Events For Entity** action retrieves historical event data from Symantec
    ATP for specific entities within a defined lookback period. It allows analysts
    to gather context on the activities associated with an IP address, hostname, or
    user by querying the Symantec ATP event logs.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Minutes Back To Fetch | Integer | Yes | Specifies the timeframe (in minutes)
    for the event search. The maximum lookback is 10,080 minutes (7 days), per Symantec
    ATP limitations. |


    ### Flow Description

    1. **Parameter Retrieval**: The action extracts the `Minutes Back To Fetch` value
    to define the search window.

    2. **Entity Filtering**: It identifies supported entities within the current context,
    specifically focusing on IP Addresses, Hostnames, and Usernames.

    3. **API Query**: For each valid entity, the action maps the entity type to the
    corresponding Symantec ATP search field (`device_ip`, `device_name`, or `user_name`)
    and requests events from the `/atpapi/v2/events` endpoint.

    4. **Data Transformation**: Retrieved events are flattened and converted into
    a CSV format.

    5. **Internal Updates**: The action attaches the event data as a table to the
    specific entity and updates the entity's state within Google SecOps.

    6. **Completion**: Returns the total count of events found across all processed
    entities.


    ### Additional Notes

    - This action is strictly read-only regarding the external Symantec ATP system;
    it does not modify any external logs or configurations.
