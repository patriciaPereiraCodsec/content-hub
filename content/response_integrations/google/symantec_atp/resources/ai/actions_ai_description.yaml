Isolate Endpoint:
  ai_description: >-
    ### General Description

    Isolates endpoint entities (IP address or Hostname) within Symantec Endpoint Protection
    (ATP) to contain potential threats. This action is a containment measure that
    changes the network state of the target machine to prevent further communication
    and mitigate threat propagation.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | N/A | N/A | N/A | This action does not require any input parameters. |


    ### Additional Notes

    * The action will report errors for any entities that cannot be found or are not
    managed within the Symantec ATP environment.

    * Successful isolation results in a Command ID being returned for each entity,
    which is also added to a data table in the case.


    ### Flow Description

    1. **Authentication**: The action initializes the Symantec ATP manager using the
    integration's configuration (API Root, Client ID, and Client Secret).

    2. **Entity Identification**: It filters the case for `ADDRESS` (IP) and `HOSTNAME`
    entities.

    3. **UUID Retrieval**: For each identified entity, the action queries the Symantec
    ATP API to find the corresponding internal `device_uid`.

    4. **Isolation Command**: Once the UUID is retrieved, the action issues an `isolate_endpoint`
    command to the Symantec ATP system.

    5. **Case Documentation**: If successful, the action adds an entity insight stating
    the command was sent and populates a data table named 'Command IDs' with the entity
    identifiers and their respective command IDs.
