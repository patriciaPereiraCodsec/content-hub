Get Incident Comments:
  ai_description: >-
    ### General Description

    The **Get Incident Comments** action retrieves all comments associated with a
    specific incident in Symantec ATP. This action allows security analysts to view
    the communication history, responder notes, and automated logs linked to an incident
    directly within Google SecOps, facilitating better context during investigation.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Incident UUID** | String | Yes | The unique identifier (UUID) of the Symantec
    ATP incident for which comments are being retrieved. |

    | **Max Comments To Return** | Integer | No | The maximum number of comments to
    fetch from the API. The default value is 20, and the maximum allowed value is
    1000 (enforced by Symantec ATP limitations). |


    ### Flow Description

    1. **Initialization**: The action extracts the integration configuration (API
    Root, credentials) and the action parameters (`Incident UUID` and `Max Comments
    To Return`).

    2. **Validation**: It ensures the `Max Comments To Return` does not exceed the
    Symantec ATP limit of 1000.

    3. **API Request**: The action calls the Symantec ATP API using a POST request
    with a query verb to retrieve comments for the specified incident.

    4. **Data Transformation**: The raw JSON response is parsed into `Comment` data
    models, which are then converted into a structured format for display.

    5. **Output**: The action populates a data table with the comment text, creation
    time, and source (responder name) and provides the full raw JSON results for use
    in playbooks.


    ### Additional Notes

    - If no comments are found for the provided UUID, the action will complete successfully
    but report that no comments were found.

    - The action handles specific error cases such as missing incidents (404) or permission
    issues (403) with descriptive error messages.
