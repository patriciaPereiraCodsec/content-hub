Get Sandbox Commands Status:
  ai_description: >-
    ### General Description

    Retrieves the status and results of sandbox analysis commands from Symantec ATP.
    This action allows users to track the progress and outcome of files previously
    submitted for sandbox detonation and analysis using their unique command IDs.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Commands IDs | String | Yes | A comma-separated list of Sandbox Command IDs
    to fetch the status for. |


    ### Additional Notes

    This action does not operate on entities. It requires specific Command IDs generated
    by previous sandbox submission actions to function. If multiple IDs are provided,
    the action will attempt to fetch the status for each one and aggregate the results.


    ### Flow Description

    1. **Initialization**: Connects to the Symantec ATP API using the provided credentials
    (API Root, Client ID, Client Secret) and SSL configuration.

    2. **Input Parsing**: Retrieves the `Commands IDs` input parameter and splits
    the comma-separated string into a list of individual command identifiers.

    3. **Status Retrieval**: Iterates through each Command ID and performs a GET request
    to the Symantec ATP sandbox command status endpoint (`atpapi/v2/sandbox/commands/{id}`).

    4. **Data Processing**: For each successful API response, the raw JSON data is
    flattened and converted into a CSV-formatted data table.

    5. **Result Aggregation**: Adds the generated data tables to the action results
    and sets the action's success status based on whether at least one command status
    was successfully retrieved.

    6. **Completion**: Returns a summary message to the SOAR platform, including any
    error messages encountered for specific IDs.
