Revoke From Blacklist:
  ai_description: >-
    ### General Description

    This action revokes (deletes) existing blacklist policies for specific entities
    within Symantec ATP. It is used to remove restrictions previously placed on indicators
    such as IP addresses, domains, URLs, or file hashes, allowing them to interact
    with the environment normally again.


    ### Parameters

    There are no additional parameters for this action. It operates directly on the
    entities provided in the current context.


    ### Flow Description

    1. **Authentication**: The action establishes a connection with the Symantec ATP
    service using the configured API credentials.

    2. **Entity Iteration**: The script iterates through all entities in the current
    Google SecOps scope.

    3. **Policy Identification**: For each entity, the action queries the Symantec
    ATP API to retrieve the list of active blacklist policies and identifies the specific
    ID associated with the entity's identifier.

    4. **Revocation**: If a matching blacklist policy is found, the action sends a
    DELETE request to Symantec ATP to remove that policy.

    5. **Internal Updates**: Upon successful revocation, the action adds an entity
    insight to the case in Google SecOps to document the change.

    6. **Reporting**: The action concludes by providing a summary of which entities
    were successfully revoked and detailing any errors encountered during the process.


    ### Additional Notes

    This action requires the entity identifier to exactly match the value stored in
    the Symantec ATP blacklist for a successful lookup and deletion.
