Delete WhiteList Policy:
  ai_description: >-
    ### General Description

    The **Delete WhiteList Policy** action removes specific entities from the whitelist
    in Symantec ATP. This action is used to revoke the 'trusted' status of an entity
    (such as an IP address, domain, or file hash), ensuring that Symantec ATP resumes
    standard security monitoring and policy enforcement for that entity.


    ### Parameters Description

    - **No Parameters**: This action does not require any user-defined parameters.
    It operates directly on the entities provided in the action's scope.


    ### Additional Notes

    - The action performs a lookup to find the internal Symantec ATP policy ID associated
    with the entity's identifier before attempting the deletion.

    - If an entity is not found in the whitelist, the action will report a failure
    for that specific entity but will continue to process other entities in the list.


    ### Flow Description

    1. **Authentication**: Connects to the Symantec ATP API using the configured Client
    ID and Client Secret to obtain a bearer token.

    2. **Policy Lookup**: For each target entity, the action queries the Symantec
    ATP whitelist policies to identify the unique ID associated with the entity's
    identifier (e.g., IP, Hostname, or Hash).

    3. **Policy Deletion**: Sends a DELETE request to the Symantec ATP API for each
    identified policy ID to remove the entity from the whitelist.

    4. **Result Summary**: Provides a summary of the operation, indicating whether
    the policies were successfully deleted or if errors occurred during the process.
