Delete Blacklist Policy:
  ai_description: >-
    ### General Description\nDeletes blacklist policies in Symantec ATP for specific
    entities including IP Addresses, File Hashes, and URLs. This action is used to
    remediate or reverse previous blocking actions by removing the entity's identifier
    from the global blacklist within the Symantec ATP environment.\n\n### Parameters
    Description\n| Parameter | Type | Mandatory | Description |\n| :--- | :--- | :---
    | :--- |\n| API Root | String | Yes | The API root URL of the Symantec ATP instance.
    |\n| Client ID | String | Yes | The Client ID for authentication. |\n| Client
    Secret | String | Yes | The Client Secret for authentication. |\n| Verify SSL
    | Boolean | No | If enabled, the SSL certificate will be verified. Default is
    False. |\n\n### Flow Description\n1. **Initialization**: Extracts configuration
    parameters and establishes a session with the Symantec ATP API.\n2. **Entity Selection**:
    Filters the target entities to process only supported types: ADDRESS, FILEHASH,
    and DestinationURL.\n3. **Policy Identification**: For each entity, the action
    searches the existing Symantec ATP blacklist to find a policy ID associated with
    the entity's identifier.\n4. **Deletion Execution**: If a policy is found, the
    action sends a DELETE request to Symantec ATP to remove that specific blacklist
    entry.\n5. **Finalization**: Provides a summary of successfully deleted policies
    and identifies any entities that were not found in the blacklist.
