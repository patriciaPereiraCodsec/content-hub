Get Events Free Query:
  ai_description: >-
    ### General Description

    This action fetches event data from Symantec ATP using a Lucene-style free query.
    It allows security analysts to perform custom searches across the Symantec ATP
    event database to retrieve specific logs related to investigations. The results
    are presented as a data table within the Google SecOps case.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Query | String | Yes | The Lucene query string used to search for events in
    Symantec ATP. |

    | Limit | String/Integer | Yes | The maximum number of events to retrieve. Note
    that Symantec ATP imposes a hard limit of 5000 events per query. |


    ### Additional Notes

    - This action does not run on specific entities; it performs a global search based
    on the provided query string.

    - The retrieved events are flattened and converted into a CSV format for display
    in the SOAR data table.


    ### Flow Description

    1. **Initialization**: The action initializes the Symantec ATP manager using the
    provided API credentials and configuration.

    2. **Parameter Retrieval**: It extracts the 'Query' and 'Limit' parameters from
    the action input.

    3. **API Execution**: It sends a POST request to the Symantec ATP `/atpapi/v2/events`
    endpoint with the query and limit.

    4. **Data Processing**: If events are found, the action flattens the JSON response
    and constructs a CSV-formatted table.

    5. **Internal Mutation**: The action adds the resulting CSV data as a new data
    table named 'Events Related to the Query' to the current case.

    6. **Completion**: The action concludes by reporting the total number of events
    found.
