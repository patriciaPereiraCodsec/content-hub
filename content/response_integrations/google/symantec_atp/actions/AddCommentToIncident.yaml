name: Add Comment To Incident
description: Attach comment to incident.
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/symantec-atp#add_comment_to_incident
integration_identifier: SymantecATP
parameters:
-   name: Incident UUID
    default_value: ''
    type: string
    description: Specify the UUID of the incident.
    is_mandatory: true
-   name: Comment
    default_value: ''
    type: string
    description: Specify the comment that you want to add to the incident. Limit is
        512 characters. This is Symantec ATP limitation.
    is_mandatory: true
dynamic_results_metadata: []
creator: Admin
script_result_name: is_added
