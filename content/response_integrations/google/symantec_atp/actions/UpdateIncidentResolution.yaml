name: Update Incident Resolution
description: Update resolution on the incident.
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/symantec-atp#update_incident_resolution
integration_identifier: SymantecATP
parameters:
-   name: Incident UUID
    default_value: ''
    type: string
    description: Specify the UUID of the incident.
    is_mandatory: true
-   name: Resolution Status
    default_value: INSUFFICIENT DATA
    type: ddl
    optional_values:
    - INSUFFICIENT DATA
    - SECURITY RISK
    - FALSE POSITIVE
    - MANAGED EXTERNALLY
    - NOT SET
    - BENIGN
    - TEST
    description: Specify what resolution status to set on the incident.
    is_mandatory: true
dynamic_results_metadata: []
creator: admin
script_result_name: 'is_success '
