name: Upload And Scan Files
description: Upload and scan files via VirusTotal. *Files can be uploaded from remote
    path (Windows share or Linux remote server).
integration_identifier: VirusTotal
parameters:
-   name: Threshold
    default_value: ''
    type: string
    description: Entity risk threshold.
    is_mandatory: true
-   name: File Paths
    default_value: ''
    type: string
    description: Target file path.
    is_mandatory: true
-   name: Linux Server Address
    default_value: ''
    type: string
    description: 'Linux server address(e.g: x.x.x.x).'
    is_mandatory: false
-   name: Linux User
    default_value: ''
    type: string
    description: Linux User
    is_mandatory: false
-   name: Linux Password
    default_value: ''
    type: password
    description: Linux Password
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/upload_and_scan_file_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: System
is_async: true
simulation_data_json: '{"Entities":[]}'
script_result_name: is_risky
