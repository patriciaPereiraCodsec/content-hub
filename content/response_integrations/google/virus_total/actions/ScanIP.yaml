name: Scan IP
description: Scan IP via VirusTotal. Returns table of reverse domains and full Json
    result
integration_identifier: VirusTotal
parameters:
-   name: Threshold
    default_value: 25
    type: string
    description: Specify the accepted threshold for the detected samples related to
        the IP address. If the number of engines that marked related samples as malicious
        is higher than the specified threshold, IP address will be marked as suspicious.
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/scan_ip_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: System
simulation_data_json: '{"Entities": ["ADDRESS"]}'
