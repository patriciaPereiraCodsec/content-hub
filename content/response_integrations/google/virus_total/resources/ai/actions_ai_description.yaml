    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: true
    filters_by_identifier: false
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: false
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
Ping:
  ai_description: "### General Description\nThe **Ping** action is a diagnostic tool\
    \ designed to verify the connectivity between Google SecOps and the VirusTotal\
    \ API. It ensures that the provided credentials (API Key) are valid and that the\
    \ network configuration (including SSL verification) allows for successful communication\
    \ with the VirusTotal service.\n\n### Parameters Description\n| Parameter | Type\
    \ | Mandatory | Description |\n| :--- | :--- | :--- | :--- |\n| **Api Key** |\
    \ String | Yes | The API key used to authenticate requests to VirusTotal. |\n\
    | **Verify SSL** | Boolean | No | If enabled, the action will verify the SSL certificate\
    \ of the VirusTotal API endpoint. Defaults to `False`. |\n\n### Flow Description\n\
    1. **Initialization**: The action retrieves the `Api Key` and `Verify SSL` settings\
    \ from the integration configuration.\n2. **Manager Setup**: It initializes the\
    \ `VirusTotalManager` with the provided credentials.\n3. **Connectivity Test**:\
    \ The action attempts to fetch a report for a dummy URL (`https://www.google.co.il`)\
    \ from the VirusTotal API.\n4. **Validation**: \n    * If the API returns a valid\
    \ response, the connection is marked as established.\n    * If a `403 Forbidden`\
    \ error occurs, it identifies an invalid API key.\n    * If any other exception\
    \ occurs (e.g., network timeout), it reports a general failure.\n5. **Completion**:\
    \ The action returns a boolean result (`true` for success, `false` for failure)\
    \ and a status message to the SOAR interface."
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
  categories:
