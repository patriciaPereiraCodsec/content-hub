Upload And Scan Files:
  ai_description: "Uploads and scans files using VirusTotal. This action supports\
    \ scanning local files or files located on a remote Linux server via SSH/SFTP.\
    \ It operates asynchronously, submitting files for analysis and then polling for\
    \ results. Once the scan is complete, it retrieves the full detection report and\
    \ community comments, attaching them as data tables and providing a direct link\
    \ to the VirusTotal analysis page. If the number of positive detections exceeds\
    \ a user-defined threshold, the action automatically generates a case insight\
    \ to highlight the risk.\n\n### Parameters Description\n\n| Parameter | Type |\
    \ Mandatory | Description |\n| :--- | :--- | :--- | :--- |\n| Threshold | Integer\
    \ | Yes | The number of positive detections required to trigger a risk alert and\
    \ create a case insight. |\n| File Paths | String | Yes | A comma-separated list\
    \ of file paths to be uploaded and scanned. |\n| Linux Server Address | String\
    \ | No | The IP address or hostname of the remote Linux server where the files\
    \ are located. |\n| Linux User | String | No | The username for SSH/SFTP authentication\
    \ on the remote Linux server. |\n| Linux Password | Password | No | The password\
    \ for SSH/SFTP authentication on the remote Linux server. |\n\n### Flow Description\n\
    \n1. **Initialization**: The action extracts the API key, file paths, and risk\
    \ threshold. If remote server details are provided, it prepares for SFTP access.\n\
    2. **File Submission (First Run)**: \n    - If a Linux server is specified, the\
    \ action connects via SFTP to retrieve the file content.\n    - The files are\
    \ uploaded to VirusTotal using the scan API.\n    - The action stores the resulting\
    \ scan IDs and enters an 'In Progress' state.\n3. **Status Polling (Subsequent\
    \ Runs)**: The action periodically checks VirusTotal to see if the analysis for\
    \ each scan ID is complete.\n4. **Result Retrieval**: Once scans are finished,\
    \ the action fetches the full report and any associated community comments.\n\
    5. **Data Enrichment**: \n    - Detailed detection results and comments are added\
    \ as data tables to the case.\n    - A permalink to the VirusTotal report is added\
    \ as a link.\n6. **Risk Assessment**: If the detection count exceeds the specified\
    \ threshold, a case insight is created to notify the analyst of the malicious\
    \ findings."
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: true
    can_update_entities: false
    external_data_mutation_explanation: >-
      Uploads files to VirusTotal for scanning and analysis, which creates new scan
      resources on the platform.
    fetches_data: true
    internal_data_mutation_explanation: >-
      Creates case insights if a file is found to be risky based on the provided detection
      threshold.
