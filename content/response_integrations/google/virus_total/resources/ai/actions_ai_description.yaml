Scan Hash:
  ai_description: >-
    Enriches File Hash entities by retrieving threat intelligence reports and comments
    from VirusTotal. The action supports asynchronous execution, allowing it to trigger
    new scans if a report is missing or outdated based on a user-defined threshold.
    It evaluates the risk of the file based on the number of positive detections from
    various antivirus engines and can automatically mark entities as suspicious within
    Google SecOps.


    ### Flow Description:

    1. **Entity Filtering:** Identifies all `FILEHASH` entities in the current context.

    2. **Initial Check:** Queries VirusTotal for existing reports for each hash. If
    a report exists and is within the 'Rescan after days' limit, it proceeds to enrichment.

    3. **Scan/Rescan Trigger:** If no report is found or the existing one is too old,
    the action submits the hash for a new scan and enters an 'In Progress' state.

    4. **Status Polling:** In subsequent runs, the action polls VirusTotal to check
    if the analysis is complete.

    5. **Data Retrieval:** Once the report is ready, it fetches the full analysis
    report and any associated community comments.

    6. **Enrichment & Insight:** Updates the entity with detailed metadata (MD5, SHA1,
    File Type, etc.), attaches a detection engine table, and adds a direct link to
    the VirusTotal analysis. If the number of positive detections meets or exceeds
    the 'Threshold', the entity is marked as suspicious and a detailed insight is
    generated.


    ### Parameters Description:

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Threshold | Integer | Yes | The minimum number of positive engine detections
    required to mark the entity as suspicious and create an insight. Default is 3.
    |

    | Rescan after days | Integer | No | If an existing report is older than this
    number of days, the action will automatically trigger a rescan of the file hash.
    |


    ### Additional Notes:

    - This action requires a valid VirusTotal API key. Note that 'Rescan' functionality
    may require a Private API key depending on VirusTotal's current tier limitations.

    - The action handles API rate limits gracefully by pausing and retrying in subsequent
    execution cycles.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entity attributes including 'is_suspicious', 'is_enriched', and 'additional_properties'.
      It also creates entity insights, data tables for scan results and comments,
      and adds entity links to the case.
  categories:
    enrichment: true
  entity_usage:
