Scan URL:
  ai_description: >-
    Scans URL entities using VirusTotal to retrieve reputation data and threat intelligence.
    This action operates asynchronously, meaning it can initiate a new scan if no
    recent report exists and wait for the results to be processed. It enriches the
    URL entity with detailed scan information, including risk scores, engine-specific
    detection results, and permalinks to the full analysis. Additionally, it can fetch
    user comments associated with the URL. If the number of positive engine detections
    meets or exceeds a user-defined threshold, the entity is marked as suspicious
    and a detailed insight is generated within the case.


    ### Parameters Description


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Threshold | Integer | Yes | The minimum number of positive engine detections
    required to mark an entity as suspicious. Default is 3. |

    | Rescan after days | Integer | No | The number of days after which the action
    will force a rescan of the URL if a report already exists. If not provided, the
    action will use the latest available report regardless of age. |


    ### Flow Description


    1. **Initialization**: The action retrieves the VirusTotal API key and SSL verification
    settings from the integration configuration.

    2. **Entity Identification**: It identifies all URL entities within the current
    scope.

    3. **Report Check/Scan Initiation**: For each URL, it checks if a report exists
    on VirusTotal. If no report exists, or if the existing report is older than the
    'Rescan after days' parameter, it initiates a new scan request.

    4. **Asynchronous Wait**: If new scans are initiated, the action enters an 'In
    Progress' state, periodically checking the status of the scan tasks until they
    are completed.

    5. **Data Retrieval**: Once the scan is complete (or if a valid existing report
    was found), the action retrieves the full report and any associated user comments.

    6. **Enrichment**: The action enriches the URL entities with detailed scan data,
    including a risk score, detection engines, and a permalink to the VirusTotal analysis.
    It also attaches data tables for engine results and comments.

    7. **Suspicion & Insights**: If the number of positive detections meets or exceeds
    the 'Threshold', the entity is marked as suspicious, and a detailed insight is
    added to the case.


    ### Additional Notes


    - This action requires a valid VirusTotal API key (Public or Private).

    - Public API keys are subject to rate limits which may cause the action to wait
    longer or fail if limits are exceeded.

    - The action supports asynchronous execution to handle the time required for VirusTotal
    to complete new URL scans.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entity enrichment data, sets the suspicious flag based on the detection
      threshold, adds entity insights, and attaches data tables containing scan results
      and comments.
  categories:
