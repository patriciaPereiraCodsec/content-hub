Get Domain Report:
  ai_description: >-
    ### General Description

    The **Get Domain Report** action retrieves comprehensive threat intelligence for
    domain-related entities (Hostnames, Users, and URLs) from VirusTotal. It provides
    critical context such as domain categories, resolutions, and reputation data from
    various security vendors to help analysts assess the risk associated with specific
    domains.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Api Key | String | Yes | The API key used to authenticate with the VirusTotal
    API. |

    | Verify SSL | Boolean | No | If enabled, the action will verify the SSL certificate
    of the VirusTotal API. Default is False. |


    ### Flow Description

    1. **Initialization**: The action retrieves the VirusTotal API key and SSL verification
    settings from the integration configuration.

    2. **Entity Filtering**: It identifies entities of type Hostname, User, or URL
    within the current alert scope.

    3. **Data Retrieval**: For each valid entity, the action extracts the domain name
    and queries the VirusTotal API for a domain report.

    4. **Enrichment**:
        * Updates the entity's additional properties with VirusTotal data (prefixed
    with 'VT').
        * Marks the entity as enriched.
        * Adds a data table to the entity containing a score report (categories, BitDefender
    info, Alexa rank, etc.).
        * Adds a direct link to the VirusTotal web report for the domain.
    5. **Completion**: Updates the entities in the SOAR platform and provides a summary
    message of the results.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entity additional properties with VirusTotal enrichment data, sets the
      is_enriched flag, and adds data tables and links to the entity.
  categories:
    enrichment: true
  entity_usage:
    entity_types:
    - HOSTNAME
    - DestinationURL
    - USERUNIQNAME
