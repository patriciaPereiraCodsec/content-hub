Scan IP:
  ai_description: "### General Description\nScans IP address entities using VirusTotal\
    \ to retrieve comprehensive threat intelligence and reputation data. This action\
    \ helps security analysts determine the risk level of external IP addresses by\
    \ aggregating detection data from multiple antivirus engines and scanning services.\
    \ It provides context such as geographic location (country), ASN information,\
    \ and historical domain resolutions.\n\n### Parameters Description\n| Parameter\
    \ | Type | Mandatory | Description |\n| :--- | :--- | :--- | :--- |\n| Threshold\
    \ | Integer | No | The minimum number of malicious detections (positives) required\
    \ to mark the IP entity as suspicious in Google SecOps. Defaults to 25. |\n\n\
    ### Flow Description\n1. **Entity Filtering**: The action identifies all `ADDRESS`\
    \ entities in the current scope that are not marked as internal.\n2. **API Query**:\
    \ For each valid entity, it queries the VirusTotal API to retrieve the IP address\
    \ report.\n3. **Enrichment**: The action updates the entity's additional properties\
    \ with the country, related domains, and the latest scan timestamp.\n4. **Risk\
    \ Assessment**: It compares the number of positive detections from the report\
    \ against the user-defined `Threshold`. If the threshold is met or exceeded, the\
    \ entity is marked as suspicious.\n5. **Insight & Visualization**: \n    * Creates\
    \ an **Entity Insight** summarizing malicious sample counts (referrer, downloaded,\
    \ communicating) and malicious URLs.\n    * Adds an **Entity Table** containing\
    \ historical domain resolutions (reverse DNS).\n    * Attaches an **Entity Link**\
    \ directly to the VirusTotal web report for deeper investigation.\n6. **Result\
    \ Reporting**: Updates the entities in the case and provides a full JSON result\
    \ of the VirusTotal report for downstream automation."
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entity enrichment fields (additional_properties), sets the 'is_suspicious'
      flag based on the detection threshold, and adds insights, links, and data tables
      to the entities within the case.
  categories:
    enrichment: true
  entity_usage:
    entity_types:
    - ADDRESS
    filters_by_additional_properties: false
