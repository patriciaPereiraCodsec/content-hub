name: Get Insight Details
description: Return detailed information about an insight in AWS Security Hub.
integration_identifier: AWSSecurityHub
parameters:
-   name: Insight ARN
    default_value: ''
    type: string
    description: Specify the ARN of the insight.
    is_mandatory: true
-   name: Max Results to Return
    default_value: '50'
    type: string
    description: Specify how many results to return.
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/get_insight_details_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: Admin
simulation_data_json: '{"Entities":[]}'
