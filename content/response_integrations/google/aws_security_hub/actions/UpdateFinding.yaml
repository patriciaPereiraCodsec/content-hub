name: Update Finding
description: Update findings in AWS Security Hub.
integration_identifier: AWSSecurityHub
parameters:
-   name: ID
    default_value: ''
    type: string
    description: Specify ID of the finding that you want to update.
    is_mandatory: true
-   name: Product ARN
    default_value: ''
    type: string
    description: Specify the product ARN of the finding that you want to update.
    is_mandatory: true
-   name: Note
    default_value: ''
    type: string
    description: 'Specify new text for the note on the finding. Note: If the “Note”
        parameter has a value, you should also fill out the “Note Author” parameter.
        This is an AWS Security Hub limitation.'
    is_mandatory: false
-   name: Note Author
    default_value: ''
    type: string
    description: 'Specify the author of the note. Note: If the “Note Author” parameter
        has a value, you should also fill out the “Note” parameter. This is an AWS
        Security Hub limitation.'
    is_mandatory: false
-   name: Severity
    default_value: Select One
    type: ddl
    optional_values:
    - Critical
    - High
    - Medium
    - Low
    - Informational
    - Select One
    description: Specify new severity for the finding.
    is_mandatory: false
-   name: Verification State
    default_value: Select One
    type: ddl
    optional_values:
    - Unknown
    - True Positive
    - False Positive
    - Benign Positive
    - Select One
    description: Specify a new verification state for the finding.
    is_mandatory: false
-   name: Confidence
    default_value: ''
    type: string
    description: Specify new confidence for the finding.
    is_mandatory: false
-   name: Criticality
    default_value: ''
    type: string
    description: Specify new criticality for the finding.
    is_mandatory: false
-   name: Types
    default_value: ''
    type: string
    description: 'Specify a comma-separated list of types for the finding. Example:
        type1,type2'
    is_mandatory: false
-   name: Workflow Status
    default_value: Select One
    type: ddl
    optional_values:
    - New
    - Notified
    - Resolved
    - Suppressed
    - Select One
    description: Specify new workflow status for the finding.
    is_mandatory: false
-   name: Custom Fields
    default_value: ''
    type: string
    description: Specify custom fields that should be updated in the finding. Format
        Custom_field_1:value,Custom_field_2:value
    is_mandatory: false
dynamic_results_metadata: []
creator: Admin
simulation_data_json: '{"Entities":[]}'
