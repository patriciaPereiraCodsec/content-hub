name: Create Insight
description: Create an insight in AWS Security Hub.
integration_identifier: AWSSecurityHub
parameters:
-   name: Insight Name
    default_value: ''
    type: string
    description: Specify the name of the insight.
    is_mandatory: true
-   name: Group By Attribute
    default_value: AWS Account ID
    type: ddl
    optional_values:
    - AWS Account ID
    - Company Name
    - Status
    - Generator ID
    - Malware Name
    - Process Name
    - Threat Intel Type
    - Product ARN
    - Product Name
    - Record State
    - EC2 Instance Image ID
    - EC2 Instance IPv4
    - EC2 Instance IPv6
    - EC2 Instance Key Name
    - EC2 Instance Subnet ID
    - EC2 Instance Type
    - EC2 Instance VPC ID
    - IAM Access Key User Name
    - S3 Bucket Owner Name
    - Container Image ID
    - Container Image Name
    - Container Name
    - Resource ID
    - Resource Type
    - Severity Label
    - Source URL
    - Type
    - Verification State
    - Workflow Status
    description: Specify the name of the attribute by which findings should be grouped
        under one insight.
    is_mandatory: true
-   name: Filter JSON Object
    default_value: ''
    type: string
    description: Specify a filter for the findings. Filter is represented as a JSON
        object, where you can specify different attributes and values. Please refer
        to action documentation for more details.
    is_mandatory: true
dynamic_results_metadata:
-   result_example_path: resources/create_insight_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: Admin
simulation_data_json: '{"Entities":[]}'
