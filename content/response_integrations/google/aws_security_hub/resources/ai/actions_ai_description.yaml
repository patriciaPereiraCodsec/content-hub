Create Insight:
  ai_description: "Creates a new insight in AWS Security Hub. Insights are collections\
    \ of findings that are aggregated by a specific attribute, allowing for better\
    \ visualization and analysis of security trends within an AWS environment.\n\n\
    ### Parameters\n| Parameter | Type | Mandatory | Description |\n| :--- | :---\
    \ | :--- | :--- |\n| Insight Name | String | Yes | The display name for the new\
    \ insight. |\n| Group By Attribute | String (Dropdown) | Yes | The attribute used\
    \ to group the findings (e.g., AWS Account ID, Severity Label, Resource Type).\
    \ |\n| Filter JSON Object | String (JSON) | Yes | A JSON object defining the filters\
    \ for the findings to be included in the insight. |\n\n### Flow Description\n\
    1. **Validation**: The action parses and validates the provided `Filter JSON Object`\
    \ to ensure it is a valid JSON structure.\n2. **Mapping**: It maps the user-friendly\
    \ `Group By Attribute` selection to the corresponding AWS Security Hub API attribute\
    \ name.\n3. **Connectivity**: It establishes a connection to the AWS Security\
    \ Hub service using the provided credentials and region.\n4. **Creation**: It\
    \ calls the AWS `create_insight` API with the specified name, filters, and grouping\
    \ criteria.\n5. **Output**: Upon success, it returns the Amazon Resource Name\
    \ (ARN) of the newly created insight and provides a success message.\n\n### Additional\
    \ Notes\n* The `Filter JSON Object` must follow the AWS Security Hub `AwsSecurityHubFilters`\
    \ structure. \n* This action does not operate on specific entities within the\
    \ Google SecOps case; it performs a global configuration task in AWS."
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Creates a new 'Insight' resource within the AWS Security Hub service.
    fetches_data: false
    internal_data_mutation_explanation: null
  categories:
    enrichment: false
  entity_usage:
