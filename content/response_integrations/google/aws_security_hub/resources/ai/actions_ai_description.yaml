Ping:
  ai_description: >-
    ### General Description

    The **Ping** action is a diagnostic tool designed to verify the connectivity between
    Google SecOps and the AWS Security Hub service. It ensures that the provided AWS
    credentials (Access Key ID and Secret Key) and the specified region are correct
    and that the environment can successfully communicate with the AWS API.


    ### Parameters Description

    This action does not take any direct input parameters. Instead, it utilizes the
    global integration configuration parameters:


    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **AWS Access Key ID** | String | Yes | The access key for the AWS account. |

    | **AWS Secret Key** | String | Yes | The secret key for the AWS account. |

    | **AWS Default Region** | String | Yes | The AWS region where Security Hub is
    enabled (e.g., us-east-1). |


    ### Flow Description

    1. **Configuration Extraction:** The action retrieves the AWS Access Key, Secret
    Key, and Default Region from the integration's configuration settings.

    2. **Manager Initialization:** It initializes the `AWSSecurityHubManager` using
    the extracted credentials.

    3. **Connectivity Test:** The manager executes the `test_connectivity` method,
    which internally calls the AWS `get_master_account` API method.

    4. **Validation:** The action validates the response from AWS. If the API call
    returns a successful status code (200), the connection is confirmed.

    5. **Result Reporting:** The action returns a success status and message if the
    connection is established; otherwise, it catches the exception and reports a failure
    with the error details.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
  categories:
    enrichment: false
