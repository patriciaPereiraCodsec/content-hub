Update Insight:
  ai_description: "### General Description\nThe **Update Insight** action allows users\
    \ to modify the configuration of an existing insight within AWS Security Hub.\
    \ Insights are collections of findings that are grouped together based on specific\
    \ attributes, helping security teams identify trends and prioritize responses.\
    \ This action can update the insight's name, the attribute used for grouping findings,\
    \ and the filters that define which findings are included in the insight.\n\n\
    ### Parameters Description\n| Parameter | Type | Mandatory | Description |\n|\
    \ :--- | :--- | :--- | :--- |\n| **Insight ARN** | String | Yes | The Amazon Resource\
    \ Name (ARN) of the insight that needs to be updated. |\n| **Insight Name** |\
    \ String | No | The new name to assign to the insight. |\n| **Group By Attribute**\
    \ | Dropdown | No | The attribute by which findings should be grouped (e.g., AWS\
    \ Account ID, Severity Label, Resource Type). If 'Select One' is chosen, this\
    \ parameter is ignored. |\n| **Filter JSON Object** | String (JSON) | No | A JSON-formatted\
    \ string representing the filters for the findings. This allows for complex filtering\
    \ logic based on AWS Security Hub's finding schema. |\n\n### Additional Notes\n\
    - The action requires valid AWS credentials (Access Key, Secret Key, and Default\
    \ Region) configured in the integration settings.\n- If the **Filter JSON Object**\
    \ is provided, it must be a valid JSON string; otherwise, the action will fail\
    \ during the validation phase.\n- If **Group By Attribute** is not specified or\
    \ set to 'Select One', the existing grouping attribute of the insight remains\
    \ unchanged.\n\n### Flow Description\n1. **Initialization**: The action retrieves\
    \ AWS configuration parameters and action-specific inputs (ARN, Name, Grouping,\
    \ and Filters).\n2. **Validation**: \n    - If a **Filter JSON Object** is provided,\
    \ it is parsed and validated as a dictionary.\n    - If a **Group By Attribute**\
    \ is selected, it is mapped to the corresponding AWS Security Hub internal attribute\
    \ name.\n3. **Connectivity**: The action establishes a connection to the AWS Security\
    \ Hub service using the provided credentials and validates the connection.\n4.\
    \ **Execution**: The `update_insight` method is called on the AWS SDK, passing\
    \ the ARN and any optional parameters provided by the user.\n5. **Completion**:\
    \ The action returns a success message if the update is accepted by AWS, or an\
    \ error message if the update fails (e.g., due to invalid ARN or malformed JSON)."
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      This action modifies the configuration of an existing insight in AWS Security
      Hub, including its name, grouping attributes, and finding filters.
    fetches_data: false
    internal_data_mutation_explanation: null
