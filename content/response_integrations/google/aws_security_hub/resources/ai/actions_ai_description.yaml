Get Insight Details:
  ai_description: "### General Description\nThe **Get Insight Details** action retrieves\
    \ comprehensive information about a specific insight from AWS Security Hub. It\
    \ provides details on how findings are grouped (e.g., by Resource ID, Account\
    \ ID) and the counts associated with those groups. This is useful for understanding\
    \ the scope and distribution of security issues identified by a particular AWS\
    \ Insight.\n\n### Parameters Description\n| Parameter | Type | Mandatory | Default\
    \ | Description |\n| :--- | :--- | :--- | :--- | :--- |\n| **Insight ARN** | String\
    \ | Yes | N/A | The Amazon Resource Name (ARN) of the AWS Security Hub insight\
    \ you want to query. |\n| **Max Results to Return** | Integer | No | 50 | Limits\
    \ the number of result values returned in the data table and JSON. If a negative\
    \ value is provided, the default of 50 is used. |\n\n### Additional Notes\n- This\
    \ action does not run on entities; it requires a specific Insight ARN as input.\n\
    - The results are presented both as a structured JSON object and a formatted data\
    \ table for easy viewing within the case wall.\n\n### Flow Description\n1. **Parameter\
    \ Extraction**: The action retrieves the AWS credentials from the integration\
    \ configuration and the Insight ARN and result limit from the action parameters.\n\
    2. **Connectivity Check**: It initializes the AWS Security Hub manager and validates\
    \ the connection to the AWS service.\n3. **Data Retrieval**: It requests the insight\
    \ results from AWS using the provided ARN.\n4. **Data Processing**: The raw AWS\
    \ response is parsed into a structured format, respecting the `Max Results to\
    \ Return` limit.\n5. **Output Generation**: \n    - A data table named **Results**\
    \ is created, showing the grouped attribute values and their respective counts.\n\
    \    - The full insight details are attached as a JSON result for use in downstream\
    \ playbook logic."
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Adds a data table named 'Results' to the case and populates the action's JSON
      results with the retrieved insight details.
  categories:
