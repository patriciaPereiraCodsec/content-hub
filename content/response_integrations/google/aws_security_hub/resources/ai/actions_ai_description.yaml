Update Finding:
  ai_description: >-
    Updates specific findings in AWS Security Hub. This action allows for the modification
    of various finding attributes including severity, verification state, workflow
    status, and notes. It requires the unique Finding ID and the Product ARN to identify
    the target record.


    ### Flow Description

    1. **Parameter Extraction:** Retrieves AWS credentials (Access Key, Secret Key,
    Region) and action-specific parameters like Finding ID and Product ARN.

    2. **Validation:** Checks that 'Confidence' and 'Criticality' are within the 0-100
    range. It also ensures that if a 'Note' is provided, a 'Note Author' is also specified
    (and vice versa), as required by AWS.

    3. **Data Mapping:** Converts user-friendly dropdown selections (e.g., 'High',
    'Resolved') into the specific string formats expected by the AWS Security Hub
    API.

    4. **AWS Connection:** Initializes the AWS Security Hub client using Boto3 and
    validates connectivity.

    5. **Update Execution:** Calls the `batch_update_findings` API to apply the requested
    changes to the specified finding.

    6. **Result Handling:** Processes the response to determine if the update was
    successful or if the finding was returned as 'unprocessed' with an error.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | ID | String | Yes | The unique identifier of the finding to update. |

    | Product ARN | String | Yes | The Amazon Resource Name (ARN) of the product that
    generated the finding. |

    | Note | String | No | New text to add as a note to the finding. Requires 'Note
    Author'. |

    | Note Author | String | No | The author of the note. Requires 'Note'. |

    | Severity | Dropdown | No | Updates the severity label (Critical, High, Medium,
    Low, Informational). |

    | Verification State | Dropdown | No | Updates the veracity of the finding (e.g.,
    True Positive, False Positive). |

    | Confidence | Integer | No | Updates the confidence score (0-100). |

    | Criticality | Integer | No | Updates the resource criticality score (0-100).
    |

    | Types | String | No | A comma-separated list of finding types (e.g., 'Software
    and Configuration Checks/Vulnerabilities'). |

    | Workflow Status | Dropdown | No | Updates the investigation status (New, Notified,
    Resolved, Suppressed). |

    | Custom Fields | String | No | Updates user-defined fields in 'Key:Value,Key:Value'
    format. |


    ### Additional Notes

    - **Note Dependency:** AWS Security Hub requires both 'Note' and 'Note Author'
    to be present if either is provided. The action will fail validation if only one
    is filled.

    - **Range Constraints:** 'Confidence' and 'Criticality' must be integers between
    0 and 100.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Updates finding attributes such as severity, workflow status, notes, and custom
      fields directly in the AWS Security Hub service.
    fetches_data: false
    internal_data_mutation_explanation: null
  categories:
    enrichment: false
  entity_usage:
