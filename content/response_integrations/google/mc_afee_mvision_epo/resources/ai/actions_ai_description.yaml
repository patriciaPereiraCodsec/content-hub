Enrich Endpoint:
  ai_description: "Enriches Hostname and IP Address entities by fetching detailed\
    \ system information from McAfee Mvision ePO. This action retrieves metadata such\
    \ as operating system details, managed state, last communication time, and a list\
    \ of installed products. The retrieved data is used to update entity attributes\
    \ and provide a structured data table within the case for better context during\
    \ investigations.\n\n### Parameters\n| Parameter | Type | Mandatory | Description\
    \ |\n| :--- | :--- | :--- | :--- |\n| API Root | String | Yes | The API root URL\
    \ for the McAfee Mvision ePO instance. |\n| Client ID | String | Yes | The Client\
    \ ID used for OAuth2 authentication. |\n| Client Secret | String | Yes | The Client\
    \ Secret used for OAuth2 authentication. |\n| Scopes | String | Yes | The OAuth2\
    \ scopes required for API access (e.g., epo.device.r). |\n| Group Name | String\
    \ | No | If provided, the action will filter its search for the endpoint within\
    \ this specific ePO group. |\n| Verify SSL | Boolean | No | If enabled (default),\
    \ the action verifies the SSL certificate of the API endpoint. |\n\n### Flow Description\n\
    1. **Authentication**: The action authenticates with the McAfee IAM service using\
    \ the provided Client ID and Secret to obtain an access token.\n2. **Entity Filtering**:\
    \ It identifies suitable entities from the case, specifically targeting those\
    \ of type ADDRESS (IP) or HOSTNAME.\n3. **Data Retrieval**: For each suitable\
    \ entity, the action queries the McAfee Mvision ePO API to find a matching device.\
    \ It supports pagination to search through the device inventory.\n4. **Enrichment**:\
    \ If a match is found, the action extracts system properties (OS platform, domain,\
    \ username, etc.) and the list of installed products.\n5. **Internal Updates**:\
    \ \n    *   Updates the entity's additional properties with the retrieved system\
    \ information (prefixed with 'MMV_EPO').\n    *   Marks the entity as enriched.\n\
    \    *   Adds a data table to the case listing all products installed on the endpoint\
    \ and their versions.\n6. **Results**: Returns a success status and populates\
    \ the JSON result with the raw device data."
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entity attributes with system information (OS, domain, last communication)
      and adds a data table of installed products to the case context.
  categories:
    enrichment: true
