Ping:
  ai_description: >-
    ### General Description

    The **Ping** action is a diagnostic tool designed to verify the connectivity between
    Google SecOps and the McAfee Mvision ePO server. It ensures that the provided
    credentials (Client ID, Client Secret) and configuration (API Root, Scopes) are
    valid and that the network path is open. It also optionally validates the existence
    of a specific group within the ePO environment.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | API Root | String | Yes | The base URL for the McAfee Mvision ePO API endpoints.
    |

    | Client ID | String | Yes | The unique identifier for the client application
    used for OAuth2 authentication. |

    | Client Secret | String | Yes | The secret key associated with the Client ID
    for secure authentication. |

    | Verify SSL | Boolean | No | If enabled (True), the action will verify the SSL
    certificate of the ePO server. Default is True. |

    | Scopes | String | Yes | The specific OAuth scopes required to access the ePO
    API resources. |

    | Group Name | String | No | An optional parameter to check if a specific group
    exists in the ePO server as part of the connectivity test. |


    ### Flow Description

    1. **Initialization**: The action extracts the integration configuration and user-provided
    parameters.

    2. **Authentication**: The `McAfeeMvisionEPOManager` is initialized, which immediately
    attempts to retrieve an OAuth2 access token from the McAfee IAM service using
    the provided Client ID and Secret.

    3. **Connectivity Test**: The manager executes a `test_connectivity` method which
    performs a GET request to the `/epo/v1/groups` endpoint.

    4. **Group Validation**: If a `Group Name` was provided, the connectivity test
    adds a filter to the API request to verify that the specific group is reachable
    and exists.

    5. **Result Reporting**: If the authentication and API calls are successful, the
    action returns a success message. If the group is not found or the connection
    fails, it reports the specific error encountered.


    ### Additional Notes

    - This action does not process any entities.

    - It is primarily used during the initial setup of the integration or for troubleshooting
    communication issues.
