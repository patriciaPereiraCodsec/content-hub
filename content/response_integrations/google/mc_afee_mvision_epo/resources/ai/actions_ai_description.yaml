Remove Tag:
  ai_description: >-
    ### General Description

    Removes a specific tag from endpoint devices in McAfee Mvision ePO. This action
    is primarily used for administrative cleanup or state management, such as removing
    a 'Quarantined' or 'Under Investigation' tag from a host once a security incident
    has been resolved. It supports identifying endpoints by their Hostname or IP Address.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Tag Name | String | Yes | The exact name of the tag to be removed from the target
    endpoints. |


    ### Flow Description

    1. **Tag Verification**: The action first queries McAfee Mvision ePO to find the
    internal ID associated with the provided `Tag Name`. If the tag does not exist,
    the action terminates with an error.

    2. **Entity Filtering**: The action identifies all `HOSTNAME` and `ADDRESS` entities
    within the current Google SecOps context.

    3. **Device Discovery**: For each entity, the action searches the ePO inventory
    to find a matching device. This search can be scoped to a specific 'Group Name'
    if one is configured in the integration settings.

    4. **Tag Removal**: Once a device is matched, the action sends a POST request
    to the ePO API to remove the specified tag from that device's record.

    5. **Result Aggregation**: The action tracks the success or failure of the removal
    process for each entity and provides a summary message upon completion.


    ### Additional Notes

    - The action will fail if the `Tag Name` is misspelled or does not exist in the
    ePO environment.

    - If a device is not found in ePO for a given entity, that specific entity will
    be marked as failed, but the action will continue processing other entities.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Removes a tag association from a device in McAfee Mvision ePO, which modifies
      the device's metadata and state in the external system.
    fetches_data: true
    internal_data_mutation_explanation: null
