List Groups:
  ai_description: >-
    Lists groups available in McAfee Mvision ePO. This action retrieves a list of
    organizational groups defined within the ePO environment, providing details such
    as Group ID, Name, and Description. It is primarily used for discovery and to
    provide context for other actions that require group identifiers.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Max Groups to Return | Integer | No | Specifies the maximum number of groups
    to return. If not provided or less than or equal to 0, it defaults to 100. |


    ### Flow Description

    1. **Authentication**: The action authenticates with the McAfee Mvision ePO service
    using the configured Client ID and Client Secret to obtain an access token.

    2. **Data Retrieval**: It sends a GET request to the `/epo/v1/groups` endpoint,
    applying the `Max Groups to Return` parameter as a limit.

    3. **Processing**: The retrieved group data is parsed into structured objects
    containing the ID, Name, and Description of each group.

    4. **Output**: The action populates a data table named 'Available Groups' and
    provides the raw JSON results for use in downstream playbook tasks.
