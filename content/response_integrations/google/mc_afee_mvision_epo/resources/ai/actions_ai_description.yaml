Add Tag:
  ai_description: >-
    ### General Description

    The **Add Tag** action allows security analysts to apply a specific tag to endpoint
    devices within McAfee Mvision ePO. This is useful for categorization, policy assignment,
    or marking systems for further investigation during an incident response workflow.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Tag Name** | String | Yes | The name of the tag to be applied to the target
    endpoints. |


    ### Additional Notes

    - The action supports both **IP Address** and **Hostname** entities.

    - The tag must already exist in McAfee Mvision ePO; the action will fail if the
    tag is not found.

    - If a `Group Name` is configured in the integration settings, the action will
    prioritize searching for devices within that specific group.


    ### Flow Description

    1. **Initialization**: The action initializes the McAfee Mvision ePO manager using
    the provided credentials and configuration.

    2. **Tag Verification**: It searches for the specified `Tag Name` in the external
    system to retrieve its unique ID.

    3. **Entity Filtering**: It identifies all `ADDRESS` and `HOSTNAME` entities from
    the current context.

    4. **Device Lookup**: For each entity, it queries McAfee Mvision ePO to find a
    matching device.

    5. **Tag Application**: If a device is found, the action sends a POST request
    to the McAfee API to attach the tag to that device.

    6. **Reporting**: The action provides a summary of which entities were successfully
    tagged and which failed (e.g., if the device was not found).
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      The action performs a POST request to the McAfee Mvision ePO API to add a tag
      to a device, thereby modifying the state of the device record in the external
      system.
    fetches_data: true
    internal_data_mutation_explanation: null
