List Endpoints In Group:
  ai_description: >-
    ### General Description

    The **List Endpoints In Group** action retrieves a list of all endpoints (devices)
    belonging to a specific group within McAfee Mvision ePO. This action is designed
    to provide visibility into the assets managed under a particular organizational
    unit or group structure in the ePO environment.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Group Name** | String | Yes | The exact name of the group in McAfee Mvision
    ePO to search for. |

    | **Max Endpoints to Return** | Integer | No | The maximum number of endpoint
    records to return. Defaults to 100 if not specified or if a value less than or
    equal to 0 is provided. |


    ### Flow Description

    1. **Authentication**: The action initializes the McAfee Mvision ePO manager,
    which authenticates using the provided API credentials and retrieves an OAuth
    token.

    2. **Group Resolution**: It queries the ePO API to find the unique identifier
    (ID) for the group name provided in the parameters.

    3. **Endpoint Fetching**: Using the resolved group ID, the action fetches the
    list of devices associated with that group, applying the specified limit for the
    number of results.

    4. **Data Processing**: The retrieved endpoint data (including UUID, IP Address,
    Hostname, and Username) is parsed into structured objects.

    5. **Output**: The action populates a JSON result with the raw endpoint data and
    creates a data table titled 'Available Endpoints' for display in the Google SecOps
    UI.


    ### Additional Notes

    If the specified group name is not found in the system, the action will fail and
    provide an error message suggesting the user verify the name or use the 'List
    Groups' action to find valid group names.
