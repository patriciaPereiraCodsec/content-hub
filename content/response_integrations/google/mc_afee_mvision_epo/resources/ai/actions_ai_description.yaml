List Tags:
  ai_description: >-
    Lists tags that are available in McAfee Mvision ePO. This action retrieves a list
    of tags defined in the ePO environment, providing details such as tag ID, name,
    and description. The results are presented as a data table and a JSON object for
    use in downstream playbooks.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Max Tags to Return | Integer | No | Specify how many tags to return. Default
    is 100. If a value <= 0 is provided, the default is used. |


    ### Flow Description

    1. **Authentication**: The action authenticates with McAfee Mvision ePO using
    the provided Client ID and Client Secret to obtain an OAuth token.

    2. **Parameter Extraction**: It retrieves the 'Max Tags to Return' parameter to
    limit the API response.

    3. **Data Retrieval**: It sends a GET request to the `/epo/v1/tags` endpoint with
    the specified limit.

    4. **Processing**: The retrieved tags are parsed into a structured format.

    5. **Output**: The action populates a data table named 'Available Tags' and attaches
    the raw JSON results to the action output.
