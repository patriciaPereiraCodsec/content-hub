    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
Download Alert Artifacts:
  ai_description: "Downloads forensic artifacts associated with a specific FireEye\
    \ NX alert and saves them as a ZIP file to a specified local path on the execution\
    \ runner. \n\n### Parameters\n| Parameter | Type | Mandatory | Description |\n\
    | :--- | :--- | :--- | :--- |\n| Alert UUID | String | Yes | The unique identifier\
    \ (UUID) of the FireEye NX alert from which to retrieve artifacts. |\n| Download\
    \ Path | String | Yes | The local directory path on the system where the downloaded\
    \ ZIP file should be saved. |\n\n### Flow Description\n1. **Initialization**:\
    \ The action initializes the FireEye NX manager using provided credentials and\
    \ API root.\n2. **Artifact Retrieval**: It performs a GET request to the FireEye\
    \ NX API endpoint for artifacts using the provided Alert UUID.\n3. **File System\
    \ Check**: The action checks if a file already exists at the target destination\
    \ (Download Path + Alert UUID.zip).\n4. **File Writing**: If the path is clear,\
    \ it streams the binary content from the API response and writes it to the local\
    \ filesystem.\n5. **Result Reporting**: Upon success, it returns the absolute\
    \ file path of the saved artifact in the JSON results. If the file already exists\
    \ or the alert is not found, it reports the specific failure reason.\n\n### Additional\
    \ Notes\nThis action does not operate on entities. It requires a direct Alert\
    \ UUID as input. Note that the action will fail if the file already exists at\
    \ the specified path to prevent accidental overwrites."
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
  categories:
    enrichment: false
  entity_usage:
    entity_types: []
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: false
