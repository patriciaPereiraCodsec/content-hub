Add IPS Policy Exception:
  ai_description: >-
    ### General Description

    Adds an IPS policy exception in FireEye NX for specific IP Address entities. This
    action is used to manage traffic filtering rules by defining exceptions based
    on an attacker's IP (the entity) and a specified victim subnet. It allows security
    teams to automate the blocking, unblocking, or suppression of traffic directly
    from the Google SecOps platform.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Victim IP Subnet** | String | Yes | The IP subnet of the victim to be used
    in the policy exception (e.g., `10.0.0.1/24`). |

    | **Interface** | String | Yes | The specific network interface where the exception
    should be applied. Options include `A`, `B`, `C`, `D`, or `ALL`. Default is `ALL`.
    |

    | **Mode** | String | Yes | The action mode for the exception. Options include
    `Block`, `Unblock`, `Suppress`, or `Suppress-unblock`. Default is `Block`. |

    | **Name** | String | No | A custom name for the policy exception. If left blank,
    the action generates a name using the format `Siemplify_{Interface}_{Mode}`. |


    ### Additional Notes

    - IP entities are treated as the "Attacker IP Address" in the FireEye NX policy
    logic.

    - The action automatically masks plain IPv4 addresses to `/32` CIDR notation if
    a mask is not already present.


    ### Flow Description

    1. **Parameter Extraction:** Retrieves the FireEye NX connection details and action
    parameters (Victim Subnet, Interface, Mode, and Name).

    2. **Entity Filtering:** Identifies all `ADDRESS` entities within the current
    alert context.

    3. **IP Masking:** For each entity, the script ensures the IP address is in a
    valid CIDR format (appending `/32` to single IPs).

    4. **API Interaction:** Authenticates with FireEye NX and sends a POST request
    to the `/ips/policy_exceptions` endpoint with the exception details.

    5. **Result Reporting:** Tracks which entities were successfully added to the
    policy and which failed, providing a summary message to the case wall.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Creates a new IPS policy exception entry in the FireEye NX configuration via
      a POST request to the management API.
    fetches_data: false
    internal_data_mutation_explanation: null
  categories:
    enrichment: false
  entity_usage:
    entity_types:
    - ADDRESS
    filters_by_additional_properties: false
