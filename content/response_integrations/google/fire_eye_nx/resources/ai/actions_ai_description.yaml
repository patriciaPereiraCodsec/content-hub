    filters_by_modification_time: false
Ping:
  ai_description: >-
    ### General Description

    The Ping action is a diagnostic tool designed to verify the connectivity between
    Google SecOps and a FireEye NX instance. It ensures that the provided credentials
    and network configurations (API Root, Username, Password, and SSL settings) are
    correct and that the FireEye NX API is reachable.


    ### Parameters Description

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | API Root | String | Yes | The base URL of the FireEye NX instance (e.g., https://10.0.0.1).
    |

    | Username | String | Yes | The username used for authentication with the FireEye
    NX server. |

    | Password | String | Yes | The password used for authentication with the FireEye
    NX server. |

    | Verify SSL | Boolean | Yes | If enabled, the action will verify the SSL certificate
    of the FireEye NX server. |


    ### Flow Description

    1. **Parameter Extraction:** The action retrieves the integration configuration
    parameters including the API Root, credentials, and SSL verification preference.

    2. **Authentication:** The action initializes the FireEye NX Manager, which automatically
    attempts to obtain an authentication token by sending a POST request to the `/wsapis/v2.0.0/auth/login`
    endpoint.

    3. **Connectivity Test:** Once authenticated, the action performs a GET request
    to the system health endpoint (`/wsapis/v2.0.0/health/system`) to confirm the
    API is responsive.

    4. **Result Reporting:** If the health check is successful, the action returns
    a success message. If any step fails (auth or health check), it catches the exception
    and reports a failure.


    ### Additional Notes

    This action does not process any entities and is strictly used for configuration
    validation.
