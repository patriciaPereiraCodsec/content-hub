Ping:
  ai_description: >-
    ### General Description

    Tests the connectivity between Google SecOps and the Case Federation service.
    This action is used to verify that the integration's configuration parameters,
    such as API endpoints and authentication credentials, are correctly set and that
    the system can successfully communicate with the target service.


    ### Parameters

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | None | N/A | N/A | This action does not require any input parameters. |


    ### Additional Notes

    This is a standard connectivity test (Ping) action. It does not process entities,
    fetch external data, or modify any internal or external records. According to
    standard SOAR practices, Ping actions are used for health checks of the integration
    instance.


    ### Flow Description

    1. **Initialization**: The action initializes the base class and prepares the
    execution environment.

    2. **Connectivity Validation**: The action executes its internal logic to verify
    communication with the Case Federation service.

    3. **Status Reporting**: The action returns a success or failure result based
    on the connectivity test outcome.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: false
    internal_data_mutation_explanation: null
  categories:
    enrichment: false
  entity_usage:
    entity_types: []
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: false
    filters_by_identifier: false
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: false
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
