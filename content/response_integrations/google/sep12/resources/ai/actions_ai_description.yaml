    filters_by_is_vulnerable: false
    filters_by_modification_time: false
Ping:
  ai_description: "### General Description\nThe **Ping** action is a diagnostic tool\
    \ designed to verify the connectivity between Google SecOps and a Symantec Endpoint\
    \ Protection (SEP) 12/14 instance. Its primary purpose is to ensure that the integration\
    \ configuration\u2014specifically the API Root URL and OAuth credentials (Client\
    \ ID, Client Secret, and Refresh Token)\u2014is valid and that the network path\
    \ is open.\n\n### Parameters Description\nThere are no input parameters for this\
    \ action.\n\n### Additional Notes\nThis action is a standard connectivity test.\
    \ It does not interact with any entities or modify any data. It relies on the\
    \ integration's global configuration settings to perform its check.\n\n### Flow\
    \ Description\n1. **Configuration Extraction**: The action retrieves the integration's\
    \ global settings, including the Client ID, Client Secret, Refresh Token, and\
    \ API Root URL.\n2. **Manager Initialization**: It initializes the `SymantecEp12`\
    \ manager class using the retrieved configuration.\n3. **Authentication Verification**:\
    \ During initialization, the manager attempts to refresh the OAuth access token\
    \ by making a GET request to the SEP Manager's token endpoint. \n4. **Connectivity\
    \ Confirmation**: If the token refresh request is successful, the action confirms\
    \ the connection is active and terminates with a success message. If an exception\
    \ occurs (e.g., 401 Unauthorized or connection timeout), the action fails, indicating\
    \ a configuration or network issue."
