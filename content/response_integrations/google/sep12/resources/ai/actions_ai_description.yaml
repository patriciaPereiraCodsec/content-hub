GetReport:
  ai_description: >-
    ### General Description

    Retrieves a detailed status report for a specific command previously issued to
    the Symantec Endpoint Protection (SEP) 12 Manager. This action is primarily used
    to monitor the progress or verify the completion of asynchronous operations such
    as endpoint scans, quarantine actions, or policy updates. It fetches the current
    state of the command directly from the SEP management server.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Command ID | String | Yes | The unique identifier of the command to retrieve
    the status for. This ID is typically provided as an output from other SEP actions
    like 'Scan' or 'Quarantine'. |


    ### Flow Description

    1. **Authentication**: Establishes a connection to the Symantec Endpoint Protection
    Manager using OAuth2 credentials (Client ID, Secret, and Refresh Token) provided
    in the integration configuration.

    2. **Parameter Extraction**: Retrieves the `Command ID` from the action's input
    parameters.

    3. **API Request**: Constructs and sends a SOAP request to the `CommandService`
    endpoint of the SEP Manager to fetch the `getCommandStatusDetails` for the specified
    ID.

    4. **Data Parsing**: Receives the XML response, cleanses it of SOAP-specific namespaces,
    and converts the relevant command status data into a JSON-compatible dictionary.

    5. **Result Output**: Adds the retrieved report to the action's JSON results and
    ends the execution with a success message containing the report details.


    ### Additional Notes

    This action does not process or iterate over entities within a Google SecOps case.
    It is a utility action that operates strictly on the provided `Command ID` parameter.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
  categories:
    enrichment: false
