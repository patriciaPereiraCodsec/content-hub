UpdateEndpoint:
  ai_description: >-
    ### General Description

    The **UpdateEndpoint** action triggers a security content update on Symantec Endpoint
    Protection (SEP) endpoints. It is used to ensure that specific hosts or IP addresses
    are running the latest security definitions provided by the Symantec Endpoint
    Protection Manager (SEPM). The action resolves the provided entities to their
    internal SEP computer identifiers and then issues a remote command to initiate
    the update process.


    ### Parameters Description

    There are no user-configurable parameters for this action. It relies on the integration's
    global configuration (Client ID, Secret, API Root, etc.) to authenticate and communicate
    with the Symantec Endpoint Protection Manager.


    ### Additional Notes

    * The action supports **ADDRESS** (IP) and **HOSTNAME** entities.

    * For Hostname entities, if a direct match is not found, the action attempts to
    resolve the computer ID using the short name (splitting by the first dot) to account
    for FQDN variations.

    * The resulting command ID from the SEPM is stored in the entity's additional
    properties under the key `sep_update_command_id`.


    ### Flow Description

    1. **Authentication**: Connects to the Symantec Endpoint Protection Manager using
    OAuth2 credentials provided in the integration settings.

    2. **Entity Resolution**: Iterates through the target entities. For each IP address
    or Hostname, it queries the SEPM API to retrieve the corresponding `computer_id`.

    3. **Command Execution**: For every successfully identified computer, it calls
    the `runClientCommandUpdateContent` SOAP method to trigger the update on the endpoint.

    4. **Data Enrichment**: Captures the `command_id` returned by the SEPM and attaches
    it to the entity's `additional_properties`.

    5. **Internal Update**: Updates the entities within Google SecOps to reflect the
    new metadata and provides a summary of the triggered updates in the action output.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: >-
      Triggers a 'runClientCommandUpdateContent' command on the Symantec Endpoint
      Protection Manager, which forces the target endpoint to update its security
      content and definitions.
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates the 'additional_properties' of the processed entities with the 'sep_update_command_id'
      returned by the SEP Manager.
  categories:
    enrichment: false
  entity_usage:
    entity_types:
    - ADDRESS
    - HOSTNAME
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: true
