UpdateAndScanEndpoint:
  ai_description: >-
    ### General Description

    Triggers a content update and a full system scan on endpoints managed by Symantec
    Endpoint Protection (SEP) 12. This action is used to ensure that a specific endpoint
    has the latest security definitions and is immediately checked for threats. It
    supports both IP Address and Hostname entities.


    ### Parameters Description

    There are no user-configurable parameters for this action. The scan type is hardcoded
    to 'Update_ScanNow_Full'.


    ### Additional Notes

    * The action automatically attempts to resolve Hostnames by stripping domain suffixes
    (e.g., 'host.domain.com' to 'host') if the initial lookup fails.

    * The resulting Command ID from the SEP Manager is stored in the entity's additional
    properties under the key 'sep_update_and_scan_command_id'.


    ### Flow Description

    1. **Authentication**: Connects to the Symantec Endpoint Protection Manager using
    the configured API credentials and refreshes the access token.

    2. **Entity Resolution**: For each target entity, the action queries the SEP Manager
    to find the corresponding internal `computer_id` using either the IP address or
    the hostname.

    3. **Command Execution**: If a `computer_id` is found, the action sends a SOAP
    request to the SEP Command Service to initiate the 'Update and Full Scan' task.

    4. **Data Enrichment**: The unique Command ID returned by the SEP Manager is added
    to the entity's metadata.

    5. **Update**: The action updates the entities within Google SecOps to persist
    the Command ID for tracking purposes.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: >-
      Triggers a content update and a full system scan command on the managed endpoint
      via the Symantec Endpoint Protection Manager.
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates the entity's additional properties with the Command ID of the triggered
      scan task.
