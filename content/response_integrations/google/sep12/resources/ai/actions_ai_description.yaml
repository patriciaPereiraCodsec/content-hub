ScanEndpoint:
  ai_description: >-
    ### General Description

    This action initiates a full system scan on endpoints managed by Symantec Endpoint
    Protection (SEP) 12. It targets specific entities within a case, resolves them
    to their internal SEP computer identifiers, and triggers a remote scan command.
    This is primarily used for on-demand forensic investigation or malware verification
    during an incident response workflow.


    ### Parameters Description

    There are no user-configurable parameters for this action. The scan type is hardcoded
    to perform a full system scan (`ScanNow_Full`).


    ### Additional Notes

    * The action supports both IP Address and Hostname entities.

    * If a Hostname contains a domain (e.g., `host.domain.com`), the action will attempt
    to resolve the computer ID using both the full FQDN and the short hostname.

    * The resulting Command ID from the SEP Manager is stored in the entity's additional
    properties under the key `sep_scan_command_id`.


    ### Flow Description

    1. **Authentication**: Connects to the Symantec Endpoint Protection Manager using
    OAuth2 credentials (Client ID, Secret, and Refresh Token).

    2. **Entity Resolution**: Iterates through the target entities. For `ADDRESS`
    entities, it fetches the Computer ID via IP. For `HOSTNAME` entities, it fetches
    the Computer ID via the hostname string.

    3. **Command Execution**: For every successfully resolved Computer ID, it sends
    a SOAP request to the SEP Command Service to initiate a `ScanNow_Full` operation.

    4. **Data Enrichment**: Updates the entity object within Google SecOps by adding
    the `sep_scan_command_id` to its additional properties.

    5. **Reporting**: Returns a summary message to the case wall indicating which
    entities are being scanned and provides the associated command IDs for tracking.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: >-
      Initiates a remote system scan on the target endpoint via the Symantec Endpoint
      Protection Manager API.
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates the 'additional_properties' attribute of the entities with the unique
      command ID returned by the SEP Manager.
  categories:
    enrichment: false
  entity_usage:
    entity_types:
