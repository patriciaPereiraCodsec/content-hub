Ping:
  ai_description: >-
    ### General Description

    The **Ping** action is a connectivity test utility used to verify that the Google
    SecOps platform can successfully communicate with the FireEye ETP (Email Threat
    Prevention) API. It validates the integration's configuration parameters, such
    as the API Root and API Key, ensuring that the credentials are valid and the network
    path is open.


    ### Parameters Description

    This action relies on configuration parameters defined at the integration level
    rather than action-specific parameters:


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | API Root | String | Yes | The base URL for the FireEye ETP API instance. |

    | API Key | String | Yes | The API key used for authentication. |

    | Verify SSL | Boolean | Yes | Determines whether to verify the SSL certificate
    of the FireEye ETP server. |


    ### Additional Notes

    * This action does not require or process any entities.

    * It is typically used for troubleshooting or initial setup verification.


    ### Flow Description

    1. **Initialization**: The action retrieves the global integration configuration
    (API Root, API Key, and SSL settings).

    2. **Manager Setup**: It initializes the `FireEyeETPManager` with the retrieved
    credentials.

    3. **Connectivity Check**: The action calls the `test_connectivity` method, which
    performs a POST request to the `/api/v1/alerts` endpoint with a minimal payload
    (`size: 1`).

    4. **Response Validation**: It checks the HTTP response status. A successful response
    (2xx) indicates a valid connection.

    5. **Final Status**: If successful, it returns a completion state; otherwise,
    it catches the exception and reports a failure state with the error details.
