Whois:
  ai_description: >-
    Retrieves Whois information for IP Address, Hostname, and URL entities using the
    Talos ThreatSource service. This action is designed to provide administrative
    and registration details for network identifiers, which is crucial for investigating
    the ownership and history of potentially malicious infrastructure.


    ### Parameters Description


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Use SSL | Boolean | Yes | (Configuration Parameter) If enabled, the action will
    verify the SSL certificate of the Talos API endpoint. Defaults to False. |

    | additional_data | String (JSON) | No | (Action Parameter) Used internally to
    maintain state across asynchronous execution cycles. It stores processed entity
    identifiers and accumulated results. |


    ### Flow Description


    1.  **Initialization**: The action initializes the Talos manager and identifies
    supported entities (IP Address, Hostname, and URL) from the target entities list.

    2.  **Domain Extraction**: For URL entities, the action extracts the domain component
    to perform the Whois lookup.

    3.  **Asynchronous Processing**: To prevent being blocked by the external service,
    the action processes entities sequentially. In each execution cycle, it selects
    the first unprocessed entity.

    4.  **API Interaction**: It performs a GET request to the Talos Whois endpoint
    for the selected entity.

    5.  **State Management**: If more entities remain to be processed, the action
    saves its current state (successful/failed identifiers and JSON results) into
    the `additional_data` parameter and sets the execution state to `IN_PROGRESS`.

    6.  **Completion**: Once all entities are processed, the action aggregates the
    Whois reports into a final JSON result and completes the execution.
