Get Reputation:
  ai_description: >-
    Enriches IP Address, Hostname, and URL entities using Cisco Talos ThreatSource
    intelligence. This action retrieves comprehensive reputation data, including threat
    levels, spam levels, geographic location, organization details, and blocklist
    status. It processes entities asynchronously to ensure stability and avoid timeouts
    during large-scale enrichment tasks.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Use SSL | Boolean | Yes | Specifies whether to verify the SSL certificate for
    API requests to the Talos service. |


    ### Flow Description

    1. **Entity Filtering**: The action identifies supported entities (IP Address,
    Hostname, and URL) from the target list.

    2. **Data Retrieval**: For each entity, the action performs multiple GET requests
    to Talos endpoints to fetch reputation scores, category information, and blocklist
    status. For URL entities, the domain is extracted and used for the query.

    3. **Async Processing**: The action processes entities one by one across multiple
    execution cycles (async) to manage state and prevent execution timeouts.

    4. **Internal Updates**: Once data is retrieved, the action updates the entity's
    additional properties with enrichment data (prefixed with 'CiscoTalos') and marks
    the entity as 'enriched'.

    5. **Output Generation**: The action generates detailed CSV tables for each entity
    and a comprehensive JSON result containing all raw intelligence data.


    ### Additional Notes

    - For URL entities, the action specifically extracts the domain part to perform
    the reputation lookup.

    - The action uses a custom User-Agent and specific headers to interact with the
    Talos Intelligence web-based API.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entity attributes with enrichment data (e.g., geo-location, organization
      name, threat level) and sets the 'is_enriched' flag to true.
  categories:
    enrichment: true
  entity_usage:
    entity_types:
    - ADDRESS
    - HOSTNAME
    - DestinationURL
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: true
    filters_by_identifier: false
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: false
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
Ping:
  ai_description: >-
    ### General Description

    Tests the connectivity to the Talos ThreatSource API to ensure that the integration
    can successfully communicate with the external service. This action is primarily
    used for verification of configuration settings and network accessibility.


    ### Parameters Description

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Use SSL | Boolean | Yes | Determines whether to verify the SSL certificate of
    the Talos API endpoint during the connection test. |


    ### Additional Notes

    This action does not process any entities and uses a hardcoded domain ('google.com')
    to perform a test WHOIS lookup against the Talos API.


    ### Flow Description

    1. **Parameter Extraction**: Retrieves the 'Use SSL' configuration parameter.

    2. **Manager Initialization**: Initializes the TalosManager with the specified
    SSL verification setting.

    3. **Connectivity Check**: Executes a GET request to the Talos WHOIS endpoint
    using a test query for 'google.com'.

    4. **Response Validation**: Checks the HTTP response status and parses the JSON
    body for any service-level errors.

    5. **Execution Result**: Returns a success status if the API responds correctly,
    or a failure status with the specific error message if the connection fails.
