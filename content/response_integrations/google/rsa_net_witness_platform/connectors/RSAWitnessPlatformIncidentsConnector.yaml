name: RSA Netwitness Platform - Incidents Connector
parameters:
-   name: DeviceProductField
    default_value: Product Name
    type: string
    description: Enter the source field name in order to retrieve the Product Field
        name.
    is_mandatory: true
    is_advanced: false
    mode: regular
-   name: Disable Overflow
    default_value: true
    type: boolean
    description: If enabled, connector will ignore the overflow mechanism.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: EventClassId
    default_value: event_type
    type: string
    description: Enter the source field name in order to retrieve the Event Field
        name.
    is_mandatory: true
    is_advanced: false
    mode: regular
-   name: Environment Field Name
    default_value: ''
    type: string
    description: Describes the name of the field where the environment name is stored.
        If the environment field isn't found, the environment is the default environment.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Environment Regex Pattern
    default_value: .*
    type: string
    description: A regex pattern to run on the value found in the "Environment Field
        Name" field. Default is .* to catch all and return the value unchanged. Used
        to allow the user to manipulate the environment field via regex logic. If
        the regex pattern is null or empty, or the environment value is null, the
        final environment result is the default environment.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Web API Root
    default_value: https://{ip}/rest/api
    type: string
    description: Web API Root of the RSA Netwitness Platform instance.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Web Username
    default_value: ''
    type: string
    description: Username of the RSA Netwitness Platform account.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Web Password
    default_value: ''
    type: password
    description: Password of the RSA Netwitness Platform account.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Broker API Root
    default_value: ''
    type: string
    description: 'API Root of the RSA Netwitness broker. Note: broker configuration
        takes priority over concentrator. Example: https://{ip}:50103. If this parameter
        is provided, the connector will try to fetch more context related to the incident.'
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Broker API Username
    default_value: ''
    type: string
    description: 'API Username of the RSA Netwitness broker. Note: broker configuration
        takes priority over concentrator. If this parameter is provided, the connector
        will try to fetch more context related to the incident.'
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Broker API Password
    default_value: ''
    type: password
    description: 'API Password of the RSA Netwitness broker. Note: broker configuration
        takes priority over concentrator. If this parameter is provided, the connector
        will try to fetch more context related to the incident.'
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Concentrator API Root
    default_value: ''
    type: string
    description: 'API Root of the RSA Netwitness concentrator. Note: broker configuration
        takes priority over concentrator. Example: https://{ip}:50105. If this parameter
        is provided, the connector will try to fetch more context related to the incident.'
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Concentrator API Username
    default_value: ''
    type: string
    description: 'API Username of the RSA Netwitness concentrator. Note: broker configuration
        takes priority over concentrator. If this parameter is provided, the connector
        will try to fetch more context related to the incident.'
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Concentrator API Password
    default_value: ''
    type: password
    description: 'API Password of the RSA Netwitness concentrator. Note: broker configuration
        takes priority over concentrator. If this parameter is provided, the connector
        will try to fetch more context related to the incident.'
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Credential JSON Object
    default_value: ''
    type: password
    description: This parameter is needed for storing the data source credentials.
        This parameter has priority over "Broker API Root", "Broker API Username",
        "Broker API Password", "Concentrator API Root", "Concentrator API Username",
        "Concentrator API Password". Please refer to the documentation portal for
        more details.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: PythonProcessTimeout
    default_value: 180
    type: integer
    description: Timeout limit for the python process running the current script.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Fetch Max Hours Backwards
    default_value: 1
    type: integer
    description: 'Number of hours before the first connector iteration to retrieve
        incidents from. This parameter applies to the initial connector iteration
        after you enable the connector for the first time, or used as a fallback value
        in cases where connector''s last run timestamp expires. Note: connector will
        wait for the provided time for the updates to incidents.'
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Lowest Risk Score To Fetch
    default_value: ''
    type: integer
    description: Lowest risk score of the incidents to fetch. By default, the connector
        will ingest all of the incidents. Maximum is 100.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Severity Fallback
    default_value: Informational
    type: string
    description: 'Specify what should be the fallback severity for the Siemplify Alert,
        when risk score is not available. Possible values: Informational, Low, Medium,
        High, Critical.'
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Max Incidents To Fetch
    default_value: 10
    type: integer
    description: How many incidents to process per one connector iteration. Maximum
        is 100.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Verify SSL
    default_value: false
    type: boolean
    description: If enabled, verify the SSL certificate for the connection to the
        RSA Netwitness Plaform server is valid.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Use whitelist as a blacklist
    default_value: false
    type: boolean
    description: If enabled, whitelist will be used as a blacklist.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Proxy Server Address
    default_value: ''
    type: string
    description: The address of the proxy server to use.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Proxy Username
    default_value: ''
    type: string
    description: The proxy username to authenticate with.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Proxy Password
    default_value: ''
    type: password
    description: The proxy password to authenticate with.
    is_mandatory: false
    is_advanced: false
    mode: script
description: Pull incidents from RSA Netwitness Platform.
integration: RSANetWitnessPlatform
documentation_link: null
rules: []
is_connector_rules_supported: true
creator: admin
