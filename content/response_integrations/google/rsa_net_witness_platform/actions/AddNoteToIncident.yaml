name: Add Note to Incident
description: Add Note to Incident in RSA Netwitness. Requires RSA Netwitness Respond
    license, configured Web Username and Web Password in the integration configuration.
integration_identifier: RSANetWitnessPlatform
parameters:
-   name: Incident ID
    default_value: ''
    type: string
    description: Specify ID of the incident that needs to be updated.
    is_mandatory: true
-   name: Note
    default_value: ''
    type: string
    description: Specify which note should be added to.
    is_mandatory: true
-   name: Author
    default_value: ''
    type: string
    description: Specify the author of the note.
    is_mandatory: true
dynamic_results_metadata: []
creator: admin
simulation_data_json: '{"Entities":[]}'
