name: Unisolate Endpoint
description: Request endpoint unisolation in RSA Netwitness. Requires RSA Netwitness
    Respond license, endpoint server service running in the background, configured
    Web Username and Web Password in the integration configuration.
integration_identifier: RSANetWitnessPlatform
parameters:
-   name: Comment
    default_value: ''
    type: string
    description: Add comment, which describes the reason behind the unisolation request.
    is_mandatory: true
dynamic_results_metadata: []
creator: admin
simulation_data_json: '{"Entities": ["HOSTNAME", "ADDRESS"]}'
