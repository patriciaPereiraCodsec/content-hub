Query NetWitness For Events Around User:
  ai_description: >-
    ### General Description

    Queries the RSA NetWitness Platform to retrieve historical network events and
    associated PCAP files for specific User entities. This action is designed to provide
    forensic context by identifying network sessions where the user is either the
    source or destination, and then attaching the raw packet data directly to the
    Google SecOps case.


    ### Parameters Description

