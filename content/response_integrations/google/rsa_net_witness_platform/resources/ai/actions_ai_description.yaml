Update Incident:
  ai_description: >-
    ### General Description

    Updates the details of an existing incident in RSA NetWitness Respond. This action
    allows users to modify the status and the assignee of a specific incident identified
    by its ID. It is primarily used for incident management and workflow synchronization
    between Google SecOps and RSA NetWitness.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Incident ID | String | Yes | The unique identifier of the incident that needs
    to be updated. |

    | Status | Enum | No | Specify the new status for the incident. Options include:
    New, Assigned, In Progress, Task Requested, Task Complete, Closed, Closed - False
    Positive. |

    | Assignee | String | No | Specify the new assignee (username) for the incident.
    |


    ### Flow Description

    1. **Parameter Extraction**: The action retrieves the Incident ID, Status, and
    Assignee from the input parameters.

    2. **Manager Initialization**: It initializes the `RSAManager` using the provided
    Web API Root, Username, and Password from the integration configuration.

    3. **Status Mapping**: If a status is provided, the action maps the user-friendly
    status name to the internal RSA NetWitness status value (e.g., 'In Progress' becomes
    'InProgress').

    4. **API Update**: The action sends a PATCH request to the RSA NetWitness API
    endpoint for the specific incident ID, updating the status and/or assignee fields.

    5. **Result Handling**: Upon success, the action retrieves the updated incident
    object and adds it to the action's JSON results for further use in the playbook.


    ### Additional Notes

    - This action requires an RSA NetWitness Respond license.

    - At least one of the optional parameters (Status or Assignee) should be provided
    to perform a meaningful update.
