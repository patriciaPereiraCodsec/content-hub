Add Note to Incident:
  ai_description: >-
    Adds a note (journal entry) to a specific incident in the RSA NetWitness Platform.
    This action is used to document findings, updates, or administrative notes directly
    within the RSA NetWitness Respond module.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Incident ID | String | Yes | The unique identifier of the RSA NetWitness incident
    that will receive the note. |

    | Note | String | Yes | The actual text content of the note to be added to the
    incident's journal. |

    | Author | String | Yes | The name or identifier of the user or system responsible
    for creating the note. |


    ### Flow Description

    1. **Parameter Extraction:** The action retrieves the RSA NetWitness Web API credentials
    from the integration configuration and the Incident ID, Note, and Author from
    the action parameters.

    2. **Manager Initialization:** It initializes the `RSAManager`, which handles
    authentication and session management with the RSA NetWitness Web API.

    3. **API Interaction:** The action performs a POST request to the RSA NetWitness
    `/incidents/{incident_id}/journal` endpoint with the provided note and author
    details.

    4. **Outcome Reporting:** If the request is successful, the action completes with
    a success message; otherwise, it catches specific exceptions (like `UpdateFailException`)
    and reports the failure reason.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Adds a new journal entry (note) to an existing incident in the RSA NetWitness
      Platform.
    fetches_data: false
    internal_data_mutation_explanation: null
  categories:
