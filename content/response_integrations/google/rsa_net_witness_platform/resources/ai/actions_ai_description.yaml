Run General Query:
  ai_description: >-
    ### General Description

    Runs a custom query against the RSA NetWitness Platform to retrieve event metadata
    and associated PCAP files. This action is designed for flexible threat hunting
    and forensic investigation, allowing users to specify a raw query string and a
    time range to extract detailed network traffic data and session information.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Query | String | Yes | The custom RSA NetWitness query string used to filter
    sessions (e.g., `ip.src=1.1.1.1`). |

    | Max Hours Backwards | Integer | No | Specifies the time window for the query,
    looking back from the current time in hours. Defaults to 1 hour. |

    | Max Events To Return | Integer | No | Limits the number of events retrieved
    and displayed in the results. Defaults to 50. |


    ### Additional Notes

    - This action does not operate on specific entities but rather on a user-provided
    query string.

    - If results are found, the action automatically downloads and attaches a PCAP
    file containing the traffic for all identified sessions to the case.

    - Event metadata is presented in a data table for easy review within the SOAR
    interface.


    ### Flow Description

    1. **Initialization**: The action initializes the RSA Manager using the provided
    Broker or Concentrator API credentials and connection details.

    2. **Session Identification**: It executes the provided query string within the
    specified time range to identify relevant session IDs from the RSA NetWitness
    SDK.

    3. **PCAP Retrieval**: If session IDs are found, it requests the combined PCAP
    data for those sessions and attaches the resulting file to the case.

    4. **Metadata Extraction**: The action iterates through the identified session
    IDs to fetch detailed metadata for each event.

    5. **Output Generation**: It constructs a data table containing the event metadata
    and returns the raw JSON results for use in downstream playbook logic.
