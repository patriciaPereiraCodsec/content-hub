Isolate Endpoint:
  ai_description: >-
    ### General Description

    The **Isolate Endpoint** action requests the isolation of specific endpoints within
    the RSA NetWitness Platform. This is a containment action used to restrict the
    network connectivity of a potentially compromised host to prevent lateral movement
    or data exfiltration. It requires the RSA NetWitness Respond license and an active
    endpoint server service running in the background.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Comment** | String | Yes | A descriptive reason for the isolation request,
    which will be logged in RSA NetWitness for auditing purposes. |


    ### Flow Description

    1. **Initialization**: The action connects to the RSA NetWitness Web API using
    the configured root URL and credentials.

    2. **Service Discovery**: It retrieves the internal Service ID for the 'endpoint-server',
    which is a prerequisite for endpoint management operations.

    3. **Entity Search**: For each provided IP Address or Hostname entity, the action
    searches the RSA NetWitness inventory to identify the corresponding Agent ID.

    4. **Isolation Request**: If a matching agent is found, the action sends a POST
    request to the isolation endpoint, applying the isolation state to the agent and
    attaching the user-provided comment.

    5. **Result Reporting**: The action tracks successful and failed isolation requests
    and returns a summary message to the case wall.


    ### Additional Notes

    - This action supports **ADDRESS** (IPv4) and **HOSTNAME** entity types.

    - Isolation is an external state change; this action does not modify entity attributes
    or create insights within Google SecOps.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Isolates the target endpoint in RSA NetWitness, restricting its network communication
      to prevent further threats.
    fetches_data: true
    internal_data_mutation_explanation: null
  categories:
