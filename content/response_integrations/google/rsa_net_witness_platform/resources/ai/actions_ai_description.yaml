    filters_by_is_internal: false
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
Enrich File:
  ai_description: "### General Description\nEnriches File Name and File Hash entities\
    \ using RSA NetWitness Platform. This action retrieves comprehensive file metadata,\
    \ including reputation status, global risk scores, file size, and checksums (MD5,\
    \ SHA1, SHA256). It allows security analysts to automatically assess the risk\
    \ of files based on a configurable threshold and marks entities as suspicious\
    \ if they exceed that limit.\n\n### Parameters Description\n| Parameter | Type\
    \ | Mandatory | Description |\n| :--- | :--- | :--- | :--- |\n| Risk Score Threshold\
    \ | Integer | No | Specifies the risk threshold (0-100). If a file's global risk\
    \ score exceeds this value, the entity is marked as suspicious in Google SecOps.\
    \ Default is 50. |\n\n### Flow Description\n1. **Authentication**: Connects to\
    \ the RSA NetWitness Web API using provided credentials and retrieves a security\
    \ token.\n2. **Service Discovery**: Identifies the required `endpoint-server`\
    \ service ID within the RSA environment to perform file searches.\n3. **Entity\
    \ Processing**: Iterates through target entities (File Names and File Hashes).\n\
    4. **Data Retrieval**: \n    * For **File Names**: Searches the RSA database for\
    \ matching filenames.\n    * For **File Hashes**: Searches using MD5 or SHA256\
    \ identifiers.\n5. **Enrichment**: If a match is found, the action flattens the\
    \ file metadata and updates the entity's additional properties with the prefix\
    \ `RSA_NTW`.\n6. **Risk Assessment**: Compares the file's `globalRiskScore` against\
    \ the user-defined `Risk Score Threshold`. If the score is higher, the entity\
    \ is flagged as suspicious.\n7. **Finalization**: Updates the entities in Google\
    \ SecOps and returns the raw JSON data for further playbook logic.\n\n### Additional\
    \ Notes\n* This action specifically supports MD5 and SHA256 hash types. Other\
    \ hash formats will result in a failure for that specific entity.\n* Requires\
    \ the RSA NetWitness Respond license and an active endpoint server service."
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entity attributes with file metadata from RSA NetWitness and modifies
      the 'is_suspicious' flag based on the risk score threshold.
  categories:
    enrichment: true
  entity_usage:
    entity_types:
