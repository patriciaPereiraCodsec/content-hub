Unisolate Endpoint:
  ai_description: >-
    ### General Description

    This action requests the unisolation of endpoint entities (IP Addresses or Hostnames)
    within the RSA NetWitness Platform. It is used to restore normal network connectivity
    to endpoints that were previously isolated for security reasons. The action requires
    the RSA NetWitness Respond license and the endpoint server service to be active.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Comment | String | Yes | A descriptive reason for the unisolation request, which
    is logged in RSA NetWitness. |


    ### Flow Description

    1. **Initialization**: The action retrieves connection details (API Root, Credentials)
    and the mandatory unisolation comment.

    2. **Service Discovery**: It connects to the RSA NetWitness API to identify the
    specific `service_id` for the 'endpoint-server'.

    3. **Entity Resolution**: For each provided IP or Hostname entity, the action
    searches the RSA NetWitness database to find the corresponding `agent_id`.

    4. **Unisolation Request**: If a matching agent is found, the action sends a `DELETE`
    request to the isolation endpoint in RSA NetWitness to lift the network restrictions.

    5. **Result Reporting**: The action tracks which entities were successfully unisolated
    and which failed (e.g., if the agent was not found or the API request failed)
    and returns a summary message to the Google SecOps case.
