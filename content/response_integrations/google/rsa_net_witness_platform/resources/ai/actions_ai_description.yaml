Enrich Endpoint:
  ai_description: >-
    ### General Description

    Enriches Hostname and IP Address entities using the RSA NetWitness Platform. This
    action retrieves detailed system information, including agent IDs, risk scores,
    and network interface details (MAC addresses, IPv4/IPv6, gateways, DNS). It allows
    security analysts to automatically assess the risk level of an endpoint based
    on a configurable threshold.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Risk Score Threshold | Integer | No | Specifies the risk threshold for the endpoint.
    If the endpoint's risk score from RSA NetWitness exceeds this value, the entity
    will be marked as suspicious in Google SecOps. Default value is 50. |


    ### Flow Description

    1. **Initialization**: Connects to the RSA NetWitness Web API using configured
    credentials and identifies the required endpoint-server service ID.

    2. **Entity Filtering**: Identifies all IP Address (`ADDRESS`) and `HOSTNAME`
    entities within the current context.

    3. **Data Retrieval**: For each entity, it queries the RSA NetWitness endpoint
    server to find matching host records.

    4. **Enrichment**: If a match is found, it flattens the host data (including network
    interfaces) and updates the entity's additional properties with the prefix `RSA_NTW`.

    5. **Risk Assessment**: Compares the retrieved risk score against the `Risk Score
    Threshold`. If the score is higher, the entity is marked as suspicious.

    6. **Finalization**: Updates the entities in the case, attaches the raw JSON results,
    and provides a summary message of successful and failed enrichments.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entity additional properties with enrichment data and modifies the 'is_suspicious'
      flag based on the risk score threshold.
  categories:
    enrichment: true
  entity_usage:
