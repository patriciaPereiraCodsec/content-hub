    1. **Initialization**: The action initializes the RSA NetWitness manager using
    provided Broker or Concentrator credentials and API roots from the integration
    configuration.

    2. **Entity Filtering**: It identifies all `USER` entities present in the current
    alert context.

    3. **Event Querying**: For each user, it queries RSA NetWitness for network sessions
    where the user is identified as either the source (`user.src`) or destination
    (`user.dst`).

    4. **Data Retrieval**: It fetches the metadata for the identified sessions and
    converts them into a readable format.

    5. **PCAP Extraction**: It requests the raw PCAP data for the sessions associated
    with the user.

    6. **Case Enrichment**: The action adds a data table to the entity containing
    the event details and attaches the PCAP file to the case for further analysis.


