Query NetWitness For Events Around Host:
  ai_description: >-
    ### General Description

    Queries RSA NetWitness to retrieve network events and associated PCAP files for
    Hostname entities. This action is used to gather forensic evidence and network
    activity context during an investigation by searching for sessions where the hostname
    is identified as a source or destination domain.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Max Hours Backwards | Integer | No | Specifies the time window (in hours) to
    look back from the current time for relevant events. Defaults to 1 hour if not
    specified. |

    | Max Events To Return | Integer | No | Limits the number of events retrieved
    and displayed for each hostname. Defaults to 50 if not specified. |


    ### Additional Notes

    * This action requires either the **Broker API** or the **Concentrator API** to
    be fully configured in the integration settings to function.

    * The action downloads PCAP files, which are attached directly to the entities
    in the Google SecOps case.


    ### Flow Description

    1. **Initialization**: The action retrieves connection details (API roots and
    credentials) for the RSA NetWitness Broker or Concentrator and initializes the
    management session.

    2. **Entity Filtering**: It identifies all `HOSTNAME` entities provided in the
    action scope.

    3. **Session Querying**: For each hostname, it queries RSA NetWitness for session
    IDs where the hostname matches the `domain.src` or `domain.dst` fields within
    the specified time range.

    4. **Event Retrieval**: It fetches detailed metadata for the identified sessions
    to construct event objects.

    5. **PCAP Acquisition**: It requests and downloads the PCAP data associated with
    the identified sessions.

    6. **Data Output**: It populates an entity-specific data table with the event
    details and attaches the PCAP file to the entity in the case wall.
