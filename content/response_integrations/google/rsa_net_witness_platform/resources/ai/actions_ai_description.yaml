Ping:
  ai_description: "### General Description\nThe **Ping** action is a diagnostic tool\
    \ designed to verify the connectivity between Google SecOps and the RSA NetWitness\
    \ Platform. It validates the configuration for multiple components of the RSA\
    \ environment, including the Broker, Concentrator, and Web (UI) API. The action\
    \ ensures that the provided credentials and API roots are correct and that the\
    \ network path is open.\n\n### Parameters Description\n| Parameter | Description\
    \ | Type | Mandatory |\n| :--- | :--- | :--- | :--- |\n| None | This action does\
    \ not take any input parameters. It relies on the integration's global configuration.\
    \ | N/A | No |\n\n### Additional Notes\n* The action requires at least one of\
    \ the following configuration sets to be fully populated in the integration settings:\
    \ Broker API, Concentrator API, or Web API.\n* If the Web API is configured, the\
    \ action will attempt to obtain an authentication token.\n* If the Broker or Concentrator\
    \ API is configured, the action will execute a lightweight test query (`select\
    \ sessionid`) to confirm data access.\n\n### Flow Description\n1. **Configuration\
    \ Extraction:** The action retrieves API roots, usernames, passwords, and SSL\
    \ verification settings for the Broker, Concentrator, and Web components from\
    \ the integration configuration.\n2. **Manager Initialization:** It initializes\
    \ the `RSAManager`. During initialization, if Web API credentials are provided,\
    \ it immediately attempts to authenticate and retrieve an access token.\n3. **Connectivity\
    \ Test:** The action calls the `test_connectivity` method. \n    * If a Broker\
    \ or Concentrator is configured, it sends a GET request to the `/sdk` endpoint\
    \ with a minimal query.\n    * If only the Web API is configured, it relies on\
    \ the successful token acquisition from the initialization step.\n4. **Result\
    \ Reporting:** If all configured connections succeed, it returns a success status\
    \ with the message \"Connection Established.\" If any step fails (e.g., authentication\
    \ error, timeout), it catches the exception and reports a failure."
