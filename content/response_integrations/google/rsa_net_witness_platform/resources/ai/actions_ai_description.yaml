Query NetWitness For Events Around IP:
  ai_description: >-
    Queries RSA NetWitness for network events and packet captures (PCAP) associated
    with IP Address entities. This action searches for sessions where the target IP
    is either the source or destination within a specified lookback period. It retrieves
    event metadata, formats it into a data table, and downloads the corresponding
    PCAP file as an attachment for the entity.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Max Hours Backwards | Integer | No | Specifies how many hours back from the
    current time to search for events. Default is 1 hour. |

    | Max Events To Return | Integer | No | Limits the total number of events retrieved
    per entity. Default is 50. |


    ### Flow Description

    1. **Initialization**: Authenticates with the RSA NetWitness Broker or Concentrator
    using the provided configuration credentials.

    2. **Entity Scoping**: Filters the target entities to identify IP Address (ADDRESS)
    types.

    3. **Event Querying**: For each IP, the action performs a query to find session
    IDs where the IP is the source (`ip.src`) or destination (`ip.dst`) within the
    defined time range.

    4. **Metadata Extraction**: Retrieves detailed metadata for the discovered sessions
    and converts them into a structured format.

    5. **PCAP Retrieval**: Downloads the raw packet capture data for the identified
    sessions from the NetWitness appliance.

    6. **Internal Enrichment**: Adds a CSV-formatted table of events to the entity
    and attaches the PCAP file to the entity in the SOAR case.

    7. **Finalization**: Summarizes the results, indicating which IPs had events found
    and which did not.
