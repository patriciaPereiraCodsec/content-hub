Remove URL from Policy Block List:
  ai_description: >-
    ### General Description

    This action removes URL or Hostname entities from a specified iBoss Policy Block
    List. It is used to programmatically unblock web destinations that were previously
    restricted within the iBoss secure web gateway. The action validates the category
    type before attempting removal and updates the entity's status within Google SecOps
    to reflect the change.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Category ID | Integer | Yes | The unique identifier of the iBoss policy category
    from which the URL should be removed. |

    | Start Port | Integer | No | The starting port associated with the URL entry.
    This is required if the original block entry was defined with a specific start
    port. |

    | End Port | Integer | No | The ending port associated with the URL entry. This
    is required if the original block entry was defined with a specific end port.
    |

    | Strip Scheme | Boolean | No | If set to `True`, the action removes the protocol
    prefix (e.g., `http://` or `https://`) from the entity identifier before sending
    the request to iBoss. |


    ### Additional Notes

    - **iBoss Limitation:** The `Start Port` and `End Port` parameters are technically
    optional in the UI but may be mandatory for the API call to succeed if the URL
    was originally blocked with specific port constraints.

    - **Validation:** The action explicitly checks if the provided `Category ID` is
    associated with a 'Block List' type in iBoss; if it is not, the action will stop
    to prevent configuration errors.


    ### Flow Description

    1. **Initialization:** The action extracts iBoss credentials and configuration
    from the integration settings and retrieves the action-specific parameters.

    2. **Category Validation:** It calls the iBoss API to verify that the target `Category
    ID` is a valid blocklist.

    3. **Entity Filtering:** The action identifies all `URL` and `HOSTNAME` entities
    within the current context.

    4. **Normalization:** For each entity, it optionally strips the URI scheme (if
    `Strip Scheme` is enabled) and converts the identifier to lowercase to match iBoss's
    storage format.

    5. **External Deletion:** It executes a `DELETE` request to the iBoss API for
    each entity to remove it from the specified policy category.

    6. **Internal Enrichment:** Upon successful removal from iBoss, the action updates
    the entity in Google SecOps by adding an `IBOSS_policy_blocked` property set to
    `False` and marking the entity as enriched.

    7. **Finalization:** The action provides a summary message of successfully removed
    entities and any failures encountered during the process.
