Ping:
  ai_description: >-
    ### General Description

    The **Ping** action is a diagnostic tool designed to verify the connectivity between
    Google SecOps and the IBoss server. It ensures that the provided integration configuration
    parameters (API roots and credentials) are correct and that the IBoss API is reachable.


    ### Parameters Description

    This action does not take any action-specific input parameters. It relies entirely
    on the **Integration Configuration** parameters:


    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Cloud API Root | String | Yes | The base URL for the IBoss Cloud API. |

    | Account API Root | String | Yes | The base URL for the IBoss Account API. |

    | Username | String | Yes | The username for the IBoss account. |

    | Password | String | Yes | The password for the IBoss account. |

    | Verify SSL | Boolean | No | If enabled (default), the action verifies the SSL
    certificate of the IBoss server. |


    ### Flow Description

    1. **Parameter Extraction:** The action retrieves the connection details (API
    roots, credentials, and SSL settings) from the integration configuration.

    2. **Authentication Flow:** The IBoss Manager is initialized, which triggers a
    multi-step authentication process:
        * Retrieves an authentication token using the provided credentials.
        * Fetches account settings and session identifiers.
        * Establishes a session cookie for subsequent requests.
    3. **Connectivity Test:** The action sends a GET request to the IBoss `/json/preferences/time`
    endpoint to confirm the API is responsive.

    4. **Result Reporting:** If the request is successful, the action completes with
    a success message. If any step fails (authentication or network request), it logs
    the error and reports a failure.


    ### Additional Notes

    * This action does not process any entities.

    * It is primarily used during the initial setup of the integration or for troubleshooting
    connection issues.
