Add URL to Policy Block List:
  ai_description: >-
    ### General Description

    This action adds URL and Hostname entities to a specified iBoss Policy Block List
    category. It enables automated containment by blocking access to malicious web
    destinations. The action validates the category type before attempting the block
    and enriches the entities in Google SecOps to reflect their blocked status.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Category ID | Integer | Yes | The unique identifier of the iBoss policy category
    where the URL will be added. |

    | Priority | Integer | Yes | The priority level assigned to this block entry.
    |

    | Direction | String | Yes | Specifies the traffic direction: 'Destination', 'Source',
    or 'Destination and Source'. |

    | Start Port | Integer | No | The starting port for the block rule. |

    | End Port | Integer | No | The ending port for the block rule. |

    | Note | String | No | A descriptive note to be attached to the block entry in
    iBoss. |

    | Is Regular Expression | Boolean | No | If enabled, the URL identifier will be
    treated as a regular expression. |

    | Strip Scheme | Boolean | No | If enabled, the action will remove the protocol
    scheme (e.g., http://) from the URL. |


    ### Additional Notes

    - The action specifically targets URL and Hostname entities.

    - If the provided Category ID does not belong to a 'Block List' type in iBoss,
    the action will return a failure.

    - The action updates the entity's additional properties with a 'policy_blocked'
    flag.


    ### Flow Description

    1. **Authentication**: The action initializes the iBoss manager using the provided
    API roots and credentials to obtain an authentication token.

    2. **Category Validation**: It verifies that the target `Category ID` is configured
    as a block list in the iBoss settings via a GET request.

    3. **Entity Filtering**: It identifies suitable entities (URLs and Hostnames)
    from the target list.

    4. **URL Preparation**: For each entity, it optionally strips the scheme and prepares
    the payload based on the provided parameters (priority, direction, ports, regex
    flag).

    5. **External Mutation**: It sends a PUT request to the iBoss API to add the entity
    to the policy block list.

    6. **Internal Enrichment**: Upon success, it updates the entity in Google SecOps
    by setting `is_enriched` to true and adding the `IBOSS_policy_blocked` property.
