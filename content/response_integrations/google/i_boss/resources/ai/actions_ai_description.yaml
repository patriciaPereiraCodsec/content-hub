    external_data_mutation_explanation: >-
      Adds a URL or Hostname entry to a specified policy block list category in the
      iBoss web gateway via a PUT request.
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates the entity's additional properties with 'IBOSS_policy_blocked: True'
