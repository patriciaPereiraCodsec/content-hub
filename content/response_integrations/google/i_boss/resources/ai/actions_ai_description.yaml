URL Lookup:
  ai_description: >-
    ### General Description

    Enriches URL and Hostname entities by querying the iBoss platform to retrieve
    categorization, policy actions, and status messages. This action helps security
    analysts understand how a specific URL or Hostname is classified within their
    web gateway policy and what action (e.g., allow, block) is currently associated
    with it.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Group ID | String | No | Specifies the group for which to perform the URL lookup.
    If left empty, the "Default" group will be used by the iBoss platform. |


    ### Additional Notes

    - The action specifically targets entities of type **URL** (mapped to DestinationURL)
    and **HOSTNAME**.

    - It updates the entity's additional properties with the prefix `IBOSS`.

    - If a lookup is successful, the entity is marked as enriched in the Google SecOps
    environment.


    ### Flow Description

    1. **Initialization**: The action extracts integration configuration (API roots,
    credentials) and the optional `Group ID` parameter.

    2. **Entity Filtering**: It identifies all `URL` and `HOSTNAME` entities within
    the current alert or case context.

    3. **External Query**: For each identified entity, it sends a lookup request to
    the iBoss `url_lookup` endpoint, optionally including the `Group ID` to contextualize
    the policy check.

    4. **Data Processing**: The response from iBoss (containing categories, actions,
    and messages) is parsed and converted into a flat dictionary format.

    5. **Internal Update**: The action updates the entity's `additional_properties`
    with the retrieved data, sets the `is_enriched` flag to `True`, and attaches the
    raw JSON result to the action output.

    6. **Completion**: It provides a summary message indicating which entities were
    successfully enriched and which failed.
