URL Recategorization:
  ai_description: >-
    ### General Description

    Submits URL entities to the iBoss platform for recategorization. This action is
    used to request a change in how a specific URL is classified within the iBoss
    web gateway security policies, which is useful for correcting misclassifications
    or updating threat intelligence.


    ### Parameters Description

    There are no action-specific parameters for this action. It utilizes the global
    integration configuration parameters:

    * **Cloud API Root**: The root URL for the iBoss Cloud API.

    * **Account API Root**: The root URL for the iBoss Account API.

    * **Username**: The username for authentication.

    * **Password**: The password for authentication.

    * **Verify SSL**: Boolean flag to enable/disable SSL certificate verification.


    ### Additional Notes

    This action performs a state-changing operation on the external iBoss system by
    submitting a recategorization request. It does not return enrichment data to the
    SOAR case but rather triggers an external workflow in iBoss.


    ### Flow Description

    1. **Initialization**: The action initializes the iBoss Manager using the provided
    API roots and credentials from the integration configuration.

    2. **Entity Filtering**: It identifies and filters the target entities to process
    only those of type URL.

    3. **Submission**: For each URL entity, it calls the `url_recategorization` method
    in the iBoss Manager, which sends a POST request to the `/json/controls/urlLookup/recatSite`
    endpoint.

    4. **Result Tracking**: The action maintains lists of successfully submitted and
    failed URLs.

    5. **Final Reporting**: It generates a summary message detailing the success or
    failure of the submission for each entity and sets the action's execution status.
