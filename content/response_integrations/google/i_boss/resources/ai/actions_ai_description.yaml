Remove IP from Policy Block List:
  ai_description: >-
    ### General Description

    Removes IP Address entities from a specified policy blocklist within the iBoss
    platform. This action is used to manage network access by reversing previous blocking
    actions or cleaning up policy categories during incident response.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Category ID | String | Yes | The unique identifier of the iBoss policy category
    from which the IP should be removed. |

    | Start Port | Integer | No | The starting network port associated with the IP
    entry to be deleted. This is required if the original block entry in iBoss was
    defined with a specific start port. |

    | End Port | Integer | No | The ending network port associated with the IP entry
    to be deleted. This is required if the original block entry in iBoss was defined
    with a specific end port. |


    ### Additional Notes

    - The action first validates that the provided Category ID is actually associated
    with a blocklist in iBoss before attempting any removals.

    - If an IP was blocked with specific port constraints, those same ports must be
    provided to successfully identify and remove the entry due to iBoss API limitations.


    ### Flow Description

    1. **Initialization**: Extracts iBoss configuration (API roots, credentials) and
    action parameters (Category ID, Ports).

    2. **Validation**: Calls the iBoss API to verify that the specified Category ID
    exists and is configured as a blocklist.

    3. **Entity Filtering**: Identifies all IP Address entities (ADDRESS) from the
    target entities list.

    4. **External Mutation**: For each valid IP entity, sends a DELETE request to
    the iBoss API to remove the IP and port combination from the specified policy
    category.

    5. **Internal Mutation**: Updates the entity's additional properties in Google
    SecOps, setting the 'IBOSS_policy_blocked' field to 'False' and marking the entity
    as enriched.

    6. **Completion**: Updates all processed entities in the case and returns a summary
    message of successful and failed removals.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: >-
      The action performs a DELETE request to the iBoss API to remove an IP address
      entry from a specific policy blocklist category.
    fetches_data: false
    internal_data_mutation_explanation: >-
      The action updates the 'additional_properties' of the entities to set 'IBOSS_policy_blocked'
      to 'False' and marks the entities as enriched.
