List Policy Block List Entries:
  ai_description: >-
    ### General Description

    This action retrieves and lists entries (URLs or IP addresses) from a specific
    iBoss Block List category. It is used to audit or verify the contents of a policy
    group within the iBoss platform. The action validates that the provided Category
    ID is indeed a block list before fetching the data, ensuring that only relevant
    policy information is processed.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Category ID | String/Integer | Yes | The unique identifier for the iBoss policy
    category from which to retrieve block list entries. |

    | Max Entries to Return | Integer | No | The maximum number of entries to fetch
    and display. Defaults to 50 if not specified. |


    ### Additional Notes

    - If the provided Category ID is not associated with a Block List in iBoss, the
    action will terminate gracefully with a message stating the category type mismatch.

    - The results are presented both as a raw JSON object and as a formatted data
    table on the case wall.


    ### Flow Description

    1. **Authentication**: The action connects to the iBoss API using the configured
    Cloud and Account API roots and credentials.

    2. **Category Validation**: It performs a check against the iBoss settings API
    to confirm that the `Category ID` provided by the user corresponds to a Block
    List.

    3. **Data Fetching**: Upon validation, it queries the iBoss policy layers to retrieve
    the list of blocked entries (URLs/IPs) for that category.

    4. **Result Slicing**: The retrieved list is truncated to match the `Max Entries
    to Return` parameter.

    5. **Output Generation**: The action attaches a data table to the case wall containing
    details such as URL/IP, Priority, Weight, Direction, and Ports, and provides the
    full raw data in the JSON result.
  capabilities:
