Add IP to Policy Block List:
  ai_description: >-
    ### General Description

    Adds IP addresses to a specified iBoss Policy Block List category. This action
    is used to programmatically block network traffic associated with specific IP
    entities by adding them to the iBoss web gateway's filtering policies. It supports
    configuration of traffic direction, port ranges, and priority levels for the block
    rule.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Category ID | String | Yes | The unique identifier of the iBoss policy category
    where the IP will be added. |

    | Priority | Integer | Yes | The priority level (0-100) assigned to the block
    entry. Default is 50. |

    | Direction | Dropdown | Yes | Specifies the traffic direction to block: 'Destination',
    'Source', or 'Destination and Source'. |

    | Start Port | Integer | No | The beginning of the port range to block. If only
    one port is specified, it may be applied to both start and end. |

    | End Port | Integer | No | The end of the port range to block. |

    | Note | String | No | An optional descriptive note to attach to the block entry
    in iBoss. |

    | Is Regular Expression | Boolean | No | If enabled, the IP string will be treated
    as a regular expression by the iBoss engine. |


    ### Additional Notes

    - The action performs a pre-validation check to ensure the provided `Category
    ID` is associated with a 'Block List' type in iBoss before attempting to add entities.

    - If the category is not a block list, the action will fail with a specific error
    message.


    ### Flow Description

    1. **Initialization**: Retrieves iBoss configuration (API roots and credentials)
    and action parameters.

    2. **Authentication**: Establishes a session with the iBoss API and retrieves
    necessary authentication tokens and cookies.

    3. **Validation**: Checks the iBoss settings for the provided `Category ID` to
    confirm it is a valid block list.

    4. **Entity Processing**: Filters the target entities for IP addresses (`ADDRESS`).

    5. **External Mutation**: For each valid IP entity, it sends a request to the
    iBoss API to add the IP to the specified policy category with the defined priority,
    direction, and ports.

    6. **Internal Enrichment**: Upon successful blocking, it updates the entity in
    Google SecOps by adding the property `IBOSS_policy_blocked: True` and marking
    it as enriched.

    7. **Completion**: Updates all processed entities and returns a summary message
    of successful and failed operations.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: >-
      Adds IP addresses to the active filtering policy categories within the iBoss
      cloud gateway, effectively blocking traffic based on the provided parameters.
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates the 'additional_properties' of the IP entities to include a 'policy_blocked'
      flag and marks the entities as enriched.
  categories:
    enrichment: false
  entity_usage:
