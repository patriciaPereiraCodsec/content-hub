Ping:
  ai_description: >-
    ### General Description

    The **Ping** action is a diagnostic tool designed to verify the connectivity between
    Google SecOps and the **CheckPoint Threat Reputation** service. It ensures that
    the integration is correctly configured and that the API is accessible using the
    provided credentials.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | API Root | String | Yes | The base URL for the CheckPoint Threat Reputation
    API. |

    | API Key | String | Yes | The client key used to authenticate and generate session
    tokens. |

    | Verify SSL | Boolean | Yes | If enabled, the action will verify the SSL certificate
    of the API server. Defaults to `True`. |


    ### Flow Description

    1. **Configuration Retrieval**: The action fetches the `API Root`, `API Key`,
    and `Verify SSL` settings from the integration configuration.

    2. **Manager Initialization**: It initializes the `CheckPointThreatReputationManager`.
    During initialization, the manager automatically attempts to retrieve a session
    token from the CheckPoint service by making a GET request to the authentication
    endpoint.

    3. **Connectivity Test**: The action calls the `test_connectivity` method, which
    sends a GET request to the service's request endpoint to confirm the API is responsive.

    4. **Result Reporting**: If the request is successful, it returns a success message
    and sets the execution status to completed. If any step fails (e.g., invalid credentials,
    network timeout), it logs the error and reports a failure.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
  categories:
    enrichment: false
  entity_usage:
    entity_types: []
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: false
