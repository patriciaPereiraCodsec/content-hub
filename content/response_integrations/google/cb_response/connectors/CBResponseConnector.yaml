name: Carbon Black Response Connector
parameters:
-   name: DeviceProductField
    default_value: device_product
    type: string
    description: The field name used to determine the device product
    is_mandatory: true
    is_advanced: false
    mode: regular
-   name: EventClassId
    default_value: name
    type: string
    description: The field name used to determine the event name (sub-type)
    is_mandatory: false
    is_advanced: false
    mode: regular
-   name: PythonProcessTimeout
    default_value: '60'
    type: string
    description: The timeout limit (in seconds) for the python process running current
        script
    is_mandatory: true
    is_advanced: false
    mode: regular
-   name: Api Root
    default_value: ''
    type: string
    description: https://x.x.x.x
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Api Key
    default_value: ''
    type: password
    description: Api Key
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Version
    default_value: '6.3'
    type: string
    description: CB server version, default 6.3 will be used
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Alerts Count Limit
    default_value: '20'
    type: integer
    description: Limit the number of alerts in every cycle. e.g. 20.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Max Days Backwards
    default_value: '3'
    type: integer
    description: Number of days before the first connector iteration to retrieve incidents
        from. This parameter applies to the initial connector iteration after you
        enable the connector for the first time, or used as a fallback value in cases
        where connector's last run timestamp expires.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Environment Field Name
    default_value: ''
    type: string
    description: The name of the environment's field.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: List Type
    default_value: ''
    type: string
    description: Can be whitelist or blacklist.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: List Operator
    default_value: ''
    type: string
    description: Can be 'exact', 'start with', 'ends with' or 'contains'.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: List Fields
    default_value: ''
    type: string
    description: List of fields, comma separated.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: CA Certificate File
    default_value: ''
    type: string
    description: CA certificate file to use with the verify_ssl option. Certificate
        file should be specified as a Base64-encoded string.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Verify SSL
    default_value: false
    type: boolean
    description: Whether to verify ssl certificate on connection or not
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Proxy Server Address
    default_value: ''
    type: string
    description: The address of the proxy server to use.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Proxy Username
    default_value: ''
    type: string
    description: The proxy username to authenticate with.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Proxy Password
    default_value: ''
    type: password
    description: The proxy password to authenticate with.
    is_mandatory: false
    is_advanced: false
    mode: script
description: ''
integration: CBResponse
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/carbon-black-response#connectors
rules: []
is_connector_rules_supported: false
creator: admin
