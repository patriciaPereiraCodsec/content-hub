Ping:
  ai_description: >-
    ### General Description

    The **Ping** action is a diagnostic utility designed to verify the connectivity
    between the Google SecOps environment and the Carbon Black Response (CB Response)
    server. It ensures that the provided credentials (API Key) and server details
    (API Root) are correct and that the network path is open. This action is typically
    used during the initial setup of the integration or for troubleshooting communication
    issues.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Api Root** | String | Yes | The base URL of the Carbon Black Response server
    (e.g., `https://cb-server.example.com`). |

    | **Api Key** | String | Yes | The API token used for authentication with the
    Carbon Black Response API. |

    | **Version** | Float | Yes | The version of the Carbon Black Response server
    (e.g., `5.1`, `6.3`). This determines which API manager logic is loaded. |

    | **CA Certificate File** | String | No | A base64-encoded CA certificate file
    used for SSL verification if a private CA is used. |

    | **Verify SSL** | Boolean | No | If set to `True`, the action will verify the
    SSL certificate of the server. Defaults to `False`. |


    ### Flow Description

    1.  **Initialization**: The action retrieves the integration configuration parameters,
    including the API Root, API Key, Version, and SSL settings.

    2.  **Manager Loading**: Based on the provided `Version` parameter, the `CBResponseManagerLoader`
    instantiates the appropriate version-specific manager (e.g., `CBResponseManager5_1`,
    `CBResponseManager6_3`, or the base `CBResponseManager`).

    3.  **Connectivity Test**: The action calls the `get_license()` method of the
    manager, which performs a `GET` request to the `/api/v1/license` endpoint of the
    Carbon Black Response server.

    4.  **Validation**: If the API call returns a successful response, the action
    confirms connectivity. If an exception occurs (e.g., HTTP error, timeout, or authentication
    failure), the action catches the error and reports a failure.

    5.  **Completion**: The action returns a boolean result (`true` for success, `false`
    for failure) and an output message indicating the connection status.


    ### Additional Notes

    - This action does not process any entities and is strictly for system-level connectivity
    testing.

    - If `Verify SSL` is enabled and a `CA Certificate File` is provided, the action
    will decode the certificate and use it to validate the server's identity.
