Enrich Process:
  ai_description: >-
    ### General Description

    The **Enrich Process** action retrieves detailed process metadata from Carbon
    Black Response for **PROCESS** entities and correlates this data with **HOSTNAME**
    entities within the case. It provides visibility into process execution details
    such as command lines, MD5 hashes, parent process information, and execution timestamps
    to assist in incident investigation.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | N/A | N/A | N/A | This action does not have any input parameters. |


    ### Additional Notes

    This action is read-only regarding the Carbon Black Response environment. It relies
    on the integration's global configuration (Api Root, Api Key, Version, etc.) to
    establish a connection.


    ### Flow Description

    1. **Entity Identification**: The action identifies all **PROCESS** and **HOSTNAME**
    entities in the current scope.

    2. **Data Retrieval**: For each **PROCESS** entity, the action queries the Carbon
    Black Response API using the entity's identifier (process name) to find matching
    process executions.

    3. **Process Enrichment**: If matching processes are found, the action updates
    the **PROCESS** entity's additional properties with the retrieved metadata (prefixed
    with `CB_RESPONSE`) and marks the entity as enriched.

    4. **Host Correlation**: The action correlates the retrieved process data with
    **HOSTNAME** entities. If a process was executed on a specific host, a "Processes"
    data table is attached to that **HOSTNAME** entity for context.

    5. **Result Reporting**: The action returns a JSON result containing the full
    raw data for all identified processes and updates the entities in the Google SecOps
    platform.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
