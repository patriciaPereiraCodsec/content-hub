Hosts By Process:
  ai_description: >-
    ### General Description

    Retrieves host (sensor) information associated with a specific process name from
    Carbon Black Response. This action is used to identify which machines in the environment
    have executed a particular process, providing visibility into the scope of a process's
    presence across the network.


    ### Parameters Description

    There are no action-specific parameters for this action. It relies on the global
    integration configuration (Api Root, Api Key, etc.) and the identifiers of the
    input entities.


    ### Additional Notes

    This action specifically targets `PROCESS` entities. It performs a search for
    the process name and then resolves the associated sensor IDs to provide detailed
    host metadata such as OS version, IP address, and isolation status.


    ### Flow Description

    1. **Configuration Initialization**: Retrieves Carbon Black Response API credentials
    and connection settings from the integration configuration.

    2. **Entity Filtering**: Identifies all `PROCESS` entities within the current
    alert context.

