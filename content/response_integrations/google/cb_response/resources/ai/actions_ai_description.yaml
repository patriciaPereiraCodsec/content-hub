Enrich Binary:
  ai_description: >-
    ### General Description

    Enriches **File Hash** entities (specifically MD5) using Carbon Black Response.
    This action retrieves detailed binary metadata such as product version, company
    name, digital signature status, and observed filenames. The retrieved data is
    added to the entity's additional properties, and the entity is marked as enriched.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Api Root | String | Yes | The endpoint URL for the Carbon Black Response API.
    |

    | Api Key | String | Yes | The API key used for authentication. |

    | Version | Float | Yes | The version of the Carbon Black Response server (e.g.,
    5.1, 6.3). |

    | Verify SSL | Boolean | No | If enabled, the action will verify the SSL certificate
    of the server. Default is False. |

    | CA Certificate File | String | No | Base64 encoded CA certificate file for SSL
    verification. |


    ### Flow Description

    1. **Initialization**: Connects to the Carbon Black Response server using the
    provided credentials and version-specific manager.

    2. **Entity Filtering**: Identifies `FILEHASH` entities from the target list that
    have a length of 32 characters (MD5 hashes).

    3. **Data Retrieval**: For each valid hash, it queries the Carbon Black Response
    API (`/api/v1/binary/{md5}/summary`) to fetch binary metadata.

    4. **Enrichment**: Flattens the retrieved JSON data and updates the entity's additional
    properties with a `CB_RESPONSE` prefix.

    5. **Internal Update**: Marks the entity as enriched and updates the entity records
    within Google SecOps.
