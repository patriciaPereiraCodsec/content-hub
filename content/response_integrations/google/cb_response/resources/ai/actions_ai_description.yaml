Kill Process:
  ai_description: >-
    ### General Description

    Kills a process on a specific host using Carbon Black Response's Live Response
    capabilities. This action is designed to terminate potentially malicious or unwanted
    processes across endpoints identified in a case by matching process names against
    active PIDs on the target sensors.


    ### Parameters Description

    | Parameter Name | Description | Type | Mandatory | Notes |

    | :--- | :--- | :--- | :--- | :--- |

    | None | This action does not have any specific input parameters. | N/A | No |
    It relies entirely on the entities (PROCESS and HOSTNAME) provided in the alert
    context. |


    ### Additional Notes

    * The action requires both `PROCESS` and `HOSTNAME` entities to be present in
    the alert to function. It will attempt to kill every identified process on every
    identified host (Cartesian product).

    * This action utilizes Carbon Black's Live Response (CBLR) API, which may require
    specific permissions and for the sensor to be online.


    ### Flow Description

    1. **Entity Filtering**: The action filters the target entities to identify all
    `PROCESS` and `HOSTNAME` objects.

    2. **Combination Logic**: It generates a list of all possible combinations (pairs)
    of the identified hostnames and processes.

    3. **Sensor Lookup**: For each hostname, it queries the Carbon Black API to retrieve
    the corresponding sensor document and ID.

    4. **Live Response Session**: It initiates or retrieves an active Live Response
    session for the target sensor.

    5. **Process Discovery**: It executes a 'process list' command on the remote host
    via the Live Response session to find all PIDs associated with the target process
    name.

    6. **Process Termination**: It issues a 'kill' command for each identified PID
    matching the process entity's identifier.

    7. **Session Management**: The Live Response session is closed upon completion
    of the task for that sensor.
