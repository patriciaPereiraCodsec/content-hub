Binary Free Query:
  ai_description: >-
    ### General Description

    The **Binary Free Query** action allows users to perform a custom search for binaries
    within the Carbon Black Response environment using a free-form query string. This
    action is designed to retrieve detailed metadata for binaries that match specific
    criteria, such as MD5 hashes, filenames, or digital signature information, without
    being tied to specific entities in a case.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Query** | String | Yes | The Carbon Black search query to execute. For example:
    `md5:098f6bcd4621d373cade4e832627b4f6` or `original_filename:test.exe`. |


    ### Flow Description

    1. **Initialization:** The action extracts the Carbon Black Response integration
    configuration (API Root, API Key, Version, etc.) and the user-provided search
    query.

    2. **Manager Loading:** It utilizes the `CBResponseManagerLoader` to instantiate
    the appropriate manager version for the target environment.

    3. **Data Retrieval:** The action executes a GET request to the Carbon Black binary
    search endpoint (`/api/v1/binary`) using the provided query.

    4. **Pagination:** It automatically handles pagination to retrieve up to the global
    limit of 300 results.

    5. **Result Formatting:** If binaries are found, the action generates a CSV-formatted
    data table named "Binaries" and attaches the full raw JSON data to the action
    results. If no results are found, it reports a successful completion with a "No
    binaries were found" message.


    ### Additional Notes

    - This action does not iterate over or filter existing entities in the Google
    SecOps case; it operates globally based on the input query.

    - The action is read-only and does not modify any data within Carbon Black Response.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
  categories:
