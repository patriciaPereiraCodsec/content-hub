    of type `HOSTNAME` or `ADDRESS`.

    2. **Sensor Identification**: For each valid entity, the action queries the Carbon
    Black Response API to find the corresponding sensor object using the IP address
    or hostname.

    3. **Unisolation Command**: If a sensor is found, the action sends a `PUT` request
    to the Carbon Black Response sensor endpoint, setting the `network_isolation_enabled`
    attribute to `False`.

    4. **Internal Update**: The action updates the processed entities in Google SecOps
    to reflect the successful operation and provides a summary message of the unisolated
    hosts.


    ### Additional Notes

    This action requires the Carbon Black Response sensor to be online or reachable
    for the unisolation command to be queued and eventually executed by the endpoint
    agent.
