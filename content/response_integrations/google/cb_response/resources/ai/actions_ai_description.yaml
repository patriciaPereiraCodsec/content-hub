Block Hash:
  ai_description: >-
    ### General Description

    The **Block Hash** action allows security analysts to blacklist specific file
    hashes within a Carbon Black Response environment. By adding a hash to the blacklist,
    the action prevents the associated binary from executing on any sensor-managed
    endpoint. This action is primarily used for containment during incident response
    to stop the spread of known malicious files.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Api Root | String | Yes | The base URL of the Carbon Black Response API server.
    |

    | Api Key | String | Yes | The API token used for authentication with the Carbon
    Black Response server. |

    | Version | Float | Yes | The version of the Carbon Black Response server (e.g.,
    5.1, 6.3). |

    | CA Certificate File | String | No | Base64 encoded CA certificate file for SSL
    verification. |

    | Verify SSL | Boolean | No | If enabled, the action will verify the SSL certificate
    of the API server. Defaults to False. |


    ### Flow Description

    1. **Initialization**: The action retrieves integration-level configuration parameters
    (API credentials and server version) and initializes the Carbon Black Response
    manager.

    2. **Entity Filtering**: It identifies `FILEHASH` entities from the current context
    that are exactly 32 characters long (MD5 hashes).

    3. **Execution**: For each valid hash, it sends a POST request to the Carbon Black
    Response `/api/v1/banning/blacklist` endpoint to enable the ban.

    4. **Completion**: The action tracks successful and failed blocks and returns
    a summary message to the case wall.


    ### Additional Notes

    * This action specifically targets MD5 hashes (32 characters). Other hash types
    (SHA1, SHA256) are not supported by this specific script logic.

    * The parameters listed are integration-level configuration parameters required
    for the action to establish a connection.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Adds the file hash to the Carbon Black Response blacklist (banning list) to
      prevent execution.
    fetches_data: false
    internal_data_mutation_explanation: null
  categories:
