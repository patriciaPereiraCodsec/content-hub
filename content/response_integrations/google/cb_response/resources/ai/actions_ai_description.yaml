Get Process Tree Data:
  ai_description: >-
    ### General Description

    Retrieves comprehensive process tree data from Carbon Black Response for a specific
    process identified by its unique Process ID and Segment ID. This action provides
    visibility into the process hierarchy, including its parent process, sibling processes,
    and child processes, returned in a structured JSON format for further analysis.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Process ID | String | Yes | The unique identifier of the process for which to
    retrieve the tree data. |

    | Segment Id | String | Yes | The segment identifier associated with the process
    (e.g., '1'). |


    ### Flow Description

    1. **Initialization**: The action extracts the integration configuration (API
    Root, API Key, Version, SSL settings) and the mandatory action parameters: `Process
    ID` and `Segment Id`.

    2. **Manager Loading**: It initializes the appropriate Carbon Black Response manager
    based on the product version specified in the configuration.

    3. **Data Retrieval**: The action calls the Carbon Black Response API endpoint
    `/api/v1/process/{process_id}/{segment_id}` to fetch the process tree data.

    4. **Result Processing**: The retrieved data, which includes the process details
    along with its parent, siblings, and children, is parsed into a JSON object.

    5. **Output**: The action attaches the process tree JSON to the action results
    and completes the execution with a success message.


    ### Additional Notes

    This action does not operate on Google SecOps entities (such as IP addresses or
    Hostnames) found in the alert. Instead, it relies entirely on the specific Carbon
    Black internal identifiers (`Process ID` and `Segment Id`) provided as input parameters.
    These identifiers are typically obtained from previous search actions or alert
    metadata.
