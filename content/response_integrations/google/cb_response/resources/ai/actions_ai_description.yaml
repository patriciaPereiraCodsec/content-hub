Unblock Hash:
  ai_description: >-
    ### General Description

    Unblocks file hash entities in Carbon Black Response. This action interacts with
    the Carbon Black Response API to remove specific MD5 hashes from the blacklist,
    effectively allowing the files to run in the environment. It is primarily used
    for remediation or reversing a previous block action.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | None | N/A | N/A | This action does not have any input parameters. |


    ### Additional Notes

    * The action specifically targets MD5 hashes (32 characters). Other hash types
    (e.g., SHA1, SHA256) will be ignored by the logic.

    * The action requires the Carbon Black Response integration to be configured with
    valid API credentials and root URL.


    ### Flow Description

    1. **Initialization**: The action initializes the Carbon Black Response manager
    using the provided integration configuration (API Root, API Key, etc.).

    2. **Entity Filtering**: It filters the target entities to identify `FILEHASH`
    entities that have a length of exactly 32 characters (MD5 format).

    3. **Unblocking Logic**: For each valid hash, it sends a DELETE request to the
    Carbon Black Response banning API endpoint (`/api/v1/banning/blacklist/{md5}`)
    to disable the ban.

    4. **Result Reporting**: The action tracks successful and failed unblock attempts
    and returns a summary message to the Google SecOps case wall.
