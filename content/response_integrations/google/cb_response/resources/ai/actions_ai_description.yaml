Get System Info:
  ai_description: >-
    ### General Description

    Retrieves comprehensive system and sensor information for Hostname and IP Address
    entities from Carbon Black Response. This action is used to enrich entities with
    real-time endpoint data, such as operating system details, network configuration,
    sensor health, and uptime, providing analysts with immediate context regarding
    the state of the affected host.


    ### Parameters Description

    There are no action-specific parameters for this action. It relies on the global
    integration configuration (Api Root, Api Key, etc.).


    ### Additional Notes

    - The action supports both **HOSTNAME** and **ADDRESS** (IP) entity types.

    - It maps Carbon Black sensor data to the entity's additional properties using
    the prefix `CB_RESPONSE`.

    - A data table is added to each successfully enriched entity for quick visualization
    of key sensor attributes.


    ### Flow Description

    1. **Initialization**: The action initializes the Carbon Black Response manager
    using the provided integration credentials and version settings.

    2. **Entity Filtering**: It identifies all Hostname and IP Address entities within
    the current alert context.

    3. **Data Retrieval**: For each entity, it queries the Carbon Black Response API
    to find a matching sensor. If the entity is an IP, it searches by IP; if it is
    a Hostname, it searches by computer name.

    4. **Enrichment**: If a sensor is found, the action retrieves the raw sensor data,
    flattens it, and adds it to the entity's `additional_properties`.

    5. **Internal Updates**: It marks the entity as enriched, attaches a formatted
    data table containing key metrics (ID, FQDN, OS, Status, etc.), and updates the
    entity in the Google SecOps platform.

    6. **Finalization**: The action returns a JSON result containing the full sensor
    data for all processed entities and provides a summary message of the enrichment
    results.
