Create Watchlist:
  ai_description: >-
    ### General Description

    Creates a new watchlist in Carbon Black Response to monitor for specific processes
    or binaries based on a provided raw query. This action allows security teams to
    automate the creation of detection logic within the Carbon Black environment directly
    from Google SecOps. Once the watchlist is created, the action also automatically
    enables alert actions for it, ensuring that any matches against the query generate
    alerts in the Carbon Black system.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Watchlist Name | String | Yes | The unique name to assign to the new watchlist.
    |

    | Query | String | Yes | The raw Carbon Black query string that defines the matching
    criteria (e.g., `process_name:cmd.exe`). |

    | Watchlist Type | String | Yes | Specifies the index type for the watchlist.
    Use `events` for process-based watchlists or `modules` for binary-based watchlists.
    |


    ### Additional Notes

    - The action automatically prepends `q=` to the query if it is not already present.

    - This action performs two distinct API calls: one to create the watchlist and
    another to enable the 'alert' action type for that watchlist.


    ### Flow Description

    1. **Initialization**: The action initializes the Carbon Black Response manager
    using the provided integration configuration (API Root, API Key, etc.).

    2. **Query Formatting**: It checks the provided `Query` parameter and ensures
    it is correctly formatted for the Carbon Black API.

    3. **Watchlist Creation**: It sends a POST request to the Carbon Black API to
    create the watchlist with the specified name, query, and type.

    4. **Alert Activation**: Upon successful creation, it retrieves the new watchlist
    ID and sends a subsequent request to enable alert generation for that specific
    watchlist.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Creates a new watchlist object and enables alert actions for it within the Carbon
      Black Response platform.
    fetches_data: false
