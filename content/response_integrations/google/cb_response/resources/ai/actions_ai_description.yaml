Isolate Host:
  ai_description: >-
    ### General Description

    Isolates an endpoint from the network using Carbon Black Response. This action
    is used to contain potentially compromised hosts by disabling their network connectivity
    through the Carbon Black sensor.


    ### Parameters Description

    There are no action-specific parameters for this action. It relies on the integration's
    configuration (Api Root, Api Key, Version, etc.) to establish a connection with
    the Carbon Black Response server.


    ### Additional Notes

    * The action supports both **HOSTNAME** and **ADDRESS** (IP) entity types.

    * It requires a valid sensor to be associated with the entity in Carbon Black
    Response to perform the isolation.

    * If multiple sensors are found for a single IP or Hostname, the logic typically
    processes the first one returned by the API.


    ### Flow Description

    1. **Initialization**: The action initializes the Carbon Black Response manager
    using the provided integration configuration.

    2. **Entity Filtering**: It identifies all Hostname and IP Address entities within
    the current scope.

    3. **Sensor Retrieval**: For each identified entity, it queries the Carbon Black
    Response API to find the corresponding sensor ID.

    4. **Isolation Command**: If a sensor is found, the action sends a `PUT` request
    to the Carbon Black API to set the `network_isolation_enabled` status to `True`
    for that specific sensor.

    5. **Result Tracking**: The action tracks which entities were successfully isolated
    and which failed (e.g., due to no sensor found or API errors).

    6. **Finalization**: The action concludes by providing a summary message of the
    isolation results for all processed entities.
