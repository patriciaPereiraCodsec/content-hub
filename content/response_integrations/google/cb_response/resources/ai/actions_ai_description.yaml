Download Binary:
  ai_description: >-
    ### General Description

    The **Download Binary** action retrieves the physical binary file associated with
    a specific MD5 file hash from the Carbon Black Response platform. This is useful
    for forensic analysis or malware sandboxing, as it allows analysts to obtain the
    actual file that triggered an alert.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | N/A | N/A | N/A | This action does not have any input parameters. |


    ### Flow Description

    1. **Initialization**: The action loads the Carbon Black Response manager based
    on the configured version.

    2. **Entity Filtering**: It identifies `FILEHASH` entities from the current context
    that have a length of exactly 32 characters (MD5 format).

    3. **Data Retrieval**: For each valid hash, it queries the Carbon Black API to
    download the binary.

    4. **Extraction**: The API returns a ZIP file; the action extracts the raw binary
    data (the 'filedata' member) from this archive.

    5. **Attachment**: The extracted binary is base64-encoded and attached to the
    entity within the Google SecOps case.

    6. **Finalization**: The action updates the entities and returns the base64 content
    in the JSON results.


    ### Additional Notes

    * This action specifically requires MD5 hashes (32 characters). Other hash types
    (SHA1, SHA256) are not supported by this specific logic.

    * As this action downloads files, it is not categorized as a standard enrichment
    action.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Adds the downloaded binary as an attachment to the entity and updates the entity
      state within the case.
  categories:
    enrichment: false
  entity_usage:
    entity_types:
    - FILEHASH
