DetonateFile:
  ai_description: >-
    ### General Description

    The **Detonate File** action uploads one or more files to the Palo Alto Networks
    Wildfire sandbox for behavioral analysis and detonation. It is used to determine
    if a suspicious file is malicious by executing it in a controlled environment.
    The action retrieves detailed analysis reports and attaches them to the case for
    further investigation.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **File Paths** | String | Yes | A comma-separated list of absolute or relative
    file paths to be uploaded to Wildfire (e.g., `C:\temp\malware.exe,C:\temp\doc.pdf`).
    |


    ### Flow Description

    1. **File Submission**: The action reads the provided file paths and uploads each
    file to the Wildfire service using the `submit_file` method.

    2. **Polling for Results**: It enters a polling loop, checking the status of the
    analysis for each file's MD5 hash every 5 seconds until the reports are ready.

    3. **Data Retrieval**: Once analysis is complete, it fetches the detailed XML
    report and the full PDF report from Wildfire.

    4. **Insight Generation**: If Wildfire classifies a file as malware (`malware
    == "yes"`), the action creates a case insight containing the file path and MD5
    hash.

    5. **Reporting and Attachments**: It attaches the PDF report to the case and adds
    a flattened version of the task information as a data table to the action results.


    ### Additional Notes

    - This action does not process entities from the alert; it relies entirely on
    the file paths provided in the parameters.

    - The action will block and wait until all submitted files have finished processing
    in the Wildfire sandbox.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: true
    can_update_entities: false
    external_data_mutation_explanation: >-
      Uploads files to the Wildfire sandbox for analysis, which creates new analysis
      tasks and records in the external system.
    fetches_data: true
    internal_data_mutation_explanation: >-
      Creates case insights if malware is detected and adds PDF reports as attachments
      to the case.
  categories:
    enrichment: false
  entity_usage:
    entity_types: []
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: false
    filters_by_identifier: false
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: false
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
GetFile:
  ai_description: >-
    ### General Description

    The **GetFile** action enables the retrieval and storage of file samples from
    Palo Alto Networks Wildfire. It is designed for security analysts to obtain the
    actual malware or file content associated with a specific file hash for further
    forensic investigation or manual analysis.


    ### Parameters

    There are no parameters for this action.


    ### Flow Description

    1. **Manager Initialization**: The action establishes a connection to the Wildfire
    service using the API key defined in the integration settings.

    2. **Entity Processing**: It iterates through all entities in the current context,
    filtering for those of type `FILEHASH`.

    3. **Hash Validation**: The action checks if the hash identifier is a valid MD5
    (32 characters) or SHA256 (64 characters) string.

    4. **Sample Retrieval**: For each valid hash, it calls the Wildfire API to download
    the file sample.

    5. **SOAR Attachment**: If the file is successfully retrieved, the action base64-encodes
    the content and attaches it to the corresponding entity in Google SecOps using
    the `add_entity_attachment` method.

    6. **Final Reporting**: The action returns a summary message listing the entities
    for which files were successfully downloaded and any error messages encountered
    during the process.


    ### Additional Notes

    This action is specifically categorized as a download action. According to standard
    classification rules, actions that download files are not considered enrichment
    actions, even though they fetch data.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      The action adds the downloaded file sample as an attachment to the entity within
      the Google SecOps case.
  categories:
    enrichment: false
  entity_usage:
    entity_types:
    - FILEHASH
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: true
    filters_by_identifier: false
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: false
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
GetPcap:
  ai_description: >-
    ### General Description

    Downloads and saves the PCAP (Packet Capture) file associated with a specific
    file hash from Palo Alto Networks WildFire. This action allows security analysts
    to retrieve network traffic data generated during the analysis of a sample, facilitating
    deeper forensic investigation into the sample's behavior.


    ### Parameters Description

    There are no parameters for this action.


    ### Flow Description

    1. **Authentication**: Establishes a connection to the WildFire service using
    the API key configured in the integration settings.

    2. **Entity Filtering**: Iterates through the target entities and selects those
    of type `FILEHASH`.

    3. **Hash Validation**: Verifies that the entity identifier is a valid MD5 (32
    characters) or SHA256 (64 characters) hash.

    4. **PCAP Retrieval**: Calls the WildFire API to fetch the PCAP file associated
    with the validated hash.

    5. **Internal Attachment**: Encodes the retrieved PCAP content into base64 and
    attaches it to the entity within Google SecOps using the `add_entity_attachment`
    method.

    6. **Reporting**: Provides a summary message indicating which entities had reports
    saved and lists any errors encountered during the process.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Attaches the retrieved PCAP file as an attachment to the specific FILEHASH entity
      within the Google SecOps case.
  categories:
    enrichment: false
  entity_usage:
    entity_types:
    - FILEHASH
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: true
    filters_by_identifier: false
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: false
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
GetReport:
  ai_description: >-
    ### General Description

    This action retrieves detailed detonation reports and analysis from Palo Alto
    Networks WildFire for file hash entities. It is designed to provide security analysts
    with deep visibility into file behavior by fetching both structured XML data and
    a human-readable PDF report. The action automatically assesses the risk level
    of the file and enriches the SOAR case with metadata and attachments.


    ### Parameters Description

    There are no user-configurable parameters for this action. It relies on the global
    integration configuration (API Key) and the entities present in the current scope.


    ### Additional Notes

    - The action specifically supports MD5 (32 characters) and SHA256 (64 characters)
    hash formats.

    - It performs internal data mutations by updating entity attributes and attaching
    files, but it does not modify any external system state.

    - Because this action downloads and attaches files (PDF reports), it is not classified
    as a standard enrichment action according to the defined criteria.


    ### Flow Description

    1. **Entity Validation**: The action iterates through all target entities and
    identifies those of type `FILEHASH` with valid MD5 or SHA256 lengths.

    2. **Data Retrieval**: For each valid hash, it queries the WildFire API to retrieve
    the XML analysis report and the binary PDF report.

    3. **Malware Assessment**: If the WildFire report indicates the file is malware
    (`malware: yes`), the action marks the entity as suspicious and generates a high-visibility
    insight.

    4. **Entity Enrichment**: The action updates the entity's additional properties
    with file metadata (prefixed with 'Wildfire') and adds a data table containing
    task information.

    5. **Attachment**: The retrieved PDF report is encoded and attached directly to
    the entity within the Google SecOps case.

    6. **Final Update**: All enriched entities are updated in the system, and a summary
    message is returned.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      The action updates the 'is_suspicious' status of entities, populates 'additional_properties'
      with file metadata, creates entity insights, and adds file attachments (PDF
      reports) and data tables to the case.
  categories:
    enrichment: false
  entity_usage:
    entity_types:
    - FILEHASH
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: true
    filters_by_identifier: false
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: false
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
Ping:
  ai_description: >-
    ### General Description

    The **Ping** action is a diagnostic tool designed to verify the connectivity between
    the Google SecOps platform and the Palo Alto Networks Wildfire service. Its primary
    purpose is to ensure that the integration is correctly configured with a valid
    API key and that the environment can successfully communicate with the Wildfire
    API endpoints.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | N/A | N/A | N/A | This action does not require any input parameters. |


    ### Additional Notes

    - This action is typically used during the initial setup of the Wildfire integration
    or for troubleshooting connection issues.

    - It uses a set of predefined, safe URLs to test the submission capability of
    the Wildfire API.


    ### Flow Description

    1. **Configuration Retrieval**: The action retrieves the 'Api Key' from the Wildfire
    integration settings.

    2. **Manager Initialization**: It initializes the `WildfireManager` using the
    provided API key.

    3. **Connectivity Test**: The action calls the `test_connectivity` method, which
    attempts to submit a list of test URLs (e.g., paloaltonetworks.com, google.com)
    to the Wildfire service.

    4. **Result Reporting**: If the API call is successful and no exceptions are raised,
    the action concludes with a success message indicating that the connection was
    established.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: false
    internal_data_mutation_explanation: null
  categories:
    enrichment: false
  entity_usage:
