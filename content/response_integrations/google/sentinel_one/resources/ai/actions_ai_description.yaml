Enrich Endpoint:
  ai_description: >-
    ### General Description

    Enriches endpoint entities (IP addresses or Hostnames) with detailed system information
    retrieved from SentinelOne. This action helps analysts gain immediate context
    about a machine's operating system, agent status, and network configuration directly
    within the Google SecOps platform.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | None | N/A | N/A | This action does not require any input parameters. |


    ### Flow Description

    1. **Entity Filtering**: The action identifies all IP Address and Hostname entities
    within the current context.

    2. **Agent Identification**: For each entity, it queries the SentinelOne API to
    find the unique Agent ID associated with that identifier.

    3. **Data Retrieval**: It fetches comprehensive system information for the identified
    agent.

    4. **Data Processing**: The retrieved system metadata is flattened and formatted.

    5. **Internal Enrichment**: The action updates the entity's additional properties
    with the system data (prefixed with 'SENO_') and attaches a detailed data table
    to the entity.

    6. **Error Handling**: If an agent cannot be found for a specific entity, the
    error is captured and reported in an 'Unsuccessful Attempts' table.


    ### Additional Notes

    This action is strictly for enrichment and does not modify any settings or states
    within the SentinelOne environment.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entity additional properties with SentinelOne system information and
      adds data tables to the action results.
  categories:
