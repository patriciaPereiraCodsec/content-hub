Get Application List For Endpoint:
  ai_description: >-
    ### General Description

    The **Get Application List For Endpoint** action retrieves a comprehensive list
    of applications installed on a specific endpoint (identified by Hostname or IP
    Address) via the SentinelOne platform. This is useful for vulnerability assessment,
    compliance checking, and identifying unauthorized software during an investigation.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | N/A | N/A | N/A | This action does not require any input parameters. |


    ### Additional Notes

    This action relies entirely on the entities present in the scope. It specifically
    targets IP Addresses and Hostnames to map them to SentinelOne agents. There are
    no user-configurable parameters for this action.


    ### Flow Description

    1. **Entity Filtering**: The action identifies all `ADDRESS` (IP) and `HOSTNAME`
    entities within the current context.

    2. **Agent Identification**: For each entity, it queries the SentinelOne API to
    find the unique `Agent ID` associated with that endpoint.

    3. **Data Retrieval**: Once the Agent ID is found, the action fetches the list
    of installed applications from SentinelOne.

    4. **Result Presentation**: The retrieved application list is formatted as a CSV
    and attached as an entity-specific table in the SOAR interface.

    5. **Error Handling**: If an agent cannot be found for a specific entity, the
    error is captured and displayed in an "Unsuccessful Attempts" data table.

    6. **Entity Update**: Successfully enriched entities are updated within the system.
