    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      The action updates entities to include them in the success list and adds process
      information to entity-specific tables. It also creates a data table to log unsuccessful
      agent lookups.
