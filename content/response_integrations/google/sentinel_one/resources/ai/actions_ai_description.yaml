Initiate Full Scan:
  ai_description: >-
    ### General Description

    The **Initiate Full Scan** action triggers a comprehensive disk scan on endpoints
    managed by SentinelOne. This action is primarily used for incident response and
    forensic investigation to identify malicious files or artifacts across the entire
    file system of a target host.


    ### Parameters

    This action does not require any additional input parameters. It operates based
    on the entities provided in the current context.


    ### Flow Description

    1. **Authentication**: The action connects to the SentinelOne management console
    using the API Root, Username, and Password defined in the integration settings.

    2. **Agent Discovery**: For each **IP Address** or **Hostname** entity, the action
    queries the SentinelOne API to resolve the specific Agent ID associated with that
    endpoint.

    3. **Scan Command**: The action issues a command to the SentinelOne API to initiate
    a full disk scan for all successfully identified agents.

    4. **Error Handling**: If an agent cannot be found for a specific entity, the
    action captures the error and presents a summary table of unsuccessful attempts.

    5. **Completion**: The action concludes by providing a status message indicating
    which entities have started the scan process.


    ### Additional Notes

    * The action supports both IP Address and Hostname entities.

    * A successful result indicates that the scan command was accepted by the SentinelOne
    console; it does not wait for the scan to complete.
