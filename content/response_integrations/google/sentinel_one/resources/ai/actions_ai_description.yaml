Get Process List For Endpoint:
  ai_description: >-
    ### General Description

    The **Get Process List For Endpoint** action retrieves a comprehensive list of
    currently running processes from endpoints managed by SentinelOne. It allows security
    analysts to gain visibility into the execution state of a remote machine during
    an investigation. The action supports both IP Address and Hostname entities and
    outputs the results in a structured tabular format.


    ### Parameters

    There are no user-configurable parameters for this action.


    ### Flow Description

    1. **Entity Filtering**: The action identifies all `ADDRESS` (IP) and `HOSTNAME`
    entities within the current alert or case scope.

    2. **Agent Identification**: For each identified entity, the action queries the
    SentinelOne API to find the corresponding `agent_id`. It searches by IP address
    for `ADDRESS` entities and by computer name for `HOSTNAME` entities.

    3. **Process Retrieval**: Using the `agent_id`, the action requests the current
    process list from the SentinelOne management console.

    4. **Data Enrichment**: If processes are successfully retrieved, the action attaches
    the process list to the specific entity as an **Entity Table** and marks the entity
    for update.

    5. **Error Reporting**: If an agent cannot be found for a specific entity, the
    error is logged. After processing all entities, any failures are summarized in
    an "Unsuccessful Attempts" data table.


    ### Additional Notes

    - This action is read-only regarding the external SentinelOne system; it does
    not kill processes or modify endpoint state.

    - The action requires the SentinelOne integration to be properly configured with
    API Root, Username, and Password.
  capabilities:
