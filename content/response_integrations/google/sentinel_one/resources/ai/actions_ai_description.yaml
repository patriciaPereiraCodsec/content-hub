Get Agent Status:
  ai_description: >-
    ### General Description\nRetrieves the current operational status (Active or Not
    Active) of SentinelOne agents associated with Hostname or IP Address entities.
    This action allows analysts to verify endpoint connectivity and agent health directly
    within the Google SecOps platform, facilitating faster incident response and troubleshooting.\n\n###
    Parameters\n| Parameter | Type | Mandatory | Description |\n| :--- | :--- | :---
    | :--- |\n| None | N/A | N/A | This action does not require any input parameters.
    |\n\n### Additional Notes\n- The action identifies agents by matching the entity's
    identifier against computer names (for Hostnames) or interface IP addresses (for
    Address entities).\n- If an agent is not found in SentinelOne for a given entity,
    the details are captured in an 'Unsuccessful Attempts' table.\n\n### Flow Description\n1.
    **Initialization**: Connects to the SentinelOne instance using the integration's
    API Root and credentials (Username and Password).\n2. **Entity Selection**: Filters
    the target entities to process only those of type `HOSTNAME` or `ADDRESS`.\n3.
    **Agent Lookup**: For each entity, it queries the SentinelOne API to find the
    corresponding internal Agent ID.\n4. **Status Query**: Requests the `is_active`
    status for each successfully identified Agent ID.\n5. **Reporting**: Compiles
    a list of agent statuses into a data table named 'Agents Statuses' and lookup
    failures into 'Unsuccessful Attempts'.\n6. **Entity Update**: Updates the entities
    within the case context and concludes the action.
