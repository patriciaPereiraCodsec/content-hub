Reconnect Agent To The Network:
  ai_description: >-
    ### General Description

    The **Reconnect Agent To The Network** action is designed to restore network connectivity
    for SentinelOne agents that have been previously isolated from the network. This
    action is typically used as a remediation step to bring an endpoint back into
    full operation after a security threat has been resolved or an investigation is
    complete.


    ### Parameters Description

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | N/A | N/A | N/A | This action does not require any input parameters; it operates
    on the entities in the current scope. |


    ### Additional Notes

    - The action supports **HOSTNAME** and **ADDRESS** (IP) entities.

    - It requires the SentinelOne agent to be installed and recognized by the management
    console.

    - If an agent cannot be found for a specific entity, the failure is logged in
    an 'Unsuccessful Attempts' data table.


    ### Flow Description

    1. **Entity Filtering**: The action identifies all Hostname and IP Address entities
    within the target scope.

