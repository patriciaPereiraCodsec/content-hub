    There are no parameters for this action.


    ### Flow Description

    1. **Authentication**: The action initializes a connection to the SentinelOne
    API using the configured API Root, Username, and Password.

    2. **Status Retrieval**: It performs a GET request to the SentinelOne status endpoint
    (`web/api/v1.6/status`).

    3. **Data Extraction**: The action parses the response to extract the system's
    health status (e.g., 'healthy').

    4. **Completion**: It returns a formatted message to the Google SecOps platform
    indicating the current system status.


    ### Additional Notes

    This action does not process or require any entities. It is a system-level utility
    action.
