Get Events For Endpoint By Time:
  ai_description: >-
    ### General Description

    Retrieves historical event data for specific endpoints (Hostnames or IP Addresses)
    from SentinelOne within a specified time window. This action is useful for forensic
    investigation and understanding the activity on an endpoint around the time of
    an alert.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Hours Back | Integer | Yes | The number of hours to look back from the current
    time to fetch events. |

    | Events Amount Limit | Integer | Yes | The maximum number of events to retrieve
    for each endpoint. |


    ### Flow Description

    1. **Authentication**: Connects to the SentinelOne API using provided credentials.

    2. **Time Calculation**: Determines the start and end timestamps for the event
    query based on the 'Hours Back' parameter.

    3. **Entity Filtering**: Identifies IP Address and Hostname entities from the
    target list.

    4. **Agent Resolution**: For each entity, queries SentinelOne to find the corresponding
    SentinelOne Agent ID or UUID.

    5. **Data Retrieval**: Fetches process events for the resolved Agent ID within
    the specified time range, up to the defined limit.

    6. **Enrichment**: Adds the retrieved events as a data table to the corresponding
    entity in SecOps.

    7. **Error Handling**: Collects any 'Agent Not Found' errors and displays them
    in a summary table named 'Unsuccessful Attempts'.

    8. **Entity Update**: Updates the status of successfully processed entities.


    ### Additional Notes

    - The action specifically targets `ADDRESS` and `HOSTNAME` entity types.

    - If no events are found for any entities, the action will complete with a negative
    result value but will still report on the attempts.
