"Update Exclusion List Add Path ":
  ai_description: >-
    ### General Description

    Adds a specific file or directory path to an existing exclusion list in SentinelOne.
    This action is used to prevent the SentinelOne agent from monitoring or flagging
    specific paths on endpoints, which is useful for excluding known safe applications,
    databases, or specific system directories across different operating systems.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | List Name | String | Yes | The exact name of the exclusion list in SentinelOne
    where the path should be added. |

    | Path | String | Yes | The file or directory path to be excluded (e.g., 'C:\Program
    Files\App' or '/var/log/app'). |

    | Operation System | String | Yes | The target operating system for the exclusion.
    Supported values: 'windows', 'osx', 'linux', or 'android'. |


    ### Additional Notes

    - The action first resolves the 'List Name' to an internal SentinelOne ID before
    attempting to add the path.

    - If the specified list name does not exist in the SentinelOne environment, the
    action will fail with an error.


    ### Flow Description

    1. **Authentication**: Connects to the SentinelOne API using the configured credentials.

    2. **List Resolution**: Retrieves all exclusion lists from the SentinelOne environment
    to find the unique ID associated with the provided 'List Name'.

    3. **Path Addition**: Sends a POST request to the SentinelOne API to add the specified
    'Path' to the identified exclusion list, categorized by the provided 'Operation
    System'.

    4. **Completion**: Returns a success message indicating the path has been added
    to the list.
