Disconnect Agent From Network:
  ai_description: >-
    ### General Description

    Disconnects SentinelOne agents from the network to isolate them. This action is
    primarily used for containment during incident response to prevent lateral movement
    or further communication from a potentially compromised endpoint. It supports
    both Hostname and IP Address entities.


    ### Parameters Description

    There are no parameters for this action.


    ### Flow Description

    1. **Identify Entities**: The action filters the target entities to identify those
    of type Hostname or IP Address.

    2. **Lookup Agent ID**: For each identified entity, the action queries the SentinelOne
    API to find the corresponding unique Agent ID. If the entity is an IP address,
    it searches through the network interfaces of all agents; if it is a Hostname,
    it matches against the computer name.

    3. **Execute Disconnect**: The action sends a POST request to the SentinelOne
    API to trigger the network disconnect command for each retrieved Agent ID.

    4. **Handle Errors**: If an agent cannot be found for a specific entity, a `SentinelOneAgentNotFoundError`
    is caught, and the error is logged.

    5. **Finalize**: The action provides a summary message of successfully disconnected
    entities and generates a data table named 'Unsuccessful Attempts' if any errors
    occurred during the process.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Isolates the endpoint from the network by sending a disconnect command (POST
      request) to the SentinelOne agent via the management API.
    fetches_data: true
    internal_data_mutation_explanation: null
  categories:
    enrichment: false
  entity_usage:
