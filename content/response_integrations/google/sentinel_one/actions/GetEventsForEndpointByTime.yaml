name: Get Events For Endpoint By Time
description: Get all events related to an endpoint
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/sentinelone#get_events_for_endpoint_by_time
integration_identifier: SentinelOne
parameters:
-   name: Hours Back
    type: string
    description: How match time back fetch events from.
    is_mandatory: true
-   name: Events Amount Limit
    type: string
    description: Events amount limit.
    is_mandatory: true
dynamic_results_metadata: []
creator: admin
simulation_data_json: '{"Entities": ["HOSTNAME", "ADDRESS"]}'
