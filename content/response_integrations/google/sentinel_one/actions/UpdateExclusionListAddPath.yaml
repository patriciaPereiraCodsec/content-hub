name: 'Update Exclusion List Add Path '
description: 'Add a path to an existing exclusion list (Note - OS can be: Windows,
    OSX, Linux or Android)'
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/sentinelone#update_exclusion_list_add_path
integration_identifier: SentinelOne
parameters:
-   name: List Name
    type: string
    description: Exclusion list name.
    is_mandatory: true
-   name: Path
    type: string
    description: Path to add to the list.
    is_mandatory: true
-   name: Operation System
    type: string
    description: 'Operation system, can be: windows, osx, linux or android.'
    is_mandatory: true
dynamic_results_metadata: []
creator: admin
