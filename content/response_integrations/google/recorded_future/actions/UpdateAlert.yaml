name: Update Alert
description: Update alert in Recorded Future.
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/recorded-future#update_alert
integration_identifier: RecordedFuture
parameters:
-   name: Alert ID
    default_value: ''
    type: string
    description: Specify the ID of the alert that needs to be updated.
    is_mandatory: true
-   name: Assign To
    default_value: ''
    type: string
    description: Specify to whom to assign the alert. You can provide id, username,
        user hash, or email.
    is_mandatory: false
-   name: Note
    default_value: ''
    type: string
    description: Specify a note that should be updated on the alert.
    is_mandatory: false
-   name: Status
    default_value: Select One
    type: ddl
    optional_values:
    - Select One
    - New
    - Assigned
    - Unassigned
    - Pending
    - Dismissed
    - Resolved
    - Flag for Tuning
    description: Specify the new status for the alert.
    is_mandatory: true
dynamic_results_metadata:
-   result_example_path: resources/update_alert_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
