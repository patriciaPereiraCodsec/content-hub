name: Add Analyst Note
description: 'Add an analyst note to previously enriched entities in Siemplify, to
    Recorded Future entities. Action will add the note to the relevant scope entities.
    Note: If entity will not contain the Recorded Future ID field - this action will
    perform “Enrich IOC” action on it for better results. You can choose whether to
    update the entity with the enrichment data or not.'
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/recorded-future#add_analyst_note
integration_identifier: RecordedFuture
parameters:
-   name: Note Title
    default_value: Note Title
    type: string
    description: Specify the title for the note
    is_mandatory: true
-   name: Note Text
    default_value: Note Text
    type: string
    description: Specify the Text for the note
    is_mandatory: true
-   name: Note Source
    default_value: ''
    type: string
    description: Specify the RF ID for note source; the API explorer shows what the
        RF IDs are accessible to the user whose API token is enabled. For example,  VWKdVr
        is the RF ID for an analyst note and is only available to user in the same
        enterprise account in Recorded Future.
    is_mandatory: true
-   name: Topic
    default_value: None
    type: ddl
    optional_values:
    - None
    - Actor Profile
    - Analyst On-Demand Report
    - Cyber Threat Analysis
    - Flash Report
    - Indicator
    - Informational
    - Malware/Tool Profile
    - Source Profile
    - Threat Lead
    - Validated Intelligence Event
    - Weekly Threat Landscape
    - YARA Rule
    description: Specify the relevant Note topic from the list, if needed.
    is_mandatory: false
-   name: Enrich Entity?
    default_value: true
    type: boolean
    description: Specify whether the action should enrich the entity with the “Enrich
        IOC” output.
    is_mandatory: true
dynamic_results_metadata: []
creator: admin
simulation_data_json: '{"Entities": ["FILEHASH", "DestinationURL", "CVE", "HOSTNAME",
    "ADDRESS"]}'
