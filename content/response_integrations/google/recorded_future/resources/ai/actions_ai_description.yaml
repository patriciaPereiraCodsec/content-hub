    integration configuration:

    * **ApiUrl**: The base URL for the Recorded Future API.

    * **ApiKey**: The API key used for authentication.

    * **Verify SSL**: A boolean flag to enable or disable SSL certificate verification.


    ### Additional Notes

    * This action specifically targets **FILEHASH** entities.

    * Results are returned as a JSON object attached to the action result and include
    a direct link to the Recorded Future Intel Card for the hash.


