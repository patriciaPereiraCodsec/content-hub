Enrich CVE:
  ai_description: >-
    ### General Description

    Enriches CVE (Common Vulnerabilities and Exposures) entities using Recorded Future's
    threat intelligence. This action retrieves detailed vulnerability data, including
    risk scores, first/last seen timestamps, and intelligence cards. It allows users
    to set a risk threshold to automatically mark entities as suspicious and generate
    insights within Google SecOps.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Risk Score Threshold | Integer | Yes | Represents the minimum malicious risk
    score (0-99) for a CVE to be marked as suspicious. Levels: None (0), Low (5-24),
    Medium (25-64), High (65-79), Critical (80-89), Very Critical (90-99). |

    | Include Related Entities | Boolean | No | If enabled, the action retrieves and
    displays information about related entities such as hashes, domains, and other
    vulnerabilities in a separate data table. |


    ### Additional Notes

    - The action updates the entity's `is_suspicious` status and creates a Case Insight
    if the retrieved risk score exceeds the configured `Risk Score Threshold`.

    - It populates entity enrichment fields with the prefix `RF_` (e.g., `RF_RiskString`,
    `RF_Rules`, `RF_CriticalityScore`).


    ### Flow Description

    1. **Initialization**: Connects to the Recorded Future API using the provided
    API Key and URL.

    2. **Entity Filtering**: Identifies all CVE entities within the current context.

    3. **Data Retrieval**: For each CVE, it queries Recorded Future for reputation
    data and, optionally, related entities.

    4. **Enrichment**: Updates the entity's additional properties with threat intelligence
    data and adds a detailed report table to the action results.

    5. **Risk Assessment**: Compares the CVE's risk score against the user-defined
    threshold.

    6. **Insight Generation**: If the threshold is met, it marks the entity as suspicious
    and creates a Case Insight containing the risk summary and a link to the Recorded
    Future Intel Card.

    7. **Finalization**: Updates the entities in Google SecOps and returns the raw
    JSON results.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entity attributes (is_suspicious, is_enriched, additional_properties)
      and creates case insights based on the risk score analysis.
  categories:
    enrichment: true
  entity_usage:
    entity_types:
    - CVE
    filters_by_additional_properties: false
