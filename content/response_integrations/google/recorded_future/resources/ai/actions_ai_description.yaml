Add Analyst Note:
  ai_description: >-
    ### General Description

    The **Add Analyst Note** action allows users to publish analyst notes directly
    to Recorded Future for specific entities within a case. It supports Hostnames,
    CVEs, File Hashes, IP Addresses, and URLs. If an entity has not been previously
    enriched (lacks a Recorded Future ID), the action can automatically perform an
    IOC enrichment to find the necessary ID before publishing the note.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Note Title** | String | Yes | The title of the analyst note to be published.
    |

    | **Note Text** | String | Yes | The main content/body of the analyst note. |

    | **Note Source** | String | Yes | The Recorded Future ID representing the source
    of the note (e.g., a specific user or enterprise ID). |

    | **Topic** | Enum | No | An optional category for the note, such as 'Indicator',
    'Malware/Tool Profile', or 'Threat Lead'. |

    | **Enrich Entity?** | Boolean | Yes | If set to `True`, the action will update
    the SecOps entity with enrichment data (risk score, rules, etc.) retrieved during
    the ID lookup process. |


    ### Flow Description

    1. **Entity Filtering:** The action identifies supported entities (IP, Host, URL,
    CVE, FileHash) from the current context.

    2. **ID Verification:** It checks if each entity already possesses a `RF_id` in
    its additional properties.

    3. **IOC Enrichment (Conditional):** For entities missing an ID, the action calls
    the Recorded Future API to retrieve the internal RF ID. If 'Enrich Entity?' is
    enabled, the entity's properties are updated with this metadata.

    4. **Note Publication:** The action sends a request to Recorded Future to publish
    the analyst note using the provided title, text, source, and topic for all valid
    entities.

    5. **Internal Update:** Upon success, the action updates the entities in Google
    SecOps with the Recorded Future `document_id` and marks them as enriched.


    ### Additional Notes

    - This action requires a valid Recorded Future API token with permissions to publish
    analyst notes.

    - If no entities are found or if the RF ID lookup fails for all entities, the
    action will fail.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: >-
      Creates and publishes a new analyst note in the Recorded Future platform associated
      with the provided entities.
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entity additional properties with Recorded Future IDs and the newly
      created analyst note document ID. It also sets the entity's enriched status
      to true.
  categories:
    enrichment: false
  entity_usage:
    entity_types:
    - ADDRESS
    - CVE
    - FILEHASH
    - HOSTNAME
    - DestinationURL
    filters_by_additional_properties: true
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: true
    filters_by_identifier: false
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: false
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
