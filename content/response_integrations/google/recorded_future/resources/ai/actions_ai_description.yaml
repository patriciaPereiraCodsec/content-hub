Ping:
  ai_description: >-
    Tests the connectivity to the Recorded Future API to ensure that the provided
    credentials and URL are valid and that the service is reachable.


    ### Parameters

    | Parameter Name | Description | Type | Mandatory | Default Value |

    | :--- | :--- | :--- | :--- | :--- |

    | ApiUrl | The base URL of the Recorded Future API. | String | Yes | N/A |

    | ApiKey | The API key used for authentication with Recorded Future. | String
    | Yes | N/A |

    | Verify SSL | If enabled, the action will verify the SSL certificate of the API
    server. | Boolean | No | False |


    ### Additional Notes

    This action does not process any entities. It uses a hardcoded IP address (8.8.8.8)
    to perform a reputation check as a connectivity test. These parameters are part
    of the integration configuration rather than action-specific inputs.


    ### Flow Description

    1. **Initialization**: The action retrieves the integration configuration parameters
    (API URL, API Key, and SSL verification setting).

    2. **Manager Setup**: A `RecordedFutureManager` instance is created using the
    retrieved configuration.

    3. **Connectivity Test**: The action calls the `test_connectivity` method, which
    attempts to fetch the reputation of a dummy IP address (8.8.8.8) from the Recorded
    Future API.

    4. **Result Handling**: If the API call is successful, the action completes with
    a success message. If an exception occurs (e.g., network error, invalid API key),
    the action fails and provides an error message.
