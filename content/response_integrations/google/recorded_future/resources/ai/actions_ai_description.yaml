Get Alert Details:
  ai_description: >-
    ### General Description

    The **Get Alert Details** action retrieves comprehensive information about a specific
    alert from Recorded Future using its unique Alert ID. This action is designed
    to provide analysts with deep context regarding a threat, including associated
    documents, related entities, evidence strings, and risk scores, facilitating more
    informed decision-making during investigations.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Alert ID** | String | Yes | The unique identifier of the Recorded Future alert
    for which you want to retrieve detailed information. |


    ### Flow Description

    1. **Parameter Extraction**: The action extracts the mandatory `Alert ID` provided
    as an input parameter.

    2. **API Interaction**: It establishes a connection to the Recorded Future API
    and sends a GET request to the `/v2/alert/{alert_id}` endpoint.

    3. **Data Retrieval**: The action fetches the full alert object, which includes
    metadata, rule details, triggered entities, and evidence.

    4. **Result Output**: The retrieved data is added to the action's JSON results.
    Additionally, a direct link to the Recorded Future web report for that specific
    alert is attached to the case for quick access.


    ### Additional Notes

    - This action does not operate on entities within the case scope; it relies entirely
    on the manually provided `Alert ID` parameter.

    - If the provided Alert ID does not exist or the API credentials are incorrect,
    the action will return a failure status with a specific error message.
