Update Alert:
  ai_description: >-
    ### General Description

    Updates the details of an existing alert in the Recorded Future platform. This
    action allows users to modify the alert's status, change the assignee, and add
    analyst notes. It is primarily used for synchronizing alert states between Google
    SecOps and Recorded Future or for automated alert management workflows.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Alert ID** | String | Yes | The unique identifier of the alert in Recorded
    Future that needs to be updated. |

    | **Status** | Enum | Yes | The new status to assign to the alert. Options include:
    `New`, `Assigned`, `Unassigned`, `Pending`, `Dismissed`, `Resolved`, and `Flag
    for Tuning`. |

    | **Assign To** | String | No | The identifier of the user to whom the alert should
    be assigned. This can be an ID, username, user hash, or email address. |

    | **Note** | String | No | A text note or comment to be added to the alert record
    in Recorded Future. |


    ### Additional Notes

    - Although the **Status** parameter is marked as mandatory in the configuration,
    the underlying logic requires that at least one of the following parameters must
    be provided for the action to execute: `Status`, `Assign To`, or `Note`.

    - The action uses a predefined mapping (`ALERT_STATUS_MAP`) to translate the human-readable
    status selected in the UI into the specific string values required by the Recorded
    Future API.


    ### Flow Description

    1. **Initialization**: The action retrieves the Recorded Future API credentials
    (URL, API Key) and SSL verification settings from the integration configuration.

    2. **Parameter Extraction**: It extracts the `Alert ID`, `Status`, `Assign To`,
    and `Note` from the action input.

    3. **Validation**: The script verifies that at least one update field (Status,
    Assignee, or Note) has been provided to avoid empty update requests.

    4. **API Interaction**: The `RecordedFutureManager` formats the update request
    as a JSON payload and sends a POST request to the Recorded Future `/v2/alert/update`
    endpoint.

    5. **Result Handling**: The action captures the API response, adds the raw JSON
    result to the action output, and reports a success or failure message to the case
    wall.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Updates the status, assignee, and notes of an existing alert within the Recorded
      Future platform via a POST request.
    fetches_data: false
    internal_data_mutation_explanation: null
