Enrich IOC:
  ai_description: >-
    Enriches multiple entities (IP Addresses, Hostnames, File Hashes, CVEs, and URLs)
    using Recorded Future's threat intelligence. This action is designed as a primary
    enrichment step, fetching risk scores, descriptions, and rule matches in bulk.
    It updates entity attributes and marks entities as suspicious if their Recorded
    Future risk score exceeds a specified threshold.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Risk Score Threshold | Integer | Yes | The minimum risk score (0-100) required
    to mark an entity as suspicious in the SOAR. Default is 25. |


    ### Flow Description

    1. **Initialization:** Retrieves API credentials (URL, Key, SSL verification)
    and the risk score threshold from the integration configuration and action parameters.

    2. **Filtering:** Identifies supported entities from the target list, specifically
    filtering for IP Addresses, Hostnames, File Hashes, CVEs, and URLs.

    3. **API Request:** Sends a bulk POST request to the Recorded Future SOAR enrichment
    endpoint to retrieve threat data for all filtered entities simultaneously.

    4. **Processing:** Iterates through the API response. For each entity found in
    Recorded Future, it maps threat intelligence data (such as ID, risk score, and
    description) to the entity's additional properties.

    5. **Suspicion Logic:** Compares the retrieved risk score against the user-defined
    threshold. If the score exceeds the threshold, the entity is flagged as suspicious.

    6. **Update:** Updates the entities within Google SecOps with the new enrichment
    data and provides a comprehensive JSON result for downstream logic.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entity attributes (additional properties), enrichment status, and suspicious
      flags based on the retrieved threat intelligence.
  categories:
