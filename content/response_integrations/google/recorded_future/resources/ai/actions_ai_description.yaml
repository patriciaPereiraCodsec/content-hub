    ### General Description

    The **Get Hash Related Entities** action queries Recorded Future to retrieve entities
    related to a specific File Hash. This enrichment process helps security analysts
    identify connected indicators of compromise (IOCs), such as associated IP addresses,
    domains, or other hashes, providing broader context for threat investigation.


