Serialize A File:
  ai_description: >-
    ### General Description

    The **Serialize A File** action is a utility designed to convert the contents
    of a file located on the local filesystem (where the Google SecOps Remote Agent
    is running) into a Base64 encoded string. This action is primarily used to prepare
    file data for transmission to external APIs or to include file content within
    automated workflows that require encoded data.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **File Path** | String | Yes | The full absolute path to the file on the local
    system that needs to be serialized. |


    ### Additional Notes

    - **File Size Limit**: The action enforces a hard limit of **5MB**. If the target
    file exceeds this size, the action will terminate with a failure status to prevent
    memory issues.

    - **Permissions**: The service account running the Remote Agent must have read
    permissions for the specified file path.

    - **Output**: The action provides the Base64 string and the original filename
    in the JSON results.


    ### Flow Description

    1. **Parameter Extraction**: The action retrieves the `File Path` provided by
    the user.

    2. **File Validation**: It checks if the file exists and is accessible. It then
    verifies that the file size is within the allowed 5MB threshold.

    3. **Content Processing**: The action reads the file content in binary mode.

    4. **Base64 Encoding**: The binary data is encoded into a Base64 string.

    5. **Result Generation**: The encoded content and the file's base name are added
    to the action's JSON results, and the action completes successfully.
