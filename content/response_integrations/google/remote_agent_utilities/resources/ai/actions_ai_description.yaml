Deserialize A File:
  ai_description: >-
    ### General Description

    The **Deserialize A File** action is a utility designed to take a base64-encoded
    string and convert it back into its original binary file format, saving it to
    a specific directory on the local system (specifically `/opt/SiemplifyAgent/Files/`).
    This action is primarily used to reconstruct files that have been passed through
    playbooks as encoded strings, making them available on the disk for subsequent
    processing by other tools or scripts.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **File Name** | String | Yes | The name (including extension) to be assigned
    to the created file on disk. |

    | **File base64** | String | Yes | The base64-encoded content of the file to be
    deserialized. |


    ### Additional Notes

    - The action automatically ensures that the target directory `/opt/SiemplifyAgent/Files/`
    exists, creating it if necessary.

    - The full path of the newly created file is returned as the action's result value,
    which can be used as a placeholder in subsequent playbook steps.


    ### Flow Description

    1. **Parameter Extraction**: Retrieves the base64-encoded file content and the
    target file name from the action inputs.

    2. **Directory Preparation**: Checks for the existence of the storage path `/opt/SiemplifyAgent/Files/`
    and creates the directory if it is missing.

    3. **Decoding**: Decodes the provided base64 string into its original binary representation.

    4. **File Creation**: Writes the decoded binary data to a new file with the specified
    name in the target directory.

    5. **Completion**: Returns the absolute path of the saved file and completes the
    execution.
