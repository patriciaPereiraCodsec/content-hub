name: Deserialize A File
description: Deserialize a file from a base64 string and save it to disk.
integration_identifier: RemoteAgentUtilities
parameters:
-   name: File Name
    default_value: ''
    type: string
    description: File Name. The purpose is to get as a placeholder from prev action
        (key in json result - file_name)
    is_mandatory: true
-   name: File base64
    default_value: ''
    type: string
    description: File base64. The purpose is to get as a placeholder from prev action
        (key in json result - base64_file_content)
    is_mandatory: true
dynamic_results_metadata: []
creator: Admin
script_result_name: file_new_path
