Ping:
  ai_description: "### General Description\nThe **Ping** action is a utility designed\
    \ to verify the connectivity between Google SecOps and the **Varonis Data Security\
    \ Platform**. It validates that the integration's configuration parameters\u2014\
    such as the API Root, credentials, and SSL settings\u2014are correct and that\
    \ the Varonis API is accessible from the environment.\n\n### Parameters Description\n\
    | Parameter | Type | Mandatory | Description |\n| :--- | :--- | :--- | :--- |\n\
    | **API Root** | String | Yes | The base URL of the Varonis Data Security Platform\
    \ API instance. |\n| **Username** | String | Yes | The username used for NTLM\
    \ authentication. |\n| **Password** | String | Yes | The password used for NTLM\
    \ authentication. |\n| **Verify SSL** | Boolean | Yes | If enabled, the action\
    \ will verify the SSL certificate of the Varonis server during the connection\
    \ attempt. |\n\n### Additional Notes\n- This action does not interact with or\
    \ process any entities.\n- It performs a connectivity test by attempting to retrieve\
    \ an authentication token from the Varonis API.\n\n### Flow Description\n1. **Parameter\
    \ Extraction**: The action retrieves the connection details (API Root, Username,\
    \ Password, and SSL verification flag) from the integration configuration.\n2.\
    \ **Manager Initialization**: It initializes the `VaronisDataSecurityPlatformManager`\
    \ using the provided parameters.\n3. **Authentication Attempt**: The manager attempts\
    \ to authenticate against the Varonis API using NTLM authentication to obtain\
    \ an access token.\n4. **Execution Result**: If the authentication request returns\
    \ a successful response (HTTP 200), the action reports a successful connection.\
    \ If an error occurs (e.g., network timeout, invalid credentials), the action\
    \ catches the exception and returns a failure status."
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: false
    internal_data_mutation_explanation: null
  categories:
    enrichment: false
