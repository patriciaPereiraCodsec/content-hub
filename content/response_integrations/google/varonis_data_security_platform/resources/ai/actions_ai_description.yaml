Update Alert:
  ai_description: >-
    Updates the status and closing reason of alerts within the Varonis Data Security
    Platform. This action allows security analysts to programmatically manage the
    lifecycle of Varonis alerts by transitioning them to states such as 'Open', 'Under
    Investigation', or 'Closed'.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Alert GUID | String | Yes | A comma-separated string of alert GUIDs to be updated
    in Varonis. |

    | Alert Status | String | Yes | The target status for the alerts. Options include:
    'Open', 'Under Investigation', 'Closed'. |

    | Closing Reason | String | No | The reason for closing the alert. This is mandatory
    if the 'Alert Status' is set to 'Closed'. |


    ### Flow Description

    1. **Authentication**: Establishes a connection to the Varonis Data Security Platform
    using NTLM authentication to retrieve an access token.

    2. **Parameter Extraction**: Retrieves the alert GUIDs, target status, and closing
    reason from the action parameters.

    3. **Validation**: Checks if the 'Alert Status' is valid and ensures a 'Closing
    Reason' is provided if the status is being changed to 'Closed'.

    4. **API Request**: Sends a POST request to the Varonis API endpoint (`SetStatusToAlerts`)
    with the list of GUIDs and the corresponding status/reason IDs.

    5. **Outcome**: Reports whether the update was successful for the specified alerts.


    ### Additional Notes

    - This action does not process entities from the Google SecOps case; it operates
    strictly on the GUIDs provided in the parameters.

    - If the 'Alert Status' is 'Closed', the 'Closing Reason' must be something other
    than 'Not Provided'.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Updates the status and resolution metadata of alerts directly within the Varonis
      Data Security Platform via a POST request to the management API.
    fetches_data: false
    internal_data_mutation_explanation: null
