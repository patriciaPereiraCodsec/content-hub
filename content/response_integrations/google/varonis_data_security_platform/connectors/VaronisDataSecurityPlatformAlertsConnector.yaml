name: Varonis Data Security Platform Alerts Connector
parameters:
-   name: DeviceProductField
    default_value: device_product
    type: string
    description: A framework parameter that must be set for every connector. Describes
        the name of the event field where the product name is stored.
    is_mandatory: true
    is_advanced: true
    mode: regular
-   name: EventClassId
    default_value: Type
    type: string
    description: A framework parameter that must be set for every connector. Describes
        the name of the event field where the event name is stored.
    is_mandatory: true
    is_advanced: true
    mode: regular
-   name: Environment Field Name
    default_value: ''
    type: string
    description: 'Describes the name of the event field where the environment name
        is stored.

        If the environment field isn''t found, the environment is "".'
    is_mandatory: false
    is_advanced: true
    mode: script
-   name: Environment Regex Pattern
    default_value: .*
    type: string
    description: 'A regex pattern to run on the value found in the "Environment Field
        Name" field.

        Default is .* to catch all and return value unchanged.

        Used to allow the user to manipulate the environment field through regex logic

        If the regex pattern is null or empty, or the environment value is null, the
        final environment result is "".'
    is_mandatory: false
    is_advanced: true
    mode: script
-   name: PythonProcessTimeout
    default_value: 300
    type: integer
    description: Timeout limit for the python process running the connector.
    is_mandatory: true
    is_advanced: true
    mode: script
-   name: API Root
    default_value: https://{ip address}:{port}
    type: string
    description: Specify the API URL for the target Varonis Data Security Platform
        instance.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Username
    default_value: ''
    type: string
    description: Specify the username to connect with.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Password
    default_value: ''
    type: password
    description: Specify the password to connect with.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Verify SSL
    default_value: false
    type: boolean
    description: If enabled, the certificate configured for the API root is validated.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Max Days Backwards
    default_value: 3
    type: integer
    description: Number of days before the first connector iteration to retrieve alerts
        from. This parameter applies to the initial connector iteration after you
        enable the connector for the first time, or used as a fallback value in cases
        where connector's last run timestamp expires.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Max Alerts per Cycle
    default_value: 10
    type: integer
    description: Fetch X alerts per connector cycle.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Max Events per Varonis alert
    default_value: 25
    type: integer
    description: Maximum number of events that the connector fetches for the Data
        Security Platform alert.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Status
    default_value: Open, Under Investigation, Closed
    type: string
    description: Data Security Platform alert statuses to fetch.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Severity
    default_value: Low, Medium, High
    type: string
    description: Data Security Platform alert severities to fetch.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Disable Overflow
    default_value: false
    type: boolean
    description: If enabled, the connector ignores the Chronicle SOAR overflow mechanism
        when creating alerts.
    is_mandatory: false
    is_advanced: true
    mode: script
-   name: Use Dynamic List as BlockList
    default_value: false
    type: boolean
    description: If enabled, the connector uses alert names specified in the Dynamic
        list as a BlockList. It ingests only alerts that don't match Dynamic List.
    is_mandatory: false
    is_advanced: true
    mode: script
-   name: Alert Name Template
    default_value: '[Name]'
    type: string
    description: 'If provided, the connector uses this value for Chronicle SOAR Alert
        Name. Please refer to the documentation portal for more details. You can provide
        placeholders in the following format: [name of the field]. Example: Varonis
        alert - [name]. Note: The connector first uses CSOAR Event for placeholders.
        Only keys that have string value are handled. If nothing is provided or the
        user provides an invalid template, the connector uses the default alert name
        - [name].'
    is_mandatory: false
    is_advanced: true
    mode: script
-   name: Rule Generator Template
    default_value: '[Name]'
    type: string
    description: 'If provided, the connector uses this value for Chronicle SOAR Rule
        Generator Value. Please refer to the documentation portal for more details.
        You can provide placeholders in the following format: [name of the field].
        Example: Varonis alert - [name]. Note: The connector first uses Chronicle
        SOAR Event for placeholders. Only keys that have string value are handled.
        If nothing is provided or the user provides an invalid template, the connector
        uses the default rule generator - [name].'
    is_mandatory: false
    is_advanced: true
    mode: script
-   name: Proxy Server Address
    default_value: ''
    type: string
    description: Proxy server to use for connection to the mail server.
    is_mandatory: false
    is_advanced: true
    mode: script
-   name: Proxy Username
    default_value: ''
    type: string
    description: Proxy server username
    is_mandatory: false
    is_advanced: true
    mode: script
-   name: Proxy Password
    default_value: ''
    type: password
    description: Proxy server password
    is_mandatory: false
    is_advanced: true
    mode: script
description: Connector can be used to fetch alerts from the Varonis Data Security
    Platform. The connector dynamic list can be used to filter specific alerts for
    ingestion based on the Varonis Data Security Platform alert name.
integration: VaronisDataSecurityPlatform
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/varonis-data-security-platform#varonis-data-security-platform-alerts-connector
rules: []
is_connector_rules_supported: false
creator: admin
