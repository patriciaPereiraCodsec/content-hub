-   source: VaronisDataSecurityPlatform
    product: Data Security Platform
    security_event_file_name: StartTime
    transformation_function: from_custom_date
    transformation_function_param: '%Y-%m-%dT%H:%M:%S%z'
    raw_data_primary_field_match_term: UTCTime
    raw_data_primary_field_comparison_type: equal
    raw_data_secondary_field_match_term: Time
    raw_data_secondary_field_comparison_type: equal
    raw_data_third_field_match_term: ''
    raw_data_third_field_comparison_type: equal
    is_artifact: false
    extract_function_param: ','
    extract_function: none
