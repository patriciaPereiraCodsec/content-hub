Submit File:
  ai_description: >-
    Submits one or more files to FireEye AX for automated malware analysis. This action
    operates asynchronously, meaning it uploads the files and then periodically polls
    the FireEye AX appliance until the analysis is complete or a timeout is reached.
    Users can specify the virtual machine profile, application ID, and analysis type
    (Live or Sandbox) to customize the execution environment. The action retrieves
    detailed analysis results, including maliciousness status, severity, network activity
    (C&C services), process executions, and registry changes. Results are returned
    as JSON, and the action can optionally generate detailed case insights for each
    analyzed file.


    ### Parameters Description


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **File Paths** | String | Yes | A comma-separated list of absolute file paths
    on the local system to be submitted for analysis. |

    | **VM Profile** | String | Yes | The specific virtual machine profile (OS/Environment)
    to use for the analysis. |

    | **Application ID** | String | No | The ID of the application to be used during
    analysis. If omitted, FireEye AX selects the application automatically. |

    | **Priority** | String | No | Sets the submission priority. Options are 'Normal'
    (bottom of queue) or 'Urgent' (top of queue). Default is 'Normal'. |

    | **Force Rescan** | Boolean | No | If true, forces FireEye AX to rescan the file
    even if it has been analyzed previously. Default is false. |

    | **Analysis Type** | String | No | Determines the analysis environment: 'Live'
    (MVX engine) or 'Sandbox' (closed environment). Default is 'Live'. |

    | **Create Insight** | Boolean | Yes | If true, the action will create a Google
    SecOps case insight for each successfully analyzed file. |


    ### Additional Notes

    - This action is **Asynchronous**. It may take several minutes to complete depending
    on the file size and queue depth. Ensure the script timeout in the IDE is configured
    appropriately.

    - The action requires the files to be accessible at the provided absolute paths
    on the machine where the Google SecOps runner is executing.


    ### Flow Description

    1. **Initialization**: Extracts configuration parameters and validates the provided
    file paths.

    2. **Submission**: Uploads each file to the FireEye AX appliance using the specified
    VM profile and analysis settings.

    3. **Polling (Async)**: Enters an asynchronous loop, checking the status of each
    submission ID until the analysis is finished.

    4. **Data Retrieval**: Once analysis is complete, it fetches the 'extended' info
    level report for each file.

    5. **Internal Updates**: If 'Create Insight' is enabled, it generates formatted
    insights for the case.

    6. **Completion**: Returns the full analysis report as JSON and provides a summary
    message of successful and failed submissions.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: true
    can_update_entities: false
    external_data_mutation_explanation: >-
      Submits files to the FireEye AX appliance, which creates new analysis jobs/submissions
      within the external system.
    fetches_data: true
    internal_data_mutation_explanation: >-
      Creates case insights within Google SecOps to display the results of the malware
      analysis if the 'Create Insight' parameter is enabled.
  categories:
    enrichment: false
  entity_usage:
