Get Appliance Details:
  ai_description: >-
    ### General Description

    Retrieves comprehensive configuration and status information for a FireEye AX
    appliance. This action is used to gather technical details about the appliance's
    sensors, operating system versions, available VM profiles, and installed applications.
    It serves as a diagnostic or environmental discovery tool within a workflow.


    ### Parameters

    There are no action-specific parameters for this action. It relies entirely on
    the integration's global configuration (API Root, Username, Password, and SSL
    verification).


    ### Flow Description

    1. **Authentication**: The action first authenticates with the FireEye AX API
    using the provided credentials to obtain a security token.

    2. **Data Retrieval**: It sends a GET request to the appliance configuration endpoint
    (`wsapis/v2.0.0/config`).

    3. **Processing**: The response, containing details such as sensor IDs, OS product
    releases, and profile definitions (e.g., Windows/CentOS versions and supported
    applications), is captured.

    4. **Output**: The retrieved data is attached to the action result as a JSON object
    for use in subsequent playbook steps.


    ### Additional Notes

    This action does not require any input entities and is typically used to verify
    the connectivity and capabilities of the FireEye AX instance before performing
    analysis tasks.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
  categories:
