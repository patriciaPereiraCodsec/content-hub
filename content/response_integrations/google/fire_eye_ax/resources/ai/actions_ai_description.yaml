Ping:
  ai_description: >-
    ### General Description

    The **Ping** action is a utility designed to verify the connectivity between the
    Google SecOps platform and a FireEye AX instance. It ensures that the provided
    credentials and API root URL are correct and that the network path is open and
    responsive.


    ### Parameters Description

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | API Root | String | Yes | The base URL of the FireEye AX API instance. |

    | Username | String | Yes | The username used to authenticate with the FireEye
    AX server. |

    | Password | String | Yes | The password used to authenticate with the FireEye
    AX server. |

    | Verify SSL | Boolean | Yes | If enabled, the action will verify the SSL certificate
    of the FireEye AX server. |


    ### Additional Notes

    This action does not process any entities and is typically used during the initial
    setup of the integration or for troubleshooting connection issues. Note that the
    parameters are extracted from the integration's configuration settings rather
    than being passed as action-specific inputs.


    ### Flow Description

    1. **Parameter Extraction**: The action retrieves the connection details (API
    Root, Username, Password, and SSL verification preference) from the integration's
    global configuration.

    2. **Manager Initialization**: It initializes the `FireEyeAXManager`, which triggers
    an authentication flow to obtain a security token (`X-FeApi-Token`) via the `/auth/login`
    endpoint.

    3. **Connectivity Test**: It performs a GET request to the configuration endpoint
    (`/config`) to verify that the session is valid and the server is responsive.

    4. **Result Reporting**: If the request is successful, it returns a completion
    state. If any step fails (authentication or the ping request), it catches the
    exception and reports a failure state.
