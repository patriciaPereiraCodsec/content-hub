Submit URL:
  ai_description: >-
    Submits URL entities to FireEye AX for automated malware analysis. This action
    allows security analysts to perform deep inspection of suspicious URLs using FireEye's
    Multi-Vector Virtual Execution (MVX) engine. It supports both 'Live' and 'Sandbox'
    analysis modes and provides options to specify virtual machine profiles and application
    environments for the analysis. The action operates asynchronously, polling FireEye
    AX until the analysis is complete, at which point it retrieves a detailed report
    including maliciousness status, severity, and technical artifacts like process
    changes and network connections.


    ### Parameters Description


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | VM Profile | String | Yes | The specific virtual machine profile (OS/Environment)
    to use for the analysis. Available profiles can be found using the 'Get Appliance
    Details' action. |

    | Application ID | String | No | The ID of the application to be used during analysis.
    If omitted, FireEye AX selects the appropriate application automatically. |

    | Priority | Enum | No | Sets the submission priority. 'Normal' (default) places
    the job at the end of the queue, while 'Urgent' moves it to the front. |

    | Force Rescan | Boolean | No | If true, forces FireEye AX to perform a new analysis
    even if the URL has been analyzed previously. |

    | Analysis Type | Enum | No | Determines the analysis environment: 'Live' (MVX
    engine) or 'Sandbox' (closed environment). Default is 'Live'. |

    | Create Insight | Boolean | Yes | If true, generates a detailed Google SecOps
    insight containing the analysis summary for the entity. |


    ### Additional Notes

    - This is an **asynchronous** action. It will submit the URL and then enter a
    polling state. Ensure the script timeout in the IDE is sufficient for sandbox
    analysis (default is 300 seconds).

    - If the action times out before analysis is complete, it will raise an exception
    listing the pending entities.


    ### Flow Description

    1. **Initialization**: Filters the input entities to identify supported URL types.

    2. **Submission**: For each URL, it sends a POST request to FireEye AX to create
    a new analysis submission using the provided VM profile and settings.

    3. **Polling**: The action enters an asynchronous loop, checking the status of
    each submission ID until the status is 'Submission Done'.

    4. **Data Retrieval**: Once finished, it fetches the extended analysis results,
    including severity, maliciousness, and counts of OS changes (processes, registry,
    files) and C&C services.

    5. **Internal Updates**: Updates the entities with enrichment data, attaches a
    results table, and creates a case insight if configured.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: >-
      Submitting a URL for analysis creates a new submission record and triggers a
      resource-intensive analysis job within the FireEye AX appliance.
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entity enrichment attributes with analysis results and creates case
      insights to summarize the findings.
  categories:
    enrichment: false
  entity_usage:
    entity_types:
    - DestinationURL
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: true
    filters_by_identifier: false
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: false
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
