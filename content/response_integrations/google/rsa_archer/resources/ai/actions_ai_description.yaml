Add Incident Journal Entry:
  ai_description: >-
    Adds a journal entry to a specific Security Incident in RSA Archer. This action
    allows users to append textual notes or updates to existing incidents within the
    RSA Archer GRC platform. It first validates the existence of the target incident
    and retrieves necessary metadata (application IDs and field definitions) before
    creating the new journal record.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Destination Content ID | String | Yes | The unique Content ID of the Security
    Incident in RSA Archer where the journal entry will be added. |

    | Text | String | Yes | The actual text content of the journal entry. |


    ### Flow Description

    1. **Initialization**: The action initializes the RSA Archer manager using provided
    credentials and configuration.

    2. **Metadata Retrieval**: It fetches the internal Application ID for 'Incident
    Journals' and identifies the specific field IDs required for linking the entry
    to a Security Incident.

    3. **Validation**: The action verifies that the provided 'Destination Content
    ID' corresponds to an existing Security Incident in RSA Archer.

    4. **Creation**: It constructs a payload containing the journal text and the reference
    to the target incident, then performs a POST request to create the new content
    record in RSA Archer.

    5. **Result Handling**: The API response is captured and returned as a JSON result
    in Google SecOps.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Creates a new journal entry record in the RSA Archer platform associated with
      a specific Security Incident.
    fetches_data: true
    internal_data_mutation_explanation: null
  categories:
    enrichment: false
