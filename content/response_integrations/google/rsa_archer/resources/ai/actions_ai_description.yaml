Create Incident:
  ai_description: >-
    Creates a new incident in RSA Archer. This action allows for the creation of incident
    records within a specified Archer application (defaulting to 'Incidents'). It
    supports standard fields such as summary, details, owner, status, priority, and
    category, as well as dynamic custom fields provided via a JSON object. Additionally,
    the action supports complex field mapping (specifically for Cross-Reference fields)
    using a local or remote mapping file. After the incident is successfully created,
    the action retrieves the full details of the new record and returns them as a
    JSON result.


    ### Parameters Description


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Incident Summary | String | No | The summary or title of the new incident. |

    | Application Name | String | No | The name of the Archer application where the
    incident will be created. Defaults to 'Incidents'. |

    | Incident Details | String | No | A detailed description of the incident. |

    | Incident Owner | String | No | The username or group name to be assigned as
    the owner of the incident. |

    | Incident Status | String | No | The status to set for the new incident. |

    | Priority | String | No | The priority level to assign to the incident. |

    | Category | String | No | The category classification for the incident. |

    | Custom Fields | String | No | A JSON-formatted string containing additional
    fields and values to be populated (e.g., `{"MyField": "Value"}`). |

    | Custom Mapping File | String | No | The absolute path or URL to a JSON file
    containing mappings for complex field types like Cross-References. |

    | Remote File | Boolean | No | If set to true, the 'Custom Mapping File' parameter
    is treated as a URL to fetch the mapping file from. |


    ### Additional Notes

    - This action does not run on entities; it is a standalone creation task.

    - If using `Custom Fields` for 'User/Group' or 'Cross-Reference' types, the action
    performs internal lookups to resolve names to Archer IDs.


    ### Flow Description

    1. **Authentication**: Connects to the RSA Archer API using the provided credentials
    and instance name to obtain a session token.

    2. **Application Resolution**: Identifies the target Archer application by name
    and retrieves its internal ID and field levels.

    3. **Field Mapping**: Maps the provided action parameters (Summary, Details, etc.)
    and any `Custom Fields` to the specific Archer field IDs and types (Text, List,
    User/Group, or Cross-Reference).

    4. **Mapping File Processing**: If a `Custom Mapping File` is provided, the action
    parses it to resolve complex values, potentially fetching the file from a remote
    URL if `Remote File` is enabled.

    5. **Incident Creation**: Sends a POST request to the Archer API to create the
    new content record.

    6. **Data Retrieval**: Fetches the complete JSON data for the newly created incident
    using its new Content ID.

    7. **Output**: Returns the Content ID as the main result and the full incident
    details as a JSON object.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Creates a new incident record in the RSA Archer platform.
    fetches_data: true
    internal_data_mutation_explanation: null
