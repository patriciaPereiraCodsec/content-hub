Update Incident:
  ai_description: >-
    Updates an existing incident record in RSA Archer. This action allows for modifying
    various standard incident fields such as summary, details, owner, status, priority,
    and category, as well as providing support for custom fields through a JSON object
    or a mapping file.


    ### Parameters Description


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Content ID | String | Yes | The unique identifier (Content ID) of the incident
    in RSA Archer that needs to be updated. |

    | Application Name | String | No | The name of the RSA Archer application where
    the incident resides. Defaults to 'Incidents'. |

    | Incident Summary | String | No | The new summary or title for the incident.
    |

    | Incident Details | String | No | The new detailed description for the incident.
    |

    | Incident Owner | String | No | The username or group name of the new owner for
    the incident. |

    | Incident Status | String | No | The new status value for the incident (e.g.,
    'New', 'In Progress', 'Closed'). |

    | Priority | String | No | The new priority level for the incident (e.g., 'High',
    'Medium', 'Low'). |

    | Category | String | No | The new category classification for the incident. |

    | Custom Fields | String | No | A JSON-formatted string representing additional
    custom fields to update. Example: `{"MyField": "Value"}`. |

    | Custom Mapping File | String | No | An absolute path or URL to a JSON file containing
    field mappings, specifically useful for Cross-Reference (Type 9) fields. |

    | Remote File | Boolean | No | If enabled, the 'Custom Mapping File' parameter
    will be treated as a URL to fetch the mapping configuration. |


    ### Additional Notes

    - The action performs a lookup for the application and its field definitions to
    ensure correct ID mapping before sending the update request.

    - If 'Custom Fields' are provided, the action attempts to resolve field types
    (Text, List, User/Group, or Cross-Reference) to format the payload correctly.

    - After a successful update, the action retrieves the updated incident data and
    returns it as a JSON result.


    ### Flow Description

    1. **Initialization**: Connects to the RSA Archer instance using provided credentials
    and retrieves a session token.

    2. **Application Resolution**: Identifies the target application ID and its associated
    levels/fields based on the 'Application Name'.

    3. **Payload Construction**: Maps the provided input parameters (Summary, Status,
    etc.) and any 'Custom Fields' to their respective RSA Archer field IDs and types.

    4. **Update Execution**: Sends a PUT request to the RSA Archer API to update the
    content record identified by the 'Content ID'.

    5. **Data Retrieval**: Fetches the latest state of the incident from RSA Archer
    to confirm the update.

    6. **Completion**: Returns the updated incident details as a JSON object and reports
    the execution status.
