Ping:
  ai_description: >-
    ### General Description

    The **Ping** action is used to verify the connectivity between Google SecOps and
    the RSA Archer instance. It validates the integration configuration by attempting
    to authenticate and retrieve a session token from the RSA Archer API.


    ### Parameters Description

    There are no parameters for this action. It relies on the global integration configuration
    (Api Root, Username, Password, Instance Name, and Verify SSL).


    ### Additional Notes

    This action is primarily used for troubleshooting and ensuring that the connection
    details are correctly configured in the integration settings.


    ### Flow Description

    1. **Configuration Retrieval**: The action retrieves the connection details from
    the RSA Archer integration settings.

    2. **Authentication Attempt**: It initializes the RSA Archer Manager, which triggers
    a login request to the RSA Archer API.

    3. **Connection Validation**: If the API returns a valid session token, the action
    confirms a successful connection.

    4. **Completion**: The action ends with a success message if the connection is
    established, or an error if authentication fails.
