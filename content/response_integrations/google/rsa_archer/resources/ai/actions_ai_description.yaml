Get Incident Details:
  ai_description: >-
    Retrieves comprehensive details for a specific incident from RSA Archer. This
    action allows users to fetch all data associated with a particular content record
    (incident) by providing its unique ID and the name of the application it belongs
    to. The retrieved data is returned as a structured JSON object, which can be used
    for further analysis or automation within the playbook.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Content ID | String | Yes | The unique identifier of the incident/content record
    in RSA Archer to retrieve. |

    | Application Name | String | No | The name of the RSA Archer application where
    the incident is stored. Defaults to 'Incidents'. |


    ### Flow Description

    1. **Initialization**: The action extracts the RSA Archer connection details (API
    Root, credentials, instance name) and the action parameters (Content ID and Application
    Name).

    2. **Authentication**: It establishes a session with the RSA Archer API using
    the provided credentials.

    3. **Application Resolution**: It fetches the application metadata from RSA Archer
    to resolve the provided 'Application Name' to its internal alias.

    4. **Data Retrieval**: Using the resolved alias and the 'Content ID', it performs
    a GET request to the RSA Archer Content API to fetch the full incident record.

    5. **Output**: The retrieved incident details are formatted and added to the action's
    result as a JSON object for use in subsequent playbook steps.


    ### Additional Notes

    - This action does not operate on entities (IPs, Hosts, etc.) found in the alert;
    it requires a specific ID as input.

    - If the specified 'Application Name' does not exist in the RSA Archer instance,
    the action will return a failure message.
