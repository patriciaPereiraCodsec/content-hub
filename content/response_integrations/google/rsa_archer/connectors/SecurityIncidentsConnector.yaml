name: RSA Archer - Security Incidents Connector
parameters:
-   name: DeviceProductField
    default_value: Product Name
    type: string
    description: Enter the source field name in order to retrieve the Product Field
        name.
    is_mandatory: true
    is_advanced: false
    mode: regular
-   name: EventClassId
    default_value: siemplify_event_type
    type: string
    description: Enter the source field name in order to retrieve the Event Field
        name.
    is_mandatory: true
    is_advanced: false
    mode: regular
-   name: Environment Field Name
    default_value: ''
    type: string
    description: Describes the name of the field where the environment name is stored.
        If the environment field isn't found, the environment is the default environment.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Environment Regex Pattern
    default_value: .*
    type: string
    description: A regex pattern to run on the value found in the "Environment Field
        Name" field. Default is .* to catch all and return the value unchanged. Used
        to allow the user to manipulate the environment field via regex logic. If
        the regex pattern is null or empty, or the environment value is null, the
        final environment result is the default environment.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: PythonProcessTimeout
    default_value: 180
    type: integer
    description: Timeout limit for the python process running the current script.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: API Root
    default_value: http://x.x.x.x/RSAarcher
    type: string
    description: API Root of the RSA Archer instance.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Instance Name
    default_value: ''
    type: string
    description: Name of the RSA Archer instance.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Username
    default_value: ''
    type: string
    description: 'Username of the RSA Archer account. '
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Password
    default_value: ''
    type: password
    description: Password of the RSA Archer account.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Fetch Max Hours Backwards
    default_value: 1
    type: integer
    description: Number of hours before the first connector iteration to retrieve
        security incidents from. This parameter applies to the initial connector iteration
        after you enable the connector for the first time, or used as a fallback value
        in cases where connector's last run timestamp expires.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Max Security Incidents To Fetch
    default_value: 50
    type: integer
    description: How many security incidents to process per one connector iteration.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Use whitelist as a blacklist
    default_value: false
    type: boolean
    description: If enabled, whitelist will be used as a blacklist.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Process Security Alerts
    default_value: true
    type: boolean
    description: If enabled, connector will process Security Alerts related to the
        Security Incident.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Process Incident Journal
    default_value: true
    type: boolean
    description: If enabled, connector will process Incident Journal related to the
        Security Incident.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Time Format
    default_value: '%Y-%m-%d %H:%M:%S'
    type: string
    description: Specify, what should be the time format for the searching of Security
        Incidents.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Verify SSL
    default_value: false
    type: boolean
    description: If enabled, verify the SSL certificate for the connection to the
        RSA Archer server is valid.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Proxy Server Address
    default_value: ''
    type: string
    description: The address of the proxy server to use.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Proxy Username
    default_value: ''
    type: string
    description: The proxy username to authenticate with.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Proxy Password
    default_value: ''
    type: password
    description: The proxy password to authenticate with.
    is_mandatory: false
    is_advanced: false
    mode: script
description: Pull Security Incidents from RSA Archer.
integration: RSAArcher
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/rsa-archer#connector
rules: []
is_connector_rules_supported: false
creator: admin
