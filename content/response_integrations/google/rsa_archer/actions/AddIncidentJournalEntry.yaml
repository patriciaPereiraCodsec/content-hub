name: Add Incident Journal Entry
description: Add a journal entry to the Security Incident in RSA Archer.
integration_identifier: RSAArcher
parameters:
-   name: Destination Content ID
    default_value: ''
    type: string
    description: Specify a content id of the security incident to which you want to
        add journal entry.
    is_mandatory: true
-   name: Text
    default_value: ''
    type: string
    description: Specify the text for the journal entry.
    is_mandatory: true
dynamic_results_metadata:
-   result_example_path: resources/add_incident_journal_entry_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
