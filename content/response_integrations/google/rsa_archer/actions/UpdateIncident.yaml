name: Update Incident
description: Update an incident
integration_identifier: RSAArcher
parameters:
-   name: Content ID
    default_value: ''
    type: string
    description: Content Id of the incident to update.
    is_mandatory: true
-   name: Application Name
    default_value: Incidents
    type: string
    description: 'Specify an application name for the incident. Default: Incidents.'
    is_mandatory: false
-   name: Incident Summary
    default_value: ''
    type: string
    description: The new summary of the incident.
    is_mandatory: false
-   name: Incident Details
    default_value: ''
    type: string
    description: The new details (decsription) of the incident.
    is_mandatory: false
-   name: Incident Owner
    default_value: ''
    type: string
    description: The new owner of the incident.
    is_mandatory: false
-   name: Incident Status
    default_value: ''
    type: string
    description: The new status of the incident.
    is_mandatory: false
-   name: Priority
    default_value: ''
    type: string
    description: The new priority of the incident.
    is_mandatory: false
-   name: Category
    default_value: ''
    type: string
    description: The new category of the incident.
    is_mandatory: false
-   name: Custom Fields
    default_value: ''
    type: string
    description: 'Specify a JSON object of fields that need to be updated. Example:
        {“Category”:“Malware”}.'
    is_mandatory: false
-   name: Custom Mapping File
    default_value: ''
    type: string
    description: Specify an absolute path to the file that contains all of the required
        mapping. If “Remote File“ is enabled, then provide a URL that contains the
        mapping file. Please refer to action documentation for the additional information.
    is_mandatory: false
-   name: Remote File
    default_value: false
    type: boolean
    description: If enabled, action will treat value provided in “Custom Mapping File“
        as a URL and try to fetch a file from it.
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/update_incident_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
script_result_name: content_id
