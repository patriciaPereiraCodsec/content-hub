name: Execute Alert Actions
description: Initiate action execution on the alert in Sophos. Use action "List Alert
    Actions" to get a list of available actions for the alert.
integration_identifier: Sophos
parameters:
-   name: Alert ID
    default_value: ''
    type: string
    description: Specify the ID of the alert on which you want to execute the action.
    is_mandatory: true
-   name: Action
    default_value: Acknowledge
    type: ddl
    optional_values:
    - Acknowledge
    - Clean PUA
    - Clean Virus
    - Auth PUA
    - Clear Threat
    - Clear HMPA
    - Send Message PUA
    - Send Message Threats
    description: Specify an action that should be executed on the alert.
    is_mandatory: true
-   name: Message
    default_value: ''
    type: string
    description: Specify a message explaining why the action was executed.
    is_mandatory: false
dynamic_results_metadata: []
creator: admin
