name: Isolate Endpoint
description: 'Isolate endpoints in Sophos. Supported entities: IP Address, Hostname.
    Note: Action is running as async, please adjust script timeout value in Siemplify
    IDE for action as needed.'
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/sophos#isolate_endpoint
integration_identifier: Sophos
parameters:
-   name: Comment
    default_value: ''
    type: string
    description: Specify the comment explaining why the isolation is needed.
    is_mandatory: true
dynamic_results_metadata: []
creator: admin
is_async: true
simulation_data_json: '{"Entities": ["HOSTNAME", "ADDRESS"]}'
