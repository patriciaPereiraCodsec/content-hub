name: Get Events Log
description: 'Retrieve logs related to the endpoints in Sophos. Supported entities:
    IP Address, Hostname. Note: events are accessible from API only for 24 hours.
    Requires valid “SIEM API Root”, “API Key” and “Base 64 Auth Payload” provided
    in the integration configuration.'
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/sophos#get_events_log
integration_identifier: Sophos
parameters:
-   name: Timeframe
    default_value: '12'
    type: string
    description: 'Specify how many hours backwards events should be retrieved. Note:
        if the user provides more than 24 hours, action will still use 24.'
    is_mandatory: true
-   name: Max Events To Return
    default_value: '200'
    type: string
    description: 'Specify how many events to return per entity. Maximum: 1000'
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/get_events_log_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
simulation_data_json: '{"Entities": ["HOSTNAME", "ADDRESS"]}'
