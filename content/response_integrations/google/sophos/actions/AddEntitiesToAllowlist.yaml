name: Add Entities To Allowlist
description: 'Add entities to allowlist in Sophos. Supported entities: Filehash. Note:
    Only SHA-256 hashes are supported.'
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/sophos#add_entities_to_allowlist
integration_identifier: Sophos
parameters:
-   name: Comment
    default_value: ''
    type: string
    description: Specify the comment explaining why the hash was sent to allowlist.
    is_mandatory: true
dynamic_results_metadata:
-   result_example_path: null
    result_name: JsonResult
    show_result: true
creator: admin
simulation_data_json: '{"Entities": ["FILEHASH"]}'
