Get Events Log:
  ai_description: >-
    Retrieves event logs for specific endpoints from Sophos Central. This action identifies
    endpoints based on IP Address or Hostname entities and fetches their associated
    security events within a specified timeframe. The retrieved logs are then attached
    to the entities as data tables for further investigation.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Timeframe | Integer | Yes | Specifies how many hours backwards events should
    be retrieved. Note: Sophos API only stores events for 24 hours; values exceeding
    this will be capped at 24. |

    | Max Events To Return | Integer | No | Specifies the maximum number of events
    to return per entity. The maximum allowed value is 1000. |


    ### Additional Notes

    - This action requires the SIEM-specific configuration parameters in the Sophos
    integration (SIEM API Root, API Key, and Base 64 Auth Payload) to be correctly
    configured.

    - Events are only accessible via the API for a rolling 24-hour window.


    ### Flow Description

    1. **Initialization**: Extracts API credentials and action parameters, calculating
    the search start time based on the provided `Timeframe` (capped at 24 hours).

    2. **Entity Filtering**: Filters the target entities to process only those of
    type `ADDRESS` (IP) or `HOSTNAME`.

    3. **Endpoint Identification**: For each valid entity, the action queries Sophos
    to find the corresponding internal `endpoint_id`.

    4. **Event Retrieval**: Queries the Sophos SIEM API to fetch events associated
    with the identified `endpoint_id` since the calculated start time.

    5. **Data Formatting**: Converts the retrieved event data into both JSON and CSV
    formats.

    6. **Internal Enrichment**: Attaches the CSV event logs as a data table to the
    specific entity within Google SecOps.

    7. **Finalization**: Aggregates all retrieved data into a final JSON result and
    provides a summary execution message.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Adds a data table to each processed entity containing the retrieved event logs
      from Sophos.
  categories:
