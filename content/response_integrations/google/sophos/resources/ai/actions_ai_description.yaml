Ping:
  ai_description: >-
    ### General Description

    The **Ping** action is a utility designed to verify the connectivity between Google
    SecOps and the Sophos Central platform. It ensures that the provided credentials
    and API endpoints are valid and reachable by performing a series of authentication
    and basic API requests.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | API Root | String | Yes | The base URL for the Sophos API. |

    | Client ID | String | Yes | The client ID used for OAuth2 authentication. |

    | Client Secret | String | Yes | The client secret used for OAuth2 authentication.
    |

    | Verify SSL | Boolean | No | If enabled, the action will verify the SSL certificate
    of the Sophos server. Default is False. |

    | SIEM API Root | String | No | The base URL for the Sophos SIEM API. Required
    if API Key or Base 64 Auth Payload is provided. |

    | API Key | String | No | The API key used for SIEM-specific authentication. |

    | Base 64 Auth Payload | String | No | The base64 encoded authentication payload
    for SIEM connectivity. |


    ### Additional Notes

    - This action is primarily used during the initial setup or troubleshooting of
    the Sophos integration to confirm that the environment can communicate with the
    Sophos API.

    - If SIEM-related parameters (SIEM API Root, API Key, or Base 64 Auth Payload)
    are provided, the action will perform an additional connectivity check against
    the SIEM events endpoint.


    ### Flow Description

    1. **Configuration Extraction**: Retrieves the integration settings (API Root,
    Client ID, Client Secret, etc.) from the Google SecOps environment.

    2. **Authentication**: Performs an OAuth2 login request to Sophos to obtain a
    bearer token.

    3. **Tenant Identification**: Calls the 'whoami' endpoint to identify the tenant
    ID and the specific data region API host.

    4. **Connectivity Test**: Executes a test request to the endpoints API to confirm
    general access and permissions.

    5. **SIEM Validation (Optional)**: If SIEM credentials are provided, it validates
    access to the SIEM events API using the SIEM-specific API root and authentication
    headers.

    6. **Completion**: Returns a success status if all connectivity checks pass, or
    a failure status with an error message if any step fails.
