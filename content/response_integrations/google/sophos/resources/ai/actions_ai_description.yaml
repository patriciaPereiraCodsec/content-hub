Add Entities To Blocklist:
  ai_description: >-
    ### General Description

    Adds SHA-256 file hashes to the Sophos Central blocklist. This action allows security
    administrators to globally block specific files from executing or being accessed
    across all endpoints managed by Sophos Central.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Comment | String | Yes | Specify the comment explaining why the hash was sent
    to the blocklist. This is stored in Sophos for auditing and tracking purposes.
    |


    ### Additional Notes

    * **Hash Support**: This action strictly supports SHA-256 hashes. Hashes of other
    types (e.g., MD5, SHA-1) will be skipped during processing.

    * **Idempotency**: The action handles cases where a hash is already present on
    the blocklist without failing the entire execution.


    ### Flow Description

    1. **Setup**: Retrieves Sophos API configuration (API Root, Client ID, Client
    Secret) and the user-provided comment.

    2. **Entity Filtering**: Filters the target entities to identify `FILEHASH` objects.

    3. **Validation**: For each hash, verifies that the identifier length matches
    the SHA-256 standard (64 characters).

    4. **Execution**: Calls the Sophos API to add each valid hash to the blocked items
    list (`/endpoint/v1/settings/blocked-items`).

    5. **Exception Handling**: Catches specific errors, such as `HashAlreadyOnBlocklist`,
    to provide granular feedback for each entity.

    6. **Finalization**: Returns a summary message indicating which hashes were successfully
    added, which were already blocked, and which failed.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Adds file hashes to the global 'Blocked Items' configuration in Sophos Central,
      which prevents those files from running on managed endpoints.
