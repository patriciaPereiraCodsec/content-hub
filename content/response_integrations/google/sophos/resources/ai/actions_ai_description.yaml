Scan Endpoints:
  ai_description: >-
    ### General Description

    This action initiates a security scan on endpoints managed by Sophos Central.
    It is used to proactively trigger a scan on specific machines identified as entities
    within a case, helping to identify potential threats or verify the cleanliness
    of a system after an alert.


    ### Parameters Description

    There are no action-specific parameters for this action. It relies entirely on
    the integration's configuration (API Root, Client ID, Client Secret, and Verify
    SSL) and the entities present in the current Google SecOps context.


    ### Flow Description

    1. **Authentication**: The action authenticates with the Sophos Central API using
    the provided Client ID and Client Secret to obtain an OAuth2 token.

    2. **Entity Filtering**: It identifies all `IP Address` and `Hostname` entities
    within the current alert or case.

    3. **Endpoint Discovery**: For each supported entity, the action queries Sophos
    Central to find a matching endpoint record and retrieve its unique `scan_id` (internal
    Sophos ID).

    4. **Scan Initiation**: If a matching endpoint is found, the action sends a POST
    request to the Sophos API to trigger an immediate security scan on that specific
    device.

    5. **Result Reporting**: The action tracks which entities were successfully triggered
    for a scan and which ones could not be found in the Sophos environment, providing
    a summary message at the end of execution.


    ### Additional Notes

    - This action requires the endpoint to be online and communicating with Sophos
    Central for the scan to start immediately.

    - If an entity (IP or Hostname) is not found in the Sophos database, it will be
    reported as a failure for that specific entity.
