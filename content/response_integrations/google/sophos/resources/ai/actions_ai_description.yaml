Add Entities To Allowlist:
  ai_description: >-
    ### General Description

    Adds SHA-256 file hash entities to the Sophos allowlist. This action is used to
    prevent Sophos from flagging or blocking specific files that are deemed safe by
    the administrator. It interacts with the Sophos Central API to update the global
    allowlist settings.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Comment | String | Yes | Specify the comment explaining why the hash was sent
    to the allowlist. This is useful for auditing and tracking purposes. |


    ### Flow Description

    1. **Entity Filtering**: The action identifies all `FILEHASH` entities provided
    in the current context.

    2. **Validation**: It validates each entity's identifier to ensure it is a SHA-256
    hash (exactly 64 characters long). Non-compliant hashes are skipped.

    3. **API Authentication**: The action authenticates with the Sophos Central API
    using the provided Client ID and Client Secret to obtain an access token.

    4. **Allowlist Submission**: For each valid hash, the action sends a POST request
    to the Sophos `/endpoint/v1/settings/allowed-items` endpoint, including the hash
    value and the user-provided comment.

    5. **Status Reporting**: The action tracks and reports which entities were successfully
    added, which were already present on the allowlist (handling 409 Conflict responses),
    and which failed due to errors.


    ### Additional Notes

    * **Supported Hashes**: Only SHA-256 hashes are supported by this action. MD5
    or SHA-1 hashes will be ignored.

    * **Mutation**: This action modifies the external state of the Sophos environment
    by adding items to the allowlist.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Adds file hashes to the Sophos Central global allowlist configuration via a
      POST request to the /endpoint/v1/settings/allowed-items endpoint.
    fetches_data: false
    internal_data_mutation_explanation: null
  categories:
