Isolate Endpoint:
  ai_description: >-
    ### General Description

    This action isolates specific endpoint entities (IP Address or Hostname) within
    the Sophos Central environment. Isolation restricts the device's network communication
    to prevent the spread of threats while allowing management traffic. The action
    operates asynchronously, meaning it triggers the isolation and then periodically
    polls Sophos to confirm the operation has been successfully completed.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Comment | String | Yes | A mandatory explanation or justification for why the
    isolation is being performed. This comment is recorded within the Sophos Central
    audit logs. |


    ### Additional Notes

    - **Async Execution:** This action is designed to run asynchronously. It will
    trigger the isolation and then enter a polling state. Ensure the script timeout
    in the Google SecOps IDE is configured appropriately to allow for the polling
    duration.

    - **Supported Entities:** Only entities of type `ADDRESS` (IP) and `HOSTNAME`
    are processed.


    ### Flow Description

    1. **Entity Filtering:** The action identifies all `ADDRESS` and `HOSTNAME` entities
    within the current scope.

    2. **Endpoint Discovery:** For each entity, it queries Sophos Central to find
    a matching managed endpoint ID.

    3. **Status Check:** It checks the current isolation status of the discovered
    endpoint.

    4. **Isolation Trigger:** If the endpoint is currently 'Unisolated', the action
    sends a request to Sophos to enable isolation, including the provided comment.

    5. **Asynchronous Polling:** The action enters an 'In Progress' state, periodically
    checking the isolation status of the endpoint until it is confirmed as 'Isolated'
    or the action reaches its timeout threshold.

    6. **Final Reporting:** Once the process completes or fails, it provides a summary
    of successful isolations, endpoints already isolated, and any failures (e.g.,
    endpoint not found).
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      This action changes the network state of an endpoint in Sophos Central by enabling
      the 'Isolation' feature, which restricts the device's network connectivity.
