Execute Alert Actions:
  ai_description: >-
    ### General Description

    The **Execute Alert Actions** action allows users to perform administrative and
    remediation tasks on specific alerts within the Sophos Central platform directly
    from Google SecOps. This action is used to manage the lifecycle of a threat by
    acknowledging it, clearing it, or initiating cleanup procedures on the affected
    endpoint.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Alert ID** | String | Yes | The unique identifier of the alert in Sophos on
    which the action will be performed. |

    | **Action** | Enum | Yes | The specific action to execute. Options include: `Acknowledge`,
    `Clean PUA`, `Clean Virus`, `Auth PUA`, `Clear Threat`, `Clear HMPA`, `Send Message
    PUA`, and `Send Message Threats`. |

    | **Message** | String | No | An optional text message providing context or a
    reason for why the action is being executed. |


    ### Additional Notes

    *   It is recommended to use the **List Alert Actions** action first to identify
    which specific actions are valid for a given alert, as Sophos restricts available
    actions based on the alert type and state.

    *   This action does not process Google SecOps entities; it operates solely based
    on the provided `Alert ID` parameter.


    ### Flow Description

    1.  **Parameter Extraction:** The action retrieves the Sophos API credentials
    and the user-provided `Alert ID`, `Action`, and `Message`.

    2.  **Action Mapping:** The human-readable action name (e.g., "Clean Virus") is
    mapped to the corresponding Sophos API internal action string (e.g., "cleanVirus").

    3.  **API Interaction:** The action initializes the `SophosManager` and sends
    a `POST` request to the Sophos `/common/v1/alerts/{alert_id}/actions` endpoint.

    4.  **Error Handling:** The script checks for specific HTTP errors, such as `400`
    (invalid action for that alert) or `404` (alert not found), and provides descriptive
    error messages.

    5.  **Completion:** The action returns a success status if the Sophos API accepts
    the execution request.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      This action performs a POST request to the Sophos API to execute state-changing
      operations on alerts, such as acknowledging them, clearing threats, or initiating
      virus cleanup on remote endpoints.
    fetches_data: false
    internal_data_mutation_explanation: null
