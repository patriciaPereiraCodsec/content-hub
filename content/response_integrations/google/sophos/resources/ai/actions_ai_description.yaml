Enrich Entities:
  ai_description: >-
    ### General Description

    This action enriches Hostname, IP Address, and File Hash entities using information
    retrieved from Sophos Central. It provides detailed context about endpoints, including
    their health status, operating system details, and network information. For file
    hashes, it checks if the hash is currently on the Sophos blocklist. The action
    enhances the security context within Google SecOps by updating entity attributes
    and optionally creating detailed insights and data tables.


    ### Parameters Description

    | Parameter | Type | Mandatory | Default | Description |

    | :--- | :--- | :--- | :--- | :--- |

    | Create Insights | Boolean | No | True | If enabled, the action will create a
    detailed insight for each successfully enriched entity, summarizing the retrieved
    information. |


    ### Additional Notes

    - The action supports Hostname, IP Address (ADDRESS), and File Hash (FILEHASH)
    entity types.

    - For File Hash entities, if a match is found in the Sophos blocklist, the entity
    is automatically marked as 'Suspicious' in Google SecOps.

    - Endpoint enrichment includes a check for the 'Isolation' status of the device.


    ### Flow Description

    1. **Initialization**: The action extracts configuration parameters (API credentials)
    and the 'Create Insights' action parameter.

    2. **Entity Filtering**: It identifies supported entities (Hostname, IP, File
    Hash) from the target entities list.

    3. **Sophos Connection**: Establishes a connection to the Sophos Central API using
    OAuth2 credentials.

    4. **Endpoint Enrichment (Hostname/IP)**:
        - Searches for the endpoint in Sophos using the entity identifier.
        - If found, it retrieves additional details such as OS version, MAC addresses,
    and health status.
        - It performs a secondary check to determine if the endpoint is currently
    isolated.
    5. **Hash Enrichment (File Hash)**:
        - Queries the Sophos blocked items list for the specific file hash.
        - If found, it retrieves the block reason (comment) and creation time.
    6. **Data Population**: For each successful match, it updates the entity's additional
    properties, sets the 'is_enriched' flag, and adds a data table to the entity.

    7. **Insight Creation**: If the 'Create Insights' parameter is enabled, it generates
    a formatted HTML insight for the entity.

    8. **Finalization**: Updates all processed entities in the Google SecOps platform
    and returns a success message.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      The action updates entity attributes (additional properties), sets the 'is_enriched'
      flag, marks blocked hashes as 'is_suspicious', creates entity insights, and
      adds data tables to the case.
