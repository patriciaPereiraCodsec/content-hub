Unisolate Endpoint:
  ai_description: >-
    ### General Description

    The **Unisolate Endpoint** action is designed to remove network isolation from
    specific endpoints within Sophos Central. This action is typically used to restore
    network connectivity to a host after a security incident has been investigated
    and the endpoint is confirmed to be clean. It supports both IP Address and Hostname
    entities.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Comment** | String | Yes | A mandatory explanation or justification for why
    the unisolation is being performed. This comment is logged in Sophos Central for
    auditing purposes. |


    ### Flow Description

    1. **Entity Identification**: The action filters the target entities to identify
    supported types: IP Addresses and Hostnames.

    2. **Endpoint Discovery**: For each identified entity, the action queries Sophos
    Central to find the corresponding endpoint record and its unique ID.

    3. **Status Verification**: The action checks the current isolation status of
    the endpoint. If the endpoint is already unisolated, it is marked as completed
    and skipped.

    4. **Unisolation Request**: If the endpoint is currently isolated, the action
    sends a POST request to Sophos Central to initiate the unisolation process, including
    the provided mandatory comment.

    5. **Asynchronous Monitoring**: Because the unisolation process on the endpoint
    can take time, the action enters an asynchronous state. It periodically polls
    Sophos Central to check if the endpoint's status has transitioned to 'Unisolated'.

    6. **Final Reporting**: Once the endpoints are confirmed as unisolated or the
    action reaches its timeout, it provides a summary of successful, failed, and pending
    unisolations.


    ### Additional Notes

    * This action is **asynchronous**. It will continue to run in the background until
    the unisolation is confirmed or the script timeout is reached.

    * Users should ensure that the script timeout value in the Google SecOps IDE is
    set high enough to allow for the endpoint to receive and process the unisolation
    command from Sophos Central.
