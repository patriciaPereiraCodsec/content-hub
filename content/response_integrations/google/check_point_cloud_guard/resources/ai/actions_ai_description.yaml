Ping:
  ai_description: >-
    ### General Description

    Tests the connectivity between Google SecOps and the Check Point Cloud Guard (Dome9)
    platform using the provided integration configuration parameters. This action
    ensures that the API credentials and network settings are correct and that the
    service is reachable.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | API Key ID | String | Yes | The ID of the API key used for authentication with
    the Check Point Cloud Guard API. |

    | API Key Secret | String | Yes | The secret associated with the API Key ID used
    for authentication. |

    | Verify SSL | Boolean | No | If set to true, the action will verify the SSL certificate
    of the Check Point Cloud Guard server. Default is false. |


    ### Additional Notes

    This action does not process any entities and is strictly used for verifying the
    integration setup. It uses the `/Settings` endpoint of the Dome9 API to validate
    the connection.


    ### Flow Description

    1. **Parameter Extraction**: The action retrieves the `API Key ID`, `API Key Secret`,
    and `Verify SSL` settings from the integration configuration.

    2. **Manager Initialization**: It initializes the `Dome9Manager` with the extracted
    credentials and SSL settings.

    3. **Connectivity Check**: The action executes the `test_connectivity` method,
    which performs a GET request to the Check Point Cloud Guard API root's `/Settings`
    endpoint.

    4. **Outcome Reporting**: If the API call is successful, the action returns a
    success status and message. If the call fails (e.g., due to invalid credentials
    or connection issues), it catches the exception and reports a failure.
