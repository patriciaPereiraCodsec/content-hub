Get Ip Info:
  ai_description: "### General Description\nEnriches external IP Address entities\
    \ using the DShield (SANS Internet Storm Center) API. This action retrieves threat\
    \ intelligence and reputation data, such as the number of packets blocked from\
    \ the IP, the number of unique targets attacked, ASN information, and geographic\
    \ data. The retrieved information is used to populate entity attributes and provide\
    \ a structured data table for analysts.\n\n### Parameters\nThere are no user-configurable\
    \ parameters for this action.\n\n### Flow Description\n1. **Entity Filtering**:\
    \ The action identifies all `ADDRESS` (IP) entities in the current scope that\
    \ are not marked as internal.\n2. **Data Retrieval**: For each valid entity, it\
    \ queries the DShield API using the IP address as the identifier.\n3. **Data Processing**:\
    \ The API response is flattened and prefixed with 'DShield' for consistency.\n\
    4. **Internal Enrichment**: \n    *   Adds a CSV-formatted table to the entity\
    \ in the Google SecOps UI.\n    *   Updates the entity's additional properties\
    \ with the DShield data.\n    *   Sets the `is_enriched` flag to `true` for the\
    \ entity.\n5. **Finalization**: Updates the entities within the case and returns\
    \ a summary of the enriched addresses.\n\n### Additional Notes\nThis action strictly\
    \ processes external IP addresses. If an IP is marked as internal in the environment\
    \ configuration, it will be skipped to avoid unnecessary API calls and potential\
    \ false positives."
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entity additional properties with DShield reputation data and sets the
      is_enriched flag to true.
  categories:
    enrichment: true
  entity_usage:
    entity_types:
    - ADDRESS
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: true
    filters_by_identifier: false
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: true
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
Ping:
  ai_description: >-
    ### General Description

    The **Ping** action is a diagnostic utility used to verify the connectivity between
    Google SecOps and the DShield API. Its primary purpose is to ensure that the integration
    is correctly configured and that the DShield service is reachable from the environment.


    ### Parameters

    There are no parameters for this action. It uses the global integration configuration
    (Api Root) to perform the connectivity test.


    ### Additional Notes

    - This action does not interact with or process any entities.

    - It is a standard 'Test Connectivity' action typically used during integration
    setup or troubleshooting.


    ### Flow Description

    1. **Configuration Retrieval**: The action retrieves the 'Api Root' parameter
    from the DShield integration settings.

    2. **Connectivity Test**: It attempts to establish a connection to the configured
    API URL using the DShieldManager's `test_connectivity` method.

    3. **Status Reporting**: If the connection is successful, it returns a success
    message ('Connection Established'). If the URL is malformed or unreachable, it
    returns a failure message ('Connection Failed').
  capabilities:
    can_create_case_comments: false
