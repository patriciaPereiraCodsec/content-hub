name: Get Mitigation Impersonation Details
description: Get latest company impersonation incidents. Results are limited to the
    latest 1000 incidents, a message will appear displaying if the amount of incidents
    in the period is over this limit. Please note that the IDs returned here are of
    impersonation attempts, not incidents or reports, so searching these IDs in other
    endpoints will not return the expected incidents.
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/ironscales#get_mitigation_impersonation_details
integration_identifier: IronScales
parameters:
-   name: Period
    default_value: Last 24 hours
    type: ddl
    optional_values:
    - Last 24 hours
    - Last 7 days
    - Last 90 days
    - Last 180 days
    - Last 360 days
    - Current year to date
    - All time
    description: Specify the time period for which you would like to get mitigation
        impersonation details for.
    is_mandatory: true
dynamic_results_metadata:
-   result_example_path: resources/get_mitigation_impersonation_details_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
