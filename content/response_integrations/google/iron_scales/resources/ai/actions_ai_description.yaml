Get Incident Details:
  ai_description: >-
    ### General Description

    Retrieves comprehensive details for one or more specific incidents from IronScales
    using their unique identifiers. This action gathers deep context on phishing incidents,
    including classification, reporter information, affected mailbox counts, sender
    reputation, and technical email headers.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Incidents IDs | String | Yes | A comma-separated list of IronScales incident
    IDs (e.g., '753123, 753456') to fetch details for. |


    ### Flow Description

    1. **Initialization**: The action extracts the IronScales API configuration (Root,
    Token, Company ID, Partner status) and the user-provided incident IDs.

    2. **Manager Setup**: It initializes the `IronScalesManager` which handles authentication
    via JWT and manages the connection to the IronScales API.

    3. **Data Retrieval**: The action splits the input string into individual IDs
    and iterates through them, making a GET request to the IronScales incident details
    endpoint for each ID.

    4. **Error Handling**: If an incident ID is not found (404), the action logs the
    error and continues to the next ID in the list.

    5. **Result Aggregation**: Successfully retrieved incident data is converted to
    JSON and added to the action's result output. A summary message is generated indicating
    which IDs were successfully fetched and which failed.


    ### Additional Notes

    - This action does not process SOAR entities; it relies entirely on the manually
    provided 'Incidents IDs' parameter.

    - The output is a JSON array containing the full raw data objects for all successfully
    retrieved incidents.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
