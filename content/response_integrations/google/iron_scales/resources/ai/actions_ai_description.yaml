Ping:
  ai_description: >-
    ### General Description

    The **Ping** action is a diagnostic tool designed to verify the connectivity between
    Google SecOps and the IronScales platform. It ensures that the provided configuration
    parameters (API Root, API Token, Company ID, etc.) are correct and that the network
    path is open. This action is typically used during the initial setup of the integration
    or for troubleshooting communication issues.


    ### Parameters Description

    This action relies on configuration parameters defined at the integration level
    rather than action-specific parameters:


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **API Root** | String | Yes | The base URL for the IronScales API instance.
    |

    | **API Token** | String | Yes | The API key used to authenticate requests. |

    | **Company ID** | String | Yes | The unique identifier for the company within
    IronScales. |

    | **Verify SSL** | Boolean | Yes | If enabled, the action will verify the SSL
    certificate of the IronScales server. |

    | **Is Partner** | Boolean | Yes | Specifies if the provided Company ID belongs
    to a partner account, which affects the API scopes used for authentication. |


    ### Additional Notes

    - This action does not process any entities.

    - It performs a two-step process: first obtaining a JWT token and then testing
    the specific company endpoint.


    ### Flow Description

    1. **Parameter Extraction:** The action retrieves the integration's configuration
    settings (API Root, Token, Company ID, SSL settings, and Partner status).

    2. **Authentication:** It calls the IronScales `get-token` endpoint using the
    API Token and appropriate scopes (Partner vs. Company) to retrieve a JSON Web
    Token (JWT).

    3. **Connectivity Test:** Using the JWT, it sends a GET request to the `appapi/company/{company_id}`
    endpoint.

    4. **Validation:** The action validates the HTTP response. If the response is
    successful (200 OK), it confirms connectivity. If an error occurs (e.g., 401 Unauthorized,
    404 Not Found), it catches the exception and reports the failure.
