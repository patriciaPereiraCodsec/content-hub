Get Mitigations Per Mailbox:
  ai_description: >-
    ### General Description

    Retrieves detailed mitigation information for specific mailboxes associated with
    provided incident IDs from IronScales. This action is used to understand how specific
    incidents were handled across different mailboxes, providing visibility into remediation
    actions, incident states, and sender details.


    ### Parameters Description


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Incidents IDs | String | Yes | A comma-separated list of IronScales incident
    IDs to query for mitigation details. |

    | Period | String | No | The timeframe for which to retrieve mitigation data.
    Options include 'Last 24 hours', 'Last 7 days', 'Last 90 days', 'Last 180 days',
    'Last 360 days', 'Current year to date', and 'All time'. Defaults to 'All time'.
    |

    | Max Pages to Fetch | Integer | Yes | The maximum number of result pages to retrieve
    from the API to control data volume. Defaults to 1. |


    ### Additional Notes

    - This action does not operate on SOAR entities (like IP or Email); it relies
    strictly on the provided Incident IDs.

    - Although the underlying API call uses a POST method, it is used for complex
    filtering and does not mutate data in IronScales.


    ### Flow Description

    1. **Initialization**: Extracts configuration parameters (API Root, Token, Company
    ID) and action parameters (Incident IDs, Period, Max Pages).

    2. **Manager Setup**: Initializes the IronScalesManager, which handles authentication
    and JWT token acquisition.

    3. **Request Preparation**: Parses the comma-separated string of Incident IDs
    into a list and maps the selected time period to its corresponding API value.

    4. **Data Retrieval**: Executes a paginated request to the IronScales mitigation
    details endpoint.

    5. **Pagination**: Iterates through result pages until the specified `Max Pages
    to Fetch` limit is reached or all available data is retrieved.

    6. **Output**: Returns the collected mitigation records as a JSON result and provides
    a summary message in the action output.
