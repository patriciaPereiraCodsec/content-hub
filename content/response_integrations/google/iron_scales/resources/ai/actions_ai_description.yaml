Classify Incident:
  ai_description: >-
    ### General Description


    The **Classify Incident** action allows users to update the classification of
    one or more incidents within the IronScales platform. This is typically used to
    mark incidents as confirmed attacks, false positives, or spam based on investigation
    results.


    ### Parameters Description


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Incidents IDs | String | Yes | A comma-separated list of IronScales incident
    IDs to be classified. |

    | New Classification | String (Dropdown) | Yes | The new classification to apply.
    Options: 'Attack', 'False positive', 'Spam'. Default is 'Attack'. |

    | Classifying User Email | String | Yes | The email address of the user performing
    the classification. This email must be recognized by IronScales. |


    ### Flow Description


    1. **Initialization**: The action retrieves the IronScales API configuration and
    the user-provided parameters (Incident IDs, New Classification, and User Email).

    2. **Incident Processing**: The action splits the provided comma-separated string
    of Incident IDs into a list.

    3. **Data Retrieval**: For each Incident ID, the action first fetches the current
    incident details from IronScales to identify the existing classification.

    4. **Classification Update**: The action sends a POST request to the IronScales
    API to update the incident's classification to the new value, providing the old
    classification and the classifying user's email.

    5. **Result Aggregation**: The action tracks which incidents were successfully
    updated and which failed, providing a summary message and setting the action result
    to true if at least one update succeeded.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Updates the classification status (e.g., to 'Attack', 'Spam', or 'False Positive')
      of specified incidents in the IronScales platform.
    fetches_data: true
    internal_data_mutation_explanation: null
  categories:
