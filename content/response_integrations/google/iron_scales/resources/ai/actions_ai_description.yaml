Get Mitigation Impersonation Details:
  ai_description: >-
    ### General Description

    The **Get Mitigation Impersonation Details** action retrieves a list of the latest
    company impersonation incidents from the IronScales platform. This action is designed
    to provide visibility into impersonation attempts (such as Display Name Impersonation)
    that have been mitigated within a specific timeframe. The results are limited
    to the latest 1,000 incidents.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Period** | Dropdown | Yes | Specifies the time range for fetching impersonation
    details. Options include 'Last 24 hours', 'Last 7 days', 'Last 90 days', 'Last
    180 days', 'Last 360 days', 'Current year to date', and 'All time'. |


    ### Flow Description

    1. **Initialization**: The action extracts configuration parameters (API Root,
    Token, Company ID, etc.) and the user-provided `Period` parameter.

    2. **Authentication**: It authenticates with the IronScales API to obtain a JWT
    token using the provided API Token and Company ID.

    3. **Data Retrieval**: It calls the IronScales `get_impersonation_details` endpoint,
    passing the mapped integer value for the selected time period as a query parameter.

    4. **Processing**: The action parses the raw JSON response into internal data
    models representing impersonation attempts.

    5. **Output**: The retrieved impersonation details are added to the action's JSON
    results for use in subsequent playbook steps.


    ### Additional Notes

    * The IDs returned by this action refer to **impersonation attempts**, not standard
    incident or report IDs. Searching these IDs in other incident-specific endpoints
    may not yield results.

    * If the number of incidents in the selected period exceeds 1,000, only the latest
    1,000 are returned.
