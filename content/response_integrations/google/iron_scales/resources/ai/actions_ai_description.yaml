Get Incident Mitigation Details:
  ai_description: >-
    Retrieves the latest incident mitigation details for a company from IronScales
    based on a specified time period. This action is designed to provide visibility
    into remediated email threats, including details such as incident IDs, remediation
    timestamps, affected mailbox counts, sender information, and threat classifications.
    The results are limited to the latest 1000 incidents within the selected timeframe.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Period | Dropdown | Yes | Specifies the time range for which to retrieve mitigation
    details. Options include 'Last 24 hours', 'Last 7 days', 'Last 90 days', 'Last
    180 days', 'Last 360 days', 'Current year to date', and 'All time'. |


    ### Flow Description

    1. **Authentication**: The action first authenticates with the IronScales API
    using the provided API Token and Company ID to obtain a JWT bearer token.

    2. **Parameter Mapping**: The human-readable 'Period' parameter is mapped to a
    specific integer value required by the IronScales API.

    3. **Data Retrieval**: A GET request is sent to the IronScales mitigation details
    endpoint, filtered by the selected time period.

    4. **Output Generation**: The retrieved mitigation records are parsed into a structured
    format and added to the action's JSON results for use in subsequent playbook steps.
