Add a SAM Rule:
  ai_description: >-
    ### General Description

    The **Add a SAM Rule** action allows users to dynamically create Suspicious Activity
    Monitoring (SAM) rules on a specific Checkpoint Security Gateway. SAM rules are
    used to block or monitor traffic based on specific criteria like source/destination
    IPs, ports, and protocols without requiring a full policy installation. This action
    is typically used for rapid response to suspicious activity by enforcing temporary
    or permanent blocks at the firewall level.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Security Gateway to Create SAM Rule on | String | Yes | Specify the name of
    the Security Gateway to create the rule for. |

    | Source IP | String | No | Specify the source IP to be added to the rule. |

    | Source Netmask | String | No | Specify the source netmask to be added to the
    rule. |

    | Destination IP | String | No | Specify the destination IP to be added to the
    rule. |

    | Destination Netmask | String | No | Specify the destination netmask to be added
    to the rule. |

    | Port | Integer | No | Specify the port number to be added to the rule (e.g.,
    5005). |

    | Protocol | String | No | Specify the protocol name to be added to the rule (e.g.,
    TCP). |

    | Expiration | Integer | No | Specify how long in seconds the rule should be active.
    If empty, the rule never expires. |

    | Action for the Matching Connections | Dropdown | Yes | Specify the action for
    matching connections: Notify, Reject, or Drop. |

    | How to Track Matching Connections | Dropdown | Yes | Specify how to track matching
    connections: No Log, Log, or Alert. |

    | Close Connections | Boolean | No | Specify if existing matching connections
    should be closed immediately. |


    ### Flow Description

    1. **Connection**: The action establishes a session with the Checkpoint Management
    Server using the provided credentials.

    2. **Criteria Construction**: It processes the network parameters (IPs, netmasks,
    ports, protocols) to construct a valid SAM criteria string compatible with the
    Checkpoint `fw_sam` command.

    3. **Command Generation**: It builds the full `fw sam` command, incorporating
    the selected action (Drop/Reject/Notify), tracking options, expiration time, and
    connection closure settings.

    4. **Script Execution**: The action uses the Checkpoint `run-script` API to execute
    the generated command on the target Security Gateway.

    5. **Task Monitoring**: It polls the Checkpoint task status until the script execution
    is finished or the SOAR execution deadline is reached.

    6. **Publishing**: Once the script completes, it publishes the changes to the
    Checkpoint database to ensure persistence.

    7. **Result Reporting**: It retrieves the task details and any execution errors
    or messages to provide a final status in the SOAR platform.


    ### Additional Notes

    - This action does not iterate over entities; it uses the values provided in the
    action parameters.

    - Users must ensure that the provided IP/Netmask/Port combinations are valid according
    to Checkpoint's CLI reference for the `fw_sam` command.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Executes a script on a Checkpoint Security Gateway to add a SAM (Suspicious
      Activity Monitoring) rule and publishes the changes to the management server.
    fetches_data: false
    internal_data_mutation_explanation: null
  categories:
    enrichment: false
