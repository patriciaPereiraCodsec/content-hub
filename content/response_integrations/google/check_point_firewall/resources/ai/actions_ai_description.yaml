List Layers On Site:
  ai_description: >-
    ### General Description

    The **List Layers On Site** action retrieves a comprehensive list of available
    Access Control and Threat Prevention layers from a Check Point Firewall instance.
    This utility action is designed to help security administrators and automated
    playbooks discover the security policy structure of the environment, which is
    essential for auditing or for identifying specific layers to target in subsequent
    rule-based actions.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Max Layers To Return** | Integer | No | Specifies the maximum number of layers
    to retrieve for both Access Control and Threat Prevention categories. The default
    value is 50. |


    ### Additional Notes

    - This action does not operate on specific entities (like IPs or Hosts) and instead
    performs a global query against the Check Point Management Server.

    - The results are presented in two distinct data tables for clear separation between
    Access Control and Threat Prevention configurations.


    ### Flow Description

    1. **Authentication**: The action initializes a connection to the Check Point
    Management Server using the provided server address, username, password, and optional
    domain.

    2. **Data Retrieval**: It executes two separate API calls to the firewall: one
    to fetch Access Control layers and another to fetch Threat Prevention layers,
    respecting the `Max Layers To Return` limit.

    3. **Data Parsing**: The raw JSON responses from the firewall are parsed into
    structured Python objects (AccessLayer and ThreatLayer models).

    4. **Output Generation**:
        - **Data Tables**: Generates two tables: "Access Control Layers" and "Threat
    Prevention Control Layers" containing details like UID, Name, Type, and Read-Only
    status.
        - **JSON Result**: Combines all retrieved layer data into a single JSON array
    for use in subsequent playbook steps.
    5. **Session Cleanup**: The action explicitly logs out of the Check Point session
    to release server resources.
