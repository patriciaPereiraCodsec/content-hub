Ping:
  ai_description: >-
    Tests the connectivity between Google SecOps and the Check Point Firewall Management
    Server. This action validates that the provided credentials and server address
    are correct and that the network path is open.


    ### Flow Description:

    1. **Parameter Extraction:** Retrieves the Server Address, Username, Password,
    Domain, and SSL verification settings from the integration configuration.

    2. **Authentication:** Initializes the Checkpoint Manager, which attempts to log
    in to the Check Point Web API. A successful login returns a session identifier
    (SID).

    3. **Connectivity Validation:** Checks for the presence of the session identifier
    to confirm a valid connection.

    4. **Session Cleanup:** Executes a 'discard' command to clear any potential session-level
    changes and then logs out to terminate the session properly.


    ### Parameters Description:

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Server Address | String | Yes | The IP address or hostname of the Check Point
    Management Server. |

    | Username | String | Yes | The username used to authenticate with the Check Point
    API. |

    | Password | String | Yes | The password used to authenticate with the Check Point
    API. |

    | Domain | String | No | The specific domain name to log into, used in Multi-Domain
    Management (MDM) environments. Defaults to an empty string. |

    | Verify SSL | Boolean | No | If enabled, the action will verify the SSL certificate
    of the Check Point server. Defaults to False. |


    ### Additional Notes:

    - This action does not interact with or require any entities from the SecOps case.

    - It is strictly used for health checks and configuration validation.
