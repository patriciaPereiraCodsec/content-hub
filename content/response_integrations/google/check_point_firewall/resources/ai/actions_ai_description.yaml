Run Script:
  ai_description: >-
    ### General Description

    This action executes arbitrary CLI scripts or commands on specified CheckPoint
    devices using the CheckPoint Management API's `run-script` functionality. It is
    designed for administrative tasks, troubleshooting, or automated response actions
    that require direct command execution on firewalls or gateways. Note that this
    action does not operate on Google SecOps entities and instead targets devices
    specified by name.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Script text | String | Yes | The actual CLI command or script content to be
    executed on the target (e.g., `fw sam -t 600 -I src 8.9.10.12`). |

    | Target | String | Yes | A comma-separated list of CheckPoint device names (gateways)
    where the script should be executed (e.g., `gateway1, gateway2`). |


    ### Additional Notes

    * This action is asynchronous; it initiates a task on the CheckPoint server and
    polls for completion until the script finishes or the action reaches its execution
    timeout.

    * The action returns the full JSON response from the CheckPoint task, including
    standard output and error messages.


    ### Flow Description

    1. **Initialization**: The action extracts the CheckPoint connection details and
    the script parameters (command and targets).

    2. **Execution**: It connects to the CheckPoint Management Server and triggers
    the `run-script` API call.

    3. **Polling**: The action enters a loop, checking the status of the generated
    Task ID every 5 seconds.

    4. **Timeout Handling**: If the action's internal deadline is reached before the
    script finishes, it marks the execution as timed out.

    5. **Data Retrieval**: Once the task completes, the action retrieves the full
    task details, including specific response messages and errors from the target
    gateways.

    6. **Finalization**: The action outputs the execution results and status to the
    Google SecOps case.
