Remove SAM Rule:
  ai_description: >-
    Removes a Suspicious Activity Monitoring (SAM) rule from a Checkpoint Firewall.
    This action allows security administrators to programmatically delete existing
    SAM rules by providing matching criteria such as source/destination IPs, netmasks,
    ports, and protocols. The action constructs a specific `fw sam` command, executes
    it as a script on the target Security Gateway, and waits for the task to complete
    before publishing the changes to the firewall management server.


    ### Flow Description

    1. **Authentication**: Establishes a session with the Checkpoint Management Server
    using provided credentials.

    2. **Criteria Construction**: Validates and formats the provided network parameters
    (IPs, netmasks, etc.) into a valid Checkpoint SAM criteria string.

    3. **Command Generation**: Builds the `fw sam -C` (cancel/remove) command including
    the specified action (Drop/Reject/Notify) and tracking options.

    4. **Execution**: Triggers the `run-script` API on the specified Security Gateway.

    5. **Monitoring**: Polls the task status until completion or timeout.

    6. **Finalization**: Publishes the changes to the database and retrieves execution
    logs/errors.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Security Gateway | String | Yes | The name of the Security Gateway where the
    SAM rule should be removed. |

    | Source IP | String | No | The source IP address used in the original rule. |

    | Source Netmask | String | No | The source netmask used in the original rule.
    |

    | Destination IP | String | No | The destination IP address used in the original
    rule. |

    | Destination Netmask | String | No | The destination netmask used in the original
    rule. |

    | Port | Integer | No | The port number used in the original rule (e.g., 443).
    |

    | Protocol | String | No | The protocol name used in the original rule (e.g.,
    TCP, UDP). |

    | Action for the Matching Connections | String | Yes | The action defined in the
    rule: Notify, Reject, or Drop. |

    | How to Track Matching Connections | String | Yes | The tracking method defined
    in the rule: No Log, Log, or Alert. |

    | Close Connections | Boolean | No | If true, specifies that existing matching
    connections should be closed upon rule removal. |


    ### Additional Notes

    - To successfully remove a rule, the parameters provided must exactly match the
    criteria of the existing rule on the firewall.

    - The action uses the `fw sam` CLI utility via the Checkpoint Web API's `run-script`
    functionality.
