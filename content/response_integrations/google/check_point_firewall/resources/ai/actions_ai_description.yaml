Remove Url From Group:
  ai_description: >-
    Removes URL entities from a specified Application Site Group within a CheckPoint
    Firewall. This action is used to revert blocking or filtering rules by removing
    specific URLs from management groups and then pushing those changes to the firewall
    gateways.


    ### Flow Description

    1. **Authentication**: Connects to the CheckPoint Management Server using provided
    credentials and domain information.

    2. **Entity Filtering**: Identifies all URL entities within the current context.

    3. **Group Validation**: For each URL, it verifies that the target 'URLs Group
    Name' exists and is not marked as read-only.

    4. **Removal**: Executes the removal of the URL from the group members.

    5. **Persistence**: Publishes the session changes to the CheckPoint database.

    6. **Policy Installation**: Triggers an installation of the specified 'Policy
    Name' to ensure the changes are active on the security gateways.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | URLs Group Name | String | Yes | The name of the CheckPoint Application Site
    Group from which the URLs will be removed. |

    | Policy Name | String | Yes | (Configuration Parameter) The name of the policy
    package to be installed on the gateways after the group is updated. |


    ### Additional Notes

    - This action requires the 'Policy Name' to be correctly configured in the integration
    settings to successfully push changes to the gateways.

    - If a URL is not found in the group, the action will report a failure for that
    specific entity but continue processing others.
