Download Log Attachment:
  ai_description: >-
    ### General Description

    The **Download Log Attachment** action retrieves file attachments (such as packet
    captures or forensic blobs) associated with specific log entries from a CheckPoint
    Firewall. It automates the process of requesting the attachment, monitoring the
    asynchronous task on the firewall, and downloading the resulting file to the local
    execution environment. Optionally, it can upload these files directly to the Google
    SecOps case wall for easier access during investigations.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Log IDs** | String | Yes | A comma-separated list of CheckPoint Log IDs from
    which to retrieve attachments. |

    | **Download Folder Path** | String | Yes | The absolute directory path on the
    runner where the downloaded files will be stored. |

    | **Create Case Wall Attachment** | Boolean | No | If enabled, the action will
    upload successfully downloaded files to the case wall, provided they are smaller
    than 3 MB. |


    ### Flow Description

    1. **Authentication**: Connects to the CheckPoint Web API using the configured
    server address and credentials.

    2. **Task Initiation**: For each provided Log ID, the action sends a request to
    the firewall to prepare the attachment. This creates an asynchronous task.

    3. **Status Polling**: The action monitors the progress of each task until it
    reaches a 'succeeded' or 'failed' state.

    4. **Data Retrieval**: For successful tasks, the action retrieves the task details,
    which include the base64-encoded file content.

    5. **Local Storage**: The base64 data is decoded and saved as a physical file
    in the specified **Download Folder Path**.

    6. **Internal Enrichment**: If **Create Case Wall Attachment** is enabled and
    the file size is under the 3 MB limit, the file is uploaded to the Google SecOps
    case wall.


    ### Additional Notes

    - The action handles multiple Log IDs in a single execution.

    - Files are always saved to the local filesystem if the path is valid, regardless
    of whether they are uploaded to the case wall.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      The action can add downloaded files as attachments to the case wall if the 'Create
      Case Wall Attachment' parameter is enabled.
  categories:
