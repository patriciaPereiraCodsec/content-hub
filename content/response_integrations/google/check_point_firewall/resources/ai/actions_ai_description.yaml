Add Ip To Group:
  ai_description: >-
    ### General Description

    Adds IP Address entities to a specified group within the Checkpoint Firewall.
    This action is used to manage network access control by programmatically updating
    firewall groups and ensuring the changes are applied through policy installation.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Blacklist Group Name | String | Yes | The name of the Checkpoint group to which
    the IP addresses will be added. |

    | Policy Name | String | Yes | (Configuration Parameter) The name of the policy
    package that needs to be installed for the changes to take effect. |


    ### Flow Description

    1. **Initialization**: Connects to the Checkpoint Firewall using provided credentials
    and configuration.

    2. **Entity Filtering**: Identifies all `ADDRESS` (IP) entities provided in the
    context.

    3. **Group Validation**: For each IP, it verifies the existence and editability
    of the target group.

    4. **Object Management**: Checks if an address range object exists for the IP.
    If not, it creates a new one.

    5. **Group Update**: Adds the address object to the specified group.

    6. **Persistence**: Publishes the session changes to the Checkpoint database.

    7. **Deployment**: Installs the specified policy package to the firewall to enforce
    the new group membership.


    ### Additional Notes

    - This action performs a "Publish" and "Install Policy" operation, which affects
    the entire firewall configuration for the specified policy package.

    - If the group is marked as read-only in Checkpoint, the action will fail for
    that group.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Adds IP addresses to a specified group in Checkpoint Firewall, creates address
      range objects if they don't exist, publishes the session changes, and installs
      the policy package to make the changes effective.
    fetches_data: true
    internal_data_mutation_explanation: null
