Remove IP From Group:
  ai_description: >-
    Removes IP address entities from a specified group on a Check Point Firewall.
    This action is used for remediation or containment reversal by modifying group
    memberships and applying the changes to the firewall policy.


    ### Flow Description

    1. **Initialization**: Establishes a session with the Check Point Management Server
    using provided credentials and domain information.

    2. **Entity Filtering**: Identifies all `ADDRESS` entities within the current
    context.

    3. **Group Validation**: For each entity, it verifies that the target group exists
    and is not marked as read-only.

    4. **Membership Removal**: Executes a command to remove the IP address from the
    specified group's members.

    5. **Publishing**: Commits the changes to the Check Point database.

    6. **Policy Installation**: Triggers a policy installation for the specified policy
    package to ensure the changes are active on the firewall gateways.


    ### Parameters Description

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Blacklist Group Name | String | Yes | The name of the Check Point group from
    which the IP address should be removed. |

    | Policy Name | String | Yes (Config) | The name of the policy package to be installed
    after the group modification. This is defined in the integration configuration.
    |


    ### Additional Notes

    * The action requires the `Policy Name` to be correctly configured in the integration
    settings to successfully push changes to the gateways.

    * If the group is set to read-only in Check Point, the action will fail for that
    specific group.
