Show Logs:
  ai_description: "### General Description\nThe **Show Logs** action retrieves logs\
    \ or audit records from a CheckPoint Firewall Management Server. It allows security\
    \ analysts to query historical traffic, security events, or administrative changes\
    \ directly from the Google SecOps SOAR platform. The action supports filtering\
    \ by query strings and specific time frames to isolate relevant security data.\n\
    \n### Parameters Description\n| Parameter | Type | Mandatory | Description |\n\
    | :--- | :--- | :--- | :--- |\n| **Query Filter** | String | No | Specifies the\
    \ query filter used to return logs (e.g., 'src:10.0.0.1' or 'action:drop'). |\n\
    | **Time Frame** | Enum | Yes | Defines the time range for log retrieval. Options\
    \ include 'Today', 'Yesterday', 'Last Hour', 'Last 24 Hours', 'Last 30 Days',\
    \ 'This Week', 'This Month', and 'All Time'. |\n| **Log Type** | Enum | Yes |\
    \ Specifies the type of logs to return: 'Log' (traffic/security events) or 'Audit'\
    \ (management/administrative changes). |\n| **Max Logs To Return** | Integer |\
    \ No | Limits the number of logs returned in a single execution. The default is\
    \ 50, and the maximum supported by the CheckPoint API is 100. |\n\n### Flow Description\n\
    1. **Authentication**: The action initializes a session with the CheckPoint Management\
    \ Server using the provided server address, username, password, and optional domain.\n\
    2. **Log Query**: It executes a search request against the CheckPoint `show-logs`\
    \ API endpoint using the provided `Query Filter`, `Time Frame`, and `Log Type`.\n\
    3. **Data Parsing**: The raw API response is parsed into structured `LogResult`\
    \ objects, extracting key fields such as ID, Title, Severity, Subject, and Timestamps.\n\
    4. **Output Generation**: \n    - A data table titled 'Results' is created and\
    \ added to the case wall, containing a CSV-formatted summary of the logs.\n  \
    \  - The full details of the retrieved logs are attached as a JSON result for\
    \ downstream processing.\n5. **Session Termination**: The action explicitly logs\
    \ out of the CheckPoint server to ensure the session is closed securely.\n\n###\
    \ Additional Notes\n- This action is a utility search tool and does not operate\
    \ on specific entities within the case.\n- If no logs match the criteria, the\
    \ action will complete successfully but will not add a data table or JSON results."
