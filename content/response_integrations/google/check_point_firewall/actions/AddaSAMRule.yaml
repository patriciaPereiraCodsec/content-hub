name: Add a SAM Rule
description: Add a SAM (suspicious activity monitoring) rule for Checkpoint Firewall.
    Please refer to the Checkpoint fw_sam command criteria section documentation for
    available ip, netmask, port and protocol combinations - https://sc1.checkpoint.com/documents/R80.40/WebAdminGuides/EN/CP_R80.40_CLI_ReferenceGuide/Content/Topics-CLIG/MDSG/fw-sam.htm
integration_identifier: CheckPointFirewall
parameters:
-   name: Security Gateway to Create SAM Rule on
    default_value: ''
    type: string
    description: Specify the name of Security Gateway to create a rule for.
    is_mandatory: true
-   name: Source IP
    default_value: ''
    type: string
    description: Specify the source IP to be added to the rule.
    is_mandatory: false
-   name: Source Netmask
    default_value: ''
    type: string
    description: Specify the source netmask to be added to the rule.
    is_mandatory: false
-   name: Destination IP
    default_value: ''
    type: string
    description: Specify the destination IP to be added to the rule.
    is_mandatory: false
-   name: Destination Netmask
    default_value: ''
    type: string
    description: Specify the destination netmask to be added to the rule.
    is_mandatory: false
-   name: Port
    default_value: ''
    type: string
    description: Specify the port number to be added to the rule for example, 5005
    is_mandatory: false
-   name: Protocol
    default_value: ''
    type: string
    description: Specify the protocol name to be added to the rule for example, TCP
    is_mandatory: false
-   name: Expiration
    default_value: ''
    type: string
    description: Specify how long in seconds the newly added SAM rule should be active
        for example, 4. If nothing is specified - then the rule never expires.
    is_mandatory: false
-   name: Action for the Matching Connections
    default_value: Drop
    type: ddl
    optional_values:
    - Notify
    - Reject
    - Drop
    description: Specify the action that should be executed for the matching connections.
    is_mandatory: true
-   name: How to Track Matching Connections
    default_value: Log
    type: ddl
    optional_values:
    - No Log
    - Log
    - Alert
    description: Specify how to track matching connections.
    is_mandatory: true
-   name: Close Connections
    default_value: 'false'
    type: boolean
    description: Specify if the existing matching connections should be closed.
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/adda_sam_rule_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
simulation_data_json: '{"Entities":[]}'
