Ping:
  ai_description: "### General Description\nThe **Ping** action is a diagnostic tool\
    \ designed to verify the connectivity between Google SecOps and the APIVoid service.\
    \ It ensures that the provided API credentials and endpoint URL are valid and\
    \ that the network path is open.\n\n### Parameters Description\nThis action does\
    \ not have any action-specific parameters. It relies on the following integration\
    \ configuration parameters:\n\n| Parameter Name | Type | Mandatory | Description\
    \ |\n| :--- | :--- | :--- | :--- |\n| Api Root | String | Yes | The base URL for\
    \ the APIVoid API (e.g., `https://endpoint.apivoid.com`). |\n| Api Key | String\
    \ | Yes | The unique API key used to authenticate requests to APIVoid. |\n| Verify\
    \ SSL | Boolean | No | If enabled, the action will verify the SSL certificate\
    \ of the API endpoint. Default is `False`. |\n\n### Additional Notes\n- This action\
    \ is typically used during the initial setup of the integration or for troubleshooting\
    \ communication issues.\n- As per standard SOAR practices, Ping actions are not\
    \ categorized as enrichment actions.\n\n### Flow Description\n1. **Initialization**:\
    \ The action initializes the Siemplify context and sets the script name.\n2. **Configuration\
    \ Extraction**: It retrieves the `Api Root`, `Api Key`, and `Verify SSL` settings\
    \ from the integration configuration.\n3. **Manager Setup**: An instance of the\
    \ `APIVoidManager` is created using the extracted configuration.\n4. **Connectivity\
    \ Test**: The action calls the `test_connectivity` method, which performs a `GET`\
    \ request to the APIVoid stats endpoint (`/iprep/v1/pay-as-you-go/?stats`).\n\
    5. **Result Handling**: \n    - If the API responds successfully, the action returns\
    \ a success status and a \"Connected successfully\" message.\n    - If an error\
    \ occurs (e.g., 401 Unauthorized, connection timeout), the exception is caught,\
    \ logged, and the action returns a failure status with the error details."
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
  categories:
    enrichment: false
  entity_usage:
    entity_types: []
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: false
    filters_by_identifier: false
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: false
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
