Verify Email:
  ai_description: >-
    ### General Description


    The **Verify Email** action enriches User entities by validating email addresses
    through the APIVoid service. It retrieves comprehensive metadata, including whether
    the email is disposable, the presence of MX and SPF records, and a calculated
    risk score to help analysts identify potentially fraudulent or risky email addresses.


    ### Parameters Description


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Threshold** | Integer | Yes | The risk score threshold. If the email's score
    from APIVoid exceeds this value, the entity is marked as suspicious in Google
    SecOps. Default value is 0. |


    ### Additional Notes


    The action uses a regular expression to validate the email format of the entity
    identifier. If the identifier does not match a standard email pattern (e.g., `user@domain.com`),
    the entity is skipped to avoid unnecessary API calls.


    ### Flow Description


    1. **Entity Filtering**: Identifies and processes only User entities from the
    current context.

    2. **Format Validation**: Uses a regular expression to ensure the entity identifier
    follows a valid email format before querying the API.

    3. **Data Retrieval**: Calls the APIVoid `emailverify` endpoint to fetch reputation
    and technical details for the email.

    4. **Enrichment**: Updates the entity's additional properties with key data points
    such as `suspicious_domain`, `should_block`, `score`, `has_mx_records`, and `has_spf_records`.

    5. **Data Visualization**: Attaches a detailed data table to the entity containing
    the full verification report for quick review in the case wall.

    6. **Risk Assessment**: Compares the retrieved score against the user-defined
    `Threshold`. If the score is higher, the entity is marked as suspicious.

    7. **Entity Update**: Commits all changes and enrichment data back to the Google
    SecOps platform.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entity attributes with enrichment data, sets the 'is_suspicious' flag
      based on the risk score, and attaches data tables to entities.
  categories:
    enrichment: true
  entity_usage:
    entity_types:
    - USERUNIQNAME
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: true
    filters_by_identifier: true
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: false
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
