name: Add IOC Feed
description: Add IOC feed in FireEye CM based on entities. Only MD5 and SHA256 hashes
    are supported.
integration_identifier: FireEyeCM
parameters:
-   name: Action
    default_value: Alert
    type: ddl
    optional_values:
    - Alert
    - Block
    description: Specify what should be the action for the new feed.
    is_mandatory: true
-   name: Comment
    default_value: ''
    type: string
    description: Specify additional comments for the feed.
    is_mandatory: false
-   name: Extract Domain
    default_value: false
    type: boolean
    description: If enabled, action will extract the domain part out of the URL and
        use it to create IOC feed.
    is_mandatory: true
dynamic_results_metadata:
-   result_example_path: resources/add_ioc_feed_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
simulation_data_json: '{"Entities": ["ADDRESS", "DestinationURL", "FILEHASH"]}'
