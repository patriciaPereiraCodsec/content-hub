name: Download Alert Artifacts
description: Download alert artifacts from FireEye CM.
integration_identifier: FireEyeCM
parameters:
-   name: Alert UUID
    default_value: ''
    type: string
    description: Specify the alert uuid from where we need to download artifacts.
    is_mandatory: true
-   name: Download Folder Path
    default_value: ''
    type: string
    description: Specify the absolute path to the folder where the acion should save
        the files.
    is_mandatory: true
-   name: Overwrite
    default_value: true
    type: boolean
    description: If enabled, action will overwrite the existing file with the same
        path.
    is_mandatory: true
dynamic_results_metadata:
-   result_example_path: resources/download_alert_artifacts_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
