[project]
name = "FireEyeCM"
version = "15.0"
description = "FireEye Central Management (CM series) consolidates the administration, reporting and data sharing of the FireEye products in one easy-to-deploy, network-based solution. Central Management enables real-time sharing of autogenerated threat intelligence to identify and block advanced attacks targeting your organization. It also enables centralized configuration, management and reporting of FireEye solutions."
requires-python = ">=3.11,<3.12"
dependencies = [ "defusedxml==0.7.1", "environmentcommon", "requests==2.32.4", "tipcommon",]

[dependency-groups]
dev = [ "pytest>=9.0.3", "pytest-json-report>=1.5.0", "soar-sdk",]

[tool.uv]
[[tool.uv.index]]
url = "https://pypi.org/simple"
default = true

[tool.uv.sources.tipcommon]
path = "../../../../packages/tipcommon/whls/TIPCommon-1.0.12-py2.py3-none-any.whl"

[tool.uv.sources.environmentcommon]
path = "../../../../packages/envcommon/whls/EnvironmentCommon-1.0.1-py2.py3-none-any.whl"

[tool.uv.sources.soar-sdk]
git = "https://github.com/chronicle/soar-sdk.git"
