Release Quarantined Email:
  ai_description: >-
    ### General Description

    Releases a quarantined email from a FireEye EX appliance via FireEye CM. This
    action is used to restore emails that were incorrectly flagged or quarantined
    for investigation, allowing them to proceed to their destination.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Queue ID | String | Yes | The unique identifier of the email in the quarantine
    queue that needs to be released. |

    | Sensor Name | String | No | The name of the FireEye EX sensor where the email
    is quarantined. If not provided, the action will attempt to automatically find
    a suitable 'eMPS' (FireEye EX) sensor managed by the FireEye CM. |


    ### Flow Description

    1. **Authentication**: Connects to FireEye CM using the configured API Root, Username,
    and Password to obtain an authentication token.

    2. **Sensor Identification**: If a `Sensor Name` is provided, the action verifies
    its existence on the FireEye CM. If no sensor name is provided, the action queries
    the system configuration to find all available 'eMPS' (FireEye EX) appliances
    and selects the first one found.

    3. **Email Release**: Sends a POST request to the FireEye CM API to release the
    email associated with the specified `Queue ID` from the identified sensor.

    4. **Cleanup**: Logs out of the FireEye CM session to ensure the security token
    is invalidated.


    ### Additional Notes

    - This action requires a FireEye EX appliance to be properly connected to and
    managed by the FireEye CM instance.

    - If multiple FireEye EX sensors are available and no `Sensor Name` is specified,
    the action will default to the first one returned by the API.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Releases a quarantined email from the FireEye EX appliance, which changes the
      state of the email in the external system from quarantined to released.
    fetches_data: false
    internal_data_mutation_explanation: null
