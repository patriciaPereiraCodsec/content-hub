Ping:
  ai_description: "### General Description\nThe **Ping** action is a diagnostic utility\
    \ designed to verify the connectivity between Google SecOps and a FireEye CM (Central\
    \ Management) instance. Its primary purpose is to ensure that the integration\
    \ configuration parameters\u2014such as the API Root, credentials, and SSL settings\u2014\
    are correct and that the FireEye CM server is reachable and responding to API\
    \ requests.\n\n### Parameters Description\nThis action does not take any dynamic\
    \ input parameters during execution. Instead, it relies entirely on the **Integration\
    \ Configuration** parameters defined in the Google SecOps Marketplace:\n\n| Parameter\
    \ | Type | Mandatory | Description |\n| :--- | :--- | :--- | :--- |\n| API Root\
    \ | String | Yes | The base URL of the FireEye CM instance (e.g., `https://<fireeye-cm-ip>/`).\
    \ |\n| Username | String | Yes | The username used for authentication. |\n| Password\
    \ | String | Yes | The password used for authentication. |\n| Verify SSL | Boolean\
    \ | Yes | If enabled, the action will verify the SSL certificate of the FireEye\
    \ CM server. |\n\n### Flow Description\n1. **Parameter Extraction:** The script\
    \ retrieves the connection details (API Root, Username, Password, and SSL verification\
    \ setting) from the integration's configuration.\n2. **Manager Initialization:**\
    \ It initializes the `FireEyeCMManager`. During this process, the manager performs\
    \ an authentication request (`POST /wsapis/v2.0.0/auth/login`) to obtain a session\
    \ token (`X-FeApi-Token`).\n3. **Connectivity Test:** The action calls the `test_connectivity`\
    \ method, which sends a `GET` request to the FireEye CM health endpoint (`/wsapis/v2.0.0/health/system`).\n\
    4. **Result Handling:** \n    * If the request is successful (HTTP 200), the action\
    \ returns a success message and sets the execution state to `COMPLETED`.\n   \
    \ * If an exception occurs (e.g., authentication failure, network timeout, or\
    \ invalid API Root), the action captures the error, logs it, and sets the execution\
    \ state to `FAILED`.\n5. **Termination:** The script ends by providing the connection\
    \ status and a descriptive message to the Google SecOps workbench."
