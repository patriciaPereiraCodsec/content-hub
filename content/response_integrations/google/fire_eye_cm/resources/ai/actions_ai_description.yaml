Download Alert Artifacts:
  ai_description: >-
    ### General Description

    Downloads malware artifact data associated with a specific alert from FireEye
    CM as a ZIP file. This action is used to retrieve forensic evidence or samples
    collected by FireEye appliances for further analysis or archiving outside of the
    FireEye platform.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Alert UUID | String | Yes | The unique identifier (UUID) of the alert in FireEye
    CM from which to download artifacts. |

    | Download Folder Path | String | Yes | The absolute local directory path on the
    execution runner where the downloaded ZIP file should be saved. |

    | Overwrite | Boolean | Yes | If set to `True`, the action will replace any existing
    file at the destination path. If `False`, the action will fail if a file already
    exists. |


    ### Additional Notes

    - The action saves the file locally on the SOAR runner's filesystem. The resulting
    JSON output contains the `file_path` to the saved artifact.

    - The filename is automatically generated in the format: `Alert_Artifacts_{Alert_UUID}.zip`.


    ### Flow Description

    1. **Authentication**: The action authenticates with the FireEye CM API using
    the provided credentials to obtain a security token.

    2. **Path Validation**: It constructs the target file path and verifies that the
    destination folder exists and is a directory. It also checks the `Overwrite` logic
    against existing files.

    3. **Data Retrieval**: It sends a GET request to the FireEye CM artifacts endpoint
    for the specified `Alert UUID` with the `Accept` header set to `application/octet-stream`.

    4. **File Persistence**: The binary stream from the API response is written to
    the local filesystem in chunks.

    5. **Result Reporting**: Upon success, it returns the absolute path of the saved
    file and marks the action as successful.
