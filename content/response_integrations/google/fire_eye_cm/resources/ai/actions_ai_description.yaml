List Quarantined Emails:
  ai_description: >-
    ### General Description

    The **List Quarantined Emails** action retrieves a list of emails currently held
    in quarantine on a FireEye CM (Central Management) instance. This action is specifically
    designed for environments where FireEye EX appliances are managed via a FireEye
    CM. It allows security analysts to search and filter quarantined messages based
    on timeframes, senders, and subjects to identify potentially malicious or false-positive
    email detections.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Start Time | String | No | If specified, only emails created after this time
    will be returned. Format: YYYY-MM-DD'T'HH:MM:SS.SSS-HHMM. |

    | End Time | String | No | If specified, only emails created before this time
    will be returned. Format: YYYY-MM-DD'T'HH:MM:SS.SSS-HHMM. |

    | Sender Filter | String | No | Filters the results to only include quarantined
    emails from this specific sender address. |

    | Subject Filter | String | No | Filters the results to only include quarantined
    emails containing this specific subject line. |

    | Max Emails To Return | Integer | No | Specifies the maximum number of email
    records to retrieve. The value is capped between 1 and 10,000 (FireEye CM limit).
    Default is 50. |


    ### Additional Notes

    * If neither **Start Time** nor **End Time** is provided, the action defaults
    to retrieving quarantined emails from the last 24 hours.

    * This action does not require or process specific entities (like IPs or Hashes)
    from the SecOps environment; it performs a global search based on the provided
    parameters.


    ### Flow Description

    1. **Initialization**: The action extracts integration configuration (API Root,
    Credentials) and user-provided filter parameters.

    2. **Validation**: It validates the `Max Emails To Return` parameter, ensuring
    it stays within the API's supported range (1 to 10,000).

    3. **API Interaction**: The action establishes a session with FireEye CM and sends
    a GET request to the quarantine endpoint with the specified filters (time, sender,
    subject, and limit).

    4. **Data Processing**: The retrieved email metadata (including UUIDs, Queue IDs,
    Message IDs, and timestamps) is parsed into a structured format.

    5. **Output**: The results are added to the action's execution context as a JSON
    result and a formatted data table for the Case Wall.

    6. **Cleanup**: The action explicitly logs out of the FireEye CM session to ensure
    security and resource management.
  capabilities:
