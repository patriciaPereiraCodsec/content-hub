Add Rule To Custom Rules File:
  ai_description: >-
    Adds a new Snort rule to the custom rules file on a FireEye CM appliance. This
    action specifically targets FireEye NX (wMPS) sensors. It works by creating a
    new ruleset that includes the user-provided rule and the existing rules downloaded
    from the appliance, then uploading the updated file back to the system.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Rule | String | Yes | The specific Snort rule string that needs to be added
    to the custom rules file. |

    | Sensor Name | String | No | The name of the sensor where the rule should be
    added. If not specified, the action will automatically discover and use the first
    available FireEye NX (wMPS) appliance. |


    ### Flow Description

    1. **Sensor Identification**: The action identifies the target sensor. If a 'Sensor
    Name' is provided, it validates its existence. If not, it searches for available
    FireEye NX (wMPS) appliances and selects the first one.

    2. **Local Preparation**: A temporary local file is created containing the new
    rule provided in the parameters.

    3. **Data Retrieval**: The action downloads the current custom Snort rules file
    from the identified sensor.

    4. **Merging**: The content of the existing rules file is appended to the temporary
    local file containing the new rule.

    5. **Update**: The combined rules file is uploaded back to the FireEye CM appliance,
    effectively updating the custom ruleset.

    6. **Cleanup**: The temporary local file is deleted, and the session with FireEye
    CM is closed.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Updates the custom Snort rules configuration on the FireEye CM appliance by
      uploading a modified rules file.
    fetches_data: true
    internal_data_mutation_explanation: null
