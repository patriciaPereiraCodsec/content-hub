Add IOC Feed:
  ai_description: >-
    ### General Description

    This action adds Indicators of Compromise (IOC) feeds to FireEye CM based on entities
    present in the current Google SecOps case. It supports IP addresses, URLs, and
    File Hashes (specifically MD5 and SHA256). The action allows users to define the
    response behavior (Alert or Block) for the newly created feeds and provides an
    option to extract domains from URL entities for broader coverage.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Action | String | Yes | Specifies the action FireEye CM should take when the
    IOC is matched. Options are 'Alert' or 'Block'. |

    | Comment | String | No | Allows adding a descriptive comment or note to the IOC
    feed for better context. |

    | Extract Domain | Boolean | Yes | If set to true, the action will extract the
    domain portion of a URL entity and use it to create the IOC feed instead of the
    full URL. |


    ### Additional Notes

    - **Hash Support:** Only MD5 and SHA256 file hashes are supported. Providing other
    hash types will result in a failure for that specific entity.

    - **Feed Naming:** The action automatically generates a unique feed name by base64
    encoding the entity identifier and prefixing it with 'Siemplify_'.


    ### Flow Description

    1. **Entity Filtering:** The action identifies all supported entities (ADDRESS,
    URL, FILEHASH) from the target entities list.

    2. **Parameter Extraction:** It retrieves the integration configuration (API Root,
    credentials) and action parameters (Action type, Comment, Domain Extraction flag).

    3. **Identifier Preparation:** For each entity, it determines the identifier to
    be used. If 'Extract Domain' is enabled for a URL, it parses the URL to extract
    the host/domain.

    4. **File Creation:** The action creates a temporary text file containing the
    entity identifier, which is a requirement for the FireEye CM feed upload API.

    5. **API Interaction:** It performs a POST request to the FireEye CM 'add_ioc_feed'
    endpoint, uploading the identifier file along with metadata like the feed name,
    action, and comments.

    6. **Result Reporting:** The action collects the names of all successfully created
    feeds and reports them in the final output message and JSON results.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Creates new custom IOC feeds in the FireEye CM instance based on the provided
      entities.
    fetches_data: false
    internal_data_mutation_explanation: null
  categories:
    enrichment: false
  entity_usage:
