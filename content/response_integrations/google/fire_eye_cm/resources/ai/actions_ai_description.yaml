Download Quarantined Email:
  ai_description: >-
    ### General Description

    Downloads a quarantined email from a FireEye EX appliance via the FireEye CM (Central
    Management) platform. This action retrieves the raw email content associated with
    a specific Queue ID and saves it as an `.eml` file to a designated local directory
    on the execution environment.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Queue ID | String | Yes | The unique identifier of the quarantined email to
    be downloaded. |

    | Download Folder Path | String | Yes | The absolute local path on the runner
    where the downloaded email file will be saved. |

    | Overwrite | Boolean | Yes | If set to `True`, the action will replace any existing
    file at the target path. If `False` and the file exists, the action will fail.
    |

    | Sensor Name | String | No | The name of the specific FireEye EX sensor where
    the email is quarantined. If not provided, the action will automatically attempt
    to find and use the first available EX appliance. |


    ### Additional Notes

    * This action requires a FireEye EX appliance to be connected to the FireEye CM
    instance.

    * The action performs local filesystem checks to ensure the download directory
    exists and is writable before attempting the API call.


    ### Flow Description

    1. **Initialization**: The action extracts integration credentials and user-provided
    parameters (Queue ID, Path, Overwrite, and Sensor Name).

    2. **Environment Validation**: It verifies that the provided `Download Folder
    Path` exists and is a directory. It also checks for file existence if `Overwrite`
    is disabled.

    3. **Sensor Identification**: If a `Sensor Name` is provided, it validates its
    existence. If not, it queries FireEye CM for available `eMPS` (FireEye EX) appliances
    and selects the first one found.

    4. **Data Retrieval**: It makes a request to the FireEye CM API to download the
    quarantined email content for the specified Queue ID from the identified sensor.

    5. **File Persistence**: The retrieved content is saved to the local filesystem
    at the specified path using the filename format `Quarantined_email_{queue_id}.eml`.

    6. **Completion**: The action returns the absolute file path of the saved email
    in the JSON results.
