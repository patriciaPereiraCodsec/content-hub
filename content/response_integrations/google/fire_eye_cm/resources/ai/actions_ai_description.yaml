Delete Quarantined Email:
  ai_description: >-
    Deletes a quarantined email from a FireEye EX appliance via the FireEye CM (Central
    Management) platform. This action is used to permanently remove malicious or unwanted
    emails that have been held in quarantine.


    ### Flow Description:

    1. **Authentication**: Connects to the FireEye CM API using provided credentials
    and obtains a security token.

    2. **Sensor Identification**: If a 'Sensor Name' is provided, the action validates
    its existence. If not provided, it automatically searches for and selects the
    first available 'FireEye EX' (eMPS) appliance managed by the CM.

    3. **Deletion Request**: Sends a POST request to the FireEye CM email management
    endpoint to delete the email associated with the specified 'Queue ID' on the identified
    sensor.

    4. **Verification**: Validates the API response to ensure the email was successfully
    removed from the quarantine queue.

    5. **Cleanup**: Logs out of the FireEye CM session.


    ### Parameters Description:

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Queue ID | String | Yes | The unique identifier of the email in the quarantine
    queue that needs to be deleted. |

    | Sensor Name | String | No | The specific name of the FireEye EX sensor where
    the email is quarantined. If left blank, the action will attempt to auto-discover
    a suitable sensor. |


    ### Additional Notes:

    * This action requires the FireEye EX appliance to be properly integrated and
    reachable through the FireEye CM instance.

    * If multiple EX sensors are connected and no 'Sensor Name' is specified, the
    action defaults to the first one returned by the API.
