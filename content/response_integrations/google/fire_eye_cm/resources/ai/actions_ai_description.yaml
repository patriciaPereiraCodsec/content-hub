Delete IOC Feed:
  ai_description: >-
    Deletes a specific custom Indicator of Compromise (IOC) feed from a FireEye CM
    (Central Management) appliance. This action is used to manage threat intelligence
    feeds by removing outdated or unnecessary IOC collections.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Feed Name | String | Yes | The exact name of the IOC feed that should be deleted
    from the FireEye CM system. |


    ### Flow Description

    1. **Initialization**: Retrieves connection details (API Root, credentials) and
    the target feed name from the action parameters.

    2. **Pre-check**: Queries the FireEye CM API to list all existing IOC feeds and
    verifies if the specified 'Feed Name' exists. If not found, the action terminates
    with a 'Not Found' status.

    3. **Deletion**: Executes a POST request to the FireEye CM deletion endpoint for
    the specified feed.

    4. **Verification**: Performs a follow-up query to list IOC feeds again, confirming
    that the target feed is no longer present in the system to ensure the operation
    was successful.

    5. **Cleanup**: Logs out of the FireEye CM session.
