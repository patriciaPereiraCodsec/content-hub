name: Devo Alerts Connector
parameters:
-   name: DeviceProductField
    default_value: Product Name
    type: string
    description: Describes the name of the field where the product name is stored.
    is_mandatory: true
    is_advanced: false
    mode: regular
-   name: EventClassId
    default_value: context
    type: string
    description: Describes the name of the field where the event name is stored
    is_mandatory: false
    is_advanced: false
    mode: regular
-   name: Environment Field Name
    default_value: ''
    type: string
    description: Describes the name of the field where the environment name is stored.
        If environment field isn't found, environment is ""
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Environment Regex Pattern
    default_value: .*
    type: string
    description: A regex pattern to run on the value found in the "Environment Field
        Name" field.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: API Root
    default_value: https://apiv2-us.devo.com
    type: string
    description: Specify API URL for the target Devo instance.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: API Token
    type: password
    description: If token-based authentication is used, sSpecify API token for the
        target Devo instance.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: API Key
    type: password
    description: If access keys authentication is used, specify API key for the target
        Devo instance.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: API Secret
    type: password
    description: If access keys authentication is used, specify API secret for the
        target Devo instance.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Verify SSL
    default_value: false
    type: boolean
    description: If enabled, Siemplify server will check the certificate configured
        for API root.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Offset time in hours
    default_value: 24
    type: integer
    description: Number of hours before the first connector iteration to retrieve
        alerts from. This parameter applies to the initial connector iteration after
        you enable the connector for the first time, or used as a fallback value in
        cases where connector's last run timestamp expires.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Max Alerts Per Cycle
    default_value: 30
    type: integer
    description: How many alerts should be processed during one connector run.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Minimum Priority to Fetch
    default_value: Normal
    type: string
    description: 'Minimum priority of the alert to be ingested to Siemplify, for example,
        Low or Medium. Possible values: Very low, Low, Normal, High, Very high.'
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: PythonProcessTimeout
    default_value: '300'
    type: string
    description: The timeout limit (in seconds) for the python process running current
        script
    is_mandatory: true
    is_advanced: false
    mode: regular
-   name: Use whitelist as a blacklist
    default_value: false
    type: boolean
    description: If enabled, whitelist will be used as a blacklist.
    is_mandatory: true
    is_advanced: false
    mode: script
description: Connector can be used to fetch alert records from Devo siem.logtrust.alert.info
    table. Connector whitelist can be used to ingest only specific types of alerts
    based on alert context value.
integration: Devo
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/devo#devo-alerts-connector
rules: []
is_connector_rules_supported: false
creator: admin
