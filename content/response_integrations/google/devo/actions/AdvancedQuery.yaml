name: Advanced Query
description: Execute an advanced query based on the provided parameters. Note that
    action is not working on Siemplify entities. If its planned to query table other
    than siem.logtrust.alert.info, please create an additional token for that table
    following the documentation at https://docs.devo.com/confluence/ndt/latest/domain-administration/security-credentials/authentication-tokens
    and specify it on the integration configuration page.
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/devo#advanced_query
integration_identifier: Devo
parameters:
-   name: Query
    default_value: ''
    type: string
    description: 'Specify a query to execute against Devo instance. Example format:
        ''from siem.logtrust.alert.info''.'
    is_mandatory: true
-   name: Time Frame
    default_value: Last Hour
    type: ddl
    optional_values:
    - Last Hour
    - Last 6 Hours
    - Last 12 Hours
    - Last 24 Hours
    - Last Week
    - Last Month
    - Custom
    description: Specify a time frame for the results. If 'Custom' is selected, you
        also need to provide 'Start Time'.
    is_mandatory: false
-   name: Start Time
    default_value: ''
    type: string
    description: Specify a time frame for the results. If 'Custom' is selected, you
        also need to provide 'Start Time'.
    is_mandatory: false
-   name: End Time
    default_value: ''
    type: string
    description: 'Specify the start time for the query. This parameter is mandatory,
        if ''Custom'' is selected for the ''Time Frame'' parameter. Format: ISO 8601.
        Example: 2021-08-05T05:18:42Z'
    is_mandatory: false
-   name: Max rows to return
    default_value: 50
    type: string
    description: Specify max number of rows the action should return.
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/advanced_query_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: Admin
simulation_data_json: '{"Entities":[]}'
