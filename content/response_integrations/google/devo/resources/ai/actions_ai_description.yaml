Advanced Query:
  ai_description: >-
    ### General Description

    This action executes an advanced query against a Devo instance to retrieve log
    or alert data. It allows users to specify a custom query string, define a time
    range (either predefined or custom), and limit the number of results returned.
    The action is designed for general data retrieval and does not operate on specific
    SecOps entities.


    ### Parameters Description


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Query | String | Yes | The Devo query to execute. Example: 'from siem.logtrust.alert.info'.
    |

    | Time Frame | Enum | No | The time range for the query results. Options include
    'Last Hour', 'Last 6 Hours', 'Last 12 Hours', 'Last 24 Hours', 'Last Week', 'Last
    Month', or 'Custom'. Default is 'Last Hour'. |

    | Start Time | String | No | The start time for the query in ISO 8601 format (e.g.,
    2021-08-05T05:18:42Z). This is mandatory if 'Time Frame' is set to 'Custom'. |

    | End Time | String | No | The end time for the query in ISO 8601 format. |

    | Max rows to return | Integer | No | The maximum number of rows the action should
    return. Default is 50. |


    ### Additional Notes

    - If 'Custom' is selected for the 'Time Frame' parameter, the 'Start Time' parameter
    must be provided.

    - The action requires valid Devo credentials (API URL and either an API Token
    or an API Key/Secret pair) configured in the integration settings.


    ### Flow Description

    1. **Parameter Extraction:** The action retrieves the query string, time frame
    settings, and result limits from the input parameters.

    2. **Time Range Calculation:** It calculates the start and end timestamps. If
    a predefined time frame is used, it maps it to a relative duration; if 'Custom'
    is used, it parses the provided ISO 8601 strings.

    3. **Manager Initialization:** It initializes the DevoManager using the provided
    API credentials and connection settings.

    4. **Query Execution:** The action sends a POST request to the Devo API's search
    endpoint with the query parameters and JSON mode enabled.

    5. **Data Processing:** It parses the JSON response from Devo into structured
    data models.

    6. **Output Generation:** If results are found, the action adds the raw JSON to
    the result object and constructs a CSV data table for display in the SecOps case
    wall.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
  categories:
