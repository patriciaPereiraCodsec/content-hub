Ping:
  ai_description: >-
    ### General Description

    The **Ping** action is designed to verify the connectivity between Google SecOps
    and a Devo instance. It ensures that the provided configuration parameters, such
    as the API URL and authentication credentials (API Token or API Key/Secret pair),
    are valid and that the network path is open. This action is typically used during
    the initial setup of the Devo integration or for troubleshooting connection issues.


    ### Parameters Description

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **API URL** | String | Yes | The base URL of the Devo instance API. |

    | **API Token** | String | No | The authentication token used for Bearer authentication.
    If not provided, the action will attempt to use the API Key and Secret. |

    | **API Key** | String | No | The API Key used for HMAC-based authentication.
    |

    | **API Secret** | String | No | The API Secret used for HMAC-based authentication.
    |

    | **Verify SSL** | Boolean | Yes | If enabled, the action will verify the SSL
    certificate of the Devo instance. Default is True. |


    ### Additional Notes

    - The action requires either a valid **API Token** or a combination of **API Key**
    and **API Secret** to authenticate successfully.

    - This action does not process any entities and is strictly for system-to-system
    connectivity testing.


    ### Flow Description

    1. **Parameter Extraction**: The action retrieves the connection details (URL,
    credentials, SSL settings) from the integration configuration.

    2. **Manager Initialization**: It initializes the `DevoManager` with the provided
    settings.

    3. **Connectivity Test**: The manager executes a lightweight test query (`from
    siem.logtrust.alert.info`) against the Devo API to confirm the service is reachable
    and the credentials are valid.

    4. **Result Reporting**: If the query returns a valid response, the action completes
    successfully. If an error occurs (e.g., 401 Unauthorized, 404 Not Found, or connection
    timeout), the action fails and reports the specific error message.
