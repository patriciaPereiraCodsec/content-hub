Simple Query:
  ai_description: >-
    ### General Description

    This action executes a simple query against a specified Devo table to retrieve
    logs or alert data. It allows users to define specific fields to return, apply
    filtering logic via a WHERE clause, and constrain the results within a specific
    time frame. The results are returned as a JSON object and a formatted data table
    within the Google SecOps case.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Table Name** | String | Yes | The Devo table to be queried (e.g., `siem.logtrust.alert.info`).
    |

    | **Fields To Return** | String | No | Comma-separated list of fields to include
    in the results. If empty, all fields are returned. |

    | **Where Filter** | String | No | The SQL-like WHERE filter to apply to the query
    (e.g., `priority > 5.0`). |

    | **Time Frame** | Enum | No | Predefined time range for the query (e.g., Last
    Hour, Last 24 Hours). Default is 'Last Hour'. |

    | **Start Time** | String | No | ISO 8601 formatted start time. **Mandatory**
    if 'Time Frame' is set to 'Custom'. |

    | **End Time** | String | No | ISO 8601 formatted end time. Used when 'Time Frame'
    is set to 'Custom'. |

    | **Max rows to return** | Integer | No | The maximum number of records to retrieve.
    Default is 50. |


    ### Additional Notes

    - This action **does not** operate on Google SecOps entities. It is a standalone
    query tool.

    - If querying tables other than the default alert table, ensure the integration
    configuration includes the appropriate authentication tokens for those tables.

    - When using the 'Custom' time frame, the 'Start Time' must be provided in ISO
    8601 format (e.g., `2021-08-05T05:18:42Z`).


    ### Flow Description

    1. **Parameter Extraction:** The action retrieves the table name, filters, time
    frame, and row limits from the input.

    2. **Time Validation:** If a custom time frame is selected, it validates and parses
    the start and end timestamps.

    3. **Query Construction:** It builds a Devo-compliant query string by combining
    the table name, selected fields, and the WHERE filter.

    4. **API Execution:** The action sends a POST request to the Devo Query API endpoint
    (`/search/query`) using the constructed query and time parameters.

    5. **Data Processing:** If results are found, they are parsed into a structured
    format.

    6. **Output Generation:** The action populates the `add_result_json` with the
    raw data and creates a `Simple Query Results` data table (CSV) for the case wall.
