name: Search Log Events
description: Search log events in AWS CloudWatch.
integration_identifier: AWSCloudWatch
parameters:
-   name: Log Group
    default_value: ''
    type: string
    description: Specify the name of the log group, where you want to search for events.
    is_mandatory: true
-   name: Log Streams
    default_value: ''
    type: string
    description: Specify a comma-separated list of log streams, where you want to
        search for events.
    is_mandatory: false
-   name: Time Frame
    default_value: Last Hour
    type: ddl
    optional_values:
    - Last Hour
    - Last 6 Hours
    - Last 24 Hours
    - Last Week
    - Last Month
    - Custom
    description: Specify a time frame for the search. If “Custom” is selected, you
        also need to provide “Start Time”.
    is_mandatory: false
-   name: Start Time
    default_value: ''
    type: string
    description: 'Specify the start time for the search. This parameter is mandatory,
        if “Custom” is selected for the “Time Frame” parameter. Format: ISO 8601'
    is_mandatory: false
-   name: End Time
    default_value: ''
    type: string
    description: 'Specify the end time for the search. Format: ISO 8601. If nothing
        is provided and “Custom” is selected for the “Time Frame” parameter then this
        parameter will use current time.'
    is_mandatory: false
-   name: Custom Filter
    default_value: ''
    type: string
    description: Specify the custom filter for the search. For additional information
        please refer to the documentation portal.
    is_mandatory: false
-   name: Max Events To Return
    default_value: 50
    type: string
    description: 'Specify how many events to return. Default: 50.'
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/search_log_events_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: Admin
simulation_data_json: '{"Entities":[]}'
