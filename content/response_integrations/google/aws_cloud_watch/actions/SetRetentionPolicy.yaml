name: Set Retention Policy
description: Set the retention policy for log groups in AWS CloudWatch.
integration_identifier: AWSCloudWatch
parameters:
-   name: Log Group
    default_value: ''
    type: string
    description: Specify the name of the log group for which you want to set the retention
        policy.
    is_mandatory: true
-   name: Retention Days
    default_value: '1'
    type: ddl
    optional_values:
    - '1'
    - '3'
    - '5'
    - '7'
    - '14'
    - '30'
    - '60'
    - '90'
    - '120'
    - '150'
    - '180'
    - '365'
    - '400'
    - '545'
    - '731'
    - '1827'
    - '3653'
    description: Specify for how many days the data should be retained in the log
        group.
    is_mandatory: true
dynamic_results_metadata: []
creator: Admin
simulation_data_json: '{"Entities":[]}'
