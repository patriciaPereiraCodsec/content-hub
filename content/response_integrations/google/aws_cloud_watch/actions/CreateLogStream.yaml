name: Create Log Stream
description: Create a log stream for the log group in AWS CloudWatch.
integration_identifier: AWSCloudWatch
parameters:
-   name: Log Group
    default_value: ''
    type: string
    description: Specify the name of the log group, where you want to create a log
        stream.
    is_mandatory: true
-   name: Log Stream Name
    default_value: ''
    type: string
    description: Specify the name for the new log stream.
    is_mandatory: true
dynamic_results_metadata:
-   result_example_path: resources/create_log_stream_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: Admin
simulation_data_json: '{"Entities":[]}'
