Search Log Events:
  ai_description: >-
    ### General Description

    The **Search Log Events** action enables users to query and retrieve log data
    from AWS CloudWatch. It allows for targeted searches within specific log groups
    and provides options to filter by log streams, time ranges, and custom AWS filter
    patterns. The results are returned as structured JSON and a data table for further
    analysis within the SOAR platform.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Log Group** | String | Yes | The name of the AWS CloudWatch log group where
    the search will be performed. |

    | **Log Streams** | String | No | A comma-separated list of specific log streams
    to search within the group. If empty, all streams are searched. |

    | **Time Frame** | Dropdown | No | Predefined search windows (e.g., Last Hour,
    Last 24 Hours, Last Week). Set to 'Custom' to use specific start and end times.
    |

    | **Start Time** | String | No | The start time for the search in ISO 8601 format
    (e.g., 2023-01-01T00:00:00Z). **Mandatory** if 'Time Frame' is set to 'Custom'.
    |

    | **End Time** | String | No | The end time for the search in ISO 8601 format.
    If 'Time Frame' is 'Custom' and this is left empty, the current time is used.
    |

    | **Custom Filter** | String | No | An AWS CloudWatch filter pattern used to match
    specific log events. |

    | **Max Events To Return** | Integer | No | The maximum number of log events to
    retrieve. Default is 50. Must be at least 1. |


    ### Additional Notes

    - Either a predefined 'Time Frame' must be selected, or 'Custom' must be chosen
    along with a valid 'Start Time'.

    - The action uses the AWS `filter_log_events` API, which supports pagination to
    handle large result sets up to the specified limit.


    ### Flow Description

    1. **Initialization**: Authenticates with AWS using the provided Access Key, Secret
    Key, and Region.

    2. **Parameter Extraction**: Retrieves search criteria, including the log group
    name, optional stream list, and filter patterns.

    3. **Time Range Calculation**: Converts the selected time frame or custom ISO
    8601 strings into Unix timestamps (milliseconds) required by the AWS API.

    4. **Search Execution**: Executes the search against AWS CloudWatch logs using
    the `filter_log_events` paginator.

    5. **Result Processing**: Aggregates the retrieved log events, converts them into
    JSON format, and constructs a 'Search Results' data table for the case wall.
