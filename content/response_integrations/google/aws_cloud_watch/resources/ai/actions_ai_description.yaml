Create Log Stream:
  ai_description: >-
    ### General Description

    Creates a new log stream within a specified AWS CloudWatch log group. This action
    is used to organize and manage log events by creating a dedicated stream container
    under an existing log group in the AWS environment.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Log Group | String | Yes | Specify the name of the log group where the new log
    stream should be created. |

    | Log Stream Name | String | Yes | Specify the unique name for the new log stream
    to be created. |


    ### Flow Description

    1. **Initialization**: The action retrieves AWS credentials (Access Key, Secret
    Key, and Region) from the integration configuration.

    2. **Parameter Extraction**: It extracts the target 'Log Group' name and the desired
    'Log Stream Name' from the action parameters.

    3. **AWS Connection**: Initializes the AWS CloudWatch Manager using the provided
    credentials to establish a connection with the AWS logs service.

    4. **Execution**: Calls the AWS API to create the log stream within the specified
    log group.

    5. **Result Handling**: If successful, it returns a success status and provides
    the log stream name in the result JSON. If the operation fails (e.g., log group
    doesn't exist or stream already exists), it captures the error and reports a failure.
