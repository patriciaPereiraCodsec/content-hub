Remove Retention Policy:
  ai_description: >-
    Removes the retention policy from a specified AWS CloudWatch log group. When a
    retention policy is removed, the log events in the log group are retained indefinitely
    by default. This action is useful for ensuring that logs are not automatically
    deleted during an investigation or for compliance reasons.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Log Group | String | Yes | The name of the AWS CloudWatch log group from which
    the retention policy will be removed. |


    ### Flow Description

    1. **Initialization**: The action retrieves AWS credentials (Access Key, Secret
    Key) and the target region from the integration configuration.

    2. **Parameter Extraction**: The action extracts the 'Log Group' name provided
    by the user.

    3. **AWS Connection**: It establishes a connection to the AWS CloudWatch Logs
    service using the Boto3 library.

    4. **Policy Removal**: The action calls the `delete_retention_policy` API for
    the specified log group.

    5. **Completion**: If the API call is successful, the action completes with a
    success message; otherwise, it logs the error and fails.
