Delete Log Group:
  ai_description: "### General Description\nThe **Delete Log Group** action is designed\
    \ to permanently remove a specific log group from AWS CloudWatch. This is a destructive\
    \ operation that deletes the log group along with all its associated log streams\
    \ and archived log events. It is typically used for resource cleanup or managing\
    \ log retention manually within a workflow.\n\n### Parameters Description\n| Parameter\
    \ | Type | Mandatory | Description |\n| :--- | :--- | :--- | :--- |\n| **Log Group\
    \ Name** | String | Yes | The exact name of the AWS CloudWatch log group that\
    \ you intend to delete. |\n\n### Additional Notes\n- This action does not operate\
    \ on Google SecOps entities; it requires the manual input of the log group name.\n\
    - If the specified log group is not found, the action will complete with a 'False'\
    \ result but will not fail the execution, providing a clear message that the resource\
    \ was missing.\n\n### Flow Description\n1. **Initialization**: The action retrieves\
    \ AWS credentials (Access Key, Secret Key) and the target region from the integration\
    \ configuration.\n2. **Parameter Extraction**: It extracts the mandatory `Log\
    \ Group Name` provided by the user.\n3. **AWS Interaction**: It connects to the\
    \ AWS CloudWatch service using the Boto3 library and invokes the `delete_log_group`\
    \ method.\n4. **Error Handling**: \n    - If the log group is successfully deleted,\
    \ the action returns a success status.\n    - If the log group does not exist,\
    \ it catches a `ResourceNotFoundException` and reports that the group was not\
    \ found.\n    - For other API or connection errors, the action fails with a detailed\
    \ error message."
