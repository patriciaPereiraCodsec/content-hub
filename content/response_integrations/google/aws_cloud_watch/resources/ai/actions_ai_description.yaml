List Log Groups:
  ai_description: >-
    Lists available log groups in AWS CloudWatch. This utility action retrieves metadata
    for log groups, such as their Amazon Resource Name (ARN), creation time, and stored
    bytes, helping analysts discover available log sources within a specific AWS region.
    The results are presented as both a JSON object and a formatted data table.


    ### Parameters

    | Parameter | Type | Mandatory | Default | Description |

    | :--- | :--- | :--- | :--- | :--- |

    | Max Groups To Return | Integer | No | 50 | Specifies the maximum number of log
    groups to retrieve from AWS. The value must be at least 1. |


    ### Flow Description

    1. **Authentication**: Establishes a connection to the AWS CloudWatch service
    using the provided AWS Access Key ID, Secret Key, and Default Region.

    2. **Parameter Validation**: Extracts the 'Max Groups To Return' parameter and
    ensures it meets the minimum requirement of 1.

    3. **Data Retrieval**: Executes a paginated request to the AWS CloudWatch API
    to fetch the list of log groups up to the specified limit.

    4. **Data Transformation**: Converts the raw AWS response into structured data
    models, formatting timestamps into ISO-8601 strings.

    5. **Output**: Populates the action results with a JSON array of log group details
    and creates a data table named 'Log Groups' containing key attributes like Name,
    Metric Filter Count, and Stored Bytes.
