Ping:
  ai_description: >-
    ### General Description

    This action is designed to verify the connectivity between Google SecOps and the
    AWS CloudWatch service. It validates the integration configuration by attempting
    a basic API call to ensure that the provided credentials and region settings are
    correct and functional.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | AWS Access Key ID | String | Yes | The access key for the AWS account, retrieved
    from the integration configuration. |

    | AWS Secret Key | String | Yes | The secret key for the AWS account, retrieved
    from the integration configuration. |

    | AWS Default Region | String | Yes | The AWS region to connect to, retrieved
    from the integration configuration. |


    ### Additional Notes

    This action does not take any input parameters directly from the playbook; it
    relies entirely on the settings provided during the integration setup in the Marketplace.
    As per standard SOAR practices, Ping actions are used for health checks and do
    not process entities.


    ### Flow Description

    1. **Initialization**: The action starts by initializing the Siemplify context
    and logger.

    2. **Configuration Extraction**: It retrieves the AWS Access Key, Secret Key,
    and Region from the integration's configuration parameters using the `extract_configuration_param`
    utility.

    3. **Manager Setup**: An instance of the `AWSCloudWatchManager` is created using
    the extracted credentials and region.

    4. **Connectivity Test**: The manager executes the `test_connectivity` method,
    which performs a `describe_log_groups` call with a limit of 1 to the AWS CloudWatch
    Logs service.

    5. **Result Handling**: If the API call succeeds, the action returns a success
    message and sets the result to `True`. If an exception occurs (e.g., authentication
    failure or network error), an error message containing the exception details is
    logged, and the action returns `False` with a failed status.
