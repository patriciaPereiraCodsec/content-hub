List Log Streams:
  ai_description: >-
    ### General Description

    Lists available log streams for specified log groups in AWS CloudWatch. This action
    is used to discover and retrieve metadata about log streams, such as ARNs, creation
    times, and last event timestamps, which is essential for log analysis and troubleshooting
    within AWS environments.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Log Groups | String (CSV) | Yes | A comma-separated list of AWS CloudWatch log
    group names for which you want to retrieve log streams. |

    | Order By | String (Dropdown) | No | Specifies how the log streams should be
    ordered. Options: 'Log Stream Name' (default) or 'Last Event Time'. |

    | Sort Order | String (Dropdown) | No | Specifies the sorting direction. Options:
    'Ascending' (default) or 'Descending'. |

    | Max Streams To Return | Integer | No | The maximum number of log streams to
    return per log group. Default is 50. Must be at least 1. |


    ### Additional Notes

    - The action will attempt to process all provided log groups even if one or more
    are not found in the AWS environment.

    - Results are presented both as a JSON object for downstream automation and as
    formatted data tables for analyst review.


    ### Flow Description

    1. **Initialization**: Retrieves AWS credentials (Access Key, Secret Key, Region)
    from the integration configuration and validates action parameters.

    2. **Parsing**: Converts the comma-separated 'Log Groups' string into a list of
    individual group names.

    3. **Data Retrieval**: Iterates through each log group and calls the AWS CloudWatch
    API to fetch log stream metadata based on the specified ordering and sorting preferences.

    4. **Data Processing**: For each log group found, the action converts the raw
    AWS response into structured JSON and CSV formats.

    5. **Internal Update**: Adds a data table to the Google SecOps case for every
    successfully queried log group.

    6. **Finalization**: Aggregates all results into a single JSON output and provides
    a summary message of the operation's success or failure per group.
  capabilities:
