Set Retention Policy:
  ai_description: >-
    ### General Description

    This action sets the retention policy for a specific log group in AWS CloudWatch.
    It allows administrators to define how many days log events are kept in a log
    group before being automatically deleted. This is useful for managing storage
    costs and complying with data retention regulations.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Log Group | String | Yes | Specify the name of the log group for which you want
    to set the retention policy. |

    | Retention Days | Integer | Yes | Specify for how many days the data should be
    retained in the log group. Supported values include 1, 3, 5, 7, 14, 30, 60, 90,
    120, 150, 180, 365, 400, 545, 731, 1827, and 3653 days. |


    ### Additional Notes

    - This action does not run on entities; it requires the explicit name of the log
    group as a parameter.

    - The retention policy is applied globally to the specified log group in the configured
    AWS region.


    ### Flow Description

    1. **Initialization**: The action retrieves AWS credentials (Access Key, Secret
    Key) and the default region from the integration configuration.

    2. **Parameter Extraction**: It extracts the target 'Log Group' name and the 'Retention
    Days' value from the action parameters.

    3. **Manager Setup**: An `AWSCloudWatchManager` instance is created using the
    provided AWS credentials and region.

    4. **Execution**: The action calls the `set_retention_policy` method, which triggers
    the AWS `put_retention_policy` API call for the specified log group.

    5. **Completion**: If the API call is successful, the action returns a success
    message and sets the execution state to completed. If an error occurs (e.g., log
    group not found or permission issues), it logs the error and fails.
