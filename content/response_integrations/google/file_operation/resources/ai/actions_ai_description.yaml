Transfer File Windows To Linux:
  ai_description: >-
    ### General Description

    Transfers a file from a local Windows share to a remote Linux host using the SFTP
    protocol. This action is designed for administrative and operational tasks where
    files need to be moved across different operating system environments within a
    network. It supports authentication via username and password and provides an
    option to either copy or move the file by toggling the source file retention.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | `source_win_file_path` | String | Yes | The full local path of the file on the
    Windows server that needs to be transferred. |

    | `dest_linux_path` | String | Yes | The directory path on the remote Linux server
    where the file should be placed. |

    | `dest_linux_ip` | String | Yes | The IP address or hostname of the destination
    Linux server. |

    | `dest_linux_username` | String | Yes | The username used to authenticate the
    SFTP session on the Linux host. |

    | `dest_linux_password` | Password | Yes | The password used to authenticate the
    SFTP session on the Linux host. |

    | `keep_file` | Boolean | Yes | Determines whether to keep the file at the source.
    If set to `False`, the file will be deleted from the Windows source after a successful
    transfer (effectively a 'move' operation). |


    ### Additional Notes

    - This action requires network connectivity (typically port 22) between the Google
    SecOps agent (Windows) and the target Linux host.

    - The action uses the `paramiko` library to handle SFTP operations.


    ### Flow Description

    1. **Initialization**: Retrieves connection details and file paths from the action
    parameters.

    2. **Connection**: Establishes an SFTP session with the remote Linux host using
    the provided IP, username, and password.

    3. **Transfer**: Uploads the file from the `source_win_file_path` to the `dest_linux_path`
    on the remote host.

    4. **Cleanup**: If the `keep_file` parameter is set to `False`, the action deletes
    the original file from the Windows source path.

    5. **Completion**: Closes the SFTP session and returns the destination path of
    the transferred file as the action result.
