Zip Files Linux:
  ai_description: >-
    ### General Description

    The **Zip Files Linux** action allows users to create a compressed ZIP archive
    on a remote Linux host. It connects to the target server via SSH and executes
    a native zip command to bundle files from a specified source directory based on
    a file extension filter. The resulting archive is stored in a designated output
    directory on the remote server.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **server_ip** | String | Yes | The IP address or hostname of the remote Linux
    server. |

    | **username** | String | Yes | The SSH username used to authenticate with the
    remote server. |

    | **password** | Password | Yes | The SSH password used to authenticate with the
    remote server. |

    | **source_folder** | String | Yes | The directory path on the remote server containing
    the files to be compressed. |

    | **file_filter** | String | Yes | The file extension or pattern (e.g., `*.txt`
    or `log`) to include in the ZIP archive. |

    | **output_folder** | String | Yes | The directory path on the remote server where
    the generated ZIP file will be saved. |


    ### Additional Notes

    * This action requires the `zip` utility to be installed on the target Linux server.

    * The action generates a unique filename for the ZIP archive using a timestamp
    format (`YYYYMMDD_HHMMSS_ffffff.zip`).


    ### Flow Description

    1. **Authentication**: The action establishes an SSH session with the remote Linux
    server using the provided IP, username, and password.

    2. **Path Preparation**: It generates a unique timestamped filename for the ZIP
    archive and constructs the full destination path within the `output_folder`.

    3. **Command Execution**: It formats a Linux `zip` command using the source folder
    and file filter, then executes this command on the remote host via the SSH session.

    4. **Completion**: Upon successful execution, the action returns the full path
    of the created ZIP file as the action result.
