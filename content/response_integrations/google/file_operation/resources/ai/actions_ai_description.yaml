Transfer File Linux To Windows:
  ai_description: >-
    ### General Description

    Transfers a file from a remote Linux host to a local Windows directory using the
    SFTP protocol. This action is designed to facilitate the movement of files (such
    as logs or forensic artifacts) from Linux environments to a Windows-based system
    for further processing or storage.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | source_linux_file_path | String | Yes | The full path to the file on the remote
    Linux server that needs to be transferred. |

    | source_linux_ip | String | Yes | The IP address of the source Linux server.
    |

    | source_linux_username | String | Yes | The username for SSH/SFTP authentication
    on the Linux server. |

    | source_linux_password | Password | Yes | The password for SSH/SFTP authentication
    on the Linux server. |

    | dest_win_path | String | Yes | The local Windows directory path where the file
    will be saved. |

    | keep_file | Boolean | Yes | If set to `True`, the file remains on the Linux
    server. If `False`, the file is deleted from the source after a successful transfer.
    |


    ### Additional Notes

    - This action uses the `paramiko` library to handle SFTP operations.

    - The action performs a destructive operation on the external system if `keep_file`
    is set to `False`.


    ### Flow Description

    1. **Connection**: The action initializes an SFTP session to the remote Linux
    server using the provided IP and credentials.

    2. **Path Resolution**: It determines the destination filename by extracting the
    base name from the source path and joining it with the local Windows destination
    path.

    3. **Transfer**: The file is downloaded from the Linux server to the local Windows
    path using the SFTP `get` method.

    4. **Cleanup**: If the `keep_file` parameter is configured as `False`, the action
    executes a `remove` command on the remote SFTP server to delete the source file.

    5. **Finalization**: The action closes the connection and returns the local path
    of the transferred file.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
