Tarzip Files Linux:
  ai_description: >-
    ### General Description

    The **Tarzip Files Linux** action allows users to create a compressed `.tar.gz`
    archive on a remote Linux host. It connects to the target server via SSH and packages
    files from a specified source directory that match a provided file extension filter.
    The resulting archive is saved to a designated output directory on the same remote
    host.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **server_ip** | String | Yes | The IP address or hostname of the remote Linux
    server. |

    | **username** | String | Yes | The SSH username used to authenticate with the
    remote server. |

    | **password** | Password | Yes | The SSH password used to authenticate with the
    remote server. |

    | **source_folder** | String | Yes | The full path to the directory on the remote
    server containing the files to be archived. |

    | **file_filter** | String | Yes | The file extension pattern to include in the
    archive (e.g., `*.txt` or `*.log`). |

    | **output_folder** | String | Yes | The full path to the directory on the remote
    server where the generated archive will be stored. |


    ### Additional Notes

    - This action requires SSH access to the target Linux host.

    - The archive is created using the `tar` and `find` commands on the remote system.

    - The output filename is automatically generated using a timestamp format: `YYYYMMDD_HHMMSS_ffffff.tar.gz`.


    ### Flow Description

    1. **Authentication**: The action establishes an SSH connection to the remote
    server using the provided `server_ip`, `username`, and `password`.

    2. **Command Construction**: It constructs a Linux shell command that uses `find`
    to locate files in the `source_folder` matching the `file_filter` and pipes the
    results to `tar` to create a compressed archive.

    3. **Execution**: The command is executed on the remote host via the SSH session.

    4. **Verification**: The action checks for errors in the standard error stream
    of the executed command.

    5. **Completion**: Upon success, the action returns the full path of the newly
    created archive file on the remote server.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Creates a new .tar.gz archive file on the specified remote Linux host via SSH.
    fetches_data: false
    internal_data_mutation_explanation: null
