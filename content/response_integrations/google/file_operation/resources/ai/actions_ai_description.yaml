Transfer File Linux To Linux:
  ai_description: >-
    ### General Description

    Transfers a file from a remote Linux host to another remote Linux host using SFTP.
    This action is useful for moving logs, artifacts, or configuration files between
    systems during an incident response or maintenance workflow. It supports an option
    to either keep the original file on the source system or remove it after a successful
    transfer.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | source_linux_file_path | String | Yes | The full path to the file on the source
    Linux server that needs to be transferred. |

    | source_linux_ip | String | Yes | The IP address or hostname of the source Linux
    server. |

    | source_linux_username | String | Yes | The username used to authenticate with
    the source Linux server. |

    | source_linux_password | Password | Yes | The password used to authenticate with
    the source Linux server. |

    | dest_linux_path | String | Yes | The directory path on the destination Linux
    server where the file should be placed. |

    | dest_linux_ip | String | Yes | The IP address or hostname of the destination
    Linux server. |

    | dest_linux_username | String | Yes | The username used to authenticate with
    the destination Linux server. |

    | dest_linux_password | Password | Yes | The password used to authenticate with
    the destination Linux server. |

    | keep_file | Boolean | Yes | Determines whether to keep the file on the source
    server (True) or delete it after the transfer is complete (False). |


    ### Additional Notes

    This action requires SSH/SFTP access to both the source and destination servers.
    It temporarily stores the file on the Google SecOps runner during the transfer
    process before cleaning it up.


    ### Flow Description

    1. **Authentication**: Establishes SFTP connections to both the source and destination
    Linux servers using the provided credentials.

    2. **Download**: Retrieves the specified file from the source server and saves
    it to a temporary local location on the runner.

    3. **Upload**: Transfers the temporary local file to the specified destination
    path on the target Linux server.

    4. **Cleanup**: If the `keep_file` parameter is set to False, the action deletes
    the original file from the source server. It then removes the temporary file from
    the runner and closes all network connections.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Creates a new file on the destination Linux server and may delete the original
      file from the source Linux server depending on the 'keep_file' parameter.
    fetches_data: false
    internal_data_mutation_explanation: null
