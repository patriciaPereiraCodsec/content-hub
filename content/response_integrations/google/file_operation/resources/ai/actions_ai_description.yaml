Tarzip Files Windows:
  ai_description: >-
    ### General Description

    The **Tarzip Files Windows** action is designed to compress specific files from
    a Windows directory into a `.tar.gz` archive. It allows users to specify a source
    directory, a file extension filter, and a destination directory for the resulting
    archive. This is useful for log collection, evidence preservation, or general
    file management tasks within a Windows environment.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | `source_folder` | String | No | The full path to the directory containing the
    files you wish to compress. |

    | `file_filter` | String | No | A string representing the file extension to include
    in the archive (e.g., `*.txt` or `.log`). Defaults to `*.txt`. |

    | `output_folder` | String | No | The full path to the directory where the generated
    `.tar.gz` file will be saved. |


    ### Additional Notes

    * The action generates a unique filename for the archive based on the current
    timestamp (format: `YYYYMMDD_HHMMSS_ffffff.tar.gz`).

    * If no files match the filter in the source folder, an empty archive may be created
    depending on the underlying OS behavior, though the logic iterates through matching
    files.


    ### Flow Description

    1. **Parameter Retrieval:** The action retrieves the `source_folder`, `file_filter`,
    and `output_folder` from the user input.

    2. **Filename Generation:** It constructs a unique filename using a high-precision
    timestamp to prevent overwriting existing archives.

    3. **File Discovery:** The action scans the `source_folder` recursively using
    `os.walk` to find files.

    4. **Filtering:** It compares the extension of each discovered file against the
    provided `file_filter`.

    5. **Compression:** Matching files are added to a new `TarFile` object created
    at the specified `output_folder` path.

    6. **Completion:** The archive is finalized, and the action returns the full path
    of the created file as the result.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      This action creates a new .tar.gz archive file on the local or network-accessible
      Windows file system based on the provided output path.
    fetches_data: false
    internal_data_mutation_explanation: null
