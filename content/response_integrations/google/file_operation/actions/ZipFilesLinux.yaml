name: Zip Files Linux
description: Create a zip file from source folder files in a remote Linux host
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/fileoperation#zip_files_linux
integration_identifier: FileOperation
parameters:
-   name: server_ip
    default_value: ''
    type: string
    description: x.x.x.x
    is_mandatory: true
-   name: username
    default_value: ''
    type: string
    description: username
    is_mandatory: true
-   name: password
    default_value: ''
    type: password
    description: password
    is_mandatory: true
-   name: source_folder
    default_value: ''
    type: string
    description: The remote server folder with the relevant files
    is_mandatory: true
-   name: file_filter
    default_value: ''
    type: string
    description: 'files extension to include in zip file {ex: *.txt}'
    is_mandatory: true
-   name: output_folder
    default_value: ''
    type: string
    description: The remote server folder to put the zip file into
    is_mandatory: true
dynamic_results_metadata: []
creator: admin
script_result_name: ZIpPath
