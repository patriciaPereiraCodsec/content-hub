name: Tarzip Files Windows
description: Compress a tarzip file on windows share
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/fileoperation#tarzip_files_windows
integration_identifier: FileOperation
parameters:
-   name: source_folder
    default_value: ''
    type: string
    description: The full path to the folder with the relevant files
    is_mandatory: false
-   name: file_filter
    default_value: '*.txt'
    type: string
    description: 'iles extension to include in targzip file {ex: *.txt}'
    is_mandatory: false
-   name: output_folder
    default_value: ''
    type: string
    description: The path to the folder to put the zip file into
    is_mandatory: false
dynamic_results_metadata: []
creator: admin
script_result_name: TarPath
