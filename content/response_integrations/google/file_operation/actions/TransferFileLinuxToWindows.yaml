name: Transfer File Linux To Windows
description: Transfer file from windows share to remote Linux host
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/fileoperation#transfer_file_linux_to_windows
integration_identifier: FileOperation
parameters:
-   name: source_linux_file_path
    default_value: ''
    type: string
    description: The remote server folder with the relevant files. Full path
    is_mandatory: true
-   name: source_linux_ip
    default_value: ''
    type: string
    description: x.x.x.x
    is_mandatory: true
-   name: source_linux_username
    default_value: ''
    type: string
    description: source_linux_username
    is_mandatory: true
-   name: source_linux_password
    default_value: ''
    type: password
    description: source_linux_password
    is_mandatory: true
-   name: dest_win_path
    default_value: ''
    type: string
    description: The server folder to put the files into
    is_mandatory: true
-   name: keep_file
    default_value: 'True'
    type: boolean
    description: Indicates weather to keep the file in source or remove it
    is_mandatory: true
dynamic_results_metadata: []
creator: admin
script_result_name: FilePath
