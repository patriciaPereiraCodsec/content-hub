Terminate Process:
  ai_description: "### General Description\nThis action terminates a specific process\
    \ on a remote Linux/Unix machine using the SSH protocol. It allows security analysts\
    \ to remotely stop potentially malicious or resource-heavy processes by providing\
    \ either a Process ID (PID) or a process name. The action establishes a secure\
    \ connection to the target server and executes the appropriate termination command.\n\
    \n### Parameters Description\n| Parameter | Type | Mandatory | Description |\n\
    | :--- | :--- | :--- | :--- |\n| Remote Server | String | Yes | The IP address\
    \ or hostname of the remote server where the process is running. |\n| Remote Username\
    \ | String | Yes | The username used to authenticate the SSH connection. |\n|\
    \ Remote Password | Password | Yes | The password used to authenticate the SSH\
    \ connection. |\n| Remote Port | String | No | The port number for the SSH service.\
    \ Defaults to 22 if not specified. |\n| PROCESS | String | Yes | The identifier\
    \ of the process to terminate. This can be a numeric Process ID (PID) or the name\
    \ of the process. |\n\n### Additional Notes\n- If the `PROCESS` parameter is a\
    \ number, the action uses the `kill -9` command.\n- If the `PROCESS` parameter\
    \ is a string (name), the action uses the `pkill` command.\n- This action requires\
    \ valid SSH credentials and network reachability to the target server.\n\n###\
    \ Flow Description\n1. **Initialization**: The action retrieves the connection\
    \ details (server, username, password, port) and the process identifier from the\
    \ input parameters.\n2. **Connection**: It initializes an SSH connection to the\
    \ remote server using the `SshManager` wrapper.\n3. **Command Selection**: The\
    \ logic checks if the provided `PROCESS` value is numeric. \n    - If numeric,\
    \ it prepares a `kill -9` command.\n    - If non-numeric, it prepares a `pkill`\
    \ command.\n4. **Execution**: The command is executed on the remote host via the\
    \ SSH channel.\n5. **Result Handling**: The action checks the exit status of the\
    \ command. An exit status of 0 indicates success, while any other value indicates\
    \ failure. The final status and a descriptive message are returned to the Google\
    \ SecOps platform."
