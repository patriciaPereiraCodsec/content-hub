    1. **Connection Initialization**: The action retrieves the connection details
    (server, credentials, port) and the command from the input parameters.

    2. **SSH Session Establishment**: It uses the `SshManager` (based on the Paramiko
    library) to establish a secure SSH connection to the target host.

    3. **Command Execution**: The specified command is executed on the remote host's
    shell.

    4. **Output Capture**: The action captures the exit status of the command. If
    the status code is 0 (success), it retrieves the standard output (stdout). If
    the status code is non-zero, it retrieves the error output (stderr).

    5. **Result Reporting**: The captured output is decoded and returned as a JSON
    result and an output message to the SOAR platform.
