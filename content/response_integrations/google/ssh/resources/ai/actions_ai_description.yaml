List Connections:
  ai_description: >-
    ### General Description

    Lists all active network connections on a remote Linux/Unix machine using the
    SSH protocol. This action is designed to provide visibility into the network state
    of a remote host by executing the `netstat` command and retrieving the output
    in a structured format. It is primarily used for forensic investigation and real-time
    monitoring of network activity on remote assets.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Remote Server | String | Yes | The IP address or hostname of the remote machine
    to connect to. |

    | Remote Username | String | Yes | The username used for SSH authentication. |

    | Remote Password | Password | Yes | The password used for SSH authentication.
    |

    | Remote Port | String | No | The port used for the SSH connection. Defaults to
    22 if not provided. |


    ### Additional Notes

    - This action does not operate on Google SecOps entities; it requires the target
    server details to be provided manually via parameters.

    - The action executes the command `netstat -tnpa` on the remote host. Ensure the
    provided user has the necessary permissions to run this command.


    ### Flow Description

    1. **Parameter Retrieval:** The action extracts the remote server address, credentials,
    and port from the input parameters.

    2. **SSH Connection:** It initializes an SSH session to the target server using
    the `SshManager` class.

    3. **Command Execution:** The action executes the `netstat -tnpa` command on the
    remote host to gather information about active TCP/UDP connections, including
    local/foreign addresses and process IDs.

    4. **Data Parsing:** The raw command output is parsed and formatted into a CSV-like
    structure.

    5. **Result Reporting:** The formatted connection list is added to the case as
    a data table and a JSON result, and the SSH session is closed.
