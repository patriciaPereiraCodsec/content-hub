List Processes:
  ai_description: >-
    ### General Description

    This action lists all running processes on a remote Linux/Unix machine via an
    SSH connection. It executes the `ps -aux` command and retrieves the output, providing
    visibility into active system processes, their resource usage (CPU/Memory), and
    the users running them. This is useful for remote forensics, system monitoring,
    and identifying suspicious activity on a host.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Remote Server | String | Yes | The IP address or hostname of the remote machine
    to connect to. |

    | Remote Username | String | Yes | The username used for SSH authentication. |

    | Remote Password | Password | Yes | The password used for SSH authentication.
    |

    | Remote Port | String | No | The SSH port of the remote machine. Defaults to
    22 if not specified. |


    ### Additional Notes

    This action does not require any Google SecOps entities to run; it operates based
    on the provided connection parameters. The results are returned as a data table
    and a JSON object.


    ### Flow Description

    1. **Authentication**: The action establishes an SSH connection to the specified
    `Remote Server` using the provided `Remote Username`, `Remote Password`, and `Remote
    Port`.

    2. **Command Execution**: It executes the `ps -aux` command on the remote host
    to capture the process list.

    3. **Data Parsing**: The raw command output is parsed into a structured CSV-like
    format, separating headers (USER, PID, %CPU, etc.) from the process data.

    4. **Output Generation**: The parsed data is added to the Google SecOps case as
    a data table and returned as a JSON result for use in subsequent playbook steps.
