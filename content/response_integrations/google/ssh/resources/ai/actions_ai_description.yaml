Logoff User:
  ai_description: >-
    Logs off a specific user from a remote server by establishing an SSH connection
    and executing a termination command. This action is primarily used for containment
    or administrative purposes to forcibly end active user sessions on Linux-based
    systems.


    ### Parameters Description


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Remote Server | String | Yes | The IP address or hostname of the remote server
    where the user is logged in. |

    | Remote Username | String | Yes | The SSH username used to authenticate with
    the remote server. |

    | Remote Password | Password | Yes | The SSH password used to authenticate with
    the remote server. |

    | Remote Port | String | No | The port used for the SSH connection. Defaults to
    22 if not provided. |

    | Logoff Username | String | Yes | The specific username of the account that should
    be logged off from the remote server. |


    ### Flow Description


    1.  **Authentication**: The action establishes an SSH connection to the specified
    `Remote Server` using the provided `Remote Username`, `Remote Password`, and `Remote
    Port`.

    2.  **Command Execution**: Once connected, it executes the command `pkill -KILL
    -u '{username}'` on the remote host. This command sends a KILL signal to all processes
    owned by the `Logoff Username`.

    3.  **Status Verification**: The action captures the exit status of the command.
    An exit status of 0 indicates success.

    4.  **Result Reporting**: The action returns a success message if the user was
    successfully logged off, or a failure message if the command failed or the connection
    could not be established.
