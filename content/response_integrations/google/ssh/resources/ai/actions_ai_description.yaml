    incidents where a compromised or rogue machine needs to be taken offline immediately
    or after a short delay.


    ### Parameters Description

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Remote Server | String | Yes | The IP address or hostname of the remote machine
    to be shut down. |

