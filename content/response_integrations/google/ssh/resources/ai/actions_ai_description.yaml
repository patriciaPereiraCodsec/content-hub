    | Remote Username | String | Yes | The username used for SSH authentication. |

    | Remote Password | Password | Yes | The password used for SSH authentication.
    |

    | Remote Port | String | No | The port number for the SSH service (defaults to
    22 if not specified). |

    | Command | String | Yes | The specific shell command to be executed on the remote
    machine (e.g., `ifconfig`, `ls -la`, `ps aux`). |


    ### Additional Notes

    This action does not operate on SecOps entities; it requires the target server
    address to be provided as a parameter. Because it allows the execution of arbitrary
    shell commands, it should be used with caution as it has the potential to modify
    the state of the remote system.


