    |

    | Remote Password | Password | Yes | The password used to authenticate the SSH
    session. |

    | Remote Port | String | No | The port number for the SSH service. Defaults to
    22 if not provided. |

    | Wait Time | String | Yes | The time to wait before the shutdown occurs. Accepts
    values like 'now' for immediate shutdown or a numeric value representing minutes.
    |


    ### Flow Description

    1. **Initialization**: The action retrieves the connection details (server, port,
    username, password) and the shutdown delay (Wait Time) from the action parameters.

    2. **Connection**: It establishes an SSH connection to the remote server using
    the Paramiko library.

    3. **Command Execution**: It formats and executes the `shutdown -h {wait_time}`
    command on the remote host.

    4. **Result Handling**: The action captures the exit status of the command. If
    the status indicates success (mapped in the script logic), it returns a success
    message; otherwise, it reports a failure.

    5. **Cleanup**: The SSH connection is closed, and the final status is reported
    back to Google SecOps.
