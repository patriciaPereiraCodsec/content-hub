Delete Firewall Rule:
  ai_description: >-
    ### General Description

    Deletes a specific iptables firewall rule on a remote Linux server using SSH.
    This action allows security administrators to programmatically remove network
    restrictions or access rules by executing the `iptables -D` command on a target
    host.


    ### Parameters Description

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Remote Server | String | Yes | The IP address or hostname of the remote server
    where the rule should be deleted. |

    | Remote Username | String | Yes | The username used to authenticate the SSH connection
    (defaults to 'root'). |

    | Remote Password | Password | Yes | The password used to authenticate the SSH
    connection. |

    | Remote Port | String | No | The SSH port of the remote server. If not provided,
    it defaults to 22. |

    | IPtables Rule | String | Yes | The specific iptables rule string to be deleted
    (e.g., 'INPUT -s 10.0.0.10 -j DROP'). |


    ### Additional Notes

    This action does not run on entities; it requires manual input of the remote server
    details and the specific rule string. The success of the action depends on the
    SSH user having sufficient privileges (e.g., sudo or root) to modify iptables.


    ### Flow Description

    1. **Connection Establishment**: The action initializes an SSH connection to the
    specified 'Remote Server' using the provided 'Remote Username', 'Remote Password',
    and 'Remote Port'.

    2. **Command Execution**: It constructs an iptables delete command (`iptables
    -D <IPtables Rule>`) and executes it on the remote host.

    3. **Status Verification**: The action captures the exit status of the command
    execution. An exit status of 0 indicates success.

    4. **Result Reporting**: The action returns a success message and a boolean result
    ('True' or 'False') to the Google SecOps platform based on the command's outcome.
