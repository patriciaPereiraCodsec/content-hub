Block IP Address in iptables:
  ai_description: >-
    Blocks a specific IP address on a remote Linux server by adding a rule to the
    iptables firewall via SSH. This action is useful for immediate containment of
    malicious IP addresses at the host level.


    ### Parameters

    | Parameter | Description | Type | Mandatory | Default |

    |-----------|-------------|------|-----------|---------|

    | Remote Server | The IP address or hostname of the remote server where iptables
    is running. | String | Yes | x.x.x.x |

    | Remote Username | The username used to authenticate the SSH connection. | String
    | Yes | root |

    | Remote Password | The password used to authenticate the SSH connection. | Password
    | Yes | - |

    | Remote Port | The SSH port of the remote server. | String | No | 22 |

    | Block IP Address | The specific IP address that should be blocked in the iptables
    configuration. | String | Yes | - |


    ### Flow Description

    1. **Authentication**: The action establishes an SSH connection to the specified
    'Remote Server' using the provided 'Remote Username', 'Remote Password', and 'Remote
    Port'.

    2. **Rule Verification**: It executes a check command (`iptables -C INPUT -s <IP>
    -j DROP`) to determine if a block rule for the target IP already exists in the
    INPUT chain.

    3. **Rule Insertion**: If the rule does not exist, it executes the insertion command
    (`iptables -I INPUT -s <IP> -j DROP`) to place the block rule at the top of the
    INPUT chain.

    4. **Result Reporting**: The action returns a success status and a descriptive
    message indicating whether the rule was added, already existed, or if the operation
    failed.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Modifies the iptables firewall configuration on a remote Linux server by adding
      a new DROP rule to the INPUT chain.
    fetches_data: false
    internal_data_mutation_explanation: null
  categories:
    enrichment: false
