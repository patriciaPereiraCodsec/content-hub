List iptables Rules:
  ai_description: >-
    ### General Description

    This action connects to a remote Linux server via SSH to retrieve and list the
    current `iptables` rules. It provides visibility into the firewall configuration
    of a remote host, allowing security analysts to audit network access controls
    or verify the state of specific chains during an incident response process.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Remote Server | String | Yes | The IP address or hostname of the remote Linux
    machine to query. |

    | Remote Username | String | Yes | The username used for SSH authentication on
    the remote server. |

    | Remote Password | Password | Yes | The password used for SSH authentication
    on the remote server. |

    | Remote Port | String | No | The SSH port of the remote server. Defaults to 22
    if not specified. |

    | Chain | String | No | The specific iptables chain to list (e.g., INPUT, FORWARD,
    OUTPUT). If left empty, the action lists rules for all chains. |


    ### Additional Notes

    * This action requires the remote server to have SSH enabled and accessible from
    the Google SecOps environment.

    * The provided user account must have the necessary permissions to execute the
    `iptables` command on the target system.

    * The action uses the `iptables -S` command to retrieve rules in a parseable format.


    ### Flow Description

    1. **Initialization**: The action retrieves the connection parameters (Server,
    Username, Password, Port) and the optional Chain filter from the input.

    2. **Connection**: It establishes an SSH session with the remote server using
    the `SshManager` library.

    3. **Execution**: The action executes the `iptables -S` command on the remote
    host, appending the specific chain name if provided.

    4. **Parsing**: The raw command output is parsed into a structured format, separating
    the chain and the rule logic.

    5. **Output**: The results are presented in a data table within the Google SecOps
    interface and returned as a JSON object for use in downstream playbook tasks.
