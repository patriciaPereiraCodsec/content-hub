Execute Program:
  ai_description: >-
    ### General Description

    Executes a program or script on a remote machine using the SSH protocol. This
    action is designed to facilitate remote administration and automation by triggering
    specific executables or scripts located on a target server. It establishes a secure
    connection, runs the specified command, and captures the resulting output or error
    messages.


    ### Parameters Description

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Remote Server | String | Yes | The IP address or hostname of the remote server
    where the program will be executed. |

    | Remote Username | String | Yes | The username used to authenticate the SSH connection.
    |

    | Remote Password | Password | Yes | The password used to authenticate the SSH
    connection. |

    | Remote Port | String | No | The port number for the SSH service. Defaults to
    22 if not provided. |

    | Remote Program Path | String | Yes | The full file path to the program or script
    on the remote host that needs to be executed. |


    ### Flow Description

    1. **Connection Setup**: The action retrieves the server details and credentials
    from the input parameters and initializes an SSH connection using the `SshManager`
    (based on the `paramiko` library).

    2. **Execution**: It sends a command to the remote server to execute the file
    specified in the `Remote Program Path` parameter.

    3. **Result Capture**: The action waits for the process to complete and captures
    the exit status code, standard output (stdout), and standard error (stderr).

    4. **Output Processing**: If the exit code is 0 (success), the standard output
    is returned as the result. If the exit code is non-zero, the error message from
    stderr is returned.

    5. **Finalization**: The action closes the SSH session and reports the execution
    status and output back to Google SecOps.
  capabilities:
