Reboot Machine:
  ai_description: >-
    ### General Description

    This action reboots a remote server by establishing an SSH connection and executing
    the `reboot` command. It is primarily used for remote system administration, remediation,
    or recovery tasks where a system restart is required.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Remote Server | String | Yes | The IP address or hostname of the remote server
    to be rebooted. |

    | Remote Username | String | Yes | The username used for SSH authentication on
    the remote server. |

    | Remote Password | Password | Yes | The password used for SSH authentication
    on the remote server. |

    | Remote Port | String | No | The port used for the SSH connection. If not specified,
    the action defaults to port 22. |


    ### Flow Description

    1. **Parameter Retrieval**: The action extracts the connection details, including
    the server address, credentials, and port, from the user-provided parameters.

    2. **SSH Connection**: It initializes an SSH session using the provided credentials
    to connect to the target remote server.

    3. **Command Execution**: The action sends the `reboot` command to the remote
    server's shell.

    4. **Status Evaluation**: It captures the execution status of the command to determine
    if the reboot request was successfully accepted by the remote system.

    5. **Finalization**: The action concludes by reporting the success or failure
    of the operation back to the Google SecOps case management system.
