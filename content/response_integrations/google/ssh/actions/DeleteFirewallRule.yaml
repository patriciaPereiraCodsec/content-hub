name: Delete Firewall Rule
description: 'Delete iptables Firewall rule (Example: INPUT -s 10.0.0.10 -j DROP)'
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/ssh#delete_firewall_rule
integration_identifier: SSH
parameters:
-   name: Remote Server
    default_value: ''
    type: string
    description: 'Remote server address(e.g: x.x.x.x).'
    is_mandatory: true
-   name: Remote Username
    default_value: root
    type: string
    description: Remote Username
    is_mandatory: true
-   name: Remote Password
    default_value: ''
    type: password
    description: Remote Password
    is_mandatory: true
-   name: Remote Port
    type: string
    description: Remote Port
    is_mandatory: false
-   name: IPtables Rule
    default_value: ''
    type: string
    description: 'Rule value(e.g: INPUT -s 10.0.0.10 -j DROP)'
    is_mandatory: true
dynamic_results_metadata: []
creator: admin
script_result_name: is_succecss
