name: Block IP Address in iptables
description: Add rule to iptables to block IP address
integration_identifier: SSH
parameters:
-   name: Remote Server
    default_value: x.x.x.x
    type: string
    description: 'Remote server address(e.g: x.x.x.x).'
    is_mandatory: true
-   name: Remote Username
    default_value: root
    type: string
    description: Remote Username
    is_mandatory: true
-   name: Remote Password
    default_value: ''
    type: password
    description: Remote Password
    is_mandatory: true
-   name: Remote Port
    default_value: ''
    type: string
    description: Remote Port
    is_mandatory: false
-   name: Block IP Address
    default_value: ''
    type: string
    description: 'IP address to block(e.g: x.x.x.x).'
    is_mandatory: true
dynamic_results_metadata: []
creator: admin
