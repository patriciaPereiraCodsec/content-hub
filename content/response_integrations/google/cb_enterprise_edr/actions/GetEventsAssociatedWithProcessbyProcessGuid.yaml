name: Get Events Associated With Process by Process Guid
description: Get events associated with specific processes based on the information
    from the VMware Carbon Black Enterprise EDR. This action can get more detailed
    results on specific process activity than “Process Search” action. Note for the
    action to work, Siemplify process artifact passed to action should be a process
    guid type.
integration_identifier: CBEnterpriseEDR
parameters:
-   name: Process GUID
    default_value: ''
    type: string
    description: Specify a process guid to search events for.
    is_mandatory: true
-   name: Search Criteria
    default_value: ''
    type: string
    description: Specify a search criteria for the request. Currently, only “event_type”
        values are accepted as the search criteria, for example, netconn. Multiple
        values are accepted as a comma separated string.
    is_mandatory: false
-   name: Query
    default_value: ''
    type: string
    description: Query to execute in process search.For example, “netconn_action:ACTION_CONNECTION_CREATE
        OR netconn_action:ACTION_CONNECTION_ESTABLISHED”
    is_mandatory: true
-   name: Time Frame
    default_value: '4'
    type: string
    description: Specify a time frame in hours for which to fetch events.
    is_mandatory: false
-   name: Record limit
    default_value: '20'
    type: string
    description: Specify how many records can be returned by the action.
    is_mandatory: true
-   name: Sort By
    default_value: ''
    type: string
    description: Specify a parameter for sorting the data.
    is_mandatory: false
-   name: Sort Order
    default_value: ASC
    type: ddl
    optional_values:
    - ASC
    - DESC
    description: Sort order.
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/get_events_associated_with_processby_process_guid_JsonResult_example.json
    result_name: JsonResult
    show_result: true
default_result_value: ''
creator: Admin
simulation_data_json: '{"Entities": ["PROCESS"]}'
