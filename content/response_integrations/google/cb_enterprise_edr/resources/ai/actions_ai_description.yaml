Process Search:
  ai_description: >-
    ### General Description

    This action searches for process activity on a specific host using Carbon Black
    Enterprise EDR. It allows security analysts to query process-level telemetry (such
    as process names, hashes, or network connections) associated with a `HOSTNAME`
    entity within a specified timeframe. The results are returned as a data table
    and a JSON result for further automation.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Query** | String | No | A Carbon Black search query to filter process results
    (e.g., `process_name:svchost.exe` or `process_hash:9520a99e...`). |

    | **Time Frame** | Integer | No | The number of hours back from the current time
    to search for process activity. Defaults to 4 hours. |

    | **Record limit** | Integer | Yes | The maximum number of process records to
    return for each entity. Defaults to 20. |

    | **Sort By** | String | No | The field name used to sort the results (e.g., `device_timestamp`).
    |

    | **Sort Order** | Enum | No | The direction of sorting: `ASC` (Ascending) or
    `DESC` (Descending). Defaults to `ASC`. |


    ### Flow Description

    1. **Initialization**: The action extracts integration configuration (API credentials)
    and action parameters.

    2. **Entity Filtering**: It identifies all `HOSTNAME` entities within the current
    scope.

    3. **Search Initiation**: For each host, it sends a request to Carbon Black to
    initiate an asynchronous process search job using the provided query and timeframe.

    4. **Result Retrieval**: The action polls the search job and paginates through
    the results until the `Record limit` is reached or all data is retrieved.

    5. **Data Processing**: Retrieved process data is formatted into a CSV-style data
    table and attached to the entity in the Google SecOps case.

    6. **Finalization**: The action updates the entities in the case and provides
    a summary message of the search results.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      The action updates the entities in the Google SecOps case to reflect that process
      information was successfully retrieved and processed.
  categories:
    enrichment: true
  entity_usage:
    entity_types:
    - HOSTNAME
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: true
    filters_by_identifier: false
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: false
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
