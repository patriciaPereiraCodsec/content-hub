Ping:
  ai_description: >-
    ### General Description

    The **Ping** action is a diagnostic tool designed to verify the connectivity between
    Google SecOps and the VMware Carbon Black Enterprise EDR instance. It ensures
    that the provided credentials (API ID, Secret Key, and Organization Key) are valid
    and that the network path to the API Root is open.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **API Root** | String | Yes | The base URL of the VMware Carbon Black Enterprise
    EDR API instance. |

    | **Organization Key** | String | Yes | The unique organization key associated
    with the Carbon Black account. |

    | **API ID** | String | Yes | The API ID used for authentication. |

    | **API Secret Key** | String | Yes | The API Secret Key used for authentication.
    |

    | **Verify SSL** | Boolean | No | If enabled, the action will verify the SSL certificate
    of the Carbon Black server. Default is `False`. |


    ### Additional Notes

    - This action does not process any entities and is typically used during the initial
    setup or troubleshooting of the integration.

    - As per standard SOAR practices, Ping actions are not categorized as enrichment
    actions.


    ### Flow Description

    1. **Parameter Extraction**: The action retrieves the connection details (API
    Root, Org Key, API ID, Secret Key, and SSL settings) from the integration configuration.

    2. **Manager Initialization**: It initializes the `CBEnterpriseEDRManager` with
    the provided credentials.

    3. **Connectivity Test**: The manager executes a `GET` request to the `/threathunter/watchlistmgr/v3/orgs/{org_key}/watchlists`
    endpoint.

    4. **Validation**: The action validates the HTTP response. A successful response
    (200 OK) confirms connectivity.

    5. **Result Reporting**: The action returns a success message if the connection
    is established, or a failure message with error details if the connection fails.
  capabilities:
    can_create_case_comments: false
