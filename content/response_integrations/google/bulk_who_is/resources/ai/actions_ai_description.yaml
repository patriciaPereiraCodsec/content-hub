Ping:
  ai_description: >-
    ### General Description

    The Ping action is a diagnostic tool used to verify the connectivity between Google
    SecOps and the BulkWhoIs service. It ensures that the provided API credentials
    (API Key and Secret Key) are valid and that the network configuration allows communication
    with the BulkWhoIs API endpoint.


    ### Parameters Description

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Api Key | String | Yes | The API key used for authenticating requests to the
    BulkWhoIs service. |

    | Secret Key | String | Yes | The Secret key used to generate a signature for
    API requests. |

    | Verify SSL | Boolean | No | If enabled, the action will verify the SSL certificate
    of the BulkWhoIs API. Default is False. |


    ### Additional Notes

    * This action does not interact with any entities within a case. It uses a hardcoded
    IP address (8.8.8.8) to perform a test scan and verify the connection.

    * As a 'Ping' type action, it is excluded from being categorized as an enrichment
    action.


    ### Flow Description

    1. **Initialization**: The action retrieves the integration configuration, specifically
    the API Key, Secret Key, and SSL verification preference.

    2. **Connectivity Test**: It initializes the `WhoisManager` and calls the `test_connectivity`
    method.

    3. **API Interaction**: The manager performs a signed POST request to the BulkWhoIs
    API, attempting to scan the IP address '8.8.8.8'.

    4. **Validation**: The action checks if the API response indicates a successful
    query.

    5. **Outcome**: If the scan is successful, it returns a 'Connection Established'
    message. If the request fails or credentials are invalid, it returns 'Connection
    Failed'.
  capabilities:
