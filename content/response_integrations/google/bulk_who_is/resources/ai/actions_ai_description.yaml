WhoIs Details:
  ai_description: >-
    ### General Description

    Enriches Domain, Hostname, and IP Address entities with Whois registration details
    using the BulkWhoIs API. This action retrieves comprehensive ownership and registration
    data, such as registrar information, creation/expiry dates, and registrant location,
    to provide context for security investigations.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Verify SSL | Boolean | No | If enabled, the action will verify the SSL certificate
    of the BulkWhoIs API. Default is False. |

    | Api Key | String | Yes | The API key used for authentication with the BulkWhoIs
    service. |

    | Secret Key | String | Yes | The Secret key used for authentication with the
    BulkWhoIs service. |


    ### Additional Notes

    - The action specifically filters out internal Hostname entities to avoid unnecessary
    external queries for local assets.

    - Enrichment data added to entities is prefixed with 'WhoisQuery_' for easy identification.


    ### Flow Description

    1. **Initialization**: Extracts API credentials and SSL configuration to initialize
    the BulkWhoIs manager.

    2. **Entity Filtering**: Iterates through target entities, identifying supported
    types: ADDRESS, HOSTNAME, and DestinationURL.

    3. **Domain Extraction**: For URL and Hostname entities, the logic extracts the
    base domain name for the Whois query.

    4. **External API Query**: Performs a signed POST request to the BulkWhoIs API
    for each identified entity.

    5. **Data Parsing**: Processes the API response to extract key fields like Registrar,
    Country, and City.

    6. **Internal Updates**: Updates the entity's additional properties with the Whois
    data and sets the 'is_enriched' flag to true.

    7. **Reporting**: Generates a data table for each entity and a final JSON result
    containing all retrieved information.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entity additional properties with Whois information (e.g., Registrar,
      Creation Date, Country) and sets the 'is_enriched' flag to true. It also attaches
      data tables to the entities for visual representation in the SOAR.
  categories:
    enrichment: true
  entity_usage:
    entity_types:
    - ADDRESS
    - HOSTNAME
    - DestinationURL
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: true
    filters_by_identifier: false
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: true
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
