Get Endpoints:
  ai_description: >-
    ### General Description

    The **Get Endpoints** action retrieves a comprehensive list of all endpoints currently
    monitored by Cisco ISE. It provides visibility into the devices managed within
    the network environment by fetching detailed metadata for each endpoint and presenting
    it in a structured format.


    ### Parameters Description

    There are no parameters for this action.


    ### Additional Notes

    This action does not operate on specific entities (such as IP addresses or Hostnames)
    within a case. Instead, it performs a global fetch of all endpoint data from the
    Cisco ISE server and attaches the results to the case as a data table.


    ### Flow Description

    1. **Authentication**: The action initializes a connection to the Cisco ISE API
    using the configured API Root, Username, and Password.

    2. **Resource Discovery**: It queries the Cisco ISE endpoint configuration service
    to retrieve a list of all endpoint resource identifiers.

    3. **Detailed Retrieval**: For each identified endpoint, the action performs a
    secondary request to fetch its full detailed object using the unique ID.

    4. **Data Transformation**: The retrieved endpoint objects are flattened into
    a simplified dictionary structure and converted into a CSV-compatible format.

    5. **Case Enrichment**: The final dataset is attached to the Google SecOps case
    as a data table named "Endpoints Data," providing a summary of all found endpoints.
