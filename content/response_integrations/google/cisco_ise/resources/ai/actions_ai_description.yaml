Unquarantine Address:
  ai_description: >-
    ### General Description

    This action unquarantines endpoint devices in Cisco ISE using their IP addresses.
    It is designed to restore network access to a previously isolated device by clearing
    its Adaptive Network Control (ANC) quarantine status. The action first resolves
    the provided IP address to a MAC address using the Cisco ISE UI API and then issues
    a command to clear the quarantine.


    ### Parameters Description

    There are no action-specific parameters for this action. It relies on the target
    entities (IP Addresses) provided in the context and the global integration configuration
    (API Root, Username, Password, Verify SSL).


    ### Additional Notes

    *   **MAC Resolution:** This action requires the Cisco ISE UI API to be accessible
    to resolve IP addresses to MAC addresses. If the resolution fails, the unquarantine
    process for that specific entity will fail.

    *   **Permissions:** The configured user must have sufficient privileges in Cisco
    ISE to clear ANC endpoint policies.


    ### Flow Description

    1.  **Configuration Retrieval:** Extracts the API Root, Username, Password, and
    SSL verification settings from the integration configuration.

    2.  **Entity Filtering:** Identifies all `ADDRESS` (IP) entities within the current
    scope.

    3.  **MAC Resolution:** For each IP address, it queries the Cisco ISE UI API to
    retrieve the corresponding MAC address.

    4.  **Unquarantine Execution:** Sends a PUT request to the Cisco ISE ANC endpoint
    clear endpoint (`/ers/config/ancendpoint/clear`) using the resolved MAC address.

    5.  **Result Reporting:** Tracks successful unquarantine operations and any errors
    encountered during the process, providing a summary message at the end.
