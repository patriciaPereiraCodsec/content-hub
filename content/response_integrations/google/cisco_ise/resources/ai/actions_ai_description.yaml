Update Endpoint:
  ai_description: >-
    ### General Description

    Updates endpoint object properties in Cisco ISE for specific IP address entities.
    This action allows security analysts to modify various attributes of an endpoint,
    including its description, group membership, and a wide range of Mobile Device
    Management (MDM) details such as compliance status, OS, and encryption state.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Description | String | No | The new description to set for the endpoint. |

    | Group ID | String | No | The ID of the endpoint group to which the endpoint
    should be assigned. |

    | Portal User | String | No | The portal user associated with the endpoint. |

    | Identity Store | String | No | The name of the identity store. |

    | Identity Store ID | String | No | The ID of the identity store. |

    | Custom Attributes | String | No | A JSON-formatted string (dictionary) of custom
    attributes to be added to the endpoint (e.g., `{"key": "value"}`). |

    | MDM Server Name | String | No | The name of the MDM server managing the device.
    |

    | MDM Reachable | Boolean | No | Whether the device is reachable via MDM. |

    | MDM Enrolled | Boolean | No | Whether the device is enrolled in MDM. |

    | MDM Compliance Status | Boolean | No | The compliance status of the device.
    |

    | MDM OS | String | No | The operating system of the device. |

    | MDM Manufacturer | String | No | The manufacturer of the device. |

    | MDM Model | String | No | The model of the device. |

    | MDM Encrypted | Boolean | No | Whether the device is encrypted. |

    | MDM Pinlock | Boolean | No | Whether the device has a pinlock enabled. |

    | MDM Jail Broken | Boolean | No | Whether the device is jailbroken or rooted.
    |

    | MDM IMEI | String | No | The IMEI number of the device. |

    | MDM Phone Number | String | No | The phone number associated with the device.
    |


    ### Additional Notes

    - The **Custom Attributes** parameter must be a valid JSON string representing
    a dictionary. If the format is incorrect, the action will fail.

    - The action first resolves the IP address (ADDRESS entity) to a MAC address using
    the Cisco ISE UI API before performing the update.


    ### Flow Description

    1. **MAC Resolution**: For each provided IP address (ADDRESS entity), the action
    calls the Cisco ISE UI API to retrieve the corresponding MAC address.

    2. **Data Retrieval**: The action fetches the current endpoint object from Cisco
    ISE using the resolved MAC address.

    3. **Attribute Modification**: The retrieved endpoint object is updated locally
    with the values provided in the action parameters (Description, Group ID, MDM
    fields, etc.).

    4. **External Update**: The action sends a PUT request to the Cisco ISE API to
    save the modified endpoint object.

    5. **Result Reporting**: The action tracks which endpoints were successfully updated
    and reports any errors encountered during the process.
