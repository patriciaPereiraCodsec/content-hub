Ping:
  ai_description: >-
    Verifies connectivity to the Cisco ISE server. This action performs a test connection
    to ensure that the integration can communicate with the Cisco ISE API using the
    provided configuration parameters (API Root, Username, Password, and SSL verification
    settings). ### Parameters description: There are no specific parameters for this
    action. ### Additional notes: This action is primarily used for health checks
    and troubleshooting connectivity issues between Google SecOps and Cisco ISE. ###
    Flow description: 1. **Configuration Extraction**: Retrieves the API Root, Username,
    Password, and SSL verification settings from the integration configuration. 2.
    **Manager Initialization**: Initializes the CiscoISEManager with the retrieved
    credentials and establishes a session. 3. **Connectivity Test**: Executes a GET
    request to the Cisco ISE session service node endpoint (/ers/config/sessionservicenode).
    4. **Result Handling**: If the request is successful and returns a valid response,
    the action concludes with a 'Connection Established' message; otherwise, it reports
    'Connection Failed'.
