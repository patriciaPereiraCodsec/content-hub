Terminate Session:
  ai_description: >-
    This action terminates an active network session on a Cisco ISE node via the Monitoring
    and Troubleshooting (MnT) API. It uses a Change of Authorization (CoA) disconnect
    request to force a session termination for a specific calling station.


    ### Flow Description:

    1. **Authentication**: The action establishes a connection to the Cisco ISE manager
    using the provided credentials and API root.

    2. **Parameter Extraction**: It retrieves the target Node Server Name, the Calling
    Station ID (typically the MAC address), and the termination type from the action
    parameters.

    3. **API Execution**: It sends a request to the Cisco ISE MnT API endpoint specifically
    designed for session disconnection.

    4. **Result Handling**: The action confirms whether the termination request was
    successfully sent to the ISE node and updates the action status accordingly.


    ### Parameters Description:

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Node Server Name | String | Yes | The name of the Cisco ISE node server where
    the session is active (e.g., ciscoISE). |

    | Calling Station ID | String | Yes | The identifier of the calling station to
    be disconnected, usually the MAC address. |

    | Terminate Type | Integer | No | Defines the type of termination: 0 (DYNAMIC_AUTHZ_PORT_DEFAULT),
    1 (DYNAMIC_AUTHZ_PORT_BOUNCE), or 2 (DYNAMIC_AUTHZ_PORT_SHUTDOWN). Defaults to
    0. |


    ### Additional Notes:

    - This action does not run on entities automatically; it requires manual input
    of the Calling Station ID and Node Server Name.

    - The termination type determines how the network port reacts (e.g., simply disconnecting,
    bouncing the port, or shutting it down).
