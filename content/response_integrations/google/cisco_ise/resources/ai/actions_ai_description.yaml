Get Sessions:
  ai_description: >-
    ### General Description

    Retrieves a list of active sessions from the Cisco ISE (Identity Services Engine)
    platform. This action provides visibility into current network connections, allowing
    security analysts to monitor active sessions across the infrastructure.


    ### Parameters

    There are no parameters for this action.


    ### Flow Description

    1. **Authentication**: The action establishes a connection to the Cisco ISE API
    using the configured API Root, Username, and Password.

    2. **Session Retrieval**: It executes a GET request to the session service node
    endpoint (`/ers/config/sessionservicenode`) to fetch the current list of active
    sessions.

    3. **Data Transformation**: The raw JSON response containing session resources
    is flattened and converted into a CSV format for better readability.

    4. **Reporting**: The action attaches a data table named 'Sessions' to the case
    containing the session details and returns a summary message indicating the total
    number of active sessions found.
