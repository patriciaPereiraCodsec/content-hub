List Endpoint Identity Group:
  ai_description: >-
    ### General Description

    Lists available endpoint identity groups from Cisco ISE. This action allows users
    to discover and retrieve information about defined identity groups, which are
    used to categorize endpoints within the Cisco ISE environment. It supports filtering
    results by specific fields and limiting the number of records returned.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Filter Key** | String (Dropdown) | No | Specifies the attribute to use for
    filtering the endpoint identity groups. Options typically include 'Name'. |

    | **Filter Logic** | String (Dropdown) | No | Defines the comparison logic for
    the filter. Options include 'Equal' or 'Contains'. |

    | **Filter Value** | String | No | The specific string value to search for based
    on the selected key and logic. |

    | **Max Records To Return** | Integer | No | The maximum number of group records
    to retrieve. Must be a positive integer up to 100. Default is 100. |


    ### Additional Notes

    * **Filter Dependency:** If a 'Filter Logic' is selected, a 'Filter Key' must
    also be selected, otherwise the action will fail.

    * **Empty Filter Value:** If 'Filter Key' and 'Filter Logic' are provided but
    'Filter Value' is left empty, the filter will not be applied, and the action will
    return all results up to the limit.

    * **Record Limit:** The action strictly enforces a maximum limit of 100 records
    as per Cisco ISE API constraints.


    ### Flow Description

    1. **Initialization:** Retrieves integration configuration (API Root, Credentials)
    and action parameters.

    2. **Validation:** Checks if the 'Filter Key' is provided when 'Filter Logic'
    is used and ensures the 'Max Records To Return' is within the valid range (1-100).

    3. **API Connection:** Estantiates the Cisco ISE Manager, which handles authentication
    and session management.

    4. **Data Retrieval:** Executes a GET request to the Cisco ISE ERS API (`/ers/config/endpointgroup`)
    with the specified filter parameters and size limit.

    5. **Processing:** Parses the API response into structured `EndpointGroup` objects.

    6. **Output:** If groups are found, it populates a data table named 'Available
    Endpoint Entity Groups' and attaches the raw JSON results to the action output.
