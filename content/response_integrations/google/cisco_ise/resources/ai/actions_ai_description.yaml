Quarantine Address:
  ai_description: >-
    ### General Description

    Quarantines endpoint devices in Cisco ISE by applying a specific network policy
    based on their IP address. This action is used to isolate potentially compromised
    hosts from the network by leveraging Cisco ISE's Adaptive Network Control (ANC)
    capabilities.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Policy Name | String | Yes | The name of the ANC policy (e.g., 'Quarantine',
    'Isolate') to be applied to the endpoint in Cisco ISE. |


    ### Flow Description

    1. **Entity Filtering:** The action identifies all `ADDRESS` (IP) entities provided
    in the current context.

    2. **MAC Address Resolution:** For each IP address, the action performs a lookup
    via the Cisco ISE UI API to find the corresponding MAC address, as the quarantine
    operation requires a hardware identifier.

    3. **Quarantine Execution:** The action sends a PUT request to the Cisco ISE ERS
    API to apply the specified 'Policy Name' to the resolved MAC address.

    4. **Result Reporting:** The action tracks successful quarantines and any errors
    (e.g., MAC not found, API errors) and returns a summary message to the Google
    SecOps case wall.


    ### Additional Notes

    This action requires both the ERS (External RESTful Services) and UI API components
    of Cisco ISE to be enabled and accessible.
