Add Endpoint To Endpoint Identity Group:
  ai_description: >-
    ### General Description

    This action adds specified endpoints to a designated Endpoint Identity Group within
    Cisco ISE. It supports both IP Address and MAC Address entities. The action is
    typically used in network security workflows to dynamically reassign devices to
    different security groups or segments based on detected behavior or administrative
    requirements.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Endpoint Identity Group Name | String | Yes | The name of the endpoint identity
    group in Cisco ISE to which the target endpoints will be added. |


    ### Flow Description

    1. **Group Identification**: The action queries Cisco ISE to retrieve the unique
    identifier (ID) for the Endpoint Identity Group specified in the parameters.

    2. **Entity Resolution**: For each target entity:
        * If the entity is an **IP Address**, the action performs a lookup in Cisco
    ISE to resolve the corresponding **MAC Address**.
        * If the entity is a **MAC Address**, it uses the identifier directly.
    3. **Endpoint Lookup**: The action searches for the endpoint's internal Cisco
    ISE ID using the resolved MAC address.

    4. **Group Assignment**: Once the endpoint ID is found, the action performs a
    PUT request to Cisco ISE to update the endpoint's configuration, specifically
    setting its `groupId` to the ID of the target identity group.

    5. **Result Aggregation**: The action collects the status of each operation and
    returns a summary of successful and failed additions, along with the raw JSON
    response from the API for each entity.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Updates the 'groupId' attribute of an endpoint in Cisco ISE via a PUT request
      to the /ers/config/endpoint/{id} endpoint, effectively changing the endpoint's
      group membership.
    fetches_data: true
    internal_data_mutation_explanation: null
