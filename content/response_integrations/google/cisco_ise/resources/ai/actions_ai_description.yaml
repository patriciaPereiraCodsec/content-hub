Enrich Endpoint:
  ai_description: >-
    ### General Description

    The **Enrich Endpoint** action retrieves detailed endpoint information from Cisco
    ISE for IP Address entities. It resolves the IP address to a MAC address and then
    fetches both standard endpoint data and extended visibility/enrichment data to
    provide comprehensive context for security investigations.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | API Root | String | Yes | The base URL of the Cisco ISE instance used for API
    calls. |

    | Username | String | Yes | The username for authenticating with the Cisco ISE
    API. |

    | Password | String | Yes | The password for authenticating with the Cisco ISE
    API. |

    | Verify SSL | Boolean | Yes | Determines whether to verify the SSL certificate
    of the Cisco ISE server. |


    ### Flow Description

    1. **Entity Filtering:** The action identifies all `ADDRESS` (IP) entities within
    the current context.

    2. **MAC Address Resolution:** For each IP address, the action queries the Cisco
    ISE UI API to find the associated MAC address.

    3. **Endpoint Data Retrieval:** Using the MAC address, the action performs a GET
    request to the Cisco ISE ERS API to retrieve basic endpoint details.

    4. **Extended Enrichment:** The action performs an additional query to the Cisco
    ISE UI API to fetch extended visibility and enrichment data for the endpoint.

    5. **Data Integration:** The retrieved data is flattened and merged. The action
    then updates the entity's `additional_properties`, sets the `is_enriched` flag
    to true, and attaches a detailed data table to the entity in the Google SecOps
    UI.


    ### Additional Notes

    This action relies on both the External RESTful Services (ERS) API and the UI
    API of Cisco ISE. Ensure the provided credentials have sufficient permissions
    for both interfaces.
