Get Url Status:
  ai_description: >-
    ### General Description

    Enriches URL entities by querying the Phishing Initiative API to determine their
    reputation and status. This action helps security analysts identify known phishing
    URLs by retrieving real-time data from the Phishing Initiative database.


    ### Parameters Description

    This action does not require any input parameters.


    ### Additional Notes

    The action specifically targets URL entities and will mark them as suspicious
    if the Phishing Initiative service categorizes them as "phishing".


    ### Flow Description

    1. **Initialization**: The action initializes the Phishing Initiative manager
    using the API Root and API Token from the integration configuration.

    2. **Entity Filtering**: It iterates through the target entities, selecting only
    those of type URL.

    3. **API Query**: For each URL entity, it performs a lookup via the Phishing Initiative
    API.

    4. **Data Processing**:
       - If the URL is found (status is not "not submitted"), it adds the status to
    the entity's additional properties and marks the entity as enriched.
       - If the status is explicitly "phishing", the entity is marked as suspicious.
    5. **Internal Updates**: The action updates the entities within Google SecOps
    with the new metadata.

    6. **Final Output**: It returns a summary message of the found URLs and their
    statuses, along with a JSON result containing the raw API data.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
  categories:
    enrichment: true
  entity_usage:
    entity_types:
    - DestinationURL
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: true
    filters_by_identifier: false
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: false
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
Ping:
  ai_description: >-
    ### General Description

    The **Ping** action is a diagnostic tool used to verify the connectivity between
    Google SecOps and the Phishing Initiative service. It validates that the integration's
    configuration parameters, such as the API Root and API Token, are correct and
    that the service is reachable over the network.


    ### Parameters Description

    There are no parameters for this action.


    ### Flow Description

    1. **Configuration Retrieval**: The action fetches the 'Api Root' and 'Api Token'
    from the Phishing Initiative integration settings.

    2. **Manager Initialization**: It initializes the Phishing Initiative API manager
    with the provided credentials.

    3. **Connectivity Check**: The action executes a URL lookup request for a hardcoded
    dummy URL (http://www.antiphishing.org/) to verify the API's responsiveness.

    4. **Status Reporting**: Based on the API response, the action returns a success
    message ('Connection Established') or a failure message ('Connection Failed').
