name: Qualys VM - Detections Connector
parameters:
-   name: DeviceProductField
    default_value: Product Name
    type: string
    description: Enter the source field name in order to retrieve the Product Field
        name.
    is_mandatory: true
    is_advanced: false
    mode: regular
-   name: EventClassId
    default_value: event_type
    type: string
    description: Enter the source field name in order to retrieve the Event Field
        name.
    is_mandatory: true
    is_advanced: false
    mode: regular
-   name: Environment Field Name
    default_value: ''
    type: string
    description: Describes the name of the field where the environment name is stored.
        If the environment field isn't found, the environment is the default environment.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Environment Regex Pattern
    default_value: .*
    type: string
    description: A regex pattern to run on the value found in the "Environment Field
        Name" field. Default is .* to catch all and return the value unchanged. Used
        to allow the user to manipulate the environment field via regex logic. If
        the regex pattern is null or empty, or the environment value is null, the
        final environment result is the default environment.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: PythonProcessTimeout
    default_value: 180
    type: integer
    description: Timeout limit for the python process running the current script.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: API Root
    default_value: ''
    type: string
    description: API Root of the Qualis VM instance.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Username
    default_value: ''
    type: string
    description: Username of the Qualis VMDR instance.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Password
    default_value: ''
    type: password
    description: Password of the Qualis VMDR instance.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Verify SSL
    default_value: true
    type: boolean
    description: If enabled, verify the SSL certificate for the connection to the
        Qualys VM server is valid.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Lowest Severity To Fetch
    default_value: 1
    type: integer
    description: 'Lowest severity that will be used to fetch detections. If nothing
        is provided, the connector will fetch all detections. Maximum: 5.'
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Status Filter
    default_value: NEW, ACTIVE, RE-OPENED
    type: string
    description: 'Status filter for the connector. If nothing is provided, the connector
        will ingest detections with "New, Active, Re-Opened" statuses. Possible values:
        NEW, ACTIVE, FIXED, RE-OPENED.'
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Ingest Ignored Detections
    default_value: false
    type: boolean
    description: If enabled, the connector will ingest ignored detections.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Ingest Disabled Detections
    default_value: false
    type: boolean
    description: If enabled, the connector will ingest disabled detections.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Grouping Mechanism
    default_value: Detection
    type: string
    description: 'Grouping mechanism that will be used to create Siemplify Alerts.
        Possible values: Host, Detection, None. If Host is provided, the connector
        will create 1 Siemplify alert containing all of the detection related to the
        host. If Detection is provided, the connector will create 1 Siemplify Alert
        containing information about all of the hosts that have that detection. If
        None or invalid value is provided, the connector will create a new Siemplify
        alert for each separate detection per host.'
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Use whitelist as a blacklist
    default_value: false
    type: boolean
    description: If enabled, whitelist will be used as a blacklist.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Proxy Server Address
    default_value: ''
    type: string
    description: The address of the proxy server to use.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Proxy Username
    default_value: ''
    type: string
    description: The proxy username to authenticate with.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Proxy Password
    default_value: ''
    type: password
    description: The proxy password to authenticate with.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: X-Requested-With Header
    default_value: Google SecOps SOAR
    type: string
    description: On behalf of whom, the API requests need to be executed in the integration
    is_mandatory: true
    is_advanced: false
    mode: script
description: 'Pull detections from Qualys VM. Note: whitelist works with "Type" parameter.'
integration: QualysVM
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/qualysvm#qualys-vm-detections-connector
rules: []
is_connector_rules_supported: false
creator: admin
