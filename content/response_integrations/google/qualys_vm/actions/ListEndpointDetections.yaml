name: List Endpoint Detections
description: 'List endpoint detections in Qualys VM. Supported entities: IP Address,
    Hostname.'
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/qualysvm#list_endpoint_detections
integration_identifier: QualysVM
parameters:
-   name: Status Filter
    default_value: New, Active, Re-Opened
    type: string
    description: 'Specify a comma-separated list of statuses that should be used during
        ingestion. If nothing is provided, the action will ingest detections with
        New, Active, Re-Opened statuses. Possible values: New, Active, Re-Opened,
        Fixed'
    is_mandatory: false
-   name: Lowest Severity To Fetch
    default_value: Medium
    type: ddl
    optional_values:
    - Info
    - Low
    - Medium
    - High
    - Critical
    description: Specify the lowest severity that will be used to fetch detections.
    is_mandatory: false
-   name: Max Detections To Return
    default_value: '50'
    type: string
    description: 'Specify how many detections to return per entity. Default: 50. Maximum:
        200.'
    is_mandatory: false
-   name: Ingest Ignored Detections
    default_value: 'false'
    type: boolean
    description: If enabled, action will also return ignored detections.
    is_mandatory: false
-   name: Ingest Disabled Detections
    default_value: 'false'
    type: boolean
    description: If enabled, action will also return disabled detections.
    is_mandatory: false
-   name: Create Insight
    default_value: 'true'
    type: boolean
    description: If enabled, action will create an insight containing information
        about vulnerabilities found on the entity.
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/ListEndpointDetections_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: Admin
simulation_data_json: '{"Entities": ["ADDRESS","HOSTNAME"]}'
script_result_name: success
