name: Launch VM Scan And Fetch Results
description: 'Launch vulnerability scan on a host in your network and fetch results.
    NOTICE! This action will automatically new hosts to Qualys as assets. Please note
    that your license limit number of hosts depends on your subscription. Supported
    entities: IP Address.'
integration_identifier: QualysVM
parameters:
-   name: Title
    default_value: ''
    type: string
    description: The scan title. This can be a maximum of 2000 characters (ascii)
    is_mandatory: false
-   name: Processing Priority
    default_value: ''
    type: string
    description: 'Specify a value of 0 - 9 to set a processing priority level for
        the scan. When not specified, a value of 0 (no priority) is used. Valid values
        are: 0 for No Priority (the default), 1 for Emergency, 2 for Ultimate,3 for
        Critical, 4 for Major, 5 for High, 6 for Standard 7 for Medium, 8 for Minor
        and 9 for Low'
    is_mandatory: true
-   name: Scan Profile
    default_value: ''
    type: string
    description: 'The title of the compliance option profile to be used. One of these
        parameters must be specified in a request: option_title or option_id. For
        example: Qualys Top 20 Options.'
    is_mandatory: true
-   name: Scanner Appliance
    default_value: ''
    type: string
    description: The friendly names of the scanner appliances to be used or "External"
        for external scanners. Multiple entries are comma separated.
    is_mandatory: false
-   name: Network
    default_value: ''
    type: string
    description: The ID of a network used to filter the IPs/ranges specified in the
        "ip" parameter. Set to a custom network ID (note this does not filter IPs/ranges
        specified in "asset_groups" or "asset_group_ids"). Or set to "0" (the default)
        for the Global Default Network - this is used to scan hosts outside of your
        custom networks.
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/LaunchVmScan_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: Admin
is_async: true
simulation_data_json: '{"Entities": ["ADDRESS"]}'
script_result_name: scan_ref
