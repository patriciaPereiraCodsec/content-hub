Launch Compliance Report:
  ai_description: >-
    Launches a compliance report in Qualys VM based on a specified template and configuration.
    This action allows users to trigger report generation for specific IP ranges or
    asset groups directly from Google SecOps.


    ### Parameters Description


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Report Title | String | Yes | A user-defined title for the report (max 128 characters).
    |

    | Report Type | String | Yes | The name of the Qualys report template to use (e.g.,
    'Qualys Top 20 Report'). |

    | Output Format | String | Yes | The desired file format for the report (e.g.,
    'pdf', 'mht', 'html'). |

    | IPs/Ranges | String | No | Comma-separated IP addresses or ranges to override
    the report target defined in the template. |

    | Asset Groups | String | No | Comma-separated names of asset groups to include
    in the report. |

    | Scan Reference | String | No | A specific scan reference code to filter the
    report data. |


    ### Additional Notes

    - The action automatically resolves Asset Group names provided in the parameters
    to their corresponding Qualys IDs before launching the report.

    - It also resolves the 'Report Type' (template name) to its internal Qualys Template
    ID.


    ### Flow Description

    1. **Parameter Extraction:** Retrieves the report title, type, format, and optional
    targets (IPs, Asset Groups, Scan Reference) from the action input.

    2. **Asset Group Resolution:** For each provided Asset Group name, the action
    queries the Qualys API to find the matching Asset Group ID.

    3. **Template Resolution:** Queries Qualys to find the internal ID associated
    with the provided 'Report Type' template name.

    4. **Report Launch:** Sends a request to the Qualys API to initiate the compliance
    report generation using the gathered IDs and parameters.

    5. **Result Handling:** Returns the unique Report ID generated by Qualys upon
    successful initialization.
  capabilities:
    can_create_case_comments: false
