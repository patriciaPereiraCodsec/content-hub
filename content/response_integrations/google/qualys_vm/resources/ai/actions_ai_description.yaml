Launch Remediation Report:
  ai_description: >-
    ### General Description

    Launches a remediation report in the Qualys VM platform. This action allows users
    to trigger the generation of a report based on a specific template, defining the
    output format and targeting specific IP ranges or asset groups. It is primarily
    used to automate the reporting process for vulnerability remediation tracking.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Report Title | String | Yes | A user-defined title for the report (max 128 characters).
    |

    | Report Type | String | Yes | The name of the Qualys report template to use (e.g.,
    'Tickets per Asset Group'). |

    | Output Format | String | Yes | The desired file format for the report (e.g.,
    pdf, mht, html). |

    | IPs/Ranges | String | No | Comma-separated list of IPs or ranges to override
    the report target defined in the template. |

    | Asset Groups | String | No | Comma-separated list of asset group names to include
    in the report. |

    | Display Results For All tickets | Boolean | No | If true, includes all tickets
    in the account; if false (default), includes only tickets assigned to the current
    user. |


    ### Additional Notes

    This action does not run on entities. It uses the provided parameters to define
    the scope of the report. The action first resolves asset group names to their
    respective IDs and the template name to its ID before initiating the launch request.


    ### Flow Description

    1. **Parameter Extraction**: Retrieves the report title, template name, format,
    and target filters from the action configuration.

    2. **Asset Group Resolution**: If asset group names are provided, the action queries
    Qualys to find the corresponding internal Asset Group IDs.

    3. **Template Resolution**: Queries the Qualys API to find the internal ID associated
    with the provided 'Report Type' (template name).

    4. **Report Launch**: Sends a POST request to the Qualys API to launch the remediation
    report with the specified configuration.

    5. **Result Handling**: Captures the generated Report ID from the Qualys response
    and returns it as the action result.
