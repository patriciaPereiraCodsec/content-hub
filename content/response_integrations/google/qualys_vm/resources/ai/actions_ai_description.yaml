Launch Patch Report:
  ai_description: >-
    ### General Description

    Launches a patch report in the Qualys VM platform. This action allows users to
    initiate the generation of a vulnerability patch report based on a specific template,
    title, and output format. It can target specific IP ranges or asset groups, overriding
    the default targets defined in the template if provided.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Report Title | String | Yes | A user-defined title for the report (maximum 128
    characters). |

    | Report Type | String | Yes | The name of the Qualys Patch Report template to
    be used (e.g., 'Qualys Patch Report'). |

    | Output Format | String | Yes | The desired file format for the report. Supported
    values include 'pdf', 'online', 'xml', or 'csv'. |

    | IPs/Ranges | String | No | Comma-separated IP addresses or ranges to override
    the report target defined in the template. |

    | Asset Groups | String | No | Comma-separated list of asset group names to include
    in the report target. |


    ### Additional Notes

    This action does not run on entities. It uses the provided parameters to define
    the scope of the report. If 'Asset Groups' are provided by name, the action will
    automatically resolve them to their corresponding Qualys IDs before launching
    the report.


    ### Flow Description

    1. **Parameter Extraction**: Retrieves the report title, template name, output
    format, and optional targets (IPs and Asset Groups) from the action configuration.

    2. **Asset Group Resolution**: If asset group names are provided, the action queries
    the Qualys API to find the matching asset group IDs.

    3. **Template ID Retrieval**: Queries the Qualys platform to find the internal
    ID associated with the provided 'Report Type' (template name).

    4. **Report Launch**: Sends a POST request to the Qualys API to launch the patch
    report with the specified configuration.

    5. **Result Handling**: Captures the unique Report ID generated by Qualys and
    returns it as the action result.
