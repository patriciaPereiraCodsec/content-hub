    \ Notes\n- This action is primarily used for troubleshooting and initial setup\
    \ verification.\n- It performs a non-intrusive 'Read-Only' operation by attempting\
    \ to list reports to confirm API access.\n- According to standard SOAR practices,\
    \ Ping actions are not categorized as enrichment.\n\n### Flow Description\n1.\
    \ **Manager Initialization**: The action retrieves global configuration settings\
    \ (API Root, Credentials, SSL settings) to initialize the Qualys VM communication\
