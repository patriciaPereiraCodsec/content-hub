Download Report:
  ai_description: >-
    ### General Description

    The **Download Report** action retrieves a specific report from Qualys VM using
    its unique Report ID. It is designed to poll the Qualys system until the report
    generation is complete and then download the file (e.g., PDF, CSV) directly into
    the Google SecOps case as an attachment.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Report ID | String | Yes | The unique identifier of the Qualys report to be
    fetched. |


    ### Flow Description

    1. **Parameter Extraction**: The action retrieves the `Report ID` from the input
    parameters.

    2. **Status Polling**: The script enters a loop to check the status of the report
    via the Qualys API. It waits for the status to reach 'Finished'.

    3. **Error Handling**: If the report status indicates an error (e.g., Canceled,
    Paused, Error), the action fails with a descriptive message.

    4. **Data Retrieval**: Once the report is ready, the script fetches the binary
    content and metadata (title, format).

    5. **Output Generation**: The report is added as an attachment to the case, and
    the metadata is returned as a JSON result.


    ### Additional Notes

    - This action does not operate on entities; it requires a specific ID provided
    as a parameter.

    - The action includes a retry mechanism that sleeps for 1 second if the report
    is not yet initiated in the Qualys database.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
  categories:
