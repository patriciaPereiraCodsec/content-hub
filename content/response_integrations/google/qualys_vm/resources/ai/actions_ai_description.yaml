List Scans:
  ai_description: >-
    ### General Description

    Retrieves a list of vulnerability scans from Qualys VM that were launched within
    the past 30 days. This action provides visibility into recent scanning activity
    by fetching scan details such as status, target, title, and duration. The results
    are presented as a data table and a JSON object within the case. Sensitive information
    like user logins is automatically masked for security.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | None | N/A | N/A | This action does not require any input parameters. |


    ### Additional Notes

    This action is useful for auditing recent scan history and ensuring that scheduled
    or manual scans have completed successfully. It does not require any entity context
    to run.


    ### Flow Description

    1. **Authentication**: Establishes a connection to the Qualys VM API using the
    integration's configuration (API Root, Username, Password, and X-Requested-With
    Header).

    2. **Data Retrieval**: Executes a GET request to the Qualys scan endpoint to fetch
    scans from the last 30 days.

    3. **Data Sanitization**: Iterates through the retrieved scans and masks the 'USER_LOGIN'
    field with asterisks to protect user privacy.

    4. **Output Generation**: Converts the scan data into a CSV format for a data
    table and a JSON string for raw results.

    5. **Case Integration**: Adds the 'Scans' data table to the case and returns the
    final execution status and message.
