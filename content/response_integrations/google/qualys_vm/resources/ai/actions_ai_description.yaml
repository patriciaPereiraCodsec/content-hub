List Endpoint Detections:
  ai_description: >-
    ### General Description

    The **List Endpoint Detections** action retrieves a list of vulnerabilities (detections)
    associated with specific **IP Address** or **Hostname** entities from Qualys VM.
    It allows security analysts to gain visibility into the security posture of endpoints
    by fetching detailed vulnerability data, including QIDs, titles, diagnoses, and
    solutions.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Status Filter** | String | No | A comma-separated list of statuses to filter
    detections (e.g., "New, Active, Re-Opened, Fixed"). Defaults to "New, Active,
    Re-Opened". |

    | **Lowest Severity To Fetch** | String (Enum) | No | The minimum severity level
    (Info, Low, Medium, High, Critical) required for a detection to be returned. Defaults
    to "Medium". |

    | **Max Detections To Return** | Integer | No | The maximum number of detections
    to retrieve per entity. Must be between 1 and 200. Defaults to 50. |

    | **Ingest Ignored Detections** | Boolean | No | If true, includes detections
    marked as 'ignored' in Qualys. Defaults to false. |

    | **Ingest Disabled Detections** | Boolean | No | If true, includes detections
    marked as 'disabled' in Qualys. Defaults to false. |

    | **Create Insight** | Boolean | No | If true, generates a detailed insight on
    the entity in Google SecOps. Defaults to true. |


    ### Additional Notes

    - If a **Hostname** entity is provided, the action first attempts to resolve it
    to an IP address using the Qualys API before fetching detections.

    - The action creates a **Data Table** for each entity containing the vulnerability
    details.


    ### Flow Description

    1. **Parameter Validation**: The action validates the `Max Detections To Return`
    (1-200) and maps the `Lowest Severity To Fetch` to Qualys-specific severity levels.

    2. **Entity Processing**: For each supported entity (IP or Hostname):
        - If the entity is a Hostname, it queries Qualys to find the corresponding
    IP address.
    3. **Fetch QIDs**: It requests a list of vulnerability IDs (QIDs) from Qualys
    for the target IP, applying the status, severity, and inclusion filters.

    4. **Fetch Details**: For the retrieved QIDs, it fetches full vulnerability metadata
    (Title, Diagnosis, Solution, etc.).

    5. **Internal Updates**:
        - Adds a **Data Table** to the case with the vulnerability list.
        - If enabled, creates an **Entity Insight** summarizing the findings.
        - Updates the entity's metadata in Google SecOps.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      The action updates entity attributes, adds data tables to the case, and generates
      entity insights based on the retrieved vulnerability data.
