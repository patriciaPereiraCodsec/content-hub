    external_data_mutation_explanation: >-
      Adds IP addresses as assets to the Qualys platform and initiates a new vulnerability
      scan task.
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entity additional properties with the scan reference ID, marks entities
      as enriched, attaches scan reports to the case, and creates data tables with
