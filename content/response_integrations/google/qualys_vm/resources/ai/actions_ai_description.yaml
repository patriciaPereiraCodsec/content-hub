Launch Scan Report:
  ai_description: >-
    ### General Description

    The **Launch Scan Report** action initiates the generation of a scan report within
    the Qualys VM platform. It allows users to programmatically trigger reports based
    on existing templates, targeting specific IP ranges or asset groups. This action
    is essential for automating the reporting phase of vulnerability management workflows.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Report Title** | String | Yes | A user-defined title for the report (maximum
    128 characters). |

    | **Report Type** | String | Yes | The name of the Qualys report template to use
    (e.g., 'Technical Report'). |

    | **Output Format** | String | Yes | The desired file format for the report. Supported
    values include `pdf`, `mht`, and `html`. |

    | **IPs/Ranges** | String | No | Comma-separated list of IP addresses or ranges
    to override the default targets defined in the template. |

    | **Asset Groups** | String | No | Comma-separated list of Qualys Asset Group
    names to include in the report. |

    | **Scan Reference** | String | No | Specifically for PCI compliance reports,
    this identifies the scan reference (e.g., `scan/12345`) to include. |


    ### Additional Notes

    - The action automatically resolves Asset Group names to their internal Qualys
    IDs before launching the report.

    - It also resolves the Template Name (Report Type) to its corresponding internal
    Template ID.

    - For PCI compliance reports, the `Scan Reference` parameter is typically required
    by the Qualys API.


    ### Flow Description

    1. **Parameter Extraction**: Retrieves the report title, template name, format,
    and target overrides (IPs/Asset Groups) from the action input.

    2. **Asset Group Resolution**: For each provided Asset Group name, the action
    queries Qualys to find the corresponding internal ID.

    3. **Template Resolution**: Queries Qualys to find the internal ID for the specified
    'Report Type' (template name).

    4. **Report Launch**: Sends a request to the Qualys API to start the report generation
    using the gathered IDs and parameters.

    5. **Result Handling**: Returns the unique `report_id` generated by Qualys upon
    successful initialization.
