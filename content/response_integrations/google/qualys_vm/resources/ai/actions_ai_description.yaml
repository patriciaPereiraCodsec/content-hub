Download Vm Scan Results:
  ai_description: "### General Description\nThe **Download Vm Scan Results** action\
    \ retrieves detailed vulnerability scan data from Qualys VM for a specific scan\
    \ identifier. It performs two primary functions: fetching the raw scan data in\
    \ JSON format and generating/downloading a PDF report based on the 'Executive\
    \ Report' template. This action is useful for security analysts who need to review\
    \ the findings of a specific scan directly within the Google SecOps platform.\n\
    \n### Parameters Description\n| Parameter | Type | Mandatory | Description |\n\
    | :--- | :--- | :--- | :--- |\n| **Scan ID** | String | Yes | The unique identifier\
    \ of the scan to retrieve. The expected format is `scan/{integer}.{integer}` (e.g.,\
    \ `scan/1533110666.07264`). |\n\n### Flow Description\n1. **Parameter Extraction:**\
    \ The action retrieves the mandatory `Scan ID` from the input.\n2. **Data Retrieval:**\
    \ It calls the Qualys VM API to fetch extended scan results for the provided ID.\n\
    3. **Report Generation:** The action initiates a request to Qualys to launch a\
    \ new scan report using the 'Executive Report' template in PDF format.\n4. **Polling:**\
    \ It enters a polling loop, checking the status of the report generation at regular\
    \ intervals until it reaches a 'Finished' state or the action execution deadline\
    \ is reached.\n5. **File Download:** Once the report is ready, the action downloads\
    \ the PDF content.\n6. **Output Generation:** \n    * The PDF report is added\
    \ as an attachment to the case.\n    * A 'Report Summary' data table is created.\n\
    \    * A 'Scan Results' data table containing the vulnerability findings is created.\n\
    \    * The full raw results are returned as a JSON object."
