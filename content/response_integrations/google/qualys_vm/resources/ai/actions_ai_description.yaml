Enrich Host:
  ai_description: >-
    Enriches IP Address and Hostname entities with detailed asset information retrieved
    from Qualys VM. This action requires the Qualys AssetView module to be active.
    It fetches comprehensive host metadata including Operating System, NetBIOS name,
    DNS data, and assigned tags.


    ### Parameters Description


    | Parameter | Type | Mandatory | Default | Description |

    | :--- | :--- | :--- | :--- | :--- |

    | Create Insight | Boolean | No | True | If enabled, the action will create a
    detailed insight on the entity containing all retrieved information such as IP,
    NetBIOS, DNS Domain, FQDN, OS, and Tags. |


    ### Flow Description


    1. **Initialization**: The action extracts the 'Create Insight' configuration
    and initializes the Qualys VM manager using provided credentials.

    2. **Connectivity Check**: It performs a connectivity test to ensure the Qualys
    API is reachable.

    3. **Entity Filtering**: It identifies suitable entities from the target list,
    specifically looking for IP Addresses and Hostnames.

    4. **Data Retrieval**: For each entity, it queries the Qualys API:
        * For IP Addresses, it fetches details using the IP.
        * For Hostnames, it fetches details using the NetBIOS name.
    5. **Enrichment**: If data is found, the action:
        * Updates the entity's additional properties with a 'Qualys' prefix.
        * Sets the entity as 'enriched'.
        * Adds a detailed data table to the entity.
        * Optionally creates a case insight if the 'Create Insight' parameter is enabled.
    6. **Finalization**: The action updates all processed entities in Google SecOps
    and returns a JSON result containing the raw data.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
