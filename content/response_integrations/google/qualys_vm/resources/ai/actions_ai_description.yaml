Launch VM Scan And Fetch Results:
  ai_description: >-
    Launches a Qualys Vulnerability Management (VM) scan on targeted IP Address entities
    and retrieves the resulting security data. This action operates asynchronously,
    first initiating the scan and then periodically checking for completion to fetch
    the final report. Notably, this action automatically adds the target IP addresses
    to the Qualys subscription as assets before scanning, which may impact license
    limits.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Title | String | No | The title of the scan. If left empty, a unique identifier
    will be automatically generated. |

    | Processing Priority | String | Yes | Sets the processing priority (0-9). 0 is
    No Priority, 1 is Emergency, and 9 is Low. |

    | Scan Profile | String | Yes | The title of the Qualys option profile to be used
    for the scan (e.g., 'Qualys Top 20 Options'). |

    | Scanner Appliance | String | No | The friendly name of the scanner appliance
    to use. Use 'External' for Qualys external scanners. |

    | Network | String | No | The ID of the network used to filter IPs. Default is
    '0' for the Global Default Network. |


    ### Additional Notes

    - This action is **Async**, meaning it will run in the background until the Qualys
    scan is finished.

    - It performs external mutations by adding hosts to the Qualys asset list and
    starting a scan task.


    ### Flow Description

    1. **Entity Filtering:** Filters the target entities to identify supported IP
    Address types.

    2. **Asset Registration:** For each identified IP, it calls the Qualys API to
    ensure the IP is added as a managed asset.

    3. **Scan Initiation:** Launches a VM scan in Qualys using the provided title,
    priority, and profile.

    4. **Internal Update:** Updates the entities in Google SecOps with the `qualys_last_scan_id`
    and marks them as enriched.

    5. **Status Monitoring (Async):** Periodically polls Qualys to check if the scan
    state is 'Finished'.

    6. **Report Generation:** Once the scan is complete, it requests a scan report
    from Qualys.

    7. **Data Retrieval:** Downloads the report file and fetches the raw scan results.

    8. **Case Enrichment:** Attaches the report file to the case and populates 'Report
    Summary' and 'Scan Results' data tables.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
