name: CA Service Desk Connector
parameters:
-   name: DeviceProductField
    default_value: device_product
    type: string
    description: The field name used to determine the device product
    is_mandatory: true
    is_advanced: false
    mode: regular
-   name: EventClassId
    default_value: description
    type: string
    description: The field name used to determine the event name (sub-type)
    is_mandatory: false
    is_advanced: false
    mode: regular
-   name: PythonProcessTimeout
    default_value: '60'
    type: string
    description: The timeout limit (in seconds) for the python process running current
        script
    is_mandatory: true
    is_advanced: false
    mode: regular
-   name: API Root
    default_value: ''
    type: string
    description: e.g. http://x.x.x.x:8080
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Username
    default_value: ''
    type: string
    description: Username
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Password
    default_value: ''
    type: password
    description: Password
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Ticket ID Field
    default_value: ref_num
    type: string
    description: Incident id field key as it appear at the ticket JSON e.g. ref_num
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Start Time Field
    default_value: open_date
    type: string
    description: Represent the key of the start time at the ticket. e.g. open_date
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: End Time Field
    default_value: last_mod_dt
    type: string
    description: Represent the key of the end time at the ticket. e.g. last_mod_dt
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Category Default Field
    default_value: category
    type: string
    description: Represent the category key at the ticket. e.g. category
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Category Fallback Field
    default_value: category.sym
    type: string
    description: e.g. category.sym
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: User ID Field
    default_value: customer.combo_name
    type: string
    description: Filter by user. e.g. customer.combo_name
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Ticket Fields
    default_value: customer.combo_name,category.sym,status.sym,priority.sym,active,log_agent.combo_name,assignee.combo_name,group.combo_name,affected_service.name,severity.sym,urgency.sym,impact.sym,problem.ref_num,resolution_code.sym,call_back_date,change.chg_ref_num,caused_by_chg.chg_ref_num,external_system_ticket,resolution_method.sym,symptom_code.sym,requested_by.combo_name,persistent_id,summary,description,open_date,last_mod_dt,resolve_date,close_date,ref_num
    type: string
    description: Comma separated. e.g. customer.combo_name,category.sym,status.sym,priority.sym,active,log_agent.combo_name,assignee.combo_name,group.combo_name,affected_service.name,severity.sym,urgency.sym,impact.sym,problem.ref_num,resolution_code.sym,call_back_date,change.chg_ref_num,caused_by_chg.chg_ref_num,external_system_ticket,resolution_method.sym,symptom_code.sym,requested_by.combo_name,persistent_id,summary,description,open_date,last_mod_dt,resolve_date,close_date,ref_num
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: List Of Users To Ignore
    default_value: ''
    type: string
    description: Comma separated. Filter incidents by users to ignore
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Categories List
    default_value: ''
    type: string
    description: Filter incidents by categories
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Groups List
    default_value: ''
    type: string
    description: Filter incidents by groups
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Proxy Server Address
    default_value: ''
    type: string
    description: The address of the proxy server to use.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Proxy Username
    default_value: ''
    type: string
    description: The proxy username to authenticate with.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Proxy Password
    default_value: ''
    type: password
    description: The proxy password to authenticate with.
    is_mandatory: false
    is_advanced: false
    mode: script
description: Fetch tickets from CA Desk Manager.
integration: CaServiceDesk
documentation_link: null
rules: []
is_connector_rules_supported: false
creator: admin
