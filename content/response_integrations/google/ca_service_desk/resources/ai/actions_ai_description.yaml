Assign Incident To User:
  ai_description: >-
    ### General Description

    Assigns a specific incident in CA Service Desk to a designated user. This action
    is used to manage ticket ownership within the CA Service Desk platform directly
    from Google SecOps.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Ticket ID | String | Yes | The reference number (ref_num) of the incident in
    CA Service Desk that needs to be assigned. |

    | Username | String | Yes | The username of the person to whom the incident should
    be assigned. |


    ### Flow Description

    1. **Authentication**: Establishes a session with the CA Service Desk SOAP API
    using provided credentials.

    2. **ID Retrieval**: Fetches the internal persistent identifier for the incident
    using the provided `Ticket ID`.

    3. **User Retrieval**: Fetches the internal system identifier for the user using
    the provided `Username`.

    4. **Update Operation**: Executes a SOAP `updateObject` request to modify the
    `assignee` field of the incident with the retrieved user identifier.

    5. **Verification**: Checks the API response to confirm if the update was successful
    and returns a status message to the case wall.
