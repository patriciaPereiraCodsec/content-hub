Assign To Group:
  ai_description: >-
    ### General Description

    Assigns a CA Service Desk incident to a specific group. This action is used to
    reassign tickets to different teams or departments within the CA Service Desk
    environment by updating the ticket's group attribute via the SOAP API.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Ticket ID | String | Yes | The reference number (Incident number) of the ticket
    to be assigned. |

    | Group | String | Yes | The name of the group to which the incident should be
    assigned. |


    ### Flow Description

    1. **Initialization**: Connects to the CA Service Desk SOAP API using the configured
    credentials (API Root, Username, and Password).

    2. **Handle Retrieval**: Retrieves the internal persistent ID for the provided
    Ticket ID (ref_num) from the external system.

    3. **Group Identification**: Retrieves the internal persistent ID for the target
    Group name from the external system.

    4. **Assignment**: Executes an `updateObject` SOAP call to change the 'group'
    field of the ticket to the target group's persistent ID.

    5. **Completion**: Returns a success message indicating the ticket has been reassigned
    to the specified group.
