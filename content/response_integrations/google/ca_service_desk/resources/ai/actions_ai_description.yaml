    \ designed to verify the connectivity between Google SecOps and the **CA Service\
    \ Desk** instance. Its primary purpose is to validate that the integration's configuration\u2014\
    specifically the API Root, Username, and Password\u2014is correct and that the\
    \ external service is reachable via the SOAP API.\n\n### Parameters Description\n\
    There are no parameters for this action.\n\n### Additional Notes\nThis action\
    \ is typically executed during the initial setup of the integration or when troubleshooting\
    \ communication issues between the platforms. It does not process any entities\
    \ or modify any data.\n\n### Flow Description\n1. **Configuration Retrieval**:\
    \ The action fetches the `Api Root`, `Username`, and `Password` from the integration's\
    \ configuration settings.\n2. **Manager Initialization**: It initializes the `CaSoapManager`\
    \ which sets up the SOAP client using the provided URL.\n3. **Connectivity Test**:\
    \ The action calls the `test_connectivity` method, which attempts to perform a\
    \ `login` operation against the CA Service Desk SOAP service.\n4. **Result Reporting**:\
    \ If the login is successful, it returns a 'Connection Established' message; otherwise,\
    \ it returns 'Connection Failed'."
