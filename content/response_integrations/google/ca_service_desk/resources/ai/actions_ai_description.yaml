Add Comment:
  ai_description: >-
    ### General Description

    Adds a comment to an existing incident in CA Service Desk. This action allows
    users to append notes or updates to a specific ticket directly from Google SecOps,
    facilitating communication and documentation within the CA Service Desk platform.


    ### Parameters Description


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Ticket ID | String | Yes | The reference number of the incident (e.g., '338').
    This is used to identify the specific ticket in CA Service Desk. |

    | Comment | String | Yes | The text content of the comment to be added to the
    incident. |


    ### Flow Description

    1. **Authentication**: The action establishes a session with the CA Service Desk
    SOAP API using the configured credentials (API Root, Username, and Password).

    2. **ID Resolution**: It retrieves the internal persistent identifier for the
    incident using the provided `Ticket ID` (reference number).

    3. **Comment Submission**: The action calls the `logComment` service to append
    the specified `Comment` to the identified incident.

    4. **Finalization**: The action returns a success message if the comment was successfully
    added, or an error message if the operation failed.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Adds a new comment entry to an existing incident record in the CA Service Desk
      system.
    fetches_data: false
    internal_data_mutation_explanation: null
