Sync Ticket History:
  ai_description: >-
    ### General Description

    This action synchronizes the activity history of a CA Service Desk ticket with
    a Google SecOps case. It retrieves all comments and activity logs associated with
    a ticket (identified by the alert's external ID) and attaches them as individual
    comments to the case wall. This ensures that analysts have a complete audit trail
    and communication history from the external ticketing system directly within the
    SecOps environment.


    ### Parameters Description

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Comment Type Field | String | No | The specific field name in the CA Service
    Desk activity log that identifies the type of comment (e.g., 'Log Comment'). Defaults
    to `type.sym`. |

    | Analyst Name Field | String | No | The field name in the CA Service Desk activity
    log representing the analyst's name. Defaults to `analyst.combo_name`. |

    | TimeStamp Field | String | No | The field name in the CA Service Desk activity
    log representing the creation time of the comment. Defaults to `time_stamap`.
    |


    ### Additional Notes

    - The action relies on the `external_id` of the current alert to match the ticket
    in CA Service Desk.

    - It fetches the entire history from the beginning of the ticket's lifecycle (start
    time 0).

    - Timestamps from CA Service Desk are converted from Unix time to UTC for display
    in the case wall.


    ### Flow Description

    1. **Initialization**: Connects to the CA Service Desk SOAP API using provided
    credentials.

    2. **Context Retrieval**: Extracts the ticket reference number from the `external_id`
    of the current Google SecOps alert.

    3. **Data Fetching**: Queries the CA Service Desk `alg` (Activity Log) table for
    all entries associated with the ticket ID.

    4. **Processing**: Iterates through each retrieved log entry, extracting the description,
    analyst name, comment type, and timestamp based on the provided parameter mappings.

    5. **Internal Mutation**: Formats the data into a readable string and adds it
    as a new comment to the Google SecOps case wall for each entry found.

    6. **Completion**: Returns a summary of the number of comments synchronized and
    provides the raw data in the JSON result.
  capabilities:
    can_create_case_comments: true
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Adds ticket history entries from CA Service Desk as comments to the Google SecOps
      case wall.
  categories:
