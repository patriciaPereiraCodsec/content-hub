Create Ticket:
  ai_description: >-
    ### General Description

    Creates a new ticket (incident) in CA ServiceDesk. This action allows for the
    automated creation of service requests or incidents directly from a Google SecOps
    playbook, facilitating integration with IT Service Management (ITSM) workflows.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Summary | String | Yes | The summary or title of the incident to be created.
    |

    | Description | String | Yes | A detailed description of the incident. |

    | Category Name | String | Yes | The name of the category/area in CA ServiceDesk
    (e.g., 'Software'). |

    | Group Name | String | Yes | The name of the group to which the ticket should
    be assigned. |

    | Username | String | Yes | The username of the requester or reporter. |

    | Custom Fields | String | No | A JSON-formatted string containing additional
    field-value pairs to be included in the ticket. If the same field is provided
    in 'Custom Fields' and other parameters, 'Custom Fields' takes priority. |


    ### Flow Description

    1. **Parameter Extraction**: The action retrieves the necessary API configuration
    (Root URL, credentials) and action-specific parameters.

    2. **ID Resolution**: The action communicates with CA ServiceDesk to resolve the
    provided Category Name, Group Name, and Username into their corresponding internal
    system identifiers (UUIDs/Handles).

    3. **Data Preparation**: It merges the standard ticket fields with any provided
    custom fields from the 'Custom Fields' parameter.

    4. **Ticket Creation**: A SOAP request is sent to the CA ServiceDesk API to create
    the incident.

    5. **Result Handling**: If successful, the action returns the new ticket's reference
    number (ID) and marks the execution as completed.
