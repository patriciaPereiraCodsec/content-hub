Change Ticket Status:
  ai_description: >-
    ### General Description

    Changes the status of a specific ticket in CA Service Desk Manager. This action
    allows users to programmatically update the lifecycle state of an incident (e.g.,
    moving it to 'Closed' or 'In Progress') directly from Google SecOps.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Ticket ID | String | Yes | The unique incident number (reference number) of
    the ticket to be updated. |

    | Status | String | Yes | The target status name to apply to the ticket (e.g.,
    'Closed', 'Open', 'Resolved'). |


    ### Additional Notes

    This action does not run on entities. It requires a valid Ticket ID and a status
    name that exists within the CA Service Desk environment. The action uses the SOAP
    API to resolve names to internal IDs before performing the update.


    ### Flow Description

    1. **Authentication**: Initializes a SOAP session with CA Service Desk using the
    provided API Root, Username, and Password.

    2. **Status Resolution**: Queries the external system to find the internal system
    ID associated with the provided 'Status' string.

    3. **Ticket Resolution**: Queries the external system to find the internal persistent
    ID associated with the provided 'Ticket ID' (reference number).

    4. **Mutation**: Executes an `updateObject` SOAP call to modify the 'status' field
    of the identified ticket with the new status ID.

    5. **Completion**: Returns a success message and the result of the update operation
    to the SecOps platform.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
