Wait For Status Change:
  ai_description: "### General Description\nThe **Wait For Status Change** action\
    \ is an asynchronous utility designed to monitor a specific ticket in CA Service\
    \ Desk until its status matches a user-defined expected value. This action is\
    \ primarily used for workflow synchronization, ensuring that subsequent automated\
    \ steps only proceed once an external ticket has reached a certain state (e.g.,\
    \ 'Closed' or 'Resolved').\n\n### Parameters Description\n| Parameter | Type |\
    \ Mandatory | Description |\n| :--- | :--- | :--- | :--- |\n| **Ticket ID** |\
    \ String | Yes | The unique identifier (ref_num) of the target CA Service Desk\
    \ ticket to monitor. |\n| **Expected Ticket Status Name** | String | Yes | The\
    \ specific status name (e.g., 'Open', 'Closed', 'Resolved') that the action is\
    \ waiting for. |\n\n### Additional Notes\n- This action is **Asynchronous**. If\
    \ the ticket status does not match the expected value immediately, the action\
    \ will enter an 'In Progress' state and periodically poll the CA Service Desk\
    \ API until the condition is met or the action times out.\n- The action retrieves\
    \ specific ticket fields upon completion, which are defined in the 'Ticket Fields'\
    \ integration configuration.\n\n### Flow Description\n1. **Connection**: The action\
    \ initializes a connection to the CA Service Desk SOAP API using the configured\
    \ credentials.\n2. **Initial Check**: It retrieves the current status of the ticket\
    \ specified by the `Ticket ID` parameter.\n3. **Comparison**: \n    - If the current\
    \ status matches the `Expected Ticket Status Name`, the action fetches the full\
    \ incident data (based on configured fields) and completes immediately.\n    -\
    \ If the status does not match, the action sets its state to `IN_PROGRESS`.\n\
    4. **Polling (Async)**: The `query_job` function is executed periodically by the\
    \ SOAR engine to re-check the ticket status.\n5. **Completion**: Once the ticket\
    \ status matches the expected value, the action retrieves the final ticket data,\
    \ adds it to the result JSON, and marks the execution as `COMPLETED`."
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
