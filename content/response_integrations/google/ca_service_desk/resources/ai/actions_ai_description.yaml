Close Ticket:
  ai_description: >-
    Closes a specific incident in CA ServiceDesk Manager using the SOAP API. This
    action allows users to programmatically resolve or shut down tickets by providing
    the ticket's reference number and a mandatory closing reason which is recorded
    in the activity log.


    ### Parameters Description


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Ticket ID | String | Yes | The reference number (ref_num) of the incident to
    be closed in CA ServiceDesk. |

    | Close Reason | String | Yes | A descriptive note explaining why the ticket is
    being closed. This text is added to the Close activity log in the external system.
    |


    ### Flow Description


    1.  **Authentication**: The action establishes a session with the CA ServiceDesk
    SOAP API using the configured credentials.

    2.  **Handle Resolution**: It retrieves the internal persistent identifier (handle)
    for the incident using the provided 'Ticket ID'.

    3.  **Ticket Closure**: It invokes the `closeTicket` SOAP method, passing the
    internal handle and the 'Close Reason'.

    4.  **Result Verification**: The action checks if the closure was successful by
    verifying the returned handle from the API and reports the status back to Google
    SecOps.
