Search Tickets:
  ai_description: >-
    ### General Description

    Searches for tickets in CA Service Desk Manager based on user-defined criteria.
    This action allows users to find specific incidents by their ID or filter through
    tickets using summary text, description content, and status within a specified
    timeframe. It retrieves detailed ticket information based on the fields configured
    in the integration settings.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Incident ID | String | No | A specific Incident ID to filter by. If provided,
    the action will fetch this specific ticket and ignore other filters. |

    | Summary | String | No | Summary content to filter by. Uses a 'like' match. |

    | Description | String | No | Description content to filter by. Uses a 'like'
    match. |

    | Status | String | No | Filter by ticket status (e.g., 'Open'). |

    | Days Backwards | String | No | Number of days to look back for tickets based
    on their last modification time. Defaults to 1 if not specified. |


    ### Flow Description

    1. **Initialization**: The action connects to the CA Service Desk SOAP API using
    provided credentials and retrieves the list of ticket fields to be returned from
    the integration configuration.

    2. **Parameter Parsing**: It collects search filters and calculates the start
    timestamp for the search based on the 'Days Backwards' parameter.

    3. **Search Logic**:
        - If an **Incident ID** is provided, the action attempts to fetch that specific
    incident directly.
        - If no ID is provided, it performs a query using the **Summary**, **Description**,
    and **Status** filters for tickets modified within the calculated timeframe.
    4. **Data Enrichment**: For each incident found, the action retrieves the specific
    fields defined in the 'Ticket Fields' configuration.

    5. **Reporting**: The results are compiled into a data table named 'Tickets' and
    attached to the Google SecOps case. The raw data is also provided as a JSON result.


    ### Additional Notes

    If the 'Incident ID' parameter is populated, it takes precedence over all other
    search filters. The 'Ticket Fields' configuration in the integration settings
    determines which data points (e.g., priority, assignee, description) are included
    in the output table.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      The action adds a data table named 'Tickets' to the Google SecOps case containing
      the details of the retrieved tickets.
