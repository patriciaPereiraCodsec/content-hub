name: Sync Ticket History
description: Fetch and attach the entire ticket history to an alert
integration_identifier: CaServiceDesk
parameters:
-   name: Comment Type Field
    default_value: ''
    type: string
    description: Ticket type. e.g. type.sym
    is_mandatory: false
-   name: Analyst Name Field
    default_value: ''
    type: string
    description: Analyst Name. e.g. analyst.combo_name
    is_mandatory: false
-   name: TimeStamp Field
    default_value: ''
    type: string
    description: Time field e.g. time_stamap.
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/sync_ticket_history_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
script_result_name: ScriptResult
