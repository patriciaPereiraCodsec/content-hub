name: Create Ticket
description: Create new ticket in CA ServiceDesk.
integration_identifier: CaServiceDesk
parameters:
-   name: Summary
    default_value: ''
    type: string
    description: Incident's summary text
    is_mandatory: true
-   name: Description
    default_value: ''
    type: string
    description: Incident's description text
    is_mandatory: true
-   name: Category Name
    default_value: ''
    type: string
    description: Incident's area name. e.g. Software
    is_mandatory: true
-   name: Group Name
    default_value: ''
    type: string
    description: Group name. e.g. Test
    is_mandatory: true
-   name: Username
    default_value: ''
    type: string
    description: User name
    is_mandatory: true
-   name: Custom Fields
    default_value: ''
    type: string
    description: 'Specify a JSON object containing all of the needed fields and values.
        The structure is the following: {"field”:”value"}. If the same field is provided
        in the “Custom Fields“ parameter and other parameters, the “Custom Fields“  parameter
        value has priority.'
    is_mandatory: false
dynamic_results_metadata: []
creator: admin
script_result_name: ticket_id
