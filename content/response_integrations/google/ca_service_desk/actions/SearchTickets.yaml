name: Search Tickets
description: Search tickets in CA Desk Manager by field
integration_identifier: CaServiceDesk
parameters:
-   name: Incident ID
    type: string
    description: Incident ID to filter by
    is_mandatory: false
-   name: Summary
    type: string
    description: Summary content to filter by
    is_mandatory: false
-   name: Description
    type: string
    description: 'Description content to filter by '
    is_mandatory: false
-   name: Status
    default_value: ''
    type: string
    description: Filter by status. e.g. Open
    is_mandatory: false
-   name: Days Backwards
    default_value: ''
    type: string
    description: Get results from 'x' days backwards. e.g. 5'
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/search_tickets_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: System
