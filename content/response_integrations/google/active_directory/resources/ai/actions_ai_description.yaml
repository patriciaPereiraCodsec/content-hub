    * **SSL Requirement**: Active Directory typically requires an encrypted (LDAPS/SSL)
    connection to allow password changes. Ensure the 'Use SSL' configuration is enabled.

    * **Password Policy**: If the action fails with an 'incorrect password' error
    message, it usually indicates that the provided password did not meet the domain's
    complexity or history requirements.
