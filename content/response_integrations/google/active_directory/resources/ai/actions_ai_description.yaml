Force password update:
  ai_description: >-
    ### General Description

    This action forces a user to update their password upon their next login to Active
    Directory. It targets User entities and modifies the 'pwdLastSet' attribute in
    the Active Directory database to a value of '0', which triggers the mandatory
    password change requirement for the account.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Server | String | Yes | The IP address or hostname of the Active Directory server.
    |

    | Username | String | Yes | The username used to authenticate with the Active
    Directory server. |

    | Password | String | Yes | The password used to authenticate with the Active
    Directory server. |

    | Domain | String | Yes | The Active Directory domain (e.g., example.com). |

    | Use SSL | Boolean | Yes | If enabled, uses SSL (LDAPS) for the connection. |

    | Custom Query Fields | String | No | Comma-separated list of additional LDAP
    attributes to include in the search. |

    | CA Certificate File | String | No | Base64 encoded string of the CA certificate
    for SSL verification. |


    ### Additional Notes

    This action requires administrative privileges in Active Directory to modify user
    attributes. It specifically targets the 'pwdLastSet' attribute. If the user is
    not found in the directory, the action will report a failure for that specific
    entity.


    ### Flow Description

    1. **Initialization**: The action retrieves connection details (Server, Credentials,
    Domain) from the integration configuration.

    2. **Connection**: It establishes a connection to the Active Directory server
    using the `ldap3` library, optionally using SSL and a provided CA certificate.

    3. **Entity Filtering**: It identifies all `USER` entities provided in the action
    scope.

    4. **User Lookup**: For each user entity, it queries Active Directory to find
    the corresponding Distinguished Name (DN) using configured query fields.

    5. **Attribute Modification**: It executes an LDAP modification command to set
    the `pwdLastSet` attribute to '0' for the identified DN.

    6. **Result Reporting**: The action tracks successes and failures, providing a
    summary message and a boolean result indicating if any updates were successful.
  capabilities:
