Enrich entities:
  ai_description: >-
    ### General Description

    Enriches **Hostname** and **User** entities with detailed properties from **Active
    Directory**. This action allows security analysts to automatically pull contextual
    information such as account status, group memberships, manager details, and organizational
    unit paths directly into the Google SecOps case to aid in investigation and response.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Mark entities as internal | Boolean | No | If enabled, successfully enriched
    entities will have their `is_internal` flag set to `true` within the platform.
    |

    | Specific Attribute Names To Enrich With | String | No | A comma-separated list
    of specific Active Directory attributes to retrieve (e.g., `mail, department,
    title`). If left empty, the action attempts to enrich with all available attributes.
    |

    | Should Case Wall Table be filtered by the specified Attributes? | Boolean |
    No | If enabled, the visual data table displayed on the Case Wall will only show
    the attributes explicitly listed in the 'Specific Attribute Names' parameter.
    |

    | Should JSON result be filtered by the specified Attributes? | Boolean | No |
    If enabled, the raw JSON output for the action will only contain the attributes
    explicitly listed in the 'Specific Attribute Names' parameter. |


    ### Flow Description

    1. **Initialization**: The action establishes a connection to the Active Directory
    server using the provided credentials and server configuration (supporting LDAP
    or LDAPS).

    2. **Entity Identification**: It identifies all supported entities (Users and
    Hostnames) within the current alert or case scope.

    3. **Data Retrieval**: For each entity, the action queries Active Directory for
    its attributes. It uses recursive logic to resolve nested group memberships for
    user entities.

    4. **Attribute Filtering**: If specific attributes were requested via parameters,
    the action filters the retrieved data to match those requirements.

    5. **Internal Enrichment**: The action updates the entity's `additional_properties`
    in Google SecOps with the retrieved data (prefixed with `AD_`) and sets the `is_enriched`
    flag to `true`.

    6. **Internal Flagging**: If the 'Mark entities as internal' parameter is set,
    the action updates the entity's internal status.

    7. **Reporting**: It generates a formatted CSV table for the Case Wall and attaches
    the JSON result to the action output for further automation steps.

    8. **Persistence**: Finally, it commits all entity updates back to the Google
    SecOps platform.


    ### Additional Notes

    - The action is designed to be asynchronous, meaning it can handle large batches
    of entities by processing them in iterations to avoid platform timeouts.

    - Attribute names provided in the filtering parameters are case-sensitive.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entity additional properties with Active Directory attributes, sets
      the is_enriched flag, optionally updates the is_internal flag, and adds data
      tables to the case wall.
