    can_update_entities: false
    external_data_mutation_explanation: >-
      Disables the user account in Active Directory by modifying the 'userAccountcontrol'
      attribute to include the 'ACCOUNTDISABLE' flag.
    fetches_data: true
    internal_data_mutation_explanation: null
