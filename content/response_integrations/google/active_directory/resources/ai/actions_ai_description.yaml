    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **New Password** | String | Yes | The new password to be assigned to the target
    user entity. This password must comply with the organization's Active Directory
    password policy (complexity, length, etc.). |


    ### Flow Description

    1. **Initialization**: The action retrieves Active Directory connection details
    (Server, Domain, Credentials, SSL settings) from the integration configuration.

    2. **Entity Filtering**: It identifies all `USERUNIQNAME` entities within the
    current alert or case scope.

    3. **Connectivity**: Establishes a connection to the Active Directory server.
    If SSL is enabled, it validates the certificate if provided.

    4. **Password Update**: For each identified user entity, the action calls the
    Active Directory `modify_password` extended operation to set the new password.

    5. **Result Handling**: The action tracks which users were successfully updated
    and which failed. Failures often occur if the password does not meet complexity
    requirements or if an SSL connection is not established (which is a requirement
    for password changes in AD).


