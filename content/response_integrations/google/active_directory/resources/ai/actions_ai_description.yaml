    the integration's configuration parameters (Server, Credentials, Domain, SSL settings).

    2. **Entity Filtering**: It identifies all `USERUNIQNAME` entities within the
    current context.

    3. **Group Retrieval**: For each identified user, the action queries Active Directory
    to retrieve a complete list of groups the user belongs to. This process includes
    a recursive search to account for nested group memberships.

    4. **Membership Verification**: The action compares the user's retrieved group
    list against the provided `GroupName` parameter.

    5. **Result Compilation**: It records a boolean result (True/False) for each entity
    and constructs a summary message detailing which users were found in the group
    and which were not found in the directory.

    6. **Final Output**: The results are returned as a JSON object mapping entity
    identifiers to their membership status.
