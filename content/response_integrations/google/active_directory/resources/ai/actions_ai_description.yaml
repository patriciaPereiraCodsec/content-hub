Update attributes of an AD User:
  ai_description: >-
    ### General Description

    Updates specific attributes of existing Active Directory user entities. This action
    allows security analysts to programmatically modify user properties such as descriptions,
    phone numbers, or other LDAP-compliant attributes directly from the Google SecOps
    interface.


    ### Parameters Description

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Attribute Name | String | Yes | The name of the LDAP attribute to update (e.g.,
    'Description', 'telephoneNumber'). Defaults to 'Description'. |

    | Attribute Value | String | Yes | The new value to be assigned to the specified
    attribute. |


    ### Additional Notes

    - The action requires valid Active Directory credentials and server details configured
    in the integration settings.

    - It specifically targets entities of type `USER`.

    - If the attribute is unique or non-editable (read-only), the update will fail
    for that specific entity.


    ### Flow Description

    1. **Initialization**: The action initializes the `ActiveDirectoryManager` using
    the provided server, domain, and credential parameters.

    2. **Entity Filtering**: It identifies target entities and filters them to ensure
    only `USER` types are processed.

    3. **User Identification**: For each user entity, the action searches Active Directory
    to locate the user's Distinguished Name (DN) using identifiers like `sAMAccountName`
    or `mail`.

    4. **Attribute Modification**: It performs an LDAP `MODIFY_REPLACE` operation
    to update the specified attribute with the provided value.

    5. **Outcome Tracking**: The action tracks successful updates, missing users (not
    found in AD), and failures (e.g., invalid attributes or permission errors), providing
    a detailed summary in the final output message.
