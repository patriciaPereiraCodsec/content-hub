Change User OU:
  ai_description: >-
    ### General Description

    Changes the Organizational Unit (OU) for User entities in Active Directory. This
    action allows administrators to move user objects between different logical containers
    within the directory structure, which is typically used for organizational restructuring
    or applying different Group Policy Objects (GPOs).


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | OU Name | String | Yes | The name of the target Organizational Unit where the
    user(s) should be moved. |


    ### Flow Description

    1. **Initialization**: Connects to the Active Directory server using the integration's
    configuration (Server, Domain, Credentials, SSL settings).

    2. **Entity Filtering**: Filters the target entities to identify those of type
    'USER'.

    3. **Lookup**: For each identified user, the action queries Active Directory to
    retrieve the user's current Distinguished Name (DN) and searches for the target
    OU's Distinguished Name based on the provided 'OU Name'.

    4. **Execution**: If both the user and the target OU are found, it executes an
    LDAP `modify_dn` operation to move the user object to the new parent container.

    5. **Reporting**: Tracks successful and failed operations, returning a summary
    message to the Google SecOps case wall.
