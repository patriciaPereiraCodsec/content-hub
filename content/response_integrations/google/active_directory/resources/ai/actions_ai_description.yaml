Add User To Group:
  ai_description: "### General Description\nThis action adds specified User entities\
    \ to one or more Active Directory groups. It is primarily used for access management,\
    \ containment (e.g., moving a user to a restricted group), or administrative automation.\
    \ The action interacts with an Active Directory server via LDAP to modify group\
    \ membership.\n\n### Parameters Description\n| Parameter | Type | Mandatory |\
    \ Description |\n| :--- | :--- | :--- | :--- |\n| Group Name | String | Yes |\
    \ A comma-separated list of Active Directory group names (e.g., 'Domain Admins,\
    \ VPN_Users') to which the identified users should be added. |\n\n### Flow Description\n\
    1. **Initialization**: Retrieves Active Directory connection settings (Server,\
    \ Credentials, Domain, SSL) and the target group names from the action parameters.\n\
    2. **Entity Filtering**: Identifies all `USERUNIQNAME` entities within the current\
    \ scope.\n3. **Group Parsing**: Converts the comma-separated 'Group Name' string\
    \ into a unique list of target groups.\n4. **LDAP Operations**: For each user\
    \ entity, the action iterates through the target groups and performs an LDAP `MODIFY_ADD`\
    \ operation on the group's 'member' attribute using the user's Distinguished Name\
    \ (DN).\n5. **Result Handling**: \n    * Tracks successful additions.\n    * Identifies\
    \ if a user was already a member of a group.\n    * Catches errors such as 'User\
    \ Not Found', 'Group Not Found', or 'Insufficient Access Rights'.\n6. **Final\
    \ Output**: Produces a summary message detailing which users were added to which\
    \ groups and sets the action's success status based on whether any modifications\
    \ were successfully processed."
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      The action modifies the 'member' attribute of group objects within the external
      Active Directory system to add user accounts to those groups.
    fetches_data: true
    internal_data_mutation_explanation: null
