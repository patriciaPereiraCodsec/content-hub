Remove User From Group:
  ai_description: >-
    ### General Description

    Removes User entities from one or more specified Active Directory groups. This
    action is used for containment or access management, allowing security teams to
    revoke group-based permissions for compromised or suspicious accounts directly
    from Google SecOps.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Group Name | String | Yes | A comma-separated list of Active Directory groups
    (e.g., 'Domain Admins, VPN_Users') from which the target users should be removed.
    |


    ### Additional Notes

    - The action gracefully handles scenarios where a user is already not a member
    of a specified group, reporting it as a successful state rather than a failure.

    - It requires valid Active Directory credentials with sufficient permissions to
    modify group memberships (specifically the 'member' attribute of the group objects).


    ### Flow Description

    1. **Initialization**: Establishes a connection to the Active Directory server
    using the provided integration configuration (Server, Domain, Credentials, SSL).

    2. **Parameter Parsing**: Converts the comma-separated 'Group Name' input into
    a unique list of target groups.

    3. **Entity Filtering**: Identifies all 'USER' entities within the current alert
    or case scope.

    4. **User Verification**: For each user entity, the action queries Active Directory
    to verify the user's existence and retrieves their current group memberships.

    5. **Membership Removal**: If a user is identified as a member of a target group,
    the action sends an LDAP `MODIFY_DELETE` request to the group's 'member' attribute
    to remove the user's Distinguished Name (DN).

    6. **Result Aggregation**: Tracks the outcome for every user-group pair, distinguishing
    between successful removals, users already absent from groups, and errors (e.g.,
    insufficient permissions or missing groups).

    7. **Final Reporting**: Returns a detailed summary message to the case wall and
    sets the action result to true if at least one user was successfully processed
    or verified as not in the group.
