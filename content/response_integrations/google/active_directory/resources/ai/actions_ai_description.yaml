Set User Password:
  ai_description: >-
    ### General Description

    The **Set User Password** action allows security analysts to programmatically
    update the password for a specific user account within Active Directory. This
    is primarily used for account recovery, security resets after a compromise, or
    administrative password management. The action requires a secure SSL connection
    to the Active Directory server to perform the password modification.


