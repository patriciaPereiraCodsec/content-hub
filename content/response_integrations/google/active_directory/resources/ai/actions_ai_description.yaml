Get Group Members:
  ai_description: "### General Description\nThis action retrieves the list of members\
    \ (either Users or Hosts) belonging to a specific group within Active Directory.\
    \ It is designed to provide visibility into group memberships, supporting both\
    \ direct and nested (recursive) searches. The action is asynchronous and handles\
    \ large datasets through pagination, ensuring that results are fetched efficiently\
    \ up to a user-defined limit.\n\n### Parameters Description\n| Parameter | Type\
    \ | Mandatory | Description |\n| :--- | :--- | :--- | :--- |\n| **Group Name**\
    \ | String | Yes | The name of the Active Directory group for which you want to\
    \ retrieve members. |\n| **Members Type** | Dropdown | Yes | Specifies the type\
    \ of members to fetch. Options are 'User' or 'Host'. This determines the `objectCategory`\
    \ used in the LDAP query. |\n| **Perform Nested Search** | Boolean | Yes | If\
    \ set to `True`, the action performs a recursive search to find all members, including\
    \ those in sub-groups (using the LDAP_MATCHING_RULE_IN_CHAIN OID). If `False`,\
    \ only direct members are returned. |\n| **Limit** | Integer | Yes | The maximum\
    \ number of members to retrieve from Active Directory. This controls the pagination\
    \ loop and total results returned. |\n\n### Flow Description\n1. **Initialization**:\
    \ The action initializes the `ActiveDirectoryManager` using the integration's\
    \ configuration (Server, Credentials, Domain, SSL settings).\n2. **Group Resolution**:\
    \ It first resolves the provided **Group Name** to its Distinguished Name (DN)\
    \ to ensure the group exists and to use it as a reference for the membership query.\n\
    3. **Query Execution**: \n    * If it's the first run, it starts a new LDAP search\
    \ for members of the specified **Members Type** belonging to the group.\n    *\
    \ If **Perform Nested Search** is enabled, it applies the recursive matching rule\
    \ to the LDAP filter.\n4. **Pagination & State Management**: The action uses LDAP\
    \ paging. If the number of members exceeds the page size or the **Limit** hasn't\
    \ been reached but more data is available (indicated by a cookie), the action\
    \ saves its state (current results and pagination cookie) and enters an 'In Progress'\
    \ state.\n5. **Completion**: Once all members are fetched or the **Limit** is\
    \ reached, the action compiles the list of members (Common Name, Display Name,\
    \ and Distinguished Name) and attaches it as a JSON result to the case."
