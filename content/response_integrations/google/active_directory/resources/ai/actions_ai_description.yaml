Enable computer:
  ai_description: >-
    ### General Description

    Enables a computer account in Active Directory. This action is used to reactivate
    disabled computer accounts within the domain, typically as part of a remediation
    or recovery workflow. It targets Hostname entities and modifies their account
    control status directly in the directory service.


    ### Parameters Description

    This action does not have any action-specific parameters. It relies on the following
    integration-level configuration parameters:


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Server | String | Yes | The IP address or hostname of the Active Directory server.
    |

    | Username | String | Yes | The administrative username used to authenticate with
    the AD server. |

    | Password | String | Yes | The password for the administrative user. |

    | Domain | String | Yes | The Active Directory domain (e.g., example.com). |

    | Use SSL | Boolean | Yes | Indicates whether to use a secure SSL connection for
    LDAP communication. |

    | Custom Query Fields | String | No | A comma-separated list of additional LDAP
    fields to query during the search. |

    | CA Certificate File | String | No | A Base64 encoded string of the CA certificate
    used for SSL validation. |


    ### Flow Description

    1. **Initialization**: The action initializes the `ActiveDirectoryManager` using
    the integration's configuration settings (Server, Credentials, Domain, etc.).

    2. **Entity Filtering**: It identifies all `HOSTNAME` entities provided in the
    action context.

    3. **LDAP Search**: For each hostname, the action performs an LDAP search to locate
    the corresponding computer object in the directory using common host attributes
    (e.g., `dNSHostName`, `cn`).

    4. **Account Activation**: If the computer object is found, the action sends a
    modify request to Active Directory to set the `userAccountcontrol` attribute to
    `4096` (the standard value for an enabled computer account).

    5. **Result Aggregation**: The action tracks which entities were successfully
    enabled, which were not found in the directory, and which encountered errors,
    providing a detailed summary in the output message.
