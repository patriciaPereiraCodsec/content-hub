Change Host OU:
  ai_description: >-
    ### General Description

    This action changes the Organizational Unit (OU) of a Hostname entity within Active
    Directory. It is primarily used for administrative tasks such as moving compromised
    hosts to a quarantine OU or reorganizing network assets. The action connects to
    the Active Directory server, locates the host and the target OU, and performs
    a Distinguished Name (DN) modification to relocate the object.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **OU Name** | String | Yes | The name of the target Organizational Unit (OU)
    where the host should be moved. Note: The metadata description mentions 'user's
    OU', but the logic specifically targets Host objects. |


    ### Additional Notes

    - The action requires valid Active Directory credentials (Username, Password,
    Domain) and server details configured in the integration settings.

    - It uses the `modify_dn` LDAP operation, which changes the parent container of
    the host object.


    ### Flow Description

    1. **Initialization**: The action retrieves Active Directory connection details
    (Server, Credentials, SSL settings) and the target **OU Name**.

    2. **Entity Filtering**: It identifies all `HOSTNAME` entities provided in the
    current Google SecOps context.

    3. **LDAP Search**: For each host, it queries Active Directory to find the host's
    current Distinguished Name (DN) and the target OU's Distinguished Name.

    4. **Relocation**: It executes a `modify_dn` command to move the host object from
    its current location to the new superior container (the target OU).

    5. **Reporting**: The action tracks which hosts were successfully moved and which
    failed, providing a summary message and setting the final execution status.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      The action modifies the Active Directory database by changing the 'distinguishedName'
      of a computer object, effectively moving it to a different Organizational Unit
      (OU).
    fetches_data: true
    internal_data_mutation_explanation: null
