Enable account:
  ai_description: >-
    ### General Description

    The **Enable account** action allows security analysts to reactivate a disabled
    user account within Microsoft Active Directory directly from the Google SecOps
    platform. This is typically used during incident remediation when a previously
    locked or disabled account is deemed safe to restore.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Server | String | Yes | The IP address or FQDN of the Active Directory server.
    |

    | Username | String | Yes | The administrative username for LDAP authentication.
    |

    | Password | String | Yes | The password for the administrative user. |

    | Domain | String | Yes | The target Active Directory domain (e.g., 'domain.local').
    |

    | Use SSL | Boolean | Yes | Specifies whether to use a secure LDAPS connection.
    |

    | Custom Query Fields | String | No | Optional comma-separated list of LDAP attributes
    to include in the search. |

    | CA Certificate File | String | No | Base64 encoded string of the CA certificate
    for SSL verification. |


    ### Additional Notes

    - The action specifically targets `USER` entity types.

    - It uses bitwise operations on the `userAccountcontrol` attribute to toggle the
    `ACCOUNTDISABLE` flag (0x02).

    - If an account is already enabled, the action will report it as such without
    attempting a redundant modification.


    ### Flow Description

    1. **Initialization**: The action extracts configuration parameters and initializes
    the `ActiveDirectoryManager` to establish a connection with the LDAP server.

    2. **Entity Filtering**: It identifies all `USER` entities within the current
    alert context.

    3. **Timeout Check**: For each entity, it verifies if the execution deadline has
    passed to prevent script timeouts.

    4. **Account Lookup**: It queries Active Directory for the specific user using
    the entity's identifier.

    5. **Status Verification**: It checks the `userAccountcontrol` attribute to determine
    if the account is already enabled.

    6. **Account Activation**: If the account is disabled, it performs an LDAP `MODIFY_REPLACE`
    operation on the `userAccountcontrol` attribute to enable the account.

    7. **Result Reporting**: It tracks successful activations, accounts already active,
    and failures, providing a summary message at the end of the execution.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Modifies the 'userAccountcontrol' attribute of the user object in Active Directory
      to remove the 'ACCOUNTDISABLE' flag (0x02), thereby enabling the account.
    fetches_data: true
    internal_data_mutation_explanation: null
