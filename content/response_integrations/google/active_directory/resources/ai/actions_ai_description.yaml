Ping:
  ai_description: >-
    ### General Description

    Tests the connectivity to the Active Directory server using the provided credentials
    and configuration. This action ensures that the Google SecOps platform can successfully
    communicate with the Active Directory environment by attempting to bind to the
    LDAP server and performing a basic search query.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Server | String | Yes | The IP address or hostname of the Active Directory server.
    |

    | Username | String | Yes | The username used to authenticate with the Active
    Directory server. |

    | Password | String | Yes | The password used to authenticate with the Active
    Directory server. |

    | Domain | String | Yes | The Active Directory domain (e.g., example.com). |

    | Use SSL | Boolean | Yes | Specifies whether to use a secure SSL connection for
    the LDAP communication. |

    | Custom Query Fields | String | No | A comma-separated list of additional LDAP
    attributes to include in the test query. |

    | CA Certificate File | String | No | A Base64 encoded string of the CA certificate
    file used for SSL validation if 'Use SSL' is enabled. |


    ### Flow Description

    1. **Parameter Initialization**: The action retrieves the connection details including
    the server address, domain, credentials, and SSL settings from the integration
    configuration.

    2. **Manager Initialization**: It initializes the `ActiveDirectoryManager`, which
    handles the LDAP connection logic, including TLS setup if a CA certificate is
    provided.

    3. **Connectivity Test**: The action invokes the `test_connectivity` method. This
    method attempts to bind to the LDAP server and performs a search query for the
    provided username to verify that the connection is active and the credentials
    have the necessary permissions to read from the directory.

    4. **Result Reporting**: If the LDAP search returns a result without errors, the
    action completes with a success status and a 'Connection Established' message.
    If any step fails (e.g., authentication failure, network timeout), an exception
    is caught, and the action reports a failure.
