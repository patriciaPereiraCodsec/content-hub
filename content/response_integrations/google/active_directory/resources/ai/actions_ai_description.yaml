Disable account:
  ai_description: >-
    ### General Description

    Disables user accounts in Active Directory. This action is used to programmatically
    lock out users by modifying their account control flags in the directory service,
    typically as a response to a security incident or offboarding request.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Server | String | Yes | The IP address or hostname of the Active Directory server.
    |

    | Username | String | Yes | The username of the service account used to authenticate
    with Active Directory. |

    | Password | String | Yes | The password of the service account used to authenticate
    with Active Directory. |

    | Domain | String | Yes | The Active Directory domain (e.g., example.com). |

    | Use SSL | Boolean | Yes | Specifies whether to use a secure SSL (LDAPS) connection.
    |

    | Custom Query Fields | String | No | A comma-separated list of additional Active
    Directory attributes to search against when identifying the user. |

    | CA Certificate File | String | No | A Base64 encoded string of the CA certificate
    file used for SSL validation. |


    ### Additional Notes

    - The action specifically targets entities of type `USERUNIQNAME`.

    - It uses bitwise operations on the `userAccountcontrol` attribute to set the
    `ACCOUNTDISABLE` flag (0x02).


    ### Flow Description

    1. **Initialization**: The action initializes the connection to Active Directory
    using the provided server, domain, and credentials.

    2. **Entity Filtering**: It identifies all `USERUNIQNAME` entities within the
    current scope.

    3. **User Lookup**: For each entity, it queries Active Directory to find the corresponding
    user object and retrieve its Distinguished Name (DN) and current `userAccountcontrol`
    value.

    4. **Account Modification**: It performs a bitwise OR operation on the current
    account control value to include the 'Disabled' flag and sends a modify request
    to the AD server.

    5. **Result Reporting**: The action tracks successful and failed modifications
    and returns a summary message to the case wall.
  capabilities:
