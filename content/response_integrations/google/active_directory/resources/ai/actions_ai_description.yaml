Release Locked Account:
  ai_description: >-
    ### General Description

    This action unlocks a locked user account in Active Directory by resetting the
    `lockoutTime` attribute. It is typically used in response to security incidents
    where a user account has been locked due to multiple failed login attempts or
    as part of a remediation workflow.


    ### Parameters Description

    There are no action-specific parameters for this action. It relies on the global
    integration configuration for Active Directory (Server, Domain, Username, Password,
    etc.).


    ### Additional Notes

    * The action specifically targets entities of type **USER**.

    * It requires the Active Directory integration to be properly configured with
    administrative credentials capable of modifying user attributes.


    ### Flow Description

    1. **Initialization**: The action initializes the `ActiveDirectoryManager` using
    the provided integration configuration parameters (Server, Domain, Credentials,
    SSL settings).

    2. **Entity Filtering**: It identifies and filters the target entities to process
    only those of type `USER`.

    3. **Account Search**: For each valid user entity, the action queries Active Directory
    to locate the user's Distinguished Name (DN) and verify their existence.

    4. **Unlock Operation**: It performs an LDAP modify operation on the user's object,
    setting the `lockoutTime` attribute to `0`, which effectively unlocks the account.

    5. **Result Tracking**: The action tracks which accounts were successfully unlocked
    and which failed, providing a summary message and a boolean result indicating
    overall success.
