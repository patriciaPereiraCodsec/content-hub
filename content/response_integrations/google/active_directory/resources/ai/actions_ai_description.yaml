Disable computer:
  ai_description: >-
    ### General Description

    This action disables computer accounts in Active Directory for the provided Hostname
    entities. It is primarily used for containment during security incidents to prevent
    a compromised machine from authenticating or interacting with the domain.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Server | String | Yes | The IP address or hostname of the Active Directory server.
    |

    | Username | String | Yes | The username used to authenticate with the Active
    Directory server. |

    | Password | String | Yes | The password used to authenticate with the Active
    Directory server. |

    | Domain | String | Yes | The Active Directory domain (e.g., example.com). |

    | Use SSL | Boolean | Yes | Specifies whether to use a secure SSL connection for
    the LDAP communication. |

    | Custom Query Fields | String | No | A comma-separated list of additional LDAP
    fields to include in the search query. |

    | CA Certificate File | String | No | A Base64 encoded string of the CA certificate
    file for SSL validation. |


    ### Additional Notes

    - The action specifically targets entities of type **HOSTNAME**.

    - It modifies the `userAccountControl` attribute in Active Directory to the value
    `4098` (Workstation/Server Account Disabled).


    ### Flow Description

    1. **Initialization**: The action connects to the Active Directory server using
    the provided credentials and configuration (SSL, Domain, etc.).

    2. **Entity Filtering**: It identifies all `HOSTNAME` entities within the current
    Google SecOps context.

    3. **Search**: For each Hostname, the action queries Active Directory to locate
    the corresponding computer object's Distinguished Name (DN).

    4. **Mutation**: If the computer object is found, the action sends an LDAP modification
    request to update the `userAccountControl` attribute, effectively disabling the
    computer account.

    5. **Reporting**: The action tracks which entities were successfully disabled,
    which were not found in AD, and which failed due to errors, providing a summary
    in the action output.
