Get Manager Contact Details:
  ai_description: >-
    ### General Description

    This action retrieves the contact details of a user's manager from Active Directory.
    It is primarily used for enrichment during an investigation to identify the reporting
    structure of a specific user entity. The action identifies the manager associated
    with a user and then fetches that manager's name and telephone number.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Server | String | Yes | The IP address or hostname of the Active Directory server.
    |

    | Username | String | Yes | The username used to authenticate with Active Directory.
    |

    | Password | String | Yes | The password used to authenticate with Active Directory.
    |

    | Domain | String | Yes | The Active Directory domain (e.g., example.com). |

    | Use SSL | Boolean | Yes | If enabled, the connection to Active Directory will
    use SSL/TLS. |

    | Custom Query Fields | String | No | A comma-separated list of additional LDAP
    fields to include in the search query. |

    | CA Certificate File | String | No | A Base64-encoded string of the CA certificate
    file for SSL validation. |


    ### Additional Notes

    - The action specifically looks for the `manager` attribute on the target user
    entity and then performs a follow-up query to get the `name` and `telephoneNumber`
    of that manager.

    - If no manager is found for a user, the action will report success but indicate
    that no manager details were available.


    ### Flow Description

    1. **Initialization**: The action initializes the Active Directory manager using
    the provided server, domain, and credentials.

    2. **Entity Filtering**: It filters the target entities to identify those of type
    `USERUNIQNAME`.

    3. **User Lookup**: For each user entity, it queries Active Directory to find
    the user's object and its `manager` attribute.

    4. **Manager Enrichment**: If a manager is identified, the action performs a second
    query to retrieve the manager's specific contact details (Name and Phone Number).

    5. **Data Update**: The retrieved manager details are added to the user entity's
    `additional_properties` (`AD_Manager_Name` and `AD_Manager_phone`).

    6. **Result Generation**: A data table containing the manager's contact information
    is attached to the entity, and the raw data is returned as a JSON result.
