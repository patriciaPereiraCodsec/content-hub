name: Search Active Directory
description: Search Active Directory with Siemplify, using your personal query.
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/active-directory#search_active_directory
integration_identifier: ActiveDirectory
parameters:
-   name: Query String
    default_value: ''
    type: string
    description: Specify the query string you would like to perform in AD.
    is_mandatory: true
-   name: Limit
    default_value: ''
    type: string
    description: Specify the maximum number of listings to fetch from Active Directory.
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/search_active_directory_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
is_async: true
simulation_data_json: '{"Entities":[]}'
