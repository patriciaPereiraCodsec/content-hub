name: Is User In Group
description: Check whether a user is a member of a specific group
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/active-directory#is_user_in_group
integration_identifier: ActiveDirectory
parameters:
-   name: GroupName
    default_value: ''
    type: string
    description: Group name to be checked. e.g. Administrators. Please make sure group
        name is spelled correctly, and exists in Active Directory.
    is_mandatory: true
dynamic_results_metadata:
-   result_example_path: resources/is_user_in_group_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
simulation_data_json: '{"Entities": ["USERUNIQNAME"]}'
