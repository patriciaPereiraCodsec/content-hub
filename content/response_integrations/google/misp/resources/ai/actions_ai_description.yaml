Create network-connection Misp Object:
  ai_description: "### General Description\nThis action creates a 'network-connection'\
    \ object within a specified MISP event. It allows users to document network traffic\
    \ details such as source/destination IPs, ports, hostnames, and protocols (Layer\
    \ 3, 4, and 7) directly into MISP. The action can either use manually provided\
    \ parameters or automatically extract IP addresses from the entities present in\
    \ the Google SecOps case.\n\n### Parameters Description\n| Parameter | Type |\
    \ Mandatory | Description |\n| :--- | :--- | :--- | :--- |\n| Event ID | String\
    \ | Yes | The ID or UUID of the MISP event where the object will be created. |\n\
    | Dst-port | String | No | The destination port for the network connection. |\n\
    | Src-port | String | No | The source port for the network connection. |\n| Hostname-src\
    \ | String | No | The source hostname. |\n| Hostname-dst | String | No | The destination\
    \ hostname. |\n| IP-Src | String | No | The source IP address. |\n| IP-Dst | String\
    \ | No | The destination IP address. |\n| Layer3-protocol | String | No | The\
    \ Layer 3 protocol (e.g., IPv4, IPv6). |\n| Layer4-protocol | String | No | The\
    \ Layer 4 protocol (e.g., TCP, UDP). |\n| Layer7-protocol | String | No | The\
    \ Layer 7 protocol (e.g., HTTP, DNS). |\n| Use Entities | Boolean | No | If enabled,\
    \ the action will iterate through IP Address entities in the case to create objects.\
    \ This takes priority over manual IP parameters. |\n| IP Type | Enum | No | Determines\
    \ if the entity IP should be mapped to 'Source IP' or 'Destination IP' in the\
    \ MISP object. Default is 'Source IP'. |\n\n### Additional Notes\nTo successfully\
    \ run the action, you must provide at least one of the following: 'Dst-port',\
    \ 'Src-port', 'IP-Src', 'IP-Dst', OR set 'Use Entities' to true. If 'Use Entities'\
    \ is true, the action will create a separate MISP object for every IP Address\
    \ entity found in the scope.\n\n### Flow Description\n1. **Initialization**: The\
    \ action retrieves MISP configuration (API Key, Root URL) and validates the provided\
    \ parameters.\n2. **Event Verification**: It checks if the specified 'Event ID'\
    \ exists in the MISP instance.\n3. **Data Collection**: \n    - If 'Use Entities'\
    \ is true, it identifies all 'ADDRESS' entities and maps them to either the source\
    \ or destination IP field based on the 'IP Type' parameter.\n    - If 'Use Entities'\
    \ is false, it uses the manually provided IP and port parameters.\n4. **Object\
    \ Creation**: For each set of data, it calls the MISP API to create a 'network-connection'\
    \ object using the standard MISP template.\n5. **Reporting**: It adds the resulting\
    \ JSON data to the action output and creates a data table on the Google SecOps\
    \ case wall summarizing the attributes added to MISP."
