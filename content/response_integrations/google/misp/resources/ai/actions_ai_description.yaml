Add Sighting to an Attribute:
  ai_description: >-
    Adds a sighting to specific attributes within the MISP (Malware Information Sharing
    Platform). This action allows security analysts to record occurrences of indicators,
    mark them as false positives, or set expiration sightings. It supports searching
    for attributes within a specific event or across all events, and can further filter
    targets by category, type, or object UUID.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Attribute Name | String | No | Comma-separated list of attribute values to target.
    |

    | Attribute UUID | String | No | Comma-separated list of attribute UUIDs to target.
    If both Name and UUID are provided, UUID is used. |

    | Event ID | String | No | The ID or UUID of the MISP event. Required if 'Attribute
    Search' is set to 'Provided Event'. |

    | Attribute Search | Dropdown | No | Determines if the search is restricted to
    the 'Provided Event' or 'All Events'. Default is 'Provided Event'. |

    | Sightings Type | Dropdown | Yes | The type of sighting to add: 'Sighting', 'False
    Positive', or 'Expiration'. |

    | Source | String | No | The source of the sighting (e.g., 'Chronicle SOAR', 'SIEM').
    |

    | Date Time | String | No | The timestamp for the sighting (Format: YYYY-MM-DD
    HH:MM:SS). |

    | Category | String | No | Comma-separated list of MISP categories (e.g., 'Payload
    delivery') to filter target attributes. |

    | Type | String | No | Comma-separated list of MISP attribute types (e.g., 'md5',
    'ip-src') to filter target attributes. |

    | Object UUID | String | No | The UUID of a specific MISP object to search within
    for attributes. |


    ### Additional Notes

    - If 'Attribute Search' is set to 'Provided Event', the 'Event ID' parameter must
    be populated.

    - If 'Object UUID' is provided, 'Event ID' must also be provided.

    - The action does not process SecOps entities; it operates based on the provided
    attribute identifiers in the parameters.


    ### Flow Description

    1. **Initialization**: Extracts MISP configuration and action parameters, validating
    that the provided categories are supported by MISP.

    2. **Search Scope**: Determines whether to search for attributes globally or within
    a specific event based on the 'Attribute Search' and 'Event ID' parameters.

    3. **Attribute Retrieval**: Fetches the target attributes from MISP using the
    provided names, UUIDs, and filters (Category, Type, Object UUID).

    4. **Sighting Creation**: Iterates through the found attributes and sends a POST
    request to the MISP API to add the specified sighting record.

    5. **Result Reporting**: Aggregates the results, providing a summary of successful
    and failed sighting additions and returning the raw JSON response from MISP.
