Add Attribute:
  ai_description: >-
    ### General Description

    Adds attributes (indicators) to a specific MISP event based on entities identified
    within a Google SecOps alert. This action allows security teams to programmatically
    populate MISP events with threat intelligence gathered during an investigation,
    supporting various entity types including Hostnames, URLs, File Hashes, IP Addresses,
    and more.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Event ID | String | Yes | The ID or UUID of the target MISP event where attributes
    will be added. |

    | Category | String | No | The MISP category for the attributes (e.g., 'Network
    activity', 'External analysis'). If not provided, MISP defaults will apply. |

    | Distribution | String | No | Defines the visibility of the attribute. Possible
    values: 'Organisation', 'Community', 'Connected', 'All', or 'Inherit'. Default
    is 'Community'. |

    | For Intrusion Detection System | Boolean | Yes | If set to true, the attribute
    will be flagged as eligible for generating IDS signatures. |

    | Comment | String | No | An optional comment to be attached to the added attributes.
    |

    | Fallback IP Type | String | No | The attribute type to use for IP entities if
    no source/destination relation is found in the alert. Options: 'Source Address',
    'Destination Address'. |

    | Fallback Email Type | String | No | The attribute type to use for Email entities
    if no source/destination relation is found in the alert. Options: 'Source Email
    Address', 'Destination Email Address'. |

    | Extract Domain | Boolean | No | If enabled, the action will extract the domain
    from URL entities and add it as a 'domain' attribute instead of a 'url' attribute.
    |


    ### Additional Notes

    - This action supports both Alert and Case scopes. When executing in Case scope,
    it processes entities from all alerts associated with the case.

    - The action supports a wide range of hash types: MD5, SHA1, SHA224, SHA256, SHA384,
    SHA512, and SSDeep. The specific hash type is automatically detected based on
    the string length or format.

    - For IP and Email entities, the action attempts to determine if the entity is
    a source or destination based on alert relations. If relations are unavailable,
    it uses the provided fallback parameters.


    ### Flow Description

    1. **Event Validation**: The action first verifies the existence of the target
    MISP event using the provided **Event ID**.

    2. **Scope Determination & Entity Filtering**: Depending on the execution scope
    (Alert or Case), it targets the relevant entities. It filters these entities to
    identify those matching supported types (e.g., Hostname, URL, Filehash, Address).

    3. **Type Mapping**: For each suitable entity, the action determines the correct
    MISP attribute type. This includes logic for detecting hash algorithms, extracting
    domains from URLs (if configured), and determining source/destination roles for
    network-related entities.

    4. **Attribute Creation**: The action performs a POST request to the MISP API
    for each entity to create the attribute with the specified category, distribution,
    and IDS flags.

    5. **Result Reporting**: It collects the API responses and returns a summary of
    successful and failed additions, along with the raw JSON data for the created
    attributes.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Creates new attribute records (indicators) within an existing MISP event via
      the MISP API.
    fetches_data: true
    internal_data_mutation_explanation: null
