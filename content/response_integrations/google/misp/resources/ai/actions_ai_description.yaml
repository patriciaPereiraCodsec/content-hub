    \ from a MISP (Malware Information Sharing Platform) instance. This action allows\
    \ security analysts to identify if indicators in their current case have been\
    \ previously seen or documented in other MISP events, providing critical context\
    \ for threat intelligence. It supports enrichment for URLs, Hostnames, File Hashes,\
    \ and IP Addresses. If related events are found, the action can automatically\
    \ flag the entity as suspicious within Google SecOps and provides a detailed table\
    \ of the matching events, including Event ID, Organization, Date, and Threat Level.\n\
    \n### Parameters\n| Parameter | Type | Mandatory | Description |\n| :--- | :---\
