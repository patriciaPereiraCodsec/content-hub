Delete an Attribute:
  ai_description: "Deletes specific attributes from MISP events based on various filtering\
    \ criteria. This action allows users to remove threat intelligence data (attributes)\
    \ from the MISP platform by specifying identifiers such as attribute names, UUIDs,\
    \ categories, or types. It can search for these attributes within a single specified\
    \ event or across all events in the MISP instance.\n\n### Parameters Description\n\
    \n| Parameter | Type | Mandatory | Description |\n| :--- | :--- | :--- | :---\
    \ |\n| Attribute Name | String | No | A comma-separated list of attribute values\
    \ (e.g., specific IPs or hashes) to delete. |\n| Event ID | String | No | The\
    \ ID or UUID of the MISP event. This is **mandatory** if 'Attribute Search' is\
    \ set to 'Provided Event' or if an 'Object UUID' is provided. |\n| Category |\
    \ String | No | A comma-separated list of MISP categories (e.g., 'Payload delivery',\
    \ 'External analysis') to filter the attributes for deletion. |\n| Type | String\
    \ | No | A comma-separated list of attribute types (e.g., 'md5', 'ip-src') to\
    \ filter the attributes for deletion. |\n| Object UUID | String | No | The UUID\
    \ of a specific MISP object. If provided, the action will only delete attributes\
    \ contained within this object. |\n| Attribute UUID | String | No | A comma-separated\
    \ list of specific attribute UUIDs to delete. If both 'Attribute Name' and 'Attribute\
    \ UUID' are provided, the action prioritizes UUIDs. |\n| Attribute Search | Dropdown\
    \ | No | Determines the search scope: 'Provided Event' (searches only the event\
    \ specified in 'Event ID') or 'All Events' (searches across the entire MISP instance).\
    \ Defaults to 'Provided Event'. |\n\n### Additional Notes\n- Either 'Attribute\
    \ Name' or 'Attribute UUID' should typically be provided to identify what to delete.\n\
    - If 'Attribute Search' is set to 'Provided Event', the 'Event ID' parameter becomes\
    \ mandatory.\n\n### Flow Description\n1. **Initialization**: The action initializes\
    \ the MISP manager using the provided API root and credentials.\n2. **Validation**:\
    \ It validates the provided 'Category' against allowed MISP categories and checks\
    \ for mandatory parameters based on the 'Attribute Search' logic.\n3. **Attribute\
    \ Retrieval**: \n    - If an 'Object UUID' is provided, it fetches attributes\
    \ specifically from that object within the specified event.\n    - Otherwise,\
    \ it searches for attributes matching the name, UUID, category, and type criteria\
    \ across the specified scope (single event or all events).\n4. **Deletion**: The\
    \ action iterates through all identified attributes and sends a deletion request\
    \ to the MISP API for each attribute's UUID.\n5. **Result Reporting**: It tracks\
    \ which attributes were successfully deleted and which failed, providing a summary\
    \ message and raw JSON results for the API responses."
