List Sightings of an Attribute:
  ai_description: >-
    ### General Description

    The **List Sightings of an Attribute** action retrieves a list of sightings for
    specific attributes within the MISP (Malware Information Sharing Platform) instance.
    This action allows security analysts to understand the prevalence and historical
    context of specific indicators (such as IPs, hashes, or domains) by identifying
    how many times and by which organizations they have been observed.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Attribute Name | String | No | A comma-separated list of attribute values (e.g.,
    '1.1.1.1', 'malware.exe') to search for. |

    | Event ID | String | No* | The ID or UUID of the MISP event to search within.
    This is **mandatory** if 'Attribute Search' is set to 'Provided Event'. |

    | Category | String | No | A comma-separated list of MISP categories to filter
    attributes (e.g., 'External Analysis', 'Payload Delivery'). |

    | Type | String | No | A comma-separated list of MISP attribute types to filter
    (e.g., 'md5', 'ip-src', 'domain'). |

    | Attribute Search | String | Yes | Determines the search scope: 'All Events'
    for a global search or 'Provided Event' to search within a specific event. |

    | Attribute UUID | String | No | A comma-separated list of specific MISP attribute
    UUIDs to search for. |


    ### Additional Notes

    - **Priority Logic:** If both 'Attribute Name' and 'Attribute UUID' are provided,
    the action prioritizes the 'Attribute UUID' values for the search.

    - **Conditional Requirement:** The 'Event ID' parameter must be filled if 'Attribute
    Search' is set to 'Provided Event'; otherwise, the action will fail.

    - **Validation:** The action validates that provided categories match existing
    MISP category types before execution.


    ### Flow Description

    1. **Initialization:** The action extracts the MISP configuration and user-provided
    parameters, including search scope and attribute identifiers.

    2. **Validation:** It verifies that an Event ID is provided if the search is scoped
    to a specific event and ensures the provided categories are valid.

    3. **Attribute Discovery:** The action queries the MISP API to find attributes
    matching the provided names, UUIDs, types, and categories within the chosen scope.

    4. **Sighting Retrieval:** For every matching attribute found, the action performs
    a secondary request to the MISP sightings endpoint to retrieve all recorded observation
    data.

