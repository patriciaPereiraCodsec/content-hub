Create File Misp Object:
  ai_description: "Creates a 'file' object within a specified MISP event. This action\
    \ allows for the structured addition of file-related metadata, such as filenames\
    \ and various hash types (MD5, SHA1, SHA256, SSDEEP), to an existing threat intelligence\
    \ event in MISP. It can process data manually provided via parameters or automatically\
    \ extract information from entities present in the Google SecOps case.\n\n###\
    \ Parameters\n| Parameter | Type | Mandatory | Description |\n| :--- | :--- |\
    \ :--- | :--- |\n| Event ID | String | Yes | The unique ID or UUID of the MISP\
    \ event where the file object should be created. |\n| FILENAME | String | No |\
    \ The name of the file to be added to the MISP object. |\n| MD5 | String | No\
    \ | The MD5 hash of the file. |\n| SHA1 | String | No | The SHA1 hash of the file.\
    \ |\n| SHA256 | String | No | The SHA256 hash of the file. |\n| SSDEEP | String\
    \ | No | The SSDEEP hash of the file (expected format: size:hash:hash). |\n| Use\
    \ Entities | Boolean | No | If set to true, the action will ignore manual file\
    \ parameters and instead use `FILEHASH` and `FILENAME` entities from the current\
    \ case context. |\n\n### Additional Notes\nTo successfully execute, the action\
    \ requires either the 'Use Entities' parameter to be enabled or at least one of\
    \ the manual file attribute parameters (FILENAME, MD5, SHA1, SHA256, or SSDEEP)\
    \ to be populated.\n\n### Flow Description\n1. **Initialization:** Retrieves MISP\
    \ integration settings (API Root, API Key) and action parameters.\n2. **Event\
    \ Verification:** Validates the existence of the target MISP event using the provided\
    \ 'Event ID'.\n3. **Data Gathering:** \n    - If 'Use Entities' is enabled: Scans\
    \ the case for `FILEHASH` and `FILENAME` entities. For hashes, it automatically\
    \ identifies the hash type (MD5, SHA1, etc.).\n    - If 'Use Entities' is disabled:\
    \ Uses the manually entered values from the action parameters.\n4. **MISP Object\
    \ Creation:** Calls the MISP API to create a new 'file' object and attaches the\
    \ identified attributes to the specified event.\n5. **Output Generation:** Adds\
    \ the raw JSON response of the created object to the action results and constructs\
    \ a data table for the case wall summarizing the added attributes."
