    \ of related events to retrieve per entity. If not provided, all matching events\
    \ are returned. Must be a positive integer. |\n| Mark As Suspicious | Boolean\
    \ | No | If enabled (default is true), the action will update the entity's status\
    \ to 'suspicious' in Google SecOps if at least one related event is found in MISP.\
    \ |\n\n### Flow Description\n1. **Initialization**: Extracts MISP connection details\
    \ (API Root, Key, SSL settings) and action parameters (Events Limit, Mark As Suspicious).\n\
    2. **Entity Filtering**: Identifies supported entities from the case, specifically\
    \ targeting URLs, Hostnames, File Hashes, and IP Addresses.\n3. **MISP Querying**:\
    \ For each supported entity, the action queries the MISP API to find events where\
    \ the entity's identifier (or original identifier) appears as an attribute.\n\
    4. **Data Processing**: If events are found, it parses the MISP response to extract\
    \ key metadata such as Event ID, UUID, Organization, Date, Threat Level, and Analysis\
