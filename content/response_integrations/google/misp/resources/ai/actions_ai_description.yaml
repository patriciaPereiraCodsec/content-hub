    \ the action will verify the SSL certificate of the MISP server. Defaults to False.\
    \ |\n| CA Certificate File | String | No | A Base64 encoded string of a CA certificate\
    \ used for SSL verification if a private or custom CA is used. |\n\n### Additional\
    \ Notes\nThis action does not require any input entities and is typically used\
