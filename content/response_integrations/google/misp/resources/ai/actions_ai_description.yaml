Download File:
  ai_description: >-
    ### General Description

    This action downloads file samples associated with a specific event in MISP. It
    allows users to either save the files to a local directory on the Google SecOps
    runner or attach them directly to the case wall within the SOAR platform. This
    is particularly useful for malware analysis workflows where samples need to be
    retrieved from a threat intelligence platform for further investigation.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Event ID | String | Yes | The unique ID or UUID of the MISP event from which
    to download files. |

    | Download Folder Path | String | No | The absolute path on the local system where
    files should be saved. If left empty, the action will instead upload the files
    as attachments to the case wall. |

    | Overwrite | Boolean | No | If set to true, the action will overwrite files in
    the 'Download Folder Path' if they already exist. Default is false. |


    ### Additional Notes

    - If 'Download Folder Path' is not provided, files are uploaded to the case wall.
    Note that there is a 3MB size limit for individual file attachments in the SOAR
    platform. Files exceeding this limit will fail to upload unless a local path is
    specified.

    - If 'Download Folder Path' is provided and 'Overwrite' is false, the action will
    fail if any of the files already exist in the target directory.


    ### Flow Description

    1. **Initialization**: The action initializes the MISP manager using the provided
    API root and credentials.

    2. **Event Verification**: It verifies the existence of the specified MISP event
    using the 'Event ID'.

    3. **Data Retrieval**: The action requests all file samples associated with the
    event from the MISP API.

    4. **Storage Logic**:
        - **Local Storage**: If a 'Download Folder Path' is provided, the action checks
    for existing files (respecting the 'Overwrite' flag) and saves the file content
    to the specified directory.
        - **SOAR Attachment**: If no path is provided, the action attempts to add
    each file as an attachment to the case wall using the `add_attachment` method.
    5. **Completion**: The action returns a success message listing the downloaded
    files and, if saved locally, provides the absolute paths in the JSON result.
