Set IDS Flag for an Attribute:
  ai_description: >-
    ### General Description

    Sets the IDS (Intrusion Detection System) flag for specific attributes within
    a MISP instance. This action allows security analysts to programmatically mark
    indicators as suitable for export to detection systems, either globally across
    all events or scoped to a specific MISP event. It supports filtering attributes
    by name, UUID, category, and type to ensure precise targeting.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Attribute Name | String | No | A comma-separated list of attribute values (e.g.,
    an IP address or file hash) to search for. |

    | Event ID | String | No | The ID or UUID of the MISP event. This is **mandatory**
    if 'Attribute Search' is set to 'Provided Event'. |

    | Category | String | No | A comma-separated list of MISP categories (e.g., 'Payload
    delivery', 'External analysis') to filter the attributes. |

    | Type | String | No | A comma-separated list of MISP attribute types (e.g., 'md5',
    'ip-src') to filter the attributes. |

    | Attribute Search | String | Yes | Defines the search scope. Options are 'All
    Events' (search globally) or 'Provided Event' (search only within the event specified
    by 'Event ID'). Default is 'Provided Event'. |

    | Attribute UUID | String | No | A comma-separated list of specific MISP attribute
    UUIDs to target. |


    ### Additional Notes

    - **Precedence:** If both 'Attribute Name' and 'Attribute UUID' are provided,
    the action logic prioritizes 'Attribute UUID' for identification and reporting.

    - **Validation:** The 'Category' parameter is validated against a hardcoded list
    of acceptable MISP categories: 'External Analysis', 'Payload Delivery', 'Artifacts
    Dropped', and 'Payload Installation'.

    - **Dependency:** If 'Attribute Search' is set to 'Provided Event' but no 'Event
    ID' is supplied, the action will fail.


    ### Flow Description

    1. **Initialization:** Extracts MISP integration configuration (API Root, Key,
    SSL settings) and action parameters.

    2. **Validation:** Checks if the provided 'Category' values are valid and ensures
    'Event ID' is present if the search is scoped to a specific event.

    3. **Event Verification:** If 'Provided Event' is selected, the action verifies
    that the specified event exists in MISP.

    4. **Attribute Retrieval:** Queries the MISP API to find attributes matching the
    provided criteria (Name/UUID, Category, Type) within the defined search scope.

    5. **Flag Update:** Iterates through the discovered attributes and performs a
    POST request to MISP for each, setting the 'to_ids' field to true.

    6. **Reporting:** Compiles a list of successfully updated attributes and any that
    failed the update process, providing a final status message to the SOAR case.
