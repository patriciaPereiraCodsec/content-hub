Delete an Event:
  ai_description: >-
    ### General Description

    Deletes a specific event from the MISP (Malware Information Sharing Platform)
    instance. This action allows users to remove events by providing either a numeric
    ID or a UUID. It is useful for cleaning up false positives, redundant data, or
    incorrectly created events within the threat intelligence platform.


    ### Parameters Description


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Event ID | String | Yes | The unique identifier of the event to delete. This
    can be either the numeric ID (e.g., '4') or the UUID string. |


    ### Additional Notes

    - The action first verifies the existence of the event before attempting deletion.
    If the event is not found, the action will fail with a specific 'not found' error.

    - This action performs a permanent deletion in the external MISP system.


    ### Flow Description

    1. **Setup**: The action initializes the MISP manager using the provided API root,
    API key, and SSL configuration.

    2. **Parameter Extraction**: It retrieves the `Event ID` from the action parameters
    and determines if it is a numeric ID or a UUID.

    3. **Verification**: It calls the MISP API to verify that the event exists. If
    the event does not exist, an exception is raised, and the action fails.

    4. **Execution**: If verified, it sends a POST request to the MISP deletion endpoint
    for the specified event.

    5. **Result Handling**: The action captures the API response message, adds it
    to the result JSON, and completes with a success message.
