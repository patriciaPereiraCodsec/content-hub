Upload File:
  ai_description: >-
    Uploads one or more files to a specific MISP event. This action allows users to
    attach malware samples or other file-based evidence to existing MISP events by
    providing local file paths. It supports configuring the MISP category, distribution
    level, and IDS flags for the uploaded files.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Event ID | String | Yes | The ID or UUID of the MISP event where the file(s)
    will be uploaded. |

    | File Path | String | Yes | A comma-separated list of absolute local file paths
    for the files to be uploaded. |

    | Category | String | No | The MISP category for the uploaded file (e.g., 'External
    Analysis', 'Payload Delivery'). Defaults to 'External analysis'. |

    | Distribution | String | No | The distribution level for the file (0-3 or string
    names like 'Community'). Defaults to 'Community' (1). |

    | For Intrusion Detection System | Boolean | Yes | If true, the uploaded file
    will be flagged for use in Intrusion Detection Systems (to_ids). Defaults to False.
    |

    | Comment | String | No | An optional comment to associate with the uploaded file
    attribute in MISP. |


    ### Flow Description

    1. **Initialization**: Retrieves integration configuration (API Root, Key, SSL
    settings) and action parameters.

    2. **Validation**: Validates that the provided distribution value is acceptable
    and checks if all specified file paths exist on the local file system.

    3. **Event Verification**: Checks if the target MISP event exists using the provided
    Event ID/UUID.

    4. **File Processing**: Iterates through the list of file paths, reads the binary
    content, and encodes it into Base64.

    5. **Upload**: Sends a POST request to the MISP `upload_sample` endpoint for each
    file, including metadata like category, distribution, and IDS flags.

    6. **Result Handling**: Retrieves the updated event details from MISP and returns
    them as the action's JSON result.
