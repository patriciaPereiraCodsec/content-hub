Create IP-Port Misp Object:
  ai_description: "Creates an IP-Port object within a specified MISP event. This action\
    \ allows users to manually define network attributes (ports, domains, hostnames,\
    \ IPs) or automatically use IP Address entities from the current context to populate\
    \ the MISP object. It validates the existence of the target MISP event before\
    \ attempting to create the object and provides a detailed data table of the created\
    \ attributes upon success.\n\n### Parameters\n| Parameter | Type | Mandatory |\
    \ Description |\n| :--- | :--- | :--- | :--- |\n| Event ID | String | Yes | Specify\
    \ the ID or UUID of the MISP event to which you want to add the IP-Port object.\
    \ |\n| Dst-port | String | No | The destination port to include in the MISP object.\
    \ |\n| Src-port | String | No | The source port to include in the MISP object.\
    \ |\n| Domain | String | No | The domain name to include in the MISP object. |\n\
    | HOSTNAME | String | No | The hostname to include in the MISP object. |\n| IP-Src\
    \ | String | No | The source IP address to include in the MISP object. |\n| IP-Dst\
    \ | String | No | The destination IP address to include in the MISP object. |\n\
    | Use Entities | Boolean | No | If enabled, the action will use ADDRESS entities\
    \ from the context to create objects. This parameter takes priority over manual\
    \ IP parameters. |\n| IP Type | Enum | No | Specify whether the IP entities should\
    \ be treated as 'Source IP' or 'Destination IP' in the MISP object. Default is\
    \ 'Source IP'. |\n\n### Additional Notes\n- Either manual parameters (Dst-port,\
    \ Src-port, Domain, HOSTNAME, IP-Src, or IP-Dst) must be provided, or the 'Use\
    \ Entities' parameter must be set to true for the action to execute.\n- The 'Use\
    \ Entities' flag specifically targets ADDRESS entities.\n\n### Flow Description\n\
    1. **Initialization**: Retrieves MISP API configuration and action parameters.\n\
    2. **Validation**: Ensures that an Event ID is provided and that there is data\
    \ to process (either via manual inputs or entities).\n3. **Connectivity**: Connects\
    \ to the MISP instance and verifies that the specified Event ID exists.\n4. **Data\
    \ Collection**: \n    - If 'Use Entities' is true, it iterates through ADDRESS\
    \ entities and maps their identifiers to the chosen IP Type (Source or Destination).\n\
    \    - If 'Use Entities' is false, it uses the manually provided network attributes.\n\
    5. **Object Creation**: Calls the MISP API to create the IP-Port object(s) within\
    \ the target event.\n6. **Reporting**: Adds the created object data to the action's\
    \ JSON results and constructs a data table on the case wall for visibility."
