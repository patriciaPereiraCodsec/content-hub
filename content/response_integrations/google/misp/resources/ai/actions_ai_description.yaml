Enrich Entities:
  ai_description: >-
    Enriches entities by retrieving threat intelligence from MISP (Malware Information
    Sharing Platform). The action searches for attributes matching the entity identifier
    across MISP events and enriches the SecOps entity with event metadata, threat
    levels, and attribute details.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Number of attributes to return | Integer | Yes | Limits the number of attributes
    included in the raw JSON result for each entity. Default is 10. |

    | Filtering condition | Enum | Yes | Determines which attribute to prioritize
    if multiple are found. 'LAST' uses the oldest attribute, while 'FIRST' uses the
    newest. |

    | Create Insights | Boolean | No | If enabled (default), creates a SecOps insight
    containing the MISP attribute comment. |

    | Threat Level Threshold | Enum | No | The threshold (High, Medium, Low, Undefined)
    used to evaluate the MISP event. If the event's threat level meets or exceeds
    this threshold, the entity is marked as suspicious. |


    ### Flow Description

    1. **Filter Entities:** Identifies supported entities (IP, Hostname, URL, Domain,
    File Hash, User) from the target list.

    2. **Search MISP:** For each entity, it queries the MISP API for matching attributes,
    optionally filtered by specific categories.

    3. **Select Attribute:** Based on the 'Filtering condition', it selects either
    the most recent or the oldest matching attribute.

    4. **Fetch Event Context:** Retrieves the full MISP event details associated with
    the selected attribute.

    5. **Enrich Entity:** Updates the entity's additional properties with event data
    (UUID, Org, Date, Threat Level) and attribute data (Category, Type, IDS flag).

    6. **Internal Updates:** Adds a data table to the case wall, creates an insight
    (if configured), and marks the entity as 'enriched'.

    7. **Risk Assessment:** Compares the event's threat level against the user-defined
    threshold and marks the entity as 'suspicious' if the threshold is met.
