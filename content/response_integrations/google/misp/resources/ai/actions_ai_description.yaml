Create Url Misp Object:
  ai_description: >-
    ### General Description

    This action creates a URL object within a specified MISP (Malware Information
    Sharing Platform) event. It allows users to document URL-related threat intelligence
    by associating a URL with metadata such as ports, domains, IP addresses, and timestamps.
    The action can either take a single URL manually via parameters or automatically
    process all URL entities present in the current Google SecOps case.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Event ID** | String | Yes | The ID or UUID of the MISP event where the URL
    object will be created. |

    | **URL** | String | No | The specific URL to add to the event. This is required
    if 'Use Entities' is set to false. |

    | **Port** | String | No | The port number associated with the URL. |

    | **First seen** | String | No | The timestamp when the URL was first observed
    (Format: YYYY-MM-DDTHH:MM:SSZ). |

    | **Last seen** | String | No | The timestamp when the URL was last observed (Format:
    YYYY-MM-DDTHH:MM:SSZ). |

    | **Domain** | String | No | The domain associated with the URL. |

    | **Text** | String | No | Additional descriptive text or comments for the URL
    object. |

    | **IP** | String | No | The IP address associated with the URL. |

    | **Host** | String | No | The hostname associated with the URL. |

    | **Use Entities** | Boolean | No | If enabled, the action ignores the 'URL' parameter
    and instead creates objects for all URL entities found in the case. |


    ### Additional Notes

    - **Dependency**: Either the 'URL' parameter must be populated or 'Use Entities'
    must be set to true for the action to execute successfully.

    - **Priority**: The 'Use Entities' parameter takes priority over the manual 'URL'
    input if both are provided.


    ### Flow Description

    1. **Initialization**: The action retrieves connection settings and validates
    the provided MISP Event ID to ensure the target event exists.

    2. **Data Collection**: Depending on the configuration, the action identifies
