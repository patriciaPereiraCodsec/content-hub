Add Tag to an Event:
  ai_description: >-
    Adds one or more tags to a specific event in the MISP (Malware Information Sharing
    Platform) instance. The action validates the existence of the event and the tags
    before attempting the attachment. It provides a detailed summary of which tags
    were successfully added, which failed, and which were not found in the MISP system.


    ### Parameters

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Event ID | String | Yes | The unique ID or UUID of the MISP event to which the
    tags will be added. |

    | Tag Name | String | Yes | A comma-separated list of tag names to be attached
    to the event. |


    ### Flow Description

    1. **Initialization**: Retrieves MISP connection details (API Root, API Key, SSL
    settings) and action parameters (Event ID and Tag Names).

    2. **Event Verification**: Queries the MISP API to ensure the specified Event
    ID exists. If not found, the action fails.

    3. **Tag Discovery**: Retrieves all available tags from MISP and filters them
    to find matches for the provided tag names.

    4. **Tag Attachment**: Iterates through the matched tags and sends a request to
    MISP to attach each tag to the specified event.

    5. **Result Processing**: Collects the responses from the API, categorizes tags
    as 'added' or 'not added', and identifies any provided tag names that do not exist
    in the MISP system. It then outputs a summary message and the raw JSON response.
  capabilities:
