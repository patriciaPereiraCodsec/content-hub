Add Tag to an Attribute:
  ai_description: "Adds tags to attributes in MISP. This action allows users to apply\
    \ one or more tags to specific attributes identified by name or UUID. The search\
    \ for attributes can be restricted to a specific MISP Event, a specific Object\
    \ within an event, or performed across all events. Users can further filter the\
    \ target attributes by category and type to ensure tags are applied precisely.\
    \ \n\n### Parameters\n| Parameter | Type | Mandatory | Description |\n| --- |\
    \ --- | --- | --- |\n| Tag Name | String | Yes | A comma-separated list of tags\
    \ to add to the attributes. |\n| Attribute Name | String | No | A comma-separated\
    \ list of attribute values to tag. |\n| Attribute UUID | String | No | A comma-separated\
    \ list of attribute UUIDs to tag. If both Name and UUID are provided, UUID takes\
    \ precedence. |\n| Event ID | String | No | The ID or UUID of the MISP event.\
    \ Required if 'Attribute Search' is set to 'Provided Event' or if an 'Object UUID'\
    \ is specified. |\n| Attribute Search | Dropdown | No | Determines the search\
    \ scope: 'Provided Event' (default) or 'All Events'. |\n| Object UUID | String\
    \ | No | The UUID of a specific object within an event to narrow down the attribute\
    \ search. |\n| Category | String | No | Comma-separated list of MISP categories\
    \ (e.g., 'Payload delivery', 'External analysis') to filter attributes. |\n| Type\
    \ | String | No | Comma-separated list of MISP attribute types (e.g., 'md5', 'ip-src')\
    \ to filter attributes. |\n\n### Additional Notes\n- If 'Attribute Search' is\
    \ set to 'Provided Event', the 'Event ID' parameter must be populated.\n- If an\
    \ 'Object UUID' is provided, the 'Event ID' must also be provided.\n\n### Flow\
    \ Description\n1. **Initialization**: The action initializes the MISP manager\
    \ using the provided API credentials and validates the input parameters.\n2. **Tag\
    \ Verification**: It checks the MISP instance to ensure the requested tags exist;\
    \ if none of the tags exist, the action fails.\n3. **Attribute Discovery**: It\
    \ searches for attributes based on the provided identifiers (Name/UUID) and filters\
    \ (Category/Type) within the chosen scope (Event/Object/Global).\n4. **Tag Application**:\
    \ For every attribute found, the action sends a request to MISP to attach each\
    \ of the valid tags.\n5. **Result Reporting**: The action returns a summary of\
    \ successfully tagged attributes and lists any tags or attributes that were not\
    \ found."
