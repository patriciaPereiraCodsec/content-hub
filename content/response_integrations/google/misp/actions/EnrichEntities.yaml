name: Enrich Entities
description: Enrich entities based on the attributes in MISP.
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/misp#enrich_entities
integration_identifier: MISP
parameters:
-   name: Number of attributes to return
    default_value: '10'
    type: string
    description: Specify how many attributes to return for entities.
    is_mandatory: true
-   name: Filtering condition
    default_value: LAST
    type: ddl
    optional_values:
    - LAST
    - FIRST
    description: Specify the filtering condition for the action. If “Last“ is selected,
        action will use the oldest attribute for enrichment, if “First“ is selected,
        action will use the newest attribute for enrichment.
    is_mandatory: true
-   name: Create Insights
    default_value: true
    type: boolean
    description: If enabled, action will generate an insight for every entity that
        was fully processed.
    is_mandatory: false
-   name: Threat Level Threshold
    default_value: Low
    type: ddl
    optional_values:
    - High
    - Medium
    - Low
    - Undefined
    description: Specify what should be the threshold for the threat level of the
        event, where the entity was found. If related event exceeds or matches threshold,
        entity will be marked as suspicious.
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/enrich_entities_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
simulation_data_json: '{"Entities": ["HOSTNAME", "DestinationURL", "FILEHASH", "ADDRESS"]}'
script_result_name: success
