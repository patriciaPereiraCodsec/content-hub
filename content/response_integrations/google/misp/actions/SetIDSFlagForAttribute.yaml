name: Set IDS Flag for an Attribute
description: Set IDS flag for attributes in MISP
integration_identifier: MISP
parameters:
-   name: Attribute Name
    default_value: ''
    type: string
    description: 'Specify a comma-separated list of attribute identifiers for which
        you want to set an IDS flag. Note: If both “Attribute Name“ and “Attribute
        UUID“ are specified, action will work with “Attribute UUID“ values.'
    is_mandatory: false
-   name: Event ID
    default_value: ''
    type: string
    description: Specify the ID or UUID of the event, where to seach for attributes.
        This parameter is required, if “Attribute Search“ is set to “Provided Event“.
    is_mandatory: false
-   name: Category
    default_value: ''
    type: string
    description: 'Specify a comma-separated list of categories. If specified, action
        will only set IDS flag for attributes that have matching category. If nothing
        is specified, action will ignore categories in attributes. Possible values:
        External Analysis, Payload Delivery, Artifacts Dropped, Payload Installation.'
    is_mandatory: false
-   name: Type
    default_value: ''
    type: string
    description: 'Specify a comma-separated list of attribute types. If specified,
        action will only set IDS flag for attributes that have matching attribute
        type. If nothing is specified, action will ignore types in attributes. Example
        values: md5, sha1, ip-src, ip-dst'
    is_mandatory: false
-   name: Attribute Search
    default_value: Provided Event
    type: ddl
    optional_values:
    - All Events
    - Provided Event
    description: Specify, where action should search for attributes. If “Provided
        Event“ is selected, action will only search for attributes or attribute UUIDs
        in event with ID/UUID provided in “Event ID“ parameter. If “All Events“, action
        will search for attributes among all events and set IDS flag for all attributes
        that match our criteria.
    is_mandatory: false
-   name: Attribute UUID
    default_value: ''
    type: string
    description: 'Specify a comma-separated list of attribute UUIDs for which you
        want to set an IDS flag. Note: If both “Attribute Name“ and “Attribute UUID“
        are specified, action will work with “Attribute UUID“ values.'
    is_mandatory: false
dynamic_results_metadata: []
creator: admin
