name: Get Event Details
description: Retrieve details about events in MISP.
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/misp#get_event_details
integration_identifier: MISP
parameters:
-   name: Event ID
    default_value: ''
    type: string
    description: Specify a comma-separated list of IDs or UUIDs of the events for
        which you want retrieve details.
    is_mandatory: true
-   name: Return Attributes Info
    default_value: 'True'
    type: boolean
    description: If enabled, action will create a case wall table for all of the attributes
        that are a part of the event.
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/get_event_details_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
simulation_data_json: '{"Entities":[]}'
