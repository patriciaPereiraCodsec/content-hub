name: Remove Tag from an Event
description: Remove tags from event in MISP.
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/misp#remove_tag_from_an_event
integration_identifier: MISP
parameters:
-   name: Event ID
    default_value: ''
    type: string
    description: Specify the ID or UUID of the event, from which you want to remove
        tags.
    is_mandatory: true
-   name: Tag Name
    default_value: ''
    type: string
    description: Specify a comma-separated list of tags that you want to remove from
        events.
    is_mandatory: true
dynamic_results_metadata:
-   result_example_path: resources/remove_tag_from_an_event_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
