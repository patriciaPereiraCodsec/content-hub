name: Add Attribute
description: 'Add attributes based on entities to the event in MISP. Supported hashes:
    MD5, SHA1, SHA224, SHA256, SHA384, SHA512, SSDeep.'
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/misp#add_attribute
integration_identifier: MISP
parameters:
-   name: Event ID
    default_value: ''
    type: string
    description: TheSpecify the ID or UUID of the event, for which you want to add
        attributes.
    is_mandatory: true
-   name: Category
    default_value: ''
    type: string
    description: 'Specify the category for attributes. Possible values: Targeting
        data, Payload delivery, Artifacts dropped, Payload installation, Persistence
        mechanism, Network activity, Attribution, External analysis, Social network.'
    is_mandatory: false
-   name: Distribution
    default_value: Community
    type: string
    description: 'Specify the distribution of the attribute. Possible values: 0 -
        Organisation, 1 - Community, 2 - Connected, 3 - All, 5 - Inherit. You can
        either provide a number or a string.'
    is_mandatory: false
-   name: For Intrusion Detection System
    default_value: 'false'
    type: boolean
    description: If enabled, attribute will be labeled as eligible to create an IDS
        signature out of it.
    is_mandatory: true
-   name: Comment
    default_value: ''
    type: string
    description: Specify comment related to attribute.
    is_mandatory: false
-   name: Fallback IP Type
    default_value: Source Address
    type: ddl
    optional_values:
    - Source Address
    - Destination Address
    description: Specify what should be the fallback attribute type for the IP address
        entity.
    is_mandatory: false
-   name: Fallback Email Type
    default_value: Source Email Address
    type: ddl
    optional_values:
    - Source Email Address
    - Destination Email Address
    description: Specify what should be the fallback attribute type for the email
        address entity.
    is_mandatory: false
-   name: Extract Domain
    default_value: 'true'
    type: boolean
    description: If enabled, action will extract domain out of URL entity.
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/add_attribute_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
simulation_data_json: '{"Entities": ["HOSTNAME", "DestinationURL", "FILEHASH", "ADDRESS",
    "USER", "FILENAME", "EMAILSUBJECT", "THREATCAMPAIGN", "THREATACTOR", "PHONENUMBER"]}'
script_result_name: success
