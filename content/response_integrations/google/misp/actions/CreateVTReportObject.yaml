name: Create Virustotal-Report Object
description: Create a Virustotal-Report Object in MISP.
integration_identifier: MISP
parameters:
-   name: Event ID
    default_value: ''
    type: string
    description: Specify the ID or UUID of the event to which you want to add URL
        objects.
    is_mandatory: true
-   name: Permalink
    default_value: ''
    type: string
    description: Specify the link to the VirusTotal report, which you want to add
        to the event.
    is_mandatory: true
-   name: Comment
    default_value: ''
    type: string
    description: Specify the comment, which you want to add to the event.
    is_mandatory: false
-   name: Detection Ratio
    default_value: ''
    type: string
    description: Specify the detection ration, which you want to add to the event.
    is_mandatory: false
-   name: Community Score
    default_value: ''
    type: string
    description: Specify the community score, which you want to add to the event.
    is_mandatory: false
-   name: First Submission
    default_value: ''
    type: string
    description: 'Specify first submission of the event. Format: 2020-12-22T13:07:32Z'
    is_mandatory: false
-   name: Last Submission
    default_value: ''
    type: string
    description: 'Specify last submission of the event. Format: 2020-12-22T13:07:32Z'
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/create_vt_report_object_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
