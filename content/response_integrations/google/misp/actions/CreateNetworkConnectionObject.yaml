name: Create network-connection Misp Object
description: 'Create a network-connection Object in MISP. Requires one of: Dst-port,
    Src-port, IP-Src, IP-Dst to be provided or “Use Entities“ parameter set to true.'
integration_identifier: MISP
parameters:
-   name: Event ID
    default_value: ''
    type: string
    description: Specify the ID or UUID of the event to which you want to add network-connection
        objects.
    is_mandatory: true
-   name: Dst-port
    default_value: ''
    type: string
    description: Specify the destination port, which you want to add to the event.
    is_mandatory: false
-   name: Src-port
    default_value: ''
    type: string
    description: Specify the source port, which you want to add to the event.
    is_mandatory: false
-   name: Hostname-src
    default_value: ''
    type: string
    description: Specify the source hostname, which you want to add to the event.
    is_mandatory: false
-   name: Hostname-dst
    default_value: ''
    type: string
    description: Specify the source destination, which you want to add to the event.
    is_mandatory: false
-   name: IP-Src
    default_value: ''
    type: string
    description: Specify the source IP, which you want to add to the event.
    is_mandatory: false
-   name: IP-Dst
    default_value: ''
    type: string
    description: Specify the destination IP, which you want to add to the event.
    is_mandatory: false
-   name: Layer3-protocol
    default_value: ''
    type: string
    description: Specify the related layer 3 protocol, which you want to add to the
        event.
    is_mandatory: false
-   name: Layer4-protocol
    default_value: ''
    type: string
    description: Specify the related layer 4 protocol, which you want to add to the
        event.
    is_mandatory: false
-   name: Layer7-protocol
    default_value: ''
    type: string
    description: Specify the related layer 7 protocol, which you want to add to the
        event.
    is_mandatory: false
-   name: Use Entities
    default_value: false
    type: boolean
    description: 'If enabled, action will use entities in order to create objects.
        Supported entities: IP Address. “Use Entities“ has priority over other parameters.'
    is_mandatory: false
-   name: IP Type
    default_value: Source IP
    type: ddl
    optional_values:
    - Source IP
    - Destination IP
    description: Specify what attribute type should be used with IP entities.
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/create_network_connection_object_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
