name: Create IP-Port Misp Object
description: 'Create a IP-Port Object in MISP. Requires one of: Dst-port, Src-port,
    Domain, HOSTNAME, IP-Src, IP-Dst to be provided or “Use Entities“ parameter set
    to true.'
integration_identifier: MISP
parameters:
-   name: Event ID
    default_value: ''
    type: string
    description: Specify the ID or UUID of the event to which you want to add IP-Port
        objects.
    is_mandatory: true
-   name: Dst-port
    default_value: ''
    type: string
    description: Specify the destination port, which you want to add to the event.
    is_mandatory: false
-   name: Src-port
    default_value: ''
    type: string
    description: Specify the source port, which you want to add to the event.
    is_mandatory: false
-   name: Domain
    default_value: ''
    type: string
    description: Specify the domain, which you want to add to the event.
    is_mandatory: false
-   name: HOSTNAME
    default_value: ''
    type: string
    description: Specify the hostname, which you want to add to the event.
    is_mandatory: false
-   name: IP-Src
    default_value: ''
    type: string
    description: Specify the source IP, which you want to add to the event.
    is_mandatory: false
-   name: IP-Dst
    default_value: ''
    type: string
    description: Specify the destination IP, which you want to add to the event.
    is_mandatory: false
-   name: Use Entities
    default_value: false
    type: boolean
    description: 'If enabled, action will use entities in order to create objects.
        Supported entities: IP Address. “Use Entities“ has priority over other parameters.'
    is_mandatory: false
-   name: IP Type
    default_value: Source IP
    type: ddl
    optional_values:
    - Source IP
    - Destination IP
    description: Specify what attribute type should be used with IP entities.
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/create_ip_port_object_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
