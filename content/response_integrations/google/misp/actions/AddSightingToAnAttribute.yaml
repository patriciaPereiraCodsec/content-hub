name: Add Sighting to an Attribute
description: Add a sighting to attributes in MISP
integration_identifier: MISP
parameters:
-   name: Attribute Name
    default_value: ''
    type: string
    description: 'Specify a comma-separated list of attribute identifiers to which
        you want to add a new sighting. Note: If both “Attribute Name“ and “Attribute
        UUID“ are specified, action will work with “Attribute UUID“ values.'
    is_mandatory: false
-   name: Event ID
    default_value: ''
    type: string
    description: Specify the ID or UUID of the event, where to search for attributes.
        This parameter is required, if “Attribute Search“ is set to “Provided Event“.
    is_mandatory: false
-   name: Category
    default_value: ''
    type: string
    description: 'Specify a comma-separated list of categories. If specified, action
        will only add sightings to attributes that have matching category. If nothing
        is specified, action will ignore categories in attributes. Possible values:
        External Analysis, Payload Delivery, Artifacts Dropped, Payload Installation.'
    is_mandatory: false
-   name: Type
    default_value: ''
    type: string
    description: 'Specify a comma-separated list of attribute types. If specified,
        action will only add sightings to attributes that have matching attribute
        type. If nothing is specified, action will ignore types in attributes. Example
        values: md5, sha1, ip-src, ip-dst'
    is_mandatory: false
-   name: Sightings Type
    default_value: Sighting
    type: ddl
    optional_values:
    - Sighting
    - False Positive
    - Expiration
    description: Specify the type of the Sighting.
    is_mandatory: true
-   name: Source
    default_value: ''
    type: string
    description: 'Specify the source for the sighting. Example: SIEM, SOAR, Siemplify.'
    is_mandatory: false
-   name: Date Time
    default_value: ''
    type: string
    description: 'Specify the date time for the sighting. Format: 2020-02-10 11:00:00.'
    is_mandatory: false
-   name: Object UUID
    default_value: ''
    type: string
    description: Specify the uuid of the object that contains the desired attribute
    is_mandatory: false
-   name: Attribute Search
    default_value: Provided Event
    type: ddl
    optional_values:
    - Provided Event
    - All Events
    description: 'Specify, where action should search for attributes. If “Provided
        Event“ is selected, action will only search for attributes or attribute UUIDs
        in event with ID/UUID provided in “Event ID“ parameter. If “All Events“, action
        will search for attributes among all events and add sighting for all attributes
        that match our criteria. '
    is_mandatory: false
-   name: Attribute UUID
    default_value: ''
    type: string
    description: 'Specify a comma-separated list of attribute UUIDs to which you want
        to add a new sighting. Note: If both “Attribute Name“ and “Attribute UUID“
        are specified, action will work with “Attribute UUID“ values. '
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/add_sighting_to_an_attribute_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
