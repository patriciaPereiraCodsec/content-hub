name: Unpublish Event
description: The action allows the user to unpublish an event. Unpublishing an event
    prevents it from being visible to the shared groups.
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/misp#unpublish_event
integration_identifier: MISP
parameters:
-   name: Event ID
    default_value: ''
    type: string
    description: Specify the ID or UUID of the event that you want to unpublish.
    is_mandatory: true
dynamic_results_metadata:
-   result_example_path: resources/unpublish_event_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
