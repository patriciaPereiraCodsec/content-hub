name: Upload File
description: Upload a file to a MISP event.
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/misp#upload_file
integration_identifier: MISP
parameters:
-   name: Event ID
    default_value: ''
    type: string
    description: Specify the ID or UUID of the event to which you want to upload this
        file.
    is_mandatory: true
-   name: File Path
    default_value: ''
    type: string
    description: Specify a comma-separated list of absolute filepaths of the files
        that you want to upload to MISP.
    is_mandatory: true
-   name: Category
    default_value: ''
    type: string
    description: 'Specify the category for the uploaded file. Possible values: External
        Analysis, Payload Delivery, Artifacts Dropped, Payload Installation.'
    is_mandatory: false
-   name: Distribution
    default_value: Community
    type: string
    description: 'Specify the distribution for the uploaded file. Possible values:
        0 - Organisation, 1 - Community, 2 - Connected, 3 - All. You can either provide
        a number or a string.'
    is_mandatory: false
-   name: For Intrusion Detection System
    default_value: 'False'
    type: boolean
    description: If enabled, uploaded file will be used for intrusion detection systems.
    is_mandatory: true
-   name: Comment
    default_value: ''
    type: string
    description: Specify additional comments related to the uploaded file.
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/upload_file_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
script_result_name: event_id
