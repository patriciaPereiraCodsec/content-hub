name: MISP - Attributes Connector
parameters:
-   name: DeviceProductField
    default_value: device_product
    type: string
    description: Enter the source field name in order to retrieve the Product Field
        name.
    is_mandatory: true
    is_advanced: true
    mode: regular
-   name: EventClassId
    default_value: category
    type: string
    description: Enter the source field name in order to retrieve the Event Field
        name.
    is_mandatory: true
    is_advanced: true
    mode: regular
-   name: PythonProcessTimeout
    default_value: 180
    type: integer
    description: Timeout limit for the python process running the current script.
    is_mandatory: true
    is_advanced: true
    mode: script
-   name: API Root
    default_value: ''
    type: string
    description: API Root for MISP account.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: API Key
    default_value: ''
    type: password
    description: API Key of the MISP account.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Fetch Max Hours Backwards
    default_value: 1
    type: integer
    description: Number of hours before the first connector iteration to retrieve
        attributes from. This parameter applies to the initial connector iteration
        after you enable the connector for the first time, or used as a fallback value
        in cases where connector's last run timestamp expires.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Max Attributes Per Cycle
    default_value: 50
    type: integer
    description: How many attributes to process per one connector iteration.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Lowest Threat Level To Fetch
    default_value: '1'
    type: string
    description: 'Lowest severity that will be used to fetch alerts. Possible values:
        1-4.'
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Attribute Type Filter
    default_value: ''
    type: string
    description: Filter attributes by their type, comma separated. If provided, only
        attributes with whitelisted type will be processed.
    is_mandatory: false
    is_advanced: true
    mode: script
-   name: Category Filter
    default_value: ''
    type: string
    description: Filter attributes by their category, comma separated. If provided,
        only attributes with whitelisted category will be processed.
    is_mandatory: false
    is_advanced: true
    mode: script
-   name: Galaxy Filter
    default_value: ''
    type: string
    description: Filter attributes by their parent event's galaxy, comma separated.
        If provided, only attributes that belong to an event with a whitelisted galaxy
        will be processed.
    is_mandatory: false
    is_advanced: true
    mode: script
-   name: Verify SSL
    default_value: false
    type: boolean
    description: If enabled, verify the SSL certificate for the connection to the
        CheckPoint Cloud Guard server is valid.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Environment Field Name
    default_value: ''
    type: string
    description: Describes the name of the field where the environment name is stored.
        If the environment field isn't found, the environment is the default environment.
    is_mandatory: false
    is_advanced: true
    mode: script
-   name: Environment Regex Pattern
    default_value: .*
    type: string
    description: A regex pattern to run on the value found in the "Environment Field
        Name" field. Default is .* to catch all and return the value unchanged. Used
        to allow the user to manipulate the environment field via regex logic. If
        the regex pattern is null or empty, or the environment value is null, the
        final environment result is the default environment.
    is_mandatory: false
    is_advanced: true
    mode: script
-   name: Proxy Server Address
    default_value: ''
    type: string
    description: The address of the proxy server to use.
    is_mandatory: false
    is_advanced: true
    mode: script
-   name: Proxy Username
    default_value: ''
    type: string
    description: The proxy username to authenticate with.
    is_mandatory: false
    is_advanced: true
    mode: script
-   name: Proxy Password
    default_value: ''
    type: password
    description: The proxy password to authenticate with.
    is_mandatory: false
    is_advanced: true
    mode: script
-   name: CA Certificate File - parsed into Base64 String
    default_value: ''
    type: string
    description: CA Certificate File - parsed into Base64 String
    is_mandatory: false
    is_advanced: true
    mode: script
description: Pull attributes from MISP.
integration: MISP
documentation_link: null
rules: []
is_connector_rules_supported: true
creator: admin
