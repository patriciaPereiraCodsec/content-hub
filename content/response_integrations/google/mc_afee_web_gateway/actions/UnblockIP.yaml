name: Unblock IP
description: Delete IP addresses from an "IP range"-type group. \n*Please note - This
    group should be a part of rule used to block IP addresses
integration_identifier: McAfeeWebGateway
parameters:
-   name: Group Name
    default_value: ''
    type: string
    description: The group name to unblock the IP in
    is_mandatory: true
dynamic_results_metadata: []
creator: admin
simulation_data_json: '{"Entities": ["ADDRESS"]}'
script_result_name: is_unblocked
