Remove Item From Group:
  ai_description: "Removes a specific network object (such as an IP address, URL,\
    \ or host) from a designated group within McAfee Web Gateway. This action is primarily\
    \ used to manage blocklists or allowlists by programmatically deleting entries.\
    \ \n\n### Flow Description:\n1. **Authentication**: Establishes a session with\
    \ the McAfee Web Gateway API.\n2. **Group Identification**: Retrieves the internal\
    \ ID for the group specified in the 'Group Name' parameter.\n3. **Item Search**:\
    \ Searches the identified group for the specific item provided in 'Item To Delete'\
    \ to obtain its unique entry ID.\n4. **Deletion**: Sends a DELETE request to the\
    \ gateway to remove the specific entry.\n5. **Commit**: Executes a commit operation\
    \ to ensure the changes are saved and applied to the gateway configuration.\n\n\
    ### Parameters Description:\n| Parameter | Type | Mandatory | Description |\n\
    | :--- | :--- | :--- | :--- |\n| Group Name | String | Yes | The exact name of\
    \ the group/list in McAfee Web Gateway where the item resides. |\n| Item To Delete\
    \ | String | Yes | The value of the network object to be removed (e.g., '1.1.1.1/32'\
    \ or 'malicious.com'). |\n\n### Additional Notes:\n* The action requires the 'Server\
    \ Address', 'Username', and 'Password' to be configured in the McAfee Web Gateway\
    \ integration settings.\n* Each group in McAfee Web Gateway is type-strict; ensure\
    \ the item format matches the group's expected type."
