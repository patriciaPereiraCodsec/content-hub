Ping:
  ai_description: >-
    ### General Description

    The **Ping** action is a diagnostic tool designed to verify the connectivity between
    Google SecOps and the McAfee Web Gateway instance. It ensures that the provided
    integration parameters (Server Address, Username, and Password) are valid and
    that the service is reachable.


    ### Parameters Description

    This action does not require any input parameters.


    ### Additional Notes

    * This action is primarily used during the initial setup or troubleshooting of
    the McAfee Web Gateway integration to confirm that the API credentials and network
    path are functional.

    * It performs a login followed by an immediate logout to minimize session overhead
    on the target system.


    ### Flow Description

    1. **Configuration Retrieval**: The action fetches the 'Server Address', 'Username',
    and 'Password' from the integration's configuration settings.

    2. **Authentication Attempt**: It initializes the `McAfeeWebGatewayManager`, which
    automatically attempts to authenticate by sending a POST request to the `/login`
    endpoint of the gateway.

    3. **Session Validation**: The manager validates the response to ensure a valid
    session cookie (`JSESSIONID`) is received.

    4. **Session Termination**: Upon successful authentication, the action explicitly
    calls the `logout` method to terminate the session via a POST request to the `/logout`
    endpoint.

    5. **Result Reporting**: If the entire sequence completes without exceptions,
    the action returns a 'Connected successfully' message and a result value of 'true'.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: false
    internal_data_mutation_explanation: null
  categories:
    enrichment: false
