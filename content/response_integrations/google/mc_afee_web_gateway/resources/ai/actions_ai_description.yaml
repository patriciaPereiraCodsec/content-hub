Block IP:
  ai_description: "Blocks IP addresses by adding them to a specific 'IP range' group\
    \ within McAfee Web Gateway. This action is typically used to update blocklists\
    \ that are referenced by active security rules on the gateway. \n\n### Parameters\n\
    | Parameter | Type | Mandatory | Description |\n| :--- | :--- | :--- | :--- |\n\
    | Group Name | String | Yes | The name of the group in McAfee Web Gateway where\
    \ the IP addresses will be added. |\n| Description | String | No | A description\
    \ for the new list entry. Defaults to 'Added by Siemplify' if not provided. |\n\
    \n### Flow Description\n1. **Authentication**: Connects to the McAfee Web Gateway\
    \ using the provided server address and credentials.\n2. **Group Identification**:\
    \ Retrieves the internal ID for the specified 'Group Name'.\n3. **Entity Processing**:\
    \ Iterates through all provided IP Address entities.\n4. **Entry Insertion**:\
    \ For each IP, it formats the address as a /32 CIDR and sends a request to insert\
    \ it into the target group.\n5. **Commitment**: Executes a commit command on the\
    \ gateway to finalize and apply the changes.\n6. **Cleanup**: Logs out of the\
    \ McAfee Web Gateway session."
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Adds new entries (IP addresses) to existing lists/groups within the McAfee Web
      Gateway configuration and performs a commit operation to apply these changes.
    fetches_data: false
    internal_data_mutation_explanation: null
  categories:
    enrichment: false
  entity_usage:
    entity_types:
