Insert Item To Group:
  ai_description: >-
    ### General Description

    This action inserts a network object (such as an IP address, CIDR block, or URL)
    into a specific group or list within the McAfee Web Gateway. It is used to manage
    policy-based lists, such as blacklists or whitelists, by programmatically adding
    entries. The action ensures that the item is correctly formatted for the target
    group's type and commits the changes to the gateway to ensure they take effect.


    ### Parameters Description

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Group Name | String | Yes | The exact name of the group/list in McAfee Web Gateway
    where the item should be added (e.g., 'Siemplify-Blacklist'). |

    | Item To Insert | String | Yes | The network object to be added to the group.
    This could be an IP (e.g., 1.1.1.1), a CIDR (e.g., 1.1.1.0/24), or a URL, depending
    on the group's configuration. |

    | Description | String | No | A descriptive comment for the new entry. If not
    provided, it defaults to 'Added by Siemplify'. |


    ### Additional Notes

    * **Type Strictness:** Each group in McAfee Web Gateway is type-restricted. If
    you attempt to insert a URL into an IP-based list, the action will fail with a
    format error.

    * **Commit Logic:** This action automatically performs a 'commit' operation after
    a successful insertion to ensure the changes are applied to the appliance configuration.


    ### Flow Description

    1. **Authentication:** Connects to the McAfee Web Gateway using the provided credentials
    and establishes a session.

    2. **Group Resolution:** Fetches all available lists from the gateway to find
    the internal ID associated with the provided 'Group Name'.

    3. **Item Insertion:** Sends a POST request containing an XML payload with the
    item value and description to the specific group's insertion endpoint.

    4. **Validation:** Checks the response for success. If the item is a duplicate
    or in an invalid format, the action handles the error and logs out.

    5. **Commit:** Executes a commit command to the gateway to finalize the configuration
    change.

    6. **Cleanup:** Logs out of the McAfee Web Gateway session.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Inserts a new entry into a network group/list on the McAfee Web Gateway and
      performs a configuration commit to apply the changes.
    fetches_data: true
    internal_data_mutation_explanation: null
  categories:
    enrichment: false
