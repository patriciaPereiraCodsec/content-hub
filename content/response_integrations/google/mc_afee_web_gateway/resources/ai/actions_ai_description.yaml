Unblock IP:
  ai_description: >-
    Removes IP Address entities from a specified 'IP range' group in McAfee Web Gateway.
    This action is primarily used to unblock previously restricted IP addresses by
    deleting their entries from a management group and committing the changes to the
    appliance.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Group Name | String | Yes | The name of the group in McAfee Web Gateway from
    which the IP address should be removed. |


    ### Flow Description

    1. **Authentication:** Connects to the McAfee Web Gateway using provided credentials
    and establishes a session.

    2. **Group Identification:** Retrieves the internal ID of the group specified
    in the 'Group Name' parameter.

    3. **Entity Processing:** Iterates through the provided IP Address entities.

    4. **Entry Lookup:** For each IP, it searches the target group to find the specific
    entry ID associated with that IP (formatted as a /32 CIDR).

    5. **Deletion:** If the entry is found, it sends a DELETE request to remove the
    IP from the group.

    6. **Commit:** Executes a commit operation to apply and save the changes on the
    McAfee Web Gateway appliance.

    7. **Cleanup:** Logs out of the session and reports the success or failure for
    each entity.
