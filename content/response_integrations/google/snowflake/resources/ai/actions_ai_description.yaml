Ping:
  ai_description: >-
    ### General Description

    The **Ping** action is a diagnostic utility used to verify the connectivity between
    Google SecOps and a Snowflake instance. It ensures that the integration configuration
    parameters, such as the API Root, Account, Username, and Private Key, are correctly
    set and that the network path to the Snowflake SQL API is functional.


    ### Parameters Description

    There are no action-specific parameters for this action. It relies on the following
    integration configuration parameters:


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **API Root** | String | Yes | The base URL for the Snowflake API. |

    | **Account** | String | Yes | The Snowflake account identifier. |

    | **Username** | String | Yes | The username used for authentication. |

    | **Private Key** | String | Yes | The base64-encoded private key used for JWT
    authentication. |

    | **Verify SSL** | Boolean | Yes | Whether to verify the SSL certificate of the
    Snowflake server. |


    ### Flow Description

    1. **Initialization**: Extracts the integration configuration parameters from
    the Marketplace settings.

    2. **Authentication**: Decodes the provided private key and generates a JSON Web
    Token (JWT) for secure authentication with the Snowflake SQL API.

    3. **Connectivity Check**: Executes a synchronous POST request to the Snowflake
    API endpoint with a lightweight metadata query (`SHOW TABLES LIMIT 1`).

    4. **Validation**: Evaluates the HTTP response. If the request is successful,
    it confirms connectivity; otherwise, it captures and reports the specific error
    encountered.


    ### Additional Notes

    This action does not process any entities, modify any data in Snowflake, or create
    any internal records in Google SecOps. It is strictly for configuration validation.
