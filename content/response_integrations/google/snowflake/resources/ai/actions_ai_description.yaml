Execute Simple Query:
  ai_description: >-
    Executes a SQL SELECT query against a Snowflake database to retrieve specific
    records based on user-defined parameters. This action is designed for flexible
    data retrieval, allowing users to specify the database, table, schema, and filtering
    criteria. It operates asynchronously, submitting the query and then polling for
    results.


    ### Parameters Description


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Database | String | Yes | The name of the Snowflake database to query. |

    | Table | String | Yes | The name of the table within the database to query. |

    | Schema | String | No | The specific schema to use for the query. |

    | Where Filter | String | No | SQL WHERE clause logic (e.g., `status = 'ACTIVE'`).
    Do not include the 'WHERE' keyword. |

    | Fields To Return | String | No | Comma-separated list of columns to return.
    Defaults to `*` (all fields). |

    | Sort Field | String | No | The column name to use for sorting results. |

    | Sort Order | String | No | The direction of sorting: `ASC` (default) or `DESC`.
    |

    | Max Results To Return | Integer | No | The maximum number of rows to retrieve.
    Defaults to 50. |


    ### Additional Notes


    - This action runs asynchronously. If the query takes time, the action will enter
    an 'In Progress' state and poll for completion in subsequent cycles.

    - The action results are provided as both a Data Table (for the Case Wall) and
    a JSON object (for downstream logic).


    ### Flow Description


    1. **Initialization**: The action initializes the Snowflake manager using the
    integration's configuration (API Root, Account, Credentials).

    2. **Query Construction**: It builds a SQL SELECT statement by combining the `Fields
    To Return`, `Table`, `Where Filter`, `Sort Field`, and `Sort Order` parameters.

    3. **Submission**: On the first run, it submits the query to the Snowflake SQL
    API and receives a `statementHandle` (Query ID).

    4. **Polling**: The action checks the status of the submitted query. If it is
    still running, the action saves the Query ID and waits for the next execution
    cycle.

    5. **Data Retrieval**: Once the query is finished, the action fetches the result
    set.

    6. **Output**: The retrieved data is formatted into a CSV-style table and a JSON
    array, which are then attached to the action's results in Google SecOps.
