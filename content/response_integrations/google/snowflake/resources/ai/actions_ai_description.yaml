Execute Custom Query:
  ai_description: >-
    ### General Description

    Executes a custom SQL query in Snowflake to retrieve data for investigations.
    This action supports asynchronous execution, meaning it submits the query and
    then polls for results, making it suitable for long-running queries. The results
    are returned as a JSON object and displayed in a data table within the SOAR platform.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Query | String | Yes | The SQL query to execute. Note: A LIMIT clause is appended
    automatically based on the 'Max Results To Return' parameter. |

    | Database | String | Yes | The Snowflake database to run the query against. |

    | Schema | String | No | The specific schema within the database. |

    | Max Results To Return | Integer | No | The maximum number of rows to fetch (Default:
    50). |


    ### Additional Notes

    - The action is asynchronous and may require adjusting the script timeout in the
    IDE for very large queries.

    - The 'Max Results To Return' parameter must be a positive number.


    ### Flow Description

    1. **Authentication**: Generates a JWT token using the provided private key for
    Snowflake Key Pair authentication.

    2. **Query Submission**: Submits the SQL query to the Snowflake REST API. The
    action automatically appends a `LIMIT` clause to the query.

    3. **Asynchronous Handling**: If the query is not finished immediately, the action
    enters an 'In Progress' state, storing the `query_id` to check status in subsequent
    runs.

    4. **Data Retrieval**: Once the query completes, the action fetches the result
    set.

    5. **Output**: The retrieved data is processed into a JSON result and a CSV-formatted
    data table named 'Results'.
