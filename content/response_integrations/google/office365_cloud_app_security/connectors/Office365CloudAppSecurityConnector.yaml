name: Office 365 CloudApp Security Connector
parameters:
-   name: DeviceProductField
    default_value: Not Supported
    type: string
    description: Currently NOT SUPPORTED. The product will be filled with the label
        of the service type entity of the alert
    is_mandatory: true
    is_advanced: false
    mode: regular
-   name: EventClassId
    default_value: description
    type: string
    description: The field name used to determine the event name (sub-type)
    is_mandatory: false
    is_advanced: false
    mode: regular
-   name: PythonProcessTimeout
    default_value: 300
    type: string
    description: The timeout limit (in seconds) for the python process running current
        script
    is_mandatory: true
    is_advanced: false
    mode: regular
-   name: Cloud App Security portal URL
    default_value: ''
    type: string
    description: The URL of the Office 365 CloudApp Security portal.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: API Token
    type: password
    description: API Token that will be used to authenticate with Office 365 CloudApp
        Security.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Verify SSL
    default_value: false
    type: boolean
    description: Verify SSL certificates for HTTPS requests to Office 365 CloudApp
        Security.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Max Alerts Per Cycle
    default_value: '5'
    type: integer
    description: 'How many alerts should be processed during one connector run. Default:
        5'
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Offset Time In Hours
    default_value: '24'
    type: integer
    description: 'Number of hours before the first connector iteration to retrieve
        alerts from. This parameter applies to the initial connector iteration after
        you enable the connector for the first time, or used as a fallback value in
        cases where connector''s last run timestamp expires. Default value: 24 hours.'
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Alerts Padding Period
    default_value: '0'
    type: integer
    description: Time frame in minutes to search for new alerts backwards in time
        from the connector last run timestamp. Its recommended to adjust this value
        accordingly to the environment, for example 60 minutes.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Environment Field Name
    default_value: ''
    type: string
    description: Describes the name of the field where the environment name is stored.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Environment Regex Pattern
    type: integer
    description: 'If defined - the connector will implement the specific RegEx pattern
        on the data from "environment field" to extract specific string. For example
        - extract domain from sender''s address: "(?<=@)(\S+$)"'
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Proxy Server Address
    type: string
    description: The address of the proxy server to use.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Proxy Username
    type: string
    description: The proxy username to authenticate with.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Proxy Password
    type: password
    description: The proxy password to authenticate with.
    is_mandatory: false
    is_advanced: false
    mode: script
description: Fetches alerts from Office 365 CloudApp Security.
integration: Office365CloudAppSecurity
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/office-365-cloudapp-security#office-365-cloudapp-security-connector
rules: []
is_connector_rules_supported: false
creator: admin
