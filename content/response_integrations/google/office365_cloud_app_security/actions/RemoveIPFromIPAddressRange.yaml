name: Remove IP From IP Address Range
description: 'Remove IP address from IP address range in Microsoft Cloud App Security.
    Supported entities: IP address. Note: action can only remove exact matches. For
    example, action won''t be able to remove 192.168.1.30, if in the range 192.168.1.1/24
    was provided.'
integration_identifier: Office365CloudAppSecurity
parameters:
-   name: Name
    default_value: ''
    type: string
    description: Specify the name for the IP address range that needs to be updated.
    is_mandatory: true
dynamic_results_metadata:
-   result_example_path: resources/remove_ip_from_ip_address_range_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
simulation_data_json: '{"Entities": ["ADDRESS"]}'
