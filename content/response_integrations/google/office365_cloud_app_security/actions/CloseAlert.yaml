name: Close Alert
description: Close alert in Microsoft Cloud App Security.
integration_identifier: Office365CloudAppSecurity
parameters:
-   name: Alert ID
    default_value: ''
    type: string
    description: Specify the ID of the alert that needs to be closed and marked as
        benign.
    is_mandatory: true
-   name: Comment
    default_value: ''
    type: string
    description: Specify a comment about why the alerts are closed and marked as benign.
    is_mandatory: false
-   name: State
    default_value: True Positive
    type: ddl
    optional_values:
    - True Positive
    - Benign
    - False Positive
    description: Specify what should be the state of the alert.
    is_mandatory: true
-   name: Reason
    default_value: No Reason
    type: ddl
    optional_values:
    - No Reason
    - Actual Severity Is Lower
    - Other
    - Confirmed With End User
    - Triggered By Test
    - Not Of Interest
    - Too Many Similar Alerts
    - Alert Is Not Accurate
    description: 'Specify a reason why the alert should be closed. Note: this parameter
        doesn''t have an impact, if state is "True Positive".'
    is_mandatory: false
dynamic_results_metadata: []
creator: admin
