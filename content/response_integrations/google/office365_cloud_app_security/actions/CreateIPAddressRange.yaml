name: Create IP Address Range
description: Create IP address range in Microsoft Cloud App Security.
integration_identifier: Office365CloudAppSecurity
parameters:
-   name: Name
    default_value: ''
    type: string
    description: Specify the name for the IP address range.
    is_mandatory: true
-   name: Category
    default_value: Corporate
    type: ddl
    optional_values:
    - Corporate
    - Administrative
    - Risky
    - VPN
    - Cloud provider
    - Other
    description: Specify the category for the IP address range.
    is_mandatory: true
-   name: Organization
    default_value: ''
    type: string
    description: Specify the organization for the IP address range.
    is_mandatory: false
-   name: Subnets
    default_value: ''
    type: string
    description: Specify a comma-separated list of subnets for the IP address range.
    is_mandatory: true
-   name: Tags
    default_value: ''
    type: string
    description: Specify a comma-separated list of tags for the IP address range.
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/create_ip_address_range_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
