Enrich Entities:
  ai_description: >-
    Enriches User entities using information from Microsoft Cloud App Security (MCAS).
    This action retrieves detailed user profile information, including administrative
    status, roles, email addresses, and threat scores, to provide security analysts
    with better context during investigations.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | portal URL | String | Yes | The base URL for the Microsoft Cloud App Security
    portal API. |

    | API token | String | Yes | The API token used for authenticating requests to
    the MCAS service. |


    ### Flow Description

    1. **Initialization**: The action retrieves the integration configuration (Portal
    URL and API Token) and initializes the Microsoft Cloud App Security manager.

    2. **Entity Filtering**: The action iterates through the target entities in the
    current context, specifically filtering for entities of type `USER`.

    3. **Data Retrieval**: For each identified User entity, the action queries the
    Microsoft Cloud App Security API to retrieve detailed account information using
    the entity's identifier.

    4. **Enrichment**: The retrieved data (such as admin status, role, email, domain,
    and threat score) is mapped to the entity's additional properties.

    5. **Case Wall Update**: A data table containing a summary of the user's information
    is added to the case wall for immediate visibility.

    6. **Entity Update**: The action marks the entities as enriched and updates them
    within Google SecOps to persist the new metadata.


    ### Additional Notes

    - This action is strictly an enrichment task and does not modify any data within
    the Microsoft Cloud App Security platform.

    - It only processes entities identified as `USER` types.
