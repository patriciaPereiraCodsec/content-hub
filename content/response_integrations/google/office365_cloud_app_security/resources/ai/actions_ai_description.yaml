Get IP related activities:
  ai_description: "### General Description\nThe **Get IP Related Activities** action\
    \ retrieves a list of activities associated with specific IP address entities\
    \ from Microsoft Cloud App Security (MCAS). This action is designed to provide\
    \ security analysts with historical context regarding an IP's behavior across\
    \ cloud applications, helping to identify patterns of compromise or unauthorized\
    \ access.\n\n### Parameters Description\n| Parameter | Type | Mandatory | Description\
    \ |\n| :--- | :--- | :--- | :--- |\n| **Activity Display Limit** | Integer | No\
    \ | Specifies the maximum number of activity records to retrieve and display for\
    \ each IP address. Default is 10. |\n| **Product name** | String | No | Filters\
    \ the search to a specific cloud application (e.g., 'Office 365'). If set to 'All'\
    \ or left empty, the action searches across all apps connected to MCAS. |\n| **Time\
    \ Frame** | Integer | Yes | Defines the lookback period in hours (e.g., 24) to\
    \ fetch activities that occurred within that window. |\n\n### Flow Description\n\
    1. **Initialization**: The action extracts the MCAS API credentials and user-defined\
    \ parameters (Limit, Product Name, and Time Frame).\n2. **Entity Selection**:\
    \ It identifies all `ADDRESS` (IP) entities within the current SOAR context.\n\
    3. **Data Retrieval**: For each valid IP entity, the action queries the MCAS API\
    \ for activity logs, applying the specified time frame and product filters.\n\
    4. **Data Transformation**: \n    - Retrieved activities are parsed into a structured\
    \ format.\n    - A CSV-formatted data table is generated for each IP containing\
    \ key details like Activity Description, User, Location, Device, and Date.\n5.\
    \ **Internal Updates**: \n    - The action attaches the generated data tables\
    \ to the case wall for immediate visibility.\n    - The full raw activity data\
    \ is added to the action's JSON results for use in subsequent playbook steps.\n\
    \n### Additional Notes\n- This action is strictly read-only for the external MCAS\
    \ environment; it does not modify any data in Microsoft Cloud App Security.\n\
    - If no activities are found for a specific IP, the action will log a message\
    \ and continue processing other entities."
