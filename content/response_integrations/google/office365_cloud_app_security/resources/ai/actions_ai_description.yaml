Close Alert:
  ai_description: >-
    ### General Description

    Closes a specific alert in Microsoft Cloud App Security (MCAS) by updating its
    resolution state and providing optional context. This action allows analysts to
    programmatically manage the lifecycle of MCAS alerts directly from Google SecOps,
    ensuring that the status in the external security platform reflects the investigation's
    outcome.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Alert ID** | String | Yes | The unique identifier of the alert in Microsoft
    Cloud App Security that needs to be closed. |

    | **State** | Enum | Yes | The resolution state to apply to the alert. Options
    include: `True Positive`, `Benign`, or `False Positive`. |

    | **Comment** | String | No | An optional text comment providing additional details
    or justification for closing the alert. |

    | **Reason** | Enum | No | A specific reason for the closure. This is required
    for `Benign` or `False Positive` states but is ignored if the state is set to
    `True Positive`. |


    ### Additional Notes

    - If the `State` is set to `Benign` or `False Positive`, the `Reason` parameter
    should be populated with a valid sub-reason supported by MCAS (e.g., 'Actual Severity
    Is Lower' for Benign, or 'Alert Is Not Accurate' for False Positive).

    - The action will fail if the provided `Alert ID` does not exist in the target
    Microsoft Cloud App Security environment.


    ### Flow Description

    1. **Initialization**: Retrieves API credentials (Portal URL and API Token) and
    action parameters from the environment.

    2. **Validation & Mapping**: Maps the user-selected `State` and `Reason` to the
    specific integer IDs and endpoint keys required by the Microsoft Cloud App Security
    API.

    3. **API Interaction**: Executes a POST request to the MCAS alert resolution endpoint
    with the specified alert ID, state, reason, and comment.

    4. **Verification**: Parses the API response to confirm that the alert was successfully
    found and updated. If the response indicates zero alerts were modified, an error
    is raised.

    5. **Completion**: Reports the success or failure of the operation to the Google
    SecOps case wall.
  capabilities:
