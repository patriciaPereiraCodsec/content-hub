Remove IP From IP Address Range:
  ai_description: >-
    Removes specific IP address entities from a named IP address range in Microsoft
    Cloud App Security (MCAS). This action is useful for managing network boundaries
    and exclusion lists within the MCAS environment.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Name | String | Yes | The exact name of the IP address range in Microsoft Cloud
    App Security that you want to update. |


    ### Flow Description

    1. **Initialization**: Retrieves the MCAS portal URL and API token from the integration
    configuration and the target IP address range name from the action parameters.

    2. **Range Retrieval**: Fetches all existing IP address ranges from MCAS and searches
    for the one matching the provided 'Name'.

    3. **Validation**: Checks if the specified range exists and ensures that the action
    is not attempting to remove the last remaining IP address from the range (MCAS
    requires at least one entry).

    4. **Entity Processing**: Iterates through the provided IP Address entities. For
    each entity, it verifies if the IP is an exact match within the range's subnet
    list.

    5. **External Update**: If matches are found, it updates the IP address range
    in MCAS by removing the specified IPs. This involves a two-step update process
    (using a temporary name and then reverting to the original) to ensure the API
    processes the change correctly.

    6. **Reporting**: Returns the updated IP address range details as JSON and provides
    a summary message of successful and failed removals.


    ### Additional Notes

    * **Exact Matches Only**: The action only removes exact string matches. It cannot
    remove an individual IP (e.g., 192.168.1.30) if that IP is covered by a broader
    CIDR block (e.g., 192.168.1.0/24) defined in the range.

    * **Last Item Constraint**: The action will fail to remove an IP if it is the
    only entry in the range.
