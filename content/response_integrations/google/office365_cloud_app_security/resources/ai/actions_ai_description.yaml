Ping:
  ai_description: >-
    ### General Description

    The **Ping** action is a diagnostic utility designed to verify the connectivity
    between Google SecOps and the Office 365 Cloud App Security (Microsoft Defender
    for Cloud Apps) instance. It validates that the integration's configuration parameters,
    specifically the Portal URL and API Token, are correctly configured and that the
    external service is reachable.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | None | N/A | N/A | This action does not require any input parameters. |


    ### Additional Notes

    This action is strictly for connectivity testing and does not process entities,
    create insights, or modify any data within Google SecOps or the external system.


    ### Flow Description

    1. **Configuration Extraction**: The action retrieves the 'Portal URL' and 'API
    Token' from the integration's shared configuration.

    2. **Manager Initialization**: It initializes the `Office365CloudAppSecurityManager`
    with the provided credentials.

    3. **Connectivity Test**: The action executes the `test_connectivity` method,
    which sends an authenticated POST request to the activities endpoint (`/api/v1/activities/`)
    with a limit of 1 to verify the API token's validity.

    4. **Response Validation**: The action checks the HTTP response status. If successful,
    it returns a 'Connection Established' message; otherwise, it catches the exception
    and reports a failure.
