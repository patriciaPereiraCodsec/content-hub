List Files:
  ai_description: >-
    Lists available files in Microsoft Cloud App Security (MCAS) based on specified
    filtering criteria. This action allows users to search for files across connected
    cloud applications by attributes such as filename, ID, file type, or sharing status.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Filter Key | String | No | The attribute to filter files by. Options: `ID`,
    `Filename`, `File Type`, `Share Status`. |

    | Filter Logic | String | No | The logic to apply to the filter. Options: `Equal`,
    `Contains`. Note: `Contains` is only supported for `ID` and `Filename`. |

    | Filter Value | String | No | The value to search for. For `File Type`, use values
    like `Document` or `Image`. For `Share Status`, use values like `Internal` or
    `Public`. |

    | Max Records To Return | Integer | No | The maximum number of file records to
    retrieve. Defaults to 50. For `Contains` logic, the action scans up to 1000 results.
    |


    ### Additional Notes

    - If a `Filter Logic` is selected, a `Filter Key` must also be provided.

    - If `Filter Value` is left empty, the filter will not be applied even if a key
    and logic are selected.

    - `File Type` and `Share Status` filters only support `Equal` logic.


    ### Flow Description

    1. **Initialization**: Retrieves API credentials and action parameters.

    2. **Validation**: Checks if the provided filter logic is compatible with the
    selected filter key and validates specific values for `File Type` and `Share Status`
    against supported MCAS enums.

    3. **API Request**: Calls the Microsoft Cloud App Security API to retrieve file
    data. If `Equal` logic is used, the filter is applied at the API level. If `Contains`
    logic is used, the action retrieves a larger set of data for client-side processing.

    4. **Processing**: Parses the raw API response into structured file objects, applying
    client-side substring matching if `Contains` logic was specified.

    5. **Output**: Generates a data table named 'Available Files' and attaches the
    full JSON result to the action output.
