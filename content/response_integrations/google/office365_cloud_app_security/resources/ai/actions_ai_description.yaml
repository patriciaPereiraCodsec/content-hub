Add IP To IP Address Range:
  ai_description: >-
    Adds IP address entities to a specific IP address range configuration in Microsoft
    Cloud App Security (MCAS). This action is primarily used to manage network locations
    by updating the subnets associated with a named range. It identifies the target
    range by name, checks if the IP is already present, and performs a two-step update
    process to ensure the range is correctly modified in the external system.


    ### Parameters

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Name | String | Yes | The exact name of the IP address range in Microsoft Cloud
    App Security that you want to update. |


    ### Flow Description

    1. **Fetch Ranges:** Retrieves all defined IP address ranges from the Microsoft
    Cloud App Security API.

    2. **Identify Target:** Searches the retrieved list for a range matching the provided
    'Name' parameter.

    3. **Entity Processing:** Iterates through the provided IP Address entities.

    4. **Duplicate Check:** For each IP, verifies if it is already included in the
    target range's subnet list.

    5. **Update Range:** If the IP is new, it updates the range in MCAS. This involves
    a two-step API call (using a temporary name and then reverting to the original
    name) to successfully append the new IP to the existing subnet list.

    6. **Result Reporting:** Returns the updated IP address range configuration as
    a JSON result and provides a summary message of successful, existing, or failed
    additions.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Updates the configuration of an IP address range in Microsoft Cloud App Security
      by adding new IP addresses to its subnet list.
    fetches_data: true
    internal_data_mutation_explanation: null
