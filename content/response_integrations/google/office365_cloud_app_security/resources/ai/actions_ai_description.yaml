Bulk Resolve Alert:
  ai_description: >-
    ### General Description


    The **Bulk Resolve Alert** action allows users to resolve multiple alerts within
    Office 365 Cloud App Security in a single operation. This action is primarily
    used for administrative cleanup or closing out related security incidents that
    have been addressed. Note: This action is deprecated; users are encouraged to
    use the "Close Alert" action for future workflows.


    ### Parameters Description


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Alert ID** | String | Yes | A comma-separated list of unique Alert Identifiers
    (e.g., `ca123, ca456`) to be resolved. |

    | **Comment** | String | No | An optional comment providing context or justification
    for why the alerts are being resolved. Defaults to "Resolved". |


    ### Flow Description


    1. **Initialization**: The action retrieves the API credentials (Portal URL and
    API Token) from the integration configuration.

    2. **Parameter Extraction**: It extracts the list of Alert IDs and the optional
    comment provided by the user.

    3. **Processing**: The comma-separated string of Alert IDs is split into a list
    based on a comma and space separator.

    4. **API Interaction**: The action calls the Office 365 Cloud App Security API's
    bulk resolve endpoint via a POST request, passing the IDs and the comment.

    5. **Completion**: The action reports whether the alerts were successfully resolved
    or if an error occurred during the process.


    ### Additional Notes


    - This action does not operate on SecOps entities; it requires manual input of
    Alert IDs.

    - The Alert IDs should be separated by a comma and a space (`, `) for correct
    parsing based on the script logic.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Updates the status of specified alerts to 'Resolved' in the Office 365 Cloud
      App Security portal.
