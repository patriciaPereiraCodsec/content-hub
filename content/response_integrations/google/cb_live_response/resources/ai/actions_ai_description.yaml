Download File:
  ai_description: "### General Description\nThe **Download File** action retrieves\
    \ a specific file from a remote host managed by VMware Carbon Black Cloud. It\
    \ utilizes the Live Response API to establish a secure session with the target\
    \ endpoint, initiate a file retrieval command, and download the file content directly\
    \ to a specified local directory on the Google SecOps (Chronicle) server. This\
    \ action is essential for forensic investigations and incident response where\
    \ physical artifacts from a compromised or suspicious host are required for analysis.\n\
    \n### Parameters Description\n| Parameter | Type | Mandatory | Description |\n\
    | :--- | :--- | :--- | :--- |\n| **File Name** | String | No | The name or full\
    \ path of the file to download. If not provided, the action attempts to use `FILENAME`\
    \ entities from the case. If a full path is provided here, the 'Remote Directory\
    \ Path' is ignored. |\n| **Remote Directory Path** | String | No | The directory\
    \ on the remote host where the file is located (e.g., `C:\\TMP\\`). |\n| **Local\
    \ Directory Path** | String | Yes | The destination path on the Google SecOps\
    \ server where the downloaded file will be saved (e.g., `/tmp/`). |\n| **Check\
    \ for active session x times** | Integer | Yes | The number of attempts the action\
    \ will make to wait for the Live Response session to become active. Checks occur\
    \ every 2 seconds. |\n\n### Additional Notes\n- **Entity Support:** The action\
    \ targets `ADDRESS` (IP) or `HOSTNAME` entities to identify the remote host. It\
    \ can also use `FILENAME` entities to identify the file to be retrieved if the\
    \ 'File Name' parameter is empty.\n- **File Naming:** If the action is executed\
    \ against multiple hosts, the downloaded file name is prefixed with the hostname\
    \ or IP address (e.g., `hostname_filename`) to prevent overwriting.\n- **Path\
    \ Validation:** The action validates that the 'Local Directory Path' is writable\
    \ before proceeding.\n\n### Flow Description\n1. **Initialization:** Extract configuration\
    \ and action parameters, and identify target host entities (`ADDRESS`, `HOSTNAME`)\
    \ and file identifiers (`FILENAME` entities or parameter).\n2. **Device Identification:**\
    \ Query VMware Carbon Black Cloud to find the unique Device ID associated with\
    \ the provided IP or Hostname.\n3. **Session Establishment:** Initiate a Live\
    \ Response session for the identified device and poll the status until it becomes\
    \ 'ACTIVE' (based on the retry parameter).\n4. **Command Execution:** \n    -\
    \ If a specific file is identified, initiate a `get file` command.\n    - If only\
    \ a directory path is provided without a filename, the action first lists the\
    \ directory contents and then attempts to download files.\n5. **File Retrieval:**\
    \ Once the command completes, the action fetches the file content from the Carbon\
    \ Black cloud storage.\n6. **Internal Storage:** The retrieved content is saved\
    \ as a physical file in the specified 'Local Directory Path' on the SOAR server."
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      The action saves the downloaded file content to the local filesystem of the
      Google SecOps server at the path specified in the 'Local Directory Path' parameter.
