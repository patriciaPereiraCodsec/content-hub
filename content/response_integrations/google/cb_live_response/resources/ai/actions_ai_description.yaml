Put File:
  ai_description: >-
    ### General Description

    This action uploads a file to a remote host running the VMware Carbon Black Cloud
    agent. It utilizes the Live Response API to establish a secure session with the
    target endpoint and transfer the specified file. The action supports targeting
    hosts via IP Address or Hostname entities and can identify the file to be uploaded
    either through a provided parameter or via Filename entities (artifacts) present
    in the case.


    ### Parameters Description

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | File Name | String | No | The name of the file to upload. If not provided, the
    action attempts to use Filename entities from the case. If both are provided,
    the parameter takes precedence. |

    | Check for active session x times | Integer | Yes | The number of attempts the
    action will make to verify if a Live Response session is active. Checks occur
    every 2 seconds. Default is 20. |

    | Source Directory Path | String | No | The local directory path on the runner
    where the source file is located (e.g., `/tmp/`). |

    | Destination Directory Path | String | Yes | The target directory path on the
    remote host where the file should be uploaded (e.g., `C:\TMP\`). |


    ### Additional Notes

    - The action is asynchronous and will poll for session activation and command
    completion.

    - If multiple IP and Hostname entities refer to the same Carbon Black agent, the
    action will prioritize the Hostname entity to avoid redundant operations.

    - File names are case-insensitive.


    ### Flow Description

    1. **Initialization**: The action identifies target hosts (IP/Hostname) and the
    files to be uploaded (from parameters or entities).

    2. **Device Identification**: It searches the VMware Carbon Black Cloud environment
    for device IDs corresponding to the provided entities.

    3. **Session Establishment**: A Live Response session is initiated for each identified
    device. The action polls the session status based on the 'Check for active session
    x times' parameter.

    4. **File Upload to Server**: The file is first uploaded from the local source
    path to the Carbon Black server's temporary storage.

    5. **File Deployment to Endpoint**: A `put file` command is issued to move the
    file from the Carbon Black server storage to the specified destination path on
    the target endpoint.

    6. **Command Verification**: The action monitors the status of the `put file`
    command until it reaches a 'complete' or 'failed' state.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      This action uploads a file to a remote endpoint managed by VMware Carbon Black
      Cloud, which changes the file system state of the external host.
