Delete File:
  ai_description: >-
    Deletes a specified file from a remote host running the VMware Carbon Black Cloud
    agent. This action leverages the Live Response API to establish a remote session
    and execute a file deletion command. It supports targeting hosts via IP Address
    or Hostname entities and identifies the file to delete through either a FILENAME
    entity or an action parameter.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Remote Directory Path | String | No | The directory path where the file is located
    (e.g., `C:\TMP\`). |

    | File Name | String | No | The name of the file to delete. Can be a full path.
    If provided, it overrides any FILENAME entities in the case. |

    | Check for active session x times | Integer | Yes | The number of attempts to
    check if the Live Response session is active (checked every 2 seconds). |


    ### Flow Description

    1. **Initialization**: The action identifies target hosts (IP or Hostname) and
    the file(s) to be deleted. It prioritizes the 'File Name' parameter over FILENAME
    entities.

    2. **Device Identification**: It queries Carbon Black Cloud to find the specific
    device ID associated with each host entity.

    3. **Session Establishment**: It initiates a Live Response session for each device
    and polls the status until the session becomes active, respecting the configured
    retry limit.

    4. **Command Execution**: Once the session is active, it issues a 'delete file'
    command to the remote agent for the specified file path.

    5. **Monitoring**: The action monitors the command status asynchronously until
    it is completed, failed, or the action reaches a timeout, reporting the final
    success or failure for each entity.


    ### Additional Notes

    - Either the 'File Name' parameter must be provided, or 'FILENAME' entities must
    exist in the context for the action to run.

    - If 'Remote Directory Path' is provided, 'File Name' should be a simple filename.
    If 'Remote Directory Path' is empty, 'File Name' (or the FILENAME entity) must
    represent a full path.
