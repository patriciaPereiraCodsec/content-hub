Execute File:
  ai_description: >-
    ### General Description

    Executes a file on a remote host running the VMware Carbon Black Cloud agent.
    This action leverages the Live Response capability to initiate a process on the
    target endpoint, optionally passing command-line arguments and redirecting output
    to a log file. It is designed to run on Hostname or IP Address entities and can
    use Filename entities as the source for the executable name.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **File Name** | String | No | The name of the file to execute. Can be a full
    path. If omitted, the action will attempt to use the identifiers of `FILENAME`
    entities present in the context. |

    | **Remote Directory Path** | String | No | The directory path on the remote host
    where the file is located. Example: `C:\TMP\`. |

    | **Output Log File on Remote Host** | String | No | Path on the remote host to
    save the redirected output of the execution. Example: `C:\TMP\cmdoutput.log`.
    |

    | **Command Arguments to Pass to File** | String | No | Arguments to be passed
    to the executable (e.g., `/C whoami`). |

    | **Wait for the Result** | Boolean | No | If enabled, the action will poll the
    external system until the command completes or fails. |

    | **Check for active session x times** | Integer | Yes | The number of attempts
    to make (every 2 seconds) to establish an active Live Response session with the
    target device. |


    ### Additional Notes

    - Either the **File Name** parameter must be provided, or `FILENAME` entities
    must be available in the case context for the action to identify what to execute.

    - If **Remote Directory Path** is provided, the **File Name** should be a simple
    filename without folder separators.

    - The action supports both V3 and V6 versions of the Carbon Black Live Response
    API based on the integration configuration.


    ### Flow Description

    1. **Initialization**: Retrieves API credentials and action parameters, including
    the file(s) to be executed and the target hosts/IPs.

    2. **Device Identification**: Maps the provided `HOSTNAME` or `ADDRESS` entities
    to specific Carbon Black Cloud Device IDs.

    3. **Session Management**: Initiates a Live Response session for each target device
    and polls the session status until it becomes 'ACTIVE'.

    4. **Command Dispatch**: Sends a 'create process' command to the active session
    to execute the specified file with the provided arguments and output redirection.

    5. **Result Tracking**: If configured to wait, the action monitors the command's
    progress and retrieves the final execution details, such as the Process ID (PID)
    and return code, which are then attached to the action results.
