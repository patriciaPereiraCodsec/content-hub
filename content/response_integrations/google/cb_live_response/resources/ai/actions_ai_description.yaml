List Processes:
  ai_description: >-
    ### General Description

    The **List Processes** action retrieves a comprehensive list of all processes
    currently running on a remote endpoint. It leverages the **VMware Carbon Black
    Cloud Live Response** capabilities to interact directly with the host associated
    with a provided **Hostname** or **IP Address** entity. This action is primarily
    used for forensic investigation and incident response to identify suspicious or
    unauthorized software execution.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Process Name** | String | No | A string used to filter the results. Only processes
    whose command line contains this string will be returned. |

    | **How Many Records To Return** | Integer | No | The maximum number of process
    records to return per entity. Defaults to 25. |

    | **Check for active session x times** | Integer | Yes | The number of attempts
    the action will make to verify if the Live Response session has become active.
    Checks occur every 2 seconds. |


    ### Flow Description

    1. **Device Identification**: The action queries Carbon Black Cloud to find the
    specific device ID corresponding to the Hostname or IP entity. If multiple devices
    match, it selects the one with the most recent contact time.

    2. **Session Initiation**: A Live Response session is requested for the identified
    device.

    3. **Session Polling**: The action enters a retry loop, checking the session status
    until it becomes 'ACTIVE' or the retry limit specified in the parameters is reached.

    4. **Command Execution**: Once the session is active, the action sends a `ps`
    (process list) command to the endpoint.

    5. **Result Retrieval**: The action polls for the command's completion. Upon success,
    it retrieves the process list and applies the optional name filter and result
    limit.

    6. **Data Output**: The resulting process list is formatted as a CSV and added
    to the **Case Wall** as a data table. The raw data is also returned in the action's
    JSON result.


    ### Additional Notes

    - This action is asynchronous and may take several minutes depending on the endpoint's
    responsiveness and the session activation time.

    - If the session fails to activate within the allotted retries, the action will
    report a failure for that specific entity.
