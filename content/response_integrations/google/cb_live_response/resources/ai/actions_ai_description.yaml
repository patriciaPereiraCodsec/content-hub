Delete File from Cloud Storage:
  ai_description: >-
    Deletes a file from the VMware Carbon Black Cloud file storage for an existing
    live response session. This action is designed to clean up or remove specific
    artifacts from the cloud storage associated with a device's Live Response session.
    It supports targeting devices via IP or Hostname entities and identifying files
    via Filename entities or a direct input parameter.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | File Name | String | No | The name of the file to delete. If provided, this
    takes precedence over Filename entities. If not provided, the action will attempt
    to use all Filename entities present in the scope. |

    | Check for active session x times | Integer | Yes | The number of attempts the
    action will make to verify if a Live Response session has become active. Checks
    occur every 2 seconds. |


    ### Additional Notes

    * **API Requirement:** This action is only supported using the Carbon Black Live
    Response API v6. It will fail if the 'Use Live Response V6 API' configuration
    parameter is not enabled.

    * **Case Sensitivity:** The file name matching logic is case-insensitive.

    * **Async Execution:** This is an asynchronous action that polls for session activation
    before attempting the deletion.


    ### Flow Description

    1. **Initialization:** The action identifies the target filenames (from parameters
    or entities) and target devices (from ADDRESS or HOSTNAME entities).

    2. **Device Identification:** For each target device, the action queries the Carbon
    Black Cloud API to retrieve the corresponding internal Device ID.

    3. **Session Management:** The action initiates a Live Response session for the
    identified devices and enters a polling loop to wait for the sessions to reach
    an 'ACTIVE' state.

    4. **File Discovery:** Once a session is active, the action retrieves a list of
    all files currently stored in the cloud storage for that specific session.

    5. **Deletion:** The action iterates through the retrieved file list, identifies
    files matching the target filename(s), and issues a delete command to the Carbon
    Black Cloud API for each match.
