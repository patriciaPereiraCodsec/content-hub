Create Memdump:
  ai_description: "### General Description\nThis action creates a memory dump (memdump)\
    \ on a remote host running the VMware Carbon Black Cloud Agent. It utilizes the\
    \ Carbon Black Live Response API to establish a session with the target endpoint\
    \ and execute the memory acquisition command. The action is designed to work asynchronously,\
    \ handling session establishment and command execution monitoring over multiple\
    \ steps.\n\n### Parameters Description\n| Parameter | Type | Mandatory | Description\
    \ |\n| :--- | :--- | :--- | :--- |\n| File Name | String | No | The name of the\
    \ memdump file to be created. If not provided, the action will attempt to use\
    \ the identifiers of any 'FILENAME' entities present in the scope. |\n| Remote\
    \ Directory Path | String | No | The directory path on the remote host where the\
    \ memdump will be stored (e.g., `C:\\TMP\\`). If provided, it is concatenated\
    \ with the File Name. |\n| Check for active session x times | Integer | Yes |\
    \ The number of attempts the action will make to verify that the Live Response\
    \ session is active before timing out. Checks occur every 2 seconds. |\n\n###\
    \ Additional Notes\n- **File Name Logic**: The file name can be provided as a\
    \ full path in the 'File Name' parameter. If so, the 'Remote Directory Path' should\
    \ be left empty. \n- **Entity Support**: The action primarily targets 'HOSTNAME'\
    \ and 'ADDRESS' entities to identify the remote host. It also consumes 'FILENAME'\
    \ entities if the 'File Name' parameter is not specified.\n- **API Versions**:\
    \ Supports both V3 and V6 of the Carbon Black Live Response API based on the integration\
    \ configuration.\n\n### Flow Description\n1. **Initialization**: The action validates\
    \ input parameters and identifies target Hostname/IP entities and the desired\
    \ filename(s).\n2. **Device Identification**: It queries the Carbon Black Cloud\
    \ API to find the corresponding Device ID for each Hostname or IP entity.\n3.\
    \ **Session Establishment**: It initiates a Live Response session for each identified\
    \ device.\n4. **Session Monitoring**: The action polls the session status until\
    \ it becomes 'ACTIVE', retrying based on the 'Check for active session x times'\
    \ parameter.\n5. **Command Execution**: Once the session is active, it issues\
    \ the `memdump` command to the remote host using the specified file path.\n6.\
    \ **Command Monitoring**: It monitors the status of the memdump command until\
    \ completion or failure, providing the final result in the action output."
