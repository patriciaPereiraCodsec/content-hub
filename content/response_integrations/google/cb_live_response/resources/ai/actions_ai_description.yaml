Ping:
  ai_description: "### General Description\nThe **Ping** action is a diagnostic tool\
    \ designed to verify the connectivity between Google SecOps and the **VMware Carbon\
    \ Black Endpoint Standard Live Response** service. It ensures that the provided\
    \ API credentials and configuration parameters are valid and that the external\
    \ service is reachable.\n\n### Parameters Description\n| Parameter Name | Type\
    \ | Mandatory | Description |\n| :--- | :--- | :--- | :--- |\n| **API Root** |\
    \ String | Yes | The base URL for the Carbon Black Cloud API. |\n| **Organization\
    \ Key** | String | Yes | The unique identifier for your Carbon Black organization.\
    \ |\n| **Carbon Black Cloud API ID** | String | Yes | The API ID used for general\
    \ Carbon Black Cloud authentication. |\n| **Carbon Black Cloud API Secret Key**\
    \ | String | Yes | The API Secret Key used for general Carbon Black Cloud authentication.\
    \ |\n| **Live Response API ID** | String | No | The API ID specifically for Live\
    \ Response operations (required for V3 API). |\n| **Live Response API Secret Key**\
    \ | String | No | The API Secret Key specifically for Live Response operations\
    \ (required for V3 API). |\n| **Use Live Response V6 API** | Boolean | No | If\
    \ enabled, the action will use the newer V6 API endpoints for connectivity testing.\
    \ |\n\n### Additional Notes\n- This action does not process any entities.\n- It\
    \ is primarily used during the initial setup of the integration or for troubleshooting\
    \ connection issues.\n- Depending on the **Use Live Response V6 API** toggle,\
    \ the action will validate different sets of credentials (general Cloud API vs.\
    \ specific Live Response API).\n\n### Flow Description\n1. **Parameter Extraction:**\
    \ The action retrieves the integration configuration parameters (API Root, Org\
    \ Key, API IDs, and Secrets).\n2. **Manager Initialization:** Based on the `Use\
    \ Live Response V6 API` parameter, it initializes either the V3 or V6 version\
    \ of the Carbon Black Live Response Manager.\n3. **Connectivity Test:** \n   \
    \ - For **V3**: It performs a POST request to search for devices and a POST request\
    \ to the Live Response service session endpoint to validate both sets of credentials.\n\
    \    - For **V6**: It performs a GET request to the sessions endpoint to validate\
    \ the unified credentials.\n4. **Result Reporting:** If the API calls return successful\
    \ responses, the action completes with a success status. If an exception occurs\
    \ (e.g., 401 Unauthorized), it reports a failure and provides the error details."
