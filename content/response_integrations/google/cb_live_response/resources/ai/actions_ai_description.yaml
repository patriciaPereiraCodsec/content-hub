Kill Process:
  ai_description: >-
    ### General Description

    This action terminates a specific process on a remote host using VMware Carbon
    Black Cloud Live Response. It supports targeting hosts via IP Address or Hostname
    entities. The action is designed to handle the end-to-end Live Response workflow,
    including device discovery, session establishment, process enumeration to find
    the correct Process ID (PID), and the final termination command. It is an asynchronous
    action that polls for session readiness and command completion.


    ### Parameters Description

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Process Name | String | No | The name of the process to search for and terminate.
    If not provided, the action will attempt to use the identifier of the first 'PROCESS'
    entity found in the alert context. |

    | Check for active session x times | Integer | Yes | The number of attempts the
    action will make to wait for a Live Response session to become active on the target
    device. Checks are performed every 2 seconds. Default is 20. |


    ### Additional Notes

    - **Process Identification:** If the `Process Name` parameter is provided, it
    takes precedence over any `PROCESS` entities. If the parameter is empty and no
    `PROCESS` entities exist, the action will fail.

    - **Device Matching:** The action automatically resolves Hostname or IP entities
    to Carbon Black Sensor IDs. If multiple sensors match a single entity, it selects
    the one with the most recent contact time.

    - **API Versions:** Supports both Live Response V3 and V6 APIs based on the integration
    configuration.


    ### Flow Description

    1. **Initialization:** Extract configuration and parameters. Determine the target
    process name from the input parameter or available `PROCESS` entities.

    2. **Device Discovery:** Search for the corresponding VMware Carbon Black Cloud
    agent (device) for each `ADDRESS` or `HOSTNAME` entity.

    3. **Session Establishment:** Initiate a Live Response session for each identified
    device.

    4. **Session Polling:** Periodically check the status of the session until it
    becomes 'ACTIVE' or the retry limit is reached.

    5. **Process Enumeration:** Once the session is active, the action triggers a
    'list processes' command on the remote host.

    6. **PID Resolution:** Parse the process list to find the PID associated with
    the target process name.

    7. **Termination:** Issue a 'kill' command using the resolved PID to terminate
    the process.

    8. **Verification:** Monitor the kill command status to confirm successful termination
    and report the results.
