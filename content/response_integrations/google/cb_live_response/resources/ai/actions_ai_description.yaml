List Files:
  ai_description: >-
    ### General Description

    Lists files in a specified directory on a remote host running a VMware Carbon
    Black Cloud agent. This action uses the Carbon Black Live Response API to establish
    a remote session and execute a directory listing command. It is designed to help
    investigators browse the file system of a target endpoint directly from Google
    SecOps.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Remote Directory Path | String | Yes | The target directory path on the remote
    host to list (e.g., `C:\TMP\` or `/tmp/`). |

    | Max Rows to Return | Integer | No | The maximum number of file entries to return
    in the results. Default is 50. |

    | Start from Row | Integer | No | The starting index for the file list, used for
    pagination. Default is 0. |

    | Check for active session x times | Integer | Yes | The number of times the action
    will poll to check if the Live Response session has become active. Polling occurs
    every 2 seconds. Default is 20. |


    ### Additional Notes

    - This action is asynchronous and involves multiple steps including device identification,
    session establishment, and command execution.

    - It supports both IP Address and Hostname entities.

    - If multiple agents are found for a single entity, the action selects the one
    with the most recent contact time.


    ### Flow Description

    1. **Device Identification**: Searches for the corresponding VMware Carbon Black
    Cloud device ID based on the provided Hostname or IP entity.

    2. **Session Initiation**: Requests the creation of a Live Response session for
    the identified device.

    3. **Session Activation Check**: Polls the Carbon Black API until the session
    status becomes 'ACTIVE' or the retry limit is reached.

    4. **Command Execution**: Sends a `directory list` command to the active session
    for the specified remote path.

    5. **Result Retrieval**: Polls for the completion of the command and retrieves
    the list of files.

    6. **Data Presentation**: Formats the file list into a data table and adds it
    to the Case Wall for the investigator.
