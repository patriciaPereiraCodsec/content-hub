List Files in Cloud Storage:
  ai_description: >-
    ### General Description

    The **List Files in Cloud Storage** action retrieves a list of files currently
    stored in the VMware Carbon Black Cloud file storage for a specific device. This
    action is primarily used during forensic investigations to audit files that have
    been uploaded to or are available within the cloud-side storage of a Live Response
    session. It operates asynchronously, establishing a communication channel with
    the target endpoint before querying the cloud storage.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Max Rows to Return** | Integer | No | The maximum number of file records to
    include in the results. Default is 50. |

    | **Start from Row** | Integer | No | The index of the first record to retrieve,
    used for pagination. Default is 0. |

    | **Check for active session x times** | Integer | Yes | The number of times the
    action will poll Carbon Black to check if the Live Response session has become
    active. Each check occurs every 2 seconds. Default is 20. |


    ### Flow Description

    1. **Entity Filtering**: The action identifies all Hostname and IP Address entities
    in the current context.

    2. **Device Identification**: For each entity, it queries VMware Carbon Black
    Cloud to find the matching device ID. If multiple devices match, it selects the
    one with the most recent contact time.

    3. **Session Initiation**: It attempts to start a Live Response session for the
    identified device.

    4. **Session Polling**: The action enters an asynchronous loop, checking the session
    status until it becomes "ACTIVE" or the retry limit (defined by the 'Check for
    active session x times' parameter) is reached.

    5. **Data Retrieval**: Once the session is active, it fetches the list of files
    from the cloud storage associated with that session using the specified pagination
    parameters.

    6. **Reporting**: The retrieved file list is added to the Case Wall as a data
    table and provided as a JSON result for downstream actions.


    ### Additional Notes

    - This action is asynchronous and its duration depends on the target device's
    responsiveness to the Live Response session request.

    - If a Hostname and IP entity refer to the same physical device, the action prioritizes
    the Hostname entity to avoid duplicate processing.
