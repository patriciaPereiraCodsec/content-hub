name: Create Memdump
description: 'Create memdump on a host running VMware CB Cloud Agent based on the
    Siemplify Host or IP entity. Note: The File name for the memdump to create can
    be provided either as a Siemplify File entity (artifact) or as an action input
    parameter. If the File name is passed to action both as an entity and input parameter
    - action will be executed on the input parameter. File name is case insensitive.
    File name will be appended to Remote Directory Path to get the resulting file
    paths that CB Cloud API accepts. Additionally, note that VMware CB API does not
    provide an error message if an unvalid Remote Directory Path is provided for the
    created memory dump.  File Name also can be specified as a "full path" having
    both path and a file name, or having file name and file path as separate parameters'
integration_identifier: CBLiveResponse
parameters:
-   name: File Name
    default_value: ''
    type: string
    description: Specify the file name for memdump creation. File name is case insensitive.
        File Name can be specified as a "full path" having both path and a file name,
        in that case Remote Directory Path parameter will not be used.
    is_mandatory: false
-   name: Remote Directory Path
    default_value: ''
    type: string
    description: 'Specify the directory file path to store the memdump. Example: C:\TMP\'
    is_mandatory: false
-   name: Check for active session x times
    default_value: '20'
    type: string
    description: How many attempts action should make to get active session for the
        entity. Check is made every 2 seconds.
    is_mandatory: true
dynamic_results_metadata:
-   result_example_path: resources/create_memdump_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
is_async: true
simulation_data_json: '{"Entities": ["HOSTNAME", "ADDRESS", "FILENAME"]}'
