name: List Files
description: List files on a host running VMware CB Cloud Agent based on the Siemplify
    Host or IP entity.
integration_identifier: CBLiveResponse
parameters:
-   name: Remote Directory Path
    default_value: ''
    type: string
    description: 'Specify the target directory path action should list. Example: C:\TMP\
        or /tmp/'
    is_mandatory: true
-   name: Max Rows to Return
    default_value: '50'
    type: string
    description: Specify how many rows action should return.
    is_mandatory: false
-   name: Start from Row
    default_value: '0'
    type: string
    description: Specify from which row action should start to return data.
    is_mandatory: false
-   name: Check for active session x times
    default_value: '20'
    type: string
    description: How many attempts action should make to get active session for the
        entity. Check is made every 2 seconds.
    is_mandatory: true
dynamic_results_metadata:
-   result_example_path: resources/list_files_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
is_async: true
simulation_data_json: '{"Entities": ["HOSTNAME", "ADDRESS"]}'
