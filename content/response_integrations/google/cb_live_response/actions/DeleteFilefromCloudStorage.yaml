name: Delete File from Cloud Storage
description: 'Delete a file from the VMware Carbon Black Cloud file storage for an
    existing live response session based on the Siemplify Host or IP entity. Note:
    This action is not supported in Carbon Black Live Response API v3, API v6 should
    be used to run this action. The File name can be provided either as a Siemplify
    File entity (artifact) or as an action input parameter. If the File name is passed
    to action both as an entity and input parameter - action will be executed on the
    input parameter. File name is case insensitive.'
integration_identifier: CBLiveResponse
parameters:
-   name: File Name
    default_value: ''
    type: string
    description: Specify the file name to delete. File name is case insensitive.
    is_mandatory: false
-   name: Check for active session x times
    default_value: '20'
    type: string
    description: How many attempts action should make to get active session for the
        entity. Check is made every 2 seconds.
    is_mandatory: true
dynamic_results_metadata:
-   result_example_path: resources/delete_filefrom_cloud_storage_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
is_async: true
simulation_data_json: '{"Entities": ["HOSTNAME", "ADDRESS", "FILENAME"]}'
