Search Records:
  ai_description: >-
    ### General Description

    Searches for records within a specific table in an AppSheet application. This
    action allows users to retrieve data based on a custom selector query, facilitating
    the lookup of business data or logs stored in AppSheet tables.


    ### Parameters Description

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Table Name | String | Yes | The name of the table in AppSheet from which you
    want to retrieve records. |

    | Selector Query | String | No | An AppSheet expression used to filter the results
    (e.g., a condition to limit rows). If left empty, the action retrieves all records
    from the table. |


    ### Additional Notes

    - The action uses the AppSheet API's 'Find' action, which is a read-only operation.

    - Results are presented both as a raw JSON object and a formatted data table named
    'Records'.


    ### Flow Description

    1. **Initialization**: The action initializes the AppSheet manager using the provided
    API Root, App ID, and Access Token.

    2. **Parameter Extraction**: It retrieves the target table name and the optional
    selector query from the action parameters.

    3. **API Request**: It sends a POST request to the AppSheet API with the 'Find'
    action and the specified selector query.

    4. **Data Processing**: The action parses the returned records into a structured
    format.

    5. **Output Generation**: If records are found, it populates the action's JSON
    results and creates a data table in the case wall. If no records match, it returns
    a descriptive message.
