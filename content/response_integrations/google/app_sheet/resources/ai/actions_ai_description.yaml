Add Record:
  ai_description: >-
    Adds a new record to a specified table in AppSheet. This action allows users to
    programmatically insert data into AppSheet applications by providing the table
    name and the record data in JSON format.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Table Name | String | Yes | The name of the table in the AppSheet application
    where the record should be added. |

    | Record JSON Object | String | Yes | A JSON-formatted string representing the
    record to be added. It should contain the fields and values corresponding to the
    table's schema. |


    ### Flow Description

    1. **Parameter Extraction**: The action retrieves the AppSheet connection details
    (API Root, App ID, Access Token) and the action parameters (Table Name, Record
    JSON Object).

    2. **Manager Initialization**: Initializes the AppSheetManager to handle API communication.

    3. **JSON Validation**: Validates that the 'Record JSON Object' is a valid JSON
    string.

    4. **API Request**: Sends a POST request to the AppSheet API using the 'Add' action
    endpoint for the specified table.

    5. **Result Processing**: Captures the API response containing the newly created
    record details and attaches it as a JSON result to the action.
  capabilities:
    can_create_case_comments: false
