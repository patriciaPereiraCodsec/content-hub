Delete Record:
  ai_description: >-
    Deletes a record from a specified table in AppSheet. This action allows users
    to remove data entries by providing the table name and a JSON object containing
    the record's unique identifier.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Table Name | String | Yes | The name of the table in AppSheet from which the
    record should be deleted. |

    | Record JSON Object | String | Yes | A JSON object representing the record to
    delete. Typically, only the primary key/unique identifier of the record needs
    to be included in this object. |


    ### Flow Description

    1. **Parameter Extraction**: The action retrieves the AppSheet API configuration
    (Root, App ID, Token) and the action-specific parameters (Table Name, Record JSON).

    2. **Manager Initialization**: An `AppSheetManager` instance is created to handle
    the API communication.

    3. **API Request**: The action sends a POST request to the AppSheet API's `record_management`
    endpoint with the action set to `Delete` and the provided record identifier in
    the `Rows` array.

    4. **Response Handling**: The action validates the API response. If the record
    existed and was successfully deleted, the deleted record's data is added to the
    action's JSON results.

    5. **Completion**: The action concludes with a success message or an error if
    the deletion failed or the record was not found.
