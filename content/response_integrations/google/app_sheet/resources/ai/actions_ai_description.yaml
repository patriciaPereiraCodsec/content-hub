Ping:
  ai_description: >-
    ### General Description

    This action is designed to verify the connectivity between Google SecOps and the
    AppSheet API. It ensures that the provided configuration parameters, such as the
    API Root, App ID, and Access Token, are correct and that the system can successfully
    communicate with the AppSheet server.


    ### Parameters Description

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | API Root | String | Yes | The base URL of the AppSheet API instance. |

    | App ID | String | Yes | The unique identifier for the specific AppSheet application.
    |

    | Access Token | String | Yes | The security token used for authenticating requests
    to the AppSheet API. |

    | Verify SSL | Boolean | Yes | If enabled, the action will verify the SSL certificate
    of the AppSheet server. |


    ### Additional Notes

    - This action does not require any input entities to run.

    - It is typically used during the initial setup of the integration or for troubleshooting
    connection issues.


    ### Flow Description

    1. **Parameter Extraction:** The action retrieves the integration configuration
    parameters (API Root, App ID, Access Token, and Verify SSL).

    2. **Manager Initialization:** It initializes the `AppSheetManager` with the provided
    credentials and settings.

    3. **Connectivity Test:** The manager executes a `GET` request to the AppSheet
    tables endpoint (`/api/v2/apps/{app_id}/tables`) to validate the credentials and
    network path.

    4. **Result Handling:** If the request is successful, the action completes with
    a success message. If an exception occurs (e.g., authentication failure or network
    timeout), it catches the error and reports a failure.
