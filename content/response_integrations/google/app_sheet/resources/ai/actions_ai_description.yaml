List Tables:
  ai_description: >-
    ### General Description

    Lists available tables within a specific AppSheet application. This action is
    primarily used for discovery and configuration validation, allowing users to retrieve
    the names and IDs of tables defined in their AppSheet project. It supports filtering
    results by name and limiting the total number of returned items.


    ### Parameters Description


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Filter Logic | String | No | Specifies the comparison logic to use when a 'Filter
    Value' is provided. Options are 'Equal' (exact match) or 'Contains' (substring
    match). Default is 'Equal'. |

    | Filter Value | String | No | The string value used to filter the table names.
    If left empty, no filtering is applied. |

    | Max Tables To Return | Integer | No | The maximum number of table records to
    return in the results. Default is 50. Must be a positive integer. |


    ### Additional Notes

    - This action does not require or process any SOAR entities.

    - The results are provided both as a formatted data table and a raw JSON object
    for downstream playbook logic.


    ### Flow Description

    1. **Initialization**: The action initializes the AppSheet manager using the provided
    API Root, App ID, and Access Token.

    2. **Data Retrieval**: It performs a GET request to the AppSheet API to fetch
    the complete list of tables associated with the configured App ID.

    3. **Filtering**: If a 'Filter Value' is provided, the action iterates through
    the retrieved tables and applies the selected 'Filter Logic' (Equal or Contains)
    against the table names.

    4. **Limiting**: The resulting list is truncated based on the 'Max Tables To Return'
    parameter.

    5. **Output**: If tables are found, they are formatted into a CSV-style data table
    and a JSON result. If no tables match the criteria, the action reports a failure
    to find results.
