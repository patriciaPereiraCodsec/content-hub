Update Record:
  ai_description: >-
    Updates an existing record in a specified AppSheet table. This action allows users
    to modify specific fields of a record by providing the record's unique identifier
    and the updated data in a JSON format. It interacts with the AppSheet API using
    the 'Edit' action to apply changes to the external database.


    ### Parameters

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Table Name | String | Yes | The name of the table in AppSheet where the record
    resides. |

    | Record JSON Object | String | Yes | A JSON-formatted string representing the
    record to be updated. This object must include the record's unique ID and the
    specific fields that need to be modified. |


    ### Flow Description

    1. **Initialization**: The action initializes the AppSheet manager using the provided
    API Root, App ID, and Access Token.

    2. **Parameter Extraction**: It retrieves the target table name and the JSON object
    containing the update details from the action parameters.

    3. **API Request**: The action sends a POST request to the AppSheet API's record
    management endpoint with the 'Edit' action type, passing the provided JSON record
    data.

    4. **Response Handling**: It validates the API response. If successful, the updated
    record details are added to the action's JSON results.

    5. **Completion**: The action concludes with a success message or an error report
    if the update fails.
