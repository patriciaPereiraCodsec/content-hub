name: Delete Record
description: Delete a record in a table in AppSheet.
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/appsheet#delete_record
integration_identifier: AppSheet
parameters:
-   name: Table Name
    default_value: ''
    type: string
    description: Specify the JSON object of the record that needs to be deleted. You
        only need to provide the unique identifier key of the record.
    is_mandatory: true
-   name: Record JSON Object
    default_value: ''
    type: string
    description: Specify the JSON object of the record that needs to be deleted. You
        only need to provide the "ID" of the record.
    is_mandatory: true
dynamic_results_metadata:
-   result_example_path: resources/delete_record_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
