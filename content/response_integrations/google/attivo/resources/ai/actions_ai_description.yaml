Ping:
  ai_description: >-
    ### General Description

    Tests the connectivity between Google SecOps and the Attivo server using the provided
    integration configuration parameters. This action ensures that the API Root, Username,
    Password, and SSL settings are correct and that the Attivo service is reachable.


    ### Parameters Description

    There are no action-specific parameters for this action. It utilizes the following
    integration configuration parameters:


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | API Root | String | Yes | The API root URL of the Attivo instance. |

    | Username | String | Yes | The username used for Attivo API authentication. |

    | Password | String | Yes | The password used for Attivo API authentication. |

    | Verify SSL | Boolean | Yes | Specifies whether to verify the SSL certificate
    of the Attivo server. |


    ### Additional Notes

    This action is typically used during the initial setup or troubleshooting of the
    Attivo integration to verify that the communication channel is functional.


    ### Flow Description

    1. **Parameter Extraction**: Retrieves the API Root, Username, Password, and Verify
    SSL settings from the integration configuration.

    2. **Manager Initialization**: Initializes the `AttivoManager` with the extracted
    credentials and connection details. This includes generating an access token via
    a POST request to the authentication endpoint.

    3. **Connectivity Test**: Executes a POST request to the Attivo alerts endpoint
    to verify the session key validity and API responsiveness.

    4. **Result Reporting**: Returns a success message if the connection is established
    or a failure message with error details if the connection fails.
