List Critical ThreatPath:
  ai_description: >-
    ### General Description

    The **List Critical ThreatPath** action retrieves a list of all critical ThreatPaths
    identified within the Attivo environment. This action is primarily used for visibility
    into high-risk lateral movement paths and potential attack vectors. It allows
    users to filter the results based on specific criteria such as the rule name,
    service, or severity.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Filter Key** | String (Dropdown) | No | The specific field used to filter
    the results. Options include: `Rule Name`, `Service`, `Severity`, `Description`,
    and `Category`. |

    | **Filter Logic** | String (Dropdown) | No | The logic applied to the filter.
    Options are `Equal` or `Contains`. |

    | **Filter Value** | String | No | The string value to search for using the selected
    logic. If left empty, no filtering is applied. |

    | **Max Records To Return** | Integer | No | The maximum number of records to
    include in the output. Defaults to 50. |


    ### Additional Notes

    - If **Filter Logic** is set to `Equal` or `Contains`, a **Filter Key** must be
    selected; otherwise, the action will raise an exception.

    - If **Filter Value** is not provided while a logic is selected, the filtering
    step is skipped, and a note is added to the output message.


    ### Flow Description

    1. **Initialization**: The action extracts integration configuration (API credentials)
    and action parameters.

    2. **Validation**: It verifies that a filter key is selected if logic is provided
    and ensures the record limit is a positive integer.

    3. **Data Retrieval**: It connects to the Attivo API and fetches all available
    critical ThreatPaths via the `get_critical_threatpaths` method.

    4. **Filtering**: If a filter value and logic are provided, the action iterates
    through the retrieved paths and filters them based on the selected key mapping.

    5. **Limiting**: The list is truncated to the size specified in the `Max Records
    To Return` parameter.

    6. **Output**: The final list is formatted into a Siemplify data table named "Available
    ThreatPaths" and a raw JSON result for use in downstream playbook tasks.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
  categories:
