Enrich Entities:
  ai_description: >-
    ### General Description

    Enriches Hostname and IP Address entities using information from Attivo. This
    action retrieves comprehensive host details, including operating system, MAC addresses,
    and active users. It can also be configured to fetch security-specific context
    such as ThreatPaths, known vulnerabilities, and credential information (both deceptive
    and real) associated with the entity.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Include ThreatPaths | Boolean | No | If enabled, the action retrieves information
    about ThreatPaths related to the entity. Default is True. |

    | Include Vulnerabilities | Boolean | No | If enabled, the action retrieves information
    about vulnerabilities related to the entity. Default is True. |

    | Include Credential Info | Boolean | No | If enabled, the action retrieves credential
    information (deceptive and real) related to the entity. Default is True. |

    | Create Insights | Boolean | No | If enabled, the action creates a SOAR insight
    containing a summary of the retrieved information. Default is True. |

    | Max ThreatPaths To Return | Integer | No | Specifies the maximum number of ThreatPaths
    to return per entity. Default is 50. Must be greater than 0. |

    | Max Vulnerabilities To Return | Integer | No | Specifies the maximum number
    of vulnerabilities to return per entity. Default is 50. Must be greater than 0.
    |

    | Max Credentials To Return | Integer | No | Specifies the maximum number of credentials
    to return per entity. Default is 50. Must be greater than 0. |


    ### Additional Notes

    - The action supports both Hostname and IP Address entity types.

    - The enrichment data is added to the entity's additional properties with the
    'Attivo' prefix.

    - Data tables are created for each category (General Info, ThreatPaths, Vulnerabilities,
    Credentials) for better visibility in the case wall.


    ### Flow Description

    1. **Parameter Validation**: Validates that the limit parameters (ThreatPaths,
    Vulnerabilities, Credentials) are greater than 0.

    2. **Authentication**: Connects to the Attivo instance using the provided credentials
    and generates a session key.

    3. **Entity Filtering**: Identifies supported entities (Hostname and Address)
    from the target list.

    4. **Data Retrieval**: For each entity, it queries Attivo for basic host information.
    If found, it optionally fetches ThreatPaths, Vulnerabilities, and Credentials
    based on the user-defined parameters.

    5. **Internal Mutation**: Updates the entity's additional properties, sets the
    'is_enriched' flag to true, and optionally creates a detailed insight.

    6. **Result Reporting**: Adds data tables to the SOAR result and returns a JSON
    summary of all enriched data.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entity additional properties with host details, sets the 'is_enriched'
      flag, and creates entity insights containing security context.
  categories:
    enrichment: true
  entity_usage:
    entity_types:
    - HOSTNAME
