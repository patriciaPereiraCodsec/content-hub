List Vulnerability Hosts:
  ai_description: "### General Description\nThis action retrieves a list of hostnames\
    \ associated with specific vulnerabilities from the Attivo platform. It allows\
    \ security analysts to identify which assets in their environment are potentially\
    \ exposed to known vulnerabilities by querying the Attivo ThreatPath module.\n\
    \n### Parameters Description\n| Parameter | Type | Mandatory | Description |\n\
    | :--- | :--- | :--- | :--- |\n| Vulnerabilities | String | Yes | A comma-separated\
    \ list of vulnerability names (e.g., CVE IDs or specific vulnerability titles)\
    \ to search for in the Attivo system. |\n| Max Hosts To Return | Integer | No\
    \ | The maximum number of hostnames to return for each vulnerability. Defaults\
    \ to 50 if not specified. Must be a positive integer. |\n\n### Additional Notes\n\
    - This action does not process entities from the Google SecOps case; it relies\
    \ entirely on the provided 'Vulnerabilities' parameter.\n- If a vulnerability\
    \ is not found or has no associated hosts, the action will report this in the\
    \ output message.\n- Results are presented as individual data tables for each\
    \ vulnerability and a combined JSON result.\n\n### Flow Description\n1. **Initialization**:\
    \ The action initializes the Attivo Manager using the provided integration configuration\
    \ (API Root, Credentials, SSL settings).\n2. **Parameter Parsing**: It converts\
    \ the comma-separated 'Vulnerabilities' string into a list and validates that\
    \ the 'Max Hosts To Return' is a positive integer.\n3. **Data Retrieval**: For\
    \ each vulnerability in the list, the action calls the Attivo API (`/api/threatpath/gethostnamesforvul`)\
    \ to fetch the list of hostnames.\n4. **Result Processing**: \n    - If hosts\
    \ are found, it creates a data table for that specific vulnerability listing the\
    \ hostnames.\n    - It aggregates the results into a JSON structure mapping vulnerabilities\
    \ to their respective host lists.\n5. **Completion**: The action outputs a summary\
    \ message indicating which vulnerabilities were successfully processed, which\
    \ had no hosts, and which were not found in the system."
  capabilities:
