Update Event:
  ai_description: >-
    Updates an event in the Attivo system by changing its status or adding a comment.
    This action allows security analysts to manage the lifecycle of Attivo events
    directly from Google SecOps.


    ### Parameters

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Event ID | String | Yes | The unique identifier of the event in Attivo that
    needs to be updated. |

    | Status | Dropdown | No | The new status for the event. Options include 'Acknowledge'
    or 'Unacknowledge'. |

    | Comment | String | No | A text comment to be appended to the event in Attivo.
    |


    ### Additional Notes

    - At least one of the optional parameters, **Status** or **Comment**, must be
    provided for the action to execute successfully. If both are 'Select One' or empty,
    the action will fail.


    ### Flow Description

    1. **Initialization**: The action initializes the Attivo manager using the provided
    API credentials and configuration.

    2. **Validation**: It checks if either a status update or a comment has been provided.

    3. **Comment Update**: If a comment is provided, the action sends a request to
    the Attivo API to add the comment to the specified Event ID.

    4. **Status Update**: If a status (Acknowledge/Unacknowledge) is selected, the
    action sends a request to the Attivo API to update the event's status.

    5. **Completion**: The action returns a success message if the updates were applied
    correctly.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Updates the acknowledgment status and/or appends comments to events within the
      Attivo platform.
