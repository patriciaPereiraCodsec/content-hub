List Service ThreatPaths:
  ai_description: >-
    ### General Description

    Retrieves ThreatPaths associated with specific services from the Attivo platform.
    This action helps security analysts identify potential lateral movement paths
    and security risks linked to specific network services or applications by querying
    the Attivo threat intelligence database.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Services** | String | Yes | A comma-separated list of service names (e.g.,
    'RDP', 'SMB', 'Web') for which the action will retrieve ThreatPaths. |

    | **Max ThreatPaths To Return** | Integer | No | The maximum number of ThreatPaths
    to return for each specified service. If not provided, the action defaults to
    50. |


    ### Flow Description

    1. **Initialization:** The action initializes the Attivo manager using the provided
    configuration parameters (API Root, Username, Password, and SSL verification settings).

    2. **Parameter Processing:** It extracts the 'Services' list and the 'Max ThreatPaths
    To Return' limit, validating that the limit is a positive integer.

    3. **Data Retrieval:** The action iterates through each service provided in the
    input. For each service, it sends a request to the Attivo API to fetch associated
    ThreatPaths.

    4. **Data Formatting:** Retrieved threat paths are parsed into structured objects.
    For each service with results, a data table is created and added to the action
    output.

    5. **Final Output:** The action aggregates all retrieved data into a JSON result
    and provides a summary message indicating which services were successfully queried
    and which returned no results.


    ### Additional Notes

    * This action does not operate on specific entities (such as IP addresses or Hostnames)
    within the Google SecOps environment; instead, it performs a global query based
    on service names.

    * If no ThreatPaths are found for any of the provided services, the action will
    return a failure status.
