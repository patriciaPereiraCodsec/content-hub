name: Enrich Entities
description: 'Enrich entities using information from Attivo. Supported entities: Hostname,
    IP Address.'
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/attivo#enrich_entities
integration_identifier: Attivo
parameters:
-   name: Include ThreatPaths
    default_value: true
    type: boolean
    description: If enabled, action will return information about ThreatPaths related
        to the entity.
    is_mandatory: false
-   name: Include Vulnerabilities
    default_value: true
    type: boolean
    description: If enabled, action will return information about vulnerabilities
        related to the entity.
    is_mandatory: false
-   name: Include Credential Info
    default_value: true
    type: boolean
    description: If enabled, action will return information about credential information
        related to the entity.
    is_mandatory: false
-   name: Create Insights
    default_value: true
    type: boolean
    description: If enabled, action will create an insight containing all of the retrieved
        information about the entity.
    is_mandatory: false
-   name: Max ThreatPaths To Return
    default_value: '50'
    type: string
    description: 'Specify how many ThreatPaths to return per entity. Default: 50.'
    is_mandatory: false
-   name: Max Vulnerabilities To Return
    default_value: '50'
    type: string
    description: 'Specify how many vulnerabilities to return per entity. Default:
        50.'
    is_mandatory: false
-   name: Max Credentials To Return
    default_value: '50'
    type: string
    description: 'Specify how many credentials to return per entity. Default: 50.'
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/enrich_entities_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
simulation_data_json: '{"Entities": ["HOSTNAME", "ADDRESS"]}'
