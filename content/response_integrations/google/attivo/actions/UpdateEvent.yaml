name: Update Event
description: Update event in Attivo.
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/attivo#update_event
integration_identifier: Attivo
parameters:
-   name: Event ID
    default_value: ''
    type: string
    description: Specify the ID of the event, which needs to be updated.
    is_mandatory: true
-   name: Status
    default_value: Select One
    type: ddl
    optional_values:
    - Select One
    - Acknowledge
    - Unacknowledge
    description: Specify the status for the event.
    is_mandatory: false
-   name: Comment
    default_value: ''
    type: string
    description: Specify a comment that needs to be added to the event.
    is_mandatory: false
dynamic_results_metadata: []
creator: admin
