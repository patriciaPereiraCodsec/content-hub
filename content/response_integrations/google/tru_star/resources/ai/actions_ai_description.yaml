Get Related IOCs:
  ai_description: >-
    ### General Description

    The **Get Related IOCs** action retrieves threat intelligence from TruSTAR regarding
    indicators of compromise (IOCs) that are related to the entities provided in the
    current context. It allows security analysts to uncover connected threats and
    expand the scope of an investigation by identifying associated malicious infrastructure
    or files.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Max IOCs To Return** | Integer | No | Specifies the maximum number of related
    IOCs to retrieve. The value must be between 0 and 1000. If the provided value
    is outside this range, the default value of 50 is used. |

    | **Enclave Filter** | String | No | A comma-separated list of TruSTAR enclave
    names. If provided, the action will only search for related IOCs within these
    specific enclaves. If left empty, all available enclaves are searched. |


    ### Flow Description

    1. **Parameter Initialization**: The action retrieves the API credentials and
    the user-defined parameters (`Max IOCs To Return` and `Enclave Filter`).

    2. **Enclave Validation**: If an enclave filter is provided, the action fetches
    the list of all available enclaves from TruSTAR to map the provided names to their
    corresponding IDs and validates their existence.

    3. **Data Retrieval**: The action sends a request to the TruSTAR API using the
    identifiers of all target entities to find related IOCs, applying the enclave
    filters and result limits.

    4. **Result Processing**: The retrieved IOCs are grouped by their type (e.g.,
    IP, URL, SHA256).

    5. **Output Generation**: The action generates a 'Statistics' data table summarizing
    the counts of each IOC type found and attaches the full list of related IOCs as
    a JSON result.


    ### Additional Notes

    * This action supports all entity types as it queries TruSTAR based on the entity's
    identifier string.

    * If no entities are provided to the action, it will complete successfully but
    return no results.
