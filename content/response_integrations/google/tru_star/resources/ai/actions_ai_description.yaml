Enrich Entities:
  ai_description: "Enriches entities with threat intelligence data from TruSTAR. This\
    \ action retrieves metadata and summary information for various entity types to\
    \ provide context on sightings, severity, and source tags.\n\n### Parameters\n\
    | Parameter | Type | Mandatory | Description |\n| :--- | :--- | :--- | :--- |\n\
    | Security Level Threshold | String | Yes | Specifies the minimum security level\
    \ (Benign, Low, Medium, High) required for an entity to be automatically marked\
    \ as suspicious in Google SecOps. Default is 'Low'. |\n| Enclave Filter | String\
    \ | No | A comma-separated list of TruSTAR enclave names. If provided, the action\
    \ only retrieves intelligence data from these specific enclaves. |\n\n### Flow\
    \ Description\n1. **Initialization**: Validates the connection to TruSTAR and\
    \ verifies that any provided enclave names in the 'Enclave Filter' exist in the\
    \ target account.\n2. **Data Retrieval**: Fetches indicator metadata and summary\
    \ information from TruSTAR for all target entities in the current scope.\n3. **Severity\
    \ Assessment**: For each entity, the action calculates the maximum severity level\
    \ based on the retrieved summaries.\n4. **Enrichment**: Updates entity attributes\
    \ with data points such as first/last seen timestamps, sighting counts, source\
    \ tags, and a direct link to the TruSTAR report.\n5. **Internal Mutation**: \n\
    \    * Adds a visual **Insight** to the entity showing its severity level.\n \
    \   * Adds an **Entity Link** for quick access to the TruSTAR platform.\n    *\
    \ Attaches an **Entity Table** containing a CSV-formatted summary of the intelligence.\n\
    6. **Suspicion Logic**: If the entity's maximum severity meets or exceeds the\
    \ 'Security Level Threshold', the entity is marked as **Suspicious**.\n7. **Finalization**:\
    \ Updates the entities within Google SecOps and returns a JSON result of all gathered\
    \ data."
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entity attributes (additional_properties), sets the 'is_enriched' and
      'is_suspicious' flags, adds entity insights, creates entity links, and attaches
      data tables to entities.
