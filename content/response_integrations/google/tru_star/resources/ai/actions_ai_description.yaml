Get Related Reports:
  ai_description: >-
    The 'Get Related Reports' action retrieves threat intelligence reports from TruSTAR
    that are correlated with the entities present in a Google SecOps case. It allows
    security analysts to gain context on how specific indicators (IPs, Hashes, Domains,
    etc.) have been documented in previous security reports within their enclaves.


    ### Parameters Description


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Create Insight | Boolean | No | If enabled (default), the action will create
    a case-level insight summarizing the related reports found. |

    | Include Report Body In Insight | Boolean | No | If enabled, the full text of
    the report body will be included in the insight. Note: This can significantly
    increase the size of the insight. |

    | Enclave Filter | String | No | A comma-separated list of TruSTAR enclave names.
    If provided, the search will be restricted to these specific enclaves. |

    | Max Reports To Return | Integer | No | Specifies the maximum number of reports
    to retrieve. Default is 10, maximum is 25. |


    ### Flow Description


    1.  **Initialization**: The action initializes the TruSTAR manager using the provided
    API credentials and configuration.

    2.  **Entity Processing**: It iterates through all target entities in the case.
    If an entity is a URL, it extracts the domain or path to use as the search indicator;
    otherwise, it uses the entity's identifier.

    3.  **Enclave Validation**: If an 'Enclave Filter' is provided, the action fetches
    the list of available enclaves from TruSTAR to map the provided names to their
    internal IDs. It validates that all specified enclaves exist.

    4.  **Report Retrieval**: It queries the TruSTAR API for reports correlated with
    the collected entity indicators, optionally filtered by the specified enclaves.

    5.  **Detail Enrichment**: For each found report, the action performs additional
    API calls to fetch the full report details and associated tags.

    6.  **Output Generation**: The action compiles the results into a JSON object,
    constructs a CSV data table for the case wall, and (if configured) generates a
    formatted HTML insight containing report titles, dates, status, tags, and links.
