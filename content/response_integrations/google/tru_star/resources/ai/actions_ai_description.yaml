List Enclaves:
  ai_description: >-
    ### General Description

    The **List Enclaves** action retrieves a list of available enclaves from the TruSTAR
    platform. Enclaves in TruSTAR are distinct data containers or communities where
    threat intelligence is shared and stored. This action is primarily used for discovery
    and configuration purposes, allowing users to identify which enclaves they have
    access to and their respective IDs for use in other TruSTAR actions.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Filter Logic** | String | No | Determines the comparison method for filtering
    enclave names. Options are `Equal` (exact match) or `Contains` (partial match).
    Defaults to `Equal`. |

    | **Filter Value** | String | No | The specific string to search for in the enclave
    names. If left empty, all retrieved enclaves are returned. |

    | **Max Enclaves To Return** | Integer | No | The maximum number of enclave records
    to retrieve and process. Defaults to 50. If a non-positive value is provided,
    the default is used. |


    ### Flow Description

    1. **Parameter Extraction**: The action extracts the API credentials (API Root,
    Key, Secret) and the user-defined filtering parameters.

    2. **API Interaction**: It establishes a session with TruSTAR and calls the `list_enclaves`
    endpoint to fetch all enclaves accessible to the user.

    3. **Pagination/Limiting**: The retrieved list is truncated based on the **Max
    Enclaves To Return** parameter.

    4. **Filtering Logic**: If a **Filter Value** is provided, the action iterates
    through the enclaves and applies the selected **Filter Logic** (Equal or Contains)
    against the enclave's name.

    5. **Result Generation**: The final list of enclaves is added to the action's
    execution results as a JSON object and a data table for display in the Google
    SecOps interface.


    ### Additional Notes

    * **Data Table Title**: Note that the data table generated by this action is titled
    "Related Reports" in the UI, although it contains enclave metadata (Name, ID,
    Type, and Permissions).

    * **Permissions**: The output includes boolean flags for each enclave indicating
    if the user has `Read`, `Create`, or `Update` permissions.
