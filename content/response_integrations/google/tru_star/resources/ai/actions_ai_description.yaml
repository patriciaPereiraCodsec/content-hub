Ping:
  ai_description: >-
    ### General Description

    Tests the connectivity to the TruSTAR service using the provided configuration
    parameters. This action ensures that the API Root, API Key, and API Secret are
    valid and that the Google SecOps platform can communicate with the TruSTAR API.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | API Root | String | Yes | The base URL of the TruSTAR API service. |

    | API Key | String | Yes | The API Key used for authentication. |

    | API Secret | String | Yes | The API Secret used for authentication. |

    | Verify SSL | Boolean | Yes | If enabled, the action will verify the SSL certificate
    of the TruSTAR server. |


    ### Flow Description

    1. **Parameter Extraction**: Retrieves the API Root, API Key, API Secret, and
    SSL verification preference from the integration configuration.

    2. **Manager Initialization**: Creates an instance of the `TruSTARManager`, which
    automatically performs an OAuth2 authentication flow to obtain an access token
    via a POST request to the `/oauth/token` endpoint.

    3. **Connectivity Test**: Executes the `test_connectivity` method, which sends
    a GET request to the TruSTAR version endpoint (`api/1.3/version`) to verify the
    service is reachable and the credentials are valid.

    4. **Result Reporting**: Returns a success status if the request completes without
    error, or a failure status with the specific error message if the connection fails.


    ### Additional Notes

    * This action does not process any entities and is intended for configuration
    validation only.
