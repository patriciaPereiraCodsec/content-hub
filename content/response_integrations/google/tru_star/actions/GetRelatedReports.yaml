name: Get Related Reports
description: 'Get information about reports related to the entities. Supported entities:
    All.'
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/trustar#get_related_reports
integration_identifier: TruSTAR
parameters:
-   name: Create Insight
    default_value: true
    type: boolean
    description: If enabled, action will create an insight containing information
        about reports related to the entities.
    is_mandatory: false
-   name: Include Report Body In Insight
    default_value: false
    type: boolean
    description: 'If enabled, insight will contain information about the report body.
        Note: report body can be very big in size.'
    is_mandatory: false
-   name: Enclave Filter
    default_value: ''
    type: string
    description: Specify a comma-separated list of enclave names that should be used
        during the enrichment.
    is_mandatory: false
-   name: Max Reports To Return
    default_value: 10
    type: string
    description: 'Specify how many reports to return. Default: 10. Maximum: 25.'
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/get_related_reports_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: Admin
simulation_data_json: '{"Entities": ["DestinationURL","FILEHASH", "USER", "HOSTNAME",
    "USERUNIQNAME", "ADDRESS", "MacAddress", "PROCESS", "FILENAME", "THREATSIGNATURE",
    "EMAILSUBJECT", "USB", "CREDITCARD", "PHONENUMBER", "CVE", "THREATACTOR", "THREATCAMPAIGN",
    "GENERICENTITY"]}'
