Get Recent Indicators:
  ai_description: "### General Description\nRetrieves a list of recent malicious indicators\
    \ from the Area1 platform. This action is designed to fetch threat intelligence\
    \ data, such as malicious URLs and file hashes, identified by Area1 within a specific\
    \ recent timeframe. It is primarily used for threat hunting or populating local\
    \ datasets with fresh indicator data.\n\n### Parameters Description\n| Parameter\
    \ | Type | Mandatory | Description |\n| :--- | :--- | :--- | :--- |\n| Seconds\
    \ Back | Integer | Yes | Specifies the lookback window in seconds from the current\
    \ time. The action will retrieve all indicators identified by Area1 starting from\
    \ this point in time until now. Defaults to 60. |\n\n### Flow Description\n1.\
    \ **Initialization**: The action initializes the Area1 manager using the provided\
    \ API Root, Username, and Password from the integration configuration.\n2. **Time\
    \ Window Calculation**: It calculates the start timestamp by subtracting the 'Seconds\
    \ Back' parameter from the current UTC time.\n3. **API Request**: It performs\
    \ a GET request to the Area1 `/indicators` endpoint, passing the calculated 'since'\
    \ timestamp and the current 'end' timestamp.\n4. **Data Processing**: \n    *\
    \ If indicators are returned, the action flattens the JSON data and constructs\
    \ a CSV-formatted data table titled 'Recent Indicators'.\n    * The raw JSON response\
    \ is attached to the action results.\n5. **Completion**: The action ends with\
    \ a summary message indicating the number of indicators found."
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      The action adds a data table named 'Recent Indicators' to the action results
      within the Google SecOps case.
  categories:
    enrichment: false
  entity_usage:
    entity_types: []
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: false
    filters_by_identifier: false
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: false
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
Ping:
  ai_description: "### General Description\nThe **Ping** action is designed to verify\
    \ the connectivity between Google SecOps and the Area1 platform. Its primary purpose\
    \ is to ensure that the integration's configuration parameters\u2014such as the\
    \ API Root, Username, and Password\u2014are valid and that the network environment\
    \ allows for successful communication with the Area1 API.\n\n### Parameters Description\n\
    There are no input parameters for this action. It utilizes the global integration\
    \ configuration settings.\n\n### Flow Description\n1. **Configuration Retrieval**:\
    \ The action fetches the integration's global settings, including the API Root\
    \ URL, Username, Password, and SSL verification preference.\n2. **Manager Initialization**:\
    \ It initializes the `Area1Manager` using the retrieved credentials.\n3. **Connectivity\
    \ Test**: The action performs a lightweight `GET` request to the Area1 `indicators`\
    \ endpoint, specifically requesting data from the last one second to minimize\
    \ data transfer while confirming the API responds correctly.\n4. **Validation**:\
    \ If the API call is successful (HTTP 200 range), the action concludes with a\
    \ success message.\n\n### Additional Notes\nThis action does not process any entities\
    \ and is strictly used for health checks of the integration connection."
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
  categories:
    enrichment: false
  entity_usage:
    entity_types: []
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
