Search Indicator:
  ai_description: "### General Description\nThe **Search Indicator** action enriches\
    \ entities within Google SecOps by querying the Area 1 threat intelligence platform.\
    \ It retrieves detailed metadata for indicators such as hashes, URLs, domains,\
    \ IP addresses, and emails. The retrieved data includes threat classifications,\
    \ confidence ratings, disposition (e.g., MALICIOUS), and detection timelines (first/last\
    \ seen).\n\n### Parameters\n| Parameter | Type | Mandatory | Description |\n|\
    \ :--- | :--- | :--- | :--- |\n| N/A | N/A | N/A | This action does not have any\
    \ input parameters. It uses the global integration configuration for authentication.\
    \ |\n\n### Flow Description\n1. **Connection**: Initializes the Area 1 Manager\
    \ using the API Root, Username, and Password from the integration settings.\n\
    2. **Iteration**: Iterates through all target entities provided in the current\
    \ context.\n3. **API Query**: For each entity, it calls the Area 1 `search` endpoint\
    \ using the entity's identifier as the query term.\n4. **Data Processing**: \n\
    \    * If indicator data is found, it flattens the JSON response.\n    * It adds\
    \ a CSV-formatted data table to the entity in the SOAR interface.\n    * It updates\
    \ the entity's `additional_properties` with the retrieved data, prefixed with\
    \ `area1_`.\n    * It marks the entity as enriched (`is_enriched = True`).\n5.\
    \ **Persistence**: Updates the entities within Google SecOps to save the enrichment\
    \ data.\n6. **Reporting**: Returns a summary message listing all entities for\
    \ which indicators were successfully found.\n\n### Additional Notes\n- This action\
    \ is strictly for enrichment and does not modify any data within the Area 1 platform.\n\
    - If no data is found for an entity, the action logs the event and continues to\
    \ the next entity without failing the entire process."
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      The action updates entity 'additional_properties' with threat intelligence data
      from Area 1 and sets the 'is_enriched' flag to true for processed entities.
  categories:
    enrichment: true
  entity_usage:
