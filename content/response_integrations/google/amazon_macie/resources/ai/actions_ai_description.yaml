Disable Macie:
  ai_description: >-
    Disables the Amazon Macie service for a specific AWS account and region. This
    action is used to programmatically shut down Macie monitoring and delete associated
    Macie resources within the target environment.


    ### Parameters

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | AWS Access Key ID | String | Yes | The AWS access key used to authenticate with
    the Amazon Macie service. |

    | AWS Secret Key | String | Yes | The AWS secret key used to authenticate with
    the Amazon Macie service. |

    | AWS Default Region | String | Yes | The specific AWS region (e.g., us-east-1)
    where the Macie service will be disabled. |


    ### Additional Notes

    - This action does not process or interact with Google SecOps entities (IPs, Hostnames,
    etc.). It is a global service-level command.

    - Disabling Macie will result in the deletion of Macie-specific resources for
    the account.


    ### Flow Description

    1. **Initialization**: The action retrieves AWS credentials and region information
    from the integration configuration.

    2. **Connectivity Test**: It establishes a connection to the AWS Macie API and
    performs a connectivity test by attempting to list findings.

    3. **Service Deactivation**: Upon successful connection, it calls the `disable_macie`
    method, which sends a request to AWS to disable the service and delete its resources.

    4. **Result Reporting**: The action returns a success status and a boolean result
    indicating whether the service was successfully disabled.
