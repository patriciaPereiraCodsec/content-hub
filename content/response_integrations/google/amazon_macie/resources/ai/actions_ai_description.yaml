List Findings:
  ai_description: >-
    ### General Description

    Lists Amazon Macie findings based on specified filtering criteria. This action
    allows users to search for security findings within AWS Macie without requiring
    specific Google SecOps entities as input. It retrieves detailed information about
    findings, including their type, severity, and resource impact, and presents them
    in a structured format for analysis.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Finding Type | String | No | A comma-separated list of Macie finding types to
    search for (e.g., `SensitiveData:S3Object/Credentials`). If empty, all types are
    returned. |

    | Time Frame | Integer | No | The number of hours back from the current time to
    search for findings. Defaults to 4 hours. |

    | Severity | String | No | A comma-separated list of severities to filter by:
    `High`, `Medium`, or `Low`. If empty, all severities are returned. |

    | Include Archived Findings? | Boolean | No | If set to `true`, the search will
    include findings that have been archived in Macie. Defaults to `false`. |

    | Record Limit | Integer | No | The maximum number of findings to return in the
    results. Defaults to 20. |

    | Sort By | String | No | The field name used to sort the results (e.g., `updatedAt`).
    |

    | Sort Order | Enum | No | The order of the results: `ASC` (Ascending) or `DESC`
    (Descending). Defaults to `ASC`. |


    ### Additional Notes

    - This action does not process or enrich Google SecOps entities; it operates solely
    based on the provided input parameters.

    - The action validates that the provided `Severity` values are within the allowed
    set (Low, Medium, High).


    ### Flow Description

    1. **Initialization**: Extracts AWS credentials and region from the integration
    configuration and retrieves all action parameters.

    2. **Validation**: Parses CSV inputs for `Finding Type` and `Severity`, ensuring
    severities match valid AWS Macie values.

    3. **Time Calculation**: Calculates the start time for the search based on the
    `Time Frame` parameter.

    4. **Connection**: Establishes a connection to the Amazon Macie service using
    the provided AWS credentials.

    5. **ID Retrieval**: Queries Macie to get a list of finding IDs that match the
    specified filters (type, severity, time, archive status, and sorting).

    6. **Detail Fetching**: For the retrieved IDs, the action fetches the full finding
    details from Macie.

    7. **Output Generation**: Formats the findings into a data table named "Amazon
    Macie Findings" and attaches the raw JSON data to the action results.
