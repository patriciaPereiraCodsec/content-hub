Delete Custom Data Identifier:
  ai_description: >-
    ### General Description

    Deletes a specific Amazon Macie Custom Data Identifier. This action is used to
    remove custom-defined patterns that Macie uses to detect sensitive data in AWS
    resources. It is a management action that interacts directly with the Amazon Macie
    API and does not process or enrich Google SecOps entities.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Custom Data Identifier ID | String | Yes | The unique identifier (ID) of the
    Amazon Macie custom data identifier that you want to delete. |


    ### Flow Description

    1. **Credential Initialization**: Retrieves AWS Access Key, Secret Key, and Region
    from the integration configuration.

    2. **Connectivity Check**: Validates the connection to the Amazon Macie service
    by attempting to list findings.

    3. **Deletion Execution**: Calls the Amazon Macie API to delete the custom data
    identifier associated with the provided ID.

    4. **Result Reporting**: Returns a success status and message if the deletion
    is confirmed by the AWS service.


    ### Additional Notes

    This action performs a 'soft delete' of the resource in Amazon Macie. As noted
    in the configuration, this action does not work with Siemplify Entities and requires
    the ID to be provided manually or via a previous playbook step.
