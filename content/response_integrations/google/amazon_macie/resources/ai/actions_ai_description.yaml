Create Custom Data Identifier:
  ai_description: >-
    ### General Description

    This action creates a Custom Data Identifier in Amazon Macie. Custom data identifiers
    are used to define specific patterns (using regular expressions) and criteria
    (such as keywords and proximity) that Macie uses to detect sensitive data in your
    AWS environment. This action is useful for extending Macie's detection capabilities
    to include proprietary or industry-specific data formats.


    ### Parameters Description

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Custom Data Identifier Name | String | Yes | A unique name for the new custom
    data identifier (up to 128 characters). |

    | Custom Data Identifier Description | String | No | A description explaining
    the purpose of the identifier (up to 512 characters). |

    | Custom Data Identifier Regular Expression | String | Yes | The regex pattern
    that defines the data to match (up to 512 characters). |

    | Custom Data Identifier Keywords | String | No | A comma-separated list of keywords.
    At least one keyword must be near the regex match for it to be flagged. |

    | Custom Data Identifier Ignore Words | String | No | A comma-separated list of
    words to exclude from results. If the regex matches one of these, it is ignored.
    |

    | Custom Data Identifier Maximum Match Distance | Integer | No | The maximum number
    of characters (1-300) allowed between a regex match and a keyword. Defaults to
    50. |


    ### Additional Notes

    * **Entity Support:** This action does **not** run on Siemplify entities. It is
    a standalone management action.

    * **CSV Parsing:** The 'Keywords' and 'Ignore Words' parameters should be provided
    as comma-separated strings, which the script automatically parses into lists.


    ### Flow Description

    1. **Initialization:** The action retrieves AWS credentials (Access Key, Secret
    Key, Region) from the integration configuration.

    2. **Parameter Extraction:** It extracts the identifier's name, regex, and optional
    criteria from the action parameters.

    3. **Data Preparation:** Comma-separated strings for keywords and ignore words
    are converted into Python lists.

    4. **Connectivity Check:** The action validates the AWS credentials by attempting
    to list findings in Macie.

    5. **Resource Creation:** It calls the Amazon Macie API to create the custom data
    identifier with the specified configuration.

    6. **Result Handling:** Upon success, the unique ID of the newly created identifier
    is returned and added to the action's JSON results.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
