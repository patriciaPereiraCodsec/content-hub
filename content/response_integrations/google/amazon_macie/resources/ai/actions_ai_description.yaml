Enable Macie:
  ai_description: >-
    ### General Description

    Enables the Amazon Macie service within a specified AWS account and region. This
    action is used to programmatically activate Macie's data security and privacy
    capabilities, allowing it to begin discovering and protecting sensitive data in
    AWS. Note that this action does not operate on specific entities and is a global
    configuration task.


    ### Parameters Description

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | AWS Access Key ID | String | Yes | The access key ID for the AWS account where
    Macie will be enabled. |

    | AWS Secret Key | String | Yes | The secret access key for the AWS account. |

    | AWS Default Region | String | Yes | The AWS region (e.g., us-east-1) where the
    Macie service should be activated. |


    ### Additional Notes

    - This action does not interact with Google SecOps entities (IPs, Hostnames, etc.).

    - It requires appropriate IAM permissions in the target AWS account to call the
    `macie2:EnableMacie` API.


    ### Flow Description

    1. **Parameter Initialization**: The action retrieves the AWS credentials and
    region from the integration configuration.

    2. **Manager Setup**: It initializes the Amazon Macie Manager using the provided
    AWS credentials and region.

    3. **Service Activation**: The action calls the Amazon Macie API to enable the
    service for the account.

    4. **Status Reporting**: It validates the response from AWS and returns a success
    or failure status to the Google SecOps workbench.
