Get Findings:
  ai_description: >-
    Retrieves detailed information for specific Amazon Macie findings based on a provided
    list of Finding IDs. This action allows analysts to pull the full raw data and
    summary details of Macie findings into the Google SecOps platform for investigation.
    Note that this action does not process or interact with SecOps entities directly;
    it operates solely based on the provided Finding ID parameters.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Finding ID | String | Yes | A comma-separated list of Amazon Macie Finding IDs
    to retrieve details for. |


    ### Flow Description

    1. **Parameter Extraction**: The action retrieves AWS configuration details (Access
    Key, Secret Key, Region) and the user-provided Finding IDs.

    2. **Connectivity Check**: It initializes the Amazon Macie manager and performs
    a connectivity test to ensure the AWS credentials and region settings are valid.

    3. **Data Retrieval**: The action calls the Amazon Macie API (`get_findings`)
    to fetch details for the specified Finding IDs.

    4. **Result Processing**:
        * Successfully retrieved findings are formatted into a data table named 'Amazon
    Macie Findings'.
        * The full raw data for each finding is added to the action's JSON results
    for use in downstream playbooks.
    5. **Final Status**: The action provides a summary message indicating which findings
    were successfully retrieved and which (if any) were not found in the target AWS
    environment.
