Ping:
  ai_description: >-
    Tests the connectivity to the Amazon Macie service using the provided AWS credentials.
    This action ensures that the integration is correctly configured and can communicate
    with the AWS Macie API by attempting a lightweight API call.


    ### Parameters

    There are no action-specific parameters. The action utilizes the following integration-level
    configuration parameters:

    * **AWS Access Key ID**: Mandatory. The access key for the AWS account.

    * **AWS Secret Key**: Mandatory. The secret key for the AWS account.

    * **AWS Default Region**: Mandatory. The AWS region where Macie is hosted.


    ### Flow Description

    1. **Parameter Extraction**: Retrieves the AWS Access Key, Secret Key, and Region
    from the integration's global configuration.

    2. **Manager Initialization**: Initializes the `AmazonMacieManager` which configures
    the underlying boto3 client for the `macie2` service.

    3. **Connectivity Test**: Executes the `test_connectivity` method, which performs
    a `list_findings` API call with `maxResults=1` to verify the credentials and network
    path.

    4. **Response Validation**: Validates that the HTTP response status code is 200.

    5. **Execution Completion**: Reports a successful connection message if the API
    call succeeds, or a failure message with error details if an exception occurs.
