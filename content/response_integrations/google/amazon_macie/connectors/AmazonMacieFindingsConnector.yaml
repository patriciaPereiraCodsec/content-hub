name: Amazon Macie - Findings Connector
parameters:
-   name: DeviceProductField
    default_value: Product Name
    type: string
    description: Enter the source field name in order to retrieve the Product Field
        name.
    is_mandatory: true
    is_advanced: false
    mode: regular
-   name: EventClassId
    default_value: Type
    type: string
    description: Enter the source field name in order to retrieve the Event Field
        name.
    is_mandatory: true
    is_advanced: false
    mode: regular
-   name: PythonProcessTimeout
    default_value: 180
    type: integer
    description: Timeout limit for the python process running the current script.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: AWS Access Key ID
    default_value: ''
    type: string
    description: AWS Access Key ID to use in integration.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: AWS Secret Key
    default_value: ''
    type: password
    description: AWS Secret Key to use in integration.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: AWS Default Region
    default_value: ''
    type: string
    description: AWS default region to use in integration, for example us-west-2.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Fetch Max Hours Backwards
    default_value: 1
    type: integer
    description: Number of hours before the first connector iteration to retrieve
        findings from. This parameter applies to the initial connector iteration after
        you enable the connector for the first time, or used as a fallback value in
        cases where connector's last run timestamp expires.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Max findings to fetch
    default_value: 50
    type: integer
    description: How many findings to process per one connector iteration.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Finding severity to ingest
    default_value: ''
    type: string
    description: Finding severity to ingest - High, Medium or Low. Parameter accepts
        multiple values as a comma separated string. If nothing is specified - ingest
        all findings regardless of severity.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Use whitelist as a blacklist
    default_value: false
    type: boolean
    description: If enabled, whitelist will be used as a blacklist.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Environment Field Name
    default_value: ''
    type: string
    description: Describes the name of the field where the environment name is stored.
        If the environment field isn't found, the environment is the default environment.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Environment Regex Pattern
    default_value: .*
    type: string
    description: A regex pattern to run on the value found in the "Environment Field
        Name" field. Default is .* to catch all and return the value unchanged. Used
        to allow the user to manipulate the environment field via regex logic. If
        the regex pattern is null or empty, or the environment value is null, the
        final environment result is the default environment.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Proxy Server Address
    default_value: ''
    type: string
    description: The address of the proxy server to use.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Proxy Username
    default_value: ''
    type: string
    description: The proxy username to authenticate with.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Proxy Password
    default_value: ''
    type: password
    description: The proxy password to authenticate with.
    is_mandatory: false
    is_advanced: false
    mode: script
description: 'Pull findings from Amazon Macie. Note: Whitelist works with Finding
    types, for example, SensitiveData:S3Object/Personal.'
integration: AmazonMacie
documentation_link: null
rules: []
is_connector_rules_supported: true
creator: admin
