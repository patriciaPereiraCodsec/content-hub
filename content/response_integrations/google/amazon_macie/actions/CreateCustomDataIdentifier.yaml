name: Create Custom Data Identifier
description: 'Create Amazon Macie Custom Data Identifier. Note: Action is not working
    with Siemplify Entities.'
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/amazon-macie#create_custom_data_identifier
integration_identifier: AmazonMacie
parameters:
-   name: Custom Data Identifier Name
    default_value: ''
    type: string
    description: Amazon Macie new custom data identifier name.
    is_mandatory: true
-   name: Custom Data Identifier Description
    default_value: ''
    type: string
    description: Amazon Macie new custom data identifier description.
    is_mandatory: false
-   name: Custom Data Identifier Regular Expression
    default_value: ''
    type: string
    description: Amazon Macie new custom data identifier regular expression, eg I[a@]mAB[a@]dRequest
    is_mandatory: true
-   name: Custom Data Identifier Keywords
    default_value: ''
    type: string
    description: Amazon Macie new custom data identifier keywords.
    is_mandatory: false
-   name: Custom Data Identifier Ignore Words
    default_value: ''
    type: string
    description: Amazon Macie new custom data identifier ignore words.
    is_mandatory: false
-   name: Custom Data Identifier Maximum Match Distance
    default_value: '50'
    type: string
    description: Amazon Macie new custom data identifier maximum match distance. Default
        value is 50.
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/create_custom_data_identifier_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: Admin
