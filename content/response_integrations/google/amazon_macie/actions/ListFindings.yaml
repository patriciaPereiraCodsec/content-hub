name: List Findings
description: 'List Amazon Macie findings based on the specified action input parameters.  Note:
    Action is not working with Siemplify entities, only with action input parameters.'
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/amazon-macie#list_findings
integration_identifier: AmazonMacie
parameters:
-   name: Finding Type
    default_value: ''
    type: string
    description: Finding type to search for, for example SensitiveData:S3Object/Credentials
        or SensitiveData:S3Object/Multiple. Parameter accepts multiple values as a
        comma separated string. If nothing is specified - return all types of findings.
    is_mandatory: false
-   name: Time Frame
    default_value: '4'
    type: string
    description: 'Specify a time frame in hours for which to fetch findings. '
    is_mandatory: false
-   name: Severity
    default_value: ''
    type: string
    description: Finding severity to search - High, Medium or Low. Parameter accepts
        multiple values as a comma separated string. If nothing is specified - return
        all findings regardless of severity.
    is_mandatory: false
-   name: Include Archived Findings?
    default_value: 'false'
    type: boolean
    description: Specify whether to include archived findings in results or not.
    is_mandatory: false
-   name: Record Limit
    default_value: '20'
    type: string
    description: Specify how many records can be returned by the action.
    is_mandatory: false
-   name: Sort By
    default_value: ''
    type: string
    description: Specify a parameter for sorting the data, eg updatedAt
    is_mandatory: false
-   name: Sort Order
    default_value: ASC
    type: ddl
    optional_values:
    - ASC
    - DESC
    description: Sort order.
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/list_findings_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: Admin
