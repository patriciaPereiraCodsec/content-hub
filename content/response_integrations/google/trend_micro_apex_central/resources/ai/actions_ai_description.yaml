Ping:
  ai_description: >-
    ### General Description

    The Ping action is a diagnostic tool used to verify the connectivity between Google
    SecOps and the Trend Micro Apex Central server. It ensures that the provided configuration
    parameters (API Root, Application ID, and API Key) are valid and that the network
    path is open.


    ### Parameters Description

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | API Root | String | Yes | The base URL of the Trend Micro Apex Central instance.
    |

    | Application ID | String | Yes | The Application ID generated in the Trend Micro
    Apex Central console for API access. |

    | API Key | String | Yes | The API Key associated with the Application ID. |

    | Verify SSL | Boolean | Yes | If enabled, the action will verify the SSL certificate
    of the Trend Micro Apex Central server. |


    ### Additional Notes

    * This action does not process any entities.

    * It relies entirely on the integration's configuration parameters rather than
    action-specific inputs.

    * According to standard SOAR practices, Ping actions are used for health checks
    and are not categorized as enrichment.


    ### Flow Description

    1. **Parameter Extraction**: The action retrieves the API Root, Application ID,
    API Key, and SSL verification settings from the integration configuration.

    2. **Manager Initialization**: It initializes the `TrendMicroApexCentralManager`
    with the extracted credentials.

    3. **Connectivity Test**: The manager executes a `test_connectivity` call, which
    performs a `GET` request to the `/WebApp/API/ServerResource/ProductServers` endpoint.

    4. **Result Reporting**: If the request is successful, the action returns a success
    message. If an exception occurs (e.g., authentication failure or network timeout),
    the action fails and logs the error details.
