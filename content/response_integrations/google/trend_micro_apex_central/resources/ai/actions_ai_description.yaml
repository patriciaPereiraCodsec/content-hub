Create File UDSO:
  ai_description: >-
    Creates User-Defined Suspicious Objects (UDSO) in Trend Micro Apex Central based
    on files located at specified file paths. This action allows security teams to
    programmatically flag files as suspicious across the Trend Micro environment,
    specifying actions like Blocking, Logging, or Quarantining.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | File Paths | String | Yes | A comma-separated list of local file paths to be
    used for UDSO creation. |

    | Action | String | Yes | The scan action to be applied to the UDSO. Options:
    Block, Log, Quarantine. |

    | Note | String | No | An additional note to be associated with the created UDSO.
    |


    ### Flow Description

    1. **Initialization**: Connects to Trend Micro Apex Central using provided credentials
    and extracts action parameters.

    2. **Duplicate Check**: Fetches existing UDSO entries from the server to ensure
    the files aren't already listed, preventing redundant entries.

    3. **File Processing**: For each provided path, the action calculates the SHA-1
    hash and reads the file content to convert it into a base64 string.

    4. **Creation**: Uploads the file content and metadata to Trend Micro Apex Central
    to create a new UDSO with the specified scan action (Block, Log, or Quarantine)
    and note.

    5. **Result Retrieval**: Fetches the details of the successfully created UDSOs
    from the server to provide them as structured JSON output.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Creates new User-Defined Suspicious Objects (UDSO) in Trend Micro Apex Central,
      which modifies the external system's threat detection and prevention policies.
    fetches_data: true
    internal_data_mutation_explanation: null
