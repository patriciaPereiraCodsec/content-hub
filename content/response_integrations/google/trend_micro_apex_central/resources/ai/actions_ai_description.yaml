Create Entity UDSO:
  ai_description: >-
    ### General Description

    Creates User-Defined Suspicious Objects (UDSO) in Trend Micro Apex Central based
    on entities found in a Google SecOps case. This action allows security teams to
    programmatically block or log malicious indicators (IPs, URLs, and SHA-1 File
    Hashes) directly within the Trend Micro ecosystem.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Action** | String | Yes | Specifies the security action to apply to the UDSO.
    Options are 'Block' or 'Log'. Default is 'Block'. |

    | **Note** | String | No | An additional descriptive note for the UDSO. Maximum
    length is 256 characters. |

    | **Expire In (Days)** | Integer | No | The number of days until the UDSO expires.
    If left empty, the object will never expire. Must be a positive integer. |


    ### Additional Notes

    * **Supported Entity Types:** IP (IPv4 only), URL, and File Hash.

    * **Hash Constraint:** Only SHA-1 hashes (40 characters) are supported by this
    specific API endpoint.

    * **Duplicate Prevention:** The action automatically checks the existing UDSO
    list in Apex Central and will skip entities that are already defined to prevent
    redundancy.


    ### Flow Description

    1. **Parameter Validation:** Validates that the 'Note' is under 256 characters
    and 'Expire In (Days)' is a positive number.

    2. **Pre-check:** Retrieves the current list of UDSOs from Trend Micro Apex Central
    to identify indicators already present.

    3. **Entity Filtering:** Iterates through target entities, filtering for supported
    types (IP, URL, FILEHASH) and performing format validation (e.g., verifying IPv4
    format and SHA-1 length).

    4. **Creation:** For each new valid indicator, it sends a request to Apex Central
    to create the UDSO with the specified action, note, and expiration date.

    5. **Result Compilation:** Aggregates the results, identifying which entities
    were successfully added, which already existed, and which failed, providing a
    detailed JSON result for the successful additions.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Creates or updates User-Defined Suspicious Objects (UDSO) in Trend Micro Apex
      Central, which can trigger blocking or logging actions on endpoints managed
      by the system.
    fetches_data: true
    internal_data_mutation_explanation: null
  categories:
