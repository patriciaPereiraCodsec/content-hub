    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Restores network connectivity to isolated endpoints by sending a restoration
      command ('cmd_restore_isolated_agent') to the Trend Micro Apex Central server,
      changing the security state of the physical or virtual endpoint.
