Unisolate Endpoints:
  ai_description: >-
    Restores network connectivity to isolated endpoints in Trend Micro Apex Central.
    This action supports IP Address, Hostname, and MAC Address entities. It operates
    asynchronously, meaning it initiates the unisolation command and then periodically
    polls the external system to verify when the endpoint's status has returned to
    normal.


    ### Parameters

    | Parameter | Description | Type | Mandatory |

    | :--- | :--- | :--- | :--- |

    | API Root | The API root URL of the Trend Micro Apex Central instance. | String
    | Yes |

    | Application ID | The Application ID used for authentication with the Trend Micro
    instance. | String | Yes |

    | API Key | The API Key used for authentication with the Trend Micro instance.
    | String | Yes |

    | Verify SSL | Specifies whether to verify the SSL certificate of the Trend Micro
    server. | Boolean | Yes |


    ### Flow Description

    1. **Entity Filtering**: The action identifies supported entities (IP Address,
    Hostname, or MAC Address) from the target entities list.

    2. **Unisolation Request**: It sends a 'cmd_restore_isolated_agent' command to
    Trend Micro Apex Central for each identified endpoint.

    3. **Asynchronous Polling**: The action transitions to an 'In Progress' state
    and periodically queries the status of the security agents to monitor the transition
    from 'connection_restoration_pending' to 'normal'.

    4. **Finalization**: Once all endpoints are confirmed as unisolated or the operation
    reaches a timeout/failure state, the action completes and reports the results
    for each entity.


    ### Additional Notes

    - This action can take several minutes to complete depending on the responsiveness
    of the endpoints and the Trend Micro server. It is recommended to increase the
    action timeout in the IDE settings.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
