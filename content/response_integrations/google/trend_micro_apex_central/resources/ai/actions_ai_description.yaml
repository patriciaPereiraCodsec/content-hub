    can_update_entities: false
    external_data_mutation_explanation: >-
      Initiates a network isolation command on the endpoint in Trend Micro Apex Central,
      which changes the network connectivity state of the target device to prevent
      communication.
    fetches_data: true
    internal_data_mutation_explanation: null
