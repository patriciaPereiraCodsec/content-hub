Enrich Entities:
  ai_description: >-
    Enriches entities using Trend Micro Apex Central by retrieving information from
    the User-Defined Suspicious Objects (UDSO) list and Security Agent (Endpoint)
    details. The action supports IP Addresses, MAC Addresses, Hostnames, URLs, and
    SHA-1 File Hashes.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Create Endpoint Insight | Boolean | No | If enabled (default: True), creates
    a case insight containing detailed information about enriched endpoints. |

    | Create UDSO Insight | Boolean | No | If enabled (default: True), creates a case
    insight containing information about entities matched in the UDSO list. |

    | Mark UDSO Entities | Boolean | No | If enabled (default: True), marks entities
    found in the UDSO list as suspicious within Google SecOps. |

    | Extract Domain | Boolean | No | If enabled (default: False), extracts the domain
    from URL entities to use for UDSO enrichment instead of the full URL. |


    ### Additional Notes

    - **Hash Support:** Only SHA-1 hashes (40 characters) are supported for enrichment.
    Other hash types will be skipped.

    - **Internal Logic:** The action performs two distinct lookups: one for UDSO matches
    and one for Security Agent details. An entity can be enriched by either or both
    sources.


    ### Flow Description

    1. **Filter Entities:** Identifies supported entities (IP, MAC, Hostname, URL,
    File Hash) from the target list.

    2. **UDSO Lookup:** For URL, File Hash, and IP entities, the action queries the
    Apex Central UDSO list. If a match is found, it retrieves the scan action and
    notes, updates the entity's properties, and optionally marks it as suspicious.

    3. **Endpoint Lookup:** For Hostname, MAC, and IP entities, the action queries
    for Security Agent details. It also checks if the Endpoint Sensor feature is enabled
    for the specific agent.

    4. **Data Integration:** Enriches the entities with the retrieved metadata, adds
    detailed JSON results, and constructs data tables for the case wall.

    5. **Insight Generation:** Creates summary insights for both UDSO matches and
    Endpoint details if the respective parameters are enabled.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entity enrichment data (additional_properties), sets the suspicious
      flag for entities found in the UDSO list, and creates case insights.
