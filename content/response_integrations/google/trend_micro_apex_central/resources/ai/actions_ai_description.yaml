Isolate Endpoints:
  ai_description: >-
    ### General Description

    Isolates endpoints in Trend Micro Apex Central to prevent them from communicating
    with the network. This action is primarily used for containment during incident
    response to stop the spread of threats or prevent data exfiltration from compromised
    hosts. It supports IP Address, Hostname, and MAC Address entities.


    ### Parameters Description

    There are no action-specific parameters for this action. It utilizes the following
    integration configuration parameters to function:


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | API Root | String | Yes | The API root URL of the Trend Micro Apex Central instance.
    |

    | Application ID | String | Yes | The Application ID used for JWT authentication.
    |

    | API Key | String | Yes | The API Key used for JWT authentication. |

    | Verify SSL | Boolean | Yes | Determines whether to verify the SSL certificate
    of the Trend Micro server. |


    ### Flow Description

    1. **Entity Identification**: The action filters the target entities to identify
    supported types: IP Address, Hostname, and MAC Address.

    2. **Isolation Request**: For each supported entity, the action sends a POST request
    to the Trend Micro Apex Central API to initiate the `cmd_isolate_agent` command.

    3. **Asynchronous Monitoring**: Since isolation is not instantaneous, the action
    enters an asynchronous state. It stores the list of pending endpoints and periodically
    polls the Trend Micro API using GET requests to check the `isolation_status` of
    each agent.

    4. **Completion**: The action continues to poll until all endpoints have either
    reached the 'isolated' status, failed the isolation process, or the action reaches
    its execution timeout. It then reports the final status of each endpoint.


    ### Additional Notes

    This is an asynchronous action. Depending on network conditions and the state
    of the target endpoints, the isolation process can take several minutes. Users
    should ensure the action timeout in the IDE is configured appropriately for long-running
    operations.
  capabilities:
    can_create_case_comments: false
