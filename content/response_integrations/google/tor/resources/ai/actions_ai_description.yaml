    filters_by_is_vulnerable: false
    filters_by_modification_time: false
Ping:
  ai_description: >-
    ### General Description

    The **Ping** action is a diagnostic utility designed to verify the connectivity
    between the Google SecOps environment and the Tor Project's exit node list. Its
    primary purpose is to ensure that the integration can successfully reach the external
    threat intelligence source required for identifying Tor exit nodes.


    ### Parameters Description

    There are no input parameters for this action.


    ### Additional Notes

    - This action relies on the global integration configuration, specifically the
    'Use SSL' setting, to determine if SSL certificate verification should be enforced
    during the connection test.

    - As a 'Ping' type action, it is used for health checks and troubleshooting rather
    than data enrichment or case management.


    ### Flow Description

    1. **Configuration Retrieval**: The action retrieves the 'Use SSL' parameter from
    the Tor integration's global configuration.

    2. **Manager Initialization**: It initializes the `TorManager` with the specified
    SSL verification setting.

    3. **Connectivity Test**: The action executes an HTTP GET request to the Tor exit
    nodes list URL (`https://check.torproject.org/exit-addresses`).

    4. **Response Validation**: It checks the HTTP response status to ensure the external
    service is reachable and responding correctly.

    5. **Execution Completion**: If the connection is successful, the action returns
    a success status to the SOAR platform.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
