Is Exit Node:
  ai_description: >-
    ### General Description

    The **Is Exit Node** action determines if IP Address entities are currently serving
    as Tor exit nodes. It provides a quick way to identify potential anonymized traffic
    sources by querying the official Tor Project's real-time exit node list.


    ### Parameters

    There are no action-specific parameters for this action. It utilizes the global
    integration configuration for SSL verification settings.


    ### Flow Description

    1. **Fetch Exit Node List**: The action retrieves the latest list of Tor exit
    nodes from `https://check.torproject.org/exit-addresses`.

    2. **Parse and Filter**: It parses the raw text data to extract IP addresses that
    have been active as exit nodes on the current date.

    3. **Entity Matching**: It iterates through all `ADDRESS` entities in the scope
    and checks if their IP address is present in the retrieved list.

    4. **Result Generation**: It returns a list of all identified exit nodes in the
    action's output message and as a JSON result for use in downstream playbook logic.


    ### Additional Notes

    - This action is a read-only check and does not modify entity attributes (like
    'suspicious' status) or create insights within the case.

    - The action requires outbound network connectivity to the Tor Project's domain.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
  categories:
    enrichment: true
  entity_usage:
    entity_types:
    - ADDRESS
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: true
    filters_by_identifier: false
