List Cases:
  ai_description: >-
    ### General Description

    The **List Cases** action retrieves a comprehensive list of all existing cases
    from the Salesforce platform. This action is designed to provide visibility into
    Salesforce case management directly within the Google SecOps environment, allowing
    analysts to audit or review existing records.


    ### Parameters

    There are no user-defined parameters for this action. It utilizes the global integration
    configuration for authentication and connectivity.


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | N/A | N/A | N/A | This action does not require any input parameters. |


    ### Additional Notes

    This action relies on the 'Api Root', 'Username', 'Password', and 'Token' provided
    in the Salesforce integration settings. It is a read-only operation and does not
    affect the state of cases in Salesforce.


    ### Flow Description

    1. **Authentication**: The action initializes a connection to the Salesforce API
    using the credentials stored in the integration configuration.

    2. **Query Execution**: It constructs and executes a query to fetch all records
    from the Salesforce 'Case' object, retrieving specific fields including CaseNumber,
    Subject, Status, and Priority.

    3. **Data Formatting**: The retrieved records are processed and converted into
    a CSV-compatible format for display.

    4. **Output**: The action populates a data table named 'Cases' in the Google SecOps
    Case Wall and provides the raw JSON data for use in subsequent playbook steps.
