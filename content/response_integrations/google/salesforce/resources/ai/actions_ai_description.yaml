Search Records:
  ai_description: >-
    ### General Description

    The **Search Records** action allows users to perform a global search across multiple
    Salesforce objects using a specific pattern or keyword. It is designed to find
    matches within Cases, Contacts, Leads, Tasks, and Users, providing a broad view
    of related information within the Salesforce environment.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Query | String | Yes | The search term or pattern to look for within Salesforce
    records. This supports Salesforce Object Search Language (SOSL) patterns. |


    ### Flow Description

    1. **Authentication**: The action establishes a connection to the Salesforce instance
    using the configured API Root, Username, Password, and Security Token.

    2. **Search Execution**: It performs a SOSL search using the provided `Query`
    parameter to identify relevant record IDs across supported Salesforce objects.

    3. **Result Categorization**: The search results are parsed and grouped by their
    object type (e.g., Case, Contact, Lead, Task, User).

    4. **Detailed Data Retrieval**: For each identified record ID, the action performs
    follow-up queries to fetch a predefined set of detailed properties (such as Subject,
    Status, Email, Phone, etc.) in chunks to ensure efficiency.

    5. **Output Generation**: The retrieved data is formatted into CSV tables for
    each object type and added to the Google SecOps case as Data Tables. The full
    raw data is also returned as a JSON result for further processing.


    ### Additional Notes

    - This action does not operate on specific entities; it performs a broad search
    based solely on the input query string.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      The action adds data tables to the Google SecOps case containing the search
      results retrieved from Salesforce.
