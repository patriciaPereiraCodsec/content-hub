Add Comment:
  ai_description: >-
    ### General Description

    This action adds a comment to a specific case in Salesforce. It is used to document
    findings, updates, or notes directly within the Salesforce case management system
    from Google SecOps.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Case Number | String | Yes | The unique identifier (number) of the Salesforce
    case where the comment will be added. |

    | Title | String | Yes | The title or subject line for the comment. |

    | Body | String | Yes | The main content or text of the comment. |


    ### Flow Description

    1. **Authentication**: The action establishes a connection to the Salesforce API
    using the configured credentials (API Root, Username, Password, Token).

    2. **Case Retrieval**: It searches for the Salesforce case using the provided
    `Case Number` to retrieve its internal Salesforce ID.

    3. **Comment Creation**: It constructs a comment by combining the `Title` and
    `Body` and creates a new `CaseComment` record in Salesforce associated with the
    retrieved case ID.

    4. **Completion**: The action returns a success message upon the successful creation
    of the comment in Salesforce.


    ### Additional Notes

    This action does not interact with Google SecOps entities; it operates solely
    based on the provided case number parameter.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Creates a new CaseComment record in the external Salesforce system associated
      with a specific case.
    fetches_data: true
    internal_data_mutation_explanation: null
  categories:
