Close Case:
  ai_description: >-
    ### General Description

    This action closes a specific case in Salesforce by updating its status to 'Closed'.
    It identifies the target case using a provided case number, retrieves the internal
    Salesforce ID, and performs the update operation.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Case Number | String | Yes | The unique number of the Salesforce case that needs
    to be closed. |


    ### Flow Description

    1. **Authentication**: Initializes the Salesforce connection using the API Root,
    Username, Password, and Token from the integration configuration.

    2. **Case Retrieval**: Queries Salesforce to find the internal record ID associated
    with the provided 'Case Number'.

    3. **Status Update**: Executes an update command on the identified Salesforce
    case record, setting its 'Status' field to 'Closed'.

    4. **Completion**: Returns a success message to the Google SecOps platform upon
    successful update.


    ### Additional Notes

    This action does not operate on entities within the Google SecOps environment;
    it relies entirely on the 'Case Number' parameter provided by the user or playbook.
