Create Case:
  ai_description: >-
    ### General Description

    Creates a new case record in Salesforce with specified attributes such as subject,
    status, priority, and type. This action is typically used to escalate security
    incidents from Google SecOps to a Salesforce-managed support or ticketing workflow.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Subject | String | Yes | The summary or title of the Salesforce case. |

    | Status | String | No | The current state of the case. Valid values: New, On
    Hold, Closed, Escalated. |

    | Description | String | No | A detailed explanation of the case or incident.
    |

    | Origin | String | No | The source of the case. Valid values: Email, Phone, Web.
    |

    | Priority | String | No | The urgency level of the case. Valid values: Low, Medium,
    High. |

    | Type | String | No | The category of the case. Valid values: Question, Problem,
    Feature Request. |


    ### Additional Notes

    This action does not operate on entities; it is a standalone utility to create
    records in Salesforce based on provided input parameters. Upon successful creation,
    it returns the Salesforce Case Number.


    ### Flow Description

    1. **Authentication**: Connects to the Salesforce API using the configured credentials
    (Username, Password, Token, and API Root).

    2. **Parameter Collection**: Retrieves the case details provided by the user in
    the action parameters.

    3. **Case Creation**: Sends a POST request to Salesforce to create a new 'Case'
    object.

    4. **Data Retrieval**: After creation, the action fetches the full case details
    from Salesforce to confirm the generated Case Number.

    5. **Completion**: Returns the Case Number as the primary output and provides
    a success message.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Creates a new case record in the Salesforce platform.
    fetches_data: true
    internal_data_mutation_explanation: null
