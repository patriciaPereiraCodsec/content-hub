Get Case:
  ai_description: >-
    ### General Description

    The **Get Case** action retrieves comprehensive details for a specific case in
    Salesforce based on its unique case number. This is primarily used to pull context
    from Salesforce into a Google SecOps playbook for investigation or synchronization
    purposes.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Case Number** | String | Yes | The unique Salesforce case number (e.g., '00001001')
    to fetch details for. |


    ### Flow Description

    1. **Authentication**: The action establishes a connection to the Salesforce API
    using the configured credentials (API Root, Username, Password, and Token).

    2. **Parameter Extraction**: It retrieves the `Case Number` provided by the user
    or playbook.

    3. **Data Retrieval**: It executes a query against the Salesforce `Case` object,
    selecting specific fields such as ID, Subject, Description, Created Date, Status,
    and Priority.

    4. **Output**: The retrieved case data is formatted as JSON and attached to the
    action results.


    ### Additional Notes

    - This action does not operate on entities; it requires a specific case number
    as input.

    - If the case number is not found, the action will fail with an error message.
