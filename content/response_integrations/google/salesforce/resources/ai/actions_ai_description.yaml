Ping:
  ai_description: "### General Description\nThe **Ping** action is a diagnostic tool\
    \ designed to verify the connectivity between Google SecOps and a Salesforce instance.\
    \ Its primary purpose is to validate that the integration's configuration parameters\u2014\
    such as the API Root, Username, Password, and Security Token\u2014are correct\
    \ and that the Salesforce API is reachable.\n\n### Parameters Description\nThere\
    \ are no parameters for this action.\n\n### Additional Notes\nThis action is essential\
    \ for troubleshooting authentication issues or network connectivity problems between\
    \ the SOAR platform and Salesforce. It uses a read-only operation (fetching cases)\
    \ to confirm access.\n\n### Flow Description\n1. **Configuration Retrieval**:\
    \ The action extracts the necessary connection details (API Root, Username, Password,\
    \ Token, and SSL settings) from the Salesforce integration configuration.\n2.\
    \ **Client Initialization**: It initializes the `SalesforceManager` using the\
    \ provided credentials and session settings.\n3. **Connectivity Verification**:\
    \ The action executes the `test_connectivity` method, which performs a sample\
    \ query to retrieve cases from Salesforce. This step confirms that the API credentials\
    \ have the necessary permissions and that the endpoint is active.\n4. **Completion**:\
    \ If the query succeeds, the action returns a success message and a boolean `true`\
    \ result."
