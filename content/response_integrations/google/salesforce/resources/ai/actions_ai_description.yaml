Update Case:
  ai_description: >-
    ### General Description

    Updates an existing case record in Salesforce with new information. This action
    allows for modifying key case attributes such as status, priority, and subject
    directly from Google SecOps. It is primarily used to synchronize case management
    between the SOAR and Salesforce CRM.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Case Number | String | Yes | The unique number identifying the Salesforce case
    to be updated. |

    | Subject | String | No | The updated subject for the case. |

    | Status | String | No | The updated status. Valid values: New, On Hold, Closed,
    Escalated. |

    | Description | String | No | The updated description of the case. |

    | Origin | String | No | The updated origin. Valid values: Email, Phone, Web.
    |

    | Priority | String | No | The updated priority. Valid values: Low, Medium, High.
    |

    | Type | String | No | The updated case type. Valid values: Question, Problem,
    Feature Request. |


    ### Flow Description

    1. **Authentication**: Establishes a connection to the Salesforce API using the
    configured credentials (API Root, Username, Password, Token).

    2. **Case Retrieval**: Queries Salesforce to find the internal Salesforce ID of
    the case associated with the provided `Case Number` parameter.

    3. **Update Execution**: Sends a request to Salesforce to update the specified
    fields (Subject, Status, Description, Origin, Priority, or Type) for that specific
    case ID.

    4. **Completion**: Returns a success message to the Google SecOps platform upon
    successful update of the external record.
  capabilities:
