name: Add Comment
description: Add a comment to a case
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/salesforce#add_comment
integration_identifier: Salesforce
parameters:
-   name: Case Number
    type: string
    description: The number of the case.
    is_mandatory: true
-   name: Title
    type: string
    description: The comment title
    is_mandatory: true
-   name: Body
    type: string
    description: The comment's body
    is_mandatory: true
dynamic_results_metadata: []
creator: admin
