Get Url Status:
  ai_description: "### General Description\nThe **Get Url Status** action queries\
    \ the Certly service to retrieve reputation data for URL entities. It is primarily\
    \ used for enrichment, allowing security analysts to automatically determine if\
    \ a URL is known to be malicious or safe based on Certly's threat intelligence\
    \ database.\n\n### Parameters Description\nThere are no action-specific parameters\
    \ for this action. It relies on the global integration configuration (API Token\
    \ and API Root) to authenticate and communicate with the Certly API.\n\n### Additional\
    \ Notes\n- This action only processes entities of type **URL** (DestinationURL).\n\
    - If a URL is identified as 'malicious' by Certly, the action will mark the entity\
    \ as suspicious within the Google SecOps environment and generate an insight for\
    \ the case.\n\n### Flow Description\n1. **Initialization**: The action retrieves\
    \ the API Token and API Root from the integration configuration and initializes\
    \ the Certly manager.\n2. **Entity Filtering**: It iterates through the target\
    \ entities in the current context, filtering for those of type `URL`.\n3. **API\
    \ Request**: For each identified URL, it performs a GET request to the Certly\
    \ API to fetch its current status.\n4. **Data Enrichment**: \n    - The `Certly_Status`\
    \ is added to the entity's additional properties.\n    - The entity is marked\
    \ as enriched.\n5. **Threat Detection**: If the status returned is 'malicious',\
    \ the entity is flagged as suspicious, and a specific insight is added to the\
    \ entity.\n6. **Finalization**: The action updates all processed entities in the\
    \ system and returns a summary message of the results."
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entity attributes including 'Certly_Status', 'is_enriched', and 'is_suspicious'.
      It also creates entity insights for malicious URLs.
  categories:
    enrichment: true
  entity_usage:
    entity_types:
    - DestinationURL
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: true
    filters_by_identifier: false
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: false
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
Ping:
  ai_description: >-
    ### General Description

    The **Ping** action is designed to validate the connectivity between Google SecOps
    and the Certly service. It ensures that the provided API Token and API Root URL
    are correctly configured and that the environment can successfully communicate
    with the Certly API.


    ### Parameters Description

    There are no parameters for this action.


    ### Additional Notes

    This action is a standard health check. It performs a test lookup for a known
    malicious URL (`http://gumblar.cn`) to verify that the API returns a valid response.
    It does not process any entities from the Google SecOps case.


    ### Flow Description

    1. **Configuration Retrieval**: The action retrieves the `Api Token` and `Api
    Root` from the integration settings.

    2. **Manager Initialization**: It initializes the `CertlyManager` using the retrieved
    credentials.

    3. **Connectivity Test**: The action executes the `test_connectivity` method,
    which performs a GET request to the Certly lookup endpoint.

    4. **Execution Completion**: If the request is successful and no API errors are
    returned, the action ends with a success message and the raw API response.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
  categories:
    enrichment: false
  entity_usage:
    entity_types: []
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: false
    filters_by_identifier: false
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: false
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
