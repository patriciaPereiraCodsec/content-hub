Hunt Url:
  ai_description: "### General Description\nThe **Hunt Url** action searches for a\
    \ specific URL within Palo Alto Networks AutoFocus to retrieve associated threat\
    \ intelligence, tags, and sample hits. This is an asynchronous action that initiates\
    \ a 'hunt' (search task) and polls for completion. Once finished, it enriches\
    \ the URL entity with detailed metadata, attaches a full threat report, and marks\
    \ the entity as suspicious if hits are found.\n\n### Parameters Description\n\
    | Parameter | Type | Mandatory | Description |\n| :--- | :--- | :--- | :--- |\n\
    | **Api Key** | String | Yes | The API key used to authenticate with the AutoFocus\
    \ service. |\n| **Results Limit** | Integer | No | The maximum number of hits\
    \ to process for entity enrichment and the data table. If not provided, all results\
    \ are processed. |\n\n### Flow Description\n1.  **Initialization**: The action\
    \ retrieves the API Key and identifies URL entities in the current scope.\n2.\
    \  **Hunt Initiation**: For each URL entity, it calls the AutoFocus API to start\
    \ a search. It receives an `af_cookie` (task identifier) and stores it in the\
    \ action's state.\n3.  **Asynchronous Polling**: The action enters an 'In Progress'\
    \ state. In subsequent cycles, it uses the `af_cookie` to check the completion\
    \ percentage of the hunt.\n4.  **Data Retrieval**: Once the hunt status is 'complete',\
    \ the action retrieves the list of 'hits' (intelligence data) associated with\
    \ the URL.\n5.  **Enrichment**: \n    *   **Entity Properties**: Flattens hit\
    \ data and adds it to the entity's additional properties (prefixed with 'AutoFocus').\n\
    \    *   **Data Table**: Constructs a CSV table of the hits and attaches it to\
    \ the entity.\n    *   **Attachment**: Encodes the full JSON result as a Base64\
    \ report and attaches it to the entity.\n    *   **Status Update**: Marks the\
    \ entity as 'Enriched' and 'Suspicious'.\n    *   **Insights**: Adds a case insight\
    \ summarizing the number of hits found.\n6.  **Finalization**: Updates the entities\
    \ in Google SecOps and returns the final results.\n\n### Additional Notes\n* \
    \  This action is designed to handle multiple entities simultaneously by tracking\
    \ individual task cookies.\n*   If no hits are found for a URL, the entity is\
    \ not marked as suspicious or enriched."
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entity attributes (additional properties), sets the suspicious and enriched
      flags, adds entity insights, and attaches CSV tables and JSON reports to the
      entities within the case.
  categories:
    enrichment: true
  entity_usage:
    entity_types:
    - DestinationURL
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: true
    filters_by_identifier: false
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: false
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
Ping:
  ai_description: "### General Description\nThe **Ping** action is a diagnostic tool\
    \ designed to verify the connectivity between Google SecOps and the Palo Alto\
    \ Networks AutoFocus service. It ensures that the provided API key is valid and\
    \ that the network path to the AutoFocus API is open. This action is typically\
    \ used during the initial setup of the integration or for troubleshooting purposes.\n\
    \n### Parameters Description\n| Parameter Name | Type | Mandatory | Description\
    \ |\n| :--- | :--- | :--- | :--- |\n| **Api Key** | String | Yes | The API key\
    \ required to authenticate requests with the AutoFocus service. This is retrieved\
    \ from the integration configuration. |\n\n### Additional Notes\n- This action\
    \ does not process any entities and is intended solely for connectivity testing.\n\
    - It performs a dummy search query (searching for IP `8.8.8.8`) to validate the\
    \ API response.\n\n### Flow Description\n1. **Initialization**: The action initializes\
    \ the Siemplify context and logs the start of the process.\n2. **Configuration\
    \ Retrieval**: It extracts the mandatory `Api Key` from the integration's configuration\
    \ parameters.\n3. **Connectivity Test**: It instantiates the `AutoFocusManager`\
    \ and calls the `test_connectivity` method.\n4. **API Interaction**: The manager\
    \ sends a sample search request to the AutoFocus API using the provided credentials.\n\
    5. **Result Handling**: \n    - If the API responds successfully (HTTP 200), the\
    \ action completes with a success status and returns `true`.\n    - If an exception\
    \ occurs (e.g., authentication failure, network timeout), the action catches the\
    \ error, logs it, and returns a failure status with `false`."
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: false
    internal_data_mutation_explanation: null
  categories:
    enrichment: false
