Hunt Domain:
  ai_description: >-
    ### General Description

    The **Hunt Domain** action searches for a specific domain within the Palo Alto
    AutoFocus threat intelligence platform. It retrieves associated metadata, tags,
    and malware samples linked to the domain to provide deep context for security
    investigations.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Results Limit | Integer | No | Specifies the maximum number of hits to process
    for entity enrichment. If not provided, all hits are processed. |


    ### Flow Description

    1. **Initialization**: The action identifies `HOSTNAME` entities in the current
    scope and validates the API configuration.

    2. **Hunt Initiation**: For each valid entity, it triggers a search query in AutoFocus
    and receives a unique query cookie (query identifier).

    3. **Asynchronous Polling**: The action enters an asynchronous state, periodically
    checking the status of the hunt using the cookie until the search reaches 100%
    completion.

    4. **Data Retrieval**: Once the hunt is complete, the action retrieves the resulting
    'hits' (intelligence data).

    5. **Enrichment and Reporting**:
        - Updates the entity's additional properties with flattened hit data (prefixed
    with 'AutoFocus').
        - Marks the entity as **Suspicious** and **Enriched**.
        - Attaches a CSV table of the trimmed results to the entity.
        - Attaches a full JSON report as a base64-encoded attachment.
        - Creates an entity insight summarizing the number of hits found in AutoFocus.

    ### Additional Notes

    - This is an asynchronous action that may take several minutes depending on the
    AutoFocus query queue and complexity.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entity attributes (additional properties), sets the 'is_suspicious'
      and 'is_enriched' flags, adds entity insights, and attaches CSV tables and JSON
      reports to the entities.
  categories:
    enrichment: true
  entity_usage:
    entity_types:
    - HOSTNAME
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: true
    filters_by_identifier: false
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: false
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
Hunt File:
  ai_description: "### General Description\nThe **Hunt File** action searches for\
    \ File Hash (MD5, SHA1, SHA256) or Filename entities within Palo Alto Networks\
    \ AutoFocus to identify associated threat intelligence and samples. This is an\
    \ asynchronous action that initiates a search, polls for completion, and then\
    \ enriches the entities with the discovered data.\n\n### Parameters Description\n\
    | Parameter | Type | Mandatory | Description |\n| :--- | :--- | :--- | :--- |\n\
    | **Api Key** | String | Yes | The API key used to authenticate with the AutoFocus\
    \ service. |\n| **Results Limit** | Integer | No | The maximum number of hits\
    \ (samples) to process for entity enrichment. If not provided, all hits are processed.\
    \ |\n\n### Flow Description\n1. **Initialization**: The action identifies supported\
    \ entities (File Hash or Filename) in the current scope and validates the API\
    \ key.\n2. **Search Initiation**: For each entity, it sends a search request to\
    \ AutoFocus. AutoFocus returns a 'cookie' (search identifier) which is stored\
    \ for polling.\n3. **Asynchronous Polling**: The action enters an 'In Progress'\
    \ state, periodically checking the status of the search using the cookie until\
    \ the search is complete.\n4. **Data Retrieval**: Once the search is complete,\
    \ the action retrieves the list of hits (samples) found in AutoFocus.\n5. **Enrichment**:\
    \ \n    * Updates the entity's additional properties with flattened data from\
    \ the hits (up to the specified limit).\n    * Attaches a CSV table containing\
    \ the hit details to the entity.\n    * Uploads the full JSON search results as\
    \ an attachment to the entity.\n    * Marks the entity as 'Enriched' and 'Suspicious'.\n\
    \    * Creates an entity insight summarizing the number of hits found.\n6. **Completion**:\
    \ The action updates the entities in Google SecOps and provides a summary of the\
    \ results.\n\n### Additional Notes\n* The action automatically detects the hash\
    \ type (MD5, SHA1, or SHA256) based on the string length of the File Hash entity.\n\
    * This action is asynchronous and may take several minutes to complete depending\
    \ on the AutoFocus search queue."
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entity properties (additional_properties, is_enriched, is_suspicious),
      adds entity insights, attaches CSV tables of hits, and uploads full JSON reports
      as entity attachments.
  categories:
    enrichment: true
  entity_usage:
    entity_types:
    - FILEHASH
    - FILENAME
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: true
