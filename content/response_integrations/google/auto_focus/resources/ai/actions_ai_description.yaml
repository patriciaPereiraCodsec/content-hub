Hunt Ip:
  ai_description: >-
    ### General Description

    The **Hunt Ip** action is designed to perform a deep search (hunt) for IP Address
    entities within the Palo Alto Networks AutoFocus threat intelligence platform.
    Its primary purpose is to retrieve associated threat samples (hits) and tags to
    provide context on the reputation and history of a specific IP. This action operates
    asynchronously, meaning it initiates a search, polls for completion, and then
    processes the results once the AutoFocus platform has finished its analysis.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Api Key | String | Yes | The API key used to authenticate with the AutoFocus
    service. |

    | Results Limit | Integer | No | The maximum number of hits (samples) to retrieve
    and use for entity enrichment and data tables. If not specified, all available
    hits are processed. |


    ### Flow Description

    1. **Initialization**: The action validates the provided API key and identifies
    all IP Address entities within the current scope.

    2. **Hunt Initiation**: For each valid IP, the action sends a search request to
    AutoFocus. The service returns a 'cookie' (a unique identifier for the search
    task).

    3. **Asynchronous Polling**: The action enters an 'In Progress' state, periodically
    checking the status of each hunt using the associated cookie until the search
    reaches 100% completion.

    4. **Data Retrieval**: Once a hunt is complete, the action retrieves the list
    of hits (samples) associated with the IP address.

    5. **Enrichment**: The action updates the entity's additional properties with
    hit details (up to the specified limit), marks the entity as 'enriched', and sets
    its status to 'suspicious' if hits are found.

    6. **Reporting**: It generates a summary insight, constructs a CSV table of the
    hits, and attaches a full JSON report (Base64 encoded) to the entity for further
    investigation.


    ### Additional Notes

    - This is an **asynchronous action**. It will remain in a pending state in the
    SOAR platform until the external AutoFocus search task is finished.

    - If no hits are found for an IP, the entity is not marked as suspicious, and
    no enrichment data is added.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entity attributes (additional_properties, is_enriched, is_suspicious),
      adds entity insights, attaches data tables, and adds file attachments to the
      case.
  categories:
    enrichment: true
  entity_usage:
