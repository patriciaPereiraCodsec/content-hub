Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the Google GRR server using the credentials and API root
    provided in the integration configuration. This action ensures that the Google
    SecOps platform can successfully communicate with the Google GRR instance.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | API Root | String | Yes | The base URL of the Google GRR API. |

    | Username | String | Yes | The username used for basic authentication. |

    | Password | String | Yes | The password used for basic authentication. |

    | Verify SSL | Boolean | No | If enabled, the action will verify the SSL certificate
    of the Google GRR server. |


    ### Flow Description

    1. **Parameter Extraction**: Retrieves the API Root, Username, Password, and SSL
    verification setting from the integration configuration.

    2. **Manager Initialization**: Initializes the `GoogleGRRManager` which sets up
    the authenticated session and handles CSRF tokens.

    3. **Connectivity Test**: Sends a GET request to the `/api/config` endpoint of
    the Google GRR server to verify the service is reachable and credentials are valid.

    4. **Response Validation**: Checks the HTTP response status. If the status is
    200 OK, the connection is considered successful.

    5. **Result Reporting**: Returns a success status and message if the connection
    is verified, or a failure status with the error details if the connection fails.


    ### Additional Notes

    This action is a standard diagnostic tool and does not process any entities or
    modify any data within Google GRR or Google SecOps.
