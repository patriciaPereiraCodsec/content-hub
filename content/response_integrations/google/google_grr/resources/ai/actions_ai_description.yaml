List Hunts:
  ai_description: "### General Description\nRetrieves a list of available hunts from\
    \ a Google GRR instance. This action allows security analysts to audit or monitor\
    \ active and historical forensic investigations (hunts) across the fleet. It supports\
    \ filtering by the hunt creator and provides paginated results.\n\n### Parameters\
    \ Description\n| Parameter | Type | Mandatory | Description |\n| :--- | :--- |\
    \ :--- | :--- |\n| Creator | String | No | Filters the results to only include\
    \ hunts created by a specific username. |\n| Offset | String | No | The starting\
    \ index for the list of hunts, used for pagination. |\n| Max Results To Return\
    \ | String | No | Limits the number of hunt records returned in the response.\
    \ Defaults to 5 if not specified. |\n\n### Additional Notes\n- This action does\
    \ not require or process any entities from the Google SecOps case.\n- Results\
    \ are presented both as a JSON object for downstream automation and as a formatted\
    \ data table for analyst review.\n\n### Flow Description\n1. **Initialization**:\
    \ The action initializes the Google GRR manager using the integration's API root\
    \ and credentials.\n2. **Parameter Extraction**: It retrieves the optional filters:\
    \ `Creator`, `Offset`, and `Max Results To Return`.\n3. **API Request**: It performs\
    \ a GET request to the Google GRR `/api/hunts` endpoint with the specified query\
    \ parameters.\n4. **Data Parsing**: The raw API response is cleaned (removing\
    \ the GRR-specific XSSI prefix `)]}'`) and parsed into structured `Hunt` data\
    \ models.\n5. **Output Generation**: \n    - A JSON array containing detailed\
    \ hunt metadata (ID, State, Creator, Timestamps) is added to the action results.\n\
    \    - A data table named \"Hunts\" is created and attached to the case, displaying\
    \ a summary of the retrieved hunts in CSV format."
  capabilities:
