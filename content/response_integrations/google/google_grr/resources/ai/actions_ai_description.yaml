Start a Hunt:
  ai_description: >-
    Starts or restarts specific hunts in Google GRR. This action is primarily used
    to activate newly created hunts (which default to a 'PAUSED' state) or to resume
    hunts that were paused due to reaching client limits. It interacts with the Google
    GRR API to transition the state of one or more hunts to 'STARTED'.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Hunt ID | String | Yes | A comma-separated list of unique identifiers for the
    hunts to be started. |


    ### Flow Description

    1. **Initialization**: The action initializes the Google GRR manager using the
    provided API root and credentials.

    2. **Input Parsing**: The 'Hunt ID' parameter is parsed from a comma-separated
    string into a list of individual IDs.

    3. **Execution**: For each Hunt ID, the action sends a PATCH request to the Google
    GRR endpoint (`api/hunts/{hunt_id}`) with the state set to 'STARTED'.

    4. **Error Handling**: The action identifies and reports hunts that were not found
    or those that could not be started because they were not in a 'PAUSED' state.

    5. **Output**: Returns a JSON result containing the updated state of each processed
    hunt and provides a summary message in the action output.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Changes the operational state of a hunt in the Google GRR system from 'PAUSED'
      to 'STARTED' via a PATCH request.
