Get Hunt Details:
  ai_description: "### General Description\nRetrieves comprehensive details for specific\
    \ hunts from a Google GRR instance. This action is used to gather metadata, execution\
    \ status, and performance metrics (such as CPU and network usage) for one or more\
    \ hunts identified by their unique IDs. It provides a structured JSON output of\
    \ the hunt's configuration and results summary, along with direct links to the\
    \ Google GRR web interface for further investigation.\n\n### Parameters Description\n\
    | Parameter | Type | Mandatory | Description |\n| :--- | :--- | :--- | :--- |\n\
    | **Hunt ID** | String | Yes | A comma-separated list of unique identifiers for\
    \ the hunts you wish to retrieve (e.g., `H:123456, H:789012`). |\n\n### Flow Description\n\
    1. **Initialization**: The action extracts connection settings (API Root, Credentials)\
    \ and the `Hunt ID` parameter.\n2. **Parsing**: The provided `Hunt ID` string\
    \ is converted into a list of individual identifiers.\n3. **Data Retrieval**:\
    \ For each ID, the action performs a GET request to the Google GRR API endpoint\
    \ `api/hunts/{hunt_id}`.\n4. **Processing**: \n    * If a hunt is found, its details\
    \ (creator, status, client statistics, flow arguments, etc.) are parsed into a\
    \ structured data model.\n    * A direct URL link to the hunt in the Google GRR\
    \ UI is generated and added to the action results.\n5. **Output**: The action\
    \ aggregates all successfully retrieved hunt details into a JSON result and provides\
    \ a summary message indicating which IDs were found and which (if any) were missing."
