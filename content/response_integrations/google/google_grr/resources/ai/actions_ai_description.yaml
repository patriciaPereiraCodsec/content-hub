List Launched Flows:
  ai_description: >-
    ### General Description

    The **List Launched Flows** action retrieves a list of forensic flows that have
    been executed on a specific client (endpoint) within Google GRR. This action is
    primarily used for auditing previous investigative actions or checking the status
    of forensic tasks performed on a host. It allows analysts to see what automated
    or manual forensic collections have been run against a specific machine.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Offset** | String | No | Specifies the starting index for the list of flows.
    This is used for pagination when a client has a large number of flows. |

    | **Max Results To Return** | String | No | Specifies the maximum number of flow
    records to retrieve in the response. The default value is 5. |


    ### Flow Description

    1. **Authentication**: The action initializes a connection to the Google GRR API
    using the configured credentials (API Root, Username, and Password).

    2. **Client Identification**: For each provided Hostname or IP Address entity,
    the action queries Google GRR to find the corresponding internal `Client ID`.
    It checks the entity's `OriginalIdentifier` property first, falling back to the
    main identifier if necessary.

    3. **Flow Retrieval**: Once the Client ID is obtained, the action requests the
    list of launched flows for that specific client, applying the user-defined `Offset`
    and `Max Results To Return` parameters.

    4. **Data Processing**: The retrieved flow data (including Creator, State, Start
    Time, and Flow Name) is parsed and formatted.

    5. **Output Generation**: The action populates a JSON result with the flow details
    and creates a data table named "GRR Launched Flows" on the case wall for easy
    review.


    ### Additional Notes

    * This action supports **HOSTNAME** and **ADDRESS** (IP) entities.

    * If a client cannot be found in Google GRR for a specific entity, the action
    will report a failure for that specific entity but continue processing others.
  capabilities:
