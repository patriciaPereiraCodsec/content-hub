Get Client Details:
  ai_description: >-
    ### General Description

    The **Get Client Details** action retrieves comprehensive information for specific
    Google GRR clients. It is designed to provide deep visibility into a host's hardware,
    operating system, agent status, and network configuration by querying the Google
    GRR API using unique Client IDs.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Client ID** | String | Yes | A comma-separated list of Google GRR Client IDs
    (e.g., `C.1234567890abcdef`). The action will attempt to fetch details for every
    ID provided in this list. |


    ### Additional Notes

    - This action does not run on SecOps entities (like IP or Hostname) automatically.
    It relies entirely on the manually provided **Client ID** parameter.

    - If a provided Client ID does not exist in the Google GRR instance, the action
    will report the failure for that specific ID but continue processing others in
    the list.


    ### Flow Description

    1. **Parameter Extraction:** The action parses the comma-separated string of Client
    IDs into a list.

    2. **Connection Initialization:** It establishes an authenticated session with
    the Google GRR server using the configured API Root, Username, and Password.

    3. **Data Retrieval:** For each Client ID, the action sends a GET request to the
    `/api/clients/{client_id}` endpoint.

    4. **Data Parsing:** The raw JSON response is parsed into structured data models
    covering:
        - **Hardware Info:** BIOS version, serial number, and manufacturer.
        - **OS Info:** Kernel version, install date, and distribution details.
        - **Agent Info:** Client version and build time.
        - **Network Interfaces:** MAC addresses and IP addresses.
        - **Storage:** Volume and partition information.
    5. **Output Generation:** The action aggregates the results into a JSON object
    for downstream logic and populates a data table named "GRR Clients Details" for
    the case wall.
