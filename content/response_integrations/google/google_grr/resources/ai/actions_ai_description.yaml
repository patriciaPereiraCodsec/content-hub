Stop a Hunt:
  ai_description: "### General Description\nStops one or more hunts in Google GRR.\
    \ Stopping a hunt prevents new clients from being scheduled and interrupts in-progress\
    \ flows the next time they change state. This is a permanent action; once a hunt\
    \ is stopped, it cannot be restarted. Results already reported are unaffected,\
    \ but in-progress results will be lost.\n\n### Parameters Description\n| Parameter\
    \ | Type | Mandatory | Description |\n| :--- | :--- | :--- | :--- |\n| Hunt ID\
    \ | String | Yes | A comma-separated list of the unique identifiers (IDs) for\
    \ the hunts you wish to stop. |\n\n### Additional Notes\n- The action only succeeds\
    \ for hunts that are currently in a 'STARTED' or 'PAUSED' state.\n- If a hunt\
    \ ID is not found in Google GRR, the action will report it as not found but continue\
    \ processing other IDs in the list.\n\n### Flow Description\n1. **Initialization**:\
    \ Retrieves connection details (API Root, credentials) and the list of Hunt IDs\
    \ from the action parameters.\n2. **Parsing**: Converts the comma-separated string\
    \ of Hunt IDs into a list.\n3. **Execution**: Iterates through each Hunt ID and\
    \ sends a PATCH request to the Google GRR API to update the hunt's state to 'STOPPED'.\n\
    4. **Error Handling**: \n    - Catches 'Not Found' exceptions if a hunt ID does\
    \ not exist.\n    - Catches status code exceptions if the hunt is in a state that\
    \ cannot be stopped (e.g., already stopped).\n5. **Reporting**: Aggregates the\
    \ results, providing a summary of successfully stopped hunts and those that failed,\
    \ and attaches the raw JSON response for successful operations."
