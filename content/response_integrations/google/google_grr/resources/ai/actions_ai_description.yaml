List Clients:
  ai_description: "### General Description\nLists available clients from a Google\
    \ GRR instance. This action is used to discover and retrieve metadata about managed\
    \ endpoints (clients) to facilitate further interaction or investigation. It retrieves\
    \ detailed information including Agent Info, OS Info, and hardware metadata, presenting\
    \ the results in both a data table and a JSON format.\n\n### Parameters Description\n\
    | Parameter | Description | Type | Mandatory | Notes |\n| :--- | :--- | :--- |\
    \ :--- | :--- |\n| Offset | Specify the starting offset for the list of found\
    \ clients. | String | No | Used for paginating through large sets of clients.\
    \ |\n| Max Results To Return | Specify how many clients to return in the response.\
    \ | String | No | Defaults to 5 if not specified. |\n\n### Additional Notes\n\
    - This action does not require any input entities to run; it queries the global\
    \ list of clients managed by the Google GRR server.\n- The results are displayed\
    \ in a data table named \"GRR Clients\".\n\n### Flow Description\n1. **Initialization**:\
    \ The action initializes the Google GRR manager using the provided API Root, Username,\
    \ and Password.\n2. **Data Retrieval**: It calls the Google GRR API to fetch a\
    \ list of clients based on the provided `Offset` and `Max Results To Return` parameters.\n\
    3. **Parsing**: The raw API response is parsed into structured `Client` data models,\
    \ extracting details like OS version, installation time, and agent versions.\n\
    4. **Output Generation**: \n    - A JSON result is created mapping Client IDs\
    \ to their full metadata.\n    - A CSV-formatted data table is generated for the\
    \ Siemplify UI.\n5. **Completion**: The action ends by reporting the number of\
    \ clients found and attaching the results to the case."
