name: Purge Compliance Search Results
description: 'Purge emails found by the completed Compliance Search. Note: Action
    is not working on Siemplify entities.'
integration_identifier: ExchangeExtensionPack
parameters:
-   name: Compliance Search Name
    default_value: ''
    type: string
    description: Name for the Compliance Search. Note that name shouldn't contain
        special characters.
    is_mandatory: true
-   name: Perform a HardDelete for deleted emails?
    default_value: false
    type: boolean
    description: Specify whether HardDelete should be performed. This option is applies
        only to O365 and mark emails for permanent removal from the mailbox.
    is_mandatory: false
-   name: Remove Compliance Search Once Action Completes?
    default_value: true
    type: boolean
    description: Specify whether action should remove from Exchange server the search
        action and any related fetch or purge tasks once the action completes.
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/purge_compliance_search_results_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
is_async: true
