name: Add Senders to Exchange-Siemplify Mail Flow Rule
description: 'Action will get as a parameter a list of Email Addresses, or will work
    on User entities with Email regexes (if parameters are not provided), and will
    be able to create a new rule,filtering the senders from your Exchange Server.
    Actions can be modified in the parameters using the rule parameter. Note - to
    use this action, please make sure you have Organization Management permissions,
    as stated here: https://docs.microsoft.com/en-us/exchange/permissions-exo/feature-permissions'
integration_identifier: ExchangeExtensionPack
parameters:
-   name: Email Addresses
    default_value: ''
    type: string
    description: Specify the email addresses you would like to add to the rule, in
        a comma separated list. If no parameter will be provided, action will work
        with User entities.
    is_mandatory: false
-   name: Rule to add senders to
    default_value: Siemplify - Senders List - Permanently Delete
    type: ddl
    optional_values:
    - Siemplify - Senders List - Permanently Delete
    description: Specify the rule to add the sender to. If the rule doesn't exist
        - action will create it where it's missing.
    is_mandatory: true
-   name: Should add senders' domain to the corresponding Domains List rule as well?
    default_value: false
    type: boolean
    description: Specify whether the action should automatically take the domains
        of the provided email addresses and add them as well to the corresponding
        domain rules (same rule action for domains)
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/add_senders_to_exchange_siemplify_mail_flow_rule_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
is_async: true
simulation_data_json: '{"Entities": ["USERUNIQNAME"]}'
