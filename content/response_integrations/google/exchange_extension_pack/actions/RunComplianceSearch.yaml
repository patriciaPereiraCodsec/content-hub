name: Run Compliance Search
description: 'Run Exchange Compliance Search based on the provided search conditions.
    If the fetch compliance search results checkbox is set, action returns the search
    results similarly to the fetch compliance search results action. Exchange Compliance
    Search provides a fast mechanism to search in multiple mailboxes that will be
    most useful for large Organizations with 1000+ mailboxes. Note: Action is not
    working on Siemplify entities.  Note2: If "Fetch Compliance Search Results?" checkbox
    is checked, maximum of 200 elements will be displayed, but actual search can have
    more findings that are shown.'
integration_identifier: ExchangeExtensionPack
parameters:
-   name: Compliance Search Name
    default_value: ''
    type: string
    description: Name for the Compliance Search. Note that name shouldn't contain
        special characters.
    is_mandatory: true
-   name: Subject Filter
    default_value: ''
    type: string
    description: Filter condition, specify what subject to search for emails
    is_mandatory: false
-   name: Sender Filter
    default_value: ''
    type: string
    description: Filter condition, specify who should be the sender of needed emails
    is_mandatory: false
-   name: Recipient Filter
    default_value: ''
    type: string
    description: Filter condition, specify who should be the recipient of needed emails
    is_mandatory: false
-   name: Operator
    default_value: AND
    type: ddl
    optional_values:
    - AND
    - OR
    description: Operator to use to construct query from conditions above.
    is_mandatory: false
-   name: Time Frame (hours)
    default_value: ''
    type: string
    description: Time frame interval in hours to search for emails.
    is_mandatory: false
-   name: Location to Search Emails In
    default_value: ''
    type: string
    description: 'Location to search emails in, can be one of the following: Comma
        separate list of mailboxes. A distribution group or mail-enabled security
        group All - for all mailboxes in organization.'
    is_mandatory: true
-   name: Fetch Compliance Search Results?
    default_value: false
    type: boolean
    description: Specify whether the action should immediately fetch the compliance
        search results. Note that maximum of 200 elements will be displayed, but actual
        search can have more findings that are shown.
    is_mandatory: false
-   name: Max Emails To Return
    default_value: ''
    type: string
    description: Specify how many emails action can return.
    is_mandatory: false
-   name: Create Case Wall Output Table?
    default_value: false
    type: boolean
    description: Specify if action should create case wall output table. If Max Emails
        To Return is set to a bigger number, its recommended to uncheck this to increase
        action performance.
    is_mandatory: false
-   name: Advanced Query
    default_value: ''
    type: string
    description: Instead of subject, sender or recipient filters, provide a query
        you want to run compliance search on. Consider https://docs.microsoft.com/en-us/sharepoint/dev/general-development/keyword-query-language-kql-syntax-reference
        and https://docs.microsoft.com/en-us/exchange/message-properties-indexed-by-exchange-search-exchange-2013-help?redirectedfrom=MSDN
        for reference on query syntax.
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/run_compliance_search_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
is_async: true
