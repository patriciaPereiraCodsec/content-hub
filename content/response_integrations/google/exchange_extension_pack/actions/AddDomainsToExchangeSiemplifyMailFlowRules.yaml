name: Add Domains to Exchange-Siemplify Mail Flow Rules
description: 'Action will get as a parameter a list of Domains, and will be able to
    create a new rule, filtering the domains from your Exchange Server. Actions to
    take can be modified in the parameters using rule parameters. Note - to use this
    action, please make sure you have Organization Management permissions, as stated
    here: https://docs.microsoft.com/en-us/exchange/permissions-exo/feature-permissions'
integration_identifier: ExchangeExtensionPack
parameters:
-   name: Domains
    default_value: ''
    type: string
    description: Specify the Domains you would like to add to the rule, in a comma
        separated list.
    is_mandatory: false
-   name: Rule to add Domains to
    default_value: Siemplify - Domains List - Permanently Delete
    type: ddl
    optional_values:
    - Siemplify - Domains List - Permanently Delete
    description: Specify the rule to add the Domains to. If the rule doesn't exist
        - action will create it where it's missing.
    is_mandatory: true
dynamic_results_metadata:
-   result_example_path: resources/add_domains_to_exchange_siemplify_mail_flow_rules_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
is_async: true
