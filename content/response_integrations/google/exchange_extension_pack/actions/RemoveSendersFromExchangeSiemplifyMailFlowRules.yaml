name: Remove Senders from Exchange-Siemplify Mail Flow Rules
description: 'Action will get as a parameter a list of Senders, or will work on User
    entities (if parameters are not provided), and will be able to remove the provided
    Senders from the existing rules. Note - to use this action, please make sure you
    have Organization Management permissions, as stated here: https://docs.microsoft.com/en-us/exchange/permissions-exo/feature-permissions'
integration_identifier: ExchangeExtensionPack
parameters:
-   name: Email Addresses
    default_value: ''
    type: string
    description: Specify the email addresses you would like to remove from the rule,
        in a comma separated list. If no parameter will be provided, action will work
        with entities.
    is_mandatory: false
-   name: Rule to remove Senders from
    default_value: Siemplify - Senders List - Permanently Delete
    type: ddl
    optional_values:
    - Siemplify - Senders List - Permanently Delete
    description: Specify the rule to remove the Senders from. If the rule doesn't
        exist - action will do nothing.
    is_mandatory: true
-   name: Should remove senders' domains from the corresponding Domains List rule
        as well?
    default_value: false
    type: boolean
    description: Specify whether the action should automatically take the domains
        of the provided email addresses and remove them as well from the corresponding
        domain rules (same rule action for domains)
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/remove_senders_from_exchange_siemplify_mail_flow_rules_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
is_async: true
simulation_data_json: '{"Entities": ["USERUNIQNAME"]}'
