Fetch Compliance Search Results:
  ai_description: >-
    Fetches results for a completed Compliance Search in Microsoft Exchange (On-Premise
    or Office 365). This action operates asynchronously, first triggering a preview
    action in Exchange and then polling for results. It retrieves metadata for found
    emails, such as Sender, Subject, and Received Time, and can optionally clean up
    the search object from the Exchange server upon completion.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Compliance Search Name | String | Yes | The unique name of the Compliance Search
    to fetch results for. |

    | Max Emails To Return | Integer | No | The maximum number of email records to
    retrieve (up to 200 for display). |

    | Remove Compliance Search Once Action Completes? | Boolean | No | If set to true,
    the action will delete the Compliance Search and related tasks from the Exchange
    server after fetching results. Default is true. |

    | Create Case Wall Output Table? | Boolean | No | If set to true, creates a formatted
    table in the Case Wall containing the search results. Default is true. |


    ### Flow Description

    1. **Initialization**: Validates the Exchange connection (On-Prem or O365) and
    initiates a 'Compliance Search Preview' action on the server.

    2. **Status Polling**: Periodically checks the status of the preview action until
    it reaches a 'Completed' state.

    3. **Data Retrieval**: Once completed, it fetches the preview results, parsing
    email metadata into a structured format.

    4. **Internal Updates**: Adds the retrieved data as a JSON result and optionally
    constructs a CSV table for the Case Wall.

    5. **Cleanup (Optional)**: If configured, it sends a command to the Exchange server
    to remove the Compliance Search object to maintain environment hygiene.
