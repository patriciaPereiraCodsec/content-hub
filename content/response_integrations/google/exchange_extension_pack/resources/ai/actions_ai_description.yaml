    can_update_entities: false
    external_data_mutation_explanation: >-
      Updates or deletes Microsoft Exchange Transport Rules (Mail Flow Rules) by removing
      specific email addresses or domains from their configuration.
    fetches_data: true
    internal_data_mutation_explanation: null
