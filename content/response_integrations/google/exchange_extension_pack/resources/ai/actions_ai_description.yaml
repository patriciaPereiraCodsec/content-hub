"Remove Domains from Exchange-Siemplify Mail Flow Rules":
  ai_description: >-
    ### General Description

    This action removes specific domains from an existing Microsoft Exchange (On-Prem
    or Office 365) mail flow rule. It is primarily used to manage blocklists or allowlists
    by dynamically updating the 'FromAddressContainsWords' condition of a specified
    rule. If the removal of domains results in an empty rule (no domains left), the
    action will automatically delete the rule from the Exchange server.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Domains | String | No | A comma-separated list of domains to be removed from
    the rule. |

    | Rule to remove Domains from | String | Yes | The name of the Exchange mail flow
    rule to modify. Default is 'Siemplify - Domains List - Permanently Delete'. |


    ### Additional Notes

    - **Permissions:** The executing user must have 'Organization Management' permissions
    in Exchange.

    - **Server Type:** The integration must be configured for either Exchange On-Prem
    or Office 365 (not both simultaneously).

    - **Async Execution:** This action runs asynchronously to handle potential network
    latencies or long-running PowerShell commands.

    - **Rule Deletion:** If all domains are removed from a rule, the rule itself is
    deleted to maintain a clean configuration.


    ### Flow Description

    1. **Validation:** The action validates the connection configuration (On-Prem
    vs. Office 365) and parses the provided domains.

    2. **Domain Filtering:** It filters the input to identify valid domain formats
    and separates them from invalid ones.

    3. **Rule Retrieval:** It connects to the Exchange server via PowerShell and retrieves
    the current configuration of the specified rule.

    4. **Modification Logic:**
        - If the rule exists, it identifies which of the requested domains are currently
    present in the rule.
        - It calculates the new set of domains by removing the target domains from
    the existing list.
    5. **Execution:**
        - If domains remain, it updates the rule on the Exchange server with the new
    list.
        - If no domains remain, it deletes the rule from the Exchange server.
    6. **Reporting:** The action returns a JSON result detailing which domains were
