Ping:
  ai_description: "### General Description\nThe **Ping** action is a diagnostic tool\
    \ designed to verify the connectivity and authentication configuration between\
    \ Google SecOps and a target Microsoft Exchange environment. It supports both\
    \ **Exchange On-Premises** and **Office 365 (Exchange Online)**. The action utilizes\
    \ PowerShell (`pwsh`) to establish a remote session using the provided credentials\
    \ and server details to ensure that subsequent automation tasks can execute successfully.\n\
    \n### Parameters Description\nThis action primarily relies on configuration parameters\
    \ defined at the integration level rather than per-action inputs. \n\n| Parameter\
    \ | Type | Mandatory | Description |\n| :--- | :--- | :--- | :--- |\n| Exchange\
    \ On-Prem Server Address | String | No | The network address of the Exchange On-Premises\
    \ server. Required if 'Is Exchange On-Prem?' is true. |\n| Exchange Office365\
    \ Compliance Uri | String | No | The connection URI for Office 365 compliance\
    \ sessions. Required if 'Is Office365 (Exchange Online)?' is true. |\n| Domain\
    \ | String | Yes | The Active Directory domain used for authentication. |\n| User\
    \ name | String | No | The username for the service account. |\n| Password | String\
    \ | No | The password for the service account. |\n| Is Exchange On-Prem? | Boolean\
    \ | Yes | Flag to indicate the target is an On-Premises server. |\n| Is Office365\
    \ (Exchange Online)? | Boolean | Yes | Flag to indicate the target is Office 365.\
    \ |\n\n### Additional Notes\n* **Mutual Exclusivity:** Either 'Is Exchange On-Prem?'\
    \ or 'Is Office365 (Exchange Online)?' must be set to true, but not both simultaneously.\n\
    * **Prerequisites:** Requires PowerShell (`pwsh`) and the `gssntlmssp` package\
    \ to be installed on the Google SecOps runner/server for NTLM authentication.\n\
    \n### Flow Description\n1.  **Initialization:** The action retrieves the integration's\
    \ configuration parameters (credentials, server addresses, and environment type).\n\
    2.  **Validation:** It checks that exactly one environment type (On-Prem or O365)\
    \ is selected and that the necessary URI/Address for that type is provided.\n\
    3.  **Manager Setup:** An `ExchangeExtensionPackManager` is initialized with the\
    \ connection details.\n4.  **Connectivity Test:** \n    *   For **On-Prem**, it\
    \ attempts to create a PSSession using NTLM/Negotiate authentication.\n    * \
    \  For **Office 365**, it attempts to connect using the `Connect-IPPSSession`\
    \ command.\n5.  **Cleanup:** The action explicitly disconnects any established\
    \ sessions in the `finally` block to prevent resource leaks.\n6.  **Result Reporting:**\
    \ Returns a success message if the session was established or a detailed error\
    \ message (e.g., missing PowerShell, authentication failure) if it failed."
