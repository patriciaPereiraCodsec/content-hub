Delete Compliance Search:
  ai_description: >-
    ### General Description

    Deletes a specific Compliance Search and any associated tasks, such as fetch results
    or email purge tasks, from an Exchange environment. This action is compatible
    with both Exchange On-Premises and Office 365 (Exchange Online) and utilizes PowerShell
    commands to perform the deletion. It is important to note that this action does
    not operate on Google SecOps entities but rather targets a specific search name
    provided as a parameter.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Compliance Search Name | String | Yes | The unique name of the Compliance Search
    to be deleted. This name should not contain special characters. |


    ### Additional Notes

    - The action requires proper configuration of either Exchange On-Premises or Office
    365 settings in the integration configuration.

    - Only one mail server type (On-Prem or Office 365) can be active for the action
    to run successfully.

    - This is an asynchronous action that supports retries in case of network-related
    errors.


    ### Flow Description

    1. **Parameter Extraction:** The action retrieves connection details (Server Address,
    URI, Credentials) from the integration configuration and the target search name
    from the action parameters.

    2. **Environment Validation:** It verifies that either On-Premises or Office 365
    is selected (but not both) and that necessary URIs are provided for Office 365.

    3. **Manager Initialization:** An `ExchangeExtensionPackManager` is initialized
    to handle the PowerShell session and command execution.

    4. **Execution:** The action executes the `Remove-ComplianceSearch` PowerShell
    command via a subprocess to delete the search and its associated tasks.

    5. **Error Handling:** The action catches specific exceptions such as 'Search
    Not Found' (returning a success status with a descriptive message) or environment
    issues like missing PowerShell/GSSNTLMSSP packages.

    6. **Cleanup:** The action ensures the PowerShell session is disconnected in the
    final stage.
