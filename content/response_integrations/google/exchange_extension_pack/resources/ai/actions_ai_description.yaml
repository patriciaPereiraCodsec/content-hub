"Delete Exchange-Siemplify Mail Flow Rules":
  ai_description: >-
    ### General Description

    Deletes specified Exchange mail flow rules (transport rules) from either an On-Premise
    Exchange server or Office 365 (Exchange Online). This action is primarily used
    to clean up rules that were previously created for incident response, such as
    temporary blocks on senders or domains. It supports deleting individual rules
    by name or a predefined set of Siemplify-specific rules.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Rule Name To Delete | String | Yes | The name of the mail flow rule to be removed.
    You can select a specific rule name or choose 'All available Exchange-Siemplify
    Mail Flow Rules' to remove all rules associated with the integration. |


    ### Additional Notes

    - This action requires **Organization Management** permissions in Exchange.

    - The action is **asynchronous**, meaning it may run in multiple stages to process
    deletions and handle potential network timeouts or retries.

    - You must configure either the On-Premise or Office 365 connection details in
    the integration settings for this action to function.


    ### Flow Description

    1. **Initialization**: The action retrieves connection details (Server Address,
    URI, Credentials) and the target rule name from the parameters.

    2. **Connection**: It establishes a PowerShell session with the Exchange server
    using the `ExchangeExtensionPackManager`.

    3. **Rule Identification**: Based on the input, it identifies whether to delete
    a single specific rule or a batch of predefined Siemplify rules.

    4. **Execution**: It executes the `Remove-TransportRule` PowerShell command via
    a subprocess to delete the target rule(s).

    5. **State Management**: If multiple rules are being processed or if a network
    error occurs, the action uses `additional_data` to track which rules were successfully
    deleted and which were not found.

    6. **Completion**: Once all rules are processed or the retry limit is reached,
    it returns a summary message listing the successfully deleted rules and any rules
    that could not be found.
