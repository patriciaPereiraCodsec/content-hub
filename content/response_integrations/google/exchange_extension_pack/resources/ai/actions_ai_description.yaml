Run Compliance Search:
  ai_description: >-
    Runs an Exchange Compliance Search based on specified conditions for either Exchange
    On-Premise or Office 365 environments. This action is designed for large-scale
    searches across multiple mailboxes (1000+) and operates asynchronously. It can
    construct a search query based on subject, sender, and recipient filters, or accept
    a KQL-based advanced query. Optionally, the action can fetch the search results
    and display them in a table on the Case Wall.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Compliance Search Name | String | Yes | The unique name for the search object
    to be created in Exchange. |

    | Subject Filter | String | No | Filter condition for the email subject. |

    | Sender Filter | String | No | Filter condition for the email sender. |

    | Recipient Filter | String | No | Filter condition for the email recipient. |

    | Operator | Enum | No | Logic operator (AND/OR) used to combine filters. Default
    is AND. |

    | Time Frame (hours) | String | No | The number of hours back from the current
    time to search. |

    | Location to Search Emails In | String | Yes | Target mailboxes (comma-separated),
    distribution groups, or 'All'. |

    | Fetch Compliance Search Results? | Boolean | No | If true, the action will wait
    for the search to finish and then retrieve the results. |

    | Max Emails To Return | String | No | Limits the number of results returned (Max
    200 displayed). |

    | Create Case Wall Output Table? | Boolean | No | If true, adds a formatted table
    of results to the Case Wall. |

    | Advanced Query | String | No | A raw KQL query string that overrides individual
    filters. |


    ### Flow Description

    1. **Initialization**: Connects to the Exchange environment using PowerShell based
    on the integration configuration (On-Prem or O365).

    2. **Search Creation**: Creates a new `ComplianceSearch` object in Exchange with
    the defined filters and starts the search.

    3. **Status Monitoring**: Periodically checks the status of the search until it
    reaches a 'Completed' state.

    4. **Result Retrieval (Optional)**: If 'Fetch Compliance Search Results?' is enabled,
    it triggers a `ComplianceSearchAction` (Preview) to extract metadata for the found
    emails.

    5. **Output**: Returns the search status and, if requested, populates the JSON
    results and the Case Wall table with email details (Received Time, Sender, Recipient,
    Subject).


    ### Additional Notes

    * This action does not process Siemplify entities; it relies entirely on the provided
    parameters.

    * Creating a search object is a state-changing operation in the Exchange environment.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: true
    can_update_entities: false
    external_data_mutation_explanation: >-
      Creates a new Compliance Search object and a Compliance Search Action (Preview)
      within the target Exchange environment (On-Prem or Office 365).
    fetches_data: true
    internal_data_mutation_explanation: >-
      Adds a results table to the Case Wall if the 'Create Case Wall Output Table?'
      parameter is enabled.
