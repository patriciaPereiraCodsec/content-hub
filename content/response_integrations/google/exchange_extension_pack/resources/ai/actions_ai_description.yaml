"Remove Senders from Exchange-Siemplify Mail Flow Rules":
  ai_description: >-
    Removes specific senders (email addresses) or their domains from existing Microsoft
    Exchange Mail Flow (Transport) rules. This action is useful for managing blocklists
    or allowlists dynamically within Exchange On-Premises or Office 365 environments.


    ### Flow Description:

    1. **Connection Initialization:** Establishes a PowerShell session with the target
    Exchange server (On-Premises via WinRM or Office 365 via the Exchange Online PowerShell
    module).

    2. **Target Identification:** Determines the list of email addresses to remove.
    It prioritizes the 'Email Addresses' parameter; if empty, it extracts identifiers
    from 'USER' entities within the case.

    3. **Rule Retrieval:** Fetches the current configuration and item list of the
    specified Mail Flow rule(s).

    4. **Modification Logic:** Calculates the new set of items by subtracting the
    target addresses from the existing rule items. If the 'Should remove senders'
    domains...' parameter is enabled, it also identifies the domains and processes
    the corresponding domain-based rule.

    5. **Execution:** Updates the rule on the Exchange server with the new item list.
    If a rule becomes empty after the removal of items, the action automatically deletes
    the rule to maintain environment cleanliness.

    6. **Reporting:** Returns a JSON result categorizing the inputs into 'success'
    (removed), 'didn't_exist' (not in the rule), and 'invalid' (malformed email addresses).


    ### Parameters Description:

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Email Addresses | String | No | A comma-separated list of email addresses to
    remove. If left blank, the action will attempt to use the identifiers of 'USER'
    entities found in the context. |

    | Rule to remove Senders from | String | Yes | The exact name of the Exchange
    Transport Rule from which the senders should be removed. |

    | Should remove senders' domains from the corresponding Domains List rule as well?
    | Boolean | No | If set to 'True', the action will extract the domain from each
    email address and remove those domains from the associated domain-based rule (defined
    in the integration constants). |


    ### Additional Notes:

    - This is an **Async** action that may take several minutes depending on the Exchange
    environment's responsiveness.

    - **Permissions:** Requires 'Organization Management' permissions in Exchange/Office
    365.

    - **Rule Deletion:** Be aware that if you remove the last remaining item from
    a rule, the rule itself will be deleted from Exchange.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
