List Exchange-Siemplify Mail Flow Rules:
  ai_description: >-
    ### General Description

    This action retrieves and lists details for specific or all Exchange-Siemplify
    Mail Flow Rules (Transport Rules) from an Exchange environment (On-Premises or
    Office 365). It is primarily used to audit existing mail flow configurations,
    such as sender or domain blocklists, by executing PowerShell commands via a manager.
    The results are presented as data tables and a JSON object for further automation
    steps.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Rule Name To List | String (Dropdown) | Yes | Specifies the name of the rule
    to retrieve. Options include specific Siemplify rules (e.g., 'Siemplify - Senders
    List - Permanently Delete') or 'All available Exchange-Siemplify Mail Flow Rules'.
    |


    ### Additional Notes

    - **Permissions:** Requires 'Organization Management' permissions in Exchange.

    - **Connectivity:** The action supports either Exchange On-Premises or Office
    365, but not both simultaneously. Configuration parameters for the chosen environment
    must be provided in the integration settings.

    - **Async Execution:** This action is asynchronous and includes built-in retry
    logic for common network or session errors.


    ### Flow Description

    1. **Initialization:** Extracts configuration parameters for the Exchange server
    (address, credentials, and environment type) and the specific rule name to list.

    2. **Validation:** Ensures that exactly one environment type (On-Prem or Office
    365) is selected and that necessary URIs are provided.

    3. **Connection:** Estantiates the `ExchangeExtensionPackManager` to establish
    a PowerShell session with the target Exchange environment.

    4. **Data Retrieval:** Executes the `Get-TransportRule` PowerShell command to
    fetch the configuration of the requested rule(s).

    5. **Processing:** Parses the PowerShell output into structured data models.

    6. **Output:** Generates a data table for each rule found and attaches the full
    rule details as a JSON result to the action.
