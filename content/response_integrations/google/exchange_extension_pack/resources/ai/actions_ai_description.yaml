"Add Senders to Exchange-Siemplify Mail Flow Rule":
  ai_description: "Adds specific email addresses or domains to Microsoft Exchange\
    \ Mail Flow (Transport) Rules. This action is primarily used to automate the management\
    \ of blocklists or filtering rules within an Exchange environment (On-Premise\
    \ or Office 365). It can either take a manual list of email addresses or process\
    \ User entities from the current context. If a specified rule does not exist,\
    \ the action will automatically create it with a 'Permanently Delete' action.\n\
    \n### Parameters Description\n\n| Parameter | Type | Mandatory | Description |\n\
    | :--- | :--- | :--- | :--- |\n| Email Addresses | String | No | A comma-separated\
    \ list of email addresses to add to the rule. If left empty, the action will attempt\
    \ to use the identifiers of User entities found in the alert context. |\n| Rule\
    \ to add senders to | String | Yes | The name of the Exchange Transport Rule to\
    \ modify or create. Default is 'Siemplify - Senders List - Permanently Delete'.\
    \ |\n| Should add senders' domain to the corresponding Domains List rule as well?\
    \ | Boolean | No | If set to true, the action extracts the domain from each email\
    \ address and adds it to a corresponding domain-based rule (e.g., 'Siemplify -\
    \ Domains List - Permanently Delete'). |\n\n### Additional Notes\n- This action\
    \ requires 'Organization Management' permissions in Exchange/Office 365.\n- The\
    \ action is asynchronous and will retry up to 5 times in case of transient network\
    \ errors.\n- It supports both Exchange On-Premise (via Negotiate/Basic authentication)\
    \ and Office 365 (via Connect-IPPSSession).\n\n### Flow Description\n1. **Initialization**:\
    \ Retrieves Exchange connection details (Server Address, URI, Credentials) from\
    \ the integration configuration.\n2. **Target Identification**: Collects email\
    \ addresses from the 'Email Addresses' parameter. If empty, it scans the alert's\
    \ entities for 'USER' types and validates their identifiers as email addresses.\n\
    3. **Rule Verification**: Connects to the Exchange server and checks if the specified\
    \ Mail Flow Rule(s) already exist.\n4. **Rule Mutation**: \n    - If the rule\
    \ exists, it appends the new email addresses/domains to the existing list.\n \
    \   - If the rule does not exist, it creates a new Transport Rule with the specified\
    \ name and sets the action to delete messages from those senders.\n5. **Domain\
    \ Processing**: If enabled, it extracts domains from the valid emails and performs\
    \ the same update/create logic on the corresponding domain rule.\n6. **Cleanup**:\
    \ Disconnects the PowerShell session and returns a summary of successful, already\
    \ present, and invalid entries."
