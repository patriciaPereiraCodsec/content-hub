"Add Domains to Exchange-Siemplify Mail Flow Rules":
  ai_description: >-
    ### General Description

    This action adds a list of domains to a specified Exchange Mail Flow Rule (Transport
    Rule). It is designed to manage domain-based filtering (e.g., for blocking or
    permanent deletion) within an Exchange On-Premise or Office 365 environment. If
    the specified rule does not exist, the action will automatically create it with
    the provided domains and a default action (typically deleting the message).


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Domains | String | No | A comma-separated list of domains to be added to the
    rule. |

    | Rule to add Domains to | String | Yes | The name of the Exchange Mail Flow Rule
    to update or create. Default is 'Siemplify - Domains List - Permanently Delete'.
    |


    ### Additional Notes

    - **Permissions:** Requires 'Organization Management' permissions in Exchange.

    - **Connectivity:** Supports both Exchange On-Premise (via PowerShell Remoting)
    and Office 365 (via Exchange Online PowerShell).

    - **Validation:** The action validates the format of each domain before attempting
    to add it to the rule.

    - **Async Execution:** This action runs asynchronously to handle potential network
    latencies or long-running PowerShell commands.


    ### Flow Description

    1. **Initialization:** Extracts environment configuration (server address, credentials,
    connection type) and action parameters.

    2. **Validation:** Parses the 'Domains' parameter and validates each domain against
    a regex pattern. Invalid domains are tracked separately.

    3. **Rule Discovery:** Checks the Exchange server to see if a rule with the specified
    name already exists.

    4. **Rule Modification/Creation:**
        - If the rule **exists**, the action retrieves the current list of domains,
    appends the new valid domains, and updates the rule using `Set-TransportRule`.
        - If the rule **does not exist**, the action creates a new rule using `New-TransportRule`
    with the specified domains and the default 'DeleteMessage' action.
    5. **Result Reporting:** Returns a JSON result categorizing domains into 'success'
    (newly added), 'already_available' (previously present), and 'invalid' (failed
    validation).
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Creates or updates Mail Flow Rules (Transport Rules) on the target Exchange
      server or Office 365 tenant to modify mail routing and filtering logic.
    fetches_data: true
    internal_data_mutation_explanation: null
