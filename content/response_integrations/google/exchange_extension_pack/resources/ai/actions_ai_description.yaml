Purge Compliance Search Results:
  ai_description: >-
    Purges emails identified by a previously completed Microsoft Exchange Compliance
    Search. This action supports both Exchange On-Premise and Office 365 environments
    by executing PowerShell commands via a remote session. It can perform either a
    'SoftDelete' or a 'HardDelete' (permanent removal) and includes an optional cleanup
    step to remove the search object from the Exchange server once the purge is finished.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Compliance Search Name | String | Yes | The exact name of the Compliance Search
    whose results should be purged. |

    | Perform a HardDelete for deleted emails? | Boolean | No | If true, emails are
    permanently removed (HardDelete). This is primarily applicable to Office 365.
    Default is false (SoftDelete). |

    | Remove Compliance Search Once Action Completes? | Boolean | No | If true, the
    action will delete the Compliance Search object and related tasks from the Exchange
    server after the purge completes. Default is true. |


    ### Additional Notes

    - This action does not operate on Google SecOps entities; it relies entirely on
    the provided search name.

    - The action is asynchronous and will poll the Exchange server until the purge
    task reaches a 'Completed' status.


    ### Flow Description

    1. **Initialization**: Connects to the Exchange server (On-Prem or O365) using
    the provided integration credentials.

    2. **Purge Initiation**: Executes a PowerShell command to create a new Compliance
    Search Purge action based on the specified search name and delete type.

    3. **Status Polling**: Periodically checks the status of the purge operation.
    It retrieves the 'Item count' of purged emails.

    4. **Result Reporting**: Once the purge is finished, it reports the success and
    the number of items affected.

    5. **Cleanup (Optional)**: If configured, it executes a final command to remove
    the Compliance Search object from the server to maintain a clean environment.
