name: Fortigate - Threat Logs Connector
parameters:
-   name: DeviceProductField
    default_value: Product Name
    type: string
    description: Enter the source field name in order to retrieve the Product Field
        name.
    is_mandatory: true
    is_advanced: false
    mode: regular
-   name: EventClassId
    default_value: eventtype
    type: string
    description: Enter the source field name in order to retrieve the Event Field
        name.
    is_mandatory: true
    is_advanced: false
    mode: regular
-   name: Environment Field Name
    default_value: ''
    type: string
    description: Describes the name of the field where the environment name is stored.
        If the environment field isn't found, the environment is the default environment.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Environment Regex Pattern
    default_value: .*
    type: string
    description: A regex pattern to run on the value found in the "Environment Field
        Name" field. Default is .* to catch all and return the value unchanged. Used
        to allow the user to manipulate the environment field via regex logic. If
        the regex pattern is null or empty, or the environment value is null, the
        final environment result is the default environment.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: PythonProcessTimeout
    default_value: 180
    type: integer
    description: Timeout limit for the python process running the current script.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: API Root
    default_value: https://{ip}
    type: string
    description: API root of the Fortigate instance.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: API Key
    default_value: ''
    type: password
    description: API key of the Fortigate account.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Verify SSL
    default_value: true
    type: boolean
    description: If enabled, verify the SSL certificate for the connection to the
        Fortigate server is valid.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Disable Overflow
    default_value: true
    type: boolean
    description: If enabled, connector will ignore the overflow mechanism.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Lowest Security Level To Fetch
    default_value: warning
    type: string
    description: 'Lowest security level that needs to be used to fetch threat logs.
        Possible values: debug, information, notice, warning, error, critical, alert,
        emergency. If nothing is specified, the connector will ingest threat logs
        with all security levels.'
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Threat Log Location
    default_value: ''
    type: string
    description: Location of the threat log.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Threat Subtypes To Fetch
    default_value: virus, webfilter, waf, ips, anomaly, file-filter
    type: string
    description: A comma-separated list of threat subtypes to ingest. The possible
        values are as follows:virus, webfilter, waf, ips, anomaly, app-ctrl, emailfilter,
        dlp, voip, gtp, dns, ssh, ssl, cifs, file-filter, traffic/local, traffic/forward.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: VDOM
    default_value: ''
    type: string
    description: The Virtual Domain (VDOM) name to target within the FortiGate device.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Serial Number
    default_value: ''
    type: string
    description: The serial number of the FortiGate device.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Max Hours Backwards
    default_value: 1
    type: integer
    description: Number of hours before the first connector iteration to retrieve
        threat logs from. This parameter applies to the initial connector iteration
        after you enable the connector for the first time, or used as a fallback value
        in cases where connector's last run timestamp expires.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Max Alerts To Fetch
    default_value: 20
    type: integer
    description: 'How many alerts to process per one connector iteration per subtype.
        Default: 100.'
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Use whitelist as a blacklist
    default_value: false
    type: boolean
    description: If enabled, whitelist will be used as a blacklist.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Proxy Server Address
    default_value: ''
    type: string
    description: The address of the proxy server to use.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Proxy Username
    default_value: ''
    type: string
    description: The proxy username to authenticate with.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Proxy Password
    default_value: ''
    type: password
    description: The proxy password to authenticate with.
    is_mandatory: false
    is_advanced: false
    mode: script
description: 'Pull information about different threat logs from Fortigate. Note: whitelist
    filter works with "eventtype" parameter.'
integration: Fortigate
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/fortigate#threat-logs-connector
rules: []
is_connector_rules_supported: false
creator: admin
