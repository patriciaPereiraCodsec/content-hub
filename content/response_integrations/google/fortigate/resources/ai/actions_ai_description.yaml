Add Entities To Policy:
  ai_description: "### General Description\nThis action adds IP Address and URL entities\
    \ to a specified firewall policy within a Fortigate environment. It ensures that\
    \ the entities are represented as address objects in Fortigate before associating\
    \ them with the target policy. For URL entities, the action automatically extracts\
    \ the domain or FQDN part. This is primarily used for automated containment or\
    \ access control workflows where specific indicators need to be blocked or allowed\
    \ dynamically.\n\n### Parameters Description\n| Parameter | Type | Mandatory |\
    \ Description |\n| :--- | :--- | :--- | :--- |\n| Policy Name | String | Yes |\
    \ The exact name of the firewall policy in Fortigate where the entities should\
    \ be added. |\n| Location | Dropdown | No | Specifies whether the entities should\
    \ be added to the 'Source' or 'Destination' field of the policy. Options are 'Source'\
    \ or 'Destination'. Defaults to 'Destination'. |\n\n### Flow Description\n1. **Policy\
    \ Verification**: The action first queries the Fortigate API to verify that a\
    \ policy with the provided name exists.\n2. **Entity Filtering**: It filters the\
    \ target entities in the current context, focusing only on supported types (IP\
    \ Address and URL).\n3. **Object Management**: For each entity, the action checks\
    \ if a corresponding address object already exists in Fortigate. If the object\
    \ does not exist, the action creates a new address object (using the IP subnet\
    \ or FQDN).\n4. **Policy Update**: The action checks if the entity is already\
    \ a member of the specified policy's address list (Source or Destination). If\
    \ not, it performs a PUT request to update the policy configuration, appending\
    \ the new entity to the list.\n5. **Reporting**: The action provides a summary\
    \ of which entities were successfully added, which were already present, and which\
    \ failed to be processed.\n\n### Additional Notes\n- **URL Processing**: URL entities\
    \ are parsed to extract the domain/FQDN using `tldextract`. \n- **IP Processing**:\
    \ IP addresses are handled by removing subnet masks for the object name while\
    \ maintaining the subnet configuration for the object definition."
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      The action creates new address objects in the Fortigate firewall configuration
      and modifies existing firewall policies by updating their source or destination
      address lists.
    fetches_data: true
    internal_data_mutation_explanation: null
