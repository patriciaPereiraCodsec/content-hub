Ping:
  ai_description: "### General Description\nThe **Ping** action is a diagnostic tool\
    \ designed to verify the connectivity between Google SecOps and a Fortigate instance.\
    \ It ensures that the provided API credentials (API Root and API Key) are valid\
    \ and that the network path is open. This action is typically used during the\
    \ initial setup of the integration or for troubleshooting communication issues.\n\
    \n### Parameters Description\nThis action does not have action-specific parameters.\
    \ Instead, it utilizes the following **Integration Configuration** parameters:\n\
    \n| Parameter | Type | Mandatory | Description |\n| :--- | :--- | :--- | :---\
    \ |\n| **API Root** | String | Yes | The base URL of the Fortigate API (e.g.,\
    \ `https://<fortigate-ip>`). |\n| **API Key** | String | Yes | The API key used\
    \ for authentication with the Fortigate device. |\n| **Verify SSL** | Boolean\
    \ | Yes | If enabled, the action will verify the SSL certificate of the Fortigate\
    \ server. |\n\n### Additional Notes\n* This action is a standard 'Ping' utility\
    \ and does not process any entities or modify any data.\n* It performs a lightweight\
    \ GET request to the `/api/v2/cmdb/firewall/addrgrp` endpoint with a count of\
    \ 1 to minimize resource usage while confirming access.\n\n### Flow Description\n\
    1. **Parameter Extraction:** The script retrieves the `API Root`, `API Key`, and\
    \ `Verify SSL` settings from the integration configuration.\n2. **Manager Initialization:**\
    \ It initializes the `FortigateManager` with the retrieved credentials and SSL\
    \ settings.\n3. **Connectivity Test:** The manager executes a GET request to a\
    \ specific Fortigate API endpoint to test the connection.\n4. **Result Handling:**\
    \ \n    * If the request is successful, the action completes with a success message.\n\
    \    * If an error occurs (e.g., authentication failure, timeout, or SSL error),\
    \ the action fails and provides the error details in the output message."
