List Address Groups:
  ai_description: >-
    ### General Description

    The **List Address Groups** action retrieves a list of available address groups
    from a Fortigate firewall. This action is primarily used for auditing existing
    network objects or verifying group configurations within the Fortigate environment.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Filter Key** | Dropdown | No | The attribute used to filter the results (e.g.,
    "Name"). If "Filter Logic" is used, this must be set to a value other than "Select
    One". |

    | **Filter Logic** | Dropdown | No | The comparison operator used for filtering
    ("Equal" or "Contains"). |

    | **Filter Value** | String | No | The specific string to search for based on
    the Filter Key and Logic. If left empty, filtering is not applied. |

    | **Max Records To Return** | Integer | No | The maximum number of address group
    records to retrieve. Defaults to 50. |


    ### Additional Notes

    - If **Filter Logic** is selected, **Filter Key** must also be specified (cannot
    be "Select One").

    - If **Filter Value** is empty, the filter will not be applied even if a key and
    logic are selected.

    - The action requires a positive integer for the **Max Records To Return** parameter.


    ### Flow Description

    1. **Initialization**: Connects to the Fortigate instance using the provided API
    Root and API Key configuration.

    2. **Validation**: Validates that the filter configuration is logical (ensuring
    a Filter Key is selected if Logic is provided) and that the record limit is a
    positive integer.

    3. **Data Retrieval**: Sends a GET request to the Fortigate API endpoint (`/api/v2/cmdb/firewall/addrgrp/`)
    with the specified filter and limit parameters.

    4. **Processing**: Parses the API response into structured `AddressGroup` objects,
    extracting details such as Name, Type, Category, and Member Count.

    5. **Output**: Generates a data table named "Available Address Groups" and attaches
    the raw JSON results to the action output for further playbook processing.
