    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Removes address objects (IPs or Domains) from the source or destination address
      lists of an existing firewall policy in Fortigate via a PUT request.
    fetches_data: true
    internal_data_mutation_explanation: null
