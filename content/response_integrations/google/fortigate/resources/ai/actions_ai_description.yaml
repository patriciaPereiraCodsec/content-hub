Add Entities To Address Group:
  ai_description: >-
    Adds IP Address and URL entities to a specified address group in Fortigate. This
    action ensures that the entities exist as firewall address objects in Fortigate
    before adding them to the group. For URL entities, the domain part is extracted
    and used as the object identifier.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Address Group Name | String | Yes | Specify the name of the address group in
    Fortigate to which the action should add entities. |


    ### Flow Description

    1. **Initialization**: Retrieve configuration parameters (API Root, API Key) and
    the target address group name.

    2. **Group Verification**: Verify that the specified address group exists in the
    Fortigate environment.

    3. **Entity Filtering**: Identify supported entities (IP Addresses and URLs) from
    the target entities list.

    4. **Existence Check**: For each entity, check if a corresponding firewall address
    object already exists in Fortigate.

    5. **Object Creation**: If an address object does not exist for an entity, create
    a new one (as a subnet for IPs or FQDN for URLs).

    6. **Membership Update**: Check if the entity is already a member of the target
    address group. If not, update the group's membership list to include the new entity.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Creates new firewall address objects in Fortigate if they do not exist and updates
      the membership list of the specified address group to include the processed
      entities.
    fetches_data: true
    internal_data_mutation_explanation: null
  categories:
    enrichment: false
