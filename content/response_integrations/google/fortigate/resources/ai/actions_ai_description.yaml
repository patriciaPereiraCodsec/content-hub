Remove Entities From Address Group:
  ai_description: >-
    ### General Description

    Removes IP Address and URL entities from a specified address group in Fortigate.
    This action is used to manage firewall group memberships dynamically, typically
    for containment or policy cleanup. It normalizes IP addresses by removing subnets
    and extracts domains from URL entities before attempting removal.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Address Group Name | String | Yes | The name of the Fortigate address group
    from which the entities should be removed. |


    ### Flow Description

    1. **Initialization**: Retrieves the integration configuration (API Root, API
    Key) and the target address group name from the action parameters.

    2. **Group Verification**: Calls the Fortigate API to verify that the specified
    address group exists. If not found, the action fails.

    3. **Entity Filtering**: Filters the target entities to identify supported types:
    IP Addresses and URLs.

    4. **Normalization**: For each entity, it determines the appropriate name for
    Fortigate. IP addresses have their subnet masks removed (e.g., '1.1.1.1/32' becomes
    '1.1.1.1'), and URLs have their domain part extracted.

    5. **Membership Check**: Checks if the normalized entity name exists in Fortigate
    and if it is currently a member of the target address group.

    6. **Removal**: If the entity is a member, the action sends a PUT request to Fortigate
    to update the address group by removing that specific member.

    7. **Reporting**: Summarizes the results, listing entities successfully removed,
    entities that were not members of the group, and any entities that failed processing.


    ### Additional Notes

    - The action extracts the domain part of URL entities using the `tldextract` logic.

    - If an entity is not found in Fortigate or is not part of the group, it is skipped
    and reported accordingly.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Updates the configuration of an address group on the Fortigate firewall by removing
      specific members via a PUT request.
    fetches_data: true
    internal_data_mutation_explanation: null
  categories:
