Remove Entities From Policy:
  ai_description: >-
    ### General Description

    The **Remove Entities From Policy** action is designed to remove specific IP Address
    and URL entities from a designated firewall policy within a Fortigate environment.
    This action allows security administrators to programmatically manage policy membership,
    specifically targeting either the 'Source' or 'Destination' address lists of a
    policy. It is particularly useful for automated containment or cleanup workflows
    where temporary access or blocking rules need to be revoked.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Policy Name | String | Yes | The exact name of the firewall policy in Fortigate
    from which the entities should be removed. |

    | Location | String (Dropdown) | No | Specifies whether the entities should be
    removed from the 'Source' or 'Destination' field of the policy. Options are `Source`
    or `Destination`. Defaults to `Destination`. |


    ### Additional Notes

    * **Entity Normalization:** For `ADDRESS` entities, the action automatically removes
    any subnet masks before processing. For `URL` entities, the action extracts the
    domain part to match against Fortigate's FQDN address objects.

    * **Pre-check Logic:** The action verifies that the policy exists and that the
    entity is actually a member of the specified policy list before attempting a removal.
    If an entity is not part of the policy, it is reported as such without attempting
    an API update.

    * **Supported Entities:** This action runs on `ADDRESS` (IP) and `DestinationURL`
    (URL) entities.


    ### Flow Description

    1. **Parameter Initialization:** Retrieve the Fortigate API configuration and
    the action-specific parameters (`Policy Name` and `Location`).

    2. **Policy Verification:** Fetch the specified policy from Fortigate by name.
    If the policy is not found, the action fails immediately.

    3. **Entity Filtering:** Identify all `ADDRESS` and `URL` entities from the target
    list provided by Google SecOps.

    4. **Membership Validation:** For each suitable entity:
        * Check if the entity exists as an address object in Fortigate.
        * Verify if the entity's name is present in the current address list (Source
    or Destination) of the target policy.
    5. **Policy Update:** If the entity is found within the policy's list, the action
    performs a `PUT` request to the Fortigate API to update the policy, effectively
    removing the entity.

    6. **Result Aggregation:** Compile a summary of successful removals, entities
    not found in the policy, and any processing failures to provide a comprehensive
    output message.
