List Policies:
  ai_description: >-
    ### General Description

    The **List Policies** action retrieves a list of firewall policies from a Fortigate
    device. It allows users to discover existing security policies and filter them
    based on specific criteria like the policy name. This is useful for auditing configurations
    or verifying policy existence before performing automated changes.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Filter Key | String (Dropdown) | No | The attribute used for filtering. Currently
    supports "Name". If Filter Logic is used, this must be set. |

    | Filter Logic | String (Dropdown) | No | The logic used for the filter. Supports
    "Equal" (exact match) or "Contains" (substring match). Requires Filter Key to
    be set. |

    | Filter Value | String | No | The specific string to search for based on the
    key and logic. If empty, filtering is skipped. |

    | Max Records To Return | Integer | No | The maximum number of policy records
    to fetch. Defaults to 50. Must be a positive integer. |


    ### Additional Notes

    - If a **Filter Logic** is selected, a **Filter Key** must also be provided, otherwise
    the action will fail.

    - If **Filter Value** is left empty while other filter parameters are set, the
    action will execute without applying the filter.

    - This action does not require or process any entities from the SOAR case.


    ### Flow Description

    1. **Initialization**: The action initializes the Fortigate manager using the
    provided API credentials and connection settings.

    2. **Validation**: It validates the input parameters, ensuring the record limit
    is positive and that filter dependencies (Logic requiring Key) are met.

    3. **Data Retrieval**: It sends a GET request to the Fortigate API's firewall
    policy endpoint, incorporating the filter parameters and limit into the query.

    4. **Processing**: The retrieved policy data is parsed into a structured format.

    5. **Output**: The action generates a data table named "Available Policies" and
    attaches the full results as JSON to the action output.
