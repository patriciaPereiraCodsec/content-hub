Ping:
  ai_description: >-
    ### General Description

    Tests the connectivity to the DeepSight API to ensure that the integration can
    communicate with the service successfully. This action is primarily used for troubleshooting
    and verifying that the provided API key and network settings (like SSL) are correctly
    configured.


    ### Parameters Description

    There are no parameters for this action.


    ### Additional Notes

    This action uses a hardcoded IP address (8.8.8.8) to perform a test scan against
    the DeepSight API. It does not process any entities from the Google SecOps case.


    ### Flow Description

    1. **Initialize Manager**: The action retrieves the API Key and SSL configuration
    from the integration settings and initializes the DeepSightManager.

    2. **Test Connectivity**: It executes the `test_connectivity` method, which sends
    a GET request to the DeepSight IP scan endpoint for the address '8.8.8.8'.

    3. **Validate Response**: The manager validates the HTTP response to ensure the
    API key is valid and the service is reachable.

    4. **Finalize**: If the request is successful, the action concludes with a success
    message indicating that the connection was established.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
  categories:
    enrichment: false
  entity_usage:
