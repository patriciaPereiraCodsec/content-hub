Scan URL:
  ai_description: >-
    ### General Description

    Enriches URL entities using Symantec DeepSight threat intelligence. This action
    retrieves comprehensive data about a URL, including domain information, WHOIS
    records, and whitelist status, to help analysts assess the risk associated with
    specific links.


    ### Parameters

    There are no action-specific parameters for this action. It relies on the global
    integration configuration (API Key and SSL settings).


    ### Flow Description

    1. **Configuration Retrieval**: The action fetches the API Key and SSL verification
    preference from the DeepSight integration settings.

    2. **Entity Filtering**: It identifies all URL entities within the current context.

    3. **External API Query**: For each URL, it performs a GET request to the DeepSight
    API to retrieve scan results.

    4. **Data Processing**: The retrieved JSON data is flattened and prefixed with
    'DeepSight' for clarity.

    5. **Internal Enrichment**: The action updates the entity's additional properties
    with the scan data, marks the entity as enriched, and creates an entity-specific
    data table in the UI.

    6. **Finalization**: It updates the entities in Google SecOps and provides a summary
    message along with the raw JSON results for further processing.
