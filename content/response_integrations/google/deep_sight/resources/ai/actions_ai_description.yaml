Scan Email:
  ai_description: >-
    ### General Description

    The **Scan Email** action enriches User entities by querying Symantec DeepSight
    for threat intelligence associated with an email address. This action retrieves
    data such as report IDs, titles, and dates linked to the email, providing security
    analysts with context on whether a user's email is associated with known threats
    or malicious infrastructure.


    ### Parameters Description

    There are no input parameters for this action. It utilizes the global integration
    configuration for the API Key and SSL verification settings.


    ### Additional Notes

    This action specifically targets entities of type **USER**. It uses the `get_email_address`
    utility to extract the email string from the entity object before querying the
    external service. If no email is found for a user entity, that entity is skipped.


    ### Flow Description

    1. **Initialization**: Connects to the DeepSight service using the configured
    API Key and SSL settings from the integration configuration.

    2. **Entity Filtering**: Iterates through the target entities and filters for
    those of type `USER`.

    3. **Email Extraction**: For each user entity, it attempts to extract a valid
    email address using the `get_email_address` utility.

    4. **External Lookup**: Queries the DeepSight `mati/emails` endpoint with the
    extracted email address via a GET request.

    5. **Data Enrichment**: If a result is found, the action:
        * Flattens the JSON response and adds a 'DeepSight' prefix to the keys.
        * Updates the entity's `additional_properties` with the flattened data.
        * Creates a CSV-formatted data table attached to the entity for visibility
    in the SOAR UI.
        * Marks the entity as `enriched`.
    6. **Update and Result**: Updates all enriched entities within the Google SecOps
    platform and returns the full aggregated JSON result set.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      The action updates entity additional properties with threat intelligence data
      and adds data tables to the entities within the SOAR.
  categories:
    enrichment: true
  entity_usage:
