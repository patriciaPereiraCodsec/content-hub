Scan Domain:
  ai_description: >-
    Enriches Hostname, URL, and User entities by performing a domain reputation scan
    using Symantec DeepSight. The action extracts the domain from the provided entities
    and retrieves detailed information, including WHOIS data (registrar, creation/expiration
    dates, organization) and whitelist status.


    ### Parameters

    There are no parameters for this action.


    ### Flow Description

    1. **Domain Extraction**: Iterates through target entities and extracts the domain
    name. For User entities, it attempts to parse the domain from the username. For
    Hostname and URL entities, it extracts the domain part.

    2. **External Lookup**: Queries the Symantec DeepSight API's domain endpoint for
    each extracted domain using a GET request.

    3. **Data Processing**: Flattens the resulting JSON data and adds a 'DeepSight'
    prefix to the keys for better organization.

    4. **Internal Enrichment**: Updates the entity's additional properties with the
    flattened data, marks the entity as enriched, and attaches a CSV-formatted data
    table to the entity in the Google SecOps interface.

    5. **Final Update**: Commits the changes to the entities within the Google SecOps
    environment and provides a summary message of enriched entities.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      The action updates entity additional properties with domain intelligence data
      retrieved from DeepSight and sets the 'is_enriched' flag to true.
  categories:
    enrichment: true
  entity_usage:
    entity_types:
    - HOSTNAME
    - DestinationURL
    - USERUNIQNAME
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: true
    filters_by_identifier: false
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: false
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
