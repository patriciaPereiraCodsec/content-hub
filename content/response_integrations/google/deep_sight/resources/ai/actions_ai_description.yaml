Scan IP:
  ai_description: >-
    ### General Description

    Enriches IP Address entities using Symantec DeepSight threat intelligence. This
    action retrieves comprehensive data about an IP, including its geolocation, network
    details (ASN, carrier), and observed malicious behaviors. It is designed to provide
    security analysts with immediate context regarding the reputation and origin of
    an IP address.


    ### Parameters Description

    There are no parameters for this action.


    ### Additional Notes

    The action requires a valid API Key and SSL configuration to be set in the DeepSight
    integration settings. It specifically targets entities of type ADDRESS.


    ### Flow Description

    1. **Initialization**: The action retrieves the API key and SSL verification preference
    from the DeepSight integration configuration.

    2. **Entity Filtering**: It iterates through the target entities and filters for
    those with the type `ADDRESS` (IP addresses).

    3. **External Lookup**: For each valid IP entity, the action calls the DeepSight
    API's `scan_ip` endpoint to fetch intelligence data.

    4. **Data Enrichment**: If data is returned, the action:
        - Flattens the JSON response and adds a 'DeepSight' prefix to the keys.
        - Populates the entity's `additional_properties` with the enriched data.
        - Marks the entity as `is_enriched = True`.
        - Creates an entity-specific data table containing the flattened results.
    5. **Internal Update**: The action updates the modified entities within Google
    SecOps to persist the enrichment data.

    6. **Completion**: It returns a summary message listing the enriched entities
    and provides the raw JSON results for further downstream use.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entity additional properties with DeepSight intelligence data, adds
      entity data tables, and marks entities as enriched.
  categories:
