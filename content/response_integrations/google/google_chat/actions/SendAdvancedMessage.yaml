name: Send Advanced Message
description: Send an advanced message to a Google Chat space based on provided message
    JSON payload. Note that action is not working on Siemplify entities.
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/google-chat#send_advanced_message
integration_identifier: GoogleChat
parameters:
-   name: Space Name
    default_value: ''
    type: string
    description: 'Specify a space name to send message to. Example space name: AAAAdaTsel0'
    is_mandatory: true
-   name: Message JSON Payload
    default_value: '{"cards":[{"sections":[{"widgets":[{"image":{"imageUrl":"https://..."}},{"buttons":[{"textButton":{"text":"OPEN
        IN GOOGLE MAPS","onClick":{"openLink":{"url":"https://..."}}}}]}]}]}]}'
    type: string
    description: Specify a JSON payload to send with message. See article https://developers.google.com/chat/api/guides/message-formats/cards
        for the examples of messages payload.
    is_mandatory: true
dynamic_results_metadata:
-   result_example_path: resources/send_advanced_message_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
