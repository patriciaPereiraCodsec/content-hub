List Spaces:
  ai_description: >-
    ### General Description

    The **List Spaces** action retrieves a list of Google Chat spaces that the configured
    bot has been added to. This action is used to discover available communication
    channels within the Google Chat environment and can optionally retrieve detailed
    membership information for each space. It supports client-side filtering to narrow
    down results based on space attributes.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Filter Key | String | No | The attribute used for filtering results. Options
    include `Name`, `Display Name`, and `Type`. |

    | Filter Logic | String | No | The logic applied to the filter. Options are `Equal`
    (exact match) or `Contains` (partial match). |

    | Filter Value | String | No | The specific value to search for. If left empty,
    no filtering is applied. |

    | Max Records To Return | Integer | No | The maximum number of space records to
    return. Defaults to 50. Must be a positive integer. |

    | Include User Memberships | Boolean | No | If enabled, the action will perform
    additional API calls to fetch and include the list of members for each identified
    space. |


    ### Additional Notes

    - **Dependency:** If a `Filter Logic` is selected, a `Filter Key` must also be
    specified for the action to execute successfully.

    - **Scope:** This action does not operate on Google SecOps entities; it queries
    the global Google Chat environment accessible to the bot.


    ### Flow Description

    1. **Initialization:** The action extracts connection settings (API Root, Service
    Account) and user parameters.

    2. **Validation:** It validates that the `Max Records To Return` is a positive
    integer and ensures that `Filter Key` is provided if `Filter Logic` is used.

    3. **API Request:** It authenticates using the Service Account and sends a GET
    request to the Google Chat API to list all spaces the bot is a member of.

    4. **Filtering:** The action processes the API response and applies the user-defined
    filter (Key, Logic, and Value) to the list of spaces.

    5. **Membership Retrieval (Optional):** If `Include User Memberships` is set to
    true, the action iterates through the filtered spaces and makes additional API
    calls to retrieve the members of each space.

    6. **Results:** The final data is compiled into a JSON result and a data table,
    which are then attached to the action output in Google SecOps.
  capabilities:
