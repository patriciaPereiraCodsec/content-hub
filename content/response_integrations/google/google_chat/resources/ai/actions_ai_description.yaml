Send Advanced Message:
  ai_description: >-
    ### General Description

    Sends a structured, advanced message to a specific Google Chat space using a JSON
    payload. This action allows for the creation of complex messages that include
    cards, widgets, buttons, and images, going beyond simple text notifications. It
    is primarily used for automated reporting, alerting, or interactive workflows
    within Google Chat.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Space Name | String | Yes | The resource name of the Google Chat space where
    the message will be sent (e.g., `spaces/AAAAdaTsel0`). |

    | Message JSON Payload | String | Yes | A JSON-formatted string defining the message
    structure. It must adhere to the Google Chat API message format (e.g., containing
    `cardsV2` or `text` fields). |


    ### Flow Description

    1. **Parameter Extraction:** The action retrieves the connection settings (API
    Root, Service Account) and the action-specific parameters (`Space Name` and `Message
    JSON Payload`).

    2. **JSON Parsing:** The `Message JSON Payload` string is validated and converted
    into a dictionary format.

    3. **Authentication:** The action initializes the `GoogleChatManager`, which authenticates
    using the provided Service Account credentials to establish an authorized session.

    4. **API Interaction:** A POST request is sent to the Google Chat API endpoint
    (`/v1/spaces/{space_name}/messages`) with the parsed JSON payload.

    5. **Result Handling:** The response from the Google Chat API (containing the
    created message details) is captured and added to the action's JSON results.


    ### Additional Notes

    * This action **does not** operate on or filter any entities (IPs, Hosts, Users,
    etc.) from the SecOps environment.

    * Ensure the Service Account has the necessary permissions (`https://www.googleapis.com/auth/chat.bot`)
    to post in the target space.
