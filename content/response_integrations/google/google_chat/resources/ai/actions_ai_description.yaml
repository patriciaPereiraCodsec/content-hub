Send Message:
  ai_description: >-
    ### General Description

    This action sends a text message to a specific Google Chat space. It is primarily
    used for notifications, alerting, or communication within a SOC workflow. The
    action interacts with the Google Chat API using service account credentials to
    post messages to a designated space identifier.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Space Name | String | Yes | The resource name of the Google Chat space where
    the message will be sent (e.g., `spaces/AAAAdaTsel0`). |

    | Message Text | String | Yes | The actual text content of the message to be delivered
    to the space. |


    ### Additional Notes

    - This action **does not** operate on Google SecOps entities (IPs, Hostnames,
    etc.). It is a standalone communication action.

    - The integration requires a valid Service Account JSON with the necessary Google
    Chat API permissions (`https://www.googleapis.com/auth/chat.bot`).


    ### Flow Description

    1. **Initialization**: The action retrieves the API Root URL, Service Account
    credentials, and SSL verification settings from the integration configuration.

    2. **Parameter Extraction**: It extracts the target `Space Name` and the `Message
    Text` from the action input.

    3. **Authentication**: A `GoogleChatManager` is initialized, which sets up an
    authorized session using the provided service account JSON.

    4. **API Interaction**: The action performs a POST request to the Google Chat
    API endpoint (`/v1/spaces/{space_name}/messages`) with the message payload.

    5. **Result Handling**: If successful, the message details returned by the API
    are added to the action's JSON results, and the action completes with a success
    status.
