Ping:
  ai_description: "### General Description\nThe **Ping** action is designed to verify\
    \ the connectivity between Google SecOps and the Google Chat service. It ensures\
    \ that the provided integration configuration parameters (API Root, Service Account,\
    \ and SSL settings) are correct and that the environment can successfully authenticate\
    \ and communicate with the Google Chat API.\n\n### Parameters Description\nThis\
    \ action primarily relies on **Integration Configuration** parameters rather than\
    \ action-specific parameters. \n\n| Parameter Name | Type | Mandatory | Description\
    \ |\n| :--- | :--- | :--- | :--- |\n| API Root URL | String | Yes | The base URL\
    \ for the Google Chat API. Defaults to `https://chat.googleapis.com`. |\n| Service\
    \ Account | String | Yes | The JSON string containing the Google Service Account\
    \ credentials used for OAuth2 authentication. |\n| Verify SSL | Boolean | No |\
    \ Determines whether to verify the SSL certificate of the API endpoint. |\n\n\
    ### Additional Notes\n* This action does not process any entities.\n* It is used\
    \ as a health check for the integration.\n* According to standard SOAR practices,\
    \ Ping actions are not classified as enrichment actions.\n\n### Flow Description\n\
    1. **Parameter Extraction:** The script retrieves the API Root URL, Service Account\
    \ JSON, and SSL verification setting from the integration configuration.\n2. **Manager\
    \ Initialization:** It initializes the `GoogleChatManager`, which parses the Service\
    \ Account JSON and sets up an authorized HTTP session using Google's OAuth2 library.\n\
    3. **Connectivity Test:** The manager executes a `GET` request to the `/v1/spaces`\
    \ endpoint (List Spaces).\n4. **Validation:** The script validates the API response.\
    \ If the request is successful, it confirms connectivity. If an error occurs (e.g.,\
    \ authentication failure, network timeout), it catches the exception and reports\
    \ the failure.\n5. **Final Result:** The action ends with a boolean result (`True`\
    \ for success, `False` for failure) and a descriptive status message."
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
