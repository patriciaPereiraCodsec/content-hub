name: Create Policy
description: Use the “Create Policy” action to create a new policy entry within Cloud
    Identity.
integration_identifier: CloudIdentity
parameters:
-   name: Policy Entry
    default_value: 
        # language=json
        |
        {
            "type": "ADMIN",
            "customer": "customers/<CUSTOMER_ID>",
            "policyQuery": {
                "query": "entity.org_units.exists(org_unit, org_unit.org_unit_id == orgUnitId('<ORG_UNIT_ID>'))",
                "orgUnit": "orgUnits/<ORG_UNIT_ID>"
            },
            "setting": {
                "type": "settings/rule.dlp",
                "value": {
                    "display_name": "test_create_rule",
                    "triggers": [
                        "google.workspace.chrome.file.v1.download"
                    ],
                    "state": "ACTIVE",
                    "action": {
                        "chromeAction": {
                            "warnUser": {}
                        }
                    }
                }
            }
        }
    type: string
    description: The JSON object representing the configuration of the policy entry
        to add.
    is_mandatory: true
dynamic_results_metadata:
-   result_example_path: resources/create_policy_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
