name: List Policies
description: Use the “List Policies” action to list Cloud Identity policies.
integration_identifier: CloudIdentity
parameters:
-   name: Organization Unit Name
    default_value: ''
    type: string
    description: The name of the organizational unit from which to list policies.
    is_mandatory: true
-   name: Policy Type Filter
    default_value: Admin
    type: ddl
    optional_values:
    - Both
    - Admin
    - System
    description: Type of the policy used to filter the list.
    is_mandatory: false
-   name: Setting Type Filter
    default_value: ''
    type: string
    description: 'The regular expression pattern used to filter policies by their
        settings type.

        This filter is applied directly to the API request.'
    is_mandatory: false
-   name: Settings Display Name Filter
    default_value: ''
    type: string
    description: A comma-separated list of display names used to filter policy settings.
    is_mandatory: false
-   name: Max Results To Return
    default_value: '50'
    type: string
    description: 'The maximum number of results to return for the action run. Max:
        100.'
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/list_policies_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
