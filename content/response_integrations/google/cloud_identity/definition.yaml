identifier: CloudIdentity
name: Cloud Identity
parameters:
-   name: Service Account JSON File Content
    default_value: null
    type: password
    description: The content of the service account key JSON file. You can configure
        either this parameter, or Workload Identity Email. To use this method, paste
        the entire JSON string from the key file downloaded during service account
        creation.
    is_mandatory: false
    integration_identifier: CloudIdentity
-   name: Workload Identity Email
    default_value: ''
    type: string
    description: The client email address of your service account. You can configure
        either this parameter or Service Account JSON File Content. To use this method
        for service account impersonation, you must grant the Service Account Token
        Creator role to your Google SecOps service account.
    is_mandatory: false
    integration_identifier: CloudIdentity
-   name: Delegated Email
    default_value: ''
    type: string
    description: The email address that the integration uses to perform actions. Ensure
        this account has the appropriate delegated permissions within your environment
        to execute the required integration tasks.
    is_mandatory: true
    integration_identifier: CloudIdentity
-   name: Verify SSL
    default_value: true
    type: boolean
    description: If selected, the integration validates the SSL certificate when connecting
        to the Cloud Identity server.
    is_mandatory: false
    integration_identifier: CloudIdentity
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/cloud-identity
categories:
- IT & Infrastructure
- Google
- Cloud
- Chrome Enterprise
- Workspace
svg_logo_path: resources/logo.svg
image_path: resources/image.png
is_available_for_community: false
widgets:
  - AddEntityToDetectorUrlList
  - CreatePolicy
  - ListPolicies

