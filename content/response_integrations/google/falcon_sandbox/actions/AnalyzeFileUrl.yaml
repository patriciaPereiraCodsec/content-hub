name: Analyze File Url
description: Submit a file by URL for analysis and fetch report
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/falcon-sandbox#analyze_file_url
integration_identifier: FalconSandbox
parameters:
-   name: File Url
    default_value: ''
    type: string
    description: The url to the file to analyze. e.g. http://tamzamaninda.net/office/Document.zip
    is_mandatory: true
-   name: Environment
    default_value: ''
    type: string
    description: Environment ID. e.g. 100 (100=Windows 7 32 bit)
    is_mandatory: true
dynamic_results_metadata:
-   result_example_path: resources/analyze_file_url_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
is_async: true
simulation_data_json: '{"Entities":[]}'
script_result_name: max_threat_score
