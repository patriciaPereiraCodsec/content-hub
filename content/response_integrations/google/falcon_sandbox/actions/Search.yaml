name: Search
description: Search Falcon databases for existing scan reports and information about
    files, and file Urls
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/falcon-sandbox#search
integration_identifier: FalconSandbox
parameters:
-   name: File Name
    default_value: ''
    type: string
    description: Filename e.g. invoice.exe
    is_mandatory: false
-   name: File Type
    default_value: ''
    type: string
    description: e.g. docx
    is_mandatory: false
-   name: File Type Description
    default_value: ''
    type: string
    description: e.g. PE32 executable
    is_mandatory: false
-   name: Verdict
    default_value: ''
    type: string
    description: e.g. 1 (1=whitelisted, 2=no verdict, 3=no specific threat, 4=suspicious,
        5=malicious)
    is_mandatory: false
-   name: AV Multiscan Range
    default_value: ''
    type: string
    description: e.g. 50-70 (min 0, max 100)
    is_mandatory: false
-   name: AV Family Substring
    default_value: ''
    type: string
    description: e.g. Agent.AD, nemucod
    is_mandatory: false
-   name: Hashtag
    type: string
    description: e.g. ransomware
    is_mandatory: false
-   name: Port
    type: string
    description: e.g. 8080
    is_mandatory: false
-   name: Host
    type: string
    description: x.x.x.x
    is_mandatory: false
-   name: Domain
    type: string
    description: e.g. checkip.dyndns.org
    is_mandatory: false
-   name: HTTP Request Substring
    type: string
    description: e.g. google
    is_mandatory: false
-   name: Similar Samples
    type: string
    description: e.g. <sha256>
    is_mandatory: false
-   name: Sample Context
    type: string
    description: e.g. <sha256>
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/search_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
simulation_data_json: '{"Entities":[]}'
script_result_name: results
