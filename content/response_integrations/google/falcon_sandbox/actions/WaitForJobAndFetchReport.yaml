name: Wait For Job and Fetch Report
description: Wait for a scan job to complete and fetch the scan report.
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/falcon-sandbox#wait_for_job_and_fetch_report
integration_identifier: FalconSandbox
parameters:
-   name: Job ID
    default_value: ''
    type: string
    description: The job id to fetch report for. For multiple, use comma separated
        values.
    is_mandatory: true
dynamic_results_metadata:
-   result_example_path: resources/wait_for_job_and_fetch_report_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
is_async: true
