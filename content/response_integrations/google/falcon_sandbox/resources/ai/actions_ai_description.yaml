Scan URL:
  ai_description: >-
    ### General Description

    The **Scan URL** action submits URL or Hostname entities to Falcon Sandbox for
    deep automated analysis. This action is designed to provide comprehensive threat
    intelligence by executing the target URL in a controlled sandbox environment.
    It operates asynchronously, first submitting the entities for analysis and then
    polling the service until the results are ready.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Threshold** | Integer | Yes | The minimum number of antivirus (AV) detections
    required to mark an entity as suspicious in Google SecOps. |

    | **Environment** | Dropdown | Yes | Specifies the sandbox operating system environment
    to use for the analysis (e.g., Linux Ubuntu 16.04, Windows 7 64-bit, Android Static
    Analysis). |


    ### Flow Description

    1. **Initialization:** The action retrieves the API configuration and identifies
    supported entities (URL and Hostname) from the current context.

    2. **Submission (First Run):** It submits each valid entity to Falcon Sandbox
    using the specified environment ID. The action then transitions to an 'In Progress'
    state, storing job IDs for tracking.

    3. **Status Polling:** In subsequent runs, the action queries the state of each
    analysis job. It waits until all jobs have reached a terminal state (Success or
    Error).

    4. **Data Retrieval:** Once analysis is complete, the action fetches the summary
    report (including AV detection rates) and the MISP report for each successfully
    scanned entity.

    5. **Enrichment & Insights:** If the AV detection count meets or exceeds the user-defined
    **Threshold**, the entity is marked as suspicious. An insight is created detailing
    the malicious findings.

    6. **Internal Updates:** The action updates the entity attributes in Google SecOps,
    attaches the MISP report as an entity attachment, and provides the full JSON result
    for further processing.


    ### Additional Notes

    - This action is asynchronous and its duration depends on the sandbox processing
    time and queue depth.

    - If a MISP report cannot be retrieved, the action will still proceed with the
    summary enrichment and mark the entity accordingly.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: >-
      Submits a URL or Hostname to Falcon Sandbox, which creates a new analysis job/record
      in the external system.
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entity suspicious and enriched status, creates entity insights, and
      adds MISP reports as entity attachments.
  categories:
    enrichment: false
