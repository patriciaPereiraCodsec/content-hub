Get Hash Scan Report:
  ai_description: >-
    ### General Description

    Enriches File Hash entities using Falcon Sandbox (Hybrid Analysis). This action
    retrieves existing scan reports for a given hash across multiple sandbox environments
    (Windows, Linux, Android). It updates the entity with detailed threat intelligence,
    attaches MISP reports, and marks entities as suspicious if their threat score
    exceeds a defined threshold.


    ### Parameters Description

    There are no action-specific parameters for this action. However, the action relies
    on the following integration-level configurations:


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Api Root | String | Yes | The API root URL for Falcon Sandbox (Hybrid Analysis).
    |

    | Api Key | String | Yes | The API key used for authentication with the Falcon
    Sandbox service. |

    | Threshold | Float | Yes | The threat score threshold (0-100). If any report's
    threat score meets or exceeds this value, the entity is marked as suspicious.
    |


    ### Flow Description

    1. **Configuration Retrieval**: The action retrieves the API Root, API Key, and
    Threshold from the Falcon Sandbox integration settings.

    2. **Entity Filtering**: It identifies all `FILEHASH` entities within the current
    scope.

    3. **Environment Iteration**: For each entity, the action iterates through a list
    of supported sandbox environments (Windows 7 32/64-bit, Android, Linux).

    4. **Data Retrieval**: It queries the Falcon Sandbox API for existing scan summaries
    for the specific hash and environment.

    5. **Report Processing**: If reports are found, it extracts key metrics (threat
    score, verdict, malware family, etc.) and adds the raw JSON report to the action
    results.

    6. **Attachment Retrieval**: It attempts to download a MISP report for the hash
    and attaches it to the entity in Google SecOps.

    7. **Entity Enrichment**: The action flattens the extracted data and updates the
    entity's additional properties.

    8. **Suspicious Status Evaluation**: It tracks the maximum threat score across
    all environments. If this score meets or exceeds the configured threshold, the
    entity is marked as suspicious.

    9. **Internal Update**: Finally, it updates the entities in Google SecOps with
    the new enrichment data and status.


    ### Additional Notes

    * This action is read-only regarding the external system; it does not submit new
    files for analysis.

    * If no reports are found for any environment, the entity will not be enriched.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entity attributes (additional properties, is_suspicious, is_enriched)
      and adds MISP reports as entity attachments.
  categories:
    enrichment: true
  entity_usage:
    entity_types:
    - FILEHASH
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: true
    filters_by_identifier: false
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: false
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
