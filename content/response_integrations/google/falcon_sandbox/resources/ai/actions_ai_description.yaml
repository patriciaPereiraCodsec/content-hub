Ping:
  ai_description: >-
    ### General Description

    The **Ping** action is a diagnostic utility designed to verify the connectivity
    between Google SecOps and the Falcon Sandbox (Hybrid Analysis) API. Its primary
    purpose is to ensure that the integration's configuration parameters, specifically
    the API Root and API Key, are correct and that the external service is reachable.


    ### Parameters Description

    There are no parameters for this action.


    ### Additional Notes

    This action relies on the global integration configuration (API Root and API Key)
    to execute. It does not process any entities or alert data.


    ### Flow Description

    1. **Configuration Retrieval**: The action retrieves the 'Api Root' and 'Api Key'
    from the Falcon Sandbox integration settings.

    2. **Manager Initialization**: It initializes the `FalconSandboxManager` using
    the retrieved credentials.

    3. **Connectivity Test**: The action calls the `test_connectivity` method, which
    sends a GET request to the `/key/current` endpoint of the Falcon Sandbox API.

    4. **Response Validation**: The manager validates the HTTP response to ensure
    the API key is valid and the server is responding.

    5. **Execution End**: If the request is successful, the action terminates with
    a success message; otherwise, it raises an exception.
