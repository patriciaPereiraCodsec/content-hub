Search:
  ai_description: >-
    Searches the Falcon Sandbox (Hybrid Analysis) database for existing analysis reports
    and file information based on a wide variety of search criteria. This action allows
    analysts to query the global database of previously analyzed samples without submitting
    new files.


    ### Parameters Description


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | File Name | String | No | The name of the file to search for (e.g., 'invoice.exe').
    |

    | File Type | String | No | The file extension or type (e.g., 'docx'). |

    | File Type Description | String | No | A description of the file type (e.g.,
    'PE32 executable'). |

    | Verdict | String | No | Filter by analysis verdict: 1 (whitelisted), 2 (no verdict),
    3 (no specific threat), 4 (suspicious), 5 (malicious). |

    | AV Multiscan Range | String | No | Filter by antivirus detection range (0-100),
    e.g., '50-70'. |

    | AV Family Substring | String | No | Search for specific malware family names
    (e.g., 'nemucod'). |

    | Hashtag | String | No | Search by associated hashtags (e.g., 'ransomware').
    |

    | Port | String | No | Search for samples communicating on a specific network
    port. |

    | Host | String | No | Search for samples communicating with a specific IP address.
    |

    | Domain | String | No | Search for samples communicating with a specific domain.
    |

    | HTTP Request Substring | String | No | Search for samples making specific HTTP
    requests. |

    | Similar Samples | String | No | Search for samples similar to a specific SHA256
    hash. |

    | Sample Context | String | No | Search for samples within the context of a specific
    SHA256 hash. |


    ### Additional Notes

    - This action does not run on entities; it is a general search utility.

    - All parameters are optional, but at least one should be provided to narrow down
    search results.

    - Results are returned as a data table named 'Falcon Search Results' and as raw
    JSON.


    ### Flow Description

    1. **Parameter Collection:** The action retrieves all optional search terms provided
    by the user.

    2. **API Connection:** Establishes a connection to the Falcon Sandbox API using
    the configured API Root and Key.

    3. **Search Execution:** Sends a POST request to the `/search/terms` endpoint
    with the filtered search criteria.

    4. **Data Processing:** If results are found, the action flattens the JSON response
    for better readability.

    5. **Output Generation:** Creates a data table in the SOAR case containing the
    search results (verdict, threat score, SHA256, etc.) and provides the full JSON
    output.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
