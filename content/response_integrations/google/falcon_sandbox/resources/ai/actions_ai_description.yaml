Analyze File Url:
  ai_description: >-
    ### General Description

    This action submits a file URL to Falcon Sandbox for automated malware analysis
    and retrieves the resulting threat reports. It is an asynchronous action that
    polls the external service until the analysis job is finished, then fetches detailed
    scan information and threat scores.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | File Url | String | Yes | The URL of the file to be analyzed (e.g., http://example.com/file.zip).
    |

    | Environment | String | Yes | The ID of the sandbox environment to use for analysis
    (e.g., 100 for Windows 7 32-bit). |


    ### Flow Description

    1. **Submission**: The action sends the provided `File Url` and `Environment`
    ID to Falcon Sandbox via a POST request.

    2. **Job Tracking**: It receives a `job_id` and `sha256` hash from the service.
    If the analysis is not immediately finished, the action enters an 'In Progress'
    state.

    3. **Polling (Async)**: The action periodically checks the status of the job using
    the `job_id`.

    4. **Data Retrieval**: Once the job is completed, the action fetches the scan
    summary and the MISP report.

    5. **Output**: It calculates the maximum threat score, attaches the MISP report
    as a file, and adds the full JSON report to the action results.
