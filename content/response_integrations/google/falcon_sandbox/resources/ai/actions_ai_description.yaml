Wait For Job and Fetch Report:
  ai_description: >-
    ### General Description

    This action is designed to monitor the status of one or more Falcon Sandbox scan
    jobs and retrieve their final reports once completed. It is an asynchronous action
    that polls the Falcon Sandbox API until all specified jobs reach a terminal state
    (Success or Failure). Upon completion, it fetches summary scan information and
    specifically retrieves MISP-formatted reports, which are then attached to the
    case in Google SecOps.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Job ID | String | Yes | A comma-separated list of Falcon Sandbox job identifiers
    to monitor and fetch reports for. |


    ### Additional Notes

    - This action is **Asynchronous**, meaning it will periodically check the status
    of the jobs and will only finish once all jobs (and any related reports identified
    during the process) have completed.

    - If a job fails, the action will report the failure but continue to process other
    jobs in the list.

    - MISP reports are added as file attachments to the case.


    ### Flow Description

    1. **Initialization**: The action parses the provided comma-separated `Job ID`
    string into a list of individual identifiers.

    2. **Status Polling**: It iterates through the job IDs and queries the Falcon
    Sandbox API for their current state. It also identifies any 'related reports'
    that were generated as part of the analysis.

    3. **Progress Check**: If any job (original or related) is still in a 'Queue'
    or 'In Progress' state, the action sets its status to 'In Progress' and pauses
    until the next execution cycle.

    4. **Data Retrieval**: Once all jobs are finished, the action fetches the summary
    scan information for all successful jobs.

    5. **Report Attachment**: For each successful job, it attempts to download the
    MISP-formatted report and attaches it to the Google SecOps case as a file.

    6. **Finalization**: The action compiles the full JSON results for all jobs and
    completes the execution, providing a summary of successful and failed report retrievals.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
