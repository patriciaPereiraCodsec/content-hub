Analyze File:
  ai_description: >-
    Submits a file to Falcon Sandbox for automated analysis and retrieves the resulting
    threat intelligence report. This action operates asynchronously, first uploading
    the file and then polling for the completion of the analysis. Once finished, it
    retrieves threat scores, scan summaries, and optionally attaches a MISP report
    to the case.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | File Path | String | Yes | The full local path of the file to be uploaded and
    analyzed. |

    | Environment | Integer | Yes | The ID of the sandbox environment to use for analysis
    (e.g., 100 for Windows 7 32-bit, 300 for Linux). |

    | Include Report | Boolean | No | If enabled, the action will attempt to fetch
    and attach a MISP report. Note: This feature may require a premium API key. |


    ### Flow Description

    1. **Submission:** The action uploads the file from the specified path to Falcon
    Sandbox using the provided environment ID.

    2. **Status Polling:** Because the action is asynchronous, it enters a 'QueryState'
    mode where it periodically checks the status of the analysis job using the Job
    ID.

    3. **Data Retrieval:** Once the analysis is complete, the action fetches the scan
    summary, including threat scores and classification data.

    4. **Reporting:** If 'Include Report' is enabled, the action downloads the MISP
    report and attaches it as a file to the Google SecOps case.

    5. **Output:** The action returns the maximum threat score found and provides
    the full report details in JSON format.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Submits a file to the Falcon Sandbox platform, which creates a new analysis
      job and stores the file in the external sandbox environment.
    fetches_data: true
    internal_data_mutation_explanation: null
  categories:
