Submit File:
  ai_description: >-
    ### General Description

    Submits local files to Falcon Sandbox (Hybrid Analysis) for automated malware
    analysis. This action allows security analysts to upload suspicious files directly
    from a system path to the sandbox environment to trigger a deep analysis, providing
    a Job ID and SHA256 hash for tracking the results.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | File Path | String | Yes | The full path of the file(s) to analyze. Multiple
    paths can be provided as a comma-separated list. |

    | Environment | String | Yes | The specific operating system environment (e.g.,
    Windows 7 64 bit, Linux Ubuntu 16.04) in which the sandbox will execute the file.
    |


    ### Additional Notes

    - This action does not automatically wait for the analysis to complete; it only
    submits the file and returns the Job ID.

    - The 'Environment' parameter must match one of the predefined supported environments
    in Falcon Sandbox.


    ### Flow Description

    1. **Initialization**: Retrieves the API Root and API Key from the integration
    configuration and the File Path and Environment from the action parameters.

    2. **Environment Mapping**: Converts the human-readable environment name into
    the specific ID required by the Falcon Sandbox API.

    3. **File Processing**: Splits the input string into individual file paths and
    iterates through them.

    4. **Submission**: For each file, it opens the file from the local path and performs
    a POST request to the Falcon Sandbox `/submit/file` endpoint.

    5. **Result Collection**: Captures the `job_id` and `sha256` returned by the API
    for each successful submission.

    6. **Finalization**: Aggregates the submission results into a JSON object and
    provides a summary message indicating which files were successfully submitted
    and which failed.
