    filters_by_identifier: false
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: false
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
Search Url:
  ai_description: >-
    ### General Description

    The **Search Url** action queries Joe Sandbox for existing analysis records associated
    with URL entities. It allows security analysts to leverage historical sandbox
    data to determine the reputation and behavior of a URL without triggering a new
    analysis submission.


    ### Parameters Description

    There are no parameters for this action.


    ### Flow Description

    1. **Entity Filtering**: The action identifies all URL entities in the current
    scope.

    2. **Search Query**: For each URL, it performs a search against the Joe Sandbox
    database using the URL string as the query.

    3. **Data Retrieval**: If a record is found, the action fetches the analysis summary
    and downloads the full PDF report.

    4. **Attachment & Linking**: The PDF report is attached to the entity in Google
    SecOps, and a direct web link to the Joe Sandbox analysis page is added.

    5. **Enrichment**: Entity properties are updated with analysis metadata, including
    hashes (MD5, SHA256) and analysis IDs.

    6. **Risk Assessment**: If the sandbox detection indicates the URL is 'malicious'
    or 'suspicious', the entity is marked as suspicious in Google SecOps, and a detailed
    insight is created.


    ### Additional Notes

    - This action only retrieves existing records; it does not perform new sandbox
    detonations.

    - PDF attachments are subject to a 3MB size limit; if the report exceeds this,
    the attachment step is skipped and an error is logged, but the enrichment continues.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      The action updates entity attributes with analysis data, marks entities as suspicious
      if threats are detected, attaches PDF reports to entities, and creates case
      insights.
  categories:
    enrichment: false
