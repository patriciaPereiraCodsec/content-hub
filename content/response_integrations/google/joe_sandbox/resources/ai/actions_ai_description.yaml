    filters_by_is_vulnerable: false
    filters_by_modification_time: false
Ping:
  ai_description: >-
    ### General Description

    The **Ping** action is designed to verify the connectivity between Google SecOps
    and the JoeSandbox instance. It ensures that the provided API credentials (API
    Root and API Key) are valid and that the JoeSandbox server is currently online
    and not in maintenance mode.


    ### Parameters Description

    There are no parameters for this action.


    ### Additional Notes

    This action is typically used during the initial setup of the JoeSandbox integration
    or for troubleshooting communication issues. It does not process any entities
    or modify any data.


    ### Flow Description

    1. **Configuration Retrieval:** The action retrieves the API Root, API Key, and
    SSL verification settings from the integration configuration.

    2. **Manager Initialization:** It initializes the `JoeSandboxManager` with the
    retrieved settings.

    3. **Connectivity Check:** It calls the JoeSandbox API endpoint `api/v2/server/online`
    via a POST request.

    4. **Response Validation:** The action checks the `online` status in the API response.

    5. **Final Result:** If the server is online, it returns a success message and
    a result value of `true`. If the server is in maintenance mode or unreachable,
    it returns a failure message and a result value of `false`.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
  categories:
