Search Hash:
  ai_description: >-
    ### General Description

    Searches for a file hash in JoeSandbox's historical records to retrieve existing
    analysis data. This action is used to determine if a file has been previously
    analyzed in the sandbox and to gather its reputation and detailed report without
    submitting a new sample.


    ### Parameters

    There are no parameters for this action.


    ### Flow Description

    1. **Entity Filtering**: The action identifies all `FILEHASH` entities within
    the current context.

    2. **Search**: For each hash, it queries the JoeSandbox API to find matching analysis
    records (Web IDs).

    3. **Data Retrieval**: If a match is found, it retrieves the full analysis metadata
    and downloads the corresponding PDF report.

    4. **Attachment and Linking**: The PDF report is attached to the entity in Google
    SecOps (if under 3MB), and a direct web link to the JoeSandbox analysis page is
    added.

    5. **Enrichment**: The entity's additional properties are updated with the flattened
    analysis data, and the entity is marked as enriched.

    6. **Risk Assessment**: If the sandbox detection status is 'malicious' or 'suspicious',
    the entity is marked as suspicious, and a detailed insight is created in the case.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      The action updates entity attributes with analysis metadata, marks entities
      as suspicious based on sandbox results, attaches PDF reports to entities, and
      generates case insights.
  categories:
    enrichment: true
  entity_usage:
    entity_types:
    - FILEHASH
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
