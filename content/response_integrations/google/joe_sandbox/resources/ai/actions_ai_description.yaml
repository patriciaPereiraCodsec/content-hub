Detonate File:
  ai_description: >-
    ### General Description

    The **Detonate File** action allows users to submit local files to JoeSandbox
    for automated dynamic analysis and reputation checking. It is an asynchronous
    action that handles the initial submission, monitors the analysis progress, and
    retrieves the final results once completed. This action is designed to provide
    deep visibility into file behavior by leveraging JoeSandbox's detonation capabilities.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **File Paths** | String | Yes | A comma-separated list of local file paths to
    be uploaded and scanned. |

    | **Comment** | String | No | A custom comment to associate with the submission
    in JoeSandbox. Defaults to "Uploaded by Siemplify". |

    | **Report Format** | String | No | The desired format for the downloaded report
    (e.g., html, xml, json, pdf). Defaults to "html". |


    ### Flow Description

    1. **Submission Phase**: The action reads the provided file paths, opens the files
    from the local system, and uploads them to JoeSandbox. Each successful submission
    returns a unique `webid`.

    2. **Status Check (Async)**: The action enters an asynchronous state, periodically
    polling the JoeSandbox API to check if the analysis for each `webid` has reached
    the 'finished' status.

    3. **Data Retrieval**: Once all analyses are complete, the action fetches the
    detailed analysis information and downloads the full report in the user-specified
    format.

    4. **Internal Updates**: The action attaches the downloaded reports to the Google
    SecOps case and adds a direct web link to the JoeSandbox analysis page.

    5. **Insight Generation**: If JoeSandbox detects the file as 'suspicious' or 'malicious',
    the action creates a Case Insight to highlight the risk to the analyst.


    ### Additional Notes

    * This action requires a JoeSandbox Pro level account to function.

    * The action includes built-in error handling for API rate limits (e.g., the default
    20 submissions per day limit).

    * File attachments are subject to a 3MB size limit; if a report exceeds this,
    it will not be attached, though the web link will still be provided.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: true
    can_update_entities: false
    external_data_mutation_explanation: >-
      Submits files to the JoeSandbox platform, which creates new analysis tasks and
      consumes submission quotas in the external system.
    fetches_data: true
    internal_data_mutation_explanation: >-
      Creates case insights for suspicious files and adds analysis reports as attachments
      to the case.
  categories:
    enrichment: false
  entity_usage:
    entity_types: []
    filters_by_additional_properties: false
