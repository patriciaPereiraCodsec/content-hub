Block IP:
  ai_description: >-
    ### General Description

    Blocks IP Address entities in AlgoSec by initiating a traffic change request.
    This action automates the containment of suspicious hosts by requesting a 'Drop'
    rule on the network security policy managed by AlgoSec. The provided IP entities
    are treated as the destinations in the generated change request.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Template** | String | Yes | The AlgoSec change request template to use (e.g.,
    'Standard'). |

    | **Source** | String | Yes | Comma-separated list of sources for the block rule.
    Can be an IP, IP Set, or the keyword 'all'. |

    | **Service** | String | Yes | Comma-separated list of services to block (e.g.,
    'tcp/443', 'ALL'). |

    | **Subject** | String | No | The subject for the change request. Defaults to
    'Siemplify Block IP request'. |

    | **Owner** | String | No | The owner of the change request. Defaults to the ticket
    creator if not specified. |

    | **Due Date** | String | No | The deadline for the request in ISO 8601 format
    (e.g., 2021-08-13T08:16:10Z). |

    | **Expiration Date** | String | No | The expiration date for the request in ISO
    8601 format. |

    | **Custom Fields** | String (JSON) | No | A JSON object containing specific AlgoSec
    fields. |


    ### Additional Notes

    - **Priority Logic:** If the `Custom Fields` parameter is provided, it takes priority
    over the individual parameters for `Subject`, `Owner`, `Due Date`, and `Expiration
    Date`.

    - **Entity Role:** All processed IP entities are mapped as the 'destination' in
    the AlgoSec traffic request.


    ### Flow Description

    1. **Initialization:** Extracts AlgoSec connection details and action parameters
    from the environment.

    2. **Entity Filtering:** Identifies all `ADDRESS` entities within the target scope.

    3. **Request Creation:** Authenticates with AlgoSec and sends a POST request to
    create a traffic change request with the action set to 'Drop' (Block).

    4. **Verification:** Pauses for 10 seconds and then retrieves the current details
    and status of the created request.

    5. **Reporting:** Attaches the request details as a JSON result and provides a
    direct URL link to the AlgoSec Change Request in the case wall.
