List Templates:
  ai_description: >-
    ### General Description

    The 'List Templates' action retrieves a list of available traffic change request
    templates from the AlgoSec FireFlow system. This utility action is primarily used
    to identify valid template IDs or names required for other AlgoSec actions, such
    as creating 'Allow' or 'Block' IP requests. It supports filtering the results
    by template name and limiting the number of returned records.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Filter Logic | Dropdown | No | Determines the matching logic for the 'Filter
    Value'. Options are 'Equal' (exact match) or 'Contains' (substring match). Defaults
    to 'Equal'. |

    | Filter Value | String | No | The string used to filter template names. If left
    empty, no filtering is applied. |

    | Max Templates To Return | Integer | No | The maximum number of template records
    to return in the output. Defaults to 50. Must be greater than 0. |


    ### Additional Notes

    - This action does not require or process any entities (IPs, Hostnames, etc.).

    - The results are presented both as a data table ('Available Templates') for the
    Case Wall and as a raw JSON object for downstream playbook processing.


    ### Flow Description

    1. **Authentication**: The action establishes a session with the AlgoSec FireFlow
    API using the provided credentials.

    2. **Data Retrieval**: It performs a GET request to the templates endpoint to
    fetch all available templates.

    3. **Filtering**: If a 'Filter Value' is provided, the action iterates through
    the retrieved templates and applies the selected 'Filter Logic' (Equal or Contains)
    against the template names.

    4. **Limiting**: The resulting list is truncated based on the 'Max Templates To
    Return' parameter.

    5. **Output Generation**: The filtered list is converted into a flat data table
    and a JSON result, which are then attached to the action output in Google SecOps.
