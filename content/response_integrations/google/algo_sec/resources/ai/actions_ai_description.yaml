Allow IP:
  ai_description: >-
    ### General Description

    This action creates a traffic change request in AlgoSec FireFlow to allow network
    traffic to specific IP address entities. It is primarily used for automated firewall
    policy management and incident response containment exceptions. The action treats
    the target IP entities as the 'Destination' in the generated change request.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Template | String | Yes | The AlgoSec FireFlow template to use for the change
    request (e.g., 'Standard'). |

    | Source | String | Yes | A comma-separated list of sources for the allow rule.
    Supports IP addresses, IP Sets, or the keyword 'all'. |

    | Service | String | Yes | A comma-separated list of services to allow (e.g.,
    'tcp/80', 'udp/53', or 'ALL'). |

    | Subject | String | No | The subject line for the change request. Defaults to
    'Siemplify Allow IP request'. |

    | Owner | String | No | The username of the person who should own the change request.
    |

    | Due Date | String | No | The deadline for the request in ISO 8601 format (e.g.,
    2021-08-13T08:16:10Z). |

    | Expiration Date | String | No | The date when the rule should expire in ISO
    8601 format. |

    | Custom Fields | String | No | A JSON-formatted string containing additional
    key-value pairs for custom AlgoSec fields. If provided, this parameter takes priority
    over individual field parameters like Subject or Owner. |


    ### Additional Notes

    - IP address entities are mapped to the **Destination** field of the traffic request.

    - The action includes a 10-second wait period after creation to allow the external
    system to process the request before fetching final details.


    ### Flow Description

    1. **Initialization**: Extracts integration configuration (API Root, Credentials)
    and action parameters.

    2. **Entity Filtering**: Identifies all 'ADDRESS' (IP) entities within the current
    context.

    3. **Request Creation**: Sends a POST request to the AlgoSec FireFlow API to create
    a new traffic change request using the specified template, source, and service
    details.

    4. **Verification**: Waits for a predefined interval (10 seconds) and then performs
    a GET request to retrieve the full details and status of the newly created change
    request.

    5. **Output**: Returns the request details as JSON and provides a direct URL link
    to the change request in the AlgoSec web interface.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
