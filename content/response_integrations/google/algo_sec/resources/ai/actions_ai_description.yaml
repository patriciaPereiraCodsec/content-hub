Wait for Change Request Status Update:
  ai_description: >-
    ### General Description

    This action is designed to monitor and wait for a specific status update of a
    traffic change request within the AlgoSec FireFlow system. It operates asynchronously,
    meaning it will periodically poll the AlgoSec API until the change request reaches
    one of the desired statuses specified by the user or until a timeout occurs. This
    is primarily used in orchestration workflows where subsequent steps depend on
    the successful implementation or resolution of a network access request.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Request ID** | String | Yes | The unique identifier of the AlgoSec change
    request to monitor. |

    | **Status** | String | Yes | A comma-separated list of statuses that the action
    should wait for. Valid values include: `resolved`, `reconcile`, `open`, `check`,
    `implementation plan`, `implement`, and `validate`. The action completes successfully
    once the request reaches any of these states. |


    ### Additional Notes

    - **Async Execution:** This action is marked as asynchronous. It will yield execution
    back to the SOAR engine and retry at intervals until the condition is met or the
    global timeout is reached.

    - **Timeout Configuration:** Users should ensure the action timeout in the IDE
    is configured appropriately for the expected duration of the change request process.

    - **Supported Requests:** Only traffic-related change requests are supported by
    this action.


    ### Flow Description

    1. **Initialization:** The action extracts connection details (API Root, Credentials)
    and action parameters (Request ID and target Statuses).

    2. **Validation:** It validates the provided statuses against a list of supported
    AlgoSec FireFlow statuses.

    3. **Data Retrieval:** It calls the AlgoSec API to fetch the current details and
    status of the specified Request ID.

    4. **Timeout Check:** It verifies if the action is approaching its execution deadline
    to ensure a graceful exit if the status hasn't changed in time.

    5. **Status Comparison:**
        - If the current status of the request matches one of the target statuses,
    the action completes successfully and returns the full request details as JSON.
        - If the status does not match, the action sets its state to `IN_PROGRESS`,
    allowing the SOAR engine to trigger a retry later.
