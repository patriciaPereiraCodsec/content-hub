Ping:
  ai_description: >-
    ### General Description

    The **Ping** action is a diagnostic tool used to verify the connectivity between
    Google SecOps and the AlgoSec server. It validates the integration's configuration
    by attempting to authenticate and perform a basic API call to ensure the service
    is reachable and the credentials provided are valid.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **API Root** | String | Yes | The base URL of the AlgoSec instance. |

    | **Username** | String | Yes | The username for the AlgoSec account used for
    authentication. |

    | **Password** | String | Yes | The password for the AlgoSec account used for
    authentication. |

    | **Verify SSL** | Boolean | Yes | If enabled, the action verifies the SSL certificate
    for the connection to the AlgoSec server. |


    ### Additional Notes

    This action does not require any input entities and is typically used during the
    initial setup or troubleshooting of the AlgoSec integration.


    ### Flow Description

    1. **Initialization:** The action extracts the connection parameters (API Root,
    Username, Password, and SSL verification status) from the integration configuration.

    2. **Authentication:** It initializes the `AlgoSecManager`, which triggers an
    authentication request to the AlgoSec server to obtain a session ID.

    3. **Connectivity Test:** The action calls the `test_connectivity` method, which
    sends a GET request to the templates endpoint to verify that the API is responsive.

    4. **Completion:** If the requests are successful, it returns a completion state
    with a success message. If any step fails (e.g., authentication error or network
    timeout), it catches the exception and returns a failed state with the error details.
