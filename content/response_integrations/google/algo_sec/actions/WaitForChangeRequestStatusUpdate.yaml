name: Wait for Change Request Status Update
description: 'Wait for change request status update in AlgoSec. Note: Action is running
    as async, please adjust script timeout value in Siemplify IDE for action as needed.
    Only traffic change requests are supported.'
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/algosec#wait_for_change_request_status_update
integration_identifier: AlgoSec
parameters:
-   name: Request ID
    default_value: ''
    type: string
    description: Specify the id of the request for which action needs to check the
        status.
    is_mandatory: true
-   name: Status
    default_value: resolved
    type: string
    description: 'Specify a comma-separated list of change request statuses for which
        action should wait. Possible values: resolved, reconcile, open, check, implementation
        plan, implement, validate.'
    is_mandatory: true
dynamic_results_metadata:
-   result_example_path: resources/wait_for_change_request_status_update_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
is_async: true
