name: Allow IP
description: 'Allow IPs in AlgoSec. Supported entities: IP address. Note: IP address
    entities are treated as destinations in the change request. This action creates
    a traffic change request to allow traffic to IP entities.'
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/algosec#allow_ip
integration_identifier: AlgoSec
parameters:
-   name: Template
    default_value: Standard
    type: string
    description: Specify the template for the change request.
    is_mandatory: true
-   name: Source
    default_value: all
    type: string
    description: Specify a comma-separated list of sources for the allow rule. It
        can be an IP address, IP Set or special keyword like (all).
    is_mandatory: true
-   name: Service
    default_value: ALL
    type: string
    description: Specify a comma-separated list of services that needs to be allowed.
        Values can have a look of {TCP/UDP}/{port} (tcp/80) or special reserved keyword
        (all).
    is_mandatory: true
-   name: Subject
    default_value: ''
    type: string
    description: Specify the subject for the change request. If nothing is provided
        action will put "Siemplify Allow IP request" in the subject.
    is_mandatory: false
-   name: Owner
    default_value: ''
    type: string
    description: Specify who should be the owner of the change request. If nothing
        is provided, the user that created the ticket will be the owner.
    is_mandatory: false
-   name: Due Date
    default_value: ''
    type: string
    description: 'Specify the due date for the change request. Format: ISO 8601. Example:
        2021-08-13T08:16:10Z.'
    is_mandatory: false
-   name: Expiration Date
    default_value: ''
    type: string
    description: 'Specify the expiration date for the change request. Format: ISO
        8601. Example: 2021-08-13T08:16:10Z.'
    is_mandatory: false
-   name: Custom Fields
    default_value: ''
    type: string
    description: 'Specify a JSON object containing information about all of the fields
        that need to be added to the change request. Note: this parameter has a priority
        over other fields'
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/allow_ip_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
simulation_data_json: '{"Entities": ["ADDRESS"]}'
