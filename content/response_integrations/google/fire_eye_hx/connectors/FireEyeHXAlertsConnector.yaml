name: FireEye HX Alerts Connector
parameters:
-   name: DeviceProductField
    default_value: Product Name
    type: string
    description: Enter the source field name in order to retrieve the Product Field
        name.
    is_mandatory: true
    is_advanced: false
    mode: regular
-   name: EventClassId
    default_value: event_type
    type: string
    description: Enter the source field name in order to retrieve the Event Field
        name.
    is_mandatory: true
    is_advanced: false
    mode: regular
-   name: PythonProcessTimeout
    default_value: 180
    type: integer
    description: Timeout limit for the python process running the current script.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: API Root
    default_value: https://x.x.x.x:<port>
    type: string
    description: FireEye HX Server API Root URL.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Username
    default_value: ''
    type: string
    description: FireEye HX user to authenticate with.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Password
    default_value: ''
    type: password
    description: FireEye HX user password to authenticate with.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Offset time in hours
    default_value: 24
    type: integer
    description: Number of hours before the first connector iteration to retrieve
        alerts from. This parameter applies to the initial connector iteration after
        you enable the connector for the first time, or used as a fallback value in
        cases where connector's last run timestamp expires.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Max Alerts Per Cycle
    default_value: 25
    type: integer
    description: How many alerts should be processed during one connector run.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Alert Type
    default_value: active_threat
    type: string
    description: Specify what FireEye HX alert types to ingest.  By default its set
        to active_threat to return alerts in ALERT and QUARANTINED/partial_block state.
        Other valid parameter is ALERT, which will return open alerts only.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Use whitelist as a blacklist
    default_value: false
    type: boolean
    description: If enabled, whitelist will be used as a blacklist.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Verify SSL
    default_value: true
    type: boolean
    description: If specified, connector will check if FireEye HX is configured with
        valid SSL certificate. If certificate is not valid, connector will return
        error.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Environment Field Name
    default_value: ''
    type: string
    description: Describes the name of the field where the environment name is stored.
        If the environment field isn't found, the environment is the default environment.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Environment Regex Pattern
    default_value: .*
    type: string
    description: A regex pattern to run on the value found in the "Environment Field
        Name" field. Default is .* to catch all and return the value unchanged. Used
        to allow the user to manipulate the environment field via regex logic. If
        the regex pattern is null or empty, or the environment value is null, the
        final environment result is the default environment.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Proxy Server Address
    default_value: ''
    type: string
    description: The address of the proxy server to use.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Proxy Username
    default_value: ''
    type: string
    description: The proxy username to authenticate with.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Proxy Password
    default_value: ''
    type: password
    description: The proxy password to authenticate with.
    is_mandatory: false
    is_advanced: false
    mode: script
description: FireEye HX Alerts Connector
integration: FireEyeHX
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/fireeye-hx#fireeye-hx-alerts-connector
rules: []
is_connector_rules_supported: false
creator: admin
