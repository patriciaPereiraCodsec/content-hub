name: Get Indicators
description: Get information on indicators of compromise (IOC) from FireEye HX server
    based on provided search parameters.
integration_identifier: FireEyeHX
parameters:
-   name: Indicator Category
    type: string
    description: The indicator category.
    is_mandatory: false
-   name: Search Term
    type: string
    description: The search term can be any name, category, signature, source, or
        condition value.
    is_mandatory: false
-   name: Limit
    type: string
    description: How many indicators action should return, for example, 100.
    is_mandatory: false
-   name: Share Mode
    default_value: any
    type: ddl
    optional_values:
    - any
    - restricted
    - unrestricted
    description: 'Filter indicators based on specific share mode. Available values:
        any, restricted, unrestricted, visible.'
    is_mandatory: false
-   name: Sort By Field
    type: string
    description: Sorts the results by the specified field in ascending order.
    is_mandatory: false
-   name: Created by
    type: string
    description: Filter indicators based on author.
    is_mandatory: false
-   name: Has associated alerts
    type: boolean
    description: Specify if only indicators, which have associated alerts should be
        returned.
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/get_indicators_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: Admin
