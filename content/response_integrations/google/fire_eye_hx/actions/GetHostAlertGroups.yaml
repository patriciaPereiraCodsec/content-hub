name: Get Host Alert Groups
description: 'List alert groups related to a host in FireEye HX. Supported entities:
    Hostname, IP Address.'
integration_identifier: FireEyeHX
parameters:
-   name: Acknowledgment Filter
    default_value: ALL
    type: ddl
    optional_values:
    - ALL
    - Only Acknowledged
    - Only Unacknowledged
    description: Specify whether you want to return all of the alert groups or only
        acknowledged/unacknowledged.
    is_mandatory: false
-   name: Max Alert Groups To Return
    default_value: 20
    type: string
    description: 'Specify how many Alert Groups to return per entity. Default: 20.'
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/get_host_alert_groups_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: Admin
simulation_data_json: '{"Entities": ["HOSTNAME", "ADDRESS"]}'
