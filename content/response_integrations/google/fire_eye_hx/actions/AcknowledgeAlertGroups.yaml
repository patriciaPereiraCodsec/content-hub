name: Acknowledge Alert Groups
description: Acknowledge alert groups handled by Siemplify to better sync between
    HX platform and Siemplify. Note - you can acknowledge alert groups only , not
    alerts, via the HX API.
integration_identifier: FireEyeHX
parameters:
-   name: Alert Groups IDs
    default_value: ''
    type: string
    description: Specify the Alert Groups IDs you would like to Acknowledge.
    is_mandatory: true
-   name: Acknowledgment Comment
    default_value: ''
    type: string
    description: Specify the acknowledgment comment you would like to add to the relevant
        alert groups
    is_mandatory: false
-   name: Acknowledgment
    default_value: Acknowledge
    type: ddl
    optional_values:
    - Acknowledge
    - Un-acknowledge
    description: Specify whether you would like to Acknowledge or Un-acknowledge the
        specified alert groups
    is_mandatory: true
-   name: Limit
    default_value: ''
    type: string
    description: Specify the maximum amount of alert group listings coming back from
        the API, in the JSON result.
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/acknowledge_alert_groups_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: Admin
