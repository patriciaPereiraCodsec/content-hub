Cancel Host Contain:
  ai_description: >-
    Cancels the containment of a host on the FireEye HX server based on Hostname or
    IP Address entities. This action is used to restore network access to an endpoint
    that was previously isolated. Note that this action is not supported for Linux
    hosts by FireEye HX.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | API Root | String | Yes | The API root URL of the FireEye HX server. |

    | Username | String | Yes | The username used for authentication with the FireEye
    HX API. |

    | Password | String | Yes | The password used for authentication with the FireEye
    HX API. |

    | Verify SSL | Boolean | No | If enabled, the action will verify the SSL certificate
    of the FireEye HX server. Default is False. |


    ### Flow Description

    1. **Initialization**: The action initializes the FireEye HX manager using the
    provided integration configuration.

    2. **Entity Processing**: Iterates through the target entities in the current
    context, filtering for Hostname and Address types.

    3. **Host Lookup**: For each entity, it queries the FireEye HX API to find matching
    agents. If multiple agents match a single entity, it selects the one with the
    most recent `last_poll_timestamp`.

    4. **Containment Cancellation**: Executes a command to cancel the containment
    state for the identified agent ID via a DELETE request to the FireEye HX API.

    5. **Result Aggregation**: Tracks successful cancellations, missing agents, and
    failures, providing a detailed summary in the action output.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      The action sends a DELETE request to the FireEye HX API endpoint (/hosts/{agent_id}/containment)
      to change the host's state from contained to uncontained.
    fetches_data: true
    internal_data_mutation_explanation: null
