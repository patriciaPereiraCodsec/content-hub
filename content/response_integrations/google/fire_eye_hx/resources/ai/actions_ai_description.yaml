Get Alert Group Details:
  ai_description: >-
    ### General Description

    The **Get Alert Group Details** action retrieves comprehensive information for
    specific Alert Groups within FireEye HX using their unique identifiers. This action
    is primarily used to gather deep context about grouped alerts, including assessment
    details, event counts, and acknowledgement status, which helps analysts understand
    the scope and nature of a threat group.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Alert Group ID** | String | Yes | A comma-separated list of FireEye HX Alert
    Group IDs (e.g., `622d3688031aa40faa4bd86028841276`) for which details should
    be retrieved. |


    ### Flow Description

    1. **Initialization**: The action initializes the FireEye HX Manager using the
    provided API credentials (API Root, Username, Password) and SSL verification settings.

    2. **Parameter Parsing**: The input `Alert Group ID` string is parsed and converted
    into a unique list of IDs to be processed.

    3. **Data Retrieval**: The action iterates through each Alert Group ID and performs
    a GET request to the FireEye HX API to fetch the specific group's details.

    4. **Data Processing**: For each successful retrieval, the action parses the raw
    JSON data into a structured format, extracting fields such as assessment, event
    counts, and timestamps.

    5. **Output Generation**: The action aggregates the results into a JSON object
    and constructs a data table named "Alert Group Details" containing the summarized
    information for all successfully retrieved groups.


    ### Additional Notes

    This action does not interact with or process entities from the Google SecOps
    environment; it operates exclusively based on the provided Alert Group ID parameters.
