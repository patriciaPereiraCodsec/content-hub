Get List of File Acquisitions For Host:
  ai_description: >-
    ### General Description

    The **Get List of File Acquisitions For Host** action retrieves a historical list
    of file acquisition requests performed on a specific endpoint via the FireEye
    HX (Endpoint Security) server. This action is primarily used for forensic auditing
    and investigation, allowing analysts to see which files have been previously collected
    from a host. It supports both **HOSTNAME** and **ADDRESS** (IP) entities.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Search Term** | String | No | A search string used to filter the file acquisitions.
    This can match various condition values within the HX records. |

    | **Limit** | Integer | No | The maximum number of acquisition records to return
    for each entity. |

    | **Filter Field** | String | No | Allows filtering results by a specific field
    value, such as an external correlation identifier (`external_id`). |


    ### Flow Description

    1. **Entity Validation**: The action iterates through the target entities, filtering
    for supported types: Hostname and IP Address.

    2. **Host Resolution**: For each entity, the action queries the FireEye HX API
    to find the corresponding Agent ID. If the entity is a Hostname, it searches by
    name; if it is an Address, it searches by IP.

    3. **Conflict Resolution**: If multiple agents match a single entity (e.g., an
    IP shared by multiple hosts over time), the action automatically selects the agent
    record with the most recent `last_poll_timestamp` to ensure data accuracy.

    4. **Data Retrieval**: The action calls the HX API to fetch file acquisition entries
    associated with the identified Agent ID, applying any provided search terms, limits,
    or field filters.

    5. **Result Processing**: Retrieved data is converted into a structured JSON format
    and attached to the Google SecOps case as a Data Table for each successful entity.


    ### Additional Notes

    - If no matching host is found in FireEye HX for a given entity, the action will
    log the missing entity and continue processing others.

    - The action performs a session logout (token deletion) upon completion to maintain
    security hygiene.
