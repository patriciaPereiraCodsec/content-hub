Get Indicator:
  ai_description: >-
    ### General Description

    The **Get Indicator** action retrieves detailed information about a specific indicator
    from the FireEye HX server. It is designed to fetch metadata, platform compatibility,
    and operational statistics (such as alert counts and active conditions) for a
    known indicator identified by its category and name. This action is typically
    used for investigative purposes to understand the context of a specific threat
    indicator.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Indicator Category** | String | Yes | The `uri_name` of the indicator category
    (e.g., `mandiant_unrestricted`). This value is required to locate the indicator
    within the FireEye HX hierarchy. |

    | **Indicator Name** | String | Yes | The `uri_name` of the specific indicator
    (often a UUID or a specific string identifier). This uniquely identifies the indicator
    within the specified category. |


    ### Flow Description

    1. **Initialization**: The action extracts the FireEye HX integration configuration
    (API Root, credentials) and the specific action parameters (Indicator Category
    and Indicator Name).

    2. **Authentication**: Establishes a session with the FireEye HX API to obtain
    a temporary authentication token.

    3. **Data Retrieval**: Executes a GET request to the FireEye HX indicators endpoint
    using the provided category and name.

    4. **Parsing**: Processes the raw JSON response into a structured `Indicator`
    data model, extracting attributes such as ID, display name, description, supported
    platforms, and alert statistics.

    5. **Output Generation**:
        *   Creates a formatted data table titled 'Indicator [Name]' containing key
    attributes for quick review in the case wall.
        *   Attaches the full raw JSON data to the action results for use in subsequent
    playbook steps.
    6. **Session Cleanup**: Logs out of the FireEye HX server to invalidate the session
    token.


    ### Additional Notes

    This action does not operate on SecOps entities (like IP addresses or Hostnames).
    Instead, it requires explicit string identifiers for the indicator and its category,
    which are usually retrieved from a preceding 'Get Indicators' action or provided
    manually.
