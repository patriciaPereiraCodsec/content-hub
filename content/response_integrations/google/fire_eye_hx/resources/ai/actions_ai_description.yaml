  ai_description: >-
    Retrieves information on indicators of compromise (IOC) from a FireEye HX server
    based on user-defined search parameters. This action allows for broad searching
    across indicator categories, names, signatures, and sources to identify relevant
    threat intelligence data.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Indicator Category | String | No | The specific category of indicators to retrieve.
    |

    | Search Term | String | No | A term to search across names, categories, signatures,
    sources, or condition values. |

    | Limit | Integer | No | Maximum number of indicators to return (Default: 100).
    |

    | Share Mode | String | No | Filter by share mode: any, restricted, unrestricted,
    or visible. |

    | Sort By Field | String | No | Field name to sort the results in ascending order.
    |

    | Created by | String | No | Filter indicators by the username of the creator.
    |

    | Has associated alerts | Boolean | No | If true, only returns indicators that
    have triggered alerts. |


    ### Flow Description

    1. **Authentication**: Establishes a session with the FireEye HX server using
    provided credentials and retrieves an API token.

    2. **Data Retrieval**: Executes a search for indicators using the provided filters
    such as category, search term, share mode, and author.

    3. **Processing**: Parses the raw API response into structured indicator objects,
    extracting fields like ID, Name, OS platforms, and alert statistics.

    4. **Output**: Generates a data table named 'Indicators' containing key details
    and attaches the full raw JSON results to the action output for further processing.

    5. **Cleanup**: Terminates the session by logging out of the FireEye HX API to
    ensure security.
