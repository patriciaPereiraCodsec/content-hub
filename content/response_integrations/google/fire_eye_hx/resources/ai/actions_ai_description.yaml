Get Host Alert Groups:
  ai_description: >-
    ### General Description

    The **Get Host Alert Groups** action retrieves a list of alert groups associated
    with a specific host from FireEye HX. It supports **Hostname** and **IP Address**
    entities. This action allows security analysts to view the history of alerts and
    detections associated with a specific endpoint, providing context for investigations.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Acknowledgment Filter** | String | No | Filters the alert groups based on
    their acknowledgment status. Options: `ALL` (default), `Only Acknowledged`, `Only
    Unacknowledged`. |

    | **Max Alert Groups To Return** | Integer | No | The maximum number of alert
    groups to retrieve for each entity. Default is 20. Must be a positive integer.
    |


    ### Flow Description

    1. **Authentication**: The action authenticates with the FireEye HX API using
    the provided credentials and retrieves an API token.

    2. **Host Identification**: For each provided entity (Hostname or IP), the action
    searches for matching hosts in FireEye HX. If multiple hosts are found for a single
    entity, it selects the host with the most recent `last_poll_timestamp`.

    3. **Alert Group Retrieval**: It fetches the alert groups for the identified host,
    applying the specified acknowledgment filter and limiting the results to the value
    provided in the parameters.

    4. **Output Generation**: The retrieved alert groups are formatted into a data
    table and attached to the case wall for each successful entity. The raw data is
    also returned as a JSON result.

    5. **Cleanup**: The action logs out of the FireEye HX session.


    ### Additional Notes

    - If no matching host is found for an entity, the action will log the failure
    and continue to the next entity.

    - The action will fail if the 'Max Alert Groups To Return' parameter is set to
    a value less than 1.
