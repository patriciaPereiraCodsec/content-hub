Contain Host:
  ai_description: >-
    ### General Description

    The **Contain Host** action isolates a host from the network by creating a containment
    task on the FireEye HX server. It is designed to work with **HOSTNAME** and **ADDRESS**
    (IP) entities. This action is critical for incident response to prevent the lateral
    movement of threats. Note that FireEye HX does not support containment for Linux
    hosts.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Approve Containment** | Boolean | Yes | Determines if the containment request
    should be automatically approved on the FireEye HX server. If set to `false`,
    the request is created but must be manually approved within the FireEye HX web
    console. |


    ### Flow Description

    1. **Initialization**: The action retrieves the FireEye HX integration configuration
    (API Root, credentials, SSL settings) and the `Approve Containment` action parameter.

    2. **Entity Filtering**: It iterates through the target entities, processing only
    those of type `HOSTNAME` or `ADDRESS` (IP).

    3. **Host Identification**: For each valid entity, the action queries the FireEye
    HX API to find matching agents. If multiple agents match a single entity, the
    action automatically selects the one with the most recent `last_poll_timestamp`
    to ensure the most relevant host is targeted.

    4. **Containment Request**: The action sends a POST request to the FireEye HX
    server to initiate the containment task for the identified agent ID. The `approve`
    flag is passed based on the user-provided parameter.

    5. **Result Aggregation**: The action tracks successful containments, missing
    agents (where no matching FireEye HX agent was found), and any processing failures,
    providing a detailed summary in the output message.


    ### Additional Notes

    - **Mutation**: This action performs a state-changing operation on an external
    system (FireEye HX).

    - **Platform Limitation**: As per FireEye HX documentation, this action is not
    supported for Linux-based hosts.
  capabilities:
