Acknowledge Alert Groups:
  ai_description: >-
    ### General Description

    The **Acknowledge Alert Groups** action allows users to synchronize the status
    of alert groups between FireEye HX and Google SecOps by updating their acknowledgement
    state. This action is specifically designed for alert groups, as the FireEye HX
    API does not support acknowledging individual alerts directly. It enables security
    analysts to mark groups of alerts as handled or unhandled within the FireEye HX
    platform directly from the SOAR interface.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Alert Groups IDs** | String | Yes | A comma-separated list of FireEye HX Alert
    Group IDs to be processed. |

    | **Acknowledgment** | String (Dropdown) | Yes | Specifies whether to 'Acknowledge'
    or 'Un-acknowledge' the provided alert groups. |

    | **Acknowledgment Comment** | String | No | An optional comment to be associated
    with the acknowledgement status change. |

    | **Limit** | Integer | No | The maximum number of alert group records to include
    in the JSON result output. Defaults to 50 if not specified or if a non-positive
    value is provided. |


    ### Flow Description

    1. **Initialization**: The action establishes a session with the FireEye HX instance
    using the provided API credentials and configuration.

    2. **Parameter Parsing**: It cleans and splits the `Alert Groups IDs` string into
    a list and determines the boolean acknowledgement state based on the `Acknowledgment`
    selection.

    3. **API Interaction**: It executes a `PATCH` request to the `/alert_groups` endpoint
    of the FireEye HX API, passing the list of IDs, the status, and the optional comment.

    4. **Result Processing**: The action compares the requested IDs against the IDs
    returned in the API response to determine which groups were successfully updated.

    5. **Output**: It generates a summary message indicating success or partial success
    and attaches the raw API response as a JSON result for further use in the playbook.


    ### Additional Notes

    - This action does not operate on entities within the Google SecOps scope; it
    relies entirely on the IDs provided in the input parameters.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Updates the acknowledgement status (Acknowledge or Un-acknowledge) and adds
      comments to alert groups in FireEye HX via a PATCH request to the /alert_groups
      endpoint.
    fetches_data: true
    internal_data_mutation_explanation: null
