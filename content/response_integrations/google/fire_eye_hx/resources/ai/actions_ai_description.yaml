Ping:
  ai_description: "### General Description\nThe **Ping** action is a diagnostic utility\
    \ designed to verify the connectivity between Google SecOps and the FireEye HX\
    \ server. Its primary purpose is to ensure that the integration's configuration\
    \ parameters\u2014such as the API Root, Username, and Password\u2014are correct\
    \ and that the network path to the server is functional.\n\n### Parameters Description\n\
    This action does not have any action-specific parameters. It utilizes the global\
    \ configuration parameters defined at the integration level:\n\n| Parameter |\
    \ Type | Mandatory | Description |\n| :--- | :--- | :--- | :--- |\n| **API Root**\
    \ | String | Yes | The base URL of the FireEye HX API instance. |\n| **Username**\
    \ | String | Yes | The username used for authentication. |\n| **Password** | String\
    \ | Yes | The password used for authentication. |\n| **Verify SSL** | Boolean\
    \ | No | Determines whether to verify the SSL certificate of the FireEye HX server.\
    \ Defaults to `False`. |\n\n### Flow Description\n1. **Initialization**: The action\
    \ retrieves the integration's connection settings (API Root, Username, Password,\
    \ and SSL verification status).\n2. **Authentication Test**: It attempts to establish\
    \ a connection by initializing the `FireEyeHXManager`, which triggers a request\
    \ to the `/token` endpoint to obtain an API session token.\n3. **Session Termination**:\
    \ If the token is successfully retrieved, the action immediately calls the `logout`\
    \ method to invalidate the token and close the session, ensuring no orphaned sessions\
    \ are left on the server.\n4. **Execution Result**: \n    * **Success**: If the\
    \ authentication and logout processes complete without error, the action returns\
    \ a success message and a result value of `true`.\n    * **Failure**: If any step\
    \ fails (e.g., due to invalid credentials, network timeout, or SSL errors), the\
    \ action catches the exception, logs the error, and returns a failure status with\
    \ a result value of `false`.\n\n### Additional Notes\nThis action does not process\
    \ any entities and is strictly used for validating the integration setup."
