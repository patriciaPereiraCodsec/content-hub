Get Alerts:
  ai_description: >-
    ### General Description

    The **Get Alerts** action retrieves security alerts from FireEye HX associated
    with specific **Hostname** or **IP Address** entities. This action allows analysts
    to gather historical or recent alert data for investigation, providing granular
    filtering options such as resolution status, alert source, and time-based windows.
    It is primarily used to enrich the context of a case by identifying previous or
    related malicious activity on a specific endpoint.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Limit** | Integer | No | Specifies the maximum number of alerts to return
    for each entity. |

    | **Has Share Mode** | String | No | Filters alerts based on indicator share mode.
    Options: `any`, `restricted`, `unrestricted`. |

    | **Alert Resolution Status** | String | No | Filters alerts by their resolution
    status. Options: `any`, `active_threat`, `alert`, `block`, `partial_block`. |

    | **Alert reported in last x hours** | Integer | No | Filters alerts reported
    within the specified number of hours from the current time. |

    | **Alert Source** | String | No | Filters alerts by source. Options: `any`, `exd`
    (exploit detection), `mal` (malware alert), `ioc` (indicator of compromise). |

    | **Alert ID** | String | No | Retrieves a specific alert by its unique identifier.
    |


    ### Flow Description

    1. **Host Identification**: The action iterates through the target entities. For
    each **Hostname** or **ADDRESS**, it queries FireEye HX to find the corresponding
    agent ID.

    2. **Agent Selection**: If multiple agents match a single entity (e.g., a host
    with multiple IPs or re-imaged systems), the action selects the agent with the
    most recent `last_poll_timestamp` to ensure data accuracy.

    3. **Alert Retrieval**: The action calls the FireEye HX API to fetch alerts for
    the identified agent, applying the user-defined filters (Limit, Share Mode, Resolution,
    Time Range, Source, or specific Alert ID).

    4. **Data Formatting**: Retrieved alerts are processed and formatted into CSV-style
    data for tables.

    5. **Output Generation**: The action attaches a data table for each entity containing
    the alert details and provides a full JSON result for further automated processing.


    ### Additional Notes

    - If no matching agent is found in FireEye HX for a given entity, the action will
    report that the agent was missing and move to the next entity.

    - The action uses ISO-8601 timestamp formatting for time-based queries.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
