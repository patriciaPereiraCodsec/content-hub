Is Contain Malware Alerts:
  ai_description: >-
    ### General Description

    The **Is Contain Malware Alerts** action checks if malware alerts are associated
    with specific **HOSTNAME** or **ADDRESS** (IP) entities within a FireEye HX environment.
    It serves as an enrichment and validation step to determine if a host is currently
    compromised or has active malware detections.


    ### Parameters

    There are no additional parameters for this action. It relies on the integration's
    configuration (API Root, Username, Password, and Verify SSL).


    ### Flow Description

    1. **Initialization**: The action establishes a session with the FireEye HX server
    using the provided credentials and API root.

    2. **Entity Processing**: It iterates through the target entities, specifically
    looking for Hostnames and IP Addresses.

    3. **Host Lookup**:
       - For **HOSTNAME** entities, it queries FireEye HX for matching host records
    using the hostname.
       - For **ADDRESS** entities, it queries FireEye HX for hosts associated with
    that specific IP address.
    4. **Selection Logic**: If multiple host records are returned for a single entity,
    the action automatically selects the record with the most recent `last_poll_timestamp`
    to ensure the most up-to-date data is used.

    5. **Alert Verification**: The action retrieves the host's statistics. If the
    `malware_alerts` count is greater than zero, the entity is marked as **suspicious**
    within Google SecOps.

    6. **Data Update**: The action updates the entities in the case and attaches the
    raw host statistics as JSON results for further investigation.


    ### Additional Notes

    - If no matching host is found in FireEye HX, the action will report that no data
    was found for that specific entity.

    - The action includes a timeout check to ensure it completes within the execution
    deadline.
