name: Update Firewall Rule
description: Update a firewall rule in Cloudflare.
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/cloudflare#update_firewall_rule
integration_identifier: Cloudflare
parameters:
-   name: Rule Name
    default_value: ''
    type: string
    description: Specify the name of the rule that needs to be updated.
    is_mandatory: true
-   name: Zone Name
    default_value: ''
    type: string
    description: Specify the name of the zone, which will contain the firewall rule.
    is_mandatory: true
-   name: Action
    default_value: Block
    type: ddl
    optional_values:
    - Allow
    - Block
    - Bypass
    - Log
    - Legacy CAPTCHA
    - Managed Challenge
    - JS Challenge
    description: Specify the action for the firewall rule. If "Bypass" is selected,
        you need to provide values in the "Products" parameter.
    is_mandatory: false
-   name: Expression
    default_value: ''
    type: string
    description: Specify the expression for the firewall rule.
    is_mandatory: false
-   name: Products
    default_value: ''
    type: string
    description: 'Specify a comma-separated list of products for the firewall rule.
        Note: this parameter is only mandatory, if "Bypass" is selected for "Action"
        parameter. Possible values: zoneLockdown, uaBlock, bic, hot, securityLevel,
        rateLimit, waf.'
    is_mandatory: false
-   name: Priority
    default_value: ''
    type: string
    description: Specify the priority for the firewall rule.
    is_mandatory: false
-   name: Reference Tag
    default_value: ''
    type: string
    description: 'Specify a reference tag for the firewall rule. Note: it can only
        be up to 50 characters long.'
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/update_firewall_rule_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
