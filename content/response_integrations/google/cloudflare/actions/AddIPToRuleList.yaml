name: Add IP To Rule List
description: 'Add IP addresses to the rule list in Cloudflare. Supported Entities:
    IP Address.'
integration_identifier: Cloudflare
parameters:
-   name: Rule Name
    default_value: ''
    type: string
    description: Specify the name of the rule list to which you want to add rule list
        items.
    is_mandatory: true
-   name: Description
    default_value: ''
    type: string
    description: Specify a description for the newly added rule list items.
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/add_ip_to_rule_list_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
