name: Add URL To Rule List
description: 'Add URLs to the rule list in Cloudflare. Supported Entities: URL. Note:
    URL entities are treated as "Source URLs".'
integration_identifier: Cloudflare
parameters:
-   name: Rule Name
    default_value: ''
    type: string
    description: Specify the name of the rule list to which you want to add rule list
        items.
    is_mandatory: true
-   name: Target URL
    default_value: ''
    type: string
    description: Specify the target URL for the rule list item.
    is_mandatory: true
-   name: Description
    default_value: ''
    type: string
    description: Specify a description for the newly added rule list item.
    is_mandatory: false
-   name: Status Code
    default_value: '301'
    type: ddl
    optional_values:
    - '301'
    - '302'
    - '307'
    - '308'
    description: Specify the status for the rule list item.
    is_mandatory: false
-   name: Preserve Query String
    default_value: false
    type: boolean
    description: If enabled, the rule list item will preserve the query string.
    is_mandatory: false
-   name: Include Subdomains
    default_value: false
    type: boolean
    description: If enabled, the rule list item will include subdomains.
    is_mandatory: false
-   name: Subpath Matching
    default_value: false
    type: boolean
    description: If enabled, the rule list item will match the subpath.
    is_mandatory: false
-   name: Preserve Path Suffix
    default_value: false
    type: boolean
    description: If enabled, the rule list item will preserve the path suffix.
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/add_url_to_rule_list_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
simulation_data_json: '{"Entities": ["DestinationURL"]}'
