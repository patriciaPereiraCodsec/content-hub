name: Create Rule List
description: Create a rule list in Cloudflare.
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/cloudflare#create_rule_list
integration_identifier: Cloudflare
parameters:
-   name: Name
    default_value: ''
    type: string
    description: Specify the name for the rule list.
    is_mandatory: true
-   name: Type
    default_value: IP Address
    type: ddl
    optional_values:
    - IP Address
    - Redirect
    description: Specify the type for the rule list.
    is_mandatory: false
-   name: Description
    default_value: ''
    type: string
    description: Specify the description for the rule list.
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/create_rule_list_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
