Create Firewall Rule:
  ai_description: >-
    ### General Description

    Creates a new firewall rule within a specified Cloudflare zone. This action allows
    security teams to programmatically define traffic filtering logic using Cloudflare's
    expression engine. It supports various actions such as Block, Allow, and Bypass,
    and allows for detailed configuration including priority, reference tags, and
    specific product bypasses.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Zone Name** | String | Yes | The name of the Cloudflare zone where the firewall
    rule will be created. |

    | **Name** | String | No | A descriptive name for the firewall rule. |

    | **Action** | Enum | No | The action to perform when the expression matches.
    Options include: `Allow`, `Block`, `Bypass`, `Log`, `Legacy CAPTCHA`, `Managed
    Challenge`, `JS Challenge`. Default is `Block`. |

    | **Expression** | String | Yes | The Cloudflare filter expression that defines
    the traffic matching criteria (e.g., `ip.src eq 1.1.1.1`). |

    | **Products** | String | No | A comma-separated list of products to bypass. **Mandatory**
    if the `Action` is set to `Bypass`. Possible values: `zoneLockdown`, `uaBlock`,
    `bic`, `hot`, `securityLevel`, `rateLimit`, `waf`. |

    | **Priority** | Integer | No | The priority of the rule. Lower numbers have higher
    priority. Must be a positive integer. |

    | **Reference Tag** | String | No | A reference tag for the rule, limited to 50
    characters. |


    ### Additional Notes

    - If the **Action** is set to `Bypass`, the **Products** parameter must be populated
    with at least one valid product.

    - The **Reference Tag** has a strict limit of 50 characters; exceeding this will
    cause the action to fail.

    - The action first resolves the **Zone Name** to a Zone ID before attempting to
    create the rule.


    ### Flow Description

    1. **Parameter Initialization**: Extracts and validates input parameters, including
    checking the character limit for the Reference Tag and ensuring Priority is a
    positive integer.

    2. **Zone Resolution**: Communicates with Cloudflare to find the unique Zone ID
    associated with the provided Zone Name.

    3. **Validation**: If the action is 'Bypass', it verifies that the 'Products'
    parameter is not empty and contains valid Cloudflare product identifiers.

    4. **Rule Creation**: Sends a POST request to the Cloudflare API to create the
    firewall rule with the specified configuration.

    5. **Result Processing**: Captures the API response, converts the created rule
    data into JSON format, and reports success to the Google SecOps platform.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
