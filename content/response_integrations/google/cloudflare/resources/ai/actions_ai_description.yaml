Update Firewall Rule:
  ai_description: >-
    ### General Description

    Updates an existing firewall rule and its associated filter in a specific Cloudflare
    zone. This action allows for modifying the rule's action, expression, priority,
    and other metadata. It is useful for dynamically adjusting security policies based
    on observed threats or changing requirements.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Rule Name | String | Yes | The name (description) of the firewall rule to be
    updated. |

    | Zone Name | String | Yes | The name of the Cloudflare zone where the firewall
    rule is located. |

    | Action | Enum | No | The action to be taken by the rule (e.g., Block, Allow,
    Bypass). Default is 'Block'. |

    | Expression | String | No | The filter expression that defines the traffic matching
    criteria for the rule. |

    | Products | String | No | A comma-separated list of Cloudflare products to bypass.
    **Mandatory** if the 'Action' is set to 'Bypass'. |

    | Priority | Integer | No | The priority level for the rule. Must be a positive
    number. |

    | Reference Tag | String | No | A custom reference tag for the rule (maximum 50
    characters). |


    ### Additional Notes

    - If the 'Action' parameter is set to 'Bypass', the 'Products' parameter must
    be populated with valid Cloudflare product names (e.g., 'waf', 'rateLimit').

    - The 'Reference Tag' has a strict limit of 50 characters.

    - The action first resolves the Zone Name to a Zone ID and then searches for the
    rule by its name within that zone.


    ### Flow Description

    1. **Initialization**: Retrieve API credentials and action parameters from the
    environment and user input.

    2. **Zone Resolution**: Call the Cloudflare API to find the unique Zone ID associated
    with the provided 'Zone Name'.

    3. **Rule Identification**: Search for the existing firewall rule within the identified
    zone using the 'Rule Name'.

    4. **Validation**: Verify that the 'Products' parameter is provided if 'Bypass'
    is selected, and ensure 'Priority' and 'Reference Tag' meet length and value constraints.

    5. **Update Rule**: Send a PUT request to Cloudflare to update the firewall rule's
    properties (action, priority, products, etc.).

    6. **Update Filter**: If a new 'Expression' is provided, send a separate PUT request
    to update the rule's underlying filter.

    7. **Finalization**: Retrieve the updated rule configuration and return it as
    a JSON result.
