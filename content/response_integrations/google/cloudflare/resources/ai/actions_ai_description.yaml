Create Rule List:
  ai_description: >-
    ### General Description

    Creates a new rule list in a Cloudflare account. Rule lists are used to manage
    groups of items, such as IP addresses or redirect configurations, which can then
    be referenced in various Cloudflare security and traffic rules. This action allows
    for the programmatic creation of these containers.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Name | String | Yes | Specify the unique name for the rule list to be created.
    |

    | Type | Enum | No | Specify the type of the rule list. Supported values are 'IP
    Address' (maps to 'ip') and 'Redirect' (maps to 'redirect'). Defaults to 'IP Address'.
    |

    | Description | String | No | Provide a brief summary or note describing the purpose
    of the rule list. |


    ### Additional Notes

    This action does not operate on entities. It is a management action that interacts
    directly with the Cloudflare account configuration. The account ID is automatically
    resolved using the 'Account Name' provided in the integration configuration.


    ### Flow Description

    1. **Initialization**: The action initializes the Cloudflare manager using the
    API Root, Token, and Account Name from the configuration.

    2. **Parameter Mapping**: It maps the user-selected 'Type' (e.g., 'IP Address')
    to the corresponding Cloudflare API 'kind' (e.g., 'ip').

    3. **API Request**: Sends a POST request to the Cloudflare Rules Lists endpoint
    (`/rules/lists`) with the provided name, kind, and description.

    4. **Result Processing**: Upon success, the action parses the API response into
    a Rule List data model and attaches the raw JSON result to the action output.
