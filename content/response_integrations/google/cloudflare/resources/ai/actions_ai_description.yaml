Add URL To Rule List:
  ai_description: >-
    ### General Description


    The **Add URL To Rule List** action adds URL entities to a specified Cloudflare
    Rule List of the 'redirect' type. This action treats the URL entity as the 'Source
    URL' and configures a redirect to a user-defined 'Target URL'. It allows for granular
    control over the redirect behavior, including HTTP status codes and path/query
    preservation settings.


    ### Parameters Description


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Rule Name** | String | Yes | The name of the existing Cloudflare rule list
    where the items will be added. |

    | **Target URL** | String | Yes | The destination URL to which the source URL
    (the entity) will be redirected. |

    | **Description** | String | No | A comment or description for the new rule list
    item. |

    | **Status Code** | String | No | The HTTP redirect status code (301, 302, 307,
    308). Default is 301. |

    | **Preserve Query String** | Boolean | No | If enabled, the query string from
    the source URL is preserved in the redirect. |

    | **Include Subdomains** | Boolean | No | If enabled, the rule applies to subdomains
    of the source URL. |

    | **Subpath Matching** | Boolean | No | If enabled, the rule matches subpaths
    of the source URL. |

    | **Preserve Path Suffix** | Boolean | No | If enabled, the path suffix is preserved.
    **Note:** Requires 'Subpath Matching' to be enabled. |


    ### Additional Notes


    - This action only supports Rule Lists of the **Redirect** kind.

    - **Dependency:** If 'Preserve Path Suffix' is enabled, 'Subpath Matching' must
    also be enabled for the action to execute successfully.


    ### Flow Description


    1. **Initialization:** The action extracts Cloudflare connection details and action
    parameters.

    2. **Validation:** It verifies that if 'Preserve Path Suffix' is enabled, 'Subpath
    Matching' is also enabled.

    3. **List Retrieval:** It fetches the specified Rule List from Cloudflare by name
    and validates that its type is 'redirect'.

    4. **Entity Processing:** For each URL entity in the scope, it constructs a redirect
    payload using the entity identifier as the source URL and the provided 'Target
    URL' as the destination.

    5. **Execution:** It sends a POST request to Cloudflare's API to add the item
    to the list.

    6. **Completion:** The action reports success or failure for each entity processed.
  capabilities:
    can_create_case_comments: false
