Ping:
  ai_description: >-
    ### General Description

    The **Ping** action is a diagnostic utility used to verify the connectivity between
    Google SecOps and the Cloudflare API. It validates the integration's configuration
    parameters, ensuring that the API token, account name, and root URL are correct
    and that the network path is open.


    ### Parameters Description

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | API Root | String | Yes | The base URL for the Cloudflare API (e.g., https://api.cloudflare.com).
    |

    | API Token | String | Yes | The Bearer token used for authentication with the
    Cloudflare API. |

    | Account Name | String | Yes | The name of the Cloudflare account to verify access
    for. |

    | Verify SSL | Boolean | Yes | Determines whether to validate the SSL certificate
    of the Cloudflare API server. |


    ### Additional Notes

    This action does not operate on entities and is primarily used for configuration
    validation within the Marketplace tab. It uses the `/client/v4/accounts` endpoint
    to confirm that the provided account name is accessible with the given token.


    ### Flow Description

    1. **Parameter Extraction**: The action retrieves the global integration configuration
    parameters (API Root, API Token, Account Name, and Verify SSL).

    2. **Manager Initialization**: It initializes the `CloudflareManager` with the
    connection details.

    3. **Connectivity Test**: The manager executes a GET request to the Cloudflare
    accounts endpoint, filtering by the provided `account_name`.

    4. **Response Validation**: The action checks the HTTP response status and parses
    the result to ensure the account exists and is reachable.

    5. **Execution Outcome**: If the API call is successful and the account is found,
    the action completes with a success status. Otherwise, it catches the exception
    and reports a failure with the specific error message.
