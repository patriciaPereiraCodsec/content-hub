List Firewall Rules:
  ai_description: >-
    ### General Description

    Lists available firewall rules for a specific zone in Cloudflare. This action
    allows users to retrieve a list of rules, optionally filtered by specific criteria
    such as rule ID, name (description), or action (e.g., block, allow). It supports
    pagination and allows limiting the number of returned records.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Zone Name** | String | Yes | The name of the Cloudflare zone from which to
    retrieve firewall rules. |

    | **Filter Key** | String | No | The field used to filter the results. Options
    include: `ID`, `Name` (maps to description), and `Action`. |

    | **Filter Logic** | String | No | The logic applied to the filter. Options include:
    `Equal` (exact match) and `Contains` (substring match). |

    | **Filter Value** | String | No | The value to search for based on the selected
    `Filter Key` and `Filter Logic`. If left empty, filtering is not applied. |

    | **Max Records To Return** | Integer | No | The maximum number of firewall rules
    to return. Defaults to 50. |


    ### Additional Notes

    - If a **Filter Logic** is selected, a **Filter Key** must also be provided.

    - If **Filter Value** is empty, the action will return all rules up to the specified
    limit without applying the filter.

    - This action does not operate on specific entities; it queries the Cloudflare
    environment based on the provided zone name.


    ### Flow Description

    1. **Initialization**: Extracts integration configuration (API Token, Account
    Name, etc.) and action parameters.

    2. **Zone Retrieval**: Calls the Cloudflare API to find the unique `zone_id` associated
    with the provided **Zone Name**.

    3. **Data Fetching**: Requests firewall rules for the identified zone, handling
    pagination automatically to ensure the requested number of records is retrieved.

    4. **Filtering**: Applies client-side filtering logic (Equal or Contains) if the
    user provided a filter key and value.

    5. **Output**: Formats the resulting rules into a data table named "Available
    Rules" and attaches the raw JSON data to the action result.
