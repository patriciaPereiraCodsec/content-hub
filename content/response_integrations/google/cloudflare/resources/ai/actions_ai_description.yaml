Add IP To Rule List:
  ai_description: >-
    ### General Description

    This action adds IP address entities to a specific rule list within a Cloudflare
    account. It is primarily used for managing IP-based access control or firewall
    rules by dynamically updating Cloudflare's rule lists with detected indicators
    from Google SecOps.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Rule Name | String | Yes | The exact name of the rule list in Cloudflare where
    the IP addresses should be added. The action will verify that this list is of
    type 'ip'. |

    | Description | String | No | An optional comment or description to be associated
    with the newly added IP addresses in the Cloudflare rule list. |


    ### Additional Notes

    - The action specifically targets entities of type **ADDRESS** (IP addresses).

    - It requires a valid Cloudflare API Token and Account Name to be configured in
    the integration settings.

    - The action will fail if the specified 'Rule Name' does not exist or if the list
    type is not 'ip'.


    ### Flow Description

    1. **Initialization**: The action retrieves configuration parameters (API credentials)
    and action parameters (Rule Name and Description).

    2. **Entity Filtering**: It identifies all IP Address entities within the current
    context.

    3. **Rule List Retrieval**: It queries the Cloudflare API to find the ID and metadata
    of the rule list matching the provided 'Rule Name'.

    4. **Validation**: It checks if the retrieved rule list is of the correct 'ip'
    kind. If not, the action terminates with an error.

    5. **Mutation**: For each valid IP entity, it sends a POST request to Cloudflare
    to add the IP address and the optional description to the specified rule list.

    6. **Result Reporting**: It collects the API responses, updates the action results
    with JSON data for each processed entity, and provides a summary message of successful
    and failed additions.
  capabilities:
