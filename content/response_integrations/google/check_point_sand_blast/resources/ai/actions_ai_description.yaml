Ping:
  ai_description: "### General Description\nThe **Ping** action is designed to verify\
    \ the connectivity between Google SecOps and the Check Point SandBlast server.\
    \ It ensures that the provided API Root and API Key are valid and that the network\
    \ connection is functional by performing a test query against the SandBlast API.\n\
    \n### Parameters Description\n\n| Parameter | Type | Mandatory | Description |\n\
    | :--- | :--- | :--- | :--- |\n| API Root | String | Yes | The base URL for the\
    \ Check Point SandBlast API. |\n| API Key | String | Yes | The API key used for\
    \ authentication with the SandBlast service. |\n| Verify SSL | Boolean | No |\
    \ If set to true, the action will verify the SSL certificate of the SandBlast\
    \ server. Defaults to False. |\n\n### Flow Description\n1. **Initialization**:\
    \ The action initializes the Siemplify context and logs the start of the process.\n\
    2. **Configuration Extraction**: It retrieves the mandatory `API Root` and `API\
    \ Key`, along with the optional `Verify SSL` setting from the integration configuration.\n\
    3. **Connectivity Test**: The action uses the `SandBlastManager` to call the `test_connectivity`\
    \ method. This method executes a hardcoded hash query (`8dfa1440953c3d93daafeae4a5daa326`)\
    \ to the `/query` endpoint of the SandBlast API.\n4. **Result Handling**: \n \
    \   * If the API call is successful, the action returns a success message and\
    \ sets the result value to `true`.\n    * If an exception occurs (e.g., authentication\
    \ failure, network timeout), the action logs the error and returns a failure message\
    \ with the result value set to `false`.\n\n### Additional Notes\n* This action\
    \ does not process any entities from the case; it is strictly for system-level\
    \ connectivity testing.\n* As per standard SOAR practices, Ping actions are used\
    \ during the initial setup or troubleshooting of an integration."
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
  categories:
    enrichment: false
  entity_usage:
    entity_types: []
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: false
    filters_by_identifier: false
    filters_by_is_artifact: false
    filters_by_is_enriched: false
