Get Reputations:
  ai_description: >-
    ### General Description

    The **Get Reputations** action retrieves threat intelligence and reputation data
    for specific entities from the Facebook ThreatExchange platform. It supports File
    Hashes, Hostnames, IP Addresses, and URLs. The action queries the ThreatExchange
    API to find matching threat descriptors or malware analyses, providing context
    on the reputation, status, and severity of the indicators.


    ### Parameters

    There are no user-configurable parameters for this action. It relies on the integration's
    global configuration (API Root, App ID, App Secret) and the entities present in
    the current context.


    ### Flow Description

    1. **Initialization**: The action establishes a connection to the ThreatExchange
    API using the provided credentials and configuration.

    2. **Entity Processing**: It iterates through all supported entities in the scope
    (File Hash, Hostname, IP Address, and URL).

    3. **Data Retrieval**: For each entity, it calls the specific ThreatExchange API
    endpoint (e.g., `/malware_analyses` for hashes or `/threat_descriptors` for others)
    to fetch reputation data.

    4. **Data Attachment**: If reputations are found, the raw data is flattened and
    attached to the entity as a CSV table for analyst review.

    5. **Risk Assessment**: The action checks the 'status' and 'severity' fields of
    the retrieved data. If the status is 'SUSPICIOUS' or 'MALICIOUS', or if the severity
    is 'SUSPICIOUS', 'SEVERE', or 'APOCALYPSE', the entity is marked as suspicious
    within Google SecOps.

    6. **Internal Update**: Finally, the action updates the entities in the case to
    reflect the new suspicious status and enrichment data.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates the 'is_suspicious' attribute of entities and attaches reputation data
      tables to them based on the results from ThreatExchange.
  categories:
    enrichment: true
  entity_usage:
    entity_types:
    - HOSTNAME
    - DestinationURL
    - FILEHASH
    - ADDRESS
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: true
    filters_by_identifier: false
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: false
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
Ping:
  ai_description: >-
    ### General Description

    The **Ping** action is designed to verify the connectivity between Google SecOps
    and the ThreatExchange platform. It ensures that the provided configuration parameters,
    such as the API Root, App ID, and App Secret, are valid and that the system can
    successfully communicate with the ThreatExchange API.


    ### Parameters Description

    There are no parameters for this action.


    ### Additional Notes

    This action is typically used during the initial setup of the integration or for
    troubleshooting connection issues. It performs a read-only operation (a file reputation
    lookup for a hardcoded test hash) to validate the API credentials.


    ### Flow Description

    1. **Configuration Retrieval**: The action fetches the integration configuration,
    including the API Root, App ID, App Secret, and SSL settings.

    2. **Manager Initialization**: It initializes the `ThreatExchangeManager` with
    the retrieved settings.

    3. **Connectivity Test**: The action calls the `test_connectivity` method, which
    executes a `GET` request to the `/malware_analyses` endpoint using a predefined
    test hash.

    4. **Result Handling**: If the API call is successful and no exceptions are raised,
    the action concludes with a success message indicating a successful connection.
