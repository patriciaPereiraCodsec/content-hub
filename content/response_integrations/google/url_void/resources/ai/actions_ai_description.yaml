Get domain reputation:
  ai_description: "Enriches Hostname and URL entities by checking their reputation\
    \ against multiple blacklist services via URLVoid. This action retrieves comprehensive\
    \ threat intelligence, including detection rates from various engines, server\
    \ location, and Alexa ranking data.\n\n### Parameters\n| Parameter | Type | Mandatory\
    \ | Description |\n| :--- | :--- | :--- | :--- |\n| Threshold | Integer | Yes\
    \ | The minimum number of blacklist detections required to mark an entity as suspicious\
    \ in Google SecOps. Defaults to 0. |\n\n### Flow Description\n1. **Entity Identification**:\
    \ The action identifies Hostname and URL entities within the current context.\n\
    2. **Domain Extraction**: For URL entities, the domain is extracted; for Hostname\
    \ entities, the identifier is used directly.\n3. **Reputation Retrieval**: Queries\
    \ the URLVoid API to fetch the reputation report for each identified domain.\n\
    4. **Data Processing**: Parses the raw API response to extract blacklist engine\
    \ details, server information (IP, ISP, Country), and detection counts.\n5. **Internal\
    \ Enrichment**: \n    * Adds a data table to the entity containing the specific\
    \ blacklist engines that flagged the domain.\n    * Creates an entity insight\
    \ displaying the domain's country code.\n    * Updates the entity's additional\
    \ properties with flattened URLVoid data.\n6. **Risk Assessment**: Compares the\
    \ number of detections against the user-defined `Threshold`. If the count is higher,\
    \ the entity is marked as suspicious.\n7. **Entity Update**: Updates the entities\
    \ in Google SecOps with the new enrichment data and status."
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entity attributes with reputation data, sets the 'is_suspicious' flag
      based on the provided threshold, and adds insights and data tables to the entity.
  categories:
    enrichment: true
  entity_usage:
    entity_types:
    - HOSTNAME
    - DestinationURL
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: true
    filters_by_identifier: false
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: false
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
Ping:
  ai_description: >-
    ### General Description

    Tests the connectivity to the URLVoid API to ensure that the integration can successfully
    communicate with the service. This action validates the provided API key and network
    configuration by making a request to the URLVoid statistics endpoint.


    ### Parameters Description

    There are no parameters for this action.


    ### Additional Notes

    This action is primarily used for troubleshooting and verifying the integration
    setup. It does not process any entities or modify any data.


    ### Flow Description

    1. **Configuration Retrieval**: The action retrieves the API URL, API Key, and
    SSL verification settings from the integration configuration.

    2. **Manager Initialization**: Initializes the URLVoid manager with the retrieved
    settings.

    3. **Connectivity Test**: Executes a GET request to the URLVoid 'pay-as-you-go'
    statistics endpoint.

    4. **Response Validation**: Validates the API response to ensure the connection
    is successful and the API key is valid.

    5. **Completion**: Returns a success message and the connectivity status to the
    SOAR platform.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
  categories:
    enrichment: false
  entity_usage:
    entity_types: []
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
