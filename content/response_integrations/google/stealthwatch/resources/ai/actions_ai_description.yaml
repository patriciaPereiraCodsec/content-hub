Ping:
  ai_description: "### General Description\nThe **Ping** action is a diagnostic utility\
    \ designed to verify the connection between Google SecOps and a Cisco Stealthwatch\
    \ (SMC) instance. Its primary purpose is to validate that the integration's configuration\
    \ parameters\u2014such as the API Root, Username, and Password\u2014are correct\
    \ and that the Stealthwatch server is reachable.\n\n### Parameters Description\n\
    There are no parameters for this action.\n\n### Additional Notes\n- This action\
    \ is a standard connectivity test and does not process any security entities or\
    \ alert data.\n- It relies on the integration's global configuration settings\
    \ to perform the check.\n\n### Flow Description\n1. **Configuration Retrieval**:\
    \ The action retrieves the 'Api Root', 'Username', 'Password', and 'Verify SSL'\
    \ settings from the Stealthwatch integration configuration.\n2. **Authentication**:\
    \ It initializes the `StealthwatchManager`, which attempts to authenticate with\
    \ the Stealthwatch server via a POST request to the `/token/v2/authenticate` endpoint\
    \ to retrieve a session cookie.\n3. **Connectivity Verification**: The manager\
    \ executes the `test_connectivity` method, which performs a GET request to the\
    \ `/smc/rest/product/info` endpoint using the session cookie.\n4. **Final Status**:\
    \ If the API call returns a successful response, the action ends with a 'Connected\
    \ Successfully' message and a boolean `True` result."
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
  categories:
