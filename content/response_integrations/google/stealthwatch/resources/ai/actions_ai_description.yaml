Search Flows:
  ai_description: "### General Description\nThe **Search Flows** action retrieves\
    \ network flow data from Cisco Stealthwatch for specific IP address entities.\
    \ It allows security analysts to investigate inbound and outbound network traffic\
    \ associated with an IP within a defined time window, helping to identify suspicious\
    \ connections, lateral movement, or data exfiltration.\n\n### Parameters\n| Parameter\
    \ | Type | Mandatory | Description |\n| :--- | :--- | :--- | :--- |\n| **Timeframe**\
    \ | Integer | Yes | The lookback period in hours (e.g., 3) from the current time\
    \ to search for flows. |\n| **Limit** | Integer | Yes | The maximum number of\
    \ flow records to retrieve for each entity. |\n\n### Flow Description\n1. **Authentication**:\
    \ The action initializes the Stealthwatch manager and authenticates with the Stealthwatch\
    \ Management Console (SMC) API using the provided credentials.\n2. **Time Window\
    \ Setup**: It calculates the start and end timestamps for the search based on\
    \ the provided `Timeframe` parameter and the current UTC time.\n3. **Domain Identification**:\
    \ For each IP address entity in the scope, the action queries Stealthwatch to\
    \ find the corresponding Domain ID that owns the host.\n4. **Flow Querying**:\
    \ It executes two separate asynchronous searches for each IP: one where the IP\
    \ is the source and one where it is the destination. \n5. **Job Management**:\
    \ The action polls the Stealthwatch search jobs until they reach 100% completion.\n\
    6. **Data Processing and Enrichment**: \n    - Raw flow data is attached as JSON\
    \ to the action results for each entity.\n    - A filtered, human-readable version\
    \ of the flow data (including timestamps, duration, source/destination details,\
    \ and transfer bytes) is formatted into a CSV table and attached to the entity.\n\
    7. **Final Reporting**: The action provides a summary message listing all entities\
    \ for which flows were successfully found."
