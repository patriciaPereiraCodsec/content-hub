Search Events:
  ai_description: >-
    ### General Description

    Retrieves security events from Cisco Stealthwatch for specific IP address entities
    within a specified lookback window. This action helps analysts understand the
    security context of an IP by correlating it with Stealthwatch domains, alerts,
    and detailed event logs. The results are provided as raw JSON and formatted CSV
    tables.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Timeframe | Integer | Yes | The number of hours (relative to the current time)
    to search for security events. |


    ### Additional Notes

    - The action requires valid Stealthwatch credentials (API Root, Username, and
    Password) configured in the integration settings.

    - It automatically identifies the correct Stealthwatch Domain ID for each IP address
    before performing the search.


    ### Flow Description

    1. **Authentication**: Connects to the Stealthwatch API using the provided credentials
    to obtain a session token.

    2. **Time Calculation**: Determines the start and end timestamps based on the
    `Timeframe` parameter and the current UTC time.

    3. **Domain Identification**: For each IP address entity, the action queries Stealthwatch
    to find the associated Domain ID.

    4. **Alert Search**: Queries for alerts related to the IP address within the specified
    timeframe for the identified domain.

    5. **Event Retrieval**: For every alert found, the action performs a secondary
    search to retrieve the granular security event details.

    6. **Data Formatting**: Filters the raw event data and constructs CSV-formatted
    tables for better readability.

    7. **Output**: Attaches the raw JSON data and the formatted CSV tables to the
    case for each processed entity.
