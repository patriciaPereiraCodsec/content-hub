name: Logpoint - Incidents Connector
parameters:
-   name: DeviceProductField
    default_value: Product Name
    type: string
    description: Enter the source field name in order to retrieve the Product Field
        name.
    is_mandatory: true
    is_advanced: false
    mode: regular
-   name: EventClassId
    default_value: type
    type: string
    description: Enter the source field name in order to retrieve the Event Field
        name.
    is_mandatory: true
    is_advanced: false
    mode: regular
-   name: Environment Field Name
    default_value: ''
    type: string
    description: Describes the name of the field where the environment name is stored.
        If the environment field isn't found, the environment is the default environment.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Environment Regex Pattern
    default_value: .*
    type: string
    description: A regex pattern to run on the value found in the "Environment Field
        Name" field. Default is .* to catch all and return the value unchanged. Used
        to allow the user to manipulate the environment field via regex logic. If
        the regex pattern is null or empty, or the environment value is null, the
        final environment result is the default environment.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: PythonProcessTimeout
    default_value: 180
    type: integer
    description: Timeout limit for the python process running the current script.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: IP Address
    default_value: http://x.x.x.x/
    type: string
    description: IP address of the LogPoint instance.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Username
    default_value: ''
    type: string
    description: Username of the LogPoint account
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Secret
    default_value: ''
    type: password
    description: Secret of the Logpoint account
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: CA Certificate File
    default_value: ''
    type: string
    description: Base 64 encoded CA certificate file.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Verify SSL
    default_value: false
    type: boolean
    description: If enabled, verify the SSL certificate for the connection to the
        LogPoint server is valid.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Max Hours Backwards
    default_value: 1
    type: integer
    description: Number of hours before the first connector iteration to retrieve
        incidents from. This parameter applies to the initial connector iteration
        after you enable the connector for the first time, or used as a fallback value
        in cases where connector's last run timestamp expires.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Lowest Risk To Fetch
    default_value: ''
    type: string
    description: 'Lowest risk of the incidents to fetch. Possible values: Critical,
        High, Medium, Low.'
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Max Incidents To Fetch
    default_value: 10
    type: integer
    description: How many incidents to process per one connector iteration.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Use whitelist as a blacklist
    default_value: false
    type: boolean
    description: If enabled, whitelist will be used as a blacklist
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: User Filter
    default_value: ''
    type: string
    description: A comma-separated list of usernames that will be used to filter out
        incidents. Only incidents created by the valid users will be ingested. If
        nothing is provided, this filter is not applied and connector ingests incidents
        from all users.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Proxy Server Address
    default_value: ''
    type: string
    description: The address of the proxy server to use.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Proxy Username
    default_value: ''
    type: string
    description: The proxy username to authenticate with.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Proxy Password
    default_value: ''
    type: password
    description: The proxy password to authenticate with.
    is_mandatory: false
    is_advanced: false
    mode: script
description: Pull incidents from Logpoint
integration: LogPoint
documentation_link: null
rules: []
is_connector_rules_supported: false
creator: admin
