Ping:
  ai_description: >-
    ### General Description\n\nThe **Ping** action is used to verify the connectivity
    between Google SecOps and the LogPoint server. It ensures that the provided configuration
    parameters, such as the IP address and credentials, are correct and that the LogPoint
    API is reachable.\n\n### Parameters Description\n\n| Parameter | Type | Mandatory
    | Description |\n| :--- | :--- | :--- | :--- |\n| **IP Address** | String | Yes
    | The IP address or hostname of the LogPoint server. |\n| **Username** | String
    | Yes | The username used for authentication with the LogPoint server. |\n| **Secret**
    | String | Yes | The secret key used for authentication with the LogPoint server.
    |\n| **CA Certificate File** | String | No | A base64 encoded CA certificate file
    used for SSL verification. |\n| **Verify SSL** | Boolean | Yes | If set to true,
    the action will verify the SSL certificate of the LogPoint server. Default is
    true. |\n\n### Flow Description\n\n1. **Parameter Extraction**: The action retrieves
    the connection details (IP, Username, Secret, SSL settings) from the integration
    configuration.\n2. **Manager Initialization**: A `LogPointManager` instance is
    created using the provided credentials and connection settings.\n3. **Connectivity
    Test**: The action calls the `test_connectivity` method, which sends a POST request
    to the LogPoint `/getalloweddata` endpoint.\n4. **Result Handling**: If the request
    is successful and the API returns a valid response, the action completes successfully.
    If an error occurs (e.g., authentication failure, network timeout), the action
    fails and provides an error message.\n\n### Additional Notes\n\n- This action
    does not process any entities.\n- It is primarily used for troubleshooting and
    initial setup verification.
