Execute Entity Query:
  ai_description: >-
    ### General Description

    Executes a search query in LogPoint, dynamically filtered by the entities present
    in the Google SecOps case. This action allows for complex investigations by automatically
    building a LogPoint query that targets specific IP addresses, hostnames, users,
    URLs, and file hashes found in the alert context.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Query | String | Yes | The base LogPoint query to append to the entity filters.
    |

    | Time Frame | Enum | Yes | The time range for the search. Options: Last Hour,
    Last 12 Hours, Last 24 Hours, Last 30 Days, Last 365 Days, Custom. |

    | Start Time | String | No | Start time for 'Custom' time frame (Format: YYYY-MM-DDThh:mm:ssZ
    or timestamp). |

    | End Time | String | No | End time for 'Custom' time frame. Defaults to current
    time if not provided. |

    | Repos | String | No | Comma-separated list of LogPoint repository names to search.
    If empty, searches all repos. |

    | IP Entity Key | String | No | LogPoint field name used to filter IP Address
    entities. |

    | Hostname Entity Key | String | No | LogPoint field name used to filter Hostname
    entities. |

    | File Hash Entity Key | String | No | LogPoint field name used to filter File
    Hash entities. |

    | User Entity Key | String | No | LogPoint field name used to filter User entities.
    |

    | URL Entity Key | String | No | LogPoint field name used to filter URL entities.
    |

    | Email Address Entity Key | String | No | LogPoint field name used to filter
    Email Address entities (Users matching email format). |

    | Stop if Not Enough Entities | Boolean | Yes | If enabled, the action fails if
    any specified entity key has no corresponding entities in the current scope. |

    | Cross Entity Operator | Enum | Yes | Logical operator (OR/AND) used to join
    filters between different entity types. |

    | Max Results To Return | Integer | No | Maximum number of log entries to retrieve
    (default 100). |


    ### Additional Notes

    - **Requirement:** At least one "Entity Key" parameter must be configured for
    the action to execute.

    - **Entity Mapping:** User entities are automatically checked against an email
    regex; if they match, the "Email Address Entity Key" is used instead of the "User
    Entity Key".

    - **Asynchronous Execution:** This action initiates a search job and polls LogPoint
    for results. It may take multiple playbook iterations to complete depending on
    the query complexity.


    ### Flow Description

    1. **Initialization:** Validates LogPoint connectivity and parses time frame/repository
    parameters.

    2. **Entity Scoping:** Identifies all supported entities (IP, Host, User, URL,
    Hash) in the case and maps them to the provided LogPoint keys.

    3. **Validation:** If "Stop if Not Enough Entities" is True, ensures every provided
    key has at least one matching entity.

    4. **Query Construction:** Builds a composite query string. For each entity type,
    it creates an OR-joined group of identifiers (e.g., `("ip"="1.1.1.1" OR "ip"="2.2.2.2")`).
    These groups are then joined by the "Cross Entity Operator" and appended to the
    user-provided "Query".

    5. **Job Submission:** Submits the search request to LogPoint and stores the Search
    ID.

    6. **Polling:** In subsequent runs, checks the status of the Search ID.

    7. **Completion:** Once the job is finished, retrieves the logs and outputs them
    as a Data Table and JSON result.
  capabilities:
    can_create_case_comments: false
