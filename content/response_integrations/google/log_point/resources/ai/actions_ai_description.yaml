Update Incident Status:
  ai_description: "### General Description\nThe **Update Incident Status** action\
    \ allows users to programmatically change the status of a specific incident within\
    \ the LogPoint SIEM. It supports transitioning incidents to either a 'Resolved'\
    \ or 'Closed' state. This action is typically used in automated playbooks to synchronize\
    \ the status of a LogPoint incident with the resolution of a case in Google SecOps.\n\
    \n### Parameters Description\n| Parameter | Type | Mandatory | Description |\n\
    | :--- | :--- | :--- | :--- |\n| **Incident ID** | String | Yes | The unique identifier\
    \ of the incident in LogPoint that needs to be updated. |\n| **Action** | Dropdown\
    \ | Yes | The target status for the incident. Options are **Close** or **Resolve**.\
    \ If 'Close' is selected, the action will attempt to both resolve and close the\
    \ incident. |\n\n### Additional Notes\n- This action does not operate on entities;\
    \ it requires a specific Incident ID provided as a parameter.\n- If the 'Close'\
    \ action is selected, the logic internally attempts to call the 'Resolve' endpoint\
    \ before the 'Close' endpoint to ensure a valid state transition in LogPoint.\n\
    \n### Flow Description\n1. **Initialization**: The action extracts integration\
    \ configuration (IP, credentials) and action parameters (Incident ID, Action).\n\
    2. **Connectivity Check**: It initializes the LogPoint Manager and verifies connectivity\
    \ to the LogPoint API.\n3. **Status Update**: \n    - If the action is **Close**,\
    \ it first attempts to resolve the incident and then proceeds to close it.\n \
    \   - If the action is **Resolve**, it only attempts to resolve the incident.\n\
    4. **Completion**: The action reports whether the status update was successful\
    \ in the external system and provides a status message."
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Updates the status of an incident in the LogPoint SIEM to either 'Resolved'
      or 'Closed' via API POST requests.
    fetches_data: false
    internal_data_mutation_explanation: null
