List Repos:
  ai_description: >-
    ### General Description

    Lists available repositories (repos) from a LogPoint instance. This action is
    primarily used for discovery and configuration verification, allowing users to
    see which data repositories are accessible with the provided credentials.


    ### Parameters

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Max Repos To Return | Integer | No | Specifies the maximum number of repositories
    to retrieve and display. Default is 100. Must be an integer greater than or equal
    to 1. |


    ### Flow Description

    1. **Initialization**: The action initializes the LogPoint manager using the provided
    integration configuration (IP Address, Username, Secret, and SSL settings).

    2. **Validation**: It validates the `Max Repos To Return` parameter to ensure
    it meets the minimum requirement.

    3. **API Request**: It sends a POST request to the LogPoint `/getalloweddata`
    endpoint with the type set to `logpoint_repos` to fetch the list of authorized
    repositories.

    4. **Data Processing**: The retrieved repository data is parsed into structured
    objects containing the repository name and its address.

    5. **Output**: The results are formatted into a JSON object and a data table titled
    'Available Repos' for display within the Google SecOps interface.


    ### Additional Notes

    This action does not require or process any entities. It is a global utility action
    for the LogPoint integration.
