Execute Query:
  ai_description: >-
    ### General Description

    Executes a search query in LogPoint to retrieve log data based on specified criteria.
    This action is designed to perform broad searches across one or multiple repositories
    within a defined time range. It supports both predefined time frames (e.g., Last
    24 Hours) and custom time ranges, providing flexibility for incident investigation
    and threat hunting.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Query | String | Yes | The specific search query to be executed in LogPoint.
    |

    | Time Frame | Dropdown | Yes | The time range for the search. Options include
    'Last Hour', 'Last 12 Hours', 'Last 24 Hours', 'Last 30 Days', 'Last 365 Days',
    or 'Custom'. |

    | Start Time | String | No | The starting point for the search. **Mandatory**
    if 'Time Frame' is set to 'Custom'. Supports ISO 8601 format (YYYY-MM-DDThh:mm:ssZ)
    or unix timestamps. |

    | End Time | String | No | The ending point for the search. Used if 'Time Frame'
    is set to 'Custom'. If omitted, the current time is used. |

    | Repos | String | No | A comma-separated list of repository names to restrict
    the search. If empty, all repositories are searched. |

    | Max Results To Return | String | No | The maximum number of log entries to retrieve.
    Default is 100. |


    ### Additional Notes

    - This is an asynchronous action that polls LogPoint until the search job is completed.

    - If specific repositories are provided, the action validates their existence
    against the LogPoint server before starting the query.

    - The 'Max Results To Return' must be an integer greater than or equal to 1.


    ### Flow Description

    1. **Parameter Extraction:** Retrieves the query, time frame, and optional filters
    (repos, limits) from the action configuration.

    2. **Time Range Calculation:** Determines the start and end timestamps based on
    the selected 'Time Frame'. If 'Custom' is selected, it validates the provided
    'Start Time'.

    3. **Repo Validation:** If repository names are provided, it fetches the list
    of available repositories from LogPoint to verify that all requested repos exist.

    4. **Job Creation:** Submits a search request to LogPoint and receives a unique
    `search_id`.

    5. **Status Polling:** Periodically checks the status of the search job using
    the `search_id` until the execution state is finished.

    6. **Data Retrieval:** Once the job is finished, it fetches the raw log data from
    the server.

    7. **Output Generation:** Formats the results into a JSON object and a CSV data
    table, which are then attached to the SOAR case.
