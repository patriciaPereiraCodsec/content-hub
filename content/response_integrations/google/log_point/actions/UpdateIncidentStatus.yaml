name: Update Incident Status
description: Update incident status in Logpoint.
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/logpoint#update_incident_status
integration_identifier: LogPoint
parameters:
-   name: Incident ID
    default_value: ''
    type: string
    description: Specify the id of the incident, which you want to update.
    is_mandatory: true
-   name: Action
    default_value: Close
    type: ddl
    optional_values:
    - Close
    - Resolve
    description: Specify the action for the incident.
    is_mandatory: true
dynamic_results_metadata: []
creator: Admin
simulation_data_json: '{"Entities":[]}'
