name: Execute Entity Query
description: 'Execute query in Logpoint based on entities. Currently supported entity
    types: User, IP, Email Address, URL, File Hash, Hostname. Note: Email Address
    is a User entity that matches the format of email address.'
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/logpoint#execute_entity_query
integration_identifier: LogPoint
parameters:
-   name: Query
    default_value: ''
    type: string
    description: Specify the query that needs to be executed. Please refer to the
        action documentation for details.
    is_mandatory: true
-   name: Time Frame
    default_value: Last 24 Hours
    type: ddl
    optional_values:
    - Last Hour
    - Last 12 Hours
    - Last 24 Hours
    - Last 30 Days
    - Last 365 Days
    - Custom
    description: Specify the time frame for the query. If "Custom" is selected, you
        need also provide start time, end time by default will be current time.
    is_mandatory: true
-   name: Start Time
    default_value: ''
    type: string
    description: 'Specify the start time for the query. Format: YYYY-MM-DDThh:mm:ssZ
        or timestamp.'
    is_mandatory: false
-   name: End Time
    default_value: ''
    type: string
    description: 'Specify the end time for the query. Format: YYYY-MM-DDThh:mm:ssZ
        or timestamp. If nothing is provided action will use current time as end time.'
    is_mandatory: false
-   name: Repos
    default_value: ''
    type: string
    description: Specify a comma-separated list of names of the repos. If nothing
        is provided, action will search in all repos.
    is_mandatory: false
-   name: IP Entity Key
    default_value: ''
    type: string
    description: Specify what key should be used with IP entities. Please refer to
        the action documentation for details.
    is_mandatory: false
-   name: Hostname Entity Key
    default_value: ''
    type: string
    description: Specify what key should be used with Hostname entities, when preparing
        the filter. Please refer to the action documentation for details.
    is_mandatory: false
-   name: File Hash Entity Key
    default_value: ''
    type: string
    description: Specify what key should be used with File Hash entities. Please refer
        to the action documentation for details.
    is_mandatory: false
-   name: User Entity Key
    default_value: ''
    type: string
    description: Specify what key should be used with User entities. Please refer
        to the action documentation for details.
    is_mandatory: false
-   name: URL Entity Key
    default_value: ''
    type: string
    description: Specify what key should be used with URL entities. Please refer to
        the action documentation for details.
    is_mandatory: false
-   name: Email Address Entity Key
    default_value: ''
    type: string
    description: Specify what key should be used with Email Address entities. Please
        refer to the action documentation for details.
    is_mandatory: false
-   name: Stop if Not Enough Entities
    default_value: 'True'
    type: boolean
    description: 'If enabled, action will not start execution, unless all of the entity
        types are available for the specified ".. Entity Keys". Example: if "IP Entity
        Key" and "File Hash Entity Keys" are specified, but in the scope there are
        no file hashes then if this parameter is enabled, action will not execute
        the query.'
    is_mandatory: true
-   name: Cross Entity Operator
    default_value: OR
    type: ddl
    optional_values:
    - OR
    - AND
    description: Specify what should be the logical operator used between different
        entity types.
    is_mandatory: true
-   name: Max Results To Return
    default_value: '100'
    type: string
    description: Specify how many results should be returned.
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/execute_entity_query_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: Admin
is_async: true
simulation_data_json: '{"Entities":["ADDRESS","HOSTNAME","USERUNIQNAME","DestinationURL","FILEHASH"]}'
