name: Execute Query
description: Execute search query in Logpoint.
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/logpoint#execute_query
integration_identifier: LogPoint
parameters:
-   name: Query
    default_value: ''
    type: string
    description: Specify the query that needs to be executed in Logpoint.
    is_mandatory: true
-   name: Time Frame
    default_value: Last 24 Hours
    type: ddl
    optional_values:
    - Last Hour
    - Last 12 Hours
    - Last 24 Hours
    - Last 30 Days
    - Last 365 Days
    - Custom
    description: Specify the time frame for the query. If “Custom” is selected, you
        need to also provide start time and end time.
    is_mandatory: true
-   name: Start Time
    default_value: ''
    type: string
    description: 'Specify the start time for the query. Format: YYYY-MM-DDThh:mm:ssZ
        or timestamp.'
    is_mandatory: false
-   name: End Time
    default_value: ''
    type: string
    description: 'Specify the end time for the query.Format: YYYY-MM-DDThh:mm:ssZ
        or timestamp. If nothing is provided action will use current time as end time.'
    is_mandatory: false
-   name: Repos
    default_value: ''
    type: string
    description: Specify a comma-separated list of names of the repos. If nothing
        is provided, action will search in all repos.
    is_mandatory: false
-   name: Max Results To Return
    default_value: '100'
    type: string
    description: Specify how many results should be returned.
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/execute_query_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: Admin
is_async: true
simulation_data_json: '{"Entities":[]}'
