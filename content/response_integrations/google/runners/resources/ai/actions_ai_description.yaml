Run Command As User:
  ai_description: >-
    Executes a specified CLI command on the host system (Windows or Linux) under the
    security context of a provided user account. This action is primarily used for
    administrative tasks, system interrogation, or remediation steps that require
    specific user privileges.


    ### Flow Description:

    1. **Parameter Extraction:** Retrieves the command, username, password, domain,
    and daemon flag from the action parameters.

    2. **Environment Detection:** Determines if the runner is operating on a Linux
    or Windows environment to select the appropriate execution manager.

    3. **Execution (Windows):** Authenticates the user via `LogonUser`, creates named
    pipes for standard input/output/error, and spawns the process using `CreateProcessAsUser`
    to ensure the command runs within the specified user's session.

    4. **Execution (Linux):** Utilizes the `su` command via a subprocess to execute
    the command as the target user.

    5. **Result Handling:** Captures the process exit code, standard output (stdout),
    and standard error (stderr). If the process fails (non-zero exit code), it returns
    the error message; otherwise, it returns the command output.


    ### Parameters Description:

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Command | String | Yes | The CLI command to be executed (e.g., `whoami` or `ipconfig`).
    |

    | Username | String | Yes | The username of the account that will execute the
    command. |

    | Domain | String | Yes | The domain associated with the user account. |

    | Password | Password | Yes | The password for the specified user account. |

    | Daemon | Boolean | Yes | If set to 'true', the process runs in the background
    (on Windows, this hides the command window). |


    ### Additional Notes:

    * **Security Warning:** This action allows for arbitrary command execution. Ensure
    that the credentials provided have the minimum necessary privileges.

    * **Windows Configuration:** On Windows, the user account running the Google SecOps
    agent service may require the 'Replace a process level token' privilege in Local
    Security Policy to successfully execute commands as another user.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Executes arbitrary commands on the host operating system, which can be used
      to modify files, system configurations, or service states.
    fetches_data: false
    internal_data_mutation_explanation: null
