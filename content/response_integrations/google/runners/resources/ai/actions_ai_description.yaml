Ping:
  ai_description: >-
    ### General Description

    Tests the connectivity and operational status of the Runners integration. This
    action serves as a basic health check to ensure that the Google SecOps environment
    can successfully communicate with and execute scripts through the integration's
    runner.


    ### Parameters Description

    There are no parameters for this action.


    ### Additional Notes

    This action does not perform any external API calls, system commands, or data
    processing. It is strictly used for verification purposes. Although the integration
    includes a `RunnersManager` for complex process execution, this specific action
    does not utilize it.


    ### Flow Description

    1. **Initialization**: The action starts by initializing the Siemplify action
    module.

    2. **Execution**: The script executes a simple termination command without performing
    any logic.

    3. **Completion**: The action returns a 'Success' status with a value of 'true'
    to the SOAR platform to confirm the runner is functional.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: false
    internal_data_mutation_explanation: null
  categories:
    enrichment: false
