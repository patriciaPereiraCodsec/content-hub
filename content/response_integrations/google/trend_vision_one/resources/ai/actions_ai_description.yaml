Execute Email:
  ai_description: >-
    ### General Description

    Executes email response actions within the Trend Vision One environment. This
    action allows security analysts to programmatically manage suspicious or malicious
    emails by performing operations such as deleting, quarantining, or restoring messages
    based on their Message ID and associated mailbox. The action operates asynchronously,
    meaning it initiates a task in Trend Vision One and then polls for the completion
    status.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Action | String | No | Specifies the operation to perform on the email. Options
    include: **Delete**, **Quarantine**, and **Restore**. Defaults to 'Delete'. |

    | Message ID | String | Yes | The unique identifier of the email message that
    the action will be performed on. |

    | Mailbox | String | No | The specific mailbox address related to the message.
    |

    | Description | String | No | A text description or justification for the action
    being performed, which will be logged in Trend Vision One. |


    ### Additional Notes

    - This is an **Asynchronous** action. It will trigger a task and then enter a
    'Pending' state, polling the external system until the task reaches a terminal
    state (Success/Failure) or the timeout is reached.

    - Ensure the script timeout in the Google SecOps IDE is adjusted to accommodate
    the polling duration required by the external API.


    ### Flow Description

    1. **Initialization**: The action validates the connection to Trend Vision One
    using the provided API credentials.

    2. **Task Initiation (First Run)**: It sends a POST request to the Trend Vision
    One email response endpoint with the specified action (Delete/Quarantine/Restore)
    and message details.

    3. **Task Tracking**: It extracts a Task ID from the API response headers (`Operation-Location`).

    4. **Status Polling**: In subsequent execution cycles, the action queries the
    status of the task ID.

    5. **Completion**: Once the task status is 'succeeded', 'failed', or 'rejected',
    the action retrieves the final task details, adds them to the execution results
    as JSON, and completes the execution.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      This action performs POST requests to the Trend Vision One API to modify the
      state of email messages (deleting, quarantining, or restoring them) in the target
      environment.
    fetches_data: true
    internal_data_mutation_explanation: null
