Enrich Entities:
  ai_description: >-
    Enriches Hostname and IP Address entities using information from Trend Vision
    One. This action retrieves detailed endpoint metadata such as OS version, MAC
    addresses, login accounts, and installed product codes. It also allows for the
    enrichment of specific endpoints via a list of Agent UUIDs provided as an input
    parameter.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Agent UUID | String | No | A comma-separated list of Trend Vision One Agent
    UUIDs. The action will attempt to fetch and include data for these specific agents
    alongside the entities found in the alert context. |


    ### Flow Description

    1. **Initialization**: Establishes a connection to the Trend Vision One API using
    the provided credentials and validates connectivity.

    2. **Entity Filtering**: Identifies all Hostname and IP Address entities within
    the current Google SecOps context.

    3. **Endpoint Search**: For each identified entity, the action queries the Trend
    Vision One `/v3.0/eiqs/endpoints` endpoint using the IP or Hostname as a filter.

    4. **Data Enrichment**: If a matching endpoint is found, the action updates the
    entity's additional properties with metadata (prefixed with 'TrendVisionOne')
    and attaches a data table containing OS and network details.

    5. **Agent UUID Processing**: If Agent UUIDs are provided in the parameters, the
    action explicitly searches for these IDs and retrieves their endpoint information.

    6. **Finalization**: Updates all successfully enriched entities in the Google
    SecOps platform and returns a comprehensive JSON result containing the raw data
    for all processed endpoints.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      The action updates entity attributes (additional properties) with enrichment
      data and adds data tables to the entities within the Google SecOps case.
  categories:
