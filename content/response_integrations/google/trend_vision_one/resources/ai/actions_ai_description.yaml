Isolate Endpoint:
  ai_description: >-
    ### General Description

    Isolates endpoints in Trend Vision One based on IP Address or Hostname entities,
    or specific Agent UUIDs. This action is performed asynchronously, meaning it triggers
    the isolation task and then periodically checks the status until the operation
    succeeds, fails, or times out. Isolation restricts the network connectivity of
    the target device to prevent further potential threats.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Description | String | No | Specify the reasoning for the isolation of the endpoints.
    |

    | Agent UUID | String | No | A comma-separated list of UUIDs. The action processes
    these UUIDs along with their related entities. |


    ### Flow Description

    1. **Entity Filtering**: The action identifies all `ADDRESS` and `HOSTNAME` entities
    within the current scope.

    2. **Endpoint Discovery**: For each entity, the action queries Trend Vision One
    to find the corresponding endpoint GUID using the IP or Hostname.

    3. **Agent UUID Processing**: If `Agent UUID` parameters are provided, the action
    also searches for those specific agents in the system.

    4. **Isolation Trigger**: The action sends a request to Trend Vision One to isolate
    all identified endpoints and agents.

    5. **Asynchronous Monitoring**: The action enters an async loop, checking the
    status of the isolation tasks via the Trend Vision One API until they reach a
    terminal state (succeeded, failed, or rejected) or the action times out.


    ### Additional Notes

    - This action requires the "API Root" and "API Token" to be configured in the
    integration settings.

    - Because this is an asynchronous action, ensure the script timeout in the Chronicle
    SOAR IDE is sufficient for the isolation tasks to complete.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Isolates endpoints in Trend Vision One, which restricts network connectivity
      for the target device.
    fetches_data: true
    internal_data_mutation_explanation: null
