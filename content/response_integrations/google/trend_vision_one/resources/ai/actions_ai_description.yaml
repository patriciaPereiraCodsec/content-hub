Submit File:
  ai_description: >-
    ### General Description

    The **Submit File** action allows users to upload files from the local filesystem
    to the Trend Vision One sandbox for automated analysis. This action is designed
    to handle multiple files simultaneously and supports password-protected archives
    or documents. Because sandbox analysis can take time, this action operates asynchronously,
    polling the Trend Vision One API until the analysis is complete or a timeout occurs.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **File Paths** | String | Yes | A comma-separated list of absolute paths to
    the files on the local system that should be submitted for analysis. |

    | **Archive Password** | String | No | The password required to extract files
    if the submitted file is an archive (e.g., ZIP, RAR). |

    | **Document Password** | String | No | The password required to open the file
    if it is a protected document (e.g., PDF, DOCX). |

    | **Arguments** | String | No | Command-line arguments to be used when executing
    the file within the sandbox environment. |


    ### Additional Notes

    - This action is **asynchronous**. It will submit the files and then enter an
    "In Progress" state, periodically checking for results in subsequent execution
    cycles.

    - Users should ensure that the Chronicle SOAR execution timeout is configured
    to be long enough to accommodate sandbox analysis times.

    - The action verifies the existence and readability of the files on the local
    system before attempting submission.


    ### Flow Description

    1. **Validation**: The action first checks if the provided file paths exist and
    are accessible on the local filesystem.

    2. **Submission**: For each valid file, it performs a POST request to the Trend
    Vision One sandbox API, uploading the file content along with any provided passwords
    or arguments.

    3. **Task Tracking**: The action receives a task ID for each submission and stores
    these in the action's state (additional_data).

    4. **Polling (Async)**: In subsequent runs, the action queries the status of each
    pending task using the stored IDs.

    5. **Result Retrieval**: Once a task reaches a 'succeeded' status, the action
    fetches the detailed analysis report from the sandbox.

    6. **Completion**: After all tasks are finished (or failed/timed out), the action
    aggregates the results into a JSON object and provides a summary message.
