Execute Custom Script:
  ai_description: >-
    Executes a custom script on remote endpoints managed by Trend Vision One. This
    action supports targeting endpoints via Hostname or IP Address entities, as well
    as directly through Agent UUIDs. It operates asynchronously, initiating the script
    execution and then polling for the task status until completion or timeout.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Script Name | String | Yes | The exact name of the script (as defined in Trend
    Vision One) to be executed on the target endpoints. |

    | Script Parameters | String | No | Optional arguments or parameters required
    by the script during execution. |

    | Agent UUID | String | No | A comma-separated list of specific Trend Vision One
    Agent UUIDs to target, bypassing entity resolution. |


    ### Additional Notes

    - The action is asynchronous. If the script takes a long time to execute, ensure
    the action timeout in the Google SecOps IDE is adjusted accordingly.

    - Either suitable entities (IP/Hostname) or Agent UUIDs must be provided for the
    action to have targets to process.


    ### Flow Description

    1. **Validation**: The action first verifies that the specified 'Script Name'
    exists within the Trend Vision One environment.

    2. **Target Identification**: It identifies target endpoints by searching the
    Trend Vision One inventory using the identifiers of the provided IP and Hostname
    entities. It also includes any agents specified via the 'Agent UUID' parameter.

    3. **Execution**: A request is sent to Trend Vision One to trigger the script
    execution on all identified endpoints. This generates unique task URLs for tracking.

    4. **Monitoring**: The action enters an asynchronous loop, periodically checking
    the status of each task (e.g., 'running', 'succeeded', 'failed') via the Trend
    Vision One API.

    5. **Completion**: Once all tasks reach a terminal state or the action approaches
    its timeout, it aggregates the results, providing task IDs and execution statuses
    in the JSON output.
