Ping:
  ai_description: >-
    ### General Description

    Verifies the connection to the Trend Vision One server using the provided API
    credentials and root URL. This action is primarily used to validate that the integration
    is correctly configured and that the Google SecOps environment has network access
    to the Trend Vision One API endpoints.


    ### Parameters Description

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | API Root | String | Yes | The base URL for the Trend Vision One API instance.
    |

    | API Token | String | Yes | The API token used for authentication with Trend
    Vision One. |

    | Verify SSL | Boolean | Yes | If enabled, the action will verify the SSL certificate
    of the API Root. |


    ### Flow Description

    1. **Parameter Extraction**: Retrieves the API Root, API Token, and SSL verification
    preference from the integration configuration.

    2. **Manager Initialization**: Initializes the `TrendVisionOneManager` with the
    provided credentials and session headers.

    3. **Connectivity Test**: Executes a GET request to the `/v3.0/healthcheck/connectivity`
    endpoint to verify the API token and connectivity.

    4. **Result Reporting**: If the request is successful, it returns a success message.
    If an exception occurs (e.g., authentication failure or network timeout), it captures
    the error and reports a failure status.
