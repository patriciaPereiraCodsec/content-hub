Update Workbench Alert:
  ai_description: >-
    ### General Description

    This action updates the investigation status of a specific workbench alert in
    Trend Vision One. It allows security analysts to programmatically manage the lifecycle
    of alerts by transitioning them between statuses such as 'New', 'In Progress',
    'True Positive', or 'False Positive'. After performing the update, the action
    retrieves the latest details of the alert to ensure the output reflects the current
    state in the external system.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Alert ID | String | Yes | The unique identifier of the workbench alert that
    needs to be updated. |

    | Status | Dropdown | Yes | The new investigation status to set for the alert.
    Supported values include: 'New', 'In Progress', 'True Positive', and 'False Positive'.
    |


    ### Additional Notes

    - The 'Status' parameter must be set to a value other than 'Select One' for the
    action to proceed.

    - This action performs a state change in the Trend Vision One platform (External
    Mutation).


    ### Flow Description

    1. **Parameter Extraction:** The action retrieves the API configuration and the
    specific alert details (ID and Status) from the input.

    2. **Validation:** It checks if a valid status has been selected.

    3. **External Update:** It sends a PATCH request to the Trend Vision One API endpoint
    `/v3.0/workbench/alerts/{alert_id}` to update the `investigationStatus` field.

    4. **Data Retrieval:** Upon a successful update, it performs a GET request to
    fetch the most recent data for that specific alert.

    5. **Output Generation:** The updated alert data is attached to the action results
    as a JSON object, and the action completes with a success message.
  capabilities:
