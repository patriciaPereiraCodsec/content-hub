Unisolate Endpoint:
  ai_description: >-
    ### General Description

    Restores network connectivity to endpoints that were previously isolated in Trend
    Vision One. This action supports unisolating endpoints identified by IP Address
    or Hostname entities within the Google SecOps scope, as well as specific Agent
    UUIDs provided as parameters. It operates asynchronously, submitting unisolation
    requests and then polling for task completion.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Description | String | No | Provides a reason or context for the unisolation
    request in the Trend Vision One logs. |

    | Agent UUID | String | No | A comma-separated list of specific Trend Micro Agent
    UUIDs to unisolate. These are processed in addition to any detected entities.
    |


    ### Additional Notes

    - This is an **asynchronous action**. It will submit the request and then enter
    a polling state to monitor the progress of the unisolation tasks in Trend Vision
    One.

    - Ensure the script timeout in the IDE is sufficient to allow for the polling
    of long-running tasks.


    ### Flow Description

    1. **Initialization**: Extracts API credentials and action parameters (Description
    and Agent UUIDs).

    2. **Entity Filtering**: Identifies all `ADDRESS` (IP) and `HOSTNAME` entities
    in the current alert scope.

    3. **Endpoint Discovery**: For each entity, it queries the Trend Vision One API
    to find the corresponding endpoint GUID.

    4. **Agent Processing**: Parses the `Agent UUID` parameter to include manually
    specified endpoints.

    5. **Unisolation Request**: Sends a POST request to the Trend Vision One 'restore'
    endpoint for all identified GUIDs.

    6. **Status Polling**: Enters an asynchronous loop, periodically checking the
    status of each unisolation task via the API.

    7. **Completion**: Once all tasks reach a terminal state (succeeded, failed, or
    rejected), it aggregates the results and updates the action status.
