Submit URL:
  ai_description: >-
    ### General Description

    Submits URL entities to the Trend Vision One sandbox for automated analysis. This
    action is designed to identify potential threats by detonating URLs in a controlled
    environment and retrieving detailed risk assessments, including risk levels, detection
    names, and threat types.


    ### Parameters Description

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | None | N/A | No | This action does not require any user-defined parameters beyond
    the standard integration configuration. |


    ### Additional Notes

    * **Asynchronous Execution:** This action operates asynchronously. It submits
    the URLs and then periodically polls the Trend Vision One API for task completion.
    Users should ensure the script timeout in the Chronicle SOAR IDE is configured
    to allow enough time for sandbox analysis (default is often 300 seconds).

    * **Quota Management:** The action includes logic to handle rate limits and daily
    submission quotas. If a quota is reached, the action will report which URLs were
    not submitted.


    ### Flow Description

    1. **Entity Filtering:** The action identifies all URL entities within the current
    scope.

    2. **Submission:** It batches the URLs (up to 10 per request) and submits them
    to the Trend Vision One sandbox via a POST request to create analysis tasks.

    3. **Status Polling:** The action enters an asynchronous loop, checking the status
    of each task ID returned by the submission step.

    4. **Data Retrieval:** Once a task reaches a 'succeeded' status, the action fetches
    the full analysis results from the sandbox.

    5. **Result Reporting:** The final analysis data is formatted and attached to
    the action's JSON results for use in downstream playbooks.
