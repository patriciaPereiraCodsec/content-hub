name: Execute Custom Script
description: 'Execute custom script on the endpoint in Trend Vision One. Supported
    entities: Hostname, IP address. Action is running as async, please adjust script
    timeout value in Chronicle SOAR IDE for action as needed.'
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/trend-vision-one#execute_custom_script
integration_identifier: TrendVisionOne
parameters:
-   name: Script Name
    default_value: ''
    type: string
    description: Specify the name of the script that needs to be executed on the endpoints.
    is_mandatory: true
-   name: Script Parameters
    default_value: ''
    type: string
    description: Specify the parameters for the script.
    is_mandatory: false
-   name: Agent UUID
    default_value: ''
    type: string
    description: A comma-separated list of UUIDs. The action processes these UUIDs
        along with their related entities.
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/execute_custom_script_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
is_async: true
simulation_data_json: '{"Entities": ["HOSTNAME", "ADDRESS"]}'
