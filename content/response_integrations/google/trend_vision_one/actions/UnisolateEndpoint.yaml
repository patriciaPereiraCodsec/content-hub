name: Unisolate Endpoint
description: 'Unisolate endpoints in Trend Vision One. Supported entities: IP Address,
    Hostname. Action is running as async, please adjust script timeout value in Chronicle
    SOAR IDE for action as needed.'
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/trend-vision-one#unisolate_endpoint
integration_identifier: TrendVisionOne
parameters:
-   name: Description
    default_value: ''
    type: string
    description: Specify the reasoning for the unisolation of the endpoints.
    is_mandatory: false
-   name: Agent UUID
    default_value: ''
    type: string
    description: A comma-separated list of UUIDs. The action processes these UUIDs
        along with their related entities.
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/unisolate_endpoint_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
is_async: true
simulation_data_json: '{"Entities": ["HOSTNAME", "ADDRESS"]}'
