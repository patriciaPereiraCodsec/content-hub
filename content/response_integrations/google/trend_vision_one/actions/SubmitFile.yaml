name: Submit File
description: 'Submit file in Trend Vision One. Note: Action is running as async, please
    adjust script timeout value in Chronicle SOAR IDE for action as needed.'
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/trend-vision-one#submit_file
integration_identifier: TrendVisionOne
parameters:
-   name: File Paths
    default_value: ''
    type: string
    description: Specify a comma-separated list of paths for the files that need to
        be submitted.
    is_mandatory: true
-   name: Archive Password
    default_value: ''
    type: password
    description: Specify the password for the archive.
    is_mandatory: false
-   name: Document Password
    default_value: ''
    type: password
    description: Specify the password for the document.
    is_mandatory: false
-   name: Arguments
    default_value: ''
    type: string
    description: Specify the arguments for the submitted file.
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/submit_file_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
is_async: true
