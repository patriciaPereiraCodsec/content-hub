name: GetSystemInfo
description: Get information about a system
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/wmi#get_system_info
integration_identifier: WMI
parameters:
-   name: Server Address
    default_value: ''
    type: string
    description: Server Address
    is_mandatory: true
-   name: Username
    default_value: ''
    type: string
    description: Username
    is_mandatory: false
-   name: Password
    default_value: ''
    type: password
    description: Password
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/get_system_info_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
script_result_name: system_info
