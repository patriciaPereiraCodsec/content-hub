ListServices:
  ai_description: >-
    ### General Description

    The **ListServices** action retrieves a comprehensive list of all installed services
    on a target system using the Windows Management Instrumentation (WMI) protocol.
    This action is primarily used for forensic investigations and system auditing
    to identify potentially malicious services, unauthorized software, or to verify
    system configurations on remote Windows hosts.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Server Address** | String | Yes | The IP address or hostname of the remote
    system to query. |

    | **Username** | String | No | The username used to authenticate with the remote
    system. |

    | **Password** | Password | No | The password used to authenticate with the remote
    system. |


    ### Flow Description

    1. **Connection Establishment**: The action initializes a WMI connection to the
    target host using the provided `Server Address` and credentials (`Username` and
    `Password`). It dynamically selects the appropriate WMI manager based on whether
    the execution environment is Linux or Windows.

    2. **Data Retrieval**: It executes a query against the `Win32_Service` class to
    collect details about all configured services, including their display names,
    states, paths, and start modes.

    3. **Data Processing**: The retrieved service objects are parsed into a list of
    dictionaries, capturing all available properties for each service.

    4. **Output Generation**: The action produces a JSON result containing the raw
    service data and constructs a CSV-formatted data table named "WMI Services" for
    display within the Google SecOps case wall.


    ### Additional Notes

    This action does not operate on specific entities within the case; it relies entirely
    on the `Server Address` parameter provided in the action configuration.
