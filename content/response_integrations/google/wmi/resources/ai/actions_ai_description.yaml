RunQuery:
  ai_description: >-
    ### General Description

    Runs an arbitrary WQL (Windows Management Instrumentation Query Language) query
    against a target Windows server. This action is designed to retrieve specific
    system information, such as running processes, service statuses, disk details,
    or user account information, by executing custom queries directly on the remote
    host.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Server Address | String | Yes | The IP address or hostname of the target Windows
    machine to query. |

    | Username | String | No | The username used for WMI authentication. |

    | Password | Password | No | The password used for WMI authentication. |

    | WQL Query | String | Yes | The specific WQL query string to execute (e.g., `SELECT
    Caption, Description FROM Win32_LogicalDisk`). |


    ### Additional Notes

    - This action supports execution from both Windows and Linux-based Google SecOps
    environments using appropriate WMI client libraries.

    - Results are returned as a JSON object and also formatted as a CSV data table
    for visibility in the case wall.


    ### Flow Description

    1. **Authentication**: The action establishes a connection to the remote server
    using the provided `Server Address`, `Username`, and `Password`.

    2. **Execution**: The specified `WQL Query` is executed against the remote WMI
    interface.

    3. **Data Processing**: The raw WMI objects returned are parsed into a list of
    dictionaries.

    4. **Output Generation**: The action generates a JSON result of the items and
    constructs a CSV representation of the data.

    5. **Internal Mutation**: A data table named 'WMI Query Results' is added to the
    case wall containing the CSV output.
  capabilities:
    can_create_case_comments: false
