GetSystemInfo:
  ai_description: >-
    ### General Description

    Retrieves comprehensive system and operating system information from a remote
    Windows machine using Windows Management Instrumentation (WMI). This action is
    designed to gather technical details about a host, including hardware specifications,
    OS version, memory usage, and domain membership, which are essential for host-based
    investigations.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Server Address | String | Yes | The IP address or hostname of the target system
    to query via WMI. |

    | Username | String | No | The username used to authenticate with the remote system.
    |

    | Password | Password | No | The password used to authenticate with the remote
    system. |


    ### Flow Description

    1. **Connection**: Establishes a WMI connection to the target server using the
    provided address and credentials. It supports both Windows and Linux-based execution
    environments.

    2. **Data Retrieval**: Executes queries against the `Win32_ComputerSystem` class
    (for hardware/system info) and the `Win32_OperatingSystem` class (for OS-specific
    details).

    3. **Processing**: Merges the retrieved properties from both WMI classes into
    a single dataset and flattens the dictionary structure for easier consumption.

    4. **Output**: Generates a CSV-formatted data table titled 'WMI System Info' for
    the case wall and attaches the full raw JSON result to the action output.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
