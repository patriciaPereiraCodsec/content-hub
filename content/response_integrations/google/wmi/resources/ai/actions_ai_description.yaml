ListUsers:
  ai_description: >-
    ### General Description


    The **ListUsers** action retrieves a list of all user accounts configured on a
    target system using Windows Management Instrumentation (WMI). This action is primarily
    used for system auditing and discovery, allowing security analysts to identify
    local and domain accounts present on a specific host.


    ### Parameters Description


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Server Address** | String | Yes | The IP address or hostname of the remote
    system to query. |

    | **Username** | String | No | The username for WMI authentication. |

    | **Password** | Password | No | The password for WMI authentication. |


    ### Flow Description


    1. **Setup**: The action extracts the server address and credentials from the
    input parameters.

    2. **Connection**: It initializes a WMI connection to the target server. The logic
    handles both Windows and Linux execution environments via the `WMIManagerBuilder`.

    3. **Query**: It queries the `Win32_UserAccount` WMI class to retrieve account
    details such as Name, Domain, SID, and Status.

    4. **Data Formatting**: The results are converted into a JSON format and a CSV-formatted
    data table.

    5. **Completion**: The action attaches the JSON results and the 'WMI Users' data
    table to the case, concluding with a message stating the number of users found.


    ### Additional Notes


    * This action does not operate on entities within the case; it requires a specific
    server address as a parameter.

    * If no users are found, the action will report success but indicate that no data
    was retrieved.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
