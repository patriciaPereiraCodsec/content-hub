Ping:
  ai_description: >-
    ### General Description

    Tests the connectivity to the Cisco Threat Grid instance using the configured
    API Root and API Key. This action ensures that the integration can successfully
    communicate with the external service and that the provided credentials are valid.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | None | N/A | N/A | This action does not require any input parameters. |


    ### Flow Description

    1. **Configuration Retrieval**: Fetches the 'Api Root', 'Api Key', and 'Use SSL'
    settings from the integration configuration.

    2. **Manager Initialization**: Initializes the `CiscoThreatGridManager` with the
    retrieved settings.

    3. **Connectivity Check**: Executes a GET request to the `/api/v2/samples` endpoint
    with the `user_only` flag to verify the API key's validity and service reachability.

    4. **Result Reporting**: If the request is successful (no exception occurs), the
    action completes with a success message confirming the connection.


    ### Additional Notes

    This is a standard connectivity test action. It does not process any entities,
    modify any data, or generate insights.
