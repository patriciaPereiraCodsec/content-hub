Get Hash Associated Domains:
  ai_description: >-
    ### General Description

    Retrieves domain names associated with a specific file hash by querying Cisco
    Threat Grid's sandbox analysis results. This action is useful for identifying
    network-based indicators of compromise (IoCs) linked to a known malicious or suspicious
    file.


    ### Parameters Description

    There are no parameters for this action.


    ### Flow Description

    1. **Entity Filtering**: The action iterates through the provided entities and
    filters for those of type `FILEHASH`.

    2. **Submission Search**: For each file hash, it queries Cisco Threat Grid to
    find successful sandbox analysis submissions associated with that hash.

    3. **Network Stream Retrieval**: For every identified sample ID, the action retrieves
    the network stream data generated during the sandbox analysis.

    4. **DNS Parsing**: It parses the network streams, specifically looking for DNS
    protocol traffic (port 53). It extracts unique domain names from the DNS queries,
    excluding common system domains like time servers or local workstations.

    5. **Data Output**: The discovered domains are added to an entity-specific data
    table and included in the action's JSON results for further use in the playbook.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
  categories:
    enrichment: true
  entity_usage:
