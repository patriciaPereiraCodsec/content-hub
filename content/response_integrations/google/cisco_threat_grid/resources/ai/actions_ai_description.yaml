Upload Sample:
  ai_description: >-
    ### General Description

    The **Upload Sample** action allows users to submit a file to Cisco Threat Grid
    for automated sandbox analysis. This action is designed to handle both local files
    (stored on the SOAR runner) and remote files (located on a Linux server and accessed
    via SFTP). It operates asynchronously, meaning it submits the file and then periodically
    polls the service until the analysis is complete, at which point it retrieves
    the threat intelligence results.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **File Path** | String | Yes | The full path to the sample file to be analyzed.
    |

    | **Vm** | String | No | The specific virtual machine environment to run the analysis
    on (e.g., `win7-x64`). |

    | **Playbook** | String | No | The name of a Cisco Threat Grid playbook to apply
    to the analysis (e.g., `default`). |

    | **Network Exit** | String | No | Specifies the network exit location for traffic
    generated during analysis. |

    | **Private** | Boolean | Yes | If enabled, the sample will be marked as private
    in Cisco Threat Grid. |

    | **Linux Server Address** | String | No | The IP address of a remote Linux server
    where the file is located. |

    | **Linux Username** | String | No | The username for SSH/SFTP access to the remote
    Linux server. |

    | **Linux Password** | Password | No | The password for SSH/SFTP access to the
    remote Linux server. |


    ### Flow Description

    1. **File Retrieval**: The action first determines the source of the file. If
    remote Linux parameters are provided, it connects via SFTP to retrieve the file
    content. Otherwise, it reads the file from the local file system.

    2. **Submission**: The file is uploaded to Cisco Threat Grid using the `/api/v2/samples`
    endpoint with the specified configuration (VM, Playbook, Privacy, etc.).

    3. **Asynchronous Polling**: The action enters an "In Progress" state. In subsequent
    execution cycles, it checks the state of the submission using the sample ID.

    4. **Result Processing**: Once the analysis is finished, the action retrieves
    the threat score and detailed Indicators of Compromise (IOCs).

    5. **Output**: It generates a "Threat Report" data table, provides direct download
    links for the HTML report, PCAP, and screenshots, and returns the final calculated
    threat score.


    ### Additional Notes

    * This action is **Asynchronous**. Ensure the script timeout in the IDE is adjusted
    if necessary to allow for sandbox analysis time.

    * To use a remote file, all three Linux parameters (**Linux Server Address**,
    **Linux Username**, and **Linux Password**) must be provided together.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Uploads a file sample to Cisco Threat Grid for analysis, creating a new sample
      submission record in the external system.
    fetches_data: true
    internal_data_mutation_explanation: null
  categories:
    enrichment: false
  entity_usage:
    entity_types: []
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
