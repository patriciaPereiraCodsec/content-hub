Get Hash Associated IPs:
  ai_description: "### General Description\nThe **Get Hash Associated IPs** action\
    \ enriches File Hash entities by retrieving associated IP addresses from Cisco\
    \ Threat Grid analysis reports. This action identifies network infrastructure\
    \ that a specific file interacted with during sandbox execution, helping analysts\
    \ understand the potential command-and-control (C2) or distribution network related\
    \ to a malware sample.\n\n### Parameters Description\n| Parameter | Type | Mandatory\
    \ | Description |\n| :--- | :--- | :--- | :--- |\n| None | N/A | N/A | This action\
    \ does not require any input parameters. |\n\n### Additional Notes\n* This action\
    \ only processes entities of type **FILEHASH**.\n* It relies on existing analysis\
    \ results within Cisco Threat Grid. If a hash has not been previously analyzed,\
    \ no associated IPs will be found.\n* The action automatically filters out internal\
    \ and broadcast IP addresses (e.g., 224.0.0.252, 169.254.x.x) to reduce noise.\n\
    \n### Flow Description\n1. **Connection**: Establishes a session with the Cisco\
    \ Threat Grid API using the configured API Root and API Key.\n2. **Entity Filtering**:\
    \ Iterates through the target entities and selects only those identified as File\
    \ Hashes.\n3. **Submission Search**: For each hash, it queries Cisco Threat Grid\
    \ for successful analysis submissions.\n4. **Network Stream Retrieval**: For every\
    \ identified sample ID, the action fetches the associated network stream data.\n\
    5. **IP Extraction & Filtering**: It extracts unique destination IP addresses\
    \ from the network streams, excluding known internal and broadcast ranges.\n6.\
    \ **Output Generation**: \n    * Creates an **Entity Table** for each hash to\
    \ display the associated IPs directly in the SOAR interface.\n    * Populates\
    \ a **JSON Result** mapping each hash to its list of associated IPs for use in\
    \ downstream playbook logic."
