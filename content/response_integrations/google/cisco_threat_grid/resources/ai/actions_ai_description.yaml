Get Submissions:
  ai_description: >-
    ### General Description

    Retrieves historical submission data and detailed analysis reports from Cisco
    ThreatGrid for supported entities (IPs, Hashes, Hostnames, Processes, URLs, and
    Filenames). This action provides deep visibility into past sandbox executions,
    including threat scores, behavioral indicators, and network traffic. It enriches
    entities with risk scores and attaches forensic artifacts like PCAPs and screenshots
    directly to the case.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Threshold | Integer | Yes | The threat score threshold (0-100). If the maximum
    threat score found for an entity exceeds this value, the entity is marked as suspicious
    in Google SecOps. Default is 50. |

    | Max Submissions To Return | Integer | No | The maximum number of historical
    submissions to retrieve for each entity. Must be between 1 and 100. Default is
    10. |


    ### Flow Description

    1. **Status Check**: Queries Cisco ThreatGrid to determine the state of submissions
    for each entity.

    2. **Asynchronous Waiting**: If submissions are still processing, the action enters
    an 'In Progress' state and waits for completion.

    3. **Data Retrieval**: Fetches historical submission records once they are ready.

    4. **Report Acquisition**: Downloads the HTML analysis report, network PCAP, and
    screenshot for the most recent submission.

    5. **Entity Enrichment**: Updates the entity with the maximum threat score found
    and marks it as enriched.

    6. **Risk Flagging**: Sets the entity as suspicious if the maximum threat score
    exceeds the configured threshold.

    7. **Documentation**: Attaches the downloaded files and creates data tables for
    submissions and threat indicators within the SOAR.


    ### Additional Notes

    This action is asynchronous and will wait for pending submissions to complete
    before finalizing the enrichment. It specifically targets the most recent successful
    submission for detailed report and file downloads. Note that file downloads (HTML,
    PCAP, PNG) prevent this action from being categorized as a standard enrichment
    action.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entity attributes (is_enriched, is_suspicious, additional_properties)
      and attaches analysis files (HTML reports, PCAPs, screenshots) and data tables
      to the entities.
