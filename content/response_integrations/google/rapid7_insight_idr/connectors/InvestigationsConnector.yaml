name: Rapid7 InsightIDR - Investigations Connector
parameters:
-   name: DeviceProductField
    default_value: data_type
    type: string
    description: Enter the source field name in order to retrieve the Product Field
        name.
    is_mandatory: true
    is_advanced: false
    mode: regular
-   name: EventClassId
    default_value: source
    type: string
    description: Enter the source field name in order to retrieve the Event Field
        name.
    is_mandatory: true
    is_advanced: false
    mode: regular
-   name: Environment Field Name
    default_value: ''
    type: string
    description: Describes the name of the field where the environment name is stored.
        If the environment field isn't found, the environment is the default environment.
    is_mandatory: false
    is_advanced: true
    mode: script
-   name: Environment Regex Pattern
    default_value: .*
    type: string
    description: A regex pattern to run on the value found in the "Environment Field
        Name" field. Default is .* to catch all and return the value unchanged. Used
        to allow the user to manipulate the environment field via regex logic. If
        the regex pattern is null or empty, or the environment value is null, the
        final environment result is the default environment.
    is_mandatory: false
    is_advanced: true
    mode: script
-   name: PythonProcessTimeout
    default_value: 180
    type: integer
    description: Timeout limit for the python process running the current script.
    is_mandatory: true
    is_advanced: true
    mode: script
-   name: API Root
    default_value: https://{instance}.api.insight.rapid7.com
    type: string
    description: API root of the Rapid7 InsightIDR instance.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: API Key
    default_value: ''
    type: password
    description: API Key of the Rapid7 InsightIDR account.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Verify SSL
    default_value: true
    type: boolean
    description: If enabled, verify the SSL certificate for the connection to the
        Rapid7 InsightIDR server is valid.
    is_mandatory: true
    is_advanced: true
    mode: script
-   name: Sources
    default_value: ALERT,USER
    type: string
    description: 'Sources that will be used to fetch investigations. Possible values:
        User, Alert. If nothing is provided, the connector will ingest investigations
        from both sources.'
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Lowest Priority To Fetch
    default_value: Medium
    type: string
    description: 'The lowest priority that needs to be used to fetch investigations.
        Possible values: Low, Medium, High, Critical. If nothing is specified, the
        connector ingests alerts with all severities.'
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Max Hours Backwards
    default_value: 1
    type: integer
    description: Number of hours before the first connector iteration to retrieve
        investigations from. This parameter applies to the initial connector iteration
        after you enable the connector for the first time, or used as a fallback value
        in cases where connector's last run timestamp expires.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Max Alerts To Fetch
    default_value: 20
    type: integer
    description: 'Number of alerts to process per one connector iteration. Default:
        20.'
    is_mandatory: false
    is_advanced: true
    mode: script
-   name: Use dynamic list as a blacklist
    default_value: false
    type: boolean
    description: If enabled, dynamic lists will be used as a blacklist.
    is_mandatory: true
    is_advanced: true
    mode: script
-   name: Proxy Server Address
    default_value: ''
    type: string
    description: The address of the proxy server to use.
    is_mandatory: false
    is_advanced: true
    mode: script
-   name: Proxy Username
    default_value: ''
    type: string
    description: The proxy username to authenticate with.
    is_mandatory: false
    is_advanced: true
    mode: script
-   name: Proxy Password
    default_value: ''
    type: password
    description: The proxy password to authenticate with.
    is_mandatory: false
    is_advanced: true
    mode: script
description: 'This connector was built using API endpoints that are in preview release.
    Pull information about investigation from Rapid7 InsightIDR. Note: Dynamic list
    filter works with the "title" parameter.'
integration: Rapid7InsightIDR
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/rapid7-insightidr#investigations-connector
rules: []
is_connector_rules_supported: false
creator: admin
