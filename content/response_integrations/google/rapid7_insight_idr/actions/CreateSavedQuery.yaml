name: Create Saved Query
description: 'Create Rapid7 InsightIDR saved query based on the specified action input
    parameters. Note: Action is not working with Siemplify Entities.'
integration_identifier: Rapid7InsightIDR
parameters:
-   name: Name
    default_value: ''
    type: string
    description: Name for the new saved query
    is_mandatory: true
-   name: Statement
    default_value: ''
    type: string
    description: 'A statement to execute in query, should follow LEQL syntax, for
        example: where(foo=bar)'
    is_mandatory: true
-   name: Time Frame
    default_value: 4
    type: string
    description: Specify a time frame in hours for which query should fetch data.
    is_mandatory: true
-   name: Logs
    default_value: ''
    type: string
    description: Log names query should execute against. Parameter accepts multiple
        values as a comma separated string.
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/create_saved_query_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
