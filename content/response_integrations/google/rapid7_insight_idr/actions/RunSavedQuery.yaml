name: Run Saved Query
description: 'Run a Rapid7 InsightIDR saved query. Note: Action is not working with
    Siemplify Entities.'
integration_identifier: Rapid7InsightIDR
parameters:
-   name: Saved Query ID
    default_value: ''
    type: string
    description: Because Saved query names are not unique, provide a saved query ID
        to execute.
    is_mandatory: true
dynamic_results_metadata:
-   result_example_path: resources/run_saved_query_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
