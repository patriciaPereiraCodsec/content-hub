Delete Saved Query:
  ai_description: "### General Description\nDeletes a specific saved query from the\
    \ Rapid7 InsightIDR platform. This action is used to programmatically manage and\
    \ clean up log search queries that are no longer needed. It is important to note\
    \ that this action does not operate on Google SecOps entities and requires a specific\
    \ Query ID to function.\n\n### Parameters Description\n| Parameter Name | Type\
    \ | Mandatory | Description |\n| :--- | :--- | :--- | :--- |\n| Saved Query ID\
    \ | String | Yes | The unique identifier (UUID) of the saved query to delete (e.g.,\
    \ 00000000-0003-7218-0000-000000000000). |\n\n### Additional Notes\n- This action\
    \ does not support or interact with entities (IPs, Hostnames, etc.) within the\
    \ Google SecOps environment.\n- If the specified Saved Query ID is not found,\
    \ the action will return a failure message indicating the resource was not found.\n\
    \n### Flow Description\n1. **Initialization**: The action initializes the Rapid7\
    \ InsightIDR manager using the provided API Root, API Key, and SSL verification\
    \ settings.\n2. **Parameter Extraction**: The action retrieves the mandatory `Saved\
    \ Query ID` from the input parameters.\n3. **API Execution**: The manager constructs\
    \ a DELETE request to the Rapid7 InsightIDR API endpoint `/log_search/query/saved_queries/{saved_query_id}`.\n\
    4. **Response Handling**: \n    - If the API returns a success status, the action\
    \ completes successfully.\n    - If a `404 Not Found` error occurs, it catches\
    \ the `NotFoundException` and reports the failure.\n    - For other errors, it\
    \ logs the exception and marks the execution as failed."
