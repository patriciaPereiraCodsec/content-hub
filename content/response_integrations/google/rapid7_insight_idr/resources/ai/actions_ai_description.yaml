List Saved Queries:
  ai_description: >-
    ### General Description

    The **List Saved Queries** action retrieves a list of saved queries from the Rapid7
    InsightIDR platform. This utility action allows users to view existing log search
    queries, including their LEQL statements and associated logs, which is useful
    for auditing or preparing for query execution.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Record limit | Integer | No | Specifies the maximum number of saved queries
    to return. Default is 20. |


    ### Additional Notes

    - This action does not interact with or require any Google SecOps entities.

    - Results are presented in a data table and as a JSON result.


    ### Flow Description

    1. **Configuration**: Retrieves API credentials and connection settings.

    2. **Request**: Sends a GET request to the Rapid7 InsightIDR saved queries endpoint.

    3. **Parsing**: Converts the API response into internal SavedQuery objects.

    4. **Limiting**: Applies the user-specified record limit to the result set.

    5. **Output**: Returns the list of queries as a JSON object and populates a data
    table.
