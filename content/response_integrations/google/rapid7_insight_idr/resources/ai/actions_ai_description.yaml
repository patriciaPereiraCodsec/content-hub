Update Investigation:
  ai_description: >-
    ### General Description

    Updates the details of a specific investigation in Rapid7 InsightIDR. This action
    allows users to modify the status and disposition of an investigation using the
    Rapid7 preview API endpoints.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Investigation ID | String | Yes | The unique identifier (RRN) of the investigation
    to be updated. |

    | Status | Dropdown | No | The new status to assign to the investigation. Options:
    Open, Investigating, Closed. |

    | Disposition | Dropdown | No | The new disposition to assign to the investigation.
    Options: Benign, Malicious, Not Applicable. |


    ### Additional Notes

    - At least one of the optional parameters (**Status** or **Disposition**) must
    be provided for the action to execute.

    - This action utilizes API endpoints that are currently in preview release.


    ### Flow Description

    1. **Parameter Extraction:** Retrieves the Investigation ID, Status, and Disposition
    from the action input.

    2. **Validation:** Ensures that at least one update field (Status or Disposition)
    is specified.

    3. **Mapping:** Converts the human-readable status and disposition values into
    the format required by the Rapid7 API.

    4. **API Interaction:** Executes a PATCH request to the Rapid7 InsightIDR service
    to update the investigation record.

    5. **Result Processing:** Captures the updated investigation data and attaches
    it as a JSON result to the action.
