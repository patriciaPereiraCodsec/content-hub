Set Investigation Assignee:
  ai_description: >-
    ### General Description

    The **Set Investigation Assignee** action updates the assigned user for a specific
    investigation within Rapid7 InsightIDR. This is a management action used to reassign
    ownership of security investigations to different team members based on their
    email addresses.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Investigation ID | String | Yes | The unique identifier (UUID format, e.g.,
    8ec8e324-4522-4a6e-9838-81496a0cadb0) of the investigation in Rapid7 InsightIDR
    that needs an assignee update. |

    | Assignee email | String | Yes | The email address of the user who will be assigned
    to the investigation. |


    ### Additional Notes

    - **Entity Support:** This action does **not** operate on Google SecOps entities.
    It requires the Investigation ID to be provided manually or via a previous playbook
    step.

    - **External Mutation:** This action performs a state change in the Rapid7 InsightIDR
    platform by updating the assignee field.


    ### Flow Description

    1. **Parameter Extraction:** The action retrieves the API connection details (API
    Root, API Key) and the specific Investigation ID and Assignee Email from the input
    parameters.

    2. **Manager Initialization:** It initializes the Rapid7 InsightIDR Manager to
    handle API communication.

    3. **API Request:** The action sends a `PUT` request to the Rapid7 InsightIDR
    `/idr/v1/investigations/{investigation_id}/assignee` endpoint with the new email
    address in the payload.

    4. **Result Processing:** Upon success, the action retrieves the updated investigation
    object and attaches it to the action results as a JSON object for use in subsequent
    playbook steps.
