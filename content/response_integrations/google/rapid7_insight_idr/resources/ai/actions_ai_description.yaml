Run Saved Query:
  ai_description: >-
    ### General Description

    The **Run Saved Query** action executes a pre-defined saved query within Rapid7
    InsightIDR and retrieves the resulting log events. This utility action is designed
    to pull specific datasets from the InsightIDR log search engine into Google SecOps
    for analysis. It is important to note that this action does not operate on specific
    entities within a case but rather executes a global query based on a provided
    ID.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Saved Query ID | String | Yes | The unique identifier of the saved query to
    be executed. Because query names are not unique in InsightIDR, the ID is required
    to ensure the correct query is run. |


    ### Additional Notes

    - **Entity Support**: This action does not use or filter by Google SecOps entities.
    It is a standalone search utility.

    - **Timeout Management**: The action includes logic to stop fetching paginated
    results if it approaches the global action timeout limit (minus a safety buffer)
    to ensure the script terminates gracefully.


    ### Flow Description

    1. **Initialization**: The action initializes the Rapid7 InsightIDR manager using
    the API Root and API Key from the integration configuration.

    2. **Parameter Extraction**: It retrieves the mandatory `Saved Query ID` from
    the action parameters.

    3. **Execution**: The action calls the Rapid7 API to trigger the execution of
    the saved query.

    4. **Pagination Handling**: The action retrieves the initial set of results and
    then iteratively follows pagination links (`next_query_link`) to collect all available
    log events.

    5. **Result Processing**: The collected log events are compiled into a JSON array
    and returned as the action's result output.
