Set Investigation Status:
  ai_description: >-
    ### General Description

    Updates the status of a specific investigation within the Rapid7 InsightIDR platform.
    This action allows users to programmatically transition investigations between
    'open' and 'closed' states. It is designed to work with a specific investigation
    identifier rather than processing entities from the SecOps environment.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Investigation ID | String | Yes | The unique identifier (UUID) of the investigation
    to be updated (e.g., 8ec8e324-4522-4a6e-9838-81496a0cadb0). |

    | Status | String | Yes | The new status to apply to the investigation. Options
    include 'open' or 'closed'. |


    ### Flow Description

    1. **Initialization**: The action initializes the Rapid7 InsightIDR manager using
    the provided API Root and API Key.

    2. **API Request**: It constructs a PUT request to the Rapid7 InsightIDR endpoint
    `/idr/v1/investigations/{investigation_id}/status/{status}`.

    3. **Response Handling**: Upon a successful request, the action retrieves the
    updated investigation details, converts them to JSON, and attaches them to the
    action results.

    4. **Error Management**: If the investigation is not found or a connection error
    occurs, the action reports a failure with a descriptive error message.


    ### Additional Notes

    This action does not utilize or filter SecOps entities. It relies entirely on
    the provided 'Investigation ID' parameter.
