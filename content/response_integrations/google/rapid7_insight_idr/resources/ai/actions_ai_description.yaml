List Investigations:
  ai_description: >-
    Lists Rapid7 InsightIDR investigations based on user-defined filters such as time
    frame and status. This action is a utility search tool that retrieves investigation
    metadata directly from the Rapid7 platform and presents it within the action results.
    It does not process or enrich specific entities within the Google SecOps environment.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Time Frame | Integer | No | The lookback period in hours from the current time
    to search for investigations. Default is 4 hours. |

    | Record limit | Integer | No | The maximum number of investigation records to
    return in the results. Default is 20. |

    | Include Closed Investigations? | Boolean | No | Determines whether to include
    investigations with a 'CLOSED' status. If false, only 'OPEN' investigations are
    returned. |


    ### Additional Notes

    - This action operates independently of the entities present in the current case
    or alert.

    - Results are provided as both a raw JSON object and a formatted data table.


    ### Flow Description

    1. **Initialization:** The action extracts the integration configuration (API
    Root, API Key) and the user-provided search parameters.

    2. **Time Calculation:** It calculates the start and end timestamps based on the
    'Time Frame' parameter to define the search window.

    3. **API Request:** The action sends a GET request to the Rapid7 InsightIDR `/idr/v1/investigations`
    endpoint with the specified filters (status, size, and time range).

    4. **Data Processing:** The retrieved investigation data is parsed into structured
    objects.

    5. **Output Generation:** The action populates the result JSON and creates a data
    table titled 'Rapid7 InsightIDR Investigations' containing key details like Title,
    Status, Source, and Assignee.
