Ping:
  ai_description: "### General Description\nThe **Ping** action is a diagnostic tool\
    \ used to verify the connectivity between Google SecOps and the Rapid7 InsightIDR\
    \ service. Its primary purpose is to ensure that the integration's configuration\
    \ parameters, such as the API Root and API Key, are correct and that the service\
    \ is reachable over the network.\n\n### Parameters Description\nThis action does\
    \ not require any action-specific parameters. It utilizes the global configuration\
    \ parameters defined at the integration level:\n\n| Parameter | Type | Mandatory\
    \ | Description |\n| :--- | :--- | :--- | :--- |\n| **API Root** | String | Yes\
    \ | The base URL for the Rapid7 InsightIDR API instance. |\n| **API Key** | String\
    \ | Yes | The API key used for authentication with the Rapid7 service. |\n| **Verify\
    \ SSL** | Boolean | No | Determines whether to verify the SSL certificate of the\
    \ API endpoint. Defaults to False if not specified. |\n\n### Flow Description\n\
    1. **Parameter Extraction**: The action retrieves the API Root, API Key, and SSL\
    \ verification settings from the integration configuration.\n2. **Manager Initialization**:\
    \ It initializes the `Rapid7InsightIDRManager` using the extracted credentials\
    \ and settings.\n3. **Connectivity Test**: The action calls the `test_connectivity`\
    \ method, which performs a GET request to the `/validate` endpoint of the Rapid7\
    \ InsightIDR API.\n4. **Execution Outcome**: \n    * If the request is successful\
    \ (HTTP 200), the action returns a success message indicating a functional connection.\n\
    \    * If an exception occurs (e.g., HTTP 401 for invalid keys or connection timeouts),\
    \ the action catches the error and reports a failure with the specific error details.\n\
    \n### Additional Notes\nThis action is strictly for system health checks and does\
    \ not interact with or modify any security data, alerts, or entities within the\
    \ environment."
