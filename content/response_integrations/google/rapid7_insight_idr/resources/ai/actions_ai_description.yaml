Create Saved Query:
  ai_description: >-
    ### General Description

    Creates a new saved query in Rapid7 InsightIDR based on user-provided parameters.
    This action allows users to define a search statement using Log Entry Query Language
    (LEQL), specify a time range, and target specific logs. The action does not interact
    with Google SecOps entities and operates as a standalone utility to manage search
    configurations within the Rapid7 platform.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Name | String | Yes | The unique name for the new saved query to be created
    in InsightIDR. |

    | Statement | String | Yes | The query logic following LEQL syntax (e.g., `where(foo=bar)`).
    |

    | Time Frame | Integer | Yes | The lookback period in hours from the current time
    for which the query should fetch data. Default is 4. |

    | Logs | String | No | A comma-separated list of log names that the query should
    execute against. If left empty, the query may apply to all or default logs depending
    on platform settings. |


    ### Additional Notes

    - This action is not entity-based and will ignore any entities present in the
    current scope.

    - If the `Logs` parameter is provided, the action will first attempt to resolve
    the log names to their internal IDs by querying the Rapid7 management API.


    ### Flow Description

    1. **Parameter Extraction**: Retrieves the API configuration and action parameters
    (Name, Statement, Time Frame, and Logs).

    2. **Log Resolution**: If log names are provided, the action calls the Rapid7
    API to fetch all available logs and filters them to find the corresponding IDs
    for the requested names.

    3. **Time Range Calculation**: Calculates the 'from' and 'to' timestamps in milliseconds
    based on the current time and the provided `Time Frame` (hours).

    4. **Query Creation**: Sends a POST request to the Rapid7 InsightIDR `/log_search/query/saved_queries`
    endpoint with the constructed LEQL statement, time range, and log IDs.

    5. **Result Handling**: If successful, the action returns the JSON details of
    the newly created saved query, including its unique ID.
  capabilities:
