Send Query:
  ai_description: >-
    ### General Description

    The **Send Query** action allows users to execute search queries against an ArcSight
    Logger instance to retrieve event logs. It is designed as an asynchronous action
    that initiates a search session, monitors its progress, and fetches the results
    once the search is complete. This action is useful for log investigation, threat
    hunting, and gathering evidence during incident response.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Query** | String | Yes | The specific search query to be executed in ArcSight
    Logger. |

    | **Max Events to Return** | Integer | No | The maximum number of events to retrieve.
    The default is 100, with a hard limit of 10,000 imposed by ArcSight Logger. |

    | **Time Frame** | String | No | The relative time range for the search (e.g.,
    '1m', '1h', '1d'). Defaults to '1h'. |

    | **Fields to Fetch** | String | No | A comma-separated list of specific fields
    to retrieve. If left empty, all available fields are returned. |

    | **Include Raw Event Data** | Boolean | No | If enabled (True), the raw event
    data will be included in the results. Defaults to True. |

    | **Local Search Only** | Boolean | No | If enabled (True), the search is restricted
    to the local logger and does not include peers. Defaults to False. |

    | **Discover Fields** | Boolean | No | If enabled (True), the search will attempt
    to discover fields within the found events. Defaults to True. |

    | **Sort** | String | No | Specifies the sorting order of the results. Options
    are 'ascending' or 'descending'. Defaults to 'ascending'. |


    ### Additional Notes

    - This is an **asynchronous** action. On the first run, it starts the query and
    returns an 'In Progress' status. Subsequent runs check the status of the search
    session until it is completed or fails.

    - The action uses AES-256 encryption to securely store the session token in the
    action's state between execution cycles.


    ### Flow Description

    1. **Initialization**: The action authenticates with the ArcSight Logger using
    the provided credentials.

    2. **Query Initiation (First Run)**: It generates a search session ID, calculates
    the time range based on the 'Time Frame' parameter, and sends the query to the
    Logger.

    3. **Status Polling**: In subsequent runs, the action checks the status of the
    search session (Starting, Running, Complete, or Error).

    4. **Data Retrieval**: Once the status is 'Complete', the action fetches the events
    based on the specified limits, sorting, and field filters.

    5. **Output**: The retrieved events are added to the case as a JSON result and
    formatted into a data table named 'Results'.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      The action adds a data table named 'Results' to the Google SecOps case containing
      the event logs retrieved from ArcSight Logger.
