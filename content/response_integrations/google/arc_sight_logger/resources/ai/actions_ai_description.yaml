Ping:
  ai_description: >-
    ### General Description

    This action is used to verify the connectivity between Google SecOps and an ArcSight
    Logger instance. It validates the integration configuration by attempting to authenticate
    and perform a basic API call to ensure the service is reachable and the credentials
    provided are correct.


    ### Parameters Description

    This action does not have any input parameters. It relies entirely on the configuration
    parameters defined at the integration level:

    * **Server Address**: The URL of the ArcSight Logger server.

    * **Username**: The username used for authentication.

    * **Password**: The password used for authentication.

    * **Verify SSL**: A boolean flag indicating whether to verify the SSL certificate
    of the server.


    ### Additional Notes

    As a 'Ping' action, its primary purpose is system health and configuration validation.
    It does not process entities or modify any data within Google SecOps or ArcSight
    Logger.


    ### Flow Description

    1. **Initialization**: The action retrieves the integration configuration (Server
    Address, Username, Password, and SSL settings).

    2. **Authentication**: It attempts to log in to the ArcSight Logger API to retrieve
    an authentication token.

    3. **Connectivity Test**: It performs a test search request to the ArcSight Logger
    API to confirm that the session is valid and the server responds correctly.

    4. **Session Termination**: It explicitly logs out of the ArcSight Logger to close
    the session.

    5. **Result Reporting**: The action returns a success status if all steps complete
    without error, or a failure status with a descriptive error message if any step
    fails.
