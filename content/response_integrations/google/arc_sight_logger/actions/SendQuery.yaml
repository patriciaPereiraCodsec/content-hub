name: Send Query
description: Send a query to get information about related events from ArcSight Logger
    event log manager.
integration_identifier: ArcSightLogger
parameters:
-   name: Query
    default_value: ''
    type: string
    description: Specify the query to send to ArcSight Logger event search.
    is_mandatory: true
-   name: Max Events to Return
    default_value: '100'
    type: string
    description: Specify the amount of events to return. Limit is 10000. This is ArcSight
        Logger limitation.
    is_mandatory: false
-   name: Time Frame
    default_value: 1h
    type: string
    description: "Specify the time frame which will be used to fetch events. \nPossible\
        \ values:\n1m - 1 minute ago\n1h - 1 hour ago\n1d - 1 day ago\nNote: You can’t\
        \ combine different values, like 1d2h30m.\n"
    is_mandatory: false
-   name: Fields to Fetch
    default_value: ''
    type: string
    description: Specify what fields to fetch from ArcSight Logger. If nothing is
        specified, then all of the available fields will be returned.
    is_mandatory: false
-   name: Include Raw Event Data
    default_value: 'True'
    type: boolean
    description: If enabled, raw event data is included in the response.
    is_mandatory: false
-   name: Local Search Only
    default_value: 'False'
    type: boolean
    description: Indicates that ArcSight Logger event search is local only, and does
        not include ArcSight Logger peers. Set to false if you want to include peers
        in the event search.
    is_mandatory: false
-   name: Discover Fields
    default_value: 'True'
    type: boolean
    description: Indicates that the ArcSight Logger search should try to discover
        fields in the events found.
    is_mandatory: false
-   name: Sort
    default_value: ascending
    type: string
    description: 'Specify what sorting method to use.

        Possible values:

        ascending

        descending

        '
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/send_query_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
is_async: true
