name: Add Tags
description: Add tags to the endpoint or detection in Vectra.
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/vectra#add_tags
integration_identifier: Vectra
parameters:
-   name: Item Type
    default_value: Endpoint
    type: ddl
    optional_values:
    - Endpoint
    - Detection
    description: Select to which item type you want to add tags.
    is_mandatory: true
-   name: Item ID
    default_value: ''
    type: string
    description: Specify ID of the detection/endpoint.
    is_mandatory: true
-   name: Tags
    default_value: ''
    type: string
    description: 'Specify what tags you want to add to detection/endpoint. Tags should
        be separated by comma, e.g tag1, tag2. '
    is_mandatory: true
dynamic_results_metadata: []
creator: admin
