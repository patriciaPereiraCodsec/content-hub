name: Vectra - Detections Connector
parameters:
-   name: DeviceProductField
    default_value: Product Name
    type: string
    description: Enter the source field name in order to retrieve the Product Field
        name.
    is_mandatory: true
    is_advanced: false
    mode: regular
-   name: EventClassId
    default_value: detection_detection_category
    type: string
    description: Enter the source field name in order to retrieve the Event Field
        name.
    is_mandatory: true
    is_advanced: false
    mode: regular
-   name: Environment Field Name
    default_value: ''
    type: string
    description: Describes the name of the field where the environment name is stored.
        If the environment field isn't found, the environment is the default environment.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Environment Regex Pattern
    default_value: .*
    type: string
    description: A regex pattern to run on the value found in the "Environment Field
        Name" field. Default is .* to catch all and return the value unchanged. Used
        to allow the user to manipulate the environment field via regex logic. If
        the regex pattern is null or empty, or the environment value is null, the
        final environment result is the default environment.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: PythonProcessTimeout
    default_value: 180
    type: integer
    description: Timeout limit for the python process running the current script.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: API Root
    default_value: https://x.x.x.x:x
    type: string
    description: API root of the Vectra server.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: API Token
    default_value: ''
    type: password
    description: API token of the Vectra account.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Lowest Threat Score To Fetch
    default_value: 50
    type: integer
    description: Lowest threat score that will be used to fetch detections. Min:0
        Max:100
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Lowest Certainty Score To Fetch
    default_value: 0
    type: integer
    description: 'Lowest certainty score that will be used to fetch detections. Min:
        0 Max: 100'
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Category Filter
    default_value: Command & Control, Botnet, Reconnaissance, Lateral Movement, Exfiltration,
        Info
    type: string
    description: 'Specify which categories of detections to ingest into Siemplify.
        Possible values: Command & Control  Botnet  Reconnaissance  Lateral Movement  Exfiltration  Info'
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Fetch Max Hours Backwards
    default_value: 1
    type: integer
    description: Number of hours before the first connector iteration to retrieve
        threats from. This parameter applies to the initial connector iteration after
        you enable the connector for the first time, or used as a fallback value in
        cases where connector's last run timestamp expires.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Max Detections To Fetch
    default_value: 25
    type: integer
    description: How many detections to process per one connector iteration. Limit
        is 5000. This is a Vectra limitation.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Use whitelist as a blacklist
    default_value: false
    type: boolean
    description: If enabled, whitelist will be used as a blacklist.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Verify SSL
    default_value: true
    type: boolean
    description: If enabled, verify the SSL certificate for the connection to the
        Vectra server is valid.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Proxy Server Address
    default_value: ''
    type: string
    description: The address of the proxy server to use.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Proxy Username
    default_value: ''
    type: string
    description: The proxy username to authenticate with.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Proxy Password
    default_value: ''
    type: password
    description: The proxy password to authenticate with.
    is_mandatory: false
    is_advanced: false
    mode: script
description: Vectra - Detections Connector
integration: Vectra
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/vectra#vectra-detections-connector
rules: []
is_connector_rules_supported: false
creator: admin
