Remove Tags:
  ai_description: >-
    Removes specified tags from a Vectra Endpoint or Detection based on a provided
    ID. This action first retrieves the current tags associated with the item, identifies
    the tags to be removed, and then updates the item in Vectra with the revised tag
    list.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Item Type | String | Yes | The type of item to target: 'Endpoint' or 'Detection'.
    |

    | Item ID | String | Yes | The unique ID of the endpoint or detection in Vectra.
    |

    | Tags | String | Yes | A comma-separated list of tags to be removed (e.g., 'tag1,
    tag2'). |


    ### Flow Description

    1. **Fetch Item Info:** The action retrieves the current metadata (including tags)
    for the specified Item ID and Type from Vectra using a GET request.

    2. **Tag Comparison:** It compares the provided tags to remove against the existing
    tags on the item to determine which ones can be successfully deleted.

    3. **Update Tags:** If matches are found, it sends a PATCH request to the Vectra
    tagging endpoint with the updated tag list (the original list minus the tags specified
    for removal).
