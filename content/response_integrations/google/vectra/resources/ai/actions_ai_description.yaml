    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: false
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
Enrich Endpoint:
  ai_description: >-
    ### General Description

    The **Enrich Endpoint** action retrieves comprehensive system information for
    **Hostname** and **IP Address** entities from the Vectra platform. It provides
    security analysts with critical context, including threat and certainty scores,
    host state, associated tags, and network metadata to assist in incident investigation.


    ### Parameters Description

    There are no action-specific parameters for this action. It utilizes the global
    integration configuration parameters:

    * **API Root**: The endpoint URL for the Vectra API.

    * **API Token**: The authentication token for Vectra.

    * **Verify SSL**: Boolean flag to enable or disable SSL certificate verification.


    ### Flow Description

    1. **Entity Identification**: The action filters the target entities in the current
    context, selecting only those of type `HOSTNAME` or `ADDRESS`.

    2. **Vectra Query**: For each identified entity, the action queries the Vectra
    API (`/api/v2.1/hosts`) using the entity's identifier (name for hostnames, IP
    for addresses).

    3. **Result Filtering**: The action processes the paginated results from Vectra
    and performs a case-insensitive match against the entity's identifier to ensure
    data accuracy.

    4. **Data Enrichment**: For matching endpoints, the action:
        *   Flattens the Vectra host metadata and updates the entity's `additional_properties`
    with a 'Vectra' prefix.
        *   Sets the entity's `is_enriched` attribute to `True`.
        *   Generates a detailed data table for the entity within the SOAR interface.
    5. **Internal Update**: The action updates the modified entities within Google
    SecOps and attaches the raw JSON results to the action output.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entity additional properties with Vectra host metadata and sets the
      is_enriched flag to true.
  categories:
    enrichment: true
  entity_usage:
    entity_types:
    - ADDRESS
    - HOSTNAME
