Update Note:
  ai_description: >-
    ### General Description

    Updates the note associated with a specific item in Vectra, which can be either
    an Endpoint or a Detection. This action is used to append or modify administrative
    or investigative notes directly within the Vectra platform for better tracking
    and collaboration.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Item Type | String (Dropdown) | Yes | Specifies the type of Vectra object to
    update. Options are 'Endpoint' or 'Detection'. |

    | Item ID | String | Yes | The unique identifier of the specific endpoint or detection
    in Vectra. |

    | Note | String | Yes | The text content to be set as the note for the specified
    item. |


    ### Flow Description

    1. **Initialization**: The action initializes the Vectra Manager using the provided
    API credentials and configuration.

    2. **Validation**: It first attempts to retrieve information about the specified
    item (Endpoint or Detection) using the provided `Item ID` to ensure it exists.

    3. **Mutation**: If the item is found, the action sends a PATCH request to the
    Vectra API to update the 'note' field with the provided text.

    4. **Completion**: The action returns a success message if the update is confirmed
    by the API, or an error message if the item is not found or the update fails.
