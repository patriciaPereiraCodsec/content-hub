Get Triage Rule Details:
  ai_description: >-
    ### General Description

    Retrieves detailed information about specific triage rules from the Vectra platform
    using their unique identifiers. This action is useful for security analysts to
    understand the logic and categorization behind specific detections and triage
    decisions within Vectra.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Triage Rule IDs | String | Yes | A comma-separated list of triage rule IDs to
    retrieve details for (e.g., "28,29"). |

    | Create Insights | Boolean | No | If enabled (default), the action will create
    a separate case insight for every successfully processed triage rule. |


    ### Flow Description

    1. **Parameter Extraction**: The action parses the comma-separated string of Triage
    Rule IDs provided by the user.

    2. **API Interaction**: For each ID, the action makes a GET request to the Vectra
    API endpoint `/api/v2.1/rules/{triage_id}`.

    3. **Data Processing**: The retrieved data is parsed into a structured triage
    rule object containing fields like Detection Category, Triage Category, and Description.

    4. **Internal Mutation (Optional)**: If the 'Create Insights' parameter is true,
    the action generates a case insight for each rule found.

    5. **Output Generation**: The action produces a JSON result containing the full
    details of all found rules and populates a data table named 'Triage Rules Details'
    in the case wall.


    ### Additional Notes

    This action does not process entities from the case scope; it relies entirely
    on the IDs provided in the input parameters.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
