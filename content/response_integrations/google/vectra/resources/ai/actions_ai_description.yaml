Add Tags:
  ai_description: >-
    Adds tags to a specific Endpoint or Detection in Vectra. This action allows users
    to append new tags to existing ones for better categorization and tracking within
    the Vectra platform. It first retrieves the current state of the item to ensure
    existing tags are preserved before applying the update.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Item Type | String (Enum) | Yes | Select the type of item to tag. Options are
    'Endpoint' or 'Detection'. |

    | Item ID | String | Yes | The unique identifier of the detection or endpoint
    in Vectra. |

    | Tags | String | Yes | A comma-separated list of tags to add (e.g., 'tag1, tag2').
    |


    ### Flow Description

    1. **Initialization**: Connects to the Vectra API using the provided credentials
    and configuration.

    2. **Data Retrieval**: Fetches the current information for the specified Item
    ID and Item Type to retrieve the existing tags.

    3. **Tag Processing**: Parses the input tags string into a list and merges them
    with the item's current tags to avoid overwriting existing data.

    4. **External Update**: Sends a PATCH request to the Vectra API to update the
    item with the new combined list of tags.

    5. **Completion**: Reports success if the update is accepted by Vectra, or handles
    specific exceptions if the item is not found or the update fails.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Updates the 'tags' attribute of an Endpoint or Detection object in Vectra via
      a PATCH request.
    fetches_data: true
    internal_data_mutation_explanation: null
  categories:
    enrichment: false
  entity_usage:
    entity_types: []
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
