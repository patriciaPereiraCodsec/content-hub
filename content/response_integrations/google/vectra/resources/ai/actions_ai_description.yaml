Ping:
  ai_description: "### General Description\nThe **Ping** action is a diagnostic tool\
    \ designed to verify the connectivity between Google SecOps and the Vectra server.\
    \ It ensures that the provided API credentials (API Root and API Token) are valid\
    \ and that the network path is open. This action is typically used during the\
    \ initial setup of the Vectra integration or for troubleshooting connection issues.\n\
    \n### Parameters Description\n| Parameter | Type | Mandatory | Description |\n\
    | :--- | :--- | :--- | :--- |\n| API Root | String | Yes | The base URL of the\
    \ Vectra instance (e.g., `https://<vectra_hostname>`). |\n| API Token | String\
    \ | Yes | The API token used for authenticating requests to the Vectra API. |\n\
    | Verify SSL | Boolean | Yes | Specifies whether to verify the SSL certificate\
    \ of the Vectra server. Default is `True`. |\n\n### Additional Notes\n- This action\
    \ does not process any entities.\n- It performs a simple `GET` request to the\
    \ `/api/v2.1/hosts` endpoint to validate the connection.\n\n### Flow Description\n\
    1. **Parameter Extraction**: The action retrieves the `API Root`, `API Token`,\
    \ and `Verify SSL` settings from the integration configuration.\n2. **Manager\
    \ Initialization**: It initializes the `VectraManager` with the provided connection\
    \ details.\n3. **Connectivity Test**: The manager executes the `test_connectivity`\
    \ method, which sends a `GET` request to the Vectra hosts endpoint.\n4. **Result\
    \ Handling**: \n    - If the request is successful (HTTP 200), the action completes\
    \ with a success message.\n    - If the request fails (e.g., invalid token, network\
    \ timeout), an exception is caught, and the action reports a failure with the\
    \ error details."
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: false
    internal_data_mutation_explanation: null
  categories:
    enrichment: false
