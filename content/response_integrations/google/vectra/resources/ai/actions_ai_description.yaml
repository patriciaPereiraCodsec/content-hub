Update Detection Status:
  ai_description: "Updates the status of a specific detection within the Vectra platform.\
    \ This action allows analysts to programmatically mark detections as 'Fixed' or\
    \ 'Inactive' based on their investigation results. \n\n### Parameters\n| Parameter\
    \ | Type | Mandatory | Description |\n| :--- | :--- | :--- | :--- |\n| Detection\
    \ ID | Integer | Yes | The unique identifier of the detection in Vectra that needs\
    \ a status update. |\n| Status | String | Yes | The new status to apply to the\
    \ detection. Supported values are 'Fixed' and 'Inactive'. |\n\n### Flow Description\n\
    1. **Initialization**: Retrieves the Vectra API configuration (Root URL, Token,\
    \ and SSL verification) and the action parameters (Detection ID and Status).\n\
    2. **API Interaction**: Uses the Vectra Manager to send a PATCH request to the\
    \ Vectra API endpoint.\n3. **Status Mapping**: If the 'Status' parameter is set\
    \ to 'Fixed', it sends a 'mark_as_fixed' flag as True; otherwise, it is set to\
    \ False.\n4. **Execution Result**: Confirms the successful update or catches exceptions\
    \ (such as unknown tags or connection errors) and reports the failure to the SOAR\
    \ case wall."
