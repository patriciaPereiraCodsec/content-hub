name: Remove Ips from group
description: Remove IP addresses from an address group
integration_identifier: PaloAltoPanorama
parameters:
-   name: Device Name
    default_value: ''
    type: string
    description: Specify name of the device. The default device name for Palo Alto
        Panorama is localhost.localdomain. Visit action documentation to get more
        insights on where you can find this value.
    is_mandatory: true
-   name: Device Group Name
    default_value: LCaaS
    type: string
    description: Specify name of the device group. Visit action documentation to get
        more insights on where you can find this value.
    is_mandatory: true
-   name: Address Group Name
    default_value: ''
    type: string
    description: Specify name of the address group.
    is_mandatory: true
dynamic_results_metadata:
-   result_example_path: resources/remove_ip_from_group_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
simulation_data_json: '{"Entities": ["ADDRESS"]}'
script_result_name: success
