name: Block Urls
description: 'Add URLs to a given URL category. Note:  You need to create a policy
    and add desired URL category to that policy in order to block the URL'
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/palo-alto-panorama#block_urls
integration_identifier: PaloAltoPanorama
parameters:
-   name: Device Name
    default_value: ''
    type: string
    description: Specify name of the device. The default device name for Palo Alto
        Panorama is localhost.localdomain. Visit action documentation to get more
        insights on where you can find this value.
    is_mandatory: true
-   name: Device Group Name
    default_value: ''
    type: string
    description: Specify name of the device group. Visit action documentation to get
        more insights on where you can find this value.
    is_mandatory: true
-   name: URL Category Name
    default_value: ''
    type: string
    description: Specify name of the URL Category.
    is_mandatory: true
dynamic_results_metadata:
-   result_example_path: resources/block_ur_ls_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
simulation_data_json: '{"Entities": ["DestinationURL"]}'
script_result_name: success
