name: Get Blocked Applications
description: List all blocked applications in a given policy
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/palo-alto-panorama#get_blocked_applications
integration_identifier: PaloAltoPanorama
parameters:
-   name: Device Name
    default_value: localhost.localdomain
    type: string
    description: Specify name of the device. The default device name for Palo Alto
        Panorama is localhost.localdomain. Visit action documentation to get more
        insights on where you can find this value.
    is_mandatory: true
-   name: Device Group Name
    default_value: ''
    type: string
    description: Specify name of the device group. Visit action documentation to get
        more insights on where you can find this value.
    is_mandatory: true
-   name: Policy Name
    default_value: ''
    type: string
    description: Specify name of the policy.
    is_mandatory: true
dynamic_results_metadata:
-   result_example_path: resources/get_blocked_applications_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
script_result_name: blocked_applications
