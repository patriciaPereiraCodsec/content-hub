name: Commit Changes
description: 'Action commits changes in Palo Alto Panorama. Note: In order to use
    "Only My Changes" option, the user must be an admin.'
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/palo-alto-panorama#commit_changes
integration_identifier: PaloAltoPanorama
parameters:
-   name: Only My Changes
    default_value: 'true'
    type: boolean
    description: If enabled, action will only commit changes that were done by the
        current user.
    is_mandatory: true
dynamic_results_metadata: []
creator: admin
is_async: true
script_result_name: success
