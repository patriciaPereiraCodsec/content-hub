name: Search logs
description: Search logs in Palo Alto Panorama based on the query.
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/palo-alto-panorama#search_logs
integration_identifier: PaloAltoPanorama
parameters:
-   name: Log Type
    default_value: Traffic
    type: ddl
    optional_values:
    - Traffic
    - Threat
    - URL Filtering
    - WildFire Submissions
    - Data Filtering
    - HIP Match
    - IP Tag
    - User ID
    - Tunnel Inspection
    - Configuration
    - System
    - Authentication
    description: Specify which log type should be returned.
    is_mandatory: true
-   name: Query
    default_value: ''
    type: string
    description: Specify what query filter should be used to return logs.
    is_mandatory: false
-   name: Max Hours Backwards
    default_value: ''
    type: string
    description: Specify the amount of hours from where to fetch logs.
    is_mandatory: false
-   name: Max Logs to Return
    default_value: '50'
    type: string
    description: Specify how many logs to return. Maximum is 1000.
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/search_logs_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
is_async: true
