name: Push Changes
description: 'Push commits of a device group in Palo Alto Panorama. Note: It can take
    several minutes before changes are pushed. '
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/palo-alto-panorama#push_changes
integration_identifier: PaloAltoPanorama
parameters:
-   name: Device Group Name
    default_value: ''
    type: string
    description: 'The device group in which the rule is located, e.g: LCaas. For viewing
        the available device group names in a given device, please refer to https://<PANORAMA
        IP>/php/rest/browse.php/config::devices::entry[@name=''<DEVICE_NAME>'']::device-group.'
    is_mandatory: true
dynamic_results_metadata: []
creator: admin
is_async: true
script_result_name: success
