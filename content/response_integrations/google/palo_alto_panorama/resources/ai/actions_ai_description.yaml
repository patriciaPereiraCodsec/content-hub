Unblock Urls:
  ai_description: >-
    ### General Description

    Removes URL entities from a specific custom URL category in Palo Alto Panorama.
    This action is used to manage URL filtering policies by programmatically unblocking
    or removing specific URLs from existing categories within a defined Device Group
    and Device.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Device Name | String | Yes | The name of the target device. For Panorama, this
    is typically 'localhost.localdomain'. |

    | Device Group Name | String | Yes | The name of the device group where the URL
    category is defined. |

    | URL Category Name | String | Yes | The name of the custom URL category from
    which the URLs will be removed. |


    ### Flow Description

    1. **Initialization**: Extracts connection details (API Root, credentials) and
    action parameters (Device Name, Device Group, Category Name).

    2. **Entity Filtering**: Identifies all URL entities within the current context.

    3. **URL Normalization**: Cleans the URL identifiers by replacing HTML-encoded
    ampersands.

    4. **External Mutation**: For each identified URL, it calls the Panorama API to
    delete the URL member from the specified custom URL category.

    5. **Verification**: After the removal attempts, it fetches the current list of
    URLs in that category to provide an updated state.

    6. **Reporting**: Returns a summary of successfully removed URLs and any that
    failed the operation.


    ### Additional Notes

    This action performs a state change on the Palo Alto Panorama configuration by
    deleting entries from a policy object. It does not automatically perform a 'Commit'
    operation; changes may need to be committed to the Panorama device to take effect
    on the firewalls.
