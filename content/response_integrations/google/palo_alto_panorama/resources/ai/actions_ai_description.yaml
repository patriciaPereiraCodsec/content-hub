Block ips in policy:
  ai_description: >-
    Blocks IP address entities within a specific Palo Alto Panorama security policy.
    This action interacts with the Panorama XML API to ensure that the target IP addresses
    are represented as address objects and then updates the specified policy rule's
    source or destination fields to include these IPs.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Device Name | String | Yes | The name of the target device (e.g., 'localhost.localdomain').
    |

    | Device Group Name | String | Yes | The name of the device group where the policy
    is located. |

    | Policy Name | String | Yes | The specific security policy rule to modify. |

    | Target | String | Yes | Specifies which field in the policy to update. Must
    be either 'source' or 'destination'. |


    ### Flow Description

    1. **Parameter Extraction:** Retrieves the Panorama connection details and action
    parameters (Device Name, Group, Policy, and Target).

    2. **Entity Filtering:** Identifies all 'ADDRESS' entities provided in the current
    context.

    3. **Address Object Verification:** For each IP, the action checks if a corresponding
    address object exists in Panorama. If not, it automatically creates one.

    4. **Policy Mutation:** Updates the specified security policy rule by adding the
    IP addresses to the chosen target field (source or destination).

    5. **Result Reporting:** Retrieves the final list of blocked IPs from the policy
    and returns it as a JSON result, providing a summary of successful and failed
    operations.
