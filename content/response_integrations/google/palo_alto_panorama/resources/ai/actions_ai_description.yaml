Edit Blocked Applications:
  ai_description: >-
    Modifies the list of blocked applications within a specific security policy on
    Palo Alto Panorama. This action allows for the simultaneous addition of new applications
    to a blocklist and the removal of existing ones. It interacts with the Panorama
    API to fetch the current candidate configuration, updates the application members
    of the specified policy, and returns the updated list of blocked applications.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Device Name | String | Yes | The name of the target device. The default for
    Panorama is usually 'localhost.localdomain'. |

    | Device Group Name | String | Yes | The name of the device group where the policy
    is located. |

    | Policy Name | String | Yes | The name of the security policy to be modified.
    |

    | Applications To Block | String | No | A comma-separated list of application
    names to add to the policy's block list (e.g., 'apple-siri, windows-azure'). |

    | Applications To UnBlock | String | No | A comma-separated list of application
    names to remove from the policy's block list. |


    ### Additional Notes

    * Either 'Applications To Block' or 'Applications To UnBlock' (or both) must contain
    values for the action to perform a mutation. If both are empty, the action will
    finish with a 'false' result and no changes will be made.

    * This action modifies the candidate configuration; a separate 'Commit' action
    may be required to push changes to the running configuration.


    ### Flow Description

    1. **Initialization**: The action retrieves connection details and user-provided
    parameters including the target device, group, policy, and the lists of applications
    to modify.

    2. **Data Parsing**: It converts the comma-separated input strings for blocking
    and unblocking into sets for processing.

    3. **Configuration Retrieval**: If changes are requested, it connects to Panorama
    and retrieves the current candidate configuration to identify existing applications
    in the specified policy.

    4. **Policy Modification**: It calculates the new set of applications by adding
    the 'Applications To Block' and removing the 'Applications To UnBlock' from the
    current list.

    5. **API Update**: If the list has changed, it sends a delete request for the
    existing application list and a set request for the new list to the Panorama API.

    6. **Verification**: It fetches the updated list of applications from the rule
    to confirm the changes.

    7. **Output**: The action returns a success message detailing the affected applications
    and provides the final list of blocked applications in the JSON result.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      The action modifies the security policy configuration on Palo Alto Panorama
      by adding or removing applications from the 'application' field of a specific
      rule via API 'delete' and 'set' actions.
