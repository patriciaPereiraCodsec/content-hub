Get Correlated Traffic Between IPs:
  ai_description: >-
    ### General Description

    The **Get Correlated Traffic Between IPs** action retrieves network traffic logs
    from Palo Alto Panorama that match specific source and destination IP address
    pairs. This action is designed to help security analysts investigate communication
    patterns between specific network nodes by querying Panorama's traffic logs over
    a specified historical window.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Source IP** | String | Yes | A comma-separated list of source IP addresses
    to include in the query. |

    | **Destination IP** | String | Yes | A comma-separated list of destination IP
    addresses to include in the query. |

    | **Max Hours Backwards** | Integer | No | The number of hours to look back from
    the current time for relevant logs. |

    | **Max Logs to Return** | Integer | No | The maximum number of log entries to
    retrieve per query (Default: 50, Max: 1000). |


    ### Additional Notes

    - Both **Source IP** and **Destination IP** are mandatory for the action to execute.

    - The action processes IP pairs based on their position in the provided lists
    (e.g., the first Source IP is matched with the first Destination IP).

    - This is an asynchronous action that initiates a search job on Panorama and polls
    for completion.

    - Results are provided as both a JSON object and formatted CSV data tables for
    each IP pair.


    ### Flow Description

    1. **Parameter Extraction**: The action retrieves the Source IP, Destination IP,
    timeframe, and log limit from the user input.

    2. **Job Initialization**: It constructs a Panorama-specific query for each IP
    pair and sends a request to Panorama to start a log search job.

    3. **Asynchronous Polling**: The action enters an "In Progress" state, periodically
    checking the status of each job ID on the Panorama server until the search is
    complete.

    4. **Result Retrieval**: Once a job is marked as finished, the action retrieves
    the resulting traffic logs from the server.

    5. **Data Formatting**: The logs are converted into JSON format and CSV tables,
    which are then attached to the action's output in Google SecOps.
