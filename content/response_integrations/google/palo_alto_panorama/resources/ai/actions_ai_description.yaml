Push Changes:
  ai_description: >-
    ### General Description

    The **Push Changes** action triggers a commit and push operation in Palo Alto
    Panorama for a specific device group. This action is used to apply pending configuration
    changes from Panorama to the managed devices within the designated group. It is
    an asynchronous action, meaning it initiates the push job and then periodically
    polls the Panorama API to monitor the job's progress until completion.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Device Group Name** | String | Yes | The name of the device group in Panorama
    where the changes should be pushed. This identifies the scope of the commit operation.
    |


    ### Flow Description

    1. **Initialization**: The action connects to the Palo Alto Panorama instance
    using the provided credentials and API root.

    2. **Initiation (First Run)**: It sends a request to Panorama to start a 'commit-all'
    operation for the specified `Device Group Name`. Panorama returns a Job ID.

    3. **Status Polling (Subsequent Runs)**: Because the action is asynchronous, it
    enters a polling phase. It uses the Job ID to check the status of the push operation.

    4. **Completion**: The action continues to poll until the job status reaches a
    finished state ('FIN'). It then evaluates the result to determine if the push
    was successful or if it failed, providing detailed error messages from Panorama
    if a failure occurs.


    ### Additional Notes

    - This action can take several minutes to complete depending on the size of the
    configuration and the number of devices in the group.

    - It does not process or require any specific SecOps entities (like IPs or Hostnames)
    to run.
