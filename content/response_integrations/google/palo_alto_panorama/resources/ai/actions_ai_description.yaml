Ping:
  ai_description: >-
    ### General Description

    The **Ping** action is a diagnostic utility designed to verify the connectivity
    and authentication between Google SecOps and a Palo Alto Panorama instance. Its
    primary purpose is to ensure that the integration configuration (API Root, credentials,
    and SSL settings) is valid and that the Panorama API is reachable.


    ### Parameters Description

    This action does not have any action-specific parameters. It utilizes the global
    integration configuration parameters:


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Api Root | String | Yes | The base URL of the Palo Alto Panorama server. |

    | Username | String | Yes | The username used to authenticate with Panorama. |

    | Password | String | Yes | The password used to authenticate with Panorama. |

    | Verify SSL | Boolean | No | If enabled, the action will verify the SSL certificate
    of the Panorama server. Defaults to True. |


    ### Additional Notes

    This action is a standard connectivity test. It does not process entities or modify
    any data within Panorama or Google SecOps. It is strictly used for verifying the
    health of the integration link.


    ### Flow Description

    1. **Parameter Extraction**: The action retrieves the API Root, Username, Password,
    and SSL verification settings from the integration's configuration.

    2. **Manager Initialization**: It initializes the `PanoramaManager` class, which
    serves as the interface for the Panorama API.

    3. **Authentication (Keygen)**: During initialization, the manager sends a POST
    request to the Panorama server's `keygen` endpoint using the provided credentials.

    4. **Response Validation**: The action parses the XML response from Panorama.
    If a valid API key is returned, the connection is confirmed.

    5. **Final Output**: The action reports a successful connection message and returns
    a boolean 'true' result to the SOAR platform.
