Commit Changes:
  ai_description: >-
    Commits pending configuration changes to Palo Alto Panorama. This action is essential
    for applying staged administrative changes to the active running configuration
    of the Panorama management server. It operates asynchronously, meaning it initiates
    a commit job and then periodically polls the server to verify the job's completion
    status.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Only My Changes | Boolean | Yes | If enabled, the action will only commit changes
    made by the current administrator. Note: This specific functionality requires
    the user to have administrative privileges on the Panorama server. |


    ### Flow Description

    1. **Initiation**: The action sends a request to Panorama to start a commit operation
    based on the 'Only My Changes' parameter.

    2. **Job Tracking**: Upon successful initiation, the server returns a Job ID,
    and the action enters an 'In Progress' state.

    3. **Status Polling**: In subsequent execution cycles, the action uses the Job
    ID to poll the Panorama API for the current status of the commit job.

    4. **Completion**: The action concludes once the job status reaches 'FIN' (Finished).
    It then reports whether the commit was successful or if it failed based on the
    result returned by the server.


    ### Additional Notes

    - This action is marked as asynchronous (`IsAsync: true`), allowing the SOAR platform
    to perform other tasks while waiting for the network device to process the configuration
    change.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Commits the candidate configuration to the running configuration on the Palo
      Alto Panorama server, effectively applying all pending changes to the system.
