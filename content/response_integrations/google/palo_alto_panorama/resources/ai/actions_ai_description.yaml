Search logs:
  ai_description: >-
    ### General Description

    The **Search logs** action allows users to perform targeted searches within Palo
    Alto Panorama logs. It supports various log types such as Traffic, Threat, and
    System logs, and utilizes a query-based filtering mechanism to retrieve specific
    security events. This action is designed to be asynchronous, meaning it initiates
    a search job on the Panorama server and polls for completion before retrieving
    and displaying the results.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Log Type** | String (Enum) | Yes | Specifies the category of logs to search.
    Options include Traffic, Threat, URL Filtering, WildFire Submissions, Data Filtering,
    HIP Match, IP Tag, User ID, Tunnel Inspection, Configuration, System, and Authentication.
    |

    | **Query** | String | No | The filter expression used to define the search criteria
    (e.g., source or destination IP filters). |

    | **Max Hours Backwards** | Integer | No | Defines the time window for the search,
    specifying how many hours back from the current time to look for logs. |

    | **Max Logs to Return** | Integer | No | Limits the number of results returned
    by the search. The maximum allowed value is 1000, with a default of 50. |


    ### Flow Description

    1. **Initialization:** The action extracts the connection configuration and search
    parameters (Log Type, Query, Time Range, and Limit).

    2. **Job Creation:** It sends a request to the Palo Alto Panorama API to initialize
    a log search job based on the provided criteria.

    3. **Asynchronous Polling:** Because log searches can take time, the action enters
    an 'In Progress' state. It periodically checks the status of the job ID returned
    by Panorama.

    4. **Data Retrieval:** Once the Panorama server reports that the job is finished,
    the action fetches the log entries associated with that job ID.

    5. **Result Processing:** The retrieved logs are converted into JSON format for
    programmatic use and a CSV-formatted data table for visual representation in the
    Google SecOps case wall.


    ### Additional Notes

    - This action does not run on specific entities; it is a global search action
    based on the provided query string.

    - If no logs match the query, the action will complete successfully but indicate
    that no results were found.
