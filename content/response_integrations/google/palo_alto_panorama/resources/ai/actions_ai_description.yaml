Get Blocked Applications:
  ai_description: >-
    ### General Description

    Retrieves a list of applications that are explicitly blocked within a specific
    security policy on Palo Alto Panorama. This action allows users to audit security
    rules and verify which applications are restricted under a given policy context
    (Device and Device Group).


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Device Name | String | Yes | The name of the target device. The default for
    Panorama is 'localhost.localdomain'. |

    | Device Group Name | String | Yes | The name of the device group where the security
    policy is defined. |

    | Policy Name | String | Yes | The specific name of the security policy (rule)
    to inspect for blocked applications. |


    ### Additional Notes

    This action does not operate on specific entities (like IPs or Hosts) but rather
    queries the global configuration of the Panorama management server based on the
    provided policy parameters.


    ### Flow Description

    1. **Authentication**: Connects to the Palo Alto Panorama server and retrieves
    an API key.

    2. **Configuration Retrieval**: Fetches the full candidate configuration XML from
    the server using an operational command.

    3. **Parsing**: Utilizes XPath to navigate the XML structure and locate the specific
    security rule defined by the Device Name, Device Group Name, and Policy Name.

    4. **Extraction**: Identifies and extracts all application members listed within
    the 'application' section of the rule.

    5. **Result Generation**: Returns the list of blocked applications as a JSON array
    and provides a formatted output message for the case wall.
