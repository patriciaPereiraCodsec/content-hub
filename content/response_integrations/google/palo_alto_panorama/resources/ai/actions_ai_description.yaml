    3. **Removal Logic**: For each identified IP, the action calls the Panorama API
    to remove the specific IP from the designated address group.

    4. **Verification**: After removal attempts, it fetches the updated list of addresses
    currently in the group to confirm the state.

    5. **Reporting**: Updates the action results with a JSON list of current group
