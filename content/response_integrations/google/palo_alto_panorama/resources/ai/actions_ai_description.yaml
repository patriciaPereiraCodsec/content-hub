Add Ips to group:
  ai_description: >-
    Adds IP address entities to a specific static address group in Palo Alto Panorama.
    This action ensures that each IP address has a corresponding address object in
    Panorama before adding it to the group. If an address object does not exist for
    a given IP, the action automatically creates one. It then updates the group's
    membership and returns the final list of all IP addresses currently in the group
    as a JSON result.


    ### Parameters

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Device Name | String | Yes | The name of the target device. The default for
    Panorama is 'localhost.localdomain'. |

    | Device Group Name | String | Yes | The name of the device group where the address
    group is located. |

    | Address Group Name | String | Yes | The name of the static address group to
    which the IPs will be added. |


    ### Flow Description

    1. **Initialization**: Retrieves connection settings (API Root, credentials) and
    action parameters (Device Name, Device Group Name, Address Group Name).

    2. **Entity Filtering**: Identifies all `ADDRESS` entities from the target entities
    list.

    3. **Address Object Verification**: For each identified IP, the action checks
    if a corresponding address object already exists in the specified Panorama device
    group.

    4. **Object Creation**: If an address object is missing for an IP, the action
    creates a new address object using the IP as the name and value.

    5. **Group Membership Update**: Adds the IPs to the specified static address group.

    6. **Final Retrieval**: Fetches the updated list of all members in the address
    group to confirm the current state.

    7. **Reporting**: Returns a success message listing the added IPs and provides
    the full group membership in JSON format.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Creates new address objects in Palo Alto Panorama if they do not already exist
      and modifies the static membership of the specified address group.
    fetches_data: true
    internal_data_mutation_explanation: null
  categories:
    enrichment: false
