Unblock ips in policy:
  ai_description: >-
    Unblocks IP Address entities within a specific security policy on Palo Alto Panorama.
    This action modifies the configuration of the firewall by removing specified IP
    addresses from either the source or destination fields of a security rule.


    ### Parameters Description


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Device Name | String | Yes | The name of the target device in Panorama (e.g.,
    'localhost.localdomain'). |

    | Device Group Name | String | Yes | The name of the device group where the policy
    is located. |

    | Policy Name | String | Yes | The name of the security policy/rule to be modified.
    |

    | Target | String | Yes | Specifies which field to modify. Must be either 'source'
    or 'destination'. |


    ### Flow Description


    1.  **Initialization**: The action retrieves connection details (API Root, credentials)
    and action parameters (Device Name, Group, Policy, and Target).

    2.  **Validation**: It validates that the 'Target' parameter is set to either
    'source' or 'destination'.

    3.  **Entity Filtering**: It identifies all 'ADDRESS' entities from the input
    list to be processed.

    4.  **External Mutation**: For each identified IP, it calls the Panorama API to
    remove the IP from the specified policy's source or destination list. This involves
    fetching the current list, removing the entry, and updating the configuration
    on the Panorama server.

    5.  **Result Retrieval**: After the removal process, it fetches the final state
    of the blocked IPs for that policy to provide as output.

    6.  **Finalization**: The action reports which IPs were successfully unblocked
    and which failed, returning the updated policy data in JSON format.
