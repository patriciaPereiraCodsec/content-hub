Block Urls:
  ai_description: "Adds URL entities to a specified URL category on a Palo Alto Panorama\
    \ device. This action is used to dynamically update blocklists or filtering categories\
    \ within the Panorama configuration. \n\n### Flow Description:\n1. **Parameter\
    \ Extraction:** Retrieves the Panorama connection details and action parameters\
    \ including Device Name, Device Group Name, and the target URL Category Name.\n\
    2. **Entity Filtering:** Identifies and collects all URL entities from the current\
    \ context, performing necessary XML character escaping (e.g., ampersands).\n3.\
    \ **Existing Data Retrieval:** Connects to the Panorama API to fetch the current\
    \ list of URLs already present in the specified category to avoid duplicates.\n\
    4. **External Mutation:** Sends a configuration update request to Panorama to\
    \ add the new URLs to the custom URL category.\n5. **Verification and Reporting:**\
    \ Retrieves the final list of URLs in the category after the update and provides\
    \ a summary of successful and failed additions.\n\n### Parameters Description:\n\
    | Parameter Name | Type | Mandatory | Description |\n| :--- | :--- | :--- | :---\
    \ |\n| Device Name | String | Yes | The name of the target device in Panorama\
    \ (e.g., localhost.localdomain). |\n| Device Group Name | String | Yes | The name\
    \ of the device group where the URL category is defined. |\n| URL Category Name\
    \ | String | Yes | The name of the custom URL category to which the URLs will\
    \ be added. |\n\n### Additional Notes:\n* **Policy Requirement:** Simply adding\
    \ a URL to a category does not block it; a security policy must be configured\
    \ in Panorama that references this URL category with a 'block' action.\n* **Commit\
    \ Requirement:** Changes made by this action are applied to the candidate configuration\
    \ and may require a separate 'Commit' action to become active on the firewall\
    \ devices."
