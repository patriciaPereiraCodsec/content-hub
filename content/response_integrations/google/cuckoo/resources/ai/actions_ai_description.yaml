Ping:
  ai_description: >-
    ### General Description

    This action is designed to verify the connectivity between Google SecOps and a
    Cuckoo Sandbox instance. It serves as a health check to ensure that the provided
    configuration parameters (such as API Root and credentials) are correct and that
    the Cuckoo server is reachable and responding to status requests.


    ### Parameters Description

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Api Root | String | Yes | The base URL of the Cuckoo API server (e.g., `http://127.0.0.1:8090`).
    |

    | Web Interface Address | String | Yes | The URL of the Cuckoo web interface used
    for constructing report links. |

    | CA Certificate File | String | No | A base64 encoded CA certificate file used
    for SSL verification. |

    | Verify SSL | Boolean | Yes | If enabled, the action will verify the SSL certificate
    of the Cuckoo server. Defaults to `False`. |

    | API Token | String | No | The Bearer token used for authentication if the Cuckoo
    API requires it. |


    ### Additional Notes

    - This action does not process any entities.

    - It is primarily used during the initial setup or troubleshooting of the Cuckoo
    integration.


    ### Flow Description

    1. **Configuration Extraction**: The action retrieves the connection details (API
    Root, Web Interface Address, SSL settings, and API Token) from the integration
    settings.

    2. **Manager Initialization**: It initializes the `CuckooManager` which handles
    the HTTP session and SSL configuration (including decoding the CA certificate
    if provided).

    3. **Connectivity Test**: The action calls the `/cuckoo/status` endpoint of the
    Cuckoo API using a GET request.

    4. **Result Handling**: If the request is successful (HTTP 200), the action concludes
    with a success message. If an error occurs (e.g., connection timeout, 401 Unauthorized),
    an exception is raised and reported to the user.
