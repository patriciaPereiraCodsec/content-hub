name: Intsights Connector
parameters:
-   name: DeviceProductField
    default_value: Details_Source_NetworkType
    type: string
    description: The field name used to determine the device product
    is_mandatory: true
    is_advanced: false
    mode: regular
-   name: EventClassId
    default_value: Details_Title
    type: string
    description: The field name used to determine the event name (sub-type)
    is_mandatory: false
    is_advanced: false
    mode: regular
-   name: PythonProcessTimeout
    default_value: '60'
    type: string
    description: The timeout limit (in seconds) for the python process running current
        script
    is_mandatory: true
    is_advanced: false
    mode: regular
-   name: Api Root
    default_value: https://api.intsights.com
    type: string
    description: The api root of the Intsights server
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Account ID
    default_value: ''
    type: string
    description: The account ID to login with
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Api Key
    default_value: ''
    type: password
    description: The API key to login with.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Verify SSL
    default_value: 'FALSE'
    type: boolean
    description: Whether to verify the SSL certificate of the server
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Max Days Backwards
    default_value: '3'
    type: integer
    description: Number of days before the first connector iteration to retrieve alerts
        from. This parameter applies to the initial connector iteration after you
        enable the connector for the first time, or used as a fallback value in cases
        where connector's last run timestamp expires.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Max Alerts Per Cycle
    default_value: '10'
    type: integer
    description: Max number of alerts to fetch per single connector cycle
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Proxy Server Address
    default_value: ''
    type: string
    description: The address of the proxy server to use.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Proxy Username
    default_value: ''
    type: string
    description: The proxy username to authenticate with.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Proxy Password
    default_value: ''
    type: password
    description: The proxy password to authenticate with.
    is_mandatory: false
    is_advanced: false
    mode: script
description: ''
integration: Intsights
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/intsights#intsights_connector
rules: []
is_connector_rules_supported: false
creator: Admin
