Assign Alert:
  ai_description: >-
    ### General Description

    Assigns a specific alert in the IntSights platform to an analyst. This action
    facilitates automated incident management by updating the ownership of an alert
    based on either a User ID or an Email Address.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Alert ID | String | Yes | The unique identifier of the alert in IntSights that
    needs to be reassigned. |

    | Assignee ID | String | No | The unique internal ID of the analyst in IntSights.
    If provided, this takes precedence over the Email Address. |

    | Assignee Email Address | String | No | The email address of the analyst. If
    the Assignee ID is not provided, the action will attempt to resolve this email
    to a User ID first. |


    ### Additional Notes

    Either **Assignee ID** or **Assignee Email Address** must be provided for the
    action to execute successfully. If both are provided, the **Assignee ID** is prioritized.


    ### Flow Description

    1. **Parameter Extraction:** Retrieves the Alert ID and the assignee identifiers
    (ID or Email) from the action parameters.

    2. **Validation:** Checks that at least one assignee identifier (ID or Email)
    is present.

    3. **User Resolution (Optional):** If only an email is provided, the action queries
    the IntSights API to retrieve the corresponding User ID.

    4. **Assignment Update:** Sends a PATCH request to the IntSights API to update
    the alert's assignee to the specified User ID.

    5. **Error Handling:** Manages specific exceptions such as User Not Found, Alert
    Not Found, or general API errors, providing descriptive feedback in the action
    output.
