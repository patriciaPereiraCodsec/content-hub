Ping:
  ai_description: >-
    ### General Description

    Verifies connectivity to the IntSights platform using the provided credentials
    and API root. This action is primarily used to ensure that the integration is
    correctly configured and can successfully communicate with the IntSights API.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Api Root | String | Yes | The base URL for the IntSights API. |

    | Account ID | String | Yes | The account identifier used for authentication.
    |

    | Api Key | String | Yes | The API key used for authentication. |

    | Verify SSL | Boolean | Yes | If enabled, the action will verify the SSL certificate
    of the API endpoint. Default is False. |


    ### Flow Description

    1. **Parameter Extraction**: The action retrieves the API Root, Account ID, Api
    Key, and Verify SSL settings from the integration configuration.

    2. **Manager Initialization**: It initializes the `IntsightsManager` with the
    provided credentials and connection settings.

    3. **Connectivity Test**: The manager executes a `test_connectivity` call, which
    performs a GET request to the IntSights API version endpoint (`public/v1/api/version`).

    4. **Result Handling**: If the request is successful, the action returns a 'Connection
    Established' message. If an exception occurs (e.g., bad credentials or network
    issues), it captures the error and reports a failure.
