Close Alert:
  ai_description: >-
    Closes a specific alert within the IntSights platform. This action allows users
    to programmatically resolve alerts by providing a closure reason, optional descriptive
    notes, and a numerical rating. It interacts with the IntSights API via a PATCH
    request to update the alert's status.


    ### Parameters Description


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Alert ID | String | Yes | The unique identifier of the alert in IntSights that
    needs to be closed. |

    | Additional Info | String | No | Supplemental information or comments explaining
    the context of the alert closure. |

    | Rate | Integer | No | A numerical rating for the alert, ranging from 1 to 5.
    |

    | Reason | String (Enum) | Yes | The specific reason for closing the alert. Supported
    values include: 'Problem Solved', 'Informational Only', 'Problem We Are Aware
    Of', 'Company Owned Domain', 'Legitimate Application/Profile', 'Not Related To
    My Company', 'False Positive', and 'Other'. |


    ### Additional Notes

    - The 'Rate' parameter must be an integer between 1 and 5. If a value outside
    this range is provided, the action will fail with a validation error.

    - The 'Reason' parameter is mapped from human-readable strings to specific API
    keys (e.g., 'Problem Solved' maps to 'ProblemSolved').


    ### Flow Description

    1. **Parameter Extraction**: The action retrieves the IntSights API configuration
    (Root URL, Account ID, API Key) and the specific action parameters (Alert ID,
    Reason, Additional Info, Rate).

    2. **Validation**: It validates that the 'Rate' (if provided) is within the allowed
    range of 1 to 5.

    3. **Reason Mapping**: The selected closure reason is mapped to the corresponding
    internal IntSights API value.

    4. **API Interaction**: The action initializes the `IntsightsManager` and sends
    a PATCH request to the IntSights endpoint `public/v1/data/alerts/close-alert/{alert_id}`
    with the closure details.

    5. **Result Handling**: If the request is successful, the action completes with
    a success message. If the alert is not found or a general API error occurs, it
    logs the error and reports a failure.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      This action changes the state of an alert in the external IntSights platform
      from 'Open' to 'Closed' and updates it with a reason, rating, and additional
      comments.
    fetches_data: false
    internal_data_mutation_explanation: null
