Search IOCs:
  ai_description: "### General Description\nEnriches entities by searching for Indicators\
    \ of Compromise (IOCs) within the Intsights threat intelligence platform. This\
    \ action retrieves detailed threat data, including severity, status, related malware,\
    \ campaigns, and threat actors, to provide context for security investigations.\n\
    \n### Parameters Description\nThere are no action-specific parameters for this\
    \ action. It relies on the global integration configuration (Api Root, Account\
    \ ID, Api Key, and Verify SSL).\n\n### Additional Notes\n* The action marks entities\
    \ as suspicious if the retrieved threat severity from Intsights is 'Medium' or\
    \ 'High'.\n* It updates the entity's additional properties with flattened enrichment\
    \ data prefixed with 'Intsights'.\n\n### Flow Description\n1. **Initialization**:\
    \ Establishes a connection to the Intsights API using the integration's configuration\
    \ parameters.\n2. **Entity Iteration**: Processes each target entity provided\
    \ in the current context.\n3. **IOC Lookup**: For each entity, it queries the\
    \ Intsights `/public/v3/iocs/ioc-by-value` endpoint using the entity's identifier.\n\
    4. **Data Processing**: If threat data is found, it parses the results, including\
    \ severity, related campaigns, and reported feeds.\n5. **Internal Updates**: \n\
    \    * Adds the raw JSON result to the entity's context.\n    * Updates the entity's\
    \ enrichment fields with the retrieved threat intelligence.\n    * If the severity\
    \ is 'Medium' or 'High', it marks the entity as suspicious and creates a detailed\
    \ entity insight.\n6. **Finalization**: Updates all enriched entities in Google\
    \ SecOps and returns a summary message of the findings."
