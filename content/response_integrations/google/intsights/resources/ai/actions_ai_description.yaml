Add Note:
  ai_description: >-
    ### General Description

    Adds a note to a specific alert within the IntSights platform. This action allows
    analysts to append textual information or context to an existing alert for better
    tracking and collaboration within the external threat intelligence system.


    ### Parameters Description

    | Parameter Name | Description | Type | Mandatory | Notes |

    | :--- | :--- | :--- | :--- | :--- |

    | Alert ID | The unique identifier of the alert in IntSights to which the note
    will be added. | String | Yes | This ID must correspond to an existing alert in
    the IntSights environment. |

    | Note | The content of the note to be added to the alert. | String | Yes | The
    text provided here will be visible in the IntSights alert timeline/notes section.
    |


    ### Additional Notes

    This action does not process or interact with Google SecOps entities. It operates
    directly on a specific Alert ID provided as an input parameter.


    ### Flow Description

    1. **Initialization**: The action initializes the IntSights manager using the
    provided API Root, Account ID, and API Key.

    2. **Parameter Extraction**: It retrieves the 'Alert ID' and the 'Note' content
    from the action parameters.

    3. **API Interaction**: The action sends a POST request to the IntSights API endpoint
    (`public/v1/data/alerts/add-note/{alert_id}`) with the note content in the request
    body.

    4. **Error Handling**: If the alert is not found, a specific `NotFoundError` is
    caught and reported. Other general exceptions are logged as failures.

    5. **Completion**: The action returns a success status if the note is successfully
    added to the external system.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Adds a new note to an existing alert in the IntSights platform, which modifies
      the state of the alert's metadata in the external system.
    fetches_data: false
    internal_data_mutation_explanation: null
