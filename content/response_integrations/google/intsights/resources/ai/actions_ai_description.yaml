Download Alert CSV:
  ai_description: >-
    ### General Description

    Downloads a CSV file containing detailed information related to a specific alert
    from the IntSights platform. This action is useful for archiving alert data or
    performing offline analysis on threat intelligence reports.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Alert ID | String | Yes | The unique identifier of the alert in IntSights for
    which the CSV data is requested. |

    | Download Folder Path | String | Yes | The local directory path on the execution
    machine where the CSV file will be saved. |

    | Overwrite | Boolean | No | If set to true, the action will replace an existing
    file with the same name in the target directory. Defaults to false. |


    ### Additional Notes

    - The action requires the local directory specified in 'Download Folder Path'
    to exist prior to execution.

    - The resulting file is named using the Alert ID with a `.csv` extension.

    - This action does not process entities and relies solely on the provided Alert
    ID.


    ### Flow Description

    1. **Path Validation**: Checks if the specified `Download Folder Path` exists
    on the local filesystem.

    2. **API Connection**: Initializes the IntSights manager and authenticates using
    the provided API credentials.

    3. **Data Retrieval**: Makes a request to the IntSights API to download the CSV
    content for the specified `Alert ID`.

    4. **File Persistence**: Saves the downloaded content to the local disk. If `Overwrite`
    is false and the file exists, it raises an error.

    5. **Result Reporting**: Returns the absolute path of the saved file and marks
    the action as successful.
  capabilities:
