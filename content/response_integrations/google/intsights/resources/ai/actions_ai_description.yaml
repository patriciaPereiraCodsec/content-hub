Get Alert Image:
  ai_description: >-
    ### General Description

    The **Get Alert Image** action retrieves raw image data associated with specific
    alert image IDs from the IntSights platform. This action is designed to provide
    visual context for threats or data leaks identified by IntSights by fetching the
    binary image content and rendering it directly within the Google SecOps case wall.
    The retrieved images are also provided in base64 format in the action's JSON results
    for further processing.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description | How it affects the flow |

    | :--- | :--- | :--- | :--- | :--- |

    | Alert Image IDs | String | Yes | A comma-separated list of unique identifiers
    for the alert images to be retrieved. | The action iterates through each ID provided
    in this list to fetch the corresponding image content from the IntSights API.
    |


    ### Additional Notes

    - This action does not operate on case entities; it relies entirely on the provided
    image IDs.

    - Images are displayed as HTML in a Case Insight for immediate visibility on the
    case wall.

    - The action handles partial failures, reporting which IDs were successfully processed
    and which failed.


    ### Flow Description

    1. **Parameter Extraction:** The action retrieves the API configuration (Root
    URL, Account ID, API Key) and the list of Alert Image IDs from the action parameters.

    2. **Manager Initialization:** An instance of the IntSightsManager is initialized
    to handle authenticated communication with the IntSights API.

    3. **Data Retrieval:** The action iterates through the provided list of IDs, making
    a GET request for each to fetch the raw binary content of the image.

    4. **Data Processing:** Successfully retrieved images are encoded into base64
    strings. An HTML string is constructed using these base64 strings to embed the
    images into an insight.

    5. **Insight Creation:** A Case Insight is created and posted to the Google SecOps
    case wall, containing the rendered images.

    6. **Result Reporting:** The action populates the JSON results with the image
    names and base64 content and provides a summary message of the execution status.
  capabilities:
