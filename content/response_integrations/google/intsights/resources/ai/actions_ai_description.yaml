Ask An Analyst:
  ai_description: >-
    ### General Description

    The **Ask An Analyst** action enables users to interact with IntSights analysts
    by submitting questions or comments regarding a specific alert. This feature is
    primarily used to gain deeper insights into a threat, request further investigation,
    or provide additional context to the IntSights team directly from the Google SecOps
    platform.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Alert ID** | String | Yes | The unique identifier of the alert in the IntSights
    platform for which the inquiry is being made. |

    | **Comment** | String | Yes | The specific question or message intended for the
    IntSights analyst. |


    ### Flow Description

    1. **Initialization**: The action extracts the necessary integration configuration
    (API Root, Account ID, API Key, and SSL verification settings) and the action
    parameters (Alert ID and Comment).

    2. **API Interaction**: It utilizes the `IntsightsManager` to send a POST request
    to the IntSights API endpoint `public/v1/data/alerts/ask-the-analyst/{alert_id}`.
    The comment is passed as the 'Question' in the request payload.

    3. **Error Handling**: The action specifically checks for `AlertNotFoundError`
    if the provided ID does not exist in IntSights. It also handles general exceptions
    during the API call.

    4. **Finalization**: The action returns a success message if the comment was successfully
    posted to the external system, or a failure message if the alert was not found
    or a connection error occurred.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      The action performs a POST request to the IntSights API to create a new 'Ask
      an Analyst' entry (comment/question) associated with a specific alert, thereby
      changing the state of that alert's communication log in the external system.
