name: Add Note
description: Add a note to the alert in IntSights.
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/intsights#add_note
integration_identifier: Intsights
parameters:
-   name: Alert ID
    default_value: ''
    type: string
    description: Specify the ID of the alert to which you want to add a note.
    is_mandatory: true
-   name: Note
    default_value: ''
    type: string
    description: Specify the note for the alert.
    is_mandatory: true
dynamic_results_metadata: []
creator: admin
