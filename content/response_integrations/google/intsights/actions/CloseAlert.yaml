name: Close Alert
description: Close alert in IntSights.
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/intsights#close_alert
integration_identifier: Intsights
parameters:
-   name: Alert ID
    default_value: ''
    type: string
    description: Specify the ID of the alert which you want to close.
    is_mandatory: true
-   name: Additional Info
    default_value: ''
    type: string
    description: Specify additional information explaining why the alert should be
        closed.
    is_mandatory: false
-   name: Rate
    default_value: ''
    type: string
    description: Specify the rating of the alert. Maximum is 5.
    is_mandatory: false
-   name: Reason
    default_value: Problem Solved
    type: ddl
    optional_values:
    - Problem Solved
    - Informational Only
    - Problem We Are Aware Of
    - Company Owned Domain
    - Legitimate Application/Profile
    - Not Related To My Company
    - False Positive
    - Other
    description: Specify the reason why the alert needs to be closed.
    is_mandatory: true
dynamic_results_metadata: []
creator: admin
