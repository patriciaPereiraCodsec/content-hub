name: Create Service Request
description: Create a service request.
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/sysaid#create_service_request
integration_identifier: SysAid
parameters:
-   name: Title
    default_value: ''
    type: string
    description: The title of the service request.
    is_mandatory: true
-   name: Description
    default_value: ''
    type: string
    description: The description of the service request.
    is_mandatory: true
-   name: Service Request Type
    default_value: ''
    type: string
    description: 'The type of the service request. Valid values: incident, request,
        problem, change, all.'
    is_mandatory: false
-   name: Status
    default_value: ''
    type: string
    description: The status of the request service.
    is_mandatory: true
-   name: Priority
    default_value: ''
    type: string
    description: The priority of the request service.
    is_mandatory: true
-   name: Assignee
    default_value: ''
    type: string
    description: The assignee of the request service.
    is_mandatory: true
-   name: Urgency
    default_value: ''
    type: string
    description: The urgency of the request service.
    is_mandatory: true
-   name: Request User
    default_value: ''
    type: string
    description: The request user of the request service.
    is_mandatory: false
-   name: Category
    default_value: ''
    type: string
    description: The category of the request service.
    is_mandatory: false
-   name: Subcategory
    default_value: ''
    type: string
    description: The subcategory of the request service.
    is_mandatory: false
-   name: Third Category
    default_value: ''
    type: string
    description: The third category of the request service.
    is_mandatory: false
-   name: Assigned Group
    default_value: ''
    type: string
    description: The assigned group of the request service.
    is_mandatory: false
dynamic_results_metadata: []
creator: Admin
script_result_name: request_service_id
