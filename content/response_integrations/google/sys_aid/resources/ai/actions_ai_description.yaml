Create Service Request:
  ai_description: >-
    ### General Description

    Creates a new service request (ticket) in the SysAid ITSM platform. This action
    allows users to programmatically generate tickets with specific details such as
    title, description, priority, and assignment information directly from Google
    SecOps.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Title | String | Yes | The title of the service request. |

    | Description | String | Yes | The detailed description of the service request.
    |

    | Status | String | Yes | The initial status of the service request (e.g., 'New').
    |

    | Priority | String | Yes | The priority level of the service request (e.g., 'Low',
    'Medium', 'High'). |

    | Assignee | String | Yes | The username of the person to whom the request is
    assigned. |

    | Urgency | String | Yes | The urgency level of the service request. |

    | Service Request Type | String | No | The type of request. Valid values: incident,
    request, problem, change, all. |

    | Request User | String | No | The username of the user who is requesting the
    service. |

    | Category | String | No | The primary category for the request. |

    | Subcategory | String | No | The subcategory for the request. |

    | Third Category | String | No | The third-level category for the request. |

    | Assigned Group | String | No | The group to which the request is assigned. |


    ### Additional Notes

    This action does not run on entities. It is a standalone action used to create
    records in SysAid based on the provided input parameters. The action automatically
    handles the translation of human-readable labels (like Status or Priority) into
    SysAid internal IDs.


    ### Flow Description

    1. **Authentication**: Connects to the SysAid API using the configured credentials
    and retrieves a session token.

    2. **Metadata Resolution**: For parameters like Status, Priority, Urgency, and
    Assignee, the action queries SysAid filters to map the provided string values
    to their corresponding internal system IDs.

    3. **Payload Construction**: Builds a JSON payload containing the ticket attributes,
    including categories and assignment details.

    4. **Request Creation**: Sends a POST request to the SysAid `/sr` endpoint to
    create the service request.

    5. **Result Handling**: Captures the ID of the newly created service request and
    returns it as the action result.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Creates a new service request (ticket) record in the SysAid ITSM platform via
      a POST request.
    fetches_data: false
    internal_data_mutation_explanation: null
