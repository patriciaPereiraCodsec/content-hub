List Service Requests:
  ai_description: >-
    ### General Description

    This action retrieves a list of service requests (SRs) from the SysAid ITSM platform
    based on a variety of user-defined filters. It is primarily used for searching
    and auditing tickets, incidents, or changes within the SysAid system directly
    from Google SecOps. The action fetches data using the SysAid REST API and presents
    the results in a structured data table for easy review within the case.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Service Request Type | String | No | Filters the results by the type of service
    request. Valid values include: `incident`, `request`, `problem`, `change`, or
    `all`. |

    | Status | String | No | Filters service requests by their current status (e.g.,
    New, Open, Closed). |

    | Priority | String | No | Filters service requests by their priority level (e.g.,
    Low, Medium, High). |

    | Assignee | String | No | Filters service requests assigned to a specific user.
    |

    | Urgency | String | No | Filters service requests by their urgency level. |

    | Request User | String | No | Filters service requests created by or for a specific
    user. |

    | Category | String | No | Filters by the top-level category of the service request.
    |

    | Subcategory | String | No | Filters by the subcategory of the service request.
    |

    | Third Category | String | No | Filters by the third-level category of the service
    request. |

    | Assigned Group | String | No | Filters service requests assigned to a specific
    group. |

    | Get Archived | Boolean | No | If set to `True`, the action will include archived
    service requests in the results. Default is `False`. |


    ### Additional Notes

    - This action does not operate on specific entities (like IPs or Hostnames); it
    performs a global search based on the provided parameters.

    - The action automatically flattens the complex JSON response from SysAid to create
    a readable CSV-formatted data table.


    ### Flow Description

    1. **Authentication**: The action initializes the SysAid manager using the provided
    API Root, Username, and Password.

    2. **Parameter Processing**: It collects all optional filter parameters provided
    by the user.

    3. **Filter Resolution**: For parameters like Status, Priority, and Urgency, the
    action queries the SysAid API to map the human-readable string values to their
    corresponding internal IDs.

    4. **Data Retrieval**: It executes a GET request to the SysAid `/sr` endpoint
    with the constructed query parameters.

    5. **Data Transformation**: The retrieved list of service requests is flattened
    into a simplified dictionary structure.

    6. **Output Generation**: The flattened data is converted into a CSV format and
    added as a Data Table named "SysAid - Service Requests" to the Google SecOps case.
    The raw JSON response is also returned as the action result.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
  categories:
