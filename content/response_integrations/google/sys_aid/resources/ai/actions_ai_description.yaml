Get Service Request:
  ai_description: >-
    ### General Description

    The **Get Service Request** action retrieves comprehensive details for a specific
    service request (SR) from the SysAid ITSM platform. It is used to pull metadata,
    status, and assignment information for a ticket based on its unique ID, providing
    visibility into the ticket's current state within the SOAR workflow.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Service Request ID | String | Yes | The unique identifier of the service request
    to be retrieved from SysAid. |


    ### Flow Description

    1. **Authentication**: The action authenticates with the SysAid server using the
    provided credentials (API Root, Username, Password) and establishes a session.

    2. **Parameter Extraction**: It retrieves the `Service Request ID` from the action's
    input parameters.

    3. **Data Retrieval**: It queries the SysAid API via a GET request to the `/sr`
    endpoint, specifically filtering for the provided ID.

    4. **Result Processing**: The action formats the raw API response into a human-readable
    structure and attaches it to the action's execution results as a JSON object.


    ### Additional Notes

    This action does not process or iterate over Google SecOps entities; it relies
    entirely on the provided `Service Request ID` parameter. It is a read-only action
    and does not modify any data in SysAid.
