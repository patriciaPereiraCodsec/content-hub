Delete Service Request:
  ai_description: >-
    ### General Description

    Deletes a specific service request from the SysAid ITSM platform using its unique
    identifier. This action is used to programmatically remove records that are no
    longer needed or were created in error.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Service Request ID | String | Yes | The unique ID of the service request in
    SysAid that you wish to delete. |


    ### Additional Notes

    - This action performs a destructive operation (DELETE) on the external SysAid
    system.

    - It does not operate on Google SecOps entities (like IPs or Hostnames) but rather
    on a specific record ID provided as an input parameter.


    ### Flow Description

    1. **Configuration Retrieval**: The action fetches SysAid API credentials (API
    Root, Username, Password) and SSL verification settings from the integration configuration.

    2. **Manager Initialization**: Initializes the `SysAidManager` which handles authentication
    and session management with the SysAid REST API.

    3. **Parameter Extraction**: Retrieves the `Service Request ID` provided by the
    user.

    4. **API Execution**: Calls the SysAid DELETE endpoint for service records (`/sr`)
    passing the specified ID as a parameter.

    5. **Result Reporting**: Validates the API response and terminates the action
    with a success message if the deletion was successful.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Deletes a service request record from the SysAid ITSM platform via a DELETE
      request to the API.
    fetches_data: false
    internal_data_mutation_explanation: null
