Close Service Request:
  ai_description: >-
    Closes a specific service request within the SysAid ITSM platform. This action
    is used to finalize a ticket by providing a resolution description and updating
    its status to closed in the external system.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Service Request ID | String | Yes | The unique identifier of the service request
    in SysAid that needs to be closed. |

    | Solution | String | Yes | The text describing the solution or resolution applied
    to the service request. |


    ### Flow Description

    1. **Authentication**: Connects to the SysAid API using the configured credentials
    (API Root, Username, and Password).

    2. **Parameter Retrieval**: Extracts the 'Service Request ID' and 'Solution' provided
    by the user.

    3. **External Update**: Executes a PUT request to the SysAid endpoint `/sr/{sr_id}/close`
    containing the solution details.

    4. **Completion**: Reports a success message to the Google SecOps case wall upon
    successful closure of the request.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Updates the status of a service request to 'Closed' and records a solution description
      in the SysAid ITSM system via a PUT request.
    fetches_data: false
    internal_data_mutation_explanation: null
  categories:
