Ping:
  ai_description: >-
    ### General Description

    Tests the connectivity to the SysAid instance to ensure that the provided credentials
    and API root are valid and that the service is reachable.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | None | N/A | N/A | This action does not take any input parameters. |


    ### Additional Notes

    This action is typically used during the initial setup of the integration or for
    troubleshooting connectivity issues. It relies on the integration's global configuration
    (API Root, Username, Password).


    ### Flow Description

    1. **Configuration Retrieval**: The action retrieves the necessary configuration
    details from the SysAid integration settings, including the API Root, Username,
    Password, and SSL verification preference.

    2. **Manager Initialization**: It initializes the `SysAidManager` with the retrieved
    configuration.

    3. **Authentication Check**: During initialization, the manager attempts to log
    in to the SysAid server by sending a POST request to the `/login` endpoint.

    4. **Result Reporting**: If the login is successful, the action ends with a 'Connection
    Established' message and a success status.
