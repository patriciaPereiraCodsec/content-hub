Update Service Request:
  ai_description: >-
    ### General Description

    Updates an existing service request in the SysAid ITSM platform. This action allows
    for the modification of various ticket attributes such as status, priority, assignee,
    and categorization. It is typically used in automation workflows to synchronize
    ticket states between Google SecOps and SysAid.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Service Request ID | String | Yes | The unique identifier of the service request
    to be updated. |

    | Status | String | No | The new status to assign to the service request (e.g.,
    'Closed', 'In Progress'). |

    | Priority | String | No | The new priority level for the service request. |

    | Assignee | String | No | The username of the person to whom the request should
    be assigned. |

    | Urgency | String | No | The new urgency level for the service request. |

    | Request User | String | No | The user who is associated with the request. |

    | Category | String | No | The top-level category for the service request. |

    | Subcategory | String | No | The second-level category for the service request.
    |

    | Third Category | String | No | The third-level category for the service request.
    |

    | Assigned Group | String | No | The group to which the service request should
    be assigned. |


    ### Additional Notes

    * The action uses the SysAid REST API to perform updates.

    * For parameters like Status, Priority, and Urgency, the action automatically
    resolves human-readable captions to their internal SysAid IDs by querying the
    SysAid filters metadata.

    * If a parameter is left empty, that specific field will not be updated in the
    service request.


    ### Flow Description

    1. **Authentication**: The action logs into the SysAid server using the provided
    credentials and establishes a session.

    2. **Parameter Retrieval**: It collects the Service Request ID and all optional
    update fields from the action input.

    3. **Metadata Resolution**: For each provided field (e.g., Status), the action
    fetches the available options from SysAid to map the input string to the correct
    internal ID.

    4. **Update Execution**: It constructs a JSON payload containing the updated fields
    and sends a `PUT` request to the SysAid endpoint for the specific service request.

    5. **Completion**: The action returns a success message upon a valid response
    from the API.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Updates the attributes (status, priority, assignee, etc.) of an existing service
      request in the SysAid ITSM system via a PUT request.
    fetches_data: true
    internal_data_mutation_explanation: null
