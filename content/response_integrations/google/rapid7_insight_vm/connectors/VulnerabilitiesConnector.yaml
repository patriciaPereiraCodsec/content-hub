name: Rapid7 InsightVm - Vulnerabilities Connector
parameters:
-   name: DeviceProductField
    default_value: Product Name
    type: string
    description: Enter the source field name in order to retrieve the Product Field
        name.
    is_mandatory: true
    is_advanced: false
    mode: regular
-   name: EventClassId
    default_value: type
    type: string
    description: Enter the source field name in order to retrieve the Event Field
        name.
    is_mandatory: true
    is_advanced: false
    mode: regular
-   name: Environment Field Name
    default_value: ''
    type: string
    description: Describes the name of the field where the environment name is stored.
        If the environment field isn't found, the environment is the default environment.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Environment Regex Pattern
    default_value: .*
    type: string
    description: A regex pattern to run on the value found in the "Environment Field
        Name" field. Default is .* to catch all and return the value unchanged. Used
        to allow the user to manipulate the environment field via regex logic. If
        the regex pattern is null or empty, or the environment value is null, the
        final environment result is the default environment.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: PythonProcessTimeout
    default_value: 500
    type: integer
    description: Timeout limit for the python process running the current script.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: API Root
    default_value: https://{ip}:3780
    type: string
    description: API root of the Rapid7 InsightVm instance.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Username
    default_value: ''
    type: string
    description: Username of the Rapid7 InsightVm account.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Password
    default_value: ''
    type: password
    description: Password of the Rapid7 InsightVm account.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Verify SSL
    default_value: true
    type: boolean
    description: If enabled, verify the SSL certificate for the connection to the
        Rapid7 InsightVm server is valid.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Lowest Severity To Fetch
    default_value: Moderate
    type: string
    description: 'Lowest Severity that needs to be used to fetch vulnerabilities.
        Possible values: Moderate, Severe, Critical. If nothing is provided, the connector
        will fetch vulnerabilities with all severities.'
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Max Assets To Process
    default_value: 5
    type: integer
    description: 'Amount of assets that need to be processed per 1 connector iteration.
        Note: it’s not recommended to increase the value of this parameter, because
        the connector will be more prone to timeouts.'
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Grouping Mechanism
    default_value: Host
    type: string
    description: 'Grouping mechanism that will be used to create Siemplify Alerts.
        Possible values: Host, None. If Host is provided, the connector will create
        1 Siemplify Alert containing all of the vulnerabilities related to the host.
        If None or invalid value is provided, the connector will create a new Siemplify
        Alert for each separate vulnerability per host.'
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Use whitelist as a blacklist
    default_value: false
    type: boolean
    description: If enabled, whitelist will be used as a blacklist.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Proxy Server Address
    default_value: ''
    type: string
    description: The address of the proxy server to use.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Proxy Username
    default_value: ''
    type: string
    description: The proxy username to authenticate with.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Proxy Password
    default_value: ''
    type: password
    description: The proxy password to authenticate with.
    is_mandatory: false
    is_advanced: false
    mode: script
description: 'Pull information about asset vulnerabilities from Rapid7 InsightVm.
    Note: whitelist filter works with "protocol" parameter.'
integration: Rapid7InsightVm
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/rapid7-insightsvm#vulnerabilities-connector
rules: []
is_connector_rules_supported: false
creator: admin
