List Scans:
  ai_description: >-
    ### General Description

    The **List Scans** action retrieves a list of scan records from the Rapid7 InsightVM
    platform. It allows users to view historical or ongoing scan activities, providing
    visibility into the vulnerability management process. The action can be filtered
    to look back a specific number of days.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Days Backwards** | Number | Yes | The number of days to look back for scans.
    The action will retrieve scans that started within this timeframe. If set to 0,
    the action attempts to fetch all available scans without a time filter. |


    ### Additional Notes

    - This action does not operate on specific entities and can be run as a standalone
    utility or discovery step in a playbook.

    - The output includes a formatted data table for easy viewing in the SOAR interface
    and a raw JSON result for further automated processing.

    - Metadata links (e.g., self-references) are removed from the scan objects to
    ensure the output remains concise.


    ### Flow Description

    1. **Initialization**: The action establishes a connection to the Rapid7 InsightVM
    API using the configured credentials and API root.

    2. **Parameter Parsing**: It retrieves the 'Days Backwards' value to determine
    the search window.

    3. **Time Calculation**: If 'Days Backwards' is greater than zero, the script
    calculates a start timestamp using the current UTC time minus the specified days.

    4. **API Request**: The action calls the Rapid7 `list_scans` endpoint. If a start
    time was calculated, it filters the results to only include scans that started
    after that time.

    5. **Data Cleaning**: The script iterates through the retrieved scan list and
    removes the 'links' attribute from each scan object to sanitize the data.

    6. **Result Delivery**: The cleaned data is converted into a CSV-formatted data
    table named 'Scans' and a raw JSON object, both of which are attached to the action's
    output.
