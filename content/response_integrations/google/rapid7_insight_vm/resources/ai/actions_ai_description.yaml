Ping:
  ai_description: >-
    ### General Description

    Tests the connectivity to the Rapid7 InsightVM instance using the provided configuration.
    This action ensures that the API Root, Username, and Password are valid and that
    the network connection between Google SecOps and Rapid7 InsightVM is functional.


    ### Parameters Description

    There are no parameters for this action.


    ### Additional Notes

    This is a standard 'Ping' action used for troubleshooting integration setup and
    verifying that the environment can reach the external API.


    ### Flow Description

    1. **Configuration Retrieval**: The action fetches the API Root, Username, Password,
    and SSL verification settings from the integration configuration.

    2. **Manager Initialization**: Initializes the `Rapid7Manager` with the retrieved
    credentials and connection settings.

    3. **Connectivity Test**: Executes a GET request to the API Root URL via the `test_connectivity`
    method in the manager.

    4. **Validation**: Checks the HTTP response status to confirm the service is reachable
    and credentials are accepted.

    5. **Completion**: Returns a success message and a boolean 'true' result if the
    connection is established.
