Enrich Asset:
  ai_description: >-
    ### General Description\nEnriches **HOSTNAME** and **ADDRESS** entities using
    **Rapid7 InsightVM**. This action retrieves comprehensive asset details, including
    network information, operating system data, risk scores, and vulnerability summaries,
    to provide better context for security investigations.\n\n### Parameters\nThere
    are no input parameters for this action.\n\n### Flow Description\n1. **Initialization**:
    Establishes a connection to the Rapid7 InsightVM API using the integration's configuration
    (API Root, Username, Password).\n2. **Entity Identification**: Iterates through
    the target entities, specifically looking for IP addresses and hostnames.\n3.
    **Data Retrieval**: \n    * For **ADDRESS** entities, it queries Rapid7 for asset
    details matching the IP address.\n    * For **HOSTNAME** entities, it queries
    Rapid7 for asset details matching the hostname.\n4. **Data Transformation**: Formats
    the raw asset data into a structured summary including MAC address, OS, risk score,
    and counts of moderate, severe, and critical vulnerabilities.\n5. **Internal Update**:
    \n    * Populates the entity's additional properties with the prefixed asset info.\n    *
    Attaches a CSV data table to the entity for visibility in the UI.\n    * Marks
    the entity as enriched.\n6. **Completion**: Updates the entities in the case and
    returns the raw JSON data for further use in the playbook.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entity additional properties with asset metadata (IP, MAC, OS, Risk
      Score, Vulnerability counts) and attaches a data table to the entity.
  categories:
    enrichment: true
  entity_usage:
    entity_types:
    - ADDRESS
    - HOSTNAME
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: true
    filters_by_identifier: false
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: false
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
Get Scan Results:
  ai_description: >-
    ### General Description\n\nThe **Get Scan Results** action retrieves the comprehensive
    results and metadata for a specific vulnerability scan from Rapid7 InsightVm.
    It is designed to be used after a scan has been initiated, providing a mechanism
    to wait for completion and then ingest the findings into the Google SecOps environment.\n\n###
    Parameters\n\n| Parameter | Type | Mandatory | Description |\n| :--- | :--- |
    :--- | :--- |\n| **Scan ID** | String/Integer | Yes | The unique identifier of
    the scan to be retrieved. |\n\n### Flow Description\n\n1. **Authentication**:
    Establishes a session with the Rapid7 InsightVm API using configured credentials
    (API Root, Username, Password).\n2. **Status Polling**: Checks the status of the
    scan identified by the `Scan ID`. The action will pause and retry every 2 seconds
    until the scan status is 'finished'.\n3. **Data Retrieval**: Once the scan is
    complete, it fetches the full scan information from the `/scans/{scan_id}` endpoint.\n4.
    **Data Processing**: Removes unnecessary metadata (like API links) to clean the
    data for presentation.\n5. **Output Generation**: Populates a data table named
    'Scan [ID] Info' and provides the full raw JSON result for downstream use in the
    playbook.\n\n### Additional Notes\n\n- This action does not operate on entities;
    it requires a specific Scan ID as input.\n- If the scan fails (status: aborted,
    stopped, error, or paused), the action will raise an error and terminate.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
  categories:
    enrichment: false
