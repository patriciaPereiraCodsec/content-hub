Launch Scan:
  ai_description: >-
    ### General Description

    This action initiates a vulnerability scan in Rapid7 InsightVM for specific target
    entities (IP addresses or Hostnames) within a designated site. It allows security
    teams to trigger on-demand scanning of assets directly from Google SecOps, optionally
    waiting for the scan to complete to retrieve and attach the results to the case.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Scan Name** | String | No | The name to assign to the scan. If not provided,
    a default name with the format `siemplify_YYYYMMDD-HHMMSS` is generated. |

    | **Scan Engine** | String | Yes | The name of the scan engine to be used for
    the operation. |

    | **Scan Template** | String | Yes | The name of the scan template to apply to
    the scan. |

    | **Site Name** | String | Yes | The name of the site in Rapid7 InsightVM where
    the scan should be executed. |

    | **Fetch Results** | Boolean | No | If set to `True`, the action will run asynchronously,
    polling Rapid7 until the scan completes to fetch and report the final results.
    |


    ### Additional Notes

    - The action supports both `ADDRESS` (IP) and `HOSTNAME` entity types.

    - If `Fetch Results` is enabled, the action will remain in an 'In Progress' state
    until the scan finishes or fails.


    ### Flow Description

    1. **Entity Filtering:** The action identifies all `ADDRESS` and `HOSTNAME` entities
    in the current context to use as scan targets.

    2. **ID Resolution:** It communicates with Rapid7 InsightVM to resolve the provided
    Site Name, Scan Engine, and Scan Template names into their respective internal
    IDs.

    3. **Scan Initiation:** A POST request is sent to the Rapid7 API to launch the
    scan with the specified configuration and target hosts.

    4. **Execution Handling:**
        - If `Fetch Results` is `False`, the action completes immediately, providing
    the new Scan ID.
        - If `Fetch Results` is `True`, the action enters an asynchronous polling
    loop.
    5. **Result Retrieval (Async):** Once the scan status reaches 'finished', the
    action retrieves the full scan metadata, adds it as a data table to the case,
    and provides the raw JSON results.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Initiates a new vulnerability scan in the Rapid7 InsightVM environment, which
      creates a new scan record and triggers active network scanning of target assets.
    fetches_data: true
    internal_data_mutation_explanation: null
  categories:
    enrichment: false
