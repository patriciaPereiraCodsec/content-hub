Ping:
  ai_description: >-
    ### General Description

    Tests the connectivity to the Opswat Metadefender instance using the provided
    API key and Root URL. This action is primarily used to verify that the integration
    configuration is correct and that the Google SecOps environment can reach the
    Opswat Metadefender API.


    ### Parameters Description

    There are no parameters for this action.


    ### Additional Notes

    This action does not process any entities and is used solely for configuration
    validation.


    ### Flow Description

    1. **Configuration Retrieval**: The action retrieves the `ApiRoot`, `ApiKey`,
    and `Verify SSL` settings from the Opswat Metadefender integration configuration.

    2. **Manager Initialization**: It initializes the `OpswatMetadefenderManager`
    with the retrieved configuration.

    3. **Connectivity Test**: The action calls the `test_conectivity` method, which
    sends a GET request to the `apikey` endpoint of the Opswat Metadefender API.

    4. **Final Status**: If the API request is successful (HTTP 200), the action returns
    a success message ('Connection Established'). Otherwise, it returns a failure
    message indicating a credential or connectivity issue.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
  categories:
    enrichment: false
  entity_usage:
    entity_types: []
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: false
    filters_by_identifier: false
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: false
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
Scan Hash:
  ai_description: >-
    ### General Description

    The **Scan Hash** action enriches `FILEHASH` entities by querying the Opswat Metadefender
    service for existing scan reports and reputation data. It allows security analysts
    to quickly determine if a file hash has been previously identified as malicious
    by various antivirus engines without needing to upload the file itself.


    ### Parameters

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | None | N/A | N/A | This action does not have any action-specific parameters.
    It relies on the integration's global configuration (ApiRoot, ApiKey, and Verify
    SSL). |


    ### Additional Notes

    * This action performs a reputation lookup based on the hash identifier. It does
    not perform a new file scan (upload).

    * The action updates the entity's suspicious status in Google SecOps if the Opswat
    report indicates the hash is "Infected".


    ### Flow Description

    1. **Entity Filtering**: The action identifies all `FILEHASH` entities within
    the current alert context.

    2. **Reputation Retrieval**: For each identified hash, it sends a request to the
    Opswat Metadefender API to fetch existing scan results.

    3. **Infection Check**: If a report is found and the `scan_all_result_a` field
    is marked as "Infected", the action marks the entity as suspicious.

    4. **Insight Creation**: A specific insight ("Found suspicious in Opswat") is
    added to the entity if it is determined to be infected.

    5. **Data Enrichment**: The action converts the detailed scan results (from multiple
    engines) into a CSV format and attaches it as a data table to the entity for further
    analysis.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates the 'is_suspicious' attribute of FILEHASH entities, creates entity insights,
      and attaches data tables containing scan results to the entities.
  categories:
    enrichment: true
  entity_usage:
    entity_types:
    - FILEHASH
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: true
    filters_by_identifier: false
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: false
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
