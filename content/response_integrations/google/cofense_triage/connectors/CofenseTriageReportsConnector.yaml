name: Cofense Triage - Reports Connector
parameters:
-   name: DeviceProductField
    default_value: Product Name
    type: string
    description: Enter the source field name in order to retrieve the Product Field
        name.
    is_mandatory: true
    is_advanced: false
    mode: regular
-   name: EventClassId
    default_value: attributes_location
    type: string
    description: Enter the source field name in order to retrieve the Event Field
        name.
    is_mandatory: true
    is_advanced: false
    mode: regular
-   name: Environment Field Name
    default_value: ''
    type: string
    description: Describes the name of the field where the environment name is stored.
        If the environment field isn't found, the environment is the default environment.
    is_mandatory: false
    is_advanced: true
    mode: script
-   name: Environment Regex Pattern
    default_value: .*
    type: string
    description: A regex pattern to run on the value found in the "Environment Field
        Name" field. Default is .* to catch all and return the value unchanged. Used
        to allow the user to manipulate the environment field via regex logic. If
        the regex pattern is null or empty, or the environment value is null, the
        final environment result is the default environment.
    is_mandatory: false
    is_advanced: true
    mode: script
-   name: PythonProcessTimeout
    default_value: 180
    type: integer
    description: Timeout limit for the python process running the current script.
    is_mandatory: true
    is_advanced: true
    mode: script
-   name: API Root
    default_value: https://tap.phishmecloud.com
    type: string
    description: API Root of the Cofense Triage instance.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Client ID
    default_value: ''
    type: string
    description: Client ID of the Cofense Triage account.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Client Secret
    default_value: ''
    type: password
    description: Client Secret of the Cofense Triage account.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Lowest Risk Score To Fetch
    default_value: 0
    type: integer
    description: Lowest risk score that will be used to fetch emails. Maximum is 100.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Fetch Max Hours Backwards
    default_value: 1
    type: integer
    description: Number of hours before the first connector iteration to retrieve
        emails from. This parameter applies to the initial connector iteration after
        you enable the connector for the first time, or used as a fallback value in
        cases where connector's last run timestamp expires.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Padding Time
    default_value: 0
    type: integer
    description: Padding Period in hours specifies a minimum time interval that will
        be used by connector to check for unfinished reports.
    is_mandatory: false
    is_advanced: true
    mode: script
-   name: Max Reports To Fetch
    default_value: 10
    type: integer
    description: How many reports to process per one connector iteration.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Use whitelist as a blacklist
    default_value: false
    type: boolean
    description: If enabled, whitelist will be used as a blacklist.
    is_mandatory: true
    is_advanced: true
    mode: script
-   name: Disable Overflow
    default_value: false
    type: boolean
    description: If enabled, the connector will ignore the overflow mechanism.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Verify SSL
    default_value: false
    type: boolean
    description: If enabled, verify the SSL certificate for the connection to the
        Cofense Triage server is valid.
    is_mandatory: true
    is_advanced: true
    mode: script
-   name: Report Location
    default_value: Inbox,Reconnaissance
    type: string
    description: 'Comma-separated list of locations from where to ingest reports.
        Only reports from the provided locations will be ingested. If nothing is specified,
        the connector will ingest reports from all locations. Possible values: Inbox,Reconnaissance,Processed'
    is_mandatory: false
    is_advanced: true
    mode: script
-   name: Category
    default_value: ''
    type: string
    description: A comma-separated list of categories used to filter the reports.
        Only reports that contain at least one category will be ingested.
    is_mandatory: false
    is_advanced: true
    mode: script
-   name: Proxy Server Address
    default_value: ''
    type: string
    description: The address of the proxy server to use.
    is_mandatory: false
    is_advanced: true
    mode: script
-   name: Proxy Username
    default_value: ''
    type: string
    description: The proxy username to authenticate with.
    is_mandatory: false
    is_advanced: true
    mode: script
-   name: Proxy Password
    default_value: ''
    type: password
    description: The proxy password to authenticate with.
    is_mandatory: false
    is_advanced: true
    mode: script
description: Pull reports from Cofense Triage.
integration: CofenseTriage
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/cofense#cofense-triage-reports-connector
rules: []
is_connector_rules_supported: false
creator: admin
