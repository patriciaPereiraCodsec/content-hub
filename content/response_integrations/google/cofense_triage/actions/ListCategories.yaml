name: List Categories
description: List available categories in Cofense Triage.
integration_identifier: CofenseTriage
parameters:
-   name: Names
    default_value: ''
    type: string
    description: Specify a comma-separated list of category names, This parameter
        is useful to check, whether a category with the specified name exists.
    is_mandatory: false
-   name: Lowest Score To Fetch
    default_value: ''
    type: string
    description: Specify what should be the lowest accepted score for the category.
        This parameter can work with negative values.
    is_mandatory: false
-   name: Only Malicious
    default_value: false
    type: boolean
    description: If enabled, action will only return malicious categories.
    is_mandatory: false
-   name: Only Archived
    default_value: false
    type: boolean
    description: If enabled, action will only return archived categories.
    is_mandatory: false
-   name: Only Non Archived
    default_value: false
    type: boolean
    description: If enabled, action will return only non-archived categories.
    is_mandatory: false
-   name: Only Non Malicious
    default_value: false
    type: boolean
    description: If enabled, action will return only non-malicious categories.
    is_mandatory: false
-   name: Max Categories To Return
    default_value: ''
    type: string
    description: Specify how many categories to return.
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/list_categories_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
