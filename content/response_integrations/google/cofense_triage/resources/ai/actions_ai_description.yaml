"List Reports Related To Threat Indicators":
  ai_description: >-
    Lists reports in Cofense Triage that are related to specific threat indicators
    (entities). This action identifies threat indicators matching the provided entity
    values and retrieves the reports associated with those indicators. It is useful
    for cross-referencing local entities with existing phishing reports and threat
    intelligence within the Cofense Triage platform.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Create Case Wall Table | Boolean | No | If enabled, the action will generate
    a table on the case wall containing details (ID, Subject, Created At, Location)
    of the related reports found. |

    | Max Reports To Return | Integer | No | Specifies the maximum number of reports
    to retrieve across all processed entities. Defaults to 100. |


    ### Additional Notes

    - The action processes all entities in the current scope without type-based filtering.

    - If multiple entities are provided, the action aggregates the related reports
    up to the specified limit.


    ### Flow Description

    1. **Entity Collection**: Retrieves the identifiers for all target entities in
    the current context.

    2. **Threat Indicator Lookup**: Queries the Cofense Triage API to find threat
    indicator IDs that match the entity identifiers.

    3. **Report Retrieval**: For each identified threat indicator, the action fetches
    associated reports, handling pagination to ensure all relevant data is considered.

    4. **Deduplication and Limiting**: Aggregates the reports, removes duplicates,
    and applies the 'Max Reports To Return' limit.

    5. **Internal Data Update**: If 'Create Case Wall Table' is enabled, constructs
    a CSV-formatted table and adds it to the case wall.

    6. **Result Output**: Returns the full list of related reports as a JSON object
    and completes the action execution.
