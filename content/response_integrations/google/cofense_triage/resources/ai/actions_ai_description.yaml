List Categories:
  ai_description: >-
    ### General Description

    The **List Categories** action retrieves a list of available classification categories
    from the Cofense Triage platform. This action is used to discover the categories
    defined in the system, which are essential for understanding how reports are classified
    (e.g., Malicious, Spam, Phishing Simulation). It allows users to filter categories
    by name, risk score, and status (malicious or archived).


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Names** | String | No | A comma-separated list of category names to filter
    for. If provided, the action will specifically look for these categories. |

    | **Lowest Score To Fetch** | Integer | No | Filters categories to only those
    with a risk score greater than or equal to this value. |

    | **Only Malicious** | Boolean | No | If enabled, the action returns only categories
    flagged as malicious. |

    | **Only Archived** | Boolean | No | If enabled, the action returns only categories
    that have been archived. |

    | **Only Non Archived** | Boolean | No | If enabled, the action returns only categories
    that are currently active (not archived). |

    | **Only Non Malicious** | Boolean | No | If enabled, the action returns only
    categories not flagged as malicious. |

    | **Max Categories To Return** | Integer | No | Limits the number of categories
    returned in the results (Default: 20). |


    ### Additional Notes

    - **Conflict Validation**: The action includes logic to prevent conflicting filters.
    It will fail if a user attempts to select both `Only Malicious` and `Only Non
    Malicious`, or both `Only Archived` and `Only Non Archived` simultaneously.

    - **Output**: The action provides a raw JSON response and a formatted table titled
    "Available Categories" containing the Name, Score, Malicious status, and Archived
    status for each category.


    ### Flow Description

    1. **Initialization**: The action extracts the integration configuration (API
    Root, Credentials) and user-provided filter parameters.

    2. **Validation**: It validates that the boolean filter flags do not contradict
    each other.

    3. **API Request**: It sends a GET request to the Cofense Triage `/api/public/v2/categories`
    endpoint, applying the specified filters (name, score, malicious/archived status)
    as query parameters.

    4. **Data Parsing**: The response is processed into a structured list of category
    objects.

    5. **Result Delivery**: The action outputs the full JSON data and populates a
    result table in the Google SecOps interface.
