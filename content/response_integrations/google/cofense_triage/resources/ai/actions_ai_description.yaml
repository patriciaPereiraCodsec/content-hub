EnrichURL:
  ai_description: "### General Description\nThe **Enrich URL** action retrieves detailed\
    \ threat intelligence for URL entities from the Cofense Triage platform. It provides\
    \ security analysts with context regarding the risk associated with specific URLs,\
    \ including risk scores and creation/update timestamps. This action is primarily\
    \ used for automated enrichment during the investigation phase to determine if\
    \ a URL encountered in an alert is known to be malicious or suspicious based on\
    \ Cofense Triage's database.\n\n### Parameters Description\n| Parameter | Type\
    \ | Mandatory | Description |\n| :--- | :--- | :--- | :--- |\n| **Risk Score Threshold**\
    \ | Integer | Yes | Defines the numerical threshold (0-100) above which a URL\
    \ is automatically marked as 'suspicious' within Google SecOps. If the retrieved\
    \ risk score exceeds this value, the entity's suspicious flag is set to true.\
    \ Default is 50. |\n\n### Additional Notes\n- The action specifically targets\
    \ entities of type **URL** (mapped to `DestinationURL`).\n- Enrichment data is\
    \ added to the entity's additional properties with the prefix `COFENSE_TRG`.\n\
    - If the provided threshold is outside the valid range (0-100), the action defaults\
    \ to a threshold of 50.\n\n### Flow Description\n1. **Initialization**: The action\
    \ extracts integration configuration (API Root, Credentials) and the `Risk Score\
    \ Threshold` parameter.\n2. **Entity Filtering**: It identifies all URL entities\
    \ within the current scope.\n3. **External Lookup**: For each URL, the action\
    \ queries the Cofense Triage API to retrieve its risk profile.\n4. **Risk Evaluation**:\
    \ The retrieved `risk_score` is compared against the user-defined `Risk Score\
    \ Threshold`.\n5. **Internal Mutation**: \n    - If the score exceeds the threshold,\
    \ the entity is marked as **suspicious**.\n    - The entity is marked as **enriched**.\n\
    \    - Detailed attributes (ID, Risk Score, Timestamps) are added to the entity's\
    \ **additional properties**.\n6. **Data Visualization**: An entity-specific data\
    \ table is created to display the enrichment results in the Google SecOps UI.\n\
    7. **Completion**: The action updates the entities in the system and returns a\
    \ JSON result containing the raw data for further playbook processing."
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entity attributes including 'is_suspicious', 'is_enriched', and populates
      'additional_properties' with threat intelligence data. It also attaches data
      tables to entities.
  categories:
