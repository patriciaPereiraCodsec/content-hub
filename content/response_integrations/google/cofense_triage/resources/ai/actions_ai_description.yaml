Add Tags To Report:
  ai_description: >-
    Adds tags to a specific report in Cofense Triage. This action retrieves the current
    tags for a report, merges them with the provided new tags to avoid duplicates,
    and updates the report in the external system.


    ### Parameters

    | Parameter | Description | Type | Mandatory |

    | --- | --- | --- | --- |

    | Report ID | The unique identifier of the report to which tags will be added.
    | String | Yes |

    | Tags | A comma-separated list of tags to be applied to the report. | String
    | Yes |


    ### Flow Description

    1. **Fetch Existing Tags**: The action first retrieves the current tags associated
    with the specified Report ID from Cofense Triage using a GET request.

    2. **Merge Tags**: It combines the existing tags with the new tags provided in
    the input, ensuring no duplicates are created.

    3. **Update Report**: A PUT request is sent to Cofense Triage to update the report
    with the new set of tags.

    4. **Retrieve Updated Data**: The action fetches the final state of the report
    and returns it as a JSON result for downstream use.
  capabilities:
