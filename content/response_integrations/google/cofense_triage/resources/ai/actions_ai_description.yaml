Categorize Report:
  ai_description: >-
    Categorizes a specific report in Cofense Triage by assigning it to a predefined
    category. This action is used to organize and prioritize phishing reports within
    the Cofense Triage platform based on analysis results.


    ### Parameters Description


    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Report ID | String | Yes | The unique identifier of the report in Cofense Triage
    that you want to categorize. |

    | Category Name | String | Yes | The name of the category to apply to the report
    (e.g., "Malicious", "Spam", "Legitimate"). The action will first look up the ID
    associated with this name. |


    ### Flow Description


    1.  **Category Lookup**: The action queries the Cofense Triage API to find the
    internal ID associated with the provided `Category Name`.

    2.  **Categorization**: If the category is found, the action sends a POST request
    to the Cofense Triage endpoint to update the report's category using the `Report
    ID`.

    3.  **Data Retrieval**: Upon successful categorization, the action fetches the
    updated report details from the external system.

    4.  **Output**: The updated report data is returned as a JSON result for use in
    subsequent playbook steps.


    ### Additional Notes


    *   This action does not run on entities; it requires a specific Report ID as
    input.

    *   If the specified `Category Name` does not exist in the Cofense Triage instance,
    the action will fail to update the report and return a negative result.
