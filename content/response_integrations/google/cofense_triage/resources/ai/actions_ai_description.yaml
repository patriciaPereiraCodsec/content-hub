Execute Playbook:
  ai_description: >-
    Initiates the execution of a specific playbook on a designated report within Cofense
    Triage. This action allows security analysts to trigger automated workflows in
    Cofense Triage directly from Google SecOps by providing the report's unique identifier
    and the name of the playbook to be run.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Report ID | String | Yes | The unique identifier of the report in Cofense Triage
    on which the playbook will be executed. |

    | Playbook Name | String | Yes | The exact name of the playbook to be triggered.
    |


    ### Flow Description

    1. **Authentication**: Connects to the Cofense Triage API using the provided credentials.

    2. **Playbook Retrieval**: Searches for the playbook ID associated with the provided
    'Playbook Name'.

    3. **Report Verification**: Validates that the specified 'Report ID' exists within
    the system.

    4. **Execution**: Sends a POST request to the Cofense Triage API to trigger the
    execution of the identified playbook on the specified report.
