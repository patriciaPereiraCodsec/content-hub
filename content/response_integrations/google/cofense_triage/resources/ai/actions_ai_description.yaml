Ping:
  ai_description: >-
    ### General Description

    The **Ping** action is used to verify the connectivity between Google SecOps and
    the Cofense Triage instance. It ensures that the provided credentials (Client
    ID and Client Secret) and the API Root URL are correct and that the service is
    reachable.


    ### Parameters Description

    There are no action-specific parameters for this action. It relies on the global
    integration configuration parameters (API Root, Client ID, Client Secret, and
    Verify SSL) to establish a connection.


    ### Additional Notes

    - This action does not process any entities.

    - It is primarily used for troubleshooting and initial configuration verification.


    ### Flow Description

    1. **Parameter Extraction**: Retrieves the connection settings from the integration
    configuration.

    2. **Authentication**: Initializes the `CofenseTriageManager`, which automatically
    attempts to generate an OAuth access token using the provided Client ID and Client
    Secret.

    3. **Connectivity Test**: The manager executes a GET request to the system status
    endpoint (`/api/public/v2/system/status`).

    4. **Validation**: The response is validated. If the status code indicates success,
    the action completes successfully. Otherwise, it catches the exception and reports
    a failure.
