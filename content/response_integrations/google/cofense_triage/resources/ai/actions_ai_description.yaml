Get Report Headers:
  ai_description: "### General Description\nThe **Get Report Headers** action retrieves\
    \ email header information associated with a specific report from Cofense Triage.\
    \ This action is designed to provide security analysts with detailed metadata\
    \ from reported emails, such as routing information, sender details, and MIME\
    \ versions, which are crucial for forensic investigation and identifying phishing\
    \ patterns.\n\n### Parameters Description\n| Parameter | Type | Mandatory | Description\
    \ |\n| :--- | :--- | :--- | :--- |\n| **Report ID** | String | Yes | The unique\
    \ identifier of the report in Cofense Triage for which headers should be retrieved.\
    \ |\n| **Max Headers To Return** | Integer | No | The maximum number of header\
    \ entries to retrieve from the API. Defaults to 50 if not specified. |\n\n###\
    \ Flow Description\n1. **Initialization**: The action initializes the Cofense\
    \ Triage manager using the provided API configuration (API Root, Client ID, Client\
    \ Secret).\n2. **Parameter Extraction**: It extracts the mandatory `Report ID`\
    \ and the optional `Max Headers To Return` limit from the action parameters.\n\
    3. **Data Retrieval**: The action performs a GET request to the Cofense Triage\
    \ API to fetch headers related to the specified report ID.\n4. **Data Processing**:\
    \ The retrieved header objects are parsed into a structured format suitable for\
    \ display.\n5. **Output Generation**: \n    *   A raw JSON representation of all\
    \ retrieved headers is added to the action results.\n    *   A formatted table\
    \ titled \"Report [ID] Headers\" is created, displaying the key-value pairs of\
    \ the email headers.\n    *   The action concludes with a success message indicating\
    \ the number of headers found or a failure message if the report ID is invalid.\n\
    \n### Additional Notes\n- This action does not process entities from the Google\
    \ SecOps case; it operates strictly based on the `Report ID` provided as a manual\
    \ input parameter.\n- If the specified `Report ID` does not exist in Cofense Triage,\
    \ the action will catch a `RecordNotFoundException` and return a failure status\
    \ with a descriptive error message."
