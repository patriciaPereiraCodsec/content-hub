Download Report Preview:
  ai_description: >-
    ### General Description

    The **Download Report Preview** action retrieves a visual representation (image)
    of the raw email associated with a specific report in Cofense Triage. This allows
    analysts to visually inspect the reported email content directly within the Google
    SecOps platform or by accessing the saved file on the local system.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Report ID** | String | Yes | Specify the ID of the report, which contains
    the raw email that needs to be downloaded. |

    | **Download Folder** | String | Yes | Specify the absolute path to the download
    folder. The file name will be constructed as `{report_id}.png` or `{report_id}.jpg`.
    |

    | **Overwrite** | Boolean | No | If enabled, the action will overwrite the file
    if it already exists at the specified path. Default is `true`. |

    | **Image Format** | String | Yes | Specify the format of the image (PNG or JPG).
    |

    | **Create Insight** | Boolean | No | If enabled, the action will create a case
    insight containing the raw email preview image rendered in HTML. |


    ### Additional Notes

    - This action does not operate on entities; it requires a specific Report ID as
    input.

    - Because this action downloads a file to the local system, it is not classified
    as an enrichment action according to the defined rules.


    ### Flow Description

    1. **Initialization**: The action extracts API credentials and user-provided parameters.

    2. **Pre-check**: It constructs the target file path and verifies if the file
    already exists, checking the `Overwrite` flag to determine whether to proceed
    or fail.

    3. **API Request**: It connects to the Cofense Triage API and requests the preview
    image for the specified `Report ID` in the chosen `Image Format` (PNG or JPG).

    4. **File Storage**: The received image stream is saved to the specified `Download
    Folder` on the local file system.

    5. **Insight Creation (Optional)**: If `Create Insight` is enabled, the action
    reads the saved image, converts it to a base64 string, and creates a visual case
    insight on the SecOps case wall.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Creates a case insight containing the base64 encoded image preview of the report
      email if the 'Create Insight' parameter is enabled.
