List Playbooks:
  ai_description: >-
    Lists available playbooks from the Cofense Triage platform. This action allows
    users to discover and retrieve details about playbooks configured in their Cofense
    Triage instance, which can then be used for automated response orchestration.
    It supports filtering by name or description and allows limiting the number of
    returned records.


    ### Parameters Description


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Filter Key** | String | No | The attribute to filter playbooks by. Options
    include 'Name' or 'Description'. |

    | **Filter Logic** | String | No | The logic to apply for filtering. 'Equal' performs
    a case-sensitive exact match, while 'Contains' performs a case-insensitive substring
    search. |

    | **Filter Value** | String | No | The specific string value to search for based
    on the selected Filter Key and Logic. |

    | **Max Records To Return** | Integer | No | The maximum number of playbook records
    to retrieve. Defaults to 50. The maximum allowed value is 200. |


    ### Additional Notes

    - If 'Filter Key' and 'Filter Logic' are provided but 'Filter Value' is empty,
    the filter will not be applied.

    - If 'Filter Key' and 'Filter Value' are provided but 'Filter Logic' is not specified,
    the filter will not be applied.

    - This action does not require or process any entities.


    ### Flow Description

    1. **Initialization**: The action initializes the Cofense Triage manager using
    the provided API credentials (API Root, Client ID, Client Secret).

    2. **Parameter Validation**: It validates the 'Max Records To Return' parameter
    to ensure it is a positive integer and within the allowed limit (200). It also
    checks that if a filter logic is selected, a filter key is also provided.

    3. **Data Retrieval**: The action sends a GET request to the Cofense Triage API
    (`/api/public/v2/playbooks`) with the specified filters and limit.

    4. **Processing**: The retrieved playbook data is parsed into structured objects
    containing attributes like Name, ID, Description, Active status, and Tags.

    5. **Output**: The results are formatted into a data table named 'Available Playbooks'
    and a raw JSON result for use in downstream playbook logic.
