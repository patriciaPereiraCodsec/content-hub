Get Domain Details:
  ai_description: >-
    ### General Description


    Retrieves domain-specific threat intelligence from Cofense Triage for URL entities.
    The action extracts the domain from the URL and fetches its risk score, creation
    date, and update status, providing security analysts with immediate context on
    the reputation of hostnames involved in an alert.


    ### Parameters Description


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | None | N/A | N/A | This action does not have any action-specific parameters.
    |


    ### Additional Notes


    * This action relies on global integration parameters (API Root, Client ID, Client
    Secret, Verify SSL) for authentication.

    * The action specifically targets URL entities and extracts the domain component;
    it does not process Domain entities directly.


    ### Flow Description


    1. **Initialize Configuration**: Retrieves the API Root and OAuth2 credentials
    from the integration settings.

    2. **Filter Entities**: Identifies URL entities (DestinationURL) within the action's
    scope.

    3. **Extract Domains**: Iterates through the URLs and extracts the domain name
    from each.

    4. **Query Cofense Triage**: Requests domain details from the `/api/public/v2/hostnames`
    endpoint for each extracted domain.

    5. **Format Results**: Compiles the risk scores and attributes into a JSON result
    and a 'Domain Details' data table.

    6. **Finalize Action**: Updates the action output with a summary of successful
    and failed enrichments.
