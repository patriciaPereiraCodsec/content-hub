Get Threat Indicator Details:
  ai_description: "### General Description\nThe **Get Threat Indicator Details** action\
    \ enriches entities by retrieving threat intelligence from the Cofense Triage\
    \ platform. It queries the system for known threat indicators and returns metadata\
    \ such as threat levels (e.g., Malicious, Suspicious), threat types, and sources.\
    \ This action is used to identify if specific indicators, such as file hashes\
    \ or email-related strings, have been flagged as threats within the Cofense Triage\
    \ environment.\n\n### Parameters Description\n| Parameter | Type | Mandatory |\
    \ Description |\n| :--- | :--- | :--- | :--- |\n| API Root | String | Yes | The\
    \ base URL of the Cofense Triage API instance. |\n| Client ID | String | Yes |\
    \ The Client ID used for OAuth2 authentication. |\n| Client Secret | String |\
    \ Yes | The Client Secret used for OAuth2 authentication. |\n| Verify SSL | Boolean\
    \ | Yes | If enabled, verifies the SSL certificate of the API endpoint. Defaults\
    \ to False. |\n\n### Flow Description\n1. **Authentication**: The action generates\
    \ an OAuth2 access token using the provided Client ID and Client Secret.\n2. **Entity\
    \ Processing**: The action iterates through all target entities in the current\
    \ context.\n3. **Identifier Formatting**: \n   - For **User** entities (if they\
    \ are valid emails), the query is formatted as `From:[email],To:[email]`.\n  \
    \ - For **Email Message** entities, the query is formatted as `Subject:[identifier]`.\n\
    \   - For other entities (such as File Hashes), the raw identifier is used.\n\
    4. **API Query**: A GET request is sent to the `/api/public/v2/threat_indicators`\
    \ endpoint, filtered by the threat value.\n5. **Enrichment Logic**:\n   - If a\
    \ threat indicator is found, the entity's `is_enriched` status is set to `True`.\n\
    \   - If the threat level is \"Malicious\" or \"Suspicious\", the entity is marked\
    \ as `is_suspicious`.\n   - The entity's `additional_properties` are updated with\
    \ metadata including the Threat ID, Type, Level, Source, and Timestamps.\n6. **Reporting**:\
