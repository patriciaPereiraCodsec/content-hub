Download Report Email:
  ai_description: >-
    Downloads the raw email (.eml) associated with a specific report from Cofense
    Triage and saves it to a local directory. This action is primarily used for forensic
    analysis or manual review of reported phishing emails. It allows users to specify
    a destination folder, handle file overwriting, and optionally create a case insight
    containing the email's content.


    ### Parameters Description


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Report ID | String | Yes | The unique identifier of the Cofense Triage report
    from which the raw email will be retrieved. |

    | Download Folder | String | Yes | The absolute local path on the SOAR runner
    where the downloaded .eml file will be saved. |

    | Overwrite | Boolean | No | If set to `True`, the action will replace any existing
    file with the same name in the destination folder. Default is `True`. |

    | Create Insight | Boolean | No | If set to `True`, the action will create a Google
    SecOps case insight containing the raw email content (HTML-transformed). Default
    is `False`. |


    ### Additional Notes

    - The filename is automatically generated using the format `{Report ID}.eml`.

    - If `Overwrite` is set to `False` and a file already exists at the target path,
    the action will fail to prevent data loss.

    - This action does not process entities; it operates based on the provided `Report
    ID`.


    ### Flow Description

    1. **Parameter Initialization**: The action retrieves the report ID, download
    path, and configuration settings (API credentials).

    2. **Path Construction**: It constructs the absolute file path using the provided
    folder and the report ID.

    3. **Pre-execution Check**: If `Overwrite` is disabled, it checks if the file
    already exists on the local filesystem; if it does, the action terminates with
    a failure.

    4. **Data Retrieval**: The action calls the Cofense Triage API to download the
    raw email content for the specified report.

    5. **File Persistence**: The retrieved content is saved as a `.eml` file in the
    designated folder.

    6. **Insight Creation (Optional)**: If enabled, the action transforms the email
    content and adds it as a 'General' type insight to the current case.

    7. **Completion**: The action returns the absolute file path of the saved email
    in the result JSON.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      The action saves a file to the local filesystem of the SOAR execution environment
      and can optionally create a case insight.
  categories:
    enrichment: false
