name: Remove Port From Port List
description: Remove port from the port list in F5 BIG-IP.
integration_identifier: F5BIGIPiControlAPI
parameters:
-   name: Port List Name
    default_value: ''
    type: string
    description: Specify the name of the port list from which you want to remove ports.
    is_mandatory: true
-   name: Ports
    default_value: ''
    type: string
    description: Specify a comma-separated list of ports that need to be removed.
    is_mandatory: true
dynamic_results_metadata:
-   result_example_path: resources/remove_port_from_port_list_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
