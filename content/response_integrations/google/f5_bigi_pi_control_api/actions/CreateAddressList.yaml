name: Create Address List
description: 'Create an address list in F5 BIG-IP. Supported entities: IP address.
    Note: address list requires 1 IP address to be available during creation.'
integration_identifier: F5BIGIPiControlAPI
parameters:
-   name: Name
    default_value: ''
    type: string
    description: Specify the name of the address list that needs to be created.
    is_mandatory: true
dynamic_results_metadata:
-   result_example_path: resources/create_address_list_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
simulation_data_json: '{"Entities": ["ADDRESS"]}'
