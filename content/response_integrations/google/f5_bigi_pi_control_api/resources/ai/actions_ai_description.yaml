Add IP To Address List:
  ai_description: >-
    ### General Description

    The **Add IP To Address List** action appends IP address entities to a specified
    address list on an F5 BIG-IP device. This action is primarily used for dynamic
    network security management, such as updating firewall blocklists or allowlists
    based on observed activity in Google SecOps.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Address List Name | String | Yes | The exact name of the address list on the
    F5 BIG-IP device that you want to modify. |


    ### Flow Description

    1. **Initialization**: The action retrieves connection details (API Root, credentials)
    and the target address list name from the configuration and parameters.

    2. **Entity Filtering**: It identifies all `ADDRESS` entities within the current
    alert scope.

    3. **Fetch Current State**: For each entity, the action queries the F5 BIG-IP
    API to retrieve the current members of the specified address list.

    4. **List Modification**: It appends the identifier of the IP entity to the existing
    list of addresses.

    5. **External Update**: The action performs a `PATCH` request to the F5 BIG-IP
    device to update the address list with the new, expanded set of IPs.

    6. **Outcome Reporting**: It tracks successful and failed updates, providing a
    summary message and attaching the updated list data as a JSON result.


    ### Additional Notes

    - This action performs a 'Read-Modify-Write' cycle to ensure that existing entries
    in the F5 address list are not overwritten or lost.

    - Only entities of type `ADDRESS` are processed; other entity types in the scope
    are ignored.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      The action modifies the configuration of the F5 BIG-IP device by adding new
      IP addresses to an existing address list via a PATCH request.
    fetches_data: true
    internal_data_mutation_explanation: null
