Create iRule:
  ai_description: >-
    ### General Description

    Creates a new iRule on an F5 BIG-IP instance. iRules are scripts based on the
    Tool Command Language (TCL) that allow you to customize how the BIG-IP system
    handles network traffic. This action is used to programmatically deploy traffic
    management logic to the F5 appliance.


    ### Parameters Description


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Name | String | Yes | Specify the unique name for the iRule to be created in
    the F5 BIG-IP system. |

    | Rule | String | Yes | Specify the actual TCL script logic that the iRule will
    execute (e.g., `when HTTP_REQUEST { ... }`). |


    ### Flow Description

    1. **Parameter Extraction**: The action retrieves the F5 BIG-IP connection details
    (API Root, credentials) and the action-specific parameters (Name and Rule).

    2. **Manager Initialization**: Initializes the `F5BIGIPiControlAPIManager` to
    handle authentication and API requests.

    3. **API Execution**: Sends a POST request to the `/mgmt/tm/ltm/rule` endpoint
    on the F5 BIG-IP system, passing the iRule name and the script content (as `apiAnonymous`).

    4. **Result Processing**: If successful, the action captures the metadata of the
    newly created iRule and adds it to the action's JSON results. If the creation
    fails, an error is logged and the action status is set to failed.


    ### Additional Notes

    This action does not operate on specific entities (like IPs or Hostnames) within
    the Google SecOps case; it is a standalone configuration action.
