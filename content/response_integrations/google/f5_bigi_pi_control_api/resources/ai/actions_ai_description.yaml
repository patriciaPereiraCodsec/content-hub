Add IP To Data Group:
  ai_description: >-
    ### General Description\nAdds IP Address entities to a specified internal data
    group within an F5 BIG-IP instance. This action is designed to update existing
    internal data groups by appending new IP records, which is commonly used for managing
    dynamic blocklists or traffic control lists.\n\n### Parameters Description\n|
    Parameter | Type | Mandatory | Description |\n| :--- | :--- | :--- | :--- |\n|
    Data Group Name | String | Yes | The name of the internal data group in F5 BIG-IP
    where the IP addresses will be added. |\n\n### Additional Notes\n- This action
    only supports **internal** data groups.\n- The target data group must already
    exist and be configured with the 'ip' type in F5 BIG-IP.\n\n### Flow Description\n1.
    **Filter Entities**: The action identifies all IP Address entities within the
    current execution context.\n2. **Retrieve Data Group**: For each entity, it fetches
    the current state and existing records of the specified data group from the F5
    BIG-IP API.\n3. **Type Validation**: It verifies that the retrieved data group
    is of the 'ip' type; otherwise, it raises an error.\n4. **Record Modification**:
    The action appends the entity's IP address to the list of existing records for
    that data group.\n5. **External Update**: It performs a PATCH request to the F5
    BIG-IP API to commit the updated records list.\n6. **Execution Summary**: The
    action tracks which entities were successfully added and provides a summary message
    along with the updated data group details in JSON format.
