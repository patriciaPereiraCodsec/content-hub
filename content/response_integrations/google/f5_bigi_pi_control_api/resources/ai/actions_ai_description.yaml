Create Address List:
  ai_description: >-
    ### General Description

    Creates a new address list in F5 BIG-IP using the provided IP address entities.
    This action is used to group IP addresses for use in security policies or firewall
    rules on the F5 BIG-IP platform.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Name | String | Yes | The unique name for the address list to be created in
    F5 BIG-IP. |


    ### Additional Notes

    - The action requires at least one IP address entity to be present in the current
    context, as F5 BIG-IP requires an address list to contain at least one member
    upon creation.

    - Only entities of type ADDRESS are processed.


    ### Flow Description

    1. **Parameter Extraction**: Retrieves the address list name from the action parameters
    and connection details from the integration configuration.

    2. **Entity Filtering**: Identifies all IP Address entities within the current
    scope.

    3. **Data Preparation**: Formats the identified IP addresses into the structure
    required by the F5 BIG-IP iControl API.

    4. **API Interaction**: Executes a POST request to the F5 BIG-IP management endpoint
    to create the address list.

    5. **Result Handling**: Captures the API response and reports the success or failure
    of the operation.
