Create Port List:
  ai_description: >-
    ### General Description

    Creates a new port list configuration on an F5 BIG-IP instance. This action allows
    security administrators to define groups of ports that can be used in firewall
    rules or other security policies within the F5 BIG-IP environment.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Name | String | Yes | The unique name for the new port list. Note: The name
    should not contain whitespace due to F5 BIG-IP limitations. |

    | Ports | String | Yes | A comma-separated list of port numbers (e.g., "80, 443,
    8080") to be included in the list. |


    ### Additional Notes

    This action does not operate on specific entities within a case; it is a standalone
    configuration action. It performs a state-changing operation on the external F5
    BIG-IP system.


    ### Flow Description

    1. **Parameter Extraction**: Retrieves the F5 BIG-IP connection details (API Root,
    credentials) and action parameters (List Name and Ports).

    2. **Data Parsing**: Converts the comma-separated string of ports into a Python
    list format required by the API.

    3. **API Interaction**: Sends a POST request to the F5 BIG-IP iControl API endpoint
    `/mgmt/tm/security/firewall/port-list` with the specified name and port definitions.

    4. **Result Processing**: Captures the API response containing the created port
    list details and attaches it as a JSON result to the action.
