    from which the IP addresses will be removed. |


    ### Additional Notes

    - **Constraint:** The action will fail with an error if the removal of the specified
    IPs would result in an empty address list, as F5 BIG-IP requires at least one
    entry in an address list.

    - **Scope:** This action only processes entities of type `ADDRESS` (IP addresses).


    ### Flow Description

    1. **Initialization:** Retrieves integration configuration (API Root, Credentials)
    and the target `Address List Name`.

    2. **Entity Filtering:** Identifies all `ADDRESS` entities within the current
    alert scope.

    3. **Data Retrieval:** Connects to the F5 BIG-IP API and fetches the current members
    of the specified address list.

    4. **List Processing:** Compares the fetched addresses with the target entities
    and creates a new list excluding the matches.

    5. **Validation:** Checks if the resulting list is empty; if so, it terminates
    with an error to prevent invalid F5 configurations.

    6. **External Mutation:** Sends a `PATCH` request to the F5 BIG-IP device to update
    the address list with the new, filtered set of IPs.

    7. **Reporting:** Provides a summary of which IPs were successfully removed and
    which ones were not found in the list.
