Create Data Group:
  ai_description: >-
    ### General Description

    This action creates a new internal data group within an F5 BIG-IP instance using
    the iControl REST API. Data groups are used in F5 BIG-IP to group related items
    (like IP addresses, strings, or integers) for use in iRules or other configurations.
    This specific action is restricted to creating 'internal' data groups.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Name | String | Yes | The unique name for the data group to be created in the
    F5 BIG-IP system. |

    | Type | String | Yes | The data type for the group. Supported values are 'IP
    Address', 'String', and 'Integer'. |


    ### Flow Description

    1. **Initialization**: The action retrieves connection details (API Root, Username,
    Password) and action parameters (Name, Type).

    2. **API Connection**: It establishes a session with the F5 BIG-IP iControl API.

    3. **Data Transformation**: The user-friendly 'Type' parameter (e.g., 'IP Address')
    is mapped to the API-specific type identifier (e.g., 'ip').

    4. **Creation Request**: A POST request is sent to the `/mgmt/tm/ltm/data-group/internal`
    endpoint with the specified name and type.

    5. **Result Handling**: If successful, the raw JSON response from F5 BIG-IP is
    attached to the action results, and a success message is returned. If the API
    returns an error (e.g., group already exists), the action fails with a descriptive
    error message.


    ### Additional Notes

    * This action does not process entities from the Google SecOps case; it relies
    entirely on the provided input parameters.

    * Only internal data groups are supported by this action.
