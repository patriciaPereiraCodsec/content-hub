Add Port To Port List:
  ai_description: >-
    ### General Description

    This action adds one or more ports to a specified port list within an F5 BIG-IP
    instance. It is used to dynamically update firewall configurations by appending
    new port definitions to existing lists. The action processes a comma-separated
    list of ports and attempts to update the F5 BIG-IP configuration for each.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Port List Name | String | Yes | The exact name of the port list in F5 BIG-IP
    where the ports should be added. |

    | Ports | String | Yes | A comma-separated list of port numbers or names to be
    added to the list (e.g., "80, 443, 8080"). |


    ### Additional Notes

    - The action performs a 'GET' request to retrieve the current state of the port
    list before each update to ensure the new port is appended to the existing set.

    - If a port already exists or the update fails for a specific port, the action
    will continue to process the remaining ports in the list and report the failures
    at the end.


    ### Flow Description

    1. **Initialization**: The action initializes the F5 BIG-IP manager using the
    provided API credentials and connection settings.

    2. **Parameter Parsing**: It extracts the target port list name and splits the
    comma-separated string of ports into a Python list.

    3. **Iterative Update**: For each port provided:
        - It fetches the current configuration of the specified port list from the
    F5 BIG-IP API.
        - It appends the new port object to the existing list of ports.
        - It sends a PATCH request to the F5 BIG-IP API to update the port list with
    the new combined set.
    4. **Result Tracking**: The action tracks which ports were successfully added
    and which encountered errors.

    5. **Finalization**: It returns a summary message indicating success or failure
    for the batch and provides the final port list state in JSON format.
  capabilities:
