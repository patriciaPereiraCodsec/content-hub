identifier: Cybereason
name: Cybereason
parameters:
-   name: API Root
    default_value: ''
    type: string
    description: Cybereason server URL to connect to.
    is_mandatory: true
    integration_identifier: Cybereason
-   name: Username
    default_value: ''
    type: string
    description: Account login name to connect to Cybereason.
    is_mandatory: true
    integration_identifier: Cybereason
-   name: Password
    default_value: ''
    type: password
    description: Account password to connect to Cybereason.
    is_mandatory: true
    integration_identifier: Cybereason
-   name: Verify SSL
    default_value: 'False'
    type: boolean
    description: If enabled, verify the SSL certificate for all of the connections
        done by integration.
    is_mandatory: true
    integration_identifier: Cybereason
-   name: CA Certificate Base64
    default_value: ''
    type: string
    description: CA certificate to use to validate the secure connection. Parameter
        accepts the CA certificate in a form of base64 encoded string.
    is_mandatory: false
    integration_identifier: Cybereason
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/cybereason
categories:
- Endpoint Security
- Security
svg_logo_path: resources/logo.svg
image_path: resources/image.png
