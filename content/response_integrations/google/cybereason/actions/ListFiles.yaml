name: List files
description: Get information about files from Cybereason.
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/cybereason#list_files
integration_identifier: Cybereason
parameters:
-   name: File Hash
    default_value: ''
    type: string
    description: 'Specify a comma-separated list of file hashes for which you want
        to return data. Note: action only supports SHA-1 and MD5 hashes. If you provide
        values for this parameter, then parameter “Results Limit“ is ignored. Action
        will try to find information about all provided hashes. '
    is_mandatory: false
-   name: Results Limit
    default_value: ''
    type: string
    description: Specify how many files to return.
    is_mandatory: true
-   name: Fields To Return
    default_value: ''
    type: string
    description: 'Specify a comma-separated list of fields that you want to return.
        If nothing is provided, action will work with predefined fields. Possible
        values: md5String,ownerMachine,avRemediationStatus,isSigned,signatureVerified,sha1String,maliciousClassificationType,createdTime,modifiedTime,size,correctedPath,productName,productVersion,companyName,internalName,elementDisplayName.'
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/list_files_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
script_result_name: num_of_files
