name: Clear Reputation
description: 'Clear the reputation of the entity in Cybereason. Supported entities:
    File Hash, IP Address, URL (action will strip domain part from URL entity). Note:
    only MD5 and SHA1 hashes are supported.'
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/cybereason#clear_reputation
integration_identifier: Cybereason
parameters: []
dynamic_results_metadata: []
creator: admin
simulation_data_json: '{"Entities": ["FILEHASH", "ADDRESS", "DestinationURL"]}'
