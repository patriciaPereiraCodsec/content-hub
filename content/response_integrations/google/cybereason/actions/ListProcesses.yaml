name: List Processes
description: List processes based on provided criteria in Cybereason.
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/cybereason#list_processes
integration_identifier: Cybereason
parameters:
-   name: Process Name
    default_value: ''
    type: string
    description: Specify a comma-separated list of process names for which you want
        to return data.
    is_mandatory: false
-   name: Machine Name
    default_value: ''
    type: string
    description: Specify a comma-separated list of machine names on which you want
        to search for processes.
    is_mandatory: false
-   name: Has Suspicions
    default_value: ''
    type: boolean
    description: If enabled, action will only return processes that are labeled as
        suspicious.
    is_mandatory: false
-   name: Has Incoming Connection
    default_value: ''
    type: boolean
    description: If enabled, action will only return processes that have incoming
        connections.
    is_mandatory: false
-   name: Has Outgoing Connection
    default_value: ''
    type: boolean
    description: If enabled, action will only return processes that have outgoing
        connections.
    is_mandatory: false
-   name: Has External Connection
    default_value: ''
    type: boolean
    description: If enabled, action will only return processes that have external
        connections.
    is_mandatory: false
-   name: Unsigned process with unknown reputation
    default_value: ''
    type: boolean
    description: If enabled, action will only return unsigned processes with unknown
        reputation.
    is_mandatory: false
-   name: Running from temporary folder
    default_value: ''
    type: boolean
    description: If enabled, action will only return processes running from a temporary
        folder.
    is_mandatory: false
-   name: Privilege Escalation
    default_value: ''
    type: boolean
    description: If enabled, action will only return processes with escalated privileges.
    is_mandatory: false
-   name: Malicious use of PsExec
    default_value: ''
    type: boolean
    description: If enabled, action will only return processes related to malicious
        use of PsExec.
    is_mandatory: false
-   name: Results Limit
    default_value: ''
    type: string
    description: Specify how many processes to return.
    is_mandatory: true
dynamic_results_metadata:
-   result_example_path: resources/list_processes_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
script_result_name: num_of_processes
