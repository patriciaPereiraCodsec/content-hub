name: Execute Simple Investigation Search
description: 'Execute investigation search based on parameters in Cybereason. Note:
    this action doesn''t support nested queries. Only one type of data, for example,
    machines or users can be queried at once. For nested queries refer to action "Execute
    Custom Investigation Search". Please refer to the documentation portal for more
    details.'
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/cybereason#execute_simple_investigation_search
integration_identifier: Cybereason
parameters:
-   name: Request Type
    default_value: Machine
    type: ddl
    optional_values:
    - Machine
    - User
    - Process
    - File
    - Connection
    - Domain Name
    - IP Address
    - Service
    description: Specify what should be queried.
    is_mandatory: false
-   name: Query Filters
    default_value: '{API field name} {Operator} {Value} OR {Value}'
    type: string
    description: 'Specify the query that needs to be executed. Note: this query should
        follow a strict pattern of "{API field} {Operator} {Value}". For multiple
        values you need to provide an "OR" key. Each new filter needs to start from
        a new line. Please refer to the documentation portal to understand what an
        API field name is. Possible operators: Equals NotEquals ContainsIgnoreCase
        NotContainsIgnoreCase LessThan LessOrEqualsTo GreaterThan GreaterOrEqualsTo
        Between Includes NotIncludes'
    is_mandatory: false
-   name: Fields To Return
    default_value: osVersionType,platformArchitecture,uptime,isActiveProbeConnected,lastSeenTimeStamp,timeStampSinceLastConnectionTime,mountPoints,processes,services,logonSessions,domainFqdn,timezoneUTCOffsetMinutes,domain,ownerMachine,ownerOrganization.name,isLocalSystem,emailAddress,avRemediationStatus,isSigned,signatureVerified,sha1String,maliciousClassificationType,createdTime,modifiedTime,size,correctedPath,productName,productVersion,companyName,internalName,elementDisplayName
    type: string
    description: 'Specify a comma-separated list of fields that need to be returned.
        Note: you need to provide API field names.'
    is_mandatory: true
-   name: Max Results To Return
    default_value: '50'
    type: string
    description: 'Specify how many results to return. Default: 50.'
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/execute_simple_investigation_search_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
