name: Execute Custom Investigation Search
description: Execute investigation search based on parameters in Cybereason. This
    action supports nested queries for different item types.
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/cybereason#execute_custom_investigation_search
integration_identifier: Cybereason
parameters:
-   name: Query Filters JSON
    default_value: '[{"request_type": "{request type 1}","queries": ["Query 1","Query
        2"],"connection": "{connection feature}"},{"request_type": "{request type
        2}","queries": ["Query 3"]}]'
    type: string
    description: 'Specify the query that needs to be executed. Note: the query should
        follow a strict pattern of "{API field } {Operator} {Value}". For multiple
        values you need to provide an "OR" key. Each new filter needs to be a separate
        item in the list. Each key represents the request type, for example, machine
        or user. Please refer to the documentation portal to understand what an API
        field name is. Possible operators: Equals NotEquals ContainsIgnoreCase NotContainsIgnoreCase
        LessThan LessOrEqualsTo GreaterThan GreaterOrEqualsTo Between Includes NotIncludes'
    is_mandatory: true
-   name: Fields To Return
    default_value: osVersionType,platformArchitecture,uptime,isActiveProbeConnected,lastSeenTimeStamp,timeStampSinceLastConnectionTime,mountPoints,processes,services,logonSessions,domainFqdn,timezoneUTCOffsetMinutes,domain,ownerMachine,ownerOrganization.name,isLocalSystem,emailAddress,avRemediationStatus,isSigned,signatureVerified,sha1String,maliciousClassificationType,createdTime,modifiedTime,size,correctedPath,productName,productVersion,companyName,internalName,elementDisplayName
    type: string
    description: 'Specify a comma-separated list of fields that need to be returned.
        Note: you need to provide API field names.'
    is_mandatory: true
-   name: Max Results To Return
    default_value: '50'
    type: string
    description: 'Specify how many results to return. Default: 50.'
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/execute_custom_investigation_search_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
