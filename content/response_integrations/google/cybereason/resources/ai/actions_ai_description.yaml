Ping:
  ai_description: >-
    ### General Description

    The **Ping** action is used to verify the connectivity between Google SecOps and
    the Cybereason server. It ensures that the provided credentials (Username and
    Password) and the API Root URL are correct and that the SOAR platform can successfully
    communicate with the Cybereason API.


    ### Parameters Description

    This action does not have specific action-level parameters. It utilizes the following
    **Integration Configuration** parameters:


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **API Root** | String | Yes | The base URL of the Cybereason instance (e.g.,
    `https://<instance>.cybereason.net`). |

    | **Username** | String | Yes | The username used to authenticate with the Cybereason
    server. |

    | **Password** | Password | Yes | The password used to authenticate with the Cybereason
    server. |

    | **Verify SSL** | Boolean | No | If enabled, the action will verify the SSL certificate
    of the Cybereason server. Default is `False`. |

    | **CA Certificate Base64** | String | No | The Base64 encoded CA certificate
    to use for SSL verification if a private CA is used. |


    ### Flow Description

    1. **Parameter Extraction**: The action retrieves the connection details (API
    Root, Username, Password, SSL settings) from the integration configuration.

    2. **Manager Initialization**: It initializes the `CybereasonManager`, which immediately
    attempts to log in to the Cybereason server using the provided credentials via
    a POST request to the `/login.html` endpoint.

    3. **Connectivity Test**: Upon successful login, the manager executes a test query
    (a simple visual search for a single Malop process via the `/rest/visualsearch/query/simple`
    endpoint) to confirm that the account has the necessary permissions to interact
    with the API.

    4. **Result Reporting**: If both the login and the test query succeed, the action
    returns a success message. If any step fails, an error message is returned, and
    the action is marked as failed.


    ### Additional Notes

    * This action is primarily used for troubleshooting and initial setup verification.

    * It does not process any entities or modify any data within Cybereason.
