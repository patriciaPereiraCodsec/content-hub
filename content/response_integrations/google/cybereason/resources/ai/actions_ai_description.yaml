Execute Simple Investigation Search:
  ai_description: >-
    ### General Description

    Executes a simple investigation search in Cybereason based on user-defined parameters.
    This action allows users to query various data types such as Machines, Users,
    Processes, Files, Connections, Domain Names, IP Addresses, or Services without
    needing to write complex nested queries. It is primarily used for threat hunting
    or gathering specific telemetry data from the Cybereason environment.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Request Type | String | No | Specifies the category of data to be queried (e.g.,
    Machine, User, Process, File, Connection, Domain Name, IP Address, Service). Default
    is 'Machine'. |

    | Query Filters | String | No | Defines the search criteria using the pattern
    `{API field} {Operator} {Value}`. Multiple filters can be provided on new lines
    using 'OR'. Note: Nested queries are not supported in this action. |

    | Fields To Return | String | Yes | A comma-separated list of API field names
    to be included in the search results. |

    | Max Results To Return | Integer | No | The maximum number of results to retrieve.
    Default is 50. Must be a positive integer. |


    ### Additional Notes

    This action is designed for flat queries. For complex, nested investigation logic,
    use the 'Execute Custom Investigation Search' action. The action will fail if
    the query syntax is incorrect or if the API fields provided in 'Fields To Return'
    are invalid for the selected 'Request Type'.


    ### Flow Description

    1. **Initialization**: Retrieves connection settings (API Root, Credentials) and
    action parameters from the environment.

    2. **Validation**: Checks if the 'Max Results To Return' is a positive integer
    and converts the 'Fields To Return' string into a list.

    3. **Connection**: Initializes the Cybereason Manager and authenticates with the
    server.

    4. **Execution**: Constructs a visual search query based on the provided filters
    and request type, then executes it against the Cybereason `/rest/visualsearch/query/simple`
    endpoint.

    5. **Output**: If data is found, it formats the results into a Siemplify data
    table named 'Search Results' and attaches the raw JSON data to the action result.
