Is Probe Connected:
  ai_description: >-
    ### General Description

    The **Is Probe Connected** action checks the connectivity status of Hostname entities
    within the Cybereason platform. Its primary purpose is to verify if the Cybereason
    sensor (probe) installed on a target endpoint is currently online and communicating
    with the management server.


    ### Parameters

    This action does not require any additional input parameters. It utilizes the
    global integration configuration (API Root, Username, Password, and SSL settings)
    to authenticate and perform the check.


    ### Flow Description

    1. **Authentication**: The action establishes a session with the Cybereason API
    using the configured credentials.

    2. **Entity Filtering**: It identifies all `HOSTNAME` entities provided in the
    current Google SecOps context.

    3. **Sensor Lookup**: For each hostname, the action queries the Cybereason sensor
    inventory (`/rest/sensors/query`) to find the corresponding sensor record.

    4. **Connectivity Validation**: It inspects the `status` attribute of the retrieved
    sensor. If the status is 'online', the probe is marked as connected.

    5. **Reporting**: The connectivity results (connected vs. disconnected) are compiled
    into a 'Connection Status' data table and a JSON result attached to the case for
    further automation or analyst review.


    ### Additional Notes

    - This action is read-only regarding the external Cybereason system; it does not
    change the state of the sensors.

    - If a hostname cannot be matched to a sensor in Cybereason, it will be reported
    as a failed entity in the action output.
