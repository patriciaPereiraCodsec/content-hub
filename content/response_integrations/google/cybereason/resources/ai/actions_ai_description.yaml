List Processes:
  ai_description: >-
    ### General Description

    This action lists processes within the Cybereason environment based on a variety
    of user-defined criteria. It allows security analysts to search for processes
    by name, machine, or specific behavioral characteristics such as suspicious activity,
    network connections, or privilege escalation. The results are returned as a data
    table and a JSON object for further automation steps.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Process Name | String | No | A comma-separated list of process names to search
    for. |

    | Machine Name | String | No | A comma-separated list of machine names where the
    search should be performed. |

    | Has Suspicions | Boolean | No | If enabled, the action will only return processes
    that are labeled as suspicious. |

    | Has Incoming Connection | Boolean | No | If enabled, the action will only return
    processes that have incoming connections. |

    | Has Outgoing Connection | Boolean | No | If enabled, the action will only return
    processes that have outgoing connections. |

    | Has External Connection | Boolean | No | If enabled, the action will only return
    processes that have external connections. |

    | Unsigned process with unknown reputation | Boolean | No | If enabled, the action
    will only return unsigned processes with unknown reputation. |

    | Running from temporary folder | Boolean | No | If enabled, the action will only
    return processes running from a temporary folder. |

    | Privilege Escalation | Boolean | No | If enabled, the action will only return
    processes with escalated privileges. |

    | Malicious use of PsExec | Boolean | No | If enabled, the action will only return
    processes related to malicious use of PsExec. |

    | Results Limit | Integer | Yes | Specify how many processes to return (default
    is 100). |


    ### Additional Notes

    - If no filters are provided, the action will attempt to list all processes up
    to the specified limit.

    - The 'Results Limit' must be a positive integer.


    ### Flow Description

    1. **Authentication**: The action connects to the Cybereason API using the provided
    credentials (Username, Password) and API Root.

    2. **Parameter Parsing**: It extracts and validates the search filters and the
    results limit from the action parameters.

    3. **Query Construction**: A complex query is built for the Cybereason 'visualsearch'
    endpoint, incorporating all enabled filters such as process name, machine name,
    and behavioral flags.

    4. **Data Retrieval**: The action executes the search via the CybereasonManager
    and retrieves process metadata.

    5. **Output Generation**: The retrieved processes are formatted into a CSV table
    named 'Processes' and a raw JSON result. The total count of found processes is
    returned as the action's result value.
