Set Reputation:
  ai_description: >-
    ### General Description

    The **Set Reputation** action allows users to classify entities within the Cybereason
    platform by adding them to specific reputation lists. This action is used to proactively
    block known threats (Blacklist) or allow trusted entities (Whitelist), helping
    to manage security policies and reduce false positives.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Reputation List Type** | String | Yes | Determines which reputation list the
    entity will be added to. Supported values are `Whitelist` and `Blacklist`. |


    ### Flow Description

    1. **Authentication**: The action authenticates with the Cybereason API using
    the configured credentials and API Root.

    2. **Entity Selection**: It identifies supported entities from the case, specifically
    targeting IP Addresses, URLs, and File Hashes.

    3. **Validation and Normalization**:
        * **URLs**: The action extracts the domain component from the URL entity.
        * **File Hashes**: It validates the hash type, supporting only MD5 and SHA1.
    Unsupported hash types (like SHA256) are skipped.
    4. **Reputation Update**: For each valid entity, the action sends a request to
    Cybereason's `/rest/classification/update` endpoint to set the custom reputation
    based on the user-selected list type.

    5. **Completion**: The action summarizes the results, listing which entities were
    successfully updated and which failed (e.g., due to unsupported hash types or
    API errors).


    ### Additional Notes

    * **Hash Support**: Only MD5 and SHA1 hashes are supported for reputation setting
    in Cybereason via this action.

    * **URL Processing**: The action automatically converts URL entities to domains
    before submission.
