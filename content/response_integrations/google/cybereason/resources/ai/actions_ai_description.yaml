  ai_description: "### General Description\nThe **Clear Reputation** action removes\
    \ custom reputation classifications (such as whitelist or blacklist entries) for\
    \ specific entities within the Cybereason platform. This action is used to revert\
    \ previous reputation assignments, ensuring that entities are no longer explicitly\
    \ blocked or allowed based on custom rules.\n\n### Parameters\nThere are no additional\
    \ parameters for this action.\n\n### Flow Description\n1. **Initialization**:\
    \ The action establishes a connection to the Cybereason API using the integration's\
    \ configuration (API Root, Username, Password).\n2. **Entity Filtering**: It identifies\
    \ supported entities from the case, specifically IP Addresses, File Hashes, and\
    \ URLs.\n3. **Data Normalization**: \n    * For **URLs**, the action extracts\
    \ the domain part to match Cybereason's classification format.\n    * For **File\
    \ Hashes**, it validates that the hash is either MD5 or SHA1, as these are the\
    \ only types supported for reputation management in Cybereason.\n4. **Existence\
    \ Check**: The action searches the Cybereason classification list to verify if\
    \ the entity has a custom reputation assigned.\n5. **Reputation Removal**: If\
    \ the entity is found, the action sends a request to Cybereason to remove the\
    \ custom classification (setting 'remove' to true).\n6. **Result Aggregation**:\
    \ The action summarizes which entities were successfully cleared, which were not\
    \ found in Cybereason, and which failed due to errors."
