Update Malop Status:
  ai_description: >-
    Updates the status of a specific Malop (Malicious Operation) within the Cybereason
    platform. This action allows security analysts to programmatically transition
    Malops between different lifecycle states such as 'Open', 'Remediated', or 'Not
    Relevant'.


    ### Flow Description:

    1. **Parameter Extraction:** Retrieves the Malop ID and the target Status from
    the action parameters.

    2. **Validation:** Checks if the provided status is valid according to the Cybereason
    API requirements.

    3. **Existence Check:** Verifies that the Malop ID exists in the Cybereason environment
    before attempting an update.

    4. **Status Update:** Executes a POST request to the Cybereason API to update
    the Malop's status.


    ### Parameters Description:

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Malop ID | String | Yes | The unique GUID of the Malop that needs to be updated.
    |

    | Status | String (Enum) | Yes | The new status to assign to the Malop. Supported
    values: 'To Review', 'Remediated', 'Unread', 'Not Relevant', 'Open'. |


    ### Additional Notes:

    - Detection Malops specifically support 'Remediated', 'Not Relevant', or 'Open'
    statuses.

    - This action does not process entities; it operates directly on the provided
    Malop ID parameter.
