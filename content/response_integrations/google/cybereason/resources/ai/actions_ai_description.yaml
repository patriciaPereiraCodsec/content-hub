Prevent File:
  ai_description: >-
    ### General Description

    The **Prevent File** action allows security analysts to blacklist specific file
    hashes within the Cybereason platform. By adding a hash to the blacklist, the
    action ensures that any execution attempts of the associated file are prevented
    across the environment managed by Cybereason. This is a containment action used
    to stop the spread of known malicious files.


    ### Parameters

    There are no specific action parameters for this action. It relies on the integration's
    global configuration (API Root, Username, Password, etc.) to authenticate and
    communicate with the Cybereason server.


    ### Additional Notes

    *   **Supported Hash Types:** This action strictly supports **MD5** hashes. If
    a SHA1 or other hash type is provided, the action will skip that entity and log
    a warning.

    *   **Prevention Mode:** The action explicitly sets the `prevent` flag to `True`
    in Cybereason, meaning it doesn't just categorize the file but actively blocks
    it from executing.


    ### Flow Description

    1.  **Initialization:** The action establishes a session with the Cybereason API
    using the provided configuration parameters and performs a connectivity test.

    2.  **Entity Filtering:** It identifies all `FILEHASH` entities within the current
    Google SecOps context.

    3.  **Validation:** For each entity, it verifies if the hash is an MD5 string
    (32 characters). Non-MD5 hashes are skipped.

    4.  **Execution:** It sends a POST request to the Cybereason `/rest/classification/update`
    endpoint for each valid MD5 hash, setting the classification to `blacklist` and
    enabling prevention.

    5.  **Completion:** The action tracks successful and failed preventions and returns
    a summary message to the case wall, indicating which hashes were successfully
    blacklisted.
