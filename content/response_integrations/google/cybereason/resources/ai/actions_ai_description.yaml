List Malop Remediations:
  ai_description: >-
    ### General Description

    Retrieves a list of available remediation actions for a specific Malop (Malicious
    Operation) in Cybereason. This action is used to identify which response actions
    (such as file quarantine, process termination, or machine isolation) are supported
    by the Cybereason platform for a specific detection. It provides the necessary
    metadata (like unique IDs and target names) required to execute subsequent remediation
    actions.


    ### Parameters Description


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Malop ID | String | Yes | The unique identifier of the Malop for which you want
    to list available remediations. |


    ### Flow Description

    1. **Initialization**: The action initializes the Cybereason API manager using
    the provided integration configuration (API Root, credentials, and SSL settings).

    2. **Data Retrieval**: It sends a POST request to the Cybereason `/rest/detection/custom-remediation`
    endpoint to fetch suspicious details and potential remediation paths associated
    with the provided Malop ID.

    3. **Parsing**: The response is parsed into a list of `MalopSuspeciousDetails`
    objects, extracting structured information such as the remediation type, target
    name, target ID, machine name, and machine ID.

    4. **Output**: The list of available remediations is returned as a JSON result.
    If no remediations are found, the action completes with a failure status and an
    informative message.


    ### Additional Notes

    This action is a read-only operation and does not execute any remediations; it
    is intended to be used as a reconnaissance step in a playbook before calling a
    remediation execution action.
