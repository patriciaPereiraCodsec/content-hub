Isolate Machine:
  ai_description: >-
    ### General Description

    The **Isolate Machine** action is designed to isolate a machine (endpoint) from
    the network using the Cybereason platform. This is a containment action typically
    used during incident response to prevent a compromised host from communicating
    with other systems or exfiltrating data, while still allowing it to communicate
    with the Cybereason management server for investigation.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | None | N/A | N/A | This action does not have any user-facing parameters. |


    ### Flow Description

    1. **Entity Filtering**: The action identifies all `HOSTNAME` entities in the
    current alert or case scope.

    2. **Status Check**: For each identified hostname, the action queries Cybereason
    to retrieve sensor details and determine if the machine is already isolated.

    3. **Isolation Trigger**: If a machine is found and is not currently isolated,
    the action sends a command to Cybereason to initiate the isolation process.

    4. **Asynchronous Monitoring**: Because isolation can take time, the action enters
    an asynchronous state. It periodically polls Cybereason to check the status of
    the isolation command.

    5. **Completion**: Once the machines are confirmed as isolated (or the action
    reaches a timeout), it provides a final summary of which machines were successfully
