Remediate Malop:
  ai_description: "### General Description\nThis action executes remediation tasks\
    \ on a specific Malop (Malicious Operation) within the Cybereason platform. It\
    \ allows security analysts to programmatically trigger actions such as killing\
    \ processes or blocking files based on unique remediation identifiers. The action\
    \ operates asynchronously, meaning it initiates the remediation and then periodically\
    \ polls Cybereason for the status of each task until they succeed, fail, or the\
    \ action times out.\n\n### Parameters Description\n| Parameter | Type | Mandatory\
    \ | Description |\n| :--- | :--- | :--- | :--- |\n| Malop ID | String | Yes |\
    \ The unique identifier of the Malop in Cybereason that requires remediation.\
    \ |\n| Remediation Unique IDs | String | Yes | A comma-separated list of specific\
    \ remediation action IDs to be executed. These IDs are typically retrieved using\
    \ the 'List Malop Remediations' action. |\n\n### Additional Notes\n- **Asynchronous\
    \ Execution:** This action is designed to run asynchronously. Users should ensure\
    \ the script timeout in the Chronicle SOAR IDE is sufficiently high to allow for\
    \ polling of long-running remediation tasks.\n- **Block Actions:** Remediation\
    \ actions categorized as 'Block' (e.g., `BLOCK_FILE`) are treated as immediate\
    \ successes in the initial run and do not require asynchronous polling.\n- **Prerequisite:**\
    \ It is highly recommended to run the 'List Malop Remediations' action first to\
    \ obtain the correct `Remediation Unique IDs` for the target Malop.\n\n### Flow\
    \ Description\n1. **Initialization:** The action extracts configuration parameters\
    \ (API Root, credentials) and action parameters (Malop ID, Remediation IDs).\n\
    2. **Validation:** It fetches the list of available remediation actions for the\
    \ specified Malop from Cybereason and validates that the provided `Remediation\
    \ Unique IDs` exist.\n3. **Execution:** For each valid ID, the action sends a\
    \ request to Cybereason to initiate the remediation.\n4. **Status Tracking (Async):**\
    \ \n    - If the action is a 'Block' type, it is marked as successful immediately.\n\
    \    - For other actions (like `KILL_PROCESS`), the action enters an asynchronous\
    \ state, storing the remediation IDs.\n5. **Polling:** In subsequent runs, the\
    \ action queries Cybereason for the status of each pending remediation task.\n\
    6. **Completion:** Once all tasks reach a terminal state (SUCCESS, FAILED, or\
    \ ABORTED) or a timeout occurs, the action aggregates the results and updates\
    \ the case with the final status of each remediation."
