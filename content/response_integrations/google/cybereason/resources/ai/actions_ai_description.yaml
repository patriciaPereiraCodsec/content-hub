Execute Custom Investigation Search:
  ai_description: >-
    ### General Description

    Executes a custom investigation search in Cybereason based on a structured JSON
    query. This action allows users to perform complex, nested searches across various
    Cybereason item types (such as Machines, Users, Processes, Files, etc.) by defining
    specific filters and connections. It is designed for advanced threat hunting and
    deep investigation where standard entity-based enrichment is insufficient.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Query Filters JSON** | String | Yes | A JSON array of objects defining the
    search. Each object must include `request_type` (e.g., 'Machine', 'Process') and
    `queries` (a list of filter strings like 'elementDisplayName Equals PC1'). It
    can optionally include a `connection` key to link to related features. |

    | **Fields To Return** | String | Yes | A comma-separated list of Cybereason API
    field names to be included in the results (e.g., 'osVersionType, platformArchitecture').
    |

    | **Max Results To Return** | Integer | No | The maximum number of search results
    to retrieve. Defaults to 50. |


    ### Additional Notes

    - The `Query Filters JSON` must follow a strict syntax for queries: `"{API field}
    {Operator} {Value}"`. Supported operators include `Equals`, `NotEquals`, `ContainsIgnoreCase`,
    `LessThan`, etc.

    - For multiple values in a single query string, use the `OR` keyword (e.g., `"elementDisplayName
    Equals PC1 OR PC2"`).

    - This action does not run on specific SecOps entities; it performs a global search
    based on the provided JSON configuration.


    ### Flow Description

    1. **Parameter Extraction**: The action retrieves the API configuration and the
    user-provided search parameters.

    2. **Query Validation**: It parses the `Query Filters JSON` to ensure it is a
    valid JSON structure and validates the integer limit for results.

    3. **Manager Initialization**: Authenticates with the Cybereason platform using
    the provided credentials.

    4. **Search Execution**: Sends a POST request to the Cybereason Visual Search
    API (`/rest/visualsearch/query/simple`) with the constructed query path and requested
    fields.

    5. **Result Processing**: Parses the API response into structured data objects.

    6. **Output Generation**: If data is found, it populates a SOAR data table named
    'Search Results' and attaches the raw JSON results to the action output.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
  categories:
    enrichment: true
  entity_usage:
