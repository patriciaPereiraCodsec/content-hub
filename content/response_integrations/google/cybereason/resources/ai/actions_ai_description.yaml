Add Comment To Malop:
  ai_description: >-
    ### General Description

    Adds a comment to a specific Malop (Malicious Operation) within the Cybereason
    platform. This action is used to document findings, provide updates, or add context
    to an investigation directly in the Cybereason console from Google SecOps.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Malop ID | String | Yes | The unique identifier (GUID) of the Malop in Cybereason
    to which the comment will be added. |

    | Comment | String | Yes | The text content of the comment to be added to the
    Malop. |


    ### Additional Notes

    - This action does not process entities from the Google SecOps case; it relies
    entirely on the provided 'Malop ID' parameter.

    - The action first validates the existence of the Malop before attempting to add
    the comment.


    ### Flow Description

    1. **Initialization**: Connects to the Cybereason API using the provided credentials
    (API Root, Username, Password).

    2. **Validation**: Checks if the specified Malop ID exists in Cybereason using
    the `get_malop_or_raise` method.

    3. **Execution**: Sends a POST request to the Cybereason `/rest/crimes/comment/{malop_guid}`
    endpoint with the encoded comment text.

    4. **Completion**: Returns a success message if the comment is successfully posted,
    or an error message if the Malop is not found or the API call fails.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Adds a new comment to a Malop record in the Cybereason platform via a POST request
      to the /rest/crimes/comment endpoint.
    fetches_data: true
    internal_data_mutation_explanation: null
  categories:
