Get Malop:
  ai_description: >-
    ### General Description

    Retrieves comprehensive details for a specific Malop (Malicious Operation) from
    the Cybereason platform using its unique identifier. This action is essential
    for incident investigation, providing deep visibility into the scope of an attack,
    including affected machines, users, and the root cause elements identified by
    Cybereason.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Malop ID | String | Yes | Specify the unique GUID of the Malop for which you
    want to return details. |


    ### Additional Notes

    This action does not operate on entities within the Google SecOps context. It
    relies entirely on the provided Malop ID parameter. The results are presented
    as a JSON object for automation and a formatted table on the case wall for analyst
    review.


    ### Flow Description

    1. **Parameter Extraction**: The action retrieves the Cybereason API credentials
    from the integration configuration and the Malop ID from the action parameters.

    2. **Manager Initialization**: Initializes the Cybereason Manager, which handles
    authentication and session management.

    3. **Data Retrieval**: The action attempts to fetch Malop details. It first tries
    the specific detection details endpoint and, if unsuccessful, falls back to a
    visual search query to ensure the data is captured.

    4. **Internal Data Output**: The retrieved Malop details are processed and added
    to the Google SecOps case wall as a data table for visibility.

    5. **Result Finalization**: The full Malop data is returned as a JSON result,
    and the action completes with a success message.
