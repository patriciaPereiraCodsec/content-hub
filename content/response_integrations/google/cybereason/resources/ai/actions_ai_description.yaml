Enrich Entities:
  ai_description: >-
    ### General Description

    Enriches Hostname, IP Address, File Hash, and URL entities using threat intelligence
    and machine data from Cybereason. This action retrieves detailed metadata about
    machines (for Hostnames) or classification data (for IPs, URLs, and Hashes) to
    determine reputation and suspicious status. It updates the entities within Google
    SecOps with this supplemental context and can optionally generate insights.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Create Insights | Boolean | No | If enabled (default: true), the action will
    create a SOAR insight for each successfully enriched entity. |

    | Only Malicious Entity Insight | Boolean | No | If enabled (default: true), insights
    will only be created for entities classified as malicious (e.g., ransomware, malware,
    blacklist). This applies to IP, Hash, and URL entities; Hostnames always receive
    insights if 'Create Insights' is enabled. |


    ### Additional Notes

    - **IP Addresses:** This action is intended for external IP addresses.

    - **File Hashes:** Only MD5 and SHA-1 hash types are supported.

    - **URLs:** The action automatically extracts the domain part from URL entities
    for processing.


    ### Flow Description

    1. **Initialization:** Establishes a connection to the Cybereason API using provided
    credentials and validates the environment.

    2. **Entity Filtering:** Identifies supported entities (Hostname, IP, File Hash,
    URL) from the current alert context.

    3. **Data Retrieval (Hostnames):** For Hostname entities, the action searches
    for the machine's GUID and retrieves comprehensive system information, including
    OS version, isolation status, and connection history.

    4. **Data Retrieval (Other Entities):** For IP, URL, and File Hash entities, the
    action fetches classification details. For File Hashes, it additionally retrieves
    file instance data and identifies owner machines.

    5. **Internal Updates:** Updates the entity's 'additional_properties' with the
    retrieved data, marks the entity as 'enriched', and sets the 'is_suspicious' flag
    if Cybereason classifies the entity as malicious.

    6. **Insight Generation:** Based on the 'Create Insights' and 'Only Malicious
    Entity Insight' parameters, generates SOAR insights containing formatted summaries
    of the findings.

    7. **Finalization:** Attaches detailed CSV data tables to the case and returns
    a JSON result containing the raw API responses.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entity attributes including 'additional_properties', 'is_enriched',
      and 'is_suspicious' status. It also creates entity-level insights and adds data
      tables to the case.
  categories:
