List files:
  ai_description: >-
    ### General Description

    The **List files** action retrieves detailed metadata about files from the Cybereason
    platform. It allows security analysts to search for specific files using SHA-1
    or MD5 hashes or to perform a broader search to list files based on a specified
    limit. The action provides comprehensive file details, including paths, signatures,
    and ownership information, which are outputted as a data table and a JSON result
    for further analysis.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **File Hash** | String | No | A comma-separated list of SHA-1 or MD5 file hashes
    to query. If provided, the action retrieves data specifically for these hashes.
    Note: Only SHA-1 and MD5 formats are supported. |

    | **Results Limit** | Integer | Yes | The maximum number of file records to return
    from the search. Default is 100. |

    | **Fields To Return** | String | No | A comma-separated list of specific file
    attributes to retrieve (e.g., `md5String`, `ownerMachine`, `correctedPath`, `isSigned`).
    If left empty, the action returns a predefined set of standard fields. |


    ### Flow Description

    1.  **Initialization:** The action extracts the Cybereason API configuration (Root
    URL, Credentials) and the user-provided parameters.

    2.  **Validation:** It validates that the `Results Limit` is a positive integer
    and checks the `Fields To Return` against a list of supported Cybereason file
    attributes.

    3.  **Hash Filtering:** If the `File Hash` parameter is populated, the action
    identifies and filters for supported hash types (MD5 and SHA-1), ignoring unsupported
    formats.

    4.  **API Query:** The action executes a visual search query against the Cybereason
    API. If specific hashes were provided, it queries for those; otherwise, it performs
    a general search up to the specified limit.

    5.  **Data Processing:** The retrieved file objects are parsed into a structured
    format. The action generates a Siemplify Data Table named "Files" containing key
    metadata and attaches the full raw data as a JSON result.


    ### Additional Notes

    *   **Entity Support:** This action does not automatically iterate over entities
    in the current alert context. It relies entirely on the provided `File Hash` parameter
    or general search logic.

    *   **Supported Hashes:** The action explicitly supports MD5 (32 characters) and
    SHA-1 (40 characters) hashes.
