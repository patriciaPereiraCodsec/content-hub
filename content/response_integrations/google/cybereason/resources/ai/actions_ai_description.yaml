Allow File:
  ai_description: >-
    Removes MD5 file hashes from the Cybereason blacklist. This action allows security
    administrators to programmatically permit files that were previously blocked by
    the Cybereason platform, effectively moving them from a 'prevent' state to an
    'allowed' state.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | API Root | String | Yes | The API root URL of the Cybereason instance. |

    | Username | String | Yes | The username for the Cybereason account. |

    | Password | String | Yes | The password for the Cybereason account. |

    | Verify SSL | Boolean | No | If enabled, the action will verify the SSL certificate
    of the Cybereason server. Default is False. |

    | CA Certificate Base64 | String | No | The base64-encoded CA certificate to use
    for SSL verification if 'Verify SSL' is enabled. |


    ### Additional Notes

    - **Supported Hashes:** This action strictly supports **MD5** hashes. If a SHA1
    or other hash type is encountered, the action will skip that specific entity and
    mark it as failed in the final summary.


    ### Flow Description

    1. **Initialization:** The action extracts connection parameters and initializes
    the Cybereason API manager, performing a connectivity check.

    2. **Entity Selection:** It identifies all `FILEHASH` entities provided in the
    current context.

    3. **Hash Validation:** For each entity, the script determines the hash type.
    If the hash is not MD5, it is added to the failed entities list.

    4. **API Interaction:** For valid MD5 hashes, the action calls the Cybereason
    `unprevent_file` endpoint to remove the hash from the blacklist.

    5. **Completion:** The action provides a summary of which hashes were successfully
    removed and which failed (due to unsupported types or API errors).
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Removes the specified MD5 file hash from the Cybereason blacklist, changing
      its status from blocked/prevented to allowed in the external system.
    fetches_data: false
    internal_data_mutation_explanation: null
