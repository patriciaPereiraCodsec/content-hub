Unisolate Machine:
  ai_description: >-
    ### General Description

    Unisolates machine entities in Cybereason. This action is designed to revert the
    isolation state of a host, allowing it to communicate on the network again. It
    is an asynchronous action, meaning it sends the unisolation command and then periodically
    polls the Cybereason API to verify that the machine has successfully transitioned
    out of the isolated state.


    ### Flow Description

    1. **Entity Filtering**: The action identifies all Hostname entities within the
    current context.

    2. **Initial Status Check**: For each Hostname, the action retrieves sensor details
    from Cybereason to determine if the machine is currently isolated.

    3. **Command Execution**: If a machine is found to be isolated, the action sends
    a POST request to the Cybereason API to initiate the unisolation process.

    4. **Asynchronous Monitoring**: The action enters an 'In Progress' state and periodically
    re-checks the sensor status of the machines to confirm the unisolation command
    has been fully processed by the sensor.

    5. **Completion**: Once all machines are confirmed as unisolated, or if the action
    approaches a timeout, it provides a final summary of successful, failed, and not-found
    entities.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | None | N/A | N/A | This action does not require any input parameters. |


    ### Additional Notes

    - If a machine is already in an unisolated state when the action starts, it will
    be marked as completed immediately.

    - The action requires the machine to be active and known to the Cybereason console
    to perform the operation.
