Enrich Entities:
  ai_description: >-
    ### General Description

    The **Enrich Entities** action retrieves quarantine message information from **ProofPoint
    Email Protection (PS)** for specific entities. It identifies email traffic associated
    with Hostnames (via domain) and Users (via email address) to provide context on
    potential mail-related security events.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | None | N/A | N/A | This action does not take any input parameters; it uses the
    global integration configuration. |


    ### Additional Notes

    * **User Validation**: User entities are only processed if their identifier matches
    a standard email regex pattern.

    * **Data Cleaning**: The action automatically strips `dlpviolation` and `messagestatus`
    fields from the ProofPoint records before enrichment to maintain data relevance.


    ### Flow Description

    1. **Connection**: Establishes a session with the ProofPoint PS API using the
    configured API Root and credentials.

    2. **Entity Processing**: Iterates through target entities in the current context.

    3. **Search Logic**:
        * **Hostnames**: Extracts the domain from the hostname and searches for quarantine
    records where the sender or recipient domain matches.
        * **Users**: Validates the email format and searches for quarantine records
    where the user is the sender or recipient.
    4. **Data Transformation**: Flattens the resulting JSON records and applies a
    `ProofPointPS` prefix.

    5. **Internal Update**: Updates the `additional_properties` of the entities in
    Google SecOps and saves the changes.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates the 'additional_properties' attribute of Hostname and User entities
      with flattened quarantine data retrieved from ProofPoint.
  categories:
    enrichment: true
  entity_usage:
    entity_types:
    - HOSTNAME
    - USERUNIQNAME
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: true
    filters_by_identifier: false
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: false
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
Ping:
  ai_description: >-
    ### General Description

    Tests the connectivity to the ProofPoint Protection Server by attempting to authenticate
    and perform a basic search query against the quarantine API. This ensures that
    the integration configuration (API Root, Username, Password) is correct and the
    server is reachable.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | N/A | N/A | N/A | This action does not have any input parameters. |


    ### Flow Description

    1. **Configuration Retrieval**: The action retrieves the integration's configuration,
    including the API Root, credentials, and SSL verification settings.

    2. **Manager Initialization**: A `ProofPointPSManager` instance is created using
    the retrieved configuration.

    3. **Connectivity Test**: The action calls the `test_connectivity` method, which
    executes a GET request to the `/rest/v1/quarantine` endpoint with a wildcard sender
    filter (`*`).

    4. **Result Handling**: If the request is successful, the action returns a success
    message indicating that the connection is established.


    ### Additional Notes

    This is a standard connectivity test and does not interact with or modify any
    entities in the environment.
