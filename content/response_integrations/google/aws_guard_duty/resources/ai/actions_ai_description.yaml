Delete a Detector:
  ai_description: >-
    ### General Description

    Deletes a specific Amazon GuardDuty detector using its unique identifier. A detector
    is a resource that represents the GuardDuty service within an AWS account and
    region. Deleting a detector effectively disables GuardDuty in that specific region
    for the account.


    ### Parameters Description

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Detector ID | String | Yes | The unique ID of the Amazon GuardDuty detector
    that you want to delete. |


    ### Additional Notes

    - This action requires valid AWS credentials (Access Key ID and Secret Key) and
    the correct AWS Default Region configured in the integration settings.

    - Deleting a detector is a destructive action and will stop all GuardDuty monitoring
    and findings generation in the associated region.


    ### Flow Description

    1. **Parameter Initialization**: The action retrieves AWS configuration details
    (Access Key, Secret Key, Region) and the mandatory `Detector ID` from the input.

    2. **Connectivity Validation**: It establishes a connection to the AWS GuardDuty
    service and performs a connectivity test to ensure the credentials and region
    are valid.

    3. **Deletion Execution**: The action calls the AWS SDK to delete the detector
    specified by the `Detector ID`.

    4. **Result Reporting**: If the deletion is successful, the action completes with
    a success status and a confirmation message. If an error occurs (e.g., invalid
    ID or insufficient permissions), it logs the error and returns a failure status.
