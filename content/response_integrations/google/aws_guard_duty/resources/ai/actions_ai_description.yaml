Create a Trusted IP List:
  ai_description: >-
    ### General Description

    This action creates a new Trusted IP List (IPSet) in AWS GuardDuty. Trusted IP
    lists consist of IP addresses that are whitelisted for secure communication with
    AWS infrastructure and applications. Once an IP address is included in an active
    Trusted IP List, GuardDuty will no longer generate findings for that specific
    address. Note that only one Trusted IP set can be active at a time within a detector,
    and this operation is typically restricted to users from the master account.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Detector ID** | String | Yes | The unique identifier of the GuardDuty detector
    where the list should be created. This can be found in the AWS GuardDuty 'Settings'
    tab. |

    | **Name** | String | Yes | The display name for the new Trusted IP List. |

    | **File Format** | String | Yes | The format of the file containing the IP addresses.
    Supported formats include Plaintext, STIX, OTX CSV, FireEye iSIGHT CSV, Proofpoint
    ET Intelligence CSV, and AlienVault Reputation Feed. |

    | **File Location** | String | Yes | The S3 URI location (e.g., `https://s3.amazonaws.com/bucket/file.txt`)
    where the IP list file is stored. |

    | **Activate** | Boolean | Yes | If set to `true`, the newly created Trusted IP
    List will be activated immediately upon creation. |

    | **AWS Region** | String | No | The specific AWS Region to use for this action.
    If not provided, the default region from the integration configuration will be
    used. |


    ### Additional Notes

    - Only one Trusted IP set can be active at any given time per detector.

    - The action returns the `TrustedIPID` of the newly created resource in the JSON
    results.


    ### Flow Description

    1. **Initialization**: The action retrieves AWS credentials and region settings
    from the integration configuration and action parameters.

    2. **Connectivity Check**: It establishes a connection to the AWS GuardDuty service
    and validates the credentials.

    3. **Resource Creation**: It calls the AWS GuardDuty API to create a new IPSet
    using the provided name, file format, and S3 location.

    4. **Activation**: If the 'Activate' parameter is enabled, the action instructs
    AWS to enable the list immediately.

    5. **Completion**: The action captures the unique ID of the new Trusted IP List
    and reports a successful execution status.
