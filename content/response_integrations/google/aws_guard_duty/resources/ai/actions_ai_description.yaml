Ping:
  ai_description: >-
    ### General Description

    The **Ping** action is a diagnostic utility designed to verify the connectivity
    between Google SecOps and the AWS GuardDuty service. It ensures that the provided
    AWS credentials and regional configurations are valid and that the environment
    can successfully communicate with the AWS API.


    ### Parameters Description

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **AWS Access Key ID** | String | Yes | The unique identifier for the AWS account
    used to authenticate requests. |

    | **AWS Secret Key** | String | Yes | The secret key associated with the Access
    Key ID used for signing AWS requests. |

    | **AWS Default Region** | String | Yes | The specific AWS region (e.g., us-east-1)
    where the GuardDuty service is being accessed. |


    ### Flow Description

    1. **Initialization**: The action retrieves the integration's configuration parameters
    (Access Key, Secret Key, and Region) from the Google SecOps environment.

    2. **Manager Setup**: It initializes the `AWSGuardDutyManager` using the extracted
    credentials and region.

    3. **Connectivity Test**: The manager executes the `test_connectivity` method,
    which performs a lightweight API call (`list_detectors` with a limit of 1) to
    the AWS GuardDuty service.

    4. **Validation**: The action validates the HTTP response status code. If the
    service returns a success code (200), the connection is confirmed.

    5. **Finalization**: The action returns a boolean result (`true` for success,
    `false` for failure) and an informative message to the case wall.


    ### Additional Notes

    - This action does not process any entities and is strictly used for configuration
    validation.

    - As per standard SOAR practices, Ping actions are not categorized as enrichment
    actions.
