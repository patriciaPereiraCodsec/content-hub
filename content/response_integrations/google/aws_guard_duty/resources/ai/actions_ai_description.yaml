Get Detector Details:
  ai_description: >-
    ### General Description

    The **Get Detector Details** action retrieves comprehensive information about
    specific Amazon GuardDuty detectors. It is used to audit the status and configuration
    of GuardDuty resources within an AWS environment, providing visibility into whether
    the service is enabled and which IAM roles are associated with it.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Detector ID | String | Yes | A comma-separated list of unique Amazon GuardDuty
    detector IDs to retrieve details for. |


    ### Flow Description

    1. **Authentication**: The action establishes a connection to the AWS GuardDuty
    service using the provided Access Key, Secret Key, and Region.

    2. **Input Parsing**: It splits the comma-separated string of Detector IDs into
    a list for processing.

    3. **Data Retrieval**: For each Detector ID, the action calls the AWS API to fetch
    details such as the detector's status (e.g., ENABLED), the associated service
    role ARN, and timestamps for creation and last update.

    4. **Output Generation**: The retrieved data is formatted into a data table named
    'Detectors Details' and a raw JSON result for further use in the playbook.


    ### Additional Notes

    If multiple IDs are provided and some are invalid, the action will report the
    successful retrievals and list the IDs it was unable to find. If no valid detectors
    are found, the action will fail.
