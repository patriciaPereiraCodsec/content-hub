Get Threat Intelligence Set Details:
  ai_description: >-
    ### General Description

    Retrieves detailed information about specific Threat Intelligence Sets within
    AWS GuardDuty. This action allows users to inspect the configuration, status,
    and metadata (such as S3 location and file format) of threat feeds integrated
    into a GuardDuty detector. It is primarily used for auditing and verifying the
    state of threat intelligence sources.


    ### Parameters Description


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Detector ID** | String | Yes | The unique identifier of the AWS GuardDuty
    detector associated with the threat intelligence sets. This can be found in the
    AWS GuardDuty settings. |

    | **Threat Intelligence Set IDs** | String | Yes | A comma-separated list of unique
    identifiers for the Threat Intelligence Sets to be retrieved (e.g., `id_1, id_2`).
    |

    | **AWS Region** | String | No | The specific AWS region to use for the request.
    If not provided, the action defaults to the region specified in the integration
    configuration. |


    ### Flow Description

    1. **Initialization**: The action initializes the AWS GuardDuty manager using
    the provided access keys and the determined AWS region.

    2. **Connectivity Check**: It performs a connectivity test to validate the AWS
    credentials.

    3. **Detector Validation**: The action verifies that the provided `Detector ID`
    exists within the AWS environment.

    4. **ID Parsing**: The `Threat Intelligence Set IDs` parameter is parsed from
    a comma-separated string into a list of individual identifiers.

    5. **Data Retrieval**: The action iterates through the list of IDs and requests
    the full details for each Threat Intelligence Set from the AWS GuardDuty service.

    6. **Result Aggregation**: Successfully retrieved details are compiled into a
    data table named "Threat Intelligence Set Details" and added to the action's JSON
    results. Any IDs that fail to be retrieved are tracked separately.

    7. **Final Output**: The action concludes by providing a summary message of the
    successful and failed retrievals and sets the execution status.
