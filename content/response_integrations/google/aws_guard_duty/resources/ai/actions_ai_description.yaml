Create Sample Findings:
  ai_description: >-
    ### General Description

    The **Create Sample Findings** action allows users to generate mock findings within
    a specified AWS GuardDuty detector. This is primarily used for testing detection
    pipelines, verifying connector configurations, or demonstrating GuardDuty capabilities
    within the Google SecOps environment.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Detector ID** | String | Yes | The unique identifier of the AWS GuardDuty
    detector where the sample findings should be generated. |

    | **Finding Types** | String | No | A comma-separated list of specific GuardDuty
    finding types to generate (e.g., `Recon:EC2/PortProbeUnprotectedPort`). |


    ### Additional Notes

    - This action requires valid AWS credentials with permissions to call the `CreateSampleFindings`
    API.

    - **Note on Logic**: While the parameter description in the metadata suggests
    that leaving 'Finding Types' empty generates all types, the current script implementation
    requires at least one type to be specified in the parameter to trigger the creation
    process; otherwise, it will report that no samples were created.


    ### Flow Description

    1. **Credential Initialization**: Retrieves AWS Access Key, Secret Key, and Region
    from the integration configuration.

    2. **Connectivity Check**: Validates the connection to the AWS GuardDuty service
    using the `test_connectivity` method.

    3. **Parameter Parsing**: Converts the comma-separated 'Finding Types' string
    into a Python list.

    4. **Finding Generation**: If finding types are provided, the action calls the
    AWS GuardDuty API to generate the requested sample findings for the specified
    Detector ID.

    5. **Result Reporting**: Returns a success status and an output message indicating
    whether the findings were successfully requested.
