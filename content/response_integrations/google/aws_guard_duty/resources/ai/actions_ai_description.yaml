Delete Threat Intelligence Set:
  ai_description: >-
    ### General Description

    Deletes specified threat intelligence sets from an AWS GuardDuty detector. This
    action is used to manage and clean up threat intelligence sources that are no
    longer needed or are outdated within the AWS environment.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Detector ID | String | Yes | The unique ID of the AWS GuardDuty detector where
    the threat intelligence sets reside. |

    | Threat Intelligence Set IDs | String | Yes | A comma-separated list of the unique
    identifiers for the threat intelligence sets to be deleted. |


    ### Additional Notes

    - The action validates the existence of the detector before attempting to delete
    the sets.

    - It processes multiple IDs in a single execution and provides a summary of successful
    and failed deletions.


    ### Flow Description

    1. **Parameter Extraction**: Retrieves AWS configuration and action parameters
    (Detector ID and TI Set IDs).

    2. **Connection & Validation**: Establishes a connection to AWS GuardDuty and
    verifies that the provided Detector ID exists.

    3. **ID Parsing**: Converts the comma-separated string of Threat Intelligence
    Set IDs into a list.

    4. **Deletion Loop**: Iterates through the list of IDs, calling the AWS API to
    delete each threat intelligence set.

    5. **Result Reporting**: Aggregates the results of the deletion attempts and returns
    a summary message to the SOAR platform.
