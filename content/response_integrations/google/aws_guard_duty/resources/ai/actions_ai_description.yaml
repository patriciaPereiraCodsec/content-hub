Create Threat Intelligence Set:
  ai_description: >-
    ### General Description

    This action creates a new Threat Intelligence Set in AWS GuardDuty. A Threat Intelligence
    Set consists of known malicious IP addresses that GuardDuty uses to generate findings.
    The action requires a file containing the threat list to be hosted in an accessible
    S3 bucket. Users can specify the file format, activation status, and resource
    tags.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Detector ID | String | Yes | The unique identifier of the GuardDuty detector
    where the set will be created. This can be found in the AWS GuardDuty 'Settings'
    tab. |

    | Name | String | Yes | A descriptive name for the new Threat Intelligence Set.
    |

    | File Format | Enum | Yes | The format of the threat list file. Supported formats
    include Plaintext, STIX, OTX CSV, FireEye iSIGHT CSV, Proofpoint ET CSV, and AlienVault
    Reputation Feed. |

    | File Location | String | Yes | The S3 URI location of the file (e.g., `https://s3.amazonaws.com/my-bucket/threats.txt`).
    |

    | Active | Boolean | Yes | If set to 'true', the Threat Intelligence Set will
    be activated immediately upon creation. |

    | Tags | String | No | Additional metadata tags to apply to the AWS resource.
    Format: `key_1:value_1,key_2:value_2`. |


    ### Additional Notes

    - The AWS IAM role or user associated with the credentials must have the `guardduty:CreateThreatIntelSet`
    permission and potentially `iam:PutRolePolicy` depending on the environment configuration.

    - AWS GuardDuty limits the maximum number of Threat Intelligence Sets to 6 per
    detector.


    ### Flow Description

    1. **Initialization**: The action retrieves AWS configuration (Access Key, Secret
    Key, Region) and action-specific parameters (Detector ID, Name, Format, Location,
    Activation status, and Tags).

    2. **Format Mapping**: The user-friendly file format selection is mapped to the
    internal AWS format identifiers (e.g., 'Plaintext' maps to 'TXT').

    3. **Connectivity Check**: The action establishes a connection to the AWS GuardDuty
    service and validates the provided credentials.

    4. **Tag Parsing**: If tags are provided, they are parsed from a comma-separated
    string into a dictionary format required by the AWS SDK.

    5. **Resource Creation**: The action calls the AWS GuardDuty API to create the
    Threat Intelligence Set with the specified parameters.

    6. **Result Handling**: Upon successful creation, the action retrieves the unique
    `ThreatIntelSetId` from AWS, adds it to the JSON results, and completes the execution.
