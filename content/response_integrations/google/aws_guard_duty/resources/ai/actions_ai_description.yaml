Update a Trusted IP List:
  ai_description: >-
    ### General Description

    Updates an existing Trusted IP List (IPSet) in AWS GuardDuty. This action allows
    for modifying the metadata or the source file location of a trusted list, which
    GuardDuty uses to filter out known-safe IP addresses from generating findings.
    It can also be used to toggle the activation status of the list.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Detector ID | String | Yes | The unique identifier of the GuardDuty detector
    associated with the IP list. |

    | Trusted IP List ID | String | Yes | The unique identifier of the specific Trusted
    IP List to be updated. |

    | Name | String | No | A new name for the Trusted IP List. |

    | File Location | String | No | The new S3 URI location where the IP list file
    is stored (e.g., `https://s3.amazonaws.com/my-bucket/ips.txt`). |

    | Activate | Boolean | Yes | Specifies whether the Trusted IP List should be active
    or inactive after the update. |

    | AWS Region | String | No | The AWS region where the detector is located. If
    not provided, the default region from the integration configuration is used. |


    ### Additional Notes

    This action does not process entities from the SecOps case; it operates directly
    on the AWS GuardDuty configuration using the provided IDs. Either the 'Name' or
    'File Location' (or both) should typically be provided to make a meaningful update,
    though the API allows updating just the 'Activate' status.


    ### Flow Description

    1. **Initialization**: The action retrieves AWS credentials and region settings
    from the integration configuration.

    2. **Parameter Extraction**: It extracts the Detector ID, IP Set ID, and optional
    update fields (Name, Location, Activation status) from the action parameters.

    3. **Connection**: It establishes a connection to the AWS GuardDuty service using
    the Boto3 client.

    4. **Execution**: It calls the `update_ip_set` method in the AWS GuardDuty Manager,
    which sends a request to AWS to modify the specified IP list.

    5. **Completion**: The action returns a success status if the update is accepted
    by AWS, or a failure status if an error occurs (e.g., invalid IDs or permissions).
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
