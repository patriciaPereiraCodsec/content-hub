Archive Findings:
  ai_description: >-
    ### General Description

    Archives specific findings in AWS GuardDuty based on their unique identifiers.
    This action is used to programmatically manage the lifecycle of GuardDuty findings
    by moving them to an archived state, typically after they have been reviewed or
    remediated.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Detector ID** | String | Yes | The unique identifier of the AWS GuardDuty
    detector associated with the findings. |

    | **Finding IDs** | String | Yes | A comma-separated list of the unique identifiers
    for the findings that you want to archive. |

    | **AWS Region** | String | No | Optionally specify the AWS Region to be used.
    If not provided, the default region from the integration configuration will be
    used. |


    ### Flow Description

    1. **Initialization**: Retrieves AWS credentials and region settings from the
    integration configuration and action parameters.

    2. **Connectivity Check**: Validates the connection to the AWS GuardDuty service.

    3. **ID Parsing**: Converts the comma-separated string of Finding IDs into a list.

    4. **Verification**: Fetches the details of the specified findings from AWS to
    verify their existence within the specified detector.

    5. **Archiving**: Iterates through the verified findings and calls the AWS API
    to archive each one individually.

    6. **Reporting**: Compiles a summary message indicating which findings were successfully
    archived and which ones could not be processed.


    ### Additional Notes

    This action does not operate on SecOps entities; it relies entirely on the provided
    `Detector ID` and `Finding IDs` parameters.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Changes the status of specified findings in AWS GuardDuty to 'Archived'.
    fetches_data: true
    internal_data_mutation_explanation: null
