name: Create Threat Intelligence Set
description: 'Create a threat intelligence set in AWS GuardDuty. Note: iam:PutRolePolicy
    permission. Maximum number of Threat Intel sets is 6.'
integration_identifier: AWSGuardDuty
parameters:
-   name: Detector ID
    default_value: ''
    type: string
    description: Specify the detector ID that should be used to create a Threat Intelligence
        Set. This parameter can be found in the "Settings" tab.
    is_mandatory: true
-   name: Name
    default_value: ''
    type: string
    description: Specify the name of the Threat Intelligence Set.
    is_mandatory: true
-   name: File Format
    default_value: Plaintext
    type: ddl
    optional_values:
    - Plaintext
    - Structured Threat Information Expression (STIX)
    - Open Threat Exchange (OTX)™ CSV
    - FireEye™ iSIGHT Threat Intelligence CSV
    - Proofpoint™ ET Intelligence Feed CSV
    - AlienVault™ Reputation Feed
    description: Select the format of the file that should be used to create a threat
        intelligence set.
    is_mandatory: true
-   name: File Location
    default_value: https://s3.amazonaws.com/{bucket-name}/file.txt
    type: string
    description: Specify the URI location, where the file is located.
    is_mandatory: true
-   name: Active
    default_value: 'true'
    type: boolean
    description: If enabled, the newly created Threat Intelligence Set will be activated.
    is_mandatory: true
-   name: Tags
    default_value: ''
    type: string
    description: 'Specify additional tags that should be added to the Threat Intelligence
        Set. Format: key_1:value_1,key_2:value_1.'
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/create_threat_intelligence_set_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: Admin
simulation_data_json: '{"Entities":[]}'
