name: Unarchive Findings
description: Unarchive GuardDuty findings that are specified by finding IDs.
integration_identifier: AWSGuardDuty
parameters:
-   name: Detector ID
    default_value: ''
    type: string
    description: The unique ID of the detector.
    is_mandatory: true
-   name: Finding IDs
    default_value: ''
    type: string
    description: The IDs of the findings that you want to unarchive. Comma separated
        ids.
    is_mandatory: true
dynamic_results_metadata: []
creator: Admin
simulation_data_json: '{"Entities":[]}'
