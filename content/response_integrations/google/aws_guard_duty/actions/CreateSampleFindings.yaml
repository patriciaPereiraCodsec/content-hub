name: Create Sample Findings
description: Generates example findings of types specified by the list of findings.
integration_identifier: AWSGuardDuty
parameters:
-   name: Detector ID
    default_value: ''
    type: string
    description: The unique ID of the detector to create sample findings for.
    is_mandatory: true
-   name: Finding Types
    default_value: ''
    type: string
    description: The types of sample findings to generate. Comma separated values.
        If empty, example findings of all supported finding types will be generated.
        Types can be found in the UI at ‘Findings’ section under ‘Finding Type’ column
    is_mandatory: false
dynamic_results_metadata: []
creator: Admin
simulation_data_json: '{"Entities":[]}'
