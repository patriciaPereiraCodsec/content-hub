name: Create a Detector
description: Creates a single Amazon GuardDuty detector. A detector is a resource
    that represents the GuardDuty service.You can have only one detector per account
    per Region.
integration_identifier: AWSGuardDuty
parameters:
-   name: Enable
    default_value: 'false'
    type: boolean
    description: Specifies whether the detector is to be enabled
    is_mandatory: true
dynamic_results_metadata:
-   result_example_path: resources/create_detector_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: Admin
simulation_data_json: '{"Entities":[]}'
