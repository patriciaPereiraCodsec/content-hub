name: Update Threat Intelligence Set
description: 'Update a threat intelligence set in AWS GuardDuty. Note: iam:PutRolePolicy
    permission.'
integration_identifier: AWSGuardDuty
parameters:
-   name: Detector ID
    default_value: ''
    type: string
    description: Specify the detector ID that should be used to update a Threat Intelligence
        Set. This parameter can be found in the "Settings" tab.
    is_mandatory: true
-   name: ID
    default_value: ''
    type: string
    description: Specify the ID of the Threat Intelligence set that should be updated.
    is_mandatory: true
-   name: Name
    default_value: ''
    type: string
    description: Specify the new name of the Threat Intelligence Set.
    is_mandatory: false
-   name: File Location
    default_value: https://s3.amazonaws.com/{bucket-name}/file.txt
    type: string
    description: Specify a new URI location, where the file is located.
    is_mandatory: false
-   name: Active
    default_value: 'true'
    type: boolean
    description: If enabled, the Threat Intelligence Set will be activated.
    is_mandatory: true
dynamic_results_metadata: []
creator: Admin
simulation_data_json: '{"Entities":[]}'
