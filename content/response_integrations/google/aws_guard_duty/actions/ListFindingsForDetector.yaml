name: List Findings for a Detector
description: Lists all Amazon GuardDuty findings for the specified detector ID.
integration_identifier: AWSGuardDuty
parameters:
-   name: Detector ID
    default_value: ''
    type: string
    description: The unique ID of the detector that you want to retrieve.
    is_mandatory: true
-   name: Max Findings To Return
    default_value: '50'
    type: string
    description: Specify how many detectors to return. Default is 50.
    is_mandatory: false
-   name: Sort By
    default_value: ''
    type: string
    description: Represents the finding attribute (for example, accountId) to sort
        findings by.
    is_mandatory: false
-   name: Order By
    default_value: ''
    type: ddl
    optional_values:
    - ASC
    - DESC
    description: The order by which the sorted findings are to be displayed.
    is_mandatory: false
-   name: AWS Region
    default_value: ''
    type: string
    description: Optionally specify the AWS Region to be used in the action that can
        be different from the default region specified in the integration configuration
        page.
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/list_findings_for_detector_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: Admin
simulation_data_json: '{"Entities":[]}'
