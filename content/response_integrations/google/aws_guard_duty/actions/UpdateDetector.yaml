name: Update a Detector
description: Update the Amazon GuardDuty detector specified by the detector ID.
integration_identifier: AWSGuardDuty
parameters:
-   name: Detector ID
    default_value: ''
    type: string
    description: The unique ID of the detector that you want to update.
    is_mandatory: true
-   name: Enable
    default_value: 'false'
    type: boolean
    description: Specifies whether the detector should be enabled
    is_mandatory: false
dynamic_results_metadata: []
creator: Admin
simulation_data_json: '{"Entities":[]}'
