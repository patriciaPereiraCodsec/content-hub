name: Create a Trusted IP List
description: 'Creates a new list of trusted IP addresses (IPSet) that were white listed
    for secure communication with AWS infrastructure and applications. Note: Only
    1 Trusted IP set can be created and activated. GuardDuty doesn''t generate findings
    for IP addresses that are included in IPSets. Only users from the master account
    can use this operation.'
integration_identifier: AWSGuardDuty
parameters:
-   name: Detector ID
    default_value: ''
    type: string
    description: Specify the detector ID that should be used to create a Trusted IP
        List. This parameter can be found in the "Settings" tab.
    is_mandatory: true
-   name: Name
    default_value: ''
    type: string
    description: Specify the name of the Trusted IP List.
    is_mandatory: true
-   name: File Format
    default_value: Plaintext
    type: ddl
    optional_values:
    - Plaintext
    - Structured Threat Information Expression (STIX)
    - Open Threat Exchange (OTX)™ CSV
    - FireEye™ iSIGHT Threat Intelligence CSV
    - Proofpoint™ ET Intelligence Feed CSV
    - AlienVault™ Reputation Feed
    description: Select the format of the file that should be used to create a Trusted
        IP List.
    is_mandatory: true
-   name: File Location
    default_value: https://s3.amazonaws.com/{bucket-name}/file.txt
    type: string
    description: Specify the URI location, where the file is located.
    is_mandatory: true
-   name: Activate
    default_value: 'true'
    type: boolean
    description: If enabled, the newly created Trusted IP List will be activated.
    is_mandatory: true
-   name: AWS Region
    default_value: ''
    type: string
    description: Optionally specify the AWS Region to be used in the action that can
        be different from the default region specified in the integration configuration
        page.
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/create_a_trusted_ip_list_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: Admin
simulation_data_json: '{"Entities":[]}'
