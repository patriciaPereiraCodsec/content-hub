Ping:
  ai_description: >-
    ### General Description

    The **Ping** action is a diagnostic tool designed to verify the connectivity between
    Google SecOps and the Armis instance. It ensures that the provided configuration
    parameters, such as the API Root and API Secret, are correct and that the network
    path is open. This action is typically used during the initial setup of the integration
    or for troubleshooting communication issues.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | API Root | String | Yes | The base URL of the Armis API instance (e.g., https://<instance>.armis.com).
    |

    | API Secret | String | Yes | The secret key used to authenticate and generate
    access tokens for the Armis API. |

    | Verify SSL | Boolean | No | If set to true, the action will verify the SSL certificate
    of the Armis server. Default is True. |


    ### Additional Notes

    - This action does not process any entities and is intended solely for integration
    health checks.

    - According to standard SOAR practices, Ping actions are not categorized as enrichment
    actions.


    ### Flow Description

    1. **Parameter Extraction:** The action retrieves the API Root, API Secret, and
    SSL verification settings from the integration configuration.

    2. **Manager Initialization:** It initializes the `ArmisManager`, which automatically
    attempts to log in to the Armis service using the provided secret key to obtain
    an access token.

    3. **Connectivity Test:** The action calls the `test_connectivity` method, which
    executes a lightweight AQL (Armis Query Language) search (`in:devices`) with a
    result limit of 1 to confirm the API is responsive.

    4. **Result Reporting:** If the API call succeeds, the action returns a success
    message. If any step fails (authentication or network error), it captures the
    exception and reports a failure status with the error details.
