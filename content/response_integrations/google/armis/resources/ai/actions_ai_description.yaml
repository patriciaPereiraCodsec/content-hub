Update Alert Status:
  ai_description: "### General Description\nUpdates the status of a specific alert\
    \ within the Armis platform. This action allows security analysts to programmatically\
    \ manage the lifecycle of Armis alerts by transitioning them between states such\
    \ as Unhandled, Suppressed, or Resolved directly from Google SecOps.\n\n### Parameters\
    \ Description\n| Parameter | Type | Mandatory | Description |\n| :--- | :--- |\
    \ :--- | :--- |\n| Alert ID | Integer | Yes | The unique identifier of the alert\
    \ in Armis that needs a status update. |\n| Status | Selection | No | The target\
    \ status for the alert. Options include: `Unhandled`, `Suppressed`, and `Resolved`.\
    \ Defaults to `Unhandled` if not specified. |\n\n### Additional Notes\n- If the\
    \ alert is already set to the requested status, the action will complete successfully\
    \ with a message indicating no change was necessary.\n- This action does not operate\
    \ on SecOps entities; it requires a specific Alert ID provided as an input parameter.\n\
    \n### Flow Description\n1. **Initialization**: The action retrieves the Armis\
    \ API configuration (Root URL, Secret) and the user-provided parameters (Alert\
    \ ID and Status).\n2. **API Connection**: It establishes a session with the Armis\
    \ API using the provided credentials.\n3. **Status Update**: It sends a `PATCH`\
    \ request to the Armis `/api/v1/alerts/{alert_id}/` endpoint with the new status\
    \ value.\n4. **Error Handling**: \n    - If the API returns a 400 error indicating\
    \ the alert already has that status, the action reports success.\n    - If the\
    \ alert ID is not found (404), the action fails.\n    - For other connectivity\
    \ or API errors, the action reports a failure state."
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Updates the 'status' field of an alert record in the Armis platform via a PATCH
      request.
    fetches_data: false
    internal_data_mutation_explanation: null
  categories:
    enrichment: false
  entity_usage:
