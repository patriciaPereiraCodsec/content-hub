Enrich Entities:
  ai_description: >-
    ### General Description

    Enriches IP Address and MAC Address entities with comprehensive device intelligence
    retrieved from the Armis platform. This action helps security analysts understand
    the context of an endpoint by providing details such as its category, risk level,
    operating system, manufacturer, and physical site location.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Create Endpoint Insight | Boolean | No | If enabled (default), the action will
    generate a detailed HTML insight in the Google SecOps case summary containing
    a formatted report of the endpoint's characteristics and risk status. |


    ### Flow Description

    1. **Initialization**: The action extracts API credentials and the `Create Endpoint
    Insight` preference.

    2. **Entity Filtering**: It iterates through the target entities in the case,
    specifically targeting those of type `ADDRESS` (IP) or `MacAddress`.

    3. **External Lookup**: For each supported entity, it queries the Armis API using
    the IP or MAC address to find a matching device.

    4. **Internal Enrichment**: If a device is found, the action:
        *   Updates the entity's additional properties with Armis metadata (prefixed
    with 'ARMS').
        *   Marks the entity as 'Enriched'.
        *   Adds a direct link to the Armis device report and attaches a data table
    to the entity.
    5. **Insight Generation**: If the `Create Endpoint Insight` parameter is true,
    it aggregates the findings into a single 'General' severity insight for the case.

    6. **Finalization**: Updates all processed entities within Google SecOps and returns
    a success message listing the enriched identifiers.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entity attributes with Armis device details, attaches data tables to
      entities, and creates case-level insights.
  categories:
    enrichment: true
  entity_usage:
    entity_types:
    - ADDRESS
    - MacAddress
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: true
    filters_by_identifier: false
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: false
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
List Alert Connections:
  ai_description: >-
    ### General Description

    The **List Alert Connections** action retrieves network connection data associated
    with a specific alert in the Armis platform. This action is used to identify the
    communications and traffic patterns related to a security event, providing visibility
    into how devices involved in an alert are interacting with the network.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Alert ID** | Integer | Yes | The unique identifier of the Armis alert for
    which connections are being requested. |

    | **Lowest Severity To Fetch** | Dropdown | No | Filters the connections by their
    risk level. Options include Low, Medium, and High. The action will fetch connections
    at this level or higher. Default is Medium. |

    | **Max Connections To Return** | Integer | No | Limits the number of connection
    records returned by the action. Default is 50. |


    ### Flow Description

    1. **Initialization**: The action extracts the API configuration and the user-provided
    parameters (Alert ID, Severity, and Max Results).

    2. **Validation**: It ensures the 'Max Connections To Return' is at least 1.

    3. **Query Construction**: An Armis Query Language (AQL) query is generated to
    search for connections linked to the specified Alert ID, filtered by the chosen
    risk level.

    4. **Data Retrieval**: The action calls the Armis API to fetch the connection
    records, handling pagination to retrieve the requested number of results.

    5. **Output**: The results are formatted into a JSON object and a data table named
    'Available Communications' for display in the case wall.


    ### Additional Notes

    - This action does not operate on SecOps entities (like IPs or Hostnames) from
    the alert context; it requires a specific Armis Alert ID as input.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
  categories:
    enrichment: true
