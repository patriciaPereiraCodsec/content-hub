name: Armis - Alerts Connector
parameters:
-   name: DeviceProductField
    default_value: alert_type
    type: string
    description: Enter the source field name in order to retrieve the Product Field
        name.
    is_mandatory: true
    is_advanced: false
    mode: regular
-   name: EventClassId
    default_value: type
    type: string
    description: Enter the source field name in order to retrieve the Event Field
        name.
    is_mandatory: true
    is_advanced: false
    mode: regular
-   name: Environment Field Name
    default_value: ''
    type: string
    description: Describes the name of the field where the environment name is stored.
        If the environment field isn't found, the environment is the default environment.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Environment Regex Pattern
    default_value: .*
    type: string
    description: A regex pattern to run on the value found in the "Environment Field
        Name" field. Default is .* to catch all and return the value unchanged. Used
        to allow the user to manipulate the environment field via regex logic. If
        the regex pattern is null or empty, or the environment value is null, the
        final environment result is the default environment.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: PythonProcessTimeout
    default_value: 180
    type: integer
    description: Timeout limit for the python process running the current script.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: API Root
    default_value: https://{root}
    type: string
    description: API root of the Armis instance.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: API Secret
    default_value: ''
    type: password
    description: API Secret of the Armis account.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Lowest Severity To Fetch
    default_value: Low
    type: string
    description: 'Lowest severity that will be used to fetch alerts. Possible values:
        Low, Medium, High.'
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Max Hours Backwards
    default_value: 1
    type: integer
    description: Number of hours before the first connector iteration to retrieve
        alerts from. This parameter applies to the initial connector iteration after
        you enable the connector for the first time, or used as a fallback value in
        cases where connector's last run timestamp expires.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Max Alerts To Fetch
    default_value: 10
    type: integer
    description: How many alerts to process per one connector iteration. Maximum is
        1000.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Use whitelist as a blacklist
    default_value: false
    type: boolean
    description: If enabled, whitelist will be used as a blacklist.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Verify SSL
    default_value: false
    type: boolean
    description: If enabled, verify the SSL certificate for the connection to the
        Armis server is valid.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Proxy Server Address
    default_value: ''
    type: string
    description: The address of the proxy server to use.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Proxy Username
    default_value: ''
    type: string
    description: The proxy username to authenticate with.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Proxy Password
    default_value: ''
    type: password
    description: The proxy password to authenticate with.
    is_mandatory: false
    is_advanced: false
    mode: script
description: Pull alerts with related activities from Armis.
integration: Armis
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/armis#connector
rules: []
is_connector_rules_supported: false
creator: Siemplify System
