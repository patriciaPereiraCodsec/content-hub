name: List Alert Connections
description: List connections related to the alert in Armis.
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/armis#list_alert_connections
integration_identifier: Armis
parameters:
-   name: Alert ID
    default_value: ''
    type: string
    description: Specify the id of the alert for which you want to pull connections
        data.
    is_mandatory: true
-   name: Lowest Severity To Fetch
    default_value: Medium
    type: ddl
    optional_values:
    - Low
    - Medium
    - High
    description: Specify the lowest severity of the connections that should be used
        when fetching them.
    is_mandatory: false
-   name: Max Connections To Return
    default_value: 50
    type: string
    description: 'Specify how many connections to return. Default: 50.'
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/list_alert_connections_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: Admin
simulation_data_json: '{"Entities":[]}'
