name: Get Endpoint Events
description: 'Return endpoint events related to the endpoints in McAfee ePO. Supported
    entities: Hostname, IP and Mac Address.'
integration_identifier: McAfeeEPO
parameters:
-   name: Fields To Return
    default_value: ''
    type: string
    description: Specify what fields to return. If nothing is specified action will
        return all available fields.
    is_mandatory: false
-   name: Sort Field
    default_value: ''
    type: string
    description: Specify what field should be used for ordering of the results.
    is_mandatory: false
-   name: Sort Order
    default_value: ASC
    type: ddl
    optional_values:
    - ASC
    - DESC
    description: Specify what sort order should be applied to the query.
    is_mandatory: false
-   name: Time Frame
    default_value: Last Hour
    type: ddl
    optional_values:
    - Last Hour
    - Last 6 Hours
    - Last 24 Hours
    - Last Week
    - Last Month
    - Custom
    description: Specify a time frame for the events. If “Custom” is selected, you
        also need to provide “Start Time”.
    is_mandatory: false
-   name: Start Time
    default_value: ''
    type: string
    description: 'Specify the start time for the events. This parameter is mandatory,
        if “Custom” is selected for the “Time Frame” parameter. Format: ISO 8601'
    is_mandatory: false
-   name: End Time
    default_value: ''
    type: string
    description: 'Specify the end time for the events. Format: ISO 8601. If nothing
        is provided and “Custom” is selected for the “Time Frame” parameter then this
        parameter will use current time.'
    is_mandatory: false
-   name: Max Events To Return
    default_value: 50
    type: string
    description: 'Specify how many events to return. Default: 50.'
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/get_endpoint_events_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: Admin
simulation_data_json: '{"Entities": ["HOSTNAME", "ADDRESS", "MacAddress"]}'
