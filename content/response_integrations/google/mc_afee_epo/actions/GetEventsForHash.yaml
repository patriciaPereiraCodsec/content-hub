name: Get Events For Hash
description: 'Retrieve information about events related to hashes. Note: only MD5
    hashes are supported.'
integration_identifier: McAfeeEPO
parameters:
-   name: Fetch Events From EPExtendedEvent Table
    default_value: ''
    type: boolean
    description: If enabled, action also will use “EPExtendedEvent“ Table to find
        information about hashes.
    is_mandatory: true
-   name: Mark As Suspicious
    default_value: true
    type: boolean
    description: If enabled, action will mark all of the hashes for which events were
        found as suspicious.
    is_mandatory: false
-   name: Create Insight
    default_value: false
    type: boolean
    description: If enabled, action will create an insight containing information
        about which hashes have events associated with them.
    is_mandatory: false
-   name: Fields To Return
    default_value: EPOEvents_ThreatName,EPOEvents_ThreatType,EPOEvents_ThreatActionTaken,EPOEvents_ThreatCategory,EPOEvents_ThreatHandled,EPOEvents_TargetHostName,EPOEvents_TargetUserName,EPOEvents_TargetFileName,EPOEvents_TargetProcessName,EPOEvents_TargetPort,EPOEvents_TargetProtocol,EPOEvents_TargetIPV4,EPOEvents_SourceHostName,EPOEvents_SourceIPV4,EPOEvents_SourceUserName,EPOEvents_SourceProcessName,EPOEvents_SourceURL,VSECustomEvent_MD5
    type: string
    description: Specify what fields to return. If nothing is specified action will
        return all available fields.
    is_mandatory: false
-   name: Sort Field
    default_value: ''
    type: string
    description: Specify what field should be used for ordering of the results.
    is_mandatory: false
-   name: Sort Order
    default_value: ASC
    type: ddl
    optional_values:
    - ASC
    - DESC
    description: Specify what sort order should be applied to the query.
    is_mandatory: false
-   name: Time Frame
    default_value: Last Hour
    type: ddl
    optional_values:
    - Last Hour
    - Last 6 Hours
    - Last 24 Hours
    - Last Week
    - Last Month
    - Custom
    description: Specify a time frame for the events. If “Custom” is selected, you
        also need to provide “Start Time”.
    is_mandatory: false
-   name: Start Time
    default_value: ''
    type: string
    description: 'Specify the start time for the events. This parameter is mandatory,
        if “Custom” is selected for the “Time Frame” parameter. Format: ISO 8601'
    is_mandatory: false
-   name: End Time
    default_value: ''
    type: string
    description: 'Specify the end time for the events. Format: ISO 8601. If nothing
        is provided and “Custom” is selected for the “Time Frame” parameter then this
        parameter will use current time.'
    is_mandatory: false
-   name: Max Events To Return
    default_value: 50
    type: string
    description: 'Specify how many events to return per table that is queried. Default:
        50.'
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/get_events_for_hash_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
simulation_data_json: '{"Entities": ["FILEHASH"]}'
