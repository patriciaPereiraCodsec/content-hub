name: Execute Entity Query
description: 'Execute an entity query in McAfee ePO. Note: this action prepares the
    "Where" clause based on the entities. Check documentation for additional information.
    Supported entities: IP, Host, User, Hash, URL.'
integration_identifier: McAfeeEPO
parameters:
-   name: Table Name
    default_value: ''
    type: string
    description: Specify the name of the table from which you want to fetch results.
    is_mandatory: true
-   name: Fields To Return
    default_value: ''
    type: string
    description: Specify what fields to return. If nothing is specified action will
        return all available fields.
    is_mandatory: false
-   name: Sort Field
    default_value: ''
    type: string
    description: Specify what field should be used for ordering of the results.
    is_mandatory: false
-   name: Sort Order
    default_value: ASC
    type: ddl
    optional_values:
    - ASC
    - DESC
    description: Specify what sort order should be applied to the query.
    is_mandatory: false
-   name: Time Frame
    default_value: Last Hour
    type: ddl
    optional_values:
    - Last Hour
    - Last 6 Hours
    - Last 24 Hours
    - Last Week
    - Last Month
    - Custom
    description: Specify a time frame for the results. If "Custom" is selected, you
        also need to provide "Start Time".
    is_mandatory: false
-   name: Start Time
    default_value: ''
    type: string
    description: 'Specify the start time for the results. This parameter is mandatory,
        if "Custom" is selected for the "Time Frame" parameter. Format: ISO 8601'
    is_mandatory: false
-   name: End Time
    default_value: ''
    type: string
    description: 'Specify the end time for the results. Format: ISO 8601. If nothing
        is provided and "Custom" is selected for the "Time Frame" parameter then this
        parameter will use current time.'
    is_mandatory: false
-   name: Max Results To Return
    default_value: 50
    type: string
    description: 'Specify how many results to return. Default: 50.'
    is_mandatory: false
-   name: IP Entity Key
    default_value: ''
    type: string
    description: Specify what key should be used with IP entities. Please refer to
        the action documentation for details.
    is_mandatory: false
-   name: Hostname Entity Key
    default_value: ''
    type: string
    description: Specify what key should be used with Hostname entities. Please refer
        to the action documentation for details.
    is_mandatory: false
-   name: File Hash Entity Key
    default_value: ''
    type: string
    description: Specify what key should be used with File Hash entities. Please refer
        to the action documentation for details.
    is_mandatory: false
-   name: User Entity Key
    default_value: ''
    type: string
    description: Specify what key should be used with User entities. Please refer
        to the action documentation for details.
    is_mandatory: false
-   name: URL Entity Key
    default_value: ''
    type: string
    description: Specify what key should be used with URL entities. Please refer to
        the action documentation for details.
    is_mandatory: false
-   name: Email Address Entity Key
    default_value: ''
    type: string
    description: Specify what key should be used with Email Address (User entity with
        email regex) entities. Please refer to the action documentation for details.
    is_mandatory: false
-   name: Stop If Not Enough Entities
    default_value: true
    type: boolean
    description: 'If enabled, action will not start execution, unless all of the entity
        types are available for the specified ".. Entity Keys". Example: if "IP Entity
        Key" and "File Hash Entity Key" are specified, but in the scope there are
        no file hashes then if this parameter is enabled, action will not execute
        the query.'
    is_mandatory: true
-   name: Cross Entity Operator
    default_value: OR
    type: ddl
    optional_values:
    - OR
    - AND
    description: Specify what should be the logical operator used between different
        entity types.
    is_mandatory: true
dynamic_results_metadata:
-   result_example_path: resources/execute_entity_query_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
simulation_data_json: '{"Entities": ["ADDRESS", "HOSTNAME", "USERUNIQNAME", "FILEHASH",
    "DestinationURL"]}'
