name: List Queries
description: List available queries in McAfee ePO.
integration_identifier: McAfeeEPO
parameters:
-   name: Filter Logic
    default_value: Equal
    type: ddl
    optional_values:
    - Equal
    - Contains
    description: Specify what filter logic should be applied.
    is_mandatory: false
-   name: Filter Value
    default_value: ''
    type: string
    description: Specify what value should be used in the filter.
    is_mandatory: false
-   name: Max Results To Return
    default_value: '50'
    type: string
    description: 'Specify how many results to return. Default: 50.'
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/list_queries_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
simulation_data_json: '{"Entities":[]}'
