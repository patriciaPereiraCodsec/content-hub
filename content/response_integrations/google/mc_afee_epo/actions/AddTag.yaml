name: Add Tag
description: 'Add a tag to an endpoint in McAfee ePO. Note: you can only apply tags
    that exist in the system. Supported entities: Hostname, IP.'
integration_identifier: McAfeeEPO
parameters:
-   name: Tag Name
    default_value: ''
    type: string
    description: Specify the name of the tag that needs to be added to the endpoints.
    is_mandatory: true
dynamic_results_metadata: []
creator: admin
simulation_data_json: '{"Entities": ["HOSTNAME", "ADDRESS"]}'
