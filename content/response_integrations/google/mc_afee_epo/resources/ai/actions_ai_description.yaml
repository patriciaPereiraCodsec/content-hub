    3. **Time Range Calculation**: Determines the start and end timestamps based on
    the 'Time Frame' and 'Start/End Time' parameters.

    4. **Data Retrieval**: Executes queries against the `EPOEvents` table, joining
    with `VSECustomEvent` and optionally `EPExtendedEvent` based on the user configuration.

    5. **Internal Mutation**: If events are found, the action optionally marks the
    entities as suspicious and creates insights in the Google SecOps case.

