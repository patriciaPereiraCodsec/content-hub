    \ users to run a pre-configured query within McAfee ePO by providing its unique\
    \ Query ID. This action is designed to retrieve specific datasets\u2014such as\
    \ event logs, system statuses, or threat reports\u2014that have already been defined\
    \ in the McAfee ePO console. It is a versatile tool for fetching bulk data from\
    \ the ePO database without needing to construct complex SQL queries manually.\n\
    \n### Parameters Description\n| Parameter | Type | Mandatory | Description |\n\
    | :--- | :--- | :--- | :--- |\n| **Query ID** | String | Yes | The unique identifier\
    \ of the query to be executed in McAfee ePO. |\n| **Max Results To Return** |\
    \ Integer | No | Specifies the maximum number of result rows to retrieve. If not\
    \ provided, it defaults to 50. |\n\n### Flow Description\n1. **Initialization**:\
    \ The action extracts connection details (Server Address, Credentials, SSL settings)\
    \ and action parameters (Query ID, Limit).\n2. **Connection**: It initializes\
    \ the `McafeeEpoManager` and verifies connectivity to the ePO server.\n3. **Execution**:\
    \ The action calls the `run_query_by_id` method, which triggers the `core.executeQuery`\
    \ command on the McAfee ePO remote API using the provided Query ID.\n4. **Data\
