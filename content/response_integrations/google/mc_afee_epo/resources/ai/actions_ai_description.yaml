Execute Custom Query:
  ai_description: >-
    ### General Description

    The **Execute Custom Query** action allows users to perform advanced data retrieval
    from the McAfee ePO database by executing custom SQL-like queries. This is useful
    for fetching specific endpoint data, event logs, or system properties that are
    not covered by standard enrichment actions.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Table Name** | String | Yes | The name of the McAfee ePO table or view to
    query (e.g., `EPOLeafNode`). |

    | **Fields To Return** | String | No | A comma-separated list of fields to include
    in the results. If empty, all fields are returned. |

    | **Where Clause** | String | No | The filtering condition for the query using
    ePO's query language syntax. |

    | **Sort Field** | String | No | The field name used to order the results. |

    | **Sort Order** | String | No | The direction of sorting: `ASC` (Ascending) or
    `DESC` (Descending). |

    | **Max Results To Return** | Integer | No | The maximum number of records to
    retrieve. Defaults to 50. |


    ### Flow Description

    1. **Authentication**: Connects to the McAfee ePO server using provided credentials
    and validates connectivity.

    2. **Query Construction**: Processes the input parameters to build a structured
    query request for the `core.executeQuery` API endpoint.

    3. **Execution**: Sends the request to the ePO Remote API.

    4. **Data Processing**: Receives the raw JSON response and parses it into structured
    data models.

    5. **Output**: Populates the action's JSON result and creates a data table in
    the SOAR case for visibility.


    ### Additional Notes

    - This action does not target specific entities in the case; it is a global query
    tool.

    - Users should refer to McAfee ePO documentation for valid table names and field
    identifiers.
