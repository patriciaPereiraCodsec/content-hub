Get Agent Information:
  ai_description: >-
    ### General Description

    Retrieves detailed agent and system information for Hostname and IP entities from
    McAfee ePO. This action is used to enrich endpoint entities with metadata such
    as Agent Version, OS details, and network configuration directly from the ePO
    management console.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | ServerAddress | String | Yes | The URL of the McAfee ePO server (e.g., https://epo-server:8443/remote).
    |

    | Username | String | Yes | The username used to authenticate with the McAfee
    ePO server. |

    | Password | String | Yes | The password used to authenticate with the McAfee
    ePO server. |

    | GroupName | String | No | If provided, the action will limit its search for
    systems to this specific ePO group. |

    | CA Certificate File | String | No | Base64 encoded string of the CA certificate
    file used for SSL verification. |

    | Verify SSL | Boolean | Yes | If enabled, the action will verify the SSL certificate
    of the ePO server. |


    ### Flow Description

    1. **Authentication**: Establishes a connection to the McAfee ePO API using the
    provided credentials and server address.

    2. **Group Context (Optional)**: If a `GroupName` is specified, the action fetches
    all systems belonging to that group to optimize the search process.

    3. **Entity Processing**: Iterates through all `HOSTNAME` and `ADDRESS` entities
    provided in the context.

    4. **Data Retrieval**: For each entity, the action queries the ePO server for
    system information using the entity's identifier (IP or Hostname).

    5. **Enrichment**: If information is found, the action updates the entity's additional
    properties with agent metadata and attaches a data table containing the system
    details.

    6. **Finalization**: Updates the entities within Google SecOps and provides a
    comprehensive JSON result of the gathered information.


    ### Additional Notes

    - The action uses the `OriginalIdentifier` of the entity if available, otherwise
    it uses the standard identifier.

    - Hostnames are truncated to 15 characters when searching in certain ePO fields
    to match NetBIOS naming conventions.
