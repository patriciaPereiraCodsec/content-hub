Get Dat Version:
  ai_description: >-
    ### General Description

    Retrieves the DAT (Virus Definition) version information for Hostname and IP Address
    entities from McAfee ePO. This action allows security analysts to verify if endpoints
    are running up-to-date virus definitions by querying the ePO database directly.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | None | N/A | N/A | This action does not have any action-specific parameters.
    It relies on global integration configuration settings. |


    ### Additional Notes

    This action requires the McAfee ePO integration to be configured with valid server
    credentials (Server Address, Username, Password). It specifically targets the
    `EPOProdPropsView_VIRUSCAN` table in the ePO database to extract the `datver`
    field.


    ### Flow Description

    1. **Authentication**: Establishes a connection to the McAfee ePO server using
    the integration's global configuration parameters.

    2. **Entity Filtering**: Identifies and filters the target entities in the current
    context, selecting only those of type `ADDRESS` (IP) or `HOSTNAME`.

    3. **System Lookup**: For each valid entity, the action performs a lookup in the
    McAfee ePO database to identify the corresponding system record.

    4. **DAT Version Retrieval**: Executes a query against the `EPOProdPropsView_VIRUSCAN`
    table to retrieve the specific DAT version currently installed on the endpoint.

    5. **Result Aggregation**: Compiles the retrieved version data into a JSON result
    and provides a summary message indicating the success or failure of the retrieval
    for each entity.
