Run Full Scan:
  ai_description: >-
    ### General Description

    Triggers a full on-demand scan on specified endpoints (Hostname or IP) using McAfee
    ePO. This action allows security teams to remotely initiate a thorough security
    scan on managed systems to detect potential threats.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Task Name | String | Yes | The name of the McAfee ePO client task to be executed
    for the scan. Default is "On-Demand Scan - Full Scan". |


    ### Additional Notes

    - The action requires the McAfee ePO integration to be configured with valid credentials
    and server address.

    - If a `GroupName` is provided in the integration configuration, the action will
    attempt to locate the system within that group to execute the task by ID; otherwise,
    it defaults to execution by system name.


    ### Flow Description

    1. **Parameter Extraction**: Retrieves integration settings (credentials, server
    address, group name) and the specific task name to run.

    2. **Manager Initialization**: Establishes a connection with the McAfee ePO server.

    3. **Task Retrieval**: Fetches the metadata for the specified scan task from the
    ePO server.

    4. **Entity Validation**: For each Hostname or IP entity, the action checks if
    the system is known to the ePO server.

    5. **Scan Initiation**: Triggers the scan task on the target endpoint using either
    the system ID (if group-scoped) or the system name.

    6. **Result Reporting**: Collects the execution status for each endpoint and provides
    a summary in the action output and JSON results.
