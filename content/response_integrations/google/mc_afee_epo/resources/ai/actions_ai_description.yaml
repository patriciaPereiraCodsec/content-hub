Compare Server and Agent DAT:
  ai_description: >-
    ### General Description

    The **Compare Server and Agent DAT** action retrieves and compares the Anti-Virus
    DAT (Digital Asset Template) versions between the McAfee ePO server and the managed
    agents on specific endpoints. This action is primarily used to verify that internal
    endpoints are synchronized with the latest security definitions available on the
    central management server.


    ### Parameters

    There are no action-specific parameters for this action. It utilizes the global
    integration configuration for connectivity and authentication, including:

    * **ServerAddress**: The URL of the McAfee ePO server.

    * **Username/Password**: Credentials for API access.

    * **GroupName**: (Optional) Filters systems within a specific ePO group.

    * **Verify SSL**: Determines if the SSL certificate is validated.


    ### Flow Description

    1. **Initialization**: The action identifies target entities within the current
    context, filtering for internal entities of type **IP Address** or **Hostname**.

    2. **Manager Setup**: Establishes a connection to the McAfee ePO server using
    the provided integration credentials.

    3. **Master Data Retrieval**: Fetches the current master DAT version from the
    McAfee ePO Master Repository.

    4. **Endpoint Data Retrieval**: For each valid entity, the action queries the
    ePO server to retrieve the DAT version currently installed on that specific agent.

    5. **Comparison**: It compares the agent's DAT version against the server's master
    version to determine if they are identical.

    6. **Output**: Results are presented in an entity-specific table showing the server
    version, agent version, and comparison status. A summary JSON is also provided
    for downstream automation.


    ### Additional Notes

    * This action only processes entities that are marked as **Internal** in Google
    SecOps.

    * If a **GroupName** is configured in the integration settings, the action will
    attempt to verify that the system belongs to that group before retrieving its
    DAT information.
  capabilities:
