Get Events For Hash:
  ai_description: >-
    Retrieves event information from McAfee ePO related to specific MD5 file hashes.
    This action queries the McAfee ePO database to find security events associated
    with file hash entities within a specified time frame. It can search across both
    standard event tables and extended event tables for comprehensive coverage.


    ### Parameters Description


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Fetch Events From EPExtendedEvent Table | Boolean | Yes | If enabled, the action
    will also query the `EPExtendedEvent` table for additional hash information. |

    | Mark As Suspicious | Boolean | No | If enabled (default), entities with found
    events will be marked as suspicious in Google SecOps. |

    | Create Insight | Boolean | No | If enabled, creates a case insight for each
    entity where events were found. |

    | Fields To Return | String | No | A comma-separated list of specific fields to
    include in the results. If empty, all fields are returned. |

    | Sort Field | String | No | The database field used to sort the results. |

    | Sort Order | Enum | No | The order of sorting: 'ASC' (default) or 'DESC'. |

    | Time Frame | Enum | No | The time window for the search (e.g., 'Last Hour',
    'Last 24 Hours', 'Custom'). |

    | Start Time | String | No | Mandatory if 'Time Frame' is set to 'Custom'. Expected
    format: ISO 8601 or Unix timestamp. |

    | End Time | String | No | Used if 'Time Frame' is 'Custom'. Defaults to current
