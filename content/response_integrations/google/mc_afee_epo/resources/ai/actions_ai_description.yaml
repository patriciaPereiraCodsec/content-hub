Remove Tag:
  ai_description: >-
    ### General Description

    Removes a specified tag from endpoint entities (Hostname or IP Address) in McAfee
    ePO. This action is used to manage endpoint metadata and policy assignments by
    detaching tags that may have been applied for containment, investigation, or categorization.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Tag Name | String | Yes | The name of the tag to be removed from the target
    endpoints. |


    ### Flow Description

    1. **Parameter Extraction**: Retrieves the tag name from the action parameters
    and connection details from the integration configuration.

    2. **Entity Filtering**: Identifies supported entities (Hostname and IP Address)
    from the current context.

    3. **Manager Initialization**: Establishes a connection to the McAfee ePO server.

    4. **System Verification**: For each entity, it verifies the system's existence
    in ePO and retrieves its details.

    5. **Tag Removal**: Executes the `system.clearTag` command. If a group is specified
    in the configuration, it uses the host ID; otherwise, it uses the hostname.

    6. **Result Reporting**: Aggregates the results, identifying which entities were
    successfully updated, which failed, and which did not have the tag to begin with.
