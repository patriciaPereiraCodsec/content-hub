Execute Entity Query:
  ai_description: >-
    ### General Description

    Executes a dynamic entity-based query in McAfee ePO to retrieve event or system
    data. This action automatically constructs a complex SQL-like "Where" clause by
    mapping entities in the current Google SecOps scope (IP, Hostname, User, File
    Hash, URL) to specific columns in a target ePO table. It is highly configurable,
    allowing users to define logical operators between entity types, specify time
    ranges, and control the output fields and sorting.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Table Name | String | Yes | Specify the name of the ePO table from which you
    want to fetch results (e.g., EPOEvents). |

    | Fields To Return | String | No | Comma-separated list of fields to return. If
    empty, all available fields are returned. |

    | Sort Field | String | No | Specify the field to be used for ordering the results.
    |

    | Sort Order | Enum | No | Specify the sort order: `ASC` (default) or `DESC`.
    |

    | Time Frame | Enum | No | Predefined time frame for results: `Last Hour` (default),
    `Last 6 Hours`, `Last 24 Hours`, `Last Week`, `Last Month`, or `Custom`. |

    | Start Time | String | No | Start time for the results in ISO 8601 format. Mandatory
    if "Time Frame" is set to `Custom`. |

    | End Time | String | No | End time for the results in ISO 8601 format. Defaults
    to current time if "Time Frame" is `Custom` and this is empty. |

    | Max Results To Return | Integer | No | Maximum number of results to retrieve.
    Default is 50. |

    | IP Entity Key | String | No | The ePO column name to match against IP Address
    entities. |

    | Hostname Entity Key | String | No | The ePO column name to match against Hostname
    entities. |

    | File Hash Entity Key | String | No | The ePO column name to match against File
    Hash entities. |

    | User Entity Key | String | No | The ePO column name to match against User entities.
    |

    | URL Entity Key | String | No | The ePO column name to match against URL entities.
    |

    | Email Address Entity Key | String | No | The ePO column name to match against
    User entities that follow an email format. |

    | Stop If Not Enough Entities | Boolean | Yes | If enabled (default), the action
    fails if any specified "Entity Key" has no corresponding entities in the scope.
    |

    | Cross Entity Operator | Enum | Yes | Logical operator used between different
    entity types: `OR` (default) or `AND`. |


    ### Additional Notes

    - **Conditional Requirement:** If the "Time Frame" parameter is set to `Custom`,
    the "Start Time" parameter becomes mandatory.

    - **Entity Mapping:** The action distinguishes between standard User entities
    and Email addresses (User entities matching an email regex) and allows mapping
    them to different ePO keys.

    - **Internal Mutation:** This action creates a data table named "Query Results"
    within the Google SecOps case to display the retrieved data.


    ### Flow Description

    1. **Initialization:** Parses input parameters and establishes a connection to
    the McAfee ePO server using the integration configuration.

    2. **Time Range Calculation:** Determines the query's time boundaries based on
    the "Time Frame" or custom "Start/End Time" inputs.

    3. **Entity Categorization:** Scans the current scope for supported entities (IP,
    Hostname, User, File Hash, URL) and groups them by type.

    4. **Validation:** If "Stop If Not Enough Entities" is enabled, the action verifies
    that at least one entity exists for every provided "Entity Key".

    5. **Query Construction:** Dynamically builds a SQL-like "Where" clause using
    the categorized entity values, the specified column keys, and the "Cross Entity
    Operator".

    6. **Execution:** Sends the constructed query to the McAfee ePO `core.executeQuery`
    API endpoint.

    7. **Output Generation:** Processes the API response to populate the action's
    JSON result and generates a CSV-formatted data table named "Query Results".
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Adds a data table named 'Query Results' to the case and populates the action's
      JSON result with the retrieved event data from McAfee ePO.
  categories:
    enrichment: false
