Get Endpoint Events:
  ai_description: >-
    ### General Description


    The **Get Endpoint Events** action retrieves historical endpoint events from the
    McAfee ePO database for specific entities. It allows security analysts to gather
    telemetry and threat event data (from the `EPOEvents` table) associated with Hostnames,
    IP Addresses, or MAC Addresses within a specified time window. This action is
    primarily used for forensic investigation and log retrieval during incident response.


    ### Parameters Description


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Fields To Return** | String | No | A comma-separated list of specific fields
    to retrieve from the events. If left empty, all available fields are returned.
    |

    | **Sort Field** | String | No | The field name used to order the results (e.g.,
    `EPOEvents.ReceivedUTC`). |

    | **Sort Order** | String | No | The direction of sorting: `ASC` (Ascending) or
    `DESC` (Descending). Default is `ASC`. |

    | **Time Frame** | String | No | Predefined time range for the query (e.g., `Last
    Hour`, `Last 24 Hours`). If set to `Custom`, the **Start Time** must be provided.
    |

    | **Start Time** | String | No* | The beginning of the search window in ISO 8601
    format. *Mandatory only if **Time Frame** is set to `Custom`.* |

    | **End Time** | String | No | The end of the search window in ISO 8601 format.
    Defaults to the current time if not provided for a `Custom` time frame. |

    | **Max Events To Return** | Integer | No | The maximum number of events to retrieve
    per entity. Default is 50. |


    ### Flow Description


    1. **Initialization**: The action parses the connection configuration (Server
    Address, Credentials) and user-provided parameters.

    2. **Time Range Calculation**: It determines the start and end timestamps based
    on the selected **Time Frame** or the **Start/End Time** parameters.

    3. **Entity Filtering**: It identifies supported entities (IP Address, Hostname,
    MAC Address) from the current context.

    4. **Query Execution**: For each entity, it constructs a SQL-like query targeting
    the `EPOEvents` table in McAfee ePO, applying filters for the entity identifier
    and the calculated time range.

    5. **Data Processing**: Retrieved events are processed and formatted into CSV
    and JSON structures.

    6. **Output Generation**: The action attaches a data table to each entity containing
    the event details and populates the global JSON result for downstream playbook
    use.


    ### Additional Notes


    - If **Time Frame** is set to `Custom`, the **Start Time** parameter becomes mandatory.

    - The action uses the `core.executeQuery` remote command in McAfee ePO to fetch
    data.
  capabilities:
