Update Mcafee Agent:
  ai_description: >-
    ### General Description

    Triggers a McAfee Agent update task on specified endpoints (Hostname or IP) within
    McAfee ePO. This action allows administrators to remotely initiate update tasks,
    such as DAT updates, for Windows or Linux systems managed by the ePO server.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Task Name | String | Yes | The specific client task name to be executed in McAfee
    ePO (e.g., 'DAT_Update_Windows_CWS' for Windows or 'DAT_Update_Linux_CWS' for
    Linux). |


    ### Flow Description

    1. **Initialization**: Retrieves connection details (Server Address, Credentials)
    and the specific task name from the action parameters.

    2. **Task Validation**: Connects to the McAfee ePO manager and verifies that the
    requested task exists on the server.

    3. **System Discovery**: If a group name is provided in the configuration, the
    action retrieves all systems within that group to ensure the target entities are
    within scope.

    4. **Execution**: Iterates through the target entities (Hostnames and IP Addresses),
    matches them against the ePO systems, and triggers the specified client task for
    each matching endpoint.

    5. **Reporting**: Collects the execution status for each entity and returns a
    JSON result indicating success or failure.


    ### Additional Notes

    The action uses the first 15 characters of the hostname for matching, as McAfee
    ePO often truncates NetBIOS names.
