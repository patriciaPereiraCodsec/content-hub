Add Tag:
  ai_description: >-
    ### General Description Adds a tag to an endpoint in McAfee ePO. This action allows
    security teams to label systems for organizational or policy-based purposes. Note
    that the tag must already exist in the McAfee ePO system to be applied. ### Parameters
    Description | Parameter | Type | Mandatory | Description | | :--- | :--- | :---
    | :--- | | Tag Name | String | Yes | Specify the name of the tag that needs to
    be added to the endpoints. | ### Flow Description 1. **Initialization**: Connects
    to the McAfee ePO server using provided credentials and configuration. 2. **Entity
    Filtering**: Identifies target entities that are either Hostnames or IP Addresses.
    3. **System Verification**: Checks if each entity exists in the McAfee ePO database.
    4. **Tag Application**: If a GroupName is configured, the action retrieves systems
    within that group and applies the tag using the internal Host ID. If no GroupName
    is configured, the action applies the tag directly using the Host Name (truncated
    to 15 characters as per ePO requirements). 5. **Result Aggregation**: Collects
    the status for each entity (Success, Already Tagged, or Failed) and provides a
    summary message. ### Additional Notes - The action only supports applying tags
    that have been pre-defined in the McAfee ePO environment. - Hostnames are truncated
    to 15 characters during the lookup and application process to match McAfee ePO's
    internal naming conventions.
  capabilities:
    can_create_case_comments: false
