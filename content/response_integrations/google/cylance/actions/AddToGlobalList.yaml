name: Add To Global List
description: 'Add a hash to one of the two global lists: GlobalSafe or GlobalQuarantine'
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/cylance#add_to_global_list
integration_identifier: Cylance
parameters:
-   name: List Type
    default_value: GlobalSafe
    type: string
    description: The list to add the hash to. e.g. GlobalSafe
    is_mandatory: true
-   name: Category
    default_value: None
    type: string
    description: The category of the hash
    is_mandatory: false
-   name: Reason
    default_value: ''
    type: string
    description: The reason for adding the hash to the list
    is_mandatory: false
dynamic_results_metadata: []
creator: System
simulation_data_json: '{"Entities": ["FILEHASH"]}'
