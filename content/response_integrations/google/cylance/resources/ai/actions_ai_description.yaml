    ### General Description

    The **Get Threats** action retrieves a comprehensive list of all threats identified
    within the Cylance PROTECT environment. It is a global data retrieval task that
    provides visibility into the threat landscape by fetching details such as file
    names, classifications, risk scores, and hash identifiers (MD5/SHA256) for all
    known threats in the system.


    ### Parameters

    This action does not require any input parameters.


    ### Flow Description

    1. **Authentication**: The action establishes a session with the Cylance API using
    a JWT token generated from the integration's configuration (App ID, Secret, and
    Tenant ID).

    2. **Data Retrieval**: It executes a GET request to the Cylance threats endpoint
    to fetch the first page of threat data.

    3. **Pagination Handling**: The logic identifies the total number of pages and
    iterates through all subsequent pages to ensure a complete dataset is collected.

    4. **Data Transformation**: The retrieved threat objects are flattened into a
    simplified structure and converted into a CSV-compatible format.

    5. **Output Generation**: The action populates a data table named "Cylance Threats"
    within the Google SecOps case and provides the raw data as a JSON result for downstream
    automation.
