Change Policy:
  ai_description: >-
    ### General Description

    Changes the security policy of a specific endpoint in Cylance to an existing policy.
    This action is used to modify the protection level or configuration of devices
    identified by their Hostname or IP Address within the Cylance console.


    ### Parameters Description

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Policy Name | String | Yes | The name of the existing policy in Cylance that
    you want to apply to the target entities. |


    ### Flow Description

    1. **Initialization**: The action connects to the Cylance API using the provided
    configuration (Server Address, Secret, ID, and Tenant Identifier).

    2. **Policy Identification**: It retrieves the list of all available policies
    from Cylance to find the unique ID associated with the provided 'Policy Name'.

    3. **Entity Processing**: For each target entity (Hostname or IP Address):
        * It searches for the device in Cylance using the entity's identifier.
        * If found, it retrieves the device's current details.
    4. **Policy Update**: It sends a request to the Cylance API to update the device's
    configuration, assigning it the new policy ID.

    5. **Completion**: The action returns a summary message listing all entities that
    were successfully updated.
