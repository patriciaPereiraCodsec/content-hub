Add To Global List:
  ai_description: >-
    ### General Description

    The **Add To Global List** action allows users to add a specific file hash to
    Cylance's global lists, specifically **GlobalSafe** or **GlobalQuarantine**. This
    is a containment and policy management action used to either whitelist known safe
    files or blacklist known threats across the entire Cylance-managed environment.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **List Type** | String | Yes | Specifies which global list to add the hash to.
    Common values are `GlobalSafe` or `GlobalQuarantine`. |

    | **Category** | String | No | The category classification for the hash (e.g.,
    Malware, Administrative). |

    | **Reason** | String | No | A text description providing the justification for
    adding the hash to the list. If not provided, it defaults to "None". |


    ### Additional Notes

    - This action only supports **FILEHASH** entities.

    - If a hash already exists in the specified list, the action will identify it
    as an existing entry rather than failing.

    - The action returns a success status of "true" regardless of whether hashes were
    added, already existed, or failed, but the output message provides the specific
    details for each entity.


    ### Flow Description

    1. **Configuration Retrieval**: The action fetches Cylance integration settings
    (Server Address, Credentials) and user-provided parameters (List Type, Category,
    Reason).

    2. **Manager Initialization**: Initializes the `CylanceManager` to handle API
    communication.

    3. **Entity Filtering**: Iterates through the target entities and filters for
    those of type `FILEHASH`.

    4. **API Interaction**: For each file hash, it calls the Cylance API to add the
    hash to the designated global list.

    5. **Response Handling**:
        - If the API returns success, the entity is added to the "affected" list.
        - If the API returns a 409 Conflict (already exists), the entity is added
    to the "existing" list.
        - If an exception occurs, the error is logged and the entity is added to the
    "failed" list.
    6. **Final Reporting**: Constructs a comprehensive output message summarizing
    which hashes were added, which already existed, and which failed, then terminates
    the action.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Adds a file hash to the GlobalSafe or GlobalQuarantine list in Cylance, which
      changes the reputation and handling of that file across the managed environment.
    fetches_data: false
    internal_data_mutation_explanation: null
  categories:
