Enrich Entities:
  ai_description: >-
    ### General Description

    Enriches Hostname and IP Address entities with detailed device information retrieved
    from the Cylance PROTECT console. This action helps analysts understand the security
    posture, operating system, and network configuration of a device as seen by the
    Cylance agent.


    ### Parameters

    There are no additional parameters for this action.


    ### Flow Description

    1. **Authentication**: Initializes a connection to the Cylance API using the provided
    Server Address, Application ID, Secret, and Tenant Identifier.

    2. **Entity Filtering**: Iterates through the target entities in the current scope,
    specifically looking for entities of type `ADDRESS` (IP) or `HOSTNAME`.

    3. **Data Retrieval**: For each supported entity, the action queries the Cylance
    API to find a matching device. If the entity is an IP address, it searches the
    device's reported IP list; if it is a hostname, it matches against the device
    name.

    4. **Enrichment**: If a matching device is found, the action retrieves the full
    device profile, including OS version, MAC addresses, last logged-in user, agent
    version, and assigned policy.

    5. **Internal Update**: The retrieved data is flattened, prefixed with 'Cylance',
    and added to the entity's additional properties. The entity is then marked as
    'enriched' within Google SecOps.

    6. **Finalization**: Updates the entities in the case and returns a JSON result
    containing the raw device data for all successfully enriched entities.
