Delete From Global List:
  ai_description: >-
    ### General Description

    Removes a specific file hash from a designated global list within the Cylance
    console. This action is primarily used to manage exceptions or revert previous
    containment or allowlist actions by deleting entries from lists like 'GlobalSafe'
    or 'GlobalQuarantine'.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | List Type | String | Yes | The name of the global list to remove the hash from.
    Common values include `GlobalSafe` or `GlobalQuarantine`. |


    ### Flow Description

    1. **Initialization**: The action initializes the Cylance API manager using the
    integration's configuration (Server Address, Application ID, Secret, and Tenant
    Identifier).

    2. **Entity Filtering**: It iterates through the target entities and filters for
    those of type `FILEHASH`.

    3. **External Request**: For each identified file hash, it sends a DELETE request
    to the Cylance Global List API endpoint, passing the hash identifier and the specified
    `List Type`.

    4. **Result Reporting**: The action tracks which hashes were successfully processed
    and returns a summary message listing the deleted hashes or indicating if no hashes
    were removed.
