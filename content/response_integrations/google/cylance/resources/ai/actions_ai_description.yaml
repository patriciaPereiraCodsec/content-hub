Ping:
  ai_description: >-
    ### General Description

    The **Ping** action is a diagnostic tool used to verify the connectivity and authentication
    configuration between Google SecOps and the Cylance API. Its primary purpose is
    to ensure that the integration can successfully establish a secure connection
    using the provided credentials before executing other operational actions.


    ### Parameters Description

    This action does not have any action-specific parameters. It relies entirely on
    the global integration configuration parameters:


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Server Address | String | Yes | The base URL of the Cylance API instance. |

    | Application ID | String | Yes | The unique identifier for the Cylance application.
    |

    | Application Secret | String | Yes | The secret key associated with the Application
    ID. |

    | Tenant Identifier | String | Yes | The unique identifier for the Cylance tenant.
    |


    ### Flow Description

    1. **Configuration Retrieval**: The script retrieves the connection details (Server
    Address, App ID, App Secret, and Tenant ID) from the Cylance integration settings.

    2. **Manager Initialization**: It instantiates the `CylanceManager` class.

    3. **Authentication Attempt**: Upon initialization, the `CylanceManager` attempts
    to generate a JSON Web Token (JWT) and exchange it for an OAuth2 access token
    by making a POST request to the Cylance authentication endpoint.

    4. **Connectivity Confirmation**: If the token is successfully retrieved, the
    action concludes that the connection is valid and returns a success status.


    ### Additional Notes

    * This action does not interact with any entities or modify any data within Google
    SecOps or Cylance.

    * Per standard SOAR conventions, Ping actions are excluded from being categorized
    as enrichment actions.
