Get Threat Download Link:
  ai_description: "### General Description\nThis action retrieves a temporary download\
    \ URL for a specific threat file from Cylance using its SHA256 hash. It is designed\
    \ to facilitate the retrieval of malicious samples for further analysis without\
    \ automatically downloading the file to the local environment. The action can\
    \ process either a manually provided list of hashes or existing File Hash entities\
    \ within the case.\n\n### Parameters Description\n| Parameter | Type | Mandatory\
    \ | Description |\n| :--- | :--- | :--- | :--- |\n| Threat SHA256 Hash | String\
    \ | No | A comma-separated list of SHA256 hashes to fetch download links for.\
    \ If this parameter is provided, the action will prioritize these hashes and ignore\
    \ any File Hash entities in the current scope. If left empty, the action will\
    \ automatically process all supported File Hash entities. |\n\n### Additional\
    \ Notes\n- **Entity Enrichment:** If the action runs on entities (i.e., the 'Threat\
    \ SHA256 Hash' parameter is empty), it will update the entities' additional properties\
    \ with the download link (prefixed with 'Cylance_dl') and mark them as enriched.\n\
    - **No File Download:** This action only provides the URL; it does not perform\
    \ the actual file download.\n\n### Flow Description\n1. **Initialization:** The\
    \ action extracts configuration parameters (Server Address, Application ID, Secret,\
    \ and Tenant Identifier) and the optional 'Threat SHA256 Hash' action parameter.\n\
    2. **Target Identification:** It identifies the target hashes to process. If the\
    \ 'Threat SHA256 Hash' parameter is populated, it splits the string into a list.\
    \ Otherwise, it collects the identifiers of all `FILEHASH` entities in the current\
    \ context.\n3. **API Interaction:** For each target hash, the action calls the\
    \ Cylance API endpoint `/threats/v2/download/{hash}` to request a download link.\n\
    4. **Data Processing:** \n    - If the hash was derived from an entity, the action\
    \ flattens the result and updates the entity's `additional_properties` with the\
    \ download URL.\n    - The action collects all retrieved links into a JSON result\
    \ object.\n5. **Finalization:** The action updates the entities in Google SecOps\
    \ (if applicable), adds the JSON results to the action output, and provides a\
    \ summary message of successful and failed hash lookups."
