Change Zone:
  ai_description: >-
    ### General Description

    This action modifies the zone assignments for endpoints (devices) within the Cylance
    environment. It allows security analysts to dynamically move devices between zones,
    which is often used for isolation, policy adjustment, or organizational restructuring.
    The action supports both adding a device to new zones and removing it from existing
    ones simultaneously.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Zones to Add** | String | No | A comma-separated list of Cylance Zone names
    to which the target endpoints should be added. |

    | **Zones to Remove** | String | No | A comma-separated list of Cylance Zone names
    from which the target endpoints should be removed. |


    ### Additional Notes

    * Either **Zones to Add** or **Zones to Remove** (or both) must be provided for
    the action to perform any changes. If both are empty, the action will report that
    no entities were affected.

    * The action identifies devices based on their IP address (ADDRESS entity) or
    Hostname (HOSTNAME entity).


    ### Flow Description

    1. **Initialization**: The action initializes the Cylance API manager using the
    provided integration configuration (Server Address, Credentials, etc.).

    2. **Parameter Parsing**: It retrieves and splits the comma-separated strings
    for zones to add and remove into lists.

    3. **Entity Processing**: It iterates through the target entities in the current
    context, filtering for `ADDRESS` and `HOSTNAME` types.

    4. **Device Resolution**: For each valid entity, it queries the Cylance API to
    find the corresponding internal Device ID. IPs are matched against the device's
    registered IP addresses, and Hostnames are matched against the device name.

    5. **Zone Resolution**: The action resolves the provided zone names into their
    respective internal Cylance Zone IDs.

    6. **API Mutation**: It executes a `PUT` request to the Cylance `/devices/v2/{id}`
    endpoint, updating the device's `add_zone_ids` and `remove_zone_ids` fields.

    7. **Reporting**: The action compiles a list of successfully updated entities
    and provides a summary message detailing which zones were added or removed.
