Get Threat:
  ai_description: >-
    ### General Description

    Enriches File Hash entities with threat intelligence data from Cylance. This action
    retrieves detailed information about a file's reputation, classification, and
    Cylance score. It allows users to define a risk threshold to automatically mark
    entities as suspicious within Google SecOps based on the retrieved score.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Threshold | Integer | Yes | The numerical score threshold. If the Cylance score
    for a file hash exceeds this value, the entity will be marked as suspicious in
    Google SecOps. |


    ### Flow Description

    1. **Authentication**: Initializes the Cylance API client using the integration
    configuration (Server Address, App ID, Secret, and Tenant ID).

    2. **Entity Filtering**: Iterates through the target entities and filters for
    those of type `FILEHASH`.

    3. **Data Retrieval**: For each hash, it queries the Cylance API. If the hash
    is SHA256, it performs a direct lookup; if it is MD5, it searches through the
    global threat list.

    4. **Risk Assessment**: Compares the `cylance_score` from the API response against
    the user-provided `Threshold` parameter. If the score is higher, the entity's
    `is_suspicious` attribute is set to `True`.

    5. **Enrichment**: Flattens the threat data and maps it to the entity's `additional_properties`
    with a `Cylance` prefix. The entity is also marked as `is_enriched`.

    6. **Update**: Updates the modified entities in Google SecOps and returns the
    raw JSON data for further use in the playbook.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
