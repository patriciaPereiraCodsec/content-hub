    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates the 'is_suspicious' status and 'additional_properties' of File Hash
      entities based on the retrieved threat intelligence and the provided threshold.
