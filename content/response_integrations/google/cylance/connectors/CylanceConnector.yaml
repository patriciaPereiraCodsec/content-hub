name: Cylance connector
parameters:
-   name: DeviceProductField
    default_value: device_product
    type: string
    description: The field name used to determine the device product
    is_mandatory: true
    is_advanced: false
    mode: regular
-   name: EventClassId
    default_value: cylance_event
    type: string
    description: The field name used to determine the event name (sub-type)
    is_mandatory: false
    is_advanced: false
    mode: regular
-   name: PythonProcessTimeout
    default_value: '60'
    type: string
    description: The timeout limit (in seconds) for the python process running current
        script
    is_mandatory: true
    is_advanced: false
    mode: regular
-   name: Api Root
    type: string
    description: https://<instance>.cylance.com
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Application Secret
    type: password
    description: ' Used to sign the Application ID'
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Application ID
    type: string
    description: Used to indicate the token requested
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Tenant Identifier
    type: string
    description: ID number of tenant information being queried
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Proxy Server Address
    type: string
    description: The address of the proxy server to use.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Proxy Username
    type: string
    description: The proxy username to authenticate with.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Proxy Password
    type: password
    description: The proxy password to authenticate with.
    is_mandatory: false
    is_advanced: false
    mode: script
description: Cylance connector
integration: Cylance
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/cylance#cylance_connector
rules: []
is_connector_rules_supported: true
creator: admin
