name: Free Query
description: Run a MongoDB query
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/mongodb#free_query
integration_identifier: MongoDB
parameters:
-   name: Database Name
    default_value: ''
    type: string
    description: The DB name to run the query on
    is_mandatory: true
-   name: Collection Name
    default_value: ''
    type: string
    description: The collection name to run the query on
    is_mandatory: true
-   name: Query
    default_value: ''
    type: string
    description: 'The key-value query. Default: {"key": "value"}'
    is_mandatory: true
-   name: Return a single JSON result
    default_value: 'false'
    type: boolean
    description: If enabled, action will return a single JSON result, instead of a
        few results together, for better and easier usage in Playbooks.
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/free_query_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
