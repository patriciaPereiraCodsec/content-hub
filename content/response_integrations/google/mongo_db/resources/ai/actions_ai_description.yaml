Free Query:
  ai_description: >-
    ### General Description

    The **Free Query** action allows users to execute custom MongoDB queries against
    a specific database and collection. It is designed for flexible data retrieval
    from MongoDB instances integrated with Google SecOps, enabling users to fetch
    documents based on specific JSON-formatted criteria.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Database Name** | String | Yes | The name of the MongoDB database to run the
    query on. |

    | **Collection Name** | String | Yes | The name of the collection within the specified
    database to run the query on. |

    | **Query** | String | Yes | The key-value query in JSON format (e.g., `{"key":
    "value"}`). This defines the filter for the search. |

    | **Return a single JSON result** | Boolean | No | If enabled (True), the action
    returns a single JSON array containing all results. If disabled (False), it returns
    each document as an individual JSON result. Default is False. |


    ### Flow Description

    1. **Configuration Retrieval**: The action starts by extracting the MongoDB server
    address, port, and authentication credentials from the integration settings.

    2. **Parameter Extraction**: It retrieves the target database name, collection
    name, the query string, and the output format preference.

    3. **Query Parsing**: The input `Query` string is parsed into a JSON object. If
    the string is not valid JSON, the action terminates with an error.

    4. **Manager Initialization**: A `MongoDBManager` instance is created to handle
    the connection and execution logic.

    5. **Validation**: The manager validates that the specified database and collection
    exist on the server.

    6. **Query Execution**: The action executes a `find` operation on the collection
    using the provided query criteria.

    7. **Data Serialization**: The results are processed to ensure they are JSON-serializable,
    specifically converting MongoDB `ObjectId` types into strings.

    8. **Result Reporting**: Depending on the `Return a single JSON result` parameter,
    the action either adds each document individually or as a single combined JSON
    array to the action results.


    ### Additional Notes

    - This action is strictly for data retrieval (Read-Only) and does not support
    operations that modify the database state (e.g., insert, update, delete).

    - This action does not process or interact with Google SecOps entities.
