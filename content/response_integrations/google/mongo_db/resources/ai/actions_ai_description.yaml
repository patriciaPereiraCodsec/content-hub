Ping:
  ai_description: >-
    ### General Description

    The Ping action is a diagnostic tool designed to verify the connectivity between
    Google SecOps and a target MongoDB instance. It ensures that the provided configuration
    details (Server Address, Port, and Authentication credentials) are correct and
    that the MongoDB server is reachable and responding to requests.


    ### Parameters

    There are no parameters for this action.


    ### Additional Notes

    This action relies on the integration's global configuration settings (Server
    Address, Username, Password, Port, and Use Authentication) to establish the connection.


    ### Flow Description

    1. **Configuration Retrieval:** The action fetches the MongoDB integration settings
    from the environment.

    2. **Manager Initialization:** It initializes the `MongoDBManager` with the retrieved
    server address, port, and authentication details.

    3. **Connectivity Test:** The action calls the `test_connectivity` method, which
    executes a `server_info()` command against the MongoDB instance. This forces a
    network call to verify the server is active.

    4. **Result Reporting:** If the command succeeds, the action terminates with a
    success message. If a `ConnectionFailure` or other exception occurs, the action
    fails and reports the error.
