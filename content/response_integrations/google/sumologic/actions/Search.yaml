name: Search
description: Run a query and get search resutls from Sumologic
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/sumologic#search
integration_identifier: Sumologic
parameters:
-   name: Query
    default_value: ''
    type: string
    description: 'Sumologic query to run. e.g: _collector=*'
    is_mandatory: true
-   name: Delete Search Job
    default_value: 'False'
    type: boolean
    description: If checked, delete the jobs after a search is completed.
    is_mandatory: false
-   name: Since
    default_value: ''
    type: string
    description: 'Start date of the search, ISO-8601 or unixtime (milliseconds). e.g.
        1970-01-01T00:00:00. Default: Last 30 days.'
    is_mandatory: false
-   name: To
    default_value: ''
    type: string
    description: 'End date of the search, ISO-8601 or unixtime (milliseconds). e.g.
        1970-01-01T00:00:00. Default: now (current utc unixtime).'
    is_mandatory: false
-   name: Limit
    default_value: ''
    type: string
    description: 'Number of results to return. e.g. 10. Default: 25.'
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/search_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
is_async: true
script_result_name: results
