Search:
  ai_description: >-
    ### General Description

    Runs a search query in Sumo Logic and retrieves the results. This is an asynchronous
    action that first initiates a search job and then polls for its completion. It
    is designed to handle large datasets by allowing users to specify time ranges
    and result limits.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Query** | String | Yes | The Sumo Logic query to execute (e.g., `_collector=*`).
    |

    | **Delete Search Job** | Boolean | No | If checked, the action will delete the
    search job from Sumo Logic after the search is completed or fails. Default is
    `False`. |

    | **Since** | String | No | The start date of the search in ISO-8601 format or
    unix timestamp (milliseconds). Defaults to the last 30 days if not provided. |

    | **To** | String | No | The end date of the search in ISO-8601 format or unix
    timestamp (milliseconds). Defaults to the current UTC time if not provided. |

    | **Limit** | Integer | No | The maximum number of results to return. Default
    is 25. |


    ### Additional Notes

    - This action is asynchronous and will run in multiple stages (initiation and
    polling).

    - The `Query` must be in a valid Sumo Logic format.

    - If `Delete Search Job` is enabled, it helps in cleaning up the Sumo Logic environment
    but prevents manual review of the job in the Sumo Logic UI later.


    ### Flow Description

    1. **Initiation (First Run):** The action connects to Sumo Logic and creates a
    search job using the provided `Query`, `Since`, and `To` parameters. It returns
    the Job ID and sets the status to 'In Progress'.

    2. **Polling (Subsequent Runs):** The action checks the status of the search job
    using the Job ID. If the job is still running, it remains 'In Progress'.

    3. **Data Retrieval:** Once the job status is 'DONE GATHERING RESULTS', the action
    fetches the messages (results) up to the specified `Limit`.

    4. **Internal Mutation:** The retrieved results are formatted into a data table
    and attached to the case. The raw JSON results are also added to the action's
    output.

    5. **Cleanup:** If the `Delete Search Job` parameter is set to `True`, the action
    sends a request to Sumo Logic to delete the job after results are collected.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: true
    can_update_entities: false
    external_data_mutation_explanation: >-
      If the 'Delete Search Job' parameter is enabled, the action performs a DELETE
      request to Sumo Logic to remove the search job object after completion.
    fetches_data: true
    internal_data_mutation_explanation: >-
      The action adds a data table to the Google SecOps case containing the search
      results retrieved from Sumo Logic.
