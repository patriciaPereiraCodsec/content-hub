Ping:
  ai_description: >-
    ### General Description

    The **Ping** action is a diagnostic tool designed to verify the connectivity between
    Google SecOps and the Sumo Logic instance. It ensures that the provided integration
    parameters (Api Root, Access ID, and Access Key) are correct and that the network
    path is open and functional.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Api Root** | String | Yes | The base URL of the Sumo Logic API (e.g., `https://api.eu.sumologic.com`).
    |

    | **Access ID** | String | Yes | The Access ID generated from the Sumo Logic console
    for authentication. |

    | **Access Key** | String | Yes | The Access Key associated with the Access ID.
    |

    | **Verify SSL** | Boolean | Yes | If set to `True`, the action will validate
    the SSL certificate of the Sumo Logic server. Default is `False`. |


    ### Additional Notes

    - This action does not process any entities and is intended for system health
    checks.

    - It is primarily used during the initial setup or troubleshooting of the Sumo
    Logic integration.


    ### Flow Description

    1. **Parameter Extraction:** The action retrieves the connection details (Api
    Root, Access ID, Access Key, and SSL verification preference) from the integration
    configuration.

    2. **Manager Initialization:** A `SumoLogicManager` instance is created to handle
    communication with the Sumo Logic API.

    3. **Connectivity Test:** The action executes a minimal search query (`| count
    _sourceCategory`) with a very narrow time range to confirm that the API is reachable
    and the credentials have sufficient permissions to run jobs.

    4. **Cleanup:** Immediately after verifying the search job creation, the action
    deletes the temporary search job to maintain a clean environment in Sumo Logic.

    5. **Result Reporting:** If the search job is successfully created and deleted,
    the action returns a success message. If any step fails, it captures the exception
    and reports a failure status.
  capabilities:
