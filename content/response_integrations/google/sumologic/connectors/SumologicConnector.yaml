name: Sumologic Connector
parameters:
-   name: DeviceProductField
    default_value: device_product
    type: string
    description: The field name used to determine the device product. e.g. _type
    is_mandatory: true
    is_advanced: false
    mode: regular
-   name: EventClassId
    default_value: _source
    type: string
    description: The field name used to determine the event name (sub-type). e.g.
        _source_match_event_id
    is_mandatory: false
    is_advanced: false
    mode: regular
-   name: PythonProcessTimeout
    default_value: '180'
    type: string
    description: The timeout limit (in seconds) for the python process running current
        script
    is_mandatory: true
    is_advanced: false
    mode: regular
-   name: Api Root
    type: string
    description: 'The Sumologic Api root, i.e: https://api.{region}.sumologic.com'
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Access ID
    type: string
    description: Sumologic access ID
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Access Key
    type: password
    description: Sumologic access key
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Verify SSL
    default_value: false
    type: boolean
    description: Whether to use ssl on connection or not
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Alert Name Field
    default_value: _sourcecategory
    type: string
    description: The name of the field where the alert name is located (flat field
        path). e.g. _sourcecategory
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Timestamp Field
    default_value: _receipttime
    type: string
    description: The name of the field where the timestamp is located (flat field
        path). e.g. _receipttime
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Environment Field
    default_value: ''
    type: string
    description: The name of the field where the environment is located (flat field
        path). e.g. _collector
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Environment Regex Pattern
    default_value: .*
    type: string
    description: A regex pattern to run on the value found in the "Environment Field"
        field. Default is .* to catch all and return the value unchanged. Used to
        allow the user to manipulate the environment field via regex logic. If the
        regex pattern is null or empty, or the environment value is null, the final
        environment result is the default environment.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Indexes
    default_value: '*'
    type: string
    description: Indexes to get alerts in
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Alerts Count Limit
    default_value: 10
    type: integer
    description: Max count of alerts to pull in one cycle. e.g. 20
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Max Days Backwards
    default_value: 1
    type: integer
    description: Number of days before the first connector iteration to retrieve alerts
        since. This parameter applies to the initial connector iteration after you
        enable the connector for the first time, or used as a fallback value in cases
        where connector's last run timestamp expires. e.g. 3
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Proxy Server Address
    default_value: ''
    type: string
    description: The address of the proxy server to use.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Proxy Username
    default_value: ''
    type: string
    description: The proxy username to authenticate with.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Proxy Password
    default_value: ''
    type: password
    description: The proxy password to authenticate with.
    is_mandatory: false
    is_advanced: false
    mode: script
description: Sumologic Connector
integration: Sumologic
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/sumologic
rules: []
is_connector_rules_supported: true
creator: admin
