Get User Activities:
  ai_description: >-
    ### General Description

    This action fetches user investigation logs from Elastica Cloud SOC for specific
    User entities. It is designed to provide security analysts with a historical view
    of a user's activities (e.g., logins, file access, etc.) within a specified timeframe
    to assist in incident investigation and threat hunting.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Minutes Back | Integer | No | Specifies the lookback window in minutes from
    the current time. The action will retrieve all user activities recorded within
    this period. Defaults to 60 minutes if not provided. |


    ### Additional Notes

    * **Case Sensitivity:** The action utilizes the `OriginalIdentifier` attribute
    of the User entity to query the Elastica API, as usernames in Elastica Cloud SOC
    are case-sensitive.

    * **Output:** Results are presented as an Entity Table (CSV format) attached to
    each processed entity and a comprehensive JSON object containing all retrieved
    logs.


    ### Flow Description

    1. **Initialization:** The action initializes the connection to Elastica Cloud
    SOC using the provided API Root, Key ID, and Key Secret.

    2. **Time Calculation:** It calculates the start time for the log search by subtracting
    the `Minutes Back` value from the current system time.

    3. **Entity Filtering:** The action identifies all `USERUNIQNAME` entities within
    the target scope.

    4. **Data Retrieval:** For each identified user, it calls the Elastica API to
    fetch investigation logs starting from the calculated timestamp.

    5. **Data Processing:** If logs are found, they are flattened and converted into
    a CSV table format.

    6. **Internal Updates:** The action attaches the CSV table to the corresponding
    entity in Google SecOps and populates the action's JSON result with the raw data.

    7. **Completion:** The action concludes by providing a summary message indicating
    which users had activities found.
