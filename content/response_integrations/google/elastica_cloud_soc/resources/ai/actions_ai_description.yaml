Ping:
  ai_description: >-
    ### General Description

    Tests the connectivity between Google SecOps and the ElasticaCloudSOC platform
    to ensure that the provided credentials and API root are valid and reachable.


    ### Parameters Description

    | Parameter | Description | Type | Mandatory |

    | :--- | :--- | :--- | :--- |

    | None | This action does not have any input parameters. | N/A | N/A |


    ### Additional Notes

    This action relies solely on the integration's global configuration (API Root,
    Key ID, Key Secret, and Verify SSL) to perform the connectivity test.


    ### Flow Description

    1. **Configuration Retrieval**: The action retrieves the integration's global
    settings, including the API Root and authentication credentials.

    2. **Manager Initialization**: An instance of the ElasticaCloudSOCManager is created
    using the retrieved configuration.

    3. **Connectivity Test**: The action calls the `ping` method, which executes a
    GET request to the `audit/v2/datasources/` endpoint.

    4. **Result Handling**: If the request is successful, the action returns a success
    message; otherwise, it reports a connection failure.
