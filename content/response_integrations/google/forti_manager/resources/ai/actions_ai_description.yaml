Add IP To Group:
  ai_description: >-
    ### General Description

    This action creates a firewall address object for IP address entities and adds
    them to a specified address group within a FortiManager Administrative Domain
    (ADOM). It is designed to automate network security policy updates by ensuring
    specific IPs are categorized into the correct groups for policy enforcement.


    ### Parameters Description

    | Parameter Name | Type | Mandatory | Default Value | Description |

    | :--- | :--- | :--- | :--- | :--- |

    | ADOM Name | String | Yes | root | The name of the Administrative Domain (ADOM)
    where the operation will take place. |

    | Address Group Name | String | Yes | N/A | The name of the existing address group
    to which the address object will be added. |


    ### Flow Description

    1. **Session Initialization**: The action authenticates with FortiManager and
    checks the session status for the specified ADOM. If 'Workflow Mode' is enabled
    in the integration configuration, it locks the ADOM workspace and starts a new
    workflow session.

    2. **Entity Processing**: The action iterates through all provided IP Address
    entities.

    3. **Object Creation**: For each IP, it checks if a corresponding address object
    (prefixed with 'Siemplify_') already exists. If not, it creates a new address
    object for that IP.

    4. **Group Membership Update**: The action retrieves the current members of the
    specified 'Address Group Name' and adds the address object to the group's member
    list via an update request.

    5. **Session Finalization**: If in workflow mode, the action submits, commits,
    and approves the changes before unlocking the ADOM. If the ADOM is currently locked
    by another process, the action may enter an 'In Progress' state to retry asynchronously.


    ### Additional Notes

    - This action is asynchronous. If the ADOM is locked, the action will wait and
    retry based on the global timeout settings.

    - Ensure the 'Address Group Name' exists in the target ADOM before running the
    action.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Creates new firewall address objects and modifies existing address group memberships
      within the FortiManager system.
    fetches_data: true
    internal_data_mutation_explanation: null
  categories:
