Add URL To Url Filter:
  ai_description: >-
    ### General Description

    Adds URL entities to a specific URL filter in FortiManager. This action is designed
    to automate the blocking of malicious or unwanted URLs by inserting them into
    existing URL filter profiles within a specified Administrative Domain (ADOM).
    It supports FortiManager's workflow mode, handling workspace locking, session
    management, and change commitment.


    ### Parameters Description

    | Parameter Name | Type | Mandatory | Default Value | Description |

    | :--- | :--- | :--- | :--- | :--- |

    | ADOM Name | String | Yes | root | The name of the Administrative Domain (ADOM)
    where the URL filter resides. |

    | Url Filter Name | String | Yes | null | The name of the URL filter profile to
    which the URL records will be added. |


    ### Additional Notes

    - This action is asynchronous and may require an increased script timeout in the
    IDE if the ADOM is currently locked by another process.

    - If 'Workflow Mode' is enabled in the integration configuration, the action will
    automatically handle locking the workspace, starting a session, submitting changes,
    and approving them.


    ### Flow Description

    1. **Session Initialization**: Connects to FortiManager and checks the session
    status for the specified ADOM, locking the workspace if necessary.

    2. **Entity Filtering**: Identifies all URL entities within the current context.

    3. **Filter Identification**: Retrieves the internal ID for the URL filter specified
    by the 'Url Filter Name' parameter.

    4. **URL Addition**: Iterates through the URL entities and adds a new block record
    for each into the identified URL filter.

    5. **Session Finalization**: Commits and approves the changes (if in workflow
    mode), unlocks the ADOM workspace, and logs out.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Adds a new URL block record to a specified URL filter within a FortiManager
      ADOM, effectively changing the security policy configuration of the external
      system.
    fetches_data: true
    internal_data_mutation_explanation: null
