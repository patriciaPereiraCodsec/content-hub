Ping:
  ai_description: >-
    ### General Description

    The **Ping** action is a diagnostic tool used to verify the connectivity between
    Google SecOps and a FortiManager instance. Its primary purpose is to ensure that
    the integration configuration (API Root, Username, Password, and SSL settings)
    is correct and that the FortiManager API is reachable and responding to authentication
    requests.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | N/A | N/A | N/A | This action does not require any input parameters. It relies
    solely on the integration's global configuration. |


    ### Additional Notes

    * This action is typically used during the initial setup of the integration or
    for troubleshooting communication issues.

    * It does not process any entities or modify any data within Google SecOps or
    FortiManager.


    ### Flow Description

    1. **Configuration Retrieval**: The action fetches the integration settings, including
    the API Root URL, Username, Password, and the 'Verify SSL' flag.

    2. **Manager Initialization**: It initializes the FortiManager API client with
    the retrieved settings.

    3. **Authentication Attempt**: The client attempts to log in to the FortiManager
    API by sending a POST request to the `/sys/login/user` endpoint.

    4. **Connection Validation**: If the API returns a valid session token, the action
    confirms that the connection is established and terminates successfully.
