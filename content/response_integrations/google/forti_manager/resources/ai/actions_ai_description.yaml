Remove URL From Url Filter:
  ai_description: >-
    ### General Description

    Removes specific URL block records from a designated URL filter within FortiManager.
    This action is used to unblock URLs that were previously restricted, ensuring
    that the network security policy is updated to allow traffic to the specified
    destinations. It supports Administrative Domains (ADOMs) and can operate in workflow
    mode if configured in the integration settings.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | ADOM Name | String | Yes | The name of the Administrative Domain (ADOM) where
    the URL filter is located. Defaults to 'root' if not specified. |

    | Url Filter Name | String | Yes | The name of the URL filter from which the URL
    record should be removed. |


    ### Additional Notes

    - This action is asynchronous. If the ADOM is locked by another process, the action
    will wait and may require an increased script timeout in the Chronicle SOAR IDE.

    - The action automatically normalizes URLs by removing 'http://' and 'https://'
    prefixes before searching for the record in FortiManager.

    - It specifically processes entities of type `DestinationURL`.


    ### Flow Description

    1. **Session Initialization**: Connects to FortiManager and checks the session
    status. If workflow mode is enabled, it attempts to lock the ADOM and start a
    workflow session.

    2. **Filter Identification**: Retrieves the internal ID of the URL filter based
    on the provided `Url Filter Name`.

    3. **Entity Processing**: Iterates through the `DestinationURL` entities in the
    scope.

    4. **URL Normalization**: Strips protocol prefixes (http/https) from the entity
    identifier to match FortiManager's storage format.

    5. **Record Deletion**: Fetches all entries for the specified URL filter, identifies
    the entry matching the normalized URL, and sends a deletion request to the FortiManager
    API.

    6. **Finalization**: If in workflow mode, it submits, commits, and approves the
    changes. Finally, it unlocks the ADOM and logs out of the session.
