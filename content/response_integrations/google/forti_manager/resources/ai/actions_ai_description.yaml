Remove IP From Group:
  ai_description: >-
    ### General Description

    The **Remove IP From Group** action is designed to manage firewall configurations
    within FortiManager by removing specific IP address entities from a designated
    address group and subsequently deleting the address object itself. This action
    is primarily used for cleanup operations, such as reversing a previous blocking
    action or managing dynamic group memberships. It supports asynchronous execution
    to handle ADOM (Administrative Domain) workspace locking and session management.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **ADOM Name** | String | Yes | The name of the Administrative Domain in FortiManager
    where the operation will occur. Defaults to 'root'. |

    | **Address Group Name** | String | Yes | The name of the firewall address group
    from which the IP address object should be removed. |


    ### Flow Description

    1. **Session Initialization**: The action authenticates with FortiManager and
    attempts to lock the specified ADOM workspace (if workflow mode is enabled) to
    ensure configuration integrity.

    2. **Entity Filtering**: It identifies all `ADDRESS` entities provided in the
    current context.

    3. **Object Identification**: For each IP address, it constructs the expected
    firewall address object name (typically using the prefix 'Siemplify_').

    4. **Group Removal**: It executes an API request to update the specified Address
    Group, removing the identified address object from its member list.

    5. **Object Deletion**: Once removed from the group, the action sends a delete
    request to FortiManager to permanently remove the address object from the configuration.

    6. **Session Finalization**: The action submits, commits, and approves the changes
    (if in workflow mode) and unlocks the ADOM workspace.


    ### Additional Notes

    - **Async Execution**: This action is asynchronous. If the ADOM is currently locked
    by another process, the action will enter an 'In Progress' state and retry until
    the timeout is reached.

    - **Constraint**: An address group must contain at least one member. If the target
    IP is the last member of the group, the removal will fail with an error to prevent
    invalid firewall configurations.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Removes a firewall address object from a specified address group and deletes
      the address object from the FortiManager configuration via UPDATE and DELETE
      API methods.
