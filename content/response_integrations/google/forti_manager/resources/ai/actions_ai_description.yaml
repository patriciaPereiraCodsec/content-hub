Execute Script:
  ai_description: >-
    Executes a pre-defined script on a FortiManager device or device group. This action
    is used to automate configuration changes or operational tasks across managed
    devices within a specific Administrative Domain (ADOM) and Policy Package. It
    triggers the execution via the FortiManager API and returns a Task ID, which can
    be used to monitor the progress of the operation.


    ### Parameters Description


    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | ADOM Name | String | Yes | The name of the Administrative Domain (ADOM) where
    the script and device reside. Default is 'root'. |

    | Policy Package Name | String | Yes | The full name of the policy package, including
    the package name and any parent folders. |

    | Script Name | String | Yes | The name of the existing script in FortiManager
    that you wish to execute. |

    | Device Name | String | Yes | The name of the specific device or device group
    where the script will be executed. |

    | VDOM | String | No | The specific Virtual Domain (VDOM) on the device to target.
    If provided, the script runs on that specific VDOM. |


    ### Flow Description


    1. **Authentication**: The action connects to the FortiManager instance using
    the provided API Root, Username, and Password.

    2. **Parameter Retrieval**: It gathers the execution context, including the ADOM,
    Policy Package, Script Name, and target Device/VDOM from the action parameters.

    3. **Execution Request**: It sends a request to the FortiManager API (`/dvmdb/adom/{adom}/script/execute`)
    to trigger the script.

    4. **Task Tracking**: The action receives a Task ID from FortiManager and returns
    it as the primary result, allowing for asynchronous tracking of the script's completion.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
