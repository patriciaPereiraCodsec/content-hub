Get Task Information:
  ai_description: >-
    ### General Description

    Retrieves detailed information about a specific task from FortiManager using its
    unique Task ID. This action is primarily used to monitor the progress or outcome
    of asynchronous operations initiated in FortiManager, such as script executions
    or policy installs.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Task ID | String | Yes | The unique identifier of the task in FortiManager to
    retrieve information for. |


    ### Flow Description

    1. **Initialization**: The action establishes a connection to the FortiManager
    API using the configured credentials and API root.

    2. **Data Retrieval**: It executes a GET request (via JSON-RPC) to the FortiManager
    task endpoint using the provided `Task ID`.

    3. **Processing**: If the task is found, the action retrieves the task object,
    flattens the nested JSON structure, and converts it into a format suitable for
    a data table.

    4. **Output**: The retrieved task information is attached to the action results
    as a data table named 'Task Information', and the action concludes successfully.
