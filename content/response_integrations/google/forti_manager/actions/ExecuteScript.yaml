name: Execute Script
description: Execute existing script.Can be executed on device group and on a single
    device if VDOM provided.
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/forti-manager#execute_script
integration_identifier: FortiManager
parameters:
-   name: ADOM Name
    type: string
    description: 'The name of the ADOM. Default: root.'
    is_mandatory: true
-   name: Policy Package Name
    type: string
    description: The full name of the package, including package name and any parent
        folders.
    is_mandatory: true
-   name: Script Name
    type: string
    description: The name of the script to execute.
    is_mandatory: true
-   name: Device Name
    type: string
    description: The name of the device to execute the script on.
    is_mandatory: true
-   name: VDOM
    type: string
    description: The virtual domain of the device.
    is_mandatory: false
dynamic_results_metadata: []
creator: Admin
script_result_name: task_id
