Get Ip Info:
  ai_description: "### General Description\nThis action enriches IP Address entities\
    \ by retrieving comprehensive intelligence from Shodan. It provides details such\
    \ as ISP, organization, geographic location, open ports, and associated hostnames/domains.\
    \ The action is designed to help security analysts understand the external footprint\
    \ and potential exposure of an IP address.\n\n### Parameters Description\n| Parameter\
    \ | Type | Mandatory | Description |\n| :--- | :--- | :--- | :--- |\n| Return\
    \ Historical Banners | Boolean | No | If set to `true`, the action retrieves all\
    \ historical banner data associated with the IP. Defaults to `false`. |\n| Set\
    \ Minify | Boolean | No | If set to `true`, the action returns only a list of\
    \ ports and general host information, excluding detailed banners. Defaults to\
    \ `false`. |\n\n### Additional Notes\n- The action specifically targets entities\
    \ of type `ADDRESS`.\n- If an IP is not found in Shodan's database, the action\
    \ will report it as missing without failing the entire execution.\n\n### Flow\
    \ Description\n1. **Parameter Initialization**: Retrieves the Shodan API key and\
    \ SSL verification settings from the integration configuration, along with the\
    \ action-specific parameters (`Return Historical Banners`, `Set Minify`).\n2.\
    \ **Entity Filtering**: Iterates through the target entities and selects only\
    \ those of type `ADDRESS`.\n3. **Data Retrieval**: For each valid IP entity, it\
    \ queries the Shodan API using the `get_ip_info` method.\n4. **Internal Data Mutation**:\
    \ \n    - Adds a flat CSV table to the entity containing the retrieved Shodan\
    \ data.\n    - Updates the entity's `additional_properties` with `Shodan_Country`,\
    \ `Shodan_Last_updated`, and `Shodan_Domains`.\n    - Marks the entity as enriched\
    \ (`is_enriched = True`).\n5. **Results Reporting**: Updates the entities in the\
    \ Google SecOps environment and returns a JSON result containing the full API\
    \ response for further downstream processing."
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entity additional properties with Shodan intelligence (Country, Last
      Updated, Domains) and sets the enriched flag to true.
  categories:
    enrichment: true
  entity_usage:
    entity_types:
    - ADDRESS
