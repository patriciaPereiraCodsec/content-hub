SearchForExploits:
  ai_description: >-
    ### General Description

    This action searches the Shodan Exploits database for known exploits and vulnerabilities
    based on a user-provided query. It aggregates data from multiple sources including
    CVE, OSVDB, and Metasploit to provide detailed information about exploit availability
    and characteristics.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Search Query | String | Yes | The search term used to query the exploit database
    (e.g., 'CVE-2021-44228'). |

    | Facets | String | No | A comma-separated list of properties to get summary information
    on (e.g., 'port,source'). |

    | Page | Integer | No | The page number to retrieve results (100 results per page).
    Defaults to 1. |


    ### Flow Description

    1. **Initialization**: Connects to the Shodan API using the configured API key
    and SSL settings.

    2. **Parameter Extraction**: Retrieves the search query, facets, and page number
    from the action parameters.

    3. **API Call**: Executes a GET request to the Shodan Exploits search endpoint.

    4. **Data Processing**: If results are found, it flattens the response and creates
    a data table for the Google SecOps UI.

    5. **Output**: Returns the full JSON result and a success message to the platform.


    ### Additional Notes

    - This action is a standalone search utility and does not process or enrich specific
    entities from the case environment.
