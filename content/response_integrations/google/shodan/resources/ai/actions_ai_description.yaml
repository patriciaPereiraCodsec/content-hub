Ping:
  ai_description: >-
    ### General Description

    The **Ping** action is a diagnostic utility designed to verify the connectivity
    between the Google SecOps platform and the Shodan API. Its primary purpose is
    to validate that the integration's configuration, specifically the API key and
    network settings, are correct and functional.


    ### Parameters Description

    There are no parameters for this action.


    ### Additional Notes

    This action is typically executed during the initial setup of the Shodan integration
    or when troubleshooting communication issues. It does not process any entities
    or modify any data.


    ### Flow Description

    1. **Configuration Retrieval**: The action retrieves the Shodan API key and SSL
    verification settings from the integration configuration.

    2. **Manager Initialization**: It initializes the `ShodanManager` using the provided
    credentials.

    3. **Connectivity Test**: The action calls the `test_connectivity` method, which
    executes a GET request to the Shodan `/api-info` endpoint.

    4. **Finalization**: If the API call is successful, the action returns a success
    message ('Connection Established') and sets the result value to 'true'.
