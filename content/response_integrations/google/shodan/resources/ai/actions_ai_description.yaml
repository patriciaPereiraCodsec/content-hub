Get Api Info:
  ai_description: >-
    ### General Description

    The **Get Api Info** action retrieves detailed information regarding the Shodan
    API plan associated with the configured API key. It provides visibility into account
    limits, including scan credits, query credits, and the specific plan type (e.g.,
    'oss', 'dev'). This action is primarily used for administrative oversight and
    to ensure that the integration has sufficient credits to perform other Shodan
    operations.


    ### Parameters Description

    There are no input parameters for this action. It utilizes the global integration
    configuration for the API Key and SSL verification settings.


    ### Additional Notes

    This action does not process entities and is intended to provide metadata about
    the Shodan account itself.


    ### Flow Description

    1. **Configuration Retrieval**: The action extracts the Shodan API Key and 'Verify
    SSL' preference from the integration's shared configuration.

    2. **API Interaction**: It initializes the Shodan Manager and executes a GET request
    to the `/api-info` endpoint.

    3. **Data Transformation**: The retrieved API information (JSON) is converted
    into a flat CSV format for display.

    4. **Result Output**: The action populates a data table titled 'Shodan API Info'
    within the Google SecOps interface and attaches the full JSON response for downstream
    playbook use.
  capabilities:
    can_create_case_comments: false
