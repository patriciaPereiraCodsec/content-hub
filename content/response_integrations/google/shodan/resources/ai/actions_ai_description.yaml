DNS Reverse:
  ai_description: >-
    ### General Description

    The **DNS Reverse** action performs a reverse DNS lookup for IP Address entities
    using the Shodan API. It identifies hostnames associated with specific IP addresses
    to provide additional context during an investigation.


    ### Parameters Description

    There are no action-specific parameters for this action. However, it relies on
    the following integration configuration parameters:

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **API key** | String | Yes | The Shodan API key used for authentication. |

    | **Verify SSL** | Boolean | No | Whether to verify the SSL certificate for API
    requests. |


    ### Flow Description

    1. **Initialization**: The action retrieves the Shodan API key and SSL verification
    settings from the integration configuration.

    2. **Entity Identification**: It iterates through the target entities and selects
    those of type `ADDRESS` (IP addresses).

    3. **Reverse Lookup**: For each identified IP address, the action queries Shodan's
    reverse DNS endpoint to retrieve associated hostnames.

    4. **Result Aggregation**:
        * Successfully resolved hostnames are added to a data table titled "Shodan
    DNS Reverse Report".
        * The raw results are stored in a JSON object for further use in the playbook.
    5. **Completion**: The action concludes by providing a summary message of the
    resolved IPs and setting the execution status.


    ### Additional Notes

    * This action is a read-only lookup and does not modify entity attributes or create
    insights within Google SecOps.

    * If no IP Address entities are present in the context, the action will report
    that no IPs were defined.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
  categories:
    enrichment: true
  entity_usage:
