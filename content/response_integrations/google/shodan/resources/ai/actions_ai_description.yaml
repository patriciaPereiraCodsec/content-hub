DNS Resolve:
  ai_description: "### General Description\nResolves Hostname entities to their corresponding\
    \ IP addresses using the Shodan API. This action allows analysts to quickly identify\
    \ the IP infrastructure associated with specific hostnames during an investigation.\n\
    \n### Parameters Description\n| Parameter | Type | Mandatory | Description |\n\
    | :--- | :--- | :--- | :--- |\n| None | N/A | N/A | This action does not require\
    \ any input parameters; it operates directly on the Hostname entities present\
    \ in the context. |\n\n### Additional Notes\n- The action utilizes the Shodan\
    \ integration's global configuration for the API Key and SSL verification settings.\n\
    - It performs a batch resolution by sending all identified hostnames in a single\
    \ request to the Shodan API.\n\n### Flow Description\n1. **Entity Filtering**:\
    \ The action scans all entities in the current scope and filters for those with\
    \ the type `HOSTNAME`.\n2. **Data Aggregation**: The identifiers (names) of the\
    \ filtered hostnames are collected into a comma-separated list.\n3. **API Interaction**:\
    \ The action sends the list of hostnames to the Shodan `dns/resolve` endpoint.\n\
    4. **Output Generation**: \n    - If resolution data is returned, it generates\
    \ a data table titled \"Shodan DNS Reslove Report\" containing the mappings.\n\
    \    - The raw resolution data is attached as a JSON result.\n5. **Finalization**:\
    \ The action ends with a status message summarizing the success or failure of\
    \ the lookup for the processed hostnames."
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
  categories:
    enrichment: true
  entity_usage:
