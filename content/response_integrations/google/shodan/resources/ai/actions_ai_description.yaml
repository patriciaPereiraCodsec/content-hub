Search:
  ai_description: >-
    ### General Description

    The **Search** action allows users to query the Shodan database directly from
    Google SecOps. It leverages Shodan's search engine to find internet-connected
    devices, banners, and host information based on a user-defined query. This action
    is primarily used for discovery and threat research, providing a broad view of
    internet-facing assets and their configurations.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Search Query** | String | Yes | The Shodan search query using standard Shodan
    syntax (e.g., `apache country:"DE"`). |

    | **Facets** | String | No | A comma-separated list of properties to retrieve
    summary statistics (e.g., `country:10,city`). |

    | **Set Minify** | Boolean | No | If set to `true`, the action will only return
    essential banner data, reducing the size of the response. |


    ### Flow Description

    1. **Initialization:** The action initializes the Shodan API client using the
    configured API key and SSL settings.

    2. **Parameter Extraction:** It retrieves the mandatory search query and optional
    facets/minify settings from the action parameters.

    3. **API Execution:** The action performs a GET request to the Shodan `/shodan/host/search`
    endpoint.

    4. **Data Transformation:** If results are found, the nested JSON response is
    flattened into a tabular format.

    5. **Output Generation:** The action generates a data table for the Google SecOps
    UI and attaches the full raw JSON result for use in subsequent playbook steps.


    ### Additional Notes

    This action is a standalone search utility and does not iterate over or enrich
    specific entities within a case. It returns a global set of results based on the
    provided query.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
