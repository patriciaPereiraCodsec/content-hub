Scan A Network:
  ai_description: >-
    ### General Description

    The **Scan A Network** action initiates an active network scan via Shodan for
    specific IP address entities. This action is used to trigger Shodan's crawlers
    to visit the provided IPs and update their information in the Shodan database.
    It returns a unique Scan ID that can be used to track the progress of the request.


    ### Parameters

    This action does not require any additional input parameters. It utilizes the
    global integration configuration for the Shodan API Key and SSL verification settings.


    ### Flow Description

    1. **Entity Extraction**: The action iterates through all entities in the current
    context and filters for those of type `ADDRESS` (IP addresses).

    2. **Request Formatting**: The identified IP addresses are aggregated into a comma-separated
    string.

    3. **External API Call**: The action performs a POST request to Shodan's `/shodan/scan`
    endpoint using the provided API key.

    4. **Output Generation**: Upon a successful request, the action provides the Shodan
    Scan ID in the output message and as the action's result value.


    ### Additional Notes

    * **API Credits**: Executing this action consumes Shodan scan credits (typically
    1 credit per IP address). A paid Shodan API plan is required to use this functionality.

    * **Asynchronous Nature**: This action triggers the scan but does not wait for
    the scan results to be completed; it only returns the job identifier.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Initiates a new network scan job in Shodan, which consumes API scan credits
      and creates a record of the scan request in the Shodan platform.
    fetches_data: false
    internal_data_mutation_explanation: null
  categories:
    enrichment: false
  entity_usage:
