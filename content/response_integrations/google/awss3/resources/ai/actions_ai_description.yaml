Download File From Bucket:
  ai_description: >-
    ### General Description

    Downloads a file from a specified AWS S3 bucket path to a local directory on the
    Google SecOps runner. This action is primarily used for retrieving logs, artifacts,
    or other data stored in S3 for further processing or analysis within a playbook.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Bucket File Path | String | Yes | The full S3 path of the file to download.
    It must follow the format `s3://{bucket_name}/{file_path}`. Example: `s3://my-bucket/logs/app.log`.
    |

    | Download Path | String | Yes | The absolute local path on the runner where the
    file should be saved. Example: `/tmp/downloaded_file.txt`. |


    ### Additional Notes

    - The action will fail if the local `Download Path` already exists or if the runner
    lacks the necessary permissions to write to that directory.

    - This action does not process entities; it operates strictly based on the provided
    string parameters.

    - Per Google SecOps categorization rules, actions that download files are not
    classified as enrichment actions.


    ### Flow Description

    1. **Initialization**: Retrieves AWS credentials (Access Key, Secret Key, Region)
    from the integration configuration and the file paths from the action parameters.

    2. **Connectivity Check**: Establishes a connection to the AWS S3 service and
    validates credentials by attempting to list buckets.

    3. **Path Parsing**: Parses the `Bucket File Path` to separate the bucket name
    from the object key using a regular expression.

    4. **Local Validation**: Checks if the target `Download Path` is valid and ensures
    no file already exists at that location to prevent accidental overwrites.

    5. **Execution**: Downloads the file from the S3 bucket and saves it to the local
    filesystem using the Boto3 library.

    6. **Completion**: Returns a success message and the paths used in the JSON result
    if the download is successful.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
