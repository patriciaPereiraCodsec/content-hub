Get Bucket Policy:
  ai_description: >-
    ### General Description

    The **Get Bucket Policy** action retrieves the access policy associated with a
    specific AWS S3 bucket. This action is primarily used for security auditing and
    compliance checks to understand the permissions, principals, and actions allowed
    on a target bucket.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Bucket Name | String | Yes | The name of the AWS S3 bucket from which to retrieve
    the policy information. |


    ### Flow Description

    1. **Initialization**: The action initializes the AWS S3 manager using the provided
    integration credentials (Access Key, Secret Key, and Region).

    2. **Connectivity Validation**: It performs a connectivity test to ensure the
    credentials are valid and the service is reachable.

    3. **Data Retrieval**: The action calls the AWS S3 API to fetch the bucket policy
    for the specified bucket name.

    4. **Parsing**: The retrieved policy JSON is parsed into a structured data model
    containing the policy version and a list of statements (Sid, Effect, Principal,
    Action, Resource).

    5. **Result Processing**: The structured policy data is added to the action's
    JSON results, and a success message is returned to the user.


    ### Additional Notes

    - This action does not operate on entities; it requires a manual input for the
    bucket name.

    - If the bucket does not have a policy or the action lacks permissions, it will
    return a failure status.
