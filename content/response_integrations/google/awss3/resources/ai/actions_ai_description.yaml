Ping:
  ai_description: >-
    ### General Description

    The **Ping** action is designed to verify the connectivity between Google SecOps
    and the AWS S3 service. It ensures that the provided AWS credentials (Access Key
    ID and Secret Key) and the specified region are valid and have the necessary permissions
    to interact with the S3 environment. This is typically used during the initial
    setup or troubleshooting of the AWSS3 integration.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | AWS Access Key ID | String | Yes | The unique identifier for the AWS account
    used to authenticate requests. |

    | AWS Secret Key | String | Yes | The secret key associated with the Access Key
    ID used for signing AWS requests. |

    | AWS Default Region | String | Yes | The AWS region where the S3 client will
    attempt to connect (e.g., 'us-east-1'). |


    ### Additional Notes

    - This action does not require any input entities to run.

    - It uses the `list_buckets` API call as a lightweight method to verify connectivity
    and permissions.

    - If the connection fails, the action will provide a detailed error message to
    assist in debugging.


    ### Flow Description

    1. **Parameter Extraction:** The action retrieves the AWS Access Key ID, Secret
    Key, and Default Region from the integration's configuration settings.

    2. **Manager Initialization:** It initializes the `AWSS3Manager` using the extracted
    credentials and region.

    3. **Connectivity Test:** The manager executes the `test_connectivity` method,
    which triggers a `list_buckets` call to the AWS S3 API.

    4. **Response Validation:** The action checks the HTTP response status code. A
    code of 200 or 204 is considered a successful connection.

    5. **Final Output:** If successful, it returns a completion status with a success
    message. If an exception occurs (e.g., authentication failure, network timeout),
    it catches the error and returns a failed status with the error details.
