Set Bucket Policy:
  ai_description: >-
    ### General Description

    Sets a bucket policy for a specific AWS S3 bucket. This action allows users to
    define or update access controls and permissions for an S3 bucket by providing
    a JSON policy object. It is useful for automating security configurations, such
    as enforcing encryption or restricting public access.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Bucket Name | String | Yes | Specify the name of the bucket on which you want
    to update the policy. |

    | Policy JSON Object | String | Yes | Specify the JSON object of the policy that
    you want to set for the bucket. |


    ### Flow Description

    1. **Initialization**: The action retrieves AWS credentials (Access Key, Secret
    Key, and Region) from the integration configuration.

    2. **Connectivity Check**: It initializes the AWS S3 Manager and performs a connectivity
    test to validate the provided credentials.

    3. **Policy Application**: The action sends a `put_bucket_policy` request to AWS
    S3 for the specified bucket name using the provided JSON policy string.

    4. **Result Handling**: If the operation is successful, it returns a success message.
    If the AWS service returns an error (e.g., invalid bucket name or malformed JSON),
    it catches the exception and reports the failure.
