List Bucket Objects:
  ai_description: >-
    ### General Description

    The **List Bucket Objects** action retrieves a list of objects stored within a
    specific AWS S3 bucket. It provides metadata for each object, such as the key
    (file path), last modified timestamp, size, owner information, and storage class.
    This action is primarily used for auditing bucket contents or identifying specific
    files for follow-up automation steps within a playbook.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Bucket Name** | String | Yes | The name of the AWS S3 bucket from which to
    retrieve the list of objects. |

    | **Max Objects to Return** | Integer | No | The maximum number of objects to
    return in the results. Defaults to 50 if not specified or if a negative value
    is provided. |


    ### Flow Description

    1. **Initialization**: The action extracts AWS credentials (Access Key, Secret
    Key, Region) from the integration configuration and retrieves the `Bucket Name`
    and `Max Objects to Return` from the action parameters.

    2. **Connectivity Check**: It validates the AWS credentials by attempting to list
    buckets via the `AWSS3Manager`.

    3. **Data Retrieval**: The action calls the AWS S3 API to list objects within
    the specified bucket, applying the user-defined or default limit on the number
    of objects returned.

    4. **Data Processing**: The raw response from AWS is parsed into structured `BucketContent`
    data models, capturing key metadata like size and modification dates.

    5. **Output Generation**: The action generates a CSV-formatted data table for
    the case wall and a detailed JSON result containing the object metadata for use
    in subsequent playbook logic.


    ### Additional Notes

    - This action does not download the actual content of the files; it only retrieves
    metadata about the objects.

    - The bucket name is automatically converted to lowercase to comply with AWS S3
    naming conventions.
