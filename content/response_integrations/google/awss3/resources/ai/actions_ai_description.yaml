Upload File To Bucket:
  ai_description: >-
    ### General Description

    The **Upload File To Bucket** action allows users to upload a file from the local
    Google SecOps environment to a specified AWS S3 bucket. This action is primarily
    used for data archival, sharing logs with external teams, or moving evidence to
    cloud storage during an investigation.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **File Path** | String | Yes | The absolute local path to the file that needs
    to be uploaded (e.g., `/tmp/evidence.txt`). The action verifies that the file
    exists and is accessible before attempting the upload. |

    | **Bucket Upload Path** | String | Yes | The destination URI in AWS S3 where
    the file should be stored. It must follow the format `s3://{bucket_name}/{file_key}`
    (e.g., `s3://my-security-bucket/incident-logs/log.txt`). |


    ### Additional Notes

    - This action requires valid AWS credentials (Access Key ID, Secret Key, and Default
    Region) to be configured in the integration settings.

    - If a file already exists at the specified `Bucket Upload Path`, it will be overwritten
    by the new file.

    - The action does not process or require any SecOps entities to run.


    ### Flow Description

    1. **Initialization**: The action retrieves AWS configuration parameters and the
    specific file paths provided by the user.

    2. **Path Parsing**: It parses the `Bucket Upload Path` using a regular expression
    to separate the bucket name from the object key.

    3. **Connectivity & Authentication**: It initializes the AWS S3 client and performs
    a connectivity test to ensure the credentials have the necessary permissions.

    4. **Local Validation**: The action checks if the source file exists on the local
    filesystem and is a valid file (not a directory).

    5. **Execution**: It performs the upload operation to the target AWS S3 bucket.

    6. **Result Reporting**: Upon success, it returns a JSON object containing the
    source and destination paths and updates the action status to completed.
