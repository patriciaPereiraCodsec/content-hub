List Buckets:
  ai_description: >-
    ### General Description

    Retrieves a list of all Amazon S3 buckets associated with the configured AWS account.
    This action provides visibility into the storage infrastructure by listing bucket
    names, creation dates, and account owner information. It is primarily used for
    resource discovery, auditing, and verifying AWS S3 connectivity.


    ### Parameters Description

    There are no action-specific parameters for this action. It utilizes the global
    integration configuration for authentication and region selection.


    ### Additional Notes

    This action does not require or process any Google SecOps entities. It operates
    at the account level to list global resources.


    ### Flow Description

    1. **Initialization**: The action extracts AWS credentials (Access Key, Secret
    Key) and the default region from the integration settings.

    2. **Connectivity Test**: It initializes the AWS S3 Manager and performs a connectivity
    check to validate the provided credentials.

    3. **Bucket Retrieval**: The action calls the AWS S3 service to fetch the list
    of all buckets accessible to the account.

    4. **Data Transformation**: The raw AWS response is parsed into structured data
    models, capturing the bucket names, creation timestamps, and the owner's display
    name and ID.

    5. **Result Reporting**: The structured list is returned as a JSON result and
    the action execution status is updated to completed.
