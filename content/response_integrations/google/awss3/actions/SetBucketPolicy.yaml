name: Set Bucket Policy
description: Set a policy in the bucket from AWS S3.
integration_identifier: AWSS3
parameters:
-   name: Bucket Name
    default_value: ''
    type: string
    description: Specify the name of the bucket on which you want to update the policy.
    is_mandatory: true
-   name: Policy JSON Object
    default_value: ''
    type: string
    description: 'Specify the JSON object of the policy that you want to set for the
        bucket. Examples can be found here: https://docs.aws.amazon.com/AmazonS3/latest/dev/example-bucket-policies.html.'
    is_mandatory: true
dynamic_results_metadata: []
creator: Admin
