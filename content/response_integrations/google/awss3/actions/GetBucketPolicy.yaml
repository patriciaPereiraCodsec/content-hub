name: Get Bucket Policy
description: Retrieve information about the bucket policy from AWS S3.
integration_identifier: AWSS3
parameters:
-   name: Bucket Name
    default_value: ''
    type: string
    description: Specify name of the bucket from which to retrieve policy information.
    is_mandatory: true
dynamic_results_metadata:
-   result_example_path: resources/get_bucket_policy_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: Admin
