Execute Query:
  ai_description: >-
    Executes a pre-defined query within Ivanti Endpoint Manager to retrieve device-related
    data. This action allows users to fetch specific datasets (such as device names,
    types, and operating systems) based on queries already configured in the Ivanti
    environment.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Query | String | Yes | The exact name of the query configured in Ivanti Endpoint
    Manager that you wish to execute. |

    | Max Results To Return | Integer | No | The maximum number of records to retrieve
    from the query results. Defaults to 50. Must be a positive integer. |


    ### Flow Description

    1. **Initialization**: The action initializes the Ivanti Endpoint Manager connection
    using the provided API root and NTLM credentials.

    2. **Validation**: It verifies that the 'Max Results To Return' parameter is a
    positive integer.

    3. **Execution**: It sends a request to the Ivanti MBSDK service to run the specified
    query by name.

    4. **Parsing**: The XML response from the server is converted to JSON and parsed
    into structured device objects containing fields like Device Name, Type, and OS
    Name.

    5. **Output**: The retrieved data is returned as a JSON result and displayed in
    the action output message.
