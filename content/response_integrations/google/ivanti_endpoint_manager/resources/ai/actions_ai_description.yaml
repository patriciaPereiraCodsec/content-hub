List Queries:
  ai_description: >-
    Lists available queries from Ivanti Endpoint Manager. This action allows users
    to discover and retrieve the names of pre-defined queries within the Ivanti environment,
    which can then be used in subsequent workflow steps such as 'Execute Query'. It
    provides filtering capabilities to narrow down the list of queries based on their
    names and allows for limiting the total number of results returned.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Filter Logic | String | No | Specifies the matching logic to apply to the 'Filter
    Value'. Options are 'Equal' (exact match) or 'Contains' (substring match). Default
    is 'Equal'. |

    | Filter Value | String | No | The string used to filter the query names. If left
    empty, no filtering is performed and all queries (up to the limit) are returned.
    |

    | Max Queries To Return | Integer | No | The maximum number of query names to
    include in the output. Default is 50. Must be greater than 0. |


    ### Additional Notes

    - This action does not require or process any specific entities (like IPs or Hostnames)
    from the Google SecOps case.

    - The results are returned as a JSON array of query names.


    ### Flow Description

    1. **Authentication**: Connects to the Ivanti Endpoint Manager API using the configured
    API Root, Username, and Password with NTLM authentication.

    2. **Data Retrieval**: Sends a GET request to the `ListQueries` endpoint to fetch
    all available queries.

    3. **Filtering**: Processes the retrieved XML data, converts it to a list of query
    objects, and applies the user-defined 'Filter Logic' and 'Filter Value' against
    the query names.

    4. **Limiting**: Truncates the filtered list to match the 'Max Queries To Return'
    parameter.

    5. **Output**: Returns the final list of query names as a JSON result and provides
    a success message to the action log.
