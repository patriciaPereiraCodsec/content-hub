Enrich Entities:
  ai_description: >-
    ### General Description

    Enriches IP Address, Hostname, and MAC Address entities using information retrieved
    from Ivanti Endpoint Manager. This action provides detailed endpoint context such
    as OS version, last login time, domain membership, and network configuration.
    It supports extending the data retrieval through custom column sets defined in
    Ivanti.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Custom Column Set | String | No | If specified, the action retrieves additional
    information about endpoints based on this custom column set configuration in Ivanti.
    |

    | Create Insight | Boolean | No | If enabled (default), the action creates a case
    insight summarizing the retrieved information for all successfully enriched entities.
    |


    ### Flow Description

    1. **Initialization**: Extracts connection parameters (API Root, credentials,
    SSL) and action parameters.

    2. **Entity Filtering**: Identifies supported entities (IP, Hostname, MAC Address)
    from the target list.

    3. **Validation**: If a 'Custom Column Set' is provided, the action validates
    its existence in Ivanti Endpoint Manager.

    4. **Data Retrieval**: Queries the Ivanti API for machines matching the identifiers
    of the target entities.

    5. **Extended Enrichment**: If a custom column set is used, the action performs
    additional API calls to fetch those specific details for each identified machine.

    6. **Internal Updates**: For each matched entity, the action updates its enrichment
    properties, adds a data table to the entity wall, and marks the entity as enriched.

    7. **Insight Generation**: If 'Create Insight' is true, a single 'General Info'
    insight is added to the case containing a summary of all found endpoints.


    ### Additional Notes

    - The action uses NTLM authentication to communicate with the Ivanti MBSDK service.

    - Entity matching is performed against the device name, IP address, and MAC address
    fields in Ivanti.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entity enrichment attributes, adds entity data tables, and creates case
      insights.
  categories:
