Scan Endpoints:
  ai_description: >-
    ### General Description

    The **Scan Endpoints** action triggers a vulnerability scan on specific endpoints
    managed by Ivanti Endpoint Manager. It supports IP Address, Hostname, and MAC
    Address entities. The action can either simply initiate the scan or wait for the
    scan to complete, providing status updates and results for each targeted machine.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Task Name** | String | No | The name assigned to the vulnerability scan task
    in Ivanti. If not provided, it defaults to "Siemplify Scan Endpoints". |

    | **Only Initiate** | Boolean | Yes | If set to `True`, the action will only start
    the scan and finish immediately. If `False`, the action will poll Ivanti until
    the scan reaches a 'Done' or 'Failed' state or the action times out. |


    ### Flow Description

    1. **Entity Resolution**: The action identifies supported entities (IP Address,
    Hostname, MAC Address) from the target list and queries Ivanti Endpoint Manager
    to retrieve their unique internal GUIDs.

    2. **Task Creation**: A new vulnerability scan task is created in Ivanti using
    the provided or default task name for the identified machine GUIDs.

    3. **Execution**: The task is started immediately on the remote endpoints.

    4. **Monitoring (Optional)**: If `Only Initiate` is disabled, the action enters
    an asynchronous loop, polling the task status from Ivanti until completion or
    timeout.

    5. **Reporting**: The final status (Success, Failure, or Not Found) for each entity
    is reported in the action output and detailed JSON results.


    ### Additional Notes

    - This is an asynchronous action. If monitoring completion (`Only Initiate` is
    False), ensure the script timeout in the Google SecOps IDE is sufficient for the
    expected scan duration.
