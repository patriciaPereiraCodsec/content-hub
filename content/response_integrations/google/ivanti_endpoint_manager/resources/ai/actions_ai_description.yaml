    filters_by_is_vulnerable: false
    filters_by_modification_time: false
List Column Set Fields:
  ai_description: >-
    ### General Description

    The **List Column Set Fields** action retrieves a list of available fields for
    a specific column set within Ivanti Endpoint Manager. This action is used to discover
    the data structure and available attributes of a column set, which is helpful
    for configuring subsequent queries or data extraction tasks.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Column Set** | String | Yes | The name of the column set for which you want
    to retrieve fields. |

    | **Filter Logic** | String | No | The logic to apply when filtering fields. Options
    are 'Equal' (exact match) or 'Contains' (substring match). Defaults to 'Equal'.
    |

    | **Filter Value** | String | No | The string value used to filter the field names.
    If left empty, no filtering is applied. |

    | **Max Fields To Return** | Integer | No | The maximum number of fields to return
    in the results. Defaults to 50. |


    ### Flow Description

    1. **Parameter Extraction**: The action extracts the connection configuration
    (API Root, credentials) and action parameters (Column Set, Filter Logic, Filter
    Value, and Limit).

    2. **Validation**: It validates that the 'Max Fields To Return' parameter is a
    positive integer.

    3. **API Interaction**: It establishes a connection to the Ivanti Endpoint Manager
    API using NTLM authentication and requests the columns for the specified column
    set.

    4. **Data Parsing**: The XML response from the API is parsed and converted into
    a list of field objects.

    5. **Filtering and Limiting**: The retrieved fields are filtered based on the
    'Filter Value' and 'Filter Logic' (if provided) and then truncated to the specified
    'Max Fields To Return'.

    6. **Result Delivery**: The final list of fields is returned as a JSON object,
    and a success message is generated for the case wall.


    ### Additional Notes

    - This action does not operate on entities and is used for metadata discovery.

    - If no fields match the criteria, the action completes successfully with a message
    indicating no results were found.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
