Execute Task:
  ai_description: >-
    ### General Description

    Executes a management or software distribution task on target endpoints within
    Ivanti Endpoint Manager. This action allows security teams to automate remediation
    steps, such as deploying patches or running scripts, directly from Google SecOps.
    It supports asynchronous execution, meaning it can either initiate the task and
    finish or poll the external system until the task reaches a terminal state (Done
    or Failed).


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Task Name | String | No | The name of the task to be created in Ivanti. Defaults
    to "Siemplify Execute Task" if not provided. |

    | Delivery Method | String | Yes | The name of the delivery method (e.g., Push,
    Pull) configured in Ivanti to be used for this execution. |

    | Package | String | Yes | The name of the software or distribution package to
    be executed on the target machines. |

    | Wake Up Machines | Boolean | Yes | If enabled, sends a Wake-on-LAN signal to
    the target machines before task execution. |

    | Common Task | Boolean | Yes | If enabled, marks the created task as a 'common'
    task in Ivanti. |

    | Only Initiate | Boolean | Yes | If enabled, the action will complete immediately
    after starting the task. If disabled, the action will run asynchronously and wait
    for the task to finish on all target entities. |


    ### Additional Notes

    - The action is designed to run asynchronously. If `Only Initiate` is set to `false`,
    ensure the action timeout in the IDE is sufficient to account for the time Ivanti
    takes to process the task on all endpoints.

    - Supported entities include Hostname, IP Address, and MAC Address. The action
    will attempt to resolve these entities to Ivanti device records before task creation.


    ### Flow Description

    1. **Entity Resolution**: The action identifies target machines in Ivanti Endpoint
    Manager by matching the identifiers of the provided entities (IP, Hostname, or
    MAC Address) against the Ivanti database.

    2. **Task Creation**: A new scheduled task is created using the specified `Task
    Name`, `Package`, and `Delivery Method`.

    3. **Targeting**: The resolved machines are added as targets to the newly created
    task.

    4. **Execution**: The task is started immediately.

    5. **Status Monitoring (Optional)**: If `Only Initiate` is `false`, the action
    enters an asynchronous loop, polling Ivanti for the status of each machine until
    they all reach a 'Done' or 'Failed' state, or until the SOAR timeout is reached.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Creates new scheduled tasks, adds devices to those tasks, and initiates task
      execution within the Ivanti Endpoint Manager environment.
    fetches_data: true
    internal_data_mutation_explanation: null
  categories:
