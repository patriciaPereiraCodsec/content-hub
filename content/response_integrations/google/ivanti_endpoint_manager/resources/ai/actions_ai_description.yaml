List Packages:
  ai_description: >-
    ### General Description

    Lists available distribution packages from Ivanti Endpoint Manager. This action
    is used to discover and retrieve details about software packages configured in
    the environment, which can then be used as input for deployment or scanning tasks.


    ### Parameters Description

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Filter Logic | String (Enum) | No | Specifies the matching logic for the filter.
    Options are 'Equal' (exact match) or 'Contains' (substring match). Default is
    'Equal'. |

    | Filter Value | String | No | The string value to search for within the package
    names. If left empty, no filtering is applied. |

    | Max Packages To Return | Integer | No | The maximum number of package records
    to return in the results. Default is 50. Must be greater than 0. |


    ### Additional Notes

    - This action uses NTLM authentication to communicate with the Ivanti MBSDK Service.

    - If no packages match the provided filter criteria, the action will complete
    successfully but report that no packages were found.


    ### Flow Description

    1. **Initialization**: The action initializes the Ivanti Endpoint Manager manager
    using the provided API Root and credentials.

    2. **Parameter Validation**: Validates that the 'Max Packages To Return' is a
    positive integer.

    3. **Data Retrieval**: Sends a GET request to the `/MBSDKService/MsgSDK.asmx/ListDistributionPackages`
    endpoint to fetch all distribution packages.

    4. **Filtering**: Processes the retrieved XML data, converts it to JSON, and applies
    the user-defined filter (Logic and Value) against the package names.

    5. **Output Generation**: Formats the filtered list into a JSON result and a data
    table named 'Available Packages' for the Google SecOps interface.
