    3. **Connectivity Test**: Executes a GET request to the `/MBSDKService/MsgSDK.asmx/WhoAmI`
    endpoint using NTLM authentication.

    4. **Response Validation**: Checks if the server returns a successful HTTP response.

    5. **Result Reporting**: Returns a success message if the connection is established,
    or an error message if the authentication or connection fails.
