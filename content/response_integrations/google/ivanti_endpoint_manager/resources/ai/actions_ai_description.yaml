List Delivery Methods:
  ai_description: >-
    ### General Description

    The **List Delivery Methods** action retrieves a list of available delivery methods
    from Ivanti Endpoint Manager. This action is primarily used to discover valid
    delivery configurations (such as Push, Pull, or Multicast) that can be used in
    subsequent software distribution or patching tasks.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Type** | String | No | Specifies the delivery type to return. Options include:
    Push, Pull, Push and Pull, Multicast, or All. Default is 'All'. |

    | **Filter Logic** | String | No | Defines the matching logic for the 'Filter
    Value'. Options are 'Equal' (exact match) or 'Contains' (substring match). Default
    is 'Equal'. |

    | **Filter Value** | String | No | The string used to filter delivery method names.
    If left empty, no name-based filtering is applied. |

    | **Max Delivery Methods To Return** | Integer | No | Limits the number of delivery
    methods returned in the results. Default is 50. |


    ### Additional Notes

    - This action does not operate on specific entities and can be run as a standalone
    task to gather environment configuration data.

    - The 'Max Delivery Methods To Return' parameter must be an integer greater than
    0.


    ### Flow Description

    1. **Initialization**: The action initializes the Ivanti Endpoint Manager manager
    using the provided API credentials and connection settings.

    2. **API Request**: It sends a GET request to the `ListDeliveryMethod` endpoint,
    filtered by the specified delivery `Type`.

    3. **Data Parsing**: The XML response from the Ivanti server is converted to JSON
    and parsed into internal delivery method objects.

    4. **Filtering**: The action applies the user-defined `Filter Logic` and `Filter
    Value` to the retrieved list of delivery methods.

    5. **Result Generation**: The filtered list is truncated to the `Max Delivery
    Methods To Return` limit. The final data is then added to the action results as
    a JSON object and displayed in a data table named 'Available Delivery Methods'.
