Ping:
  ai_description: >-
    ### General Description

    Tests the connectivity between Google SecOps and the Ivanti Endpoint Manager server.
    This action verifies that the provided credentials and API root URL are correct
    and that the network path is open by making a test call to the Ivanti MBSDK service.


    ### Parameters Description

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | API Root | String | Yes | The base URL of the Ivanti Endpoint Manager server
    (e.g., `https://<server_address>`). |

    | Username | String | Yes | The username used for NTLM authentication. |

    | Password | String | Yes | The password used for NTLM authentication. |

    | Verify SSL | Boolean | Yes | If enabled, the action will verify the SSL certificate
    of the Ivanti server. |


    ### Additional Notes

    This action uses integration-level configuration parameters. It does not require
    any action-specific input parameters or entities to run. Per standard SOAR practices,
    Ping actions are used for health checks and are not categorized as enrichment.


    ### Flow Description

    1. **Parameter Initialization**: Retrieves the API Root, Username, Password, and
