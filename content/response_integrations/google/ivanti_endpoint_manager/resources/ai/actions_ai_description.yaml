List Endpoint Vulnerabilities:
  ai_description: >-
    ### General Description

    This action retrieves a list of vulnerabilities for specific endpoints managed
    within Ivanti Endpoint Manager. It supports identifying endpoints using IP Addresses,
    Hostnames, or MAC Addresses. The action is primarily used for security posture
    assessment and vulnerability management by providing detailed information about
    missing patches or security flaws on target machines.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Severity Filter | String | No | A comma-separated list of severities to filter
    the results. Possible values include: `ServicePack`, `Critical`, `High`, `Medium`,
    `Low`, `N/A`, `Unknown`. If left empty, all vulnerabilities are returned. |

    | Max Vulnerabilities To Return | Integer | No | Specifies the maximum number
    of vulnerability records to retrieve per entity. Defaults to 50. Must be a value
    greater than 0. |


    ### Additional Notes

    - The action first attempts to resolve the provided SecOps entities to internal
    Ivanti GUIDs by querying the Ivanti 'ListMachines' endpoint.

    - If an entity cannot be mapped to a machine in Ivanti, it will be reported as
    'not found'.

    - The action returns raw JSON data containing vulnerability details such as Name,
    ID, Severity, and Publish Date.


    ### Flow Description

    1. **Initialization**: Extracts integration configuration (API credentials) and
    action parameters (Severity Filter and Limit).

    2. **Validation**: Validates that the 'Max Vulnerabilities To Return' is positive
    and that the provided 'Severity Filter' values match the supported Ivanti severity
    codes.

    3. **Machine Resolution**: Queries the Ivanti API to find machines matching the
    identifiers (IP, Hostname, or MAC) of the target entities to obtain their unique
    GUIDs.

    4. **Vulnerability Retrieval**: For each successfully resolved machine GUID, the
    action calls the Ivanti API to fetch the list of vulnerabilities.

    5. **Filtering**: Applies the severity filter and result limit to the retrieved
    vulnerability list.

    6. **Output**: Aggregates the results into a JSON object and provides a summary
    message indicating which entities had vulnerabilities found, which had none, and
    which were not found in the system.
