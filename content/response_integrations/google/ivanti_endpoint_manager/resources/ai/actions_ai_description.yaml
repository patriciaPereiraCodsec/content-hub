List Column Sets:
  ai_description: >-
    ### General Description

    Lists available column sets in Ivanti Endpoint Manager. This utility action allows
    users to retrieve and filter the names of column sets defined in the system, which
    is often a prerequisite for configuring other actions that require a column set
    identifier to fetch specific machine data.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Filter Logic | String | No | Specifies the logic for filtering column set names.
    Options are 'Equal' (exact match) or 'Contains' (substring match). Default is
    'Equal'. |

    | Filter Value | String | No | The string value to search for within the column
    set names. If left empty, no filtering is applied and all sets are returned up
    to the limit. |

    | Max Column Sets To Return | Integer | No | The maximum number of column sets
    to include in the output. Default is 50. Must be greater than 0. |


    ### Flow Description

    1. **Authentication**: The action initializes a connection to the Ivanti Endpoint
    Manager API using NTLM authentication.

    2. **Data Retrieval**: It executes a GET request to the `ListColumnSets` endpoint
    to retrieve the full list of available column sets from the server.

    3. **Filtering**: The action processes the retrieved list, applying the user-defined
    `Filter Logic` and `Filter Value` against the 'Name' attribute of each column
    set.

    4. **Pagination/Limiting**: The filtered list is truncated to respect the `Max
    Column Sets To Return` parameter.

    5. **Result Delivery**: The final list of column sets is returned as a JSON object
    and a success message is displayed in the SOAR interface.


    ### Additional Notes

    - This action is a metadata/utility action and does not require or process any
    specific entities (IPs, Hostnames, etc.).

    - If no results match the filter criteria, the action will return an empty list
    with a 'No column sets were found' message.
