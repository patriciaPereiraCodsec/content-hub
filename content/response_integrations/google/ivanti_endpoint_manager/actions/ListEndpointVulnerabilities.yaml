name: List Endpoint Vulnerabilities
description: 'List vulnerabilities on the endpoints in Ivanti Endpoint Manager. Supported
    entities: IP Address, Mac Address, Hostname.'
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/ivanti-endpoint-manager#list_endpoint_vulnerabilities
integration_identifier: IvantiEndpointManager
parameters:
-   name: Severity Filter
    default_value: ''
    type: string
    description: 'Specify a comma-separated list of severities that will be used,
        when returning information about vulnerabilities. If nothing is provided,
        action will return all vulnerabilities. Possible values: ServicePack, Critical,
        High, Medium, Low, N/A, Unknown.'
    is_mandatory: false
-   name: Max Vulnerabilities To Return
    default_value: 50
    type: string
    description: 'Specify how many vulnerabilities to return per entity. Default:
        50.'
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/list_endpoint_vulnerabilities_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
simulation_data_json: '{"Entities": ["ADDRESS","HOSTNAME","MacAddress"]}'
