name: Execute Task
description: 'Execute task in Ivanti Endpoint Manager. Supported entities: Hostname,
    IP address, MAC Address. Note: Action is running as async, please adjust script
    timeout value in Siemplify IDE for action as needed.'
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/ivanti-endpoint-manager#execute_task
integration_identifier: IvantiEndpointManager
parameters:
-   name: Task Name
    default_value: ''
    type: string
    description: Specify the name of the task. If nothing is provided the action will
        use the "Siemplify Execute Task" name.
    is_mandatory: false
-   name: Delivery Method
    default_value: ''
    type: string
    description: Specify the name of the delivery method that will be used during
        task execution.
    is_mandatory: true
-   name: Package
    default_value: ''
    type: string
    description: Specify the name of the package that will be used during task execution.
    is_mandatory: true
-   name: Wake Up Machines
    default_value: false
    type: boolean
    description: If enabled, action will wake up the machine during task execution.
    is_mandatory: true
-   name: Common Task
    default_value: false
    type: boolean
    description: If enabled, action will mark this task as common.
    is_mandatory: true
-   name: Only Initiate
    default_value: true
    type: boolean
    description: If enabled, action will only initiate the task execution without
        waiting for results.
    is_mandatory: true
dynamic_results_metadata:
-   result_example_path: resources/execute_task_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
is_async: true
