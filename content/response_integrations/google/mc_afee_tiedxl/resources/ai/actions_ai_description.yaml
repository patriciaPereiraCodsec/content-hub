Set File Reputation:
  ai_description: >-
    ### General Description: Sets the enterprise reputation (trust level) for file
    hash entities in McAfee Threat Intelligence Exchange (TIE) via the Data Exchange
    Layer (DXL). This action allows security analysts to manually override the reputation
    of a file across the enterprise environment to either block or trust specific
    hashes. ### Parameters Description: | Parameter | Type | Mandatory | Description
    | | :--- | :--- | :--- | :--- | | Trust Level | String | Yes | The reputation
    level to assign to the file. Supported values: NOT_SET, KNOWN_MALICIOUS, MOST_LIKELY_MALICIOUS,
    MIGHT_BE_MALICIOUS, UNKNOWN, MIGHT_BE_TRUSTED, MOST_LIKELY_TRUSTED, KNOWN_TRUSTED,
    KNOWN_TRUSTED_INSTALLER. | | File Name | String | No | An optional filename to
    associate with the hash in the TIE database. | | Comment | String | No | An optional
    comment to provide context for the reputation change. | ### Flow Description:
    1. **Initialization**: Connects to the McAfee DXL fabric and initializes the TIE
    client using the provided server address and certificates. 2. **Parameter Extraction**:
    Retrieves the target trust level, optional filename, and optional comment from
    the action parameters. 3. **Entity Processing**: Iterates through all FILEHASH
    entities provided in the current context. 4. **External Update**: For each hash
    (MD5, SHA1, or SHA256), it sends a request to McAfee TIE to update the 'Enterprise'
    reputation to the specified trust level. 5. **Internal Update**: Updates the entity
    objects within Google SecOps to reflect the action. 6. **Completion**: Returns
    a summary message indicating which file hashes were successfully updated. ###
    Additional Notes: This action supports MD5 (32 characters), SHA1 (40 characters),
    and SHA256 (64 characters) hash formats.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: >-
      Updates the enterprise reputation (trust level) of a file hash in the McAfee
      Threat Intelligence Exchange (TIE) database.
    fetches_data: false
    internal_data_mutation_explanation: >-
      Updates the entity objects in the case to reflect that the reputation has been
      set.
  categories:
    enrichment: false
  entity_usage:
