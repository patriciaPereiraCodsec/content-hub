Get File References:
  ai_description: >-
    ### General Description

    This action retrieves file references from McAfee Threat Intelligence Exchange
    (TIE) via the Data Exchange Layer (DXL) for File Hash entities. It identifies
    which endpoints (agents) have encountered a specific file and provides the timestamp
    of the first contact. This is useful for identifying the scope of a file's presence
    across an enterprise environment.


    ### Parameters

    There are no action-specific parameters for this action. It utilizes the global
    integration configuration for connectivity.


    ### Flow Description

    1. **Connection**: Establishes a connection to the McAfee DXL fabric using the
    configured server address and client certificates.

    2. **Entity Filtering**: Iterates through the target entities and filters for
    those of type `FILEHASH` (supporting MD5, SHA1, and SHA256).

    3. **Reference Lookup**: For each valid hash, it queries the McAfee TIE service
    to retrieve 'first reference' data, which includes Agent GUIDs and timestamps.

    4. **Data Formatting**: Converts the retrieved reference data into a human-readable
    CSV format.

    5. **Enrichment**: Attaches the CSV data as an entity table (e.g., 'References
    - [Hash]') to the corresponding entity in the SOAR.

    6. **Completion**: Updates the entities in the case and provides a summary message
    of the entities for which references were found.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entities and attaches data tables containing file reference information
      (Agent GUIDs and timestamps) to the entities within the SOAR case.
  categories:
    enrichment: true
  entity_usage:
    entity_types:
    - FILEHASH
