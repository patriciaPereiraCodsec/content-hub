TCP Port Status:
  ai_description: >-
    ### General Description

    Checks the status of a specific TCP port on target entities using the MXToolBox
    service. This action determines if a connection can be established to a specified
    port for Hostname, Address, User, and URL entities. It enriches the entities with
    the connectivity result and provides a summary table for the case.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Port Number | String/Integer | Yes | The TCP port number to check for connectivity
    (e.g., 80, 443). |


    ### Flow Description

    1. **Parameter Extraction**: Retrieves the target port number from the action
    parameters.

    2. **Entity Filtering**: Identifies supported entities within the current context,
    specifically Hostnames, IP Addresses, Users, and URLs.

    3. **External Lookup**: For each valid entity, it calls the MXToolBox API to perform
    a TCP port check. It resolves domains from User and URL entities where necessary.

    4. **Internal Enrichment**: Updates the 'additional_properties' of each entity
    with a new field (e.g., `MX_port_80`) containing the boolean status of the port.

    5. **Reporting**: Generates a data table named 'TCP Port Status Results' summarizing
    the Domain/IP, Port, and Status for all processed entities.

    6. **Finalization**: Updates the entities in Google SecOps and returns a comma-separated
    string of the port statuses.


    ### Additional Notes

    - This action is read-only regarding external systems; it only performs connectivity
    checks and does not modify firewall rules or service states.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
