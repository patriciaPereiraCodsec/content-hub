MX Record Lookup:
  ai_description: "### General Description\nThe **MX Record Lookup** action retrieves\
    \ Mail Exchange (MX) records for domain-related entities using the MXToolBox service.\
    \ Its primary purpose is to identify the mail servers responsible for accepting\
    \ email messages on behalf of a domain. This information is crucial for verifying\
    \ mail flow configurations, identifying potential mail redirection, and enriching\
    \ domain intelligence during security investigations.\n\n### Parameters Description\n\
    There are no action-specific parameters for this action. It relies on the global\
    \ integration configuration (API Root, API Key, and SSL Verification).\n\n###\
    \ Additional Notes\n- The action automatically extracts the base domain from Hostname,\
    \ URL, and User entities before performing the lookup.\n- It updates the entity's\
    \ `additional_properties` with a pipe-separated list of discovered MX hostnames.\n\
    - It marks the entity as enriched within the Google SecOps environment.\n\n###\
    \ Flow Description\n1. **Entity Filtering:** The action identifies supported entities\
    \ (Hostname, URL, and User) from the current context.\n2. **Domain Extraction:**\
    \ For each valid entity, it extracts the domain name using internal utility functions.\n\
    3. **External Lookup:** It queries the MXToolBox API to fetch MX record details,\
    \ including hostnames, preferences (priority), IP addresses, and TTL values.\n\
    4. **Data Enrichment:** \n    - Discovered MX hostnames are added to the entity's\
    \ metadata (`MX_Hostnames`).\n    - The entity is flagged as enriched (`is_enriched\
    \ = True`).\n5. **Result Visualization:** \n    - A detailed CSV-formatted table\
    \ containing all MX record fields is attached to each processed entity.\n    -\
    \ A global JSON result containing the raw API response is added to the action\
    \ output.\n6. **Finalization:** The action updates the entities in the case and\
    \ provides a summary message of resolved domains."
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entity additional properties with discovered MX hostnames, sets the
      'is_enriched' flag to true, and attaches data tables to entities.
  categories:
    enrichment: true
  entity_usage:
