Ping:
  ai_description: >-
    ### General Description The Ping action is designed to verify the connectivity
    between Google SecOps and the MXToolBox API. It ensures that the provided configuration,
    including the API Root and API Key, is valid and that the network environment
    allows for successful communication with the external service. ### Parameters
    Description There are no parameters for this action. ### Additional Notes This
    action is primarily used for health checks and troubleshooting connectivity issues
    during the initial setup or maintenance of the MXToolBox integration. It does
    not process any entities or modify any data. ### Flow Description 1. **Initialize
    Manager**: The action starts by initializing the MXToolBox manager using the API
    Root, API Key, and SSL verification settings retrieved from the integration configuration.
    2. **Connectivity Test**: It executes a test API call by performing a standard
    MX lookup for a placeholder domain ('example.com') to verify the API's responsiveness.
    3. **Validate Response**: The action checks the HTTP response status to ensure
    the request was successful. 4. **Finalize**: It concludes by returning a success
    message ('Connection Established') if the test passes, or a failure message ('Connection
    Failed') if the test fails.
