Reverse DNS Lookup:
  ai_description: "### General Description\nPerforms a reverse DNS (PTR) lookup for\
    \ IP Address entities using the MXToolBox API. This action identifies the domain\
    \ names associated with a given IP address, providing essential context for network\
    \ investigations and attribution.\n\n### Parameters\nThere are no action-specific\
    \ parameters for this action. It utilizes the global integration configuration\
    \ for connectivity and authentication.\n\n### Flow Description\n1. **Filter Entities**:\
    \ The action identifies and processes only entities of type ADDRESS (IP Addresses).\n\
    2. **External Lookup**: For each identified IP, it calls the MXToolBox API's PTR\
    \ lookup endpoint to retrieve associated domain records.\n3. **Data Extraction**:\
    \ It extracts the 'Domain Name' from the API response for each record found.\n\
    4. **Internal Enrichment**: \n    * Updates the entity's 'additional_properties'\
    \ with a semicolon-separated list of resolved domains under the key 'MX_Reverse\
    \ Lookup Domains'.\n    * Sets the entity's 'is_enriched' status to true.\n  \
    \  * Attaches a data table to the entity containing the detailed lookup results\
    \ (IP, Type, Domain Name, TTL).\n5. **Finalization**: Updates the entities within\
    \ Google SecOps and returns a summary of resolved IPs and domain names.\n\n###\
    \ Additional Notes\nIf the API returns no data for a specific entity, the action\
    \ logs the result and continues processing other entities. Errors encountered\
    \ during individual lookups are captured and displayed in the final output message\
    \ without halting the entire action."
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entity additional properties with resolved domain names, sets the enriched
      flag to true, and adds data tables to the entities in the SOAR case.
