Ping External IP:
  ai_description: >-
    ### General Description

    The **Ping External IP** action performs ICMP ping lookups against external IP
    addresses, hostnames, URLs, or user-associated domains using the MXToolBox service.
    This action is used for network diagnostics to verify the reachability of external
    assets from the MXToolBox infrastructure's perspective. ### Parameters Description

    There are no parameters for this action. ### Additional Notes

    - The action automatically extracts domains from URL and User entities before
    performing the lookup.

    - Results include the total number of packets sent and the number of successful
    replies received. ### Flow Description

    1. **Configuration Retrieval:** Fetches MXToolBox API credentials and SSL settings
    from the integration configuration.

    2. **Entity Filtering:** Identifies relevant entities from the case, specifically
    targeting IP Addresses, Hostnames, URLs, and User entities.

    3. **External Lookup:** For each valid entity, sends a GET request to the MXToolBox
    'ping' endpoint.

    4. **Data Processing:** Parses the ICMP response data to count successful 'Reply'
    messages.

    5. **Reporting:** Generates a data table summarizing ping statistics and attaches
    the raw JSON response to the action results.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Adds a data table named 'Ping Results' to the case wall summarizing packet statistics
      for each entity.
