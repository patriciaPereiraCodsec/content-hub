A Record Lookup:
  ai_description: >-
    ### General Description

    The **A Record Lookup** action performs a DNS A record query for specific domain
    names using the MXToolBox service. Its primary purpose is to resolve Hostname,
    URL, or User entities into their corresponding IPv4 addresses, providing essential
    network context for security investigations.


    ### Parameters Description

    This action does not have any specific action-level parameters. It relies on the
    global integration configuration for the MXToolBox API Root and API Key.


    ### Additional Notes

    - The action automatically extracts the domain component from URL and User entities
    before performing the lookup.

    - It updates the entity's additional properties with the key `MX_IP Addresses`.


    ### Flow Description

    1. **Entity Filtering:** The action identifies supported entities (Hostname, URL,
    and User) from the current context.

    2. **Domain Extraction:** For each entity, it extracts the relevant domain name.

    3. **External Lookup:** It queries the MXToolBox API's A record endpoint for the
    extracted domain.

    4. **Data Enrichment:** If records are found, it updates the entity's `additional_properties`
    with the resolved IP addresses and marks the entity as enriched.

    5. **Reporting:** It generates a data table summarizing the resolutions and attaches
    the raw JSON response to the action results.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entity additional properties with resolved IP addresses and sets the
      'is_enriched' flag to true.
  categories:
    enrichment: true
  entity_usage:
    entity_types:
