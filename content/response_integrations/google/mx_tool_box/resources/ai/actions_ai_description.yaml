SPF Lookup:
  ai_description: >-
    ### General Description

    Performs a Sender Policy Framework (SPF) lookup for domain-related entities using
    the MXToolBox service. This action identifies the authorized IP addresses and
    subnets allowed to send emails on behalf of a domain and validates a specific
    sender IP against these records to detect potential spoofing.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | IP Address | String | Yes | The specific IP address to verify against the domain's
    SPF record to determine if it is an authorized sender. |


    ### Flow Description

    1. **Domain Extraction**: Extracts the domain name from the target entities (Hostnames,
    URLs, or Users).

    2. **SPF Record Retrieval**: Queries MXToolBox to fetch SPF records, recursively
    resolving 'include' mechanisms to compile a complete list of authorized IP ranges
    for the domain.

    3. **Authorization Check**: Validates the provided 'IP Address' parameter against
    the compiled list of authorized network ranges.

    4. **Entity Enrichment**: Updates the entity's additional properties with the
    check result (e.g., 'IP is authorized, in range...' or 'IP is not authorized sender').

    5. **Risk Assessment**: Marks the entity as suspicious if the provided IP address
    is not found within the authorized SPF ranges.

    6. **Data Visualization**: Attaches a data table containing the authorized ranges
    to the entity and adds a summary table to the case wall.


    ### Additional Notes

    This action is primarily used in email security and phishing playbooks to verify
    the legitimacy of a sender's infrastructure.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entity additional properties with SPF authorization status and marks
      entities as suspicious if the validation fails.
  categories:
    enrichment: true
  entity_usage:
    entity_types:
