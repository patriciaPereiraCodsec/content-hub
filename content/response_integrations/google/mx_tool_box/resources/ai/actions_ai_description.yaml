Blacklist Check:
  ai_description: "### General Description\nThe **Blacklist Check** action queries\
    \ the MXToolBox API to determine if specific Hostname or Address entities are\
    \ listed on various global blacklists. It provides detailed information about\
    \ which engines flagged the entity and why, helping security analysts identify\
    \ potentially malicious infrastructure.\n\n### Parameters Description\n| Parameter\
    \ | Type | Mandatory | Description |\n| :--- | :--- | :--- | :--- |\n| **Blacklist\
    \ Threshold** | Integer | Yes | The threshold used to determine if an entity should\
    \ be marked as suspicious. If the number of blacklists an entity appears on is\
    \ less than or equal to this value, the entity is marked as suspicious in Google\
    \ SecOps. |\n\n### Flow Description\n1. **Entity Filtering**: The action identifies\
    \ all `HOSTNAME` and `ADDRESS` entities within the current context.\n2. **External\
    \ Lookup**: For each entity, it performs a blacklist lookup via the MXToolBox\
    \ API using the entity's identifier.\n3. **Data Processing**: \n    * It parses\
    \ the API response to identify \"Failed\" checks (engines that have blacklisted\
    \ the entity).\n    * It generates a data table for each entity containing the\
    \ engine name and the specific reason for the blacklisting.\n4. **Threshold Evaluation**:\
    \ It compares the count of blacklists found against the user-provided **Blacklist\
    \ Threshold**. If the count is within the threshold (less than or equal to), the\
    \ entity's `is_suspicious` attribute is set to `True`.\n5. **Enrichment**: \n\
    \    * Updates the entities in Google SecOps with the new suspicious status.\n\
    \    * Adds an entity insight summarizing the number of blacklists found.\n  \
    \  * Attaches the raw JSON results to the action output for further analysis."
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates the 'is_suspicious' attribute of entities and adds insights and data
      tables to the case context.
  categories:
    enrichment: true
  entity_usage:
    entity_types:
    - HOSTNAME
    - ADDRESS
