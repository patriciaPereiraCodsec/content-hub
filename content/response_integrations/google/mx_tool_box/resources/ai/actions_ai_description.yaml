HTTPS Information Lookup:
  ai_description: >-
    ### General Description

    The **HTTPS Information Lookup** action queries the MXToolBox API to verify if
    a website URL responds securely via SSL encryption. It retrieves details about
    the SSL certificate, specifically identifying the certificate authorities associated
    with the domain.


    ### Parameters Description

    This action does not have any input parameters. It relies on the integration's
    global configuration (API Root, API Key, and Verify SSL).


    ### Additional Notes

    The action uses the `get_domain_from_entity` utility to ensure the API receives
    a domain string rather than a full URL. If an error occurs for a specific entity,
    the action logs the error and continues processing the remaining entities.


    ### Flow Description

    1. **Entity Filtering**: The action identifies all `URL` entities within the current
    context.

    2. **Domain Extraction**: For each URL, it extracts the base domain name.

    3. **API Query**: It sends a request to the MXToolBox HTTPS lookup endpoint for
    each domain.

    4. **Data Processing**: It parses the response to extract the names of the certificate
    authorities.

    5. **Reporting**: It creates a data table named 'HTTPS Information Lookup Result'
    and attaches the raw JSON response to the action results.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      The action adds a data table to the case wall containing HTTPS lookup results
      and certificate authority information. It also attaches the raw JSON response
      to the action results.
  categories:
