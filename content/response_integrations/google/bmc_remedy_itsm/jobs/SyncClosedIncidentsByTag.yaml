name: Sync Closed Incidents By Tag
parameters:
-   name: Incident Table
    default_value: HPD:IncidentInterface
    type: string
    description: ''
    is_mandatory: true
-   name: API Root
    default_value: https://{IP}:{port}
    type: string
    description: ''
    is_mandatory: true
-   name: Username
    default_value: ''
    type: string
    description: ''
    is_mandatory: true
-   name: Password
    default_value: ''
    type: password
    description: ''
    is_mandatory: true
-   name: Environment
    default_value: ''
    type: string
    description: ''
    is_mandatory: false
-   name: Max Hours Backwards
    default_value: '24'
    type: string
    description: ''
    is_mandatory: false
-   name: Verify SSL
    default_value: true
    type: boolean
    description: ''
    is_mandatory: true
description: 'This job will synchronize BMC Remedy ITSM incidents that were created
    within Siemplify Case playbook and Siemplify cases. Note: in BMC Remedy ITSM statuses
    "Cancelled", "Closed" and "Resolved" are treated as closed. Additionally, in order
    for the job to work, it''s required for the case to have 2 tags. First tag should
    be "BMC Remedy ITSM" and the second should be with the prefix "BMC Remedy ITSM:{Incident
    ID}". Job can only close incidents that are assigned in BMC Remedy ITSM.'
documentation_link: null
integration: BMCRemedyITSM
creator: Admin
