name: Update Incident
description: Update an incident in BMC Remedy ITSM.
integration_identifier: BMCRemedyITSM
parameters:
-   name: Incident ID
    default_value: ''
    type: string
    description: Specify the id of the  incident that needs to be updated.
    is_mandatory: true
-   name: Status
    default_value: Select One
    type: ddl
    optional_values:
    - Select One
    - New
    - Assigned
    - In Progress
    - Pending
    - Resolved
    - Closed
    - Cancelled
    description: 'Specify the status for the incident. Note: if status is "Pending"
        or "Resolved", then you also need to provide "Status Reason" value.'
    is_mandatory: false
-   name: Status Reason
    default_value: ''
    type: string
    description: Specify the status reason for the incident.
    is_mandatory: false
-   name: Impact
    default_value: Select One
    type: ddl
    optional_values:
    - Select One
    - Extensive/Widespread
    - Significant/Large
    - Moderate/Limited
    - Minor/Localized
    description: Specify the impact for the incident.
    is_mandatory: false
-   name: Urgency
    default_value: Select One
    type: ddl
    optional_values:
    - Select One
    - Critical
    - High
    - Medium
    - Low
    description: Specify the urgency for the incident.
    is_mandatory: false
-   name: Description
    default_value: ''
    type: string
    description: Specify the description of the incident
    is_mandatory: false
-   name: Incident Type
    default_value: Select One
    type: ddl
    optional_values:
    - Select One
    - User Service Restoration
    - User Service Request
    - Infrastructure Restoration
    - Infrastructure Event
    description: Specify the incident type for the incident.
    is_mandatory: false
-   name: Assigned Group
    default_value: ''
    type: string
    description: Specify the assigned group for the incident
    is_mandatory: false
-   name: Assignee
    default_value: ''
    type: string
    description: Specify the assignee for the incident
    is_mandatory: false
-   name: Resolution
    default_value: ''
    type: string
    description: Specify the resolution for the incident.
    is_mandatory: false
-   name: Resolution Category Tier 1
    default_value: ''
    type: string
    description: Specify the resolution category tier 1 for the incident.
    is_mandatory: false
-   name: Resolution Category Tier 2
    default_value: ''
    type: string
    description: Specify the resolution category tier 2 for the incident.
    is_mandatory: false
-   name: Resolution Category Tier 3
    default_value: ''
    type: string
    description: Specify the resolution category tier 3 for the incident.
    is_mandatory: false
-   name: Resolution Product Category Tier 1
    default_value: ''
    type: string
    description: Specify the resolution category tier 1 for the incident.
    is_mandatory: false
-   name: Resolution Product Category Tier 2
    default_value: ''
    type: string
    description: Specify the resolution category tier 2 for the incident.
    is_mandatory: false
-   name: Resolution Product Category Tier 3
    default_value: ''
    type: string
    description: Specify the resolution category tier 3 for the incident.
    is_mandatory: false
-   name: Reported Source
    default_value: Select One
    type: ddl
    optional_values:
    - Select One
    - Direct Input
    - Email
    - External Escalation
    - Fax
    - Systems Management
    - Phone
    - Voice Mail
    - Walk In
    - Web
    - Other
    - BMC Impact Manager Event
    description: Specify the reported source.
    is_mandatory: false
-   name: Custom Fields
    default_value: ''
    type: string
    description: 'Specify a JSON object containing all of the needed fields and  values
        that need to be updated. Note: this parameter will overwrite other provided
        parameters.'
    is_mandatory: false
dynamic_results_metadata: []
creator: admin
