name: Get Incident Details
description: Get detailed information about the incidents from BMC Remedy ITSM.
integration_identifier: BMCRemedyITSM
parameters:
-   name: Incident IDs
    default_value: ''
    type: string
    description: Specify the ids of incidents for which you want to return details.
    is_mandatory: true
-   name: Fields To Return
    default_value: ''
    type: string
    description: Specify what fields to return. If invalid fields are provided, action
        will fail. If nothing is provided, action will return all fields.
    is_mandatory: false
-   name: Fetch Work Notes
    default_value: true
    type: boolean
    description: If enabled, action will return work notes related to the incident.
    is_mandatory: false
-   name: Max Work Notes To Return
    default_value: 50
    type: string
    description: Specify how many Work Notes to return. If nothing is provided, action
        will return 50 Work Notes.
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/get_incident_details_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
