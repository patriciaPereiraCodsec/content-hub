Update Record:
  ai_description: >-
    ### General Description

    Updates an existing record in BMC Remedy ITSM. This action allows users to modify
    specific fields of a record identified by its type and ID using a JSON-formatted
    payload. It is a generic update action that can be applied to various record types
    within the BMC Remedy system.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Record Type | String | Yes | Specify the type of the record that needs to be
    updated (e.g., 'HPD:Help Desk'). |

    | Record ID | String | Yes | Specify the unique identifier (Entry ID) of the record
    that needs to be updated. |

    | Record Payload | String (JSON) | Yes | A JSON object containing the field names
    and the new values to be updated. Example: `{"Status": "Assigned"}`. |


    ### Flow Description

    1. **Parameter Extraction:** The action retrieves the API configuration (API Root,
    Username, Password) and the specific action parameters (Record Type, Record ID,
    and Record Payload).

    2. **Payload Validation:** The `Record Payload` string is parsed into a JSON object.
    If the string is not valid JSON, the action fails with an error message.

    3. **Authentication:** The action establishes a session with BMC Remedy ITSM and
    retrieves a JWT authentication token.

    4. **Update Execution:** The action sends a PUT request to the BMC Remedy API
    endpoint corresponding to the specified record type and ID, passing the validated
    payload.

    5. **Session Termination:** The action logs out of the BMC Remedy session to ensure
    security and resource management.


    ### Additional Notes

    - This action does not process Google SecOps entities; it relies entirely on the
    provided parameters.

    - Ensure the `Record Payload` follows the exact field naming conventions required
    by the BMC Remedy API for the specified record type.
