Update Incident:
  ai_description: >-
    ### General Description

    Updates an existing incident in BMC Remedy ITSM. This action allows for modifying
    various incident attributes such as status, impact, urgency, assignment details,
    and resolution information. It requires a valid Incident ID and can accept a JSON
    object for custom field updates.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Incident ID | String | Yes | The unique identifier of the incident to be updated
    (e.g., INC0000000001). |

    | Status | Dropdown | No | The new status for the incident. Options include: New,
    Assigned, In Progress, Pending, Resolved, Closed, Cancelled. |

    | Status Reason | String | No | The reason for the status change. This is typically
    required if the status is set to "Pending" or "Resolved". |

    | Impact | Dropdown | No | The impact level of the incident (e.g., Extensive/Widespread,
    Significant/Large). |

    | Urgency | Dropdown | No | The urgency level of the incident (e.g., Critical,
    High, Medium, Low). |

    | Description | String | No | Updated description for the incident. |

    | Incident Type | Dropdown | No | The type of incident (e.g., User Service Restoration,
    Infrastructure Event). |

    | Assigned Group | String | No | The group to which the incident is assigned.
    |

    | Assignee | String | No | The specific individual assigned to the incident. |

    | Resolution | String | No | Details regarding the resolution of the incident.
    |

    | Resolution Category Tier 1-3 | String | No | Categorization for the resolution
    across three tiers. |

    | Resolution Product Category Tier 1-3 | String | No | Product-specific categorization
    for the resolution across three tiers. |

    | Reported Source | Dropdown | No | The source from which the incident was reported
    (e.g., Email, Phone, Web). |

    | Custom Fields | String (JSON) | No | A JSON object containing field-value pairs.
    **Note:** This parameter will overwrite other provided parameters if they conflict.
    |


    ### Additional Notes

    - If the `Status` is set to "Pending" or "Resolved", the `Status Reason` parameter
    should be provided to satisfy BMC Remedy requirements.

    - The `Custom Fields` parameter expects a valid JSON string. If the JSON is malformed,
    the action will fail.

    - The action automatically calculates the `Priority` field based on the provided
    `Urgency` and `Impact` values.


    ### Flow Description

    1. **Parameter Extraction:** The action retrieves the Incident ID and all optional
    update fields from the input parameters.

    2. **Manager Initialization:** Establishes a session with the BMC Remedy ITSM
    API using provided credentials.

    3. **Incident Lookup:** Fetches the current details of the incident to obtain
    the internal `Request ID` required for the update operation.

    4. **Data Mapping:** Maps human-readable inputs (like "Critical") to the specific
    internal formats required by BMC Remedy (e.g., "1-Critical") and calculates the
    resulting Priority.

    5. **Update Execution:** Sends a PUT request to the BMC Remedy API with the consolidated
    update payload (including custom fields if provided).

    6. **Session Termination:** Logs out of the BMC Remedy system to ensure security.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Updates incident fields such as status, impact, urgency, and resolution in the
      BMC Remedy ITSM system via a PUT request.
    fetches_data: true
    internal_data_mutation_explanation: null
