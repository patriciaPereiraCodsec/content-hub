Add Work Note To Incident:
  ai_description: >-
    ### General Description

    Adds a work note to a specific incident in BMC Remedy ITSM. This action allows
    analysts to document updates, findings, or progress directly into the BMC Remedy
    ITSM platform from within Google SecOps.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Incident ID | String | Yes | The unique identifier of the incident in BMC Remedy
    ITSM to which the work note will be added. |

    | Work Note Text | String | Yes | The text content of the work note to be appended
    to the incident's work log. |


    ### Flow Description

    1. **Authentication**: The action establishes a session with the BMC Remedy ITSM
    API using the configured credentials.

    2. **Incident Verification**: It retrieves the details of the specified Incident
    ID to ensure it exists before attempting to add a note.

    3. **Note Creation**: It performs a POST request to the `HPD:WorkLog` endpoint
    to create a new work log entry associated with the incident, setting the 'Work
    Log Type' to 'Working Log'.

    4. **Session Termination**: The action logs out of the BMC Remedy ITSM system
    to close the session.


    ### Additional Notes

    This action does not interact with Google SecOps entities. It relies entirely
    on the provided 'Incident ID' parameter to identify the target record in the external
    system.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Creates a new work log entry (work note) in the BMC Remedy ITSM system associated
      with the specified incident.
    fetches_data: true
    internal_data_mutation_explanation: null
