Create Incident:
  ai_description: >-
    ### General Description

    Creates a new incident in BMC Remedy ITSM. This action allows for the programmatic
    generation of tickets within the BMC platform, enabling security teams to automate
    the hand-off of security incidents to IT service management workflows. It supports
    a wide range of incident attributes including status, impact, urgency, categorization,
    and assignment details. Users can also leverage BMC templates or provide a raw
    JSON object for custom field mapping.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Status | Enum | No | The initial status of the incident (e.g., New, Assigned,
    In Progress). Defaults to 'Select One'. |

    | Impact | Enum | No | The impact level of the incident (e.g., Extensive/Widespread,
    Significant/Large). |

    | Urgency | Enum | No | The urgency level of the incident (e.g., Critical, High,
    Medium, Low). |

    | Description | String | No | A brief summary or title for the incident. |

    | Company | String | No | The company associated with the incident. |

    | Customer | String | No | The customer name in "{Last Name} {First Name}" format
    (e.g., "Smith John"). |

    | Template Name | String | No | The name of a BMC template to apply. The action
    will attempt to resolve this to a Template ID. |

    | Incident Type | Enum | No | The type of incident (e.g., User Service Restoration,
    Infrastructure Event). |

    | Assigned Group | String | No | The support group to which the incident should
    be assigned. |

    | Assignee | String | No | The specific individual to whom the incident should
    be assigned. |

    | Resolution | String | No | The resolution text for the incident. |

    | Resolution Category Tier 1/2/3 | String | No | Categorization levels for the
    resolution. |

    | Resolution Product Category Tier 1/2/3 | String | No | Product-specific categorization
    levels for the resolution. |

    | Reported Source | Enum | No | The source from which the incident was reported
    (e.g., Email, Phone, Direct Input). |

    | Custom Fields | String | No | A JSON string containing additional field-value
    pairs to be included in the creation request. This will overwrite other parameters
    if keys overlap. |


    ### Additional Notes

    - **Customer Format:** The 'Customer' parameter must strictly follow the "{Last
    Name} {First Name}" format for the action to correctly parse the identity.

    - **Custom Fields:** The 'Custom Fields' parameter expects a valid JSON object.
    If the JSON is malformed, the action will fail.

    - **Template Resolution:** If a 'Template Name' is provided but cannot be found
    in BMC, the action will return an error.


    ### Flow Description

    1. **Authentication:** Connects to the BMC Remedy ITSM API using the provided
    credentials to obtain a JWT token.

    2. **Template Resolution:** If a 'Template Name' is specified, the action queries
    BMC to find the corresponding internal Template ID.

    3. **Customer Parsing:** If a 'Customer' string is provided, it is split into
    first and last names.

    4. **Payload Construction:** Aggregates all provided parameters, maps enums to
    BMC-specific values, and merges them with any provided 'Custom Fields'.

    5. **Incident Creation:** Sends a POST request to the BMC `HPD:IncidentInterface_Create`
    endpoint to create the record.

    6. **Result Processing:** Parses the API response to extract the new Incident
    Number and Request ID, returning the full record as a JSON result.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Creates a new incident record in the BMC Remedy ITSM platform via a POST request
      to the HPD:IncidentInterface_Create endpoint.
    fetches_data: false
    internal_data_mutation_explanation: null
