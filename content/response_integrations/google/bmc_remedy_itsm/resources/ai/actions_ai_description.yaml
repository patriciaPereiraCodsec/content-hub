Get Record Details:
  ai_description: >-
    ### General Description

    The **Get Record Details** action retrieves comprehensive information for one
    or more records from BMC Remedy ITSM based on a specified record type and unique
    identifiers. This action is designed to provide analysts with deep visibility
    into ITSM objects (like Incidents, Changes, or Problems) directly within the Google
    SecOps platform.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Record Type** | String | Yes | The specific BMC Remedy form or table name
    to query (e.g., `HPD:Help Desk` for incidents). |

    | **Record IDs** | String | Yes | A comma-separated list of unique record identifiers
    to retrieve. |

    | **Fields To Return** | String | No | A comma-separated list of specific field
    names to include in the output. If not provided, the action attempts to return
    all available fields for the record. |


    ### Flow Description

    1. **Authentication**: The action establishes a session with the BMC Remedy ITSM
    API using the configured credentials.

    2. **Input Parsing**: It processes the `Record IDs` parameter, splitting the comma-separated
    string into a list of unique identifiers.

    3. **Data Retrieval**: The action iterates through each ID, making a GET request
    to the BMC Remedy endpoint corresponding to the `Record Type` and `Record ID`.

    4. **Result Processing**: For each successful retrieval, the raw data is stored
    in a JSON result list, and a formatted data table is created for the case wall.

    5. **Session Termination**: Once all IDs are processed, the action explicitly
    logs out of the BMC Remedy ITSM session to ensure security and resource management.


    ### Additional Notes

    - The action will report success if at least one record is successfully retrieved.
    If some IDs fail while others succeed, the output message will specify which IDs
    were not found.

    - Providing invalid field names in the `Fields To Return` parameter may cause
    the action to fail.
