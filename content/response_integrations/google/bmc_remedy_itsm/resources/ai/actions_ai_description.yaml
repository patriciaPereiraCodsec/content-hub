Get Incident Details:
  ai_description: >-
    ### General Description

    Retrieves comprehensive details for specific incidents from BMC Remedy ITSM. This
    action allows users to fetch specific fields and associated work notes for a list
    of incident IDs, providing deep visibility into ticket status, history, and communications
    directly within Google SecOps.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Incident IDs** | String | Yes | A comma-separated list of BMC Remedy incident
    identifiers (e.g., INC0000000001) to retrieve details for. |

    | **Fields To Return** | String | No | A comma-separated list of specific BMC
    field names to return. If left empty, all available fields are returned. |

    | **Fetch Work Notes** | Boolean | No | If enabled (default), the action will
    also retrieve work log entries associated with each incident. |

    | **Max Work Notes To Return** | Integer | No | Specifies the maximum number of
    work notes to retrieve per incident. Defaults to 50. |


    ### Additional Notes

    - The action performs a logout from the BMC Remedy API after completion to ensure
    session security.

    - If an invalid field is provided in the 'Fields To Return' parameter, the action
    may fail depending on the BMC API response.


    ### Flow Description

    1. **Authentication**: Connects to the BMC Remedy ITSM API using provided credentials
    to obtain a JWT token.

    2. **Incident Retrieval**: Queries the `HPD:IncidentInterface` form for the specified
    Incident IDs, optionally filtering for requested fields.

    3. **Work Note Retrieval**: If 'Fetch Work Notes' is enabled, it queries the `HPD:WorkLog`
    form for each successfully retrieved incident, limited by the 'Max Work Notes
    To Return' value.

    4. **Data Processing**: Maps the raw API response into structured JSON and prepares
    data tables for the Google SecOps interface.

    5. **Output**: Adds a main 'Incident Details' table and individual work note tables
    for each incident to the case, then terminates the session.
