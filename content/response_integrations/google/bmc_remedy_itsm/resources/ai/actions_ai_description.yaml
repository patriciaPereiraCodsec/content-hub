Delete Incident:
  ai_description: >-
    ### General Description

    Deletes a specific incident record in BMC Remedy ITSM. This action is used to
    programmatically remove incident entries from the external ITSM system based on
    a provided Incident ID.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Incident ID | String | Yes | The unique identifier (Incident Number) of the
    incident that needs to be deleted from BMC Remedy ITSM. |


    ### Flow Description

    1. **Authentication**: The action authenticates with the BMC Remedy ITSM API using
    the provided credentials to obtain a session token.

    2. **Incident Lookup**: It first retrieves the incident details using the provided
    `Incident ID` to identify the internal `entry_id` required for the deletion process.

    3. **Deletion**: If the incident is found, the action sends a DELETE request to
    the BMC Remedy ITSM endpoint associated with the specific `entry_id`.

    4. **Cleanup**: The action logs out of the BMC Remedy ITSM session and reports
    the success or failure of the deletion to the Google SecOps workbench.
