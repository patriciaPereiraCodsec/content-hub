Wait For Incident Fields Update:
  ai_description: "### General Description\nThis action is an asynchronous monitoring\
    \ tool for BMC Remedy ITSM. It is designed to pause a playbook's execution until\
    \ a specific incident reaches a desired state, defined either by its status or\
    \ by a set of custom field values. This is particularly useful for synchronizing\
    \ SOAR workflows with manual or external processes occurring within the ITSM platform.\n\
    \n### Parameters Description\n| Parameter | Type | Mandatory | Description |\n\
    | :--- | :--- | :--- | :--- |\n| Incident ID | String | Yes | The unique identifier\
    \ (e.g., INC000001) of the incident to be monitored. |\n| Status | Dropdown |\
    \ No | The expected status of the incident (e.g., Assigned, Resolved, Closed).\
    \ |\n| Fields To Check | String (JSON) | No | A JSON dictionary of field keys\
    \ and expected values (e.g., `{\"Status\": \"Closed\", \"Urgency\": \"1-Critical\"\
    }`). This parameter takes priority over the 'Status' parameter. |\n| Fail If Timeout\
    \ | Boolean | Yes | If set to true, the action will report a failure if the conditions\
    \ are not met before the SOAR timeout. If false, it will report a success but\
    \ indicate the timeout occurred. |\n\n### Flow Description\n1. **Initialization**:\
    \ The action retrieves connection details and user-provided parameters.\n2. **Validation**:\
    \ It ensures that either 'Status' or 'Fields To Check' is provided.\n3. **Polling**:\
    \ The action fetches the current state of the incident from BMC Remedy ITSM using\
    \ the provided Incident ID.\n4. **Comparison**: It compares the current field\
    \ values of the incident against the expected values defined in the parameters.\n\
    5. **State Management**: \n    - If all fields match the expected values, the\
    \ action completes with a success status and returns the incident details.\n \
    \   - If the fields do not match, the action sets its state to 'In Progress',\
    \ allowing the SOAR engine to retry the check after a delay.\n6. **Timeout Handling**:\
    \ If the action approaches its execution deadline without the conditions being\
    \ met, it handles the termination based on the 'Fail If Timeout' setting.\n\n\
    ### Additional Notes\n- Either the 'Status' or 'Fields To Check' parameter must\
    \ be configured for the action to run successfully.\n- The 'Fields To Check' parameter\
    \ must be a valid JSON string."
