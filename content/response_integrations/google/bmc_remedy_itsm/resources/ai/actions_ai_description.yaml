Delete Record:
  ai_description: >-
    Deletes a specific record in BMC Remedy ITSM based on the provided record type
    and record ID. This action is used to programmatically remove entries from the
    ITSM system, such as incidents, work logs, or custom records, by targeting their
    unique identifiers.


    ### Flow Description

    1. **Authentication**: The action authenticates with the BMC Remedy ITSM API using
    the provided credentials to obtain a JWT token.

    2. **Parameter Extraction**: It retrieves the 'Record Type' and 'Record ID' from
    the action parameters.

    3. **Deletion Request**: It sends a DELETE request to the BMC Remedy ITSM REST
    API endpoint corresponding to the specific record type and ID.

    4. **Error Handling**: The action specifically handles 'Not Found' exceptions
    (if the record does not exist) and general API errors, providing descriptive feedback.

    5. **Session Termination**: It ensures a logout request is sent to the API to
    invalidate the session token.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Record Type | String | Yes | The schema or form name of the record in BMC Remedy
    (e.g., 'HPD:Help Desk' for incidents). |

    | Record ID | String | Yes | The unique identifier (Entry ID) of the record to
    be deleted. |


    ### Additional Notes

    - This action performs a destructive operation in an external system and cannot
    be undone via the SOAR interface.

    - It does not process or interact with Google SecOps entities; it operates solely
    on the provided parameter values.
