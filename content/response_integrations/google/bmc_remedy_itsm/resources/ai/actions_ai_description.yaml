Create Record:
  ai_description: >-
    Creates a new record in BMC Remedy ITSM. This action allows users to dynamically
    specify the type of record (form/table) and provide a JSON payload containing
    the field values for the new entry. It is a generic creation tool that can be
    used for any supported BMC Remedy schema.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Record Type | String | Yes | Specify the type of the record (e.g., the BMC Remedy
    form name) that needs to be created. |

    | Record Payload | String (JSON) | Yes | A JSON object containing the fields and
    values required to create the record. |


    ### Flow Description

    1. **Parameter Extraction**: Retrieves the connection settings (API Root, credentials)
    and action parameters (`Record Type` and `Record Payload`).

    2. **Payload Validation**: Attempts to parse the `Record Payload` string into
    a valid JSON object. If parsing fails, the action terminates with an error.

    3. **Authentication**: Initializes the BMC Remedy ITSM Manager and authenticates
    to obtain a JWT token.

    4. **Record Creation**: Sends a POST request to the BMC Remedy REST API endpoint
    corresponding to the specified `Record Type`, passing the payload in the request
    body.

    5. **Result Processing**: Captures the response from the external system, parses
    the created record details, and attaches them as a JSON result to the action.

    6. **Cleanup**: Logs out of the BMC Remedy session to ensure security and resource
    management.
