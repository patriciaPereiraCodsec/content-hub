Ping:
  ai_description: >-
    ### General Description

    The **Ping** action is a diagnostic utility designed to verify the connectivity
    between Google SecOps and the BMC Remedy ITSM instance. It ensures that the provided
    credentials (Username and Password) and the API Root URL are correct and that
    the network path is open. This action is typically used during the initial setup
    of the integration or for troubleshooting communication issues.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **API Root** | String | Yes | The base URL of the BMC Remedy ITSM API (e.g.,
    `https://<server-name>:<port>`). |

    | **Username** | String | Yes | The username used to authenticate with the BMC
    Remedy ITSM server. |

    | **Password** | String | Yes | The password associated with the provided username.
    |

    | **Verify SSL** | Boolean | No | If enabled, the action will verify the SSL certificate
    of the BMC Remedy ITSM server. Default is usually true. |


    ### Additional Notes

    - This action does not process any entities.

    - It performs a login and logout sequence to ensure full session lifecycle functionality
    is working.

    - As per standard SOAR conventions, Ping actions are not categorized as enrichment
    actions.


    ### Flow Description

    1. **Parameter Extraction:** The action retrieves the connection details (API
    Root, Username, Password, and SSL verification setting) from the integration configuration.

    2. **Authentication:** It attempts to log in to the BMC Remedy ITSM server via
    the `/api/jwt/login` endpoint to obtain an authentication token.

    3. **Connectivity Test:** Once authenticated, it performs a lightweight `GET`
    request to the `/api/arsys/v1/entry/HPD:IncidentInterface` endpoint, limiting
    the result to a single record to verify that data can be retrieved.

    4. **Session Termination:** Regardless of the connectivity test result, the action
    attempts to log out using the `/api/jwt/logout` endpoint to clean up the session.

    5. **Result Reporting:** The action returns a success message if all steps complete
    without error, or a failure message detailing the exception encountered.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
