Wait For Record Fields Update:
  ai_description: "### General Description\nThis action is an asynchronous polling\
    \ mechanism designed to monitor specific records in BMC Remedy ITSM. It waits\
    \ until a set of defined fields in a record (such as an Incident or Change Request)\
    \ matches the expected values provided by the user. This is particularly useful\
    \ for synchronizing workflows where the SOAR platform needs to wait for an external\
    \ manual or automated process in Remedy to complete before proceeding to the next\
    \ step.\n\n### Parameters Description\n| Parameter | Type | Mandatory | Description\
    \ |\n| :--- | :--- | :--- | :--- |\n| Record Type | String | Yes | The specific\
    \ BMC Remedy form or table name where the record resides (e.g., 'HPD:IncidentInterface').\
    \ |\n| Record ID | String | Yes | The unique identifier (Request ID or Entry ID)\
    \ of the record to monitor. |\n| Fields To Check | JSON | Yes | A JSON object\
    \ representing the field names and the specific values the action is waiting for\
    \ (e.g., `{\"Status\": \"Closed\", \"Status_Reason\": \"Finalized\"}`). |\n| Fail\
    \ If Timeout | Boolean | Yes | If set to true, the action will return a 'Failed'\
    \ status if the fields are not updated within the SOAR's execution deadline. If\
    \ false, it will return a 'Completed' status with a timeout message. |\n\n###\
    \ Flow Description\n1. **Initialization**: The action extracts connection details\
    \ and parameters, then initializes the BMC Remedy ITSM manager.\n2. **Timeout\
    \ Check**: It first checks if the SOAR execution deadline is approaching. If the\
    \ deadline is near and the fields haven't matched yet, it handles the timeout\
    \ based on the 'Fail If Timeout' setting.\n3. **Data Retrieval**: The action fetches\
    \ the current state of the record from BMC Remedy using the provided `Record Type`\
    \ and `Record ID`.\n4. **Comparison**: It compares the current values of the fields\
    \ in the retrieved record against the desired values specified in the 'Fields\
    \ To Check' parameter.\n5. **State Management**: \n    * If **all** fields match,\
    \ the action completes successfully and returns the full record data as a JSON\
    \ result.\n    * If **any** fields do not match, the action sets its state to\
    \ 'In Progress', allowing the SOAR platform to re-run the script automatically\
    \ after a delay to check again.\n6. **Cleanup**: The action ensures a proper logout\
    \ from the BMC Remedy API session in all scenarios."
