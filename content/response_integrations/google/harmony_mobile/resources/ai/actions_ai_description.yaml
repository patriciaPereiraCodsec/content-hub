Enrich Entities:
  ai_description: >-
    ### General Description

    Enriches **Hostname** entities using device information retrieved from **Checkpoint
    Harmony Mobile**. This action identifies mobile devices managed by Harmony Mobile
    that match the provided Hostname entities (based on the device name) and retrieves
    detailed metadata including OS version, risk level, and connection status. The
    retrieved data is used to populate entity enrichment fields, create data tables,
    and optionally generate detailed insights for security analysts.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Create Insight** | Boolean | No | If set to `true` (default), the action will
    generate a formatted HTML insight on the entity, highlighting the Risk Level (color-coded),
    Status, Model, and OS details. |


    ### Additional Notes

    * The action expects the **Hostname** entity identifier to match the **name**
    of the device as registered in the Harmony Mobile console.

    * Enrichment data is prefixed with `HarmonyMobile` in the entity's additional
    properties.


    ### Flow Description

    1. **Authentication**: Connects to the Harmony Mobile API using the provided Client
    ID and Secret to obtain an authentication token.

    2. **Data Retrieval**: Fetches the complete list of managed devices from the Harmony
    Mobile `/device_status` endpoint.

    3. **Entity Filtering**: Identifies all `HOSTNAME` entities within the current
    context.

    4. **Matching Logic**: Iterates through the entities and attempts to find a matching
    device in the retrieved list where the device name equals the entity identifier.

    5. **Enrichment**: For each match, it updates the entity's additional properties
    with device metadata (e.g., `os_type`, `risk`, `status`).

    6. **UI Updates**: Adds a CSV-formatted data table to the entity and, if configured,
    creates a visual insight.

    7. **Finalization**: Updates the entities in Google SecOps and returns a JSON
    summary of the results.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entity enrichment fields (additional_properties), adds entity data tables,
      and creates entity insights within the Google SecOps case.
  categories:
    enrichment: true
  entity_usage:
    entity_types:
    - HOSTNAME
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: true
    filters_by_identifier: false
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: false
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
Ping:
  ai_description: >-
    ### General Description

    Tests the connectivity between Google SecOps and the Checkpoint Harmony Mobile
    service. It verifies that the provided API Root, Client ID, and Client Secret
    are correct and that the network allows communication with the Harmony Mobile
    API.


    ### Parameters Description

    This action does not have individual action parameters. It uses the following
    global integration configuration parameters:

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | API Root | String | Yes | The base URL of the Harmony Mobile API instance. |

    | Client ID | String | Yes | The Client ID used for authentication. |

    | Client Secret | String | Yes | The Client Secret used for authentication. |

    | Verify SSL | Boolean | Yes | If enabled, the action will verify the SSL certificate
    of the API server. |


    ### Additional Notes

    This action is primarily used for troubleshooting and verifying that the Google
    SecOps environment can communicate with the Checkpoint Harmony Mobile API. It
    does not process any entities.


    ### Flow Description

    1. **Initialization**: The action starts and retrieves the global configuration
    parameters (API Root, Client ID, Client Secret, and Verify SSL) from the integration
    settings.

    2. **Manager Setup**: A `HarmonyMobileManager` instance is created. During initialization,
    it performs an authentication request to the `/auth/external` endpoint to obtain
    a bearer token.

    3. **Connectivity Check**: The manager calls the `test_connectivity` method, which
    sends a GET request to the device status endpoint (`/app/SBM/external_api/v1/device_status/`).

    4. **Completion**: If the request is successful, the action completes with a success
    status. If an exception occurs (e.g., authentication failure or network error),
    the action fails and provides the error details.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
  categories:
    enrichment: false
  entity_usage:
    entity_types: []
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: false
    filters_by_identifier: false
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: false
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
