Get Processes:
  ai_description: >-
    ### General Description

    The **Get Processes** action retrieves a list of processes that have run on a
    specific device within a defined timeframe. It interacts with the **Carbon Black
    Defense** (VMware Carbon Black Cloud) API to fetch process metadata such as application
    names, process IDs, and SHA256 hashes for entities identified as Hostnames or
    IP Addresses.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Timeframe | String | Yes | Defines the lookback period for the process search.
    Supported formats include relative time strings like '3h' (3 hours), '1d' (1 day),
    or '2w' (2 weeks). |


    ### Additional Notes

    The timeframe parameter is mandatory and follows Carbon Black's search window
    format. If no processes are found for an entity, the action will report it in
    the output message but continue processing other entities.


    ### Flow Description

    1. **Authentication**: Establishes a connection to the Carbon Black Defense instance
    using the provided API Root and API Key.

    2. **Entity Filtering**: Identifies supported entities (IP Addresses and Hostnames)
    from the current context.

    3. **Data Retrieval**: For each supported entity, it executes a search query against
    the Carbon Black process API using the entity identifier and the specified timeframe.

    4. **Data Transformation**: Converts the retrieved process objects into a flat
    CSV format.

    5. **Internal Enrichment**: Attaches the CSV data as a table to the corresponding
    entity in Google SecOps and stores the raw JSON data in the action results.

    6. **Reporting**: Provides a summary message indicating which entities had processes
    found and which failed or returned no results.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      The action attaches a CSV table containing process details (name, ID, path,
      hash, etc.) to the entity's information in the Google SecOps platform.
  categories:
