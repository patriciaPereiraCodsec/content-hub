Delete Rule From Policy:
  ai_description: >-
    ### General Description

    Deletes a specific rule from an existing policy in Carbon Black Defense. This
    action is used to manage and refine security policies by programmatically removing
    rules that are no longer needed or are causing issues.


    ### Parameters Description

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Policy Name | String | Yes | The name of the policy from which the rule should
    be removed. The action will look up the internal ID for this policy name. |

    | Rule ID | String | Yes | The unique identifier of the rule to be deleted from
    the specified policy. |


    ### Flow Description

    1. **Initialization**: The action initializes the Carbon Black Defense manager
    using the provided API Root and API Key.

    2. **Connectivity Test**: It performs a connectivity test to ensure the credentials
    and endpoint are valid.

    3. **Policy Lookup**: The action retrieves the list of all policies to find the
    internal Policy ID associated with the provided 'Policy Name'.

    4. **Rule Deletion**: It sends a DELETE request to the Carbon Black Defense API
    targeting the specific rule ID within the identified policy.

    5. **Result Reporting**: The action returns a success status and message if the
    rule was successfully removed, or a failure status if the policy was not found
    or the deletion failed.
