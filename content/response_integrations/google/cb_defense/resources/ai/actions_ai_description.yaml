Get Events:
  ai_description: "### General Description\nThe **Get Events** action retrieves historical\
    \ event logs from Carbon Black Defense for specific **IP Address** and **Hostname**\
    \ entities. This action provides security analysts with visibility into endpoint\
    \ activities, such as system API calls and process events, that occurred within\
    \ a specified timeframe. The retrieved data is presented as both a structured\
    \ JSON result and a CSV table attached to the entity.\n\n### Parameters Description\n\
    | Parameter | Type | Mandatory | Description |\n| :--- | :--- | :--- | :--- |\n\
    | Timeframe | String | Yes | Defines the lookback period for the event search\
    \ (e.g., '3h' for three hours, '1d' for one day, '2w' for two weeks). Note that\
    \ API support for specific timeframe strings may vary. |\n\n### Flow Description\n\
    1. **Initialization**: The action extracts the integration configuration (API\
    \ Root and API Key) and the mandatory `Timeframe` parameter.\n2. **Connectivity\
    \ Check**: It verifies the connection to the Carbon Black Defense instance before\
    \ proceeding.\n3. **Entity Filtering**: The action iterates through the target\
    \ entities in the current context, filtering for supported types: **ADDRESS**\
    \ (IP) and **HOSTNAME**.\n4. **Data Retrieval**: For each valid entity, the action\
    \ queries the Carbon Black Defense `/event` endpoint using the entity identifier\
    \ and the provided timeframe.\n5. **Data Processing**: \n    * If events are found,\
    \ the raw data is captured for the action's JSON output.\n    * A CSV-formatted\
    \ table is constructed from the event data and attached to the specific entity\
    \ in the Google SecOps platform.\n6. **Final Reporting**: The action concludes\
    \ by providing a summary message indicating which entities returned events, which\
    \ had no results, and if any errors occurred during processing.\n\n### Additional\
    \ Notes\n* This action is strictly a data retrieval operation and does not modify\
    \ any configurations or data within the external Carbon Black Defense system.\n\
    * The action includes a timeout check to ensure it completes within the platform's\
    \ execution deadline."
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Adds data tables to entities containing the retrieved event logs from Carbon
      Black Defense.
