Change Policy:
  ai_description: >-
    ### General Description

    Changes the security policy assigned to a specific device in Carbon Black Defense.
    This action is used to move devices between different security postures, such
    as moving a suspicious host to a more restrictive 'Quarantine' or 'Investigation'
    policy based on its IP address or Hostname.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Policy Name | String | Yes | The exact name of the new policy to be applied
    to the device (e.g., `TEST_Policy`). |


    ### Flow Description

    1. **Initialization**: Connects to the Carbon Black Defense API using the provided
    API Root and API Key.

    2. **Device Identification**: Iterates through the target entities (IP Addresses
    and Hostnames). For each entity, it queries the Carbon Black environment to find
    a matching device record.

    3. **Policy Update**: If a matching device is found, the action retrieves the
    unique `device_id` and updates the device's configuration to the new `Policy Name`
    provided in the action parameters.

    4. **Reporting**: The action tracks and reports which entities were successfully
    updated, which entities could not be found in the Carbon Black system, and which
    entities failed due to processing errors.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Updates the security policy assigned to the device in Carbon Black Defense by
      modifying the device's policyName attribute and saving the change.
    fetches_data: true
    internal_data_mutation_explanation: null
  categories:
