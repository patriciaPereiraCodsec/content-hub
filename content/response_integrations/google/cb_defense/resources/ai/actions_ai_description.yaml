Delete Policy:
  ai_description: >-
    ### General Description

    The **Delete Policy** action removes a specific security policy from the Carbon
    Black Defense platform. This action is primarily used for administrative cleanup
    and policy management within the endpoint security environment.


    ### Parameters Description

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Policy Name | String | Yes | The exact name of the policy to be deleted. The
    action will search for the corresponding policy ID before attempting deletion.
    |


    ### Additional Notes

    - This action does not run on entities; it operates based on the provided string
    parameter.

    - **Warning**: The deletion might fail if the policy is currently assigned to
    active devices.

    - The action performs an internal lookup to map the policy name to its unique
    identifier (ID) before sending the delete command.


    ### Flow Description

    1. **Initialization**: Extracts API credentials (API Root, API Key) and the target
    policy name from the action parameters.

    2. **Connectivity Test**: Verifies the connection to the Carbon Black Defense
    instance.

    3. **ID Resolution**: Queries the Carbon Black Defense API to retrieve a list
    of all policies and identifies the ID associated with the provided 'Policy Name'.

    4. **Deletion**: Sends a DELETE request to the Carbon Black Defense API using
    the resolved policy ID.

    5. **Finalization**: Reports whether the policy was successfully deleted or if
    an error occurred (e.g., policy not found or API error).
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Deletes a security policy configuration from the Carbon Black Defense console
      via a DELETE request to the policy API endpoint.
    fetches_data: false
    internal_data_mutation_explanation: null
