Get Device Info:
  ai_description: "### General Description\nEnriches Hostname and IP Address entities\
    \ with detailed device information retrieved from Carbon Black Defense. This action\
    \ helps security analysts understand the context of a device, including its OS\
    \ version, last reported time, internal/external IP addresses, and sensor status.\n\
    \n### Parameters Description\nThere are no action-specific parameters for this\
    \ action. It relies on the global integration configuration for 'Api Root' and\
    \ 'Api Key'.\n\n### Additional Notes\n- The action supports **ADDRESS** and **HOSTNAME**\
    \ entity types.\n- It enriches entities by adding properties prefixed with `CB_DEFENSE`\
    \ and creates a detailed data table for each successful match.\n\n### Flow Description\n\
    1. **Initialization**: Connects to the Carbon Black Defense API using the provided\
    \ configuration.\n2. **Connectivity Check**: Performs a test connectivity call\
    \ to ensure the API is reachable.\n3. **Entity Processing**: Iterates through\
    \ the target entities in the scope.\n4. **Data Retrieval**: \n    - For **ADDRESS**\
    \ entities, it queries Carbon Black for device data using the IP address.\n  \
    \  - For **HOSTNAME** entities, it queries Carbon Black for device data using\
    \ the exact hostname.\n5. **Enrichment**: If a device is found, the action:\n\
    \    - Populates the entity's additional properties with the device metadata.\n\
    \    - Adds a CSV-formatted data table to the entity in the Google SecOps UI.\n\
    \    - Marks the entity as enriched.\n6. **Finalization**: Updates all successfully\
    \ enriched entities and returns a summary message of the results."
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
