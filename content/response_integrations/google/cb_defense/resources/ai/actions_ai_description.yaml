Create Policy:
  ai_description: "Creates a new security policy in Carbon Black Defense. This action\
    \ allows users to define policy attributes such as name, description, and priority\
    \ level, along with specific policy details provided in JSON format. \n\n### Parameters\n\
    | Parameter | Type | Mandatory | Description |\n| :--- | :--- | :--- | :--- |\n\
    | Policy Name | String | Yes | The unique name for the new policy. |\n| Policy\
    \ Description | String | Yes | A detailed description of the policy's purpose.\
    \ |\n| Priority Level | String | Yes | The priority score (e.g., LOW, MEDIUM,\
    \ HIGH) for sensors assigned to this policy. |\n| Policy Details | String (JSON)\
    \ | Yes | A JSON-formatted string containing the specific configuration and rules\
    \ for the policy. |\n\n### Flow Description\n1. **Parameter Extraction:** Retrieves\
    \ the policy name, description, priority, and details from the action input.\n\
    2. **JSON Validation:** Validates that the 'Policy Details' parameter is a valid\
    \ JSON string.\n3. **Connectivity Check:** Verifies the connection to the Carbon\
    \ Black Defense API.\n4. **Policy Creation:** Sends a POST request to the Carbon\
    \ Black Defense API to create the policy with the provided specifications.\n5.\
    \ **Result Handling:** Returns the ID of the newly created policy upon success."
