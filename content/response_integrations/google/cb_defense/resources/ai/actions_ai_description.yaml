Ping:
  ai_description: >-
    ### General Description

    The Ping action is a diagnostic tool used to verify the connectivity between the
    Google SecOps platform and the Carbon Black Defense (CBDefense) server. It ensures
    that the provided API credentials (API Root and API Key) are valid and that the
    network path is open for communication.


    ### Parameters Description

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Api Root | String | Yes | The base URL of the Carbon Black Defense instance
    (e.g., https://dashboard.conferdeploy.net). |

    | Api Key | String | Yes | The API key used to authenticate requests to the Carbon
    Black Defense API. |


    ### Additional Notes

    This action does not process any entities and is typically used during the initial
    setup of the integration or for troubleshooting connection issues. Per standard
    SOAR conventions, Ping actions are not categorized as enrichment actions.


    ### Flow Description

    1. **Initialization**: The action retrieves the integration configuration parameters
    (Api Root and Api Key).

    2. **Manager Setup**: It initializes the `CBDefenseManager` with the provided
    credentials.

    3. **Connectivity Test**: The manager executes a `GET` request to the `/integrationServices/v3/device`
    endpoint of the Carbon Black Defense API.

    4. **Validation**: If the request returns a successful HTTP status code, the action
    confirms connectivity. If an exception occurs (e.g., 401 Unauthorized or 404 Not
    Found), the action captures the error.

    5. **Result Reporting**: The action returns a boolean success value and an output
    message indicating the connection status.
