EnrichEntities:
  ai_description: >-
    ### General Description

    The **Enrich Entities** action retrieves threat intelligence for IP Address and
    Hostname entities from ThreatCrowd. It helps analysts identify related infrastructure,
    malware associations, and community reputation to assess the risk level of entities
    within a case.


    ### Parameters Description

    There are no action-specific parameters for this action. It relies on the global
    integration configuration for connectivity.


    ### Additional Notes

    - The action uses the 'Use SSL' configuration from the ThreatCrowd integration
    settings to determine if API requests should be verified.

    - Entities are marked as suspicious if the ThreatCrowd community vote is -1 (Malicious).


    ### Flow Description

    1. **Initialization**: Retrieves the integration configuration and initializes
    the ThreatCrowd API client.

    2. **Entity Filtering**: Identifies all IP Address and Hostname entities in the
    current scope.

    3. **Data Retrieval**: Queries the ThreatCrowd API for each identified entity
    to obtain a reputation report.

    4. **Enrichment**: For each successful query, the action:
        - Populates the entity's additional properties with the report data.
        - Adds a data table to the entity showing the flattened report.
        - Adds a direct link to the ThreatCrowd report page.
        - Updates the entity's suspicious status based on community votes.
        - Marks the entity as enriched.
    5. **Update**: Commits the changes to the entities in the Google SecOps platform.

    6. **Results**: Returns a JSON object containing the raw data for all enriched
    entities.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entity attributes (additional_properties), sets the 'is_suspicious'
      flag based on community votes, and adds data tables and links to the entities.
  categories:
    enrichment: true
  entity_usage:
    entity_types:
    - ADDRESS
    - HOSTNAME
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: true
    filters_by_identifier: false
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: false
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
Ping:
  ai_description: >-
    ### General Description

    The **Ping** action is a utility designed to verify the connectivity between Google
    SecOps and the ThreatCrowd API. It ensures that the integration is correctly configured
    and that the external service is reachable.


    ### Parameters Description

    There are no parameters for this action.


    ### Additional Notes

    This action uses a hardcoded dummy IP address (8.8.8.8) to perform a test lookup
    against the ThreatCrowd API to validate the connection.


    ### Flow Description

    1. **Configuration Retrieval**: The action retrieves the integration configuration,
    specifically the 'Use SSL' setting.

    2. **Manager Initialization**: It initializes the ThreatCrowdManager with the
    SSL preference.

    3. **Connectivity Test**: It calls the test_connectivity method, which performs
    a GET request for a report on the dummy IP 8.8.8.8.

    4. **Result Handling**: If the API returns a valid response, the action concludes
    with a 'Connection Established' message. Otherwise, it reports 'Connection Failed'.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: false
    internal_data_mutation_explanation: null
  categories:
    enrichment: false
  entity_usage:
    entity_types: []
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: false
    filters_by_identifier: false
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: false
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
