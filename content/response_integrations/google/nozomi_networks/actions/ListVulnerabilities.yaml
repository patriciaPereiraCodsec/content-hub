name: List Vulnerabilities
description: 'List vulnerabilities discovered by Nozomi device based on the provided
    action input parameters.  Note: Action is not working with Siemplify entities,
    only with action input parameters.'
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/nozomi-networks#list_vulnerabilities
integration_identifier: NozomiNetworks
parameters:
-   name: IP Address
    default_value: ''
    type: string
    description: List vulnerabilities for the provided ip address. Parameter accepts
        multiple values as a comma separated string.
    is_mandatory: false
-   name: CVE Score
    default_value: ''
    type: string
    description: Minimum CVE score vulnerability should have to be listed, score can
        be a number from 0 to 10.
    is_mandatory: false
-   name: Vulnerability Name Contains
    default_value: ''
    type: string
    description: Specify a string that vulnerability name should contain to be listed.
    is_mandatory: false
-   name: CVE ID
    default_value: ''
    type: string
    description: If you know specific CVE to look for, provide the related id in this
        field, for example, CVE-2020-1207. Parameter accepts multiple values as a
        comma separated string.
    is_mandatory: false
-   name: Record Limit
    default_value: 25
    type: string
    description: Can be used to specify how many records can be returned by the action.
    is_mandatory: true
-   name: Include vulnerabilities that marked as resolved?
    default_value: false
    type: boolean
    description: Specify whether action should also return vulnerabilities that are
        marked as resolved.
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/list_vulnerabilities_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
