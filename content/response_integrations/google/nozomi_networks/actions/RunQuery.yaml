name: Run a Query
description: 'Run a query on Nozomi Networks device. Note: Action is not working with
    Siemplify Entities.'
integration_identifier: NozomiNetworks
parameters:
-   name: Query
    default_value: ''
    type: string
    description: 'Specify a query to execute on Nozomi Networks device, for example:
        alerts | head 10'
    is_mandatory: true
-   name: Record Limit
    default_value: 10
    type: string
    description: Can be used to specify how many records can be returned by the action.
        If default value of 10 is set, parameter adds “| head 10” to the final query
        to limit the number of returned records. If nothing is provided for the parameter
        - all query results are returned. Negative values are ignored.
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/run_query_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
