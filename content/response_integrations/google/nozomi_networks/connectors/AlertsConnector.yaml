name: Nozomi Networks Alerts Connector
parameters:
-   name: DeviceProductField
    default_value: Product Name
    type: string
    description: Enter the source field name in order to retrieve the Product Field
        name.
    is_mandatory: true
    is_advanced: false
    mode: regular
-   name: EventClassId
    default_value: Operation
    type: string
    description: Enter the source field name in order to retrieve the Event Field
        name.
    is_mandatory: true
    is_advanced: false
    mode: regular
-   name: Environment Field Name
    default_value: ''
    type: string
    description: Describes the name of the field where the environment name is stored.
        If the environment field isn't found, the environment is the default environment.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Environment Regex Pattern
    default_value: .*
    type: string
    description: A regex pattern to run on the value found in the "Environment Field
        Name" field. Default is .* to catch all and return the value unchanged. Used
        to allow the user to manipulate the environment field via regex logic. If
        the regex pattern is null or empty, or the environment value is null, the
        final environment result is the default environment.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: PythonProcessTimeout
    default_value: 180
    type: integer
    description: Timeout limit for the python process running the current script.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: API URL
    default_value: https://x.x.x.x:port
    type: string
    description: Nozomi API URL to connect to.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Username
    default_value: ''
    type: string
    description: Nozomi account username to use for connection.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Password
    default_value: ''
    type: password
    description: Nozomi account password to use for connection.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Verify SSL
    default_value: false
    type: boolean
    description: Specify whether API URL certificate should be validated before connection.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: CA Certificate File
    default_value: ''
    type: string
    description: CA Certificate File - parsed into Base64 String.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Minimum severity to fetch
    default_value: ''
    type: integer
    description: Minimum severity alert should have to be ingested, severity can be
        a number from 0 to 10.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Ingest only alerts that have “is_security” attribute set to True?
    default_value: false
    type: boolean
    description: Specify if only alerts that have “is_security” attribute set to True
        should be ingested.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Ingest only alerts that have “is_incident” attribute set to True?
    default_value: false
    type: boolean
    description: Specify if only alerts that have “is_incident” attribute set to True
        should be ingested.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Fetch Max Hours Backwards
    default_value: 8
    type: integer
    description: Number of hours before the first connector iteration to retrieve
        alerts from. This parameter applies to the initial connector iteration after
        you enable the connector for the first time, or used as a fallback value in
        cases where connector's last run timestamp expires.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Fetch Backwards Time Interval (minutes)
    default_value: 60
    type: integer
    description: Time interval connector should use to fetch alerts from max hours
        backwards. If Nozomi Device is deployed in a large network, the number of
        generated alerts can be substantial. Because of this, this parameter in minutes
        can be used to split max hours backwards on smaller segments and process them
        individually. Time interval cant be bigger than max hours backwards value.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Use whitelist as a blacklist
    default_value: false
    type: boolean
    description: If enabled, whitelist will be used as a blacklist.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Proxy Server Address
    default_value: ''
    type: string
    description: The address of the proxy server to use.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Proxy Username
    default_value: ''
    type: string
    description: The proxy username to authenticate with.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Proxy Password
    default_value: ''
    type: password
    description: The proxy password to authenticate with.
    is_mandatory: false
    is_advanced: false
    mode: script
description: Connector to fetch Nozomi Networks Alerts to Siemplify.
integration: NozomiNetworks
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/nozomi-networks#connector
rules: []
is_connector_rules_supported: false
creator: admin
