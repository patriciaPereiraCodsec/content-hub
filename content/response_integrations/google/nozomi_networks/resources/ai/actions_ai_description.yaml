Enrich Entities:
  ai_description: >-
    ### General Description

    Enriches Hostname and IP Address entities using threat intelligence and asset
    data from Nozomi Networks Guardian. This action retrieves detailed node information
    such as MAC addresses, operating systems, firmware versions, vendors, and network
    protocols to provide better context for security investigations.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Additional fields to add to enrichment | String | No | A comma-separated list
    of specific fields from the Nozomi 'Nodes' query results that should be included
    in the enrichment data, in addition to the default set of fields. |


    ### Additional Notes

    - The action specifically targets `HOSTNAME` and `ADDRESS` entity types.

    - If multiple matches for an entity are found in Nozomi Networks, the action automatically
    selects the most recent match based on the last activity time.

    - Enrichment data is prefixed with 'Nozomi' when added to the entity's additional
    properties.


    ### Flow Description

    1. **Filter Entities:** Identifies all Hostname and IP Address entities within
    the current context.

    2. **API Connection:** Establishes a connection to the Nozomi Networks API using
    the configured credentials and SSL settings.

    3. **Query Node Data:** For each entity, it executes a query against the Nozomi
    'nodes' endpoint using the entity's identifier (IP or Label).

    4. **Process Results:** If data is found, it selects the most recent record. It
    then extracts a standard set of asset details (OS, MAC, Vendor, etc.) plus any
    optional fields specified in the action parameters.

    5. **Update SecOps:** Updates the entity's additional properties with the retrieved
    data, marks the entity as enriched, and attaches the raw JSON results to the action
    output.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entity additional properties with asset information from Nozomi Networks
      and sets the 'is_enriched' flag to true.
  categories:
    enrichment: true
  entity_usage:
    entity_types:
    - HOSTNAME
    - ADDRESS
