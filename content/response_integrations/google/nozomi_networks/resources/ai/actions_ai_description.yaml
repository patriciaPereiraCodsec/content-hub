Run a CLI Command:
  ai_description: "Executes a CLI command on a Nozomi Networks device via the Nozomi\
    \ API. This action allows administrators to perform operational tasks or configuration\
    \ changes directly from Google SecOps. \n\n### Parameters\n| Parameter | Type\
    \ | Mandatory | Description |\n| :--- | :--- | :--- | :--- |\n| CLI Command |\
    \ String | Yes | The specific CLI command to execute on the Nozomi Networks device.\
    \ Note: The API does not validate the command syntax. |\n\n### Flow Description\n\
    1. **Initialization**: The action initializes the Nozomi Networks manager using\
    \ the provided API URL, credentials, and SSL configuration.\n2. **Parameter Extraction**:\
    \ It retrieves the 'CLI Command' string provided by the user.\n3. **Execution**:\
    \ The action sends a POST request to the `/api/open/cli` endpoint of the Nozomi\
    \ device with the command payload.\n4. **Completion**: If the API returns a successful\
    \ response, the action completes with a success status; otherwise, it logs the\
    \ error and fails.\n\n### Additional Notes\n* This action does not process or\
    \ interact with Google SecOps entities.\n* Users are responsible for ensuring\
    \ the CLI command is valid and safe for the target environment, as the Nozomi\
    \ API does not perform command validation."
