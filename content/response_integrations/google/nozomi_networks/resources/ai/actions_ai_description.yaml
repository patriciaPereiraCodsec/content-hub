Ping:
  ai_description: >-
    ### General Description

    The **Ping** action is a diagnostic tool designed to verify the connectivity between
    Google SecOps and a Nozomi Networks instance. It ensures that the provided integration
    parameters (URL, credentials, and SSL settings) are correct and that the Nozomi
    Networks API is reachable and responding to requests.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | API URL | String | Yes | The base URL of the Nozomi Networks instance (e.g.,
    https://nozomi-instance.com). |

    | Username | String | Yes | The username used for authenticating with the Nozomi
    Networks API. |

    | Password | String | Yes | The password used for authenticating with the Nozomi
    Networks API. |

    | Verify SSL | Boolean | No | If enabled, the action will verify the SSL certificate
    of the Nozomi Networks instance. |

    | CA Certificate File | String | No | A base64-encoded CA certificate file used
    for SSL verification if a custom certificate authority is used. |


    ### Additional Notes

    - This action does not require any input entities and is typically used during
    the initial setup or troubleshooting of the Nozomi Networks integration.

    - The action performs a lightweight query (`node_cpes | head 5`) to confirm API
    functionality.


    ### Flow Description

    1. **Parameter Extraction:** The action retrieves the API URL, credentials, and
    SSL configuration from the integration settings.

    2. **Manager Initialization:** It initializes the `NozomiNetworksManager` with
    the provided connection details, handling CA certificate decoding if provided.

    3. **Connectivity Test:** The manager executes a `test_connectivity` call, which
    sends a GET request to the Nozomi Networks API endpoint `/api/open/query/do` with
    a sample query.

    4. **Result Handling:** If the API returns a successful response, the action completes
    with a success message. If an error occurs (e.g., authentication failure, network
    timeout), it catches the exception and reports a failure.
