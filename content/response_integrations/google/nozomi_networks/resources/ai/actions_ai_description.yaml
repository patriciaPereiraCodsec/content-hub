Run a Query:
  ai_description: >-
    ### General Description

    This action executes a custom query on a Nozomi Networks device to retrieve specific
    data such as alerts, nodes, or vulnerabilities. It is designed as a flexible utility
    to fetch information directly from the Nozomi platform using its native query
    language. Note that this action does not interact with or process Google SecOps
    entities; it operates solely based on the provided query string.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Query | String | Yes | The specific query to execute on the Nozomi Networks
    device (e.g., `alerts | head 10`). |

    | Record Limit | Integer | No | Specifies the maximum number of records to return.
    If provided, the action appends `| head <limit>` to the query. Default is 10.
    Negative values are ignored. |


    ### Additional Notes

    - This action is a generic data retrieval tool and does not perform entity-based
    enrichment.

    - If the `Record Limit` is left empty, the action will return all results provided
    by the Nozomi API for that query.


    ### Flow Description

    1. **Initialization**: The action initializes the Nozomi Networks manager using
    the provided API URL and credentials.

    2. **Query Preparation**: It retrieves the `Query` and `Record Limit` parameters.
    If a positive record limit is provided, it modifies the query string to include
    a `head` command.

    3. **API Execution**: The action sends a GET request to the Nozomi Networks `/api/open/query/do`
    endpoint with the prepared query.

    4. **Data Parsing**: The raw JSON response from Nozomi is parsed into `QueryResult`
    objects.

    5. **Output**: The results are added to the action's JSON output. If no results
    are found, a success message is returned indicating an empty result set.
