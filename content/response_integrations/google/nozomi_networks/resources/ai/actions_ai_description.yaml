List Vulnerabilities:
  ai_description: "### General Description\nLists vulnerabilities discovered by a\
    \ Nozomi Networks device based on user-provided search criteria. This action allows\
    \ security analysts to query the Nozomi 'node_cves' database to identify potential\
    \ security gaps across the network. It supports filtering by specific IP addresses,\
    \ CVE IDs, minimum risk scores, and vulnerability names. \n\n**Note:** This action\
    \ does not automatically process entities from the Google SecOps case; it relies\
    \ entirely on the manual input parameters provided at runtime.\n\n### Parameters\
    \ Description\n| Parameter | Type | Mandatory | Description |\n| :--- | :--- |\
    \ :--- | :--- |\n| IP Address | String | No | A comma-separated list of IP addresses\
    \ to filter vulnerabilities for. |\n| CVE Score | Integer | No | The minimum CVE\
    \ score (0-10) a vulnerability must have to be included in the results. Values\
    \ outside this range are automatically clamped to 0 or 10. |\n| Vulnerability\
    \ Name Contains | String | No | A string filter to match against the vulnerability\
    \ name (CWE name). |\n| CVE ID | String | No | A comma-separated list of specific\
    \ CVE identifiers (e.g., CVE-2020-1207) to search for. |\n| Record Limit | Integer\
    \ | Yes | The maximum number of vulnerability records to return. Defaults to 25.\
    \ |\n| Include vulnerabilities that marked as resolved? | Boolean | No | If set\
    \ to true, the results will include vulnerabilities that have been marked as resolved\
    \ in the Nozomi system. |\n\n### Additional Notes\n- The action produces a UI\
    \ data table titled 'Vulnerabilities Found' and a raw JSON result containing detailed\
    \ vulnerability metadata, including CVE summaries, scores, zones, and reference\
    \ URLs.\n- If no results match the criteria, the action completes successfully\
    \ but indicates that no data was found.\n\n### Flow Description\n1. **Parameter\
    \ Extraction:** The action retrieves the API configuration and user-defined search\
    \ filters (IPs, CVE IDs, Score, etc.).\n2. **Input Validation:** The CVE Score\
    \ is validated and clamped between 0 and 10 if necessary.\n3. **Query Construction:**\
    \ A Nozomi-specific query string is built using the provided filters, targeting\
    \ the `node_cves` endpoint.\n4. **API Execution:** The action performs a GET request\
    \ to the Nozomi Networks API to retrieve matching vulnerability records.\n5. **Data\
    \ Processing:** The raw API response is parsed into vulnerability objects.\n6.\
    \ **Output Generation:** The action populates a data table for the case wall and\
    \ attaches the full JSON result for further automation steps."
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
