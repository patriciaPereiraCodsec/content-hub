name: Scan Resources
description: Scan resources using AWS IAM Access Analyzer.
integration_identifier: AWSIAMAccessAnalyzer
parameters:
-   name: Resource ARNs
    default_value: ''
    type: string
    description: Specify a comma-separated list of resource ARNs that need to be scanned.
    is_mandatory: true
dynamic_results_metadata:
-   result_example_path: resources/scan_resources_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: Admin
is_async: true
simulation_data_json: '{"Entities":[]}'
