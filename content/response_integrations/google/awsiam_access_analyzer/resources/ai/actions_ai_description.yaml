Scan Resources:
  ai_description: >-
    ### General Description

    Initiates and monitors resource scans using AWS IAM Access Analyzer. This action
    allows users to submit specific AWS Resource ARNs for analysis to identify potential
    resource-sharing risks. It operates asynchronously, first triggering the scan
    and then periodically checking for completion until results are available or a
    timeout occurs.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Resource ARNs | String | Yes | A comma-separated list of AWS resource ARNs (e.g.,
    S3 bucket ARNs, IAM role ARNs) that need to be scanned for access risks. |


    ### Additional Notes

    - This is an **asynchronous action**. It will remain in an 'In Progress' state
    until the AWS IAM Access Analyzer finishes scanning the resources or the maximum
    number of retries (10) is reached.

    - The action compares the `analyzedAt` timestamp from AWS with the action's start
    time to ensure that the returned results correspond to the scan initiated by this
    action.


    ### Flow Description

    1. **Initialization**: Extracts AWS configuration (Access Key, Secret Key, Region,
    Analyzer Name) and the list of Resource ARNs to scan.

    2. **Scan Submission (First Run)**: Connects to AWS and calls the `start_resource_scan`
    API for each provided ARN. It records the start time to track the freshness of
    results.

    3. **Status Monitoring (Subsequent Runs)**: Periodically retrieves the analysis
    status for each resource using `get_analyzed_resource`.

    4. **Completion Check**: For each resource, it verifies if the `analyzedAt` timestamp
    is greater than or equal to the action's start time.

    5. **Result Aggregation**: Once all resources are analyzed (or the retry limit
    is hit), it aggregates the findings into a JSON result and completes the execution.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Triggers a new resource scan in AWS IAM Access Analyzer for the specified resource
      ARNs via the start_resource_scan API call.
    fetches_data: true
    internal_data_mutation_explanation: null
  categories:
    enrichment: false
  entity_usage:
