Archive Finding:
  ai_description: >-
    Archives a specific finding in AWS IAM Access Analyzer. This action changes the
    status of a finding to 'ARCHIVED', effectively removing it from the active findings
    list in the AWS console. It requires the name of the analyzer and the specific
    ID of the finding to be processed.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Finding ID | String | Yes | Specify the unique ID of the finding that you want
    to archive. |


    ### Flow Description

    1. **Initialization**: The action extracts AWS configuration (Access Key, Secret
    Key, Region, and Analyzer Name) and the target Finding ID.

    2. **Analyzer Lookup**: It connects to AWS IAM Access Analyzer to retrieve the
    metadata for the specified analyzer, specifically to obtain its ARN (Amazon Resource
    Name).

    3. **Archive Execution**: It calls the AWS API to update the status of the provided
    Finding ID to 'ARCHIVED' within the context of the identified analyzer.

    4. **Completion**: The action reports whether the archival was successful or if
    errors occurred (e.g., analyzer not found or API failure).
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Updates the status of a finding in AWS IAM Access Analyzer to 'ARCHIVED', which
      changes its state in the external AWS environment.
    fetches_data: true
    internal_data_mutation_explanation: null
  categories:
    enrichment: false
  entity_usage:
    entity_types: []
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: false
