    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: false
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
Ping:
  ai_description: >-
    ### General Description

    The **Ping** action is a connectivity test utility for the AWS IAM Access Analyzer
    integration. Its primary purpose is to verify that the Google SecOps environment
    can successfully communicate with the AWS service using the credentials and configuration
    provided in the integration settings. It ensures that the API keys are valid,
    the region is correct, and the specified analyzer exists and is accessible.


    ### Parameters Description

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **AWS Access Key ID** | String | Yes | The AWS Access Key ID used for authentication.
    This is an integration-level configuration parameter. |

    | **AWS Secret Key** | String | Yes | The AWS Secret Access Key used for authentication.
    This is an integration-level configuration parameter. |

    | **AWS Default Region** | String | Yes | The AWS region where the IAM Access
    Analyzer is located (e.g., us-east-1). This is an integration-level configuration
    parameter. |

    | **Analyzer Name** | String | Yes | The name of the specific IAM Access Analyzer
    to verify connectivity against. This is an integration-level configuration parameter.
    |


    ### Additional Notes

    * This action does not require or process any entities.

    * It is typically executed during the initial setup of the integration or for
    troubleshooting connection issues.

    * According to standard SOAR practices, Ping actions are not classified as enrichment
    actions.


    ### Flow Description

    1. **Configuration Extraction:** The action retrieves the AWS Access Key, Secret
    Key, Region, and Analyzer Name from the integration's configuration settings.

    2. **Manager Initialization:** It initializes the `AWSIAMAnalyzerManager` using
    the retrieved credentials and settings.

    3. **Connectivity Verification:** The action calls the `test_connectivity` method,
    which performs a `get_analyzer` API call to AWS to verify the existence and accessibility
    of the specified analyzer.

    4. **Status Reporting:** If the API call succeeds, the action returns a success
    message and sets the execution state to completed. If an exception occurs (e.g.,
    authentication failure or resource not found), it logs the error and returns a
    failure status.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
