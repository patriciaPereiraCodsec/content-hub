Disable User:
  ai_description: >-
    Disables a specific user account in CyberArk Vault using the SCIM v2 API. This
    action is primarily used for containment or access revocation by updating the
    user's active status to false.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | User Name | String | Yes | The full username as it exists in CyberArk Vault.
    |


    ### Flow

    1. **Initialization**: The action initializes the CyberArk Manager using the integration's
    configuration (Username, Password, API Root, and SSL settings).

    2. **Data Retrieval**: It retrieves the current details of the specified user
    from CyberArk to determine their current state.

    3. **Status Modification**: It checks the 'active' attribute. If the user is already
    disabled, it returns success. If the user is active, it performs a PUT request
    to the CyberArk SCIM endpoint to set the 'active' attribute to false.

    4. **Finalization**: The action concludes by providing a success or failure message
    based on the API response.


    ### Additional Notes

    This action does not process entities from the Google SecOps workbench; it relies
    entirely on the 'User Name' parameter provided in the action configuration.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      The action performs a PUT request to the CyberArk SCIM API to change the 'active'
      status of a user account to false, effectively disabling the account in the
      external system.
    fetches_data: true
    internal_data_mutation_explanation: null
  categories:
    enrichment: false
