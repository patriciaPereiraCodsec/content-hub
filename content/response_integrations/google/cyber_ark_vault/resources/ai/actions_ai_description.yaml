Ping:
  ai_description: >-
    ### General Description

    The **Ping** action is a diagnostic tool designed to verify the connectivity between
    Google SecOps and the CyberArk Vault environment. It validates the integration's
    configuration by testing two distinct components: the CyberArk SCIM API (used
    for user and group management) and the Password Vault AIM Web Service (used for
    credential retrieval). This ensures that the provided credentials, API roots,
    and SSL settings are correct and that the network path is open.


    ### Parameters Description

    This action does not take any dynamic input parameters during execution. It relies
    entirely on the integration's global configuration settings:


    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Username | String | Yes | The username used for authentication with the CyberArk
    SCIM API. |

    | Password | String | Yes | The password used for authentication with the CyberArk
    SCIM API. |

    | Use SSL | Boolean | No | If true, the action will verify the SSL certificate
    of the CyberArk server. |

    | Api Root | String | Yes | The base URL for the CyberArk SCIM API. |

    | Password Vault Api Root | String | Yes | The base URL for the CyberArk Password
    Vault AIM Web Service. |

    | Application ID | String | Yes | The Application ID required for AIM Web Service
    authentication. |


    ### Additional Notes

    - This action is typically used during the initial setup of the integration or
    for troubleshooting connection issues.

    - If any part of the connectivity test fails (either the SCIM API or the AIM Web
    Service), the action will raise an exception and report a failure.


    ### Flow Description

    1. **Configuration Retrieval:** The action fetches the integration's configuration
    parameters, including credentials and API endpoints.

    2. **SCIM Connectivity Test:** It initializes the `CyberarkManager` and attempts
    to retrieve a list of users from the SCIM API. If this request fails, an error
    is raised.

    3. **Password Vault Connectivity Test:** It initializes the `PasswordVaultManager`
    and attempts to query a mock account via the AIM Web Service. A successful connection
    (even if it returns a 404 for the mock account) validates the service's availability.

    4. **Completion:** If both tests succeed without exceptions, the action returns
    a success message and a boolean result of `true`.
