Get Group Details:
  ai_description: >-
    Retrieves comprehensive details for a specific group from CyberArk Vault using
    the SCIM API. This action is used to gather administrative context about group
    memberships and attributes within the vault environment.


    ### Parameters

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Group Name | String | Yes | The full name of the group as it exists in CyberArk
    Vault. |


    ### Flow Description

    1. **Initialization**: Connects to the CyberArk Vault instance using the configured
    API Root, Username, and Password.

    2. **Data Retrieval**: Executes a GET request to the CyberArk SCIM endpoint for
    Groups using the provided 'Group Name'.

    3. **Processing**: If the group is found, the JSON response is flattened into
    a key-value format.

    4. **Output**: The flattened data is converted to a CSV format and attached to
    the Google SecOps case as a data table named '[Group Name] Details:'.

    5. **Completion**: Returns a success status if the group details were retrieved,
    or a failure status if the group was not found.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      The action adds a data table containing the retrieved group details to the Google
      SecOps case.
  categories:
    enrichment: false
