    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
Enable User:
  ai_description: >-
    Enables a user account in CyberArk Vault using the SCIM API. This action retrieves
    the current status of a specified user and, if they are currently disabled, updates
    their 'active' attribute to 'True'.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | User Name | String | Yes | The full username as it exists in CyberArk Vault
    that needs to be enabled. |


    ### Flow Description

    1. **Authentication**: Initializes the CyberArk Manager using the integration
    configuration (Username, Password, API Root).

    2. **Data Retrieval**: Fetches the current details of the user specified in the
    'User Name' parameter to check their existing status.

    3. **Status Check**: Compares the desired 'active' status (True) with the user's
    current status.

    4. **Mutation**: If the user is not already enabled, it sends a PUT request to
    the CyberArk SCIM endpoint to update the user's 'active' attribute to True.

    5. **Reporting**: Returns a success message if the user is enabled or an error
    message if the operation fails.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Updates the 'active' attribute of a user account to 'True' in CyberArk Vault
      via a PUT request to the SCIM API.
    fetches_data: true
    internal_data_mutation_explanation: null
  categories:
    enrichment: false
