Get User Details:
  ai_description: >-
    ### General Description

    The **Get User Details** action retrieves comprehensive information about a specific
    user from the CyberArk Vault. It is used to fetch metadata such as user attributes,
    group memberships, and account status directly from the CyberArk SCIM API. This
    action is primarily used for administrative auditing or gathering context during
    an investigation.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | User Name | String | Yes | The full username as it appears in the CyberArk Vault.
    |


    ### Flow Description

    1. **Configuration Retrieval:** The action starts by fetching the CyberArk Vault
    integration settings (API Root, Credentials, SSL).

    2. **API Request:** It constructs a GET request to the CyberArk SCIM endpoint
    for the specific user provided in the 'User Name' parameter.

    3. **Data Processing:** If the user is found, the JSON response is flattened into
    a key-value format.

    4. **Output Generation:** The flattened data is attached to the action as a data
    table for visibility in the SOAR interface.

    5. **Completion:** The action concludes with a success message if data was retrieved,
    or a 'User not found' message otherwise.


    ### Additional Notes

    This action does not process entities from the alert scope; it relies entirely
    on the manual 'User Name' input parameter.
