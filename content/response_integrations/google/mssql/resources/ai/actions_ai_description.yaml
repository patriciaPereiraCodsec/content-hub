    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
RunSQLQuery:
  ai_description: >-
    ### General Description

    This action executes a SQL query against a Microsoft SQL Server (MSSQL) database.
    It is designed to retrieve data for enrichment or perform database operations
    like updates or deletions. The action supports various authentication methods,
    including standard SQL authentication, Windows Authentication, and Kerberos. Results
    are returned as a JSON object and attached as a CSV data table to the action's
    output.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Database Name | String | Yes | The specific database name within the MSSQL instance
    where the query will be executed. |

    | Query | String | Yes | The SQL query string to be executed (e.g., `SELECT *
    FROM Users`). |

    | Commit | Boolean | No | If set to `True`, the action will commit the transaction
    to the database. This is required for queries that modify data (INSERT, UPDATE,
    DELETE). Default is `False`. |


    ### Additional Notes

    - The action's behavior regarding data modification depends entirely on the `Commit`
    parameter and the nature of the SQL query provided.

    - Connection details (Server, Port, Credentials) are managed via the integration's
    configuration parameters.


    ### Flow Description

    1. **Parameter Initialization**: The action retrieves connection settings (Server,
    Credentials, Auth type) from the integration configuration and query details from
    the action parameters.

    2. **Connection Establishment**: It initializes the `MSSQLManager` and attempts
    to establish a connection to the target database using the specified authentication
    method (Standard, Windows, or Kerberos).

    3. **Query Execution**: The provided SQL query is executed against the database.

    4. **Transaction Handling**: If the `Commit` parameter is enabled, the action
    explicitly commits the transaction to ensure changes are saved in the external
    system.

    5. **Data Processing**: If the query returns rows (e.g., a `SELECT` statement),
    the results are parsed into a list of dictionaries.

    6. **Output Generation**: The results are converted into a CSV format for the
    data table and a JSON string for the script results. The action then terminates
    with a success message and the retrieved data.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      If the 'Commit' parameter is set to true, the action can execute and persist
      data modification queries such as INSERT, UPDATE, or DELETE in the external
      MSSQL database.
    fetches_data: true
    internal_data_mutation_explanation: null
  categories:
    enrichment: false
  entity_usage:
    entity_types: []
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
