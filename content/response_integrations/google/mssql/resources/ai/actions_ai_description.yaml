Ping:
  ai_description: >-
    ### General Description

    The **Ping** action is designed to verify the connectivity and authentication
    configuration between Google SecOps and a Microsoft SQL Server instance. It serves
    as a diagnostic tool to ensure that the integration can successfully reach the
    database server and establish a session using the provided credentials and network
    settings.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Database Name For Testing | String | Yes | The name of the database on the SQL
    Server instance to use for the connection test. |


    ### Flow Description

    1. **Configuration Retrieval**: The action extracts connection parameters from
    the integration settings, including the server address, port, authentication type
    (SQL, Windows, or Kerberos), and credentials.

    2. **Manager Initialization**: It initializes the `MSSQLManager` with the retrieved
    configuration and the specific database name provided as an action parameter.

    3. **Authentication Handling**: If Kerberos authentication is enabled, the action
    attempts to obtain a Kerberos ticket by executing the `kinit` command.

    4. **Connection Test**: The action attempts to establish a connection using the
    `pyodbc` library, checking for compatible ODBC drivers installed on the system.

    5. **Outcome Reporting**: If the connection is established without error, the
    action returns a success status. If an exception occurs during the connection
    process, it captures the error and reports a failure.


    ### Additional Notes

    - This action is strictly for testing connectivity and does not retrieve, modify,
    or delete any data within the SQL Server.

    - It supports multiple authentication methods, including standard SQL login, Windows
    Authentication, and Kerberos.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: false
    internal_data_mutation_explanation: null
  categories:
    enrichment: false
  entity_usage:
    entity_types: []
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: false
    filters_by_identifier: false
    filters_by_is_artifact: false
    filters_by_is_enriched: false
