name: RunSQLQuery
description: Run a SQL query
integration_identifier: MSSQL
parameters:
-   name: Database Name
    default_value: ''
    type: string
    description: The DB name to run the query on
    is_mandatory: true
-   name: Query
    default_value: ''
    type: string
    description: 'The query to run. Default: SELECT * FROM <>'
    is_mandatory: true
-   name: Commit
    default_value: 'false'
    type: boolean
    description: If set to true, will commit the changes to the DB
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/run_sql_query_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
script_result_name: results
