Disconnect Sessions:
  ai_description: >-
    ### General Description

    This action disconnects active sessions from an F5 BIG-IP Access Policy Manager
    (APM) instance. It allows security administrators to terminate specific user sessions
    based on session identifiers, usernames, or client IP addresses. The action can
    be configured to automatically target entities present in the Google SecOps case
    or to use manually provided parameters.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Use Case Entities | Boolean | No | If set to `True`, the action will use IP
    Address and User entities found in the case to identify sessions. If `True`, manual
    parameters (Session IDs, Logon User Names, Client IPs) are ignored. Default is
    `False`. |

    | Session IDs | String | No | A comma-separated list of specific F5 session IDs
    to disconnect. |

    | Logon User Names | String | No | A comma-separated list of usernames. Any active
    session associated with these users will be disconnected. |

    | Client IPs | String | No | A comma-separated list of client IP addresses. Any
    active session originating from these IPs will be disconnected. |


    ### Additional Notes

    * **Logic:** The action uses an 'OR' logic for filtering. Any session matching
    at least one of the provided criteria (ID, User, or IP) will be targeted for disconnection.

    * **Verification:** After sending the disconnect command, the action performs
    a follow-up check by re-listing active sessions to verify that the targeted sessions
    were successfully removed.

    * **Precedence:** If `Use Case Entities` is enabled, the action strictly processes
    case entities and ignores the manual CSV input fields.


    ### Flow Description

    1. **Initialization:** Retrieves connection details (API root, credentials, SSL
    settings) and action parameters.

    2. **Target Identification:** Depending on the `Use Case Entities` flag, it either
    collects identifiers from the case's `ADDRESS` and `USER` entities or parses the
    provided CSV strings for Session IDs, Usernames, and IPs.

    3. **Session Retrieval:** Fetches the complete list of currently active sessions
    from the F5 BIG-IP APM via a GET request.

    4. **Matching:** Compares the target identifiers against the active session data
    to find the internal F5 session IDs.

    5. **Termination:** Executes a DELETE request for each matched session ID to terminate
    the connection.

    6. **Verification:** Retrieves the active session list again to confirm the sessions
    are no longer present.

    7. **Reporting:** Returns a summary message indicating which sessions were successfully
    disconnected, which failed, and which targets were not found in the active session
    list.
