List Active Sessions:
  ai_description: >-
    ### General Description

    The **List Active Sessions** action retrieves a list of all currently active sessions
    from the F5 BIG-IP Access Policy Manager (APM). This action is primarily used
    for visibility and monitoring, allowing security analysts to see who is currently
    connected to the network via the APM and from which IP addresses.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Limit** | String | No | Specifies the maximum number of session entries to
    retrieve from the F5 BIG-IP APM. If left empty or set to 0, the action will attempt
    to retrieve all available sessions or follow the system's default limit. |


    ### Flow Description

    1. **Authentication**: The action initializes a connection to the F5 BIG-IP APM.
    It manages authentication tokens automatically, including generation, encryption
    for local storage, and periodic updates of the token timeout.

    2. **Session Retrieval**: It executes a GET request to the F5 Access Info endpoint,
    incorporating the `Limit` parameter to restrict the result set size.

    3. **Data Parsing**: The raw response from F5 is parsed to extract key session
    details such as the `sessionID`, `clientIp`, and `logonUser`.

    4. **Result Output**: The list of active sessions is formatted as a JSON array
    and attached to the action results for use in playbooks.


    ### Additional Notes

    This action does not operate on specific entities (like IPs or Users) within the
    SOAR case; instead, it queries the external system for a global list of active
    sessions.
