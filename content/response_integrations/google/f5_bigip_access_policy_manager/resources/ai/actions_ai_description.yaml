Ping:
  ai_description: >-
    ### General Description

    The **Ping** action is designed to verify the connectivity between Google SecOps
    and the F5 BIG-IP Access Policy Manager (APM). It ensures that the provided credentials
    and network path are valid by attempting to authenticate and perform a basic API
    call to the management interface.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | BIG-IP APM Address | String | Yes | The base URL of the F5 BIG-IP APM instance
    (e.g., `https://10.0.0.1`). |

    | User Name | String | Yes | The username used to authenticate with the F5 BIG-IP
    APM. |

    | Password | String | Yes | The password used to authenticate with the F5 BIG-IP
    APM. |

    | Token Timeout (in Seconds) | Integer | No | If provided, the action will attempt
    to set the expiration timeout for the generated authentication token. |

    | Verify SSL | Boolean | Yes | If enabled, the action will verify the SSL certificate
    of the F5 BIG-IP APM server. |


    ### Flow Description

    1. **Parameter Extraction:** The action retrieves the connection details and credentials
    from the integration configuration.

    2. **Manager Initialization:** It initializes the F5 BIG-IP APM Manager, which
    automatically triggers the authentication flow.

    3. **Authentication (Token Mechanism):** The manager checks for a locally cached
    token. If no valid token exists, it sends a **POST** request to the login endpoint
    to generate a new one. If a `Token Timeout` is specified, it sends a **PATCH**
    request to update the token's lifespan.

    4. **Connectivity Test:** It performs a **GET** request to the tokens endpoint
    to confirm the session is active and the credentials have the necessary permissions.

    5. **Result Reporting:** The action returns a success message if the handshake
    completes or an error message if any step fails.


    ### Additional Notes

    - This action does not process any entities and is used strictly for troubleshooting
    and initial setup verification.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      The action creates a new authentication token on the F5 BIG-IP APM via a POST
      request and may update the token's timeout value via a PATCH request during
      the connectivity test.
    fetches_data: false
    internal_data_mutation_explanation: null
