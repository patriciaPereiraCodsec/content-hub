name: Disconnect Sessions
description: The action will disconnect the specified sessions from the F5 BIG-IP
    instance. Action can work using entities or using parameters, according to the
    Use Case Entities parameter’s value. Supported entities are Address and User Name.
    NOTE - Filters will be used with an OR logic, so that every session that even
    one of the parameters, or entities, will be matched in - will be disconnected.
integration_identifier: F5BIGIPAccessPolicyManager
parameters:
-   name: Use Case Entities
    default_value: 'False'
    type: boolean
    description: Specify whether the action should disconnect sessions using Address
        and Client IP entities found in the case, or work on the provided parameters
        only. NOTE - once checked, action will ignore all other parameters in the
        action
    is_mandatory: false
-   name: Session IDs
    default_value: ''
    type: string
    description: Specify specific session IDs you would like to disconnect, in a comma
        separated list
    is_mandatory: false
-   name: Logon User Names
    default_value: ''
    type: string
    description: Specify Logon User Names you would like to disconnect sessions for,
        in a comma separated list, so only sessions for these Logon User Names will
        be disconnected.
    is_mandatory: false
-   name: Client IPs
    default_value: ''
    type: string
    description: Specify Client IPs you would like to disconnect the sessions for,in
        a comma separated list, so only sessions for these Client IPs will be disconnected.
    is_mandatory: false
dynamic_results_metadata: []
creator: admin
simulation_data_json: '{"Entities": ["USERUNIQNAME","ADDRESS"]}'
