Enrich Entities:
  ai_description: >-
    ### General Description

    Enriches IP Address and MAC Address entities using information retrieved from
    ForeScout CounterACT. This action provides deep visibility into network endpoints
    by fetching details such as online status, OS classification, hardware vendor,
    and agent information. The retrieved data is used to update entity attributes,
    populate data tables, and optionally create detailed case insights.


    ### Parameters Description

    | Parameter | Type | Mandatory | Default | Description |

    | :--- | :--- | :--- | :--- | :--- |

    | Create Insight | Boolean | No | True | If enabled, the action will generate
    a formatted insight on the case wall for each successfully enriched entity, highlighting
    key details like online status and classification. |


    ### Flow Description

    1. **Authentication**: The action authenticates with the ForeScout CounterACT
    API using the provided credentials to retrieve a session token.

    2. **Entity Filtering**: It identifies supported entities from the target list,
    specifically focusing on IP Addresses (`ADDRESS`) and MAC Addresses (`MacAddress`).

    3. **Data Retrieval**: For each supported entity, the action queries the ForeScout
    API. For MAC addresses, it automatically strips colons from the identifier to
    match the expected API format.

    4. **Internal Enrichment**: If endpoint information is found, the action updates
    the entity's additional properties with ForeScout data (prefixed with 'FSCACT')
    and marks the entity as enriched.

    5. **Reporting**: It constructs a CSV-formatted data table for the entity and,
    if the `Create Insight` parameter is set to true, generates a visual insight.

    6. **Finalization**: The action updates the entities within Google SecOps and
    returns a JSON result containing the raw data for further downstream processing.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entity attributes with enrichment data, marks entities as enriched,
      adds entity data tables, and creates case insights.
  categories:
    enrichment: true
  entity_usage:
    entity_types:
    - ADDRESS
    - MacAddress
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: true
    filters_by_identifier: false
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: false
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
Ping:
  ai_description: >-
    ### General Description

    Tests connectivity to the ForeScout CounterACT server to ensure that the provided
    configuration parameters are correct and the service is reachable. This action
    validates credentials by attempting to authenticate and retrieve a JSON Web Token
    (JWT).


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | API Root | String | Yes | The API root URL of the ForeScout CounterACT instance.
    |

    | Username | String | Yes | The username used for authentication. |

    | Password | String | Yes | The password used for authentication. |

    | CA Certificate File | String | No | Base64 encoded CA certificate file used
    for SSL verification. |

    | Verify SSL | Boolean | Yes | If enabled, the SSL certificate will be verified.
    |


    ### Additional Notes

    This action is primarily used for troubleshooting and verifying the integration
    setup. It does not interact with any entities or modify any data.


    ### Flow Description

    1. **Parameter Extraction**: Retrieves connection details including the API Root,
    Username, Password, and SSL configuration from the integration settings.

    2. **Manager Initialization**: Instantiates the ForeScout CounterACT Manager,
    which configures the HTTP session and handles CA certificate decoding if a certificate
    is provided.

    3. **Authentication Attempt**: The manager automatically attempts to log in by
    sending a POST request to the `/api/login` endpoint using the provided credentials.

    4. **Execution Outcome**: If a JWT token is successfully returned, the action
    reports a successful connection. If an error occurs (e.g., 401 Unauthorized, connection
    timeout), the action catches the exception and returns a failure status with the
    error message.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
  categories:
    enrichment: false
  entity_usage:
    entity_types: []
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: false
    filters_by_identifier: false
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: false
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
