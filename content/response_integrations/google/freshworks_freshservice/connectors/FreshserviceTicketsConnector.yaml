name: Freshservice Tickets Connector
parameters:
-   name: DeviceProductField
    default_value: Product Name
    type: string
    description: Enter the source field name in order to retrieve the Product Field
        name.
    is_mandatory: true
    is_advanced: true
    mode: regular
-   name: EventClassId
    default_value: type
    type: string
    description: Enter the source field name in order to retrieve the Event Field
        name.
    is_mandatory: true
    is_advanced: true
    mode: regular
-   name: Environment Field Name
    default_value: ''
    type: string
    description: Describes the name of the field where the environment name is stored.
        If the environment field isn't found, the environment is the default environment.
    is_mandatory: false
    is_advanced: true
    mode: script
-   name: Environment Regex Pattern
    default_value: .*
    type: string
    description: A regex pattern to run on the value found in the "Environment Field
        Name" field. Default is .* to catch all and return the value unchanged. Used
        to allow the user to manipulate the environment field via regex logic. If
        the regex pattern is null or empty, or the environment value is null, the
        final environment result is the default environment.
    is_mandatory: false
    is_advanced: true
    mode: script
-   name: PythonProcessTimeout
    default_value: 300
    type: integer
    description: Timeout limit for the python process running the current script.
    is_mandatory: true
    is_advanced: true
    mode: script
-   name: API Root
    default_value: https://yourdomain.freshservice.com
    type: string
    description: Freshservice instance API Root.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: API Key
    default_value: ''
    type: password
    description: Freshservice API Key to use in integration.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Verify SSL
    default_value: true
    type: boolean
    description: If enabled, integration will try to verify that API Root is configured
        with a valid certificate.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Offset time in hours
    default_value: 24
    type: integer
    description: Number of hours before the first connector iteration to retrieve
        tickets from. This parameter applies to the initial connector iteration after
        you enable the connector for the first time, or used as a fallback value in
        cases where connector's last run timestamp expires.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Max Tickets Per Cycle
    default_value: 30
    type: integer
    description: How many tickets should be processed during one connector run.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Minimum Priority to Fetch
    default_value: Medium
    type: string
    description: 'Minimum priority of the ticket to be ingested to Siemplify, for
        example, Low or Medium. Possible values: Low, Medium, High, Urgent'
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Tickets Status to Fetch
    default_value: Open, Closed
    type: string
    description: 'Ticket statuses to be ingested to Siemplify. Parameter accepts multiple
        values as a comma separated string. Possible values: Open, Pending, Resolved,
        Closed'
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Use dynamic list as a blocklist
    default_value: false
    type: boolean
    description: If enabled, dynamic list will be used as a blocklist.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Proxy Server Address
    default_value: ''
    type: string
    description: The address of the proxy server to use.
    is_mandatory: false
    is_advanced: true
    mode: script
-   name: Proxy Username
    default_value: ''
    type: string
    description: The proxy username to authenticate with.
    is_mandatory: false
    is_advanced: true
    mode: script
-   name: Proxy Password
    default_value: ''
    type: password
    description: The proxy password to authenticate with.
    is_mandatory: false
    is_advanced: true
    mode: script
-   name: Workspace ID
    default_value: ''
    type: string
    description: ID of the workspace that should be used to fetch tickets. If nothing
        is provided, the action will fetch tickets only from the primary workspace.
        To fetch tickets from all workspaces provide “0” in the parameter.
    is_mandatory: false
    is_advanced: false
    mode: script
description: Connector can be used to fetch Freshservice tickets to create Siemplify
    alerts from. Connector whitelist can be used to ingest only specific types of
    tickets - Incident or Service Request
integration: FreshworksFreshservice
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/freshworks-freshservice#freshservice-tickets-connector
rules: []
is_connector_rules_supported: false
creator: admin
