Update Agent:
  ai_description: >-
    ### General Description

    Updates an existing Freshservice Agent's profile. This action allows modification
    of various agent attributes including personal details, job title, group memberships,
    department associations, and custom fields. Note that this action does not operate
    on Google SecOps entities but relies on manual input parameters.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Agent ID | Integer | Yes | The unique identifier of the agent to update. |

    | Email | String | No | New email address for the agent. |

    | First Name | String | No | New first name for the agent. |

    | Last Name | String | No | New last name for the agent. |

    | Is occasional | Boolean | No | If enabled, the agent is set as an occasional
    agent; otherwise, full-time. |

    | Can See All Tickets From Associated Departments | Boolean | No | If enabled,
    the agent can view all tickets from their associated departments. |

    | Departments | String | No | Comma-separated list of department names to associate
    with the agent. |

    | Location | String | No | The name of the location to associate with the agent.
    |

    | Group Memberships | String | No | Comma-separated list of group names the agent
    should belong to. |

    | Roles | String | No | JSON string defining roles to add (e.g., `{'role_id':123,'assignment_scope':
    'entire_helpdesk'}`). |

    | Job Title | String | No | The agent's job title. |

    | Custom Fields | String | No | JSON object containing custom field keys and values.
    |


    ### Flow Description

    1. **Initialization**: Validates the mandatory `Agent ID` and ensures it is a
    positive value.

    2. **Data Parsing**: Converts CSV strings (Departments, Group Memberships) into
    lists and JSON strings (Roles, Custom Fields) into dictionaries.

    3. **ID Resolution**: Queries Freshservice to retrieve existing groups, departments,
    and locations to map the provided names to their respective internal IDs.

    4. **API Execution**: Calls the Freshservice API to update the agent's profile
    with the provided information using a PUT request.

    5. **Result Handling**: Returns the updated agent object as a JSON result.


    ### Additional Notes

    - This action requires the `Agent ID` to be known beforehand.

    - If names for Departments, Groups, or Locations are provided but do not exist
    in Freshservice, the action will fail with a validation error.
