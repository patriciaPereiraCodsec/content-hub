Create Ticket:
  ai_description: >-
    ### General Description

    Creates a new ticket in Freshservice, specifically of the 'Incident' type. This
    action allows for comprehensive ticket creation by specifying core fields like
    subject, description, and requester, while also supporting assignments to specific
    agents, groups, or departments. It handles priority, urgency, and impact levels,
    and allows for the inclusion of tags, custom fields, and file attachments.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Subject** | String | Yes | The subject line for the new ticket. |

    | **Description** | String | Yes | The HTML or text content describing the incident.
    |

    | **Requester Email** | String | Yes | The email address of the user requesting
    the ticket. |

    | **Agent Assign To** | String | No | The email address of the Freshservice agent
    to whom the ticket should be assigned. |

    | **Group Assign To** | String | No | The name of the agent group to which the
    ticket should be assigned. |

    | **Department Name** | String | No | The name of the department associated with
    the ticket (case-sensitive). |

    | **Priority** | Enum | Yes | The priority level: Low, Medium, High, or Urgent.
    |

    | **Urgency** | Enum | No | The urgency level: Low, Medium, or High. |

    | **Impact** | Enum | No | The impact level: Low, Medium, or High. |

    | **Tags** | String | No | A comma-separated list of tags to apply to the ticket.
    |

    | **Custom Fields** | String | No | A JSON object string containing custom field
    keys and values (e.g., `{"key1":"value1"}`). |

    | **File Attachments to Add** | String | No | A comma-separated list of full file
    paths to be uploaded as attachments. |


    ### Additional Notes

    - **Attachment Limit:** The total size of all provided file attachments must not
    exceed 15MB.

    - **Priority Calculation:** Freshservice may dynamically calculate priority based
    on Urgency and Impact if configured in the Freshservice UI.

    - **Incident Type:** Currently, the Freshservice API v2 primarily supports the
    'Incident' type for ticket creation via this endpoint.


    ### Flow Description

    1. **Validation:** The action first checks if the specified file attachments exist
    on the local system and ensures their total size is under the 15MB limit.

    2. **ID Resolution:** If an agent email, group name, or department name is provided,
    the action performs lookups via the Freshservice API to retrieve the corresponding
    internal IDs.

    3. **Data Preparation:** It parses the tags (from CSV) and custom fields (from
    JSON string) into the required formats.

    4. **Ticket Creation:** It sends a POST request to the Freshservice API. If attachments
    are included, it uses a multipart/form-data request; otherwise, it sends a standard
    JSON payload.

    5. **Result Handling:** Upon successful creation, the action returns the full
    ticket object in JSON format and sets the execution status to completed.
