    Deactivates a specific requester in Freshservice using their unique Requester
    ID. This action performs a state change in the external Freshservice system by
    disabling the requester's account, preventing them from logging in or raising
    new tickets. It is important to note that this action does not process or interact
    with Google SecOps entities; it relies solely on the provided manual input ID.


    ### Parameters

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Requester ID | Integer | Yes | The unique numerical identifier of the requester
    to be deactivated in Freshservice. Must be a positive number. |


    ### Flow Description

    1. **Parameter Extraction:** The action retrieves the API configuration (Root,
    Key, SSL) and the mandatory 'Requester ID' from the input.

    2. **Validation:** It verifies that the provided 'Requester ID' is a positive
    integer.

    3. **API Interaction:** The action initializes the Freshservice manager and sends
    a DELETE request to the `/api/v2/requesters/{requester_id}` endpoint.

    4. **Error Handling:** It specifically handles cases where the requester is not
    found or if the deactivation is not allowed (e.g., if the requester is already
    deactivated).

    5. **Finalization:** The action reports the success or failure of the deactivation
    process to the case wall.
