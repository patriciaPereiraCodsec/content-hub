Add a Ticket Note:
  ai_description: >-
    ### General Description

    Adds a note to a specific ticket in Freshservice. This action allows users to
    append either private or public comments to an existing ticket, facilitating communication
    and documentation within the Freshservice platform. It does not operate on Google
    SecOps entities but rather targets a specific ticket ID provided as an input parameter.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Ticket ID | Integer | Yes | The unique identifier of the Freshservice ticket
    to which the note will be added. Must be a positive number. |

    | Note Type | Selection | No | Specifies the visibility of the note. Options are
    'Private' (default) or 'Public'. |

    | Note Text | String | Yes | The actual content/text of the note to be added to
    the ticket. |


    ### Additional Notes

    - This action is independent of the entities present in the current Google SecOps
    context.

    - If the specified Ticket ID does not exist in Freshservice, the action will report
    that the ticket was not found rather than failing the execution.


    ### Flow Description

    1. **Parameter Extraction**: Retrieves the API configuration (Root, Key, SSL)
    and action parameters (Ticket ID, Note Type, Note Text).

    2. **Validation**: Checks if the provided Ticket ID is a positive integer.

    3. **Manager Initialization**: Establishes a connection to the Freshservice API
    using the provided credentials.

    4. **API Interaction**: Sends a POST request to the Freshservice endpoint `/api/v2/tickets/{ticket_id}/notes`
    with the note content and visibility status.

    5. **Result Processing**: Captures the API response containing the created note's
    details, adds it to the action's JSON results, and provides a success message.
