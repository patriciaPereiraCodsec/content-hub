Add Ticket Time Entry:
  ai_description: >-
    Adds a time entry to a specific Freshservice ticket. This action allows users
    to log work duration against a ticket for a specific agent. It requires mapping
    the agent's email to their internal ID and then submitting the time entry details
    including duration, notes, and billable status.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Ticket ID | Integer | Yes | The unique identifier of the Freshservice ticket.
    Must be a positive number. |

    | Agent Email | String | Yes | The email address of the agent for whom the time
    entry is being added. |

    | Time Spent | String | Yes | The amount of time spent in 'hh:mm' format. |

    | Note | String | No | A descriptive note for the time entry. |

    | Billable | Boolean | No | Indicates if the time entry is billable. Defaults
    to false. |

    | Custom Fields | String | No | A JSON object containing custom fields to be added
    to the time entry. Example: `{"key1":"value1"}`. |


    ### Flow Description

    1. **Parameter Extraction**: The action retrieves the Ticket ID, Agent Email,
    Time Spent, and other optional parameters from the input.

    2. **Agent Identification**: It fetches the list of all agents from Freshservice
    to find the internal Agent ID associated with the provided email address.

    3. **Validation**: It ensures the Ticket ID is a positive integer and parses the
    Custom Fields JSON string into a dictionary if provided.

    4. **Time Entry Creation**: It sends a POST request to the Freshservice API to
    create the time entry for the specified ticket and agent.

    5. **Result Handling**: The action returns the details of the created time entry
    as a JSON result and provides a success message.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Creates a new time entry record for a specific ticket in the Freshservice system.
    fetches_data: true
    internal_data_mutation_explanation: null
