Deactivate Agent:
  ai_description: >-
    ### General Description

    Deactivates a specific agent in Freshservice using their unique Agent ID. This
    action is primarily used for administrative tasks such as offboarding or as a
    security response to disable compromised accounts. It is important to note that
    this action does not process Google SecOps entities; it operates strictly based
    on the provided numerical Agent ID.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Agent ID | Integer | Yes | The unique numerical identifier of the Freshservice
    agent to be deactivated. The value must be a positive integer. |


    ### Flow Description

    1. **Initialization**: The action retrieves the integration configuration (API
    Root, API Key, and SSL verification settings) and the mandatory `Agent ID` parameter.

    2. **Validation**: Checks if the provided `Agent ID` is a positive number. If
    not, the action fails with a validation error.

    3. **API Interaction**: The action uses the Freshservice Manager to send a DELETE
    request to the agent deactivation endpoint (`/api/v2/agents/{agent_id}`).

    4. **Result Handling**: Upon success, the action retrieves the updated agent object
    (now marked as inactive), attaches it as a JSON result, and provides a success
    message. If the agent is not found or the user is unauthorized, it logs the error
    and provides a descriptive failure message.
