Update Ticket:
  ai_description: "### General Description\nUpdates an existing ticket in Freshservice\
    \ with new information. This action allows for modifying various ticket attributes\
    \ such as status, priority, assignee, and description. It also supports adding\
    \ file attachments and custom fields. \n\n### Parameters Description\n| Parameter\
    \ | Type | Mandatory | Description |\n| :--- | :--- | :--- | :--- |\n| Ticket\
    \ ID | Integer | Yes | The unique identifier of the ticket to be updated. |\n\
    | Status | Enum | No | The new status of the ticket (Open, Pending, Resolved,\
    \ Closed). |\n| Subject | String | No | The new subject line for the ticket. |\n\
    | Description | String | No | The new HTML description for the ticket. |\n| Requester\
    \ Email | String | No | The email address of the requester to be updated. |\n\
    | Agent Assign To | String | No | The email address of the agent to whom the ticket\
    \ should be assigned. |\n| Group Assign To | String | No | The name of the group\
    \ to which the ticket should be assigned. |\n| Priority | Enum | No | The new\
    \ priority level (Low, Medium, High, Urgent). |\n| Urgency | Enum | No | The new\
    \ urgency level (Low, Medium, High). |\n| Impact | Enum | No | The new impact\
    \ level (Low, Medium, High). |\n| Tags | String | No | Comma-separated list of\
    \ tags. **Note:** This replaces all existing tags due to API limitations. |\n\
    | Custom Fields | JSON String | No | A JSON object containing custom field keys\
    \ and values. |\n| File Attachments to Add | String | No | Comma-separated full\
    \ paths of files to upload. Total size must not exceed 15MB. |\n\n### Additional\
    \ Notes\n- At least one parameter (other than Ticket ID) must be provided for\
    \ the action to execute.\n- Providing tags will overwrite any existing tags on\
    \ the ticket due to Freshservice API limitations.\n- The total size of all file\
    \ attachments must be under 15MB.\n\n### Flow Description\n1. **Initialization**:\
    \ Extracts configuration and action parameters.\n2. **Validation**: Ensures the\
    \ Ticket ID is positive and validates that at least one update field is provided.\n\
    3. **Attachment Check**: If file paths are provided, verifies their existence\
    \ and calculates the total size to ensure it is within the 15MB limit.\n4. **Identity\
    \ Resolution**: If an agent email or group name is provided, the action fetches\
    \ the corresponding internal IDs from Freshservice using GET requests.\n5. **Data\
    \ Mapping**: Converts human-readable statuses, priorities, urgencies, and impacts\
    \ into the numeric codes required by the Freshservice API.\n6. **API Execution**:\
    \ Sends a PUT request to the Freshservice endpoint to update the ticket.\n7. **Output**:\
    \ Returns the updated ticket details in JSON format."
