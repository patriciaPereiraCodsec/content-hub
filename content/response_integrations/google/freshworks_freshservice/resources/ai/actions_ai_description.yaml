Update Ticket Time Entry:
  ai_description: >-
    Updates an existing time entry associated with a specific ticket in Freshservice.
    This action allows for modifying details such as the assigned agent (via email
    resolution), the duration of time spent, billable status, notes, and custom fields.
    It does not operate on Google SecOps entities but rather uses direct identifiers
    provided as parameters.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Ticket ID | Integer | Yes | The unique identifier of the Freshservice ticket.
    |

    | Time Entry ID | Integer | Yes | The unique identifier of the time entry to be
    updated. |

    | Agent Email | String | No | The email address of the agent to whom the time
    entry should be assigned. The action will resolve this to an Agent ID. |

    | Note | String | No | A descriptive note to add or update on the time entry.
    |

    | Time Spent | String | No | The duration of time spent in 'hh:mm' format. |

    | Billable | Boolean | No | If enabled, marks the time entry as billable. |

    | Custom Fields | String | No | A JSON object string containing custom fields
    to append to the time entry (e.g., '{"key1":"value1"}'). |


    ### Flow

    1. **Initialization**: Sets up the Freshservice manager using API credentials.

    2. **Parameter Validation**: Validates that Ticket ID and Time Entry ID are positive
    integers and parses the Custom Fields JSON string if provided.

    3. **Agent Resolution**: If an Agent Email is provided, the action fetches all
    agents from Freshservice to find the matching Agent ID.

    4. **Update Execution**: Sends a PUT request to the Freshservice API to update
    the specific time entry with the provided data.

    5. **Output**: Returns the updated time entry object as a JSON result and provides
    a success message upon completion.
