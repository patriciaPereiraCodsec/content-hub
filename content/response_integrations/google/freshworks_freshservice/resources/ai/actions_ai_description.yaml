Create Agent:
  ai_description: >-
    ### General Description

    Creates a new agent in Freshservice. This action allows for the programmatic creation
    of agent profiles, including their personal details, organizational placement
    (departments and locations), group memberships, and specific roles with defined
    scopes. It is important to note that this action does not operate on Google SecOps
    entities; instead, it uses provided input parameters to define the agent's attributes.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Email | String | Yes | The email address of the agent to be created. |

    | First Name | String | Yes | The first name of the agent. |

    | Last Name | String | No | The last name of the agent. |

    | Is occasional | Boolean | No | If true, the agent is created as an 'occasional'
    agent; otherwise, they are created as a full-time agent. Default is false. |

    | Can See All Tickets From Associated Departments | Boolean | No | If true, the
    agent can view all tickets within their associated departments. Default is false.
    |

    | Departments | String | No | A comma-separated list of department names to associate
    with the agent. |

    | Location | String | No | The name of the location to associate with the agent.
    |

    | Group Memberships | String | No | A comma-separated list of group names the
    agent should join. |

    | Roles | String | Yes | A JSON string defining the roles to assign. Example:
    `[{"role_id": 123, "assignment_scope": "entire_helpdesk"}]`. |

    | Job Title | String | No | The job title of the agent. |

    | Custom Fields | String | No | A JSON object containing custom field keys and
    values. Example: `{"field_key": "value"}`. |


    ### Additional Notes

    - The action performs lookups for Departments, Locations, and Group Memberships
    by name to resolve them to internal Freshservice IDs. If a provided name does
    not exist in the target system, the action will fail.

    - The `Roles` parameter must be a valid JSON array of objects as specified in
    the Freshservice API documentation.


    ### Flow Description

    1. **Parameter Extraction**: Retrieves the API configuration and all action-specific
    parameters.

    2. **Data Parsing**: Converts CSV-formatted strings (Departments, Group Memberships)
    into lists and JSON-formatted strings (Roles, Custom Fields) into Python dictionaries.

    3. **Metadata Resolution**: Queries the Freshservice API to fetch existing groups,
    departments, and locations. It then maps the user-provided names to their corresponding
    internal IDs.

    4. **Agent Creation**: Executes a POST request to the Freshservice `/api/v2/agents`
    endpoint with the compiled agent data.

    5. **Result Processing**: Captures the API response, adds the created agent's
    JSON data to the action results, and reports success or failure.
