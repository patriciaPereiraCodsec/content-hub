    instance. | Boolean | Yes |


    ### Additional Notes

    This action does not have any action-specific parameters. It uses the global integration
    configuration parameters provided in the Marketplace tab.


    ### Flow Description

    1. **Parameter Extraction**: Retrieves the API Root, API Key, and SSL verification
    settings from the integration's configuration.

    2. **Manager Initialization**: Initializes the `FreshworksFreshserviceManager`
    which, when the `force_test_connectivity` flag is set, triggers a connectivity
    check.

    3. **Connectivity Test**: Executes a GET request to the `/api/v2/tickets` endpoint
    with minimal pagination (`page=1`, `per_page=1`) to verify that the credentials
    and URL are valid.

    4. **Result Reporting**: Returns a success message if the API responds correctly,
    or a failure message with the specific error if the connection fails.
