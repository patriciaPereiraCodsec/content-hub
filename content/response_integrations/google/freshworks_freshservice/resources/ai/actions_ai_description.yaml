Add a Ticket Reply:
  ai_description: >-
    ### General Description

    Adds a reply to a specific ticket in Freshservice. This action allows users to
    communicate within a ticket by posting a message directly to the ticket's conversation
    history using its unique ID. It is primarily used for automated communication
    or updating ticket status via comments.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Ticket ID | Integer | Yes | The unique identifier of the Freshservice ticket
    to which the reply will be added. Must be a positive number. |

    | Reply Text | String | Yes | The text content of the reply to be added to the
    ticket. |


    ### Flow Description

    1. **Parameter Extraction:** Retrieves the API connection details (API Root, API
    Key, SSL verification) and the user-provided Ticket ID and Reply Text.

    2. **Validation:** Validates that the Ticket ID is a positive integer to prevent
    invalid API calls.

    3. **API Interaction:** Initializes the Freshservice manager and sends a POST
    request to the `/api/v2/tickets/{ticket_id}/reply` endpoint with the provided
    reply text.

    4. **Result Processing:** Captures the resulting conversation object from the
    API response and adds it to the action's JSON results for use in subsequent playbook
    steps.


    ### Additional Notes

    - **Entity Support:** This action does not operate on Google SecOps entities.
    It relies entirely on the provided Ticket ID parameter.

    - **Permissions:** Ensure the API Key used has the necessary permissions to add
    replies to tickets in the target Freshservice instance.
