Create Requester:
  ai_description: >-
    ### General Description

    Creates a new requester profile in Freshworks Freshservice. This action allows
    for the programmatic creation of users (requesters) within the Freshservice platform,
    specifying details such as contact information, organizational placement (departments/locations),
    and custom attributes. It is important to note that this action does **not** operate
    on Google SecOps entities; instead, it uses the provided input parameters to execute
    the creation logic.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Email | String | Yes | The primary email address for the new requester. |

    | First Name | String | Yes | The first name of the requester. |

    | Last Name | String | No | The last name of the requester. |

    | Can See All Tickets From Associated Departments | Boolean | No | If set to `True`,
    the requester can view all tickets within their associated departments. Defaults
    to `False`. |

    | Departments | String | No | A comma-separated list of department names to associate
    with the requester. The action will attempt to resolve these names to their respective
    IDs. |

    | Location | String | No | The name of the location to associate with the requester.
    The action will attempt to resolve this name to a location ID. |

    | Job Title | String | No | The professional job title of the requester. |

    | Custom Fields | String | No | A JSON-formatted string (e.g., `{"key1":"value1"}`)
    containing custom field data defined in the Freshservice instance. |


    ### Additional Notes

    - **ID Resolution:** The action automatically fetches existing departments and
    locations from Freshservice to map the provided names to the required internal
    IDs. If a provided name cannot be found, the action will fail with a validation
    error.

    - **Entity Scope:** This action does not use or filter any entities from the Google
    SecOps case environment.


    ### Flow Description

    1. **Parameter Extraction:** Retrieves the API configuration and action parameters
    (Email, Names, Departments, etc.).

    2. **Data Parsing:** Converts the comma-separated `Departments` string into a
    list and parses the `Custom Fields` JSON string into a dictionary.

    3. **ID Lookup (Departments):** If department names are provided, the action fetches
    all departments from Freshservice and matches the names to retrieve their unique
    IDs.

    4. **ID Lookup (Location):** If a location name is provided, the action fetches
    all locations from Freshservice to find the matching ID.

    5. **Requester Creation:** Sends a POST request to the Freshservice API with the
    compiled data to create the requester.

    6. **Result Processing:** Returns the JSON representation of the newly created
    requester and sets the action status to success.
