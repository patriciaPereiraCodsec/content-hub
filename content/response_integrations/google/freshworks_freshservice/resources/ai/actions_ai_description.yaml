    page for Freshservice pagination. Default is 30. |

    | Start at Page | Integer | No | Specify the starting page for Freshservice pagination.
    Default is 1. |

    | Max Rows to Return | Integer | No | Specify the total number of tickets the
    action should return. Default is 30. |

    | Workspace ID | String | No | Specify the ID of the workspace to list tickets
    from. If empty, only the primary workspace is searched. Use "0" to search all
    workspaces. |


    ### Additional Notes

    - The action validates that pagination parameters and the timeframe are positive
    or non-negative integers.

