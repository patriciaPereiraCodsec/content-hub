name: Update Ticket Time Entry
description: Update a time entry for a Freshservice ticket. Note that action is not
    working on Siemplify entities.
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/freshworks-freshservice#update_ticket_time_entry
integration_identifier: FreshworksFreshservice
parameters:
-   name: Ticket ID
    default_value: ''
    type: string
    description: Specify ticket ID to update a time entry for.
    is_mandatory: true
-   name: Time Entry ID
    default_value: ''
    type: string
    description: Specify time entry ID to update.
    is_mandatory: true
-   name: Agent Email
    default_value: ''
    type: string
    description: Specify agent email for whom to change a ticket time entry.
    is_mandatory: false
-   name: Note
    default_value: ''
    type: string
    description: Specify a note for the ticket time entry.
    is_mandatory: false
-   name: Time Spent
    default_value: ''
    type: string
    description: 'Specify time spent for ticket time entry. Format: {hh:mm}'
    is_mandatory: false
-   name: Billable
    default_value: false
    type: boolean
    description: If enabled, ticket time entry will be marked as billable.
    is_mandatory: false
-   name: Custom Fields
    default_value: ''
    type: string
    description: 'Specify a JSON object that contains custom fields to add to the
        ticket time entry. Action appends new custom fields to any existing for ticket
        time entry. Example format: {"key1":"value1","key2":"value2"}'
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/update_ticket_time_entry_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
