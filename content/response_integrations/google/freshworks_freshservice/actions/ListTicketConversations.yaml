name: List Ticket Conversations
description: List Freshservice ticket conversations based on the specified search
    criteria. Note that action is not working on Siemplify entities.
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/freshworks-freshservice#list_ticket_conversations
integration_identifier: FreshworksFreshservice
parameters:
-   name: Ticket ID
    default_value: ''
    type: string
    description: Specify ticket ID to return conversations for.
    is_mandatory: true
-   name: Rows per Page
    default_value: 30
    type: string
    description: Specify how many ticket conversations should be returned per page
        for Freshservice pagination.
    is_mandatory: false
-   name: Start at Page
    default_value: 1
    type: string
    description: Specify starting from which page ticket conversations should be returned
        with Freshservice pagination.
    is_mandatory: false
-   name: Max Rows to Return
    default_value: 30
    type: string
    description: Specify how many ticket conversations action should return in total.
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/list_ticket_conversations_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
