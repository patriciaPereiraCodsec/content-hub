name: List Tickets
description: List Freshservice tickets base on the specified search criteria. Note
    that action is not working on Siemplify entities.
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/freshworks-freshservice#list_tickets
integration_identifier: FreshworksFreshservice
parameters:
-   name: Ticket Type
    default_value: All
    type: ddl
    optional_values:
    - All
    - Incident
    - Service Request
    description: Specify ticket type to return.
    is_mandatory: false
-   name: Requester
    default_value: ''
    type: string
    description: Specify the requester email of tickets to return.
    is_mandatory: false
-   name: Include Stats
    default_value: 'False'
    type: boolean
    description: If enabled, action will return additional stats on the tickets.
    is_mandatory: false
-   name: Search for Last X hours
    default_value: ''
    type: string
    description: Specify the timeframe to search tickets for.
    is_mandatory: false
-   name: Rows per Page
    default_value: 30
    type: string
    description: Specify how many tickets should be returned per page for Freshservice
        pagination.
    is_mandatory: false
-   name: Start at Page
    default_value: 1
    type: string
    description: Specify starting from which page tickets should be returned with
        Freshservice pagination.
    is_mandatory: false
-   name: Max Rows to Return
    default_value: 30
    type: string
    description: Specify how many tickets action should return in total.
    is_mandatory: false
-   name: Workspace ID
    default_value: ''
    type: string
    description: Specify the ID of the workspace that should be used to list tickets.
        If nothing is provided, the action will list tickets only from the primary
        workspace. To list tickets from all workspaces provide “0” in the parameter.
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/list_tickets_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
