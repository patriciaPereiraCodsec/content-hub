name: Create Ticket
description: 'Create a Freshservice ticket. Note: as of now, Freshservice API supports
    only creation of tickets with the type "Incident" and the ticket''s priority is
    dynamically calculated according to the "Urgency" and "Impact" values, same as
    in FreshService''s UI. Additionally, if file attachments to add are provided,
    the total size of the attachments must not exceed 15MB.'
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/freshworks-freshservice#create_ticket
integration_identifier: FreshworksFreshservice
parameters:
-   name: Subject
    default_value: ''
    type: string
    description: Specify subject field for created ticket.
    is_mandatory: true
-   name: Description
    default_value: ''
    type: string
    description: Specify description field for created ticket.
    is_mandatory: true
-   name: Requester Email
    default_value: ''
    type: string
    description: Specify requester email for created ticket.
    is_mandatory: true
-   name: Agent Assign To
    default_value: ''
    type: string
    description: Specify the agent email to assign the ticket to.
    is_mandatory: false
-   name: Group Assign To
    default_value: ''
    type: string
    description: Specify the group name to assign the ticket to.
    is_mandatory: false
-   name: Department Name
    default_value: ''
    type: string
    description: Specify the name of the department for the ticket. This parameter
        is case sensitive.
    is_mandatory: false
-   name: Priority
    default_value: Medium
    type: ddl
    optional_values:
    - Low
    - Medium
    - High
    - Urgent
    description: Specify priority to assign to the ticket.
    is_mandatory: true
-   name: Urgency
    default_value: Medium
    type: ddl
    optional_values:
    - Low
    - Medium
    - High
    description: Specify urgency to assign to the ticket.
    is_mandatory: false
-   name: Impact
    default_value: Medium
    type: ddl
    optional_values:
    - Low
    - Medium
    - High
    description: Specify impact to assign to the ticket.
    is_mandatory: false
-   name: Tags
    default_value: ''
    type: string
    description: Specify tags to assign to the ticket. Parameter accepts multiple
        values as a comma separated string.
    is_mandatory: false
-   name: Custom Fields
    default_value: ''
    type: string
    description: 'Specify a JSON object that contains custom fields to add to the
        ticket. Action appends new custom fields to any existing for a ticket. Example
        format: {"key1":"value1","key2":"value2"}'
    is_mandatory: false
-   name: File Attachments to Add
    default_value: ''
    type: string
    description: Specify the full path for the file to be uploaded with the ticket.
        Parameter accepts multiple values as a comma separated string. The total size
        of the attachments must not exceed 15MB
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/create_ticket_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
