name: Update Ticket
description: Update a Freshservice ticket based on provided action input parameters.
    Note that if new tags for the ticket are provided, due to the Freshservice API
    limitations action replaces existing tags in the ticket, not appending new ones
    to existing. Additionally, if file attachments to add are provided, the total
    size of the attachments must not exceed 15MB
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/freshworks-freshservice#update_ticket
integration_identifier: FreshworksFreshservice
parameters:
-   name: Ticket ID
    default_value: ''
    type: string
    description: Specify ticket id to update.
    is_mandatory: true
-   name: Status
    default_value: Not Changed
    type: ddl
    optional_values:
    - Not Changed
    - Open
    - Pending
    - Resolved
    - Closed
    description: Specify new status for the ticket.
    is_mandatory: false
-   name: Subject
    default_value: ''
    type: string
    description: Specify subject field to update.
    is_mandatory: false
-   name: Description
    default_value: ''
    type: string
    description: Specify description field to update.
    is_mandatory: false
-   name: Requester Email
    default_value: ''
    type: string
    description: Specify requester email to update.
    is_mandatory: false
-   name: Agent Assign To
    default_value: ''
    type: string
    description: Specify the agent email to update.
    is_mandatory: false
-   name: Group Assign To
    default_value: ''
    type: string
    description: Specify the group name to update.
    is_mandatory: false
-   name: Priority
    default_value: Not Changed
    type: ddl
    optional_values:
    - Not Changed
    - Low
    - Medium
    - High
    - Urgent
    description: Specify priority to update.
    is_mandatory: false
-   name: Urgency
    default_value: Not Changed
    type: ddl
    optional_values:
    - Not Changed
    - Low
    - Medium
    - High
    description: Specify urgency to update.
    is_mandatory: false
-   name: Impact
    default_value: Not Changed
    type: ddl
    optional_values:
    - Not Changed
    - Low
    - Medium
    - High
    description: Specify impact to update.
    is_mandatory: false
-   name: Tags
    default_value: ''
    type: string
    description: Specify tags to replace in the ticket. Parameter accepts multiple
        values as a comma separated string. Note that due to the Freshservice API
        limitations action replaces existing tags in the ticket, not appending new
        ones to existing.
    is_mandatory: false
-   name: Custom Fields
    default_value: ''
    type: string
    description: 'Specify a JSON object that contains custom fields to add to the
        ticket. Action appends new custom fields to any existing for a ticket. Example
        format: {"key1":"value1","key2":"value2"}'
    is_mandatory: false
-   name: File Attachments to Add
    default_value: ''
    type: string
    description: Specify the full path for the file to be uploaded with the ticket.
        Parameter accepts multiple values as a comma separated string. The total size
        of the attachments must not exceed 15MB
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/update_ticket_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
