name: Freshservice Sync Tickets Closure Job
parameters:
-   name: API Root
    default_value: https://yourdomain.freshservice.com
    type: string
    description: Freshservice instance API Root URL.
    is_mandatory: true
-   name: API Key
    default_value: ''
    type: password
    description: Freshservice API Key to use in job.
    is_mandatory: true
-   name: Offset time in hours
    default_value: 24
    type: string
    description: Sync tickets closure from X hours backwards.
    is_mandatory: true
-   name: Verify SSL
    default_value: true
    type: boolean
    description: If enabled, integration will try to verify that API Root is configured
        with a valid certificate.
    is_mandatory: false
-   name: Default Ticket Description
    default_value: Ticket is closed by the Siemplify Freshservice Sync Tickets Closure
        Job.
    type: string
    description: Specify the description that should be added to the ticket if ticket
        dont have the description, so the ticket can be closed in Freshservice, as
        the description field is mandatory for Freshservice.
    is_mandatory: true
description: Close tickets in Freshservice if corresponding Siemplify alerts were
    closed.
integration: FreshworksFreshservice
creator: Admin
