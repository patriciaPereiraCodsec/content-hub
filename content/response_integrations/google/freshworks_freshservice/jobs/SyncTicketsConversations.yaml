name: Freshservice Sync Tickets Conversations Job
parameters:
-   name: API Root
    default_value: https://yourdomain.freshservice.com
    type: string
    description: Freshservice instance API Root URL.
    is_mandatory: true
-   name: API Key
    default_value: ''
    type: password
    description: Freshservice API Key to use in job.
    is_mandatory: true
-   name: Verify SSL
    default_value: true
    type: boolean
    description: If enabled, integration will try to verify that API Root is configured
        with a valid certificate.
    is_mandatory: false
-   name: Offset time in hours
    default_value: 24
    type: string
    description: Sync tickets conversations from X hours backwards.
    is_mandatory: true
-   name: Siemplify Comment Prefix
    default_value: 'SIEMPLIFY:'
    type: string
    description: Prefix that will be added by the sync job to comments created for
        Freshservice tickets.
    is_mandatory: true
-   name: Freshservice Comment Prefix
    default_value: 'Freshservice Comment Sync Job:'
    type: string
    description: Prefix that will be added by the sync job to the Siemplify alert's
        case comments.
    is_mandatory: true
-   name: Conversation Types To Sync
    default_value: Replies, Notes
    type: string
    description: Specify Freshservice conversation types job should sync. Parameter
        accepts multiple values as a comma separated string.
    is_mandatory: true
-   name: Fetch Private Notes?
    default_value: false
    type: boolean
    description: If enabled, will fetch both public and private notes for related
        Freshservice tickets.
    is_mandatory: false
-   name: Sync Comment from Siemplify as X
    default_value: Private Note
    type: string
    description: 'Specify which conversation type job should use to add a comment
        from Siemplify. Possible values: Private Note, Public note, Reply.'
    is_mandatory: true
description: 'Sync conversations (considered both replies and notes) between Siemplify
    alert''s case and corresponding Freshservice ticket. Sync mechanism works in both
    ways, Siemplify → Freshservice and Freshservice → Siemplify. Note: The job supports
    Siemplify cases with the "Freshservice" tag only.'
integration: FreshworksFreshservice
creator: Admin
