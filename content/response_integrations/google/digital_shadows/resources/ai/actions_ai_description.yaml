Ping:
  ai_description: "The Ping action is designed to verify the connectivity between\
    \ Google SecOps and the Digital Shadows platform. It ensures that the provided\
    \ API credentials (API Key and API Secret) are valid and that the network connection\
    \ to the Digital Shadows API is functional. \n\n### Parameters\n| Parameter Name\
    \ | Description | Type | Mandatory | \n| --- | --- | --- | --- |\n| None | This\
    \ action does not take any input parameters. It uses the integration's global\
    \ configuration for authentication. | N/A | N/A |\n\n### Flow Description\n1.\
    \ **Credential Extraction:** The action retrieves the 'Api Key' and 'Api Secret'\
    \ from the Digital Shadows integration configuration.\n2. **Manager Initialization:**\
    \ It initializes the `DigitalShadowsManager` using the extracted credentials.\n\
    3. **Connectivity Test:** Upon initialization, the manager automatically executes\
    \ a `test_connectivity` method, which performs a sample search request (for 'www.google.com')\
    \ against the Digital Shadows `/api/search/find` endpoint.\n4. **Result Handling:**\
    \ If the API call returns a successful response, the action reports 'Connection\
    \ Established'. If an exception occurs (e.g., authentication failure or network\
    \ error), the action fails and provides the error reason."
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
  categories:
    enrichment: false
  entity_usage:
    entity_types: []
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
