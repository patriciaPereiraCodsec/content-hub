EnrichCVE:
  ai_description: "### General Description\nEnriches CVE (Common Vulnerabilities and\
    \ Exposures) entities using threat intelligence from Digital Shadows. This action\
    \ retrieves comprehensive details about specific vulnerabilities, including descriptions,\
    \ CVSS scores (access vector, complexity, authentication, impacts), and associated\
    \ exploit information such as titles, platforms, and source URLs. The retrieved\
    \ data is used to populate entity attributes and provide context for security\
    \ analysts.\n\n### Parameters Description\nThere are no action-specific parameters\
    \ for this action. It relies on the global integration configuration (API Key\
    \ and API Secret) for authentication.\n\n### Additional Notes\n- This action requires\
    \ a valid Digital Shadows API Key and API Secret to be configured at the integration\
    \ level.\n- The action specifically targets and processes entities of type `CVE`.\n\
    \n### Flow Description\n1. **Initialization**: The action initializes the Digital\
    \ Shadows manager using the API Key and API Secret from the integration configuration.\n\
    2. **Entity Filtering**: It identifies all entities of type `CVE` from the target\
    \ entities list.\n3. **Data Retrieval**: For each identified CVE entity, the action\
    \ queries the Digital Shadows API to fetch vulnerability and exploit data.\n4.\
    \ **Internal Enrichment**: \n    - Adds a data table to the entity containing\
    \ the CVE details.\n    - Attaches external source links (e.g., NVD or Exploit-DB)\
    \ to the entity for quick reference.\n    - Updates the entity's additional properties\
    \ with technical metrics like CVSS scores and descriptions.\n    - Sets the entity's\
    \ `is_enriched` status to `True`.\n5. **Finalization**: Updates the entities within\
    \ Google SecOps and returns a summary message along with the raw JSON data for\
    \ the enriched entities."
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates CVE entities with enrichment data, adds data tables, and attaches external
      source links.
  categories:
    enrichment: true
  entity_usage:
    entity_types:
    - CVE
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: true
    filters_by_identifier: false
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: false
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
EnrichHash:
  ai_description: "### General Description\nEnriches File Hash entities using threat\
    \ intelligence from Digital Shadows. This action retrieves comprehensive reputation\
    \ data, including Cylance analysis scores (Machine Learning, Industry, and Human\
    \ classifiers) and Webroot file intelligence (categories, malware classification,\
    \ and last seen dates). The retrieved data is used to populate entity attributes,\
    \ create detailed data tables, and provide direct investigation links within the\
    \ Google SecOps platform.\n\n### Parameters Description\n| Parameter | Type |\
    \ Mandatory | Description |\n| :--- | :--- | :--- | :--- |\n| None | N/A | N/A\
    \ | This action does not require any action-specific input parameters. It relies\
    \ on the integration's global configuration (API Key and API Secret). |\n\n###\
    \ Additional Notes\n* This action is specifically designed for `FILEHASH` entities.\n\
    * It performs a search against Digital Shadows' Cylance and Webroot data sources.\n\
    * If no data is found for a specific hash, the action will report a failure for\
    \ that specific entity.\n\n### Flow Description\n1. **Authentication**: Initializes\
    \ the Digital Shadows API client using the configured API Key and API Secret.\n\
    2. **Entity Selection**: Filters the target entities to identify all entities\
    \ of type `FILEHASH`.\n3. **Threat Intelligence Lookup**: For each identified\
    \ hash, the action queries the Digital Shadows API for matching intelligence records.\n\
    4. **Data Parsing**: Processes the raw API response to extract Cylance scores\
    \ and Webroot metadata.\n5. **Internal Enrichment**: \n    * Adds a detailed data\
    \ table to the entity in Google SecOps.\n    * Attaches a direct URL link to the\
    \ Digital Shadows portal for the specific hash.\n    * Updates the entity's `additional_properties`\
    \ with the enriched data fields.\n    * Marks the entity as `is_enriched = True`.\n\
    6. **Platform Update**: Commits the changes to the Google SecOps platform and\
    \ provides a summary message of the results."
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entity additional properties, adds entity tables, and adds entity links
      within Google SecOps to provide context for the enriched hash.
  categories:
    enrichment: true
  entity_usage:
    entity_types:
    - FILEHASH
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: true
    filters_by_identifier: false
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: false
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
EnrichIP:
  ai_description: "### General Description\nEnriches IP Address entities using threat\
    \ intelligence from Digital Shadows. This action retrieves comprehensive data\
    \ including reputation scores, ASN information, geographic details (city, country,\
    \ ISP), and historical threat incidents associated with the IP. It is designed\
    \ to provide security analysts with context regarding the risk level and origin\
    \ of network traffic.\n\n### Parameters\nThere are no action-specific parameters\
    \ for this action. It utilizes the global integration configuration for authentication\
    \ (API Key and API Secret).\n\n### Flow Description\n1. **Entity Filtering**:\
    \ The action identifies all `ADDRESS` (IP) entities within the current context.\n\
    2. **API Interaction**: For each IP, it performs a search query against the Digital\
    \ Shadows API to find matching threat intelligence records.\n3. **Data Parsing**:\
    \ It extracts key data points such as reputation scores, ASN, geographic location\
    \ (city, state, country), and incident history (e.g., phishing or scanning activity).\n\
    4. **Internal Updates**: \n    *   Updates the entity's `additional_properties`\
    \ with the enriched data.\n    *   Sets the `is_enriched` flag to `true` for the\
    \ entity.\n    *   Adds a data table to the entity in Google SecOps for visual\
    \ representation.\n    *   Adds a direct link to the Digital Shadows portal for\
    \ further investigation.\n5. **Completion**: Updates the entities in the platform\
    \ and provides a JSON result of the enrichment data.\n\n### Additional Notes\n\
    *   This action is marked as **Deprecated** in the metadata.\n*   The action includes\
    \ timeout protection, ensuring it stops processing if the execution deadline is\
    \ approaching."
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entity enrichment fields (additional_properties), sets the 'is_enriched'
      flag, and attaches data tables and external links to the entities within Google
      SecOps.
  categories:
    enrichment: true
  entity_usage:
    entity_types:
    - ADDRESS
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: true
    filters_by_identifier: false
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: false
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
EnrichURL:
  ai_description: "Enriches URL entities using threat intelligence from Digital Shadows.\
    \ This action retrieves comprehensive domain information, including WHOIS data,\
    \ reputation scores, and threat history to provide context for security analysts.\n\
    \n### Parameters\n| Parameter | Type | Mandatory | Description |\n| :--- | :---\
    \ | :--- | :--- |\n| None | N/A | N/A | This action does not have any input parameters.\
    \ |\n\n### Additional Notes\n* This action requires a valid Digital Shadows API\
    \ Key and API Secret to be configured at the integration level.\n* It specifically\
    \ targets entities of type URL.\n\n### Flow Description\n1. **Initialization**:\
    \ The action initializes the Digital Shadows manager using the provided API credentials.\n\
    2. **Entity Filtering**: It identifies all URL entities within the current context.\n\
    3. **Data Retrieval**: For each URL, it queries the Digital Shadows API for `DOMAIN_WHOIS`\
    \ information.\n4. **Data Parsing**: The response is parsed to extract key metrics\
    \ such as domain age, popularity, reputation score, and threat categories.\n5.\
    \ **Enrichment**: \n    * Updates the entity's `additional_properties` with the\
    \ retrieved metadata.\n    * Adds a detailed data table to the entity in the Google\
    \ SecOps UI.\n    * Adds a direct link to the Digital Shadows portal for further\
    \ investigation.\n    * Sets the entity's `is_enriched` flag to true.\n6. **Finalization**:\
    \ Updates the entities in the platform and provides a summary message of successful\
    \ and failed enrichments."
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entity additional properties with Digital Shadows metadata, adds an
      enrichment table, and provides a direct link to the Digital Shadows portal for
      the specific URL.
  categories:
    enrichment: true
  entity_usage:
