Upload File:
  ai_description: >-
    ### General Description

    Uploads a file from a specified local path to the MalShare service for analysis.
    This action is used to submit potentially malicious files to the MalShare repository
    to retrieve threat intelligence, including various file hashes (MD5, SHA1, SHA256)
    and file type information.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | File Path | String | Yes | The absolute path of the file on the system to be
    uploaded to MalShare. |


    ### Additional Notes

    This action does not operate on SecOps entities (like IPs or Hashes) automatically.
    It requires the user to provide a specific file path as an input parameter. The
    action performs a POST request to upload the file and a subsequent GET request
    to fetch the analysis details.


    ### Flow Description

    1. **Configuration**: Retrieves the MalShare API key and SSL verification settings
    from the integration configuration.

    2. **Input Retrieval**: Extracts the 'File Path' parameter provided by the user.

    3. **File Upload**: Submits the file to the MalShare API via a POST request.

    4. **Data Retrieval**: If the upload is successful, the action uses the resulting
    file hash to fetch detailed metadata from MalShare.

    5. **Output Generation**: Creates a data table containing the file report and
    attaches the raw JSON results to the action output.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Uploads a file to the MalShare platform, creating a new entry in their database
      for analysis.
    fetches_data: true
    internal_data_mutation_explanation: null
  categories:
    enrichment: false
  entity_usage:
