Add Tag to Submission:
  ai_description: >-
    ### General Description

    Adds a specific tag to an existing submission in the VMRay platform using its
    Submission ID. This action allows users to programmatically label or categorize
    submissions for better organization and tracking within VMRay.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Submission ID | Integer | Yes | The unique identifier of the VMRay submission
    to which the tag will be added. |

    | Tag Name | String | Yes | The name of the tag to apply to the submission. |


    ### Flow Description

    1. **Parameter Extraction:** The action retrieves the VMRay API credentials and
    the specific `Submission ID` and `Tag Name` provided by the user.

    2. **API Interaction:** It constructs a POST request to the VMRay REST API endpoint
    (`/rest/submission/{id}/tag/{tag}`).

    3. **Execution:** The request is sent to the VMRay server to apply the tag.

    4. **Result Handling:** If the API returns a successful response, the action completes
    with a success message; otherwise, it logs the error and fails.


    ### Additional Notes

    This action does not process entities from the Google SecOps environment; it operates
    directly on the provided Submission ID.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Adds a tag to a submission in the VMRay platform via a POST request to the VMRay
      REST API.
    fetches_data: false
    internal_data_mutation_explanation: null
  categories:
