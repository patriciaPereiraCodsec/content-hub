Scan Hash:
  ai_description: >-
    Enriches File Hash entities by retrieving detailed analysis reports from VMRay.
    This action identifies the hash type (MD5, SHA1, or SHA256) and fetches the sample's
    verdict, threat names, classifications, and associated Indicators of Compromise
    (IOCs) such as IPs, domains, and URLs. It also retrieves specific threat indicators
    based on a configurable score threshold. The action updates the entity's suspicious
    status, adds enrichment data to entity properties, and can generate detailed insights
    within the Google SecOps case.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Threat Indicator Score Threshold | Integer | Yes | The minimum score (0-5) required
    for a threat indicator to be included in the results. |

    | IOC Type Filter | String | Yes | Comma-separated list of IOC types to retrieve
    (e.g., ips, files, emails, urls, domains, mutexes, processes, registry). |

    | IOC Verdict Filter | String | Yes | Comma-separated list of IOC verdicts to
    include (e.g., Malicious, Suspicious, Clean, None). |

    | Max IOCs To Return | Integer | No | Maximum number of IOCs to return per entity
    per type. Default is 10. |

    | Max Threat Indicators To Return | Integer | No | Maximum number of threat indicators
    to return per entity. Default is 10. |

    | Create Insight | Boolean | No | If enabled, creates a detailed insight for the
    entity. Default is true. |

    | Only Suspicious Insight | Boolean | No | If enabled, insights are only created
    for entities with a suspicious or malicious verdict. |


    ### Flow Description

    1. **Initialization**: Validates input parameters, including the score threshold
    range and filter values.

    2. **Entity Filtering**: Identifies all File Hash entities within the current
    context.

    3. **Data Retrieval**: For each hash, it queries VMRay to find an existing sample
    analysis. If found, it fetches filtered IOCs and threat indicators.

    4. **Data Presentation**: Populates entity-specific tables with the retrieved
    IOCs (categorized by type) and threat indicators.

    5. **Enrichment**: Updates the entity's additional properties with VMRay metadata
    and sets the `is_enriched` flag. If the verdict is 'malicious' or 'suspicious',
    the entity is marked as suspicious.

    6. **Insight Generation**: If configured, generates a formatted insight containing
    the verdict, threat names, and a summary of indicators.

    7. **Finalization**: Updates the entities in the SOAR platform and returns a JSON
    result of all findings.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entity attributes with enrichment data, sets suspicious status based
      on VMRay verdict, and creates insights with threat details.
  categories:
    enrichment: true
  entity_usage:
    entity_types:
    - FILEHASH
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: true
    filters_by_identifier: false
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: false
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
Scan URL:
  ai_description: >-
    ### General Description

    The **Scan URL** action submits URL entities to VMRay for automated browser-based
    analysis and retrieves comprehensive threat intelligence. It is an asynchronous
    action that handles the submission, waits for the analysis to complete, and then
    fetches detailed results including verdicts, IOCs, and threat indicators.


    ### Parameters Description

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | **Threat Indicator Score Threshold** | Integer | Yes | The minimum score (0-5)
    required for a threat indicator to be included in the results. Default is 3. |

    | **IOC Type Filter** | String | Yes | A comma-separated list of IOC types to
    retrieve (e.g., `ips, urls, domains`). |

    | **IOC Verdict Filter** | String | Yes | A comma-separated list of verdicts to
    filter IOCs (e.g., `Malicious, Suspicious, Clean, None`). |

    | **Max IOCs To Return** | Integer | No | The maximum number of IOCs to return
    per entity per type. Default is 10. |

    | **Max Threat Indicators To Return** | Integer | No | The maximum number of threat
    indicators to return per entity. Default is 10. |

    | **Create Insight** | Boolean | No | If enabled, the action creates a detailed
    insight for the entity in Google SecOps. |

    | **Only Suspicious Insight** | Boolean | No | If enabled, insights are only created
    for entities with a 'Malicious' or 'Suspicious' verdict. |

    | **Tag Names** | String | No | Optional tags to add to the VMRay submission.
    |

    | **Comment** | String | No | An optional comment to include with the VMRay submission.
    |


    ### Additional Notes

    - This action is **asynchronous**. It will first submit the URL and then enter
    an 'In Progress' state while waiting for VMRay to complete the analysis.

    - The action supports the `DestinationURL` entity type.


    ### Flow Description

    1. **Submission**: The action sends the URL to VMRay using the `submit_url_for_browser_analysis`
    method, optionally including tags and comments.

    2. **Polling**: The action checks the status of the analysis job. If the job is
    still running, the action remains in an 'In Progress' state.

    3. **Data Retrieval**: Once the analysis is finished, the action fetches the sample
    analysis report, filtered IOCs (based on type and verdict), and threat indicators
    (based on the score threshold).

    4. **Internal Updates**: The action updates the Google SecOps entity with enrichment
    data, sets the `is_suspicious` flag if the verdict is malicious/suspicious, adds
    data tables, and creates insights if configured.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: >-
      Submits the URL to the VMRay platform for analysis, which creates a new submission
      and analysis job in the external system.
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entity attributes with enrichment data, sets the suspicious status of
      entities, and creates insights and data tables within the case.
  categories:
    enrichment: false
  entity_usage:
    entity_types:
    - DestinationURL
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: true
    filters_by_identifier: false
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: false
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
Upload File And Get Report:
  ai_description: >-
    Submits local files to VMRay for automated sandbox analysis and retrieves comprehensive
    threat reports. This action is designed to handle the end-to-end process of file
    submission, status monitoring, and result retrieval in an asynchronous manner.


    ### Parameters Description


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Sample File Path | String | Yes | A comma-separated list of absolute file paths
    on the local system to be uploaded to VMRay for analysis. |

    | Tag Names | String | No | A comma-separated list of tags to be applied to the
    submission in the VMRay platform. |

    | Comment | String | No | A text comment to be associated with the file submission
    for tracking or context. |


    ### Flow Description


    1.  **Validation**: The action first verifies that the provided file paths exist
    and are readable by the system.

    2.  **Submission**: Files are uploaded to the VMRay API via a POST request. If
    a file has been analyzed previously, the action identifies the existing sample
    ID.

    3.  **Monitoring**: As an asynchronous action, it enters a polling state, periodically
    checking the VMRay submission status until the analysis is complete.

    4.  **Data Retrieval**: Once the analysis is finished, the action fetches IOCs
    (including Files, IPs, URLs, Domains, Mutexes, and Registry Keys) and detailed
    Threat Indicators.

    5.  **Reporting**: The action attaches the full JSON and ZIP analysis reports
    to the case, adds data tables for all identified IOCs, and provides a direct link
    to the VMRay web interface for the full report.


    ### Additional Notes


    This action is asynchronous. Users should ensure that the script timeout in the
    Google SecOps IDE is configured to allow sufficient time for both the file upload
    and the sandbox analysis process to complete.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Uploads local files to the VMRay platform to initiate new sandbox analysis submissions.
    fetches_data: true
    internal_data_mutation_explanation: null
