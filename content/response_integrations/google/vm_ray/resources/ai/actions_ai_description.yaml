Ping:
  ai_description: "### General Description\nThe Ping action is a utility designed\
    \ to verify the connectivity between Google SecOps and the VMRay instance. It\
    \ ensures that the provided API credentials (API Root and API Key) are valid and\
    \ that the network path is open. This action is typically used during the initial\
    \ setup of the integration or for troubleshooting communication issues.\n\n###\
    \ Parameters Description\n| Parameter | Type | Mandatory | Description |\n| :---\
    \ | :--- | :--- | :--- |\n| Api Root | String | Yes | The base URL of the VMRay\
    \ API instance (e.g., https://cloud.vmray.com). |\n| Api Key | String | Yes |\
    \ The API key used for authentication with the VMRay service. |\n| Verify SSL\
    \ | Boolean | Yes | Specifies whether to validate the SSL certificate of the VMRay\
    \ server. |\n\n### Flow Description\n1. **Parameter Extraction:** The action retrieves\
    \ the integration configuration parameters, including the API Root, API Key, and\
    \ SSL verification preference.\n2. **Client Initialization:** It initializes the\
    \ `VMRayClient` using the extracted configuration and system version information.\n\
    3. **Connectivity Test:** The client executes the `test_connectivity` method,\
    \ which performs a low-overhead GET request to the VMRay API endpoint (`/rest/analysis?_limit=1`).\n\
    4. **Result Handling:** \n    * If the request is successful, the action returns\
    \ a 'Connection Established' message and a success status.\n    * If an exception\
    \ occurs (e.g., authentication failure or network timeout), it logs the error\
    \ and returns a failure status.\n\n### Additional Notes\n* This action does not\
    \ process any entities and has no side effects on external data.\n* It is strictly\
    \ used for health checks of the integration."
