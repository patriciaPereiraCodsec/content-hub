name: Scan Hash
description: Get details about a specific hash.
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/vmray#scan-hash
integration_identifier: VMRay
parameters:
-   name: Threat Indicator Score Threshold
    default_value: 3
    type: string
    description: 'Specify the lowest score that will be used to return threat indicators.
        Maximum: 5.'
    is_mandatory: true
-   name: IOC Type Filter
    default_value: ips, files, emails, urls, domains
    type: string
    description: 'Specify a comma-separated list of IOC types that need to be returned.
        Possible values: domains, emails, files, ips, mutexes, processes, registry,
        urls.'
    is_mandatory: true
-   name: IOC Verdict Filter
    default_value: Malicious, Suspicious
    type: string
    description: 'Specify a comma-separated list of IOC verdicts that will be used
        during the ingestion of IOCs. Possible values: Malicious, Suspicious, Clean,
        None.'
    is_mandatory: true
-   name: Max IOCs To Return
    default_value: 10
    type: string
    description: 'Specify how many IOCs to return per entity per IOC type. Default:
        10.'
    is_mandatory: false
-   name: Max Threat Indicators To Return
    default_value: 10
    type: string
    description: 'Specify how many threat indicators to return per entity. Default:
        10.'
    is_mandatory: false
-   name: Create Insight
    default_value: true
    type: boolean
    description: If enabled, action will create an insight containing information
        about entities.
    is_mandatory: false
-   name: Only Suspicious Insight
    default_value: false
    type: boolean
    description: 'If enabled, action will only create insight for suspicious entities.
        Note: "Create Insight" parameter needs to be enabled.'
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/scan_hash_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
simulation_data_json: '{"Entities": ["FILEHASH"]}'
