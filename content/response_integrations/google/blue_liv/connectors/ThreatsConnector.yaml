name: BlueLiv - Threats Connector
parameters:
-   name: DeviceProductField
    default_value: Product Name
    type: string
    description: Enter the source field name in order to retrieve the Product Field
        name.
    is_mandatory: true
    is_advanced: false
    mode: regular
-   name: EventClassId
    default_value: event_type
    type: string
    description: Enter the source field name in order to retrieve the Event Field
        name.
    is_mandatory: true
    is_advanced: false
    mode: regular
-   name: Environment Field Name
    default_value: ''
    type: string
    description: Describes the name of the field where the environment name is stored.
        If the environment field isn't found, the environment is the default environment.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Environment Regex Pattern
    default_value: .*
    type: string
    description: A regex pattern to run on the value found in the "Environment Field
        Name" field. Default is .* to catch all and return the value unchanged. Used
        to allow the user to manipulate the environment field via regex logic. If
        the regex pattern is null or empty, or the environment value is null, the
        final environment result is the default environment.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: PythonProcessTimeout
    default_value: 180
    type: integer
    description: Timeout limit for the python process running the current script.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: API URL
    default_value: https://example.blueliv.com/
    type: string
    description: API Root of the BlueLiv instance.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: User Name
    default_value: ''
    type: string
    description: User name for BlueLiv.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Password
    default_value: ''
    type: password
    description: User password for BlueLiv.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Organization ID
    default_value: ''
    type: string
    description: Specify the Organization ID to use in BlueLiv.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Verify SSL
    default_value: false
    type: boolean
    description: If enabled, verify the SSL certificate for the connection to the
        BlueLiv server is valid.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Fetch Max Hours Backwards
    default_value: 1
    type: integer
    description: Number of hours before the first connector iteration to retrieve
        events from. This parameter applies to the initial connector iteration after
        you enable the connector for the first time, or used as a fallback value in
        cases where connector's last run timestamp expires.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Max Threats To Fetch
    default_value: 10
    type: integer
    description: How many threats to process per one connector iteration. Note - Maximum
        value here is 100.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Severity
    default_value: Medium
    type: string
    description: Severity will be one from the following values Low, Medium, High,
        Critical. Will be assigned to Siemplify alerts created from this connector.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Analysis Results To Ingest
    default_value: ''
    type: string
    description: 'Filter the threats by the analyst analysis to this threat, only
        ingest threats with the chosen analysis result. Provide a comma separated
        list of the desired analysis results to ingest. Possible values: NOT_AVAILABLE,
        NOT_IMPORTANT, NOT_PROCESSABLE, POSITIVE, NEGATIVE, INFORMATIVE, IMPORTANT.'
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Labels To Filter By
    default_value: ''
    type: string
    description: Please provide a comma separated list of the label names you want
        to filter by. Please pay attention to uppercase and lowercase letters and
        write the labels exactly as they appear in BlueLiv UI.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Reading Status To Ingest
    default_value: ''
    type: string
    description: 'Filter the threats by their reading status, so that the connector
        will ingest according to it. If no value is provided we will fetch both. Options:  “Only
        Read”, “Only Unread”.'
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Should ingest only starred threats?
    default_value: false
    type: boolean
    description: If checked, only starred (favorite) threats will be ingested.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Should ingest threats related to incidents?
    default_value: ''
    type: string
    description: 'Should connector filter the threats by checking the relationship
        to an incident. If no value is provided we will fetch both. Options are: Only
        Incidents - will ingest only threats related to incidents, Only Non Incidents
        - will ingest only threats that are not related to incidents.'
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Use whitelist as a blacklist
    default_value: false
    type: boolean
    description: If enabled, whitelist will be used as a blacklist.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Proxy Server Address
    default_value: ''
    type: string
    description: The address of the proxy server to use.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Proxy Username
    default_value: ''
    type: string
    description: The proxy username to authenticate with.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Proxy Password
    default_value: ''
    type: password
    description: The proxy password to authenticate with.
    is_mandatory: false
    is_advanced: false
    mode: script
description: Pull security threats from BlueLiv. Connector fetches all of the latest
    threats from BlueLiv modules. Whitelist and blacklist filters work with BlueLiv
    module types. For example, if you want to get threats only from Hacktivism modules,
    you can turn on the whitelist and type in the Hacktivism type name.
integration: BlueLiv
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/blueliv#connector
rules: []
is_connector_rules_supported: false
creator: admin
