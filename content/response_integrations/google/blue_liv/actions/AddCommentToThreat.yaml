name: Add Comment to a Threat
description: 'The action will add a desired text comment to a specific threat. '
integration_identifier: BlueLiv
parameters:
-   name: Module Type
    default_value: ''
    type: string
    description: Specify the module type the resource belongs to
    is_mandatory: true
-   name: Module ID
    default_value: ''
    type: string
    description: Specify the module ID the resource belongs to
    is_mandatory: true
-   name: Resource ID
    default_value: ''
    type: string
    description: Specify the Resource ID to add the comment to
    is_mandatory: true
-   name: Comment Text
    default_value: ''
    type: string
    description: Provide the comment you would like to add to the resource
    is_mandatory: true
dynamic_results_metadata:
-   result_example_path: resources/add_comment_to_threat_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
