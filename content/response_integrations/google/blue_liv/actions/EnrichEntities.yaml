name: Enrich Entities
description: 'Enrich entities using information from Threat Context module of Blueliv.
    Supported entities: IP, Hash, URL, Threat Actor, Threat Campaign, Threat Signature,
    CVE. Note: only MD5, SHA1, SHA256 and SHA512 hashes are supported.'
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/blueliv#enrich_entities
integration_identifier: BlueLiv
parameters:
-   name: Create Insight
    default_value: 'True'
    type: boolean
    description: If enabled, action will create insights containing information about
        entities.
    is_mandatory: false
-   name: Lowest Score To Mark as Suspicious
    default_value: '5'
    type: string
    description: 'Specify what should be the lowest score for the entity to be marked
        as suspicious. Maximum: 10.'
    is_mandatory: true
dynamic_results_metadata:
-   result_example_path: resources/enrich_entities_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: admin
simulation_data_json: '{"Entities": ["THREATSIGNATURE","THREATACTOR","THREATCAMPAIGN","ADDRESS","FILEHASH","CVE","DestinationURL","HOSTNAME"]}'
