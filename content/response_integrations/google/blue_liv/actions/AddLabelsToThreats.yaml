name: Add Labels to Threats
description: The action will add the specified label name to the specified threat
    IDs
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/blueliv#add_labels_to_threats
integration_identifier: BlueLiv
parameters:
-   name: Module Type
    default_value: ''
    type: string
    description: Specify the module type the resource belongs to
    is_mandatory: true
-   name: Module ID
    default_value: ''
    type: string
    description: Specify the module ID the resource belongs to
    is_mandatory: true
-   name: Resource ID
    default_value: ''
    type: string
    description: Specify the Resource IDs, as a comma separated list, to add the labels
        to
    is_mandatory: true
-   name: Label Names
    default_value: ''
    type: string
    description: Specify the label names you would like to apply to the specified
        threats, as a comma separated list. Please pay attention to lowercase and
        uppercase.
    is_mandatory: true
dynamic_results_metadata: []
creator: admin
