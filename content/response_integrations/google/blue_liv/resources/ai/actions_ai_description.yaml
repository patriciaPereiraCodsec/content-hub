Enrich Entities:
  ai_description: >-
    ### General Description

    Enriches multiple entity types using threat intelligence from the Blueliv Threat
    Context module. This action retrieves detailed context for IP addresses, file
    hashes, URLs, threat actors, campaigns, signatures, and CVEs. It provides reputation
    scores, TLP levels, and historical data, which are then used to update entity
    attributes and optionally create case-level insights.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Create Insight | Boolean | No | If enabled (default is True), the action creates
    a case insight summarizing the enrichment results for all successfully processed
    entities. |

    | Lowest Score To Mark as Suspicious | Integer | Yes | Defines the minimum risk
    score (0-10) required to mark an entity as suspicious. Entities with a score equal
    to or higher than this value will have their 'is_suspicious' attribute set to
    True. |


    ### Additional Notes

    - Supported hash types: MD5, SHA1, SHA256, and SHA512.

    - The action requires the 'Threat Context' module to be active in the Blueliv
    instance.

    - Risk-based suspicious marking is only applied to IP (ADDRESS), Hash (FILEHASH),
    and URL (DestinationURL) entities.


    ### Flow Description

    1. **Initialization**: Validates connection parameters and confirms the availability
    of the Blueliv 'Threat Context' module.

    2. **Entity Filtering**: Identifies entities within the current scope that match
    supported types (IP, Hash, URL, Threat Actor, Campaign, Signature, CVE).

    3. **Data Retrieval**: For each supported entity, the action queries the Blueliv
    API. For hashes, it first validates that the identifier length matches a supported
    algorithm.

    4. **Enrichment**: Updates the entity's 'additional_properties' with Blueliv data
    (prefixed with 'Blueliv'), sets 'is_enriched' to True, and attaches data tables
    and source links.

    5. **Risk Assessment**: Compares the retrieved risk score against the 'Lowest
    Score To Mark as Suspicious' threshold for applicable entities and updates their
    suspicious status accordingly.

    6. **Finalization**: If enabled, generates a case insight containing a summary
    of all enrichments and updates the entities within Google SecOps.
  capabilities:
    can_create_case_comments: false
    can_create_insight: true
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      The action updates entity attributes (additional properties, suspicious status,
      enriched status), adds data tables and links to entities, and creates case insights.
  categories:
    enrichment: true
  entity_usage:
    entity_types:
    - ADDRESS
    - FILEHASH
    - THREATACTOR
    - THREATCAMPAIGN
    - THREATSIGNATURE
    - DestinationURL
    - CVE
