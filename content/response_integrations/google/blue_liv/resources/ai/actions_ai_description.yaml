Ping:
  ai_description: >-
    ### General Description

    The **Ping** action is designed to verify the connectivity between Google SecOps
    and the BlueLiv platform. It validates the integration configuration parameters,
    including credentials and network accessibility, by attempting to authenticate
    and perform a basic API call to ensure the integration is functional.


    ### Parameters Description

    There are no action-specific parameters for this action. It relies entirely on
    the integration's configuration parameters:


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | API Root | String | Yes | The base URL of the BlueLiv API instance. |

    | User Name | String | Yes | The username used for authentication. |

    | Password | String | Yes | The password used for authentication. |

    | Organization ID | String | Yes | The unique identifier for the organization
    within BlueLiv. |

    | Verify SSL | Boolean | Yes | If enabled, the action will verify the SSL certificate
    of the BlueLiv server. |


    ### Flow Description

    1. **Configuration Extraction**: The action retrieves the API Root, User Name,
    Password, Organization ID, and SSL verification settings from the integration
    configuration.

    2. **Authentication**: The `BlueLivManager` is initialized, which automatically
    performs a POST request to the authentication endpoint to generate a session token.

    3. **Connectivity Test**: The action executes a GET request to a resource endpoint
    (specifically the organization's module resource) to verify that the API is reachable
    and the provided credentials have the necessary permissions.

    4. **Execution Result**: If the API call is successful, the action returns a success
    message. If any step fails (e.g., authentication error, network timeout, or invalid
    Organization ID), it catches the exception and reports a failure.


    ### Additional Notes

    This action is intended for testing and troubleshooting the connection to BlueLiv
    and does not process any entities or modify data within the platform.
