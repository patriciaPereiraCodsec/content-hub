Add Comment to a Threat:
  ai_description: >-
    Adds a text comment to a specific threat resource within the BlueLiv platform.
    This action allows analysts to document findings or provide context directly on
    a threat record in BlueLiv by specifying the module and resource identifiers.


    ### Parameters

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Module Type | String | Yes | The category of the module the resource belongs
    to (e.g., 'malware', 'hacktivism', 'credentials'). |

    | Module ID | String | Yes | The unique identifier of the module containing the
    resource. |

    | Resource ID | String | Yes | The unique identifier of the specific threat or
    resource to which the comment will be added. |

    | Comment Text | String | Yes | The actual text content of the comment to be posted.
    |


    ### Flow Description

    1. **Initialization**: The action initializes the BlueLiv manager using API credentials
    and organization details.

    2. **Parameter Extraction**: It retrieves the module type, module ID, resource
    ID, and the comment text from the action input.

    3. **API Interaction**: It sends a PUT request to the BlueLiv API endpoint corresponding
    to the specific resource's comments.

    4. **Result Processing**: Upon success, the action retrieves the updated list
    of comments for that resource, formats them into a JSON result, and creates a
    data table for display in the Google SecOps UI.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Adds a new comment to a threat resource in the BlueLiv platform via a PUT request.
    fetches_data: true
    internal_data_mutation_explanation: null
  categories:
