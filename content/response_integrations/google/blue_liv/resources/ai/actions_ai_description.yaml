List Entity Threats:
  ai_description: >-
    ### General Description

    Lists threats related to entities in the BlueLiv platform. This action retrieves
    a list of threats associated with the provided entities, allowing for filtering
    by specific labels or modules. It provides detailed threat information including
    module names, URLs, titles, and labels.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Label Filter | String | No | A comma-separated list of labels used to filter
    threats. The filter uses "OR" logic. |

    | Module Filter | String | No | A comma-separated list of modules used to filter
    threats. |

    | Max Threats To Return | Integer | No | Specifies the maximum number of threats
    to return per entity. Defaults to 50. |


    ### Flow Description

    1. **Authentication**: Establishes a session with the BlueLiv API using provided
    credentials and organization ID.

    2. **Entity Processing**: Iterates through all target entities provided in the
    context.

    3. **Data Retrieval**: For each entity, queries the BlueLiv API for related threat
    resources using the entity's identifier as a search query.

    4. **Filtering**: Applies the `Label Filter` and `Module Filter` to the retrieved
    threat data if provided. The label filter matches any of the specified labels
    (OR logic).

    5. **Result Limitation**: Truncates the results for each entity based on the `Max
    Threats To Return` parameter.

    6. **Output Generation**: Adds the threat data to entity tables and the action's
    JSON result for each successful entity.

    7. **Entity Update**: Updates the processed entities in Google SecOps to reflect
    successful processing.


    ### Additional Notes

    - This action supports all entity types.

    - If "Max Threats To Return" is configured with a value less than 1, the action
    will raise an exception and fail.
  capabilities:
    can_create_case_comments: false
