Mark Threat as a Favorite:
  ai_description: >-
    Marks a specific threat as a favorite within the BlueLiv platform. This action
    allows users to update the 'starred' or 'favorite' status of a threat resource
    associated with a specific module. It is primarily used for organizing and prioritizing
    threat intelligence data within the BlueLiv dashboard.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | --- | --- | --- | --- |

    | Module Type | String | Yes | The type of module the resource belongs to (e.g.,
    MALWARE, HACKTIVISM). |

    | Module ID | String | Yes | The specific ID of the module the resource belongs
    to. |

    | Resource ID | String | Yes | The unique identifier of the threat resource to
    be marked. |

    | Favorite Status | String (Dropdown) | Yes | The favorite status to apply. Options
    include: 'Not Starred', 'User Starred', 'Group Starred', or 'Full Starred'. |


    ### Flow Description

    1. **Initialization**: The action initializes the BlueLiv manager using the provided
    API credentials and configuration.

    2. **Parameter Extraction**: It retrieves the Module ID, Module Type, Resource
    ID, and the desired Favorite Status from the action parameters.

    3. **Status Mapping**: The human-readable 'Favorite Status' is mapped to the corresponding
    API constant (e.g., 'User Starred' maps to 'USER_STARRED').

    4. **API Execution**: A PUT request is sent to the BlueLiv API endpoint for marking
    favorites, targeting the specific resource within the defined module.

    5. **Completion**: The action returns a success message if the update is acknowledged
    by the BlueLiv server.
  capabilities:
