Add Labels to Threats:
  ai_description: >-
    Adds specified labels to one or more threat resources in BlueLiv. This action
    allows users to organize and categorize threats by applying existing labels based
    on the module type and ID. It validates the existence of both the labels and the
    threats before attempting to apply the labels.


    ### Parameters

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Module Type | String | Yes | The type of BlueLiv module the resource belongs
    to (e.g., MALWARE, HACKTIVISM). |

    | Module ID | String | Yes | The specific ID of the module the resource belongs
    to. |

    | Resource ID | String | Yes | A comma-separated list of Threat IDs to which the
    labels should be added. |

    | Label Names | String | Yes | A comma-separated list of label names to apply
    to the specified threats. |


    ### Flow Description

    1. **Initialization**: Retrieves configuration parameters (API Root, Credentials,
    Organization ID) and action parameters (Module Type, Module ID, Resource IDs,
    and Label Names).

    2. **Label Validation**: Fetches all available labels from BlueLiv and matches
    the provided label names against existing labels for the specified Module ID.

    3. **Threat Verification**: Checks if each provided Resource ID (Threat ID) exists
    in BlueLiv and retrieves their current labels.

    4. **Label Application**: For each valid threat, the action identifies which of
    the requested labels are not already present and applies them using a PUT request
    to the BlueLiv API.

    5. **Reporting**: Compiles a summary message detailing which labels were successfully
    added, which were already present, and which threats or labels could not be found.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Adds labels to threat resources within the BlueLiv platform, modifying the state
      of the threat objects in the external system.
    fetches_data: true
    internal_data_mutation_explanation: null
