Remove Labels From Threats:
  ai_description: >-
    Removes specified labels from threat resources in the BlueLiv platform. This action
    allows users to manage threat metadata by detaching labels from specific resources
    within a module. It performs validation to ensure that both the labels and the
    threats exist before attempting the removal.


    ### Parameters Description:


    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Module Type | String | Yes | Specify the module type the resource belongs to
    (e.g., malware, hacktivism). |

    | Module ID | String | Yes | Specify the module ID the resource belongs to. |

    | Resource ID | String | Yes | A comma-separated list of resource (threat) IDs
    from which you want to remove labels. |

    | Label Names | String | Yes | A comma-separated list of labels that need to be
    removed. Note: Case-sensitive. |


    ### Flow Description:

    1. **Authentication**: Initializes the BlueLiv manager and authenticates using
    provided credentials.

    2. **Label Validation**: Fetches all available labels from the BlueLiv organization
    to map the provided label names to their internal IDs and verify their existence
    for the specified module.

    3. **Threat Validation**: Checks each provided Resource ID to ensure the threat
    exists in the specified BlueLiv module.

    4. **Current State Retrieval**: For each valid threat, retrieves the list of labels
    currently associated with it.

    5. **Label Removal**: Iterates through the target labels and, if they are currently
    attached to the threat, performs the removal operation.

    6. **Reporting**: Generates a detailed output message summarizing which labels
    were successfully removed and which were already absent from the threats.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
