Get All Recipients By Sender:
  ai_description: >-
    ### General Description

    Retrieves a comprehensive list of email recipients who received messages from
    a specific sender address within a defined timeframe. This action interacts with
    the Cisco IronPort AsyncOS API's message tracking feature to identify communication
    patterns. It is designed to handle large datasets by utilizing pagination and
    asynchronous execution to prevent timeouts.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Sender | String | Yes | The email address of the sender to filter message tracking
    logs by. |

    | Search Emails for Last X | Integer | Yes | The numeric value representing the
    lookback period for the search. |

    | Set Search Email Period in | Enum | Yes | The time unit for the lookback period
    (Days or Hours). |

    | Max Recipients to Return | Integer | No | The maximum number of unique recipients
    to include in the final result. Defaults to 20. |

    | Page Size | Integer | No | The number of message records to retrieve per API
    request. Must be between 1 and 100. Defaults to 100. |


    ### Additional Notes

    - Message tracking and the AsyncOS API must be enabled on the IronPort appliance
    for this action to function.

    - The action runs asynchronously; if the search takes longer than the allowed
    iteration time, it will save its state and resume in the next cycle.


    ### Flow Description

    1. **Initialization**: Extracts configuration parameters (server, credentials)
    and action parameters (sender, timeframe, limits).

    2. **Timeframe Calculation**: Determines the start and end timestamps for the
    search based on the 'Search Emails for Last X' and 'Set Search Email Period in'
    inputs.

    3. **Message Retrieval**: Queries the IronPort `/message-tracking/messages` endpoint
    using the sender filter and calculated timeframe.

    4. **Pagination & Timeout Management**: Iterates through message pages. If the
    script approaches the SOAR execution timeout, it saves the current offset and
    collected recipients to resume later.

    5. **Data Aggregation**: Extracts recipient lists from each message and maintains
    a unique set of email addresses.

    6. **Completion**: Once all messages are processed or the 'Max Recipients to Return'
    limit is reached, it returns the final list of recipients as a JSON result.
