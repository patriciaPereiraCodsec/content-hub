Ping:
  ai_description: >-
    The Ping action is designed to verify the connectivity between Google SecOps and
    the Cisco IronPort (ESA) server using the AsyncOS REST API. It validates the provided
    configuration parameters, including server address, port, and credentials, by
    attempting to authenticate and retrieve a JWT token.


    ### Flow Description:

    1. **Parameter Extraction:** The action retrieves connection details such as Server
    Address, Port, Username, Password, and SSL configurations from the integration
    settings.

    2. **API Initialization:** It initializes the `IronportManagerAPI` client with
    the provided settings.

    3. **Authentication Attempt:** The manager attempts to log in to the IronPort
    AsyncOS API by sending a POST request to the login endpoint with Base64-encoded
    credentials.

    4. **Connectivity Validation:** If a JWT token is successfully returned, the connection
    is considered valid. If a connection error or authentication failure occurs, the
    action catches the exception and reports the failure.

    5. **Result Reporting:** The action concludes by providing a success or failure
    message to the Siemplify workbench.


    ### Parameters Description:

    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Server Address | String | Yes | The IP address or hostname of the IronPort server.
    |

    | AsyncOS API Port | Integer | Yes | The port used to communicate with the AsyncOS
    REST API. |

    | Username | String | Yes | The username for authentication with the IronPort
    server. |

    | Password | String | Yes | The password for authentication with the IronPort
    server. |

    | CA Certificate File | String | No | A Base64-encoded string of the CA certificate
    file used for SSL verification. |

    | Use SSL | Boolean | Yes | Determines whether to use HTTPS (True) or HTTP (False)
    for the connection. |

    | Verify SSL | Boolean | Yes | Determines whether to verify the SSL certificate
    of the server. |
