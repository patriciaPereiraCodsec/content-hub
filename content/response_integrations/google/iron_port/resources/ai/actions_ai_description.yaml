Get Report:
  ai_description: >-
    ### General Description

    Fetches specific IronPort report information from the AsyncOS API. This action
    can operate in two modes: global reporting or entity-based enrichment. When specific
    entities (IP, Hostname, or User) are provided and match the selected report type,
    the action filters the report data for those entities, updates their 'additional_properties',
    and marks them as enriched. If no entities are provided, it retrieves the general
    report data and presents it in a data table.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Report Type | String (Enum) | Yes | The type of report to fetch (e.g., mail_users_detail).
    This selection determines which entity types (if any) the action will attempt
    to enrich. |

    | Search Reports Data for Last X Days | Integer | Yes | Specifies the time frame
    in days for which to search for report data. Defaults to 7 days. |

    | Max Records to Return | Integer | Yes | Limits the number of records returned
    by the API. Defaults to 20. |


    ### Flow Description

    1. **Authentication**: Connects to the IronPort server using provided credentials
    and retrieves a JWT token.

    2. **Scope Determination**: Identifies which entity types (ADDRESS, HOSTNAME,
    or USERUNIQNAME) are relevant based on the chosen `Report Type` using internal
    mapping.

    3. **Data Retrieval**: Fetches the requested report from the IronPort AsyncOS
    API for the specified time range.

    4. **Entity Processing**: If matching entities are found in the current context,
    the action filters the report data for each entity, enriches the entity's additional
    properties, and creates an entity-specific data table.

    5. **Global Processing**: If no matching entities are found, the action outputs
    the retrieved report data into a single global data table.


    ### Additional Notes

    - The action supports a variety of report types, some of which are entity-specific
    (like `mail_users_detail`) and others that are general.

    - If a report type is selected that doesn't map to the entities present in the
    case, the action will default to global reporting mode.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: true
    can_update_entities: true
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: >-
      Updates entity additional properties with report data and sets the 'is_enriched'
      flag to true.
  categories:
    enrichment: true
  entity_usage:
