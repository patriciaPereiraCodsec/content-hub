Get All Recipients By Subject:
  ai_description: >-
    ### General Description

    Retrieves a comprehensive list of unique email recipients who received messages
    with a specific subject line from Cisco IronPort. This action is primarily used
    for incident scoping, such as identifying all users affected by a specific phishing
    campaign or a malicious email broadcast. It leverages the IronPort AsyncOS API
    and requires Message Tracking to be enabled on the target appliance.


    ### Parameters Description

    | Parameter | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Subject | String | Yes | The exact or partial email subject line to filter messages
    by. |

    | Search Emails for Last X | Integer | Yes | The numeric value representing the
    lookback window for the search. |

    | Set Search Email Period in | Dropdown | Yes | The time unit for the lookback
    window. Options are 'Days' or 'Hours'. |

    | Max Recipients to Return | Integer | No | The maximum number of unique recipient
    email addresses to return. Defaults to 20 if not specified or if a non-positive
    value is provided. |

    | Page Size | Integer | No | The number of message records to retrieve per API
    request. Defaults to 100. Valid range is 1 to 100. |


    ### Additional Notes

    - This action is **Asynchronous**. If the search involves a large volume of data
    that exceeds the script timeout, the action will save its progress and continue
    in a subsequent execution cycle.

    - The action ensures uniqueness by returning a set of recipients, even if multiple
    emails with the same subject were sent to the same person.


    ### Flow Description

    1. **Initialization**: The action extracts integration configuration (credentials,
    server details) and user-provided parameters.

    2. **Time Range Calculation**: Based on the 'Search Emails for Last X' and 'Set
    Search Email Period in' parameters, it calculates the start and end timestamps
    for the API query.

    3. **Message Retrieval**: It queries the IronPort Message Tracking API for messages
    matching the specified subject within the time range.

    4. **Pagination & Timeout Management**: The action fetches messages in pages (defined
    by 'Page Size'). Before each page request, it checks if the script is approaching
    its execution timeout. If so, it pauses and stores the current offset and collected
    recipients to resume later.

    5. **Data Extraction**: For every message found, it extracts the recipient list
    and adds them to a unique collection.

    6. **Completion**: The process stops when all matching messages are processed
    or the 'Max Recipients to Return' limit is reached. The final list of unique recipients
    is then returned as a JSON result.
