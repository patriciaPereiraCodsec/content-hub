Delete Alert:
  ai_description: "### General Description\nDeletes a specific alert in the Google\
    \ Alert Center using its unique identifier. This action is primarily used for\
    \ automated cleanup or resolution of alerts that have been processed. It is important\
    \ to note that deleted alerts are not immediately purged; they remain in a recoverable\
    \ state within the Google Alert Center for 30 days before being permanently deleted.\n\
    \n### Parameters Description\n| Parameter | Type | Mandatory | Description |\n\
    | :--- | :--- | :--- | :--- |\n| Alert ID | String | Yes | The unique identifier\
    \ of the alert that needs to be deleted from the Google Alert Center. |\n\n###\
    \ Additional Notes\n- The action is idempotent: if the specified Alert ID does\
    \ not exist or has already been deleted, the action will still return a successful\
    \ status.\n- Requires a Service Account with appropriate domain-wide delegation\
    \ and the `https://www.googleapis.com/auth/apps.alerts` scope.\n\n### Flow Description\n\
    1. **Setup**: Initializes the Google Alert Center manager using the provided Service\
    \ Account JSON and Impersonation Email.\n2. **Parameter Retrieval**: Extracts\
    \ the `Alert ID` from the action parameters.\n3. **Execution**: Sends a `DELETE`\
    \ request to the Google Alert Center API endpoint (`alerts/{alert_id}`).\n4. **Response\
    \ Handling**: \n    - If the deletion is successful, the action completes.\n \
    \   - If the API returns a 404 (Not Found), the action treats this as a success\
    \ since the alert is already absent.\n    - Other errors (e.g., invalid credentials,\
    \ network issues) result in a failed execution state."
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: true
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: >-
      Performs a DELETE request to the Google Alert Center API to remove an alert
      record.
    fetches_data: false
    internal_data_mutation_explanation: null
  categories:
    enrichment: false
  entity_usage:
    entity_types: []
    filters_by_additional_properties: false
    filters_by_alert_identifier: false
    filters_by_case_identifier: false
    filters_by_creation_time: false
    filters_by_entity_type: false
    filters_by_identifier: false
    filters_by_is_artifact: false
    filters_by_is_enriched: false
    filters_by_is_internal: false
    filters_by_is_pivot: false
    filters_by_is_suspicious: false
    filters_by_is_vulnerable: false
    filters_by_modification_time: false
Ping:
  ai_description: >-
    ### General Description

    Tests the connectivity to the Google Alert Center API using the provided service
    account credentials and impersonation settings. This action is primarily used
    during the initial setup or troubleshooting phase to ensure that the Google SecOps
    environment can successfully communicate with the Google Alert Center service.


    ### Parameters Description


    | Parameter Name | Type | Mandatory | Description |

    | :--- | :--- | :--- | :--- |

    | Service Account JSON Secret | String | Yes | The JSON key file content for the
    Google Service Account used for authentication. |

    | Impersonation Email Address | String | Yes | The email address of the Google
    Workspace user that the service account will impersonate to access alert data.
    |

    | Verify SSL | Boolean | Yes | If true, the action will verify the SSL certificate
    of the Google API endpoint. |


    ### Additional Notes

    - This action is a standard 'Ping' utility and does not process any entities or
    modify any data.

    - It requires a valid Google Service Account with the appropriate scopes (`https://www.googleapis.com/auth/apps.alerts`)
    and Domain-Wide Delegation if impersonation is used.


    ### Flow Description

    1. **Configuration Extraction**: The action retrieves the Service Account JSON,
    Impersonation Email, and SSL verification preference from the integration's configuration.

    2. **Client Initialization**: It initializes the `GoogleAlertCenterManager`, which
    parses the JSON secret and sets up an authorized HTTP client using Google's OAuth2
    library.

    3. **API Request**: The manager executes a `test_connectivity` call, which performs
    a `GET` request to the `/alerts` endpoint with a `pageSize` limit of 1.

    4. **Validation**: The action validates the HTTP response status. If the status
    is 200, the connection is considered successful.

    5. **Error Handling**: If the JSON is malformed or the API returns an error (e.g.,
    authentication failure), the action catches the exception and reports a descriptive
    failure message.
  capabilities:
    can_create_case_comments: false
    can_create_insight: false
    can_modify_alert_data: false
    can_mutate_external_data: false
    can_mutate_internal_data: false
    can_update_entities: false
    external_data_mutation_explanation: null
    fetches_data: true
    internal_data_mutation_explanation: null
  categories:
    enrichment: false
  entity_usage:
