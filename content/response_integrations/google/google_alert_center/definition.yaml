identifier: GoogleAlertCenter
name: Google Alert Center
parameters:
-   name: Service Account JSON Secret
    default_value: ''
    type: password
    description: Specify the full JSON content of the service account file to be used
        in the integration.
    is_mandatory: true
    integration_identifier: GoogleAlertCenter
-   name: Impersonation Email Address
    default_value: ''
    type: password
    description: Email address that has access to the alert center.
    is_mandatory: true
    integration_identifier: GoogleAlertCenter
-   name: Verify SSL
    default_value: true
    type: boolean
    description: If enabled, verify the SSL certificate for the connection to the
        Google Alert Center server is valid.
    is_mandatory: true
    integration_identifier: GoogleAlertCenter
documentation_link: https://cloud.google.com/chronicle/docs/soar/marketplace-integrations/google-alert-center
categories:
- Cloud Security
- Google
svg_logo_path: resources/logo.svg
image_path: resources/image.png
