identifier: SOCRadar
name: SOCRadar
parameters:
- name: API Root
  default_value: https://platform.socradar.com/api
  type: string
  description: SOCRadar API base URL.
  is_mandatory: true
  integration_identifier: SOCRadar
- name: API Key
  type: password
  description: SOCRadar platform API key with Incident API V4 permissions.
  is_mandatory: true
  integration_identifier: SOCRadar
- name: Company ID
  type: string
  description: SOCRadar company identifier (numeric).
  is_mandatory: true
  integration_identifier: SOCRadar
- name: Verify SSL
  default_value: true
  type: boolean
  description: Enable SSL certificate verification for API requests.
  is_mandatory: false
  integration_identifier: SOCRadar
- name: IOC Enrichment API Key
  type: password
  description: Separate API key for SOCRadar IOC Enrichment (credit-based add-on). Leave empty to skip enrichment actions.
  is_mandatory: false
  integration_identifier: SOCRadar
- name: Rapid Reputation API Key
  type: password
  description: Separate API key for SOCRadar Rapid Reputation (add-on). Provides quick reputation lookups for IPs, domains, URLs, and hashes. Leave empty to skip.
  is_mandatory: false
  integration_identifier: SOCRadar
documentation_link: https://socradar.io/docs
categories:
- Threat Intelligence
- Incident Management
svg_logo_path: resources/logo.svg
image_path: resources/image.png
