name: Sync IOC Feeds
parameters:
    -   name: Collection UUIDs
        default_value: ''
        type: string
        description: Comma-separated SOCRadar Threat Feed collection UUIDs to sync daily.
        is_mandatory: true
    -   name: Max IOCs Per Feed
        default_value: '5000'
        type: integer
        description: Maximum number of IOCs to fetch per feed collection. Default 5000.
        is_mandatory: false
    -   name: Reference List Prefix
        default_value: SOCRadar_IOC
        type: string
        description: "Prefix for Chronicle SIEM reference list names. Creates: {prefix}_ip, {prefix}_domain, {prefix}_hash, {prefix}_url."
        is_mandatory: false
    -   name: API Root
        default_value: https://platform.socradar.com/api
        type: string
        description: SOCRadar API base URL.
        is_mandatory: true
    -   name: API Key
        default_value: ''
        type: password
        description: SOCRadar platform API key.
        is_mandatory: true
    -   name: Company ID
        default_value: ''
        type: string
        description: SOCRadar company identifier (numeric).
        is_mandatory: true
    -   name: Verify SSL
        default_value: 'true'
        type: boolean
        description: Enable SSL certificate verification.
        is_mandatory: false
description: >
  Scheduled job that fetches IOCs from configured SOCRadar Threat Feed collections
  and writes them to Chronicle SIEM reference lists. Creates one list per IOC type
  (ip, domain, hash, url). Run daily to keep threat intelligence feeds current.
integration: SOCRadar
creator: SOCRadar
run_interval_in_seconds: 86400
