creator: SOCRadar
description: "Enrich an indicator (IP, domain, hash, URL) using the SOCRadar IOC Enrichment API. Returns threat score, severity, categorization, classifications, history, and optionally AI insights. Requires the IOC Enrichment API Key."
dynamic_results_metadata: []
integration_identifier: SOCRadar
name: Enrich Indicator
parameters:
- name: Indicator
  type: string
  default_value: ''
  is_mandatory: true
  description: The indicator value to enrich (IP address, domain, hash, or URL).
- name: Include AI Insight
  type: string
  default_value: 'false'
  is_mandatory: false
  description: Set to true to include AI-generated threat insight. Increases response time and credit usage.
- name: Fields
  type: string
  default_value: ''
  is_mandatory: false
  description: "Comma-separated fields: indicator_details, indicator_history, indicator_relations, indicator_ai_insight. Leave empty for default."
script_result_name: is_success
