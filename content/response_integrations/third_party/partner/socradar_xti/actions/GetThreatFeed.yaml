creator: SOCRadar
description: Fetch IOCs from one or more SOCRadar Threat Feed collections by UUID. Returns IOC values with type, confidence score, seen count, and first/last seen dates.
dynamic_results_metadata: []
integration_identifier: SOCRadar
name: Get Threat Feed
parameters:
- name: Collection UUIDs
  type: string
  default_value: ''
  is_mandatory: true
  description: Comma-separated SOCRadar Threat Feed collection UUIDs.
- name: Max IOCs Per Feed
  type: string
  default_value: '1000'
  is_mandatory: false
  description: Maximum number of IOCs to return per feed. Default 1000.
- name: IOC Type Filter
  type: string
  default_value: ''
  is_mandatory: false
  description: "Comma-separated IOC types to include: hash, ip, domain, url. Leave empty for all."
script_result_name: is_success
