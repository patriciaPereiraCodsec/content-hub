creator: SOCRadar
description: "Change the status of a SOCRadar alarm. Valid statuses: OPEN (0), INVESTIGATING (1), RESOLVED (2), PENDING_INFO (4), LEGAL_REVIEW (5), VENDOR_ASSESSMENT (6), FALSE_POSITIVE (9), DUPLICATE (10), PROCESSED_INTERNALLY (11), MITIGATED (12), NOT_APPLICABLE (13)."
dynamic_results_metadata: []
integration_identifier: SOCRadar
name: Change Alarm Status
parameters:
- name: Alarm ID
  type: string
  default_value: ''
  is_mandatory: true
  description: The SOCRadar alarm ID.
- name: Status
  type: string
  default_value: ''
  is_mandatory: true
  description: "New status name or code."
- name: Comments
  type: string
  default_value: ''
  is_mandatory: false
  description: Optional comment for the status change.
- name: Email
  type: string
  default_value: ''
  is_mandatory: false
  description: Email of the user making the change.
- name: Update Related Findings
  type: boolean
  default_value: 'true'
  is_mandatory: false
  description: Whether to update the status of related findings.
script_result_name: is_success
