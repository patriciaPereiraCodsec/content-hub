creator: SOCRadar
description: "Quick reputation lookup for an entity (IP, hostname, URL, or hash) using the SOCRadar Rapid Reputation API. Returns score, severity, whitelisting status, and threat intelligence sources. Requires the Rapid Reputation API Key."
dynamic_results_metadata: []
integration_identifier: SOCRadar
name: Rapid Reputation
parameters:
- name: Entity Value
  type: string
  default_value: ''
  is_mandatory: true
  description: "The entity to check (e.g. 37.46.210.230, evil.com, or a file hash)."
- name: Entity Type
  type: string
  default_value: ip
  is_mandatory: true
  description: "Type of entity: ip, hostname, url, or hash."
script_result_name: is_success
