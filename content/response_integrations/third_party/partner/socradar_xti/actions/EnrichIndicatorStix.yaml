creator: SOCRadar
description: "Enrich an indicator and return results in STIX 2.1 bundle format. Requires the IOC Enrichment API Key."
dynamic_results_metadata: []
integration_identifier: SOCRadar
name: Enrich Indicator STIX
parameters:
- name: Indicator
  type: string
  default_value: ''
  is_mandatory: true
  description: The indicator value to enrich (IP address, domain, hash, or URL).
- name: Show Credit Details
  type: string
  default_value: 'false'
  is_mandatory: false
  description: Set to true to include API credit usage details in the response.
script_result_name: is_success
