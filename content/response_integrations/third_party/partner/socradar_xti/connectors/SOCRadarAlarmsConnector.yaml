name: SOCRadar Alarms Connector
parameters:
    -   name: DeviceProductField
        default_value: device_product
        type: string
        description: The field name used to determine the device product.
        is_mandatory: true
        is_advanced: false
        mode: regular
    -   name: EventClassId
        default_value: alarm_id
        type: string
        description: The field name used to determine the event name (sub-type).
        is_mandatory: true
        is_advanced: false
        mode: regular
    -   name: Environment Field Name
        default_value: ''
        type: string
        description: Name of the field where the environment name is stored. If empty, uses default environment.
        is_mandatory: false
        is_advanced: false
        mode: script
    -   name: Environment Regex Pattern
        default_value: .*
        type: string
        description: A regex pattern to run on the environment field value.
        is_mandatory: false
        is_advanced: false
        mode: script
    -   name: PythonProcessTimeout
        default_value: '180'
        type: integer
        description: Timeout limit (in seconds) for the Python process running the connector.
        is_mandatory: true
        is_advanced: false
        mode: script
    -   name: API Root
        default_value: https://platform.socradar.com/api
        type: string
        description: SOCRadar API base URL.
        is_mandatory: true
        is_advanced: false
        mode: script
    -   name: API Key
        default_value: ''
        type: password
        description: SOCRadar platform API key with Incident API V4 permissions.
        is_mandatory: true
        is_advanced: false
        mode: script
    -   name: Company ID
        default_value: ''
        type: string
        description: SOCRadar company identifier (numeric).
        is_mandatory: true
        is_advanced: false
        mode: script
    -   name: Verify SSL
        default_value: 'true'
        type: boolean
        description: Enable SSL certificate verification for API requests.
        is_mandatory: false
        is_advanced: false
        mode: script
    -   name: Max Alerts Per Cycle
        default_value: '100'
        type: integer
        description: Maximum number of alarms to ingest per polling cycle.
        is_mandatory: false
        is_advanced: false
        mode: script
    -   name: Extract Indicators
        default_value: 'true'
        type: boolean
        description: Extract IOCs (IP, URL, Email, MD5, SHA1, SHA256) from alarm content as separate indicator events for entity mapping. Default true.
        is_mandatory: false
        is_advanced: false
        mode: script
    -   name: Severity Filter
        default_value: ''
        type: string
        description: "Comma-separated severity levels to fetch: LOW, MEDIUM, HIGH, CRITICAL. Leave empty for all."
        is_mandatory: false
        is_advanced: false
        mode: script
    -   name: Status Filter
        default_value: OPEN
        type: string
        description: "Status filter: OPEN, CLOSED, ON_HOLD. Default: OPEN."
        is_mandatory: false
        is_advanced: false
        mode: script
    -   name: Main Type Filter
        default_value: ''
        type: string
        description: "Comma-separated alarm main types. E.g.: Attack Surface Management, Deep & Dark Web Monitoring. Leave empty for all."
        is_mandatory: false
        is_advanced: false
        mode: script
    -   name: Sub Type Filter
        default_value: ''
        type: string
        description: "Comma-separated alarm sub-types. E.g.: Stolen Credentials On Dark Web Bot Market. Leave empty for all."
        is_mandatory: false
        is_advanced: false
        mode: script
    -   name: Tags Filter
        default_value: ''
        type: string
        description: Comma-separated tags to filter alarms by. Leave empty for all.
        is_mandatory: false
        is_advanced: false
        mode: script
    -   name: Assignees Filter
        default_value: ''
        type: string
        description: Comma-separated assignee names or emails to filter alarms by. Leave empty for all.
        is_mandatory: false
        is_advanced: false
        mode: script
description: >
  Polling connector that ingests SOCRadar alarms as Google SecOps SOAR cases.
  Extracts indicator events (IPs, domains, URLs, emails, hashes) for entity mapping.
  Severity mapped to risk-score bands (CRITICAL=90, HIGH=70, MEDIUM=50, LOW=30, INFO=10).
  Supports filtering by severity, status, main type, sub type, tags, and assignees.
integration: SOCRadar
documentation_link: https://socradar.io/docs
rules: []
is_connector_rules_supported: false
creator: SOCRadar
