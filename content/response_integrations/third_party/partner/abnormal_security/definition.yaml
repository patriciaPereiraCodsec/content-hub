identifier: AbnormalSecurity
name: Abnormal Security
parameters:
-   name: API URL
    default_value: https://api.abnormalplatform.com
    type: string
    description: The base URL of the Abnormal Security API. US customers use
        https://api.abnormalplatform.com (default). EU customers use
        https://eu.rest.abnormalsecurity.com.
    is_mandatory: true
    integration_identifier: AbnormalSecurity
-   name: API Key
    default_value: ''
    type: password
    description: The API key used to authenticate with the Abnormal Security API.
    is_mandatory: true
    integration_identifier: AbnormalSecurity
-   name: Verify SSL
    default_value: 'true'
    type: boolean
    description: If enabled, SSL certificates will be verified for API requests.
    is_mandatory: false
    integration_identifier: AbnormalSecurity
documentation_link: https://abnormalsecurity.com
categories:
- Email Security
- Security
svg_logo_path: resources/logo.svg
image_path: resources/image.png
