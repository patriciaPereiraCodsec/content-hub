- description: 'Added 14 actions (Submit Inquiry, List Activities, Get Threat Attachments,
        Get Threat Links, Get Case Analysis, and verb-specific Remediate/Unremediate
        Threat, Mark/Resolve Case, Delete/Move/Submit Messages wrappers). Entity-scoped
        actions pre-fill from the current alert and operate only on the matching entity
