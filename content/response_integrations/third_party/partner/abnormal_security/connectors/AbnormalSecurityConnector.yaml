name: Abnormal Security Threats and Cases Connector
description: Polls Abnormal Security for new threats and cases and ingests them as
    SOAR alerts. Runs on a configurable schedule (recommended every 2 minutes) and
    uses time-based filtering to fetch only new events since the last run.
parameters:
-   name: DeviceProductField
    default_value: device_product
    type: string
    description: The field name used to determine the device product.
    is_mandatory: true
    is_advanced: false
    mode: regular
-   name: EventClassId
    default_value: attackType
    type: string
    description: The field name used to determine the event class / sub-type.
    is_mandatory: false
    is_advanced: false
    mode: regular
-   name: PythonProcessTimeout
    default_value: '120'
    type: integer
    description: Timeout limit (in seconds) for the Python process running this connector.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: API URL
    default_value: https://api.abnormalplatform.com
    type: string
    description: Base URL of the Abnormal Security API. US customers use
        https://api.abnormalplatform.com (default). EU customers use
        https://eu.rest.abnormalsecurity.com.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: API Key
    default_value: ''
    type: password
    description: API key used to authenticate with the Abnormal Security API.
    is_mandatory: true
    is_advanced: false
    mode: script
-   name: Verify SSL
    default_value: 'true'
    type: boolean
    description: If enabled, SSL certificates will be verified for API requests.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Max Days Backwards
    default_value: '1'
    type: integer
    description: Maximum number of days back to fetch events on the first run (or
        if the saved timestamp is older than this value).
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Max Alerts Per Cycle
    default_value: '50'
    type: integer
    description: Maximum number of alerts (threats + cases combined) to process per
        connector execution cycle.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Force From Date
    default_value: 'None'
    type: string
    description: 'Override the saved timestamp for this run only. ISO format: 2025-01-01T00:00:00Z.
        Leave as None to use the saved timestamp.'
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Proxy Server Address
    default_value: None
    type: string
    description: The address of the proxy server to use.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Proxy Username
    default_value: None
    type: string
    description: The proxy username to authenticate with.
    is_mandatory: false
    is_advanced: false
    mode: script
-   name: Proxy Password
    default_value: None
    type: password
    description: The proxy password to authenticate with.
    is_mandatory: false
    is_advanced: false
    mode: script
integration: AbnormalSecurity
documentation_link: https://abnormalsecurity.com
rules: []
is_connector_rules_supported: false
creator: AbnormalSecurity
