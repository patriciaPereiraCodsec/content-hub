name: Post Case Action
description: Update the status of an Abnormal Security case. Use 'action_required'
    to flag a case for attention, 'acknowledge' to mark it as reviewed, or 'close'
    to close the case.
integration_identifier: AbnormalSecurity
entity_types:
- THREATCAMPAIGN
parameters:
-   name: Case ID
    default_value: ''
    type: string
    description: The unique identifier of the Abnormal Case (Account Takeover / abuse-mailbox
        case) to act on. Cases are a distinct resource from threats and do not appear in
        the SIEM threat-log event body, so this field does not auto-fill from a threat event.
        Enter the case ID directly, or chain it from a prior List Cases / Get Case step.
    is_mandatory: true
-   name: Action
    default_value: action_required
    type: string
    description: 'Action to take on the case. Valid values: action_required, acknowledge_resolved,
        acknowledge_in_progress, acknowledge_not_an_attack.'
    is_mandatory: true
dynamic_results_metadata:
-   result_example_path: resources/PostCaseAction_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: AbnormalSecurity
