name: List Activities
description: List all remediation activities visible to the API key, with optional
    tenant scoping. Useful for audit workflows — see every action submitted, not just
    one by ID.
integration_identifier: AbnormalSecurity
parameters:
-   name: Tenant IDs
    default_value: ''
    type: string
    description: Optional comma-separated tenant IDs to scope the query to.
    is_mandatory: false
-   name: Page Size
    default_value: '100'
    type: string
    description: Number of activities to return per page.
    is_mandatory: false
-   name: Page Number
    default_value: '1'
    type: string
    description: Page number to retrieve.
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/ListActivities_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: AbnormalSecurity
