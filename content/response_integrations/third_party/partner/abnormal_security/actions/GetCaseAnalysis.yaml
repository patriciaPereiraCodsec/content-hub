name: Get Case Analysis
description: Retrieve the detailed analysis for an Abnormal Security case, including
    findings, attack signals, and supporting evidence beyond what Get Case returns.
integration_identifier: AbnormalSecurity
entity_types:
- THREATCAMPAIGN
parameters:
-   name: Case ID
    default_value: ''
    type: string
    description: The unique identifier of the Abnormal Case (Account Takeover / abuse-mailbox
        case) to act on. Cases are a distinct resource from threats and do not appear in
        the SIEM threat-log event body, so this field does not auto-fill from a threat event.
        Enter the case ID directly, or chain it from a prior List Cases / Get Case step.
    is_mandatory: true
dynamic_results_metadata:
-   result_example_path: resources/GetCaseAnalysis_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: AbnormalSecurity
