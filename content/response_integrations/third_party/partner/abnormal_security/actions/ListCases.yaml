name: List Cases
description: Retrieve a paginated list of cases from Abnormal Security. Use the Filter
    parameter to narrow results by time range or status (e.g. createdTime gte 2025-01-01T00:00:00Z).
integration_identifier: AbnormalSecurity
parameters:
-   name: Filter
    default_value: ''
    type: string
    description: 'Optional filter expression. Example: createdTime gte 2025-01-01T00:00:00Z'
    is_mandatory: false
-   name: Page Size
    default_value: '100'
    type: string
    description: Number of cases to return per page (max 100).
    is_mandatory: false
-   name: Page Number
    default_value: '1'
    type: string
    description: Page number to retrieve.
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/ListCases_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: AbnormalSecurity
