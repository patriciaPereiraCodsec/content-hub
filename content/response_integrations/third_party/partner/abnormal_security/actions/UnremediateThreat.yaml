name: Unremediate Threat
description: Reverse a remediation on an Abnormal Security threat. Convenience action for `Post Threat Action` with action=unremediate hard-coded.
integration_identifier: AbnormalSecurity
entity_types:
- THREATSIGNATURE
parameters:
-   name: Threat ID
    default_value: '[Event.event_extracted_event.abx_body.threat_id]'
    type: string
    description: The unique identifier of the threat to act on. When the action is run with scope on a ThreatSignature entity, this resolves to the entity's identifier (the Abnormal threat_id).
    is_mandatory: true
-   name: Message IDs
    default_value: '[Event.event_extracted_event.abx_body.abx_message_id_str]'
    type: string
    description: Comma-separated list of specific message IDs to act on within the
        threat. Leave empty to act on all messages.
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/UnremediateThreat_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: AbnormalSecurity
