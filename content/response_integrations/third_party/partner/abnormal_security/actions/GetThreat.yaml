name: Get Threat
description: Retrieve full details of a specific Abnormal Security threat by its ID,
    including attack type, confidence score, disposition, affected messages, and available
    remediation actions.
integration_identifier: AbnormalSecurity
entity_types:
- THREATSIGNATURE
parameters:
-   name: Threat ID
    default_value: '[Event.event_extracted_event.abx_body.threat_id]'
    type: string
    description: The unique identifier of the threat to act on. When the action is run with scope on a ThreatSignature entity, this resolves to the entity's identifier (the Abnormal threat_id).
    is_mandatory: true
dynamic_results_metadata:
-   result_example_path: resources/GetThreat_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: AbnormalSecurity
