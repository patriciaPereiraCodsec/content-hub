name: Get Threat Attachments
description: Retrieve the list of attachments associated with an Abnormal Security
    threat. Useful for forensics workflows where an analyst needs to enumerate attachment
    metadata before deciding on remediation.
integration_identifier: AbnormalSecurity
entity_types:
- THREATSIGNATURE
parameters:
-   name: Threat ID
    default_value: '[Event.event_extracted_event.abx_body.threat_id]'
    type: string
    description: The unique identifier of the threat to act on. When the action is run with scope on a ThreatSignature entity, this resolves to the entity's identifier (the Abnormal threat_id).
    is_mandatory: true
dynamic_results_metadata:
-   result_example_path: resources/GetThreatAttachments_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: AbnormalSecurity
