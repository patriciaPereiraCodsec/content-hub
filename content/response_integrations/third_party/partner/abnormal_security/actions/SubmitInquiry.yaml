name: Submit Inquiry
description: Submit a false-positive or false-negative report to Abnormal Security's
    detection team. Use this when a SOAR analyst disagrees with an Abnormal verdict.
integration_identifier: AbnormalSecurity
parameters:
-   name: Report Type
    default_value: false-positive
    type: string
    description: 'The inquiry type. Valid values: false-positive, false-negative.'
    is_mandatory: true
-   name: Reporter
    default_value: ''
    type: string
    description: Identifier of the analyst submitting the inquiry (email or username).
    is_mandatory: true
-   name: Subject
    default_value: ''
    type: string
    description: Optional subject line of the message in question.
    is_mandatory: false
-   name: Sender Email
    default_value: ''
    type: string
    description: Optional sender email address.
    is_mandatory: false
-   name: Sender Display Name
    default_value: ''
    type: string
    description: Optional sender display name.
    is_mandatory: false
-   name: Recipient Email
    default_value: ''
    type: string
    description: Optional recipient email address.
    is_mandatory: false
-   name: Recipient Display Name
    default_value: ''
    type: string
    description: Optional recipient display name.
    is_mandatory: false
-   name: Received Time
    default_value: ''
    type: string
    description: 'Optional ISO 8601 timestamp the message was received (e.g. 2026-05-13T10:00:00Z).'
    is_mandatory: false
-   name: Description
    default_value: ''
    type: string
    description: Optional analyst note explaining why the verdict is being challenged.
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/SubmitInquiry_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: AbnormalSecurity
