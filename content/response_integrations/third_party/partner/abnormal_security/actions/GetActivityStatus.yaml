name: Get Activity Status
description: Check the status of a remediation operation using the Activity Log ID
    returned by Remediate Messages. Poll this action until the status reaches a terminal
    state (success, partial_success, or error).
integration_identifier: AbnormalSecurity
parameters:
-   name: Activity Log ID
    default_value: ''
    type: string
    description: Numeric Activity Log ID returned by the Remediate Messages action.
    is_mandatory: true
-   name: Tenant IDs
    default_value: ''
    type: string
    description: Optional. Tenant scope is resolved from the API key, so this field
        is not required and is ignored by the status endpoint.
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/GetActivityStatus_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: AbnormalSecurity
