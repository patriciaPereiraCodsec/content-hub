name: Search Messages
description: Search for email messages across your organization based on threat indicators
    such as time range, sender email, or subject. Returns a list of matching messages
    that can be passed to Remediate Messages for automated response.
integration_identifier: AbnormalSecurity
parameters:
-   name: Start Time
    default_value: ''
    type: string
    description: Search start time in ISO 8601 format (e.g. 2025-01-01T00:00:00Z).
        Leave empty to default to 24 hours before now (UTC).
    is_mandatory: false
-   name: End Time
    default_value: ''
    type: string
    description: Search end time in ISO 8601 format (e.g. 2025-01-02T00:00:00Z).
        Leave empty to default to now (UTC).
    is_mandatory: false
-   name: Sender Email
    default_value: ''
    type: string
    description: Filter results to messages from this sender email address.
    is_mandatory: false
-   name: Subject
    default_value: ''
    type: string
    description: Filter results to messages containing this subject.
    is_mandatory: false
-   name: Tenant IDs
    default_value: ''
    type: string
    description: Comma-separated list of tenant IDs to scope the search. Leave empty
        to search across all tenants.
    is_mandatory: false
dynamic_results_metadata:
-   result_example_path: resources/SearchMessages_JsonResult_example.json
    result_name: JsonResult
    show_result: true
creator: AbnormalSecurity
