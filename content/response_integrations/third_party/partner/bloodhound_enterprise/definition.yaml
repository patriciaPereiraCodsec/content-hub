identifier: bloodhound_enterprise
name: BloodHound Enterprise
parameters:
-   name: BloodHound Enterprise Server
    default_value: https://demo.bloodhoundenterprise.io/
    type: string
    description: Base URL of the BloodHound Enterprise API.
    is_mandatory: true
    integration_identifier: bloodhound_enterprise
-   name: Token ID
    default_value: null
    type: password
    description: Token ID for the BloodHound Enterprise API.
    is_mandatory: true
    integration_identifier: bloodhound_enterprise
-   name: Token Key
    default_value: null
    type: password
    description: Token Key for the BloodHound Enterprise API.
    is_mandatory: true
    integration_identifier: bloodhound_enterprise
-   name: Verify SSL
    default_value: 'true'
    type: boolean
    description: If enabled, verify the SSL certificate for the connection to the
        BloodHound Enterprise server is valid.
    is_mandatory: true
    integration_identifier: bloodhound_enterprise
categories:
- Identity
- Security
- Threat Intelligence
documentation_link: https://support.bloodhoundenterprise.io/hc/en-us/categories/14893808259099-API
svg_logo_path: resources/logo.svg
image_path: resources/image.png
