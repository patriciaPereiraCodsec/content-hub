[project]
name = "bloodhound_enterprise"
version = "1.0"
description = "BloodHound Enterprise integration for Google SecOps. Connects BloodHound Enterprise's attack-path and identity-risk data with Google SecOps so security teams can correlate privilege exposure with SOAR alerts and respond directly from playbooks. In case of any queries, please reach out to support@specterops.io."
requires-python = ">=3.11,<3.12"
dependencies = [
    "requests>=2.32.3",
]

[dependency-groups]
dev = [
    "environmentcommon",
    "integration-testing",
    "pytest-json-report>=1.5.0",
    "pytest>=8.3.5",
    "soar-sdk",
    "tipcommon",
]

[tool.uv.sources]
soar-sdk = { git = "https://github.com/chronicle/soar-sdk.git" }
integration-testing = { path = "../../../../../packages/integration_testing_whls/integration_testing-2.3.8-py3-none-any.whl" }
tipcommon = { path = "../../../../../packages/tipcommon/whls/TIPCommon-2.3.8-py3-none-any.whl" }
environmentcommon = { path = "../../../../../packages/envcommon/whls/EnvironmentCommon-1.0.3-py3-none-any.whl" }

[[tool.uv.index]]
url = "https://pypi.org/simple"
default = true
