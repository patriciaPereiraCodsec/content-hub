# Product: SAP_NETWEAVER
# Category: Database
# Supported Format: JSON
# Reference: N/A
# Last Updated: 2023-05-03
# Copyright 2023 Chronicle LLC

filter {

  mutate {
    replace => {
      "EventTime" => ""
      "MessageID" => ""
      "ProcessID" => ""
      "Username" => ""
      "MessageData" => ""
      "EventReceivedTime" => ""
      "SourceModuleName" => ""
      "SourceModuleType" => ""
      "Program" => ""
    }
  }

  json {
    source => "message"
  }

  if [EventTime] != "" {
    date {
      match => ["EventTime", "yyyy-MM-dd HH:mm:ss"]
    }
  }

  if [EventReceivedTime] != "" {
    date {
      match => ["EventReceivedTime", "ISO8601","RFC3339"]
      target => "event.idm.read_only_udm.metadata.ingested_timestamp"
    }
  }

  mutate {
    replace => {
      "event.idm.read_only_udm.metadata.vendor_name" => "SAP"
      "event.idm.read_only_udm.metadata.product_name" => "SAP Netweaver"
      "event.idm.read_only_udm.metadata.event_type" => "USER_UNCATEGORIZED"
    }
  }

  if [MessageID] != "" {
    mutate {
      replace => {
        "event.idm.read_only_udm.metadata.product_log_id" => "%{MessageID}"
      }
    }
  }

  if [MessageData] != "" {
    mutate {
      replace => {
        "event.idm.read_only_udm.metadata.description" => "%{MessageData}"
      }
    }
  }

  if [Program] != "" {
    mutate {
      replace => {
        "event.idm.read_only_udm.principal.application" => "%{Program}"
      }
    }
  }

  if [ProcessID] != "" {
    mutate {
      replace => {
        "event.idm.read_only_udm.principal.process.pid" => "%{ProcessID}"
      }
    }
  }

  if [Username] != "" {
    mutate {
      replace => {
        "event.idm.read_only_udm.principal.user.userid" => "%{Username}"
      }
    }
  }

  if [SourceModuleName] != "" {
    mutate {
      replace => {
        "event.idm.read_only_udm.target.resource.name" => "%{SourceModuleName}"
      }
    }
  }

  if [SourceModuleType] != "" {
    mutate {
      replace => {
        "event.idm.read_only_udm.target.resource.resource_subtype" => "%{SourceModuleType}"
      }
    }
  }

  if [Username] == "" {
    mutate {
      replace => {
        "event.idm.read_only_udm.metadata.event_type" => "GENERIC_EVENT"
      }
    }
  }

  mutate {
    merge => {
      "@output" => "event"
    }
  }
}
