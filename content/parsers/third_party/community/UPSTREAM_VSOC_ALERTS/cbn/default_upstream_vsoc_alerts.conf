# Product: Upstream Vehicle SOC Alerts Parser
# Category: Schema
# Supported Format: JSON
# Reference: N/A
# Last Updated: 2025-09-02
# Copyright 2025 Google SecOps

filter {
  mutate {
    replace => {
      "createdAt" => ""
      "processedAt" => ""
      "firstOccurrence" => ""
      "lastOccurrence" => ""
      "updatedAt" => ""
      "token_metadata" => ""
      "token_principal" => ""
      "token_network" => ""
      "token_security_result" => ""
      "token_about" => ""
      "apiVersion" => ""
      "serviceId" => ""
      "detectorId" => ""
      "serviceName" => ""
      "detectorName" => ""
      "detectorType" => ""
      "name" => ""
      "description" => ""
      "url" => ""
      "severity" => ""
      "status" => ""
      "assetId.value" => ""
      "assetType" => ""
      "message_value" => ""
      "records" => ""
      "vehicleModel" => ""
      "id" => ""
      "affectedAssets" => ""
      "shortVin" => ""
    }
  }

  # Event - Validation
  # The Upstream event should be a valid JSON
  # Tag the message as TAG_MALFORMED_MESSAGE invalid event
  grok {
    match => {
      "message" => [
        "^:%{GREEDYDATA:message_value}:$",
        "%{GREEDYDATA:message_value}:$",
        "^:%{GREEDYDATA:message_value}"
        ]
    }
    overwrite => ["message_value"]
    on_error => "message_grok_pattern_error"
  }
  json {
    source => "message_value"
    array_function => "split_columns"
    on_error => "not_in_json_format_1"
  }
  mutate {
    rename => {
      "message" => "message_1"
    }
  }
  mutate {
    gsub => [
      "message_1","\\\n",""
    ]
  }
  json {
    source => "message_1"
    array_function => "split_columns"
    on_error => "not_in_json_format"
  }
  if [not_in_json_format] and [not_in_json_format_1] {
    mutate {
      replace => {
        "records" => "{\"records\":%{message_1}}"
      }
      on_error => "records_not_replaced"
    }
    json {
      source => "records"
      array_function => "split_columns"
      on_error => "json_fail"
    }
    if [not_in_json_format] and [not_in_json_format_1] and [json_fail] {
      drop {
        tag => "TAG_MALFORMED_MESSAGE"
      }
    }
  }
  if [records] != "" {
    for index, record in records {
      mutate {
        replace => {
          "event" => ""
          "security_result" => ""
          "about" => ""
          "endpoint_details_url" => ""
          "endpoint_details_host" => ""
          "endpoint_details_path" => ""
          "endpoint_details_apititle" => ""
          "endpoint_details_contact" => ""
          "endpoint_details_description" => ""
          "endpoint_details_updatedat" => ""
          "record_severity" => ""
          "location_type" => ""
        }
      }
      # Convert fields to required types
      mutate {
        convert => {
          "record.id" => "string"
          "record.apiVersion" => "string"
          "record.serviceId" => "string"
          "record.detectorId" => "string"
        }
        on_error => "convert_error"
      }
      mutate {
        replace => {
          "id_label.key" => "id"
          "id_label.value.string_value" => "%{record.id}"
        }
        on_error => "no_record_id"
      }
      if ![no_record_id] {
        mutate {
          merge => {
            "event.idm.read_only_udm.additional.fields" => "id_label"
          }
          on_error => "no_record_id_label"
        }
      }
      mutate {
        replace => {
          "vehicleModel_label.value" => "%{record.vehicleModel}"
        }
        on_error => "no_record_vehicle_model"
      }
      if ![no_record_vehicle_model] {
        mutate {
          replace => {
            "vehicleModel_label.key" => "vehicle_model"
          }
        }
        mutate {
          merge => {
            "event.idm.read_only_udm.principal.asset.attribute.labels" => "vehicleModel_label"
          }
          on_error => "no_vehicle_model_label_merge"
        }
      }
      mutate {
        replace => {
          "event.idm.read_only_udm.metadata.product_log_id" => "%{record.recordId}"
        }
        on_error => "no_record_id"
      }
      mutate {
        replace => {
          "event.idm.read_only_udm.principal.asset_id" => "%{record.assetType}:\%{record.assetId.value}"
        }
        on_error => "no_asset_id"
      }
      mutate {
        replace => {
          "event.idm.read_only_udm.principal.application" => "%{record.serviceName}"
        }
        on_error => "no_record_service_name"
      }
      mutate {
        replace => {
          "security_result.rule_name" => "%{record.detectorName}"
        }
        on_error => "no_record_detector_name"
      }
      mutate {
        replace => {
          "security_result.rule_type" => "%{record.detectorType}"
        }
        on_error => "no_record_detector_type"
      }
      mutate {
        replace => {
          "event.idm.read_only_udm.metadata.log_type" => "%{record.name}"
          "event.idm.read_only_udm.metadata.product_event_type" => "%{record.name}"
        }
        on_error => "no_record_name"
      }
      mutate {
        replace => {
          "event.idm.read_only_udm.metadata.product_version" => "%{record.apiVersion}"
        }
        on_error => "no_record_api_version"
      }
      mutate {
        convert => {
          "record.serviceId" => "string"
        }
        on_error => "no_record_service_id_conversion"
      }
      mutate {
        replace => {
          "event.idm.read_only_udm.principal.process.pid" => "%{record.serviceId}"
        }
        on_error => "no_record_service_id"
      }
      mutate {
        replace => {
          "event.idm.read_only_udm.metadata.url_back_to_product" => "%{record.url}"
        }
        on_error => "no_record_url"
      }
      mutate {
        replace => {
          "record_severity" => "%{record.severity}"
        }
        on_error => "no_record_severity"
      }
      if [record_severity] != "" {
        mutate {
          replace => {
            "security_result.severity_details" => "%{record_severity}"
          }
          on_error => "no_record_severity"
        }
        mutate {
          uppercase => ["record_severity"]
          on_error => "no_record_severity_uppercase"
        }
        if [record_severity] == "LOW" {
          mutate {
            replace => {
              "security_result.severity" => "LOW"
            }
          }
        }
        else if [record_severity] == "MEDIUM" {
          mutate {
            replace => {
              "security_result.severity" => "MEDIUM"
            }
          }
        }
        else if [record_severity] == "HIGH" {
          mutate {
            replace => {
              "security_result.severity" => "HIGH"
            }
          }
        }
        else if [record_severity] == "CRITICAL" {
          mutate {
            replace => {
              "security_result.severity" => "CRITICAL"
            }
          }
        }
      }
      mutate {
        replace => {
          "endpoint_details_url.key" => "endpoint_url"
          "endpoint_details_url.value.string_value" => "%{record.endpointDetails.url}"
        }
        on_error => "no_record_endpoint_url"
      }
      if ![no_record_endpoint_url] {
        mutate {
          merge => {
            "event.idm.read_only_udm.additional.fields" => "endpoint_details_url"
          }
          on_error => "no_record_endpoint_url_label"
        }
      }
      mutate {
        replace => {
          "endpoint_details_host.key" => "endpoint_host"
          "endpoint_details_host.value.string_value" => "%{record.endpointDetails.host}"
        }
        on_error => "no_record_endpoint_host"
      }
      if ![no_record_endpoint_host] {
        mutate {
          merge => {
            "event.idm.read_only_udm.additional.fields" => "endpoint_details_host"
          }
          on_error => "no_record_endpoint_host_label"
        }
      }
      mutate {
        replace => {
          "event.idm.read_only_udm.network.http.method" => "%{record.endpointDetails.method}"
        }
        on_error => "no_record_endpoint_method"
      }
      mutate {
        replace => {
          "endpoint_details_path.key" => "endpoint_path"
          "endpoint_details_path.value.string_value" => "%{record.endpointDetails.path}"
        }
        on_error => "no_record_endpoint_path"
      }
      if ![no_record_endpoint_path] {
        mutate {
          merge => {
            "event.idm.read_only_udm.additional.fields" => "endpoint_details_path"
          }
          on_error => "no_record_endpoint_path_label"
        }
      }
      mutate {
        replace => {
          "endpoint_details_apititle.key" => "endpoint_apititle"
          "endpoint_details_apititle.value.string_value" => "%{record.endpointDetails.apiTitle}"
        }
        on_error => "no_record_endpoint_apititle"
      }
      if ![no_record_endpoint_apititle] {
        mutate {
          merge => {
            "event.idm.read_only_udm.additional.fields" => "endpoint_details_apititle"
          }
          on_error => "no_record_endpoint_apititle_label"
        }
      }
      mutate {
        replace => {
          "endpoint_details_contact.key" => "endpoint_contact"
          "endpoint_details_contact.value.string_value" => "%{record.endpointDetails.contact}"
        }
        on_error => "no_record_endpoint_contact"
      }
      if ![no_record_endpoint_contact] and [endpoint_details_contact][value][string_value] != "" {
        mutate {
          merge => {
            "event.idm.read_only_udm.additional.fields" => "endpoint_details_contact"
          }
          on_error => "no_record_endpoint_contact_label"
        }
      }
      mutate {
        gsub => ["record.endpointDetails.description", "\\n", ""]
      }
      mutate {
        replace => {
          "endpoint_details_description.key" => "endpoint_description"
          "endpoint_details_description.value.string_value" => "%{record.endpointDetails.description}"
        }
        on_error => "no_record_endpoint_description"
      }
      if ![no_record_endpoint_description] {
        mutate {
          merge => {
            "event.idm.read_only_udm.additional.fields" => "endpoint_details_description"
          }
          on_error => "no_record_endpoint_description_label"
        }
      }
      mutate {
        replace => {
          "endpoint_details_updatedat.key" => "endpoint_updatedat"
          "endpoint_details_updatedat.value.string_value" => "%{record.endpointDetails.updatedAt}"
        }
        on_error => "no_record_endpoint_updatedat"
      }
      if ![no_record_endpoint_updatedat] {
        mutate {
          merge => {
            "event.idm.read_only_udm.additional.fields" => "endpoint_details_updatedat"
          }
          on_error => "no_record_endpoint_updatedat_label"
        }
      }
      mutate {
        replace => {
          "shortVin_label.value" => "%{record.shortVin}"
        }
        on_error => "no_short_vin"
      }
      if ![no_short_vin] {
        mutate {
          replace => {
            "shortVin_label.key" => "short_vin"
          }
        }
        mutate {
          merge => {
            "event.idm.read_only_udm.principal.asset.attribute.labels" => "shortVin_label"
          }
          on_error => "no_short_vin_label"
        }
      }
      mutate {
        replace => {
          "affectedAssets_label.value.string_value" => "%{record.affectedAssets}"
        }
        on_error => "no_affected_assets"
      }
      if ![no_affected_assets] {
        mutate {
          replace => {
            "affectedAssets_label.key" => "affected_assets"
          }
        }
        mutate {
          merge => {
            "event.idm.read_only_udm.additional.fields" => "affectedAssets_label"
          }
          on_error => "no_affected_assets_label"
        }
      }
      mutate {
        replace => {
          "about.investigation.status" => "%{record.status}"
        }
        on_error => "no_record_status"
      }
      for index1, additionalSignal in record.additionalSignals {
        mutate {
          replace => {
            "additionalSignal_name" => ""
            "additionalSignal_value" => ""
            "additionalSignal_type" => ""
            "additionalSignal_source" => ""
          }
        }
        mutate {
          convert => {
            "index1" => "string"
          }
          on_error => "index_conversion_error"
        }
        mutate {
          convert => {
            "additionalSignal.name" => "string"
            "additionalSignal.value" => "string"
            "additionalSignal.type" => "string"
            "additionalSignal.source" => "string"
          }
          on_error => "additional_signal_conversion_error"
        }
        mutate {
          replace => {
            "additionalSignal_name.key" => "additionalSignals_name_%{index1}"
            "additionalSignal_name.value.string_value" => "%{additionalSignal.name}"
          }
          on_error => "no_additional_signal_name"
        }
        if ![no_additional_signal_name] {
          mutate {
            merge => {
              "event.idm.read_only_udm.additional.fields" => "additionalSignal_name"
            }
            on_error => "no_additional_signal_name_label"
          }
        }
        mutate {
          replace => {
            "additionalSignal_value.key" => "additionalSignals_value_%{index1}"
            "additionalSignal_value.value.string_value" => "%{additionalSignal.value}"
          }
          on_error => "no_additional_signal_value"
        }
        if ![no_additional_signal_value] {
          mutate {
            merge => {
              "event.idm.read_only_udm.additional.fields" => "additionalSignal_value"
            }
            on_error => "no_additional_signal_value_label"
          }
        }
        mutate {
          replace => {
            "additionalSignal_type.key" => "additionalSignals_type_%{index1}"
            "additionalSignal_type.value.string_value" => "%{additionalSignal.type}"
          }
          on_error => "no_additional_signal_type"
        }
        if ![no_additional_signal_type] {
          mutate {
            merge => {
              "event.idm.read_only_udm.additional.fields" => "additionalSignal_type"
            }
            on_error => "no_additional_signal_type_label"
          }
        }
        mutate {
          replace => {
            "additionalSignal_source.key" => "additionalSignals_source_%{index1}"
            "additionalSignal_source.value.string_value" => "%{additionalSignal.source}"
          }
          on_error => "no_additional_signal_source"
        }
        if ![no_additional_signal_source] {
          mutate {
            merge => {
              "event.idm.read_only_udm.additional.fields" => "additionalSignal_source"
            }
            on_error => "no_additional_signal_source_label"
          }
        }
      }
      # Read the location details
      mutate {
        copy => {
          "_lat" => "record.location.coordinates.1"
          "_long" => "record.location.coordinates.0"
        }
        on_error => "location_error"
      }
      mutate {
        rename => {
          "_lat" => "event.idm.read_only_udm.principal.location.region_coordinates.latitude"
          "_long" => "event.idm.read_only_udm.principal.location.region_coordinates.longitude"
        }
        on_error => "location_error"
      }
      mutate {
        convert => {
          "record.location.coordinates.2" => "string"
        }
        on_error => "coordinates_conversion_error"
      }
      mutate {
        replace => {
          "coordinates_label.value" => "%{record.location.coordinates.2}"
        }
        on_error => "no_coordinates_replaced"
      }
      if ![no_coordinates_replaced] {
        mutate {
          replace => {
            "coordinates_label.key" => "coordinates"
          }
        }
        mutate {
          merge => {
            "token_principal.asset.attribute.labels" => "coordinates_label"
          }
          on_error => "no_coordinates_label"
        }
      }
      mutate {
        replace => {
          "location_type.value.string_value" => "%{record.location.type}"
        }
        on_error => "location_type_error"
      }
      if ![location_type_error] {
        mutate {
          replace => {
            "location_type.key" => "location_type"
          }
        }
        mutate {
          merge => {
            "event.idm.read_only_udm.additional.fields" => "location_type"
          }
          on_error => "location_type_label_error"
        }
      }
      # Update all the relevant timestamps
      date {
        match => ["record.createdAt", "ISO8601"]
        target => "event.idm.read_only_udm.metadata.event_timestamp"
        on_error => "no_record_event_timestamp"
      }
      date {
        match => ["record.processedAt", "ISO8601"]
        target => "event.idm.read_only_udm.metadata.ingested_timestamp"
        on_error => "no_record_ingested_timestamp"
      }
      date {
        match => ["record.firstOccurrence", "ISO8601"]
        target => "event.idm.read_only_udm.principal.asset.first_discover_time"
        on_error => "no_record_first_discover_time"
      }
      date {
        match => ["record.lastOccurrence", "ISO8601"]
        target => "event.idm.read_only_udm.principal.asset.last_discover_time"
        on_error => "no_record_last_discover_time"
      }
      date {
        match => ["record.updatedAt", "ISO8601"]
        target => "event.idm.read_only_udm.principal.asset.system_last_update_time"
        on_error => "no_record_system_last_update_time"
      }
      mutate {
        replace => {
          "event.idm.read_only_udm.metadata.description" => "%{record.description}"
        }
        on_error => "no_record_description"
      }
      mutate {
        replace => {
          "security_result.rule_id" => "%{record.detectorId}"
        }
        on_error => "no_record_detector_id"
      }
      if [security_result] != "" {
        mutate {
          merge => {
            "event.idm.read_only_udm.security_result" => "security_result"
          }
          on_error => "no_record_security_result"
        }
      }
      if [about] != "" {
        mutate {
          merge => {
            "event.idm.read_only_udm.about" => "about"
          }
          on_error => "no_record_about"
        }
      }
      mutate {
        replace => {
          "event.idm.read_only_udm.metadata.event_type" => "GENERIC_EVENT"
          "event.idm.read_only_udm.metadata.vendor_name" => "Upstream"
          "event.idm.read_only_udm.metadata.product_name" => "Upstream"
        }
      }
      mutate {
        merge => {
          "@output" => "event"
        }
      }
    }
  }
  else {
    if [affectedAssets] != "" {
      mutate {
        replace => {
          "affectedAssets_label.value.string_value" => "%{affectedAssets}"
        }
        on_error => "no_affected_assets"
      }
      if ![no_affected_assets] {
        mutate {
          replace => {
            "affectedAssets_label.key" => "affected_assets"
          }
        }
        mutate {
          merge => {
            "event.idm.read_only_udm.additional.fields" => "affectedAssets_label"
          }
          on_error => "no_affected_assets_label"
        }
      }
    }
    if [shortVin] != "" {
      mutate {
        replace => {
          "shortVin_label.value" => "%{shortVin}"
        }
        on_error => "no_short_vin"
      }
      if ![no_short_vin] {
        mutate {
          replace => {
            "shortVin_label.key" => "short_vin"
          }
        }
        mutate {
          merge => {
            "token_principal.asset.attribute.labels" => "shortVin_label"
          }
          on_error => "no_short_vin_label"
        }
      }
    }
    # Convert fields to required types
    mutate {
      convert => {
        "id" => "string"
        "apiVersion" => "string"
        "serviceId" => "string"
        "detectorId" => "string"
      }
      on_error => "convert_error"
    }

    # Replace the values directly from the payload

    mutate {
      replace => {
        "location_type.value.string_value" => "%{location.type}"
      }
      on_error => "location_type_error"
    }
    if ![location_type_error] {
      mutate {
        replace => {
          "location_type.key" => "location_type"
        }
      }
      mutate {
        merge => {
          "event.idm.read_only_udm.additional.fields" => "location_type"
        }
        on_error => "location_type_label_error"
      }
    }

    if [vehicleModel] != "" {
      mutate {
        replace => {
          "vehicleModel_label.value" => "%{vehicleModel}"
        }
        on_error => "no_vehicle_model"
      }
      if ![no_vehicle_model] {
        mutate {
          replace => {
            "vehicleModel_label.key" => "vehicle_model"
          }
        }
        mutate {
          merge => {
            "token_principal.asset.attribute.labels" => "vehicleModel_label"
          }
          on_error => "no_vehicle_model_label"
        }
      }
    }
    if [id] != "" {
      mutate {
        replace => {
          "id_label.value.string_value" => "%{id}"
        }
        on_error => "no_id"
      }
      if ![no_id] {
        mutate {
          replace => {
            "id_label.key" => "id"
          }
        }
        mutate {
          merge => {
            "event.idm.read_only_udm.additional.fields" => "id_label"
          }
          on_error => "no_id_label"
        }
      }
    }

    if [apiVersion] != "" {
      mutate {
        replace => {
          "token_metadata.product_version" => "%{apiVersion}"
        }
        on_error => "no_api_version"
      }
    }
    if [serviceId] != "" {
      mutate {
        replace => {
          "token_principal.process.pid" => "%{serviceId}"
        }
        on_error => "no_service_id"
      }
    }
    if [detectorId] != "" {
      mutate {
        replace => {
          "token_security_result.rule_id" => "%{detectorId}"
        }
        on_error => "no_detector_id"
      }
    }
    if [serviceName] != "" {
      mutate {
        replace => {
          "token_principal.application" => "%{serviceName}"
          "token_network.dhcp.client_hostname" => "%{serviceName}"
          "token_network.tls.client.server_name" => "%{serviceName}"
        }
        on_error => "no_service_name"
      }
    }
    if [detectorName] != "" {
      mutate {
        replace => {
          "token_security_result.rule_name" => "%{detectorName}"
        }
        on_error => "no_detector_name"
      }
    }
    if [detectorType] != "" {
      mutate {
        replace => {
          "token_security_result.rule_type" => "%{detectorType}"
        }
        on_error => "no_detector_type"
      }
    }

    if [name] != "" {
      mutate {
        replace => {
          "token_metadata.log_type" => "%{name}"
          "token_metadata.product_event_type" => "%{name}"
        }
        on_error => "no_name"
      }
    }
    if [description] != "" {
      mutate {
        replace => {
          "token_metadata.description" => "%{description}"
        }
        on_error => "no_description"
      }
    }
    if [url] != "" {
      mutate {
        replace => {
          "token_metadata.url_back_to_product" => "%{url}"
          "token_principal.url" => "%{url}"
        }
        on_error => "no_url"
      }
    }
    if [severity] != "" {
      mutate {
        replace => {
          "token_security_result.severity_details" => "%{severity}"
        }
        on_error => "no_severity"
      }
    }
    mutate {
      uppercase => ["severity"]
      on_error => "no_severity_uppercase"
    }
    if [severity] == "LOW" {
      mutate {
        replace => {
          "token_security_result.severity" => "LOW"
        }
      }
    }
    else if [severity] == "MEDIUM" {
      mutate {
        replace => {
          "token_security_result.severity" => "MEDIUM"
        }
      }
    }
    else if [severity] == "HIGH" {
      mutate {
        replace => {
          "token_security_result.severity" => "HIGH"
        }
      }
    }
    else if [severity] == "CRITICAL" {
      mutate {
        replace => {
          "token_security_result.severity" => "CRITICAL"
        }
      }
    }
    if [status] != "" {
      mutate {
        replace => {
          "token_about.investigation.status" => "%{status}"
        }
        on_error => "no_status"
      }
    }
    if [assetId][value] != "" and [assetType] != "" {
      mutate {
        replace => {
          "token_principal.asset_id" => "%{assetType}:\%{assetId.value}"
        }
        on_error => "no_asset_id"
      }
    }

    # Check if the recordId is null
    mutate {
      replace => {
        "empty_check_record_id" => "%{recordId}"
      }
      on_error => "no_empty_check_record_id"
    }
    if ![no_empty_check_record_id] and [empty_check_record_id] != "" {
      mutate {
        replace => {
          "token_metadata.product_log_id" => "%{recordId}"
        }
        on_error => "no_record_id"
      }
    }

    # Update all the relevant timestamps
    grok {
      match => {
        "timestamp" => "%{TIMESTAMP_ISO8601:eventTime}"
      }
      on_error => "time_stamp_failure"
    }
    if [createdAt] != "" {
      date {
        match => ["createdAt", "ISO8601"]
        target => "token_metadata.event_timestamp"
        on_error => "format_not_match"
      }
    }
    if [processedAt] != "" {
      date {
        match => ["processedAt", "ISO8601"]
        target => "token_metadata.ingested_timestamp"
        on_error => "format_not_match"
      }
    }
    if [firstOccurrence] != "" {
      date {
        match => ["firstOccurrence", "ISO8601"]
        target => "token_principal.asset.first_discover_time"
        on_error => "format_not_match"
      }
    }
    if [lastOccurrence] != "" {
      date {
        match => ["lastOccurrence", "ISO8601"]
        target => "token_principal.asset.last_discover_time"
        on_error => "format_not_match"
      }
    }
    if [updatedAt] != "" {
      date {
        match => ["updatedAt", "ISO8601"]
        target => "token_principal.asset.system_last_update_time"
        on_error => "format_not_match"
      }
    }

    # Read the location details
    mutate {
      copy => {
        "_lat" => "location.coordinates.1"
        "_long" => "location.coordinates.0"
      }
      on_error => "location_error"
    }
    mutate {
      rename => {
        "_lat" => "token_principal.location.region_coordinates.latitude"
        "_long" => "token_principal.location.region_coordinates.longitude"
      }
      on_error => "location_error"
    }
    mutate {
      convert => {
        "location.coordinates.2" => "string"
      }
      on_error => "coordinates_conversion_error"
    }
    mutate {
      replace => {
        "coordinates_label.value" => "%{location.coordinates.2}"
      }
      on_error => "no_coordinates_replaced"
    }
    if ![no_coordinates_replaced] {
      mutate {
        replace => {
          "coordinates_label.key" => "coordinates"
        }
      }
      mutate {
        merge => {
          "token_principal.asset.attribute.labels" => "coordinates_label"
        }
        on_error => "no_coordinates_label"
      }
    }

    # Add Additional Signals details
    # Iterate through the additional signals array
    for index, add_signal in additionalSignals {
      mutate {
        convert => {
          "index" => "string"
        }
        on_error => "index_error"
      }
      # Parse signal name
      if [add_signal][name] !="" {
        mutate {
          replace => {
            "_signal_name.key" => "additionalSignals_name_%{index}"
            "_signal_name.value.string_value" => "%{add_signal.name}"
          }
          on_error => "no_signal_name"
        }
        if ![no_signal_name] {
          mutate {
            merge => {
              "event.idm.read_only_udm.additional.fields" => "_signal_name"
            }
            on_error => "no_signal_name"
          }
        }
      }
      # Parse signal source
      if [add_signal][source] !=""{
        mutate {
          replace => {
            "_signal_source.key" => "additionalSignals_source_%{index}"
            "_signal_source.value.string_value" => "%{add_signal.source}"
          }
          on_error => "no_signal_source"
        }
        if ![no_signal_source] {
          mutate {
            merge => {
              "event.idm.read_only_udm.additional.fields" => "_signal_source"
            }
            on_error => "no_signal_source"
          }
        }
      }
      # Parse signal value
      if [add_signal][value] != "" {
        mutate {
          convert => {
            "add_signal.value" => "string"
          }
          on_error => "_"
        }
        mutate {
          replace => {
            "_string_value" => "%{add_signal.value}"
          }
          on_error => "_"
        }
        mutate {
          replace => {
            "_signal_value.key" => "additionalSignals_value_%{index}"
            "_signal_value.value.string_value" => "%{_string_value}"
          }
          on_error => "no_signal_value"
        }
        if ![no_signal_value] {
          mutate {
            merge => {
              "event.idm.read_only_udm.additional.fields" => "_signal_value"
            }
            on_error => "no_signal_value_label"
          }
        }
      }
      # Parse type name
      if [add_signal][type] !="" {
        mutate {
          replace => {
            "_signal_type.key" => "additionalSignals_type_%{index}"
            "_signal_type.value.string_value" => "%{add_signal.type}"
          }
          on_error => "no_signal_type"
        }
        if ![no_signal_type] {
          mutate {
            merge => {
              "event.idm.read_only_udm.additional.fields" => "_signal_type"
            }
            on_error => "no_signal_type_label"
          }
        }
      }
      mutate {
        replace => {
          "_signal_name" => ""
          "_signal_source" => ""
          "_signal_value" => ""
          "_signal_type" => ""
          "_string_value" => ""
        }
      }
    }

    # Parse all the Endpoint Details
    mutate {
      replace => {
        "empty_check" => "%{endpointDetails.url}"
      }
      on_error => "no_empty_check"
    }
    if ![no_empty_check] and [empty_check] != "" {
      # Url
      mutate {
        replace => {
          "endpoint_details_url.key" => "endpoint_url"
          "endpoint_details_url.value.string_value" => "%{endpointDetails.url}"
        }
        on_error => "no_endpoint_url"
      }
      if ![no_endpoint_url] and [endpointDetails][url] != "" {
        mutate {
          merge => {
            "event.idm.read_only_udm.additional.fields" => "endpoint_details_url"
          }
          on_error => "no_endpoint_url_label"
        }
      }
      # Host
      mutate {
        replace => {
          "endpoint_details_host.key" => "endpoint_host"
          "endpoint_details_host.value.string_value" => "%{endpointDetails.host}"
        }
        on_error => "no_endpoint_host"
      }
      if ![no_endpoint_host] and [endpointDetails][host] != "" {
        mutate {
          merge => {
            "event.idm.read_only_udm.additional.fields" => "endpoint_details_host"
          }
          on_error => "no_endpoint_host_label"
        }
      }
      # Method
      mutate {
        replace => {
          "endpoint_details_method.key" => "endpoint_method"
          "endpoint_details_method.value.string_value" => "%{endpointDetails.method}"
          "token_network.http.method" => "%{endpointDetails.method}"
        }
        on_error => "no_endpoint_method"
      }
      if ![no_endpoint_method] and [endpointDetails][method] != "" {
        mutate {
          merge => {
            "event.idm.read_only_udm.additional.fields" => "endpoint_details_method"
          }
          on_error => "no_endpoint_method_label"
        }
      }

      # Path
      mutate {
        replace => {
          "endpoint_details_path.key" => "endpoint_path"
          "endpoint_details_path.value.string_value" => "%{endpointDetails.path}"
        }
        on_error => "no_endpoint_path"
      }
      if ![no_endpoint_path] and [endpointDetails][path] != "" {
        mutate {
          merge => {
            "event.idm.read_only_udm.additional.fields" => "endpoint_details_path"
          }
          on_error => "no_endpoint_path_label"
        }
      }

      # API Title
      mutate {
        replace => {
          "endpoint_details_apititle.key" => "endpoint_apititle"
          "endpoint_details_apititle.value.string_value" => "%{endpointDetails.apiTitle}"
        }
        on_error => "no_endpoint_apititle"
      }
      if ![no_endpoint_apititle] and [endpointDetails][apiTitle] != "" {
        mutate {
          merge => {
            "event.idm.read_only_udm.additional.fields" => "endpoint_details_apititle"
          }
          on_error => "no_endpoint_apititle_label"
        }
      }
      # Contact
      mutate {
        replace => {
          "endpoint_details_contact.key" => "endpoint_contact"
          "endpoint_details_contact.value.string_value" => "%{endpointDetails.contact}"
        }
        on_error => "no_endpoint_contact"
      }
      if ![no_endpoint_contact] and [endpointDetails][contact] != "" {
        mutate {
          merge => {
            "event.idm.read_only_udm.additional.fields" => "endpoint_details_contact"
          }
          on_error => "no_endpoint_contact"
        }
      }
      # description
      mutate {
        replace => {
          "endpoint_details_description.key" => "endpoint_description"
          "endpoint_details_description.value.string_value" => "%{endpointDetails.description}"
        }
        on_error => "no_endpoint_description"
      }
      if ![no_endpoint_description] and [endpointDetails][description] != "" {
        mutate {
          merge => {
            "event.idm.read_only_udm.additional.fields" => "endpoint_details_description"
          }
          on_error => "no_endpoint_description_label"
        }
      }
      # Updated At
      mutate {
        replace => {
          "endpoint_details_updatedat.key" => "endpoint_updatedat"
          "endpoint_details_updatedat.value.string_value" => "%{endpointDetails.updatedAt}"
        }
        on_error => "no_updatedAt"
      }
      if ![no_updatedAt] and [endpointDetails][updatedAt] != "" {
        mutate {
          merge => {
            "event.idm.read_only_udm.additional.fields" => "endpoint_details_updatedat"
          }
          on_error => "no_updatedAt_label"
        }
      }
    }

    mutate {
      replace => {
        "token_metadata.event_type" => "GENERIC_EVENT"
        "token_metadata.vendor_name" => "Upstream"
        "token_metadata.product_name" => "Upstream"
      }
    }

    # Rename the object to respective UDM structure

    if [token_metadata] != "" {
      mutate {
        rename => {
          "token_metadata" => "event.idm.read_only_udm.metadata"
        }
      }
    }

    if [token_principal] != "" {
      mutate {
        rename => {
          "token_principal" => "event.idm.read_only_udm.principal"
        }
      }
    }

    if [token_network] != "" {
      mutate {
        rename => {
          "token_network" => "event.idm.read_only_udm.network"
        }
      }
    }

    # Merge the objects to respective UDM structure
    # As we want to append the data to these UDM fields

    if [token_security_result] != "" {
      mutate {
        merge => {
          "event.idm.read_only_udm.security_result" => "token_security_result"
        }
        on_error => "_"
      }
    }

    if [token_about] != "" {
      mutate {
        merge => {
          "event.idm.read_only_udm.about" => "token_about"
        }
        on_error => "_"
      }
    }

    # Output the mapped fields as an UDM event
    mutate {
      merge => {
        "@output" => "event"
      }
    }
  }
}
