# Product: AWS Inspector
# Category: AWS-specific log types
# Supported Format: JSON, SYSLOG
# Reference:NA
# Last Updated: 2025-02-25
# Copyright 2025 Google SecOps

filter {
  mutate {
    replace => {
      "security_result" => ""
      "level" => ""
      "location" => ""
      "service" => ""
      "timestamp" => ""
      "xray_trace_id" => ""
      "desc_msg" => ""
      "desc" => ""
      "id_1" => ""
      "cmd_status" => ""
      "elapsed_time" => ""
      "requestId" => ""
      "logger" => ""
      "usr" => ""
      "dst_url" => ""
      "msg_desc_msg" => ""
      "msg_location" => ""
      "msg_service" => ""
      "msg_level" => ""
      "msg_xray_trace_id" => ""
      "type" => ""
      "has_host" => "false"
      "host" => ""
      "port_number" => ""
      "intermediary" => ""
      "evnt_cloud_sandbox_md5" => ""
      "evnt_dest_country" => ""
      "evnt_action" => ""
      "evnt_cloudapp_rule" => ""
      "has_network" => "false"
      "sourcetype" => ""
      "has_user" => "false"
      "msg_text" => ""
      "msg_record_elapsed_repr" => ""
      "msg_record_exception" => ""
      "msg_record_file_name" => ""
      "msg_record_file_path" => ""
      "msg_record_function" => ""
      "msg_record_level_icon" => ""
      "msg_record_level_name" => ""
      "msg_record_level_no" => ""
      "msg_record_line" => ""
      "msg_record_desc_msg" => ""
      "msg_record_module" => ""
      "msg_record_name" => ""
      "msg_record_process_id" => ""
      "msg_record_process_name" => ""
      "msg_record_thread_id" => ""
      "msg_record_thread_name" => ""
      "msg_record_time_repr" => ""
      "repr_time" => ""
      "msg_extra_desc_msg_body_account_id" => ""
    }
  }
  mutate {
    gsub => ["message","message","desc_msg"]
  }
  mutate {
    gsub => ["message","\\r\\n",""]
  }
  mutate {
    gsub => ["message",'\"event\": {','\"evnt\": {']
  }
  json {
    source => "message"
    array_function => "split_columns"
    on_error => "not_json"
  }
  if [not_json] {
    mutate {
      replace => {
        "json_msg" => "{\"msg\":\%{message}\}"
      }
      on_error => "no_json_msg"
    }
    mutate {
      gsub => ["json_msg",'\\\\"','"']
    }
    mutate {
      gsub => ["json_msg",'}\\\\n\\"}','}}']
    }
    mutate {
      gsub => ["json_msg",':"{',":{"]
    }
    mutate {
      gsub => ["json_msg",'}n\"}',"}}"]
    }
    mutate {
      gsub => ["json_msg",'}\"}',"}}"]
    }
    mutate {
      gsub => ["json_msg",':\\n',':"']
    }
    mutate {
      gsub => ["json_msg",'\\n}','"}']
    }
    json {
      source => "json_msg"
      array_function => "split_columns"
      on_error => "json_error"
    }
    mutate {
      replace => {
        "msg_text" => "%{msg.text}"
      }
      on_error => "no_msg_text"
    }
    mutate {
      gsub => ["msg_text" , "\\\\n", ""]
    }
    if ![no_msg_text] && [msg_text] != "" {
      mutate {
        replace => {
          "event.idm.read_only_udm.metadata.description" => "%{msg_text}"
        }
        on_error => "no_msg_text"
      }
    }
    mutate {
      replace => {
        "msg_record_elapsed_repr" => "%{msg.record.elapsed.repr}"
      }
      on_error => "no_msg_record_elapsed_repr"
    }
    if ![no_msg_record_elapsed_repr] && [msg_record_elapsed_repr] != "" {
      mutate {
        replace => {
          "repr_label.value.string_value" => "%{msg_record_elapsed_repr}"
        }
        on_error => "no_msg_record_elapsed_repr_value"
      }
      if ![no_msg_record_elapsed_repr_value] {
        mutate {
          replace => {
            "repr_label.key" => "Record Elapsed Repr"
          }
          on_error => "no_msg_record_elapsed_repr_key"
        }
        mutate {
          merge => {
            "event.idm.read_only_udm.additional.fields" => "repr_label"
          }
          on_error => "no_msg_record_elapsed_repr_merge"
        }
      }
    }
    mutate {
      replace => {
        "msg_record_exception" => "%{msg.record.exception}"
      }
      on_error => "no_msg_record_exception"
    }
    if ![no_msg_record_exception] && [msg_record_exception] != "" {
      mutate {
        replace => {
          "exception_label.value.string_value" => "%{msg_record_exception}"
        }
        on_error => "no_msg_record_exception_value"
      }
      if ![no_msg_record_exception_value] {
        mutate {
          replace => {
            "exception_label.key" => "Record Exception"
          }
          on_error => "no_msg_record_exception_key"
        }
        mutate {
          merge => {
            "event.idm.read_only_udm.additional.fields" => "exception_label"
          }
          on_error => "no_msg_record_exception_merge"
        }
      }
    }
    mutate {
      replace => {
        "msg_record_file_name" => "%{msg.record.file.name}"
      }
      on_error => "no_msg_record_file_name"
    }
    if ![no_msg_record_file_name] && [msg_record_file_name] != "" {
      mutate {
        merge => {
          "event.idm.read_only_udm.principal.file.names" => "msg_record_file_name"
        }
        on_error => "no_msg_record_file_name_value"
      }
    }
    mutate {
      replace => {
        "msg_record_file_path" => "%{msg.record.file.path}"
      }
      on_error => "no_msg_record_file_path"
    }
    if ![no_msg_record_file_path] && [msg_record_file_path] != "" {
      mutate {
        replace => {
          "event.idm.read_only_udm.principal.file.full_path" => "%{msg_record_file_path}"
        }
        on_error => "no_msg_record_file_name_value"
      }
    }
    mutate {
      replace => {
        "msg_record_function" => "%{msg.record.function}"
      }
      on_error => "no_msg_record_function"
    }
    if ![no_msg_record_function] && [msg_record_function] != "" {
      mutate {
        replace => {
          "function_label.value.string_value" => "%{msg_record_function}"
        }
        on_error => "no_msg_record_function_value"
      }
      if ![no_msg_record_function_value] {
        mutate {
          replace => {
            "function_label.key" => "Record Function"
          }
          on_error => "no_msg_record_function_key"
        }
        mutate {
          merge => {
            "event.idm.read_only_udm.additional.fields" => "function_label"
          }
          on_error => "no_msg_record_function_merge"
        }
      }
    }
    mutate {
      replace => {
        "msg_record_level_icon" => "%{msg.record.level.icon}"
      }
      on_error => "no_msg_record_level_icon"
    }
    if ![no_msg_record_level_icon] && [msg_record_level_icon] != "" {
      mutate {
        replace => {
          "level_icon_label.value" => "%{msg_record_level_icon}"
        }
        on_error => "no_msg_record_level_icon_value"
      }
      if ![no_msg_record_level_icon_value] {
        mutate {
          replace => {
            "level_icon_label.key" => "Record Level Icon"
          }
          on_error => "no_msg_record_level_icon_key"
        }
        mutate {
          merge => {
            "security_result.detection_fields" => "level_icon_label"
          }
          on_error => "no_msg_record_level_icon_merge"
        }
      }
    }
    mutate {
      replace => {
        "msg_record_level_name" => "%{msg.record.level.name}"
      }
      on_error => "no_msg_record_level_name"
    }
    if ![no_msg_record_level_name] && [msg_record_level_name] =~ "INFO" {
      mutate {
        replace => {
          "security_result.severity" => "INFORMATIONAL"
        }
        on_error => "no_msg_record_level_name_value"
      }
    }
    mutate {
      convert => {
        "msg.record.level.no" => "string"
      }
      on_error => "no_msg_record_level_no_convert"
    }
    mutate {
      replace => {
        "msg_record_level_no" => "%{msg.record.level.no}"
      }
      on_error => "no_msg_record_level_no"
    }
    if ![no_msg_record_level_no] && [msg_record_level_no] != "" {
      mutate {
        replace => {
          "level_no_label.value.string_value" => "%{msg_record_level_no}"
        }
        on_error => "no_msg_record_level_no_value"
      }
      if ![no_msg_record_level_no_value] {
        mutate {
          replace => {
            "level_no_label.key" => "Record Level No"
          }
          on_error => "no_msg_record_level_no_key"
        }
        mutate {
          merge => {
            "event.idm.read_only_udm.additional.fields" => "level_no_label"
          }
          on_error => "no_msg_record_level_no_merge"
        }
      }
    }
    mutate {
      convert => {
        "msg.record.line" => "string"
      }
      on_error => "no_msg_record_line_convert"
    }
    mutate {
      replace => {
        "msg_record_line" => "%{msg.record.line}"
      }
      on_error => "no_msg_record_line"
    }
    if ![no_msg_record_line] && [msg_record_line] != "" {
      mutate {
        replace => {
          "line_label.value.string_value" => "%{msg_record_line}"
        }
        on_error => "no_msg_record_line_value"
      }
      if ![no_msg_record_line_value] {
        mutate {
          replace => {
            "line_label.key" => "Record Line"
          }
          on_error => "no_msg_record_line_key"
        }
        mutate {
          merge => {
            "event.idm.read_only_udm.additional.fields" => "line_label"
          }
          on_error => "no_msg_record_line_merge"
        }
      }
    }
    mutate {
      replace => {
        "msg_record_desc_msg" => "%{msg.record.desc_msg}"
      }
      on_error => "no_msg_record_desc_msg"
    }
    if ![no_msg_record_desc_msg] and [msg_record_desc_msg] != "" {
      mutate {
        replace => {
          "event.idm.read_only_udm.metadata.description" => "%{msg_record_desc_msg}"
        }
        on_error => "no_desc_msg"
      }
    }
    mutate {
      replace => {
        "msg_record_module" => "%{msg.record.module}"
      }
      on_error => "no_msg_record_module"
    }
    if ![no_msg_record_module] && [msg_record_module] != "" {
      mutate {
        replace => {
          "event.idm.read_only_udm.metadata.product_event_type" => "%{msg_record_module}"
        }
        on_error => "no_msg_record_module_value"
      }
    }
    mutate {
      replace => {
        "msg_record_name" => "%{msg.record.name}"
      }
      on_error => "no_msg_record_name"
    }
    if ![no_msg_record_name] && [msg_record_name] != "" {
      mutate {
        replace => {
          "event.idm.read_only_udm.principal.resource.name" => "%{msg_record_name}"
        }
        on_error => "no_msg_record_name_value"
      }
    }
    mutate {
      convert => {
        "msg.record.process.id" => "string"
      }
      on_error => "no_msg_record_process_id_convert"
    }
    mutate {
      replace => {
        "msg_record_process_id" => "%{msg.record.process.id}"
      }
      on_error => "no_msg_record_process_id"
    }
    if ![no_msg_record_process_id] && [msg_record_process_id] != "" {
      mutate {
        replace => {
          "event.idm.read_only_udm.principal.process.pid" => "%{msg_record_process_id}"
        }
        on_error => "no_msg_record_process_id_value"
      }
    }
    mutate {
      replace => {
        "msg_record_process_name" => "%{msg.record.process.name}"
      }
      on_error => "no_msg_record_process_name"
    }
    if ![no_msg_record_process_name] && [msg_record_process_name] != "" {
      mutate {
        replace => {
          "event.idm.read_only_udm.principal.application" => "%{msg_record_process_name}"
        }
        on_error => "no_msg_record_process_name_value"
      }
    }
    mutate {
      convert => {
        "msg.record.thread.id" => "string"
      }
      on_error => "no_msg_record_thread_id_convert"
    }
    mutate {
      replace => {
        "msg_record_thread_id" => "%{msg.record.thread.id}"
      }
      on_error => "no_msg_record_thread_id"
    }
    if ![no_msg_record_thread_id] && [msg_record_thread_id] != "" {
      mutate {
        replace => {
          "id_label.value.string_value" => "%{msg_record_thread_id}"
        }
        on_error => "no_msg_record_thread_id_value"
      }
      if ![no_msg_record_thread_id_value] {
        mutate {
          replace => {
            "id_label.key" => "Thread ID"
          }
          on_error => "no_msg_record_thread_id_key"
        }
        mutate {
          merge => {
            "event.idm.read_only_udm.additional.fields" => "id_label"
          }
          on_error => "no_msg_record_thread_id_merge"
        }
      }
    }
    mutate {
      replace => {
        "msg_record_thread_name" => "%{msg.record.thread.name}"
      }
      on_error => "no_msg_record_thread_name"
    }
    if ![no_msg_record_thread_name] && [msg_record_thread_name] != "" {
      mutate {
        replace => {
          "thread_name_label.value.string_value" => "%{msg_record_thread_name}"
        }
        on_error => "no_msg_record_thread_name_value"
      }
      if ![no_msg_record_thread_name_value] {
        mutate {
          replace => {
            "thread_name_label.key" => "Thread Name"
          }
          on_error => "no_msg_record_thread_name_key"
        }
        mutate {
          merge => {
            "event.idm.read_only_udm.additional.fields" => "thread_name_label"
          }
          on_error => "no_msg_record_thread_name_merge"
        }
      }
    }
    mutate {
      replace => {
        "msg_record_time_repr" => "%{msg.record.time.repr}"
      }
      on_error => "no_msg_record_time_repr"
    }
    if ![no_msg_record_time_repr] && [msg_record_time_repr] != "" {
      grok {
        match => {
          "msg_record_time_repr" => ["%{TIMESTAMP_ISO8601:repr_time}\\+%{GREEDYDATA}"]
        }
        overwrite => ["repr_time"]
        on_error => "no_time"
      }
      date {
        match => ["repr_time","ISO8601","yyyy-MM-dd HH:mm:ss.ZZZZZZ"]
        target => "event.idm.read_only_udm.metadata.event_timestamp"
        on_error => "no_msg_record_time_repr_date"
      }
    }
    mutate {
      replace => {
        "msg_extra_desc_msg_body_account_id" => "%{msg.record.extra.desc_msg_body.account_id}"
      }
      on_error => "no_msg_extra_desc_msg_body_account_id"
    }
    if ![no_msg_extra_desc_msg_body_account_id] && [msg_extra_desc_msg_body_account_id] != "" {
      mutate {
        replace => {
          "event.idm.read_only_udm.principal.user.userid" => "%{msg_extra_desc_msg_body_account_id}"
        }
        on_error => "no_msg_extra_desc_msg_body_account_id_value"
      }
      if ![no_msg_extra_desc_msg_body_account_id_value] {
        mutate {
          replace => {
            "has_user" => "true"
          }
        }
      }
    }
    if [json_error] && [not_json] {
      mutate {
        replace => {
          "event.idm.read_only_udm.metadata.description" => "%{message}"
        }
        on_error => "no_msg"
      }
    }
  }
  if [desc_msg] != "" {
    grok {
      match => {
        "desc_msg" => [
          "\\(%{DATA:id_1}\\) Command Status: %{DATA:cmd_status}\\. Elapsed time:%{DATA:elapsed_time}\\. %{GREEDYDATA:desc}",
          "Retrying \\(Retry\\(%{DATA}\\)\\) %{DATA}:%{GREEDYDATA:desc}': %{GREEDYDATA:dst_url}",
          "Retrying \\(Retry\\(%{DATA}\\)\\)%{GREEDYDATA}, 'Connection to %{DATA:host} %{DATA}: %{GREEDYDATA:dst_url}",
          "%{DATA}:%{DATA}\\(host='%{DATA:host}', port=%{DATA:port_number}\\): %{DATA}: %{DATA:dst_url}\\(%{DATA}>: %{GREEDYDATA}",
          "%{DATA} %{URI:dst_url} %{DATA}:%{DATA}\\(host='%{DATA:host}', port=%{DATA:port_number}\\):%{GREEDYDATA}",
          "Exception:%{DATA}%{URI:dst_url}"
          ]
      }
      overwrite => ["id_1", "cmd_status", "elapsed_time", "desc", "logger", "dst_url", "host", "port_number"]
      on_error => "no_desc_msg_match"
    }
  }
  mutate {
    replace => {
      "evnt_action" => "%{evnt.action}"
    }
    on_error => "no_evnt_action"
  }
  if ![no_evnt_action] {
    mutate {
      lowercase => ["evnt_action"]
      on_error => "no_evnt_action"
    }
    if [evnt_action] =~ "allow" || [evnt_action] =~ "allowed" {
      mutate {
        replace => {
          "security_result_action" => "ALLOW"
        }
      }
      mutate {
        merge => {
          "security_result.action" => "security_result_action"
        }
        on_error => "no_evnt_action_merge"
      }
    }
  }
  mutate {
    replace => {
      "evnt_client_tunnel_ip" => "%{evnt.client_tunnel_ip}"
    }
    on_error => "no_evnt_client_tunnel_ip"
  }
  if ![no_evnt_client_tunnel_ip] {
    mutate {
      replace = {
        "client_tunnel_ip_label.key" = "client_tunnel_ip"
        "client_tunnel_ip_label.value" = "%{evnt_client_tunnel_ip}"
      }
      on_error => "client_tunnel_ip_not_empty"
    }
    if ![client_tunnel_ip_not_empty] {
      mutate {
        merge = {
          "security_result.detection_fields" => "client_tunnel_ip_label"
        }
        on_error => "client_tunnel_ip_label_not_empty"
      }
    }
  }
  mutate {
    replace => {
      "evnt_dest_country" => "%{evnt.dest_country}"
    }
    on_error => "no_evnt_dest_country"
  }
  if ![no_evnt_dest_country] && [evnt_dest_country] not in ["", "Other"] {
    mutate {
      replace => {
        "event.idm.read_only_udm.target.location.country_or_region" => "%{evnt_dest_country}"
      }
      on_error => "invalid_dest_country"
    }
  }
  mutate {
    replace => {
      "evnt_app_class" => "%{evnt.app_class}"
    }
    on_error => "no_evnt_app_class"
  }
  if ![no_evnt_app_class] {
    mutate {
      replace => {
        "evnt_app_class_label.key" => "App Class"
        "evnt_app_class_label.value.string_value" => "%{evnt_app_class}"
      }
      on_error => "no_evnt_app_class_label"
    }
    if ![no_evnt_app_class_label] {
      mutate {
        merge => {
          "event.idm.read_only_udm.additional.fields" => "evnt_app_class_label"
        }
        on_error => "evnt_app_class_label_merge_failed"
      }
    }
  }
  mutate {
    replace => {
      "evnt_app_name" => "%{evnt.app_name}"
    }
    on_error => "no_evnt_app_name"
  }
  if ![no_evnt_app_name] {
    mutate {
      replace => {
        "event.idm.read_only_udm.principal.application" => "%{evnt_app_name}"
      }
      on_error => "evnt_app_name_failed"
    }
  }
  mutate {
    replace => {
      "evnt_bytes_in" => "%{evnt.bytes_in}"
    }
    on_error => "no_evnt_bytes_in"
  }
  if ![no_evnt_bytes_in] {
    mutate {
      replace => {
      "event.idm.read_only_udm.network.received_bytes" => "%{evnt_bytes_in}"
      }
      on_error => "no_evnt_bytes_in_label"
    }
    mutate {
      convert => {
        "event.idm.read_only_udm.network.received_bytes" => "uinteger"
      }
      on_error => "evnt_bytes_in_convert_failed"
    }
  }
  mutate {
    replace => {
      "evnt_bytes_out" => "%{evnt.bytes_out}"
    }
    on_error => "no_evnt_bytes_out"
  }
  if ![no_evnt_bytes_out] {
    mutate {
      replace => {
        "event.idm.read_only_udm.network.sent_bytes" => "%{evnt_bytes_out}"
      }
      on_error => "no_evnt_bytes_out_label"
    }
    mutate {
      convert => {
        "event.idm.read_only_udm.network.sent_bytes" => "uinteger"
      }
      on_error => "evnt_bytes_out_convert_failed"
    }
  }
  mutate {
    replace => {
      "evnt_cloud_application_class" => "%{evnt.cloud_application_class}"
    }
    on_error => "no_evnt_cloud_application_class"
  }
  if ![no_evnt_cloud_application_class] {
    mutate {
      replace => {
        "evnt_cloud_application_class_label.key" => "Cloud Application Class"
        "evnt_cloud_application_class_label.value.string_value" => "%{evnt_cloud_application_class}"
      }
      on_error => "no_evnt_cloud_application_class_label"
    }
    if ![no_evnt_cloud_application_class_label] {
      mutate {
        merge => {
          "event.idm.read_only_udm.additional.fields" => "evnt_cloud_application_class_label"
        }
        on_error => "evnt_cloud_application_class_label_merge_failed"
      }
    }
  }
  mutate {
    replace => {
      "evnt_cloud_sandbox_md5" => "%{evnt.cloud_sandbox_md5}"
    }
    on_error => "no_evnt_cloud_sandbox_md5"
  }
  if ![no_evnt_cloud_sandbox_md5] && [evnt_cloud_sandbox_md5] != "None" {
    mutate {
      replace => {
        "evnt_cloud_sandbox_md5_label.key" => "Cloud Sandbox MD5"
        "evnt_cloud_sandbox_md5_label.value.string_value" => "%{evnt_cloud_sandbox_md5}"
      }
      on_error => "no_evnt_cloud_sandbox_md5_label"
    }
    if ![no_evnt_cloud_sandbox_md5_label] {
      mutate {
        merge => {
