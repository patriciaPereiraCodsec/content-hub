# Product: CA LDAP
# Category: Web server
# Supported Format: JSON
# Reference: N/A
# Last Updated: 2022-08-19
# Copyright 2022 Chronicle LLC


filter {
  mutate {
    replace => {
      "host.hostname" => ""
      "host.ip" => ""
      "host.id" => ""
      "host.architecture" => ""
      "host.mac" => ""
      "security_result" => ""
      "logstash.irm_region" => ""
      "logstash.irm_environment" => ""
      "logstash.irm_site" => ""
      "logstash.process.host" => ""
      "logstash.collect.timestamp" => ""
      "agent.ephemeral_id" => ""
      "agent.id" => ""
      "agent.hostname" => ""
      "host.os.kernel" => ""
      "host.os.version" => ""
      "host.os.family" => ""
      "host.os.name" => ""
      "agent.type" => ""
      "agent.version" => ""
      "intermediary" => ""
      "syslog_severity" => ""
      "log.file.path" => ""
      "msg" => ""
    }
  }

  mutate {
    gsub => ["message", "message", "msg"]
  }

  json {
    source => "message"
    array_function => "split_columns"
    on_error => "not_json_format"
  }

  if [not_json_format] {
    drop {
      tag => "TAG_MALFORMED_ENCODING"
    }
  }

  if [host][id] != "" {
    mutate {
      replace => {
        "event.idm.read_only_udm.principal.asset.asset_id" => "CA_LDAP:%{host.id}"
      }
    }
  }

  if [host][hostname] != "" {
    mutate {
      replace => {
        "event.idm.read_only_udm.principal.hostname" => "%{host.hostname}"
      }
    }
  }

  if [host][ip] != "" {
    for ip in host.ip {
      mutate {
        merge => {
          "event.idm.read_only_udm.principal.ip" => "ip"
        }
      }
    }
  }

  if [host][mac] != "" {
    for mac in host.mac {
      mutate {
        merge => {
          "event.idm.read_only_udm.principal.mac" => "mac"
        }
      }
    }
  }

  if [host][os][kernel] != "" {
    mutate {
      replace => {
        "event.idm.read_only_udm.principal.platform_patch_level" => "%{host.os.kernel}"
      }
    }
  }

  if [host][os][version] != "" {
    mutate {
      replace => {
        "event.idm.read_only_udm.principal.platform_version" => "%{host.os.version}"
      }
    }
  }

  if [host][os][family] =~ "(rhel|redhat)" {
    mutate {
      replace => {
        "event.idm.read_only_udm.principal.platform" => "LINUX"
      }
    }
  }

  if [host][architecture] != "" {
    mutate {
      replace => {
        "hardware.cpu_platform" => "%{host.architecture}"
      }
      merge => {
        "event.idm.read_only_udm.principal.asset.hardware" => "hardware"
      }
    }
  }

  if [log][file][path] != "" {
    mutate {
      replace => {
        "event.idm.read_only_udm.principal.process.file.full_path" => "%{log.file.path}"
      }
    }
  }

  if [logstash][process][host] != "" {
    mutate {
      replace => {
        "intermediary.hostname" => "%{logstash.process.host}"
      }
    }
  }

  if [agent][hostname] != "" {
    mutate {
      replace => {
        "event.idm.read_only_udm.observer.hostname" => "%{agent.hostname}"
      }
    }
  }

  if [agent][id] != "" {
    mutate {
      replace => {
        "event.idm.read_only_udm.observer.asset_id" => "%{agent.type}: %{agent.id}"
      }
    }
  }

  if [agent][type] != "" and [agent][version] != "" {
    mutate {
      replace => {
        "event.idm.read_only_udm.observer.application" => "%{agent.type} %{agent.version}"
      }
    }
  }
  else if [agent][type] != "" {
    mutate {
      replace => {
        "event.idm.read_only_udm.observer.application" => "%{agent.type}"
      }
    }
  }

  if [agent][ephemeral_id] != "" {
    mutate {
      replace => {
        "ephemeral_id_label.key" => "ephemeral_id"
        "ephemeral_id_label.value.string_value" => "%{agent.ephemeral_id}"
      }
    }
    mutate {
      merge => {
        "event.idm.read_only_udm.additional.fields" => "ephemeral_id_label"
      }
    }
  }

  if [logstash][irm_region] != "" {
    mutate {
      replace => {
        "irm_region_label.key" => "irm_region"
        "irm_region_label.value.string_value" => "%{logstash.irm_region}"
      }
      merge => {
        "event.idm.read_only_udm.additional.fields" => "irm_region_label"
      }
    }
  }

  if [logstash][irm_environment] != "" {
    mutate {
      replace => {
        "irm_environment_label.key" => "irm_environment"
        "irm_environment_label.value.string_value" => "%{logstash.irm_environment}"
      }
      merge => {
        "event.idm.read_only_udm.additional.fields" => "irm_environment_label"
      }
    }
  }

  if [logstash][irm_site] != "" {
    mutate {
      replace => {
        "irm_site_label.key" => "irm_site"
        "irm_site_label.value.string_value" => "%{logstash.irm_site}"
      }
      merge => {
        "event.idm.read_only_udm.additional.fields" => "irm_site_label"
      }
    }
  }

  if [host][os][name] != "" {
    mutate {
      replace => {
        "os_name_label.key" => "os_name"
        "os_name_label.value.string_value" => "%{host.os.name}"
      }
      merge => {
        "event.idm.read_only_udm.additional.fields" => "os_name_label"
      }
    }
  }

  if [syslog_severity] =~ "(?i)(DEFAULT|DEBUG|INFO|NOTICE)" {
    mutate {
      replace => {
        "security_result.severity" => "INFORMATIONAL"
      }
    }
  }
  else if [syslog_severity] =~ "(?i)ERROR" {
    mutate {
      replace => {
        "security_result.severity" => "ERROR"
      }
    }
  }
  else if [syslog_severity] =~ "(?i)WARNING" {
    mutate {
      replace => {
        "security_result.severity" => "MEDIUM"
      }
    }
  }
  else if [syslog_severity] =~ "(?i)(CRITICAL|ALERT|EMERGENCY)" {
    mutate {
      replace => {
        "security_result.severity" => "HIGH"
      }
    }
  }

  if [syslog_severity] != "" {
    mutate {
      replace => {
        "security_result.severity_details" => "%{syslog_severity}"
      }
    }
  }

  if [security_result] != "" {
    mutate {
      merge => {
        "event.idm.read_only_udm.security_result" => "security_result"
      }
    }
  }

  if [logstash][collect][timestamp] != "" {
    date {
      match => ["logstash.collect.timestamp", "RFC3339", "UNIX", "ISO8601"]
      target => "event.idm.read_only_udm.metadata.collected_timestamp"
    }
  }

  if [msg] != "" {
    mutate {
      replace => {
        "event.idm.read_only_udm.metadata.description" => "%{msg}"
      }
    }
  }

  date {
    match => ["@timestamp", "RFC3339", "UNIX", "ISO8601"]
  }

  if [intermediary] != "" {
    mutate {
      merge => {
        "event.idm.read_only_udm.intermediary" => "intermediary"
      }
    }
  }

  mutate {
    replace => {
      "event.idm.read_only_udm.metadata.product_name" => "CA_LDAP"
      "event.idm.read_only_udm.metadata.vendor_name" => "CA_LDAP"
      "event.idm.read_only_udm.metadata.event_type" => "STATUS_UPDATE"
    }
  }

  mutate {
    merge => {
      "@output" => "event"
    }
  }
}
