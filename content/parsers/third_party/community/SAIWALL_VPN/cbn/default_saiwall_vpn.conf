# Product: Saiwall_VPN
# Category: VPN
# Supported Format: KV
# Last Updated: 2024-08-26
# Copyright 2024 Chronicle LLC

filter {
  mutate {
    replace => {
      "port" => ""
      "format" => ""
      "header" => ""
      "record.srcaddr" => ""
      "record.dstaddr" => ""
      "record.nexthop" => ""
      "record.input" => ""
      "record.output" => ""
      "record.dPkts" => ""
      "record.dOctets" => ""
      "record.srcport" => ""
      "record.dstport" => ""
      "event_type" => ""
      "metadata" => ""
      "principal" => ""
      "target" => ""
      "intermediary" => ""
      "principal_machine_identifier_present" => ""
      "target_machine_identifier_present" => ""
      "sourceIPv4Address" => ""
      "destinationIPv4Address" => ""
      "ipNextHopIPv4Address" => ""
      "sourceTransportPort" => ""
      "destinationTransportPort" => ""
      "tcpControlBits" => ""
      "ingressInterface" => ""
      "egressInterface" => ""
      "packetDeltaCount" => ""
      "octetDeltaCount" => ""
      "flowStartMilliseconds" => ""
      "flowEndMilliseconds" => ""
      "protocolIdentifier" => ""
      "ipClassOfService" => ""
      "flowEndReason" => ""
      "inter_host" => ""
    }
  }

  grok {
    match => {
      "message" => "<%{INT}>%{SYSLOGTIMESTAMP:timestamp} %{DATA:inter_host} %{GREEDYDATA:message}"
    }
    overwrite => ["message","inter_host"]
    on_error => "invalid_syslog_timestamp"
  }

  json {
    source => "message"
    array_function => "split_columns"
    on_error => "not_json"
  }

  if [sourceIPv4Address] != "" {
    mutate {
      merge => {
        "principal.ip" => "sourceIPv4Address"
      }
      on_error => "invalid_sourceIPv4Address"
    }
    if ![invalid_sourceIPv4Address] {
      mutate {
        replace => {
          "principal_machine_identifier_present" => "true"
        }
      }
    }
  }

  if [destinationIPv4Address] != "" {
    mutate {
      merge => {
        "target.ip" => "destinationIPv4Address"
      }
      on_error => "invalid_destinationIPv4Address"
    }
    if ![invalid_destinationIPv4Address] {
      mutate {
        replace => {
          "target_machine_identifier_present" => "true"
        }
      }
    }
  }

  if [sourceTransportPort] != "" {
    mutate {
      convert => {
        "sourceTransportPort" => "integer"
      }
      on_error => "sourceTransportPort_already_integer"
    }
    mutate {
      rename => {
        "sourceTransportPort" => "principal.port"
      }
    }
  }

  if [destinationTransportPort] != "" {
    mutate {
      convert => {
        "destinationTransportPort" => "integer"
      }
      on_error => "destinationTransportPort_already_integer"
    }
    mutate {
      rename => {
        "destinationTransportPort" => "target.port"
      }
    }
  }

  if [ipNextHopIPv4Address] != "" {
    mutate {
      replace => {
        "ipNextHopIPv4Address_label.value.string_value" => "%{ipNextHopIPv4Address}"
        "ipNextHopIPv4Address_label.key" => "ipNextHopIPv4Address"
      }
      on_error => "invalid_ipNextHopIPv4Address"
    }
    if ![invalid_ipNextHopIPv4Address] {
      mutate {
        merge => {
          "event.idm.read_only_udm.additional.fields" => "ipNextHopIPv4Address_label"
        }
        on_error => "ipNextHopIPv4Address_label_merge_failed"
      }
    }
  }

  if [tcpControlBits] != "" {
    mutate {
      replace => {
        "tcpControlBits_label.value.string_value" => "%{tcpControlBits}"
        "tcpControlBits_label.key" => "tcpControlBits"
      }
      on_error => "invalid_tcpControlBits"
    }
    if ![invalid_tcpControlBits] {
      mutate {
        merge => {
          "event.idm.read_only_udm.additional.fields" => "tcpControlBits_label"
        }
        on_error => "tcpControlBits_label_merge_failed"
      }
    }
  }

  if [ingressInterface] != "" {
    mutate {
      replace => {
        "ingressInterface_label.value.string_value" => "%{ingressInterface}"
        "ingressInterface_label.key" => "ingressInterface"
      }
      on_error => "invalid_ingressInterface"
    }
    if ![invalid_ingressInterface] {
      mutate {
        merge => {
          "event.idm.read_only_udm.additional.fields" => "ingressInterface_label"
        }
        on_error => "ingressInterface_label_error"
      }
    }
  }

  if [egressInterface] != "" {
    mutate {
      replace => {
        "egressInterface_label.value.string_value" => "%{egressInterface}"
        "egressInterface_label.key" => "egressInterface"
      }
      on_error => "invalid_egressInterface"
    }
    if ![invalid_egressInterface] {
      mutate {
        merge => {
          "event.idm.read_only_udm.additional.fields" => "egressInterface_label"
        }
        on_error => "egressInterface_label_merge_failed"
      }
    }
  }

  if [packetDeltaCount] != "" {
    mutate {
      replace => {
        "packetDeltaCount_label.value.string_value" => "%{packetDeltaCount}"
        "packetDeltaCount_label.key" => "packetDeltaCount"
      }
      on_error => "invalid_packetDeltaCount"
    }
    if ![invalid_packetDeltaCount] {
      mutate {
        merge => {
          "event.idm.read_only_udm.additional.fields" => "packetDeltaCount_label"
        }
        on_error => "packetDeltaCount_label_merge_failed"
      }
    }
  }

  if [octetDeltaCount] != "" {
    mutate {
      replace => {
        "octetDeltaCount_label.value.string_value" => "%{octetDeltaCount}"
        "octetDeltaCount_label.key" => "octetDeltaCount"
      }
      on_error => "invalid_octetDeltaCount"
    }
    if ![invalid_octetDeltaCount] {
      mutate {
        merge => {
          "event.idm.read_only_udm.additional.fields" => "octetDeltaCount_label"
        }
        on_error => "octetDeltaCount_label_merge_failed"
      }
    }
  }

  if [flowStartMilliseconds] != "" {
    mutate {
      replace => {
        "flowStartMilliseconds_label.value.string_value" => "%{flowStartMilliseconds}"
        "flowStartMilliseconds_label.key" => "flowStartMilliseconds"
      }
      on_error => "invalid_flowStartMilliseconds"
    }
    if ![invalid_flowStartMilliseconds] {
      mutate {
        merge => {
          "event.idm.read_only_udm.additional.fields" => "flowStartMilliseconds_label"
        }
        on_error => "flowStartMilliseconds_label_merge_failed"
      }
    }
  }

  if [flowEndMilliseconds] != "" {
    mutate {
      replace => {
        "flowEndMilliseconds_label.value.string_value" => "%{flowEndMilliseconds}"
        "flowEndMilliseconds_label.key" => "flowEndMilliseconds"
      }
      on_error => "invalid_flowEndMilliseconds"
    }
    if ![invalid_flowEndMilliseconds] {
      mutate {
        merge => {
          "event.idm.read_only_udm.additional.fields" => "flowEndMilliseconds_label"
        }
        on_error => "flowEndMilliseconds_label_merge_failed"
      }
    }
  }

  if [protocolIdentifier] != "" {
    mutate {
      replace => {
        "protocolIdentifier_label.value.string_value" => "%{protocolIdentifier}"
        "protocolIdentifier_label.key" => "protocolIdentifier"
      }
      on_error => "invalid_protocolIdentifier"
    }
    if ![invalid_protocolIdentifier] {
      mutate {
        merge => {
          "event.idm.read_only_udm.additional.fields" => "protocolIdentifier_label"
        }
        on_error => "protocolIdentifier_label_merge_failed"
      }
    }
  }

  if [ipClassOfService] != "" {
    mutate {
      replace => {
        "ipClassOfService_label.value.string_value" => "%{ipClassOfService}"
        "ipClassOfService_label.key" => "ipClassOfService"
      }
      on_error => "invalid_ipClassOfService"
    }
    if ![invalid_ipClassOfService] {
      mutate {
        merge => {
          "event.idm.read_only_udm.additional.fields" => "ipClassOfService_label"
        }
        on_error => "ipClassOfService_label_merge_failed"
      }
    }
  }

  if [flowEndReason] != "" {
    mutate {
      replace => {
        "flowEndReason_label.value.string_value" => "%{flowEndReason}"
        "flowEndReason_label.key" => "flowEndReason"
      }
      on_error => "invalid_flowEndReason"
    }
    if ![invalid_flowEndReason] {
      mutate {
        merge => {
          "event.idm.read_only_udm.additional.fields" => "flowEndReason_label"
        }
        on_error => "flowEndReason_label_merge_failed"
      }
    }
  }

  if [inter_host] != "" {
    mutate {
      replace => {
        "intermediary.hostname" => "%{inter_host}"
      }
      on_error => "invalid_inter_host"
    }
  }


  if [port] != "" {
    mutate {
      convert => {
        "port" => "integer"
      }
      on_error => "port_already_integer"
    }
    mutate {
      rename => {
        "port" => "intermediary.port"
      }
      on_error => "invalid_port"
    }
  }

  if [format] != "" {
    mutate {
      replace => {
        "format_label.key" => "Format"
        "format_label.value.string_value" => "%{format}"
      }
      on_error => "invalid_format"
    }
    if ![invalid_format] {
      mutate {
        merge => {
          "event.idm.read_only_udm.additional.fields" => "format_label"
        }
        on_error => "format_merge_failed"
      }
    }
  }

  for key, value in header map {
    mutate {
      replace => {
        "header_map_label" => ""
      }
    }

    if [key] != "" {
      mutate {
        replace => {
          "header_map_label.key" => "header %{key}"
        }
        on_error => "invalid_header_key"
      }
    }

    if [value] != "" {
      mutate {
        convert => {
          "value" => "string"
        }
        on_error => "header_value_already_string"
      }
      mutate {
        replace => {
          "header_map_label.value.string_value" => "%{value}"
        }
        on_error => "nested_header_value"
      }
      if ![nested_header_value] {
        mutate {
          merge => {
            "event.idm.read_only_udm.additional.fields" => "header_map_label"
          }
          on_error => "header_map_label_merge_failed"
        }
      }
    }
  }

  if [record][srcaddr] != "" {
    mutate {
      merge => {
        "principal.ip" => "record.srcaddr"
      }
      on_error => "invalid_srcaddr"
    }
    if ![invalid_srcaddr] {
      mutate {
        replace => {
          "principal_machine_identifier_present" => "true"
        }
      }
    }
  }

  if [record][nexthop] != "" {
    mutate {
      merge => {
        "intermediary.ip" => "record.nexthop"
      }
      on_error => "invalid_nexthop_ip"
    }
  }

  if [record][dstaddr] != "" {
    mutate {
      merge => {
        "target.ip" => "record.dstaddr"
      }
      on_error => "inavlid_dstaddr"
    }
    if ![inavlid_dstaddr] {
      mutate {
        replace => {
          "target_machine_identifier_present" => "true"
        }
      }
    }
  }

  if [record][srcport] != "" {
    mutate {
      convert => {
        "record.srcport" => "integer"
      }
      on_error => "srcport_already_integer"
    }
    mutate {
      rename => {
        "record.srcport" => "principal.port"
      }
      on_error => "invalid_srcport"
    }
    if ![invalid_srcport] {
      mutate {
        replace => {
          "principal_machine_identifier_present" => "true"
        }
      }
    }
  }

  if [record][dstport] != "" {
    mutate {
      convert => {
        "record.dstport" => "integer"
      }
      on_error => "dstport_already_integer"
    }
    mutate {
      rename => {
        "record.dstport" => "target.port"
      }
      on_error => "invalid_dstport"
    }
    if ![invalid_dstport] {
      mutate {
        replace => {
          "target_machine_identifier_present" => "true"
        }
      }
    }
  }

  if [record][input] != "" {
    mutate {
      convert => {
        "record.input" => "uinteger"
      }
      on_error => "input_already_uinteger"
    }
    mutate {
      rename => {
        "record.input" => "event.idm.read_only_udm.network.received_bytes"
      }
      on_error => "invalid_input"
    }
  }

  if [record][output] != "" {
    mutate {
      convert => {
        "record.output" => "uinteger"
      }
      on_error => "output_already_uinteger"
    }
    mutate {
      rename => {
        "record.output" => "event.idm.read_only_udm.network.sent_bytes"
      }
      on_error => "invalid_output"
    }
  }

  for key, value in record map {
    mutate {
      replace => {
        "record_map_label" => ""
      }
    }

    if [key] not in ["srcaddr", "dstaddr", "nexthop", "input", "output", "srcport", "dstport"] {
      mutate {
        replace => {
          "record_map_label.key" => "Record %{key}"
        }
        on_error => "invalid_key"
      }

      if [value] != "" {
        mutate {
          convert => {
            "value" => "string"
          }
          on_error => "value_already_string"
        }
        mutate {
          replace => {
            "record_map_label.value" => "%{value}"
          }
          on_error => "nested_record_value"
        }
        if ![nested_record_value] {
          mutate {
            merge => {
              "target.resource.attribute.labels" => "record_map_label"
            }
            on_error => "record_map_label_merge_failed"
          }
        }
      }
    }
  }

  if [event_type] == "" {
    if [principal_machine_identifier_present] =="true" and [target_machine_identifier_present] == "true" {
      mutate {
        replace => {
          "event_type" => "NETWORK_CONNECTION"
        }
      }
    }
    else if [principal_machine_identifier_present] == "true" {
      mutate {
        replace => {
          "event_type" => "STATUS_UPDATE"
        }
      }
    }
    else {
      mutate {
        replace => {
          "event_type" => "GENERIC_EVENT"
        }
      }
    }
  }

  mutate {
    replace => {
      "metadata.event_type" => "%{event_type}"
    }
  }

  if [metadata] != "" {
    mutate {
      rename => {
        "metadata" => "event.idm.read_only_udm.metadata"
      }
    }
  }

  if [principal] != "" {
    mutate {
      rename => {
        "principal" => "event.idm.read_only_udm.principal"
      }
    }
  }

  if [target] != "" {
    mutate {
      rename => {
        "target" => "event.idm.read_only_udm.target"
      }
    }
  }

  if [intermediary] != "" {
    mutate {
      merge => {
        "event.idm.read_only_udm.intermediary" => "intermediary"
      }
      on_error => "intermediary_merge_failed"
    }
  }

  mutate {
    merge => {
      "@output" => "event"
    }
  }
}
