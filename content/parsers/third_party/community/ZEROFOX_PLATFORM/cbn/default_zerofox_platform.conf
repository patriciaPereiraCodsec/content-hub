# Product: ZeroFox Platform
# Category: Database
# Supported Format: JSON
# Reference: N/A
# Last Updated: 2025-03-21
# Copyright 2025 Google SecOps
filter {
  mutate {
    replace => {
      "alert_type" => ""
      "logs" => ""
      "offending_content_url" => ""
      "asset_term" => ""
      "assignee" => ""
      "entity" => ""
      "entity_term" => ""
      "id" => ""
      "severity" => ""
      "rule_group_id" => ""
      "metadata1" => ""
      "enrichment" => ""
      "status" => ""
      "timestamp" => ""
      "rule_name" => ""
      "last_modified" => ""
      "protected_locations" => ""
      "darkweb_term" => ""
      "business_network" => ""
      "reviewed" => ""
      "escalated" => ""
      "network" => ""
      "protected_social_object" => ""
      "notes" => ""
      "reviews" => ""
      "rule_id" => ""
      "entity_account" => ""
      "entity_email_receiver_id" => ""
      "tags" => ""
      "has_principal" => "false"
      "has_principal_user" => "false"
      "has_target" => "false"
      "principal" => ""
      "alert_reason" => ""
      "perpetrator.content" => ""
      "perpetrator.type" => ""
      "perpetrator.network" => ""
      "perpetrator.display_name" => ""
      "perpetrator.id" => ""
      "asset.name" => ""
      "asset.image" => ""
      "asset.entity_group.name" => ""
      "asset.entity_group.id" => ""
      "asset.id" => ""
      "content" => ""
      "content_created_at" => ""
      "created_at" => ""
      "event_metadata.unicode_domain_name" => ""
      "security_result" => ""
      "host_name" => ""
      "perpetrator.timestamp" => ""
      "timestamp_modify_tags" => ""
      "event_metadata.alert_modal.screenshot" => ""
      "event_metadata.alert_modal.whois" => ""
      "event_metadata.relevance_scores.model_name" => ""
      "event_metadata.relevance_scores.tier_1" => ""
      "event_metadata.relevance_scores.tier_2" => ""
      "event_metadata.relevance_scores.tier_1_2" => ""
      "event_metadata.navigation_metadata.browser" => ""
      "event_metadata.navigation_metadata.device_name" => ""
      "event_metadata.navigation_metadata.os" => ""
      "os" => ""
    }
  }
  mutate {
    gsub => ["message", "content_created_at","created_at"]
  }
  mutate {
    gsub => ["message", "\\\"metadata\\\"","\"event_metadata\""]
  }
  json {
    source => "message"
    array_function => "split_columns"
    on_error => "invalid_json"
  }
  if [invalid_json] {
    drop {
      tag => "TAG_MALFORMED_MESSAGE"
    }
  }
  if [asset][entity_group][name] != "" {
    mutate {
      replace => {
        "principal.group.group_display_name" => "%{asset.entity_group.name}"
      }
      on_error => "no_asset_entity_group_name"
    }
  }
  if [asset][entity_group][id] != "" {
    mutate {
      convert => {
        "asset.entity_group.id" => "string"
      }
      on_error => "asset_entity_group_id_not_integer"
    }
    mutate {
      rename => {
        "asset.entity_group.id" => "principal.group.product_object_id"
      }
    }
  }
  if [asset][id] != "" {
    mutate {
      convert => {
        "asset.id" => "string"
      }
      on_error => "asset_id_not_integer"
    }
    mutate {
      replace => {
         "principal.asset.asset_id" => "ASSET:%{asset.id}"
      }
      on_error => "no_asset_id"
    }
  }
  if [asset][name] != "" {
    if [asset][name] =~ "Domain" {
      grok {
        match => {
          "asset.name" => ["%{DATA}\\-%{SPACE}%{GREEDYDATA:host_name}"]
        }
        on_error => "hostname_invalid"
        overwrite => ["host_name"]
      }
      if ![hostname_invalid] {
        mutate {
          replace => {
            "principal.hostname" => "%{host_name}"
            "has_principal" => "true"
          }
          on_error => "no_asset_name"
        }
      }
    }
    else {
      mutate {
        replace => {
          "principal.hostname" => "%{asset.name}"
          "has_principal" => "true"
        }
        on_error => "no_asset_name"
      }
    }
  }
  if [asset][image] != "" {
    mutate {
      replace => {
         "principal.url" => "%{asset.image}"
      }
      on_error => "no_asset_image"
    }
  }
  if [alert_type] != "" {
    mutate {
      merge => {
        "security_result.category_details" => "alert_type"
      }
      on_error => "no_alert_type"
    }
  }
  for log in logs {
    mutate {
      replace => {
        "log_sec_res" => ""
        "id_label" => ""
        "timestamp_label" => ""
        "actor_label" => ""
        "subject_label" => ""
      }
    }
    mutate {
      convert => {
        "log.id" => "string"
      }
      on_error => "log_id_not_integer"
    }
    mutate {
      replace => {
        "id_label.value" => "%{log.id}"
        "id_label.key" => "id"
      }
      on_error => "no_log_id"
    }
    if ![no_log_id] and [log][id] != "" {
      mutate {
        merge => {
          "log_sec_res.detection_fields" => "id_label"
        }
        on_error => "no_id_label"
      }
    }
    mutate {
      replace => {
        "timestamp_label.value" => "%{log.timestamp}"
        "timestamp_label.key" => "timestamp"
      }
      on_error => "no_timestamp_label"
    }
    if ![no_timestamp_label] and [log][timestamp] != "" {
      mutate {
        merge => {
          "log_sec_res.detection_fields" => "timestamp_label"
        }
        on_error => "no_timestamp_label"
      }
    }
    mutate {
      replace => {
        "actor_label.value" => "%{log.actor}"
        "actor_label.key" => "actor"
      }
      on_error => "no_actor_label"
    }
    if ![no_actor_label] and [log][actor] != "" {
      mutate {
        merge => {
          "log_sec_res.detection_fields" => "actor_label"
        }
        on_error => "no_actor_label"
      }
    }
    mutate {
      replace => {
        "log_action" => "%{log.action}"
      }
      on_error => "no_log_action"
    }
    if ![no_log_action] and [log][action] != "" {
      mutate {
        replace => {
          "log_sec_res.action_details" => "%{log.action}"
        }
        on_error => "no_log_action"
      }
    }
    mutate {
      replace => {
        "log_detail" => "%{log.detail}"
      }
      on_error => "no_log_detail"
    }
    if ![no_log_detail] and [log][detail] != "" {
      mutate {
        replace => {
          "log_sec_res.description" => "%{log.detail}"
        }
        on_error => "no_log_detail"
      }
    }
    mutate {
      replace => {
        "subject_label.value" => "%{log.subject}"
        "subject_label.key" => "subject"
      }
      on_error => "no_subject_label"
    }
    if ![no_subject_label] and [log][subject] != "" {
      mutate {
        merge => {
          "log_sec_res.detection_fields" => "subject_label"
        }
        on_error => "no_subject_label"
      }
    }
    if [log_sec_res] != "" {
      mutate {
        merge => {
          "event.idm.read_only_udm.security_result" => "log_sec_res"
        }
        on_error => "no_log_sec_res"
      }
    }
  }
  if [offending_content_url] != "" {
    mutate {
      replace => {
        "security_result.url_back_to_product" => "%{offending_content_url}"
      }
      on_error => "no_offending_content_url"
    }
  }
  if [created_at] != "" {
    date {
      match => ["created_at", "ISO8601", "yyyy-MM-dd HH:mm:ss", "RFC3339", "UNIX", "yyyy-MM-ddTHH:mm:ssZZ"]
      on_error => "invalid_date_format"
    }
    if ![invalid_date_format] {
      mutate {
        replace => {
          "created_at_label.key" => "created_at"
          "created_at_label.value.string_value" => "%{created_at}"
        }
        on_error => "created_at_error"
      }
      if ![created_at_error] {
        mutate {
          merge => {
            "event.idm.read_only_udm.additional.fields" => "created_at_label"
          }
          on_error => "created_at_merge_error"
        }
      }
    }
  }
  if [id] != "" {
    mutate {
      convert => {
        "id" => "string"
      }
      on_error => "id_not_integer"
    }
    if ![id_not_integer] {
      mutate {
        replace => {
          "principal.resource.id" => "%{id}"
        }
        on_error => "no_id"
      }
    }
  }
  if [severity] != "" {
    mutate {
      convert => {
        "severity" => "string"
      }
      on_error => "severity_not_integer"
    }
    if ![severity_not_integer] {
      mutate {
        replace => {
          "security_result.severity_details" => "%{severity}"
        }
        on_error => "no_severity"
      }
    }
  }
  if [perpetrator][display_name] != "" {
    mutate {
      replace => {
        "principal.user.user_display_name" => "%{perpetrator.display_name}"
        "has_principal_user" => "true"
      }
      on_error => "no_perpetrator_display_name"
    }
  }
  if [perpetrator][id] != "" {
    mutate {
      convert => {
        "perpetrator.id" => "string"
      }
      on_error => "perpetrator_id_not_integer"
    }
    if ![perpetrator_id_not_integer] {
      mutate {
        replace => {
          "principal.user.userid" => "%{perpetrator.id}"
          "has_principal_user" => "true"
        }
        on_error => "no_perpetrator_id"
      }
    }
  }
  if [perpetrator][content] != "" {
    mutate {
      replace => {
        "content" => "%{perpetrator.content}"
      }
      on_error => "no_perpetrator_content"
    }
    if ![no_perpetrator_content] and [content] != "" {
      mutate {
        replace => {
          "security_result.summary" => "%{content}"
        }
        on_error => "no_perpetrator_content"
      }
    }
  }
  if [perpetrator][type] != "" {
    mutate {
      replace => {
        "type_label.key" => "perpetrator_type"
        "type_label.value" => "%{perpetrator.type}"
      }
      on_error => "no_perpetrator_type_label"
    }
    if ![no_perpetrator_type_label] {
      mutate {
        merge => {
          "security_result.detection_fields" => "type_label"
        }
        on_error => "perpetrator_type_label_merge_failed"
      }
    }
  }
  if [perpetrator][network] != "" {
    mutate {
      replace => {
        "network_label.key" => "perpetrator_network"
        "network_label.value" => "%{perpetrator.network}"
      }
      on_error => "no_perpetrator_network_label"
    }
    if ![no_perpetrator_network_label] {
      mutate {
        merge => {
          "security_result.detection_fields" => "network_label"
        }
        on_error => "perpetrator_network_label_merge_failed"
      }
    }
  }
  if [perpetrator][timestamp] != "" {
    mutate {
      replace => {
        "perpetrator_timestamp_label.key" => "perpetrator_timestamp"
        "perpetrator_timestamp_label.value" => "%{perpetrator.timestamp}"
      }
      on_error => "no_perpetrator_timestamp_label"
    }
    if ![no_perpetrator_timestamp_label] {
      mutate {
        merge => {
          "security_result.detection_fields" => "perpetrator_timestamp_label"
        }
        on_error => "perpetrator_timestamp_label_merge_failed"
      }
    }
  }
  if [rule_group_id] != "" {
    mutate {
      convert => {
        "rule_group_id" => "string"
      }
      on_error => "rule_group_id_not_integer"
    }
    if ![rule_group_id_not_integer] {
      mutate {
        replace => {
          "rule_group_id_label.key" => "rule_group_id"
          "rule_group_id_label.value" => "%{rule_group_id}"
        }
        on_error => "no_rule_group_id"
      }
    }
    if ![no_rule_group_id] {
      mutate {
        merge => {
          "security_result.detection_fields" => "rule_group_id_label"
        }
        on_error => "rule_group_id_label_merge_failed"
      }
    }
  }
  if [rule_id] != "" {
    mutate {
      convert => {
        "rule_id" => "string"
      }
      on_error => "rule_id_not_integer"
    }
    if ![rule_id_not_integer] {
      mutate {
        replace => {
          "security_result.rule_id" => "%{rule_id}"
        }
        on_error => "no_rule_id"
      }
    }
  }
  if [rule_name] != "" {
    mutate {
      replace => {
        "security_result.rule_name" => "%{rule_name}"
      }
      on_error => "no_rule_name"
    }
  }
  if [last_modified] != "" {
    mutate {
      replace => {
        "last_modified_label.key" => "last_modified"
        "last_modified_label.value" => "%{last_modified}"
      }
      on_error => "no_last_modified"
    }
    if ![no_last_modified] {
      mutate {
        merge => {
          "principal.resource.attribute.labels" => "last_modified_label"
        }
        on_error => "no_last_modified_label"
      }
    }
  }
  for ip in event_metadata.alert_modal.ip_addresses {
    grok {
      match => {
        "ip" => ["%{IP:ip}"]
      }
      on_error => "ip_invalid"
      overwrite => ["ip"]
    }
    if [ip_invalid] {
        mutate {
          replace => {
            "principal.hostname" => "%{ip}"
            "principal.asset.hostname" => "%{ip}"
          }
          on_error => "no_hostname"
        }
        if ![no_hostname] {
          mutate {
            replace => {
              "has_principal" => "true"
            }
          }
        }
      }
    else {
      mutate {
        merge => {
          "principal.ip" => "ip"
          "principal.asset.ip" => "ip"
        }
        on_error => "no_principal_ip"
      }
      if ![no_principal_ip] {
        mutate {
          replace => {
            "has_principal" => "true"
          }
        }
      }
    }
  }
  for reason in event_metadata.alert_reasons {
    mutate {
      replace => {
        "alert_reason_label" => ""
      }
    }
    mutate {
      replace => {
        "alert_reason_label.key" => "%{reason.key.text_content}"
        "alert_reason_label.value" => "%{reason.value.text_content}"
      }
      on_error => "no_alert_reason_label"
    }
    if ![no_alert_reason_label] {
      mutate {
        merge => {
          "security_result.detection_fields" => "alert_reason_label"
        }
        on_error => "no_alert_reason_label"
      }
    }
  }
  for index,display in event_metadata.ai_confidence_display {
    mutate {
      convert => {
        "index" => "string"
      }
      on_error => "index_conversion_fail"
    }
    mutate {
      convert => {
        "display" => "string"
      }
      on_error => "display_conversion_fail"
    }
    mutate {
      replace => {
        "ai_confidence_display_color_label" => ""
      }
      on_error => "no_ai_confidence_display_color_label"
    }
    mutate {
      replace => {
        "ai_confidence_display_color_label.key" => "ai_confidence_display_color_%{index}"
        "ai_confidence_display_color_label.value.string_value" => "%{display.color}"
      }
      on_error => "no_ai_confidence_display_color_label"
    }
    if ![no_ai_confidence_display_color_label] {
      mutate {
        merge => {
          "event.idm.read_only_udm.additional.fields" => "ai_confidence_display_color_label"
        }
        on_error => "no_ai_confidence_display_color_label_merge"
      }
    }
    mutate {
      replace => {
        "ai_confidence_display_icon_label" => ""
      }
      on_error => "no_ai_confidence_display_icon_label"
    }
    mutate {
      replace => {
        "ai_confidence_display_icon_label.key" => "ai_confidence_display_icon_%{index}"
        "ai_confidence_display_icon_label.value.string_value" => "%{display.icon}"
      }
      on_error => "no_ai_confidence_display_icon_label"
    }
    if ![no_ai_confidence_display_icon_label] {
      mutate {
        merge => {
          "event.idm.read_only_udm.additional.fields" => "ai_confidence_display_icon_label"
        }
        on_error => "no_ai_confidence_display_icon_label_merge"
      }
    }
    mutate {
      replace => {
        "ai_confidence_display_name_label" => ""
      }
      on_error => "no_ai_confidence_display_name_label"
    }
    mutate {
      replace => {
        "ai_confidence_display_name_label.key" => "ai_confidence_display_name_%{index}"
        "ai_confidence_display_name_label.value.string_value" => "%{display.name}"
      }
      on_error => "no_ai_confidence_display_name_label"
    }
    if ![no_ai_confidence_display_name_label] {
      mutate {
        merge => {
          "event.idm.read_only_udm.additional.fields" => "ai_confidence_display_name_label"
        }
        on_error => "no_ai_confidence_display_name_label_merge"
      }
    }
    for detect in display.detections{
      mutate {
        convert => {
          "detect" => "string"
        }
        on_error => "detetect_conversion_fail"
      }
      mutate {
        replace => {
          "detect_label" => ""
        }
        on_error => "no_detect_label"
      }
      mutate {
        replace => {
          "detect_label.key" => "label_%{index}"
          "detect_label.value" => "%{detect.label}"
        }
        on_error => "no_detetect_label"
      }
      if ![no_detetect_label] {
        mutate {
          merge => {
            "security_result.detection_fields" => "detect_label"
          }
          on_error => "no_detetect_label_merge"
        }
      }
      mutate {
        convert => {
          "detect.confidence" => "string"
        }
        on_error => "confidence_conversion_fail"
      }
      if [index] == "0" {
        if [detect][confidence] != "" {
          mutate {
            replace => {
              "security_result.confidence_score" => "%{detect.confidence}"
            }
            on_error => "confidence_missing"
          }
          mutate {
            convert => {
              "security_result.confidence_score" => "float"
            }
            on_error => "confidence_not_convert"
          }
        }
      }
      else {
        mutate {
          replace => {
            "detect_confidence_label" => ""
          }
          on_error => "no_detect_confidence_label"
        }
        mutate {
          replace => {
            "detect_confidence_label.key" => "confidence_%{index}"
            "detect_confidence_label.value" => "%{detect.confidence}"
          }
          on_error => "no_detect_confidence_label_value"
        }
        if ![no_detect_confidence_label_value] {
          mutate {
            merge => {
              "security_result.detection_fields" => "detect_confidence_label"
            }
            on_error => "no_detect_confidence_label_merge"
          }
        }
      }
    }
  }
  if [status] != "" {
    mutate {
      replace => {
        "sec_status_label.key" => "status"
        "sec_status_label.value" => "%{status}"
      }
      on_error => "no_sec_status_label"
    }
    if ![no_sec_status_label] {
      mutate {
        merge => {
          "security_result.detection_fields" => "sec_status_label"
        }
        on_error => "no_sec_status_label"
      }
    }
  }
  if [timestamp] != "" {
    date {
      match => ["timestamp", "ISO8601", "yyyy-MM-dd HH:mm:ss", "RFC3339", "UNIX"]
      target => "metadata1.event_timestamp"
      on_error => "invalid_date_format"
    }
  }
  if [reviewed] != "" {
    mutate {
      convert => {
        "reviewed" => "string"
      }
      on_error => "reviewed_not_string"
    }
    if ![reviewed_not_string] {
      mutate {
        replace => {
          "reviewed_label.key" => "reviewed"
          "reviewed_label.value" => "%{reviewed}"
        }
        on_error => "no_reviewed_label"
      }
    }
    if ![no_reviewed_label] {
      mutate {
        merge => {
          "security_result.detection_fields" => "reviewed_label"
        }
        on_error => "no_reviewed_label"
      }
    }
  }
  if [escalated] != "" {
    mutate {
      convert => {
        "escalated" => "string"
      }
      on_error => "escalated_not_string"
    }
    if ![escalated_not_string] {
      mutate {
        replace => {
          "escalated_label.key" => "escalated"
          "escalated_label.value" => "%{escalated}"
        }
        on_error => "no_escalated_label"
      }
    }
    if ![no_escalated_label] {
      mutate {
        merge => {
          "security_result.detection_fields" => "escalated_label"
        }
        on_error => "no_escalated_label"
      }
    }
  }
  mutate {
    replace => {
      "tag_list.value" => ""
    }
  }
  for tag in tags {
    mutate {
      replace => {
        "tag_label" => ""
      }
    }
    mutate {
      replace => {
        "tag_label.string_value" => "%{tag}"
      }
      on_error => "no_tag_label"
    }
    mutate {
      merge => {
        "tag_list.value.list_value.values" => "tag_label"
      }
      on_error => "no_tag_label"
    }
  }

  if [tag_list][value] != "" {
    mutate {
      replace => {
        "tag_list.key" => "tags"
      }
    }
    mutate {
      merge => {
        "event.idm.read_only_udm.additional.fields" => "tag_list"
      }
      on_error => "no_tag_list"
    }
  }

  mutate {
    replace => {
      "arecord_list.value" => ""
    }
  }

  for record in event_metadata.alert_modal.a_records {
    mutate {
      replace => {
        "record_label" => ""
      }
    }
    mutate {
      replace => {
        "record_label.string_value" => "%{record}"
      }
      on_error => "no_a_record_label"
    }
    mutate {
      merge => {
        "arecord_list.value.list_value.values" => "record_label"
      }
      on_error => "no_a_record_label"
    }
  }

  if [arecord_list][value] != "" {
    mutate {
      replace => {
        "arecord_list.key" => "a_records"
      }
    }
    mutate {
      merge => {
        "event.idm.read_only_udm.additional.fields" => "arecord_list"
      }
      on_error => "no_a_record_list"
    }
  }

  mutate {
    replace => {
      "mx_record_list.value" => ""
