# Product: KISI
# Category: Physical Security
# Supported Format: JSON
# Reference : NA
# Last Updated: 2023-06-14
# Copyright 2023 Chronicle LLC

filter {
  mutate {
    replace => {
      "metadata" => ""
      "principal" => ""
      "security_result" => ""
      "event_data.id" => ""
      "event_data.actor_type" => ""
      "event_data.actor_id" => ""
      "event_data.actor_name" => ""
      "event_data.action" => ""
      "event_data.object_type" => ""
      "event_data.object_id" => ""
      "event_data.object_name" => ""
      "event_data.success" => ""
      "event_data.error_code" => ""
      "event_data.error_message" => ""
      "event_data.code" => ""
      "event_data.message" => ""
      "event_data.created_at" => ""
      "roles" => ""
      "email_address" => ""
      "sec_action" => ""
    }
  }

  mutate {
    gsub => ["message", "event", "event_data"]
  }
  json {
    source => "message"
    array_function => "split_columns"
    on_error => "not_json"
  }

  if [not_json] {
    drop {
      tag => "TAG_UNSPECIFIED"
    }
  }

  if [event_data][id] != "" {
    mutate {
      convert => {
        "event_data.id" => "string"
      }
      on_error => "already_string"
    }
    mutate {
      replace => {
        "metadata.product_log_id" => "%{event_data.id}"
      }
    }
  }
  if [event_data][actor_id] != "" {
    mutate {
      convert => {
        "event_data.actor_id" => "string"
      }
      on_error => "already_string"
    }
    mutate {
      replace => {
        "principal.user.product_object_id" => "%{event_data.actor_id}"
      }
    }
  }
  if [event_data][actor_type] != "" {
    mutate {
      replace => {
        "roles.name" => "%{event_data.actor_type}"
      }
      merge => {
        "principal.user.attribute.roles" => "roles"
      }
      on_error => "actor_type_not_found"
    }
  }
  if [event_data][actor_name] != ""  {
    mutate {
      replace => {
        "principal.user.userid" => "%{event_data.actor_name}"
      }
    }
  }
  if [event_data][message] != ""  {
    mutate {
      replace => {
        "security_result.description" => "%{event_data.message}"
      }
    }
    grok {
      match => {
        "event_data.message" => "%{GREEDYDATA}\\(%{GREEDYDATA:email_address}\\)%{GREEDYDATA}"
      }
      on_error => "no_email"
      overwrite => ["email_address"]
    }
    if ![no_email] and [email_address] =~ "^.+@.+$" {
      mutate {
        merge => {
          "principal.user.email_addresses" => "email_address"
        }
      }
    }
  }
  if [event_data][action] != "" {
    if [event_data][action] in ["unlocked", "unlock"] {
      mutate {
        replace => {
          "sec_action" => "ALLOW"
        }
      }
    }
    else if [event_data][action] in ["locked", "lock"] {
      mutate {
        replace => {
          "sec_action" => "BLOCK"
        }
      }
    }
    if [sec_action] != "" {
      mutate {
        merge => {
          "security_result.action" => "sec_action"
        }
      }
    }
  }
  if [event_data][object_id] != "" {
    mutate {
      convert => {
        "event_data.object_id" => "string"
      }
      on_error => "already_string"
    }
    mutate {
      replace => {
        "principal.resource.product_object_id" => "%{event_data.object_id}"
      }
    }
  }
  if [event_data][object_name] != "" {
    mutate {
      replace => {
        "principal.resource.name" => "%{event_data.object_name}"
      }
    }
  }
  if [event_data][object_type] != "" {
    mutate {
      replace => {
        "object_type_label.key" => "object_type"
        "object_type_label.value" => "%{event_data.object_type}"
      }
      merge => {
        "principal.resource.attribute.labels" => "object_type_label"
      }
    }
  }
  if [event_data][error_code] != "" {
    mutate {
      replace => {
        "error_code_label.key" => "error_code"
        "error_code_label.value" => "%{event_data.error_code}"
      }
      merge => {
        "security_result.detection_fields" => "error_code_label"
      }
    }
  }
  if [event_data][code] != "" {
    mutate {
      replace => {
        "code_label.key" => "code"
        "code_label.value" => "%{event_data.code}"
      }
      merge => {
        "security_result.detection_fields" => "code_label"
      }
    }
  }
  if [event_data][error_message] != "" {
    mutate {
      replace => {
        "security_result.summary" => "%{event_data.error_message}"
      }
    }
  }
  if [event_data][success] != "" {
    mutate {
      convert => {
        "event_data.success" => "string"
      }
      on_error => "already_string"
    }
    mutate {
      replace => {
        "success_label.key" => "success"
        "success_label.value" => "%{event_data.success}"
      }
      merge => {
        "security_result.detection_fields" => "success_label"
      }
    }
  }
  if [event_data][created_at] != "" {
    date {
      match => ["event_data.created_at", "ISO8601"]
      target => "metadata.event_timestamp"
    }
  }

  # Mapped to GENERIC_EVENT when required udm parameters are not present
  if [event_data][actor_id] != "" or [event_data][actor_name] != "" or [email_address] != "" {
    mutate {
      replace => {
        "metadata.event_type" => "USER_RESOURCE_ACCESS"
      }
    }
  }
  else {
    mutate {
      replace => {
        "metadata.event_type" => "GENERIC_EVENT"
      }
    }
  }

  mutate {
    replace => {
      "metadata.product_name" => "KISI"
      "metadata.vendor_name" => "KISI"
    }
  }
  # merge the data into udm nouns.
  if [metadata] != "" {
    mutate {
      rename => {
        "metadata" => "event.idm.read_only_udm.metadata"
      }
    }
  }
  if [principal] != "" {
    mutate {
      rename => {
        "principal" => "event.idm.read_only_udm.principal"
      }
    }
  }
  if [security_result] != "" {
    mutate {
      merge => {
        "event.idm.read_only_udm.security_result" => "security_result"
      }
    }
  }

  mutate {
    merge => {
      "@output" => "event"
    }
  }
}
