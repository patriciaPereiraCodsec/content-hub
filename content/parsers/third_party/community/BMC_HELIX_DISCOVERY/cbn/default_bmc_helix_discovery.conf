# Product: bmc helix discovery
# Category: bmc helix discovery
# Supported Format: SYSLOG
# Reference: https://support.nucleussec.com/hc/en-us/articles/360018053452-Creating-Custom-Scan-Files
# Last Updated: 2022-08-29
# Copyright 2022 Chronicle LLC


filter {

  mutate {
    replace => {
      "timestamp" => ""
      "asset_host" => ""
      "desc" => ""
      "src_ip" => ""
      "user_name" => ""
      "summary" => ""
      "event.idm.read_only_udm.metadata.event_type" => "GENERIC_EVENT"
      "extensions.auth.type" => "AUTHTYPE_UNSPECIFIED"
    }
  }

  grok {
    match => {
      "message" => [
        "<%{INT}>%{SYSLOGTIMESTAMP:timestamp}\\s+%{DATA:asset_host}:\\s+%{DATA:product_event_type},%{DATA:summary},%{DATA:user_name},%{DATA},%{GREEDYDATA:desc}"
      ]
    }
    on_error => "grok_fail"
    overwrite => ["timestamp","asset_host","desc","user_name","summary"]
  }

  if [grok_fail] {
    drop {
      tag => "TAG_MALFORMED_MESSAGE"
    }
  }

  if [desc] != "" {
    grok {
      match => {
        "desc" => [
          "%{GREEDYDATA}\\s+IP\\s+%{IP:src_ip}"
        ]
      }
      overwrite => ["src_ip"]
      on_error => "pattern_failed"
    }
  }

  if [src_ip] not in [ "", "-" ]  {
    mutate {
      merge => {
        "event.idm.read_only_udm.principal.ip" => "src_ip"
      }
    }
  }

  if [desc] != "" {
    mutate {
      gsub => ["desc", "\\r\\x00",""]
    }
    mutate {
      replace => {
        "event.idm.read_only_udm.metadata.description" => "%{desc}"
      }
    }
  }

  if [user_name] != "" {
    mutate {
      replace => {
        "event.idm.read_only_udm.target.user.userid" => "%{user_name}"
      }
    }
  }
  date {
    match => ["timestamp", "MMM dd HH:mm:ss", "MMM d HH:mm:ss", "MMM  d HH:mm:ss"]
    on_error => "format_error"
    rebase => true
  }

  mutate {
    replace => {
      "event.idm.read_only_udm.metadata.product_name" => "BMC_HELIX_DISCOVERY"
      "event.idm.read_only_udm.metadata.vendor_name" => "BMC_HELIX_DISCOVERY"
      "event.idm.read_only_udm.metadata.product_event_type" => "%{product_event_type}"
    }
  }

  if [src_ip] != "" and [user_name] != "" {
    if [product_event_type] =~ "(?i)logon" or [desc] =~ "logged on" {
      mutate {
        replace => {
          "event.idm.read_only_udm.metadata.event_type" => "USER_LOGIN"
        }
      }
    }
    else if [product_event_type] =~ "(?i)logoff" or [desc] =~ "logged off" {
      mutate {
        replace => {
          "event.idm.read_only_udm.metadata.event_type" => "USER_LOGOUT"
        }
      }
    }
  }
  else if [src_ip] != "" {
    mutate {
      replace => {
        "event.idm.read_only_udm.metadata.event_type" => "STATUS_UPDATE"
      }
    }
  }

  if [summary] != "" {
    mutate {
      replace => {
        "security_result.summary" => "%{summary}"
      }
    }
    mutate {
      merge => {
        "event.idm.read_only_udm.security_result" => "security_result"
      }
    }
  }

  mutate {
    rename => {
      "extensions" => "event.idm.read_only_udm.extensions"
    }
  }
  mutate {
    merge => {
      "@output" => "event"
    }
  }
}
