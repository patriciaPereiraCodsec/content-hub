# Product: IMPERVA ADVANCED BOT PROTECTION
# Category: Bot Protection
# Supported Format: JSON
# Reference: See below
# Last Updated: 2026-02-26
# Copyright 2026 Google SecOps

filter {
  mutate {
    replace => {
      "metadata" => ""
      "principal" => ""
      "target" => ""
      "network" => ""
      "additional" => ""
      "security_result" => ""
      "sec_action" => "ALLOW"
      "event_type" => ""
      "timestamp" => ""
      "event_data.id" => ""
      "event_data.action" => ""
      "event_data.category" => ""
      "event_data.dataset" => ""
      "event_data.provider" => ""
      "server.domain" => ""
      "server.geo.name" => ""
      "client.domain" => ""
      "client.ip" => ""
      "client.geo.country_iso_code" => ""
      "client.geo.name" => ""
      "http.request.method" => ""
      "http.request.body.bytes" => ""
      "url.path" => ""
      "user_agent.original" => ""
      "imperva.ids.account_id" => ""
      "imperva.ids.account_name" => ""
      "imperva.ids.site_id" => ""
      "imperva.ids.site_name" => ""
      "imperva.abp.customer_request_id" => ""
      "imperva.abp.hsig" => ""
      "imperva.abp.pid" => ""
      "imperva.abp.header_id" => ""
      "imperva.abp.fpid" => ""
      "imperva.abp.zid" => ""
      "imperva.abp.zuid" => ""
      "imperva.abp.token_id" => ""
      "imperva.abp.random_id" => ""
      "imperva.abp.policy_id" => ""
      "imperva.abp.policy_name" => ""
      "imperva.abp.selector" => ""
      "imperva.abp.selector_derived_id" => ""
      "imperva.abp.category" => ""
      "imperva.abp.tls_fingerprint" => ""
      "imperva.abp.headers_referer" => ""
      "imperva.abp.headers_accept_encoding" => ""
      "imperva.abp.monitor_action" => ""
      "imperva.abp.request_type" => ""
      "imperva.abp.headers_accept_language" => ""
      "imperva.abp.headers_connection" => ""
      "imperva.abp.token_expire" => ""
      "imperva.abp.requests_per_minute" => ""
      "imperva.abp.requests_per_session" => ""
      "imperva.abp.session_length_seconds" => ""
      "imperva.abp.requests_with_expired_token" => ""
      "imperva.abp.requests_with_no_token" => ""
      "imperva.abp.seconds_with_expired_token" => ""
      "imperva.abp.seconds_with_no_token" => ""
      "imperva.abp.rate_limiting_scope" => ""
      "imperva.abp.captcha_solved_timestamp" => ""
      "imperva.abp.requests_since_captcha_succeeded" => ""
      "url.query" => ""
      "imperva.abp.header_lengths" => ""
      "imperva.abp.headers_accept" => ""
      "imperva.abp.headers_cookie_length" => ""
      "imperva.abp.tcp_rtt_ms" => ""
      "imperva.abp.tls_rtt_ms" => ""
      "event_data.code" => ""
      "imperva.abp.headers_cookie_names" => ""
    }
  }

  mutate {
    replace => {
      "json_msg" => "%{message}"
    }
  }

  mutate {
    gsub => ["message", "@timestamp", "timestamp"]
  }
  mutate {
    gsub => ["message", "event", "event_data"]
  }

  # Parse JSON log
  json {
    source => "message"
    array_function => "split_columns"
    on_error => "not_json"
  }
  if ![not_json] {
    if [timestamp] != "" {
      mutate {
        convert => { "timestamp"  =>  "string" }
        on_error => "already_string"
      }
      date {
        match => ["timestamp", "UNIX_MS", "ISO8601" ]
        target => "metadata.event_timestamp"
        on_error => "invalid_format"
      }
    }

    if [event_data][id] != "" {
      mutate {
        replace => {
          "principal.resource.product_object_id" => "%{event_data.id}"
        }
        on_error => "no_event_id"
      }
    }
    if [event_data][dataset] != "" {
      mutate {
        replace => {
          "dataset_label.key" => "dataset"
          "dataset_label.value.string_value" => "%{event_data.dataset}"
        }
        on_error => "no_dataset"
      }
      if ![no_dataset] {
        mutate {
          merge => {
            "additional.fields" => "dataset_label"
          }
          on_error => "no_dataset"
        }
      }
    }
    if [event_data][provider] != "" {
      mutate {
        replace => {
          "provider_label.key" => "provider"
          "provider_label.value.string_value" => "%{event_data.provider}"
        }
        on_error => "no_provider"
      }
      if ![no_provider] {
        mutate {
          merge => {
            "additional.fields" => "provider_label"
          }
          on_error => "no_provider_label"
        }
      }
    }

    if [event_data][action] != "" and [event_data][action] == "BLOCK" {
      mutate {
        replace => {
          "sec_action" => "BLOCK"
        }
      }
    }

    if [event_data][category] != "" {
      mutate {
        replace => {
          "category_label.key" => "event category"
          "category_label.value.string_value" => "%{event_data.category}"
        }
        merge => {
          "additional.fields" => "category_label"
        }
        on_error => "no_event_category"
      }
    }

    if [server][domain] != "" {
      mutate {
        replace => {
          "principal.hostname" => "%{server.domain}"
        }
        on_error => "no_server_domain"
      }
    }
    if [url][query] != "" {
      mutate {
        replace => {
          "query_label.key" => "query"
          "query_label.value.string_value" => "%{url.query}"
        }
        on_error => "no_query"
      }
      if ![no_query] {
        mutate {
          merge => {
            "additional.fields" => "query_label"
          }
          on_error => "no_query"
        }
      }
    }
    if [imperva][abp][header_lengths] != "" {
      for index,header_length in imperva.abp.header_lengths {
        mutate {
          replace => {
            "value_array" => ""
          }
        }
        mutate {
          convert => {
            "header_length" => "string"
          }
          on_error => "already_string"
        }
        mutate {
          replace => {
            "value_array.string_value" => "%{header_length}"
          }
          on_error => "no_header_length"
        }
        mutate {
          merge => {
            "additional_eve.value.list_value.values" => "value_array"
          }
          on_error => "additional_eve_not_found"
        }
      }
      mutate {
        replace => {
          "additional_eve.key" => "header_lengths"
        }
      }
      mutate {
        merge => {
          "additional.fields" => "additional_eve"
        }
        on_error => "additional_event_not_found"
      }
    }
    for index,header_name in imperva.abp.header_names {
      mutate {
        replace => {
          "value_array" => ""
        }
      }
      mutate {
        replace => {
          "value_array.string_value" => "%{header_name}"
        }
        on_error => "no_header_names"
      }
      mutate {
        merge => {
          "additional_header_names.value.list_value.values" => "value_array"
        }
        on_error => "additional_eve_not_found"
      }
    }
    mutate {
      replace => {
        "additional_header_names.key" => "header_names"
      }
    }
    mutate {
      merge => {
        "additional.fields" => "additional_header_names"
      }
      on_error => "additional_event_not_found"
    }
    if [imperva][abp][headers_accept] != "" {
      mutate {
        replace => {
          "headers_accept.key" => "headers_accept"
          "headers_accept.value.string_value" => "%{imperva.abp.headers_accept}"
        }
        on_error => "no_headers_accept"
      }
      if ![no_headers_accept] {
        mutate {
          merge => {
            "additional.fields" => "headers_accept"
          }
          on_error => "no_headers_accept"
        }
      }
    }
    if [imperva][abp][headers_cookie_length] != "" {
      mutate {
        convert => {
          "imperva.abp.headers_cookie_length" => "string"
        }
        on_error => "already_string"
      }
      mutate {
        replace => {
          "headers_cookie_length.key" => "headers_cookie_length"
          "headers_cookie_length.value.string_value" => "%{imperva.abp.headers_cookie_length}"
        }
        on_error => "no_headers_cookie_length"
      }
      if ![no_headers_cookie_length] {
        mutate {
          merge => {
            "additional.fields" => "headers_cookie_length"
          }
          on_error => "no_headers_cookie_length"
        }
      }
    }
    if [imperva][abp][tcp_rtt_ms] != "" {
      mutate {
        convert => {
          "imperva.abp.tcp_rtt_ms" => "string"
        }
        on_error => "already_string"
      }
      mutate {
        replace => {
          "tcp_rtt_ms.key" => "tcp_rtt_ms"
          "tcp_rtt_ms.value.string_value" => "%{imperva.abp.tcp_rtt_ms}"
        }
        on_error => "no_tcp_rtt_ms"
      }
      if ![no_tcp_rtt_ms] {
        mutate {
          merge => {
            "additional.fields" => "tcp_rtt_ms"
          }
          on_error => "no_tcp_rtt_ms"
        }
      }
    }
    if [imperva][abp][tls_rtt_ms] != "" {
      mutate {
        convert => {
          "imperva.abp.tls_rtt_ms" => "string"
        }
        on_error => "already_string"
      }
      mutate {
        replace => {
          "tls_rtt_ms.key" => "tls_rtt_ms"
          "tls_rtt_ms.value.string_value" => "%{imperva.abp.tls_rtt_ms}"
        }
        on_error => "no_tls_rtt_ms"
      }
      if ![no_tls_rtt_ms] {
        mutate {
          merge => {
            "additional.fields" => "tls_rtt_ms"
          }
          on_error => "no_tls_rtt_ms"
        }
      }
    }
    for index,triggeredtags in imperva.abp.triggered_tags {
      mutate {
        replace => {
          "triggeredtags_field" => ""
        }
      }
      mutate {
        convert => {
          "index" => "string"
        }
        on_error => "index_conversion_failure"
      }
      mutate {
        replace => {
          "triggeredtags_field.value" => "%{triggeredtags}"
        }
        on_error => "failed_triggeredtags_field"
      }
      if ![failed_triggeredtags_field] {
        mutate {
          replace => {
            "triggeredtags_field.key" => "triggered_tags_%{index}"
          }
          on_error => "triggered_tags_error"
        }
        mutate {
          merge => {
            "security_result.detection_fields" => "triggeredtags_field"
          }
          on_error => "triggeredtags_field_empty"
        }
      }
    }
    if [event_data][code] != "" {
      mutate {
        replace => {
          "event_data_code_label.key" => "event_data_code"
          "event_data_code_label.value.string_value" => "%{event_data.code}"
        }
        on_error => "no_event_data_code"
      }
      if ![no_event_data_code] {
        mutate {
          merge => {
            "additional.fields" => "event_data_code_label"
          }
          on_error => "no_event_data_code"
        }
      }
    }
    if [imperva][abp][headers_cookie_names] != "" {
      mutate {
        replace => {
          "headers_cookie_names_label.key" => "headers_cookie_names"
          "headers_cookie_names_label.value.string_value" => "%{imperva.abp.headers_cookie_names}"
        }
        on_error => "no_headers_cookie_names"
      }
      if ![no_headers_cookie_names] {
        mutate {
          merge => {
            "additional.fields" => "headers_cookie_names_label"
          }
          on_error => "no_headers_cookie_names"
        }
      }
    }
    if [server][geo][name] != "" {
      mutate {
        replace => {
          "principal.location.name" => "%{server.geo.name}"
        }
        on_error => "no_server_geo_name"
      }
    }

    if [client][domain] != "" {
      mutate {
        replace => {
          "target.hostname" => "%{client.domain}"
        }
        on_error => "no_client_domain"
      }
    }

    if [client][ip] != "" {
      mutate {
        merge => {
          "target.ip" => "client.ip"
        }
        on_error => "no_client_ip"
      }
    }

    if [client][geo][name] != "" {
      mutate {
        replace => {
          "client_geo_name_label.key" => "Client Geo Organization"
          "client_geo_name_label.value.string_value" => "%{client.geo.name}"
        }
        merge => {
          "additional.fields" => "client_geo_name_label"
        }
        on_error => "no_client_geo_name"
      }
    }

    if [client][geo][country_iso_code] != "" {
      mutate {
        replace => {
          "target.location.country_or_region" => "%{client.geo.country_iso_code}"
        }
        on_error => "no_server_domain"
      }
    }

    if [http][request][method] != "" {
      mutate {
        replace => {
          "network.http.method" => "%{http.request.method}"
          "network.application_protocol" => "HTTP"
        }
        on_error => "no_http_method"
      }
    }

    if [http][request][body][bytes] != "" {
      mutate {
        convert => {
          "http.request.body.bytes" => "uinteger"
        }
        on_error => "conversion_failed"
      }
      mutate {
        rename => {
          "http.request.body.bytes" => "network.sent_bytes"
        }
      }
    }

    if [url][path] != "" {
      mutate {
        replace => {
          "network.http.referral_url" => "%{url.path}"
        }
        on_error => "no_url_path"
      }
    }

    if [user_agent][original] != "" {
      mutate {
        replace => {
          "network.http.user_agent" => "%{user_agent.original}"
        }
        on_error => "no_user_agent"
      }
      mutate {
        convert => {
          "user_agent.original" => "parseduseragent"
        }
        on_error => "conversion_failed"
      }
      mutate {
        rename => {
          "user_agent.original" => "network.http.parsed_user_agent"
        }
      }
    }

    if [imperva][ids][account_id] != "" {
      mutate {
        replace => {
          "metadata.product_log_id" => "%{imperva.ids.account_id}"
        }
        on_error => "no_account_id"
      }
    }

    if [imperva][ids][account_name] != "" {
      mutate {
        replace => {
          "principal.user.userid" => "%{imperva.ids.account_name}"
        }
        on_error => "no_account_name"
      }
    }

    if [imperva][ids][site_id] != "" {
      mutate {
        replace => {
          "site_id_label.key" => "site_id"
          "site_id_label.value.string_value" => "%{imperva.ids.site_id}"
        }
        merge => {
          "additional.fields" => "site_id_label"
        }
        on_error => "no_site_id"
      }
    }

    if [imperva][ids][site_name] != "" {
      mutate {
        replace => {
          "site_name_label.key" => "site_name"
          "site_name_label.value.string_value" => "%{imperva.ids.site_name}"
        }
        merge => {
          "additional.fields" => "site_name_label"
        }
        on_error => "no_site_name"
      }
    }

    if [imperva][abp][customer_request_id] != "" {
      mutate {
        replace => {
          "network.session_id" => "%{imperva.abp.customer_request_id}"
        }
        on_error => "no_customer_request_id"
      }
    }

    if [imperva][abp][hsig] != "" {
      mutate {
        replace => {
          "hsig.key" => "hsig"
          "hsig.value" => "%{imperva.abp.hsig}"
        }
        merge => {
          "security_result.detection_fields" => "hsig"
        }
        on_error => "no_hsig"
      }
    }

    if [imperva][abp][pid] != "" {
      mutate {
        replace => {
          "principal.process.pid" => "%{imperva.abp.pid}"
        }
        on_error => "no_pid"
      }
    }

    if [imperva][abp][header_id] != "" {
      mutate {
        replace => {
          "header_id.key" => "header_id"
          "header_id.value" => "%{imperva.abp.header_id}"
        }
        merge => {
          "security_result.detection_fields" => "header_id"
        }
        on_error => "no_header_id"
      }
    }

    if [imperva][abp][fpid] != "" {
      mutate {
        replace => {
          "fpid_label.key" => "fpid"
          "fpid_label.value.string_value" => "%{imperva.abp.fpid}"
        }
        merge => {
          "additional.fields" => "fpid_label"
        }
        on_error => "no_fpid"
      }
    }

    if [imperva][abp][zid] != "" {
      mutate {
        replace => {
          "zid_label.key" => "zid"
          "zid_label.value.string_value" => "%{imperva.abp.zid}"
        }
        merge => {
          "additional.fields" => "zid_label"
        }
        on_error => "no_zid"
      }
    }

    if [imperva][abp][zuid] != "" {
      mutate {
        replace => {
          "zuid_label.key" => "zuid"
          "zuid_label.value.string_value" => "%{imperva.abp.zuid}"
        }
        merge => {
          "additional.fields" => "zuid_label"
        }
        on_error => "no_zuid"
      }
    }

    if [imperva][abp][token_id] != "" {
      mutate {
        replace => {
          "target.resource.product_object_id" => "%{imperva.abp.token_id}"
        }
        on_error => "no_token_id"
      }
    }

    if [imperva][abp][policy_id] != "" {
      mutate {
        replace => {
          "policy_id.key" => "Policy Id"
          "policy_id.value" => "%{imperva.abp.policy_id}"
        }
        merge => {
          "security_result.detection_fields" => "policy_id"
        }
        on_error => "no_policy_id"
      }
    }

    if [imperva][abp][policy_name] != "" {
      mutate {
        replace => {
          "policy_name.key" => "Policy Name"
          "policy_name.value" => "%{imperva.abp.policy_name}"
        }
        merge => {
          "security_result.detection_fields" => "policy_name"
        }
        on_error => "no_policy_name"
      }
    }

    if [imperva][abp][selector] != "" {
      mutate {
        replace => {
          "selector.key" => "selector"
          "selector.value" => "%{imperva.abp.selector}"
        }
        merge => {
          "security_result.detection_fields" => "selector"
        }
        on_error => "no_selector"
      }
    }

    if [imperva][abp][selector_derived_id] != "" {
      mutate {
        replace => {
          "selector_derived_id.key" => "selector_derived_id"
          "selector_derived_id.value" => "%{imperva.abp.selector_derived_id}"
        }
        merge => {
          "security_result.detection_fields" => "selector_derived_id"
        }
        on_error => "no_selector_derived_id"
      }
    }

    if [imperva][abp][category] != "" {
      mutate {
        merge => {
          "security_result.category_details" => "imperva.abp.category"
        }
        on_error => "no_abp_category"
      }
    }

    if [imperva][abp][tls_fingerprint] != "" {
      mutate {
        replace => {
          "tls_fingerprint.key" => "tls_fingerprint"
          "tls_fingerprint.value" => "%{imperva.abp.tls_fingerprint}"
        }
        merge => {
          "security_result.detection_fields" => "tls_fingerprint"
        }
        on_error => "no_tls_fingerprint"
      }
    }

    for index,apollo_rule_version in imperva.abp.apollo_rule_versions {
      mutate {
        replace => {
          "apollo_rule" => ""
        }
      }
      mutate {
        convert => {
          "index" => "string"
        }
      }
      mutate {
        replace => {
          "apollo_rule.key" => "apollo_rule_versions_%{index}"
          "apollo_rule.value" => "%{apollo_rule_version}"
        }
        merge => {
          "security_result.detection_fields" => "apollo_rule"
        }
        on_error => "no_apollo_rule"
      }
    }

    for index,bot_violation in imperva.abp.bot_violations {
      mutate {
        replace => {
          "violation" => ""
        }
      }
      mutate {
        convert => {
          "index" => "string"
        }
      }
      mutate {
        replace => {
          "violation.key" => "bot_violations_%{index}"
          "violation.value" => "%{bot_violation}"
        }
        merge => {
          "security_result.detection_fields" => "violation"
        }
        on_error => "no_violation"
      }
    }

    for index,bot_behavior in imperva.abp.bot_behaviors {
      mutate {
        replace => {
          "behavior" => ""
        }
      }
      mutate {
        convert => {
          "index" => "string"
        }
      }
      mutate {
        replace => {
          "behavior.key" => "bot_behaviors_%{index}"
          "behavior.value" => "%{bot_behavior}"
        }
        merge => {
          "security_result.detection_fields" => "behavior"
        }
        on_error => "no_behavior"
      }
    }

    for index,botDecidingConditionId in imperva.abp.bot_deciding_condition_ids {
      mutate {
        replace => {
          "condition_id" => ""
        }
      }
      mutate {
        convert => {
          "index" => "string"
        }
      }
      mutate {
        replace => {
          "condition_id.key" => "bot_deciding_condition_ids_%{index}"
          "condition_id.value" => "%{botDecidingConditionId}"
        }
        merge => {
          "security_result.detection_fields" => "condition_id"
        }
        on_error => "bot_deciding_condition_ids_not_found"
      }
    }

    for index,bot_deciding_condition_name in imperva.abp.bot_deciding_condition_names {
      mutate {
        replace => {
          "condition_name" => ""
        }
      }
      mutate {
        convert => {
          "index" => "string"
        }
      }
      mutate {
        replace => {
          "condition_name.key" => "bot_deciding_condition_names_%{index}"
          "condition_name.value" => "%{bot_deciding_condition_name}"
        }
        merge => {
          "security_result.detection_fields" => "condition_name"
        }
        on_error => "no_condition_name"
      }
    }

    for index,bot_triggered_condition_id in imperva.abp.bot_triggered_condition_ids {
      mutate {
        replace => {
          "triggered_condition_id" => ""
        }
      }
      mutate {
        convert => {
          "index" => "string"
        }
      }
      mutate {
        replace => {
          "triggered_condition_id.key" => "bot_triggered_condition_ids_%{index}"
          "triggered_condition_id.value" => "%{bot_triggered_condition_id}"
        }
        merge => {
          "security_result.detection_fields" => "triggered_condition_id"
        }
        on_error => "no_triggered_condition_id"
      }
    }

    for index,bottriggeredconditionname in imperva.abp.bot_triggered_condition_names {
      mutate {
        replace => {
          "triggered_condition_name" => ""
        }
      }
      mutate {
        convert => {
          "index" => "string"
        }
      }
      mutate {
        replace => {
          "triggered_condition_name.key" => "bot_triggered_condition_names_%{index}"
          "triggered_condition_name.value" => "%{bottriggeredconditionname}"
        }
        merge => {
          "security_result.detection_fields" => "triggered_condition_name"
        }
        on_error => "no_triggered_condition_name"
      }
    }

    if [imperva][abp][headers_referer] != "" {
      mutate {
        replace => {
          "network.http.referral_url" => "%{imperva.abp.headers_referer}"
        }
        on_error => "no_headers_referer"
      }
    }

    if [imperva][abp][headers_accept_encoding] != "" {
      mutate {
        replace => {
          "accept_encoding_label.key" => "Accept Encoding"
          "accept_encoding_label.value" => "%{imperva.abp.headers_accept_encoding}"
        }
        merge => {
