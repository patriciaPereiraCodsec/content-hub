        }
        on_error => "already_string"
      }
      mutate {
        replace => {
          "token_expire_label.key" => "token_expire"
          "token_expire_label.value.string_value" => "%{imperva.abp.token_expire}"
        }
        merge => {
          "additional.fields" => "token_expire_label"
        }
        on_error => "no_token_expire"
      }
    }

    if [imperva][abp][requests_per_minute] != "" {
      mutate {
        convert => {
          "imperva.abp.requests_per_minute" => "string"
        }
        on_error => "already_string"
      }
      mutate {
        replace => {
          "requests_per_minute_label.key" => "requests_per_minute"
          "requests_per_minute_label.value.string_value" => "%{imperva.abp.requests_per_minute}"
        }
        merge => {
          "additional.fields" => "requests_per_minute_label"
        }
        on_error => "no_requests_per_minute"
      }
    }

    if [imperva][abp][requests_per_session] != "" {
      mutate {
        convert => {
          "imperva.abp.requests_per_session" => "string"
        }
        on_error => "already_string"
      }
      mutate {
        replace => {
          "requests_per_session_label.key" => "requests_per_session"
          "requests_per_session_label.value.string_value" => "%{imperva.abp.requests_per_session}"
        }
        merge => {
          "additional.fields" => "requests_per_session_label"
        }
        on_error => "no_requests_per_session"
      }
    }

    if [imperva][abp][session_length_seconds] != "" {
      mutate {
        convert => {
          "imperva.abp.session_length_seconds" => "string"
        }
        on_error => "already_string"
      }
      mutate {
        replace => {
          "session_length_seconds_label.key" => "session_length_seconds"
          "session_length_seconds_label.value.string_value" => "%{imperva.abp.session_length_seconds}"
        }
        merge => {
          "additional.fields" => "session_length_seconds_label"
        }
        on_error => "no_session_length_seconds"
      }
    }

    if [imperva][abp][requests_with_expired_token] != "" {
      mutate {
        convert => {
          "imperva.abp.requests_with_expired_token" => "string"
        }
        on_error => "already_string"
      }
      mutate {
        replace => {
          "requests_with_expired_token_label.key" => "requests_with_expired_token"
          "requests_with_expired_token_label.value.string_value" => "%{imperva.abp.requests_with_expired_token}"
        }
        merge => {
          "additional.fields" => "requests_with_expired_token_label"
        }
        on_error => "no_requests_with_expired_token"
      }
    }

    if [imperva][abp][requests_with_no_token] != "" {
      mutate {
        convert => {
          "imperva.abp.requests_with_no_token" => "string"
        }
        on_error => "already_string"
      }
      mutate {
        replace => {
          "requests_with_no_token_label.key" => "requests_with_no_token"
          "requests_with_no_token_label.value.string_value" => "%{imperva.abp.requests_with_no_token}"
        }
        merge => {
          "additional.fields" => "requests_with_no_token_label"
        }
        on_error => "no_requests_with_no_token"
      }
    }

    if [imperva][abp][seconds_with_expired_token] != "" {
      mutate {
        convert => {
          "imperva.abp.seconds_with_expired_token" => "string"
        }
        on_error => "already_string"
      }
      mutate {
        replace => {
          "seconds_with_expired_token_label.key" => "seconds_with_expired_token"
          "seconds_with_expired_token_label.value.string_value" => "%{imperva.abp.seconds_with_expired_token}"
        }
        merge => {
          "additional.fields" => "seconds_with_expired_token_label"
        }
        on_error => "no_seconds_with_expired_token"
      }
    }

    if [imperva][abp][seconds_with_no_token] != "" {
      mutate {
        convert => {
          "imperva.abp.seconds_with_no_token" => "string"
        }
        on_error => "already_string"
      }
      mutate {
        replace => {
          "seconds_with_no_token_label.key" => "seconds_with_no_token"
          "seconds_with_no_token_label.value.string_value" => "%{imperva.abp.seconds_with_no_token}"
        }
        merge => {
          "additional.fields" => "seconds_with_no_token_label"
        }
        on_error => "no_seconds_with_no_token"
      }
    }

    if [imperva][abp][rate_limiting_scope] != "" {
      mutate {
        convert => {
          "imperva.abp.rate_limiting_scope" => "string"
        }
        on_error => "already_string"
      }
      mutate {
        replace => {
          "rate_limiting_scope_label.key" => "rate_limiting_scope"
          "rate_limiting_scope_label.value.string_value" => "%{imperva.abp.rate_limiting_scope}"
        }
        merge => {
          "additional.fields" => "rate_limiting_scope_label"
        }
        on_error => "no_rate_limiting_scope"
      }
    }

    if [imperva][abp][captcha_solved_timestamp] != "" {
      mutate {
        convert => {
          "imperva.abp.captcha_solved_timestamp" => "string"
        }
        on_error => "already_string"
      }
      mutate {
        replace => {
          "captcha_solved_timestamp_label.key" => "captcha_solved_timestamp"
          "captcha_solved_timestamp_label.value.string_value" => "%{imperva.abp.captcha_solved_timestamp}"
        }
        merge => {
          "additional.fields" => "captcha_solved_timestamp_label"
        }
        on_error => "no_captcha_solved_timestamp"
      }
    }

    if [imperva][abp][requests_since_captcha_succeeded] != "" {
      mutate {
        convert => {
          "imperva.abp.requests_since_captcha_succeeded" => "string"
        }
        on_error => "already_string"
      }
      mutate {
        replace => {
          "requests_since_captcha_succeeded_label.key" => "requests_since_captcha_succeeded"
          "requests_since_captcha_succeeded_label.value.string_value" => "%{imperva.abp.requests_since_captcha_succeeded}"
        }
        merge => {
          "additional.fields" => "requests_since_captcha_succeeded_label"
        }
        on_error => "no_requests_since_captcha_succeeded"
      }
    }

    if [sec_action] != "" {
      mutate {
        merge => {
          "security_result.action" => "sec_action"
        }
      }
    }

    if ([client][ip] != "" or [client][domain] != "")
    and ([server][domain] != "") {
      mutate {
        replace => {
          "event_type" => "SCAN_HOST"
        }
      }
    }
    else if [server][domain] != "" {
      mutate {
        replace => {
          "event_type" => "SCAN_NETWORK"
        }
      }
    }
    else  {
      mutate {
        replace => {
          "event_type" => "GENERIC_EVENT"
        }
      }
    }

    mutate {
      replace => {
        "metadata.product_name" => "Advanced Bot Protection"
        "metadata.vendor_name" => "Imperva ABP"
        "metadata.event_type" => "%{event_type}"
      }
      on_error => "no_event_type"
    }

    # merge the data into udm nouns.
    if [metadata] != "" {
      mutate {
        rename => {
          "metadata" => "event.idm.read_only_udm.metadata"
        }
      }
    }
    if [principal] != "" {
      mutate {
        rename => {
          "principal" => "event.idm.read_only_udm.principal"
        }
      }
    }
    if [target] != "" {
      mutate {
        rename => {
          "target" => "event.idm.read_only_udm.target"
        }
      }
    }
    if [network] != "" {
      mutate {
        rename => {
          "network" => "event.idm.read_only_udm.network"
        }
      }
    }
    if [security_result] != "" {
      mutate {
        merge => {
          "event.idm.read_only_udm.security_result" => "security_result"
        }
      }
    }
    if [additional] != "" {
      mutate {
        rename => {
          "additional" => "event.idm.read_only_udm.additional"
        }
      }
    }

    mutate {
      merge => {
        "@output" => "event"
      }
    }
  }
  else {
    mutate {
      replace => {
        "jsonstring" => "{\"Records\":%{json_msg}}"
      }
    }
    json {
      source => "jsonstring"
      array_function => "split_columns"
      on_error => "not_json"
    }
    if [not_json] {
      drop {
        tag => "TAG_MALFORMED_ENCODING"
      }
    }

    for req in Records {
      mutate {
        replace => {
          "event" => ""
          "additional_botviolation" => ""
          "additional_headernames" => ""
          "additional_botbehaviors" => ""
          "additional_bottriggeredconditionids" => ""
          "additional_apolloruleversions" => ""
          "additional_triggeredtags" => ""
          "session_length_seconds_label" => ""
          "requests_per_session_label" => ""
          "requests_per_minute_label" => ""
          "token_expire_label" => ""
          "seconds_with_expired_token_label" => ""
          "requests_with_expired_token_label" => ""
          "requests_with_no_token_label" => ""
          "seconds_with_no_token_label" => ""
          "site_name_label" => ""
          "site_id_label" => ""
          "req_imperva_fingerprint_field" => ""
          "req_imperva_request_type_field" => ""
          "req_imperva_selector_field" => ""
          "req_imperva_zuid_field" => ""
          "req_imperva_selector_derived_id_field" => ""
          "req_imperva_policy_id_field" => ""
          "req_imperva_hsig_field" => ""
          "req_imperva_policy_name_field" => ""
          "req_imperva_selector_derived_id" => ""
          "req_imperva_selector" => ""
          "req_imperva_headers_connection_field" => ""
          "req_imperva_headers_accept_encoding_field" => ""
          "req_imperva_request_path_decoded_field" => ""
          "req_imperva_tcp_rtt_ms_field" => ""
          "req_imperva_http_version_field" => ""
          "req_imperva_tos_field" => ""
          "req_imperva_http_method_field" => ""
          "req_imperva_headers_cookie_length_field" => ""
          "req_imperva_headers_accept_field" => ""
          "req_imperva_fpid_field" => ""
          "req_event_category_field" => ""
          "req_imperva_random_id_field" => ""
          "req_imperva_captcha_solved_timestamp_field" => ""
          "req_imperva_requests_since_captcha_succeeded_field" => ""
          "req_imperva_tls_rtt_ms_field" => ""
          "req_imperva_header_id_field" => ""
          "req_imperva_zid_field" => ""
          "req_headers_accept_language_field" => ""
          "event_provider_label" => ""
          "referral_url_data" => ""
          "token_id_data" => ""
          "tar_host" => ""
          "prin_host" => ""
          "prin_ip" => ""
          "http_user_agent" => ""
          "has_target" => "false"
          "has_principal" => "false"
          "security_result" => ""
          "monitor_action_data" => ""
        }
      }

      mutate {
        replace => {
          "event.idm.read_only_udm.principal.user.userid" => "%{req.imperva.ids.account_name}"
        }
        on_error => "account_name_error"
      }

      mutate {
        replace => {
          "event.idm.read_only_udm.metadata.product_log_id" => "%{req.imperva.ids.account_id}"
        }
        on_error => "meta_account_id_error"
      }

      mutate {
        replace => {
          "tar_host" => "%{req.server.domain}"
        }
        on_error => "domain_empty"
      }

      if [tar_host] != "" {
        mutate {
          replace => {
            "event.idm.read_only_udm.target.hostname" => "%{tar_host}"
            "event.idm.read_only_udm.target.asset.hostname" => "%{tar_host}"
            "has_target" => "true"
          }
          on_error => "no_log_server_name"
        }
      }

      mutate {
        replace => {
          "event.idm.read_only_udm.target.location.name" => "%{req.server.geo.name}"
        }
        on_error => "country_or_region_error"
      }

      mutate {
        replace => {
          "event.idm.read_only_udm.target.process.file.full_path" => "%{req.url.path}"
        }
        on_error => "path_empty"
      }
      mutate {
        replace => {
          "event.idm.read_only_udm.target.url" => "%{req.url.query}"
        }
        on_error => "url_empty"
      }

      mutate {
        replace => {
          "event.idm.read_only_udm.network.session_id" => "%{req.imperva.abp.customer_request_id}"
        }
        on_error => "request_id_error"
      }

      mutate {
        replace => {
          "event.idm.read_only_udm.network.http.method" => "%{req.http.request.method}"
        }
        on_error => "http_method_error"
      }

      mutate {
        convert => {
          "req.http.request.body.bytes" => "uinteger"
        }
        on_error => "bytes_conversion_failure"
      }
      mutate {
        rename => {
          "req.http.request.body.bytes" => "event.idm.read_only_udm.network.sent_bytes"
        }
      }

      mutate {
        replace => {
          "token_id_data" => "%{req.imperva.abp.token_id}"
        }
        on_error => "token_id_empty"
      }

      if [token_id_data] != "" {
        mutate {
          replace => {
            "event.idm.read_only_udm.target.resource.product_object_id" => "%{token_id_data}"
          }
          on_error => "token_id_data_empty"
        }
      }

      mutate {
        replace => {
          "event.idm.read_only_udm.principal.location.country_or_region" => "%{req.client.geo.country_iso_code}"
        }
        on_error => "country_iso_code_error"
      }

      mutate {
        replace => {
          "event.idm.read_only_udm.principal.resource.product_object_id" => "%{req.event.id}"
        }
        on_error => "event_id_error"
      }

      mutate {
        replace => {
          "event.idm.read_only_udm.principal.location.name" => "%{req.client.geo.name}"
        }
        on_error => "client_geo_name_error"
      }

      mutate {
        replace => {
          "event_provider_label.value.string_value" => "%{req.event.provider}"
        }
        on_error => "provider_error"
      }
      if ![provider_error] {
        mutate {
          replace => {
            "event_provider_label.key" => "provider"
          }
        }
        mutate {
          merge => {
            "event.idm.read_only_udm.additional.fields" => "event_provider_label"
          }
          on_error => "provider_label_empty"
        }
      }

      mutate {
        replace => {
          "prin_host" => "%{req.client.domain}"
        }
        on_error => "domain_prin_empty"
      }
      if [prin_host] != "" {
        mutate {
          replace => {
            "event.idm.read_only_udm.principal.hostname" => "%{req.client.domain}"
            "event.idm.read_only_udm.principal.asset.hostname" => "%{req.client.domain}"
            "has_principal" => "true"
          }
          on_error => "client_hostname_empty"
        }
      }

      mutate {
        replace => {
          "prin_ip" => "%{req.client.ip}"
        }
        on_error => "prin_ip_empty"
      }

      if [prin_ip] != "" {
        mutate {
          merge => {
            "event.idm.read_only_udm.principal.ip" => "req.client.ip"
            "event.idm.read_only_udm.principal.asset.ip" => "req.client.ip"
          }
          on_error => "client_ip_empty"
        }
        mutate {
          replace => {
            "has_principal" => "true"
          }
        }
      }

      mutate {
        replace => {
          "event.idm.read_only_udm.principal.process.pid" => "%{req.imperva.abp.pid}"
        }
        on_error => "pid_error"
      }

      mutate {
        replace => {
          "monitor_action_data" => "%{req.imperva.abp.monitor_action}"
        }
        on_error => "monitor_action_empty"
      }

      if [monitor_action_data] =~ "(?i)allow" {
        mutate {
          replace => {
            "sec_action" => "ALLOW"
            "security_result.severity" => "INFORMATIONAL"
          }
        }
      }
      else if [monitor_action_data] =~ "(?i)block" {
        mutate {
          replace => {
            "sec_action" => "BLOCK"
          }
        }
      }
      else if [monitor_action_data] =~ "(?i)captcha" or [monitor_action_data] != "" {
        mutate {
          replace => {
            "sec_action" => "BLOCK"
            "security_result.action_details" => "%{monitor_action_data}"
          }
          on_error => "monitor_action_details_empty"
        }
      }

      mutate {
        merge => {
          "security_result.action" => "sec_action"
        }
        on_error => "sec_action_empty"
      }

      mutate {
        convert => {
          "req.imperva.abp.session_length_seconds" => "string"
        }
        on_error => "already_string"
      }
      mutate {
        replace => {
          "session_length_seconds_label.value.string_value" => "%{req.imperva.abp.session_length_seconds}"
        }
        on_error => "session_length_seconds_error"
      }
      if ![session_length_seconds_error] {
        mutate {
          replace => {
            "session_length_seconds_label.key" => "session_length_seconds"
          }
        }
        mutate {
          merge => {
            "event.idm.read_only_udm.additional.fields" => "session_length_seconds_label"
          }
          on_error => "session_length_seconds_label_empty"
        }
      }

      mutate {
        convert => {
          "req.imperva.abp.requests_per_session" => "string"
        }
        on_error => "already_string"
      }
      mutate {
        replace => {
          "requests_per_session_label.value.string_value" => "%{req.imperva.abp.requests_per_session}"
        }
        on_error => "requests_per_session_error"
      }
      if ![requests_per_session_error] {
        mutate {
          replace => {
            "requests_per_session_label.key" => "requests_per_session"
          }
        }
        mutate {
          merge => {
            "event.idm.read_only_udm.additional.fields" => "requests_per_session_label"
          }
          on_error => "requests_per_session_label_empty"
        }
      }

      mutate {
        convert => {
          "req.imperva.abp.requests_per_minute" => "string"
        }
        on_error => "already_string"
      }
      mutate {
        replace => {
          "requests_per_minute_label.value.string_value" => "%{req.imperva.abp.requests_per_minute}"
        }
        on_error => "requests_per_minute_error"
      }
      if ![requests_per_minute_error] {
        mutate {
          replace => {
            "requests_per_minute_label.key" => "requests_per_minute"
          }
        }
