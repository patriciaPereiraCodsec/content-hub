        }
        merge => {
          "additional.fields" => "random_id_label"
        }
        on_error => "no_random_id"
      }
    }

    if [imperva][abp][monitor_action] =~ "(?i)allow" {
      mutate {
        replace => {
          "sec_action" => "ALLOW"
          "security_result.severity" => "INFORMATIONAL"
        }
      }
    }
    else if [imperva][abp][monitor_action] =~ "(?i)captcha" or [imperva][abp][monitor_action] =~ "(?i)block" or [imperva][abp][monitor_action] =~ "(?i)deny" {
      mutate {
        replace => {
          "sec_action" => "BLOCK"
          "security_result.severity" => "HIGH"
        }
      }
    }
    else {
      mutate {
        replace => {
          "sec_action" => "ALLOW"
          "security_result.severity" => "INFORMATIONAL"
        }
      }
    }

    if [imperva][abp][headers_accept_language] != "" {
