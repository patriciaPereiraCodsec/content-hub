# Product: SENTRY
# Category: Data Security
# Supported Format: JSON
# Reference: N/A
# Last Updated: 2025-01-16
# Copyright 2025 Chronicle LLC

filter {
  mutate {
    replace => {
      "principal" => ""
      "target" => ""
      "network" => ""
      "metadata" => ""
      "additional" => ""
      "security_result" => ""
      "has_principal" => "false"
      "has_target" => "false"
      "host" => ""
      "user_id" => ""
      "user_ip_trunc" => ""
      "environment" => ""
      "event_id" => ""
      "exception_type" => ""
      "exception_value" => ""
      "project_id" => ""
      "release" => ""
      "source_type" => ""
      "splunk_index" => ""
      "splunk_source" => ""
      "tag" => ""
      "application_protocol" => ""
      "response_code" => ""
      "issue_id" => ""
      "msg" => ""
      "has_target_user" => "false"
      "tags" => ""
      "timestamp" => ""
      "transaction" => ""
      "type" => ""
    }
  }
  mutate {
    gsub => ["message", "message", "msg"]
  }

  json {
    source => "message"
    array_function => "split_columns"
    on_error => "not_json"
  }

  if [host] != "" {
   grok {
      match => {
        "host" => ["%{IP:host}"]
      }
      overwrite => ["host"]
      on_error => "invalid_ip"
    }
    if ![invalid_ip] {
      mutate {
        merge => {
          "principal.ip" => "host"
          "principal.asset.ip" => "host"
        }
        on_error => "invalid_ip"
      }
      mutate {
        replace => {
          "has_principal" => "true"
        }
      }
    }
    else {
      mutate {
        replace => {
          "host_label.key" => "host"
          "host_label.value" => "%{host}"
        }
        on_error => "host_label_not_found"
      }
      if ![host_label_not_found] {
        mutate {
          merge => {
            "principal.resource.attribute.labels" => "host_label"
          }
          on_error => "host_label_merge_failed"
        }
      }
    }
  }
  if [user_id] != "" {
    mutate {
      replace => {
        "target.user.userid" => "%{user_id}"
        "has_target_user" => "true"
      }
      on_error => "user_id_not_found"
    }
  }
  if [user_ip_trunc] != "" {
    grok {
      match => {
        "user_ip_trunc" => [
          "%{IP:user_ip_trunc}"
        ]
      }
      overwrite => ["user_ip_trunc"]
      on_error => "invalid_ip1"
    }
    if ![invalid_ip1] {
      mutate {
        merge => {
          "target.ip" => "user_ip_trunc"
          "target.asset.ip" => "user_ip_trunc"
        }
        on_error => "invalid_ip2"
      }
      mutate {
        replace => {
          "has_target" => "true"
        }
      }
    }
  }
  mutate {
    convert => {
      "issue_id" => "string"
    }
    on_error => "issue_id_string_not_found"
  }
  if [issue_id] != "" {
    mutate {
      replace => {
        "principal.resource.product_object_id" => "%{issue_id}"
      }
      on_error => "issue_id_not_found"
    }
  }

  if [environment] != "" {
    mutate {
      replace => {
        "environment_label.key" => "environment"
        "environment_label.value.string_value" => "%{environment}"
      }
      on_error => "no_environment"
    }
    if ![no_environment] and [environment_label] != "" {
      mutate {
        merge => {
          "additional.fields" => "environment_label"
        }
        on_error => "no_environment"
      }
    }
  }
  if [event_id] != "" {
    mutate {
      replace => {
        "metadata.product_log_id" => "%{event_id}"
      }
      on_error => "no_event_id"
    }
  }
  if [msg] != "" {
    mutate {
      replace => {
        "metadata.description" => "%{msg}"
      }
      on_error => "no_msg"
    }
  }
  if [exception_value] =~ "^HTTP" {
    grok {
      match => {
        "exception_value" => [
          "%{WORD:application_protocol} %{DATA} \\(%{INT:response_code}\\):%{GREEDYDATA}",
          "%{WORD:application_protocol} %{INT:response_code}"
        ]
      }
      overwrite => ["application_protocol", "response_code"]
      on_error => "grok_failure2"
    }
  }
  else if [exception_value] != "" {
    mutate {
      replace => {
        "exception_value_label.key" => "exception_value"
        "exception_value_label.value.string_value" => "%{exception_value}"
      }
      on_error => "no_exception_value"
    }
    if ![no_exception_value] {
      mutate {
        merge => {
          "additional.fields" => "exception_value_label"
        }
        on_error => "no_exception_value_error"
      }
    }
  }
  if [application_protocol] != "" {
    mutate {
      replace => {
        "network.application_protocol" => "%{application_protocol}"
      }
      on_error => "no_application_protocol"
    }
  }
  if [response_code] != "" {
    mutate {
      replace => {
        "network.http.response_code" => "%{response_code}"
      }
      on_error => "no_response_code"
    }
    mutate {
      convert => {
        "network.http.response_code" => "integer"
      }
      on_error => "no_query_status"
    }
  }

  if [exception_type] != "" {
    mutate {
      replace => {
        "exception_type_label.key" => "exception_type"
        "exception_type_label.value.string_value" => "%{exception_type}"
      }
      on_error => "no_exception_type"
    }
    if ![no_exception_type] {
      mutate {
        merge => {
          "additional.fields" => "exception_type_label"
        }
        on_error => "no_exception_type_error"
      }
    }
  }
  if [type] != "" {
    mutate {
      replace => {
        "type_label.key" => "type"
        "type_label.value.string_value" => "%{type}"
      }
      on_error => "no_type"
    }
    if ![no_type] {
      mutate {
        merge => {
          "additional.fields" => "type_label"
        }
        on_error => "no_type_error"
      }
    }
  }

  if [project_id] != "" {
    mutate {
      replace => {
        "target.asset.attribute.cloud.project.id" => "%{project_id}"
      }
      on_error => "project_id_not_found"
    }
  }
  for tag in tags {
    mutate {
      replace => {
        "tag_label" => ""
      }
    }
    mutate {
      replace => {
        "tag_label.key" => "%{tag.0}"
        "tag_label.value" => "%{tag.1}"
      }
      on_error => "no_tag"
    }
    if ![no_tag] {
      mutate {
        merge => {
          "security_result.detection_fields" => "tag_label"
        }
        on_error => "tag_label_merge_failed"
      }
    }
  }
  if [transaction] != "" {
    mutate {
      replace => {
        "transaction_label.key" => "transaction"
        "transaction_label.value" => "%{transaction}"
      }
      on_error => "no_transaction"
    }
    if ![no_transaction] {
      mutate {
        merge => {
          "security_result.detection_fields" => "transaction_label"
        }
        on_error => "no_transaction_error"
      }
    }
  }
  if [release] != "" {
    mutate {
      replace => {
        "release_label.key" => "release"
        "release_label.value" => "%{release}"
      }
      on_error => "release_label_not_found"
    }
    if ![release_label_not_found] {
      mutate {
        merge => {
          "principal.resource.attribute.labels" => "release_label"
        }
        on_error => "release_label_merge_failed"
      }
    }
  }
  if [source_type] != "" {
    mutate {
      replace => {
        "source_type_label.key" => "source_type"
        "source_type_label.value" => "%{source_type}"
      }
      on_error => "source_type_not_found"
    }
    if ![source_type_not_found] {
      mutate {
        merge => {
          "principal.resource.attribute.labels" => "source_type_label"
        }
        on_error => "source_type_label_merge_failed"
      }
    }
  }
  if [splunk_index] != "" {
    mutate {
      replace => {
        "splunk_index_label.key" => "splunk_index"
        "splunk_index_label.value" => "%{splunk_index}"
      }
      on_error => "no_splunk_index"
    }
    if ![no_splunk_index] {
      mutate {
        merge => {
          "principal.resource.attribute.labels" => "splunk_index_label"
        }
        on_error => "splunk_index_label_merge_failed"
      }
    }
  }
  if [timestamp] != "" {
    date {
      match => ["timestamp", "ISO8601"]
      on_error => "no_timestamp"
      target => "metadata.event_timestamp"
    }
  }

  if [splunk_source] != "" {
    mutate {
      replace => {
        "splunk_source_label.key" => "splunk_source"
        "splunk_source_label.value" => "%{splunk_source}"
      }
      on_error => "no_splunk_source"
    }
    if ![no_splunk_source] {
      mutate {
        merge => {
          "principal.resource.attribute.labels" => "splunk_source_label"
        }
        on_error => "splunk_source_label_merge_failed"
      }
    }
  }

  if [has_principal] == "true" and [has_target] == "true" {
    mutate {
      replace => {
        "metadata.event_type" => "NETWORK_CONNECTION"
      }
    }
  }
  else if [has_principal] == "true" and [has_target] == "false" {
    mutate {
      replace => {
        "metadata.event_type" => "STATUS_UPDATE"
      }
    }
  }
  else if [has_target_user] == "true" {
    mutate {
      replace => {
        "metadata.event_type" => "USER_UNCATEGORIZED"
      }
    }
  }
  else {
    mutate {
      replace => {
        "metadata.event_type" => "GENERIC_EVENT"
      }
    }
  }

  if [target] != "" {
    mutate {
      rename => {
        "target" => "event.idm.read_only_udm.target"
      }
    }
  }
  if [principal] != "" {
    mutate {
      rename => {
        "principal" => "event.idm.read_only_udm.principal"
      }
    }
  }
  if [metadata] != "" {
    mutate {
      rename => {
        "metadata" => "event.idm.read_only_udm.metadata"
      }
    }
  }
  if [network] != "" {
    mutate {
      rename => {
        "network" => "event.idm.read_only_udm.network"
      }
    }
  }

  if [security_result] != "" {
    mutate {
      merge => {
        "event.idm.read_only_udm.security_result" => "security_result"
      }
      on_error => "security_result_merge_failed"
    }
  }

  if [additional] != "" {
    mutate {
      rename => {
        "additional" => "event.idm.read_only_udm.additional"
      }
    }
  }

  mutate {
    merge => {
      "@output" => "event"
    }
  }
}