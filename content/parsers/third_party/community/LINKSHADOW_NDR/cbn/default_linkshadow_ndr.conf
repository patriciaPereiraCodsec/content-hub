# Product: LINKSHADOW NDR
# Category: NDR
# Supported Format: SYSLOG + KV
# Reference: N/A
# Last Updated: 2025-01-16
# Copyright 2025 Chronicle LLC

filter {
  mutate {
    replace => {
      "principal" => ""
      "target" => ""
      "network" => ""
      "metadata" => ""
      "additional" => ""
      "intermediary" => ""
      "about" => ""
      "security_result" => ""
      "has_principal" => "false"
      "has_target" => "false"
      "has_principal_user" => "false"
      "has_target_user" => "false"
      "src" => ""
      "dst" => ""
      "spt" => ""
      "dpt" => ""
      "msg" => ""
      "cef_extension" => ""
      "device_version" => ""
      "device_vendor" => ""
      "device_product" => ""
      "device_event_class_id" => ""
      "event_name" => ""
      "severity" => ""
      "dvc" => ""
      "cat" => ""
      "externalId" => ""
      "rt" => ""
      "smac" => ""
      "cn1" => ""
      "cn1Label" => ""
      "cn2" => ""
      "cn2Label" => ""
      "cs3" => ""
      "cs3Label" => ""
      "cs4" => ""
      "cs4Label" => ""
      "cs5" => ""
      "cs5Label" => ""
      "cs6" => ""
      "cs6Label" => ""
      "reason" => ""
      "duser" => ""
      "suser" => ""
      "destinationDnsDomain" => ""
      "requestMethod" => ""
      "fileType" => ""
      "fileHash" => ""
      "fname" => ""
      "request" => ""
      "requestClientApplication" => ""
      "abc" => ""
    }
  }
  grok {
    match => {
      "message" => [
        "<%{INT}>CEF:%{INT:version}\\|%{DATA:device_vendor}\\|%{DATA:device_product}\\|%{DATA:device_version}\\|%{DATA:device_event_class_id}\\|%{DATA:event_name}\\|%{INT:severity}\\|%{GREEDYDATA:cef_extension}"
      ]
    }
    overwrite => ["version", "device_version", "device_vendor", "device_product", "device_event_class_id", "event_name", "severity", "cef_extension"]
    on_error => "cef_extension_empty"
  }
  if [device_version] != "" {
    mutate {
      replace => {
        "metadata.product_version" => "%{device_version}"
      }
      on_error => "device_version_empty"
    }
  }
  if [device_vendor] != "" {
    mutate {
      replace => {
        "metadata.vendor_name" => "%{device_vendor}"
      }
      on_error => "device_vendor_empty"
    }
  }
  if [device_product] != "" {
    mutate {
      replace => {
        "metadata.product_name" => "%{device_product}"
      }
      on_error => "product_metadata_mapping_failure"
    }
  }
  if [event_name] != "" and [device_event_class_id] != "" {
    mutate {
      replace => {
        "metadata.product_event_type" => "[%{device_event_class_id}] - %{event_name}"
      }
      on_error => "event_name_empty"
    }
  }
  else if [device_event_class_id] != "" {
    mutate {
      replace => {
        "metadata.product_event_type" => "%{device_event_class_id}"
      }
      on_error => "device_event_class_id_empty"
    }
  }
  else if [event_name] != "" {
    mutate {
      replace => {
        "metadata.product_event_type" => "%{event_name}"
      }
      on_error => "event_name_empty"
    }
  }
  if [severity] != "" {
    mutate {
      replace => {
        "security_result.severity_details" => "%{severity}"
      }
      on_error => "severity_empty"
    }
    if [severity] == "0" {
      mutate {
        replace => {
          "security_result.severity" => "INFORMATIONAL"
        }
      }
    }
    else if [severity] == "2" {
      mutate {
        replace => {
          "security_result.severity" => "LOW"
        }
      }
    }
    else if [severity] == "5" {
      mutate {
        replace => {
          "security_result.severity" => "MEDIUM"
        }
      }
    }
    else if [severity] == "7" {
      mutate {
        replace => {
          "security_result.severity" => "HIGH"
        }
      }
    }
    else if [severity] == "10" {
      mutate {
        replace => {
          "security_result.severity" => "CRITICAL"
        }
      }
    }
  }
  if [cef_extension] != "" {
    mutate {
      gsub => ["cef_extension","([a-zA-Z0-9_]+)=","^$1="]
    }
    kv {
      source => "cef_extension"
      field_split => "^"
      value_split => "="
      on_error => "no_kv_data"
    }
  }
  if [src] != "" {
    grok {
      match => {
        "src" => [
          "%{IP:src}"
        ]
      }
      overwrite => ["src"]
      on_error => "invalid_ip"
    }
    if ![invalid_ip] {
      mutate {
        merge => {
          "principal.ip" => "src"
          "principal.asset.ip" => "src"
        }
        on_error => "src_ip_empty"
      }
      mutate {
        replace => {
          "has_principal" => "true"
        }
      }
    }
  }

  if [spt] != "" {
    mutate {
      replace => {
        "principal.port" => "%{spt}"
      }
      on_error => "spt_port_empty"
    }
    mutate {
      convert => {
        "principal.port" => "integer"
      }
      on_error => "spt_port_conversion_failure"
    }
  }

  if [dst] != "" {
    mutate {
      gsub => ["dst",',','\",\"']
    }
    mutate {
      gsub => ["dst"," ",""]
    }
    mutate {
      replace => {
        "dst" => "{\"dst\":[\"%{dst}\"]}"
      }
      on_error => "no_dst"
    }
    json {
      source => "dst"
      array_function => "split_columns"
      on_error => "invalid_dst_json"
    }
    if ![invalid_dst_json] {
      for ipval in dst {
        grok {
          match => {
            "ipval" => "%{IP:dst_ip1}"
          }
          overwrite => ["dst_ip1"]
          on_error => "invalid_dst_ip1"
        }
        if ![invalid_dst_ip1] {
          mutate {
            merge => {
              "target.ip" => "dst_ip1"
              "target.asset.ip" => "dst_ip1"
            }
            on_error => "err_ip_empty"
          }
        }
      }
      mutate {
        replace => {
          "has_target" => "true"
        }
      }
    }
  }
  if[dpt] != "" {
    mutate {
      replace => {
        "target.port" => "%{dpt}"
      }
      on_error => "dpt_port_empty"
    }
    mutate {
      convert => {
        "target.port" => "integer"
      }
      on_error => "dpt_port_conversion_failure"
    }
  }
  if [smac] != "" {
    grok {
      match => {
        "smac" => [
          "%{MAC:smac}"
        ]
      }
      overwrite => ["smac"]
      on_error => "invalid_mac"
    }
    if ![invalid_mac] {
      mutate {
        merge => {
          "principal.mac" => "smac"
        }
        on_error => "smac_empty"
      }
    }
    else {
      mutate {
        replace => {
          "smac_value_label.key" => "smac"
          "smac_value_label.value.string_value" => "%{smac}"
        }
        on_error => "smac_value_label_empty"
      }
      if ![smac_value_label_empty] {
        mutate {
          merge => {
            "additional.fields" => "smac_value_label"
          }
          on_error => "no_smac_value_error"
        }
      }
    }
  }
  if [reason] != "" {
    mutate {
      replace => {
        "security_result.description" => "%{reason}"
      }
      on_error => "reason_empty"
    }
  }

  if [msg] != "" {
    mutate {
      replace => {
        "metadata.description" => "%{msg}"
      }
      on_error => "no_msg"
    }
  }
  if [destinationDnsDomain] != "" {
    mutate {
      replace => {
        "target.administrative_domain" => "%{destinationDnsDomain}"
      }
      on_error => "destination_dns_domain_not_present"
    }
  }
  if [requestMethod] != "" {
    mutate {
      replace => {
        "network.http.method" => "%{requestMethod}"
      }
      on_error => "no_request_method"
    }
  }
  if [fileType] != "" {
    mutate {
      replace => {
        "target.file.mime_type" => "%{fileType}"
      }
      on_error => "fileType_not_found"
    }
  }

  if [cn1] != "" and [cn1Label] != "" {
    mutate {
      replace => {
        "additional_cn1.value.string_value" => "%{cn1}"
      }
      on_error => "cn1_empty"
    }
    if ![cn1_empty] {
      mutate {
        replace => {
          "additional_cn1.key" => "%{cn1Label}"
        }
        on_error => "cn1Label_empty"
      }
      mutate {
        merge => {
          "additional.fields" => "additional_cn1"
        }
        on_error => "err_cn1_field_missing"
      }
    }
  }
  if [cn2] != "" and [cn2Label] != "" {
    mutate {
      replace => {
        "additional_cn2.value.string_value" => "%{cn2}"
      }
      on_error => "cn2_empty"
    }
    if ![cn2_empty] {
      mutate {
        replace => {
          "additional_cn2.key" => "%{cn2Label}"
        }
        on_error => "cn2Label_empty"
      }
      mutate {
        merge => {
          "additional.fields" => "additional_cn2"
        }
        on_error => "err_cn2_field_missing"
      }
    }
  }
  if [cs3] != "" and [cs3Label] != "" {
    mutate {
      replace => {
        "additional_cs3.value.string_value" => "%{cs3}"
      }
      on_error => "err_cs3_missing"
    }
    if ![err_cs3_missing] {
       mutate {
         replace => {
           "additional_cs3.key" => "%{cs3Label}"
         }
         on_error => "cs3Label_empty"
       }
       mutate {
         merge => {
           "additional.fields" => "additional_cs3"
         }
         on_error => "err_cs3_field_missing"
       }
    }
  }
  if [cs4] != "" and [cs4Label] != "" {
    mutate {
      replace => {
        "additional_cs4.value.string_value" => "%{cs4}"
      }
      on_error => "err_cs4_missing"
    }
    if ![err_cs4_missing] {
       mutate {
         replace => {
           "additional_cs4.key" => "%{cs4Label}"
         }
         on_error => "cs4Label_empty"
       }
       mutate {
         merge => {
           "additional.fields" => "additional_cs4"
         }
         on_error => "err_cs4_field_missing"
       }
    }
  }
  if [cs5] != "" and [cs5Label] != "" {
    mutate {
      replace => {
        "additional_cs5.value.string_value" => "%{cs5}"
      }
      on_error => "err_cs5_missing"
    }
    if ![err_cs5_missing] {
       mutate {
         replace => {
           "additional_cs5.key" => "%{cs5Label}"
         }
         on_error => "cs5Label_empty"
       }
       mutate {
         merge => {
           "additional.fields" => "additional_cs5"
         }
         on_error => "err_cs5_field_missing"
       }
    }
  }
  if [cs6] != "" and [cs6Label] != "" {
    mutate {
      replace => {
        "additional_cs6.value.string_value" => "%{cs6}"
      }
      on_error => "err_cs6_missing"
    }
    if ![err_cs6_missing] {
       mutate {
         replace => {
           "additional_cs6.key" => "%{cs6Label}"
         }
         on_error => "cs6Label_empty"
       }
       mutate {
         merge => {
           "additional.fields" => "additional_cs6"
         }
         on_error => "err_cs6_field_missing"
       }
    }
  }
  if [duser] != "" {
    mutate {
      replace => {
        "target.user.userid" => "%{duser}"
        "has_target_user" => "true"
      }
      on_error => "duser_empty"
    }
  }
  if [suser] != "" {
    mutate {
      replace => {
        "principal.user.userid" => "%{suser}"
        "has_principal_user" => "true"
      }
      on_error => "suser_empty"
    }
  }
  if [fname] != "" {
    mutate {
      replace => {
        "target.file.full_path" => "%{fname}"
      }
      on_error => "fname_empty"
    }
  }

  if [cat] != "" {
    mutate {
      replace => {
        "cat_label.key" => "cat"
        "cat_label.value.string_value" => "%{cat}"
      }
      on_error => "cat_not_found"
    }
    if ![cat_not_found] {
      mutate {
        merge => {
          "additional.fields" => "cat_label"
        }
        on_error => "cat_label_not_found"
      }
    }
  }
  if [externalId] != "" {
    mutate {
      replace => {
        "externalId_label.key" => "externalId"
        "externalId_label.value.string_value" => "%{externalId}"
      }
      on_error => "externalId_not_found"
    }
    if ![externalId_not_found] {
      mutate {
        merge => {
          "additional.fields" => "externalId_label"
        }
        on_error => "externalId_label_not_found"
      }
    }
  }
  grok {
    match => {
      "fileHash" => "(?P<_hash>^[0-9a-f]+$)"
    }
    on_error => "file_is_not_hash"
  }

  if [file_is_not_hash] and [fileHash] != "" {
    mutate {
      replace => {
        "about.file.full_path" => "%{fileHash}"
      }
    }
    } else if [fileHash] != "" {
    mutate {
      rename => {
        "fileHash" => "about.file.sha256"
      }
    }
  }
  if [about] != "" {
    mutate {
      merge => {
        "event.idm.read_only_udm.about" => "about"
      }
      on_error => "about_not_found"
    }
  }
  grok {
    match => {
      "dvc" => "%{IP:dvc}"
    }
    overwrite => ["dvc"]
    on_error => "not_dvc"
  }
  if ![not_dvc] {
    mutate {
      merge => {
        "intermediary.ip" => "dvc"
      }
      on_error => "ip_merge_failed"
    }
  }
  if [intermediary] != "" {
    mutate {
      merge => {
        "event.idm.read_only_udm.intermediary" => "intermediary"
      }
    }
  }
  if [request] != "" {
    mutate {
      replace => {
        "target.url" => "%{request}"
      }
      on_error => "request_not_found"
    }
  }
  if [requestClientApplication] != "" {
    mutate {
      replace => {
        "target.application" => "%{requestClientApplication}"
      }
      on_error => "requestClientApplication_not_found"
    }
  }
  if [rt] != "" {
    date {
      match => ["rt","MMM d H:mm:ss", "MMM d HH:mm:ss", "MMM d H:mm:s"]
      rebase => true
      on_error => "invalid_date"
    }
  }

  if [has_principal] == "true" and [has_target] == "true" {
    mutate {
      replace => {
        "metadata.event_type" => "NETWORK_CONNECTION"
      }
    }
  }
  else if [has_principal_user] == "true" or [has_target_user] == "true" {
    mutate {
      replace => {
        "metadata.event_type" => "USER_UNCATEGORIZED"
      }
    }
  }
  else if [has_principal] == "true" {
    mutate {
      replace => {
        "metadata.event_type" => "STATUS_UPDATE"
      }
    }
  }
  else {
    mutate {
      replace => {
        "metadata.event_type" => "GENERIC_EVENT"
      }
    }
  }

  if [target] != "" {
    mutate {
      rename => {
        "target" => "event.idm.read_only_udm.target"
      }
    }
  }
  if [principal] != "" {
    mutate {
      rename => {
        "principal" => "event.idm.read_only_udm.principal"
      }
    }
  }
  if [metadata] != "" {
    mutate {
      rename => {
        "metadata" => "event.idm.read_only_udm.metadata"
      }
    }
  }
  if [network] != "" {
    mutate {
      rename => {
        "network" => "event.idm.read_only_udm.network"
      }
    }
  }

  if [security_result] != "" {
    mutate {
      merge => {
        "event.idm.read_only_udm.security_result" => "security_result"
      }
      on_error => "security_result_not_found"
    }
  }

  if [additional] != "" {
    mutate {
      rename => {
        "additional" => "event.idm.read_only_udm.additional"
      }
    }
  }
  # Generate output
  mutate {
    merge => {
      "@output" => "event"
    }
  }
}
