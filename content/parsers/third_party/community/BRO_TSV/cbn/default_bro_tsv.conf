  else if [bro_type] == "bro_kerberos" {
    # Required fields:

    # id.orig_h
    # id.orig_p
    # id.resp_h
    # id.resp_p
    # client_host
    # server_host
    # client_user
    # error

    if [client_user] != "" && [client_user] != "-" {
      mutate {
