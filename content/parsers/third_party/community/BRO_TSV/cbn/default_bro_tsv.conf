  else if [bro_type] == "bro_files" {
    # Required fields:

    # id.orig_h
    # id.resp_h
    # source
    # mime_type
    # file_name
    # file_size
    # md5

    # It it unsafe to map source to protocol directly
    # since source is a string and could contain any
    # value, which could cause enum parsing error.
    if [source] not in ["", "-"] {
      mutate {
        replace => {
          "app_protocol_src" => "%{source}"
        }
      }

      # This file contains application protocol parsing logic

# Interface:
# app_protocol_src (required): string that contains application protocol or a
#                              port number
# app_protocol_output: string that is either empty or contains application
#                      protocol compatible to ApplicationProtocol enum in
#                      udm.proto

mutate {
  uppercase => [ "app_protocol_src" ]
}

if [app_protocol_src] in [ "22", "SSH", "SSHD" ] {
  mutate {
    replace => {
      "app_protocol_output" => "SSH"
    }
  }
}
else if [app_protocol_src] in [ "25", "SMTP" ] {
  mutate {
    replace => {
      "app_protocol_output" => "SMTP"
    }
  }
}
else if [app_protocol_src] in [ "53", "DNS" ] {
  mutate {
    replace => {
      "app_protocol_output" => "DNS"
    }
  }
}
else if [app_protocol_src] in [ "80", "8080", "HTTP" ] {
  mutate {
    replace => {
      "app_protocol_output" => "HTTP"
    }
  }
}
else if [app_protocol_src] in [ "443", "HTTPS", "TLS" ] {
  mutate {
    replace => {
      "app_protocol_output" => "HTTPS"
    }
  }
}
else if [app_protocol_src] in [ "7400", "7401", "7402", "DDS" ] {
  mutate {
    replace => {
      "app_protocol_output" => "DDS"
    }
  }
}
else if [app_protocol_src] in [ "SMB", "SMBV1" ] {
  mutate {
    replace => {
      "app_protocol_output" => "SMB"
    }
  }
}
else if [app_protocol_src] in [
  "UNKNOWN_APPLICATION_PROTOCOL", "AFP", "APPC", "AMQP", "ATOM", "BEEP",
  "BITCOIN", "BIT_TORRENT", "CFDP", "COAP", "DEVICE_NET", "DHCP", "E_DONKEY",
  "ENRP", "FAST_TRACK", "FINGER", "FREENET", "FTAM", "GOPHER", "HL7", "H323",
  "IRCP", "KADEMLIA", "LDAP", "LPD", "MIME", "MODBUS", "MQTT", "NETCONF",
  "NFS", "NIS", "NNTP", "NTCIP", "NTP", "OSCAR", "PNRP", "QUIC", "RDP", "RELP",
  "RIP", "RLOGIN", "RPC", "RTMP", "RTP", "RTPS", "RTSP", "SAP", "SDP", "SIP",
  "SLP", "SNTP", "SSMS", "STYX", "TCAP", "TDS", "TOR", "TSP", "VTP", "WHOIS",
  "WEB_DAV", "X400", "X500", "XMPP", "IEC104", "DCERPC"
] {
  mutate {
    replace => {
      "app_protocol_output" => "%{app_protocol_src}"
    }
  }

} else {
  mutate {
    replace => {
      "app_protocol_output" => ""
    }
  }
}


      mutate {
        replace => {
          "source" => "%{app_protocol_output}"
        }
      }

      if [source] != "" {
        mutate {
          rename => {
            "source" => "event.idm.read_only_udm.network.application_protocol"
          }
        }
      } else {
        drop {
          tag => "TAG_MALFORMED_MESSAGE"
        }
      }
    }

    # used in bro_json
    mutate {
      convert => {
        "received_bytes" => "uinteger"
      }
    }

    mutate {
      rename => {
        "received_bytes" => "event.idm.read_only_udm.network.received_bytes"
      }
      replace => {
        # FILE_UNCATEGORIZED fits better here, but udm2sdm check fails
        # if we have only ip in principal. We don't have anything except ip.
        "event.idm.read_only_udm.metadata.event_type" => "NETWORK_UNCATEGORIZED"
      }
      merge => {
        "event.idm.read_only_udm.principal.ip" => "id.orig_h"
        "event.idm.read_only_udm.target.ip" => "id.resp_h"
      }
    }

    if [fuid] not in ["", "-"] {
      mutate {
        rename => {
          "fuid" => "event.idm.read_only_udm.target.file.full_path"
        }
      }
    }

    if [mime_type] not in ["", "-"] {
      mutate {
        rename => {
          "mime_type" => "event.idm.read_only_udm.target.file.mime_type"
        }
      }
    }

    if [md5] not in ["", "-"] {
      mutate {
        rename => {
          "md5" => "event.idm.read_only_udm.target.file.md5"
        }
      }
    }

    if [sha1] not in ["", "-"] {
      mutate {
        rename => {
          "sha1" => "event.idm.read_only_udm.target.file.sha1"
        }
      }
    }

    if [file_size] not in ["", "-"] {
      mutate {
        convert => {
          "file_size" => "uinteger"
        }
      }
      mutate {
        rename => {
          "file_size" => "event.idm.read_only_udm.target.file.size"
        }
      }
    }

  } #End BRO_FILES

