# Product: Bro
# Category: Format Specific
# Supported Format: SYSLOG + TSV
# Reference: https://docs.zeek.org/en/current/script-reference/log-files.html
# Last Updated: 2024-05-16
# Copyright 2024 Chronicle LLC

# List of supported event types:
# bro_dns
# bro_conn
# bro_dhcp
# bro_http
# bro_smb_files
# bro_ntlm
# bro_kerberos
# bro_smb_mapping
# bro_radius
# bro_files
# bro_ssl

filter {
# Hack to create unique fields query for dns, conn_state for conn, lease_time for dhcp, tags for http, because they are unique to the log type
  mutate {
    replace => {
      "query" => ""
      "next_protocol" => ""
      "conn_state" => ""
      "local_orig" => "true"
      "tags" => ""
      "column2" => ""
      "dhcp_info" => ""
      "sha1" => ""
      "domain" => ""
      "port" => ""
      "bro_type" => ""
      "column8" => ""
      "prod_event" => ""
    }
    convert => {
      "local_orig" => "boolean"
    }
  }

  # remove syslog header
  grok {
    match => { "message" => [
        "<\\d+>%{SYSLOGTIMESTAMP} (\\S+) (?P<bro_type>\\S+): (?P<bro_tsv>.*)",
        "<%{INT}>%{TIMESTAMP_ISO8601} %{DATA} (?P<bro_type>%{DATA}): (?P<bro_tsv>.*)",
        "(?P<bro_tsv>.*)"
      ]
    }
    overwrite => ["bro_type"]
  }

  # Pull fields out of raw log.
  csv {
    source => "bro_tsv"
    separator => "\\t"
    unescape_separator => true
    on_error => "tsv_parsing_failed"
  }

  if [tsv_parsing_failed] {
    drop {
      tag => "TAG_MALFORMED_ENCODING"
    }
  }

  if [bro_type] == "" {
    if [column8] in ["POST","GET","CONNECT"] {
      mutate {
        replace => {
          "bro_type" => "bro_http"
        }
      }
    }
  }

  # Some logs are coming in as float and others as string for Date.  So converting everything to string so that "date" will match properly.
  grok {
    match => { "column1" => [
      "%{BASE10NUM:ts}"
      ]
    }
    overwrite => ["ts"]
    on_error => "date_parsing_failed"
  }

  if [date_parsing_failed] {
    drop {
      tag => "TAG_MALFORMED_MESSAGE"
    }
  }

  # Parse date.
  date {
    match => ["ts", "RFC3339", "UNIX", "ISO8601" ]
  }

  # Common mapping for the all event types
  if [bro_type] != "" {
    mutate {
      replace => {
        "event.idm.read_only_udm.metadata.product_event_type" => "%{bro_type}"
      }
    }
  }
  mutate {
    replace => {
      "event.idm.read_only_udm.metadata.event_type" => "GENERIC_EVENT"
    }
  }
  if [column2] != "" and [column8] != "AsymPayloadFlow" {
    mutate {
      rename => {
        "column2" => "uid"
      }
    }
  }
  #For DNS Events
  if [bro_type] == "bro_dns"  {
    if [column13] != "-" {
       mutate {
         rename => {
          "column13" => "qtype"
        }
      }
    }
    if [column11] != "-" {
       mutate {
         rename => {
          "column11" => "qclass"
        }
      }
    }
    mutate {
      replace => {
        "event.idm.read_only_udm.metadata.event_type" => "NETWORK_DNS"
        "event.idm.read_only_udm.network.application_protocol" => "DNS"
      }
      rename => {
        "column3" => "id.orig_h"
        "column4" => "id.orig_p"
        "column5" => "id.resp_h"
        "column6" => "id.resp_p"
        "column7" => "protocol"
        "column8" => "trans_id"
        "column9" => "rtt"
        "column10" => "q.name"
        "column15" => "rcode"
        "column22" => "a.data"
        "column23" => "ttl"
        "column24" => "qerror"
      }
    }

    mutate {
      merge => {
        "answer_list" => "a"
      }
    }
  }  #End DNS Events

  #For CONN Events
  else if [bro_type] == "bro_conn"  {
    mutate {
      rename => {
        "column3" => "id.orig_h"
        "column4" => "id.orig_p"
        "column5" => "id.resp_h"
        "column6" => "id.resp_p"
        "column7" => "proto"
        "column8" => "service_proto"
        "column10" => "id_orig_bytes"
        "column11" => "id_resp_bytes"
      }
      uppercase => ["proto", "service_proto"]
    }
  }  #End CONN Events

  #For DHCP Events
  else if [bro_type] == "bro_dhcp" {
    mutate {
     rename => {
       "column3" => "id.orig_h"
       "column4" => "id.resp_h"
       "column5" => "mac"
       "column6" => "hostname"
       "column10" => "assigned_ip"
       "column11" => "lease"
     }
    }
  } #End DHCP Events

  #For HTTP Events
  else if [bro_type] == "bro_http" {
    mutate {
     rename => {
       "column3" => "id.orig_h"
       "column4" => "id.orig_p"
       "column5" => "id.resp_h"
       "column6" => "id.resp_p"
       "column8" => "method"
       "column9" => "host"
       "column10" => "uri"
       "column11" => "referrer"
       "column13" => "user_agent"
       "column14" => "request_body_len"
       "column15" => "response_body_len"
       "column16" => "status_code"
     }
    }
  } #End HTTP Events

  else if [bro_type] == "bro_smb_files" {
    mutate {
      rename => {
        "column3" => "id.orig_h"
        "column4" => "id.orig_p"
        "column5" => "id.resp_h"
        "column6" => "id.resp_p"
        "column8" => "action"
        "column9" => "path"
        "column10" => "filename"
        "column11" => "size"
      }
    }
  } #End BRO_SMB_FILES

  else if [bro_type] == "bro_ntlm" {
    mutate {
      rename => {
        "column3" => "id.orig_h"
        "column4" => "id.orig_p"
        "column5" => "id.resp_h"
        "column6" => "id.resp_p"
        "column10" => "client_host"
        "column12" => "server_host"
      }
    }
  } #End BRO_NTLM

  else if [bro_type] == "bro_kerberos" {
    mutate {
      rename => {
        "column3" => "id.orig_h"
        "column4" => "id.orig_p"
        "column5" => "id.resp_h"
        "column6" => "id.resp_p"
        "column8" => "client_user"
        "column11" => "error"
      }
    }
  } #End BRO_KERBEROS

  else if [bro_type] == "bro_smb_mapping" {
    mutate {
      rename => {
        "column3" => "id.orig_h"
        "column4" => "id.orig_p"
        "column5" => "id.resp_h"
        "column6" => "id.resp_p"
        "column7" => "path"
        "column10" => "share_type"
      }
    }
  } #End BRO_SMB_MAPPING

  else if [bro_type] == "bro_radius" {
    mutate {
      rename => {
        "column3" => "id.orig_h"
        "column4" => "id.orig_p"
        "column5" => "id.resp_h"
        "column6" => "id.resp_p"
        "column7" => "username"
        "column13" => "result"
      }
    }
  } #End BRO_RADIUS

  else if [bro_type] == "bro_files" {
    mutate {
      rename => {
        "column3" => "id.orig_h"
        "column4" => "id.resp_h"
        "column6" => "source"
        "column9" => "mime_type"
        "column10" => "fuid"
        "column15" => "file_size"
        "column20" => "md5"
      }
    }
  } #End BRO_FILES

  else if [bro_type] == "bro_ssl" {
    mutate {
      rename => {
        "column3" => "id.orig_h"
        "column4" => "id.orig_p"
        "column5" => "id.resp_h"
        "column6" => "id.resp_p"
        "column7" => "version"
        "column8" => "cipher"
      }
    }
  } #End BRO_SSL
  else if [bro_type] == "" and [column8] == "AsymPayloadFlow" {
    mutate {
      replace => {
        "protocol" => ""
      }
    }
    mutate {
      replace => {
        "prod_event" => "%{column8}"
      }
      on_error => "prod_event_parsing_failed"
    }
    mutate {
      rename => {
        "column2" => "id.orig_h"
        "column3" => "id.resp_h"
        "column11" => "desc"
      }
    }
  }
  else if [bro_type] == "" {
    mutate {
      rename => {
        "column3" => "id.orig_h"
        "column5" => "id.resp_h"
        "column7" => "protocol"
        "column4" => "id.orig_p"
        "column6" => "id.resp_p"
        "column16" => "status"
      }
    }
  }
  else {
    drop {
      tag => "TAG_MALFORMED_MESSAGE"
    }
  }

  # Documentation: old.zeek.org/manual/2.5.5/script-reference/log-files.html
  
  # It's expected that the following field is set: bro_type
  
  # List of supported event types (value if bro_type field):
  
  # bro_dns
  # bro_conn
  # bro_dhcp
  # bro_http
  # bro_smb_files
  # bro_ntlm
  # bro_kerberos
  # bro_smb_mapping
  # bro_radius
  # bro_files
  # bro_ssl
  # bro_dce_rpc
  # bro_tunnel
  # bro_ssh
  if [bro_type] != "" {
    mutate {
      replace => {
        "event.idm.read_only_udm.metadata.product_event_type" => "%{bro_type}"
      }
    }
  }
  #For DNS Events
  if [bro_type] == "bro_dns"  {
    # Required fields:

    # id.orig_h
    # id.orig_p
    # id.resp_h
    # id.resp_p
    # protocol
    # trans_id
    # rtt
    # q.name
    # qclass
    # qtype
    # rcode
    # a.data
    # ttl

    mutate {
      replace => {
        "event.idm.read_only_udm.metadata.event_type" => "NETWORK_DNS"
        "event.idm.read_only_udm.network.application_protocol" => "DNS"
      }
    }

    mutate {
      convert => {
        "trans_id" => "uinteger"
        "id.orig_p" => "integer"
        "id.resp_p" => "integer"
        "qtype" => "uinteger"
        "qclass" => "uinteger"
      }
    }

    mutate {
      rename => {
        "trans_id" => "event.idm.read_only_udm.network.dns.id"
        "id.orig_p" => "event.idm.read_only_udm.principal.port"
        "id.resp_p" => "event.idm.read_only_udm.target.port"
        "qtype" => "q.type"
        "qclass" => "q.class"
        "qname" => "q.name"
        "answer_list" => "event.idm.read_only_udm.network.dns.answers"
      }
      merge => {
        "event.idm.read_only_udm.principal.ip" => "id.orig_h"
        "event.idm.read_only_udm.target.ip" => "id.resp_h"
        "event.idm.read_only_udm.network.dns.questions" => "q"
      }
    }

    if [rcode] != "-" {
      mutate {
        convert => {
          "rcode" => "uinteger"
        }
      }
      mutate {
        rename => {
          "rcode" => "event.idm.read_only_udm.network.dns.response_code"
        }
      }
    }
    if [qerror] == "query_not_present" {
      mutate {
        replace => {
          "event.idm.read_only_udm.metadata.event_type" => "NETWORK_UNCATEGORIZED"
        }
      }
    }
  }  #End DNS Events
  #For CONN Events
  else if [bro_type] == "bro_conn"  {
    # Required fields:

    # id.orig_h
    # id.orig_p
    # id.resp_h
    # id.resp_p
    # proto (uppercase)
    # service_proto (uppercase)
    # id_orig_bytes
    # id_resp_bytes

    mutate {
      convert => {
        "id.orig_p" => "integer"
        "id.resp_p" => "integer"
      }
    }
    mutate {
      replace => {
        "event.idm.read_only_udm.metadata.event_type" => "NETWORK_CONNECTION"
        "event.idm.read_only_udm.metadata.description" => "%{conn_state}"
        "event.idm.read_only_udm.network.ip_protocol" => "%{proto}"
      }
    }
    if [event][idm][read_only_udm][metadata][description] == "S0"{
      mutate{
        replace => {"event.idm.read_only_udm.metadata.description" => "S0 - Connection attempt seen, no reply"}
      }
    } else if [event][idm][read_only_udm][metadata][description] == "S1"{
        mutate {
          replace => {"event.idm.read_only_udm.metadata.description" => "S1 Connection established, not terminated"}
        }
      } else if [event][idm][read_only_udm][metadata][description] == "SF"{
        mutate {
          replace => {"event.idm.read_only_udm.metadata.description" => "SF - Normal establish & termination"}
        }
      } else if [event][idm][read_only_udm][metadata][description] == "REJ"{
        mutate {
          replace => {"event.idm.read_only_udm.metadata.description" => "REJ - Connection attempt rejected"}
        }
      } else if [event][idm][read_only_udm][metadata][description] == "S2"{
        mutate {
          replace => {"event.idm.read_only_udm.metadata.description" => "S2 - Established, ORIG attempts close, no reply from RESP"}
        }
      } else if [event][idm][read_only_udm][metadata][description] == "S3"{
        mutate {
          replace => {"event.idm.read_only_udm.metadata.description" => "S3 - Established, RESP attempts close, no reply from ORIG"}
        }
      } else if [event][idm][read_only_udm][metadata][description] == "RSTO"{
        mutate {
          replace => {"event.idm.read_only_udm.metadata.description" => "RSTO - Established, RESP aborted"}
        }
      }  else if [event][idm][read_only_udm][metadata][description] == "RSTRH"{
        mutate {
          replace => {"event.idm.read_only_udm.metadata.description" => "RSTRH - RESP sent SYN-ACK then RST; no ORIG SYN"}
        }
      } else if [event][idm][read_only_udm][metadata][description] == "SH"{
        mutate{
          replace => {"event.idm.read_only_udm.metadata.description" => "SH - ORIG sent SYN then FIN; no RESP SYN-ACK (“half-open”)"}
        }
      } else if [event][idm][read_only_udm][metadata][description] == "SHR"{
        mutate{
          replace => {"event.idm.read_only_udm.metadata.description" => "SHR - RESP sent SYN-ACK then FIN; no ORIG SYN"}
        }
      } else if [event][idm][read_only_udm][metadata][description] == "OTH"{
        mutate{
          replace => {"event.idm.read_only_udm.metadata.description" => "OTH - No SYN, not closed. Midstream traffic. Partial connection."}
        }
      }

    if [service_proto] not in ["", "-"] {
      mutate {
        replace => {
          "app_protocol_src" => "%{service_proto}"
        }
      }

      # This file contains application protocol parsing logic

# Interface:
# app_protocol_src (required): string that contains application protocol or a
#                              port number
# app_protocol_output: string that is either empty or contains application
#                      protocol compatible to ApplicationProtocol enum in
#                      udm.proto

mutate {
  uppercase => [ "app_protocol_src" ]
}

if [app_protocol_src] in [ "22", "SSH", "SSHD" ] {
  mutate {
    replace => {
      "app_protocol_output" => "SSH"
    }
  }
}
else if [app_protocol_src] in [ "25", "SMTP" ] {
  mutate {
    replace => {
      "app_protocol_output" => "SMTP"
    }
  }
}
else if [app_protocol_src] in [ "53", "DNS" ] {
  mutate {
    replace => {
      "app_protocol_output" => "DNS"
    }
  }
}
else if [app_protocol_src] in [ "80", "8080", "HTTP" ] {
  mutate {
    replace => {
      "app_protocol_output" => "HTTP"
    }
  }
}
else if [app_protocol_src] in [ "443", "HTTPS", "TLS" ] {
  mutate {
    replace => {
      "app_protocol_output" => "HTTPS"
    }
  }
}
else if [app_protocol_src] in [ "7400", "7401", "7402", "DDS" ] {
  mutate {
    replace => {
      "app_protocol_output" => "DDS"
    }
  }
}
else if [app_protocol_src] in [ "SMB", "SMBV1" ] {
  mutate {
    replace => {
      "app_protocol_output" => "SMB"
    }
  }
}
else if [app_protocol_src] in [
  "UNKNOWN_APPLICATION_PROTOCOL", "AFP", "APPC", "AMQP", "ATOM", "BEEP",
  "BITCOIN", "BIT_TORRENT", "CFDP", "COAP", "DEVICE_NET", "DHCP", "E_DONKEY",
  "ENRP", "FAST_TRACK", "FINGER", "FREENET", "FTAM", "GOPHER", "HL7", "H323",
  "IRCP", "KADEMLIA", "LDAP", "LPD", "MIME", "MODBUS", "MQTT", "NETCONF",
  "NFS", "NIS", "NNTP", "NTCIP", "NTP", "OSCAR", "PNRP", "QUIC", "RDP", "RELP",
  "RIP", "RLOGIN", "RPC", "RTMP", "RTP", "RTPS", "RTSP", "SAP", "SDP", "SIP",
  "SLP", "SNTP", "SSMS", "STYX", "TCAP", "TDS", "TOR", "TSP", "VTP", "WHOIS",
  "WEB_DAV", "X400", "X500", "XMPP", "IEC104", "DCERPC"
] {
  mutate {
    replace => {
      "app_protocol_output" => "%{app_protocol_src}"
    }
  }

} else {
  mutate {
    replace => {
      "app_protocol_output" => ""
    }
  }
}


      mutate {
        replace => {
          "service_proto" => "%{app_protocol_output}"
        }
      }

      if [service_proto] != "" {
        mutate {
          rename => {
            "service_proto" => "event.idm.read_only_udm.network.application_protocol"
          }
        }
      }
    }

    if [local_orig] {
      mutate {
       rename => {
          "id.orig_p" => "event.idm.read_only_udm.principal.port"
          "id.resp_p" => "event.idm.read_only_udm.target.port"
        }
        merge => {
          "event.idm.read_only_udm.principal.ip" => "id.orig_h"
          "event.idm.read_only_udm.target.ip" => "id.resp_h"
        }
      }
    } else {
      mutate {
       rename => {
          "id.orig_p" => "event.idm.read_only_udm.target.port"
          "id.resp_p" => "event.idm.read_only_udm.principal.port"
        }
        merge => {
          "event.idm.read_only_udm.target.ip" => "id.orig_h"
          "event.idm.read_only_udm.principal.ip" => "id.resp_h"
        }
      }
    }

    if [id_resp_bytes] != "-" and [id_resp_bytes] != "-" {
      mutate {
        convert => {
          "id_resp_bytes" => "uinteger"
          "id_orig_bytes" => "uinteger"
        }
      }
      mutate {
        rename => {
          "id_orig_bytes" => "event.idm.read_only_udm.network.sent_bytes"
          "id_resp_bytes" => "event.idm.read_only_udm.network.received_bytes"
        }
      }
    }

  }  #End CONN Events

  #For DHCP Events
  else if [bro_type] == "bro_dhcp" {
    # Required fields:

    # id.orig_h
    # id.resp_h
    # mac
    # hostname
    # assigned_ip
    # lease

    # For DHCP events assigned_ip, hostname and lease can't all be empty.
    if [assigned_ip] == "-" or [assigned_ip] == "" and [hostname] == "" and [lease] == "" {
      drop{
        tag => "TAG_MALFORMED_MESSAGE"
      }
    }

    # Avoid error converting from UDM to SDM event without yiaddrs field
    if [assigned_ip] == "" and [dhcp_info] != "" {
      if  [dhcp_info] =~ "ACK" {
        drop{
          tag => "TAG_MALFORMED_MESSAGE"
        }
      }
    }

    grok {
      match => { "lease" => [ "(?P<lease_time>\\d*)(?:\\.\\d+)?" ] }
      on_error => "lease_is_not_string"
    }

   if [lease] != "" {
      mutate {
        convert => {
          "lease_time" => "uinteger"
        }
      }
    }

    mutate {
      rename => {
        "assigned_ip" => "event.idm.read_only_udm.network.dhcp.yiaddr"
        "lease_time" => "event.idm.read_only_udm.network.dhcp.lease_time_seconds"
        "hostname" => "event.idm.read_only_udm.network.dhcp.client_hostname"
      }
      replace => {
        "event.idm.read_only_udm.metadata.event_type" => "NETWORK_DHCP"
        "event.idm.read_only_udm.network.application_protocol" => "DHCP"
      }
      merge => {
        "event.idm.read_only_udm.principal.ip" => "id.orig_h"
        "event.idm.read_only_udm.principal.mac" => "mac"
      }
    }

    if [domain] != "" {
      mutate {
        replace => {
          "event.idm.read_only_udm.principal.administrative_domain" => "%{domain}"
        }
      }
    }

    if [id][resp_h] != "" {
      mutate {
        merge => {
          "event.idm.read_only_udm.target.ip" => "id.resp_h"
        }
      }
    }

    if [dhcp_info] != "" {

      if  [dhcp_info] =~ "ACK" {
        mutate {
          replace => {
            "event.idm.read_only_udm.network.dhcp.type" => "ACK"
          }
        }
      } else if [dhcp_info] =~ "RELEASE" {
        mutate {
          replace => {
            "event.idm.read_only_udm.network.dhcp.type" => "RELEASE"
          }

          rename => {
            "client_ip" => "event.idm.read_only_udm.network.dhcp.ciaddr"
          }
        }
      } else if  [dhcp_info] =~ "INFORM" {
        mutate {
          replace => {
            "event.idm.read_only_udm.network.dhcp.type" => "INFORM"
          }
        }
      } else if  [dhcp_info] =~ "DISCOVER" {
        mutate {
          replace => {
            "event.idm.read_only_udm.network.dhcp.type" => "DISCOVER"
          }
        }
      } else if  [dhcp_info] =~ "OFFER" {
        mutate {
          replace => {
            "event.idm.read_only_udm.network.dhcp.type" => "OFFER"
          }
        }
      } else if  [dhcp_info] =~ "REQUEST" {
        mutate {
          replace => {
            "event.idm.read_only_udm.network.dhcp.type" => "REQUEST"
          }
        }
      }
    }
