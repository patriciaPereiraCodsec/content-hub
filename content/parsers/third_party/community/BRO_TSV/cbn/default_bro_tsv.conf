    # rtt
    # named_pipe
    # operation

    mutate {
      rename => {
        "uid" => "event.idm.read_only_udm.network.session_id"
        "id.orig_p" => "event.idm.read_only_udm.principal.port"
        "id.resp_p" => "event.idm.read_only_udm.target.port"
        "named_pipe" => "event.idm.read_only_udm.target.resource.name"
      }
      replace => {
        "event.idm.read_only_udm.metadata.product_name" => "Bro"
        "event.idm.read_only_udm.metadata.vendor_name" => "Zeek"
        "event.idm.read_only_udm.metadata.event_type" => "NETWORK_CONNECTION"
        "event.idm.read_only_udm.metadata.description" => "DCE_RPC"
        "event.idm.read_only_udm.target.resource.type" => "PIPE"
        "event.idm.read_only_udm.network.application_protocol" => "RPC"
      }
      merge => {
        "event.idm.read_only_udm.principal.ip" => "id.orig_h"
        "event.idm.read_only_udm.target.ip" => "id.resp_h"
      }
    }

    # if RTT was not provided, its related event properties cannot be populated.
    if [rtt] != "" {
      mutate {
        convert => {
          "rtt" => "string"
        }
        on_error => "rtt_string_conversion_failed"
      }

      if ![rtt_string_conversion_failed] {
        mutate {
          replace => {
            "additional_rtt.key" => "round_trip_time"
            "additional_rtt.value.string_value" => "%{rtt}"
          }
        }

        mutate {
          merge => {
            "event.idm.read_only_udm.additional.fields" => "additional_rtt"
          }
        }
      }
    }

    mutate {
      replace => {
        "additional_op.key" => "operation"
        "additional_op.value.string_value" => "%{operation}"
      }
    }

    mutate {
      merge => {
        "event.idm.read_only_udm.additional.fields" => "additional_op"
      }
    }

    mutate {
      convert => {
        "event.idm.read_only_udm.principal.port" => "integer"
        "event.idm.read_only_udm.target.port" => "integer"
      }
    }
  } #End BRO_DCE_RPC
  else if [bro_type] == "bro_tunnel" {
    # Required fields:

    # uid
    # id.orig_h
    # id.orig_p
    # id.resp_h
    # id.resp_p
    # tunnel_type
    # action

    mutate {
      rename => {
        "uid" => "event.idm.read_only_udm.network.session_id"
        "id.orig_p" => "event.idm.read_only_udm.principal.port"
        "id.resp_p" => "event.idm.read_only_udm.target.port"
      }
      replace => {
        "event.idm.read_only_udm.metadata.product_name" => "Bro"
        "event.idm.read_only_udm.metadata.vendor_name" => "Zeek"
        "event.idm.read_only_udm.metadata.event_type" => "NETWORK_CONNECTION"
        "event.idm.read_only_udm.metadata.description" => "Tunnel"
      }
      merge => {
        "event.idm.read_only_udm.principal.ip" => "id.orig_h"
        "event.idm.read_only_udm.target.ip" => "id.resp_h"
      }
    }

    mutate {
      replace => {
        "additional_tt.key" => "tunnel_type"
        "additional_tt.value.string_value" => "%{tunnel_type}"
        "additional_action.key" => "action"
        "additional_action.value.string_value" => "%{action}"
      }
    }

    mutate {
      merge => {
        "event.idm.read_only_udm.additional.fields" => "additional_tt"
      }
    }

    mutate {
      merge => {
        "event.idm.read_only_udm.additional.fields" => "additional_action"
      }
    }

    mutate {
      convert => {
        "event.idm.read_only_udm.principal.port" => "integer"
        "event.idm.read_only_udm.target.port" => "integer"
      }
    }
  } #End BRO_TUNNEL


  else if [bro_type] == "bro_mysql" {
    # Required fields:

    # uid
    # id.orig_h
    # id.orig_p
    # id.resp_h
    # id.resp_p
    # cmd
    # arg
    # success
    # rows

    mutate {
      rename => {
        "uid" => "event.idm.read_only_udm.network.session_id"
        "id.orig_p" => "event.idm.read_only_udm.principal.port"
        "id.resp_p" => "event.idm.read_only_udm.target.port"
      }
      replace => {
        "event.idm.read_only_udm.metadata.event_type" => "NETWORK_CONNECTION"
        "event.idm.read_only_udm.metadata.description" => "MYSQL"
      }
      merge => {
        "event.idm.read_only_udm.principal.ip" => "id.orig_h"
        "event.idm.read_only_udm.target.ip" => "id.resp_h"
      }
    }

    mutate {
      convert => {
        "rows" => "string"
      }
    }

    mutate {
      replace => {
        "additional_cmd.key" => "command type"
        "additional_cmd.value.string_value" => "%{cmd}"
        "additional_arg.key" => "command arguments"
        "additional_arg.value.string_value" => "%{arg}"
        "additional_rows.key" => "result rows"
        "additional_rows.value.string_value" => "%{rows}"
      }
    }

    mutate {
      merge => {
        "event.idm.read_only_udm.additional.fields" => "additional_cmd"
      }
    }

    mutate {
      merge => {
        "event.idm.read_only_udm.additional.fields" => "additional_arg"
      }
    }

    mutate {
      merge => {
        "event.idm.read_only_udm.additional.fields" => "additional_rows"
      }
    }

    mutate {
      convert => {
        "event.idm.read_only_udm.principal.port" => "integer"
        "event.idm.read_only_udm.target.port" => "integer"
      }
    }
  }
  else if [bro_type] == "bro_ssh" {
    # uid
    # id.orig_h
    # id.orig_p
    # id.resp_h
    # id.resp_p
    # direction
    # auth_success
    # auth_attempts
    # client
    # server
    # cipher_alg
    # mac_alg
    # compression_alg
    # kex_alg
    # host_key_alg
    # host_key
    if [bro_message][direction] != "" {
      mutate {
        replace => {
          "event.idm.read_only_udm.network.direction" => "%{bro_message.direction}"
        }
      }
    }
    if [bro_message][client] != "" {
      mutate {
        replace => {
          "event.idm.read_only_udm.network.tls.client.certificate.version" => "%{bro_message.client}"
        }
      }
    }
    if [bro_message][server] != "" {
      mutate {
        replace => {
          "event.idm.read_only_udm.network.tls.server.certificate.version" => "%{bro_message.server}"
        }
      }
    }
    if [bro_message][host_key] != "" {
      mutate {
        replace => {
          "host_key.key" => "Host Key"
          "host_key.value" => "%{bro_message.host_key}"
        }
      }
      mutate {
        merge => {
          "event.idm.read_only_udm.target.labels" => "host_key"
        }
      }
    }
    if [bro_message][host_key_alg] != "" {
      mutate {
        replace => {
          "host_key_alg.key" => "Host Key Alg"
          "host_key_alg.value" => "%{bro_message.host_key_alg}"
        }
      }
      mutate {
        merge => {
          "event.idm.read_only_udm.target.labels" => "host_key_alg"
        }
      }
    }
    if [bro_message][kex_alg] != "" {
      mutate {
        replace => {
          "kex_alg.key" => "Kex Alg"
          "kex_alg.value" => "%{bro_message.kex_alg}"
        }
      }
      mutate {
        merge => {
          "event.idm.read_only_udm.target.labels" => "kex_alg"
        }
      }
    }
    if [bro_message][mac_alg] != "" {
      mutate {
        replace => {
          "mac_alg.key" => "Mac Alg"
          "mac_alg.value" => "%{bro_message.mac_alg}"
        }
      }
      mutate {
        merge => {
          "event.idm.read_only_udm.target.labels" => "mac_alg"
        }
      }
    }
    if [bro_message][compression_alg] != "" {
      mutate {
        replace => {
          "compression_alg.key" => "Compression Alg"
          "compression_alg.value" => "%{bro_message.compression_alg}"
        }
      }
      mutate {
        merge => {
          "event.idm.read_only_udm.target.labels" => "compression_alg"
        }
      }
    }
    if [bro_message][cipher_alg] != "" {
      mutate {
        replace => {
          "cipher_alg.key" => "Cipher Alg"
          "cipher_alg.value" => "%{bro_message.cipher_alg}"
        }
      }
      mutate {
        merge => {
          "event.idm.read_only_udm.target.labels" => "cipher_alg"
        }
      }
    }
    if [bro_message][auth_attempts] != "" {
      mutate {
        replace => {
          "auth_attempts.key" => "Auth Attempts"
          "auth_attempts.value" => "%{bro_message.auth_attempts}"
        }
      }
      mutate {
        merge => {
          "event.idm.read_only_udm.target.labels" => "auth_attempts"
        }
      }
    }
    if [bro_message][auth_success] != "" {
      if [bro_message][auth_success] == "T" {
        mutate {
          replace => {
            "security_action" => "ALLOW"
          }
        }
      }
      else if [bro_message][auth_success] == "F"{
        mutate {
          replace => {
            "security_action" => "BLOCK"
          }
        }
      }
      else {
        mutate {
          replace => {
            "security_action" => "UNKNOWN_ACTION"
          }
        }
      }
      mutate {
        merge => {
          "security_result.action" => "security_action"
        }
      }

      mutate {
        merge => {
          "event.idm.read_only_udm.security_result" => "security_result"
        }
      }
    }
    mutate {
      rename => {
        "uid" => "event.idm.read_only_udm.network.session_id"
        "id.orig_p" => "event.idm.read_only_udm.principal.port"
        "id.resp_p" => "event.idm.read_only_udm.target.port"
      }
   }
   mutate {
      convert => {
        "event.idm.read_only_udm.principal.port" => "integer"
        "event.idm.read_only_udm.target.port" => "integer"
      }
   }
   mutate {
      replace => {
        "event.idm.read_only_udm.metadata.event_type" => "NETWORK_CONNECTION"
      }
   }
   mutate {
      merge => {
        "event.idm.read_only_udm.principal.ip" => "id.orig_h"
        "event.idm.read_only_udm.target.ip" => "id.resp_h"
      }
    }
  }
  else if [bro_type] == "" and [protocol] == "udp"{
    mutate {
      merge => {
        "event.idm.read_only_udm.principal.ip" => "id.orig_h"
        "event.idm.read_only_udm.target.ip" => "id.resp_h"
      }
    }
    mutate {
      replace => {
        "event.idm.read_only_udm.network.ip_protocol" => "UDP"
        "event.idm.read_only_udm.metadata.event_type" => "NETWORK_CONNECTION"
      }
   }
   mutate {
      convert => {
        "id.orig_p" => "integer"
        "id.resp_p" => "integer"
      }
    }
    mutate {
      rename => {
        "id.resp_p" => "event.idm.read_only_udm.target.port"
        "id.orig_p" => "event.idm.read_only_udm.principal.port"
      }
    }
  }
  else if [bro_type] == "" and [prod_event] == "AsymPayloadFlow" {
    if [desc] != "" {
      mutate {
        replace => {
          "event.idm.read_only_udm.metadata.description" => "%{desc}"
        }
        on_error => "no_desc"
      }
    }
    if [prod_event] != "" {
      mutate {
        replace => {
          "event.idm.read_only_udm.metadata.product_event_type" => "%{prod_event}"
        }
        on_error => "no_prod_event"
      }
    }
    mutate {
      merge => {
        "event.idm.read_only_udm.principal.ip" => "id.orig_h"
      }
      on_error => "no_src_ip"
    }
    mutate {
      merge => {
        "event.idm.read_only_udm.target.ip" => "id.resp_h"
      }
      on_error => "no_target_ip"
    }
    if ![no_src_ip] and ![no_target_ip] {
      mutate {
        replace => {
          "event.idm.read_only_udm.metadata.event_type" => "NETWORK_CONNECTION"
        }
      }
    }
    else {
      mutate {
        replace => {
          "event.idm.read_only_udm.metadata.event_type" => "GENERIC_EVENT"
        }
      }
    }
  }
  else if [bro_type] == "" and [protocol] != "" {
    mutate {
      merge => {
        "event.idm.read_only_udm.principal.ip" => "id.orig_h"
      }
      on_error => "no_src_ip"
    }
    mutate {
      merge => {
        "event.idm.read_only_udm.target.ip" => "id.resp_h"
      }
      on_error => "no_target_ip"
    }
    if [protocol] == "tcp" {
      mutate {
        replace => {
          "event.idm.read_only_udm.network.ip_protocol" => "TCP"
        }
        on_error => "no_protocol"
      }
    }
    if ![no_src_ip] and ![no_target_ip] {
      mutate {
        replace => {
          "event.idm.read_only_udm.metadata.event_type" => "NETWORK_CONNECTION"
        }
      }
    }
    else {
      mutate {
        replace => {
          "event.idm.read_only_udm.metadata.event_type" => "GENERIC_EVENT"
        }
      }
    }
    mutate {
      convert => {
        "id.orig_p" => "integer"
        "id.resp_p" => "integer"
      }
      on_error => "conversion_error"
    }
    mutate {
      rename => {
        "id.resp_p" => "event.idm.read_only_udm.target.port"
        "id.orig_p" => "event.idm.read_only_udm.principal.port"
      }
    }
  }
  mutate {
    rename => {
      "uid" => "event.idm.read_only_udm.metadata.product_log_id"
    }
    on_error => "_no_uid"
  }
  if [_no_uid]  {
    mutate {
      rename => {
        "id" => "event.idm.read_only_udm.metadata.product_log_id"
      }
      on_error => "_no_id"
    }
  }
  mutate {
    merge => {
      "@output" => "event"
    }
  }
}
