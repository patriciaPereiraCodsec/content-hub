        "event.idm.read_only_udm.metadata.product_name" => "Bro"
      }
    }

    kv {
      source => "certificate.subject"
      field_split => ","
    }

    mutate {
      rename => {
        "certificate.subject" => "event.idm.read_only_udm.network.tls.server.certificate.subject"
        "certificate.version" => "event.idm.read_only_udm.network.tls.server.certificate.version"
        "certificate.serial" => "event.idm.read_only_udm.network.tls.server.certificate.serial"
        "certificate.issuer" => "event.idm.read_only_udm.network.tls.server.certificate.issuer"
        #Assigning _system_name to principal to avoid udm2sdm conversion failure
        "_system_name" => "event.idm.read_only_udm.principal.hostname"
        "CN" => "event.idm.read_only_udm.target.hostname"
        "id" => "event.idm.read_only_udm.metadata.product_log_id"
      }
    }

    # set host name to no _sustem_name value found
    grok {
      match => { "message" => ["<\\d+>\\s+(?P<_HostName>.*?)\\s+\\{.*\\}"]}
      on_error => "_no_hostname"
    }

    if ![_no_hostname] and [message] !~ "_system_name" {
      mutate {
        rename => {
          "_HostName" => "event.idm.read_only_udm.principal.hostname"
        }
      }
    }

    date {
      match => ["certificate.not_valid_before", "RFC3339", "ISO8601","yyyy-MM-ddTHH:mm:ss.SZ"]
      target => "event.idm.read_only_udm.network.tls.server.certificate.not_before"
    }

    date {
      match => ["certificate.not_valid_after", "RFC3339", "ISO8601","yyyy-MM-ddTHH:mm:ss.SZ"]
      target => "event.idm.read_only_udm.network.tls.server.certificate.not_after"
    }
  } #End BRO_X509
