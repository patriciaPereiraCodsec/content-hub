  #For HTTP Events
  else if [bro_type] == "bro_http" {
    # Required fields:

    # id.orig_h
    # id.orig_p
    # id.resp_h
    # id.resp_p
    # method
    # host
    # uri
    # referrer
    # user_agent
    # request_body_len
    # response_body_len
    # status_code

    if [host] != "-" && [uri] != "-" {
      grok {
        match => {
          "uri" => [ "%{HOSTNAME:uri}:%{INT:port}"]
        }
        on_error => "no_domain_exists"
        overwrite => ["uri", "port"]
      }

      if [no_domain_exists] {
        mutate {
          replace => {
            "url" => "%{host}%{uri}"
          }
        }
      }
      else {
        if [uri] != "" {
          mutate {
            replace => {
              "event.idm.read_only_udm.target.administrative_domain" => "%{uri}"
            }
          }
        }
      }

      if [port] != "" {
        mutate {
          replace => {
            "id.resp_p" => "%{port}"
          }
        }
      }
    }

    mutate {
      convert => {
        "id.orig_p" => "integer"
        "id.resp_p" => "integer"
      }
    }

    if [status_code] != "" and [status_code] != "-" {
      mutate {
        convert => {
          "status_code" => "integer"
        }
      }

      mutate {
        rename => {
          "status_code" => "event.idm.read_only_udm.network.http.response_code"
        }
      }
    }

    grok {
      match => {
        "host" => "%{DATA:host}:%{INT:port_number}"
      }
      overwrite => ["host"]
      on_error => "host_grok_failed"
    }

    if [host] != "" and [host] != "-" {
      mutate {
        rename => {
          "host" => "event.idm.read_only_udm.target.hostname"
        }
      }
    }

    mutate {
      rename => {
        "id.orig_p" => "event.idm.read_only_udm.principal.port"
        "id.resp_p" => "event.idm.read_only_udm.target.port"
        "url" => "event.idm.read_only_udm.target.url"
        "method" => "event.idm.read_only_udm.network.http.method"
        "referrer" => "event.idm.read_only_udm.network.http.referral_url"
        "user_agent" => "event.idm.read_only_udm.network.http.user_agent"
      }
      replace => {
        "event.idm.read_only_udm.metadata.event_type" => "NETWORK_HTTP"
        "event.idm.read_only_udm.network.application_protocol" => "HTTP"
      }
      merge => {
        "event.idm.read_only_udm.principal.ip" => "id.orig_h"
        "event.idm.read_only_udm.target.ip" => "id.resp_h"
      }
    }
  } #End HTTP Events

