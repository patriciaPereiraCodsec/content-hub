# Product: BMC_Client_Management
# Category: Security
# Supported Format: SYSLOG
# Reference: N/A
# Last Updated: 2024-11-21
# Copyright 2024 Chronicle LLC

filter {
  mutate {
    replace => {
      "pid" => ""
      "timestamp" => ""
      "msg" => ""
      "prin_host" => ""
      "prin_ip" => ""
      "prin_port" => ""
      "req_method" => ""
      "url_data" => ""
      "method" => ""
      "status_code" => ""
      "useragent" => ""
      "reading" => ""
      "processing" => ""
      "writing" => ""
      "principal" => ""
      "target" => ""
      "network" => ""
      "metadata" => ""
      "additional" => ""
      "has_principal_user" => "false"
      "has_target_user" => "false"
      "has_principal" => "false"
      "has_target" => "false"
    }
  }

  mutate {
    replace => {
      "metadata.product_name" => "BMC_CLIENT_MANAGEMENT"
      "metadata.vendor_name" => "BMC_CLIENT_MANAGEMENT"
    }
  }

  mutate {
    gsub => ["message", "Role val", "Role_val"]
  }
  mutate {
    gsub => ["message", "acls are on", "acls_are_on"]
  }
  if [message] =~ "Role" {
    mutate {
      gsub => ["message", "\\n\\#", "#"]
    }
    mutate {
      gsub => ["message", " = ", "="]
    }
  }
  else {
    mutate {
      gsub => ["message", "\\n\\#", " "]
    }
    mutate {
      gsub => ["message", "\\#", ""]
    }
  }

  grok {
    match => {
      "message" => [
        "\\[(?P<timestamp>%{MONTHDAY}/%{MONTH}/%{YEAR}:%{TIME}) %{DATA:timezone}\\].*getType\\(\\)=%{DATA:get_type}; getTitle\\(\\)=%{DATA:title}; getUrl\\(\\)=(?P<geturl>http:\\/\\/%{DATA:prin_host}:%{INT:prin_port}.*); getState\\(\\)=%{WORD:method}; getSecState\\(\\)=.*"
        "\\[(?P<timestamp>%{MONTHDAY}/%{MONTH}/%{YEAR}:%{TIME}) %{DATA:timezone}\\].*currentHost=%{DATA:prin_host}:%{INT:prin_port}#.*"
        "\\[(?P<timestamp>%{MONTHDAY}/%{MONTH}/%{YEAR}:%{TIME}) %{DATA:timezone}\\].*currentHost = %{DATA:prin_host}:%{INT:prin_port} .*"
        "\\[(?P<timestamp>%{MONTHDAY}/%{MONTH}/%{YEAR}:%{TIME}) %{DATA:timezone}\\].* Host from the url: %{DATA:prin_host} .*"
        "\\[(?P<timestamp>%{MONTHDAY}/%{MONTH}/%{YEAR}:%{TIME}) %{DATA:timezone}\\].* host %{DATA:prin_host}:%{INT:prin_port},.*"
        "\\[(?P<timestamp>%{MONTHDAY}/%{MONTH}/%{YEAR}:%{TIME}) %{DATA:timezone}\\] %{DATA:prin_host}: %{DATA}: target = Target: .*"
        "\\[(?P<timestamp>%{MONTHDAY}/%{MONTH}/%{YEAR}:%{TIME}) %{DATA:timezone}\\] %{DATA:prin_host} audit - - %{INT}: %{GREEDYDATA:msg}"
        "%{IP:prin_ip} - - \\[(?P<timestamp>%{MONTHDAY}/%{MONTH}/%{YEAR}:%{TIME}) %{DATA:timezone}\\] \\\"(?P<req_method>GET) %{DATA:url_data}\\\" %{INT:status_code} %{INT} %{INT} %{INT} %{INT}\\s+\\\"%{DATA:useragent}\\\"",
        "\\[(?P<timestamp>%{MONTHDAY}/%{MONTH}/%{YEAR}:%{TIME}) %{DATA:timezone}\\] %{DATA} %{DATA} %{DATA:prin_host} %{INT:pid} .* statistics: %{DATA:url_data} reading: %{DATA:reading}, processing: %{DATA:processing}, writing: %{GREEDYDATA:writing}",
        "\\[(?P<timestamp>%{MONTHDAY}/%{MONTH}/%{YEAR}:%{TIME}) %{DATA:timezone}\\] \\\"%{DATA}\\\" (?P<severity>info) %{DATA:prin_host} %{INT:pid} %{DATA}: %{GREEDYDATA:msg}",
        "\\[(?P<timestamp>%{MONTHDAY}/%{MONTH}/%{YEAR}:%{TIME}) %{DATA:timezone}\\] %{DATA} %{DATA} %{DATA:prin_host} %{INT:pid} %{GREEDYDATA:msg}",
        "\\[(?P<timestamp>%{MONTHDAY}/%{MONTH}/%{YEAR}:%{TIME}) %{DATA:timezone}\\] %{DATA} %{DATA}: %{GREEDYDATA:msg}"
        "%{GREEDYDATA:msg}"
      ]
    }
    overwrite => ["prin_host", "prin_port", "timestamp", "pid", "msg", "req_method", "url_data", "status_code", "useragent", "prin_ip", "reading", "processing", "writing", "method"]
    on_error => "grok_failure"
  }

  if [grok_failure] {
    drop {
      tag => "TAG_MALFORMED_MESSAGE"
    }
  }

  if [prin_ip] != "" {
    mutate {
      merge => {
        "principal.ip" => "prin_ip"
        "principal.asset.ip" => "prin_ip"
      }
      on_error => "prin_ip_empty"
    }
    mutate {
      replace => {
        "has_principal" => "true"
      }
    }
  }

  if [prin_port] != "" {
    mutate {
      replace => {
        "principal.port" => "%{prin_port}"
      }
      on_error => "prin_port_empty"
    }
    mutate {
      convert => {
        "principal.port" => "integer"
      }
      on_error => "prin_port_conversion_failure"
    }
  }

  if [status_code] not in ["","-"] {
    mutate {
      replace => {
        "network.http.response_code" => "%{status_code}"
      }
      on_error => "invalid_status_code"
    }
    if not [invalid_status_code] {
      mutate {
        convert => {
          "network.http.response_code" => "integer"
        }
        on_error => "conversion_failure"
      }
    }
  }

  if [req_method] != "" {
    mutate {
      replace => {
        "network.http.method" => "%{req_method}"
      }
      on_error => "req_method_empty"
    }
  }

  if [useragent] != "" {
    mutate {
      replace => {
        "network.http.user_agent" => "%{useragent}"
      }
      on_error => "useragent_empty"
    }
    mutate {
      replace => {
        "network.http.parsed_user_agent" => "%{useragent}"
      }
      on_error => "no_useragent"
    }
    mutate {
      convert => {
        "network.http.parsed_user_agent" => "parseduseragent"
      }
      on_error => "parseduseragent_conversion_failure"
    }
  }

  if [url_data] != "" {
    mutate {
      replace => {
        "principal.url" => "%{url_data}"
      }
      on_error => "url_data_empty"
    }
  }

  if [timestamp] != "" {
    date {
      match => ["timestamp", "dd/MMM/yyyy:HH:mm:ss"]
      on_error => "timestamp_failure"
    }
  }

  if [prin_host] != "" and [prin_host] =~ "^(.){1,253}$"  {
    mutate {
      replace => {
        "principal.hostname" => "%{prin_host}"
        "principal.asset.hostname" => "%{prin_host}"
        "has_principal" => "true"
      }
      on_error => "prin_host_empty"
    }
  }

  if [msg] != "" {
    mutate {
      replace => {
        "metadata.description" => "%{msg}"
      }
      on_error => "msg_empty"
    }
  }

  if [pid] != "" {
    mutate {
      replace => {
        "principal.process.pid" => "%{pid}"
      }
      on_error => "no_process_id"
    }
  }

  if [reading] != "" {
    mutate {
      replace => {
        "reading_label.value.string_value" => "%{reading}"
      }
      on_error => "reading_empty"
    }
    if ![reading_empty] {
      mutate {
        replace => {
          "reading_label.key" => "reading"
        }
      }
      mutate {
        merge => {
          "additional.fields" => "reading_label"
        }
        on_error => "reading_label_empty"
      }
    }
  }

  if [processing] != "" {
    mutate {
      replace => {
        "processing_label.value.string_value" => "%{processing}"
      }
      on_error => "processing_empty"
    }
    if ![processing_empty] {
      mutate {
        replace => {
          "processing_label.key" => "processing"
        }
      }
      mutate {
        merge => {
          "additional.fields" => "processing_label"
        }
        on_error => "processing_label_empty"
      }
    }
  }

  if [writing] != "" {
    mutate {
      replace => {
        "writing_label.value.string_value" => "%{writing}"
      }
      on_error => "writing_empty"
    }
    if ![writing_empty] {
      mutate {
        replace => {
          "writing_label.key" => "writing"
        }
      }
      mutate {
        merge => {
          "additional.fields" => "writing_label"
        }
        on_error => "writing_label_empty"
      }
    }
  }

  if ([has_principal_user] == "true" or [has_principal] == "true") and [has_target_user] == "true" {
    mutate {
      replace => {
        "metadata.event_type" => "USER_LOGIN"
        "event.idm.read_only_udm.extensions.auth.type" => "MACHINE"
      }
    }
  }
  else if [has_principal] == "true" and [has_target] == "false" {
    mutate {
      replace => {
        "metadata.event_type" => "STATUS_UPDATE"
      }
    }
  }
  else {
    mutate {
      replace => {
        "metadata.event_type" => "GENERIC_EVENT"
      }
    }
  }

  if [target] != "" {
    mutate {
      rename => {
        "target" => "event.idm.read_only_udm.target"
      }
    }
  }
  if [principal] != "" {
    mutate {
      rename => {
        "principal" => "event.idm.read_only_udm.principal"
      }
    }
  }
  if [metadata] != "" {
    mutate {
      rename => {
        "metadata" => "event.idm.read_only_udm.metadata"
      }
    }
  }
  if [network] != "" {
    mutate {
      rename => {
        "network" => "event.idm.read_only_udm.network"
      }
    }
  }

  if [additional] != "" {
    mutate {
      rename => {
        "additional" => "event.idm.read_only_udm.additional"
      }
    }
  }

  mutate {
    merge => {
      "@output" => "event"
    }
  }
}
