# Product: CISCO PIX FIREWALL
# Category: Firewall
# Supported Format: SYSLOG
# Reference: N/A
# Last Updated: 2025-12-23
# Copyright 2025 Google SecOps

filter {
  mutate {
    replace => {
      "datetime" => ""
      "observer_ip" => ""
      "src_ip" => ""
      "src_port" => ""
      "facility" => ""
      "mnemonic" => ""
      "proto" => ""
      "dest_ip" => ""
      "dest_port" => ""
      "severity_level" => ""
      "action" => ""
      "sec_action" => ""
      "security_result" => ""
      "severity" => ""
      "direction" => ""
      "prod_event_type" => ""
      "month" => ""
      "day" => ""
      "year" => ""
      "hms" => ""
      "descrip" => ""
      "description" => ""
      "sessionId" => ""
    }
  }

  grok {
    match => {
      "message" => [
        "<%{INT}>%{MONTH:month} %{MONTHDAY:day} %{YEAR:year} %{TIME:hms}: %%{NOTSPACE:prod_event_type}: %{GREEDYDATA:descrip}",
        "%{SYSLOGTIMESTAMP:datetime} %{IP:observer_ip} %%{NOTSPACE:prod_event_type}: %{GREEDYDATA:descrip}"
      ]
    }
    overwrite => ["datetime", "data", "observer_ip", "descrip", "month", "day", "year", "hms", "prod_event_type"]
    on_error => "grok_failure"
  }

  if [prod_event_type] != "" {
    grok {
      match => {
        "prod_event_type" => [
          "%{WORD:facility}-%{INT:severity_level}-%{WORD:mnemonic}"
        ]
      }
      overwrite => ["facility", "severity_level", "mnemonic"]
      on_error => "data_grok_failure"
    }
  }

  if [descrip] != "" {
    grok {
      match => {
        "descrip" => [
          "%{WORD:action} %{WORD:proto} src outside:(%{IP:dest_ip}/%{INT:dest_port}|%{IP:dest_ip}) dst (inside|JFS-PEER):(%{IP:src_ip}/%{INT:src_port}|%{IP:src_ip}) %{GREEDYDATA:description}",
          "%{WORD:action} %{WORD:proto} connection %{WORD:sessionId} for outside:%{IP:dest_ip}/%{INT:dest_port} to inside:%{IP:src_ip}/%{INT:src_port} %{GREEDYDATA:description}",
          "(?P<direction>Inbound) %{WORD:proto} connection %{WORD:action} from %{IP:src_ip}/%{INT:src_port} to %{IP:dest_ip}/%{INT:dest_port} .*",
          "%{WORD:action} (?P<direction>inbound) %{WORD:proto} from %{IP:src_ip}/%{INT:src_port} to %{IP:dest_ip}/%{INT:dest_port} on interface %{WORD}"
        ]
      }
      overwrite => ["src_ip", "src_port", "proto", "action", "dest_ip", "dest_port","direction", "description", "sessionId"]
      on_error => "descrip_grok_failure"
    }
  }

  if [prod_event_type] != "" {
    mutate {
      replace => {
        "event.idm.read_only_udm.metadata.product_event_type" => "%{prod_event_type}"
      }
    }
  }

  mutate {
    replace => {
      "event.idm.read_only_udm.metadata.product_name" => "CISCO_FWSM"
      "event.idm.read_only_udm.metadata.vendor_name" => "CISCO"
    }
  }

  if [facility] != "" {
    mutate {
      replace => {
        "event.idm.read_only_udm.principal.resource.type" => "%{facility}"
      }
    }
  }


  if [descrip] != "" {
    mutate {
      replace => {
        "event.idm.read_only_udm.metadata.description" => "%{descrip}"
      }
    }
  }

  if [src_ip] != "" {
    mutate {
      merge => {
        "event.idm.read_only_udm.principal.ip" => "src_ip"
      }
    }
  }

  if [src_port] != "" {
    mutate {
      convert => {
        "src_port" => "integer"
      }
    }
    mutate {
      rename => {
        "src_port" => "event.idm.read_only_udm.principal.port"
      }
    }
  }

  if [dest_port] != "" {
    mutate {
      convert => {
        "dest_port" => "integer"
      }
    }
    mutate {
      rename => {
        "dest_port" => "event.idm.read_only_udm.target.port"
      }
    }
  }

  if [dest_ip] != "" {
    mutate {
      merge => {
        "event.idm.read_only_udm.target.ip" => "dest_ip"
      }
    }
  }
  if [observer_ip] != "" {
    mutate {
      merge => {
        "event.idm.read_only_udm.observer.ip" => "observer_ip"
      }
    }
  }
  mutate {
    uppercase => ["proto"]
  }
  if [proto] in ["UDP", "TCP", "ICMP"] {
    mutate {
      replace => {
        "event.idm.read_only_udm.network.ip_protocol" => "%{proto}"
      }
    }
  }
  if [action] in ["Deny" ,"Teardown", "denied", "Denied"] {
    mutate {
      replace => {
        "sec_action" => "BLOCK"
      }
    }
    mutate {
      replace => {
        "security_result.action_details" => "%{action}"
      }
    }
  }

  if [sec_action] != "" {
    mutate {
      merge => {
        "security_result.action" => "sec_action"
      }
    }
  }
  if [severity_level] in ["7", "6"] {
    mutate {
      replace => {
        "severity" => "INFORMATIONAL"
      }
    }
  }
  else if [severity_level] == "5" {
    mutate {
      replace => {
        "severity" => "LOW"
      }
    }
  }
  else if [severity_level] == "4" {
    mutate {
      replace => {
        "severity" => "MEDIUM"
      }
    }
  }
  else if [severity_level] == "3" {
    mutate {
      replace => {
        "severity" => "ERROR"
      }
    }
  }
  else if [severity_level] == "2" {
    mutate {
      replace => {
        "severity" => "HIGH"
      }
    }
  }
  else {
    mutate {
      replace => {
        "severity" => "CRITICAL"
      }
    }
  }

  if [severity] != "" {
    mutate {
      replace => {
        "security_result.severity" => "%{severity}"
      }
    }
  }

  if [direction] in ["inbound", "Inbound"] {
    mutate {
      replace => {
        "event.idm.read_only_udm.network.direction" => "INBOUND"
      }
    }
  }

  if [security_result] != "" {
    mutate {
      merge => {
        "event.idm.read_only_udm.security_result" => "security_result"
      }
    }
  }
  if [src_ip] != "" and [dest_ip] != "" {
    mutate {
      replace => {
        "event.idm.read_only_udm.metadata.event_type" => "NETWORK_CONNECTION"
      }
    }
  }
  else if [src_ip] != "" and [dest_ip] == "" {
    mutate {
      replace => {
        "event.idm.read_only_udm.metadata.event_type" => "STATUS_UPDATE"
      }
    }
  }
  else {
    mutate {
      replace => {
        "event.idm.read_only_udm.metadata.event_type" => "GENERIC_EVENT"
      }
    }
  }
  mutate {
    merge => {
      "@output" => "event"
    }
  }
}
