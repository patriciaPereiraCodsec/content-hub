# Product: CIRCLECI
# Category: Automation and DevOps Tools
# Supported Format: CSV + JSON
# Reference: https://circleci.com/docs/audit-logs/
# Last Updated: 2025-05-15
# Copyright 2025 Google SecOps

filter {
  mutate {
    replace => {
      "metadata" => ""
      "principal" => ""
      "network" => ""
      "security_result" => ""
      "target" => ""
      "about" => ""
      "column20" => ""
      "msg1" => ""
      "occurred_at" => ""
      "organization.name" => ""
      "adm_domain" => ""
      "action" => ""
      "actor.name" => ""
      "actor.id" => ""
      "user" => ""
      "target_json.name" => ""
      "target_json.id" => ""
      "resource_name" => ""
      "request.id" => ""
      "id" => ""
      "sec_action" => "BLOCK"
      "success" => ""
      "workflow.id" => ""
      "ACCOUNT_ID" => ""
      "ACTOR_ID" => ""
      "ID" => ""
      "METADATA" => ""
      "OCCURRED_AT" => ""
      "ORGANIZATION_ID" => ""
      "ORGANIZATION_NAME" => ""
      "REQUEST_ID" => ""
      "branch" => ""
      "SCOPE_ID" => ""
      "SCOPE_TYPE" => ""
      "TARGET_ID" => ""
      "TARGET_TYPE" => ""
      "config_source" => ""
      "pipeline_id" => ""
      "trigger_source" => ""
      "OCCURRED_DT" => ""
      "ACTOR_TYPE" => ""
      "ACTION" => ""
      "VERSION" => ""
      "via" => ""
    }
  }
  mutate {
    gsub => ["message", '\\r\\n', ""]
  }
  mutate {
    sub => ["message",'\\n',""]
  }

  mutate {
    gsub => ["message", '{\\"logs\\":', '{\"array_logs\":']
  }
  json {
    source => "message"
    array_function => "split_columns"
    on_error => "not_msg_json"
  }
  if ![not_msg_json] and [message] =~ "array_logs" {
    for msg in array_logs {
      mutate {
        replace => {
          "event" => ""
          "ACCOUNT_ID_label" => ""
          "principal" => ""
          "target" => ""
          "security_result" => ""
          "network" => ""
          "metadata" => ""
          "VERSION_label" => ""
          "actor_type_label" => ""
          "msg_payload_workflow_id" => ""
          "workflow_id_label" => ""
          "about" => ""
          "workflow_name_label" => ""
          "vcs_branch_label" => ""
          "job_status_label" => ""
          "job_id_label" => ""
          "job_name_label" => ""
          "msg_OCCURRED_AT" => ""
          "user" => ""
          "has_principal" => "false"
          "has_target" => "false"
          "has_user" => "false"
          "msg_ACTOR_ID" => ""
          "msg_ACCOUNT_ID" => ""
          "msg_ACTION" => ""
          "msg_ACTOR_TYPE" => ""
          "msg_ID" => ""
          "msg_ORGANIZATION_ID" => ""
          "msg_ORGANIZATION_NAME" => ""
          "msg_REQUEST_ID" => ""
          "msg_SCOPE_TYPE" => ""
          "msg_TARGET_ID" => ""
          "msg_TARGET_TYPE" => ""
          "msg_VERSION" => ""
          "has_target_user" => "false"
        }
      }
      json {
        source => "msg.PAYLOAD"
        array_function => "split_columns"
        target => "PAYLOAD"
        on_error => "not_json_2_payload"
      }
      json {
        source => "msg.RAW_JSON"
        array_function => "split_columns"
        target => "RAW_JSON"
        on_error => "not_json_3_metadata"
      }
      mutate {
        repalce => {
          "msg_payload_workflow_id" => "%{PAYLOAD.workflow.id}"
        }
        on_error => "no_msg_payload_workflow_id"
      }
      mutate {
        replace => {
          "msg_payload_workflow_name" => "%{PAYLOAD.workflow.name}"
        }
        on_error => "no_msg_payload_workflow_name"
      }
      mutate {
        replace => {
          "msg_payload_vcs_branch" => "%{PAYLOAD.workflow.vcs_branch}"
        }
        on_error => "no_msg_payload_vcs_branch"
      }
      mutate {
        replace => {
          "payload_job_status"   => "%{PAYLOAD.job.job_status}"
        }
        on_error => "no_payload_job_status"
      }
      mutate {
        replace => {
          "SUCCESS" => "%{msg.SUCCESS}"
        }
        on_error => "no_SUCCESS"
      }
      mutate {
        replace => {
          "payload_job_id" => "%{PAYLOAD.job.id}"
        }
        on_error => "no_payload_job_id"
      }
      mutate {
        replace => {
          "payload_job_name" => "%{PAYLOAD.job.job_name}"
        }
        on_error => "no_payload_job_name"
      }
      mutate {
        replace => {
          "raw_json_actor_name"=> "%{RAW_JSON.actor.name}"
        }
        on_error => "no_raw_json_actor_name"
      }
      mutate {
        replace => {
          "msg_OCCURRED_AT" => "%{msg.OCCURRED_AT}"
        }
        on_error => "no_OCCURRED_AT2"
      }
      mutate {
        replace => {
          "msg_ACTOR_ID" => "%{msg.ACTOR_ID}"
        }
        on_error => "no_ACTOR_ID"
      }
      mutate {
        repalce => {
          "msg_ACCOUNT_ID" => "%{msg.ACCOUNT_ID}"
        }
        on_error => "no_ACCOUNT_ID"
      }
      if [msg_ACCOUNT_ID] != "" {
        mutate {
          replace => {
            "ACCOUNT_ID_label.key" => "ACCOUNT_ID"
            "ACCOUNT_ID_label.value" => "%{msg_ACCOUNT_ID}"
          }
          on_error => "no_ACCOUNT_ID"
        }
        if ![no_ACCOUNT_ID] {
          mutate {
            merge => {
              "event.idm.read_only_udm.principal.resource.attribute.labels" => "ACCOUNT_ID_label"
            }
            on_error => "ACCOUNT_ID_label_merge_error"
          }
        }
      }
      mutate {
        replace => {
          "msg_ACTION" => "%{msg.ACTION}"
        }
        on_error => "no_msg_ACTION"
      }
      if [msg_ACTION] != "" {
        mutate {
          replace => {
            "event.idm.read_only_udm.metadata.product_event_type" => "%{msg_ACTION}"
          }
          on_error => "no_action"
        }
      }
      if [msg_ACTOR_ID] != "" {
        mutate {
          replace => {
            "event.idm.read_only_udm.principal.user.userid" => "%{msg_ACTOR_ID}"
          }
          on_error => "no_actor_id"
        }
        if ![no_actor_id] {
          mutate {
            replace => {
              "has_user" => "true"
            }
            on_error => "no_has_user"
          }
        }
      }
      mutate {
        replace => {
          "msg_ACTOR_TYPE" => "%{msg.ACTOR_TYPE}"
        }
        on_error => "no_ACTOR_TYPE"
      }
      if [msg_ACTOR_TYPE] != "" {
        mutate {
          replace => {
            "actor_type_label.key" => "ACTOR_TYPE"
            "actor_type_label.value" => "%{msg_ACTOR_TYPE}"
          }
          on_error => "no_actor_type"
        }
        if ![no_actor_type] {
          mutate {
            merge => {
              "event.idm.read_only_udm.principal.resource.attribute.labels" => "actor_type_label"
            }
            on_error => "actor_type_label_merge_error"
          }
        }
      }
      mutate {
        replace => {
          "msg_ID" => "%{msg.ID}"
        }
        on_error => "no_ID"
      }
      if [msg_ID] != "" {
        mutate {
          replace => {
            "event.idm.read_only_udm.metadata.product_log_id" => "%{msg_ID}"
          }
          on_error => "no_id"
        }
      }
      if [SUCCESS] != "" {
        mutate {
          uppercase => ["SUCCESS"]
        }
        if [SUCCESS] == "TRUE" {
          mutate {
            replace => {
              "sec_action" => "ALLOW"
            }
            on_error => "no_sec_action"
          }
        }
        else if [SUCCESS] == "FALSE" {
          mutate {
            replace => {
              "sec_action" => "BLOCK"
            }
            on_error => "no_sec_action"
          }
        }
        if ![no_sec_action] {
          mutate {
            merge => {
              "security_result.action" => "sec_action"
            }
            on_error => "sec_action_merge_error"
          }
        }
      }
      if [msg_OCCURRED_AT] != "" {
        grok {
          match => {
            "msg_OCCURRED_AT" => ["%{TIMESTAMP_ISO8601:msg_OCCURRED_AT}"]
          }
          on_error => "no_msg_OCCURRED_grok"
          overwrite => ["msg_OCCURRED_AT"]
        }
        date {
          match => ["msg_OCCURRED_AT", "ISO8601", "yyyy-MM-dd HH:mm:ss.SSS", "yyyy-MM-dd HH:mm:ss.SSS Z", "yyyy-MM-ddTHH:mm:ss.SSSSSSSSSZ", "yyyy-MM-ddTHH:mm:ss.SSSSSSSSSZ", "yyyy-MM-ddTHH:mm:ss.SSS Z"]
          target => "event.idm.read_only_udm.metadata.event_timestamp"
          on_error => "msg_OCCURRED_AT_fail"
        }
      }
      mutate {
        replace => {
          "msg_ORGANIZATION_ID" => "%{msg.ORGANIZATION_ID}"
        }
        on_error => "no_ORGANIZATION_ID"
      }
      if [msg_ORGANIZATION_ID] != "" {
        mutate {
          replace => {
            "event.idm.read_only_udm.principal.user.product_object_id" => "%{msg_ORGANIZATION_ID}"
          }
          on_error => "no_organization_id"
        }
      }
      mutate {
        replace => {
          "msg_ORGANIZATION_NAME" => "%{msg.ORGANIZATION_NAME}"
        }
        on_error => "no_ORGANIZATION_NAME"
      }
      if [msg_ORGANIZATION_NAME] != "" {
        grok {
          match => {
            "msg_ORGANIZATION_NAME" => "github:\\s+%{GREEDYDATA:ADM_DOMAIN}"
          }
          overwrite => ["ADM_DOMAIN"]
          on_error => "no_ADM_DOMAIN"
        }
        mutate {
          replace => {
            "event.idm.read_only_udm.target.administrative_domain" => "%{ADM_DOMAIN}"
          }
          on_error => "no_ADM_DOMAIN"
        }
      }
      mutate {
        replace => {
          "msg_REQUEST_ID" => "%{msg.REQUEST_ID}"
        }
        on_error => "no_REQUEST_ID"
      }
      if [msg_REQUEST_ID] != "" {
        mutate {
          replace => {
            "event.idm.read_only_udm.network.session_id" => "%{msg_REQUEST_ID}"
          }
          on_error => "no_request_id"
        }
      }
      mutate {
        replace => {
          "msg_SCOPE_ID" => "%{msg.SCOPE_ID}"
        }
        on_error => "no_SCOPE_ID"
      }
      if [msg_SCOPE_ID] != "" {
        mutate {
          replace => {
            "event.idm.read_only_udm.principal.resource.id" => "%{msg_SCOPE_ID}"
          }
          on_error => "no_SCOPE_ID"
        }
      }
      mutate {
        replace => {
          "msg_SCOPE_TYPE" => "%{msg.SCOPE_TYPE}"
        }
        on_error => "no_SCOPE_TYPE"
      }
      if [msg_SCOPE_TYPE] != "" {
        mutate {
          replace => {
            "event.idm.read_only_udm.principal.resource.type" => "%{msg_SCOPE_TYPE}"
          }
          on_error => "no_SCOPE_TYPE"
        }
      }
      mutate {
        replace => {
          "msg_TARGET_ID" => "%{msg.TARGET_ID}"
        }
        on_error => "no_TARGET_ID"
      }
      if [msg_TARGET_ID] != "" {
        mutate {
          replace => {
            "event.idm.read_only_udm.target.resource.id" => "%{msg_TARGET_ID}"
          }
          on_error => "no_TARGET_ID"
        }
        mutate {
          replace => {
            "has_target_user" => "true"
          }
          on_error => "no_has_target_user"
        }
      }
      mutate {
        replace => {
          "msg_TARGET_TYPE" => "%{msg.TARGET_TYPE}"
        }
        on_error => "no_TARGET_TYPE"
      }
      if [msg_TARGET_TYPE] != "" {
        mutate {
          replace => {
            "event.idm.read_only_udm.target.resource.type" => "%{msg_TARGET_TYPE}"
          }
          on_error => "no_TARGET_TYPE"
        }
        mutate {
          replace => {
            "has_target_user" => "true"
          }
          on_error => "no_has_target_user"
        }
      }
      mutate {
        replace => {
          "msg_VERSION" => "%{msg.VERSION}"
        }
        on_error => "no_VERSION"
      }
      if [msg_VERSION] != "" {
        mutate {
          replace => {
            "VERSION_label.key" => "VERSION"
            "VERSION_label.value" => "%{msg_VERSION}"
          }
          on_error => "no_version"
        }
        if ![no_version] {
          mutate {
            merge => {
              "event.idm.read_only_udm.target.resource.attribute.labels" => "VERSION_label"
            }
            on_error => "version_label_merge_error"
          }
        }
        mutate {
          replace => {
            "has_target_user" => "true"
          }
          on_error => "no_has_target_user"
        }
      }
      mutate {
        replace => {
          "workflow_id_label.key" => "workflow_id"
          "workflow_id_label.value" => "%{PAYLOAD.workflow.id}"
        }
        on_error => "no_workflow_id1"
      }
      if ![no_workflow_id1] {
        mutate {
          merge => {
            "about.resource.attribute.labels" => "workflow_id_label"
          }
          on_error => "workflow_id_label_merge_error"
        }
      }
      mutate {
        replace => {
          "workflow_name_label.value" => "%{msg_payload_workflow_name}"
        }
        on_error => "no_workflow_name_value"
      }
      if ![no_workflow_name_value] {
        mutate {
          replace => {
            "workflow_name_label.key" => "workflow_name"
          }
          on_error => "no_workflow_name_key"
        }
        mutate {
          merge => {
            "about.resource.attribute.labels" => "workflow_name_label"
          }
          on_error => "workflow_name_label_merge_error"
        }
      }
      mutate {
        replace => {
          "vcs_branch_label.key" => "VCS_BRANCH"
          "vcs_branch_label.value.string_value" => "%{msg_payload_vcs_branch}"
        }
        on_error => "no_vcs_branch"
      }
      if ![no_vcs_branch] {
        mutate {
          merge => {
            "event.idm.read_only_udm.additional.fields" => "vcs_branch_label"
          }
          on_error => "vcs_branch_label_merge_error"
        }
      }
      mutate {
        replace => {
          "job_status_label.key" => "job_status"
          "job_status_label.value" => "%{payload_job_status}"
        }
        on_error => "no_job_status"
      }
      if ![no_job_status] {
        mutate {
          merge => {
            "about.resource.attribute.labels" => "job_status_label"
          }
          on_error => "job_status_label_merge_error"
        }
      }
      mutate {
        replace => {
          "job_id_label.key" => "job_id"
          "job_id_label.value" => "%{payload_job_id}"
        }
        on_error => "no_job_id"
      }
      if ![no_job_id] {
        mutate {
          merge => {
            "about.resource.attribute.labels" => "job_id_label"
          }
          on_error => "job_id_label_merge_error"
        }
      }
      mutate {
        replace => {
          "job_name_label.key" => "job_name"
          "job_name_label.value" => "%{payload_job_name}"
        }
        on_error => "no_job_name"
      }
      if ![no_job_name] {
        mutate {
          merge => {
            "about.resource.attribute.labels" => "job_name_label"
          }
          on_error => "job_name_label_merge_error"
        }
      }
      if [raw_json_actor_name] != ""  {
        grok {
          match => {
            "raw_json_actor_name" => [
              "github:\\s+%{GREEDYDATA:user}"
              "%{GREEDYDATA:user}"
            ]
          }
          overwrite => ["user"]
          on_error => "no_user"
        }
        mutate {
          replace => {
            "principal.user.userid" => "%{user}"
          }
          on_error => "no_user"
        }
        mutate {
          replace => {
            "has_user" => "true"
          }
          on_error => "no_has_user"
        }
      }
      if [has_principal] == "true" and [has_target] == "true" {
        mutate {
          replace => {
            "event.idm.read_only_udm.metadata.event_type" => "NETWORK_CONNECTION"
          }
        }
      }
      else if [has_principal] == "true" {
        mutate {
          replace => {
            "event.idm.read_only_udm.metadata.event_type" => "STATUS_UPDATE"
          }
        }
      }
      else if [has_target_user] == "true" and [has_user] == "true" {
        mutate {
          replace => {
            "event.idm.read_only_udm.metadata.event_type" => "USER_RESOURCE_ACCESS"
          }
        }
      }
      else {
        mutate {
          replace => {
            "event.idm.read_only_udm.metadata.event_type" => "GENERIC_EVENT"
          }
        }
      }
      if [security_result] != "" {
        mutate {
          merge => {
            "event.idm.read_only_udm.security_result" => "security_result"
          }
        }
      }
      if [about] != "" {
        mutate {
          merge => {
            "event.idm.read_only_udm.about" => "about"
          }
        }
      }
      mutate {
        replace => {
          "event.idm.read_only_udm.metadata.product_name" => "CIRCLECI"
          "event.idm.read_only_udm.metadata.vendor_name" => "CIRCLECI"
        }
      }
      mutate {
        merge => {
          "@output" => "event"
        }
      }
    }
  }
  else {
    csv {
      source => "message"
      field_split => ","
      on_error => "csv_failure"
    }
    if [column20] != "" {
      mutate {
        replace => {
          "msg1" => "%{column20}"
        }
      }
    }
    mutate {
      gsub => ["msg1", "target", "target_json"]
    }
    mutate {
      gsub => ["message", '\\\r\\\n\\\s+', ""]
    }
    mutate {
      gsub => ["message", '\\\\n', ""]
    }
    mutate {
      gsub => ["msg1", "metadata", "metadata_json"]
    }
    json {
      source => "msg1"
      array_function => "split_columns"
      on_error => "not_json"
    }
    json {
      source => "message"
      array_function => "split_columns"
      on_error => "not_json_1"
    }
    json {
      source => "PAYLOAD"
      array_function => "split_columns"
      on_error => "not_json_2_payload"
    }
    json {
      source => "METADATA"
      array_function => "split_columns"
      on_error => "not_json_3_metadata"
    }
    if [csv_failure] && [not_json_1] && [not_json] {
      drop {
        tag => "TAG_MALFORMED_ENCODING"
      }
    }
    if [occurred_at] != "" {
      date {
        match => ["occurred_at", "ISO8601"]
        target => "metadata.event_timestamp"
        on_error => "wrong_format"
      }
    }
    if [organization][name] != "" {
      grok {
        match => {
          "organization.name" => "github:\\s+%{GREEDYDATA:adm_domain}"
        }
        overwrite => ["adm_domain"]
        on_error => "no_adm_domain"
      }
      mutate {
        replace => {
          "target.administrative_domain" => "%{adm_domain}"
        }
      }
    }
    if [action] != "" {
      mutate {
        replace => {
          "metadata.product_event_type" => "%{action}"
        }
      }
    }
    if [id] != "" {
      mutate {
        replace => {
          "metadata.product_log_id" => "%{id}"
        }
      }
    }
    if [actor][name] != ""  {
      grok {
        match => {
          "actor.name" => [
            "github:\\s+%{GREEDYDATA:user}"
            "%{GREEDYDATA:user}"
          ]
        }
        overwrite => ["user"]
        on_error => "no_user"
      }
      mutate {
        replace => {
          "principal.user.userid" => "%{user}"
        }
      }
    }
    if [actor][id] != "" {
      mutate {
        replace => {
          "principal.user.product_object_id" => "%{actor.id}"
        }
      }
    }
    if [target_json][name] != ""  {
      grok {
        match => {
          "target_json.name" => "github:\\s+%{GREEDYDATA:resource_name}"
        }
        overwrite => ["resource_name"]
        on_error => "no_resource_name"
      }
      mutate {
        replace => {
          "target.resource.name" => "%{resource_name}"
          "target.resource.resource_type" => "STORAGE_OBJECT"
        }
      }
    }
    if [target_json][id] != "" {
      mutate {
        replace => {
          "target.resource.product_object_id" => "%{target_json.id}"
        }
      }
    }
    if [request][id] != "" {
      mutate {
        replace => {
          "network.session_id" => "%{request.id}"
        }
      }
    }
    if [success] != "" {
      if [success]  {
        mutate {
          replace => {
            "sec_action" => "ALLOW"
          }
          merge => {
            "security_result.action" => "sec_action"
          }
        }
      }
      else {
        mutate {
          merge => {
            "security_result.action" => "sec_action"
          }
        }
      }
    }
    mutate {
      replace => {
        "acct_id_label.key" => "account_id"
        "acct_id_label.value" => "%{account.id}"
      }
      on_error => "no_acct_id"
    }
    if ![no_acct_id] {
      mutate {
        merge => {
          "about.resource.attribute.labels" => "acct_id_label"
        }
      }
    }
    mutate {
      replace => {
        "scope_id_label.key" => "scope_id"
        "scope_id_label.value" => "%{scope.id}"
      }
      on_error => "no_scope_id"
    }
    if ![no_scope_id] {
      mutate {
        merge => {
          "about.resource.attribute.labels" => "scope_id_label"
        }
      }
    }
    mutate {
      replace => {
        "workflow_id_label.key" => "workflow_id"
        "workflow_id_label.value" => "%{payload.workflow.id}"
      }
      on_error => "no_workflow_id"
    }
    if ![no_workflow_id] {
      mutate {
        merge => {
          "about.resource.attribute.labels" => "workflow_id_label"
        }
      }
    }
    mutate {
      replace => {
        "job_id_label.key" => "job_id"
        "job_id_label.value" => "%{payload.job.id}"
      }
      on_error => "no_job_id"
    }
    if ![no_job_id] {
      mutate {
        merge => {
          "about.resource.attribute.labels" => "job_id_label"
        }
      }
