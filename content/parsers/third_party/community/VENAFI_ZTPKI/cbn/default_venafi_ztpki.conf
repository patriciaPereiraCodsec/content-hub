    }
  }

  if [account_ids] != "" {
    mutate {
      gsub => ["account_ids",',','\",\"']
    }
    mutate {
      replace => {
        "account_ids" => "{\"account_ids\":[\"%{account_ids}\"]}"
      }
      on_error => "no_account_ids"
    }
    json {
      source => "account_ids"
      array_function => "split_columns"
      on_error => "invalid_account_ids_json"
    }
    if ![invalid_account_ids_json] {
      mutate {
        replace => {
          "account_list.value" => ""
        }
      }
      for accountid in account_ids {
        mutate {
          replace => {
            "account_label" => ""
          }
        }
        mutate {
          replace => {
            "account_label.string_value" => "%{accountid}"
          }
          on_error => "no_accountid"
        }
        mutate {
          merge => {
            "account_list.value.list_value.values" => "account_label"
          }
          on_error => "no_account_label"
        }
      }
      if [account_list][value] != "" {
        mutate {
          replace => {
            "account_list.key" => "account_ids"
          }
        }
        mutate {
          merge => {
            "event.idm.read_only_udm.additional.fields" => "account_list"
          }
          on_error => "no_account_list"
        }
      }
    }
