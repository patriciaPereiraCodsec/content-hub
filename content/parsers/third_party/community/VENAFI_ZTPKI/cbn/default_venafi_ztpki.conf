      }
      on_error => "no_id"
    }
  }

  mutate {
    replace => {
      "metadata.vendor_name" => "VENAFI ZTPKI"
      "metadata.product_name" => "VENAFI ZTPKI"
      "metadata.event_type" => "GENERIC_EVENT"
    }
  }

  if [has_user] == "true" {
    mutate {
      replace => {
        "metadata.event_type" => "USER_UNCATEGORIZED"
      }
    }
  }
  else if [has_principal] == "true" and [has_target] == "true" {
    mutate {
      replace => {
        "metadata.event_type" => "NETWORK_CONNECTION"
      }
    }
  }
  else if [has_principal] == "true" {
    mutate {
      replace => {
        "metadata.event_type" => "STATUS_UPDATE"
      }
    }
  }
  else {
    mutate {
      replace => {
        "metadata.event_type" => "GENERIC_EVENT"
      }
    }
  }

  if [principal] != "" {
    mutate {
      rename => {
        "principal" => "event.idm.read_only_udm.principal"
      }
    }
  }
  if [target] != "" {
    mutate {
      rename => {
        "target" => "event.idm.read_only_udm.target"
      }
    }
  }
  if [metadata] != "" {
    mutate {
      rename => {
        "metadata" => "event.idm.read_only_udm.metadata"
      }
    }
  }
  if [network] != "" {
    mutate {
      rename => {
        "network" => "event.idm.read_only_udm.network"
      }
    }
  }
  if [intermediary] != "" {
    mutate {
      merge => {
        "event.idm.read_only_udm.intermediary" => "intermediary"
      }
      on_error => "no_intermediary"
    }
  }
  if [severity] != "" {
    mutate {
      convert => {
        "severity" => "integer"
      }
      on_error => "severity_conversion_failed"
    }
    if ![severity_conversion_failed] {
      if [severity] == 7 {
        mutate {
          replace => {
            "security_result.severity" => "LOW"
          }
        }
      } else if [severity] == 6 or [severity] == 5 {
        mutate {
          replace => {
            "security_result.severity" => "INFORMATIONAL"
          }
        }
      } else if [severity] == 4 {
        mutate {
          replace => {
            "security_result.severity" => "MEDIUM"
          }
        }
      } else if [severity] == 3 {
        mutate {
          replace => {
            "security_result.severity" => "HIGH"
          }
        }
      } else if [severity] <= 2 and [severity] >= 0 {
        mutate {
          replace => {
            "security_result.severity" => "CRITICAL"
          }
        }
      }
    }
  }
  if [security_result] != "" {
    mutate {
      merge => {
        "event.idm.read_only_udm.security_result" => "security_result"
      }
      on_error => "no_security_result"
    }
  }

  mutate {
    merge => {
      "@output" => "event"
    }
  }
}
