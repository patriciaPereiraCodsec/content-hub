# Product: RH-ISAC
# Category: IOC
# Supported Format: JSON
# Reference: N/A
# Last Updated: 2024-03-07
# Copyright 2024 Chronicle LLC

filter {
  mutate {
    replace => {
      "lastSeen" => ""
      "firstSeen" => "1"
      "first_seen" => "1"
      "last_seen" => ""
      "no_ioc" => ""
      "priorityLevel" => ""
      "indicatorType" => ""
      "type" => ""
      "comment" => ""
      "category" => ""
      "id" => ""
      "object_id" => ""
      "uuid" => ""
      "guid" => ""
      "value" => ""
    }
  }
  json {
    source => "message"
    array_function => "split_columns"
    on_error => "not_json"
  }

  if [type] != "" and [indicatorType] == "" {
    mutate {
      uppercase => ["type"]
    }
    mutate {
      replace => {
        "indicatorType" => "%{type}"
      }
      on_error => "type_not_found"
    }
  }

  mutate {
    gsub => ["indicatorType","(?i)link","URL"]
  }

  if [first_seen] != "" and [firstSeen] == "1" {
    mutate {
      convert => {
        "first_seen" => "string"
      }
      on_error => "already_string"
    }
    mutate {
      replace => {
        "firstSeen" => "%{first_seen}"
      }
      on_error => "first_seen_field_not_found"
    }
  }

  if [last_seen] != "" {
    mutate {
      convert => {
        "last_seen" => "string"
      }
      on_error => "already_string"
    }
    mutate {
      replace => {
        "lastSeen" => "%{last_seen}"
      }
      on_error => "last_seen_field_not_found"
    }
  }

  if [uuid] != "" and [guid] == "" {
    mutate {
      replace => {
        "guid" => "%{uuid}"
      }
      on_error => "field_not_found"
    }
  }

  if [firstSeen] != "" {
    if [indicatorType] =~ "(?i)IP" {
      grok {
        match => {
          "value" => "%{IP:ip_value}"
        }
        overwrite => [ip_value]
        on_error => "match_error"
      }
      mutate {
        replace => {
          "event.idm.entity.metadata.entity_type" => "IP_ADDRESS"
        }
      }
      mutate {
        merge => {
          "event.idm.entity.entity.ip" => "ip_value"
        }
      }
    }
    else if ([indicatorType] == "URL" and [value] !~ "http.*") or [indicatorType] =~ "(?i)hostname|domain" {
      mutate {
        replace => {
          "event.idm.entity.metadata.entity_type" => "DOMAIN_NAME"
          "event.idm.entity.entity.hostname" => "%{value}"
        }
      }
    }
    else if [indicatorType] =~ "(?i)URL" {
      mutate {
        replace => {
          "no_ioc" => "true"
          "event.idm.entity.metadata.entity_type" => "URL"
          "event.idm.entity.entity.url" => "%{value}"
        }
      }
    }
    else if [indicatorType] == "EMAIL_ADDRESS" or [indicatorType] =~ "(?i)email" {
      mutate {
        replace => {
          "no_ioc" => "true"
          "event.idm.entity.metadata.entity_type" => "USER"
          "event.idm.entity.metadata.product_entity_id" => "%{guid}"
        }
      }
      mutate {
        merge => {
          "event.idm.entity.entity.user.email_addresses" => "value"
        }
      }
    }
    else if [indicatorType] =~ "(?i)MD5" {
      mutate {
        replace => {
          "no_ioc" => "true"
          "event.idm.entity.metadata.entity_type" => "FILE"
          "event.idm.entity.entity.file.md5" => "%{value}"
        }
      }
    }
    else if [indicatorType] =~ "(?i)SHA256" {
      mutate {
        replace => {
          "no_ioc" => "true"
          "event.idm.entity.metadata.entity_type" => "FILE"
          "event.idm.entity.entity.file.sha256" => "%{value}"
        }
      }
    }
    else if [indicatorType] =~ "(?i)SHA1" {
      mutate {
        replace => {
          "no_ioc" => "true"
          "event.idm.entity.metadata.entity_type" => "FILE"
          "event.idm.entity.entity.file.sha1" => "%{value}"
        }
      }
    }
    else if [indicatorType] =~ "(?i)SOFTWARE" {
      mutate {
        replace => {
          "no_ioc" => "true"
          "event.idm.entity.metadata.entity_type" => "FILE"
          "event.idm.entity.entity.file.full_path" => "%{value}"
        }
      }
    }
    else if [indicatorType] =~ "(?i)CVE" {
      mutate {
        replace => {
          "no_ioc" => "true"
          "event.idm.entity.metadata.entity_type" => "FILE"
          "event.idm.entity.entity.file.full_path" => "%{value}"
        }
      }
    }
    else if [indicatorType] =~ "(?i)filename" {
      mutate {
        replace => {
          "no_ioc" => "true"
          "event.idm.entity.metadata.entity_type" => "FILE"
          "event.idm.entity.entity.file.full_path" => "%{value}"
        }
        on_error => "field_not_found"
      }
    }
    else if [indicatorType] =~ "(?i)text" {
      mutate {
        replace => {
          "no_ioc" => "true"
          "event.idm.entity.metadata.entity_type" => "FILE"
          "event.idm.entity.entity.file.full_path" => "%{value}"
        }
        on_error => "field_not_found"
      }
    }
    else if [indicatorType] =~ "(?i)other" {
      mutate {
        replace => {
          "no_ioc" => "true"
          "event.idm.entity.metadata.entity_type" => "FILE"
          "event.idm.entity.entity.file.full_path" => "%{value}"
        }
        on_error => "invalid_value"
      }
    }
    else {
      drop {
        tag => "TAG_UNSPECIFIED"
      }
    }

    if [comment] != "" {
      mutate {
        replace => {
          "threat_det.summary" => "%{comment}"
        }
        on_error => "comment_not_found"
      }
    }

    if [category] != "" {
      mutate {
        merge => {
          "threat_det.category_details" => "category"
        }
        on_error => "category_not_found"
      }
    }

    if [id] != "" {
      mutate {
        replace => {
          "additional_id.key" => "id"
          "additional_id.value" => "%{id}"
        }
        on_error => "id_not_found"
      }
      if ![id_not_found] {
        mutate {
          merge => {
            "threat_det.detection_fields" => "additional_id"
          }
          on_error => "merge_error"
        }
      }
    }

    if [object_id] != "" {
      mutate {
        replace => {
          "additional_object_id.key" => "object_id"
          "additional_object_id.value" => "%{object_id}"
        }
        on_error => "object_id_not_found"
      }
      if ![object_id_not_found] {
        mutate {
          merge => {
            "threat_det.detection_fields" => "additional_object_id"
          }
          on_error => "merge_error"
        }
      }
    }

    if [uuid] != "" {
      mutate {
        replace => {
          "additional_uuid.key" => "uuid"
          "additional_uuid.value" => "%{uuid}"
        }
        on_error => "uuid_not_found"
      }
      if ![uuid_not_found] {
        mutate {
          merge => {
            "threat_det.detection_fields" => "additional_uuid"
          }
          on_error => "merge_error"
        }
      }
    }

    mutate {
      replace => {
        "threat_det.threat_name" => "Rh isac - %{indicatorType}"
        "threat_cat" => "NETWORK_SUSPICIOUS"
      }
    }

    mutate {
      merge => {
        "threat_det.category" => "threat_cat"
      }
    }

    mutate {
      merge => {
        "event.idm.entity.metadata.threat" => "threat_det"
      }
    }

    mutate {
      replace => {
        "event.idm.entity.metadata.vendor_name" => "RH_ISAC"
      }
    }

    mutate {
      convert => {
        "firstSeen" => "string"
      }
      on_error => "convert_failure"
    }

    mutate {
      convert => {
        "lastSeen" => "string"
      }
      on_error => "convert_failure"
    }
    mutate {
      gsub => ["firstSeen","000000\\+00:00","00Z"]
    }
    mutate {
      gsub => ["lastSeen","000000\\+00:00","00Z"]
    }
    if [firstSeen] == "1" {
      date {
        match => ["firstSeen","UNIX"]
        target => "event.idm.entity.metadata.interval.start_time"
        on_error => "invalid_date_format"
      }
    }
    else {
      date {
        match => ["firstSeen","UNIX_MS","ISO8601","yyyy-MM-dd"]
        target => "event.idm.entity.metadata.interval.start_time"
        on_error => "invalid_date_format"
      }
    }

    date {
      match => ["lastSeen","UNIX_MS","ISO8601","yyyy-MM-dd"]
      target => "event.idm.entity.metadata.interval.end_time"
      on_error => "invalid_date_format"
    }
  }

  if [no_ioc] == "" {
    mutate {
      replace => {
        "event.ioc.feed_name" => "RH_ISAC"
        "event.ioc.raw_severity" => "%{priorityLevel}"
      }
    }

    if [indicatorType] =~ "(?i)IP" {
      grok {
        match => {
          "value" => "%{IP:ip_value}"
        }
        overwrite => [ip_value]
        on_error => "no_ip_found"
      }
      mutate {
        replace => {
          "event.ioc.ip_and_ports.ip_address" => "%{ip_value}"
        }
        on_error => "ip_not_found"
      }
      mutate {
        convert => {
          "event.ioc.ip_and_ports.ip_address" => "ipaddress"
        }
      }
    }
    # capture url details when it is just the domain, not the full url path
    else if ([indicatorType] =~ "(?i)URL" and [value] !~ "http.*") or [indicatorType] =~ "(?i)hostname|domain" {
      mutate {
        replace => {
          "event.ioc.domain_and_ports.domain" => "%{value}"
        }
      }
    }
  }

  for index,tag in Tag {
    mutate {
      convert => {
        "index" => "string"
      }
      on_error => "convert_failed"
    }
    for key, value in tag map {
      mutate {
        replace => {
          "tag_map_label" => ""
        }
      }
      if [key] != "" and [key] =~ "name" {
        mutate {
          replace => {
            "tag_map_label.key" => "%{key} %{index}"
          }
          on_error => "invalid_key"
        }
        if ![invalid_key] {
          mutate {
            replace => {
              "tag_map_label.value" => "%{value}"
            }
            on_error => "invalid_value"
          }
          if ![invalid_value] {
            mutate {
              merge => {
                "threat_det.detection_fields" => "tag_map_label"
              }
              on_error => "tag_map_label_merge_failed"
            }
          }
        }
      }
    }
  }
  mutate {
    merge => {
      "@output" => "event"
    }
  }
}
