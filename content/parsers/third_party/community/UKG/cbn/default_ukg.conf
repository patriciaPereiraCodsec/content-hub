# Product: UKG
# Category: NA
# Supported Format: JSON
# Reference: NA
# Last Updated: 2025-02-12
# Copyright 2025 Google Secops

filter {
  mutate {
    replace => {
      "employeeId" => ""
      "userId" => ""
      "userName" => ""
      "fullName" => ""
      "userLastLogonDate" => ""
      "integrationUserKey" => ""
      "userLastPasswordChangeDate" => ""
      "userStatus" => ""
      "has_user" => "false"
    }
  }
  mutate {
    gsub => ["message","userLastLogonDate ","userLastLogonDate"]
  }
  json {
    source => "message"
    array_function => "split_columns"
    on_error => "not_a_json"
  }
  if [employeeId] != "" {
    mutate {
      replace => {
        "event.idm.entity.entity.user.employee_id" => "%{employeeId}"
        "has_user" => "true"
      }
      on_error => "not_a_json"
    }
  }
  if [userId] != "" {
    mutate {
      convert => {
        "userId" => "string"
      }
      on_error => "not_a_json"
    }
    mutate {
      replace => {
        "event.idm.entity.entity.user.userid" => "%{userId}"
        "event.idm.entity.entity.user.product_object_id" => "%{userId}"
        "has_user" => "true"
      }
      on_error => "not_a_json"
    }
  }
  if [userName] =~ "^.+@.+$" {
    mutate {
      merge => {
        "event.idm.entity.entity.user.email_addresses" => "userName"
      }
      on_error => "secondEmail_empty"
    }
    if ![secondEmail_empty] {
      mutate {
        replace => {
          "has_user" => "true"
        }
      }
    }
  }
  if [fullName] != "" {
    mutate {
      replace => {
        "event.idm.entity.entity.user.user_display_name" => "%{fullName}"
      }
      on_error => "not_a_json"
    }
  }
  if [userLastLogonDate] != "" {
    date {
      match => ["userLastLogonDate", "yyyy-MM-ddTHH:mm:ss.SS", "ISO8601" ]
      target => "event.idm.entity.entity.user.last_login_time"
      on_error => "invalid_time"
    }
  }
  if [integrationUserKey] != "" {
    mutate {
      replace => {
        "integrationUserKey_label.key" => "integrationUserKey"
        "integrationUserKey_label.value" => "%{integrationUserKey}"
      }
      on_error => "integrationUserKey_empty"
    }
    if ![integrationUserKey_empty] {
      mutate {
        merge => {
          "event.idm.entity.entity.user.attribute.labels" => "integrationUserKey_label"
        }
        on_error => "integrationUserKey_label_empty"
      }
    }
  }
  if [userStatus] != "" {
    mutate {
      replace => {
        "userStatus_label.key" => "userStatus"
        "userStatus_label.value" => "%{userStatus}"
      }
      on_error => "userStatus_empty"
    }
    if ![userStatus_empty] {
      mutate {
        merge => {
          "event.idm.entity.entity.user.attribute.labels" => "userStatus_label"
        }
        on_error => "userStatus_label_empty"
      }
    }
  }
  if [userLastPasswordChangeDate] != "" {
    date {
      match => ["userLastPasswordChangeDate", "yyyy-MM-ddTHH:mm:ss.SSS", "ISO8601" ]
      target => "event.idm.entity.entity.user.last_password_change_time"
      on_error => "invalid_time"
    }
  }
  if [has_user] == "true" {
    mutate {
      replace => {
        "event.idm.entity.metadata.entity_type" => "USER"
      }
      on_error => "not_a_json"
    }
  }
  else {
    mutate {
      replace => {
        "event.idm.entity.metadata.entity_type" => "UNKNOWN_ENTITYTYPE"
      }
    }
  }
  mutate {
    merge => {
      "@output" => "event"
    }
  }
}

