# Product: Airlock IAM
# Category: Application Whitelisting
# Supported Format: SYSLOG
# Reference: N/A
# Last Updated: 2024-08-28
# Copyright 2024 Chronicle LLC

filter {
  mutate {
    replace => {
      "version" => ""
      "event_time" => ""
      "host" => ""
      "target_hostname" => ""
      "metadata_description" => ""
      "accountStatus" => ""
      "lastLogin" => ""
      "companyCustomer" => ""
      "privateCustomer" => ""
      "otpNotifyChannel" => ""
      "companyAdministrator" => ""
      "target_pattern" => ""
      "category_value" => ""
      "packet_size_temp" => ""
      "email" => ""
      "creationDate" => ""
      "kv_data" => ""
      "detail" => ""
      "GSID" => ""
      "new_session_id" => ""
      "former_session_id" => ""
      "plugin_name" => ""
      "STATLOG" => ""
      "username" => ""
      "mechanism" => ""
      "UID" => ""
      "security_result" => ""
      "result_description" => ""
      "FORWARD_LOCATION" => ""
      "intermediary" => ""
      "REQUEST_ID" => ""
      "CLIENT_IP" => ""
      "auth_method" => ""
      "method" => ""
      "src_ip" => ""
      "target_port" => ""
      "src_port" => ""
      "session_id" => ""
      "nas_identifier" => ""
      "src_user" => ""
      "req_id" => ""
      "CONFIG_CONTEXT" => ""
      "logon_type" => ""
      "mob_num" => ""
      "task_name" => ""
      "src_userid" => ""
      "auth_status" => ""
      "airlock_version" => ""
      "target_url" => ""
      "jsessionid" => ""
      "user_agent" => ""
      "action_detail" => ""
      "file_path" => ""
      "exception" => ""
      "otp" => ""
      "role_name" => ""
      "role" => ""
      "packet_size" => ""
      "authenticator_type"=> ""
      "required_roles" => ""
      "report_message" => ""
      "service" => ""
      "firstName" => ""
      "lastName" => ""
      # -------
      "actionGroup" => ""
      "action" => ""
      "authnFactorDetail" => ""
      "engine" => ""
      "authenteeType" => ""
      "channel" => ""
      "authenteeId" => ""
      "status" => ""
      "authnFactor" => ""
      "representerId" => ""
      "authenteeProvidedId" => ""
      "end_info" => ""
      "authMethodShortDesc" => ""
      "authPluginClassName" => ""
      "displayName" => ""
      "nameid" => ""
      "mail" => ""
      "mobile" => ""
      "company" => ""
      "sn" => ""
      "department" => ""
      "expire_time" => ""
      "expire" => ""
      "ldap_type" => ""
      "ticket_value" => ""
      "ctxData" => ""
      "displayLanguage" => ""
      "nrPwdTrialsForUserDeletion" => ""
      "authInstant" => ""
      "auditToken" => ""
      "authPlugin" => ""
      "latestIdPropagation" => ""
      "profile_data" => ""
    }
  }

  mutate {
    gsub => ["message", '\\"','']
  }

  grok {
    match => {
      "message" => [
        "<%{INT}>%{INT:version} %{TIMESTAMP_ISO8601:event_time} %{DATA:target_hostname} %{GREEDYDATA:metadata_description} %{GREEDYDATA} - \\[%{GREEDYDATA:kv_data}\\] %{GREEDYDATA:detail}"
        '<%{INT}>%{INT:version} %{TIMESTAMP_ISO8601:event_time} %{DATA:target_hostname}%{GREEDYDATA} - - Received UDP packet from /%{IP:src_ip} that is not a valid RADIUS packet \\(%{GREEDYDATA:exception} \\(%{INT:packet_size} bytes\\)\\). Ignored packet.'
        'context data: - %{GREEDYDATA:end_info}\\*\\*\\*\\*\\* %{DATA:result_description} \\*\\*\\*\\*\\*'
        '<%{DATA:result_description} NotOnOrAfter=%{TIMESTAMP_ISO8601:expire_time} Recipient=%{GREEDYDATA:target_url} ></saml:SubjectConfirmationData></saml:SubjectConfirmation>'
        '<saml:NameID %{GREEDYDATA}>%{GREEDYDATA:nameid}</saml:NameID><saml:SubjectConfirmation Method=%{GREEDYDATA}>'
        ]
    }
    overwrite => ["version", "event_time", "target_hostname", "end_info", "kv_data", "nameid", "metadata_description", "expire_time", "target_url","detail", "exception" ,"src_ip", "packet_size", "result_description"]
    on_error => "grok_parse_failure"
  }

  if [grok_parse_failure] {
    drop {
      tag => "TAG_MALFORMED_MESSAGE"
    }
  }

  mutate {
    replace => {
      "event.idm.read_only_udm.metadata.product_name" => "Airlock IAM"
      "event.idm.read_only_udm.metadata.vendor_name" => "Airlock IAM"
      "event.idm.read_only_udm.metadata.event_type" => "GENERIC_EVENT"
    }
  }

  if [metadata_description] != "" {
    mutate {
      replace => {
        "event.idm.read_only_udm.metadata.description" =>
        "%{metadata_description}"
      }
      on_error => "metadata_description_error"
    }
  }

  kv {
    source => "kv_data"
    field_split => " "
    value_split => "="
    on_error => "not_kv"
  }

  if [expire_time] != "" {
    mutate {
        replace => {
          "expire_time_label.key" => "NotOnOrAfter"
          "expire_time_label.value.string_value" => "%{expire_time}"
        }
      }
      mutate {
          merge => {
            "event.idm.read_only_udm.additional.fields" => "expire_time_label"
          }
      }
  }

  if [end_info] != "" {
    kv {
    source => "end_info"
    field_split => "-"
    value_split => "="
    on_error => "not_kv"
  }

    if [authMethodShortDesc] != "" {
        mutate {
          replace => {
            "security_result.action_details" => "%{authMethodShortDesc}"
          }
          on_error => "authMethodShortDesc_failure"
      }
    }

    if [authPluginClassName] != "" {
      mutate {
        replace => {
          "event.idm.read_only_udm.extensions.auth.auth_details" =>
          "%{authPluginClassName}"
        }
        on_error => "authPluginClassName_failure"
      }
    }

    if [mail] =~ "^.+@.+$" {
      mutate {
        replace => {
          "event.idm.read_only_udm.src.email" => "%{mail}"
        }
        on_error => "mail_failure"
      }
    }

    if [displayName] != "" {
      mutate {
        replace => {
          "event.idm.read_only_udm.src.user.user_display_name" =>
          "%{displayName}"
        }
        on_error => "displayName_failure"
      }
    }

    if [mobile] != "" {
       mutate {
        replace => {
          "mob_num_label.key" => "mobile number"
          "mob_num_label.value.string_value" => "%{mobile}"
        }
      }
      mutate {
          merge => {
            "event.idm.read_only_udm.additional.fields" => "mob_num_label"
          }
      }
    }

    if [sn] != "" {
      mutate {
        replace => {
          "sn_label.key" => "sn"
          "sn_label.value.string_value" => "%{sn}"
        }
      }
      mutate {
          merge => {
            "event.idm.read_only_udm.additional.fields" => "sn_label"
          }
      }
    }
  }


  if [packet_size] != "" {
    mutate {
      convert => {
        "packet_size" => "integer"
      }
      on_error => "packet_size_error"
    }
    if ![packet_size_error] {
        mutate {
          rename => {
            "packet_size" => "event.idm.read_only_udm.network.received_packets"
          }
        }
    }
  }

  if [exception] != "" {
    mutate {
      replace => {
        "security_result.summary" => "%{exception}"
      }
      on_error => "exception_error"
    }
  }

  if [CONFIG_CONTEXT] != "" {
      mutate {
        replace => {
          "config_context_label.key" => "CONFIG_CONTEXT"
          "config_context_label.value.string_value" => "%{CONFIG_CONTEXT}"
        }
      }
      mutate {
          merge => {
            "event.idm.read_only_udm.additional.fields" =>
            "config_context_label"
          }
      }
  }

  if [REQUEST_ID] != "" {
    mutate {
      replace => {
        "event.idm.read_only_udm.metadata.product_log_id" => "%{REQUEST_ID}"
      }
      on_error => "REQUEST_ID_error"
    }
  }

  if [target_hostname] != "" {
    mutate {
      replace => {
        "event.idm.read_only_udm.target.hostname" => "%{target_hostname}"
      }
      on_error => "target_hostname_error"
    }
  }

  if [STATLOG] != "" {
    mutate {
      replace => {
        "security_result.summary" => "%{STATLOG}"
      }
      on_error => "STATLOG_error"
    }
    if [STATLOG] =~ "(AUTH_SUCCESS_USERNAME_PASSWORD|AUTH_FAILED_null|KERBEROS_SUCCESS|AUTH_SUCCESS_USERNAME|AUTH_SUCCESS_null)" {
      mutate {
          replace => {
              "logon_type" => "USERNAME_PASSWORD"
          }
          on_error => "logon_type_error"
      }

      if [target_hostname] != "" {
        mutate {
          replace => {
            "event.idm.read_only_udm.metadata.event_type" => "USER_LOGIN"
          }
          on_error => "event_type_error"
        }
      }

    }
  }

  if [detail] != "" {
    grok {
      match => {
        "detail" => [
          'Processing RADIUS Access Request on port %{INT:target_port} received from /%{IP:src_ip}:%{INT:src_port} Username=%{DATA:src_user}, NAS-Identifier=\\[%{DATA:nas_identifier}\\], Password/Response=%{DATA}, SessionId=\\[%{GREEDYDATA:session_id}\\]'
          'sent OTP token to mobile number %{INT:mob_num} for user %{DATA:src_userid} \\(%{DATA:src_user}\\)'
          'Task %{DATA:task_name} finished.'
          'Task %{DATA:task_name} starts getting executed.'
          'uid:%{DATA:UID} - provided_uid:%{DATA} - %{DATA:auth_status}: user not found - %{GREEDYDATA:task_name}'
          'Created new HTTP session for request: JSESSIONID is %{DATA:jsessionid} - User-Agent is %{DATA:user_agent} - Airlock IAM version is %{GREEDYDATA:airlock_version}'
          'overwrite authentee with username:%{GREEDYDATA:src_userid}'
          'successfully processed PersistentUser request %{GREEDYDATA} for user %{GREEDYDATA:src_userid}'
          '%{GREEDYDATA}\\| Credentials are correct for user %{USERNAME:src_userid}\\.(%{GREEDYDATA})?Responding with %{GREEDYDATA:action_detail}.'
          '%{GREEDYDATA}\\| Credentials are correct for user %{USERNAME:src_userid}%{GREEDYDATA}Responding with %{GREEDYDATA:action_detail}.'
          '%{GREEDYDATA}\\| Credentials are NOT correct for user %{DATA:src_userid}\\.(%{GREEDYDATA})?Responding with %{GREEDYDATA:action_detail}.'
          '%{GREEDYDATA}\\| Credentials are NOT correct for user %{USERNAME:src_userid}%{GREEDYDATA}Responding with %{GREEDYDATA:action_detail}.'
          'successfully loaded configuration file %{GREEDYDATA:file_path}'
          'Using authenticator %{DATA:authenticator_type} as second authenticator for user %{USERNAME:src_userid}%{GREEDYDATA}'
          '%{DATA:result_description}, user %{GREEDYDATA:src_userid} successfully logged in'
          'sends OTP %{INT:otp} to %{INT:mob_num} with sendType \\(%{DATA:mechanism}\\) for user %{DATA:src_userid} \\(%{DATA:username}\\)'
          'sends OTP %{INT:otp} to %{EMAILADDRESS:email} with sendType \\(%{DATA:mechanism}\\) for user %{DATA:src_userid} \\(%{DATA:username}\\)'
          'prepared %{WORD:mechanism} text Einmal-Passwort \\(OTP\\):%{INT:otp} for user %{DATA:src_userid},%{GREEDYDATA}'
          'Server information \\| Setting Airlock control cookie for identity propagation using HTTP header: %{GREEDYDATA:user_agent}'
          '%{GREEDYDATA} \\| %{DATA:result_description} \\| Forcing new Airlock WAF session ID using control cookie \\(value\\): SESSION=%{GREEDYDATA:session_id}'
          '%{GREEDYDATA} \\| Trace message \\| %{DATA:result_description}: AUTH_TICKET %{GREEDYDATA:user_agent}'
          '%{DATA:result_description} for %{DATA:src_userid}, counting up retries from 0 to 1'
          '%{GREEDYDATA} \\| Login successful. \\| User %{DATA:src_userid} %{DATA:result_description} \\[Additional req log data: clientIp=%{IP:CLIENT_IP}(,authenMethod=%{DATA:auth_method}\\])?(\\])?'
          'Choosing default target application because no application matches the forward location %{GREEDYDATA}'
          '%{GREEDYDATA} \\| %{DATA:result_description}. \\| Password verified to be correct for user %{GREEDYDATA:src_userid}.'
          'sent OTP token to mail address %{EMAILADDRESS:email} for user %{DATA:src_userid} \\(%{DATA:username}\\)'
          "REQID=%{DATA:req_id}   end on '%{DATA:target_url}' took %{INT} ms"
          "REQID=%{DATA:req_id} start on '%{DATA:target_url}' \\(%{DATA:method}\\)"
          "uid:%{DATA:src_userid} - %{GREEDYDATA} - %{DATA:result_description} \\(authentication method: %{DATA:auth_method}\\)%{GREEDYDATA}"
          '%{DATA:result_description}: new SSL session ID: %{DATA:new_session_id} \\(former SSL session ID: %{DATA:former_session_id}\\)'
          '%{GREEDYDATA:result_description} \\| Propagating authenticated user %{DATA:src_userid} using identity propagator plugin %{GREEDYDATA:plugin_name}'
          '%{GREEDYDATA} \\| %{DATA:result_description} \\| User %{DATA:src_userid} authenticated, roles: %{GREEDYDATA:role_name}'
          'Redirecting user to follow page %{GREEDYDATA:target_url}'
          '%{GREEDYDATA} \\| %{DATA:result_description} \\| Setting Airlock control cookie \\(value\\): %{GREEDYDATA:user_agent}'
          '%{GREEDYDATA:result_description} \\| Successfully authenticated user %{GREEDYDATA:src_userid} using %{DATA:auth_method} \\(more authentication steps may follow.'
          'Choosing target application with URL pattern %{DATA:target_pattern} because it matches the forward location %{GREEDYDATA:target_url}'
          'but the user %{DATA:src_userid} only has the roles \\[%{DATA:role_name}\\]. Starting authentication Step-Up using authenticator %{GREEDYDATA:authenticator_type} triggered by %{GREEDYDATA}'
          '%{GREEDYDATA} \\| Authentication not successful \\| Additional authentication steps required for user %{GREEDYDATA:src_userid}. Reason: %{DATA:result_description} \\[Additional req log data: clientIp=%{IP:CLIENT_IP}(,authenMethod=%{DATA:auth_method}\\])?(\\])?'
          '%{DATA:result_description} => %{GREEDYDATA:src_userid}'
          'ReportingMessage\\(%{GREEDYDATA:report_message}\\)'
          '%{GREEDYDATA:result_description}: Authentee is %{DATA:src_userid}, username from last authentication attempt is %{DATA}; ignoring'
          'to user %{DATA:src_userid} because of %{GREEDYDATA:result_description}.'
          'CryptoManager %{GREEDYDATA:result_description}'
          'retrieved OTP channel %{DATA:mechanism} from UPM for user %{GREEDYDATA:src_userid}'
          'uid:%{DATA} - provided_uid:%{DATA} - %{GREEDYDATA:result_description}'
          '%{GREEDYDATA:result_description}\\.\\.\\.'
          '%{GREEDYDATA:result_description}. This may be due to a problem with the Reference URI or its Transforms.'
          '%{DATA:action_detail}: {%{DATA:result_description}}(, Data: {NameID=%{GREEDYDATA:nameid}})?'
          '%{GREEDYDATA:result_description} for user %{GREEDYDATA:src_userid}, will use attributes from %{DATA:ldap_type} LDAP calls instead'
          '%{DATA:action_detail} of user %{GREEDYDATA:src_userid} was successful.'
          '%{GREEDYDATA} \\| Authentication failed. \\| Authentication result for user %{DATA:src_userid}: %{GREEDYDATA:action_detail} \\(Error message from LDAP-bind was: %{DATA}: LdapErr: %{DATA}, comment: %{GREEDYDATA:result_description}\\)'
          "REQID=%{DATA:req_id}   end of service '%{DATA:service}' on '%{DATA:target_url}' took %{INT} ms"
          "REQID=%{DATA:req_id} start of service '%{DATA:service}' on '%{DATA:target_url}' \\(%{DATA:method}\\)"
          '%{DATA:action_detail}: {%{GREEDYDATA:result_description},<saml:Subject>'
          'Setting Airlock IAM session ticket, value = Ticket \\(expires %{DATA:expire}\\) - %{GREEDYDATA:ticket_value}'
          'found user profile for userId=%{DATA:src_userid}: %{DATA}\\[%{GREEDYDATA:profile_data}\\]'
          ]
      }
      overwrite => ["src_ip", "target_port","CLIENT_IP", "src_port", "email",
       "service", "profile_data" , "expire", "ticket_value", "role_name",
       "target_pattern", "nameid", "ldap_type", "report_message", "target_url",
       "new_session_id", "former_session_id", "required_roles", "plugin_name",
       "host", "req_id", "session_id", "method", "authenticator_type", "otp",
       "mechanism", "result_description", "username" ,"nas_identifier",
       "auth_status", "auth_method", "src_user", "jsessionid", "user_agent",
       "airlock_version" ,"src_userid", "mob_num", "userid", "task_name",
       "UID", "action_detail", "file_path"]
      on_error => "detail_parse_failure"
    }
  }

  mutate {
    gsub => ["ticket_value","roles","role_name"]
  }
  mutate {
    gsub => ["profile_data","mobileNumber","mob_num"]
  }

  kv {
    source => "ticket_value"
    field_split => "; "
    value_split => "="
    on_error => "not_kv"
  }

  kv {
    source => "profile_data"
    field_split => ", "
    value_split => "="
    on_error => "not_kv"
  }

  if [firstName] != "" {
    mutate {
      replace => {
        "event.idm.read_only_udm.src.user.first_name" => "%{firstName}"
      }
      on_error => "firstName_error"
    }
  }

  if [lastName] != "" {
    mutate {
      replace => {
        "event.idm.read_only_udm.src.user.last_name" => "%{lastName}"
      }
      on_error => "lastName_error"
    }
  }

  if [department] != "" {
    mutate {
        replace => {
          "department_label.key" => "department"
          "department_label.value.string_value" => "%{department}"
        }
      }
      mutate {
          merge => {
            "event.idm.read_only_udm.additional.fields" => "department_label"
          }
      }
  }

  if [company] != "" {
      mutate {
        replace => {
          "event.idm.read_only_udm.src.user.company_name" => "%{company}"
        }
        on_error => "company_error"
    }
    }


  if [GSID] != "" {
    mutate {
      replace => {
        "event.idm.read_only_udm.network.session_id" => "%{GSID}"
      }
      on_error => "company_error"
    }
  }

  if [ctxData] != "" {
    mutate {
        replace => {
          "ctxData_label.key" => "ctxData"
          "ctxData_label.value.string_value" => "%{ctxData}"
        }
      }
      mutate {
          merge => {
            "event.idm.read_only_udm.additional.fields" => "ctxData_label"
          }
      }
  }

  if [displayLanguage] != "" {
    mutate {
        replace => {
          "displayLanguage_label.key" => "displayLanguage"
          "displayLanguage_label.value.string_value" => "%{displayLanguage}"
        }
      }
      mutate {
          merge => {
            "event.idm.read_only_udm.additional.fields" =>
            "displayLanguage_label"
          }
      }
  }

  if [nrPwdTrialsForUserDeletion] != "" {
    mutate {
        replace => {
          "nrPwdTrialsForUserDeletion_label.key" => "nrPwdTrialsForUserDeletion"
          "nrPwdTrialsForUserDeletion_label.value.string_value" =>
          "%{nrPwdTrialsForUserDeletion}"
        }
      }
      mutate {
          merge => {
            "event.idm.read_only_udm.additional.fields" =>
            "nrPwdTrialsForUserDeletion_label"
          }
      }
  }

  if [authInstant] != "" {
    mutate {
        replace => {
          "authInstant_label.key" => "authInstant"
          "authInstant_label.value.string_value" => "%{authInstant}"
        }
      }
      mutate {
          merge => {
            "event.idm.read_only_udm.additional.fields" => "authInstant_label"
          }
      }
  }

  if [auditToken] != "" {
    mutate {
        replace => {
          "auditToken_label.key" => "auditToken"
          "auditToken_label.value.string_value" => "%{auditToken}"
        }
      }
      mutate {
          merge => {
            "event.idm.read_only_udm.additional.fields" => "auditToken_label"
          }
      }
  }

  if [authPlugin] != "" {
    mutate {
        replace => {
          "authPlugin_label.key" => "authPlugin"
          "authPlugin_label.value.string_value" => "%{authPlugin}"
        }
      }
      mutate {
          merge => {
            "event.idm.read_only_udm.additional.fields" => "authPlugin_label"
          }
      }
  }

  if [latestIdPropagation] != "" {
    mutate {
        replace => {
          "latestIdPropagation_label.key" => "latestIdPropagation"
          "latestIdPropagation_label.value.string_value" =>
          "%{latestIdPropagation}"
        }
      }
      mutate {
          merge => {
            "event.idm.read_only_udm.additional.fields" =>
            "latestIdPropagation_label"
          }
      }
  }


  if [expire] != "" {
    mutate {
        replace => {
          "expire_time_label.key" => "expires"
          "expire_time_label.value.string_value" => "%{expire}"
        }
      }
      mutate {
          merge => {
            "event.idm.read_only_udm.additional.fields" => "expire_time_label"
          }
      }
  }

  if [service] != "" {
     mutate {
      replace => {
        "service_label.key" => "service"
        "service_label.value.string_value" => "%{service}"
      }
    }
    mutate {
        merge => {
          "event.idm.read_only_udm.additional.fields" => "service_label"
        }
    }
  }

  if [ldap_type] != "" {
    mutate {
      replace => {
        "ldap_type_label.key" => "LDAP"
        "ldap_type_label.value.string_value" => "%{ldap_type}"
      }
    }
    mutate {
        merge => {
          "event.idm.read_only_udm.additional.fields" => "ldap_type_label"
        }
    }
  }

  if [host] != "" {
    mutate {
        replace => {
          "event.idm.read_only_udm.principal.hostname" => "%{host}"
        }
        on_error => "host_error"
    }
  }

  if [report_message] != "" {
    kv {
    source => "report_message"
    field_split => ", "
    value_split => "="
    on_error => "not_kv"
  }

  if [actionGroup] != "" {
    mutate {
        merge => {
          "security_result.category_details" => "actionGroup"
        }
        on_error => "actionGroup_error"
    }
  }
  if [action] != "" {
    mutate {
        replace => {
          "security_result.action_details" => "%{action}"
        }
        on_error => "action_error"

    }
  }
  if [status] != "" {
    if [status] == "success" {
      mutate {
        replace => {
          "event.idm.read_only_udm.src.user.user_authentication_status" =>
          "ACTIVE"
        }
        on_error => "status_error"
    }
    }
    else {
      mutate {
        replace => {
          "event.idm.read_only_udm.src.user.user_authentication_status" =>
          "UNKNOWN_AUTHENTICATION_STATUS"
        }
        on_error => "status_error"
      }
    }
    }

    if [authenteeId] != "" {
      mutate {
        replace => {
          "event.idm.read_only_udm.src.user.userid" => "%{authenteeId}"
        }
        on_error => "authenteeId_error"
      }
    }

    if [authenteeType] != "" {
      if [authenteeType] == "user" {
        mutate {
          replace => {
            "role.type" => "TYPE_UNSPECIFIED"
          }
