# XITING_XAMS Parser
# Category: Log Aggregator
# Supported Format: SYSLOG
# Reference: N/A
# Last Updated: 2024-09-26
# Copyright 2024 Chronicle LLC

filter {
  mutate {
    replace => {
      "security_result" => ""
      "intermediary" => ""
      "no_source_address" => "true"
      "sapEventId" => ""
      "shost" => ""
      "suser" => ""
      "client" => ""
      "event_name_value" => ""
    }
  }

  csv {
    source => "message"
    separator => "|"
    lazy_quotes => true
    on_error => "invalid_cef_formate"
  }

  grok {
    match => {
      "column1" => "%{MONTH:last_seen_month}\\s*%{MONTHDAY:last_seen_day}\\s*%{TIME:last_seen_time}\\s*%{IPV4:host_ip}\\s*%{TIMESTAMP_ISO8601:last_seen_timestamp}\\s*%{USERNAME:hostname}\\s*%{USERNAME:applicationName}\\s*-\\s*-\\s*%{USERNAME:eventFormat}:%{NUMBER:eventFormatVersion}"
    }
    on_error => "invalid_grok_for_header"
  }

  mutate {
    gsub => ["column8", "(\\\s+)([0-9a-zA-Z_.-]+?)=", "^$2="]
  }

  kv {
    source => "column8"
    field_split => "^"
    value_split => "="
    whitespace => "strict"
    on_error => "invalid_kv_values"
  }

  if [invalid_grok_for_header] or [invalid_cef_formate] or [invalid_kv_values] {
    drop {
      tag => "TAG_MALFORMED_ENCODING"
    }
  }

  mutate {
    merge => {
      "intermediary.ip" => "host_ip"
    }
    on_error => "no_host_ip"
  }

  mutate {
    merge => {
      "security_result.category_details" => "sapClassName"
    }
    on_error => "no_sap_class_name"
  }

  mutate {
    replace => {
      "sapClassName_label.value.string_value" => "%{sapClassName}"
    }
    on_error => "no_sap_class_name"
  }

  if ![no_sap_class_name] {
    mutate {
      replace => {
        "sapClassName_label.key" => "SAP ClassName"
      }
    }
    mutate {
      merge => {
        "additional.fields" => "sapClassName_label"
      }
      on_error => "sap_class_label_merge_error"
    }
  }

  if [sapEventId] != "" {
    mutate {
      replace => {
        "metadata.product_event_type" => "%{sapEventId}"
      }
      on_error => "no_sap_event_id"
    }
  }
  else {
    mutate {
      replace => {
        "metadata.product_event_type" => "%{column5}"
      }
      on_error => "no_sap_event_id"
    }
  }

  if ![no_sap_event_id] and [sapEventId] == "AUF" {
    mutate {
      replace => {
        "cs_2.value.string_value" => "%{sapParamX}"
      }
      on_error => "no_sap_param_x"
    }
    if ![no_sap_param_x] and [sapParamX] != "" {
      mutate {
        replace => {
          "cs_2.key" => "Param F"
        }
      }
      mutate {
        merge => {
          "additional.fields" => "cs_2"
        }
      }
    }
  }

  if ![no_sap_event_id] and [sapEventId] in
  ["AUA","AUB","AUD","AU7","AU8","AU9","AUF"] {
    mutate {
      replace => {
        "principal.user.userid" => "%{duser}"
        "principal.user.user_display_name" => "%{duser}"
      }
      on_error => "no_duser"
    }
    if [sapEventId] != "AUF" {
      mutate {
        replace => {
          "target.user.userid" => "%{cs3}"
          "target.user.user_display_name" => "%{cs3}"
        }
        on_error => "no_cs3"
      }
    }
    else {
      mutate {
        replace => {
          "target.user.user_display_name" => "%{sapParamX}"
        }
        on_error => "no_sap_param_x"
      }
    }
  }
  else {
    mutate {
      replace => {
        "target.user.user_display_name" => "%{duser}"
      }
      on_error => "no_duser"
    }
  }

  if [column5] == "USER_TYPE_SWITCH" {
    mutate {
      replace => {
        "principal.user.userid" => "%{cs1}"
        "principal.user.user_display_name" => "%{cs1}"
      }
    }
  }



  date {
    match => ["last_seen_timestamp", "RFC3339", "UNIX", "ISO8601", "UNIX_MS"]
    target => "metadata.collected_timestamp"
    on_error => "no_last_seen_timestamp"
  }

  date {
    match => ["sapTsUtc","ISO8601"]
    on_error => "no_ts"
  }

  mutate {
    replace => {
      "intermediary.hostname" => "%{hostname}"
    }
    on_error => "no_hostname"
  }

  mutate {
    replace => {
      "application_name.value.string_value" => "%{applicationName}"
    }
    on_error => "no_application_name"
  }
  if ![no_application_name] {
    mutate {
      replace => {
        "application_name.key" => "applicationName"
      }
    }
    mutate {
      merge => {
        "additional.fields" => "application_name"
      }
    }
  }

  mutate {
    replace => {
      "event_format.value.string_value" => "%{eventFormat}"
    }
    on_error => "no_event_format"
  }
  if ![no_event_format] {
    mutate {
      replace => {
        "event_format.key" => "eventFormat"
      }
    }
    mutate {
      merge => {
        "additional.fields" => "event_format"
      }
    }
  }

  mutate {
    replace => {
      "event_format_version.value.string_value" => "%{eventFormatVersion}"
    }
    on_error => "no_event_format_version"
  }
  if ![no_event_format_version] {
    mutate {
      replace => {
        "event_format_version.key" => "eventFormatVersion"
      }
    }
    mutate {
      merge => {
        "additional.fields" => "event_format_version"
      }
    }
  }

  mutate {
    replace => {
      "metadata.vendor_name" => "%{column2}"
    }
    on_error => "no_device_vendor_name"
  }

  mutate {
    replace => {
      "metadata.product_name" => "%{column3}"
    }
    on_error => "no_device_product_name"
  }

  if [column5] == "/XITING/SA_S_SAL_PROTOCOL" {
    mutate {
      replace => {
        "metadata.product_name" => "Security Audit Log"
      }
    }
    mutate {
      replace => {
        "metadata.vendor_name" => "SAP"
      }
    }
  }

  mutate {
    replace => {
      "metadata.product_version" => "%{column4}"
    }
    on_error => "no_device_version"
  }

  if ![no_sap_event_id] and [sapEventId] == "AU7" {
    mutate {
      replace => {
        "device_event_class_id.value.string_value" => "%{sapEventId}"
      }
      on_error => "no_device_event_class_id"
    }
  }
  else {
    mutate {
      replace => {
        "device_event_class_id.value.string_value" => "%{column5}"
      }
      on_error => "no_device_event_class_id"
    }
  }
  if ![no_device_event_class_id] {
    mutate {
      replace => {
        "device_event_class_id.key" => "deviceEventClassID"
      }
    }
    mutate {
      merge => {
        "additional.fields" => "device_event_class_id"
      }
    }
  }


  mutate {
    replace => {
      "security_result.severity_details" => "%{column7}"
    }
    on_error => "no_severity_found"
  }
  if ![no_severity_found] {
    if [column7] in ["0", "1", "2", "3"] {
      mutate {
        replace => {
          "security_result.severity" => "LOW"
        }
      }
    }
    else if [column7] in ["4", "5", "6"] {
      mutate {
        replace => {
          "security_result.severity" => "MEDIUM"
        }
      }
    }
    else if [column7] in ["7", "8"] {
      mutate {
        replace => {
          "security_result.severity" => "HIGH"
        }
      }
    }
    else if [column7] in ["9", "10"] {
      mutate {
        replace => {
          "security_result.severity" => "CRITICAL"
        }
      }
    }
    else {
      mutate {
        replace => {
          "security_result.severity" => "UNKNOWN_SEVERITY"
        }
      }
    }
  }

  mutate {
    replace => {
      "sap_instance.value.string_value" => "%{sapInstance}"
    }
    on_error => "no_sap_instance"
  }
  if ![no_sap_instance] {
    mutate {
      replace => {
        "sap_instance.key" => "SAP Instance"
      }
    }
    mutate {
      merge => {
        "additional.fields" => "sap_instance"
      }
    }
  }

  mutate {
    replace => {
      "cs_4.value.string_value" => "%{cs4}"
    }
    on_error => "no_cs_4"
  }
  if ![no_cs_4] {
    if [sapEventId] == "AU7" {
      mutate {
        replace => {
          "cs_4.key" => "Client"
        }
      }
    }
    else {
      mutate {
        replace => {
          "cs_4.key" => "cs4Label"
        }
      }
    }
    mutate {
      merge => {
        "additional.fields" => "cs_4"
      }
    }
  }
  grok {
    match => {
      "sapTsDate" => "(?P<year>\\d\\d\\d\\d)(?P<month>\\d\\d)(?P<date>\\d\\d)"
    }
    on_error => "no_sap_ts_date"
  }
  grok {
    match => {
      "sapTsTime" => "(?P<hour>\\d\\d)(?P<minutes>\\d\\d)(?P<seconds>\\d\\d)"
    }
    on_error => "no_sap_ts_time"
  }
  if ![no_sap_ts_time] and ![no_sap_ts_date] {
    mutate {
      replace => {
        "timestamp" =>
        "%{year}-%{month}-%{date} %{hour}:%{minutes}:%{seconds}"
      }
    }
    date {
      match => ["timestamp", "yyyy-MM-dd HH:mm:ss"]
      timezone => "Europe/Paris"
    }
  }





  if ![no_sap_event_id]  and [sapEventId] != "" {
    if [sapEventId] == "AUA" {
      mutate {
        replace => {
          "event_name_value" => "User Unlocked"
        }
      }
    }
    else if [sapEventId] == "AUB" {
      mutate {
        replace => {
          "event_name_value" => "Authorizations for User Changed"
        }
      }
    }
    else if [sapEventId] == "AUD" {
      mutate {
        replace => {
          "event_name_value" => "User Master Record Changed"
        }
      }
    }
    else if [sapEventId] == "AU7" {
      mutate {
        replace => {
          "event_name_value" => "User Created"
        }
      }
    }
    else if [sapEventId] == "AU8" {
      mutate {
        replace => {
          "event_name_value" => "User Deleted"
        }
      }
    }
    else if [sapEventId] == "AU9" {
      mutate {
        replace => {
          "event_name_value" => "User Locked"
        }
      }
    }
    else if [sapEventId] == "AU1" {
      mutate {
        replace => {
          "event_name_value" => "Logon Successful"
        }
      }
    }
    else if [sapEventId] == "AU2" {
      mutate {
        replace => {
          "event_name_value" => "Logon Failed"
        }
      }
    }
    else if [sapEventId] == "AU3" {
      mutate {
        replace => {
          "event_name_value" => "Transaction Started"
        }
      }
    }
    else if [sapEventId] == "AUE" {
      mutate {
        replace => {
          "event_name_value" => "Audit Configuration Changed"
        }
      }
    }
    else if [sapEventId] == "AU4" {
      mutate {
        replace => {
          "event_name_value" => "Start of transaction failed"
        }
      }
    }
    else if [sapEventId] == "BUJ" {
      mutate {
        replace => {
          "event_name_value" => "Non encrypted communication"
        }
      }
    }
    else if [sapEventId] == "CUZ" {
      mutate {
        replace => {
          "event_name_value" => "Generic table access by RFC"
        }
      }
    }
    else if [sapEventId] == "BUZ" {
      mutate {
        replace => {
          "event_name_value" => "In Program"
        }
      }
    }
    else if [sapEventId] == "AUF" {
      mutate {
        replace => {
          "event_name_value" => "Audit: Slot Class Severity User Client"
        }
      }
    }
    else if [sapEventId] == "AUI" {
      mutate {
        replace => {
          "event_name_value" => "Audit: Slot Inactive"
        }
      }
    }
    else if [sapEventId] == "AUJ" {
      mutate {
        replace => {
          "event_name_value" => "Audit: Active Status Set"
        }
      }
    }
    else if [sapEventId] == "AUL" {
      mutate {
        replace => {
          "event_name_value" => "Failed RFC Call"
        }
      }
    }
    else if [sapEventId] == "AUK" {
      mutate {
        replace => {
          "event_name_value" => "Successful RFC Call"
        }
      }
    }
    else if [sapEventId] == "AUW" {
      mutate {
        replace => {
          "event_name_value" => "Report Started"
        }
      }
    }
    else if [sapEventId] == "AU5" {
      mutate {
        replace => {
          "event_name_value" => "RFC/CPIC Logon Successful"
        }
      }
    }
    else if [sapEventId] == "DU9" {
      mutate {
        replace => {
          "event_name_value" => "Generic table access call"
        }
      }
    }
    else if [sapEventId] == "BU2" {
      mutate {
        replace => {
          "event_name_value" => "Password Changed for User"
        }
      }
    }
    else if [sapEventId] == "CUL" {
      mutate {
        replace => {
          "event_name_value" => "Field contents changed"
        }
      }
    }
  }

  mutate {
    replace => {
      "event_name.value.string_value" => "%{column6}"
    }
    on_error => "no_event_name"
  }
  if ![no_event_name] {
    mutate {
      replace => {
        "event_name.key" => "eventName"
      }
    }
    mutate {
      merge => {
        "additional.fields" => "event_name"
      }
    }
  }

  if [event_name_value] != "" {
    mutate {
      replace => {
        "metadata.description" => "%{event_name_value}"
      }
      on_error => "no_event_name_value"
    }
  }
  else if [column6] != "" {
    mutate {
      replace => {
        "metadata.description" => "%{column6}"
      }
      on_error => "no_column6"
    }
  }

  mutate {
    replace => {
      "security_result.description" => "%{msg}"
    }
    on_error => "no_msg"
  }


  if ![no_sap_event_id] and [sapEventId] in ["AUA","AUB","AUD","AU8","AU9","AU1","AU2","AU3","AUE"] {
    mutate {
      replace => {
        "cs_3.key" => "Report"
        "cs_3.value.string_value" => "%{flexString1}"
      }
      on_error => "no_cs_3"
    }
  }
  else if ![no_sap_event_id] and [sapEventId] == "AU7" {
    mutate {
      replace => {
        "cs_3.key" => "Report"
        "cs_3.value.string_value" => "%{cs3}"
      }
      on_error => "no_cs_3"
    }
  }
  else if ![no_sap_event_id] and [sapEventId] in ["BUZ","AUW"] {
    mutate {
      replace => {
        "cs_3.key" => "Program"
        "cs_3.value.string_value" => "%{cs3}"
      }
      on_error => "no_cs_3"
    }
  }
  else if ![no_sap_event_id] and [sapEventId] == "AUF" {
    mutate {
      replace => {
        "cs_3.key" => "Slot"
        "cs_3.value.string_value" => "%{cs3}"
      }
      on_error => "no_cs_3"
    }
  }
  else if ![no_sap_event_id] and [sapEventId] in ["AUK","AUL"] {
    mutate {
      replace => {
        "cs_3.key" => "Function Group"
        "cs_3.value.string_value" => "%{cs3}"
      }
      on_error => "no_cs_3"
    }
  }
  else if ![no_sap_event_id] and [sapEventId] == "AU5" {
    mutate {
      replace => {
        "cs_3.key" => "Type"
        "cs_3.value.string_value" => "%{cs3}"
      }
      on_error => "no_cs_3"
    }
  }
  else if ![no_sap_event_id] and [sapEventId] == "BU2" {
    mutate {
      replace => {
        "cs_3.key" => "Client"
        "cs_3.value.string_value" => "%{cs3}"

      }
      on_error => "no_cs_3"
    }
  }
  else if ![no_sap_event_id] and [sapEventId] == "CUL" {
    mutate {
      replace => {
        "cs_3.key" => "Field"
        "cs_3.value.string_value" => "%{cs3}"
      }
      on_error => "no_cs_3"
    }
  }
  else {
    mutate {
      replace => {
        "cs_3.key" => "%{cs3Label}"
      }
      on_error => "no_cs3_key"
    }
    if [no_cs3_key] {
      mutate {
        replace => {
          "cs_3.key" => "cs3Label"
        }
      }
    }
    mutate {
      replace => {
        "cs_3.value.string_value" => "%{cs3}"
      }
      on_error => "no_cs_3"
    }
  }

  if ![no_cs_3] {
    mutate {
      merge => {
        "additional.fields" => "cs_3"
      }
    }
  }

  if ![no_sap_event_id] and [sapEventId] == "AU4" {
    mutate {
      replace => {
        "reason.value.string_value" => "%{sapParam2}"
      }
      on_error => "no_reason"
    }

    if ![no_reason] {
      mutate {
        replace => {
          "reason.key" => "reason"
        }
      }
      mutate {
        merge => {
          "additional.fields" => "reason"
        }
      }
    }
  }
  else if ![no_sap_event_id] and [sapEventId] in ["BUJ","CUZ","DU9"] {
    mutate {
      replace => {
        "device_action.value.string_value" => "%{sapParam2}"
      }
      on_error => "no_device_action"
    }
    if ![no_device_action] {
      mutate {
        replace => {
          "device_action.key" => "deviceAction"
        }
      }
      mutate {
        merge => {
          "additional.fields" => "device_action"
        }
      }
    }
  }
  else if ![no_sap_event_id] and [sapEventId] in ["BUZ","AUF"] {
    mutate {
      replace => {
        "cn2.value.string_value" => "%{sapParam2}"
      }
      on_error => "no_cn2"
    }
    if ![no_cn2] {
      if [sapEventId] == "BUZ" {
        mutate {
          replace => {
            "cn2.key" => "Line"
          }
        }
      }
      else {
        mutate {
          replace => {
            "cn2.key" => "Class"
          }
        }
      }
      mutate {
        merge => {
          "additional.fields" => "cn2"
        }
      }
    }
  }
  else {
    mutate {
      replace => {
        "sap_param_2.value.string_value" => "%{sapParam2}"
      }
      on_error => "no_sap_param_2"
    }
    if ![no_sap_param_2] {
      mutate {
        replace => {
          "sap_param_2.key" => "sapParam2"
        }
      }
      mutate {
        merge => {
          "additional.fields" => "sap_param_2"
        }
      }
    }
  }


  mutate {
    replace => {
      "cs_5_key" => "cs5Label"
    }
  }

  if ![no_sap_event_id] and [sapEventId] == "BUZ" {
    mutate {
      replace => {
        "cs_5_key" => "Event"
      }
    }
  }
  else if ![no_sap_event_id] and [sapEventId] == "AUF" {
    mutate {
      replace => {
        "cs_5_key" => "Severity"
      }
    }
  }
  else if ![no_sap_event_id] and [sapEventId] in ["AUL","AUK"] {
    mutate {
      replace => {
        "cs_5_key" => "RFC Call"
      }
    }
  }
  else if ![no_sap_event_id] and [sapEventId] == "AU5" {
    mutate {
      replace => {
        "cs_5_key" => "Method"
      }
    }
  }
  else if ![no_sap_event_id] and [sapEventId] == "DU9" {
    mutate {
      replace => {
        "cs_5_key" => "Auth. Check"
      }
    }
  }
  else if ![no_sap_event_id] and [sapEventId] == "AU7" {
    mutate {
      replace => {
        "cs_5_key" => "ParamC"
      }
    }
  }

  mutate {
    replace => {
      "cs_5.value.string_value" => "%{cs5}"
    }
    on_error => "no_cs_5"
  }
  if ![no_cs_5] {
    mutate {
      replace => {
        "cs_5.key" => "%{cs_5_key}"
      }
    }
    mutate {
      merge => {
        "additional.fields" => "cs_5"
      }
    }
  }

  mutate {
    replace => {
      "sap_severity.value" => "%{sapSeverity}"
    }
    on_error => "no_sap_severity"
  }
  if ![no_sap_severity] and [sapSeverity] != "" {
    mutate {
      replace => {
        "sap_severity.key" => "SAP Severity"
      }
    }
    mutate {
      merge => {
        "security_result.detection_fields" => "sap_severity"
      }
    }
  }

  mutate {
    replace => {
      "principal.application" => "%{devicePayloadId}"
    }
    on_error => "no_device_payload_id"
  }

  if [shost] != "" {
    grok {
      match => {
        "shost" => "%{DATA:shost}_%{GREEDYDATA:client}"
      }
      overwrite => ["shost","client"]
      on_error => "no_shost_client"
    }
    mutate {
      replace => {
        "principal.application" => "%{shost}"
      }
      on_error => "no_shost"
    }
  }

  if [client] != "" {
    mutate {
      replace => {
        "client_label.value.string_value" => "%{client}"
        "client_label.key" => "client"
      }
      on_error => "no_client"
    }
    if ![no_client] {
      mutate {
        merge => {
          "additional.fields" => "client_label"
        }
        on_error => "no_client_label"
      }
    }
  }

  if [suser] != "" {
    mutate {
      replace => {
        "principal.user.userid" => "%{suser}"
        "principal.user.user_display_name" => "%{suser}"
      }
      on_error => "no_suser"
    }
  }


  if ![no_sap_event_id] and [sapEventId] in
  ["AUA","AUB","AUD","AU7","AU8","AU9","AU1","AU2","AU3","AUE","AU4","BUJ",
  "CUZ","BUZ","AUF","AUI","AUJ","AUL","AUK","AUW","AU5","DU9","BU2","CUL"] {
    grok {
        match => {
            "cs1" => "%{IPV4:valid_source_address}"
        }
        on_error => "invalid_source_address"
    }
    if ![invalid_source_address] {
        mutate {
          replace => {
            "no_source_address" => "false"
          }
        }
        mutate {
            merge => {
                "principal.ip" => "valid_source_address"
            }
            on_error => "no_valid_source_address"
        }
    }
    else {
        mutate {
            replace => {
                "source_address.value.string_value" => "%{cs1}"
            }
            on_error => "no_invalid_source_address"
        }
        if ![no_invalid_source_address] {
            mutate {
                replace => {
                    "source_address.key" => "Terminal"
                }
            }
            mutate {
                merge => {
                    "additional.fields" => "source_address"
                }
            }
        }
    }
  }
  else {
    mutate {
      replace => {
        "cs_1.value.string_value" => "%{cs1}"
      }
      on_error => "no_cs_1"
    }
    if ![no_cs_1] {
      mutate {
        replace => {
          "cs_1.key" => "%{cs1Label}"
        }
        on_error => "no_cs1Label"
      }
      if [no_cs1Label] {
        mutate {
          replace => {
            "cs_1.key" => "cs1Label"
          }
        }
      }
      mutate {
        merge => {
          "additional.fields" => "cs_1"
        }
      }
    }
  }

  mutate {
    replace => {
      "cs_2.value.string_value" => "%{cs2}"
    }
    on_error => "no_cs_2"
  }

  if ![no_cs_2] {
    if [sapEventId] == "AU7" {
      mutate {
        replace => {
          "cs_2.key" => "Transaction"
        }
      }
    }
    else {
      mutate {
        replace => {
          "cs_2.key" => "%{cs2Label}"
        }
        on_error => "no_cs2Label"
      }
      if [no_cs2Label] {
        mutate {
          replace => {
            "cs_2.key" => "cs2Label"
          }
        }
      }
    }
    mutate {
      merge => {
        "additional.fields" => "cs_2"
      }
    }
  }

  if ![no_sap_event_id] and [sapEventId] not in
  ["AUA","AUB","AUD","AU8","AU9","AU1","AU2","AU3","AUE"] {
    mutate {
      replace => {
        "flex_string_1.value.string_value" => "%{flexString1}"
      }
      on_error => "no_flex_string_1"
    }
    if ![no_flex_string_1] {
      mutate {
        replace => {
          "flex_string_1.key" => "SLGREPNA"
        }
      }
      mutate {
        merge => {
          "additional.fields" => "flex_string_1"
        }
      }
    }
  }

  if [event_name_value] =~ "(?i)fail" {
    mutate {
      replace => {
        "action_value" => "FAIL"
      }
    }
    mutate {
      merge => {
        "security_result.action" => "action_value"
      }
    }
  }
  else {
    mutate {
      replace => {
        "action_value" => "ALLOW"
      }
    }
    mutate {
      merge => {
        "security_result.action" => "action_value"
      }
    }
  }



  mutate {
    replace => {
      "sap_class_id.value.string_value" => "%{sapClassId}"
    }
    on_error => "no_sap_class_id"
  }
  if ![no_sap_class_id] {
    mutate {
      replace => {
        "sap_class_id.key" => "SAP Audit Class ID"
      }
    }
    mutate {
      merge => {
        "additional.fields" => "sap_class_id"
      }
    }
  }

  if ![no_duser] and ![no_sap_class_name] and [sapClassName] =~ "Logon" {
    mutate {
      replace => {
        "metadata.event_type" => "USER_LOGIN"
        "extensions.auth.type" => "AUTHTYPE_UNSPECIFIED"
      }
    }
  }
  else if [no_source_address] != "true" {
    mutate {
      replace => {
        "metadata.event_type" => "STATUS_UPDATE"
      }
    }
  }
  else {
    mutate {
      replace => {
        "metadata.event_type" => "GENERIC_EVENT"
      }
    }
  }

  if [metadata] != "" {
    mutate {
      rename => {
        "metadata" => "event.idm.read_only_udm.metadata"
        "principal" => "event.idm.read_only_udm.principal"
        "target" => "event.idm.read_only_udm.target"
        "additional" => "event.idm.read_only_udm.additional"
        "extensions" => "event.idm.read_only_udm.extensions"
      }
    }
  }

  if [security_result] != "" {
    mutate {
      merge => {
        "event.idm.read_only_udm.security_result" => "security_result"
      }
    }
  }

  if [intermediary] != "" {
    mutate {
      merge => {
        "event.idm.read_only_udm.intermediary" => "intermediary"
      }
    }
  }

  mutate {
    merge => {
      "@output" => "event"
    }
  }
}
