# Product: Entrust nShield HSM
# Category: Hardware Security Module
# Supported Format: SYSLOG
# Reference: N/A
# Last Updated: 2024-10-15
# Copyright 2024 Chronicle LLC

filter {
  mutate {
    replace => {
      "ts" => ""
      "application" => ""
      "user" => ""
      "desc" => ""
      "sev" => ""
      "event_type" => ""
      "has_user" => "false"
      "rhost" => ""
      "kv_data" => ""
      "metadata" => ""
      "principal" => ""
      "target" => ""
      "network" => ""
      "additional" => ""
      "security_result" => ""
      "ip" => ""
      "port" => ""
      "product_event" => ""
      "has_principal" => ""
      "session_id" => ""
      "summary" => ""
    }
  }
  mutate {
    gsub => ["message", "\\r\\n", ""]
  }
  grok {
    match => {
       "message" => [
          "<%{INT}>%{SYSLOGTIMESTAMP:ts} %{DATA:application} %{DATA:product_event}\\[%{INT}\\]: %{GREEDYDATA:desc}"
        ]
    }
    overwrite => ["ts","application","desc","product_event"]
    on_error  => "header_grok_match_failed"
  }
  if [header_grok_match_failed] {
    drop {
      tag => "TAG_MALFORMED_MESSAGE"
    }
  }
  if [application] != "" {
    mutate {
      replace => {
        "principal.application" => "%{application}"
      }
      on_error => "application_value_invalid"
    }
  }
  if [desc] != "" {
    grok {
      match => {
        "desc" => [
          "%{GREEDYDATA} %{INT:session_id} of user %{GREEDYDATA:user}.",
          "%{GREEDYDATA} from %{IP:ip} port %{INT:port}",
          "%{GREEDYDATA} from user %{DATA:user} %{IP:ip} port %{INT:port}",
          "%{DATA}: %{DATA:summary}; %{GREEDYDATA:kv_data}"
        ]
      }
      overwrite => ["session_id","ip","port","user","summary","kv_data"]
      on_error => "desc_value_invalid"
    }
  }
  if [ip] != "" {
    mutate {
      merge => {
        "principal.ip" => "ip"
        "principal.asset.ip" => "ip"
      }
      on_error => "ip_value_invalid"
    }
    if ![ip_value_invalid] {
      mutate {
        replace => {
          "has_principal" => "true"
        }
      }
    }
  }
  if [session_id] != "" {
    mutate {
      replace => {
        "network.session_id" => "%{session_id}"
      }
      on_error => "session_id_value_invalid"
    }
  }
  if [port] != "" {
    mutate {
      replace => {
        "principal.port" => "%{port}"
      }
      on_error => "port_value_invalid"
    }
    mutate {
      convert => {
        "principal.port" => "integer"
      }
      on_error => "port_conversion_failure"
    }
  }
  if [desc] != "" {
    mutate {
      replace => {
        "metadata.description" => "%{desc}"
      }
      on_error => "desc_value_invalid"
    }
  }
  if [ts] != "" {
    date {
      match => ["ts", "MMM d HH:mm:ss"]
      rebase => true
      on_error => "ts_value_invalid"
    }
  }
  if [product_event] != "" {
    mutate {
      replace => {
        "metadata.product_event_type" => "%{product_event}"
      }
      on_error => "event_type_value_invalid"
    }
  }
  if [kv_data] != "" {
    mutate {
      gsub => ["kv_data", "(\\s+)(\\S+)=", "#$2="]
    }
  }
  kv {
    source => "kv_data"
    field_split => "#"
    value_split => "="
    on_error => "kv_fail"
  }
  if [rhost] != "" {
    mutate {
      merge => {
        "principal.ip" => "rhost"
        "principal.asset.ip" => "rhost"
      }
      on_error => "rhost_value_invalid"
    }
    if ![rhost_value_invalid] {
      mutate {
        replace => {
          "has_principal" => "true"
        }
      }
    }
  }
  if [user] != "" {
    mutate {
      replace => {
        "principal.user.userid" => "%{user}"
        "has_user" => "true"
      }
      on_error => "user_value_invalid"
    }
  }
  mutate {
    replace => {
      "metadata.vendor_name" => "ENTRUST HSM"
      "metadata.product_name" => "Entrust nShield HSM"
    }
  }
  if [has_user] == "true" {
    mutate {
      replace => {
        "metadata.event_type" => "USER_UNCATEGORIZED"
      }
    }
  } else if [has_principal] == "true" {
    mutate {
      replace => {
        "metadata.event_type" => "STATUS_UPDATE"
      }
    }
  } else {
    mutate {
      replace => {
        "metadata.event_type" => "GENERIC_EVENT"
      }
    }
  }
  if [metadata] != "" {
    mutate {
      rename => {
        "metadata" => "event.idm.read_only_udm.metadata"
      }
    }
  }
  if [principal] != "" {
    mutate {
      rename => {
        "principal" => "event.idm.read_only_udm.principal"
      }
    }
  }
  if [target] != "" {
    mutate {
      rename => {
        "target" => "event.idm.read_only_udm.target"
      }
    }
  }
  if [network] != "" {
    mutate {
      rename => {
        "network" => "event.idm.read_only_udm.network"
      }
    }
  }
  if [additional] != "" {
    mutate {
      rename => {
        "additional" => "event.idm.read_only_udm.additional"
      }
    }
  }
  if [security_result] != "" {
    mutate {
      merge => {
        "event.idm.read_only_udm.security_result" => "security_result"
      }
      on_error => "security_result_empty"
    }
  }
  mutate {
    merge => {
      "@output" => "event"
    }
  }
}
