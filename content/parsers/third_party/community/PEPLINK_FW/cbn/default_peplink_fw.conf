# Product: PEPLINK_FW
# Category: Firewall
# Supported Format: SYSLOG + KV
# Reference: NA
# Last Updated: 2023-08-17
# Copyright 2023 Chronicle LLC
filter {
  mutate {
    replace => {
      "timestamp" => ""
      "hostname" => ""
      "action" => ""
      "description" => ""
      "principal" => ""
      "target" => ""
      "intermediary" => ""
      "security_result" => ""
      "security_action" => ""
      "network" => ""
      "event_type" => ""
      "product_event_type" => ""
      "dhcpServerIp" => ""
      "requestedIp" => ""
      "clientMac" => ""
      "targetPort" => ""
      "targetIp" => ""
      "desc" => ""
      "Authenticator" => ""
      "Hostname" => ""
      "ID" => ""
      "Retry" => ""
      "userEmail" => ""
      "userName" => ""
      "principalIp" => ""
    }
  }

  grok {
    match => {
      "message" => "%{SYSLOGTIMESTAMP:timestamp} %{HOSTNAME:hostname} %{GREEDYDATA:product_event_type}: %{GREEDYDATA:description}"
    }
    overwrite => ["description","timestamp","hostname","product_event_type"]
    on_error => "not_valid_pattern"
  }

  if [timestamp] != "" {
    date {
      match => ["timestamp", "MMM dd HH:mm:ss", "MMM d HH:mm:ss"]
      rebase => true
    }
  }

  if [hostname] != "" {
    mutate {
      rename => {
        "hostname" => "intermediary.hostname"
      }
    }
  }

  if [product_event_type] == "Firewall" and [description] != "" {
    grok {
      match => {
        "description" => "%{WORD:action} %{GREEDYDATA:description}"
      }
      overwrite => ["action","description"]
    }
    if [action] != "" {
      if [action] == "(i)Allowed" {
        mutate {
          replace => {
            "security_action" => "ALLOW"
          }
        }
      } else if [action] == "(i)denied" {
        mutate {
          replace => {
            "security_action" => "BLOCK"
          }
        }
      }

      if [security_action] != "" {
        mutate {
          merge => {
            "security_result.action" => "security_action"
          }
        }
      }

      mutate {
        replace => {
          "security_result.action_details" => "%{action}"
        }
      }
    }
    mutate {
      gsub => [ "description", " ([a-zA-Z0-9]+=)", "|$1" ]
    }

    mutate {
      replace => {
        "CONN" => ""
        "SPT" => ""
        "DPT" => ""
        "SRC" => ""
        "DST" => ""
        "PROTO" => ""
        "SEQ" => ""
        "TTL" => ""
        "TYPE" => ""
        "RES" => ""
        "LEN" => ""
        "CODE" => ""
        "URGP" => ""
        "TOS" => ""
        "DF" => ""
        "PREC" => ""
        "ID" => ""
        "WINDOW" => ""
        "flags_values" => ""
      }
    }

    kv {
      source => "description"
      field_split => "|"
      value_split => "="
      on_error => "not_kv"
    }

    if [CONN] != "" {
      mutate {
        replace => {
          "connection_label.key" => "CONN"
          "connection_label.value.string_value" => "%{CONN}"
        }
        merge => {
          "event.idm.read_only_udm.additional.fields" => "connection_label"
        }
        "on_error" => "connection_label_not_set"
      }
    }

    if [PROTO] != "" {
      mutate {
        rename => {
          "PROTO" => "protocol_number_src"
        }
      }
      mutate {
        replace => {
          "ip_protocol_out" => "UNKNOWN_IP_PROTOCOL"
        }
      }
      if [protocol_number_src] in [ 1, "ICMP", "ICMPV6", 58 ] {
        mutate {
          replace => {
            "ip_protocol_out" => "ICMP"
          }
        }
      } else if [protocol_number_src] in [ 2, "IGMP" ] {
        mutate {
          replace => {
            "ip_protocol_out" => "IGMP"
          }
        }
      } else if [protocol_number_src] in [ 6, "TCP" ] {
        mutate {
          replace => {
            "ip_protocol_out" => "TCP"
          }
        }
      } else if [protocol_number_src] in [ 17, "UDP" ] {
        mutate {
          replace => {
            "ip_protocol_out" => "UDP"
          }
        }
      } else if [protocol_number_src] in [ 41, "IP6IN4" ] {
        mutate {
          replace => {
            "ip_protocol_out" => "IP6IN4"
          }
        }
      } else if [protocol_number_src] in [ 47, "GRE" ] {
        mutate {
          replace => {
            "ip_protocol_out" => "GRE"
          }
        }
      } else if [protocol_number_src] in [ 50, "ESP" ] {
        mutate {
          replace => {
            "ip_protocol_out" => "ESP"
          }
        }
      } else if [protocol_number_src] in [ 88, "EIGRP" ] {
        mutate {
          replace => {
            "ip_protocol_out" => "EIGRP"
          }
        }
      }  else if [protocol_number_src] in [ 97, "ETHERIP" ] {
        mutate {
          replace => {
            "ip_protocol_out" => "ETHERIP"
          }
        }
      } else if [protocol_number_src] in [ 103, "PIM" ] {
        mutate {
          replace => {
            "ip_protocol_out" => "PIM"
          }
        }
      } else if [protocol_number_src] in [ 112, "VRRP" ] {
        mutate {
          replace => {
            "ip_protocol_out" => "VRRP"
          }
        }
      }
      mutate {
        replace => {
          "network.ip_protocol" => "%{ip_protocol_out}"
        }
      }
    }

    if [TTL] != "" {
      mutate {
        replace => {
          "ttl_label.key" => "TTL"
          "ttl_label.value.string_value" => "%{TTL}"
        }
        merge => {
          "event.idm.read_only_udm.additional.fields" => "ttl_label"
        }
        on_error => "ttl_label_not_set"
      }
    }

    if [SEQ] != "" {
      mutate {
        replace => {
          "seq_label.key" => "SEQ"
          "seq_label.value.string_value" => "%{SEQ}"
        }
        merge => {
          "event.idm.read_only_udm.additional.fields" => "seq_label"
        }
        on_error => "seq_label_not_set"
      }
    }

    if [TYPE] != "" {
      mutate {
        replace => {
          "type_label.key" => "TYPE"
          "type_label.value.string_value" => "%{TYPE}"
        }
        merge => {
          "event.idm.read_only_udm.additional.fields" => "type_label"
        }
        on_error => "type_label_not_set"
      }
    }

    if [RES] != "" {
      grok {
        match => {
          "RES" => "%{NOTSPACE}( %{GREEDYDATA:flags_values})?"
        }
        overwrite => ["flags_values"]
        on_error => "no_flags_values"
      }

      if [flags_values] != "" {
        mutate {
          gsub => ["flags_values" ," ", "\",\""]
        }
        mutate {
          replace => {
            "flags_values" => "{\"flags_values\":[\"%{flags_values}\"]}"
          }
        }

        json {
          source => "flags_values"
          array_function => "split_columns"
        }

        mutate {
          replace => {
            "flags_label.key" => "Flags"
          }
        }

        for flags in flags_values {
          mutate {
            replace => {
              "value_array" => ""
            }
          }
          mutate {
            replace => {
              "value_array.string_value" => "%{flags}"
            }
            merge => {
              "flags_label.value.list_value.values" => "value_array"
            }
          }
        }

        mutate {
          merge => {
            "event.idm.read_only_udm.additional.fields" => "flags_label"
          }
          on_error => "flags_label_not_set"
        }
      }
    }

    if [SRC] != "" {
      mutate {
        merge => {
          "principal.ip" => "SRC"
        }
      }
    }

    if [SPT] != "" {
      mutate {
        replace => {
          "principal.port" => "%{SPT}"
        }
        convert => {
          "principal.port" => "integer"
        }
      }
    }

    if [WINDOW] != "" {
      mutate {
        replace => {
          "window_label.key" => "WINDOW"
          "window_label.value.string_value" => "%{WINDOW}"
        }
        merge => {
          "event.idm.read_only_udm.additional.fields" => "window_label"
        }
        on_error => "window_label_not_set"
      }
    }

    if [DPT] != "" {
      mutate {
        replace => {
          "target.port" => "%{DPT}"
        }
        convert => {
          "target.port" => "integer"
        }
      }
    }

    if [DST] != "" {
      mutate {
        merge => {
          "target.ip" => "DST"
        }
      }
    }

    if [LEN] != "" {
      mutate {
        replace => {
          "len_label.key" => "LEN"
          "len_label.value.string_value" => "%{LEN}"
        }
        merge => {
          "event.idm.read_only_udm.additional.fields" => "len_label"
        }
        on_error => "len_label_not_set"
      }
    }

    if [TOS] != "" {
      mutate {
        replace => {
          "tos_label.key" => "TOS"
          "tos_label.value.string_value" => "%{TOS}"
        }
        merge => {
          "event.idm.read_only_udm.additional.fields" => "tos_label"
        }
        on_error => "tos_label_not_set"
      }
    }

    if [PREC] != "" {
      mutate {
        replace => {
          "prec_label.key" => "PREC"
          "prec_label.value.string_value" => "%{PREC}"
        }
        merge => {
          "event.idm.read_only_udm.additional.fields" => "prec_label"
        }
        on_error => "prec_label_not_set"
      }
    }

    if [RES] != "" {
      mutate {
        gsub => ["RES"," .*",""]
      }
      mutate {
        replace => {
          "res_label.key" => "RES"
          "res_label.value.string_value" => "%{RES}"
        }
        merge => {
          "event.idm.read_only_udm.additional.fields" => "res_label"
        }
        on_error => "res_label_not_set"
      }
    }

    if [URGP] != "" {
      mutate {
        replace => {
          "urgp_label.key" => "URGP"
          "urgp_label.value.string_value" => "%{URGP}"
        }
        merge => {
          "event.idm.read_only_udm.additional.fields" => "urgp_label"
        }
        on_error => "urgp_label_not_set"
      }
    }

    if [CODE] != "" {
      mutate {
        replace => {
          "code_label.key" => "CODE"
          "code_label.value.string_value" => "%{CODE}"
        }
        merge => {
          "event.idm.read_only_udm.additional.fields" => "code_label"
        }
        on_error => "code_label_not_set"
      }
    }

    if [DF] != "" {
      mutate {
        replace => {
          "df_label.key" => "DF"
          "df_label.value.string_value" => "%{DF}"
        }
        merge => {
          "event.idm.read_only_udm.additional.fields" => "df_label"
        }
        on_error => "df_label_not_set"
      }
    }

    if [ID] != "" {
      mutate {
        gsub => ["ID"," .*",""]
      }
      mutate {
        replace => {
          "network.session_id" => "%{ID}"
        }
      }
    }
  } else if [product_event_type] == "DHCP Server" {
    grok {
      match => {
        "description" => "(%{IP:dhcpServerIp}|%{GREEDYDATA}) (a|A)ssigned %{IP:requestedIp} to (%{MAC:clientMac}|%{GREEDYDATA})"
      }
      overwrite => ["dhcpServerIp","requestedIp","clientMac"]
    }

    if [dhcpServerIp] != "" {
      mutate {
        replace => {
          "network.dhcp.giaddr" => "%{dhcpServerIp}"
        }
      }
    }

    if [requestedIp] != "" {
      mutate {
        replace => {
          "network.dhcp.requested_address" => "%{requestedIp}"
        }
        merge => {
          "principal.ip" => "requestedIp"
        }
      }
    }

    if [clientMac] != "" {
      mutate {
        replace => {
          "network.dhcp.chaddr" => "%{clientMac}"
        }
        merge => {
          "principal.mac" => "clientMac"
        }
      }
    }

    mutate {
      replace => {
        "event.idm.read_only_udm.metadata.event_type" => "NETWORK_DHCP"
        "network.application_protocol" => "DHCP"
        "event_type" => "NETWORK_DHCP"
      }
    }
  } else if [product_event_type] == "RADIUS" {
    grok {
      match => {
        "description" => "%{DATA:action} (to|from) %{IP:targetIp}:%{INT:targetPort} %{GREEDYDATA:desc} \\[Remote User Access\\]"
      }
      overwrite => ["action","targetIp","targetPort","desc"]
      on_error => "not_valid_pattern"
    }

    if [targetIp] != "" {
      mutate {
        merge => {
          "target.ip" => "targetIp"
        }
      }
    }

    if [targetPort] != "" {
      mutate {
        replace => {
          "target.port" => "%{targetPort}"
        }
      }
      mutate {
        convert => {
          "target.port" => "integer"
        }
        on_error => "already_integer"
      }
    }

    if [action] != "" {
      mutate {
        replace => {
          "security_result.action_details" => "%{action}"
        }
      }
    }

    if [desc] != "" {
      kv {
        source => "desc"
        field_split => " "
        value_split => ":"
        on_error => "not_kv"
      }

      if [Authenticator] != "" {
        mutate {
          replace => {
            "authenticatorDetectionFields.key" => "Authenticator"
            "authenticatorDetectionFields.value" => "%{Authenticator}"
          }
          merge => {
            "security_result.detection_fields" => "authenticatorDetectionFields"
          }
        }
      }

      if [Hostname] != "" {
        mutate {
          replace => {
            "target.hostname" => "%{Hostname}"
          }
        }
      }

      if [ID] != "" {
        mutate {
          replace => {
            "idDetectionFields.key" => "ID"
            "idDetectionFields.value" => "%{ID}"
          }
          merge => {
            "security_result.detection_fields" => "idDetectionFields"
          }
        }
      }

      if [Retry] != "" {
        mutate {
          replace => {
            "retryDetectionFields.key" => "Retry"
            "retryDetectionFields.value" => "%{Retry}"
          }
          merge => {
            "security_result.detection_fields" => "retryDetectionFields"
          }
        }
      }
    }
  } else if [product_event_type] == "L2TP/IPsec" {
    grok {
      match => {
        "description" => "(%{EMAILADDRESS:userEmail}|%{USERNAME:userName})/%{IP:principalIp} %{WORD:action} \\(%{IP:targetIp}\\)"
      }
      overwrite => ["userEmail","userName","principalIp","action","targetIp"]
      on_error => "not_valid_pattern"
    }

    if [action] != "" {
      mutate {
        replace => {
          "security_result.action_details" => "%{action}"
        }
      }
    }

    if [principalIp] != "" {
      mutate {
        merge => {
          "principal.ip" => "principalIp"
        }
      }
    }

    if [targetIp] != "" {
      mutate {
        merge => {
          "target.ip" => "targetIp"
        }
      }
    }

    if [userEmail] != "" {
      mutate {
        merge => {
          "principal.user.email_addresses" => "userEmail"
        }
      }
    }

    if [userName] != "" {
      mutate {
        replace => {
          "principal.user.user_display_name" => "%{userName}"
        }
      }
    }
  } else {
    drop {
      tag => "TAG_UNSUPPORTED"
    }
  }

  if [principal] != "" and [target] != "" and [event_type] == "" {
    mutate {
      replace => {
        "event.idm.read_only_udm.metadata.event_type" => "NETWORK_CONNECTION"
      }
    }
  } else if [event_type] == "" {
    mutate {
      replace => {
        "event.idm.read_only_udm.metadata.event_type" => "GENERIC_EVENT"
      }
    }
  }

  if [product_event_type] != "" {
    mutate {
      rename => {
        "product_event_type" => "event.idm.read_only_udm.metadata.product_event_type"
      }
      on_error => "product_event_type_not_set"
    }
  }

  if [principal] != "" {
    mutate {
      rename => {
        "principal" => "event.idm.read_only_udm.principal"
      }
      on_error => "not_valid_principal"
    }
  }

  if [target] != "" {
    mutate {
      rename => {
        "target" => "event.idm.read_only_udm.target"
      }
      on_error => "not_valid_target"
    }
  }

  if [network] != "" {
    mutate {
      rename => {
        "network" => "event.idm.read_only_udm.network"
      }
      on_error => "not_valid_network"
    }
  }

  if [intermediary] != "" {
    mutate {
      merge => {
        "event.idm.read_only_udm.intermediary" => "intermediary"
      }
      on_error => "not_valid_intermediary"
    }
  }

  if [security_result] != "" {
    mutate {
      merge => {
        "event.idm.read_only_udm.security_result" => "security_result"
      }
      on_error => "not_valid_security_result"
    }
  }

  mutate {
    replace => {
      "event.idm.read_only_udm.metadata.product_name" => "PEPLINK_FW"
      "event.idm.read_only_udm.metadata.vendor_name" => "PEPLINK_FW"
    }
  }

  mutate {
    merge => {
      "@output" => "event"
    }
  }
}
