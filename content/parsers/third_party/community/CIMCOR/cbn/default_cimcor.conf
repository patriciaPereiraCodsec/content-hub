# Product: CIMCOR
# Category: Monitoring
# Supported Format: SYSLOG + KV
# Reference: N/A
# Last Updated: 2024-06-18
# Copyright 2024 Chronicle LLC

filter {
  mutate {
    replace => {
      "eventTime" => ""
      "date_time" => ""
      "device_vendor" => ""
      "device_product" => ""
      "device_version" => ""
      "device_event_class_id" => ""
      "cimtrakUser" => ""
      "filePath" => ""
      "sfileUser" => ""
      "forensicData" => ""
      "processName" => ""
      "threadID" => ""
      "processID" => ""
      "src" => ""
      "objectDetailID" => ""
      "objectPath" => ""
      "descript" => ""
      "kv_data" => ""
      "principal" => ""
      "target" => ""
      "network" => ""
      "metadata" => ""
      "additional" => ""
      "security_result" => ""
      "has_principal" => "false"
      "has_target" => "false"
      "has_principal_user" => "false"
    }
  }

  grok {
    match => {
      "message" => [
        "%{SYSLOGTIMESTAMP:date_time} %{IP} CTK:%{INT}\\|%{DATA:device_vendor}\\|%{DATA:device_product}\\|%{DATA:device_version}\\|%{DATA:device_event_class_id}\\|%{DATA:descript}\\|%{INT}\\| %{GREEDYDATA:kv_data} \\|",
        "%{SYSLOGTIMESTAMP:date_time} %{IP:src}"
      ]
    }
    overwrite => ["date_time", "device_vendor", "device_product", "device_version", "device_event_class_id", "descript", "kv_data", "src"]
    on_error => "grok_failure"
  }

  if [grok_failure] {
    drop {
      tag => "TAG_MALFORMED_ENCODING"
    }
  }

  if [kv_data] != "" {
    mutate {
      gsub => ["kv_data", " ([A-Za-z0-9]+)=", "#$1="]
    }

    kv {
      source => "kv_data"
      field_split => "#"
      value_split => "="
      on_error => "not_kv"
    }
  }

  if [eventTime] != "" {
    date {
      match => ["eventTime", "yyyy-MM-dd HH:mm:ss","UNIX"]
      on_error => "eventTime_format_failure"
    }
  } else if [date_time] != "" {
    date {
      match => ["date_time", "MMM d HH:mm:ss", "MMM  d HH:mm:ss"]
      rebase => true
      on_error => "date_time_format_failure"
    }
  }

  if [device_event_class_id] != "" {
    mutate {
      replace => {
        "metadata.product_event_type" => "%{device_event_class_id}"
      }
      on_error => "device_event_class_id_empty"
    }
  }
  if [device_vendor] != "" {
    mutate {
      replace => {
        "metadata.vendor_name" => "%{device_vendor}"
      }
      on_error => "device_vendor_empty"
    }
  }
  if [device_product] != "" {
    mutate {
      replace => {
        "metadata.product_name" => "%{device_product}"
      }
      on_error => "device_product_empty"
    }
  }

  if [device_version] != "" {
    mutate {
      replace => {
        "metadata.product_version" => "%{device_version}"
      }
      on_error => "device_version_empty"
    }
  }

  if [descript] != "" {
    mutate {
      replace => {
        "metadata.description" => "%{descript}"
      }
      on_error => "descript_empty"
    }
  }

  if [src] != "" {
    mutate {
      merge => {
        "principal.ip" => "src"
        "principal.asset.ip" => "src"
      }
      on_error => "src_empty"
    }
    if ![src_empty] {
      mutate {
        replace => {
          "has_principal" => "true"
        }
      }
    }
  }

  if [cimtrakUser] != "" {
    mutate {
      replace => {
        "principal.user.user_display_name" => "%{cimtrakUser}"
        "has_principal_user" => "true"
      }
      on_error => "cimtrakUser_empty"
    }
  }

  if [filePath] != "" {
    mutate {
      replace => {
        "principal.file.full_path" => "%{filePath}"
      }
      on_error => "filePath_empty"
    }
  }

  if [sfileUser] != "" {
    mutate {
      replace => {
        "sfileUser_label.value.string_value" => "%{sfileUser}"
      }
      on_error => "sfileUser_empty"
    }
    if ![sfileUser_empty] {
      mutate {
        replace => {
          "sfileUser_label.key" => "sfileUser"
        }
      }
      mutate {
        merge => {
          "additional.fields" => "sfileUser_label"
        }
        on_error => "sfileUser_label_empty"
      }
    }
  }

  if [forensicData] != "" {
    mutate {
      replace => {
        "forensicData_label.value.string_value" => "%{forensicData}"
      }
      on_error => "forensicData_empty"
    }
    if ![forensicData_empty] {
      mutate {
        replace => {
          "forensicData_label.key" => "forensicData"
        }
      }
      mutate {
        merge => {
          "additional.fields" => "forensicData_label"
        }
        on_error => "forensicData_label_empty"
      }
    }
  }

  if [processName] != "" {
    mutate {
      replace => {
        "processName_label.value.string_value" => "%{processName}"
      }
      on_error => "processName_empty"
    }
    if ![processName_empty] {
      mutate {
        replace => {
          "processName_label.key" => "processName"
        }
      }
      mutate {
        merge => {
          "additional.fields" => "processName_label"
        }
        on_error => "processName_label_empty"
      }
    }
  }

  if [threadID] != "" {
    mutate {
      replace => {
        "threadID_label.value.string_value" => "%{threadID}"
      }
      on_error => "threadID_empty"
    }
    if ![threadID_empty] {
      mutate {
        replace => {
          "threadID_label.key" => "threadID"
        }
      }
      mutate {
        merge => {
          "additional.fields" => "threadID_label"
        }
        on_error => "threadID_label_empty"
      }
    }
  }

  if [processID] != "" {
    mutate {
      replace => {
        "processID_label.value.string_value" => "%{processID}"
      }
      on_error => "processID_empty"
    }
    if ![processID_empty] {
      mutate {
        replace => {
          "processID_label.key" => "processID"
        }
      }
      mutate {
        merge => {
          "additional.fields" => "processID_label"
        }
        on_error => "processID_label_empty"
      }
    }
  }

  if [objectDetailID] != "" {
    mutate {
      replace => {
        "objectDetailID_label.value.string_value" => "%{objectDetailID}"
      }
      on_error => "objectDetailID_empty"
    }
    if ![objectDetailID_empty] {
      mutate {
        replace => {
          "objectDetailID_label.key" => "objectDetailID"
        }
      }
      mutate {
        merge => {
          "additional.fields" => "objectDetailID_label"
        }
        on_error => "objectDetailID_label_empty"
      }
    }
  }

  if [objectPath] != "" {
    mutate {
      replace => {
        "objectPath_label.value.string_value" => "%{objectPath}"
      }
      on_error => "objectPath_empty"
    }
    if ![objectPath_empty] {
      mutate {
        replace => {
          "objectPath_label.key" => "objectPath"
        }
      }
      mutate {
        merge => {
          "additional.fields" => "objectPath_label"
        }
        on_error => "objectPath_label_empty"
      }
    }
  }

  if [has_principal] == "true" and [has_target] == "false" {
    mutate {
      replace => {
        "metadata.event_type" => "STATUS_UPDATE"
      }
    }
  }
  else {
    mutate {
      replace => {
        "metadata.event_type" => "GENERIC_EVENT"
      }
    }
  }

  if [target] != "" {
    mutate {
      rename => {
        "target" => "event.idm.read_only_udm.target"
      }
    }
  }
  if [principal] != "" {
    mutate {
      rename => {
        "principal" => "event.idm.read_only_udm.principal"
      }
    }
  }
  if [metadata] != "" {
    mutate {
      rename => {
        "metadata" => "event.idm.read_only_udm.metadata"
      }
    }
  }
  if [network] != "" {
    mutate {
      rename => {
        "network" => "event.idm.read_only_udm.network"
      }
    }
  }

  if [security_result] != "" {
    mutate {
      merge => {
        "event.idm.read_only_udm.security_result" => "security_result"
      }
    }
  }

  if [additional] != "" {
    mutate {
      rename => {
        "additional" => "event.idm.read_only_udm.additional"
      }
    }
  }

  # Generate output
  mutate {
    merge => {
      "@output" => "event"
    }
  }
}
