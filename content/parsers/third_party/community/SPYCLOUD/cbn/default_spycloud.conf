# Product: Spycloud
# Category: AV / Endpoint
# Supported Format: SYSLOG + JSON , JSON
# Reference: N/A
# Last Updated: 2025-02-27
# Copyright 2025 Google SecOps

filter {
  mutate {
    replace => {
      "when" => ""
      "kv_data" => ""
      "n" => ""
      "cookie_expiration" => ""
      "cookie_name" => ""
      "json_data" => ""
      "cookie_domain" => ""
      "cookie_subdomain" => ""
      "cookie_value" => ""
      "day" => ""
      "document_id" => ""
      "infected_machine_id" => ""
      "ip" => ""
      "locality_zone" => ""
      "severity" => ""
      "source_id" => ""
      "spycloud_publishdate" => ""
      "user_hostname" => ""
      "user_sys_registered_owner" => ""
      "event_type" => ""
      "additional_label" => ""
      "metadata" => ""
      "principal" => ""
      "security_result" => ""
      "target" => ""
      "spycloud_publish_date" => ""
      "password" => ""
      "user_browser" => ""
      "ip_addresses" => ""
      "infected_path" => ""
      "country" => ""
      "keyboard_languages" => ""
      "display_resolution" => ""
      "user_os" => ""
      "av_softwares" => ""
      "log_id" => ""
      "target_url" => ""
      "username" => ""
      "infected_time" => ""
      "target_domain" => ""
      "target_subdomain" => ""
      "password_type" => ""
      "password_plaintext" => ""
      "country_code" => ""
      "extensions" => ""
      "network" => ""
      "additional" => ""
      "domain" => ""
      "email" => ""
      "email_domain" => ""
      "email_username" => ""
      "api_token" => ""
      "full_name" => ""
      "homepage" => ""
      "account_status" => ""
      "id" => ""
      "confidence" => ""
      "acquisition_date" => ""
      "malware_family" => ""
      "uuid" => ""
      "tlp" => ""
      "type" => ""
      "breach_category" => ""
      "num_records" => ""
      "title" => ""
      "description" => ""
      "site_description" => ""
      "site" => ""
      "breach_main_category" => ""
      "consumer_category" => ""
      "sensitive_source" => ""
      "short_title" => ""
      "premium_flag" => ""
      "assets.user_browser" => ""
      "assets.av_softwares" => ""
      "assets.ip_addresses" => ""
      "assets.log_id" => ""
      "assets.target_url" => ""
      "assets.infected_path" => ""
      "assets.user_sys_registered_owner" => ""
      "assets.country" => ""
      "assets.keyboard_languages" => ""
      "assets.display_resolution" => ""
      "assets.user_os" => ""
      "assets.infected_machine_id" => ""
      "assets.user_hostname" => ""
      "assets.email" => ""
      "assets.password" => ""
      "assets.full_name" => ""
      "assets.country_code" => ""
      "assets.infected_time" => ""
      "assets.username" => ""
      "has_principal_ip" => ""
      "has_principal" => ""
      "has_target" => ""
      "has_principal_userid" => ""
      "has_network" => ""
      "timezone" => ""
    }
  }
  mutate {
    gsub => ["message", '\\r\\n', ""]
  }
  if [message] =~ "UNPARSED_RAW_LOG" {
    mutate {
      gsub => ["message", '\\\":\\\"', ":"]
    }
    mutate {
      gsub => ["message", '\\\",\\\"', ","]
    }
    mutate {
      gsub => ["message", '\\\"{\\\"', "{"]
    }
    mutate {
      gsub => ["message", '\\\"}\\\"', "}"]
    }
  }

  grok {
    match => {
      "message" => [
        "%{TIMESTAMP_ISO8601:when},%{DATA},%{GREEDYDATA:kv_data},,,,%{GREEDYDATA:json_data}",
        "%{GREEDYDATA:json_data}"
      ]
    }
    overwrite => ["when", "kv_data", "json_data"]
    on_error => "header_grok_match_failed"
  }

  if [header_grok_match_failed] {
    drop {
      tag => "TAG_MALFORMED_MESSAGE"
    }
  }

  if [kv_data] != "" {
    mutate {
      gsub => ["kv_data", '\\\"', ""]
    }
    kv {
      source => "kv_data"
      field_split => ","
      value_split => ":"
      on_error => "kv_data_invalid"
    }
  }

  if [json_data] != "" {
    mutate {
      gsub => ["json_data", "null", ""]
    }
    json {
      source => "json_data"
      array_function => "split_columns"
      on_error => "json_data_invalid"
    }
  }

  if [when] != "" {
    date {
      match => ["when", "ISO8601"]
      on_error => "date_match_failed"
    }
  }

  if [cookie_domain] != "" {
    mutate  {
      replace => {
        "principal.administrative_domain" => "%{cookie_domain}"
      }
      on_error => "cookie_domain_invalid"
    }
  }

  if [cookie_expiration] != "" {
    mutate {
      replace => {
        "cookie_expiration_label.key" => "cookie expiration"
        "cookie_expiration_label.value" => "%{cookie_expiration}"
      }
      on_error => "cookie_expiration_invalid"
    }
    if ![cookie_expiration_invalid] {
      mutate {
        merge => {
          "security_result.detection_fields" => "cookie_expiration_label"
        }
        on_error => "cookie_expiration_label_merge_failed"
      }
    }
  }

  if [cookie_name] != "" {
    mutate {
      replace => {
        "cookie_name_label.key" => "cookie name"
        "cookie_name_label.value" => "%{cookie_name}"
      }
      on_error => "cookie_name_invalid"
    }
    if ![cookie_name_invalid] {
      mutate {
        merge => {
          "security_result.detection_fields" => "cookie_name_label"
        }
        on_error => "cookie_name_label_merge"
      }
    }
  }

  if [cookie_subdomain] != "" {
    mutate {
      replace => {
        "cookie_subdomain_label.key" => "cookie_subdomain"
        "cookie_subdomain_label.value" => "%{cookie_subdomain}"
      }
      on_error => "cookie_subdomain_invalid"
    }
    if ![cookie_subdomain_invalid] {
      mutate {
        merge => {
          "security_result.detection_fields" => "cookie_subdomain_label"
        }
        on_error => "cookie_subdomain_label_merge"
      }
    }
  }

  if [cookie_value] != "" {
    mutate {
      replace => {
        "cookie_value_label.key" => "cookie_value"
        "cookie_value_label.value" => "%{cookie_value}"
      }
      on_error => "cookie_value_invalid"
    }
    if ![cookie_value_invalid] {
      mutate {
        merge => {
          "security_result.detection_fields" => "cookie_value_label"
        }
        on_error => "cookie_value_label_merge"
      }
    }
  }

  if [day] != "" {
    mutate {
      replace => {
        "day_label.key" => "day"
        "day_label.value" => "%{day}"
      }
      on_error => "day_invalid"
    }
    if ![day_invalid] {
      mutate {
        merge => {
          "security_result.detection_fields" => "day_label"
        }
        on_error => "day_label_merge"
      }
    }
  }

  if [document_id] != "" {
    mutate {
      replace => {
        "document_id_label.key" => "document_id"
        "document_id_label.value" => "%{document_id}"
      }
      on_error => "document_id_invalid"
    }
    if ![document_id_invalid] {
      mutate {
        merge => {
          "security_result.detection_fields" => "document_id_label"
        }
        on_error => "document_id_label_merge"
      }
    }
  }

  if [infected_machine_id] != "" {
    mutate {
      replace => {
        "principal.asset_id" => "id: %{infected_machine_id}"
      }
      on_error => "infected_machine_id_invalid"
    }
  }

  if [locality_zone] != "" {
    mutate {
      replace => {
        "locality_zone_label.key" => "locality_zone"
        "locality_zone_label.value" => "%{locality_zone}"
      }
      on_error => "locality_zone_invalid"
    }
    if ![locality_zone_invalid] {
      mutate {
        merge => {
          "security_result.detection_fields" => "locality_zone_label"
        }
        on_error => "locality_zone_label_merge"
      }
    }
  }

  if [source_id] != "" {
    mutate {
      convert => {
        "source_id" => "string"
      }
      on_error => "source_id_conversion_failed"
    }
    mutate {
      replace => {
        "source_id_label.key" => "source_id"
        "source_id_label.value" => "%{source_id}"
      }
      on_error => "source_id_invalid"
    }
    if ![source_id_invalid] {
      mutate {
        merge => {
          "security_result.detection_fields" => "source_id_label"
        }
        on_error => "source_id_label_merge"
      }
    }
  }

  if [spycloud_publishdate] != "" {
    mutate {
      replace => {
        "spycloud_publishdate_label.key" => "spycloud_publishdate"
        "spycloud_publishdate_label.value" => "%{spycloud_publishdate}"
      }
      on_error => "spycloud_publishdate_invalid"
    }
    if ![spycloud_publishdate_invalid] {
      mutate {
        merge => {
          "security_result.detection_fields" => "spycloud_publishdate_label"
        }
        on_error => "spycloud_publishdate_label_merge"
      }
    }
  }

  if [user_hostname] not in ["", "null"] {
    mutate {
      replace => {
        "principal.hostname" => "%{user_hostname}"
      }
      on_error => "principal_hostname_invalid"
    }
  }

  if [user_sys_registered_owner] != "" {
    mutate {
      replace => {
        "principal.user.userid" => "%{user_sys_registered_owner}"
      }
      on_error => "user_sys_registered_owner_invalid"
    }
  }

  mutate {
    convert => {
      "severity" => "string"
    }
    on_error => "severity_conversion_failed"
  }
  if [severity] == "2" {
    mutate {
      replace => {
        "security_result.severity" => "LOW"
        "security_result.severity_details" => "%{severity}"
      }
      on_error => "severity_invalid"
    }
  }
  if [severity] == "5" {
    mutate {
      replace => {
        "security_result.severity" => "INFORMATIONAL"
        "security_result.severity_details" => "%{severity}"
      }
      on_error => "severity_invalid"
    }
  }
  if [severity] == "20" {
    mutate {
      replace => {
        "security_result.severity" => "HIGH"
        "security_result.severity_details" => "%{severity}"
      }
      on_error => "severity_invalid"
    }
  }
  if [severity] in ["25", "26"] {
    mutate {
      replace => {
        "security_result.severity" => "CRITICAL"
        "security_result.severity_details" => "%{severity}"
      }
      on_error => "severity_invalid"
    }
  }

  if [ip] != "" {
    grok {
      match => {
        "ip" => ["%{IP:ip}"]
      }
      overwrite => ["ip"]
      on_error => "not_the_ip"
    }
    if ![not_the_ip] {
      mutate {
        merge => {
          "principal.ip" => "ip"
        }
        on_error => "ip_invalid"
      }
    }
  }

  if [spycloud_publish_date] != "" {
    date {
      match => ["spycloud_publish_date", "yyyy-MM-ddTHH:mm:ssZ"]
      on_error => "date_match_failed"
    }
    mutate {
      replace => {
        "spycloud_publish_date_label.key" => "spycloud_publish_date"
        "spycloud_publish_date_label.value" => "%{spycloud_publish_date}"
      }
      on_error => "spycloud_publish_date_invalid"
    }
    if ![spycloud_publish_date_invalid] {
      mutate {
        merge => {
          "security_result.detection_fields" => "spycloud_publish_date_label"
        }
        on_error => "spycloud_publish_date_label_merge"
      }
    }
  }

  if [password] != "" {
    mutate {
      replace => {
        "extensions.auth.auth_details" => "%{password}"
      }
      on_error => "password_invalid"
    }
  }

  if [user_browser] != "" {
    mutate {
      replace => {
        "browser_label.key" => "user_browser"
        "browser_label.value" => "%{user_browser}"
      }
      on_error => "user_browser_invalid"
    }
    if ![user_browser_invalid] {
      mutate {
        merge => {
          "security_result.detection_fields" => "browser_label"
        }
        on_error => "browser_label_merge"
      }
    }
  }

  if [id] != "" {
    mutate {
      convert => {
        "id" => "string"
      }
      on_error => "id_conversion_failed"
    }
    mutate {
      replace => {
        "principal.resource.id" => "%{id}"
      }
      on_error => "id_invalid"
    }
  }

  if [ip_addresses] != "" {
    for ipAddress in ip_addresses {
      mutate {
        merge => {
          "principal.ip" => "ipAddress"
        }
        on_error => "ip_addresses_invalid"
      }
      mutate {
        replace => {
          "has_principal_ip" => "true"
        }
      }
    }
  }

  if [infected_path] != "" {
    mutate {
      replace => {
        "principal.file.full_path" => "%{infected_path}"
      }
      on_error => "infected_path_invalid"
    }
  }

  if [country] != "" {
    mutate {
      replace => {
        "principal.asset.location.country_or_region" => "%{country}"
      }
      on_error => "country_invalid"
    }
  }
  if [country_code] != "" {
    mutate {
      replace => {
        "country_code_label.key" => "country_code"
        "country_code_label.value" => "%{country_code}"
      }
      on_error => "country_code_invalid"
    }
    if ![country_code_invalid] {
      mutate {
        merge => {
          "principal.resource.attribute.labels" => "country_code_label"
        }
        on_error => "country_code_label_merge"
      }
    }
  }

  if [keyboard_languages] != "" {
    mutate {
      replace => {
        "keyboard_label.key" => "keyboard_languages"
        "keyboard_label.value" => "%{keyboard_languages}"
      }
      on_error => "keyboard_languages_invalid"
    }
    if ![keyboard_languages_invalid] {
      mutate {
        merge => {
          "security_result.detection_fields" => "keyboard_label"
        }
        on_error => "keyboard_label_merge"
      }
    }
  }

  if [user_os] != "" {
    mutate {
      replace => {
        "network.http.user_agent" => "%{user_os}"
        "has_network" => "true"
      }
      on_error => "user_os_invalid"
    }
    # parsed user agent
    mutate {
      convert => {
        "user_os" => "parseduseragent"
      }
      on_error => "invalid_conversion"
    }
    mutate {
      rename => {
        "user_os" => "network.http.parsed_user_agent"
      }
      on_error => "no_parsed_user_agent"
    }
  }

  if [display_resolution] != "" {
    mutate {
      replace => {
        "display_resolution_label.key" => "display_resolution"
        "display_resolution_label.value" => "%{display_resolution}"
      }
      on_error => "display_resolution_invalid"
    }
    if ![display_resolution_invalid] {
      mutate {
        merge => {
          "security_result.detection_fields" => "display_resolution_label"
        }
        on_error => "display_resolution_label_failed"
      }
    }
  }

  if [av_softwares] != "" {
    mutate {
      replace => {
        "av_software_list.value" => ""
      }
    }
    for software in av_softwares {
      mutate {
        replace => {
          "software_label" => ""
        }
      }
      mutate {
        replace => {
          "software_label.string_value" => "%{software}"
        }
        on_error => "no_software"
      }
      mutate {
        merge => {
          "av_software_list.value.list_value.values" => "software_label"
        }
        on_error => "no_list"
      }
    }
    if [av_software_list][value] != "" {
      mutate {
        replace => {
          "av_software_list.key" => "av_softwares"
        }
      }
      mutate {
        merge => {
          "additional.fields" => "av_software_list"
        }
        on_error => "no_av_software_list"
      }
    }
  }

  if [log_id] != "" {
    mutate {
      replace => {
        "metadata.product_log_id" => "%{log_id}"
      }
      on_error => "log_id_invalid"
    }
  }
  else if [assets][log_id] != "" {
    mutate {
      replace => {
        "metadata.product_log_id" => "%{assets.log_id}"
      }
      on_error => "id_invalid"
    }
  }

  if [target_url] != "" {
    mutate {
      replace => {
        "target.url" => "%{target_url}"
      }
      on_error => "target_url_invalid"
    }
  }

  if [username] != "" {
    mutate {
      replace => {
        "target.user.userid" => "%{username}"
      }
      on_error => "username_invalid"
    }
  }

  if [infected_time] != "" {
    date {
      match => ["infected_time", "yyyy-MM-ddTHH:mm:ssZ", "RFC3339", "ISO8601"]
      target => "metadata.ingested_timestamp"
      on_error => "infected_match_failed"
    }
    mutate {
      replace => {
        "infected_time_label.key" => "infected_time"
        "infected_time_label.value" => "%{infected_time}"
      }
      on_error => "infected_time_invalid"
    }
    if ![infected_time_invalid] {
      mutate {
        merge => {
          "security_result.detection_fields" => "infected_time_label"
        }
        on_error => "infected_time_label_merge"
      }
    }
  }
  if [timezone] != "" {
    mutate {
      replace => {
        "timezone_label.key" => "timezone"
        "timezone_label.value" => "%{timezone}"
      }
      on_error => "timezone_invalid"
    }
    if ![timezone_invalid] {
      mutate {
        merge => {
          "security_result.detection_fields" => "timezone_label"
        }
        on_error => "timezone_label_merge"
      }
    }
  }
  if [target_domain] != "" {
    mutate {
      replace => {
        "target.hostname" => "%{target_domain}"
        "target.asset.hostname" => "%{target_domain}"
        "has_target" => "true"
      }
      on_error => "target_domain_invalid"
    }
  }

  if [target_subdomain] != "" {
    mutate {
      replace => {
        "target.administrative_domain" => "%{target_subdomain}"
      }
      on_error => "target_subdomain_invalid"
    }
  }

  if [password_type] != "" {
    mutate {
      replace => {
        "password_type_label.key" => "password_type"
        "password_type_label.value" => "%{password_type}"
      }
      on_error => "password_type_invalid"
    }
    if ![password_type_invalid] {
      mutate {
        merge => {
          "security_result.detection_fields" => "password_type_label"
        }
        on_error => "password_type_label_merge"
      }
    }
  }

  if [password_plaintext] != "" {
    mutate {
      replace => {
        "passwrd_plain_label.key" => "password_plaintext"
        "passwrd_plain_label.value" => "%{password_plaintext}"
      }
      on_error => "password_plaintext_invalid"
    }
    if ![password_plaintext_invalid] {
      mutate {
        merge => {
          "security_result.detection_fields" => "passwrd_plain_label"
        }
        on_error => "password_plaintext_label_merge"
      }
    }
  }

  if [domain] != "" {
    mutate {
      replace => {
        "principal.hostname" => "%{domain}"
        "principal.asset.hostname" => "%{domain}"
        "has_principal" => "true"
      }
      on_error => "domain_invalid"
    }
  }

  if [email] != "" {
    mutate {
      merge => {
        "principal.user.email_addresses" => "email"
      }
      on_error => "email_invalid"
    }
  }

  if [email_domain] != "" {
    mutate {
      replace => {
        "email_domain_label.key" => "email_domain"
        "email_domain_label.value" => "%{email_domain}"
      }
      on_error => "email_domain_invalid"
    }
    if ![email_domain_invalid] {
      mutate {
        merge => {
          "security_result.detection_fields" => "email_domain_label"
        }
        on_error => "email_domain_label_merge"
      }
    }
  }

  if [email_username] != "" {
    mutate {
      replace => {
        "principal.user.userid" => "%{email_username}"
        "has_principal_userid" => "true"
      }
      on_error => "email_username_invalid"
    }
  }

  if [api_token] != "" {
    mutate {
      replace => {
        "api_token_label.key" => "api_token"
        "api_token_label.value" => "%{api_token}"
      }
      on_error => "api_token_invalid"
    }
    if ![api_token_invalid] {
      mutate {
        merge => {
          "security_result.detection_fields" => "api_token_label"
        }
        on_error => "api_token_label_merge"
      }
    }
  }

  if [full_name] != "" {
    mutate {
      replace => {
        "principal.user.user_display_name" => "%{full_name}"
      }
      on_error => "full_name_invalid"
    }
  }

  if [homepage] != "" {
    mutate {
      replace => {
        "principal.url" => "%{homepage}"
      }
      on_error => "homepage_invalid"
    }
  }

  if [account_status] != "" {
    mutate {
      replace => {
        "account_status_label.key" => "account_status"
        "account_status_label.value" => "%{account_status}"
      }
      on_error => "account_status_invalid"
    }
    if ![account_status_invalid] {
      mutate {
        merge => {
          "security_result.detection_fields" => "account_status_label"
        }
        on_error => "account_status_label_faile"
      }
    }
  }

  if [breach_category] != "" {
    mutate {
      replace => {
        "breach_category_label.key" => "breach_category"
        "breach_category_label.value" => "%{breach_category}"
      }
      on_error => "breach_category_invalid"
    }
    if ![breach_category_invalid] {
      mutate {
        merge => {
          "security_result.detection_fields" => "breach_category_label"
        }
        on_error => "breach_category_failed"
      }
    }
  }

  if [breach_main_category] != "" {
    mutate {
      replace => {
        "breach_main_category_label.key" => "breach_main_category"
        "breach_main_category_label.value" => "%{breach_main_category}"
      }
      on_error => "breach_main_category_invalid"
    }
    if ![breach_main_category_invalid] {
      mutate {
        merge => {
          "security_result.detection_fields" => "breach_main_category_label"
        }
        on_error => "breach_main_category_failed"
      }
    }
  }

  if [confidence] != "" {
    mutate {
      convert => {
