# Product: IMPERVA_DRA
# Category: Data Security
# Supported Format: SYSLOG,json
# Reference: N/A
# Last Updated: 2026-04-30
# Copyright 2026 Google SecOps
filter {
  mutate {
    replace => {
      "type" => ""
      "severity" => ""
      "severityScore" => ""
      "src" => ""
      "suser" => ""
      "shost" => ""
      "sapp" => ""
      "dst" => ""
      "dhost" => ""
      "clusterName" => ""
      "clusterMemberName" => ""
      "issueTimestamp" => ""
      "msg" => ""
      "act" => ""
      "cat" => ""
      "url" => ""
      "numIncidents" => ""
      "firstIncidentTime" => ""
      "lastIncidentTime" => ""
      "incidents" => ""
      "users" => ""
      "servers" => ""
      "act_label" => ""
      "cat_label" => ""
      "firstIncidentTime_label" => ""
      "num_of_Incidents_label" => ""
      "security_result" => ""
      "hostname" => ""
      "event_timestamp" => ""
      "event_metadata" => ""
      "metadata" => ""
      "dateEdited_label" => ""
      "action_label" => ""
      "editUser" => ""
      "action" => ""
      "dateEdited" => ""
      "has_principal" => "false"
      "has_target" => "false"
      "has_resource" => "false"
      "has_user" => "false"
      "principal" => ""
      "target" => ""
      "dst_ip" => ""
      "id" => ""
      "srcUsers" => ""
      "srcIps" => ""
      "srcHosts" => ""
      "dstIps" => ""
      "dstHosts" => ""
      "sourceApps" => ""
      "destinationAccount" => ""
      "destination" => ""
      "destinationType" => ""
      "accessedTables" => ""
      "actionType" => ""
      "securityEventTimestamp" => ""
      "numOfAccessedObjects" => ""
      "userAction" => ""
      "clusterNames" => ""
      "clusterMemberNames" => ""
      "cef_data" => ""
      "src_ips" => ""
      "dst_ips" => ""
      "json_wrapper_raw" => ""
      "sourceApps_list.value" => ""
      "intermediary" => ""
      "client_ip" => ""
      "action_id" => ""
      "client_port" => ""
      "collective_id" => ""
      "collective_name" => ""
      "destination_ip" => ""
      "connection_type" => ""
      "destination_port" => ""
      "distinguished_name_device_id" => ""
      "distinguished_name_user" => ""
      "entitlement_token_id" => ""
      "distinguished_name" => ""
      "rule_name" => ""
      "packet_size" => ""
      "distinguished_name_ou" => ""
      "start" => ""
      "jsonwrapper_appname" => ""
      "jsonwrapper_facility" => ""
      "rule_subnet" => ""
      "source_ip" => ""
      "version" => ""
      "timestamp" => ""
      "sec_action" => ""
      "jsonwrapper_priority" => ""
    }
  }
  mutate {
    gsub => ["message", "metadata", "event_metadata"]
  }
  mutate {
    gsub => ["message", '"message":', '"message_data":']
  }
  if [message] =~ "^\\{" {
    json {
      source => "message"
      array_function => "split_columns"
      target => "json_wrapper"
      on_error => "wrapper_not_json"
    }
    json {
      source => "json_wrapper.message_data"
      array_function => "split_columns"
      on_error => "no_jsonwrappermessagedata"
    }
    if ![wrapper_not_json] {
      mutate {
        replace => {
          "json_wrapper_raw" => "%{json_wrapper._raw}"
        }
        on_error => "no_json_wrapper_raw"
      }
      if [json_wrapper_raw] != "" {
        mutate {
          replace => {
            "message" => "%{json_wrapper._raw}"
          }
          on_error => "no_raw_field"
        }
      }
    }
    if ![wrapper_not_json] {
      if [client_ip] != "" {
        grok {
          match => {
            "client_ip" => "%{IP:client_ip}"
          }
          on_error => "no_client_ip"
          overwrite => ["client_ip"]
        }
        if ![no_client_ip] {
          mutate {
            merge => {
              "principal.ip" => "client_ip"
              "principal.asset.ip" => "client_ip"
            }
            on_error => "client_ip_merge_failed"
          }
          if ![client_ip_merge_failed] {
            mutate {
              replace => {
                "has_principal" => "true"
              }
            }
          }
        }
      }
      if [action_id] != "" {
        mutate {
          replace => {
            "security_result.rule_id" => "%{action_id}"
          }
          on_error => "no_action_id"
        }
      }
      if [client_port] != "" {
        mutate {
          convert => {
            "client_port" => "string"
          }
          on_error => "no_client_port_string"
        }
        mutate {
          replace => {
            "principal.port" => "%{client_port}"
          }
          on_error => "no_client_port"
        }
        mutate {
          convert => {
            "principal.port" => "integer"
          }
          on_error => "client_port_convert_error"
        }
      }
    }
    if [collective_id] != "" {
      mutate {
        replace => {
          "collective_id_label.key" => "collective_id"
          "collective_id_label.value.string_value" => "%{collective_id}"
        }
        on_error => "no_collective_id_label"
      }
      if ![no_collective_id_label] {
        mutate {
          merge => {
            "event.idm.read_only_udm.additional.fields" => "collective_id_label"
          }
          on_error => "collective_id_label_merge_failed"
        }
      }
    }
    if [collective_name] != "" {
      mutate {
        replace => {
          "collective_name_label.key" => "collective_name"
          "collective_name_label.value.string_value" => "%{collective_name}"
        }
        on_error => "no_collective_name_label"
      }
      if ![no_collective_name_label] {
        mutate {
          merge => {
            "event.idm.read_only_udm.additional.fields" => "collective_name_label"
          }
          on_error => "collective_name_label_merge_failed"
        }
      }
    }
    if [destination_ip] != "" {
      grok {
        match => {
          "destination_ip" => "%{IP:destination_ip}"
        }
        on_error => "no_destination_ip"
        overwrite => ["destination_ip"]
      }
      if ![no_destination_ip] {
        mutate {
          merge => {
            "target.ip" => "destination_ip"
            "target.asset.ip" => "destination_ip"
          }
          on_error => "destination_ip_merge_failed"
        }
        if ![destination_ip_merge_failed] {
          mutate {
            replace => {
              "has_target" => "true"
            }
          }
        }
      }
    }
    if [connection_type] != "" {
      mutate {
        replace => {
          "connection_type_label.key" => "connection_type"
          "connection_type_label.value.string_value" => "%{connection_type}"
        }
        on_error => "no_connection_type_label"
      }
      if ![no_connection_type_label] {
        mutate {
          merge => {
            "event.idm.read_only_udm.additional.fields" => "connection_type_label"
          }
          on_error => "connection_type_label_merge_failed"
        }
      }
    }
    if [destination_port] != "" {
      mutate {
        convert => {
          "destination_port" => "string"
        }
        on_error => "no_destination_port_string"
      }
      mutate {
        replace => {
          "target.port" => "%{destination_port}"
        }
        on_error => "no_destination_port"
      }
      mutate {
        convert => {
          "target.port" => "integer"
        }
        on_error => "destination_port_convert_error"
      }
    }
    if [distinguished_name_device_id] != "" {
      mutate {
        replace => {
          "principal.asset.asset_id" => "ASSET_ID:%{distinguished_name_device_id}"
        }
        on_error => "no_distinguished_name_device_id"
      }
    }
    if [distinguished_name] != "" {
      mutate {
        merge => {
          "principal.user.group_identifiers" => "distinguished_name"
        }
        on_error => "no_distinguished_name"
      }
    }
    if [distinguished_name_user] =~ "^.+@.+$" {
      mutate {
        merge => {
          "principal.user.email_addresses" => "distinguished_name_user"
        }
        on_error => "no_distinguished_name_user"
      }
      if ![no_distinguished_name_user] {
        mutate {
          replace => {
            "has_user" => "true"
          }
        }
      }
    }
    if [entitlement_token_id] != "" {
      mutate {
        replace => {
          "entitlement_token_id_label.key" => "entitlement_token_id"
          "entitlement_token_id_label.value.string_value" => "%{entitlement_token_id}"
        }
        on_error => "no_entitlement_token_id_label"
      }
      if ![no_entitlement_token_id_label] {
        mutate {
          merge => {
            "event.idm.read_only_udm.additional.fields" => "entitlement_token_id_label"
          }
          on_error => "entitlement_token_id_label_merge_failed"
        }
      }
    }
    if [rule_name] != "" {
      mutate {
        replace => {
          "security_result.rule_name" => "%{rule_name}"
        }
        on_error => "no_rule_name"
      }
    }
    if [distinguished_name_ou] != "" {
      mutate {
        merge => {
          "principal.user.group_identifiers" => "distinguished_name_ou"
        }
        on_error => "no_distinguished_name_ou"
      }
    }
    if [id] != "" {
      mutate {
        replace => {
          "metadata.product_log_id" => "%{id}"
        }
        on_error => "no_product_log_id"
      }
    }
    if [packet_size] != "" {
      mutate {
        convert => {
          "packet_size" => "string"
        }
        on_error => "no_packet_size_string"
      }
      mutate {
        replace => {
          "event.idm.read_only_udm.network.sent_bytes" => "%{packet_size}"
        }
        on_error => "no_packet_size"
      }
      mutate {
        convert => {
          "event.idm.read_only_udm.network.sent_bytes" => "uinteger"
        }
        on_error => "packet_size_convert_error"
      }
    }
    mutate {
      replace => {
        "jsonwrapper_appname" => "%{json_wrapper.appname}"
      }
      on_error => "no_appname"
    }
    if [jsonwrapper_appname] != "" {
      mutate {
        gsub => ["jsonwrapper_appname", '\\"', ""]
      }
      mutate {
        gsub => ["jsonwrapper_appname", '{', ""]
      }
      mutate {
        replace => {
          "jsonwrapper_appname_label.key" => "jsonwrapper_appname"
          "jsonwrapper_appname_label.value.string_value" => "%{jsonwrapper_appname}"
        }
        on_error => "no_jsonwrapper_appname_label"
      }
      if ![no_jsonwrapper_appname_label] {
        mutate {
          merge => {
            "event.idm.read_only_udm.additional.fields" => "jsonwrapper_appname_label"
          }
          on_error => "jsonwrapper_appname_label_merge_failed"
        }
      }
    }
    mutate {
      convert => {
        "json_wrapper.facility" => "string"
      }
      on_error => "no_json_wrapperfacility_string"
    }
    mutate {
      replace => {
        "jsonwrapper_facility" => "%{json_wrapper.facility}"
      }
      on_error => "no_jsonwrapper_facility"
    }
    if [jsonwrapper_facility] != "" {
      mutate {
        replace => {
          "jsonwrapper_facility_label.key" => "jsonwrapper_facility"
          "jsonwrapper_facility_label.value.string_value" => "%{jsonwrapper_facility}"
        }
        on_error => "no_jsonwrapper_facility_label"
      }
      if ![no_jsonwrapper_facility_label] {
        mutate {
          merge => {
            "event.idm.read_only_udm.additional.fields" => "jsonwrapper_facility_label"
          }
          on_error => "jsonwrapper_facility_label_merge_failed"
        }
      }
    }
    if [rule_subnet] != "" {
      mutate {
        replace => {
          "rule_subnet_label.key" => "rule_subnet"
          "rule_subnet_label.value" => "%{rule_subnet}"
        }
        on_error => "no_rule_subnet_label"
      }
      if ![no_rule_subnet_label] {
        mutate {
          merge => {
            "security_result.detection_fields" => "rule_subnet_label"
          }
          on_error => "rule_subnet_label_merge_failed"
        }
      }
    }
    if [source_ip] != "" {
      grok {
        match => {
          "source_ip" => "%{IP:source_ip}"
        }
        on_error => "no_source_ip"
        overwrite => ["source_ip"]
      }
      if ![no_source_ip] {
        mutate {
          merge => {
            "principal.ip" => "source_ip"
            "principal.asset.ip" => "source_ip"
          }
          on_error => "source_ip_merge_failed"
        }
        if ![source_ip_merge_failed] {
          mutate {
            replace => {
              "has_principal" => "true"
            }
          }
        }
      }
    }
    mutate {
      convert => {
        "version" => "string"
      }
      on_error => "no_version_string"
    }
    if [version] != "" {
      mutate {
        replace => {
          "metadata.product_version" => "%{version}"
        }
        on_error => "no_product_version"
      }
    }
    if [timestamp] != "" {
      date {
        match => ["timestamp", "ISO8601"]
        on_error => "no_timestamp"
      }
    }
    if [action] == "allow" {
      mutate {
        replace => {
          "sec_action" => "ALLOW"
        }
      }
    }
    if [sec_action] != "" {
      mutate {
        merge => {
          "security_result.action" => "sec_action"
        }
        on_error => "no_security_result_action"
      }
    }
    mutate {
      convert => {
        "json_wrapper.priority" => "string"
      }
      on_error => "no_jsonwrapper_priority_string"
    }
    mutate {
      replace => {
        "jsonwrapper_priority" => "%{json_wrapper.priority}"
      }
      on_error => "no_jsonwrapper_priority"
    }
    if [jsonwrapper_priority] != "" {
      mutate {
        replace => {
          "jsonwrapper_priority_label.key" => "jsonwrapper_priority"
          "jsonwrapper_priority_label.value.string_value" => "%{jsonwrapper_priority}"
        }
        on_error => "no_jsonwrapper_priority_label"
      }
      if ![no_jsonwrapper_priority_label] {
        mutate {
          merge => {
            "event.idm.read_only_udm.additional.fields" => "jsonwrapper_priority_label"
          }
          on_error => "jsonwrapper_priority_label_merge_failed"
        }
      }
    }
  }
  grok {
    match => {
      "message" => "\\<%{INT:syslog_pri}\\>%{SYSLOGTIMESTAMP:event_timestamp}\\s%{HOSTNAME:hostname}\\s%{GREEDYDATA:cef_data}"
    }
    overwrite => ["syslog_pri", "event_timestamp", "hostname", "cef_data"]
    on_error => "grok_parse_error"
  }
  if [cef_data] =~ "^CEF:0" {
    grok {
      match => {
        "cef_data" => "CEF:0\\|Imperva Inc.\\|DRA\\|.*?\\|%{DATA:signature_id}\\|%{DATA:event_name}\\|%{DATA:raw_severity}\\|%{GREEDYDATA:cef_extension}"
      }
      overwrite => ["signature_id", "event_name", "raw_severity", "cef_extension"]
      on_error => "cef_grok_fail"
    }
    if ![cef_grok_fail] {
      grok {
        match => {
          "cef_extension" => [
            ".*?msg=%{DATA:msg_value} cat=%{GREEDYDATA:rest_cef}"
          ]
        }
        on_error => "grok_msg_fail"
      }
      kv {
        source => "cef_extension"
        field_split => " "
        value_split => "="
        target => "cef_kv"
      }
      if ![grok_msg_fail] {
        mutate {
          replace => {
            "cef_kv.msg" => "%{msg_value}"
          }
        }
      }
      mutate {
        replace => {
          "type" => "%{event_name}"
          "cat" => "%{signature_id}"
          "severity" => "%{raw_severity}"
          "suser" => "%{cef_kv.suser}"
          "src" => "%{cef_kv.src}"
          "shost" => "%{cef_kv.shost}"
          "dst" => "%{cef_kv.dst}"
          "dhost" => "%{cef_kv.dhost}"
          "msg" => "%{cef_kv.msg}"
          "act" => "%{cef_kv.act}"
        }
        on_error => "cef_mapping_failed"
      }
    }
  } else {
    mutate {
      rename => {
        "cef_data" => "json_data"
      }
    }
    json {
      source => "json_data"
      array_function => "split_columns"
      on_error => "json_parse_error"
    }
    if [json_parse_error] {
      mutate {
        replace => {
          "kv_data" => "%{json_data}"
        }
        on_error => "no_kv_data"
      }
      kv {
        source => "kv_data"
        field_split => " "
        value_split => "="
        trim_value => '\\"'
        on_error => "kv_parse_error"
      }
    }
    if [json_parse_error] and [kv_parse_error] {
      drop {
        "tag" => "TAG_MALFORMED_MESSAGE"
      }
    }
  }
  if [type] != "" {
    mutate {
      replace => {
        "metadata.product_event_type" => "%{type}"
      }
      on_error => "no_product_event_type"
    }
  }
  if [id] != "" {
    mutate {
      convert => {
        "id" => "string"
      }
      on_error => "id_convert_error"
    }
    if ![id_convert_error] {
      mutate {
        replace => {
          "metadata.product_log_id" => "%{id}"
        }
        on_error => "no_id"
      }
    }
  }
  if [srcUsers] != "" {
    mutate {
      replace => {
        "principal.user.userid" => "%{srcUsers}"
      }
      on_error => "no_srcUsers"
    }
    if ![no_srcUsers] {
      mutate {
        replace => {
          "has_user" => "true"
        }
      }
    }
  }
  for srcUser in srcUsers {
    if [srcUser] != "" {
      mutate {
        replace => {
          "principal.user.userid" => "%{srcUser}"
        }
        on_error => "no_srcUser_1"
      }
      if ![no_srcUser_1] {
        mutate {
          replace => {
            "has_user" => "true"
          }
        }
      }
    }
  }
  if [srcIps] != "" {
    grok {
      match => {
        "srcIps" => "%{IP:src_ips}"
      }
      on_error => "no_src_ips"
      overwrite => ["src_ips"]
    }
    if ![no_src_ips] {
      mutate {
        merge => {
          "principal.ip" => "src_ips"
          "principal.asset.ip" => "src_ips"
        }
        on_error => "principal_ip_merge_failed"
      }
      mutate {
        replace => {
          "has_principal" => "true"
        }
      }
    }
  }
  if [srcHosts] != "" {
    mutate {
      replace => {
        "principal.hostname" => "%{srcHosts}"
        "principal.asset.hostname" => "%{srcHosts}"
      }
      on_error => "no_srcHosts"
    }
    if ![no_srcHosts] {
      mutate {
        replace => {
          "has_principal" => "true"
        }
      }
    }
  }
  for srcIp in srcIps {
    if [srcIp] != "" {
      grok {
        match => {
          "srcIp" => "%{IP:srcIp}"
        }
        on_error => "no_srcIp"
        overwrite => ["srcIp"]
      }
      if ![no_srcIp] {
        mutate {
          merge => {
            "principal.ip" => "srcIp"
            "principal.asset.ip" => "srcIp"
          }
          on_error => "no_srcIp_1"
        }
        if ![no_srcIp_1] {
          mutate {
            replace => {
              "has_principal" => "true"
            }
          }
        }
      }
    }
  }
  for srcHost in srcHosts {
    if [srcHost] =~ "^(?:[0-9]{1,3}[.]){3}[0-9]{1,3}$" {
      mutate {
        merge => {
          "event.idm.read_only_udm.src.ip" => "srcHost"
          "event.idm.read_only_udm.src.asset.ip" => "srcHost"
        }
        on_error => "no_srcHost"
      }
    }
    else if [srcHost] != "" {
      mutate {
        replace => {
          "event.idm.read_only_udm.src.hostname" => "%{srcHost}"
          "event.idm.read_only_udm.src.asset.hostname" => "%{srcHost}"
        }
        on_error => "no_srcHost_2"
      }
    }
  }
  if [dstIps] != "" {
    grok {
      match => {
        "dstIps" => "%{IP:dst_ips}"
      }
      on_error => "no_dst_ips"
      overwrite => ["dst_ips"]
    }
    if ![no_dst_ips] {
      mutate {
        merge => {
          "target.ip" => "dst_ips"
          "target.asset.ip" => "dst_ips"
        }
        on_error => "target_ip_merge_failed"
      }
      mutate {
        replace => {
          "has_target" => "true"
        }
      }
    }
  }
  if [dstHosts] != "" {
    mutate {
      replace => {
        "target.hostname" => "%{dstHosts}"
        "target.asset.hostname" => "%{dstHosts}"
      }
      on_error => "no_dstHosts"
    }
    if ![no_dstHosts] {
      mutate {
        replace => {
          "has_target" => "true"
        }
      }
    }
  }
  for dstHost in dstHosts {
    if [dstHost] != "" {
      mutate {
        replace => {
          "target.hostname" => "%{dstHost}"
          "target.asset.hostname" => "%{dstHost}"
        }
        on_error => "no_dstHost"
      }
      if ![no_dstHost] {
        mutate {
          replace => {
            "has_target" => "true"
          }
        }
      }
    }
  }
    if [destinationAccount] != "" {
      mutate {
        replace => {
          "target.user.userid" => "%{destinationAccount}"
        }
        on_error => "no_destinationAccount"
      }
      if ![no_destinationAccount] {
        mutate {
          replace => {
            "has_target" => "true"
          }
        }
      }
    }
  for acct in destinationAccount {
    if [destinationAccount] != "" {
      mutate {
        replace => {
          "target.user.userid" => "%{acct}"
        }
        on_error => "no_acct"
      }
      if ![no_acct] {
        mutate {
          replace => {
            "has_target" => "true"
          }
        }
      }
    }
  }
  if [destination] != "" {
    mutate {
      replace => {
        "target.resource.name" => "%{destination}"
      }
      on_error => "no_destination"
    }
    if ![no_destination] {
      mutate {
        replace => {
          "has_target" => "true"
        }
      }
    }
  }
  for dest in destination {
    if [destination] != "" {
      mutate {
        replace => {
