# Product: ARBOR SIGHTLINE
# Category: Monitoring
# Supported Format: SYSLOG + JSON
# Reference: https://suricata.readthedocs.io/en/suricata-6.0.0/rules/index.html
# Last Updated: 2025-04-22
# Copyright 2025 Google SecOps

filter {
  mutate {
    replace => {
      "date_time" => ""
      "intem_host" => ""
      "parent_managed_object" => ""
      "impact" => ""
      "importance" => ""
      "alert_id" => ""
      "direction" => ""
      "src_ip" => ""
      "signature" => ""
      "duration" => ""
      "desc2" => ""
      "desc" => ""
      "leader" => ""
      "security_result" => ""
      "start_time" => ""
      "stop_time" => ""
      "vulns" => ""
      "priority" => ""
      "host_name" => ""
      "filename" => ""
      "log_level" => ""
      "namespace" => ""
      "message_desc" => ""
      "pool" => ""
      "thread_id" => ""
      "nameserver_ip" => ""
      "file_path" => ""
      "msg1" => ""
      "prin_user" => ""
      "config_version" => ""
      "old_bgp_attributes" => ""
      "new_bgp_attributes" => ""
      "reason" => ""
      "sample_rate" => ""
      "proto" => ""
      "dst_ip" => ""
      "dst_port" => ""
      "bytes" => ""
      "packets" => ""
      "flows" => ""
      "identifier" => ""
      "prin_url" => ""
      "severity" => ""
      "expected_bps" => ""
      "actual_bps" => ""
      "server" => ""
      "network_protocol" => ""
      "status" => ""
      "percent" => ""
      "rate" => ""
      "rateunit" => ""
      "flags" => ""
      "router" => ""
      "interface" => ""
      "ip_ver" => ""
      "interface_name" => ""
      "interface_id" => ""
      "protocol_id" => ""
      "router_name" => ""
      "has_target_ip" => "false"
      "has_network_protocol" => "false"
    }
  }
  mutate {
    replace => {
      "metadata.vendor_name" => "NETSCOUT"
      "metadata.product_name" => "ARBOR_SIGHTLINE"
    }
  }
  grok {
    match => {
      "message" => [
         "%{SYSLOGTIMESTAMP:date_time} %{WORD}: %{GREEDYDATA:desc} #%{INT:alert_id}, start %{TIMESTAMP_ISO8601:start_time} %{DATA} duration %{INT:duration}, direction %{DATA:direction}, host %{IP:src_ip}, signatures \\(%{GREEDYDATA:signature}\\), impact %{GREEDYDATA:impact}, importance %{INT:importance}, managed_objects \\(\\\"%{GREEDYDATA:intem_host}\\\"\\),",
         "%{SYSLOGTIMESTAMP:date_time} %{WORD}: %{GREEDYDATA:desc} #%{INT:alert_id}, start %{TIMESTAMP_ISO8601:start_time} %{DATA}, duration %{INT:sec}, stop %{TIMESTAMP_ISO8601:stop_time} %{DATA}, importance %{INT:importance}, managed_objects \\(\\\"%{GREEDYDATA:intem_host}\\\"\\), impact %{GREEDYDATA:impact}"
         "%{SYSLOGTIMESTAMP:date_time} %{WORD}: %{GREEDYDATA:desc} \\'%{DATA} %{INT:alert_id} %{IP:src_ip} %{DATA:desc2}\\' started at %{TIMESTAMP_ISO8601:start_time} %{DATA}, leader %{GREEDYDATA:leader}",
         "%{SYSLOGTIMESTAMP:date_time} %{WORD}: %{GREEDYDATA:desc} \\'%{DATA} %{INT:alert_id} %{IP:src_ip} %{DATA:desc2}\\' stopped at %{TIMESTAMP_ISO8601:stop_time} %{DATA}, leader %{GREEDYDATA:leader}",
         "%{SYSLOGTIMESTAMP:date_time} %{WORD}: %{GREEDYDATA:desc} \\'%{DATA} %{INT:alert_id} %{DATA:desc2}\\' (started|stopped) at %{TIMESTAMP_ISO8601:start_time} %{DATA}, leader %{GREEDYDATA:leader} .*",
         "%{SYSLOGTIMESTAMP:date_time} %{WORD}: %{GREEDYDATA:desc} \\'%{DATA} %{INT:alert_id} %{DATA:desc2}\\' (started|stopped) at %{TIMESTAMP_ISO8601:start_time} %{DATA}, leader %{GREEDYDATA:leader}",
         "<%{DATA:priority}>%{SYSLOGTIMESTAMP:event_time}\\s%{DATA:host_name}\\s%{DATA:filename}:\\s%{DATA:log_level}\\s\\s%{DATA:namespace}\\s%{DATA:message_desc}\\s\\[pool-%{INT:pool}-thread-%{INT:thread_id}\\]",
         "<%{DATA:priority}>%{SYSLOGTIMESTAMP:event_time}\\s%{DATA:host_name}\\s%{DATA:filename}: nameserver\\s%{IPV4:nameserver_ip}",
         "<%{DATA:priority}>%{SYSLOGTIMESTAMP:event_time}\\s%{DATA:host_name}\\s%{DATA:filename}: Updating\\s%{GREEDYDATA:file_path}",
         "<%{DATA:priority}>%{SYSLOGTIMESTAMP:event_time}\\s%{DATA:host_name}\\s%{DATA:filename}: options timeout:%{GREEDYDATA:timeout}",
         "<%{DATA:priority}>%{SYSLOGTIMESTAMP:event_time}\\s%{DATA:host_name}\\s%{DATA:filename}: options attempts:%{GREEDYDATA:attempts}",
         "<%{DATA:priority}>%{SYSLOGTIMESTAMP:date_time} %{WORD}: %{DATA:message_desc}; %{DATA}: %{DATA:old_bgp_attributes}; New BGP attributes: %{GREEDYDATA:new_bgp_attributes}",
         "<%{INT:priority}>%{SYSLOGTIMESTAMP:date_time} %{DATA:host_name}: %{DATA:message_desc},URL: %{DATA:prin_url},Severity: %{INT:severity},Client: %{IP:dst_ip},Server: %{DATA:server},Service: %{DATA:network_protocol}/%{INT:dst_port}",
         "<%{INT:priority}>%{SYSLOGTIMESTAMP:date_time} %{DATA:host_name}: %{DATA:message_desc}: %{DATA:identifier},URL: %{DATA:prin_url},Severity: %{INT:severity},Expected: %{DATA:expected_bps},Actual: %{GREEDYDATA:actual_bps}",
         "<%{DATA:priority}>%{SYSLOGTIMESTAMP:event_time}\\s%{DATA:host_name}\\s%{DATA:filename}: %{GREEDYDATA:message_desc}",
         "<%{DATA:priority}>%{SYSLOGTIMESTAMP:date_time} %{WORD}: %{DATA:message_desc}#%{INT:alert_id}, start %{DATA:start_time} %{WORD}, duration %{INT:duration}, stop %{DATA:stop_time} %{WORD}, , importance %{INT:importance}, managed_objects \\(\\\"%{DATA:intem_host}\\\"\\),%{GREEDYDATA}"
         "<%{DATA:priority}>%{SYSLOGTIMESTAMP:date_time} %{WORD}: %{DATA:message_desc}#%{INT:alert_id}%{DATA:msg1}, %{GREEDYDATA}",
         "<%{DATA:priority}>%{SYSLOGTIMESTAMP:date_time} %{WORD}: %{DATA:message_desc} on leader %{DATA:host_name} to version %{NUMBER:config_version} by %{GREEDYDATA:prin_user}",
         "<%{DATA:priority}>%{SYSLOGTIMESTAMP:date_time} %{WORD}: %{DATA:message_desc}, leader %{DATA:host_name} %{GREEDYDATA}",
         "<%{INT:priority}>%{SYSLOGTIMESTAMP:date_time} %{WORD}: collector %{IP:src_ip} %{WORD} since %{TIMESTAMP_ISO8601:start_time} %{DATA} duration %{INT:duration}",
         "<%{INT:priority}>%{SYSLOGTIMESTAMP:date_time} %{WORD}: %{DATA:message_desc} %{IP:src_ip} reason %{DATA:reason} %{DATA} %{TIMESTAMP_ISO8601:start_time} %{DATA} duration %{INT:duration}",
         "<%{INT:priority}>%{SYSLOGTIMESTAMP:date_time} %{WORD}: rtr %{IP:src_ip} rtrSampleRate %{INT:sample_rate} proto %{INT:proto} src %{IP:src_ip} dst %{IP:dst_ip} dstPort %{INT:dst_port} firstSeen %{TIMESTAMP_ISO8601:start_time} %{DATA} lastSeen %{TIMESTAMP_ISO8601:stop_time} %{DATA} bytes %{INT:bytes} pkts %{INT:packets} flows %{INT:flows}",
         "<%{INT:priority}>%{SYSLOGTIMESTAMP:date_time} %{WORD}: %{DATA:message_desc} id %{INT:alert_id} status %{DATA} severity %{INT:severity} %{DATA} src %{IP:src_ip}/%{INT:src_port} %{DATA:host_name} dst %{IP:dst_ip}/%{INT:dst_port} %{DATA} start %{TIMESTAMP_ISO8601:start_time} %{DATA} duration %{INT:duration} percent %{INT:percent} rate %{INT:rate} rateUnit %{DATA:rateunit} protocol %{DATA:network_protocol} flags %{DATA:flags} url %{GREEDYDATA:prin_url}",
         "<%{INT:priority}>%{SYSLOGTIMESTAMP:date_time} %{WORD}: %{DATA:message_desc} id %{INT:alert_id} status %{DATA} severity %{INT:severity} %{DATA} src %{IP:src_ip}/%{INT:src_port} %{DATA:host_name} dst %{IP:dst_ip}/%{INT:dst_port} %{DATA} start %{DATA:start_time} duration %{INT:duration} percent %{INT:percent} rate %{INT:rate} rateUnit %{DATA:rateunit}protocol %{DATA:network_protocol} flags %{DATA:flags} url%{GREEDYDATA:prin_url}",
         "<%{DATA:priority}>%{SYSLOGTIMESTAMP:date_time} %{WORD}: %{DATA:message_desc} id %{INT:alert_id} status %{DATA:status} severity %{INT:severity} %{DATA} ipVer %{DATA:ip_ver} src %{IP:src_ip}/%{INT:src_port} %{DATA} dst %{IP:dst_ip}/%{INT:dst_port} %{DATA} start %{DATA:start_time} %{DATA} duration %{DATA:duration} percent %{DATA:percent} rate %{INT:rate} rateUnit %{DATA:rateunit} protocol %{DATA:network_protocol} flags %{DATA:flags} url %{DATA:prin_url},",
         "<%{INT:priority}>%{SYSLOGTIMESTAMP:date_time} %{WORD}: %{DATA:message_desc} id %{INT:alert_id} status %{DATA:status} severity %{INT:severity} %{DATA} impact \\\"%{DATA:impact}\\\" src %{IP:src_ip}/%{INT:src_port} %{DATA} dst %{IP:dst_ip}/%{INT:dst_port} %{DATA} start %{DATA:start_time} %{DATA} duration %{INT:duration} percent %{DATA:percent} rate %{INT:rate} rateUnit %{DATA:rateunit} protocol %{DATA:network_protocol} flags %{DATA:flags} url %{DATA:prin_url}, \\(managed object \\\"%{DATA:intem_host}\\\"\\), \\(parent managed object %{DATA}\\), \\(Router \\\"%{DATA:router}\\\"\\), \\(Interface \\\"%{GREEDYDATA:interface}\\\"\\)",
         "<%{INT:priority}>%{SYSLOGTIMESTAMP:date_time} %{DATA}: %{DATA} Protocol id %{INT:protocol_id} status %{DATA:status} severity %{INT:severity} %{DATA} router %{IP:src_ip} router_name %{DATA:router_name} interface %{INT:interface_id} interface_name %{DATA:interface_name} %{WORD:direction}"
      ]
    }
    overwrite => ["intem_host","date_time", "impact", "importance", "alert_id",
    "direction", "src_ip", "signature", "duration", "desc", "desc2", "leader",
    "start_time", "stop_time", "priority", "host_name", "filename",
    "log_level", "namespace", "message_desc", "pool", "thread_id",
    "nameserver_ip", "file_path", "msg1", "config_version", "prin_user", "old_bgp_attributes", "new_bgp_attributes", "reason","sample_rate", "proto", "dst_ip", "dst_port", "bytes", "packets", "flows","identifier", "prin_url", "severity", "expected_bps", "actual_bps", "server", "network_protocol", "status", "percent", "rate", "rateunit", "flags", "router", "interface","ip_ver","interface_name","direction","interface_id","protocol_id","router_name"]
    on_error => "message_grok_fail"
  }
  if [message] != "" {
    grok {
      match => {
        "message" =>
        "parent managed object \\\"%{DATA:parent_managed_object}\\\"\\)"
      }
      overwrite => ["parent_managed_object"]
      on_error => "parent_managed_object_grok_fail"
    }
  }
  if [msg1] != "" {
    mutate {
      replace => {
        "meg1_label.value.string_value" => "%{msg1}"
        "meg1_label.key" => "message_description"
      }
      on_error => "msg1_replace_fail"
    }
    if ![msg1_replace_fail] {
      mutate {
        merge => {
          "additional.fields" => "meg1_label"
        }
        on_error => "msg1_merge_fail"
      }
    }
  }
  if [config_version] != "" {
    mutate {
      replace => {
        "config_version_label.value.string_value" => "%{config_version}"
        "config_version_label.key" => "config_version"
      }
      on_error => "config_version_replace_fail"
    }
    if ![config_version_replace_fail] {
      mutate {
        merge => {
          "additional.fields" => "config_version_label"
        }
        on_error => "config_version_merge_fail"
      }
    }
  }
  if [prin_user] != "" {
    mutate {
      replace => {
        "principal.user.userid" => "%{prin_user}"
      }
      on_error => "prin_user_replace_fail"
    }
  }
  if [old_bgp_attributes] != "" {
    mutate {
      replace => {
        "old_bgp_attributes_label.value.string_value" => "%{old_bgp_attributes}"
        "old_bgp_attributes_label.key" => "old_bgp_attributes"
      }
      on_error => "old_bgp_attributes_replace_fail"
    }
    if ![old_bgp_attributes_replace_fail] {
      mutate {
        merge => {
          "additional.fields" => "old_bgp_attributes_label"
        }
        on_error => "old_bgp_attributes_merge_fail"
      }
    }
  }
  if [new_bgp_attributes] != "" {
    mutate {
      replace => {
        "new_bgp_attributes_label.value.string_value" => "%{new_bgp_attributes}"
        "new_bgp_attributes_label.key" => "new_bgp_attributes"
      }
      on_error => "new_bgp_attributes_replace_fail"
    }
    if ![new_bgp_attributes_replace_fail] {
      mutate {
        merge => {
          "additional.fields" => "new_bgp_attributes_label"
        }
        on_error => "new_bgp_attributes_merge_fail"
      }
    }
  }
  grok {
    match => {
      "new_bgp_attributes" => "%{IP:src_ip}"
    }
    on_error => "src_ip_grok_fail"
    overwrite => ["src_ip"]
  }
  if [reason] != "" {
    mutate {
      replace => {
        "reason_label.value.string_value" => "%{reason}"
        "reason_label.key" => "reason"
      }
      on_error => "reason_replace_fail"
    }
    if ![reason_replace_fail] {
      mutate {
        merge => {
          "additional.fields" => "reason_label"
        }
        on_error => "reason_merge_fail"
      }
    }
  }
  mutate {
    convert => {
      "sample_rate" => "string"
    }
    on_error => "sample_rate_convert_fail"
  }
  if [sample_rate] != "" {
    mutate {
      replace => {
        "sample_rate_label.value.string_value" => "%{sample_rate}"
        "sample_rate_label.key" => "sample_rate"
      }
      on_error => "sample_rate_replace_fail"
    }
    if ![sample_rate_replace_fail] {
      mutate {
        merge => {
          "additional.fields" => "sample_rate_label"
        }
        on_error => "sample_rate_merge_fail"
      }
    }
  }
  mutate {
    convert => {
      "proto" => "string"
    }
    on_error => "proto_convert_fail"
  }
  if [proto] != "" and [proto] == "6"{
    mutate {
      replace => {
        "network.ip_protocol" => "TCP"
      }
      on_error => "network_protocol_replace_fail"
    }
    if ![network_protocol_replace_fail] {
      mutate {
        replace => {
          "has_network_protocol" => "true"
        }
      }
    }
  }
  else {
    mutate {
      convert => {
        "proto" => "string"
      }
      on_error => "proto_convert_fail"
    }
    if [proto] != "" {
      mutate {
        replace => {
          "proto_label.value.string_value" => "%{proto}"
          "proto_label.key" => "proto"
        }
        on_error => "proto_replace_fail"
      }
      if ![proto_replace_fail] {
        mutate {
          merge => {
            "additional.fields" => "proto_label"
          }
          on_error => "proto_merge_fail"
        }
      }
    }
  }
  if [dst_ip] != "" {
    mutate {
      merge => {
        "target.ip" => "dst_ip"
      }
      on_error => "dst_ip_merge_fail"
    }
    if ![dst_ip_merge_fail] {
      mutate {
        replace =>{
          "has_target_ip" => "true"
        }
      }
    }
  }
  if [dst_port] != "" {
    mutate {
      replace => {
        "target.port" => "%{dst_port}"
      }
      on_error => "dst_port_replace_fail"
    }
    mutate {
      convert => {
        "target.port" => "integer"
      }
      on_error => "dst_port_convert_fail"
    }
  }
  mutate {
    convert => {
      "flows" => "string"
    }
    on_error => "flows_convert_fail"
  }
  if [flows] != "" {
    mutate {
      replace => {
        "flows_label.value.string_value" => "%{flows}"
        "flows_label.key" => "flows"
      }
      on_error => "flows_replace_fail"
    }
    if ![flows_replace_fail] {
      mutate {
        merge => {
          "additional.fields" => "flows_label"
        }
        on_error => "flows_merge_fail"
      }
    }
  }
  if [identifier] != "" {
    mutate {
      replace => {
        "identifier_label.value.string_value" => "%{identifier}"
        "identifier_label.key" => "identifier"
      }
      on_error => "identifier_replace_fail"
    }
    if ![identifier_replace_fail] {
      mutate {
        merge => {
          "additional.fields" => "identifier_label"
        }
        on_error => "identifier_merge_fail"
      }
    }
  }
  if [prin_url] != "" {
    mutate {
      replace => {
        "principal.url" => "%{prin_url}"
      }
      on_error => "prin_url_replace_fail"
    }
  }
  mutate {
    convert => {
      "expected_bps" => "string"
    }
    on_error => "expected_bps_convert_fail"
  }
  if [expected_bps] != "" {
    mutate {
      replace => {
        "expected_bps_label.value.string_value" => "%{expected_bps}"
        "expected_bps_label.key" => "expected_bps"
      }
      on_error => "expected_bps_replace_fail"
    }
    if ![expected_bps_replace_fail] {
      mutate {
        merge => {
          "additional.fields" => "expected_bps_label"
        }
        on_error => "expected_bps_merge_fail"
      }
    }
  }
  mutate {
    convert => {
      "actual_bps" => "string"
    }
    on_error => "actual_bps_convert_fail"
  }
  if [actual_bps] != "" {
    mutate {
      replace => {
        "actual_bps_label.value.string_value" => "%{actual_bps}"
        "actual_bps_label.key" => "actual_bps"
      }
      on_error => "actual_bps_replace_fail"
    }
    if ![actual_bps_replace_fail] {
      mutate {
        merge => {
          "additional.fields" => "actual_bps_label"
        }
        on_error => "actual_bps_merge_fail"
      }
    }
  }
  if [severity] != "" {
    if [severity] in ["10","9"] {
      mutate {
        replace => {
          "security_result.severity" => "INFORMATIONAL"
        }
      }
    }
    else if [severity] in ["8","7"] {
      mutate {
        replace => {
          "security_result.severity" => "LOW"
        }
      }
    }
    else if [severity] == "6" {
      mutate {
        replace => {
          "security_result.severity" => "MEDIUM"
        }
      }
    }
    else if [severity] in ["5", "4"] {
      mutate {
        replace => {
          "security_result.severity" => "HIGH"
        }
      }
    }
    else if [severity] in ["3", "2", "1"] {
      mutate {
        replace => {
          "security_result.severity" => "CRITICAL"
        }
      }
    }
  }
  if [server] != "" {
    mutate {
      replace => {
        "server_label.value.string_value" => "%{server}"
        "server_label.key" => "server"
      }
      on_error => "server_replace_fail"
    }
    if ![server_replace_fail] {
      mutate {
        merge => {
          "additional.fields" => "server_label"
        }
        on_error => "server_merge_fail"
      }
    }
  }
  mutate {
    uppercase => ["network_protocol"]
  }
  if [network_protocol] =~ "(?i)(TCP|UDP|ICMP|VRRP|EIGRP|ESP|ETHERIP|GRE|IP6IN4|PIM)" and [network_protocol] != "nil" {
    mutate {
      replace => {
        "network.ip_protocol" => "%{network_protocol}"
      }
      on_error => "network_protocol_replace_fail"
    }
    if ![network_protocol_replace_fail] {
      mutate {
        replace => {
          "has_network_protocol" => "true"
        }
      }
    }
  }
  if [status] != "" {
    mutate {
      replace => {
        "status_label.value.string_value" => "%{status}"
        "status_label.key" => "status"
      }
      on_error => "status_replace_fail"
    }
    if ![status_replace_fail] {
      mutate {
        merge => {
          "additional.fields" => "status_label"
        }
        on_error => "status_merge_fail"
      }
    }
  }
  mutate {
    convert => {
      "percent" => "string"
    }
    on_error => "percent_convert_fail"
  }
  if [percent] != "" {
    mutate {
      replace => {
        "percent_label.value.string_value" => "%{percent}"
        "percent_label.key" => "percent"
      }
      on_error => "percent_replace_fail"
    }
    if ![percent_replace_fail] {
      mutate {
        merge => {
          "additional.fields" => "percent_label"
        }
        on_error => "percent_merge_fail"
      }
    }
  }
  mutate {
    convert => {
      "rate" => "string"
    }
    on_error => "rate_convert_fail"
  }
  if [rate] != "" {
    mutate {
      replace => {
        "rate_label.value.string_value" => "%{rate}"
        "rate_label.key" => "rate"
      }
      on_error => "rate_replace_fail"
    }
    if ![rate_replace_fail] {
      mutate {
        merge => {
          "additional.fields" => "rate_label"
        }
        on_error => "rate_merge_fail"
      }
    }
  }
  if [rateunit] != "" {
    mutate {
      replace => {
        "rateunit_label.value.string_value" => "%{rateunit}"
        "rateunit_label.key" => "rateunit"
      }
      on_error => "rateunit_replace_fail"
    }
    if ![rateunit_replace_fail] {
      mutate {
        merge => {
          "additional.fields" => "rateunit_label"
        }
        on_error => "rateunit_merge_fail"
      }
    }
  }
  if [flags] != "" {
    mutate {
      replace => {
        "flags_label.value.string_value" => "%{flags}"
        "flags_label.key" => "flags"
      }
      on_error => "flags_replace_fail"
    }
    if ![flags_replace_fail] {
      mutate {
        merge => {
          "additional.fields" => "flags_label"
        }
        on_error => "flags_merge_fail"
      }
    }
  }
  if [router] != "" {
    mutate {
      replace => {
        "router_label.value.string_value" => "%{router}"
        "router_label.key" => "router"
      }
      on_error => "router_replace_fail"
    }
    if ![router_replace_fail] {
      mutate {
        merge => {
          "additional.fields" => "router_label"
        }
        on_error => "router_merge_fail"
      }
    }
  }
  if [interface] != "" {
    mutate {
      replace => {
        "Interface_label.value.string_value" => "%{interface}"
        "Interface_label.key" => "Interface"
      }
      on_error => "Interface_replace_fail"
    }
    if ![Interface_replace_fail] {
      mutate {
        merge => {
          "additional.fields" => "Interface_label"
        }
        on_error => "Interface_merge_fail"
      }
    }
  }
  mutate {
    convert => {
      "ip_ver" => "string"
    }
    on_error => "ipVer_convert_fail"
  }
  if [ip_ver] != "" {
    mutate {
      replace => {
        "ipVer_label.value.string_value" => "%{ip_ver}"
        "ipVer_label.key" => "ipVer"
      }
      on_error => "ipVer_replace_fail"
    }
    if ![ipVer_replace_fail] {
      mutate {
        merge => {
          "additional.fields" => "ipVer_label"
        }
        on_error => "ipVer_merge_fail"
      }
    }
  }
  if [bytes] != "" {
    mutate {
      replace => {
        "network.sent_bytes" => "%{bytes}"
      }
      on_error => "bytes_replace_fail"
    }
    mutate {
      convert => {
        "network.sent_bytes" => "uinteger"
      }
      on_error => "bytes_convert_fail"
    }
  }
  if [packets] != "" {
    mutate {
      replace => {
        "network.sent_packets" => "%{packets}"
      }
      on_error => "packets_replace_fail"
    }
    mutate {
        convert => {
          "network.sent_packets" => "integer"
      }
      on_error => "packets_convert_fail"
    }
  }
  mutate {
    convert => {
      "protocol_id" => "string"
    }
    on_error => "protocol_id_convert_fail"
  }
  if [protocol_id] != "" {
    mutate {
      replace => {
        "protocol_id_label.value.string_value" => "%{protocol_id}"
        "protocol_id_label.key" => "protocol_id"
      }
      on_error => "protocol_id_replace_fail"
    }
    if ![protocol_id_replace_fail] {
      mutate {
        merge => {
          "additional.fields" => "protocol_id_label"
        }
        on_error => "protocol_id_merge_fail"
      }
    }
  }
  if [router_name] != "" {
    mutate {
      replace => {
        "router_name_label.value.string_value" => "%{router_name}"
        "router_name_label.key" => "router_name"
      }
      on_error => "router_name_replace_fail"
    }
    if ![router_name_replace_fail] {
      mutate {
        merge => {
          "additional.fields" => "router_name_label"
        }
        on_error => "router_name_merge_fail"
      }
    }
  }
  if [interface_id] != "" {
    mutate {
      replace => {
        "interface_id_label.value.string_value" => "%{interface_id}"
        "interface_id_label.key" => "interface_id"
      }
      on_error => "interface_id_replace_fail"
    }
    if ![interface_id_replace_fail] {
      mutate {
        merge => {
          "additional.fields" => "interface_id_label"
        }
        on_error => "interface_id_merge_fail"
      }
    }
  }
  if [interface_name] != "" {
    mutate {
      replace => {
        "interface_name_label.value.string_value" => "%{interface_name}"
        "interface_name_label.key" => "interface_name"
      }
      on_error => "interface_name_replace_fail"
    }
    if ![interface_name_replace_fail] {
      mutate {
        merge => {
          "additional.fields" => "interface_name_label"
        }
        on_error => "interface_name_merge_fail"
      }
    }
  }
  if [date_time] != "" {
    date {
      match => ["date_time", "MMM dd HH:mm:ss", "MMM  d HH:mm:ss"]
      timezone="Europe/London"
      rebase => true
    }
  }
  if [start_time] != "" {
    date {
      match => ["start_time", "yyyy-MM-dd HH:mm:ss", "yyyy-MM-dd"]
      target => "vulns.vulnerabilities.scan_start_time"
    }
  }
  if [stop_time] != "" {
    date {
      match => ["stop_time", "yyyy-MM-dd HH:mm:ss"]
      target => "vulns.vulnerabilities.scan_end_time"
    }
  }
  if [desc] != "" and [desc2] != "" {
    mutate {
      replace => {
        "metadata.description" => "%{desc}: %{desc2}"
      }
    }
  } else if [desc] != "" {
    mutate {
      replace => {
        "metadata.description" => "%{desc}"
      }
    }
  }
  if [src_ip] != "" {
    mutate {
      merge => {
        "principal.ip" => "src_ip"
      }
    }
  }
  if [intem_host] != "" {
    mutate {
      replace => {
        "target.group.product_object_id" =>
        "%{intem_host}"
      }
    }
  }
  if [impact] != "" {
    mutate {
      replace => {
        "impact_value.key" => "Impact"
        "impact_value.value" => "%{impact}"
      }
    }
    mutate {
      merge => {
        "security_result.detection_fields" => "impact_value"
      }
    }
  }
  if [importance] != "" {
    mutate {
      replace => {
        "importance_value.key" => "Importance"
        "importance_value.value" => "%{importance}"
      }
    }
    mutate {
      merge => {
        "security_result.detection_fields" => "importance_value"
      }
    }
  }
  if [signature] != "" {
    mutate {
      replace => {
        "signature_value.key" => "Signature"
        "signature_value.value" => "%{signature}"
      }
    }
    mutate {
      merge => {
        "security_result.detection_fields" => "signature_value"
      }
    }
  }
  if [leader] != "" {
    mutate {
      replace => {
        "leader_value.key" => "Leader"
        "leader_value.value" => "%{leader}"
      }
    }
    mutate {
      merge => {
        "security_result.detection_fields" => "leader_value"
      }
    }
  }
  if [parent_managed_object] != "" {
    mutate {
      replace => {
        "parent_managed_object_value.key" => "parent_managed_object"
        "parent_managed_object_value.value" => "%{parent_managed_object}"
      }
    }
    mutate {
      merge => {
        "security_result.detection_fields" => "parent_managed_object_value"
      }
    }
  }
  if [alert_id] != "" {
    mutate {
      replace => {
        "alert_id_value.key" => "Alert ID"
        "alert_id_value.value" => "%{alert_id}"
      }
    }
    mutate {
      merge => {
        "security_result.detection_fields" => "alert_id_value"
      }
    }
  }
  if [direction] =~ "incoming" {
    mutate {
      replace => {
        "network.direction" => "INBOUND"
      }
    }
  }
  if [duration] != "" and [duration] != "0" {
    mutate {
      replace => {
        "network.session_duration.seconds" => "%{duration}"
      }
      convert => {
        "network.session_duration.seconds" => "integer"
      }
    }
  }
  if [alert_id] != "" {
    mutate {
      replace => {
        "principal.process.pid" => "%{alert_id}"
      }
    }
  }
  date {
    match => ["event_time", "MMM dd HH:mm:ss", "MMM d HH:mm:ss"]
    timezone="Europe/London"
    rebase => true
    target => "metadata.event_timestamp"
    on_error => "syslog_timestamp_error"
  }
  if [priority] != "" {
    mutate {
      replace => {
        "token_priority.value.string_value" => "%{priority}"
      }
      on_error => "no_priority"
    }
    if ![no_priority] and [token_priority][value][string_value] != "" {
      mutate {
        replace => {
          "token_priority.key" => "Priority"
        }
      }
      mutate {
        merge => {
          "additional.fields" => "token_priority"
        }
      }
    }
  }
  if [host_name] != "" {
    mutate {
      replace => {
        "principal.hostname" => "%{host_name}"
      }
      on_error => "hostname_error"
    }
  }
  if [filename] != "" {
    mutate {
      replace => {
        "principal.process.file.full_path" => "%{filename}"
      }
      on_error => "filename_error"
    }
  }
  mutate {
    replace => {
      "token_log_level.value.string_value" => "%{log_level}"
    }
    on_error => "no_log_level"
  }
  if ![no_log_level] and [token_log_level][value][string_value] != "" {
    mutate {
      replace => {
        "token_log_level.key" => "log_level"
      }
    }
    mutate {
      merge => {
        "additional.fields" => "token_log_level"
      }
    }
  }
  if [namespace] != "" {
    mutate {
      replace => {
        "principal.namespace" => "%{namespace}"
      }
      on_error => "namespace_error"
    }
  }
  if [message_desc] != "" {
    mutate {
      replace => {
        "metadata.description" => "%{message_desc}"
      }
      on_error => "no_message"
    }
  }
  mutate {
    replace => {
      "token_pool.value.string_value" => "%{pool}"
    }
    on_error => "no_pool"
  }
  if ![no_pool] and [token_pool][value][string_value] != "" {
    mutate {
      replace => {
        "token_pool.key" => "pool"
      }
    }
    mutate {
      merge => {
        "additional.fields" => "token_pool"
      }
    }
  }
  mutate {
    replace => {
      "token_thread_id.value.string_value" => "%{thread_id}"
    }
    on_error => "no_thread_id"
  }
  if ![no_thread_id] and [token_thread_id][value][string_value] != "" {
    mutate {
      replace => {
        "token_thread_id.key" => "thread_id"
      }
    }
    mutate {
      merge => {
        "additional.fields" => "token_thread_id"
      }
    }
  }
  if [nameserver_ip] != "" {
    mutate {
      merge => {
        "principal.ip" => "nameserver_ip"
      }
      on_error => "no_nameserver_ip"
    }
  }
  if [file_path] != "" {
    mutate {
      replace => {
        "target.process.file.full_path" => "%{file_path}"
      }
      on_error => "file_path_error"
    }
  }
  mutate {
    replace => {
      "token_timeout.value.string_value" => "%{timeout}"
    }
    on_error => "no_timeout"
  }
  if ![no_timeout] and [token_timeout][value][string_value] != "" {
    mutate {
      replace => {
        "token_timeout.key" => "timeout"
      }
    }
    mutate {
      merge => {
        "additional.fields" => "token_timeout"
      }
    }
  }
  mutate {
    replace => {
      "token_attempts.value.string_value" => "%{attempts}"
    }
    on_error => "no_attempts"
  }
  if ![no_attempts] and [token_attempts][value][string_value] != "" {
    mutate {
      replace => {
        "token_attempts.key" => "attempts"
      }
    }
    mutate {
      merge => {
        "additional.fields" => "token_attempts"
      }
    }
  }
  if [desc2] =~ "(DNS Amplification|IP Fragmentation)"
  and [message] =~ "started" and [src_ip] != "" {
    mutate {
      replace => {
        "metadata.event_type" => "SCAN_PROCESS"
      }
    }
  } else if
  [desc2] =~ "(DNS Amplification|IP Fragmentation|IPv4 Auto-Mitigation)"
  and [message] =~ "stopped" and [src_ip] != "" {
    mutate {
      replace => {
        "metadata.event_type" => "SCAN_PROCESS"
      }
    }
  } else if [desc] =~ "(Host Detection alert)" and [message] =~ "start" {
    if [message] !~ "stop" {
      mutate {
        replace => {
          "security_result.threat_status" => "ACTIVE"
        }
      }
      mutate {
        replace => {
          "metadata.event_type" => "SCAN_HOST"
        }
      }
    }
    else {
      mutate {
        replace => {
          "security_result.threat_status" => "CLEARED"
        }
      }
      mutate {
        replace => {
          "metadata.event_type" => "GENERIC_EVENT"
        }
      }
    }
  }
  else if ([has_target_ip] == "true" and [src_ip] != "") or ([has_network_protocol] == "true" and [src_ip] != "" and [has_target_ip] == "true")  {
    mutate {
      replace => {
        "metadata.event_type" => "NETWORK_CONNECTION"
      }
    }
  }
  else if [host_name] != "" or [src_ip] != "" {
    mutate {
      replace => {
        "metadata.event_type" => "STATUS_UPDATE"
      }
    }
  }
  else {
    mutate {
      replace => {
        "metadata.event_type" => "GENERIC_EVENT"
      }
    }
  }
  mutate {
    rename => {
      "principal" => "event.idm.read_only_udm.principal"
      "target" => "event.idm.read_only_udm.target"
      "metadata" => "event.idm.read_only_udm.metadata"
      "network" => "event.idm.read_only_udm.network"
      "additional" => "event.idm.read_only_udm.additional"
    }
  }
  if [security_result] != "" {
    mutate {
      merge => {
        "event.idm.read_only_udm.security_result" => "security_result"
      }
    }
  }
  if [message] =~ "Host Detection" {
    mutate {
      replace => {
        "event.idm.read_only_udm.metadata.product_event_type" =>
        "Host Detection"
      }
    }
  } else if [message] =~ " started" {
    mutate {
      replace => {
        "event.idm.read_only_udm.metadata.product_event_type" =>
        "TMS Mitigation started"
      }
    }
  } else if [message] =~ " stopped" {
    mutate {
      replace => {
        "event.idm.read_only_udm.metadata.product_event_type" =>
        "TMS Mitigation stopped"
      }
    }
  }
  if [vulns] != "" {
    mutate {
      merge => {
        "event.idm.read_only_udm.extensions.vulns.vulnerabilities" =>
        "vulns.vulnerabilities"
      }
    }
  }
  mutate {
    merge => {
      "@output" => "event"
    }
  }
}
