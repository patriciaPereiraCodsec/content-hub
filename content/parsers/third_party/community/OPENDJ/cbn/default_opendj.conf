# Product: ForgeRock OpenDJ
# Category: LDAP
# Supported Format: SYSLOG + KV
# Reference: N/A
# Last Updated: 2020-10-01
# Copyright 2021 Chronicle LLC


filter {

  grok {
    match => {
      "message" => [
        "<%{POSINT}>%{POSINT} %{TIMESTAMP_ISO8601:ts} %{HOSTNAME:interim_server} (?P<application>\\S+) %{POSINT} %{HOSTNAME} \\[%{DATA} %{GREEDYDATA:message_details}\\]"
      ]
    }
  }

  date {
    match => ["ts", "RFC3339", "ISO8601"]
  }

  kv {
    source => "message_details"
    field_split => " "
    value_split => "="
    trim_value => "\"" # "
    target => "kv_fields"
  }

  # When protocol is "internal" then IP's have "internal" values,
  # which we can't map.
  if [kv_fields][request][protocol] == "internal" {
    drop {}
  }

  mutate {
    convert => {
      "kv_fields.client.port" => "integer"
      "kv_fields.server.port" => "integer"
    }
    replace => {
      "intermediary" => ""
    }
  }

  mutate {
    rename => {
      "interim_server" => "intermediary.hostname"
      "kv_fields.request.filter" => "security_result.description"
    }
  }

  if [kv_fields][response][status] == "SUCCESSFUL" {
    mutate {
      replace => {
        "action" => "ALLOW"
      }
      merge => {
        "security_result.action" => "action"
      }
    }
    mutate {
      merge => {
        "event.idm.read_only_udm.security_result" => "security_result"
      }
    }
  } else if [kv_fields][response][status] == "FAILED" {
    mutate {
      replace => {
        "action" => "BLOCK"
      }
      merge => {
        "security_result.action" => "action"
      }
    }
    mutate {
      merge => {
        "event.idm.read_only_udm.security_result" => "security_result"
      }
    }
  }

  mutate {
    rename => {
      "application" => "event.idm.read_only_udm.principal.application"
      "kv_fields.client.port" => "event.idm.read_only_udm.principal.port"
      "kv_fields.server.port" => "event.idm.read_only_udm.target.port"
    }
    replace => {
      # Using NETWORK_UNCATEGORIZED because we have enough data for it and we want
      # to avoid using GENERIC_EVENT.
      # OPENDJ  implements LDAP protocol and its  events are tied to LDAP protocol
      # methods. Users create and manipulate  directories and authorize to confirm
      # that they have permission to  interact with  specified  directories. These
      # events do not fit well  into events in udm.proto. Also, none of the events
      # contains  any user related  data. This  effectively  blocks us from  using
      # FILE_*, USER_* and RESOURCE_* event groups. Events in those groups are the
      # most fitting.  Using NETWORK_UNCATEGORIZED seems a little bit tool generic
      # for the  actions  performed, but it's as  specific  as we can get with the
      # data we have.
      "event.idm.read_only_udm.metadata.event_type" => "NETWORK_UNCATEGORIZED"
      "event.idm.read_only_udm.metadata.product_event_type" => "%{kv_fields.request.operation}"
      "event.idm.read_only_udm.network.application_protocol" => "LDAP"
    }
    merge => {
      "event.idm.read_only_udm.principal.ip" => "kv_fields.client.ip"
      "event.idm.read_only_udm.target.ip" => "kv_fields.server.ip"
      "event.idm.read_only_udm.intermediary" => "intermediary"
    }
  }

  if [kv_fields][request][dn] != "" {
    mutate {
      rename => {
        "kv_fields.request.dn" => "event.idm.read_only_udm.target.resource.name"
      }
      replace => {
        "event.idm.read_only_udm.target.resource.type" => "Entry DN"
      }
    }
  }

  mutate {
    merge => {
      "@output" => "event"
    }
  }

}
