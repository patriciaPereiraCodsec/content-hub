        "additional_country_iso_code.value.string_value" => "%{geoip.country_iso_code}"
      }
      on_error => "country_iso_code_not_empty"
    }
    mutate {
      merge => {
        "event.idm.read_only_udm.additional.fields" => "additional_country_iso_code"
      }
      on_error => "country_iso_code_not_empty"
    }
  }
  if [data][target] != "" {
    mutate {
      replace => {
        "meta_event_type" => "USER_LOGIN"
        "event.idm.read_only_udm.extensions.auth.type" => "%{auth_type}"
      }
      on_error => "no_auth_type"
    }
  }
  else if [data][userid] != "" {
    mutate {
      replace => {
        "meta_event_type" => "USER_UNCATEGORIZED"
      }
    }
  }
  else if [data][origin] != "" or [geoip][ip] != "" {
    mutate {
      replace => {
        "meta_event_type" => "STATUS_UPDATE"
      }
    }
  }
  else {
    mutate {
      replace => {
        "meta_event_type" => "GENERIC_EVENT"
      }
    }
  }
  if [security_result] != "" {
    mutate {
      merge => {
        "event.idm.read_only_udm.security_result" => "security_result"
      }
      on_error => "no_security_result"
    }
  }
  mutate {
    replace => {
      "event.idm.read_only_udm.metadata.product_name" => "IBM_SECURITY_VERIFY_SAAS"
      "event.idm.read_only_udm.metadata.vendor_name" => "IBM_SECURITY_VERIFY_SAAS"
      "event.idm.read_only_udm.metadata.event_type" => "%{meta_event_type}"
    }
    on_error => "no_meta_event_type"
  }
  mutate {
    merge => {
      "@output" => "event"
    }
  }
}
