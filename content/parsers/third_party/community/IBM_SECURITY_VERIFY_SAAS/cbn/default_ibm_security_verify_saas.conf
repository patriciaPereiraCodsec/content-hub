    }
    mutate {
      replace => {
        "operation_path" => "%{operation.path}"
      }
      on_error => "field_not_found"
    }
    mutate {
      replace => {
        "operation_value" => "%{operation.value}"
      }
      on_error => "field_not_found"
    }
    if [operation_path] in ["name.givenName", "name.familyName", "name.middleName", "ipdScore"] or [operation][path] =~ "emails|phoneNumbers"  {
      if [operation_value] != "" {
        mutate {
          replace => {
            "additional_operation_label.key" => "op: %{operation.op}, path: %{operation.path}"
