          }
          on_error => "field_not_found"
        }
        for index, field in operation.value.values {
          if [index] == 0 {
            mutate {
              replace => {
                "field_value" => "%{field}"
              }
            }
          }
          else {
            mutate {
              replace => {
                "field_value" => "%{field_value}, %{field}"
              }
              on_error => "field_not_found"
            }
          }
        }
        mutate {
          replace => {
            "additional_operation_label.value.string_value" => "%{field_value}"
          }
        }
        mutate {
          merge => {
            "event.idm.read_only_udm.additional.fields" => "additional_operation_label"
