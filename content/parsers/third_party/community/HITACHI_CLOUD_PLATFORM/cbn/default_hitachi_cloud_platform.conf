# Product: Hitachi Cloud Platform
# Category: Hitachi Cloud Platform
# Supported Format: SYSLOG
# Reference: https://www.google.com/url?q=https://knowledge.hitachivantara.com/Documents/Storage/HCP_for_Cloud_Scale/2.4.x/Installation/05_Logs_and_diagnostic_information&sa=D&source=buganizer&usg=AOvVaw2XBNlo_7IgEpffqPrpbQYv
# Last Updated: 2023-05-30
# Copyright 2023 Chronicle LLC

filter {
  mutate {
    replace => {
      "host_name" => ""
      "response_code" => ""
      "http_header" => ""
      "src_ip" => ""
      "http_method" => ""
      "url" => ""
      "product_event" => ""
      "ex_data" => ""
      "intermediary" => ""
      "has_principal" => "false"
      "event_type" => "GENERIC_EVENT"
      "vendor_name" => "Hitachi Cloud Platform"
      "product_name" => "Hitachi Cloud Platform"
    }
  }

  mutate {
    gsub => [
      "message","- ",""
    ]
  }
  grok {
    match => {
      "message" => [
        "<%{INT}>%{SYSLOGTIMESTAMP:time} %{DATA:product_event}: %{DATA} %{IP:src_ip} %{WORD:host_name}?%{GREEDYDATA} \"\"%{GREEDYDATA:http_header}\"\"\\s+%{INT:response_code}\\s+%{INT}%{GREEDYDATA:ex_data}",
        "<%{INT}>%{SYSLOGTIMESTAMP:time} %{DATA:product_event}: %{DATA} %{IP:src_ip} %{WORD:host_name}?%{GREEDYDATA} \\\"%{GREEDYDATA:http_header}\\\"\\s+%{INT:response_code}\\s+%{INT}%{GREEDYDATA:ex_data}"
      ]
    }
    on_error => "grok_fail"
    overwrite => ["response_code","src_ip","host_name","http_header","ex_data","product_event"]
  }

  if [grok_fail] {
    drop {
      tag => "TAG_MALFORMED_MESSAGE"
    }
  }

  if [src_ip] != "" {
    mutate {
      merge => {
        "principal.ip" => "src_ip"
      }
    }
    mutate {
      replace => {
        "has_principal" => "true"
      }
    }
  }

  if [host_name] != "" {
    mutate {
      replace => {
        "intermediary.hostname" => "%{host_name}"
      }
    }
  }

  if [response_code] != "" {
    mutate {
      replace => {
        "network.http.response_code" => "%{response_code}"
      }
    }
    mutate {
      convert => {
        "network.http.response_code" => "integer"
      }
    }
  }

  if [http_header] != "" {
    grok {
      match => {
        "http_header" => [
          "%{WORD:http_method}\\s+%{DATA:url}\\s+%{GREEDYDATA}"
        ]
      }
      on_error => "pattern_fail"
      overwrite => ["http_method","url"]
    }
  }

  if [url] != "" {
    mutate {
      replace => {
        "network.http.referral_url" => "%{url}"
      }
    }
  }

  if [http_method] =~ "(?i)http" {
    mutate {
      replace => {
        "network.application_protocol" => "HTTP"
      }
    }
  }

  if [http_method] =~ "(?i)put" {
    mutate {
      replace => {
        "network.http.method" => "PUT"
      }
    }
  }
  else if [http_method] =~ "(?i)get" {
    mutate {
      replace => {
        "network.http.method" => "GET"
      }
    }
  }
  else if [http_method] =~ "(?i)post" {
    mutate {
      replace => {
        "network.http.method" => "POST"
      }
    }
  }
  else if [http_method] =~ "(?i)delete" {
    mutate {
      replace => {
        "network.http.method" => "DELETE"
      }
    }
  }

  if [vendor_name] != "" {
    mutate {
      replace => {
        "event.idm.read_only_udm.metadata.vendor_name" => "%{vendor_name}"
      }
    }
  }

  if [product_name] != "" {
    mutate {
      replace => {
        "event.idm.read_only_udm.metadata.product_name" => "%{product_name}"
      }
    }
  }

  if [has_principal] == "true" {
    mutate {
      replace => {
        "event_type" => "STATUS_UPDATE"
      }
    }
  }
  if [event_type] != "" {
    mutate {
      replace => {
        "event.idm.read_only_udm.metadata.event_type" => "%{event_type}"
      }
    }
  }

  if [product_event] != "" {
    mutate {
      replace => {
        "event.idm.read_only_udm.metadata.product_event_type" => "%{product_event}"
      }
    }
  }

  if [intermediary] != "" {
    mutate {
      merge => {
        "event.idm.read_only_udm.intermediary" => "intermediary"
      }
    }
  }

  mutate {
    rename => {
      "principal" => "event.idm.read_only_udm.principal"
      "network" => "event.idm.read_only_udm.network"
    }
  }

  mutate {
    merge => {
      "@output" => "event"
    }
  }
}
