# Product: GITGUARDIAN_ENTERPRISE
# Category: SaaS Applications
# Supported Format: JSON
# Reference: https://docs.gitguardian.com/platform/enterprise-administration/audit-log
# Last Updated:2024-10-17
# Copyright 2024 Chronicle LLC

filter {
  mutate {
    replace => {
      "principal" => ""
      "target" => ""
      "metadata" => ""
      "network" => ""
      "security_result" => ""
      "id"=>""
      "member_id"=>""
      "member_email"=>""
      "member_name"=>""
      "date"=>""
      "event_name"=>""
      "action_type"=>""
      "target_ids"=>""
      "has_user" => "false"
    }
  }

  json {
    source => "message"
    array_function => "split_columns"
    on_error => "json_failed"
  }
  if [id] != "" {
    mutate {
      replace => {
        "metadata.product_log_id" => "%{id}"
      }
      on_error => "no_id"
    }
  }
  if [member_id] != "" {
    mutate{
      convert => {
        "member_id" => "string"
      }
      on_error => "no_member_id"
    }
    mutate {
      replace => {
        "principal.user.userid" => "%{member_id}"
        "has_user" => "true"
      }
      on_error => "no_member_id"
    }
  }
  if [member_email] != "" {
    mutate {
      merge=> {
        "principal.user.email_addresses" => "member_email"
      }
      on_error => "no_member_email"
    }
    if ![no_member_email] {
      mutate {
        replace => {
          "has_user" => "true"
        }
      }
    }
  }
  if [member_name] != "" {
    mutate {
      replace => {
        "principal.user.user_display_name" => "%{member_name}"
      }
      on_error => "no_member_name"
    }
  }
  if [date] != "" {
    date {
      match => ["date", "yyyy-MM-ddTHH:mm:ss.SSSSSSZ","ISO8601"]
      target => "metadata.event_timestamp"
      on_error => "date_failed"
    }
  }
  if [event_name] != "" {
    mutate {
      replace => {
        "metadata.product_event_type" => "%{event_name}"
      }
      on_error => "no_event_name"
    }
  }
  if [action_type] != "" {
    mutate {
      replace => {
        "security_result.action_details" => "%{action_type}"
      }
      on_error => "no_action_type"
    }
  }
  if [target_ids] != "" {
    mutate {
      replace => {
        "target.resource.product_object_id" => "%{target_ids.0}"
      }
      on_error => "no_target_id"
    }
  }

  if [has_user] == "true" {
    mutate {
      replace => {
        "metadata.event_type" => "USER_UNCATEGORIZED"
      }
    }
  }
  else {
    mutate {
      replace => {
        "metadata.event_type" => "GENERIC_EVENT"
      }
    }
  }

  mutate {
    replace => {
      "metadata.product_name" => "GitGuardian Enterprise"
      "metadata.vendor_name" => "GitGuardian"
    }
  }

  if [principal] != "" {
    mutate {
      rename => {
        "principal" => "event.idm.read_only_udm.principal"
      }
    }
  }
  if [target] != "" {
    mutate {
      rename => {
        "target" => "event.idm.read_only_udm.target"
      }
    }
  }
  if [metadata] != "" {
    mutate {
      rename => {
        "metadata" => "event.idm.read_only_udm.metadata"
      }
    }
  }
  if [network] != "" {
    mutate {
      rename => {
        "network" => "event.idm.read_only_udm.network"
      }
    }
  }
  if [security_result] != "" {
    mutate {
      merge => {
        "event.idm.read_only_udm.security_result" => "security_result"
      }
      on_error => "no_security_result"
    }
  }

  mutate {
    merge => {
      "@output" => "event"
    }
  }
}
