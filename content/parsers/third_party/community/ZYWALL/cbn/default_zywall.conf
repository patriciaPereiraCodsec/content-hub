# Product: ZYWALL
# Category: Network infrastructure
# Supported Format: KV
# Reference: N/A
# Last Updated: 2025-12-08
# Copyright 2025 Google SecOps

filter {
  mutate {
    replace => {
      "src" => ""
      "dst" => ""
      "msg" => ""
      "note" => ""
      "user" => ""
      "devID" => ""
      "cat" => ""
      "class" => ""
      "ob_mac" => ""
      "dir" => ""
      "protoID" => ""
      "description" => ""
      "rule_name" => ""
      "action" => ""
      "src_ip" => ""
      "src_port" => ""
      "dst_ip" => ""
      "dst_port" => ""
      "has_principal" => "false"
      "has_target" => "false"
      "security_result" => ""
      "principal" => ""
      "target" => ""
      "network" => ""
      "intermediary" => ""
      "ts" => ""
      "inter_host" => ""
      "kv_data" => ""
      "ZYnote" => ""
      "ZYlevel" => ""
      "ZYruleId" => ""
      "ZYclass" => ""
      "proto" => ""
      "act" => ""
      "app" => ""
      "spt" => ""
      "dpt" => ""
      "dvchost" => ""
      "ob" => ""
      "cef_device_version" => ""
      "cef_name" => ""
      "cef_severity" => ""
      "cef_spec_version" => ""
      "cef_vendor" => ""
      "cef_product" => ""
      "cef_event_class_id" => ""
      "security_action" => ""
    }
  }
  if [message] =~ "CEF" {
    grok {
      match => {
        "message" => [
          "<%{INT}>%{SYSLOGTIMESTAMP:ts} %{DATA:inter_host} CEF:%{INT:cef_spec_version}\\|%{DATA:cef_vendor}\\|%{DATA:cef_product}\\|%{DATA:cef_device_version}\\|%{DATA:cef_event_class_id}\\|%{DATA:cef_name}\\|%{INT:cef_severity}\\|%{GREEDYDATA:kv_data}"
        ]
      }
      overwrite => [ts, inter_host, kv_data, cef_device_version, cef_name, cef_severity, cef_spec_version, cef_vendor, cef_product, cef_event_class_id]
      on_error => "cef_grok_failed"
    }
  } else {
    grok {
      match => {
        "message" => "<%{INT}>%{SYSLOGTIMESTAMP:ts} %{INT} %{DATA:inter_host} %{GREEDYDATA:kv_data}"
      }
      overwrite => [ts, inter_host, kv_data]
      on_error => "grok_failed"
    }
  }
  if [ts] != "" {
    date {
      match => ["ts", "MMM dd HH:mm:ss", "MMM  d HH:mm:ss" ]
      rebase => true
      on_error => "diff_format"
    }
  }
  if [inter_host] != "" {
    mutate {
      replace => {
        "intermediary.hostname" => "%{inter_host}"
      }
    }
  }
  mutate {
    gsub => ["kv_data","(\\\s+)(\\S+)=", "#$2="]
  }
  mutate {
    gsub => ['kv_data','\\"','']
  }
  mutate {
    gsub => ["kv_data","□\\r",""]
  }
  kv {
    source => "kv_data"
    field_split => "#"
    value_split => "="
    whitespace => "strict"
  }
  if [message] =~ "CEF" {
    if [cat] != "" {
      mutate {
        merge => {
          "security_result.category_details" => "cat"
        }
        on_error => "cat_not_found"
      }
    }
    if [proto] != "" {
      mutate {
        replace => {
          "protoID" => "%{proto}"
        }
        on_error => "proto_not_found"
      }
    }
    if [act] != "" {
      mutate {
        replace => {
          "action" => "%{act}"
        }
        on_error => "act_replace_failed"
      }
    }
    if [ZYnote] != "" {
      mutate {
        replace => {
          "note" => "%{ZYnote}"
        }
        on_error => "zynote_not_found"
      }
    }
    if [ZYclass] != "" {
      mutate {
        replace => {
          "class" => "%{ZYclass}"
        }
        on_error => "zyclass_not_found"
      }
    }
    if [ZYruleId] != "" {
      mutate {
        replace => {
          "rule_name" => "%{ZYruleId}"
        }
        on_error => "zyruleid_not_found"
      }
    }
    if [ZYlevel] != "" {
      mutate {
        replace => {
          "security_result.severity_details" => "%{ZYlevel}"
        }
        on_error => "zylevel_not_found"
      }
    }
    if [app] != "" {
      mutate {
        replace => {
          "app_label.key" => "app"
          "app_label.value.string_value" => "%{app}"
        }
        on_error => "app_invalid"
      }
      if ![app_invalid] {
        mutate {
          merge => {
            "event.idm.read_only_udm.additional.fields" => "app_label"
          }
          on_error => "app_label_merge_failed"
        }
      }
    }
    if [src] != "" {
      mutate {
        merge => {
          "principal.ip" => "src"
          "principal.asset.ip" => "src"
        }
        on_error => "src_ip_merge_failed"
      }
      if ![src_ip_merge_failed] {
        mutate {
          replace => {
            "has_principal" => "true"
          }
        }
      }
    }
    if [spt] != "" {
      mutate {
        replace => {
          "principal.port" => "%{spt}"
        }
        on_error => "src_port_replace_failed"
      }
      mutate {
        convert => {
          "principal.port" => "integer"
        }
        on_error => "principal_port_conversion_failed"
      }
    }
    if [dst] != "" {
      mutate {
        merge => {
          "target.ip" => "dst"
          "target.asset.ip" => "dst"
        }
        on_error => "dst_ip_merge_failed"
      }
      if ![dst_ip_merge_failed] {
        mutate {
          replace => {
            "has_target" => "true"
          }
        }
      }
    }
    if [dpt] != "" {
      mutate {
        replace => {
          "target.port" => "%{dpt}"
        }
        on_error => "dst_port_replace_failed"
      }
      mutate {
        convert => {
          "target.port" => "integer"
        }
        on_error => "target_port_conversion_failed"
      }
    }
  } else {
    if [src] != "" {
      grok {
        match => {
          "src" => "%{IP:src_ip}:%{INT:src_port}"
        }
        overwrite => [src_ip, src_port]
        on_error => "src_grok_failed_1"
      }
      if [src_ip] != "" {
        mutate {
          merge => {
            "principal.ip" => "src_ip"
            "principal.asset.ip" => "src_ip"
          }
          on_error => "src_ip_merge_failed_1"
        }
        if ![src_ip_merge_failed_1] {
          mutate {
            replace => {
              "has_principal" => "true"
            }
          }
        }
      }
      if [src_port] != "" {
        mutate {
          replace => {
            "principal.port" => "%{src_port}"
          }
          on_error => "src_port_replace_failed_1"
        }
        mutate {
          convert => {
            "principal.port" => "integer"
          }
          on_error => "principal_port_conversion_failed_1"
        }
      }
    }
    if [dst] != "" {
      grok {
        match => {
          "dst" => "%{IP:dst_ip}:%{INT:dst_port}"
        }
        overwrite => [dst_ip, dst_port]
        on_error => "dst_grok_failed_1"
      }
      if [dst_ip] != "" {
        mutate {
          merge => {
            "target.ip" => "dst_ip"
            "target.asset.ip" => "dst_ip"
          }
          on_error => "dst_ip_merge_failed_1"
        }
        if ![dst_ip_merge_failed_1] {
          mutate {
            replace => {
              "has_target" => "true"
            }
          }
        }
      }
      if [dst_port] != "" {
        mutate {
          replace => {
            "target.port" => "%{dst_port}"
          }
          on_error => "dst_port_replace_failed_1"
        }
        mutate {
          convert => {
            "target.port" => "integer"
          }
          on_error => "target_port_conversion_failed_1"
        }
      }
    }
    grok {
      match => {
        "msg" =>[
          "%{DATA} from %{GREEDYDATA}, %{WORD}$",
          "%{DATA:description}, Rule_name:%{DATA:rule_name}"
        ]
      }
      overwrite => ["rule_name","description"]
      on_error => "msg_grok_failed_1"
    }
  }

  if [cef_device_version] != "" {
    mutate {
      replace => {
        "metadata.product_version" => "%{cef_device_version}"
      }
      on_error => "cef_version_invalid"
    }
  }

  if [cef_name] != "" {
    mutate {
      replace => {
        "metadata.product_event_type" => "%{cef_name}"
      }
      on_error => "cef_name_invalid"
    }
  }

  if [cef_severity] in ["0","1","2","3"] {
    mutate {
      replace => {
        "security_result.severity" => "LOW"
      }
    }
  } else if [cef_severity] in ["4","5","6"] {
    mutate {
      replace => {
        "security_result.severity" => "MEDIUM"
      }
    }
  } else if [cef_severity] in ["7","8"] {
    mutate {
      replace => {
        "security_result.severity" => "HIGH"
      }
    }
  } else if [cef_severity] in ["9","10"] {
    mutate {
      replace => {
        "security_result.severity" => "CRITICAL"
      }
    }
  }

  if [msg] != "" {
    mutate {
      replace => {
        "metadata.description" => "%{msg}"
      }
      on_error => "msg_invalid"
    }
  }
  if [rule_name] != "" {
    mutate {
      replace => {
        "security_result.rule_name" => "%{rule_name}"
      }
      on_error => "rule_name_invalid"
    }
  }

  if [message] !~ "CEF" and [proto] != "" {
    mutate {
      replace => {
        "proto_label.key" => "proto"
        "proto_label.value.string_value" => "%{proto}"
      }
      on_error => "proto_invalid"
    }
    if ![proto_invalid] {
      mutate {
        merge => {
          "event.idm.read_only_udm.additional.fields" => "proto_label"
        }
        on_error => "proto_label_merge_failed"
      }
    }
  }

  if [action] =~ "(?i)ACCEPT" or [action] =~ "(?i)pass" {
    mutate {
      replace => {
        "security_action" => "ALLOW"
      }
    }
  } else if [action] =~ "(?i)DROP" {
    mutate {
      replace => {
        "security_action" => "BLOCK"
      }
    }
  }
  if [security_action] != "" {
    mutate {
      merge => {
        "security_result.action" => "security_action"
      }
      on_error => "security_action_merge_failed"
    }
  }
  if [devID] != "" {
    mutate {
      replace => {
        "devID_label.key" => "devID"
        "devID_label.value.string_value" => "%{devID}"
      }
      on_error => "devID_invalid"
    }
    if ![devID_invalid] {
      mutate {
        merge => {
          "event.idm.read_only_udm.additional.fields" => "devID_label"
        }
        on_error => "devID_label_merge_failed"
      }
    }
  }
  if [cat] != "" {
    mutate {
      merge => {
        "security_result.category_details" => "%{cat}"
      }
      on_error => "cat_merge_failed"
    }
  }
  if [class] != "" {
    mutate {
      replace => {
        "class_label.key" => "class"
        "class_label.value.string_value" => "%{class}"
      }
      on_error => "class_invalid"
    }
    if ![class_invalid] {
      mutate {
        merge => {
          "event.idm.read_only_udm.additional.fields" => "class_label"
        }
        on_error => "class_label_merge_failed"
      }
    }
  }
  if [user] not in ["", "unknown"] {
    mutate {
      replace => {
        "principal.user.userid" => "%{user}"
      }
      on_error => "user_invalid"
    }
  }
  if [ob] not in ["", "0"] {
    mutate {
      replace => {
        "network.sent_bytes" => "%{ob}"
      }
      on_error => "ob_invalid"
    }
    mutate {
      convert => {
        "network.sent_bytes" => "uinteger"
      }
      on_error => "ob_conversion_failed"
    }
  }
  if [ob_mac] not in ["000000000000",""] {
    mutate {
      gsub => [ "ob_mac", "(.{2})", "$1:" ]
    }
    mutate {
      gsub => [ "ob_mac", ".{1}$", "" ]
    }
    mutate {
      merge => {
        "principal.mac" => "ob_mac"
      }
      on_error => "ob_mac_invalid"
    }
  }
  if [dir] != "" {
    mutate {
      replace => {
        "dir_label.key" => "dir"
        "dir_label.value.string_value" => "%{dir}"
      }
      on_error => "dir_invalid"
    }
    if ![dir_invalid] {
      mutate {
        merge => {
          "event.idm.read_only_udm.additional.fields" => "dir_label"
        }
        on_error => "dir_label_merge_failed"
      }
    }
  }

  if [dvchost] != "" {
    mutate {
      replace => {
        "target.hostname" => "%{dvchost}"
        "target.asset.hostname" => "%{dvchost}"
      }
      on_error => "dvchost_invalid"
    }
  }

  if [cef_spec_version] != "" {
    mutate {
      replace => {
        "cef_version_label.key" => "cef_version"
        "cef_version_label.value.string_value" => "%{cef_spec_version}"
      }
      on_error => "cef_spec_version_invalid"
    }
    if ![cef_spec_version_invalid] {
      mutate {
        merge => {
          "event.idm.read_only_udm.additional.fields" => "cef_version_label"
        }
        on_error => "cef_version_label_merge_failed"
      }
    }
  }

  if [cef_event_class_id] != "" {
    mutate {
      replace => {
        "cef_event_class_id_label.key" => "device_event_class_id"
        "cef_event_class_id_label.value.string_value" => "%{cef_event_class_id}"
      }
      on_error => "cef_event_class_id_invalid"
    }
    if ![cef_event_class_id_invalid] {
      mutate {
        merge => {
          "event.idm.read_only_udm.additional.fields" => "cef_event_class_id_label"
        }
        on_error => "cef_event_class_id_label_merge_failed"
      }
    }
  }

  if [protoID] != "" {
    mutate {
      uppercase => ["protoID"]
    }
    mutate {
      replace => {
        "protocol_number_src" => "%{protoID}"
      }
      on_error => "proto_key_not_present"
    }
    mutate {
      convert => {
        "protocol_number_src" => "integer"
      }
      on_error => "protocol_not_integer"
    }
    if ![proto_key_not_present] {
      # This file contains the ip protocol convertor
# Document:
#   - https://www.iana.org/assignments/protocol-numbers/protocol-numbers.xhtml

# Interface:
# protocol_number_src (required): number with the value which represents the protocol
# ip_protocol_out: string that is either empty or contains ip protocol
#                  compatible to IpProtocol enum in udm.proto

mutate {
  replace => {
    "ip_protocol_out" => "UNKNOWN_IP_PROTOCOL"
  }
}


if [protocol_number_src] in [ 1, "ICMP", "ICMPV6", 58 ] {
  mutate {
    replace => {
      "ip_protocol_out" => "ICMP"
    }
  }
} else if [protocol_number_src] in [ 2, "IGMP" ] {
  mutate {
    replace => {
      "ip_protocol_out" => "IGMP"
    }
  }
} else if [protocol_number_src] in [ 6, "TCP" ] {
  mutate {
    replace => {
      "ip_protocol_out" => "TCP"
    }
  }
} else if [protocol_number_src] in [ 17, "UDP" ] {
  mutate {
    replace => {
      "ip_protocol_out" => "UDP"
    }
  }
} else if [protocol_number_src] in [ 41, "IP6IN4" ] {
  mutate {
    replace => {
      "ip_protocol_out" => "IP6IN4"
    }
  }
} else if [protocol_number_src] in [ 47, "GRE" ] {
  mutate {
    replace => {
      "ip_protocol_out" => "GRE"
    }
  }
} else if [protocol_number_src] in [ 50, "ESP" ] {
  mutate {
    replace => {
      "ip_protocol_out" => "ESP"
    }
  }
} else if [protocol_number_src] in [ 88, "EIGRP" ] {
  mutate {
    replace => {
      "ip_protocol_out" => "EIGRP"
    }
  }
}  else if [protocol_number_src] in [ 97, "ETHERIP" ] {
  mutate {
    replace => {
      "ip_protocol_out" => "ETHERIP"
    }
  }
} else if [protocol_number_src] in [ 103, "PIM" ] {
  mutate {
    replace => {
      "ip_protocol_out" => "PIM"
    }
  }
} else if [protocol_number_src] in [ 112, "VRRP" ] {
  mutate {
    replace => {
      "ip_protocol_out" => "VRRP"
    }
  }
}

      if [ip_protocol_out] != "" {
        mutate {
          replace => {
            "event.idm.read_only_udm.network.ip_protocol" => "%{ip_protocol_out}"
          }
        }
      }
    }
  }

  if [note] != "" {
    mutate {
      replace => {
        "security_result.summary" => "%{note}"
      }
      on_error => "note_invalid"
    }
  }

  if [message] =~ "CEF" {
    mutate {
      replace => {
        "metadata.vendor_name" => "%{cef_vendor}"
        "metadata.product_name" => "%{cef_product}"
      }
      on_error => "cef_vendor_product_invalid"
    }
  } else {
    mutate {
      replace => {
        "metadata.vendor_name" => "ZYWALL"
        "metadata.product_name" => "ZYWALL"
      }
    }
  }
  if [has_principal] == "true" and [has_target] == "true" {
    mutate {
      replace => {
        "metadata.event_type" => "NETWORK_CONNECTION"
      }
    }
  }
  else if [has_principal] == "true" {
    mutate {
      replace => {
        "metadata.event_type" => "STATUS_UPDATE"
      }
    }
  } else {
    mutate {
      replace => {
        "metadata.event_type" => "GENERIC_EVENT"
      }
    }
  }
  if [security_result] != "" {
    mutate {
      merge => {
        "event.idm.read_only_udm.security_result" => "security_result"
      }
      on_error => "merge_failed"
    }
  }
  if [metadata] != "" {
    mutate {
      rename => {
        "metadata" => "event.idm.read_only_udm.metadata"
      }
    }
  }
  if [target] != "" {
    mutate {
      rename => {
        "target" => "event.idm.read_only_udm.target"
      }
    }
  }
  if [principal] != "" {
    mutate {
      rename => {
        "principal" => "event.idm.read_only_udm.principal"
      }
    }
  }
  if [network] != "" {
    mutate {
      rename => {
        "network" => "event.idm.read_only_udm.network"
      }
    }
  }
  if [intermediary] != "" {
    mutate {
      merge => {
        "event.idm.read_only_udm.intermediary" => "intermediary"
      }
    }
  }
  mutate {
    merge => {
      "@output" => "event"
    }
  }
}
