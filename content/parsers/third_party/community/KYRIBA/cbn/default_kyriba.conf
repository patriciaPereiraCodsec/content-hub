# Product: Kyriba Treasury Management
# Category: SaaS Application
# Supported Format: CSV
# Reference: https://www.kyriba.com/
# Last Updated: 2021-02-24
# Copyright 2021 Chronicle LLC


filter {
    mutate {
        replace => {
          "date" => ""
          "event_type" => ""
          "hostname" => ""
          "location" => ""
          "meta_description" => ""
          "principal_company_name" => ""
          "principal_userid" => ""
          "status" => ""
          "sec_result_action" => "BLOCK"
          "resource_name" => "TRANSACTION"
          "resource_id" => ""
          "time" => ""
          "target_userid" => ""
          "target_company_name" => ""
          "transaction_amount" => ""
          "var_timestamp" => ""
        }
    }
    csv {
        source => "message"
    }

    # Extract the contents
    mutate {
        replace => {
            "resource_id" => "%{column1}"
            "principal_company_name" => "%{column3}"
            "location" => "%{column4}"
            "transaction_amount" => "%{column6}"
            "status" => "%{column9}"
            "meta_description" => "%{column11}"
            "target_userid" => "%{column24}"
            "target_company_name" => "%{column13}"
            "principal_userid" => "%{column15}"
            "date" => "%{column16}"
            "time" => "%{column17}"
        }
    }
    # End of extracting the contents
    if[principal_userid] != ""  {
        mutate {
            replace => {
                "event_type" => "USER_RESOURCE_CREATION"
            }
        }
    }
    else {
        mutate {
            replace => {
                "event_type" => "GENERIC_EVENT"
            }
        }
    }

    # Parse the date
    if [date] != "" {
        mutate {
            replace => {
                "when" => "%{date} %{time}"
            }
        }
        date {
            match => ["when", "MM/dd/yyyy hh:mm A", "MM/dd/yyyy h:m A"]
            target => "var_timestamp"
            rebase => true
        }
    }

    # set the common elements
    mutate {
        rename  => {
            "event_type" => "event.idm.read_only_udm.metadata.event_type"
            "meta_description" => "event.idm.read_only_udm.metadata.description"
            "var_timestamp" => "event.idm.read_only_udm.metadata.event_timestamp"
            "principal_userid" => "event.idm.read_only_udm.principal.user.userid"
            "principal_company_name" => "event.idm.read_only_udm.principal.user.company_name"
            "location" => "event.idm.read_only_udm.target.location.name"
            "resource_type" => "event.idm.read_only_udm.target.resource.resource_type"
            "target_company_name" => "event.idm.read_only_udm.target.user.company_name"
            "resource_id" => "event.idm.read_only_udm.target.resource.id"
            "resource_name" => "event.idm.read_only_udm.target.resource.name"
            "transaction_amount" => "sec_result.description"
        }
    }
    mutate {
        replace => {
            "event.idm.read_only_udm.metadata.vendor_name" => "KYRIBA"
            "event.idm.read_only_udm.metadata.product_name" => "KYRIBA TREASURY"
        }
    }

    if[status] == "Remitted" {
        mutate {
            replace => {
                "sec_result_action" => "ALLOW"
            }
        }
    }
    mutate {
        merge => {
            "sec_result.action" => "sec_result_action"
            "event.idm.read_only_udm.security_result" => "sec_result"
        }
    }


    mutate {
        merge => {
          "@output" => "event"
        }
    }
}
