# Product: Ironstream_ZOS
# Category: ZOS
# Supported Format: JSON
# Reference: N/A
# Last Updated: 2024-11-27
# Copyright 2024 Chronicle LLC

filter {
  mutate {
    replace => {
      "principal" => ""
      "target" => ""
      "network" => ""
      "metadata" => ""
      "additional" => ""
      "security_result" => ""
      "has_principal" => "false"
      "has_target" => "false"
    }
  }

  json {
    source => "message"
    target => "jsondata"
    on_error => "not_json"
  }

  mutate {
    remove_field => [
      "jsondata.USER_TOKEN_PRE_RACF_1"
      "jsondata.RESOURCE_TOKEN_PRE_RACF_1"
    ]
  }

  if [not_json] {
    drop {
      tag => "TAG_MALFORMED_MESSAGE"
    }
  }
  mutate {
    replace => {
      "metadata.vendor_name" => "IRONSTREAM_ZOS"
      "metadata.product_name" => "ZOS"
    }
  }

  for key, value in jsondata map {
    mutate {
      replace => {
        "smf_label" => ""
        "smf_label_key" => ""
        "additional_value" => ""
        "DESTINATION_SEQUENCE_NUMBER_label" => ""
      }
    }

    mutate {
      convert => {
        "value" => "string"
      }
      on_error => "value_already_string"
    }
    mutate {
      convert => {
        "smf_label.key" => "string"
      }
      on_error => "smf_label_key_already_string"
    }
    mutate {
      replace => {
        "smf_label.value.string_value" => "%{value}"
      }
      on_error => "field_is_number"
    }
    mutate {
      replace => {
        "additional_value" => "%{value}"
      }
      on_error => "value_empty"
    }
    if [additional_value] != "" {
      mutate {
        replace => {
          "smf_label.key" => "%{key}"
        }
        on_error => "key_not_available"
      }
      mutate {
        merge => {
          "additional.fields" => "smf_label"
        }
        on_error => "smf_label_empty"
      }
    }
    mutate {
      replace => {
        "smf_label_key" => "%{key}"
      }
      on_error => "key_empty"
    }
    if [smf_label_key] == "SMF119SC_SARIP_IPV4_0001" {
      grok {
        match => {
          "jsondata.SMF119SC_SARIP_IPV4_0001" => "%{IP:SMF119SC_SARIP_IPV4_0001}"
        }
        overwrite => ["SMF119SC_SARIP_IPV4_0001"]
        on_error => "SMF119SC_SARIP_IPV4_0001_grok_failure"
      }
      if ![SMF119SC_SARIP_IPV4_0001_grok_failure] {
        mutate {
          merge => {
            "principal.ip" => "SMF119SC_SARIP_IPV4_0001"
            "principal.asset.ip" => "SMF119SC_SARIP_IPV4_0001"
          }
          on_error => "SMF119SC_SARIP_IPV4_0001_empty"
        }
        mutate {
          replace => {
            "has_principal" => "true"
          }
        }
      }
    }
    if [smf_label_key] == "SMF119SC_SALIP_IPV4_0001" {
      grok {
        match => {
          "jsondata.SMF119SC_SALIP_IPV4_0001" => "%{IP:SMF119SC_SALIP_IPV4_0001}"
        }
        overwrite => ["SMF119SC_SALIP_IPV4_0001"]
        on_error => "SMF119SC_SALIP_IPV4_0001_grok_failure"
      }
      if ![SMF119SC_SALIP_IPV4_0001_grok_failure] {
        mutate {
          merge => {
            "principal.ip" => "SMF119SC_SALIP_IPV4_0001"
            "principal.asset.ip" => "SMF119SC_SALIP_IPV4_0001"
          }
          on_error => "SMF119SC_SALIP_IPV4_0001_empty"
        }
        mutate {
          replace => {
            "has_principal" => "true"
          }
        }
      }
    }
    if [smf_label_key] == "DESTINATION_SEQUENCE_NUMBER" {
      mutate {
        replace => {
          "DESTINATION_SEQUENCE_NUMBER_label.value" => "%{jsondata.DESTINATION_SEQUENCE_NUMBER}"
        }
        on_error => "DESTINATION_SEQUENCE_NUMBER_empty"
      }
      if ![DESTINATION_SEQUENCE_NUMBER_empty] {
        mutate {
          replace => {
            "DESTINATION_SEQUENCE_NUMBER_label.key" => "DESTINATION_SEQUENCE_NUMBER"
          }
        }
        mutate {
          merge => {
            "target.resource.attribute.labels" => "DESTINATION_SEQUENCE_NUMBER_label"
          }
          on_error => "DESTINATION_SEQUENCE_NUMBER_label_empty"
        }
      }
    }
  }

  if [has_principal] == "true" and [has_target] == "false" {
    mutate {
      replace => {
        "metadata.event_type" => "STATUS_UPDATE"
      }
    }
  }
  else {
    mutate {
      replace => {
        "metadata.event_type" => "GENERIC_EVENT"
      }
    }
  }

  if [target] != "" {
    mutate {
      rename => {
        "target" => "event.idm.read_only_udm.target"
      }
    }
  }
  if [principal] != "" {
    mutate {
      rename => {
        "principal" => "event.idm.read_only_udm.principal"
      }
    }
  }
  if [metadata] != "" {
    mutate {
      rename => {
        "metadata" => "event.idm.read_only_udm.metadata"
      }
    }
  }

  if [additional] != "" {
    mutate {
      rename => {
        "additional" => "event.idm.read_only_udm.additional"
      }
    }
  }

  mutate {
    merge => {
      "@output" => "event"
    }
  }
}