# Product: GITHUB_DEPENDABOT
# Category: Application server logs
# Supported Format: JSON
# Reference: NA
# Last Updated: 2025-12-17
# Copyright 2025 Google SecOps

filter {
  mutate {
    replace => {
      "has_user" => "false"
      "repository_id" => ""
      "repository_name" => ""
      "dependabot_enabled" => ""
      "vuln_count_by_severity.critical" => ""
      "vuln_count_by_severity.high" => ""
      "vuln_count_by_severity.medium" => ""
      "vuln_count_by_severity.low" => ""
      "security_result" => ""
      "timestamp" => ""
      "_document_id" => ""
      "action" => ""
      "actor" => ""
      "actor_id" => ""
      "actor_ip" => ""
      "actor_location.country_code" => ""
      "actor_location_country_code" => ""
      "org" => ""
      "repo" => ""
      "repo_id" => ""
      "request_id" => ""
      "request_method" => ""
      "status_code" => ""
      "url_path" => ""
      "user_agent" => ""
      "user_id" => ""
      "user" => ""
      "has_principal" => "false"
      "has_target_resource" => "false"
      "created_at" => ""
      "application_name" => ""
      "transport_protocol_name" => ""
      "app_protocol_src" => ""
      "app_protocol_output" => ""
      "operation_type" => ""
      "repository_field" => ""
      "request_body" => ""
      "external_identity_nameid" => ""
      "request_body_description" => ""
      "repositoryId" => ""
    }
  }
  mutate {
    gsub => ["message", '\"repository\":\"', '\"repository_field\":\"']
  }
  mutate {
    gsub => ["message", '\"repository\": \"', '\"repository_field\":\"']
  }
  mutate {
    gsub => ["message", "@timestamp", "timestamp"]
  }
  json {
    source => "message"
    array_function => "split_columns"
    on_error => "not_json"
  }
  json {
    source => "request_body"
    array_function => "split_columns"
    target => "request_body"
    on_error => "not_json_request_body"
  }
  for key,value in request_body map {
    mutate {
      replace => {
        "field_" => ""
      }
    }
    mutate {
      convert => {
        "value" => "string"
      }
      on_error => "value_conversion_error"
    }
    mutate {
      replace => {
        "check_" => "%{value}"
      }
      on_error => "check_value_error"
    }
    if ![check_value_error] && [value] != "" && [key] != "description" {
      mutate {
        replace => {
          "field_.value" => "%{value}"
        }
        on_error => "value_string_value_error"
      }
      mutate {
        replace => {
          "field_.key" => "request_body_%{key}"
        }
      }
      mutate {
        merge => {
          "event.idm.read_only_udm.target.resource.attribute.labels" => "field_"
        }
        on_error => "field_merge_error"
      }
    }
  }
  mutate {
    replace => {
      "request_body_description" => "%{request_body.description}"
    }
    on_error => "request_body_description_error"
  }
  if [request_body_description] != "" && ![request_body_description_error] {
    mutate {
      replace => {
        "security_result.description" => "%{request_body_description}"
      }
      on_error => "request_body_description_error_replace"
    }
  }
  if [external_identity_nameid] != "" {
    mutate {
      merge => {
        "event.idm.read_only_udm.principal.user.email_addresses" => "external_identity_nameid"
      }
      on_error => "no_external_identity_nameid"
    }
  }
  if [timestamp] != "" {
    mutate {
      convert => {
        "timestamp" => "string"
      }
      on_error => "no_timestamp"
    }
    date {
      match => ["timestamp", "yyyy-MM-dd'T'HH:mm:ssZ","UNIX_MS"]
      on_error => "invalid_timestamp"
    }
  }
  if [created_at] != "" {
    mutate {
      convert => {
        "created_at" => "string"
      }
      on_error => "no_created_at"
    }
    date {
      match => ["created_at","UNIX_MS"]
      target => "event.idm.read_only_udm.metadata.collected_timestamp"
      on_error => "invalid_created_at"
    }
  }
  if [application_name] != "" {
    mutate {
      replace => {
        "event.idm.read_only_udm.principal.application" => "%{application_name}"
      }
      on_error => "no_application_name"
    }
  }
  if [action] != "" {
    mutate {
      replace => {
        "event.idm.read_only_udm.metadata.product_event_type" => "%{action}"
      }
      on_error => "no_action"
    }
  }
  if [actor_ip] != "" {
    grok {
      match => {
        "actor_ip" => "%{IP:actor_ip}"
      }
      overwrite => ["actor_ip"]
      on_error => "no_actor_ip_grok"
    }
    if ![no_actor_ip_grok] {
      mutate {
        merge => {
          "event.idm.read_only_udm.principal.ip" => "actor_ip"
          "event.idm.read_only_udm.principal.asset.ip" => "actor_ip"
        }
        on_error => "no_actor_ip"
      }
      if ![no_actor_ip] {
        mutate {
          replace => {
            "has_principal" => "true"
          }
        }
      }
    }
  }
  if [actor_id] != "" {
    mutate {
      convert => {
        "actor_id" => "string"
      }
      on_error => "actor_id_conversion_error"
    }
    mutate {
      replace => {
        "event.idm.read_only_udm.principal.user.userid" => "%{actor_id}"
      }
      on_error => "no_actor_id"
    }
    if ![no_actor_id] {
      mutate {
        replace => {
          "has_user" => "true"
        }
      }
    }
    if [user_id] != "" {
      mutate {
        convert => {
          "user_id" => "string"
        }
        on_error => "user_id_conversion_error"
      }
      mutate {
        replace => {
          "user_id_label.value" => "%{user_id}"
          "user_id_label.key" => "user_id"
        }
        on_error => "user_id_label_error"
      }
      if ![user_id_label_error] {
        mutate {
          merge => {
            "event.idm.read_only_udm.principal.user.attribute.labels" => "user_id_label"
          }
          on_error => "user_id_label_merge_error"
        }
      }
    }
  }
  else if [user_id] != "" {
    mutate {
      convert => {
        "user_id" => "string"
      }
      on_error => "user_id_conversion_error1"
    }
    mutate {
      replace => {
        "event.idm.read_only_udm.principal.user.userid" => "%{user_id}"
      }
      on_error => "no_user_id"
    }
    if ![no_user_id] {
      mutate {
        replace => {
          "has_user" => "true"
        }
      }
    }
  }
  if [actor] != "" {
    mutate {
      replace => {
        "event.idm.read_only_udm.principal.user.user_display_name" => "%{actor}"
      }
      on_error => "no_actor"
    }
    if [user] != "" {
      mutate {
        replace => {
          "user_label.value" => "%{user}"
          "user_label.key" => "user"
        }
        on_error => "user_label_error"
      }
      if ![user_label_error] {
        mutate {
          merge => {
            "event.idm.read_only_udm.principal.user.attribute.labels" => "user_label"
          }
          on_error => "user_label_merge_error"
        }
      }
    }
  }
  else if [user] != "" {
    mutate {
      replace => {
        "event.idm.read_only_udm.principal.user.user_display_name" => "%{user}"
      }
      on_error => "no_user"
    }
  }
  mutate {
    replace => {
      "actor_location_country_code" => "%{actor_location.country_code}"
    }
    on_error => "no_actor_location_country_code"
  }
  if [actor_location_country_code] != "" && ![no_actor_location_country_code] {
    mutate {
      replace => {
        "event.idm.read_only_udm.principal.location.country_or_region" => "%{actor_location_country_code}"
      }
      on_error => "no_actor_location_country_code1"
    }
  }
  if [operation_type] != "" {
    mutate {
      replace => {
        "security_result.action_details" => "%{operation_type}"
      }
      on_error => "no_operation_type"
    }
  }
  if [org] != "" {
    mutate {
      replace => {
        "event.idm.read_only_udm.principal.administrative_domain" => "%{org}"
      }
      on_error => "no_org"
    }
  }
  if [repo] != "" {
    mutate {
      replace => {
        "event.idm.read_only_udm.target.resource.name" => "%{repo}"
      }
      on_error => "no_repo"
    }
    if ![no_repo] {
      mutate {
        replace => {
          "has_target_resource" => "true"
        }
      }
    }
    if [repository_field] != "" {
      mutate {
        replace => {
          "repository_field_label.value" => "%{repository_field}"
          "repository_field_label.key" => "repository"
        }
        on_error => "no_repository_field_found"
      }
      if ![no_repository_field_found] {
        mutate {
          merge => {
            "event.idm.read_only_udm.target.resource.attribute.labels" => "repository_field_label"
          }
          on_error => "repository_field_label_merge_error"
        }
      }
    }
  }
  else if [repository_field] != "" {
    mutate {
      replace => {
        "event.idm.read_only_udm.target.resource.name" => "%{repository_field}"
      }
      on_error => "no_repository_field"
    }
    if ![no_repository_field] {
      mutate {
        replace => {
          "has_target_resource" => "true"
        }
      }
    }
  }
  if [repo_id] != "" {
    mutate {
      convert => {
        "repo_id" => "string"
      }
      on_error => "repo_id_conversion_error"
    }
    mutate {
      replace => {
        "event.idm.read_only_udm.target.resource.product_object_id" => "%{repo_id}"
      }
      on_error => "no_repo_id"
    }
    if ![no_repo_id] {
      mutate {
        replace => {
          "has_target_resource" => "true"
        }
      }
    }
  }
  else if [repository_id] != "" {
    mutate {
      convert => {
        "repository_id" => "string"
      }
      on_error => "repository_id_conversion_error"
    }
    mutate {
      replace => {
        "event.idm.read_only_udm.target.resource.product_object_id" => "%{repository_id}"
      }
      on_error => "no_repository_id_replace"
    }
    if ![no_repository_id_replace] {
      mutate {
        replace => {
          "has_target_resource" => "true"
        }
      }
    }
  }
  if [request_method] != "" {
    mutate {
      uppercase => ["request_method"]
    }
    mutate {
      replace => {
        "event.idm.read_only_udm.network.http.method" => "%{request_method}"
      }
      on_error => "no_request_method"
    }
  }
  if [status_code] != "" {
    mutate {
      convert => {
        "status_code" => "string"
      }
      on_error => "already_string"
    }
    mutate {
      replace => {
        "event.idm.read_only_udm.network.http.response_code" => "%{status_code}"
      }
      on_error => "no_status_code"
    }
    mutate {
      convert => {
        "event.idm.read_only_udm.network.http.response_code" => "integer"
      }
      on_error => "already_integer"
    }
  }
  if [url_path] != "" {
    mutate {
      replace => {
        "event.idm.read_only_udm.target.url" => "%{url_path}"
      }
      on_error => "no_url_path"
    }
  }
  if [transport_protocol_name] != "" {
    mutate {
      replace => {
        "app_protocol_src" => "%{transport_protocol_name}"
      }
      on_error => "no_transport_protocol_name"
    }
    if ![no_transport_protocol_name] {
      # This file contains application protocol parsing logic

      # Interface:
      # app_protocol_src (required): string that contains application protocol or a
      #                              port number
      # app_protocol_output: string that is either empty or contains application
      #                      protocol compatible to ApplicationProtocol enum in
      #                      udm.proto

      mutate {
        uppercase => [ "app_protocol_src" ]
      }

      if [app_protocol_src] in [ "22", "SSH", "SSHD" ] {
        mutate {
          replace => {
            "app_protocol_output" => "SSH"
          }
        }
      }
      else if [app_protocol_src] in [ "25", "SMTP" ] {
        mutate {
          replace => {
            "app_protocol_output" => "SMTP"
          }
        }
      }
      else if [app_protocol_src] in [ "53", "DNS" ] {
        mutate {
          replace => {
            "app_protocol_output" => "DNS"
          }
        }
      }
      else if [app_protocol_src] in [ "80", "8080", "HTTP" ] {
        mutate {
          replace => {
            "app_protocol_output" => "HTTP"
          }
        }
      }
      else if [app_protocol_src] in [ "443", "HTTPS", "TLS" ] {
        mutate {
          replace => {
            "app_protocol_output" => "HTTPS"
          }
        }
      }
      else if [app_protocol_src] in [ "7400", "7401", "7402", "DDS" ] {
        mutate {
          replace => {
            "app_protocol_output" => "DDS"
          }
        }
      }
      else if [app_protocol_src] in [ "SMB", "SMBV1" ] {
        mutate {
          replace => {
            "app_protocol_output" => "SMB"
          }
        }
      }
      else if [app_protocol_src] in [
        "UNKNOWN_APPLICATION_PROTOCOL", "AFP", "APPC", "AMQP", "ATOM", "BEEP",
        "BITCOIN", "BIT_TORRENT", "CFDP", "COAP", "DEVICE_NET", "DHCP", "E_DONKEY",
        "ENRP", "FAST_TRACK", "FINGER", "FREENET", "FTAM", "GOPHER", "HL7", "H323",
        "IRCP", "KADEMLIA", "LDAP", "LPD", "MIME", "MODBUS", "MQTT", "NETCONF",
        "NFS", "NIS", "NNTP", "NTCIP", "NTP", "OSCAR", "PNRP", "QUIC", "RDP", "RELP",
        "RIP", "RLOGIN", "RPC", "RTMP", "RTP", "RTPS", "RTSP", "SAP", "SDP", "SIP",
        "SLP", "SNTP", "SSMS", "STYX", "TCAP", "TDS", "TOR", "TSP", "VTP", "WHOIS",
        "WEB_DAV", "X400", "X500", "XMPP", "IEC104", "DCERPC"
      ] {
        mutate {
          replace => {
            "app_protocol_output" => "%{app_protocol_src}"
          }
        }

      } else {
        mutate {
          replace => {
            "app_protocol_output" => ""
          }
        }
      }
      if [app_protocol_output] != "" {
        mutate {
          replace => {
            "event.idm.read_only_udm.network.application_protocol" => "%{app_protocol_output}"
          }
          on_error => "no_app_protocol_output"
        }
      }
    }
  }
  if [user_agent] != "" {
    mutate {
      replace => {
        "event.idm.read_only_udm.network.http.user_agent" => "%{user_agent}"
      }
      on_error => "user_agent_replace_failed"
    }
    mutate {
      replace => {
        "event.idm.read_only_udm.network.http.parsed_user_agent" => "%{user_agent}"
      }
      on_error => "user_agent_parsed_user_agent_replace_failed"
    }
    mutate {
      convert => {
        "event.idm.read_only_udm.network.http.parsed_user_agent" => "parseduseragent"
      }
      on_error => "user_agent_parsed_user_agent_conversion_failed"
    }
  }
  mutate {
    replace => {
      "repositoryId" => "%{repository.id}"
    }
    on_error => "no_repository_id"
  }
  if [repositoryId] != "" && ![no_repository_id] {
    mutate {
      replace => {
        "event.idm.read_only_udm.principal.user.userid" => "github_repo_id:%{repositoryId}"
      }
      on_error => "no_repository_id"
    }
    mutate {
      replace => {
        "has_user" => "true"
      }
      on_error => "no_has_user"
    }
  }
  mutate {
    replace => {
      "repository_name" => "%{repository.name}"
    }
    on_error => "no_repository_name"
  }
  if [repository_name] != "" && ![no_repository_name] {
    mutate {
      replace => {
        "event.idm.read_only_udm.principal.user.user_display_name" => "%{repository_name}"
      }
      on_error => "no_repository_name_found"
    }
  }
  if [dependabot_enabled] != "" {
    mutate {
      convert => {
        "dependabot_enabled" => "string"
      }
      on_error => "no_dependabot_enabled"
    }
    mutate {
      replace => {
        "dependabot_enabled_label.value.string_value" => "%{dependabot_enabled}"
      }
      on_error => "dependabot_enabled_label_error"
    }
    if ![dependabot_enabled_label_error] {
      mutate {
        replace => {
          "dependabot_enabled_label.key" => "dependabot_enabled"
        }
      }
      mutate {
        merge => {
          "event.idm.read_only_udm.additional.fields" => "dependabot_enabled_label"
        }
        on_error => "dependabot_enabled_label_merge_error"
      }
    }
  }
  if [vuln_count_by_severity][critical] != "" {
    mutate {
      convert => {
        "vuln_count_by_severity.critical" => "string"
      }
      on_error => "no_vuln_count_by_severity_critical"
    }
    mutate {
      replace => {
        "vuln_count_by_severity_critical_label.value.string_value" => "%{vuln_count_by_severity.critical}"
      }
      on_error => "vuln_count_by_severity_critical_label_error"
    }
    if ![vuln_count_by_severity_critical_label_error] {
      mutate {
        replace => {
          "vuln_count_by_severity_critical_label.key" => "vuln_count_by_severity_critical"
        }
      }
      mutate {
        merge => {
          "event.idm.read_only_udm.additional.fields" => "vuln_count_by_severity_critical_label"
        }
        on_error => "vuln_count_by_severity_critical_label_merge_error"
      }
    }
  }
  if [vuln_count_by_severity][high] != "" {
    mutate {
      convert => {
        "vuln_count_by_severity.high" => "string"
      }
      on_error => "no_vuln_count_by_severity_high"
    }
    mutate {
      replace => {
        "vuln_count_by_severity_high_label.value.string_value" => "%{vuln_count_by_severity.high}"
      }
      on_error => "vuln_count_by_severity_high_label_error"
    }
    if ![vuln_count_by_severity_high_label_error] {
      mutate {
        replace => {
          "vuln_count_by_severity_high_label.key" => "vuln_count_by_severity_high"
        }
      }
      mutate {
        merge => {
          "event.idm.read_only_udm.additional.fields" => "vuln_count_by_severity_high_label"
        }
        on_error => "vuln_count_by_severity_high_label_merge_error"
      }
    }
  }
  if [vuln_count_by_severity][medium] != "" {
    mutate {
      convert => {
        "vuln_count_by_severity.medium" => "string"
      }
      on_error => "no_vuln_count_by_severity_medium"
    }
    mutate {
      replace => {
        "vuln_count_by_severity_medium_label.value.string_value" => "%{vuln_count_by_severity.medium}"
      }
      on_error => "vuln_count_by_severity_medium_label_error"
    }
    if ![vuln_count_by_severity_medium_label_error] {
      mutate {
        replace => {
          "vuln_count_by_severity_medium_label.key" => "vuln_count_by_severity_medium"
        }
      }
      mutate {
        merge => {
          "event.idm.read_only_udm.additional.fields" => "vuln_count_by_severity_medium_label"
        }
        on_error => "vuln_count_by_severity_medium_label_merge_error"
      }
    }
  }
  if [vuln_count_by_severity][low] != "" {
    mutate {
      convert => {
        "vuln_count_by_severity.low" => "string"
      }
      on_error => "no_vuln_count_by_severity_low"
    }
    mutate {
      replace => {
        "vuln_count_by_severity_low_label.value.string_value" => "%{vuln_count_by_severity.low}"
      }
      on_error => "vuln_count_by_severity_low_label_error"
    }
    if ![vuln_count_by_severity_low_label_error] {
      mutate {
        replace => {
          "vuln_count_by_severity_low_label.key" => "vuln_count_by_severity_low"
        }
      }
      mutate {
        merge => {
          "event.idm.read_only_udm.additional.fields" => "vuln_count_by_severity_low_label"
        }
        on_error => "vuln_count_by_severity_low_label_merge_error"
      }
    }
  }
  for index, vulnerabilities0 in vulnerabilities {
    mutate {
      replace => {
        "vulnerabilities_number_label" => ""
      }
    }
    mutate {
      convert => {
        "index" => "string"
      }
      on_error => "no_index"
    }
    mutate {
      convert => {
        "vulnerabilities0.number" => "string"
      }
      on_error => "no_vulnerabilities_number"
    }
    mutate {
      replace => {
        "vulnerabilities_number_label.value" => "%{vulnerabilities0.number}"
      }
      on_error => "vulnerabilities_number_label_error"
    }
    if ![vulnerabilities_number_label_error] {
        mutate {
          replace => {
            "vulnerabilities_number_label.key" => "vulnerabilities_number_%{index}"
          }
        }
      mutate {
        merge => {
          "security_result.detection_fields" => "vulnerabilities_number_label"
        }
        on_error => "vulnerabilities_number_label_merge_error"
      }
    }
    mutate {
      replace => {
        "vulnerabilities_state_label" => ""
      }
    }
    mutate {
      replace => {
        "vulnerabilities_state_label.value" => "%{vulnerabilities0.state}"
      }
      on_error => "vulnerabilities_state_label_error"
    }
    if ![vulnerabilities_state_label_error] {
    mutate {
      replace => {
        "vulnerabilities_state_label.key" => "vulnerabilities_state_%{index}"
      }
    }
      mutate {
        merge => {
          "security_result.detection_fields" => "vulnerabilities_state_label"
        }
        on_error => "vulnerabilities_state_label_merge_error"
      }
