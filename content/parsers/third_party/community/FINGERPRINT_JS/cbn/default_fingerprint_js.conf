  mutate {
    convert => {
      "ipInfo.v4.geolocation.latitude" => "string"
    }
    on_error => "already_geolocation_latitude_a_string"
  }
  if [ipInfo][v4][geolocation][latitude] != "" {
    mutate {
      replace => {
        "principal.location.region_coordinates.latitude" => "%{ipInfo.v4.geolocation.latitude}"
      }
      on_error => "latitude_field_not_exists"
    }
    if ![latitude_field_not_exists] {
      mutate {
        convert => {
          "principal.location.region_coordinates.latitude" => "float"
        }
        on_error => "latitude_conversion_error"
      }
    }
  }
  mutate {
    convert => {
      "ipInfo.v4.geolocation.longitude" => "string"
    }
