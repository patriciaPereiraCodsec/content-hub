  for subdivide in ipInfo.v4.geolocation.subdivisions {
    mutate {
      replace => {
        "isocode_label" => ""
      }
    }
    mutate {
      replace => {
        "isocode_label.key" => "ISOCode"
        "isocode_label.value" => "%{subdivide.isoCode}"
      }
      on_error => "no_isocode"
    }
    if ![no_isocode] {
      mutate {
        merge => {
          "principal.resource.attribute.labels" => "isocode_label"
        }
        on_error => "no_isocode_label"
      }
    }

    mutate {
      replace => {
        "name_label" => ""
      }
    }
    mutate {
      replace => {
        "name_label.key" => "Name"
        "name_label.value" => "%{subdivide.name}"
      }
      on_error => "no_name"
    }
    if ![no_name] {
      mutate {
        merge => {
          "principal.resource.attribute.labels" => "name_label"
        }
        on_error => "no_name_label"
      }
