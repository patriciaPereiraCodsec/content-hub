        }
        on_error => "no_ipBlocklistDetails_attackType_label"
      }
    }
  }

  if [ipInfo][v4][asn][asn] != "" {
    mutate {
      replace => {
        "asn_asn_label.key" => "ASN"
        "asn_asn_label.value" => "%{ipInfo.v4.asn.asn}"
      }
      on_error => "replace_asn_failed"
    }
    if ![replace_asn_failed] {
      mutate {
        merge => {
          "principal.resource.attribute.labels" => "asn_asn_label"
        }
        on_error => "no_asn"
      }
    }
  }

  if [ipInfo][v4][asn][network] != "" {
    mutate {
      replace => {
        "asn_network_label.key" => "ASNNetwork"
        "asn_network_label.value" => "%{ipInfo.v4.asn.network}"
      }
      on_error => "replace_network_failed"
    }

    if ![replace_network_failed] {
      mutate {
        merge => {
          "principal.resource.attribute.labels" => "asn_network_label"
        }
        on_error => "no_network"
      }
    }
  }

  if [ipInfo][v4][asn][name] != "" {
    mutate {
      replace => {
