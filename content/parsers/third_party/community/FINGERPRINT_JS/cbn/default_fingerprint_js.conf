        on_error => "no_rawDeviceAttributesFontPreferencesSansSerif_label"
      }
    }
  }

  if [rawDeviceAttributes][fontPreferences][value][serif] != "" {
    mutate {
      convert => {
        "rawDeviceAttributes.fontPreferences.value.serif" => "string"
      }
      on_error => "not_converted_rawDeviceAttributesFontPreferencesSerif"
    }
    mutate {
      replace => {
        "serif_label.key" => "RawDeviceAttributesFontPreferencesSerif"
        "serif_label.value.string_value" => "%{rawDeviceAttributes.fontPreferences.value.serif}"
      }
      on_error => "no_rawDeviceAttributesFontPreferencesSerif"
    }
    if ![no_rawDeviceAttributesFontPreferencesSerif] {
      mutate {
        merge => {
          "additional.fields" => "serif_label"
        }
        on_error => "no_rawDeviceAttributesFontPreferencesSerif_label"
      }
    }
  }

  if [rawDeviceAttributes][fontPreferences][value][system] != "" {
    mutate {
      convert => {
        "rawDeviceAttributes.fontPreferences.value.system" => "string"
      }
      on_error => "not_converted_rawDeviceAttributesFontPreferencesSystem"
    }
    mutate {
      replace => {
        "system_label.key" => "RawDeviceAttributesFontPreferencesSystem"
        "system_label.value.string_value" => "%{rawDeviceAttributes.fontPreferences.value.system}"
      }
      on_error => "no_rawDeviceAttributesFontPreferencesSystem"
    }
    if ![no_rawDeviceAttributesFontPreferencesSystem] {
      mutate {
        merge => {
          "additional.fields" => "system_label"
        }
        on_error => "no_rawDeviceAttributesFontPreferencesSystem_label"
      }
    }
  }

  if [has_principal] == "true" and [has_target] == "true" {
    mutate {
      replace => {
        "event_type" => "NETWORK_CONNECTION"
      }
    }
  }
  else if [has_target_resource] == "true" {
    mutate {
      replace => {
        "event_type" => "USER_RESOURCE_ACCESS"
      }
    }
  }
  else if [has_principal] == "true" {
    mutate {
      replace => {
        "event_type" => "STATUS_UPDATE"
      }
    }
  }
  else {
    mutate {
      replace => {
        "event_type" => "GENERIC_EVENT"
      }
    }
  }

  if [event_type] != "" {
    mutate {
      replace => {
        "metadata.event_type" => "%{event_type}"
      }
      on_error => "invalid_event_type"
    }
  }

  mutate {
    replace => {
      "metadata.vendor_name" => "FINGERPRINT_JS"
      "metadata.product_name" => "FINGERPRINT_JS"
    }
  }

  if [metadata] != "" {
    mutate {
      rename => {
        "metadata" => "event.idm.read_only_udm.metadata"
      }
      on_error => "invalid_metadata"
    }
  }

  if [principal] != "" {
    mutate {
      rename => {
        "principal" => "event.idm.read_only_udm.principal"
      }
      on_error => "invalid_principal"
    }
  }

  if [target] != "" {
    mutate {
