      replace => {
        "asn_name_label.key" => "ASNName"
        "asn_name_label.value" => "%{ipInfo.v6.asn.name}"
        "has_target_resource" => "true"
      }
      on_error => "replace_name_failed"
    }
    if ![replace_name_failed] {
      mutate {
        merge => {
          "target.resource.attribute.labels" => "asn_name_label"
        }
        on_error => "no_name"
      }
    }
