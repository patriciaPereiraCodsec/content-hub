          "security_result.detection_fields" => "incognito_label"
        }
        on_error => "no_incognito_label"
      }
    }
  }
  if [firstSeenAt][subscription] != "" {
    date {
      match => ["firstSeenAt.subscription", "yyyy-MM-ddTHH:mm:ss.SSSZ", "ISO8601"]
      on_error => "no_firstSeenAt"
    }
  }
  mutate {
    replace => {
      "src_ip" => "%{ip}"
    }
    on_error => "no_src_ip"
  }
  if [src_ip] not in ["","-"] {
    mutate {
      merge => {
        "principal.ip" => "src_ip"
        "principal.asset.ip" => "src_ip"
      }
      on_error => "no_src_ip"
    }
    mutate {
      replace => {
        "has_principal" => "true"
      }
    }
  }
  if [ipBlocklist][result] != "" {
    mutate {
      convert => {
        "ipBlocklist.result" => "string"
      }
      on_error => "not_converted_ipBlocklistResult"
    }
    mutate {
