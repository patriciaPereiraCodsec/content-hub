        }
        on_error => "no_accuracyRadius"
      }
    }
  }
  if [ipInfo][v4][geolocation][city][name] != "" {
    mutate {
      replace => {
        "principal.location.city" => "%{ipInfo.v4.geolocation.city.name}"
      }
      on_error => "city_empty"
    }
  }
  if [ipInfo][v4][geolocation][country][name] != "" {
    mutate {
      replace => {
        "principal.location.country_or_region" => "%{ipInfo.v4.geolocation.country.name}"
      }
      on_error => "country_empty"
    }
  }
  if [ipInfo][v4][geolocation][continent][name] != "" {
    mutate {
      replace => {
        "continent_label.key" => "Continent_Name"
        "continent_label.value" => "%{ipInfo.v4.geolocation.continent.name}"
      }
