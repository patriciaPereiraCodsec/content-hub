  json {
    source => "message"
    array_function => "split_columns"
    on_error => "invalid_json"
  }

  if [bot][result] != "" {
    mutate {
      replace => {
        "botResult_label.key" => "BotResult"
        "botResult_label.value" => "%{bot.result}"
      }
      on_error => "no_botResult"
    }

    if ![no_botResult] {
      mutate {
        merge => {
          "security_result.detection_fields" => "botResult_label"
        }
        on_error => "no_botResult_label"
      }
    }
  }
  if [browserDetails][userAgent] != "" {
    mutate {
      replace => {
        "network.http.user_agent" => "%{browserDetails.userAgent}"
      }
      on_error => "no_useragent"
    }
    mutate {
      convert => {
        "browserDetails.userAgent" => "parseduseragent"
      }
      on_error => "not_converted_user_agent"
    }
    if ![not_converted_user_agent] {
      mutate {
        rename => {
          "browserDetails.userAgent" =>
          "network.http.parsed_user_agent"
        }
      }
    }
  }
  if [browserDetails][browserFullVersion] != "" {
    mutate {
      replace => {
        "network.http.parsed_user_agent.browser_version" => 
        "%{browserDetails.browserFullVersion}"
        "network.http.parsed_user_agent.family" => "USER_DEFINED"
      }
      on_error => "browserversion_invalid"
    }
  }
  if [browserDetails][browserName] != "" {
    mutate {
      replace => {
        "network.http.parsed_user_agent.browser" => "%{browserDetails.browserName}"
      }
      on_error => "browsername_invalid"
    }
  }
  if [browserDetails][device] != "" {
    mutate {
      replace => {
        "network.http.parsed_user_agent.device" => "%{browserDetails.device}"
      }
      on_error => "device_invalid"
    }
  }
  if [browserDetails][os] != "" {
    mutate {
      replace => {
        "network.http.parsed_user_agent.os" => "%{browserDetails.os}"
      }
      on_error => "os_invalid"
    }
  }
  if [browserDetails][osVersion] != "" {
    mutate {
      replace => {
        "principal.platform_version" => "%{browserDetails.osVersion}"
      }
      on_error => "OSVersion_empty"
    }
  }
  if [browserDetails][browserMajorVersion] != "" {
    mutate {
      replace => {
        "browserMajorVersion_label.key" => "BrowserMajorVersion"
        "browserMajorVersion_label.value" => "%{browserDetails.browserMajorVersion}"
      }
