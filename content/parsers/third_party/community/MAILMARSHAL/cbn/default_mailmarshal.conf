# Product: Mailmarshal
# Category: Email server
# Supported Format: SYSLOG
# Reference: N/A
# Last Updated: 2023-04-06
# Copyright 2023 Chronicle LLC

filter {

  mutate {
    replace => {
      "about" => ""
      "hostname" => ""
      "action" => ""
      "sr" => ""
      "msg_name" => ""
      "from" => ""
      "recipient" => ""
      "subject" => ""
      "server" => ""
      "file_name" => ""
      "size" => ""
      "msg" => ""
      "user" => ""
      "folder_name" => ""
    }
  }

  grok {
    match => {
      "message" => [
        "%{TIMESTAMP_ISO8601:datetime} %{HOSTNAME:hostname} %{WORD:prod_name} %{INT} %{WORD:prod_evt_type} \\[\\w+@\\d+ action=\\\"%{DATA:action}\\\" size=\\\"%{INT:size}\\\" class=\\\"%{DATA:class}\\\"\\]\\[\\w+@\\d+ name=\\\"%{DATA:msg_name}\\\" server=\\\"%{INT:server}\\\" edition=\\\"%{DATA:edition}\\\"\\]\\[\\w+@\\d+ arrived=\\\"%{TIMESTAMP_ISO8601:arrived}\\\" logged=\\\"%{TIMESTAMP_ISO8601:logged}\\\"\\].* From:%{DATA:from}\\s+Recipient:%{DATA:recipient}\\s+Subject:%{DATA:subject}\\s+Classification:%{DATA}",
        "%{TIMESTAMP_ISO8601:datetime} %{HOSTNAME:hostname} %{WORD:prod_name} %{INT} %{WORD:prod_evt_type} \\[\\w+@\\d+ name=\\\"%{DATA:msg_name}\\\" server=\\\"%{INT:server}\\\"\\].* File:%{GREEDYDATA:file_name}"
        "%{TIMESTAMP_ISO8601:datetime} %{HOSTNAME:hostname} %{WORD:prod_name} %{INT} %{WORD:prod_evt_type} \\[\\w+@\\d+ user=\\\"%{DATA:from}\\\" recipient=\\\"%{DATA:recipient}\\\"\\].*TimeConnected:%{TIMESTAMP_ISO8601}\\s+Reason:%{DATA:reason}\\s+Message:%{DATA:msg} Details:%{DATA:details} From:"
        "%{TIMESTAMP_ISO8601:datetime} %{HOSTNAME:hostname} %{WORD:prod_name} %{INT} %{WORD:prod_evt_type} \\[\\w+@\\d+ server=\\\"%{DATA}\\\" user=\\\"%{DATA:user}\\\"\\]\\[\\w+@\\d+ name=\\\"%{DATA:msg_name}\\\" server=\\\"%{INT:server}\\\" edition=\\\"%{DATA:edition}\\\"\\].*Recipient:%{DATA:recipient}\\s+Classification:%{DATA} FolderName:%{DATA:folder_name}\\s+Description:%{GREEDYDATA:msg}"
      ]
    }
    overwrite => ["hostname", "action", "msg_name", "from", "recipient",
      "subject", "server", "file_name", "size", "msg", "user", "folder_name"]
  }

  date {
    match => ["datetime", "ISO8601"]
  }

  mutate {
    replace => {
      "event.idm.read_only_udm.metadata.product_name" => "%{prod_name}"
      "event.idm.read_only_udm.metadata.vendor_name" => "MailMarshal"
      "event.idm.read_only_udm.metadata.event_type" => "EMAIL_TRANSACTION"
      "event.idm.read_only_udm.metadata.product_event_type" => "%{prod_evt_type}"
    }
  }

  if [msg] != "" {
    mutate {
      replace => {
        "event.idm.read_only_udm.metadata.description" => "%{msg}"
      }
    }
  }

  if [hostname] != "" {
    mutate {
      replace => {
        "about.hostname" => "%{hostname}"
      }
    }
  }

  if [server] != "" {
    mutate {
      replace => {
        "about.asset_id" => "ServerId:%{server}"
      }
    }
  }

  if [file_name] != "" {
    mutate {
      merge => {
        "about.file.names" => "file_name"
      }
    }
  }

  if [folder_name] != "" {
    mutate {
      merge => {
        "about.file.names" => "folder_name"
      }
    }
  }

  if [size] != "" {
    mutate {
      convert => {
        "about.file.size" => "uinteger"
      }
      replace => {
        "about.file.size" => "%{size}"
      }
    }
  }

  if [user] != "" {
    mutate {
      replace => {
        "about.user.userid" => "%{user}"
      }
    }
  }

  if [msg_name] != "" {
    mutate {
      replace => {
        "event.idm.read_only_udm.network.email.mail_id" => "%{msg_name}"
      }
    }
  }

  if [from] =~ "^.+@.+$" {
    mutate {
      replace => {
        "event.idm.read_only_udm.network.email.from" => "%{from}"
      }
    }
  }

  if [recipient] != "" {
    mutate {
      merge => {
        "event.idm.read_only_udm.network.email.to" => "recipient"
      }
    }
  }

  if [subject] != "" {
    mutate {
      merge => {
        "event.idm.read_only_udm.network.email.subject" => "subject"
      }
    }
  }

  if [action] != "" {
    mutate {
      replace => {
        "sr.action_details" => "%{action}"
      }
    }
  }

  if [sr] != "" {
    mutate {
      merge => {
        "event.idm.read_only_udm.security_result" => "sr"
      }
    }
  }

  if [about] != "" {
    mutate {
      merge => {
        "event.idm.read_only_udm.about" => "about"
      }
    }
  }

  mutate {
    merge => {
      "@output" => "event"
    }
  }
}
