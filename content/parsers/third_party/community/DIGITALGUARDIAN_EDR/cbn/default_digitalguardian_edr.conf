# Product: Digital Guardian
# Category: EDR
# Supported Format: KV
# Reference: N/A
# Last Updated: 2025-11-13
# Copyright 2025 Google SecOps


filter {

  mutate {
    replace => {
      "Application"                                 => ""
      "Category"                                    => ""
      "Command_Line"                                => ""
      "Command_Line1"                               => ""
      "computerName"                                => ""
      "Computer_Name"                               => ""
      "destination"                                 => ""
      "destination_ip"                              => ""
      "Destination_Directory"                       => ""
      "Dll_SHA1_Hash"                               => ""
      "domainName"                                  => ""
      "Email_Address"                               => ""
      "Email_Sender"                                => ""
      "File_Extension"                              => ""
      "http_url"                                    => ""
      "IP_Address"                                  => ""
      "Local_Port"                                  => ""
      "matched_policies_by_severity"                => ""
      "MD5_Checksum"                                => ""
      "msg1"                                        => ""
      "Network_Direction"                           => ""
      "Process_PID"                                 => ""
      "Process_SHA256_Hash"                         => ""
      "Product_Name"                                => ""
      "Product_Version"                             => ""
      "protocol"                                    => ""
      "Protocol"                                    => ""
      "Rule"                                        => ""
      "Remote_Port"                                 => ""
      "security_action"                             => ""
      "Severity"                                    => ""
      "source"                                      => ""
      "Source_Directory"                            => ""
      "source_ip"                                   => ""
      "source_port"                                 => ""
      "URL_Path"                                    => ""
      "userName"                                    => ""
      "User_Name"                                   => ""
      "Was_Blocked"                                 => ""
      "Bytes_Written"                               => ""
      "Source_File_Extension"                       => ""
      "Source_File"                                 => ""
      "Destination_File"                            => ""
      "Destination_File_Extension"                  => ""
      "Source_Drive_Type"                           => ""
      "Destination_Drive_Type"                      => ""
      "Was_Removable"                               => ""
      "Was_Source_Removable"                        => ""
      "Destination_File_Encryption" => ""
      "Alert_ID" => ""
      "Computer_Type" => ""
      "Operation" => ""
      "Policy" => ""
      "Printer_Jobname" => ""
      "Source_File_Encryption" => ""
      "Was_Destination_Classified" => ""
      "Was_Source_Classified" => ""
      "Source_Device_ID" => ""
      "Destination_Device_ID" => ""
      "Detail_Event_ID" => ""
      "Source_Device_Friendly_Name" => ""
      "Source_Device_Product_Name" => ""
      "Source_Device_Serial_Number" => ""
      "File_Size_MB" => ""
      "Detail_File_Size_MB" => ""
      "Event_ID" => ""
      "Block_Code" => ""
      "has_file" => "false"
      "has_principal" => "false"
      "has_target" => "false"
      "has_user" => "false"
      "has_process_pid" => "false"
      "has_target_file" => "false"
      "has_process" => "false"
      "has_http" => "false"
      "Agent_UTC_Time" => ""
      "Agent_Local_Time" => ""
      "Agent_Local_Date" => ""
    }
  }

  grok {
    match => {
      message => [
        "<%{INT}>%{SYSLOGTIMESTAMP:timedate}\\s+%{WORD:type}\\s+%{GREEDYDATA:message}",
        "<%{INT}>%{GREEDYDATA:message}"
      ]
    }
    overwrite => ["timedate", "type", "message"]
    on_error => "grok_parse_failure"
  }

  kv {
    source => "message"
    field_split => " "
    trim_value => "\""
    on_error => "kvfail"
  }

  #Used to handle when Command_Line contains quotes
  if [kvfail] {
    grok {
      match => {
        message => [
          "(?P<msg1>.*?)Command_Line=\\\"((?P<Command_Line>.*\\\")|(?P<Command_Line1>.*))",
          "(?P<msg1>.*?)Destination_Device_Serial_Number=\\\"((?P<Destination_Device_Serial_Number>.*\\\")|(?P<Destination_Device_Serial_Number1>.*))"
        ]
      }
      overwrite => [ "Command_Line", "Command_Line1", "msg1", "Destination_Device_Serial_Number", "Destination_Device_Serial_Number1" ]
      on_error => "grok_parse_failure"
    }

    if [grok_parse_failure] {
      mutate {
        replace => {
          "event.idm.read_only_udm.metadata.description" => "%{message}"
        }
        on_error => "no_description_grk_parse_failure"
      }
    }

    kv {
      source => "msg1"
      field_split => " "
      trim_value => "\""
      on_error => "kv_parse_failure"
    }
    if [kv_parse_failure] {
      drop {
        tag => "TAG_MALFORMED_ENCODING"
      }
    }
  }
  else {
    grok {
      match => {
        message => [
          "Command_Line=\\\"((?P<Command_Line>.*\\\")|(?P<Command_Line1>.*))"
        ]
      }
      overwrite => ["Command_Line", "Command_Line1"]
      on_error => "unsupported_format"
    }
  }

  if [User_Name] != "" {
    grok {
      match => {
        User_Name => [
          "%{DATA:domainName}\\\\%{GREEDYDATA:userName}",
          "%{DATA:domainName}\\/%{GREEDYDATA:userName}",
          "%{GREEDYDATA:userName}"
        ]
      }
      overwrite => ["domainName","userName"]
      on_error => "grok_user_name_failure"
    }
  }

  if [Computer_Name] != "" {
    grok {
      match => {
        Computer_Name => [
          "%{DATA}\\\\%{GREEDYDATA:computerName}",
          "%{GREEDYDATA:computerName}"
        ]
      }
      overwrite => ["computerName"]
      on_error => "grok_computer_name_failure"
    }
  }
  else {
    mutate {
      replace => {
        "computerName" => "%{source}"
      }
      on_error => "no_source"
    }
  }

  mutate {
    replace => {
      "event.idm.read_only_udm.metadata.event_type"             => "GENERIC_EVENT"
      "event.idm.read_only_udm.metadata.vendor_name"            => "DigitalGuardian"
      "event.idm.read_only_udm.metadata.product_name"           => "Enterprise DLP Platform"
    }
    on_error => "no_event_type_vendor_product_name"
  }

  if [Product_Version] != "" {
    mutate {
      replace => {
        "event.idm.read_only_udm.metadata.product_version" => "%{Product_Version}"
      }
      on_error => "no_product_version"
    }
  }

  if [userName] != "" {
    mutate {
      replace => {
        "event.idm.read_only_udm.principal.user.userid" => "%{userName}"
      }
      on_error => "no_user_name"
    }
    if ![no_user_name] {
      mutate {
        replace => {
          "has_user" => "true"
        }
      }
    }
  }

  if [domainName] != "" {
    mutate {
      replace => {
        "event.idm.read_only_udm.principal.administrative_domain" => "%{domainName}"
      }
      on_error => "no_domain_name"
    }
  }

  if [computerName] != "" {
    mutate {
      replace => {
        "event.idm.read_only_udm.principal.hostname" => "%{computerName}"
      }
      on_error => "no_computer_name"
    }
    if ![no_computer_name] {
      mutate {
        replace => {
          "has_principal" => "true"
        }
      }
    }
  }

  if [destination] != "" {
    mutate {
      replace => {
        "event.idm.read_only_udm.target.hostname" => "%{destination}"
      }
      on_error => "no_destination"
    }
    if ![no_destination] {
      mutate {
        replace => {
          "has_target" => "true"
        }
      }
    }
  }

  if [http_url] != "" {
    mutate {
      replace => {
        "event.idm.read_only_udm.target.url" => "%{http_url}"
      }
      on_error => "no_http_url"
    }
  }

  if [Rule] != "" {
    mutate {
      replace => {
        "security_result.rule_name" => "%{Rule}"
      }
      on_error => "no_rule_name"
    }
    if ![no_rule_name] {
      mutate {
        replace => {
          "has_file" => "true"
        }
      }
    }
  }

  if [Severity] != "" {
    mutate {
      replace => {
        "security_result.severity_details" => "%{Severity}"
      }
      on_error => "no_severity_details"
    }

    mutate {
      convert => {
        "Severity" => "integer"
      }
      on_error => "convert_severity_to_integer_failed"
    }

    if [Severity] <= 3 {
      mutate {
        replace => {
          "security_result.severity" => "LOW"
        }
        on_error => "severity_mapping_low_failed"
      }
    }
    else if [Severity] <= 6 {
      mutate {
        replace => {
          "security_result.severity" => "MEDIUM"
        }
        on_error => "severity_mapping_medium_failed"
      }
    }
    else if [Severity] <= 8 {
      mutate {
        replace => {
          "security_result.severity" => "HIGH"
        }
        on_error => "severity_mapping_high_failed"
      }
    }
    else if [Severity] <= 10 {
      mutate {
        replace => {
          "security_result.severity" => "CRITICAL"
        }
        on_error => "severity_mapping_critical_failed"
      }
    }
  }

  if [protocol] == "HTTP" or [protocol] == "HTTPS" {
    mutate {
      replace => {
        "event.idm.read_only_udm.network.application_protocol" => "HTTPS"
      }
      on_error => "no_application_protocol"
    }
    if ![no_application_protocol] {
      mutate {
        replace => {
          "has_http" => "true"
        }
      }
    }
  }

  if [Protocol] == "1" {
    mutate {
      replace => {
        "event.idm.read_only_udm.network.ip_protocol" => "ICMP"
      }
      on_error => "no_ip_protocol"
    }
  }
  if [Bytes_Written] != "" {
    mutate {
      replace => {
        "event.idm.read_only_udm.network.sent_bytes" => "%{Bytes_Written}"
      }
      on_error => "no_sent_bytes"
    }
    mutate {
      convert => {
        "event.idm.read_only_udm.network.sent_bytes" => "uinteger"
      }
      on_error => "convert_sent_bytes_to_uinteger_failed"
    }
  }
  if ([destination_ip] != "" or [computerName] != "") and [protocol] == "HTTPS" {
    mutate {
      replace => {
        "event.idm.read_only_udm.metadata.event_type" => "NETWORK_HTTP"
      }
    }
  }
  else if [source_ip] != "" or [IP_Address] != "" and [destination_ip] != "" {
    mutate {
      replace => {
        "event.idm.read_only_udm.metadata.event_type" => "NETWORK_CONNECTION"
      }
    }
  }

  if [source_port] != "" {
    mutate {
      replace => {
        "event.idm.read_only_udm.principal.port" => "%{source_port}"
      }
      on_error => "no_source_port"
    }
    mutate {
      convert => {
        "event.idm.read_only_udm.principal.port" => "integer"
      }
      on_error => "convert_source_port_to_integer_failed"
    }
  }
  else if [Local_Port] != "" {
    mutate {
      replace => {
        "event.idm.read_only_udm.principal.port" => "%{Local_Port}"
      }
      on_error => "no_local_port"
    }
    mutate {
      convert => {
        "event.idm.read_only_udm.principal.port" => "integer"
      }
      on_error => "convert_local_port_to_integer_failed"
    }
  }

  if [Remote_Port] != "" {
    mutate {
      replace => {
        "event.idm.read_only_udm.target.port" => "%{Remote_Port}"
      }
      on_error => "no_remote_port"
    }
    mutate {
      convert => {
        "event.idm.read_only_udm.target.port" => "integer"
      }
      on_error => "convert_remote_port_to_integer_failed"
    }
  }

  if [source_ip] != "" {
    mutate {
      merge => {
        "event.idm.read_only_udm.principal.ip" => "source_ip"
      }
      on_error => "no_source_ip"
    }
  }
  else if [IP_Address] != "" {
    mutate {
      merge => {
        "event.idm.read_only_udm.principal.ip" => "IP_Address"
      }
      on_error => "no_ip_address"
    }
  }

  if [destination_ip] != "" {
    mutate {
      merge => {
        "event.idm.read_only_udm.target.ip" => "destination_ip"
      }
      on_error => "no_destination_ip"
    }
    if ![no_destination_ip] {
      mutate {
        replace => {
          "has_target" => "true"
        }
      }
    }
  }

  if [Rule] =~ ".*Printer.*" {
    mutate {
      replace => {
        "event.idm.read_only_udm.metadata.event_type" => "PROCESS_UNCATEGORIZED"
        "event.idm.read_only_udm.target.process.command_line" => "%{Application}"
      }
      on_error => "process_command_line_error"
    }
    if ![process_command_line_error] {
      mutate {
        replace => {
          "has_process" => "true"
        }
      }
    }
  }
  else if [Rule] =~ "DLP.*" {
    mutate {
      replace => {
        "event.idm.read_only_udm.metadata.event_type" => "FILE_MOVE"
      }
      on_error => "event_type_file_move_failed"
    }
  }
  else if [Category] == "Policies" {
    if [Computer_Name] == "" {
      mutate {
        replace => {
          "event.idm.read_only_udm.metadata.description" => "%{Detail}"
        }
        on_error => "no_description"
      }
    }
  }
  else if [userName] != "" {
    mutate {
      replace => {
        "event.idm.read_only_udm.metadata.event_type" => "USER_UNCATEGORIZED"
      }
      on_error => "user_uncategorized_event_type_error"
    }
  }

  if [Command_Line] != "" {
    mutate {
      gsub => ["Command_Line", "\"$",""]
    }
    mutate {
      replace => {
        "event.idm.read_only_udm.principal.process.command_line" => "%{Command_Line}"
      }
      on_error => "command_line_error"
    }
  }
  else if [Command_Line1] != "" {
    mutate {
      gsub => ["Command_Line1", "\"$",""]
    }
    mutate {
      replace => {
        "event.idm.read_only_udm.principal.process.command_line" => "%{Command_Line1}"
      }
      on_error => "principal_command_line_mapping_failed"
    }
  }

  if [Process_PID] != "" {
    mutate {
      replace => {
        "event.idm.read_only_udm.principal.process.pid" => "%{Process_PID}"
        "event.idm.read_only_udm.metadata.event_type" => "SCAN_PROCESS"
      }
      on_error => "no_process_pid"
    }
    if ![no_process_pid] {
      mutate {
        replace => {
          "has_process_pid" => "true"
        }
      }
    }
  }


  if [File_Extension] != "" {
    mutate {
      replace => {
        "event.idm.read_only_udm.principal.process.file.mime_type" => "%{File_Extension}"
      }
      on_error => "no_file_extension"
    }
  }

  if [Was_Blocked] == "True" {
    mutate {
      replace => {
        "security_action" => "BLOCK"
      }
      on_error => "security_action_block_mapping_failed"
    }
  }
  else if [Was_Blocked] == "False" {
    mutate {
      replace => {
        "security_action" => "ALLOW"
      }
      on_error => "security_action_allow_mapping_failed"
    }
  }

  mutate {
    lowercase => ["Process_SHA256_Hash","MD5_Checksum","Dll_SHA1_Hash"]
  }

  if [Process_SHA256_Hash] != "" {
    mutate {
      replace => {
        "event.idm.read_only_udm.target.process.file.sha256" => "%{Process_SHA256_Hash}"
      }
      on_error => "no_process_sha256_hash"
    }
  }

  if [MD5_Checksum] != "" {
    mutate {
      replace => {
        "event.idm.read_only_udm.target.process.file.md5" => "%{MD5_Checksum}"
      }
      on_error => "no_md5_checksum"
    }
  }

  if [Dll_SHA1_Hash] != "" {
    mutate {
      replace => {
        "event.idm.read_only_udm.target.process.file.sha1" => "%{Dll_SHA1_Hash}"
      }
      on_error => "no_dll_sha1_hash"
    }
  }

  if [Network_Direction] == "True" {
    mutate {
      replace => {
        "event.idm.read_only_udm.network.direction" => "INBOUND"
      }
      on_error => "network_direction_inbound_mapping_failed"
    }
  }
  else if [Network_Direction] == "False" {
    mutate {
      replace => {
        "event.idm.read_only_udm.network.direction" => "OUTBOUND"

      }
      on_error => "network_direction_outbound_mapping_failed"
    }
  }

  if [Source_Directory] != "" and [Source_File] != "" {
    mutate {
      replace => {
        "event.idm.read_only_udm.src.file.full_path" => "%{Source_Directory}%{Source_File}"
      }
      on_error => "no_source_file_full_path"
    }
  }

  if [Destination_Directory] != "" and [Destination_File] != "" {
    mutate {
      replace => {
        "event.idm.read_only_udm.target.file.full_path" => "%{Destination_Directory}%{Destination_File}"
      }
      on_error => "no_destination_file_full_path"
    }
    if ![no_destination_file_full_path] {
      mutate {
        replace => {
          "has_target_file" => "true"
        }
      }
    }
  }
  if [Destination_File_Encryption] != "" {
    mutate {
      replace => {
        "destination_file_encryption_label.key" => "Destination_File_Encryption"
        "destination_file_encryption_label.value" => "%{Destination_File_Encryption}"
      }
      on_error => "no_destination_file_encryption"
    }
    if ![no_destination_file_encryption] {
      mutate {
        merge => {
          "event.idm.read_only_udm.target.resource.attribute.labels" => "destination_file_encryption_label"
        }
        on_error => "destination_file_encryption_merge_failed"
      }
    }
  }

  if [Source_File_Extension] != "" {
    mutate {
      replace => {
        "event.idm.read_only_udm.src.file.mime_type" => "%{Source_File_Extension}"
      }
      on_error => "no_source_file_extension"
    }
  }

  if [Source_File] != "" {
    mutate {
      merge => {
        "event.idm.read_only_udm.src.file.names" => "Source_File"
      }
      on_error => "no_source_file"
    }
  }

  if [Destination_File] != "" {
    mutate {
      merge => {
        "event.idm.read_only_udm.target.file.names" => "Destination_File"
      }
      on_error => "no_destination_file"
    }
    if ![no_destination_file] {
      mutate {
        replace => {
          "has_target_file" => "true"
        }
      }
    }
  }

  if [Destination_File_Extension] != "" {
    mutate {
      replace => {
        "event.idm.read_only_udm.target.file.mime_type" => "%{Destination_File_Extension}"
      }
      on_error => "no_destination_file_extension"
    }
    if ![no_destination_file_extension] {
      mutate {
        replace => {
          "has_target_file" => "true"
        }
      }
    }
  }

  if [Application] != "" {
    mutate {
      replace => {
        "event.idm.read_only_udm.target.application" => "%{Application}"
      }
      on_error => "no_application"
    }
  }

  if [Source_Drive_Type] != "" {
    mutate {
      replace => {
        "source_drive_type_label.key" => "Source_Drive_Type"
        "source_drive_type_label.value" => "%{Source_Drive_Type}"
      }
      on_error => "no_source_drive_type"
    }
    if ![no_source_drive_type] {
      mutate {
        merge => {
          "security_result.detection_fields" => "source_drive_type_label"
        }
        on_error => "source_drive_type_merge_failed"
      }
    }
  }

  if [Destination_Drive_Type] != "" {
    mutate {
      replace => {
        "destination_drive_type_label.key" => "Destination_Drive_Type"
        "destination_drive_type_label.value" => "%{Destination_Drive_Type}"
      }
      on_error => "no_destination_drive_type"
    }
    if ![no_destination_drive_type] {
      mutate {
        merge => {
          "security_result.detection_fields" => "destination_drive_type_label"
        }
        on_error => "destination_drive_type_merge_failed"
      }
    }
  }

  if [Was_Removable] != "" {
    mutate {
      replace => {
        "was_removable_label.key" => "Was_Removable"
        "was_removable_label.value" => "%{Was_Removable}"
      }
      on_error => "no_was_removable"
    }
    if ![no_was_removable] {
      mutate {
        merge => {
          "security_result.detection_fields" => "was_removable_label"
        }
        on_error => "was_removable_merge_failed"
      }
    }
  }

  if [Was_Source_Removable] != "" {
    mutate {
      replace => {
        "was_source_removable_label.key" => "Was_Source_Removable"
        "was_source_removable_label.value" => "%{Was_Source_Removable}"
      }
      on_error => "no_was_source_removable"
    }
    if ![no_was_source_removable] {
      mutate {
        merge => {
          "security_result.detection_fields" => "was_source_removable_label"
        }
        on_error => "was_source_removable_merge_failed"
      }
    }
  }

  if [Email_Sender] != "" {
    mutate {
      replace => {
        "event.idm.read_only_udm.network.email.from" => "%{Email_Sender}"
        "subject" => "%{Email_Subject}"
      }
      on_error => "no_email_sender"
    }
    if ![no_email_sender] {
      mutate {
        merge => {
          "event.idm.read_only_udm.network.email.subject" => "subject"
        }
      }
    }
  }

  if [Email_Address] != "" {
    mutate {
      merge => {
        "event.idm.read_only_udm.principal.user.email_addresses" => "Email_Address"
      }
      on_error => "no_email_address"
    }
  }

  if [URL_Path] != "" {
    mutate {
      replace => {
        "event.idm.read_only_udm.target.url" => "%{URL_Path}"
      }
      on_error => "no_url_path"
    }
  }

  if [security_action] != "" {
    mutate {
      merge => {
        "security_result.action" => "security_action"
        "event.idm.read_only_udm.security_result" => "security_result"
      }
      on_error => "security_action_merge_failed"
    }
  }

  if [matched_policies_by_severity] != "" {
    mutate {
      replace => {
        "_sr.rule_name" => "%{matched_policies_by_severity}"
        "_sr.url_back_to_product" => "%{incidents_url}"
      }
      on_error => "matched_policies_replace_failed"
    }
