        "target.file.size" => "uinteger"
      }
      on_error => "size_already_string"
    }
  }
  if [file_desc] != "" {
    mutate {
      replace => {
        "event.idm.read_only_udm.metadata.description" => "%{file_desc}"
      }
      on_error => "desc_empty"
    }
  }
  if [severity] == "" and [level] != "" {
    mutate {
      replace => {
        "severity" => "%{level}"
      }
      on_error => "severity_empty"
    }
  }
  if [severity] == "ERROR" {
    mutate {
      replace => {
        "security_result.severity" => "ERROR"
      }
      on_error => "severity_empty"
    }
  }
  if [severity] == "INFO" {
    mutate {
      replace => {
        "security_result.severity" => "INFORMATIONAL"
      }
      on_error => "severity_empty"
    }
  }
  if [time] != "" {
    date {
      match => ["time","yyyy-MM-ddTHH:mm:ss.SSSZ","ISO8601"]
      on_error => "timestamp_error"
    }
  }
  if [id] != "" {
    mutate {
      replace => {
        "event.idm.read_only_udm.metadata.product_log_id" => "%{id}"
      }
      on_error => "id_empty"
    }
  }
  if [requestid] != "" {
    mutate {
      replace => {
        "requestid_label.value.string_value" => "%{requestid}"
      }
      on_error => "requestid_empty"
    }
    if ![requestid_empty] {
      mutate {
        replace => {
          "requestid_label.key" => "request-id"
        }
        on_error => "event_type_empty"
      }
      mutate {
        merge => {
          "additional.fields" => "requestid_label"
        }
        on_error => "requestid_empty"
      }
    }
  }
  mutate {
    gsub => ["json_data","\\\\",""]
  }
  json {
    source => "json_data"
    array_function => "split_columns"
    on_error => "json_fail"
  }
  if ![json_fail]{
    if [errorType] != "" {
      mutate {
        replace => {
          "errorType_label.value" => "%{errorType}"
        }
        on_error => "errortype_label_empty"
      }
      if ![errortype_label_empty]{
        mutate {
          replace => {
            "errorType_label.key" => "errorType"
          }
          on_error => "event_type_empty"
        }
        mutate {
          merge => {
            "security_result.detection_fields" => "errorType_label"
          }
          on_error => "errorType_empty"
        }
      }
    }
    if [errorMessage] != "" {
      mutate {
        replace => {
          "security_result.description" => "%{errorMessage}"
        }
        on_error => "errormessage_empty"
      }
    }
    if [name] != "" {
      mutate {
        replace => {
          "event.idm.read_only_udm.metadata.product_event_type" => "%{name}"
        }
        on_error => "name_empty"
      }
    }
    if [fault] != "" {
      mutate{
        replace => {
          "fault_label.value" => "%{fault}"
        }
        on_error => "fault_label_empty"
      }
      if ![fault_label_empty]{
        mutate {
          replace => {
            "fault_label.key" => "fault"
          }
          on_error => "event_type_empty"
        }
        mutate {
          merge => {
            "security_result.detection_fields" => "fault_label"
          }
          on_error => "fault_empty"
        }
      }
    }
    if [meta_data][httpStatusCode] != "" {
      mutate {
        convert => {
          "meta_data.httpStatusCode" => "string"
        }
        on_error => "meta_data.httpStatusCode_empty"
      }
      mutate {
        replace => {
          "event.idm.read_only_udm.network.http.response_code" => "%{meta_data.httpStatusCode}"
        }
        on_error => "meta_data.httpStatusCode_empty"
      }
      mutate {
        convert => {
          "event.idm.read_only_udm.network.http.response_code" => "integer"
        }
        on_error => "meta_data.httpStatusCode_empty"
      }
    }
    if [meta_data][requestId] != "" {
      mutate {
        replace => {
          "event.idm.read_only_udm.metadata.product_log_id" => "%{meta_data.requestId}"
        }
        on_error => "meta_data_requestId_empty"
      }
    }
    if [meta_data][extendedRequestId] != "" {
      mutate {
        replace => {
          "extendedRequestId_label.value.string_value" => "%{meta_data.extendedRequestId}"
        }
        on_error => "meta_data_extendedRequestId_empty"
      }
      if ![meta_data_extendedRequestId_empty] {
        mutate {
          replace => {
            "extendedRequestId_label.key" => "extendedRequestId"
          }
          on_error => "event_type_empty"
        }
        mutate {
          merge => {
            "additional.fields" => "extendedRequestId_label"
          }
          on_error => "extendedRequestId_empty"
        }
      }
    }
    if [meta_data][attempts] != "" {
      mutate {
        convert => {
          "meta_data.attempts" => "string"
        }
        on_error => "meta_data_attempts_already_string"
      }
      mutate {
        replace => {
          "attempts_label.value.string_value" => "%{meta_data.attempts}"
        }
        on_error => "meta_data_attempts_empty"
      }
      if ![meta_data_attempts_empty] {
        mutate {
          replace => {
            "attempts_label.key" => "attempts"
          }
          on_error => "event_type_empty"
        }
        mutate {
          merge => {
            "additional.fields" => "attempts_label"
          }
          on_error => "attemps_empty"
        }
      }
    }
    if [meta_data][totalRetryDelay] != "" {
      mutate {
        convert => {
          "meta_data.totalRetryDelay" => "string"
        }
        on_error => "meta_data_totalRetryDelay_already_string"
      }
      mutate {
        replace => {
          "totalRetryDelay_label.value.string_value" => "%{meta_data.totalRetryDelay}"
        }
        on_error => "meta_data_totalRetryDelay_empty"
      }
      if ![meta_data_totalRetryDelay_empty] {
        mutate {
          replace => {
            "totalRetryDelay_label.key" => "totalRetryDelay"
          }
          on_error => "event_type_empty"
        }
        mutate {
          merge => {
            "additional.fields" => "totalRetryDelay_label"
          }
          on_error => "totalRetryDelay_empty"
        }
      }
    }
    if [__type] != "" {
      mutate {
        replace => {
          "__type_label.value.string_value" => "%{__type}"
        }
        on_error => "type_empty"
      }
      if ![type_empty] {
        mutate {
          replace => {
            "__type_label.key" => "__type"
          }
          on_error => "event_type_empty"
        }
        mutate {
          merge => {
            "additional.fields" => "__type_label"
          }
          on_error => "type_empty"
        }
      }
    }
    if [msg] != "" {
      mutate {
        replace => {
          "security_result.summary" => "%{msg}"
        }
        on_error => "msg_empty"
      }
    }
    if [stack] != "" {
      for i ,st in stack {
        mutate {
          convert => {
            "st" => "string"
          }
          on_error => "st_already_string"
        }
        mutate {
          convert => {
            "i" => "string"
          }
          on_error => "i_already_string"
        }
        mutate {
          replace => {
            "stack_label" => ""
          }
          on_error => "stack_empty"
        }
        mutate {
          gsub => ["st","    ",""]
        }
        mutate {
          replace => {
            "stack_label.value.string_value" => "%{st}"
          }
          on_error => "stack_empty"
        }
        if ![stack_empty] {
          mutate {
            replace => {
              "stack_label.key" => "stack_%{i}"
            }
            on_error => "stack_key_empty"
          }
          mutate {
            merge => {
              "additional.fields" => "stack_label"
            }
            on_error => "stack_empty"
          }
        }
      }
    }
  }
  if [error] != "" {
    mutate {
      replace => {
        "security_result.description" => "%{error}"
      }
      on_error => "error_empty"
    }
  }
  if [targetVar] != "" {
    mutate {
      replace => {
        "target.resource.name" => "%{targetVar}"
      }
      on_error => "targetVar_empty"
    }
    if ![targetVar_empty] {
      mutate {
        replace => {
          "has_target_resource" => "true"
        }
      }
    }
  }
  if [filename] != "" {
    mutate {
      replace => {
        "target.process.file.full_path" => "%{filename}"
      }
      on_error => "filename_empty"
    }
  }
  if [line_number] != "" {
    mutate {
      convert => {
        "line_number" => "string"
      }
      on_error => "line_number_already_string"
    }
    mutate {
      replace => {
        "line_number_label.key" => "line_number"
        "line_number_label.value.string_value" => "%{line_number}"
      }
      on_error => "line_number_empty"
    }
    if ![line_number_empty] {
      mutate {
        merge => {
          "additional.fields" => "line_number_label"
        }
        on_error => "line_number_label_empty"
      }
    }
  }
  if [service] != "" {
    mutate {
      replace => {
        "target.application" => "%{service}"
      }
      on_error => "service_empty"
    }
  }
  if [version] != "" {
    mutate {
      replace => {
        "version_label.key" => "version"
        "version_label.value.string_value" => "%{version}"
      }
      on_error => "version_empty"
    }
    if ![version_empty] {
      mutate {
        merge => {
          "additional.fields" => "version_label"
        }
        on_error => "version_label_empty"
      }
    }
    mutate {
      replace => {
        "event.idm.read_only_udm.metadata.product_version" => "%{version}"
      }
      on_error => "version_Empty"
    }
  }
  if [env] != "" {
    mutate {
      replace => {
        "env_label.key" => "env"
        "env_label.value.string_value" => "%{env}"
      }
      on_error => "env_empty"
    }
    if ![env_empty] {
      mutate {
        merge => {
          "additional.fields" => "env_label"
        }
        on_error => "env_label_empty"
      }
    }
  }

  if [has_principal_user] != "" {
    mutate {
      replace => {
        "event.idm.read_only_udm.metadata.event_type" => "USER_UNCATEGORIZED"
      }
      on_error => "principal_user_empty"
    }
  }
  else if [has_principal] == "true" and [has_target] == "true" and [has_user] == "true" {
    mutate {
      replace => {
        "event.idm.read_only_udm.metadata.event_type" => "USER_LOGIN"
        "event.idm.read_only_udm.extensions.auth.type" => "AUTHTYPE_UNSPECIFIED"
      }
    }
  }
  else if [has_principal] == "true" and [has_target] == "true" and [is_http] == "true" {
    mutate {
      replace => {
        "event.idm.read_only_udm.metadata.event_type" => "NETWORK_HTTP"
      }
    }
  }
  else if [has_principal] == "true" and [has_target] == "true" {
    mutate {
      replace => {
        "event.idm.read_only_udm.metadata.event_type" => "NETWORK_CONNECTION"
      }
    }
  }
  else if [has_principal_user] == "true" and [has_target_resource] == "true" {
    mutate {
      replace => {
        "event.idm.read_only_udm.metadata.event_type" => "USER_RESOURCE_ACCESS"
      }
    }
  }
  else if [has_principal] == "true" and [has_target] == "false" {
    mutate {
      replace => {
        "event.idm.read_only_udm.metadata.event_type" => "STATUS_UPDATE"
      }
    }
  }
  else {
    mutate {
      replace => {
        "event.idm.read_only_udm.metadata.event_type" => "GENERIC_EVENT"
      }
    }
  }
  if [principal] != "" {
    mutate {
      rename => {
        "principal" => "event.idm.read_only_udm.principal"
      }
    }
  }
  if [additional] != "" {
    mutate {
      rename => {
        "additional" => "event.idm.read_only_udm.additional"
      }
    }
  }

  if [target] != "" {
    mutate {
      rename => {
        "target" => "event.idm.read_only_udm.target"
      }
    }
  }

  if [security_result] != "" {
    mutate {
      merge => {
        "event.idm.read_only_udm.security_result" => "security_result"
      }
      on_error => "security_result_empty"
    }
  }
  mutate {
    merge => {
      "@output" => "event"
    }
  }
}
