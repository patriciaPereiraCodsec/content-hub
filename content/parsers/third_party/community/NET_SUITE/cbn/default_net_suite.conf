# Product: NET_SUITE
# Category: WAF
# Supported Format: kv
# Reference: See below
# Last Updated: 2023-08-02
# Copyright 2023 Chronicle LLC

filter {
  mutate {
    replace => {
      "event_type" => ""
      "date" => ""
      "detail" => ""
      "emailaddress" => ""
      "ipaddress" => ""
      "oauthaccesstokenname" => ""
      "oauthappname" => ""
      "requesturi" => ""
      "role" => ""
      "secchallenge" => ""
      "status" => ""
      "user" => ""
      "useragent" => ""
      "security_result" => ""
    }
  }

  json {
    source => "message"
    array_function => "split_columns"
    on_error => "invalid_json"
  }

  if [invalid_json] {
    drop {
      tag => "TAG_MALFORMED_MESSAGE"
    }
  }

  if [date] != "" {
    date {
      match => ["date", "yyyy-MM-dd HH:mm:ss", "UNIX", "ISO8601", "UNIX_MS"]
      target => "event.idm.read_only_udm.metadata.event_timestamp"
      on_error => "invalid_date_format"
    }
  }

  if [emailaddress] not in ["", "null"] {
    grok {
      match => {
        "emailaddress" => "%{EMAILADDRESS:email}"
      }
      on_error => "invalid_email_format"
    }

    if ![invalid_email_format] {
      mutate {
        merge => {
          "event.idm.read_only_udm.target.user.email_addresses" => "emailaddress"
        }
      }
    }
  }

  if [ipaddress] != "" {
    mutate {
      merge => {
        "event.idm.read_only_udm.target.ip" => "ipaddress"
      }
    }
  }

  if [oauthaccesstokenname] != "" {
    mutate {
      replace => {
        "oauthaccesstokenname_label.key" => "token_name"
        "oauthaccesstokenname_label.value" => "%{oauthaccesstokenname}"
      }
    }
    mutate {
      merge => {
        "security_result.about.resource.attribute.labels" => "oauthaccesstokenname_label"
      }
    }
  }

  if [secchallenge] not in ["", "null"] {
    mutate {
      replace => {
        "security_challenge_label.key" => "security_challenge"
        "security_challenge_label.value" => "%{secchallenge}"
      }
    }
    mutate {
      merge => {
        "security_result.about.resource.attribute.labels" => "security_challenge_label"
      }
    }
  }

  if [oauthappname] != "" {
    mutate {
      replace => {
        "event.idm.read_only_udm.target.application" => "%{oauthappname}"
      }
    }
  }

  if [requesturi] != "" {
    mutate {
      replace => {
        "event.idm.read_only_udm.target.url" => "%{requesturi}"
      }
    }
  }

  if [role] != "" {
    mutate {
      convert => {
        "role" => "string"
      }
    }
    mutate {
      replace => {
        "event.idm.read_only_udm.target.user.role_name" => "%{role}"
      }
    }
  }

  if [status] != "" {
    mutate {
      replace => {
        "security_result.summary" => "%{status}"
      }
    }
  }

  if [user] != "" {
    mutate {
      convert => {
        "user" => "string"
      }
    }
    mutate {
      replace => {
        "event.idm.read_only_udm.target.user.userid" => "%{user}"
      }
    }
  }

  if [useragent] != "" {
    mutate {
      replace => {
        "event.idm.read_only_udm.target.application" => "%{useragent}"
      }
    }
  }

  mutate {
    replace => {
      "event_type" => "GENERIC_EVENT"
    }
  }

  if [user] != "" {
    mutate {
      replace => {
        "event.idm.read_only_udm.extensions.auth.type" => "MACHINE"
      }
    }
    mutate {
      replace => {
        "event_type" => "USER_LOGIN"
      }
    }
  }

  if [security_result] != "" {
    mutate {
      merge => {
        "event.idm.read_only_udm.security_result" => "security_result"
      }
    }
  }


  mutate {
    replace => {
      "event.idm.read_only_udm.metadata.event_type" => "%{event_type}"
    }
  }

  mutate {
    merge => {
      "@output" => "event"
    }
  }
}
