# Product: CYBERGATEKEEPER_NAC
# Category: Security
# Supported Format: SYSLOG + KV
# Reference: N/A
# Last Updated: 2024-04-23
# Copyright 2024 Chronicle LLC

filter {
  mutate {
    replace => {
      "event_id" => ""
      "kv_data" => ""
      "IP" => ""
      "MAC" => ""
      "Procs" => ""
      "OS" => ""
      "SerialNumber" => ""
      "Time" => ""
      "security_result" => ""
      "_hardware" => ""
      "Message" => ""
      "has_principal" => "false"
      "has_target" => "false"
    }
  }

  grok {
    match => {
      "message" => "<%{INT}>CyberGatekeeper System Event\\[%{INT:event_id}\\]: %{GREEDYDATA:kv_data}"
    }
    overwrite => [ "event_id", "kv_data"]
    on_error => "grok_failure"
  }

  if [grok_failure] {
    drop{
      tag => "TAG_MALFORMED_MESSAGE"
    }
  }

  mutate {
    gsub => ["kv_data", "(\\\s+)([0-9a-zA-Z_.-]+?)=", "^$2="]
  }

  if [kv_data] != "" {
    mutate {
      gsub => ["kv_data", "\"", ""]
    }
    kv {
      source => "kv_data"
      field_split => "^"
      value_split => "="
      whitespace => "strict"
    }
  }

  if [IP] != "" {
    mutate {
      merge => {
        "event.idm.read_only_udm.principal.ip" => "IP"
        "event.idm.read_only_udm.principal.asset.ip" => "IP"
      }
      on_error => "ip_empty"
    }
    mutate {
      replace => {
        "has_principal" => "true"
      }
    }
  }

  if [MAC] != "" {
    mutate {
      gsub => ["MAC","-",":"]
    }
    mutate {
      lowercase => ["MAC"]
    }
    grok {
      match => {
        "MAC" => ["%{MAC:MAC}"]
      }
      overwrite => ["MAC"]
      on_error => "not_mac"
    }
    if ![not_mac] {
      mutate {
        merge => {
          "event.idm.read_only_udm.principal.mac" => "MAC"
        }
        on_error => "mac_version"
      }
    }
  }

  if [event_id] != "" {
    mutate {
      replace => {
        "event_id_label.value.string_value" => "%{event_id}"
      }
      on_error => "event_id_empty"
    }
    if ![event_id_empty] {
      mutate {
        replace => {
          "event_id_label.key" => "event_id"
        }
      }
      mutate {
        merge => {
          "event.idm.read_only_udm.additional.fields" => "event_id_label"
        }
        on_error => "event_id_label_empty"
      }
    }
  }

  if [Procs] != "" {
    mutate {
      replace => {
        "Procs_label.value.string_value" => "%{Procs}"
      }
      on_error => "Procs_empty"
    }
    if ![Procs_empty] {
      mutate {
        replace => {
          "Procs_label.key" => "Procs"
        }
      }
      mutate {
        merge => {
          "event.idm.read_only_udm.additional.fields" => "Procs_label"
        }
        on_error => "Procs_label_empty"
      }
    }
  }

  if [SerialNumber] not in ["", "NONE"] {
    mutate {
      replace => {
        "_hardware.serial_number" => "%{SerialNumber}"
      }
      on_error => "SerialNumber_empty"
    }
  }
  if [_hardware] != "" {
    mutate {
      merge => {
        "event.idm.read_only_udm.principal.asset.hardware" => "_hardware"
      }
      on_error => "hardware_empty"
    }
  }

  if [OS] =~ "(?i)win" {
    mutate {
      replace => {
        "event.idm.read_only_udm.target.platform" => "WINDOWS"
      }
    }
  }
  else if [OS] =~ "(?i)linux" {
    mutate {
      replace => {
        "event.idm.read_only_udm.target.platform" => "LINUX"
      }
    }
  }
  else if [OS] =~ "(?i)mac" or [OS] =~ "(?i)osx" {
    mutate {
      replace => {
        "event.idm.read_only_udm.target.platform" => "MAC"
      }
    }
  }

  if [OS] not in ["", "unspecified"] {
    mutate {
      replace => {
        "event.idm.read_only_udm.target.asset.platform_software.platform_version" => "%{OS}"
      }
      on_error => "no_hardware_version"
    }
  }

  if [Time] != "" {
    date {
      match => ["Time", "yyyyMMddHHmmss"]
      on_error => "not_unix_format"
    }
  }

  if [Message] != "" {
    mutate {
      replace => {
        "event.idm.read_only_udm.metadata.description" => "%{Message}"
      }
      on_error => "message_empty"
    }
  }

  if [has_principal] == "true" and [has_target] == "false" {
    mutate {
      replace => {
        "event.idm.read_only_udm.metadata.event_type" => "STATUS_UPDATE"
      }
    }
  } else {
    mutate {
      replace => {
        "event.idm.read_only_udm.metadata.event_type" => "GENERIC_EVENT"
      }
    }
  }
  mutate {
    replace => {
      "event.idm.read_only_udm.metadata.vendor_name" => "CYBERGATEKEEPER_NAC"
      "event.idm.read_only_udm.metadata.product_name" => "CYBERGATEKEEPER_NAC"
    }
  }

  if [event] == "" {
    drop{
      tag => "TAG_MALFORMED_MESSAGE"
    }
  }
  mutate {
    merge => {
      "@output" => "event"
    }
  }
}
