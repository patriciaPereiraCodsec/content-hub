# Product: NYANSA EVENTS
# Category: IoT
# Supported Format: SYSLOG + KV
# Reference: NA
# Last Updated: 2023-03-01
# Copyright 2023 Chronicle LLC


filter {
  mutate {
    replace => {
      "metadata" => ""
      "principal" => ""
      "network" => ""
      "security_result" => ""
      "intermediary" => ""
      "extensions" => ""
      "timestamp" => ""
      "collected_timestamp" => ""
      "event_type" => ""
      "host" => ""
      "request_id" => ""
      "msg_data" => ""
      "json_data" => ""
      "nas_port" => ""
      "auth_method" => ""
      "end_host_id" => ""
    }
  }
  grok {
    match => {
      "message" => [
        "%{SYSLOGTIMESTAMP:timestamp} (?P<collected_timestamp>%{YEAR}-%{MONTHNUM}-%{MONTHDAY} %{HOUR}: %{MINUTE}:%{SECOND}),%{INT} %{DATA:host} %{DATA:event_type} %{DATA:request_id} %{INT} %{INT} %{GREEDYDATA:msg_data} %{GREEDYDATA:json_data}"
      ]
    }
    overwrite => ["timestamp", "collected_timestamp", "host", "event_type", "request_id", "msg_data", "json_data"]
    on_error => "pattern_not_implemented"
  }
  # Drop logs when grok failed or when required information is not present
  if [pattern_not_implemented] or [msg_data] == "" {
    drop {
      tag => "TAG_MALFORMED_ENCODING"
    }
  }
  kv {
    source => "msg_data"
    field_split => ","
    value_split => "="
    on_error => "not_kv"
  }
  date {
    match => ["timestamp", "MMM dd HH:mm:ss"]
    target => "metadata.event_timestamp"
    rebase => true
    on_error => "wrong_format"
  }
  mutate {
    gsub => [ "collected_timestamp", ": ", ":"]
  }
  date {
    match => ["collected_timestamp", "yyyy-MM-dd HH:mm:ss"]
    target => "metadata.collected_timestamp"
    on_error => "wrong_format"
  }
  # Drop logs which are not in KV format.
  if [not_kv] {
    drop {
      tag => "TAG_MALFORMED_ENCODING"
    }
  }
  mutate {
    replace => {
      "metadata.product_event_type" => "%{event_type}"
    }
    on_error => "no_event_type"
  }
  mutate {
    merge => {
      "principal.ip" => "nas_ip"
    }
    on_error => "no_nas_ip"
  }
  mutate {
    convert => {
      "nas_port" => integer
    }
    on_error => "conv_failed"
  }
  if ![conv_failed] and [nas_port] != 0 {
    mutate {
      rename => {
        "nas_port" => "principal.port"
      }
      on_error => "no_nas_port"
    }
  }
  mutate {
    replace => {
      "principal.application" => "%{service_name}"
    }
    on_error => "no_service_name"
  }
  mutate {
    replace => {
      "principal.user.userid" => "%{user_name}"
    }
    on_error => "no_user_name"
  }
  mutate {
    replace => {
      "network.session_id" => "%{session_id}"
    }
    on_error => "no_session_id"
  }
  if [auth_method] == "MAC-AUTH" or [auth_method] == "EAP-TLS" {
    mutate {
      replace => {
        "extensions.auth.type" => "MACHINE"
      }
    }
  }
  if [host] != "" {
    grok {
      match => {
        "host" => "%{IP:host}"
      }
      on_error => not_ip
      overwrite => ["host"]
    }
    if [not_ip] {
      mutate {
        replace => {
          "intermediary.hostname" => "%{host}"
        }
      }
    }
    else {
      mutate {
        merge => {
          "intermediary.ip" => "host"
        }
      }
    }
  }
  if [auth_method] != "" {
    mutate {
      replace => {
        "auth_method_label.key" => "auth_method"
        "auth_method_label.value" => "%{auth_method}"
      }
      merge => {
        "security_result.detection_fields" => "auth_method_label"
      }
    }
  }
  mutate {
    replace => {
      "auth_source_label.key" => "auth_source"
      "auth_source_label.value" => "%{auth_source}"
    }
    on_error => "no_auth_source"
  }
  if ![no_auth_source] {
    mutate {
      merge => {
        "security_result.detection_fields" => "auth_source_label"
      }
    }
  }
  if [end_host_id] != "" {
    mutate {
      gsub => [ "end_host_id", "(.{2})", "$1:" ]
    }
    mutate {
      gsub => [ "end_host_id", ".{1}$", "" ]
    }
    mutate {
      merge => {
        "principal.mac" => "end_host_id"
      }
    }
  }
  mutate {
    replace => {
      "error_code_label.key" => "error_code"
      "error_code_label.value" => "%{error_code}"
    }
    on_error => "no_error_code"
  }
  if ![no_error_code] {
    mutate {
      merge => {
        "security_result.detection_fields" => "error_code_label"
      }
    }
  }
  mutate {
    replace => {
      "request_status_label.key" => "request_status"
      "request_status_label.value" => "%{request_status}"
    }
    on_error => "no_request_status"
  }
  if ![no_request_status] {
    mutate {
      merge => {
        "security_result.detection_fields" => "request_status_label"
      }
    }
  }
  mutate {
    replace => {
      "request_id_label.key" => "request_id"
      "request_id_label.value" => "%{request_id}"
    }
    on_error => "no_request_id"
  }
  if ![no_request_id] {
    mutate {
      merge => {
        "security_result.detection_fields" => "request_id_label"
      }
    }
  }
  mutate {
    gsub => ["json_data", "smb_host", "smb_host\","]
  }
  json {
    source => "json_data"
    array_function => "split_columns"
    on_error => "not_json"
  }

  if ![not_json] {
    for data in additional {
      mutate {
        replace => {
          "data_label" => ""
        }
      }
      mutate {
        replace => {
          "data_label.key" => "%{data.label}"
        }
        on_error => "data_error"
      }
      mutate {
        replace => {
          "data_label.value" => "%{data.value}"
        }
        on_error => "data_error"
      }
      if ![data_error] {
        mutate {
          merge => {
            "security_result.detection_fields" => "data_label"
          }
        }
      }
    }
  }
  if ![no_user_name] {
    mutate {
      replace => {
        "metadata.event_type" => "USER_UNCATEGORIZED"
      }
    }
  }
  else if ![no_nas_ip] {
    mutate {
      replace => {
        "metadata.event_type" => "STATUS_UPDATE"
      }
    }
  }
  else {
    mutate {
      replace => {
        "metadata.event_type" => "GENERIC_EVENT"
      }
    }
  }

  mutate {
    replace => {
      "metadata.product_name" => "NYANSA_EVENTS"
      "metadata.vendor_name" => "NYANSA_EVENTS"
    }
  }

  # merge the data into udm nouns.
  if [metadata] != "" {
    mutate {
      rename => {
        "metadata" => "event.idm.read_only_udm.metadata"
      }
    }
  }
  if [principal] != "" {
    mutate {
      rename => {
        "principal" => "event.idm.read_only_udm.principal"
      }
    }
  }
  if [network] != "" {
    mutate {
      rename => {
        "network" => "event.idm.read_only_udm.network"
      }
    }
  }
  if [intermediary] != "" {
    mutate {
      merge => {
        "event.idm.read_only_udm.intermediary" => "intermediary"
      }
    }
  }
  if [extensions] != "" {
    mutate {
      rename => {
        "extensions" => "event.idm.read_only_udm.extensions"
      }
    }
  }
  if [security_result] != "" {
    mutate {
      merge => {
        "event.idm.read_only_udm.security_result" => "security_result"
      }
    }
  }

  mutate {
    merge => {
      "@output" => "event"
    }
  }
}

