# Product: Agiloft
# Category: SAAS Application
# Supported Format: JSON, Syslog
# Reference: NA
# Last Updated: 2025-02-27
# Copyright 2025 Google SecOps

filter {
  mutate {
    replace => {
      "metadata" => ""
      "principal" => ""
      "target" => ""
      "additional" => ""
      "network" => ""
      "intermediary" => ""
      "security_result" => ""
      "user_primary_team" => ""
      "creator_team" => ""
      "login" => ""
      "demo_data" => ""
      "_1888_full_name" => ""
      "user_login" => ""
      "deleteable" => ""
      "user_name" => ""
      "creator_login" => ""
      "action_duration" => ""
      "activity_log_id" => ""
      "groups" => ""
      "session_duration" => ""
      "company" => ""
      "interface" => ""
      "_1880_full_name" => ""
      "description" => ""
      "type" => ""
      "record_id" => ""
      "id" => ""
      "table_label" => ""
      "cookie" => ""
      "ip" => ""
      "has_principal_user" => "false"
      "has_principal" => "false"
      "client_ip" => ""
      "user" => ""
      "monthday" => ""
      "month" => ""
      "year" => ""
      "time" => ""
      "timezone" => ""
      "method" => ""
      "url" => ""
      "response_code" => ""
      "byte_transferred" => ""
    }
  }

  json {
    source => "message"
    array_function => "split_columns"
    on_error => "no_json"
  }
  if [no_json] {
    grok {
      match => {
        "message" =>
          [
          '%{IP:client_ip} - %{USERNAME:user} - \\[%{MONTHDAY:monthday}/%{MONTH:month}/%{YEAR:year}:%{TIME:time} %{ISO8601_TIMEZONE:timezone}\\] \\\"%{WORD:method} %{DATA:url} %{INT:response_code} %{INT:byte_transferred}',
          '%{IP:client_ip} - %{USERNAME:user} \\[%{MONTHDAY:monthday}/%{MONTH:month}/%{YEAR:year}:%{TIME:time} %{ISO8601_TIMEZONE:timezone}\\] \\\"%{WORD:method} %{DATA:url} %{INT:response_code} %{INT:byte_transferred}'
          ]

      }
      overwrite => ["client_ip", "user", "monthday", "month", "year", "time", "timezone", "method", "url", "response_code", "byte_transferred"]
      on_error => "no_grok"
    }
  }
  if [client_ip] != "" {
    mutate {
      merge => {
        "principal.ip" => "client_ip"
        "principal.asset.ip" => "client_ip"
      }
      on_error => "no_client_ip"
    }
    if ![no_client_ip] {
      mutate {
        replace => {
          "has_principal" => "true"
        }
        on_error => "no_has_principal"
      }
    }
  }
  if [user] != "" {
    mutate {
      replace => {
        "principal.user.userid" => "%{user}"
      }
      on_error => "no_user"
    }
    if ![no_user] {
      mutate {
        replace => {
          "has_principal_user" => "true"
        }
        on_error => "no_has_principal_user"
      }
    }
  }
  if [method] != "" {
    mutate {
      replace => {
        "network.http.method" => "%{method}"
      }
      on_error => "no_method"
    }
  }
  if [url] != "" {
    mutate {
      replace => {
        "network.http.referral_url" => "%{url}"
      }
      on_error => "no_url"
    }
  }
  if [response_code] != "" {
    mutate {
      replace => {
        "network.http.response_code" => "%{response_code}"
      }
      on_error => "no_response_code"
    }
    mutate {
      convert => {
        "network.http.response_code" => "integer"
      }
      on_error => "response_code_conversion_error"
    }
  }
  if [byte_transferred] != "" {
    mutate {
      replace => {
        "network.received_bytes" => "%{byte_transferred}"
      }
      on_error => "no_byte_transferred"
    }
    mutate {
      convert => {
        "network.received_bytes" => "uinteger"
      }
      on_error => "byte_transferred_conversion_error"
    }
  }
  mutate {
    replace => {
      "timestamp" => "%{monthday}/%{month}/%{year}:%{time} %{timezone}"
    }
    on_error => "no_timestamp"
  }
  date {
    match => ["timestamp", "dd/MMM/yyyy:HH:mm:ss Z"]
    target => "metadata.event_timestamp"
    on_error => "no_date"
  }
  date {
    match => ["date_updated", "MMM dd yyyy HH:mm:ss"]
    target => "security_result.last_updated_time"
    on_error => "no_date"
  }
  date {
    match => ["date", "MMM dd yyyy HH:mm:ss"]
    on_error => "no_date"
  }
  date {
    match => ["date_created", "MMM dd yyyy HH:mm:ss"]
    target => "metadata.collected_timestamp"
    on_error => "no_date"
  }
  if [description] != "" {
    mutate {
      replace => {
        "metadata.description" => "%{description}"
      }
      on_error => "no_description"
    }
  }
  if [user_login] != "" {
    mutate {
      replace => {
        "principal.user.userid" => "%{user_login}"
      }
      on_error => "no_user_login"
    }
    if ![no_user_login] {
      mutate {
        replace => {
          "has_principal_user" => "true"
        }
        on_error => "no_has_principal_user"
      }
    }
  }
  if [user_name] != "" {
    mutate {
      replace => {
        "principal.user.user_display_name" => "%{user_name}"
      }
      on_error => "no_user_name"
    }
    if ![no_user_name] {
      mutate {
        replace => {
          "has_principal_user" => "true"
        }
        on_error => "no_has_principal_user"
      }
    }
  }
  if [type] != "" {
    mutate {
      replace => {
        "type_label.key" => "type"
        "type_label.value.string_value" => "%{type}"
      }
      on_error => "no_type"
    }
    if ![no_type] {
      mutate {
        merge => {
          "additional.fields" => "type_label"
        }
        on_error => "type_merge_error"
      }
    }
  }
  if [user_primary_team] != "" {
    mutate {
      replace => {
        "user_primary_team_label.key" => "user_primary_team"
        "user_primary_team_label.value" => "%{user_primary_team}"
      }
      on_error => "no_user_primary_team"
    }
    if ![no_user_primary_team] {
      mutate {
        merge => {
          "principal.user.attribute.labels" => "user_primary_team_label"
        }
        on_error => "user_primary_team_merge_error"
      }
    }
  }
  if [creator_team] != "" {
    mutate {
      replace => {
        "creator_team_label.key" => "creator_team"
        "creator_team_label.value.string_value" => "%{creator_team}"
      }
      on_error => "no_creator_team"
    }
    if ![no_creator_team] {
      mutate {
        merge => {
          "additional.fields" => "creator_team_label"
        }
        on_error => "creator_team_merge_error"
      }
    }
  }
  if [login] != "" {
    mutate {
      replace => {
        "login_label.key" => "login"
        "login_label.value.string_value" => "%{login}"
      }
      on_error => "no_login"
    }
    if ![no_login] {
      mutate {
        merge => {
          "additional.fields" => "login_label"
        }
        on_error => "login_merge_error"
      }
    }
  }
  if [_1888_full_name] != "" {
    mutate {
      replace => {
        "_1888_full_name_label.key" => "_1888_full_name"
        "_1888_full_name_label.value.string_value" => "%{_1888_full_name}"
      }
      on_error => "no__1888_full_name"
    }
    if ![no__1888_full_name] {
      mutate {
        merge => {
          "additional.fields" => "_1888_full_name_label"
        }
        on_error => "_1888_full_name_merge_error"
      }
    }
  }
  if [creator_login] != "" {
    mutate {
      replace => {
        "creator_login_label.key" => "creator_login"
        "creator_login_label.value.string_value" => "%{creator_login}"
      }
      on_error => "no_creator_login"
    }
    if ![no_creator_login] {
      mutate {
        merge => {
          "additional.fields" => "creator_login_label"
        }
        on_error => "creator_login_merge_error"
      }
    }
  }
  if [table_label] != "" {
    mutate {
      replace => {
        "table_label_label.key" => "table_label"
        "table_label_label.value.string_value" => "%{table_label}"
      }
      on_error => "no_table_label"
    }
    if ![no_table_label] {
      mutate {
        merge => {
          "additional.fields" => "table_label_label"
        }
        on_error => "table_label_merge_error"
      }
    }
  }
  if [cookie] != "" {
    mutate {
      replace => {
        "cookie_label.key" => "cookie"
        "cookie_label.value.string_value" => "%{cookie}"
      }
      on_error => "no_cookie"
    }
    if ![no_cookie] {
      mutate {
        merge => {
          "additional.fields" => "cookie_label"
        }
        on_error => "cookie_merge_error"
      }
    }
  }
  if [action_duration] != "" {
    mutate {
      replace => {
        "action_duration_label.key" => "action_duration"
        "action_duration_label.value.string_value" => "%{action_duration}"
      }
      on_error => "no_action_duration"
    }
    if ![no_action_duration] {
      mutate {
        merge => {
          "additional.fields" => "action_duration_label"
        }
        on_error => "action_duration_merge_error"
      }
    }
  }
  if [id] != "" {
    mutate {
      convert => {
        "id" => "string"
      }
      on_error => "id_conversion_error"
    }
    mutate {
      replace => {
        "metadata.product_log_id" => "%{id}"
      }
      on_error => "no_id"
    }
  }
  if [activity_log_id] != "" {
    mutate {
      replace => {
        "metadata.product_deployment_id" => "%{activity_log_id}"
      }
      on_error => "no_activity_log_id"
    }
  }
  if [record_id] != "" {
    mutate {
      replace => {
        "record_id_label.key" => "record_id"
        "record_id_label.value.string_value" => "%{record_id}"
      }
      on_error => "no_record_id"
    }
    if ![no_record_id] {
      mutate {
        merge => {
          "additional.fields" => "record_id_label"
        }
        on_error => "record_id_merge_error"
      }
    }
  }
  if [groups] != "" {
    mutate {
      merge => {
        "principal.user.group_identifiers" => "groups"
      }
      on_error => "groups_merge_error"
    }
  }
  if [deleteable] != "" {
    mutate {
      replace => {
        "deleteable_label.key" => "deleteable"
        "deleteable_label.value.string_value" => "%{deleteable}"
      }
      on_error => "no_deleteable"
    }
    if ![no_deleteable] {
      mutate {
        merge => {
          "additional.fields" => "deleteable_label"
        }
        on_error => "deleteable_merge_error"
      }
    }
  }
  if [session_duration] != "" {
    mutate {
      replace => {
        "network.session_duration.seconds" => "%{session_duration}"
      }
      on_error => "no_session_duration"
    }
    mutate {
      convert => {
        "network.session_duration.seconds" => "integer"
      }
      on_error => "convertion_error"
    }
  }
  if [company] != "" {
    mutate {
      replace => {
        "principal.user.company_name" => "%{company}"
      }
      on_error => "no_company"
    }
  }
  if [interface] != "" {
    mutate {
      replace => {
        "interface_label.key" => "interface"
        "interface_label.value.string_value" => "%{interface}"
      }
      on_error => "no_interface"
    }
    if ![no_interface] {
      mutate {
        merge => {
          "additional.fields" => "interface_label"
        }
        on_error => "interface_merge_error"
      }
    }
  }
  if [ip] != "" {
    mutate {
      merge => {
        "principal.ip" => "ip"
        "principal.asset.ip" => "ip"
      }
      on_error => "ip_merge_error"
    }
    if ![ip_merge_error] {
      mutate {
        replace => {
          "has_principal" => "true"
        }
        on_error => "no_has_principal"
      }
    }
  }
  if [demo_data] != "" {
    mutate {
      replace => {
        "demo_data_label.key" => "demo_data"
        "demo_data_label.value.string_value" => "%{demo_data}"
      }
      on_error => "no_demo_data"
    }
    if ![no_demo_data] {
      mutate {
        merge => {
          "additional.fields" => "demo_data_label"
        }
        on_error => "demo_data_merge_error"
      }
    }
  }
  if [_1880_full_name] != "" {
    mutate {
      replace => {
        "_1880_full_name_label.key" => "_1880_full_name"
        "_1880_full_name_label.value.string_value" => "%{_1880_full_name}"
      }
      on_error => "no__1880_full_name"
    }
    if ![no__1880_full_name] {
      mutate {
        merge => {
          "additional.fields" => "_1880_full_name_label"
        }
        on_error => "_1880_full_name_merge_error"
      }
    }
  }
  if [has_principal_user] == "true" {
    mutate {
      replace => {
        "metadata.event_type" => "USER_UNCATEGORIZED"
      }
    }
  }
  else if [has_principal] == "true" {
    mutate {
      replace => {
        "metadata.event_type" => "STATUS_UPDATE"
      }
    }
  }
  else {
    mutate {
      replace => {
        "metadata.event_type" => "GENERIC_EVENT"
      }
    }
  }
  mutate {
    replace => {
      "metadata.product_name" => "Agiloft"
      "metadata.vendor_name" => "Agiloft"
    }
  }
  if [metadata] != "" {
    mutate {
      rename => {
        "metadata" => "event.idm.read_only_udm.metadata"
      }
    }
  }

  if [principal] != "" {
    mutate {
      rename => {
        "principal" => "event.idm.read_only_udm.principal"
      }
    }
  }

  if [target] != "" {
    mutate {
      rename => {
        "target" => "event.idm.read_only_udm.target"
      }
    }
  }
  if [additional] != "" {
    mutate {
      rename => {
        "additional" => "event.idm.read_only_udm.additional"
      }
    }
  }
  if [network] != "" {
    mutate {
      rename => {
        "network" => "event.idm.read_only_udm.network"
      }
    }
  }
  if [intermediary] != "" {
    mutate {
      merge => {
        "event.idm.read_only_udm.intermediary" => "intermediary"
      }
      on_error => "no_intermediary"
    }
  }
  if [security_result] != "" {
    mutate {
      merge => {
        "event.idm.read_only_udm.security_result" => "security_result"
      }
      on_error => "no_security_result"
    }
  }
  mutate {
    merge => {
      "@output" => "event"
    }
  }
}
