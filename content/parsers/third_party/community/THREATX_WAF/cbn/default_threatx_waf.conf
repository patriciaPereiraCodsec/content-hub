      on_error => "no_user_email"
    }
  }

  if [action] =~ "block" {
    mutate {
      replace => {
        "act_value" => "BLOCK"
      }
    }
    mutate {
      merge => {
        "security_result.action" => "act_value"
      }
      on_error => "no_action"
    }
  }

  if [description] not in ["", "null" , "N/A" , " "] {
    mutate {
      replace => {
        "metadata.description" => "%{description}"
      }
      on_error => "no_description"
    }
  }

  if [entity] != "" {
    if [entity][codename] not in ["", "null" , "N/A" , " "] {
      mutate {
        replace => {
          "entity_codename_label.key" => "entity_codename"
          "entity_codename_label.value.string_value" => "%{entity.codename}"
        }
        on_error => "no_entity_codename"
      }
      if ![no_entity_codename] {
        mutate {
          merge => {
            "additional.fields" => "entity_codename_label"
          }
          on_error => "no_entity_codename_label"
        }
      }
    }

    if [entity][hash] not in ["", "null" , "N/A" , " "] {
      mutate {
        replace => {
          "entity_hash_label.key" => "entity_hash"
          "entity_hash_label.value.string_value" => "%{entity.hash}"
        }
        on_error => "no_entity_hash"
      }
      if ![no_entity_hash] {
        mutate {
          merge => {
            "additional.fields" => "entity_hash_label"
          }
          on_error => "no_entity_hash_label"
        }
      }
    }

    if [entity][ip_address] not in ["", "null" , "N/A" , " "] {
      mutate {
        merge => {
          "principal.asset.ip" => "entity.ip_address"
          "principal.ip" => "entity.ip_address"
        }
        on_error => "no_entity_ip"
      }
      if ![no_entity_ip] {
        mutate {
          replace => {
            "has_principal" => "true"
          }
        }
      }
    }
  }

  if [request_method] != "" {
    mutate {
      replace => {
        "network.http.method" => "%{request_method}"
      }
      on_error => "no_request_method"
    }
  }

  if [matches] != "" {
    for index,data in matches {
      mutate {
        replace => {
          "id_label" => ""
          "risk_label" => ""
          "contrib_score_label" => ""
          "description_label" => ""
          "classification_label" => ""
          "state_label" => ""
        }
      }
      mutate {
        convert => {
          "index" => "string"
        }
      }

      if [data][description] != "" {
        mutate {
          replace => {
            "description_label.key" => "description_%{index}"
            "description_label.value" => "%{data.description}"
          }
          on_error => "no_matches_description"
        }
        if ![no_matches_description] {
          mutate {
            merge => {
              "security_result.detection_fields" => "description_label"
            }
            on_error => "no_description_label"
          }
        }
      }

      if [data][classification] != "" {
        mutate {
          replace => {
            "classification_label.key" => "classification_%{index}"
            "classification_label.value" => "%{data.classification}"
          }
          on_error => "no_matches_classification"
        }
        if ![no_matches_classification] {
          mutate {
            merge => {
              "security_result.detection_fields" => "classification_label"
            }
            on_error => "no_classification_label"
          }
        }
      }

      if [data][state] != "" {
        mutate {
          replace => {
            "state_label.key" => "state_%{index}"
            "state_label.value" => "%{data.state}"
          }
          on_error => "no_matches_state"
        }
        if ![no_matches_state] {
          mutate {
            merge => {
              "security_result.detection_fields" => "state_label"
            }
            on_error => "no_state_label"
          }
        }
      }

      if [data][id] != "" {
        mutate {
          convert => {
            "data.id" => "string"
          }
        }
        mutate {
          replace => {
            "id_label.key" => "id_%{index}"
            "id_label.value" => "%{data.id}"
          }
          on_error => "no_matches_id"
        }
        if ![no_matches_id] {
          mutate {
            merge => {
              "security_result.detection_fields" => "id_label"
            }
            on_error => "no_id_label"
          }
        }
      }

      if [data][risk] != "" {
        mutate {
          convert => {
            "data.risk" => "string"
          }
        }
        mutate {
          replace => {
            "risk_label.key" => "risk_%{index}"
            "risk_label.value" => "%{data.risk}"
          }
          on_error => "no_risk"
        }
        if ![no_risk] {
          mutate {
            merge => {
              "security_result.detection_fields" => "risk_label"
            }
          }
        }
      }

      if [data][contrib_score] != "" {
        mutate {
          convert => {
            "data.contrib_score" => "string"
          }
        }
        mutate {
          replace => {
            "contrib_score_label.key" => "contrib_score_%{index}"
            "contrib_score_label.value" => "%{data.contrib_score}"
          }
          on_error => "no_contrib_score"
        }
        if ![no_contrib_score] {
          mutate {
            merge => {
              "security_result.detection_fields" => "contrib_score_label"
            }
          }
        }
      }
    }
  }

  if [args] not in ["", "null" , "N/A" , " "] {
    mutate {
      replace => {
        "args_label.key" => "args"
        "args_label.value.string_value" => "%{args}"
      }
      on_error => "no_args"
    }
    if ![no_args] {
      mutate {
        merge => {
          "additional.fields" => "args_label"
        }
        on_error => "no_args_label"
      }
    }
  }

  if [status_code] != "" {
    mutate {
      convert => {
        "status_code" => "integer"
      }
      on_error => "status_code_conversion_error"
    }
    if ![status_code_conversion_error] {
      mutate {
        rename => {
          "status_code" => "network.http.response_code"
        }
        on_error => "status_code_not_found"
      }
    }
  }

  if [has_principal] == "true" and [has_target] == "true" {
    mutate {
      replace => {
        "event_type" => "NETWORK_CONNECTION"
      }
    }
  }
  else if [has_principal] == "true" {
    mutate {
      replace => {
        "event_type" => "USER_UNCATEGORIZED"
      }
    }
  }
  else {
    mutate {
      replace => {
        "event_type" => "GENERIC_EVENT"
      }
    }
  }

  mutate {
    replace => {
      "metadata.vendor_name" => "THREATX_WAF"
      "metadata.product_name" => "THREATX_WAF"
    }
  }

  if [event_type] != "" {
    mutate {
      replace => {
        "metadata.event_type" => "%{event_type}"
      }
      on_error => "event_type_invalid"
    }
  }

  if [security_result] != "" {
    mutate {
      merge => {
        "event.idm.read_only_udm.security_result" => "security_result"
      }
      on_error => "security_result_invalid"
    }
  }
  if [additional] != "" {
    mutate {
      rename => {
        "additional" => "event.idm.read_only_udm.additional"
      }
    }
  }
  if [metadata] != "" {
    mutate {
      rename => {
        "metadata" => "event.idm.read_only_udm.metadata"
      }
    }
  }
  if [principal] != "" {
    mutate {
      rename => {
        "principal" => "event.idm.read_only_udm.principal"
      }
    }
  }
  if [target] != "" {
    mutate {
      rename => {
        "target" => "event.idm.read_only_udm.target"
      }
    }
  }
  if [network] != "" {
    mutate {
      rename => {
        "network" => "event.idm.read_only_udm.network"
      }
    }
  }
# output the built event
  mutate {
    merge=> {
      "@output" => "event"
    }
  }
}
