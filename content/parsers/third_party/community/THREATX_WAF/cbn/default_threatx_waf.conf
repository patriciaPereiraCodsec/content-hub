      "category" => ""
      "user_email" => ""
      "ip" => ""
      "dst_host" => ""
      "uri" => ""
      "request_id" => ""
      "tls_fingerprint" => ""
      "description" => ""
      "action" => ""
      "msg_type" => ""
      "msg_id" => ""
      "subscription_id" => ""
      "app_name" => ""
      "hostname" => ""
      "facility" => ""
      "entity" => ""
      "request_method" => ""
      "matches" => ""
      "status_code" => ""
      "version" => ""
      "severity" => ""
      "priority" => ""
      "msg1" => ""
      "dst_domain" => ""
      "tenant_name" => ""
      "random_id" => ""
      "cookie" => ""
      "js_fingerprint" => ""
      "risk" => ""
      "content_type" => ""
      "content_length" => ""
      "response_length" => ""
      "upstream_response_time" => ""
      "postblock_event" => ""
      "ssl" => ""
      "username" => ""
      "old_value" => ""
      "new_value" => ""
      "count" => ""
      "rule.description" => ""
      "rule.classification" => ""
      "rule.state" => ""
      "rule.contrib_score" => ""
      "rule.beta" => ""
      "rule.blocking" => ""
      "rule.id" => ""
      "timestamp" => ""
    }
  }
  mutate {
    gsub => ["message", "message", "msg1"]
  }

  json {
    source => "message"
    array_function => "split_columns"
    on_error => "invalid_json"
  }

  if [timestamp] not in ["", "null" , "N/A" , " "] {
    date {
      match => ["timestamp", "ISO8601"]
      on_error => "not_in_unix_or_iso_format"
    }
  }

  if [version] not in ["", "null" , "N/A" , " "] {
    mutate {
      convert => {
        "version" => "string"
      }
      on_error => "no_version_convert"
    }
    mutate {
      replace => {
        "version_label.key" => "version"
        "version_label.value.string_value" => "%{version}"
      }
      on_error => "no_version"
    }
    if ![no_version] {
      mutate {
        merge => {
          "additional.fields" => "version_label"
        }
        on_error => "no_version_label"
      }
    }
  }
  for rule in rules {
    mutate {
      replace => {
        "rule_id_label" => ""
        "rule_classification_label" => ""
        "rule_state_label" => ""
        "rule_contrib_score_label" => ""
        "rule_beta_label" => ""
        "rule_blocking_label" => ""
        "rule_description_label" => ""
