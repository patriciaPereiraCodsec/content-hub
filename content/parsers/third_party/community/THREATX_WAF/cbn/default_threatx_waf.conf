    }
    if [rule][id] not in ["", "null" , "N/A" , " "] {
      mutate {
        convert => {
          "rule.id" => "string"
        }
        on_error => "no_rule_id_convert"
      }
      mutate {
        replace => {
          "rule_id_label.key" => "rule_id"
          "rule_id_label.value" => "%{rule.id}"
        }
        on_error => "no_rule_id"
      }
      if ![no_rule_id] {
        mutate {
          merge => {
            "security_result.detection_fields" => "rule_id_label"
