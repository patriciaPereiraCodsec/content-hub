# Product: Passwordstate
# Category: below is a catch all for tokens, phones, groups, and endpoints
# Supported Format: SYSLOG
# Reference: N/A
# Last Updated: 2025-10-10
# Copyright 2025 Google SecOps

filter {
  mutate {
    replace => {
      "event_type" => ""
      "metadata" => ""
      "principal" => ""
      "target" => ""
      "additional" => ""
      "has_principal" => "false"
      "has_target" => "false"
      "has_principal_user" => "false"
      "has_target_user" => "false"
      "has_user_login" => "false"
      "has_user_logout" => "false"
      "security_result" => ""
      "ts" => ""
      "src_ip" => ""
      "username" => ""
      "kv_data" => ""
      "kv_data2" => ""
      "Title" => ""
      "UserName" => ""
      "Description" => ""
      "PasswordListID" => ""
      "PasswordID" => ""
      "clientIp" => ""
      "target_ip" => ""
      "desc" => ""
      "email" => ""
      "kv_data3" => ""
      "passwordList" => ""
      "Password" => ""
      "Type" => ""
      "userId" => ""
      "login_msg" => ""
      "extensions" => ""
      "application" => ""
      "first_name" => ""
      "last_name" => ""
      "access_type" => ""
      "Password_List" => ""
      "_Password" => ""
      "password_record_description" => ""
      "c_Ip" => ""
      "userid" => ""
      "p_ip" => ""
      "tusername" => ""
      "password_record_account_type" => ""
      "target_host" => ""
      "pemail" => ""
      "turl" => ""
      "pip" => ""
      "has_user" => "false"
      "sdescription" => ""
    }
  }

  grok {
    match => {
      "message" => ["<%{INT}>%{TIMESTAMP_ISO8601:ts}\\s+%{IP:src_ip}\\s+Passwordstate:\\s+%{DATA:username}\\s+\\(%{DATA:userId}\\)\\s+%{GREEDYDATA:desc}\\.\\s+\\(%{GREEDYDATA:kv_data}\\).\\s+%{GREEDYDATA:kv_data2}",
      "<%{INT}>%{TIMESTAMP_ISO8601:ts}\\s+%{IP:src_ip}\\s+Passwordstate:\\s+An email was sent to\\s+%{GREEDYDATA:username}\\s+\\(%{EMAILADDRESS:email}\\)\\s+of\\s+%{GREEDYDATA:kv_data3}",
      "<%{INT}>%{TIMESTAMP_ISO8601:ts}\\s+%{IP:src_ip}\\s+Passwordstate:\\s+%{GREEDYDATA:login_msg}\\s+for UserID\\s+\\'%{GREEDYDATA:userId}\\'\\s+from the IP Address\\s+\\'%{IP:target_ip}\\'\\.%{GREEDYDATA}",
      "<%{INT}>%{TIMESTAMP_ISO8601:ts}\\s+%{IP:src_ip}\\s+Passwordstate:\\s+%{GREEDYDATA:login_msg} for user from the IP Address %{DATA}\\s+(?P<desc>.*%{IP:target_ip}.*)",
      "%{TIMESTAMP_ISO8601:ts}\\s+%{IP:p_ip}\\s+%{DATA:application}\\:\\s+%{GREEDYDATA:Description}"
      ]
    }
    overwrite => ["ts","username","kv_data","kv_data2","src_ip","p_ip","target_ip","desc","kv_data3","email","userId","login_msg","Description","application", "kv_data4"]
    on_error => "invalid_grok"
  }

  if [invalid_grok] {
    drop {
      tag => "TAG_MALFORMED_ENCODING"
    }
  }

  if [Description] != "" {
    mutate {
      replace => {
        "metadata.description" => "%{Description}"
      }
      on_error => "invalid_desc"
    }
  }

  if [Description] != "" {
    grok {
      match => {
        "Description" => [
          "An email was sent to %{DATA:first_name}\\s+%{DATA:last_name}\\s+\\(%{DATA:pemail}\\)%{DATA:kv_Data}.\\s+Client IP Address\\s+=\\s+%{IP:c_Ip}",
          "%{DATA:first_name}\\s+%{DATA:last_name}\\s+\\(%{DATA:userid}\\)\\s+%{DATA:access_type}\\'%{DATA:_Password}\\'\\s+\\(%{DATA:Password_List}\\)%{DATA}.\\s+\\(%{DATA:kvData}\\)\\.\\s+%{GREEDYDATA:kv_data4}",
          "%{DATA:first_name}\\s+%{DATA:last_name}\\s+\\(%{DATA:userid}\\)\\s+%{DATA:access_type}\\'%{DATA:_Password}\\'\\s+\\(%{DATA:tusername}\\)\\s+%{DATA}\\'%{DATA:Password_List}\\'%{DATA}%{URI:turl}\\.\\s+%{GREEDYDATA:kv_data4}",
          "%{DATA}account\\s+%{DATA:userid}\\s+\\(%{DATA:Password_List}\\)%{DATA}Account Type\\s+'%{DATA:password_record_account_type}\\'%{DATA}Host\\s+%{DATA:target_host}\\.\\s+%{GREEDYDATA:kv_data4}",
          "%{DATA}\\s+\\'%{DATA:extension}\\'%{DATA}UserID\\s+\\'%{DATA:userid}\\'\\s+%{DATA}%{IP:pip}\\'\\.\\s+%{DATA:browser}\\s+Client IP Address = %{IP:c_Ip}",
          "%{DATA}UserID\\s+\\'%{DATA:userid}'\\s+%{DATA}%{IP:pip}\\'%{DATA}%{IP:c_Ip}",
          "%{DATA}%{IP:pip}%{DATA}Client IP Address\\s+=\\s+%{IP:c_Ip}",
          "%{DATA:sdescription}Client IP Address\\s+=\\s+%{IP:c_Ip}"
        ]
      }
      overwrite => ["first_name", "last_name", "email", "kv_Data","access_type", "_Password", "Password_List", "kvData", "kv_data4", "userid","tusername", "turl", "target_host", "password_record_account_type", "pip", "c_Ip", "pemail","sdescription"]
      on_error => "invalid_grok_desc"
    }
    mutate {
      gsub => ["kv_Data"," ([0-9a-zA-Z]+?) =","_$1="]
    }
    kv {
      source => "kv_Data"
      field_split => "."
      value_split => "="
      on_error => "kv_failed_desc"
    }
    mutate {
      gsub => ["kvData","Description","password_record_description"]
    }
    kv {
      source => "kvData"
      field_split => ","
      value_split => "="
      on_error => "kv_failed_desc2"
    }
  }
  mutate {
    gsub => ["kv_data4",". PasswordListID",",PasswordListID"]
  }
  mutate {
    gsub => ["kv_data4","Client IP Address","c_Ip"]
  }

  kv {
    source => "kv_data4"
    field_split => ","
    value_split => "="
    on_error => "kv_failed_desc4"
  }

  if [password_record_account_type] != "" {
    mutate {
      replace => {
        "password_record_account_type_label.key" => "password_record_account_type"
        "password_record_account_type_label.value.string_value" => "%{password_record_account_type}"
      }
      on_error => "invalid_password_record_account_type"
    }
    if ![invalid_password_record_account_type] {
      mutate {
        merge => {
          "event.idm.read_only_udm.additional.fields" => "password_record_account_type_label"
        }
        on_error => "invalid_password_record_account_type_label"
      }
    }
  }
  if [sdescription] != "" {
    mutate {
      replace => {
        "security_result.description" => "%{sdescription}"
      }
      on_error => "invalid_sdescription"
    }
  }


  if [target_host] != "" {
    mutate {
      replace => {
        "event.idm.read_only_udm.target.hostname" => "%{target_host}"
        "event.idm.read_only_udm.target.asset.hostname" => "%{target_host}"
      }
      on_error => "invalid_target_host"
    }
    if ![invalid_target_host] {
      mutate {
        replace => {
          "has_target" => "true"
        }
      }
    }
  }

  if [turl] != "" {
    mutate {
      replace => {
        "event.idm.read_only_udm.target.url" => "%{turl}"
      }
      on_error => "invalid_turl"
    }
    if ![invalid_turl] {
      mutate {
        replace => {
          "has_target" => "true"
        }
      }
    }
  }
  if [Title] != "" {
    mutate {
      replace => {
        "event.idm.read_only_udm.target.resource.name" => "%{Title}"
      }
      on_error => "invalid_title"
    }
  }

  if [pemail] != "" {
    mutate {
      merge => {
        "event.idm.read_only_udm.principal.user.email_addresses" => "pemail"
      }
      on_error => "invalid_pemail"
    }
    if ![invalid_pemail] {
      mutate {
        replace => {
          "has_user" => "true"
        }
      }
    }
  }

  if [c_Ip] != "" {
    mutate {
      merge => {
        "event.idm.read_only_udm.target.ip" => "c_Ip"
        "event.idm.read_only_udm.target.asset.ip" => "c_Ip"
      }
      on_error => "invalid_clientIp"
    }
    if ![invalid_clientIp] {
      mutate {
        replace => {
          "has_target" => "true"
        }
      }
    }
  }
  if [p_ip] != "" {
    mutate {
      merge => {
        "event.idm.read_only_udm.principal.ip" => "p_ip"
        "event.idm.read_only_udm.principal.asset.ip" => "p_ip"
      }
      on_error => "invalid_principalIp"
    }
    if ![invalid_principalIp] {
      mutate {
        replace => {
          "has_principal" => "true"
        }
      }
    }
  }

  if [pip] != "" {
    mutate {
      merge => {
        "event.idm.read_only_udm.principal.ip" => "pip"
        "event.idm.read_only_udm.principal.asset.ip" => "pip"
      }
      on_error => "invalid_principalpip"
    }
    if ![invalid_principalpip] {
      mutate {
        replace => {
          "has_principal" => "true"
        }
      }
    }
  }

  if [userid] != "" {
    mutate {
      replace => {
        "event.idm.read_only_udm.principal.user.userid" => "%{userid}"
      }
      on_error => "invalid_userid"
    }
    if ![invalid_userid] {
      mutate {
        replace => {
          "has_user" => "true"
        }
      }
    }
  }
  if [tusername] != "" {
    kv {
      source => "tusername"
      field_split => ","
      value_split => "="
      on_error => "invalid_tusername"
    }
  }

  if [PasswordListID] != "" {
    mutate {
      replace => {
        "PasswordListID_label.key" => "password_list_id"
        "PasswordListID_label.value.string_value" => "%{PasswordListID}"
      }
      on_error => "invalid_PasswordListID"
    }
    if ![invalid_PasswordListID] {
      mutate {
        merge => {
          "event.idm.read_only_udm.additional.fields" => "PasswordListID_label"
        }
        on_error => "invalid_PasswordListID_label"
      }
    }
  }

  if [PasswordID] != "" {
    mutate {
      replace => {
        "PasswordID_label.key" => "password_id"
        "PasswordID_label.value.string_value" => "%{PasswordID}"
      }
      on_error => "invalid_PasswordID"
    }
    if ![invalid_PasswordID] {
      mutate {
        merge => {
          "event.idm.read_only_udm.additional.fields" => "PasswordID_label"
        }
        on_error => "invalid_PasswordID_label"
      }
    }
  }

  if [first_name] != "" {
    mutate {
      replace => {
        "event.idm.read_only_udm.principal.user.first_name" => "%{first_name}"
      }
      on_error => "invalid_first_name"
    }
  }
  if [last_name] != "" {
    mutate {
      replace => {
        "event.idm.read_only_udm.principal.user.last_name" => "%{last_name}"
      }
      on_error => "invalid_last_name"
    }
  }

  mutate {
    replace => {
      "access_type" => "%{of_Type}"
    }
    on_error => "replace_failed_access_type"
  }
  if [access_type]  =~ "added the new Password" {
    mutate {
      replace => {
        "access_type_label.key" => "access_type"
        "access_type_label.value.string_value" => "Password Added"
      }
      on_error => "invalid_access_type_added"
    }
    if ![invalid_access_type_added] {
      mutate {
        merge => {
          "event.idm.read_only_udm.additional.fields" => "access_type_label"
        }
        on_error => "invalid_access_type_label_added"
      }
    }
  }
  else if [access_type]  =~ "retrieved the Password" {
    mutate {
      replace => {
        "access_type_label.key" => "access_type"
        "access_type_label.value.string_value" => "Password Retrieved"
      }
      on_error => "invalid_access_type_retrieved"
    }
    if ![invalid_access_type_retrieved] {
      mutate {
        merge => {
          "event.idm.read_only_udm.additional.fields" => "access_type_label"
        }
        on_error => "invalid_access_type_label_retrieved"
      }
    }
  }
  else if [access_type]  =~ "copied the password" {
    mutate {
      replace => {
        "access_type_label.key" => "access_type"
        "access_type_label.value.string_value" => "Password Copied"
      }
      on_error => "invalid_access_type_copied"
    }
    if ![invalid_access_type_copied] {
      mutate {
        merge => {
          "event.idm.read_only_udm.additional.fields" => "access_type_label"
        }
        on_error => "invalid_access_type_label_copied"
      }
    }
  }
  else if [access_type]  =~ "deleted the Password" {
    mutate {
      replace => {
        "access_type_label.key" => "access_type"
        "access_type_label.value.string_value" => "Password Deleted"
      }
      on_error => "invalid_access_type_deleted"
    }
    if ![invalid_access_type_deleted] {
      mutate {
        merge => {
          "event.idm.read_only_udm.additional.fields" => "access_type_label"
        }
        on_error => "invalid_access_type_label_deleted"
      }
    }
  }
  else if [access_type]  != "" {
    mutate {
      gsub => ["access_type","'",""]
    }
    mutate {
      replace => {
        "access_type_label.key" => "access_type"
        "access_type_label.value.string_value" => "%{access_type}"
      }
      on_error => "invalid_access_type"
    }
    if ![invalid_access_type] {
      mutate {
        merge => {
          "event.idm.read_only_udm.additional.fields" => "access_type_label"
        }
        on_error => "invalid_access_type_label"
      }
    }
  }
  if [Password_List] != "" {
    mutate {
      replace => {
        "Password_List_label.key" => "password_list"
        "Password_List_label.value.string_value" => "%{Password_List}"
      }
      on_error => "invalid_Password_List"
    }
    if ![invalid_Password_List] {
      mutate {
        merge => {
          "event.idm.read_only_udm.additional.fields" => "Password_List_label"
        }
        on_error => "invalid_Password_List_label"
      }
    }
  }
  if [password_record_description] != "" {
    mutate {
      replace => {
        "password_record_description_label.key" => "password_record_description"
        "password_record_description_label.value.string_value" => "%{password_record_description}"
      }
      on_error => "invalid_password_record_description"
    }
    if ![invalid_password_record_description] {
      mutate {
        merge => {
          "event.idm.read_only_udm.additional.fields" => "password_record_description_label"
        }
        on_error => "invalid_password_record_description_label"
      }
    }
  }
  if [_Password] != "" {
    mutate {
      replace => {
        "Password_label.key" => "password_record"
        "Password_label.value.string_value" => "%{_Password}"
      }
      on_error => "invalid_Password"
    }
    if ![invalid_Password] {
      mutate {
        merge => {
          "event.idm.read_only_udm.additional.fields" => "Password_label"
        }
        on_error => "invalid_Password_label"
      }
    }
  }

  if [application] != "" {
    mutate {
      replace => {
        "event.idm.read_only_udm.src.application" => "%{application}"
      }
      on_error => "mapping_error_application"
    }
  }
  if [UserName] != "" {
    mutate {
      replace => {
        "event.idm.read_only_udm.target.user.userid" => "%{UserName}"
      }
      on_error => "mapping_error"
    }
    if ![mapping_error] {
      mutate {
        replace => {
          "has_user" => "true"
        }
      }
    }
  }

  if [ts] != "" {
    date {
      match => ["ts", "ISO8601", "yyyy-MM-dd HH:mm:ss"]
      target => "metadata.event_timestamp"
      on_error => "invalid_date_format"
    }
  }

  if [username] != "" {
    mutate {
      replace => {
        "principal.user.user_display_name" => "%{username}"
      }
      on_error => "invalid_username"
    }
    if ![invalid_username] {
      mutate {
        replace => {
          "has_principal_user" => "true"
        }
      }
    }
  }

  if [src_ip] != "" {
    mutate {
      merge => {
        "principal.ip" => "src_ip"
        "principal.asset.ip" => "src_ip"
      }
      on_error => "invalid_src_ip"
    }
    if ![invalid_src_ip] {
      mutate {
        replace => {
          "has_principal" => "true"
        }
      }
    }
  }

  if [email] =~ "^.+@.+$" {
    mutate {
      merge => {
        "principal.user.email_addresses" => "email"
      }
      on_error => "invalid_email"
    }
    if ![invalid_email] {
      mutate {
        replace => {
          "has_principal_user" => "true"
        }
      }
    }
  }

  if [userId] != "" {
    mutate {
      replace => {
        "target.user.userid" => "%{userId}"
      }
      on_error => "invalid_target_userId"
    }
    if ![invalid_target_userId] {
      mutate {
        replace => {
          "has_target_user" => "true"
        }
      }
    }
  }

  if [login_msg] != "" {
    mutate {
      gsub => ["login_msg","'",""]
    }
    mutate {
      replace => {
        "security_result.description" => "%{login_msg}"
      }
      on_error => "invalid_login_msg"
    }
  }

  if [kv_data] != "" {
    kv {
      source => "kv_data"
      field_split => ","
      value_split => "="
      on_error => "invalid_kv_data"
    }
    if ![invalid_kv_data] {
      if [Title] != "" {
        mutate {
          replace => {
            "title_label.key" => "Title"
            "title_label.value" => "%{Title}"
          }
          on_error => "invalid_title"
        }
        if ![invalid_title] {
          mutate {
            merge => {
              "security_result.detection_fields" => "title_label"
            }
            on_error => "invalid_title_label"
          }
        }
      }
      if [UserName] != "" {
        mutate {
          replace => {
            "principal.user.userid" => "%{UserName}"
          }
          on_error => "invalid_userid"
        }
        if ![invalid_userid] {
          mutate {
            replace => {
              "has_principal_user" => "true"
            }
          }
        }
      }
      if [Description] != "" {
        mutate {
          replace => {
            "desc_label.key" => "Description"
            "desc_label.value" => "%{Description}"
          }
          on_error => "invalid_desc"
        }
        if ![invalid_desc] {
          mutate {
            merge => {
              "security_result.detection_fields" => "desc_label"
            }
            on_error => "invalid_desc_label"
          }
        }
      }
    }
  }

  if [kv_data2] != "" {
    mutate  {
      gsub => ["kv_data2","Client IP Address","clientIp"]
    }
    mutate {
      gsub => ["kv_data2",", ","#"]
    }
    mutate {
      gsub => ["kv_data2", "([A-Za-z0-9]+)(\\s+)=", "#$1="]
    }
    kv {
      source => "kv_data2"
      field_split => "#"
      value_split => "="
      on_error => "invalid_kv_data2"
    }
    if ![invalid_kv_data2] {
      if [PasswordListID] != "" {
        mutate {
          replace => {
            "PasswordListID_label.key" => "PasswordListID"
            "PasswordListID_label.value" => "%{PasswordListID}"
          }
          on_error => "invalid_PasswordListID"
        }
        if ![invalid_PasswordListID] {
          mutate {
            merge => {
              "security_result.detection_fields" => "PasswordListID_label"
            }
            on_error => "invalid_PasswordListID_label"
          }
        }
      }
      if [PasswordID] != "" {
        mutate {
          replace => {
            "PasswordID_label.key" => "PasswordID"
            "PasswordID_label.value" => "%{PasswordID}"
          }
          on_error => "invalid_PasswordID"
        }
        if ![invalid_PasswordID] {
          mutate {
            merge => {
              "security_result.detection_fields" => "PasswordID_label"
            }
            on_error => "invalid_PasswordID_label"
          }
        }
      }
    }
  }

  if [kv_data3] != "" {
    mutate {
      gsub => ["kv_data3", "Password List", "passwordList"]
    }
    mutate  {
      gsub => ["kv_data3","Client IP Address","clientIp"]
    }
    mutate {
      gsub => ["kv_data3", "([A-Za-z0-9]+)(\\s+)=", "#$1="]
    }
    kv {
      source => "kv_data3"
      field_split => "#"
      value_split => "="
      on_error => "invalid_kv_data3"
    }
    mutate {
      gsub => ["Type","'",""]
    }
    if ![invalid_kv_data3] {
      if [Password] not in ["","NA."] {
        mutate {
          replace => {
            "password_label.key" => "Password"
            "password_label.value" => "%{Password}"
          }
          on_error => "invalid_password"
        }
        if ![invalid_password] {
          mutate {
            merge => {
              "security_result.detection_fields" => "password_label"
            }
            on_error => "invalid_password_label"
          }
        }
      }
      if [passwordList] not in ["","NA."] {
        mutate {
          replace => {
            "passwordList_label.key" => "PasswordList"
            "passwordList_label.value" => "%{passwordList}"
          }
          on_error => "invalid_password_list"
        }
        if ![invalid_password_list] {
          mutate {
            merge => {
              "security_result.detection_fields" => "passwordList_label"
            }
            on_error => "invalid_passwordList_label"
          }
        }
      }
      if [Type] not in ["","NA"]{
        mutate {
          replace => {
            "type_label.key" => "Type"
            "type_label.value" => "%{Type}"
          }
          on_error => "invalid_type"
        }
        if ![invalid_type] {
          mutate {
            merge => {
              "security_result.detection_fields" => "type_label"
            }
            on_error => "invalid_type_label"
          }
        }
      }
    }
  }

  if [target_ip] != "" {
    mutate {
      merge => {
        "target.ip" => "target_ip"
        "target.asset.ip" => "target_ip"
      }
      on_error => "invalid_target_ip"
    }
    if ![invalid_target_ip] {
      mutate {
        replace => {
          "has_target" => "true"
        }
      }
    }
  }
  else if [clientIp] != "" {
    mutate {
      merge => {
        "target.ip" => "clientIp"
        "target.asset.ip" => "clientIp"
      }
      on_error => "invalid_client_ip"
    }
    if ![invalid_client_ip] {
      mutate {
        replace => {
          "has_target" => "true"
        }
      }
    }
  }

  if [desc] != "" {
    mutate {
      replace => {
        "security_result.description" => "%{desc}"
      }
      on_error => "invalid_desc"
    }
  }

  if [login_msg] == "Successful SAML login" {
    mutate {
      replace => {
        "has_user_login" => "true"
      }
    }
  }
  else if [login_msg] == "Automatic logoff" {
    mutate {
      replace => {
        "has_user_logout" => "true"
      }
    }
  }

  if [has_user_login] == "true" and [has_target_user] == "true" {
    mutate {
      replace => {
        "event_type" => "USER_LOGIN"
        "extensions.auth.type" => "AUTHTYPE_UNSPECIFIED"
      }
    }
  }
  else if [has_user_logout] == "true" and [has_target_user] == "true" {
    mutate {
      replace => {
        "event_type" => "USER_LOGOUT"
        "extensions.auth.type" => "AUTHTYPE_UNSPECIFIED"
      }
    }
  }
  else if [has_principal_user] == "true" and [has_principal] == "true" and [has_target_user] == "true" and [has_target] == "true" {
    mutate {
      replace => {
        "event_type" => "USER_CREATION"
      }
    }
  }
  else if [access_type] =~ "Password Copied" {
    mutate {
      replace => {
        "event_type" => "USER_RESOURCE_ACCESS"
      }
    }
  }
  else if [access_type] =~ "Password Deleted" {
    mutate {
      replace => {
        "event_type" => "USER_RESOURCE_DELETION"
      }
    }
  }
  else if [Description] =~ "email was sent" {
    mutate {
      replace => {
        "event_type" => "USER_COMMUNICATION"
      }
    }
  }
  else if ([has_principal_user] == "true" and [has_principal] == "true" and [has_target] == "false") || ([has_target_user] == "true" and [has_principal_user] == "true" and [has_target] == "true") {
    mutate {
      replace => {
        "event_type" => "USER_UNCATEGORIZED"
      }
    }
  }
  else if [has_principal_user] == "true" and [has_principal] == "true" {
    mutate {
      replace => {
        "event_type" => "USER_COMMUNICATION"
      }
    }
  }
  else if [has_principal] == "true" and [has_target] == "true" {
    mutate {
      replace => {
        "event_type" => "NETWORK_CONNECTION"
      }
    }
  }
  else if [has_principal] == "true" or [has_target] == "true" {
    mutate {
      replace => {
        "event_type" => "STATUS_UPDATE"
      }
    }
  }

  if [event_type] != "" {
    mutate {
      replace => {
        "metadata.event_type" => "%{event_type}"
      }
      on_error => "invalid_event_type"
    }
  }
  else {
    mutate {
      replace => {
        "metadata.event_type" => "GENERIC_EVENT"
      }
    }
  }

  mutate {
    replace => {
      "metadata.vendor_name" => "PASSWORDSTATE"
      "metadata.product_name" => "PASSWORDSTATE"
    }
  }

  if [metadata] != "" {
    mutate {
      rename => {
        "metadata" => "event.idm.read_only_udm.metadata"
      }
      on_error => "invalid_metadata"
    }
  }

  if [principal] != "" {
    mutate {
      rename => {
        "principal" => "event.idm.read_only_udm.principal"
      }
      on_error => "invalid_principal"
    }
  }

  if [target] != "" {
    mutate {
      rename => {
        "target" => "event.idm.read_only_udm.target"
      }
      on_error => "invalid_target"
    }
  }

  if [additional] != "" {
    mutate {
      rename => {
        "additional" => "event.idm.read_only_udm.additional"
      }
      on_error => "invalid_additional"
    }
  }

  if [extensions] != "" {
    mutate {
      rename => {
        "extensions" => "event.idm.read_only_udm.extensions"
      }
      on_error => "invalid_extensions"
    }
  }

  if [security_result] != "" {
    mutate {
      merge => {
        "event.idm.read_only_udm.security_result" => "security_result"
      }
      on_error => "invalid_security_result"
    }
  }

  mutate {
    merge => {
      "@output" => "event"
    }
  }
}

