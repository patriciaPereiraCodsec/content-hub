# Product: MICROFOCUS_IMANAGER
# Category: Network Management and Optimization
# Supported Format: SYSLOG
# Reference: NA
# Last Updated: 2025-01-02
# Copyright 2025 Chronicle LLC

filter {
    mutate {
        replace => {
            "CN"   => ""
            "OU"   => ""
            "O"   => ""
            "rt" => ""
            "ab" => ""
            "sr" => ""
            "cs1Label"   => ""
            "cs6Label" => ""
            "cs2Label" => ""
            "cs3Label" => ""
            "cs4Label" => ""
            "cs5Label" => ""
            "cat" => ""
            "cs1" => ""
            "cs2" => ""
            "cs3" => ""
            "cs4" => ""
            "cs5" => ""
            "cs6" => ""
            "dtz" => ""
            "dvc" => ""
            "src" => ""
            "spt" => ""
            "msg" => ""
            "sproc" => ""
            "dproc" => ""
            "suser" => ""
            "duser" => ""
            "domain" => ""
            "reason" => ""
            "dvchost" => ""
            "outcome" => ""
            "hostname" => ""
            "column1" => ""
            "column2" => ""
            "column3" => ""
            "column4" => ""
            "column5" => ""
            "column6" => ""
            "column7" => ""
            "column8" => ""
            "dusername" => ""
            "flexString1" => ""
            "flexString2" => ""
            "flexNumber1" => ""
            "flexNumber2" => ""
            "flexString2Label" => ""
            "sourceServiceName" => ""
            "flexString1Label" => ""
            "flexNumber1Label" => ""
            "flexNumber2Label" => ""
        }
    }

    grok {
        match => {
            "message" =>
                "%{DATA:column1}\\|%{DATA:column2}\\|%{DATA:column3}\\|%{DATA:column4}\\|%{DATA:column5}\\|%{DATA:column6}\\|%{DATA:column7}\\|%{GREEDYDATA:column8}"
        }
        overwrite => ["column1","column2","column3","column4","column5","column6","column7","column8"]
        on_error => "_malformed_csv"
    }
    if [_malformed_csv] {
        drop {
            tag => "TAG_UNSUPPORTED"
        }
    }
    # Strip
    mutate{
        gsub => [
            "column1","^\\s+|\\s+$",""
            "column2","^\\s+|\\s+$",""
            "column3","^\\s+|\\s+$",""
            "column4","^\\s+|\\s+$",""
            "column5","^\\s+|\\s+$",""
            "column6","^\\s+|\\s+$",""
            "column7","^\\s+|\\s+$",""
            "column8","^\\s+|\\s+$",""
        ]
    }

    # Replace conflictive chars
    mutate { gsub => ["column8", "\\\\=", "->"]}

    # Renaming columns
    mutate {
        rename => {
            "column1"   => "_"
            "column2"   => "DEVICE_VENDOR"
            "column3"   => "DEVICE_PRODUCT"
            "column4"   => "DEVICE_VERSION"
            "column5"   => "DEVICE_EVENT_CLASS_ID"
            "column6"   => "NAME"
            "column7"   => "SEVERITY"
            "column8"   => "DATA"
        }
    }

    # Extracting values field
    grok {
        match => {
            "DATA" => "dvc=%{DATA:dvc} (%{NOTSPACE}=|$)"
        }
        overwrite => ["dvc"]
        on_error => "grok_dvc_failed"
    }
    grok {
        match => {
            "DATA" => "dvchost=%{DATA:dvchost} (%{NOTSPACE}=|$)"
        }
        overwrite => ["dvchost"]
        on_error => "grok_dvchost_failed"
    }
    grok {
        match => {
            "DATA" => "rt=%{DATA:rt} (%{NOTSPACE}=|$)"
        }
        overwrite => ["rt"]
        on_error => "grok_rt_failed"
    }
    grok {
        match => {
            "DATA" => [
                "dtz=%{DATA:dtz} (%{NOTSPACE}=|$)"
                "dtz=%{GREEDYDATA:dtz}(%{NOTSPACE}=|$)"
            ]
        }
        overwrite => ["dtz"]
        on_error => "grok_dtz_failed"
    }
    grok {
        match => {
            "DATA" => "sourceServiceName=%{DATA:sourceServiceName} (%{NOTSPACE}=|$)"
        }
        overwrite => ["sourceServiceName"]
        on_error => "grok_sourceServiceName_failed"
    }
    grok {
        match => {
            "DATA" => "sproc=%{DATA:sproc} (%{NOTSPACE}=|$)"
        }
        overwrite => ["sproc"]
        on_error => "grok_sproc_failed"
    }
    grok {
        match => {
            "DATA" => "dproc=%{DATA:dproc} (%{NOTSPACE}=|$)"
        }
        overwrite => ["dproc"]
        on_error => "grok_dproc_failed"
    }
    grok {
        match => {
            "DATA" => "src=%{DATA:src} (%{NOTSPACE}=|$)"
        }
        overwrite => ["src"]
        on_error => "grok_src_failed"
    }
    grok {
        match => {
            "DATA" => "spt=%{DATA:spt} (%{NOTSPACE}=|$)"
        }
        on_error => "grok_spt_failed"
        overwrite => ["spt"]
    }
    grok {
        match => {
            "DATA" => "suser=%{DATA:suser} (%{NOTSPACE}=|$)"
        }
        on_error => "grok_suser_failed"
        overwrite => ["suser"]
    }
    grok {
        match => {
            "DATA" => "duser=%{DATA:duser} (%{NOTSPACE}=|$)"
        }
        overwrite => ["duser"]
        on_error => "grok_duser_failed"
    }
    grok {
        match => {
            "DATA" => "cat=%{DATA:cat} (%{NOTSPACE}=|$)"
        }
        on_error => "grok_cat_failed"
        overwrite => ["cat"]
    }
    grok {
        match => {
            "DATA" => "reason=%{DATA:reason} (%{NOTSPACE}=|$)"
        }
        overwrite => ["reason"]
        on_error => "grok_reason_failed"
    }
    grok {
        match => {
            "DATA" => "outcome=%{DATA:outcome} (%{NOTSPACE}=|$)"
        }
        overwrite => ["outcome"]
        on_error => "grok_outcome_failed"
    }
    grok {
        match => {
            "DATA" => "msg=%{GREEDYDATA:msg}"
        }
        overwrite => ["msg"]
        on_error => "grok_rt_failed"
    }
    grok {
        match => {
            "DATA" => "cs1Label=%{DATA:cs1Label} (%{NOTSPACE}=|$)"
        }
        overwrite => ["cs1Label"]
        on_error => "grok_cs1Label_failed"
    }
    grok {
        match => {
            "DATA" => "cs1=%{DATA:cs1} (%{NOTSPACE}=|$)"
        }
        overwrite => ["cs1"]
        on_error => "grok_cs1_failed"
    }
    grok {
        match => {
            "DATA" => "cs2Label=%{DATA:cs2Label} (%{NOTSPACE}=|$)"
        }
        overwrite => ["cs2Label"]
        on_error => "grok_cs2Label_failed"
    }
    grok {
        match => {
            "DATA" => "cs2=%{DATA:cs2} (%{NOTSPACE}=|$)"
        }
        overwrite => ["cs2"]
        on_error => "grok_cs2_failed"
    }
    grok {
        match => {
            "DATA" => "cs3Label=%{DATA:cs3Label} (%{NOTSPACE}=|$)"
        }
        overwrite => ["cs3Label"]
        on_error => "grok_cs3Label_failed"
    }
    grok {
        match => {
            "DATA" => "cs3=%{DATA:cs3} (%{NOTSPACE}=|$)"
        }
        overwrite => ["cs3"]
        on_error => "grok_cs3_failed"
    }
    grok {
        match => {
            "DATA" => "cs4Label=%{DATA:cs4Label} (%{NOTSPACE}=|$)"
        }
        overwrite => ["cs4Label"]
        on_error => "grok_cs4Label_failed"
    }
    grok {
        match => {
            "DATA" => "cs4=%{DATA:cs4} (%{NOTSPACE}=|$)"
        }
        overwrite => ["cs4"]
        on_error => "grok_cs4_failed"
    }
    grok {
        match => {
            "DATA" => "cs5Label=%{DATA:cs5Label} (%{NOTSPACE}=|$)"
        }
        overwrite => ["cs5Label"]
        on_error => "grok_cs5Label_failed"
    }
    grok {
        match => {
            "DATA" => "cs5=%{DATA:cs5} (%{NOTSPACE}=|$)"
        }
        overwrite => ["cs5"]
        on_error => "grok_cs5_failed"
    }
    grok { match => {
        "DATA" => "cs6Label=%{DATA:cs6Label} (%{NOTSPACE}=|$)"
        }
        overwrite => ["cs6Label"]
        on_error => "grok_cs6Label_failed"
    }
    grok {
        match => {
            "DATA" => "cs6=%{DATA:cs6} (%{NOTSPACE}=|$)"
        }
        overwrite => ["cs6"]
        on_error => "grok_cs6_failed"
    }
    grok {
        match => {
            "DATA" => "flexString1Label=%{DATA:flexString1Label} (%{NOTSPACE}=|$)"
        }
        overwrite => ["flexString1Label"]
        on_error => "grok_flexS1Label_failed"
    }
    grok {
        match => {
            "DATA" => "flexString1=%{DATA:flexString1} (%{NOTSPACE}=|$)"
        }
        overwrite => ["flexString1"]
        on_error => "grok_flexS1_failed"
    }
    grok {
        match => {
            "DATA" => "flexString2Label=%{DATA:flexString2Label} (%{NOTSPACE}=|$)"
        }
        overwrite => ["flexString2Label"]
        on_error => "grok_flexS2Label_failed"
    }
    grok {
        match => {
            "DATA" => "flexString2=%{DATA:flexString2} (%{NOTSPACE}=|$)"
        }
        overwrite => ["flexString2"]
        on_error => "grok_flexS2_failed"
    }
    grok {
        match => {
            "DATA" => "flexNumber1Label=%{DATA:flexNumber1Label} (%{NOTSPACE}=|$)"
        }
        overwrite => ["flexNumber1Label"]
        on_error => "grok_flexN1Label_failed"
    }
    grok {
        match => {
            "DATA" => "flexNumber1=%{DATA:flexNumber1} (%{NOTSPACE}=|$)"
        }
        overwrite => ["flexNumber1"]
        on_error => "grok_flexN1_failed"
    }
    grok {
        match => {
            "DATA" => "flexNumber2Label=%{DATA:flexNumber2Label} (%{NOTSPACE}=|$)"
        }
        overwrite => ["flexNumber2Label"]
        on_error => "grok_flexN2Label_failed"
    }
    grok {
        match => {
            "DATA" => "flexNumber2=%{DATA:flexNumber2} (%{NOTSPACE}=|$)"
        }
        overwrite => ["flexNumber2"]
        on_error => "grok_flexN2_failed"
    }

    # Initialization of subfields
    if [grok_cs6Label_failed] and [DATA] =~ "Member DN" {
        mutate {
            replace => {
                "cs6Label" => "Member DN"
            }
        }
    }
    mutate {
        replace => {
            "CN"   => ""
            "OU"   => ""
            "O"   => ""
        }
    }

    # Strip
    mutate{
        gsub => [
            "dvc","^\\s+|\\s+$",""
            "dvchost","^\\s+|\\s+$",""
            "rt","^\\s+|\\s+$",""
            "dtz","^\\s+|\\s+$",""
            "sourceServiceName","^\\s+|\\s+$",""
            "sproc","^\\s+|\\s+$",""
            "dproc","^\\s+|\\s+$",""
            "src","^\\s+|\\s+$",""
            "spt","^\\s+|\\s+$",""
            "suser","^\\s+|\\s+$",""
            "duser","^\\s+|\\s+$",""
            "cat","^\\s+|\\s+$",""
            "reason","^\\s+|\\s+$",""
            "outcome","^\\s+|\\s+$",""
            "msg","^\\s+|\\s+$",""
            "cs1Label","^\\s+|\\s+$",""
            "cs2Label","^\\s+|\\s+$",""
            "cs3Label","^\\s+|\\s+$",""
            "cs4Label","^\\s+|\\s+$",""
            "cs5Label","^\\s+|\\s+$",""
            "cs6Label","^\\s+|\\s+$",""
            "cs1","^\\s+|\\s+$",""
            "cs2","^\\s+|\\s+$",""
            "cs3","^\\s+|\\s+$",""
            "cs4","^\\s+|\\s+$",""
            "cs5","^\\s+|\\s+$",""
            "cs6","^\\s+|\\s+$",""
            "flexString1Label","^\\s+|\\s+$",""
            "flexString2Label","^\\s+|\\s+$",""
            "flexString1","^\\s+|\\s+$",""
            "flexString2","^\\s+|\\s+$",""
            "flexNumber1Label","^\\s+|\\s+$",""
            "flexNumber2Label","^\\s+|\\s+$",""
            "flexNumber1","^\\s+|\\s+$",""
            "flexNumber2","^\\s+|\\s+$",""
            "login_method","^\\s+|\\s+$",""
        ]
    }

# === DATA ===
    # CEF
    # CEF_VERSION

    # DEVICE_EVENT_CLASS_ID
    mutate {
        replace => {
            "event.idm.read_only_udm.principal.resource.product_object_id" => "%{DEVICE_EVENT_CLASS_ID}"
        }
        on_error => "DEVICE_EVENT_CLASS_ID_failed"
    }

    # SEVERITY
    mutate {
        replace => {
            "_severity_selector" => "%{SEVERITY}"
        }
        on_error => "_severity_selector_failed"
    }

    if not [_severity_selector_failed]  {
        if [SEVERITY] =~ "0|1|2|3" {
            mutate {
                replace => {
                    "sr.severity" => "LOW"
                }
            }
        }
        else if [SEVERITY] =~ "4|5|6" {
            mutate {
                replace => {
                    "sr.severity" => "MEDIUM"
                }
            }
        }
        else if [SEVERITY] =~ "7|8" {
            mutate {
                replace => {
                    "sr.severity" => "HIGH"
                }
            }
        }
        else if [SEVERITY] =~ "9|10" {
            mutate {
                replace => {
                    "sr.severity" => "CRITICAL"
                }
            }
        }
        else {
            mutate {
                replace => {
                    "sr.severity" => "UNKNOWN_SEVERITY"
                }
            }
        }

        mutate {
            replace => {
                "sr.severity_details" => "%{SEVERITY}"
            }
            on_error => "invalid_severity"
        }
    }

    # dvc
    if [dvc] != "" {
        grok {
            match => {
                "dvc" => "%{IP:dvc}"
            }
            on_error => "not_ip"
            overwrite => ["dvc"]
        }
        if ![not_ip] {
            mutate {
                merge => {
                    "ab.asset.ip" => "dvc"
                }
                on_error => "dvc_failed"
            }
        }
    }

    # dvchost
    if [dvchost] != "" {
        mutate {
            replace => {
                "event.idm.read_only_udm.principal.domain.name" => "%{dvchost}"
            }
            on_error => "dvchost_failed"
        }
        mutate {
            replace => {
                "hostname" => "%{dvchost}"
            }
            on_error => "dvchost_failed"
        }
        mutate {
            replace => {
                "domain" => "%{dvchost}"
            }
            on_error => "dvchost_failed"
        }
    }
    mutate { gsub => ["hostname", "(\\w+).\\w+.\\w+", "$1"]}
    mutate { gsub => ["domain", "\\w+.(\\w+.\\w+)", "$1"]}
    if [hostname] != "" {
        mutate {
            replace => {
                "ab.asset.hostname" => "%{hostname}"
            }
            on_error => "dvchost_failed"
        }
    }
    if [domain] != "" {
        mutate {
            replace => {
                "ab.asset.network_domain" => "%{domain}"
            }
            on_error => "dvchost_failed"
        }
    }

    if [ab] != "" {
        mutate {
            merge => {
                "event.idm.read_only_udm.about" => "ab"
            }
            on_error => "dvc_failed"
        }
    }

    # rt
    # dtz
    if [rt] != "" {
        if [dtz] =~ "-12" { date { match => ["rt", "UNIX_MS"] target => "@timestamp" timezone => "Etc/GMT+12"}}
        if [dtz] =~ "-11" { date { match => ["rt", "UNIX_MS"] target => "@timestamp" timezone => "Etc/GMT+11"}}
        if [dtz] =~ "-10" { date { match => ["rt", "UNIX_MS"] target => "@timestamp" timezone => "Etc/GMT+10"}}
        if [dtz] =~ "-09" { date { match => ["rt", "UNIX_MS"] target => "@timestamp" timezone => "Etc/GMT+9"}}
        if [dtz] =~ "-08" { date { match => ["rt", "UNIX_MS"] target => "@timestamp" timezone => "Etc/GMT+8"}}
        if [dtz] =~ "-07" { date { match => ["rt", "UNIX_MS"] target => "@timestamp" timezone => "Etc/GMT+7"}}
        if [dtz] =~ "-06" { date { match => ["rt", "UNIX_MS"] target => "@timestamp" timezone => "Etc/GMT+6"}}
        if [dtz] =~ "-05" { date { match => ["rt", "UNIX_MS"] target => "@timestamp" timezone => "Etc/GMT+5"}}
        if [dtz] =~ "-04" { date { match => ["rt", "UNIX_MS"] target => "@timestamp" timezone => "Etc/GMT+4"}}
        if [dtz] =~ "-03" { date { match => ["rt", "UNIX_MS"] target => "@timestamp" timezone => "Etc/GMT+3"}}
        if [dtz] =~ "-02" { date { match => ["rt", "UNIX_MS"] target => "@timestamp" timezone => "Etc/GMT+2"}}
        if [dtz] =~ "-01" { date { match => ["rt", "UNIX_MS"] target => "@timestamp" timezone => "Etc/GMT+1"}}
        if [dtz] =~ "\\\\+00" { date { match => ["rt", "UNIX_MS"] target => "@timestamp" timezone => "Etc/GMT"}}
        if [dtz] =~ "\\\\+01" { date { match => ["rt", "UNIX_MS"] target => "@timestamp" timezone => "Etc/GMT-1"}}
        if [dtz] =~ "\\\\+02" { date { match => ["rt", "UNIX_MS"] target => "@timestamp" timezone => "Etc/GMT-2"}}
        if [dtz] =~ "\\\\+03" { date { match => ["rt", "UNIX_MS"] target => "@timestamp" timezone => "Etc/GMT-3"}}
        if [dtz] =~ "\\\\+04" { date { match => ["rt", "UNIX_MS"] target => "@timestamp" timezone => "Etc/GMT-4"}}
        if [dtz] =~ "\\\\+05" { date { match => ["rt", "UNIX_MS"] target => "@timestamp" timezone => "Etc/GMT-5"}}
        if [dtz] =~ "\\\\+06" { date { match => ["rt", "UNIX_MS"] target => "@timestamp" timezone => "Etc/GMT-6"}}
        if [dtz] =~ "\\\\+07" { date { match => ["rt", "UNIX_MS"] target => "@timestamp" timezone => "Etc/GMT-7"}}
        if [dtz] =~ "\\\\+08" { date { match => ["rt", "UNIX_MS"] target => "@timestamp" timezone => "Etc/GMT-8"}}
        if [dtz] =~ "\\\\+09" { date { match => ["rt", "UNIX_MS"] target => "@timestamp" timezone => "Etc/GMT-9"}}
        if [dtz] =~ "\\\\+10" { date { match => ["rt", "UNIX_MS"] target => "@timestamp" timezone => "Etc/GMT-10"}}
        if [dtz] =~ "\\\\+11" { date { match => ["rt", "UNIX_MS"] target => "@timestamp" timezone => "Etc/GMT-11"}}
        if [dtz] =~ "\\\\+12" { date { match => ["rt", "UNIX_MS"] target => "@timestamp" timezone => "Etc/GMT-12"}}
        if [dtz] =~ "America/Bogota" { date { match => ["rt", "UNIX_MS"] target => "@timestamp" timezone => "America/Bogota"}}
        date {
           match => ["rt", "UNIX_MS"]
           target => "@timestamp"
           on_error => "invalid_rt"
        }
    }

    # sourceServiceName
    mutate { gsub => ["sourceServiceName", "->", "="]}

    if not [grok_sourceServiceName_failed] and [sourceServiceName] != "" {
        kv {
            source => "sourceServiceName"
            field_split => ","
            value_split => "="
            on_error => "not_kv"
        }
    }
    if [CN] != "" {
        mutate {
            replace => {
                "event.idm.read_only_udm.principal.user.userid" => "%{CN}"
            }
            on_error => "CN_failed"
        }
    }
    if [OU] != "" {
        mutate {
            merge => {
                "event.idm.read_only_udm.principal.user.group_identifiers" => "OU"
            }
            on_error => "OU_failed"
        }
    }
    if [O] != ""  {
        mutate {
            replace => {
                "event.idm.read_only_udm.principal.user.company_name" => "%{O}"
            }
            on_error => "O_failed"
        }
    }

    mutate {
        replace => {
            "CN"   => ""
            "OU"   => ""
            "O"   => ""
        }
    }
    # sproc
    if [sproc] != "" {
        mutate {
            replace => {
                "event.idm.read_only_udm.src.resource.name" => "%{sproc}"
            }
            on_error => "sproc_failed"
        }
    }

    # dproc
    if [dproc] != "" {
        mutate {
            replace => {
                "event.idm.read_only_udm.target.resource.name" => "%{dproc}"
            }
            on_error => "dproc_failed"
        }
    }

    # src
    if [src] != "" {
        mutate {
            merge => {
                "event.idm.read_only_udm.principal.ip" => "src"
                "event.idm.read_only_udm.principal.asset.ip" => "src"
            }
            on_error => "src_failed"
        }
    }

    # spt
    if [spt] != "" {
        mutate {
            convert => {
                "spt" => "integer"
            }
            on_error => "already_integer"
        }
        mutate {
            rename => {
                "spt" => "event.idm.read_only_udm.principal.port"
            }
        }
    }

    # suser
    mutate { gsub => ["suser", "->", "="]}
        if not [grok_suser_failed] and [suser] != "" {
        kv {
            source => "suser"
            field_split => ","
            value_split => "="
            on_error => "not_kv"
        }
    }
    if [CN] != "" {
        mutate {
            replace => {
                "event.idm.read_only_udm.src.user.userid" => "%{CN}"
            }
            on_error => "CN_failed"
        }
    }
    if [OU] != "" {
        mutate {
            merge => {
                "event.idm.read_only_udm.src.user.group_identifiers" => "OU"
            }
            on_error => "OU_failed"
        }
    }
    if [O] != ""  {
        mutate {
            replace => {
                "event.idm.read_only_udm.src.user.company_name" => "%{O}"
            }
            on_error => "O_failed"
        }
    }

    mutate {
        replace => {
            "CN"   => ""
            "OU"   => ""
            "O"   => ""
        }
    }

    # duser
    mutate { gsub => ["cs6", "->", "="]}

    if [cs6Label] =~ "Member DN" {
        kv {
            source => "cs6"
            field_split => ","
            value_split => "="
            on_error => "not_cs6_kv"
        }
        if ![not_cs6_kv] {
            mutate { gsub => ["CN", ">", ""]}
            mutate { gsub => ["OU", ">", ""]}
            mutate { gsub => ["O", ">", ""]}
            if [CN] != "" {
                mutate {
                    replace => {
                        "event.idm.read_only_udm.target.user.userid" => "%{CN}"
                    }
                    on_error => "CN_failed"
                }
            }
            if [OU] != "" {
                mutate {
                    merge => {
                        "event.idm.read_only_udm.target.user.group_identifiers" => "OU"
                    }
                    on_error => "OU_failed"
                }
            }
            if [O] != ""  {
                mutate {
                    replace => {
                        "event.idm.read_only_udm.target.user.company_name" => "%{O}"
                    }
                    on_error => "O_failed"
                }
            }
        }


        if not [grok_duser_failed] and [duser] != "" {

