            mutate {
                replace => {
                    "CN"   => ""
                    "OU"   => ""
                    "O"   => ""
                }
            }
            kv {
                source => "duser"
                field_split => ","
                value_split => "="
                on_error => "not_kv"
            }
        }
        if ![not_kv] {
            if [CN] != "" {
                mutate {
                    replace => {
                        "event.idm.read_only_udm.target.group.group_display_name" => "%{CN}"
                    }
                    on_error => "CN_failed"
                }
            }
            if [OU] != "" {
                mutate {
                    replace => {
                        "event.idm.read_only_udm.target.group.product_object_id" => "%{OU}"
                    }
                    on_error => "OU_failed"
                }
            }
        }
    }


    else {
        if not [grok_duser_failed] and [duser] != "" {
            kv {
                source => "duser"
                field_split => ",_"
                value_split => "="
                on_error => "not_kv"
            }
        }
        if [CN] != "" {
            mutate {
                replace => {
                    "event.idm.read_only_udm.target.user.userid" => "%{CN}"
                }
                on_error => "CN_failed"
