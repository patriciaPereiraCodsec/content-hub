    # Merge sr
    if [sr] != "" {
        mutate {
            merge => {
                "event.idm.read_only_udm.security_result" => "sr"
            }
            on_error => "sr_merge_failed"
        }
    }

# === UDM > METADATA ===

    # General Metadata for all events
    # DEVICE_VENDOR
    # DEVICE_PRODUCT
    # DEVICE_VERSION
    if [hostname] != "" {
        mutate {
            replace => {
                "event.idm.read_only_udm.principal.hostname" => "%{hostname}"
                "event.idm.read_only_udm.principal.asset.hostname" => "%{hostname}"
            }
            on_error => "invalid_hostname"
        }
        mutate {
            replace => {
                "event.idm.read_only_udm.metadata.event_type" => "STATUS_UPDATE"
            }
        }
    } else {
        mutate {
            replace => {
                "event.idm.read_only_udm.metadata.event_type" => "GENERIC_EVENT"
            }
        }
    }
    mutate {
        replace => {
            "event.idm.read_only_udm.metadata.vendor_name" => "MICROFOCUS_IMANAGER"
            "event.idm.read_only_udm.metadata.product_name" => "MICROFOCUS_IMANAGER"
        }
    }
    mutate {
        replace => {
            "event.idm.read_only_udm.metadata.vendor_name" => "%{DEVICE_VENDOR}"
        }
        on_error => "invalid_device_details"
    }
    mutate {
        replace => {
            "event.idm.read_only_udm.metadata.product_name" => "%{DEVICE_PRODUCT}"
        }
        on_error => "invalid_device_details"
    }

    mutate {
        replace => {
            "event.idm.read_only_udm.metadata.product_version" => "%{DEVICE_VERSION}"
        }
        on_error => "invalid_device_details"
    }

    # NAME
    mutate {
        replace => {
            "event.idm.read_only_udm.metadata.product_event_type" => "%{NAME}"
        }
        on_error => "NAME_failed"
    }

    # msg
    if [msg] != "" {
        mutate {
            gsub => ["msg", "->", "="]
        }
        mutate {
            replace => {
                "event.idm.read_only_udm.metadata.description" => "%{msg}"
            }
            on_error => "msg_failed"
        }
    }


    # EVENT_TYPE
    if not [NAME_failed] {
        if [NAME] =~ "CONNECTION" {
            mutate {
                replace => {
                    "event.idm.read_only_udm.metadata.event_type" => "NETWORK_CONNECTION"
                }
            }
        }
        if [NAME] =~ "LOGIN" {
            mutate {
                replace => {
                    "event.idm.read_only_udm.metadata.event_type" => "USER_LOGIN"
                }
            }
        }
        if [NAME] =~ "LOGOUT" {
            mutate {
                replace => {
                    "event.idm.read_only_udm.metadata.event_type" => "USER_LOGOUT"
                }
            }
        }
        if [NAME] =~ "ADD_MEMBER" {
            mutate {
                replace => {
                    "event.idm.read_only_udm.metadata.event_type" => "USER_CREATION"
                }
            }
        }
        if [NAME] =~ "DELETE_MEMBER" {
            mutate {
                replace => {
                    "event.idm.read_only_udm.metadata.event_type" => "USER_DELETION"
                }
            }
        }
        if [NAME] =~ "INTRUDER_DETECTED" {
