        if [NAME] =~ "ADD_VALUE" {
            mutate {
                replace => {
                    "event.idm.read_only_udm.metadata.event_type" => "USER_RESOURCE_CREATION"
                }
            }
        }
        if [NAME] =~ "DELETE_VALUE" {
            mutate {
                replace => {
                    "event.idm.read_only_udm.metadata.event_type" => "USER_RESOURCE_DELETION"
                }
            }
        }
        if [NAME] =~ "COMPARE_ATTRIBUTE_VALUE" {
            mutate {
                replace => {
                    "event.idm.read_only_udm.metadata.event_type" => "USER_RESOURCE_UPDATE_CONTENT"
                }
            }
        }
    }

    if [event][idm][read_only_udm][metadata][event_type] in ["USER_LOGIN","USER_LOGOUT"] {
        mutate {
            replace => {
                "event.idm.read_only_udm.extensions.auth.type" => "AUTHTYPE_UNSPECIFIED"
            }
        }
    }
    if [event][idm][read_only_udm][metadata][event_type] == ["USER_CHANGE_PERMISSIONS"] {
        grok {
            match => {
                "msg" => "CN=%{USERNAME:dusername}"
            }
            overwrite => ["dusername"]
            on_error => "grok_duser_Fail"
        }
        if [grok_duser_Fail] and [dusername] != "" {
            mutate {
                replace => {
                    "event.idm.read_only_udm.target.user.userid" => "%{dusername}"
                }
                on_error => "invalid_dusername"
            }
        }
    } else if [event][idm][read_only_udm][metadata][event_type] == "NETWORK_CONNECTION" and [src] != "" {
        mutate {
            merge => {
                "event.idm.read_only_udm.target.ip" => "src"
                "event.idm.read_only_udm.target.asset.ip" => "src"
            }
            on_error => "DEVICE_EVENT_CLASS_ID_failed"
        }
    }

    if [cs1Label] == "Intruder Address" {
        mutate {
            replace => {
                "intruders" => "%{cs1}"
            }
            on_error => "invalid_cs"
        }

        grok {
            match => {
                "intruders" => "%{WORD:proto}:\\s%{IP:src_ip}:%{DATA:spt}$"
            }
            overwrite => ["src_ip, proto, spt"]
            on_error => "grok_intruders_failed"
        }

        if not [grok_intruders_failed] {
            mutate {
                merge => {
                    "event.idm.read_only_udm.src.ip" => "src_ip"
                }
                on_error => "src_ip_failed"
            }
            mutate {
                convert => {
                    "spt" => "integer"
                }
                on_error => "invalid_conversion"
            }
            mutate {
                rename => {
                    "spt" => "event.idm.read_only_udm.src.port"
                }
            }
            mutate {
                replace => {
                    "event.idm.read_only_udm.network.ip_protocol" => "%{proto}"
                }
                on_error => "proto_failed"
            }
        }
    }

# === OUTPUT ===

    mutate {
        merge => {
            "@output" => "event"
        }
    }
}
