    # cat
    if [cat] != "" {
        mutate {
            merge => {
                "sr.category_details" => "cat"
            }
            on_error => "cat_failed"
        }
    }

    # reason
    if [reason] != "" {
        mutate {
            replace => {
                "sr.description" => "%{reason}"
            }
            on_error => "reason_failed"
        }
    }

    # reason
    if [outcome] != "" {
        mutate {
            replace => {
                "sr.summary" => "%{outcome}"
            }
            on_error => "outcome_failed"
        }

        if ![outcome_failed] {
            if [outcome] == "Success" {
                mutate {replace => {"act"   => "ALLOW"}}
                mutate { merge => {"sr.action" => "act"}}
            }
            else if [outcome] == "Failure" {
                mutate {replace => {"act"   => "FAIL"}}
                mutate { merge => {"sr.action" => "act"}}
            }
            else {
                mutate {replace => {"act"   => "UNKNOWN_ACTION"}}
                mutate { merge => {"sr.action" => "act"}}
            }
        }
    }

    # AUTH (manual added)
    if [flexString1] != "" {
        mutate {
            replace => {
                "event.idm.read_only_udm.extensions.auth.auth_details" => "%{flexString1}"
            }
            on_error => "invalid_flex_string"
