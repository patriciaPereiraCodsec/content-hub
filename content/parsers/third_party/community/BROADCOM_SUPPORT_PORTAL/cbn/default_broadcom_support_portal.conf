    }
  }
  if [received_bytes_details] != "" {
    mutate {
      replace => {
        "network.received_bytes" => "%{received_bytes_details}"
      }
      on_error => "no_received_bytes_details"
    }
    mutate {
      convert => {
        "network.received_bytes" => "uinteger"
      }
      on_error => "received_bytes_details_convert_error"
    }
  }
  if [sent_byte_details] != "" {
    mutate {
      replace => {
        "network.sent_bytes" => "%{sent_byte_details}"
      }
      on_error => "no_sent_byte_details"
    }
    mutate {
      convert => {
        "network.sent_bytes" => "uinteger"
      }
      on_error => "sent_byte_details_convert_error"
    }
  }
  if [user_agent_details] != "" {
    mutate {
      replace => {
        "network.http.user_agent" => "%{user_agent_details}"
      }
      on_error => "no_user_agent_details"
    }
    mutate {
      replace => {
        "network.http.parsed_user_agent" => "%{user_agent_details}"
      }
      on_error => "replace_user_agent_error"
    }
    mutate {
      convert => {
        "network.http.parsed_user_agent" => "parseduseragent"
      }
      on_error => "convert_user_agent_error"
    }
  }
  if [session_duration] != "" {
    mutate {
      replace => {
        "session_duration_label.key" => "session_duration"
        "session_duration_label.value.string_value" => "%{session_duration}"
      }
      on_error => "session_duration_replace_failed"
    }
    if ![session_duration_replace_failed] {
      mutate {
        merge => {
          "event.idm.read_only_udm.additional.fields" => "session_duration_label"
        }
        on_error => "session_duration_merge_failed"
      }
    }
  }
  if [target_ip] != "" {
    grok {
      match => {
        "target_ip" => [
          "%{IP:target_ip}"
        ]
      }
      overwrite => ["target_ip"]
      on_error => "target_ip_grok_failed"
    }
    if ![target_ip_grok_failed] {
      mutate {
        merge => {
          "target.ip" => "target_ip"
          "target.asset.ip" => "target_ip"
        }
        on_error => "target_ip_merge_failed"
      }
      if ![target_ip_merge_failed] {
        mutate {
          replace => {
            "has_target" => "true"
          }
        }
      }
    }
  }
  if [target_port] != "" {
    mutate {
      replace => {
        "target.port" => "%{target_port}"
      }
      on_error => "no_target_port"
    }
    mutate {
      convert => {
        "target.port" => "integer"
      }
      on_error => "target_port_convert_error"
    }
  }
  if [principal_port] != "" {
    mutate {
      replace => {
        "principal.port" => "%{principal_port}"
      }
      on_error => "no_principal_port"
    }
    mutate {
      convert => {
        "principal.port" => "integer"
      }
      on_error => "principal_port_convert_error"
    }
  }
  if [product_log_id_details] != "" {
    mutate {
      replace => {
        "metadata.product_log_id" => "%{product_log_id_details}"
      }
      on_error => "no_product_log_id_details"
    }
  }
  if [application_details] != "" {
    mutate {
      replace => {
        "target.application" => "%{application_details}"
      }
      on_error => "no_application_details"
    }
  }
  if [timestramp] != "" {
    date {
      match => ["timestramp", "ISO8601", "yyyy-MM-ddTHH:mm:ss.SSSSSSSSSZ", "yyyy-MM-dd HH:mm:ss.SSS"]
      target => "metadata.event_timestamp"
      on_error => "timestamp_error"
    }
  }
  if [values] != "" {
    kv {
      source => "values"
      field_split => ", "
      value_split => "="
      on_error => "no_valuedetails"
    }
  }

  if [severity] != "" {
    mutate {
      uppercase => ["severity"]
    }
    if [severity] in ["CRITICAL","ERROR","HIGH","INFORMATIONAL","LOW","MEDIUM"] {
      mutate {
        replace => {
          "security_result.severity" => "%{severity}"
        }
        on_error => "no_security_result"
      }
    }
    else if [severity] == "INFO" {
      mutate {
        replace => {
          "security_result.severity" => "INFORMATIONAL"
        }
      }
    }
  }
  if [dispatch] != "" {
    mutate {
      replace => {
        "dispatch_label.key" => "dispatch"
        "dispatch_label.value.string_value" => "%{dispatch}"
      }
      on_error => "no_dispatch"
    }
    if ![no_dispatch] {
      mutate {
        merge => {
          "event.idm.read_only_udm.additional.fields" => "dispatch_label"
        }
        on_error => "no_dispatch"
      }
    }
  }
  if [ParallelDestination] != "" {
    mutate {
      replace => {
        "ParallelDestination_label.key" => "ParallelDestination"
        "ParallelDestination_label.value" => "%{ParallelDestination}"
      }
      on_error => "no_ParallelDestination"
    }
    if ![no_ParallelDestination] {
      mutate {
        merge => {
          "target.resource.attribute.labels" => "ParallelDestination_label"
        }
        on_error => "no_ParallelDestination"
      }
    }
  }
  if [GROUP_NAME] != "" {
    mutate {
      replace => {
        "principal.group.group_display_name" => "%{GROUP_NAME}"
      }
      on_error => "no_GROUP_NAME"
    }
  }
  if [destinationName] != "" {
    mutate {
      replace => {
        "target.application" => "%{destinationName}"
      }
      on_error => "no_destinationName"
    }
  }
  if [responseDestinationName] not in ["null", ""] {
    mutate {
      replace => {
        "target.application" => "%{responseDestinationName}"
      }
      on_error => "no_responseDestinationName"
    }
  }
  if [description] != "" {
    mutate {
      replace => {
        "security_result.description" => "%{description}"
      }
      on_error => "no_description"
    }
  }
  if [response] not in ["", "null"] {
    mutate {
      replace => {
        "response_label.key" => "response"
        "response_label.value" => "%{response}"
      }
      on_error => "no_response"
    }
    if ![no_response] {
      mutate {
        merge => {
          "security_result.detection_fields" => "response_label"
        }
        on_error => "no_response"
      }
    }
  }
  if [responseId] not in ["" , "null"]{
    mutate {
      replace => {
        "responseId_label.key" => "responseId"
        "responseId_label.value" => "%{responseId}"
      }
      on_error => "no_responseId"
    }
    if ![no_responseId] {
      mutate {
        merge => {
          "security_result.detection_fields" => "responseId_label"
        }
        on_error => "no_responseId"
      }
    }
  }
  if [payload] not in ["", "null"] {
    mutate {
      replace => {
        "principal.resource.product_object_id" => "%{payload}"
      }
      on_error => "no_payload"
    }
  }
  if [companyId] not in ["", "null", "0"] {
    mutate {
      replace => {
        "companyId_label.key" => "companyId"
        "companyId_label.value.string_value" => "%{companyId}"
      }
      on_error => "no_companyId"
    }
    if ![no_companyId] {
      mutate {
        merge => {
          "event.idm.read_only_udm.additional.fields" => "companyId_label"
        }
        on_error => "no_companyId"
      }
    }
  }
  if [groupId] not in ["", "null", "0"] {
    mutate {
      merge => {
        "target.user.group_identifiers" => "groupId"
      }
      on_error => "no_groupId"
    }
  }
  if [DESTINATION_NAME] != "" {
    mutate {
      replace => {
        "target.application" => "%{DESTINATION_NAME}"
      }
      on_error => "no_DESTINATION_NAME"
    }
  }
  if [JOB_STATE] != "" {
    mutate {
      replace => {
        "security_result.description" => "%{JOB_STATE}"
      }
      on_error => "no_JOB_STATE"
    }
  }
  if [STORAGE_TYPE] != "" {
    mutate {
      replace => {
        "STORAGE_TYPE_label.key" => "STORAGE_TYPE"
        "STORAGE_TYPE_label.value" => "%{STORAGE_TYPE}"
      }
      on_error => "no_STORAGE_TYPE"
    }
    if ![no_STORAGE_TYPE] {
      mutate {
        merge => {
          "target.resource.attribute.labels" => "STORAGE_TYPE_label"
        }
        on_error => "no_STORAGE_TYPE"
      }
    }
  }
  if [JOB_NAME] != "" {
    mutate {
      replace => {
        "JOB_NAME_label.key" => "JOB_NAME"
        "JOB_NAME_label.value" => "%{JOB_NAME}"
      }
      on_error => "no_JOB_NAME"
    }
    if ![no_JOB_NAME] {
      mutate {
        merge => {
          "target.resource.attribute.labels" => "JOB_NAME_label"
        }
        on_error => "no_JOB_NAME"
      }
    }
  }
  if [kubernetes][container_hash] != "" {
    grok {
      match => {
        "kubernetes.container_hash" => [
          "%{DATA:filepath}\\:%{GREEDYDATA:file_sha}"
        ]
      }
      overwrite => ["filepath", "file_sha"]
      on_error => "no_container_hash"
    }
  }
  if [file_sha] != "" {
    mutate {
      replace => {
        "target.file.sha256" => "%{file_sha}"
      }
      on_error => "no_file_sha"
    }
  }
  if [filepath] != "" {
    mutate {
      replace => {
        "target.file.full_path" => "%{filepath}"
      }
      on_error => "no_filepath"
    }
  }
  if [kubernetes][container_image] != "" {
    mutate {
      replace => {
        "kubernetes_container_image_label.key" => "kubernetes_container_image"
        "kubernetes_container_image_label.value" => "%{kubernetes.container_image}"
      }
      on_error => "kubernetes_container_image_value_invalid"
    }
    if ![kubernetes_container_image_value_invalid] {
      mutate {
        merge => {
          "principal.resource.attribute.labels" => "kubernetes_container_image_label"
        }
        on_error => "kubernetes_container_image_label_merge_failed"
      }
    }
  }
  if [kubernetes][container_name] != "" {
    mutate {
      replace => {
        "kubernetes_container_name_label.key" => "kubernetes_container_name"
        "kubernetes_container_name_label.value" => "%{kubernetes.container_name}"
      }
      on_error => "kubernetes_container_name_value_invalid"
    }
    if ![kubernetes_container_name_value_invalid] {
      mutate {
        merge => {
          "principal.resource.attribute.labels" => "kubernetes_container_name_label"
        }
        on_error => "kubernetes_container_name_label_merge_failed"
      }
    }
  }
  if [kubernetes][docker_id] != "" {
    mutate {
      replace => {
        "docker_idlabel.key" => "docker_id"
        "docker_idlabel.value" => "%{kubernetes.docker_id}"
      }
      on_error => "no_docker_id"
    }
    if ![no_docker_id] {
      mutate {
        merge => {
          "target.resource.attribute.labels" => "docker_idlabel"
        }
        on_error => "no_docker_id_error"
      }
    }
  }
  if [kubernetes][host] != "" {
    mutate {
      replace => {
        "principal.hostname" => "%{kubernetes.host}"
        "principal.asset.hostname" => "%{kubernetes.host}"
        "has_principal" => "true"
      }
      on_error => "no_host"
    }
  }
  if [kubernetes][namespace_name] != "" {
    mutate {
      replace => {
        "kubernetes_namespace_name_label.key" => "kubernetes_namespace_name"
        "kubernetes_namespace_name_label.value" => "%{kubernetes.namespace_name}"
      }
      on_error => "kubernetes_namespace_name_value_invalid"
    }
    if ![kubernetes_namespace_name_value_invalid] {
      mutate {
        merge => {
          "principal.resource.attribute.labels" => "kubernetes_namespace_name_label"
        }
        on_error => "kubernetes_namespace_name_label_merge_failed"
      }
    }
  }
  if [kubernetes][pod_id] != "" {
    mutate {
      replace => {
        "pod_id_label.key" => "pod_id"
        "pod_id_label.value" => "%{kubernetes.pod_id}"
      }
      on_error => "pod_id_not_found"
    }
    if not [pod_id_not_found] {
      mutate {
        merge => {
          "target.resource.attribute.labels" => "pod_id_label"
        }
        on_error => "pod_id_label_not_found"
      }
    }
  }
  if [kubernetes][pod_name] != "" {
    mutate {
      replace => {
        "kubernetes_pod_name_label.key" => "kubernetes_pod_name"
        "kubernetes_pod_name_label.value" => "%{kubernetes.pod_name}"
      }
      on_error => "kubernetes_pod_name_value_invalid"
    }
    if ![kubernetes_pod_name_value_invalid] {
      mutate {
        merge => {
          "principal.resource.attribute.labels" => "kubernetes_pod_name_label"
          }
        on_error => "kubernetes_pod_name_label_merge_failed"
      }
    }
  }

  if [has_principal] == "true" and [has_target] == "true" and [user_login] == "true" {
    mutate {
      replace => {
        "metadata.event_type" => "USER_LOGIN"
        "extensions.auth.type" => "AUTHTYPE_UNSPECIFIED"
      }
    }
  }
  else if [has_principal] == "true" and [has_target] == "true" and [user_logout] == "true" {
    mutate {
      replace => {
        "metadata.event_type" => "USER_LOGOUT"
        "extensions.auth.type" => "AUTHTYPE_UNSPECIFIED"
      }
    }
  }
  else if [has_principal] == "true" and [has_target] == "true" {
    mutate {
      replace => {
        "metadata.event_type" => "NETWORK_CONNECTION"
      }
    }
  }
  else if [has_principal_user] == "true" {
    mutate {
      replace => {
        "metadata.event_type" => "USER_UNCATEGORIZED"
      }
    }
  }
  else if [has_principal] == "true" {
    mutate {
      replace => {
        "metadata.event_type" => "STATUS_UPDATE"
      }
    }
  }
  else {
    mutate {
      replace => {
        "metadata.event_type" => "GENERIC_EVENT"
      }
    }
  }
  if [principal] != "" {
    mutate {
      rename => {
        "principal" => "event.idm.read_only_udm.principal"
      }
    }
  }

  if [target] != "" {
    mutate {
      rename => {
        "target" => "event.idm.read_only_udm.target"
      }
    }
  }

  if [metadata] != "" {
    mutate {
      rename => {
        "metadata" => "event.idm.read_only_udm.metadata"
      }
    }
  }

  if [network] != "" {
    mutate {
      rename => {
        "network" => "event.idm.read_only_udm.network"
      }
    }
  }

  if [extensions] != "" {
    mutate {
      rename => {
        "extensions" => "event.idm.read_only_udm.extensions"
      }
    }
  }

  if [security_result] != "" {
    mutate {
      merge => {
        "event.idm.read_only_udm.security_result" => "security_result"
      }
      on_error => "no_security_result"
    }
  }

  mutate {
    merge => {
      "@output" => "event"
    }
  }
}

