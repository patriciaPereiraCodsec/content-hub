# Product: AWS_KMS
# Category: AWS Specific
# Supported Format: JSON
# Reference : https://docs.aws.amazon.com/kms/latest/developerguide/security-logging-monitoring.html
# Last Updated: 2022-05-27
# Copyright 2022 Chronicle LLC


filter {

  mutate {
    replace => {
      "message" => "{\"message\": [%{message}]}"
    }
    gsub => ["message", "}{","},{"]
  }

  json {
    source => "message"
    array_function => "split_columns"
  }

  for data in message {

    mutate {
      replace => {
        "additional_field" => ""
        "event" => ""
        "data.version" => ""
        "principalId" => ""
        "sec_result" => ""
        "labels" => ""
        "att_mfa" => ""
        "user_name" => ""
      }
    }

    date {
      match => ["data.time", "ISO8601"]
      on_error => "date_not_present"
    }

    mutate {
      replace => {
        "event.idm.read_only_udm.metadata.vendor_name" => "AMAZON"
        "event.idm.read_only_udm.metadata.product_name" => "AWS Key Management Service"
        "event.idm.read_only_udm.metadata.product_event_type" => "%{data.detail.eventType}"
        "event.idm.read_only_udm.metadata.product_log_id" => "%{data.id}"
        "event.idm.read_only_udm.principal.asset.attribute.cloud.environment" => "AMAZON_WEB_SERVICES"
        "event.idm.read_only_udm.metadata.event_type" => "GENERIC_EVENT"
      }
    }

    if [data][version] != "" {
      mutate {
        replace => {
          "event.idm.read_only_udm.metadata.product_version" => "%{data.version}"
        }
      }
    }

    for resource in data.detail.resources {
      mutate {
        replace => {
          "event.idm.read_only_udm.target.resource.id" => "%{resource.ARN}"
          "event.idm.read_only_udm.target.resource.resource_subtype" => "%{resource.type}"
        }
      }
    }

    mutate {
      replace => {
        "principalId" => "%{data.detail.userIdentity.sessionContext.sessionIssuer.principalId}"
      }
      on_error => "no_principalId"
    }

    if ![no_principalId] {
      mutate {
        replace => {
          "event.idm.read_only_udm.principal.user.userid" => "%{principalId}"
        }
      }
    }

    mutate {
      replace => {
        "userName" => "%{data.detail.userIdentity.sessionContext.sessionIssuer.userName}"
      }
      on_error => "no_userName"
    }

    if ![no_userName] {
      mutate {
        replace => {
          "event.idm.read_only_udm.principal.user.user_display_name" => "%{userName}"
        }
      }
    }

    if [data][detail][eventName] in ["Decrypt", "Encrypt"] and ![no_principalId]  {
      mutate {
        replace => {
          "event.idm.read_only_udm.metadata.event_type" => "USER_RESOURCE_ACCESS"
          "event.idm.read_only_udm.metadata.product_event_type" => "%{data.detail.eventName}"
        }
      }
    }
    else if [data][detail][eventName] == "GenerateDataKey" and ![no_principalId] {
      mutate {
        replace => {
          "event.idm.read_only_udm.metadata.event_type" => "USER_RESOURCE_CREATION"
          "event.idm.read_only_udm.metadata.product_event_type" => "%{data.detail.eventName}"
        }
      }
    }

    mutate {
      replace => {
        "role.name" => "%{data.detail.userIdentity.type}"
      }
      on_error => "no_role_present"
    }

    if ![no_role_present] {
      mutate {
        merge => {
          "event.idm.read_only_udm.principal.user.attribute.roles" => "role"
        }
      }
    }

    mutate {
      replace => {
        "labels.value" => "%{data.detail.requestParameters.encryptionAlgorithm}"
      }
      on_error => "no_encryptionAlgorithm"
    }

    if ![no_encryptionAlgorithm] {
      mutate {
        replace => {
         "labels.key" => "encryptionAlgorithm"
        }
      }
      mutate {
        merge => {
          "sec_result.detection_fields" => "labels"
        }
      }
    }

    mutate {
      replace => {
        "att_mfa.value" => "%{data.detail.userIdentity.sessionContext.attributes.mfaAuthenticated}"
      }
      on_error => "no_value_mfa"
    }

    if ![no_value_mfa] {
      mutate {
        replace => {
          "att_mfa.key" => "mfaAuthenticated"
        }
      }
      mutate {
        merge => {
          "event.idm.read_only_udm.principal.user.attribute.labels" => "att_mfa"
        }
      }
    }

    if [data][detail][eventCategory] != "" {
      mutate {
        merge => {
          "sec_result.category_details" => "data.detail.eventCategory"
        }
      }
    }

    if [data][detail][awsRegion] != "" {
      mutate {
        replace => {
          "event.idm.read_only_udm.principal.location.country_or_region" => "%{data.detail.awsRegion}"
        }
      }
    }

    mutate {
      replace => {
        "additional_field.key" => "requestID"
        "additional_field.value.string_value" => "%{data.detail.requestID}"
      }
      on_error => "no_requestId"
    }

    if ![no_requestId] {
      mutate {
        merge => {
          "event.idm.read_only_udm.additional.fields" => "additional_field"
        }
      }
    }

    if [sec_result] != "" {
      mutate {
        merge => {
          "event.idm.read_only_udm.security_result" => "sec_result"
        }
      }
    }

    mutate {
      merge => {
        "@output" => "event"
      }
    }
  }
}
