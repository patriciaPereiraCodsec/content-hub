# Product: PALANTIR
# Category: Foundry SaaS
# Supported Format: JSON
# Reference: NA
# Last Updated: 2024-12-12
# Copyright 2024 Chronicle LLC

filter {
  mutate {
    replace => {
      "event" => ""
      "principal" => ""
      "target" => ""
      "security_result" => ""
      "network" => ""
      "metadata" => ""
      "has_principal" => "false"
      "has_target" => "false"
      "time" => ""
      "filename" => ""
      "uid" => ""
      "sid" => ""
      "ip" => ""
      "trace_id" => ""
      "request_params" => ""
      "_sourceOrigin" => ""
      "request.scrollId" => ""
      "scroll" => ""
      "_auditLogEntryId" => ""
      "_userAgent" => ""
      "request.scroll" => ""
      "_auditEventId" => ""
      "name" => ""
      "has_target_user" => "false"
      "_category.type" => ""
      "_category.name" => ""
    }
  }
  json {
    source => "message"
    array_function => "split_columns"
    on_error => "no_json1"
  }
  json {
    source => "request_params"
    array_function => "split_columns"
    on_error => "no_json2"
  }
  mutate {
    replace => {
      "metadata.vendor_name" => "PALANTIR"
      "metadata.product_name" => "PALANTIR"
    }
  }
  if [filename] != "" {
    mutate {
      replace => {
        "principal.file.full_path" => "%{filename}"
      }
      on_error => "no_filename"
    }
  }
  if [time] != "" {
    date {
      match => ["time", "ISO8601", "yyyy-MM-ddTHH:mm:ss.SSSZ"]
      on_error => "no_time"
    }
  }
  if [uid] != "" {
    mutate {
      replace => {
        "target.user.userid" => "%{uid}"
      }
      on_error => "no_uid"
    }
    mutate {
      replace => {
        "has_target_user" => "true"
      }
      on_error => "no_has_target"
    }
  }
  if [sid] != "" {
    mutate {
      replace => {
        "sid_label.key" => "sid"
        "sid_label.value.string_value" => "%{sid}"
      }
      on_error => "no_sid"
    }
    mutate {
      merge => {
        "event.idm.read_only_udm.additional.fields" => "sid_label"
      }
      on_error => "no_sid_label"
    }
  }
  if [name] != "" {
    mutate {
      replace => {
        "target.resource.name" => "%{name}"
      }
      on_error => "no_name"
    }
  }
  if [ip] != "" {
    mutate {
      merge => {
        "principal.ip" => "ip"
        "principal.asset.ip" => "ip"
      }
      on_error => "no_ip"
    }
    mutate {
      replace => {
        "has_principal" => "true"
      }
      on_error => "no_has_principal"
    }
  }
  if [trace_id] != "" {
    mutate {
      replace => {
        "trace_id_label.key" => "trace_id"
        "trace_id_label.value.string_value" => "%{trace_id}"
      }
      on_error => "no_trace_id"
    }
    mutate {
      merge => {
        "event.idm.read_only_udm.additional.fields" => "trace_id_label"
      }
      on_error => "no_trace_id_label"
    }
  }
  if [result] == "success" {
    mutate {
      replace => {
        "action" => "ALLOW"
      }
      on_error => "no_action"
    }
    mutate {
      merge => {
        "security_result.action" => "action"
      }
      on_error => "no_security_result"
    }
  }
  if [_sourceOrigin] != "" {
    mutate {
      merge => {
        "principal.ip" => "_sourceOrigin"
        "principal.asset.ip" => "_sourceOrigin"
      }
      on_error => "no_source_origin"
    }
    mutate {
      replace => {
        "has_principal" => "true"
      }
      on_error => "no_has_principal"
    }
  }
  if [request][scrollId] != "" {
    mutate {
      replace => {
        "scrollId_label.key" => "scrollId"
        "scrollId_label.value.string_value" => "%{request.scrollId}"
      }
    }
    mutate {
      merge => {
        "event.idm.read_only_udm.additional.fields" => "scrollId_label"
      }
      on_error => "no_scrollId_label"
    }
  }
  if [request][scroll] != "" {
    mutate {
      replace => {
        "scroll_label.key" => "scroll"
        "scroll_label.value" => "%{request.scroll}"
      }
      on_error => "no_scroll"
    }
    mutate {
      merge => {
        "security_result.detection_fields" => "scroll_label"
      }
      on_error => "no_scroll_label"
    }
  }
  if [_auditLogEntryId] != "" {
    mutate {
      replace => {
        "_auditLogEntryId_label.key" => "_auditLogEntryId"
        "_auditLogEntryId_label.value" => "%{_auditLogEntryId}"
      }
    }
    mutate {
      merge => {
        "target.resource.attribute.labels" => "_auditLogEntryId_label"
      }
      on_error => "no__auditLogEntryId_label"
    }
  }
  if [_userAgent] != "" {
    mutate {
      replace => {
        "network.http.user_agent" => "%{_userAgent}"
      }
      on_error => "no__userAgent"
    }
  }
  if [_auditEventId] != "" {
    mutate {
      replace => {
        "metadata.product_log_id" => "%{_auditEventId}"
      }
      on_error => "no__auditEventId_label"
    }
  }
  if [_category][type] != "" {
    mutate {
      replace => {
        "metadata.product_event_type" => "%{_category.type}"
      }
      on_error => "no__category_type"
    }
  }
  if [type] != "" {
    mutate {
      replace => {
        "type_label.key" => "type"
        "type_label.value.string_value" => "%{type}"
      }
      on_error => "no_type"
    }
    mutate {
      merge => {
        "event.idm.read_only_udm.additional.fields" => "type_label"
      }
      on_error => "no_type_label"
    }
  }


  if [has_principal] == "true" and [has_target] == "true" {
    mutate {
      replace => {
        "metadata.event_type" => "NETWORK_CONNECTION"
      }
    }
  }
  else if [has_target_user] == "true" {
    mutate {
      replace => {
      "metadata.event_type" => "USER_UNCATEGORIZED"
      }
    }
  }
  else if [has_principal] == "true" {
    mutate {
      replace => {
        "metadata.event_type" => "STATUS_UPDATE"
      }
    }
  }
  else {
    mutate {
      replace => {
        "metadata.event_type" => "GENERIC_EVENT"
      }
    }
  }

  if [principal] != "" {
    mutate {
      rename => {
        "principal" => "event.idm.read_only_udm.principal"
      }
    }
  }

  if [target] != "" {
    mutate {
      rename => {
        "target" => "event.idm.read_only_udm.target"
      }
    }
  }

  if [metadata] != "" {
    mutate {
      rename => {
        "metadata" => "event.idm.read_only_udm.metadata"
      }
    }
  }

  if [network] != "" {
    mutate {
      rename => {
        "network" => "event.idm.read_only_udm.network"
      }
    }
  }

  if [security_result] != "" {
    mutate {
      merge => {
        "event.idm.read_only_udm.security_result" => "security_result"
      }
      on_error => "no_security_result"
    }
  }

  mutate {
    merge => {
      "@output" => "event"
    }
  }
}
