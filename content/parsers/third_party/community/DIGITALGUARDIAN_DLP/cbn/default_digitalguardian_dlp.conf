# Product: Digital Guardian
# Category: DLP
# Supported Format: JSON,SYSLOG+XML
# Reference: N/A
# Last Updated: 2025-03-27
# Copyright 2025 Google SecOps
filter {
  mutate {
    replace => {
      "metadata.event_type" => "GENERIC_EVENT"
      "event_time" => ""
      "Was_Blocked" =>""
      "network_direction" => ""
      "target_hardware"=> ""
      "prin_hardware" => ""
      "remote_port"=>""
      "ip_address"=>""
      "source_ip"=>""
      "local_Port"=>""
      "Protocol"=>""
      "email_address"=>""
      "email_subject"=>""
      "email_sender"=>""
      "dg_dst_dev.dev_sernum"=>""
      "dg_dst_dev.dev_prdname"=>""
      "dg_src_dev.dev_prdname"=>""
      "dg_src_dev.dev_sernum" =>""
      "dg_recipients.uad_mr"=>""
      "target_full_path"=>""
      "target_process_fullpath"=>""
      "src_file_extension"=>""
      "parent_application"=>""
      "User"=>""
      "Process_PID"=>""
      "dest_file_extension"=>""
      "process_file_exten"=>""
      "Application"=>""
      "mac_address" => ""
      "principal.hostname" => ""
      "principal_process_command_line" => ""
      "target_process_command_line" => ""
      "security_result" => ""
      "xml_data" => ""
      "eventtype" => ""
      "date_time" => ""
      "event_id" => ""
      "severity" => ""
      "user" => ""
      "machine" => ""
      "ipv4" => ""
      "has_principal" => "false"
      "ipv6_" => ""
      "ipv6" => ""
      "source" => ""
      "machine_name" => ""
      "os" => ""
      "McAfee_product_code" => ""
      "Product_Name" => ""
      "Product_Edition" => ""
      "Product_Version" => ""
      "Item_Type" => ""
      "Host_Product" => ""
      "Host_Product_Version" => ""
      "Configuration" => ""
      "xmlns_m" => ""
      "id" => ""
      "Classification_value" => ""
      "Classification" => ""
      "recipient_type" => ""
      "recipient_name" => ""
      "recipient_address" => ""
      "attachment_display_name" => ""
      "attachment_name" => ""
      "command_line" => ""
    }
  }

  mutate {
    gsub => ["message","Process PID","Process_PID"]
  }

  json {
    source => "message"
    array_function => "split_columns"
    on_error => "not_valid_json"
  }
  grok {
    match => {
      "message" => "<%{INT}>%{INT} %{TIMESTAMP_ISO8601} %{DATA} %{DATA} - %{DATA} - %{GREEDYDATA:xml_data}"
    }
    on_error => "is_not_xml"
    overwrite => ["xml_data"]
  }
  mutate {
    gsub => ["xml_data","metadata","meta_data"]
  }
  mutate {
    gsub => ["xml_data",":m",""]
  }
  mutate {
    gsub => ["xml_data","m:",""]
  }
  xml {
    source => "xml_data"
    xpath => {
      "/Event/@EventType" => "eventtype"
      "/Event/@DateTime" => "date_time"
      "/Event/@EventId" => "event_id"
      "/Event/@Level" => "severity"
      "/Event/@User" => "user"
      "/Event/@Machine" => "machine"
      "/Event/@IPV4" => "ipv4"
      "/Event/@IPV6" => "ipv6"
      "/Event/@Source" => "source"
      "/Event/@MachineName" => "machine_name"
      "/Event/@OS" => "os"
      "/Event/@McAfeeProductCode" => "McAfee_product_code"
      "/Event/@ProductName" => "Product_Name"
      "/Event/@ProductEdition" => "Product_Edition"
      "/Event/@ProductVersion" => "Product_Version"
      "/Event/@ItemType" => "Item_Type"
      "/Event/@HostProduct" => "Host_Product"
      "/Event/@HostProductVersion" => "Host_Product_Version"
      "/Event/@Configuration" => "Configuration"
      "/Event/Metadata/meta_data/@xmlns" => "xmlns_m"
      "/Event/Metadata/meta_data/@id" => "id"
      "/Event/Metadata/meta_data/Classification/@value" => "Classification_value"
      "/Event/Metadata/meta_data/Classification/alt"=> "Classification"
    }
    on_error => "_grok_not_xml"
  }
  for index, _ in xml(xml_data,/Event/Recipients/Recipient) {
    xml {
      source => "xml_data"
      xpath => {
        "/Event/Recipients/Recipient[%{index}]/@RecipientType" => "recipient_type"
        "/Event/Recipients/Recipient[%{index}]/@Name" => "recipient_name"
        "/Event/Recipients/Recipient[%{index}]/@Address" => "recipient_address"
      }
      on_error => "recipient_type_not_xml"
    }
    mutate {
      convert => {
        "index" => "string"
      }
      on_error => "index_not_string"
    }
    if [recipient_type]== "TO" or [recipient_type]== "To" and [recipient_address]!= "" {
      mutate {
        merge => {
          "event.idm.read_only_udm.network.email.to" => "recipient_address"
        }
        on_error => "no_to_address"
      }
    }
    mutate {
      replace => {
        "recepient_name_label_to" => ""
      }
      on_error => "no_recepient_name_label"
    }
    if [recipient_type]== "TO" or [recipient_type]== "To" and [recipient_name]!= "" {
      mutate {
        replace => {
          "recepient_name_label_to.value" => "%{recipient_name}"
        }
        on_error => "no_to_name"
      }
      if ![no_to_name] {
        mutate {
          replace => {
            "recepient_name_label_to.key" => "RecipientName_TO"
          }
          on_error => "no_to_name_key"
        }
        mutate {
          merge => {
            "principal.user.attribute.labels" => "recepient_name_label_to"
          }
          on_error => "to_name_merge_failure"
        }
      }
    }
    mutate {
      replace => {
        "recepient_name_label_resource" => ""
      }
      on_error => "no_recepient_name_label"
    }
    if [recipient_type]== "Resource" and [recipient_address]!= "" {
      mutate {
        replace => {
          "event.idm.read_only_udm.network.email.from" => "%{recipient_address}"
        }
        on_error => "no_resource_address"
      }
    }
    if [recipient_type]== "Resource" and [recipient_name]!= "" {
      mutate {
        replace => {
          "recepient_name_label_resource.value" => "%{recipient_name}"
        }
        on_error => "no_resource_name"
      }
      if ![no_resource_name] {
        mutate {
          replace => {
            "recepient_name_label_resource.key" => "RecipientName_Resource"
          }
          on_error => "no_resource_name_key"
        }
        mutate {
          merge => {
            "target.user.attribute.labels" => "recepient_name_label_resource"
          }
          on_error => "resource_name_merge_failure"
        }
      }
    }
    mutate {
      replace => {
        "recepient_name_label_cc" => ""
      }
      on_error => "no_recepient_name_label"
    }
    if [recipient_type]== "CC" and [recipient_address]!= "" {
      mutate {
        merge => {
          "event.idm.read_only_udm.network.email.cc" => "recipient_address"
        }
        on_error => "no_resource_address"
      }
    }
    if [recipient_type]== "CC" and [recipient_name]!= "" {
      mutate {
        replace => {
          "recepient_name_label_cc.value.string_value" => "%{recipient_name}"
        }
        on_error => "no_resource_name"
      }
      if ![no_resource_name] {
        mutate {
          replace => {
            "recepient_name_label_cc.key" => "RecipientName_CC_%{index}"
          }
          on_error => "no_resource_name_key"
        }
        mutate {
          merge => {
            "event.idm.read_only_udm.additional.fields" => "recepient_name_label_cc"
          }
          on_error => "resource_name_merge_failure"
        }
      }
    }
  }
  for index, _ in xml(xml_data,/Event/Attachments/Attachment) {
    xml {
      source => "xml_data"
      xpath => {
        "/Event/Attachments/Attachment[%{index}]/@DisplayName" => "attachment_display_name"
        "/Event/Attachments/Attachment[%{index}]/@Name" => "attachment_name"
      }
      on_error => "attachment_display_name_not_xml"
    }
    mutate {
      convert => {
        "index" => "string"
      }
      on_error => "index_not_string"
    }
    mutate {
      replace => {
        "display_name_label" => ""
      }
      on_error => "no_display_name_label"
    }
    if [attachment_display_name]!= "" {
      mutate {
        replace => {
          "display_name_label.value.string_value" => "%{attachment_display_name}"
        }
        on_error => "no_display_name"
      }
      if ![no_display_name] {
        mutate {
          replace => {
            "display_name_label.key" => "Attachment_Display_Name%{index}"
          }
          on_error => "no_display_name_key"
        }
        mutate {
          merge => {
            "event.idm.read_only_udm.additional.fields" => "display_name_label"
          }
          on_error => "display_name_merge_failure"
        }
      }
    }
    mutate {
      replace => {
        "name_label" => ""
      }
      on_error => "no_name_label"
    }
    if [attachment_name]!= "" {
      mutate {
        replace => {
          "name_label.value.string_value" => "%{attachment_name}"
        }
        on_error => "no_attachment_name"
      }
      if ![no_attachment_name] {
        mutate {
          replace => {
            "name_label.key" => "Attachment_Name%{index}"
          }
          on_error => "no_attachment_name_key"
        }
        mutate {
          merge => {
            "event.idm.read_only_udm.additional.fields" => "name_label"
          }
          on_error => "attachment_name_merge"
        }
      }
    }
  }
  if [Classification] != "" {
    grok {
      match => {
        "Classification" => "%{DATA}=%{GREEDYDATA:value}"
      }
      on_error => "no_Classification_value"
      overwrite => ["value"]
    }
    mutate {
      replace => {
        "Classification_label.value.string_value" => "%{value}"
      }
      on_error => "no_Classification"
    }
    if ![no_Classification] {
      mutate {
        replace => {
          "Classification_label.key" => "Classification"
        }
        on_error => "no_Classification_key"
      }
      mutate {
        merge => {
          "event.idm.read_only_udm.additional.fields" => "Classification_label"
        }
        on_error => "Classification_merge_failure"
      }
    }
  }
  if [Classification_value] != "" {
    mutate {
      replace => {
        "Classification_value_label.value.string_value" => "%{Classification_value}"
      }
      on_error => "no_Classification_value"
    }
    if ![no_Classification_value] {
      mutate {
        replace => {
          "Classification_value_label.key" => "Classification Value"
        }
        on_error => "no_Classification_value_key"
      }
      mutate {
        merge => {
          "event.idm.read_only_udm.additional.fields" => "Classification_value_label"
        }
        on_error => "Classification_value_merge_failure"
      }
    }
  }
  if [xmlns_m] != "" {
    mutate {
      replace => {
        "principal.url" => "%{xmlns_m}"
      }
      on_error => "no_xmlns_m"
    }
  }
  if [id] != "" {
    mutate {
      replace => {
        "id_label.value.string_value" => "%{id}"
      }
      on_error => "no_id"
    }
    if ![no_id] {
      mutate {
        replace => {
          "id_label.key" => "ID"
        }
        on_error => "no_id_key"
      }
      mutate {
        merge => {
          "event.idm.read_only_udm.additional.fields" => "id_label"
        }
        on_error => "id_merge_failure"
      }
    }
  }
  if [Configuration] != "" {
    mutate {
      replace => {
        "Configuration_label.value.string_value" => "%{Configuration}"
      }
      on_error => "no_Configuration"
    }
    if ![no_Configuration] {
      mutate {
        replace => {
          "Configuration_label.key" => "Configuration"
        }
        on_error => "no_Configuration_key"
      }
      mutate {
        merge => {
          "event.idm.read_only_udm.additional.fields" => "Configuration_label"
        }
        on_error => "Configuration_merge_failure"
      }
    }
  }
  if [Host_Product_Version] != "" {
    mutate {
      replace => {
        "Host_Product_Version_label.value.string_value" => "%{Host_Product_Version}"
      }
      on_error => "no_Host_Product_Version"
    }
    if ![no_Host_Product_Version] {
      mutate {
        replace => {
          "Host_Product_Version_label.key" => "Host Product Version"
        }
        on_error => "no_Host_Product_Version_key"
      }
      mutate {
        merge => {
          "event.idm.read_only_udm.additional.fields" => "Host_Product_Version_label"
        }
        on_error => "Host_Product_Version_merge_failure"
      }
    }
  }
  if [Host_Product] != "" {
    mutate {
      replace => {
        "Host_Product_label.value.string_value" => "%{Host_Product}"
      }
      on_error => "no_Host_Product"
    }
    if ![no_Host_Product] {
      mutate {
        replace => {
          "Host_Product_label.key" => "Host Product"
        }
        on_error => "no_Host_Product_key"
      }
      mutate {
        merge => {
          "event.idm.read_only_udm.additional.fields" => "Host_Product_label"
        }
        on_error => "Host_Product_merge_failure"
      }
    }
  }
  if [Item_Type] != "" {
    mutate {
      replace => {
        "Item_Type_label.value.string_value" => "%{Item_Type}"
      }
      on_error => "no_Item_Type"
    }
    if ![no_Item_Type] {
      mutate {
        replace => {
          "Item_Type_label.key" => "Item Type"
        }
        on_error => "no_Item_Type_key"
      }
      mutate {
        merge => {
          "event.idm.read_only_udm.additional.fields" => "Item_Type_label"
        }
        on_error => "Item_Type_merge_failure"
      }
    }
  }
  if [Product_Version] != "" {
    mutate {
      replace => {
        "metadata.product_version" => "%{Product_Version}"
      }
      on_error => "no_Product_Version"
    }
  }
  if [Product_Edition] != "" {
    mutate {
      replace => {
        "Product_Edition_label.value.string_value" => "%{Product_Edition}"
      }
      on_error => "no_Product_Edition"
    }
    if ![no_Product_Edition] {
      mutate {
        replace => {
          "Product_Edition_label.key" => "Product Edition"
        }
        on_error => "no_Product_Edition_key"
      }
      mutate {
        merge => {
          "event.idm.read_only_udm.additional.fields" => "Product_Edition_label"
        }
        on_error => "Product_Edition_merge_failure"
      }
    }
  }
  if [Product_Name] != "" {
    mutate {
      replace => {
        "metadata.product_name" => "%{Product_Name}"
      }
      on_error => "no_Product_Name"
    }
  }
  if [McAfee_product_code] != "" {
    mutate {
      replace => {
        "McAfee_product_code_label.value" => "%{McAfee_product_code}"
      }
      on_error => "no_McAfee_product_code"
    }
    if ![no_McAfee_product_code] {
      mutate {
        replace => {
          "McAfee_product_code_label.key" => "McAfee Product Code"
        }
        on_error => "no_McAfee_product_code_key"
      }
      mutate {
        merge => {
          "security_result.detection_fields" => "McAfee_product_code_label"
        }
        on_error => "McAfee_product_code_merge_failure"
      }
    }
  }
  if [os] != "" {
    mutate {
      replace => {
        "os_label.value.string_value" => "%{os}"
      }
      on_error => "no_os"
    }
    if ![no_os] {
      mutate {
        replace => {
          "os_label.key" => "OS"
        }
        on_error => "no_os_key"
      }
      mutate {
        merge => {
          "event.idm.read_only_udm.additional.fields" => "os_label"
        }
        on_error => "os_merge_failure"
      }
    }
  }
  if [os] =~ "Windows" {
    mutate {
      replace => {
        "principal.platform" => "WINDOWS"
      }
      on_error => "no_os"
    }
  }
  if [machine_name] != "" {
    mutate {
      replace => {
        "machine_name_label.value.string_value" => "%{machine_name}"
      }
      on_error => "no_machine_name"
    }
    if ![no_machine_name] {
      mutate {
        replace => {
          "machine_name_label.key" => "Machine Name"
        }
        on_error => "no_machine_name_key"
      }
      mutate {
        merge => {
          "event.idm.read_only_udm.additional.fields" => "machine_name_label"
        }
        on_error => "machine_name_merge_failure"
      }
    }
  }
  if [source] != "" {
    mutate {
      replace => {
        "source_label.value" => "%{source}"
      }
      on_error => "no_source"
    }
    if ![no_source] {
      mutate {
        replace => {
          "source_label.key" => "Source"
        }
        on_error => "no_source_key"
      }
      mutate {
        merge => {
          "security_result.detection_fields" => "source_label"
        }
        on_error => "source_merge_failure"
      }
    }

  }
  if [ipv6] != "" {
    grok {
      match => {
        "ipv6" => "%{IPV6:ipv6_}\%%{INT}"
      }
      on_error => "no_ipv6"
      overwrite => ["ipv6_"]
    }
    if ![no_ipv6]{
      mutate {
        merge => {
          "principal.ip" => "ipv6_"
          "principal.asset.ip" => "ipv6_"
        }
        on_error => "no_ipv6_"
      }
      if ![no_ipv6_] {
        mutate {
          replace => {
            "has_principal" => "true"
          }
          on_error => "no_has_principal"
        }
      }
    }
  }
  if [ipv4] != "" {
    mutate {
      merge => {
        "principal.ip" => "ipv4"
        "principal.asset.ip" => "ipv4"
      }
      on_error => "no_ipv4"
    }
    if ![no_ipv4] {
      mutate {
        replace => {
          "has_principal" => "true"
        }
        on_error => "no_has_principal"
      }
    }
  }
  if [machine] != "" {
    mutate {
      replace => {
        "machine_label.value" => "%{machine}"
      }
      on_error => "no_machine_value"
    }
    mutate {
      replace => {
        "machine_label.key" => "Machine"
      }
      on_error => "no_machine_key"
    }
    mutate {
      merge => {
        "security_result.detection_fields" => "machine_label"
      }
      on_error => "machine_merge_failure"
    }
  }
  if [user] != "" {
    mutate {
      replace => {
        "principal.user.user_display_name" => "%{user}"
      }
      on_error => "no_user"
    }
  }
  if [eventtype] != "" {
    mutate {
      replace => {
        "eventtype_label.value.string_value" => "%{eventtype}"
      }
      on_error => "no_eventtype"
    }
    if ![no_eventtype] {
      mutate {
        replace => {
          "eventtype_label.key" => "EventType"
        }
        on_error => "no_eventtype_key"
      }
      mutate {
        merge => {
          "event.idm.read_only_udm.additional.fields" => "eventtype_label"
        }
        on_error => "eventtype_merge_failure"
      }
    }
  }
  if [date_time] != "" {
    date {
      match => ["date_time", "yyyy-MM-ddTHH:mm:ss.SSSZ","ISO8601"]
      on_error => "not_datetime"
    }
  }
  if [event_id] != "" {
    mutate {
      replace => {
        "metadata.product_log_id" => "%{event_id}"
      }
      on_error => "no_event_id"
    }
  }
  if [severity] == "Informational" {
    mutate {
      replace => {
        "security_result.severity" => "INFORMATIONAL"
      }
      on_error => "no_severity"
    }
  }
  if [not_valid_json] and [is_not_xml] {
    drop {
      tag => "TAG_MALFORMED_MESSAGE"
    }
  }

  mutate {
    replace => {
      "event_time" => "%{Event Time}"
    }
    on_error => "error_eventtime"
  }

  mutate {
    replace => {
      "metadata.product_version" => "%{Product Version}"
    }
    on_error => "agent_version_error"
  }

  if [Application] != ""{
    mutate{
      replace => {
        "principal.process.command_line"=>"%{Application}"
      }
      on_error => "error_command_line"
    }
  }

  if [Process_PID] != "" {
    mutate{
      convert => {
        "Process_PID" => "string"
      }
    }

    mutate{
      replace => {
        "principal.process.pid"=>"%{Process_PID}"
      }
    }
  }

  if [User] != "" {
    mutate {
      replace => {
        "principal.user.userid" => "%{User}"
      }
    }
  }

  mutate {
    replace => {
      "principal.user.company_name" => "%{Company Name}"
    }
    on_error => "error_company_name"
  }

  mutate {
    replace => {
      "principal.hostname" => "%{Computer Name}"
    }
    on_error => "error_computer_name"
  }

  mutate {
    replace => {
      "src_file_extension" => "%{Source File Extension}"
    }
    on_error => "error_smime_type"
  }

  if ![error_smime_type] && [src_file_extension] !~ "no extension" {
    mutate {
      replace => {
        "src.file.mime_type" => "%{Source File Extension}"
      }
    }
  }

  mutate {
    replace => {
      "parent_application" => "%{Parent Application}"
    }
    on_error => "error_pcommand_line"
  }

  if [parent_application] != ""{
     mutate {
      replace => {
        "principal.process.parent_process.command_line" => "%{Parent Application}"
      }
      on_error => "error_parent_application"
    }
  }

  if [event_time] != "" {
    date {
      match => ["event_time", "yyyy-MM-dd HH:mm:ss A","TIMESTAMP_ISO8601"]
    }
  }

  mutate {
    replace => {
      "target.resource.type" => "%{Event Display Name}"
    }
    on_error => "error_display_name"
  }

  mutate {
    replace => {
      "principal.asset.asset_id" => "MachineId:%{Machine ID}"
    }
    on_error => "error_asset_id"
  }

  mutate {
    replace => {
      "principal.asset.category" => "%{Machine Type}"
    }
    on_error => "error_category"
  }

  mutate {
    replace => {
      "src.file.full_path" => "%{Source File Path}"
    }
    on_error => "error_src_fullpath"
  }

  mutate {
    replace => {
      "security_result.action_details" => "%{Operation Type}"
    }
    on_error => "error_operation_type"
  }
  mutate {
    replace => {
      "command_line" => "%{Command Line}"
    }
    on_error => "error_command_line"
  }
  if ![error_command_line] && [command_line] != "" {
    mutate{
      replace => {
        "target.process.command_line"=> "%{command_line}"
      }
      on_error => "error_tcommand_line"
    }
  }

  mutate {
    replace => {
      "target_full_path" => "%{Destination File Path}"
    }
    on_error => "error_tfull_path"
  }

  if [target_full_path] !="" {
    mutate {
      replace => {
        "target.file.full_path" => "%{target_full_path}"
      }
    }
  }

  mutate {
    replace => {
      "labels_drive_type.value" => "%{Destination Drive Type}"
    }
    on_error => "error_drive_type"
  }

  if ![error_drive_type] {
    mutate {
      replace => {
        "labels_drive_type.key" => "Destination Drive Type"
      }
    }
    mutate {
      merge => {
        "about.labels" => "labels_drive_type"
      }
    }
  }

  mutate {
    replace => {
      "dest_file_extension" => "%{Destination File Extension}"
    }
    on_error => "error_tmime_type"
  }

  if ![error_tmime_type] && [dest_file_extension] !~ "no extension" {
    mutate {
      replace => {
        "target.file.mime_type" => "%{dest_file_extension}"
      }
    }
  }

  mutate {
    replace => {
      "mac_address" => "%{MAC Address}"
    }
    on_error => "error_mac_address"
  }

  if [mac_address] != "" {
    mutate {
      merge => {
        "target.mac" => "mac_address"
      }
    }
  }

  mutate {
    lowercase => ["SHA1 Hash","SHA256 Hash","MD5 Hash","Parent MD5 Hash"]
  }

  mutate {
    replace => {
      "target.process.file.sha1" => "%{SHA1 Hash}"
    }
    on_error => "error_target_process_sha1"
  }

  mutate {
    replace => {
      "target.process.file.sha256" => "%{SHA256 Hash}"
    }
    on_error => "error_target_process_sha256"
  }

  mutate {
    replace => {
      "target.process.file.md5" => "%{MD5 Hash}"
    }
    on_error => "error_target_process_md5"
  }

  mutate {
    replace => {
      "target.administrative_domain" => "%{Process Domain}"
    }
    on_error => "error_process_domain"
  }

  mutate {
    replace => {
      "process_file_exten" => "%{Process File Extension}"
    }
    on_error => "error_process_mime_type"
  }

  if ![error_process_mime_type] && [process_file_exten] !~ "no extension" {
    mutate {
      replace => {
        "target.process.file.mime_type" => "%{process_file_exten}"
      }
    }
  }

  mutate {
    replace => {
      "target_process_fullpath" => "%{Process Path}"
    }
    on_error => "error_tprocess_full_path"
  }

  if [target_process_fullpath] != "" {
    mutate {
      replace => {
        "target.process.file.full_path" => "%{target_process_fullpath}"
      }
    }
  }

  mutate {
    replace => {
      "target.url" => "%{URL Path}"
    }
    on_error => "error_url_path"
  }

  mutate {
    replace => {
      "parent_md5" => "%{Parent MD5 Hash}"
    }
    on_error => "error_parent_md5"
  }

  if ![error_parent_md5] && [parent_md5] =~ "^[0-9a-f]+$" {
    mutate {
      replace => {
        "target.process.parent_process.file.md5" => "%{parent_md5}"
      }
    }
  }

  mutate {
    replace => {
      "metadata.product_log_id" => "%{Unique ID}"
    }
    on_error => "error_unique_id"
  }

  mutate {
    replace => {
      "labels_file_size_.value" => "%{File Size}"
    }
    on_error => "error_file_size"
  }

  if ![error_file_size] {
    mutate {
      replace => {
        "labels_file_size_.key" => "File Size"
      }
    }
    mutate {
      merge => {
        "about.labels" => "labels_file_size_"
      }
    }
  }

  mutate {
    replace => {
      "label_file_version_.value"=>"%{File Version}"
    }
    on_error => "error_file_version"
  }

  if ![error_file_version] {
    mutate {
      replace => {
        "label_file_version_.key"=>"File Version"
      }
    }
    mutate {
      merge => {
        "about.labels" => "label_file_version_"
      }
    }
  }

  mutate {
    replace => {
      "total_size_label.value"=>"%{Total Size}"
    }
    on_error => "error_total_size"
  }

  if ![error_total_size] {
    mutate {
      replace => {
        "total_size_label.key"=>"Total Size"
      }
    }
    mutate {
      merge => {
        "about.labels" => "total_size_label"
      }
    }
  }

  if [dg_src_dev][dev_sernum] != "" {
    mutate {
      replace => {
        "prin_hardware.serial_number" => "%{dg_src_dev.dev_sernum}"
      }
    }
  }

  if [dg_src_dev][dev_prdname] != "" {
    mutate {
      replace => {
        "prin_hardware.model" => "%{dg_src_dev.dev_prdname}"
      }
    }
  }

  if [dg_dst_dev][dev_prdname] != "" {
    mutate {
     replace => {
       "target_hardware.model" => "%{dg_dst_dev.dev_prdname}"
      }
    }
  }

  if [dg_dst_dev][dev_sernum] != "" {
    mutate {
      replace => {
        "target_hardware.serial_number" => "%{dg_dst_dev.dev_sernum}"
      }
    }
  }

  if [dg_recipients][uad_mr] =~ "(^.+@.+$)" {
    mutate {
      merge => {
        "network.email.to" => "dg_recipients.uad_mr"
      }
    }
  }

  mutate {
    replace => {
      "target.asset.product_object_id" => "%{Adapter Name}"
    }
    on_error => "error_adapter_name"
  }

  mutate {
    replace => {
      "network.tls.server.certificate.subject"=> "%{Signature Subject}"
    }
    on_error => "error_signature_subject"
  }

  mutate {
    replace => {
      "network.tls.server.certificate.issuer"=> "%{Signature Issuer}"
    }
    on_error => "error_signature_issuer"
  }

  mutate {
    replace => {
      "metadata.description" => "%{File Description}"
    }
    on_error => "error_meta_desc"
  }

  mutate {
    replace => {
      "target.asset.hostname" => "%{DNS Hostname}"
    }
    on_error => "error_asset_hostname"
  }

  mutate {
    replace => {
      "observer.platform_version" => "%{Agent Version}"
    }
    on_error => "error_agent_version"
  }

  mutate {
    replace => {
      "Was_Blocked" => "%{Was Detail Blocked}"
    }
    on_error => "error_Was_Blocked"
  }

  if ![error_Was_Blocked] && [Was_Blocked] == "Yes" {
    mutate {
      replace => {
        "action" => "BLOCK"
      }
      merge => {
        "security_result.action" => "action"
      }
    }
  }
  else if ![error_Was_Blocked] && [Was_Blocked] == "No" {
    mutate {
      replace => {
        "action" => "ALLOW"
      }
      merge => {
        "security_result.action" => "action"
      }
    }
  }

  mutate {
    replace => {
      "source_ip" => "%{Source IP Address}"
    }
    on_error => "error_src_ip_address"
  }

  mutate {
    replace => {
      "ip_address" => "%{IP Address}"
    }
    on_error => "error_ip_address"
  }

  if [source_ip] != "" {
    mutate {
      merge => {
        "principal.ip" => "source_ip"
      }
    }
  }
  else if [ip_address] != "" {
    mutate {
      merge => {
        "principal.ip" => "ip_address"
      }
    }
  }

  mutate {
    replace => {
      "local_Port" => "%{Local Port}"
    }
    on_error => "error_local_Port"
  }

  if [local_Port] != ""{
    mutate {
      replace => {
        "principal.port" => "%{local_Port}"
      }
    }

    mutate {
      convert => {
        "principal.port" => "integer"
      }
    }
  }

  if [Protocol] == "HTTP" or [Protocol] == "HTTPS" {
    mutate {
      replace => {
        "network.application_protocol" => "HTTPS"
      }
    }
  }

  mutate {
    replace => {
      "email_sender" => "%{Email Sender}"
    }
    on_error => "error_email_address"
  }

  if [email_sender] != "" {
    mutate {
      replace => {
        "network.email.from" => "%{email_sender}"
        "subject" => "%{Email Subject}"
      }
    }

    mutate {
      merge => {
        "network.email.subject" => "subject"
      }
    }
  }

  mutate {
    replace => {
      "network_direction" => "%{Network Direction}"
    }
    on_error => "error_Network_dir"
  }

  if ![error_Network_dir] && [network_direction] == "Inbound" {
    mutate {
      replace => {
        "network.direction" => "INBOUND"
      }
    }
  }else if ![error_Network_dir] && [network_direction] == "Outbound" {
    mutate {
      replace => {
        "network.direction" => "OUTBOUND"
      }
    }
  }

  mutate {
    replace => {
      "src.resource.id" => "GUID:%{Device GUID}"
    }
    on_error =>"error_device_guid"
  }

  mutate {
    replace => {
      "src.resource.name" => "%{Printer Name}"
    }
    on_error =>"error_printername"
  }

  mutate {
    replace => {
      "remote_port" => "%{Remote Port}"
    }
    on_error =>"error_remote_Port"
  }

  if [remote_port] != "" {
    mutate {
      replace => {
        "target.port" => "%{remote_port}"
      }
    }
    mutate {
      convert => {
        "target.port" => "integer"
      }
    }
  }

  mutate {
    replace => {
      "metadata.vendor_name" => "DigitalGuardian"
    }
    on_error => "error_vendor_name"
  }
  mutate {
    replace => {
      "metadata.product_name" => "%{Product Name}"
    }
    on_error => "error_product_name"
  }
  mutate {
    replace => {
      "principal_process_command_line" => "%{principal.process.command_line}"
    }
    on_error => "error_principal_process_command_line"
  }
  mutate {
    replace => {
      "target_process_command_line" => "%{target.process.command_line}"
    }
    on_error => "error_target_process_command_line"
  }

  if [principal][hostname] != "" && ([Protocol] == "HTTP" or [Protocol] == "HTTPS") && [mac_address] != "" {
    mutate {
      replace => {
        "metadata.event_type" => "NETWORK_HTTP"
      }
    }
  }else if [target_full_path] != "" && [src][file][full_path] != "" && [security_result][action_details] =~ "File Copy" {
    mutate {
      replace => {
        "metadata.event_type" => "FILE_COPY"
      }
    }
  }else if [target_full_path] != "" && [src][file][full_path] != "" && [security_result][action_details] =~ "File Move" {
    mutate {
      replace => {
        "metadata.event_type" => "FILE_MOVE"
      }
    }
  }else if [target_full_path] != "" && ([target_process_fullpath] != "" || [target_process_command_line] != "") && [security_result][action_details] =~ "File" {
    mutate {
      replace => {
        "metadata.event_type" => "FILE_UNCATEGORIZED"
      }
    }
  }else if [User] != "" && [security_result][action_details] =~ "Logoff" {
    mutate {
      replace => {
        "event.idm.read_only_udm.extensions.auth.type" => "AUTHTYPE_UNSPECIFIED"
        "metadata.event_type" => "USER_LOGOUT"
      }
    }
  }else if [User] != "" && [security_result][action_details] =~ "Logon" {
    mutate {
      replace => {
        "event.idm.read_only_udm.extensions.auth.type" => "AUTHTYPE_UNSPECIFIED"
        "metadata.event_type" => "USER_LOGIN"
      }
    }
  }else if ([target_process_fullpath] != ""|| [principal_process_command_line] != "") && [principal][process][pid] !="" {
    if [network_direction] == "Outbound" && [mac_address] != "" {
      mutate {
        replace => {
          "metadata.event_type" => "NETWORK_UNCATEGORIZED"
        }
      }
    }
    else {
      mutate {
        replace => {
          "metadata.event_type" => "SCAN_PROCESS"
        }
      }
    }
  }else if ([target_process_fullpath] != "" || [target_process_command_line] != "") {
    mutate {
      replace => {
        "metadata.event_type" => "PROCESS_UNCATEGORIZED"
      }
    }
  }
  else if [has_principal] == "true" {
    mutate {
      replace => {
        "metadata.event_type" => "STATUS_UPDATE"
      }
    }
  }

  if [security_result] != "" {
     mutate {
      merge => {
        "event.idm.read_only_udm.security_result" => "security_result"
      }
    }
  }

  mutate {
    merge => {
      "event.idm.read_only_udm.about" => "about"
    }
    on_error => "error_about_merge_exception"
  }

  mutate {
    rename => {
      "metadata" => "event.idm.read_only_udm.metadata"
      "principal" => "event.idm.read_only_udm.principal"
      "target" => "event.idm.read_only_udm.target"
      "observer" =>"event.idm.read_only_udm.observer"
      "network" => "event.idm.read_only_udm.network"
      "src"=>"event.idm.read_only_udm.src"
    }
  }

  if [prin_hardware] != "" {
    mutate {
      merge => {
        "event.idm.read_only_udm.principal.asset.hardware" => "prin_hardware"
      }
    }
  }

  if [target_hardware] != "" {
    mutate {
      merge => {
        "event.idm.read_only_udm.target.asset.hardware" => "target_hardware"
      }
    }
  }

  mutate {
    merge => {
      "@output" => "event"
    }
  }
}



