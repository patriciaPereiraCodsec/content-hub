# Product: Tanium Patch
# Category: Tanium Specific
# Supported Format: JSON
# Reference: https://docs.tanium.com/integration/integration/Tanium_Chronicle_Integration_Guide.pdf
# Last Updated: 2022-02-08
# Copyright 2022 Chronicle LLC


filter {

  mutate {
    gsub => ["message", "CVE IDs", "CVEIDs"]
  }
  mutate {
    gsub => ["message", "Computer Name", "ComputerName"]
  }
  mutate {
    gsub => ["message", "Install Status", "InstallStatus"]
  }
  mutate {
    gsub => ["message", "KB Articles", "KBArticles"]
  }
  mutate {
    gsub => ["message", "OS Type", "OSType"]
  }

  json {
    source => "message"
    array_function => "split_columns"
    on_error => "not_valid_json"
  }

  if [not_valid_json] {
    drop {
      tag => "TAG_UNSUPPORTED"
    }
  }

  mutate {
    replace => {
      "category" => "DATA_AT_REST"
    }
  }

  mutate {
    replace => {
      "event.idm.read_only_udm.principal.hostname" => "%{ComputerName}"
    }
  }

  mutate {
    replace => {
      "event.idm.read_only_udm.principal.asset.hostname" => "%{ComputerName}"
    }
  }

  if [message] =~ "OSType.*0.*Windows" {
    mutate {
      replace => {
        "event.idm.read_only_udm.principal.asset.platform_software.platform" => "WINDOWS"
      }
    }
  } else if [message] =~ "OSType.*0.*Linux" {
    mutate {
      replace => {
        "event.idm.read_only_udm.principal.asset.platform_software.platform" => "LINUX"
      }
    }
  } else if [message] =~ "OSType.*0.*Mac" {
    mutate {
      replace => {
        "event.idm.read_only_udm.principal.asset.platform_software.platform" => "MAC"
      }
    }
  }

  for index, title in Title {
    # reset loop vars
    mutate {
      replace => {
        "vulnerability" => ""
        "security_result" => ""
      }
    }

    # Title + KB should always exist, others may not
    mutate {
      replace => {
        "vulnerability.vendor" => "Tanium"
        "vulnerability.name" => "%{title}"
      }
    }

    for sIndex, status in InstallStatus {
      if index == sIndex and status != "Installed" {
        mutate {
          replace => {
            "security_result.description" => "%{title}"
          }
        }
        mutate {
          merge => {
            "security_result.category" => "category"
          }
        }
        mutate {
          merge => {
            "event.idm.read_only_udm.security_result" => "security_result"
          }
        }
      }
    }

    for kIndex, kb in KBArticles {
      if index == kIndex and kb != "" {
        mutate {
          replace => {
            "security_result.summary" => "%{kb}"
            "vulnerability.vendor_knowledge_base_article_id" => "%{kb}"
          }
        }
      }
    }

    for bIndex, bulletin in Bulletins {
      if index == bIndex and bulletin != "None" {
        mutate {
          replace => {
            "vulnerability.vendor_vulnerability_id" => "%{bulletin}"
          }
        }
      }
    }

    for cIndex, cve in CVEIDs {
      if index == cIndex and cve != "None" {
        mutate {
          replace => {
            "vulnerability.cve_id" => "%{cve}"
          }
        }
      }
    }

    for vIndex, severity in Severity {
      if index == vIndex {
        if severity == "Critical" {
          mutate {
            replace => {
              "vulnerability.severity" => "HIGH"
              "vulnerability.severity_details" => "%{severity}"
            }
          }
        } else if severity == "Important" {
          mutate {
            replace => {
              "vulnerability.severity" => "MEDIUM"
              "vulnerability.severity_details" => "%{severity}"
            }
          }
        } else {
          mutate {
            replace => {
              "vulnerability.severity" => "UNKNOWN_SEVERITY"
            }
          }
        }
      }
    }

    mutate {
      merge => {
        "event.idm.read_only_udm.principal.asset.vulnerabilities" => "vulnerability"
      }
    }
  }

  mutate {
    replace => {
      "event.idm.read_only_udm.metadata.vendor_name" => "Tanium"
      "event.idm.read_only_udm.metadata.product_name" => "Patch"
      "event.idm.read_only_udm.metadata.event_type" => "SCAN_HOST"
    }
  }

  mutate {
    merge => {
      "@output" => "event"
    }
  }
}
