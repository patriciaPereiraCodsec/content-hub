# Product: Archer
# Category: Risk Management Solution
# Supported Format: SYSLOG
# Reference: https://www.archerirm.com/
# Last Updated: 2024-08-27
# Copyright 2024 Chronicle LLC

filter {
  mutate {
    replace => {
      "vendor_name" => ""
      "product_name" => ""
      "version" => ""
      "archer_version" => ""
      "archer_instance" => ""
      "src_ip" => ""
      "src_port" => ""
      "event_id" => ""
      "user_id" => ""
      "user_name" => ""
      "method" => ""
      "input_parameter" => ""
      "output_value" => ""
      "success_status" => ""
      "security_result" => ""
      "security_action" => ""
      "is_db_resource" => "false"
      "company_security_event_id" => ""
      "security_event_name" => ""
      "_DB_DRIVER" => ""
      "_DB_PORT" => ""
      "_DB_URL" => ""
      "databasename" => ""
      "integratedSecurity" => ""
      "encrypt" => ""
      "trustServerCertificate" => ""
      "target_user" => ""
      "_DB_HOST" => ""
      "source_user" => ""
      "_DB_NAME" => ""
      "create_date" => ""
      "event_time" => ""
      "has_principal_user" => "false"
      "has_target_user" => "false"
      "target_group" => ""
      "file_name" => ""
      "Downloaded_By" => ""
      "Downloaded_By_UserName" => ""
      "has_target_file" => "false"
    }
  }

  mutate {
    gsub => ["message", "\\*target_group", "target_group"]
  }

  grok {
    match => {
      "message" => [
        "vendor:(?P<vendor_name>.*?),\\s+product:(?P<product_name>.*?),\\s+version:(?P<version>.*?),\\s+ArcherVersion:(?P<archer_version>.*?),ArcherInstance:(?P<archer_instance>.*?),LogSourceIdentifier:%{IP:src_ip}:%{INT:src_port},eventtime:(?P<event_time>.*?),eventid:(?P<event_id>.*?),\\s+ArcherLog:\".*?UserId:(?P<user_id>.*?)\\s+UserName:\"(?P<user_name>.*?)\"\\s+LogDate:(?P<log_date>.*?)\\s+MethodName:(?P<method>.*?)\\s+InputParameter:(?P<input_parameter>.*?)\\s+OutputValues:(?P<output_value>.*?)\\s+Success:(?P<success_status>.*?)\\s+\""
      ]
    }
    overwrite => ["vendor_name", "product_name", "version", "archer_version", "archer_instance", "event_time", "src_ip", "src_port", "event_id", "user_id", "user_name", "method", "input_parameter", "output_value", "success_status"]
    on_error => "pattern_not_matched"
  }

  if [pattern_not_matched] {
    mutate {
      gsub => ["message", ";",","]
    }
    kv {
      source => "message"
      field_split => ","
      value_split => "="
      trim_value => ""
      on_error => "failed_kv_parsing"
    }

    if [failed_kv_parsing] {
      drop {
        tag => "TAG_MALFORMED_ENCODING"
      }
    }

    if [company_security_event_id] != "" {
      mutate {
        replace => {
          "event.idm.read_only_udm.metadata.product_log_id" =>
          "%{company_security_event_id}"
        }
        on_error => "no_company_security_event_id"
      }
    }

    if [file_name] != "" {
      mutate {
        replace => {
          "event.idm.read_only_udm.target.file.full_path" => "%{file_name}"
          "has_target_file" => "true"
        }
        on_error => "no_file_name"
      }
    }

    if [Downloaded_By] != "" {
      grok {
        match => {
          "message" => "Downloaded_By=%{DATA:Downloaded_By},Downloaded_By_UserName="
        }
        overwrite => ["Downloaded_By"]
        on_error => "no_downloaded_by"
      }
      mutate {
        replace => {
          "event.idm.read_only_udm.principal.user.user_display_name" => "%{Downloaded_By}"
        }
        on_error => "no_principal_user"
      }
    }

    if [Downloaded_By_UserName] =~ "^.+@.+$" {
      mutate {
        merge => {
          "event.idm.read_only_udm.principal.user.email_addresses" => "Downloaded_By_UserName"
        }
        on_error => "no_principal_user"
      }
      if ![no_principal_user] {
        mutate {
          replace => {
            "has_principal_user" => "true"
          }
        }
      }
    }
    else if [Downloaded_By_UserName] != "" {
      mutate {
        replace => {
          "event.idm.read_only_udm.principal.user.userid" => "%{Downloaded_By_UserName}"
          "has_principal_user" => "true"
        }
        on_error => "no_principal_user"
      }
    }

    if [target_user] != "" {
      mutate {
        replace => {
          "event.idm.read_only_udm.target.user.userid" => "%{target_user}"
          "has_target_user" => "true"
        }
        on_error => "no_target_user"
      }
    }

    if [source_user] != "" {
      mutate {
        replace => {
          "event.idm.read_only_udm.principal.user.userid" => "%{source_user}"
          "has_principal_user" => "true"
        }
        on_error => "no_source_user"
      }
    }

    if [security_event_name] != "" {
      mutate {
        replace => {
          "security_result.description" => "%{security_event_name}"
        }
        on_error => "no_security_event_name"
      }
    }

    if [security_event_name] == "User Login" {
      mutate {
        replace => {
          "event.idm.read_only_udm.metadata.event_type" => "USER_LOGIN"
          "event.idm.read_only_udm.extensions.auth.type" =>
          "AUTHTYPE_UNSPECIFIED"
        }
      }
    }
    else if [security_event_name] == "User Logout" {
       mutate {
        replace => {
          "event.idm.read_only_udm.metadata.event_type" => "USER_LOGOUT"
          "event.idm.read_only_udm.extensions.auth.type" =>
          "AUTHTYPE_UNSPECIFIED"
        }
      }
    }
    else if [security_event_name] =~ "Security Events" {
      mutate {
        replace => {
          "event.idm.read_only_udm.metadata.event_type" =>
          "USER_RESOURCE_ACCESS"
        }
      }
    }
    else if [security_event_name] =~ "(User Added to Group|User Removed from Group)" {
      if [target_group] != "" {
        mutate {
          replace => {
            "event.idm.read_only_udm.target.group.group_display_name" => "%{target_group}"
          }
          on_error => "no_target_group"
        }
      }
      mutate {
        replace => {
          "event.idm.read_only_udm.metadata.event_type" => "GROUP_MODIFICATION"
        }
      }
    }
    else if [security_event_name] =~ "User Account Added" {
      mutate {
        replace => {
          "event.idm.read_only_udm.metadata.event_type" => "USER_RESOURCE_CREATION"
        }
      }
    }
    else if [security_event_name] =~ "User Removed"  {
      mutate {
        replace => {
          "event.idm.read_only_udm.metadata.event_type" => "USER_RESOURCE_DELETION"
        }
      }
    }
    else {
      if [has_principal_user] == "true" or [has_target_user] == "true" {
        mutate {
          replace => {
            "event.idm.read_only_udm.metadata.event_type" => "USER_UNCATEGORIZED"
          }
        }
      }
      else {
        mutate {
          replace => {
            "event.idm.read_only_udm.metadata.event_type" => "GENERIC_EVENT"
          }
        }
      }
    }

    if [_DB_DRIVER] != "" {
      mutate {
        replace => {
          "db_driver.value" => "%{_DB_DRIVER}"
        }
        on_error => "no_db_driver"
      }

      if ![no_db_driver] {
        mutate {
          replace => {
            "db_driver.key" => "db_driver"
            "is_db_resource" => "true"
          }
          merge => {
            "event.idm.read_only_udm.target.resource.attribute.labels" =>
            "db_driver"
          }
        }
      }
    }

    if [_DB_PORT] != "" {
      mutate {
        replace => {
          "db_port.value" => "%{_DB_PORT}"
        }
        on_error => "no_db_port"
      }

      if ![no_db_port] {
        mutate {
          replace => {
            "db_port.key" => "db_port"
            "is_db_resource" => "true"
          }
          merge => {
            "event.idm.read_only_udm.target.resource.attribute.labels" =>
            "db_port"
          }
        }
      }
    }

    if [_DB_URL] != "" {
      mutate {
        replace => {
          "db_url.value" => "%{_DB_URL}"
        }
        on_error => "no_db_url"
      }

      if ![no_db_url] {
        mutate {
          replace => {
            "db_url.key" => "db_url"
            "is_db_resource" => "true"
          }
          merge => {
            "event.idm.read_only_udm.target.resource.attribute.labels" =>
            "db_url"
          }
        }
      }
    }

    if [_DB_HOST] != "" {
      mutate {
        replace => {
          "db_host.value" => "%{_DB_HOST}"
        }
        on_error => "no_db_host"
      }

      if ![no_db_host] {
        mutate {
          replace => {
            "db_host.key" => "db_host"
            "is_db_resource" => "true"
          }
          merge => {
            "event.idm.read_only_udm.target.resource.attribute.labels" =>
            "db_host"
          }
        }
      }
    }

    if [_DB_NAME] != "" {
      mutate {
        replace => {
          "db_name.value" => "%{_DB_NAME}"
        }
        on_error => "no_db_name"
      }

      if ![no_db_name] {
        mutate {
          replace => {
            "db_name.key" => "db_name"
            "is_db_resource" => "true"
          }
          merge => {
            "event.idm.read_only_udm.target.resource.attribute.labels" =>
            "db_name"
          }
        }
      }
    }
    else if [databasename] != "" {
      mutate {
        replace => {
          "db_name.value" => "%{databasename}"
        }
        on_error => "no_db_name"
      }

      if ![no_db_name] {
        mutate {
          replace => {
            "db_name.key" => "db_name"
            "is_db_resource" => "true"
          }
          merge => {
            "event.idm.read_only_udm.target.resource.attribute.labels" =>
            "db_name"
          }
        }
      }
    }

    if [is_db_resource] == "true" {
      mutate {
        replace => {
          "event.idm.read_only_udm.target.resource.resource_type" => "DATABASE"
        }
      }
    }

    if [create_date] != "" {
      date {
        match => ["create_date", "UNIX_MS"]
        on_error => "invalid_date_format"
      }
    }

    if [integratedSecurity] != "" {
      mutate {
        replace => {
          "integratedSecurity.value" => "%{integratedSecurity}"
        }
        on_error => "no_integratedSecurity"
      }

      if ![no_integratedSecurity] and [integratedSecurity][value] != "" {
        mutate {
          replace => {
            "integratedSecurity.key" => "integratedSecurity"
          }
          on_error => "_"
        }
        mutate {
          merge => {
            "security_result.detection_fields" => "integratedSecurity"
          }
          on_error => "_"
        }
      }
    }

    if [encrypt] != "" {
      mutate {
        replace => {
          "encrypt.value" => "%{encrypt}"
        }
        on_error => "no_encrypt"
      }

      if ![no_encrypt] and [encrypt][value] != "" {
        mutate {
          replace => {
            "encrypt.key" => "encrypt"
          }
          on_error => "_"
        }
        mutate {
          merge => {
            "security_result.detection_fields" => "encrypt"
          }
          on_error => "_"
        }
      }
    }

    if [trustServerCertificate] != "" {
      mutate {
        replace => {
          "trustServerCertificate.value" => "%{trustServerCertificate}"
        }
        on_error => "no_trustServerCertificate"
      }

      if ![no_trustServerCertificate]
      and [trustServerCertificate][value] != "" {
        mutate {
          replace => {
            "trustServerCertificate.key" => "trustServerCertificate"
          }
          on_error => "_"
        }
        mutate {
          merge => {
            "security_result.detection_fields" => "trustServerCertificate"
          }
          on_error => "_"
        }
      }
    }

    if [security_result] != "" {
      mutate {
        merge => {
          "event.idm.read_only_udm.security_result" => "security_result"
        }
        on_error => "no_security_result"
      }
    }

    mutate {
      replace => {
        "event.idm.read_only_udm.metadata.product_name" => "RSA"
        "event.idm.read_only_udm.metadata.vendor_name" => "Archer"
      }
    }
  }
  else {
    if [event_time] != "" {
      date {
        match => [
          "event_time", "MM/dd/yyyy HH:mm:ss A", "M/d/yyyy HH:mm:ss A", "MM/dd/yyyy HH:mm:ss", "yyyy-MM-dd HH:mm:ss"
        ]
      }
    }

    if [src_ip] != "" {
      mutate {
        merge => {
          "event.idm.read_only_udm.principal.ip" => "src_ip"
        }
      }
    }

    if [src_port] != "" {
      mutate {
        replace => {
          "event.idm.read_only_udm.principal.port" => "%{src_port}"
        }
      }
      mutate {
        convert => {
          "event.idm.read_only_udm.principal.port" => "integer"
        }
      }
    }

    if [user_id] not in [ "", "0" ] {
      mutate {
        replace => {
          "event.idm.read_only_udm.principal.user.userid" => "%{user_id}"
        }
      }
    }

    if [user_name] != "" {
      mutate {
        replace => {
          "event.idm.read_only_udm.principal.user.user_display_name" => "%{user_name}"
        }
      }
    }

    if [success_status] =~ "(?i)true" {
      mutate {
        replace => {
          "security_action" => "ALLOW"
        }
      }
    } else {
      mutate {
        replace => {
          "security_action" => "BLOCK"
        }
      }
    }

    if [security_action] != "" {
      mutate {
        merge => {
          "security_result.action" => "security_action"
        }
      }
    }

    if [success_status] != "" {
      mutate {
        replace => {
          "security_result.summary" => "Success: %{success_status}"
        }
      }
    }

    if [archer_version] != "" {
      mutate {
        replace => {
          "archer_version_label.key" => "ArcherVersion"
          "archer_version_label.value.string_value" => "%{archer_version}"
        }
        merge => {
          "event.idm.read_only_udm.additional.fields" => "archer_version_label"
        }
      }
    }

    if [archer_instance] != "" {
      mutate {
        replace => {
          "archer_instance_label.key" => "ArcherInstance"
          "archer_instance_label.value.string_value" => "%{archer_instance}"
        }
        merge => {
          "event.idm.read_only_udm.additional.fields" => "archer_instance_label"
        }
      }
    }

    if [method] != "" {
      grok {
        match => {
          "method" => "%{DATA:method}, Version"
        }
        overwrite => ["method"]
        on_error => "already_method_name"
      }

      mutate {
        replace => {
          "method_label.key" => "MethodName"
          "method_label.value.string_value" => "%{method}"
        }
        merge => {
          "event.idm.read_only_udm.additional.fields" => "method_label"
        }
      }
    }

    if [input_parameter] != "" {
      mutate {
        replace => {
          "input_label.key" => "InputParameter"
          "input_label.value.string_value" => "%{input_parameter}"
        }
        merge => {
          "event.idm.read_only_udm.additional.fields" => "input_label"
        }
      }
    }

    if [output_value] not in ["", "n/a", "N/A"] {
      mutate {
        replace => {
          "output_value_label.key" => "OutputValue"
          "output_value_label.value.string_value" => "%{output_value}"
        }
        merge => {
          "event.idm.read_only_udm.additional.fields" => "output_value_label"
        }
      }
    }

    if [version] != "" {
      mutate {
        replace => {
          "event.idm.read_only_udm.metadata.product_version" => "%{version}"
        }
      }
    }

    if [event_id] != "" {
      mutate {
        replace => {
          "event.idm.read_only_udm.metadata.product_event_type" => "%{event_id}"
        }
      }
    }

    mutate {
      replace => {
        "event.idm.read_only_udm.metadata.event_type" => "USER_RESOURCE_ACCESS"
        "event.idm.read_only_udm.metadata.product_name" => "%{product_name}"
        "event.idm.read_only_udm.metadata.vendor_name" => "%{vendor_name}"
      }
    }

    if [security_result] != "" {
      mutate {
        merge => {
          "event.idm.read_only_udm.security_result" => "security_result"
        }
      }
    }
  }

  mutate {
    merge => {
      "@output" => "event"
    }
  }
}
