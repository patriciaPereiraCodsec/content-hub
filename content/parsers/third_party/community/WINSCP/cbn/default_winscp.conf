# Product: WINSCP
# Category: Data Transfer
# Supported Format: SYSLOG, CSV
# Reference: N/A
# Last Updated: 2024-05-22
# Copyright 2024 Chronicle LLC

filter {
  mutate {
    replace => {
      "intermediary" => ""
      "event" => ""
      "principal" => ""
      "target" => ""
      "security_result" => ""
      "network" => ""
      "metadata" => ""
      "has_principal" => "false"
      "has_principal_user" => "false"
      "has_target_user" => "false"
      "has_target_file" => "false"
      "file" => ""
      "file_type" => ""
      "file_size" => ""
      "transfer_speed" => ""
      "result" => ""
      "local_file" => ""
      "target_file" => ""
      "description" => ""
      "timestamp" => ""
      "username" => ""
      "public_key" => ""
      "directory" => ""
      "command_line" => ""
      "src_ip" => ""
      "script" => ""
      "console" => ""
      "consoleinstance" => ""
      "hostkey" => ""
      "total_size" => ""
    }
  }

  grok {
    match => {
      "message" => [
        "(?P<description>Change in '%{DATA:file}' detected)",
        "(?P<description>Local \\'%{DATA:local_file}\\' => Remote \\'%{DATA:target_file}\\')",
        "(%{TIMESTAMP_ISO8601:timestamp} )?(?P<description>Using username \\\"%{DATA:username}\\\")",
        "(%{TIMESTAMP_ISO8601:timestamp} )?(?P<description>Looking up host \\\"%{IP:src_ip}\\\" for SSH connection)",
        "%{TIMESTAMP_ISO8601:timestamp} Prompt %{GREEDYDATA:prompt}"
        "%{TIMESTAMP_ISO8601:timestamp} Command-line: \\\"%{DATA:file}\\\" /console=%{DATA:console} /consoleinstance=%{DATA:consoleinstance} %{DATA} \\\"/script=%{DATA:script}\\\""
        "%{TIMESTAMP_ISO8601:timestamp} (?P<description> Changing directory to \\\"%{DATA:directory}\\\")"
        "%{TIMESTAMP_ISO8601:timestamp} (?P<description>Trying to open directory \\\"%{DATA:directory}\\\")"
        "%{TIMESTAMP_ISO8601:timestamp} (?P<description>Copying 0 files/directories to remote directory \\\"%{DATA:directory}\\\") - total size: %{DATA:total_size}"
        "Authenticating with public key \\\"%{DATA:public_key}\\\""
        "%{TIMESTAMP_ISO8601:timestamp} Script: (?P<command_line>open %{DATA}://%{DATA:username}:%{DATA}@%{IP:src_ip}/ -hostkey=\\\"%{DATA:hostkey}\\\")"
      ]
    }
    overwrite => ["file","local_file","target_file","description","username","timestamp","public_key","directory","src_ip","command_line","hostkey","console","consoleinstance","script","total_size"]
    on_error => "grok_failed"
  }

  if [grok_failed] {
    mutate {
      gsub => ["message","(\\s+)\\|(\\s+)","|"]
    }

    csv {
      source => "message"
      separator => "|"
      on_error => "csv_failed"
    }

    if ![csv_failed] {
      mutate {
        replace => {
          "file" => "%{column1}"
        }
        on_error => "no_file"
      }
      mutate {
        replace => {
          "file_size" => "%{column2}"
        }
        on_error => "no_file_size"
      }
      mutate {
        replace => {
          "transfer_speed" => "%{column3}"
        }
        on_error => "no_transfer_speed"
      }
      mutate {
        replace => {
          "file_type" => "%{column4}"
        }
        on_error => "no_file_type"
      }
      mutate {
        replace => {
          "result" => "%{column5}"
        }
        on_error => "no_result"
      }
    }
  }
  else {
    mutate {
      replace => {
        "metadata.description" => "%{description}"
      }
    }
  }

  if [src_ip] != "" {
    mutate {
      merge => {
        "principal.ip" => "src_ip"
        "principal.asset.ip" => "src_ip"
      }
      on_error => "no_src_ip"
    }
    if ![no_src_ip] {
      mutate {
        replace => {
          "has_principal" => "true"
        }
      }
    }
  }

  if [command_line] != "" {
    mutate {
      replace => {
        "principal.process.command_line" => "%{command_line}"
      }
      on_error => "no_command_line"
    }
  }

  if [directory] != "" {
    mutate {
      replace => {
        "directory_label.value.string_value" => "%{directory}"
        "directory_label.key" => "directory"
      }
      on_error => "no_directory"
    }
    if ![no_directory] {
      mutate {
        merge => {
          "event.idm.read_only_udm.additional.fields" => "directory_label"
        }
        on_error => "no_directory_label"
      }
    }
  }

  if [console] != "" {
    mutate {
      replace => {
        "console_label.value.string_value" => "%{console}"
        "console_label.key" => "console"
      }
      on_error => "no_console"
    }
    if ![no_console] {
      mutate {
        merge => {
          "event.idm.read_only_udm.additional.fields" => "console_label"
        }
        on_error => "no_console_label"
      }
    }
  }

  if [consoleinstance] != "" {
    mutate {
      replace => {
        "consoleinstance_label.value.string_value" => "%{consoleinstance}"
        "consoleinstance_label.key" => "consoleinstance"
      }
      on_error => "no_consoleinstance"
    }
    if ![no_consoleinstance] {
      mutate {
        merge => {
          "event.idm.read_only_udm.additional.fields" => "consoleinstance_label"
        }
        on_error => "no_consoleinstance_label"
      }
    }
  }

  if [public_key] != "" {
    mutate {
      replace => {
        "public_key_label.value.string_value" => "%{public_key}"
        "public_key_label.key" => "public_key"
      }
      on_error => "no_public_key"
    }
    if ![no_public_key] {
      mutate {
        merge => {
          "event.idm.read_only_udm.additional.fields" => "public_key_label"
        }
        on_error => "no_public_key_label"
      }
    }
  }

  if [script] != "" {
    mutate {
      replace => {
        "script_label.value.string_value" => "%{script}"
        "script_label.key" => "script"
      }
      on_error => "no_script"
    }
    if ![no_script] {
      mutate {
        merge => {
          "event.idm.read_only_udm.additional.fields" => "script_label"
        }
        on_error => "no_script_label"
      }
    }
  }

  if [hostkey] != "" {
    mutate {
      replace => {
        "hostkey_label.value.string_value" => "%{hostkey}"
        "hostkey_label.key" => "hostkey"
      }
      on_error => "no_hostkey"
    }
    if ![no_hostkey] {
      mutate {
        merge => {
          "event.idm.read_only_udm.additional.fields" => "hostkey_label"
        }
        on_error => "no_hostkey"
      }
    }
  }

  if [total_size] != "" {
    mutate {
      replace => {
        "total_size_label.value.string_value" => "%{total_size}"
        "total_size_label.key" => "total_size"
      }
      on_error => "no_total_size"
    }
    if ![no_total_size] {
      mutate {
        merge => {
          "event.idm.read_only_udm.additional.fields" => "total_size_label"
        }
        on_error => "no_total_size_label"
      }
    }
  }

  if [timestamp] != "" {
    date {
      match => ["timestamp","yyyy-MM-dd HH:mm:ss.SSS"]
      on_error => "date_failed"
    }
  }

  if [username] != "" {
    mutate {
      replace => {
        "principal.user.userid" => "%{username}"
        "has_principal_user" => "true"
      }
      on_error => "no_username"
    }
  }

  if [file] != "" {
    mutate {
      replace => {
        "target.file.full_path" => "%{file}"
        "has_target_file" => "true"
      }
      on_error => "no_file"
    }
  }

  if [target_file] != "" {
    mutate {
      replace => {
        "target.file.full_path" => "%{target_file}"
        "has_target_file" => "true"
      }
      on_error => "no_target_file"
    }
  }

  if [local_file] != "" {
    mutate {
      replace => {
        "principal.file.full_path" => "%{local_file}"
      }
      on_error => "no_local_file"
    }
  }

  if [file_size] != "" {
    grok {
      match => {
        "file_size" => [
          "%{INT:size}"
        ]
      }
      on_error => "file_size_failed"
    }
    if ![file_size_failed] {
      mutate {
        convert  => {
          "size" => "uinteger"
        }
        on_error => "converion_failed"
      }
      mutate {
        rename => {
          "size" => "target.file.size"
        }
      }
    }
  }

  if [transfer_speed] != "" {
    mutate {
      replace => {
        "transfer_speed_label.key" => "transfer_speed"
        "transfer_speed_label.value" => "%{transfer_speed}"
      }
      on_error => "no_transfer_speed"
    }
    if ![no_transfer_speed] {
      mutate {
        merge => {
          "security_result.detection_fields" => "transfer_speed_label"
        }
        on_error => "no_transfer_speed_label"
      }
    }
  }

  if [file_type] != "" {
    mutate {
      replace => {
        "target.file.mime_type" => "%{file_type}"
      }
      on_error => "no_file_type"
    }
  }

  if [result] != "" {
    mutate {
      replace => {
        "result_label.key" => "status"
        "result_label.value" => "%{result}"
      }
      on_error => "no_result"
    }
    if ![no_result] {
      mutate {
        merge => {
          "security_result.detection_fields" => "result_label"
        }
        on_error => "no_result_label"
      }
    }
  }

  if [has_principal] == "true"{
    mutate {
      replace => {
        "metadata.event_type" => "STATUS_UPDATE"
      }
      on_error => "no_target_file"
    }
  }
  else if [has_principal_user] == "true" {
    mutate {
      replace => {
        "metadata.event_type" => "USER_UNCATEGORIZED"
      }
      on_error => "no_principal_user"
    }
  }
  else {
    mutate {
      replace => {
        "metadata.event_type" => "GENERIC_EVENT"
      }
      on_error => "no_target_file"
    }
  }

  mutate {
    replace => {
      "metadata.product_name" => "WINSCP"
      "metadata.vendor_name" => "WINSCP"
    }
  }
  if [principal] != "" {
    mutate {
      rename => {
        "principal" => "event.idm.read_only_udm.principal"
      }
    }
  }
  if [target] != "" {
    mutate {
      rename => {
        "target" => "event.idm.read_only_udm.target"
      }
    }
  }
  if [metadata] != "" {
    mutate {
      rename => {
        "metadata" => "event.idm.read_only_udm.metadata"
      }
    }
  }
  if [network] != "" {
    mutate {
      rename => {
        "network" => "event.idm.read_only_udm.network"
      }
    }
  }
  if [intermediary] != "" {
    mutate {
      merge => {
        "event.idm.read_only_udm.intermediary" => "intermediary"
      }
      on_error => "no_intermediary"
    }
  }
  if [security_result] != "" {
    mutate {
      merge => {
        "event.idm.read_only_udm.security_result" => "security_result"
      }
      on_error => "no_security_result"
    }
  }
  mutate {
    merge => {
      "@output" => "event"
    }
  }
}
