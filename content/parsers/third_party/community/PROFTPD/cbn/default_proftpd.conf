# Product: PROFTPD
# Category: Web Server
# Supported Format: SYSLOG
# Reference: N/A
# Last Updated: 2025-01-12
# Copyright 2025 Chronicle LLC

filter {
  mutate {
    replace => {
      "desc" => ""
      "timestamp" => ""
      "client_ip" => ""
      "client_port" => ""
      "server_ip" => ""
      "server_port" => ""
      "event_type" => ""
      "metadata" => ""
      "principal" => ""
      "target" => ""
      "network" => ""
      "additional" => ""
      "server_version" => ""
      "intermediary" => ""
      "security_result" => ""
      "observer_intermediary_hostname" => ""
      "pid" => ""
      "filename" => ""
      "read_offset" => ""
      "version" => ""
      "principal_mid_present" => "false"
      "target_mid_present" => "false"
    }
  }

  # Grok pattern to process syslog message
  grok {
    match => {
       "message" => [
          "<%{INT}>%{DATA:observer_intermediary_hostname} %{TIMESTAMP_ISO8601:time} %{DATA:version}\\[%{INT:pid}\\]: (?P<desc>.*%{INT:read_offset}.*'%{DATA:filename}'.*)",
          "<%{INT}>%{DATA:observer_intermediary_hostname} %{TIMESTAMP_ISO8601:time} %{DATA:version}\\[%{INT:pid}\\]: %{GREEDYDATA:desc}"
          "(?P<timestamp>%{YEAR}-%{MONTHNUM}-%{MONTHDAY} %{TIME}) %{DATA:version}\\[%{INT:pid}\\]: %{GREEDYDATA:desc}"
        ]
    }
    overwrite => ["timestamp", "desc", "version", "observer_intermediary_hostname", "pid", "filename", "read_offset"]
    on_error  => "header_grok_match_failed"
  }

  if [header_grok_match_failed] {
    drop {
      tag => "TAG_MALFORMED_MESSAGE"
    }
  }
  if [timestamp] != "" {
    date {
      match => ["timestamp", "yyyy-MM-dd HH:mm:ss,SSS"]
      on_error => "date_match_failed"
    }
  }
  if [pid] != "" {
    mutate {
      convert => {
        "pid" => "string"
      }
      on_error => "conversion_failed"
    }
    mutate {
      replace => {
        "principal.process.pid" => "%{pid}"
      }
      on_error => "pid_empty"
    }
  }
  if [desc] != "" {
    grok {
      match => {
        "desc" => [
          "(sent|received)? server version '%{DATA:server_version}'",
          "client \\(%{IP:client_ip}:%{NUMBER:client_port}\\) %{DATA} \\(%{IP:server_ip}:%{NUMBER:server_port}\\)",
          "client at %{IP:client_ip}"
        ]
      }
      overwrite => ["client_ip", "client_port", "server_ip", "server_port", "server_version"]
      on_error => "desc_grok_match_failed"
    }
    mutate {
      replace => {
        "metadata.description" => "%{desc}"
      }
      on_error => "desc_replace_failed"
    }
  }
  if [version] != "" {
    mutate {
      replace => {
        "metadata.product_version" => "%{version}"
      }
      on_error => "version_empty"
    }
  }
  if [observer_intermediary_hostname] != "" {
    mutate {
      replace => {
        "intermediary.hostname" => "%{observer_intermediary_hostname}"
        "event.idm.read_only_udm.observer.hostname" => "%{observer_intermediary_hostname}"
      }
      on_error => "intermediary_hostname_empty"
    }
  }
  if [client_ip] != "" {
    mutate {
      merge => {
        "principal.ip" => "client_ip"
        "principal.asset.ip" => "client_ip"
      }
      on_error => "client_ip_merge_failed"
    }
    mutate {
      replace => {
        "principal_mid_present" => "true"
      }
    }
  }
  if [client_port] != "" {
    mutate {
      replace => {
        "principal.port" => "%{client_port}"
      }
      on_error => "client_port_merge_failed"
    }
    mutate {
      convert => {
        "principal.port" => "integer"
      }
      on_error => "client_port_convert_failed"
    }
  }
  if [server_ip] != "" {
    mutate {
      merge => {
        "target.ip" => "server_ip"
        "target.asset.ip" => "server_ip"
      }
      on_error => "server_ip_merge_failed"
    }
    mutate {
      replace => {
        "target_mid_present" => "true"
      }
    }
  }
  if [server_port] != "" {
    mutate {
      replace => {
        "target.port" => "%{server_port}"
      }
      on_error => "server_port_merge_failed"
    }
    mutate {
      convert => {
        "target.port" => "integer"
      }
      on_error => "server_port_convert_failed"
    }
  }
  if [server_version] != "" {
    mutate {
      replace => {
        "server_version_label.value.string_value" => "%{server_version}"
      }
      on_error => "server_version_empty"
    }
    if ![server_version_empty] {
      mutate {
        replace => {
          "server_version_label.key" => "server_version"
        }
      }
      mutate {
        merge => {
          "additional.fields" => "server_version_label"
        }
        on_error => "server_version_label_empty"
      }
    }
  }
  mutate {
    convert => {
      "read_offset" => "string"
    }
    on_error => "read_offset_convert_failed"
  }

  if [read_offset] != "" {
    mutate {
      replace => {
        "read_offset_label.value.string_value" => "%{read_offset}"
      }
      on_error => "read_offset_empty"
    }
    if ![read_offset_empty] {
      mutate {
        replace => {
          "read_offset_label.key" => "read_offset"
        }
      }
      mutate {
        merge => {
          "additional.fields" => "read_offset_label"
        }
        on_error => "read_offset_label_empty"
      }
    }
  }
  if [filename] != "" {
    mutate {
      replace => {
        "principal.file.full_path" => "%{filename}"
      }
      on_error => "filename_empty"
    }
  }

  mutate {
    replace => {
      "metadata.vendor_name" => "PROFTPD"
      "metadata.product_name" => "PROFTPD"
    }
  }

  if [event_type] == "" {
    if [principal_mid_present] == "true" and [target_mid_present] == "true" {
      mutate {
        replace => {
          "event_type" => "NETWORK_CONNECTION"
        }
      }
    }
    else if [principal_mid_present] == "true" {
      mutate {
        replace => {
          "event_type" => "STATUS_UPDATE"
        }
      }
    }
    else {
      mutate {
        replace => {
          "event_type" => "GENERIC_EVENT"
        }
      }
    }
  }

  if [event_type] != "" {
    mutate {
      replace => {
        "metadata.event_type" => "%{event_type}"
      }
      on_error => "event_type_value_invalid"
    }
  }

  # merge the data into udm nouns.
  if [metadata] != "" {
    mutate {
      rename => {
        "metadata" => "event.idm.read_only_udm.metadata"
      }
    }
  }
  if [principal] != "" {
    mutate {
      rename => {
        "principal" => "event.idm.read_only_udm.principal"
      }
    }
  }
  if [target] != "" {
    mutate {
      rename => {
        "target" => "event.idm.read_only_udm.target"
      }
    }
  }
  if [network] != "" {
    mutate {
      rename => {
        "network" => "event.idm.read_only_udm.network"
      }
    }
  }
  if [additional] != "" {
    mutate {
      rename => {
        "additional" => "event.idm.read_only_udm.additional"
      }
    }
  }
  if [security_result] != "" {
    mutate {
      merge => {
        "event.idm.read_only_udm.security_result" => "security_result"
      }
      on_error => "security_result_empty"
    }
  }
  if [intermediary] != "" {
    mutate {
      merge => {
        "event.idm.read_only_udm.intermediary" => "intermediary"
      }
      on_error => "intermediary_empty"
    }
  }
  mutate {
    merge => {
      "@output" => "event"
    }
  }
}
