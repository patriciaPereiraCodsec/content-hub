# Product: NXLog Manager
# Category: Log Aggregator
# Supported Format: SYSLOG
# Reference: https://nxlog.co/documentation
# Last Updated: 2022-01-13
# Copyright 2022 Chronicle LLC


filter {
  mutate {
    replace => {
      "time" => ""
      "process_id" => ""
      "log_level" => ""
      "hostname" => ""
      "command" => ""
      "description" => ""
      "file_name" => ""
      "sec_result" => ""
    }
  }

  mutate {
    gsub => ["message", '\\\t', ""]
  }

  grok {
    match => {
      "message" => [
                    "%{TIMESTAMP_ISO8601:time},%{INT:process_id} %{DATA:log_level} %{DATA:hostname} %{DATA:data2} \\[%{GREEDYDATA}\\] - %{GREEDYDATA:description} ",
                    "at %{GREEDYDATA:command}\\(%{GREEDYDATA:file_name}:%{INT}\\)",
                    "%{GREEDYDATA:description}"
      ]
    }
    overwrite => ["time", "process_id", "log_level", "hostname", "command", "description", "file_name"]
  }

  if [time] != "" {
    date {
      match => ["time", "yyyy-MM-dd HH:mm:ss"]
    }
  }

  if [process_id] != "" {
    mutate {
      replace => {
        "event.idm.read_only_udm.target.process.pid" => "%{process_id}"
      }
    }
  }

  if [log_level] != "" {
    if [log_level] in ["DEBUG", "INFO", "AUDIT"] {
      mutate {
        replace => {
          "sec_result.severity" => "INFORMATIONAL"
        }
      }
    }
    else if [log_level] == "ERROR" {
      mutate {
        replace => {
          "sec_result.severity" => "ERROR"
        }
      }
    }
    else if [log_level] == "WARNING" {
      mutate {
        replace => {
          "sec_result.severity" => "HIGH"
        }
      }
    }
  }

  if [hostname] != "" {
    mutate {
      replace => {
        "event.idm.read_only_udm.target.hostname" => "%{hostname}"
      }
    }
  }

  if [sec_result] != "" {
    mutate {
      merge => {
        "event.idm.read_only_udm.security_result" => "sec_result"
      }
    }
  }

  if [command] != "" {
    mutate {
      replace => {
        "event.idm.read_only_udm.target.process.command_line" => "%{command}"
      }
    }
  }

  if [file_name] != "" {
    mutate {
      replace => {
        "event.idm.read_only_udm.target.process.file.full_path" => "%{file_name}"
      }
    }
  }

  mutate {
    replace => {
      "event.idm.read_only_udm.metadata.event_type" => "GENERIC_EVENT"
      "event.idm.read_only_udm.metadata.product_name" => "NXLOG_MANAGER"
      "event.idm.read_only_udm.metadata.vendor_name" => "NXLog"
      "event.idm.read_only_udm.metadata.description" => "%{description}"
    }
  }

  mutate {
    merge => {
      "@output" => "event"
    }
  }
}
