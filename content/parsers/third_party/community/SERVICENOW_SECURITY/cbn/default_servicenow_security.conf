# Product: ServiceNow Security
# Category: SaaS Application
# Supported Format: JSON
# Reference: https://docs.servicenow.com/bundle/quebec-platform-administration/page/administer/security/concept/instance-sec-center-event-ribbon.html
# Last Updated: 2026-04-30
# Copyright 2026 Google SecOps


filter {

  mutate {
    replace => {
      "event" => ""
      "event_type" => ""
      "ip_address" => ""
      "event_created" => ""
      "created_by" => ""
      "created_on" => ""
      "updated_on" => ""
      "user" => "UNKNOWN"
      "snc_user" => ""
      "msg_data" => ""
      "data_source" => ""
      "data_sys_id" => ""
      "data_sys_created_on" => ""
      "sys_created_by" => ""
      "source_instance" => ""
      "data_user" => ""
      "timestamp" => ""
      "data_level" => ""
      "security_result" => ""
      "source" => ""
      "data_role_name" => ""
      "data_granted_by" => ""
      "data_state" => ""
      "has_principal_user" => "false"
    }
  }
   mutate {
    gsub => ["message","\\r\\n",""]
  }
  mutate {
    gsub => ["message","\\n",""]
  }
  mutate {
    gsub => ["message",'"event_type"','"event"']
  }
  mutate {
    gsub => ["message",'"message"','"message_data"']
  }

  json {
    source => "message"
    array_function => "split_columns"
    on_error => "not_json"
  }

  # Used event1 while mapping as "event" is already the key present in JSON log.
  if [ip_address] != "" {
    mutate {
      merge => {
        "event1.idm.read_only_udm.principal.ip" => "ip_address"
      }
    }
  }

  if [event] != "" {
    mutate {
      replace => {
        "event1.idm.read_only_udm.metadata.product_event_type" => "%{event}"
      }
    }
  }

  if [user] != "" && [user] != "null" {
    mutate {
      replace => {
        "event1.idm.read_only_udm.principal.user.userid" => "%{user}"
        "has_principal_user" => "true"
      }
      on_error => "no_principal_user_id"
    }
  }

  if [snc_user] != "" {
    mutate {
      replace => {
        "event1.idm.read_only_udm.target.user.userid" => "%{snc_user}"
      }
    }
  }
  else if [created_by] != "" {
    mutate {
      replace => {
        "event1.idm.read_only_udm.target.user.userid" => "%{created_by}"
      }
    }
  }

  if [event_created] != "" {
    date {
      match => ["event_created", "yyyy-MM-dd HH:mm:ss"]
    }
  }
  if [timestamp] != "" {
    date {
      match => ["timestamp", "dd-MMM-yyyy HH:mm:ss"]
      target => "event1.idm.read_only_udm.metadata.event_timestamp"
      on_error => "no_event_timestamp"
    }
  }
  mutate {
    replace => {
      "data_sys_id" => "%{data.sys_id}"
    }
    on_error => "no_sys_id"
  }
  if [data_sys_id] != "" {
    mutate {
      replace => {
        "event1.idm.read_only_udm.metadata.product_log_id" => "%{data_sys_id}"
      }
      on_error => "no_product_log_id"
    }
  }
  mutate {
    replace => {
      "data_level" => "%{data.level}"
    }
    on_error => "no_level"
  }
  if [data_level] =~ "(?i)Info" {
    mutate {
      replace => {
        "security_result.severity" => "INFORMATIONAL"
      }
    }
  }
  else if [data_level] =~ "(?i)Error" {
    mutate {
      replace => {
        "security_result.severity" => "ERROR"
      }
    }
  }

  mutate {
    replace => {
      "msg_data" => "%{data.message_data}"
    }
    on_error => "no_message_data"
  }
  if [msg_data] != "" {
    mutate {
      replace => {
        "event1.idm.read_only_udm.metadata.description" => "%{msg_data}"
      }
      on_error => "no_description"
    }
  }
  mutate {
    replace => {
      "data_source" => "%{data.source}"
    }
    on_error => "no_data_source"
  }
  if [data_source] != "" {
    mutate {
      replace => {
        "event1.idm.read_only_udm.principal.resource.name" => "%{data_source}"
      }
      on_error => "no_principal_resource_name"
    }
  }
  if [source] != "" {
    mutate {
      replace => {
        "source_label.key" => "source"
        "source_label.value.string_value" => "%{source}"
      }
      on_error => "no_source_label"
    }
    if [source_label] != "" {
      mutate {
        merge => {
          "event1.idm.read_only_udm.additional.fields" => "source_label"
        }
        on_error => "no_source_label_merge"
      }
    }
  }
  mutate {
    replace => {
      "data_sys_created_on" => "%{data.sys_created_on}"
    }
    on_error => "no_sys_created_on"
  }
  if [data_sys_created_on] != "" {
    date {
      match => ["data_sys_created_on", "yyyy-MM-dd HH:mm:ss"]
      target => "event1.idm.read_only_udm.metadata.collected_timestamp"
      on_error => "no_sys_created_on_date"
    }
  }
  mutate {
    replace => {
      "sys_created_by" => "%{data.sys_created_by}"
    }
    on_error => "no_sys_created_by"
  }
  if [sys_created_by] != "" {
    mutate {
      replace => {
        "event1.idm.read_only_udm.principal.user.userid" => "%{sys_created_by}"
        "has_principal_user" => "true"
      }
      on_error => "sys_created_by_error"
    }
  }
  mutate {
    replace => {
      "data_user" => "%{data.user}"
    }
    on_error => "no_data_user"
  }
  if [data_user] != "" {
    mutate {
      replace => {
        "event1.idm.read_only_udm.principal.user.userid" => "%{data_user}"
        "has_principal_user" => "true"
      }
      on_error => "data_user_error"
    }
  }
  if [source_instance] != "" {
    mutate {
      replace => {
        "event1.idm.read_only_udm.principal.namespace" => "%{source_instance}"
      }
      on_error => "source_instance_error"
    }
  }
  mutate {
    replace => {
      "data_role_name" => "%{data.role}"
    }
    on_error => "no_data_role_name"
  }
  if [data_role_name] != "" {
    mutate {
      replace => {
        "role.name" => "%{data_role_name}"
      }
      on_error => "no_data_role_name_error"
    }
    if ![no_data_role_name_error] {
      mutate {
        merge => {
          "event1.idm.read_only_udm.target.resource.attribute.roles" => "role"
        }
        on_error => "no_data_role_name_merge_error"
      }
    }
  }
  mutate {
    replace => {
      "data_granted_by" => "%{data.granted_by}"
    }
    on_error => "no_data_granted_by"
  }
  if [data_granted_by] != "" {
    mutate {
      replace => {
        "event1.idm.read_only_udm.target.user.userid" => "%{data_granted_by}"
      }
      on_error => "data_granted_by_error"
    }
  }
  mutate {
    replace => {
      "data_state" => "%{data.state}"
    }
    on_error => "no_data_state"
  }
  if [data_state] != "" {
    mutate {
      replace => {
        "security_result.action_details" => "%{data_state}"
      }
      on_error => "data_state_error"
    }
  }

  if [event] in ["Failed Login", "SNC Login", "Admin Login", "Impersonation"] {
    mutate {
      replace => {
        "event1.idm.read_only_udm.extensions.auth.type" => "MACHINE"
        "event_type" => "USER_LOGIN"
      }
    }
  }
  # Security Elevation : Number of times that a security administrator has
  # elevated security for standard users by changing their assigned user role
  # to a high privilege role.
  else if [event] == "Security Elevation" {
    mutate {
      replace => {
        "event_type" => "USER_CHANGE_PERMISSIONS"
      }
    }
  }
  else if [has_principal_user] == "true" {
    mutate {
      replace => {
        "event_type" => "USER_UNCATEGORIZED"
      }
    }
  }
  else {
    mutate {
      replace => {
        "event_type" => "GENERIC_EVENT"
      }
    }
  }

  if [event_type] != "" {
    mutate {
      rename => {
        "event_type" => "event1.idm.read_only_udm.metadata.event_type"
      }
    }
  }
  if [security_result] != "" {
    mutate {
      merge => {
        "event1.idm.read_only_udm.security_result" => "security_result"
      }
    }
  }

  mutate {
    replace => {
      "event1.idm.read_only_udm.metadata.vendor_name" => "SERVICENOW"
      "event1.idm.read_only_udm.metadata.product_name" => "SERVICENOW_SECURITY"
    }
  }

  mutate {
    merge => {
      "@output" => "event1"
    }
  }
}
