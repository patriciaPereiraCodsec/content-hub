# Product: HCL BIGFIX
# Category: Network Management and Optimization
# Supported Format: JSON
# Reference: NA
# Last Updated: 2023-12-08
# Copyright 2023 Chronicle LLC

filter {
  mutate {
    replace => {
      "OperatingSystemType" => ""
      "OperatingSystemRole" => ""
      "DNS_Name" => ""
      "User_Name" => ""
      "Domain Role" => ""
      "WMI_Asset_ID" => ""
      "WMI_Service_Tag" => ""
      "CIDR_Subnet_String" => ""
    }
  }
  mutate {
    gsub => ["message","xml version=\"([0-9.]+)\" encoding=\"([a-zA-Z0-9-]+)\"","xml version=$1 encoding=$2"]
  }
  json {
    source => "message"
    on_error => "not_a_json"
  }
  if [not_a_json] {
    drop {
      tag => "TAG_MALFORMED_MESSAGE"
    }
  }

  date {
    match => ["last_report_time","EEE, dd MMM yyyy HH:mm:ss Z"]
    on_error => "last_report_time_failure"
  }
  mutate {
    replace => {
      "event.idm.entity.metadata.entity_type" => "ASSET"
      "event.idm.entity.metadata.product_name" => "HCL Big Fix"
      "event.idm.entity.metadata.vendor_name" => "HCL Software"
      "event.idm.entity.entity.asset.hostname" => "%{client_name}"
    }
  }

  if [MAC_Addresses] != "" {
    mutate {
      replace => {
        "MAC_Addresses" => "{\"MAC_Addresses\":[\"%{MAC_Addresses}\"]}"
      }
    }
    mutate {
      gsub => ["MAC_Addresses", "-", ":"]
    }
    mutate {
      gsub => ["MAC_Addresses", ",", "\",\""]
    }
    json {
      source => "MAC_Addresses"
      array_function => "split_columns"
    }

    for macs in MAC_Addresses {
      mutate {
        merge => {
          "event.idm.entity.entity.asset.mac" => "macs"
        }
      }
    }
  }

  if [SerialNumber] != "" {
    mutate {
      replace => {
        "event.idm.entity.entity.asset.product_object_id" => "%{SerialNumber}"
      }
    }
  }
  else {
    mutate {
      replace => {
        "event.idm.entity.metadata.entity_type" => "USER"
      }
    }
  }

  # Principal > Asset
  mutate {
    replace => {
      "hardware.serial_number" => "%{Computer_Serial_Number}"
      "hardware.manufacturer" => "%{Computer_Manufacturer}"
      "hardware.model" => "%{Computer_Model}"
    }
    merge => {
      "event.idm.entity.entity.asset.hardware" => "hardware"
    }
  }
  if [WindowsOperatingSystem] != "" {
    mutate {
      replace => {
        "software.name" => "%{WindowsOperatingSystem}"
      }
      merge => {
        "event.idm.entity.entity.asset.software" => "software"
      }
    }
  }
  mutate {
    replace => {
      "event.idm.entity.entity.asset.platform_software.platform_version" => "%{OS}"
    }
  }
  if [OperatingSystemType] not in ["","Unix"] {
     mutate {
      uppercase => ["OperatingSystemType"]
    }
    mutate {
      replace => {
        "event.idm.entity.entity.asset.platform_software.platform" => "%{OperatingSystemType}"
      }
    }
  }
  if [OperatingSystemRole] != "" {
     mutate {
      uppercase => ["OperatingSystemRole"]
    }
    mutate {
      replace => {
        "event.idm.entity.entity.asset.type" => "%{OperatingSystemRole}"
      }
    }
  }
  if [WMI_Asset_ID] not in ["","N/A"] {
    mutate {
      replace => {
        "event.idm.entity.entity.asset.asset_id" => "Asset Id:%{WMI_Asset_ID}"
      }
    }
  }
  # Principal > Domain
  if [DNS_Name] != "" {
    mutate {
      replace => {
        "event.idm.entity.entity.domain.name" => "%{DNS_Name}"
      }
    }
  }
  # Principal > User
  if [User_Name] not in ["","<none>"] {
    mutate {
      replace => {
        "event.idm.entity.entity.user.user_display_name" => "%{User_Name}"
      }
    }
  }
  if [Active_Directory_Path] not in ["","<none>"] {
    mutate {
      merge => {
        "event.idm.entity.entity.user.group_identifiers" => "Active_Directory_Path"
      }
    }
  }
  mutate {
    rename => {
      "Domain Role" => "user_role"
    }
  }

  if [user_role] != "" {
    mutate {
      replace => {
        "role.name" => "%{user_role}"
      }
    }
    mutate {
      merge => {
        "event.idm.entity.entity.user.attribute.roles" => "role"
      }
    }
  }
  if [WMI_Service_Tag] != "" {
    mutate {
      replace => {
        "event.idm.entity.entity.user.product_object_id" => "%{WMI_Service_Tag}"
      }
    }
  }
  if [CloudInfo] != "" {
    mutate {
      gsub => ["CloudInfo", '"','']
    }
    mutate {
      replace => {
        "CloudInfo_label.value" => "%{CloudInfo}"
      }
      on_error => "CloudInfo_empty"
    }
    if ![CloudInfo_empty] {
      mutate {
        replace => {
          "CloudInfo_label.key" => "CloudInfo"
        }
      }
      mutate {
        merge => {
          "event.idm.entity.entity.labels" => "CloudInfo_label"
        }
        on_error => "CloudInfo_label_empty"
      }
    }
  }
  if [WMI_Service_Tag] == "" and [SerialNumber] == "" {
    drop {
      tag => "TAG_MALFORMED_MESSAGE"
    }
  }
  mutate {
    replace => {
      "event.idm.entity.entity.user.userid" => "%{client_id}"
    }
  }
  mutate {
    merge => {
      "@output" => "event"
    }
  }
}
