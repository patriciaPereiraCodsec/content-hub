        }
        on_error => "invalid_ipData_Bytes_label"
      }
    }
    mutate {
      replace => {
        "ipData_Packets_label.value.string_value" => "%{ipData.Packets}"
      }
      on_error => "invalid_ipData_Packets"
    }
    if ![invalid_ipData_Packets] {
      mutate {
        replace => {
          "ipData_Packets_label.key" => "%{index} ReportData.DestinationIPs.Packets"
        }
      }
      mutate {
        merge => {
          "additional.fields" => "ipData_Packets_label"
        }
        on_error => "invalid_ipData_Packets_label"
      }
    }
  }

  for index,ipData in Data.ReportData.TopSourceIPs {
    mutate {
      replace => {
        "ipData_name_label" => ""
        "ipData_Bytes_label" => ""
        "ipData_Packets_label" => ""
      }
    }

    mutate {
      convert => {
        "index" => "string"
      }
      on_error => "invalid_index"
    }

    mutate {
      replace => {
        "ipData_name_label.value.string_value" => "%{ipData.Name}"
      }
      on_error => "invalid_ipData_name"
    }
    if ![invalid_ipData_name] {
      mutate {
        replace => {
          "ipData_name_label.key" => "%{index} ReportData.TopSourceIPs.Name"
        }
      }
      mutate {
        merge => {
          "additional.fields" => "ipData_name_label"
        }
        on_error => "invalid_ipData_name_label"
      }
    }
    mutate {
      replace => {
        "ipData_Bytes_label.value.string_value" => "%{ipData.Bytes}"
      }
      on_error => "invalid_ipData_Bytes"
    }
    if ![invalid_ipData_Bytes] {
      mutate {
        replace => {
          "ipData_Bytes_label.key" => "%{index} ReportData.TopSourceIPs.Bytes"
        }
      }
      mutate {
        merge => {
          "additional.fields" => "ipData_Bytes_label"
        }
        on_error => "invalid_ipData_Bytes_label"
      }
    }
    mutate {
      replace => {
        "ipData_Packets_label.value.string_value" => "%{ipData.Packets}"
      }
      on_error => "invalid_ipData_Packets"
    }
    if ![invalid_ipData_Packets] {
      mutate {
        replace => {
          "ipData_Packets_label.key" => "%{index} ReportData.TopSourceIPs.Packets"
        }
      }
      mutate {
        merge => {
          "additional.fields" => "ipData_Packets_label"
        }
        on_error => "invalid_ipData_Packets_label"
      }
    }
  }

  for index,sourceAsn in Data.ReportData.TopSourceASNs {
    mutate {
      replace => {
        "sourceAsn_name_label" => ""
        "sourceAsn_Bytes_label" => ""
        "sourceAsn_Packets_label" => ""
      }
    }

    mutate {
      convert => {
        "index" => "string"
      }
      on_error => "invalid_index"
    }

    mutate {
      replace => {
        "sourceAsn_name_label.value.string_value" => "%{sourceAsn.Name}"
      }
      on_error => "invalid_sourceAsn_name"
    }
    if ![invalid_sourceAsn_name] {
      mutate {
        replace => {
          "sourceAsn_name_label.key" => "%{index} ReportData.TopSourceASNs.Name"
        }
      }
      mutate {
        merge => {
          "additional.fields" => "sourceAsn_name_label"
        }
        on_error => "invalid_sourceAsn_name_label"
      }
    }
    mutate {
      replace => {
        "sourceAsn_Bytes_label.value.string_value" => "%{sourceAsn.Bytes}"
      }
      on_error => "invalid_sourceAsn_Bytes"
    }
    if ![invalid_sourceAsn_Bytes] {
      mutate {
        replace => {
          "sourceAsn_Bytes_label.key" => "%{index} ReportData.TopSourceASNs.Bytes"
        }
      }
      mutate {
        merge => {
          "additional.fields" => "sourceAsn_Bytes_label"
        }
        on_error => "invalid_sourceAsn_Bytes_label"
      }
    }
    mutate {
      replace => {
        "sourceAsn_Packets_label.value.string_value" => "%{sourceAsn.Packets}"
      }
      on_error => "invalid_sourceAsn_Packets"
    }
    if ![invalid_sourceAsn_Packets] {
      mutate {
        replace => {
          "sourceAsn_Packets_label.key" => "%{index} ReportData.TopSourceASNs.Packets"
        }
      }
      mutate {
        merge => {
          "additional.fields" => "sourceAsn_Packets_label"
        }
        on_error => "invalid_sourceAsn_Packets_label"
      }
    }
  }

  for index,sourcePort in Data.ReportData.TopSourcePorts {
    mutate {
      replace => {
        "sourcePort_name_label" => ""
        "sourcePort_Bytes_label" => ""
        "sourcePort_Packets_label" => ""
      }
    }

    mutate {
      convert => {
        "index" => "string"
      }
      on_error => "invalid_index"
    }

    mutate {
      replace => {
        "sourcePort_name_label.value.string_value" => "%{sourcePort.Name}"
      }
      on_error => "invalid_sourcePort_name"
    }
    if ![invalid_sourcePort_name] {
      mutate {
        replace => {
          "sourcePort_name_label.key" => "%{index} ReportData.TopSourcePorts.Name"
        }
      }
      mutate {
        merge => {
          "additional.fields" => "sourcePort_name_label"
        }
        on_error => "invalid_sourcePort_name_label"
      }
    }
    mutate {
      replace => {
        "sourcePort_Bytes_label.value.string_value" => "%{sourcePort.Bytes}"
      }
      on_error => "invalid_sourcePort_Bytes"
    }
    if ![invalid_sourcePort_Bytes] {
      mutate {
        replace => {
          "sourcePort_Bytes_label.key" => "%{index} ReportData.TopSourcePorts.Bytes"
        }
      }
      mutate {
        merge => {
          "additional.fields" => "sourcePort_Bytes_label"
        }
        on_error => "invalid_sourcePort_Bytes_label"
      }
    }
    mutate {
      replace => {
        "sourcePort_Packets_label.value.string_value" => "%{sourcePort.Packets}"
      }
      on_error => "invalid_sourcePort_Packets"
    }
    if ![invalid_sourcePort_Packets] {
      mutate {
        replace => {
          "sourcePort_Packets_label.key" => "%{index} ReportData.TopSourcePorts.Packets"
        }
      }
      mutate {
        merge => {
          "additional.fields" => "sourcePort_Packets_label"
        }
        on_error => "invalid_sourcePort_Packets_label"
      }
    }
  }

  for index,dstPort in Data.ReportData.TopDestinationPorts {
    mutate {
      replace => {
        "dstPort_name_label" => ""
        "dstPort_Bytes_label" => ""
        "dstPort_Packets_label" => ""
      }
    }

    mutate {
      convert => {
        "index" => "string"
      }
      on_error => "invalid_index"
    }

    mutate {
      replace => {
        "dstPort_name_label.value.string_value" => "%{dstPort.Name}"
      }
      on_error => "invalid_dstPort_name"
    }
    if ![invalid_dstPort_name] {
      mutate {
        replace => {
          "dstPort_name_label.key" => "%{index} ReportData.TopDestinationPorts.Name"
        }
      }
      mutate {
        merge => {
          "additional.fields" => "dstPort_name_label"
        }
        on_error => "invalid_dstPort_name_label"
      }
    }
    mutate {
      replace => {
        "dstPort_Bytes_label.value.string_value" => "%{dstPort.Bytes}"
      }
      on_error => "invalid_dstPort_Bytes"
    }
    if ![invalid_dstPort_Bytes] {
      mutate {
        replace => {
          "dstPort_Bytes_label.key" => "%{index} ReportData.TopDestinationPorts.Bytes"
        }
      }
      mutate {
        merge => {
          "additional.fields" => "dstPort_Bytes_label"
        }
        on_error => "invalid_dstPort_Bytes_label"
