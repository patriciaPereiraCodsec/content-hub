    mutate {
      replace => {
        "dstPort_Packets_label.value.string_value" => "%{dstPort.Packets}"
      }
      on_error => "invalid_dstPort_Packets"
    }
    if ![invalid_dstPort_Packets] {
      mutate {
        replace => {
          "dstPort_Packets_label.key" => "%{index} ReportData.TopDestinationPorts.Packets"
        }
      }
      mutate {
        merge => {
          "additional.fields" => "dstPort_Packets_label"
        }
        on_error => "invalid_dstPort_Packets_label"
      }
    }
  }

  if [Title] != "" {
    mutate {
      replace => {
        "security_result.summary" => "%{Title}"
      }
      on_error => "invalid_title"
    }
  }

  if [Event] != "" {
    mutate {
      replace => {
        "metadata.product_event_type" => "%{Event}"
      }
      on_error => "invalid_event"
    }
  }


  if [has_principal] == "true" {
    mutate {
      replace => {
        "event_type" => "STATUS_UPDATE"
      }
    }
  }
  if [event_type] != "" {
    mutate {
      replace => {
        "metadata.event_type" => "%{event_type}"
      }
    }
  }
  else {
    mutate {
      replace => {
        "metadata.event_type" => "GENERIC_EVENT"
      }
    }
  }
  mutate {
    replace => {
      "metadata.product_name" => "UPX ANTIDDOS"
      "metadata.vendor_name" => "UPX ANTIDDOS"
    }
  }

  if [principal] != "" {
    mutate {
      rename => {
        "principal" => "event.idm.read_only_udm.principal"
      }
    }
  }

  if [target] != "" {
    mutate {
      rename => {
        "target" => "event.idm.read_only_udm.target"
      }
    }
  }

  if [network] != "" {
    mutate {
      rename => {
        "network" => "event.idm.read_only_udm.network"
      }
    }
  }

  if [metadata] != "" {
    mutate {
      rename => {
        "metadata" => "event.idm.read_only_udm.metadata"
      }
    }
  }

  if [additional] != "" {
    mutate {
      rename => {
        "additional" => "event.idm.read_only_udm.additional"
      }
    }
  }

  if [security_result] != "" {
    mutate {
      merge => {
        "event.idm.read_only_udm.security_result" => "security_result"
      }
      on_error => "sec_result_error"
    }
  }

  mutate {
    merge => {
      "@output" => "event"
    }
  }
}
