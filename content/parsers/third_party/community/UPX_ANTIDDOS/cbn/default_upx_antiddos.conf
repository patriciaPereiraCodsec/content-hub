# Product: UPX_ANTIDDOS
# Category: DDOS Mitigation
# Supported Format: JSON
# Reference: NA
# Last Updated: 2025-02-13
# Copyright 2025 Chronicle LLC

filter {
  mutate {
    replace => {
      "security_result" => ""
      "event_type" => ""
      "metadata" => ""
      "principal" => ""
      "additional" => ""
      "has_principal" => "false"
      "has_target" => "false"
      "target" => ""
      "network" => ""
      "Timestamp" => ""
      "Source" => ""
      "SourceID" => ""
      "Message" => ""
      "Data.Prefixes" => ""
      "Data.Signatures" => ""
      "Data.ScrubbingCenters" => ""
      "Data.Types" => ""
      "Data.TotalLeafs" => ""
      "Data.NetworkDepth" => ""
      "Data.Duration" => ""
      "Data.StartDate" => ""
      "Title" => ""
      "Event" => ""
    }
  }

  json {
    source => "message"
    array_function => "split_columns"
    on_error => "not_json"
  }

  if [not_json] {
    drop {
      tag => "TAG_MALFORMED_MESSAGE"
    }
  }
  if [Timestamp] != "" {
    date {
      match => ["Timestamp","yyyy-MM-ddTHH:mm:ss","ISO8601"]
      target => "metadata.event_timestamp"
      on_error => "invalid_timestamp"
    }
  }
  if [Source] != "" {
    mutate {
      replace => {
        "source_label.key" => "Source"
        "source_label.value" => "%{Source}"
      }
      on_error => "invalid_source"
    }
    if ![invalid_source] {
      mutate {
        merge => {
          "principal.resource.attribute.labels" => "source_label"
        }
        on_error => "invalid_source_label"
      }
    }
  }
  if [SourceID] != "" {
    mutate {
      replace => {
        "source_id.key" => "SourceID"
        "source_id.value" => "%{SourceID}"
      }
      on_error => "invalid_source_id"
    }
    if ![invalid_source_id] {
      mutate {
        merge => {
          "principal.resource.attribute.labels" => "source_id"
        }
        on_error => "invalid_source_id_label"
      }
    }
  }
  if [Message] != "" {
    mutate {
      replace => {
        "metadata.description" => "%{Message}"
      }
      on_error => "invalid_message"
    }
  }
  if [Data][Prefixes] != "" {
    grok {
      match => {
        "Data.Prefixes" => ["%{IP:src_ip}/%{INT:src_port}"]
      }
      overwrite => ["src_ip","src_port"]
      on_error => "invalid_prefixes"
    }
    if ![invalid_prefixes] {
      mutate {
        merge => {
          "principal.ip" => "src_ip"
          "principal.asset.ip" => "src_ip"
        }
        on_error => "invalid_principal_ip"
      }
      mutate {
        replace => {
          "has_principal" => "true"
        }
      }
      if [src_port] != "" {
        mutate {
          replace => {
            "principal.port" => "%{src_port}"
          }
          on_error => "invalid_principal_port"
        }
        mutate {
          convert => {
            "principal.port" => "integer"
          }
          on_error => "invalid_principal_port"
        }
      }
    }
  }

  if [Data][Signatures] != "" {
    mutate {
      replace => {
        "signatures_label.key" => "Signatures"
        "signatures_label.value.string_value" => "%{Data.Signatures}"
      }
      on_error => "invalid_signatures"
    }
    if ![invalid_signatures] {
      mutate {
        merge => {
          "additional.fields" => "signatures_label"
        }
        on_error => "invalid_signatures_label"
      }
    }
  }
  if [Data][ScrubbingCenters] != "" {
    mutate {
      replace => {
        "scrubbing_centers_label.key" => "ScrubbingCenters"
        "scrubbing_centers_label.value.string_value" => "%{Data.ScrubbingCenters}"
      }
      on_error => "invalid_scrubbing_centers"
    }
    if ![invalid_scrubbing_centers] {
      mutate {
        merge => {
          "additional.fields" => "scrubbing_centers_label"
        }
        on_error => "invalid_scrubbing_centers_label"
      }
    }
  }
  if [Data][Types] != "" {
    mutate {
      replace => {
        "types_label.key" => "Types"
        "types_label.value.string_value" => "%{Data.Types}"
      }
      on_error => "invalid_types"
    }
    if ![invalid_types] {
      mutate {
        merge => {
          "additional.fields" => "types_label"
        }
        on_error => "invalid_types_label"
      }
    }
  }
  if [Data][TotalLeafs] != "" {
    mutate {
      convert => {
        "Data.TotalLeafs" => "string"
      }
      on_error => "invalid_total_leafs"
    }
    mutate {
      replace => {
        "total_leafs_label.key" => "TotalLeafs"
        "total_leafs_label.value.string_value" => "%{Data.TotalLeafs}"
      }
      on_error => "invalid_total_leafs"
    }
    if ![invalid_total_leafs] {
      mutate {
        merge => {
          "additional.fields" => "total_leafs_label"
        }
        on_error => "invalid_total_leafs_label"
      }
    }
  }
  if [Data][NetworkDepth] != "" {
    mutate {
      convert => {
        "Data.NetworkDepth" => "string"
      }
      on_error => "invalid_network_depth"
    }
    mutate {
      replace => {
        "network_depth_label.key" => "NetworkDepth"
        "network_depth_label.value.string_value" => "%{Data.NetworkDepth}"
      }
      on_error => "invalid_network_depth"
    }
    if ![invalid_network_depth] {
      mutate {
        merge => {
          "additional.fields" => "network_depth_label"
        }
        on_error => "invalid_network_depth_label"
      }
    }
  }
  if [Data][Duration] != "" {
    mutate {
      convert => {
        "Data.Duration" => "string"
      }
      on_error => "invalid_duration"
    }
    mutate {
      replace => {
        "duration_label.key" => "Duration"
        "duration_label.value.string_value" => "%{Data.Duration}"
      }
      on_error => "invalid_duration"
    }
    if ![invalid_duration] {
      mutate {
        merge => {
          "additional.fields" => "duration_label"
        }
        on_error => "invalid_duration_label"
      }
    }
  }
  if [Data][StartDate] != "" {
    mutate {
      replace => {
        "start_date_label.key" => "StartDate"
        "start_date_label.value.string_value" => "%{Data.StartDate}"
      }
      on_error => "invalid_start_date"
    }
    if ![invalid_start_date] {
      mutate {
        merge => {
          "additional.fields" => "start_date_label"
        }
        on_error => "invalid_start_date_label"
      }
    }
  }

  for index,volume in Data.ReportData.TotalVolume {
    mutate {
      replace => {
        "voulme_name_label" => ""
        "voulme_DisplayName_label" => ""
        "voulme_Bytes_label" => ""
        "volume_Packets_label" => ""
      }
    }
    mutate {
      convert => {
        "index" => "string"
      }
      on_error => "invalid_index"
    }
    mutate {
      replace => {
        "voulme_name_label.value.string_value" => "%{volume.Name}"
      }
      on_error => "invalid_voulme_name"
    }
    if ![invalid_voulme_name] {
      mutate {
        replace => {
          "voulme_name_label.key" => "%{index} ReportData.TotalVolume.Name"
        }
      }
      mutate {
        merge => {
          "additional.fields" => "voulme_name_label"
        }
        on_error => "invalid_voulme_name_label"
      }
    }

    mutate {
      replace => {
        "voulme_DisplayName_label.value.string_value" => "%{volume.DisplayName}"
      }
      on_error => "invalid_voulme_DisplayName"
    }
    if ![invalid_voulme_DisplayName] {
      mutate {
        replace => {
          "voulme_DisplayName_label.key" => "%{index} ReportData.TotalVolume.DisplayName"
        }
      }
      mutate {
        merge => {
          "additional.fields" => "voulme_DisplayName_label"
        }
        on_error => "invalid_voulme_DisplayName_label"
      }
    }

    mutate {
      replace => {
        "voulme_Bytes_label.value.string_value" => "%{volume.Bytes}"
      }
      on_error => "invalid_voulme_Bytes"
    }
    if ![invalid_voulme_Bytes] {
      mutate {
        replace => {
          "voulme_Bytes_label.key" => "%{index} ReportData.TotalVolume.Bytes"
        }
      }
      mutate {
        merge => {
          "additional.fields" => "voulme_Bytes_label"
        }
        on_error => "invalid_voulme_Bytes_label"
      }
    }

    mutate {
      replace => {
        "volume_Packets_label.value.string_value" => "%{volume.Packets}"
      }
      on_error => "invalid_volume_Packets"
    }
    if ![invalid_volume_Packets] {
      mutate {
        replace => {
          "volume_Packets_label.key" => "%{index} ReportData.TotalVolume.Packets"
        }
      }
      mutate {
        merge => {
          "additional.fields" => "volume_Packets_label"
        }
        on_error => "invalid_volume_Packets_label"
      }
    }
  }

  for index,ipData in Data.ReportData.DestinationIPs {
    mutate {
      replace => {
        "ipData_name_label" => ""
        "ipData_Bytes_label" => ""
        "ipData_Packets_label" => ""
      }
    }

    mutate {
      convert => {
        "index" => "string"
      }
      on_error => "invalid_index"
    }

    mutate {
      replace => {
        "ipData_name_label.value.string_value" => "%{ipData.Name}"
      }
      on_error => "invalid_ipData_name"
    }
    if ![invalid_ipData_name] {
