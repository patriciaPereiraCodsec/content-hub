# Product: OORT
# Category: Identity and Access Management
# Supported Format: JSON
# Reference: NA
# Last Updated: 2026-03-09
# Copyright 2026 Google SecOps
filter {
  mutate {
    replace => {
      "version" => ""
      "id" => ""
      "detail-type" => ""
      "detail.id" => ""
      "des_index" => ""
      "time" => ""
      "recommendedaction_present" => "false"
      "detail.title" => ""
      "detaildescription_present" => "false"
      "detail.description" => ""
      "detail.severity" =>""
      "security_result" => ""
      "principal" => ""
      "additional" => ""
      "network" => ""
      "metadata" => ""
      "account" => ""
      "source" => ""
      "has_principal" => "false"
      "has_user" => "false"
      "usersFailing" => ""
      "usersFailing_label" => ""
      "detail.loginDetails" => ""
      "detail.explainabilityDetails" => ""
      "detail.checkId" => ""
      "detail.checkScope" => ""
      "detail.frameworks" => ""
      "detail.published" => ""
      "detail.explainabilityEventIds" => ""
      "detail.userTrustLevel" => ""
      "detailframework_present" => "false"
      "key" => ""
    }
  }
  mutate {
    gsub => ["message" ,'\\\"' ,'\"']
  }
  mutate {
    gsub => ["message", "\\r", ""]
  }
  json {
    source => "message"
    array_function => "split_columns"
    on_error => "invalid_json"
  }
  if [invalid_json] {
   mutate {
      replace => {
        "json_msg" => "{\"record\": %{message}}"
      }
      on_error => "message_not_json"
    }
    mutate {
    gsub => ["json_msg" ,'\\\"' ,'\"']
    }
    json {
      source => "json_msg"
      array_function => "split_columns"
      on_error => "json_msg_failed"
    }
    json {
      source => "record"
      array_function => "split_columns"
      on_error => "record_failed"
    }
  }
  if [version] != "" {
    mutate {
      replace => {
        "metadata.product_version" => "%{version}"
      }
      on_error => "version_error"
    }
  }
  if [id] != "" {
    mutate {
      replace => {
        "metadata.product_log_id" => "%{id}"
      }
      on_error => "id_error"
    }
  }
  if [time] != "" {
    date {
      match => ["time", "ISO8601", "RFC3339", "yyyy-MM-ddTHH:mm:ss.SSSSSSZ"]
      on_error => "time_not_matched"
    }
  }
  mutate {
    replace => {
      "detail_published" => "%{detail.published}"
    }
    on_error => "detail_published_not_found"
  }
  if [detail_published] != "" and ![detail_published_not_found] {
    date {
      match => ["detail.published", "ISO8601"]
      target => "metadata.collected_timestamp"
      on_error => "detail_published_not_matched"
    }
  }
  if [account] != "" {
    mutate {
      replace => {
        "account_label.value" => "%{account}"
        "account_label.key" => "account"
      }
      on_error => "account_label_not_found"
    }
    mutate {
      merge => {
        "security_result.detection_fields" => "account_label"
      }
      on_error => "account_label_merge_error"
    }
  }
  mutate {
    replace => {
      "detail_login" => "%{detail.login}"
    }
    on_error => "detail_login_not_found"
  }
  if ![detail_login_not_found] && [detail_login] != "" {
    mutate {
      replace => {
        "principal.user.user_display_name" => "%{detail_login}"
        "principal.user.userid" => "%{detail_login}"
        "has_user" => "true"
      }
      on_error => "detail_login_not_matched"
    }
  }

  if [source] != "" {
    mutate {
      replace => {
        "source_label.value" => "%{source}"
        "source_label.key" => "source"
      }
      on_error => "source_not_matched"
    }
    mutate {
      merge => {
        "event.idm.read_only_udm.src.labels" => "source_label"
      }
      on_error => "source_label_merge_error"
    }
  }
  if [detail-type] != ""{
    mutate {
      replace => {
        "security_result.summary" => "%{detail-type}"
      }
      on_error => "detail_type_not_matched"
    }
  }
  if [detail][id] != "" {
    mutate {
      replace => {
        "security_result.rule_id" => "%{detail.id}"
      }
      on_error => "detail_id_not_matched"
    }
  }
  if [detail][title] != "" {
    mutate {
      replace => {
        "security_result.rule_name" => "%{detail.title}"
      }
      on_error => "detail_title_not_matched"
    }
  }
  mutate {
    replace => {
      "detail_checkId" => "%{detail.checkId}"
    }
    on_error => "detail_checkId_not_found"
  }
  if ![detail_checkId_not_found] && [detail_checkId] != "" {
    mutate {
      replace => {
        "checkId_label.value" => "%{detail.checkId}"
        "checkId_label.key" => "check_id"
      }
      on_error => "checkId_not_found"
    }
    if ![checkId_not_found] {
      mutate {
        merge => {
          "security_result.detection_fields" => "checkId_label"
        }
        on_error => "checkId_merge_error"
      }
    }
  }
  mutate {
    replace => {
      "detail_checkScope" => "%{detail.checkScope}"
    }
    on_error => "detail_checkScope_not_found"
  }
  if ![detail_checkScope_not_found] && [detail_checkScope] != "" {
    mutate {
      replace => {
        "checkScope_label.value" => "%{detail.checkScope}"
        "checkScope_label.key" => "check_scope"
      }
      on_error => "checkScope_not_found"
    }
    if ![checkScope_not_found] {
      mutate {
        merge => {
          "security_result.detection_fields" => "checkScope_label"
        }
        on_error => "checkScope_merge_error"
      }
    }
  }
  for topic in detail.checkTopics {
    mutate {
      merge => {
        "security_result.category_details" => "topic"
      }
      on_error => "detail_checkTopics_merge_error"
    }
  }
  for detailframework in detail.frameworks {
    mutate {
      replace => {
        "value_array" => ""
      }
    }
    mutate {
      replace => {
        "value_array.string_value" => "%{detailframework}"
      }
      on_error => "additional_detailframework_empty"
    }
    mutate {
      merge => {
        "additional_detailframework.value.list_value.values" => "value_array"
      }
      on_error => "additional_detailframework_not_found"
    }
    if ![additional_detailframework_not_found] {
      mutate {
        replace => {
          "detailframework_present" => "true"
        }
        on_error => "detailframework_present_not_found"
      }
    }
  }
  if [detailframework_present] == "true" {
    mutate {
      replace => {
        "additional_detailframework.key" => "framework"
      }
      on_error => "additional_detailframework_key_not_found"
    }
    mutate {
      merge => {
        "event.idm.read_only_udm.additional.fields" => "additional_detailframework"
      }
      on_error => "additional_detailframework_field_not_found"
    }
  }
  mutate {
    replace => {
      "detail_userTrustLevel" => "%{detail.userTrustLevel}"
    }
    on_error => "detail_userTrustLevel_not_found"
  }
  if [detail_userTrustLevel] != "" {
    mutate {
      replace => {
        "userTrustLevel_label.key" => "user_trust_level"
        "userTrustLevel_label.value" => "%{detail_userTrustLevel}"
      }
      on_error => "userTrustLevel_not_found"
    }
    if ![userTrustLevel_not_found] {
      mutate {
        merge => {
          "principal.user.attribute.labels" => "userTrustLevel_label"
        }
        on_error => "userTrustLevel_merge_error"
      }
    }
  }
  for index, eventId in detail.explainabilityEventIds {
    mutate {
      convert => {
        "index" => "string"
      }
      on_error => "index_conversion_error"
    }
    mutate {
      replace => {
        "explainabilityEventId_label" => ""
      }
    }
    mutate {
      replace => {
        "explainabilityEventId_label.value" => "%{eventId}"
        "explainabilityEventId_label.key" => "explainabilityEventId_%{index}"
      }
      on_error => "explainabilityEventId_not_found"
    }
    if ![explainabilityEventId_not_found] {
      mutate {
        merge => {
          "security_result.detection_fields" => "explainabilityEventId_label"
        }
        on_error => "explainabilityEventId_merge_error"
      }
    }
  }
  if [region] != "" {
    mutate {
      replace => {
        "principal.location.country_or_region" => "%{region}"
      }
      on_error => "region_not_found"
    }
  }
  if [detail][severity] =~ "moderate" {
    mutate {
      replace => {
        "security_result.severity" => "MEDIUM"
      }
      on_error => "severity_not_matched"
    }
  }
  mutate {
    uppercase => ["detail.severity"]
  }
  if [detail][severity] in ["CRITICAL","ERROR","HIGH","INFORMATIONAL","LOW","MEDIUM"] {
    mutate {
      replace => {
        "security_result.severity" => "%{detail.severity}"
        "is_secresult" => "true"
      }
      on_error => "severity_not_matched"
    }
  }
  for recommendedAction in detail.recommendedActions {
    mutate {
      replace => {
        "value_array" => ""
      }
    }
    mutate {
      replace => {
        "value_array.string_value" => "%{recommendedAction}"
      }
      on_error => "additional_recommendedaction_empty"
    }
    mutate {
      merge => {
        "additional_recommendedaction.value.list_value.values" => "value_array"
      }
      on_error => "additional_recommendedaction_not_found"
    }
    if ![additional_recommendedaction_not_found] {
      mutate {
        replace => {
          "recommendedaction_present" => "true"
        }
        on_error => "recommendedaction_present_not_found"
      }
    }
  }
  if [recommendedaction_present] == "true" {
    mutate {
      replace => {
        "additional_recommendedaction.key" => "recommended action"
      }
      on_error => "additional_recommendedaction_key_not_found"
    }
    mutate {
      merge => {
        "event.idm.read_only_udm.additional.fields" => "additional_recommendedaction"
      }
      on_error => "additional_recommendedaction_field_not_found"
    }
  }
  for detaildescription in detail.description {
    mutate {
      replace => {
        "value_array" => ""
      }
    }
    mutate {
      replace => {
        "value_array.string_value" => "%{detaildescription}"
      }
      on_error => "additional_detaildescription_empty"
    }
    mutate {
      merge => {
        "additional_detaildescription.value.list_value.values" => "value_array"
      }
      on_error => "additional_detaildescription_not_found"
    }
    if ![additional_detaildescription_not_found] {
      mutate {
        replace => {
          "detaildescription_present" => "true"
        }
        on_error => "detaildescription_present_not_found"
      }
    }
  }
  if [detaildescription_present] == "true" {
    mutate {
      replace => {
        "additional_detaildescription.key" => "detail description"
      }
      on_error => "additional_detaildescription_key_not_found"
    }
    mutate {
      merge => {
        "event.idm.read_only_udm.additional.fields" => "additional_detaildescription"
      }
      on_error => "additional_detaildescription_field_not_found"
    }
  }

  for data in detail.explainabilityDetails {
    if [data][key] == "ips" {
      grok {
        match => {
          "data.value" => [".*\\\"ipAddress\\\":\\\"%{IP:ip_addr}\\\".*"]
        }
        overwrite => ["ip_addr"]
        on_error => "grok_ip_failed"
      }
      if ![grok_ip_failed] {
        mutate {
          merge => {
            "principal.ip" => "ip_addr"
          }
          on_error => "ip_merge_failed"
        }
        if ![ip_merge_failed] {
          mutate {
            replace => {
              "has_principal" => "true"
            }
          }
        }
      }
    }
    mutate {
      gsub => ["data.value", '[\\[\\]\\\"]', ""]
    }
    if [data][key] == "asnDomains" {
      mutate {
        replace => {
          "network.asn" => "%{data.value}"
        }
        on_error => "asn_not_mapped"
      }
    }
    else if [data][key] != "ips" {
      mutate {
        replace => {
          "explainabilityDetail_label" => ""
        }
      }
      mutate {
        replace => {
          "explainabilityDetail_label.key" => "%{data.key}"
          "explainabilityDetail_label.value" => "%{data.value}"
        }
        on_error => "explainabilityDetail_not_found"
      }
      if ![explainabilityDetail_not_found] {
        mutate {
          merge => {
            "security_result.detection_fields" => "explainabilityDetail_label"
          }
          on_error => "explainabilityDetail_merge_error"
        }
      }
    }
  }
  if [detail][loginDetails] == "" {
    for index, data1 in detail.usersFailing {
      mutate {
        convert => {
          "index" => "string"
        }
        on_error => "index_already_string_usersFailing"
      }
      mutate {
        replace => {
          "usersFailing_label" => "%{data1}"
        }
        on_error => "usersFailing_label_not_found"
      }
      if [usersFailing_label] =~ "^.+@.+$" {
        mutate {
          merge => {
            "principal.user.email_addresses" => "usersFailing_label"
          }
          on_error => "usersFailing_label_not_found"
        }
        mutate {
          replace => {
            "has_user" => "true"
          }
          on_error => "has_user_not_found"
        }
      }
    }
  }
  for index,data in detail.loginDetails {
    mutate {
      convert => {
        "index" => "string"
      }
      on_error => "index_already_string"
    }
    mutate {
      replace => {
        "login_label" => "%{data.login}"
      }
      on_error => "login_label_not_found"
    }
    if [login_label] =~ "^.+@.+$" {
      mutate {
        merge => {
          "principal.user.email_addresses" => "login_label"
        }
        on_error => "login_label_not_found"
      }
      mutate {
        replace => {
          "has_user" => "true"
        }
        on_error => "has_user_not_found"
      }
    }
    for detailindex, detailsdata in data.details {
      mutate {
        convert => {
          "detailindex" => "string"
        }
        on_error => "detailindex_already_string"
      }
      mutate {
        replace => {
          "add_label" => ""
          "detail_key" => ""
          "value" => ""
        }
      }
      mutate {
        replace => {
          "detail_key" => "loginDetails %{index} details %{detailindex} %{detailsdata.key}"
        }
        on_error => "no_key"
      }
      mutate {
        replace => {
          "value" => "%{detailsdata.value}"
        }
        on_error => "no_value"
      }
      if ![no_key] and ![no_value] and [detail_key] !~ "failedSigninDetails" and [detail_key] !~ "ips" {
        mutate {
          replace => {
            "add_label.value" => "%{value}"
            "add_label.key" => "%{detail_key}"
          }
          on_error => "add_label_not_found"
        }
        mutate {
          merge => {
            "security_result.detection_fields" => "add_label"
          }
          on_error => "merge_error"
        }
      }

      if [value] =~ "^[[{}]" {
        mutate {
          replace => {
            "value_json" => ""
            "json_array" => ""
          }
        }
        mutate {
          replace => {
            "value_json" => "{\"json_array\":%{value}}"
          }
          on_error => "value_json_not_found"
        }
        mutate {
          gsub => ["value_json", 'false', '"false"']
        }
        mutate {
          gsub => ["value_json", 'true', '"true"']
        }
        json {
          source => "value_json"
          array_function => "split_columns"
          on_error => "value_json_parse_failure"
        }
        if ![value_json_parse_failure] {
          for index1, msg in json_array {
            mutate {
              convert => {
                "index1" => "string"
              }
              on_error => "index1_not_found"
            }
            mutate {
              replace => {
                "msg_ipAddress" => ""
                "msg_travels_first_event_ip_address" => ""
                "msg_travels_second_event_ip_address" => ""
              }
            }
            mutate {
              convert => {
                "msg.hitCount" => "string"
              }
              on_error => "hitCount_already_string"
            }
            mutate {
              convert => {
                "msg.num_score" => "string"
              }
              on_error => "num_score_already_string"
            }
            mutate {
              convert => {
                "msg.ipInfo.latitude" => "string"
              }
              on_error => "latitude_already_string"
            }
            mutate {
              convert => {
                "msg.ipInfo.longitude" => "string"
              }
              on_error => "longitude_already_string"
            }
            mutate {
              convert => {
                "msg.coordinates.latitude" => "string"
              }
              on_error => "coordinates_latitude_already_string"
            }
            mutate {
              convert => {
                "msg.coordinates.longitude" => "string"
              }
              on_error => "coordinates_longitude_already_string"
            }
            mutate {
              convert => {
                "msg.first_event.lat" => "string"
              }
              on_error => "first_event_lat_already_string"
            }
            mutate {
              convert => {
                "msg.first_event.lng" => "string"
              }
              on_error => "first_event_lng_already_string"
            }
            mutate {
              convert => {
                "msg.second_event.lat" => "string"
              }
              on_error => "second_event_lat_already_string"
            }
            mutate {
              convert => {
                "msg.second_event.lng" => "string"
              }
              on_error => "second_event_lng_already_string"
            }
            mutate {
              convert => {
                "msg.distance" => "string"
              }
              on_error => "distance_already_string"
            }
            mutate {
              convert => {
                "msg.velocity_m_s" => "string"
              }
              on_error => "velocity_m_s_already_string"
            }
            mutate {
              convert => {
                "msg.first_event.device_age" => "string"
              }
              on_error => "device_age_already_string"
            }
            mutate {
              convert => {
                "msg.second_event.device_age" => "string"
              }
              on_error => "device_age_already_string"
            }
            mutate {
              convert => {
                "msg.first_event.ip_prevalence" => "string"
              }
              on_error => "ip_prevalence_already_string"
            }
             mutate {
              convert => {
                "msg.second_event.ip_prevalence" => "string"
              }
              on_error => "ip_prevalence_already_string"
            }
            mutate {
              convert => {
                "msg.first_event.tenant_isp_prevalence" => "string"
              }
              on_error => "tenant_isp_prevalence_already_string"
            }
            mutate {
              convert => {
                "msg.second_event.tenant_isp_prevalence" => "string"
              }
              on_error => "tenant_isp_prevalence_already_string"
            }
            mutate {
              convert => {
                "msg.first_event.user_ip_age" => "string"
              }
              on_error => "user_ip_age_already_string"
            }
            mutate {
              convert => {
                "msg.second_event.user_ip_age" => "string"
              }
              on_error => "user_ip_age_already_string"
            }
            mutate {
              convert => {
                "msg.first_event.user_isp_prevalence" => "string"
              }
              on_error => "user_isp_prevalence_already_string"
            }
            mutate {
              convert => {
                "msg.second_event.user_isp_prevalence" => "string"
                }
              on_error => "user_isp_prevalence_already_string"
            }
            for key, value in  msg map {
              mutate {
                replace => {
                  "field_" => ""
                }
              }
              mutate {
                replace => {
                  "check_" => "%{value}"
                }
                on_error => "value_not_exists"
              }
              if ![value_not_exists] and [value] != "" and [key] != "ipAddress" and [key] != "ip" {
                mutate {
                  replace => {
                    "field_.value" => "%{value}"
                  }
                  on_error => "msg_value_not_found"
                }
                mutate {
                  replace => {
                    "field_.key" => "%{index} %{detailindex} %{index1} %{key}"
                  }
                  on_error => "msg_key_not_found"
                }
                mutate {
                  merge => {
                    "security_result.detection_fields" => "field_"
                  }
                  on_error => "msg_merge_error"
                }
              }
            }
            for key, value in  msg.ipInfo map {
              mutate {
                replace => {
                  "field_" => ""
                }
              }
              mutate {
                replace => {
                  "check_" => "%{value}"
                }
                on_error => "value_not_exists"
              }
              if ![value_not_exists] and [value] != "-" {
                mutate {
                  replace => {
                    "field_.value" => "%{value}"
                  }
                  on_error => "msg_ipInfo_value_not_found"
                }
                mutate {
                  replace => {
                    "field_.key" => "%{index} %{detailindex} %{index1} ipInfo %{key}"
                  }
                  on_error => "msg_ipInfo_key_not_found"
                }
                mutate {
                  merge => {
                    "security_result.detection_fields" => "field_"
                  }
                  on_error => "msg_ipInfo_merge_error"
                }
              }
            }
            for key, value in  msg.asn map {
              mutate {
                replace => {
                  "field_" => ""
                }
              }
              mutate {
                replace => {
                  "check_" => "%{value}"
                }
                on_error => "value_not_exists"
              }
              if ![value_not_exists] and [value] != "-" {
                mutate {
                  replace => {
                    "field_.value" => "%{value}"
                  }
                }
                mutate {
                  replace => {
                    "field_.key" => "%{index} %{detailindex} %{index1} asn %{key}"
                  }
                }
                mutate {
                  merge => {
                    "security_result.detection_fields" => "field_"
                  }
                }
              }
            }
            for key, value in  msg.coordinates map {
              mutate {
                replace => {
                  "field_" => ""
                }
                on_error => "coordinates_field_not_found"
              }
              mutate {
                replace => {
                  "check_" => "%{value}"
                }
                on_error => "value_not_exists"
              }
              if ![value_not_exists] and [value] != "-" {
                mutate {
                  replace => {
                    "field_.value" => "%{value}"
                  }
                  on_error => "coordinates_value_not_found"
                }
                mutate {
                  replace => {
                    "field_.key" => "%{index} %{detailindex} %{index1} coordinates %{key}"
                  }
                  on_error => "coordinates_key_not_found"
                }
                mutate {
                  merge => {
                    "security_result.detection_fields" => "field_"
                  }
                  on_error => "coordinates_merge_error"
                }
              }
            }
            for key, value in  msg.first_event map {
              mutate {
                replace => {
                  "field_" => ""
                }
                on_error => "first_event_field_not_found"
              }
