# Product: Fortinet FortiDDoS
# Category: Network
# Supported Format: KV
# Reference: NA
# Last Updated: 2025-01-10
# Copyright 2025 Chronicle LLC

filter {
  mutate {
    replace => {
      "devid" => ""
      "type" => ""
      "tz" => ""
      "time" => ""
      "date" => ""
      "spp" => ""
      "evecode" => ""
      "evesubcode" => ""
      "desc_Data" => ""
      "dir" => ""
      "sip" => ""
      "dip" => ""
      "user" => ""
      "dport" => ""
      "dropcount" => ""
      "subnetid" => ""
      "facility" => ""
      "level" => ""
      "direction" => ""
      "spp_name" => ""
      "msg_id" => ""
      "log_id" => ""
      "subtype" => ""
      "subnet_name" => ""
      "sppoperatingmode" => ""
      "security_result" => ""
      "metadata" => ""
      "principal" => ""
      "additional" => ""
      "target" => ""
      "network" => ""
      "has_principal" => "false"
      "has_target" => "false"
      "event_type" => ""
      "has_principal_user" => "false"
    }
  }


  grok {
    match => {
      "message" => [
        '%{GREEDYDATA:kv_1} description=%{DATA:desc_Data}" %{GREEDYDATA:kv_2} ',
        '<%{INT}>%{GREEDYDATA:kv_3}'
      ]
    }
    on_error => "not_grok_data"
    overwrite => ["kv_1", "kv_2","desc_Data"]
  }

  kv {
    source => "kv_1"
    value_split => "="
    field_split => " "
    on_error => "not_kv_data"
  }
  kv {
    source => "kv_3"
    value_split => "="
    field_split => ","
    on_error => "not_kv_data"
  }

  if [devid] != "" {
    mutate {
      replace => {
        "src_label.value.string_value" => "%{devid}"
        "src_label.key" => "device_id"
      }
      on_error => "invalid_device_id"
    }
    if [invalid_device_id] != "" {
      mutate {
        merge => {
          "additional.fields" => "src_label"
        }
      }
    }
  }
  if [type] != "" {
    mutate {
      replace => {
        "additional_label.value.string_value" => "%{type}"
        "additional_label.key" => "type"
      }
      on_error => "invalid_type"
    }
    if [invalid_type] != "" {
      mutate {
        merge => {
          "additional.fields" => "additional_label"
        }
      }
    }
  }
  if [tz] != "" && [time] != "" && [date] != "" {
    mutate {
      replace => {
        "date_label.value" => "%{date} %{time} %{tz}"
        "date_label.key" => "date"
      }
      on_error => "date_label_error"
    }
    if ![date_label_error] {
      mutate {
        merge => {
          "principal.labels" => "date_label"
        }
        on_error => "date_label_error"
      }
    }
  }

  if [spp] != "" {
    mutate {
      replace => {
        "spp_label.value" => "%{spp}"
      }
      on_error => "spp_label_error"
    }
    if ![spp_label_error] {
      mutate {
        replace => {
          "spp_label.key" => "spp"
        }
      }
      mutate {
        merge => {
          "security_result.detection_fields" => "spp_label"
        }
        on_error => "spp_label_error"
      }
    }
  }
  if [evecode] != "" {
    mutate {
      replace => {
        "evecode_label.value" => "%{evecode}"
      }
      on_error => "evecode_label_error"
    }
    if ![evecode_label_error] {
      mutate {
        replace => {
          "evecode_label.key" => "evecode"
        }
      }
      mutate {
        merge => {
          "security_result.detection_fields" => "evecode_label"
        }
        on_error => "evecode_label_error"
      }
    }
  }
  if [evesubcode] != "" {
    mutate {
      replace => {
        "evesubcode_label.value" => "%{evesubcode}"
      }
      on_error => "evesubcode_label_error"
    }
    if ![evesubcode_label_error] {
      mutate {
        replace => {
          "evesubcode_label.key" => "evesubcode"
        }
      }
      mutate {
        merge => {
          "security_result.detection_fields" => "evesubcode_label"
        }
        on_error => "evesubcode_label_error"
      }
    }
  }
  if [desc_Data] != "" {
    mutate {
      replace => {
        "metadata.description" => "%{desc_Data}"
      }
      on_error => "desc_Data_error"
    }
  }
  kv {
    source => "kv_2"
    value_split => "="
    field_split => " "
    on_error => "not_kv_data"
  }
  if [dir] != "" {
    mutate {
      replace => {
        "direction_label.value" => "%{dir}"
      }
      on_error => "direction_label_error"
    }
    if ![direction_label_error] {
      mutate {
        replace => {
          "direction_label.key" => "direction"
        }
      }
      mutate {
        merge => {
          "principal.labels" => "direction_label"
        }
        on_error => "direction_label_error"
      }
    }
  }
  if [msg_id] != "" {
    mutate {
      replace => {
        "msg_id_label.value" => "%{msg_id}"
      }
      on_error => "msg_id_label_error"
    }
    if ![msg_id_label_error] {
      mutate {
        replace => {
          "msg_id_label.key" => "msg_id"
        }
      }
      mutate {
        merge => {
          "security_result.detection_fields" => "msg_id_label"
        }
        on_error => "msg_id_label_error"
      }
    }
  }
  if [sip] != "" {
    mutate {
      merge => {
        "principal.ip" => "sip"
        "principal.asset.ip" => "sip"
      }
      on_error => "sip_error"
    }
    mutate {
      replace => {
        "has_principal" => "true"
      }
      on_error => "sip_error"
    }
  }
  if [dip] != "" {
    mutate {
      merge => {
        "target.ip" => "dip"
        "target.asset.ip" => "dip"
      }
      on_error => "dip_failure"
    }
    mutate {
      replace => {
        "has_target" => "true"
      }
      on_error => "dip_error"
    }
  }

  if [dport] != "" {
    mutate {
      replace => {
        "principal.port" => "%{dport}"
      }
      on_error => "dport_error"
    }
    mutate {
      convert => {
        "principal.port" => "integer"
      }
      on_error => "dport_error"
    }
  }
  if [dropcount] != "" {
    mutate {
      replace => {
        "dropcount_label.value" => "%{dropcount}"
      }
      on_error => "dropcount_label_error"
    }
    if ![evecode_label_error] {
      mutate {
        replace => {
          "dropcount_label.key" => "dropcount"
        }
      }
      mutate {
        merge => {
          "security_result.detection_fields" => "dropcount_label"
        }
        on_error => "dropcount_label_error"
      }
    }
  }
  if [subnetid] != "" {
    mutate {
      replace => {
        "subnetid_label.value" => "%{subnetid}"
      }
      on_error => "subnetid_label_error"
    }
    if ![subnetid_label_error] {
      mutate {
        replace => {
          "subnetid_label.key" => "subnetid"
        }
      }
      mutate {
        merge => {
          "security_result.detection_fields" => "subnetid_label"
        }
        on_error => "subnetid_label_error"
      }
    }
  }
  if [facility] != "" {
    mutate {
      replace => {
        "facility_label.value" => "%{facility}"
      }
      on_error => "facility_label_error"
    }
    if ![facility_label_error] {
      mutate {
        replace => {
          "facility_label.key" => "facility"
        }
      }
      mutate {
        merge => {
          "security_result.detection_fields" => "facility_label"
        }
        on_error => "facility_label_error"
      }
    }
  }
  if [level] != "" {
    mutate {
      replace => {
        "level_label.value" => "%{level}"
      }
      on_error => "level_label_error"
    }
    if ![level_label_error] {
      mutate {
        replace => {
          "level_label.key" => "level"
        }
      }
      mutate {
        merge => {
          "security_result.detection_fields" => "level_label"
        }
        on_error => "level_label_error"
      }
    }
  }
  if [direction] != "" {
    mutate {
      replace => {
        "direction_label.value" => "%{direction}"
      }
      on_error => "direction_label_error"
    }
    if ![direction_label_error] {
      mutate {
        replace => {
          "direction_label.key" => "direction"
        }
      }
      mutate {
        merge => {
          "security_result.detection_fields" => "direction_label"
        }
        on_error => "direction_label_error"
      }
    }
  }
  if [spp_name] != "" {
    mutate {
      replace => {
        "spp_name_label.value" => "%{spp_name}"
      }
      on_error => "spp_name_label_error"
    }
    if ![spp_name_label_error] {
      mutate {
        replace => {
          "spp_name_label.key" => "spp_name"
        }
      }
      mutate {
        merge => {
          "security_result.detection_fields" => "spp_name_label"
        }
        on_error => "spp_name_label_error"
      }
    }
  }
  if [subnet_name] != "" {
    mutate {
      replace => {
        "subnet_name_label.key" => "subnet_name"
        "subnet_name_label.value" => "%{subnet_name}"
      }
      on_error => "subnet_name_label_error"
    }
    mutate {
      merge => {
        "security_result.detection_fields" => "subnet_name_label"
      }
      on_error => "subnet_name_label_error"
    }
  }
  if [log_id] != "" {
    mutate {
      replace => {
        "log_id_label.key" => "log_id"
        "log_id_label.value" => "%{log_id}"
      }
      on_error => "log_id_label_error"
    }
    mutate {
      merge => {
        "security_result.detection_fields" => "log_id_label"
      }
      on_error => "log_id_label_error"
    }
  }
  if [subtype] != "" {
    mutate {
      replace => {
        "subtype_label.key" => "subtype"
        "subtype_label.value" => "%{subtype}"
      }
      on_error => "subtype_label_error"
    }
    mutate {
      merge => {
        "security_result.detection_fields" => "subtype_label"
      }
      on_error => "subtype_label_error"
    }
  }
  if [sppoperatingmode] != "" {
    mutate {
      replace => {
        "sppoperatingmode_label.value" => "%{sppoperatingmode}"
      }
      on_error => "sppoperatingmode_label_error"
    }
    if ![sppoperatingmode_label_error] {
      mutate {
        replace => {
          "sppoperatingmode_label.key" => "sppoperatingmode"
        }
      }
      mutate {
        merge => {
          "security_result.detection_fields" => "sppoperatingmode_label"
        }
        on_error => "sppoperatingmode_label_error"
      }
    }
  }
  if [user] != "" {
    mutate {
      replace => {
        "principal.user.userid" => "%{user}"
        "has_principal_user" => "true"
      }
      on_error => "user_error"
    }
  }
  if [metadata] != "" {
    mutate {
      rename => {
        "metadata" => "event.idm.read_only_udm.metadata"
      }
    }
  }
  if [network] != "" {
    mutate {
      rename => {
        "network" => "event.idm.read_only_udm.network"
      }
    }
  }
  if [principal] != "" {
    mutate {
      rename => {
        "principal" => "event.idm.read_only_udm.principal"
      }
    }
  }
  if [additional] != "" {
    mutate {
      rename => {
        "additional" => "event.idm.read_only_udm.additional"
      }
    }
  }

  if [target] != "" {
    mutate {
      rename => {
        "target" => "event.idm.read_only_udm.target"
      }
    }
  }

  if [security_result] != "" {
    mutate {
      merge => {
        "event.idm.read_only_udm.security_result" => "security_result"
      }
      on_error => "security_result_empty"
    }
  }

  if [has_principal] == "true" && [has_target] == "true" {
    mutate {
      replace => {
        "event.idm.read_only_udm.metadata.event_type" => "NETWORK_CONNECTION"
      }
    }
  }
  else if [has_principal_user] == "true" {
    mutate {
      replace => {
        "event.idm.read_only_udm.metadata.event_type" => "USER_UNCATEGORIZED"
      }
    }
  }
  else if [has_principal] == "true" {
    mutate {
      replace => {
      "event.idm.read_only_udm.metadata.event_type" => "STATUS_UPDATE"
      }
    }
  }
  else {
    mutate {
      replace => {
        "event.idm.read_only_udm.metadata.event_type" => "GENERIC_EVENT"
      }
    }
  }

  mutate {
    merge => {
      "@output" => "event"
    }
  }
}
