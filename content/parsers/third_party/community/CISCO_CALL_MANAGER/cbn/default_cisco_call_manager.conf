# Product: CISCO_CALL_MANAGER
# Category: NETWORKING
# Supported Format: SYSLOG
# Reference: N/A
# Last Updated: 2024-10-23
# Copyright 2024 Chronicle LLC

filter {
  mutate {
    replace => {
      "Message" => ""
      "certificate_name" => ""
      "Unit" => ""
      "Type" => ""
      "AppID" => ""
      "ClusterID" => ""
      "NodeID" => ""
      "DeviceName" => ""
      "DeviceType" => ""
      "StationDesc" => ""
      "StationDn" => ""
      "host" => ""
      "ts" => ""
      "kv_data1" => ""
      "msg" => ""
      "kv_data2" => ""
      "USER" => ""
      "COMMAND" => ""
      "metadata" => ""
      "principal" => ""
      "target" => ""
      "event" => ""
      "network" => ""
      "additional" => ""
      "security_result" => ""
      "has_principal" => ""
      "has_user" => ""
    }
  }
  mutate {
    gsub => ["message", "□□", ""]
  }
  mutate {
    gsub => ["Message","\\r\\n",""]
  }
  mutate {
    gsub => ["message", "\\r", ""]
  }
  grok {
    match => {
      "message" => [
        "<%{INT}>%{INT}: : : %{INT}: %{DATA:host}: %{DATA:ts} %{TZ} :%{DATA}: %{GREEDYDATA:kv_data1}: %{GREEDYDATA:msg}"
        "<%{INT}>%{INT}: : %{DATA}: %{INT}: %{DATA:host} %{MONTH:month} %{DATA:ts} %{TZ} :%{DATA}: %{GREEDYDATA:kv_data1}: %{GREEDYDATA:msg}"
        "<%{INT}>%{INT}%{GREEDYDATA}:%{GREEDYDATA:kv_data2}"
      ]
    }
    overwrite => ["host", "ts", "kv_data1", "msg", "kv_data2"]
    on_error => "message_grok_error"
  }
  if [message_grok_error] {
    drop {
      tag => "TAG_MALFORMED_MESSAGE"
    }
  }
  mutate {
    replace => {
      "ts" => "%{month} %{ts}"
    }
    on_error => "date_conversion_failure"
  }
  if [ts] != "" {
    date {
      match => [ "ts", "MMM d yyyy HH:mm:ss.SSS"]
      rebase => true
      on_error => "date_conversion_failure"
    }
  }
  if [host] != "" {
    mutate {
      replace => {
        "principal.hostname" => "%{host}"
        "principal.asset.hostname" => "%{host}"
      }
      on_error => "host_empty"
    }
    if ![host_empty] {
      mutate {
        replace => {
          "has_principal" => "true"
        }
      }
    }
  }
  if [msg] != "" {
    mutate {
      replace => {
        "security_result.summary" => "%{msg}"
      }
      on_error => "message_empty"
    }
  }
  mutate {
    gsub => ["kv_data1", "%", ""]
  }
  mutate {
    gsub => ["kv_data1", "\\[", " "]
  }
  mutate {
    gsub => ["kv_data1", "]", ""]
  }
  mutate {
    gsub => ["kv_data1", ":", "="]
  }
  mutate {
    gsub => ["kv_data1", "Certificate name", "certificate_name"]
  }
  mutate {
    gsub => ["kv_data1", "(\\s+)(\\S+)=", "#$2="]
  }
  kv {
    source => "kv_data1"
    field_split => "#"
    value_split => "="
    on_error => "kv_fail"
  }
  if [Message] != "" {
    mutate {
      replace => {
        "metadata.description" => "%{Message}"
      }
      on_error => "message_empty"
    }
  }
  if [certificate_name] != "" {
    mutate {
      replace => {
        "certificate_name_label.key" => "certificate_name"
        "certificate_name_label.value.string_value" => "%{certificate_name}"
      }
      on_error => "certificate_name_empty"
    }
    if [certificate_name_label] != "" {
      mutate {
        merge => {
          "additional.fields" => "certificate_name_label"
        }
        on_error => "certificate_name_label_empty"
      }
    }
  }
  if [Unit] != "" {
    mutate {
      replace => {
        "Unit_label.key" => "Unit"
        "Unit_label.value.string_value" => "%{Unit}"
      }
      on_error => "Unit_empty"
    }
    if [Unit_label] != "" {
      mutate {
        merge => {
          "additional.fields" => "Unit_label"
        }
        on_error => "Unit_label_empty"
      }
    }
  }
  if [Type] != "" {
    mutate {
      replace => {
        "Type_label.key" => "Type"
        "Type_label.value.string_value" => "%{Type}"
      }
      on_error => "Type_empty"
    }
    if [Type_label] != "" {
      mutate {
        merge => {
          "additional.fields" => "Type_label"
        }
        on_error => "Type_label_empty"
      }
    }
  }
  if [AppID] != "" {
    mutate {
      replace => {
        "AppID_label.key" => "AppID"
        "AppID_label.value.string_value" => "%{AppID}"
      }
      on_error => "AppID_empty"
    }
    if [AppID_label] != "" {
      mutate {
        merge => {
          "additional.fields" => "AppID_label"
        }
        on_error => "AppID_label_empty"
      }
    }
  }
  if [ClusterID] != "" {
    mutate {
      replace => {
        "ClusterID_label.key" => "ClusterID"
        "ClusterID_label.value.string_value" => "%{ClusterID}"
      }
      on_error => "ClusterID_empty"
    }
    if [ClusterID_label] != "" {
      mutate {
        merge => {
          "additional.fields" => "ClusterID_label"
        }
        on_error => "ClusterID_label_empty"
      }
    }
  }
  if [NodeID] != "" {
    mutate {
      replace => {
        "NodeID_label.key" => "NodeID"
        "NodeID_label.value.string_value" => "%{NodeID}"
      }
      on_error => "NodeID_empty"
    }
    if [NodeID_label] != "" {
      mutate {
        merge => {
          "additional.fields" => "NodeID_label"
        }
        on_error => "NodeID_label_empty"
      }
    }
  }
  if [DeviceName] != "" {
    mutate {
      replace => {
        "DeviceName_label.key" => "DeviceName"
        "DeviceName_label.value.string_value" => "%{DeviceName}"
      }
      on_error => "DeviceName_empty"
    }
    if [DeviceName_label] != "" {
      mutate {
        merge => {
          "additional.fields" => "DeviceName_label"
        }
        on_error => "DeviceName_label_empty"
      }
    }
  }
  if [DeviceType] != "" {
    mutate {
      replace => {
        "DeviceType_label.key" => "DeviceType"
        "DeviceType_label.value.string_value" => "%{DeviceType}"
      }
      on_error => "DeviceType_empty"
    }
    if [DeviceType_label] != "" {
      mutate {
        merge => {
          "additional.fields" => "DeviceType_label"
        }
        on_error => "DeviceType_label_empty"
      }
    }
  }
  if [StationDesc] != "" {
    mutate {
      replace => {
        "StationDesc_label.key" => "StationDesc"
        "StationDesc_label.value.string_value" => "%{StationDesc}"
      }
      on_error => "StationDesc_empty"
    }
    if [StationDesc_label] != "" {
      mutate {
        merge => {
          "additional.fields" => "StationDesc_label"
        }
        on_error => "StationDesc_label_empty"
      }
    }
  }
  if [StationDn] != "" {
    mutate {
      replace => {
        "StationDn_label.key" => "StationDn"
        "StationDn_label.value.string_value" => "%{StationDn}"
      }
      on_error => "StationDn_empty"
    }
    if [StationDn_label] != "" {
      mutate {
        merge => {
          "additional.fields" => "StationDn_label"
        }
        on_error => "StationDn_label_empty"
      }
    }
  }
  kv {
    source => "kv_data2"
    field_split => ";"
    value_split => "="
    on_error => "kv_fail"
  }
  if [kv_data2] != "" {
    mutate {
      replace => {
        "metadata.description" => "%{kv_data2}"
      }
      on_error => "kv_data2_empty"
    }
  }
  grok {
    match => {
      "kv_data2" => [
        "user %{DATA:USER} "
      ]
    }
    overwrite => ["USER"]
    on_error => "user_grok_error"
  }
  if [USER] != "" {
    mutate {
      replace => {
        "principal.user.userid" => "%{USER}"
      }
      on_error => "user_empty"
    }
    if ![user_empty] {
      mutate {
        replace => {
          "has_user" => "true"
        }
      }
    }
  }
  if [COMMAND] != "" {
    mutate {
      replace => {
        "principal.process.command_line" => "%{COMMAND}"
      }
      on_error => "COMMAND_empty"
    }
  }
  if [has_principal] == "true" {
    mutate {
      replace => {
        "metadata.event_type" => "STATUS_UPDATE"
      }
    }
  } else if [has_user] == "true" {
    mutate {
      replace => {
        "metadata.event_type" => "USER_UNCATEGORIZED"
      }
    }
  } else {
    mutate {
      replace => {
        "metadata.event_type" => "GENERIC_EVENT"
      }
    }
  }
  mutate {
    replace => {
      "metadata.vendor_name" => "CISCO"
      "metadata.product_name" => "CISCO_CALL_MANAGER"
    }
  }
  if [principal] != "" {
    mutate {
      rename => {
        "principal" => "event.idm.read_only_udm.principal"
      }
    }
  }
  if [target] != "" {
    mutate {
      rename => {
        "target" => "event.idm.read_only_udm.target"
      }
    }
  }
  if [network] != "" {
    mutate {
      rename => {
        "network" => "event.idm.read_only_udm.network"
      }
    }
  }
  if [additional] != "" {
    mutate {
      rename => {
        "additional" => "event.idm.read_only_udm.additional"
      }
    }
  }
  if [metadata] != "" {
    mutate {
      rename => {
        "metadata" => "event.idm.read_only_udm.metadata"
      }
    }
  }
  if [security_result] != "" {
    mutate {
      merge => {
        "event.idm.read_only_udm.security_result" => "security_result"
      }
      on_error => "security_result_empty"
    }
  }
  mutate {
    merge => {
      "@output" => "event"
    }
  }
}
