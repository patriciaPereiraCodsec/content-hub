# Product: QUALYS CONTINOUS MONITORING
# Category: Monitoring
# Supported Format: JSON
# Reference: N/A
# Last Updated: 2022-08-30
# Copyright 2022 Chronicle LLC

filter {
  mutate {
    replace => {
      "Alert.id" => ""
      "Alert.source" => ""
      "Alert.eventType" => ""
      "Alert.qid" => ""
      "Alert.triggerUuid" => ""
      "Alert.vulnTitle" => ""
      "Alert.vulnSeverity" => ""
      "Alert.vulnType" => ""
      "Alert.vulnCategory" => ""
      "Alert.ipAddress" => ""
      "Alert.hostname" => ""
      "Alert.isHidden" => ""
      "Alert.eventDate" => ""
      "Alert.profile.id" => ""
      "Alert.profile.title" => ""
      "Alert.alertInfo.operatingSystem" => ""
      "Alert.alertInfo.port" => ""
      "Alert.alertInfo.protocol" => ""
      "Alert.alertInfo.service" => ""
      "Alert.alertInfo.appName" => ""
      "Alert.alertInfo.appVersion" => ""
      "Alert.alertInfo.sslName" => ""
      "Alert.alertInfo.sslOrg" => ""
      "Alert.alertInfo.sslIssuer" => ""
      "Alert.alertInfo.ticketId" => ""
      "Alert.alertInfo.ticketState" => ""
      "Alert.alertInfo.vpeConfidence" => ""
      "Alert.alertInfo.vpeStatus" => ""
      "security_result" => ""
      "about" => ""
      "src_ip" => ""
      "vulnerability" => ""
      "method" => ""
      "app_protocol" => ""
      "user" => ""
    }
  }

  grok {
    match => {
      "message" => [
        "Host: %{IP:src_ip}",
        "%{WORD:method} /(%{DATA:user}|)? (?P<app_protocol>HTTP).*"
        "%{IP:src_ip}:%{INT:port}"
      ]
    }
    overwrite => ["src_ip","user","method","app_protocol"]
    on_error => "grok_failure"
  }

  json {
    source => "message"
    array_function => "split_columns"
    on_error => "not_json"
  }

  if [Alert][eventDate] != "" {
    date {
      match => ["Alert.eventDate" ,"ISO8601" ,"yyyy-MM-ddTHH:mm:ssZ", "UNIX_MS", "UNIX"]
      rebase => true
    }
  }

  if [app_protocol] != "" {
    mutate {
      replace => {
        "network.application_protocol" => "%{app_protocol}"
      }
    }
  }

  if [method] != "" {
    mutate {
      replace => {
        "network.http.method" => "%{method}"
      }
    }
  }

  if [Alert][ipAddress] != "" {
    mutate {
      merge => {
        "principal.ip" => "Alert.ipAddress"
      }
    }
  }
  else if [src_ip] != "" {
    mutate {
      merge => {
        "principal.ip" => "src_ip"
      }
    }
  }

  if [Alert][hostname] != "" {
    mutate {
      replace => {
        "principal.hostname" => "%{Alert.hostname}"
      }
    }
  }

  if [Alert][alertInfo][protocol] != "" {
    mutate {
      replace => {
        "network.ip_protocol" => "%{Alert.alertInfo.protocol}"
      }
    }
  }

  if [Alert][alertInfo][appVersion] != "" {
    mutate {
      replace => {
        "metadata.product_version" => "%{Alert.alertInfo.appVersion}"
      }
    }
  }

  if [Alert][qid] != "" {
    mutate {
      convert => {
        "Alert.qid" => "string"
      }
      on_error => "alert_qid_not_convertible_to_string"
    }
    mutate {
      replace => {
        "vulnerability.name" => "QID: %{Alert.qid}"
      }
    }
  }

  if [Alert][triggerUuid] != "" {
    mutate {
      replace => {
        "metadata.product_log_id" => "%{Alert.triggerUuid}"
      }
    }
  }

  if [Alert][alertInfo][sslIssuer] != "" {
    mutate {
      replace => {
        "network.tls.client.certificate.issuer" => "%{Alert.alertInfo.sslIssuer}"
      }
    }
  }

  if [Alert][alertInfo][port] != "" {
    mutate {
      convert => {
        "Alert.alertInfo.port" => "string"
      }
      on_error => "alert_qid_not_convertible_to_string"
    }
    mutate {
      replace => {
        "alert_port_label.key" => "Alert port"
        "alert_port_label.value.string_value" => "%{Alert.alertInfo.port}"
      }
    }
    mutate {
      merge => {
        "event.idm.read_only_udm.additional.fields" => "alert_port_label"
      }
    }
  }

  if [Alert][alertInfo][sslName] != "" {
    mutate {
      replace => {
        "ssl_name_label.key" => "SSL Name"
        "ssl_name_label.value.string_value" => "%{Alert.alertInfo.sslName}"
      }
    }
    mutate {
      merge => {
        "event.idm.read_only_udm.additional.fields" => "ssl_name_label"
      }
    }
  }

  if [Alert][alertInfo][sslOrg] != "" {
    mutate {
      replace => {
        "ssl_org_label.key" => "SSL Org"
        "ssl_org_label.value.string_value" => "%{Alert.alertInfo.sslOrg}"
      }
    }
    mutate {
      merge => {
        "event.idm.read_only_udm.additional.fields" => "ssl_org_label"
      }
    }
  }

  if [Alert][alertInfo][vpeConfidence] != "" {
    mutate {
      replace => {
        "vpe_label.key" => "VPE Confidence"
        "vpe_label.value.string_value" => "%{Alert.alertInfo.vpeConfidence}"
      }
    }
    mutate {
      merge => {
        "event.idm.read_only_udm.additional.fields" => "vpe_label"
      }
    }
  }

  if [Alert][alertInfo][vpeStatus] != "" {
    mutate {
      replace => {
        "vpe_status_label.key" => "VPE Confidence"
        "vpe_status_label.value.string_value" => "%{Alert.alertInfo.vpeStatus}"
      }
    }
    mutate {
      merge => {
        "event.idm.read_only_udm.additional.fields" => "vpe_status_label"
      }
    }
  }

  if [Alert][alertInfo][ticketId] != "" {
    mutate {
      convert => {
        "Alert.alertInfo.ticketId" => "string"
      }
      on_error => "ticketid_already_in_string"
    }
    mutate {
      replace => {
        "ticket_id_label.key" => "Ticket Id"
        "ticket_id_label.value.string_value" => "%{Alert.alertInfo.ticketId}"
      }
    }
    mutate {
      merge => {
        "event.idm.read_only_udm.additional.fields" => "ticket_id_label"
      }
    }
  }

  if [Alert][source] != "" {
    mutate {
      replace => {
        "source_label.key" => "Alert Source"
        "source_label.value.string_value" => "%{Alert.source}"
      }
    }
    mutate {
      merge => {
        "event.idm.read_only_udm.additional.fields" => "source_label"
      }
    }
  }

  if [Alert][profile][id] != "" {
    mutate {
      convert => {
        "Alert.profile.id" => "string"
      }
      on_error => "alertid_already_in_string"
    }
    mutate {
      replace => {
        "profile_id_label.key" => "Profile Id"
        "profile_id_label.value.string_value" => "%{Alert.profile.id}"
      }
    }
    mutate {
      merge => {
        "event.idm.read_only_udm.additional.fields" => "profile_id_label"
      }
    }
  }

  if [Alert][profile][title] != "" {
    mutate {
      replace => {
        "profile_title_label.key" => "Profile Title"
        "profile_title_label.value.string_value" => "%{Alert.profile.title}"
      }
    }
    mutate {
      merge => {
        "event.idm.read_only_udm.additional.fields" => "profile_title_label"
      }
    }
  }

  if [Alert][eventType] != "" {
    mutate {
      replace => {
        "event_type_label.key" => "Event Type"
        "event_type_label.value.string_value" => "%{Alert.eventType}"
      }
    }
    mutate {
      merge => {
        "event.idm.read_only_udm.additional.fields" => "event_type_label"
      }
    }
  }

  if [Alert][vulnCategory] != "" {
    mutate {
      replace => {
        "vulnerability_cat_label.key" => "Vulnerabilty Category"
        "vulnerability_cat_label.value.string_value" => "%{Alert.vulnCategory}"
      }
    }
    mutate {
      merge => {
       "event.idm.read_only_udm.additional.fields" => "vulnerability_cat_label"
      }
    }
  }

  if [Alert][vulnType] != "" {
    mutate {
      replace => {
        "vulnerability_type_label.key" => "Vulnerabilty Type"
        "vulnerability_type_label.value.string_value" => "%{Alert.vulnType}"
      }
    }
    mutate {
      merge => {
       "event.idm.read_only_udm.additional.fields" => "vulnerability_type_label"
      }
    }
  }

  if [Alert][vulnTitle] != "" {
    mutate {
      replace => {
        "vulnerability.description" => "%{Alert.vulnTitle}"
      }
    }
  }

  if [Alert][alertInfo][operatingSystem] != "" {
    mutate {
      replace => {
        "principal.platform_version" => "%{Alert.alertInfo.operatingSystem}"
      }
    }
  }

  mutate {
    convert => {
      "Alert.vulnSeverity" => "string"
    }
    on_error => "vulnSeverity_already_in_string"
  }

  if [Alert][vulnSeverity] in ["1", "2", "3"] {
    mutate {
      replace => {
        "vulnerability.severity" => "LOW"
      }
    }
  }
  else if [Alert][vulnSeverity] in ["4", "5", "6"] {
    mutate {
      replace => {
        "vulnerability.severity" => "MEDIUM"
      }
    }
  }
  else if [Alert][vulnSeverity] in ["7", "8"] {
    mutate {
      replace => {
        "vulnerability.severity" => "HIGH"
      }
    }
  }

  if [Alert][id] != "" {
    mutate {
      convert => {
        "Alert.id" => "string"
      }
      on_error => "alertid_already_in_string"
    }
    mutate {
      replace => {
        "security_result.threat_id" => "%{Alert.id}"
      }
    }
  }

  if [security_result] != "" {
    mutate {
      merge => {
        "event.idm.read_only_udm.security_result" => "security_result"
      }
    }
  }

  if [vulnerability] != "" {
    mutate {
      merge => {
        "event.idm.read_only_udm.extensions.vulns.vulnerabilities" => "vulnerability"
      }
    }
  }

  if [Alert][ipAddress] != "" or [Alert][hostname] != "" or [src_ip] != "" {
    mutate {
      replace => {
        "metadata.event_type" => "STATUS_UPDATE"
      }
    }
  }
  else {
    mutate {
      replace => {
        "metadata.event_type" => "GENERIC_EVENT"
      }
    }
  }

  mutate {
    replace => {
      "metadata.vendor_name" => "QUALYS_CONTINOUS_MONITORING"
      "metadata.product_name" => "QUALYS_CONTINOUS_MONITORING"
    }
  }

  mutate {
    rename => {
      "principal" => "event.idm.read_only_udm.principal"
      "metadata" => "event.idm.read_only_udm.metadata"
      "network" => "event.idm.read_only_udm.network"
    }
  }



  if [not_json] and [grok_failure] {
    drop {
      tag => "TAG_UNSUPPORTED"
    }
  }


  mutate {
    merge => {
      "@output" => "event"
    }
  }
}

