# Product: Digital Shadows
# Category: Threat Intelligence
# Supported Format: JSON
# Reference: https://portal-digitalshadows.com/triage/groups
# Last Updated: 2022-05-02
# Copyright 2021 Chronicle LLC


filter {

  # convert null to string for validation checks
  mutate {
    gsub => ["message", "null", "\"$1\""]
  }

  # Initialize sentinel fields
  mutate {
    replace => {
      "security_result" => ""
      "alert-id" => ""
      "classification" => ""
      "event-action" => ""
      "event-created" => ""
      "event-num" => ""
      "incident-id" => ""
      "portal-id" => ""
      "raised" => ""
      "risk-level" => ""
      "source" => ""
      "state" => ""
      "title" => ""
      "triage-item-id" => ""
      "triage-item" => ""
      "updated" => ""
      "triage-item.riskassessment.risk_level" => ""
      "triage-item.risk_factors" => "" #array
      "triage-item.state" => ""
      "triage-item.title" => ""
      "triage-item.description" => ""
      "triage-item.assets" => "" #array
      "triage-item.raised" => ""
      "triage-item.updated" => ""
      "triage-item.source.alert-id" => ""
      "triage-item.source.incident-id" => ""
      "alert.description" => ""
      "alert.risk-factors" => ""
    }
  }

  # parse log as json
  json {
    source         => "message"
    array_function => "split_columns"
    on_error       => "_not_json"
  }

  if [_not_json] {
        drop { tag => "TAG_MALFORMED_MESSAGE" }
  } else {

    # UDM > Metadata
    # >
    mutate {
      replace => {
        "event1.idm.read_only_udm.metadata.vendor_name" =>  "Digital Shadows"
        "event1.idm.read_only_udm.metadata.event_type" =>  "GENERIC_EVENT"
      }
    }
    if [event-num] != "" {
      if [event-created] != "" {
          date {
              match => ["event-created","ISO8601"]
              target => "event1.idm.read_only_udm.metadata.event_timestamp"
          }
      }
      mutate {
        replace => {
          "event1.idm.read_only_udm.metadata.product_name" => "Triage"
        }
      }
      if [triage-item-id] != "" {
        mutate {
          replace => {
            "security_result.threat_id" => "%{triage-item-id}"
          }
        }
      }
      if [classification] != "" {
        mutate {
          replace => {
            "security_result.threat_name" => "%{classification}"
          }
        }
      }
      if [event-action] != "" {
        mutate {
          replace => {
            "security_result.action_details" => "%{event-action}"
          }
        }
        # - only two states provided at time of writing
        if [event-action] =~ /create|update/ {
          mutate {
            replace => {
              "security_result.threat_status" => "ACTIVE"
            }
          }
        }
      }
      if [triage-item][portal-id] != "" {
        mutate {
          replace => {
            "security_result.url_back_to_product" => "https://portal-digitalshadows.com/triage/alerts/%{triage-item.portal-id}"
          }
        }
      }
      if [risk-level] != "" {
        mutate {
          replace => {
            "security_result.severity_details" => "%{risk-level}"
          }
        }
      }
      if [alert][description] !=  "" {
        mutate {
          replace => {
            "security_result.description" => "%{alert.description}"
          }
        }
      }
      if [triage-item][title] != "" {
        # email
        grok {
          match => {
            "alert.description" => "(?P<_email>\\S+@\\S+\\.\\S{2,3})"
          }
          on_error => "_grok_email_not_matched"
        }
        if ![_grok_email_not_matched] {
          mutate {
            merge => {
              "event1.idm.read_only_udm.target.user.email_addresses" => "_email"
            }
          }
        }
        # hostname
        grok {
          match => {
            "alert.description" => "(?P<_hostname>([a-zA-Z0-9-]{1,63}\\.)+[a-zA-Z]{2,63})"
          }
          on_error => "_grok_hostname_not_matched"
        }
        if ![_grok_hostname_not_matched] {
          mutate {
            replace => {
              "event1.idm.read_only_udm.target.hostname" => "%{_hostname}"
            }
          }
        }
        # Commit URL
        grok {
          match => {
            "alert.description" => "Commit URL:\\s+(?P<_commit_url>.*?)\\n"
          }
          on_error => "_grok_commit_url_not_matched"
        }
        if ![_grok_commit_url_not_matched] {
          mutate {
            replace => {
              "event1.idm.read_only_udm.target.url" => "%{_commit_url}"
            }
          }
        }
        # Repository URL
        grok {
          match => {
            "alert.description" => "Repository URL:\\s+(?P<_repo_url>.*?)\\n"
          }
          on_error => "_grok_repo_url_not_matched"
        }
        if ![_grok_repo_url_not_matched] {
          mutate {
            replace => {
              "event1.idm.read_only_udm.target.url" => "%{_repo_url}"
            }
          }
        }
        mutate {
          replace => {
            "security_result.summary" => "%{triage-item.title}"
          }
        }
      }
      if [classification] != "" {
        mutate {
          replace => {
            "event1.idm.read_only_udm.metadata.product_event_type" => "%{classification}"
          }
        }
      }
      if [event-created] != "" {
        mutate {
          replace => {
            "about_event-created.key" => "event-created"
            "about_event-created.value" => "%{event-created}"
          }
          on_error => "event-created_not_mapped"
        }
        if ![event-created_not_mapped] {
          mutate {
            merge => {
              "about.labels" => "about_event-created"
            }
          }
        }
      }
      if [event-num] != "" {
        mutate {
          convert => {
            "event-num" => "string"
          }
        }
        mutate {
          replace => {
            "event1.idm.read_only_udm.metadata.product_log_id" => "%{event-num}"
          }
        }
      }
      if [state] != "" {
        mutate {
          replace => {
            "about_state.key" => "state"
            "about_state.value" => "%{state}"
          }
          on_error => "state_not_mapped"
        }
        if ![state_not_mapped] {
          mutate {
            merge => {
            "about.labels" => "about_state"
            }
          }
        }
      }
      if [triage-item-id] != "" {
        mutate {
          replace => {
            "about_triage-item-id.key" => "triage-item-id"
            "about_triage-item-id.value" => "%{triage-item-id}"
          }
          on_error => "triage-item-id_not_mapped"
        }
        if ![triage-item-id_not_mapped] {
          mutate {
            merge => {
            "about.labels" => "about_triage-item-id"
            }
          }
        }
      }
      if [triage-item][portal-id] != "" {
        mutate {
          replace => {
            "about_triage-item_portal-id.key" => "triage-item.portal-id"
            "about_triage-item_portal-id.value" => "%{triage-item.portal-id}"
          }
          on_error => "triage-item_portal-id_not_mapped"
        }
        if ![triage-item_portal-id_not_mapped] {
          mutate {
            merge => {
              "about.labels" => "about_triage-item_portal-id"
            }
          }
        }
      }
      if [triage-item][raised] != "" {
        mutate {
          replace => {
            "about_triage-item_raised.key" => "triage-item.raised"
            "about_triage-item_raised.value" => "%{triage-item.raised}"
          }
          on_error => "triage-item_raised_not_mapped"
        }
        if ![triage-item_raised_not_mapped] {
          mutate {
            merge => {
              "about.labels" => "about_triage-item_raised"
            }
          }
        }
      }
      if [triage-item][updated] != "" {
        mutate {
          replace => {
            "about_triage-item_updated.key" => "triage-item.updated"
            "about_triage-item_updated.value" => "%{triage-item.updated}"
          }
          on_error => "triage-item_updated_not_mapped"
        }
        if ![triage-item_updated_not_mapped] {
          mutate {
            merge => {
              "about.labels" => "about_triage-item_updated"
            }
          }
        }
      }
      if [alert][risk-factors] != "" {
        for risk in alert.risk-factors {
          mutate {
            merge => {
              "security_result.category_details" => "risk"
            }
          }
        }
      }
      if [triage-item][source][alert-id] != "" {
        mutate {
          replace => {
              "about_triage-item-source-alert-id.key" => "triage-item-source-alert-id"
              "about_triage-item-source-alert-id.value" => "%{triage-item.source.alert-id}"
          }
          on_error => "about_triage-item-source-alert-id_not_mapped"
        }
        if ![about_triage-item-source-alert-id_not_mapped] {
          mutate {
            merge => {
              "about.labels" => "about_triage-item-source-alert-id"
            }
          }
        }
      }
      if [triage-item][source][incident-id] != "" {
        mutate {
          replace => {
              "about_triage-item-source-incident-id.key" => "triage-item-source-incident-id"
              "about_triage-item-source-incident-id.value" => "%{triage-item.source.incident-id}"
          }
          on_error => "about_triage-item-source-incident-id_not_mapped"
        }
        if ![about_triage-item-source-incident-id_not_mapped] {
          mutate {
            merge => {
              "about.labels" => "about_triage-item-source-incident-id"
            }
          }
        }
      }
      mutate {
        rename => {
          "about" => "security_result.about"
        }
      }
      if [security_result] != "" {
        mutate {
          merge => {
            "event1.idm.read_only_udm.security_result" => "security_result"
          }
        }
      }
      mutate {
        merge => {
        "@output" => "event1"
        }
      }
    }
  }
}
