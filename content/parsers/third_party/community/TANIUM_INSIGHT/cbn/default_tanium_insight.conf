# Product: Tanium Insight
# Category: Tanium Specific
# Supported Format: SYSLOG + KV
# Reference: N/A
# Last Updated: 2021-03-10
# Copyright 2021 Chronicle LLC


filter {

  #=============================================================================
  # INITIALIZE DEFAULT VALUES                                                  |
  #=============================================================================
  mutate {
    replace => {
      "event.idm.read_only_udm.metadata.event_type" => "SCAN_HOST"
      "category" => "DATA_AT_REST"
      "product_name" => ""
      "Question" => ""
    }
  }

  mutate {
    merge => { "security_result.category" => "category" }
    on_error => "_"  # ignore errors
  }
  # END DEFAULT VALUES SECTION =================================================


  # Extract timestamp and key/value data to be parsed
  grok {
    match => {
      "message" => [
          "%{TIMESTAMP_ISO8601:timestamp} %{SYSLOGHOST} %{DATA} %{DATA} - \\[%{DATA:meta} %{GREEDYDATA:kvdata}\\]"
      ]
    }
    overwrite => ["product_name"]
    on_error => "malformed_data"
  }

  if [malformed_data] {
    drop {}
  }

  date {
    match => ["timestamp", "ISO8601", "RFC3339"]
  }

  # Manually separate keys with the '|' character instead of ' '
  # to enables kv filter below to properly separate keys
  mutate {
    gsub => [
      "kvdata", "\" ", "\"|"
    ]
  }

  # Parse fields into key/value pairs
  kv {
    source => "kvdata"
    field_split => "|"
    value_split => "="
    trim_value => "\""  # remove quotes around each value
  }

  # drop messages NOT containing a clearly defined Question (supported type)
  if [Question] == "" {
    drop {}
  }

  # mutate {
  #   replace => {
  #     "event.idm.read_only_udm.metadata.product_name" => "%{product_name}"
  #   }
  # }

  #=============================================================================
  # HANDLE COMMON VALUES FOR ALL PRODUCT TYPES                                 |
  #=============================================================================

  # Hostname - must be parsed into target
  mutate {
    replace => {
      "event.idm.read_only_udm.target.hostname" => "%{Computer-Name}"
    }
  }

  # Username - parsed from Group\\UserId into group_name, userid
  grok {
    match => {
      "Username" => ["%{DATA:group_name}\\\\%{GREEDYDATA:userid}"]
    }
    on_error => "no_user"
  }

  # executes only if Username exists and was successfully parsed
  if not [no_user] {
    mutate {
      merge => {
        "event.idm.read_only_udm.target.user.group_identifiers" => "group_name"
      }
      on_error => "_"
    }
    mutate {
      replace => {
        "event.idm.read_only_udm.target.user.userid" => "%{userid}"
      }
    }
  }
  # END COMMON VALUES HANDLING =================================================


  #=============================================================================
  # SPECIFIC TANIUM PRODUCT TYPES                                              |
  #=============================================================================


  #-----------------------------------------------------------------------------
  # CHRONICLE PATCH APPLICABILITY                                              |
  #-----------------------------------------------------------------------------
  if [Question] == "Chronicle-Patch-Applicability" {

    # Filter out patches which are already installed
    if [Install-Status] == "Installed" {
      drop {}
    }

    mutate {
      replace => {
        "event.idm.read_only_udm.metadata.vendor_name" => "Tanium Patch"
        "event.idm.read_only_udm.metadata.product_name" => "Patch"
      }
    }

    mutate {
      replace => {
        "title.summary" => "Title"
        "title.description" => "%{Title}"
      }
      merge => {
        "title.category" => "category"
        "event.idm.read_only_udm.security_result" => "title"
      }
    }

    mutate {
      replace => {
        "last_reboot.summary" => "Last Reboot"
        "last_reboot.description" => "%{Last-Reboot}"
      }
      merge => {
        "last_reboot.category" => "category"
        "event.idm.read_only_udm.security_result" => "last_reboot"
      }
    }

    mutate {
      replace => {
        "knowledge_base.summary" => "KB(s)"
        "knowledge_base.description" => "%{KB-Articles}"
      }
      merge => {
        "knowledge_base.category" => "category"
        "event.idm.read_only_udm.security_result" => "knowledge_base"
      }
    }

    mutate {
      replace => {
        "cves.summary" => "CVE(s)"
        "cves.description" => "%{CVE-IDs}"
      }
      merge => {
        "cves.category" => "category"
        "event.idm.read_only_udm.security_result" => "cves"
      }
    }
  }
  # END CHRONICLE PATCH APPLICABILITY SECTION-----------------------------------


  #=============================================================================
  # OUTPUT EVENT                                                               |
  #=============================================================================

  mutate {
    merge => { "@output" => "event" }
  }
}
