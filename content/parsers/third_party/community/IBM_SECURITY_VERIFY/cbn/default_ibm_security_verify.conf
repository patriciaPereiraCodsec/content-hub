filter {
  mutate {
    replace => {
      "timestamp" => ""
      "hostname" => ""
      "app" => ""
      "thread_id" => ""
      "id" => ""
      "description" => ""
      "url" => ""
      "user" => ""
      "data" => ""
      "timezone" => ""
      "authntype" => ""
      "action" => ""
      "outcome" => ""
      "location" => ""
      "session_id" => ""
      "sec_action" => ""
      "terminatereason" => ""
      "outcome_status" => ""
      "time_stamp" => ""
      "user_location" => ""
      "outcome_reason" => ""
      "originator_blade" => ""
      "originator_instance" => ""
      "originator_component" => ""
      "user_location_type" => ""
      "event_id" => ""
      "target_url" => ""
      "auth_details" => ""
      "user_present" => "false"
      "principal_present" => "false"
      "security_result" => ""
    }
  }

  grok {
    match =>{
      "message" => [
        "<%{INT}>%{SYSLOGTIMESTAMP:timestamp} %{HOSTNAME:hostname} %{WORD:app} \\[%{GREEDYDATA} %{WORD:timezone}\\] %{WORD:thread_id} id=%{WORD:id} %{GREEDYDATA:description} Request URI:%{GREEDYDATA:url}",
        "<%{INT}>%{SYSLOGTIMESTAMP} %{HOSTNAME:hostname} %{WORD:app} \\[%{GREEDYDATA} %{WORD:timezone}\\] %{WORD:thread_id} id=%{WORD:id} %{GREEDYDATA:description}"
        "<%{INT}>%{SYSLOGTIMESTAMP} %{HOSTNAME:hostname} %{WORD:app} %{GREEDYDATA:description}"
      ]
    }
    overwrite => ["timestamp", "hostname", "app", "thread_id", "id", "description", "url", "timezone"]
    on_error => "match_error"
  }

  if [match_error] {
    drop {
      tag => "TAG_MALFORMED_MESSAGE"
    }
  }

  if [description] =~ "event" {
    xml {
      source => "description"
      xpath => {
        "/event/date" => "time_stamp"
        "/event/data" => "data"
        "/event/outcome/@status" => "outcome_status"
        "/event/outcome/@reason" => "outcome_reason"
        "/event/outcome" => "outcome"
        "/event/originator/@blade" => "originator_blade"
        "/event/originator/@instance" => "originator_instance"
        "/event/originator/component" => "originator_component"
        "/event/originator/event_id" => "event_id"
        "/event/originator/action" => "action"
        "/event/originator/location" => "location"
        "/event/accessor/principal/@auth" => "auth_details"
        "/event/accessor/principal" => "user"
        "/event/accessor/user_location" => "user_location"
        "/event/accessor/user_location_type" => "user_location_type"
        "/event/accessor/session_id" => "session_id"
        "/event/target/url" => "target_url"
        "/event/authntype" => "authntype"
        "/event/terminateinfo/terminatereason" => "terminatereason"
      }
    }
  } else if [description] != "" {
    mutate {
      replace => {
        "event.idm.read_only_udm.metadata.description" => "%{description}"
      }
      on_error => "no_description"
    }
  }

  if [data] != "" {
    mutate {
      replace => {
        "event.idm.read_only_udm.metadata.description" => "%{data}"
      }
      on_error => "no_data"
    }
  }

  if [time_stamp] != "" {
    mutate {
      gsub => ["time_stamp", "I-*", ""]
    }
    date {
      match => ["time_stamp", "yyyy-MM-dd-HH:mm:ss.SSSZZ"]
      target => "event.idm.read_only_udm.metadata.event_timestamp"
      on_error => "no_time_stamp"
    }
  }
  else if [timezone] != "" and [timestamp] != "" {
    mutate {
      gsub => ["timestamp","-",""]
    }
    # Compute Timezone Offset if it's loaded by KVData
    if [timezone] != "" {

        if [timezone] == "Europe/Paris" {
            mutate {
                gsub => ["timezone", "Europe/Paris", "+0000"]
            }
        } else if [timezone] == "America/Chicago" {
            mutate {
                gsub => ["timezone", "America/Chicago", "-0500"]
            }
        } else if [timezone] == "America/New_York" {
            mutate {
                gsub => ["timezone", "America/New_York", "-0400"]
            }
        } else if [timezone] == "Europe/London" {
