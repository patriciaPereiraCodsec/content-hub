# Product: TRENDMICRO VISION ONE DETECTION
# Category: Schema
# Supported Format: JSON
# Reference: N/A
# Last Updated: 2025-04-07
# Copyright 2025 Google SecOps

filter {
  mutate {
    replace => {
      "event" => ""
      "principal" => ""
      "additional" => ""
      "source" => ""
      "target" => ""
      "metadata" => ""
      "network" => ""
      "about" => ""
      "security_result" => ""
      "scanID" => ""
      "scantime" => ""
      "vulnerabilityname" => ""
      "description" => ""
      "cverecord" => ""
      "clusterID" => ""
      "clusterName" => ""
      "imageID" => ""
      "registry" => ""
      "repository" => ""
    }
  }
  json {
    source => "message"
    array_function => "split_columns"
    on_error => "json_failed"
  }
  if [json_failed] {
    drop {
      tag => "TAG_MALFORMED_MESSAGE"
    }
  }

  mutate {
    replace => {
      "metadata.event_type" => "GENERIC_EVENT"
      "metadata.vendor_name" => "TREND VISION ONE CONTAINER VULNERABILITIES"
      "metadata.product_name" => "TREND VISION ONE CONTAINER VULNERABILITIES"
    }
  }

  if [scantime] != "" {
    mutate {
      convert => {
        "scantime" => "integer"
      }
      on_error => "convert_scantime_error"
    }
    mutate {
      convert => {
        "scantime" => "string"
      }
      on_error => "convert_scantime_error"
    }
    date {
      match => [ "scantime", "UNIX_MS"]
      target => "metadata.event_timestamp"
      on_error => "no_scantime"
    }
  }

  if [scanID] != "" {
    mutate {
      replace => {
        "metadata.product_log_id" => "%{scanID}"
      }
      on_error => "no_scanID"
    }
  }

  if [vulnerabilityname] != "" {
    mutate{
      replace => {
        "vul" => ""
      }
    }

    mutate{
      replace => {
        "vul.name" => "%{vulnerabilityname}"
      }
      on_error => "vulnerabilityname_not_present"
    }

    if [description] != "" {
      mutate {
        replace => {
          "vul.description" => "%{description}"
        }
        on_error => "description_not_present"
      }
    }

    if [cverecord][id] != "" {
      mutate {
        replace => {
          "vul.cve_id" => "%{cverecord.id}"
        }
        on_error => "cverecord_not_present"
      }
    }

    mutate {
      merge => {
        "principal.asset.vulnerabilities" => "vul"
      }
      on_error => "vul_merge_fail"
    }
  }


  if [clusterID] != "" {
    mutate {
      replace => {
        "clusterID_label.value.string_value" => "%{clusterID}"
        "clusterID_label.key" => "clusterID"
      }
      on_error => "no_clusterID"
    }
    if ![no_clusterID] {
      mutate {
        merge => {
          "additional.fields" => "clusterID_label"
        }
        on_error => "no_clusterID_label"
      }
    }
  }

  if [clusterName] != "" {
    mutate {
      replace => {
        "clusterName_label.value.string_value" => "%{clusterName}"
        "clusterName_label.key" => "clusterName"
      }
      on_error => "no_clusterName"
    }
    if ![no_clusterName] {
      mutate {
        merge => {
          "additional.fields" => "clusterName_label"
        }
        on_error => "no_clusterName_label"
      }
    }
  }

  if [imageID] != "" {
    mutate {
      replace => {
        "imageID_label.value.string_value" => "%{imageID}"
        "imageID_label.key" => "imageID"
      }
      on_error => "no_imageID"
    }
    if ![no_imageID] {
      mutate {
        merge => {
          "additional.fields" => "imageID_label"
        }
        on_error => "no_imageID_label"
      }
    }
  }

  if [registry] != "" {
    mutate {
      replace => {
        "registry_label.value.string_value" => "%{registry}"
        "registry_label.key" => "registry"
      }
      on_error => "no_registry"
    }
    if ![no_registry] {
      mutate {
        merge => {
          "additional.fields" => "registry_label"
        }
        on_error => "no_registry_label"
      }
    }
  }

  if [repository] != "" {
    mutate {
      replace => {
        "repository_label.value.string_value" => "%{repository}"
        "repository_label.key" => "repository"
      }
      on_error => "no_repository"
    }
    if ![no_repository] {
      mutate {
        merge => {
          "additional.fields" => "repository_label"
        }
        on_error => "no_repository_label"
      }
    }
  }

  if [metadata] != "" {
    mutate {
      rename => {
        "metadata" => "event.idm.read_only_udm.metadata"
      }
    }
  }

  if [principal] != "" {
    mutate {
      rename => {
        "principal" => "event.idm.read_only_udm.principal"
      }
    }
  }


  if [target] != "" {
    mutate {
      rename => {
        "target" => "event.idm.read_only_udm.target"
      }
    }
  }



  if [additional] != "" {
    mutate {
      rename => {
        "additional" => "event.idm.read_only_udm.additional"
      }
    }
  }




  if [security_result] != "" {
    mutate {
      merge => {
        "event.idm.read_only_udm.security_result" => "security_result"
      }
      on_error => "no_security_result"
    }
  }

  # Output the mapped fields as an UDM event
  mutate {
    merge => {
      "@output" => "event"
    }
  }
}
