# Product: Aqua Security
# Category: DHCP
# Supported Format: CSV
# Reference: N/A
# Last Updated: 2023-06-16
# Copyright 2023 Chronicle LLC

filter {

 grok {
    match => {
      "message" => [
        "%{GREEDYDATA:date},%{WORD:dhcp_action},%{IP:client_ip},%{HOSTNAME:client_hostname},%{GREEDYDATA:client_mac}"
      ]
    }
  }

  # Parse date and account for different format
  date {
    match => ["date", "RFC3339", "UNIX", "ISO8601"]
  }

  # Account for if the client_mac may not have colons
  if ([client_mac] !~ ":") {
    grok {
      match => {
        "client_mac" => [
          "(?P<mac_1>.)(?P<mac_2>.)(?P<mac_3>.)(?P<mac_4>.)(?P<mac_5>.)(?P<mac_6>.)(?P<mac_7>.)(?P<mac_8>.)(?P<mac_9>.)(?P<mac_10>.)(?P<mac_11>.)(?P<mac_12>.)"
        ]
      }
    }

    mutate {
      replace => { "client_mac" => "%{mac_1}%{mac_2}:%{mac_3}%{mac_4}:%{mac_5}%{mac_6}:%{mac_7}%{mac_8}:%{mac_9}%{mac_10}:%{mac_11}%{mac_12}" }
    }
  }

  if [client_ip] != "" {
    mutate {
      merge => {
        "event.idm.read_only_udm.principal.ip" => "client_ip"
      }
      replace => {
        "event.idm.read_only_udm.network.dhcp.yiaddr" => "%{client_ip}"
      }
    }
  }

  if [client_mac] != "" {
    mutate {
      merge => {
        "event.idm.read_only_udm.principal.mac" => "client_mac"
      }
      replace => {
        "event.idm.read_only_udm.network.dhcp.chaddr" => "%{client_mac}"
      }
    }
  }

  if [client_hostname] != "" {
    mutate {
      replace => {
        "event.idm.read_only_udm.principal.hostname" => "%{client_hostname}"
        "event.idm.read_only_udm.network.dhcp.client_hostname" => "%{client_hostname}"
      }
    }
  }

  mutate {
    replace => {
      "event.idm.read_only_udm.metadata.product_name" => "PCAP DHCP"
      "event.idm.read_only_udm.network.application_protocol" => "DHCP"
      "event.idm.read_only_udm.network.dhcp.type" => "ACK"
      "event.idm.read_only_udm.metadata.event_type" => "NETWORK_DHCP"
    }
  }

  mutate {
    merge => {
      "@output" => "event"
    }
  }
}
