# Product: IBM_OPENPAGES
# Category: Data Security
# Supported Format: SYSLOG
# Reference: N/A
# Last Updated: 2024-10-10
# Copyright 2024 Chronicle LLC

filter {
  mutate {
    replace => {
      "principal" => ""
      "target" => ""
      "network" => ""
      "security_result" => ""
      "has_principal_user" => "false"
      "column1" => ""
      "column2" => ""
      "column3" => ""
      "column4" => ""
      "column5" => ""
      "column6" => ""
      "is_successful" => ""
      "counter" => ""
      "target_user" => ""
      "target_role" => ""
    }
  }

  if [message] =~ "TYPE" {
    drop {
      tag => "TAG_MALFORMED_MESSAGE"
    }
  }
  mutate {
    gsub => ["message","\\|","#"]
  }

  csv {
    source => "message"
    separator => "#"
    on_error => "continue"
  }

  mutate {
    replace => {
      "metadata.vendor_name" => "IBM_OPENPAGES"
      "metadata.product_name" => "IBM_OPENPAGES"
    }
  }

  if [column1] != "" {
    mutate {
      replace => {
        "metadata.product_event_type" => "%{column1}"
      }
      on_error => "no_column1"
    }
  }

  if [column2] != "" {
    mutate {
      replace => {
        "security_result.summary" => "%{column2}"
      }
      on_error => "no_column2"
    }
  }

  if [column3] != "" {
    date {
      match => ["column3", "yyyy-MM-dd HH:mm:ss"]
      on_error => "no_column3"
    }
  }

  if [column1] not in ["USER_PROFILE",""] and [column4]  != "" {
    grok {
      match => {
        "column4" => [
          "Logon Successful\\?=%{DATA:is_successful} Attempt Counter=%{GREEDYDATA:counter}"
        ]
      }
      overwrite => ["is_successful","counter"]
      on_error => "no_column4"
    }
    mutate {
      replace => {
        "security_result.description" => "%{column4}"
      }
      on_error => "no_column4"
    }
  }
  else if [column1] == "USER_PROFILE" and [column4] != "" {
    mutate {
      replace => {
        "old_label.value" => "%{column4}"
        "old_label.key" => "OLDVALUE"
      }
      on_error => "no_old_value"
    }
    if ![no_old_value] {
      mutate {
        merge => {
          "security_result.detection_fields" => "old_label"
        }
        on_error => "no_detection_fields"
      }
    }
  }
  if [column4] != "" {
    grok {
      match => {
        "column4" => "%{DATA:target_user}-->%{GREEDYDATA:target_role}"
      }
      overwrite => ["target_user","target_role"]
      on_error => "no_column4"
    }
    if [target_user] != "" {
      mutate {
        replace => {
          "target.user.userid" => "%{target_user}"
        }
        on_error => "no_target_user"
      }
    }
    if [target_role] != "" {
      mutate {
        replace => {
          "roles.name" => "%{target_role}"
        }
        on_error => "no_target_role"
      }
      mutate {
        merge => {
          "target.user.attribute.roles" => "roles"
        }
        on_error => "no_target_role"
      }
    }
  }

  if [is_successful] == "Yes" {
    mutate {
      replace => {
        "action" => "ALLOW"
      }
    }
    mutate {
      replace => {
        "security_result.action_details" => "Logon Successful"
      }
    }
  }
  if [is_successful] == "No" {
    mutate {
      replace => {
        "action" => "BLOCK"
      }
    }
    mutate {
      replace => {
        "security_result.action_details" => "Logon Failed"
      }
    }
  }

  mutate {
    merge => {
      "security_result.action" => "action"
    }
    on_error => "no_action"
  }

  if [counter] != "" {
    mutate {
      replace => {
        "counter_label.value" => "%{counter}"
        "counter_label.key" => "Counter"
      }
      on_error => "no_counter"
    }
    if ![no_counter] {
      mutate {
        merge => {
          "security_result.detection_fields" => "counter_label"
        }
        on_error => "no_detection_fields"
      }
    }
  }

  if [column1] not in ["USER_PROFILE",""] and [column5] != "" {
    mutate {
      replace => {
        "metadata.description" => "%{column5}"
      }
      on_error => "no_column5"
    }
  }
  else if [column1] == "USER_PROFILE" and [column5] != "" {
    mutate {
      replace => {
        "new_label.value" => "%{column5}"
        "new_label.key" => "NEWVALUE"
      }
      on_error => "no_new_value"
    }
    if ![no_new_value] {
      mutate {
        merge => {
          "security_result.detection_fields" => "new_label"
        }
        on_error => "no_detection_fields"
      }
    }
  }

  if [column6] != "" {
    mutate {
      replace => {
        "principal.user.userid" => "%{column6}"
        "has_principal_user" => "true"
      }
      on_error => "no_column6"
    }
  }

  if [has_principal_user] == "true" {
    mutate {
      replace => {
        "metadata.event_type" => "USER_UNCATEGORIZED"
      }
    }
  }
  else {
    mutate {
      replace => {
        "metadata.event_type" => "GENERIC_EVENT"
      }
    }
  }

  mutate {
    replace => {
      "metadata.product_name" => "OpenPages"
      "metadata.vendor_name" => "IBM"
    }
  }

  if [principal] != "" {
    mutate {
      rename => {
        "principal" => "event.idm.read_only_udm.principal"
      }
    }
  }
  if [target] != "" {
    mutate {
      rename => {
        "target" => "event.idm.read_only_udm.target"
      }
    }
  }
  if [metadata] != "" {
    mutate {
      rename => {
        "metadata" => "event.idm.read_only_udm.metadata"
      }
    }
  }
  if [network] != "" {
    mutate {
      rename => {
        "network" => "event.idm.read_only_udm.network"
      }
    }
  }
  if [security_result] != "" {
    mutate {
      merge => {
        "event.idm.read_only_udm.security_result" => "security_result"
      }
      on_error => "no_security_result"
    }
  }

  mutate {
    merge => {
      "@output" => "event"
    }
  }
}
