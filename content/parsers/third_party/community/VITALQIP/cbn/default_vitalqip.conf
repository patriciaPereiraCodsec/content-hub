# Product: Nokia VitalQIP
# Category: DDI (DNS, DHCP, IPAM)
# Supported Format: SYSLOG
# Reference: https://documentation.nokia.com/cgi-bin/dbaccessfilename.cgi/190409042R7.3_V1_VITALQIP%20ADMIN%20REF%20
# Last Updated: 2022-03-01
# Copyright 2022 Chronicle LLC


filter {
  mutate {
    replace => {
      "log_source"              => ""
      "questions_type"          => ""
      "questions_name"          => ""
      "client_ip_address"       => ""
      "client_port"             => ""
      "pid"                     => ""
      "QTYPE"                   => ""
      "questions"               => ""
      "event_type"              => ""
      "log_msg"                 => ""
      "dns_server"              => ""
      "dhcp_client_ip"          => ""
      "dhcp"                    => ""
      "dhcp_domain"             => ""
      "client_id"               => ""
      "op_type"                 => ""
      "dhcp_client_hostname"    => ""
      "client_mac"              => ""
      "subnet"                  => ""
      "req_addr"                => ""
      "tty"                     => ""
      "pwd"                     => ""
      "user"                    => ""
      "cmd"                     => ""
    }
  }
  grok {
    match => {
      "message" => [
        "<%{INT}>%{DATA:log_source}(\\[%{INT:pid}\\])?:\\s+%{GREEDYDATA:log_msg}"
      ]
    }
    on_error => "no_match"
    overwrite => ["log_source", "pid", "log_msg"]
  }
  if [message] =~ "last message repeated [0-9]+ times" or "no_match" == true {
    drop {
      tag => "TAG_NO_SECURITY_VALUE"
    }
  }
  if [log_msg] != "" {
    mutate {
      gsub => ["log_msg", "(\\s*$)|(:$)", ""]
    }
    mutate {
      replace => {
        "event.idm.read_only_udm.metadata.description" => "%{log_msg}"
      }
    }
  }
  if [log_source] != "" {
    if [log_source] !~ "(\/|sudo)" {
      mutate {
        replace => {
          "event.idm.read_only_udm.principal.application" => "%{log_source}"
        }
      }
    }
    else {
      mutate {
        replace => {
          "event.idm.read_only_udm.principal.process.command_line" => "%{log_source}"
        }
      }
    }
  }
  if [log_source] == "named" {
    mutate {
      replace => {
        "log_source" => "dns"
        "event.idm.read_only_udm.network.application_protocol" => "DNS"
      }
    }
    grok {
      match => {
        "log_msg" => [
           "(client|from)\\s+%{IP:client_ip_address}#%{INT:client_port}\\s+\\(%{NOTSPACE}\\):\\s+query:\\s+%{HOSTNAME:questions_name}\\s+IN\\s+%{WORD:questions_type}\\s+\\+\\s+\\(%{HOSTNAME:dns_server}\\)"
           "(client|from)\\s+%{IP:client_ip_address}#%{INT:client_port}:\\s+%{GREEDYDATA}"
        ]
      }
      on_error => "not_dns"
      overwrite => ["client_ip_address", "client_port", "questions_name", "questions_type", "dns_server"]
    }
    if ([questions_type] == "A")  {
      mutate {
        replace => { "QTYPE" => "1" }
      }
    }
    else if ([questions_type] == "AAAA") {
      mutate {
        replace => { "QTYPE" => "28" }
      }
    }
    else if ([questions_type] == "MX") {
      mutate {
        replace => { "QTYPE" => "15" }
      }
    }
    else if ([questions_type] == "PTR") {
      mutate {
        replace => { "QTYPE" => "12" }
      }
    }
    else if ([questions_type] == "SOA") {
      mutate {
        replace => { "QTYPE" => "6" }
      }
    }
    if [questions_name] != "" {
      mutate {
        rename => {
          "questions_name" => "questions.name"
        }
      }
    }
    if [QTYPE] != "" {
      mutate {
        rename => {
          "QTYPE" => "questions.type"
        }
        convert => {
          "questions.type" => "uinteger"
        }
      }
    }
    if [client_ip_address] != "" {
      mutate {
        merge => {
          "event.idm.read_only_udm.target.ip" => "client_ip_address"
        }
      }
    }
    if [dns_server] != "" {
      mutate {
        merge => {
          "event.idm.read_only_udm.principal.ip" => "dns_server"
        }
      }
    }
    if [client_port] != "" {
      mutate {
        replace => {
          "event.idm.read_only_udm.target.port" => "%{client_port}"
        }
      }
      mutate {
        convert => {
          "event.idm.read_only_udm.target.port" => "integer"
        }
      }
    }
    if [questions] != "" {
      mutate {
        merge => {
          "event.idm.read_only_udm.network.dns.questions" => "questions"
        }
      }
      mutate {
        replace => {
          "event_type" => "NETWORK_DNS"
        }
      }
    }
    if [pid] != "" {
      mutate {
        replace => {
          "event.idm.read_only_udm.principal.process.pid" => "%{pid}"
        }
      }
    }
  }
  else if [log_source] == "/opt/qip/usr/bin/dhcpd" {
    mutate {
      replace => {
        "log_source" => "dhcp"
        "event.idm.read_only_udm.network.application_protocol" => "DHCP"
      }
    }
    grok {
      match => {
        "log_msg" => [
          "DHCP(_|\\s)%{DATA:op_type}:\\s+Host=(?:%{HOSTNAME:dhcp_client_hostname})\\s+IP=%{IP:dhcp_client_ip}\\s+MAC=%{DATA:client_mac}\\s+Domain=%{HOSTNAME:dhcp_domain}(\\sClientID=(?P<client_id>[^\\s]+))?"
          "(?P<op_type>Delete Lease): IP=%{IP:dhcp_client_ip}"
        ]
      }
      on_error => "not_dhcp"
      overwrite => ["op_type", "dhcp_client_hostname", "dhcp_client_ip", "client_mac", "dhcp_domain", "client_id"]
    }
    if [dhcp_domain] != "" {
      mutate {
        replace => {
          "event.idm.read_only_udm.principal.administrative_domain" => "%{dhcp_domain}"
        }
      }
    }
    if [client_id] != "" {
      mutate {
        replace => {
          "event.idm.read_only_udm.target.asset_id" => "id: %{client_id}"
        }
      }
    }
    if [op_type] == "Delete Lease" {
      mutate {
        merge => {
          "event.idm.read_only_udm.target.ip" => "dhcp_client_ip"
        }
      }
      mutate {
        replace => {
          "dhcp.type" => "RELEASE"
        }
      }
      if [dhcp_client_ip] != "" {
        mutate {
          replace => {
            "dhcp.ciaddr" => "%{dhcp_client_ip}"
          }
        }
      }
    }
    else {
      mutate {
        gsub => ["client_mac", "([0-9a-f]{2})([0-9a-f]{2})([0-9a-f]{2})([0-9a-f]{2})([0-9a-f]{2})([0-9a-f]{2})", "$1:$2:$3:$4:$5:$6"]
      }
      if [dhcp_client_hostname] != "" {
        mutate {
          replace => {
            "event.idm.read_only_udm.target.hostname" => "dhcp_client_hostname"
          }
        }
      }
      if [dhcp_client_ip] != "" {
        mutate {
          merge => {
            "event.idm.read_only_udm.target.ip" => "dhcp_client_ip"
          }
        }
      }
      if [client_mac] != "" {
        mutate {
          merge => {
            "event.idm.read_only_udm.target.mac" => "client_mac"
          }
        }
      }
      if [op_type] == "RenewLease" or [op_type] == "GrantLease" {
        mutate {
          rename => {
            "dhcp_client_ip" => "dhcp.yiaddr"
          }
          replace => {
            "dhcp.type" => "ACK"
          }
        }
      }
      else if [op_type] == "Auto Release" {
        mutate {
          replace => {
            "dhcp.type" => "RELEASE"
          }
          rename => {
            "dhcp_client_ip" => "dhcp.ciaddr"
          }
        }
      }
      else {
        grok {
          match => {
            "log_msg" => [
              "No IP available from subnet %{IP:subnet}",
              "No DHCP lease available to offer from subnet %{IP:subnet}",
              "Target ip address \\(%{IP:req_addr}\\) is already in use"
            ]
          }
          overwrite => ["subnet", "req_addr"]
          on_error => "no_match"
        }
        if [req_addr] != "" {
          mutate {
            replace => {
              "dhcp.requested_address" => "%{req_addr}"
            }
          }
        }
        if [subnet] != "" {
          mutate {
            replace => {
              "subnet_label.key" => "subnet"
              "subnet_label.value.string_value" => "%{subnet}"
            }
          }
          mutate {
            merge => {
              "event.idm.read_only_udm.additional.fields" => "subnet_label"
            }
          }
        }
      }
    }
  }
  else {
    grok {
      match => {
        "log_msg" => [
          "TTY=%{DATA:tty}\\s+.\\s+PWD=%{DATA:pwd}\\s+.\\s+USER=%{USERNAME:user}\\s+.\\s+COMMAND=%{GREEDYDATA:cmd}",
        ]
      }
      overwrite => ["tty", "pwd", "user", "cmd"]
      on_error => "no_match"
    }
    if [tty] not in ["","unknown"] {
      mutate {
        replace => {
          "tty_label.key" => "terminal"
          "tty_label.value.string_value" => "%{tty}"
        }
      }
      mutate {
        merge => {
          "event.idm.read_only_udm.additional.fields" => "tty_label"
        }
      }
    }
    if [pwd] != "" {
      mutate {
        replace => {
          "pwd_label.key" => "pwd"
          "pwd_label.value.string_value" => "%{pwd}"
        }
      }
      mutate {
        merge => {
          "event.idm.read_only_udm.additional.fields" => "pwd_label"
        }
      }
    }
    if [user] != "" {
      mutate {
        replace => {
          "event.idm.read_only_udm.principal.user.userid" => "%{user}"
        }
      }
    }
    if [cmd] != "" {
      mutate {
        replace => {
          "event.idm.read_only_udm.principal.process.command_line" => "%{cmd}"
        }
      }
    }
  }
  if [log_msg] != "" {
    mutate {
      replace => {
        "event.idm.read_only_udm.metadata.description" => "%{log_msg}"
      }
    }
  }
  if [event_type] != "" {
    mutate {
      replace => {
        "event.idm.read_only_udm.metadata.event_type" => "%{event_type}"
      }
    }
  }
  else {
    mutate {
      replace => {
        "event.idm.read_only_udm.metadata.event_type" => "GENERIC_EVENT"
      }
    }
  }
  if [dhcp] != "" {
    mutate {
      rename => {
        "dhcp" => "event.idm.read_only_udm.network.dhcp"
      }
    }
  }
  mutate {
    replace => {
      "event.idm.read_only_udm.metadata.product_name" => "VITALQIP"
      "event.idm.read_only_udm.metadata.vendor_name" => "NOKIA"
    }
  }
  mutate {
    merge => {
      "@output" => "event"
    }
  }
} #end of filter
