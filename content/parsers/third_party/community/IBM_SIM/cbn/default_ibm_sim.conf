# Product: IBM_SIM
# Category: Security
# Supported Format: JSON + KV
# Reference: N/A
# Last Updated: 2024-03-11
# Copyright 2024 Chronicle LLC

filter{
  mutate {
    replace => {
      "timestamp" => ""
      "version" => ""
      "tls" => ""
      "kv_data" => ""
      "ip" => ""
      "port" => ""
      "connectionId" => ""
      "receivedTime" => ""
      "action" => ""
      "operationResponseTime" => ""
      "timeOnWorkQ" => ""
      "rdbmLockWaitTime" => ""
      "clientIOTime" => ""
      "kv_data1" => ""
      "authentiocationChoice" => ""
      "principal" => ""
      "metadata" => ""
      "network" => ""
      "description" => ""
      "hostname" => ""
      "has_principal" => "false"
      "security_result" => ""
    }
  }
  mutate {
    gsub => ['message','\\r\\n',' ']
  }
  mutate {
    gsub => ['message','\\n',' ']
  }
  json {
    source => "message"
    array_function => "split_columns"
    on_error => "invalid_json"
  }
  if [invalid_json] {
    grok {
      match => {
        "message" => [
          "%{TIMESTAMP_ISO8601:timestamp}--%{WORD:version} %{DATA:tls}--bindDN: %{DATA:kv_data}--client: %{IPV4:ip}:%{WORD:port}--connectionID: %{WORD:connectionId}%{DATA}received: %{TIMESTAMP_ISO8601:receivedTime}--%{DATA:action} operationResponseTime: %{DATA:operationResponseTime} timeOnWorkQ: %{DATA:timeOnWorkQ} rdbmLockWaitTime: %{DATA:rdbmLockWaitTime} clientIOTime: %{DATA:clientIOTime} %{GREEDYDATA:kv_data1}authenticationChoice: %{GREEDYDATA:authentiocationChoice}"
          "%{TIMESTAMP_ISO8601:timestamp}--%{WORD:version} %{DATA:tls}--bindDN: %{DATA:kv_data}--client: %{IPV4:ip}:%{WORD:port}--connectionID: %{WORD:connectionId}%{DATA}received: %{TIMESTAMP_ISO8601:receivedTime}--%{DATA:action} operationResponseTime: %{DATA:operationResponseTime} timeOnWorkQ: %{DATA:timeOnWorkQ} rdbmLockWaitTime: %{DATA:rdbmLockWaitTime} clientIOTime: %{DATA:clientIOTime} controlType: %{DATA:controlType} criticality: %{DATA:criticality} base:%{GREEDYDATA:kv_data1} scope:%{DATA:scope} derefAliases: %{DATA:derefAliases} typesOnly: %{DATA:typesOnly} filter: %{DATA:filter} attributes: %{DATA:attributes} numberOfEntriesReturned: %{GREEDYDATA:numberOfEntriesReturned}"
          "%{TIMESTAMP_ISO8601:timestamp}--%{WORD:version} %{DATA:tls}--bindDN: %{DATA:kv_data}--client: %{IPV4:ip}:%{WORD:port}--connectionID: %{WORD:connectionId}%{DATA}received: %{TIMESTAMP_ISO8601:receivedTime}--%{DATA:action}operationResponseTime: %{DATA:operationResponseTime} timeOnWorkQ: %{DATA:timeOnWorkQ} rdbmLockWaitTime: %{DATA:rdbmLockWaitTime} clientIOTime: %{DATA:clientIOTime} controlType: %{DATA:controlType} criticality: %{DATA:criticality} %{WORD}:%{GREEDYDATA:kv_data1} replace: %{DATA:replace1} replace: %{GREEDYDATA:replace2}"
          "%{TIMESTAMP_ISO8601:timestamp}--%{WORD:version} %{DATA:tls}--bindDN: %{DATA:kv_data}--client: %{IPV4:ip}:%{WORD:port}--connectionID: %{WORD:connectionId}%{DATA}received: %{TIMESTAMP_ISO8601:receivedTime}--%{DATA:action} operationResponseTime: %{DATA:operationResponseTime} timeOnWorkQ: %{DATA:timeOnWorkQ} rdbmLockWaitTime: %{DATA:rdbmLockWaitTime} clientIOTime: %{DATA:clientIOTime}"
          "%{TIMESTAMP_ISO8601:timestamp} %{HOSTNAME:hostname} %{DATA:description}$"
          "%{TIMESTAMP_ISO8601:timestamp}--%{WORD:version} %{DATA:tls}--bindDN: %{DATA:kv_data}--client: %{IPV4:ip}:%{WORD:port}--connectionID: %{WORD:connectionId}%{DATA}received: %{TIMESTAMP_ISO8601:receivedTime}--%{DATA:action}operationResponseTime: %{DATA:operationResponseTime} timeOnWorkQ: %{DATA:timeOnWorkQ} rdbmLockWaitTime: %{DATA:rdbmLockWaitTime} clientIOTime: %{GREEDYDATA:clientIOTime}"
        ]
      }
      overwrite => ["timestamp", "version", "tls", "kv_data", "ip", "port", "connectionId", "receivedTime", "action", "operationResponseTime", "timeOnWorkQ", "rdbmLockWaitTime", "clientIOTime", "kv_data1", "authentiocationChoice", "hostname", "description"]
      on_error => "grok_1_failed"
    }
  }

  if [kv_data] != "" {
    mutate {
      replace => {
        "ou_data_label.key" => "OU data"
        "ou_data_label.value" => "%{kv_data}"
      }
      on_error => "ou_data_label_error"
    }
    if ![ou_data_label_error] {
      mutate {
        merge => {
          "principal.user.attribute.labels" => "ou_data_label"
        }
      }
    }
  }
  if [version] != "" {
    mutate {
      replace => {
        "metadata.product_version" => "%{version}"
      }
      on_error => "version_replace_failed"
    }
  }
  if [tls] != "" {
    mutate {
      replace => {
        "network.tls.version" => "%{tls}"
      }
      on_error => "tls_replace_failed"
    }
  }
  if [description] != "" {
    grok {
      match => {
        "description" => "%{IP:ip}"
      }
      overwrite => ["ip"]
      on_error => "no_ip_present"
    }
    mutate {
      replace => {
        "metadata.description" => "%{description}"
      }
      on_error => "replace_failed"
    }
  }
  if [hostname] != "" {
    mutate {
      replace => {
        "principal.hostname" => "%{hostname}"
        "has_principal" => "true"
      }
      on_error => "replace_failed"
    }
  }
  if [ip] != "" {
    mutate {
      merge => {
        "principal.ip" => "ip"
        "principal.asset.ip" => "ip"
      }
      on_error => "ip_replace_failed"
    }
    mutate {
      replace => {
        "has_principal" => "true"
      }
      on_error => "replace_failed"
    }
  }
  if [port] != "" {
    mutate {
      replace => {
        "principal.port" => "%{port}"
      }
      on_error => "port_replace_failed"
    }
    mutate {
      convert => {
        "principal.port" => "integer"
      }
      on_error => "invalid_conversion"
    }
  }
  if [connectionId] != "" {
    mutate {
      replace => {
        "network.session_id" => "%{connectionId}"
      }
      on_error => "session_id_replcace_failed"
    }
    if ![replace_failed] {
      mutate {
        merge => {
          "event.idm.read_only_udm.additional.fields" => "connection_id"
        }
        on_error => "merge_failed"
      }
    }
  }
  if [receivedTime] != "" {
    date {
      match => ["msg.receivedTime","ISO8601","yyyy-MM-ddTHH:mm:ss"]
      target => "metadata.event_timestamp"
      on_error => "no_received_time"
    }
  }
  if [action] != "" {
    mutate {
      replace => {
        "security_result.action_details" => "%{action}"
      }
      on_error => "security_result_replace_failed"
    }
  }
  if [operationResponseTime] != "" {
    mutate {
      replace => {
        "operation_label.key" => "operationResponseTime"
        "operation_label.value.string_value" => "%{operationResponseTime}"
      }
      on_error => "operation_label_replace_failed"
    }
    if ![operation_label_replace_failed] {
      mutate {
        merge => {
          "event.idm.read_only_udm.additional.fields" => "operation_label"
        }
        on_error => "merge_failed"
      }
    }
  }
  if [timeOnWorkQ] != "" {
    mutate {
      replace => {
        "timeOnWorkQ_label.key" => "timeOnWorkQ"
        "timeOnWorkQ_label.value.string_value" => "%{timeOnWorkQ}"
      }
      on_error => "timeOnWorkQ_label_replace_failed"
    }
    if ![timeOnWorkQ_label_replace_failed] {
      mutate {
        merge => {
          "event.idm.read_only_udm.additional.fields" => "timeOnWorkQ_label"
        }
        on_error => "merge_failed"
      }
    }
  }
  if [rdbmLockWaitTime] != "" {
    mutate {
      replace => {
        "rdbmLockWaitTime_label.key" => "rdbmLockWaitTime"
        "rdbmLockWaitTime_label.value.string_value" => "%{rdbmLockWaitTime}"
      }
      on_error => "rdbmLockWaitTime_label_replace_failed"
    }
    if ![rdbmLockWaitTime_label_replace_failed] {
      mutate {
        merge => {
          "event.idm.read_only_udm.additional.fields" => "rdbmLockWaitTime_label"
        }
        on_error => "merge_failed"
      }
    }
  }
  if [clientIOTime] != "" {
    mutate {
      replace => {
        "clientIOTime_label.key" => "clientIOTime"
        "clientIOTime_label.value.string_value" => "%{clientIOTime}"
      }
      on_error => "clientIOTime_label_replace_failed"
    }
    if ![clientIOTime_label_replace_failed] {
      mutate {
        merge => {
          "event.idm.read_only_udm.additional.fields" => "clientIOTime_label"
        }
        on_error => "merge_failed"
      }
    }
  }
  if [authentiocationChoice] != "" {
    mutate {
      replace => {
        "authentiocationChoice_label.key" => "authentiocationChoice"
        "authentiocationChoice_label.value.string_value" => "%{authentiocationChoice}"
      }
      on_error => "authentiocationChoice_label_replace_failed"
    }
    if ![authentiocationChoice_label_replace_failed] and [authentiocationChoice] != "" {
      mutate {
        merge => {
          "event.idm.read_only_udm.additional.fields" => "authentiocationChoice_label"
        }
        on_error => "merge_failed"
      }
    }
  }
  if [network] != "" {
    mutate {
      rename => {
        "network" => "event.idm.read_only_udm.network"
      }
    }
  }
  mutate {
    replace => {
      "metadata.product_name" => "IBM_SIM"
      "metadata.vendor_name" => "IBM_SIM"
    }
  }
  if [metadata] != "" {
    mutate {
      rename => {
        "metadata" => "event.idm.read_only_udm.metadata"
      }
    }
  }
  if [principal] != "" {
    mutate {
      rename => {
        "principal" => "event.idm.read_only_udm.principal"
      }
    }
  }
  if [security_result] != "" {
    mutate {
      merge => {
        "event.idm.read_only_udm.security_result" => "security_result"
      }
      on_error => "merge_failed"
    }
  }
  if [has_principal] == "true" {
    mutate {
      replace => {
        "event.idm.read_only_udm.metadata.event_type" => "STATUS_UPDATE"
      }
    }
  }
  else {
    mutate {
      replace => {
        "event.idm.read_only_udm.metadata.event_type" => "GENERIC_EVENT"
      }
    }
  }
  mutate {
    merge => {
      "@output" => "event"
    }
  }
}
