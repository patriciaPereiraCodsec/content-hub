                on_error => "ip_address_not_removed"
            }
        }

        mutate {
            replace => {
                "token_ioc.raw_severity" =>
                "%{internet_scanner_intelligence.classification}"
            }
            on_error => "classification_missing"
        }

        mutate {
            replace => {
                "token_ioc.categorization" =>
                "%{internet_scanner_intelligence.metadata.category}"
            }
            on_error => "type_not_present"
        }
        mutate {
            replace => {
                "_domain_check" =>
                "%{internet_scanner_intelligence.metadata.domain}"
            }
            on_error => "domain_check_error"
        }
        if ![domain_check_error] and [_domain_check]!="" {
            mutate {
                replace => {
                    "token_ioc.domain_and_ports.domain" =>
                    "%{internet_scanner_intelligence.metadata.domain}"
                }
                on_error => "domain_is_missing"
            }
        }

        mutate {
            replace => {
                "token_ioc.description" =>
                "%{internet_scanner_intelligence.classification} IP %{ip} operated by %{internet_scanner_intelligence.metadata.organization}, located in %{internet_scanner_intelligence.metadata.source_country}, %{internet_scanner_intelligence.metadata.source_city}, %{internet_scanner_intelligence.metadata.asn}"
            }
            on_error => "description_is_missing"
        }

        mutate {
            rename => {
                "token_ioc" => "event.ioc"
            }
            on_error => "token_ioc_not_present"
        }

        if [_security_result] != "" {
            mutate {
                merge => {
                    "event.idm.entity.metadata.threat" => "_security_result"
                }
                on_error => "_security_result_merge_error"
            }
        }

        if [_ip_geo_artifact] != "" {
            mutate {
                merge => {
                    "event.idm.entity.entity.ip_geo_artifact" =>
                    "_ip_geo_artifact"
                }
                on_error => "_ip_geo_artifact_merge_error"
            }
        }

        if [check_interval] == "false" {
            mutate {
                copy => {
                    "timestamp_check" => "@collectionTimestamp"
                }
                on_error => "collection_timestamp_not_present"
            }
            mutate {
                rename => {
                    "timestamp_check" =>
                    "event.idm.entity.metadata.interval.start_time"
                }
                on_error => "interval_start_time_error"
            }

            if ![interval_start_time_error] {
                mutate{
                    replace => {
                        "check_interval" => "true"
                    }
                }
            }
        }
        if [_security_result] != "" and [ip_address_present] == "true"
        and [check_interval] == "true" {
            mutate {
                replace => {
                    "event.idm.entity.metadata.entity_type" => "IP_ADDRESS"
                }
            }
        }
        else {
            drop {
                tag => "TAG_UNSUPPORTED"
            }
        }

        mutate {
            merge => {
                "@output" => "event"
            }
            on_error => "event_merge_error"
        }
    }
}
