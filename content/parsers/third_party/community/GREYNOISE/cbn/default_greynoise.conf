# Product: GreyNoise Intelligence
# Category: Threat Intel
# Supported Format: JSON
# Reference:
# https://docs.greynoise.io/docs/using-the-greynoise-query-language-gnql
# Last Updated: 2026-01-19
# Copyright 2026 Google SecOps

filter {
    json {
        source => "message"
        array_function => "split_columns"
        on_error => "not_json"
    }
    if [not_json] {
        drop {
            tag => "TAG_MALFORMED_ENCODING"
        }
    }
    else {
        mutate {
            replace => {
                "check_ip" => "%{ip}"
            }
            on_error => "ip_not_found"
        }

        if [ip_not_found] {
            drop {
                tag => "TAG_UNSUPPORTED"
            }
        }
        mutate {
            replace => {
                "ip_address_present" => "false"
                "check_interval" => "false"
            }
        }

        mutate {
            replace => {
                "ip_address_check" => "%{ip}"
            }
            on_error => "ip_validation_error"
        }
        mutate {
            convert => {
                "ip_address_check" => "ipaddress"
            }
            on_error => "not_valid_ip_address"
        }
        if [not_valid_ip_address] {
            drop {
                tag => "TAG_UNSUPPORTED"
            }
        }
        else {
            mutate {
                replace => {
                    "ip_address_present" => "true"
                }
            }
        }

        mutate {
            replace => {
                "_security_result" => ""
            }
        }

        mutate {
            replace => {
                "_ip_geo_artifact" => ""
            }
        }

        mutate {
            replace => {
                "event.idm.entity.metadata.vendor_name" =>
                "GreyNoise Intelligence"
                "event.idm.entity.metadata.product_name" =>
                "GreyNoise Intelligence"
                "_security_result_category" =>
                "NETWORK_RECON"
            }
        }

        mutate {
            merge => {
                "_security_result.category" => "_security_result_category"
            }
            on_error => "security_result_category_merge_error"
        }

        mutate {
            replace => {
                "event.idm.entity.metadata.product_entity_id" => "%{ip}"
            }
            on_error => "product_entity_id_missing"
        }

        mutate {
            replace => {
                "event.idm.entity.metadata.description" =>
                "%{business_service_intelligence.description}"
            }
            on_error => "description_missing"
        }

        mutate {
            replace => {
                "_security_result.url_back_to_product" =>
                "https://viz.greynoise.io/ip/%{ip}"
            }
            on_error => "url_back_to_product_error"
        }

        mutate {
            convert => {
                "internet_scanner_intelligence.last_seen_timestamp" => "string"
            }
            on_error => "last_seen_timestamp_not_converted"
        }
        date {
            match => [
            "internet_scanner_intelligence.last_seen_timestamp",
            "ISO8601",
            "yyyy-MM-dd HH:mm:ss",
            "yyyy-MM-dd'T'HH:mm:ss'Z'",
            "yyyy-MM-dd'T'HH:mm:ssZ",
            "UNIX",
            "UNIX_MS"
            ]
            target => "event.idm.entity.metadata.interval.start_time"
            on_error => "interval_start_time_error"
        }

        if ![interval_start_time_error] {
            mutate {
                replace => {
                    "check_interval" => "true"
                }
            }
        }
        mutate {
            convert => {
                "custom_end_time" => "string"
            }
            on_error => "custom_end_time_not_converted"
        }
        date {
            match => [
            "custom_end_time",
            "ISO8601",
            "yyyy-MM-dd HH:mm:ss",
            "yyyy-MM-dd'T'HH:mm:ss'Z'",
            "yyyy-MM-dd'T'HH:mm:ssZ",
            "UNIX",
            "UNIX_MS"
            ]
            target => "event.idm.entity.metadata.interval.end_time"
            on_error => "custom_end_time_time_error"
        }
        mutate {
            convert => {
                "internet_scanner_intelligence.first_seen" => "string"
            }
            on_error => "first_seen_not_converted"
        }
        date {
            match => [
            "internet_scanner_intelligence.first_seen",
            "ISO8601",
            "yyyy-MM-dd",
            "yyyy-MM-dd'T'HH:mm:ss'Z'"
            ]
            target => "_security_result.first_discovered_time"
            on_error => "first_seen_error"
        }

        date {
            match => [
            "internet_scanner_intelligence.last_seen_timestamp",
            "ISO8601",
            "yyyy-MM-dd HH:mm:ss",
            "yyyy-MM-dd'T'HH:mm:ss'Z'",
            "yyyy-MM-dd'T'HH:mm:ssZ",
            "UNIX",
            "UNIX_MS"
            ]
            target => "_security_result.last_updated_time"
            on_error => "last_updated_time_error"
        }

        mutate {
            replace => {
                "classification_check" =>
                "%{internet_scanner_intelligence.classification}"
            }
            on_error => "classification_missing"
        }

        if ![classification_missing] {
            if [internet_scanner_intelligence][classification] ==
            "malicious" {
                mutate {
                    replace => {
                        "_security_result.threat_verdict" =>
                        "MALICIOUS"
                    }
                }
            }
            else if [internet_scanner_intelligence][classification] ==
            "suspicious" {
                mutate {
                    replace => {
                        "_security_result.threat_verdict" =>
                        "SUSPICIOUS"
                    }
                }
            }
            else if [internet_scanner_intelligence][classification] ==
            "benign" {
                mutate {
                    replace => {
                        "_security_result.threat_verdict" =>
                        "UNDETECTED"
                    }
                }
            }
            else {
                mutate {
                    replace => {
                        "_security_result.threat_verdict" =>
                        "THREAT_VERDICT_UNSPECIFIED"
                    }
                }
            }
        }

        mutate {
            convert => {
                "internet_scanner_intelligence.classification" => "string"
            }
            on_error => "classification_conversion_error"
        }
        mutate {
            replace => {
                "classification_label.value" =>
                "%{internet_scanner_intelligence.classification}"
            }
            on_error => "classification_label_error"
        }
        if ![classification_label_error] {
            mutate {
                replace => {
                    "classification_label.key" =>
                    "classification"
                }
                on_error => "classification_label_key_error"
            }
            mutate {
                merge => {
                    "_security_result.detection_fields" =>
                    "classification_label"
                }
                remove_field => ["classification_label"]
                on_error => "classification_label_merge_error"
            }
        }

        for index, cve in internet_scanner_intelligence.cves {
            mutate {
                replace => {
                    "_vulnerability" => ""
                }
            }
            mutate {
                replace => {
                    "_vulnerability.cve_id" => "%{cve}"
                }
                on_error => "cve_id_missing"
            }
            if ![cve_id_missing] {
                mutate {
                    merge => {
                        "event.idm.entity.entity.asset.vulnerabilities" =>
                        "_vulnerability"
                    }
                    on_error => "cve_merge_error"
                }
            }
        }

        mutate {
            convert => {
                "internet_scanner_intelligence.metadata.latitude" =>
                "string"
            }
            on_error => "latitude_conversion_error"
        }
        mutate {
            replace => {
                "_ip_geo_artifact.location.region_coordinates.latitude" =>
                "%{internet_scanner_intelligence.metadata.latitude}"
            }
            on_error => "latitude_missing"
        }
        mutate {
            convert => {
                "_ip_geo_artifact.location.region_coordinates.latitude" =>
                "float"
            }
            on_error => "latitude_float_conversion_error"
        }
        if [latitude_float_conversion_error] {
            mutate {
                remove_field =>
                ["_ip_geo_artifact.location.region_coordinates.latitude"]
                on_error => "latitude_float_conversion_error"
            }
        }
        mutate {
            convert => {
                "internet_scanner_intelligence.metadata.longitude" =>
                "string"
            }
            on_error => "longitude_conversion_error"
        }
        mutate {
            replace => {
                "_ip_geo_artifact.location.region_coordinates.longitude" =>
                "%{internet_scanner_intelligence.metadata.longitude}"
            }
            on_error => "longitude_missing"
        }
        mutate {
            convert => {
                "_ip_geo_artifact.location.region_coordinates.longitude" =>
                "float"
            }
            on_error => "longitude_float_conversion_error"
        }
        if [longitude_float_conversion_error] {
            mutate {
                remove_field =>
                ["_ip_geo_artifact.location.region_coordinates.longitude"]
                on_error => "longitude_float_conversion_error"
            }
        }

        mutate {
            convert => {
                "internet_scanner_intelligence.actor" => "string"
            }
            on_error => "actor_conversion_error"
        }
        mutate {
            replace => {
                "internet_scanner_actor_label.value.string_value" =>
                "%{internet_scanner_intelligence.actor}"
            }
            on_error => "actor_missing"
        }
        if ![actor_missing] {
            mutate {
                replace => {
                    "internet_scanner_actor_label.key" =>
                    "internet_scanner_actor"
                }
                on_error => "actor_key_missing"
            }
            mutate {
                merge => {
                    "event.idm.entity.additional.fields" =>
                    "internet_scanner_actor_label"
                }
                on_error => "actor_merge_error"
            }
        }

        mutate {
            merge => {
                "event.idm.entity.entity.ip" => "ip"
            }
            on_error => "entity_ip_error"
        }

        mutate {
            replace => {
                "_ip_geo_artifact.ip" => "%{ip}"
            }
            on_error => "ip_geo_artifact_ip_error"
        }

        mutate {
            replace => {
                "_ip_geo_artifact.location.state" =>
                "%{internet_scanner_intelligence.metadata.region}"
            }
            on_error => "region_missing"
        }

        mutate {
            replace => {
                "_ip_geo_artifact.location.city" =>
                "%{internet_scanner_intelligence.metadata.source_city}"
            }
            on_error => "city_missing"
        }

        mutate {
            replace => {
                "_ip_geo_artifact.location.country_or_region" =>
                "%{internet_scanner_intelligence.metadata.source_country}"
            }
            on_error => "country_missing"
        }

        mutate {
            replace => {
                "_ip_geo_artifact.network.asn" =>
                "%{internet_scanner_intelligence.metadata.asn}"
            }
            on_error => "asn_missing"
        }

        mutate {
            replace => {
                "_ip_geo_artifact.network.carrier_name" =>
                "%{internet_scanner_intelligence.metadata.carrier}"
            }
            on_error => "carrier_missing"
        }

        mutate {
            replace => {
                "_ip_geo_artifact.network.dns_domain" =>
                "%{internet_scanner_intelligence.metadata.domain}"
            }
            on_error => "dns_domain_missing"
        }

        mutate {
            replace => {
                "_ip_geo_artifact.network.organization_name" =>
                "%{internet_scanner_intelligence.metadata.organization}"
            }
            on_error => "organization_missing"
        }

        mutate {
            convert => {
                "business_service_intelligence.found" => "string"
            }
            on_error => "business_service_found_conversion_error"
        }
        mutate {
            replace => {
                "business_service_found_label.value.string_value" =>
                "%{business_service_intelligence.found}"
            }
            on_error => "business_service_found_missing"
        }
        if ![business_service_found_missing] {
            mutate {
                replace => {
                    "business_service_found_label.key" =>
                    "business_service_found"
                }
                on_error => "business_service_found_key_missing"
            }
            mutate {
                merge => {
                    "event.idm.entity.additional.fields" =>
                    "business_service_found_label"
                }
                on_error => "business_service_found_merge_error"
            }
        }

        mutate {
            merge => {
                "_security_result.category_details" =>
                "business_service_intelligence.category"
            }
            on_error => "category_details_merge_error"
        }

        mutate {
            replace => {
                "_security_result.summary" =>
                "%{business_service_intelligence.explanation}"
            }
            on_error => "explanation_missing"
        }

        if [explanation_missing] or
        [_security_result][summary]=="" {
            mutate {
                replace => {
                    "_security_result.summary" =>
                    "Internet Scanning & Noise Activity observed by GreyNoise"
                }
            }
        }

        mutate {
            convert => {
                "business_service_intelligence.last_updated" => "string"
            }
            on_error => "business_service_last_updated_conversion_error"
        }
        mutate {
            replace => {
                "business_service_last_updated_label.value.string_value" =>
                "%{business_service_intelligence.last_updated}"
            }
            on_error => "business_service_last_updated_missing"
        }
        if ![business_service_last_updated_missing] {
            mutate {
                replace => {
                    "business_service_last_updated_label.key" =>
                    "business_service_last_updated"
                }
                on_error => "business_service_last_updated_key_missing"
            }
            mutate {
                merge => {
                    "event.idm.entity.additional.fields" =>
                    "business_service_last_updated_label"
                }
                on_error => "business_service_last_updated_merge_error"
            }
        }

        mutate {
            convert => {
                "business_service_intelligence.name" => "string"
            }
            on_error => "business_service_name_conversion_error"
        }
        mutate {
            replace => {
                "business_service_name_label.value.string_value" =>
                "%{business_service_intelligence.name}"
            }
            on_error => "business_service_name_missing"
        }
        if ![business_service_name_missing] {
            mutate {
                replace => {
                    "business_service_name_label.key" =>
                    "business_service_name"
                }
                on_error => "business_service_name_key_missing"
            }
            mutate {
                merge => {
                    "event.idm.entity.additional.fields" =>
                    "business_service_name_label"
                }
                on_error => "business_service_name_merge_error"
            }
        }

        mutate {
            convert => {
                "business_service_intelligence.reference" => "string"
            }
            on_error => "business_service_reference_conversion_error"
        }
        mutate {
            replace => {
                "business_service_reference_label.value.string_value" =>
                "%{business_service_intelligence.reference}"
            }
            on_error => "business_service_reference_missing"
        }
        if ![business_service_reference_missing] {
            mutate {
                replace => {
                    "business_service_reference_label.key" =>
                    "business_service_reference"
                }
                on_error => "business_service_reference_key_missing"
            }
            mutate {
                merge => {
                    "event.idm.entity.additional.fields" =>
                    "business_service_reference_label"
                }
                on_error => "business_service_reference_merge_error"
            }
        }

        mutate {
            convert => {
                "business_service_intelligence.trust_level" => "string"
            }
            on_error => "business_service_trust_level_conversion_error"
        }
        mutate {
            replace => {
                "business_service_trust_level_label.value" =>
                "%{business_service_intelligence.trust_level}"
            }
            on_error => "business_service_trust_level_missing"
        }
        if ![business_service_trust_level_missing] {
            mutate {
                replace => {
                    "business_service_trust_level_label.key" =>
                    "business_service_trust_level"
                }
                on_error => "business_service_trust_level_key_missing"
            }
            mutate {
                merge => {
                    "_security_result.detection_fields" =>
                    "business_service_trust_level_label"
                }
                remove_field => ["business_service_trust_level_label"]
                on_error => "business_service_trust_level_merge_error"
            }
        }

        mutate {
            convert => {
                "internet_scanner_intelligence.metadata.source_country_code"
 => "string"
            }
            on_error => "source_country_code_conversion_error"
        }
        mutate {
            replace => {
                "source_country_code_label.value.string_value" =>
                "%{internet_scanner_intelligence.metadata.source_country_code}"
            }
            on_error => "source_country_code_missing"
        }
        if ![source_country_code_missing] {
            mutate {
                replace => {
                    "source_country_code_label.key" =>
                    "source_country_code"
                }
                on_error => "source_country_code_key_missing"
            }
            mutate {
                merge => {
                    "event.idm.entity.additional.fields" =>
                    "source_country_code_label"
                }
                on_error => "source_country_code_merge_error"
            }
        }

        mutate {
            convert => {
                "internet_scanner_intelligence.metadata.datacenter" => "string"
            }
            on_error => "datacenter_conversion_error"
        }
        mutate {
            replace => {
                "datacenter_label.value.string_value" =>
                "%{internet_scanner_intelligence.metadata.datacenter}"
            }
            on_error => "datacenter_missing"
        }
        if ![datacenter_missing] {
            mutate {
                replace => {
                    "datacenter_label.key" =>
                    "datacenter"
                }
                on_error => "datacenter_key_missing"
            }
            mutate {
                merge => {
                    "event.idm.entity.additional.fields" => "datacenter_label"
                }
                on_error => "datacenter_merge_error"
            }
        }

        for index, destination_asn in
        internet_scanner_intelligence.metadata.destination_asns {
            mutate {
                convert => {
                    "index" => "string"
                }
                on_error => "destination_asn_index_conversion_error"
            }
            mutate {
                replace => {
                    "_destination_asn_label" => ""
                }
            }
            mutate {
                convert => {
                    "destination_asn" => "string"
                }
                on_error => "destination_asn_conversion_error"
            }
            mutate {
                replace => {
                    "_destination_asn_label.value.string_value" =>
                    "%{destination_asn}"
                }
                on_error => "destination_asn_missing"
            }
            if ![destination_asn_missing] {
                mutate {
                    replace => {
                        "_destination_asn_label.key" =>
                        "destination_asns_%{index}"
                    }
                    on_error => "destination_asn_key_missing"
                }
                mutate {
                    merge => {
                        "event.idm.entity.additional.fields" =>
                        "_destination_asn_label"
                    }
                    on_error => "destination_asn_merge_error"
                }
            }
        }

        for index, destination_city in
        internet_scanner_intelligence.metadata.destination_cities {
            mutate {
                convert => {
                    "index" => "string"
                }
                on_error => "destination_city_index_conversion_error"
            }
            mutate {
                replace => {
                    "_destination_city_label" => ""
                }
            }
            mutate {
                convert => {
                    "destination_city" => "string"
                }
                on_error => "destination_city_conversion_error"
            }
            mutate {
                replace => {
                    "_destination_city_label.value.string_value" =>
                    "%{destination_city}"
                }
                on_error => "destination_city_missing"
            }
            if ![destination_city_missing] {
                mutate {
                    replace => {
                        "_destination_city_label.key" =>
                        "destination_cities_%{index}"
                    }
                    on_error => "destination_city_key_missing"
                }
                mutate {
                    merge => {
                        "event.idm.entity.additional.fields" =>
                        "_destination_city_label"
                    }
                    on_error => "destination_city_merge_error"
                }
            }
        }

        for index, destination_country in
        internet_scanner_intelligence.metadata.destination_countries {
            mutate {
                convert => {
                    "index" => "string"
                }
                on_error => "destination_country_index_conversion_error"
            }
            mutate {
                replace => {
                    "_destination_country_label" => ""
                }
            }
            mutate {
                convert => {
                    "destination_country" => "string"
                }
                on_error => "destination_country_conversion_error"
            }
            mutate {
                replace => {
                    "_destination_country_label.value.string_value" =>
                    "%{destination_country}"
                }
                on_error => "destination_country_missing"
            }
            if ![destination_country_missing] {
                mutate {
                    replace => {
                        "_destination_country_label.key" =>
                        "destination_countries_%{index}"
                    }
                    on_error => "destination_country_key_missing"
                }
                mutate {
                    merge => {
                        "event.idm.entity.additional.fields" =>
                        "_destination_country_label"
                    }
                    on_error => "destination_country_merge_error"
                }
            }
        }

        for index, destination_country_code in
        internet_scanner_intelligence.metadata.destination_country_codes {
            mutate {
                convert => {
                    "index" => "string"
                }
                on_error => "destination_country_code_index_conversion_error"
            }
            mutate {
                replace => {
                    "_destination_country_code_label" => ""
                }
            }
            mutate {
                convert => {
                    "destination_country_code" => "string"
                }
                on_error => "destination_country_code_conversion_error"
            }
            mutate {
                replace => {
                    "_destination_country_code_label.value.string_value" =>
                    "%{destination_country_code}"
                }
                on_error => "destination_country_code_missing"
            }
            if ![destination_country_code_missing] {
                mutate {
                    replace => {
                        "_destination_country_code_label.key" =>
                        "destination_country_codes_%{index}"
                    }
                    on_error => "destination_country_code_key_missing"
                }
                mutate {
                    merge => {
                        "event.idm.entity.additional.fields" =>
                        "_destination_country_code_label"
                    }
                    on_error => "destination_country_code_merge_error"
                }
            }
        }

        mutate {
            convert => {
                "internet_scanner_intelligence.found" => "string"
            }
            on_error => "found_conversion_error"
        }
        mutate {
            replace => {
                "found_label.value.string_value" =>
                "%{internet_scanner_intelligence.found}"
            }
            on_error => "found_missing"
        }
        if ![found_missing] {
            mutate {
                replace => {
                    "found_label.key" =>
                    "internet_scanner_found"
                }
                on_error => "found_key_missing"
            }
            mutate {
                merge => {
                    "event.idm.entity.additional.fields" => "found_label"
                }
                on_error => "found_merge_error"
            }
        }

        mutate {
            convert => {
                "internet_scanner_intelligence.bot" => "string"
            }
            on_error => "bot_conversion_error"
        }
        mutate {
            replace => {
                "bot_label.value" =>
                "%{internet_scanner_intelligence.bot}"
            }
            on_error => "bot_missing"
        }
        if ![bot_missing] {
            mutate {
                replace => {
                    "bot_label.key" =>
                    "bot"
                }
                on_error => "bot_key_missing"
            }
            mutate {
                merge => {
                    "_security_result.detection_fields" =>
                    "bot_label"
                }
                remove_field => ["bot_label"]
                on_error => "bot_merge_error"
            }
        }

        mutate {
            convert => {
                "internet_scanner_intelligence.metadata.mobile" => "string"
            }
            on_error => "mobile_conversion_error"
        }
        mutate {
            replace => {
                "mobile_label.value.string_value" =>
                "%{internet_scanner_intelligence.metadata.mobile}"
            }
            on_error => "mobile_missing"
        }
        if ![mobile_missing] {
            mutate {
                replace => {
                    "mobile_label.key" =>
                    "mobile"
                }
                on_error => "mobile_key_missing"
            }
            mutate {
                merge => {
