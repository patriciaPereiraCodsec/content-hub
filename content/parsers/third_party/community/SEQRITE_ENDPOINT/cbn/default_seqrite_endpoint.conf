# Product: Seqrite Endpoint Security (EPS)
# Category: AV and endpoint logs
# Supported Format: LEEF
# Reference: NA
# Last Updated: 2023-03-24
# Copyright 2023 Chronicle LLC


filter {
  mutate {
    replace => {
      "metadata" => ""
      "principal" => ""
      "network" => ""
      "security_result" => ""
      "target" => ""
      "version" => ""
      "device_vendor" => ""
      "device_product" => ""
      "device_version" => ""
      "event_name" => ""
      "kv_data" => ""
      "event_type" => ""
      "incident_id" => ""
      "client_id" => ""
      "computer_name" => ""
      "direction" => ""
      "domain_name" => ""
      "exception_name" => ""
      "firewall_level" => ""
      "incident_date" => ""
      "local_ip" => ""
      "local_port" => ""
      "macid1" => ""
      "macid2" => ""
      "macid3" => ""
      "protocol" => ""
      "protocol_type" => ""
      "remote_ip" => ""
      "str_ip_address" => ""
      "remote_port" => ""
      "username" => ""
      "application_name" => ""
      "operating_system" => ""
      "os_version" => ""
      "asset_name" => ""
      "system_manufacturer" => ""
      "ram" => ""
      "processor_name" => ""
      "last_shutdown_before" => ""
      "SoftwarePath" => ""
      "website" => ""
      "category" => ""
      "hardware" => ""
      "websec_incident_id" => ""
      "details" => ""
      "scan_info_id" => ""
      "group_name" => ""
      "summary" => ""
      "module" => ""
      "scan_info_type" => ""
      "unauthorized_app_cnt" => ""
      "authorized_app_cnt" => ""
      "installed_app_cnt" => ""
      "wifi_name" => ""
      "physical_address" => ""
      "file_path" => ""
      "event_details" => ""
      "channel_type" => ""
      "channel_details" = ""
      "virus_name" => ""
      "infected_file" => ""
      "action_taken" => ""
    }
  }

  grok {
    match => {
      "message" => [
        "<%{INT}>LEEF:%{DATA:version}\\|%{DATA:device_vendor}\\|%{DATA:device_product}\\|%{DATA:device_version}\\|%{DATA:event_name}\\|%{GREEDYDATA:kv_data}"
      ]
    }
    on_error => "grok_failed"
    overwrite => ["version", "device_vendor", "device_product", "device_version", "event_name", "kv_data"]
  }
  if [grok_failed] {
    drop {
      tag => "TAG_MALFORMED_ENCODING"
    }
  }
  mutate {
    gsub => ["message", "ram(GB)", "ram"]
  }

  if [kv_data] != "" {
    kv {
      source => "kv_data"
      field_split => "|"
      value_split => "="
      on_error => "kv_failed"
    }
  }
  if [kv_failed] or [kv_data] == "" {
    drop {
      tag => "TAG_MALFORMED_ENCODING"
    }
  }
  if [incident_date] != "" {
    date {
      match => ["incident_date", "yyyy-MM-dd HH:mm:ss"]
      target => "metadata.event_timestamp"
      on_error => "wrong_format"
    }
  }
  if [incident_id] != "" {
    mutate {
      replace => {
        "metadata.product_log_id"  => "%{incident_id}"
      }
    }
  }
  else if [websec_incident_id] != "" {
    mutate {
      replace => {
        "metadata.product_log_id"  => "%{websec_incident_id}"
      }
    }
  }
  if [computer_name] != "" {
    mutate {
      replace => {
        "computer_name_label.key" => "computer_name"
        "computer_name_label.value" => "%{computer_name}"
      }
      merge => {
        "principal.asset.attribute.labels" => "computer_name_label"
      }
    }
  }
  if[application_name] != "" {
    mutate {
      replace => {
        "principal.process.command_line" => "%{application_name}"
      }
    }
  }
  if[client_id] != "" {
    mutate {
      replace => {
        "principal.asset.asset_id" => "asset_id:%{client_id}"
      }
    }
  }
  if [direction] != "" {
    mutate {
      uppercase => [ "direction" ]
    }
    mutate {
      replace => {
        "network.direction" => "%{direction}"
      }
    }
  }
  if [domain_name] != "" {
    mutate {
      replace => {
        "principal.administrative_domain" => "%{domain_name}"
      }
    }
  }
  if [macid1] != "" {
    mutate {
      gsub => ["macid1","-",":"]
      lowercase => ["macid1"]
    }
    mutate {
      merge => {
        "principal.asset.mac" => "macid1"
      }
    }
  }
  if [macid2] != "" {
    mutate {
      gsub => ["macid2","-",":"]
      lowercase => ["macid2"]
    }
    mutate {
      merge => {
        "principal.asset.mac" => "macid2"
      }
    }
  }
  if [macid3] != "" {
    grok {
      match => {
        "macid3" => "MAC:macid3"
      }
      overwrite => ["macid3"]
      on_error => "not_mac"
    }
    if ![not_mac] {
      mutate {
        gsub => ["macid3","-",":"]
        lowercase => ["macid3"]
      }
      mutate {
        merge => {
          "principal.asset.mac" => "macid3"
        }
      }
    }
  }
  if [event_name] =~ "Firewall Event" {
    if [direction] == "INBOUND" {
      if [remote_ip] != "" {
        mutate {
          merge => {
            "principal.ip" => "remote_ip"
          }
        }
      }
      if [remote_port] != "" {
        mutate {
          convert => {
            "remote_port" => integer
          }
        }
        mutate {
          rename => {
            "remote_port" => "principal.port"
          }
        }
      }
      if [local_ip] != "" {
        mutate {
          merge => {
            "target.ip" => "local_ip"
          }
        }
      }
      if [local_port] != "" {
        mutate {
          convert => {
            "local_port" => integer
          }
        }
        mutate {
          rename => {
            "local_port" => "target.port"
          }
        }
      }
    }
    else {
      if [remote_ip] != "" {
        mutate {
          merge => {
            "target.ip" => "remote_ip"
          }
        }
      }
      if [remote_port] != "" {
        mutate {
          convert => {
            "remote_port" => integer
          }
        }
        mutate {
          rename => {
            "remote_port" => "target.port"
          }
        }
      }
      if [local_ip] != "" {
        mutate {
          merge => {
            "principal.ip" => "local_ip"
          }
        }
      }
      if [local_port] != "" {
        mutate {
          convert => {
            "local_port" => integer
          }
        }
        mutate {
          rename => {
            "local_port" => "principal.port"
          }
        }
      }
    }
  }
  else {
    if [str_ip_address] != "" {
      mutate {
        merge => {
          "principal.ip" => "str_ip_address"
        }
      }
    }
  }
  if [username] != "" {
    mutate {
      replace => {
        "principal.user.userid" => "%{username}"
      }
    }
  }
  if [protocol] != "" {
    mutate {
      replace => {
        "network.ip_protocol" => "%{protocol}"
      }
    }
  }
  if [exception_name] != "" {
    mutate {
      replace => {
        "security_result.rule_name" => "%{exception_name}"
      }
    }
  }
  if [firewall_level] != "" {
    mutate {
      replace => {
        "firewall_level_label.key" => "firewall_level"
        "firewall_level_label.value" => "%{firewall_level}"
      }
      merge => {
        "security_result.detection_fields" => "firewall_level_label"
      }
    }
  }
  if [operating_system] != "" {
    mutate {
      replace => {
        "principal.asset.platform_software.platform_version" => "%{operating_system}"
      }
    }
    if [operating_system] =~ "(?i)Win" {
      mutate {
        replace => {
          "principal.asset.platform_software.platform" => "WINDOWS"
        }
      }
    }
    else if [operating_system] =~ "(?i)(MAC|IOS)" {
      mutate {
        replace => {
          "principal.asset.platform_software.platform" => "MAC"
        }
      }
    }
    else if [operating_system] =~ "(?i)LINUX" {
      mutate {
        replace => {
          "principal.asset.platform_software.platform" => "LINUX"
        }
      }
    }
  }
  if [os_version] != "" {
    mutate {
      replace => {
        "principal.asset.platform_software.platform_patch_level" => "%{os_version}"
      }
    }
  }
  if [asset_name] != "" {
    mutate {
      replace => {
        "asset_name_label.key" => "asset_name"
        "asset_name_label.value" => "%{asset_name}"
      }
      merge => {
        "principal.asset.attribute.labels" => "asset_name_label"
      }
    }
  }
  if [last_shutdown_before] != "" {
    mutate {
      replace => {
        "last_shutdown_before_label.key" => "last_shutdown_before"
        "last_shutdown_before_label.value" => "%{last_shutdown_before}"
      }
      merge => {
        "principal.asset.attribute.labels" => "last_shutdown_before_label"
      }
    }
  }
  if [system_manufacturer] != "" {
    mutate {
      replace => {
        "hardware.manufacturer" => "%{system_manufacturer}"
      }
    }
  }
  if [ram] != "" {
    mutate {
      replace => {
        "hardware.ram" => "%{ram}"
      }
    }
  }
  if [processor_name] != "" {
    mutate {
      replace => {
        "hardware.cpu_model" => "%{processor_name}"
      }
    }
  }
  if [hardware] != "" {
    mutate {
      merge => {
        "principal.asset.hardware" => "hardware"
      }
    }
  }
  if [SoftwarePath] != "" {
    mutate {
      replace => {
        "principal.process.file.full_path" => "%{SoftwarePath}"
      }
    }
  }
  else if [file_path] != "" {
    mutate {
      replace => {
        "principal.process.file.full_path" => "%{file_path}"
      }
    }
  }
  if [website] != "" {
    mutate {
      replace => {
        "target.url" => "%{website}"
      }
    }
  }
  if [category] != "" {
    mutate {
      merge => {
        "security_result.category_details" => "category"
      }
    }
  }
  else if [channel_type] != "" {
    mutate {
      merge => {
        "security_result.category_details" => "channel_type"
      }
    }
  }
  if [details] != "" {
    mutate {
      replace => {
        "security_result.summary" => "%{details}"
      }
    }
  }
  else if [summary] != "" {
    mutate {
      replace => {
        "security_result.summary" => "%{summary}"
      }
    }
  }
  else if [event_details] != "" {
    mutate {
      replace => {
        "security_result.summary" => "%{event_details}"
      }
    }
    grok {
      match => {
        "event_details" => "Modified/Copied to %{GREEDYDATA:file_path}"
      }
      on_error => "file_not_found"
      overwrite => ["file_path"]
    }
    if ![file_not_found] {
      mutate {
        replace => {
          "target.file.full_path" => "%{file_path}"
        }
      }
    }
  }
  else if [action_taken] != "" {
    mutate {
      replace => {
        "security_result.summary" => "%{action_taken}"
      }
    }
  }
  if [virus_name] != "" {
    mutate {
      replace => {
        "security_result.threat_name" => "%{virus_name}"
      }
    }
  }
  if [scan_info_id] != "" {
    mutate {
      gsub => ["scan_info_id", "{", ""]
    }
    mutate {
      gsub => ["scan_info_id", "}", ""]
    }
    mutate {
      replace => {
        "principal.process.product_specific_process_id"  => "ScanID:%{scan_info_id}"
      }
    }
  }
  if [group_name] != "" {
    mutate {
      merge => {
        "principal.user.group_identifiers" => "group_name"
      }
    }
  }
  if [module] != "" {
    mutate {
      replace => {
        "security_result.action_details" => "%{module}"
      }
    }
  }
  if [scan_info_type] != "" {
    mutate {
      replace => {
        "scan_info_type_label.key" => "scan_info_type"
        "scan_info_type_label.value" => "%{scan_info_type}"
      }
      merge => {
        "security_result.detection_fields" => "scan_info_type_label"
      }
    }
  }
  if [unauthorized_app_cnt] not in ["","0"] {
    mutate {
      replace => {
        "unauthorized_app_cnt_label.key" => "unauthorized_app_cnt"
        "unauthorized_app_cnt_label.value" => "%{unauthorized_app_cnt}"
      }
      merge => {
        "security_result.detection_fields" => "unauthorized_app_cnt_label"
      }
    }
  }
  if [authorized_app_cnt] not in ["","0"] {
    mutate {
      replace => {
        "authorized_app_cnt_label.key" => "authorized_app_cnt"
        "authorized_app_cnt_label.value" => "%{authorized_app_cnt}"
      }
      merge => {
        "security_result.detection_fields" => "authorized_app_cnt_label"
      }
    }
  }
  if [installed_app_cnt] not in ["","0"] {
    mutate {
      replace => {
        "installed_app_cnt_label.key" => "installed_app_cnt"
        "installed_app_cnt_label.value" => "%{installed_app_cnt}"
      }
      merge => {
        "security_result.detection_fields" => "installed_app_cnt_label"
      }
    }
  }
  if [channel_details] != "" {
    mutate {
      replace => {
        "channel_details_label.key" => "channel_details"
        "channel_details_label.value" => "%{channel_details}"
      }
      merge => {
        "security_result.detection_fields" => "channel_details_label"
      }
    }
  }
  if [wifi_name] != "" {
    mutate {
      replace => {
        "wifi_name_label.key" => "wifi_name"
        "wifi_name_label.value" => "%{wifi_name}"
      }
      merge => {
        "principal.asset.attribute.labels" => "wifi_name_label"
      }
    }
  }
  if [physical_address] != "" {
    mutate {
      gsub => ["physical_address", "-", ":"]
    }
    mutate {
      merge => {
        "principal.mac" => "physical_address"
      }
    }
  }
  if [infected_file] != "" {
    mutate {
      replace => {
        "target.file.full_path" => "%{infected_file}"
      }
    }
  }
  if [device_product] != "" {
    mutate {
      rename => {
        "device_product" => "metadata.product_name"
      }
    }
  }
  if [device_version] != "" {
    mutate {
      rename => {
        "device_version" => "metadata.product_version"
      }
    }
  }
  if [device_vendor] != "" {
    mutate {
      rename => {
        "device_vendor" => "metadata.vendor_name"
      }
    }
  }
  if [event_name] != "" {
    mutate {
      replace => {
        "metadata.product_event_type" => "%{event_name}"
      }
    }
  }
  if [event_name] =~ "Firewall Event" {
    mutate {
      replace => {
        "metadata.event_type" => "NETWORK_CONNECTION"
      }
    }
  }
  else if [event_name] =~ "Web Security" {
    mutate {
      replace => {
        "metadata.event_type" => "SCAN_NETWORK"
      }
    }
  }
  else {
    mutate {
      replace => {
        "metadata.event_type" => "SCAN_UNCATEGORIZED"
      }
    }
  }

  # merge the data into udm nouns.
  if [metadata] != "" {
    mutate {
      rename => {
        "metadata" => "event.idm.read_only_udm.metadata"
      }
    }
  }
  if [principal] != "" {
    mutate {
      rename => {
        "principal" => "event.idm.read_only_udm.principal"
      }
    }
  }
  if [network] != "" {
    mutate {
      rename => {
        "network" => "event.idm.read_only_udm.network"
      }
    }
  }
  if [target] != "" {
    mutate {
      rename => {
        "target" => "event.idm.read_only_udm.target"
      }
    }
  }
  if [security_result] != "" {
    mutate {
      merge => {
        "event.idm.read_only_udm.security_result" => "security_result"
      }
    }
  }

  mutate {
    merge => {
      "@output" => "event"
    }
  }
}

