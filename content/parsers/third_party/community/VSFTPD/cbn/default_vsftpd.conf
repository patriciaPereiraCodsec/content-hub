# Product: VSFTPD
# Category: FTP Server
# Supported Format: GROK
# Reference: https://www.ossec.net/docs/log_samples/ftp/vsftpd.html
# Last Updated: 2023-11-20
# Copyright 2023 Chronicle LLC

filter {
  mutate {
    replace => {
      "event" => ""
      "network" => ""
      "principal" => ""
      "target" => ""
      "security_result" => ""
      "extensions" => ""
      "metadata" => ""
      "client_ip" => ""
      "userid" => ""
      "event_time" => ""
      "response_code" => ""
      "description" => ""
      "pid" => ""
      "type" => ""
      "file_name" => ""
      "speed" => ""
      "file_size" => ""
      "ftp_response_description" => ""
      "response_code_field" => ""
      "ssl_version" => ""
      "ssl_shutdown_state" => ""
      "certificate" => ""
      "cipher" => ""
      "reused_status" => ""
      "ssl_shutdown_state_field" => ""
      "certificate_field" => ""
      "reused_status_field" => ""
      "mechanism_type" => ""
      "action" => ""
      "speed_field" => ""
      "desc" => ""
      "timestamp" => ""
      "day" => ""
      "date" => ""
      "month" => ""
      "year" => ""
      "time" => ""
    }
  }

  grok {
    match => {
      "message" => [
        "panter %{GREEDYDATA:timestamp} \\[pid %{INT:pid}\\] \\[%{USERNAME:userid}\\] %{GREEDYDATA:type}: Client \\\"%{IP:client_ip}\\\", \\\"%{GREEDYDATA:file_name}\\\", %{INT:file_size} bytes, %{GREEDYDATA:speed}",
        "panter %{GREEDYDATA:timestamp} \\[pid %{INT:pid}\\] %{GREEDYDATA:type}: Client \\\"%{IP:client_ip}\\\", \\\"%{GREEDYDATA:file_name}\\\", %{INT:file_size} bytes, %{GREEDYDATA:speed}",
        "panter %{GREEDYDATA:timestamp} \\[pid %{INT:pid}\\] \\[%{USERNAME:userid}\\] %{GREEDYDATA:type}: Client \\\"%{IP:client_ip}\\\", \\\"%{GREEDYDATA:file_name}\\\", %{GREEDYDATA:speed}",
        "panter %{GREEDYDATA:timestamp} \\[pid %{INT:pid}\\] \\[%{USERNAME:userid}\\] %{GREEDYDATA:type}: Client \\\"%{IP:client_ip}\\\", \\\"%{GREEDYDATA:description}\\\"",
        "panter %{GREEDYDATA:timestamp} \\[pid %{INT:pid}\\] %{GREEDYDATA:type}: Client \\\"%{IP:client_ip}\\\", \\\"%{GREEDYDATA:description}\\\"",
        "panter %{GREEDYDATA:timestamp} \\[pid %{INT:pid}\\] \\[%{USERNAME:userid}\\] %{GREEDYDATA:type}: Client \\\"%{IP:client_ip}\\\"",
        "panter %{GREEDYDATA:timestamp} \\[pid %{INT:pid}\\] %{GREEDYDATA:type}: Client \\\"%{IP:client_ip}\\\"",
      ]
    }
    on_error => "not_an_ftp_grok"
    overwrite => ["pid","userid","description","type","client_ip","file_name","speed","file_size","timestamp"]
  }

  if [pid] != "" {
    mutate {
      replace => {
        "principal.process.pid" => "%{pid}"
      }
      on_error => "no_pid"
    }
  }

  if [client_ip] != "" {
    mutate {
      merge => {
        "principal.ip" => "client_ip"
      }
      on_error => "no_client_ip"
    }
  }

  if [userid] != "" {
    if [type] == "OK LOGIN" {
      mutate {
        replace => {
          "target.user.userid" => "%{userid}"
        }
        on_error => "no_user_id"
      }
    }
    else {
      mutate {
        replace => {
          "principal.user.userid" => "%{userid}"
        }
        on_error => "no_user_id"
      }
    }
  }

  if [type] != "" {
    mutate {
      replace => {
        "metadata.description" => "%{type}"
      }
      on_error => "no_type"
    }
  }

  if [timestamp] != "" {
    grok {
      match => {
        "timestamp" => [
          "%{DAY:day} %{MONTH:month}\\s+%{MONTHDAY:date} %{TIME:time} %{YEAR:year}"
        ]
      }
      on_error => "no_timestamp"
      overwrite => ["day","month","date","time","year"]
    }
  }

  mutate {
    replace => {
      "event_time" => "%{month}-%{date}-%{year} %{time}"
    }
    on_error => "no_time_data"
  }

  if [event_time] != "" {
    date {
      match => ["event_time","MMM-dd-yyyy HH:mm:ss"]
      target => "metadata.event_timestamp"
      on_error => "no_event_time"
    }
  }

  if [type] == "FTP response" {
    if [description] != "" {
      grok {
        match => {
          "description" => [
            "%{INT:response_code}(-| )%{GREEDYDATA:ftp_response_description}"
          ]
        }
        on_error => "no_description"
        overwrite => ["response_code","ftp_response_description"]
      }
    }
  }
  else if [type] == "FTP command" {
    if [description] != "" {
      mutate {
        replace => {
          "network.ftp.command" => "%{description}"
        }
        on_error => "no_ftp_command"
      }
    }
  }
  else if [type] == "DEBUG" {
    if [description] != "" {
      grok {
        match => {
          "description" => [
            "SSL shutdown state is: %{GREEDYDATA:ssl_shutdown_state}",
            "SSL version: %{GREEDYDATA:ssl_version}, SSL cipher: %{GREEDYDATA:cipher}, %{GREEDYDATA:reused_status}, %{GREEDYDATA:certificate}",
          ]
        }
        on_error => "no_debug_description"
        overwrite => ["ssl_version","reused_status","certificate","ssl_shutdown_state","cipher"]
      }
    }

    if [no_debug_description] {
      mutate {
        replace => {
          "security_result.description" => "%{description}"
        }
        on_error => "no_description"
      }
    }
  }
  else if [type] == "OK LOGIN" {
    mutate {
      replace => {
        "extensions.auth.type" => "MACHINE"
        "mechanism_type" => "NETWORK"
      }
      merge => {
        "extensions.auth.mechanism" => "mechanism_type"
      }
      on_error => "no_extensions"
    }
    mutate {
      replace => {
        "metadata.description" => "LOGIN"
      }
      on_error => "no_description"
    }
  }
  else if [type] in ["OK DOWNLOAD","FAIL DOWNLOAD"] {
    if [file_size] != "" {
      mutate {
        replace => {
          "network.received_bytes" => "%{file_size}"
        }
        convert => {
          "network.received_bytes" => "uinteger"
        }
        on_error => "no_download_bytes"
      }
    }

    mutate {
      replace => {
        "metadata.description" => "DOWNLOAD"
      }
      on_error => "no_description"
    }

    if [speed] != "" {
      mutate {
        replace => {
          "speed_field.key" => "download_speed"
          "speed_field.value.string_value" => "%{speed}"
        }
        merge => {
          "event.idm.read_only_udm.additional.fields" => "speed_field"
        }
        on_error => "no_speed"
      }
    }
  }
  else if [type] in ["OK UPLOAD","FAIL UPLOAD"] {
    if [file_size] != "" {
      mutate {
        replace => {
          "network.sent_bytes" => "%{file_size}"
        }
        convert => {
          "network.sent_bytes" => "uinteger"
        }
        on_error => "no_download_bytes"
      }
    }

    mutate {
      replace => {
        "metadata.description" => "UPLOAD"
      }
      on_error => "no_description"
    }

    if [speed] != "" {
      mutate {
        replace => {
          "speed_field.key" => "upload_speed"
          "speed_field.value.string_value" => "%{speed}"
        }
        merge => {
          "event.idm.read_only_udm.additional.fields" => "speed_field"
        }
        on_error => "no_speed"
      }
    }
  }
  else if [type] in ["OK MKDIR","OK RMDIR","OK DELETE"] {
    grok {
      match => {
        "type" => [
          "OK %{WORD:desc}",
        ]
      }
      on_error => "no_desc"
      overwrite => ["desc"]
    }

    if [description] != "" {
      mutate {
        replace => {
          "file_name" => "%{description}"
        }
        on_error => "no_description"
      }
    }

    if [desc] != "" {
      mutate {
        replace => {
          "metadata.description" => "%{desc}"
        }
        on_error => "no_desc"
      }
    }
  }

  if [response_code] not in ["", "-"] {
    mutate {
      replace => {
        "network.http.response_code" => "%{response_code}"
      }
      on_error => "invalid_response_code"
    }
    if ![invalid_response_code] {
      mutate {
        convert => {
          "network.http.response_code" => "integer"
        }
        on_error => "invalid_conversion"
      }
    }
  }

  if [response_code_field] != "" {
    mutate {
      merge => {
        "security_result.detection_fields" => "response_code_field"
      }
      on_error => "no_response_code_field"
    }
  }

  if [certificate] != "" {
    mutate {
      replace => {
        "certificate_field.key" => "cert"
        "certificate_field.value" => "%{certificate}"
      }
      on_error => "no_certificate"
    }
  }

  if [certificate_field] != "" {
    mutate {
      merge => {
        "security_result.detection_fields" => "certificate_field"
      }
      on_error => "no_certificate_field"
    }
  }

  if [ssl_shutdown_state] != "" {
    mutate {
      replace => {
        "ssl_shutdown_state_field.key" => "SSL Shutdown State"
        "ssl_shutdown_state_field.value" => "%{ssl_shutdown_state}"
      }
      on_error => "no_ssl_shutdown_state"
    }
  }

  if [ssl_shutdown_state_field] != "" {
    mutate {
      merge => {
        "security_result.detection_fields" => "ssl_shutdown_state_field"
      }
      on_error => "no_ssl_shutdown_state"
    }
  }

  if [reused_status] != "" {
    mutate {
      replace => {
        "reused_status_field.key" => "reused status"
        "reused_status_field.value" => "%{reused_status}"
      }
      on_error => "no_reused_status"
    }
  }

  if [reused_status_field] != "" {
    mutate {
      merge => {
        "security_result.detection_fields" => "reused_status_field"
      }
      on_error => "no_reused_status"
    }
  }

  if [cipher] != "" {
    mutate {
      replace => {
        "network.tls.cipher" => "%{cipher}"
      }
      on_error => "no_cipher"
    }
  }

  if [ssl_version] != "" {
    mutate {
      replace => {
        "network.tls.version" => "%{ssl_version}"
      }
      on_error => "no_version"
    }
  }

  if [ftp_response_description] != "" {
    mutate {
      replace => {
        "security_result.description" => "%{ftp_response_description}"
      }
      on_error => "no_ftp_response_description"
    }
  }

  if [file_name] != "" {
    mutate {
      replace => {
        "target.file.full_path" => "%{file_name}"
      }
      on_error => "no_file_name"
    }
  }

  if [type] =~ "OK" {
    mutate {
      replace => {
        "action" => "ALLOW"
      }
      merge => {
        "security_result.action" => "action"
      }

      on_error => "no_action"
    }
    mutate {
      replace => {
        "security_result.action_details" => "%{type}"
      }
      on_error => "no_type"
    }
  }
  else if [type] =~"FAIL" {
    mutate {
      replace => {
        "action" => "BLOCK"
      }
      merge => {
        "security_result.action" => "action"
      }
      on_error => "no_action"
    }
    mutate {
      replace => {
        "security_result.action_details" => "%{type}"
      }
      on_error => "no_type"
    }
  }

  if [type] in ["OK UPLOAD","OK DOWNLOAD","FAIL DOWNLOAD","OK MKDIR","OK RMDIR","OK DELETE","FAIL DOWNLOAD","FAIL UPLOAD"] {
    mutate {
      replace => {
        "metadata.event_type" => "FILE_UNCATEGORIZED"
      }
    }
  }
  else if [type] == "OK LOGIN" {
    mutate {
      replace => {
        "metadata.event_type" => "USER_LOGIN"
      }
    }
  }
  else {
    mutate {
      replace => {
        "metadata.event_type" => "STATUS_UPDATE"
      }
    }
  }

  mutate {
    replace => {
      "metadata.product_name" => "VSFTPD"
      "metadata.vendor_name" => "VSFTPD"
    }
  }

  if [principal] != "" {
    mutate {
      rename => {
        "principal" => "event.idm.read_only_udm.principal"
      }
    }
  }

  if [target] != "" {
    mutate {
      rename => {
        "target" => "event.idm.read_only_udm.target"
      }
    }
  }

  if [metadata] != "" {
    mutate {
      rename => {
        "metadata" => "event.idm.read_only_udm.metadata"
      }
    }
  }

  if [network] != "" {
    mutate {
      rename => {
        "network" => "event.idm.read_only_udm.network"
      }
    }
  }

  if [extensions] != "" {
    mutate {
      rename => {
        "extensions" => "event.idm.read_only_udm.extensions"
      }
    }
  }

  if [security_result] != "" {
    mutate {
      merge => {
        "event.idm.read_only_udm.security_result" => "security_result"
      }
      on_error => "no_security_result"
    }
  }

  mutate {
    merge => {
      "@output" => "event"
    }
  }
}
