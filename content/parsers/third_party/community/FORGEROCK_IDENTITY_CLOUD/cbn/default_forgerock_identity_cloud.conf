# Product: FORGEROCK_IDENTITY_CLOUD
# Category: Cloud Security
# Supported Format: JSON
# Reference: NA
# Last Updated: 2026-03-30
# Copyright 2026 Google SecOps

filter {
  mutate {
    replace => {
      "ip" => ""
      "principal" => ""
      "metadata" => ""
      "userId" => ""
      "ou_data" => ""
      "has_principal" => "false"
      "has_principal_user" => "false"
      "kv_data" => ""
      "payload.userId" => ""
      "extensions" => ""
      "payload.client.ip" => ""
      "payload.client.port" => ""
      "payload.component" => ""
      "payload.eventName" => ""
      "payload.http.request.method" => ""
      "payload.http.request.path" => ""
      "payload.source" => ""
      "payload.topic" => ""
      "payload.level" => ""
      "payload.timestamp" => ""
      "payload.transactionId" => ""
      "has_network_http" => "false"
      "network" => ""
      "accept-api-version" => ""
      "host" => ""
      "user-agent" => ""
      "payload.http.request.secure" => ""
      "x_forwarded_for" => ""
      "x-forwarded-proto" => ""
      "payload.operation" => ""
      "payload.objectId" => ""
      "target" => ""
      "payload.realm" => ""
      "ipAddress" => ""
      "tenant_url" => ""
      "source_cloud" => ""
      "type" => ""
    }
  }
  mutate {
    gsub => ["message", '\"principal\"', '\"applicationPrincipal\"']
  }
  json {
    source => "message"
    array_function => "split_columns"
    on_error => "invalid_json"
  }
  if [invalid_json] {
    mutate {
      replace => {
        "json_message" => "%{message}}"
      }
      on_error => "json_message_replace_failed"
    }
    json {
      source => "json_message"
      array_function => "split_columns"
      on_error => "invalid_json2"
    }
    if [invalid_json2] {
      mutate {
        replace => {
          "json_message" => "{%{message}}"
        }
        on_error => "json_message_replace_failed"
      }
      json {
        source => "json_message"
        array_function => "split_columns"
        on_error => "invalid_json3"
      }
      if [invalid_json3] {
        drop {
          tag => "TAG_MALFORMED_MESSAGE"
        }
      }
    }
  }
  if [payload][client][ip] != "" {
    mutate {
      merge => {
        "principal.ip" => "payload.client.ip"
        "principal.asset.ip" => "payload.client.ip"
      }
      on_error => "ip_merge_failed"
    }
    if ![ip_merge_failed] {
      mutate {
        replace => {
          "has_principal" => "true"
        }
      }
    }
  }

  if [payload][client][port] != "" {
    mutate {
      convert => {
        "payload.client.port" => "integer"
      }
      on_error => "convert_failed"
    }
    mutate {
      rename => {
        "payload.client.port" => "principal.port"
      }
    }
  }

  if [payload][http][request][method] != "" {
    mutate {
      replace => {
        "network.http.method" => "%{payload.http.request.method}"
        "has_network_http" => "true"
      }
      on_error => "method_replace_failed"
    }
  }
  if [payload][http][request][path] != "" {
    mutate {
      replace => {
        "target.url" => "%{payload.http.request.path}"
      }
      on_error => "path_replace_failed"
    }
  }

  if [payload][topic] != "" {
    mutate {
      replace => {
        "topic_label.key" => "topic"
        "topic_label.value.string_value" => "%{payload.topic}"
      }
      on_error => "topic_label_replace_failed"
    }
    if ![topic_label_replace_failed] {
      mutate {
        merge => {
          "event.idm.read_only_udm.additional.fields" => "topic_label"
        }
        on_error => "merge_failed"
      }
    }
  }

  mutate {
    replace => {
      "accept-api-version" => "%{payload.http.request.headers.accept-api-version.0}"
    }
    on_error => "accept-api-version_replace_failed"
  }
  if [accept-api-version] != "" {
    mutate {
      replace => {
        "aav_label.key" => "accept-api-version"
        "aav_label.value.string_value" => "%{accept-api-version}"
      }
      on_error => "aav_label_replace_failed"
    }
    if ![aav_label_replace_failed] {
      mutate {
        merge => {
          "event.idm.read_only_udm.additional.fields" => "aav_label"
        }
        on_error => "merge_failed"
      }
    }
  }
  mutate {
    replace => {
      "host" => "%{payload.http.request.headers.host.0}"
    }
    on_error => "host_replace_failed"
  }

  if [host] != "" {
    mutate {
      replace => {
        "principal.hostname" => "%{host}"
        "principal.asset.hostname" => "%{host}"
      }
      on_error => "host_replace_failed"
    }
  }

  mutate {
    replace => {
      "user-agent" => "%{payload.http.request.headers.user-agent.0}"
    }
    on_error => "user-agent_replace_failed"
  }

  if [user-agent] != "" {
    mutate {
      replace => {
        "network.http.user_agent" => "%{user-agent}"
      }
      on_error => "user-agent_replace_failed"
    }
  }

  if [payload][http][request][secure] != "" {
    mutate {
      convert => {
        "payload.http.request.secure" => "string"
      }
      on_error => "convert_failed"
    }
    mutate {
      replace => {
        "secure_label.key" => "secure"
        "secure_label.value.string_value" => "%{payload.http.request.secure}"
      }
      on_error => "secure_label_replace_failed"
    }
    if ![secure_label_replace_failed] {
      mutate {
        merge => {
          "event.idm.read_only_udm.additional.fields" => "secure_label"
        }
        on_error => "merge_failed"
      }
    }
  }

  mutate {
    replace => {
      "x_forwarded_for" => "%{payload.http.request.headers.x-forwarded-for.0}"
    }
    on_error => "x_forwarded_for_replace_failed"
  }
  if [x_forwarded_for] != "" {
    mutate {
      gsub => ['x_forwarded_for', ',','\",\"']
    }
    mutate {
      gsub => ['x_forwarded_for', ' ','']
    }
    mutate {
      replace => {
        "x_forwarded_for" => "{\"x_forwarded_for\":[\"%{x_forwarded_for}\"]}"
      }
      on_error => "x_forwarded_for_replace_failed"
    }
    json {
      source => "x_forwarded_for"
      array_function => "split_columns"
      on_error => "x_forwarded_for_json_failed"
    }
    for xip in x_forwarded_for {
      mutate {
        merge => {
          "principal.ip" => "xip"
          "principal.asset.ip" => "xip"
        }
        on_error => "x_forwarded_for_merge_failed"
      }
      if ![x_forwarded_for_merge_failed] {
        mutate {
          replace => {
            "has_principal" => "true"
          }
        }
      }
    }
  }

  mutate {
    replace => {
      "x-forwarded-proto" => "%{payload.http.request.headers.x-forwarded-proto.0}"
    }
    on_error => "x-forwarded-proto_replace_failed"
  }

  if [x-forwarded-proto] in ["https", "http"] {
    mutate {
      uppercase => ["x-forwarded-proto"]
    }
    mutate {
      replace => {
        "network.application_protocol" => "%{x-forwarded-proto}"
      }
      on_error => "x-forwarded-proto_replace_failed"
    }
  }

  for key,value in payload.request.detail map {
    mutate {
      convert => {
        "value" => "string"
      }
      on_error => "convert_failed"
    }
    mutate {
      replace => {
        "detail_label" => ""
      }
    }
    if [key] != "" and [value] != "" {
      mutate {
        replace => {
          "detail_label.value.string_value" => "%{value}"
          "detail_label.key" => "%{key}"
        }
        on_error => "detail_label_replace_failed"
      }
      if ![detail_label_replace_failed] {
        mutate {
          merge => {
            "event.idm.read_only_udm.additional.fields" => "detail_label"
          }
          on_error => "detail_label_merge_failed"
        }
      }
    }
  }

  for key,value in payload.response map {
    mutate {
      convert => {
        "value" => "string"
      }
      on_error => "convert_failed"
    }
    mutate {
      replace => {
        "detail_label" => ""
      }
    }
    if [key] == "statusCode" and [value] != "" {
      mutate {
        convert => {
          "value" => "integer"
        }
        on_error => "convert_failed"
      }
      mutate {
        rename => {
          "value" => "network.http.response_code"
        }
      }
    }
    else if [key] != "" and [value] != "" {
      mutate {
        replace => {
          "detail_label.value.string_value" => "%{value}"
          "detail_label.key" => "%{key}"
        }
        on_error => "detail_label_replace_failed"
      }
      if ![detail_label_replace_failed] {
        mutate {
          merge => {
            "event.idm.read_only_udm.additional.fields" => "detail_label"
          }
          on_error => "detail_label_merge_failed"
        }
      }
    }
  }
  for key,value in payload.request map {
    mutate {
      convert => {
        "value" => "string"
      }
      on_error => "convert_failed"
    }
    mutate {
      replace => {
        "detail_label" => ""
      }
    }
    if [key] != "" and [value] != "" {
      mutate {
        replace => {
          "detail_label.value.string_value" => "%{value}"
          "detail_label.key" => "%{key}"
        }
        on_error => "detail_label_replace_failed"
      }
      if ![detail_label_replace_failed] {
        mutate {
          merge => {
            "event.idm.read_only_udm.additional.fields" => "detail_label"
          }
          on_error => "detail_label_merge_failed"
        }
      }
    }
  }

  mutate {
    replace => {
      "trackingId_list.value" => ""
    }
  }

  for trackingId in payload.trackingIds {
    mutate {
      replace => {
        "ti_label" => ""
      }
    }
    mutate {
      replace => {
        "ti_label.string_value" => "%{trackingId}"
      }
      on_error => "no_trackingId"
    }
    mutate {
      merge => {
        "trackingId_list.value.list_value.values" => "ti_label"
      }
      on_error => "no_trackingId_label"
    }
  }

  if [trackingId_list][value] != "" {
    mutate {
      replace => {
        "trackingId_list.key" => "trackingIds"
      }
    }
    mutate {
      merge => {
        "event.idm.read_only_udm.additional.fields" => "trackingId_list"
      }
      on_error => "trackingId_list_merge_failed"
    }
  }

  if [payload][operation] != "" {
    mutate {
      replace => {
        "Security_Result.action_details" => "%{payload.operation}"
      }
      on_error => "operation_replace_failed"
    }
  }

  if [payload][objectId] != "" {
    mutate {
      replace => {
        "objectId_label.key" => "objectId"
        "objectId_label.value.string_value" => "%{payload.objectId}"
      }
      on_error => "objectId_label_replace_failed"
    }
    if ![objectId_label_replace_failed] {
      mutate {
        merge => {
          "event.idm.read_only_udm.additional.fields" => "objectId_label"
        }
        on_error => "objectId_merge_failed"
      }
    }
  }
  if [payload][_id] != "" {
    mutate {
      replace => {
        "id_label.key" => "id"
        "id_label.value.string_value" => "%{payload._id}"
      }
      on_error => "id_label_replace_failed"
    }
    if ![id_label_replace_failed] {
      mutate {
        merge => {
          "event.idm.read_only_udm.additional.fields" => "id_label"
        }
        on_error => "merge_failed"
      }
    }
  }
  for index, application in payload.applicationPrincipal {
    mutate {
      convert => {
        "index" => "string"
      }
      on_error => "convert_failed"
    }
    if [index] != "0" {
      mutate {
        replace => {
          "app_label.key" => "application %{index}"
          "app_label.value" => "%{application}"
        }
        on_error => "app_label_replace_failed"
      }
      if ![app_label_replace_failed] {
        mutate {
          merge => {
            "target.resource.attribute.labels" => "app_label"
          }
          on_error => "app_merge_failed"
        }
      }
    }
  }
  mutate {
    replace => {
      "target.application" => "%{payload.applicationPrincipal.0}"
    }
    on_error => "replace_failed"
  }

  if [payload][realm] != "" {
    mutate {
      replace => {
        "realm_label.key" => "realm"
        "realm_label.value" => "%{payload.realm}"
      }
      on_error => "realm_label_replace_failed"
    }
    if ![realm_label_replace_failed] {
      mutate {
        merge => {
          "target.resource.attribute.labels" => "realm_label"
        }
        on_error => "realm_merge_failed"
      }
    }
  }
  if [payload][source] != "" {
    mutate {
      replace => {
        "source_label.key" => "source"
        "source_label.value.string_value" => "%{payload.source}"
      }
      on_error => "source_label_replace_failed"
    }
    if ![source_label_replace_failed] {
      mutate {
        merge => {
          "event.idm.read_only_udm.additional.fields" => "source_label"
        }
        on_error => "source_merge_failed"
      }
    }
  }

  if [payload][component] != "" {
    mutate {
      replace => {
        "target.resource.name" => "%{payload.component}"
      }
      on_error => "component_label_replace_failed"
    }
  }
  if [payload][eventName] != "" {
    mutate {
      replace => {
        "metadata.product_event_type" => "%{payload.eventName}"
      }
      on_error => "replace_failed"
    }
  }

  if [payload][timestamp] != "" {
    date {
      match => ["payload.timestamp", "ISO8601"]
      target => "metadata.event_timestamp"
      on_error => "timestamp_parse_failed"
    }
  }

  if [payload][level] =~ "(?i)ERROR|CRITICAL|error|critical" {
    mutate {
      replace => {
        "Security_Result.severity" => "%{payload.level}"
      }
    }
  }
  else if [payload][level] in ["INFO", "info"] {
    mutate {
      replace => {
        "Security_Result.severity" => "INFORMATIONAL"
      }
    }
  }
  else if [payload][level] in ["WARN", "warn"] {
    mutate {
      replace => {
        "Security_Result.severity" => "MEDIUM"
      }
    }
  }
  else if [payload][level] in ["DEBUG", "debug"] {
    mutate {
      replace => {
        "Security_Result.severity" => "LOW"
      }
    }
  }
  else {
    mutate {
     replace => {
      "Security_Result.severity" => "UNKNOWN_SEVERITY"
     }
    }
  }

  if [payload][level] != "" {
    mutate {
      replace => {
        "Security_Result.severity_details" => "%{payload.level}"
      }
      on_error => "level_replace_failed"
    }
  }

  if [payload][transactionId] != "" {
    mutate {
      replace => {
        "transactionId_label.key" => "transactionId"
        "transactionId_label.value.string_value" => "%{payload.transactionId}"
      }
      on_error => "transactionId_label_replace_failed"
    }
    mutate {
      merge => {
        "event.idm.read_only_udm.additional.fields" => "transactionId_label"
      }
      on_error => "merge_failed"
    }
  }
  if [payload][userId] != "" {
    grok {
      match => {
        "payload.userId" => [
          "id=%{DATA:userId},%{GREEDYDATA:ou_data}"
        ]
      }
      overwrite => ["userId", "ou_data"]
      on_error => "grok_failed"
    }
    if ![grok_failed] {
      if [userId] != "" {
        mutate {
          replace => {
            "principal.user.userid" => "%{userId}"
            "has_principal_user" => "true"
          }
          on_error => "user_id_replace_failed"
        }
      }
      mutate {
        replace => {
          "user_distinguished_name.key" => "OU data"
          "user_distinguished_name.value" => "%{ou_data}"
        }
        on_error => "user_distinguished_name_replace_failed"
      }
      if ![user_distinguished_name_replace_failed] and [ou_data] != "" {
        mutate {
          merge => {
            "principal.user.attribute.labels" => "user_distinguished_name"
          }
          on_error => "user_distinguished_name_merge_failed"
        }
      }
    }
    else {
      mutate {
        replace => {
          "principal.user.userid" => "%{payload.userId}"
          "has_principal_user" => "true"
        }
        on_error => "principal_user_id_replace_failed"
      }
    }
  }
  mutate {
    replace => {
      "source_cloud" => "%{source}"
    }
    on_error => "source_cloud_replace_failed"
  }
  if ![source_cloud_replace_failed] and [source_cloud] != "" {
    mutate {
      replace => {
        "source_cloud_label.key" => "source_cloud"
        "source_cloud_label.value.string_value" => "%{source_cloud}"
      }
      on_error => "source_cloud_label_replace_failed"
    }
    if ![source_cloud_label_replace_failed] {
      mutate {
        merge => {
          "event.idm.read_only_udm.additional.fields" => "source_cloud_label"
        }
        on_error => "source_cloud_merge_failed"
      }
    }
  }
  if [type] != "" {
    mutate {
      replace => {
        "type_label.key" => "type"
        "type_label.value.string_value" => "%{type}"
      }
      on_error => "type_label_replace_failed"
    }
    if ![type_label_replace_failed] {
      mutate {
        merge => {
          "event.idm.read_only_udm.additional.fields" => "type_label"
        }
        on_error => "type_merge_failed"
      }
    }
  }
  for entry in payload.entries {
    mutate {
      replace => {
        "display_name_label" => ""
        "entry_info_displayName" => ""
        "entry_info_authLevel" => ""
        "entry_info_authLevel_label" => ""
        "entry_info_nodeExtraLogging_auditInfo_clientId" => ""
        "entry_info_nodeExtraLogging_auditInfo_EventName_label" => ""
        "entry_info_nodeExtraLogging_auditInfo_EventName" => ""
        "entry_info_nodeExtraLogging_auditInfo_FlowType_label" => ""
        "entry_info_nodeExtraLogging_auditInfo_FlowType" => ""
        "entry_info_nodeExtraLogging_auditInfo_Status" => ""
        "entry_info_nodeExtraLogging_auditInfo_Timestamp_label" => ""
        "entry_info_nodeExtraLogging_auditInfo_Timestamp" => ""
        "entry_info_nodeExtraLogging_auditInfo_TransactionId" => ""
        "entry_info_nodeId" => ""
        "entry_info_nodeOutcome_label" => ""
        "entry_info_nodeOutcome" => ""
        "entry_info_nodeType_label" => ""
        "entry_info_nodeType" => ""
        "entry_info_treeName" => ""
      }
    }
    mutate {
      replace => {
        "entry_info_nodeExtraLogging_auditInfo_clientId" => "%{entry.info.nodeExtraLogging.auditInfo.ClientId}"
      }
      on_error => "entry_info_nodeExtraLogging_auditInfo_clientId_replace_failed"
    }
    if ![entry_info_nodeExtraLogging_auditInfo_clientId_replace_failed] and [entry_info_nodeExtraLogging_auditInfo_clientId] != "" {
      mutate {
        replace => {
          "principal.application" => "%{entry_info_nodeExtraLogging_auditInfo_clientId}"
        }
        on_error => "entry_info_nodeExtraLogging_auditInfo_clientId_merge_failed"
      }
    }
    mutate {
      replace => {
        "entry_info_nodeExtraLogging_auditInfo_EventName" => "%{entry.info.nodeExtraLogging.auditInfo.EventName}"
      }
      on_error => "entry_info_nodeExtraLogging_auditInfo_EventName_replace_failed"
    }
    if ![entry_info_nodeExtraLogging_auditInfo_EventName_replace_failed] and [entry_info_nodeExtraLogging_auditInfo_EventName] != "" {
      mutate {
        replace => {
          "entry_info_nodeExtraLogging_auditInfo_EventName_label.key" => "entry_info_nodeExtraLogging_auditInfo_EventName"
          "entry_info_nodeExtraLogging_auditInfo_EventName_label.value" => "%{entry_info_nodeExtraLogging_auditInfo_EventName}"
        }
        on_error => "entry_info_nodeExtraLogging_auditInfo_EventName_label_replace_failed"
      }
      if ![entry_info_nodeExtraLogging_auditInfo_EventName_label_replace_failed] {
        mutate {
          merge => {
            "Security_Result.detection_fields" => "entry_info_nodeExtraLogging_auditInfo_EventName_label"
          }
          on_error => "entry_info_nodeExtraLogging_auditInfo_EventName_label_merge_failed"
        }
      }
    }
     mutate {
      replace => {
        "entry_info_nodeExtraLogging_auditInfo_FlowType" => "%{entry.info.nodeExtraLogging.auditInfo.FlowType}"
      }
      on_error => "entry_info_nodeExtraLogging_auditInfo_FlowType_replace_failed"
    }
    if ![entry_info_nodeExtraLogging_auditInfo_FlowType_replace_failed] and [entry_info_nodeExtraLogging_auditInfo_FlowType] != "" {
      mutate {
        replace => {
          "entry_info_nodeExtraLogging_auditInfo_FlowType_label.key" => "entry_info_nodeExtraLogging_auditInfo_FlowType"
          "entry_info_nodeExtraLogging_auditInfo_FlowType_label.value" => "%{entry_info_nodeExtraLogging_auditInfo_FlowType}"
        }
        on_error => "entry_info_nodeExtraLogging_auditInfo_FlowType_label_replace_failed"
      }
      if ![entry_info_nodeExtraLogging_auditInfo_FlowType_label_replace_failed] {
        mutate {
          merge => {
            "Security_Result.detection_fields" => "entry_info_nodeExtraLogging_auditInfo_FlowType_label"
          }
          on_error => "entry_info_nodeExtraLogging_auditInfo_FlowType_label_merge_failed"
        }
      }
    }
    mutate {
      replace => {
        "entry_info_nodeExtraLogging_auditInfo_Status" => "%{entry.info.nodeExtraLogging.auditInfo.Status}"
      }
      on_error => "entry_info_nodeExtraLogging_auditInfo_Status_replace_failed"
    }
    if ![entry_info_nodeExtraLogging_auditInfo_Status_replace_failed] {
      if [entry_info_nodeExtraLogging_auditInfo_Status] == "Success" {
        mutate {
          replace => {
            "action" => "ALLOW"
          }
        }
        mutate {
          merge => {
            "Security_Result.action" => "action"
          }
          on_error => "status_merge_failed"
        }
      } else if [entry_info_nodeExtraLogging_auditInfo_Status] != "" {
        mutate {
          replace => {
            "action" => "BLOCK"
          }
        }
        mutate {
          merge => {
            "Security_Result.action" => "action"
          }
          on_error => "status_merge_failed"
        }
      }
    }
    mutate {
      replace => {
        "entry_info_nodeExtraLogging_auditInfo_Timestamp" => "%{entry.info.nodeExtraLogging.auditInfo.Timestamp}"
      }
