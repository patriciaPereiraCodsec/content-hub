# Product: Thales MFA
# Category: Authentication
# Supported Format: SYSLOG + KV (CEF)
# Reference: N/A
# Last Updated: 2025-11-07
# Copyright 2025 Google SecOps


filter {
  mutate {
    replace => {
      "application" => ""
      "type" => ""
      "subtype" => ""
      "reason" => ""
      "outcome" => ""
      "event_type" => ""
      "msgId" => ""
      "deviceProduct" => ""
      "deviceVersion" => ""
      "severity" => ""
    }
  }

  grok {
    match => {
      "message" => [
        "%{MONTH:month}\\s+%{MONTHDAY:day}%{TIME:time} %{IPORHOST:intHost} CEF:\\d+\\|%{DATA:product}\\|%{DATA:deviceProduct}\\|%{INT:deviceVersion}\\|%{DATA:type}\\|%{DATA:subtype}\\|%{INT:severity}\\| suser=%{DATA:userid} act=%{DATA:action1} outcome=%{DATA:outcome} reason=%{DATA:reason} msg=%{GREEDYDATA:msgId}",
        "%{MONTH:month}\\s+%{MONTHDAY:day}%{TIME:time} %{IPORHOST:intHost} CEF:\\d+\\|%{DATA:product}\\|%{DATA:deviceProduct}\\|%{INT:deviceVersion}\\|%{DATA:type}\\|%{DATA:subtype}\\|%{INT:severity}\\| src=%{IP:srcIp} agent=%{DATA:application} suser=%{DATA:userid} act=%{DATA:action1} outcome=%{DATA:outcome} (reason=%{DATA:reason} )?msg=%{GREEDYDATA:msgId}"
        "%{MONTH:month}\\s+%{MONTHDAY:day}%{TIME:time} %{IPORHOST:intHost} CEF:\\d+\\|%{DATA:product}\\|%{DATA:deviceProduct}\\|%{INT:deviceVersion}\\|%{DATA:type}\\|%{DATA:subtype}\\|%{INT:severity}\\| src=%{IP:srcIp} agent=%{DATA:application} suser=%{DATA:userid} act=%{DATA:action1} outcome=%{DATA:outcome} reason=%{GREEDYDATA:reason}"
        "%{MONTH:month}\\s+%{MONTHDAY:day}%{TIME:time} %{IPORHOST:intHost} CEF:\\d+\\|%{DATA:product}\\|%{DATA:deviceProduct}\\|%{INT:deviceVersion}\\|%{DATA:type}\\|%{DATA:subtype}\\|%{INT:severity}\\| src=%{IP:srcIp} agent=%{DATA:application} suser=%{DATA:userid} act=%{DATA:action1} outcome=%{NOTSPACE:outcome}"
      ]
    }
    overwrite => ["reason", "msgId", "application", "outcome", "deviceProduct", "deviceVersion", "severity", "type", "subtype"]
  }

  mutate {
    replace => {
      "event.idm.read_only_udm.metadata.vendor_name" => "Thales"
      "event.idm.read_only_udm.metadata.product_name" => "%{product}"
      "event.idm.read_only_udm.target.user.userid" => "%{userid}"
      "event.idm.read_only_udm.extensions.auth.type" => "SSO"
      "event.idm.read_only_udm.metadata.product_event_type" => "%{action1}"
    }
  }
  if [application] != "" {
    mutate {
      replace => {
        "event.idm.read_only_udm.target.application" => "%{application}"
      }
      on_error => "application_not_found"
    }
  }
  if [type] != "" {
    mutate {
      replace => {
        "event.idm.read_only_udm.metadata.description" => "%{type}"
      }
      on_error => "type_not_found"
    }
  }
  if [subtype] != "" {
    mutate {
      replace => {
        "event.idm.read_only_udm.target.resource.resource_subtype" => "%{subtype}"
      }
      on_error => "subtype_not_found"
    }
  }
  mutate {
    merge => {
      "event.idm.read_only_udm.principal.ip" => "srcIp"
    }
    on_error => "srcIp_not_found"
  }

  if [deviceProduct] != "" {
    mutate {
      replace => {
        "intermediary.resource.name" => "%{deviceProduct}"
      }
      on_error => "deviceProduct_not_found"
    }
  }
  if [deviceVersion] != "" {
    mutate {
      replace => {
        "event.idm.read_only_udm.metadata.product_version" => "%{deviceVersion}"
      }
      on_error => "deviceVersion_not_found"
    }
  }
  if [severity] != "" {
    mutate {
      replace => {
        "security_result.severity_details" => "%{severity}"
      }
      on_error => "severity_not_found"
    }
  }

  if [action1] == "AUTH_ATTEMPT" or [action1] == "OUTERWINDOW_AUTH_ATTEMPT" or [action1] == "LoggedIn" {
    mutate {
      replace => {
        "event.idm.read_only_udm.metadata.event_type" => "USER_LOGIN"
      }
    }
    mutate {
      replace => {
        "security_result.description" => "%{reason}"
      }
      on_error => "reason_not_set"
    }
  } else {
    mutate {
      replace => {
        "event.idm.read_only_udm.metadata.event_type" => "USER_UNCATEGORIZED"
      }
    }
    if [reason] != "" {
      mutate {
        replace => {
          "security_result.description" => "%{reason}"
        }
        on_error => "reason_not_found"
      }
    }
  }
  if [msgId] != "" {
    mutate {
      replace => {
        "event.idm.read_only_udm.target.user.user_display_name" => "%{msgId}"
      }
      on_error => "msgId_empty"
    }
  }

  if [event][idm][read_only_udm][metadata][event_type] == "USER_LOGIN" and [outcome] in ["AUTH_SUCCESS", "success"] {
    mutate {
      replace => {
        "sec_action" => "ALLOW"
        "security_result.summary" => "Successful Login"
      }
    }
  }
  else if [outcome] == "AUTH_FAILURE" {
    mutate {
      replace => {
        "sec_action" => "BLOCK"
        "security_result.summary" => "Failed Login"
      }
    }
    mutate {
      replace => {
        "security_result.rule_name" => "%{reason}"
      }
      on_error => "reason_not_set_1"
    }
  }
  else if [outcome] != "" {
    mutate {
      replace => {
        "security_result.summary" => "%{outcome}"
      }
      on_error => "outcome_not_set"
    }
  }
  if [outcome] == "CHALLENGE" {
    mutate {
      replace => {
        "sec_action" => "BLOCK"
        "security_result.summary" => "Failed Login"
      }
    }
  }

  mutate {
    replace => {
      "security_result.action_details" => "%{action1}"
    }
    on_error => "action_details_not_set"
  }

  mutate {
    merge => {
      "security_result.action" => "sec_action"
    }
    on_error => "sec_action_not_defined"
  }

  mutate {
    merge => {
      "event.idm.read_only_udm.security_result" => "security_result"
    }
    on_error => "security_result_not_set"
  }

  mutate {
    replace => {
      "intHost1" => "%{intHost}"
    }
  }
  mutate {
    convert => {
      "intHost1" => "ipaddress"
    }
    on_error => "int_not_ip"
  }

  if [int_not_ip] {
    mutate {
      replace => {
        "intermediary.hostname" => "%{intHost}"
      }
    }
  }
  else {
    mutate {
      merge => {
        "intermediary.ip" => "intHost"
      }
    }
  }

  mutate {
    merge => {
      "event.idm.read_only_udm.intermediary" => "intermediary"
    }
  }

  mutate {
    merge => {
      "@output" => "event"
    }
  }
}
