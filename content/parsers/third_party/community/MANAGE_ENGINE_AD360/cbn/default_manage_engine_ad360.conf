# Product: Manage Engine AD360
# Category: Identity and Access Management
# Supported Format: SYSLOG + KV
# Reference: https://www.manageengine.com/active-directory-360/document.html
# Last Updated: 2025-08-19
# Copyright 2025 Google SecOps

filter {
  mutate {
    replace => {
      "principal_hostname" => ""
      "timestamp" => ""
      "kv_data" => ""
      "SRC" => ""
      "SPT" => ""
      "DPT" => ""
      "PROTO" => ""
      "DST" => ""
      "OUT" => ""
      "LEN" => ""
      "metadata_event_type" => ""
      "WINDOW" => ""
      "TTL" => ""
      "TOS" => ""
      "PREC" => ""
      "URGP" => ""
      "product_event_type" => ""
      "inner_message" => ""
      "network_direction" => ""
      "protocol" => ""
      "action" => ""
      "src_ip" => ""
      "src_port" => ""
      "dst_ip" => ""
      "dst_port" => ""
      "bytes" => ""
      "connection_id" => ""
      "intermediary" => ""
      "message_number" => ""
      "description" => ""
      "security_result" => ""
      "EventPriority" => ""
      "DeviceUUID" => ""
      "ConnectionID" => ""
      "SrcIP" => ""
      "DstIP" => ""
      "SrcPort" => ""
      "DstPort" => ""
      "IngressZone" => ""
      "EgressZone" => ""
      "IngressInterface" => ""
      "EgressInterface" => ""
      "ACPolicy" => ""
      "AccessControlRuleName" => ""
      "NAPPolicy" => ""
      "result_action" => ""
      "pid" => ""
      "ses" => ""
      "ppid" => ""
      "res" => ""
      "exe" => ""
      "request_method" => ""
      "url" => ""
      "application_protocol" => ""
      "http_status" => ""
      "user_agent" => ""
      "json_data" => ""
      "action_id" => ""
      "client_ip" => ""
      "source_ip" => ""
      "source_port" => ""
      "destination_ip" => ""
      "destination_port" => ""
      "distinguished_name_device_id" => ""
      "distinguished_name_user" => ""
      "geoip.city_name" => ""
      "geoip.country_name" => ""
      "geoip.latitude" => ""
      "geoip.longitude" => ""
      "id" => ""
      "rule_name" => ""
      "csv_data" => ""
      "kv_data1" => ""
      "appname" => ""
      "hostname" => ""
      "has_principal" => "false"
      "has_target" => "false"
      "TechnicianName" => ""
      "ACTION" => ""
      "ModuleName" => ""
      "Nombre_de_objeto" => ""
      "Nombre_de_dominio" => ""
      "Estado" => ""
      "telephoneNumber" => ""
      "has_target_user" => "false"
    }
  }

  grok {
    match => {
      "message" => [
        "<%{INT}>%{SYSLOGTIMESTAMP:timestamp}\\s+%{DATA:principal_hostname} firewall\\[.*?\\]: \\[%{DATA}\\]: %{GREEDYDATA:kv_data}",
        "<%{INT}>%{SYSLOGTIMESTAMP:timestamp}\\s+%{DATA:principal_hostname} %{DATA}: \\[%{DATA}\\] (?P<json_data>\\{.*)"
        "<%{INT}>%{SYSLOGTIMESTAMP:timestamp}\\s+%{DATA:principal_hostname} (?P<product_event_type>routing): %{DATA}: %{GREEDYDATA:inner_message}"
        "<%{INT}>%{SYSLOGTIMESTAMP:timestamp}\\s+%{DATA:principal_hostname} %{DATA}:\\s+%{IP:SRC} - - \\[.*?\\] \"%{WORD:request_method} %{DATA:url} %{DATA:application_protocol}/%{NOTSPACE}\" %{INT:http_status} %{INT} \"\" \"%{DATA:user_agent}\" -",
        "<%{INT}>(?P<timestamp>%{MONTH} +%{MONTHDAY}( %{YEAR})? %{TIME}) %{DATA:principal_hostname}(?:(\\s+:\\s+)|(\\s+))%{DATA:product_event_type}:(\\s+\\[.*?\\]:)?\\s+%{GREEDYDATA:inner_message}",
        "<%{INT}>%{INT} %{TIMESTAMP_ISO8601:timestamp} %{DATA:principal_hostname} %{DATA} \\[.*?level=\"%{NOTSPACE:EventPriority}\".*?\\]\\s+%{GREEDYDATA:inner_message}"
        "<%{INT}>%{INT} %{TIMESTAMP_ISO8601:timestamp} %{DATA:principal_hostname} %{DATA:product_event_type} (%{INT}\\s+)?(- - -|- -)\\s+%{GREEDYDATA:inner_message}"
        "<%{INT}>%{SYSLOGTIMESTAMP:timestamp}\\s+%{DATA:principal_hostname} %{DATA}: %{GREEDYDATA:inner_messgae}"
        "<%{INT}>%{SYSLOGTIMESTAMP:timestamp}\\s+%{DATA:principal_hostname} (?P<csv_data>MSWinEventLog.*)",
        "<%{INT}>%{GREEDYDATA:timestamp}\\s+%{HOSTNAME:principal_hostname}\\s+%{DATA}:\\s+\\[%{GREEDYDATA:kv_data1}\\]"
      ]
    }
    overwrite => ["timestamp", "principal_hostname", "kv_data", "product_event_type", "EventPriority", "inner_message", "SRC", "request_method", "url", "application_protocol", "user_agent", "http_status", "json_data", "csv_data", "kv_data1"]
    on_error => "grok_parse_failure"
  }
  json {
    source => "message"
    on_error => "not_message_json"
  }
  mutate {
    gsub => ["message", "\\]\\[", " #"]
  }
  mutate {
    gsub => ["kv_data1", "\\]\\[", " #"]
  }
  mutate {
    gsub => ["message", "\\]", ""]
  }
  mutate {
    gsub => ["message", "\\[", ""]
  }
  mutate {
    gsub => ["message", "Nombre de objeto", "Nombre_de_objeto"]
  }
  mutate {
    gsub => ["message", "Nombre de dominio", "Nombre_de_dominio"]
  }
  kv {
    source => "message"
    field_split => "#"
    value_split => "="
    on_error => "message_kv_parse_failure"
  }
  kv {
    source => "kv_data1"
    field_split => "#"
    value_split => "="
    on_error => "kv_data1_kv_parse_failure"
  }

  if [appname] != "" {
    mutate {
      replace => {
        "event.idm.read_only_udm.principal.application" => "%{appname}"
      }
      on_error => "appname_not_found"
    }
  }
  mutate {
    rename => {
      "facility" => "addition.facility"
      "priority" => "addition.priority"
      "version" => "addition.version"
      "Tipo de contraseña" => "addition.password_type"
      "Nombre de la plantilla" => "addition.template_name"
      "mobile" => "addition.mobile"
      "userAccountControl" => "addition.user_account_control"
    }
  }
  for key, value in addition map {
    mutate {
      replace => {
        "_field" => ""
      }
    }
    mutate {
      convert => {
        "value" => "string"
      }
      on_error => "value_conversion_error"
    }
    mutate {
      replace => {
        "_check" => "%{value}"
      }
      on_error => "no_value"
    }
    if ![no_value] and [value] != "" {
      mutate {
        replace => {
          "_field.key" => "%{key}"
        }
      }
      if key in ["priority", "facility", "version", "password_type", "template_name", "mobile"] {
        mutate {
          replace => {
            "_field.value.string_value" => "%{value}"
          }
        }
        mutate {
          merge => {
            "event.idm.read_only_udm.additional.fields" => "_field"
          }
          on_error => "addition_merge_additional_failed"
        }
      }
      else if key == "user_account_control" {
        mutate {
          replace => {
            "_field.value" => "%{value}"
          }
        }
        mutate {
          merge => {
            "event.idm.read_only_udm.target.resource.attribute.labels" => "_field"
          }
          on_error => "addition_target_merge_additional_failed"
        }
      }
      else {
        mutate {
          replace => {
            "_field.value" => "%{value}"
          }
          on_error => "addition_value_string_value_failed"
        }
        mutate {
          merge => {
            "security_result.detection_fields" => "_field"
          }
          on_error => "addition_merge_additional_failed"
        }
      }
    }
  }
  if [hostname] != "" {
    mutate {
      replace => {
        "event.idm.read_only_udm.principal.hostname" => "%{hostname}"
        "event.idm.read_only_udm.principal.asset.hostname" => "%{hostname}"
      }
      on_error => "hostname_not_found"
    }
    if ![hostname_not_found] {
      mutate {
        replace => {
          "has_principal" =>  "true"
        }
        on_error => "has_principal_not_found"
      }
    }
  }
  if [TechnicianName] != "" {
    mutate {
      replace => {
        "event.idm.read_only_udm.principal.user.userid" => "%{TechnicianName}"
      }
      on_error => "technician_name_not_found"
    }
  }
  if [ACTION] != "" {
    mutate {
      replace => {
        "security_result.rule_name" => "%{ACTION}"
      }
      on_error => "action_not_found"
    }
  }
  if [ModuleName] != "" {
    mutate {
      replace => {
        "event.idm.read_only_udm.principal.process.command_line" => "%{ModuleName}"
      }
      on_error => "module_name_not_found"
    }
  }
  if [Nombre_de_objeto] != "" {
    mutate {
      replace => {
        "event.idm.read_only_udm.target.user.userid" => "%{Nombre_de_objeto}"
      }
      on_error => "nombre_de_objet_not_found"
    }
    if ![nombre_de_objet_not_found] {
      mutate {
        replace => {
          "has_target_user" =>  "true"
        }
        on_error => "has_target_not_found"
      }
    }
  }
  if [Nombre_de_dominio] != "" {
    mutate {
      replace => {
        "event.idm.read_only_udm.target.administrative_domain" => "%{Nombre_de_dominio}"
      }
      on_error => "nombre_de_dominio_not_found"
    }
  }
  if [Estado] != "" {
    mutate {
      replace => {
        "security_result.summary" => "%{Estado}"
      }
      on_error => "estado_not_found"
    }
  }
  if [telephoneNumber] != "" {
    mutate {
      merge => {
        "event.idm.read_only_udm.target.user.phone_numbers" => "telephoneNumber"
      }
      on_error => "telephoneNumber_not_found"
    }
  }


  if [grok_parse_failure] and [not_message_json] {
    drop {
      tag => "TAG_MALFORMED_ENCODING"
    }
  }

  if [product_event_type] != "" {
    grok {
      match => {
        "product_event_type" => [
          "^%{DATA}-%{INT}-%{WORD:message_number}$",
          "^%{DATA}-%{WORD}-%{INT}-%{WORD:message_number}$",
        ]
      }
      overwrite => ["message_number"]
      on_error => "tag_error"
    }
  }

  if [inner_message] != "" {
    if [message_number] in ["302013", "302014", "302015", "302016", "106023", "305011", "305012", "805001", "805002", "106015", "302020", "302021", "418019"] {
      grok {
        match => {
          "inner_message" => [
            # Inbound ASA-6-302013, ASA-6-302014, ASA-6-302015, ASA-6-302016
            "(?P<action>Built|Teardown)(?: (?P<network_direction>Inbound|inbound))? %{WORD:protocol} connection %{INT:connection_id} for %{DATA:src_interface}%{IPORHOST:src_ip}/%{INT:src_port}( \\(%{DATA:src_mapped_interface}?%{IPORHOST:src_mapped_ip}/%{INT:src_mapped_port}\\))?(?:\\(%{DATA:src_fwuser}\\))? to %{DATA:dst_interface}%{IPORHOST:dst_ip}/%{INT:dst_port}( \\(%{IPORHOST:dst_mapped_ip}/%{INT:dst_mapped_port}\\))?(\\(%{DATA:dst_fwuser}\\))?(?: duration %{DATA:duration} bytes %{INT:bytes})?\\s*%{GREEDYDATA:rest}",
            # Outbond ASA-6-302013, ASA-6-302014, ASA-6-302015, ASA-6-302016
            "(?P<action>Built|Teardown)(?: (?P<network_direction>Outbound|outbound))? %{WORD:protocol} connection %{INT:connection_id} for %{DATA:dst_interface}%{IPORHOST:dst_ip}/%{INT:dst_port}( \\(%{DATA:dst_mapped_interface}?%{IPORHOST:dst_mapped_ip}/%{INT:dst_mapped_port}\\))?(?:\\(%{DATA:dst_fwuser}\\))? to %{DATA:src_interface}%{IPORHOST:src_ip}/%{INT:src_port}( \\(%{IPORHOST:src_mapped_ip}/%{INT:src_mapped_port}\\))?(\\(%{DATA:src_fwuser}\\))?(?: duration %{DATA:duration} bytes %{INT:bytes})?\\s*%{GREEDYDATA:rest}",
            # FTD-4-106023
            "(?P<inner_message>(?P<action>Deny) %{WORD:protocol} src %{DATA:src_interface}:%{IP:src_ip}(/%{INT:src_port})? dst %{DATA:dst_interface}:%{IPORHOST:dst_ip}(/%{INT:dst_port})?)"
            # FTD-6-805001, 805002
            "(?:Offloaded %{WORD:protocol} Flow|%{WORD:protocol} Flow is no longer offloaded) for connection %{DATA:connection_id} from %{DATA:src_interface}:%{IP:src_ip}/%{INT:src_port}.*? to %{DATA:dst_interface}:%{IPORHOST:dst_ip}/%{INT:dst_port}"
            # ASA-6-305011, FTD-6-305012
            "(?P<action>Built|Teardown) (dynamic) %{WORD:protocol} translation from (?P<src_interface>[^:]*):%{IP:src_ip}/%{INT:src_port}(\\(%{DATA:src_fwuser}\\))? to (?P<dst_interface>[^:]*):%{IP:dst_ip}/%{INT:dst_port}"
            # ASA-6-106015
            "(?P<action>Deny) %{WORD:protocol} \\(%{DATA:policy_id}\\) from %{DATA:src_interface}?%{IP:src_ip}/%{INT:src_port} to %{IP:dst_ip}/%{INT:dst_port} flags\\s+%{DATA:tcp_flags}\\s* on interface %{GREEDYDATA:dst_interface}",
            # ASA-6-302020, ASA-6-302021
            "(?P<action>Built|Teardown)\\s?(?P<direction>Inbound|inbound|Outbound|outbound)? %{WORD:protocol} connection for faddr %{IP:dst_ip}/%{INT:dst_port}(?:\\(%{DATA:fwuser}\\))? gaddr %{IPORHOST:src_xlated_ip}/%{INT:icmp_code_xlated} laddr %{IPORHOST:src_ip}/%{INT:src_port}(?: type %{INT:icmp_type} code %{INT:icmp_code})?",
            # FTD-3-418019
            "(sent to|received from) neighbor %{IP:dst_ip} %{GREEDYDATA}bytes"
          ]
        }
        overwrite => ["action", "network_direction", "protocol", "connection_id", "src_ip", "src_port", "dst_ip", "dst_port", "bytes", "inner_message"]
      }

      mutate {
        replace => {
          "description" => "%{inner_message}"
        }
      }
    }
    else if [message_number] == "430002" {
      kv {
        source => "inner_message"
        field_split => ","
        value_split => ":"
      }

      mutate {
        replace => {
          "PROTO" => "%{Protocol}"
        }
        on_error => "protocol_not_found"
      }

      if [SrcIP] != "" and [DstIP] != "" {
        mutate {
          replace => {
            "metadata_event_type" => "NETWORK_CONNECTION"
          }
        }
      }
    }
    else if [product_event_type] == "audispd" {
      grok {
        match => {
          "inner_message" => [
            "node=%{DATA} type=%{DATA} msg=%{DATA}:\\s+%{GREEDYDATA:inner_message}"
          ]
        }
        overwrite => ["inner_message"]
      }

      mutate {
        gsub => ["inner_message", " ([a-zA-Z0-9_]*=)", "|$1"]
      }

      kv {
        source => "inner_message"
        field_split => "|"
        value_split => "="
      }
    }
    else if [product_event_type] == "routing" {
      grok {
        match => {
          "inner_message" => [
            "(sent to|received from) neighbor %{IP:dst_ip}"
          ]
        }
        overwrite => ["dst_ip"]
        on_error => "routing_grok_failure"
      }

      mutate {
        replace => {
          "description" => "%{inner_message}"
        }
      }
    }
    else {
      mutate {
        replace => {
          "description" => "%{inner_message}"
        }
      }
    }
  }
  else if [json_data] != "" {
    json {
      source => "json_data"
      on_error => "not_json"
    }

    if [source_ip] != "" {
      mutate {
        replace => {
          "SRC" => "%{source_ip}"
        }
      }
    }

    if [destination_ip] != "" {
      mutate {
        replace => {
          "DST" => "%{destination_ip}"
        }
      }
    }
  }
  else if [csv_data] != "" {
    mutate {
      gsub => ["csv_data", "\\t", "|"]
    }
    csv {
      source => "csv_data"
      target => "csv"
      separator => "|"
      on_error => "csv_parse_failure"
    }

    if ![csv_parse_failure] {
      mutate {
        replace => {
          "product_event_type" => "%{csv.column1}"
        }
      }

      mutate {
        replace => {
          "description" => "%{csv.column13}"
        }
      }

      grok {
        match => {
          "description" => [
            "packet from %{IP:src_ip}"
          ]
        }
        overwrite => ["src_ip"]
        on_error => "ip_not_found"
      }
    }
    else {
      mutate {
        replace => {
          "description" => "%{csv_data}"
        }
      }
    }
  }

  if [kv_data] != "" {
    mutate {
      gsub => ["kv_data", " ([A-Za-z0-9_]*?=)", "|$1"]
    }

    kv {
      source => "kv_data"
      value_split => "="
      field_split => "|"
    }
  }

  if [network_direction] =~ "(?i)outbound" {
    if [src_ip] != "" {
      mutate {
        replace => {
          "DST" => "%{src_ip}"
        }
      }
    }

    if [src_port] != "" {
      mutate {
        replace => {
          "DPT" => "%{src_port}"
        }
      }
    }

    if [dst_ip] != "" {
      mutate {
        replace => {
          "SRC" => "%{dst_ip}"
        }
      }
    }

    if [dst_port] != "" {
      mutate {
        replace => {
          "SPT" => "%{dst_port}"
        }
      }
    }
  }
  else {
    if [src_ip] != "" {
      mutate {
        replace => {
          "SRC" => "%{src_ip}"
        }
      }
    }

    if [src_port] != "" {
      mutate {
        replace => {
          "SPT" => "%{src_port}"
        }
      }
    }

    if [dst_ip] != "" {
      mutate {
        replace => {
          "DST" => "%{dst_ip}"
        }
      }
    }

    if [dst_port] != "" {
      mutate {
        replace => {
          "DPT" => "%{dst_port}"
        }
      }
    }
  }

  if [principal_hostname] != "" {
    grok {
      match => {
        "principal_hostname" => "%{IP:principal_ip}"
      }
      on_error => "not_an_ip"
    }

    if ![not_an_ip] {
      mutate {
        merge => {
          "event.idm.read_only_udm.principal.ip" => "principal_ip"
        }
      }
    }
    else {
      mutate {
        replace => {
          "event.idm.read_only_udm.principal.hostname" => "%{principal_hostname}"
        }
      }
    }
  }

  if [SRC] != "" {
    mutate {
      merge => {
        "event.idm.read_only_udm.principal.ip" => "SRC"
      }
    }
  }
  else if [SrcIP] != "" {
    mutate {
      merge => {
        "event.idm.read_only_udm.principal.ip" => "SrcIP"
      }
    }
  }

  if [client_ip] != "" {
    mutate {
      merge => {
        "event.idm.read_only_udm.principal.ip" => "client_ip"
      }
    }
  }

  if [SPT] != "" {
    mutate {
      convert => {
        "SPT" => "integer"
      }
    }
    mutate {
      rename => {
        "SPT" => "event.idm.read_only_udm.principal.port"
      }
    }
  }
  else if [SrcPort] != "" {
    mutate {
      convert => {
        "SrcPort" => "integer"
      }
    }
    mutate {
      rename => {
        "SrcPort" => "event.idm.read_only_udm.principal.port"
      }
    }
  }
  else if [source_port] != "" {
    mutate {
      convert => {
        "source_port" => "integer"
      }
      on_error => "already_integer"
    }
    mutate {
      rename => {
        "source_port" => "event.idm.read_only_udm.principal.port"
      }
    }
  }

  if [IngressZone] != "" {
    mutate {
      replace => {
        "event.idm.read_only_udm.principal.location.name" => "%{IngressZone}"
      }
    }
  }

  if [exe] != "" {
    mutate {
      gsub => ["exe", '^\\"|\"{1}$', ""]
    }
    mutate {
      replace => {
        "event.idm.read_only_udm.principal.process.command_line" => "%{exe}"
      }
    }
  }

  if [geoip][city_name] != "" {
    mutate {
      replace => {
        "event.idm.read_only_udm.principal.location.city" => "%{geoip.city_name}"
      }
    }
  }

  if [geoip][country_name] != "" {
    mutate {
      replace => {
        "event.idm.read_only_udm.principal.location.country_or_region" => "%{geoip.country_name}"
      }
    }
  }

  if [geoip][latitude] != "" {
    mutate {
      rename => {
        "geoip.latitude" => "event.idm.read_only_udm.principal.location.region_latitude"
      }
    }
    mutate {
      convert => {
        "event.idm.read_only_udm.principal.location.region_latitude" => "float"
      }
      on_error => "already_float_value"
    }
  }

  if [geoip][longitude] != "" {
    mutate {
      rename => {
        "geoip.longitude" => "event.idm.read_only_udm.principal.location.region_longitude"
      }
    }
    mutate {
      convert => {
        "event.idm.read_only_udm.principal.location.region_longitude" => "float"
      }
      on_error => "already_float_value"
    }
  }

  if [DST] != "" {
    mutate {
      merge => {
        "event.idm.read_only_udm.target.ip" => "DST"
      }
    }
  }
  else if [DstIP] != "" {
    mutate {
      merge => {
        "event.idm.read_only_udm.target.ip" => "DstIP"
      }
    }
  }

  if [DPT] != "" {
    mutate {
      convert => {
        "DPT" => "integer"
      }
    }
    mutate {
      rename => {
        "DPT" => "event.idm.read_only_udm.target.port"
      }
    }
  }
  else if [DstPort] != "" {
    mutate {
      convert => {
        "DstPort" => "integer"
      }
    }
    mutate {
      rename => {
        "DstPort" => "event.idm.read_only_udm.target.port"
      }
    }
  }
  else if [destination_port] != "" {
    mutate {
      convert => {
        "destination_port" => "integer"
      }
      on_error => "already_integer"
    }
    mutate {
      rename => {
