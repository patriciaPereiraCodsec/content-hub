# Product: PerimeterX_Bot_Protection
# Category: Security
# Supported Format: JSON
# Reference: N/A
# Last Updated: 2023-11-30
# Copyright 2023 Chronicle LLC

filter {
  mutate {
    replace => {
      "weHash" => ""
      "wePublicId" => ""
      "fileName" => ""
      "agentId" => ""
      "agentName" => ""
      "endTime" => ""
      "startTime" => ""
      "lastModified" => ""
      "action" => ""
      "accountId" => ""
      "service" => ""
      "principalId" => ""
      "requestId" => ""
      "resourceName" => ""
      "resourceId" => ""
      "status" => ""
      "hasRecords" => ""
      "hasFailedRecord" => ""
      "workspaceId" => ""
      "responseData" => ""
      "security_result_action" => ""
      "principal" => ""
      "target" => ""
      "network" => ""
      "metadata" => ""
      "additional" => ""
      "security_result" => ""
      "has_principal" => "false"
      "has_target" => "false"
    }
  }

  json {
    source => "message"
    array_function => "split_columns"
    on_error => "not_json"
  }

  json {
    source => "requestData"
    array_function => "split_columns"
    on_error => "not_json"
  }

  if [fileName] != "" {
    mutate {
      merge => {
        "principal.file.names" => "fileName"
      }
      on_error => "resp_filenames_not_found"
    }
  }
  if [resourceName] != "" {
    mutate {
      replace => {
        "principal.resource.name" => "%{resourceName}"
      }
      on_error => "resourceName_empty"
    }
  }
  if [resourceId] != "" {
    mutate {
      replace => {
        "principal.resource.product_object_id" => "%{resourceId}"
      }
      on_error => "resourceId_empty"
    }
  }
  if [agentName] != "" {
    mutate {
      replace => {
        "principal.hostname" => "%{agentName}"
        "principal.asset.hostname" => "%{agentName}"
        "has_principal" =>  "true"
      }
      on_error => "agentName_empty"
    }
  }
  if [agentId] != "" {
    mutate {
      replace => {
        "metadata.product_deployment_id" => "%{agentId}"
      }
      on_error => "no_agentId"
    }
  }

  if [requestId] != "" {
    mutate {
      replace => {
        "metadata.product_log_id" => "%{requestId}"
      }
      on_error => "signin_id_error"
    }
  }

  if [accountId] != "" {
    mutate {
      replace => {
        "principal.resource.id" => "%{accountId}"
        "principal.resource.product_object_id" => "%{accountId}"
      }
      on_error => "no_accountID"
    }
  }
  if [principalId] != "" {
    mutate {
      replace => {
        "principal.user.userid" => "%{principalId}"
        "has_principal_user" => "true"
      }
      on_error => "no_principalId"
    }
  }
  if [endTime] != "" {
    mutate {
      replace => {
        "endTime_label.value.string_value" => "%{endTime}"
      }
      on_error => "endTime_empty"
    }
    if ![endTime_empty] {
      mutate {
        replace => {
          "endTime_label.key" => "endTime"
        }
      }
      mutate {
        merge => {
          "additional.fields" => "endTime_label"
        }
        on_error => "endTime_label_empty"
      }
    }
  }

  if [responseData] != "" {
    mutate {
      replace => {
        "responseData_label.value.string_value" => "%{responseData}"
      }
      on_error => "responseData_empty"
    }
    if ![responseData_empty] {
      mutate {
        replace => {
          "responseData_label.key" => "responseData"
        }
      }
      mutate {
        merge => {
          "additional.fields" => "responseData_label"
        }
        on_error => "responseData_label_empty"
      }
    }
  }

  if [weHash] != "" {
    mutate {
      replace => {
        "weHash_label.value.string_value" => "%{weHash}"
      }
      on_error => "weHash_empty"
    }
    if ![weHash_empty] {
      mutate {
        replace => {
          "weHash_label.key" => "weHash"
        }
      }
      mutate {
        merge => {
          "additional.fields" => "weHash_label"
        }
        on_error => "weHash_label_empty"
      }
    }
  }

  if [wePublicId] != "" {
    mutate {
      replace => {
        "wePublicId_label.value.string_value" => "%{wePublicId}"
      }
      on_error => "wePublicId_empty"
    }
    if ![wePublicId_empty] {
      mutate {
        replace => {
          "wePublicId_label.key" => "wePublicId"
        }
      }
      mutate {
        merge => {
          "additional.fields" => "wePublicId_label"
        }
        on_error => "wePublicId_label_empty"
      }
    }
  }

  mutate {
    convert => {
      "hasFailedRecord" => "string"
    }
    on_error => "hasFailedRecord_empty"
  }
  if [hasFailedRecord] != "" {
    mutate {
      replace => {
        "hasFailedRecord_label.value.string_value" => "%{hasFailedRecord}"
      }
      on_error => "hasFailedRecord_empty"
    }
    if ![hasFailedRecord_empty] {
      mutate {
        replace => {
          "hasFailedRecord_label.key" => "hasFailedRecord"
        }
      }
      mutate {
        merge => {
          "additional.fields" => "hasFailedRecord_label"
        }
        on_error => "hasFailedRecord_label_empty"
      }
    }
  }

  if [action] != "" {
    mutate {
      replace => {
        "action_label.value.string_value" => "%{action}"
      }
      on_error => "action_empty"
    }
    if ![action_empty] {
      mutate {
        replace => {
          "action_label.key" => "action"
        }
      }
      mutate {
        merge => {
          "additional.fields" => "action_label"
        }
        on_error => "action_label_empty"
      }
    }
  }

  if [service] != "" {
    mutate {
      replace => {
        "service_label.value.string_value" => "%{service}"
      }
      on_error => "service_empty"
    }
    if ![service_empty] {
      mutate {
        replace => {
          "service_label.key" => "service"
        }
      }
      mutate {
        merge => {
          "additional.fields" => "service_label"
        }
        on_error => "service_label_empty"
      }
    }
  }

  mutate {
    convert => {
      "hasRecords" => "string"
    }
    on_error => "hasRecords_empty"
  }
  if [hasRecords] != "" {
    mutate {
      replace => {
        "hasRecords_label.value.string_value" => "%{hasRecords}"
      }
      on_error => "hasRecords_empty"
    }
    if ![hasRecords_empty] {
      mutate {
        replace => {
          "hasRecords_label.key" => "hasRecords"
        }
      }
      mutate {
        merge => {
          "additional.fields" => "hasRecords_label"
        }
        on_error => "hasRecords_label_empty"
      }
    }
  }

  if [workspaceId] != "" {
    mutate {
      replace => {
        "workspaceId_label.value.string_value" => "%{workspaceId}"
      }
      on_error => "workspaceId_empty"
    }
    if ![workspaceId_empty] {
      mutate {
        replace => {
          "workspaceId_label.key" => "workspaceId"
        }
      }
      mutate {
        merge => {
          "additional.fields" => "workspaceId_label"
        }
        on_error => "workspaceId_label_empty"
      }
    }
  }

  if [lastModified] != "" {
    mutate {
      replace => {
        "lastModified_label.value.string_value" => "%{lastModified}"
      }
      on_error => "lastModified_empty"
    }
    if ![lastModified_empty] {
      mutate {
        replace => {
          "lastModified_label.key" => "lastModified"
        }
      }
      mutate {
        merge => {
          "additional.fields" => "lastModified_label"
        }
        on_error => "lastModified_label_empty"
      }
    }
  }

  if [startTime] != "" {
    mutate {
      replace => {
        "startTime_label.value.string_value" => "%{startTime}"
      }
      on_error => "startTime_empty"
    }
    if ![startTime_empty] {
      mutate {
        replace => {
          "startTime_label.key" => "startTime"
        }
      }
      mutate {
        merge => {
          "additional.fields" => "startTime_label"
        }
        on_error => "startTime_label_empty"
      }
    }
  }
  if [status] =~ "(?i)SUCCESS" {
    mutate {
      replace => {
        "security_result_action" => "ALLOW"
      }
      on_error => "no_result_status"
    }
  }
  else if [status] in ["FAILURE", "UNSUCCESSFUL_ATTEMPT"] {
    mutate {
      replace => {
        "security_result_action" => "BLOCK"
      }
    }
  }
  if [status] != "" {
    mutate {
      replace => {
        "security_result.action_details" => "%{status}"
      }
      on_error => "status_empty"
    }
  }
  if [security_result_action] != "" {
    mutate {
      merge => {
        "security_result.action" => "security_result_action"
      }
      on_error => "no_action"
    }
  }

  if [has_principal] == "true" and [has_target] == "false" {
    mutate {
      replace => {
        "metadata.event_type" => "STATUS_UPDATE"
      }
    }
  }
  else {
    mutate {
      replace => {
        "metadata.event_type" => "GENERIC_EVENT"
      }
    }
  }

  if [target] != "" {
    mutate {
      rename => {
        "target" => "event.idm.read_only_udm.target"
      }
    }
  }
  if [principal] != "" {
    mutate {
      rename => {
        "principal" => "event.idm.read_only_udm.principal"
      }
    }
  }
  if [metadata] != "" {
    mutate {
      rename => {
        "metadata" => "event.idm.read_only_udm.metadata"
      }
    }
  }
  if [network] != "" {
    mutate {
      rename => {
        "network" => "event.idm.read_only_udm.network"
      }
    }
  }

  if [security_result] != "" {
    mutate {
      merge => {
        "event.idm.read_only_udm.security_result" => "security_result"
      }
    }
  }

  if [additional] != "" {
    mutate {
      rename => {
        "additional" => "event.idm.read_only_udm.additional"
      }
    }
  }

  mutate {
    merge => {
      "@output" => "event"
    }
  }
}
