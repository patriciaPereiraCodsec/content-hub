
# Product: NTOPNG
# Category: NDR
# Supported Format: SYSLOG + JSON
# Reference: N/A
# Last Updated: 2024-02-01
# Copyright 2024 Chronicle LLC

filter {
  mutate {
    replace => {
      "when" => ""
      "host_ip" => ""
      "vendor_name" => ""
      "json_data" => ""
      "ifid" => ""
      "action" => ""
      "first_seen" => ""
      "score" => ""
      "is_flow_alert" => ""
      "tstamp" => ""
      "alert_id" => ""
      "is_cli_attacker" => ""
      "is_cli_victim" => ""
      "is_srv_attacker" => ""
      "is_srv_victim" => ""
      "entity_id" => ""
      "entity_val" => ""
      "pool_id" => ""
      "vlan_id" => ""
      "observation_point_id" => ""
      "proto" => ""
      "flow_risk_bitmap" => ""
      "alerts_map" => ""
      "proto_ndpi" => ""
      "proto_ndpi_app" => ""
      "proto_ndpi_cat" => ""
      "proto_ndpi_cat_id" => ""
      "proto_ndpi_breed" => ""
      "proto_l4" => ""
      "nw_app_protocol" => ""
      "l7_master_proto" => ""
      "l7_proto" => ""
      "l7_cat" => ""
      "cli2srv_bytes" => ""
      "cli2srv_packets" => ""
      "srv2cli_bytes" => ""
      "srv2cli_packets" => ""
      "ip_version" => ""
      "cli_ip" => ""
      "ip" => ""
      "name" => ""
      "is_client" => ""
      "is_server" => ""
      "network" => ""
      "granularity" => ""
      "cli_blacklisted" => ""
      "cli_port" => ""
      "cli_location" => ""
      "cli_city_name" => ""
      "cli_country_name" => ""
      "cli_continent_name" => ""
      "cli_name" => ""
      "cli_os" => ""
      "cli_asn" => ""
      "cli_localhost" => ""
      "cli_host_pool_id" => ""
      "cli_network" => ""
      "srv_ip" => "",
      "srv_blacklisted" => ""
      "srv_port" => ""
      "srv_location" => ""
      "srv_city_name" => ""
      "srv_country_name" => ""
      "srv_continent_name" => "",
      "srv_location_lon" => ""
      "srv_location_lat" => ""
      "srv_name" => ""
      "srv_os" => ""
      "srv_asn" => ""
      "srv_localhost" => ""
      "srv_host_pool_id" => ""
      "srv_network" => ""
      "probe_ip" => ""
      "input_snmp" => ""
      "output_snmp" => ""
      "community_id" => ""
      "info" => ""
      "nested_json" => ""
      "risk_id" => ""
      "principal_machine_id_present" => "false"
      "target_machine_id_present" => "false"
      "minimal_required_mapping_present" => "false"
      "event_type" => ""
      "metadata" => ""
      "principal" => ""
      "intermediary" => ""
      "security_result" => ""
      "target" => ""
      "udm_network" => ""
      "observer" => ""
    }
  }

  if [message] != "" {
    mutate {
      gsub => ["message", "json", "nested_json"]
    }
  }

  grok {
    match => {
      "message" => [
        "<%{INT}>%{SYSLOGTIMESTAMP:when}%{SPACE}%{IP:host_ip}%{SPACE}%{WORD:vendor_name}%{DATA}:%{SPACE}%{GREEDYDATA:json_data}",
        "%{GREEDYDATA:json_data}"
      ]
    }
    overwrite => ["when", "host_ip", "vendor_name", "json_data"]
    on_error => "header_grok_match_failed"
  }

  if [header_grok_match_failed] {
    drop {
      tag => "TAG_MALFORMED_MESSAGE"
    }
  }

  mutate {
    gsub => ["json_data", "proto.ndpi", "proto_ndpi"]
  }
  mutate {
    gsub => ["json_data", "proto.l4", "proto_l4"]
  }

  if [json_data] != "" {
    json {
      source => "json_data"
      array_function => "split_columns"
      on_error => "json_data_invalid"
    }
  }

  if [nested_json] != "" {
    mutate {
      replace => {
        "ntopng_key" => ""
        "hash_entry_id" => ""
        "alert_generation" => ""
        "alert_generation_script_key" => ""
        "alert_generation_subdir" => ""
        "alert_generation_flow_risk_info" => ""
        "alert_generation_host_info" => ""
        "alert_generation_host_info_name" => ""
      }
    }

    mutate {
      gsub => ["nested_json", "ntopng.key", "ntopng_key"]
    }

    json {
      source => "nested_json"
      array_function => "split_columns"
      on_error => "nested_json_invalid"
    }

    if [ntopng_key] != "" {
      mutate {
        convert => {
          "ntopng_key" => "string"
        }
        on_error => "ntopng_key_already_string"
      }
      mutate {
        replace => {
          "ntopng_key_label.key" => "ntopng_key"
          "ntopng_key_label.value" => "%{ntopng_key}"
        }
        on_error => "ntopng_key_label_invalid"
      }
      if ![ntopng_key_label_invalid] {
        mutate {
          merge => {
            "security_result.detection_fields" => "ntopng_key_label"
          }
          on_error => "ntopng_key_label_merge_failed"
        }
      }
    }

    if [hash_entry_id] != "" {
      mutate {
        convert => {
          "hash_entry_id" => "string"
        }
        on_error => "hash_entry_id_already_string"
      }
      mutate {
        replace => {
          "hash_entry_id_label.key" => "hash_entry_id"
          "hash_entry_id_label.value" => "%{hash_entry_id}"
        }
        on_error => "hash_entry_id_invalid"
      }
      if ![hash_entry_id_invalid] {
        mutate {
          merge => {
            "security_result.detection_fields" => "hash_entry_id_label"
          }
          on_error => "hash_entry_id_label_merge_failed"
        }
      }
    }

    if [alert_generation] != "" {
      mutate {
        replace => {
          "alert_generation_script_key" => "%{alert_generation.script_key}"
        }
        on_error => "alert_generation_script_key_value_invalid"
      }
      mutate {
        replace => {
          "alert_generation_subdir" => "%{alert_generation.subdir}"
        }
        on_error => "alert_generation_subdir_value_invalid"
      }
      mutate {
        replace => {
          "alert_generation_flow_risk_info" => "%{alert_generation.flow_risk_info}"
        }
        on_error => "alert_generation_flow_risk_info_value_invalid"
      }

      if [alert_generation_script_key] != "" {
        mutate {
          merge => {
            "security_result.category_details" => "%{alert_generation_script_key}"
          }
          on_error => "alert_generation_script_key_merge_failed"
        }
      }

      if [alert_generation_subdir] != "" {
        mutate {
          replace => {
            "alert_generation_subdir_label.key" => "alert_generation_subdir"
            "alert_generation_subdir_label.value" => "%{alert_generation_subdir}"
          }
          on_error => "alert_generation_subdir_value_invalid"
        }
        if ![alert_generation_subdir_value_invalid] {
          mutate {
            merge => {
              "security_result.detection_fields" => "alert_generation_subdir_label"
            }
            on_error => "alert_generation_subdir_label_merge_failed"
          }
        }
      }

      if [message] =~ "host_info" and [alert_generation][host_info] != "" {
        for host_info_key, host_info_value in alert_generation.host_info map {
          mutate {
            replace => {
              "host_info_map_label" => ""
            }
          }
          if [host_info_key] != "" {
            mutate {
              replace => {
                "host_info_map_label.key" => "host_info %{host_info_key}"
              }
              on_error => "host_info_key_invalid"
            }
            if ![host_info_key_invalid] and [host_info_value] != "" {
              mutate {
                convert => {
                  "host_info_value" => "string"
                }
                on_error => "host_info_value_already_string"
              }
              mutate {
                replace => {
                  "host_info_map_label.value" => "%{host_info_value}"
                }
                on_error => "host_info_value_nested"
              }
              if ![host_info_value_nested] {
                mutate {
                  merge => {
                    "security_result.detection_fields" => "host_info_map_label"
                  }
                  on_error => "host_info_map_label_merge_failed"
                }
              }
            }
          }
        }
      }
    }
  }

  if [when] != "" {
    date {
      match => ["when", "MMM dd HH:mm:ss "]
      rebase => true
      on_error => "date_match_failed"
    }
  }

  if [host_ip] != "" {
    grok {
      match => {
        "host_ip" => ["%{IP:host_ip}"]
      }
      overwrite => ["host_ip"]
      on_error => "ip_pattern_does_not_match"
    }
    if ![ip_pattern_does_not_match] {
      mutate {
        merge => {
          "principal.ip" => "host_ip"
          "principal.asset.ip" => "host_ip"
        }
        on_error => "host_ip_invalid"
      }
      if ![host_ip_invalid] {
        mutate {
          replace => {
            "principal_machine_id_present" => "true"
            "minimal_required_mapping_present" => "true"
          }
        }
      }
    }
  }

  if [ifid] != "" {
    mutate {
      convert => {
        "ifid" => "string"
      }
      on_error => "ifid_already_string"
    }
    mutate {
      replace => {
        "principal.asset_id" => "ifid: %{ifid}"
      }
      on_error => "ifid_invalid"
    }
  }

  if [action] != "" {
    mutate {
      replace => {
        "action_label.key" => "action"
        "action_label.value" => "%{action}"
      }
      on_error => "action_value_invalid"
    }
    if ![action_value_invalid] {
      mutate {
        merge => {
          "security_result.detection_fields" => "action_label"
        }
        on_error => "action_label_merge_failedss"
      }
    }
  }

  if [score] != "" {
    mutate {
      convert => {
        "score" => "string"
      }
      on_error => "score_already_string"
    }

    mutate {
      replace => {
        "score_label.key" => "score"
        "score_label.value" => "%{score}"
      }
      on_error => "score_label_invalid"
    }
    if ![score_label_invalid] {
      mutate {
        merge => {
          "security_result.detection_fields" => "score_label"
        }
        on_error => "score_label_merge_failed"
      }
    }
  }

  if [is_flow_alert] != "" {
    if [is_flow_alert] {
      mutate {
        replace => {
          "alert_type_label.key" => "alert type"
          "alert_type_label.value" => "flow"
        }
        on_error => "alert_type_label_invalid"
      }
      if ![alert_type_label_invalid] {
        mutate {
          merge => {
            "security_result.detection_fields" => "alert_type_label"
          }
          on_error => "alert_type_label_merge_failed"
        }
      }
    }

    mutate {
      convert => {
        "is_flow_alert" => "string"
      }
      on_error => "is_flow_alert_already_string"
    }
    mutate {
      replace => {
        "is_flow_alert_label.key" => "is_flow_alert"
        "is_flow_alert_label.value" => "%{is_flow_alert}"
      }
      on_error => "is_flow_alert_invalid"
    }
    if ![is_flow_alert_invalid] {
      mutate {
        merge => {
          "security_result.detection_fields" => "is_flow_alert_label"
        }
        on_error => "is_flow_alert_label_merge_failed"
      }
    }
  }

  if [alert_id] != "" {
    mutate {
      convert => {
        "alert_id" => "string"
      }
      on_error => "alert_id_already_string"
    }
    mutate {
      replace => {
        "alert_id_label.key" => "alert_id"
        "alert_id_label.value" => "%{alert_id}"
      }
      on_error => "alert_id_value_invalid"
    }
    if ![alert_id_value_invalid] {
      mutate {
        merge => {
          "security_result.detection_fields" => "alert_id_label"
        }
        on_error => "alert_id_label_merge_failedss"
      }
    }
  }

  if [is_cli_attacker] != "" {
    mutate {
      convert => {
        "is_cli_attacker" => "string"
      }
      on_error => "is_cli_attacker_already_string"
    }
    mutate {
      replace => {
        "is_cli_attacker_label.key" => "is_cli_attacker"
        "is_cli_attacker_label.value" => "%{is_cli_attacker}"
      }
      on_error => "is_cli_attacker_value_invalid"
    }
    if ![is_cli_attacker_value_invalid] {
      mutate {
        merge => {
          "security_result.detection_fields" => "is_cli_attacker_label"
        }
        on_error => "is_cli_attacker_label_merge_failedss"
      }
    }
  }

  if [is_cli_victim] != "" {
    mutate {
      convert => {
        "is_cli_victim" => "string"
      }
      on_error => "is_cli_victim_already_string"
    }
    mutate {
      replace => {
        "is_cli_victim_label.key" => "is_cli_victim"
        "is_cli_victim_label.value" => "%{is_cli_victim}"
      }
      on_error => "is_cli_victim_value_invalid"
    }
    if ![is_cli_victim_value_invalid] {
      mutate {
        merge => {
          "security_result.detection_fields" => "is_cli_victim_label"
        }
        on_error => "is_cli_victim_label_merge_failedss"
      }
    }
  }

  if [is_srv_attacker] != "" {
    mutate {
      convert => {
        "is_srv_attacker" => "string"
      }
      on_error => "is_srv_attacker_already_string"
    }
    mutate {
      replace => {
        "is_srv_attacker_label.key" => "is_srv_attacker"
        "is_srv_attacker_label.value" => "%{is_srv_attacker}"
      }
      on_error => "is_srv_attacker_value_invalid"
    }
    if ![is_srv_attacker_value_invalid] {
      mutate {
        merge => {
          "security_result.detection_fields" => "is_srv_attacker_label"
        }
        on_error => "is_srv_attacker_label_merge_failedss"
      }
    }
  }

  if [entity_id] != "" {
    mutate {
      convert => {
        "entity_id" => "string"
      }
      on_error => "entity_id_already_string"
    }
    mutate {
      replace => {
        "entity_id_label.key" => "entity_id"
        "entity_id_label.value" => "%{entity_id}"
      }
      on_error => "entity_id_value_invalid"
    }
    if ![entity_id_value_invalid] {
      mutate {
        merge => {
          "principal.resource.attribute.labels" => "entity_id_label"
        }
        on_error => "entity_id_label_merge_failedss"
      }
    }
  }

  if [entity_val] != "" and [entity_val] != [ip] {
    mutate {
      replace => {
        "entity_val_label.key" => "entity_val"
        "entity_val_label.value" => "%{entity_val}"
      }
      on_error => "entity_val_value_invalid"
    }
    if ![entity_val_value_invalid] {
      mutate {
        merge => {
          "principal.resource.attribute.labels" => "entity_val_label"
        }
        on_error => "entity_val_label_merge_failedss"
      }
    }
  }

  if [pool_id] != "" and [pool_id] != 0 {
    mutate {
      convert => {
        "pool_id" => "string"
      }
      on_error => "pool_id_already_string"
    }
    mutate {
      replace => {
        "pool_id_label.key" => "pool_id"
        "pool_id_label.value" => "%{pool_id}"
      }
      on_error => "pool_id_value_invalid"
    }
    if ![pool_id_value_invalid] {
      mutate {
        merge => {
          "principal.resource.attribute.labels" => "pool_id_label"
        }
        on_error => "pool_id_label_merge_failedss"
      }
    }
  }

  if [vlan_id] != "" and [vlan_id] != 0 {
    mutate {
      convert => {
        "vlan_id" => "string"
      }
      on_error => "vlan_id_already_string"
    }
    mutate {
      replace => {
        "vlan_id_label.key" => "vlan_id"
        "vlan_id_label.value" => "%{vlan_id}"
      }
      on_error => "vlan_id_value_invalid"
    }
    if ![vlan_id_value_invalid] {
      mutate {
        merge => {
          "principal.resource.attribute.labels" => "vlan_id_label"
        }
        on_error => "vlan_id_label_merge_failedss"
      }
    }
  }

  if [observation_point_id] != "" {
    mutate {
      convert => {
        "observation_point_id" => "string"
      }
      on_error => "observation_point_id_already_string"
    }
    if [observation_point_id] != "0" {
      mutate {
        replace => {
          "observer.asset_id" => "id: %{observation_point_id}"
        }
        on_error => "observation_point_id_value_invalid"
      }
    }
  }

  if [first_seen] != "" {
    mutate {
      convert => {
        "first_seen" => "string"
      }
      on_error => "first_seen_already_string"
    }
    date {
      match => ["first_seen", "UNIX_MS"]
      target => "principal.asset.first_seen_time"
      on_error => "unix_date_match_failed"
    }
  }

  if [tstamp] != "" {
    mutate {
      convert => {
        "tstamp" => "string"
      }
      on_error => "tstamp_already_string"
    }
    mutate {
      replace => {
        "tstamp_label.key" => "tstamp"
        "tstamp_label.value.string_value" => "%{tstamp}"
      }
      on_error => "tstamp_invalid"
    }
    if ![tstamp_invalid] {
      mutate {
        merge => {
          "event.idm.read_only_udm.additional.fields" => "tstamp_label"
        }
        on_error => "tstamp_label_merge_failed"
      }
    }
  }

  if [proto_ndpi] != "" {
    mutate {
      replace => {
        "ndpi_label.key" => "proto ndpi"
        "ndpi_label.value.string_value" => "%{proto_ndpi}"
      }
      on_error => "proto_ndpi_invalid"
    }
    if ![proto_ndpi_invalid] {
      mutate {
        merge => {
          "event.idm.read_only_udm.additional.fields" => "ndpi_label"
        }
      }
    }

    if [proto_ndpi] =~ "(?i)NTP" {
      mutate {
        replace => {
          "nw_app_protocol" => "NTP"
        }
        on_error => "app_protocol_invalid"
      }
    }
    else if [proto_ndpi] =~ "(?i)HTTP" {
      mutate {
        replace => {
          "nw_app_protocol" => "HTTP"
        }
        on_error => "app_protocol_invalid_2"
      }
    }
  }

  if [nw_app_protocol] != "" {
    mutate {
      replace => {
        "udm_network.application_protocol" => "%{nw_app_protocol}"
      }
      on_error => "udm_network_app_proto_invalid"
    }
  }

  if [is_srv_victim] != "" {
    mutate {
      convert => {
        "is_srv_victim" => "string"
      }
      on_error => "is_srv_victim_already_string"
    }
    mutate {
      replace => {
        "is_srv_victim_label.key" => "is_srv_victim"
        "is_srv_victim_label.value" => "%{is_srv_victim}"
      }
      on_error => "is_srv_victim_value_invalid"
    }
    if ![is_srv_victim_value_invalid] {
      mutate {
        merge => {
          "security_result.detection_fields" => "is_srv_victim_label"
        }
        on_error => "is_srv_victim_label_merge_failedss"
      }
    }
  }

  if [cli2srv_bytes] != "" {
    mutate {
      convert => {
        "cli2srv_bytes" => "uinteger"
      }
      on_error => "cli2srv_bytes_already_uinteger"
    }
    mutate {
      rename => {
        "cli2srv_bytes" => "udm_network.sent_bytes"
      }
      on_error => "cli2srv_bytes_invalid"
    }
  }

  if [srv2cli_bytes] != "" {
    mutate {
      convert => {
        "srv2cli_bytes" => "uinteger"
      }
      on_error => "srv2cli_bytes_already_uinteger"
    }
    mutate {
      rename => {
        "srv2cli_bytes" => "udm_network.received_bytes"
      }
      on_error => "srv2cli_bytes_invalid"
    }
  }

  if [cli_ip] != "" {
    grok {
      match => {
        "cli_ip" => ["%{IP:temp_ip_1}"]
      }
      on_error => "ip_pattern_match_failed"
    }
    if ![ip_pattern_match_failed] {
      mutate {
        merge => {
          "principal.ip" => "cli_ip"
          "principal.asset.ip" => "cli_ip"
        }
        on_error => "cli_ip_merge_failed"
      }
      if ![cli_ip_merge_failed] {
        mutate {
          replace => {
            "principal_machine_id_present" => "true"
            "minimal_required_mapping_present" => "true"
          }
        }
      }
    }
  }

  if [cli_port] != "" {
    mutate {
      convert => {
        "cli_port" => "integer"
      }
      on_error => "cli_port_already_integer"
    }
    mutate {
      rename => {
        "cli_port" => "principal.port"
      }
      on_error => "cli_port_invalid"
    }
  }

  if [cli_city_name] != "" {
    mutate {
      replace => {
        "principal.location.city" => "%{cli_city_name}"
      }
      on_error => "cli_city_name_invalid"
    }
  }

  if [cli_country_name] != "" {
    mutate {
      replace => {
        "principal.location.country_or_region" => "%{cli_country_name}"
      }
      on_error => "cli_coutry_name_invalid"
    }
  }

  if [cli_continent_name] != "" {
    mutate {
      replace => {
        "cli_continent_name_label.key" => "cli_continent_name"
        "cli_continent_name_label.value" => "%{cli_continent_name}"
      }
      on_error => "cli_continent_name_value_invalid"
    }
    if ![cli_continent_name_value_invalid] {
      mutate {
        merge => {
          "principal.resource.attribute.labels" => "cli_continent_name_label"
        }
        on_error => "cli_continent_name_label_merge_failedss"
      }
    }
  }

  if [cli_location] != "" {
    mutate {
      convert => {
        "cli_location" => "string"
      }
      on_error => "cli_location_already_string"
    }
    if [cli_location] != "0" {
      mutate {
        replace => {
