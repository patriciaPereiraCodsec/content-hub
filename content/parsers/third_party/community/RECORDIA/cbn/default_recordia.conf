# Product: RECORDIA
# Category: Telephone software
# Supported Format: JSON
# Reference: NA
# Last Updated: 2024-01-30
# Copyright 2024 Chronicle LLC


filter {
  #variables
  mutate {
    replace => {
      "metadata" => ""
      "principal" => ""
      "target" => ""
      "network" => ""
      "security_result" => ""
      "intermediary" => ""
      "additional" => ""
      "timestamp" => ""
      "date" => ""
      "time" => ""
      "client_ip" => ""
      "src_ip" => ""
      "session_id" => ""
      "auth_user" => ""
      "corp_user" => ""
      "event_info" => ""
      "severity" => ""
      "record_id" => ""
      "event_type" => ""
      "product_event_type" => ""
      "url" => ""
      "batch_id" => ""
      "kv_msg" => ""
      "ProviderId" => ""
      "ProviderGroupId" => ""
      "CallId" => ""
      "TrackingId" => ""
      "CallingParty" => ""
      "CalledParty" => ""
      "RecordingType" => ""
      "Format" => ""
      "Duration" => ""
      "Owner" => ""
      "NotEncrypted" => ""
      "Hash" => ""
      "CustomData" => ""
      "CustomDataFormat" => ""
      "description" => ""
      "client_ip1" => ""
      "user_agent" => ""
    }
  }

  mutate {
    gsub => ["message", "\\\\", ""]
  }

  mutate {
    gsub => ["message", "\"\"", ""]
  }

  # General grok
  grok {
    match => {
      "message" => [
        "(\"\"\\w+)?('%{TIMESTAMP_ISO8601:timestamp}\\s+)?%{DATE:date}\\s+%{TIME:time}\\s+\\[%{IP:client_ip},%{IP:client_ip1}, %{IP:src_ip}(,%{DATA:session_id})?,%{DATA:auth_user},%{DATA:corp_user}\\]\\s+%{GREEDYDATA:event_info}\\]"
        "(\"\"\\w+)?('%{TIMESTAMP_ISO8601:timestamp}\\s+)?%{DATE:date}\\s+%{TIME:time}\\s+\\[%{IP:client_ip},%{IP:src_ip}(,%{DATA:session_id})?,%{DATA:auth_user},%{DATA:corp_user}\\]\\s+%{GREEDYDATA:event_info}\\]"
        "(\"\"\\w+)?('%{TIMESTAMP_ISO8601:timestamp}\\s+)?%{DATE:date}\\s+%{TIME:time}\\s+\\[%{IP:client_ip}\]\\s+%{GREEDYDATA:event_info}\\]"
      ]
    }
    overwrite => ["timestamp", "date", "time", "client_ip", "src_ip", "session_id", "auth_user", "corp_user", "event_info", "client_ip1"]
    on_error => "grok_error"
  }

  mutate {
    gsub => ["event_info", ";", ""]
  }
  mutate {
    gsub => ["event_info", "'", ""]
  }

  if ! [grok_error] {
    # Subgrok to extract event info fields
    grok {
      match => {
        "event_info" => [
          "%{DATA:severity}\\s+-\\s+%{DATA:description}\\s+%{URI:url}"
          "%{DATA:severity}\\s+-\\s+t%{DATA:description}: \\[%{GREEDYDATA:kv_msg}\\]"
          "%{DATA:severity}\\s+-\\s+USER-AGENT: %{GREEDYDATA:user_agent}"
          "%{DATA:severity}\\s+-\\s+%{DATA:description}\\s+for\\srecording\\s+%{GREEDYDATA:record_id}"
          "%{DATA:severity}\\s+-\\s+%{DATA:description}\\s+recording\\s+([a-z]+\\s+)?%{GREEDYDATA:record_id}"
          "%{DATA:severity}\\s+-\\s+%{GREEDYDATA:description}"
        ]
      }
      overwrite => ["severity", "description", "record_id", "url", "kv_msg", "user_agent"]
      on_error => "grok_error_2"
    }
  }

  if [kv_msg] != "" {
    kv {
      source => "kv_msg"
      field_split => ","
      value_split => ":"
      on_error => "kv_fail"
    }
  }

  # recording batch (SPECIAL CASE)
  if [event_info] =~ 'RECORDING BATCH' {
    grok {
      match => {
        "event_info" => [
          "INFO\\s+-\\s+RECORDING\\s+BATCH\\s+%{DATA:batch_id}\\s+ADD\\s+recording\\s+%{GREEDYDATA:record_id}"
        ]
      }
      overwrite => ["batch_id", "record_id"]
      on_error => "rec_batch_grok_error"
    }
    mutate {
      replace => {
        "product_event_type" => "RECORDING BATCH"
      }
    }
  }

  # TIMESTAMP
  if [timestamp] != "" {
    date {
      match => [ "timestamp", "ISO8601" ]
      on_error => "timestamp_error"
    }
  }
  else if [date] != "" and [time] != "" {
    mutate {
      replace => {
        "timestamp" => "%{date} %{time}"
      }
    }
    date {
      match => [ "timestamp", "dd-MM-yyyy HH:mm:ss" ]
      on_error => "timestamp_error_2"
    }
  }

  # Client
  # Source IP -> App user IP
  if [src_ip] != "" {
    mutate {
      merge => {
        "principal.ip" => "src_ip"
      }
      on_error => "no_src_ip"
    }
  }
  # Authenticated user id
  if [auth_user] not in ["", "(null)"] {
    mutate {
      replace => {
        "principal.user.userid" => "%{auth_user}"
      }
      on_error => "auth_user_error"
    }
  }

  # Session id
  if [session_id] not in ["", "(null)"] {
    mutate {
      replace => {
        "network.session_id" => "%{session_id}"
      }
      on_error => "no_session_id"
    }
  }

  # Intermediary
  # Client IP --> Balancer IP
  if [client_ip] != "" {
    mutate {
      merge => {
        "intermediary.ip" => "client_ip"
      }
      on_error => "client_ip_error"
    }
  }
  if [client_ip1] != "" {
    mutate {
      merge => {
        "intermediary.ip" => "client_ip1"
      }
      on_error => "client_ip1_error"
    }
  }

  # Corp user id
  if [corp_user] not in ["", "(null)"] {
    mutate {
      replace => {
        "intermediary.user.userid" => "%{corp_user}"
      }
      on_error => "corporative_user_error"
    }
  }

  # Event info
  if [severity] in ["INFO", "DEBUG"] {
    mutate {
      replace => {
        "security_result.severity" => "LOW"
      }
      on_error => "severity_error"
    }
    mutate {
      replace => {
        "sr.action_details" => "%{severity}"
      }
      on_error => "severity_error_act_details"
    }
  }

  if [record_id] != "" {
    mutate {
      replace => {
        "record_id_label.value.string_value" => "%{record_id}"
      }
      on_error => "record_id_error"
    }
    if ![record_id_error] and [record_id_label] != "" {
      mutate {
        replace => {
          "record_id_label.key" => "Record id"
        }
      }
      mutate {
        merge => {
          "additional.fields"  => "record_id_label"
        }
        on_error => "record_id_error"
      }
    }
  }
  if [batch_id] != "" {
    mutate {
      replace => {
        "batch_id_label.value.string_value" => "%{batch_id}"
      }
      on_error => "batch_id_error"
    }
    if ![batch_id_error] and [batch_id_label] != "" {
      mutate {
        replace => {
          "batch_id_label.key" => "Batch id"
        }
      }
      mutate {
        merge => {
          "additional.fields"  => "batch_id_label"
        }
        on_error => "batch_id_error"
      }
    }
  }
  if [ProviderId] != "" {
    mutate {
      replace => {
        "ProviderId_label.value.string_value" => "%{ProviderId}"
      }
      on_error => "ProviderId_error"
    }
    if ![ProviderId_error] and [ProviderId_label] != "" {
      mutate {
        replace => {
          "ProviderId_label.key" => "Provider Id"
        }
      }
      mutate {
        merge => {
          "additional.fields"  => "ProviderId_label"
        }
        on_error => "ProviderId_error"
      }
    }
  }
  if [ProviderGroupId] != "" {
    mutate {
      replace => {
        "ProviderGroupId_label.value.string_value" => "%{ProviderGroupId}"
      }
      on_error => "ProviderGroupId_error"
    }
    if ![ProviderGroupId_error] and [ProviderGroupId_label] != "" {
      mutate {
        replace => {
          "ProviderGroupId_label.key" => "ProviderGroupId"
        }
      }
      mutate {
        merge => {
          "additional.fields"  => "ProviderGroupId_label"
        }
        on_error => "ProviderGroupId_error"
      }
    }
  }
  if [TrackingId] != "" {
    mutate {
      replace => {
        "TrackingId_label.value.string_value" => "%{TrackingId}"
      }
      on_error => "TrackingId_error"
    }
    if ![TrackingId_error] and [TrackingId_label] != "" {
      mutate {
        replace => {
          "TrackingId_label.key" => "TrackingId"
        }
      }
      mutate {
        merge => {
          "additional.fields"  => "TrackingId_label"
        }
        on_error => "TrackingId_error"
      }
    }
  }
  if [RecordingType] != "" {
    mutate {
      replace => {
        "RecordingType_label.value.string_value" => "%{RecordingType}"
      }
      on_error => "RecordingType_error"
    }
    if ![RecordingType_error] and [RecordingType_label] != "" {
      mutate {
        replace => {
          "RecordingType_label.key" => "RecordingType"
        }
      }
      mutate {
        merge => {
          "additional.fields"  => "RecordingType_label"
        }
        on_error => "RecordingType_error"
      }
    }
  }
  if [Format] != "" {
    mutate {
      replace => {
        "Format_label.value.string_value" => "%{Format}"
      }
      on_error => "Format_error"
    }
    if ![Format_error] and [Format_label] != "" {
      mutate {
        replace => {
          "Format_label.key" => "Format"
        }
      }
      mutate {
        merge => {
          "additional.fields"  => "Format_label"
        }
        on_error => "Format_error"
      }
    }
  }
  if [Owner] != "" {
    mutate {
      replace => {
        "Owner_label.value.string_value" => "%{Owner}"
      }
      on_error => "Owner_error"
    }
    if ![Owner_error] and [Owner_label] != "" {
      mutate {
        replace => {
          "Owner_label.key" => "Owner"
        }
      }
      mutate {
        merge => {
          "additional.fields"  => "Owner_label"
        }
        on_error => "Owner_error"
      }
    }
  }
  if [NotEncrypted] != "" {
    mutate {
      replace => {
        "NotEncrypted_label.value.string_value" => "%{NotEncrypted}"
      }
      on_error => "NotEncrypted_error"
    }
    if ![NotEncrypted_error] and [NotEncrypted_label] != "" {
      mutate {
        replace => {
          "NotEncrypted_label.key" => "NotEncrypted"
        }
      }
      mutate {
        merge => {
          "additional.fields"  => "NotEncrypted_label"
        }
        on_error => "NotEncrypted_error"
      }
    }
  }
  if [Hash] != "" {
    mutate {
      replace => {
        "Hash_label.value.string_value" => "%{Hash}"
      }
      on_error => "Hash_error"
    }
    if ![Hash_error] and [Hash_label] != "" {
      mutate {
        replace => {
          "Hash_label.key" => "Hash"
        }
      }
      mutate {
        merge => {
          "additional.fields"  => "Hash_label"
        }
        on_error => "Hash_error"
      }
    }
  }
  if [CustomData] != "" {
    mutate {
      replace => {
        "CustomData_label.value.string_value" => "%{CustomData}"
      }
      on_error => "CustomData_error"
    }
    if ![CustomData_error] and [CustomData_label] != "" {
      mutate {
        replace => {
          "CustomData_label.key" => "CustomData"
        }
      }
      mutate {
        merge => {
          "additional.fields"  => "CustomData_label"
        }
        on_error => "CustomData_error"
      }
    }
  }
  if [CustomDataFormat] != "" {
    mutate {
      replace => {
        "CustomDataFormat_label.value.string_value" => "%{CustomDataFormat}"
      }
      on_error => "CustomDataFormat_error"
    }
    if ![CustomDataFormat_error] and [CustomDataFormat_label] != "" {
      mutate {
        replace => {
          "CustomDataFormat_label.key" => "CustomDataFormat"
        }
      }
      mutate {
        merge => {
          "additional.fields"  => "CustomDataFormat_label"
        }
        on_error => "CustomDataFormat_error"
      }
    }
  }

  if [CallingParty] != "" {
    mutate {
      merge => {
        "principal.user.phone_numbers" => "CallingParty"
      }
      on_error => "no_CallingParty"
    }
  }

  if [CalledParty] != "" {
    mutate {
      merge => {
        "target.user.phone_numbers" => "CalledParty"
      }
      on_error => "no_CalledParty"
    }
  }
  # Product event type
  if [product_event_type] != "" {
    mutate {
      replace => {
        "metadata.product_event_type" => "%{product_event_type}"
      }
      on_error => "product_event_type_error"
    }
  }

  if [description] != "" {
    mutate {
      replace => {
        "metadata.description" => "%{description}"
      }
      on_error => "no_description"
    }
  }

  if [url] != "" {
    mutate {
      replace => {
        "principal.url" => "%{url}"
      }
    }
  }

  if [CallId] != "" {
    mutate {
      replace => {
        "metadata.product_log_id" => "%{CallId}"
      }
      on_error => "no_CallId"
    }
  }

  if [user_agent] != "" {
    mutate {
      replace => {
        "network.http.user_agent" => "%{user_agent}"
      }
      on_error => "no_user_agent"
    }
    mutate {
      convert => {
        "user_agent" => "parseduseragent"
      }
      on_error => "conversion_failed"
    }
    if ![conversion_failed] {
      mutate {
        rename => {
          "user_agent" => "network.http.parsed_user_agent"
        }
      }
    }
  }


  # common metadata
  if [auth_user] != "" {
    mutate {
      replace => {
        "metadata.event_type" => "USER_UNCATEGORIZED"
      }
    }
  }
  else if [src_ip] != "" {
    mutate {
      replace => {
        "metadata.event_type" => "STATUS_UNCATEGORIZED"
      }
    }
  }
  else {
    mutate {
      replace => {
        "metadata.event_type" => "GENERIC_EVENT"
      }
    }
  }

  mutate {
    replace => {
      "metadata.vendor_name" => "Comunycarse"
      "metadata.product_name" => "Recordia"
    }
  }

  # merge the data into udm nouns.
  if [metadata] != "" {
    mutate {
      rename => {
        "metadata" => "event.idm.read_only_udm.metadata"
      }
    }
  }
  if [principal] != "" {
    mutate {
      rename => {
        "principal" => "event.idm.read_only_udm.principal"
      }
    }
  }
  if [target] != "" {
    mutate {
      rename => {
        "target" => "event.idm.read_only_udm.target"
      }
    }
  }
  if [network] != "" {
    mutate {
      rename => {
        "network" => "event.idm.read_only_udm.network"
      }
    }
  }
  if [intermediary] != "" {
    mutate {
      merge => {
        "event.idm.read_only_udm.intermediary" => "intermediary"
      }
      on_error => "no_intermediary"
    }
  }
  if [additional] != "" {
    mutate {
      rename => {
        "additional" => "event.idm.read_only_udm.additional"
      }
    }
  }
  if [security_result] != "" {
    mutate {
      merge => {
        "event.idm.read_only_udm.security_result" => "security_result"
      }
      on_error => "no_security_result"
    }
  }

  mutate {
    merge => {
    "@output" => "event"
    }
  }
}


