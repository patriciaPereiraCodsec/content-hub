# Product: Lenel OnGuard
# Category: Access Control System
# Supported Format: JSON
# Reference: NA
# Last Updated: 2024-11-14
# Copyright 2024 Chronicle LLC

filter {
  mutate {
    replace => {
      "SourceModuleName" => ""
      "SourceModuleType" => ""
      "EventTime" => ""
      "cardnumber" => ""
      "device" => ""
      "eid" => ""
      "event_msg" => ""
      "machine" => ""
      "serialnum" => ""
      "site" => ""
      "event_time_local" => ""
      "person" => ""
    }
  }
  mutate {
    gsub => ["message", "event" , "event_msg"]
  }
  json {
    source => "message"
    on_error => "not_json"
    array_function => "split_columns"
  }

  if [SourceModuleName] != "" {
    mutate {
      replace => {
        "event.idm.read_only_udm.principal.resource.name" => "%{SourceModuleName}"
      }
    }
  }

  if [SourceModuleType] != "" {
    mutate {
      replace => {
        "source_module_type.value" => "%{SourceModuleType}"
        "source_module_type.key" => "SourceModuleType"
      }
    }
    mutate {
      merge => {
        "event.idm.read_only_udm.principal.resource.attribute.labels" => "source_module_type"
      }
    }
  }

  if [EventTime] != "" {
    date {
      match => ["EventTime", "ISO8601","RFC3339"]
    }
  }

  if [cardnumber] != "" {
    mutate {
      replace => {
        "cardnumber_label.key" => "cardnumber"
        "cardnumber_label.value.string_value" => "%{cardnumber}"
      }
      on_error => "cardnumber_not_found"
    }
    if ![cardnumber_not_found] {
      mutate {
        merge => {
          "event.idm.read_only_udm.additional.fields" => "cardnumber_label"
        }
        on_error => "cardnumber_merge_error"
      }
    }
  }
  if [device] != "" {
    mutate {
      replace => {
        "device_label.key" => "device"
        "device_label.value.string_value" => "%{device}"
      }
      on_error => "device_not_found"
    }
    if ![device_not_found] {
      mutate {
        merge => {
          "event.idm.read_only_udm.additional.fields" => "device_label"
        }
        on_error => "device_merge_error"
      }
    }
  }
  if [eid] != "" {
    mutate {
      replace => {
        "eid_label.key" => "eid"
        "eid_label.value.string_value" => "%{eid}"
      }
      on_error => "eid_not_found"
    }
    if ![eid_not_found] {
      mutate {
        merge => {
          "event.idm.read_only_udm.additional.fields" => "eid_label"
        }
        on_error => "eid_merge_error"
      }
    }
  }
  if [event_msg] != "" {
    mutate {
      replace => {
        "event.idm.read_only_udm.metadata.description" => "%{event_msg}"
      }
      on_error => "event_not_found"
    }
  }
  if [event_time_local] != "" {
    date {
      match => ["event_time_local", "ISO8601"]
      on_error => "event_time_local_not_found"
      target => "event.idm.read_only_udm.metadata.event_timestamp"
    }
  }
  if [machine] != "" {
    mutate {
      replace => {
        "machine_label.key" => "machine"
        "machine_label.value.string_value" => "%{machine}"
      }
      on_error => "machine_not_found"
    }
    if ![machine_not_found] {
      mutate {
        merge => {
          "event.idm.read_only_udm.additional.fields" => "machine_label"
        }
        on_error => "machine_merge_error"
      }
    }
  }
  if [serialnum] != "" {
    mutate {
      convert => {
        "serialnum" => "string"
      }
      on_error => "serialnum_convert_error"
    }
    mutate {
      replace => {
        "serialnum_label.key" => "serialnum"
        "serialnum_label.value.string_value" => "%{serialnum}"
      }
      on_error => "serialnum_not_found"
    }
    if ![serialnum_not_found] {
      mutate {
        merge => {
          "event.idm.read_only_udm.additional.fields" => "serialnum_label"
        }
        on_error => "serialnum_merge_error"
      }
    }
  }
  if [person] != "" {
    mutate {
      replace => {
        "person_label.key" => "person"
        "person_label.value.string_value" => "%{person}"
      }
      on_error => "person_not_found"
    }
    if ![person_not_found] {
      mutate {
        merge => {
          "event.idm.read_only_udm.additional.fields" => "person_label"
        }
        on_error => "person_merge_error"
      }
    }
  }
  if [site] != "" {
    mutate {
      replace => {
        "site_label.key" => "site"
        "site_label.value.string_value" => "%{site}"
      }
      on_error => "site_not_found"
    }
    if ![site_not_found] {
      mutate {
        merge => {
          "event.idm.read_only_udm.additional.fields" => "site_label"
        }
        on_error => "site_merge_error"
      }
    }
  }

  mutate {
    replace => {
      "event.idm.read_only_udm.metadata.product_name" => "OnGuard"
      "event.idm.read_only_udm.metadata.vendor_name" => "Lenel"
      "event.idm.read_only_udm.metadata.event_type" => "USER_RESOURCE_ACCESS"
    }
  }

  mutate {
    merge => {
      "@output" => "event"
    }
  }
}
