# Product: INTEL_EMA
# Category:Security
# Supported Format: SYSLOG
# Last Updated:2025-02-07
# Copyright 2025 Google SecOps
filter {
  mutate {
    replace => {
      "principal" => ""
      "target" => ""
      "metadata" => ""
      "network" => ""
      "security_result" => ""
      "extensions" => ""
      "has_principal" => "false"
      "has_target" => "false"
      "description" => ""
      "process_name" => ""
      "Time" => ""
      "severity" => ""
      "Culture" => ""
      "Publickeytoken" => ""
      "version_id" => ""
      "server_type" => ""
      "server_type_id" => ""
      "Endpoint_count" => ""
      "EndpointId" => ""
    }
  }
  grok {
    match => {
      "message" => [
        "%{TIMESTAMP_ISO8601:Time}\\|%{DATA:severity}\\|\\|%{INT}\\|%{INT}\\|<%{DATA:process_name}>%{DATA}%{DATA},\\s+%{DATA}=%{DATA:version_id},\\s+%{DATA}=%{DATA:Culture},\\s+%{DATA}=%{DATA:Publickeytoken}\\s+-%{GREEDYDATA:description}",
        "%{TIMESTAMP_ISO8601:Time}\\|%{DATA:severity}\\|\\|%{INT}\\|%{INT}\\|%{DATA},\\s+%{DATA}=%{DATA:version_id},\\s+%{DATA}=%{DATA:Culture},\\s+%{DATA}=%{DATA:Publickeytoken}\\s+-%{GREEDYDATA:description}"
      ]
    }
    overwrite => ["severity", "version_id", "Culture", "Publickeytoken", "description","process_name", "Time"]
    on_error => "no_grok_message"
  }

  if [description] != "" {
    grok {
      match => {
        "description" => [
          "%{DATA}\\s+%{INT:server_type}\\s+%{DATA}%{INT:server_type_id}%{DATA}%{INT:Endpoint_count}%{GREEDYDATA}\\s+%{GREEDYDATA:EndpointId}\\."
        ]
      }
      overwrite => ["server_type", "server_type_id", "Endpoint_count", "EndpointId"]
      on_error => "no_grok_description"
    }
  }
  if [Time] != "" {
    date {
      match => ["Time", "yyyy-MM-dd HH:mm:ss.SSSS","ISO8601","RFC3339"]
      target => "metadata.event_timestamp"
      on_error =>"no_created_timestamp"
    }
  }

  if [severity] != "" {
    if [severity] == "CRITICAL" {
      mutate {
        replace => {
          "security_result.severity" => "CRITICAL"
        }
        on_error => "no_severity"
      }
    }
    else if [severity] == "ERROR" {
      mutate {
        replace => {
          "security_result.severity" => "ERROR"
        }
        on_error => "no_severity"
      }
    }
    else if [severity] in ["ALERT", "EMERGENCY"] {
      mutate {
        replace => {
          "security_result.severity" => "HIGH"
        }
        on_error => "no_severity"
      }
    }
    else if [severity] in ["INFO", "NOTICE"] {
      mutate {
        replace => {
          "security_result.severity" => "INFORMATIONAL"
        }
        on_error => "no_severity"
      }
    }
    else if [severity] == "DEBUG" {
      mutate {
        replace => {
          "security_result.severity" => "LOW"
        }
      }
    }
    else if [severity] == "WARNING" {
      mutate {
        replace => {
          "security_result.severity" => "MEDIUM"
        }
      }
    }
    else {
      mutate {
        replace => {
          "security_result.severity" => "UNKNOWN_SEVERITY"
        }
      }
    }
  }
  if [version_id] != "" {
    mutate {
      replace => {
        "metadata.product_version" => "%{version_id}"
      }
      on_error => "no_version_id"
    }
  }
  if [Culture] not in ["","null"] {
    mutate {
      replace => {
        "Culture_label.key" => "culture"
        "Culture_label.value" => "%{Culture}"
      }
      on_error => "no_Culture"
    }
    mutate {
      merge => {
        "target.resource.attribute.labels" => "Culture_label"
      }
      on_error => "no_Culture"
    }
  }
  if [Publickeytoken] not in ["","null"] {
    mutate {
      replace => {
        "Publickeytoken_label.key" => "public_key_token"
        "Publickeytoken_label.value" => "%{Publickeytoken}"
      }
      on_error => "no_Publickeytoken"
    }
    if ![no_Publickeytoken] {
      mutate {
        merge => {
          "target.resource.attribute.labels" => "Publickeytoken_label"
        }
        on_error => "no_Publickeytoken"
      }
    }
  }
  if [process_name] not in ["","null"] {
    mutate {
      replace => {
        "process_name_label.key" => "process_name"
        "process_name_label.value" => "%{process_name}"
      }
      on_error => "no_process_name"
    }
    mutate {
      merge => {
        "target.resource.attribute.labels" => "process_name_label"
      }
      on_error => "no_process_name"
    }
  }
  if [server_type] not in ["","null"] {
    mutate {
      replace => {
        "server_type_label.key" => "server_type"
        "server_type_label.value.string_value" => "%{server_type}"
      }
      on_error => "no_server_type"
    }
    mutate {
      merge => {
        "event.idm.read_only_udm.additional.fields" => "server_type_label"
      }
      on_error => "no_server_type"
    }
  }
  if [server_type_id] not in ["","null"] {
    mutate {
      replace => {
        "server_type_id_label.key" => "server_type_id"
        "server_type_id_label.value.string_value" => "%{server_type_id}"
      }
      on_error => "no_server_type_id"
    }
    mutate {
      merge => {
        "event.idm.read_only_udm.additional.fields" => "server_type_id_label"
      }
      on_error => "no_server_type_id"
    }
  }
  if [Endpoint_count] not in ["","null"] {
    mutate {
      replace => {
        "Endpoint_count_label.key" => "Endpoint_count"
        "Endpoint_count_label.value.string_value" => "%{Endpoint_count}"
      }
      on_error => "no_Endpoint_count"
    }
    mutate {
      merge => {
        "event.idm.read_only_udm.additional.fields" => "Endpoint_count_label"
      }
      on_error => "no_Endpoint_count"
    }
  }
  if [EndpointId] not in ["","null"] {
    mutate {
      replace => {
        "EndpointId_label.key" => "EndpointId"
        "EndpointId_label.value" => "%{EndpointId}"
      }
      on_error => "no_EndpointId"
    }
    mutate {
      merge => {
        "security_result.detection_fields" => "EndpointId_label"
      }
      on_error => "no_EndpointId"
    }
  }
  if [has_principal] == "true" and [has_target] == "true" {
    mutate {
      replace => {
        "metadata.event_type" => "NETWORK_CONNECTION"
      }
    }
  }
  else if [has_principal] == "true" {
    mutate {
      replace => {
        "metadata.event_type" => "STATUS_UPDATE"
      }
    }
  }
  else {
    mutate {
      replace => {
        "metadata.event_type" => "GENERIC_EVENT"
      }
    }
  }
  if [principal] != "" {
    mutate {
      rename => {
        "principal" => "event.idm.read_only_udm.principal"
      }
    }
  }

  if [target] != "" {
    mutate {
      rename => {
        "target" => "event.idm.read_only_udm.target"
      }
    }
  }

  if [metadata] != "" {
    mutate {
      rename => {
        "metadata" => "event.idm.read_only_udm.metadata"
      }
    }
  }

  if [network] != "" {
    mutate {
      rename => {
        "network" => "event.idm.read_only_udm.network"
      }
    }
  }

  if [extensions] != "" {
    mutate {
      rename => {
        "extensions" => "event.idm.read_only_udm.extensions"
      }
    }
  }

  if [security_result] != "" {
    mutate {
      merge => {
        "event.idm.read_only_udm.security_result" => "security_result"
      }
      on_error => "no_security_result"
    }
  }

  mutate {
    merge => {
      "@output" => "event"
    }
  }
}

