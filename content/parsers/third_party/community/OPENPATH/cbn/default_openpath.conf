# Product: Openpath
# Category: AV / Endpoint
# Supported Format: SYSLOG
# Reference: N/A
# Last Updated: 2025-06-10
# Copyright 2025 Google SecOps

filter {
  mutate {
    replace => {
      "acuId" => ""
      "category" => ""
      "sourceName" => ""
      "subCategory" => ""
      "time" => ""
      "timeIsoString" => ""
      "gatewayDevice" => ""
      "readerPortNumber" => ""
      "portNumber" => ""
      "sourceDevice" => ""
      "userId" => ""
      "userOrgId" => ""
      "credentialTypeModelName" => ""
      "credentialDetail" => ""
      "cardFields" => ""
      "credentialSubtype" => ""
      "requestType" => ""
      "lockdownPlanId" => ""
      "result" => ""
      "sec_action_label" => ""
      "resultDescription" => ""
      "deniedReason" => ""
      "requestId" => ""
      "connectionType" => ""
      "location" => ""
      "userFirstName" => ""
      "userLastName" => ""
      "userName" => ""
      "userEmail" => ""
      "userExternalId" => ""
      "userIdpName" => ""
      "userGroups" => ""
      "userOrgName" => ""
      "credentialTypeName" => ""
      "entries" => ""
      "zoneName2" => ""
      "siteName2" => ""
      "targetType" => ""
      "targetName" => ""
      "event_type" => ""
      "metadata" => ""
      "principal" => ""
      "security_result" => ""
      "target" => ""
      "data.acuId" => ""
      "data.acu.name" => ""
      "data.acu.opal" => ""
      "data.connectionType" => ""
      "data.credentialOpal" => ""
      "entry.entryStateCode" => ""
      "entry.id" => ""
      "entry.name" => ""
      "entry.opal" => ""
      "entry.siteId" => ""
      "entry.zoneId" => ""
      "data.userId" => ""
      "numBits" => ""
      "requstId" => ""
      "network" => ""
      "data.httpUserAgent" => ""
      "data.org.id" => ""
      "data.org.name" => ""
      "data.org.opal" => ""
      "data.requestId" => ""
      "data.hardwareData.requestId" => ""
      "data.readerId" => ""
      "data.requestStatusDetail" => ""
      "data.requestUri" => ""
      "data.requestType" => ""
      "data.thirdPartyReaderId" => ""
      "data.hardwareData.cardNumber" => ""
      "data.hardwareData.cardType" => ""
      "data.requstId" => ""
      "data.status" => ""
      "data.thirdPartyWiegandId" => ""
      "data.userOpal" => ""
      "data.validProximityOtp" => ""
      "data.validProximityProof" => ""
      "evt" => ""
      "host" => ""
      "timestamp" => ""
      "has_principal" => "false"
      "ipaddr" => ""
      "has_principal_userId" => "false"
      "source_type" => ""
    }
  }

  mutate {
    gsub => ["message", "event", "evt"]
  }

  json {
    source => "message"
    array_function => "split_columns"
    on_error => "message_not_json"
  }

  if [timeIsoString] != "" {
    date {
      match => ["timeIsoString", "ISO8601"]
      on_error => "date_match_failed"
    }
  }
  if [timestamp] != "" {
    date {
      match => ["timestamp", "ISO8601"]
      on_error => "date_match_failed"
    }
  }

  if [category] != "" {
    mutate {
      merge => {
        "security_result.category_details" => "category"
      }
      on_error => "category_merge_failed"
    }
  }

  if [sourceName] != "" {
    mutate {
      replace => {
        "principal.hostname" => "%{sourceName}"
      }
      on_error => "sourceName_invalid"
    }
  }

  if [subCategory] != "" {
    mutate {
      replace => {
        "subCategory_label.key" => "subCategory"
        "subCategory_label.value.string_value" => "%{subCategory}"
      }
      on_error => "subCategory_invalid"
    }
    if ![subCategory_invalid] {
      mutate {
        merge => {
          "event.idm.read_only_udm.additional.fields" => "subCategory_label"
        }
        on_error => "subCategory_label_merge_failed"
      }
    }
  }

  if [time] != "" {
    mutate {
      convert => {
        "time" => "string"
      }
      on_error => "time_already_string"
    }
    mutate {
      replace => {
        "time_label.key" => "time"
        "time_label.value.string_value" => "%{time}"
      }
      on_error => "time_invalid"
    }
    if ![time_invalid] {
      mutate {
        merge => {
          "event.idm.read_only_udm.additional.fields" => "time_label"
        }
        on_error => "time_label_merge_failed"
      }
    }
  }

  if [gatewayDevice] != "" {
    mutate {
      replace => {
        "gatewayDevice_type" => ""
        "gatewayDevice_uid" => ""
        "gatewayDevice_name" => ""
      }
    }

    mutate {
      replace => {
        "gatewayDevice_type" => "%{gatewayDevice.type}"
      }
      on_error => "gatewayDevice_type_not_found"
    }
    if ![gatewayDevice_type_not_found] and [gatewayDevice_type] =~ "acu" {
      mutate {
        replace => {
            "target.resource.type" => "DEVICE"
        }
        on_error => "gatewayDevice_type_invalid"
      }
    }

    mutate {
      replace => {
        "gatewayDevice_uid" => "%{gatewayDevice.uid}"
      }
      on_error => "gatewayDevice_uid_not_found"
    }
    if ![gatewayDevice_uid_not_found] and [gatewayDevice_uid] != "" {
      mutate {
        replace => {
            "target.resource.id" => "id: %{gatewayDevice_uid}"
        }
        on_error => "gatewayDevice_uid_invalid"
      }
    }

    mutate {
      replace => {
        "gatewayDevice_name" => "%{gatewayDevice.name}"
      }
      on_error => "gatewayDevice_name_not_found"
    }
    if ![gatewayDevice_name_not_found] and [gatewayDevice_name] != "" {
      mutate {
        replace => {
            "target.resource.name" => "%{gatewayDevice_name}"
        }
        on_error => "gatewayDevice_name_invalid"
      }
    }
  }

  if [readerPortNumber] != "" {
    mutate {
      convert  => {
        "readerPortNumber" => "integer"
      }
      on_error => "readerPortNumber_already_integer"
    }

    mutate {
      rename => {
        "readerPortNumber" => "principal.port"
      }
      on_error => "readerPortNumber_invalid"
    }
  }

  if [portNumber] != "" {
    for key, value in portNumber map {
      mutate {
        replace => {
          "portNumber_map_label" => ""
        }
      }
      if [key] != "" and [key] != "raw" {
        mutate {
          replace => {
            "portNumber_map_label.key" => "portNumber %{key}"
          }
          on_error => "portNumber_key_invalid"
        }
        if ![portNumber_key_invalid] and [value] != "" {
          mutate {
            convert => {
              "value" => "string"
            }
            on_error => "portNumber_value_already_string"
          }
          mutate {
            replace => {
              "portNumber_map_label.value" => "%{value}"
            }
            on_error => "portNumber_value_nested"
          }
          if ![portNumber_value_nested] {
            mutate {
              merge => {
                "principal.resource.attribute.labels" => "portNumber_map_label"
              }
              on_error => "portNumber_map_label_merge_failed"
            }
          }
        }
      }
    }
  }

  if [sourceDevice] != "" {
    mutate {
      replace => {
        "sourceDevice_type" => ""
        "sourceDevice_uid" => ""
        "sourceDevice_name" => ""
      }
    }

    mutate {
      replace => {
        "sourceDevice_type" => "%{sourceDevice.type}"
      }
      on_error => "sourceDevice_type_not_found"
    }
    if ![sourceDevice_type_not_found] and [sourceDevice_type] =~ "reader" {
      mutate {
        replace => {
            "principal.resource.type" => "DEVICE"
        }
        on_error => "sourceDevice_type_invalid"
      }
    }

    mutate {
      replace => {
        "sourceDevice_uid" => "%{sourceDevice.uid}"
      }
      on_error => "sourceDevice_uid_not_found"
    }
    if ![sourceDevice_uid_not_found] and [sourceDevice_uid] != "" {
      mutate {
        replace => {
            "principal.resource.id" => "id: %{sourceDevice_uid}"
        }
        on_error => "sourceDevice_uid_invalid"
      }
    }

    mutate {
      replace => {
        "sourceDevice_name" => "%{sourceDevice.name}"
      }
      on_error => "sourceDevice_name_not_found"
    }
    if ![sourceDevice_name_not_found] and [sourceDevice_name] != "" {
      mutate {
        replace => {
            "principal.resource.name" => "%{sourceDevice_name}"
        }
        on_error => "sourceDevice_name_invalid"
      }
    }
  }

  if [userId] != "" {
    mutate {
      convert => {
        "userId" => "string"
      }
      on_error => "userId_already_string"
    }
    mutate {
      replace => {
        "principal.user.userid" => "%{userId}"
      }
      on_error => "userId_invalid"
    }
  }
  if [data][userId] != "" {
    mutate {
      convert => {
        "data.userId" => "string"
      }
      on_error => "data_userId_already_string"
    }
    mutate {
      replace => {
        "principal.user.userid" => "%{data.userId}"
        "has_principal_userId" => "true"
      }
      on_error => "data_userId_invalid"
    }
  }

  if [userOrgId] != "" {
    mutate {
      convert => {
        "userOrgId" => "string"
      }
      on_error => "userOrgId_already_string"
    }
    mutate {
      replace => {
        "userOrgId_label.key" => "userOrgId"
        "userOrgId_label.value.string_value" => "%{userOrgId}"
      }
      on_error => "userOrgId_invalid"
    }
    if ![userOrgId_invalid] {
      mutate {
        merge => {
          "event.idm.read_only_udm.additional.fields" => "userOrgId_label"
        }
        on_error => "userOrgId_label_merge_failed"
      }
    }
  }

  if [userFirstName] != "" {
    mutate {
      replace => {
        "principal.user.first_name" => "%{userFirstName}"
      }
      on_error => "userFirstName_invalid"
    }
  }

  if [userLastName] != "" {
    mutate {
      replace => {
        "principal.user.last_name" => "%{userLastName}"
      }
      on_error => "userLastName_invalid"
    }
  }

  if [userName] != "" {
    mutate {
      replace => {
        "principal.user.user_display_name" => "%{userName}"
      }
      on_error => "userName_invalid"
    }
  }

  if [userEmail] != "" {
    grok {
      match => {
        "userEmail" => "%{EMAILADDRESS:userEmail}"
      }
      overwrite => ["userEmail"]
      on_error => "userEmail_pattern_invalid"
    }
    if ![userEmail_pattern_invalid] {
      mutate {
        replace => {
          "principal.email" => "%{userEmail}"
        }
        on_error => "userEmail_invalid"
      }
    }
  }

  if [userExternalId] != "" {
    mutate {
      convert => {
        "userExternalId" => "string"
      }
      on_error => "userExternalId_already_string"
    }
    mutate {
      replace => {
        "userExternalId_label.key" => "userExternalId"
        "userExternalId_label.value.string_value" => "%{userExternalId}"
      }
      on_error => "userExternalId_invalid"
    }
    if ![userExternalId_invalid] {
      mutate {
        merge => {
          "event.idm.read_only_udm.additional.fields" => "userExternalId_label"
        }
        on_error => "userExternalId_label_merge_failed"
      }
    }
  }

  if [userIdpName] != "" {
    mutate {
      replace => {
        "userIdpName_label.key" => "userIdpName"
        "userIdpName_label.value.string_value" => "%{userIdpName}"
      }
      on_error => "userIdpName_invalid"
    }
    if ![userIdpName_invalid] {
      mutate {
        merge => {
          "event.idm.read_only_udm.additional.fields" => "userIdpName_label"
        }
        on_error => "userIdpName_label_merge_failed"
      }
    }
  }

  if [userGroups] != "" {
    for userGroup in userGroups {
      for key, value in userGroup map {
        mutate {
          replace => {
            "userGroup_map_label" => ""
          }
        }
        if [key] == "id" {
          if [value] != "" {
            mutate {
              convert => {
                "value" => "string"
              }
              on_error => "userGroup_value_already_string"
            }
            mutate {
              merge => {
                "principal.user.group_identifiers" => "value"
              }
              on_error => "userGroup_value_nested"
            }
          }
        }
        else if [key] == "name" {
          if [value] != "" {
            mutate {
              merge => {
                "principal.user.department" => "value"
              }
              on_error => "userGroup_value_nested_2"
            }
          }
        }
      }
    }
  }

  if [userOrgName] != "" {
    mutate {
      replace => {
        "principal.user.company_name" => "%{userOrgName}"
      }
      on_error => "userOrgName_invalid"
    }
  }

  if [credentialTypeModelName] != "" {
    mutate {
      replace => {
        "credentialTypeModelName_label.key" => "credentialTypeModelName"
        "credentialTypeModelName_label.value" => "%{credentialTypeModelName}"
      }
      on_error => "credentialTypeModelName_invalid"
    }
    if ![credentialTypeModelName_invalid] {
      mutate {
        merge => {
          "security_result.detection_fields" => "credentialTypeModelName_label"
        }
        on_error => "credentialTypeModelName_label_merge_failed"
      }
    }
  }

  if [credentialDetail] != "" {
    mutate {
      replace => {
        "credentialDetail_label.key" => "credentialDetail"
        "credentialDetail_label.value" => "%{credentialDetail}"
      }
      on_error => "credentialDetail_invalid"
    }
    if ![credentialDetail_invalid] {
      mutate {
        merge => {
          "security_result.detection_fields" => "credentialDetail_label"
        }
        on_error => "credentialDetail_label_merge_failed"
      }
    }
  }

  if [credentialSubtype] != "" {
    mutate {
      replace => {
        "credentialSubtype_label.key" => "credentialSubtype"
        "credentialSubtype_label.value" => "%{credentialSubtype}"
      }
      on_error => "credentialSubtype_invalid"
    }
    if ![credentialSubtype_invalid] {
      mutate {
        merge => {
          "security_result.detection_fields" => "credentialSubtype_label"
        }
        on_error => "credentialSubtype_label_merge_failed"
      }
    }
  }

  if [requestType] != "" {
    mutate {
      replace => {
        "requestType_label.key" => "requestType"
        "requestType_label.value" => "%{requestType}"
      }
      on_error => "requestType_invalid"
    }
    if ![requestType_invalid] {
      mutate {
        merge => {
          "security_result.detection_fields" => "requestType_label"
        }
        on_error => "requestType_label_merge_failed"
      }
    }
  }

  if [requestId] != "" {
    mutate {
      replace => {
        "requestId_label.key" => "requestId"
        "requestId_label.value" => "%{requestId}"
      }
      on_error => "requestId_invalid"
    }
    if ![requestId_invalid] {
      mutate {
        merge => {
          "security_result.detection_fields" => "requestId_label"
        }
        on_error => "requestId_label_merge_failed"
      }
    }
  }

  if [connectionType] != "" {
    mutate {
      replace => {
        "connectionType_label.key" => "connectionType"
        "connectionType_label.value" => "%{connectionType}"
      }
      on_error => "connectionType_invalid"
    }
    if ![connectionType_invalid] {
      mutate {
        merge => {
          "security_result.detection_fields" => "connectionType_label"
        }
        on_error => "connectionType_label_merge_failed"
      }
    }
  }

  if [location] != "" {
    mutate {
      replace => {
        "location_label.key" => "location"
        "location_label.value" => "%{location}"
      }
      on_error => "location_invalid"
    }
    if ![location_invalid] {
      mutate {
        merge => {
          "security_result.detection_fields" => "location_label"
        }
        on_error => "location_label_merge_failed"
      }
    }
  }

  if [credentialTypeName] != "" {
    mutate {
      replace => {
        "credentialTypeName_label.key" => "credentialTypeName"
        "credentialTypeName_label.value" => "%{credentialTypeName}"
      }
      on_error => "credentialTypeName_invalid"
    }
    if ![credentialTypeName_invalid] {
      mutate {
        merge => {
          "security_result.detection_fields" => "credentialTypeName_label"
        }
        on_error => "credentialTypeName_label_merge_failed"
      }
    }
  }

  if [lockdownPlanId] != "" {
    mutate {
      convert => {
        "lockdownPlanId" => "string"
      }
      on_error => "lockdownPlanId_already_string"
    }
    mutate {
      replace => {
        "lockdownPlanId_label.key" => "lockdownPlanId"
        "lockdownPlanId_label.value" => "%{lockdownPlanId}"
      }
      on_error => "lockdownPlanId_invalid"
    }
    if ![lockdownPlanId_invalid] {
      mutate {
        merge => {
          "security_result.detection_fields" => "lockdownPlanId_label"
        }
        on_error => "lockdownPlanId_label_merge_failed"
      }
    }
  }

  if [result] =~ "(?i)Granted" or [data][requestStatusDetail] =~ "(?i)Granted" {
    mutate {
      replace => {
        "sec_action_label" => "ALLOW"
      }
      on_error => "result_invalid"
    }
  }
  else if [result] =~ "(?i)Denied" or [data][requestStatusDetail] =~ "(?i)Denied" {
    mutate {
      replace => {
        "sec_action_label" => "BLOCK"
      }
      on_error => "result_invalid_2"
    }
  }
  if [sec_action_label] != "" {
    mutate {
      merge => {
        "security_result.action" => "sec_action_label"
      }
      on_error => "result_invalid"
    }
  }

  if [resultDescription] != "" {
    mutate {
      replace => {
        "security_result.description" => "%{resultDescription}"
      }
      on_error => "resultDescription_invalid"
    }
  }

  if [deniedReason] != "" {
    mutate {
      replace => {
        "security_result.summary" => "%{deniedReason}"
      }
      on_error => "deniedReason_invalid"
    }
  }

  if [cardFields] != "" {
    for key, value in cardFields map {
      mutate {
        replace => {
          "cardFields_map_label" => ""
        }
      }
      if [key] != "" {
        mutate {
          replace => {
            "cardFields_map_label.key" => "cardFields %{key}"
          }
          on_error => "cardFields_key_invalid"
        }
        if ![cardFields_key_invalid] and [value] != "" {
          mutate {
            replace => {
              "cardFields_map_label.value" => "%{value}"
            }
            on_error => "cardFields_value_nested"
          }
          if ![cardFields_value_nested] {
            mutate {
              merge => {
                "security_result.detection_fields" => "cardFields_map_label"
              }
              on_error => "cardFields_map_label_merge_failed"
            }
          }
        }
      }
    }
  }

  if [entries] != "" {
    for entry in entries {
      for key, value in entry map {
        mutate {
          replace => {
            "entry_map_label" => ""
          }
        }
        if [key] not in ["site", "zone", ""] {
          mutate {
            replace => {
              "entry_map_label.key" => "entry %{key}"
            }
            on_error => "invalid_entry_key"
          }
          if ![invalid_entry_key] and [value] != "" {
            mutate {
              convert => {
                "value" => "string"
              }
              on_error => "entry_value_already_string"
            }
            mutate {
              replace => {
                "entry_map_label.value" => "%{value}"
              }
              on_error => "entry_value_nested"
            }
            if ![entry_value_nested] {
              mutate {
                merge => {
                  "target.resource.attribute.labels" => "entry_map_label"
                }
                on_error => "entry_map_label_merge_failed"
              }
            }
          }
        }
        else if [key] in ["site", "zone"] {
          if [value] != "" {
            for nested_key, nested_value in value map {
              mutate {
                replace => {
                  "nested_entry_map_label" => ""
                }
              }
              if [nested_key] != "" {
                mutate {
                  replace => {
                    "nested_entry_map_label.key" => "Entry %{key} %{nested_key}"
                  }
                  on_error => "nested_key_invalid"
                }
                if ![nested_key_invalid] and [nested_value] != "" {
                  mutate {
                    convert => {
                      "nested_value" => "string"
                    }
                    on_error => "nested_value_already_string"
                  }
                  mutate {
                    replace => {
                      "nested_entry_map_label.value" => "%{nested_value}"
                    }
                    on_error => "nested_value_nested"
                  }
                  if ![nested_value_nested] {
                    mutate {
                      merge => {
                        "target.resource.attribute.labels" => "nested_entry_map_label"
                      }
                      on_error => "nested_entry_map_label_merge_failed"
                    }
                  }
                }
              }
            }
          }
        }
      }
    }
  }

  if [siteName2] != "" {
    mutate {
      replace => {
        "target.location.city" => "%{siteName2}"
      }
      on_error => "siteName2_invalid"
    }
  }

  if [zoneName2] != "" {
    mutate {
      replace => {
        "target.location.name" => "%{zoneName2}"
      }
      on_error => "zoneName2_invalid"
    }
  }

  if [targetType] != "" {
    mutate {
      replace => {
        "targetType_label.key" => "targetType"
        "targetType_label.value" => "%{targetType}"
      }
      on_error => "targetType_invalid"
    }
    if ![targetType_invalid] {
      mutate {
        merge => {
          "target.resource.attribute.labels" => "targetType_label"
        }
        on_error => "targetType_label_merge_failed"
      }
    }
  }

  if [targetName] != "" {
    mutate {
      replace => {
        "targetName_label.key" => "targetName"
        "targetName_label.value" => "%{targetName}"
      }
      on_error => "targetName_invalid"
    }
    if ![targetName_invalid] {
      mutate {
        merge => {
          "target.resource.attribute.labels" => "targetName_label"
        }
        on_error => "targetName_label_merge_failed"
      }
    }
  }

  if [data][acuId] != "" {
    mutate {
      convert => {
        "data.acuId" => "string"
      }
      on_error => "data_acuId_already_string"
    }
    mutate {
      replace => {
        "target.resource.id" => "%{data.acuId}"
      }
      on_error => "data_acu_id_invalid"
    }
  }
  if [data][acu][name] != "" {
    mutate {
      replace => {
        "target.resource.name" => "%{data.acu.name}"
      }
      on_error => "data_acu_name_invalid"
    }
  }
  if [data][acu][opal] != "" {
    mutate {
