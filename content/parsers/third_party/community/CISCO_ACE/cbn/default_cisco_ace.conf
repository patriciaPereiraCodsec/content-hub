# Product: Cisco Application Control Engine
# Category: Load Balancer, Traffic Shaper, ADC
# Supported Format: SYSLOG
# Reference: https://www.cisco.com/c/en/us/td/docs/interfaces_modules/services_modules/ace/vA4_2_0/configuration/system/message/guide/sysmsggd/config.html
# Last Updated: 2022-09-15
# Copyright 2022 Chronicle LLC


# Supported event types:
# 302024: A UDP connection slot between two hosts was added.
# 302025: A UDP connection slot between two hosts was deleted.
# 400000: Cisco Intrusion Detection System signature message.
#         The ACE does not support IP options. This IDS message
#         is generated whenever the ACE detects IP options in a packet.

filter {
  mutate {
    replace => {
      "dst_ip" => ""
      "dst_port" => ""
      "src_ip" => ""
      "src_port" => ""
      "dst_interface" => ""
      "src_interface" => ""
      "protocol" => ""
      "action" => ""
      "direction" => ""
      "icmp_seq_num" => ""
      "fwuser" => ""
      "src_xlated_ip" => ""
      "icmp_code_xlated" => ""
      "icmp_code_laddr" => ""
      "icmp_type" => ""
      "icmp_code" => ""
      "security_result" => ""
      "result_action" => ""
      "event_type" => ""
    }
  }

  grok {
    match => {
      "message" => [
        "%{SYSLOGTIMESTAMP:timestamp} %{IP} : \\%ACE-%{INT:event_severity}-%{INT:event_id}: %{GREEDYDATA:inner_message}"
      ]
    }
   on_error => "grok_failure"
  }

  date {
    match => ["timestamp", "MMM dd HH:mm:ss","MMM  dd HH:mm:ss","MMM  d HH:mm:ss","RFC3339", "UNIX", "ISO8601"]
    rebase => true
  }

  if [event_id] in ["302024", "302025", "302022","302023","302026","302027"] {
    grok {
      match => {
        "message" => [
          "(?P<action>Built|Teardown) %{WORD:protocol} connection 0x[0-9a-f]+ for (?P<src_interface>[a-zA-Z0-9]+):%{IP}/%{INT} \\(%{IP:src_ip}/%{INT:src_port}\\) to (?P<dst_interface>[a-zA-Z0-9]+):%{IP}/%{INT} \\(%{IP:dst_ip}/%{INT:dst_port}\\)(.*bytes %{INT:bytes}|)",
          "(?P<action>Built|Teardown)(\\s*(?P<direction>Inbound|inbound|Outbound|outbound))?\\s*%{WORD:protocol} connection for faddr %{DATA:dst_ip}/%{INT:icmp_seq_num}(?:\\(%{DATA:fwuser}\\))? gaddr %{DATA:src_xlated_ip}/%{INT:icmp_code_xlated} laddr %{DATA:src_ip}/%{INT:icmp_code_laddr}(?: type %{INT:icmp_type} code %{INT:icmp_code})?"
        ]
      }
      overwrite => ["protocol","dst_ip","src_ip","dst_interface","src_interface","","src_port","dst_port","action","direction","icmp_seq_num","fwuser","src_xlated_ip","icmp_code_xlated","icmp_code_laddr","icmp_type","icmp_code"]
      on_error => "event_id_grok_failure"
    }

    if [icmp_code_laddr] != "" {
      mutate {
        replace => {
          "icmp_code_laddr_field.key" => "icmp_code_laddr"
          "icmp_code_laddr_field.value.string_value" => "%{icmp_code_laddr}"
        }
      }
      mutate {
        merge => {
          "event.idm.read_only_udm.additional.fields" => "icmp_code_laddr_field"
        }
      }
    }

    if [icmp_code_xlated] != "" {
      mutate {
        replace => {
          "icmp_code_xlated_field.key" => "icmp_code_xlated"
          "icmp_code_xlated_field.value.string_value" => "%{icmp_code_xlated}"
        }
      }
      mutate {
        merge => {
          "event.idm.read_only_udm.additional.fields" => "icmp_code_xlated_field"
        }
      }
    }

    if [icmp_seq_num] != "" {
      mutate {
        replace => {
          "icmp_seq_num_field.key" => "icmp_seq_num"
          "icmp_seq_num_field.value.string_value" => "%{icmp_seq_num}"
        }
      }
      mutate {
        merge => {
        "event.idm.read_only_udm.additional.fields" => "icmp_seq_num_field"
        }
      }
    }

    if [action] != "" {
      mutate {
        "lowercase" => ["action"]
      }

      if [action] =~ "(built)" {
        mutate {
          replace => {
            "result_action" => "ALLOW"
            "security_result.action_details" => "%{action}"
          }
        }
      }
      else if [action] == "teardown" {
        mutate {
          replace => {
            "result_action" => "BLOCK"
            "security_result.action_details" => "%{action}"
          }
        }
      }
      if [result_action] != "" {
        mutate {
          merge => {
            "security_result.action" => "result_action"
          }
        }
      }
    }


    if [src_interface] != "" {
      mutate {
        replace => {
          "src_label.key" => "Connection Interface"
          "src_label.value" => "%{src_interface}"
        }
        merge => {
          "event.idm.read_only_udm.principal.resource.attribute.labels" => "src_label"
        }
      }
    }

    if [dst_interface] != "" {
      mutate {
        replace => {
          "dst_label.key" => "Connection Interface"
          "dst_label.value" => "%{dst_interface}"
        }
        merge => {
          "event.idm.read_only_udm.target.resource.attribute.labels" => "dst_label"
        }
      }
    }

    mutate {
      replace => {
        "event_type" => "NETWORK_CONNECTION"
      }
    }

    if [protocol] != "" {
      mutate {
        replace => {
          "event.idm.read_only_udm.network.ip_protocol" => "%{protocol}"
          "event.idm.read_only_udm.metadata.description" => "Built %{protocol} connection"
        }
      }
    }

    if [src_port] != "" {
      mutate {
        rename => {
          "src_port" => "event.idm.read_only_udm.principal.port"
        }
      }
    }

    if [dst_port] != "" {
      mutate {
        rename => {
          "dst_port" => "event.idm.read_only_udm.target.port"
        }
      }
    }

    if [event_id] == "302025" {
      mutate {
        rename => {
          "bytes" => "event.idm.read_only_udm.network.sent_bytes"
        }
        replace => {
          "event.idm.read_only_udm.metadata.description" => "Teardown UDP connection"
        }
      }
    }
  }
  else if [event_id] == "400000" {
    grok {
      match => {
        "message" => [
          "IP Option Bad Option List from %{IP:src_ip} to %{IP:dst_ip} on interface"
        ]
      }
      overwrite => ["src_ip","dst_ip"]
      on_error => "grok_failure"
    }

    mutate {
      replace => {
        "event_type" => "SCAN_UNCATEGORIZED"
        "event.idm.read_only_udm.metadata.description" => "IP options in a packet detected"
      }
    }
  }

  mutate {
    rename => {
      "event_id" => "event.idm.read_only_udm.metadata.product_event_type"
    }
    convert => {
      "event.idm.read_only_udm.principal.port" => "integer"
      "event.idm.read_only_udm.target.port" => "integer"
      "event.idm.read_only_udm.network.sent_bytes" => "uinteger"
    }
  }

  if [src_ip] != "" {
    mutate {
      merge => {
        "event.idm.read_only_udm.principal.ip" => "src_ip"
      }
    }
  }

  if [dst_ip] != "" {
    mutate {
      merge => {
        "event.idm.read_only_udm.target.ip" => "dst_ip"
      }
    }
  }

  if [security_result] != "" {
    mutate {
      merge => {
        "event.idm.read_only_udm.security_result" => "security_result"
      }
    }
  }

  if [event_type] != "" {
    mutate {
      replace => {
        "event.idm.read_only_udm.metadata.event_type" => "%{event_type}"
      }
    }
  }

  mutate {
    merge => {
      "@output" => "event"
    }
  }
}
