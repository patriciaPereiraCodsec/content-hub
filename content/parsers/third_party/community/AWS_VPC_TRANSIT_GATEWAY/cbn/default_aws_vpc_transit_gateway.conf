# Product: AWS VPC Transit Gateway
# Category: Network
# Supported Format: JSON
# Reference: N/A
# Last Updated: 2025-09-19
# Copyright 2025 Google SecOps

filter {
  mutate {
    replace => {
      "version" => ""
      "resource_type" => ""
      "account_id" => ""
      "tgw_id" => ""
      "tgw_attachment_id" => ""
      "tgw_src_vpc_account_id" => ""
      "tgw_dst_vpc_account_id" => ""
      "tgw_src_vpc_id" => ""
      "tgw_src_subnet_id" => ""
      "tgw_src_eni" => ""
      "tgw_src_az_id" => ""
      "tgw_dst_az_id" => ""
      "tgw_pair_attachment_id" => ""
      "region" => ""
      "event_type" => ""
      "principal_user_present" => "false"
      "target_resource_present" => "false"
      "metadata" => ""
      "principal" => ""
      "target" => ""
      "additional" => ""
      "security_result" => ""
      "tgw_dst_vpc_id" => ""
      "tgw_dst_subnet_id" => ""
      "tgw_dst_eni" => ""
      "srcaddr" => ""
      "has_principal" => "false"
      "dstaddr" => ""
      "has_target" => "false"
      "srcport" => ""
      "dstport" => ""
      "protocol" => ""
      "packets" => ""
      "network" => ""
      "bytes" => ""
      "start_time" => ""
      "end_time" => ""
      "log_status" => ""
      "type" => ""
      "packets_lost_no_route" => ""
      "packets_lost_blackhole" => ""
      "packets_lost_mtu_exceeded" => ""
      "packets_lost_ttl_expired" => ""
      "tcp_flags" => ""
      "flow_direction" => ""
      "pkt_src_aws_service" => ""
      "pkt_dst_aws_service" => ""
    }
  }

  json {
    source => "message"
    array_function => "split_columns"
    on_error => "not_json"
  }
  if [not_json] {
    grok {
      match => {
        "message" => ["%{NUMBER:version} %{WORD:resource_type} %{NUMBER:account_id} %{DATA:tgw_id} %{DATA:tgw_attachment_id} %{NUMBER:tgw_src_vpc_account_id} %{NUMBER:tgw_dst_vpc_account_id} %{DATA:tgw_src_vpc_id} %{DATA:tgw_dst_vpc_id} %{DATA:tgw_src_subnet_id} %{DATA:tgw_dst_subnet_id} %{DATA:tgw_src_eni} %{DATA:tgw_dst_eni} %{DATA:tgw_src_az_id} %{DATA:tgw_dst_az_id} %{DATA:tgw_pair_attachment_id} %{IP:srcaddr} %{IP:dstaddr} %{NUMBER:srcport} %{NUMBER:dstport} %{NUMBER:protocol} %{NUMBER:packets} %{NUMBER:bytes} %{NUMBER:start_time} %{NUMBER:end_time} %{WORD:log_status} %{DATA:type} %{NUMBER:packets_lost_no_route} %{NUMBER:packets_lost_blackhole} %{NUMBER:packets_lost_mtu_exceeded} %{NUMBER:packets_lost_ttl_expired} %{DATA:tcp_flags} %{DATA:region} %{WORD:flow_direction} %{DATA:pkt_src_aws_service} %{GREEDYDATA:pkt_dst_aws_service}",
        "%{NUMBER:version} %{WORD:resource_type} %{NUMBER:account_id} %{DATA:tgw_id} %{DATA:tgw_attachment_id} %{NUMBER:start_time} %{NUMBER:end_time} %{WORD:log_status} %{DATA:type} %{DATA:packets_lost_no_route} %{NUMBER:packets_lost_blackhole} %{NUMBER:packets_lost_mtu_exceeded} %{NUMBER:packets_lost_ttl_expired} %{DATA:tcp_flags} %{DATA:region} %{DATA:flow_direction} %{DATA:pkt_src_aws_service} %{GREEDYDATA:pkt_dst_aws_service}"
        ]
      }
      overwrite => ["version", "resource_type", "account_id", "tgw_id", "tgw_attachment_id", "tgw_src_vpc_account_id", "tgw_dst_vpc_account_id", "tgw_src_vpc_id", "tgw_dst_vpc_id", "tgw_src_subnet_id", "tgw_dst_subnet_id", "tgw_src_eni", "tgw_dst_eni", "tgw_src_az_id", "tgw_dst_az_id", "tgw_pair_attachment_id", "srcaddr", "dstaddr", "srcport", "dstport", "protocol", "packets", "bytes", "start_time", "end_time", "log_status", "type", "packets_lost_no_route", "packets_lost_blackhole", "packets_lost_mtu_exceeded", "packets_lost_ttl_expired", "tcp_flags", "region", "flow_direction", "pkt_src_aws_service", "pkt_dst_aws_service"]
      on_error => "grok_match_error"
    }
  }
  if [not_json] and [grok_match_error] {
    drop {
      tag => "TAG_MALFORMED_MESSAGE"
    }
  }
  if [version] != "" {
    mutate {
      replace => {
        "metadata.product_version" => "%{version}"
      }
      on_error => "version_invalid"
    }
  }
  if [resource_type] != "" {
    mutate {
      replace => {
        "principal.resource.resource_subtype" => "%{resource_type}"
      }
      on_error => "resource_type_invalid"
    }
  }
  if [account_id] != "" {
    mutate {
      replace => {
        "metadata.product_log_id" => "%{account_id}"
      }
      on_error => "account_id_invalid"
    }
  }
  if [tgw_id] != "" {
    mutate {
      replace => {
        "tgw_id_label.key" => "tgw_id"
        "tgw_id_label.value.string_value" => "%{tgw_id}"
      }
      on_error => "tgw_id_label_invalid"
    }
    if ![tgw_id_label_invalid] {
      mutate {
        merge => {
          "additional.fields" => "tgw_id_label"
        }
        on_error => "tgw_id_label_merge_error"
      }
    }
  }
  if [tgw_attachment_id] != "" {
    mutate {
      replace => {
        "tgw_attachment_id_label.key" => "tgw_attachment_id"
        "tgw_attachment_id_label.value.string_value" => "%{tgw_attachment_id}"
      }
      on_error => "tgw_attachment_id_label_invalid"
    }
    if ![tgw_attachment_id_label_invalid] {
      mutate {
        merge => {
          "additional.fields" => "tgw_attachment_id_label"
        }
        on_error => "tgw_attachment_id_label_merge_error"
      }
    }
  }
  if [tgw_src_vpc_account_id] != "" {
    mutate {
      replace => {
        "principal.user.userid" => "%{tgw_src_vpc_account_id}"
        "principal_user_present" => "true"
      }
      on_error => "tgw_src_vpc_account_id_invalid"
    }
  }
  if [tgw_dst_vpc_account_id] != "" {
    mutate {
      replace => {
        "target.user.userid" => "%{tgw_dst_vpc_account_id}"
      }
      on_error => "tgw_dst_vpc_account_id_invalid"
    }
  }
  if [tgw_src_vpc_id] != "" {
    mutate {
      replace => {
        "principal.resource.product_object_id" => "%{tgw_src_vpc_id}"
      }
      on_error => "tgw_src_vpc_id_invalid"
    }
  }
  if [tgw_dst_vpc_id] != "" {
    mutate {
      replace => {
        "target.resource.product_object_id" => "%{tgw_dst_vpc_id}"
      }
      on_error => "tgw_dst_vpc_id_invalid"
    }
  }
  if [tgw_src_subnet_id] != "" {
    mutate {
      replace => {
        "principal.resource.name" => "%{tgw_src_subnet_id}"
      }
      on_error => "tgw_src_subnet_id_invalid"
    }
  }
  if [tgw_dst_subnet_id] != "" {
    mutate {
      replace => {
        "target.resource.name" => "%{tgw_dst_subnet_id}"
      }
      on_error => "tgw_dst_subnet_id_invalid"
    }
  }
  if [tgw_src_eni] != "" {
    mutate {
      replace => {
        "principal.asset.asset_id" => "ASSET_ID: %{tgw_src_eni}"
      }
      on_error => "tgw_src_eni_label_invalid"
    }
  }
  if [tgw_dst_eni] != "" {
    mutate {
      replace => {
        "target.asset.asset_id" => "ASSET_ID: %{tgw_dst_eni}"
      }
      on_error => "tgw_dst_eni_label_invalid"
    }
  }
  if [tgw_src_az_id] != "" and [region] != "" {
    mutate {
      replace => {
        "tgw_src_az_id_label.key" => "tgw_src_az_id"
        "tgw_src_az_id_label.value" => "%{tgw_src_az_id}"
      }
      on_error => "tgw_src_az_id_label_invalid"
    }
    if ![tgw_src_az_id_label_invalid] {
      mutate {
        merge => {
          "principal.resource.attribute.labels" => "tgw_src_az_id_label"
        }
        on_error => "tgw_src_az_id_label_merge_error"
      }
    }
  } else if [tgw_src_az_id] != "" {
    mutate {
      replace => {
        "principal.location.country_or_region" => "%{tgw_src_az_id}"
      }
      on_error => "tgw_src_az_id_label_invalid_country_or_region"
    }
  }
  if [tgw_dst_az_id] != "" {
    mutate {
      replace => {
        "target.location.country_or_region" => "%{tgw_dst_az_id}"
      }
      on_error => "tgw_dst_az_id_invalid"
    }
    if ![tgw_dst_az_id_invalid] {
      mutate {
        replace => {
          "target_resource_present" => "true"
        }
      }
    }
  }
  if [srcaddr] != "" {
    mutate {
      merge => {
        "principal.ip" => "srcaddr"
        "principal.asset.ip" => "srcaddr"
      }
      on_error => "srcaddr_invalid_ip"
    }
    if ![srcaddr_invalid_ip] {
      mutate {
        replace => {
          "has_principal" => "true"
        }
        on_error => "has_principal_invalid"
      }
    }
  }
  if [dstaddr] != "" {
    mutate {
      merge => {
        "target.ip" => "dstaddr"
        "target.asset.ip" => "dstaddr"
      }
      on_error => "dstaddr_invalid_ip"
    }
    if ![dstaddr_invalid_ip] {
      mutate {
        replace => {
          "has_target" => "true"
        }
        on_error => "has_target_invalid"
      }
    }
  }
  if [srcport] != "" {
    mutate {
      replace => {
        "principal.port" => "%{srcport}"
      }
      on_error => "srcport_invalid_port"
    }
    mutate {
      convert => {
        "principal.port" => "integer"
      }
      on_error => "srcport_invalid_uinteger"
    }
  }
  if [dstport] != "" {
    mutate {
      replace => {
        "target.port" => "%{dstport}"
      }
      on_error => "dstport_invalid_port"
    }
    mutate {
      convert => {
        "target.port" => "integer"
      }
      on_error => "dstport_invalid_uinteger"
    }
  }
  mutate {
    convert => {
      "protocol" => "string"
    }
    on_error => "protocol_invalid_string"
  }
  if [protocol] != "" {
    mutate {
      replace => {
        "protocol_label.key" => "protocolnumber"
        "protocol_label.value" => "%{protocol}"
      }
      on_error => "protocol_label_invalid"
    }
    if ![protocol_label_invalid] {
      mutate {
        merge => {
          "security_result.detection_fields" => "protocol_label"
        }
        on_error => "protocol_label_merge_error"
      }
    }
  }
  if [start_time] != "" {
    mutate {
      replace => {
        "start_time_label.key" => "starttime"
        "start_time_label.value.string_value" => "%{start_time}"
      }
      on_error => "start_time_label_invalid"
    }
    if ![start_time_label_invalid] {
      mutate {
        merge => {
          "additional.fields" => "start_time_label"
        }
        on_error => "start_time_label_merge_error"
      }
    }
  }
  if [end_time] != "" {
    date {
      match => ["end_time", "UNIX"]
      target => "metadata.event_timestamp"
      on_error => "end_time_invalid"
    }
  }
  if [packets] != "" {
    mutate {
      replace => {
        "network.sent_packets" => "%{packets}"
      }
      on_error => "packets_invalid_packets"
    }
    mutate {
      convert => {
        "network.sent_packets" => "integer"
      }
      on_error => "packets_invalid_uinteger"
    }
  }
  if [bytes] != "" {
    mutate {
      replace => {
        "network.sent_bytes" => "%{bytes}"
      }
      on_error => "bytes_invalid_bytes"
    }
    mutate {
      convert => {
        "network.sent_bytes" => "uinteger"
      }
      on_error => "bytes_invalid_uinteger"
    }
  }
  if [log_status] != "" {
    if [log_status] =~ "(?i)OK" {
      mutate {
        replace => {
         "security_result_action" => "ALLOW"
        }
        on_error => "log_status_invalid"
      }
    }
    mutate {
      merge => {
        "security_result.action" => "security_result_action"
      }
      on_error => "log_status_invalid"
    }
  }
  if [type] not in ["-", "null", ""] {
    mutate {
      replace => {
        "type_label.key" => "ip_version"
        "type_label.value.string_value" => "%{type}"
      }
      on_error => "type_label_invalid"
    }
    if ![type_label_invalid] {
      mutate {
        merge => {
          "additional.fields" => "type_label"
        }
        on_error => "type_label_merge_error"
      }
    }
  }
  mutate {
    convert => {
      "packets_lost_no_route" => "string"
    }
    on_error => "packets_lost_no_route_invalid_string"
  }
  if [packets_lost_no_route] != "" {
    mutate {
      replace => {
        "packets_lost_no_route_label.key" => "packets_lostnoroute"
        "packets_lost_no_route_label.value.string_value" => "%{packets_lost_no_route}"
      }
      on_error => "packets_lost_no_route_label_invalid"
    }
    if ![packets_lost_no_route_label_invalid] {
      mutate {
        merge => {
          "additional.fields" => "packets_lost_no_route_label"
        }
        on_error => "packets_lost_no_route_label_merge_error"
      }
    }
  }
  mutate {
    convert => {
      "packets_lost_blackhole" => "string"
    }
    on_error => "packets_lost_blackhole_invalid_string"
  }
  if [packets_lost_blackhole] != "" {
    mutate {
      replace => {
        "packets_lost_blackhole_label.key" => "packets_lostblackhole"
        "packets_lost_blackhole_label.value.string_value" => "%{packets_lost_blackhole}"
      }
      on_error => "packets_lost_blackhole_label_invalid"
    }
    if ![packets_lost_blackhole_label_invalid] {
      mutate {
        merge => {
          "additional.fields" => "packets_lost_blackhole_label"
        }
        on_error => "packets_lost_blackhole_label_merge_error"
      }
    }
  }
  mutate {
    convert => {
      "packets_lost_mtu_exceeded" => "string"
    }
    on_error => "packets_lost_mtu_exceeded_invalid_string"
  }
  if [packets_lost_mtu_exceeded] != "" {
    mutate {
      replace => {
        "packets_lost_mtu_exceeded_label.key" => "packets_lostmtuexceeded"
        "packets_lost_mtu_exceeded_label.value.string_value" => "%{packets_lost_mtu_exceeded}"
      }
      on_error => "packets_lost_mtu_exceeded_label_invalid"
    }
    if ![packets_lost_mtu_exceeded_label_invalid] {
      mutate {
        merge => {
          "additional.fields" => "packets_lost_mtu_exceeded_label"
        }
        on_error => "packets_lost_mtu_exceeded_label_merge_error"
      }
    }
  }
  mutate {
    convert => {
      "packets_lost_ttl_expired" => "string"
    }
    on_error => "packets_lost_ttl_expired_invalid_string"
  }
  if [packets_lost_ttl_expired] != "" {
    mutate {
      replace => {
        "packets_lost_ttl_expired_label.key" => "packets_lostttl"
        "packets_lost_ttl_expired_label.value.string_value" => "%{packets_lost_ttl_expired}"
      }
      on_error => "packets_lost_ttl_expired_label_invalid"
    }
    if ![packets_lost_ttl_expired_label_invalid] {
      mutate {
        merge => {
          "additional.fields" => "packets_lost_ttl_expired_label"
        }
        on_error => "packets_lost_ttl_expired_label_merge_error"
      }
    }
  }
  mutate {
    convert => {
      "tcp_flags" => "string"
    }
    on_error => "tcp_flags_invalid_string"
  }
  if [tcp_flags] not in ["-", "null", ""] {
    mutate {
      replace => {
        "tcp_flags_label.key" => "tcpflags"
        "tcp_flags_label.value.string_value" => "%{tcp_flags}"
      }
      on_error => "tcp_flags_label_invalid"
    }
    if ![tcp_flags_label_invalid] {
      mutate {
        merge => {
          "additional.fields" => "tcp_flags_label"
        }
        on_error => "tcp_flags_label_merge_error"
      }
    }
  }
  if [flow_direction] != "" {
    if [flow_direction] =~ "(?i)ingress" {
      mutate {
        replace => {
          "network.direction" => "INBOUND"
        }
        on_error => "flow_direction_invalid"
      }
    }
    else if [flow_direction] =~ "(?i)egress" {
      mutate {
        replace => {
          "network.direction" => "OUTBOUND"
        }
        on_error => "flow_direction_invalid"
      }
    }
  }
  if [pkt_src_aws_service] not in ["-", "null", ""] {
    mutate {
      replace => {
        "pkt_src_aws_service_label.key" => "pkt_srcawsservice"
        "pkt_src_aws_service_label.value" => "%{pkt_src_aws_service}"
      }
      on_error => "pkt_src_aws_service_label_invalid"
    }
    if ![pkt_src_aws_service_label_invalid] {
      mutate {
        merge => {
          "principal.resource.attribute.labels" => "pkt_src_aws_service_label"
        }
        on_error => "pkt_src_aws_service_label_merge_error"
      }
    }
  }
  if [pkt_dst_aws_service] not in ["-", "null", ""] {
    mutate {
      replace => {
        "pkt_dst_aws_service_label.key" => "pkt_dstaws_service"
        "pkt_dst_aws_service_label.value" => "%{pkt_dst_aws_service}"
      }
      on_error => "pkt_dst_aws_service_label_invalid"
    }
    if ![pkt_dst_aws_service_label_invalid] {
      mutate {
        merge => {
          "target.resource.attribute.labels" => "pkt_dst_aws_service_label"
        }
        on_error => "pkt_dst_aws_service_label_merge_error"
      }
    }
  }
  if [tgw_pair_attachment_id] != "" {
    mutate {
      replace => {
        "tgw_pair_attachment_id_label.key" => "tgw_pair_attachment_id"
        "tgw_pair_attachment_id_label.value.string_value" => "%{tgw_pair_attachment_id}"
      }
      on_error => "tgw_pair_attachment_id_label_invalid"
    }
    if ![tgw_pair_attachment_id_label_invalid] {
      mutate {
        merge => {
          "additional.fields" => "tgw_pair_attachment_id_label"
        }
        on_error => "tgw_pair_attachment_id_label_merge_error"
      }
    }
  }
  if [region] != "" {
    mutate {
      replace => {
        "principal.location.country_or_region" => "%{region}"
      }
      on_error => "region_invalid"
    }
  }
  mutate {
    replace => {
      "metadata.vendor_name" => "AWS"
      "metadata.product_name" => "AWS VPC Transit Gateway"
    }
  }

  if [event_type] == "" {
    if [has_principal] == "true" and [has_target] == "true" {
      mutate {
        replace => {
          "event_type" => "NETWORK_CONNECTION"
        }
      }
    }
    else if [has_principal] == "true" {
      mutate {
        replace => {
          "event_type" => "STATUS_UPDATE"
        }
      }
    }
    else if [principal_user_present] == "true" and [target_resource_present] == "true" {
      mutate {
        replace => {
          "event_type" => "USER_RESOURCE_ACCESS"
        }
      }
    }
    else {
      mutate {
        replace => {
          "event_type" => "GENERIC_EVENT"
        }
      }
    }
  }

  if [event_type] != "" {
    mutate {
      replace => {
        "metadata.event_type" => "%{event_type}"
      }
      on_error => "event_type_value_invalid"
    }
  }

  if [metadata] != "" {
    mutate {
      rename => {
        "metadata" => "event.idm.read_only_udm.metadata"
      }
    }
  }
  if [principal] != "" {
    mutate {
      rename => {
        "principal" => "event.idm.read_only_udm.principal"
      }
    }
  }
  if [target] != "" {
    mutate {
      rename => {
        "target" => "event.idm.read_only_udm.target"
      }
    }
  }
  if [additional] != "" {
    mutate {
      rename => {
        "additional" => "event.idm.read_only_udm.additional"
      }
    }
  }
  if [security_result] != "" {
    mutate {
      merge => {
        "event.idm.read_only_udm.security_result" => "security_result"
      }
      on_error => "security_result_empty"
    }
  }
  if [network] != "" {
    mutate {
      rename => {
        "network" => "event.idm.read_only_udm.network"
      }
    }
  }

  mutate {
    merge => {
      "@output" => "event"
    }
  }
}
