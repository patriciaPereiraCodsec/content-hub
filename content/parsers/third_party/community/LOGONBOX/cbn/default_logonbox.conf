# Product: LOGONBOX
# Category: Authentication
# Supported Format: SYSLOG + KV
# Reference: N/A
# Last Updated: 2024-02-05
# Copyright 2024 Chronicle LLC

filter {
  mutate {
    replace => {
      # fields
      "ts" => ""
      "hostname" => ""
      "product_event_type" => ""
      "kv_data" => ""
      "attr_principalRealm" => ""
      "mail" => ""
      "ImmutableID" => ""
      "attr_associatedPrincipals" => ""
      "sAMAccountName" => ""
      "attr_ipAddress" => ""
      "displayName" => ""
      "givenName" => ""
      "attr_local" => ""
      "attr_uuid" => ""
      "cn" => ""
      "attr_principalDesc" => ""
      "description" => ""
      "attr_principalName" => ""
      "attr_selfCreated" => ""
      "attr_user" => ""
      "attr_group" => ""
      "sn" => ""
      "msDS-PrincipalName" => ""
      "attr_realmType" => ""
      "userPrincipalName" => ""
      "ou" => ""
      "attr_unassignedRoles" => ""
      "attr_assignedRoles" => ""
      "attr_resourceId" => ""
      "attr_lastModified" => ""
      "attr_resourceName" => ""
      "attr_oldResourceName" => ""
      "attr_created" => ""
      "attr_roles" => ""
      "attr_resumedPrincipalName" => ""
      "attr_resumedPrincipalRealm" => ""
      "attr_resumedPrincipal" => ""
      "attr_administrative" => ""
      "attr_disabledPrincipal" => ""
      "attr_disabledPrincipalName" => ""
      "attr_disabledRealm" => ""
      "attr_os" => ""
      "attr_osVersion" => ""
      "attr_userAgent" => ""
      "attr_transient" => ""
      "attr_userAgentVersion" => ""
      "attr_question" => ""
      "dns_question" => ""
      "attr_answer" => ""
      "dns_answer" => ""
      "attr_hint" => ""
      "attr_scheme" => ""
      "attr_module" => ""
      "reconcile" => ""
      "users" => ""
      "groups" => ""
      "createUser" => ""
      "user" => ""
      "mobile" => ""
      "authy.code.length" => ""
      "authy.step.size" => ""
      "authy.window.length" => ""
      "msauthenticator.code.length" => ""
      "msauthenticator.step.size" => ""
      "msauthenticator.window.length" => ""
      "googleUser.code.length" => ""
      "googleUser.step.size" => ""
      "googleUser.window.length" => ""
      "desc" => ""
      "event_type" => ""
      "principal_machine_id_present" => "false"
      "principal_user_present" => "false"
      "principal_userid_present" => "false"
      "target_machine_id_present" => "false"
      "target_user_present" => "false"
      "target_userid_present" => "false"
      "target_present" => "false"
      "network_dns_present" => "false"
      "parsed_user_agent" => ""
      # udm noun
      "metadata" => ""
      "principal" => ""
      "target" => ""
      "network" => ""
      "additional" => ""
      "security_result" => ""
    }
  }

  # Grok pattern to process syslog message
  grok {
    match => {
       "message" => [
          "<%{INT}>%{SYSLOGTIMESTAMP:ts} %{DATA:hostname} %{DATA}: %{DATA:product_event_type}\{%{GREEDYDATA:kv_data}\}%{GREEDYDATA}",
          "<%{INT}>%{SYSLOGTIMESTAMP:ts} %{DATA:hostname} %{DATA}: %{DATA:product_event_type}\{%{GREEDYDATA:kv_data}%{GREEDYDATA}",
          "(?P<product_event_type>GROUP) %{DATA:desc}, %{GREEDYDATA:kv_data}\}%{GREEDYDATA}",
          "%{DATA:attr_associatedPrincipals}, %{GREEDYDATA:kv_data}\}%{GREEDYDATA}"
        ]
    }
    overwrite => ["ts", "hostname", "product_event_type", "attr_associatedPrincipals", "desc", "kv_data"]
    on_error  => "header_grok_match_failed"
  }

  if [header_grok_match_failed] {
    drop {
      tag => "TAG_MALFORMED_MESSAGE"
    }
  }

  if [ts] != "" {
    date {
      match => ["ts", "ISO8601", "MMM  d HH:mm:ss"]
      rebase => true
      on_error => "date_match_failed"
    }
  }

  if [hostname] != "" {
    mutate {
      replace => {
        "principal.hostname" => "%{hostname}"
        "principal.asset.hostname" => "%{hostname}"
        "principal_machine_id_present" => "true"
      }
      on_error => "hostname_invalid"
    }
  }

  if [product_event_type] != "" {
    mutate {
      replace => {
        "metadata.product_event_type" => "%{product_event_type}"
      }
      on_error => "product_event_type_invalid"
    }
  }

  if [kv_data] != "" {
    mutate {
      gsub => ["kv_data", "attr.", "attr_"]
    }
    mutate {
      gsub => ["kv_data", "=, ", "= , "]
    }
    mutate {
      gsub => ["kv_data", "Sun\, |Mon\, |Tue\, |Wed\, |Thu\, |Fri\, |Sat\, ", ""]
    }
    mutate {
      gsub => ["kv_data", "=([\\w-+=\\s.\\\\@:?*]+), ", "=$1#"]
    }
    mutate {
      gsub => ["kv_data", "null", " "]
    }
    kv {
      source => "kv_data"
      field_split => "#"
      value_split => "="
      on_error => "kv_data_invalid"
    }
  }

  # global mapping
  if [mail] != "" and [mail] =~ "^.+@.+$" {
    mutate {
      merge => {
        "principal.user.email_addresses" => "mail"
      }
      on_error => "mail_merge_failed"
    }
    if ![mail_merge_failed] {
      mutate {
        replace => {
          "principal_userid_present" => "true"
          "principal_user_present" => "true"
        }
      }
    }
  }

  if [attr_principalName] != "" {
    mutate {
      replace => {
        "principal.user.userid" => "%{attr_principalName}"
        "principal_user_present" => "true"
        "principal_userid_present" => "true"
      }
      on_error => "attr_principalName_invalid"
    }
  }

  if [attr_ipAddress] != "" {
    mutate {
      merge => {
        "principal.ip" => "attr_ipAddress"
        "principal.asset.ip" => "attr_ipAddress"
      }
      on_error => "attr_ipAddress_invalid"
    }
    if ![attr_ipAddress_invalid] {
      mutate {
        replace => {
          "principal_machine_id_present" => "true"
        }
      }
    }
  }

  if [displayName] != "" {
    mutate {
      replace => {
        "target.user.user_display_name" => "%{displayName}"
        "target_user_present" => "true"
      }
      on_error => "user_display_name_invalid"
    }
  }

  if [givenName] != "" {
    mutate {
      replace => {
        "target.user.first_name" => "%{givenName}"
      }
      on_error => "givenName_invalid"
    }
  }

  if [sn] != "" {
    mutate {
      replace => {
        "target.user.last_name" => "%{sn}"
      }
      on_error => "sn_invalid"
    }
  }

  if [attr_resourceId] != "" {
    mutate {
      replace => {
        "principal.resource.product_object_id" => "%{attr_resourceId}"
      }
      on_error => "attr_resourceId_invalid"
    }
  }

  if [attr_lastModified] != "" {
    date {
      match => ["attr_lastModified", "ISO8601", "d MMM yyyy HH:mm:ss"]
      target => "target.resource.attribute.last_update_time"
      on_error => "date_match_failed_2"
    }
  }

  if [attr_created] != "" {
    date {
      match => ["attr_created", "ISO8601", "d MMM yyyy HH:mm:ss"]
      target => "target.resource.attribute.creation_time"
      on_error => "date_match_failed_3"
    }
  }

  if [attr_resourceName] != "" {
    mutate {
      replace => {
        "principal.resource.name" => "%{attr_resourceName}"
      }
      on_error => "attr_resourceName_invalid"
    }
  }

  mutate {
    uppercase => ["attr_os"]
  }
  if [attr_os] =~ "(?i)LINUX|MAC|WINDOWS" {
    mutate {
      replace => {
        "principal.platform" => "%{attr_os}"
      }
      on_error => "attr_os_invalid"
    }
  }
  if [attr_osVersion] != "" and [attr_osVersion] !~ "(?i)unknown" {
    mutate {
      replace => {
        "principal.platform_version" => "%{attr_osVersion}"
      }
      on_error => "attr_osVersion_invalid"
    }
  }

  if [attr_userAgent] != "" and [attr_userAgentVersion] != "" {
    mutate {
      replace => {
        "network.http.user_agent" => "%{attr_userAgent} %{attr_userAgentVersion}"
        "parsed_user_agent" => "%{attr_userAgent} %{attr_userAgentVersion}"
      }
      on_error => "source_field_invalid"
    }
  }
  else if [attr_userAgent] != "" {
    mutate {
      replace => {
        "network.http.user_agent" => "%{attr_userAgent}"
        "parsed_user_agent" => "%{attr_userAgent} %{attr_userAgentVersion}"
      }
      on_error => "attr_userAgent_invalid"
    }
  }

  if [parsed_user_agent] != "" {
    mutate {
     convert => {
       "parsed_user_agent" => "parseduseragent"
     }
     on_error => "parsed_user_agent_conversion_failed"
    }
    mutate {
      rename => {
        "parsed_user_agent" => "network.http.parsed_user_agent"
      }
      on_error => "parsed_user_agent_invalid"
    }
  }

  if [attr_question] != "" {
    mutate {
      replace => {
        "dns_question.name" => "%{attr_question}"
        "network_dns_present" => "true"
      }
      on_error => "attr_question_invalid"
    }
  }

  if [attr_answer] != "" {
    mutate {
      replace => {
        "dns_answer.name" => "%{attr_answer}"
        "network_dns_present" => "true"
      }
      on_error => "attr_answer_invalid"
    }
  }

  if [dns_question] != "" {
    mutate {
      merge => {
        "network.dns.questions" => "dns_question"
      }
      on_error => "dns_question_merge_failed"
    }
  }

  if [dns_answer] != "" {
    mutate {
      merge => {
        "network.dns.answers" => "dns_answer"
      }
      on_error => "dns_answer_merge_failed"
    }
  }

  if [attr_scheme] != "" {
    mutate {
      replace => {
        "principal.user.role_name" => "%{attr_scheme}"
      }
      on_error => "attr_scheme_invalid"
    }
  }

  # additional udm mapping
  if [attr_principalRealm] != "" {
    mutate {
      replace => {
        "attr_principal_realm_label.key" => "attr_principal_realm"
        "attr_principal_realm_label.value" => "%{attr_principalRealm}"
      }
      on_error => "attr_principalRealm_invalid"
    }
    if ![attr_principalRealm_invalid] {
      mutate {
        merge => {
          "principal.resource.attribute.labels" => "attr_principal_realm_label"
        }
        on_error => "attr_principal_realm_label_merge_failed"
      }
    }
  }

  if [attr_unassignedRoles] != "" {
    mutate {
      replace => {
        "attr_unassignedRoles_label.key" => "attr_unassignedRoles"
        "attr_unassignedRoles_label.value" => "%{attr_unassignedRoles}"
      }
      on_error => "attr_unassignedRoles_invalid"
    }
    if ![attr_unassignedRoles_invalid] {
      mutate {
        merge => {
          "principal.resource.attribute.labels" => "attr_unassignedRoles_label"
        }
        on_error => "attr_unassignedRoles_label_merge_failed"
      }
    }
  }

  if [attr_assignedRoles] != "" {
    mutate {
      replace => {
        "attr_assignedRoles_label.key" => "attr_assignedRoles"
        "attr_assignedRoles_label.value" => "%{attr_assignedRoles}"
      }
      on_error => "attr_assignedRoles_invalid"
    }
    if ![attr_assignedRoles_invalid] {
      mutate {
        merge => {
          "principal.resource.attribute.labels" => "attr_assignedRoles_label"
        }
        on_error => "attr_assignedRoles_label_merge_failed"
      }
    }
  }

  if [attr_oldResourceName] != "" {
    mutate {
      replace => {
        "attr_oldResourceName_label.key" => "attr_oldResourceName"
        "attr_oldResourceName_label.value" => "%{attr_oldResourceName}"
      }
      on_error => "attr_oldResourceName_invalid"
    }
    if ![attr_oldResourceName_invalid] {
      mutate {
        merge => {
          "principal.resource.attribute.labels" => "attr_oldResourceName_label"
        }
        on_error => "attr_oldResourceName_label_merge_failed"
      }
    }
  }

  if [attr_roles] != "" {
    mutate {
      replace => {
        "attr_roles_label.key" => "attr_roles"
        "attr_roles_label.value" => "%{attr_roles}"
      }
      on_error => "attr_roles_invalid"
    }
    if ![attr_roles_invalid] {
      mutate {
        merge => {
          "principal.resource.attribute.labels" => "attr_roles_label"
        }
        on_error => "attr_roles_label_merge_failed"
      }
    }
  }

  if [attr_resumedPrincipalName] != "" {
    mutate {
      replace => {
        "attr_resumedPrincipalName_label.key" => "attr_resumedPrincipalName"
        "attr_resumedPrincipalName_label.value" => "%{attr_resumedPrincipalName}"
      }
      on_error => "attr_resumedPrincipalName_invalid"
    }
    if ![attr_resumedPrincipalName_invalid] {
      mutate {
        merge => {
          "principal.resource.attribute.labels" => "attr_resumedPrincipalName_label"
        }
        on_error => "attr_resumedPrincipalName_label_merge_failed"
      }
    }
  }

  if [attr_resumedPrincipalRealm] != "" {
    mutate {
      replace => {
        "attr_resumedPrincipalRealm_label.key" => "attr_resumedPrincipalRealm"
        "attr_resumedPrincipalRealm_label.value" => "%{attr_resumedPrincipalRealm}"
      }
      on_error => "attr_resumedPrincipalRealm_invalid"
    }
    if ![attr_resumedPrincipalRealm_invalid] {
      mutate {
        merge => {
          "principal.resource.attribute.labels" => "attr_resumedPrincipalRealm_label"
        }
        on_error => "attr_resumedPrincipalRealm_label_merge_failed"
      }
    }
  }

  if [attr_resumedPrincipal] != "" {
    mutate {
      replace => {
        "attr_resumedPrincipal_label.key" => "attr_resumedPrincipal"
        "attr_resumedPrincipal_label.value" => "%{attr_resumedPrincipal}"
      }
      on_error => "attr_resumedPrincipal_invalid"
    }
    if ![attr_resumedPrincipal_invalid] {
      mutate {
        merge => {
          "principal.resource.attribute.labels" => "attr_resumedPrincipal_label"
        }
        on_error => "attr_resumedPrincipal_label_merge_failed"
      }
    }
  }

  if [attr_module] != "" {
    mutate {
      replace => {
        "attr_module_label.key" => "attr_module"
        "attr_module_label.value" => "%{attr_module}"
      }
      on_error => "attr_module_invalid"
    }
    if ![attr_module_invalid] {
      mutate {
        merge => {
          "principal.resource.attribute.labels" => "attr_module_label"
        }
        on_error => "attr_module_label_merge_failed"
      }
    }
  }

  if [cn] != "" {
    mutate {
      replace => {
        "full_name_label.key" => "Full Name"
        "full_name_label.value" => "%{cn}"
      }
      on_error => "cn_invalid"
    }
    if ![cn_invalid] {
      mutate {
        merge => {
          "target.resource.attribute.labels" => "full_name_label"
        }
        on_error => "full_name_label_merge_failed"
      }
    }
  }

  if [attr_disabledRealm] != "" {
    mutate {
      replace => {
        "attr_disabledRealm_label.key" => "attr_disabledRealm"
        "attr_disabledRealm_label.value" => "%{attr_disabledRealm}"
      }
      on_error => "attr_disabledRealm_invalid"
    }
    if ![attr_disabledRealm_invalid] {
      mutate {
        merge => {
          "target.resource.attribute.labels" => "attr_disabledRealm_label"
        }
        on_error => "attr_disabledRealm_label_merge_failed"
      }
    }
  }

  if [attr_associatedPrincipals] != "" {
    mutate {
      replace => {
        "attr_associatedPrincipals_label.key" => "attr_associatedPrincipals"
        "attr_associatedPrincipals_label.value.string_value" => "%{attr_associatedPrincipals}"
      }
      on_error => "attr_associatedPrincipals_invalid"
    }
    if ![attr_associatedPrincipals_invalid] {
      mutate {
        merge => {
          "additional.fields" => "attr_associatedPrincipals_label"
        }
        on_error => "attr_associatedPrincipals_label_merge_failed"
      }
    }
  }

  if [sAMAccountName] != "" {
    mutate {
      replace => {
        "sAMAccountName_label.key" => "sAMAccountName"
        "sAMAccountName_label.value.string_value" => "%{sAMAccountName}"
      }
      on_error => "sAMAccountName_invalid"
    }
    if ![sAMAccountName_invalid] {
      mutate {
        merge => {
          "additional.fields" => "sAMAccountName_label"
        }
        on_error => "sAMAccountName_label_merge_failed"
      }
    }
  }

  if [attr_local] != "" {
    mutate {
      replace => {
        "attr_local_label.key" => "attr_local"
        "attr_local_label.value.string_value" => "%{attr_local}"
      }
      on_error => "attr_local_invalid"
    }
    if ![attr_local_invalid] {
      mutate {
        merge => {
          "additional.fields" => "attr_local_label"
        }
        on_error => "attr_local_label_merge_failed"
      }
    }
  }

  if [msDS-PrincipalName] != "" {
    mutate {
      replace => {
        "msDS-PrincipalName_label.key" => "msDS-PrincipalName"
        "msDS-PrincipalName_label.value.string_value" => "%{msDS-PrincipalName}"
      }
      on_error => "msDS-PrincipalName_invalid"
    }
    if ![msDS-PrincipalName_invalid] {
      mutate {
        merge => {
          "additional.fields" => "msDS-PrincipalName_label"
        }
        on_error => "msDS-PrincipalName_label_merge_failed"
      }
    }
  }

  if [attr_realmType] != "" {
    mutate {
      replace => {
        "attr_realmType_label.key" => "attr_realmType"
        "attr_realmType_label.value.string_value" => "%{attr_realmType}"
      }
      on_error => "attr_realmType_invalid"
    }
    if ![attr_realmType_invalid] {
      mutate {
        merge => {
          "additional.fields" => "attr_realmType_label"
        }
        on_error => "attr_realmType_label_merge_failed"
      }
    }
  }

  if [attr_selfCreated] != "" {
    mutate {
      replace => {
        "attr_selfCreated_label.key" => "attr_selfCreated"
        "attr_selfCreated_label.value.string_value" => "%{attr_selfCreated}"
      }
      on_error => "attr_selfCreated_invalid"
    }
    if ![attr_selfCreated_invalid] {
      mutate {
        merge => {
          "additional.fields" => "attr_selfCreated_label"
        }
        on_error => "attr_selfCreated_label_merge_failed"
      }
    }
  }

  if [attr_administrative] != "" {
    mutate {
      replace => {
        "attr_administrative_label.key" => "attr_administrative"
        "attr_administrative_label.value.string_value" => "%{attr_administrative}"
      }
      on_error => "attr_administrative_invalid"
    }
    if ![attr_administrative_invalid] {
      mutate {
        merge => {
          "additional.fields" => "attr_administrative_label"
        }
        on_error => "attr_administrative_label_merge_failed"
      }
    }
  }

  # for loop
  if [reconcile] != "" {
    for key, value in reconcile map {
      mutate {
        replace => {
          "reconcile_map_label" => ""
        }
      }

      if [key] != "" {
        mutate {
          replace => {
            "reconcile_map_label.key" => "reconcile %{key}"
          }
          on_error => "reconcile_key_invalid"
        }
        if ![reconcile_key_invalid] and [value] != "" {
          mutate {
            replace => {
              "reconcile_map_label.value" => "%{value}"
            }
            on_error => "reconcile_value_invalid"
          }
          if ![reconcile_value_invalid] {
            mutate {
              merge => {
                "principal.resource.attribute.labels" => "reconcile_map_label"
              }
              on_error => "reconcile_map_label_merge_failed"
            }
          }
        }
      }
    }
  }

  if [users] != "" {
    for key, value in users map {
      mutate {
        replace => {
          "users_map_label" => ""
        }
      }

      if [key] != "" {
        mutate {
          replace => {
            "users_map_label.key" => "users %{key}"
          }
          on_error => "users_key_invalid"
        }
        if ![users_key_invalid] and [value] != "" {
          mutate {
            replace => {
              "users_map_label.value" => "%{value}"
            }
            on_error => "users_value_invalid"
          }
          if ![users_value_invalid] {
            mutate {
              merge => {
                "principal.resource.attribute.labels" => "users_map_label"
              }
              on_error => "users_map_label_merge_failed"
            }
          }
        }
      }
    }
  }

  if [groups] != "" {
    for key, value in groups map {
      mutate {
        replace => {
          "groups_map_label" => ""
        }
      }

      if [key] != "" {
        mutate {
          replace => {
            "groups_map_label.key" => "groups %{key}"
          }
          on_error => "groups_key_invalid"
        }
        if ![groups_key_invalid] and [value] != "" {
          mutate {
            replace => {
              "groups_map_label.value" => "%{value}"
            }
            on_error => "groups_value_invalid"
          }
          if ![groups_value_invalid] {
            mutate {
              merge => {
                "principal.resource.attribute.labels" => "groups_map_label"
              }
              on_error => "groups_map_label_merge_failed"
            }
          }
        }
      }
    }
  }

  if [createUser] != "" {
    for key, value in createUser map {
      mutate {
        replace => {
          "createUser_map_label" => ""
        }
      }

      if [key] != "" {
        mutate {
          replace => {
            "createUser_map_label.key" => "createUser %{key}"
          }
          on_error => "createUser_key_invalid"
        }
        if ![createUser_key_invalid] and [value] != "" {
          mutate {
            replace => {
              "createUser_map_label.value" => "%{value}"
            }
            on_error => "createUser_value_invalid"
          }
          if ![createUser_value_invalid] {
            mutate {
              merge => {
                "principal.resource.attribute.labels" => "createUser_map_label"
              }
              on_error => "createUser_map_label_merge_failed"
            }
          }
        }
      }
    }
  }

  if [user] != "" {
    for key, value in user map {
      mutate {
        replace => {
          "user_map_label" => ""
        }
      }

      if [key] != "" {
        mutate {
          replace => {
            "user_map_label.key" => "user %{key}"
          }
          on_error => "user_key_invalid"
        }
        if ![user_key_invalid] and [value] != "" {
          mutate {
            replace => {
              "user_map_label.value" => "%{value}"
            }
            on_error => "user_value_invalid"
          }
          if ![user_value_invalid] {
            mutate {
              merge => {
                "principal.resource.attribute.labels" => "user_map_label"
              }
              on_error => "user_map_label_merge_failed"
            }
          }
        }
      }
    }
  }

  if [mobile] != "" {
    for key, value in mobile map {
      mutate {
        replace => {
          "mobile_map_label" => ""
        }
      }

      if [key] != "" {
        mutate {
          replace => {
            "mobile_map_label.key" => "mobile %{key}"
          }
          on_error => "mobile_key_invalid"
        }
        if ![mobile_key_invalid] and [value] != "" {
          mutate {
            replace => {
              "mobile_map_label.value" => "%{value}"
            }
            on_error => "mobile_value_invalid"
          }
          if ![mobile_value_invalid] {
            mutate {
              merge => {
                "principal.resource.attribute.labels" => "mobile_map_label"
              }
              on_error => "mobile_map_label_merge_failed"
            }
          }
        }
      }
    }
  }

  # nested fields
  if [authy][code][length] != "" {
    mutate {
      replace => {
        "authy_code_length_label.key" => "authy_code_length"
        "authy_code_length_label.value" => "%{authy.code.length}"
      }
      on_error => "authy_code_length_invalid"
    }
    if ![authy_code_length_invalid] {
      mutate  {
        merge => {
          "security_result.detection_fields" => "authy_code_length_label"
        }
        on_error => "authy_code_length_label_merge_failed"
      }
    }
  }

  if [authy][window][length] != "" {
    mutate {
      replace => {
        "authy_window_length_label.key" => "authy_window_length"
        "authy_window_length_label.value" => "%{authy.window.length}"
      }
      on_error => "authy_window_length_invalid"
    }
    if ![authy_window_length_invalid] {
      mutate  {
        merge => {
          "security_result.detection_fields" => "authy_window_length_label"
        }
        on_error => "authy_window_length_label_merge_failed"
      }
    }
  }

  if [authy][step][size] != "" {
    mutate {
      replace => {
        "authy_step_size_label.key" => "authy_step_size"
        "authy_step_size_label.value" => "%{authy.step.size}"
      }
      on_error => "authy_step_size_invalid"
    }
    if ![authy_step_size_invalid] {
      mutate  {
        merge => {
          "security_result.detection_fields" => "authy_step_size_label"
        }
        on_error => "authy_step_size_label_merge_failed"
      }
    }
  }


  if [msauthenticator][code][length] != "" {
    mutate {
      replace => {
        "msauthenticator_code_length_label.key" => "msauthenticator_code_length"
        "msauthenticator_code_length_label.value" => "%{msauthenticator.code.length}"
      }
      on_error => "msauthenticator_code_length_invalid"
    }
    if ![msauthenticator_code_length_invalid] {
      mutate  {
        merge => {
          "security_result.detection_fields" => "msauthenticator_code_length_label"
        }
        on_error => "msauthenticator_code_length_label_merge_failed"
      }
    }
  }

  if [msauthenticator][window][length] != "" {
    mutate {
      replace => {
        "msauthenticator_window_length_label.key" => "msauthenticator_window_length"
        "msauthenticator_window_length_label.value" => "%{msauthenticator.window.length}"
      }
      on_error => "msauthenticator_window_length_invalid"
    }
    if ![msauthenticator_window_length_invalid] {
      mutate  {
        merge => {
          "security_result.detection_fields" => "msauthenticator_window_length_label"
        }
        on_error => "msauthenticator_window_length_label_merge_failed"
      }
    }
  }

  if [msauthenticator][step][size] != "" {
    mutate {
      replace => {
        "msauthenticator_step_size_label.key" => "msauthenticator_step_size"
        "msauthenticator_step_size_label.value" => "%{msauthenticator.step.size}"
      }
      on_error => "msauthenticator_step_size_invalid"
    }
    if ![msauthenticator_step_size_invalid] {
      mutate  {
        merge => {
          "security_result.detection_fields" => "msauthenticator_step_size_label"
        }
        on_error => "msauthenticator_step_size_label_merge_failed"
      }
    }
  }

  if [googleUser][code][length] != "" {
    mutate {
      replace => {
        "googleUser_code_length_label.key" => "googleUser_code_length"
        "googleUser_code_length_label.value" => "%{googleUser.code.length}"
      }
      on_error => "googleUser_code_length_invalid"
    }
    if ![googleUser_code_length_invalid] {
      mutate  {
        merge => {
          "security_result.detection_fields" => "googleUser_code_length_label"
        }
        on_error => "googleUser_code_length_label_merge_failed"
      }
    }
  }

  if [googleUser][window][length] != "" {
    mutate {
      replace => {
        "googleUser_window_length_label.key" => "googleUser_window_length"
        "googleUser_window_length_label.value" => "%{googleUser.window.length}"
      }
      on_error => "googleUser_window_length_invalid"
    }
    if ![googleUser_window_length_invalid] {
      mutate  {
        merge => {
          "security_result.detection_fields" => "googleUser_window_length_label"
        }
        on_error => "googleUser_window_length_label_merge_failed"
      }
    }
  }

  if [googleUser][step][size] != "" {
    mutate {
      replace => {
        "googleUser_step_size_label.key" => "googleUser_step_size"
        "googleUser_step_size_label.value" => "%{googleUser.step.size}"
      }
      on_error => "googleUser_step_size_invalid"
    }
    if ![googleUser_step_size_invalid] {
      mutate  {
        merge => {
          "security_result.detection_fields" => "googleUser_step_size_label"
        }
        on_error => "googleUser_step_size_label_merge_failed"
      }
    }
  }

  # product_event_type specific mapping : user_created|user_updated|setPassword|answer|accountUnlockNoSuspension
  if [product_event_type] =~ "(?i)userUpdated|userCreated|changePassword|setPassword|answer|accountUnlockNoSuspension" {
    if [ImmutableID] != "" {
      mutate {
        replace => {
          "principal.user.product_object_id" => "%{ImmutableID}"
        }
        on_error => "ImmutableID_invalid"
      }
    }

    if [attr_uuid] != "" {
      mutate {
        replace => {
          "target.user.product_object_id" => "%{attr_uuid}"
          "target_user_present" => "true"
        }
        on_error => "attr_uuid_invalid"
      }
    }

    if [userPrincipalName] != "" {
      mutate {
        replace => {
          "target.user.userid" => "%{userPrincipalName}"
          "target_user_present" => "true"
          "target_userid_present" => "true"
        }
        on_error => "userPrincipalName_invalid"
      }
    }
    else if [attr_user] != "" {
      mutate {
        replace => {
          "target.user.userid" => "%{attr_user}"
          "target_user_present" => "true"
          "target_userid_present" => "true"
        }
        on_error => "attr_user_invalid"
      }
    }

    if [description] != "" {
      mutate {
        replace => {
          "target.user.user_display_name" => "%{description}"
          "target_user_present" => "true"
        }
        on_error => "description_invalid"
      }
    }

    if [ou] != "" {
      mutate {
        merge => {
          "target.user.group_identifiers" => "ou"
        }
        on_error => "ou_merge_failed"
      }
    }
  }
  # product_event_type specific mapping : group_created
  else if [product_event_type] =~ "(?i)groupCreated|groupUpdated" or [attr_group] != "" {
    if [attr_group] != "" {
      mutate {
        replace => {
          "target.group.group_display_name" => "%{attr_group}"
          "target_present" => "true"
        }
        on_error => "attr_group_invalid"
      }
    }

    if [attr_uuid] != "" {
      mutate {
        replace => {
          "target.group.product_object_id" => "%{attr_uuid}"
          "target_present" => "true"
        }
        on_error => "attr_uuid_invalid"
      }
    }

    if [attr_associatedPrincipals] != "" {
      mutate {
        replace => {
          "target.user.userid" => "%{attr_associatedPrincipals}"
          "target_userid_present" => "true"
          "target_user_present" => "true"
        }
        on_error => "attr_associatedPrincipals_invalid_2"
      }
    }
  }
  else if [product_event_type] =~ "(?i)group" {
    if [attr_uuid] != "" {
      mutate {
        replace => {
          "target.user.product_object_id" => "%{attr_uuid}"
          "target_present" => "true"
        }
        on_error => "attr_uuid_invalid"
      }
    }
    if [attr_user] != "" {
      mutate {
        replace => {
          "target.user.userid" => "%{attr_user}"
          "target_userid_present" => "true"
          "target_user_present" => "true"
        }
        on_error => "attr_user_invalid_2"
      }
    }
  }
  # product_event_type specific mapping : accountDisabled
  else if [product_event_type] =~ "(?i)accountDisabled" {
    if [attr_disabledPrincipal] != "" {
      mutate {
        replace => {
          "target.user.product_object_id" => "%{attr_disabledPrincipal}"
          "target_user_present" => "true"
        }
        on_error => "attr_disabledPrincipal_invalid"
      }
    }

    if [attr_disabledPrincipalName] != "" {
      mutate {
        replace => {
          "target.user.userid" => "%{attr_disabledPrincipalName}"
          "target_userid_present" => "true"
          "target_user_present" => "true"
        }
        on_error => "attr_disabledPrincipalName_invalid"
      }
    }
  }
  else if [product_event_type] =~ "(?i)pwnedBreachDetected" {
    if [attr_user] != "" {
      mutate {
        replace => {
          "principal.user.userid" => "%{attr_user}"
          "principal_userid_present" => "true"
          "target_user_present" => "true"
        }
        on_error => "attr_user_invalid"
      }
    }
  }
  else {
    if [attr_uuid] != "" {
      mutate {
        replace => {
          "principal.user.product_object_id" => "%{attr_uuid}"
          "principal_user_present" => "true"
        }
        on_error => "attr_uuid_invalid"
      }
    }
  }

  if [product_event_type] =~ "(?i)changePassword|SessionService" and [attr_principalDesc] != "" {
    mutate {
      replace => {
        "principal.user.user_display_name" => "%{attr_principalDesc}"
        "principal_user_present" => "true"
      }
      on_error => "attr_principalDesc_invalid"
    }
  }
  else if [attr_principalDesc] != "" {
    mutate {
      replace => {
        "metadata.description" => "%{attr_principalDesc}"
      }
      on_error => "attr_principalDesc_inavlid_2"
    }
  }
  else if [desc] != "" {
    mutate {
      replace => {
        "metadata.description" => "%{desc}"
      }
      on_error => "desc_invalid"
    }
  }

  # metadata info
  mutate {
    replace => {
      "metadata.vendor_name" => "LOGONBOX"
      "metadata.product_name" => "LogonBox"
    }
  }

  if [target_user_present] == "true" or [target_userid_present] == "true" {
    mutate {
      replace => {
        "target_present" => "true"
      }
    }
  }

  # metdata_event_type
  if [event_type] == "" and [product_event_type] =~ "(?i)userCreated" {
    if [principal_machine_id_present] == "true" and [principal_userid_present] == "true" and [target_userid_present] == "true" {
      mutate {
        replace => {
          "event_type" => "USER_CREATION"
        }
      }
    }
  }
  else if [event_type] == "" and [product_event_type] =~ "(?i)userUpdated|setPassword|accountUnlockNoSuspension|passwordPolicy|accountDisabled|SessionService|AuthenticationService" {
    if ([principal_machine_id_present] == "true") and ([principal_user_present] == "true" or [target_user_present] == "true") {
      mutate {
        replace => {
          "event_type" => "USER_UNCATEGORIZED"
        }
      }
    }
  }
  else if [event_type] == "" and [product_event_type] =~ "(?i)group" {
    if [principal_user_present] == "true" and [target_user_present] == "true" {
      mutate {
        replace => {
          "event_type" => "USER_UNCATEGORIZED"
        }
      }
    }
  }
  else if [event_type] == "" and [product_event_type] =~ "(?i)groupCreated" {
    if [principal_userid_present] == "true" and [target_present] == "true" {
      mutate {
        replace => {
          "event_type" => "GROUP_CREATION"
        }
      }
    }
  }
  else if [event_type] == "" and [product_event_type] =~ "(?i)groupUpdated" {
    if [principal_userid_present] == "true" and [target_present] == "true" {
      mutate {
        replace => {
          "event_type" => "GROUP_MODIFICATION"
        }
      }
    }
  }
  else if [event_type] == "" and [attr_group] != "" {
    if [principal_userid_present] == "true" and [target_present] == "true" {
      mutate {
        replace => {
          "event_type" => "GROUP_UNCATEGORIZED"
        }
      }
    }
  }
  else if [event_type] == "" and [product_event_type] =~ "(?i)changePassword" {
    if [principal_userid_present] == "true" and [target_userid_present] == "true" {
      mutate {
        replace => {
          "event_type" => "USER_CHANGE_PASSWORD"
        }
      }
    }
  }
  else if [event_type] == "" and [product_event_type] =~ "(?i)AnswerService" {
    if [principal_userid_present] == "true" and [target_userid_present] == "true" and [network_dns_present] == "true" {
      mutate {
        replace => {
          "network.application_protocol" => "DNS"
          "event_type" => "NETWORK_DNS"
        }
      }
    }
  }

  if [event_type] == "" {
    if [principal_machine_id_present] == "true" {
      mutate {
        replace => {
          "event_type" => "STATUS_UPDATE"
        }
      }
    }
    else {
      mutate {
        replace => {
          "event_type" => "GENERIC_EVENT"
        }
      }
    }
  }

  if [event_type] != "" {
    mutate {
      replace => {
        "metadata.event_type" => "%{event_type}"
      }
      on_error => "event_type_value_invalid"
    }
  }

  # merge the data into udm nouns.
  if [metadata] != "" {
    mutate {
      rename => {
        "metadata" => "event.idm.read_only_udm.metadata"
      }
    }
  }
  if [principal] != "" {
    mutate {
      rename => {
        "principal" => "event.idm.read_only_udm.principal"
      }
    }
  }
  if [target] != "" {
    mutate {
      rename => {
        "target" => "event.idm.read_only_udm.target"
      }
    }
  }
  if [network] != "" {
    mutate {
      rename => {
        "network" => "event.idm.read_only_udm.network"
      }
    }
  }
  if [additional] != "" {
    mutate {
      rename => {
        "additional" => "event.idm.read_only_udm.additional"
      }
    }
  }

  if [security_result] != "" {
    mutate {
      merge => {
        "event.idm.read_only_udm.security_result" => "security_result"
      }
      on_error => "security_result_empty"
    }
  }

  mutate {
    merge => {
      "@output" => "event"
    }
  }
}
