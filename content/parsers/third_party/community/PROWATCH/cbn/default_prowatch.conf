filter {

    mutate {
        replace => {
            "event1.idm.read_only_udm.metadata.event_type" => "USER_BADGE_IN"
            "event1.idm.read_only_udm.metadata.vendor_name" => "Honeywell"
            "event1.idm.read_only_udm.metadata.product_name" => "ProWatch"
            "event1.idm.read_only_udm.extensions.auth.type" => "MACHINE"
            "_result" => "ALLOW"
            "employee_id" => ""
            "intermediary_1" => ""
            "intermediary_2" => ""
        }
    }


# Pull fields out of raw log.
   json {
     source => "message"
   }


    date {
        match => ["@timestamp", "yyyy-mm-ddTHH:mm:ss.SSSZ", "RFC3339", "UNIX", "ISO8601"]
    }

    if [event_type] != "Access Granted" && [event_type] != "Local Grant" {
        mutate {
            replace => {
                "_result" => "BLOCK"
            }
        }
    }

    mutate {
        rename => {
            "user_full_name" => "event1.idm.read_only_udm.principal.user.user_display_name"
            "username" => "event1.idm.read_only_udm.principal.user.userid"
            "employee_id" => "event1.idm.read_only_udm.principal.user.employee_id"
            "event_type" => "event1.idm.read_only_udm.metadata.product_event_type"
            "reader" => "event1.idm.read_only_udm.target.location.name"
        }
    }
    mutate {
      rename => {
        "logstash.ingest.host" => "intermediary_1.hostname"
        "logstash.process.host" => "intermediary_2.hostname"
      }
    }
   if [intermediary_1] != "" {
     mutate {
       merge => {
         "event1.idm.read_only_udm.intermediary" => "intermediary_1"
       }
       on_error => "empty_value_1"
     }
   }
   if [intermediary_2] != "" {
     mutate {
       merge => {
         "event1.idm.read_only_udm.intermediary" => "intermediary_2"
       }
       on_error => "empty_value_2"
     }
   }
   mutate {
     replace => {
       "event1.idm.read_only_udm.observer.hostname" => "%{logstash.collect.host}"
     }
   }
    mutate {
        merge => {
            "security_result.action" => "_result"
        }
    }

    mutate {
        merge => {
            "event1.idm.read_only_udm.security_result" => "security_result"
        }
    }

    mutate {
        merge => {
            "@output" => "event1"
        }
    }
}
