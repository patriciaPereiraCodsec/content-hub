# Product: EVISION_FIRCOSOFT
# Category: Infrastructure
# Supported Format: SYSLOG
# Reference: NA
# Last Updated: 2023-10-30
# Copyright 2023 Chronicle LLC

filter {

  # === SCHEMA ===
  mutate {
    replace => {
      "date" => ""
      "time" => ""
      "user" => ""
      "table" => ""
      "details" => ""
      "nature" => ""
      "success" => ""
      "action" => ""
      "security_result" => ""
    }
  }

  # === INPUT ===
  grok {
    match => {
      "message" => [
        '%{DATA:date}\\s+%{TIME:time}\\s+\\\|%{DATA:user}\\s+\\\|%{DATA:table}\\s+\\\|%{DATA:details}\\s+\\\|%{DATA:nature}\\s+\\\|%{GREEDYDATA:success}(\\s+)?'
      ]
    }
    overwrite => ["date", "time", "user", "table", "details", "nature", "success"]
    on_error => "grok_error"
  }

  # Drop if not match
  if [grok_error] {
    drop {
      tag => "TAG_MALFORMED_MESSAGE"
    }
  }

  # === UDM > METADATA ===
  # General Metadata for all events
  mutate {
    replace => {
      "event.idm.read_only_udm.metadata.vendor_name" => "eVision"
      "event.idm.read_only_udm.metadata.product_name" => "Fircosoft"
      "event.idm.read_only_udm.metadata.event_type" => "USER_RESOURCE_ACCESS"
    }
  }

  # other metadata
  if [nature] != "" {
    if [nature] == "C" {
      mutate {
        replace => {
          "event.idm.read_only_udm.metadata.product_event_type" => "Estadisticas"
        }
        on_error => "nature_error"
      }
    }
    if [nature] == "A" {
      mutate {
        replace => {
          "event.idm.read_only_udm.metadata.product_event_type" => "Otros"
        }
        on_error => "nature_error"
      }
    }
  }

  # === DATA ===
  #timestamp

  # delete time spaces
  mutate { gsub => [ "time", ' ', ''] }

  #Format transform: yyyy/MM/dd HH:mm:ss.SSS --> yyyy-MM-dd HH:mm:ss.SSS
  mutate {
    replace => {
      "timestamp" => "%{date} %{time}"
    }
  }

  mutate { gsub => [ "timestamp", '/', '-'] }

  date {
    match => ["timestamp", "yyyy-MM-dd HH:mm:ss.SSS"]
    target => "event.idm.read_only_udm.metadata.event_timestamp"
    on_error => "timestamp_error"
  }

  # principal
  mutate {
    replace => {
      "event.idm.read_only_udm.principal.user.userid" => "%{user}"
    }
    on_error => "user_error"
  }

  # target
  mutate {
    replace => {
      "event.idm.read_only_udm.target.resource.name" => "%{table}"
    }
    on_error => "table_error"
  }

  # security result
  mutate {
    replace => {
      "security_result.action_details" => "%{details}"
    }
    on_error => "details_error"
  }

  if [success] != "" {
    if [success] =~ "SI" { mutate { replace => {"action" => "ALLOW"}}}
    if [success] =~ "NO" { mutate { replace => {"action" => "BLOCK"}}}
  }

  if [action] != "" {
    mutate {
      merge => {
        "security_result.action" => "action"
      }
    }
  }

  if [security_result] != "" {
    mutate {
      merge => {
        "event.idm.read_only_udm.security_result" => "security_result"
      }
    }
  }

  # === OUTPUT ===
  mutate {
    merge => {
      "@output" => "event"
    }
  }
}

