filter {
  mutate {
    replace => {
      "insertId" => ""
      "about" => ""
      "timestamp" => ""
      "event_type" => "GENERIC_EVENT"
      "resource.labels.cluster_name" => ""
      "resource.labels.project_id" => ""
      "resource.labels.pod_name" => ""
      "resource.labels.location" => ""
      "resource.labels.container_name" => ""
      "resource.type" => ""
      "protoPayload.request.metadata.name" => ""
      "protoPayload.request.metadata.resourceVersion" => ""
      "protoPayload.request.metadata.uid" => ""
      "protoPayload.request.metadata.namespace" => ""
      "protoPayload.request.apiVersion" => ""
      "protoPayload.request.kind" => ""
      "protoPayload.request.@type" => ""
      "protoPayload.response.metadata.name" => ""
      "protoPayload.response.metadata.resourceVersion" => ""
      "protoPayload.response.metadata.uid" => ""
      "protoPayload.response.metadata.namespace" => ""
      "protoPayload.response.apiVersion" => ""
      "protoPayload.response.kind" => ""
      "protoPayload.response.@type" => ""
      "protoPayload.methodName" => ""
      "protoPayload.serviceName" => ""
      "protoPayload.resourceName" => ""
      "protoPayload.authenticationInfo.principalEmail" => ""
      "requestMetadata.callerIp" => ""
      "requestMetadata.callerSuppliedUserAgent" => ""
      "severity" => ""
      "operation.producer" => ""
      "operation.first" => ""
      "operation.last" => ""
      "operation.id" => ""
      "jsonPayload.log" => ""
      "jsonPayload.type" => ""
      "jsonPayload.azureResourceID" => ""
      "jsonPayload.chartVersion" => ""
      "jsonPayload.clusterDistribution" => ""
      "jsonPayload.componentName" => ""
      "jsonPayload.componentVersion" => ""
      "jsonPayload.message" => ""
      "jsonPayload.nodeName" => ""
      "jsonPayload.region" => ""
      "jsonPayload.releaseTrain" => ""
      "jsonPayload.traceLevel" => ""
      "jsonPayload.http.req.id" => ""
      "jsonPayload.http.req.method" => ""
      "jsonPayload.http.req.path" => ""
      "jsonPayload.session" => ""
      "jsonPayload.loggerName" => ""
      "jsonPayload.hostname" => ""
      "jsonPayload._HOSTNAME" => ""
      "jsonPayload._CMDLINE" => ""
      "http_method" => ""
      "httpRequest.requestMethod" => ""
      "httpRequest.status" => ""
      "httpRequest.userAgent" => ""
      "httpRequest.requestSize" => ""
      "httpRequest.responseSize" => ""
      "httpRequest.protocol" => ""
      "httpRequest.requestUrl" => ""
      "httpRequest.remoteIp" => ""
      "httpRequest.serverIp" => ""
      "labels.protocol" => ""
      "labels.destination_app" => ""
      "labels.destination_service_host" => ""
      "labels.destination_principal" => ""
      "labels.source_principal" => ""
      "labels.path" => ""
      "labels.request_id" => ""
      "labels.source_app" => ""
      "labels.mesh_uid" => ""
      "labels.source_name" => ""
      "labels.connection_state" => ""
      "labels.total_received_bytes" => ""
      "labels.total_sent_bytes" => ""
      "labels.upstream_cluster" => ""
      "labels.service_authentication_policy" => ""
      "labels.destination_canonical_revision" => ""
      "labels.requested_server_name" => ""
      "labels.source_ip" => ""
      "labels.destination_ip" => ""
      "source_ip" => ""
      "source_port" => ""
      "target_ip" => ""
      "target_port" => ""
      "intermediary_ip" => ""
      "intermediary_port" => ""
      "security_result" => ""
      "prin_host" => ""
      "prin_userid" => ""
      "target_userid" => ""
      "principal_hostname" => ""
      "target_hostname" => ""
      "security_action" => ""
      "security_result_action" => ""
      "resource_sub_type" => ""
    }
  }

  json {
    source => "message"
    array_function => "split_columns"
    on_error => "not_json"
  }

  if [timestamp] != "" {
    date {
      match => ["timestamp", "ISO8601"]
    }
  }

  if [jsonPayload][log] != "" {
    grok {
      match => {
        "jsonPayload.log" =>  ".* principal is %{GREEDYDATA:prin_host}"
      }
      overwrite => ["prin_host"]
      on_error => "grok_failure"
    }
  }

  if [prin_host] != "" {
    mutate {
      replace => {
        "principal_hostname" => "%{prin_host}"
      }
    }
  }
  else if [jsonPayload][hostname] != "" {
    mutate {
      replace => {
        "principal_hostname" => "%{jsonPayload.hostname}"
      }
    }
  }
  else if [jsonPayload][_HOSTNAME] != "" {
    mutate {
      replace => {
        "principal_hostname" => "%{jsonPayload._HOSTNAME}"
      }
    }
  }

  if [jsonPayload][_CMDLINE] != "" {
    mutate {
      replace => {
        "principal.process.command_line" => "%{jsonPayload._CMDLINE}"
      }
    }
  }

  if [requestMetadata][callerIp] != "" {
    mutate {
      merge => {
        "principal.ip" => "requestMetadata.callerIp"
      }
    }
  }

  if [httpRequest][serverIp] != "" {
    grok {
      match => {
        "httpRequest.serverIp" => "%{IP:target_ip}:%{INT:target_port}"
      }
      overwrite => ["target_ip","target_port"]
      on_error => "target_ip_failure"
    }
  }

  if [httpRequest][remoteIp] != "" {
    grok {
      match => {
        "httpRequest.remoteIp" => "%{IP:source_ip}:%{INT:source_port}"
      }
      overwrite => ["source_ip","source_port"]
      on_error => "principal_ip_failure"
    }
  }

  if [labels][source_ip] != "" {
    grok {
      match => {
        "labels.source_ip" => "%{IP:source_ip}:%{INT:source_port}"
      }
      overwrite => ["source_ip","source_port"]
    }
  }

  if [labels][destination_ip] != "" {
    grok {
      match => {
        "labels.destination_ip" => "%{IP:target_ip}:%{INT:target_port}"
      }
      overwrite => ["target_ip","target_port"]
      on_error => "target_ip_failure"
    }
  }

  if [source_ip] != "" {
    mutate {
      merge => {
        "principal.ip" => "source_ip"
      }
    }
  }

  if [target_ip] != "" {
    mutate {
      merge => {
        "target.ip" => "target_ip"
      }
    }
  }

  if [source_port] != "" {
    mutate {
      convert => {
        "source_port" => "integer"
      }
      on_error => "no_conversion_error"
    }
    mutate {
      rename => {
        "source_port" => "principal.port"
      }
    }
  }

  if [target_port] != "" {
    mutate {
      convert => {
        "target_port" => "integer"
      }
      on_error => "no_conversion_error"
    }
    mutate {
      rename => {
        "target_port" => "target.port"
      }
    }
  }

  if [httpRequest][protocol] not in ["","grpc"] {
    mutate {
      uppercase => ["httpRequest.protocol"]
    }
    mutate {
      replace => {
        "event.idm.read_only_udm.network.application_protocol" => "%{httpRequest.protocol}"
      }
    }
  }

 if [labels][protocol] in ["EIGRP","ESP","ETHERIP","GRE","ICMP","IGMP","IP6IN4","PIM","TCP","UDP","VRRP"] {
    mutate {
      uppercase => ["labels.protocol"]
    }
    mutate {
      replace => {
        "event.idm.read_only_udm.network.ip_protocol" => "%{labels.protocol}"
        "event_type" => "RESOURCE_READ"
      }
    }
  }

  mutate {
    replace => {
      "http_req_id" => "%{jsonPayload.http.req.id}"
    }
    on_error => "http_req_id_empty"
  }
  if [http_req_id] != "" {
    mutate {
      replace => {
        "http_req_id_field.key" => "http_req_id"
        "http_req_id_field.value.string_value" => "%{http_req_id}"
      }
    }
    mutate {
      merge => {
        "event.idm.read_only_udm.additional.fields" => "http_req_id_field"
      }
    }
  }

  mutate {
    replace => {
      "http_req_path" => "%{jsonPayload.http.req.path}"
    }
    on_error => "http_req_path_empty"
  }
  if [http_req_path] != "" {
    mutate {
      replace => {
        "http_req_path_field.key" => "http_req_path"
        "http_req_path_field.value.string_value" => "%{http_req_path}"
      }
    }
    mutate {
      merge => {
        "event.idm.read_only_udm.additional.fields" => "http_req_path_field"
      }
    }
  }

  mutate {
    replace => {
      "http_method" => "%{jsonPayload.http.req.method}"
    }
    on_error => "method_empty"
  }

  if [httpRequest][requestMethod] != "" {
    mutate {
      replace => {
        "event.idm.read_only_udm.network.http.method" => "%{httpRequest.requestMethod}"
      }
    }
  }
 else if [http_method] != "" {
    mutate {
      replace => {
        "event.idm.read_only_udm.network.http.method" => "%{http_method}"
      }
    }
  }

  if [httpRequest][requestMethod] in ["PATCH","PUT","POST"] {
    mutate {
      replace => {
        "event_type" => "RESOURCE_WRITTEN"
      }
    }
  }
  else if [httpRequest][requestMethod] in ["GET","OPTIONS"] {
    mutate {
      replace => {
        "event_type" => "RESOURCE_READ"
      }
    }
  }
  else if [httpRequest][requestMethod] == "DELETE" {
    mutate {
      replace => {
        "event_type" => "RESOURCE_DELETION"
      }
    }
  }

  if [httpRequest][userAgent] != "" {
    mutate {
      replace => {
        "event.idm.read_only_udm.network.http.user_agent" => "%{httpRequest.userAgent}"
      }
    }
  }

  if [httpRequest][requestUrl] != "" {
    mutate {
      replace => {
        "target.url" => "%{httpRequest.requestUrl}"
      }
    }
  }

  if [httpRequest][requestSize] != "" {
    mutate {
      replace => {
         "event.idm.read_only_udm.network.sent_bytes" => "%{httpRequest.requestSize}"
      }
      convert => {
        "event.idm.read_only_udm.network.sent_bytes" => "uinteger"
      }
    }
  }
  else if [labels][total_sent_bytes] != "" {
    mutate {
      replace => {
        "event.idm.read_only_udm.network.sent_bytes" => "%{labels.total_sent_bytes}"
      }
      convert => {
        "event.idm.read_only_udm.network.sent_bytes" => "uinteger"
      }
      on_error => "no_conversion_error"
    }
  }

  if [httpRequest][status] != "" {
    mutate {
      rename => {
        "httpRequest.status" => "event.idm.read_only_udm.network.http.response_code"
      }
      convert => {
        "event.idm.read_only_udm.network.http.response_code" => "integer"
      }
      on_error => "no_conversion_error"
    }
  }

  if [httpRequest][responseSize] != "" {
    mutate {
      replace => {
         "event.idm.read_only_udm.network.received_bytes" => "%{httpRequest.responseSize}"
      }
      convert => {
        "event.idm.read_only_udm.network.received_bytes" => "uinteger"
      }
      on_error => "no_conversion_error"
    }
  }
  else if [labels][total_received_bytes] != "" {
    mutate {
      replace => {
         "event.idm.read_only_udm.network.received_bytes" => "%{labels.total_received_bytes}"
      }
      convert => {
        "event.idm.read_only_udm.network.received_bytes" => "uinteger"
      }
      on_error => "no_conversion_error"
    }
  }

  if [labels][mesh_uid] != "" {
    mutate {
      replace => {
        "prin_userid" => "%{labels.mesh_uid}"
      }
    }
  }

  if [labels][source_name] != "" {
    mutate {
      replace => {
        "principal_hostname" => "%{labels.source_name}"
      }
    }
  }

  if [labels][destination_app] != "" {
    mutate {
      replace => {
        "target.application" => "%{labels.destination_app}"
      }
    }
  }

  if [labels][destination_service_host] != "" and [labels][destination_service_host] != "unknown" {
    mutate {
      replace => {
        "target_hostname" => "%{labels.destination_service_host}"
      }
    }
  }

  if [labels][destination_principal] != "" {
    mutate {
      replace => {
        "target.administrative_domain" => "%{labels.destination_principal}"
      }
    }
  }

  if [labels][source_principal] != "" {
    mutate {
      replace => {
        "principal.administrative_domain" => "%{labels.source_principal}"
      }
    }
  }

  if [labels][path] != "" {
    mutate {
      replace => {
        "target.file.full_path" => "%{labels.path}"
      }
    }
  }

  if [labels][request_id] != "" {
    mutate {
      replace => {
        "event.idm.read_only_udm.metadata.product_log_id" => "%{labels.request_id}"
      }
    }
  }

  if [labels][source_name] != "" {
    mutate {
      replace => {
        "principal_hostname" => "%{labels.source_name}"
      }
    }
  }

  if [labels][source_app] != "" {
    mutate {
      replace => {
        "principal.application" => "%{labels.source_app}"
      }
    }
  }

  if [labels][upstream_cluster] =~ "inbound" or [labels][upstream_cluster] =~ "Inbound" {
    mutate {
      replace => {
        "event.idm.read_only_udm.network.direction" => "INBOUND"
      }
    }
  }
  else if [labels][upstream_cluster] != "" {
    mutate {
      replace => {
        "event.idm.read_only_udm.network.direction" => "OUTBOUND"
      }
    }
  }

  if [labels][connection_state] in ["OPEN","CONNECTED"] {
    mutate {
      replace => {
        "security_result_action" => "ALLOW"
      }
    }
  }
  else if [labels][connection_state] == "CLOSE" {
    mutate {
      replace => {
        "security_result_action" => "BLOCK"
      }
    }
  }

  if [security_result_action] != "" {
    mutate {
      merge => {
        "security_result.action" => "security_result_action"
      }
    }
  }


  if [labels][service_authentication_policy] != "" and [labels][service_authentication_policy] != "NONE" {
    mutate {
      replace => {
        "event.idm.read_only_udm.network.tls.cipher" => "%{labels.service_authentication_policy}"
      }
    }
  }

  if [labels][destination_canonical_revision] != "" {
    mutate {
      replace => {
        "destination_canonical_revision.key" => "Destination Canonical Revision"
        "destination_canonical_revision.value" => "%{labels.destination_canonical_revision}"
      }
    }
    mutate {
      merge => {
        "security_result.about.labels" => "destination_canonical_revision"
      }
    }
  }

  if [labels][requested_server_name] != "" {
    mutate {
      replace => {
        "requested_server.key" => "Requested Server Name"
        "requested_server.value" => "%{labels.requested_server_name}"
      }
    }
    mutate {
      merge => {
        "security_result.about.resource.attribute.labels" => "requested_server"
      }
    }
  }

  if [jsonPayload][chartVersion] != "" {
    mutate {
      replace => {
        "event.idm.read_only_udm.metadata.product_version" => "%{jsonPayload.chartVersion}"
      }
    }
  }

  if [jsonPayload][message] != "" {
    mutate {
      replace => {
        "event.idm.read_only_udm.metadata.description" => "%{jsonPayload.message}"
      }
    }
  }

  if [jsonPayload][session] != "" {
    mutate {
      replace => {
        "event.idm.read_only_udm.network.session_id" => "%{jsonPayload.session}"
      }
    }
  }

  if [jsonPayload][region] != "" {
    mutate {
      replace => {
        "principal.location.country_or_region" => "%{jsonPayload.region}"
      }
    }
  }

  if [jsonPayload][nodeName] != "" {
    mutate {
      replace => {
        "nodename_label.key" => "JsonPayload NodeName"
        "nodename_label.value" => "%{jsonPayload.nodeName}"
      }
    }
    mutate {
      merge => {
        "about.resource.attribute.labels" => "nodename_label"
      }
    }
  }

  if [jsonPayload][componentName] != "" {
    mutate {
      replace => {
        "componentName_label.key" => "JsonPayload componentName"
        "componentName_label.value" => "%{jsonPayload.componentName}"
      }
    }
    mutate {
      merge => {
        "about.resource.attribute.labels" => "componentName_label"
      }
    }
  }

  if [jsonPayload][componentVersion] != "" {
    mutate {
      replace => {
        "componentVersion_label.key" => "JsonPayload componentVersion"
        "componentVersion_label.value" => "%{jsonPayload.componentVersion}"
      }
    }
    mutate {
      merge => {
        "about.resource.attribute.labels" => "componentVersion_label"
      }
    }
  }

  if [jsonPayload][azureResourceID] != "" {
    mutate {
      replace => {
        "azureResourceID_label.key" => "JsonPayload azureResourceID"
        "azureResourceID_label.value" => "%{jsonPayload.azureResourceID}"
      }
    }
    mutate {
      merge => {
        "about.resource.attribute.labels" => "azureResourceID_label"
      }
    }
  }

  if [requestMetadata][callerSuppliedUserAgent] != ""{
    mutate {
      replace => {
        "event.idm.read_only_udm.network.http.user_agent" => "%{requestMetadata.callerSuppliedUserAgent}"
      }
    }
  }

  if [insertId] != "" {
    mutate {
      replace => {
        "event.idm.read_only_udm.metadata.product_log_id" => "%{insertId}"
      }
    }
  }

  if [resource][type] != "" {
    mutate {
      replace => {
        "resource_sub_type" => "%{resource.type}"
      }
    }
  }

  if [logName] != "" {
    mutate {
      replace => {
        "target.process.file.full_path" => "%{logName}"
      }
    }
  }

  mutate {
    replace => {
      "k8s_pod_app" => "%{labels.k8s-pod/app}"
    }
    on_error => "k8s_pod_app_empty"
  }
  if ![k8s_pod_app_empty] {
    mutate {
      replace => {
        "k8s_pod_app_field.key" => "k8s_pod_app"
        "k8s_pod_app_field.value.string_value" => "%{k8s_pod_app}"
      }
    }
    mutate {
      merge => {
        "event.idm.read_only_udm.additional.fields" => "k8s_pod_app_field"
      }
    }
  }

  mutate {
    replace => {
      "k8s_pod_template_hash" => "%{labels.k8s-pod/pod-template-hash}"
    }
    on_error => "k8s_pod_template_empty"
  }
  if ![k8s_pod_template_empty] {
    mutate {
      replace => {
        "k8s_pod_template_hash_field.key" => "k8s_pod_template_hash"
        "k8s_pod_template_hash_field.value.string_value" => "%{k8s_pod_template_hash}"
      }
    }
    mutate {
      merge => {
        "event.idm.read_only_udm.additional.fields" => "k8s_pod_template_hash_field"
      }
    }
  }

  mutate {
    replace => {
      "k8s_pod_tls_mode" => "%{labels.k8s-pod/security_istio_io/tlsMode}"
    }
    on_error => "k8s_pod_tls_mode_empty"
  }
  if ![k8s_pod_tls_mode_empty] {
    mutate {
      replace => {
        "k8s_pod_tls_mode_field.key" => "k8s_pod_tls_mode"
        "k8s_pod_tls_mode_field.value.string_value" => "%{k8s_pod_tls_mode}"
      }
    }
    mutate {
      merge => {
        "event.idm.read_only_udm.additional.fields" => "k8s_pod_tls_mode_field"
      }
    }
  }

  mutate {
    replace => {
      "k8s_pod_canonical_revision" => "%{labels.k8s-pod/service_istio_io/canonical-revision}"
    }
    on_error => "k8s_pod_canonical_revision_empty"
  }
  if ![k8s_pod_canonical_revision_empty] {
    mutate {
      replace => {
        "k8s_pod_canonical_revision_field.key" => "k8s_pod_canonical_revision"
        "k8s_pod_canonical_revision_field.value.string_value" => "%{k8s_pod_canonical_revision}"
      }
    }
    mutate {
      merge => {
        "event.idm.read_only_udm.additional.fields" => "k8s_pod_canonical_revision_field"
      }
    }
  }

  mutate {
    replace => {
      "k8s_pod_canonical_name" => "%{labels.k8s-pod/service_istio_io/canonical-name}"
    }
    on_error => "k8s_pod_canonical_name_empty"
  }
  if ![k8s_pod_canonical_name_empty] {
    mutate {
      replace => {
        "k8s_pod_canonical_name_field.key" => "k8s_pod_canonical_name"
        "k8s_pod_canonical_name_field.value.string_value" => "%{k8s_pod_canonical_name}"
      }
    }
    mutate {
      merge => {
        "event.idm.read_only_udm.additional.fields" => "k8s_pod_canonical_name_field"
      }
    }
  }

  if [resource][type] == "k8s_container" {
    mutate{
      replace => {
        "target.resource.name"= "%{labels.compute.googleapis.com/resource_name}"
      }
      on_error => "resource_name_empty"
    }
  }

  if [resource][labels][cluster_name] != "" {
    mutate {
      replace => {
        "target.resource.resource_type" => "CLUSTER"
      }
    }
  }

  if [resource][labels][project_id] != "" {
    mutate {
      replace => {
        "target.resource.id" => "%{resource.labels.project_id}"
      }
    }
  }

  if [resource][labels][pod_name] != "" {
    mutate {
      replace => {
        "pod_name.key" => "Pod Name"
        "pod_name.value.string_value" => "%{resource.labels.pod_name}"
      }
    }
    mutate {
      merge => {
        "event.idm.read_only_udm.additional.fields" => "pod_name"
      }
    }
  }

  if [resource][labels][container_name] != "" {
    mutate {
      replace => {
        "cntnr_name.key" => "container name"
        "cntnr_name.value.string_value" => "%{resource.labels.container_name}"
      }
    }
    mutate {
      merge => {
        "event.idm.read_only_udm.additional.fields" => "cntnr_name"
      }
    }
  }

  if [resource][labels][location] != "" {
    mutate {
      replace => {
        "target.location.country_or_region" => "%{resource.labels.location}"
      }
    }
  }

  if [severity] == "INFO" or [severity] == "Informational" {
    mutate {
      replace => {
        "security_result.severity" => "INFORMATIONAL"
      }
    }
  }
  else if [severity] == "WARNING" {
     mutate {
      replace => {
        "security_result.severity" => "MEDIUM"
      }
    }
  }

  if [message] =~ ".*authorization.*k8s" {
    mutate {
      replace => {
        "security_action" => "%{labels.authorization.k8s.io/decision}"
       }
       on_error => "decision_not_set"
     }
    if [security_action] == "allow"{
      mutate{
        replace =>{
          "security_action" => "ALLOW"
        }
      }
      mutate {
        merge => {
          "security_result.action" => "security_action"
        }
      }
    }
    mutate {
      replace => {
        "security_result.description" => "%{properties.log.annotations.authorization.k8s.io/reason}"
      }
      on_error => "reason_empty"
    }
    mutate {
      gsub => [ "security_result.description", '\\"', "" ]
    }
  }

  if [operation][id] != "" {
    mutate {
      replace => {
        "target.resource.product_object_id" => "%{operation.id}"
      }
    }
  }

  if [operation][producer] != "" {
    mutate {
      replace => {
        "producer_label.key" => "producer"
        "producer_label.value" => "%{operation.producer}"
      }
      merge => {
        "target.resource.attribute.labels" => "producer_label"
      }
    }
  }

  if [operation][first] != "" {
    mutate {
      convert =>  {
        "operation.first" => "string"
      }
    }
    mutate {
      replace => {
        "first_label.key" => "first"
        "first_label.value" => "%{operation.first}"
      }
      merge => {
        "target.resource.attribute.labels" => "first_label"
      }
    }
  }

  if [operation][last] != "" {
    mutate {
      convert =>  {
        "operation.last" => "string"
      }
    }
    mutate {
      replace => {
        "last_label.key" => "last"
        "last_label.value" => "%{operation.last}"
      }
      merge => {
        "target.resource.attribute.labels" => "last_label"
      }
    }
  }

  if [protoPayload][request][metadata][name] != "" {
    mutate{
      replace => {
        "meta_name.key" => "request metadata name"
        "meta_name.value" => "%{protoPayload.request.metadata.name}"
      }
      merge => {
        "principal.resource.attribute.labels" => "meta_name"
      }
    }
  }

  if [protoPayload][request][metadata][resourceVersion] != "" {
    mutate{
      replace => {
        "resource_version_label.key" => "resource version"
        "resource_version_label.value" => "%{protoPayload.request.metadata.resourceVersion}"
      }
      merge => {
        "principal.resource.attribute.labels" => "resource_version_label"
      }
    }
  }

  if [protoPayload][request][metadata][namespace] != "" {
    mutate {
      replace => {
        "principal.namespace" => "%{protoPayload.request.metadata.namespace}"
      }
    }
  }

  if [protoPayload][request][metadata][uid] != "" {
    mutate {
      replace => {
      "prin_userid" => "%{protoPayload.request.metadata.uid}"
      }
    }
  }

  if [protoPayload][authenticationInfo][principalEmail] != "" {
    mutate {
      replace => {
      "prin_userid" => "%{protoPayload.authenticationInfo.principalEmail}"
      }
    }
  }

  if [protoPayload][request][apiVersion] != "" {
    mutate{
      replace => {
        "request_apiVersion.key" => "request apiVersion"
        "request_apiVersion.value" => "%{protoPayload.request.apiVersion}"
      }
      merge => {
        "principal.resource.attribute.labels" => "request_apiVersion"
      }
    }
  }

  if [protoPayload][request][kind] != "" {
    mutate{
      replace => {
        "request_kind_label.key" => "request kind"
        "request_kind_label.value" => "%{protoPayload.request.kind}"
      }
      merge => {
        "principal.resource.attribute.labels" => "request_kind_label"
      }
    }
  }

  if [protoPayload][serviceName] != "" {
    mutate {
      replace => {
        "target.application" => "%{protoPayload.serviceName}"
      }
    }
  }

  if [protoPayload][resourceName] != "" {
    mutate {
      replace => {
        "target.resource.name" => "%{protoPayload.resourceName}"
      }
    }
  }

  if [protoPayload][request][@type] != "" {
    mutate{
      replace => {
        "request_type_label.key" => "request type"
        "request_type_label.value" => "%{protoPayload.request.@type}"
      }
      merge => {
        "principal.resource.attribute.labels" => "request_type_label"
      }
    }
  }

  if [protoPayload][response][metadata][name] != "" {
    mutate{
      replace => {
        "meta_name.key" => "response metadata name"
        "meta_name.value" => "%{protoPayload.response.metadata.name}"
      }
      merge => {
        "target.resource.attribute.labels" => "meta_name"
      }
    }
  }

  if [protoPayload][response][metadata][resourceVersion] != "" {
    mutate{
      replace => {
        "resource_version_label.key" => "resource version"
        "resource_version_label.value" => "%{protoPayload.response.metadata.resourceVersion}"
      }
      merge => {
        "target.resource.attribute.labels" => "resource_version_label"
      }
    }
  }

  if [protoPayload][response][metadata][namespace] != "" {
    mutate {
      replace => {
        "target.namespace" => "%{protoPayload.response.metadata.namespace}"
      }
    }
  }

  if [protoPayload][response][metadata][uid] != "" {
    mutate {
      replace => {
      "target_userid" => "%{protoPayload.response.metadata.uid}"
      }
    }
  }

  if [protoPayload][response][apiVersion] != "" {
    mutate{
      replace => {
        "response_apiVersion.key" => "response apiVersion"
        "response_apiVersion.value" => "%{protoPayload.response.apiVersion}"
      }
      merge => {
        "target.resource.attribute.labels" => "response_apiVersion"
      }
    }
  }

  if [protoPayload][response][kind] != "" {
    mutate{
      replace => {
        "response_kind_label.key" => "response kind"
        "response_kind_label.value" => "%{protoPayload.response.kind}"
      }
      merge => {
        "target.resource.attribute.labels" => "response_kind_label"
      }
    }
  }


  if [protoPayload][response][@type] != "" {
    mutate{
      replace => {
        "response_type_label.key" => "response type"
        "response_type_label.value" => "%{protoPayload.response.@type}"
      }
      merge => {
        "target.resource.attribute.labels" => "response_type_label"
      }
    }
  }

  if [protoPayload][methodName] =~ ".*(create|Create).*" {
      mutate {
        replace => {
          "event_type" => "RESOURCE_CREATION"
        }
      }
      if [protoPayload][authenticationInfo][principalEmail] == "" {
        mutate {
          replace => {
            "event_type" => "GENERIC_EVENT"
          }
        }
      }
    }
    else if [protoPayload][methodName] =~ ".*(get|Get).*"
    or [protoPayload][methodName] =~ "(jobservice|JobService).(Query|query).*"
    or [protoPayload][methodName] =~ ".*list.*"
    or [protoPayload][methodName] =~ ".*List.*"
    or [protoPayload][methodName] =~ ".*watch"
    {
      mutate {
        replace => {
          "event_type" => "RESOURCE_READ"
        }
      }
      if [protoPayload][authenticationInfo][principalEmail] == "" {
        mutate {
          replace => {
            "event_type" => "GENERIC_EVENT"
          }
        }
      }
    }
    else if [protoPayload][methodName] == "storage.objects.delete" {
      mutate {
        replace => {
          "event_type" => "RESOURCE_DELETION"
        }
      }
    }
    else if [protoPayload][methodName] IN [ "jobservice.insert", "storage.objects.update" ]
    or [protoPayload][methodName] =~ ".*IngestMessage"
    or [protoPayload][methodName] =~ ".*UpdateAgent"
    or [protoPayload][methodName] =~ ".*bigquery.*InsertJob"
    or [protoPayload][methodName] =~ ".*MetricService.CreateTimeSeries" {
      mutate {
        replace => {
          "event_type" => "RESOURCE_WRITTEN"
        }
      }
    }
    else if [protoPayload][methodName] == "jobservice.jobcompleted"
    or [protoPayload][methodName] =~ (".*status.update|.*update") {
      mutate {
        replace => {
          "event_type" => "RESOURCE_WRITTEN"
        }
      }
    }
    else if [protoPayload][methodName] =~ ".*status.patch" {
      mutate {
        replace => {
          "event_type" => "GENERIC_EVENT"
        }
      }
    }




  mutate {
    rename => {
      "principal" => "event.idm.read_only_udm.principal"
      "target" => "event.idm.read_only_udm.target"
    }
  }

  if [resource_sub_type] != "" {
    mutate {
      replace => {
        "event.idm.read_only_udm.target.resource.resource_subtype" => "%{resource_sub_type}"
      }
    }
  }

  if [principal_hostname] != "" {
    mutate {
      replace => {
         "event.idm.read_only_udm.principal.hostname" => "%{principal_hostname}"
      }
    }
  }

  if [target_hostname] != "" {
    mutate {
      replace => {
         "event.idm.read_only_udm.target.hostname" => "%{target_hostname}"
      }
    }
  }

  if ([source_ip] != "" or [principal_hostname] != "") and ([target_ip] != "" or [target_hostname] != "") and [httpRequest][requestMethod] == "" {
    mutate {
      replace => {
        "event_type" => "NETWORK_CONNECTION"
      }
    }
  }
  else if ([principal_hostname] != "" or [source_ip] != "" or [requestMetadata][callerIp] != "") and ([target_hostname] == "" and [target_ip] == "")  and [event_type] == "GENERIC_EVENT"{
    mutate {
      replace => {
        "event_type" => "STATUS_UPDATE"
      }
    }
  }
  else if [resource_sub_type] != "" and [event_type] == "GENERIC_EVENT"{
    mutate {
      replace => {
        "event_type" => "USER_RESOURCE_ACCESS"
      }
    }
  }

  if [prin_userid] != "" {
    mutate {
      replace => {
        "event.idm.read_only_udm.principal.user.userid" => "%{prin_userid}"
      }
    }
  }

  if [target_userid] != "" {
    mutate {
      replace => {
        "event.idm.read_only_udm.target.user.userid" => "%{target_userid}"
      }
    }
  }

  if [about] != "" {
    mutate {
      merge => {
        "event.idm.read_only_udm.about" => "about"
      }
    }
  }

  if [security_result] != "" {
    mutate {
      merge => {
        "event.idm.read_only_udm.security_result" => "security_result"
      }
    }
  }

  if [event_type] != "" {
    mutate {
      replace => {
        "event.idm.read_only_udm.metadata.event_type" => "%{event_type}"
      }
    }
  }

  mutate {
    replace => {
      "event.idm.read_only_udm.metadata.product_name" => "KUBERNETES_AUTH_PROXY"
      "event.idm.read_only_udm.metadata.vendor_name" => "KUBERNETES"
    }
  }

  mutate {
    merge => {
      "@output" => "event"
    }
  }

}
