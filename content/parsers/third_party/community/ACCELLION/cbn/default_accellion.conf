# Product: Accellion
# Category: DLP
# Supported Format: SYSLOG
# Reference: N/A
# Last Updated: 2022-09-30
# Copyright 2022 Chronicle LLC

filter {
  mutate {
    replace => {
      "principal.hostname" => ""
      "event_type" => ""
      "principal_hostname" => ""
      "security_result" => ""
      "ip" => ""
    }
  }

  if [message] =~ "^{" {
    grok {
      match => {
        "message" => "\"textPayload\":\"%{GREEDYDATA:audit_message}\",\""
      }
      on_error => "text_payload_not_found"
    }

    mutate {
      gsub => ["audit_message", '\\\\"', '"']
    }
  }
  else {
    mutate {
      replace => {
        "audit_message" => "%{message}"
      }
    }
  }
    # References:
  # - https://access.redhat.com/documentation/en-us/red_hat_enterprise_linux/7/html/security_guide/sec-understanding_audit_log_files
  # - https://access.redhat.com/documentation/en-us/red_hat_enterprise_linux/6/html/security_guide/sec-understanding_audit_log_files
  # - https://selinuxproject.org/page/NB_AL
  # Obs: This .include deals with single and multiple types in the same message
  # Exs:
  #   type=SYSCALL ... type=EXECVE ... type=PATH
  #   type=EXECVE ... type=PATH
  #   type=PATH
  #   type=PATH item=0 ... type=PATH item=
  #   type=ANOM_ABEND
  mutate {
    replace => {
      "network" => ""
      "extensions" => ""
      "security_action" => ""
      "about" => ""
      "type_name" => ""
      "principal_user_userid" => ""
      "target_file_full_path" => ""
      "dst_ip" => ""
      "src_ip" => ""
      "user_name" => ""
      "dst_port" => ""
      "terminal" => ""
      "_mechanism" => ""
      "sessionid" => ""
      "tar_host" => ""
      "command_line" => ""
      "appproto" => ""
      "msg2" => ""
      "has_principal" => "false"
      "principal_user_present" => "false"
      "target_user_present" => "false"
      "labels_hostname" => ""
      "args_start" => ""
      "rhost" => ""
      "args_rest" => ""
      "a2data" => ""
      "srcPort" => ""
      "srcIp" => ""
      "ruser" => ""
      "tty" => ""
      "msg_desc" => ""
      "applica" => ""
      "principal_host_available" => ""
      "secsummary" => ""
      "username" => ""
      "kvdata" => ""
      "mailid" => ""
      "auth_realm" => ""
      "error_message" => ""
      "action_data" => ""
      "target_email" => ""
      "target_port" => ""
      "princi_ip" => ""
      "status" => ""
      "target_hostname" => ""
      "relay_data" => ""
      "delay_data" => ""
      "dns_data" => ""
      "bytes_data" => ""
      "delays_data" => ""
      "response_code" => ""
      "to_email" => ""
      "bytes_sent" => ""
      "process_pid" => ""
      "auth" => ""
      "filepath" => ""
      "log_details" => ""
    }
  }

  # remove values empty as "?"
  mutate {
    gsub => ["audit_message", '(\\w=["]?)\\?(["]?)', "$1$2"]
  }
  mutate {
    gsub => ["audit_message", "(\\r|\\n)", ""]
  }
  grok {
    match => {
      "audit_message" => [
        "msg=audit\\((?P<event_timestamp>\\d+\\.\\d+):%{NUMBER:product_log_id}\\)",
        "msg='%{GREEDYDATA:msg2}'"
      ]
    }
    overwrite => ["msg2"]
    on_error => "audit_grok_fail"
  }

  mutate {
    replace => {
      "tar_host" => "%{indicator_node}"
    }
    on_error => "indicator_node_empty"
  }

  if [audit_grok_fail] {
    grok {
      match => {
        "audit_message" => [
          "qemu-ga: info: %{DATA:info}, pid: %{INT:process_pid} .*"
          "qemu-ga: info: %{DATA:info}, filepath: %{DATA:filepath}, .*"
          "haproxy\\[%{INT:process_pid}\\]: %{IP:srcIp}:%{INT:srcPort}"
          "user=\\<%{DATA:user_name}\\>, .* rip=%{IP:srcIp}, lip=%{IP}, session=\\<%{DATA:sessionid}\\>",
          "(?P<applica>exim)\\[%{INT}\\]: %{TIMESTAMP_ISO8601} %{NOTSPACE:mailid} => .* \\<%{DATA:email}\\> R=%{DATA} T=%{DATA} C=%{DATA} .* \\<%{DATA}\\> %{NOTSPACE:sessionid}",
          "(?P<applica>exim)\\[%{INT}\\]: %{TIMESTAMP_ISO8601} (?P<appproto>SMTP) connection from .*\\(\\[%{IP:srcIp}\\]\\) \\[%{IP:dst_ip}\\]:%{INT:dst_port}",
          "(?P<applica>exim)\\[%{INT}\\]: %{TIMESTAMP_ISO8601} (?P<secsummary>no .*) %{IP:dst_ip}",
          "(?P<action_data>Connection) from %{IP:srcIp} port %{INT:srcPort}",
          "(?P<action_data>session (opened|closed)) for user %{DATA:username}\\\"\},%{GREEDYDATA}"
          "(?P<action_data>session (opened|closed)) for user (?P<username>.*?) by.*"
          "(?P<action_data>session (opened|closed)) for user (?P<username>.*)"
          "(?P<action_data>Connection closed by invalid user) %{DATA:username} %{IP:srcIp} port %{INT:srcPort} \\[%{DATA:auth}\\]"
          "(?P<action_data>Connection closed) by %{IP:srcIp} port %{INT:srcPort} \\[%{DATA:username}\\]"
          "(?P<action_data>Connection closed) by %{IP:srcIp} port %{INT:srcPort}"
          "(?P<action_data>Connection closed) by %{IP:srcIp}"
          "(?P<action_data>Failed password) for invalid user (?P<username>.*?) from %{IP:srcIp} port %{INT:srcPort} %{WORD:proto}"
          "(?P<action_data>Failed password) for (?P<username>.*?) from %{IP:srcIp} port %{INT:srcPort} %{WORD:proto}"
          "(?P<action_data>Accepted password) for (?P<username>.*?) from %{IP:srcIp} port %{INT:srcPort} %{WORD:proto}"
          "(?P<action_data>Failed keyboard-interactive/pam) for invalid user (?P<username>.*?) from %{IP:srcIp} port %{INT:srcPort} %{WORD:proto}"
          "<%{INT}>(?<auth>sshd)\\[%{INT:process_pid}\\]: (Received disconnect from|Invalid user %{DATA:user_name} from) %{IP:srcIp}"
          "\\<%{INT}\\>(?P<auth>sshd)\\[%{INT:process_pid}\\]: (?P<applica>pam_unix)\\(%{DATA:application}:%{DATA}\\): (?P<action_data>authentication failure); %{GREEDYDATA:kvdata}",
          "\\<%{INT}\\>(?P<auth>sshd)\\[%{INT:process_pid}\\]: (?P<applica>pam_krb5)\\[%{INT}\\]: error resolving user name \\'%{DATA:user_name}\\' .*",
          "<%{INT}>(?P<auth>sshd)\\[%{INT:process_pid}\\]: (?P<applica>pam_krb5)\\[%{INT}\\]: error getting information about '%{DATA:user_name}'"
          "<%{INT}>(?P<auth>sshd)\\[%{INT:process_pid}\\]: (?P<applica>pam_krb5)\\[%{INT}\\]: authentication fails for '%{DATA:user_name}' \\(.*@%{DATA:auth_realm}\\): .*\\(%{DATA:error_message}\\)"
          "\\<%{INT}\\>(?P<auth>sshd)\\[%{INT:process_pid}\\]: (?P<applica>input_userauth_request): invalid user %{NOTSPACE:user_name}"
          "\\<%{INT}\\>(?P<auth>sshd)\\[%{INT:process_pid}\\]: pam_succeed_if\\(sshd:auth\\): (?P<action>error retrieving information) about user %{WORD:user_name}"
          "<%{INT}>(?P<auth>sshd)\\[%{INT:process_pid}\\]: pam_unix\\(sshd:auth\\): .* user %{NOTSPACE:user_name}"
          "pam_succeed_if\\((?P<auth>sshd):auth\\): (?P<action>error retrieving information) about user %{WORD:username}"
         # "\\<%{INT}\\>sshd\\[%{INT}\\]: (?P<applica>pam_succeed_if)\\(%{DATA:application}:%{DATA}\\): %{GREEDYDATA:description}"
          "%{IP:srcIp} %{GREEDYDATA}"
        ]
      }
      overwrite => ["srcIp", "sessionid", "filepath", "appproto", "email", "mailid", "secsummary", "auth", "srcPort", "process_pid", "applica", "dst_ip", "dst_port", "username", "user_name", "kvdata", "action_data", "action", "error_message", "auth_realm"]
      on_error => "audit_message_grok_fail"
    }
    if [sessionid] != "" {
      mutate {
        replace => {
          "network.session_id" => "%{sessionid}"
        }
        on_error => "no_session_id"
      }
    }
    if [mailid] != "" {
      mutate {
        replace => {
          "network.email.mail_id" => "%{mailid}"
        }
        on_error => "no_resource_messageId"
      }
    }
    if [email] =~ "^.+@.+$" {
      mutate {
        merge => {
          "event.idm.read_only_udm.principal.user.email_addresses" => "email"
        }
        on_error => "no_resource_email"
      }
    }
    grok {
      match => {
        "audit_message" => [
          "\\<%{INT}\\>sshd\\[%{INT}\\]: %{GREEDYDATA:msg_desc}",
        ]
      }
      overwrite => ["msg_desc"]
      on_error => "audit_grok_fail"
    }
    if [auth_realm] != "" {
      mutate {
        replace => {
          "auth_realm_field.value.string_value" => "%{auth_realm}"
        }
        on_error => "auth_realm_empty"
      }
      if ![auth_realm_empty] {
        mutate {
          replace => {
            "auth_realm_field.key" => "Terminal"
          }
        }
        mutate {
          merge => {
            "event.idm.read_only_udm.additional.fields" => "auth_realm_field"
          }
          on_error => "auth_realm_field_merge_fail"
        }
      }
    }
    if [user_name] != "" {
      if [user_name] =~ "^.+@.+$" {
        mutate {
          merge => {
            "event.idm.read_only_udm.principal.user.email_addresses" => "user_name"
          }
          on_error => "user_name_email_addresses_merge_fail"
        }
      }
      mutate {
        replace => {
          "event.idm.read_only_udm.principal.user.userid" => "%{user_name}"
          "principal_user_present" => "true"
        }
        on_error => "user_name_empty"
      }
    }
    if [applica] == "pam_krb5" {
      mutate {
        replace => {
          "metadata.product_event_type" => "%{applica}"
        }
        on_error => "applica_empty"
      }
      if [user_name] != "" {
        mutate {
          replace => {
            "target.user.userid" => "%{user_name}"
            "target_user_present" => "true"
          }
          on_error => "user_name_empty"
        }
      }
    }
    if [audit_message] =~ "pam_krb5.*authentication fails for" {
      mutate {
        replace => {
          "metadata.product_event_type" => "PAM_KRB5_AUTH_ERROR"
        }
      }
    }
    if [audit_message] =~ "Received disconnect" {
      mutate {
        replace => {
          "metadata.product_event_type" => "DISCONNECT"
        }
      }
    }
    else if [audit_message] =~ "(?i)Invalid user" {
      mutate {
        replace => {
          "metadata.product_event_type" => "INVALID_USER"
        }
      }
    }
    else if [audit_message] =~ "pam_succeed_if.*error retrieving information about" {
      mutate {
        replace => {
          "metadata.product_event_type" => "PAM_AUTH_ERROR"
        }
      }
      if [user_name] != "" {
        mutate {
          replace => {
            "target.user.userid" => "%{user_name}"
            "target_user_present" => "true"
          }
          on_error => "user_name_empty"
        }
      }
    }
    else if [audit_message] =~ "error getting information about" and [applica] == "pam_krb5" {
      mutate {
        replace => {
          "metadata.product_event_type" => "PAM_KRB5_AUTH_ERROR"
        }
      }
    }
    else if [audit_message] =~ "pam_unix.*check pass" {
      mutate {
        replace => {
          "metadata.product_event_type" => "PAM_UNIX_AUTH_ERROR"
        }
      }
    }
    if [auth] =~ "sshd" and [audit_message] =~ "(error resolving|error getting information|authentication fails)" {
      mutate {
        replace => {
          "authentication_protocol_field.key" => "authentication_protocol"
          "authentication_protocol_field.value" => "Kerberos"
        }
      }
      mutate {
        merge => {
          "security_result.detection_fields" => "authentication_protocol_field"
        }
        on_error => "authentication_protocol_field_merge_fail"
      }
    }
    if [auth] =~ "sshd" and [audit_message] =~ "(Invalid user|invalid user|error resolving|error retrieving|error getting information|authentication fails|check pass)" {
      mutate {
        replace => {
          "security_result.action_details" => "FAILURE"
        }
        on_error => "action_data_empty"
      }
    }
    if [auth] =~ "sshd" and [audit_message] =~ "check pass" {
      mutate {
        replace => {
          "authentication_mechanism_field.key" => "authentication_mechanism"
          "authentication_mechanism_field.value" => "PAM_UNIX"
        }
      }
      mutate {
        merge => {
          "security_result.detection_fields" => "authentication_mechanism_field"
        }
        on_error => "authentication_protocol_field_merge_fail"
      }
    }
    if [auth] =~ "sshd" and [audit_message] =~ "error retrieving" {
      mutate {
        replace => {
          "authentication_mechanism_field.key" => "authentication_mechanism"
          "authentication_mechanism_field.value" => "PAM"
        }
      }
      mutate {
        merge => {
          "security_result.detection_fields" => "authentication_mechanism_field"
        }
        on_error => "authentication_protocol_field_merge_fail"
      }
    }
    if [auth] =~ "sshd" and [audit_message] =~ "(error getting information|authentication fails)" {
      mutate {
        replace => {
          "authentication_mechanism_field.key" => "authentication_mechanism"
          "authentication_mechanism_field.value" => "PAM_KRB5"
        }
      }
      mutate {
        merge => {
          "security_result.detection_fields" => "authentication_mechanism_field"
        }
        on_error => "authentication_protocol_field_merge_fail"
      }
    }
    if [auth] =~ "sshd" and [audit_message] =~ "Bye Bye" {
      mutate {
        replace => {
          "connection_state_field.key" => "connection_state"
          "connection_state_field.value" => "DISCONNECTED"
        }
      }
      mutate {
        merge => {
          "security_result.detection_fields" => "connection_state_field"
        }
        on_error => "connection_state_field_merge_fail"
      }
    }
    if [auth] != "" {
      mutate {
        replace => {
          "event.idm.read_only_udm.principal.process.command_line" => "%{auth}"
        }
        on_error => "auth_empty"
      }
    }
    if [process_pid] != "" {
      mutate {
        replace => {
          "event.idm.read_only_udm.principal.process.pid" => "%{process_pid}"
        }
        on_error => "process_pid_empty"
      }
    }
    if [auth] =~ "ssh" {
      mutate {
        replace => {
          "network.application_protocol" => "SSH"
        }
      }
    }
    if [appproto] =~ "SMTP" {
      mutate {
        replace => {
          "network.application_protocol" => "SMTP"
        }
      }
    }
    if [error_message] != "" {
      mutate {
        replace => {
          "metadata.description" => "%{error_message}"
        }
        on_error => "error_message_not_set"
      }
    }
  }

  if [msg_desc] != "" {
    mutate {
      replace => {
        "security_result.summary" => "%{msg_desc}"
      }
      on_error => "msg_desc_empty"
    }
  }
  if [secsummary] != "" {
    mutate {
      replace => {
        "security_result.summary" => "%{secsummary}"
      }
      on_error => "secsummary_empty"
    }
  }
  if [applica] != "" {
    mutate {
      replace => {
        "event.idm.read_only_udm.principal.application" => "%{applica}"
      }
      on_error => "applica_empty"
    }
  }
  if [kvdata] != "" {
    kv {
      source => "kvdata"
      value_split => "="
      field_split => " "
      on_error => "kv_data_failure"
    }
    if [rhost] != "" {
      grok {
        match => {
          "rhost" => "%{IP:rhost}"
        }
        overwrite => ["rhost"]
        on_error => "rhost_ip_failure"
      }
      if ![rhost_ip_failure] {
        mutate {
          merge => {
            "event.idm.read_only_udm.principal.ip" => "rhost"
            "event.idm.read_only_udm.principal.asset.ip" => "rhost"
          }
          on_error => "invalid_principal_ip"
        }
        if ![invalid_principal_ip] {
          mutate {
            replace => {
              "has_principal" => "true"
            }
          }
        }
      }
      else if [rhost] != "" {
        mutate {
          merge => {
            "event.idm.read_only_udm.principal.hostname" => "%{rhost}"
            "event.idm.read_only_udm.principal.asset.hostname" => "%{rhost}"
            "has_principal" => "true"
          }
          on_error => "invalid_rhost"
        }
      }
      mutate {
        replace => {
          "event_type" => "STATUS_UPDATE"
        }
      }
    }
  }
  if [action_data] in ["authentication failure", "Authentication failure", "Failed password", "Connection closed"] {
    mutate {
      replace => {
        "security_result.action_details" => "%{action_data}"
        "action" => "BLOCK"
      }
      on_error => "action_data_empty"
    }
    mutate {
      merge => {
        "security_result.action" => "action"
      }
      on_error => "action_empty"
    }
  }
  else if [action_data] in ["Accepted password", "authentication success"] {
    mutate {
      replace => {
        "security_result.action_details" => "%{action_data}"
        "action" => "ALLOW"
      }
      on_error => "action_data_empty"
    }
    mutate {
      merge => {
        "security_result.action" => "action"
      }
      on_error => "action_empty"
    }
  }
  if [tty] == "ssh" or [tty] == "ssh2" {
    mutate {
      replace => {
        "network.application_protocol" => "SSH"
      }
    }
  }

  if [ruser] != "" {
    mutate {
      replace => {
        "event.idm.read_only_udm.principal.user.userid" => "%{ruser}"
        "principal_user_present" => "true"
      }
      on_error => "ruser_empty"
    }
  }
  if [srcPort] != "" and [source_port] == "" {
    mutate {
      convert => {
        "srcPort" => "integer"
      }
    }
    mutate {
      rename => {
        "srcPort" => "event.idm.read_only_udm.principal.port"
      }
    }
  }
  if [srcIp]  =~ "^(?:(25[0-5]|2[0-4][0-9]|1[0-9]{2}|[1-9]?[0-9])\.){3}(25[0-5]|2[0-4][0-9]|1[0-9]{2}|[1-9]?[0-9])$" and [source_ip] == "" {
    grok {
      match => {
        "srcIp" => [
          "%{DATA}:%{IP:srcIp}",
          "%{IP:srcIp}"
        ]
      }
      overwrite => ["srcIp"]
      on_error => "srcIp_invalid"
    }
    mutate {
      merge => {
        "event.idm.read_only_udm.principal.ip" => "srcIp"
        "event.idm.read_only_udm.principal.asset.ip" => "srcIp"
      }
      on_error => "srcIp_invalid"
    }
    if ![srcIp_invalid] {
      mutate {
        replace => {
          "has_principal" => "true"
        }
      }
    }
    mutate {
      replace => {
        "event_type" => "STATUS_UPDATE"
      }
    }
  }
  if [username] != "" and [username] !~ "resolving" {
    mutate {
      replace => {
        "target.user.userid" => "%{username}"
        "event_type" => "USER_LOGIN"
        "event.idm.read_only_udm.extensions.auth.type" => "AUTHTYPE_UNSPECIFIED"
      }
      on_error => "username_empty"
    }
  }
  if ([principal_user_present] == "true" or [target_user_present] == "true" ) {
    mutate {
      replace => {
        "event_type" => "USER_UNCATEGORIZED"
      }
    }
  }

  mutate {
    replace => {
      "labels_hostname" => "%{labels.compute.googleapis.com/resource_name}"
    }
    on_error => "no_labels_resource_name"
  }

  if [labels_hostname] != "" {
    mutate {
      replace => {
        "principal_hostname" => "%{labels_hostname}"
      }
      on_error => "no_labels_hostname"
    }
  }

  if [principal_hostname] != "" {
    mutate {
      replace => {
        "has_principal" => "true"
      }
    }
  }
  if ![audit_grok_fail] {
    grok {
      match => {
        "audit_message" => [
          "%{SYSLOGTIMESTAMP} %{NOTSPACE} node=%{HOSTNAME:dvc} .*?%{WORD}(\\[%{INT}\\]|)(?::\\s+|)"
          "%{SYSLOGTIMESTAMP} %{DATA:dvc} .*?%{WORD}(\\[%{INT}\\]|)(?::\\s+|)"
        ]
      }
      overwrite => ["dvc"]
      on_error => "grok_fail"
    }
    if ![grok_fail] {
      grok {
        match => {
          "dvc" => "%{IP:dvc}"
        }
        overwrite => ["dvc"]
        on_error => "dvc_not_ip"
      }
      if [dvc_not_ip] {
        mutate {
          rename => {
            "dvc" => "intermediary.hostname"
          }
        }
      } else {
        mutate {
          merge => {
            "intermediary.ip" => "dvc"
          }
          on_error => "invalid_dvc"
        }
      }
      mutate {
        merge => {
          "event.idm.read_only_udm.intermediary" => "intermediary"
        }
      }
    }
    date {
      match => ["event_timestamp", "UNIX"]
      on_error => "event_timestamp_format_failure"
    }
    mutate {
      replace => {
        "metadata.product_log_id" => "%{product_log_id}"
      }
      on_error => "product_log_id_empty"
    }
    # intializing the structs
    mutate {
      replace => {
        "type_syscall" => ""
        "type_execve" => ""
        "type_path0" => ""
        "type_path1" => ""
        "type_name" => ""
      }
    }

    ### PATH ###
    if [audit_message] =~ ("type=PATH|type=SECCOMP") {
      mutate {
        replace => {
          "has_target" => "false"
          "has_principal" => "false"
        }
      }
      mutate {
        replace => {
          "type_name" => "PATH"
        }
      }
      ### Item: 1 (src)
      grok {
        match => {
          "audit_message" => [
            "type=PATH (?P<type_path1>.*?item=(1|3).*)( type=|$)"
          ]
        }
        overwrite => ["type_path1"]
        on_error => "not_contains_type_path1"
      }
      if ![not_contains_type_path1] {
        mutate {
          gsub => ["type_path1", " type=.*", ""]
        }
        kv {
          source => "type_path1"
          target => "type_path1_props"
          trim_value => '"'
          on_error => "trim_value_not_found_type_path1"
        }
        mutate {
          rename => {
            "type_path1_props.name" => "src.file.full_path"
          }
          replace => {
            "event_type" => "GENERIC_EVENT"
          }
        }
      }
      ### Item: 0 (target)
      grok {
        match => {
          "audit_message" => [
            "type=PATH (?P<type_path0>.*?item=(0|2|4).*)( type=|$)"
          ]
        }
        overwrite => ["type_path0"]
        on_error => "not_contains_type_path0"
      }
      if ![not_contains_type_path0] {
        mutate {
          gsub => ["type_path0", " type=.*", ""]
        }
        kv {
          source => "type_path0"
          target => "type_path0_props"
          trim_value => '"'
          on_error => "trim_value_not_found_type_path0"
        }
        grok {
          match => {
            "audit_message" => [
              "%{SYSLOGTIMESTAMP} %{NOTSPACE} node=%{HOSTNAME:dvc} .*?%{WORD}(\\[%{INT}\\]|)(?::\\s+|)"
              "%{SYSLOGTIMESTAMP} %{DATA:dvc} .*?%{WORD}(\\[%{INT}\\]|)(?::\\s+|)"
            ]
          }
          overwrite => ["dvc"]
          on_error => "dvc_not_present"
        }
        if ![dvc_not_present] {
          mutate {
            replace => {
              "principal_hostname" => "%{dvc}"
              "has_principal" => "true"
            }
          }
        }
        mutate {
          replace => {
            "target_file_full_path" => "%{type_path0_props.name}"
          }
          on_error => "target_not_set"
        }
      }
      if [target_file_full_path] != "" {
        mutate {
          replace => {
            "target.file.full_path" => "%{target_file_full_path}"
          }
        }
      }
      if [principal_hostname] != "" and [target_file_full_path] != "" {
        mutate {
          replace => {
            "event_type" => "FILE_OPEN"
          }
        }
      }
      else if [principal_hostname] != "" and [target_file_full_path] != "" {
        mutate {
          replace => {
            "event_type" => "STATUS_UPDATE"
          }
        }
      }
      else {
        mutate {
          replace => {
            "event_type" => "GENERIC_EVENT"
          }
        }
      }
    }
    ### end PATH
    ### EXECVE ###
    if [audit_message] =~ "type=EXECVE" {
      mutate {
        replace => {
          "type_name" => "EXECVE"
        }
      }
      grok {
        match => {
          "audit_message" => [
            "type=EXECVE %{GREEDYDATA:type_execve}( type=|$)"
          ]
        }
        on_error => "type_execve_failure"
        overwrite => ["type_execve"]
      }
      mutate {
        gsub => ["type_execve", " type=.*", ""]
      }
      # find all numbered args
      mutate {
        convert => {
          "indicator.a2" => "hextoascii"
        }
        on_error => "invalid_a2"
      }
      grok {
        match => {
          "type_execve" => "(?P<args>a\\d+=.+)( [^a]|$)"
        }
        on_error => "args_failure"
        overwrite => ["args"]
      }
      # get all arg values
      mutate {
        gsub => ["args", 'a\\d+="(.+?)"', "$1"]
      }
      if ![invalid_a2] {
        grok {
          match => {
            "args" => "%{GREEDYDATA:args_start} a2=%{DATA:a2data}( %{GREEDYDATA:args_rest})?"
          }
          overwrite => ["args_start","a2data","args_rest"]
          on_error => "args_failure"
        }
        if ![args_failure] {
          if [args_rest] != "" {
            mutate {
              replace => {
                "args" => "%{args_start} %{indicator.a2} %{args_rest}"
              }
              on_error => "args_failure"
            }
          }
          else {
            mutate {
              replace => {
                "args" => "%{args_start} %{indicator.a2}"
              }
              on_error => "args_failure"
            }
          }
        }
      }
      mutate {
        rename => {
          "args" => "target.process.command_line"
        }
      }
      if [principal_user_present] == "true" or [target_user_present] == "true" or [has_principal] == "true" {
        mutate {
          replace => {
            "event_type" => "USER_RESOURCE_ACCESS"
          }
        }
      }
    }
    ### end EXECVE
    ### SYSCALL
    ### LOGIN / USER_LOGIN / USER_ACCT / USER_ROLE_CHANGE / USER_START / USER_AUTH
    ### USER_END / USER_LOGOUT
    ### CRED_ACQ / CRED_DISP / CRED_REFR
    ### SERVICE_START / SERVICE_STOP
    # Obs: These events must not be together in same entry
    if [audit_message] =~ "type=(SYSCALL|LOGIN|USER_LOGIN|USER_CMD|USER_ACCT|USER_ROLE_CHANGE|USER_START|USER_AUTH|USER_END|USER_LOGOUT|USER_ERR|CRED_ACQ|CRED_DISP|CRED_REFR|SERVICE_START|SERVICE_STOP|DAEMON_END|CONFIG_CHANGE|PROCTITLE|TIME_ADJNTPVAL|SOCKADDR|ADD_USER|USER_MGMT|DEL_USER)" {
      grok {
        match => {
          "audit_message" => "type=(?P<type_name>\\w+)\\s"
        }
        on_error => "grok_type_name_failure"
        overwrite => ["type_name"]
      }
      grok {
        match => {
          "audit_message" => [
            "type=(DEL_USER|SYSCALL|LOGIN|USER_LOGIN|USER_CMD|USER_ACCT|USER_ROLE_CHANGE|USER_START|USER_AUTH|USER_END|USER_LOGOUT|USER_ERR|CRED_ACQ|CRED_DISP|CRED_REFR|SERVICE_START|SERVICE_STOP|DAEMON_END|CONFIG_CHANGE|PROCTITLE|TIME_ADJNTPVAL|ADD_USER|USER_MGMT|SOCKADDR) %{GREEDYDATA:type_syscall}"
          ]
        }
        on_error => "grok_type_syscall_failure"
        overwrite => ["type_syscall"]
      }
      mutate {
        gsub => ["type_syscall", " type=.*", ""]
      }
      grok {
        match => {
          "type_syscall" => "msg='%{GREEDYDATA:acct_msg}'"
        }
        on_error => "no_field_msg_found"
      }
      if ![no_field_msg_found] {
        mutate {
          gsub => ["type_syscall", " msg='.+?'", ""]
        }
        mutate {
          replace => {
            "type_syscall" => "%{type_syscall} %{acct_msg}"
          }
        }
      }
      mutate {
        replace => {
          "type_syscall_props.hostname" => ""
          "type_syscall_props.addr" => ""
          "type_syscall_props.terminal" => ""
          "type_syscall_props.comm" => ""
          "type_syscall_props.res" => ""
          "type_syscall_props.op" => ""
          "type_syscall_props.success" => ""
          "type_syscall_props.exit" => ""
          "type_syscall_props.syscall" => ""
          "type_syscall_props.tty" => ""
          "type_syscall_props.a0" => ""
          "type_syscall_props.a1" => ""
          "type_syscall_props.a2" => ""
          "type_syscall_props.a3" => ""
          "type_syscall_props.auid" => ""
          "type_syscall_props.AUID" => ""
          "type_syscall_props.acct" => ""
          "type_syscall_props.ppid" => ""
          "type_syscall_props.pid" => ""
          "type_syscall_props.cmd" => ""
          "type_syscall_props.exe" => ""
          "type_syscall_props.proctitle" => ""
          "type_syscall_props.ses" => ""
          "type_syscall_props.UID" => ""
          "type_syscall_props.ID" => ""
          "type_syscall_props.id" => ""
        }
      }
      kv {
        source => "type_syscall"
        target => "type_syscall_props"
        trim_value => '"'
        on_error => "trim_value_not_found_type_syscall"
      }
      if [type_syscall_props][res] != "" and  [type_syscall_props][op] != "" {
        mutate {
          gsub => ["type_syscall_props.op","PAM:",""]
        }
        mutate {
          replace => {
            "security_result.summary" => "%{type_syscall_props.op} %{type_syscall_props.res}"
          }
        }
      }
      if [type_name] in [
        "LOGIN", "USER_LOGIN", "USER_CMD", "USER_ACCT", "USER_ROLE_CHANGE", "USER_START", "USER_AUTH",
        "USER_END", "USER_LOGOUT", "USER_ERR", "CRED_ACQ", "CRED_DISP", "CRED_REFR", "DAEMON_END",
        "CONFIG_CHANGE", "PROCTITLE", "TIME_ADJNTPVAL", "SOCKADDR", "USER_MGMT"
      ] {
        mutate {
          replace => {
            "props_uid" => "%{type_syscall_props.uid}"
          }
          on_error => "props_uid_not_set"
        }
        if ![props_uid_not_set] and [type_syscall_props][uid] != "" {
          mutate {
            replace => {
              "target.user.userid" => "%{type_syscall_props.uid}"
              "target_user_present" => "true"
            }
            on_error => "target_user_not_set"
          }
        }
      } else {
        mutate {
          replace => {
            "principal_user_userid" => "%{type_syscall_props.uid}"
          }
          on_error => "principal_user_not_set"
        }
        if not [principal_user_not_set] {
          mutate {
            replace => {
              "principal_user_present" => "true"
            }
          }
        }
      }

      if [type_name] == "DEL_USER" and [type_syscall_props][id] != "" {
        mutate {
          replace => {
            "target.user.userid" => "%{type_syscall_props.id}"
          }
          on_error => "invalid_type_syscall_props_id"
        }
        if not [invalid_type_syscall_props_id] {
          mutate {
            replace => {
              "target_user_present" => "true"
            }
          }
        }
      }

      if [type_syscall_props][ID] != "" {
        mutate {
          replace => {
            "target.user.user_display_name" => "%{type_syscall_props.ID}"
          }
          on_error => "invalid_type_syscall_props_id"
        }
      }

      if [type_name] in ["DEL_USER","ADD_USER"] and [type_syscall_props][UID] != "" {
        mutate {
          replace => {
            "event.idm.read_only_udm.principal.user.user_display_name" => "%{type_syscall_props.UID}"
          }
          on_error => "invalid_type_syscall_props_uid"
        }
      }
      else if [type_syscall_props][UID] in ["0","root"] {
        mutate {
          replace => {
            "principal_user_userid" => "%{type_syscall_props.UID}"
          }
          on_error => "invalid_type_syscall_props_uid"
        }
        if not [invalid_type_syscall_props_uid] {
          mutate {
            replace => {
              "principal_user_present" => "true"
            }
          }
        }
      }
      if [type_syscall_props][terminal] != "" {
        mutate {
          replace => {
            "event.idm.read_only_udm.principal.application" => "%{type_syscall_props.terminal}"
          }
          on_error => "invalid_type_syscall_props_terminal"
        }
      }
      else if [type_syscall_props][comm] != "" {
        mutate {
          replace => {
            "event.idm.read_only_udm.principal.application" => "%{type_syscall_props.comm}"
          }
          on_error => "invalid_type_syscall_props_comm"
        }
      }
      if [type_syscall_props][ppid] != "" {
        mutate {
          replace => {
            "event.idm.read_only_udm.principal.process.parent_process.pid" => "%{type_syscall_props.ppid}"
          }
        }
      }
      if [type_name] == "ADD_USER" and [type_syscall_props][acct] != "" {
        mutate {
          replace => {
            "target.user.user_display_name" => "%{type_syscall_props.acct}"
          }
          on_error => "invalid_type_syscall_props_acct"
        }
        mutate {
          replace => {
            "target.user.userid" => "%{type_syscall_props.acct}"
          }
          on_error => "invalid_type_syscall_props_acct_userid"
        }
        if not [invalid_type_syscall_props_acct_userid] {
          mutate {
            replace => {
              "target_user_present" => "true"
            }
          }
        }
      }
      else if [type_syscall_props][acct] != "" {
        mutate {
          replace => {
            "event.idm.read_only_udm.principal.user.user_display_name" => "%{type_syscall_props.acct}"
          }
        }
      }
      if [type_syscall_props][pid] != "" {
        mutate {
          replace => {
            "event.idm.read_only_udm.principal.process.pid" => "%{type_syscall_props.pid}"
          }
        }
      }
      if [type_syscall_props][cmd] != "" {
        mutate {
          replace => {
            "event.idm.read_only_udm.principal.process.command_line" => "%{type_syscall_props.cmd}"
          }
        }
      }
      if [type_syscall_props][exe] != "" {
        mutate {
          replace => {
            "target.process.file.full_path" => "%{type_syscall_props.exe}"
          }
          on_error => "invalid_type_syscall_props_exe"
        }
        if not [invalid_type_syscall_props_exe] {
          mutate {
            replace => {
              "has_target" => "true"
            }
          }
        }
      }
      else if [type_syscall_props][proctitle] != "" {
        mutate {
          replace => {
            "proctitle_value" => "%{type_syscall_props.proctitle}"
          }
        }
        grok {
          match => {
            "message" => [
              "proctitle=(?P<proctitle_value>[a-fA-F0-9]+)"
            ]
          }
          overwrite => ["proctitle_value"]
          on_error => "no_proctitle"
        }
        if ![no_proctitle] {
          if "proctitle_value" != "" {
            mutate {
                convert => {
                  "proctitle_value" => "hextoascii"
                }
                on_error => "error_hextoascii"
            }
            if ![error_hextoascii] {
            # the hextoascii plugin converts null to \\u000
              mutate {
                gsub => ["proctitle_value", "[\\000]", " "]
              }
            }
          }
        }
        grok {
          match => {
            "proctitle_value" => "%{DATA:proctitle_value} --domain %{HOSTNAME:principal_hostname}"
          }
          overwrite => ["proctitle_value", "principal_hostname"]
          on_error => "no_proctitle"
        }
        mutate {
          replace => {
            "target.process.file.full_path" => "%{proctitle_value}"
          }
        }
        mutate {
          replace => {
            "event.idm.read_only_udm.principal.process.command_line" => "%{proctitle_value}"
          }
          on_error => "invalid_proctitle_value"
        }
        mutate {
          replace => {
            "event.idm.read_only_udm.principal.process.file.full_path" => "%{proctitle_value}"
          }
          on_error => "invalid_proctitle_value"
        }
        grok {
          match => {
            "proctitle_value" => ".*\\/(?P<filename>.*)"
          }
          overwrite => ["filename"]
          on_error => "invalid_proctitle_value"
        }
        if [filename] != "" {
          mutate {
            merge => {
              "event.idm.read_only_udm.principal.process.file.names" => "filename"
            }
            on_error => "file_name_empty"
          }
        }
      }
      if [type_syscall_props][ses] != "" {
        mutate {
          replace => {
            "network.session_id" => "%{type_syscall_props.ses}"
          }
        }
      }
      if [type_syscall_props][auid] != "" {
        mutate {
          replace => {
            "about.user.userid" => "%{type_syscall_props.auid}"
          }
          on_error => "invalid_auid"
        }
        if not [invalid_auid] {
          mutate {
            replace => {
              "about_userid_set" => "true"
            }
          }
        }
      }
      if [type_syscall_props][AUID] != "" {
        mutate {
          replace => {
            "about.user.user_display_name" => "%{type_syscall_props.AUID}"
          }
        }
      }
      if [type_syscall_props][success] == "yes" {
        mutate {
          replace => {
            "security_result.summary" => "%{type_syscall_props.success}, The System call succeeded"
          }
        }
      } else if [type_syscall_props][success] == "no" {
        mutate {
          replace => {
            "security_result.summary" => "%{type_syscall_props.success}, The System call could not succeed"
          }
        }
      }
      if [type_syscall_props][exit] != "" {
        mutate {
          replace => {
            "exit_label.key" => "Exit Code"
            "exit_label.value" => "%{type_syscall_props.exit}"
          }
        }
        mutate {
          merge => {
            "security_result.about.labels" => "exit_label"
          }
        }
      }
      if [type_syscall_props][syscall] != "" {
        mutate {
          replace => {
            "syscall_label.key" => "Syscall"
            "syscall_label.value" => "%{type_syscall_props.syscall}"
          }
        }
        mutate {
          merge => {
            "security_result.about.labels" => "syscall_label"
          }
        }
      }
      if [type_syscall_props][tty] not in ["","(none)"] {
        mutate {
          replace => {
            "tty_label.key" => "tty"
            "tty_label.value" => "%{type_syscall_props.tty}"
          }
        }
        mutate {
          merge => {
            "security_result.about.labels" => "tty_label"
          }
        }
      }
      if [type_syscall_props][a0] != "" {
        mutate {
          replace => {
            "a0_label.key" => "a0"
            "a0_label.value" => "%{type_syscall_props.a0}"
          }
        }
        mutate {
          merge => {
            "security_result.about.labels" => "a0_label"
          }
        }
      }
      if [type_syscall_props][a1] != "" {
        mutate {
          replace => {
            "a1_label.key" => "a1"
            "a1_label.value" => "%{type_syscall_props.a1}"
          }
        }
        mutate {
          merge => {
            "security_result.about.labels" => "a1_label"
          }
        }
      }
      if [type_syscall_props][a2] != "" {
        mutate {
          replace => {
            "a2_label.key" => "a2"
            "a2_label.value" => "%{type_syscall_props.a2}"
          }
        }
        mutate {
          merge => {
            "security_result.about.labels" => "a2_label"
          }
        }
      }
      if [type_syscall_props][a3] != "" {
        mutate {
          replace => {
            "a3_label.key" => "a3"
            "a3_label.value" => "%{type_syscall_props.a3}"
          }
        }
        mutate {
          merge => {
            "security_result.about.labels" => "a3_label"
          }
        }
      }
      if [type_syscall_props][res] =~ "success" {
        mutate {
          replace => {
            "security_action" => "ALLOW"
          }
        }
      }
      if [security_action] != "" {
        mutate {
          replace => {
            "security_result.action_details" => "%{type_syscall_props.res}"
          }
          merge => {
            "security_result.action" => "security_action"
          }
        }
      }
      mutate {
        replace => {
          "auid_field.value" => "%{type_syscall_props.auid}"
        }
        on_error => "no_auid_value"
      }
      if ![no_auid_value] and [type_syscall_props][auid] != "" {
        mutate {
          replace => {
            "auid_field.key" => "auid"
            "auid_detection_set" => "true"
          }
        }
        mutate {
          merge => {
            "security_result.detection_fields" => "auid_field"
          }
        }
      }
      mutate {
        replace => {
          "cwd_field.value" => "%{type_syscall_props.cwd}"
        }
        on_error => "no_cwd_value"
      }
      if ![no_cwd_value] {
        mutate {
          replace => {
            "cwd_field.key" => "cwd"
          }
        }
        mutate {
          merge => {
            "security_result.detection_fields" => "cwd_field"
          }
        }
      }
      mutate {
        replace => {
          "has_principal_id" => "false"
        }
      }
      if [type_syscall_props][addr] != "" {
        mutate {
          replace => {
            "has_principal_id" => "true"
          }
        }
        grok {
          match => {
            "type_syscall_props.addr" => "%{IP:prin_ip}"
          }
          on_error => "invalid_ip"
        }
        if ![invalid_ip] {
          mutate {
            merge => {
              "event.idm.read_only_udm.principal.ip" => "prin_ip"
            }
          }
          mutate {
            replace => {
              "has_principal" => "true"
            }
          }
        }
      }
      if [type_syscall_props][hostname] != "" {
        grok {
          match => {
            "type_syscall_props.hostname" => "%{IP:principalIP}"
          }
          on_error => "is_not_ip"
        }
        if [is_not_ip] {
          mutate {
            replace => {
              "has_principal_id" => "true"
              "principal_hostname" => "%{type_syscall_props.hostname}"
              "has_principal" => "true"
            }
          }
        }
      }
      mutate {
        replace => {
          "principal_host_available" => "%{hostname}"
        }
        on_error => "principal_hostname_not_found"
      }
      if [principal_host_available] != "" {
        mutate {
          replace => {
            "has_principal_id" => "true"
            "has_principal" => "true"
          }
        }
      }
      # Set "event_type"
      if [has_principal_id] == "false" {
        mutate {
          replace => {
            "event_type" => "GENERIC_EVENT"
          }
        }
      }
      if [type_name] == "USER_LOGIN" and ([principal_user_present] == "true" or [target_user_present] == "true" or [has_principal] == "true" ) {
        mutate {
          replace => {
            "event_type" => "USER_LOGIN"
            "extensions.auth.type" => "MACHINE"
          }
        }
      }
      else if [type_name] in ["LOGIN", "USER_START", "USER_AUTH", "CRED_ACQ", "CRED_REFR", "USER_CMD"] and [target_user_present] == "true" {
        mutate {
          replace => {
            "event_type" => "USER_LOGIN"
            "extensions.auth.type" => "AUTHTYPE_UNSPECIFIED"
          }
        }
      }
      else if [type_name] == "ADD_USER" and ([principal_user_present] == "true" and [target_user_present] == "true" ) and [has_principal] == "true" {
        mutate {
          replace => {
            "event_type" => "USER_CREATION"
          }
        }
      }
      else if [type_name] == "ADD_USER" and ([principal_user_present] == "true" or [target_user_present] == "true" ) {
        mutate {
          replace => {
            "event_type" => "USER_UNCATEGORIZED"
          }
        }
      }
      else if [type_name] == "USER_LOGOUT" and ([principal_user_present] == "true" or [target_user_present] == "true" or [has_principal] == "true" ) {
        mutate {
          replace => {
            "event_type" => "USER_LOGOUT"
            "extensions.auth.type" => "MACHINE"
          }
        }
      }
      else if [type_name] in ["USER_END", "USER_ERR", "CRED_DISP"] and ([principal_user_present] == "true" or [target_user_present] == "true" or [has_principal] == "true" ) {
        mutate {
          replace => {
            "event_type" => "USER_LOGOUT"
            "extensions.auth.type" => "AUTHTYPE_UNSPECIFIED"
          }
        }
      }
      else if [type_name] == "DEL_USER" and [target] != "" and ([principal_user_present] == "true" or [target_user_present] == "true" ) and [has_principal] == "true" {
        mutate {
          replace => {
            "event_type" => "USER_DELETION"
          }
        }
      } else if [type_name] == "DEL_USER" and ([principal_user_present] == "true" or [target_user_present] == "true" ) {
        mutate {
          replace => {
            "event_type" => "USER_UNCATEGORIZED"
          }
        }
      }
      else if [type_name] in ["USER_ACCT", "USER_ROLE_CHANGE","USER_MGMT"] {
        mutate {
          replace => {
            "target.resource.type" => "SETTING"
          }
        }
        if [has_principal_id] == "true" {
          mutate {
            replace => {
              "event_type" => "SETTING_MODIFICATION"
            }
          }
        }
        else if ([principal_user_present] == "true" or [target_user_present] == "true" or [has_principal] == "true" ) {
          mutate {
            replace => {
              "event_type" => "USER_UNCATEGORIZED"
            }
          }
        }
        if [type_name] == "USER_ROLE_CHANGE" and ([principal_user_present] == "true" or [target_user_present] == "true" or [has_principal] == "true" ) {
          mutate {
            replace => {
              "event_type" => "USER_CHANGE_PERMISSIONS"
            }
          }
        }
      }
      else if [type_name] == "DAEMON_END" {
        mutate {
          replace => {
            "event_type" => "STATUS_SHUTDOWN"
            "principal_hostname"   => "UNKNOWN"
          }
        }
      }
      else if [type_name] == "CONFIG_CHANGE" and ([principal_user_present] == "true" or [target_user_present] == "true" or [has_principal] == "true" ) {
        mutate {
          replace => {
            "event_type" => "USER_RESOURCE_ACCESS"
          }
        }
      }
      else if [type_name] in ["PROCTITLE", "TIME_ADJNTPVAL", "SOCKADDR"] {
        grok {
          match => {
            "audit_message" => "%{SYSLOGTIMESTAMP} %{DATA:dvc} .*?%{WORD}(\\[%{INT}\\]|)(?::\\s+|)"
          }
          overwrite => ["dvc"]
          on_error => "dvc_not_present"
        }
        if ![dvc_not_present] {
          mutate {
            replace => {
              "principal_hostname" => "%{dvc}"
            }
          }
        }
        mutate {
          replace => {
            "event_type" => "STATUS_UPDATE"
          }
        }

        if [dvc_not_present] {
          mutate {
            replace => {
              "event_type" => "GENERIC_EVENT"
            }
          }
        }
      }
      else if [type_name] in ["SERVICE_START", "SERVICE_STOP"] {
        if [has_principal_id] == "true" {
          mutate {
            replace => {
              "event_type" => "%{type_name}"
            }
          }
        }
        else if ([principal_user_present] == "true" or [target_user_present] == "true" or [has_principal] == "true" ) {
          mutate {
            replace => {
              "event_type" => "USER_RESOURCE_ACCESS"
            }
          }
        }
      }
      else if [has_principal_id] == "true" {
        mutate {
          replace => {
            "event_type" => "PROCESS_LAUNCH"
          }
        }
      }
    }
    ### end SYSCALL etc.
    ### CRYPTO_SESSION
    if [audit_message] =~ "type=(CRYPTO_SESSION|CRYPTO_KEY_USER)" {
      grok {
        match => {
          "audit_message" => [
            "type=(?P<type_name>(CRYPTO_SESSION|CRYPTO_KEY_USER)) %{GREEDYDATA:type_crypto}( type=|$)"
          ]
        }
        overwrite => ["type_name", "type_crypto"]
      }
      mutate {
        gsub => ["type_crypto", " type=.*", ""]
      }
      grok {
        match => {
          "type_crypto" => "msg='%{GREEDYDATA:acct_msg}'"
        }
        on_error => "no_field_msg_found"
      }
      if ![no_field_msg_found] {
        mutate {
          gsub => ["type_crypto", " msg='.+?'", ""]
        }
        mutate {
          replace => {
            "type_crypto" => "%{type_crypto} %{acct_msg}"
          }
        }
      }
      mutate {
        replace => {
          "type_crypto_props.laddr" => ""
          "type_crypto_props.addr" => ""
          "type_crypto_props.direction" => ""
          "type_crypto_props.cipher" => ""
          "type_crypto_props.pfs" => ""
        }
      }
      kv {
        source => "type_crypto"
        target => "type_crypto_props"
        trim_value => '"'
        on_error => "trim_value_not_found_type_crypto"
      }
      mutate {
        replace => {
          "network.application_protocol" => "SSH"
          "network.ip_protocol" => "TCP"
        }
      }
      if [type_crypto_props][cipher] != "" {
        mutate {
          replace => {
            "network.tls.cipher" => "%{type_crypto_props.cipher}"
          }
        }
      }
      if [type_crypto_props][pfs] != "" {
        mutate {
          replace => {
            "network.tls.curve" => "%{type_crypto_props.pfs}"
          }
        }
      }
      mutate {
        convert => {
          "type_crypto_props.ksize" => "uinteger"
        }
        on_error => "not_an_integer"
      }
      if ![not_an_integer] {
        mutate {
          rename => {
            # ksize = key size
            "type_crypto_props.ksize" => "network.sent_bytes"
          }
        }
      }
      if [type_crypto_props][hostname] != "" {
        mutate {
          replace => {
            "target.hostname" => "%{type_crypto_props.hostname}"
            "target.asset.hostname" => "%{type_crypto_props.hostname}"
          }
          on_error => "no_type_crypto_props"
        }
      }
      mutate {
        rename => {
          "type_crypto_props.pid" => "target.process.pid"
          "type_crypto_props.terminal" => "target.application"
          "type_crypto_props.exe" => "target.process.file.full_path"
        }
      }
      mutate {
        replace => {
         "event.idm.read_only_udm.principal.process.pid" => "%{type_crypto_props.spid}"
        }
        on_error => "no_type_crypto_props.spid"
      }
      mutate {
        rename => {
          "type_crypto_props.rport" => "target.port"
        }
      }
      mutate {
        convert => {
          "target.port" => "integer"
        }
      }
      mutate {
        rename => {
          "type_crypto_props.lport" => "event.idm.read_only_udm.principal.port"
        }
      }
      mutate {
        convert => {
          "event.idm.read_only_udm.principal.port" => "integer"
        }
      }
      mutate {
        replace => {
          "target.user.userid" => "%{type_crypto_props.uid}"
        }
        on_error => "invalid_type_crypto_props_uid"
      }
      if not [invalid_type_crypto_props_uid] {
        mutate {
          replace => {
            "target_user_present" => "true"
          }
        }
      }
      mutate {
        replace => {
          "event.idm.read_only_udm.principal.user.userid" => "%{type_crypto_props.suid}"
        }
        on_error => "invalid_type_crypto_props_suid"
      }
      if not [invalid_type_crypto_props_suid] {
        mutate {
          replace => {
            "principal_user_present" => "true"
          }
        }
      }
      if [type_crypto_props][laddr] != "" {
        mutate {
          merge => {
            "event.idm.read_only_udm.principal.ip" => "type_crypto_props.laddr"
          }
          on_error => "invalid_ip"
        }
        if not [invalid_ip] {
          mutate {
            replace => {
              "has_principal" => "true"
            }
          }
        }
      }
      if [type_crypto_props][addr] != "" {
        grok {
          match => {
            "type_crypto_props.addr" => "%{IP:tar_ip}"
          }
          on_error => "invalid_tar_ip"
        }
        if ![invalid_tar_ip] {
          mutate {
            merge => {
              "target.ip" => "tar_ip"
            }
            on_error => "invalid_tar_ip"
          }
          if not [invalid_tar_ip] {
            mutate {
              replace => {
                "has_target" => "true"
              }
            }
          }
        }
      }
      if [type_crypto_props][direction] == "from-client" {
        mutate {
          replace => {
            "network.direction" => "OUTBOUND"
          }
        }
      }
      else if [type_crypto_props][direction] == "from-server" {
        mutate {
          replace => {
            "network.direction" => "INBOUND"
          }
        }
      }
      if [type_crypto_props][res] =~ "success" {
        mutate {
          replace => {
            "action" => "ALLOW"
          }
        }
      }
      else {
        mutate {
          replace => {
            "action" => "BLOCK"
          }
        }
      }
      mutate {
        merge => {
          "security_result.action" => "action"
        }
      }
      mutate {
        rename => {
          "type_crypto_props.res" => "security_result.action_details"
        }
      }
      if [type_crypto_props][laddr] != "" and [type_crypto_props][addr] != "" {
        mutate {
          replace => {
            "event_type" => "NETWORK_CONNECTION"
          }
        }
      }
      else if ([principal_user_present] == "true" or [target_user_present] == "true" or [has_principal] == "true" ) {
        mutate {
          replace => {
            "event_type" => "USER_UNCATEGORIZED"
          }
        }
      }
    }
    # end CRYPTO_SESSION
    ### ANOM_ABEND
    if [audit_message] =~ "type=(ANOM_ABEND)" {
      grok {
        match => {
          "audit_message" => [
            "type=ANOM_ABEND %{GREEDYDATA:type_anom}( type=|$)"
          ]
        }
        on_error => "grok_fail"
      }
      kv {
          source => "type_anom"
          target => "type_anom_props"
          trim_value => '"'
          on_error => "not_kv"
        }
      mutate {
        rename => {
          "type_anom_props.exe" => "target.process.file.full_path"
          "type_anom_props.ses" => "network.session_id"
          "type_anom_props.pid" => "target.process.pid"
        }
      }
      mutate {
        replace => {
          "event.idm.read_only_udm.principal.application" => "%{type_anom_props.comm}"
        }
        on_error => "no_comm"
      }
      mutate {
        replace => {
          "security_result.summary" => "%{type_anom_props.reason}"
        }
        on_error => "reason_empty"
      }

      # ANOM_ABEND: Triggered when a processes ends abnormally.
      if [ip] != "" {
        mutate {
          replace => {
            "event_type" => "PROCESS_TERMINATION"
          }
        }
      }
      else {
        mutate {
          replace => {
            "event_type" => "GENERIC_EVENT"
          }
        }
      }
    }

    if [audit_message] =~ "type=CWD" {
      grok {
        match => {
          "audit_message" => "%{SYSLOGTIMESTAMP:time} %{DATA:dvc} audispd: %{GREEDYDATA:kv_data}"
        }
        on_error => "pattern_not_matched"
      }
      if ![pattern_not_matched] {
        kv {
          source => "kv_data"
          value_split => "="
          field_split => " "
          on_error => "trim_value_not_found_kv_data"
        }

        mutate {
          replace => {
            "principal_hostname" => "%{dvc}"
          }
        }

        if [cwd] != "" {
          mutate {
            gsub => ["cwd","\\\"",""]
          }
          mutate {
            replace => {
              "target.process.file.full_path" => "%{cwd}"
              "event_type" => "STATUS_UPDATE"
            }
          }
        }

        if [type] != "" {
          mutate {
            replace => {
              "metadata.product_event_type" => "%{type}"
            }
          }
        }
      }
    }

    if [audit_message] =~ "PROCTITLE" and [principal_hostname] != "" and [tar_host] != "" {
      mutate {
        replace => {
          "event_type" => "PROCESS_LAUNCH"
        }
      }
    }
    else if [audit_message] =~ "PROCTITLE" and [principal_hostname] != "" {
      mutate {
        replace => {
          "event_type" => "PROCESS_UNCATEGORIZED"
        }
      }
    }
    else if [event_type] == "" and [principal_hostname] != "" {
      mutate {
        replace => {
          "event_type" => "STATUS_UPDATE"
        }
      }
    }
    else if [event_type] == "" {
      drop {
        tag => "TAG_MALFORMED_ENCODING"
      }
    }

    if [type_name] != "" {
      mutate {
        replace => {
          "metadata.product_event_type" => "%{type_name}"
        }
      }
    }

    mutate {
      replace => {
        "event.idm.read_only_udm.principal.platform" => "LINUX"
      }
    }
    # Set UDM fields
    mutate {
      rename => {
        "src" => "event.idm.read_only_udm.src"
        "target" => "event.idm.read_only_udm.target"
        "metadata" => "event.idm.read_only_udm.metadata"
      }
    }
    if [principal_user_userid] != "" {
      mutate {
        replace => {
          "event.idm.read_only_udm.principal.user.userid" => "%{principal_user_userid}"
        }
        on_error => "invalid_principal_user_userid"
      }
      if not [invalid_principal_user_userid] {
        mutate {
          replace => {
            "principal_user_present" => "true"
          }
        }
      }
    }
    if [principal_hostname] != "" {
      mutate {
        replace => {
          "event.idm.read_only_udm.principal.hostname" => "%{principal_hostname}"
        }
        on_error => "invalid_principal_hostname"
      }
    }
    if [event_type] != "GENERIC_EVENT" {
      mutate {
        replace => {
          "event.idm.read_only_udm.metadata.event_type" => "%{event_type}"
        }
      }
    }
    else if [event_type] == "GENERIC_EVENT" and [principal_hostname] != "" {
      mutate {
        replace => {
          "event.idm.read_only_udm.metadata.event_type" => "STATUS_UPDATE"
        }
      }
    }
    else {
      mutate {
        replace => {
          "event.idm.read_only_udm.metadata.event_type" => "GENERIC_EVENT"
        }
      }
    }
    if [extensions] != "" {
      mutate {
        rename => {
          "extensions" => "event.idm.read_only_udm.extensions"
        }
      }
    }
    if [network] != "" {
      mutate {
        rename => {
          "network" => "event.idm.read_only_udm.network"
        }
      }
    }
    if [about] != "" {
      mutate {
        merge => {
          "event.idm.read_only_udm.about" => "about"
        }
      }
    }
    if [security_result] != "" {
      mutate {
        merge => {
          "event.idm.read_only_udm.security_result" => "security_result"
        }
      }
    }
  }
  else if [jsonPayload][MESSAGE] != "" {
    mutate {
      replace => {
        "target" => ""
        "metadata" => ""
        "security_result" => ""
        "network" => ""
        "p_event_type" => ""
      }
    }
    grok {
      match => {
        "jsonPayload.MESSAGE" => "%{WORD:p_event_type} %{GREEDYDATA}"
      }
      overwrite => ["p_event_type"]
      on_error => "invalid_jsonpayload_message"
    }


    if [p_event_type] != "" {
      mutate {
        replace => {
          "metadata.product_event_type" => "%{p_event_type}"
        }
        on_error => "no_p_event_type"
      }
    }

    if [jsonPayload][_HOSTNAME] != "" {
      mutate {
        replace => {
          "event.idm.read_only_udm.principal.hostname" => "%{jsonPayload._HOSTNAME}"
          "has_principal" => "true"
        }
        on_error => "no_hostname"
      }
    }

    if [jsonPayload][_UID] not in ["","0"] {
      mutate {
        replace => {
          "target.user.userid" => "%{jsonPayload._UID}"
          "target_user_present" => "true"
        }
        on_error => "no_uid"
      }
    }

    if [jsonPayload][_AUDIT_FIELD_SUID] not in ["","0"] {
      mutate {
        replace => {
          "event.idm.read_only_udm.principal.user.userid" => "%{jsonPayload._AUDIT_FIELD_SUID}"
          "principal_user_present" => "true"
        }
        on_error => "no_uid"
      }
    }

    if [jsonPayload][_AUDIT_FIELD_FILE] != "" {
      mutate {
        replace => {
          "target.file.full_path" => "%{jsonPayload._AUDIT_FIELD_FILE}"
        }
        on_error => "no_audit_field_file"
      }
    }

    mutate {
      gsub => ["jsonPayload._AUDIT_FIELD_HASH" , "sha256:", ""]
    }

    if [jsonPayload][_AUDIT_FIELD_HASH] != "" and [jsonPayload][_AUDIT_FIELD_HASH] =~ "^[a-f0-9]{64}$" {
      mutate {
        replace => {
          "target.file.sha256" => "%{jsonPayload._AUDIT_FIELD_HASH}"
        }
        on_error => "no_json_payload"
      }
    }

    if [resource][labels][cluster_name] != "" {
      mutate {
        replace => {
          "target.resource.name" => "%{resource.labels.cluster_name}"
        }
        on_error => "cluster_name_empty"
      }
    }

    if [resource][labels][project_id] != "" {
      mutate {
        replace => {
          "target.cloud.project.name" => "%{resource.labels.project_id}"
        }
        on_error => "no_project_name"
      }
    }

    if [resource][labels][location] != "" {
      mutate {
        replace => {
          "target.location.name" => "%{resource.labels.location}"
        }
        on_error => "no_location"
      }
    }

    if [jsonPayload][_AUDIT_SESSION] != "" {
      mutate {
        replace => {
          "network.session_id" => "%{jsonPayload._AUDIT_SESSION}"
        }
        on_error => "no_audit_session"
      }
    }

    if [jsonPayload][_COMM] != "" {
      mutate {
        replace => {
          "event.idm.read_only_udm.principal.application" => "%{jsonPayload._COMM}"
        }
        on_error => "no_comm"
      }
    }

    if [jsonPayload][_PID] != "" {
      mutate {
        replace => {
          "event.idm.read_only_udm.principal.process.pid" => "%{jsonPayload._PID}"
        }
        on_error => "no_pid"
      }
    }

    if [jsonPayload][_PPID] != "" {
      mutate {
        replace => {
          "event.idm.read_only_udm.principal.process.parent_process.pid" => "%{jsonPayload._PPID}"
        }
        on_error => "no_ppid"
      }
    }

    if [jsonPayload][_EXE] != "" {
      mutate {
        replace => {
          "target.process.file.full_path" => "%{jsonPayload._EXE}"
        }
        on_error => "no_json_payload_exe"
      }
    }

    if [jsonPayload][_AUDIT_ID] != "" {
      mutate {
        replace => {
          "metadata.product_log_id" => "%{jsonPayload._AUDIT_ID}"
        }
        on_error => "no_json_payload_audit_id"
      }
    }

    if [jsonPayload][_AUDIT_TYPE_NAME] != "" {
      mutate {
        replace => {
          "security_result.rule_id" => "%{jsonPayload._AUDIT_TYPE_NAME}"
        }
        on_error => "no_audit_type_name"
      }
    }

    if [jsonPayload][_AUDIT_FIELD_A0] != "" {
      mutate {
        replace => {
          "a0_label.value" => "%{jsonPayload._AUDIT_FIELD_A0}"
          "a0_label.key" => "a0"
        }
        on_error => "no_a0"
      }
      if ![no_a0] {
        mutate {
          merge => {
            "security_result.detection_fields" => "a0_label"
          }
          on_error => "no_a0_label"
        }
      }
    }

    if [jsonPayload][_AUDIT_FIELD_A1] != "" {
      mutate {
        replace => {
          "a1_label.value" => "%{jsonPayload._AUDIT_FIELD_A1}"
          "a1_label.key" => "a1"
        }
        on_error => "no_a1"
      }
      if ![no_a1] {
        mutate {
          merge => {
            "security_result.detection_fields" => "a1_label"
          }
          on_error => "no_a1_label"
        }
      }
    }

    if [jsonPayload][_AUDIT_FIELD_A2] != "" {
      mutate {
        replace => {
          "a2_label.value" => "%{jsonPayload._AUDIT_FIELD_A2}"
          "a2_label.key" => "a2"
        }
        on_error => "no_a2"
      }
      if ![no_a2] {
        mutate {
          merge => {
            "security_result.detection_fields" => "a2_label"
          }
          on_error => "no_a2_label"
        }
      }
    }

    if [jsonPayload][_AUDIT_FIELD_A3] != "" {
      mutate {
        replace => {
          "a3_label.value" => "%{jsonPayload._AUDIT_FIELD_A3}"
          "a3_label.key" => "a3"
        }
        on_error => "no_a3"
      }
      if ![no_a3] {
        mutate {
          merge => {
            "security_result.detection_fields" => "a3_label"
          }
          on_error => "no_a3_label"
        }
      }
    }

    if [jsonPayload][_BOOT_ID] != "" {
      mutate {
        replace => {
          "bootid_label.value" => "%{jsonPayload._BOOT_ID}"
          "bootid_label.key" => "bootid"
        }
        on_error => "no_bootid"
      }
      if ![no_bootid] {
        mutate {
          merge => {
            "security_result.detection_fields" => "bootid_label"
          }
          on_error => "no_bootid_label"
        }
      }
    }

    if [jsonPayload][_AUDIT_FIELD_EXIT] != "" {
      mutate {
        replace => {
          "exit_label.value" => "%{jsonPayload._AUDIT_FIELD_EXIT}"
          "exit_label.key" => "Exit Code"
        }
        on_error => "no_exit_code"
      }
      if ![no_exit_code] {
        mutate {
          merge => {
            "security_result.detection_fields" => "exit_label"
          }
          on_error => "no_exit_label"
        }
      }
    }

    if [jsonPayload][_AUDIT_FIELD_ARCH] != "" {
      mutate {
        replace => {
          "security_result.about.platform_version" => "%{jsonPayload._AUDIT_FIELD_ARCH}"
        }
        on_error => "no_arch"
      }
    }

    if [target_user_present] == "true" or [principal_user_present] == "true" {
      mutate {
        replace => {
          "metadata.event_type" => "USER_UNCATEGORIZED"
        }
      }
    }
    else if [has_principal] == "true" {
      mutate {
        replace => {
          "metadata.event_type" => "STATUS_UPDATE"
        }
      }
    }
    else {
      mutate {
        replace => {
          "metadata.event_type" => "GENERIC_EVENT"
        }
      }
    }

    if [target] != "" {
      mutate {
        rename => {
          "target" => "event.idm.read_only_udm.target"
        }
      }
    }
    if [metadata] != "" {
      mutate {
        rename => {
          "metadata" => "event.idm.read_only_udm.metadata"
        }
      }
    }
    if [network] != "" {
      mutate {
        rename => {
          "network" => "event.idm.read_only_udm.network"
        }
      }
    }
    if [security_result] != "" {
      mutate {
        merge => {
          "event.idm.read_only_udm.security_result" => "security_result"
        }
        on_error => "no_security_result"
      }
    }
  }
  else {
    if [filepath] != "" {
      mutate {
        replace => {
          "event.idm.read_only_udm.target.file.full_path" => "%{filepath}"
          "has_file" => "true"
        }
        on_error => "filepath_empty"
      }
    }

    grok {
      match => {
        "audit_message" => [
          "%{SYSLOGTIMESTAMP:timestamp} %{DATA:dvc} .*?%{WORD:eventType}(\\[%{INT}\\]|)(?::\\s+|)%{GREEDYDATA:msg2}",
          "<%{INT}>%{TIMESTAMP_ISO8601:timestamp} %{DATA:dvc} %{DATA}\\[%{INT:pi}\\]:\\s+%{DATA:log_details}\\s+:%{GREEDYDATA:msg2}"
          "%{DATA:year} %{DATA:time} %{DATA:dvc} %{DATA} %{DATA}:%{GREEDYDATA:msg2}",
          "<%{INT}>%{TIMESTAMP_ISO8601} %{DATA:dvc} .*?%{WORD:eventType}(?::\\s+|)%{GREEDYDATA:msg2}",
          "CRON\\[%{INT:pi}\\]: \\(%{WORD:usr}\\) CMD \\(%{GREEDYDATA:cmnd}\\)"
        ]
      }
      overwrite => ["timestamp","dvc","eventType","msg2", "pi", "usr", "cmnd", "log_details"]
      on_error => "grok_not_match"
    }
    if [grok_not_match] and [xml_parsing_failed] and [principal_hostname] == "" and [dvc] == "" {
      drop {
        tags => "TAG_NO_SECURITY_VALUE"
      }
    }
    if [usr] != "" {
      mutate {
        replace => {
          "event.idm.read_only_udm.principal.user.userid" => "%{usr}"
          "has_user" => "true"
        }
        on_error => "user_not_set"
      }
    }
    if [pi] != "" {
      mutate {
        replace => {
          "event.idm.read_only_udm.principal.process.pid" => "%{pi}"
        }
        on_error => "pi_not_set"
      }
    }
    if [cmnd] != "" {
      mutate {
        replace => {
          "event.idm.read_only_udm.target.process.command_line" => "%{cmnd}"
          "has_command_line" => "true"
        }
        on_error => "cmd_not_set"
      }
    }
    mutate {
      replace => {
        "intermediary.hostname" => "%{dvc}"
      }
      on_error => "dvc_empty"
    }
    mutate {
      replace => {
        "principal_hostname" => "%{dvc}"
      }
    }
    date {
      match => ["timestamp", "MMM d HH:mm:ss", "MMM d HH:mm:ss ", "MMM dd HH:mm:ss"]
      rebase => true
      on_error => "date_format_failure"
    }
    mutate {
      replace => {
        "event_type" => "STATUS_UPDATE"
        "event.idm.read_only_udm.metadata.product_name" => "AuditD"
        "event.idm.read_only_udm.metadata.vendor_name" => "Linux"
        "type_name" => ""
      }
    }
    mutate {
      replace => {
        "event.idm.read_only_udm.metadata.description" => "%{msg2}"
      }
      on_error => "msg2_not_set"
    }
    grok {
      match => {
        "msg2" => [
          "Connecting to server %{IP:dst_ip} on port %{INT:dst_port}"
          "Connecting to primary( %{IP}|) server %{IP:dst_ip}:%{INT:dst_port}"
          "%{DATA:description}:\\s+%{USERNAME:user_name}\\s+%{IP:dst_ip}\\s+\\(%{IP}\\)\\s+%{WORD:terminal}",
          ".*from %{IP:dst_ip}\\s+\\[%{IP}\\]"
          ".* user %{WORD:user_name}.*"
          "\\(%{GREEDYDATA:user_name}\\) CMD \\(%{GREEDYDATA:command_line}\\)"
          "%{DATA}: to=<%{DATA:target_email}>, %{DATA}=%{DATA:relay_data}\\[%{IP:princi_ip}\\]:%{DATA:target_port}, %{DATA}=%{DATA:delay_data}, %{DATA}=%{DATA:delays_data}, %{DATA}=%{DATA:dns_data}, %{DATA}=%{DATA:status} \\(%{DATA:response_code} %{DATA}<%{DATA:to_email}> \\[%{DATA}=%{DATA}, %{DATA}=%{DATA:target_hostname}\\] %{DATA:bytes_sent} %{DATA}, %{DATA} %{DATA} %{GREEDYDATA:description}\\)"
        ]
      }
      overwrite => ["dst_ip","user_name","dst_port","description","terminal", "command_line", "msg2" , "target_email" , "princi_ip", "status" , "target_port" , "relay_data", "delay_data", "delays_data", "dns_data", "response_code", "to_email", "target_hostname", "bytes_sent"]
      on_error => "msg2_not_match"
    }

    if [target_email] =~ "^.+@.+$" {
      mutate {
        merge => {
          "event.idm.read_only_udm.target.user.email_addresses" => "target_email"
        }
        on_error => "invalid_target_email"
      }
      if ![invalid_target_email] {
        mutate {
          replace => {
            "has_target" => "true"
          }
        }
      }
    }

    if [princi_ip] != "" {
      mutate {
        merge => {
          "event.idm.read_only_udm.principal.ip" => "princi_ip"
          "event.idm.read_only_udm.principal.asset.ip" => "princi_ip"
        }
        on_error => "invalid_principal_ip"
      }
      if ![invalid_principal_ip] {
        mutate {
          replace => {
            "has_principal" => "true"
          }
        }
      }
    }

    if [target_port] != "" {
      mutate {
        replace => {
          "event.idm.read_only_udm.target.port" => "%{target_port}"
        }
        on_error => "invalid_target_port"
      }
      mutate {
        convert => {
          "event.idm.read_only_udm.target.port" => "integer"
        }
        on_error => "invalid_target_port"
      }
    }

    if [status] != "" {
      mutate {
        replace => {
          "security_result.action_details" => "The email status is %{status}"
        }
        on_error => "invalid_status"
      }
    }
    if [log_details] != "" {
      mutate {
        replace => {
          "log_details_label.key" => "log_details"
          "log_details_label.value.string_value" => "%{log_details}"
        }
        on_error => "log_details_not_set"
      }
      if ![log_details_not_set] {
        mutate {
          merge => {
            "event.idm.read_only_udm.additional.fields" => "log_details_label"
          }
          on_error => "log_details_not_merged"
        }
      }
    }
    if [relay_data] != "" {
      mutate {
        replace => {
          "additional_relay_data.key" => "relay_data"
          "additional_relay_data.value.string_value" => "%{relay_data}"
        }
        on_error => "relay_data_not_set"
      }
      if ![relay_data_not_set] {
        mutate {
          merge => {
            "event.idm.read_only_udm.additional.fields" => "additional_relay_data"
          }
          on_error => "relay_data_not_set"
        }
      }
    }

    if [delays_data] != "" {
      mutate {
        replace => {
          "additional_delays_data.key" => "delays_data"
          "additional_delays_data.value.string_value" => "%{delays_data}"
        }
        on_error => "delays_data_not_set"
      }
      if ![delays_data_not_set] {
        mutate {
          merge => {
            "event.idm.read_only_udm.additional.fields" => "additional_delays_data"
          }
          on_error => "delays_data_not_set"
        }
      }
    }
    if [delay_data] != "" {
      mutate {
        replace => {
          "additional_delay_data.key" => "delay_data"
          "additional_delay_data.value.string_value" => "%{delay_data}"
        }
        on_error => "delay_data_not_set"
      }
      if ![delay_data_not_set] {
        mutate {
          merge => {
            "event.idm.read_only_udm.additional.fields" => "additional_delay_data"
          }
          on_error => "delay_data_not_set"
        }
      }
    }

    if [dns_data] != "" {
      mutate {
        replace => {
          "additional_dns_data.key" => "dns_data"
          "additional_dns_data.value.string_value" => "%{dns_data}"
        }
        on_error => "dns_data_not_set"
      }
      if ![dns_data_not_set] {
        mutate {
          merge => {
            "event.idm.read_only_udm.additional.fields" => "additional_dns_data"
          }
          on_error => "dns_data_not_set"
        }
      }
    }
    if [to_email] =~ "^.+@.+$" {
      mutate {
        merge => {
          "event.idm.read_only_udm.network.email.to" => "to_email"
        }
        on_error => "to_email_not_set"
      }
    }
    if [target_hostname] != "" {
      mutate {
        replace => {
          "event.idm.read_only_udm.target.hostname" => "%{target_hostname}"
          "event.idm.read_only_udm.target.asset.hostname" => "%{target_hostname}"
          "has_target" => "true"
        }
        on_error => "target_hostname_not_set"
      }
    }
    if [bytes_sent] != "" {
      mutate {
        replace => {
          "event.idm.read_only_udm.network.sent_bytes" => "%{bytes_sent}"
        }
        on_error => "bytes_sent_not_set"
      }
      mutate {
        convert => {
          "event.idm.read_only_udm.network.sent_bytes" => "uinteger"
        }
        on_error => "bytes_sent_conversion_failed"
      }
    }

    if [response_code] != "" {
      mutate {
        replace => {
          "event.idm.read_only_udm.network.http.response_code" => "%{response_code}"
        }
        on_error => "no_status_code"
      }
      if ![no_status_code] {
        mutate {
          convert => {
            "event.idm.read_only_udm.network.http.response_code" => "integer"
          }
          on_error => "already_integer"
        }
      }
    }

    if [user_name] != "" {
      mutate {
        replace => {
          "event.idm.read_only_udm.principal.user.userid" => "%{user_name}"
        }
        on_error => "invalid_user_name"
      }
      if not [invalid_user_name] {
        mutate {
          replace => {
            "principal_user_present" => "true"
          }
        }
      }
    }
    if ![msg2_not_match] {
      mutate {
        replace => {
          "event.idm.read_only_udm.metadata.description" => "%{description}"
        }
        on_error => "description_not_set"
      }
      if [terminal] != "" {
        mutate {
          replace => {
            "additional_field.key" => "Terminal"
            "additional_field.value.string_value" => "%{terminal}"
          }
        }
        mutate {
          merge => {
            "event.idm.read_only_udm.additional.fields" => "additional_field"
          }
        }
      }
      if [dst_ip] != "" {
        mutate {
          merge => {
            "event.idm.read_only_udm.target.ip" => "dst_ip"
          }
          on_error => "dst_ip_invalid"
        }
        if ![dst_ip_invalid] {
          mutate {
            replace => {
              "has_target" => "true"
            }
          }
        }
      }
      if [dst_port] != "" {
        mutate {
          replace => {
            "event.idm.read_only_udm.target.port" => "%{dst_port}"
          }
          convert => {
            "event.idm.read_only_udm.target.port" => "integer"
          }
        }
      }
      mutate {
        replace => {
          "event.idm.read_only_udm.metadata.event_type" => "NETWORK_CONNECTION"
        }
      }
    }
    if [command_line] != "" {
      mutate {
        replace => {
          "event.idm.read_only_udm.target.process.command_line" => "%{command_line}"
        }
        on_error => "no_command_line"
      }
    }
    if [eventType] != "" {
     mutate {
        replace => {
          "event.idm.read_only_udm.metadata.product_event_type" => "%{eventType}"
        }
      }
    }

    if [principal_hostname] != "" and ([dst_ip] != "" or [dst_port] != "") {
      if [dst_ip] != "" {
        mutate {
          merge => {
            "event.idm.read_only_udm.target.ip" => "dst_ip"
            "event.idm.read_only_udm.target.asset.ip" => "dst_ip"
          }
          on_error => "dst_ip_invalid"
        }
        if ![dst_ip_invalid] {
          mutate {
            replace => {
              "has_target" => "true"
            }
          }
        }
      }
      if [dst_port] != "" {
        mutate {
          replace => {
            "event.idm.read_only_udm.target.port" => "%{dst_port}"
          }
          on_error => "dst_port_empty"
        }
        mutate {
          convert => {
            "event.idm.read_only_udm.target.port" => "integer"
          }
          on_error => "dst_port_invalid"
        }
      }
      if [msg2] =~ "HTTP" {
        mutate {
          replace => {
            "event.idm.read_only_udm.metadata.event_type" => "NETWORK_HTTP"
            "event.idm.read_only_udm.network.application_protocol" => "HTTP"
          }
        }
      }
      else {
        mutate {
          replace => {
            "event.idm.read_only_udm.metadata.event_type" => "NETWORK_CONNECTION"
          }
        }
      }
    }
    else if [event_type] != "" and [principal_hostname] == "" {
      mutate {
        replace => {
          "event.idm.read_only_udm.metadata.event_type" => "GENERIC_EVENT"
        }
      }
    }
    else if [event_type] != "GENERIC_EVENT" {
      mutate {
        replace => {
          "event.idm.read_only_udm.metadata.event_type" => "%{event_type}"
        }
      }
    }
    else if [principal_hostname] != "" and [event_type] == "GENERIC_EVENT" {
      mutate {
        replace => {
          "event.idm.read_only_udm.metadata.event_type" => "STATUS_UPDATE"
        }
      }
    }
    else {
      mutate {
        replace => {
          "event.idm.read_only_udm.metadata.event_type" => "GENERIC_EVENT"
        }
      }
    }
    if [msg2] =~ "login failure" and ([principal_user_present] == "true" or [target_user_present] == "true" or [has_principal] == "true" ) and [has_target] == "true" {
      mutate {
        replace => {
          "security_action" => "BLOCK"
          "_mechanism" => "USERNAME_PASSWORD"
          "event.idm.read_only_udm.extensions.auth.type" => "MACHINE"
          "event.idm.read_only_udm.metadata.event_type" => "USER_LOGIN"
        }
      }
    }
    if [_mechanism] != "" {
      mutate {
        merge => {
          "event.idm.read_only_udm.extensions.auth.mechanism"  => "_mechanism"
        }
      }
    }

    if [message] =~ "ssh|ssh2" {
      mutate {
        replace => {
          "event.idm.read_only_udm.network.application_protocol" => "SSH"
        }
      }
    }

    if [username] != "" {
      mutate {
        replace => {
          "target_user_userid" => ""
        }
      }
      mutate {
        replace => {
          "target_user_userid" =>
          "%{event.idm.read_only_udm.target.user.userid}"
        }
        on_error => "no_target_user_userid"
      }
      if [target_user_userid] == "" {
        mutate {
          rename => {
            "event.idm.read_only_udm.principal.user.userid" =>
            "event.idm.read_only_udm.target.user.userid"
          }
        }
      }
      mutate {
        replace => {
          "event.idm.read_only_udm.target.user.userid" => "%{username}"
        }
        on_error => "invalid_username"
      }
      mutate {
        replace => {
          "event.idm.read_only_udm.metadata.event_type" => "USER_LOGIN"
          "event.idm.read_only_udm.extensions.auth.type" => "AUTHTYPE_UNSPECIFIED"
        }
      }
    }
    if [principal_hostname] != "" {
      mutate {
        replace => {
          "event.idm.read_only_udm.principal.hostname" => "%{principal_hostname}"
        }
        on_error => "invalid_principal_hostname"
      }
    }
    if [principal_user_userid] != "" {
      mutate {
        replace => {
          "event.idm.read_only_udm.principal.user.userid" => "%{principal_user_userid}"
        }
        on_error => "invalid_principal_user_userid"
      }
    }
    if [security_result] != "" {
      mutate {
        merge => {
          "event.idm.read_only_udm.security_result" => "security_result"
        }
      }
    }
    mutate {
      merge => {
        "event.idm.read_only_udm.intermediary" => "intermediary"
      }
    }
  }


  if [type_name] == "SYSCALL" {
    mutate {
      replace => {
        "security_result.rule_id"                             => "%{type_name}"
        "security_result.about.registry.registry_value_data"  => "%{product_log_id}"
        "security_result.about.platform_version"              => "%{type_syscall_props.arch}"
        "about.user.userid"                                   => "%{type_syscall_props.auid}"
        "security_result.about.registry.registry_key"         => "%{type_syscall_props.key}"
        "event.idm.read_only_udm.metadata.event_type"              => "USER_UNCATEGORIZED"
        "event.idm.read_only_udm.principal.process.file.full_path" => "%{event.idm.read_only_udm.target.process.file.full_path}"
      }
    }
  }

  mutate {
    merge => {
      "@output" => "event"
    }
  }
}
