# Product: Verba Recording System
# Category: Recording System
# Supported Format: CSV
# Reference: NA
# Last Updated: 2024-05-24
# Copyright 2024 Chronicle LLC

filter {
  mutate {
    replace => {
      "_security_result" => ""
      "principal" => ""
      "target" => ""
      "metadata" => ""
      "has_target_user" => ""
      "has_principal_user" => ""
      "column1" => ""
      "column2" => ""
      "column3" => ""
      "column4" => ""
      "column5" => ""
      "column6" => ""
      "column7" => ""
      "column8" => ""
      "column9" => ""
    }
  }
  csv {
    source => "message"
    separator => ","
    columns = ["name","timestamp","start_date_time","caller_number","called_number","user_id","duration","event","reason"]
    on_error => "csv_error"
  }
  mutate{
    gsub => [
      "user_id", " \\([^)]+\\)$", ""
      "name", " \\([^)]+\\)$", ""
    ]
  }
  if [column1] != "" {
    mutate {
      replace => {
        "principal.user.userid" => "%{column1}"
        "has_principal_user" => "true"
      }
      on_error => "name_error"
    }
  }
  if [column6] != "" {
    mutate {
      replace => {
        "target.user.userid" => "%{column6}"
        "has_target_user" => "true"
      }
      on_error => "user_id_error"
    }
  }
  if [column2] != "" {
    mutate {
      replace => {
        "timestamp_label.key" => "Timestamp"
        "timestamp_label.value" => "%{column2}"
      }
      on_error => "timestamp_error"
    }
    if ![timestamp_error] {
      mutate {
        merge => {
          "_security_result.detection_fields" => "timestamp_label"
        }
        on_error => "timestamp_merge_error"
      }
    }
  }
  if [column3] != "" {
    mutate {
      replace => {
        "start_date_time_label.key" => "Start Date time"
        "start_date_time_label.value" => "%{column3}"
      }
      on_error => "start_date_time_error"
    }
    if ![start_date_time_error] {
      mutate {
        merge => {
          "_security_result.detection_fields" => "start_date_time_label"
        }
        on_error => "start_date_time_merge_error"
      }
    }
  }
  if [column4] != "" {
    mutate {
      replace => {
        "caller_number_label.key" => "Caller Number"
        "caller_number_label.value" => "%{column4}"
      }
      on_error => "caller_number_error"
    }
    if ![caller_number_error] {
      mutate {
        merge => {
          "_security_result.detection_fields" => "caller_number_label"
        }
        on_error => "caller_number_merge_error"
      }
    }
  }
  if [column5] != "" {
    mutate {
      replace => {
        "called_number_label.key" => "Called Number"
        "called_number_label.value" => "%{column5}"
      }
      on_error => "called_number_error"
    }
    if ![called_number_error] {
      mutate {
        merge => {
          "_security_result.detection_fields" => "called_number_label"
        }
        on_error => "called_number_merge_error"
      }
    }
  }
  if [column7] != "" {
    mutate {
      replace => {
        "duration_label.key" => "Duration"
        "duration_label.value" => "%{column7}"
      }
      on_error => "duration_error"
    }
    if ![duration_error] {
      mutate {
        merge => {
          "_security_result.detection_fields" => "duration_label"
        }
        on_error => "duration_merge_error"
      }
    }
  }
  if [column8] != "" {
    mutate {
      replace => {
        "_security_result.action_details" => "%{column8}"
      }
      on_error => "event_error"
    }
  }
  if [column9] != "" {
    mutate {
      replace => {
        "_security_result.summary" => "%{column9}"
      }
      on_error => "reason_error"
    }
  }
  if [message] != "" {
    mutate {
      replace => {
        "metadata.description" => "%{message}"
      }
      on_error => "message_error"
    }
  }
  mutate {
    replace => {
      "metadata.vendor_name" => "Verba_Recording_Systems"
      "metadata.product_name" => "Verba_Recording_Systems"
    }
  }
  if [has_principal_user] == "true" or [has_target_user] == "true" {
    mutate {
      replace => {
        "metadata.event_type" => "USER_UNCATEGORIZED"
      }
    }
  }
  else {
    mutate {
      replace => {
        "metadata.event_type" => "GENERIC_EVENT"
      }
    }
  }
  if [_security_result] != "" {
    mutate {
      merge => {
        "event.idm.read_only_udm.security_result" => "_security_result"
      }
      on_error => "security_result_merge_error"
    }
  }
  if [principal] != "" {
    mutate {
      rename => {
        "principal" => "event.idm.read_only_udm.principal"
      }
    }
  }

  if [target] != "" {
    mutate {
      rename => {
        "target" => "event.idm.read_only_udm.target"
      }
    }
  }
  if [metadata] != "" {
    mutate {
      rename => {
        "metadata" => "event.idm.read_only_udm.metadata"
      }
    }
  }
  mutate {
    merge => {
      "@output" => "event"
    }
  }
}
