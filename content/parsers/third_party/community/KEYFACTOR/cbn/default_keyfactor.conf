# Product: Keyfactor
# Category: Identity and Access Management
# Supported Format: SYSLOG
# Last Updated: 2026-06-10
# Copyright 2026 Google SecOps

filter {
  mutate {
    replace => {
      "timestamp" => ""
      "component" => ""
      "severity" => ""
      "message_text" => ""
      "session_id" => ""
      "target_url" => ""
      "job_name" => ""
      "class" => ""
      "security_result" => ""
    }
  }
  grok {
    match => {
      "message" => [
        "%{TIMESTAMP_ISO8601:timestamp}\\s+%{DATA:component}\\s+\\[%{WORD:severity}\\]\\s+-\\s+%{GREEDYDATA:message_text}"
      ]
    }
    overwrite => ["timestamp", "component", "severity", "message_text"]
    on_error => "message_grok_error"
  }
  if [timestamp] != "" {
    date {
      match => ["timestamp", "yyyy-MM-dd HH:mm:ss.SSSS", "yyyy-MM-dd HH:mm:ss.SSS", "yyyy-MM-dd HH:mm:ss"]
      target => "event.idm.read_only_udm.metadata.event_timestamp"
      on_error => "timestamp_parse_error"
    }
  }
  if [message_text] != "" {
    grok {
      match => {
        "message_text" => [
          "%{DATA} Job '%{DATA:job_name}', class=%{GREEDYDATA:class}",
          "Session token: %{UUID:session_id}",
          "POSTing to URI: %{URI:target_url}"
        ]
      }
      overwrite => ["session_id", "target_url", "job_name", "class"]
      on_error => "message_text_grok_error"
    }
    mutate {
      replace => {
        "event.idm.read_only_udm.metadata.description" => "%{message_text}"
      }
      on_error => "description_parse_error"
    }
  }
  if [session_id] != "" {
    mutate {
      replace => {
        "event.idm.read_only_udm.network.session_id" => "%{session_id}"
      }
      on_error => "session_id_parse_error"
    }
  }
  if [target_url] != "" {
    mutate {
      replace => {
        "event.idm.read_only_udm.target.url" => "%{target_url}"
      }
      on_error => "target_url_parse_error"
    }
  }
  if [job_name] != "" {
    mutate {
      replace => {
        "event.idm.read_only_udm.target.resource.name" => "%{job_name}"
      }
      on_error => "job_name_parse_error"
    }
  }
  if [class] != "" {
    mutate {
      replace => {
        "class_label.key" => "class"
        "class_label.value" => "%{class}"
      }
      on_error => "class_label_parse_error"
    }
    if ![class_label_parse_error] {
      mutate {
        merge => {
          "event.idm.read_only_udm.target.resource.attribute.labels" => "class_label"
        }
        on_error => "class_label_merge_error"
      }
    }
  }
  if [component] != "" {
    mutate {
      replace => {
        "event.idm.read_only_udm.metadata.product_log_id" => "%{component}"
      }
      on_error => "component_parse_error"
    }
  }
  if [severity] != "" {
    if [severity] =~ "(?i)Debug" or [severity] =~ "(?i)Trace" {
      mutate {
        replace => {
          "security_result.severity" => "LOW"
        }
      }
    } else if [severity] =~ "(?i)Info" {
      mutate {
        replace => {
          "security_result.severity" => "INFORMATIONAL"
        }
      }
    } else if [severity] =~ "(?i)Warning" {
      mutate {
        replace => {
          "security_result.severity" => "MEDIUM"
        }
      }
    } else if [severity] =~ "(?i)High" {
      mutate {
        replace => {
          "security_result.severity" => "HIGH"
        }
      }
    } else if [severity] =~ "(?i)Error" {
      mutate {
        replace => {
          "security_result.severity" => "ERROR"
        }
      }
    } else if [severity] =~ "(?i)Fatal" or [severity] =~ "(?i)Critical" {
      mutate {
        replace => {
          "security_result.severity" => "CRITICAL"
        }
      }
    }
    mutate {
      replace => {
        "security_result.severity_details" => "%{severity}"
      }
      on_error => "severity_details_parse_error"
    }
  }
  if [security_result] != "" {
    mutate {
      merge => {
        "event.idm.read_only_udm.security_result" => "security_result"
      }
      on_error => "security_result_merge_error"
    }
  }
  mutate {
    replace => {
      "event.idm.read_only_udm.metadata.vendor_name" => "Keyfactor"
      "event.idm.read_only_udm.metadata.product_name" => "Command"
      "event.idm.read_only_udm.metadata.event_type" => "GENERIC_EVENT"
    }
  }
  mutate {
    merge => {
      "@output" => "event"
    }
  }
}
