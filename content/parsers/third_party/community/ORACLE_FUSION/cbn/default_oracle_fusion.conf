# Product: Oracle_Fusion
# Category: SaaS Application
# Supported Format: JSON
# Reference: NA
# Last Updated: 2024-10-21
# Copyright 2024 Chronicle LLC
filter{
  mutate {
    replace => {
      "is_array" => "false"
    }
  }
  mutate {
    gsub => ["message", "\\r\\n", ""]
  }

  mutate {
    gsub => ["message", "\\t", ""]
  }
  json {
    source => "message"
    array_function => "split_columns"
    on_error => "not_json"
  }
  if [not_json] {
    drop {
      tag => "TAG_MALFORMED_MESSAGE"
    }
  }
  if [Events][eventData] != "" {
    for index,data_val in Events.eventData {
      mutate {
        replace => {
          "is_array" => "true"
          "event" => ""
          "event_type" => "GENERIC_EVENT"
          "target_is_set" => "false"
          "has_principal" => "false"
          "has_user" => "false"
          "extensions" => ""
          "security_result" => ""
          "action_allow" => "ALLOW"
          "action_block" => "BLOCK"
          "user_display_name" => ""
          "userDN" => ""
          "UserDN_label" => ""
        }
      }
      if [data_val][eventID] != "" {
        mutate {
          replace => {
            "metadata.product_log_id" => "%{data_val.eventID}"
          }
          on_error => "EventID_empty"
        }
      }
      if [data_val][userID][loginID] != "" {
        mutate {
          replace => {
            "principal.user.userid" => "%{data_val.userID.loginID}"
          }
          on_error => "UserID_empty"
        }
      }
      if [data_val][oracleECID] != "" {
        mutate {
          replace => {
            "target.user.userid" => "%{data_val.oracleECID}"
            "target_is_set" => "true"
          }
          on_error => "oracleECID_empty"
        }
      }
      if [data_val][ipAddress] != "" {
        mutate {
          merge => {
            "principal.ip" => "data_val.ipAddress"
            "principal.asset.ip" => "data_val.ipAddress"
          }
          on_error => "ipAddress_empty"
        }
        if ![ipAddress_empty] {
          mutate {
            replace => {
              "has_principal" => "true"
            }
          }
        }
      }
      mutate {
        replace => {
          "user_display_name" => "%{data_val.userID.userDN}"
        }
        on_error => "userDN_empty"
      }
      if [user_display_name] =~ "^.+@.+$" {
        mutate {
          merge => {
            "principal.user.email_addresses" => "user_display_name"
          }
          on_error => "user_display_name_empty"
        }
        mutate {
          replace => {
            "has_user" => "true"
          }
        }
      }
      else if [user_display_name] != "" {
        mutate {
          replace => {
            "UserDN_label.value" => "%{user_display_name}"
            "UserDN_label.key" => "UserDN"
          }
          on_error => "UserDN_error"
        }
        if ![UserDN_error] {
          mutate {
            merge => {
              "principal.user.attribute.labels" => "UserDN_label"
            }
            on_error => "UserDN_merge_error"
          }
        }
      }
      if [data_val][status] == "success" {
        mutate {
          merge => {
            "security_result.action" => "action_allow"
          }
          on_error => "status_empty"
        }
      }
      else {
        mutate {
          merge => {
            "security_result.action" => "action_block"
          }
        }
      }
      mutate {
        gsub => ["data_val.accessTime", "Z", ""]
      }
      date {
        match => ["data_val.accessTime", "yyyy-MM-ddTHH:mm:ss.SSS"]
        on_error => "accessTime_empty"
      }
      if [data_val][type] == "Logout" {
        mutate {
          replace => {
            "event_type" => "USER_LOGOUT"
            "event.idm.read_only_udm.extensions.auth.type" => "MACHINE"
          }
        }
      }
      else if [has_principal] == "true" {
        mutate {
          replace => {
            "event_type" => "USER_UNCATEGORIZED"
          }
        }
      }
      else {
        mutate {
          replace => {
            "event_type" => "GENERIC_EVENT"
          }
        }
      }
      if [event_type] != "" {
        mutate {
          replace => {
            "metadata.event_type" => "%{event_type}"
          }
        }
      }
      if [data_val][attributeMap][attribute][key] == "User-Agent" {
        mutate {
            replace => {
              "network.http.user_agent" =>
              "%{data_val.attributeMap.attribute.value}"
            }
            on_error => "User-Agent_empty"
        }
      }
      if[security_result] != "" {
        mutate {
          merge => {
            "event.idm.read_only_udm.security_result" => "security_result"
          }
        }
      }
      mutate {
        rename => {
          "metadata" => "event.idm.read_only_udm.metadata"
          "network" => "event.idm.read_only_udm.network"
          "principal" => "event.idm.read_only_udm.principal"
          "target" => "event.idm.read_only_udm.target"
        }
      }
      if [extensions] != "" {
        mutate {
          rename => {
            "extensions" => "event.idm.read_only_udm.extensions"
          }
        }
      }
      mutate {
        merge => {
          "@output" => "event"
        }
      }
    }
    if [is_array] == "false" {
      mutate {
        replace => {
          "event_type" => "GENERIC_EVENT"
          "target_is_set" => "false"
          "has_principal" => "false"
          "has_user" => "false"
          "extensions" => ""
          "security_result" => ""
          "action_allow" => "ALLOW"
          "action_block" => "BLOCK"
          "user_display_name" => ""
          "target" => ""
          "network" => ""
        }
      }
      mutate{
        replace => {
          "EVENT_ID" => "%{Events.eventData.eventID}"
        }
        on_error => "EventID_empty"
      }
      if ![EventID_empty] {
        mutate {
          replace => {
            "metadata.product_log_id" => "%{EVENT_ID}"
          }
          on_error => "EventID_empty"
        }
      }
      if [Events][eventData][userID][loginID] != "" {
        mutate {
          replace => {
            "principal.user.userid" => "%{Events.eventData.userID.loginID}"
          }
          on_error => "UserID_empty"
        }
      }
      if [Events][eventData][oracleECID] != "" {
        mutate {
          replace => {
            "target.user.userid" => "%{Events.eventData.oracleECID}"
            "target_is_set" => "true"
          }
           on_error => "oracleECID_empty"
        }
      }
      if [Events][eventData][ipAddress] != "" {
        mutate {
          merge => {
            "principal.ip" => "Events.eventData.ipAddress"
            "principal.asset.ip" => "Events.eventData.ipAddress"
          }
          on_error => "ipAddress_empty"
        }
        if ![ipAddress_empty] {
          mutate {
            replace => {
              "has_principal" => "true"
            }
          }
        }
      }
      mutate {
        replace => {
          "user_display_name" => "%{Events.eventData.userID.userDN}"
        }
        on_error => "userDN_empty"
      }
      if [user_display_name] =~ "^.+@.+$" {
        mutate {
          merge => {
            "principal.user.email_addresses" => "user_display_name"
          }
          on_error => "user_display_name_empty"
        }
        mutate {
          replace => {
            "has_user" => "true"
          }
        }
      }
      else if [user_display_name] != "" {
        mutate {
          replace => {
            "UserDN_label.value" => "%{user_display_name}"
            "UserDN_label.key" => "UserDN"
          }
          on_error => "UserDN_error"
        }
        if ![UserDN_error] {
          mutate {
            merge => {
              "principal.user.attribute.labels" => "UserDN_label"
            }
            on_error => "UserDN_merge_error"
          }
        }
      }
      if [Events][eventData][status] == "success" {
        mutate {
          merge => {
            "security_result.action" => "action_allow"
          }
          on_error => "status_empty"
        }
      }
      else {
        mutate {
          merge => {
            "security_result.action" => "action_block"
          }
        }
      }
      mutate {
        gsub => ["Events.eventData.accessTime", "Z", ""]
      }
      date {
        match => ["Events.eventData.accessTime", "yyyy-MM-ddTHH:mm:ss.SSS"]
      }
      if [Events][eventData][type] == "Logout" {
        mutate {
          replace => {
            "event_type" => "USER_LOGOUT"
            "event.idm.read_only_udm.extensions.auth.type" => "MACHINE"
          }
        }
      }
      else if [has_principal] == "true" {
        mutate {
          replace => {
            "event_type" => "USER_UNCATEGORIZED"
          }
        }
      }
      else {
        mutate {
          replace => {
            "event_type" => "GENERIC_EVENT"
          }
        }
      }
      if [event_type] != "" {
        mutate {
          replace => {
            "metadata.event_type" => "%{event_type}"
          }
        }
      }
      if [Events][eventData][attributeMap][attribute][key] == "User-Agent" {
        mutate {
            replace => {
              "network.http.user_agent" =>
              "%{Events.eventData.attributeMap.attribute.value}"
            }
            on_error => "User-Agent_empty"
        }
      }
      if[security_result] != "" {
        mutate {
          merge => {
            "event.idm.read_only_udm.security_result" => "security_result"
          }
        }
      }
      if [metadata] != "" {
        mutate {
          rename => {
            "metadata" => "event.idm.read_only_udm.metadata"
          }
        }
      }
      if [extensions] != "" {
        mutate {
          rename => {
            "extensions" => "event.idm.read_only_udm.extensions"
          }
        }
      }
      if [network] != "" {
        mutate {
          rename => {
            "network" => "event.idm.read_only_udm.network"
          }
        }
      }
      if [principal] != "" {
        mutate {
          rename => {
            "principal" => "event.idm.read_only_udm.principal"
          }
        }
      }
      if [target] != "" {
        mutate {
          rename => {
            "target" => "event.idm.read_only_udm.target"
          }
        }
      }
      mutate {
        merge => {
          "@output" => "event"
        }
      }
    }
  }
}
