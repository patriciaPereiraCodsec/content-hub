# Product: PerimeterX_Bot_Protection
# Category: Email Server
# Supported Format: JSON
# Reference: N/A
# Last Updated: 2025-01-09
# Copyright 2025 Chronicle LLC

filter {
  mutate {
    replace => {
      "id" => ""
      "identifiedAt" => ""
      "name" => ""
      "type" => ""
      "category" => ""
      "status" => ""
      "severityScore" => "-100"
      "detectionType" => ""
      "attackSpread" => "-100"
      "notable" => "false"
      "verticallyTargeted" => ""
      "geoTargeted" => ""
      "actors" => ""
      "families" => ""
      "malware" => ""
      "techniques" => ""
      "brands" => ""
      "_associations" => ""
      "security_result" => ""
      "_category" => ""
      "_category_details" => ""
      "_verdict_info" => ""
      "has_principal" => "false"
      "has_target" => "false"
    }
  }

  json {
    source => "message"
    array_function => "split_columns"
    on_error => "json_failure"
  }

  mutate {
    convert => {
      "attackSpread" => "integer"
    }
    on_error => "attackSpread_converison_failure"
  }

  mutate {
    convert => {
      "severityScore" => "integer"
    }
    on_error => "severityScore_converison_failure"
  }

  if [json_failure] {
    drop {
      tag => "TAG_MALFORMED_MESSAGE"
    }
  }

  if [id] != "" {
    mutate {
      replace => {
        "event.idm.read_only_udm.metadata.product_log_id" => "%{id}"
      }
      on_error => "id_not_present"
    }
  }

  if [name] != "" {
    mutate {
      replace => {
        "security_result.threat_name" => "%{name}"
      }
      on_error => "_name_not_present"
    }
  }

  if [identifiedAt] != "" {
    date {
      match => ["identifiedAt","ISO8601"]
      target => "security_result.first_discovered_time"
      on_error => "identifiedAt_date_failure"
    }
  }

  if [type] != "" {
    mutate {
      replace => {
        "event.idm.read_only_udm.metadata.product_event_type" => "%{type}"
      }
      on_error => "_type_not_present"
    }
  }

  if [status] != "" {
    if [status] == "active" {
      mutate {
        replace => {
          "security_result.threat_status" => "ACTIVE"
        }
      }
    }
    else if [status] == "cleared" {
      mutate {
        replace => {
          "security_result.threat_status" => "CLEARED"
        }
      }
    }
  }

  if [severityScore] != -100 {
    if [severityScore] >= 75 {
      mutate {
        replace => {
          "threat_result.severity" => "CRITICAL"
        }
      }
    }
    else if [severityScore] >= 50 {
      mutate {
        replace => {
          "threat_result.severity" => "HIGH"
        }
      }
    }
    else if [severityScore] >= 25 {
      mutate {
        replace => {
          "threat_result.severity" => "MEDIUM"
        }
      }
    }
    else if [severityScore] >= 0 {
      mutate {
        replace => {
          "threat_result.severity" => "LOW"
        }
      }
    }
    else {
      mutate {
        replace => {
          "threat_result.severity" => "UNKNOWN_SEVERITY"
        }
      }
    }
    mutate {
      convert => {
        "severityScore" => "string"
      }
      on_error => "severityScore_already_string"
    }
    mutate {
      replace => {
        "threat_result.severity_details" => "%{severityScore}"
      }
      on_error => "severityScore_not_present"
    }
  }

  if [category] != "" {
    mutate {
      replace => {
        "_category_details" => "%{category}"
      }
      on_error => "category_details_not_present"
    }
    if [category] == "phish" {
      mutate {
        replace => {
          "_category" => "MAIL_PHISHING"
        }
      }
    }
    else if [category] == "spam" {
      mutate {
        replace => {
          "_category" => "MAIL_SPAM"
        }
      }
    }
    else if [category] == "malware" {
      mutate {
        replace => {
          "_category" => "SOFTWARE_MALICIOUS"
        }
      }
    }
    else if [category] == "impostor" {
      mutate {
        replace => {
          "_category" => "MAIL_SPOOFING"
        }
      }
    }
    else {
      mutate {
        replace => {
          "_category" => "UNKNOWN_CATEGORY"
        }
      }
    }
    if [_category] != "" {
      mutate {
        merge => {
          "security_result.category" => "_category"
        }
        on_error => "category_merge_failure"
      }
    }
    if [_category_details] != "" {
      mutate {
        merge => {
          "security_result.category_details" => "_category_details"
        }
        on_error => "category_details_merge_failure"
      }
    }
  }

  if [attackSpread] != -100 {
    mutate {
      convert => {
        "attackSpread" => "string"
      }
      on_error => "attackSpread_already_string"
    }
    mutate {
      replace => {
        "_verdict_info.global_customer_count" => "%{attackSpread}"
      }
      on_error => "attackSpread_not_present"
    }
    mutate {
      convert => {
        "_verdict_info.global_customer_count" => "integer"
      }
      on_error => "attackSpread_converison_failure"
    }
    mutate {
      merge => {
        "security_result.verdict_info" => "_verdict_info"
      }
      on_error => "verdict_info_merge_failure"
    }
  }

  if [geoTargeted] != "" {
    mutate {
      convert => {
        "geoTargeted" => "string"
      }
      on_error => "geoTargeted_already_string"
    }
    mutate {
      replace => {
        "geoTargeted_label.value.string_value" => "%{geoTargeted}"
      }
      on_error => "geoTargeted_not_found"
    }
    if ![geoTargeted_not_found] {
      mutate {
        replace => {
          "geoTargeted_label.key" => "geoTargeted"
        }
      }
      mutate {
        merge => {
          "additional.fields" => "geoTargeted_label"
        }
        on_error => "geoTargeted_not_present"
      }
    }
  }

  if [verticallyTargeted] != "" {
    mutate {
      convert => {
        "verticallyTargeted" => "string"
      }
      on_error => "verticallyTargeted_already_string"
    }
    mutate {
      replace => {
        "verticallyTargeted_label.value.string_value" => "%{verticallyTargeted}"
      }
      on_error => "verticallyTargeted_not_found"
    }
    if ![verticallyTargeted_not_found] {
      mutate {
        replace => {
          "verticallyTargeted_label.key" => "verticallyTargeted"
        }
      }
      mutate {
        merge => {
          "additional.fields" => "verticallyTargeted_label"
        }
        on_error => "verticallyTargeted_not_present"
      }
    }
  }

  if [notable] != "" {
    mutate {
      convert => {
        "notable" => "string"
      }
      on_error => "notable_already_string"
    }
    mutate {
      replace => {
        "notable_label.value.string_value" => "%{notable}"
      }
      on_error => "notable_not_found"
    }
    if ![notable_not_found] {
      mutate {
        replace => {
          "notable_label.key" => "notable"
        }
      }
      mutate {
        merge => {
          "additional.fields" => "notable_label"
        }
        on_error => "notable_not_present"
      }
    }
    if [notable] == "true" {
      mutate {
        replace => {
          "security_result.priority" => "HIGH_PRIORITY"
        }
      }
    }
    else {
      mutate {
        replace => {
          "security_result.priority" => "LOW_PRIORITY"
        }
      }
    }
  }

  if [detectionType] != "" {
    mutate {
      convert => {
        "detectionType" => "string"
      }
      on_error => "detectionType_already_string"
    }
    mutate {
      replace => {
        "detectionType_label.value.string_value" => "%{detectionType}"
      }
      on_error => "detectionType_not_found"
    }
    if ![detectionType_not_found] {
      mutate {
        replace => {
          "detectionType_label.key" => "detectionType"
        }
      }
      mutate {
        merge => {
          "additional.fields" => "detectionType_label"
        }
        on_error => "detectionType_not_present"
      }
    }
  }

  if [actors] != "" {
    for actor in actors {
      mutate {
        replace => {
          "_associated_actors" => ""
        }
      }
      mutate {
        replace => {
          "_associated_actors.id" => "%{actor.id}"
        }
        on_error => "_actor_id_not_present"
      }
      mutate {
        replace => {
          "_associated_actors.name" => "%{actor.name}"
        }
        on_error => "_actor_name_not_present"
      }
      mutate {
        replace => {
          "_associated_actors.type" => "THREAT_ACTOR"
        }
      }
      if [_associated_actors] != "" {
        mutate {
          merge => {
            "_associations.associated_actors" => "_associated_actors"
          }
          on_error => "_actor_not_present"
        }
      }
    }
  }

  if [families] != "" {
    for family in families {
      mutate {
        replace => {
          "_associated_actors" => ""
        }
      }
      mutate {
        replace => {
          "_associated_actors.id" => "%{family.id}"
        }
        on_error => "_family_id_not_present"
      }
      mutate {
        replace => {
          "_associated_actors.name" => "family_name: %{family.name}"
        }
        on_error => "_family_name_not_present"
      }
      mutate {
        replace => {
          "_associated_actors.type" => "ASSOCIATION_TYPE_UNSPECIFIED"
        }
      }
      if [_associated_actors] != "" {
        mutate {
          merge => {
            "_associations.associated_actors" => "_associated_actors"
          }
          on_error => "_associated_actors_merge_failure"
        }
      }
    }
  }

  if [malware] != "" {
    for _malware in malware {
      mutate {
        replace => {
          "_associated_actors" => ""
        }
      }
      mutate {
        replace => {
          "_associated_actors.id" => "%{_malware.id}"
        }
        on_error => "_malware_id_not_present"
      }
      mutate {
        replace => {
          "_associated_actors.name" => "%{_malware.name}"
        }
        on_error => "_malware_name_not_present"
      }
      mutate {
        replace => {
          "_associated_actors.type" => "MALWARE"
        }
      }
      if [_associated_actors] != "" {
        mutate {
          merge => {
            "_associations.associated_actors" => "_associated_actors"
          }
          on_error => "_associated_actors_merge_failure"
        }
      }
    }
  }

  if [techniques] != "" {
    for _technique in techniques {
      mutate {
        replace => {
          "_techniques" => ""
        }
      }
      mutate {
        replace => {
          "_techniques.id" => "%{_technique.id}"
        }
        on_error => "_technique_id_not_present"
      }
      mutate {
        replace => {
          "_techniques.name" => "%{_technique.name}"
        }
        on_error => "_technique_name_not_present"
      }
      if [_techniques] != "" {
        mutate {
          merge => {
            "security_result.attack_details.techniques" => "_techniques"
          }
          on_error => "_techniques_merge_failure"
        }
      }
    }
  }

  if [brands] != "" {
    for _brand in brands {
      mutate {
        replace => {
          "_associated_actors" => ""
        }
      }
      mutate {
        replace => {
          "_associated_actors.id" => "%{_brand.id}"
        }
        on_error => "_brand_id_not_present"
      }
      mutate {
        replace => {
          "_associated_actors.name" => "brand_name: %{_brand.name}"
        }
        on_error => "_brand_name_not_present"
      }
      mutate {
        replace => {
          "_associated_actors.type" => "ASSOCIATION_TYPE_UNSPECIFIED"
        }
      }
      if [_associated_actors] != "" {
        mutate {
          merge => {
            "_associations.associated_actors" => "_associated_actors"
          }
          on_error => "_associated_actors_merge_failure"
        }
      }
    }
  }

  if [_associations] != "" {
    mutate {
      merge => {
        "security_result.associations" => "_associations"
      }
      on_error => "_associations_merge_failure"
    }
  }
  if [security_result] != "" {
    mutate {
      merge => {
        "event.idm.read_only_udm.security_result" => "security_result"
      }
      on_error => "security_result_merge_failure"
    }
  }

  if [additional] != "" {
    mutate {
      rename => {
        "additional" => "event.idm.read_only_udm.additional"
      }
    }
  }
  mutate {
    replace => {
      "event.idm.read_only_udm.metadata.product_name" => "TAP Threats"
      "event.idm.read_only_udm.metadata.vendor_name" => "Proofpoint"
      "event.idm.read_only_udm.metadata.product_event_type" => "Proofpoint_Threats_Feed"
    }
  }
  if [has_principal] == "true" and [has_target] == "true" {
    mutate {
      replace => {
        "event.idm.read_only_udm.metadata.event_type" => "NETWORK_CONNECTION"
      }
    }
  }
  else if [has_principal] == "true" and [has_target] == "false" {
    mutate {
      replace => {
        "event.idm.read_only_udm.metadata.event_type" => "STATUS_UPDATE"
      }
    }
  }
  else {
    mutate {
      replace => {
        "event.idm.read_only_udm.metadata.event_type" => "GENERIC_EVENT"
      }
    }
  }
  mutate {
    merge => {
      "@output" => "event"
    }
  }
}
