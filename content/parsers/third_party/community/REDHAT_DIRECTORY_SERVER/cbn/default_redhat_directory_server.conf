  if [namespace] != "" {
    mutate {
      replace => {
        "event.idm.read_only_udm.principal.namespace" => "%{namespace}"
      }
      on_error => "namespace_failed"
    }
  }

  if [properties][_hostname] != "" {
    mutate {
      replace => {
        "event.idm.read_only_udm.target.hostname" => "%{properties._hostname}"
        "event.idm.read_only_udm.target.asset.hostname" => "%{properties._hostname}"
        "has_target" => "true"
      }
      on_error => "hostname_label_merge_failed1"
    }
  }
  else if [properties][host] != "" {
    mutate {
      replace => {
        "event.idm.read_only_udm.target.hostname" => "%{properties.host}"
        "event.idm.read_only_udm.target.asset.hostname" => "%{properties.host}"
        "has_target" => "true"
      }
      on_error => "hostname_label_merge_failed2"
    }
  }

  if [properties][_file_path] != "" {
    mutate {
      replace => {
        "event.idm.read_only_udm.target.process.file.full_path" => "%{properties._file_path}"
      }
    }
