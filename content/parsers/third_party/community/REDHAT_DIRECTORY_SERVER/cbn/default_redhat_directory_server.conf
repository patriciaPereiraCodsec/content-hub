        "label.key" => "File inode"
        "label.value.string_value" => "%{properties._file_inode}"
      }
      on_error => "no_label"
    }
    if ![no_label] {
      mutate {
        merge => {
          "event.idm.read_only_udm.additional.fields" => "label"
        }
        on_error => "label_merge_failed"
      }
    }
  }
  if [properties][_file_offset] != "" {
    mutate {
