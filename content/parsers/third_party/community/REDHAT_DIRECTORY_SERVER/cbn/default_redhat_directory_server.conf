# Last Updated: 2026-05-04
# Copyright 2026 Google SecOps

filter {
  mutate {
    replace => {
      "level" => ""
      "sec_result" => ""
      "base" => ""
      "dn" => ""
      "client_ip" => ""
      "target_ip" => ""
      "oid" => ""
      "operation" => ""
      "conn" => ""
      "csn" => ""
      "op" => ""
      "err" => ""
      "tag" => ""
      "nentries" => ""
      "kvdata1" => ""
      "kvdata" => ""
      "creationDate" => ""
      "recordDate" => ""
      "wtime" => ""
      "optime" => ""
      "etime" => ""
      "cn" => ""
      "ou" => ""
      "o" => ""
      "scope" => ""
      "filter" => ""
      "attrs" => ""
      "name" => ""
      "method" => ""
      "version" => ""
      "targetop" => ""
      "msgid" => ""
      "fd" => ""
      "slot" => ""
      "time" => ""
      "properties._hostname" => ""
      "properties.host" => ""
      "properties._file_path" => ""
      "properties._ecs_agent_version" => ""
      "properties._file_inode" => ""
      "properties._file_offset" => ""
      "properties._os" => ""
      "properties.country" => ""
      "properties.discipline" => ""
      "properties.document_type" => ""
      "properties.environment" => ""
      "properties.hostgroup" => ""
      "properties.platform" => ""
      "properties.product" => ""
      "properties.project" => ""
      "target" => ""
      "user" => ""
      "msg1" => ""
      "mrId" => ""
      "namespace" => ""
      "msg_test" => ""
      "ts" => ""
      "host" => ""
      "desc" => ""
      "attrs_label_flag" => "false"
      "is_present_app" => "false"
      "has_userid" => "false"
      "has_principal" => "false"
      "has_target" => "false"
      "has_resource" => "false"
    }
  }

  mutate {
    gsub => ["message","message","msg_test"]
  }
  mutate {
    gsub => ["message","\\r",""]
  }
  json {
    source => "message"
    array_function => "split_columns"
    on_error => "json_failure"
  }
  if [json_failure] {
    mutate {
      replace => {
        "msg_test" => "%{message}"
      }
      on_error => "msg_test_replace_failure"
    }
  }
  if [msg_test] != "" {
    grok {
      match => {
        "msg_test" => [
                             "\\[%{HTTPDATE:time}\\] %{DATA:kvdata}\\s+%{WORD:operation} connection from %{IP:client_ip} to %{IP:target_ip}"
                             "\\[%{HTTPDATE:time}\\] %{GREEDYDATA:kvdata}(?:s|)(?:%{GREEDYDATA}|) %{IP:client_ip} to %{IP:target_ip}",
                             "\\[%{HTTPDATE:time}\\] %{DATA:kvdata} %{WORD:operation} %{GREEDYDATA:kvdata1}(?:)"
                             "\\[%{HTTPDATE:time}\\] %{GREEDYDATA:kvdata} %{WORD:operation}(?:\s|)(?:%{GREEDYDATA:kvdata1}|)(?:\s|)(?:%{GREEDYDATA}|)"
                             "%{GREEDYDATA:msg1}"
                            ]
      }
      overwrite => ["client_ip", "target_ip", "operation","kvdata1","kvdata","time","msg1"]
      on_error => "msg_test_failure"
    }
    if [time] != "" {
      date {
        match => ["time", "dd/MMM/yyyy:HH:mm:ss Z"]
        on_error => "failure"
      }
    }
    if [msg_test_failure] {
      drop {
        tag => "TAG_MALFORMED_MESSAGE"
      }
    }

    if [operation] != "" {
      mutate {
        replace => {
          "event.idm.read_only_udm.metadata.product_event_type" => "%{operation}"
        }
      }
    }

    if [client_ip] != "" {
      mutate {
        merge => {
          "event.idm.read_only_udm.principal.ip" => "client_ip"
        }
        on_error => "client_ip_merge_failed"
      }
      if ![client_ip_merge_failed] {
        mutate {
          replace => {
            "has_principal" => "true"
          }
        }
      }
    }

    if [target_ip] != "" {
      mutate {
        merge => {
          "event.idm.read_only_udm.target.ip" => "target_ip"
        }
        on_error => "target_ip_merge_failed"
      }
      if ![target_ip_merge_failed] {
        mutate {
          replace => {
            "has_target" => "true"
          }
        }
      }
    }
    if [kvdata1] != "" {
      mutate {
        gsub => ["kvdata1", "\\s+([a-zA-Z]+=)", "^$1"]
      }
      kv {
        source => "kvdata1"
        value_split => "="
        field_split => "^"
        on_error => "failure"
      }
    }
    if [kvdata] != "" {
      kv {
        source => "kvdata"
        value_split => "="
        field_split => " "
        on_error => "failure"
      }

      if [oid] != "" {
        mutate {
          gsub => ["oid", '\"', ""]
        }
        mutate {
          replace => {
            "event.idm.read_only_udm.principal.asset.product_object_id" => "%{oid}"
          }
        }
      }
      if [base] != "" {
        mutate {
          gsub => ["base", '\"', ""]
        }
        kv {
          source => "base"
          value_split => "="
          field_split => ","
          on_error => "failure"
        }
        mutate {
          merge => {
            "event.idm.read_only_udm.target.user.group_identifiers" => "base"
          }
        }
      }
      else if [dn] != "" {
        mutate {
          gsub => ["dn", '\"', ""]
        }
        grok {
          match => {
            "dn" => [
              "cn=%{DATA:user},"
            ]
          }
          overwrite => ["user"]
          on_error => "failure"
        }
        if [user] != "" {
          mutate {
            replace => {
              "event.idm.read_only_udm.principal.user.userid" => "%{user}"
              "has_userid" => "true"
            }
            on_error => "failure"
          }
        }
        mutate {
          merge => {
            "event.idm.read_only_udm.target.user.group_identifiers" => "dn"
          }
        }
        kv {
          source => "dn"
          value_split => "="
          field_split => ","
          on_error => "failure"
        }

      }
    }
  }
  grok {
    match => {
      "message" => [
          "<%{INT}>%{SYSLOGTIMESTAMP:ts} %{DATA:host}\\[%{INT}\\]: %{GREEDYDATA:desc}"
      ]
    }
    overwrite => ["host", "desc", "ts"]
    on_error => "grok_message_failure"
  }
    if [ts] != "" {
    date {
      match => ["ts", "MMM d HH:mm:ss"]
      rebase => true
      on_error => "ts_failure"
    }
  }
  if [host] != "" {
    mutate {
      replace => {
        "event.idm.read_only_udm.principal.hostname" => "%{host}"
        "event.idm.read_only_udm.principal.asset.hostname" => "%{host}"
        "has_principal" => "true"
      }
      on_error => "host_failure"
    }
  }
  if [desc] != "" {
    mutate {
      replace => {
        "event.idm.read_only_udm.metadata.description" => "%{desc}"
      }
      on_error => "desc_failure"
    }
  }
  mutate {
    rename => {
      "o" => "organization"
    }
  }
  if [level] != "" {
    mutate {
      uppercase => ["level"]
    }
  }

  if [level] in ["INFO", "DEBUG", "AUDIT"] {
    mutate {
      replace => {
        "sec_result.severity" => "INFORMATIONAL"
      }
    }
  }
  else if [level] in ["ERROR", "WARNING"] {
    mutate {
      replace => {
        "sec_result.severity" => "ERROR"
      }
    }
  }

  if [sec_result] != "" {
    mutate {
      merge => {
        "event.idm.read_only_udm.security_result" => "sec_result"
      }
    }
