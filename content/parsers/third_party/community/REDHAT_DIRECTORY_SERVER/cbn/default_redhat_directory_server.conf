        "attrs", '\"', ''
      ]
    }
    mutate {
      gsub => ["attrs", '\\s+', ',']
    }
    mutate {
      replace => {
        "attrs" => "{\"attrs\":[%{attrs}]}"
      }
    }
    mutate {
      gsub => ["attrs", '\\[', '\["']
    }
    mutate {
      gsub => ["attrs", '\\]', '"\]']
    }
    mutate {
      gsub => ["attrs", ',', '","']
    }
    json {
      source => "attrs"
      array_function => "split_columns"
      on_error => "attrs_json_parse_failed"
    }
    for evntapp in attrs {
      mutate {
        convert => {
          "evntapp" => "string"
        }
        on_error => "evntapp_conversion_error"
      }
      mutate {
        replace => {
          "value_array1" => ""
        }
      }
      mutate {
        replace => {
          "value_array1.string_value" => "%{evntapp}"
        }
        on_error => "additional_evnt_empty1"
      }
      mutate {
        merge => {
          "evnt_label1.value.list_value.values" => "value_array1"
        }
        on_error => "additional_evnt_not_found1"
      }
      if ![additional_evnt_not_found1] {
        mutate {
          replace => {
            "is_present_app" => "true"
          }
        }
      }
    }
    if [is_present_app] == "true" {
      mutate {
        replace => {
          "evnt_label1.key" => "Attrs"
        }
      }
      mutate {
        merge => {
          "event.idm.read_only_udm.additional.fields" => "evnt_label1"
        }
        on_error => "additional_events_empty1"
      }
    }
  }
  if [filter] != "" {
    mutate {
      gsub => [
        "filter", '\"', ''
      ]
    }
    mutate {
      replace => {
        "filter_label.key" => "Filter"
        "filter_label.value.string_value" => "%{filter}"
      }
      on_error => "filter_label_replace_failed"
    }
    mutate {
      merge => {
        "event.idm.read_only_udm.additional.fields" => "filter_label"
      }
      on_error => "filter_label_merge_failed"
    }
  }
  if [name] != "" {
    mutate {
      gsub => [
        "name", '\"', ''
      ]
    }
    mutate {
      replace => {
        "name_label.key" => "Name"
        "name_label.value.string_value" => "%{name}"
      }
      on_error => "name_label_replace_failed"
    }
    mutate {
      merge => {
        "event.idm.read_only_udm.additional.fields" => "name_label"
      }
      on_error => "name_label_merge_failed"
    }
  }

  if [creationDate] != "" {
    mutate {
      convert => {
        "creationDate" => "string"
      }
    }
    mutate {
      gsub => ["creationDate","\\d\\d\\d\\d\\d\\d$" ,"" ]
    }
    date {
      match => ["creationDate","UNIX_MS" ]
      target => "about.resource.attribute.creation_time"
      on_error => "creation_date_conversion_failed"
    }
    if ![creation_date_conversion_failed] {
      mutate {
        replace => {
          "has_resource" => "true"
        }
      }
    }
  }
  if [recordDate] != "" {
    mutate {
      convert => {
        "recordDate" => "string"
      }
    }

    mutate {
      gsub => ["recordDate","\\d\\d\\d\\d\\d\\d$" ,"" ]
    }

    date {
      match => ["recordDate","UNIX_MS" ]
      target => "event.idm.read_only_udm.metadata.collected_timestamp"
    }
  }
  mutate {
    merge => {
      "event.idm.read_only_udm.about" => "about"
    }
    on_error => "about_merge_failed"
  }

  if [properties][_os] == "linux" {
    mutate {
      replace => {
        "event.idm.read_only_udm.target.platform" => "LINUX"
      }
    }
  }

  if [has_principal] == "true" && [has_target] == "true" {
    mutate {
      replace => {
        "event.idm.read_only_udm.metadata.event_type" => "NETWORK_CONNECTION"
      }
    }
  }
  else if [has_userid] == "true" && [has_resource] == "true" {
    mutate {
      replace => {
        "event.idm.read_only_udm.metadata.event_type" => "USER_RESOURCE_ACCESS"
      }
    }
  }
  else if [has_userid] == "true" {
    mutate {
      replace => {
        "event.idm.read_only_udm.metadata.event_type" => "USER_UNCATEGORIZED"
      }
    }
  }
  else if [has_principal] == "true" {
    mutate {
      replace => {
        "event.idm.read_only_udm.metadata.event_type" => "STATUS_UPDATE"
      }
    }
  }
  else {
    mutate {
      replace => {
        "event.idm.read_only_udm.metadata.event_type" => "GENERIC_EVENT"
      }
    }
  }

  mutate {
    replace => {
      "event.idm.read_only_udm.metadata.product_name" => "REDHAT_DIRECTORY_SERVER"
      "event.idm.read_only_udm.metadata.vendor_name" => "REDHAT"
    }
  }

  mutate {
    merge => {
      "@output" => "event"
    }
  }
}
