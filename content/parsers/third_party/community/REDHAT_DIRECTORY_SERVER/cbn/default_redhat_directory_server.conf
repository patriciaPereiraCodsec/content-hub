        "properties._file_offset" => "string"
      }
    }
    mutate {
      replace => {
        "offset_label.key" => "File Offset"
        "offset_label.value.string_value" => "%{properties._file_offset}"
      }
      on_error => "offset_label_replace_failed"
    }
    mutate {
      merge => {
        "event.idm.read_only_udm.additional.fields" => "offset_label"
      }
      on_error => "offset_label_merge_failed"
