    }

    if [_source][rule][id] != "" {
      mutate {
        replace => {
          "security_result.rule_id" => "%{_source.rule.id}"
        }
        on_error => "rule_id_invalid"
      }
    }

    if [_source][rule][ruleset] != "" {
      mutate {
        replace => {
          "security_result.rule_set" => "%{_source.rule.ruleset}"
        }
        on_error => "rule_set_invalid"
      }
    }

    if [_source][event][action] != "" {
      mutate {
        replace => {
          "security_result.action_details" => "%{_source.event.action}"
        }
        on_error => "action_invalid"
      }
    }

    if [_source][event][risk_score] != "" {
      mutate {
        convert => {
          "_source.event.risk_score" => "string"
        }
        on_error => "risk_score_invalid"
      }
      mutate {
        replace => {
          "detection_fields_risk_score.key" => "Risk Score"
          "detection_fields_risk_score.value" => "%{_source.event.risk_score}"
        }
        on_error => "risk_score_invalid"
      }
      if ![risk_score_invalid] {
        mutate {
          merge => {
            "security_result.detection_fields" => "detection_fields_risk_score"
          }
          on_error => "risk_score_invalid"
        }
      }
    }

    for threat in _source.threat {
      for tactic in threat.tactic {
        mutate {
          replace => {
            "detection_fields_tactic_reference.key" => "Tactic Reference"
            "detection_fields_tactic_reference.value" => "%{tactic.reference}"
          }
          on_error => "tactic_reference_invalid"
        }
        if ![tactic_reference_invalid] {
          mutate {
            merge => {
              "security_result.detection_fields" => "detection_fields_tactic_reference"
            }
            on_error => "tactic_reference_invalid"
          }
        }
      }
      for technique in threat.technique {
        mutate {
          replace => {
            "detection_fields_technique_reference" => ""
            "attack_details_tactic" => ""
          }
        }
        mutate {
          replace => {
            "detection_fields_technique_reference.key" => "Technique Reference"
            "detection_fields_technique_reference.value" => "%{technique.reference}"
          }
          on_error => "technique_reference_invalid"
        }
        if ![technique_reference_invalid] {
          mutate {
            merge => {
              "security_result.detection_fields" => "detection_fields_technique_reference"
            }
            on_error => "technique_reference_invalid"
          }
        }
        mutate {
          replace => {
            "attack_details_tactic.id" => "%{technique.id}"
            "attack_details_tactic.name" => "%{technique.name}"
          }
          on_error => "technique_id_name_invalid"
        }
        if ![technique_id_name_invalid] {
          mutate {
            merge => {
              "security_result.attack_details.tactics" => "attack_details_tactic"
            }
            on_error => "technique_id_name_invalid"
          }
        }
        for subtechnique in technique.subtechnique {
          mutate {
            replace => {
              "detection_fields_subtechnique_reference" => ""
            }
          }
          mutate {
            replace => {
              "detection_fields_subtechnique_reference.key" => "Subtechnique Reference"
              "detection_fields_subtechnique_reference.value" => "%{subtechnique.reference}"
            }
            on_error => "subtechnique_reference_invalid"
          }
          if ![subtechnique_reference_invalid] {
            mutate {
              merge => {
                "security_result.detection_fields" => "detection_fields_subtechnique_reference"
              }
              on_error => "subtechnique_reference_invalid"
            }
          }
          mutate {
            replace => {
              "attack_details_subtechnique.subtechnique_id" => "%{subtechnique.id}"
              "attack_details_subtechnique.subtechnique_name" => "%{subtechnique.name}"
            }
            on_error => "subtechnique_id_name_invalid"
          }
          if ![subtechnique_id_name_invalid] {
            mutate {
              merge => {
                "security_result.attack_details.techniques" => "attack_details_subtechnique"
              }
              on_error => "subtechnique_id_name_invalid"
            }
          }
        }
      }
    }

    if [_source][message] != "" {
      mutate {
        replace => {
          "security_result.summary" => "%{_source.message}"
        }
        on_error => "message_invalid"
      }
    }

    if [has_principal] == "true" and [has_target_process] == "true" {
      mutate {
        replace => {
          "event_type" => "FILE_UNCATEGORIZED"
        }
      }
    }
    else if [has_principal] == "true" and [has_user] == "true" {
      mutate {
        replace => {
          "event_type" => "USER_UNCATEGORIZED"
        }
      }
    }
  }
  else {
    if [has_principal] == "true" and [has_user] == "true" {
      mutate {
        replace => {
          "event_type" => "USER_UNCATEGORIZED"
        }
      }
    }
  }
  if [has_principal] == "true" and [has_target_user] == "true" {
    mutate {
      replace => {
        "event_type" => "USER_LOGIN"
        "event.idm.read_only_udm.extensions.auth.type" => "MACHINE"
      }
    }
  }
  else if [event_type] == "" and [has_principal] == "true" {
    mutate {
      replace => {
        "event_type" => "STATUS_UPDATE"
      }
    }
  }
  else if [event_type] == "" {
    mutate {
      replace => {
        "event_type" => "GENERIC_EVENT"
      }
    }
  }
  if [event_type] != "" {
    mutate {
      replace => {
        "metadata.event_type" => "%{event_type}"
      }
      on_error => "event_type_invalid"
    }
  }

  mutate {
    replace => {
      "metadata.vendor_name" => "Elastic"
      "metadata.product_name" => "Elastic Defend"
      "metadata.log_type" => "ELASTIC_DEFEND"
    }
  }

  if [security_result] != "" {
    mutate {
      merge => {
        "event.idm.read_only_udm.security_result" => "security_result"
      }
      on_error => "security_result_invalid"
    }
  }
  if [additional] != "" {
    mutate {
      rename => {
        "additional" => "event.idm.read_only_udm.additional"
      }
    }
  }
  if [metadata] != "" {
    mutate {
      rename => {
        "metadata" => "event.idm.read_only_udm.metadata"
      }
    }
  }
  if [principal] != "" {
    mutate {
      rename => {
        "principal" => "event.idm.read_only_udm.principal"
      }
    }
  }
  if [target] != "" {
    mutate {
      rename => {
        "target" => "event.idm.read_only_udm.target"
      }
    }
  }
  if [intermediary] != "" {
    mutate {
      merge => {
        "event.idm.read_only_udm.intermediary" => "intermediary"
      }
      on_error => "intermediary_invalid"
    }
  }

  # output the built event
  mutate {
    merge=> {
      "@output" => "event"
    }
  }
}
