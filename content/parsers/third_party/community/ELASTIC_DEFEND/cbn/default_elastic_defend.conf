# Product: Elastic Defend
# Category: Network Monitoring
# Supported Format: JSON
# Reference: N/A
# Last Updated: 2026-03-02
# Copyright 2026 Google SecOps

filter {
  mutate {
    replace => {
      "event_type" => ""
      "principal" => ""
      "security_result" => ""
      "target" => ""
      "metadata" => ""
      "additional" => ""
      "has_principal" => "false"
      "has_target" => "false"
      "has_target_file" => "false"
      "has_user" => "false"
      "has_target_process" => "false"
      "has_principal_process" => "false"
      "_source.host.ip" => ""
      "_source.host.hostname" => ""
      "_source.host.mac" => ""
      "_source.host.os.Ext.variant" => ""
      "_source.host.name" => ""
      "_source.host.id" => ""
      "_source.host.os.full" => ""
      "_source.host.os.type" => ""
      "_source.host.os.kernel" => ""
      "_source.agent.id" => ""
      "_source.agent.type" => ""
      "_source.agent.version" => ""
      "_source.host.architecture" => ""
      "_source.event.agent_id_status" => ""
      "_source.event.id" => ""
      "_source.event.kind" => ""
      "_source.event.category" => ""
      "_source.event.outcome" => ""
      "_source.user.name" => ""
      "_source.user.id" => ""
      "_source.user.domain" => ""
      "_source.dll.name" => ""
      "_source.dll.path" => ""
      "_source.dll.hash.sha1" => ""
      "_source.dll.hash.sha256" => ""
      "_source.dll.hash.md5" => ""
      "_source.event.created" => ""
      "_source.process.executable" => ""
      "_source.process.name" => ""
      "_source.file.name" => ""
      "_source.file.path" => ""
      "_source.event.action" => ""
      "_source.process.thread.capabilities.effective" => ""
      "_source.process.thread.capabilities.permitted" => ""
      "has_action_array" => "false"
      "_source.process.hash.sha1" => ""
      "_source.process.hash.sha256" => ""
      "_source.process.hash.md5" => ""
      "_source.process.command_line" => ""
      "_source.process.Ext.session_info.logon_type" => ""
      "_source.source.port" => ""
      "_source.source.address" => ""
      "_source.source.ip" => ""
      "_source.destination.address" => ""
      "_source.destination.ip" => ""
      "_source.destination.geo.city_name" => ""
      "_source.destination.geo.region_name" => ""
      "_source.destination.geo.country_name" => ""
      "_source.destination.geo.continent_name" => ""
      "_source.destination.geo.location.lat" => ""
      "_source.destination.geo.location.lon" => ""
      "_source.destination.geo.region_iso_code" => ""
      "_source.network.transport" => ""
      "_source.kibana.alert.rule.parameters.severity" => ""
      "_source.destination.as.organization.name" => ""
      "_source.network.type" => ""
      "_source.message" => ""
      "hardware" => ""
      "_source.process.parent.executable" => ""
      "_source.Target.process.executable" => ""
      "_source.rule.description" => ""
      "_source.process.parent.command_line" => ""
      "_source.event.code" => ""
      "_source.Endpoint.policy.applied.artifacts.global.identifiers" => ""
      "_source.Endpoint.policy.applied.artifacts.user.version" => ""
      "_source.Endpoint.policy.applied.artifacts.global.version" => ""
      "_source.Endpoint.policy.applied.artifacts.global.snapshot" => ""
      "_source.agent.build.original" => ""
      "_source.rule.id" => ""
      "_source.rule.ruleset" => ""
      "_source.event.risk_score" => ""
      "_source.group.name" => ""
      "_source.rule.name" => ""
      "threat.tactic" => ""
      "tactic.reference" => ""
      "_source.group.id" => ""
      "threat.technique" => ""
      "technique.reference" => ""
      "technique.name" => ""
      "technique.subtechnique" => ""
      "subtechnique.reference" => ""
      "subtechnique.name" => ""
      "_source.file.Ext.malware_signature.primary.signature.name" => ""
      "_source.file.Ext.malware_signature.primary.signature.id" => ""
      "_source.file.Ext.malware_signature.primary.signature.hash.sha256" => ""
      "_source.file.Ext.malware_signature.all_names" => ""
      "_source.file.Ext.malware_signature.identifier" => ""
      "_source.process.entity_id" => ""
      "_source.process.pid" => ""
      "_source.kibana.alert.rule.description" => ""
      "_source.kibana.alert.rule.rule_id" => ""
      "_source.kibana.alert.rule.name" => ""
      "intermediary" => ""
      "_source.process.Ext.token.integrity_level_name" => ""
      "_source.winlog.event_data.PrivilegeList" => ""
      "_source.event.ingested" => ""
      "_source.event.provider" => ""
      "_source.process.Ext.code_signature" => ""
      "_source.host.domain" => ""
      "privilege_list_values.value" => ""
      "_source.process.Ext.ancestry" => ""
      "_source.process.Ext.protection" => ""
      "_source.process.Ext.authentication_id" => ""
      "has_target_user" => "false"
    }
  }

  json {
    source => "message"
    array_function => "split_columns"
    on_error => "json_invalid"
  }

  if [json_invalid] {
    drop {
      tag => "TAG_MALFORMED_MESSAGE"
    }
  }

  if [_id] not in ["" , " " , "null" , "N/A"] {
    mutate {
      replace => {
        "metadata.product_log_id" => "%{_id}"
      }
      on_error => "id_invalid"
    }
  }

  if [_source][@timestamp] != "" {
    date {
      match => ["_source.@timestamp", "ISO8601", "yyyy-MM-ddTHH:mm:ss.SSSSSSSSSZ", "yyyy-MM-ddTHH:mm:ss.SSSSSSZ", "yyyy-MM-ddTHH:mm:ss.SSSZ", "yyyy-MM-ddTHH:mm:ssZ"]
      target => "metadata.event_timestamp"
      on_error => "timestamp_invalid"
    }
  }

  if [_source][message] != "" {
    mutate {
      replace => {
        "security_result.summary" => "%{_source.message}"
      }
      on_error => "message_invalid"
    }
  }

  if [_source][ecs][version] != "" {
    mutate {
      replace => {
        "metadata.product_version" => "%{_source.ecs.version}"
      }
      on_error => "version_invalid"
    }
  }

  if [_source][host][ip] != "" {
    for ip in _source.host.ip {
      mutate {
        merge => {
          "principal.ip" => "ip"
          "principal.asset.ip" => "ip"
        }
        on_error => "ip_invalid"
      }
      if ![ip_invalid] {
        mutate {
          replace => {
            "has_principal" => "true"
          }
        }
      }
    }
  }

  if [_source][host][hostname] != "" {
    mutate {
      replace => {
        "principal.hostname" => "%{_source.host.hostname}"
        "has_principal" => "true"
      }
      on_error => "hostname_invalid"
    }
  }
  if [_source][host][hostname] != "" {
    mutate {
      replace => {
        "intermediary.hostname" => "%{_source.host.hostname}"
      }
      on_error => "intermediary_hostname_invalid"
    }
  }

  if [_source][host][mac] != "" {
    for mac in _source.host.mac {
      mutate {
        gsub => ["mac", "-", ":"]
      }
      mutate {
        merge => {
          "principal.mac" => "mac"
        }
        on_error => "mac_invalid"
      }
    }
  }

  if [_source][host][os][Ext][variant] != "" {
    mutate {
      replace => {
        "principal.platform_version" => "%{_source.host.os.Ext.variant}"
      }
      on_error => "os_variant_invalid"
    }
  }

  if [_source][host][name] != "" {
    mutate {
      replace => {
        "principal.asset.hostname" => "%{_source.host.name}"
      }
      on_error => "host_name_invalid"
    }
  }

  if [_source][host][id] != "" {
    mutate {
      replace => {
        "hardware.serial_number" => "%{_source.host.id}"
      }
      on_error => "host_id_invalid"
    }
  }

  if [_source][host][os][full] != "" {
    mutate {
      replace => {
        "hardware.cpu_platform" => "%{_source.host.os.full}"
      }
      on_error => "host_arch_not_present"
    }
  }
  if [hardware] != "" {
    mutate {
      merge => {
        "principal.asset.hardware" => "hardware"
      }
      on_error => "host_arch_not_present"
    }
  }

  if [_source][host][os][type] != "" {
    mutate {
      replace => {
        "os_type_check" => "%{_source.host.os.type}"
      }
      on_error => "os_type_invalid"
    }

    if [os_type_check] =~ "(?i)windows" {
      mutate {
        replace => {
          "principal.asset.platform_software.platform" => "WINDOWS"
        }
      }
    }
    else if [os_type_check] =~ "(?i)linux" {
      mutate {
        replace => {
          "principal.asset.platform_software.platform" => "LINUX"
        }
      }
    }
    else if [os_type_check] =~ "(?i)mac" {
      mutate {
        replace => {
          "principal.asset.platform_software.platform" => "MAC"
        }
      }
    }
    else if [os_type_check] =~ "(?i)ios" {
      mutate {
        replace => {
          "principal.asset.platform_software.platform" => "IOS"
        }
      }
    }
    else {
      mutate {
        replace => {
          "principal.asset.platform_software.platform" => "UNKNOWN_PLATFORM"
        }
      }
    }
  }

  if [_source][host][os][kernel] != "" {
    mutate {
      replace => {
        "principal.asset.platform_software.platform_patch_level" => "%{_source.host.os.kernel}"
      }
      on_error => "os_kernel_invalid"
    }
  }

  if [_source][agent][id] != "" {
    mutate {
      replace => {
        "additional_agent_id.key" => "Agent id"
        "additional_agent_id.value.string_value" => "%{_source.agent.id}"
      }
      on_error => "agent_id_invalid"
    }
    if ![agent_id_invalid] {
      mutate {
        merge => {
          "additional.fields" => "additional_agent_id"
        }
        on_error => "agent_id_invalid"
      }
    }
  }

  if [_source][agent][type] != "" {
    mutate {
      replace => {
        "additional_agent_type.key" => "Agent type"
        "additional_agent_type.value.string_value" => "%{_source.agent.type}"
      }
      on_error => "agent_type_invalid"
    }
    if ![agent_type_invalid] {
      mutate {
        merge => {
          "additional.fields" => "additional_agent_type"
        }
        on_error => "agent_type_invalid"
      }
    }
  }

  if [_source][agent][version] != "" {
    mutate {
      replace => {
        "additional_agent_version.key" => "Agent version"
        "additional_agent_version.value.string_value" => "%{_source.agent.version}"
      }
      on_error => "agent_version_invalid"
    }
    if ![agent_version_invalid] {
      mutate {
        merge => {
          "additional.fields" => "additional_agent_version"
        }
        on_error => "agent_version_invalid"
      }
    }
  }

  if [_source][host][architecture] != "" {
    mutate {
      replace => {
        "additional_host_architecture.key" => "Host Architecture"
        "additional_host_architecture.value.string_value" => "%{_source.host.architecture}"
      }
      on_error => "host_architecture_invalid"
    }
    if ![host_architecture_invalid] {
      mutate {
        merge => {
          "additional.fields" => "additional_host_architecture"
        }
        on_error => "host_architecture_invalid"
      }
    }
  }

  if [_source][event][agent_id_status] != "" {
    mutate {
      replace => {
        "additional_agent_id_status.key" => "Agent ID Status"
        "additional_agent_id_status.value.string_value" => "%{_source.event.agent_id_status}"
      }
      on_error => "agent_id_status_invalid"
    }
    if ![agent_id_status_invalid] {
      mutate {
        merge => {
          "additional.fields" => "additional_agent_id_status"
        }
        on_error => "agent_id_status_invalid"
      }
    }
  }

  if [_source][event][id] != "" {
    mutate {
      replace => {
        "additional_event_id.key" => "Event ID"
        "additional_event_id.value.string_value" => "%{_source.event.id}"
      }
      on_error => "event_id_invalid"
    }
    if ![event_id_invalid] {
      mutate {
        merge => {
          "additional.fields" => "additional_event_id"
        }
        on_error => "event_id_invalid"
      }
    }
  }

  if [_source][event][kind] != "" {
    mutate {
      replace => {
        "detection_fields_source.key" => "Source"
        "detection_fields_source.value" => "%{_source.event.kind}"
      }
      on_error => "source_invalid"
    }
    if ![source_invalid] {
      mutate {
        merge => {
          "security_result.detection_fields" => "detection_fields_source"
        }
        on_error => "source_invalid"
      }
    }
  }

  if [_source][event][category] != "" {
    for category in _source.event.category {
      mutate {
        merge => {
          "security_result.category_details" => "category"
        }
        on_error => "category_invalid"
      }
    }
  }

  mutate {
    replace => {
      "outcome_result" => "%{_source.event.outcome}"
    }
    on_error => "outcome_result_not_found"
  }
  mutate {
    uppercase => ["outcome_result"]
    on_error => "outcome_result_invalid"
  }

  if [outcome_result] in ["SUCCESS", "ALLOW"] {
    mutate {
      replace => {
        "outcome_result" => "ALLOW"
      }
    }
  }
  else if [outcome_result] in ["FAILURE", "DENY", "SKIPPED", "RATE_LIMIT"] {
    mutate {
      replace => {
        "outcome_result" => "BLOCK"
      }
    }
  }
  else if [outcome_result] == "UNKNOWN" {
    mutate {
      replace => {
        "outcome_result" => "UNKNOWN_ACTION"
      }
    }
  }

  if [outcome_result] != "" {
    mutate {
      merge => {
        "security_result.action" => "outcome_result"
      }
      on_error => "outcome_result_invalid"
    }
  }

  mutate {
    replace => {
      "security_result.severity" => "LOW"
    }
    on_error => "severity_invalid"
  }

  if [_source][group][name] != "" {
    mutate {
      merge => {
        "principal.user.group_identifiers" => "_source.group.name"
      }
      on_error => "group_name_invalid"
    }
  }
  if [_source][user][id] != "" {
    mutate {
      convert => {
        "_source.user.id" => "string"
      }
      on_error => "user_id_invalid"
    }
    mutate {
      replace => {
        "source_user_id_label.value.string_value" => "%{_source.user.id}"
        "source_user_id_label.key" => "source_user_id"
      }
      on_error => "user_id_invalid"
    }
    if ![user_id_invalid] {
      mutate {
        merge => {
          "additional.fields" => "source_user_id_label"
        }
        on_error => "source_user_id_label_invalid"
      }
    }
  }
  if [_source][group][id] != "" {
    mutate {
      convert => {
        "_source.group.id" => "string"
      }
      on_error => "group_id_invalid"
    }
    mutate {
      replace => {
        "source_group_id_label.value.string_value" => "%{_source.group.id}"
        "source_group_id_label.key" => "source_group_id"
      }
      on_error => "group_id_invalid"
    }
    if ![group_id_invalid] {
      mutate {
        merge => {
          "additional.fields" => "source_group_id_label"
        }
        on_error => "source_group_id_label_invalid"
      }
    }
  }
  if [_index] =~ "events.file" {
    mutate {
      replace => {
        "metadata.product_event_type" => "File Events"
      }
      on_error => "product_event_type_invalid"
    }

    if [_source][user][name] != "" {
      mutate {
        replace => {
          "principal.user.userid" => "%{_source.user.name}"
          "has_user" => "true"
        }
        on_error => "user_name_invalid"
      }
    }

    if [_source][file][name] != "" {
      mutate {
        merge => {
          "principal.file.names" => "_source.file.name"
        }
        on_error => "file_name_invalid"
      }
    }

    if [_source][file][path] != "" {
      mutate {
        replace => {
          "target.file.full_path" => "%{_source.file.path}"
          "has_target_file" => "true"
        }
        on_error => "file_path_invalid"
      }
    }

    if [_source][event][created] != "" {
      date {
        match => ["_source.event.created", "ISO8601", "yyyy-MM-ddTHH:mm:ss.SSSSSSSSSZ", "yyyy-MM-ddTHH:mm:ss.SSSSSSZ", "yyyy-MM-ddTHH:mm:ss.SSSZ", "yyyy-MM-ddTHH:mm:ssZ"]
        target => "principal.domain.creation_time"
        on_error => "event_created_invalid"
      }
    }

    if [_source][process][executable] != "" {
      mutate {
        replace => {
          "principal.file.full_path" => "%{_source.process.executable}"
        }
        on_error => "process_executable_invalid"
      }
    }

    if [_source][event][action] != "" {
      for action in _source.event.action {
        mutate {
          replace => {
            "has_action_array" => "true"
          }
        }
        mutate {
          replace => {
            "security_result.action_details" => "%{action}"
          }
          on_error => "action_invalid"
        }

        if [action] =~ "creation" {
          if [has_principal] == "true" and [has_target_file] == "true" {
            mutate {
              replace => {
                "event_type" => "FILE_CREATION"
              }
            }
          }
        }
        else if [action] =~ "deletion" {
          if [has_principal] == "true" and [has_target_file] == "true" {
            mutate {
              replace => {
                "event_type" => "FILE_DELETION"
              }
            }
          }
        }
        else if [action] =~ "rename" {
          if [has_principal] == "true" and [has_target_file] == "true" {
            mutate {
              replace => {
                "event_type" => "FILE_MODIFICATION"
              }
            }
          }
        }
        else if [has_principal] == "true" and [has_target_file] == "true" {
          mutate {
            replace => {
              "event_type" => "FILE_UNCATEGORIZED"
            }
          }
        }
        else if [has_principal] == "true" and [has_user] == "true" {
          mutate {
            replace => {
              "event_type" => "USER_UNCATEGORIZED"
            }
          }
        }
        else if [has_principal] == "true" {
          mutate {
            replace => {
              "event_type" => "STATUS_UPDATE"
            }
          }
        }
      }

      mutate {
        replace => {
          "security_result.action_details" => "%{_source.event.action}"
        }
        on_error => "action_invalid"
      }
    }

    if [has_action_array] == "false" {
      if [_source][event][action] =~ "creation" {
        if [has_principal] == "true" and [has_target_file] == "true" {
          mutate {
            replace => {
              "event_type" => "FILE_CREATION"
            }
          }
        }
      }
      else if [_source][event][action] =~ "deletion" {
        if [has_principal] == "true" and [has_target_file] == "true" {
          mutate {
            replace => {
              "event_type" => "FILE_DELETION"
            }
          }
        }
      }
      else if [_source][event][action] =~ "rename" {
        if [has_principal] == "true" and [has_target_file] == "true" {
          mutate {
            replace => {
              "event_type" => "FILE_MODIFICATION"
            }
          }
        }
      }
      else if [has_principal] == "true" and [has_target_file] == "true" {
        mutate {
          replace => {
            "event_type" => "FILE_UNCATEGORIZED"
          }
        }
      }
      else if [has_principal] == "true" and [has_user] == "true" {
        mutate {
          replace => {
            "event_type" => "USER_UNCATEGORIZED"
          }
        }
      }
    }
  }
  else if [_index] =~ "events.library" {
    mutate {
      replace => {
        "metadata.product_event_type" => "Library Events"
      }
      on_error => "product_event_type_invalid"
    }

    if [_source][user][name] != "" {
      mutate {
        replace => {
          "principal.user.userid" => "%{_source.user.name}"
          "has_user" => "true"
        }
        on_error => "user_name_invalid"
      }
    }

    if [_source][user][id] != "" and [_source][user][id] =~ "^S-\\\\d-(\\\\d+-){1,14}\\\\d+$" {
      mutate {
        replace => {
          "principal.user.windows_sid" => "%{_source.user.id}"
        }
        on_error => "user_id_invalid"
      }
    }

    if [_source][host][name] != "" {
      mutate {
        replace => {
          "target.hostname" => "%{_source.host.name}"
          "target.asset.hostname" => "%{_source.host.name}"
          "has_target" => "true"
        }
        on_error => "host_name_invalid"
      }
    }

    if [_source][user][domain] != "" {
      mutate {
        replace => {
          "principal.domain.name" => "%{_source.user.domain}"
        }
        on_error => "user_domain_invalid"
      }
    }

    if [_source][dll][name] != "" {
      mutate {
        merge => {
          "target.file.names" => "_source.dll.name"
        }
        on_error => "dll_name_invalid"
      }
    }

    if [_source][dll][path] != "" {
      mutate {
        replace => {
          "target.file.full_path" => "%{_source.dll.path}"
          "has_target_file" => "true"
        }
        on_error => "dll_path_invalid"
      }
    }

    if [_source][dll][hash][sha1] != "" {
      mutate {
        replace => {
          "target.file.sha1" => "%{_source.dll.hash.sha1}"
        }
        on_error => "dll_sha1_invalid"
      }
    }

    if [_source][dll][hash][sha256] != "" {
      mutate {
        replace => {
          "target.file.sha256" => "%{_source.dll.hash.sha256}"
        }
        on_error => "dll_sha256_invalid"
      }
    }

    if [_source][dll][hash][md5] != "" {
      mutate {
        replace => {
          "target.file.md5" => "%{_source.dll.hash.md5}"
        }
        on_error => "dll_md5_invalid"
      }
    }

    if [_source][event][created] != "" {
      date {
        match => ["_source.event.created", "ISO8601", "yyyy-MM-ddTHH:mm:ss.SSSSSSSSSZ", "yyyy-MM-ddTHH:mm:ss.SSSSSSZ", "yyyy-MM-ddTHH:mm:ss.SSSZ", "yyyy-MM-ddTHH:mm:ssZ"]
        target => "principal.domain.creation_time"
        on_error => "event_created_invalid"
      }
    }
    if [_source][process][entity_id] != "" {
      mutate {
        replace => {
          "target.user.userid" => "%{_source.process.entity_id}"
        }
        on_error => "process_entity_id_invalid"
      }
    }
