# Product: KOLIDE
# Category: Security
# Supported Format: JSON
# Reference: NA
# Last Updated: 2026-02-27
# Copyright 2026 Google SecOps

filter {
  mutate {
    replace => {
      "epoch" => ""
      "type" => ""
      "principal" => ""
      "target" => ""
      "security_result" => ""
      "has_target" => "false"
      "has_principal" => "false"
      "additional" => ""
      "metadata" => ""
      "event_type" => ""
      "snapshot.0.user_id" => ""
      "snapshot.0.serial_number" => ""
      "name" => ""
      "action" => ""
      "counter" => ""
      "numerics" => ""
      "decorations.computer_name" => ""
      "principal_asset_name" => ""
      "principal_asset_id" => ""
      "decorations.hardware_model" => ""
      "_hardware" => ""
      "decorations.hardware_vendor" => ""
      "decorations.hardware_serial" => ""
      "decorations.hardware_version" => ""
      "hostIdentifier" => ""
      "decorations.hostname" => ""
      "decorations.local_hostname" => ""
      "decorations.uuid" => ""
      "kolide_decorations.device_id" => ""
      "kolide_decorations.device_display_name" => ""
      "kolide_decorations.serial_number" => ""
      "kolide_decorations.hardware_uuid" => ""
      "kolide_decorations.remote_ip" => ""
      "kolide_decorations.device_registered_owner_id" => ""
      "kolide_decorations.device_registered_owner_name" => ""
      "kolide_decorations.device_registered_owner_email" => ""
      "kolide_decorations.device_registered_at" => ""
      "kolide_decorations.device_owner_id" => ""
      "serial_number" => ""
      "owner_id" => ""
      "owner_name" => ""
      "kolide_decorations.device_owner_type" => ""
      "request_id" => ""
      "snapshot.0.unixTime" => ""
      "kolide_decorations.enrolled_at" => ""
      "kolide_decorations.device_owner_name" => ""
      "kolide_decorations.device_owner_email" => ""
      "calendarTime" => ""
      "has_user" => "false"
      "referenced_by_preferences" => ""
      "kolide_event.filePath" => ""
      "kolide_event.createdAt" => ""
      "kolide_event.h_uuid" => ""
      "kolide_event.itemId" => ""
      "kolide_event.log_message" => ""
      "kolide_event.unixTime" => ""
      "kolide_event.s_number" => ""
      "ts" => ""
      "kolide_event.data.actor_name" => ""
      "kolide_event.data.actor_type" => ""
      "kolide_event.data.actor_email" => ""
      "kolide_event.data.ip_address" => ""
      "kolide_event.data.description" => ""
      "role" => ""
    }
  }
  mutate {
    gsub => ["message", "\\r\\n(\\s+)", ""]
  }

  mutate {
    gsub => ["message", "event", "kolide_event"]
  }
  mutate {
    gsub => ["message", '\"c\"', '\"createdAt\"']
  }
  mutate {
    gsub => ["message", '\"f\"', '\"filePath\"']
  }
  mutate {
    gsub => ["message", '\"h\"', '\"h_uuid\"']
  }
  mutate {
    gsub => ["message", '\"i\"', '\"itemId\"']
  }
  mutate {
    gsub => ["message", '\"m\"', '\"log_message\"']
  }
  mutate {
    gsub => ["message", '\"u\"', '\"unixTime\"']
  }
  mutate {
    gsub => ["message", '\"s\"', '\"s_number\"']
  }
  json {
    source => "message"
    array_function => "split_columns"
    on_error => "not_json"
  }

  if [not_json] {
    drop {
      tag => "TAG_MALFORMED_MESSAGE"
    }
  }

  # 1. Copy (replace) fields from kolide_event.* into the root fields expected by this parser.
  #    Use replace (not rename) because destination fields are pre-initialized above.
  mutate {
    replace => {
      "calendarTime" => "%{kolide_event.calendarTime}"
    }
    on_error => "unwrap_calendarTime_error"
  }
  mutate {
    convert => {
      "kolide_event.epoch" => "string"
    }
    on_error => "epoch_conversion_error"
  }
  mutate {
    replace => {
      "epoch" => "%{kolide_event.epoch}"
    }
    on_error => "unwrap_epoch_error"
  }
  mutate {
    replace => {
      "hostIdentifier" => "%{kolide_event.hostIdentifier}"
    }
    on_error => "unwrap_hostIdentifier_error"
  }

  mutate {
    replace => {
      "request_id" => "%{kolide_event.request_id}"
    }
    on_error => "unwrap_request_id_error"
  }

  mutate {
    replace => {
      "name" => "%{kolide_event.name}"
    }
    on_error => "unwrap_name_error"
  }
  mutate {
    convert => {
      "kolide_event.counter" => "string"
    }
    on_error => "counter_error"
  }

  mutate {
    replace => {
      "counter" => "%{kolide_event.counter}"
    }
    on_error => "unwrap_counter_error"
  }

  mutate {
    replace => {
      "numerics" => "%{kolide_event.numerics}"
    }
    on_error => "unwrap_numerics_error"
  }

  # Snapshot fields (only if present in wrapped logs)
  mutate {
    replace => {
      "snapshot.0.user_id" => "%{kolide_event.snapshot.0.user_id}"
    }
    on_error => "unwrap_snapshot_user_id_error"
  }

  mutate {
    replace => {
      "snapshot.0.serial_number" => "%{kolide_event.snapshot.0.serial_number}"
    }
    on_error => "unwrap_snapshot_serial_number_error"
  }

  mutate {
    replace => {
      "snapshot.0.unixTime" => "%{kolide_event.snapshot.0.unixTime}"
    }
    on_error => "unwrap_snapshot_unixTime_error"
  }

  # Decorations
  mutate {
    replace => {
      "decorations.computer_name" => "%{kolide_event.decorations.computer_name}"
    }
    on_error => "unwrap_decorations_computer_name_error"
  }

  mutate {
    replace => {
      "decorations.hardware_model" => "%{kolide_event.decorations.hardware_model}"
    }
    on_error => "unwrap_decorations_hardware_model_error"
  }

  mutate {
    replace => {
      "decorations.hardware_serial" => "%{kolide_event.decorations.hardware_serial}"
    }
    on_error => "unwrap_decorations_hardware_serial_error"
  }

  mutate {
    replace => {
      "decorations.hardware_vendor" => "%{kolide_event.decorations.hardware_vendor}"
    }
    on_error => "unwrap_decorations_hardware_vendor_error"
  }

  mutate {
    replace => {
      "decorations.hardware_version" => "%{kolide_event.decorations.hardware_version}"
    }
    on_error => "unwrap_decorations_hardware_version_error"
  }

  mutate {
    replace => {
      "decorations.hostname" => "%{kolide_event.decorations.hostname}"
    }
    on_error => "unwrap_decorations_hostname_error"
  }

  mutate {
    replace => {
      "decorations.local_hostname" => "%{kolide_event.decorations.local_hostname}"
    }
    on_error => "unwrap_decorations_local_hostname_error"
  }

  mutate {
    replace => {
      "decorations.uuid" => "%{kolide_event.decorations.uuid}"
    }
    on_error => "unwrap_decorations_uuid_error"
  }
  mutate {
    convert => {
      "kolide_event.kolide_decorations.device_id" => "string"
    }
    on_error => "kolide_event_device_id_conversion_error"
  }

  # kolide_decorations
  mutate {
    replace => {
      "kolide_decorations.device_id" => "%{kolide_event.kolide_decorations.device_id}"
    }
    on_error => "unwrap_kolide_device_id_error"
  }

  mutate {
    replace => {
      "kolide_decorations.device_display_name" => "%{kolide_event.kolide_decorations.device_display_name}"
    }
    on_error => "unwrap_kolide_device_display_name_error"
  }

  mutate {
    replace => {
      "kolide_decorations.serial_number" => "%{kolide_event.kolide_decorations.serial_number}"
    }
    on_error => "unwrap_kolide_serial_number_error"
  }

  mutate {
    replace => {
      "kolide_decorations.hardware_uuid" => "%{kolide_event.kolide_decorations.hardware_uuid}"
    }
    on_error => "unwrap_kolide_hardware_uuid_error"
  }

  mutate {
    replace => {
      "kolide_decorations.remote_ip" => "%{kolide_event.kolide_decorations.remote_ip}"
    }
    on_error => "unwrap_kolide_remote_ip_error"
  }

  mutate {
    replace => {
      "kolide_decorations.enrolled_at" => "%{kolide_event.kolide_decorations.enrolled_at}"
    }
    on_error => "unwrap_kolide_enrolled_at_error"
  }
  mutate {
    convert => {
      "kolide_event.kolide_decorations.device_registered_owner_id" => "string"
    }
    on_error => "device_registered_owner_id_conversion_error"
  }

  mutate {
    replace => {
      "kolide_decorations.device_registered_owner_id" => "%{kolide_event.kolide_decorations.device_registered_owner_id}"
    }
    on_error => "unwrap_kolide_device_registered_owner_id_error"
  }

  mutate {
    replace => {
      "kolide_decorations.device_registered_owner_name" => "%{kolide_event.kolide_decorations.device_registered_owner_name}"
    }
    on_error => "unwrap_kolide_device_registered_owner_name_error"
  }

  mutate {
    replace => {
      "kolide_decorations.device_registered_owner_email" => "%{kolide_event.kolide_decorations.device_registered_owner_email}"
    }
    on_error => "unwrap_kolide_device_registered_owner_email_error"
  }

  mutate {
    replace => {
      "kolide_decorations.device_registered_at" => "%{kolide_event.kolide_decorations.device_registered_at}"
    }
    on_error => "unwrap_kolide_device_registered_at_error"
  }

  mutate {
    replace => {
      "kolide_decorations.device_owner_type" => "%{kolide_event.kolide_decorations.device_owner_type}"
    }
    on_error => "unwrap_kolide_device_owner_type_error"
  }

  mutate {
    convert => {
      "kolide_event.kolide_decorations.device_owner_id" => "string"
    }
    on_error => "convert_kolide_device_owner_id_error"
  }

  mutate {
    replace => {
      "kolide_decorations.device_owner_id" => "%{kolide_event.kolide_decorations.device_owner_id}"
    }
    on_error => "unwrap_kolide_device_owner_id_error"
  }

  mutate {
    replace => {
      "kolide_decorations.device_owner_name" => "%{kolide_event.kolide_decorations.device_owner_name}"
    }
    on_error => "unwrap_kolide_device_owner_name_error"
  }

  mutate {
    replace => {
      "kolide_decorations.device_owner_email" => "%{kolide_event.kolide_decorations.device_owner_email}"
    }
    on_error => "unwrap_kolide_device_owner_email_error"
  }
  ##### CHANGE END #####

  if [snapshot][0][serial_number] != "" and [serial_number] == ""{
    mutate {
      replace => {
        "serial_number" => "%{snapshot.0.serial_number}"
      }
      on_error => "serial_number_not_found"
    }
  }

  if [kolide_decorations][device_id] != "" and [kolide_decorations][device_id] != "null" {
    mutate {
      convert => {
        "kolide_decorations.device_id" => "string"
      }
      on_error => "device_id_conversion_error"
    }
    mutate {
      replace => {
        "deviceId_label.key" => "DeviceId"
        "deviceId_label.value" => "%{kolide_decorations.device_id}"
      }
      on_error => "no_device_id"
    }
    if ![no_device_id] {
      mutate {
        merge => {
          "principal.asset.labels" => "deviceId_label"
        }
        on_error => "deviceId_label_not_found"
      }
    }
  }

  if [action] != "" {
    mutate {
      replace => {
        "metadata.product_event_type" => "%{action}"
      }
      on_error => "action_not_found"
    }
  }

  if [counter] != "" {
    mutate {
      convert => {
        "counter" => "string"
      }
      on_error => "counter_conversion_error"
    }
    mutate {
      replace => {
        "counter_label.key" => "Counter"
        "counter_label.value.string_value" => "%{counter}"
      }
      on_error => "counter_label_error"
    }
    if ![counter_label_error] {
      mutate {
        merge => {
          "additional.fields" => "counter_label"
        }
        on_error => "counter_label_merge_error"
      }
    }
  }

  if [numerics] != "" {
    mutate {
      convert => {
        "numerics" => "string"
      }
      on_error => "numerics_conversion_error"
    }
    if ![numerics_conversion_error] {
      mutate {
        replace => {
          "numerics_label.key" => "Numerics"
          "numerics_label.value.string_value" => "%{numerics}"
        }
        on_error => "numerics_label_error"
      }
      mutate {
        merge => {
          "additional.fields" => "numerics_label"
        }
        on_error => "numerics_label_merge_error"
      }
    }
  }

  if [snapshot][0][user_id] != "" {
    mutate {
      replace => {
        "principal.user.userid" => "%{snapshot.0.user_id}"
        "has_user" => "true"
      }
    }
  }

  if [decorations][computer_name] != "" {
     mutate {
      replace => {
        "computerName_label.key" => "Computer Name"
        "computerName_label.value" => "%{decorations.computer_name}"
      }
      on_error => "no_computer_name"
    }
    if ![no_computer_name] {
      mutate {
        merge => {
          "principal.asset.labels" => "computerName_label"
        }
        on_error => "computerName_label_not_found"
      }
    }
  }

  if [decorations][hostname] != "" {
     mutate {
      replace => {
        "principal.hostname" => "%{decorations.hostname}"
        "principal.asset.hostname" => "%{decorations.hostname}"
        "has_principal" => "true"
      }
      on_error => "host_name_error"
    }
  }

  if [decorations][local_hostname] != "" and [principal_asset_name] == "" {
     mutate {
      replace => {
        "principal_asset_name" => "%{decorations.local_hostname}"
      }
      on_error => "local_hostname_error"
    }
  }

  if [kolide_decorations][device_display_name] != "" and [principal_asset_name] == "" and [kolide_decorations][device_display_name] != "null"{
     mutate {
      replace => {
        "principal_asset_name" => "%{kolide_decorations.device_display_name}"
      }
      on_error => "device_display_name_error"
    }
  }

  if [kolide_decorations][serial_number] != "" and [serial_number] == ""{
    mutate {
      replace => {
        "serial_number" => "%{kolide_decorations.serial_number}"
      }
      on_error => "serial_number_error"
    }
  }

  if [kolide_decorations][hardware_uuid] != "" and [principal_asset_id] == "" {
    mutate {
      replace => {
        "principal_asset_id" => "UUID : %{kolide_decorations.hardware_uuid}"
      }
      on_error => "hardware_uuid_error"
    }
  }

  if [kolide_decorations][remote_ip] =~ "^(?:[0-9]{1,3}[.]){3}[0-9]{1,3}$" and [kolide_decorations][remote_ip] != "null" and [kolide_decorations][remote_ip] != "" {
    mutate {
      merge => {
        "principal.ip" => "kolide_decorations.remote_ip"
      }
      replace => {
        "has_principal" => "true"
      }
      on_error => "ip_not_found"
    }
  }

  if [kolide_decorations][device_registered_owner_id] != "" and [owner_id] == "" and [kolide_decorations][device_registered_owner_id] != "null"{
    mutate {
      convert => {
        "kolide_decorations.device_registered_owner_id" => "string"
      }
      on_error => "registered_owner_id_conversion_error"
    }
    if ![registered_owner_id_conversion_error] {
      mutate {
        replace => {
          "owner_id" => "%{kolide_decorations.device_registered_owner_id}"
        }
        on_error => "registered_owner_id_error"
      }
    }
  }

  if [kolide_decorations][device_owner_id] != "" and [owner_id] == "" and [kolide_decorations][device_owner_id] != "null"{
    mutate {
      convert => {
        "kolide_decorations.device_owner_id" => "string"
      }
      on_error => "device_owner_id_conversion_error"
    }
    if ![device_owner_id_conversion_error] {
      mutate {
        replace => {
          "owner_id" => "%{kolide_decorations.device_owner_id}"
        }
        on_error => "device_owner_id_error"
      }
    }
  }


  if [kolide_decorations][device_registered_owner_name] != "" and [owner_name] == "" and [kolide_decorations][device_registered_owner_name] != "null" {
    mutate {
      replace => {
        "owner_name" => "%{kolide_decorations.device_registered_owner_name}"
      }
      on_error => "registered_owner_name_error"
    }
  }

  if [kolide_decorations][device_owner_name] != "" and [owner_name] == "" and [kolide_decorations][device_owner_name] != "null" {
    mutate {
      replace => {
        "owner_name" => "%{kolide_decorations.device_owner_name}"
      }
      on_error => "owner_name_error"
    }
  }

  if [kolide_decorations][device_registered_owner_email] =~ "^.+@.+$" and [kolide_decorations][device_registered_owner_email] != "null" and [kolide_decorations][device_registered_owner_email] != "" {
    mutate {
      merge => {
        "principal.user.email_addresses" => "kolide_decorations.device_registered_owner_email"
      }
      replace => {
        "has_principal" => "true"
      }
      on_error => "registered_user_email_error"
    }
  }

  if [kolide_decorations][device_owner_email] != "" and [kolide_decorations][device_owner_email] != "null" {
    mutate {
      merge => {
        "principal.user.email_addresses" => "kolide_decorations.device_owner_email"
      }
      replace => {
        "has_principal" => "true"
      }
      on_error => "user_email_error"
    }
  }

  if [kolide_decorations][device_owner_type] != "" and [kolide_decorations][device_owner_type] != "null" {
    mutate {
      replace => {
        "principal.user.role_name" => "%{kolide_decorations.device_owner_type}"
      }
      on_error => "owner_type_error"
    }
  }

  if [kolide_decorations][device_registered_at] != "" and [kolide_decorations][device_registered_at] != "null" {
    date {
      match => ["kolide_decorations.device_registered_at","TIMESTAMP_ISO8601","ISO8601"]
      on_error => "no_format_match"
    }
    if ![no_format_match] {
      mutate {
        replace => {
          "device_registered_label.key" => "Device Registered Time"
          "device_registered_label.value" => "%{kolide_decorations.device_registered_at}"
        }
        merge => {
          "principal.asset.labels" => "device_registered_label"
        }
        on_error => "device_registered_error"
      }
    }
  }

  if [kolide_decorations][enrolled_at] != "" and [kolide_decorations][enrolled_at] != "null" {
    date {
      match => ["kolide_decorations.enrolled_at","TIMESTAMP_ISO8601","ISO8601"]
      on_error => "no_time_match"
    }
    if ![no_time_match] {
      mutate {
        replace => {
          "enrolled_at_label.key" => "Enrolled Time"
          "enrolled_at_label.value" => "%{kolide_decorations.enrolled_at}"
        }
        merge => {
          "principal.asset.labels" => "enrolled_at_label"
        }
        on_error => "enrolled_at_error"
      }
    }
  }

  if [calendarTime] != "" {
    date {
      match => ["calendarTime","TIMESTAMP_ISO8601","EEE MMM  d HH:mm:ss yyyy ZZZ","EEE MMM d HH:mm:ss yyyy ZZZ","SYSLOGTIMESTAMP"]
      on_error => "no_match"
      target => "metadata.event_timestamp"
    }
  }

  if [kolide_decorations][device_owner_id] != "" and [owner_id] == "" {
    mutate {
      replace => {
        "owner_id" => "%{kolide_decorations.device_owner_id}"
      }
      on_error => "device_owner_id_error"
    }
  }

  if [decorations][hardware_model] != "" {
    mutate {
      replace => {
        "_hardware.model" => "%{decorations.hardware_model}"
      }
      on_error => "hardware_model_error"
    }
  }

  if [decorations][hardware_serial] != "" and [serial_number] == "" {
    mutate {
      replace => {
        "serial_number" => "%{decorations.hardware_serial}"
      }
      on_error => "hardware_serial_error"
    }
  }

  if [decorations][hardware_vendor] != "" {
    mutate {
      replace => {
        "_hardware.manufacturer" => "%{decorations.hardware_vendor}"
      }
      on_error => "hardware_vendor_error"
    }
  }

  if [name] != "" {
    mutate {
      replace => {
        "name_label.key" => "Name"
        "name_label.value.string_value" => "%{name}"
      }
      merge => {
        "additional.fields" => "name_label"
      }
      on_error => "name_error"
    }
  }

  if [hostIdentifier] != "" and [principal_asset_id] == "" {
    mutate {
      replace => {
        "principal_asset_id" => "UUID : %{hostIdentifier}"
      }
      on_error => "asset_id_error"
    }
  }

  if [decorations][uuid] != "" and [principal_asset_id] == "" {
    mutate {
      replace => {
        "principal_asset_id" => "UUID : %{decorations.uuid}"
      }
      on_error => "uuid_id_error"
    }
  }

  if [decorations][hardware_version] != "" {
    mutate {
      replace => {
        "principal.asset.platform_software.platform_version" => "%{decorations.hardware_version}"
      }
      on_error => "no_hardware_version"
    }
  }
  if [kolide_event][filePath] != "" {
    mutate {
      replace => {
        "target.file.full_path" => "%{kolide_event.filePath}"
      }
      on_error => "file_path_error"
    }
  }
  if [kolide_event][createdAt] != "" {
    mutate {
      replace => {
        "created_at_label.key" => "Created At"
        "created_at_label.value.string_value" => "%{kolide_event.createdAt}"
      }
      on_error => "created_at_error"
    }
    if ![created_at_error] {
      mutate {
        merge => {
          "additional.fields" => "created_at_label"
        }
        on_error => "principal_created_at_label_error"
      }
    }
  }
  if [kolide_event][h_uuid] != "" and [principal_asset_id] == "" {
    mutate {
      replace => {
        "principal_asset_id" => "UUID : %{kolide_event.h_uuid}"
      }
      on_error => "h_uuid_error"
    }
  }
  mutate {
    convert => {
      "kolide_event.itemId" => "string"
    }
    on_error => "item_id_conversion_error"
  }
  if [kolide_event][itemId] != "" {
    mutate {
      replace => {
        "item_id_label.key" => "Item ID"
        "item_id_label.value.string_value" => "%{kolide_event.itemId}"
      }
      on_error => "item_id_error"
    }
    if ![item_id_error] {
      mutate {
        merge => {
          "additional.fields" => "item_id_label"
        }
        on_error => "principal_item_id_label_error"
      }
    }
  }
  if [kolide_event][log_message] != "" {
    mutate {
      replace => {
        "metadata.description" => "%{kolide_event.log_message}"
      }
      on_error => "log_message_error"
    }
  }
  mutate {
    convert => {
      "ts" => "string"
    }
    on_error => "ts_error"
  }
  if [ts] != ""{
    date {
      match => ["ts", "UNIX", "RFC3339"]
      target => "metadata.event_timestamp"
      on_error => "date_error"
    }
  }
  mutate {
    convert => {
      "kolide_event.unixTime" => "string"
    }
    on_error => "unix_time_conversion_error"
  }
  if [kolide_event][unixTime] != "" {
    mutate {
      replace => {
        "unix_time_label.key" => "Unix Time"
        "unix_time_label.value.string_value" => "%{kolide_event.unixTime}"
      }
      on_error => "unix_time_error"
    }
    if ![unix_time_error] {
      mutate {
        merge => {
          "additional.fields" => "unix_time_label"
        }
        on_error => "principal_unix_time_label_error"
      }
    }
  }
  mutate {
    convert => {
      "kolide_event.s_number" => "string"
    }
    on_error => "s_number_conversion_error"
  }
  if [kolide_event][s_number] != "" {
    mutate {
      replace => {
        "s_number_label.key" => "Number"
        "s_number_label.value.string_value" => "%{kolide_event.s_number}"
      }
      on_error => "s_number_error"
    }
    if ![s_number_error] {
      mutate {
        merge => {
          "additional.fields" => "s_number_label"
        }
        on_error => "principal_s_number_label_error"
      }
    }
  }
  if [kolide_event][data][actor_name] != "" {
    mutate {
      replace => {
        "principal.user.user_display_name" => "%{kolide_event.data.actor_name}"
        "has_user" => "true"
      }
      on_error => "actor_name_error"
    }
  }
  if [kolide_event][data][actor_email] =~ "^.+@.+$" {
    mutate {
      merge => {
        "principal.user.email_addresses" => "kolide_event.data.actor_email"
      }
      on_error => "actor_email_error"
    }
    if ![actor_email_error] {
      mutate {
        replace => {
          "has_user" => "true"
        }
      }
    }
  }
  if [kolide_event][data][ip_address] =~ "^(?:[0-9]{1,3}[.]){3}[0-9]{1,3}$" {
    mutate {
      merge => {
        "principal.ip" => "kolide_event.data.ip_address"
        "principal.asset.ip" => "kolide_event.data.ip_address"
      }
      on_error => "ip_address_error"
    }
    if ![ip_address_error] {
      mutate {
        replace => {
          "has_principal" => "true"
        }
      }
    }
  }
  if [kolide_event][data][actor_type] != "" {
    mutate {
      replace => {
        "role.name" => "%{kolide_event.data.actor_type}"
      }
      on_error => "actor_type_error"
    }
    if [role] != "" {
      mutate {
        merge => {
          "principal.user.attribute.roles" => "role"
        }
        on_error => "actor_type_merge_error"
      }
    }
  }
  if [kolide_event][data][description] != "" {
    mutate {
      replace => {
        "metadata.description" => "%{kolide_event.data.description}"
      }
      on_error => "description_error"
    }
  }

  if [request_id] != "" {
    mutate {
      replace => {
        "metadata.product_log_id" => "%{request_id}"
      }
    }
  }

  if [owner_id] != "" {
    mutate {
      replace => {
        "user_label.key" => "Owner_ID"
        "user_label.value" => "%{owner_id}"
      }
      merge => {
        "principal.labels" => "user_label"
      }
      on_error => "user_label_error"
    }
  }

  if [owner_name] != "" {
    mutate {
      replace => {
        "principal.user.user_display_name" => "%{owner_name}"
        "has_user" => "true"
      }
      on_error => "user_display_name_error"
    }
  }

  if [serial_number] != "" {
    mutate {
      replace => {
        "_hardware.serial_number" => "%{serial_number}"
      }
      on_error => "serial_number_not_found"
    }
  }

  if [principal_asset_name] != "" {
    mutate {
      replace => {
        "asset_name.key" => "Device Name"
        "asset_name.value.string_value" => "%{principal_asset_name}"
      }
      merge => {
        "additional.fields" => "asset_name"
      }
      on_error => "asset_name_error"
    }
  }

  if [principal_asset_id] != "" {
    mutate {
      replace => {
        "principal.asset.asset_id" => "%{principal_asset_id}"
        "has_principal" => "true"
      }
      on_error => "principal_assest_id_not_found"
    }
  }

  if[_hardware] != "" {
    mutate {
      merge => {
        "principal.asset.hardware" => "_hardware"
      }
      replace => {
        "has_principal" => "true"
      }
    }
  }
  for add in kolide_event.diffResults.added {
    mutate {
      replace => {
        "added_name" => ""
        "added_permission_label" => ""
        "added_permission" => ""
        "added_version" => ""
        "added_description" => ""
        "added_path" => ""
        "added_identifier" => ""
        "added_browser_type" => ""
        "added_installed_at_epoch" => ""
        "added_locale" => ""
        "added_manifest_hash" => ""
        "added_persistent" => ""
        "added_profile" => ""
        "added_uid" => ""
        "added_url" => ""
        "added_version_label" => ""
        "referenced_by_preferences" => ""
        "referenced_by_preferences_label" => ""
      }
    }
    mutate {
      replace => {
        "added_name" => "%{add.name}"
      }
      on_error => "replace_name_error"
    }
    if [added_name] != "" {
      mutate {
        replace => {
          "target.resource.name" => "%{added_name}"
        }
        on_error => "added_name_error"
      }
    }
    mutate {
      convert => {
        "add.version" => "string"
      }
      on_error => "convert_version_error"
    }
    mutate {
      replace => {
        "added_version" => "%{add.version}"
      }
      on_error => "added_version_error"
    }
    if [added_version] != "" {
      mutate {
        replace => {
          "added_version_label.key" => "Version"
          "added_version_label.value" => "%{added_version}"
        }
        on_error => "added_version_label_error"
      }
      if ![added_version_label_error] {
        mutate {
          merge => {
            "principal.asset.labels" => "added_version_label"
          }
          on_error => "principal_added_version_label_error"
        }
      }
    }
    mutate {
      replace => {
        "added_description" => "%{add.description}"
      }
      on_error => "replace_description_error"
    }
    if [added_description] != "" {
      mutate {
        replace => {
          "metadata.description" => "%{added_description}"
        }
        on_error => "added_description_error"
      }
    }
    mutate {
      replace => {
        "added_path" => "%{add.path}"
      }
      on_error => "replace_added_path_error"
    }
    if [added_path] != "" {
      mutate {
        replace => {
          "target.file.full_path" => "%{added_path}"
        }
        on_error => "added_path_error"
      }
    }
    mutate {
      replace => {
        "added_permission" => "%{add.permissions}"
      }
      on_error => "added_permission_error"
    }
    if [added_permission] != "" {
      mutate {
        replace => {
          "added_permission_label.key" => "Permission"
          "added_permission_label.value" => "%{added_permission}"
        }
        on_error => "added_permission_label_error"
      }
      if ![added_permission_label_error] {
        mutate {
          merge => {
            "security_result.detection_fields" => "added_permission_label"
          }
          on_error => "sec_result_added_permission_label_error"
        }
      }
    }
    mutate {
      replace => {
        "added_identifier" => "%{add.identifier}"
      }
      on_error => "added_identifier_error"
    }
    if [added_identifier] != "" {
      mutate {
        replace => {
          "added_identifier_label.key" => "Identifier"
          "added_identifier_label.value" => "%{added_identifier}"
        }
        on_error => "added_identifier_label_error"
      }
      if ![added_identifier_label_error] {
        mutate {
          merge => {
            "security_result.detection_fields" => "added_identifier_label"
          }
          on_error => "security_result_added_identifier_label_error"
        }
      }
    }
    mutate {
      replace => {
        "added_browser_type" => "%{add.browser_type}"
      }
      on_error => "replace_added_browser_type_error"
    }
    if [added_browser_type] != "" {
      mutate {
        replace => {
          "target.application" => "%{added_browser_type}"
        }
        on_error => "added_browser_type_error"
      }
    }
    mutate {
      replace => {
        "added_installed_at_epoch" => "%{add.installed_at_epoch}"
      }
      on_error => "added_installed_at_epoch_error"
    }
    if [added_installed_at_epoch] != "" {
      mutate {
        replace => {
          "added_installed_at_label.key" => "Installed At"
          "added_installed_at_label.value" => "%{added_installed_at_epoch}"
        }
        on_error => "added_installed_at_label_error"
      }
      if ![added_installed_at_label_error] {
        mutate {
          merge => {
            "principal.asset.labels" => "added_installed_at_label"
          }
          on_error => "principal_added_installed_at_label_error"
        }
      }
    }
    mutate {
      replace => {
        "added_locale" => "%{add.locale}"
      }
      on_error => "added_locale_error"
    }
    if [added_locale] != "" {
      mutate {
        replace => {
          "added_locale_label.key" => "Locale"
          "added_locale_label.value" => "%{added_locale}"
        }
        on_error => "added_locale_label_error"
      }
      if ![added_locale_label_error] {
        mutate {
          merge => {
            "principal.asset.labels" => "added_locale_label"
          }
          on_error => "principal_added_locale_label_error"
        }
      }
    }
    mutate {
      replace => {
        "added_manifest_hash" => "%{add.manifest_hash}"
      }
      on_error => "replace_added_manifest_hash_error"
    }
    if [added_manifest_hash] != "" {
      mutate {
        replace => {
          "target.file.md5" => "%{added_manifest_hash}"
        }
        on_error => "added_manifest_hash_error"
      }
    }
    mutate {
      replace => {
        "added_persistent" => "%{add.persistent}"
      }
      on_error => "added_persistent_error"
    }
    if [added_persistent] != "" {
      mutate {
        replace => {
          "added_persistent_label.key" => "Persistent"
          "added_persistent_label.value" => "%{added_persistent}"
        }
        on_error => "added_persistent_label_error"
      }
      if ![added_persistent_label_error] {
        mutate {
          merge => {
            "security_result.detection_fields" => "added_persistent_label"
          }
          on_error => "sec_result_added_persistent_label_error"
        }
      }
    }
    mutate {
      replace => {
        "added_profile" =>  "%{add.profile}"
      }
      on_error => "replace_added_profile_error"
    }
    if [added_profile] != "" {
      mutate {
        replace => {
          "target.user.role_name" => "%{added_profile}"
        }
        on_error => "added_profile_error"
      }
    }
    mutate {
      replace => {
        "added_uid" =>  "%{add.uid}"
      }
      on_error => "replace_added_uid_error"
    }
    if [added_uid] != "" {
      mutate {
        replace => {
          "target.user.userid" => "%{added_uid}"
        }
        on_error => "added_uid_error"
      }
    }
    mutate {
      replace => {
        "added_url" =>  "%{add.update_url}"
      }
      on_error => "replace_added_url_error"
    }
    if [added_url] != "" {
      mutate {
        replace => {
          "target.url" => "%{added_url}"
        }
        on_error => "added_url_error"
      }
    }
    mutate {
      replace => {
        "referenced_by_preferences" => "%{add.referenced_by_preferences}"
      }
      on_error => "referenced_by_preferences_error"
    }
    if [referenced_by_preferences] != "" {
      mutate {
        replace => {
          "referenced_by_preferences_label.key" => "Referenced By Preferences"
          "referenced_by_preferences_label.value" => "%{referenced_by_preferences}"
        }
        on_error => "referenced_by_preferences_label_error"
      }
      if ![referenced_by_preferences_label_error] {
        mutate {
          merge => {
            "security_result.detection_fields" => "referenced_by_preferences_label"
          }
          on_error => "sec_result_referenced_by_preferences_label_error"
        }
      }
    }
  }
  if [epoch] != "" {
    mutate {
      convert => {
       "epoch" => "string"
      }
      on_error => "convert_epoch_error"
    }
    mutate {
      replace => {
        "epoch_label.key" => "Epoch"
        "epoch_label.value.string_value" => "%{epoch}"
      }
      on_error => "epoch_error"
    }
    if ![epoch_error] {
      mutate {
        merge => {
          "additional.fields" => "epoch_label"
        }
        on_error => "additional_epoch_error"
      }
    }
  }
  mutate {
    replace => {
      "type" => "%{kolide_event.type}"
    }
    on_error => "replace_type_error"
  }
  if [type] != "" {
    mutate {
      replace => {
        "type_label.key" => "Type"
        "type_label.value.string_value" => "%{type}"
      }
      on_error => "type_error"
    }
    if ![type_error] {
      mutate {
        merge => {
          "additional.fields" => "type_label"
        }
        on_error => "additional_type_error"
      }
    }
  }
  if [has_user] == "true" {
    mutate {
      replace => {
        "event_type" => "USER_UNCATEGORIZED"
      }
    }
  }
  else if [has_principal] == "true" {
    mutate {
      replace => {
        "event_type" => "STATUS_UPDATE"
      }
    }
  }
  else {
    mutate {
      replace => {
        "event_type" => "GENERIC_EVENT"
      }
    }
  }

  if [event_type] != "" {
    mutate {
      replace => {
        "metadata.event_type" => "%{event_type}"
      }
    }
  }

  if [metadata] != "" {
    mutate {
      rename => {
        "metadata" => "event.idm.read_only_udm.metadata"
      }
    }
  }

  if [principal] != "" {
    mutate {
      rename => {
        "principal" => "event.idm.read_only_udm.principal"
      }
    }
  }
  if [target] != "" {
    mutate {
      rename => {
        "target" => "event.idm.read_only_udm.target"
      }
    }
  }

  if [additional] != "" {
    mutate {
      rename => {
        "additional" => "event.idm.read_only_udm.additional"
      }
    }
  }

  if [security_result] != "" {
    mutate {
      merge => {
        "event.idm.read_only_udm.security_result" => "security_result"
      }
      on_error => "sec_result_error"
    }
  }

  mutate {
    merge => {
      "@output" => "event"
    }
  }
}
