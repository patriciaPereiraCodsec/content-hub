      on_error => "no_plasectrxShowVideo"
    }
    if ![no_plasectrxShowVideo] {
      mutate {
        replace => {
          "plasectrxShowVideo_label.key" => "plasectrxShowVideo"
        }
      }
      mutate {
        merge => {
          "additional.fields" => "plasectrxShowVideo_label"
        }
        on_error => "no_plasectrxShowVideo_label"
      }
    }
  }
  if [plasectrxSeqno] != "" {
    mutate {
      replace => {
        "plasectrxSeqno_label.value.string_value" => "%{plasectrxSeqno}"
      }
      on_error => "no_plasectrxSeqno"
    }
    if ![no_plasectrxSeqno] {
      mutate {
        replace => {
          "plasectrxSeqno_label.key" => "plasectrxSeqno"
        }
      }
      mutate {
        merge => {
          "additional.fields" => "plasectrxSeqno_label"
        }
        on_error => "no_plasectrxSeqno_label"
      }
    }
  }

  mutate {
    replace => {
      "metadata.event_type" => "GENERIC_EVENT"
      "metadata.vendor_name" => "AVIGILON_ACCESS_LOGS"
      "metadata.product_name" => "AVIGILON_ACCESS_LOGS"
    }
  }

  if [has_user] == "true" {
    mutate {
      replace => {
        "metadata.event_type" => "USER_UNCATEGORIZED"
      }
      on_error => "no_user"
    }
  }

  else if [has_principal] == "true" {
    mutate {
      replace => {
        "metadata.event_type" => "STATUS_UPDATE"
      }
      on_error => "no_principal"
    }
  }

  if [metadata] != "" {
    mutate {
      rename => {
        "metadata" => "event.idm.read_only_udm.metadata"
      }
    }
  }

  if [principal] != "" {
    mutate {
      rename => {
        "principal" => "event.idm.read_only_udm.principal"
      }
    }
  }

  if [target] != "" {
    mutate {
      rename => {
        "target" => "event.idm.read_only_udm.target"
      }
    }
  }

  if [security_result] != "" {
    mutate {
      merge => {
        "event.idm.read_only_udm.security_result" => "security_result"
      }
      on_error => "no_sec_result"
    }
  }

  if [additional] != "" {
    mutate {
      rename => {
        "additional" => "event.idm.read_only_udm.additional"
      }
    }
  }

  if [about] != "" {
    mutate {
      rename => {
        "about" => "event.idm.read_only_udm.about"
      }
    }
  }
  if [src] != "" {
    mutate {
      rename => {
        "src" => "event.idm.read_only_udm.src"
      }
    }
  }

  mutate {
    merge => {
      "@output" => "event"
    }
  }
}
