# Product: SAP_SUCCESSFACTORS
# Category: Audit Log
# Supported Format: CSV
# Reference:https://help.sap.com/docs/SAP_SUCCESSFACTORS_PLATFORM/aa29750300924467b799dedf0a4cbc37/b7ed04651f9a4a8189618f72bcce5ee8.html?locale=en-us%2F1000
# Last Updated: 2024-04-30
# Copyright 2024 Chronicle LLC

filter {
    mutate {
        replace => {
            "additional" => ""
            "metadata" => ""
            "target" => ""
            "principal" => ""
            "intermediary_1" => ""
            "intermediary_2" => ""
            "first_name" => ""
            "last_name" => ""
            "no_changed_by_user_username" => ""
        }
    }

    csv {
        source => "message"
        separator => ","
        on_error => "invalid_message"
    }

    mutate {
        replace => {
            "_" => "%{column31}"
        }
        on_error => "invalid_number_of_column"
    }

    mutate {
        rename => {
            "column1" => "changed_by_user_first_name"
            "column2" => "changed_by_user_last_name"
            "column3" => "changed_by_user_username"
            "column4" => "proxy_user_first_name"
            "column5" => "proxy_user_last_name"
            "column6" => "proxy_user_username"
            "column7" => "secondary_user_provisioner_id"
            "column8" => "secondary_user_email"
            "column9" => "subject_user_first_name"
            "column10" => "subject_user_last_name"
            "column11" => "subject_user_id"
            "column12" => "module"
            "column13" => "functional_area"
            "column14" => "functional_sub_area"
            "column15" => "context_1_key"
            "column16" => "context_1_value"
            "column17" => "context_2_key"
            "column18" => "context_2_value"
            "column19" => "context_3_key"
            "column20" => "context_3_value"
            "column21" => "context_4_key"
            "column22" => "context_4_value"
            "column23" => "context_5_key"
            "column24" => "context_5_value"
            "column25" => "field_name"
            "column26" => "old_value"
            "column27" => "new_value"
            "column28" => "operation_performed"
            "column29" => "timestamp"
            "column30" => "effective_start_date"
            "column31" => "effective_sequence"
        }
        on_error => "invalid_csv"
    }

    if [invalid_message] or [invalid_csv] or [invalid_number_of_column] {
        drop {
            tag => "TAG_UNSPECIFIED"
        }
    }

    mutate {
        replace => {
            "metadata.vendor_name" => "SAP"
        }
    }

    mutate {
        replace => {
            "metadata.product_name" => "SuccessFactors"
        }
    }

    mutate {
        replace => {
            "metadata.event_type" => "GENERIC_EVENT"
        }
    }

    if [secondary_user_email] != "" {
        grok {
            match => {
                "secondary_user_email" =>
                "%{EMAILADDRESS:secondary_user_email}"
            }
            on_error => "invalid_secondary_user_email"
            overwrite => ["secondary_user_email"]
        }
        if ![invalid_secondary_user_email]
        and [secondary_user_email] != "" {
            mutate {
                merge => {
                    "principal.user.email_addresses" =>
                    "secondary_user_email"
                }
                on_error => "no_secondary_user_email"
            }
        }
    }

    if [secondary_user_provisioner_id] != "" {
        mutate {
            replace => {
                "principal.user.userid" =>
                "%{secondary_user_provisioner_id}"
            }
            on_error => "no_secondary_user_provisioner_id"
        }
    }

    if ([changed_by_user_username] != "" or [changed_by_user_first_name] != ""
    or [changed_by_user_last_name] != "")
    and ([secondary_user_provisioner_id] != ""
    or [secondary_user_email] != "") {
        if [changed_by_user_first_name] != "" {
            mutate {
                replace => {
                    "intermediary_1.user.first_name" =>
                    "%{changed_by_user_first_name}"
                }
                on_error => "no_changed_by_user_first_name"
            }
        }

        if [changed_by_user_last_name] != "" {
            mutate {
                replace => {
                    "intermediary_1.user.last_name" =>
                    "%{changed_by_user_last_name}"
                }
                on_error => "no_changed_by_user_last_name"
            }
        }

        if [changed_by_user_username] != "" {
            mutate {
                replace => {
                    "intermediary_1.user.userid" =>
                    "%{changed_by_user_username}"
                }
                on_error => "no_changed_by_user_username"
            }
        }
    }
    else {
        if [changed_by_user_first_name] != "" {
            mutate {
                replace => {
                    "principal.user.first_name" =>
                    "%{changed_by_user_first_name}"
                }
                on_error => "no_changed_by_user_first_name"
            }
        }

        if [changed_by_user_last_name] != "" {
            mutate {
                replace => {
                    "principal.user.last_name" =>
                    "%{changed_by_user_last_name}"
                }
                on_error => "no_changed_by_user_last_name"
            }
        }

        if [changed_by_user_username] != "" {
            mutate {
                replace => {
                    "principal.user.userid" => "%{changed_by_user_username}"
                }
                on_error => "no_changed_by_user_username"
            }
        }
    }


    if [proxy_user_first_name] != "" {
        mutate {
            replace => {
                "intermediary_2.user.first_name" => "%{proxy_user_first_name}"
            }
            on_error => "no_proxy_user_first_name"
        }
    }

    if [proxy_user_last_name] != "" {
        mutate {
            replace => {
                "intermediary_2.user.last_name" => "%{proxy_user_last_name}"
            }
            on_error => "no_proxy_user_last_name"
        }
    }

    if [proxy_user_username] != "" {
        mutate {
            replace => {
                "intermediary_2.user.userid" => "%{proxy_user_username}"
            }
            on_error => "no_proxy_user_username"
        }
    }

    if [subject_user_first_name] != "" {
        mutate {
            replace => {
                "target.user.first_name" => "%{subject_user_first_name}"
            }
            on_error => "no_subject_user_first_name"
        }
    }


    if [subject_user_last_name] != "" {
        mutate {
            replace => {
                "target.user.last_name" => "%{subject_user_last_name}"
            }
            on_error => "no_subject_user_last_name"
        }
    }

    if [subject_user_id] != "" {
        mutate {
            replace => {
                "target.user.userid" => "%{subject_user_id}"
            }
            on_error => "no_subject_user_id"
        }
    }

    if ([subject_user_last_name] != "" or  [subject_user_id] != "") {
        if [no_changed_by_user_username] != "" and
        ![no_changed_by_user_username] and [target] != "" {
            mutate {
                replace => {
                    "metadata.event_type" => "RESOURCE_PERMISSIONS_CHANGE"
                }
            }
        }
    }

    mutate {
        convert => {
            "module" => "string"
        }
        on_error => "invalid_module"
    }
    mutate {
        replace => {
            "module_token.value.string_value" => "%{module}"
        }
        on_error => "no_module"
    }
    if ![no_module] and [module] != "" {
        mutate {
            replace => {
                "module_token.key" => "Module"
            }
        }
        mutate {
            merge => {
                "additional.fields" => "module_token"
            }
            on_error => "_"
        }
    }

    mutate {
        convert => {
            "functional_area" => "string"
        }
        on_error => "invalid_functional_area"
    }
    mutate {
        replace => {
            "functional_area_token.value.string_value" => "%{functional_area}"
        }
        on_error => "no_functional_area"
    }
    if ![no_functional_area] and [functional_area] != "" {
        mutate {
            replace => {
                "functional_area_token.key" => "Functional Area"
            }
        }
        mutate {
            merge => {
                "additional.fields" => "functional_area_token"
            }
            on_error => "_"
        }
    }

    mutate {
        convert => {
            "functional_sub_area" => "string"
        }
        on_error => "invalid_functional_sub_area"
    }
    mutate {
        replace => {
            "functional_sub_area_token.value.string_value" =>
            "%{functional_sub_area}"
        }
        on_error => "no_functional_sub_area"
    }
    if ![no_functional_sub_area] and [functional_sub_area] != "" {
        mutate {
            replace => {
                "functional_sub_area_token.key" => "Functional Sub Area"
            }
        }
        mutate {
            merge => {
                "additional.fields" => "functional_sub_area_token"
            }
            on_error => "_"
        }
    }




    if [context_1_key] == "Role" {
        mutate {
            replace => {
                "metadata.event_type" => "USER_RESOURCE_ACCESS"
            }
        }
        mutate {
            replace => {
                "role.name" => "%{context_1_value}"
            }
            on_error => "no_context_1_value"
        }
        if ![no_context_1_value] and [context_1_value] != "" {
            mutate {
                merge => {
                    "target.user.attribute.roles" => "role"
                }
                on_error => "_"
            }
        }
    }
    else if [context_1_key] == "Group" {
        if [context_1_value] != "" {
            mutate {
                replace => {
                    "target.group.group_display_name" => "%{context_1_value}"
                }
                on_error => "no_context_1_value"
            }
        }
    }
    else if [context_1_key] == "User" {
        if [context_1_value] != "" {
            mutate {
                replace => {
                    "target.user.userid" => "%{context_1_value}"
                }
                on_error => "no_context_1_value"
            }
        }
    }
    else if [context_1_key] == "Proxy Rights For" {
        grok {
            match => {
                "context_1_value" =>
                "%{USER:first_name}%{SPACE}%{GREEDYDATA:last_name}"
            }
            overwrite => ["first_name","last_name"]
            on_error => "invalid_context_1_value"
        }

        if [first_name] != "" {
            mutate {
                replace => {
                    "target.user.first_name" => "%{first_name}"
                }
                on_error => "no_first_name"
            }
        }

        if [last_name] != "" {
            mutate {
                replace => {
                    "target.user.last_name" => "%{last_name}"
                }
                on_error => "no_last_name"
            }
        }
    }
    else {
        mutate {
            convert => {
                "context_1_value" => "string"
            }
            on_error => "invalid_context_1_value"
        }
        mutate {
            replace => {
                "context_1_value_token.value.string_value" =>
                "%{context_1_value}"
            }
            on_error => "no_context_1_value"
        }
        if ![no_context_1_value] and [context_1_value] != "" {
            mutate {
                replace => {
                    "context_1_value_token.key" => "%{context_1_key}"
                }
                on_error => "no_context_1_key"
            }
            if ![no_context_1_key] {
                mutate {
                    merge => {
                        "additional.fields" => "context_1_value_token"
                    }
                    on_error => "_"
                }
            }
        }
    }

    if [context_2_key] == "User name" {
        grok {
            match => {
                "context_2_value" =>
                "%{USER:first_name}%{SPACE}%{GREEDYDATA:last_name}"
            }
            overwrite => ["first_name","last_name"]
            on_error => "invalid_context_2_value"
        }
        if [first_name] != "" {
            mutate {
                replace => {
                    "target.user.first_name" => "%{first_name}"
                }
                on_error => "no_first_name"
            }
        }
        if [last_name] != "" {
            mutate {
                replace => {
                    "target.user.last_name" => "%{last_name}"
                }
                on_error => "no_last_name"
            }
        }
    }
    else if [context_2_key]  == "Feature Id" {
        if [context_2_value] != "" {
            mutate {
                replace => {
                    "target.resource.product_object_id" => "%{context_2_value}"
                }
                on_error => "context_2_value"
            }
        }
    }
    else {
        mutate {
            convert => {
                "context_2_value" => "string"
            }
            on_error => "invalid_context_2_value"
        }
        mutate {
            replace => {
                "context_2_value_token.value.string_value" =>
                "%{context_2_value}"
            }
            on_error => "no_context_2_value"
        }
        if ![no_context_2_value] and [context_2_value] != "" {
            mutate {
                replace => {
                    "context_2_value_token.key" => "%{context_2_key}"
                }
                on_error => "no_context_2_key"
            }
            if ![no_context_2_key] {
                mutate {
                    merge => {
                        "additional.fields" => "context_2_value_token"
                    }
                    on_error => "_"
                }
            }
        }
    }

    if [context_3_key] == "Feature Name" {
        if [context_3_value] != "" {
            mutate {
                replace => {
                    "target.resource.name" => "%{context_3_value}"
                }
                on_error => "context_3_value"
            }
        }
    }
    else {
        mutate {
            convert => {
                "context_3_value" => "string"
            }
            on_error => "invalid_context_3_value"
        }
        mutate {
            replace => {
                "context_3_value_token.value.string_value" =>
                "%{context_3_value}"
            }
            on_error => "no_context_3_value"
        }
        if ![no_context_3_value] and [context_3_value] != "" {
            mutate {
                replace => {
                    "context_3_value_token.key" => "%{context_3_key}"
                }
                on_error => "no_context_3_key"
            }
            if ![no_context_3_key] {
                mutate {
                    merge => {
                        "additional.fields" => "context_3_value_token"
                    }
                    on_error => "_"
                }
            }
        }
    }

    if [context_4_key] != "" {
        mutate {
            convert => {
                "context_4_value" => "string"
            }
            on_error => "invalid_context_4_value"
        }
        mutate {
            replace => {
                "context_4_value_token.value.string_value" =>
                "%{context_4_value}"
            }
            on_error => "no_context_4_value"
        }
        if ![no_context_4_value] and [context_4_value] != "" {
            mutate {
                replace => {
                    "context_4_value_token.key" => "%{context_4_key}"
                }
                on_error => "no_context_4_key"
            }
            if ![no_context_4_key] {
                mutate {
                    merge => {
                        "additional.fields" => "context_4_value_token"
                    }
                    on_error => "_"
                }
            }
        }
    }

    if [context_5_key] != "" {
        mutate {
            convert => {
                "context_5_value" => "string"
            }
            on_error => "invalid_context_5_value"
        }
        mutate {
            replace => {
                "context_5_value_token.value.string_value" =>
                "%{context_5_value}"
            }
            on_error => "no_context_5_value"
        }
        if ![no_context_5_value] and [context_5_value] != "" {
            mutate {
                replace => {
                    "context_5_value_token.key" => "%{context_5_key}"
                }
                on_error => "no_context_5_key"
            }
            if ![no_context_5_key] {
                mutate {
                    merge => {
                        "additional.fields" => "context_5_value_token"
                    }
                    on_error => "_"
                }
            }
        }
    }


    if [field_name] == "Group" {
        if [new_value] != "" {
            mutate {
                replace => {
                    "target.group.group_display_name" => "%{new_value}"
                }
                on_error => "no_group"
            }
        }

        mutate {
            convert => {
                "old_value" => "string"
            }
            on_error => "invalid_old_value"
        }
        mutate {
            replace => {
                "old_value_token.value" => "%{old_value}"
            }
            on_error => "no_old_value"
        }
        if ![no_old_value] and [old_value] != "" {
            mutate {
                replace => {
                    "old_value_token.key" => "Group Old Value"
                }
            }
            mutate {
                merge => {
                    "target.group.attribute.labels" => "old_value_token"
                }
                on_error => "_"
            }
        }
    }
    else if [field_name] == "Permission" {
        mutate {
            replace => {
                "permission.name" => "%{new_value}"
            }
            on_error => "no_new_value"
        }
        if ![no_new_value] and [new_value] != "" {
            mutate {
                merge => {
                    "target.user.attribute.permissions" => "permission"
                }
                on_error => "_"
            }
        }

        mutate {
            convert => {
                "old_value" => "string"
            }
            on_error => "invalid_old_value"
        }
        mutate {
            replace => {
                "old_value_token.value" => "%{old_value}"
            }
            on_error => "no_old_value"
        }
        if ![no_old_value] and [old_value] != "" {
            mutate {
                replace => {
                    "old_value_token.key" => "Permission Old Value"
                }
            }
            mutate {
                merge => {
                    "target.user.attribute.labels" => "old_value_token"
                }
                on_error => "_"
            }
        }

    }
    else if [field_name] == "Role name" {
        if [context_1_key] == "" or [context_1_key] != "Role" {
            mutate {
                replace => {
                    "role.name" => "%{new_value}"
                }
                on_error => "no_new_value"
            }
            if ![no_new_value] and [new_value] != "" {
                mutate {
                    merge => {
                        "target.user.attribute.roles" => "role"
                    }
                    on_error => "_"
                }
            }
        }
        else if [new_value] != "" and [context_1_value] != [new_value] {
            mutate {
                convert => {
                    "new_value" => "string"
                }
                on_error => "invalid_new_value"
            }
            mutate {
                replace => {
                    "new_value_token.value" => "%{new_value}"
                }
                on_error => "no_new_value"
            }
            if ![no_new_value] and [new_value] != "" {
                mutate {
                    replace => {
                        "new_value_token.key" => "Role Name New Value"
                    }
                }
                mutate {
                    merge => {
                        "target.user.attribute.labels" => "new_value_token"
                    }
                    on_error => "_"
                }
            }
        }

        mutate {
            convert => {
                "old_value" => "string"
            }
            on_error => "invalid_old_value"
        }
        mutate {
            replace => {
                "old_value_token.value" => "%{old_value}"
            }
            on_error => "no_old_value"
        }
        if ![no_old_value] and [old_value] != "" {
            mutate {
                replace => {
                    "old_value_token.key" => "Role Name Old Value"
                }
            }
            mutate {
                merge => {
                    "target.user.attribute.labels" => "old_value_token"
                }
                on_error => "_"
            }
        }
    }
    else if [field_name] == "People Pool" {
        mutate {
            convert => {
                "new_value" => "string"
            }
            on_error => "invalid_new_value"
        }
        mutate {
            replace => {
                "new_value_token.value" => "%{new_value}"
            }
            on_error => "no_new_value"
        }
        if ![no_new_value] and [new_value] != "" {
            mutate {
                replace => {
                    "new_value_token.key" => "People Pool New Value"
                }
            }
            mutate {
                merge => {
                    "target.group.attribute.labels" => "new_value_token"
                }
                on_error => "_"
            }
        }

        mutate {
            convert => {
                "old_value" => "string"
            }
            on_error => "invalid_old_value"
        }
        mutate {
            replace => {
                "old_value_token.value" => "%{old_value}"
            }
            on_error => "no_old_value"
        }
        if ![no_old_value] and [old_value] != "" {
            mutate {
                replace => {
                    "old_value_token.key" => "People Pool Old Value"
                }
            }
            mutate {
                merge => {
                    "target.group.attribute.labels" => "old_value_token"
                }
                on_error => "_"
            }
        }

    }
    else if [field_name] == "Group name" {
        if [context_1_key] == "" or [context_1_key] != "Group" {
            mutate {
                replace => {
                    "target.group.group_display_name" => "%{new_value}"
                }
                on_error => "no_new_value"
            }
        }
        else if [new_value] != "" and [new_value] != [context_1_value] {
            mutate {
                convert => {
                    "new_value" => "string"
                }
                on_error => "invalid_new_value"
            }
            mutate {
                replace => {
                    "new_value_token.value" => "%{new_value}"
                }
                on_error => "no_new_value"
            }
            if ![no_new_value] and [new_value] != "" {
                mutate {
                    replace => {
                        "new_value_token.key" => "Group name New Value"
                    }
                }
                mutate {
                    merge => {
                        "target.group.attribute.labels" => "new_value_token"
                    }
                    on_error => "_"
                }
            }

        }

        mutate {
            convert => {
                "old_value" => "string"
            }
            on_error => "invalid_old_value"
        }
        mutate {
            replace => {
                "old_value_token.value" => "%{old_value}"
            }
            on_error => "no_old_value"
        }
        if ![no_old_value] and [old_value] != "" {
            mutate {
                replace => {
                    "old_value_token.key" => "Group name Old Value"
                }
            }
            mutate {
                merge => {
                    "target.group.attribute.labels" => "old_value_token"
                }
                on_error => "_"
            }
        }
    }
    else if [field_name] == "Role" {
        mutate {
            replace => {
                "metadata.event_type" => "USER_RESOURCE_ACCESS"
            }
        }
        mutate {
            replace => {
                "role.name" => "%{new_value}"
            }
            on_error => "no_new_value"
        }
        if ![no_new_value] and [new_value] != "" {
            mutate {
                merge => {
                    "target.user.attribute.roles" => "role"
                }
                on_error => "_"
            }
        }

        mutate {
            convert => {
                "old_value" => "string"
            }
            on_error => "invalid_old_value"
        }
        mutate {
            replace => {
                "old_value_token.value" => "%{old_value}"
            }
            on_error => "no_old_value"
        }
        if ![no_old_value] and [old_value] != "" {
            mutate {
                replace => {
                    "old_value_token.key" => "Role Old Value"
                }
            }
            mutate {
                merge => {
                    "target.user.attribute.labels" => "old_value_token"
                }
                on_error => "_"
            }
        }
    }
    else {
        mutate {
            convert => {
                "new_value" => "string"
            }
            on_error => "invalid_new_value"
        }
        mutate {
            replace => {
                "new_value_token.value.string_value" => "%{new_value}"
            }
            on_error => "no_new_value"
        }
        if ![no_new_value] and [new_value] != "" {
            mutate {
                replace => {
                    "new_value_token.key" => "%{field_name} New Value"
                }
                on_error => "no_field_name_new_value"
            }
            if ![no_field_name_new_value] {
                mutate {
                    merge => {
                        "additional.fields" => "new_value_token"
                    }
                    on_error => "_"
                }
            }
        }

        mutate {
            convert => {
                "old_value" => "string"
            }
            on_error => "invalid_old_value"
        }
        mutate {
            replace => {
                "old_value_token.value.string_value" => "%{old_value}"
            }
            on_error => "no_old_value"
        }
        if ![no_old_value] and [old_value] != "" {
            mutate {
                replace => {
                    "old_value_token.key" => "%{field_name} Old Value"
                }
                on_error => "no_field_name_old_value"
            }
            if ![no_field_name_old_value] {
                mutate {
                    merge => {
                        "additional.fields" => "old_value_token"
                    }
                    on_error => "_"
                }
            }
        }
    }

    mutate {
        convert => {
            "operation_performed" => "string"
        }
        on_error => "invalid_operation_performed"
    }
    mutate {
        replace => {
            "operation_performed_token.value.string_value" =>
            "%{operation_performed}"
        }
        on_error => "no_operation_performed"
    }
    if ![no_operation_performed] and [operation_performed] != "" {
        mutate {
            replace => {
                "operation_performed_token.key" => "Operation Performed"
            }
        }
        mutate {
            merge => {
                "additional.fields" => "operation_performed_token"
            }
            on_error => "_"
        }
    }

    date {
        match => ["timestamp", "RFC3339", "UNIX", "ISO8601", "UNIX_MS"]
        on_error => "no_timestamp"
    }

    mutate {
        convert => {
            "effective_start_date" => "string"
        }
        on_error => "invalid_effective_start_date"
    }
    mutate {
        replace => {
            "effective_start_date_token.value.string_value" =>
            "%{effective_start_date}"
        }
        on_error => "no_effective_start_date"
    }
    if ![no_effective_start_date] and [effective_start_date] != "" {
        mutate {
            replace => {
                "effective_start_date_token.key" => "Effective Start Date"
            }
        }
        mutate {
            merge => {
                "additional.fields" => "effective_start_date_token"
            }
            on_error => "_"
        }
    }

    mutate {
        convert => {
            "effective_sequence" => "string"
        }
        on_error => "invalid_effective_sequence"
    }
    mutate {
        replace => {
            "effective_sequence_token.value.string_value" =>
            "%{effective_sequence}"
        }
        on_error => "no_effective_sequence"
    }
    if ![no_effective_sequence] and [effective_sequence] != "" {
        mutate {
            replace => {
                "effective_sequence_token.key" => "Effective Sequence"
            }
        }
        mutate {
            merge => {
                "additional.fields" => "effective_sequence_token"
            }
            on_error => "_"
        }
    }

    if [metadata] != "" {
        mutate {
            rename => {
                "metadata" => "event.idm.read_only_udm.metadata"
            }
        }
    }

    if [target] != "" {
        mutate {
            rename => {
                "target" => "event.idm.read_only_udm.target"
            }
        }
    }

    if [principal] != "" {
        mutate {
            rename => {
                "principal" => "event.idm.read_only_udm.principal"
            }
        }
    }

    if [intermediary_1] != "" {
        mutate {
            merge => {
                "event.idm.read_only_udm.intermediary" =>
                "intermediary_1"
            }
            on_error => "no_intermediary_1"
        }
    }

    if [intermediary_2] != "" {
        mutate {
            merge => {
                "event.idm.read_only_udm.intermediary" =>
                "intermediary_2"
            }
            on_error => "no_intermediary_2"
        }
    }

    if [additional] != "" {
        mutate {
            rename => {
                "additional" => "event.idm.read_only_udm.additional"
            }
        }
    }

    mutate {
        merge => {
            "@output" => "event"
        }
    }
}
