# Product: Tines Audit Log Parser
# Category: Data Security
# Supported Format: JSON
# Reference: N/A
# Last Updated: 2024-10-01
# Copyright 2024 Chronicle LLC
filter {
  mutate {
    replace => {
      "operation_name" => ""
      "created_at" => ""
      "updated_at" => ""
      "id" => ""
      "inputs.inputs.storyId" => ""
      "inputs.inputs.actions" => ""
      "inputs.inputs.teamCaseId" => ""
      "inputs.inputs.recordResultSetId" => ""
      "inputs.inputs.storyContainerId" => ""
      "inputs.inputs.title" => ""
      "inputs.inputs.description" => ""
      "inputs.inputs.editingSource" => ""
      "inputs.inputs.actionId" => ""
      "inputs.inputs.mode" => ""
      "inputs.inputs.loop" => ""
      "inputs.inputs.log_text" => ""
      "request_ip" => ""
      "request_user_agent" => ""
      "tenant_id" => ""
      "user_email" => ""
      "user_id" => ""
      "user_name" => ""
      "inputs.name" => ""
      "inputs.status" => ""
      "inputs.severity" => ""
      "inputs.team_id" => ""
      "inputs.tags" => ""
      "principal" => ""
      "has_principal" => ""
      "target" => ""
      "network" => ""
      "additional" => ""
      "has_user" => ""
    }
  }
  mutate {
    gsub => ["message",'\\\n','']
  }
  json {
    source => "message"
    array_function => "split_columns"
    on_error => "not_json"
  }
  if [not_json] {
    drop {
      tag => "TAG_MALFORMED_MESSAGE"
    }
  }
  if [created_at] != "" {
    date {
      match => ["created_at", "ISO8601"]
      on_error => "created_at_invalid"
    }
  }
  if [updated_at] != "" {
    mutate {
      replace => {
        "updated_at_label.key" => "updated_at"
        "updated_at_label.value.string_value" => "%{updated_at}"
      }
      on_error => "updated_at_invalid"
    }
    if ![updated_at_invalid] {
      mutate {
        merge => {
          "additional.fields" => "updated_at_label"
        }
        on_error => "updated_at_merge_invalid"
      }
    }
  }
  if [id] != "" {
    mutate {
      convert => {
        "id" => "string"
      }
      on_error => "id_convert_invalid"
    }
    mutate {
      replace => {
        "event.idm.read_only_udm.metadata.product_log_id" => "%{id}"
      }
      on_error => "id_invalid"
    }
  }
  if [inputs][inputs][storyId] != "" {
    mutate {
      convert => {
      "inputs.inputs.storyId" => "string"
      }
      on_error => "storyId_convert_invalid"
    }
    mutate {
      replace => {
        "storyId_label.key" => "storyId"
        "storyId_label.value.string_value" => "%{inputs.inputs.storyId}"
      }
      on_error => "storyId_label_invalid"
    }
    if ![storyId_label_invalid] {
      mutate {
        merge => {
          "additional.fields" => "storyId_label"
        }
        on_error => "storyId_label_merge_invalid"
      }
    }
  }
  if [inputs][inputs][editingSource] != "" {
    mutate {
      replace => {
        "editingSource_label.key" => "editingSource"
        "editingSource_label.value.string_value" => "%{inputs.inputs.editingSource}"
      }
      on_error => "editingSource_invalid"
    }
    if ![editingSource_invalid] {
      mutate {
        merge => {
          "additional.fields" => "editingSource_label"
        }
        on_error => "editingSource_merge_invalid"
      }
    }
  }
  for action in inputs.inputs.actions {
    mutate {
      convert => {
        "action.actionId" => "string"
      }
      on_error => "actionId_convert_invalid"
    }
    mutate {
      replace => {
        "actionId" => "%{action.actionId}"
      }
      on_error => "actionId_invalid"
    }
    if ![actionId_invalid] {
      mutate {
        replace => {
          "actionId_label.key" => "actionId"
          "actionId_label.value.string_value" => "%{action.actionId}"
        }
        on_error => "actionId_label_invalid"
      }
      if ![actionId_label_invalid] {
        mutate {
          merge => {
            "additional.fields" => "actionId_label"
          }
          on_error => "actionId_label_invalid"
        }
      }
    }
    mutate {
      replace => {
        "name" => "%{action.name}"
      }
      on_error => "name_invalid"
    }
    if ![name_invalid] {
      mutate {
        replace => {
          "name_label.key" => "name"
          "name_label.value.string_value" => "%{action.name}"
        }
        on_error => "name_label_invalid"
      }
      if ![name_label_invalid] {
        mutate {
          merge => {
            "additional.fields" => "name_label"
          }
          on_error => "name_label_merge_invalid"
        }
      }
    }
  }
  if [inputs][inputs][teamCaseId] != "" {
    mutate {
      convert => {
        "inputs.inputs.teamCaseId" => "string"
      }
      on_error => "teamCaseId_convert_invalid"
    }
    mutate {
      replace => {
        "teamCaseId_label.key" => "teamCaseId"
        "teamCaseId_label.value.string_value" => "%{inputs.inputs.teamCaseId}"
      }
      on_error => "teamCaseId_label_invalid"
    }
    if ![teamCaseId_label_invalid] {
      mutate {
        merge => {
          "additional.fields" => "teamCaseId_label"
        }
        on_error => "teamCaseId_label_merge_invalid"
      }
    }
  }
  if [inputs][inputs][storyContainerId] != "" {
    mutate {
      convert => {
        "inputs.inputs.storyContainerId" => "string"
      }
      on_error => "storyContainerId_convert_invalid"
    }
    mutate {
      replace => {
        "storyContainerId_label.key" => "storyContainerId"
        "storyContainerId_label.value.string_value" => "%{inputs.inputs.storyContainerId}"
      }
      on_error => "storyContainerId_label_invalid"
    }
    if ![storyContainerId_label_invalid] {
      mutate {
        merge => {
          "additional.fields" => "storyContainerId_label"
        }
        on_error => "storyContainerId_label_merge_invalid"
      }
    }
  }
  if [inputs][inputs][title] != "" {
    mutate {
      replace => {
        "title_label.key" => "title"
        "title_label.value.string_value" => "%{inputs.inputs.title}"
      }
      on_error => "title_label_invalid"
    }
    if ![title_label_invalid] {
      mutate {
        merge => {
          "additional.fields" => "title_label"
        }
        on_error => "title_label_merge_invalid"
      }
    }
  }
  if [inputs][inputs][recordResultSetId] != "" {
    mutate {
      convert => {
        "inputs.inputs.recordResultSetId" => "string"
      }
      on_error => "recordResultSetId_convert_invalid"
    }
    mutate {
      replace => {
        "recordResultSetId_label.key" => "recordResultSetId"
        "recordResultSetId_label.value.string_value" => "%{inputs.inputs.recordResultSetId}"
      }
      on_error => "recordResultSetId_label_invalid"
    }
    if ![recordResultSetId_label_invalid] {
      mutate {
        merge => {
          "additional.fields" => "recordResultSetId_label"
        }
        on_error => "recordResultSetId_label_merge_invalid"
      }
    }
  }
  if [request_ip] != "" {
    mutate {
      merge => {
        "principal.ip" => "request_ip"
        "principal.asset.ip" => "request_ip"
      }
      on_error => "request_ip_invalid"
    }
    if ![request_ip_invalid] {
      mutate {
        replace => {
          "has_principal" => "true"
        }
      }
    }
  }
  if [request_user_agent] != "" {
    mutate {
      replace => {
        "network.http.user_agent" => "%{request_user_agent}"
      }
      on_error => "request_user_agent_invalid"
    }
  }
  if [tenant_id] != "" {
    mutate {
      convert => {
        "tenant_id" => "string"
      }
      on_error => "tenant_id_convert_invalid"
    }
    mutate {
      replace => {
        "tenant_id_label.key" => "tenant_id"
        "tenant_id_label.value.string_value" => "%{tenant_id}"
      }
      on_error => "tenant_id_invalid"
    }
    if ![tenant_id_invalid] {
      mutate {
        merge => {
          "additional.fields" => "tenant_id_label"
        }
        on_error => "tenant_id_invalid"
      }
    }
  }
  if [user_email] != "" and [user_email] =~ "(^.+@.+$)" {
    mutate {
      merge => {
        "principal.user.email_addresses" => "user_email"
      }
      on_error => "user_email_invalid"
    }
  }
  if [user_name] != "" {
    mutate {
      replace => {
        "principal.user.user_display_name" => "%{user_name}"
      }
      on_error => "user_name_invalid"
    }
  }
  mutate {
    convert => {
      "user_id" => "string"
    }
    on_error => "user_id_convert_invalid"
  }
  if [user_id] != "" {
    mutate {
      replace => {
        "principal.user.userid" => "%{user_id}"
      }
      on_error => "user_id_invalid"
    }
    if ![user_id_invalid] {
      mutate {
        replace => {
          "has_user" => "true"
        }
      }
    }
  }
  if [has_principal] == "true" {
    mutate {
      replace => {
        "event.idm.read_only_udm.metadata.event_type" => "STATUS_UPDATE"
      }
    }
  } else if [has_user] == "true" {
    mutate {
      replace => {
        "event.idm.read_only_udm.metadata.event_type" => "USER_UNCATEGORIZED"
      }
    }
  } else {
    mutate {
      replace => {
        "event.idm.read_only_udm.metadata.event_type" => "GENERIC_EVENT"
      }
    }
  }
  mutate {
    replace => {
      "event.idm.read_only_udm.metadata.product_name" => "Tines"
      "event.idm.read_only_udm.metadata.vendor_name" => "Tines"
      "event.idm.read_only_udm.metadata.product_event_type" => "%{operation_name}"
    }
  }
  if [target] != "" {
    mutate {
      rename => {
        "target" => "event.idm.read_only_udm.target"
      }
    }
  }
  if [principal] != "" {
    mutate {
      rename => {
        "principal" => "event.idm.read_only_udm.principal"
      }
    }
  }
  if [network] != "" {
    mutate {
      rename => {
        "network" => "event.idm.read_only_udm.network"
      }
    }
  }
  if [additional] != "" {
    mutate {
      rename => {
        "additional" => "event.idm.read_only_udm.additional"
      }
    }
  }
  mutate {
    merge => {
      "@output" => "event"
    }
  }
}
