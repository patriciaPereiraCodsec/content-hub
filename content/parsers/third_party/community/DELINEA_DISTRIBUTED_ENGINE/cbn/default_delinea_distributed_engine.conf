# Product: Delinea_Distributed_Engine
# Category: Application server logs
# Supported Format: SYSLOG
# Reference: https://docs.delinea.com/online-help/library/start.htm
# Last Updated: 2024-12-06
# Copyright 2024 Chronicle LLC
filter {
  mutate {
    replace => {
      "principal" => ""
      "metadata" => ""
      "additional" => ""
      "target" => ""
      "security_result" => ""
      "network" => ""
      "has_principal" => "false"
      "has_user" => "false"
      "tId" => ""
      "severity" => ""
      "desc" => ""
      "nullifiedVal" => ""
      "timestamp" => ""
    }
  }

  grok {
    match => {
      message => ["%{TIMESTAMP_ISO8601:timestamp} \\[%{GREEDYDATA:nullifiedVal}\\[%{DATA}:%{DATA:tId}\\] %{DATA:severity} %{GREEDYDATA:desc}"]
    }
    on_error => "no_match"
    overwrite => ["timestamp","nullifiedVal","severity","tId","desc"]
  }

  if [tId] != "" {
    mutate {
      replace => {
        "target.process.pid" => "%{tId}"
      }
      on_error => "no_tId"
    }
  }

  if [severity] != "" {
    if [severity] in ["ERROR", "CRITICAL"] {
      mutate {
        replace => {
          "security_result.severity" => "%{severity}"
        }
      }
    }
    else if [severity] == "INFO" {
      mutate {
        replace => {
          "security_result.severity" => "INFORMATIONAL"
        }
      }
    }
    else if [severity] == "WARN" {
      mutate {
        replace => {
          "security_result.severity" => "MEDIUM"
        }
      }
    }
    else {
      mutate {
        replace => {
          "security_result.severity" => "UNKNOWN_SEVERITY"
        }
      }
    }
  }

  if [desc] != "" {
    mutate {
      replace => {
        "metadata.description" => "%{desc}"
      }
      on_error => "no_desc"
    }
  }
  mutate {
    replace => {
      "metadata.event_type" => "GENERIC_EVENT"
      "metadata.vendor_name" => "DELINEA_DISTRIBUTED_ENGINE"
      "metadata.product_name" => "DELINEA_DISTRIBUTED_ENGINE"
    }
  }

  if [has_user] == "true" {
    mutate {
      replace => {
        "metadata.event_type" => "USER_UNCATEGORIZED"
      }
      on_error => "no_user"
    }
  }

  else if [has_principal] == "true" {
    mutate {
      replace => {
        "metadata.event_type" => "STATUS_UPDATE"
      }
      on_error => "no_principal"
    }
  }

  if [metadata] != "" {
    mutate {
      rename => {
        "metadata" => "event.idm.read_only_udm.metadata"
      }
    }
  }

  if [principal] != "" {
    mutate {
      rename => {
        "principal" => "event.idm.read_only_udm.principal"
      }
    }
  }

  if [target] != "" {
    mutate {
      rename => {
        "target" => "event.idm.read_only_udm.target"
      }
    }
  }

  if [additional] != "" {
    mutate {
      rename => {
        "additional" => "event.idm.read_only_udm.additional"
      }
    }
  }

  if [security_result] != "" {
    mutate {
      merge => {
        "event.idm.read_only_udm.security_result" => "security_result"
      }
      on_error => "no_sec_result"
    }
  }

  mutate {
    merge => {
      "@output" => "event"
    }
  }
}
