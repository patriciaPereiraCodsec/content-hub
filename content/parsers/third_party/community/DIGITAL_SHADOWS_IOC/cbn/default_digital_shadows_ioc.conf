# Product: Digital Shadows
# Category: IOC
# Supported Format: JSON
# Reference: https://www.digitalshadows.com/
# Last Updated: 2022-04-23
# Copyright 2021 Chronicle LLC


filter {

  # convert null to string for validation checks
  mutate {
    gsub => ["message", "null", "\"$1\""]
  }

  # Initialize sentinel fields
  mutate {
    replace => {
      "security_result" => ""

      # indicator
      "id" => ""
      "type" => ""
      "value" => ""
      "sourceIdentifier" => ""
      "sourceType" => ""
      "lastUpdated" => ""
      "attributionTag.id" => ""
      "attributionTag.name" => ""
      "attributionTag.type" => ""

    }
  }
 
  # parse log as json
  json {
    source         => "message"
    array_function => "split_columns"
    on_error       => "_not_json"
  }
 
  if [_not_json] {

        drop { tag => "TAG_MALFORMED_MESSAGE" }

  } else {
  
    if [type] == "HOST" {
      # > DOMAIN NAME
      mutate {
        replace => {
          "entity.idm.entity.metadata.entity_type" => "DOMAIN_NAME"
        }
      }
      mutate {
        replace => {
          "entity.idm.entity.entity.hostname" => "%{value}"
        }
      }       
      # > IP            
    } else if [type] == "IP" {
      mutate {
        replace => {
          "entity.idm.entity.metadata.entity_type" => "IP_ADDRESS"
        }
      }
      mutate {
        merge => {
          "entity.idm.entity.entity.ip" => "value"
        }
      }
      # > URL          
    } else if [type] == "URL" {
      mutate {
        replace => {
          "entity.idm.entity.metadata.entity_type" => "URL"
        }
      }
      mutate {
        replace => {
          "entity.idm.entity.entity.url" => "%{value}"
        }
      }
      # > EMAIL
    } else if [type] == "EMAIL" {
      mutate {
        replace => {
          "entity.idm.entity.metadata.entity_type" => "USER"
        }
      }
      mutate {
        merge => {
          "entity.idm.entity.entity.user.email_addresses" => "value"
        }
      }
      # > HASH > SHA1
    } else if [type] == "SHA1" {
      mutate {
        replace => {
          "entity.idm.entity.metadata.entity_type" => "FILE"
        }
      }
      mutate {
        replace => {
          "entity.idm.entity.entity.file.sha1" => "%{value}"
        }
      }                    
      # > HASH > SHA256          
    } else if [type] == "SHA256" {
      mutate {
        replace => {
          "entity.idm.entity.metadata.entity_type" => "FILE"
        }
      }
      mutate {
        replace => {
          "entity.idm.entity.entity.file.sha256" => "%{value}"
        }
      }
      # > HASH > MD5                              
    } else if [type] == "MD5" {
      mutate {
        replace => {
          "entity.idm.entity.metadata.entity_type" => "FILE"
        }
      }
      mutate {
        replace => {
          "entity.idm.entity.entity.file.md5" => "%{value}"
        }
      }                    
    } else {
      mutate {
        replace => {
          "entity.idm.entity.metadata.entity_type" => "UNKNOWN_ENTITYTYPE"
        }
      }        
    }

    if [attributionTag][id] != "" {
      mutate {
        convert => {
          "attributionTag.id" => "string"
        }
      }
      mutate {
        replace => {
          "_attributionTag_id.key"   => "attributionTag.id"
          "_attributionTag_id.value" => "%{attributionTag.id}"
        }
      }
      mutate {
        merge => {
          "_threat.about.labels" => "_attributionTag_id"
        }
      }
    }
      
    if [attributionTag][name] != "" {
      mutate {
        replace => {
          "_attributionTag_name.key"   => "attributionTag.name"
          "_attributionTag_name.value" => "%{attributionTag.name}"
        }
      }
      mutate {
        merge => {
          "_threat.about.labels" => "_attributionTag_name"
        }
      }
    }

    if [attributionTag][type] != "" {
      mutate {
        replace => {
          "_attributionTag_type.key"   => "attributionTag.type"
          "_attributionTag_type.value" => "%{attributionTag.type}"
        }
      }
      mutate {
        merge => {
          "_threat.about.labels" => "_attributionTag_type"
        }
      }        
    }


    # IDM > Metadata > Interval > Start Time
    # >
    if [lastUpdated] != "" {
        date {
          match => ["lastUpdated", "ISO8601"]
          target => "entity.idm.entity.metadata.interval.start_time"
        }      
    }
    # <

    # IDM > Metadata > Vendor & Product Name
    # >
    mutate {
      replace => {
        "entity.idm.entity.metadata.vendor_name" => "Digital Shadows"
        "entity.idm.entity.metadata.product_name" => "Indicators"            
      }
    }  
    # <  

    # IDM > Metadata > Product Entity ID
    # >
    if [id] != "" {
      mutate {
        replace => {
          "entity.idm.entity.metadata.product_entity_id" => "%{id}"
        }
      }
    } 
    # <

    # IDM > Metadata > Threat Name > Threat ID
    # >
    if [id] != "" {
      mutate {
        replace => {
          "_threat.threat_id" => "%{id}"
        }
      }
    } 
    # <

    # IDM > Metadata > Threat Name > URL Back to Product
    # > 
    mutate {
      replace => {
        "_threat.url_back_to_product" => "%{sourceIdentifier}"
      }
    }
    # <

    # IDM > Metadata > Threat Name > Category Details
    # >
    mutate {
      merge => {
        "_threat.category_details" => "sourceType"
      }
    }
    # <

    # IDM > Metadata > Threat Name > Threat Feed Name
    # >
    mutate {
      replace => {
        "_threat.threat_feed_name" => "Indicators"
      }
    }  
    # <  

    # IDM > Metadata > Threat (Merge)
    mutate {
      merge => {
        "entity.idm.entity.metadata.threat" => "_threat"
      }
    }

    # IDM > Event (Merge)
    mutate {
      merge => {
        "@output" => "entity"
      }
    }
 
  }
}
