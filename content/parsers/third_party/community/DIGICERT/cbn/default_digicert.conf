# Product: DIGICERT
# Category: IT infrastructure
# Supported Format: JSON
# Last Updated: 2025-02-13
# Copyright 2025 Google SecOps

filter {
  mutate {
    replace => {
      "event_" => ""
      "data.order_id" => ""
      "data.certificate_id" => ""
      "has_user" => ""
      "principal" => ""
      "has_principal" => ""
      "Action" => ""
      "account_id" => ""
      "security_result" => ""
      "Activity" => ""
      "action_taken_via" => ""
      "adjustment_ledger_id" => ""
      "date_time" => ""
      "src" => ""
      "intermediary" => ""
      "division_container_id" => ""
      "division_container_name" => ""
      "domain_name" => ""
      "domain_id" => ""
      "ip_address" => ""
      "ip_country" => ""
      "Message" => ""
      "order_id" => ""
      "order_request_id" => ""
      "organization_id" => ""
      "organization_name" => ""
      "primary_organization_name" => ""
      "revocation_comments" => ""
      "voucher_code_id" => ""
      "voucher_order_id" => ""
      "user_id" => ""
      "user_name" => ""
      "Result" => ""
    }
  }
  mutate {
    gsub => [
      "message", "event", "event_"
    ]
    on_error => "no_event"
  }
  mutate {
    gsub => [
      "message", "User ID", "user_id"
    ]
    on_error => "no_user_Id"
  }
  mutate {
    gsub => [
      "message", "User name", "user_name"
    ]
    on_error => "no_User_name"
  }
  mutate {
    gsub => [
      "message", "Organization ID", "organization_id"
    ]
    on_error => "no_Organization_id"
  }
  mutate {
    gsub => [
      "message", "Organization name", "organization_name"
    ]
    on_error => "no_Organization_name"
  }
  mutate {
    gsub => [
      "message", "Primary organization name", "primary_organization_name"
    ]
    on_error => "no_Primary_organization_name"
  }
  mutate {
    gsub => [
      "message", "Voucher order ID", "voucher_order_id"
    ]
    on_error => "no_voucher_order_ID"
  }
  mutate {
    gsub => [
      "message", "Voucher code ID", "voucher_code_id"
    ]
    on_error => "no_voucher_code_Id"
  }
  mutate {
    gsub => [
      "message", "Revocation comments", "revocation_comments"
    ]
    on_error => "no_revocation_comments"
  }
  mutate {
    gsub => [
      "message", "Order request ID", "order_request_id"
    ]
    on_error => "no_Order_request_id"
  }
  mutate {
    gsub => [
      "message", "Order ID", "order_id"
    ]
    on_error => "no_order_id"
  }
  mutate {
    gsub => [
      "message", "IP address", "ip_address"
    ]
    on_error => "no_IP_address"
  }
  mutate {
    gsub => [
      "message", "IP country", "ip_country"
    ]
    on_error => "no_IP_country"
  }
  mutate {
    gsub => [
      "message", "Domain ID", "domain_id"
    ]
    on_error => "no_Domain_ID"
  }
  mutate {
    gsub => [
      "message", "Domain name", "domain_name"
    ]
    on_error => "no_Domain_Name"
  }
  mutate {
    gsub => [
      "message", "Division/Container Name", "division_container_name"
    ]
    on_error => "no_Division_Container_Name"
  }
  mutate {
    gsub => [
      "message", "Division/Container ID", "division_container_id"
    ]
    on_error => "no_Division_Container_ID"
  }
  mutate {
    gsub => [
      "message", "Account ID", "account_id"
    ]
    on_error => "no_Account_ID"
  }
  mutate {
    gsub => [
      "message", "Action taken via", "action_taken_via"
    ]
    on_error => "no_Action_taken_via"
  }
  mutate {
    gsub => [
      "message", "Adjustment/Ledger ID" , "adjustment_ledger_id"
    ]
    on_error => "no_Adjustment_Ledger_ID"
  }
  mutate {
    gsub => [
      "message", "Date and time (UTC)", "date_time"
    ]
    on_error => "no_date_time"
  }
  json {
    source => "message"
    array_function => "split_columns"
    on_error => "no_json"
  }
  if [account_id] != "" {
    mutate {
      replace => {
        "src.user.userid" => "%{account_id}"
      }
      on_error => "no_account_id"
    }
  }
  if [Action] != "" {
    mutate {
      replace => {
        "action_label.key" => "Action"
        "action_label.value" => "%{Action}"
      }
      on_error => "no_action"
    }
    if ![no_action] {
      mutate {
        merge => {
          "security_result.detection_fields" => "action_label"
        }
        on_error => "no_action_label"
      }
    }
  }
  if [action_taken_via] != "" {
    mutate {
      replace => {
        "intermediary.application" => "%{action_taken_via}"
      }
      on_error => "no_action_taken_via"
    }
  }
  if [Activity] != "" {
    mutate {
      replace => {
        "security_result.description" => "%{Activity}"
      }
      on_error => "no_activity"
    }
  }
  if [adjustment_ledger_id] != "" {
    mutate {
      replace => {
        "adjustment_ledger_id_label.key" => "Adjustment/Ledger ID"
        "adjustment_ledger_id_label.value.string_value" => "%{adjustment_ledger_id}"
      }
      on_error => "no_adjustment_ledger_id"
    }
    if ![no_adjustment_ledger_id] {
      mutate {
        merge => {
          "event.idm.read_only_udm.additional.fields" => "adjustment_ledger_id_label"
        }
        on_error => "no_adjustment_ledger_id_label"
      }
    }
  }
  if [Result] != "" {
    mutate {
      replace => {
        "result_label.key" => "Result"
        "result_label.value" => "%{Result}"
      }
      on_error => "no_result"
    }
    if ![no_result] {
      mutate {
        merge => {
          "security_result.detection_fields" => "result_label"
        }
        on_error => "no_result_label"
      }
    }
  }
  if [user_id] != "" {
    mutate {
      replace => {
        "principal.user.userid" => "%{user_id}"
      }
      on_error => "no_user_id"
    }
    if ![no_user_id] {
      mutate {
        replace => {
          "has_user" => "true"
        }
        on_error => "no_has_user"
      }
    }
  }
  if [user_name] != "" {
    mutate {
      replace => {
        "principal.user.user_display_name" => "%{user_name}"
      }
      on_error => "no_user_name"
    }
  }
  if [division_container_id] != "" {
    mutate {
      replace => {
        "division_container_id_label.key" => "Division/Container ID"
        "division_container_id_label.value.string_value" => "%{division_container_id}"
      }
      on_error => "no_division_container_id"
    }
    if ![no_division_container_id] {
      mutate {
        merge => {
          "event.idm.read_only_udm.additional.fields" => "division_container_id_label"
        }
        on_error => "no_division_container_id_label"
      }
    }
  }
  if [division_container_name] != "" {
    mutate {
      replace => {
        "division_container_name_label.key" => "Division/Container Name"
        "division_container_name_label.value.string_value" => "%{division_container_name}"
      }
      on_error => "no_division_container_name"
    }
    if ![no_division_container_name] {
      mutate {
        merge => {
          "event.idm.read_only_udm.additional.fields" => "division_container_name_label"
        }
        on_error => "no_division_container_name_label"
      }
    }
  }
  if [domain_name] != "" {
    mutate {
      replace => {
        "principal.hostname" => "%{domain_name}"
        "principal.asset.hostname" => "%{domain_name}"
      }
      on_error => "no_domain_name"
    }
    if ![no_domain_name] {
      mutate {
        replace => {
          "has_principal" => "true"
        }
      }
    }
  }
  if [domain_id] != "" {
    mutate {
      replace => {
        "domain_id_label.key" => "Domain ID"
        "domain_id_label.value.string_value" => "%{domain_id}"
      }
      on_error => "no_domain_id"
    }
    if ![no_domain_id] {
      mutate {
        merge => {
          "event.idm.read_only_udm.additional.fields" => "domain_id_label"
        }
        on_error => "no_domain_id_label"
      }
    }
  }
  if [ip_address] != "" {
    mutate {
      merge => {
        "principal.ip" => "ip_address"
        "principal.asset.ip" => "ip_address"
      }
      on_error => "no_ip_address"
    }
    if ![no_ip_address] {
      mutate {
        replace => {
          "has_principal" => "true"
        }
        on_error => "no_has_principal"
      }
    }
  }
  if [ip_country] != "" {
    mutate {
      replace => {
        "principal.location.country_or_region" => "%{ip_country}"
      }
      on_error => "no_ip_country"
    }
  }
  if [Message] != "" {
    mutate {
      replace => {
        "security_result.summary" => "%{Message}"
      }
      on_error => "no_message"
    }
  }
  if [order_id] != "" {
    mutate {
      replace => {
        "order_id_label.key" => "Order ID"
        "order_id_label.value.string_value" => "%{order_id}"
      }
      on_error => "no_order_id"
    }
    if ![no_order_id] {
      mutate {
        merge => {
          "event.idm.read_only_udm.additional.fields" => "order_id_label"
        }
        on_error => "no_order_id_label"
      }
    }
  }
  if [order_request_id] != "" {
    mutate {
      replace => {
        "order_request_id_label.key" => "Order request ID"
        "order_request_id_label.value.string_value" => "%{order_request_id}"
      }
      on_error => "no_order_request_id"
    }
    if ![no_order_request_id] {
      mutate {
        merge => {
          "event.idm.read_only_udm.additional.fields" => "order_request_id_label"
        }
        on_error => "no_order_request_id_label"
      }
    }
  }
  if [organization_id] != "" {
    mutate {
      replace => {
        "organization_id_label.key" => "Organization ID"
        "organization_id_label.value.string_value" => "%{organization_id}"
      }
      on_error => "no_organization_id"
    }
    if ![no_organization_id] {
      mutate {
        merge => {
          "event.idm.read_only_udm.additional.fields" => "organization_id_label"
        }
        on_error => "no_organization_id_label"
      }
    }
  }
  if [organization_name] != "" {
    mutate {
      replace => {
        "organization_name_label.key" => "Organization name"
        "organization_name_label.value.string_value" => "%{organization_name}"
      }
      on_error => "no_organization_name"
    }
    if ![no_organization_name] {
      mutate {
        merge => {
          "event.idm.read_only_udm.additional.fields" => "organization_name_label"
        }
        on_error => "no_organization_name_label"
      }
    }
  }
  if [primary_organization_name] != "" {
    mutate {
      replace => {
        "principal.user.company_name" => "%{primary_organization_name}"
      }
      on_error => "no_primary_organization_name"
    }
  }
  if [revocation_comments] != "" {
    mutate {
      replace => {
        "revocation_comments_label.key" => "Revocation comments"
        "revocation_comments_label.value.string_value" => "%{revocation_comments}"
      }
      on_error => "no_revocation_comments"
    }
    if ![no_revocation_comments] {
      mutate {
        merge => {
          "event.idm.read_only_udm.additional.fields" => "revocation_comments_label"
        }
        on_error => "no_revocation_comments_label"
      }
    }
  }
  if [voucher_code_id] != "" {
    mutate {
      replace => {
        "voucher_code_id_label.key" => "Voucher code ID"
        "voucher_code_id_label.value.string_value" => "%{voucher_code_id}"
      }
      on_error => "no_voucher_code_id"
    }
    if ![no_voucher_code_id] {
      mutate {
        merge => {
          "event.idm.read_only_udm.additional.fields" => "voucher_code_id_label"
        }
        on_error => "no_voucher_code_id_label"
      }
    }
  }
  if [voucher_order_id] != "" {
    mutate {
      replace => {
        "voucher_order_id_label.key" => "Voucher order ID"
        "voucher_order_id_label.value.string_value" => "%{voucher_order_id}"
      }
      on_error => "no_voucher_order_id"
    }
    if ![no_voucher_order_id] {
      mutate {
        merge => {
          "event.idm.read_only_udm.additional.fields" => "voucher_order_id_label"
        }
        on_error => "no_voucher_order_id_label"
      }
    }
  }
  if [date_time] != "" {
    date {
      match => ["date_time", "dd-MM-yyyy HH:mm:ss"]
      on_error => "no_date_time"
    }
  }
  if [data][order_id] != "" {
    mutate {
      convert => {
        "data.order_id" => "string"
      }
      on_error => "no_data_order_id_convert"
    }
    mutate {
      replace => {
        "data_order_id_label.key" => "Order ID"
        "data_order_id_label.value.string_value" => "%{data.order_id}"
      }
      on_error => "no_data_order_id"
    }
    if ![no_data_order_id] {
      mutate {
        merge => {
          "event.idm.read_only_udm.additional.fields" => "data_order_id_label"
        }
        on_error => "no_data_order_id_label"
      }
    }
  }
  if [data][certificate_id] != "" {
    mutate {
      convert => {
        "data.certificate_id" => "string"
      }
      on_error => "no_data_certificate_id_convert"
    }
    mutate {
      replace => {
        "data_certificate_id_label.key" => "Certificate ID"
        "data_certificate_id_label.value.string_value" => "%{data.certificate_id}"
      }
      on_error => "no_data_certificate_id"
    }
    if ![no_data_certificate_id] {
      mutate {
        merge => {
          "event.idm.read_only_udm.additional.fields" => "data_certificate_id_label"
        }
        on_error => "no_data_certificate_id_label"
      }
    }
  }
  if [event_] != "" {
    mutate {
      replace => {
        "event.idm.read_only_udm.metadata.product_event_type" => "%{event_}"
      }
      on_error => "no_event"
    }
  }
  if [principal] != "" {
    mutate {
      rename => {
        "principal" => "event.idm.read_only_udm.principal"
      }
    }
  }
  if [src] != "" {
    mutate {
      rename => {
        "src" => "event.idm.read_only_udm.src"
      }
    }
  }
  if [intermediary] != "" {
    mutate {
      merge => {
        "event.idm.read_only_udm.intermediary" => "intermediary"
      }
    }
  }
  if [security_result] != "" {
    mutate {
      merge => {
        "event.idm.read_only_udm.security_result" => "security_result"
    }
    on_error => "security_result_invalid"
    }
  }
  if [has_user] == "true" {
    mutate {
      replace => {
        "event.idm.read_only_udm.metadata.event_type" => "USER_UNCATEGORIZED"
      }
    }
  }
  else if [has_principal] == "true" {
    mutate {
      replace => {
        "event.idm.read_only_udm.metadata.event_type" => "STATUS_UPDATE"
      }
    }
  }
  else {
    mutate {
      replace => {
        "event.idm.read_only_udm.metadata.event_type" => "GENERIC_EVENT"
      }
    }
  }
  mutate {
    replace => {
      "event.idm.read_only_udm.metadata.product_name" => "Digicert"
      "event.idm.read_only_udm.metadata.vendor_name" => "Digicert"
    }
  }
  mutate {
    merge => {
      "@output" => "event"
    }
  }
}
