# Product: PROOFPOINT_SENDMAIL_SENTRION
# Category: Email server
# Supported Format: SYSLOG
# Reference: N/A
# Last Updated: 2024-06-05
# Copyright 2024 Chronicle LLC

filter {
  mutate {
    replace => {
      # fields
      "ts" => ""
      "host" => ""
      "processor" => ""
      "job_name" => ""
      "ip" => ""
      "port" => ""
      "mtaqid" => ""
      "severity" => ""
      "product_event_type" => ""
      "action" => ""
      "action_result" => ""
      "app" => ""
      "pid" => ""
      "kv_data" => ""
      "msgid" => ""
      "from" => ""
      "to" => ""
      "size" => ""
      "relay" => ""
      "categorization" => ""
      "disposition" => ""
      "cat_details" => ""
      "delay" => ""
      "xdelay" => ""
      "mailer" => ""
      "pri" => ""
      "dsn" => ""
      "stat" => ""
      "class" => ""
      "nrcpts" => ""
      "daemon" => ""
      "tls_verify" => ""
      "auth" => ""
      "relay_domain" => ""
      "relay_ip" => ""
      "ruleset" => ""
      "reject" => ""
      "reject_msg" => ""
      "STARTTLS" => ""
      "version" => ""
      "verify" => ""
      "cipher" => ""
      "bits" => ""
      "app_proto" => ""
      "nw_direction" => ""
      "description" => ""
      "TTY" => ""
      "PWD" => ""
      "USER" => ""
      "COMMAND" => ""
      "user" => ""
      "event_data" => ""
      "details" => ""
      "status" => ""
      "cluster" => ""
      "subject" => ""
      # event type specific
      "event_type" => ""
      "principal_machine_id_present" => "false"
      "from_mail_present" => "false"
      "to_mail_present" => "false"
      # udm noun
      "metadata" => ""
      "principal" => ""
      "target" => ""
      "network" => ""
      "additional" => ""
      "security_result" => ""
    }
  }

  mutate {
    gsub => ["message", "(<)([0-9]+)(>)", ""]
  }
  mutate {
    gsub => ["message", "event", "event_data"]
  }

  # Grok pattern to process syslog message
  grok {
    match => {
      "message" => [
        "%{SYSLOGTIMESTAMP:ts} %{HOSTNAME:host} %{DATA}: \\[%{DATA:processor} - %{DATA:job_name} - %{IP:ip}:%{INT:port}-%{DATA:mtaqid}\\] %{DATA:severity} %{DATA:product_event_type} - %{DATA:action}: %{DATA:action_result}:  %{EMAILADDRESS:to}",
        "%{SYSLOGTIMESTAMP:ts} %{HOSTNAME:host} %{DATA}: \\[%{DATA:processor} - %{DATA:job_name} - %{IP:ip}:%{INT:port}-%{DATA:mtaqid}\\] %{DATA:severity} %{DATA:product_event_type} - %{GREEDYDATA:kv_data}",
        "%{SYSLOGTIMESTAMP:ts} %{HOSTNAME:host} %{DATA:app}\\[%{DATA:pid}\\]: %{DATA:mtaqid}: %{GREEDYDATA:kv_data}",
        "%{SYSLOGTIMESTAMP:ts} %{HOSTNAME:host} %{DATA:app}\\[%{DATA:pid}\\]: %{GREEDYDATA:kv_data}",
        "%{SYSLOGTIMESTAMP:ts} %{HOSTNAME:host} %{DATA}: \\[%{DATA:app_proto} %{DATA:nw_direction} %{IP:ip} port %{INT:port} %{DATA}\\] %{DATA:severity}  %{DATA:description} - %{DATA:mtaqid}: %{GREEDYDATA:kv_data}",
        "%{SYSLOGTIMESTAMP:ts} %{HOSTNAME:host} %{DATA}: \\[%{DATA:app_proto} %{DATA:nw_direction} %{IP:ip} port %{INT:port} %{DATA}\\] %{DATA:severity}  %{DATA:description} - %{GREEDYDATA:action_result}",
        "%{SYSLOGTIMESTAMP:ts} %{HOSTNAME:host} %{DATA}: \\[%{DATA:processor} - %{IP:ip}:%{INT:port}-%{DATA:mtaqid}\\] %{DATA:severity}  %{DATA:product_event_type} - %{GREEDYDATA:description}",
        "%{SYSLOGTIMESTAMP:ts} %{HOSTNAME:host} %{DATA}:  %{DATA} : %{GREEDYDATA:kv_data}",
        "%{SYSLOGTIMESTAMP:ts} %{HOSTNAME:host} %{DATA:severity} \\[%{DATA:product_event_type}\\] %{DATA}-%{DATA:pid} %{DATA:description} - %{DATA} %{GREEDYDATA:kv_data}",
        "%{SYSLOGTIMESTAMP:ts} %{HOSTNAME:host} %{DATA} \\[%{DATA:product_event_type}\\] %{DATA:severity}  %{GREEDYDATA:description}",
        "%{SYSLOGTIMESTAMP:ts} %{HOSTNAME:host} %{DATA} \\[%{DATA:product_event_type}\\] %{DATA:severity} %{GREEDYDATA:description}",
        "%{SYSLOGTIMESTAMP:ts}\\s+%{HOSTNAME:host}\\s+%{DATA}:\\s+%{DATA:app}\\(%{GREEDYDATA:product_event_type}\\):\\s+%{GREEDYDATA:description}",
        "%{SYSLOGTIMESTAMP:ts}\\s+%{HOSTNAME:host}\\s+%{DATA:product_event_type}:\\s+%{DATA:action_details}:\\s+%{GREEDYDATA:description}"
      ]
    }
    overwrite => ["ts", "host", "processor", "job_name", "ip", "port", "mtaqid", "severity", "product_event_type", "action", "action_result", "to", "app", "pid", "app_proto", "nw_direction", "description", "kv_data"]
    on_error  => "header_grok_match_failed"
  }

  if [header_grok_match_failed] {
    drop {
      tag => "TAG_MALFORMED_MESSAGE"
    }
  }

  if [ts] != "" {
    date {
      match => ["ts", "ISO8601", "MMM  d HH:mm:ss"]
      rebase => true
      on_error => "date_match_failed"
    }
  }

  if [kv_data] != "" {
    mutate {
      gsub => ["kv_data", ", ", "#"]
    }
    mutate {
      gsub => ["kv_data", " ; ", "#"]
    }
    kv {
      source => "kv_data"
      field_split => "#"
      value_split => "="
      on_error => "kv_data_invalid"
    }
  }

  if [kv_data] =~ "(?i)(Subject)" {
    grok {
      match => {
        "kv_data" => [
          "%{GREEDYDATA}(Subject|subject):\\s+%{GREEDYDATA:subject}"
        ]
      }
      overwrite => ["subject"]
      on_error => "subject_grok_match_failed"
    }
  }

  if [subject] != "" {
    mutate {
      replace => {
        "subject_label.key" => "subject"
        "subject_label.value" => "%{subject}"
      }
      on_error => "subject_invalid"
    }
    if ![subject_invalid] {
      mutate {
        merge => {
          "security_result.detection_fields" => "subject_label"
        }
        on_error => "subject_label_merge_failed"
      }
    }

    # requirement has been there to map this field on the top of above
    mutate {
      merge => {
        "network.email.subject" => "subject"
      }
      on_error => "subject_invalid_2"
    }
  }

  if [reject] != "" {
    grok {
      match => {
        "reject" => [
          "%{DATA} %{DATA} %{DATA:to}\\.\\.\\. %{DATA:reject_msg} \\[%{IP:relay_ip}\\]"
        ]
      }
      overwrite => ["to", "reject_msg", "relay_ip"]
      on_error => "reject_grok_match_failed"
    }
  }

  if [host] != "" {
    mutate {
      replace => {
        "principal.hostname" => "%{host}"
        "principal.asset.hostname" => "%{host}"
        "principal_machine_id_present" => "true"
      }
      on_error => "host_invalid"
    }
  }

  if [processor] != "" {
    mutate {
      replace => {
        "processor_label.key" => "processor"
        "processor_label.value" => "%{processor}"
      }
      on_error => "processor_invalid"
    }
    if ![processor_invalid] {
      mutate {
        merge => {
          "principal.resource.attribute.labels" => "processor_label"
        }
        on_error => "processor_label_merge_failed"
      }
    }
  }

  if [job_name] != "" {
    mutate {
      replace => {
        "job_name_label.key" => "job_name"
        "job_name_label.value" => "%{job_name}"
      }
      on_error => "job_name_invalid"
    }
    if ![job_name_invalid] {
      mutate {
        merge => {
          "principal.resource.attribute.labels" => "job_name_label"
        }
        on_error => "job_name_label_merge_failed"
      }
    }
  }

  if [ip] != "" {
    mutate {
      merge => {
        "principal.ip" => "ip"
        "principal.asset.ip" => "ip"
      }
      on_error => "ip_not_valid"
    }
    if ![ip_not_valid] {
      mutate {
        replace => {
          "principal_machine_id_present" => "true"
        }
      }
    }
  }

  if [port] != "" {
    mutate {
      rename => {
        "port" => "principal.port"
      }
    }
    mutate {
      convert => {
        "principal.port" => "integer"
      }
      on_error => "principal_port_conversion_failed"
    }
  }

  if [mtaqid] != "" {
    mutate {
      replace => {
        "principal.resource.product_object_id" => "%{mtaqid}"
      }
      on_error => "mtaqid_invalid"
    }
  }

  if [severity] =~ "(?i)info" {
    mutate {
      replace => {
        "security_result.severity" => "INFORMATIONAL"
      }
      on_error => "severity_invalid"
    }
  }

  mutate {
    gsub => ["msgid", "<|>", ""]
  }
  if [msgid] != "" {
    mutate {
      replace => {
        "network.email.mail_id" => "%{msgid}"
      }
      on_error => "msgid_invalid"
    }
  }

  mutate {
    gsub => ["from", "<|>", ""]
  }
  if [from] != "" {
    grok {
      match => {
        "from" => "%{EMAILADDRESS:valid_from}"
      }
      on_error => "from_not_valid_email"
    }
    if ![from_not_valid_email] {
      mutate {
        replace => {
          "network.email.from" => "%{valid_from}"
          "from_mail_present" => "true"
        }
        on_error => "valid_from_invalid"
      }
    }
    else  {
      mutate {
        replace => {
          "app" => "%{app} %{from}"
        }
        on_error => "from_invalid"
      }
    }
  }

  if [to] != "" {
    mutate {
      gsub => ["to", "<|>", ""]
    }
    # convert to array
    mutate {
      replace => {
        "to" => "{\"to\":[\"%{to}\"]}"
      }
      on_error => "to_not_found"
    }
    mutate {
      gsub => ["to", ",", "\",\""]
    }
    json {
      source => "to"
      array_function => "split_columns"
      on_error => "to_split_failed"
    }

    # loop over array
    for index, emailTo in to {
      mutate {
        replace => {
          "valid_to" => ""
        }
      }
      if [emailTo] != "" {
        grok {
          match => {
            "emailTo" => "%{EMAILADDRESS:valid_to}"
          }
          overwrite => ["valid_to"]
          on_error => "valid_to_invalid"
        }
        if ![valid_to_invalid] {
          mutate {
            merge => {
              "network.email.to" => "valid_to"
            }
            on_error => "valid_to_merge_failed"
          }
          if ![valid_to_merge_failed] {
            mutate {
              replace => {
                "to_mail_present" => "true"
              }
            }
          }
        }
      }
    }
  }

  if [size] != "" {
    mutate {
      replace => {
        "network.sent_bytes" => "%{size}"
      }
      on_error => "size_invalid"
    }
    mutate {
      convert => {
        "network.sent_bytes" => "uinteger"
      }
      on_error => "size_conversion_failed"
    }
  }

  if [relay] != "" {
    grok {
      match => {
        "relay" => [
          "%{HOSTNAME:relay_domain} \\[%{IP:relay_ip}\\]",
          "%{HOSTNAME:relay_domain}",
          "%{IP:relay_ip}"
        ]
      }
      overwrite => ["relay_domain", "relay_ip"]
      on_error => "relay_grok_match_failed"
    }
  }

  if [relay_domain] != "" {
    mutate {
      replace => {
        "intermediary.hostname" => "%{relay_domain}"
      }
      on_error => "relay_domain_invalid"
    }
  }
  if [relay_ip] != "" {
    mutate {
      merge => {
        "intermediary.ip" => "relay_ip"
      }
      on_error => "relay_ip_merge_failed"
    }
  }
  if [relay_ip] != "" or [relay_domain] != "" {
    mutate {
      merge => {
        "event.idm.read_only_udm.intermediary" => "intermediary"
      }
      on_error => "intermediary_merge_failed"
    }
  }

  if [categorization] != "" {
    mutate {
      replace => {
        "cat_details" => "%{categorization}"
      }
      on_error => "categorization_invalid"
    }
    if [cat_details] != "" {
      mutate {
        merge => {
          "security_result.category_details" => "cat_details"
        }
        on_error => "cat_details_merge_failed"
      }
    }
  }

  if [disposition] != "" {
    mutate {
      replace => {
        "disposition_label.key" => "disposition"
        "disposition_label.value" => "%{disposition}"
      }
      on_error => "disposition_invalid"
    }
    if ![disposition_invalid] {
      mutate {
        merge => {
          "security_result.detection_fields" => "disposition_label"
        }
        on_error => "disposition_label_merge_failed"
      }
    }
  }

  if [action] != "" {
    mutate {
      replace => {
        "security_result.action_details" => "%{action}"
      }
      on_error => "action_invalid"
    }
  }

  if [app] != "" {
    mutate {
      replace => {
        "principal.application" => "%{app}"
      }
      on_error => "app_invalid"
    }
  }

  if [pid] != "" {
    mutate {
      replace => {
        "principal.process.pid" => "%{pid}"
      }
      on_error => "pid_invalid"
    }
  }

  if [delay] != "" {
    mutate {
      replace => {
        "delay_label.key" => "delay"
        "delay_label.value" => "%{delay}"
      }
      on_error => "delay_invalid"
    }
    if ![delay_invalid] {
      mutate {
        merge => {
          "security_result.detection_fields" => "delay_label"
        }
        on_error => "delay_label_merge_failed"
      }
    }
  }

  if [xdelay] != "" {
    mutate {
      replace => {
        "xdelay_label.key" => "xdelay"
        "xdelay_label.value" => "%{xdelay}"
      }
      on_error => "xdelay_invalid"
    }
    if ![xdelay_invalid] {
      mutate {
        merge => {
          "security_result.detection_fields" => "xdelay_label"
        }
        on_error => "xdelay_label_merge_failed"
      }
    }
  }

  if [pri] != "" {
    mutate {
      replace => {
        "pri_label.key" => "priority"
        "pri_label.value" => "%{pri}"
      }
      on_error => "pri_invalid"
    }
    if ![pri_invalid] {
      mutate {
        merge => {
          "security_result.detection_fields" => "pri_label"
        }
        on_error => "pri_label_merge_failed"
      }
    }
  }

  if [mailer] != "" {
    mutate {
      replace => {
        "mailer_label.key" => "mailer"
        "mailer_label.value" => "%{mailer}"
      }
      on_error => "mailer_invalid"
    }
    if ![mailer_invalid] {
      mutate {
        merge => {
          "security_result.detection_fields" => "mailer_label"
        }
        on_error => "mailer_label_merge_failed"
      }
    }
  }

  if [dsn] != "" {
    mutate {
      replace => {
        "dsn_label.key" => "dsn"
        "dsn_label.value" => "%{dsn}"
      }
      on_error => "dsn_invalid"
    }
    if ![dsn_invalid] {
      mutate {
        merge => {
          "security_result.detection_fields" => "dsn_label"
        }
        on_error => "dsn_label_merge_failed"
      }
    }
  }

  if [class] != "" {
    mutate {
      replace => {
        "class_label.key" => "class"
        "class_label.value" => "%{class}"
      }
      on_error => "class_invalid"
    }
    if ![class_invalid] {
      mutate {
        merge => {
          "security_result.detection_fields" => "class_label"
        }
        on_error => "class_label_merge_failed"
      }
    }
  }

  if [nrcpts] != "" {
    mutate {
      replace => {
        "nrcpts_label.key" => "nrcpts"
        "nrcpts_label.value" => "%{nrcpts}"
      }
      on_error => "nrcpts_invalid"
    }
    if ![nrcpts_invalid] {
      mutate {
        merge => {
          "security_result.detection_fields" => "nrcpts_label"
        }
        on_error => "nrcpts_label_merge_failed"
      }
    }
  }

  if [daemon] != "" {
    mutate {
      replace => {
        "daemon_label.key" => "daemon"
        "daemon_label.value" => "%{daemon}"
      }
      on_error => "daemon_invalid"
    }
    if ![daemon_invalid] {
      mutate {
        merge => {
          "security_result.detection_fields" => "daemon_label"
        }
        on_error => "daemon_label_merge_failed"
      }
    }
  }

  if [auth] != "" {
    mutate {
      replace => {
        "auth_label.key" => "auth"
        "auth_label.value" => "%{auth}"
      }
      on_error => "auth_invalid"
    }
    if ![auth_invalid] {
      mutate {
        merge => {
          "security_result.detection_fields" => "auth_label"
        }
        on_error => "auth_label_merge_failed"
      }
    }
  }

  if [tls_verify] == "" and [verify] != "" {
    mutate {
      replace => {
        "tls_verify" => "%{verify}"
      }
      on_error => "verify_not_found"
    }
  }
  if [tls_verify] != "" {
    mutate {
      replace => {
        "security_result.description" => "tls_verify - %{tls_verify}"
        "sec_action" => ""
      }
      on_error => "tls_verify_invalid"
    }

    if [tls_verify] =~ "(?i)FAIL|fail" {
      mutate {
        replace => {
          "sec_action" => "BLOCK"
        }
      }
    }
    else if [tls_verify] =~ "(?i)OK|ok" {
      mutate {
        replace => {
          "sec_action" => "ALLOW"
        }
      }
    }

    if [sec_action] != "" {
      mutate {
        merge => {
          "security_result.action" => "sec_action"
        }
        on_error => "sec_action_merge_failed"
      }
    }
  }

  if [action_result] != "" {
    mutate {
      replace => {
        "security_result.summary" => "%{action_result}"
      }
      on_error => "action_result_invalid"
    }
  }
  else if [stat] != "" {
    mutate {
      replace => {
        "security_result.summary" => "%{stat}"
      }
      on_error => "stat_invalid"
    }
  }
  else if [reject_msg] != "" {
    mutate {
      replace => {
        "security_result.summary" => "%{reject_msg}"
      }
      on_error => "reject_msg_invalid"
    }
  }
  else if [status] != "" {
    mutate {
      replace => {
        "security_result.summary" => "%{status}"
      }
      on_error => "status_invalid"
    }
  }

  if [ruleset] != "" {
    mutate {
      replace => {
        "security_result.rule_name" => "%{ruleset}"
      }
      on_error => "ruleset_invalid"
    }
  }

  if [version] != "" {
    mutate {
      replace => {
        "network.tls.version" => "%{version}"
      }
      on_error => "version_invalid"
    }
  }

  if [cipher] != "" {
    mutate {
      replace => {
        "network.tls.cipher" => "%{cipher}"
      }
      on_error => "cipher_invalid"
    }
  }

  if [STARTTLS] != "" {
    mutate {
      replace => {
        "starttls_label.key" => "STARTTLS"
        "starttls_label.value" => "%{STARTTLS}"
      }
      on_error => "starttls_invalid"
    }
    if ![starttls_invalid] {
      mutate {
        merge => {
          "security_result.detection_fields" => "starttls_label"
        }
        on_error => "starttls_label_merge_failed"
      }
    }
  }

  if [bits] != "" {
    mutate {
      replace => {
        "bits_label.key" => "bits"
        "bits_label.value" => "%{bits}"
      }
      on_error => "bits_label_invalid"
    }
    if ![bits_label_invalid] {
      mutate {
        merge => {
          "security_result.detection_fields" => "bits_label"
        }
        on_error => "bits_label_label_merge_failed"
      }
    }
  }

  if [app_proto] != "" {
    mutate {
      replace => {
        "network.application_protocol" => "%{app_proto}"
      }
      on_error => "app_proto_invalid"
    }
  }

  if [nw_direction] =~ "(?i)Outbound" {
    mutate {
      replace => {
        "network.direction" => "OUTBOUND"
      }
      on_error => "nw_direction_invalid"
    }
  }

  if [description] != "" {
    mutate {
      replace => {
        "security_result.description" => "%{description}"
      }
      on_error => "description_invalid"
    }
  }

  if [TTY] != "" {
    mutate {
      replace => {
        "tty_label.key" => "tty"
        "tty_label.value.string_value" => "%{TTY}"
      }
      on_error => "tty_invalid"
    }
    if ![tty_invalid] {
      mutate {
        merge => {
          "additional.fields" => "tty_label"
        }
        on_error => "tty_label_merge_failed"
      }
    }
  }

  if [PWD] != "" {
    mutate {
      replace => {
        "pwd_label.key" => "PWD"
        "pwd_label.value.string_value" => "%{PWD}"
      }
      on_error => "pwd_invalid"
    }
    if ![pwd_invalid] {
      mutate {
        merge => {
          "additional.fields" => "pwd_label"
        }
        on_error => "pwd_label_merge_failed"
      }
    }
  }

  if [USER] == "" and [user] != "" {
    mutate {
      replace => {
        "USER" => "%{user}"
      }
      on_error => "user_not_found"
    }
  }
  if [USER] != "" {
    mutate {
      replace => {
        "principal.user.userid" => "%{USER}"
      }
      on_error => "user_invalid"
    }
  }

  if [COMMAND] != "" {
    mutate {
      replace => {
        "principal.process.command_line" => "%{COMMAND}"
      }
      on_error => "command_invalid"
    }
  }

  if [event_data] != "" {
    mutate {
      replace => {
        "product_event_type" => "%{product_event_type} %{event_data}"
      }
      on_error => "event_data_invalid"
    }
  }

  if [details] != "" {
    mutate {
      replace => {
        "metadata.description" => "%{details}"
      }
      on_error => "details_invalid"
    }
  }

  if [cluster] != "" {
    mutate {
      replace => {
        "cluster_label.key" => "cluster"
        "cluster_label.value" => "%{cluster}"
      }
      on_error => "cluster_invalid"
    }
    if ![cluster_invalid] {
      mutate {
        merge => {
          "principal.resource.attribute.labels" => "cluster_label"
        }
        on_error => "cluster_label_merge_failed"
      }
    }
  }

  # metadata info
  mutate {
    replace => {
      "metadata.vendor_name" => "PROOFPOINT_SENDMAIL_SENTRION"
      "metadata.product_name" => "Proofpoint Sendmail Sentrion"
    }
  }
  if [product_event_type] != "" {
    mutate {
      replace => {
        "metadata.product_event_type" => "%{product_event_type}"
      }
      on_error => "log_type_invalid"
    }
  }

  if [event_type] == "" {
    if [from_mail_present] == "true" or [to_mail_present] == "true" {
      mutate {
        replace => {
          "event_type" => "EMAIL_TRANSACTION"
        }
      }
    }
    else if [principal_machine_id_present] == "true" {
      mutate {
        replace => {
          "event_type" => "STATUS_UPDATE"
        }
      }
    }
    else {
      mutate {
        replace => {
          "event_type" => "GENERIC_EVENT"
        }
      }
    }
  }

  if [event_type] != "" {
    mutate {
      replace => {
        "metadata.event_type" => "%{event_type}"
      }
      on_error => "event_type_value_invalid"
    }
  }

  # merge the data into udm nouns.
  if [metadata] != "" {
    mutate {
      rename => {
        "metadata" => "event.idm.read_only_udm.metadata"
      }
    }
  }
  if [principal] != "" {
    mutate {
      rename => {
        "principal" => "event.idm.read_only_udm.principal"
      }
    }
  }
  if [target] != "" {
    mutate {
      rename => {
        "target" => "event.idm.read_only_udm.target"
      }
    }
  }
  if [network] != "" {
    mutate {
      rename => {
        "network" => "event.idm.read_only_udm.network"
      }
    }
  }
  if [additional] != "" {
    mutate {
      rename => {
        "additional" => "event.idm.read_only_udm.additional"
      }
    }
  }
  if [security_result] != "" {
    mutate {
      merge => {
        "event.idm.read_only_udm.security_result" => "security_result"
      }
      on_error => "security_result_empty"
    }
  }

  mutate {
    merge => {
      "@output" => "event"
    }
  }
}
