# Product: ONAPSIS
# Category:SAP
# Supported Format: JSON , SYSLOG , KV
# Reference:https://exchange.xforce.ibmcloud.com/api/hub/extensionsNew/cb73c102ddfe178e7e79e5ed9e99d4f9/Onapsis_Security_Platform_QRadar_Integration_Guide.pdf
# Last Updated:2025-11-25
# Copyright 2023 Chronicle LLC

filter {
  mutate {
    replace => {
      "principal" => ""
      "target" => ""
      "network" => ""
      "metadata" => ""
      "security_result" => ""
      "incident_type" => ""
      "alarm_profile_matches" => ""
      "anamoly_score" => ""
      "asset_name" => ""
      "client" => ""
      "confidence" => ""
      "created_at" => ""
      "destination_port" => ""
      "detected_compilance" => ""
      "dst" => ""
      "erp_event_source" => ""
      "erp_host" => ""
      "erp_time" => ""
      "event_id" => ""
      "event_type" => ""
      "events" => ""
      "incident_detail" => ""
      "incident_name" => ""
      "logline" => ""
      "matching_rule" => ""
      "modified" => ""
      "module_description" => ""
      "module_category" => ""
      "module_name" => ""
      "protocol" => ""
      "patch_applied" => ""
      "policy" => ""
      "reason" => ""
      "result" => ""
      "sap_sec_notes" => ""
      "severity" => ""
      "sid" => ""
      "source_port" => ""
      "src" => ""
      "success" => ""
      "system_type" => ""
      "terminal_source" => ""
      "username" => ""
      "user_type" => ""
      "vulnerability_cvss" => ""
      "program_name" => ""
      "downloaded_table" => ""
      "column_bname" => ""
      "column_profile" => ""
      "job_type" => ""
      "job_name" => ""
      "job_id" => ""
      "fqdn" => ""
      "osp_link" => ""
      "task_id" => ""
      "modules" => ""
      "module" => ""
      "host" => ""
      "application" => ""
      "log_data" => ""
      "severityName" => ""
      "facility" => ""
      "facilityName" => ""
      "source_version" => ""
      "log_message" => ""
      "description" => ""
      "_time" => ""
      "file_name" => ""
      "bucket" => ""
      "sub_path" => ""
      "http_method" => ""
      "url" => ""
      "response_code" => ""
      "response" => ""
      "json_data" => ""
      "task" => ""
      "has_principal" => "false"
      "has_target" => "false"
      "task_sent" => ""
      "user_id" => ""
      "user_name" => ""
      "request_id" => ""
      "db_table" => ""
      "db_table_pk" => ""
      "action" => ""
      "change._exclusions_snapshot.old" => ""
      "change._exclusions_snapshot.new" => ""
      "kv_data" => ""
      "vulnerabilities" => ""
      "id" => ""
      "payload" => ""
      "has_network" => "false"
      "log_line" => ""
      "policy_id" => ""
      "name" => ""
      "authentication_method" => ""
      "task_type" => ""
      "new_state" => ""
      "data" => ""
      "settings" => ""
      "alarm_name" => ""
      "kv_log_data" => ""
      "inter_ip" => ""
      "terminal_source_ip" => ""
      "host_ip" => ""
      "intermediary" => ""
    }
  }

  mutate {
    gsub => ["message","\"message\"","\"log_message\""]
  }

  mutate {
    gsub => ["message","\\\r\\\n",""]
  }

  mutate {
    gsub => ["message","\\n",""]
  }

  mutate {
    gsub => ["message","\\\n",""]
  }

  grok {
    match => {
      "message" => "%{SYSLOGTIMESTAMP} %{IP:inter_ip}\\s+%{GREEDYDATA:message}"
    }
    overwrite => ["message", "inter_ip"]
    on_error => "not_matched"
  }

  json {
    source => "message"
    array_function => "split_columns"
    on_error => "not_json"
  }

  if [not_json] and [message] =~ "msgid" {
    grok {
      match => {
        "message" => [
          "msgid=%{GREEDYDATA:msgid}LEEF:%{GREEDYDATA}assetName=%{WORD:asset_name}\\\t%{GREEDYDATA:kv_log_data}"
        ]
      }
      overwrite => ["msgid","asset_name","kv_log_data"]
      on_error => "not_matched"
    }
  }
  else if [not_json] {
    grok {
      match => {
        "message" => [
          "<%{INT}>%{MONTH}\\s+%{MONTHDAY} %{TIME} %{WORD:host} %{GREEDYDATA:application}: \\[%{GREEDYDATA}\\] %{GREEDYDATA:log_data}",
          "<%{INT}>%{MONTH}\\s+%{MONTHDAY} %{TIME} %{WORD:host} %{GREEDYDATA:application}\\[%{INT}\\]: %{GREEDYDATA},%{INT}: %{WORD:severityName} \\[%{GREEDYDATA}\\] \\[%{GREEDYDATA}\\] %{GREEDYDATA:log_data}",
        ]
      }
      overwrite => ["host","log_data","application","severityName"]
      on_error => "pattern_not_matched"
    }
  }

  if [log_message]!= "" {
    grok {
      match => {
        "log_message" => [
          "%{GREEDYDATA:application}\\[%{INT}\\]: \\[%{GREEDYDATA}\\] %{GREEDYDATA}: \\[%{GREEDYDATA}\\] %{GREEDYDATA:description} source_version=%{GREEDYDATA:source_version}",
          "%{GREEDYDATA:application}: \\[%{GREEDYDATA}\\] %{GREEDYDATA:description} source_version=%{GREEDYDATA:source_version}",
        ]
      }
      overwrite => ["description","application","source_version"]
      on_error => "log_message_pattern_not_matched"
    }
  }

  if [log_data] != "" {
    grok {
      match => {
        "log_data" => [
          "Uploading %{GREEDYDATA:file_name} to bucket: %{GREEDYDATA:bucket} sub_path: %{GREEDYDATA:sub_path} source_version=%{GREEDYDATA:source_version}",
          "Request: %{WORD:http_method} %{GREEDYDATA:url} Response: %{INT:response_code} %{GREEDYDATA:reponse} Message: %{GREEDYDATA:description} source_version=%{GREEDYDATA:source_version}",
          "Connecting to: %{GREEDYDATA:url} source_version=%{GREEDYDATA:source_version}",
          "Celery task sent: %{GREEDYDATA:task_sent} source_version=%{GREEDYDATA:source_version}",
          "User \\\"%{GREEDYDATA:username}\\\" executed \\\"%{GREEDYDATA:task_type}\\\" with arguments \\\"%{GREEDYDATA:json_data}\\\" source_version=%{GREEDYDATA:source_version}",
          "Calling ModuleApi.put, with args %{GREEDYDATA:json_data} source_version=%{GREEDYDATA:source_version}",
          "%{GREEDYDATA:kv_data} source_version=%{GREEDYDATA:source_version}"
        ]
      }
      overwrite => ["description","application","source_version","file_name","bucket","sub_path","http_method","url","response_code","response","description","username","json_data","task_sent","task_type","kv_data"]
      on_error => "data_pattern_not_matched"
    }
  }

  if [json_data] != "" {
    mutate {
      gsub => ["json_data","'",'\"']
    }
    mutate {
      gsub => ["json_data","None","null"]
    }
    mutate {
      gsub => ["json_data","False",'\"False\"']
    }
    mutate {
      gsub => ["json_data","True",'\"True\"']
    }
    mutate {
      gsub => ["json_data","target","target_data"]
    }
    json {
      source => "json_data"
      array_function => "split_columns"
      on_error => "invalid_json_data"
    }
  }

  if [kv_data] != "" {
    kv {
      source => "kv_data"
      field_split => ","
      value_split => "="
      on_error => "invalid_kv_data"
    }
  }

  if [kv_log_data] != "" {
    mutate {
      gsub => ["kv_log_data","\\t"," # "]
    }
    mutate {
      gsub => ["kv_log_data","detectedCompilance","detected_compilance"]
    }
    mutate {
      gsub => ["kv_log_data","jobName","job_name"]
    }
    mutate {
      gsub => ["kv_log_data","moduleName","module_name"]
    }
    mutate {
      gsub => ["kv_log_data","moduleDescription","module_description"]
    }
    mutate {
      gsub => ["kv_log_data","moduleCategory","module_category"]
    }
    mutate {
      gsub => ["kv_log_data","vulnerabilityCvss","vulnerability_cvss"]
    }
    mutate {
      gsub => ["kv_log_data","destinationPort","destination_port"]
    }
    mutate {
      gsub => ["kv_log_data","erpEventSource","erp_event_source"]
    }
    mutate {
      gsub => ["kv_log_data","erpHost","erp_host"]
    }
    mutate {
      gsub => ["kv_log_data","erpTime","erp_time"]
    }
    mutate {
      gsub => ["kv_log_data","eventType","event_type"]
    }
    mutate {
      gsub => ["kv_log_data","incidentDetail","incident_detail"]
    }
    mutate {
      gsub => ["kv_log_data","incidentName","incident_name"]
    }
    mutate {
      gsub => ["kv_log_data","logline","log_line"]
    }
    mutate {
      gsub => ["kv_log_data","matchingRule","matching_rule"]
    }
    mutate {
      gsub => ["kv_log_data","patchApplied","patch_applied"]
    }
    mutate {
      gsub => ["kv_log_data","reason","reason"]
    }
    mutate {
      gsub => ["kv_log_data","sapSecNotes","sap_sec_notes"]
    }
    mutate {
      gsub => ["kv_log_data","sourcePort","source_port"]
    }
    mutate {
      gsub => ["kv_log_data","systemType","system_type"]
    }
    mutate {
      gsub => ["kv_log_data","terminalSource","terminal_source"]
    }
    mutate {
      gsub => ["kv_log_data","usrname","user_name"]
    }
    mutate {
      gsub => ["kv_log_data","userType","user_type"]
    }
    mutate {
      gsub => ["kv_log_data","alarmProfileMatches","alarm_profile_matches"]
    }
    mutate {
      gsub => ["kv_log_data","eventId","event_id"]
    }
    kv {
      source => "kv_log_data"
      field_split => "#"
      value_split => "="
      on_error =>  "invalid_kv"
    }
  }

  if [user_id] != "" {
    mutate {
      replace => {
        "principal.user.userid" => "%{user_id}"
      }
      on_error => "no_user"
    }
  }

  if [user_name] != "" {
    mutate {
      replace => {
        "principal.user.user_display_name" => "%{user_name}"
      }
      on_error => "no_user_name"
    }
  }

  if [file_name] != "" {
    mutate {
      replace => {
        "target.file.full_path" => "%{file_name}"
      }
      on_error => "no_file_name"
    }
  }

  if [url] != "" {
    mutate {
      replace => {
        "network.http.referral_url" => "%{url}"
      }
      on_error => "no_url"
    }
  }

  if [http_method] != "" {
    mutate {
      replace => {
        "network.http.method" => "%{http_method}"
        "has_network" => "true"
      }
      on_error => "no_http_method"
    }
  }

  if [response_code] != "" {
    mutate {
      replace => {
        "network.http.response_code" => "%{response_code}"
        "has_network" => "true"
      }
      convert => {
        "network.http.response_code" => "integer"
      }
      on_error => "no_response_code"
    }
  }

  if [description] != "" {
    mutate {
      replace => {
        "metadata.description" => "%{description}"
      }
      on_error => "no_description"
    }
  }

  if [log_data] =~ "Uploading" {
    mutate {
      replace => {
        "metadata.description" => "Uploading"
      }
    }
  }

  else if [log_data] =~ "Celery task sent" {
    mutate {
      replace => {
        "metadata.description" => "Celery task sent"
      }
    }
  }

  else if [log_data] =~ "Calling ModuleApi.put" {
    mutate {
      replace => {
        "metadata.description" => "Calling ModuleApi.put"
      }
    }
  }

  if [severityName] in ["INFO", "info"] {
    mutate {
      replace => {
        "security_result.severity" => "INFORMATIONAL"
      }
    }
  }

  if [application] != "" {
    mutate {
      replace => {
        "principal.application" => "%{application}"
      }
      on_error => "no_application"
    }
  }

  if [host] != "" {
    grok {
      match => {
        "host" => "%{IP:host_ip}"
      }
      overwrite => ["host_ip"]
      on_error => "invalid_host_ip"
    }
    if ![invalid_host_ip] and [host_ip] != "" {
      mutate {
        merge => {
          "principal.ip" => "host_ip"
          "principal.asset.ip" => "host_ip"
        }
        on_error => "no_host_ip"
      }
      if ![no_host_ip] {
        mutate {
          replace => {
            "has_principal" => "true"
          }
        }
      }
    }
    else {
      mutate {
        replace => {
          "principal.hostname" => "%{host}"
          "principal.asset.hostname" => "%{host}"
          "has_principal" => "true"
        }
        on_error => "no_host"
      }
    }
  }

  if [src] != "" {
    grok {
      match => {
        "src" => "%{IP:src_ip}"
      }
      overwrite => ["src_ip"]
      on_error => "invalid_src_ip"
    }
    if ![invalid_src_ip] and [src_ip] != "" {
      mutate {
        merge => {
          "principal.ip" => "src_ip"
          "principal.asset.ip" => "src_ip"
        }
        on_error => "no_src_ip"
      }
      if ![no_src_ip] {
        mutate {
          replace => {
            "has_principal" => "true"
          }
        }
      }
    }
    else {
      mutate {
        replace => {
          "principal.hostname" => "%{src}"
          "principal.asset.hostname" => "%{src}"
          "has_principal" => "true"
        }
        on_error => "no_src"
      }
    }
  }

  if [dst] not in ["", "__EMPTY__"] {
    mutate {
      replace => {
        "target.hostname" => "%{dst}"
        "has_target" => "true"
      }
      on_error => "no_dst"
    }
  }

  if [bucket] != "" {
    mutate {
      replace => {
        "bucket_label.value.string_value" => "%{bucket}"
      }
      on_error => "no_bucket"
    }
    if ![no_bucket] {
      mutate {
        replace => {
          "bucket_label.key" => "bucket"
        }
        merge => {
          "event.idm.read_only_udm.additional.fields" => "bucket_label"
        }
        on_error => "no_bucket_label"
      }
    }
  }

  if [task_sent] != "" {
    mutate {
      replace => {
        "task_sent_label.value.string_value" => "%{task_sent}"
      }
      on_error => "no_task_sent"
    }
    if ![no_task_sent] {
      mutate {
        replace => {
          "task_sent_label.key" => "task sent"
        }
        merge => {
          "event.idm.read_only_udm.additional.fields" => "task_sent_label"
        }
        on_error => "no_task_sent"
      }
    }
  }

  if [sub_path] != "" {
    mutate {
      replace => {
        "sub_path_label.value.string_value" => "%{sub_path}"
      }
      on_error => "no_sub_path"
    }
    if ![no_sub_path] {
      mutate {
        replace => {
          "sub_path_label.key" => "sub_path"
        }
        merge => {
          "event.idm.read_only_udm.additional.fields" => "sub_path_label"
        }
        on_error => "no_sub_path"
      }
    }
  }

  if [facilityName] != "" {
    mutate {
      replace => {
        "facilty_name_label.value.string_value" => "%{facilityName}"
      }
      on_error => "no_facility_name"
    }
    if ![no_facility_name] {
      mutate {
        replace => {
          "facility_name_label.key" => "facilityName"
        }
        merge => {
          "event.idm.read_only_udm.additional.fields" => "facility_name_label"
        }
        on_error => "no_facility_name_label"
      }
    }
  }

  if [source_version] != "" {
    mutate {
      gsub => ["source_version",'\"','']
    }
    mutate {
      replace => {
        "source_version_label.value.string_value" => "%{source_version}"
      }
      on_error => "no_source_version"
    }
    if ![no_source_version] {
      mutate {
        replace => {
          "source_version_label.key" => "source_version"
        }
        merge => {
          "event.idm.read_only_udm.additional.fields" => "source_version_label"
        }
        on_error => "no_source_version_label"
      }
    }
  }

  if [db_table] != "" {
    mutate {
      replace => {
        "db_table_label.value.string_value" => "%{db_table}"
      }
      on_error => "no_db_table"
    }
    if ![no_db_table] {
      mutate {
        replace => {
          "db_table_label.key" => "db_table"
        }
        merge => {
          "event.idm.read_only_udm.additional.fields" => "db_table_label"
        }
        on_error => "no_db_table_label"
      }
    }
  }

  if [incident_type] != "" {
    mutate {
      replace => {
        "incident_type_label.value.string_value" => "%{incident_type}"
      }
      on_error => "no_incident_type"
    }
    if ![no_incident_type] {
      mutate {
        replace => {
          "incident_type_label.key" => "incident_type"
        }
        merge => {
          "event.idm.read_only_udm.additional.fields" => "incident_type_label"
        }
        on_error => "no_incident_type_label"
      }
    }
  }

  if [incident_name] != "" {
    mutate {
      replace => {
        "incident_name_label.value.string_value" => "%{incident_name}"
      }
      on_error => "no_incident_name"
    }
    if ![no_incident_name] {
      mutate {
        replace => {
          "incident_name_label.key" => "incident_name"
        }
        merge => {
          "event.idm.read_only_udm.additional.fields" => "incident_name_label"
        }
        on_error => "no_incident_name_label"
      }
    }
  }

  if [program_name] != "" {
    mutate {
      replace => {
        "program_name_label.value.string_value" => "%{program_name}"
      }
      on_error => "no_program_name"
    }
    if ![no_program_name] {
      mutate {
        replace => {
          "program_name_label.key" => "program_name"
        }
        merge => {
          "event.idm.read_only_udm.additional.fields" => "program_name_label"
        }
        on_error => "no_program_name_label"
      }
    }
  }

  if [task_type] != "" {
    mutate {
      replace => {
        "executed_task_label.value.string_value" => "%{task_type}"
        "executed_task_label.key" => "task executed by user"
      }
      on_error => "no_executed_task"
    }
    if ![no_executed_task] {
      mutate {
        merge => {
          "event.idm.read_only_udm.additional.fields" => "executed_task_label"
        }
        on_error => "no_task_type_label"
      }
    }
  }

  if [policy_id] != "" {
    mutate {
      convert => {
        "policy_id" => "string"
      }
    }
    mutate {
      replace => {
        "policy_id_label.value.string_value" => "%{policy_id}"
        "policy_id_label.key" => "policy_id"
      }
      on_error => "no_policy_id"
    }
    if ![no_policy_id] {
      mutate {
        merge => {
          "event.idm.read_only_udm.additional.fields" => "policy_id_label"
        }
        on_error => "no_policy_id_label"
      }
    }
  }

  if [name] != "" {
    mutate {
      replace => {
        "policy_name_label.value.string_value" => "%{name}"
        "policy_name_label.key" => "policy_name"
      }
      on_error => "no_policy_name"
    }
    if ![no_policy_name] {
      mutate {
        merge => {
          "event.idm.read_only_udm.additional.fields" => "policy_name_label"
        }
        on_error => "no_policy_name_label"
      }
    }
  }

  if [authentication_method] != "" {
    mutate {
      replace => {
        "authentication_method_label.value.string_value" => "%{authentication_method}"
        "authentication_method_label.key" => "authentication_method"
      }
      on_error => "no_authentication_method"
    }
    if ![no_authentication_method] {
      mutate {
        merge => {
          "event.idm.read_only_udm.additional.fields" => "authentication_method_label"
        }
        on_error => "no_authentication_method_label"
      }
    }
  }

  for profile in alarm_profile_matches {
    for alarm_key, alarm_value in profile map {
      mutate {
        replace => {
          "alarm_label" => ""
        }
      }
      if [alarm_key] == "profile_id" {
        mutate {
          convert => {
            "alarm_value" => "string"
          }
          on_error => "invalid_conversion"
        }
      }
      mutate {
        replace => {
          "alarm_label.value.string_value" => "%{alarm_value}"
          "alarm_label.key" => "%{alarm_key}"
        }
        on_error => "no_alarm_label"
      }
      if ![no_alarm_label] {
        mutate {
          merge => {
            "event.idm.read_only_udm.additional.fields" => "alarm_label"
          }
          on_error => "no_alarm_label"
        }
      }

    }
    for index, condition in profile.conditions {
      mutate {
        convert => {
          "index" => "string"
        }
        on_error => "invalid_conversion_index"
      }
      mutate {
        replace => {
          "condition_id_label" => ""
          "eval_value_success_label" => ""
          "matched_label" => ""
        }
      }
      mutate {
        convert => {
          "condition.condition_id" => "string"
        }
        on_error => "invalid_conversion_condition_id"
      }
      mutate {
        replace => {
          "condition_id_label.value.string_value" => "%{condition.condition_id}"
          "condition_id_label.key" => "condition_id_%{index}"
        }
        on_error => "no_condition_id"
      }
      if ![no_condition_id] {
        mutate {
          merge => {
            "event.idm.read_only_udm.additional.fields" => "condition_id_label"
          }
          on_error => "no_condition_id_label"
        }
      }
      mutate {
        replace => {
          "eval_value_success_label.key" => "eval_value_success_%{index}"
          "eval_value_success_label.value.string_value" => "%{condition.eval_value.success}"
        }
        on_error => "no_eval_value_success"
      }
      if ![no_eval_value_success] {
        mutate {
          merge => {
            "event.idm.read_only_udm.additional.fields" => "eval_value_success_label"
          }
          on_error => "no_eval_value_success_label"
        }
      }
      mutate {
        convert => {
          "condition.matched" => "string"
        }
        on_error => "invalid_conversion_matched"
      }
      mutate {
        replace => {
          "matched_label.key" => "matched_%{index}"
          "matched_label.value.string_value" => "%{condition.matched}"
        }
        on_error => "no_matched"
      }
      if ![no_matched] {
        mutate {
          merge => {
            "event.idm.read_only_udm.additional.fields" => "matched_label"
          }
          on_error => "no_matched_label"
        }
      }
    }
  }
  if [client] != "" {
    mutate {
      replace => {
        "client_label.value.string_value" => "%{client}"
      }
      on_error => "no_client"
    }
    if ![no_client] {
      mutate {
        replace => {
          "client_label.key" => "client"
        }
        merge => {
          "event.idm.read_only_udm.additional.fields" => "client_label"
        }
        on_error => "no_client_label"
      }
    }
  }

  if [db_table_pk] != "" {
    mutate {
      replace => {
        "db_table_pk_label.value.string_value" => "%{db_table_pk}"
      }
      on_error => "no_db_table_pk"
    }
    if ![no_db_table_pk] {
      mutate {
        replace => {
          "db_table_pk_label.key" => "db_table_pk"
        }
        merge => {
          "event.idm.read_only_udm.additional.fields" => "db_table_pk_label"
        }
        on_error => "no_db_table_pk_label"
      }
    }
  }

  if [system_type] != "" {
    mutate {
      replace => {
        "system_type_label.value.string_value" => "%{system_type}"
      }
      on_error => "no_system_type"
    }
    if ![no_system_type] {
      mutate {
        replace => {
          "system_type_label.key" => "system_type"
        }
        merge => {
          "event.idm.read_only_udm.additional.fields" => "system_type_label"
        }
        on_error => "no_system_type_label"
      }
    }
  }

  if [log_line] != "" {
    mutate {
      replace => {
        "log_line_label.value.string_value" => "%{log_line}"
      }
      on_error => "no_log_line"
    }
    if ![no_log_line] {
      mutate {
        replace => {
          "log_line_label.key" => "log_line"
        }
        merge => {
          "event.idm.read_only_udm.additional.fields" => "log_line_label"
        }
        on_error => "no_log_line_label"
      }
    }
  }

  if [action] != "" {
    mutate {
      replace => {
        "action_label.value.string_value" => "%{action}"
      }
      on_error => "no_action"
    }
    if ![no_action] {
      mutate {
        replace => {
          "action_label.key" => "action"
        }
        merge => {
          "event.idm.read_only_udm.additional.fields" => "action_label"
        }
        on_error => "no_action_label"
      }
    }
  }

  if [asset_name] != "" {
    mutate {
      replace => {
        "principal.resource.name" => "%{asset_name}"
      }
      on_error => "no_asset_name"
    }
  }

  if [created_at] != "" {
    date {
      match => ["created_at", "RFC3339", "ISO8601", "yyyy-MM-ddTHH:mm:ss"]
      target => "metadata.event_timestamp"
      on_error => "no_created_at"
    }
  }

  if [erp_host] != "" {
    mutate {
      merge => {
        "principal.ip" => "erp_host"
      }
      replace => {
        "has_principal" => "true"
      }
      on_error => "no_erp_host"
    }
  }

  if [username] != "" {
    mutate {
      replace => {
        "principal.user.user_display_name" => "%{username}"
      }
      on_error => "no_username"
    }
  }

  if [user_type] != "" {
    mutate {
      merge => {
        "principal.user.role_name" => "%{user_type}"
      }
      on_error => "no_user_type"
    }
  }

  if [terminal_source] != "" {
    grok {
      match => {
        "terminal_source" => "%{IP:terminal_source_ip}"
      }
      overwrite => ["terminal_source_ip"]
      on_error => "invalid_ip"
    }
    if ![invalid_ip] and [terminal_source_ip] != "" {
      mutate {
        merge => {
          "principal.ip" => "terminal_source_ip"
          "principal.asset.ip" => "terminal_source_ip"
        }
        on_error => "no_terminal_source_ip"
      }
      if ![no_terminal_source_ip] {
        mutate {
          replace => {
            "has_principal" => "true"
          }
        }
      }
    }
    else {
      mutate {
        replace => {
          "principal.hostname" => "%{terminal_source}"
          "principal.asset.hostname" => "%{terminal_source}"
          "has_principal" => "true"
        }
        on_error => "no_terminal_source"
      }
    }
  }

  for module in modules {
    mutate {
      merge => {
        "sec_res" => ""
      }
    }
    for key,value in module map {
      mutate {
        replace => {
          "module_label" => ""
        }
      }
      if [key] == "tbc" {
        mutate {
          convert => {
            "value" => "string"
          }
        }
      }
      if [key] != "ref" {
        mutate {
          replace => {
            "module_label.value" => "%{value}"
            "module_label.key" => "%{key}"
          }
          on_error => "no_module_value"
        }
        if ![no_module_value]
        {
          mutate {
            merge => {
              "sec_res.detection_fields" => "module_label"
            }
            on_error => "no_module_label"
          }
        }
      }
      else {
        for reference in value {
          for ref_key,ref_value in reference map {
            mutate {
              replace => {
                "reference_label" => ""
              }
            }
            mutate {
              replace => {
                "reference_label.value" => "%{ref_value}"
                "reference_label.key" => "ref_%{ref_key}"
              }
              on_error => "no_reference_value"
            }
            if ![no_reference_value] {
              mutate {
                merge => {
                  "sec_res.detection_fields" => "reference_label"
                }
                on_error => "no_reference_label"
              }
            }
          }
        }
      }
    }
    if [sec_res] != "" {
      mutate {
        merge => {
          "event.idm.read_only_udm.security_result" => "sec_res"
        }
      }
    }
  }

  if [new_state] != "" {
    mutate {
      replace => {
        "sec_res" => ""
      }
    }
    mutate {
      replace => {
        "new_state_label.value" => "%{new_state}"
        "new_state_label.key" => "new_state"
      }
      on_error => "no_new_state"
    }
    if ![no_new_state] {
      mutate {
        merge => {
          "sec_res.detection_fields" => "new_state_label"
        }
        on_error => "no_new_state_label"
      }
    }
    if [sec_res] != "" {
      mutate {
        merge => {
          "event.idm.read_only_udm.security_result" => "sec_res"
        }
      }
    }
  }

  for vulnerability in vulnerabilities {
    mutate {
      merge => {
        "sec_res" => ""
      }
    }
    for v_key,v_value in vulnerability map {
      mutate {
        replace => {
          "vuln_label" => ""
        }
      }
      if [v_key] == "id" {
        mutate {
          convert => {
            "v_value" => "string"
          }
          on_error => "invalid_conversion"
        }
      }
      mutate {
        replace => {
          "vuln_label.value" => "%{v_value}"
          "vuln_label.key" => "vulnerability_%{v_key}"
        }
        on_error => "no_vuln"
      }
      if ![no_vuln] {
        mutate {
          merge => {
            "sec_res.detection_fields" => "vuln_label"
          }
          on_error => "no_vuln_label"
        }
      }
    }
    if [sec_res] != "" {
      mutate {
        merge => {
          "event.idm.read_only_udm.security_result" => "sec_res"
        }
      }
    }
  }

  if [job_type] != "" {
    mutate {
      replace => {
        "metadata.description" => "%{job_type}"
      }
      on_error => "no_job_type"
    }
  }

  if [task_id] != "" {
    mutate {
      replace => {
        "task_id_label.value.string_value" => "%{task_id}"
      }
      on_error => "no_task_id"
    }
    if ![no_task_id] {
      mutate {
        replace => {
          "task_id_label.key" => "task_id"
        }
        merge => {
          "event.idm.read_only_udm.additional.fields" => "task_id_label"
        }
        on_error => "no_task_id_label"
      }
    }
  }

  if [job_name] != "" {
    mutate {
      replace => {
        "job_name_label.value.string_value" => "%{job_name}"
      }
      on_error => "no_job_name"
    }
    if ![no_job_name] {
      mutate {
        replace => {
          "job_name_label.key" => "job_name"
        }
        merge => {
          "event.idm.read_only_udm.additional.fields" => "job_name_label"
        }
        on_error => "no_job_name_label"
      }
    }
  }

  if [job_id] != "" {
    mutate {
      replace => {
        "job_id_label.value.string_value" => "%{job_name}"
      }
      on_error => "no_job_id"
    }
    if ![no_job_id] {
      mutate {
        replace => {
          "job_id_label.key" => "job_id"
        }
        merge => {
          "event.idm.read_only_udm.additional.fields" => "job_id_label"
        }
        on_error => "no_job_id_label"
      }
    }
  }

  if [osp_link] != "" {
    mutate {
      replace => {
        "osp_link_label.value.string_value" => "%{osp_link}"
      }
      on_error => "no_osp_link"
    }
    if ![no_osp_link] {
      mutate {
        replace => {
          "osp_link_label.key" => "osp_link"
        }
        merge => {
          "event.idm.read_only_udm.additional.fields" => "osp_link_label"
        }
        on_error => "no_osp_link"
      }
    }
  }

  if [sid] != "" {
    mutate {
      replace => {
        "sid_label.value.string_value" => "%{sid}"
      }
      on_error => "no_sid"
    }
    if ![no_sid] {
      mutate {
        replace => {
          "sid_label.key" => "sid"
        }
        merge => {
          "event.idm.read_only_udm.additional.fields" => "sid_label"
        }
        on_error => "no_sid_label"
      }
    }
  }

  if [confidence] != "" {
    mutate {
      convert => {
        "confidence" => "string"
      }
      on_error => "invalid_confidence_conversion"
    }
    mutate {
      replace => {
        "security_result.confidence_details" => "%{confidence}"
      }
      on_error => "no_confidence"
    }
  }

  if [erp_event_source] != "" {
    mutate {
      replace => {
        "erp_event_source_label.key" => "erp_event_source"
        "erp_event_source_label.value.string_value" => "%{erp_event_source}"
      }
      on_error => "no_erp_event_source"
    }
    if ![no_erp_event_source] {
      mutate {
        merge => {
          "event.idm.read_only_udm.additional.fields" => "erp_event_source_label"
        }
        on_error => "no_erp_event_source_label"
      }
    }
  }

  if [erp_time] != "" {
    mutate {
      replace => {
        "erp_time_label.key" => "erp_time"
        "erp_time_label.value.string_value" => "%{erp_time}"
      }
      on_error => "no_erp_time"
    }
    if ![no_erp_time] {
      mutate {
        merge => {
          "event.idm.read_only_udm.additional.fields" => "erp_time_label"
        }
        on_error => "no_erp_time_label"
      }
    }
  }

  if [protocol] != "None" and [protocol] != "" {
    mutate {
      replace => {
        "protocol_label.key" => "protocol"
        "protocol_label.value.string_value" => "%{protocol}"
      }
      on_error => "no_protocol"
    }
    if ![no_protocol] {
      mutate {
        merge => {
          "event.idm.read_only_udm.additional.fields" => "protocol_label"
        }
        on_error => "no_protocol_label"
      }
    }
  }

  if [severity] != "" {
    mutate {
      convert => {
        "severity" => "string"
      }
      on_error => "invalid_severity_conversion"
    }
    mutate {
      replace => {
        "security_result.severity_details" => "%{severity}"
      }
      on_error => "no_severity"
    }
  }

  if [success] in ["True", true] {
    mutate {
      replace => {
        "action" => "ALLOW"
      }
      on_error => "no_success"
    }
    if ![no_success] {
      mutate {
        merge => {
          "security_result.action" => "action"
        }
        on_error => "no_action"
      }
    }
  }

  if [inter_ip] != "" {
    mutate {
      merge => {
        "intermediary.ip" => "inter_ip"
        "intermediary.asset.ip" => "inter_ip"
      }
      on_error => "no_inter_ip"
    }
  }

  if [event_type] == "UserLogin" and [has_target] == "true" {
    mutate {
      replace => {
        "metadata.event_type" => "USER_LOGIN"
        "event.idm.read_only_udm.extensions.auth.type" => "MACHINE"
      }
    }
  }

  else if [has_principal] == "true" and [has_target] == "true" and [has_network] == "true" {
    mutate {
      replace => {
        "metadata.event_type" => "NETWORK_UNCATEGORIZED"
      }
    }
  }
  else if [has_principal] == "true" {
    mutate {
      replace => {
        "metadata.event_type" => "STATUS_UPDATE"
      }
    }
  }
  else {
    mutate {
      replace => {
        "metadata.event_type" => "GENERIC_EVENT"
      }
    }
  }

  mutate {
    replace => {
      "metadata.product_name" => "ONAPSIS"
      "metadata.vendor_name" => "ONAPSIS"
    }
  }

  if [principal] != "" {
    mutate {
      rename => {
        "principal" => "event.idm.read_only_udm.principal"
      }
    }
  }

  if [target] != "" {
    mutate {
      rename => {
        "target" => "event.idm.read_only_udm.target"
      }
    }
  }

  if [metadata] != "" {
    mutate {
      rename => {
        "metadata" => "event.idm.read_only_udm.metadata"
      }
    }
  }

  if [network] != "" {
    mutate {
      rename => {
        "network" => "event.idm.read_only_udm.network"
      }
    }
  }

  if [security_result] != "" {
    mutate {
      merge => {
        "event.idm.read_only_udm.security_result" => "security_result"
      }
      on_error => "no_security_result"
    }
  }

  if [intermediary] != "" {
    mutate {
      merge => {
        "event.idm.read_only_udm.intermediary" => "intermediary"
      }
      on_error => "no_intermediary"
    }
  }

  mutate {
    merge => {
      "@output" => "event"
    }
  }
}
