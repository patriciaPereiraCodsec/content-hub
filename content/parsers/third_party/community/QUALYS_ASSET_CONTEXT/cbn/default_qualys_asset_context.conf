# Product: QUALYS_ASSET_CONTEXT
# Category: Vulnerability Scanner
# Supported Format: JSON
# Reference: NA
# Last Updated: 2023-07-18
# Copyright 2023 Chronicle LLC

filter {
  mutate {
    replace => {
      "ID" => ""
      "ASSET_ID" => ""
      "IP" => ""
      "DNS" => ""
      "DNS_DATA.HOSTNAME" => ""
      "OS" => ""
      "CLOUD_RESOURCE_ID" => ""
      "EC2_INSTANCE_ID" => ""
      "CLOUD_SERVICE" => ""
      "CLOUD_PROVIDER" => ""
      "CLOUD_PROVIDER_TAGS.CLOUD_TAG" => ""
      "METADATA.AZURE.ATTRIBUTE" => ""
      "TAGS.TAG" => ""
      "dataset" => ""
    }
  }

  json {
    source => "message"
    array_function => "split_columns"
    on_error => "json_error"
  }

  if [ID] != "" {
    mutate {
      replace => {
        "event.idm.entity.entity.asset.product_object_id" => "%{ID}"
      }
    }
  }

  if [ASSET_ID] != "" {
    mutate {
      replace => {
        "event.idm.entity.entity.asset.asset_id" => "%{ASSET_ID}"
      }
    }
  }

  if [IP] != "" {
    mutate {
      merge => {
        "event.idm.entity.entity.asset.ip" => "IP"
      }
    }
  }

  if [DNS_DATA][HOSTNAME] != "" {
    mutate {
      replace => {
        "event.idm.entity.entity.asset.hostname" => "%{DNS_DATA.HOSTNAME}"
      }
    }
  }

  if [CLOUD_RESOURCE_ID] != "" {
    mutate {
      replace => {
        "dataset.entity.resource.id" => "%{CLOUD_RESOURCE_ID}"
      }
    }
  }

  if [EC2_INSTANCE_ID] != "" {
    mutate {
      replace => {
        "dataset.entity.resource.product_object_id" => "%{EC2_INSTANCE_ID}"
      }
    }
  }

  if [CLOUD_SERVICE] == "VM" {
    mutate {
      replace => {
        "dataset.entity.resource.resource_type" => "VIRTUAL_MACHINE"
      }
    }
  }

  if [CLOUD_PROVIDER] != "" {
    mutate {
      replace => {
        "dataset.entity.resource.resource_subtype" => "%{CLOUD_PROVIDER}"
      }
    }
  }

  if [OS] =~ "(?i)windows" {
    mutate {
      replace => {
        "event.idm.entity.entity.asset.platform_software.platform" => "WINDOWS"
      }
    }
  }

  if [CLOUD_PROVIDER_TAGS][CLOUD_TAG] != "" {
    for tag in CLOUD_PROVIDER_TAGS.CLOUD_TAG {
      mutate {
        replace => {
          "attribute_label" => ""
        }
      }

      mutate {
        replace => {
          "attribute_label.key" => "%{tag.NAME}"
          "attribute_label.value" => "%{tag.VALUE}"
        }
        on_error => "no_attribute_found"
      }

      if ![no_attribute_found] {
        mutate {
          merge => {
            "dataset.entity.resource.attribute.labels" => "attribute_label"
          }
        }
      }
    }
  }

  if [METADATA][AZURE][ATTRIBUTE] != "" {
    for attribute in METADATA.AZURE.ATTRIBUTE {
      mutate {
        replace => {
          "attribute_label" => ""
        }
      }

      mutate {
        replace => {
          "attribute_label.key" => "%{attribute.NAME}"
          "attribute_label.value" => "%{attribute.VALUE}"
        }
        on_error => "no_attribute_found"
      }

      if ![no_attribute_found] {
        mutate {
          merge => {
            "dataset.entity.resource.attribute.labels" => "attribute_label"
          }
        }
      }
    }
  }

  if [TAGS][TAG] != "" {
    for tag in TAGS.TAG {
      mutate {
        replace => {
          "attribute_label" => ""
        }
      }

      mutate {
        replace => {
          "attribute_label.key" => "%{tag.NAME}"
          "attribute_label.value" => "TAG_ID: %{tag.TAG_ID}"
        }
        on_error => "no_attribute_found"
      }

      if ![no_attribute_found] {
        mutate {
          merge => {
            "dataset.entity.resource.attribute.labels" => "attribute_label"
          }
        }
      }
    }
  }

  if [dataset] != "" {
    mutate {
      replace => {
        "dataset.relationship" => "MEMBER"
        "dataset.entity_type" => "RESOURCE"
      }
    }
    mutate {
      merge => {
        "event.idm.entity.relations" => "dataset"
      }
    }
  }

  mutate {
    replace => {
      "event.idm.entity.metadata.entity_type" => "ASSET"
      "event.idm.entity.metadata.product_name" => "QUALYS ASSET CONTEXT"
      "event.idm.entity.metadata.vendor_name" => "QUALYS ASSET CONTEXT"
    }
  }

  mutate {
    merge => {
      "@output" => "event"
    }
  }
}
