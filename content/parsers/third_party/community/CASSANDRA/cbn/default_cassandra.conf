  for dataCenter in data.dataCenters {
    mutate {
      replace => {
        "value_array" => ""
      }
    }
    mutate {
      replace => {
        "value_array.string_value" => "%{dataCenter}"
      }
      on_error => "additional_datacenter_empty"
    }
    mutate {
      merge => {
        "additional_datacenter.value.list_value.values" => "value_array"
      }
      on_error => "additional_datacenter_not_found"
