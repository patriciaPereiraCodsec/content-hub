  if [authenticated_var] != "" and [user_var] != "" {
    mutate {
      replace => {
        "event.idm.read_only_udm.principal.user.userid" => "%{authenticated_var}"
        "has_user" => "true"
      }
      on_error => "no_authenticated_principal"
    }
  }
  else if [user_var] != "" {
    mutate {
      replace => {
        "event.idm.read_only_udm.principal.user.userid" => "%{user_var}"
        "has_user" => "true"
      }
      on_error => "no_user_var_principal"
    }
  }


  mutate {
    replace => {
      "data_applicationVersion_var" => "%{data.applicationVersion}"
    }
