      "connected_ip" => ""
      "connected_port" => ""
      "data_dataCenters_var" => ""
      "dataCenter" => ""
      "security_result_action" => ""
    }
  }

  grok {
    match => {
      "message" => [
      "%{TIMESTAMP_ISO8601:event_time} %{HOSTNAME:hostname} %{LOGLEVEL:log_level} MessageKey=%{GREEDYDATA} Message=\\\"%{GREEDYDATA:inner_message}\\\""
      "%{DATA:log_level}\\s+\\[%{DATA:thread_name}\\]\\s+%{TIMESTAMP_ISO8601:event_time},%{INT}\\s+%{DATA:log_source}\\s+%{DATA}\\s+%{GREEDYDATA:kv_data}"
      ]
    }
    overwrite => ["event_time", "hostname", "log_level", "inner_message","kv_data", "thread_name", "log_source"]
    on_error => "pattern_not_matched"
  }

  if [inner_message] != "" {
    mutate {
      gsub => ["inner_message","@metadata","event_metadata"]
    }

    json {
      source => "inner_message"
      array_function => "split_columns"
      on_error => "not_json"
    }
  }
  if [kv_data] != "" {
    mutate {
      gsub => ["kv_data","consistency level","consistency_level"]
    }
    kv {
    source => "kv_data"
    field_split => "|"
    value_split => ":"
    on_error => "no_cef_extension"
    }
  }

  grok {
    match => {
      "host" => "/%{IP:t_ip}"
    }
    on_error => "grok_host_fail"
    overwrite=>["t_ip"]
  }
  if ! [grok_host_fail] {
    mutate {
      merge => {
        "event.idm.read_only_udm.target.ip" => "t_ip"
        "event.idm.read_only_udm.target.asset.ip" => "t_ip"
      }
      on_error => "grok_host_fail_1"
    }
    if ![grok_host_fail_1] {
      mutate {
        replace => {
          "has_target" => "true"
        }
      }
    }
  }
  grok {
    match => {
      "source" => "/%{IP:s_ip}"
    }
    on_error => "grok_source_fail"
    overwrite=>["s_ip"]
  }
  if ! [grok_source_fail] {
    mutate {
      merge => {
        "event.idm.read_only_udm.principal.ip" => "s_ip"
        "event.idm.read_only_udm.principal.asset.ip" => "s_ip"
      }
      on_error => "grok_source_fail_1"
    }
    if ![grok_source_fail_1] {
      mutate {
        replace => {
          "has_principal" => "true"
        }
      }
    }
  }

  mutate {
    replace => {
      "user_var" => "%{user}"
    }
    on_error => "no_user"
  }
  mutate {
    replace => {
      "authenticated_var" => "%{authenticated}"
    }
    on_error => "no_authenticated"
  }
  if [user_var] != "" and [authenticated_var] != "" {
    mutate {
      replace => {
        "event.idm.read_only_udm.target.user.userid" => "%{user_var}"
        "has_user" => "true"
      }
      on_error => "no_user_var_target"
    }
  }
  else if [authenticated_var] != "" {
    mutate {
      replace => {
        "event.idm.read_only_udm.target.user.userid" => "%{authenticated_var}"
        "has_user" => "true"
      }
      on_error => "no_user_authenticated_target"
    }
  }

  if [operation] != "" {
    if [type] =~ "CQL_SELECT" {
      mutate {
        replace => {
          "event.idm.read_only_udm.target.process.command_line" => "%{operation}"
        }
        on_error => "type_cql_select_fail"
      }
    }
    else if [type] =~ "LOGIN" {
      mutate {
        replace => {
          "security_result.description" => "%{operation}"
        }
        on_error => "login_description_fail"
      }
    }
    else {
      mutate {
        replace => {
          "operation_label.key" => "operation"
          "operation_label.value.string_value" => "%{operation}"
        }
        on_error => "no_operation_var_1"
      }
      if ![no_operation_var_1] {
        mutate {
          merge => {
            "event.idm.read_only_udm.additional.fields" => "operation_label"
          }
          on_error => "no_operation_var_2"
        }
      }
      grok {
        match => {
          "operation" => "%{DATA}\\s+\\[json='%{GREEDYDATA:json_data}'\\]"
        }
        overwrite => ["json_data"]
        on_error => "no_operation_var_3"
      }
      if [json_data] != "" {
        json {
          source => "json_data"
          array_function => "split_columns"
          on_error => "no_json_data"
        }
      }
    }
  }
  if [operation] =~ "Successful" {
    mutate {
      replace => {
        "security_result_action" => "ALLOW"
      }
    }
  }
  if [security_result_action] != "" {
    mutate {
      merge => {
        "security_result.action" => "security_result_action"
      }
      on_error => "no_security_result_action"
    }
  }

  mutate {
    replace => {
      "data_initialControlConnection_var" => "%{data.initialControlConnection}"
    }
    on_error => "no_data_initialControlConnection"
  }
  if [data_initialControlConnection_var] != "" {
    grok {
      match => {
        "data_initialControlConnection_var" => "%{IP:initialControlConnection_ip}:%{INT}"
      }
