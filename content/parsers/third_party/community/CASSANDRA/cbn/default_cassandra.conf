  mutate {
    replace => {
      "metadata_tags_language_var" => "%{metadata.tags.language}"
    }
    on_error => "no_metadata_tags_language"
  }
  if [metadata_tags_language_var] != "" {
    mutate {
      replace => {
        "metadata_tags_language_field.key" => "metadata_tags_language"
        "metadata_tags_language_field.value.string_value" => "%{metadata_tags_language_var}"
