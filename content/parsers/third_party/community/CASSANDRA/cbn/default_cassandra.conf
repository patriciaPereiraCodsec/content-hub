      on_error => "no_metadata_name_1"
    }
    if ![no_metadata_name_1] {
      mutate {
        merge => {
          "event.idm.read_only_udm.additional.fields" => "metadata_name_field"
        }
        on_error => "no_metadata_name_2"
      }
    }
  }

  mutate {
    convert => {
      "metadata.timestamp" => "string"
    }
    on_error => "no_metadata_timestamp_tostring"
  }
  mutate {
    replace => {
      "metadata_timestamp_var" => "%{metadata.timestamp}"
    }
    on_error => "no_metadata_timestamp"
  }
  if [metadata_timestamp_var] != "" {
    mutate {
      replace => {
        "metadata_timestamp_field.key" => "metadata_timestamp"
        "metadata_timestamp_field.value.string_value" => "%{metadata_timestamp_var}"
      }
      on_error => "no_metadata_timestamp_1"
    }
    if ![no_metadata_timestamp_1] {
      mutate {
        merge => {
          "event.idm.read_only_udm.additional.fields" => "metadata_timestamp_field"
        }
        on_error => "no_metadata_timestamp_2"
      }
    }
