      "data_clientId_var" => "%{data.clientId}"
    }
    on_error => "no_data_clientId"
  }
  if [data_clientId_var] != "" {
    mutate {
      replace => {
        "data_clientId_field.key" => "data_clientId"
        "data_clientId_field.value.string_value" => "%{data_clientId_var}"
