# Product: ARMIS
# Category: VULNERABILITIES
# Supported Format: JSON
# Reference: NA
# Last Updated: 2023-03-02
# Copyright 2023 Chronicle LLC


filter {
  mutate {
    replace => {
      "severity" => ""
    }
  }

  json {
    source => "message"
    array_function => "split_columns"
    on_error => "json_not_valid"
  }

  if [json_not_valid] {
    drop {
      tag => "TAG_MALFORMED_ENCODING"
    }
  }

  mutate {
    replace => {
      "metadata.product_name" => "ARMIS"
      "metadata.vendor_name" => "ARMIS"
      "metadata.event_type" => "GENERIC_EVENT"
    }
  }

  mutate {
    replace => {
      "metadata.product_log_id" => "%{id}"
    }
    on_error => "failed_to_get_id"
  }

  mutate {
    replace => {
      "metadata.url_back_to_product" => "%{vulnerabilities_matches}"
    }
    on_error => "failed_to_get_url"
  }

  mutate {
    replace => {
      "metadata.description" => "%{description}"
    }
    on_error => "failed_to_get_description"
  }

  mutate {
    replace => {
      "token_vuln.cve_id" => "%{cveUid}"
    }
    on_error => "failed_to_get_cve_id"
  }

  mutate {
    replace => {
      "token_vuln.name" => "%{commonName}"
    }
    on_error => "failed_to_get_name"
  }

  mutate {
    convert => {
      "affectedDevicesCount" => "string"
    }
    on_error => "failed_to_convert_device_count"
  }

  mutate {
    replace => {
      "token_affected_devices_count.value" => "%{affectedDevicesCount}"
    }
    on_error => "failed_to_get_device_count"
  }

  if ![failed_to_get_device_count] {
    mutate {
      replace => {
        "token_affected_devices_count.key" => "affected_devices_count"
      }
    }

    mutate {
      merge => {
        "token_security_result.detection_fields" =>
        "token_affected_devices_count"
      }
    }
  }

  mutate {
    replace => {
      "token_attack_complexity.value" => "%{attackComplexity}"
    }
    on_error => "failed_to_get_attack_complexity"
  }

  if ![failed_to_get_attack_complexity] {
    mutate {
      replace => {
        "token_attack_complexity.key" => "attack_complexity"
      }
    }

    mutate {
      merge => {
        "token_vuln.about.labels" => "token_attack_complexity"
      }
    }
  }

  mutate {
    replace => {
      "token_attack_vector.value" => "%{attackVector}"
    }
    on_error => "failed_to_get_attack_vector"
  }

  if ![failed_to_get_attack_vector] {
    mutate {
      replace => {
        "token_attack_vector.key" => "attack_vector"
      }
    }

    mutate {
      merge => {
        "token_vuln.about.labels" => "token_attack_vector"
      }
    }
  }

  mutate {
    replace => {
      "token_availability_impact.value" => "%{availabilityImpact}"
    }
    on_error => "failed_to_get_availability_impact"
  }

  if ![failed_to_get_availability_impact] {
    mutate {
      replace => {
        "token_availability_impact.key" => "availability_impact"
      }
    }

    mutate {
      merge => {
        "token_vuln.about.labels" => "token_availability_impact"
      }
    }
  }

  mutate {
    replace => {
      "token_cisa_due_date.value" => "%{cisaDueDate}"
    }
    on_error => "failed_to_get_cisa_due_date"
  }

  if ![failed_to_get_cisa_due_date] {
    mutate {
      replace => {
        "token_cisa_due_date.key" => "cisa_due_date"
      }
    }

    mutate {
      merge => {
        "token_vuln.about.labels" => "token_cisa_due_date"
      }
    }
  }

  mutate {
    replace => {
      "token_confidentiality_impact.value" => "%{confidentialityImpact}"
    }
    on_error => "failed_to_get_confidentiality_impact"
  }

  if ![failed_to_get_confidentiality_impact] {
    mutate {
      replace => {
        "token_confidentiality_impact.key" => "confidentiality_impact"
      }
    }

    mutate {
      merge => {
        "token_security_result.detection_fields" =>
        "token_confidentiality_impact"
      }
    }
  }

  mutate {
    convert => {
      "cvssScore" => "float"
    }
    on_error => "failed_to_convert_cvss"
  }

  mutate {
    rename => {
      "cvssScore" => "token_vuln.cvss_base_score"
    }
    on_error => "failed_to_get_cvss_score"
  }

  mutate {
    convert => {
      "epssPercentile" => "string"
    }
    on_error => "failed_to_convert_epss_percentile"
  }

  mutate {
    replace => {
      "token_epss_percentile.value" => "%{epssPercentile}"
    }
    on_error => "failed_to_get_epss_percentile"
  }

  if ![failed_to_get_epss_percentile] {
    mutate {
      replace => {
        "token_epss_percentile.key" => "epss_percentile"
      }
    }

    mutate {
      merge => {
        "token_vuln.about.labels" => "token_epss_percentile"
      }
    }
  }

  mutate {
    convert => {
      "epssScore" => "string"
    }
    on_error => "failed_to_convert_epss_score"
  }

  mutate {
    replace => {
      "token_epss_score.value" => "%{epssScore}"
    }
    on_error => "failed_to_get_epss_score"
  }

  if ![failed_to_get_epss_score] {
    mutate {
      replace => {
        "token_epss_score.key" => "epss_score"
      }
    }

    mutate {
      merge => {
        "token_vuln.about.labels" => "token_epss_score"
      }
    }
  }

  date {
    match => ["firstReferencePublishDate", "yyyy-MM-ddTHH:mm:ssZZ"]
    target => "token_vuln.first_found"
    on_error => "date_without_milisecond_format"
  }

  if [date_without_milisecond_format] {
    grok {
      match => {
        "firstReferencePublishDate" =>
        "(?P<time>^.{1,23})...%{GREEDYDATA:offset_data}"
      }
      overwrite => ["time","offset_data"]
      on_error => "failed_to_get_time"
    }

    if ![failed_to_get_time] {
      mutate {
        replace => {
          "time" => "%{time}%{offset_data}"
        }
        on_error => "failed_to_get_time"
      }

      date {
        match => ["time","yyyy-MM-ddTHH:mm:ss.SSSZZ"]
        target => "token_vuln.first_found"
        on_error => "date_on_error_milisecond_format"
      }
    }
  }

  mutate {
    replace => {
      "token_weaponized_publish_date.value" =>
      "%{firstWeaponizedReferencePublishDate}"
    }
    on_error => "failed_to_publish_date"
  }

  if ![failed_to_publish_date] {
    mutate {
      replace => {
        "token_weaponized_publish_date.key" =>
        "first_weaponized_reference_publish_date"
      }
    }

    mutate {
      merge => {
        "token_vuln.about.labels" =>
        "token_weaponized_publish_date"
      }
    }
  }

  mutate {
    replace => {
      "token_publish_date.value" => "%{publishedDate}"
    }
    on_error => "failed_to_publish_date"
  }

  if ![failed_to_publish_date] {
    mutate {
      replace => {
        "token_publish_date.key" => "published_date"
      }
    }

    mutate {
      merge => {
        "token_vuln.about.labels" => "token_publish_date"
      }
    }
  }

  mutate {
    convert => {
      "exploitabilityScore" => "string"
    }
    on_error => "failed_to_convert_exploitability_score"
  }

  mutate {
    replace => {
      "token_exploitability_score.value" => "%{exploitabilityScore}"
    }
    on_error => "failed_to_get_exploitability_score"
  }

  if ![failed_to_get_exploitability_score] {
    mutate {
      replace => {
        "token_exploitability_score.key" => "exploitability_score"
      }
    }

    mutate {
      merge => {
        "token_vuln.about.labels" => "token_exploitability_score"
      }
    }
  }

  mutate {
    convert => {
      "hasRansomware" => "string"
    }
    on_error => "failed_to_convert_has_ransomware"
  }

  mutate {
    replace => {
      "token_has_ransomware.value" => "%{hasRansomware}"
    }
    on_error => "failed_to_get_has_ransomware"
  }

  if ![failed_to_get_has_ransomware] {
    mutate {
      replace => {
        "token_has_ransomware.key" => "has_ransomware"
      }
    }

    mutate {
      merge => {
        "token_vuln.about.labels" => "token_has_ransomware"
      }
    }
  }

  mutate {
    convert => {
      "impactScore" => "string"
    }
    on_error => "failed_to_convert_impact_score"
  }

  mutate {
    replace => {
      "token_imppact_score.value" => "%{impactScore}"
    }
    on_error => "failed_to_get_impact_score"
  }

  if ![failed_to_get_impact_score] {
    mutate {
      replace => {
        "token_imppact_score.key" => "impact_score"
      }
    }

    mutate {
      merge => {
        "token_security_result.detection_fields" => "token_imppact_score"
      }
    }
  }

  mutate {
    replace => {
      "first_botnet" => "0"
    }
  }

  for botnet in botnets {
    if [botnet] != "" {
      if [first_botnet] == "0" {
        mutate {
          replace => {
            "token_botnet" => "%{botnet}"
          }
          on_error => "failed_to_get_botnet"
        }

        if ![failed_to_get_botnet] {
          mutate {
            replace => {
              "first_botnet" => "1"
            }
          }
        }
      }
      else {
        mutate {
          replace => {
            "token_botnet" => "%{token_botnet}, %{botnet}"
          }
          on_error => "failed_to_get_botnet"
        }
      }
    }
  }

  mutate {
    replace => {
      "token_botnet.value" => "%{token_botnet}"
    }
    on_error => "failed_to_get_botnet"
  }

  if ![failed_to_get_botnet] {
    mutate {
      replace => {
        "token_botnet.key" => "botnets"
      }
    }

    mutate {
      merge => {
        "token_vuln.about.labels" => "token_botnet"
      }
    }
  }

  mutate {
    replace => {
      "token_integrity_impact.value" => "%{integrityImpact}"
    }
    on_error => "failed_to_get_integrity_impact"
  }

  if ![failed_to_get_integrity_impact] {
    mutate {
      replace => {
        "token_integrity_impact.key" => "integrity_impact"
      }
    }

    mutate {
      merge => {
        "token_security_result.detection_fields" => "token_integrity_impact"
      }
    }
  }

  mutate {
    convert => {
      "isWeaponized" => "string"
    }
    on_error => "failed_to_convert_is_weaponized"
  }

  mutate {
    replace => {
      "token_is_weaponized.value" => "%{isWeaponized}"
    }
    on_error => "failed_to_get_is_weaponized"
  }

  if ![failed_to_get_is_weaponized] {
    mutate {
      replace => {
        "token_is_weaponized.key" => "is_weaponized"
      }
    }

    mutate {
      merge => {
        "token_vuln.about.labels" => "token_is_weaponized"
      }
    }
  }

  mutate {
    replace => {
      "token_latest_exploit_update.value" => "%{latestExploitUpdate}"
    }
    on_error => "failed_to_get_latest_exploit_update"
  }

  if ![failed_to_get_latest_exploit_update] {
    mutate {
      replace => {
        "token_latest_exploit_update.key" => "latest_exploit_update"
      }
    }

    mutate {
      merge => {
        "token_vuln.about.labels" => "token_latest_exploit_update"
      }
    }
  }

  mutate {
    convert => {
      "numOfExploits" => "string"
    }
    on_error => "failed_to_convert_num_of_exploits"
  }

  mutate {
    replace => {
      "token_num_of_exploits.value" => "%{numOfExploits}"
    }
    on_error => "failed_to_get_num_of_exploits"
  }

  if ![failed_to_get_num_of_exploits] {
    mutate {
      replace => {
        "token_num_of_exploits.key" => "num_of_exploits"
      }
    }

    mutate {
      merge => {
        "token_security_result.detection_fields" => "token_num_of_exploits"
      }
    }
  }

  mutate {
    convert => {
      "numberOfThreatActors" => "string"
    }
    on_error => "failed_to_convert_threat_actor"
  }

  mutate {
    replace => {
      "token_threat_actors.value" => "%{numberOfThreatActors}"
    }
    on_error => "failed_to_get_threat_actors"
  }

  if ![failed_to_get_threat_actors] {
    mutate {
      replace => {
        "token_threat_actors.key" => "number_of_threat_actors"
      }
    }

    mutate {
      merge => {
        "token_security_result.detection_fields" => "token_threat_actors"
      }
    }
  }

  mutate {
    replace => {
      "token_avm_rating.value" => "%{avmRating}"
    }
    on_error => "failed_to_get_avm_rating"
  }

  if ![failed_to_get_avm_rating] {
    mutate {
      replace => {
        "token_avm_rating.key" => "avm_rating"
      }
    }

    mutate {
      merge => {
        "token_security_result.detection_fields" => "token_avm_rating"
      }
    }
  }

  mutate {
    replace => {
      "token_change_reason.value" => "%{orgPriorityManualChangeReason}"
    }
    on_error => "failed_to_get_change_reason"
  }

  if ![failed_to_get_change_reason] {
    mutate {
      replace => {
        "token_change_reason.key" => "org_priority_manual_change_reason"
      }
    }

    mutate {
      merge => {
        "token_security_result.detection_fields" => "token_change_reason"
      }
    }
  }

  mutate {
    replace => {
      "principal.user.userid" => "%{orgPriorityManualChangedBy}"
    }
    on_error => "failed_to_get_user"
  }

  mutate {
    replace => {
      "token_manual_update_time.value" => "%{orgPriorityManualUpdateTime}"
    }
    on_error => "failed_to_get_update_time"
  }

  if ![failed_to_get_update_time] {
    mutate {
      replace => {
        "token_manual_update_time.key" => "org_priority_manual_update_time"
      }
    }

    mutate {
      merge => {
        "principal.labels" => "token_manual_update_time"
      }
    }
  }

  mutate {
    replace => {
      "token_privileges_required.value" => "%{privilegesRequired}"
    }
    on_error => "failed_to_get_privileges_required"
  }

  if ![failed_to_get_privileges_required] {
    mutate {
      replace => {
        "token_privileges_required.key" => "privileges_required"
      }
    }

    mutate {
      merge => {
        "token_security_result.detection_fields" => "token_privileges_required"
      }
    }
  }

  mutate {
    convert => {
      "reportedByGoogleZeroDays" => "string"
    }
    on_error => "failed_to_convert_zero_days"
  }

  mutate {
    replace => {
      "token_google_zero_days.value" => "%{reportedByGoogleZeroDays}"
    }
    on_error => "failed_to_get_google_zero_days"
  }

  if ![failed_to_get_google_zero_days] {
    mutate {
      replace => {
        "token_google_zero_days.key" => "reported_by_google_zero_days"
      }
    }

    mutate {
      merge => {
        "token_vuln.about.labels" => "token_google_zero_days"
      }
    }
  }

  mutate {
    replace => {
      "token_scope.value" => "%{scope}"
    }
    on_error => "failed_to_get_scope"
  }

  if ![failed_to_get_scope] {
    mutate {
      replace => {
        "token_scope.key" => "scope"
      }
    }

    mutate {
      merge => {
        "token_vuln.about.labels" => "token_scope"
      }
    }
  }

  if [severity] == "Critical" {
    mutate {
      replace => {
        "token_vuln.severity" => "CRITICAL"
      }
    }
  }
  else if [severity] == "High" {
    mutate {
      replace => {
        "token_vuln.severity" => "HIGH"
      }
    }
  }
  else if [severity] == "Medium" {
    mutate {
      replace => {
        "token_vuln.severity" => "MEDIUM"
      }
    }
  }
  else if [severity] == "Low" {
    mutate {
      replace => {
        "token_vuln.severity" => "LOW"
      }
    }
  }

  mutate {
    replace => {
      "token_vuln.severity_details" => "%{severity}"
    }
    on_error => "failed_to_get_severity"
  }

  mutate {
    replace => {
      "token_status.value" => "%{status}"
    }
    on_error => "failed_to_get_status"
  }

  if ![failed_to_get_status] {
    mutate {
      replace => {
        "token_status.key" => "status"
      }
    }

    mutate {
      merge => {
        "token_vuln.about.labels" => "token_status"
      }
    }
  }

  mutate {
    replace => {
      "first_threat_tag" => "0"
    }
  }

  for threatTag in threatTags {
    if [threatTag] != "" {
      if [first_threat_tag] == "0" {
        mutate {
          replace => {
            "temp_threat_tag" => "%{threatTag}"
          }
          on_error => "failed_to_get_threat_tag"
        }

        if ![failed_to_get_threat_tag] {
          mutate {
            replace => {
              "first_threat_tag" => "1"
            }
          }
        }
      }
      else {
        mutate {
          replace => {
            "temp_threat_tag" => "%{temp_threat_tag}, %{threatTag}"
          }
          on_error => "failed_to_get_threat_tag"
        }
      }
    }
  }

  mutate {
    replace => {
      "token_threat_tag.value" => "%{temp_threat_tag}"
    }
    on_error => "failed_to_get_threat_tags"
  }

  if ![failed_to_get_threat_tags] {
    mutate {
      replace => {
        "token_threat_tag.key" => "threat_tags"
      }
    }

    mutate {
      merge => {
        "token_vuln.about.labels" => "token_threat_tag"
      }
    }
  }

  mutate {
    replace => {
      "token_user_interaction.value" => "%{userInteraction}"
    }
    on_error => "failed_to_get_user_interaction"
  }

  if ![failed_to_get_user_interaction] {
    mutate {
      replace => {
        "token_user_interaction.key" => "user_interaction"
      }
    }

    mutate {
      merge => {
        "token_about.labels" => "token_user_interaction"
      }
    }
  }

  mutate {
    merge => {
      "about" => "token_about"
    }
    on_error => "failed_to_merge_about"
  }

  mutate {
    merge => {
      "extensions.vulns.vulnerabilities" => "token_vuln"
    }
    on_error => "failed_to_merge_vuln"
  }

  mutate {
    merge => {
      "security_result" => "token_security_result"
    }
    on_error => "failed_to_merge_security_result"
  }

  mutate {
    rename => {
      "about" => "event.idm.read_only_udm.about"
      "extensions" => "event.idm.read_only_udm.extensions"
      "metadata" => "event.idm.read_only_udm.metadata"
      "principal" => "event.idm.read_only_udm.principal"
      "security_result" => "event.idm.read_only_udm.security_result"
    }
  }

  mutate {
    merge => {
      "@output" => "event"
    }
  }
}
