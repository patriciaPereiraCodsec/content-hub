# Product: OPENAI_AUDITLOG
# Category: NDR
# Supported Format: JSON
# Reference: N/A
# Last Updated: 2025-03-20
# Copyright 2025 Google SecOps
filter {
  mutate {
    replace => {
      "event" => ""
      "principal" => ""
      "target" => ""
      "network" => ""
      "security_result" => ""
      "has_principal" => "false"
      "has_user" => "false"
      "has_file" => "false"
      "actor.session.ip_address_details" => ""
      "actor.session.ip_address" => ""
      "actor.session.user.email" => ""
      "actor.session.user_agent" => ""
      "actor.session.user.id" => ""
      "actor_session_ja4_label" => ""
      "no_actor_session_ja4" => ""
      "actor.session.ja4" => ""
      "actor.session.ja3" => ""
      "actor_session_region_code_label" => ""
      "no_actor_session_region_code" => ""
      "actor.session.ip_address_details.region_code" => ""
      "actor_session_asn_label" => ""
      "no_actor_session_asn" => ""
      "actor.session.ip_address_details.asn" => ""
      "actor.session.ip_address_details.latitude" => ""
      "actor.session.ip_address_details.longitude" => ""
      "effective_at" => ""
      "type" => ""
      "has_target" => "false"
      "has_source_file" => "false"
    }
  }

  json {
    source => "message"
    array_function => "split_columns"
    on_error => "json_failed"
  }
  if [actor][session][ip_address] != "" {
    mutate {
      merge => {
        "principal.ip" => "actor.session.ip_address"
        "principal.asset.ip" => "actor.session.ip_address"
      }
      on_error => "no_principal_ip"
    }
    mutate {
      replace => {
        "has_principal" => "true"
      }
      on_error => "no_has_principal"
    }
  }
  mutate {
    replace => {
      "actor_session_user_id" => "%{actor.session.user.id}"
    }
    on_error => "no_actor_session_ip_address_details"
  }
  if ![no_actor_session_ip_address_details] {
    if [actor][session][user][id] != "" {
      grok {
        match => {
          "actor_session_user_id" => [
            "%{DATA}-%{GREEDYDATA:user_id}"
          ]
        }
        overwrite => ["user_id"]
        on_error => "no_grok_session_user_id"
      }
      mutate {
        replace => {
          "principal.user.userid" => "%{user_id}"
        }
        on_error => "no_principal_user_id"
      }
      mutate {
        replace => {
          "has_user" => "true"
        }
        on_error => "no_has_user"
      }
    }
  }
  if [actor][session][user][email] != "" {
    mutate {
      merge => {
        "principal.user.email_addresses" => "actor.session.user.email"
      }
      on_error => "no_principal_user_email"
    }
  }
  if [actor][session][user_agent] != "" {
    mutate {
      replace => {
        "network.http.user_agent" => "%{actor.session.user_agent}"
      }
      on_error => "no_actor_user_agent"
    }
    if ![no_actor_user_agent] {
    mutate {
      convert => {
        "network.http.user_agent" => "parseduseragent"
      }
      on_error => "no_parsed_user_agent"
    }
    mutate {
      rename => {
        "network.http.user_agent" => "network.http.parsed_user_agent"
      }
      on_error => "no_parsed_user_agent"
    }
  }

  }
  if [actor][session][ja3] != "" {
    mutate {
      replace => {
        "network.tls.client.ja3" => "%{actor.session.ja3}"
      }
      on_error => "no_principal_ja4"
    }
  }
  if [actor][session][ja4] != "" {
    mutate {
      replace => {
        "actor_session_ja4_label.key" => "ja4"
        "actor_session_ja4_label.value" => "%{actor.session.ja4}"
      }
      on_error => "no_actor_session_ja4"
    }
    if ![no_actor_session_ja4] {
      mutate {
        merge => {
          "security_result.detection_fields" => "actor_session_ja4_label"
        }
        on_error => "no_security_result_ja4"
      }
    }
  }
  if [actor][session][ip_address_details][country] != "" {
    mutate {
      replace => {
        "principal.location.country_or_region" => "%{actor.session.ip_address_details.country}"
      }
      on_error => "no_principal_country"
    }
  }
  if [actor][session][ip_address_details][city] != "" {
    mutate {
      replace => {
        "principal.location.city" => "%{actor.session.ip_address_details.city}"
      }
      on_error => "no_principal_city"
    }
  }
  if [actor][session][ip_address_details][region] != "" {
    mutate {
      replace => {
        "principal.location.state" => "%{actor.session.ip_address_details.region}"
      }
      on_error => "no_principal_region"
    }
  }
  if [actor][session][ip_address_details][region_code] != "" {
    mutate {
      replace => {
        "actor_session_region_code_label.key" => "region_code"
        "actor_session_region_code_label.value.string_value" => "%{actor.session.ip_address_details.region_code}"
      }
      on_error => "no_actor_session_region_code"
    }
    if ![no_actor_session_region_code] {
      mutate {
        merge => {
          "event.idm.read_only_udm.additional.fields" => "actor_session_region_code_label"
        }
        on_error => "no_security_result_region_code"
      }
    }
  }
  if [actor][session][ip_address_details][asn] != "" {
    mutate {
      replace => {
        "actor_session_asn_label.key" => "asn"
        "actor_session_asn_label.value.string_value" => "%{actor.session.ip_address_details.asn}"
      }
      on_error => "no_actor_session_asn"
    }
    if ![no_actor_session_asn] {
      mutate {
        merge => {
          "event.idm.read_only_udm.additional.fields" => "actor_session_asn_label"
        }
        on_error => "no_security_result_asn"
      }
    }
  }
  if [actor][session][ip_address_details][latitude] != "" {
    mutate {
      convert => {
        "actor.session.ip_address_details.latitude" => "float"
      }
      on_error => "no_principal_latitude"
    }
    mutate {
      rename => {
        "actor.session.ip_address_details.latitude" => "principal.location.region_latitude"
      }
      on_error => "no_principal_latitude"
    }
  }
  if [actor][session][ip_address_details][longitude] != "" {
    mutate {
      convert => {
        "actor.session.ip_address_details.longitude" => "float"
      }
      on_error => "no_principal_longitude"
    }
    mutate {
      rename => {
        "actor.session.ip_address_details.longitude" => "principal.location.region_longitude"
      }
      on_error => "no_principal_longitude"
    }
  }
  if [effective_at] != "" {
    mutate {
      convert => {
        "effective_at" => "string"
      }
      on_error => "no_effective_at"
    }
    date {
      match => ["effective_at", "UNIX"]
      target => "metadata.event_timestamp"
      on_error => "format_not_match"
    }
  }
  if [type] != "" {
    mutate {
      replace => {
        "security_result.summary" => "%{type}"
      }
      on_error => "no_type"
    }
  }


  if [has_principal] == "true" {
    mutate{
      replace => {
        "metadata.event_type" => "STATUS_UPDATE"
      }
    }
  }
  else if [has_principal] == "true" and [has_target] == "true" {
    mutate {
      replace => {
        "metadata.event_type" => "NETWORK_CONNECTION"
      }
    }
  }
  else if [has_principal] == "true" and [has_file] == "true" {
    if [has_source_file] ==  "true" {
      mutate {
        replace => {
          "metadata.event_type" => "FILE_COPY"
        }
      }
    }
    else {
      mutate {
        replace => {
          "metadata.event_type" => "FILE_UNCATEGORIZED"
        }
      }
    }
  }
  else if [has_user] == "true" {
    mutate {
      replace => {
        "metadata.event_type" => "USER_UNCATEGORIZED"
      }
    }
  }
  else {
    mutate {
      replace => {
        "metadata.event_type" => "GENERIC_EVENT"
      }
    }
  }

  mutate {
    replace => {
      "metadata.vendor_name" => "OPENAI_AUDITLOG"
      "metadata.product_name" => "OPENAI_AUDITLOG"
    }
  }

  if [metadata] != "" {
    mutate {
      rename => {
        "metadata" => "event.idm.read_only_udm.metadata"
      }
    }
  }
  if [principal] != "" {
    mutate {
      rename => {
        "principal" => "event.idm.read_only_udm.principal"
      }
    }
  }
  if [target] != "" {
    mutate {
      rename => {
        "target" => "event.idm.read_only_udm.target"
      }
    }
  }
  if [network] != "" {
    mutate {
      rename => {
        "network" => "event.idm.read_only_udm.network"
      }
    }
  }
  if [security_result] != "" {
    mutate {
      merge => {
        "event.idm.read_only_udm.security_result" => "security_result"
      }
      on_error => "no_security_result"
    }
  }
  if [json_failed] {
    drop {
      tag => "TAG_MALFORMED_MESSAGE"
    }
  }
  mutate {
    merge => {
      "@output" => "event"
    }
  }
}

