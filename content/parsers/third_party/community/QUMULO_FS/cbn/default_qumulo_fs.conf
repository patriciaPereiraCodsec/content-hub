# Product: QUMULO_FS
# Category: File System
# Supported Format: SYSLOG
# Reference: https://care.qumulo.com/s/article/Using-Audit-Logging-in-Qumulo-Core?
# Last Updated: 2024-05-09
# Copyright 2024 Chronicle LLC

filter {
  mutate {
    replace => {
      "intermediary" => ""
      "event" => ""
      "principal" => ""
      "target" => ""
      "security_result" => ""
      "network" => ""
      "metadata" => ""
      "timestamp" => ""
      "inter_hostname" => ""
      "csv_data" => ""
      "source_ip" => ""
      "has_principal" => "false"
      "has_target_user" => "false"
      "has_target_file" => "false"
    }
  }

  grok {
    match => {
      "message" => [
        "<%{INT}>%{INT} %{TIMESTAMP_ISO8601:timestamp} %{HOSTNAME:inter_hostname}-%{INT} qumulo - - - %{GREEDYDATA:csv_data}"
      ]
    }
    overwrite => ["timestamp","inter_hostname","csv_data"]
    on_error => "no_message"
  }

  if [csv_data] != "" {
    csv {
      source => "message"
      separator => ","
      on_error => "csv_failed"
    }
  }

  if [timestamp] != "" {
    date {
      match => ["timestamp","yyyy-MM-dd'T'HH:mm:ss.SSSSSSZ"]
      on_error => "no_timestamp"
    }
  }

  if [inter_hostname] != "" {
    mutate {
      replace => {
        "intermediary.hostname" => "%{inter_hostname}"
      }
      on_error => "no_inter_hostname"
    }
  }

  if [column1] != "" {
    grok {
      match => {
        "column1" => "%{IP:source_ip}"
      }
      on_error => "invalid_ip"
      overwrite => ["source_ip"]
    }
    if ![invalid_ip] {
      mutate {
        merge => {
          "principal.ip" => "source_ip"
          "principal.asset.ip" => "source_ip"
        }
        on_error => "no_source_ip"
      }
      if ![no_source_ip] {
        mutate {
          replace => {
            "has_principal" => "true"
          }
        }
      }
    }
  }

  if [column4] != "" {
    mutate {
      replace => {
        "prod_event_type" => "%{column4}"
      }
      on_error => "no_column4"
    }
  }

  if [column2] != "" {
    if [prod_event_type] !~ "login" {
      mutate {
        replace => {
          "principal.user.userid" => "%{column2}"
        }
        on_error => "no_column2"
      }
    }
    else {
      mutate {
        replace => {
          "target.user.userid" => "%{column2}"
          "has_target_user" => "true"
        }
        on_error => "no_column2"
      }
    }
  }

  if [column3] != "" {
    if [column3] =~ "smb" {
      mutate {
        replace => {
          "network.application_protocol" => "SMB"
        }
      }
    }
    else if [column3] =~ "nfs" {
      mutate {
        replace => {
          "network.application_protocol" => "NFS"
        }
      }
    }
    else {
      mutate {
        replace => {
          "protocol_label.value" => "%{column3}"
          "protocol_label.key" => "protocol"
        }
        on_error => "no_column3"
      }
      if ![no_column3] {
        mutate {
          merge => {
            "security_result.detection_fields" => "protocol_label"
          }
          on_error => "no_protocol_label"
        }
      }
    }
  }

  if [prod_event_type] != "" {
    mutate {
      replace => {
        "metadata.product_event_type" => "%{prod_event_type}"
      }
      on_error => "no_prod_event_type"
    }
  }

  if [column5] != "" {
    mutate {
      replace => {
        "security_result.summary" => "%{column5}"
      }
      on_error => "no_column5"
    }
  }

  if [column6] != "" {
    mutate {
      replace => {
        "file_id_label.value" => "%{column6}"
        "file_id_label.key" => "file_id"
      }
      on_error => "no_column6"
    }
    if ![no_column6] {
      mutate {
        merge => {
          "security_result.detection_fields" => "file_id_label"
        }
        on_error => "no_file_id_label"
      }
    }
  }

  if [column7] != "" {
    mutate {
      replace => {
        "target.file.full_path" => "%{column7}"
        "has_target_file" => "true"
      }
      on_error => "no_column7"
    }
  }

  if [has_principal] == "true" and [has_target_user] == "true" and [prod_event_type] =~ "login" {
    mutate {
      replace => {
        "metadata.event_type" => "USER_LOGIN"
        "event.idm.read_only_udm.extensions.auth.type" => "AUTHTYPE_UNSPECIFIED"
      }
    }
  }
  else if [has_principal] == "true" and [has_target_file] == "true" {
    if [prod_event_type] =~ "fs_read" {
      mutate {
        replace => {
          "metadata.event_type" => "FILE_READ"
        }
      }
    }
    else if [prod_event_type] =~ "fs_write" {
      mutate {
        replace => {
          "metadata.event_type" => "FILE_MODIFICATION"
        }
      }
    }
    else if [prod_event_type] =~ "fs_open" {
      mutate {
        replace => {
          "metadata.event_type" => "FILE_OPEN"
        }
      }
    }
    else if [prod_event_type] =~ "fs_create" {
      mutate {
        replace => {
          "metadata.event_type" => "FILE_CREATION"
        }
      }
    }
    else if [prod_event_type] =~ "fs_delete" {
      mutate {
        replace => {
          "metadata.event_type" => "FILE_DELETION"
        }
      }
    }
    else {
      mutate {
        replace => {
          "metadata.event_type" => "FILE_UNCATEGORIZED"
        }
      }
    }
  }
  else if [has_principal] == "true" {
    mutate {
      replace => {
        "metadata.event_type" => "STATUS_UPDATE"
      }
    }
  }
  else {
    mutate {
      replace => {
        "metadata.event_type" => "GENERIC_EVENT"
      }
    }
  }

  mutate {
    replace => {
      "metadata.product_name" => "QUMULO_FS"
      "metadata.vendor_name" => "QUMULO_FS"
    }
  }

  if [principal] != "" {
    mutate {
      rename => {
        "principal" => "event.idm.read_only_udm.principal"
      }
    }
  }

  if [target] != "" {
    mutate {
      rename => {
        "target" => "event.idm.read_only_udm.target"
      }
    }
  }

  if [metadata] != "" {
    mutate {
      rename => {
        "metadata" => "event.idm.read_only_udm.metadata"
      }
    }
  }

  if [network] != "" {
    mutate {
      rename => {
        "network" => "event.idm.read_only_udm.network"
      }
    }
  }

  if [intermediary] != "" {
    mutate {
      merge => {
        "event.idm.read_only_udm.intermediary" => "intermediary"
      }
      on_error => "no_intermediary"
    }
  }

  if [security_result] != "" {
    mutate {
      merge => {
        "event.idm.read_only_udm.security_result" => "security_result"
      }
      on_error => "no_security_result"
    }
  }

  mutate {
    merge => {
      "@output" => "event"
    }
  }
}
