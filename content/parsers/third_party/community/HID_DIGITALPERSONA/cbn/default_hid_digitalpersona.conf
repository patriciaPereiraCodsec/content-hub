# Product: HID_DIGITALPERSONA
# Category: Audit Log
# Supported Format: JSON, SYSLOG + KV
# Last Updated: 2024-05-24
# Copyright 2024 Chronicle LLC

filter {
    mutate {
        replace => {
            "metadata" => ""
            "principal" => ""
            "target" => ""
            "security_result" => ""
            "additional" => ""
            "extensions" => ""
            "syslog" => ""
            "syslogkv" => ""
            "about" => ""
        }
    }

    json {
        source => "message"
        on_error => "invalid_json"
    }

    if ![invalid_json] {

        mutate {
            replace => {
                "metadata.vendor_name" => "HID"
            }
        }

        mutate {
            replace => {
                "metadata.product_name" => "DigitalPersona"
            }
        }


        mutate {
            replace => {
                "metadata.product_event_type" => "%{System.EventId}"
            }
            on_error => "no_system_event_id"
        }

        mutate {
            convert => {
                "System.Version" => "string"
            }
            on_error => "invalid_system_version"
        }
        mutate {
            replace => {
                "system_version.value.string_value" => "%{System.Version}"
            }
            on_error => "no_system_version"
        }
        if ![no_system_version] and [System][Version] != "" {
            mutate {
                replace => {
                    "system_version.key" => "System Version"
                }
            }
            mutate {
                merge => {
                    "additional.fields" => "system_version"
                }
                on_error => "_"
            }
        }

        mutate {
            convert => {
                "System.Channel" => "string"
            }
            on_error => "invalid_system_channel"
        }
        mutate {
            replace => {
                "system_channel.value.string_value" => "%{System.Channel}"
            }
            on_error => "no_system_channel"
        }
        if ![no_system_channel] and [System][Channel] != "" {
            mutate {
                replace => {
                    "system_channel.key" => "System Channel"
                }
            }
            mutate {
                merge => {
                    "additional.fields" => "system_channel"
                }
                on_error => "_"
            }
        }

        mutate {
            replace => {
                "principal.application" => "%{System.ProviderName}"
            }
            on_error => "no_system_provider_name"
        }

        mutate {
            replace => {
                "principal.hostname" => "%{System.Computer}"
            }
            on_error => "no_system_computer"
        }

        mutate {
            replace => {
                "metadata.product_log_id" => "%{System.EventRecordID}"
            }
            on_error => "no_system_event_record_id"
        }

        mutate {
            convert => {
                "System.Keywords" => "string"
            }
            on_error => "invalid_system_keywords"
        }
        mutate {
            replace => {
                "system_keywords.value.string_value" => "%{System.Keywords}"
            }
            on_error => "no_system_keywords"
        }
        if ![no_system_keywords] and [System][Keywords] != "" {
            mutate {
                replace => {
                    "system_keywords.key" => "System Keywords"
                }
            }
            mutate {
                merge => {
                    "additional.fields" => "system_keywords"
                }
                on_error => "_"
            }
        }

        mutate {
            replace => {
                "security_result.severity_details" => "%{System.Level}"
            }
            on_error => "no_system_level"
        }

        if ![no_system_level] and [System][Level] != "" {
            if [System][Level] == "Information" {
                mutate {
                    replace => {
                        "security_result.severity" => "INFORMATIONAL"
                    }
                }
            }
            else if [System][Level] == "Warning" {
                mutate {
                    replace => {
                        "security_result.severity" => "LOW"
                    }
                }
            }
            else {
                mutate {
                    replace => {
                        "security_result.severity" => "UNKNOWN_SEVERITY"
                    }
                }
            }
        }

        mutate {
            convert => {
                "System.Opcode" => "string"
            }
            on_error => "invalid_system_opcode"
        }
        mutate {
            replace => {
                "system_opcode.value.string_value" => "%{System.Opcode}"
            }
            on_error => "no_system_opcode"
        }
        if ![no_system_opcode] and [System][Opcode] != "" {
            mutate {
                replace => {
                    "system_opcode.key" => "System Opcode"
                }
            }
            mutate {
                merge => {
                    "additional.fields" => "system_opcode"
                }
                on_error => "_"
            }
        }

        mutate {
            replace => {
                "metadata.description" => "%{System.Task}"
            }
            on_error => "no_system_task"
        }

        mutate {
            replace => {
                "principal.process.pid" => "%{System.ProcessID}"
            }
            on_error => "no_system_process_id"
        }

        mutate {
            convert => {
                "System.ThreadID" => "string"
            }
            on_error => "invalid_system_thread_id"
        }
        mutate {
            replace => {
                "system_thread_id.value.string_value" => "%{System.ThreadID}"
            }
            on_error => "no_system_thread_id"
        }
        if ![no_system_thread_id] and [System][ThreadID] != "" {
            mutate {
                replace => {
                    "system_thread_id.key" => "System ThreadID"
                }
            }
            mutate {
                merge => {
                    "additional.fields" => "system_thread_id"
                }
                on_error => "_"
            }
        }

        date {
            match => ["System.TimeCreated","UNIX_MS"]
            on_error => "no_system_time_created"
        }

        mutate {
            replace => {
                "target.user.userid" => "%{System.UserId}"
            }
            on_error => "no_system_user_id"
        }

        mutate {
            convert => {
                "EventData.Credential" => "string"
            }
            on_error => "invalid_event_data_cred"
        }
        mutate {
            replace => {
                "event_data_cred.value.string_value" =>
                "%{EventData.Credential}"
            }
            on_error => "no_event_data_cred"
        }
        if ![no_event_data_cred] and [EventData][Credential] != "" {
            mutate {
                replace => {
                    "event_data_cred.key" => "EventData Credential"
                }
            }
            mutate {
                merge => {
                    "additional.fields" => "event_data_cred"
                }
                on_error => "_"
            }
        }


        mutate {
            replace => {
                "target.domain.name" => "%{EventData.UserDomain}"
            }
            on_error => "no_event_data_user_domain"
        }

        mutate {
            replace => {
                "target.user.user_display_name" => "%{EventData.UserName}"
            }
            on_error => "no_event_data_user_name"
        }

        mutate {
            replace => {
                "principal.domain.name" => "%{EventData.InitiatorDomain}"
            }
            on_error => "no_event_data_initiator_domain"
        }

        mutate {
            replace => {
                "principal.user.userid" => "%{EventData.InitiatorName}"
            }
            on_error => "no_event_data_initiator_name"
        }

        mutate {
            convert => {
                "EventData.DataName" => "string"
            }
            on_error => "invalid_event_data_dataname"
        }
        mutate {
            replace => {
                "event_data_dataname.value.string_value" =>
                "%{EventData.DataName}"
            }
            on_error => "no_event_data_dataname"
        }
        if ![no_event_data_dataname] and [EventData][DataName] != "" {
            mutate {
                replace => {
                    "event_data_dataname.key" => "EventData DataName"
                }
            }
            mutate {
                merge => {
                    "additional.fields" => "event_data_dataname"
                }
                on_error => "_"
            }
        }

        mutate {
            convert => {
                "EventData.CredentialMask" => "string"
            }
            on_error => "invalid_event_data_credential_mask"
        }
        mutate {
            replace => {
                "event_data_credential_mask.value.string_value" =>
                "%{EventData.CredentialMask}"
            }
            on_error => "no_event_data_credential_mask"
        }
        if ![no_event_data_credential_mask]
        and [EventData][CredentialMask] != "" {
            mutate {
                replace => {
                    "event_data_credential_mask.key" =>
                    "EventData CredentialMask"
                }
            }
            mutate {
                merge => {
                    "additional.fields" => "event_data_credential_mask"
                }
                on_error => "_"
            }
        }

        mutate {
            replace => {
                "security_result.description" => "%{EventData.Error}"
            }
            on_error => "no_event_data_error"
        }

        mutate {
            replace => {
                "metadata.event_type" => "GENERIC_EVENT"
            }
        }

        if [System][EventId] in ["260","262"] {
            if ![no_event_data_initiator_domain]  or
            ![no_system_computer]  or
            ![no_event_data_initiator_name]  or
            ![no_system_user_id]  or
            ![no_event_data_user_domain] {
                mutate {
                    replace => {
                        "metadata.event_type" => "USER_UNCATEGORIZED"
                    }
                }
            }

        }
        else if [System][EventId] == "533" {
            if ![no_system_user_id] and
            ![no_event_data_initiator_name] and
            ![no_system_computer] {
                mutate {
                    replace => {
                        "metadata.event_type" => "USER_DELETION"
                    }
                }
            }
            else if ![no_event_data_initiator_domain]  or
            ![no_system_computer]  or
            ![no_event_data_initiator_name]  or
            ![no_system_user_id]  or
            ![no_event_data_user_domain] {
                mutate {
                    replace => {
                        "metadata.event_type" => "USER_UNCATEGORIZED"
                    }
                }
            }
        }
        else if [System][EventId] in ["776","780"] {
            if ![no_system_computer] {
                mutate {
                    replace => {
                        "metadata.event_type" => "STATUS_UPDATE"
                    }
                }
            }
        }
        else if [System][EventId] == "2054" {
            if [target] != "" {
                mutate {
                    replace => {
                        "extensions.auth.type" => "AUTHTYPE_UNSPECIFIED"
                    }
                }
                mutate {
                    replace => {
                        "metadata.event_type" => "USER_LOGIN"
                    }
                }
            }
        }



    }


    if [invalid_json] {

        grok {
            match => {
                "message" =>
                "(?P<content_version_field>Content Version \\([a-zA-Z_\\+-=\\d]*\\))=(?P<content_version_field_value>[\\d+-_]*),"
            }
            on_error => "invalid_content_version"
        }

        if ![invalid_content_version] {
            mutate {
                replace => {
                    "token_content_version.value.string_value" =>
                    "%{content_version_field_value}"
                }
                on_error => "invalid_content_version_field_value"
            }
            if ![invalid_content_version_field_value]
            and [token_content_version][value][string_value] != "" {
                mutate {
                    replace => {
                        "token_content_version.key" =>
                        "%{content_version_field}"
                    }
                    on_error => "invalid_content_version_field"
                }
                if ![invalid_content_version_field] {
                    mutate {
                        merge => {
                            "additional.fields" => "token_content_version"
                        }
                    }
                }
            }
        }


        grok {
            match => {
                "message" => "?P<device_eventcount>Device \\[.*\\] eventcount=\\d+"
            }
            on_error => "invalid_device_eventcount"
        }

        if ![invalid_device_eventcount] {
            mutate {
                split => {
                    source => "device_eventcount"
                    separator => ","
                    target => "device_eventcount_arr"
                }
                on_error => "invalid_device_eventcount_arr"
            }
            if ![invalid_device_eventcount_arr] {
                for index,value in device_eventcount_arr {
                    mutate {
                        replace => {
                            "dhostname" => ""
                            "dip" => ""
                            "device_application" => ""
                            "device_subapplication" => ""
                            "device_event_count" => ""
                        }
                    }
                    grok {
                        match => {
                            "value" =>
                            "\\s*Device \\[%{DATA:dhostname}\\|%{IPV4:dip}\\|%{DATA:device_application}\\|%{DATA:device_subapplication}\\] eventcount=%{NUMBER:device_event_count}"
                        }
                        overwrite => ["dhostname",
                        "dip","device_application","device_subapplication",
                        "device_event_count"]
                        on_error => "invalid_device_value"
                    }

                    if ![invalid_device_value] {
                        mutate {
                            convert => {
                                "index" => "string"
                            }
                        }
                        mutate {
                            replace => {
                                "about_device" => ""
                                "token_device_subapplication" => ""
                                "token_device_event_count" => ""
                            }
                        }

                        mutate {
                            replace => {
                                "about_device.hostname" => "%{dhostname}"
                            }
                            on_error => "invalid_dhostname"
                        }
                        mutate {
                            merge => {
                                "about_device.ip" => "dip"
                            }
                            on_error => "invalid_dip"
                        }
                        mutate {
                            replace => {
                                "about_device.application" =>
                                "%{device_application}"
                            }
                            on_error => "invalid_device_application"
                        }

                        if [about_device] != "" {
                            mutate {
                                merge => {
                                    "event.idm.read_only_udm.about" =>
                                    "about_device"
                                }
                            }
                        }

                        mutate {
                            replace => {
                                "token_device_event_count.value.string_value" =>
                                "%{device_event_count}"
                            }
                            on_error => "no_device_event_count"
                        }
                        if ![no_device_event_count] 
                        and
                        [token_device_event_count][value][string_value] != "" {
                            mutate {
                                replace => {
                                    "token_device_event_count.key" =>
                                    "device_event_count_%{index} "
                                }
                            }
                            mutate {
                                merge => {
                                    "additional.fields" =>
                                    "token_device_event_count"
                                }
                            }
                        }

                        mutate {
                            replace => {
                                "token_device_subapplication.value.string_value" =>
                                "%{device_subapplication}"
                            }
                            on_error => "no_device_subapplication"
                        }
                        if ![no_device_subapplication]
                        and
                        [token_device_subapplication][value][string_value] != "" {
                            mutate {
                                replace => {
                                    "token_device_subapplication.key" =>
                                    "device_subapplication_%{index} "
                                }
                            }
                            mutate {
                                merge => {
                                    "additional.fields" =>
                                    "token_device_subapplication"
                                }
                            }
                        }
                    }
                }

            }
        }

        grok {
            match => {
                "message" => "?P<desc_data>desc=Transformation Hub\\[{.*\\}]"
            }
            on_error => "no_desc_data"
        }

        if ![no_desc_data] {
            grok {
                match => {
                    "desc_data" =>
                    "desc=Transformation Hub\\[{%{GREEDYDATA:desc_data}}\\]"
                }
                overwrite => ["desc_data"]
                on_error => "no_desc_data"
            }

            mutate {
                gsub => ["desc_data", "(,\\\s*)([0-9a-zA-Z_.-]+?)=", "^$2="]
            }

            if ![no_desc_data] {
                kv {
                    source => "desc_data"
                    field_split => "^"
                    value_split => "="
                    whitespace => "strict"
                    on_error => "invalid_desc_data"
                }
                if ![invalid_desc_data] {
                    mutate {
                        replace => {
                            "token_bootstraphosts.value.string_value" =>
                            "%{bootstraphosts}"
                        }
                        on_error => "no_bootstraphosts"
                    }
                    if ![no_bootstraphosts]
                    and [token_bootstraphosts][value][string_value] != "" {
                        mutate {
                            replace => {
                                "token_bootstraphosts.key" => "bootstraphosts"
                            }
                        }
                        mutate {
                            merge => {
                                "additional.fields" => "token_bootstraphosts"
                            }
                        }
                    }

                    mutate {
                        replace => {
                            "token_usessl.value.string_value" => "%{usessl}"
                        }
                        on_error => "no_usessl"
                    }
                    if ![no_usessl]
                    and [token_usessl][value][string_value] != "" {
                        mutate {
                            replace => {
                                "token_usessl.key" => "usessl"
                            }
                        }
                        mutate {
                            merge => {
                                "additional.fields" => "token_usessl"
                            }
                        }
                    }

                    mutate {
                        replace => {
                            "token_acknowledgementmode.value.string_value" =>
                            "%{acknowledgementmode}"
                        }
                        on_error => "no_acknowledgementmode"
                    }
                    if ![no_acknowledgementmode]
                    and [token_acknowledgementmode][value][string_value] != "" {
                        mutate {
                            replace => {
                                "token_acknowledgementmode.key" =>
                                "acknowledgementmode"
                            }
                        }
                        mutate {
                            merge => {
                                "additional.fields" =>
                                "token_acknowledgementmode"
                            }
                        }
                    }

                    mutate {
                        replace => {
                            "token_contenttype.value.string_value" =>
                            "%{contenttype}"
                        }
                        on_error => "no_contenttype"
                    }
                    if ![no_contenttype]
                    and [token_contenttype][value][string_value] != "" {
                        mutate {
                            replace => {
                                "token_contenttype.key" => "contenttype"
                            }
                        }
                        mutate {
                            merge => {
                                "additional.fields" => "token_contenttype"
                            }
                        }
                    }

                    mutate {
                        replace => {
                            "token_topic.value.string_value" => "%{topic}"
                        }
                        on_error => "no_topic"
                    }
                    if ![no_topic]
                    and [token_topic][value][string_value] != "" {
                        mutate {
                            replace => {
                                "token_topic.key" => "topic"
                            }
                        }
                        mutate {
                            merge => {
                                "additional.fields" => "token_topic"
                            }
                        }
                    }

                    mutate {
                        replace => {
                            "token_compression_type.value.string_value" =>
                            "%{compression.type}"
                        }
                        on_error => "no_compression_type"
                    }
                    if ![no_compression_type]
                    and [token_compression_type][value][string_value] != "" {
                        mutate {
                            replace => {
                                "token_compression_type.key" =>
                                "compression type"
                            }
                        }
                        mutate {
                            merge => {
                                "additional.fields" => "token_compression_type"
                            }
                        }
                    }

                    mutate {
                        replace => {
                            "token_esmversion.value.string_value" =>
                            "%{esmversion}"
                        }
                        on_error => "no_esmversion"
                    }
                    if ![no_esmversion]
                    and [token_esmversion][value][string_value] != "" {
                        mutate {
                            replace => {
                                "token_esmversion.key" => "esmversion"
                            }
                        }
                        mutate {
                            merge => {
                                "additional.fields" => "token_esmversion"
                            }
                        }
                    }

                    mutate {
                        replace => {
                            "token_schemaregistryhosts.value.string_value" =>
                            "%{schemaregistryhosts}"
                        }
                        on_error => "no_schemaregistryhosts"
                    }
                    if ![no_schemaregistryhosts]
                    and [token_schemaregistryhosts][value][string_value] != "" {
                        mutate {
                            replace => {
                                "token_schemaregistryhosts.key" =>
                                "schemaregistryhosts"
                            }
                        }
                        mutate {
                            merge => {
                                "additional.fields" =>
                                "token_schemaregistryhosts"
                            }
                        }
                    }

                    mutate {
                        replace => {
                            "token_truststoreloc.value.string_value" =>
                            "%{truststoreloc}"
                        }
                        on_error => "no_truststoreloc"
                    }
                    if ![no_truststoreloc]
                    and [token_truststoreloc][value][string_value] != "" {
                        mutate {
                            replace => {
                                "token_truststoreloc.key" => "truststoreloc"
                            }
                        }
                        mutate {
                            merge => {
                                "additional.fields" => "token_truststoreloc"
                            }
                        }
                    }

                    mutate {
                        replace => {
                            "token_truststorepass.value.string_value" =>
                            "%{truststorepass}"
                        }
                        on_error => "no_truststorepass"
                    }
                    if ![no_truststorepass]
                    and [token_truststorepass][value][string_value] != "" {
                        mutate {
                            replace => {
                                "token_truststorepass.key" => "truststorepass"
                            }
                        }
                        mutate {
                            merge => {
                                "additional.fields" => "token_truststorepass"
                            }
                        }
                    }

                    mutate {
                        replace => {
                            "token_usesslauth.value.string_value" =>
                            "%{usesslauth}"
                        }
                        on_error => "no_usesslauth"
                    }
                    if ![no_usesslauth]
                    and [token_usesslauth][value][string_value] != "" {
                        mutate {
                            replace => {
                                "token_usesslauth.key" => "usesslauth"
                            }
                        }
                        mutate {
                            merge => {
                                "additional.fields" => "token_usesslauth"
                            }
                        }
                    }

                    mutate {
                        replace => {
                            "token_keystoreloc.value.string_value" =>
                            "%{keystoreloc}"
                        }
                        on_error => "no_keystoreloc"
                    }
                    if ![no_keystoreloc]
                    and [token_keystoreloc][value][string_value] != "" {
                        mutate {
                            replace => {
                                "token_keystoreloc.key" => "keystoreloc"
                            }
                        }
                        mutate {
                            merge => {
                                "additional.fields" => "token_keystoreloc"
                            }
                        }
                    }

                    mutate {
                        replace => {
                            "token_keystorepass.value.string_value" =>
                            "%{keystorepass}"
                        }
                        on_error => "no_keystorepass"
                    }
                    if ![no_keystorepass]
                    and [token_keystorepass][value][string_value] != "" {
                        mutate {
                            replace => {
                                "token_keystorepass.key" => "keystorepass"
                            }
                        }
                        mutate {
                            merge => {
                                "additional.fields" => "token_keystorepass"
                            }
                        }
                    }

                    mutate {
                        replace => {
                            "token_keypass.value.string_value" => "%{keypass}"
                        }
                        on_error => "no_keypass"
                    }
                    if ![no_keypass]
                    and [token_keypass][value][string_value] != "" {
                        mutate {
                            replace => {
                                "token_keypass.key" => "keypass"
                            }
                        }
                        mutate {
                            merge => {
                                "additional.fields" => "token_keypass"
                            }
                        }
                    }
                }
            }

        }

        mutate {
            gsub =>
            ["message","Device \\[.*?\\] eventcount=", "Device eventcount="]
            on_error => "invalid_device_eventcount"
        }

        mutate {
            gsub =>
            ["message",
            "desc=Transformation Hub\\[{.*\\}]", "desc=Transformation Hub"]
            on_error => "inavalid_desc"
        }

        grok {
            match => {
                "message" => "%{DATA:syslog}{%{GREEDYDATA:syslogkv}}"
            }
            overwrite => ["syslog","syslogkv"]
            on_error => "invalid_syslog"
        }

        if ![invalid_syslog] {
            grok {
                match => {
                    "syslog" => "\\[%{TIMESTAMP_ISO8601:syslog_timestamp},%{NUMBER:dummy}\\]\\[%{DATA:level}\\]\\[%{DATA:device_hostname}\\]"
                }
                on_error => "invalid_syslog_header"
            }
