      mutate {
        merge => {
          "additional.fields" => "facility_label"
        }
        on_error => "facility_label_merge_failed"
      }
    }
  }
  if [result] =~ "(?i)Success" {
    mutate {
      replace => {
        "security_result_action" => "ALLOW"
      }
    }
  }
  else if [result] =~ "(?i)failure" {
    mutate {
      replace => {
        "security_result_action" => "BLOCK"
      }
    }
  }
  if [security_result_action] != "" {
