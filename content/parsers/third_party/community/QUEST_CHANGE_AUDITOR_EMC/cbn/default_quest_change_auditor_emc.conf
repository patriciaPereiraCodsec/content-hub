      }
      on_error => "no_categoryBehavior"
    }
  }
  if [facility] != "" {
    mutate {
      replace => {
        "facility_label.key" => "Facility"
        "facility_label.value.string_value" => "%{facility}"
      }
      on_error => "facility_invalid"
    }
