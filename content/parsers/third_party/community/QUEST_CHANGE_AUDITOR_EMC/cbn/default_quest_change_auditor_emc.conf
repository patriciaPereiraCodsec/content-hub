        "principal.user.windows_sid" => "%{UserID}"
      }
      on_error => "no_UserID"
    }
  }

  if [AccountType] != "" {
    mutate {
      replace => {
        "roles.name" => "%{AccountType}"
      }
      on_error => "no_AccountType"
    }

    if ![no_AccountType] {
      mutate {
        merge => {
          "principal.user.attribute.roles" => "roles"
        }
        on_error => "no_AccountType"
      }
    }
  }

  if [Category] != "" {
    mutate {
      replace => {
        "security_result.summary" => "%{Category}"
      }
      on_error => "no_Category"
    }
  }

  if [Opcode] != "" {
    mutate {
      replace => {
        "opcode_label.value.string_value" => "%{Opcode}"
      }
      on_error => "opcode_label_not_present"
    }
    if ![opcode_label_not_present] and [Opcode] != "" {
      mutate {
        replace => {
          "opcode_label.key" => "Opcode"
        }
      }
      mutate {
        merge => {
          "additional.fields" => "opcode_label"
        }
        on_error => "opcode_label_not_present"
      }
    }
  }

  if [EventReceivedTime] != "" {
    date {
      match => ["EventReceivedTime", "UNIX_MS"]
      target => "metadata.ingested_timestamp"
      on_error => "invalid_format"
    }
  }

  if [SourceModuleName] != "" {
    mutate {
      replace => {
        "source_module_name_label.value" => "%{SourceModuleName}"
      }
      on_error => "source_module_name_label_not_present"
    }
    if ![source_module_name_label_not_present] and [SourceModuleName] != "" {
      mutate {
        replace => {
          "source_module_name_label.key" => "SourceModuleName"
        }
      }
      mutate {
        merge => {
          "observer.resource.attribute.labels" => "source_module_name_label"
        }
        on_error => "source_module_name_label_not_present"
      }
    }
  }

  if [SourceModuleType] != "" {
    mutate {
      replace => {
        "observer.application" => "%{SourceModuleType}"
      }
      on_error => "no_SourceModuleType"
    }
  }

  if [EventID] in ["500", "501", "506", "507"] {
    grok {
      match => {
        "Message" => "%{DATA:description}\\s*Filer Name:\\s*%{GREEDYDATA:filer_name}\\s*Path:\\s*%{GREEDYDATA:file_path}\\s*DNS name \\/ IP Address:\\s*%{GREEDYDATA:ip_or_host}"
      }
      on_error => "grok_failed_0"
      overwrite => ["description", "filer_name", "file_path", "ip_or_host"]
    }
    if ![grok_failed_0] {
      if [file_path] != "" {
        mutate {
          gsub => ["file_path", "\\r \\t",""]
        }
        if [EventID] in ["500", "506"] {
          mutate {
            replace => {
              "event_type" => "FILE_CREATION"
            }
          }
        }
        else if [EventID] in ["501", "507"] {
          mutate {
            replace => {
              "event_type" => "FILE_DELETION"
            }
          }
        }
        mutate {
          replace => {
            "target.process.file.full_path" => "%{file_path}"
            "target.file.full_path" => "%{file_path}"
          }
          on_error => "no_file_path"
        }
      }
    }
  }
  else if [EventID] in ["502", "503", "508", "509"] {
    mutate {
      gsub => ["Message", "New Path", "New_File"]
    }
    grok {
      match => {
        "Message" => "%{DATA:description}\\s*Filer Name:\\s*%{GREEDYDATA:filer_name}\\s*Path:\\s*%{GREEDYDATA:file_path}\\s*New_File:\\s*%{GREEDYDATA:new_path}\\s*DNS name \\/ IP Address:\\s*%{GREEDYDATA:ip_or_host}"
      }
      on_error => "grok_failed_0"
      overwrite => ["description", "filer_name", "file_path", "ip_or_host", "new_path"]
    }
    if ![grok_failed_0] {
      if [file_path] != "" and [new_path] != "" {
        mutate {
          replace => {
            "event_type" => "FILE_MOVE"
          }
        }
      }
      if [file_path] != "" {
        mutate {
          gsub => ["file_path", "\\r \\t",""]
        }
        mutate {
          replace => {
            "src.process.file.full_path" => "%{file_path}"
            "src.file.full_path" => "%{file_path}"
          }
          on_error => "no_file_path"
        }
      }
      if [new_path] != "" {
        mutate {
          gsub => ["new_path", "\\r \\t",""]
        }
        mutate {
          replace => {
            "target.process.file.full_path" => "%{new_path}"
            "target.file.full_path" => "%{new_path}"
          }
          on_error => "no_new_path"
        }
      }
    }
  }
  else if [EventID] == "513" {
    grok {
      match => {
        "Message" => "%{DATA:description}\\s*Filer Name:\\s*%{GREEDYDATA:filer_name}\\s*Path:\\s*%{GREEDYDATA:file_path}\\s*DNS name \\/ IP Address:\\s*%{GREEDYDATA:ip_or_host}\\s*Data written:\\s*%{GREEDYDATA:temp_data}"
      }
      on_error => "grok_failed_0"
      overwrite => ["description", "filer_name", "file_path", "ip_or_host", "temp_data"]
    }
    if [file_path] != "" {
      mutate {
        gsub => ["file_path", "\\r \\t",""]
      }
      mutate {
        replace => {
          "event_type" => "FILE_MODIFICATION"
        }
      }
      mutate {
        replace => {
          "target.process.file.full_path" => "%{file_path}"
          "target.file.full_path" => "%{file_path}"
        }
        on_error => "no_file_path"
      }
    }
  }

  if [description] != "" {
    mutate {
      gsub => ["description", "\\r \\t",""]
    }
    mutate {
      replace => {
        "security_result.description" => "%{description}"
      }
      on_error => "no_description"
    }
  }

  if [filer_name] != "" {
    mutate {
      gsub => ["filer_name", "\\r \\t",""]
    }
    mutate {
      replace => {
        "filer_name_label.value" => "%{filer_name}"
      }
      on_error => "filer_name_label_not_present"
    }
    if ![filer_name_label_not_present] and [filer_name] != "" {
      mutate {
        replace => {
          "filer_name_label.key" => "Filer Name"
        }
      }
      mutate {
        merge => {
          "target.resource.attribute.labels" => "filer_name_label"
        }
        on_error => "filer_name_label_not_present"
      }
    }
  }

  if [ip_or_host] != "" {
    grok {
      match => {
        "ip_or_host" => "%{IP:ip_address}"
      }
      on_error => "not_an_ip"
      overwrite => ["ip_address"]
    }
    if [not_an_ip] {
      mutate {
        gsub => ["ip_or_host", "\\r \\t",""]
      }
      mutate {
        replace => {
          "target.hostname" => "%{ip_or_host}"
          "target.asset.hostname" => "%{ip_or_host}"
          "has_target_machine" => "true"
        }
        on_error => "no_host"
      }
    }
    else {
      mutate {
        merge => {
          "target.ip" => "ip_address"
          "target.asset.ip" => "ip_address"
        }
        on_error => "no_ip_address"
      }
      if ![no_ip_address] {
        mutate {
          replace => {
            "has_target_machine" => "true"
          }
        }
      }
    }
  }

  if [event_type] == "" or [event_type] == "GENERIC_EVENT" {
    if [event_data] == "Member added to group" or [event_data] == "User member-of added" or [event_data] == "Member removed from group" {
      mutate {
        replace => {
          "event_type" => "GROUP_MODIFICATION"
        }
      }
    }
     else if [event_data] =~ "(?i)password" {
      mutate {
        replace => {
          "event_type" => "USER_CHANGE_PASSWORD"
        }
      }
    }
    else if [event_data] =~ "(?i)user" {
      mutate {
        replace => {
          "event_type" => "USER_CHANGE_PERMISSIONS"
        }
      }
    }
    else if [event_data] == "Computer removed" {
      mutate {
        replace => {
          "event_type" => "USER_RESOURCE_DELETION"
        }
      }
    }
    else if [event_data] in ["computer changed", "computer operatingSystem changed"] {
      mutate {
        replace => {
          "event_type" => "USER_RESOURCE_UPDATE_PERMISSIONS"
        }
      }
    }
    else if [has_principal_machine] == "true" {
      mutate {
        replace => {
          "event_type" => "STATUS_UPDATE"
        }
      }
    }
    else {
      mutate {
        replace => {
          "event_type" => "GENERIC_EVENT"
        }
      }
    }
  }
  if [event_type] != "" {
    mutate {
      replace => {
        "metadata.event_type" => "%{event_type}"
      }
      on_error => "no_event_type"
    }
  }

  mutate {
    replace => {
      "metadata.product_name" => "Quest Change Auditor EMC"
      "metadata.vendor_name" => "Quest"
    }
  }

  # merge the data into udm nouns.
  if [metadata] != "" {
    mutate {
      rename => {
        "metadata" => "event.idm.read_only_udm.metadata"
      }
    }
  }
  if [principal] != "" {
    mutate {
      rename => {
        "principal" => "event.idm.read_only_udm.principal"
      }
    }
  }
  if [target] != "" {
    mutate {
      rename => {
        "target" => "event.idm.read_only_udm.target"
      }
    }
  }
  if [observer] != "" {
    mutate {
      rename => {
        "observer" => "event.idm.read_only_udm.observer"
      }
    }
  }
  if [src] != "" {
    mutate {
      rename => {
        "src" => "event.idm.read_only_udm.src"
      }
    }
  }
  if [additional] != "" {
    mutate {
      rename => {
        "additional" => "event.idm.read_only_udm.additional"
      }
    }
  }
  if [security_result] != "" {
    mutate {
      merge => {
        "event.idm.read_only_udm.security_result" => "security_result"
      }
    }
  }

  mutate {
    merge => {
      "@output" => "event"
    }
  }
}

