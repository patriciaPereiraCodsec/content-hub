# Product: Salesforce
# Category: SaaS Application
# Supported Format: SYSLOG, JSON
# Reference: NA
# Last Updated: 2024-10-03
# Copyright 2024 Chronicle LLC

filter {
  mutate {
    replace => {
      "csv_format" => "false"
      "not_json_format" => "false"
      "resource_name" => ""
      "event" => ""
      "createdDate" => ""
      "principal" => ""
      "target" => ""
      "network" => ""
      "metadata" => ""
      "extensions" => ""
      "src" => ""
    }
  }
  # Using grok instead of csv because we could get a
  # string with random text as input. We can't handle
  # this case with csv properly.
  grok {
    match => {
      "message" => [
        "(?P<leef_version>[^|]+)\\|(?P<vendor>[^\\|]+)\\|(?P<product_name>[^\\|]+)\\|(?P<product_version>[^\\|]+)\\|(?P<event_id>[^\\|]+)\\|%{GREEDYDATA:event_attributes}"
      ]
    }
    on_error => "wrong_format"
  }

  if [wrong_format] == true && message =~ "," {
    mutate {
      replace => {
        "action" => ""
        "app_name" => ""
        "browser_name" => ""
        "callout_time" => ""
        "client_geo" => ""
        "client_ip" => ""
        "component_name" => ""
        "collected_timestamp" => ""
        "cpu_time" => ""
        "dashboard_type" => ""
        "description" => ""
        "data.name" => ""
        "DelegateUser" => ""
        "db_total_time" => ""
        "db_cpu_time" => ""
        "device_id" => ""
        "device_platform" => ""
        "document_id" => ""
        "duration" => ""
        "entry_point" => ""
        "event_id" => ""
        "exec_time" => ""
        "file_type" => ""
        "job_id" => ""
        "login_key" => ""
        "method" => ""
        "number_soql_queries" => ""
        "organization_id" => ""
        "os_name" => ""
        "os_version" => ""
        "principal_resource_type" => ""
        "event_identifier" => ""
        "page_url" => ""
        "PolicyId" => ""
        "request_id" => ""
        "request_status" => ""
        "rows_processed" => ""
        "run_time" => ""
        "rule_name" => ""
        "sec_result" => ""
        "session_key" => ""
        "session_level" => ""
        "size_bytes" => ""
        "src_app_name" => ""
        "src_email" => ""
        "sso_type" => ""
        "SessionKey" => ""
        "target_resource_type" => ""
        "timestamp" => ""
        "tls_protocol" => ""
        "uri" => ""
        "user_agent" => ""
        "user_id" => ""
        "target_user_name" => ""
        "user_type" => ""
        "verification_method" => ""
        "operation" => ""
        "referral_url" => ""
        "query_exec" => ""
        "attributes.type" => ""
        "metadata_description" => ""
        "EventDate" => ""
        "EventIdentifier" => ""
        "CreatedDate" => ""
        "attributes.url" => ""
        "UserId" => ""
        "Username" => ""
        "user" => ""
        "platform" => ""
        "SessionLevel" => ""
        "LoginKey" => ""
        "SourceIp" => ""
        "event_type" => ""
        "summary" => ""
        "Id" => ""
        "Action" => ""
        "Display" => ""
        "intermediary" => ""
        "user_display_name" => ""
        "createdAt" => ""
        "security_result" => ""
        "target_user_display_name" => ""
        "metadata.product_event_type" => ""
        "data.properties.Status.str" => ""
        "sr" => ""
        "eventSource.name" => ""
        "eventSource.id" => ""
        "eventType.name" => ""
      }
    }

    if [message] != "" {
      mutate {
        gsub => ["message","N/A",""]
      }
      mutate {
        gsub => ["message","'",'"']
      }
    }
    json {
      source => "message"
      on_error => "not_json_format"
      array_function => "split_columns"
    }


    if [message] =~ "(\s*\},$)" or [not_json_format] {
      drop {
        tag => "TAG_MALFORMED_ENCODING"
      }
    }

    if [data][properties][Status][str] != "Success" {
      mutate {
        replace => {
          "extensions.auth.auth_details" => "ACTIVE"
        }
      }
    }
    else {
      mutate {
        replace => {
          "extensions.auth.auth_details" => "UNKNOWN_AUTHENTICATION_STATUS"
        }
      }
      mutate {
        replace => {
          "Status_LK.key" => "Status"
          "Status_LK.value" => "%{data.properties.Status.str}"
        }
        on_error => "Disctinct_Status"
      }

      if ![Disctinct_Status] {
        mutate {
          merge => {
            "principal.labels" => "Status_LK"
            "principal.resource.attribute.labels" => "Status_LK"
          }
          on_error => "Disctinct_Status"
        }
      }
    }
    if [timestamp] != "" {
      date {
        match => ["timestamp","yyyyMMddHHmmss", "yyyy-MM-ddTHH:mm:ss.SSSZ", "yyyy-MM-ddTHH:mm:ss.SSS", "ISO8601"]
        on_error => "timestamp_error"
      }
    }
    else if [createdAt] != "" {
      mutate {
        convert => { "createdAt" => "string"}
        gsub => ["createdAt","\\d\\d\\d\\d\\d\\d$" ,"" ]
        on_error => "timestamp_error"
      }
      date {
        match => ["createdAt","UNIX_MS"]
        on_error => "timestamp_error"
      }
    }

    if [collected_timestamp] != "" {
      date {
        match => ["collected_timestamp","yyyyMMddHHmmss", "yyyy-MM-ddTHH:mm:ss.SSSZ"]
        target => "metadata.collected_timestamp"
        on_error => "timestamp_error"
      }
    }

    if [event_id] != "" {
      mutate {
        replace => {
          "metadata.product_event_type" => "%{event_id}"
        }
        on_error => "event_id_error"
      }

      # For these events, based on operation, need to decide on EVENT TYPE
      if [event_id] in [ "UriEvent", "LightningUriEvent", "ApiEvent", "TimeBasedWorkflow" ] {
        if [operation] in [ "Read", "Query", "QueryAll", "QueryMore" ] {
          mutate {
            replace => {
              "event_type" => "RESOURCE_READ"
            }
          }
        }
        else if [operation] in [ "Create", "INSERT"] {
          mutate {
            replace => {
              "event_type" => "RESOURCE_CREATION"
            }
          }
        }
        else if [operation] == "Update" {
          mutate {
            replace => {
              "event_type" => "RESOURCE_WRITTEN"
            }
          }
        }
        else if [operation] in [ "Delete", "ROLLBACK"] {
          mutate {
            replace => {
              "event_type" => "RESOURCE_DELETION"
            }
          }
        }
      }

      if [event_id] =~ "(QueuedExecution|ApexExecution)" {
        mutate {
          replace => {
            "target.resource.type" => "BATCH"
          }
        }
      }
      else if [event_id] in ["LightningInteraction", "LightningPerformance", "LightningPageView", "LightningUriEvent"] {
        if [device_platform] =~ ":" {
          grok {
            match => {
              "device_platform" => [ "%{GREEDYDATA:src_app_name}:%{GREEDYDATA:principal_resource_type}:%{GREEDYDATA}"]
            }
            overwrite =>  ["src_app_name", "principal_resource_type", "browser_name"]
            on_error => "device_platform_error"
          }
        }
      }
      else if [event_id] == "PlatformEncryption" {
        mutate {
          replace => {
            "target.resource.resource_type" => "ACCESS_POLICY"
          }
        }
      }
      else if [event_id] in [ "Login", "LoginAsEvent", "IdentityVerificationEvent", "LoginEvent", "LoginAs", "IdentityProviderEventStore" ] {
        if [action] != "" &&  [action] in [ "LOGIN_NO_ERROR", "Succeeded", "Success" ] {
          mutate {
            replace => {
              "action" => "ALLOW"
            }
          }
        }
        else {
          mutate {
            replace => {
              "action" => "BLOCK"
            }
          }
        }
        mutate {
          replace => {
            "extensions.auth.type" => "SSO"
          }
        }
        mutate {
          merge => {
            "sec_result.action" => "action"
          }
        }
        if [event_id] == "LoginAsEvent" {
          if [LoginType] == "Application" {
            mutate {
              replace => {
                "extensions.auth.type" => "AUTHTYPE_UNSPECIFIED"
              }
            }
          }
          if [os_name] != "" {
            grok {
              match => {
                "os_name" => [ "%{GREEDYDATA:os_name} %{GREEDYDATA:os_version}"]
              }
              overwrite =>  ["os_name", "os_version"]
              on_error => "os_name_error"
            }
            mutate {
              uppercase => ["os_name"]
            }
          }
        }
      }
      else if [event_id] in ["Logout", "LogoutEvent"] {
        mutate {
          replace => {
            "extensions.auth.type" => "SSO"
          }
        }
      }
      else if [event_id] == "ApexCallout" {
        if [action] != "" &&  [action] == "1" {
          mutate {
            replace => {
              "action" => "ALLOW"
            }
          }
        }
        else {
          mutate {
            replace => {
              "action" => "BLOCK"
            }
          }
        }
        mutate {
          replace => {
            "target.resource.resource_type" => "ACCESS_POLICY"
          }
        }
        mutate {
          merge => {
            "sec_result.action" => "action"
          }
          on_error => "action_error"
        }
      }
      else if [event_id] == "ApexTrigger" {
        mutate {
          replace => {
            "target.resource.resource_type" => "DATABASE"
            "target.resource.type" => "DATABASE_TRIGGER"
          }
        }
      }
      else if [event_id] == "ContentTransfer" {
        mutate {
          replace => {
            "target.resource.type" => "FILE"
            "resource_name" => "%{document_id}"
          }
          on_error => "resource_name_error"
        }
      }
      else if [event_id] == "Sites" {
        if [user_agent] =~ "Referer=" {
          grok {
            match => {
              "user_agent" => [ "%{GREEDYDATA:user_agent},Referer=%{GREEDYDATA:referral_url}" ]
            }
            overwrite => ["referral_url", "user_agent"]
            on_error => "user_agent_error"
          }
        }
        mutate {
          replace => {
            "uri" => "%{uri}%{page_url}"
          }
          on_error => "uri_error"
        }
      }
      else if [event_id] in ["OneCommerceUsage", "UriEvent", "Dashboard"] {
        if [operation_status] != "" &&  [operation_status] in ["Success", "Initiated", "1"] {
          mutate {
            replace => {
              "action" => "ALLOW"
            }
          }
        }
        else {
          mutate {
            replace => {
              "action" => "BLOCK"
            }
          }
        }
        mutate {
          merge => {
            "sec_result.action" => "action"
          }
          on_error => "action_error"
        }
      }
    }

    if [cpu_time] != "" {
      mutate {
        replace => {
          "cpu.key" => "CPU Time"
          "cpu.value" => "%{cpu_time}"
        }
        on_error => "cpu_time_error"
      }
      if ![cpu_time_error] {
        mutate {
          merge => {
            "target.resource.attribute.labels" => "cpu"
          }
          on_error => "cpu_time_merge_error"
        }
      }
    }

    if [run_time] != "" {
      mutate {
        replace => {
          "run.key" => "Run Time"
          "run.value" => "%{run_time}"
        }
        on_error => "run_time_error"
      }
      if ![run_time_error] {
        mutate {
          merge => {
            "target.resource.attribute.labels" => "run"
          }
          on_error => "run_time_merge_error"
        }
      }
    }

    if [db_total_time] != "" {
      mutate {
        replace => {
          "total_time.key" => "DB Total Time"
          "total_time.value" => "%{db_total_time}"
        }
        on_error => "db_total_time_error"
      }
      if ![db_total_time_error] {
        mutate {
          merge => {
            "target.resource.attribute.labels" => "total_time"
          }
          on_error => "db_total_time_merge_error"
        }
      }
    }

    if [db_cpu_time] != "" {
      mutate {
        replace => {
          "db_cpu.key" => "DB CPU Time"
          "db_cpu.value" => "%{db_cpu_time}"
        }
        on_error => "db_cpu_time_error"
      }
      if ![db_cpu_time_error] {
        mutate {
          merge => {
            "target.resource.attribute.labels" => "db_cpu"
          }
          on_error => "db_cpu_time_merge_error"
        }
      }
    }

    if [exec_time] != "" {
      mutate {
        replace => {
          "exe_time.key" => "Execution Time"
          "exe_time.value" => "%{exec_time}"
        }
        on_error => "exec_time_error"
      }
      if ![exec_time_error] {
        mutate {
          merge => {
            "target.resource.attribute.labels" => "exe_time"
          }
          on_error => "exec_time_merge_error"
        }
      }
    }

    if [callout_time] != "" {
      mutate {
        replace => {
          "call_time.key" => "Callout Time"
          "call_time.value" => "%{callout_time}"
        }
        on_error => "callout_time_error"
      }
      if ![callout_time_error] {
        mutate {
          merge => {
            "target.resource.attribute.labels" => "call_time"
          }
          on_error => "callout_time_merge_error"
        }
      }
    }

    if [number_soql_queries] != "" {
      mutate {
        replace => {
          "no_sql_que.key" => "Number of SOQL Queries"
          "no_sql_que.value" => "%{number_soql_queries}"
        }
        on_error => "number_soql_queries_error"
      }
      if ![number_soql_queries_error] {
        mutate {
          merge => {
            "target.resource.attribute.labels" => "no_sql_que"
          }
          on_error => "number_soql_queries_merge_error"
        }
      }
    }

    if [duration] != "" {
      mutate {
        replace => {
          "duration_time.key" => "Duration"
        }
        rename =>{
          "duration" => "duration_time.value"
        }
        convert =>{
          "duration_time.value" => "string"
        }
        merge => {
          "target.resource.attribute.labels" => "duration_time"
        }
        on_error => "duration_time_error"
      }
    }

    if [user_type] != "" {
      mutate {
        replace => {
          "user_ty.key" => "User Type"
          "user_ty.value" => "%{user_type}"
        }
        on_error => "user_type_error"
      }
      if ![user_type_error] {
        mutate {
          merge => {
            "target.resource.attribute.labels" => "user_ty"
          }
          on_error => "user_type_merge_error"
        }
      }
    }

    if [entry_point] != "" {
      mutate {
        replace => {
          "entry_p.key" => "Entry Point"
          "entry_p.value" => "%{entry_point}"
        }
        on_error => "entry_point_error"
      }
      if ![entry_point_error] {
        mutate {
          merge => {
            "target.resource.attribute.labels" => "entry_p"
          }
          on_error => "entry_point_merge_error"
        }
      }
    }

    if [operation] != "" {
      mutate {
        replace => {
          "ope.value" => "%{operation}"
          "ope.key" => "Operation"
        }
        on_error => "Disctinct_Ope"
      }
      if ![Disctinct_Ope] {
        mutate {
          merge => {
            "target.resource.attribute.labels" => "ope"
          }
          on_error => "Disctinct_merge_Ope"
        }
      }
    }

    if [session_level] != "" {
      mutate {
        replace => {
          "ses_level.key" => "Session Level"
          "ses_level.value" => "%{session_level}"
        }
        on_error => "session_level_error"
      }
      if ![session_level_error] {
        mutate {
          merge => {
            "target.resource.attribute.labels" => "ses_level"
          }
          on_error => "session_level_merge_error"
        }
      }
    }

    if [rows_processed] != "" {
      mutate {
        replace => {
          "rows_proc.key" => "Rows Processed"
          "rows_proc.value" => "%{rows_processed}"
        }
        on_error => "rows_processed_error"
      }
      if ![rows_processed_error] {
        mutate {
          merge => {
            "target.resource.attribute.labels" => "rows_proc"
          }
          on_error => "rows_processed_merge_error"
        }
      }
    }

    if [verification_method] != "" {
      mutate {
        replace => {
          "verify_method.key" => "Verification Method"
          "verify_method.value" => "%{verification_method}"
        }
        on_error => "verification_method_error"
      }
      if ![verification_method_error] {
        mutate {
          merge => {
            "target.resource.attribute.labels" => "verify_method"
          }
          on_error => "verification_method_merge_error"
        }
      }
    }

    if [sso_type] != "" {
      mutate {
        replace => {
          "ss_type.key" => "SSO Type"
          "ss_type.value" => "%{sso_type}"
        }
        on_error => "sso_type_error"
      }
      if ![sso_type_error] {
        mutate {
          merge => {
            "target.resource.attribute.labels" => "ss_type"
          }
          on_error => "sso_type_merge_error"
        }
      }
    }

    if [dashboard_type] != "" {
      mutate {
        replace => {
          "db_type.key" => "Dashboard Type"
          "db_type.value" => "%{dashboard_type}"
        }
        on_error => "dashboard_type_error"
      }
      if ![dashboard_type_error] {
        mutate {
          merge => {
            "target.resource.attribute.labels" => "db_type"
          }
          on_error => "dashboard_type_merge_error"
        }
      }
    }

    if [principal_resource_type] != "" {
      mutate {
        replace => {
          "principal.resource.type" => "%{principal_resource_type}"
        }
        on_error => "principal_resource_type_error"
      }
    }

    if [target_resource_type] != "" {
      mutate {
        replace => {
          "target.resource.resource_type" => "%{target_resource_type}"
        }
        on_error => "target_resource_type_error"
      }
    }

    if [browser_name] != "" {
      mutate {
        replace => {
          "principal.resource.name" => "%{browser_name}"
        }
        on_error => "browser_name_error"
      }
    }

    if [event_identifier] != "" {
      mutate {
        replace => {
          "metadata.product_log_id" => "%{event_identifier}"
        }
        on_error => "event_identifier_error"
      }
    }

    if [src_email] != "" {
      mutate {
        merge => {
          "principal.user.email_addresses" => "src_email"
        }
        on_error => "src_email_error"
      }
    }

    if [rule_name] != ""  {
      mutate {
        replace => {
          "sec_result.rule_name" => "%{rule_name}"
        }
        on_error => "rule_name_error"
      }
    }

    if [description] != "" {
      mutate {
        replace => {
          "sec_result.description" => "%{description}"
        }
        on_error => "description_error"
      }
      grok {
        match => {
          "description" => "%{GREEDYDATA} user %{GREEDYDATA:target_user_display_name} from%{GREEDYDATA}"
        }
        overwrite => ["target_user_display_name"]
        on_error => "no_user_name"
      }
    }

    if [summary] != "" {
      mutate {
        replace => {
          "sec_result.summary" => "%{summary}"
        }
        on_error => "summary_error"
      }
    }

    if [target_user_display_name] != "" {
      mutate {
        replace => {
          "target.user.user_display_name" => "%{target_user_display_name}"
        }
        on_error => "target_user_display_name_error"
      }
    }

    if [device_id] != "" {
      mutate {
        replace => {
          "target.asset_id" => "Device ID:%{device_id}"
        }
        on_error => "device_id_error"
      }
    }

    if [referral_url] != "" {
      mutate {
        replace => {
          "network.http.referral_url" => "%{referral_url}"
        }
        on_error => "referral_url_error"
      }
    }

    if [request_id] != "" {
      mutate {
        replace => {
          "target.resource.id" => "%{request_id}"
        }
        on_error => "request_id_error"
      }
    }

    if [user_display_name] != "" {
      mutate {
        replace => {
          "principal.user.user_display_name" => "%{user_display_name}"
        }
        on_error => "user_display_name_error"
      }
    }

    if [metadata_description] != "" {
      mutate {
        replace => {
          "metadata.description" => "%{metadata_description}"
        }
        on_error => "metadata_description_error"
      }
    }

    if [intermediary] != "" {
      mutate {
        merge => {
          "event.idm.read_only_udm.intermediary" => "intermediary"
        }
        on_error => "intermediary_error"
      }
    }

    if [organization_id] != "" {
      mutate {
        replace => {
          "target.administrative_domain" => "%{organization_id}"
        }
        on_error => "organization_id_error"
      }
    }

    if [user_id] != "" {
      mutate {
        replace => {
          "principal.user.userid" => "%{user_id}"
        }
        on_error => "user_id_error"
      }
    }
    else if [login_key] != "" {
      mutate {
        replace => {
          "principal.user.userid" => "%{login_key}"
        }
        on_error => "login_key_error"
      }
    }

    if [target_user_name] != "" {
      mutate {
        replace => {
          "target.user.userid" => "%{target_user_name}"
        }
        on_error => "target_user_name_error"
      }
    }

    if [request_status] != "" && [request_status] != "U" {
      if [request_status] == "S" {
        mutate {
          replace => {
            "request_status" => "200"
          }
        }
      }
      else if [request_status] == "F" {
        mutate {
          replace => {
            "request_status" => "400"
          }
        }
      }
      else if [request_status] == "N" {
        mutate {
          replace => {
            "request_status" => "404"
          }
        }
      }
      else if [request_status] == "R" {
        mutate {
          replace => {
            "request_status" => "300"
          }
        }
      }

      mutate {
        replace => {
          "network.http.response_code" => "%{request_status}"
        }
        convert => {
          "network.http.response_code" => "integer"
        }
        on_error => "request_status_error"
      }
    }

    if [uri] != "" {
      if [uri] =~ "^http" {
        grok {
          match => {
            "uri" => [ "%{URIPROTO:protocol}?(://)?%{IPORHOST:target_hostname}%{GREEDYDATA:uri}" ]
          }
          overwrite => ["uri"]
          on_error => "uri_error"
        }
        mutate {
          uppercase => [ "protocol" ]
        }
        mutate {
          replace => {
            "network.application_protocol" => "%{protocol}"
            "target.hostname" => "%{target_hostname}"
            "target.asset.hostname" => "%{target_hostname}"
          }
          on_error => "uri_error"
        }
      }
      mutate {
        replace => {
          "target.url" => "%{uri}"
        }
        on_error => "uri_error"
      }
    }

    mutate {
      replace => {
        "metadata.product_name" => "SALESFORCE"
        "metadata.vendor_name" => "SALESFORCE"
      }
      on_error => "product_name_error"
    }
    if [event_type] != "" {
      mutate {
        replace => {
          "metadata.event_type" => "%{event_type}"
        }
      }
    }
    else {
      mutate {
        replace => {
          "metadata.event_type" => "GENERIC_EVENT"
        }
      }
    }
  }

  if [csv_format] == "false" and [not_json_format] == "false" {
    if [wrong_format] == true {
      drop {
        tag => "TAG_MALFORMED_ENCODING"
      }
    }

    mutate {
      gsub => [
        "event_attributes","\\t", "^"
      ]
    }

    kv {
      source => "event_attributes"
      target => "attrs"
      field_split => "^"
      value_split => "="
      on_error => "event_attributes_error"
    }

    mutate {
      rename => {
        "attrs.USER_ID_DERIVED" => "principal.user.product_object_id"
      }
    }

    grok {
      match => {
        "attrs.devTime" => [
          "%{GREEDYDATA:ts_date_left}T%{GREEDYDATA:ts_date_right}"
        ]
      }
      on_error => "date_parsing_error"
    }

    if [date_parsing_error] == true {
      drop {
        tag => "TAG_MALFORMED_MESSAGE"
      }
    } else {
      # ISO8601 timestamp does not support milliseconds.
      # We can't match a date that includes letter T.
      # Removing T from timestamp.
      mutate {
        replace => {
          "ts_date" => "%{ts_date_left} %{ts_date_right}"
        }
        on_error => "date_parsing_error"
      }

      date {
        match => ["ts_date", "yyyy-MM-dd HH:mm:ss.SSSZ"]
        on_error => "date_parsing_error"
      }
    }

    if [event_id] == "Login: Success" {
      mutate {
        replace => {
          "sec_action" => "ALLOW"
        }
        merge => {
          "sec_result.action" => "sec_action"
        }
      }

      if [src_ip_invalid_format] == true {
        drop {
          tag => "TAG_MALFORMED_MESSAGE"
        }
      }

      mutate {
        rename => {
          "attrs.Application" => "principal.application"
          "attrs.LoginUrl" => "target.url"
        }
        replace => {
          "metadata.event_type" => "USER_LOGIN"
          "extensions.auth.type" => "AUTHTYPE_UNSPECIFIED"
          "auth.mechanism" => "REMOTE"
        }
      }
      mutate {
        merge => {
          "extensions.auth.mechanism" => "auth.mechanism"
          "principal.ip" => "attrs.src"
          "event.idm.read_only_udm.security_result" => "sec_result"
        }
        on_error => "login_error"
      }

    } else if [event_id] == "Logout" {
      mutate {
        replace => {
          # LOGOUT event must have a target
          "principal.user.userid" => "%{attrs.usrName}"
        }
        merge => {
          "target.user.email_addresses" => "attrs.usrName"
        }
        on_error => "logout_error"
      }
      mutate {
        replace => {
          "metadata.event_type" => "USER_LOGOUT"
          "extensions.auth.type" => "AUTHTYPE_UNSPECIFIED"
        }
      }
    } else {
      if [attrs][cat] == "SalesforceCaseHistory" {
        mutate {
          rename => {
            "attrs.CaseId" => "target.resource.id"
          }
        }
        mutate {
          replace => {
            "resource_name" => "%{attrs.Case.Subject}"
          }
          on_error => "case_error"
        }
      } else if [attrs][cat] == "SalesforceAccountHistory" {
        mutate {
          rename => {
            "attrs.AccountId" => "target.resource.id"
          }
        }
        mutate {
          replace => {
            "resource_name" => "%{attrs.Account.Name}"
          }
          on_error => "account_error"
        }
      } else if [attrs][cat] == "SalesforceContactHistory" {
        mutate {
          rename => {
            "attrs.ContactId" => "target.resource.id"
          }
        }
        mutate {
          replace => {
            "resource_name" => "%{attrs.Contact.Name}"
          }
          on_error => "contact_error"
        }
      }

      mutate {
        rename => {
          "attrs.attributes.url" => "target.url"
        }
        replace => {
          "target.resource.type" => "%{event_id}"
          "metadata.event_type" => "USER_RESOURCE_UPDATE_CONTENT"
        }
        on_error => "resource_error"
      }
    }

    mutate {
      rename => {
        "attrs.cat" => "metadata.product_event_type"
      }
    }

    mutate {
      replace => {
        "principal.user.userid" => "%{attrs.usrName}"
      }
      merge => {
        "principal.user.email_addresses" => "attrs.usrName"
      }
      on_error => "user_error"
    }
  }

  if [metadata][product_event_type] in [
      "QueuedExecution",
      "LightningInteraction",
      "LightningPerformance",
      "Sites",
      "Logout",
      "ApexExecution",
      "LightningPageView",
      "Login",
      "ApexTrigger",
      "URI",
      "RestApi",
      "ContentTransfer",
      "AuraRequest",
      "ApexCallout",
      "OneCommerceUsage"] {
    if [resource_name] not in ["ReportEvent","SessionHijackingEventStore","BulkApiResultEventStore","CredentialStuffingEventStore","ReportAnomalyEventStore","ApiAnomalyEventStore"]{
      mutate {
        replace => {
          "label.key" => "Source"
          "label.value" => "Event Log File"
        }
      }
      mutate {
        merge => {
          "metadata.ingestion_labels" => "label"
        }
        on_error => "ingestion_labels_error"
      }
    }
  }
  else if [metadata][product_event_type] in [
      "ApiAnomalyEventStore",
      "ApiEvent",
      "IdentityProviderEventStore",
      "IdentityVerificationEvent",
      "LightningUriEvent",
      "ListViewEvent",
      "LoginEvent",
      "LoginAsEvent",
      "LogoutEvent",
      "UriEvent"] {
    mutate {
      replace => {
        "label.key" => "Source"
        "label.value" => "Real-Time Event Monitoring"
      }
    }
    mutate {
      merge => {
        "metadata.ingestion_labels" => "label"
      }
    }
  }
  else if [metadata][product_event_type] == "SetupAuditTrail" {
    mutate {
      replace => {
        "label.key" => "Source"
        "label.value" => "SetupAuditTrail"
      }
    }
    mutate {
      merge => {
        "metadata.ingestion_labels" => "label"
      }
    }
  }
  else if [metadata][product_event_type] == "WaveDownload" {
    mutate {
      replace => {
        "metadata.event_type" => "USER_LOGIN"
        "extensions.auth.type" => "AUTHTYPE_UNSPECIFIED"
      }
    }
  }
  else if [metadata][product_event_type] == "LoginEventStream" {
    mutate {
      replace => {
        "metadata.event_type" => "USER_LOGIN"
        "extensions.auth.type" => "AUTHTYPE_UNSPECIFIED"
      }
    }
  }
  if [action] != "" {
    mutate {
      merge => {
        "security_result.action" => "action"
      }
    }
  }

  if [security_result] != "" {
    mutate {
      merge => {
        "event.idm.read_only_udm.security_result" => "security_result"
      }
    }
  }

  mutate {
    replace => {
      "event_type" => "USER_LOGIN"
      "extensions.auth.type" => "AUTHTYPE_UNSPECIFIED"
      "mechanism" => "USERNAME_PASSWORD"
    }
  }
  mutate {
    merge => {
      "extensions.auth.mechanism" => "mechanism"
    }
  }

  if [resource_name] != "" {
    mutate {
      replace => {
        "target.resource.name" => "%{resource_name}"
      }
      on_error => "resource_name_error"
    }
  }

  if [resource_name] in ["ReportEvent","SessionHijackingEventStore","BulkApiResultEventStore","CredentialStuffingEventStore","ReportAnomalyEventStore","ApiAnomalyEventStore"] {
    mutate {
      replace => {
        "label.key" => "Source"
        "label.value" => "Real-Time Event Monitoring"
      }
    }
    mutate {
      merge => {
        "metadata.ingestion_labels" => "label"
      }
    }
  }


  if [timestamp] != "" {
    date {
      match => ["timestamp","yyyyMMddHHmmss", "yyyy-MM-ddTHH:mm:ss.SSSZ", "yyyy-MM-ddTHH:mm:ss.SSS", "ISO8601"]
      on_error => "timestamp_error"
    }
  }

  mutate {
    replace => {
      "ipAddress" => ""
    }
  }

  date {
    match => ["createdDate",  "yyyy-MM-ddTHH:mm:ss.SSS","yyyy-MM-ddTHH:mm:ss.SS","yyyy-MM-ddTHH:mm:ss.S","yyyy-MM-ddTHH:mm:ss", "ISO8601"]
    target => "metadata.event_timestamp"
    on_error => 'Not_Salesforce_Marketing'
  }
  date {
    match => ["createdDate",  "yyyy-MM-ddTHH:mm:ss.SSS","yyyy-MM-ddTHH:mm:ss.SS","yyyy-MM-ddTHH:mm:ss.S","yyyy-MM-ddTHH:mm:ss", "ISO8601"]
    target => "metadata.event_timestamp"
    timezone => "America/Buenos_Aires"
    on_error => "error_timestamp"
  }

  mutate {
    convert => {
      "id" => "string"
    }
    on_error => 'Not_Salesforce_Marketing'
  }
  mutate{
    replace => {
      "metadata.product_log_id" => "%{id}"
    }
    on_error => 'Not_Salesforce_Marketing'
  }

  mutate {
    convert => {
      "memberId" => "string"
    }
    on_error => 'Not_Salesforce_Marketing'
  }

  mutate {
    replace => {
      "principal.resource.product_object_id" => "%{memberId}"
    }
    on_error => 'Not_Salesforce_Marketing'
  }

  mutate {
    convert => {
      "enterpriseId" => "string"
    }
    on_error => 'Not_Salesforce_Marketing'
  }

  mutate {
    replace => {
      "principal.group.product_object_id" => "%{enterpriseId}"
    }
    on_error => 'Not_Salesforce_Marketing'
  }

  mutate {
    replace => {
      "principal.user.user_display_name" => "%{employee.employeeName}"
    }
    on_error => 'Not_Salesforce_Marketing'
  }

  mutate {
    replace => {
      "principal.user.userid" => "%{employee.userName}"
    }
    on_error => 'Not_Salesforce_Marketing'
  }

  mutate {
    convert => {
      "eventType.id" => "string"
    }
    on_error => 'Not_Salesforce_Marketing'
  }

  mutate {
    replace => {
      "metadata.product_event_type" => "%{eventType.id}"
    }
    on_error => 'Not_Salesforce_Marketing'
  }

  mutate {
    replace => {
      "metadata.description" => "%{eventType.name}"
    }
    on_error => 'Not_Salesforce_Marketing'
  }

  mutate {
    convert => {
      "loginStatus.id" => "string"
    }
    on_error => 'Not_Salesforce_Marketing'
  }

  mutate {
    replace => {
      "sr.rule_id" => "%{loginStatus.id}"
    }
    on_error => 'Not_Salesforce_Security'
  }

  mutate {
    replace => {
      "sr.summary" => "%{loginStatus.name}"
    }
    on_error => 'Not_Salesforce_Security'
  }

  mutate {
    convert => {
      "eventSource.id" => "string"
    }
    on_error => 'Not_Salesforce_Marketing'
  }

  mutate {
    replace => {
      "src.resource.product_object_id" => "%{eventSource.id}"
    }
    on_error => 'Not_Salesforce_Security'
  }

  mutate {
    replace => {
      "src.resource.name" => "%{eventSource.name}"
    }
    on_error => 'Not_Salesforce_Security'
  }

  mutate {
    convert => {
      "objectType.id" => "string"
    }
    on_error => 'Not_Salesforce_Marketing'
  }

  mutate {
    replace => {
      "sr.rule_id" => "%{objectType.id}"
    }
    on_error => 'Not_Salesforce_Audit'
  }

  mutate {
    replace => {
      "sr.summary" => "%{objectType.name}"
    }
    on_error => 'Not_Salesforce_Audit'
  }

  mutate {
    convert => {
      "operation.id" => "string"
    }
    on_error => 'Not_Salesforce_Marketing'
  }

  mutate {
    replace => {
      "sr.action_details" => "%{operation.id}"
    }
    on_error => 'Not_Salesforce_Audit'
  }

  mutate {
    replace => {
      "sr.description" => "%{operation.name}"
    }
    on_error => 'Not_Salesforce_Audit'
  }

  mutate {
    convert => {
      "object.id" => "string"
    }
    on_error => 'Not_Salesforce_Marketing'
  }

  mutate {
    replace => {
      "target.resource.product_object_id" => "%{object.id}"
    }
    on_error => 'Not_Salesforce_Audit'
  }

  mutate {
    replace => {
      "target.resource.name" => "%{object.name}"
    }
    on_error => 'Not_Salesforce_Audit'
  }

  mutate {
    convert => {
      "transaction_id" => "string"
    }
    on_error => 'Not_Salesforce_Marketing'
  }

  mutate {
    replace => {
      "network.dhcp.transaction_id" => "%{transaction_id}"
    }
    on_error => 'Not_Salesforce_Audit'
  }

  if ![Not_Salesforce_Marketing] and [Not_Salesforce_Security] {
    mutate {
      replace => {
        "metadata.event_type" => "USER_RESOURCE_ACCESS"
      }
    }
  }
  if [sr] != "" {
    mutate {
      merge => {
        "event.idm.read_only_udm.security_result" => "sr"
      }
      on_error => "security_result_error"
    }
  }

  if [eventType][name] =~ "Login"{
    mutate {
      replace => {
        "target.resource.name" => "%{eventSource.name}"
        "target.resource.id" => "%{eventSource.id}"
        "metadata.event_type" => "USER_LOGIN"
        "extensions.auth.type" => "AUTHTYPE_UNSPECIFIED"
      }
      on_error => "login_error"
    }
  }
  if [principal] != "" {
    mutate {
      rename => {
        "principal" => "event.idm.read_only_udm.principal"
      }
    }
  }

  if [target] != "" {
    mutate {
      rename => {
        "target" => "event.idm.read_only_udm.target"
      }
    }
  }

  if [network] != "" {
    mutate {
      rename => {
        "network" => "event.idm.read_only_udm.network"
      }
    }
  }

  if [metadata] != "" {
    mutate {
      rename => {
        "metadata" => "event.idm.read_only_udm.metadata"
      }
    }
  }
  if [extensions] != "" {
    mutate {
      rename => {
        "extensions" => "event.idm.read_only_udm.extensions"
      }
    }
  }

  mutate {
    merge => {
      "@output" => "event"
    }
  }
}
