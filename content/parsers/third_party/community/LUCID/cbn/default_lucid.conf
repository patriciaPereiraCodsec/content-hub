# Product: LUCID
# Category: Authentication log types.
# Supported Format: JSON
# References: NA
# Last Updated: 2024-06-19
# Copyright 2024 Chronicle LLC

filter {

  mutate {
    replace => {
      "event_type" => ""
      "metadata" => ""
      "principal" => ""
      "target" => ""
      "network" => ""
      "additional" => ""
      "has_principal" => "false"
      "has_target" => "false"
      "has_principal_user" => "false"
      "has_target_resource" => "false"
      "has_target_application" => "false"
      "has_target_user" => "false"
      "has_target_file" => "false"
      "has_user_login" => "false"
      "has_user_logout" => "false"
      "security_result" => ""
      "about" => ""
      "accountId" => ""
      "eventTimestamp" => ""
      "actor" => ""
      "actor.actorAccountId" => ""
      "actor.actorType" => ""
      "actor.actorUserId" => ""
      "actor.actorEmail" => ""
      "actor.actorClient" => ""
      "actor.actorIp" => ""
      "event1" => ""
      "event1.event1Type" => ""
      "event1.documentId" => ""
      "event1.documentIds" => ""
      "event1.product" => ""
      "event1.documentOpenedMethod" => ""
      "event1.documentOpenedMethod.MethodType" => ""
      "event1.role" => ""
      "event1.shareLinkEnabled" => ""
      "event1.restrictedToAccount" => ""
      "event1.destinationFolderId" => ""
      "event1.destinationFolderName" => ""
      "event1.isTeamFolder" => ""
      "event1.folderId" => ""
      "event1.registrationMethod" => ""
      "event1.format" => ""
      "event1.method" => ""
      "event1.source" => ""
      "event1.filename" => ""
      "event1.publishedLink.name" => ""
      "publishedLink_name" => ""
      "event1.publishedLink.link" => ""
      "publishedLink_link" => ""
      "event1.publishedLink.format" => ""
      "publishedLink_format" => ""
      "_target" => ""
      "targetData" => ""
      "targetData._targetId" => ""
      "targetData._targetType" => ""
      "targetData.displayName" => ""
      "targetData.userEmail" => ""
      "event1.folderName" => ""
      "flowId" => ""
      "actor_type" => ""
      "actor_user_id" => ""
      "actor_account_id" => ""
      "actor_email" => ""
      "actor_client" => ""
      "eventType" => ""
      "product_name" => ""
      "event_role" => ""
      "shareLinkEnabled_label" => ""
      "restricted_account_enable" => ""
      "share_link_enable" => ""
      "dest_folder_id" => ""
      "document_opened" => ""
      "document_id" => ""
      "display_name" => ""
      "email_data" => ""
      "dest_folder_name" => ""
      "team_folder" => ""
      "folder_name" => ""
      "folder_id" => ""
      "target_folder_name" => ""
      "targetData.folderName" => ""
      "registration_method" => ""
      "format_event" => ""
      "method_event" => ""
      "source_event" => ""
      "filename_event" => ""
      "ip_data" => ""
      "method_type" => ""
      "has_user_resource_updated" => "false"
    }
  }

  mutate {
    gsub => ["message","event","event1"]
  }
  mutate {
    gsub => ["message","target","_target"]
  }

  json {
    source => "message"
    array_function => "split_columns"
    on_error => "invalid_json"
  }

  if [invalid_json] {
    drop {
      tag => "TAG_MALFORMED_MESSAGE"
    }
  }

  if [accountId] != "" {
    mutate {
      convert => {
        "accountId" => "string"
      }
      on_error => "already_string"
    }
    mutate {
      replace => {
        "target.resource.id" => "%{accountId}"
      }
      on_error => "invalid_account_id"
    }
  }

  if [eventTimestamp] != "" {
    date {
      match => ["eventTimestamp", "ISO8601", "yyyy-MM-ddTHH:mm:ss.SSSSSSZ"]
      target => "metadata.event_timestamp"
      on_error => "invalid_date_format"
    }
  }

  mutate {
    replace => {
      "eventType" => "%{event1.event1Type}"
    }
    on_error => "eventType_not_found"
  }
  mutate {
    replace => {
      "actor_type" => "%{actor.actorType}"
    }
    on_error => "invalid_actor_type"
  }
  if [actor_type] != "" {
    if [eventType] in ["logins.user.successfulUserLogin","logins.user.successfulUserLogout"] {
      mutate {
        replace => {
          "user_roles.name" => "%{actor_type}"
        }
        on_error => "actor_type_not_found"
      }
      if ![actor_type_not_found] {
        mutate {
          merge => {
            "target.user.attribute.roles" => "user_roles"
          }
          on_error => "invalid_actor_roles"
        }
      }
    }
    else {
      mutate {
        replace => {
          "user_roles.name" => "%{actor_type}"
        }
        on_error => "actor_type_not_found"
      }
      if ![actor_type_not_found] {
        mutate {
          merge => {
            "principal.user.attribute.roles" => "user_roles"
          }
          on_error => "invalid_actor_roles"
        }
      }
    }
  }

  mutate {
    convert => {
      "actor.actorUserId" => "string"
    }
    on_error => "already_userID_string"
  }
  mutate {
    replace => {
      "actor_user_id" => "%{actor.actorUserId}"
    }
    on_error => "invalid_actor_user_id"
  }

  if [actor_user_id] != "" {
    if [eventType] in ["logins.user.successfulUserLogin","logins.user.successfulUserLogout"] {
      mutate {
        replace => {
          "target.user.userid" => "%{actor_user_id}"
        }
        on_error => "invalid_target_user_id"
      }
      if ![invalid_target_user_id] {
        mutate {
          replace => {
            "has_target_user" => "true"
          }
        }
      }
    }
    else {
      mutate {
        replace => {
          "principal.user.userid" => "%{actor_user_id}"
        }
        on_error => "invalid_user_id"
      }
      if ![invalid_user_id] {
        mutate {
          replace => {
            "has_principal_user" => "true"
          }
        }
      }
    }
  }

  mutate {
    convert => {
      "actor.actorAccountId" => "string"
    }
    on_error => "already_accountId_string"
  }
  mutate {
    replace => {
      "actor_account_id" => "%{actor.actorAccountId}"
    }
    on_error => "invalid_actor_account_id"
  }
  if [actor_account_id] != "" {
    mutate {
      replace => {
        "principal.resource.id" => "%{actor_account_id}"
      }
      on_error => "error_in_actor_account_id"
    }
  }

  mutate {
    replace => {
      "actor_email" => "%{actor.actorEmail}"
    }
    on_error => "invalid_actor_email"
  }

  if [actor_email] != "" && [actor_email] =~ "^.+@.+$" {
    if [eventType] in ["logins.user.successfulUserLogin","logins.user.successfulUserLogout"] {
      mutate {
        merge => {
          "target.user.email_addresses" => "actor.actorEmail"
        }
        on_error => "empty_actor_email"
      }
    }
    else {
      mutate {
        merge => {
          "principal.user.email_addresses" => "actor.actorEmail"
        }
        on_error => "empty_actor_email"
      }
    }
  }

  mutate {
    replace => {
      "actor_client" => "%{actor.actorClient}"
    }
    on_error => "invalid_actor_client"
  }
  if [actor_client] != "" {
    mutate {
      replace => {
        "principal.resource.name" => "%{actor_client}"
      }
      on_error => "empty_actor_client"
    }
  }

  mutate {
    replace => {
      "ip_data" => "%{actor.actorIp}"
    }
    on_error => "empty_ip_data"
  }
  if ![empty_ip_data] and [ip_data] != "" {
    mutate {
      merge => {
        "principal.ip" => "ip_data"
        "principal.asset.ip" => "ip_data"
      }
      on_error => "invalid_ip_data"
    }
    if ![invalid_ip_data] {
      mutate {
        replace => {
          "has_principal" => "true"
        }
      }
    }
  }

  mutate {
    replace => {
      "event_role" => "%{event1.role}"
    }
    on_error => "event_role_not_found"
  }
  if [event_role] != ""{
    mutate {
      replace => {
        "roles.name" => "%{event_role}"
      }
      on_error => "role_not_found"
    }
    if ![role_not_found] {
      mutate {
        merge => {
          "target.user.attribute.roles" => "roles"
        }
        on_error => "invalid_target_roles"
      }
    }
  }

  mutate {
    replace => {
      "document_id" => "%{event1.documentId}"
    }
    on_error => "invalid_document_id"
  }
  if [document_id] != "" {
    mutate {
      replace => {
        "target.resource.product_object_id" => "%{document_id}"
      }
      on_error => "invalid_product_id"
    }
    if ![invalid_product_id] {
      mutate {
        replace => {
          "has_target_resource" => "true"
        }
      }
    }
  }

  mutate {
    replace => {
      "product_name" => "%{event1.product}"
    }
    on_error => "invalid_product"
  }
  if [product_name] != ""{
    mutate {
      replace => {
        "metadata.product_name" => "%{product_name}"
      }
      on_error => "empty_product"
    }
  }
  else {
    mutate {
      replace => {
        "metadata.product_name" => "LUCID"
      }
    }
  }

  mutate {
    replace => {
      "document_opened" => "%{event1.documentOpenedMethod}"
    }
    on_error => "invalid_document_opened"
  }
  if [document_opened] != "" {
    mutate {
      replace => {
        "document_method_label.key" => "documentOpenedMethod"
        "document_method_label.value.string_value" => "%{document_opened}"
      }
      on_error => "invalid_document_opened_method"
    }
    if ![invalid_document_opened_method] {
      mutate {
        merge => {
          "additional.fields" => "document_method_label"
        }
        on_error => "invalid_document_opened_method_label"
      }
    }
  }

  for targetData in _target {
    if [targetData] != "" {
      mutate {
        replace => {
          "target_type_label" => ""
        }
      }
      mutate {
        replace => {
          "target_type_label.key" => "targetType"
          "target_type_label.value" => "%{targetData._targetType}"
        }
        on_error => "targetType_invalid"
      }
      if ![targetType_invalid] {
        mutate {
          merge => {
            "target.resource.attribute.labels" => "target_type_label"
          }
          on_error => "targetType_label_merge_failed"
        }
        if ![targetType_label_merge_failed] {
          mutate {
            replace => {
              "has_target_resource" => "true"
            }
          }
        }
      }

      mutate {
        replace => {
          "target_id_label" => ""
        }
      }
      mutate {
        convert => {
          "targetData._targetId" => "string"
        }
        on_error => "already_string"
      }
      mutate {
        replace => {
          "target_id_label.key" => "targetId"
          "target_id_label.value" => "%{targetData._targetId}"
        }
        on_error => "targetId_invalid"
      }
      if ![targetId_invalid] {
        mutate {
          merge => {
            "target.resource.attribute.labels" => "target_id_label"
          }
          on_error => "targetId_label_merge_failed"
        }
        if ![targetId_label_merge_failed] {
          mutate {
            replace => {
              "has_target_resource" => "true"
            }
          }
        }
      }

      mutate {
        replace => {
          "display_name" => "%{targetData.displayName}"
        }
        on_error => "invalid_display_name"
      }
      if ![invalid_display_name] {
        mutate {
          replace => {
            "target.user.user_display_name" => "%{display_name}"
          }
          on_error => "invalid_target_display_name"
        }
        if ![invalid_target_display_name] {
          mutate {
            replace => {
              "has_target_user" => "true"
            }
          }
        }
      }

      mutate {
        replace => {
          "email_data" => "%{targetData.userEmail}"
        }
        on_error => "empty_email_data"
      }
      if ![empty_email_data] {
        mutate {
          merge => {
            "target.user.email_addresses" => "email_data"
          }
          on_error => "invalid_target_user_email"
        }
        if ![invalid_target_user_email] {
          mutate {
            replace => {
              "has_target_user" => "true"
            }
          }
        }
      }
    }
  }

  if [flowId] != "" {
    mutate {
      replace => {
        "principal.resource.product_object_id" => "%{flowId}"
      }
      on_error => "invalid_flowId"
    }
  }

  mutate {
    convert => {
      "event1.shareLinkEnabled" => "string"
    }
    on_error => "shareLinkEnabled_already_string"
  }
  mutate {
    replace => {
      "share_link_enable" => "%{event1.shareLinkEnabled}"
    }
    on_error => "invalid_shareLinkEnabled"
  }
  if [share_link_enable] != "" {
    mutate {
      replace => {
        "shareLinkEnabled_label.key" => "ShareLinkEnabled"
        "shareLinkEnabled_label.value.string_value" => "%{share_link_enable}"
      }
      on_error => "invalid_shareLinkEnabled_label"
    }
    if ![invalid_shareLinkEnabled_label] {
      mutate {
        merge => {
          "additional.fields" => "shareLinkEnabled_label"
        }
        on_error => "merge_failed_shareLinkEnabled_label"
      }
    }
  }

  mutate {
    convert => {
      "event1.restrictedToAccount" => "string"
    }
    on_error => "restrictedToAccount_already_string"
  }
  mutate {
    replace => {
      "restricted_account_enable" => "%{event1.restrictedToAccount}"
    }
    on_error => "invalid_restrictedToAccount"
  }
  if [restricted_account_enable] != "" {
    mutate {
      replace => {
        "restrictedToAccount_label.key" => "RestrictedToAccount"
        "restrictedToAccount_label.value.string_value" => "%{restricted_account_enable}"
      }
      on_error => "invalid_restrictedToAccount_label"
    }
    if ![invalid_restrictedToAccount_label] {
      mutate {
        merge => {
          "additional.fields" => "restrictedToAccount_label"
        }
        on_error => "invalid_restrictedToAccount_label_merged"
      }
    }
  }

  mutate {
    replace => {
      "documentids_list.value" => ""
    }
  }
  for documentid in event1.documentIds {
    mutate {
      replace => {
        "document_id_label" => ""
      }
    }
    mutate {
      replace => {
        "document_id_label.string_value" => "%{documentid}"
      }
      on_error => "invalid_documentid"
    }
    if ![invalid_documentid] {
      mutate {
        merge => {
          "documentids_list.value.list_value.values" => "document_id_label"
        }
        on_error => "invalid_documentid_label"
      }
    }
    if [documentids_list][value] != "" {
      mutate {
        replace => {
          "documentids_list.key" => "DocumentIds"
        }
      }
      mutate {
        merge => {
          "additional.fields" => "documentids_list"
        }
        on_error => "invalid_documentids_list"
      }
    }
  }

  mutate {
    convert => {
      "event1.destinationFolderId" => "string"
    }
    on_error => "dest_folder_id_already_string"
  }
  mutate {
    replace => {
      "dest_folder_id" => "%{event1.destinationFolderId}"
    }
    on_error => "empty_dest_folder_id"
  }
  if [dest_folder_id] != "" {
    mutate {
      replace => {
        "target.user.product_object_id" => "%{dest_folder_id}"
      }
      on_error => "invalid_dest_folder_id"
    }
    if ![invalid_dest_folder_id] {
      mutate {
        replace => {
          "has_target_user" => "true"
        }
      }
    }
  }

  mutate {
    replace => {
      "dest_folder_name" => "%{event1.destinationFolderName}"
    }
    on_error => "invalid_dest_folder_name"
  }
  if [dest_folder_name] != "" {
    mutate {
      replace => {
        "target.resource.name" => "%{dest_folder_name}"
      }
      on_error => "empty_resource_name"
    }
    if ![empty_resource_name] {
      mutate {
        replace => {
          "has_target_resource" => "true"
        }
      }
    }
  }

  mutate {
    convert => {
      "event1.isTeamFolder" => "string"
    }
    on_error => "isTeamFolder_already_string"
  }
  mutate {
    replace => {
      "team_folder" => "%{event1.isTeamFolder}"
    }
    on_error => "invalid_team_folder"
  }
  if [team_folder] != "" {
    mutate {
      replace => {
        "team_folder_label.key" => "Team_Folder"
        "team_folder_label.value.string_value" => "%{team_folder}"
      }
      on_error => "invalid_team_folder_label"
    }
    if ![invalid_team_folder_label] {
      mutate {
        merge => {
          "additional.fields" => "team_folder_label"
        }
        on_error => "invalid_team_folder_label_merged"
      }
    }
  }

  mutate {
    replace => {
      "folder_name" => "%{event1.folderName}"
    }
    on_error => "invalid_folder_name"
  }
  if [folder_name] != "" {
    mutate {
      replace => {
        "target.resource.name" => "%{folder_name}"
      }
      on_error => "empty_folder_name"
    }
    if ![empty_folder_name] {
      mutate {
        replace => {
          "has_target_resource" => "true"
        }
      }
    }
  }

  mutate {
    convert => {
      "event1.folderId" => "string"
    }
    on_error => "folder_id_already_string"
  }
  mutate {
    replace => {
      "folder_id" => "%{event1.folderId}"
    }
    on_error => "empty_folder_id"
  }
  if [folder_id] != "" {
    mutate {
      replace => {
        "target.user.product_object_id" => "%{folder_id}"
      }
      on_error => "invalid_folder_id"
    }
    if ![invalid_folder_id] {
      mutate {
        replace => {
          "has_target_user" => "true"
        }
      }
    }
  }

  mutate {
    replace => {
      "registration_method" => "%{event1.registrationMethod}"
    }
    on_error => "invalid_registration_method"
  }
  if [registration_method] != "" {
    mutate {
      replace => {
        "security_result.description" => "%{registration_method}"
      }
      on_error => "error_in_registration_method"
    }
  }

  mutate {
    replace => {
      "format_event" => "%{event1.format}"
    }
    on_error => "invalid_format"
  }
  if [format_event] != "" {
    mutate {
      replace => {
        "format_label.key" => "Format"
        "format_label.value" => "%{format_event}"
      }
      on_error => "error_in_format"
    }
    if ![error_in_format] {
      mutate {
        merge => {
          "target.resource.attribute.labels" => "format_label"
        }
        on_error => "invalid_format_label"
      }
      if ![invalid_format_label] {
        mutate {
          replace => {
            "has_target_resource" => "true"
          }
        }
      }
    }
  }

  mutate {
    replace => {
      "method_event" => "%{event1.method}"
    }
    on_error => "invalid_method"
  }
  if [method_event] != "" {
    mutate {
      replace => {
        "method_label.key" => "Method"
        "method_label.value" => "%{method_event}"
      }
      on_error => "error_in_method"
    }
    if ![error_in_method] {
      mutate {
        merge => {
          "target.resource.attribute.labels" => "method_label"
        }
        on_error => "invalid_method_label"
      }
      if ![invalid_method_label] {
        mutate {
          replace => {
            "has_target_resource" => "true"
          }
        }
      }
    }
  }

  mutate {
    replace => {
      "source_event" => "%{event1.source}"
    }
    on_error => "invalid_source"
  }
  if [source_event] != "" {
    mutate {
      replace => {
        "target.application" => "%{source_event}"
      }
      on_error => "invalid_source_event"
    }
    if ![invalid_source_event] {
      mutate {
        replace => {
          "has_target_application" => "true"
        }
      }
    }
  }

  mutate {
    replace => {
      "filename_event" => "%{event1.filename}"
    }
    on_error => "invalid_filename"
  }
  if [filename_event] != "" {
    mutate {
      merge => {
        "target.file.names" => "filename_event"
      }
      on_error => "invalid_filename_label"
    }
    if ![invalid_filename_label] {
      mutate {
        replace => {
          "has_target_file" => "true"
        }
      }
    }
  }

  mutate {
    replace => {
      "publishedLink_name" => "%{event1.publishedLink.name}"
    }
    on_error => "empty_publishedLink_name"
  }
  if [publishedLink_name] != "" {
    mutate {
      replace => {
        "target.resource.name" => "%{publishedLink_name}"
      }
      on_error => "invalid_publishedLink_name"
    }
    if ![invalid_publishedLink_name] {
      mutate {
        replace => {
          "has_target_resource" => "true"
        }
      }
    }
  }

  mutate {
    replace => {
      "publishedLink_format" => "%{event1.publishedLink.format}"
    }
    on_error => "empty_publishedLink_format"
  }
  if [publishedLink_format] != "" {
    mutate {
      replace => {
        "publish_format_labels.key" => "Format"
        "publish_format_labels.value" => "%{publishedLink_format}"
      }
      on_error => "invalid_publishedLink_format"
    }
    if ![invalid_publishedLink_format] {
      mutate {
        merge => {
          "target.resource.attribute.labels" => "publish_format_labels"
        }
        on_error => "invalid_publishedLink_format_label"
      }
      if ![invalid_publishedLink_format_label] {
        mutate {
          replace => {
            "has_target_resource" => "true"
          }
        }
      }
    }
  }

  mutate {
    replace => {
      "publishedLink_link" => "%{event1.publishedLink.link}"
    }
    on_error => "empty_publishedLink_link"
  }
  if [publishedLink_link] != "" {
    mutate {
      replace => {
        "target.file.full_path" => "%{publishedLink_link}"
      }
      on_error => "invalid_publishedLink_link"
    }
    if ![invalid_publishedLink_link] {
      mutate {
        replace => {
          "has_target_file" => "true"
        }
      }
    }
  }

  mutate {
    replace => {
      "method_type" => "%{event1.documentOpenedMethod.MethodType}"
    }
    on_error => "invalid_method_type"
  }
  if [method_type] != "" {
    mutate {
      replace => {
        "method_type_label.key" => "MethodType"
        "method_type_label.value.string_value" => "%{method_type}"
      }
      on_error => "empty_method_type_label"
    }
    if ![empty_method_type_label] {
      mutate {
        merge => {
          "additional.fields" => "method_type_label"
        }
        on_error => "invalid_method_type_label"
      }
    }
  }


  if [eventType] != "" {
    mutate {
      replace => {
        "metadata.product_event_type" => "%{eventType}"
      }
      on_error => "invalid_eventtype"
    }
  }

  if [eventType] == "logins.user.successfulUserLogin" {
    mutate {
      replace => {
        "has_user_login" => "true"
        "event.idm.read_only_udm.extensions.auth.type" => "AUTHTYPE_UNSPECIFIED"
      }
    }
  }
  else if [eventType] == "logins.user.successfulUserLogout" {
    mutate {
      replace => {
        "has_user_logout" => "true"
        "event.idm.read_only_udm.extensions.auth.type" => "AUTHTYPE_UNSPECIFIED"
      }
    }
  }
  else if [eventType] in ["content.document.updateCollaboratorRole","content.document.updateShareLinkSettings","content.document.documentFolderEntrypointUpdated"] {
    mutate {
      replace => {
        "has_user_resource_updated" => "true"
      }
    }
  }

  if [has_user_login] == "true" and [has_target_user] == "true" {
    mutate {
      replace => {
        "event_type" => "USER_LOGIN"
      }
    }
  }
  else if [has_user_logout] == "true" and [has_target_user] == "true" {
    mutate {
      replace => {
        "event_type" => "USER_LOGOUT"
      }
    }
  }
  else if [has_user_resource_updated] == "true" and [has_target_resource] == "true" and [has_principal_user] == "true" {
    mutate {
      replace => {
        "event_type" => "USER_RESOURCE_UPDATE_CONTENT"
      }
    }
  }
  else if [has_principal_user] == "true" and [has_target_application] == "true" and [has_target_user] == "true" {
    mutate {
      replace => {
        "event_type" => "USER_CREATION"
      }
    }
  }
  else if [has_target_resource] == "true" and [has_principal_user] == "true" {
    mutate {
      replace => {
        "event_type" => "USER_RESOURCE_CREATION"
      }
    }
  }
  else if [has_target_file] == "true" and [has_principal] == "true" and [has_target] == "true" {
    mutate {
      replace => {
        "event_type" => "FILE_CREATION"
      }
    }
  }
  else if [has_target_resource] == "true" {
    mutate {
      replace => {
        "event_type" => "USER_RESOURCE_ACCESS"
      }
    }
  }
  else if [has_principal_user] == "true"{
    mutate {
      replace => {
        "event_type" => "USER_COMMUNICATION"
      }
    }
  }
  else if [has_principal] == "true" and [has_target] == "false" {
    mutate {
      replace => {
        "event_type" => "STATUS_UPDATE"
      }
    }
  }

  if [event_type] != "" {
    mutate {
      replace => {
        "metadata.event_type" => "%{event_type}"
      }
      on_error => "invalid_event_type"
    }
  }
  else {
    mutate {
      replace => {
        "metadata.event_type" => "GENERIC_EVENT"
      }
    }
  }

  mutate {
    replace => {
      "metadata.vendor_name" => "LUCID"
    }
  }

  if [metadata] != "" {
    mutate {
      rename => {
        "metadata" => "event.idm.read_only_udm.metadata"
      }
      on_error => "invalid_metadata"
    }
  }

  if [principal] != "" {
    mutate {
      rename => {
        "principal" => "event.idm.read_only_udm.principal"
      }
      on_error => "invalid_principal"
    }
  }

  if [target] != "" {
    mutate {
      rename => {
        "target" => "event.idm.read_only_udm.target"
      }
      on_error => "invalid_target"
    }
  }

  if [network] != "" {
    mutate {
      rename => {
        "network" => "event.idm.read_only_udm.network"
      }
      on_error => "invalid_network"
    }
  }

  if [additional] != "" {
    mutate {
      rename => {
        "additional" => "event.idm.read_only_udm.additional"
      }
      on_error => "invalid_additional"
    }
  }

  if [security_result] != "" {
    mutate {
      merge => {
        "event.idm.read_only_udm.security_result" => "security_result"
      }
      on_error => "invalid_security_result"
    }
  }

  mutate {
    merge => {
      "@output" => "event"
    }
  }
}

