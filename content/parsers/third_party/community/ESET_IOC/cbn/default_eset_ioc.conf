# Product: ESET Threat Intelligence
# Category: IOC
# Supported Format: JSON
# Reference: N/A
# Last Updated: 2023-10-05
# Copyright 2023 Chronicle LLC

filter {
  mutate {
    replace => {
      "domain" => ""
      "downloaded_detection" => ""
      "ip" => ""
      "md5" => ""
      "url" => ""
      "valid_to" => ""
      "state" => ""
      "opener_detection" => ""
      "threat_det" => ""
    }
  }

  json {
    source => "message"
    on_error => "not_json"
    array_function => "split_columns"
  }

  if [domain] == "" and [ip] == "" {
    drop{
      tag => "TAG_NO_SECURITY_VALUE"
    }
  }
  else if [domain] != "" and [md5] == "" and [url] == "" {
    # Set event.ioc.domain_and_ports.domain if "domain" is not an IP address.
    mutate {
      replace => {
        "domain1" => "%{domain}"
      }
    }
    mutate {
      convert => {
        "domain1" => "ipaddress"
      }
      on_error => "domain_is_not_ip"
    }

    if [domain_is_not_ip] {
      mutate {
        rename => {
          "domain1" => "event.ioc.domain_and_ports.domain"
        }
      }
    }
    else if [ip] == "" {
      mutate {
        rename => {
          "domain1" => "event.ioc.ip_and_ports.ip_address"
        }
      }
    }

    # Populate the IP address field (if it's set).
    if [ip] != "" {
      mutate {
        replace => {
          "ip1" => "%{ip}"
        }
      }
      mutate {
        convert => {
          "ip1" => "ipaddress"
        }
        on_error => "not_ip"
      }

      if ![not_ip] {
        mutate {
          rename => {
            "ip1" => "event.ioc.ip_and_ports.ip_address"
          }
        }
      }
    }

    # Populate confidence.
    mutate {
      replace => {
        "event.ioc.confidence_score" => "%{confidence}"
      }
    }

    mutate {
      replace => {
        "event.ioc.raw_severity" =>  "%{confidence}"
      }
    }

    # "state" captures the closest thing we have to category.
    # Known states include Phishing, Unwanted (PUA), and Blocked.
    mutate {
      replace => {
        "event.ioc.categorization" => "%{state}"
      }
    }

    # Set the description (if there is one).
    # The "downloaded_detection" field is sometimes populated with a threat name.
    mutate {
      replace => {
        "event.ioc.description" => "%{downloaded_detection}"
      }
    }

    # Parse the end time (there's no explicit start time).
    date {
      match => [ "valid_to", "yyyy-MM-dd HH:mm:ss ZZZ" ]
      target => "end"
    }

    mutate {
      rename => {
        "end" => "event.ioc.active_timerange.end"
      }
    }

    mutate {
      replace => {
        "event.ioc.feed_name" => "ESET Threat Intelligence"
      }
    }
  }

  date {
    match => [ "valid_to", "yyyy-MM-dd HH:mm:ss ZZZ" ]
    target => "event.idm.entity.metadata.interval.start_time"
    on_error => "invalid_date_format"
  }

  mutate {
    replace => {
      "event.idm.entity.metadata.vendor_name" => "ESET_IOC"
      "event.idm.entity.metadata.product_name" => "ESET_IOC"
      "threat_det.confidence_details" => "%{confidence}"
      "threat_cat" => "NETWORK_MALICIOUS"
    }
  }

  mutate {
    merge => {
      "threat_det.category" => "threat_cat"
    }
  }

  if [state] != "" {
    mutate {
      merge => {
        "threat_det.category_details" => "state"
      }
    }
  }

  if [downloaded_detection] not in ["","null"] {
    mutate {
      merge => {
        "threat_det.category_details" => "downloaded_detection"
      }
    }
  }

  if [opener_detection] not in ["","null"] {
    mutate {
      merge => {
        "threat_det.category_details" => "opener_detection"
      }
    }
  }

  if [url] != "" {
    mutate {
      replace => {
        "event.idm.entity.metadata.entity_type" => "URL"
        "event.idm.entity.entity.url" => "%{url}"
      }
    }
  }

  if [md5] != "" {
    mutate {
      replace => {
        "event.idm.entity.metadata.entity_type" => "FILE"
        "event.idm.entity.entity.file.md5" => "%{md5}"
      }
    }
  }

  if [domain] != "" {
    grok {
      match => {
        "domain" => "%{IP:ip}"
      }
      overwrite => ["ip"]
      on_error => "not_ip"
    }
    if [not_ip] {
      mutate {
        replace => {
          "event.idm.entity.metadata.entity_type" => "DOMAIN_NAME"
          "event.idm.entity.entity.hostname" => "%{domain}"
        }
      }
    }
  }

  if [ip] != "" {
    mutate {
      replace => {
        "ip1" => "%{ip}"
      }
    }
    mutate {
      convert => {
        "ip1" => "ipaddress"
      }
      on_error => "not_ip"
    }

    if ![not_ip] {
      mutate {
        replace => {
          "event.idm.entity.metadata.entity_type" => "IP_ADDRESS"
        }
      }

      mutate {
        merge => {
          "event.idm.entity.entity.ip" => "ip"
        }
      }
    }
  }

  if [threat_det] != "" {
    mutate {
      merge => {
        "event.idm.entity.metadata.threat" => "threat_det"
      }
    }
  }

  mutate {
    merge => {
      "@output" => "event"
    }
  }
}
