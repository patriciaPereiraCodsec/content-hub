# Product: Citrix StoreFront
# Category: Remote Access Tools
# Supported Format: JSON
# Reference: See below
# Last Updated: 2025-02-12
# Copyright 2025 Google SecOps

# Additional references:
# https://developer-docs.citrix.com/projects/monitor-service-odata-api/en/7.15-ltsr/api-schema.png
# https://developer-docs.citrix.com/projects/monitor-service-odata-api/en/7.15-ltsr/api-reference/Monitor.Model
# https://docs.citrix.com/en-us/citrix-virtual-apps-desktops/technical-overview.html

filter {

  mutate {
    replace => {
      "Session.LogOnDuration" => ""
      "Connection.ClientPlatform" => ""
      "_intermediary_hypervisor.hostname" => ""
      "_intermediary_controller.hostname" => ""
      "_intermediary_storefront.hostname" => ""
      "AppInstance.ApplicationId" => ""
      "Connection.ConnectedViaHostName" => ""
      "Machine.AssociatedUserNames" => ""
      "Machine.AssociatedUserUPNs" => ""
      "_target_user_emails" => ""
      "EventTime" => ""
      "Channel" => ""
      "severity" => ""
      "Severity" => ""
      "Level" => ""
      "SeverityValue" => ""
      "Opcode" => ""
      "Hostname" => ""
      "EventID" => ""
      "Keywords" => ""
      "Keywords_not_present" => ""
      "RecordNumber" => ""
      "OpcodeValue" => ""
      "OpcodeValue_label" => ""
      "_no_opcode_value" => ""
      "Task" => ""
      "description" => ""
      "kv_data" => ""
      "Message" => ""
      "security_result" => ""
      "extensions" => ""
      "has_principal" => "false"
      "has_target" => "false"
      "X-Citrix-Via" => ""
      "X-Citrix-Via-VIP" => ""
      "Remoteadresse" => ""
      "src_ip" => ""
      "X-Forwarded-For" => ""
      "SourceModuleType" => ""
      "SourceModuleName" => ""
      "resourcename" => ""
      "ThreadID" => ""
      "ThreadID_not_present" => ""
      "XForwardedFor" => ""
      "XCitrixVia"=> ""
      "XCitrixViaVIP" => ""
      "_user_json" => ""
      "Connection.Protocol" => ""
      "User.Upn" => ""
      "Session.LifecycleState" => ""
      "_principal" => ""
      "_target" => ""
      "_network" => ""
      "event.idm.read_only_udm.metadata.event_type" => "GENERIC_EVENT"
      "XCitrixGateway" => ""
      "_no_XCitrixGateway" => ""
    }
  }
  # The following way to extract the log structure was based in the reference (1), mentioned in the header section of this file.
  # It was identified that the attributes match sequentially the content of Session, User, AppInstance, App, Connection and Machine entities.
  # Then it was defined a new JSON structure with attributes in terms of each entity.
  grok {
    match => {
     "message" => ".*?\\\"id\\\"(?P<session>.*?SessionKey.*?LogOnDuration.*?ConnectionState.*SessionType.*?),(?P<_user_json>\\\"Id.*)"
    }
      overwrite => ["_user_json"]
      on_error => "mesage_grok_error"
    }
  grok {
    match => {
      "_user_json" => ".*?\\\"Id\\\"(?P<user>.*?Upn.*?UserName.*?),(?P<_app_instance>\\\"Id.*)"
    }
    on_error => "_no_user_json"
  }

  grok {
    match => {
      "_app_instance" => ".*?\\\"Id\\\"(?P<app_instance>.*?ApplicationId.*?),(?P<_app>\\\"Id.*)"
    }
    on_error => "_no_app_instance"
  }
  grok {
    match => {
      "_app" => ".*?\\\"Id\\\"(?P<app>.*?Name.*?PublishedName.*?),(?P<_connection>\\\"Id.*)"
    }
    on_error => "_no_app"
  }

  # Define if we should extract AppInstance and App
  if [_no_app_instance] and [_no_app] {
    mutate {
      rename => {
        "_app_instance" => "_connection"
      }
    }
    grok {
      match => {
        "_connection" => ".*?\\\"Id\\\"(?P<connection>.*?ClientName.*?ConnectedViaHostName.*?Protocol.*?),(?P<_machine>\\\"Id.*)"
      }
      on_error => "_no_connection"
    }
    grok {
      match => {
        "_machine" => ".*?\\\"Id\\\"(?P<machine>.*?Sid.*?IPAddress.*?AssociatedUser.*?),\\\"EventReceivedTime.*"
      }
      on_error => "_no_machine"
    }
  } else {
    grok {
      match => {
        "_connection" => ".*?\\\"Id\\\"(?P<connection>.*?ClientName.*?ConnectedViaHostName.*?Protocol.*?),(?P<_machine>\\\"Id.*)"
      }
      on_error => "_no_connection"
    }
    grok {
      match => {
        "_machine" => ".*?\\\"Id\\\"(?P<machine>.*?Sid.*?IPAddress.*?AssociatedUser.*?),\\\"EventReceivedTime.*"
      }
      on_error => "_no_machine"
    }
    mutate {
      replace => {
        "app_instance" => "{\"Id\"%{app_instance}}"
        "app" => "{\"Id\"%{app}}"
      }
      on_error => "_no_app_instance"
    }
  }

  # Required parts
  mutate {
    replace => {
      "session" => "{\"Id\"%{session}}"
      "user" => "{\"Id\"%{user}}"
      "connection" => "{\"Id\"%{connection}}"
      "machine" => "{\"Id\"%{machine}}"
    }
    on_error => "_no_required_parts"
  }

  if [_no_app_instance] and [_no_app] {
    mutate {
      replace => {
        "monitor_model" => "{ \"Session\":%{session},\"User\":%{user},\"Connection\":%{connection},\"Machine\":%{machine} }"
      }
      gsub => ["monitor_model", ",\}" "}"]
      on_error => "_no_required_parts"
    }
  } else {
    mutate {
      replace => {
        "monitor_model" => "{ \"Session\":%{session},\"User\":%{user},\"Connection\":%{connection},\"Machine\":%{machine},\"AppInstance\":%{app_instance},\"App\":%{app} }"
      }
      gsub => ["monitor_model", ",\}" "}"]
      on_error => "_no_required_parts"
    }
  }
  grok {
    match => {
    "message" => ".*\\\"EventReceivedTime\\\":\\\"%{DATA:event_date}\\\".*"
    }
    on_error => "mesage_grok_error1"
  }

  json {
    source => "monitor_model"
    on_error => "_no_monitor_model_json"
  }
  date {
    match => ["event_date", "RFC3339"]
    on_error => "_no_event_date"
  }
  # network: Session and Connection data
  if [Connection][Protocol] != "" {
    if [Connection][Protocol] == "HDX" {
      mutate {
        replace => {
          "_network.application_protocol" => "UNKNOWN_APPLICATION_PROTOCOL"
        }
        on_error => "_no_connection_protocol"
      }
    } else {
      mutate {
        replace => {
          "_network.application_protocol" => "%{Connection.Protocol}"
        }
        on_error => "_no_connection_protocol"
      }
    }
  }
  if [Session][LogOnDuration] != "" {
    mutate {
      rename => {
        "Session.LogOnDuration" => "_network.session_duration.seconds"
      }
    }
  }
  mutate {
    replace => {
      "_network.session_id" => "%{Session.SessionKey}"
    }
    on_error => "_no_session_id"
    convert => {
      "_network.session_duration.seconds" => "integer"
    }
  }
  # principal: Connection and User data
  if [Connection][ClientPlatform] != "" {
    mutate {
      uppercase => ["Connection.ClientPlatform"]
    }
    if [Connection][ClientPlatform] in ["WINDOWS", "MAC", "LINUX"] {
      mutate {
        replace => {
          "_principal.asset.platform_software.platform" => "%{Connection.ClientPlatform}"
        }
        on_error => "_no_connection_client_platform"
      }
    } else {
      mutate {
        replace => {
          "_principal.asset.platform_software.platform" => "UNKNOWN_PLATFORM"
        }
        on_error => "_no_connection_client_platform"
      }
    }
  }

  if [User][Upn] =~ ".*@.*" {
    mutate {
      merge => {
        "_principal.user.email_addresses" => "User.Upn"
      }
      on_error => "_no_user_upn"
    }
  }

  mutate {
    replace => {
      "_asset_ip" => "%{Connection.ClientAddress}"
    }
    on_error => "_no_connection_client_ip"
  }

  mutate {
    convert => {
      "Connection.ClientAddress" => "ipaddress"
    }
    on_error => "_no_asset_ip"
  }

  if ![_no_asset_ip] {
    mutate {
      merge => {
        "_principal.asset.ip" => "_asset_ip"
      }
      on_error => "_no_asset_ip"
    }
  }
  mutate {
    replace => {
      "User.AdministrativeDomain" => "%{User.Domain}"
    }
    on_error => "_no_user_domain"
  }
  mutate {
    rename => {
      "User.UserName" => "_principal.user.userid"
      "User.FullName" => "_principal.user.user_display_name"
      "User.Sid" => "_principal.user.windows_sid"
      "User.Domain" => "_principal.user.company_name"
      "Connection.ClientName" => "_principal.asset.hostname"
      "App.PublishedName" => "_principal.application"
      "User.AdministrativeDomain" => "_principal.administrative_domain"
    }
  }

  # intermediary: Connection and Machine data
  # StoreFront server
  mutate {
    replace => {
      "louched_ip" => "%{Connection.LaunchedViaIPAddress}"
    }
    on_error => "_no_connection_louched_ip"
  }

  mutate {
    convert => {
      "Connection.LaunchedViaIPAddress" => "ipaddress"
    }
    on_error => "_no_louched_ip"
  }

  if ![_no_louched_ip] {
    mutate {
      merge => {
        "_intermediary_storefront.ip"  => "louched_ip"
      }
      on_error => "_no_louched_ip"
    }
  }

  mutate {
    replace => {
      "_intermediary_storefront.namespace" => "StoreFront server"
      "_intermediary_controller.namespace" => "Controller"
      "_intermediary_hypervisor.namespace" => "Hypervisor"
    }
    on_error => "_no_namespace"
  }

  mutate {
    replace => {
      # Set the namespace as StoreFront server according doc references (https://developer-docs.citrix.com/projects/monitor-service-odata-api/en/latest/api-reference/Monitor.Model/#launchedviahostname_1)
      "_intermediary_storefront.hostname" => "%{Connection.LaunchedViaHostName}"
    }
    on_error => "_no_conn_louchvia"
  }
  # Controller
  mutate {
    replace => {
      # Set the namespace as Controller according doc references (https://developer-docs.citrix.com/projects/monitor-service-odata-api/en/latest/api-reference/Monitor.Model/#controllerdnsname)
      "_intermediary_controller.hostname" => "%{Machine.ControllerDnsName}"
    }
    on_error => "_no_cotroller_dnsname"
  }
  # Hypervisor
  mutate {
    replace => {
      # Set the namespace as Hypervisor according doc references (https://developer-docs.citrix.com/projects/monitor-service-odata-api/en/latest/api-reference/Monitor.Model/#hostingservername_1)
      "_intermediary_hypervisor.hostname" => "%{Machine.HostingServerName}"
    }
    on_error => "_no_hosting_servername"
  }
  # target: Machine data
  date {
    match => ["Machine.CreatedDate", "RFC3339"]
    target => "machine_create_date"
    on_error => "_no_machine_create_date"
  }

  date {
    match => ["Machine.PoweredOnDate", "RFC3339"]
    target => "machine_boot_date"
    on_error => "_no_machine_boot_date"
  }
  date {
    match => ["Machine.RegistrationStateChangeDate", "RFC3339"]
    target => "machine_first_discover_date"
    on_error => "_no_machine_first_discover_date"
  }
  date {
    match => ["Machine.LastDeregisteredDate", "RFC3339"]
    target => "machine_last_discover_date"
    on_error => "_no_machine_last_discover_date"
  }
  date {
    match => ["Machine.ModifiedDate", "RFC3339"]
    target => "machine_last_update_date"
    on_error => "_no_last_update_date"
  }
  date {
    match => ["Session.StartDate", "RFC3339"]
    target => "session_start_date"
    on_error => "_no_start_date"
  }
  date {
    match => ["Session.EndDate", "RFC3339"]
    target => "session_end_date"
    on_error => "_no_end_date"
  }

  grok {
    match => {
      "message" => ".*?AssociatedUserUPNs\\\":\\\"%{DATA:_target_users}\\\""
    }
    on_error => "_no_target_users"
  }

  if ![_no_target_users] {
    mutate {
      replace => {
        "_target_user_emails" => "{\"emails\":[%{_target_users}]}"
      }
      on_error => "_no_target_users"
    }

    mutate { gsub => ["_target_user_emails", "\\[", "[\""] }
    mutate { gsub => ["_target_user_emails", ",", "\",\""] }
    mutate { gsub => ["_target_user_emails", "\]", "\"]"] }
    json {
      source => "_target_user_emails"
      array_function => "split_columns"
      on_error => "_no_target_users_json"
    }
  }
  grok {
    match => {
      "Machine.Name" => "%{WORD:machine_domain}\\\\%{WORD:machine_asset}"
    }
    on_error => "_no_MacName"
  }

  if ![_no_MacName] {
    mutate {
      replace => {
        "_target.administrative_domain" => "%{machine_domain}"
        "_target.asset.asset_id" => "machine:%{machine_asset}"
      }
      on_error => "_no_MacName"
    }
  }
  for emailto in emails {
    if emailto =~ "^.+@.+$" {
      mutate {
        merge => {
          "_target.group.email_addresses" => "emailto"
        }
        on_error => "_no_group_email_addresses"
      }
    }
  }

  mutate {
    replace => {
      "_target.asset.type" => "WORKSTATION"
    }
      on_error => "_no_asset_type"
    rename => {
      "Machine.HostedMachineName" => "_target.asset.hostname"
      "Machine.DnsName" => "_target.asset.network_domain"
      "Machine.OSType" => "_target.asset.platform_software.platform_version"
      "machine_create_date" => "_target.asset.attribute.creation_time"
      "machine_first_discover_date" => "_target.asset.first_discover_time"
      "machine_last_discover_date" => "_target.asset.last_discover_time"
      "machine_last_update_date" => "_target.asset.system_last_update_time"
      "machine_boot_date" => "_target.asset.last_boot_time"
    }
  }

  mutate {
    rename => {
      "session_start_date" => "_vulns.first_found"
      "session_end_date" => "_vulns.last_found"
    }
  }

  mutate {
    merge => {
      "event.idm.read_only_udm.extensions.vulns.vulnerabilities" => "_vulns"
    }
    on_error => "_no_vulns"
  }

  if [Machine][AssociatedUserUPNs] != "" or [Machine][AssociatedUserNames] != "" {

    if [Machine][AssociatedUserNames] != "" {
      mutate {
        replace => {
          "Machine.AssociatedUserNames" => "{\"associatednames\":[\"%{Machine.AssociatedUserNames}\"]}"
        }
        on_error => "_no_associated_user_names"
        gsub => ["Machine.AssociatedUserNames", ",", "\",\""]
      }

      # To escape the back-slash (\) need to put following substitute block, if not used,
      # the JSON spilt filter throws error for e.g. JSON: invalid character 'U' in string escape code
      mutate {
        gsub => ["Machine.AssociatedUserNames", "\\\\", "\\\\"]
      }
      json {
        source => "Machine.AssociatedUserNames"
        array_function => "split_columns"
        on_error => "_no_associated_user_names_json"
      }
    }

    if [_target_user_emails] != "" {
      json {
        source => "_target_user_emails"
        array_function => "split_columns"
        on_error => "_no_target_user_emails_json"
      }
    }

    for i,useridemail in emails {
      mutate {
        replace => {
          "_intermediary" => ""
        }
        on_error => "_no_intermediary"
      }
      if useridemail =~ "^.+@.+$" {
        mutate {
          merge => {
            "_intermediary.user.email_addresses" => "useridemail"
          }
          on_error => "_no_user_email_addresses"
        }
        mutate {
          merge => {
            "event.idm.read_only_udm.intermediary" => "_intermediary"
          }
          on_error => "_no_intermediary"
        }
      }
      for j, name in associatednames {
        if [i] == [j] {
          mutate {
            replace => {
              "_intermediary.user.userid" => "%{name}"
            }
            on_error => "_no_user_id"
          }
        }
      }
    }
  }

  if [Connection][ConnectedViaHostName] != "" {
    mutate {
      replace => {
        "event.idm.read_only_udm.src.hostname" => "%{Connection.ConnectedViaHostName}"
      }
      on_error => "_no_connected_via_host_name"
    }
  }

  if [AppInstance][ApplicationId] != "" {
    mutate {
      rename => {
        "AppInstance.ApplicationId" => "_network.http.user_agent"
      }
    }
  }

  mutate {
    rename => {
      "Machine.DesktopGroupId" => "_target.group.product_object_id"
    }
  }

  mutate {
    merge => {
      "_target.asset.ip" => "Machine.IPAddress"
    }
    on_error => "_no_machine_ip_address"
  }

  if [Session][LifecycleState] == 0 {
    mutate {
      replace => {
        "event.idm.read_only_udm.extensions.auth.auth_details" => "ACTIVE"
      }
      on_error => "_no_auth_details"
    }
  }
  else if [Session][LifecycleState] == 1 {
    mutate {
      replace => {
        "event.idm.read_only_udm.extensions.auth.auth_details" => "DELETED"
      }
      on_error => "_no_auth_details_session"
    }
  }
  else if [Session][LifecycleState] == 2 or [Session][LifecycleState] == 3 {
    mutate {
      replace => {
        "event.idm.read_only_udm.extensions.auth.auth_details" => "UNKNOWN_AUTHENTICATION_STATUS"
      }
      on_error => "_no_session_LifecycleState"
    }
  }
  mutate {
    replace => {
      "event.idm.read_only_udm.metadata.event_type" => "USER_LOGIN"
      "event.idm.read_only_udm.metadata.vendor_name" => "Citrix"
      "event.idm.read_only_udm.metadata.product_name" => "Monitor Service OData"
      "event.idm.read_only_udm.extensions.auth.type" => "MACHINE"
    }
    on_error => "_no_event_type"
  }

  #Has hostname or LaunchedViaIPAddress (no_louched_ip boolean by grok search)
  if [_intermediary_storefront][hostname] != "" or ![_no_louched_ip] {
    mutate {
      merge => {
        "event.idm.read_only_udm.intermediary" => "_intermediary_storefront"
      }
      on_error => "_no_intermediary_storefront"
    }
  }

  if [_intermediary_controller][hostname] != "" {
    mutate {
      merge => {
        "event.idm.read_only_udm.intermediary" => "_intermediary_controller"
      }
      on_error => "_no_intermediary_controller"
    }
  }

  if [_intermediary_hypervisor][hostname] != "" {
    mutate {
      merge => {
        "event.idm.read_only_udm.intermediary" => "_intermediary_hypervisor"
      }
      on_error => "_no_intermediary_hypervisor"
    }
  }

  mutate {
    rename => {
      "Machine.AgentVersion" => "event.idm.read_only_udm.metadata.product_version"
    }
  }

  if [mesage_grok_error] {
    json{
      source => "message"
      array_function => "split_columns"
      on_error => "_no_json"
    }
    if [_no_json] {
      grok {
        match => {
          "message" =>
          ["%{TIMESTAMP_ISO8601}\\s+%{DATA:hostname}\\s+%{DATA:severity}\\s+%{GREEDYDATA:Message}",
          "X-Citrix-Via:\\s+%{GREEDYDATA:XCitrixVia}",
          "X-Citrix-Via-VIP:\\s+%{IP:XCitrixViaVIP}",
          "Remoteadresse:\\s+%{IP:Remoteadresse}",
          "X-Forwarded-For:\\s+%{GREEDYDATA:XForwardedFor}",
          "X-Citrix-Gateway:\\s+%{GREEDYDATA:XCitrixGateway}"
          ]
        }
        overwrite => ["hostname", "severity", "Message", "XCitrixVia", "XCitrixViaVIP", "Remoteadresse", "XForwardedFor", "XCitrixGateway"]
        on_error => "no_grok"
      }
      mutate {
        gsub => ["message", "XCitrixVia", "X-Citrix-Via"]
      }
      mutate {
        gsub => ["message", "XCitrixViaVIP", "X-Citrix-Via-VIP"]
      }
      mutate {
        gsub => ["message", "Remoteadresse", "Remote-adresse"]
      }
      mutate {
        gsub => ["message", "XForwardedFor", "X-Forwarded-For"]
      }
      if [no_grok] == true {
        drop {
          tag => "TAG_UNSUPPORTED"
        }
      }
    }
    if [EventTime] != "" {
      date {
        match => ["EventTime", "RFC3339", "ISO8601", "yyyy-MM-dd HH:mm:ss"]
        on_error => "_no_event_time"
      }
    }
    if [XCitrixGateway] not in [ "", "null" ] {
      mutate {
        replace => {
          "XCitrixGateway_label.key" => "XCitrixGateway"
          "XCitrixGateway_label.value.string_value" => "%{XCitrixGateway}"
        }
        on_error => "_no_XCitrixGateway"
      }
      if ![_no_XCitrixGateway] {
        mutate {
          merge => {
            "event.idm.read_only_udm.additional.fields" => "XCitrixGateway_label"
          }
          on_error => "_no_XCitrixGateway"
        }
      }
    }
    if [Channel] != "" and [Channel] != "-" {
      mutate {
        replace => {
          "Channel_label.key" => "Channel"
          "Channel_label.value" => "%{Channel}"
        }
        on_error => "_no_channel"
      }
      mutate {
        merge => {
          "security_result.about.resource.attribute.labels" => "Channel_label"
        }
        on_error => "_no_channel"
      }
    }
    if [Severity] != "" {
      mutate {
        replace => {
          "severity" => "%{Severity}"
        }
        on_error => "_no_severity"
      }
    }
    if [severity] == "" and [Level] != "" {
      mutate {
        replace => {
          "severity" => "%{Level}"
        }
        on_error => "_no_level"
      }
    }
    if [severity] != "" {
      if [severity] =~ "(?i)Info" {
        mutate {
          replace => {
            "security_result.severity" => "INFORMATIONAL"
          }
          on_error => "_no_severity"
        }
      }
      else if [severity] =~ "(?i)Error" {
        mutate {
          replace => {
            "security_result.severity" => "ERROR"
          }
          on_error => "_no_severity"
        }
      }
      else if [severity] =~ "(?i)Warning" {
        mutate {
          replace => {
            "security_result.severity" => "MEDIUM"
          }
          on_error => "_no_severity"
        }
      }
      else {
        mutate {
          replace => {
            "security_result.severity" => "LOW"
          }
          on_error => "_no_severity"
        }
      }
    }
    if [SeverityValue] not in [ "", "-"] {
      mutate{
        convert => {
          "SeverityValue" => "string"
        }
        on_error => "_no_severity_value"
      }
      mutate {
        replace => {
          "security_result.severity_details" => "%{SeverityValue}"
        }
        on_error => "_no_severity_value"
      }
    }
    if [Opcode] != "" {
      mutate {
        replace => {
          "Opcode_label.key" => "Opcode"
          "Opcode_label.value.string_value" => "%{Opcode}"
        }
        on_error => "_no_opcode"
      }
      if ![_no_opcode] {
        mutate {
          merge => {
            "event.idm.read_only_udm.additional.fields" => "Opcode_label"
          }
          on_error => "_no_opcode"
        }
      }
    }
    if [Hostname] != "" {
      mutate {
        replace => {
          "_principal.hostname" => "%{Hostname}"
          "_principal.asset.hostname" => "%{Hostname}"
        }
        on_error => "_no_hostname"
      }
      mutate {
        replace => {
          "has_principal" => "true"
        }
        on_error => "_no_hostname"
      }
    }
    if [EventID] != "" {
      mutate {
        convert => {
          "EventID" => "string"
        }
        on_error => "_no_event_id"
      }
      mutate {
        replace => {
          "event.idm.read_only_udm.metadata.product_event_type" => "%{EventID}"
        }
        on_error => "EventID_empty"
      }
    }
    if [Keywords] not in ["" , " " , "null" , "N/A"] {
      mutate {
        convert => {
          "Keywords" => "string"
        }
        on_error => "_no_keywords"
      }
      mutate {
        replace => {
          "Keywords_label.key" => "Keywords"
          "keyword_label.value.string_value" => "%{Keywords}"
        }
        on_error => "Keywords_not_present"
      }
      if ![Keywords_not_present] {
        mutate {
          merge => {
            "event.idm.read_only_udm.additional.fields" => "keyword_label"
          }
          on_error => "Keywords_not_present"
        }
      }
    }
    if [RecordNumber] != "" {
      mutate {
        convert => {
          "RecordNumber" => "string"
        }
        on_error => "_no_record_number"
      }
      mutate {
        replace => {
          "event.idm.read_only_udm.metadata.product_log_id" => "%{RecordNumber}"
        }
        on_error => "_no_record_number"
      }
    }
    if [OpcodeValue] not in [ "", "null" ] {
      mutate {
        convert => {
          "OpcodeValue" => "string"
        }
        on_error => "_no_opcode_value"
      }
      mutate {
        replace => {
          "OpcodeValue_label.key" => "OpcodeValue"
          "OpcodeValue_label.value.string_value" => "%{OpcodeValue}"
        }
        on_error => "_no_opcode_value"
      }
      if ![_no_opcode_value] {
        mutate {
          merge => {
            "event.idm.read_only_udm.additional.fields" => "OpcodeValue_label"
          }
          on_error => "_no_opcode_value"
        }
      }
    }
    if [Task] != "" {
      mutate {
        convert => {
          "Task" => "string"
        }
        on_error => "_no_task"
      }
      mutate {
        replace => {
          "_target.resource.type" => "%{Task}"
        }
        on_error => "_no_task"
      }
    }
    if [Message] != "" {
      mutate {
        gsub => ["Message", "\\\r\\\n", "#"]
      }
      grok {
        match => {
          "Message" => ["%{DATA:description}#%{GREEDYDATA:kv_data}"]
        }
        overwrite => ["description", "kv_data"]
        on_error => "_no_message"
      }
    }
    if [description] != ""{
      mutate {
        replace => {
          "event.idm.read_only_udm.metadata.description" => "%{description}"
        }
        on_error => "_no_description"
      }
    }
    kv {
      source => "kv_data"
      value_split => ":"
      field_split => "#"
      on_error => "_no_kv_data"
    }
    if [X-Citrix-Via] != "" {
      mutate {
        replace => {
          "X-Citrix-Via_label.key" => "X-Citrix-Via"
          "X-Citrix-Via_label.value.string_value" => "%{X-Citrix-Via}"
        }
        on_error => "_no_x_citrix_via"
      }
      mutate {
        merge => {
          "event.idm.read_only_udm.additional.fields" => "X-Citrix-Via_label"
        }
        on_error => "_no_x_citrix_via"
      }
    }
    if [X-Citrix-Via-VIP] != "" {
      mutate {
        merge => {
          "_target.ip" => "X-Citrix-Via-VIP"
          "_target.asset.ip" => "X-Citrix-Via-VIP"
        }
        on_error => "_no_x_citrix_via_vip"
      }
      mutate {
        replace => {
          "has_target" => "true"
        }
        on_error => "_no_x_citrix_via_vip"
      }
    }
    if [Remoteadresse] != "" {
      mutate {
        merge => {
          "_target.ip" => "Remoteadresse"
          "_target.asset.ip" => "Remoteadresse"
        }
        on_error => "_no_remoteadresse"
      }
      mutate {
        replace => {
          "has_target" => "true"
        }
        on_error => "_no_remoteadresse"
      }
    }
    if [X-Forwarded-For] != "" {
      mutate {
        gsub => ["X-Forwarded-For",',','\",\"']
      }
      mutate {
        replace => {
          "X-Forwarded-For" => "{\"X-Forwarded-For\":[\"%{X-Forwarded-For}\"]}"
        }
        on_error => "no_X-Forwarded-For"
      }
      json {
        source => "X-Forwarded-For"
        array_function => "split_columns"
        on_error => "invalid_X-Forwarded-For"
      }

      if ![invalid_X-Forwarded-For] {
        for ipval in X-Forwarded-For {
          if [ipval] != "" {
            grok {
              match => {
                "ipval" => "%{IP:src_ip}"
              }
              overwrite => ["src_ip"]
              on_error => "invalid_src_ip"
            }
            if ![invalid_src_ip] {
              mutate {
                merge => {
                  "_principal.ip" => "src_ip"
                  "_principal.asset.ip" => "src_ip"
                }
                on_error => "no_src_ip"
              }
              if ![no_src_ip] {
                mutate {
                  replace => {
                    "has_principal" => "true"
                  }
                  on_error => "no_src_ip"
                }
              }
            }
          }
        }
      }
    }
    if [SourceModuleName] != "" {
      mutate {
        replace => {
          "_target.resource.name" => "%{SourceModuleName}"
        }
        on_error => "_no_source_module_name"
      }
    }
    if [SourceModuleType] != "" {
      mutate {
        replace => {
          "source_module_type.key" => "SourceModuleType"
          "source_module_type.value" => "%{SourceModuleType}"
        }
        on_error => "source_module_type_error"
      }
      if ![source_module_type_error] {
        mutate {
          merge => {
            "_principal.resource.attribute.labels" => "source_module_type"
          }
          on_error => "merge_error"
        }
      }
    }
    if [resourcename] != "" {
      mutate {
        replace => {
          "_principal.resource.name" => "%{resourcename}"
        }
        on_error => "_no_resourcename"
      }
    }
    if [ThreadID] not in ["" , " " , "null" , "N/A"] {
      mutate {
        convert => {
          "ThreadID" => "string"
        }
        on_error => "_no_thread_id"
      }
      mutate {
        replace => {
          "ThreadID_label.key" => "ThreadID"
          "ThreadID_label.value.string_value" => "%{ThreadID}"
        }
        on_error => "ThreadID_not_present"
      }
      if ![ThreadID_not_present] {
        mutate {
          merge => {
            "event.idm.read_only_udm.additional.fields" => "ThreadID_label"
          }
          on_error => "ThreadID_not_present"
        }
      }
    }
  }
  if [event][idm][read_only_udm][metadata][event_type] == "GENERIC_EVENT" {
    if [has_principal] == "true" and [has_target] == "true" {
      mutate {
        replace => {
          "event.idm.read_only_udm.metadata.event_type" => "NETWORK_CONNECTION"
        }
      }
    }
    else if [has_principal] == "true"  {
      mutate {
        replace => {
          "event.idm.read_only_udm.metadata.event_type" => "STATUS_UPDATE"
        }
      }
    }
  }
  if [_principal] != "" {
    mutate {
      rename => {
        "_principal" => "event.idm.read_only_udm.principal"
      }
    }
  }

  if [_target] != "" {
    mutate {
      rename => {
        "_target" => "event.idm.read_only_udm.target"
      }
    }
  }

  if [_network] != "" {
    mutate {
      rename => {
        "_network" => "event.idm.read_only_udm.network"
      }
    }
  }

  if [extensions] != "" {
    mutate {
      rename => {
        "extensions" => "event.idm.read_only_udm.extensions"
      }
    }
  }

  if [security_result] != "" {
    mutate {
      merge => {
        "event.idm.read_only_udm.security_result" => "security_result"
      }
      on_error => "no_security_result"
    }
  }
  mutate {
    merge => {
      "@output" => "event"
    }
  }
}
