# Product: WPENGINE
# Category: Firewall log types
# Supported Format: SYSLOG
# Reference: NA
# Last Updated: 2025-02-11
# Copyright 2025 Google SecOps


filter {
  mutate {
    replace => {
      "client_ip" => ""
      "Hostname" => ""
      "method" => ""
      "request" => ""
      "version" => ""
      "response_code" => ""
      "received_bytes" => ""
      "user_agent" => ""
      "port" => ""
      "pid" => ""
      "scan_type" => ""
      "scan_value" => ""
      "json_logs" => ""
      "blog_id" => ""
      "kind" => ""
      "name" => ""
      "slug" => ""
      "ver" => ""
      "sig" => ""
      "msg" => ""
      "secure_url" => ""
      "protocol" => ""
      "has_principal" => "false"
    }
  }
  grok {
    match => {
      "message" => [
        '%{IP:client_ip} %{HOSTNAME:Hostname} - \\[%{HTTPDATE:timestamp}\\] \\\"%{WORD:method} / %{WORD:protocol}/%{DATA:version}\\\" %{WORD:response_code} %{NUMBER:received_bytes} \\\"%{DATA:secure_url}/\\\" \\\"%{GREEDYDATA:user_agent}; %{GREEDYDATA:not_secure_url}/\\)\\\"',
        '%{IP:client_ip} %{HOSTNAME:Hostname} %{WORD} \\[%{HTTPDATE:timestamp}\\] \\\"%{WORD:method} / %{WORD}/%{NUMBER:version}\\\" %{NUMBER:response_code} %{NUMBER:response_bytes} \\\"-\\\" \\\"%{GREEDYDATA:user_agent} \\(\+%{GREEDYDATA:path}\\)\\\"',
        '%{IP:client_ip} %{HOSTNAME:Hostname}:%{NUMBER:port} - \\[%{HTTPDATE:timestamp}\\] \\\"%{WORD:method} %{URIPATHPARAM:request} HTTP/%{NUMBER:version}\\\" %{NUMBER:response_code} %{NUMBER:received_bytes} \\"-\\" \\"%{DATA:user_agent}\\"',
        '\\[%{DAY:day} %{MONTH:month} %{NUMBER:day_of_month} %{TIME:timestamp} %{YEAR:year}\\] \\[%{WORD:log_level}:%{WORD:log_type}\\] \\[pid %{NUMBER:pid}\\] \\[client %{IP:client_ip}:%{NUMBER:port}\\] %{WORD}:%{WORD:scan_type}=%{WORD:scan_value} %{GREEDYDATA:json_logs}',
        '\\[%{DAY:day} %{MONTH:month} %{NUMBER:day_of_month} %{TIME:timestamp} %{YEAR:year}\\] \\[%{WORD:log_level}:%{WORD:log_type}\\] \\[pid %{NUMBER:pid}\\] \\[client %{IP:client_ip}:%{NUMBER:port}\\] %{GREEDYDATA:msg}',
        '%{IP:client_ip} %{HOSTNAME:Hostname} %{WORD:user} \\[%{HTTPDATE:timestamp}\\] \\\"%{WORD:method} %{URIPATHPARAM:request} %{WORD}/%{NUMBER:version}\\\" %{NUMBER:response_code} %{NUMBER:received_bytes} \\\"-\\\" \\\"%{GREEDYDATA:user_agent}\\\"'
        ]
    }
    on_error => "pattern_mismatch"
    overwrite => ["client_ip", "Hostname", "timestamp", "method", "request", "version", "response_code",
                 "received_bytes", "user_agent","port","pid","log_level", "log_type", "scan_type", "scan_value",
                 "json_logs", "msg", "day", "month", "day_of_month", "year","secure_url", "not_secure_url", "path",
                 "user", "protocol"]
  }
  json{
    source => "json_logs"
    array_function => "split_columns"
    on_error => "not_json"
  }

  date {
    match => [
      "timestamp", "dd/MMM/yyyy:HH:mm:ss. Z"
    ]
    on_error => "invalid_timestamp"
  }
  if [client_ip] != "" {
    mutate {
      merge => {
        "event.idm.read_only_udm.principal.ip" => "client_ip",
        "event.idm.read_only_udm.principal.asset.ip" => "client_ip"
      }
      on_error => "invalid_client_ip"
    }
    if ![invalid_client_ip] {
      mutate {
        replace => {
          "has_principal" => "true"
        }
      }
    }
  }
  if [Hostname] != "" {
    mutate {
      replace => {
        "event.idm.read_only_udm.principal.hostname" => "%{Hostname}",
        "event.idm.read_only_udm.principal.asset.hostname" => "%{Hostname}",
        "has_principal" => "true"
      }
      on_error => "hostname_empty"
    }
  }
  if [protocol] != "" {
    mutate {
      replace => {
        "event.idm.read_only_udm.network.application_protocol" => "%{protocol}",
      }
      on_error => "hostname_empty"
    }
  }
  if [method] != "" {
    mutate {
      replace => {
        "event.idm.read_only_udm.network.http.method" => "%{method}"
      }
      on_error => "invalid_method"
    }
  }
  if [version] != "" {
    mutate {
      convert => {
        "version" => "string"
      }
      on_error => "invalid_version"
    }
    mutate {
      replace => {
        "event.idm.read_only_udm.network.application_protocol_version" => "%{version}"
      }
      on_error => "invalid_version"
    }
  }
  if [response_code] != "" {
    mutate {
      convert => {
        "response_code" => "string"
      }
      on_error => "invalid_response_code"
    }
    mutate {
      replace => {
        "event.idm.read_only_udm.network.http.response_code" => "%{response_code}"
      }
      on_error => "invalid_response_code"
    }
    mutate {
      convert => {
        "event.idm.read_only_udm.network.http.response_code" => "integer"
      }
      on_error => "invalid_response_code"
    }
  }
  if [received_bytes] != "" {
    mutate {
      convert => {
        "received_bytes" => "string"
      }
      on_error => "invalid_received_bytes"
    }
    mutate {
      replace => {
        "event.idm.read_only_udm.network.received_bytes" => "%{received_bytes}"
      }
      on_error => "invalid_received_bytes"
    }
    mutate {
      convert => {
        "event.idm.read_only_udm.network.received_bytes" => "uinteger"
      }
      on_error => "invalid_received_bytes"
    }
  }
  if [port] != "" {
    mutate {
      convert => {
        "port" => "string"
      }
      on_error => "invalid_port"
    }
    mutate {
      replace => {
        "event.idm.read_only_udm.principal.port" => "%{port}"
      }
      on_error => "invalid_port"
    }
    mutate {
      convert => {
        "event.idm.read_only_udm.principal.port" => "integer"
      }
      on_error => "invalid_port"
    }
  }
  if [pid] != "" {
    mutate {
      convert => {
        "pid" => "string"
      }
      on_error => "invalid_pid"
    }
    mutate {
      replace => {
        "event.idm.read_only_udm.principal.process.pid" => "%{pid}"
      }
      on_error => "invalid_pid"
    }
  }
  if [user_agent] != "" {
    mutate {
      replace => {
        "event.idm.read_only_udm.network.http.user_agent" => "%{user_agent}"
      }
      on_error => "invalid_user_agent"
    }
    mutate {
      replace => {
        "event.idm.read_only_udm.network.http.parsed_user_agent" => "%{user_agent}"
      }
      on_error => "user_agent_empty"
    }
    mutate {
      convert => {
        "event.idm.read_only_udm.network.http.parsed_user_agent" => "parseduseragent"
      }
      on_error => "user_agent_not_available"
    }
  }
  if [request] not in ["", "/"] {
    mutate {
      replace => {
        "request_label.key" => "requested_file"
        "request_label.value.string_value" => "%{request}"
      }
      on_error => "no_request"
    }
    if ![no_request] {
      mutate {
        merge => {
          "event.idm.read_only_udm.additional.fields" => "request_label"
        }
        on_error => "request_label_merge_error"
      }
    }
  }
  if [scan_type] != "" {
    mutate {
      replace => {
        "security_result.description" => "%{scan_type}"
      }
      on_error => "scan_type_is_not_present"
    }
  }
  if [scan_value] != "" {
    mutate {
      replace => {
        "security_result.description" => "%{scan_value}"
      }
      on_error => "scan_value_is_not_present"
    }
  }
  if [msg] != "" {
    mutate {
      replace => {
        "event.idm.read_only_udm.metadata.description" => "%{msg}"
      }
      on_error => "Msg_is_not_present"
    }
  }
  if [sig] != ""{
    mutate {
      replace => {
        "sig_label.key" => "signature"
        "sig_label.value.string_value" => "%{sig}"
      }
      on_error => "no_signature"
    }
    if ![no_signature] {
      mutate {
        merge => {
          "event.idm.read_only_udm.additional.fields" => "sig_label"
        }
        on_error => "signature_label_merge_error"
      }
    }
  }
  if [blog_id] != ""{
    mutate {
      replace => {
        "blog_label.key" => "blog_id"
        "blog_label.value.string_value" => "%{blog_id}"
      }
      on_error => "no_blog_id"
    }
    if ![no_blog_id] {
      mutate {
        merge => {
          "event.idm.read_only_udm.additional.fields" => "blog_id_label"
        }
        on_error => "blog_id_label_merge_error"
      }
    }
  }
  if [kind] != ""{
    mutate {
      replace => {
        "kind_label.key" => "kind"
        "kind_label.value.string_value" => "%{kind}"
      }
      on_error => "no_kind"
    }
    if ![no_kind] {
      mutate {
        merge => {
          "event.idm.read_only_udm.additional.fields" => "kind_label"
        }
        on_error => "kind_label_merge_error"
      }
    }
  }
  if [name] != ""{
    mutate {
      replace => {
        "name_label.key" => "name"
        "name_label.value.string_value" => "%{name}"
      }
      on_error => "no_name"
    }
    if ![no_name] {
      mutate {
        merge => {
          "event.idm.read_only_udm.additional.fields" => "name_label"
        }
        on_error => "name_label_merge_error"
      }
    }
  }
  if [slug] != ""{
    mutate {
      replace => {
        "slug_label.key" => "slug"
        "slug_label.value.string_value" => "%{slug}"
      }
      on_error => "no_slug"
    }
    if ![no_slug] {
      mutate {
        merge => {
          "event.idm.read_only_udm.additional.fields" => "slug_label"
        }
        on_error => "slug_label_merge_error"
      }
    }
  }
  if [ver] != ""{
    mutate {
      replace => {
        "ver_label.key" => "ver"
        "ver_label.value.string_value" => "%{ver}"
      }
      on_error => "no_ver"
    }
    if ![no_ver] {
      mutate {
        merge => {
          "event.idm.read_only_udm.additional.fields" => "ver_label"
        }
        on_error => "ver_label_merge_error"
      }
    }
  }
  if [secure_url] != "" {
    mutate {
      replace => {
        "event.idm.read_only_udm.network.http.referral_url" => "%{secure_url}"
      }
      on_error => "secure_url_is_not_present"
    }
  }
  if [has_principal] == "true" {
    mutate {
      replace => {
        "event.idm.read_only_udm.metadata.event_type" => "STATUS_UPDATE"
      }
      on_error => "invalid_event_type"
    }
  } else {
    mutate {
      replace => {
        "event.idm.read_only_udm.metadata.event_type" => "GENERIC_EVENT"
      }
    }
  }
  mutate {
    merge => {
      "@output" => "event"
    }
  }
}
