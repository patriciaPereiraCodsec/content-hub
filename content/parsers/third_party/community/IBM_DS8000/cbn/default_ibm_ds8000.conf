# Product: IBM DS8000
# Category: Audit Logs
# Supported Format: Syslog, CSV
# Reference: https://www.ibm.com/docs/en/ds8900/9.4.0?topic=logs-syslog-audit-log-details
# Last Updated: 2024-07-24
# Copyright 2023 Chronicle LLC

filter {
  mutate {
    replace => {
      "metadata_token.product_name" => "IBM DS8000"
      "metadata_token.vendor_name" => "IBM"
    }
  }

  mutate {
    replace => {
      "principal_token" => ""
      "network_token" => ""
      "temp_security_result" => ""
      "additional_token" => ""
      "target_token" => ""
      "extension_token" => ""
      "priority" => ""
      "sys_log_time" => ""
      "hostname" => ""
      "product_event_type" => ""
      "process_id" => ""
      "dhcp_type" => ""
      "ciaddr" => ""
      "dhcp_mac" => ""
      "interface" => ""
      "pool" => ""
      "ip_ranges" => ""
      "total_ip" => ""
      "free_ip" => ""
      "backup_ip" => ""
      "lts" => ""
      "max_imbalance" => ""
      "max_imbalance_val" => ""
      "from" => ""
      "to" => ""
      "log_message" => ""
      "event_details" => ""
      "event_type" => ""
      "date_time" => ""
      "username" => ""
      "description" => ""
      "role" => ""
      "scope" => ""
      "interface_name" => ""
      "asset_ip" => ""
      "principal_ip" => ""
      "volume" => ""
      "pool_name" => ""
      "capacity" => ""
      "unit" => ""
      "timestamp" => ""
      "src_token" => ""
    }
  }

  grok {
    match => {
      message =>
      [
      "<%{NUMBER:priority}>%{SYSLOGTIMESTAMP:sys_log_time}\\s%{HOSTNAME:hostname}\\s%{DATA:product_event_type}\\s%{DATA:collect_time}\\s\\(%{DATA:time_zone}\\)%{DATA:severity}\\s\\[%{DATA:pid}\\]\\s%{DATA:application}:\\s%{GREEDYDATA:log_message}",

      "<%{NUMBER:priority}>%{SYSLOGTIMESTAMP:sys_log_time}\\s%{HOSTNAME:hostname}\\s%{WORD:product_event_type}\\[?(?P<process_id>[0-9]*)\]?:\\s%{WORD:dhcp_type}\\s%{WORD}\\s%{IPV4:ciaddr}\\s[to|from]+\\s%{MAC:dhcp_mac}\\svia\\s%{WORD:interface}",

      "<%{NUMBER:priority}>%{SYSLOGTIMESTAMP:sys_log_time} %{HOSTNAME:hostname} %{WORD:product_event_type}\\[?(?P<process_id>[0-9]*)\\]?: (?P<pool>[balanced|balancing]+ [pool]+ [a-z0-9]+) %{DATA:ip_ranges}  total %{NUMBER:total_ip}  free %{NUMBER:free_ip}  backup %{NUMBER:backup_ip}  lts %{NUMBER:lts}  %{DATA:max_imbalance} %{GREEDYDATA:max_imbalance_val}",

      "<%{NUMBER:priority}>%{SYSLOGTIMESTAMP:sys_log_time}\\s%{HOSTNAME:hostname}\\s%{DATA:event_details}\\s%{SYSLOGTIMESTAMP:_}\\s%{DATA:_}\\s%{DATA:product_event_type}\\[%{DATA:pid}\\]:\\s%{GREEDYDATA:log_message}",

      "<%{NUMBER:priority}>%{SYSLOGTIMESTAMP:sys_log_time}\\s%{HOSTNAME:hostname}\\s%{DATA:product_event_type}\\[%{DATA:pid}\\]:\\s%{GREEDYDATA:log_message}",

      "<%{NUMBER:priority}>%{SYSLOGTIMESTAMP:sys_log_time}\\s%{HOSTNAME:hostname}\\s%{DATA:product_event_type}\\s\\[%{DATA:date_time}\\]\\s\(?:Volume\|Volumes\)\\s%{DATA:volume}\\s%{GREEDYDATA:description}",

      "<%{NUMBER:priority}>%{SYSLOGTIMESTAMP:sys_log_time}\\s%{HOSTNAME:hostname}\\s%{DATA:product_event_type},%{DATA:timestamp},%{GREEDYDATA:csv_values}",

      "<%{NUMBER:priority}>%{SYSLOGTIMESTAMP:sys_log_time}\\s%{HOSTNAME:hostname}\\s%{DATA:product_event_type}\\s\\[%{DATA:date_time}\\]\\sUser\\s%{DATA:username}\\s%{DATA:description} with ,%{DATA:role} role and scope %{DATA:scope} from %{DATA:interface_name} \\(level %{IPV4:asset_ip}\\) at IP address %{IPV4:principal_ip}",

      "<%{NUMBER:priority}>%{SYSLOGTIMESTAMP:sys_log_time}\\s%{HOSTNAME:hostname}\\s%{DATA:product_event_type}\\s\\[%{DATA:date_time}\\]\\s\(?:User\|Users\)\\s%{DATA:username}\\s%{GREEDYDATA:description}"
      ]
    }
    overwrite => ["priority", "sys_log_time", "hostname", "product_event_type", "process_id", "dhcp_type", "ciaddr", "dhcp_mac", "interface", "pool", "ip_ranges", "total_ip", "free_ip", "backup_ip", "lts", "max_imbalance", "max_imbalance_val", "log_message", "event_details", "date_time", "username", "description", "role", "scope", "interface_name", "asset_ip", "principal_ip", "volume", "timestamp"]
    on_error => "syslog_match_error"
  }

  if ![syslog_match_error] {
    if [date_time] != "" or [timestamp] != "" {
      grok {
        match => {
            "date_time" => "(?<date_time>(\\d*/?)* (\\d*:){2}\\d*)"
        }
        overwrite => ["date_time"]
        on_error => "date_time_grok_error"
      }
      if ![date_time_grok_error] {
        date {
          match => ["date_time", "yyyy/M/d HH:mm:ss"]
          on_error => "date_time_error"
        }
      }

      grok {
        match => {
            "timestamp" => "(?<timestamp>(\\d*/?)* (\\d*:){2}\\d*)"
        }
        overwrite => ["timestamp"]
        on_error => "timestamp_grok_error"
      }
      if ![timestamp_grok_error] {
        date {
          match => ["timestamp", "yyyy/M/d HH:mm:ss"]
          on_error => "timestamp_error"
        }
      }

      date {
        match => ["sys_log_time", "MMM d HH:mm:ss"]
        rebase => true
        target => "metadata_token.collected_timestamp"
        on_error => "sys_log_time_error"
      }
    }
    else {
      date {
        match => ["sys_log_time", "MMM d HH:mm:ss"]
        rebase => true
        on_error => "sys_log_time_error"
      }
    }

    # priority
    if [priority] != "" {
      mutate {
        convert => {
          "priority" => "float"
        }
      }

      mutate {
        rename => {
          "priority" => "priority_kv.value.number_value"
        }
      }

      mutate {
        replace => {
          "priority_kv.key" => "log_priority"
        }
      }

      mutate {
        merge => {
          "additional_token.fields" => "priority_kv"
        }
      }
    }

    # hostname
    mutate {
      replace => {
        "principal_token.hostname" => "%{hostname}"
        "principal_token.asset.hostname" => "%{hostname}"
      }
    }

    # product_event_type
    mutate {
      replace => {
        "metadata_token.product_event_type" => "%{product_event_type}"
      }
    }
    if [event_details] != "" {
      mutate {
        replace => {
          "metadata_token.product_event_type" =>
          "%{event_details} %{product_event_type}"
        }
      }
    }

    if [product_event_type] == "snmptrapd" {
      grok {
        match => {
          "log_message" => "%{DATA:time}\\s<%{DATA:src_name}>\\s\\[%{DATA:ip_protocol}:\\s\\[%{IPV4:src_ip}\\]:%{DATA:src_port}->\\[%{IPV4:target_ip}\\]:%{DATA:target_port}\\]:%{GREEDYDATA:trap_details}"
        }
        on_error => "snmptrapd_grok_error"
      }
      if ![snmptrapd_grok_error]{
        date {
          match => ["sys_log_time", "MMM d HH:mm:ss"]
          rebase => true
          target => "metadata_token.collected_timestamp"
          on_error => "sys_log_time_error"
        }
        date {
          match => ["time", "yyyy-M-d HH:mm:ss"]
          on_error => "time_error"
        }
        mutate {
          replace => {
            "network_token.application_protocol" => "SNMP"
          }
        }
        mutate {
          replace => {
            "network_token.ip_protocol" => "%{ip_protocol}"
          }
          on_error => "ip_protocol_error"
        }
        mutate {
          replace => {
            "src_token.hostname" => "%{src_name}"
          }
          on_error => "src_name_error"
        }
        mutate {
          merge => {
            "src_token.ip" => "src_ip"
          }
          on_error => "src_ip_error"
        }
        mutate {
          merge => {
            "target_token.ip" => "target_ip"
          }
          on_error => "target_ip_error"
        }
        if [src_port] != "" {
          mutate {
            replace => {
              "src_token.port" => "%{src_port}"
            }
            on_error => "src_port_error"
          }
          mutate {
            convert => {
              "src_token.port" => "integer"
            }
            on_error => "src_port-convert_error"
          }
        }
        if [target_port] != "" {
          mutate {
            replace => {
              "target_token.port" => "%{target_port}"
            }
            on_error => "target_port_error"
          }
          mutate {
            convert => {
              "target_token.port" => "integer"
            }
            on_error => "target_port_convert_error"
          }
        }
        if [target_ip] != "" {
          mutate {
            replace => {
              "event_type" => "NETWORK_UNCATEGORIZED"
            }
          }
        }
        grok {
          match => {
            "trap_details" => "sysUpTimeInstance = Timeticks:%{DATA:timeticks}#%{DATA}snmpTrapOID.0 = %{DATA:trap_oid}#%{DATA:obj1} = %{DATA:obj1_value}#%{DATA:obj2} = %{DATA:obj2_value}#%{DATA:obj3} = %{DATA:obj3_value}#%{DATA:obj4} = %{GREEDYDATA:obj4_value}"
          }
          on_error => "trap_details_grok_error"
        }
        if ![trap_details_grok_error] {
          mutate {
            replace => {
              "timeticks.value.string_value" => "%{timeticks}"
            }
            on_error => "timeticks_not_found"
          }
          if ![timeticks_not_found] and [timeticks][value] != "" {
            mutate {
              replace => {
                "timeticks.key" => "sysUpTimeInstance"
              }
            }
            mutate {
              merge => {
                "additional_token.fields" => "timeticks"
              }
              on_error => "_"
            }
          }

          mutate {
            gsub => ["trap_oid", "OID: ", ""]
          }
          mutate {
            replace => {
              "trap_oid.value.string_value" => "%{trap_oid}"
            }
            on_error => "trap_oid_not_found"
          }
          if ![trap_oid_not_found] and [trap_oid][value] != "" {
            mutate {
              replace => {
                "trap_oid.key" => "snmpTrapOID"
              }
            }
            mutate {
              merge => {
                "additional_token.fields" => "trap_oid"
              }
              on_error => "_"
            }
          }

          mutate {
            gsub => ["obj1_value", "INTEGER: |STRING: ", ""]
          }
          mutate {
            replace => {
              "object1.value.string_value" => "%{obj1_value}"
            }
            on_error => "object1_not_found"
          }
          if ![object1_not_found] and [object1][value] != "" {
            mutate {
              replace => {
                "object1.key" => "%{obj1}"
              }
            }
            mutate {
              merge => {
                "additional_token.fields" => "object1"
              }
              on_error => "_"
            }
          }

          mutate {
            gsub => ["obj2_value", "INTEGER: |STRING: ", ""]
          }
          mutate {
            replace => {
              "object2.value.string_value" => "%{obj2_value}"
            }
            on_error => "object2_not_found"
          }
          if ![object2_not_found] and [object2][value] != "" {
            mutate {
              replace => {
                "object2.key" => "%{obj2}"
              }
            }
            mutate {
              merge => {
                "additional_token.fields" => "object2"
              }
              on_error => "_"
            }
          }

          mutate {
            gsub => ["obj3_value", "INTEGER: |STRING: ", ""]
          }
          mutate {
            gsub => ["obj3_value", "\"", ""]
          }
          mutate {
            replace => {
              "object3.value.string_value" => "%{obj3_value}"
            }
            on_error => "object3_not_found"
          }
          if ![object3_not_found] and [object3][value] != "" {
            mutate {
              replace => {
                "object3.key" => "%{obj3}"
              }
            }
            mutate {
              merge => {
                "additional_token.fields" => "object3"
              }
              on_error => "_"
            }
          }

          mutate {
            gsub => ["obj4_value", "INTEGER: |STRING: ", ""]
          }
          mutate {
            gsub => ["obj4_value", "\"", ""]
          }
          mutate {
            replace => {
              "object4.value.string_value" => "%{obj4_value}"
            }
            on_error => "object4_not_found"
          }
          if ![object4_not_found] and [object4][value] != "" {
            mutate {
              replace => {
                "object4.key" => "%{obj4}"
              }
            }
            mutate {
              merge => {
                "additional_token.fields" => "object4"
              }
              on_error => "_"
            }
          }
        }

        else {
          mutate {
            replace => {
              "trap_details.value.string_value" => "%{trap_details}"
            }
            on_error => "trap_details_not_found"
          }
          if ![trap_details_not_found] and [trap_details][value] != "" {
            mutate {
              replace => {
                "trap_details.key" => "trap_details"
              }
            }
            mutate {
              merge => {
                "additional_token.fields" => "trap_details"
              }
              on_error => "_"
            }
          }
        }
      }
    }

    if [product_event_type] == "Event" {

      if [username] != "" {
        mutate {
          replace => {
            "target_token.user.userid" => "%{username}"
          }
        }
      }

      if [description] != "" and [volume] == "" {
        mutate {
          replace => {
            "metadata_token.description" => "%{description}"
          }
        }
      }

      if [role] != "" {
        mutate {
          replace => {
            "target_token.user.role_name" => "%{role}"
          }
        }
      }

      if [scope] != "" {
        mutate {
          convert => {
            "scope" => "string"
          }
          on_error => "scope_conversion_error"
        }

        mutate {
          replace => {
            "scope_label.value.string_value" => "%{scope}"
          }
          on_error => "scope_not_found"
        }

        if ![scope_not_found] and [scope_label][value] != "" {
          mutate {
            replace => {
              "scope_label.key" => "scope"
            }
          }
          mutate {
            merge => {
              "additional_token.fields" => "scope_label"
            }
            on_error => "_"
          }
        }
      }

      if [interface_name] != "" {
        mutate {
          replace => {
            "name.value" => "%{interface_name}"
          }
          on_error => "interface_name_error"
        }
        if ![interface_name_error] {
          mutate {
            replace => {
              "name.key" => "interface_name"
            }
          }
          mutate {
            merge => {
              "principal_token.asset.attribute.labels" => "name"
            }
            on_error => "_"
          }
        }
      }

      if [asset_ip] != "" {
        mutate {
          merge => {
            "principal_token.asset.ip" => "asset_ip"
          }
          on_error => "asset_ip_error"
        }
      }

      if [principal_ip] != "" {
        mutate {
          merge => {
            "principal_token.ip" => "principal_ip"
          }
          on_error => "principal_ip_error"
        }
      }

      if [username] != "" and [description] =~ /logged in/ {
        mutate {
          replace => {
            "event_type" => "USER_LOGIN"
          }
        }

        mutate {
          replace => {
            "metadata_token.product_event_type" =>
            "Log In %{product_event_type}"
          }
        }

        mutate {
          replace => {
            "extension_token.auth.type" => "AUTHTYPE_UNSPECIFIED"
          }
        }
      }

      else if [username] != "" and [description] =~ /logged out/ {
        mutate {
          replace => {
            "event_type" => "USER_LOGOUT"
          }
        }

        mutate {
          replace => {
            "metadata_token.product_event_type" =>
            "Log Out %{product_event_type}"
          }
        }

        mutate {
          replace => {
            "extension_token.auth.type" => "AUTHTYPE_UNSPECIFIED"
          }
        }
      }

      else if [username] != "" and [description] =~ /password was modified/ {
        mutate {
          replace => {
            "event_type" => "USER_CHANGE_PASSWORD"
          }
        }
      }

      else {
         mutate {
          replace => {
            "event_type" => "USER_UNCATEGORIZED"
          }
        }
      }

      if [volume] != "" {
        mutate {
          replace => {
            "target_token.resource.resource_type" => "VOLUME"
          }
        }
        mutate {
          replace => {
            "target_token.resource.name" => "%{volume}"
          }
        }
        if [description] =~ /was deleted/ {
          mutate {
            replace => {
              "event_type" => "USER_RESOURCE_DELETION"
              "metadata_token.description" => "Volume was deleted"
            }
          }
        } else if [description] =~ /was modified/ {
          mutate {
            replace => {
              "event_type" => "USER_RESOURCE_ACCESS"
              "metadata_token.description" => "Volume was modified"
            }
          }
        } else if [description] =~ /was created/ {
          mutate {
            replace => {
              "event_type" => "USER_RESOURCE_ACCESS"
              "metadata_token.description" => "Volume was created"
            }
          }
          grok {
            match => {
              "description" => "%{DATA}pool\\s%{DATA:pool_name}\\s%{DATA}provisioned capacity of %{DATA:capacity} %{DATA:unit}. %{GREEDYDATA:description}"
            }
            overwrite => ["pool_name", "capacity", "unit", "description"]
            on_error => "grok_error"
          }
          if [pool_name] != "" {
            mutate {
              convert => {
                "pool_name" => "string"
              }
              on_error => "_"
            }

            mutate {
              replace => {
                "pool_name_label.value.string_value" => "%{pool_name}"
              }
              on_error => "pool_name_not_found"
            }

            if ![pool_name_not_found] and [pool_name_label][value] != "" {
              mutate {
                replace => {
                  "pool_name_label.key" => "pool_name"
                }
              }
              mutate {
                merge => {
                  "additional_token.fields" => "pool_name_label"
                }
              }
            }
          }

          if [capacity] != "" {
            mutate {
              convert => {
                "capacity" => "string"
              }
              on_error => "_"
            }

            mutate {
              replace => {
                "capacity_label.value.string_value" => "%{capacity} %{unit}"
              }
              on_error => "capacity_not_found"
            }

            if ![capacity_not_found] and [capacity_label][value] != "" {
              mutate {
                replace => {
                  "capacity_label.key" => "provisioned capacity"
                }
              }
              mutate {
                merge => {
                  "additional_token.fields" => "capacity_label"
                }
              }
            }
          }
          mutate {
            replace => {
              "temp_security_result.summary" => "Volume %{description}"
            }
          }
        }
      }
    }

    if [product_event_type] == "AOSAudit" {
      mutate {
        replace => {
          "event_type" => "STATUS_UNCATEGORIZED"
        }
      }

      date {
        match => ["collect_time", "yyyy.MM.dd-HH:mm:ss.SSS"]
        timezone => "GMT"
        target => "metadata_token.collected_timestamp"
      }

      #severity
      mutate {
        gsub => ["severity", " ", ""]
      }
      mutate {
        gsub => ["severity", "^(INFO|DEBUG)$", "INFORMATIONAL"]
      }
      mutate {
        replace => {
          "temp_security_result.severity" => "%{severity}"
        }
      }

      # pid
      mutate {
        replace => {
          "principal_token.process.pid" => "%{pid}"
        }
      }

      # application
      mutate {
        replace => {
          "principal_token.application" => "%{application}"
        }
      }

      # mapping extra fields
      grok {
        match => {
          "log_message" => "Sending status\\s=%{DATA:status},\\sGUID =\\s%{DATA:guid}, ACL =\\s%{GREEDYDATA:acl}"
        }
        on_error => "extra_fields_not_found"
      }
      if [extra_fields_not_found] and [log_message] != "" {
        mutate {
          replace => {
            "temp_security_result.summary" => "%{log_message}"
          }
        }
      }
      else {

        # guid
        mutate {
          replace => {
            "metadata_token.product_log_id" => "%{guid}"
          }
        }

        # Sending status
        mutate {
          convert => {
            "status" => "string"
          }
          on_error => "status_conversion_error"
        }

        mutate {
          replace => {
            "status_label.value.string_value" => "%{status}"
          }
          on_error => "status_not_found"
        }

        if ![status_not_found] and [status_label][value] != "" {
          mutate {
            replace => {
              "status_label.key" => "status"
            }
          }
          mutate {
            merge => {
              "additional_token.fields" => "status_label"
            }
          }
        }

        # acl
        mutate {
          convert => {
            "acl" => "string"
          }
          on_error => "acl_conversion_error"
        }

        mutate {
          replace => {
            "acl_label.value.string_value" => "%{acl}"
          }
          on_error => "acl_not_found"
        }

        if ![acl_not_found] and [acl_label][value] != "" {
          mutate {
            replace => {
              "acl_label.key" => "acl"
            }
          }
          mutate {
            merge => {
              "additional_token.fields" => "acl_label"
            }
          }
        }
      }

    }

    if [product_event_type] == "Audit U" {
      mutate {
        gsub => ["csv_values", "DSCLI,", ""]
      }
      mutate {
        gsub => ["csv_values", "DSGUI,", ""]
      }
      csv {
        source => "csv_values"
        separator => ","
        on_error => "csv_error"
      }

      if ![csv_error] {
        # user
        if [column1] != "" {
          if [column6] =~ /(login|Login)/ or
          [column6] =~ /(logoff|Logoff|logout|Logout)/ {
            mutate {
              replace => {
                "target_token.user.userid" => "%{column1}"
              }
            }
          } else {
            mutate {
              replace => {
                "principal_token.user.userid" => "%{column1}"
              }
            }
          }
        }

        if [column3] != "" {
          mutate {
            replace => {
              "principal_token.asset.asset_id" => "IBM: %{column3}"
            }
            on_error => "asset_id_error"
          }
        }

        if [column4] != "" {
          mutate {
            gsub => ["column4", "N", "INFORMATIONAL"]
          }
          mutate {
            gsub => ["column4", "W", "LOW"]
          }
          mutate {
            gsub => ["column4", "C", "CRITICAL"]
          }
          mutate {
            replace => {
              "temp_security_result.severity" => "%{column4}"
            }
            on_error => "severity_error"
          }
        }

        if [column5] != "" {
          mutate {
            replace => {
              "metadata_token.product_log_id" => "%{column5}"
            }
            on_error => "product_log_id_error"
          }
        }

        if [column6] != "" {
          mutate {
            replace => {
              "metadata_token.product_event_type" => "%{column6}"
            }
            on_error => "product_event_type_error"
          }
          if [column6] =~ /(login|Login)/ {
            mutate {
              replace => {
                "extension_token.auth.type" => "AUTHTYPE_UNSPECIFIED"
                "event_type" => "USER_LOGIN"
              }
            }
          }
          else if [column6] =~ /(logoff|Logoff|logout|Logout)/ {
            mutate {
              replace => {
                "extension_token.auth.type" => "AUTHTYPE_UNSPECIFIED"
                "event_type" => "USER_LOGOUT"
              }
            }
          } else if [column6] =~ /User_Create/ {
            mutate {
              replace => {
                "event_type" => "USER_CREATION"
              }
            }
          } else if [column6] =~ /User_Delete/ {
            mutate {
              replace => {
                "event_type" => "USER_DELETION"
              }
            }
          } else {
            mutate {
              replace => {
                "event_type" => "USER_UNCATEGORIZED"
              }
            }
          }
        }

        if [column7] != "" {
          mutate {
            replace => {
              "temp_security_result.summary" => "%{column7}"
            }
          }
        }

        if [column9] != "" {
          grok {
            match => {
              "column9" => "IP\\s*=\\s*/%{IPV4:ip}"
            }
            on_error => "invalid_ip_format"
          }
          if ![invalid_ip_format] {
            mutate {
              merge => {
                "principal_token.ip" => "ip"
              }
              on_error => "principal_ip_error"
            }
          }
          grok {
            match => {
              "column9" => "userName\\s*=\\s*%{GREEDYDATA:user_name}"
            }
            overwrite => ["user_name"]
            on_error => "invalid_userName"
          }
          if ![invalid_userName] {
            mutate {
              replace => {
                "target_token.user.userid" => "%{user_name}"
              }
              on_error => "username_error"
            }
          }
          if [invalid_ip_format] and [invalid_userName] {
            mutate {
              replace => {
                "temp_security_result.description" => "%{column9}"
              }
              on_error => "security_description_error"
            }
          }
        }

        mutate {
          convert => {
            "column2" => "string"
          }
          on_error => "management_console_conversion_error"
        }

        mutate {
          replace => {
            "management_console_label.value.string_value" => "%{column2}"
          }
          on_error => "management_console_not_found"
        }

        if ![management_console_not_found] and [column2] != "" {
          mutate {
            replace => {
              "management_console_label.key" => "management_console"
            }
          }
          mutate {
            merge => {
              "additional_token.fields" => "management_console_label"
            }
          }
        }

        mutate {
          convert => {
            "column8" => "string"
          }
          on_error => "result_code_conversion_error"
        }

        mutate {
          replace => {
            "result_code_label.value.string_value" => "%{column8}"
          }
          on_error => "result_code_not_found"
        }

        if ![result_code_not_found] and [column8] != "" {
          mutate {
            replace => {
              "result_code_label.key" => "result_code"
            }
          }
          mutate {
            merge => {
              "additional_token.fields" => "result_code_label"
            }
          }
        }
      }
    }

    if [product_event_type] in ["CROND", "crond", "systemd", "chronyd", "atd"] {
      mutate {
        replace => {
          "event_type" => "STATUS_UNCATEGORIZED"
        }
      }

      mutate {
        replace => {
          "principal_token.process.pid" => "%{pid}"
        }
      }

      grok {
        match => {
          "log_message" => [
            "%{GREEDYDATA:_}UID %{INT:user_id}",
            "%{GREEDYDATA:_}uid=%{INT:user_id}"
          ]
        }
        overwrite => ["user_id", "_"]
        on_error => "uid_grok_error"
      }

      if ![uid_grok_error] {
        mutate {
          replace => {
            "target_token.user.userid" => "%{user_id}"
          }
          on_error => "uid_error"
        }
        if ![uid_error] {
          mutate {
            replace => {
              "event_type" => "USER_UNCATEGORIZED"
            }
          }
        }
      }

      if [log_message] =~ /CMD/ {
        grok {
          match => {
            "log_message" => "\\(%{DATA:user}\\) CMD \\(%{DATA:command}\\)"
          }
          on_error => "command_extraction_grok_error"
        }
        if ![command_extraction_grok_error] {
          mutate {
            replace => {
              "principal_token.process.command_line" => "%{command}"
            }
          }
          mutate {
            replace => {
              "principal_token.user.user_display_name" => "%{user}"
            }
          }
        }
        else {
          drop {
            tag => "TAG_UNSUPPORTED"
          }
        }

      }
      else if [log_message] =~ /service/ {
        grok {
          match => {
            "log_message" => "%{DATA:service_unit}: %{GREEDYDATA:unit_details}"
          }
          on_error => "service_unit_grok_error"
        }
        if ![service_unit_grok_error] {
          mutate {
            replace => {
              "temp_security_result.summary" => "%{unit_details}"
            }
          }
          mutate {
            convert => {
              "service_unit" => "string"
            }
            on_error => "systemd_service_unit_conversion_error"
          }

          mutate {
            replace => {
              "systemd_service_unit_label.value.string_value" =>
              "%{service_unit}"
            }
            on_error => "systemd_service_unit_not_found"
          }

          if ![systemd_service_unit_not_found] and
            [systemd_service_unit_label][value] != "" {
            mutate {
              replace => {
                "systemd_service_unit_label.key" => "systemd_service_unit"
              }
            }
            mutate {
              merge => {
                "additional_token.fields" => "systemd_service_unit_label"
              }
            }
          }
        }
        else {
          mutate {
            replace => {
              "temp_security_result.summary" => "%{log_message}"
            }
          }
        }
      }
      else if [log_message] =~ /session/ {
        grok {
          match => {
            "log_message" => "%{DATA:session_scope}: %{GREEDYDATA:scope_detail}"
          }
          on_error => "session_scope_grok_error"
        }
        if ![session_scope_grok_error] {
          mutate {
            replace => {
              "temp_security_result.summary" => "%{scope_detail}"
            }
          }
          mutate {
            convert => {
              "session_scope" => "string"
            }
            on_error => "systemd_session_scope_conversion_error"
          }

          mutate {
            replace => {
              "systemd_session_scope_label.value.string_value" =>
              "%{session_scope}"
            }
            on_error => "systemd_session_scope_not_found"
          }

          if ![systemd_session_scope_not_found] and
            [systemd_session_scope_label][value] != "" {
            mutate {
              replace => {
                "systemd_session_scope_label.key" => "session_scope"
              }
            }
            mutate {
              merge => {
                "additional_token.fields" => "systemd_session_scope_label"
              }
            }
          }
        }
        else {
          mutate {
            replace => {
              "temp_security_result.summary" => "%{log_message}"
            }
          }
        }
      }
      else if [log_message] != "" {
        mutate {
          replace => {
            "temp_security_result.summary" => "%{log_message}"
          }
        }
      }
    }

    if [product_event_type] == "sendmail" {
      mutate {
        replace => {
          "event_type" => "EMAIL_UNCATEGORIZED"
        }
      }
      mutate {
        replace => {
          "principal_token.hostname" => "%{hostname}"
          "principal_token.asset.hostname" => "%{hostname}"
        }
      }
      mutate {
        replace => {
          "principal_token.process.pid" => "%{pid}"
        }
      }
      if [log_message] =~ /relay=/ {
        grok {
          match => {
            "log_message" => "%{DATA:message_id}:\\s%{GREEDYDATA:details}"
          }
        }
        mutate {
          replace => {
            "network_token.email.mail_id" => "%{message_id}"
          }
        }
        if [details] != "" {
          kv {
            source => "details"
            field_split => ","
            value_split => "="
          }
        }

        if [to] != "" {
          mutate {
            replace => {
              "target_token.user.userid" => "%{to}"
            }
          }
          mutate {
            split => {
              source => "relay"
              separator => " "
              target => "relay_values"
            }
          }
          for index, value in relay_values {
            grok {
              match => {
                "value" => "\\[%{IPV4:ip}\\]"
              }
              overwrite => ["ip"]
              on_error => "invalid_ip_format"
            }
            if ![invalid_ip_format] {
              mutate {
                merge => {
                  "target_token.ip" => "ip"
                }
              }
            }
          }
        }
        if [from] != "" {
          mutate {
            replace => {
              "principal_token.user.userid" => "%{from}"
            }
          }
          mutate {
            replace => {
              "network_token.sent_bytes" => "%{size}"
            }
          }
          mutate {
            convert => {
              "network_token.sent_bytes" => "uinteger"
            }
          }
          mutate {
            replace => {
              "target_token.hostname" => "%{relay}"
              "target_token.asset.hostname" => "%{relay}"
            }
          }
        }

        # Additional Fields Mapping
        mutate {
          convert => {
            "class" => "string"
          }
          on_error => "class_conversion_error"
        }

        mutate {
          replace => {
            "class_label.value.string_value" => "%{class}"
          }
          on_error => "class_not_found"
        }

        if ![class_not_found] and [class_label][value] != "" {
          mutate {
            replace => {
              "class_label.key" => "class"
            }
          }
          mutate {
            merge => {
              "additional_token.fields" =>
              "class_label"
            }
          }
        }

        mutate {
          convert => {
            "nrcpts" => "string"
          }
          on_error => "nrcpts_conversion_error"
        }

        mutate {
          replace => {
            "nrcpts_label.value.string_value" => "%{nrcpts}"
          }
          on_error => "nrcpts_not_found"
        }

        if ![nrcpts_not_found] and [nrcpts_label][value] != "" {
          mutate {
            replace => {
              "nrcpts_label.key" => "nrcpts"
            }
          }
          mutate {
            merge => {
              "additional_token.fields" =>
              "nrcpts_label"
            }
          }
        }

        mutate {
          convert => {
            "msgid" => "string"
          }
          on_error => "msgid_conversion_error"
        }

        mutate {
          replace => {
            "msgid_label.value.string_value" => "%{msgid}"
          }
          on_error => "msgid_not_found"
        }

        if ![msgid_not_found] and [msgid_label][value] != "" {
          mutate {
            replace => {
              "msgid_label.key" => "msgid"
            }
          }
          mutate {
            merge => {
              "additional_token.fields" =>
              "msgid_label"
            }
          }
        }

        mutate {
          convert => {
            "cltaddr" => "string"
          }
          on_error => "cltaddr_conversion_error"
        }

        mutate {
          replace => {
            "cltaddr_label.value.string_value" => "%{cltaddr}"
          }
          on_error => "cltaddr_not_found"
        }

        if ![cltaddr_not_found] and [cltaddr_label][value] != "" {
          mutate {
            replace => {
              "cltaddr_label.key" => "cltaddr"
            }
          }
          mutate {
            merge => {
              "additional_token.fields" =>
              "cltaddr_label"
            }
          }
        }

        mutate {
          convert => {
            "delay" => "string"
          }
          on_error => "delay_conversion_error"
        }

        mutate {
          replace => {
            "delay_label.value.string_value" => "%{delay}"
          }
          on_error => "delay_not_found"
        }

        if ![delay_not_found] and [delay_label][value] != "" {
          mutate {
            replace => {
              "delay_label.key" => "delay"
            }
          }
          mutate {
            merge => {
              "additional_token.fields" =>
              "delay_label"
            }
          }
        }

        mutate {
          convert => {
            "xdelay" => "string"
          }
          on_error => "xdelay_conversion_error"
        }

        mutate {
          replace => {
            "xdelay_label.value.string_value" => "%{xdelay}"
          }
          on_error => "xdelay_not_found"
        }

        if ![xdelay_not_found] and [xdelay_label][value] != "" {
          mutate {
            replace => {
              "xdelay_label.key" => "xdelay"
            }
          }
          mutate {
            merge => {
              "additional_token.fields" =>
              "xdelay_label"
            }
          }
        }

        mutate {
          convert => {
            "mailer" => "string"
          }
          on_error => "mailer_conversion_error"
        }

        mutate {
          replace => {
            "mailer_label.value.string_value" => "%{mailer}"
          }
          on_error => "mailer_not_found"
        }

        if ![mailer_not_found] and [mailer_label][value] != "" {
          mutate {
            replace => {
              "mailer_label.key" => "mailer"
            }
          }
          mutate {
            merge => {
              "additional_token.fields" =>
              "mailer_label"
            }
          }
        }

        mutate {
          convert => {
            "pri" => "string"
          }
          on_error => "pri_conversion_error"
        }

        mutate {
          replace => {
            "pri_label.value.string_value" => "%{pri}"
          }
          on_error => "pri_not_found"
        }

        if ![pri_not_found] and [pri_label][value] != "" {
          mutate {
            replace => {
              "pri_label.key" => "pri"
            }
          }
          mutate {
            merge => {
              "additional_token.fields" =>
              "pri_label"
            }
          }
        }

        mutate {
          convert => {
            "dsn" => "string"
          }
          on_error => "dsn_conversion_error"
        }

        mutate {
          replace => {
            "dsn_label.value.string_value" => "%{dsn}"
          }
          on_error => "dsn_not_found"
        }

        if ![dsn_not_found] and [dsn_label][value] != "" {
          mutate {
            replace => {
              "dsn_label.key" => "dsn"
            }
          }
          mutate {
            merge => {
              "additional_token.fields" =>
              "dsn_label"
            }
          }
        }

        mutate {
          convert => {
            "stat" => "string"
          }
          on_error => "stat_conversion_error"
        }

        mutate {
          replace => {
            "stat_label.value.string_value" => "%{stat}"
          }
          on_error => "stat_not_found"
        }

        if ![stat_not_found] and [stat_label][value] != "" {
          mutate {
            replace => {
              "stat_label.key" => "stat"
            }
          }
          mutate {
            merge => {
              "additional_token.fields" =>
              "stat_label"
            }
          }
        }
      }
      else {
        if [log_message] != "" {
          mutate {
            replace => {
              "temp_security_result.summary" => "%{log_message}"
            }
          }
        }
      }
    }

    # DHCP
    if [product_event_type] in ["dhcpd", "DHCPD"] and [ciaddr] != "" {
      mutate {
        replace => {
          "event_type" => "NETWORK_DHCP"
        }
      }

      mutate {
        replace => {
          "network_token.application_protocol" => "DHCP"
        }
      }

      mutate {
        replace => {
          "metadata_token.product_event_type" => "%{product_event_type}"
        }
      }
    }

    if [product_event_type] in ["dhcpd", "DHCPD"] and [ciaddr] == "" {
      mutate {
        replace => {
          "event_type" => "STATUS_UNCATEGORIZED"
        }
      }
    }

    if [process_id] != "" {
      mutate {
        replace => {
          "principal_token.process.pid" => "%{process_id}"
        }
      }
    }

    if [dhcp_type] != "" {
      mutate {
        gsub => [
        "dhcp_type", "^(DHCPACK|dhcpack)$", "ACK"
        ]
      }

      mutate {
        gsub => [
        "dhcp_type", "^(DHCPREQUEST|dhcprequest)$", "REQUEST"
        ]
      }

      mutate {
        replace => {
          "network_token.dhcp.type" => "%{dhcp_type}"
        }
      }
    }

    if [ciaddr] != "" {
      if [dhcp_type] in ["REQUEST", "DHCPREQUEST"] {
        mutate {
          replace => {
            "network_token.dhcp.ciaddr" => "%{ciaddr}"
          }
        }
      }

      if [dhcp_type] in ["ACK", "DHCPACK"] {
        mutate {
          replace => {
            "network_token.dhcp.yiaddr" => "%{ciaddr}"
          }
        }
      }
    }

    if [dhcp_mac] != "" {
      mutate {
        merge => {
          "principal_token.mac" => "dhcp_mac"
        }
      }
    }

    if [interface] != "" {
      mutate {
        replace => {
          "interface_temp.key" => "interface"
          "interface_temp.value.string_value" => "%{interface}"
        }
        on_error => "no_interface"
      }

      mutate {
        merge => {
          "additional_token.fields" => "interface_temp"
        }
      }
    }

    if [lts] != "" {
      mutate {
        convert => {
          "lts" => "uinteger"
        }
      }

      mutate {
        rename => {
          "lts" => "network_token.dhcp.lease_time_seconds"
        }
      }
    }

    if [pool] != "" {
      mutate {
        replace => {
          "balanced_pool_kv.key" => "balanced_pool"
          "balanced_pool_kv.value.string_value" => "%{pool}"
        }
        on_error => "no_balanced_pool"
      }

      mutate {
        merge => {
          "additional_token.fields" => "balanced_pool_kv"
        }
      }
    }

    if [ip_ranges] != "" {
      mutate {
        replace => {
          "ip_ranges_kv.key" => "ip_ranges"
          "ip_ranges_kv.value.string_value" => "%{ip_ranges}"
        }
        on_error => "no_ip_ranges"
      }

      mutate {
        merge => {
          "additional_token.fields" => "ip_ranges_kv"
        }
      }
    }

    if [total_ip] != "" {
      mutate {
        convert => {
          "total_ip" => "float"
        }
      }

      mutate {
        rename => {
          "total_ip" => "total_ip_kv.value.number_value"
        }
        on_error => "no_total_ip_value"
      }

      mutate {
        replace => {
          "total_ip_kv.key" => "total_ip"
        }
        on_error => "no_total_ip"
      }

      mutate {
        merge => {
          "additional_token.fields" => "total_ip_kv"
        }
      }
    }

    if [free_ip] != "" {
      mutate {
        convert => {
          "free_ip" => "float"
        }
      }

      mutate {
        rename => {
          "free_ip" => "free_ip_kv.value.number_value"
        }
        on_error => "no_free_ip_value"
      }

      mutate {
        replace => {
          "free_ip_kv.key" => "free_ip"
        }
        on_error => "no_free_ip"
      }

      mutate {
        merge => {
          "additional_token.fields" => "free_ip_kv"
        }
      }
    }

    if [backup_ip] != "" {
      mutate {
        convert => {
          "backup_ip" => "float"
        }
      }

      mutate {
        rename => {
          "backup_ip" => "backup_ip_kv.value.number_value"
        }
        on_error => "no_backup_ip_value"
      }

      mutate {
        replace => {
          "backup_ip_kv.key" => "backup_ip"
        }
        on_error => "no_backup_ip"
      }

      mutate {
        merge => {
          "additional_token.fields" => "backup_ip_kv"
        }
      }
    }

    if [max_imbalance]!="" and [max_imbalance_val]!="" {
      mutate {
        replace => {
          "max_im_kv.key" => "%{max_imbalance}"
          "max_im_kv.value.string_value" => "%{max_imbalance_val}"
        }
      }

      mutate {
        merge => {
          "additional_token.fields" => "max_im_kv"
        }
      }
    }

    if [event_type] != "" {
      mutate {
        replace => {
          "metadata_token.event_type" => "%{event_type}"
        }
      }
    }
    else {
      mutate {
        replace => {
          "metadata_token.event_type" => "GENERIC_EVENT"
        }
      }
      if [log_message] != "" {
        mutate {
          replace => {
            "temp_security_result.summary" => "%{log_message}"
          }
        }
      }
    }

  }
  else {
    drop {
      tag => "TAG_UNSUPPORTED"
    }
  }

  # Final Block
  if [temp_security_result] != "" {
    mutate {
      merge => {
        "event.idm.read_only_udm.security_result" =>
        "temp_security_result"
      }
    }
  }

  mutate {
    rename => {
      "metadata_token" => "event.idm.read_only_udm.metadata"
    }
  }

  if [principal_token] != "" {
    mutate {
      rename => {
        "principal_token" => "event.idm.read_only_udm.principal"
      }
    }
  }

  if [network_token] != "" {
    mutate {
      rename => {
        "network_token" => "event.idm.read_only_udm.network"
      }
    }
  }

  if [additional_token] != "" {
    mutate {
      rename => {
        "additional_token" => "event.idm.read_only_udm.additional"
      }
    }
  }

  if [target_token] != "" {
    mutate {
      rename => {
        "target_token" => "event.idm.read_only_udm.target"
      }
    }
  }

  if [extension_token] != "" {
    mutate {
      rename => {
        "extension_token" => "event.idm.read_only_udm.extensions"
      }
    }
  }

  if [src_token] != "" {
    mutate {
      rename => {
        "src_token" => "event.idm.read_only_udm.src"
      }
    }
  }

  mutate{
    replace=>{
      "principal_hostname"=>"%{event.idm.read_only_udm.principal.hostname}"
    }
    on_error=>"no_principal_hostname"
  }

  mutate {
    replace => {
      "principal_asset_hostname" =>
      "%{event.idm.read_only_udm.principal.asset.hostname}"
    }
    on_error => "not_prsent_pricipal_asset_host"
  }

  if [not_prsent_pricipal_asset_host] and ![no_principal_hostname] and
  [principal_hostname] != "" {
    mutate {
      replace => {
        "event.idm.read_only_udm.principal.asset.hostname" =>
        "%{principal_hostname}"
      }
    }
  }

  else if ![not_prsent_pricipal_asset_host] and [no_principal_hostname] and
  [principal_asset_hostname] != "" {
    mutate {
      replace => {
        "event.idm.read_only_udm.principal.hostname" =>
        "%{principal_asset_hostname}"
      }
    }
  }
  else if ![not_prsent_pricipal_asset_host] and ![no_principal_hostname] and
  ([principal_hostname] != [principal_asset_hostname]) {
    mutate {
      replace => {
        "event.idm.read_only_udm.principal.asset.hostname" =>
        "%{principal_hostname}"
      }
    }
    mutate {
      replace => {
        "token_new" => ""
      }
    }
    mutate {
      replace => {
        "token_new.value" => "%{principal_asset_hostname}"
      }
      on_error => "no_filed_present"
    }
    if ![no_filed_present] and [token_new][value] != "" {
      mutate {
        replace => {
          "token_new.key" => "asset_host_name"
        }
      }
      mutate {
        merge => {
          "event.idm.read_only_udm.principal.asset.attribute.labels" =>
          "token_new"
        }
      }
    }
  }

  mutate{
    replace=>{
      "target_hostname"=>"%{event.idm.read_only_udm.target.hostname}"
    }
    on_error=>"no_target_hostname"
  }

  mutate {
    replace => {
      "target_asset_hostname" =>
      "%{event.idm.read_only_udm.target.asset.hostname}"
    }
    on_error => "not_prsent_target_asset_host"
  }

  if [not_prsent_target_asset_host] and ![no_target_hostname] and
  [target_hostname] != "" {
    mutate {
      replace => {
        "event.idm.read_only_udm.target.asset.hostname" =>
        "%{target_hostname}"
      }
    }
  }

  else if ![not_prsent_target_asset_host] and [no_target_hostname] and
  [target_asset_hostname] != "" {
    mutate {
      replace => {
        "event.idm.read_only_udm.target.hostname" =>
        "%{target_asset_hostname}"
      }
    }
  }
  else if ![not_prsent_target_asset_host] and ![no_target_hostname] and
  ([target_hostname] != [target_asset_hostname]) {
    mutate {
      replace => {
        "event.idm.read_only_udm.target.asset.hostname" =>
        "%{target_hostname}"
      }
    }
    mutate {
      replace => {
        "token_new" => ""
      }
    }
    mutate {
      replace => {
        "token_new.value" => "%{target_asset_hostname}"
      }
      on_error => "no_filed_present"
    }
    if ![no_filed_present] and [token_new][value] != "" {
      mutate {
        replace => {
          "token_new.key" => "device_host_name"
        }
      }
      mutate {
        merge => {
          "event.idm.read_only_udm.target.asset.attribute.labels" =>
          "token_new"
        }
      }
    }
  }

  mutate {
    merge => {
      "@output" => "event"
    }
    on_error => "event_not_found"
  }
}
