  if [userName] != "" {
    mutate {
      replace => {
        "principal.user.userid" => "%{userName}"
        "has_user" => "true"
      }
      on_error => "no_userName"
    }
  }
  if [emailAddress] != "" {
    if [emailAddress] =~ "^.+@.+$"{
      mutate {
        merge => {
          "principal.user.email_addresses" => "emailAddress"

        }
        on_error => "no_emailAddress"
      }
      if ![no_emailAddress]{
        mutate {
          replace => {
            "has_user" => "true"
          }
        }
      }
    }
    else {
      mutate {
        replace => {
          "principal.user.userid" => "%{emailAddress}"
        }
        on_error => "no_userId_for_emailAddress"
      }
      if ![no_userId_for_emailAddress]{
        mutate {
          replace => {
            "has_user" => "true"
          }
        }
      }
    }
  }
