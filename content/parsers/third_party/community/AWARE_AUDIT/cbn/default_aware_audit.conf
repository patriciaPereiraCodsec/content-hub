      "includedDataInsightTypes" => ""
      "name" => ""
      "type" => ""
      "format" => ""
      "expectedSearchResultCount" => ""
      "reportType" => ""
      "completedOn" => ""
      "isDeleted" => ""
      "dataAccessSetId" => ""
      "includeAiSummaries" => ""
      "hasAdditionalInfoJson" => ""
    }
  }
  mutate {
    gsub => ["message","\\r\\n", ""]
  }
  mutate {
    gsub => ["message","True", "true"]
  }
  mutate {
    gsub => ["message","\\$id", "id"]
  }

  json {
    source => "message"
    array_function => "split_columns"
    on_error => "json_fail"
  }
  if [json_fail] {
    mutate {
      gsub => ["message","\\\"isDeleted\\\",", '\"isDeleted\":"",']
    }
    mutate {
      gsub => ["message",'\\\"includeAiSummaries\\\"\\}', '\"includeAiSummaries\":""}']
    }
    mutate {
      gsub => ["message",'\\\"', '\\\"']
    }
    mutate {
    gsub => ["message","\\'", '\"']
    }
    json {
      source => "message"
      array_function => "split_columns"
      on_error => "json_fail1"
    }
  }
  json {
    source => "additionalInfoJson"
    array_function => "split_columns"
    on_error => "json_failure"
  }

  if [id] != "" {
    mutate {
      replace => {
        "principal.user.userid" => "%{id}"
        "has_user" => "true"
      }
      on_error => "no_id"
    }
  }

  if [tenantId] != "" {
    mutate {
      replace => {
        "metadata.product_deployment_id" => "%{tenantId}"
      }
      on_error => "no_tenantId"
