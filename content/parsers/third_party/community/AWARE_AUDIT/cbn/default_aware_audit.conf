      mutate {
        merge => {
          "additional.fields" => "isDeleted_label"
        }
        on_error => "no_isDeleted_label"
      }
    }
  }
  if [dataAccessSetId] != "" {
    mutate {
      replace => {
        "dataAccessSetId_label.key" => "dataAccessSetId"
        "dataAccessSetId_label.value.string_value" => "%{dataAccessSetId}"
      }
      on_error => "no_dataAccessSetId"
    }
    if ![no_dataAccessSetId]{
      mutate {
        merge => {
          "additional.fields" => "dataAccessSetId_label"
        }
        on_error => "no_dataAccessSetId_label"
      }
    }
  }
  if [includeAiSummaries] != "" {
    mutate {
      replace => {
        "includeAiSummaries_label.key" => "includeAiSummaries"
        "includeAiSummaries_label.value.string_value" => "%{includeAiSummaries}"
      }
      on_error => "no_includeAiSummaries"
    }
    if ![no_includeAiSummaries]{
      mutate {
        merge => {
          "additional.fields" => "includeAiSummaries_label"
        }
        on_error => "no_includeAiSummaries_label"
      }
    }
  }

  mutate {
    replace => {
      "metadata.vendor_name" => "AWARE_AUDIT"
      "metadata.product_name" => "AWARE_AUDIT"
    }
  }

  if [has_principal] == "true" and [has_target] == "true" {
    mutate {
      replace => {
        "metadata.event_type" => "NETWORK_CONNECTION"
      }
      on_error => "no_principal_and_target"
    }
  }
  else if [has_principal] == "true" {
    mutate {
      replace => {
        "metadata.event_type" => "STATUS_UPDATE"
      }
      on_error => "no_principal"
    }
  }
  else if [has_user] == "true" {
    mutate {
      replace => {
        "metadata.event_type" => "USER_UNCATEGORIZED"
      }
      on_error => "no_user"
    }
  }
  else {
    mutate {
      replace => {
        "metadata.event_type" => "GENERIC_EVENT"
      }
      on_error => "no_event_type"
    }
  }

  if [metadata] != "" {
    mutate {
      rename => {
        "metadata" => "event.idm.read_only_udm.metadata"
      }
    }
  }

  if [principal] != "" {
    mutate {
      rename => {
        "principal" => "event.idm.read_only_udm.principal"
      }
    }
  }

  if [target] != "" {
    mutate {
      rename => {
        "target" => "event.idm.read_only_udm.target"
      }
    }
  }

  if [additional] != "" {
    mutate {
      rename => {
        "additional" => "event.idm.read_only_udm.additional"
      }
    }
  }

  if [security_result] != "" {
    mutate {
      merge => {
        "event.idm.read_only_udm.security_result" => "security_result"
      }
      on_error => "no_sec_result"
    }
  }
  mutate {
    merge => {
      "@output" => "event"
    }
  }
}
