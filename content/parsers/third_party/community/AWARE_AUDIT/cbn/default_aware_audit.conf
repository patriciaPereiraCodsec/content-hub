      "tenantId" => ""
      "userName" => ""
      "emailAddress" => ""
      "sourceIp" => ""
      "dateTime.id" => ""
      "dateTime.seconds" => ""
      "dateTime.nanos" => ""
      "auditName" => ""
      "actionName" => ""
      "actionSummary" => ""
      "discoveryRequestModelId" => ""
      "requestor" => ""
      "requestorEmail" => ""
      "criteria.keywordQueryExpression" => ""
      "criteria.topKeywordsCriteria.query.value.scopes" => ""
      "criteria.topKeywordsCriteria.query.type" => ""
