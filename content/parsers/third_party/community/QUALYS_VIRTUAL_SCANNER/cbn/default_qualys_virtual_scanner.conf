# Product: QUALYS_VIRTUAL_SCANNER
# Category: Vulnerability Scanner
# Supported Format: JSON
# Reference: N/A
# Last Updated: 2023-08-21
# Copyright 2023 Chronicle LLC

filter {
  mutate {
    replace => {
      "ID" => ""
      "ASSET_ID" => ""
      "IP" => ""
      "OS" => ""
      "DNS_DATA.HOSTNAME" => ""
      "DNS" => ""
      "DETECTION_LIST.DETECTION" => ""
      "LAST_SCAN_DATETIME" => ""
      "CLOUD_RESOURCE_ID" => ""
      "EC2_INSTANCE_ID" => ""
      "CLOUD_SERVICE" => ""
      "CLOUD_PROVIDER" => ""
      "CLOUD_PROVIDER_TAGS.CLOUD_TAG" => ""
      "METADATA.AZURE.ATTRIBUTE" => ""
      "METADATA.GOOGLE.ATTRIBUTE" => ""
      "TAGS.TAG" => ""
      "dataset" => ""
      "entity_type" => ""
      "QG_HOSTID" => ""
    }
  }

  json {
    source => "message"
    array_function => "split_columns"
    on_error => "invalid_json"
  }

  if [invalid_json] {
    drop {
      tag => "TAG_MALFORMED_MESSAGE"
    }
  }

  if [ID] != "" {
    mutate {
      replace => {
        "event.idm.entity.entity.asset.product_object_id" => "%{ID}"
        "event.idm.entity.metadata.product_entity_id" => "%{ID}"
      }
    }
  }

  if [ASSET_ID] != "" {
    mutate {
      replace => {
        "event.idm.entity.entity.asset.asset_id" => "%{ASSET_ID}"
      }
    }
  }
  else if [ASSET_ID] == "" {
    drop {
      tag => "TAG_NO_SECURITY_VALUE"
    }
  }

  if [IP] != "" {
    mutate {
      merge => {
        "event.idm.entity.entity.ip" => "IP"
      }
      replace => {
        "entity_type" => "IP_ADDRESS"
      }
    }
  }

  if [DNS_DATA][HOSTNAME] != "" {
    mutate {
      replace => {
        "event.idm.entity.entity.asset.hostname" => "%{DNS_DATA.HOSTNAME}"
      }
    }
  }
  else if [DNS] != "" {
    mutate {
      replace => {
        "event.idm.entity.entity.asset.hostname" => "%{DNS}"
      }
    }
  }

  if [OS] =~ "(?i)windows" {
    mutate {
      replace => {
        "event.idm.entity.entity.asset.platform_software.platform" => "WINDOWS"
      }
    }
  }
  else if [OS] =~ "(?i)Linux" {
    mutate {
      replace => {
        "event.idm.entity.entity.asset.platform_software.platform" => "LINUX"
      }
    }
  }

  if [LAST_SCAN_DATETIME] != "" {
    date {
      match => ["LAST_SCAN_DATETIME", "ISO8601", "RFC3339"]
      target => "event.idm.entity.metadata.interval.start_time"
    }
  }

  if [CLOUD_RESOURCE_ID] != "" {
    mutate {
      replace => {
        "dataset.entity.resource.id" => "%{CLOUD_RESOURCE_ID}"
      }
    }
  }

  if [EC2_INSTANCE_ID] != "" {
    mutate {
      replace => {
        "dataset.entity.resource.product_object_id" => "%{EC2_INSTANCE_ID}"
      }
    }
  }

  if [CLOUD_SERVICE] == "VM" {
    mutate {
      replace => {
        "dataset.entity.resource.resource_type" => "VIRTUAL_MACHINE"
      }
    }
  }

  if [CLOUD_PROVIDER_TAGS][CLOUD_TAG] != "" {
    for tag in CLOUD_PROVIDER_TAGS.CLOUD_TAG {
      mutate {
        replace => {
          "attribute_label" => ""
        }
      }

      mutate {
        replace => {
          "attribute_label.key" => "%{tag.NAME}"
          "attribute_label.value" => "%{tag.VALUE}"
        }
        on_error => "no_attribute_found"
      }

      if ![no_attribute_found] {
        mutate {
          merge => {
            "dataset.entity.resource.attribute.labels" => "attribute_label"
          }
        }
      }
    }
  }

  if [METADATA][AZURE][ATTRIBUTE] != "" {
    for attribute in METADATA.AZURE.ATTRIBUTE {
      mutate {
        replace => {
          "attribute_label" => ""
        }
      }

      mutate {
        replace => {
          "attribute_label.key" => "%{attribute.NAME}"
          "attribute_label.value" => "%{attribute.VALUE}"
        }
        on_error => "no_attribute_found"
      }

      if ![no_attribute_found] {
        mutate {
          merge => {
            "dataset.entity.resource.attribute.labels" => "attribute_label"
          }
        }
      }
    }
  }

  if [METADATA][GOOGLE][ATTRIBUTE] != "" {
    for attribute in METADATA.GOOGLE.ATTRIBUTE {
      mutate {
        replace => {
          "attribute_label" => ""
        }
      }

      mutate {
        replace => {
          "attribute_label.key" => "%{attribute.NAME}"
          "attribute_label.value" => "%{attribute.VALUE}"
        }
        on_error => "no_attribute_found"
      }

      if ![no_attribute_found] {
        mutate {
          merge => {
            "dataset.entity.resource.attribute.labels" => "attribute_label"
          }
        }
      }
    }
  }

  if [TAGS][TAG] != "" {
    for tag in TAGS.TAG {
      mutate {
        replace => {
          "attribute_label" => ""
        }
      }

      mutate {
        replace => {
          "attribute_label.key" => "%{tag.NAME}"
          "attribute_label.value" => "TAG_ID: %{tag.TAG_ID}"
        }
        on_error => "no_attribute_found"
      }

      if ![no_attribute_found] {
        mutate {
          merge => {
            "dataset.entity.resource.attribute.labels" => "attribute_label"
          }
        }
      }
    }
  }

  for detection in DETECTION_LIST.DETECTION {
    mutate {
      replace => {
        "threat_data" => ""
        "severity" => ""
      }
    }

    mutate {
      replace => {
        "threat_data.summary" => "%{detection.RESULTS}"
      }
      on_error => "RESULTS_field_not_found"
    }

    mutate {
      replace => {
        "threat_data.severity_details" => "%{detection.SEVERITY}"
      }
      on_error => "SEVERITY_field_not_found"
    }

    mutate {
      replace => {
        "severity" => "%{detection.TYPE}"
      }
      on_error => "no_severity_field_found"
    }

    date {
      match => ["detection.FIRST_FOUND_DATETIME","ISO8601"]
      target => "threat_data.first_discovered_time"
      on_error => "format_not_match"
    }

    if ![no_severity_field_found] {
      if [severity] =~ "(?i)info" {
        mutate {
          replace => {
            "threat_data.severity" => "INFORMATIONAL"
          }
        }
      }
      else {
        mutate {
          replace => {
            "severity_label.key" => "TYPE"
            "severity_label.value" => "%{severity}"
          }
          merge => {
            "threat_data.detection_fields" => "severity_label"
          }
        }
      }
    }

    mutate {
      replace => {
        "QID_label.key" => "QID"
        "QID_label.value" => "%{detection.QID}"
      }
      on_error => "QID_NOT_FOUND"
    }

    if ![QID_NOT_FOUND] {
      mutate {
        merge => {
          "threat_data.detection_fields" => "QID_label"
        }
      }
    }

    mutate {
      replace => {
        "UNIQUE_VULN_ID_label.key" => "UNIQUE_VULN_ID"
        "UNIQUE_VULN_ID_label.value" => "%{detection.UNIQUE_VULN_ID}"
      }
      on_error => "UNIQUE_VULN_ID_NOT_FOUND"
    }

    if ![UNIQUE_VULN_ID_NOT_FOUND] {
      mutate {
        merge => {
          "threat_data.detection_fields" => "UNIQUE_VULN_ID_label"
        }
      }
    }

    mutate {
      replace => {
        "LAST_FOUND_DATETIME_label.key" => "LAST_FOUND_DATETIME"
        "LAST_FOUND_DATETIME_label.value" => "%{detection.LAST_FOUND_DATETIME}"
      }
      on_error => "LAST_FOUND_DATETIME_NOT_FOUND"
    }

    if ![LAST_FOUND_DATETIME_NOT_FOUND] {
      mutate {
        merge => {
          "threat_data.detection_fields" => "LAST_FOUND_DATETIME_label"
        }
      }
    }

    mutate {
      replace => {
        "TIMES_FOUND_label.key" => "TIMES_FOUND"
        "TIMES_FOUND_label.value" => "%{detection.TIMES_FOUND}"
      }
      on_error => "TIMES_FOUND_NOT_FOUND"
    }

    if ![TIMES_FOUND_NOT_FOUND] {
      mutate {
        merge => {
          "threat_data.detection_fields" => "TIMES_FOUND_label"
        }
      }
    }

    mutate {
      replace => {
        "LAST_PROCESSED_DATETIME_label.key" => "LAST_PROCESSED_DATETIME"
        "LAST_PROCESSED_DATETIME_label.value" => "%{detection.LAST_PROCESSED_DATETIME}"
      }
      on_error => "LAST_PROCESSED_DATETIME_NOT_FOUND"
    }

    if ![LAST_PROCESSED_DATETIME_NOT_FOUND] {
      mutate {
        merge => {
          "threat_data.detection_fields" => "LAST_PROCESSED_DATETIME_label"
        }
      }
    }

    mutate {
      replace => {
        "LAST_TEST_DATETIME_label.key" => "LAST_TEST_DATETIME"
        "LAST_TEST_DATETIME_label.value" => "%{detection.LAST_TEST_DATETIME}"
      }
      on_error => "LAST_TEST_DATETIME_NOT_FOUND"
    }

    if ![LAST_TEST_DATETIME_NOT_FOUND] {
      mutate {
        merge => {
          "threat_data.detection_fields" => "LAST_TEST_DATETIME_label"
        }
      }
    }

    mutate {
      replace => {
        "LAST_UPDATE_DATETIME_label.key" => "LAST_UPDATE_DATETIME"
        "LAST_UPDATE_DATETIME_label.value" => "%{detection.LAST_UPDATE_DATETIME}"
      }
      on_error => "LAST_UPDATE_DATETIME_NOT_FOUND"
    }

    if ![LAST_UPDATE_DATETIME_NOT_FOUND] {
      mutate {
        merge => {
          "threat_data.detection_fields" => "LAST_UPDATE_DATETIME_label"
        }
      }
    }

    mutate {
      replace => {
        "LAST_FIXED_DATETIME_label.key" => "LAST_FIXED_DATETIME"
        "LAST_FIXED_DATETIME_label.value" => "%{detection.LAST_FIXED_DATETIME}"
      }
      on_error => "LAST_FIXED_DATETIME_NOT_FOUND"
    }

    if ![LAST_FIXED_DATETIME_NOT_FOUND] {
      mutate {
        merge => {
          "threat_data.detection_fields" => "LAST_FIXED_DATETIME_label"
        }
      }
    }

    mutate {
      replace => {
        "FIRST_REOPENED_DATETIME_label.key" => "FIRST_REOPENED_DATETIME"
        "FIRST_REOPENED_DATETIME_label.value" => "%{detection.FIRST_REOPENED_DATETIME}"
      }
      on_error => "FIRST_REOPENED_DATETIME_NOT_FOUND"
    }

    if ![FIRST_REOPENED_DATETIME_NOT_FOUND] {
      mutate {
        merge => {
          "threat_data.detection_fields" => "FIRST_REOPENED_DATETIME_label"
        }
      }
    }

    mutate {
      replace => {
        "LAST_REOPENED_DATETIME_label.key" => "LAST_REOPENED_DATETIME"
        "LAST_REOPENED_DATETIME_label.value" => "%{detection.LAST_REOPENED_DATETIME}"
      }
      on_error => "LAST_REOPENED_DATETIME_NOT_FOUND"
    }

    if ![LAST_REOPENED_DATETIME_NOT_FOUND] {
      mutate {
        merge => {
          "threat_data.detection_fields" => "LAST_REOPENED_DATETIME_label"
        }
      }
    }

    mutate {
      replace => {
        "TIMES_REOPENED_label.key" => "TIMES_REOPENED"
        "TIMES_REOPENED_label.value" => "%{detection.TIMES_REOPENED}"
      }
      on_error => "TIMES_REOPENED_NOT_FOUND"
    }

    if ![TIMES_REOPENED_NOT_FOUND] {
      mutate {
        merge => {
          "threat_data.detection_fields" => "TIMES_REOPENED_label"
        }
      }
    }

    mutate {
      replace => {
        "IS_DISABLED_label.key" => "IS_DISABLED"
        "IS_DISABLED_label.value" => "%{detection.IS_DISABLED}"
      }
      on_error => "IS_DISABLED_NOT_FOUND"
    }

    if ![IS_DISABLED_NOT_FOUND] {
      mutate {
        merge => {
          "threat_data.detection_fields" => "IS_DISABLED_label"
        }
      }
    }

    mutate {
      replace => {
        "SSL_label.key" => "SSL"
        "SSL_label.value" => "%{detection.SSL}"
      }
      on_error => "SSL_NOT_FOUND"
    }

    if ![SSL_NOT_FOUND] {
      mutate {
        merge => {
          "threat_data.detection_fields" => "SSL_label"
        }
      }
    }

    mutate {
      replace => {
        "PROTOCOL_label.key" => "PROTOCOL"
        "PROTOCOL_label.value" => "%{detection.PROTOCOL}"
      }
      on_error => "PROTOCOL_NOT_FOUND"
    }

    if ![PROTOCOL_NOT_FOUND] {
      mutate {
        merge => {
          "threat_data.detection_fields" => "PROTOCOL_label"
        }
      }
    }

    mutate {
      replace => {
        "PORT_label.key" => "PORT"
        "PORT_label.value" => "%{detection.PORT}"
      }
      on_error => "PORT_NOT_FOUND"
    }

    if ![PORT_NOT_FOUND] {
      mutate {
        merge => {
          "threat_data.detection_fields" => "PORT_label"
        }
      }
    }

    mutate {
      replace => {
        "STATUS_label.key" => "STATUS"
        "STATUS_label.value" => "%{detection.STATUS}"
      }
      on_error => "STATUS_NOT_FOUND"
    }

    if ![STATUS_NOT_FOUND] {
      mutate {
        merge => {
          "threat_data.detection_fields" => "STATUS_label"
        }
      }
    }

    if [threat_data] != "" {
      mutate {
        merge => {
          "event.idm.entity.metadata.threat" => "threat_data"
        }
      }
    }
  }

  if [dataset] != "" {
    mutate {
      replace => {
        "dataset.relationship" => "MEMBER"
        "dataset.entity_type" => "RESOURCE"
        "entity_type" => "ASSET"
      }
    }
    mutate {
      merge => {
        "event.idm.entity.relations" => "dataset"
      }
    }
  }

  if [entity_type] != "" {
    mutate {
      replace => {
        "event.idm.entity.metadata.entity_type" => "%{entity_type}"
      }
    }
  }

  mutate {
    replace => {
      "event.idm.entity.metadata.vendor_name" => "QUALYS_VIRTUAL_SCANNER"
      "event.idm.entity.metadata.product_name" => "QUALYS_VIRTUAL_SCANNER"
    }
  }

  mutate {
    merge => {
      "@output" => "event"
    }
  }
}
