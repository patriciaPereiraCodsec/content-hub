# Product: AVATIER, Avatier Identity Management Suite (AIMS)
# Category: SaaS Application
# Supported Format: SYSLOG + KV
# Reference: https://www.avatier.com/products/sso/
# Last Updated: 2021-08-05
# Copyright 2021 Chronicle LLC


filter {
  mutate {
    replace => {
      "security_result" => ""
      "intermediary" => ""
      "target_ip" => ""
      "hostname" => ""
      "principal_ip" => ""
      "target_hostname" => ""
      "auth_mechanism" => ""
      "category" => ""
      "user_id" => ""
      "target" => ""
      "cot" => ""
      "au" => ""
      "act" => ""
      "DC" => ""
      "Domain" => ""
      "description" => ""
      "event_type" => ""
      "filter" => ""
      "ip" => ""
      "intermediary_ip" => ""
      "log_host_ip" => ""
      "port" => ""
      "pid" => ""
      "un" => ""
      "uid" => ""
    }
  }

  # Separate remote header message from the actual local log message.
  grok {
    match => {
      "message" => [
        "%{SYSLOGTIMESTAMP:systime} %{IPV4:log_host_ip} %{NONNEGINT:number} %{TIMESTAMP_ISO8601:timestamp} %{HOSTNAME:hostname} %{WORD:product} %{NONNEGINT:identification} %{WORD:event_type} \\[(?P<kvdata>.*)\\] %{GREEDYDATA:description}"
        "%{DATESTAMP:timestamp} (?P<kvdata>.*)"
      ]
    }
    overwrite => ["hostname", "event_type", "ip", "au", "un", "intermediary_ip", "log_host_ip", "act", "description" ]
  }

  kv {
    source => "kvdata"
    field_split => " "
    value_split => "="
    trim_value => '\"'
  }

  date {
    match => ["timestamp", "RFC3339", "MM/dd/yyyy HH:mm:ss"]
  }

  # ---------------------------------------------------------------------------
  # Commom fields to most events
  # ---------------------------------------------------------------------------
  if [event_type] == "" {
    mutate {
      replace => {
        "event_type" => "%{P}"
      }
    }

    if [hostname] == "" {
      mutate {
        replace => {
          "hostname" => "%{S}"
        }
      }
    }

    if [T] != "" {
      mutate {
        replace => {
          "pid" => "%{T}"
        }
      }
    }

    if ["kvdata"] != "" {
      mutate {
        gsub => ["kvdata"," (\\w+)=", "#$1="]
      }
      mutate {
        gsub => ["kvdata"," ", "|"]
      }

      grok {
        match => {
          "kvdata" => ["\\|%{GREEDYDATA:description}\\:"]
        }
        overwrite => ["description"]
      }
    }
    if [filter] != "" {
      kv {
        source => "filter"
        field_split => ")("
        value_split => "="
      }

      if [uid] != "" {
        mutate {
          replace => {
            "un" => "%{uid}"
          }
        }
      }
    }
  }
  # Setting common metadata
  mutate {
    replace => {
      "metadata.event_type" => "GENERIC_EVENT"
      "metadata.vendor_name" => "AVATIER"
      "metadata.product_name" => "Avatier Identity Management Suite (AIMS)"
      "metadata.product_event_type" => "%{event_type}"
    }
  }

  if [description] != "" {
    mutate {
      replace => {
        "metadata.description" => "%{description}"
      }
    }
  }
  # principal
  if [ip] != "" {
    mutate {
      replace => {
        "principal_ip" => "%{ip}"
      }
    }
  }

  # principal
  if [au] != "" {
    if [au] =~ "^[0-9]+$" {
      mutate {
        replace => {
          "principal.user.userid" => "%{au}"
        }
      }
    } else {
      mutate {
        replace => {
          "principal.user.user_display_name" => "%{au}"
        }
      }
    }
  }
  if [un] != [au] and [un] != "" {
    if [un] =~ "^[0-9]+$" {
      mutate {
        replace => {
          "target.user.userid" => "%{un}"
        }
      }
    } else if [un] != "" {
      mutate {
        replace => {
          "target.user.user_display_name" => "%{un}"
        }
      }
    }
  }

  if [cot] != "" {
    mutate {
      replace => {
        "target.administrative_domain" => "%{cot}"
      }
    }
  }

  # Intermediary only occurs when the event does not have a target.
  # Set only when needed and checked later if it will be used.
  mutate {
    replace => {
      "intermediary_ip" => "%{log_host_ip}"
      "intermediary_hostname" => ""
    }
  }

  if [intermediary_ip] != "" {
    mutate {
      merge => {
        "intermediary.ip" => "intermediary_ip"
      }
    }
  }

  mutate {
    replace => {
      "target.hostname" => "%{hostname}"
    }
  }

  mutate {
    replace => {
      "target_ip" => "%{log_host_ip}"
    }
  }

  if [DC] != "" {
    mutate {
      gsub => ["DC", "'", ""]
    }

    mutate {
      replace => {
        "intermediary_hostname" => "%{DC}"
      }
    }
  }

  if [target_ip] != "" {
    mutate {
      merge => {
        "target.ip" => "target_ip"
      }
    }
  }
  mutate {
    replace => {
      "security_result.summary" => "%{act}"
    }
  }

  if [act] =~ "([Ee]rror|[Ff]ail|[Bb]lock)" {
    mutate {
      replace => {
        "action" => "BLOCK"
      }
    }
  } else {
    mutate {
      replace => {
        "action" => "ALLOW"
      }
    }
  }

  mutate {
    merge => {
      "security_result.action" => "action"
    }
  }

  # ---------------------------------------------------------------------------
  # Setting especific fields for of each product event type
  # ---------------------------------------------------------------------------

  # ---------------------------------------------------------------------------
  # Event SMTPError
  if [event_type] == "SMTPError" {
    mutate {
      replace => {
        "metadata.event_type" => "EMAIL_TRANSACTION"
      }
    }
    grok {
      match => {
        "description" => [
          "%{DATA:beggining_msg} <%{EMAILADDRESS:email}>%{GREEDYDATA:end_msg}"
        ]
      }
    }

    mutate {
      replace => {
        "security_result.about.email" => "%{email}"
        "intermediary_hostname" => "%{hostname}"
      }
    }
  }

  # ---------------------------------------------------------------------------
  # Event PasswordRejectedByPolicyError
  if [event_type] == "PasswordRejectedByPolicyError" {
    mutate {
      replace => {
        "metadata.event_type" => "USER_CHANGE_PASSWORD"
        "category" => "POLICY_VIOLATION"
      }
    }
  }

  # ---------------------------------------------------------------------------
  # Event AuthToDomainError
  if [event_type] == "AuthToDomainError" {
    mutate {
      replace => {
        "metadata.event_type" => "USER_LOGIN"
      }
    }
    mutate {
      replace => {
        "category" => "AUTH_VIOLATION"
        "auth_mechanism" => "NETWORK"
        "event.idm.read_only_udm.extensions.auth.type" => "SSO"
      }
    }
  }

  # ---------------------------------------------------------------------------
  # Event UpdateEnrollment
  if [event_type] == "UpdateEnrollment" {
    mutate {
      replace => {
        "metadata.event_type" => "STATUS_UPDATE"
      }
    }
  }

  # ---------------------------------------------------------------------------
  # Event AnswerError
  if [event_type] == "AnswerError" {
    mutate {
      replace => {
        "metadata.event_type" => "USER_UNCATEGORIZED"
      }
    }
    mutate {
      replace => {
        "category" => "AUTH_VIOLATION"
      }
    }
  }

  # ---------------------------------------------------------------------------
  # Event HelpDeskUsrVerifyError
  if [event_type] == "HelpDeskUsrVerifyError" {
    mutate {
      replace => {
        "metadata.event_type" => "USER_UNCATEGORIZED"
        "category" => "AUTH_VIOLATION"
      }
    }
    grok {
      match => {
        "description" => [
          "HelpDesk user %{DATA} failed to verify question for user %{DATA}\\\\%{GREEDYDATA:target_id}"
        ]
      }
      overwrite => ["user_id"]
    }
    mutate {
      replace => {
        "target.user.userid" => "%{target_id}"
      }
    }
  }

  # ---------------------------------------------------------------------------
  # Event HelpDeskUnlockedAccount
  if [event_type] == "HelpDeskUnlockedAccount" {
    mutate {
      replace => {
        "metadata.event_type" => "USER_UNCATEGORIZED"
      }
    }
  }

  # ---------------------------------------------------------------------------
  # Event HTTPHacking
  if [event_type] == "HTTPHacking" {
    mutate {
      replace => {
        "metadata.event_type" => "USER_UNCATEGORIZED"
        "category" => "NETWORK_SUSPICIOUS"
      }
    }
  }

  # ---------------------------------------------------------------------------
  # Event AuthToDomain
  if [event_type] == "AuthToDomain" {
    mutate {
      replace => {
        "metadata.event_type" => "USER_LOGIN"
        "auth_mechanism" => "NETWORK"
        "event.idm.read_only_udm.extensions.auth.type" => "SSO"
      }
    }
  }

  # ---------------------------------------------------------------------------
  # Event (Deleted|Added) Mapping
  if [event_type] =~ "(Deleted|Added)Mapping" {
    mutate {
      replace => {
        "metadata.event_type" => "SETTING_MODIFICATION"
      }
    }
    grok {
      match => {
        "description" => [
          "User %{DATA}\\\\%{DATA:username} (deleted|added) mapping Domain = %{DATA:mapping_domain}, User = %{DATA:user_number}, system = %{DATA:system}, mappedID = %{GREEDYDATA:mapped_id}"
        ]
      }
    }
    mutate {
      replace => {
        "target.resource.id" => "%{mapped_id}"
        "target.resource.type" => "SETTING"
        "target.administrative_domain" => "%{mapping_domain}"
        "principal.user.user_display_name" => "%{username}"
      }
    }
  }

  # ---------------------------------------------------------------------------
  # Event UnlockedAccount
  if [event_type] == "UnlockedAccount" {
    mutate {
      replace => {
        "metadata.event_type" => "USER_UNCATEGORIZED"
      }
    }
  }

  # ---------------------------------------------------------------------------
  # Event PINError
  if [event_type] == "PINError" {
    mutate {
      replace => {
        "metadata.event_type" => "USER_UNCATEGORIZED"
      }
    }

    grok {
      match => {
        "principal_ip" => [
          "%{IPV4:principal_ip}%{GREEDYDATA}"
        ]
      }
      overwrite => ["principal_ip"]
    }
    mutate {
      replace => {
        "category" => "AUTH_VIOLATION"
      }
    }
  }

  # ---------------------------------------------------------------------------
  # Event PSLogin
  if [event_type] == "PSLogin" {
    mutate {
      replace => {
        "metadata.event_type" => "USER_LOGIN"
        "auth_mechanism" => "NETWORK"
        "event.idm.read_only_udm.extensions.auth.type" => "SSO"
      }
    }
  }

  # ---------------------------------------------------------------------------
  # Event AnswerSuccess
  if [event_type] == "AnswerSuccess" {
    mutate {
      replace => {
        "metadata.event_type" => "USER_UNCATEGORIZED"
      }
    }
  }

  # ---------------------------------------------------------------------------
  # Event SessionStart
  if [event_type] == "SessionStart" {
    mutate {
      replace => {
        "metadata.event_type" => "USER_LOGIN"
        "auth_mechanism" => "NETWORK"
        "event.idm.read_only_udm.extensions.auth.type" => "SSO"
      }
    }
  }

  # ---------------------------------------------------------------------------
  # Event TaskSuccess
  if [event_type] == "TaskSuccess" {
    mutate {
      replace => {
        "principal_ip" => "%{log_host_ip}"
      }
    }
  }

  # ---------------------------------------------------------------------------
  # Event ResetPassword
  if [event_type] == "ResetPassword" {
    mutate {
      replace => {
        "metadata.event_type" => "USER_CHANGE_PASSWORD"
      }
    }

    grok {
      match => {
        "description" => [
          "^%{WORD:reset_result} to Reset %{DATA} Password %{GREEDYDATA}"
          "^Reset %{DATA} Password %{WORD:reset_result}$"
        ]
      }
    }

    if [reset_result] == "Failed" {
      mutate {
        replace => {
          "category" => "POLICY_VIOLATION"
        }
      }
    }

    mutate {
      replace => {
        "auth_mechanism" => "NETWORK"
        "event.idm.read_only_udm.extensions.auth.type" => "SSO"
      }
    }
  }

  # ---------------------------------------------------------------------------
  # Event SentMail
  if [event_type] == "SentMail" {
    mutate {
      replace => {
        "metadata.event_type" => "EMAIL_TRANSACTION"
      }
    }
    grok {
      match => {
        "description" => [
          "%{DATA} %{EMAILADDRESS:email} %{GREEDYDATA}"
        ]
      }
    }

    mutate {
      replace => {
        "security_result.about.email" => "%{email}"
        "intermediary_hostname" => "%{hostname}"
      }
    }
  }

  # ---------------------------------------------------------------------------
  # Event UnenrolledByFailures
  if [event_type] == "UnenrolledByFailures" {
    mutate {
      replace => {
        "metadata.event_type" => "USER_UNCATEGORIZED"
      }
    }
  }

  # ---------------------------------------------------------------------------
  # Event PINSuccess
  if [event_type] == "PINSuccess" {
    mutate {
      replace => {
        "metadata.event_type" => "USER_UNCATEGORIZED"
      }
    }

    grok {
      match => {
        "principal_ip" => [
          "%{IPV4:princ_ip}%{GREEDYDATA}"
        ]
      }
    }

    mutate {
      replace => {
        "principal_ip" => "%{princ_ip}"
      }
    }
  }

  # ---------------------------------------------------------------------------
  # Event HelpDeskResetPassword
  if [event_type] == "HelpDeskResetPassword" {
    mutate {
      replace => {
        "metadata.event_type" => "USER_CHANGE_PASSWORD"
      }
    }
    grok {
      match => {
        "principal_ip" => [
          "%{IPV4:princ_ip}%{GREEDYDATA}"
        ]
      }
    }

    mutate {
      replace => {
        "principal_ip" => "%{princ_ip}"
      }
    }
  }


  # ---------------------------------------------------------------------------
  # Merges and replaces of most event objets
  # ---------------------------------------------------------------------------

  # Setting common metadata
  mutate {
    rename => {
      "metadata" => "event.idm.read_only_udm.metadata"
    }
  }

  if [principal_ip]!= "" {
    mutate {
      merge => {
        "principal.ip" => "principal_ip"
      }
    }
  }

  mutate {
    rename => {
      "principal" => "event.idm.read_only_udm.principal"
    }
  }

  if [security_result] != "" {
    mutate {
      merge => {
        "event.idm.read_only_udm.security_result" => "security_result"
      }
    }
  }

  if [intermediary_hostname] != "" {
    mutate {
      replace => {
        "intermediary.hostname" => "%{intermediary_hostname}"
      }
    }

    mutate {
      merge => {
        "event.idm.read_only_udm.intermediary" => "intermediary"
      }
    }
  } else if [target] != "" {
      mutate {
        rename => {
          "target" => "event.idm.read_only_udm.target"
        }
      }
  }

  if [category] != "" {
    mutate {
      merge => {
        "security_result.category" => "category"
      }
    }
  }

  if [auth_mechanism] != "" {
    mutate {
      merge => {
        "event.idm.read_only_udm.extensions.auth.mechanism" => "auth_mechanism"
      }
    }
  }

  if [Domain] != "" {
    mutate {
      gsub => ["Domain", "'", ""]
    }
    mutate {
      replace => {
        "event.idm.read_only_udm.target.administrative_domain" => "%{Domain}"
      }
    }
  }

  if [pid] != "" {
    mutate {
      replace => {
        "event.idm.read_only_udm.target.process.pid" => "%{pid}"
      }
    }
  }

  if [port] != "" {
    mutate {
      replace => {
        "event.idm.read_only_udm.target.port" => "%{port}"
      }
    }
    mutate {
      convert => {
        "event.idm.read_only_udm.target.port" => "integer"
      }
    }
  }

  mutate {
    merge => {
      "@output" => "event"
    }
  }
}
