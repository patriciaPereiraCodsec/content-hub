# Product: Symantec Security Analytics
# Category: Vulnerability scanners
# Supported Format: SYSLOG + KV
# Reference: N/A
# Last Updated: 2025-05-23
# Copyright 2025 Google SecOps

filter {
  mutate {
    replace => {
      "principal" => ""
      "target" => ""
      "network" => ""
      "metadata" => ""
      "additional" => ""
      "security_result" => ""
      "has_principal" => "false"
      "has_target" => "false"
      "sequenceId" => ""
      "mac_address" => ""
      "id" => ""
      "m" => ""
      "c" => ""
      "category" => ""
      "ip_address" => ""
      "model" => ""
      "msg" => ""
      "evt" => ""
      "logmsg" => ""
      "host" => ""
      "path" => ""
      "query_id" => ""
      "elapsed_time" => ""
      "version" => ""
      "event_id" => ""
      "event_name" => ""
      "severity" => ""
      "msgs" => ""
      "cs5" => ""
      "cs4" => ""
      "dmac" => ""
      "dst" => ""
      "smac" => ""
      "src" => ""
      "dpt" => ""
      "spt" => ""
      "end" => ""
      "start" => ""
      "kv_data1" => ""
      "sn" => ""
      "ip" => ""
      "user" => ""
      "remote_ip" => ""
      "has_principal_user" => "false"
      "action_name" => ""
      "intermediary" => ""
    }
  }
  mutate {
    gsub => ["message", "\\r\\n", ""]
  }
  mutate {
    gsub => ["message", "\\\\", ""]
  }
  mutate {
    gsub => ["message", '\\"', '']
  }
  grok {
    match => {
      "message" =>[
        "%{INT} <%{INT}>%{INT} %{TIMESTAMP_ISO8601:ts} %{DATA:host} %{DATA} %{INT} - \\[%{DATA} sequenceId=%{DATA:sequenceId}\\] snlog: sn=%{MAC:mac_address} id=%{DATA:id} m=%{INT:m} c=%{INT:c} event=%{DATA:evt} category=%{DATA:category} ip=%{IP:ip_address} model=%{DATA:model} msg=%{GREEDYDATA:msg}"
        "%{INT} <%{INT}>%{INT} %{TIMESTAMP_ISO8601:ts} %{DATA:host} %{DATA} %{INT} - \\[%{DATA} sequenceId=%{DATA:sequenceId}\\] CEF:%{INT:cef_version}\\|%{DATA:vendor}\\|%{DATA:product}\\|%{DATA:version}\\|%{DATA:event_id}\\|%{DATA:event_name}\\|%{INT:severity}\\|cs4=%{DATA:cs4} cs5=%{DATA:cs5} dmac=%{MAC:dmac} dpt=%{INT:dpt} dst=%{IP:dst} end=%{INT:end} msg=%{DATA:msgs} smac=%{MAC:smac} spt=%{INT:spt} src=%{IP:src} start=%{INT:start}"
        "<%{INT}>%{INT} %{TIMESTAMP_ISO8601:ts} %{DATA} %{INT} - - - %{TIMESTAMP_ISO8601:event_ts} %{HOSTNAME:host} %{DATA} %{INT:pid} - \\[%{DATA} sequenceId=%{DATA:sequenceId}\\] snlog: %{GREEDYDATA:kv_data1} msg=%{GREEDYDATA:msg}"
        "<%{INT}>%{INT} %{TIMESTAMP_ISO8601:ts} %{DATA:host} %{DATA} %{INT} - \\[%{DATA} sequenceId=%{DATA:sequenceId}\\] snlog: %{GREEDYDATA:kv_data1} msg=%{GREEDYDATA:msg}"
      ]
    }
    overwrite => ["sequenceId","mac_address","id","m","c","evt","category","cs4", "cs5", "ip_address","model","msg", "host", "version", "event_id", "event_name", "severity", "msgs", "dmac", "dst", "smac", "src", "dpt", "spt", "end", "start", "kv_data1"]
    on_error => "grok_error"
  }
  date {
    match => ["ts", "yyyy-MM-ddTHH:mm:ssZZ", "yyyy-MM-ddTHH:mm:ss+HH:mm", "ISO8601"]
    target => "metadata.collected_timestamp"
    on_error => "date_error"
  }

  kv {
    source => "msg"
    field_split => ","
    value_split => "="
    on_error => "kv_error"
  }
  mutate {
    gsub => ["kv_data1","([a-zA-Z0-9_]+)=","^$1="]
  }
  kv {
    source => "kv_data1"
    field_split => "^"
    value_split => "="
    on_error => "no_kv_data"
  }
  if [mac_address] != "" {
    mutate {
      merge => {
        "principal.mac" => "mac_address"
      }
      on_error => "mac_address_not_found"
    }
  }
  if [sn] != "" {
    mutate {
      merge => {
        "principal.mac" => "sn"
      }
      on_error => "sn_not_found"
    }
  }
  if [ip] != "" {
    grok {
      match => {
        "ip" => [
          "%{IP:ip_address1}"
        ]
      }
      overwrite => ["ip_address1"]
      on_error => "ip_address1_not_found"
    }
    if ![ip_address1_not_found] {
      mutate {
        merge => {
          "principal.ip" => "ip_address1"
          "principal.asset.ip" => "ip_address1"
        }
        on_error => "ip_not_found"
      }
      if ![ip_not_found] {
        mutate {
          replace => {
            "has_principal" => "true"
          }
        }
      }
    }
  }
  if [user] != "" {
    mutate {
      replace => {
        "principal.user.userid" => "%{user}"
        "has_principal_user" => "true"
      }
      on_error => "user_not_found"
    }
  }
  if [remote_ip] != "" {
    grok {
      match => {
        "remote_ip" => [
          "%{IP:r_ipaddress}"
        ]
      }
      overwrite => ["r_ipaddress"]
      on_error => "r_ipaddress_not_found"
    }
    if ![r_ipaddress_not_found] {
      mutate {
        merge => {
          "target.ip" => "r_ipaddress"
          "target.asset.ip" => "r_ipaddress"
        }
        on_error => "r_ipaddress_not_found"
      }
      if ![r_ipaddress_not_found] {
        mutate {
          replace => {
            "has_target" => "true"
          }
        }
      }
    }
  }

  if [ip_address] != "" {
    grok {
      match => {
        "ip_address" => [
          "%{IP:ip_address2}"
        ]
      }
      overwrite => ["ip_address2"]
      on_error => "ip_address2_not_found"
    }
    if ![ip_address2_not_found] {
      mutate {
        merge => {
          "principal.ip" => "ip_address2"
          "principal.asset.ip" => "ip_address2"
        }
        on_error => "ip_address_not_found"
      }
      if ![ip_address_not_found] {
        mutate {
          replace => {
            "has_principal" => "true"
          }
        }
      }
    }
  }
  if [host] != "" {
    mutate {
      replace => {
        "intermediary.hostname" => "%{host}"
        "intermediary.asset.hostname" => "%{host}"
      }
      on_error => "host_not_found"
    }
  }
  if [logmsg] != "" {
    mutate {
      replace => {
        "metadata.description" => "%{logmsg}"
      }
      on_error => "logmsg_not_found"
    }
  }
  if [query_id] != "" {
    mutate {
      replace => {
        "query_id_label.key" => "query_id"
        "query_id_label.value" => "%{query_id}"
      }
      on_error => "query_id_not_found"
    }
    if ![query_id_not_found] {
      mutate {
        merge => {
          "target.resource.attribute.labels" => "query_id_label"
        }
        on_error => "query_id_label_not_found"
      }
    }
  }
  if [action_name] != "" {
    mutate {
      replace => {
        "security_result.action_details" => "%{action_name}"
      }
      on_error => "action_name_not_found"
    }
  }

  if [id] != "" {
    mutate {
      replace => {
        "target.resource.id" => "%{id}"
      }
      on_error => "id_not_found"
    }
  }

  if [category] != "" {
    mutate {
      replace => {
        "target.resource.type" => "%{category}"
      }
      on_error => "category_not_found"
    }
  }
  if [model] != "" {
    mutate {
      replace => {
        "target.resource.name" => "%{model}"
      }
      on_error => "model_not_found"
    }
  }
  if [path] != "" {
    mutate {
      replace => {
        "target.file.full_path" => "%{path}"
      }
      on_error => "path_not_found"
    }
  }
  if [evt] != "" {
    mutate {
      replace => {
        "metadata.product_event_type" => "%{evt}"
      }
      on_error => "evt_not_found"
    }
  }
  if [m] != "" {
    mutate {
      replace => {
        "m_label.key" => "m"
        "m_label.value.string_value" => "%{m}"
      }
      on_error => "m_not_found"
    }
    mutate {
      merge => {
        "additional.fields" => "m_label"
      }
      on_error => "m_label_not_found"
    }
  }
  if [c] != "" {
    mutate {
      replace => {
        "c_label.key" => "c"
        "c_label.value.string_value" => "%{c}"
      }
      on_error => "c_not_found"
    }
    mutate {
      merge => {
        "additional.fields" => "c_label"
      }
      on_error => "c_label_not_found"
    }
  }
  if [sequenceId] != "" {
    mutate {
      replace => {
        "metadata.product_log_id" => "%{sequenceId}"
      }
      on_error => "sequenceId_not_found"
    }
  }

  if [elapsed_time] != "" {
    mutate {
      replace => {
        "elapsed_time_label.key"   => "elapsed_time"
        "elapsed_time_label.value" => "%{elapsed_time}"
      }
      on_error => "elapsed_time_not_found"
    }
    if ![elapsed_time_not_found] {
      mutate {
        merge => {
          "security_result.detection_fields" => "elapsed_time_label"
        }
        on_error => "total_elapsed_time_merge_failed"
      }
    }
  }
  if [version] != "" {
    mutate {
      replace => {
        "metadata.product_version" => "%{version}"
      }
      on_error => "msg_not_found"
    }
  }
  if [event_id] != "" {
    mutate {
      replace => {
        "security_result.rule_id" => "%{event_id}"
      }
      on_error => "event_id_not_found"
    }
  }
  if [event_name] != "" {
    mutate {
      replace => {
        "metadata.product_event_type" => "%{event_name}"
      }
      on_error => "event_name_not_found"
    }
  }
  if [severity] != "" {
    mutate {
      replace => {
        "security_result.severity_details" => "%{severity}"
      }
      on_error => "severity_invalid"
    }
    if [severity] in ["0", "1", "2", "3"] {
      mutate {
        replace => {
          "security_result.severity" => "LOW"
        }
      }
    } else if [severity] in ["4", "5", "6"] {
      mutate {
        replace => {
          "security_result.severity" => "MEDIUM"
        }
      }
    } else if [severity] in ["7", "8"] {
      mutate {
        replace => {
          "security_result.severity" => "HIGH"
        }
      }
    } else if [severity] in ["9", "10"] {
      mutate {
        replace => {
          "security_result.severity" => "CRITICAL"
        }
      }
    } else {
      mutate {
        replace => {
          "security_result.severity" => "UNKNOWN_SEVERITY"
        }
      }
    }
  }
  if [msgs] != "" {
    mutate {
      replace => {
        "metadata.description" => "%{msgs}"
      }
      on_error => "msgs_not_found"
    }
  }
  if [cs5] != "" {
    mutate {
      replace => {
        "security_result.summary" => "%{cs5}"
      }
      on_error => "cs5_not_found"
    }
  }

  if [cs4] != "" {
    mutate {
      replace => {
        "security_result.description" => "%{cs4}"
      }
      on_error => "cs4_not_found"
    }
  }
  if [dmac] != "" {
    mutate {
      merge => {
        "target.mac" => "dmac"
      }
      on_error => "dmac_not_found"
    }
    if ![dmac_not_found] {
      mutate {
        replace => {
          "has_target" => "true"
        }
      }
    }
  }
  if [dst] != "" {
    grok {
      match => {
        "dst" => [
          "%{IP:dst_ip}"
        ]
      }
      overwrite => ["dst_ip"]
      on_error => "dst_ip_not_found"
    }
    if ![dst_ip_not_found] {
      mutate {
        merge => {
          "target.ip" => "dst_ip"
          "target.asset.ip" => "dst_ip"
        }
        on_error => "dst_not_found"
      }
      if ![dst_not_found] {
        mutate {
          replace => {
            "has_target" => "true"
          }
        }
      }
    }
  }
  if [dpt] != "" {
    mutate {
      convert => {
        "dpt" => "integer"
      }
      on_error => "dpt_not_found"
    }
    mutate {
      rename => {
        "dpt" => "target.port"
      }
    }
  }
  if [spt] != "" {
    mutate {
      convert => {
        "spt" => "integer"
      }
      on_error => "spt_not_found"
    }
    mutate {
      rename => {
        "spt" => "principal.port"
      }
    }
  }
  if [end] != "" {
    date {
      match => ["end", "yyyy-MM-ddTHH:mm:ssZ", "yyyy-MM-ddTHH:mm:ss+HH:mm", "ISO8601", "UNIX_MS"]
      on_error => "end_time_not_found"
    }
  }
  if [start] != "" {
    mutate {
      replace => {
        "start_time_label.key" => "start_time"
        "start_time_label.value.string_value" => "%{start}"
      }
      on_error => "start_time_not_found"
    }
    if ![start_time_not_found] {
      mutate {
        merge => {
          "additional.fields" => "start_time_label"
        }
        on_error => "start_time_label_merge_failed"
      }
    }
  }

  if [smac] != "" {
    mutate {
      merge => {
        "principal.mac" => "smac"
      }
      on_error => "smac_not_found"
    }
    if ![smac_not_found] {
      mutate {
        replace => {
          "has_principal" => "true"
        }
      }
    }
  }
  if [src] != "" {
    grok {
      match => {
        "src" => [
          "%{IP:src_ip}"
        ]
      }
      overwrite => ["src_ip"]
      on_error => "src_ip_not_found"
    }
    if ![src_ip_not_found] {
      mutate {
        merge => {
          "principal.ip" => "src_ip"
          "principal.asset.ip" => "src_ip"
        }
        on_error => "src_not_found"
      }
      mutate {
        replace => {
          "has_principal" => "true"
        }
      }
    }
  }

  mutate {
    replace => {
      "metadata.vendor_name" => "Symantec Corporation"
      "metadata.product_name" => "Security Analytics Platform"
    }
  }

  if [has_principal] == "true" and [has_target] == "true" {
    mutate {
      replace => {
        "metadata.event_type" => "NETWORK_CONNECTION"
      }
    }
  }

  else if [has_principal] == "true" and [has_target] == "false" {
    mutate {
      replace => {
        "metadata.event_type" => "STATUS_UPDATE"
      }
    }
  }
  else if [has_principal_user] == "true" {
    mutate {
      replace => {
        "metadata.event_type" => "USER_UNCATEGORIZED"
      }
    }
  }
  else {
    mutate {
      replace => {
        "metadata.event_type" => "GENERIC_EVENT"
      }
    }
  }
  if [target] != "" {
    mutate {
      rename => {
        "target" => "event.idm.read_only_udm.target"
      }
    }
  }
  if [principal] != "" {
    mutate {
      rename => {
        "principal" => "event.idm.read_only_udm.principal"
      }
    }
  }
  if [metadata] != "" {
    mutate {
      rename => {
        "metadata" => "event.idm.read_only_udm.metadata"
      }
    }
  }
  if [network] != "" {
    mutate {
      rename => {
        "network" => "event.idm.read_only_udm.network"
      }
    }
  }

  if [security_result] != "" {
    mutate {
      merge => {
        "event.idm.read_only_udm.security_result" => "security_result"
      }
      on_error => "security_result_not_found"
    }
  }

  if [additional] != "" {
    mutate {
      rename => {
        "additional" => "event.idm.read_only_udm.additional"
      }
    }
  }
  if [intermediary] != "" {
    mutate {
      merge => {
        "event.idm.read_only_udm.intermediary" => "intermediary"
      }
      on_error => "intermediary_not_found"
    }
  }
  mutate {
    merge => {
      "@output" => "event"
    }
  }
}
