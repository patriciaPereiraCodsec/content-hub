name: Windows Workflows
permissions:
  contents: read
  pull-requests: read
on:
  push:
    branches:
      - '**'
    paths:
      - 'content/**'
      - 'packages/**'
      - '.github/workflows/**'
  pull_request:
    branches:
      - '**'
    paths:
      - 'content/**'
      - 'packages/**'
      - '.github/workflows/**'

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      mp: ${{ steps.filter.outputs.mp }}
      ci: ${{ steps.filter.outputs.ci }}
      tipcommon: ${{ steps.filter.outputs.tipcommon }}
      validate_command: ${{ steps.compute.outputs.validate_command }}
      test_command: ${{ steps.compute.outputs.test_command }}
      build_command: ${{ steps.compute.outputs.build_command }}
      build_playbooks_command: ${{ steps.compute.outputs.build_playbooks_command }}
      should_validate: ${{ steps.compute.outputs.should_validate }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for changes
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            mp:
              - 'packages/mp/**'
            ci:
              - '.github/workflows/**'
            tipcommon:
              - 'packages/tipcommon/**'

      - name: Get all changed content files
        id: changed-files
        uses: tj-actions/changed-files@v44
        with:
          files: content/**

      - name: Compute targets
        id: compute
        shell: bash
        # language=bash
        run: |
          # 1. If the mp CLI itself changed, validate everything
          if [[ "${{ steps.filter.outputs.mp }}" == "true" ]] || [[ "${{ steps.filter.outputs.tipcommon }}" == "true" ]]; then
            echo "validate_command=wmp validate repository google third_party playbooks" >> $GITHUB_OUTPUT
            echo "test_command=wmp test --repository third_party --repository google --raise-error-on-violations" >> $GITHUB_OUTPUT
            echo "build_command=wmp build repository google third_party" >> $GITHUB_OUTPUT
            echo "build_playbooks_command=wmp build repository playbooks" >> $GITHUB_OUTPUT
            echo "should_validate=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          FILES="${{ steps.changed-files.outputs.all_changed_files }}"
          if [[ -z "$FILES" ]]; then
            echo "should_validate=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          INTS=()
          PLAYBOOKS=()
          
          for file in $FILES; do
            IFS='/' read -ra ADDR <<< "$file"
            if [[ $file == content/response_integrations/* ]]; then
              # content/response_integrations/[google|third_party|power_ups]/...
              if [[ ${ADDR[2]} == "third_party" ]]; then
                # content/response_integrations/third_party/[community|partner]/NAME
                [[ -n "${ADDR[4]}" ]] && INTS+=("${ADDR[4]}")
              else
                # content/response_integrations/[google|power_ups]/NAME
                [[ -n "${ADDR[3]}" ]] && INTS+=("${ADDR[3]}")
              fi
            elif [[ $file == content/playbooks/* ]]; then
              # content/playbooks/[commercial|third_party]/...
              if [[ ${ADDR[2]} == "third_party" ]]; then
                 # content/playbooks/third_party/[community|partner]/NAME
                 [[ -n "${ADDR[4]}" ]] && PLAYBOOKS+=("${ADDR[4]}")
              else
                 # content/playbooks/commercial/NAME.json
                 # Strip .json if present
                 NAME="${ADDR[3]%.json}"
                 [[ -n "$NAME" ]] && PLAYBOOKS+=("$NAME")
              fi
            fi
          done
          
          # Deduplicate lists
          UNIQ_INTS=$(echo "${INTS[@]}" | tr ' ' '\n' | sort -u | xargs)
          UNIQ_PBs=$(echo "${PLAYBOOKS[@]}" | tr ' ' '\n' | sort -u | xargs)
          
          # Build the commands
          COMMAND=""
          TEST_COMMAND=""
          BUILD_COMMAND=""
          BUILD_PLAYBOOKS_COMMAND=""
          
          if [[ -n "$UNIQ_INTS" ]]; then
            COMMAND="wmp validate integration $UNIQ_INTS"
            BUILD_COMMAND="wmp build integration $UNIQ_INTS"
            
            # wmp test --integration expects the flag to be repeated for each item
            TEST_COMMAND="wmp test --raise-error-on-violations"
            for int_name in $UNIQ_INTS; do
              TEST_COMMAND="$TEST_COMMAND --integration $int_name"
            done
          fi
          
          if [[ -n "$UNIQ_PBs" ]]; then
            [[ -n "$COMMAND" ]] && COMMAND="$COMMAND && "
            COMMAND="${COMMAND}wmp validate playbook $UNIQ_PBs"
            BUILD_PLAYBOOKS_COMMAND="wmp build playbook $UNIQ_PBs"
          fi
          
          if [[ -n "$COMMAND" ]]; then
            echo "validate_command=$COMMAND" >> $GITHUB_OUTPUT
            echo "test_command=$TEST_COMMAND" >> $GITHUB_OUTPUT
            echo "build_command=$BUILD_COMMAND" >> $GITHUB_OUTPUT
            echo "build_playbooks_command=$BUILD_PLAYBOOKS_COMMAND" >> $GITHUB_OUTPUT
            echo "should_validate=true" >> $GITHUB_OUTPUT
          else
            echo "should_validate=false" >> $GITHUB_OUTPUT
          fi

  test-mp-windows:
    name: 1. Test mp Package
    needs: [ changes ]
    if: ${{ needs.changes.outputs.mp == 'true' || needs.changes.outputs.ci == 'true' }}
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install dependencies
        # language=bash
        run: |
          python -m pip install uv
          uv pip install --system -e ./packages/mp
          uv pip install --system pytest pytest-cov pytest-xdist hypothesis pytest-json-report
      - name: Run pytest
        working-directory: packages/mp
        run: python -m pytest tests -n 7 --cov

  test-tipcommon-windows:
    name: 1b. Test TIPCommon Package
    needs: [ changes ]
    if: ${{ needs.changes.outputs.tipcommon == 'true' || needs.changes.outputs.ci == 'true' }}
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install dependencies
        run: |
          python -m pip install uv
      - name: Run pytest
        working-directory: packages/tipcommon/TIPCommon
        run: |
          uv sync --dev
          uv run pytest

  validate-content-windows:
    name: 2. Validate Content
    needs: [ changes ]
    if: >-
      needs.changes.outputs.should_validate == 'true' &&
      (github.event_name != 'pull_request' ||
       (!contains(github.event.pull_request.labels.*.name, 'skip-windows') &&
        !contains(github.event.pull_request.labels.*.name, 'ci-minimal')))
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install mp
        # language=bash
        run: |
          python -m pip install uv
          uv pip install --system -e ./packages/mp
      - name: Run Validations
        shell: pwsh
        env:
          PYTHONIOENCODING: utf-8
          GITHUB_PR_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
          VALIDATE_COMMAND: ${{ needs.changes.outputs.validate_command }}
        # language=bash
        run: |
          wmp config --root-path . --processes 7 --display-config
          Invoke-Expression $env:VALIDATE_COMMAND

  run-integrations-tests-windows:
    name: 3. Test Integrations
    needs: [ changes ]
    if: needs.changes.outputs.should_validate == 'true'
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install mp
        # language=bash
        run: |
          python -m pip install uv
          uv pip install --system -e ./packages/mp
      - name: Run integration tests
        shell: pwsh
        env:
          PYTHONIOENCODING: utf-8
          TEST_COMMAND: ${{ needs.changes.outputs.test_command }}
        # language=powershell
        run: |
          wmp config --root-path . --processes 7 --display-config
          if ($env:TEST_COMMAND) {
            Invoke-Expression $env:TEST_COMMAND
          } else {
            Write-Host "No tests to run."
          }

  mp-build-integrations-windows:
    name: 4. Build Integrations
    needs: [ changes ]
    if: needs.changes.outputs.should_validate == 'true'
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install mp
        # language=bash
        run: |
          python -m pip install uv
          uv pip install --system -e ./packages/mp
      - name: Build
        shell: pwsh
        env:
          BUILD_COMMAND: ${{ needs.changes.outputs.build_command }}
        # language=powershell
        run: |
          wmp config --root-path . --processes 7 --display-config
          if ($env:BUILD_COMMAND) {
            Invoke-Expression $env:BUILD_COMMAND
          } else {
            Write-Host "No integrations to build."
          }

  mp-build-playbooks-windows:
    name: 5. Build Playbooks
    needs: [ changes ]
    if: needs.changes.outputs.should_validate == 'true'
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install mp
        # language=bash
        run: |
          python -m pip install uv
          uv pip install --system -e ./packages/mp
      - name: Build
        shell: pwsh
        env:
          BUILD_PLAYBOOKS_COMMAND: ${{ needs.changes.outputs.build_playbooks_command }}
        # language=powershell
        run: |
          wmp config --root-path . --processes 7 --display-config
          if ($env:BUILD_PLAYBOOKS_COMMAND) {
            Invoke-Expression $env:BUILD_PLAYBOOKS_COMMAND
          } else {
            Write-Host "No playbooks to build."
          }
